question: Selon l'école autrichienne, quelle différence fondamentale oppose leur vision de l'origine de la monnaie à celle des économistes mainstream et de la théorie monétaire moderne?
answer: Les autrichiens considèrent que la monnaie émerge d'un processus naturel et spontané du marché, tandis que les mainstream la voient comme une création institutionnelle contrôlée par les autorités centrales
wrong_answers:
  - "Les autrichiens pensent que la monnaie doit être basée sur l'or, tandis que les mainstream privilégient la monnaie fiduciaire émise par les banques centrales"
  - "Les autrichiens estiment que la monnaie résulte d'accords commerciaux internationaux, tandis que les mainstream la considèrent comme un produit de l'évolution technologique"
  - "Les autrichiens voient la monnaie comme un instrument de politique économique, tandis que les mainstream la perçoivent comme un simple facilitateur d'échanges commerciaux"
explanation: |
  Cette opposition théorique fondamentale structure tout le débat sur l'origine monétaire. Carl Menger et l'école autrichienne défendent l'idée d'une émergence spontanée par sélection naturelle du marché, où les agents choisissent progressivement les biens les plus échangeables. À l'inverse, les économistes mainstream et la théorie monétaire moderne considèrent la monnaie comme une institution créée et contrôlée par les autorités, nécessitant une intervention étatique pour exister et fonctionner.

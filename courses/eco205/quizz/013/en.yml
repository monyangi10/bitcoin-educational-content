question: What is marginal utility according to the marginalist revolution of the 1870s?
answer: The satisfaction that an individual obtains from consuming an additional unit of a good
wrong_answers:
  - "The total amount of labor required to produce one additional unit of a good"
  - The difference in price between two similar goods on the economic market
  - "The objective and measurable value of a good determined by its natural scarcity"
explanation: |
  Marginal utility, the central concept of the marginalist revolution, is precisely defined as the satisfaction obtained by an individual when consuming an additional unit of a good. This theory, developed simultaneously by Jevons, Walras and Menger, explains that this satisfaction decreases progressively with each additional consumption. The other answers are incorrect, as they refer either to the theory of labor value (quantity of labor), or to concepts of price or objective value, which do not correspond to the definition of marginal utility.
question: Qu'est-ce que l'utilité marginale selon la révolution marginaliste des années 1870?
answer: La satisfaction qu'un individu obtient de la consommation d'une unité supplémentaire d'un bien
wrong_answers:
  - "La quantité totale de travail nécessaire pour produire une unité supplémentaire d'un bien"
  - La différence de prix entre deux biens similaires sur le marché économique
  - "La valeur objective et mesurable d'un bien déterminée par sa rareté naturelle"
explanation: |
  L'utilité marginale, concept central de la révolution marginaliste, se définit précisément comme la satisfaction obtenue par un individu lors de la consommation d'une unité supplémentaire d'un bien. Cette théorie, développée simultanément par Jevons, Walras et Menger, explique que cette satisfaction décroît progressivement à chaque consommation supplémentaire. Les autres réponses sont incorrectes car elles font référence soit à la théorie de la valeur travail (quantité de travail), soit à des concepts de prix ou de valeur objective, qui ne correspondent pas à la définition de l'utilité marginale.

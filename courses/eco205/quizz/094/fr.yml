question: Selon la théorie monétaire autrichienne, quelle est la principale différence entre la monnaie et les autres biens économiques dans leur utilisation?
answer: La monnaie n'est pas consommée dans son usage mais sert d'intermédiaire d'échange
wrong_answers:
  - La monnaie est produite uniquement par les institutions étatiques contrairement aux autres biens
  - La monnaie possède une valeur intrinsèque supérieure à tous les autres biens du marché
  - La monnaie est consommée plus rapidement que les autres biens lors des transactions
explanation: |
  Rothbard précise que contrairement aux biens de consommation ou d'équipement, la monnaie n'est pas consommée dans son usage. Sa fonction spécifique consiste à agir comme intermédiaire d'échange, permettant aux biens et services de circuler entre les individus. Cette caractéristique unique distingue fondamentalement la monnaie des autres biens économiques qui sont soit consommés, soit utilisés dans la production.

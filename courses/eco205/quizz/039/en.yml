question: According to Murray Rothbard, what is the fundamental difference between humans and atoms?
answer: Humans act with intention and purpose, unlike atoms, which have neither preference nor will
wrong_answers:
  - Humans are more complex, but react in the same predictable way as atoms
  - Humans and atoms follow the same natural laws, but on different scales
  - "Humans are more sophisticated systems of atoms, but governed by the same principles."
explanation: |
  Murray Rothbard makes an essential distinction: humans possess intentionality and pursue conscious goals, while atoms and other physical objects have no preferences or will of their own. This fundamental difference explains why humans can learn, change their minds and react differently to the same situations, unlike atoms, which always react identically under the same conditions.
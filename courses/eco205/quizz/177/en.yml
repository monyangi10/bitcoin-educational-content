question: According to French liberal thinkers and their influence on the Austrian school, what is Frédéric Bastiat's fundamental conception of social harmony?
answer: It emerges naturally from a natural law that includes the right to exist, voluntary exchange and private property
wrong_answers:
  - It is the result of state planning that coordinates divergent individual interests for the common good
  - "It stems from government intervention correcting spontaneous free market failures."
  - It stems from the collective regulation of exchanges by representative democratic institutions
explanation: |
  Bastiat believed that social harmony emerges spontaneously from a natural law based on three pillars: the right to exist, voluntary exchange and private property. This vision stands in direct opposition to the three wrong answers, all of which involve state or collective intervention. Bastiat criticized these very interventions as creating unforeseen consequences and disrupting the natural order. This concept of spontaneous order was to have a profound influence on Murray Rothbard and modern Austrian thought.
question: Selon les penseurs libéraux français et leur influence sur l'école autrichienne, quelle est la conception fondamentale de l'harmonie sociale selon Frédéric Bastiat?
answer: Elle émerge naturellement d'une loi naturelle comprenant le droit à l'existence, l'échange volontaire et la propriété privée
wrong_answers:
  - Elle résulte de la planification étatique coordonnant les intérêts individuels divergents pour le bien commun
  - "Elle découle de l'intervention gouvernementale corrigeant les défaillances spontanées du marché libre"
  - Elle provient de la régulation collective des échanges par des institutions démocratiques représentatives
explanation: |
  Bastiat croyait que l'harmonie sociale émerge spontanément d'une loi naturelle basée sur trois piliers : le droit à l'existence, l'échange volontaire et la propriété privée. Cette vision s'oppose directement aux trois mauvaises réponses qui impliquent toutes une intervention étatique ou collective. Bastiat critiquait précisément ces interventions comme créant des conséquences imprévues et perturbant l'ordre naturel. Cette conception de l'ordre spontané influencera profondément Murray Rothbard et la pensée autrichienne moderne.

question: What was the fundamental difference between the economic vision of the 16th-century Spanish scholastics and that of the mercantilists with regard to international trade?
answer: Scholastics saw exchange as mutually beneficial, while mercantilists saw it as a zero-sum game
wrong_answers:
  - "The scholastics favored massive state intervention, while the mercantilists advocated absolute free trade"
  - "The Scholastics totally rejected international trade, while the Mercantilists encouraged it without restriction"
  - The scholastics based their theories on objective labour-value, while the mercantilists defended subjectivity
explanation: |
  The correct answer underlines the crucial distinction between these two schools of thought. The Spanish scholastics developed a liberal vision in which international exchange benefits both parties, anticipating modern theories of free trade. Mercantilists, on the other hand, considered that the enrichment of one nation was necessarily to the detriment of another, thus justifying state intervention to protect national interests. This fundamental conceptual opposition explains why the Scholastics are considered the precursors of the Austrian school.
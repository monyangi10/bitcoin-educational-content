question: Quelle différence fondamentale distinguait la vision économique des scolastiques espagnols du XVIe siècle de celle des mercantilistes concernant le commerce international?
answer: Les scolastiques concevaient l'échange comme mutuellement bénéfique tandis que les mercantilistes le voyaient comme un jeu à somme nulle
wrong_answers:
  - "Les scolastiques privilégiaient l'intervention étatique massive alors que les mercantilistes prônaient le libre-échange absolu"
  - "Les scolastiques rejetaient totalement le commerce international tandis que les mercantilistes l'encourageaient sans restriction"
  - Les scolastiques basaient leurs théories sur la valeur-travail objective alors que les mercantilistes défendaient la subjectivité
explanation: |
  La réponse correcte souligne la distinction cruciale entre ces deux écoles de pensée. Les scolastiques espagnols développaient une vision libérale où l'échange international profite aux deux parties, anticipant les théories modernes du libre-échange. Les mercantilistes, au contraire, considéraient que l'enrichissement d'une nation se faisait nécessairement au détriment d'une autre, justifiant ainsi l'intervention étatique pour protéger les intérêts nationaux. Cette opposition conceptuelle fondamentale explique pourquoi les scolastiques sont considérés comme des précurseurs de l'école autrichienne.

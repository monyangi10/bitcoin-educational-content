question: Selon la théorie autrichienne, que représentent les détours de production développés par Böhm-Bawerk?
answer: L'investissement dans des étapes éloignées de la consommation pour produire d'abord des biens d'équipement
wrong_answers:
  - "La production directe de biens de consommation sans utiliser d'outils ou d'équipements intermédiaires"
  - Les raccourcis techniques permettant de réduire le temps nécessaire à la production finale
  - Les méthodes de distribution qui évitent les intermédiaires entre producteurs et consommateurs
explanation: |
  Les détours de production selon Böhm-Bawerk consistent à investir d'abord dans la création de biens d'équipement (comme fabriquer un filet de pêche) avant de produire les biens de consommation finale. Cette approche nécessite plus de temps initialement mais génère ensuite une productivité supérieure. L'exemple du filet de pêche illustre parfaitement ce concept : au lieu de pêcher directement à mains nues, on prend le temps de fabriquer un outil qui améliorera considérablement les résultats futurs.

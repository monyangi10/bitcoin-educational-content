question: According to 18th-century French physiocrats, what was the main source of economic value?
answer: The earth
wrong_answers:
  - Human work
  - The scarcity of goods
  - "Marginal utility"
explanation: |
  The French physiocrats of the 18th century considered that value emanated from the land. This conception preceded the labor theory of value later developed by classical economists such as Adam Smith and David Ricardo. Marginal utility and the scarcity of goods are concepts that emerged much later with the marginalist revolution of the 1870s.
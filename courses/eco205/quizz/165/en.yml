question: According to Luis Saravia de la Calle and the analysis of the Spanish scholastics, what is the correct relationship between production costs and market prices?
answer: Costs tend to follow prices, as the right price arises from the abundance or shortage of goods
wrong_answers:
  - Prices are determined by production costs, in particular the labour required for manufacturing
  - "Costs and prices are established simultaneously by a perfect mathematical equilibrium"
  - "Prices follow costs, but only in sectors controlled by the Spanish state"
explanation: |
  Saravia de la Calle revolutionized economic understanding by demonstrating that costs adjust to prices determined by supply and demand, and not the other way around. This vision opposed the labor theory of value, which postulated that prices were derived from production costs. The Spanish Scholastics thus anticipated modern Austrian theory, according to which prices emerge from consumers' subjective evaluations of the market.
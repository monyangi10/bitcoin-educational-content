question: What does methodological individualism mean for the Austrian school?
answer: The second fundamental pillar after value subjectivism
wrong_answers:
  - The first principle, developed before any other economic theory
  - The third element complements marginalism and subjectivism
  - The main pillar of value subjectivism
explanation: |
  Methodological individualism is indeed the second fundamental pillar of the Austrian school, after value subjectivism. These two principles are perfectly articulated: value is subjective, and this subjectivity can only be apprehended at the individual level. This is neither the first principle developed historically, nor a third element, nor the main pillar from which subjectivism is derived.
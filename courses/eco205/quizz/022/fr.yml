question: Que représente l'individualisme méthodologique pour l'école autrichienne?
answer: Le deuxième pilier fondamental après le subjectivisme de la valeur
wrong_answers:
  - Le premier principe développé avant toute autre théorie économique
  - Le troisième élément complémentaire au marginalisme et au subjectivisme
  - Le pilier principal dont découle le subjectivisme de la valeur
explanation: |
  L'individualisme méthodologique constitue effectivement le deuxième pilier fondamental de l'école autrichienne, après le subjectivisme de la valeur. Ces deux principes s'articulent parfaitement : la valeur est subjective, et cette subjectivité ne peut être appréhendée qu'au niveau individuel. Il ne s'agit ni du premier principe développé historiquement, ni d'un troisième élément, ni du pilier principal dont découlerait le subjectivisme.

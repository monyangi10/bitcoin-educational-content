question: According to the Austrian school, what is the main reason why a fully communist economic system on a global scale would be impossible to maintain?
answer: The total absence of market prices would make any rational economic calculation impossible
wrong_answers:
  - Lack of motivation of workers without private property would compromise production
  - Excessive concentration of power inevitably leads to administrative corruption
  - "The technical impossibility of coordinating production without modern means of communication"
explanation: |
  According to Mises and the Austrian school, an entirely communist world without any market prices would be impossible, because prices are the indispensable basis of any rational economic calculation. Without private property and free exchange, there are no real prices, and without prices, no rational productive organization is possible. The USSR could only function by copying Western capitalist market prices for its internal calculations, demonstrating this fundamental dependence.
question: According to Diego de Covarrubias (1555), what primarily determines the value of a good like wheat, which is worth more in the Indies than in Spain?
answer: The subjective appreciation of individuals, even if this appreciation may seem unreasonable
wrong_answers:
  - The amount of labor required to produce the good in each geographic region
  - "Transport costs and supply difficulties between Spain and India"
  - "The objective nature of the property, which automatically adapts to local climatic conditions"
explanation: |
  Covarrubias was a precursor of the subjective theory of value, asserting that value does not depend on the objective nature of goods, but on the subjective evaluation of individuals. His example of wheat perfectly illustrates this theory: the same good has different values according to people's appreciation, anticipating by three centuries the developments of the Austrian school and opposing the future theory of work value.
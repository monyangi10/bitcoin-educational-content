question: In Robinson Crusoe's example, why does he need to save coconuts before making his pole?
answer: To free up the time needed to produce a capital good without compromising its immediate survival
wrong_answers:
  - To exchange walnuts for the materials needed to make the pole
  - "To create a store of value that will serve as a guarantee in case your project fails"
  - To comply with the economic principle that all investments must be financed by liquid assets
explanation: |
  Robinson's saving of coconuts illustrates a fundamental principle of Austrian economics: any productive investment requires prior saving. By saving coconuts, Robinson can devote time to building his pole without risking starvation. This saving represents deferred consumption, freeing up resources (in this case, time) to create a capital good. This example demonstrates the need for present sacrifice to improve future productivity.
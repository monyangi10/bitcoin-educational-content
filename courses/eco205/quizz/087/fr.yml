question: Dans l'exemple de Robinson Crusoé, pourquoi doit-il épargner des noix de coco avant de fabriquer sa perche?
answer: Pour libérer le temps nécessaire à la production d'un bien capital sans compromettre sa survie immédiate
wrong_answers:
  - Pour échanger les noix contre les matériaux nécessaires à la fabrication de la perche
  - "Pour créer une réserve de valeur qui servira de garantie en cas d'échec de son projet"
  - Pour respecter le principe économique selon lequel tout investissement doit être financé par des liquidités
explanation: |
  L'épargne de noix de coco par Robinson illustre un principe fondamental de l'économie autrichienne : tout investissement productif nécessite une épargne préalable. En épargnant des noix, Robinson peut consacrer du temps à fabriquer sa perche sans risquer de mourir de faim. Cette épargne représente une consommation différée qui permet de libérer des ressources (ici le temps) pour créer un bien capital. Cet exemple démontre la nécessité d'un sacrifice présent pour améliorer la productivité future.

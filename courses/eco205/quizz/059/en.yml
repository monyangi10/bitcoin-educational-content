question: According to the Austrian school, what is the main characteristic of capital that distinguishes it from the neoclassical view?
answer: Capital is heterogeneous and made up of non-interchangeable production goods
wrong_answers:
  - Capital is a homogeneous mass that can be easily measured in models
  - Capital represents only the original factors, such as land
  - "Capital is a static, self-balancing stock"
explanation: |
  The Austrian school emphasizes the heterogeneity of capital, stressing that each production good has unique characteristics and specific uses. A mining machine is not equivalent to a combine harvester, and these goods are not interchangeable. This vision is opposed to the neoclassical approach, which treats capital as a homogeneous, static mass, overlooking the complexity of the productive structure and the importance of time in its organization.
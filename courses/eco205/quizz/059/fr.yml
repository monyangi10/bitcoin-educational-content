question: Selon l'école autrichienne, quelle est la principale caractéristique du capital qui le distingue de la vision néoclassique?
answer: Le capital est hétérogène et composé de biens de production non interchangeables
wrong_answers:
  - Le capital est une masse homogène facilement mesurable dans les modèles
  - Le capital représente uniquement les facteurs originels comme la terre
  - "Le capital est un stock statique qui s'équilibre automatiquement"
explanation: |
  L'école autrichienne insiste sur l'hétérogénéité du capital, soulignant que chaque bien de production a des caractéristiques uniques et des utilisations spécifiques. Une machine d'extraction n'est pas équivalente à une moissonneuse-batteuse et ces biens ne sont pas interchangeables. Cette vision s'oppose à l'approche néoclassique qui traite le capital comme une masse homogène et statique, négligeant la complexité de la structure productive et l'importance du temps dans son organisation.

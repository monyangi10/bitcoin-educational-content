question: Selon la philosophie kantienne qui influence la praxéologie autrichienne, à quelle catégorie appartient l'axiome de l'action humaine?
answer: Aux propositions synthétiques a priori dont la vérité s'établit sans observation empirique
wrong_answers:
  - "Aux propositions analytiques a posteriori dérivées de l'expérience des marchés"
  - "Aux propositions synthétiques a posteriori basées sur l'observation des comportements"
  - Aux propositions analytiques a priori issues de définitions logiques pures
explanation: |
  Hans-Hermann Hoppe souligne que Mises peut être qualifié de kantien précisément parce qu'il souscrit à l'existence de propositions synthétiques a priori vraies. L'axiome de l'action humaine appartient à cette catégorie spécifique où la valeur de vérité peut être établie sans recours à l'observation empirique, contrairement aux propositions a posteriori qui dépendent de l'expérience, ou aux propositions analytiques qui sont vraies par définition.

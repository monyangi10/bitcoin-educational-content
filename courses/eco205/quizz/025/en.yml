question: What major methodological conflict has pitted the Austrian school against the German historical school?
answer: The Methodenstreit (battle of the methods)
wrong_answers:
  - The Wertstreit (battle of values)
  - The Kapitalstreit (capital battle)
  - The Strukturstreit (battle of the structures)
explanation: |
  The Methodenstreit, literally "battle of the methods", is the famous methodological conflict between Carl Menger's Austrian school and the German historical school. The debate concerned how to study economics: Menger's methodological individualism versus the holism of the German school. The other terms proposed do not exist in the history of economic thought and do not correspond to any real debate between these schools.
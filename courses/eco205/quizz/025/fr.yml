question: Quel conflit méthodologique majeur a opposé l'école autrichienne à l'école historique allemande?
answer: La Methodenstreit (bataille des méthodes)
wrong_answers:
  - La Wertstreit (bataille des valeurs)
  - La Kapitalstreit (bataille du capital)
  - La Strukturstreit (bataille des structures)
explanation: |
  La Methodenstreit, littéralement "bataille des méthodes", est le conflit méthodologique célèbre qui a opposé l'école autrichienne de Carl Menger à l'école historique allemande. Ce débat portait sur la manière d'étudier l'économie : l'individualisme méthodologique de Menger contre l'holisme de l'école allemande. Les autres termes proposés n'existent pas dans l'histoire de la pensée économique et ne correspondent à aucun débat réel entre ces écoles.

question: What is it about Austrian theory that fundamentally distinguishes the concept of money from the mainstream approach?
answer: Money is a rare good that emerges spontaneously from the market, selected by the players to facilitate exchanges
wrong_answers:
  - Money is created exclusively by private financial institutions competing on the market
  - "Money is a social contract imposed by the State to standardize commercial transactions"
  - "Money is a technical instrument developed by central banks to control inflation"
explanation: |
  The correct answer reflects the Austrian vision, in which money emerges naturally from the market process as the most liquid good, in contrast to the mainstream approach, which presents it as an institutional creation of central banks and states. The other options represent statist or institutional visions explicitly rejected by the Austrian school, which favors spontaneous emergence and natural selection by economic players.
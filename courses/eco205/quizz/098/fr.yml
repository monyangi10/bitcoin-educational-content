question: Dans la théorie autrichienne, qu'est-ce qui distingue fondamentalement la conception de la monnaie de l'approche mainstream?
answer: La monnaie est un bien rare qui émerge spontanément du marché, sélectionné par les acteurs pour faciliter les échanges
wrong_answers:
  - La monnaie est créée exclusivement par les institutions financières privées en concurrence sur le marché
  - "La monnaie est un contrat social imposé par l'État pour standardiser les transactions commerciales"
  - "La monnaie est un instrument technique développé par les banques centrales pour contrôler l'inflation"
explanation: |
  La réponse correcte reflète la vision autrichienne où la monnaie émerge naturellement du processus de marché comme bien le plus liquide, contrairement à l'approche mainstream qui la présente comme création institutionnelle des banques centrales et États. Les autres options représentent des visions étatistes ou institutionnelles que rejette explicitement l'école autrichienne, qui privilégie l'émergence spontanée et la sélection naturelle par les acteurs économiques.

question: From an Austrian perspective, how does money overcome the fundamental limitations of the barter system?
answer: By eliminating the need for double coincidence of needs thanks to its superior liquidity
wrong_answers:
  - By standardizing prices to create perfect equivalence between all traded goods
  - By guaranteeing the stability of relative values between different goods on the market
  - "By centralizing exchanges through a transaction control institution"
explanation: |
  The correct answer identifies the precise mechanism by which money solves the barter problem. In a barter system, every exchange requires a double coincidence of needs: each party must desire what the other possesses. Money, thanks to its superior liquidity (its ability to be easily exchanged), acts as an intermediary and eliminates this constraint. The other options are incorrect, as they describe functions that do not correspond to Austrian theory: money does not artificially standardize prices, does not guarantee the stability of relative values (which fluctuate according to supply and demand), and does not imply institutional centralization, as it emerges spontaneously from the market.
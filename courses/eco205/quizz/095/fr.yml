question: Selon la perspective autrichienne, comment la monnaie permet-elle de surmonter les limites fondamentales du système de troc?
answer: En éliminant la nécessité de la double coïncidence des besoins grâce à sa liquidité supérieure
wrong_answers:
  - En standardisant les prix pour créer une équivalence parfaite entre tous les biens échangés
  - En garantissant la stabilité des valeurs relatives entre les différents biens du marché
  - "En centralisant les échanges par l'intermédiaire d'une institution de contrôle des transactions"
explanation: |
  La réponse correcte identifie le mécanisme précis par lequel la monnaie résout le problème du troc. Dans un système de troc, chaque échange nécessite une double coïncidence des besoins : chaque partie doit désirer ce que l'autre possède. La monnaie, grâce à sa liquidité supérieure (sa capacité à être facilement échangée), sert d'intermédiaire et élimine cette contrainte. Les autres options sont incorrectes car elles décrivent des fonctions qui ne correspondent pas à la théorie autrichienne : la monnaie ne standardise pas les prix de façon artificielle, ne garantit pas la stabilité des valeurs relatives (qui fluctuent selon l'offre et la demande), et n'implique pas de centralisation institutionnelle puisqu'elle émerge spontanément du marché.

question: Que représente le coût d'opportunité selon Friedrich von Wieser?
answer: La valeur des usages alternatifs auxquels on renonce
wrong_answers:
  - Le coût historique réel basé sur les résultats passés
  - "Le prix d'achat initial d'une ressource ou d'un bien"
  - La somme des coûts de production et de distribution
explanation: |
  Friedrich von Wieser a clairement distingué le coût d'opportunité du coût historique. Pour lui, le coût d'une ressource n'est pas lié à son coût réel passé, mais bien à la valeur des usages alternatifs auxquels on renonce. Cette approche révolutionnaire montre que la valeur d'un bien est déterminée par le bien le plus précieux que l'on aurait pu produire à la place, ce qui s'inscrit dans les axiomes fondamentaux de la subjectivité de la valeur selon l'école autrichienne.

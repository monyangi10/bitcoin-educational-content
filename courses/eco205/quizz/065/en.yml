question: What does Friedrich von Wieser mean by opportunity cost?
answer: The value of foregone alternative uses
wrong_answers:
  - Actual historical cost based on past results
  - "The initial purchase price of a resource or good"
  - The sum of production and distribution costs
explanation: |
  Friedrich von Wieser clearly distinguished opportunity cost from historical cost. For him, the cost of a resource is not linked to its actual past cost, but to the value of the alternative uses foregone. This revolutionary approach shows that the value of a good is determined by the most valuable good that could have been produced instead, in line with the fundamental axioms of the subjectivity of value according to the Austrian school.
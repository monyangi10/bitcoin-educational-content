question: Quelle est la particularité de la catastrophe du système de John Law qui a permis à Richard Cantillon de développer sa théorie monétaire novatrice?
answer: Elle a démontré que l'augmentation arbitraire de la masse monétaire de papier-monnaie provoque des bulles inflationnistes, validant la supériorité des monnaies saines
wrong_answers:
  - "Elle a prouvé que les taux d'intérêt élevés empêchent la circulation monétaire et créent des récessions déflationnistes prolongées"
  - "Elle a révélé que la spéculation entrepreneuriale excessive sur les marchés financiers détruit l'équilibre naturel des prix"
  - "Elle a montré que l'absence de régulation bancaire centrale conduit inévitablement à l'effondrement du système de crédit privé"
explanation: |
  Cantillon fut témoin direct de l'échec du système de papier-monnaie de John Law, ce qui lui permit d'observer concrètement les effets destructeurs de l'expansion monétaire artificielle. Cette expérience historique l'amena à comprendre le mécanisme des bulles inflationnistes et à défendre les monnaies saines comme l'or et l'argent. Les autres réponses sont incorrectes car elles attribuent l'échec à des facteurs secondaires plutôt qu'au problème fondamental de la création monétaire arbitraire.

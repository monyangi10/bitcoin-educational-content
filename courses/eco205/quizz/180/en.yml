question: What was it about the catastrophe of John Law's system that enabled Richard Cantillon to develop his innovative monetary theory?
answer: She demonstrated that arbitrary increases in the paper money supply cause inflationary bubbles, validating the superiority of sound currencies
wrong_answers:
  - "It proved that high interest rates prevent money circulation and create prolonged deflationary recessions."
  - "It revealed that excessive entrepreneurial speculation on financial markets destroys the natural price equilibrium"
  - "It has shown that the absence of central banking regulation inevitably leads to the collapse of the private credit system."
explanation: |
  Cantillon witnessed at first hand the failure of John Law's paper money system, allowing him to observe at first hand the destructive effects of artificial monetary expansion. This historical experience led him to understand the mechanism of inflationary bubbles and to defend sound currencies such as gold and silver. The other answers are incorrect, as they attribute the failure to secondary factors rather than to the fundamental problem of arbitrary money creation.
question: Quel concept Mises a-t-il développé pour démontrer l'impossibilité théorique d'un équilibre parfait dans l'économie?
answer: L'économie en rotation uniforme où toutes les variables demeurent constantes
wrong_answers:
  - "L'ordre spontané basé sur la coordination naturelle des acteurs économiques"
  - La connaissance tacite dispersée entre tous les participants du marché
  - Le calcul économique fondé sur les échanges volontaires et prix libres
explanation: |
  Mises a créé le concept d'économie en rotation uniforme comme un modèle hypothétique absurde où toutes les variables restent constantes pour prouver qu'un équilibre parfait est impossible. Cette situation impliquerait un futur certain, ce qui contredit le principe même de l'action humaine basée sur l'incertitude. Les autres options sont des concepts réels et fonctionnels : l'ordre spontané de Hayek explique la coordination naturelle, la connaissance tacite décrit les savoirs non formalisés utilisés quotidiennement, et le calcul économique constitue un mécanisme d'autorégulation du marché.

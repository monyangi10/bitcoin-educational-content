question: Quel est le signal principal que l'épargne envoie aux entrepreneurs selon la théorie autrichienne?
answer: Que la consommation actuelle est satisfaite et qu'ils peuvent investir dans d'autres étapes de production
wrong_answers:
  - Que les consommateurs souhaitent augmenter leur consommation immédiate de biens et services
  - "Que les taux d'intérêt sont trop élevés et qu'il faut réduire les investissements productifs"
  - Que la structure du capital est mal orientée et nécessite une réallocation instantanée
explanation: |
  Selon la théorie autrichienne, l'épargne constitue un signal crucial pour les entrepreneurs car elle indique que la consommation présente est satisfaite. Cela permet aux entrepreneurs d'investir dans des étapes de production plus éloignées de la consommation sans impacter négativement les besoins actuels des consommateurs. L'épargne et son prix (le taux d'intérêt) orientent ainsi la production vers la bonne temporalité, permettant le développement de détours de production plus complexes et productifs.

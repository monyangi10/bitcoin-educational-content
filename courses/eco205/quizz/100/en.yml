question: According to Menger's theory, what is the main mechanism that allows less discerning economic agents to gradually adopt the emerging currency?
answer: Spontaneous imitation of the behavior of the most economically successful individuals
wrong_answers:
  - "Direct intervention by central authorities to impose a common monetary standard"
  - Collective planning and negotiation between all market agents
  - "The rational, individual and independent analysis of each economic agent"
explanation: |
  Menger explains that imitation plays a decisive role because knowledge is not uniform across the population. Less perceptive agents naturally imitate the behavior of the most capable entrepreneurs, creating a shortcut for those who have neither the time nor the necessary knowledge. This process of spontaneous imitation allows monetary adoption to spread rapidly without institutional intervention.
question: What role does tacit knowledge play in the functioning of the market process according to Hayek?
answer: It enables players to naturally adopt sensible economic behaviors without prior theoretical training
wrong_answers:
  - "It is the set of formalized information that central planners must collect"
  - It represents the official statistical data used by the authorities to regulate prices
  - It refers to the academic knowledge that all entrepreneurs must master in order to succeed
explanation: |
  According to Hayek, tacit knowledge refers to the non-formalized knowledge that economic actors use on a daily basis without articulating it explicitly. This form of knowledge enables individuals to spontaneously adopt sensible approaches to money, credit and exchange, without the need for prior theoretical training. The other answers are incorrect, because they confuse tacit knowledge with formalized or centralized forms of knowledge, whereas Hayek insists precisely on the dispersed, non-formalized nature of this knowledge.
question: According to the Austrian school of thought, what determines the opportunity cost of a good or resource?
answer: The subjective value placed by the individual on the alternatives he gives up
wrong_answers:
  - The historical production cost of the good calculated objectively
  - Average market prices for similar properties in the past
  - Marginal cost of production established by precise mathematical formulas
explanation: |
  The Austrian school considers that opportunity cost is fundamentally subjective and depends on the personal preferences of each individual. Unlike the mainstream approach, which uses formal, mathematical methods, the Austrian school emphasizes the subjectivity of value. Opportunity cost represents the value of the best alternative choice foregone, this value being determined by the subjective appreciation of the individual concerned, and not by objective calculations based on historical costs or market prices.
question: Selon l'école autrichienne, qu'est-ce qui détermine le coût d'opportunité d'un bien ou d'une ressource?
answer: La valeur subjective accordée par l'individu aux alternatives auxquelles il renonce
wrong_answers:
  - Le coût historique de production du bien calculé de manière objective
  - La moyenne des prix du marché pour des biens similaires dans le passé
  - Le coût marginal de production établi par des formules mathématiques précises
explanation: |
  L'école autrichienne considère que le coût d'opportunité est fondamentalement subjectif et dépend des préférences personnelles de chaque individu. Contrairement à l'approche mainstream qui utilise des méthodes formelles et mathématiques, l'école autrichienne met l'accent sur la subjectivité de la valeur. Le coût d'opportunité représente la valeur du meilleur choix alternatif auquel on renonce, cette valeur étant déterminée par l'appréciation subjective de l'individu concerné, et non par des calculs objectifs basés sur les coûts historiques ou les prix de marché.

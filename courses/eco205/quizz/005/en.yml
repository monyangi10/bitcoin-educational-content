question: What is the third methodological pillar of the Austrian school of economics?
answer: Praxeology
wrong_answers:
  - Methodological dualism
  - "Methodological individualism"
  - Methodological subjectivism
explanation: |
  Praxeology is the third methodological pillar of the Austrian school. It represents the systematic study of human action, and starts from the irrefutable axiom that man acts. From this simple axiom, Austrian economists logically deduce their entire economic theory. The other options correspond to the other pillars: methodological subjectivism (first pillar), methodological individualism (second pillar) and methodological dualism (fourth pillar).
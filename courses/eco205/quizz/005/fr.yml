question: Quel est le troisième pilier méthodologique de l'école autrichienne d'économie?
answer: La praxéologie
wrong_answers:
  - Le dualisme méthodologique
  - "L'individualisme méthodologique"
  - Le subjectivisme méthodologique
explanation: |
  La praxéologie constitue effectivement le troisième pilier méthodologique de l'école autrichienne. Elle représente l'étude systématique de l'action humaine et part d'un axiome irréfutable selon lequel l'homme agit. De cet axiome simple, les économistes autrichiens déduisent logiquement l'ensemble de leur théorie économique. Les autres options correspondent aux autres piliers : le subjectivisme méthodologique (premier pilier), l'individualisme méthodologique (deuxième pilier) et le dualisme méthodologique (quatrième pilier).

question: According to the Austrian school of thought, what is the main consequence of interest rate manipulation by central banks on economic structure?
answer: It distorts the price signal essential to economic coordination and leads to systemic malinvestment
wrong_answers:
  - "It improves price stability by enabling precise control of inflation over the long term"
  - It facilitates economic calculations by providing entrepreneurs with stable reference rates
  - "It optimizes resource allocation by directing investments towards priority sectors"
explanation: |
  The Austrian school demonstrates that the manipulation of interest rates by central banks distorts the fundamental price signal that enables spontaneous economic coordination. These interventions create artificial boom and bust cycles, provoke systemic malinvestment and prevent rational economic calculation. The other answers reflect an interventionist vision that runs counter to Austrian principles, which advocate free, unmanipulated prices.
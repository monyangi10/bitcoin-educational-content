question: Selon l'école autrichienne, quelle est la conséquence principale de la manipulation des taux d'intérêt par les banques centrales sur la structure économique?
answer: Elle fausse le signal prix essentiel à la coordination économique et provoque des malinvestissements systémiques
wrong_answers:
  - "Elle améliore la stabilité des prix en permettant un contrôle précis de l'inflation à long terme"
  - Elle facilite le calcul économique en offrant des taux de référence stables aux entrepreneurs
  - "Elle optimise l'allocation des ressources en dirigeant les investissements vers les secteurs prioritaires"
explanation: |
  L'école autrichienne démontre que la manipulation des taux d'intérêt par les banques centrales fausse le signal prix fondamental qui permet la coordination économique spontanée. Ces interventions créent des cycles artificiels de boom et de bust, provoquent des malinvestissements systémiques et empêchent le calcul économique rationnel. Les autres réponses reflètent une vision interventionniste contraire aux principes autrichiens qui prônent des prix libres et non manipulés.

question: Comment Carl Menger définissait-il la science économique dans ses Principes d'économie politique?
answer: Comme la théorie de la capacité de l'être humain à faire face à ses besoins
wrong_answers:
  - "Comme l'étude des mécanismes de formation des prix sur les marchés"
  - "Comme l'analyse statistique des comportements collectifs de consommation"
  - Comme la science de la distribution optimale des ressources rares
explanation: |
  Carl Menger définissait la science économique comme la théorie de la capacité de l'être humain à faire face à ses besoins, plaçant ainsi l'individu au centre de l'analyse. Cette définition s'oppose aux approches qui se concentrent uniquement sur les prix, les statistiques collectives ou la distribution des ressources, car Menger privilégiait une approche organique et atomistique centrée sur les choix individuels concrets.

question: What is Carl Menger's main criticism of the approach of classical and neoclassical economists?
answer: They favour an aggregate approach that overlooks the diversity of individual behaviours
wrong_answers:
  - "They put too much emphasis on psychological factors in their economic analyses"
  - "They overestimate the role of time and opportunity costs in economic decisions"
  - They consider that individual choices are too dynamic and changeable to be analyzed
explanation: |
  Menger criticizes the aggregate approach of classical and neoclassical economists, who divide society into large homogeneous groups (producers, workers, capitalists) and assume standardized behavior. This method ignores the real diversity of individual behavior and reduces human complexity to mathematical models. For Menger, this approach misses the point, as individual choices are based on subjective and dynamic considerations that can only be understood at the level of each individual.
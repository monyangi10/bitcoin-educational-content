question: What example does Böhm-Bawerk use to illustrate the concept of production detours?
answer: Making a fishing net before going fishing
wrong_answers:
  - "Building a factory to produce automobiles"
  - "Extracting minerals to make machines"
  - "Planting trees for timber"
explanation: |
  Böhm-Bawerk illustrates production detours with the simple example of fishing: rather than fishing directly with one's bare hands, one can first make a fishing net. This detour requires time and effort with no immediate payoff, but considerably boosts productivity later on. This example perfectly illustrates how investing time in the production of capital goods leads to superior results.
question: Quel exemple Böhm-Bawerk utilise-t-il pour illustrer le concept de détours de production?
answer: La fabrication d'un filet de pêche avant de pêcher
wrong_answers:
  - "La construction d'une usine pour produire des automobiles"
  - "L'extraction de minerais pour fabriquer des machines"
  - "La plantation d'arbres pour obtenir du bois de construction"
explanation: |
  Böhm-Bawerk illustre les détours de production avec l'exemple simple de la pêche : plutôt que de pêcher directement à mains nues, on peut d'abord fabriquer un filet de pêche. Ce détour nécessite du temps et des efforts sans consommation immédiate, mais augmente considérablement la productivité par la suite. Cet exemple démontre parfaitement comment investir du temps dans la production de biens d'équipement permet d'obtenir des résultats supérieurs.

question: Quel contexte historique spécifique a motivé les scolastiques espagnols du XVIe siècle à développer leurs théories économiques libérales?
answer: L'afflux d'or des Amériques et l'expansion du commerce international de l'empire espagnol à son apogée
wrong_answers:
  - La montée du protestantisme et la nécessité de défendre la doctrine économique catholique contre Luther
  - "Les crises financières récurrentes causées par les guerres contre l'Empire ottoman en Méditerranée"
  - "L'influence croissante des guildes marchandes qui remettaient en question l'autorité de l'Église"
explanation: |
  Les scolastiques espagnols développaient leurs théories dans le contexte spécifique de l'empire espagnol à son apogée, confrontés aux réalités nouvelles du commerce international croissant et de l'afflux d'or américain. Ils cherchaient à concilier la théologie catholique avec ces phénomènes économiques inédits, ce qui les amena à élaborer une vision libérale de l'échange, distincte du mercantilisme dominant de l'époque.

question: What specific historical context motivated 16th-century Spanish scholastics to develop their liberal economic theories?
answer: The influx of gold from the Americas and the expansion of international trade at the height of the Spanish empire
wrong_answers:
  - The rise of Protestantism and the need to defend Catholic economic doctrine against Luther
  - "The recurring financial crises caused by the wars against the Ottoman Empire in the Mediterranean"
  - "The growing influence of merchant guilds that challenged the authority of the Church"
explanation: |
  The Spanish scholastics developed their theories in the specific context of the Spanish empire at its height, faced with the new realities of growing international trade and the influx of American gold. They sought to reconcile Catholic theology with these unprecedented economic phenomena, which led them to develop a liberal vision of exchange, distinct from the dominant mercantilism of the time.
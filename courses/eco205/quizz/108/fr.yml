question: Selon Menger, quelle situation économique rend nécessaire l'émergence spontanée d'intermédiaires d'échange dans une économie qui dépasse le cercle restreint?
answer: L'impossibilité de satisfaire la double coïncidence des besoins dans le troc direct
wrong_answers:
  - La manipulation des prix par les autorités centrales qui faussent les échanges
  - "L'accumulation excessive de marchandises par les agents les plus riches"
  - La standardisation forcée des biens par les institutions gouvernementales
explanation: |
  Menger explique que dans une économie de troc étendue, les agents économiques doivent trouver des partenaires ayant exactement les biens dont ils ont besoin, créant une condition de double coïncidence des besoins. Cette contrainte devient impossible à satisfaire au-delà d'un cercle d'échange restreint, poussant naturellement vers l'adoption de certains biens comme intermédiaires privilégiés. Les autres options évoquent des interventions externes ou des problèmes de distribution qui ne correspondent pas à l'analyse autrichienne de l'émergence spontanée de la monnaie.

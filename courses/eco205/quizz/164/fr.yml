question: Quelle était la position de Juan de Mariana concernant la capacité du gouvernement à organiser la société civile par des ordres coercitifs?
answer: Il considérait cela comme impossible en raison du manque d'information gouvernementale, comparant cette situation à un aveugle qui voudrait guider celui qui voit
wrong_answers:
  - "Il soutenait que le gouvernement pouvait efficacement organiser la société grâce à sa position privilégiée d'observation des échanges commerciaux"
  - "Il préconisait une organisation gouvernementale limitée aux seuls secteurs où l'information était facilement accessible aux autorités publiques"
  - "Il argumentait que seule l'Église, guidée par la providence divine, pouvait légitimement organiser la société par des ordres coercitifs"
explanation: |
  Juan de Mariana anticipait la critique autrichienne de la planification centrale en démontrant l'impossibilité pour un gouvernement d'organiser efficacement la société civile. Sa métaphore de l'aveugle qui veut guider celui qui voit illustre parfaitement le problème informationnel : les autorités publiques ne disposent pas de l'information dispersée nécessaire pour prendre des décisions économiques rationnelles. Cette analyse préfigure directement l'argument de Mises sur l'impossibilité du calcul économique socialiste.

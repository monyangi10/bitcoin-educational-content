question: Selon l'approche autrichienne, qu'est-ce qui explique principalement que les individus valorisent davantage un bien présent qu'un bien futur identique?
answer: L'incertitude fondamentale de l'avenir
wrong_answers:
  - La différence de qualité entre les biens présents et futurs
  - "L'inflation qui diminue la valeur des biens dans le temps"
  - La rareté croissante des ressources disponibles
explanation: |
  L'incertitude fondamentale de l'avenir est la raison principale pour laquelle les individus préfèrent naturellement les biens présents. Nous ignorons si nous serons encore vivants, quelles circonstances se présenteront ou quels besoins émergeront. Cette incertitude irréductible explique le phénomène d'actualisation où un euro aujourd'hui vaut plus qu'un euro demain, indépendamment de l'inflation ou de la rareté des ressources.

question: According to the Austrian approach, what are the two fundamental mechanisms that enable the market process to self-regulate?
answer: Economic calculation based on free prices and the law of profit and loss that rewards entrepreneurial action
wrong_answers:
  - "Centralized planning and government regulation to guide resource allocation"
  - "Automatic equilibrium of supply and demand forces and rational utility maximization"
  - Coordination by public institutions and equitable redistribution of the wealth produced
explanation: |
  According to Mises and Hayek, market self-regulation rests on two pillars. Firstly, economic calculation enables the optimal allocation of scarce resources, thanks to voluntary exchanges and free prices that transmit dispersed information. Secondly, the law of profit and loss sanctions or rewards entrepreneurs, naturally directing capital towards its best uses. These mechanisms create an "economic democracy" in which every expense steers production without central intervention.
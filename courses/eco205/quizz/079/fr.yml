question: Selon l'approche autrichienne, quels sont les deux mécanismes fondamentaux qui permettent l'autorégulation du processus de marché?
answer: Le calcul économique basé sur les prix libres et la loi des profits et pertes qui récompense l'action entrepreneuriale
wrong_answers:
  - "La planification centralisée et la régulation gouvernementale qui orientent l'allocation des ressources"
  - "L'équilibre automatique des forces de l'offre et de la demande et la maximisation rationnelle des utilités"
  - La coordination par les institutions publiques et la redistribution équitable des richesses produites
explanation: |
  L'autorégulation du marché repose sur deux piliers selon Mises et Hayek. D'abord, le calcul économique permet l'allocation optimale des ressources rares grâce aux échanges volontaires et aux prix libres qui transmettent l'information dispersée. Ensuite, la loi des profits et pertes sanctionne ou récompense les entrepreneurs, dirigeant naturellement les capitaux vers leurs meilleurs usages. Ces mécanismes créent une 'démocratie économique' où chaque dépense oriente la production sans intervention centrale.

question: Quel est le premier pilier méthodologique de l'école autrichienne d'économie?
answer: Le subjectivisme méthodologique
wrong_answers:
  - "L'objectivisme méthodologique"
  - Le collectivisme méthodologique
  - Le matérialisme méthodologique
explanation: |
  Le subjectivisme méthodologique constitue effectivement le premier pilier méthodologique de l'école autrichienne. Ce principe rompt avec les théories objectives de la valeur de l'économie classique en affirmant que la valeur émerge des évaluations subjectives des individus selon leur contexte précis. L'objectivisme méthodologique est incorrect car les autrichiens rejettent justement cette approche. Le collectivisme méthodologique est faux car l'école autrichienne défend au contraire l'individualisme méthodologique. Le matérialisme méthodologique n'est pas un concept de cette école économique.

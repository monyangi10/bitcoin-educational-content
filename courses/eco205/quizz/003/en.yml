question: What is the first methodological pillar of the Austrian school of economics?
answer: Methodological subjectivism
wrong_answers:
  - "Methodological objectivism"
  - Methodological collectivism
  - Methodological materialism
explanation: |
  Methodological subjectivism is indeed the first methodological pillar of the Austrian school. This principle breaks with the objective theories of value of classical economics by asserting that value emerges from the subjective evaluations of individuals according to their precise context. Methodological objectivism is incorrect, because Austrians reject this very approach. Methodological collectivism is wrong, because the Austrian school defends methodological individualism. Methodological materialism is not a concept of this economic school.
question: Who explicitly developed the concept of opportunity costs after Carl Menger?
answer: Friedrich von Wieser
wrong_answers:
  - Léon Walras
  - Adam Smith
  - David Ricardo
explanation: |
  Friedrich von Wieser explicitly developed the concept of opportunity costs after the work of Carl Menger. He demonstrated that the value of a good is closely linked to the utility of the alternative sacrificed when making an economic choice. Walras was a neoclassical economist who favored an aggregate approach, while Smith and Ricardo were classical economists who divided society into large, rigid units - an approach criticized by the Austrian school.
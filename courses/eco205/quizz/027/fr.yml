question: Qui a développé de manière explicite le concept de coûts d'opportunité après Carl Menger?
answer: Friedrich von Wieser
wrong_answers:
  - Léon Walras
  - Adam Smith
  - David Ricardo
explanation: |
  Friedrich von Wieser a développé explicitement le concept de coûts d'opportunité après les travaux de Carl Menger. Il a démontré que la valeur d'un bien est étroitement liée à l'utilité de l'alternative sacrifiée lors d'un choix économique. Walras était un économiste néoclassique qui privilégiait l'approche agrégée, tandis que Smith et Ricardo étaient des économistes classiques qui divisaient la société en grands ensembles rigides, approche critiquée par l'école autrichienne.

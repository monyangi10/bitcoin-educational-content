question: Quelles sont les trois conditions nécessaires et indissociables pour permettre la découverte des prix selon l'école autrichienne?
answer: La propriété privée, l'échange volontaire et les prix libres
wrong_answers:
  - "Les coûts marginaux, l'utilité marginale et la planification centrale"
  - La valeur travail, les coûts de production et la régulation étatique
  - "L'offre, la demande et l'intervention gouvernementale"
explanation: |
  Selon l'école autrichienne, ces trois éléments forment un système indissociable : sans propriété privée, personne ne peut véritablement échanger ; sans échange volontaire, les prix ne reflètent pas les valorisations réelles ; sans prix libres, la coordination économique devient impossible. Les autres options reflètent des approches mainstream ou interventionnistes que rejette l'école autrichienne.

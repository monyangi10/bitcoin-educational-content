question: What are the three necessary and inseparable conditions for price discovery according to the Austrian school?
answer: Private property, voluntary exchange and free prices
wrong_answers:
  - "Marginal costs, marginal utility and central planning"
  - Labor value, production costs and state regulation
  - "Supply, demand and government intervention"
explanation: |
  According to the Austrian school, these three elements form an indissociable system: without private property, no one can truly exchange; without voluntary exchange, prices do not reflect real valuations; without free prices, economic coordination becomes impossible. The other options reflect mainstream or interventionist approaches that the Austrian school rejects.
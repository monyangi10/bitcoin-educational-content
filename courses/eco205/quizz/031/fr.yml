question: Qui a posé les bases de l'approche praxéologique avant que Ludwig von Mises ne formalise l'axiome de l'action humaine?
answer: Carl Menger dans ses Principes d'économie politique
wrong_answers:
  - "Eugen von Böhm-Bawerk dans ses théories sur l'intérêt"
  - Friedrich von Wieser dans ses travaux sur la valeur
  - "Murray Rothbard dans ses écrits sur l'anarcho-capitalisme"
explanation: |
  Carl Menger a effectivement posé les bases de cette approche dans ses Principes d'économie politique, définissant la science économique comme la théorie de la capacité humaine à faire face aux besoins. Il développa une approche organique et atomistique centrée sur l'individu, contrairement à l'école historique allemande. Les autres réponses, bien qu'elles mentionnent des économistes autrichiens importants, ne correspondent pas aux précurseurs historiques de la praxéologie tels que décrits dans le contenu.

question: Who laid the foundations of the praxeological approach before Ludwig von Mises formalized the axiom of human action?
answer: Carl Menger in his Principles of Political Economy
wrong_answers:
  - "Eugen von Böhm-Bawerk's theories on interest"
  - Friedrich von Wieser in his work on value
  - "Murray Rothbard in his writings on anarcho-capitalism"
explanation: |
  Carl Menger laid the foundations for this approach in his Principles of Political Economy, defining economics as the theory of human capacity to meet needs. He developed an organic, atomistic approach centered on the individual, in contrast to the German historical school. The other answers, while mentioning important Austrian economists, do not correspond to the historical precursors of praxeology as described in the content.
question: In the context of the marginalist revolution of 1871, why did the German Empire politically favor Schmoller's historical school over universal economic theories?
answer: Historicism legitimized the organizational superiority of the German empire over British liberalism by denying the existence of universal economic laws
wrong_answers:
  - "The historical school made it possible to scientifically justify the adoption of Marxist materialism as the empire's official economic doctrine."
  - Schmoller had demonstrated mathematically that German empirical methods were more accurate than Austrian deductive theories
  - "The contextualist approach of the historical school facilitated the integration of marginalist theories into the German imperial economic system."
explanation: |
  The German empire, characterized by its nationalism and statism after 1870, found perfect ideological justification in Schmoller's historicism. By denying the existence of universal economic laws and favoring a contextualist approach, this school made it possible to present the German collectivist and administrative model as superior to British liberalism, without having to submit to general economic principles that might have called this supposed superiority into question.
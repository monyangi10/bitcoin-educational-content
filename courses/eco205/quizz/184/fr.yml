question: Dans le contexte de la révolution marginaliste de 1871, pourquoi l'empire allemand favorisait-il politiquement l'école historique de Schmoller plutôt que les théories économiques universelles?
answer: L'historicisme légitimait la supériorité organisationnelle de l'empire allemand face au libéralisme britannique en niant l'existence de lois économiques universelles
wrong_answers:
  - "L'école historique permettait de justifier scientifiquement l'adoption du matérialisme marxiste comme doctrine économique officielle de l'empire"
  - Schmoller avait démontré mathématiquement que les méthodes empiriques allemandes étaient plus précises que les théories déductives autrichiennes
  - "L'approche contextualiste de l'école historique facilitait l'intégration des théories marginalistes dans le système économique impérial allemand"
explanation: |
  L'empire allemand, caractérisé par son nationalisme et son étatisme après 1870, trouvait dans l'historicisme de Schmoller une justification idéologique parfaite. En niant l'existence de lois économiques universelles et en privilégiant une approche contextualiste, cette école permettait de présenter le modèle collectiviste et administratif allemand comme supérieur au libéralisme britannique, sans avoir à se soumettre à des principes économiques généraux qui auraient pu remettre en question cette supériorité supposée.

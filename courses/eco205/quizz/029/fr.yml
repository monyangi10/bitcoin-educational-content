question: Selon la praxéologie, quelle est la nature fondamentale de l'action humaine?
answer: Elle est délibérée et orientée vers un but précis
wrong_answers:
  - "Elle est spontanée et dépourvue d'objectif particulier"
  - Elle est déterminée par des facteurs externes uniquement
  - Elle est le résultat de calculs mathématiques complexes
explanation: |
  La praxéologie définit l'action humaine comme étant délibérée et orientée vers un but précis, permettant à l'individu d'atteindre des fins subjectives par des méthodes soigneusement sélectionnées. Cette conception intentionnelle et rationnelle de l'action constitue le fondement même de l'axiome de l'action humaine. Les autres réponses contredisent cette définition fondamentale en présentant l'action comme non-intentionnelle, déterminée uniquement de l'extérieur, ou réductible à des équations mathématiques, ce qui va à l'encontre de l'approche autrichienne.

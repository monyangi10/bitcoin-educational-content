question: Selon la théorie autrichienne des cycles économiques, pourquoi l'expansion monétaire crée-t-elle une illusion d'abondance de capital qui ne correspond pas à la réalité économique?
answer: Parce que créer de la monnaie ne crée pas de ressources matérielles, humaines et techniques supplémentaires qui restent limitées
wrong_answers:
  - "Parce que l'expansion monétaire augmente artificiellement la vélocité de circulation de la monnaie sans créer de valeur"
  - Parce que la nouvelle monnaie dilue la valeur des investissements existants et réduit mécaniquement le capital disponible
  - "Parce que l'expansion monétaire crée une déconnexion entre les prix nominaux et les coûts de production réels"
explanation: |
  La théorie autrichienne souligne que l'expansion monétaire ne fait qu'augmenter la quantité de monnaie en circulation, donnant l'illusion d'une abondance de capital. Cependant, comme l'explique Mises, imprimer de l'argent n'imprime pas des biens rares. Les ressources réelles (matérielles, humaines, techniques) demeurent limitées malgré l'augmentation de liquidités. Cette illusion pousse les entrepreneurs à entreprendre plus de projets qu'il n'y a de ressources disponibles, créant inévitablement des malinvestissements et des déséquilibres structurels dans l'économie.

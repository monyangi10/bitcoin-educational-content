question: Comment Louis de Molina conceptualisait-il la concurrence dans son traité de 1592, et en quoi cette vision différait-elle des approches économiques dominantes de son époque?
answer: Comme un processus dynamique de rivalité entre acheteurs et vendeurs, s'opposant aux visions statiques et mercantilistes dominantes
wrong_answers:
  - "Comme un état d'équilibre parfait mathématiquement défini, conforme aux principes mercantilistes de l'époque"
  - "Comme une structure monopolistique contrôlée par l'État, alignée sur la doctrine économique thomiste traditionnelle"
  - "Comme un système de prix fixes déterminés par l'Église, respectant les principes de la scolastique médiévale"
explanation: |
  Molina a révolutionné la conception économique en développant une vision dynamique de la concurrence comme processus vivant de rivalité, anticipant les théories de Mises et Hayek. Il s'opposait aux visions statiques de la valeur et au mercantilisme dominant, comprenant que les marchés sont des processus constants d'ajustement plutôt que des états d'équilibre fixes.

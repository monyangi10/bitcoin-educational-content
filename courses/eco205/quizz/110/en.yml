question: Why is voluntary exchange possible between two individuals according to the Austrian theory of price formation?
answer: Because the two parties value the goods exchanged differently, each preferring what they receive to what they give
wrong_answers:
  - Because both parties attribute an identical objective value to the goods exchanged, based on their production cost
  - "Because prices are set by the equality between the marginal utility and the marginal cost of each traded good."
  - "Because the State guarantees that each exchange respects a strict equivalence between the values of the goods exchanged"
explanation: |
  Voluntary exchange is only possible because of the difference in subjective valuation between the parties. If the baker and the buyer valued the baguette and the money in the same way, no exchange would take place. It is precisely this discrepancy in value judgments that makes the exchange mutually beneficial. The other answers reflect objective or interventionist conceptions that run counter to Austrian theory, which insists on the subjectivity of individual valuations.
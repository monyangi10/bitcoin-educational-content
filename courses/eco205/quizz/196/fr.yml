question: Pourquoi l'école autrichienne considère-t-elle que l'offre fixe de 21 millions d'unités de Bitcoin est cruciale pour le fonctionnement optimal du système économique?
answer: Elle empêche la distorsion des préférences temporelles et permet aux prix d'exprimer authentiquement les signaux économiques
wrong_answers:
  - Elle garantit une appréciation constante de la valeur et assure des rendements prévisibles aux investisseurs
  - Elle facilite la planification économique centrale en fournissant une base monétaire stable et contrôlable
  - Elle permet aux gouvernements de maintenir un contrôle indirect sur la politique monétaire via la régulation
explanation: |
  Selon l'école autrichienne, l'offre fixe de Bitcoin est essentielle car elle préserve l'intégrité des signaux de prix. Sans manipulation de l'offre monétaire, les taux d'intérêt reflètent les vraies préférences temporelles des individus, permettant une coordination économique authentique. Les autres options sont incorrectes : l'école autrichienne rejette la planification centrale, ne garantit pas d'appréciation automatique, et s'oppose au contrôle gouvernemental sur la monnaie.

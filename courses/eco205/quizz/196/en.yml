question: Why does the Austrian school consider the fixed supply of 21 million Bitcoin units to be crucial for the optimal functioning of the economic system?
answer: It prevents the distortion of temporal preferences and allows prices to genuinely express economic signals
wrong_answers:
  - It guarantees steady value appreciation and predictable returns for investors
  - It facilitates central economic planning by providing a stable and controllable monetary base
  - It allows governments to maintain indirect control over monetary policy through regulation
explanation: |
  According to the Austrian school of thought, the fixed supply of Bitcoin is essential because it preserves the integrity of price signals. Without manipulation of the money supply, interest rates reflect the true time preferences of individuals, enabling genuine economic coordination. The other options are incorrect: the Austrian school rejects central planning, does not guarantee automatic appreciation, and opposes government control over money.
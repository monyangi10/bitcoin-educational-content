question: What concept refers to an individual's ability to identify goods as means to achieve his or her goals?
answer: Causality
wrong_answers:
  - Sequentiality
  - "Updating"
  - Time preference
explanation: |
  Causality refers specifically to an individual's ability to identify goods as means to an end. It implies that the individual knows how to interact with his environment and transform goods into means to achieve his ends. Sequentiality concerns the order of actions in time, discounting refers to the difference in value between a present and future good, and temporal preference expresses the natural preference for the present over the future.
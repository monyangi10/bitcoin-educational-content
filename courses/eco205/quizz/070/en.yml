question: Why is opportunity cost often harder to calculate at the time of action than afterwards?
answer: Because economic action is speculation based on imperfect and constantly changing information
wrong_answers:
  - Because individuals lack the economic training to properly evaluate the available alternatives
  - Because emotions have a negative impact on economic agents' capacity for rational calculation
  - "Because opportunity costs vary according to economic cycles and monetary inflation."
explanation: |
  The text clearly explains that opportunity cost is easier to calculate a posteriori than to predict at the moment of action, because all economic action is speculation based on imperfect and constantly changing information. This difficulty stems not from a lack of training, emotional influences or macroeconomic factors, but from the very nature of the information available at the moment of decision.
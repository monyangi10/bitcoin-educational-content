question: In Austrian monetary theory, what primarily determines whether a good becomes money on the free market?
answer: Superior liquidity perceived by market participants to facilitate trading
wrong_answers:
  - Official recognition by monetary authorities and banking institutions
  - Its intrinsic ability to maintain a stable value in the face of economic fluctuations
  - Production controlled by centralized bodies to guarantee universal acceptance
explanation: |
  According to the Austrian perspective, a good becomes money because it is spontaneously selected by economic players for its superior liquidity, i.e. its ability to be easily exchanged. This natural market selection precedes any institutional recognition. The other options reflect a mainstream approach in which the state plays a central role, which contradicts the Austrian vision of a currency emerging spontaneously from the free market process.
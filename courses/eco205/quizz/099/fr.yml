question: Dans la théorie monétaire autrichienne, qu'est-ce qui détermine principalement qu'un bien devienne monnaie sur le marché libre?
answer: Sa liquidité supérieure perçue par les participants du marché pour faciliter les échanges
wrong_answers:
  - Sa reconnaissance officielle par les autorités monétaires et les institutions bancaires
  - Sa capacité intrinsèque à maintenir une valeur stable face aux fluctuations économiques
  - Sa production contrôlée par des organismes centralisés garantissant son acceptation universelle
explanation: |
  Selon la perspective autrichienne, un bien devient monnaie parce qu'il est spontanément sélectionné par les acteurs économiques pour sa liquidité supérieure, c'est-à-dire sa capacité à être facilement échangé. Cette sélection naturelle du marché précède toute reconnaissance institutionnelle. Les autres options reflètent une approche mainstream où l'État joue un rôle central, ce qui contredit la vision autrichienne d'une monnaie émergeant spontanément du processus de marché libre.

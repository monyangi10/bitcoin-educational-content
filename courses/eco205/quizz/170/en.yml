question: What was the main analytical method used by Spanish scholastics to develop their economic theories in the 16th century?
answer: They sought to reconcile Catholic theology with the realities of international trade and the influx of gold from the Americas
wrong_answers:
  - "They applied Aristotelian mathematical methods to the economic phenomena of the Spanish empire"
  - They empirically studied price fluctuations in European markets in order to deduce general laws
  - They analyzed ancient Greek and Roman texts to adapt their economic principles to the modern context
explanation: |
  The Spanish scholastics developed their economic theory in the specific context of the Spanish empire at its height. Their approach was to reconcile the principles of Catholic theology with the new economic realities of their time: the expansion of international trade and the massive influx of gold from the American colonies. This theological-practical approach set them apart from other analytical methods, and enabled them to develop innovative concepts such as the subjectivity of value and the dynamic conception of the market.
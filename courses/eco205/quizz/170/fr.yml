question: Quelle était la principale méthode d'analyse utilisée par les scolastiques espagnols pour développer leurs théories économiques au XVIe siècle?
answer: Ils cherchaient à concilier la théologie catholique avec les réalités du commerce international et l'afflux d'or des Amériques
wrong_answers:
  - "Ils appliquaient les méthodes mathématiques aristotéliciennes aux phénomènes économiques de l'empire espagnol"
  - Ils étudiaient empiriquement les fluctuations des prix dans les marchés européens pour en déduire des lois générales
  - Ils analysaient les textes antiques grecs et romains pour adapter leurs principes économiques au contexte moderne
explanation: |
  Les scolastiques espagnols développaient leur théorie économique dans le contexte spécifique de l'empire espagnol à son apogée. Leur démarche consistait à concilier les principes de la théologie catholique avec les nouvelles réalités économiques de leur époque : l'expansion du commerce international et l'afflux massif d'or provenant des colonies américaines. Cette approche théologique-pratique les distinguait des autres méthodes d'analyse et leur permettait de développer des concepts novateurs comme la subjectivité de la valeur et la conception dynamique du marché.

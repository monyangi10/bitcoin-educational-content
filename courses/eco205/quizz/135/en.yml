question: According to Austrian theory, why is it imperative for harmonious economic development that the interest rate accurately reflect people's real time preferences?
answer: Because only a genuine interest rate can correctly adapt the structure of capital to real needs and avoid destructive economic cycles
wrong_answers:
  - Because it automatically guarantees constant, predictable economic growth with no price fluctuations
  - "Because it allows central banks to better control inflation and stabilize financial markets."
  - Because it ensures an egalitarian distribution of wealth among all of society's economic players
explanation: |
  The correct answer underlines the fundamental mechanism of intertemporal coordination. When the interest rate reflects true temporal preferences, the productive structure naturally adapts to real needs, avoiding the distortions that create business cycles. The other answers are wrong, because they evoke non-existent automatic guarantees, the role of central banks (contrary to the Austrian vision), or redistributive objectives that are irrelevant in this theoretical context.
question: According to the Austrian school of economics, how should the market be designed?
answer: As a dynamic process of discovery and ongoing coordination
wrong_answers:
  - "Like a static, perfectly predictable state of equilibrium"
  - "As an automatic mechanism regulated by the State"
  - As a fixed institution controlled by central banks
explanation: |
  The Austrian school sees the market not as a static state of equilibrium, but as a dynamic process of discovery and ongoing coordination. From this perspective, the entrepreneur plays a central role as a discoverer of opportunities and coordinator of information dispersed throughout the economy. This vision is opposed to static or dirigiste conceptions of the market.
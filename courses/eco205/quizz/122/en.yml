question: What concept does Hayek use to describe the spontaneous social organization that emerges thanks to the price system in a free market?
answer: Extended order
wrong_answers:
  - "The overall balance"
  - Planned coordination
  - "The Pareto optimum"
explanation: |
  Hayek uses the term "extended order" to designate the spontaneous social order that human beings have naturally developed to coordinate themselves efficiently in a free market. This order emerges without central planning, thanks to the price system which acts as a communication network. General equilibrium is a concept of mainstream economics, planned coordination implies central intervention contrary to Hayekian thinking, and the Pareto optimum concerns allocative efficiency but does not describe spontaneous social order.
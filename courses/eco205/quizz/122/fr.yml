question: Quel concept Hayek utilise-t-il pour décrire l'organisation sociale spontanée qui émerge grâce au système des prix dans un marché libre ?
answer: L'ordre étendu
wrong_answers:
  - "L'équilibre général"
  - La coordination planifiée
  - "L'optimum de Pareto"
explanation: |
  Hayek utilise le terme "ordre étendu" pour désigner cet ordre social spontané que les êtres humains ont naturellement développé pour se coordonner efficacement dans un marché libre. Cet ordre émerge sans planification centrale grâce au système des prix qui agit comme un réseau de communication. L'équilibre général est un concept de l'économie mainstream, la coordination planifiée implique une intervention centrale contraire à la pensée hayékienne, et l'optimum de Pareto concerne l'efficacité allocative mais ne décrit pas l'ordre social spontané.

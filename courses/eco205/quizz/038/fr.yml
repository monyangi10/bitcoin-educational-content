question: Que désigne le terme 'scientisme' selon Friedrich Hayek et l'école autrichienne ?
answer: Une pseudo-science qui imite les apparences de la rigueur scientifique sans en posséder la substance
wrong_answers:
  - Une méthode scientifique rigoureuse adaptée spécifiquement aux sciences économiques et sociales
  - "L'application correcte des mathématiques et de la statistique à l'étude des phénomènes humains"
  - Une approche qui combine harmonieusement les méthodes des sciences naturelles et humaines
explanation: |
  Selon Hayek, le scientisme consiste à appliquer mécaniquement les méthodes des sciences naturelles aux sciences humaines, sans tenir compte de la différence fondamentale entre les objets étudiés. Cette approche crée une illusion de scientificité mais passe à côté de l'essentiel : l'action humaine intentionnelle et créatrice. Les autres réponses décrivent des approches positives ou légitimes, alors que le scientisme est critiqué comme une fausse science.

question: Selon Menger, quelle conséquence subit un agent économique qui refuse d'adopter la monnaie émergente utilisée par les agents les plus performants?
answer: Il s'exclut progressivement du marché et perd sa capacité à participer aux échanges
wrong_answers:
  - Il devient automatiquement un entrepreneur perspicace en créant sa propre alternative monétaire
  - "Il bénéficie d'un avantage concurrentiel temporaire grâce à sa différenciation sur le marché"
  - Il peut maintenir sa position économique en se spécialisant dans le troc direct uniquement
explanation: |
  Menger explique que les individus qui n'adoptent pas la nouvelle monnaie émergente s'excluent progressivement du marché. Cette exclusion se manifeste par une perte de temps à essayer d'écouler leur marchandise moins échangeable et une perte progressive de leur capacité à participer aux échanges. L'intérêt personnel pousse donc chaque agent à adopter la monnaie commune pour éviter cette marginalisation économique, créant une véritable course contre la montre.

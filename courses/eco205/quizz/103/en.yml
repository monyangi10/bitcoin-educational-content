question: According to Menger, what are the consequences for an economic agent who refuses to adopt the emerging currency used by the most efficient agents?
answer: It gradually excludes itself from the market and loses its ability to participate in trade
wrong_answers:
  - He automatically becomes a shrewd entrepreneur by creating his own monetary alternative
  - "It enjoys a temporary competitive advantage thanks to its market differentiation"
  - It can maintain its economic position by specializing in direct bartering only
explanation: |
  Menger explains that individuals who do not adopt the new emerging currency gradually exclude themselves from the market. This exclusion manifests itself in a loss of time trying to sell their less-exchangeable goods, and a progressive loss of their ability to participate in exchanges. Self-interest therefore drives each agent to adopt the common currency to avoid this economic marginalization, creating a veritable race against time.
question: Comment les économistes autrichiens conçoivent-ils le temps en économie?
answer: Comme une réalité purement individuelle et subjective découlant de l'action humaine
wrong_answers:
  - Comme un phénomène continu, homogène et mesurable servant à la modélisation
  - Comme une variable objective permettant de calculer les cycles économiques
  - Comme une dimension collective déterminée par les marchés financiers
explanation: |
  L'approche autrichienne propose une conception radicalement différente du temps par rapport aux modèles néoclassiques. Pour les Autrichiens, le temps découle directement de l'axiome de l'action humaine et constitue une réalité purement individuelle et subjective. Cette vision s'oppose aux modèles néoclassiques qui traitent le temps comme un phénomène continu, homogène et mesurable, le réduisant à une simple variable objective au service de la modélisation mathématique.

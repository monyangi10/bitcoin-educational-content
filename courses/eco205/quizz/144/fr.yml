question: Quelle est la principale différence entre le financement par assouplissement quantitatif et le financement traditionnel par l'épargne du point de vue de la coordination économique?
answer: L'assouplissement quantitatif crée de la monnaie sans épargne préalable, déconnectant les signaux de prix de la réalité économique
wrong_answers:
  - "L'assouplissement quantitatif permet une meilleure allocation des ressources en contournant les contraintes de l'épargne limitée"
  - "L'assouplissement quantitatif reflète plus fidèlement les besoins de liquidité réels de l'économie que l'épargne traditionnelle"
  - "L'assouplissement quantitatif coordonne mieux l'offre et la demande de capital en éliminant les rigidités du marché de l'épargne"
explanation: |
  La réponse correcte identifie le problème fondamental soulevé par la théorie autrichienne : l'assouplissement quantitatif crée artificiellement de la monnaie sans qu'il y ait d'épargne réelle correspondante, faussant ainsi les signaux de prix essentiels au marché. Les mauvaises réponses suggèrent incorrectement que cette création monétaire améliore la coordination économique, alors que selon l'analyse présentée, elle la détériore en créant une déconnexion entre les signaux reçus par les entrepreneurs et les préférences temporelles réelles des consommateurs.

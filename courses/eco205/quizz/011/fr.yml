question: Quel paradoxe a révélé une faille fondamentale dans la théorie de la valeur travail d'Adam Smith?
answer: Le paradoxe du diamant et de l'eau
wrong_answers:
  - Le paradoxe du castor et de la dinde
  - "Le paradoxe de l'ordinateur et du travail"
  - "Le paradoxe de la rareté et de l'utilité"
explanation: |
  Le paradoxe du diamant et de l'eau formulé par Adam Smith révélait l'insuffisance de la théorie de la valeur travail. Ce paradoxe questionnait pourquoi l'eau, essentielle à la vie, possède généralement une valeur faible, tandis que le diamant commande un prix élevé, et pourquoi dans le désert l'eau devient plus précieuse que le diamant. Les autres options sont incorrectes : l'exemple du castor et de la dinde illustrait la théorie de Ricardo mais n'était pas un paradoxe problématique pour cette théorie.

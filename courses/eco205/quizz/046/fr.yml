question: Selon l'approche autrichienne, pourquoi les individus préfèrent-ils naturellement la jouissance présente à la jouissance future d'un même bien?
answer: À cause de l'incertitude fondamentale de l'avenir qui rend un bien présent toujours plus précieux
wrong_answers:
  - Parce que les biens se détériorent naturellement avec le temps et perdent de leur valeur
  - Car les individus sont naturellement impatients et manquent de discipline personnelle
  - "En raison de l'inflation qui diminue automatiquement la valeur des biens futurs"
explanation: |
  La réponse correcte reflète le concept central de préférence temporelle développé par Ludwig von Mises. L'incertitude de l'avenir - nous ignorons si nous serons vivants, quels besoins émergeront, quelles circonstances se présenteront - explique pourquoi un bien présent vaut toujours plus qu'un bien futur identique. Les autres réponses sont incorrectes car elles invoquent des facteurs externes (détérioration, inflation) ou des traits de caractère (impatience) plutôt que cette incertitude irréductible qui constitue le fondement théorique de la préférence temporelle.

question: Quel économiste a fondé l'école autrichienne d'économie en 1871 avec la publication des Principes d'économie politique?
answer: Carl Menger
wrong_answers:
  - Ludwig von Mises
  - Friedrich Hayek
  - Eugen von Böhm-Bawerk
explanation: |
  Carl Menger est effectivement le fondateur de l'école autrichienne d'économie. Il a publié ses « Principes d'économie politique » en 1871 à Vienne, marquant ainsi la naissance officielle de cette école de pensée économique. Ludwig von Mises et Friedrich Hayek sont certes des figures importantes de l'école autrichienne, mais ils appartiennent à des générations ultérieures. Eugen von Böhm-Bawerk fait partie de la deuxième génération d'économistes autrichiens, mais n'est pas le fondateur de l'école.

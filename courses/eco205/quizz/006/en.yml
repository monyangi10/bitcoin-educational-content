question: Which economist founded the Austrian school of economics in 1871 with the publication of Principles of Political Economy?
answer: Carl Menger
wrong_answers:
  - Ludwig von Mises
  - Friedrich Hayek
  - Eugen von Böhm-Bawerk
explanation: |
  Carl Menger was the founder of the Austrian school of economics. He published his "Principles of Political Economy" in Vienna in 1871, marking the official birth of this school of economic thought. Ludwig von Mises and Friedrich Hayek are certainly important figures in the Austrian school, but they belong to later generations. Eugen von Böhm-Bawerk belongs to the second generation of Austrian economists, but is not the school's founder.
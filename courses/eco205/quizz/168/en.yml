question: What fundamental methodological innovation distinguished the theoretical approach of the Spanish Salamanca scholastics from other schools of economic thought of their day?
answer: They reconciled Thomistic Catholic theology with an analysis of the concrete economic realities of international trade
wrong_answers:
  - "They developed sophisticated mathematical models to calculate equilibrium market prices"
  - They applied Aristotelian principles exclusively, without reference to contemporary business practices
  - "They based their analysis on pure empirical observation to the exclusion of all philosophical or religious considerations."
explanation: |
  The approach of the Spanish scholastics was revolutionary, as it rigorously combined the Thomistic tradition with the analysis of real economic phenomena in the Spanish empire. This synthesis enabled them to develop concepts such as the subjectivity of value and dynamic competition, while remaining consistent with their theological framework. The other options are incorrect, as they did not use formal mathematics, did not limit themselves to Aristotle, and explicitly integrated philosophical and religious considerations into their economic analysis.
question: Quelle innovation méthodologique fondamentale distinguait l'approche théorique des scolastiques espagnols de Salamanque des autres écoles de pensée économique de leur époque?
answer: Ils conciliaient la théologie catholique thomiste avec l'analyse des réalités économiques concrètes du commerce international
wrong_answers:
  - "Ils développaient des modèles mathématiques sophistiqués pour calculer les prix d'équilibre des marchés"
  - Ils appliquaient exclusivement les principes aristotéliciens sans référence aux pratiques commerciales contemporaines
  - "Ils fondaient leur analyse sur l'observation empirique pure en excluant toute considération philosophique ou religieuse"
explanation: |
  L'approche des scolastiques espagnols était révolutionnaire car elle combinait rigoureusement la tradition thomiste avec l'analyse des phénomènes économiques réels de l'empire espagnol. Cette synthèse leur permettait de développer des concepts comme la subjectivité de la valeur et la concurrence dynamique tout en restant cohérents avec leur cadre théologique. Les autres options sont incorrectes car ils n'utilisaient pas de mathématiques formelles, ne se limitaient pas à Aristote, et intégraient explicitement des considérations philosophiques et religieuses dans leur analyse économique.

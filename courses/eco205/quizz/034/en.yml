question: What does a performative contradiction mean in the context of the axiom of human action?
answer: Attempting to disprove the axiom by acting to contradict it actually proves its validity
wrong_answers:
  - "The axiom can be shown to be false by empirical observation of behavior"
  - "The axiom contains logical elements that contradict each other"
  - "The axiom requires experimental evidence to be scientifically validated"
explanation: |
  Performative contradiction is a key concept in the axiom of human action. When someone tries to disprove this axiom, they must necessarily act to do so - write, speak, think - which demonstrates by this very action that the axiom is true. This characteristic makes the axiom irrefutable, because any attempt to contradict it only confirms it. The other options are incorrect, as they suggest that the axiom can be disproved empirically or that it contains internal contradictions, which, according to the Austrian school, runs counter to its fundamental nature.
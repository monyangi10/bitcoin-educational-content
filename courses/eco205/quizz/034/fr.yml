question: Que signifie une contradiction performative dans le contexte de l'axiome de l'action humaine?
answer: Tenter de réfuter l'axiome en agissant pour le contredire prouve en fait sa validité
wrong_answers:
  - "L'axiome peut être démontré faux par l'observation empirique des comportements"
  - "L'axiome contient des éléments logiques qui se contredisent entre eux"
  - "L'axiome nécessite des preuves expérimentales pour être validé scientifiquement"
explanation: |
  La contradiction performative est un concept clé de l'axiome de l'action humaine. Quand quelqu'un essaie de réfuter cet axiome, il doit nécessairement agir pour le faire - écrire, parler, réfléchir - ce qui démontre par cette action même que l'axiome est vrai. Cette caractéristique rend l'axiome irréfutable car toute tentative de le contredire ne fait que le confirmer. Les autres options sont incorrectes car elles suggèrent que l'axiome peut être réfuté empiriquement ou qu'il contient des contradictions internes, ce qui va à l'encontre de sa nature fondamentale selon l'école autrichienne.

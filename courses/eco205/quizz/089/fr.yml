question: Selon la théorie autrichienne, que découvre principalement l'entrepreneur lorsqu'il identifie une opportunité de marché?
answer: Une meilleure allocation possible des ressources grâce à sa connaissance supérieure de l'information dispersée
wrong_answers:
  - "Une nouvelle technologie révolutionnaire qui va perturber l'équilibre existant du marché"
  - "Un déséquilibre temporaire qu'il peut exploiter avant que les prix ne s'ajustent automatiquement"
  - "Une inefficience dans la répartition actuelle qu'il peut corriger par une planification rationnelle"
explanation: |
  Dans la conception autrichienne, l'entrepreneur dispose d'une meilleure connaissance de l'information dispersée sur le marché, ce qui lui permet de saisir des opportunités et de mieux servir les besoins des autres agents économiques. Contrairement à Schumpeter, il ne perturbe pas l'équilibre mais contribue à une meilleure coordination. Il ne s'agit pas de planification rationnelle centralisée mais de découverte décentralisée d'information.

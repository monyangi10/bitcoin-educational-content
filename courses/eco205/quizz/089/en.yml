question: According to Austrian theory, what does the entrepreneur discover when he identifies a market opportunity?
answer: Better resource allocation thanks to superior knowledge of dispersed information
wrong_answers:
  - "A revolutionary new technology that will upset the existing market balance"
  - "A temporary imbalance that he can exploit before prices adjust automatically"
  - "An inefficiency in the current distribution that can be corrected by rational planning"
explanation: |
  In the Austrian conception, the entrepreneur has better knowledge of the information dispersed on the market, enabling him to seize opportunities and better serve the needs of other economic agents. Unlike Schumpeter, he does not disrupt the equilibrium, but contributes to better coordination. This is not centralized rational planning, but decentralized information discovery.
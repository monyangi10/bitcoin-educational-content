question: How many fundamental methodological pillars form the basis of the Austrian school of economics?
answer: Four methodological pillars
wrong_answers:
  - Three methodological pillars
  - Five methodological pillars
  - Six methodological pillars
explanation: |
  The Austrian school of economics rests on four fundamental methodological pillars that form the foundation of its theoretical edifice. These four pillars are: methodological subjectivism (value emerges from subjective evaluations), methodological individualism (economic phenomena are explained by individual actions), praxeology (the systematic study of human action), and methodological dualism (man cannot be studied using the same methods as the natural sciences).
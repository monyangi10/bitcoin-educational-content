question: Combien de piliers méthodologiques fondamentaux constituent la base de l'école autrichienne d'économie?
answer: Quatre piliers méthodologiques
wrong_answers:
  - Trois piliers méthodologiques
  - Cinq piliers méthodologiques
  - Six piliers méthodologiques
explanation: |
  L'école autrichienne d'économie repose sur quatre piliers méthodologiques fondamentaux qui constituent le socle de son édifice théorique. Ces quatre piliers sont : le subjectivisme méthodologique (la valeur émerge des évaluations subjectives), l'individualisme méthodologique (les phénomènes économiques s'expliquent par les actions individuelles), la praxéologie (l'étude systématique de l'action humaine), et le dualisme méthodologique (l'homme ne peut être étudié avec les mêmes méthodes que les sciences naturelles).

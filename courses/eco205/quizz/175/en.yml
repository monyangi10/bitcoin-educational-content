question: How did Jean-Baptiste Say see the role of money in the economy, and how did this influence Austrian thinking?
answer: Money is only an instrument for the circulation of exchanges, not a source of wealth in itself
wrong_answers:
  - Money is a fundamental store of value that naturally generates wealth through accumulation
  - "Money represents the absolute standard of price measurement that determines the intrinsic value of goods"
  - "Money acts as a wealth multiplier, increasing production through investment"
explanation: |
  Jean-Baptiste Say saw money as a mere intermediary in exchanges, facilitating transactions without creating wealth in its own right. This view resonates perfectly with the Austrian vision, which sees money as a means of exchange rather than an end. The other answers are incorrect, as they attribute to money wealth-creating properties that Say rejected, preferring instead real production and entrepreneurship as the true sources of economic prosperity.
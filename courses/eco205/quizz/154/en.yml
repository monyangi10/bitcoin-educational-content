question: According to Mises and Hayek's analysis, why did the USSR use Western capitalist market prices for its internal economic calculations?
answer: Because it could not generate its own rational prices without private ownership and free exchange of the means of production
wrong_answers:
  - "Because it wanted to maintain economic parity with capitalist countries to facilitate international trade."
  - Because the Soviet leaders recognized the theoretical superiority of the capitalist system over socialism
  - "Because it sought to spy on and understand the economic strategies of Western countries to better compete with them."
explanation: |
  The USSR copied Western prices because it was structurally incapable of generating rational prices. Without private ownership of the means of production, there was no free exchange, and therefore no natural formation of prices by supply and demand. This dependence on capitalist prices empirically confirmed Mises' thesis that economic calculation was impossible under socialist conditions.
question: Selon l'école autrichienne, pourquoi les individus ne peuvent-ils pas être étudiés comme des objets inertes ?
answer: Parce que les individus apprennent, changent d'avis et modifient leurs préférences au fil du temps
wrong_answers:
  - Parce que les individus sont trop complexes pour être mesurés avec des instruments scientifiques
  - Parce que les individus vivent dans des environnements sociaux différents les uns des autres
  - Parce que les individus possèdent des caractéristiques physiques et biologiques variables
explanation: |
  L'école autrichienne souligne que contrairement aux objets inertes qui réagissent toujours de la même manière aux mêmes conditions, les individus ont la capacité d'apprendre de leurs expériences passées, de modifier leurs objectifs et de changer leurs préférences. Cette capacité d'évolution et d'adaptation rend leur comportement imprévisible et impossible à modéliser selon les méthodes des sciences naturelles. Les autres réponses, bien que mentionnant des différences réelles, ne touchent pas au cœur de l'argument autrichien qui porte sur la nature changeante et intentionnelle de l'action humaine.

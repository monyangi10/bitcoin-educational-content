question: According to the Austrian school, why can't individuals be studied as inert objects?
answer: Because people learn, change their minds and modify their preferences over time
wrong_answers:
  - Because individuals are too complex to be measured with scientific instruments
  - Because individuals live in different social environments
  - Because individuals have different physical and biological characteristics
explanation: |
  The Austrian school stresses that, unlike inert objects that always react in the same way to the same conditions, individuals have the capacity to learn from past experience, modify their goals and change their preferences. This capacity to evolve and adapt makes their behavior unpredictable and impossible to model using natural science methods. The other answers, while mentioning real differences, do not touch the heart of the Austrian argument, which concerns the changing, intentional nature of human action.
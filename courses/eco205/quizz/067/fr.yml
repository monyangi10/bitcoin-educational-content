question: Comment la concurrence libre contribue-t-elle à l'allocation optimale des ressources selon l'approche autrichienne?
answer: Elle permet de découvrir continuellement les utilisations les plus valorisées des ressources limitées
wrong_answers:
  - "Elle fixe des prix uniformes qui éliminent automatiquement les coûts d'opportunité"
  - Elle calcule mathématiquement la valeur objective optimale pour chaque facteur de production
  - Elle redistribue équitablement les ressources selon les besoins fondamentaux de chacun
explanation: |
  La concurrence libre fonctionne comme un processus de découverte permanent qui révèle quelles sont les utilisations les plus valorisées des ressources. Ce mécanisme coordonne efficacement les décisions de millions d'acteurs économiques en permettant aux ressources d'être naturellement allouées là où le coût d'opportunité est le plus faible par rapport à la valeur anticipée, contrairement aux autres options qui ignorent le caractère subjectif et dynamique de ce processus.

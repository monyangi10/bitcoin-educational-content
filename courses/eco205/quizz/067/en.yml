question: How does free competition contribute to the optimal allocation of resources according to the Austrian approach?
answer: It allows us to continually discover the most valuable uses for limited resources
wrong_answers:
  - "It sets uniform prices that automatically eliminate opportunity costs"
  - It mathematically calculates the optimum objective value for each production factor
  - It redistributes resources equitably according to everyone's basic needs
explanation: |
  Free competition functions as an ongoing process of discovery, revealing the most valuable uses of resources. This mechanism effectively coordinates the decisions of millions of economic players, allowing resources to be naturally allocated where the opportunity cost is lowest relative to the anticipated value, unlike other options which ignore the subjective and dynamic nature of this process.
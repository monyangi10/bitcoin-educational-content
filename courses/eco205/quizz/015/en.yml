question: Who were the three economists who simultaneously and independently developed marginal utility theory in the 1870s?
answer: William Stanley Jevons, Léon Walras and Carl Menger
wrong_answers:
  - Adam Smith, David Ricardo and Karl Marx
  - Carl Menger, Ludwig von Mises and Friedrich Hayek
  - Jean-Baptiste Say, Frédéric Bastiat and Eugène Böhm-Bawerk
explanation: |
  The marginalist revolution of the 1870s was led by three economists working independently: William Stanley Jevons in England, Léon Walras in Switzerland and Carl Menger in Austria. These three thinkers proposed a radically new explanation of value formation based on marginal utility, breaking with the labor theory of value defended by Smith, Ricardo and Marx.
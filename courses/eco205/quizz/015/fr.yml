question: Qui étaient les trois économistes qui ont développé simultanément et indépendamment la théorie de l'utilité marginale dans les années 1870?
answer: William Stanley Jevons, Léon Walras et Carl Menger
wrong_answers:
  - Adam Smith, David Ricardo et Karl Marx
  - Carl Menger, Ludwig von Mises et Friedrich Hayek
  - Jean-Baptiste Say, Frédéric Bastiat et Eugène Böhm-Bawerk
explanation: |
  La révolution marginaliste des années 1870 fut menée par trois économistes travaillant indépendamment : William Stanley Jevons en Angleterre, Léon Walras en Suisse et Carl Menger en Autriche. Ces trois penseurs proposèrent une explication radicalement nouvelle de la formation de la valeur basée sur l'utilité marginale, rompant ainsi avec la théorie de la valeur travail défendue par Smith, Ricardo et Marx.

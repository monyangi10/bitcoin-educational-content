question: Dans l'exemple de Robinson Crusoé, que représente la fabrication d'une perche pour améliorer sa récolte de noix de coco?
answer: Un investissement en capital productif nécessitant une épargne préalable et illustrant le sacrifice présent pour un bénéfice futur
wrong_answers:
  - "Une simple innovation technologique qui améliore immédiatement sa productivité sans coût d'opportunité"
  - Un exemple de destruction créatrice qui remplace définitivement sa méthode de cueillette manuelle
  - "Une allocation rationnelle de ressources selon le modèle néoclassique d'optimisation des facteurs"
explanation: |
  La fabrication de la perche illustre parfaitement le processus entrepreneurial autrichien. Robinson doit d'abord épargner des noix (sacrifice présent) pour libérer le temps nécessaire à la fabrication de l'outil. La perche devient un bien de production qui augmente sa productivité future sans être consommée elle-même. Cet exemple démontre la nécessité d'une épargne préalable à tout investissement et la distinction entre biens capitaux et biens de consommation, concepts centraux de la théorie autrichienne.

question: In Robinson Crusoe's example, what does it mean to make a pole to improve his coconut harvest?
answer: An investment in productive capital requiring prior savings and illustrating the present sacrifice for a future benefit
wrong_answers:
  - "A simple technological innovation that immediately improves productivity at no opportunity cost"
  - An example of creative destruction that definitively replaces its hand-picking method
  - "A rational allocation of resources according to the neoclassical factor optimization model"
explanation: |
  The manufacture of the pole is a perfect illustration of the Austrian entrepreneurial process. Robinson must first save nuts (present sacrifice) to free up the time needed to make the tool. The pole becomes a production good that increases future productivity without itself being consumed. This example demonstrates the need to save before investing, and the distinction between capital goods and consumer goods, concepts central to Austrian theory.
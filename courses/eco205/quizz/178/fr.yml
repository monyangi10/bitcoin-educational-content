question: Quelle synthèse conceptuelle permet à Stephen Horwitz d'affirmer que les économistes autrichiens ont fourni une explication plus solide aux intuitions d'Adam Smith sur l'ordre social?
answer: La combinaison de l'ordre spontané avec le marginalisme et le subjectivisme
wrong_answers:
  - "L'intégration de la théorie de la main invisible avec la critique de l'interventionnisme étatique"
  - "La fusion des droits naturels écossais avec la praxéologie kantienne et l'entrepreneuriat"
  - "L'association de la loi des débouchés de Say avec la théorie monétaire de Cantillon"
explanation: |
  Selon Stephen Horwitz mentionné dans le texte, Menger et les économistes autrichiens ont renforcé les intuitions de Smith sur l'émergence spontanée de l'ordre social en y ajoutant deux éléments théoriques cruciaux : le marginalisme (révolution de l'analyse par l'utilité marginale) et le subjectivisme (reconnaissance que la valeur dépend des préférences individuelles). Cette synthèse dépasse la simple métaphore de la main invisible en fournissant des mécanismes explicatifs rigoureux.

question: What conceptual synthesis enables Stephen Horwitz to assert that Austrian economists have provided a more solid explanation for Adam Smith's intuitions about social order?
answer: Combining spontaneous order with marginalism and subjectivism
wrong_answers:
  - "The integration of the invisible hand theory with the critique of state interventionism"
  - "The fusion of Scottish natural rights with Kantian praxeology and entrepreneurship"
  - "The association of Say's law of outlets with Cantillon's monetary theory"
explanation: |
  According to Stephen Horwitz, mentioned in the text, Menger and the Austrian economists reinforced Smith's insights into the spontaneous emergence of social order by adding two crucial theoretical elements: marginalism (the revolution in marginal utility analysis) and subjectivism (the recognition that value depends on individual preferences). This synthesis goes beyond the simple metaphor of the invisible hand, providing rigorous explanatory mechanisms.
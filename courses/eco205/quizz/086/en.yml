question: In the Austrian view, why is the entrepreneur considered endogenous to the market rather than exogenous?
answer: Because it is an integral part of the market process and uses dispersed information to coordinate exchanges
wrong_answers:
  - "Because it upsets the existing market balance by introducing disruptive innovations"
  - "Because it acts only as a rational allocator of resources according to predefined rules"
  - "Because it operates outside price mechanisms to create new markets"
explanation: |
  According to the Austrian school, the entrepreneur is endogenous, emerging naturally from the market process itself. Contrary to the Schumpeterian vision, where the entrepreneur comes from outside and upsets the equilibrium, the Austrian entrepreneur uses his superior knowledge of dispersed information to better serve other economic agents. He coordinates exchanges via the price system and contributes to equilibrium rather than disrupting it, integrating organically into the competitive dynamic.
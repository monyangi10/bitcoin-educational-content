question: Dans la vision autrichienne, pourquoi l'entrepreneur est-il considéré comme endogène au marché plutôt qu'exogène?
answer: Parce qu'il fait partie intégrante du processus de marché et utilise l'information dispersée pour coordonner les échanges
wrong_answers:
  - "Parce qu'il perturbe l'équilibre existant du marché en introduisant des innovations disruptives"
  - "Parce qu'il agit uniquement comme un allocateur rationnel de ressources selon des règles prédéfinies"
  - "Parce qu'il opère en dehors des mécanismes de prix pour créer de nouveaux marchés"
explanation: |
  Selon l'école autrichienne, l'entrepreneur est endogène car il émerge naturellement du processus de marché lui-même. Contrairement à la vision schumpeterienne où l'entrepreneur vient de l'extérieur bouleverser l'équilibre, l'entrepreneur autrichien utilise sa connaissance supérieure de l'information dispersée pour mieux servir les autres agents économiques. Il coordonne les échanges via le système des prix et contribue à l'équilibre plutôt qu'à le perturber, s'intégrant organiquement dans la dynamique concurrentielle.

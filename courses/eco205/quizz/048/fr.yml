question: Selon Ludwig von Mises, vers quoi l'action humaine est-elle toujours dirigée?
answer: Vers le futur, pour rendre les circonstances futures plus satisfaisantes
wrong_answers:
  - Vers le passé, pour corriger les erreurs commises précédemment
  - Vers le présent, pour maximiser la satisfaction immédiate
  - "Vers l'éternité, pour créer des valeurs permanentes et durables"
explanation: |
  Mises affirme clairement que l'action est toujours dirigée vers le futur, essentiellement et nécessairement projetée pour un avenir meilleur. Son but est de rendre les circonstances futures plus satisfaisantes qu'elles ne seraient sans intervention. Les autres réponses sont incorrectes car l'action ne vise ni à corriger le passé (irréversible), ni à maximiser uniquement le présent, ni à créer des valeurs éternelles.

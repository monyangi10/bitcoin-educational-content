question: Dans l'exemple de Böhm-Bawerk, que nous enseigne la décision du paysan de sacrifier les perroquets plutôt qu'une autre utilisation du blé?
answer: Que la valeur d'un bien est déterminée subjectivement par son utilité marginale selon les priorités individuelles
wrong_answers:
  - Que les perroquets ont objectivement moins de valeur économique que les autres utilisations possibles
  - Que le coût de production des perroquets est mathématiquement inférieur aux autres alternatives
  - Que la rentabilité financière des perroquets est calculable et mesurable par rapport aux autres options
explanation: |
  L'exemple illustre le principe fondamental de l'école autrichienne selon lequel la valeur est subjective et déterminée par l'utilité marginale. Le paysan a choisi de sacrifier les perroquets car il les jugeait subjectivement moins prioritaires que ses autres besoins (alimentation de base, force physique, poulets, whisky). Cette décision révèle ses préférences personnelles et non une valeur objective ou un calcul mathématique. Les autres réponses sont incorrectes car elles supposent une valeur objective ou mesurable, ce qui contredit l'approche autrichienne qui insiste sur la subjectivité des choix économiques.

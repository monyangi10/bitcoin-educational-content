question: In the Böhm-Bawerk example, what does the farmer's decision to sacrifice the parrots rather than put the wheat to another use teach us?
answer: That the value of a good is subjectively determined by its marginal utility according to individual priorities
wrong_answers:
  - That parrots have objectively less economic value than other possible uses
  - That the cost of producing parrots is mathematically lower than other alternatives
  - That the financial profitability of parrots is calculable and measurable compared to other options
explanation: |
  The example illustrates the fundamental principle of the Austrian school of thought that value is subjective and determined by marginal utility. The farmer chose to sacrifice the parrots because he subjectively considered them a lower priority than his other needs (staple food, physical strength, chickens, whisky). This decision reveals his personal preferences, not any objective value or mathematical calculation. The other answers are incorrect because they assume an objective or measurable value, which contradicts the Austrian approach that emphasizes the subjectivity of economic choices.
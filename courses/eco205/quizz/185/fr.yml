question: Pourquoi le déterminisme historique marxiste constitue-t-il une faiblesse majeure selon l'analyse critique de la révolution marginaliste?
answer: Il postule une progression linéaire inévitable vers le communisme, s'éloignant de l'analyse scientifique des phénomènes économiques réels
wrong_answers:
  - "Il nie l'existence de la plus-value en se concentrant uniquement sur les conditions matérielles de production"
  - "Il privilégie l'analyse mathématique au détriment de l'approche subjective et ordinale des préférences individuelles"
  - "Il adopte une méthode empirique excessive basée sur l'accumulation de données historiques contextualisées"
explanation: |
  Le déterminisme historique marxiste présente une vision téléologique qui postule une finalité prédéterminée de l'histoire. En se concentrant sur cette supposée destination inévitable plutôt que sur la compréhension rigoureuse des mécanismes économiques actuels, cette approche abandonne toute prétention scientifique. Les autres réponses confondent avec d'autres critiques : la plus-value relève de la théorie de la valeur travail, l'approche mathématique concerne Jevons et Walras, et l'empirisme historique caractérise l'école de Schmoller.

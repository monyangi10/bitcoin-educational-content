question: Why is Marxist historical determinism a major weakness in the critical analysis of marginalist revolution?
answer: He postulates an inevitable linear progression towards communism, moving away from the scientific analysis of real economic phenomena
wrong_answers:
  - "It denies the existence of surplus value by focusing solely on the material conditions of production"
  - "It favors mathematical analysis to the detriment of the subjective, ordinal approach to individual preferences."
  - "It adopts an excessive empirical method based on the accumulation of contextualized historical data"
explanation: |
  Marxist historical determinism presents a teleological vision that postulates a predetermined finality of history. By focusing on this supposedly inevitable destination rather than on a rigorous understanding of current economic mechanisms, this approach abandons any scientific pretensions. The other responses are confused with other criticisms: surplus value comes under the labor theory of value, the mathematical approach concerns Jevons and Walras, and historical empiricism characterizes the Schmoller school.
question: Quelle innovation théorique de Richard Cantillon préfigure directement les développements autrichiens sur la théorie monétaire et du capital?
answer: Sa théorisation que le taux d'intérêt dépend de l'offre et de la demande de monnaie
wrong_answers:
  - "Sa critique du système de papier-monnaie basée uniquement sur l'observation empirique"
  - Sa défense des monnaies métalliques fondée sur leur valeur intrinsèque absolue
  - Sa théorie des bulles spéculatives comme phénomène purement psychologique
explanation: |
  Cantillon fut l'un des premiers à théoriser que le taux d'intérêt résulte de l'interaction entre l'offre et la demande de monnaie, préfigurant ainsi la théorie autrichienne du capital. Cette approche révolutionnaire dépasse la simple observation empirique des crises monétaires pour proposer un mécanisme explicatif fondamental. Les autres options sont incorrectes car elles réduisent sa contribution à des aspects plus superficiels ou psychologiques, alors que son apport principal réside dans cette compréhension structurelle des mécanismes monétaires.

question: Which of Richard Cantillon's theoretical innovations directly prefigures Austrian developments in monetary and capital theory?
answer: His theorization that the interest rate depends on money supply and demand
wrong_answers:
  - "His critique of the paper money system based solely on empirical observation"
  - His defense of metallic coins based on their absolute intrinsic value
  - His theory of speculative bubbles as a purely psychological phenomenon
explanation: |
  Cantillon was one of the first to theorize that the interest rate results from the interaction between the supply and demand of money, thus prefiguring the Austrian theory of capital. This revolutionary approach goes beyond the simple empirical observation of currency crises to propose a fundamental explanatory mechanism. The other options are incorrect, as they reduce its contribution to more superficial or psychological aspects, whereas its main contribution lies in this structural understanding of monetary mechanisms.
question: In Menger's theory, what is the main reason why the least perceptive economic agents end up adopting the same currency as the most capable entrepreneurs?
answer: They imitate economic behaviors that have been proven successful through direct observation
wrong_answers:
  - They are obliged by the central authorities to use the official currency
  - "They rationally calculate all the benefits before making their adoption decision."
  - They receive comprehensive information on monetary properties from the institutions
explanation: |
  According to Menger, imitation is the central mechanism by which money spreads. Less perceptive agents have neither the time nor the knowledge to analyze all the advantages of an emerging currency. Instead, they observe the economic success of the most capable entrepreneurs and imitate their behavior. This imitation acts as an effective cognitive shortcut, enabling the masses to adopt monetary innovations without having to understand all the underlying mechanisms.
question: Selon l'approche autrichienne, comment les entrepreneurs utilisent-ils le concept de coût d'opportunité dans leurs décisions d'allocation des ressources?
answer: Ils allouent les ressources là où le coût d'opportunité est le plus faible par rapport à la valeur anticipée
wrong_answers:
  - Ils calculent mathématiquement tous les coûts possibles avant de prendre une décision définitive
  - "Ils se basent uniquement sur les coûts historiques pour déterminer l'utilisation optimale des ressources"
  - "Ils choisissent systématiquement l'alternative qui génère le plus grand nombre d'emplois possibles"
explanation: |
  Dans l'approche autrichienne, les entrepreneurs font constamment des arbitrages en renonçant à certains usages pour en privilégier d'autres. Ils allouent naturellement les ressources là où le coût d'opportunité est le plus faible par rapport à la valeur qu'ils anticipent créer. Ce processus subjectif et continu permet une allocation efficace des ressources limitées, contrairement aux approches qui se basent sur des calculs mathématiques formels, des coûts historiques, ou des critères non-économiques comme l'emploi.

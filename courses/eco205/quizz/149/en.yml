question: According to Austrian theory, what is the main consequence of the existence of zombie companies in an economy undergoing artificial monetary expansion?
answer: They tie up scarce production factors in economically unviable activities for the long term
wrong_answers:
  - "They stimulate competition by maintaining pressure on prices in their sectors of activity"
  - "They create a positive knock-on effect by generating jobs and income for the real economy"
  - "They act as a cyclical shock absorber, stabilizing the supply of goods and services during recessions"
explanation: |
  Zombie companies, which survive on low-interest loans when they would not be profitable under normal conditions, represent a systemic waste of resources according to Austrian theory. They immobilize scarce production factors (capital, labor, raw materials) in unproductive activities, preventing their reallocation to more efficient uses. Contrary to the other options, which suggest beneficial effects, these companies act as a brake on economic efficiency, artificially prolonging the imbalances created by monetary manipulation.
question: Selon la théorie autrichienne, quelle est la principale conséquence de l'existence d'entreprises zombies dans une économie en expansion monétaire artificielle?
answer: Elles immobilisent durablement les facteurs de production rares dans des activités économiquement non viables
wrong_answers:
  - "Elles stimulent la concurrence en maintenant une pression sur les prix dans leurs secteurs d'activité"
  - "Elles créent un effet d'entraînement positif en générant de l'emploi et des revenus pour l'économie réelle"
  - "Elles servent d'amortisseur conjoncturel en stabilisant l'offre de biens et services pendant les récessions"
explanation: |
  Les entreprises zombies, qui survivent grâce aux crédits à faible taux alors qu'elles ne seraient pas rentables dans des conditions normales, représentent un gaspillage systémique des ressources selon la théorie autrichienne. Elles immobilisent les facteurs de production rares (capital, travail, matières premières) dans des activités peu productives, empêchant leur réallocation vers des usages plus efficaces. Contrairement aux autres options qui suggèrent des effets bénéfiques, ces entreprises constituent un frein à l'efficacité économique et prolongent artificiellement les déséquilibres créés par la manipulation monétaire.

question: Comment la révolution marginaliste de Menger résout-elle le paradoxe du diamant et de l'eau que ne pouvaient expliquer les théories classiques de la valeur travail?
answer: En démontrant que la valeur dépend de l'utilité marginale de la dernière unité disponible et non de l'utilité totale ou du travail incorporé
wrong_answers:
  - "En prouvant que les diamants nécessitent objectivement plus de travail que l'eau et que leur prix reflète cette réalité mesurable"
  - En établissant que la rareté naturelle détermine mécaniquement la valeur indépendamment des préférences subjectives des individus
  - En montrant que les conditions matérielles de production créent automatiquement la hiérarchie des valeurs selon les lois historiques
explanation: |
  Le paradoxe du diamant et de l'eau illustrait l'incapacité des théories classiques à expliquer pourquoi des biens essentiels (eau) valent moins que des biens superflus (diamants). Menger résout ce paradoxe par sa théorie de l'utilité marginale : la valeur ne dépend pas de l'utilité totale ni du travail incorporé, mais de l'utilité de la dernière unité disponible. L'eau, abondante, a une utilité marginale faible malgré son utilité totale énorme, tandis que le diamant, rare, conserve une utilité marginale élevée.

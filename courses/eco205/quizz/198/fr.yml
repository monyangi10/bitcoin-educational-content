question: Selon l'école autrichienne, quel est le rôle fondamental que joue la rareté garantie de Bitcoin dans la restauration du signal économique authentique?
answer: Elle permet aux taux d'intérêt de redevenir un signal authentique coordonnant l'épargne et l'investissement plutôt qu'un outil de manipulation politique
wrong_answers:
  - Elle garantit une croissance économique stable en éliminant complètement les cycles économiques et les fluctuations de marché
  - "Elle assure une distribution équitable des richesses en empêchant l'accumulation excessive de capital par les investisseurs"
  - Elle stabilise automatiquement tous les prix du marché en créant un étalon de référence fixe pour toutes les transactions
explanation: |
  Selon l'école autrichienne, la rareté garantie de Bitcoin (21 millions d'unités maximum) empêche toute manipulation de l'offre monétaire par les autorités centrales. Cette caractéristique permet aux taux d'intérêt de refléter véritablement les préférences temporelles des individus et de coordonner naturellement l'épargne et l'investissement, contrairement aux monnaies fiduciaires où les banques centrales manipulent artificiellement ces taux. Les autres options sont incorrectes car Bitcoin ne garantit ni l'élimination des cycles économiques, ni la redistribution des richesses, ni la stabilisation automatique de tous les prix.

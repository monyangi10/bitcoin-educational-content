question: Pourquoi Rothbard défendait-il une quantité fixe de monnaie plutôt qu'une expansion monétaire?
answer: Parce que n'importe quelle quantité convient, le marché s'ajustant en modifiant le pouvoir d'achat de l'unité monétaire
wrong_answers:
  - "Parce qu'une quantité fixe permet de maintenir des prix stables et d'éviter toute fluctuation économique"
  - Parce que seule une quantité fixe peut garantir la convertibilité en or et maintenir la confiance des investisseurs
  - "Parce qu'une expansion monétaire augmente automatiquement la richesse réelle de tous les détenteurs de monnaie"
explanation: |
  Selon Rothbard, une quantité fixe de monnaie est préférable car le marché possède la capacité naturelle de s'ajuster en modifiant le pouvoir d'achat de chaque unité monétaire. Une augmentation de l'offre monétaire ne fait que diluer l'efficacité de chaque unité sans apporter de bénéfice réel. Les autres réponses sont incorrectes : les prix peuvent fluctuer même avec une quantité fixe, la convertibilité en or n'est pas nécessaire au fonctionnement monétaire, et l'expansion monétaire ne crée pas de richesse réelle mais redistribue simplement le pouvoir d'achat existant.

question: According to the Austrian approach, what fundamentally characterizes time in economics?
answer: Time is a purely individual and subjective reality
wrong_answers:
  - Time is a continuous, homogeneous and measurable phenomenon
  - Time is an objective variable at the service of modeling
  - Time is identical for all economic agents
explanation: |
  The Austrian approach sees time as a purely individual and subjective reality, in contrast to neoclassical models which treat it as a continuous, homogeneous and measurable phenomenon. This subjective conception explains why an hour may seem interminable at the dentist's, but pass quickly during an exciting conversation. Time derives directly from the axiom of human action, and varies according to each individual's experience.
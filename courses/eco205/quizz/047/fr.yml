question: Selon l'approche autrichienne, qu'est-ce qui caractérise fondamentalement le temps en économie?
answer: Le temps est une réalité purement individuelle et subjective
wrong_answers:
  - Le temps est un phénomène continu, homogène et mesurable
  - Le temps est une variable objective au service de la modélisation
  - Le temps est identique pour tous les agents économiques
explanation: |
  L'approche autrichienne conçoit le temps comme une réalité purement individuelle et subjective, contrairement aux modèles néoclassiques qui le traitent comme un phénomène continu, homogène et mesurable. Cette conception subjective explique pourquoi une heure peut sembler interminable chez le dentiste mais passer rapidement lors d'une conversation passionnante. Le temps découle directement de l'axiome de l'action humaine et varie selon l'expérience de chaque individu.

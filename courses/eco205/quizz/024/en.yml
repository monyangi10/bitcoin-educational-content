question: Where does methodological individualism stand on macroeconomic phenomena?
answer: They are the aggregate consequences of millions of individual decisions
wrong_answers:
  - They are determined by abstract, independent collective forces
  - They follow mathematically predictable deterministic historical laws
  - "They are the result of interaction between the major social classes"
explanation: |
  According to the methodological individualism of the Austrian school, macroeconomic phenomena are merely the aggregate consequences of millions of individual decisions. This approach rejects the idea that the economy can be explained by abstract collective forces, deterministic historical laws or interactions between social classes, preferring instead an understanding based on individual human action.
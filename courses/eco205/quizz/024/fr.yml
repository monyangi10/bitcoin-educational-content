question: Quelle est la position de l'individualisme méthodologique concernant les phénomènes macroéconomiques?
answer: Ils sont les conséquences agrégées de millions de décisions individuelles
wrong_answers:
  - Ils sont déterminés par des forces collectives abstraites indépendantes
  - Ils suivent des lois historiques déterministes prévisibles mathématiquement
  - "Ils résultent de l'interaction entre les grandes classes sociales"
explanation: |
  Selon l'individualisme méthodologique de l'école autrichienne, les phénomènes macroéconomiques ne sont que les conséquences agrégées de millions de décisions individuelles. Cette approche rejette l'idée que l'économie puisse être expliquée par des forces collectives abstraites, des lois historiques déterministes ou des interactions entre classes sociales, privilégiant plutôt une compréhension basée sur l'action humaine individuelle.

question: According to Menger's Austrian theory, what fundamental characteristic distinguishes early adopters of an emerging currency from other economic agents?
answer: They are more perceptive and recognize the economic advantage of this exchange procedure before others do
wrong_answers:
  - "They have more material wealth, enabling them to accumulate more tradable goods"
  - "They enjoy a privileged institutional status granted by the central authorities of the time"
  - They naturally have goods with a better intrinsic marketability
explanation: |
  Menger explains that only the most perceptive individuals initially recognize the advantage of using certain goods as exchange intermediaries. These entrepreneurs are the first to recognize the economic potential of this procedure. Other agents then adopt the practice by imitation, inspired by the success of these precursors. This insight, rather than wealth, institutional status or possession of particular goods, is the determining factor in the early adoption of emerging currencies.
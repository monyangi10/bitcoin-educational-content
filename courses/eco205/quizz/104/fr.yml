question: Selon la théorie autrichienne de Menger, quelle caractéristique fondamentale distingue les premiers adoptants d'une monnaie émergente des autres agents économiques?
answer: Ils sont plus perspicaces et reconnaissent avant les autres l'avantage économique de cette procédure d'échange
wrong_answers:
  - "Ils disposent de plus de richesses matérielles leur permettant d'accumuler davantage de biens échangeables"
  - "Ils bénéficient d'un statut institutionnel privilégié accordé par les autorités centrales de l'époque"
  - Ils possèdent naturellement des marchandises ayant une meilleure aptitude intrinsèque à être écoulées
explanation: |
  Menger explique que seuls les individus les plus perspicaces reconnaissent initialement l'avantage d'utiliser certaines marchandises comme intermédiaires d'échange. Ces entrepreneurs identifient avant les autres le potentiel économique de cette procédure. Les autres agents adoptent ensuite cette pratique par imitation, s'inspirant du succès de ces précurseurs. Cette perspicacité, et non la richesse, le statut institutionnel ou la possession de biens particuliers, constitue le facteur déterminant dans l'adoption précoce de la monnaie émergente.

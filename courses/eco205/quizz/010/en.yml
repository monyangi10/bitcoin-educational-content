question: According to Carl Menger, what primarily determines the economic value of a good?
answer: The individual's subjective judgment of the good's ability to satisfy personal needs
wrong_answers:
  - The quantity of labour required to produce the good according to the classical theory
  - Objective scarcity of the good on the market, regardless of individual needs
  - "A cardinal measure quantifiable in units of utility as proposed by Walras and Jevons"
explanation: |
  Carl Menger develops the methodological subjectivism according to which value does not exist intrinsically in goods, but emanates entirely from the subjective judgment of the individual. Contrary to the labor theory of value of the classics, or the quantification attempts of Walras and Jevons, Menger asserts that it is only the perceived capacity of the good to satisfy a specific personal need, in a given context, that counts.
question: Quelle innovation conceptuelle fondamentale Juan de Lugo et Juan de Salas ont-ils apportée à la théorie économique concernant la formation des prix d'équilibre?
answer: Ils ont démontré que la connaissance nécessaire à la détermination des prix est dispersée et impossible à centraliser par un être humain
wrong_answers:
  - "Ils ont établi que les prix d'équilibre résultent d'un calcul mathématique précis basé sur les coûts de production"
  - "Ils ont prouvé que l'État peut déterminer les justes prix en analysant systématiquement toutes les variables du marché"
  - "Ils ont montré que les prix d'équilibre dépendent uniquement de la quantité de monnaie en circulation dans l'économie"
explanation: |
  Juan de Lugo (1647) et Juan de Salas (1617) ont anticipé la théorie autrichienne de la connaissance dispersée en affirmant que seul Dieu peut connaître toutes les circonstances déterminant les prix d'équilibre. Cette vision révolutionnaire souligne l'impossibilité pour tout planificateur central de posséder l'information nécessaire, préfigurant les critiques de Mises contre le socialisme. Les autres réponses reflètent des approches mécanistes ou interventionnistes contraires à leur pensée.

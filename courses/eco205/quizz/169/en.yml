question: What fundamental conceptual innovation did Juan de Lugo and Juan de Salas bring to economic theory regarding equilibrium price formation?
answer: They have shown that the knowledge needed to determine prices is dispersed and impossible for a human being to centralize
wrong_answers:
  - "They have established that equilibrium prices result from a precise mathematical calculation based on production costs."
  - "They have proved that the state can determine fair prices by systematically analyzing all market variables."
  - "They have shown that equilibrium prices depend solely on the quantity of money in circulation in the economy."
explanation: |
  Juan de Lugo (1647) and Juan de Salas (1617) anticipated the Austrian theory of dispersed knowledge by asserting that only God can know all the circumstances determining equilibrium prices. This revolutionary vision underlines the impossibility for any central planner to possess the necessary information, prefiguring Mises' criticism of socialism. Other responses reflect mechanistic or interventionist approaches that run counter to their thinking.
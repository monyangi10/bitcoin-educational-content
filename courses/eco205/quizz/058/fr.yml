question: Selon Mark Skousen, quel pourcentage des ressources productives (hors secteur public) est consacré à la production de biens de production?
answer: Plus de soixante pour cent
wrong_answers:
  - Environ quarante pour cent
  - Approximativement trente pour cent
  - Plus de quatre-vingts pour cent
explanation: |
  Mark Skousen estime que plus de soixante pour cent des ressources productives disponibles en dehors du secteur public sont consacrées à la production de biens de production. Ce chiffre remarquable signifie que deux tiers des facteurs rares de production ne sont pas consacrés directement à la consommation mais au perfectionnement de la structure du capital, illustrant l'importance des détours de production dans l'économie moderne.

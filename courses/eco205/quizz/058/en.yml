question: According to Mark Skousen, what percentage of productive resources (excluding the public sector) is devoted to the production of production goods?
answer: Over sixty percent
wrong_answers:
  - About forty percent
  - Approximately thirty percent
  - Over eighty percent
explanation: |
  Mark Skousen estimates that over sixty percent of productive resources available outside the public sector are devoted to the production of producer goods. This remarkable figure means that two-thirds of scarce factors of production are not devoted directly to consumption but to perfecting the capital structure, illustrating the importance of production detours in the modern economy.
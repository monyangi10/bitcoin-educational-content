question: According to the Austrian school of thought, what is the main consequence of the impossibility of analyzing past results and predicting future production under a socialist regime?
answer: The inevitable accumulation of surpluses, waste and shortages in the organization of the productive system
wrong_answers:
  - "The creation of a parallel black market that ends up completely replacing the planned economy"
  - "The spontaneous emergence of private entrepreneurs bypassing the central planning system"
  - The gradual transformation of the socialist regime into a mixed economy with a dominant private sector
explanation: |
  Without free prices, it becomes impossible to analyze past results and forecast future production, which inevitably leads to a blind organization of the productive system. This economic blindness structurally generates surpluses, waste and shortages, as planners are unable to adjust production effectively to real needs. The other options describe possible political evolutions, but are not the direct economic consequence identified by the Austrian school.
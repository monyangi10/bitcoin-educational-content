question: Selon l'école autrichienne, quelle est la principale conséquence de l'impossibilité d'analyser les résultats passés et de prévoir la production future en régime socialiste?
answer: L'accumulation inévitable de surplus, gaspillages et pénuries dans l'organisation du système productif
wrong_answers:
  - "La création d'un marché noir parallèle qui finit par remplacer complètement l'économie planifiée"
  - "L'émergence spontanée d'entrepreneurs privés qui contournent le système de planification centrale"
  - La transformation progressive du régime socialiste en économie mixte avec secteur privé dominant
explanation: |
  Sans prix libres, il devient impossible d'analyser les résultats passés et de prévoir la production future, ce qui conduit inévitablement à une organisation aveugle du système productif. Cette cécité économique génère structurellement des surplus, gaspillages et pénuries car les planificateurs ne peuvent pas ajuster efficacement la production aux besoins réels. Les autres options décrivent des évolutions politiques possibles mais ne constituent pas la conséquence économique directe identifiée par l'école autrichienne.

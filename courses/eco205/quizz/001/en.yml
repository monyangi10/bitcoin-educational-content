question: According to the Austrian school of economics, where does the value of an economic good come from?
answer: Each individual's subjective assessment of what is good in his or her personal context
wrong_answers:
  - The amount of work required to produce the good under normal conditions
  - Its objective physical characteristics and measurable technical utility
  - The total cost of raw materials and production factors used
explanation: |
  The Austrian school defends the principle of methodological subjectivism, which constitutes one of its four fundamental pillars. Unlike classical theories, which sought an objective value based on labor or production costs, Austrian economists assert that value emerges solely from the subjective assessments of individuals. The same good can have a different value for each person, depending on their needs, preferences and particular circumstances. This revolutionary approach transforms our understanding of economic phenomena by placing the individual and his or her judgments at the heart of the analysis.
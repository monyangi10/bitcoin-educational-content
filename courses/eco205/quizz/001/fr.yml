question: Selon l'école autrichienne d'économie, d'où provient la valeur d'un bien économique?
answer: De l'évaluation subjective que chaque individu fait du bien selon son contexte personnel
wrong_answers:
  - De la quantité de travail nécessaire pour produire ce bien dans des conditions normales
  - De ses caractéristiques physiques objectives et de son utilité technique mesurable
  - Du coût total des matières premières et des facteurs de production utilisés
explanation: |
  L'école autrichienne défend le principe du subjectivisme méthodologique, qui constitue l'un de ses quatre piliers fondamentaux. Contrairement aux théories classiques qui cherchaient une valeur objective basée sur le travail ou les coûts de production, les économistes autrichiens affirment que la valeur émerge uniquement des évaluations subjectives des individus. Un même bien peut avoir une valeur différente pour chaque personne selon ses besoins, ses préférences et sa situation particulière. Cette approche révolutionnaire transforme la compréhension des phénomènes économiques en plaçant l'individu et ses jugements au centre de l'analyse.

question: According to Carl Menger, what determines the value of a good?
answer: The individual's subjective relationship with this good in a specific context
wrong_answers:
  - The amount of work required to produce this good
  - Production costs and raw materials used
  - "Supply and demand on the global market"
explanation: |
  For Menger, the intrinsic value of a good does not exist. It derives from the individual's subjective relationship with that good, in a specific context at a given moment. This value varies according to the current situation, geography, psychological state and needs of each individual. Other answers reflect traditional objective approaches, which Menger rejects in favor of his dynamic subjectivism.
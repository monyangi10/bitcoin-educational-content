question: According to the Austrian school of thought, what actually happens when an entrepreneur invests heavily in the production of a good that consumers don't ultimately value?
answer: The price of the property will remain low despite the high investment costs, because costs follow prices and not the other way round
wrong_answers:
  - The price of the good will necessarily be high to compensate for the high production costs incurred
  - Consumers will have to pay a price proportional to the resources invested, according to the labour theory of value
  - The market will automatically adjust consumer prices in line with production costs
explanation: |
  The Austrian school teaches that costs tend to follow prices and not the other way round, a principle already identified by the Spanish scholastics. Regardless of the resources invested in production, if consumers do not value a good sufficiently, its price will remain low. It's the final price the consumer is willing to pay that influences productive organization, not the costs incurred. This vision runs counter to the labor theory of value, which claims that costs determine prices.
question: What fundamental characteristic did Marxist materialism and German historicism share at the end of the 19th century, according to the analysis of the marginalist revolution?
answer: The rejection of any possibility of universal economic laws
wrong_answers:
  - "The common adoption of subjective value theory"
  - Defending free trade and economic liberalism
  - "The exclusive use of mathematical methods in economics"
explanation: |
  The text clearly states that these two dominant currents shared "one fundamental characteristic: the rejection of any possibility of universal economic laws". Marxism favored materialist determinism, while German historicism defended a contextualist approach that denied the existence of universal economic theories. This convergence in the rejection of universal laws is precisely what Menger developed his marginalist revolution against.
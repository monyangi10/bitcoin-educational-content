question: Quelle caractéristique fondamentale le matérialisme marxiste et l'historicisme allemand partageaient-ils à la fin du XIXe siècle selon l'analyse de la révolution marginaliste?
answer: Le rejet de toute possibilité de lois économiques universelles
wrong_answers:
  - "L'adoption commune de la théorie de la valeur subjective"
  - La défense du libre-échange et du libéralisme économique
  - "L'utilisation exclusive de méthodes mathématiques en économie"
explanation: |
  Le texte indique clairement que ces deux courants dominants partageaient "une caractéristique fondamentale : le rejet de toute possibilité de lois économiques universelles". Le marxisme privilégiait le déterminisme matérialiste, tandis que l'historicisme allemand défendait une approche contextualiste niant l'existence de théories économiques universelles. Cette convergence dans le rejet des lois universelles constitue précisément ce contre quoi Menger développa sa révolution marginaliste.

question: How does the value of a good differ from the price of a good according to the Austrian concept?
answer: Value is subjective and individual, while price is an objective exchange ratio expressed in money
wrong_answers:
  - The value represents the cost of production, while the price includes the seller's profit margin
  - "Value is determined by marginal utility, while price is set by marginal costs"
  - The value corresponds to the work incorporated, while the price reflects market demand
explanation: |
  According to the Austrian school, value emanates from the individual and his personal relationship with the good - it is unique, subjective and depends on his preferences. Price, on the other hand, is simply objective accounting data that expresses an exchange relationship in money. This fundamental distinction explains why a good can have a high price without much value for a particular individual, and vice versa. The other answers reflect mainstream or classic conceptions that the Austrian school rejects.
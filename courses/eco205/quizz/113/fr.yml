question: Comment la valeur d'un bien se distingue-t-elle du prix d'un bien selon la conception autrichienne?
answer: La valeur est subjective et individuelle tandis que le prix est un ratio d'échange objectif exprimé en monnaie
wrong_answers:
  - La valeur représente le coût de production tandis que le prix inclut la marge bénéficiaire du vendeur
  - "La valeur est déterminée par l'utilité marginale tandis que le prix est fixé par les coûts marginaux"
  - La valeur correspond au travail incorporé tandis que le prix reflète la demande du marché
explanation: |
  Selon l'école autrichienne, la valeur émane de l'individu et de sa relation personnelle avec le bien - elle est unique, subjective et dépend de ses préférences. Le prix, lui, n'est qu'une donnée comptable objective qui exprime un rapport d'échange en monnaie. Cette distinction fondamentale explique pourquoi un bien peut avoir un prix élevé sans grande valeur pour un individu particulier, et inversement. Les autres réponses reflètent des conceptions mainstream ou classiques que rejette l'école autrichienne.

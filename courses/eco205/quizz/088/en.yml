question: According to Huerta de Soto, which example best illustrates how the entrepreneur improves resource allocation through superior knowledge?
answer: The discovery of a carburetor that doubles engine efficiency is economically equivalent to doubling oil reserves
wrong_answers:
  - "The contractor who invests heavily in new drilling equipment to increase oil extraction"
  - "The creation of a new oil company in direct competition with existing companies in the market"
  - "Technological innovation to discover new oil deposits in untapped areas"
explanation: |
  The carburetor example perfectly illustrates the Austrian vision: the entrepreneur uses his superior knowledge to create an innovation that maximizes the utility of existing resources. Doubling energy efficiency is economically equivalent to doubling physical reserves, demonstrating how the entrepreneur optimizes allocation without necessarily increasing the quantity of resources. The other options focus on increasing physical resources rather than optimizing their use through entrepreneurial knowledge.
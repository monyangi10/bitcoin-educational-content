question: Selon Huerta de Soto, quel exemple illustre le mieux comment l'entrepreneur améliore l'allocation des ressources par sa connaissance supérieure?
answer: La découverte d'un carburateur doublant l'efficacité des moteurs équivaut économiquement à doubler les réserves pétrolières
wrong_answers:
  - "L'entrepreneur qui investit massivement dans de nouveaux équipements de forage pour augmenter l'extraction pétrolière"
  - "La création d'une nouvelle compagnie pétrolière qui concurrence directement les entreprises existantes sur le marché"
  - "L'innovation technologique qui permet de découvrir de nouveaux gisements pétroliers dans des zones inexploitées"
explanation: |
  L'exemple du carburateur illustre parfaitement la vision autrichienne : l'entrepreneur utilise sa connaissance supérieure pour créer une innovation qui maximise l'utilité des ressources existantes. Doubler l'efficacité énergétique équivaut économiquement à doubler les réserves physiques, démontrant comment l'entrepreneur optimise l'allocation sans nécessairement augmenter la quantité de ressources. Les autres options se concentrent sur l'augmentation des ressources physiques plutôt que sur l'optimisation de leur utilisation par la connaissance entrepreneuriale.

question: Selon le subjectivisme dynamique de Menger, qu'est-ce qui caractérise les choix économiques des individus?
answer: Ils sont changeants et évoluent constamment sous l'effet de causes internes ou externes
wrong_answers:
  - "Ils sont statiques et déterminés par l'histoire et les institutions sociales"
  - Ils suivent des modèles mathématiques prévisibles et standardisés
  - "Ils sont fixés par l'appartenance à une classe sociale spécifique"
explanation: |
  Le subjectivisme dynamique de Menger affirme que les choix individuels sont changeants et dynamiques, évoluant constamment. Cette vision s'oppose à l'idée dominante de l'époque selon laquelle les choix seraient statiques et déterminés par l'histoire ou les institutions. Pour Menger, l'individu est un agent actif qui évolue dans sa relation avec le monde, et ses choix varient selon sa situation, son état psychologique et ses besoins du moment.

question: According to Menger's dynamic subjectivism, what characterizes people's economic choices?
answer: They are changeable and constantly evolving under the effect of internal or external causes
wrong_answers:
  - "They are static and determined by history and social institutions"
  - They follow predictable, standardized mathematical models
  - "They are determined by belonging to a specific social class"
explanation: |
  Menger's dynamic subjectivism asserts that individual choices are changeable and dynamic, constantly evolving. This contrasts with the dominant view of the time that choices are static and determined by history or institutions. For Menger, the individual is an active agent who evolves in his relationship with the world, and his choices vary according to his situation, his psychological state and his current needs.
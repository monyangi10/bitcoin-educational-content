question: How does the market process coordinate individual actions despite the dispersal of knowledge among all economic players?
answer: By the pricing system, which communicates dispersed information and enables resources to be allocated without centralization
wrong_answers:
  - Through centralized planning, which collects and redistributes all necessary business information
  - "Through the intervention of regulatory bodies that harmonize conflicting individual preferences"
  - The standardization of economic behavior, which eliminates the subjectivity of individual choices
explanation: |
  According to Hayek, the market process coordinates actions despite the dispersal of knowledge, thanks to the price system generated by competition. These prices serve as socially accessible indicators that communicate dispersed information without the need for centralization. The other options are incorrect, as they imply centralization that is impossible according to Austrian theory: centralized planning cannot collect all dispersed information, regulatory bodies cannot harmonize subjective preferences, and standardization contradicts the principle of individual subjectivity.
question: लुडविग वॉन मिसेस ने अपने लेख "Economic Calculation in a Socialist Commonwealth" में क्या मुख्य तर्क दिया है?
answer: बीच के उत्पादन के साधनों की कीमतों के बिना तर्कसंगत आर्थिक संगठन असंभव है।
wrong_answers:
  - समाजवाद पूंजीवाद से नैतिक रूप से बेहतर है।
  - पूंजीवाद ही एकमात्र व्यावहारिक आर्थिक प्रणाली है।
  - समाजवाद ऐसे व्यक्तियों को जन्म दे सकता है जिनमें पूंजीवादी प्रवृत्तियाँ नहीं होती।
explanation: |
  मिसेस ने तर्क दिया कि बिना बाज़ार के मध्यवर्ती वस्तुओं की कीमतें तय करने के लिए
  उत्पादन के कारकों को देखते हुए, संसाधनों का तर्कसंगत उपयोग करना असंभव हो जाता है
  विभिन्न उद्योगों में। इसका मतलब है कि भले ही किसी उद्योग के भीतर पूरी तरह से व्यवस्था हो,
  हर कंपनी या अर्थव्यवस्था का हर हिस्सा, पूरी अर्थव्यवस्था कुशलता से समायोजित नहीं हो सकती
  संसाधनों की उपलब्धता, उत्पादन की स्थितियों, और उपभोक्ताओं की पसंद में बदलाव के कारण।
reviewed: true
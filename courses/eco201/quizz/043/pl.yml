question: Jaki jest główny argument Ludwiga von Misesa w jego artykule Economic Calculation in a Socialist Commonwealth?
answer: Racjonalna organizacja gospodarcza jest niemożliwa bez cen pośrednich czynników produkcji.
wrong_answers:
  - Socjalizm jest moralnie lepszy od kapitalizmu.
  - Kapitalizm jest jedynym realnym systemem gospodarczym.
  - Socjalizm może wytworzyć jednostki pozbawione instynktów kapitalistycznych.
explanation: |
  Mises argumentował, że bez rynku określającego ceny pośrednich czynników produkcji, racjonalizacja wykorzystania zasobów w różnych branżach staje się niemożliwa. Oznacza to, że nawet jeśli w każdej firmie lub części gospodarki istnieje doskonała organizacja, cała gospodarka nie może skutecznie dostosować się do zmian dostępności zasobów, warunków produkcji i preferencji konsumentów.
reviewed: true

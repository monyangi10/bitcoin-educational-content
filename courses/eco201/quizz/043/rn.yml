question: Ni irihe jambonyamukuru Ludwig von Mises yashizeho mu kiganiro ciwe kivuga ngo Ibara ry’ubutunzi mu gihugu c’Ubumwe bw’Abasosiyalisiti?
answer: Ugutunganya ubutunzi mu buryo bubereye ntibishoboka ata biciro nk'ikintu hagati y’umwimbu.
wrong_answers:
  - Ubusosiyalisiti buraruta ubu kapitalizimu mu majambo.
  - kapitalizimu ni bwo buryo bwonyene bwo kubamwo mu vy’ubutunzi.
  - Ubusosiyalisimu burashobora kuvyara abantu batagira kamere y’ubu kapitalizimu.
explanation: |
  Mises yarashimika ko ata soko ryo gushingirako mu kumenya ibiciro vy’ibintu bikoreshwa hagati mu nganda, bigorana cane gutunganya neza ikoreshwa ry’umutahe hagati y’inganda(amahinguriro) zitandukanye. Ivyo bisigura ko naho haba hari igenamigambi ryiza cane mu ruganda rumwe rumwe canke mu gice c’ubutunzi, ubutunzi bwose hamwe ntibushobora kwiyumvira no kwihindura neza ku mpinduka ziboneka, mu buryo bwo gukora, no mu vyo abaguzi bipfuza.
reviewed: true

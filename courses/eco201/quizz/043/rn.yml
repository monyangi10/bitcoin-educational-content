question: Ni igiki nyamukuru Ludwig von Mises yashizeho mu kiganiro ciwe kivuga ngo Ibara ry’ubutunzi mu gihugu c’Ubumwe bw’Abasosiyalisiti?
answer: Ugutunganya ubutunzi mu buryo bubereye ntibishoboka ata bici- ro vy’ibintu vyo hagati vy’umwimbu.
wrong_answers:
  - Ubusosiyalisiti buraruta ubu kapitalizimu mu vy’inyifato runtu.
  - Ubu kapitalizimu ni bwo buryo bwonyene bushobora gukoreshwa mu vy’ubutunzi.
  - Ubusosiyalisimu burashobora kuvyara abantu batagira kamere y’ubu kapitalizimu.
explanation: |
  Mises yavuze ko ata soko ryo kumenya ibiciro vy’ibintu vyo hagati .
  ibintu vy’umwimbu, biraca bidashoboka gutuma ubutunzi bukoreshwa mu buryo bubereye .
  mu nganda zose. Ivyo bisigura ko naho hoba hariho ishirahamwe ritunganye mu .
  buri shirahamwe canke igice c'ubutunzi, ubutunzi bwose ntibushobora guhindura neza .
  ku mahinduka mu bijanye n’ukuntu ibikoresho biboneka, uko bimeze, n’ivyo abaguzi bakunda.
reviewed: true
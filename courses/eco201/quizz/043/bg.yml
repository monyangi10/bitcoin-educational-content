question: Какъв е основният аргумент на Лудвиг фон Мизес в статията му "Икономическото изчисление в социалистическата общност"?
answer: Рационалната икономическа организация е невъзможна без цени на междинните производствени фактори.
wrong_answers:
  - Социализмът е морално по-висш от капитализма.
  - Капитализмът е единствената жизнеспособна икономическа система.
  - Социализмът може да създаде хора, лишени от капиталистически инстинкти.
explanation: |
  Мизес твърди, че без пазар, който да определя цените на междинните стоки
  е невъзможно да се рационализира използването на ресурсите
  в различните отрасли. Това означава, че дори и да има перфектна организация в рамките на
  всяка фирма или част от икономиката, цялата икономика не може да се адаптира ефективно
  към промените в наличността на ресурсите, условията на производство и предпочитанията на потребителите.
reviewed: true

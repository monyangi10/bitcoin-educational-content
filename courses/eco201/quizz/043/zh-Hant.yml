question: Ludwig von Mises 在其文章「社會主義聯邦的經濟計算」中的主要論點是什麼？
answer: 沒有中間生產要素的價格，就不可能有合理的經濟組織。
wrong_answers:
  - 社會主義在道德上優於資本主義。
  - 資本主義是唯一可行的經濟體系。
  - 社會主義可以培養出沒有資本主義本能的人。
explanation: |
  米塞斯認為，如果沒有市場來決定中間價
  在這種情況下，資源的使用就不可能合理化。
  跨產業。這意味著，即使有完善的組織內
  每家公司或經濟體的子部分，整個經濟體都無法有效率地調整。
  資源可用性、生產條件和消費者偏好的變化。
reviewed: true
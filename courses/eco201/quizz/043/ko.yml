question: 사회주의 연방의 경제 계산이라는 글에서 루드비히 폰 미제스의 주요 주장은 무엇인가요?
answer: 합리적인 경제 조직은 중간 생산 요소에 대한 가격 없이는 불가능합니다.
wrong_answers:
  - 사회주의는 자본주의보다 도덕적으로 우월합니다.
  - 자본주의는 유일하게 실행 가능한 경제 시스템입니다.
  - 사회주의는 자본주의 본능이 결여된 개인을 양산할 수 있습니다.
explanation: |
  미제스는 중간 생산 요소의 가격을 결정할 시장이 없다면
  중간 생산 요소의 가격을 결정할 시장이 없다면 산업 전반에 걸쳐
  합리화할 수 없다고 주장했습니다. 즉, 각 기업이나 경제의 일부분 내에 완벽한 조직이 있더라도
  경제의 각 기업 또는 하위 부분, 전체 경제는 효율적으로 조정할 수 없습니다
  자원 가용성, 생산 조건, 소비자 선호도의 변화에 효율적으로 적응할 수 없습니다.
reviewed: true
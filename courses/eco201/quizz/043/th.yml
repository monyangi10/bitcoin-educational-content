question: ข้อโต้แย้งหลักของ Ludwig von Mises ในบทความของเขา "Economic Calculation in a Socialist Commonwealth" คือการที่ระบบเศรษฐกิจแบบสังคมนิยมไม่สามารถทำการคำนวณทางเศรษฐกิจได้อย่างมีประสิทธิภาพ เนื่องจากขาดกลไกราคาที่เกิดจากตลาดเสรี ซึ่งจำเป็นต่อการตัดสินใจเกี่ยวกับการจัดสรรทรัพยากรอย่างมีประสิทธิภาพ
answer: การจัดระเบียบเศรษฐกิจอย่างมีเหตุผลเป็นไปไม่ได้หากไม่มีราคาสำหรับปัจจัยการผลิตขั้นกลาง
wrong_answers:
  - ลัทธิสังคมนิยมมีความเหนือกว่าทางศีลธรรมเมื่อเทียบกับลัทธิทุนนิยม
  - ระบบทุนนิยมเป็นระบบเศรษฐกิจเดียวที่ใช้งานได้จริง
  - ลัทธิสังคมนิยมสามารถสร้างบุคคลที่ปราศจากสัญชาตญาณทุนนิยม
explanation: |
  มิเซสให้เหตุผลว่า หากไม่มีตลาดในการกำหนดราคาสำหรับปัจจัยการผลิตขั้นกลาง จะทำให้ไม่สามารถใช้ทรัพยากรอย่างมีเหตุผลในอุตสาหกรรมต่างๆ ได้ ซึ่งหมายความว่า แม้ว่าจะมีการจัดการที่สมบูรณ์แบบภายในแต่ละบริษัทหรือส่วนย่อยของเศรษฐกิจ แต่เศรษฐกิจทั้งหมดก็ไม่สามารถปรับตัวได้อย่างมีประสิทธิภาพต่อการเปลี่ยนแปลงในความพร้อมของทรัพยากร สภาพการผลิต และความต้องการของผู้บริโภค
reviewed: true
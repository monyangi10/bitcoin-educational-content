question: สินค้าที่มีความสามารถในการขายสูงหมายถึงอะไร?
answer: ควรเป็นที่ต้องการของคนให้ได้มากที่สุดเท่าที่จะเป็นไปได้ ในส่วนใหญ่ของเวลา
wrong_answers:
  - มันควรจะเป็นที่ต้องการของคนเพียงไม่กี่คน, ส่วนใหญ่ของเวลา.
  - ควรเป็นที่ต้องการของคนจำนวนมากที่สุดเท่าที่จะเป็นไปได้ในบางครั้ง
  - มันควรเป็นที่ต้องการของคนบางกลุ่ม ในบางเวลา
explanation: |
  สินค้าที่มีความสามารถในการขายสูงคือสินค้าที่เป็นที่ต้องการอย่างกว้างขวางและสามารถแลกเปลี่ยนเป็นสินค้าอื่นหรือบริการได้อย่างง่ายดาย ซึ่งทำให้เหมาะสมสำหรับการใช้เป็นเงิน
reviewed: true
question: Какво означава една стока да има висока продаваемост?
answer: Тя трябва да бъде желана от възможно най-много хора през повечето време.
wrong_answers:
  - Тя трябва да бъде желана от малко хора през повечето време.
  - Тя трябва да бъде желана от възможно най-много хора, през определен период от време.
  - Тя трябва да бъде желана от малко хора, през определен период от време.
explanation: |
  Стока с висока продаваемост е широко желана
  и може лесно да се разменя за други стоки или услуги.
  Това я прави подходяща за използване като пари.
reviewed: true
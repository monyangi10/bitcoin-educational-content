question: None ikintu ciza gifise salability nyinshi bisobanura iki?
answer: Bikwiye kwipfuzwa n’abantu benshi bishobotse, kenshi na kenshi.
wrong_answers:
  - Bikwiye kwipfuzwa n’abantu bakeyi, kenshi na kenshi.
  - Bikwiye kwipfuzwa n’abantu benshi bishobotse, bimwe mu bihe.
  - Bikwiye kwipfuzwa n’abantu bakeyi, bimwe mu bihe.
explanation: |
  Ivyiza bigurishwa cane ni ivyo abantu benshi bipfuza .
  kandi bishobora guhindurwa bitagoranye n’ibindi bintu canke ibikorwa.
  Ivyo bituma ribereye gukoreshwa nk’amahera.
reviewed: true
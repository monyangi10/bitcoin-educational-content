question: एक अच्छे माल का हाई सेलबिलिटी (high salability) होने का मतलब है कि वो आसानी से और जल्दी बिक सकता है। यानी, लोग उसे खरीदने के लिए तैयार हैं और मार्केट में उसकी डिमांड अच्छी है। ऐसा माल आमतौर पर लिक्विड (liquid) होता है, मतलब उसे कैश में बदलना आसान होता है। उदाहरण के लिए, सोना या पॉपुलर मोबाइल फोन्स जैसी चीज़ें हाई सेलबिलिटी वाली होती हैं क्योंकि उन्हें बेचने के लिए खरीदार आसानी से मिल जाते हैं।
answer: इसे ज्यादातर लोगों द्वारा, ज्यादातर समय चाहा जाना चाहिए।
wrong_answers:
  - इसे ज्यादातर समय, कुछ ही लोगों द्वारा चाहा जाना चाहिए।
  - इसे ज़्यादा से ज़्यादा लोगों द्वारा कभी-कभी चाहा जाना चाहिए।
  - इसे कभी-कभार, कुछ ही लोगों द्वारा चाहा जाना चाहिए।
explanation: |
  एक अच्छा सामान जिसकी बिक्री अच्छी होती है वह है जिसकी चाहत सबको होती है
  और इसे आसानी से दूसरे सामान या सेवाओं के बदले बदला जा सकता है।
  यह इसे पैसे के तौर पर इस्तेमाल करने के लिए बिल्कुल सही बनाता है।
reviewed: true
question: Co to znaczy, że towar ma wysoką zbywalność?
answer: Jest pożądany przez jak największą liczbę osób, przez większość czasu.
wrong_answers:
  - Jest pożądany przez kilka osób, przez większość czasu.
  - Jest pożądany przez jak największą liczbę osób, przez pewien czas.
  - Jest pożądany przez kilka osób, przez pewien czas.
explanation: |
  Towar o wysokiej zbywalności to taki, który jest powszechnie pożądany
  i może być łatwo wymieniony na inne towary lub usługi.
  To sprawia, że nadaje się do wykorzystania jako pieniądz.
reviewed: true

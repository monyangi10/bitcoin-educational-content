question: Какво представлява понятието "времево предпочитание"?
answer: Времевите предпочитания са субективната оценка на стойността на бъдещите блага в сравнение с настоящите. При равни други условия настоящите блага са естествено предпочитани пред бъдещите.
wrong_answers:
  - Времевите предпочитания са обективната оценка на стойността на бъдещите блага в сравнение с настоящите.
  - Предпочитанието към времето е присъщото предпочитание към бъдещите стоки пред настоящите.
  - Времевите предпочитания са субективната оценка на стойността на настоящите блага в сравнение с бъдещите.
explanation: |
  Предпочитанието за време е субективната оценка на стойността
  на бъдещите блага в сравнение с настоящите. Тъй като ние сме
  смъртни, а бъдещето винаги е несигурно, естествено е да
  предпочитаме да имаме достъп до дадена стока сега, а не по-късно.
  Въпреки че предпочитанията към времето могат да се различават при отделните хора, поради
  поради множество фактори като култура, богатство, образование,
  физиология и т.н., предпочитанията към времето са винаги положителни,
  което означава, че при равни други условия ние винаги ценим настоящето
  повече от бъдещите блага.
reviewed: true
question: 時間偏好的概念是什麼？
answer: 時間偏好是對未來商品價值與現在商品價值的主觀評估。在其他條件相同的情況下，現在的物品比未來的物品更受青睞。
wrong_answers:
  - 時間偏好是將未來商品的價值與現在商品相比的客觀評估。
  - 時間偏好是指對未來商品的固有偏好，而非對現在商品的偏好。
  - 時間偏好是對現在商品與未來商品價值的主觀評估。
explanation: |
  時間偏好是對價值的主觀評估
  未來貨品與現在貨品的比較。由於我們
  我們都是凡人，未來總是不確定的，我們自然會
  寧願現在就有機會獲得好東西，也不要遲一步。
  雖然個人的時間偏好可能不同，但由於
  文化、財富、教育等多種因素、
  生理學等，時間偏好總是正面的、
  也就是說，在所有條件都相同的情況下，我們總是很重視現在。
  商品多於未來商品。
reviewed: true
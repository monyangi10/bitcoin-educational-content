question: समय प्राथमिकता (Time Preference) का कॉन्सेप्ट क्या है?
answer: समय पसंदगी (Time preference) भविष्य की चीज़ों की वर्तमान चीज़ों के मुकाबले व्यक्तिगत मूल्यांकन है। बाकी सब बराबर हो तो, वर्तमान की चीज़ें स्वाभाविक रूप से भविष्य की चीज़ों से ज़्यादा पसंद की जाती हैं।
wrong_answers:
  - समय प्राथमिकता भविष्य की वस्तुओं की वर्तमान वस्तुओं के मुकाबले मूल्य की वस्तुनिष्ठ मूल्यांकन है।
  - समय प्राथमिकता (Time preference) वह स्वाभाविक पसंद है जिसमें लोग भविष्य की चीज़ों को वर्तमान की चीज़ों पर तरजीह देते हैं।
  - समय प्राथमिकता वर्तमान सामानों की कीमत की भविष्य के सामानों के मुकाबले व्यक्तिगत आकलन है।
explanation: |
  समय प्राथमिकता (Time preference) मूल्य की व्यक्तिपरक (subjective) मूल्यांकन है।
  भविष्य की वस्तुओं की तुलना में वर्तमान वस्तुओं का। चूंकि हम
  मर्त्य, और भविष्य हमेशा अनिश्चित होता है, हम स्वाभाविक रूप से
  अच्छी चीज़ का अभी ही इस्तेमाल करना पसंद करूंगा, बजाय बाद के।
  जबकि समय की प्राथमिकता अलग-अलग लोगों में भिन्न हो सकती है, क्योंकि...
  कई सारे कारणों जैसे कि संस्कृति, धन, शिक्षा,
  फिजियोलॉजी, वगैरह में, समय की प्राथमिकताएँ हमेशा सकारात्मक होती हैं,
  इसका मतलब है कि सभी चीज़ें बराबर होने पर, हम हमेशा वर्तमान को ज़्यादा अहमियत देते हैं।
  माल भविष्य के माल से ज़्यादा।
reviewed: true
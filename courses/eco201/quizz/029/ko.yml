question: 시간 기본 설정의 개념은 무엇인가요?
answer: 시간 선호도는 현재 상품과 비교한 미래 상품의 가치에 대한 주관적인 평가입니다. 다른 모든 조건이 동일하다면 본질적으로 현재 재화가 미래 재화보다 선호됩니다.
wrong_answers:
  - 시간 선호도는 현재 상품과 비교하여 미래 상품의 가치를 객관적으로 평가하는 것입니다.
  - 시간 선호는 현재 재화보다 미래 재화에 대한 내재적 선호입니다.
  - 시간 선호도는 미래 재화와 비교하여 현재 재화의 가치를 주관적으로 평가하는 것입니다.
explanation: |
  시간 선호도는 현재 재화와 비교하여 미래 재화의 가치를
  에 대한 주관적인 평가입니다. 우리는
  인간이고 미래는 항상 불확실하기 때문에 자연스럽게
  나중보다는 지금 재화에 접근하는 것을 선호합니다.
  시간 선호도는 개인마다 다를 수 있지만, 다음과 같은 다양한 요인으로 인해
  문화, 재산, 교육, 생리학 등
  생리학 등 수많은 요인으로 인해 개인마다 다를 수 있지만, 시간 선호도는 항상 긍정적입니다,
  즉, 모든 것이 평등할 때 우리는 항상 미래의 재화보다 현재의
  상품을 더 중요하게 생각합니다.

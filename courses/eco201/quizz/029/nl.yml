question: Wat is het concept van tijdvoorkeur?
answer: Tijdsvoorkeur is de subjectieve evaluatie van de waarde van toekomstige goederen in vergelijking met huidige goederen. Als alle andere factoren gelijk blijven, hebben huidige goederen inherent de voorkeur boven toekomstige goederen.
wrong_answers:
  - Tijdsvoorkeur is de objectieve evaluatie van de waarde van toekomstige goederen in vergelijking met huidige goederen.
  - Tijdsvoorkeur is de inherente voorkeur voor toekomstige goederen boven huidige goederen.
  - Tijdsvoorkeur is de subjectieve evaluatie van de waarde van huidige goederen in vergelijking met toekomstige goederen.
explanation: |
  Tijdsvoorkeur is de subjectieve evaluatie van de waarde
  van toekomstige goederen in vergelijking met huidige goederen. Omdat we
  sterfelijk zijn en de toekomst altijd onzeker is, hebben we natuurlijk
  liever nu dan later toegang hebben tot een goed.
  Hoewel tijdsvoorkeur kan verschillen tussen individuen
  door een groot aantal factoren zoals cultuur, rijkdom, opleiding,
  fysiologie, enz. is tijdsvoorkeur altijd positief,
  wat betekent dat we, als alles gelijk blijft, altijd meer waarde hechten aan huidige
  goederen meer waarderen dan toekomstige goederen.
reviewed: true
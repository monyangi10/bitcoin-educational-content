question: จุดประสงค์สูงสุดของกิจกรรมทางเศรษฐกิจตามที่ Carl Menger กล่าวคืออะไร?
answer: จุดประสงค์สูงสุดของกิจกรรมทางเศรษฐกิจคือการบริโภค
wrong_answers:
  - จุดประสงค์สูงสุดของกิจกรรมทางเศรษฐกิจคือการผลิต
  - จุดประสงค์สูงสุดของกิจกรรมทางเศรษฐกิจคือการออม
  - จุดประสงค์สูงสุดของกิจกรรมทางเศรษฐกิจคือการลงทุน
explanation: |
  ตามที่คาร์ล เมงเกอร์กล่าวไว้ สินค้าจะถือว่าเป็นสินค้าทางเศรษฐกิจ (มีมูลค่า) ก็ต่อเมื่อพวกมันทำหน้าที่เป็นเครื่องมือไปสู่จุดหมายที่บุคคลเลือกและให้คุณค่า ดังนั้น สำหรับเมงเกอร์ จุดเริ่มต้นของการวิเคราะห์ทางเศรษฐกิจคือสินค้าผู้บริโภค หรือสินค้าขั้นสุดท้าย เนื่องจากพวกมันเป็นตัวแทนของจุดประสงค์สูงสุดของกิจกรรมทางเศรษฐกิจ
reviewed: true
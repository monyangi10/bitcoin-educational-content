question: 칼 멩거에 따르면 경제 활동의 궁극적인 목적은 무엇인가요?
answer: 경제 활동의 궁극적인 목적은 소비입니다.
wrong_answers:
  - 경제 활동의 궁극적인 목적은 생산입니다.
  - 경제 활동의 궁극적인 목적은 저축입니다.
  - 경제 활동의 궁극적인 목적은 투자입니다.
explanation: |
  칼 멩거에 따르면, 상품은 목적의 수단으로 사용되기 때문에
  경제적 재화(가치 있는)는 목적을 위한 수단으로 사용되기 때문에
  수단으로 사용되기 때문입니다. 따라서 멩거에게
  경제 분석의 출발점은 소비재입니다,
  또는 최종재, 즉 경제 활동의 궁극적인 목적을 나타내는
  경제 활동입니다.
reviewed: true
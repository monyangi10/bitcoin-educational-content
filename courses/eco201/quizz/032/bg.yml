question: Каква е крайната цел на икономическата дейност според Карл Менгер?
answer: Крайната цел на икономическата дейност е потреблението.
wrong_answers:
  - Крайната цел на икономическата дейност е производството.
  - Крайната цел на икономическата дейност е спестяването.
  - Крайната цел на икономическата дейност са инвестициите.
explanation: |
  Според Карл Менгер стоките се разглеждат само като
  икономически блага (ценени), защото служат като средство за постигане на цели
  избрани от индивидите. Следователно за Менгер,
  отправната точка на икономическия анализ са потребителските стоки,
  или крайните стоки, тъй като те представляват крайната цел на
  икономическата дейност.
reviewed: true

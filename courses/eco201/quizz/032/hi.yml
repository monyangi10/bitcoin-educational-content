question: कार्ल मेंगर के अनुसार आर्थिक गतिविधि का अंतिम उद्देश्य क्या है?
answer: आर्थिक गतिविधि का आखिरी मकसद खपत (कंजम्प्शन) ही होता है।
wrong_answers:
  - आर्थिक गतिविधि का अंतिम उद्देश्य उत्पादन है।
  - आर्थिक गतिविधि का अंतिम उद्देश्य बचत होता है।
  - आर्थिक गतिविधि का आखिरी मकसद निवेश होता है।
explanation: |
  कार्ल मेंगर के अनुसार, सामान तभी माने जाते हैं...
  आर्थिक वस्तुएँ (मूल्यवान) क्योंकि वे उद्देश्यों के साधन के रूप में काम करती हैं
  लोगों द्वारा चुना गया और महत्व दिया गया। इसलिए, मेंगर के लिए,
  आर्थिक विश्लेषण की शुरुआत उपभोक्ता वस्तुओं से होती है,
  या फाइनल सामान, क्योंकि ये आखिरी मकसद को दिखाते हैं
  आर्थिक गतिविधि।
reviewed: true
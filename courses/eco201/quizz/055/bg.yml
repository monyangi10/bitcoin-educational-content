question: Каква е ролята на аксиомите в австрийските икономически разсъждения?
answer: Аксиомите са основни елементи, от които могат да се правят логически изводи.
wrong_answers:
  - Аксиомите са без значение в австрийските икономически разсъждения.
  - Аксиомите се използват за установяване на връзки между променливите въз основа на емпирични данни.
  - Аксиомите се използват за потвърждаване или отхвърляне на хипотези чрез временни експерименти.
explanation: |
  В австрийските икономически разсъждения аксиомите играят решаваща роля. Те са
  основни елементи, от които могат да се правят логически изводи.
reviewed: true
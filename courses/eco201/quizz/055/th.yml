question: บทบาทของสัจพจน์ในเหตุผลทางเศรษฐศาสตร์แบบออสเตรียคืออะไร?
answer: สัจพจน์เป็นองค์ประกอบพื้นฐานที่สามารถทำการอนุมานทางตรรกะได้
wrong_answers:
  - หลักการเป็นสิ่งที่ไม่เกี่ยวข้องในเหตุผลทางเศรษฐศาสตร์แบบออสเตรีย
  - สัจพจน์ถูกใช้เพื่อสร้างความสัมพันธ์ระหว่างตัวแปรตามข้อมูลเชิงประจักษ์
  - สัจพจน์ถูกใช้เพื่อยืนยันหรือหักล้างสมมติฐานผ่านการทดลองชั่วคราว
explanation: |
  ในเหตุผลทางเศรษฐศาสตร์แบบออสเตรีย, สัจพจน์มีบทบาทสำคัญ. พวกมันเป็นองค์ประกอบพื้นฐานที่สามารถทำการอนุมานเชิงตรรกะได้.
reviewed: true
question: ऑस्ट्रियन इकोनॉमिक्स में एक्सिओम्स (मूल सिद्धांतों) की क्या भूमिका है?
answer: एक्सिओम्स (Axioms) बुनियादी Elements होते हैं जिनसे तार्किक निष्कर्ष (logical deductions) निकाले जा सकते हैं।
wrong_answers:
  - ऑस्ट्रियन इकोनॉमिक रीजनिंग में एक्सिओम्स (मूल सिद्धांत) का कोई महत्व नहीं होता।
  - एक्सिओम्स (Axioms) का इस्तेमाल अनुभवजन्य डेटा के आधार पर वेरिएबल्स के बीच रिश्ते स्थापित करने के लिए किया जाता है।
  - अभिगृमाणों (Axioms) का उपयोग अस्थायी प्रयोगों के माध्यम से परिकल्पनाओं (hypotheses) को सत्यापित या खंडन करने के लिए किया जाता है।
explanation: |
  ऑस्ट्रियाई अर्थशास्त्र के तर्क में, स्वयंसिद्ध (axioms) का बहुत महत्वपूर्ण रोल होता है। वे
  मूलभूत Elements जिससे तार्किक निष्कर्ष निकाले जा सकते हैं।
reviewed: true
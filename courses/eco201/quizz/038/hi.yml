question: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी में रिलेटिव प्राइसेस (सापेक्ष कीमतों) की क्या भूमिका है?
answer: रिश्तेदार कीमतें आर्थिक एजेंटों को समन्वयित करने के लिए महत्वपूर्ण हैं।
wrong_answers:
  - ऑस्ट्रियन बिज़नेस साइकिल थ्योरी में रिलेटिव प्राइसेस (सापेक्ष कीमतें) का कोई ख़ास रोल नहीं होता।
  - रिश्तेदार कीमतें रोज़गार के स्तर को तय करने में अहम होती हैं।
  - रिलेटिव प्राइसेस (सापेक्ष कीमतें) जीडीपी के स्तर को निर्धारित करने में महत्वपूर्ण होती हैं।
explanation: |
  ऑस्ट्रियन स्कूल रिलेटिव प्राइसेस (सापेक्ष कीमतों) के महत्व पर ज़ोर देता है।
  आर्थिक एजेंटों को समन्वित करें। सापेक्ष कीमतें वास्तविक कमी को दर्शाती हैं।
  उत्पादन के कारकों को और आर्थिक एजेंट्स को अपने फैसले तर्कसंगत बनाने की अनुमति देता है।
reviewed: true
question: บทบาทของราคาสัมพัทธ์ในทฤษฎีวัฏจักรธุรกิจของออสเตรียคืออะไร?
answer: ราคาสัมพัทธ์มีความสำคัญในการประสานงานตัวแทนทางเศรษฐกิจ
wrong_answers:
  - ราคาสัมพัทธ์ไม่มีความเกี่ยวข้องในทฤษฎีวัฏจักรธุรกิจของออสเตรีย
  - ราคาสัมพัทธ์มีความสำคัญในการกำหนดระดับการจ้างงาน
  - ราคาสัมพัทธ์มีความสำคัญในการกำหนดระดับของ GDP
explanation: |
  สำนักออสเตรียเน้นย้ำถึงความสำคัญของราคาสัมพัทธ์ในการประสานงานตัวแทนทางเศรษฐกิจ ราคาสัมพัทธ์สะท้อนถึงความขาดแคลนที่แท้จริงของปัจจัยการผลิตและช่วยให้ตัวแทนทางเศรษฐกิจสามารถใช้เหตุผลในการตัดสินใจของพวกเขา
reviewed: true
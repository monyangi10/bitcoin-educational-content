question: Каква е ролята на относителните цени в австрийската теория за бизнес цикъла?
answer: Относителните цени са важни за координацията на икономическите агенти.
wrong_answers:
  - В австрийската теория за бизнес цикъла относителните цени са без значение.
  - Относителните цени са важни за определяне на равнището на заетост.
  - Относителните цени са важни за определяне на равнището на БВП.
explanation: |
  Австрийската школа настоява за значението на относителните цени за
  координиране на икономическите агенти. Относителните цени отразяват действителния недостиг на
  производствените фактори и позволяват на икономическите агенти да рационализират своите решения.
reviewed: true

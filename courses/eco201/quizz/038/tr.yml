question: Avusturya İş Döngüsü Teorisi'nde göreli fiyatların rolü nedir?
answer: Göreceli fiyatlar ekonomik aktörleri koordine etmek için önemlidir.
wrong_answers:
  - Avusturya İş Döngüsü Teorisi'nde göreli fiyatlar önemsizdir.
  - Göreceli fiyatlar istihdam seviyesinin belirlenmesi açısından önemlidir.
  - Göreceli fiyatlar GSYH seviyesini belirlemek için önemlidir.
explanation: |
  Avusturya Okulu, göreli fiyatların aşağıdakiler için öneminde ısrar eder
  ekonomik aktörleri koordine eder. Göreceli fiyatlar gerçek kıtlığı yansıtır
  ve ekonomik aktörlerin kararlarını rasyonalize etmelerini sağlar.
reviewed: true
question: Wat is de rol van relatieve prijzen in de Oostenrijkse theorie van de conjunctuurcyclus?
answer: Relatieve prijzen zijn belangrijk om economische agenten te coördineren.
wrong_answers:
  - Relatieve prijzen zijn irrelevant in de Oostenrijkse theorie van de conjunctuurcyclus.
  - Relatieve prijzen zijn belangrijk om het werkgelegenheidsniveau te bepalen.
  - Relatieve prijzen zijn belangrijk om het BBP-niveau te bepalen.
explanation: |
  De Oostenrijkse School hamert op het belang van relatieve prijzen om
  economische agenten te coördineren. Relatieve prijzen weerspiegelen de werkelijke schaarste
  van productiefactoren en stellen economische agenten in staat om hun beslissingen te rationaliseren.
reviewed: true
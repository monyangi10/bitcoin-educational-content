question: 오스트리아 경기순환 이론에서 상대가격의 역할은 무엇인가요?
answer: 상대적 가격은 경제 주체들을 조정하는 데 중요합니다.
wrong_answers:
  - 오스트리아 경기순환 이론에서 상대적 가격은 관련이 없습니다.
  - 상대적인 가격은 고용 수준을 결정하는 데 중요합니다.
  - 상대적 가격은 GDP 수준을 결정하는 데 중요합니다.
explanation: |
  오스트리아 학파는 상대적 가격의 중요성을 다음과 같이 주장합니다
  경제 주체들을 조정하는 데 상대적 가격의 중요성을 강조합니다. 상대 가격은 생산 요소의 실제 희소성을 반영하고
  생산 요소의 실제 희소성을 반영하고 경제 주체들이 자신의 결정을 합리화할 수 있게 해줍니다.
reviewed: true
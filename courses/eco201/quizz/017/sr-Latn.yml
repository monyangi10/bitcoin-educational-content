question: Prema austrijskim ekonomistima, koja je pokretačka snaga iza procesa društvene saradnje?
answer: Produktivna prednost koja proizlazi iz podele rada.
wrong_answers:
  - Želja za socijalnom interakcijom i zajednicom.
  - Potreba za zaštitom i sigurnošću.
  - Potraga za bogatstvom i moći.
explanation: |
  Austrijski ekonomisti, posebno Ludwig Von Mises, zaključuju da je produktivna prednost koja proizlazi iz podele rada pokretačka snaga procesa društvene saradnje. To je zato što su pojedinci uvek u boljoj poziciji kada se specijalizuju u svom radu i upuštaju u razmene.
reviewed: true
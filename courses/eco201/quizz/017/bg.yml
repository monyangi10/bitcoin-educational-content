question: Според австрийските икономисти коя е движещата сила на процеса на социално сътрудничество?
answer: Производственото предимство, произтичащо от разделението на труда.
wrong_answers:
  - Желанието за социално взаимодействие и общност.
  - Нуждата от защита и сигурност.
  - Стремеж към богатство и власт.
explanation: |
  Австрийските икономисти, особено Лудвиг фон Мизес, заключават
  че производственото предимство, произтичащо от разделението на труда
  е движещата сила на процеса на социално
  сътрудничество. Това е така, защото индивидите винаги са по-добре
  когато се специализират в работата си и участват в
  размяна.
reviewed: true

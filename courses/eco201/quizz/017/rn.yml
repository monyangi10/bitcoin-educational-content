question: Nk’uko abahinga mu vy’ubutunzi bo muri Otirishi babivuga, ni igiki gituma abantu bagira amashirahamwe?
answer: Inyungu y’umwimbu iva mu kugabanganya ibikorwa.
wrong_answers:
  - Icipfuzo co gukorana n’abandi no gukorera hamwe.
  - Ivy’uko umuntu akeneye gucungegwa no kuba mumutekano.
  - ukurondera ubutunzi hamwe b'ububasha(igiti).
explanation: |
  Abahinga mu vy’ubutunzi bo muri Otirishi, canecane Ludwig Von Mises, barasozera.
  ko akamaro k’umwimbu kava mu kugabura ibikorwa .
  inguvu nizo ziri inyuma n'imibano
  n'ukuja hamwe. kubera ko abantu iminsi kurusha ko banonosora mu bikorwa kandi bakaja muguhanahana.
reviewed: true

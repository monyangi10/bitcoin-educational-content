question: 오스트리아 경제학자들에 따르면 사회적 협력의 원동력은 무엇일까요?
answer: 분업으로 인한 생산적 이점.
wrong_answers:
  - 사회적 상호작용과 커뮤니티에 대한 열망.
  - 보호 및 보안의 필요성.
  - 부와 권력을 추구합니다.
explanation: |
  오스트리아 경제학자, 특히 루트비히 폰 미제스는 다음과 같이 결론을 내립니다
  분업에서 발생하는 생산적 이점은
  노동의 분업으로 인한 생산적 이점이 사회적
  협력. 개인은 항상 더 나은 성과를 내기 때문입니다
  자신의 일을 전문적으로 하고 다른 사람과
  교환.
reviewed: true
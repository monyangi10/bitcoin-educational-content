question: Według ekonomistów austriackich, co jest siłą napędową procesu współpracy społecznej?
answer: Korzyść produkcyjna wynikająca z podziału pracy.
wrong_answers:
  - Pragnienie interakcji społecznych i tworzenia społeczności.
  - Potrzeba ochrony i bezpieczeństwa.
  - Pogoń za bogactwem i władzą.
explanation: |
  Ekonomiści austriaccy, w szczególności Ludwig Von Mises, doszli do wniosku, że przewaga produkcyjna wynikająca z podziału pracy jest siłą napędową procesu współpracy społecznej. Dzieje się tak, ponieważ jednostki są zawsze w lepszej sytuacji, gdy specjalizują się w swojej pracy i angażują się w wymianę.
reviewed: true

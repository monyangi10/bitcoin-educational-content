question: Według austriackich ekonomistów, co jest siłą napędową procesu współpracy społecznej?
answer: Korzyść produkcyjna wynikająca z podziału pracy.
wrong_answers:
  - Pragnienie interakcji społecznych i społeczności.
  - Potrzeba ochrony i bezpieczeństwa.
  - Pogoń za bogactwem i władzą.
explanation: |
  Austriaccy ekonomiści, w szczególności Ludwig Von Mises, doszli do wniosku, że
  że przewaga produkcyjna wynikająca z podziału pracy jest siłą napędową procesu
  pracy jest siłą napędową procesu współpracy społecznej
  współpracy. Dzieje się tak, ponieważ jednostki są zawsze w lepszej
  lepiej, gdy specjalizują się w swojej pracy i angażują się w wymianę
  wymianę.
reviewed: true
question: ตามที่นักเศรษฐศาสตร์ออสเตรียกล่าว แรงผลักดันเบื้องหลังกระบวนการความร่วมมือทางสังคมคืออะไร?
answer: ข้อได้เปรียบในการผลิตที่เกิดจากการแบ่งงาน
wrong_answers:
  - ความปรารถนาที่จะมีปฏิสัมพันธ์ทางสังคมและชุมชน
  - ความต้องการในการปกป้องและความปลอดภัย
  - การแสวงหาความมั่งคั่งและอำนาจ
explanation: |
  นักเศรษฐศาสตร์ชาวออสเตรีย โดยเฉพาะอย่างยิ่ง Ludwig Von Mises สรุปว่า
  ข้อได้เปรียบในการผลิตที่เกิดจากการแบ่งงานกันทำ
  เป็นแรงขับเคลื่อนเบื้องหลังของกระบวนการความร่วมมือทางสังคม
  เนื่องจากบุคคลจะมีความเป็นอยู่ที่ดีขึ้นเสมอเมื่อพวกเขาเชี่ยวชาญในงานของตนและมีส่วนร่วมในการแลกเปลี่ยน
reviewed: true
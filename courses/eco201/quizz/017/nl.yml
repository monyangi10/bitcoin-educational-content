question: Wat is volgens Oostenrijkse economen de drijvende kracht achter het proces van sociale samenwerking?
answer: Het productieve voordeel dat voortvloeit uit de arbeidsdeling.
wrong_answers:
  - Het verlangen naar sociale interactie en gemeenschap.
  - De behoefte aan bescherming en veiligheid.
  - Het streven naar rijkdom en macht.
explanation: |
  Oostenrijkse economen, vooral Ludwig Von Mises, concluderen
  dat het productieve voordeel dat voortvloeit uit de arbeidsverdeling
  arbeid de drijvende kracht is achter het proces van sociale
  samenwerking. Dit komt omdat individuen altijd beter
  wanneer ze zich specialiseren in hun werk en deelnemen aan
  uitwisselingen.
reviewed: true
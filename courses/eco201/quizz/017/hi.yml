question: ऑस्ट्रियाई अर्थशास्त्रियों के मुताबिक, सामाजिक सहयोग की प्रक्रिया की असली वजह क्या है?
answer: श्रम विभाजन से होने वाला उत्पादक लाभ।
wrong_answers:
  - सामाजिक मेलजोल और समुदाय की इच्छा।
  - सुरक्षा और सुरक्षा की ज़रूरत।
  - धन और ताकत की तलाश।
explanation: |
  ऑस्ट्रियाई अर्थशास्त्री, खासकर लुडविग वॉन मिसेस, ने निष्कर्ष निकाला है कि...
  कि श्रम विभाजन से उत्पन्न होने वाला उत्पादक लाभ
  मेहनत ही समाज की प्रगति की असली ताकत है।
  सहयोग। ऐसा इसलिए है क्योंकि व्यक्ति हमेशा बेहतर
  जब वे अपने काम में माहिर हो जाते हैं और लग जाते हैं
  विनिमय।
reviewed: true
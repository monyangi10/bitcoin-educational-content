question: Avusturyalı ekonomistlere göre, sosyal işbirliği sürecinin arkasındaki itici güç nedir?
answer: İşbölümünden kaynaklanan üretken avantaj.
wrong_answers:
  - Sosyal etkileşim ve topluluk arzusu.
  - Koruma ve güvenlik ihtiyacı.
  - Zenginlik ve güç arayışı.
explanation: |
  Avusturyalı ekonomistler, özellikle de Ludwig Von Mises şu sonuca varmıştır
  bölünmesinden kaynaklanan üretken avantajın
  emek, sosyalleşme sürecinin arkasındaki itici güçtür
  işbirliği. Çünkü bireyler her zaman daha iyidir
  işlerinde uzmanlaştıklarında ve
  değişimler.
reviewed: true
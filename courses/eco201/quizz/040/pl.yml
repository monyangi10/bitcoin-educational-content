question: Jakie są ostateczne konsekwencje spadku stóp procentowych w wyniku wzrostu akcji kredytowej zgodnie z austriacką teorią cyklu koniunkturalnego?
answer: Gospodarka wchodzi w recesję; ceny aktywów spadają, płace realne spadają, ceny konsumpcyjne spadają, a wyprodukowane dobra zalegają.
wrong_answers:
  - Gospodarka wchodzi w fazę boomu; ceny aktywów rosną, płace realne rosną, ceny konsumpcyjne rosną, a wyprodukowane dobra zalegają.
  - Gospodarka wchodzi w stagnację; ceny aktywów pozostają takie same, płace realne pozostają takie same, ceny konsumpcyjne pozostają takie same oraz zapasy wyprodukowanych dóbr pozostają takie same.
  - Gospodarka wchodzi w deflację; ceny aktywów spadają, płace realne rosną, ceny konsumpcyjne spadają, a wyprodukowane dobra zalegają.
explanation: |
  Zgodnie z austriacką teorią cyklu koniunkturalnego, gdy następuje
  spadek stóp procentowych spowodowany wzrostem akcji kredytowej, gospodarka wchodzi w recesję; ceny aktywów spadają, płace realne spadają, ceny konsumpcyjne spadają, a wyprodukowane dobra zalegają. Dzieje się tak, ponieważ spadek stóp procentowych prowadzi do błędnej alokacji
  kapitału, co ostatecznie prowadzi do recesji.
reviewed: true

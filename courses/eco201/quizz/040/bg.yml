question: Какви са евентуалните последици от намаляването на лихвените проценти поради увеличаването на кредита според австрийската теория за бизнес цикъла?
answer: Икономиката навлиза в рецесия; цените на активите спадат, реалните заплати намаляват, потребителските цени спадат, а запасите се натрупват.
wrong_answers:
  - Икономиката навлиза в период на подем; цените на активите се повишават, реалните заплати се увеличават, потребителските цени се повишават, а запасите намаляват.
  - Икономиката навлиза в стагнация; цените на активите остават същите, реалните заплати остават същите, потребителските цени остават същите, а запасите остават същите.
  - Икономиката навлиза в дефлация; цените на активите спадат, реалните заплати се увеличават, потребителските цени спадат, а запасите се увеличават.
explanation: |
  Според австрийската теория за бизнес цикъла, когато има
  на лихвените проценти поради увеличаване на кредита, икономиката навлиза в
  цените на активите се понижават, реалните заплати намаляват, потребителските цени спадат, а запасите
  и се натрупват запаси. Това се дължи на факта, че намаляването на лихвените проценти води до неправилно разпределение на
  на капитала, което в крайна сметка води до рецесия.
reviewed: true
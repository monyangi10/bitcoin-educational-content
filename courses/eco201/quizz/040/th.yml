question: ผลที่ตามมาของการลดลงของอัตราดอกเบี้ยเนื่องจากการเพิ่มขึ้นของเครดิตตามทฤษฎีวัฏจักรธุรกิจของออสเตรียคืออะไร?
answer: เศรษฐกิจเข้าสู่ภาวะถดถอย; ราคาสินทรัพย์ลดลง ค่าจ้างที่แท้จริงลดลง ราคาผู้บริโภคลดลง และสินค้าคงคลังสะสมเพิ่มขึ้น
wrong_answers:
  - เศรษฐกิจเข้าสู่ช่วงขาขึ้น; ราคาสินทรัพย์เพิ่มขึ้น, ค่าจ้างที่แท้จริงเพิ่มขึ้น, ราคาผู้บริโภคเพิ่มขึ้น, และสินค้าคงคลังลดลง.
  - เศรษฐกิจเข้าสู่ภาวะชะงักงัน; ราคาสินทรัพย์คงเดิม, ค่าจ้างที่แท้จริงคงเดิม, ราคาผู้บริโภคคงเดิม, และสินค้าคงคลังคงเดิม.
  - เศรษฐกิจเข้าสู่ภาวะเงินฝืด; ราคาสินทรัพย์ลดลง ค่าจ้างที่แท้จริงเพิ่มขึ้น ราคาผู้บริโภคลดลง และสินค้าคงคลังเพิ่มขึ้น
explanation: |
  ตามทฤษฎีวัฏจักรธุรกิจของออสเตรีย เมื่อมีการลดลงของอัตราดอกเบี้ยเนื่องจากการเพิ่มขึ้นของเครดิต เศรษฐกิจจะเข้าสู่ภาวะถดถอย; ราคาสินทรัพย์ลดลง ค่าจ้างที่แท้จริงลดลง ราคาผู้บริโภคลดลง และสินค้าคงคลังสะสมเพิ่มขึ้น นี่เป็นเพราะการลดลงของอัตราดอกเบี้ยนำไปสู่การจัดสรรทุนที่ผิดพลาด ซึ่งในที่สุดจะส่งผลให้เกิดภาวะถดถอย
reviewed: true
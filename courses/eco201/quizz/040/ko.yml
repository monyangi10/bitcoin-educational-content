question: 오스트리아 경기순환 이론에 따르면 신용 증가로 인한 이자율 하락의 최종 결과는 어떻게 되나요?
answer: 경제가 불황에 접어들면 자산 가격이 하락하고 실질 임금이 감소하며 소비자 물가가 하락하고 재고가 쌓이게 됩니다.
wrong_answers:
  - 경제가 호황에 접어들면 자산 가격이 상승하고 실질 임금이 상승하며 소비자 물가가 상승하고 재고가 감소합니다.
  - 자산 가격, 실질 임금, 소비자 물가, 재고가 동일하게 유지되는 등 경제가 침체기에 접어듭니다.
  - 경제는 디플레이션에 진입하여 자산 가격은 하락하고 실질 임금은 상승하며 소비자 물가는 하락하고 재고는 증가합니다.
explanation: |
  오스트리아 경기순환 이론에 따르면, 다음과 같은 상황이 발생하면
  신용 증가로 인한 금리 하락, 경제는 경기 침체에 들어갑니다
  자산 가격 하락, 실질 임금 하락, 소비자 물가 하락, 재고
  쌓이게 됩니다. 이는 이자율 하락이 자본의 잘못된 배분으로 이어지기 때문입니다
  자본의 잘못된 배분으로 이어져 결국 경기 침체로 이어지기 때문입니다.
reviewed: true
question: 根據奧地利商業週期理論，由於信貸增加而導致利率下降的最終結果是什麼？
answer: 經濟進入衰退期；資產價格下跌、實際工資下降、消費者價格下跌、存貨囤積。
wrong_answers:
  - 經濟進入景氣；資產價格上漲、實際工資增加、消費者價格上漲、庫存減少。
  - 經濟進入停滯；資產價格維持不變、實際工資維持不變、消費者價格維持不變、庫存維持不變。
  - 經濟進入通縮；資產價格下跌、實際工資增加、消費者價格下跌、庫存增加。
explanation: |
  根據奧地利商業週期理論，當有
  由於信貸增加而導致利率下降，經濟便會進入一個
  衰退；資產價格下跌、實際工資下降、消費者價格下跌，以及庫存下降。
  堆積。這是因為利率下降導致錯配
  的資本，最終導致經濟衰退。
reviewed: true
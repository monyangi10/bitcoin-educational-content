question: Ni ingaruka izihe zishobora gushika iyo inyungu zigabanutse ivuye k’ukwiyongera kw’ingurane hakurikijwe inyigisho y’Ubucuruzi y’abanya otirishi?
answer: Ubutunzi butangura gusubira inyuma; ibiciro vy’ibidandazwa biragabanuka, imishahara iragabanuka, ibiciro vy’abaguzi biragabanuka, n’ibintu vy’ububiko biba vyinshi cane.
wrong_answers:
  - Ubutunzi butangura gutera iterambere; ibiciro vy’ibidandazwa biraduga, umushahara nyawo uraduga, ibiciro vy’abaguzi biraduga, n’ibintu biri mu bubiko biragabanuka.
  - Ubutunz buhagarara; ibiciro vy’ibidandazwa biguma ari uko biri, umushahara uguma ari umwe, ibiciro vy’abaguzi biguma ari uko biri, n’ibintu biri mu bubiko biguma ari uko biri.
  - Ubutunzi bwinjira mu gihe c’ugutakaza agaciro; ibiciro vy’itunga biragabanuka, umushahara nyawo uragwira, ibiciro vy’abaguzi biragabanuka, n’ibintu biri mu bubiko biraduga.
explanation: |
  Dukurikije inyigisho y’i Otirishi yerekeye uruzitiro rw’ubudandaji, iyo hari .
  iyo inyungu zigabanutse bivuye ku kwiyongera kw’inguzare, ubutunzi bwinjira mu gihe co
  gusubira inyuma; Ibiciro vy'ibidandanzwa biragabanuka, umushahara uragabanuka, ibiciro vy'abaguzi biragabanuka, n'ububiko
  buruzura. Ivyo ni kubera ko iyo inyungu zigabanutse bituma habaho ugutanga imitahe nabi .
  y’ibidandazwa, ivyo bikaba bituma amaherezo haba ugusubira inyuma kw’ubutunzi.
reviewed: true

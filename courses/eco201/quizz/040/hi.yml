question: ऑस्ट्रियन बिजनेस साइकिल थ्योरी के मुताबिक, क्रेडिट बढ़ने की वजह से ब्याज दरों में कमी आने के आखिरी नतीजे क्या होते हैं?
answer: अर्थव्यवस्था मंदी में चली जाती है; संपत्ति की कीमतें गिर जाती हैं, वास्तविक मजदूरी कम हो जाती है, उपभोक्ता कीमतें गिर जाती हैं, और इन्वेंटरी जमा हो जाती है।
wrong_answers:
  - अर्थव्यवस्था में तेजी आ जाती है; संपत्ति की कीमतें बढ़ जाती हैं, वास्तविक मजदूरी बढ़ जाती है, उपभोक्ता कीमतें बढ़ जाती हैं, और स्टॉक कम हो जाता है।
  - अर्थव्यवस्था में ठहराव आ जाता है; संपत्ति की कीमतें वही रहती हैं, वास्तविक मजदूरी वही रहती है, उपभोक्ता कीमतें वही रहती हैं, और स्टॉक भी वही रहता है।
  - अर्थव्यवस्था में मंदी आ जाती है; संपत्ति की कीमतें गिर जाती हैं, वास्तविक मजदूरी बढ़ जाती है, उपभोक्ता कीमतें गिर जाती हैं, और स्टॉक बढ़ जाता है।
explanation: |
  ऑस्ट्रियन बिज़नेस साइकिल थ्योरी के मुताबिक, जब होता है
  ब्याज दरों में कमी होने के कारण कर्ज़ में बढ़ोतरी होती है, और अर्थव्यवस्था में प्रवेश करती है
  मंदी; संपत्ति की कीमतें गिरती हैं, वास्तविक मजदूरी कम होती है, उपभोक्ता कीमतें गिरती हैं, और स्टॉक
  इकट्ठा हो जाता है। ऐसा इसलिए होता है क्योंकि ब्याज दरों में कमी से संसाधनों का गलत आवंटन हो जाता है।
  पूंजी की कमी, जिसका अंत में मंदी हो जाता है।
reviewed: true
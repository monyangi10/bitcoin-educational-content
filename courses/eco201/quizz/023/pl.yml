question: Dlaczego problem koordynacji w podziale pracy powraca w większych społecznościach?
answer: Ponieważ ludzie są ograniczeni swoimi możliwościami poznawczymi, a społecznie akceptowany pomiar wartości wkładów w wymianę jest skomplikowanym problemem.
wrong_answers:
  - Ponieważ ludzie nie są zainteresowani współpracą z większymi grupami i wolą mniejsze społeczności.
  - Ponieważ większe społeczności mają więcej zasobów, co prowadzi do mniejszej potrzeby podziału pracy.
  - Ponieważ większe społeczności mają więcej konfliktów, co utrudnia koordynację.
explanation: |
  W większych społecznościach niemożliwe jest, aby dana osoba
  utrzymała i zapamiętała stabilne relacje społeczne z więcej niż
  ponad 150 osobami, co sprawia, że system reputacji
  nie wystarczy do przezwyciężenia dylematu więźnia na dużą skalę.
  Ponadto ocena wartości wkładu w wymianę jest złożonym problemem w większych społecznościach.
reviewed: true

question: Dlaczego problem koordynacji w podziale pracy powraca w większych społecznościach?
answer: Ponieważ ludzie są ograniczeni swoimi możliwościami poznawczymi, a społecznie akceptowany pomiar wartości wkładów w Exchange jest nietrywialnym problemem.
wrong_answers:
  - Ponieważ ludzie nie są zainteresowani współpracą z większymi grupami i wolą mniejsze społeczności.
  - Ponieważ większe społeczności mają więcej zasobów, co prowadzi do mniejszej potrzeby podziału pracy.
  - Ponieważ większe społeczności mają więcej konfliktów, co utrudnia koordynację.
explanation: |

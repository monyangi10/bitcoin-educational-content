question: बड़े समुदायों में मजदूरी के बँटवारे में समन्वय की समस्या फिर क्यों सामने आती है?
answer: क्योंकि इंसान अपनी सोचने-समझने की क्षमता से सीमित होते हैं, और Exchange में योगदान के मूल्य को सामाजिक रूप से स्वीकार तरीके से मापना कोई आसान समस्या नहीं है।
wrong_answers:
  - क्योंकि इंसान बड़े समूहों के साथ काम करने में दिलचस्पी नहीं रखते और छोटे समुदायों को पसंद करते हैं।
  - क्योंकि बड़े समुदायों के पास ज़्यादा संसाधन होते हैं, जिससे मेहनत की बँटवारे की ज़रूरत कम हो जाती है।
  - क्योंकि बड़े समुदायों में ज़्यादा झगड़े होते हैं, जिससे तालमेल बिठाना मुश्किल हो जाता है।
explanation: |
  बड़े समुदायों में, किसी व्यक्ति के लिए यह असंभव है कि...
  स्टेबल सोशल रिलेशनशिप को मेंटेन और याद रखो ज्यादा के साथ
  150 से ज़्यादा लोग, जिससे एक प्रतिष्ठा प्रणाली बनती है
  पैमाने पर कैदी की दुविधा को दूर करने के लिए अपर्याप्त।
  साथ ही, Exchange में योगदानों के मूल्य का मूल्यांकन करना
  बड़े समुदायों में एक पेचीदा समस्या।
reviewed: true
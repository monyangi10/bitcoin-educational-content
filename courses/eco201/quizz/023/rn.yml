question: Ni kuki ingorane zo gutegura mu kugabanganya ibikorwa yongera guseruka mu miryango canke mu bibano vyagutse?
answer: Kubera ko abantu bafise ubushobozi bufise a, kandi ingero yemewe mu kibano y’agaciro k’intererano muri Exchange ni ingorane idasanzwe.
wrong_answers:
  - Kubera ko abantu badakunda gukorana n’imigwi minini canke ari benshi cane kandi bagakunda imiryango mitoyi canke gukorana ari bake.
  - Kubera ko imiryango minini igira ubutunzi bwinshi, ivyo bikaba bituma idakenera kugabanganya ibikorwa ibikorwa.
  - Kubera ko imiryango minini igira inryane nyinshi, ivyo bikaba kgendura canke gutuganya ibikorwa bigorana.

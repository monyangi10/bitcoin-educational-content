question: 대규모 커뮤니티에서 분업의 조정 문제가 다시 부각되는 이유는 무엇인가요?
answer: 인간은 인지 능력에 한계가 있고, 사회적으로 인정받는 Exchange의 기여 가치를 측정하는 것은 사소한 문제가 아니기 때문입니다.
wrong_answers:
  - 인간은 대규모 그룹과 함께 일하는 데 관심이 없고 소규모 커뮤니티를 선호하기 때문입니다.
  - 커뮤니티 규모가 클수록 더 많은 리소스를 보유하고 있기 때문에 분업의 필요성이 줄어듭니다.
  - 커뮤니티 규모가 클수록 갈등이 많아져 조정이 어려워지기 때문입니다.
explanation: |
  더 큰 커뮤니티에서는 사람이 다음을 수행하는 것이 불가능합니다
  150명 이상의 사람들과 안정적인 사회적 관계를 유지하고 기억하는 것은
  150명 이상의 개인과 평판 시스템을 만드는 것은
  은 대규모의 죄수의 딜레마를 극복하기에 불충분합니다.
  또한, Exchange에서 기여의 가치를 평가하는 것은
  대규모 커뮤니티에서는 복잡한 문제입니다.
reviewed: true
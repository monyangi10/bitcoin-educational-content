question: ทำไมปัญหาการประสานงานในการแบ่งงานจึงกลับมาเกิดขึ้นอีกในชุมชนที่ใหญ่ขึ้น?
answer: เนื่องจากมนุษย์มีข้อจำกัดทางด้านความสามารถในการรับรู้ และการวัดมูลค่าของการมีส่วนร่วมในการแลกเปลี่ยนที่ได้รับการยอมรับทางสังคมเป็นปัญหาที่ไม่ง่าย
wrong_answers:
  - เพราะมนุษย์ไม่สนใจที่จะทำงานกับกลุ่มใหญ่และชอบชุมชนขนาดเล็กมากกว่า
  - เนื่องจากชุมชนที่ใหญ่กว่ามีทรัพยากรมากกว่า ทำให้ความจำเป็นในการแบ่งงานลดลง
  - เพราะชุมชนที่ใหญ่กว่ามีความขัดแย้งมากขึ้น ทำให้การประสานงานเป็นเรื่องยาก
explanation: |
  ในชุมชนขนาดใหญ่ เป็นไปไม่ได้ที่บุคคลจะรักษาและจดจำความสัมพันธ์ทางสังคงที่กับบุคคลมากกว่า 150 คน ทำให้ระบบชื่อเสียงไม่เพียงพอที่จะเอาชนะภาวะที่กลืนไม่เข้าคายไม่ออกของนักโทษในระดับใหญ่ นอกจากนี้ การประเมินมูลค่าของการมีส่วนร่วมในการแลกเปลี่ยนเป็นปัญหาที่ซับซ้อนในชุมชนขนาดใหญ่
reviewed: true
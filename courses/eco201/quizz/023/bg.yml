question: Защо проблемът с координацията при разделението на труда се появява отново в по-големите общности?
answer: Тъй като хората са ограничени от познавателните си способности, социално приемливото измерване на стойността на приноса в размяната е нетривиален проблем.
wrong_answers:
  - Защото хората не се интересуват от работа с по-големи групи и предпочитат по-малки общности.
  - Защото по-големите общности разполагат с повече ресурси, което води до по-малка нужда от разделение на труда.
  - Тъй като в по-големите общности има повече конфликти, което затруднява координацията.
explanation: |
  В по-големите общности е невъзможно човек да
  поддържа и запомня стабилни социални взаимоотношения с
  повече от 150 души, което прави репутационната система
  недостатъчна за преодоляване на дилемата на затворника в голям мащаб.
  Освен това оценяването на стойността на приноса в размяна
  е сложен проблем в по-големите общности.
reviewed: true

question: 為什麼分工協調的問題會在較大的社區中重新出現？
answer: 由於人類的認知能力有限，而社會所接受的 Exchange 貢獻價值測量是一個非小問題。
wrong_answers:
  - 因為人類不喜歡與較大的團體合作，而喜歡較小的社群。
  - 因為較大的社區擁有較多的資源，導致較少的分工需求。
  - 因為較大的社區有較多的衝突，使得協調變得困難。
explanation: |
  在較大的社區中，一個人不可能
  與更多的人維持和記住穩定的社會關係
  超過 150 名個人，使聲譽系統
  不足以大規模克服囚徒困境。
  此外，評估 Exchange 中的貢獻值是
  在較大的社區中，這是一個複雜的問題。
reviewed: true
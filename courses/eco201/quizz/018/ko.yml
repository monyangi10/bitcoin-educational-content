question: 분업의 맥락에서 절대 우위의 개념은 무엇인가요?
answer: 특정 작업을 수행하는 데 동료보다 뛰어난 능력을 가진 개인입니다.
wrong_answers:
  - 동료보다 모든 업무 수행 능력이 뛰어난 개인입니다.
  - 개인은 동료와 동등하게 특정 작업을 수행할 수 있는 능력을 보유하고 있습니다.
  - 특정 작업을 수행하는 데 있어 자신의 능력보다 열등한 능력을 가진 개인입니다
explanation: |
  분업의 맥락에서 절대적 우위란
  은 한 개인이 동료보다 특정 작업을 수행하는 데 있어
  특정 작업을 수행할 수 있는 능력을 말합니다. 이
  개인은 그 재화를 전문적으로 생산하는 데 관심이 있습니다
  해당 재화를 전문적으로 생산한 다음, 그 잉여분을
  자신이 원하는 재화를 위해 교환합니다.
reviewed: true
question: Czym jest pojęcie przewagi absolutnej w kontekście podziału pracy?
answer: Jednostka posiada wyższą zdolność do wykonywania pewnych zadań niż inni.
wrong_answers:
  - Jednostka posiada wyższą zdolność do wykonywania wszystkich zadań niż inni.
  - Jednostka posiada taką samą zdolność do wykonywania określonych zadań jak inni.
  - Dana osoba posiada gorszą zdolność do wykonywania pewnych zadań niż inni.
explanation: |
  W kontekście podziału pracy, absolutna przewaga
  odnosi się do sytuacji, w której dana osoba ma lepszą
  zdolność do wykonywania określonych zadań niż inni. Osoba ta korzysta wówczas na wyspecjalizowaniu się w
  produkcji tego dobra, a następnie wymianie uzyskaniej nadwyżki handlowej za dobra, których pragnie.
reviewed: true

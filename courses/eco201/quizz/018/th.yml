question: แนวคิดของความได้เปรียบโดยสัมบูรณ์ในบริบทของการแบ่งงานคืออะไร?
answer: บุคคลมีความสามารถที่เหนือกว่าในการทำงานบางอย่างเมื่อเทียบกับเพื่อนร่วมงานของเขา
wrong_answers:
  - บุคคลหนึ่งมีความสามารถที่เหนือกว่าในการทำงานทุกอย่างเมื่อเทียบกับเพื่อนร่วมงานของเขา
  - บุคคลมีความสามารถในการทำงานบางอย่างเทียบเท่ากับเพื่อนร่วมงานของเขา
  - บุคคลมีความสามารถในการทำงานบางอย่างด้อยกว่าคนอื่น
explanation: |
  ในบริบทของการแบ่งงาน ความได้เปรียบสัมบูรณ์ หมายถึงสถานการณ์ที่บุคคลหนึ่งมีความสามารถเหนือกว่าในการทำงานบางอย่างมากกว่าคนอื่น บุคคลนี้จึงมีความสนใจที่จะเชี่ยวชาญในการผลิตสินค้านั้นและแลกเปลี่ยนส่วนเกินที่ได้มากับสินค้าที่พวกเขาต้องการ
reviewed: true
question: श्रम विभाजन के संदर्भ में "निरपेक्ष लाभ" (absolute advantage) की अवधारणा क्या है?
answer: एक व्यक्ति के पास कुछ काम करने की अपने साथियों से बेहतर क्षमता होती है।
wrong_answers:
  - एक व्यक्ति के पास अपने साथियों की तुलना में सभी कामों को बेहतर तरीके से करने की क्षमता होती है।
  - एक व्यक्ति के पास अपने साथियों के बराबर ही कुछ काम करने की क्षमता होती है।
  - एक व्यक्ति के पास कुछ काम करने की क्षमता दूसरों से कम होती है...
explanation: |
  मजदूरी के बंटवारे के संदर्भ में, पूर्ण लाभ
  उस स्थिति को कहते हैं जब किसी व्यक्ति के पास किसी और से बेहतर या श्रेष्ठ स्थिति हो।
  उसके साथियों की तुलना में कुछ कार्यों को करने की क्षमता।
  व्यक्ति को फिर किसी खास क्षेत्र में विशेषज्ञता हासिल करने में दिलचस्पी होती है।
  उस वस्तु का उत्पादन करना और फिर अतिरिक्त को विनिमय करना
  वे जो सामान चाहते हैं, उसे हासिल कर लेते हैं।
reviewed: true
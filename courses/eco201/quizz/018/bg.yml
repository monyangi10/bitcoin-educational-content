question: Какво представлява понятието "абсолютно предимство" в контекста на разделението на труда?
answer: Човек притежава по-добри способности за изпълнение на определени задачи от своите връстници.
wrong_answers:
  - Индивидът притежава по-добра способност да изпълнява всички задачи от своите връстници.
  - Човек притежава еднаква способност да изпълнява определени задачи с връстниците си.
  - Индивидът притежава по-ниска способност за изпълнение на определени задачи от своята
explanation: |
  В контекста на разделението на труда абсолютното предимство
  се отнася до ситуацията, в която даден индивид има по-голямо
  способност да изпълнява определени задачи в сравнение с колегите си. Това
  тогава индивидът има интерес да се специализира в
  и след това да разменя излишъка от
  за стоки, които желае.
reviewed: true
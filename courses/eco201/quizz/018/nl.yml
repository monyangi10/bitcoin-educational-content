question: Wat is het begrip absoluut voordeel in de context van de arbeidsverdeling?
answer: Een individu heeft een superieur vermogen om bepaalde taken uit te voeren dan zijn leeftijdsgenoten.
wrong_answers:
  - Een individu heeft een superieur vermogen om alle taken uit te voeren dan zijn leeftijdsgenoten.
  - Een individu heeft hetzelfde vermogen om bepaalde taken uit te voeren als zijn leeftijdsgenoten.
  - Een individu heeft een minder goed vermogen om bepaalde taken uit te voeren dan zijn
explanation: |
  In de context van arbeidsdeling verwijst absoluut voordeel
  naar de situatie waarin een individu een superieur
  vermogen heeft om bepaalde taken uit te voeren dan zijn collega's. Dit
  individu heeft er dan belang bij om zich te specialiseren in de
  productie van dat goed en dan het verkregen overschot te ruilen
  voor de goederen die hij wenst.
reviewed: true
question: Ni igiki ciyumviro c’aakamaro ko kugereranya mu bijanye n’ukugabanganya ibikorwa?
answer: Umuntu afise ubushobozi bwo gukora ibikorwa bimwebimwe kuruta ibindi.
wrong_answers:
  - Umuntu afise ubushobozi bungana n’ubw’abandi bwo gukora ibikorwa vyose.
  - Umuntu afise ubushobozi bwo gukora ibikorwa bimwebimwe biri hasi kuruta ibindi.
  - Umuntu arafise ubushobozi bwo gukora ibikorwa vyose kuruta abandi.
explanation: |
  Mu bijanye n’ukugabanganya ibikorwa, ukugereranya
  akamaro yerekeza ku kuntu umuntu afise
  ubushobozi bwo gukora ibikorwa bimwebimwe kuruta ibindi.
  Naho uwo muntu yoba atagira akamaro kanini mw'ico gikorwa
  mu guhingura ikintu ciza ico ari co cose, hazoba hakiriho ubwoko bw’
  umusaruro umuntu ku giti ciwe ari mwiza kurusha mu
  abandi, kandi kubera iyo mvo, bategerezwa kubinonosora kuneza yabo.
reviewed: true

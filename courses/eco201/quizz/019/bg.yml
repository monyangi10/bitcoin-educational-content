question: Какво е понятието сравнително предимство в контекста на разделението на труда?
answer: Човек има по-добри способности за изпълнение на определени задачи от други.
wrong_answers:
  - Човек има еднаква способност да изпълнява всички задачи, както и другите.
  - Индивидът има по-ниска способност да изпълнява определени задачи от други.
  - Индивидът има по-добра способност да изпълнява всички задачи от другите.
explanation: |
  В контекста на разделението на труда, сравнителните
  се отнася до ситуацията, в която даден индивид има
  по-добра способност да изпълнява определени задачи от други.
  Дори и индивидът да не разполага с абсолютно предимство
  в производството на някоя стока, все пак ще има видове
  за които индивидът е по-добър, отколкото в
  други, и по тази причина той все още има интерес от
  специализация.
reviewed: true
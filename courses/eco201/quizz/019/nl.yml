question: Wat is het concept van comparatief voordeel in de context van de arbeidsverdeling?
answer: Een individu heeft een superieur vermogen om bepaalde taken uit te voeren dan andere.
wrong_answers:
  - Een individu heeft hetzelfde vermogen om alle taken uit te voeren als anderen.
  - Een individu heeft een minder goed vermogen om bepaalde taken uit te voeren dan andere.
  - Een individu heeft een superieur vermogen om alle taken uit te voeren dan anderen.
explanation: |
  In de context van arbeidsverdeling verwijst comparatief
  voordeel naar de situatie waarin een individu een
  superieur vermogen heeft om bepaalde taken uit te voeren dan andere.
  Zelfs als het individu geen absoluut voordeel heeft
  bij de productie van een goed, zullen er toch soorten productie zijn
  productie zijn waarin het individu beter is dan in
  andere, en om deze reden hebben ze nog steeds belang bij
  specialiseren.
reviewed: true
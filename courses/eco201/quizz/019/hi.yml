question: श्रम विभाजन के संदर्भ में तुलनात्मक लाभ (comparative advantage) की अवधारणा क्या है?
answer: एक व्यक्ति को कुछ खास काम दूसरों के मुकाबले ज़्यादा बेहतर तरीके से करने की काबिलियत होती है।
wrong_answers:
  - एक व्यक्ति में सभी कामों को करने की बराबर क्षमता होती है जैसे दूसरों में होती है।
  - एक व्यक्ति की कुछ कामों को करने की क्षमता दूसरों के मुकाबले कम होती है।
  - एक व्यक्ति के पास सभी कामों को दूसरों से बेहतर तरीके से करने की क्षमता होती है।
explanation: |
  मजदूरी के बंटवारे के संदर्भ में, तुलनात्मक
  फायदा उस स्थिति को कहते हैं जब किसी व्यक्ति के पास...
  कुछ खास कामों को दूसरों से बेहतर तरीके से करने की क्षमता।
  भले ही व्यक्ति के पास पूर्ण लाभ न हो
  किसी भी सामान के उत्पादन में, फिर भी कुछ प्रकार के
  वो उत्पादन जिसमें व्यक्ति बेहतर हो
  दूसरों के लिए, और इसी वजह से, उन्हें अभी भी दिलचस्पी है
  विशेषज्ञता हासिल करना।
reviewed: true
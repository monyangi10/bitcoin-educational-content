question: 분업의 맥락에서 비교 우위의 개념은 무엇인가요?
answer: 개인은 다른 사람보다 특정 작업을 수행하는 데 뛰어난 능력을 가지고 있습니다.
wrong_answers:
  - 개인은 다른 사람과 동등하게 모든 작업을 수행할 수 있는 능력을 가지고 있습니다.
  - 개인은 다른 사람보다 특정 작업을 수행하는 능력이 떨어집니다.
  - 개인은 다른 사람보다 모든 작업을 수행할 수 있는 능력이 뛰어납니다.
explanation: |
  분업의 맥락에서 비교
  우위란 개인이 다른 사람보다 특정 작업을 수행하는 데
  특정 작업을 수행하는 능력이 다른 작업보다 우월한 상황을 말합니다.
  어떤 재화를 생산할 때 개인이 절대적인 우위를 가지지 않더라도
  절대적인 우위를 가지지 않더라도, 어떤 재화를 생산함에 있어서는
  개인이 더 나은 생산
  다른 사람들보다 더 나은 생산 유형이 있으며, 이러한 이유로 그들은 여전히
  전문화.
reviewed: true
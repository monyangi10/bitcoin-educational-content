question: Czym jest pojęcie przewagi komparatywnej w kontekście podziału pracy?
answer: Dana osoba ma większą zdolność do wykonywania pewnych zadań niż innych.
wrong_answers:
  - Dana osoba ma taką samą zdolność do wykonywania wszystkich zadań jak inni.
  - Jednostka ma gorszą zdolność do wykonywania pewnych zadań niż innych.
  - Dana osoba ma większą zdolność do wykonywania wszystkich zadań niż inni.
explanation: |
  W kontekście podziału pracy, przewaga komparatywna

question: Šta je uzrok depresije prema monetaristima i kejnzijancima?
answer: Nedovoljna agregatna tražnja
wrong_answers:
  - Overproduction
  - Visoke kamatne stope
  - Visoka inflacija
explanation: |
  I za monetariste i za kejnzijance, uzrok depresije je nedovoljna agregatna tražnja. Oni veruju da će pružanje podsticaja za širenje kredita (snižavanje kamatnih stopa) i korišćenje kapaciteta državnog deficita za podsticanje tražnje pokrenuti oporavak.
reviewed: true
question: Ni igiki gituma haba uguhagarika umutima nk’uko abakunda amahera n’aba Keynes babivuga?
answer: Ibisabwa vyose hamwe ntibihagije
wrong_answers:
  - Guhingura birenze urugero
  - Inyungu nyinshi
  - Ukwiyongera kw'ibiciro
explanation: |
  Ku bakunda amahera no ku ba Keynes, imvo y’uguhagarika umutima ni .
  ivyipfuzo vyose hamwe bidahagije. Bemera ko gutanga insiguro . 
  ku bijanye no kwagura inguzanyo (kugabanya inyungu) no gukoresha ivya Leta . 
  ubushobozi bw’ikinyuranyo bwo kwongerera ubusabe buzotuma habaho ugusubirana.
reviewed: true
question: Jaka jest przyczyna depresji według monetarystów i keynesistów?
answer: Niewystarczająco zagregowany popyt
wrong_answers:
  - Nadprodukcja
  - Wysokie stopy procentowe
  - Wysoka inflacja
explanation: |
  Zarówno dla monetarystów, jak i keynesistów przyczyną depresji jest
  niewystarczająco zagregowany popyt. Uważają oni, że zapewnienie bodźca
  do ekspansji kredytowej (obniżenie stóp procentowych) i wykorzystanie
  deficytu w finansach państwowych w celu pobudzenia popytu zapoczątkuje ożywienie.
reviewed: true

question: मोनेटारिस्ट (मुद्रावादी) और कीन्सियन (कीन्स के सिद्धांत को मानने वाले) अवसाद (डिप्रेशन) के कारण को लेकर अलग-अलग राय रखते हैं:

1. **मोनेटारिस्ट (जैसे मिल्टन फ्रीडमैन) का मानना है** कि अवसाद का मुख्य कारण *पैसे की आपूर्ति (मनी सप्लाई) में कमी* होती है। उनके अनुसार, 1929 की महामंदी (Great Depression) फेडरल रिजर्व द्वारा पैसे की आपूर्ति ठीक से न बढ़ाने और बैंकों के फेल होने से हुई।  

2. **कीन्सियन (जैसे जॉन मेनार्ड कीन्स) का मानना है** कि अवसाद *मांग में कमी (डिमांड डेफिसिट)* की वजह से होता है। जब लोग और कंपनियाँ खर्च कम कर देते हैं, तो उत्पादन गिरता है, बेरोजगारी बढ़ती है, और अर्थव्यवस्था सुस्त पड़ जाती है।  

**संक्षेप में:**  
- मोनेटारिस्ट → पैसे की कमी को दोष देते हैं।  
- कीन्सियन → मांग की कमी को दोष देते हैं।
answer: कुल मांग अपर्याप्त है
wrong_answers:
  - ज़रूरत से ज़्यादा उत्पादन
  - ज़्यादा ब्याज़ दरें
  - महँगाई बढ़ना
explanation: |
  मोनेटारिस्ट और कीन्सियन दोनों के लिए, मंदी का कारण है
  अपर्याप्त कुल मांग। उनका मानना है कि प्रोत्साहन देने से
  क्रेडिट विस्तार (ब्याज दरें कम करने) और राज्य के इस्तेमाल के लिए
  मांग बढ़ाने के लिए कमी वाली क्षमता रिकवरी की शुरुआत कर देगी।
reviewed: true
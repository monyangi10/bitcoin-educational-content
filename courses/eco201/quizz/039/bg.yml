question: Каква е причината за депресията според монетаристите и кейнсианците?
answer: Недостатъчно съвкупно търсене
wrong_answers:
  - Свръхпроизводство
  - Високи лихвени проценти
  - Висока инфлация
explanation: |
  И за монетаристите, и за кейнсианците причината за депресията е
  недостатъчното съвкупно търсене. Те смятат, че осигуряването на стимул
  за кредитна експанзия (намаляване на лихвените проценти) и използване на държавните
  на дефицита, за да се стимулира търсенето, ще даде тласък на възстановяването.
reviewed: true
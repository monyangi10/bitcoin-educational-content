question: สาเหตุของภาวะซึมเศร้าตามมุมมองของนักการเงินและเคนส์เซียนคืออะไร?
answer: อุปสงค์รวมไม่เพียงพอ
wrong_answers:
  - การผลิตมากเกินไป
  - อัตราดอกเบี้ยสูง
  - เงินเฟ้อสูง
explanation: |
  สำหรับนักเศรษฐศาสตร์แนวการเงินและเคนส์ สาเหตุของภาวะเศรษฐกิจตกต่ำคือ 
  อุปสงค์รวมที่ไม่เพียงพอ พวกเขาเชื่อว่าการให้แรงจูงใจในการขยายสินเชื่อ 
  (การลดอัตราดอกเบี้ย) และการใช้ความสามารถในการขาดดุลของรัฐเพื่อกระตุ้นอุปสงค์ 
  จะช่วยเริ่มต้นการฟื้นตัวของเศรษฐกิจ
reviewed: true
question: Wat is de oorzaak van de depressie volgens zowel monetaristen als keynesianen?
answer: Onvoldoende geaggregeerde vraag
wrong_answers:
  - Overproductie
  - Hoge rente
  - Hoge inflatie
explanation: |
  Voor zowel monetaristen als keynesianen is de oorzaak van de depressie
  onvoldoende geaggregeerde vraag. Zij geloven dat het geven van een stimulans
  voor kredietexpansie (verlaging van de rentetarieven) en het gebruik van de tekortcapaciteit van de staat om de vraag te stimuleren een herstel op gang zal brengen

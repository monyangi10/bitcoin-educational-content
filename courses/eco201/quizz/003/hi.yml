question: कोर्स के अनुसार आर्थिक संकट किन कारणों से होते हैं?
answer: आर्थिक संकट मानवीय अक्षमता, बाजार में हेराफेरी, या लोगों के सामूहिक उत्साह की वजह से हो सकते हैं।
wrong_answers:
  - आर्थिक संकट सिर्फ़ बाज़ार में हेराफेरी की वजह से होते हैं।
  - आर्थिक संकट पूरी तरह से इंसानी नाकामी की वजह से होते हैं।
  - आर्थिक संकट सिर्फ लोगों के सामूहिक उत्साह की वजह से होते हैं।
explanation: |
  अध्याय में यह बताया गया है कि कोर्स यह जांच करेगा कि
  आर्थिक संकट इंसानी नाकामी या बाजार की वजह से हो सकते हैं
  मनिपुलेशन, या लोगों का सामूहिक उत्साह।
reviewed: true
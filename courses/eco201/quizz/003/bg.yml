question: Какви са причините за икономическите кризи според курса?
answer: Икономическите кризи могат да се дължат на човешка некомпетентност, манипулиране на пазара или колективна еуфория на хората.
wrong_answers:
  - Икономическите кризи се дължат единствено на манипулиране на пазара.
  - Икономическите кризи се дължат единствено на човешката некомпетентност.
  - Икономическите кризи се дължат единствено на колективната еуфория на хората.
explanation: |
  В главата се споменава, че курсът ще изследва как
  икономическите кризи могат да се дължат на човешка некомпетентност, пазарна
  манипулирането на пазара или колективната еуфория на хората.
reviewed: true
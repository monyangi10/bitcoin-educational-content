question: 코스에 따르면 경제 위기의 원인은 무엇인가요?
answer: 경제 위기는 인간의 무능, 시장 조작 또는 사람들의 집단적 도취로 인해 발생할 수 있습니다.
wrong_answers:
  - 경제 위기는 전적으로 시장 조작으로 인한 것입니다.
  - 경제 위기는 전적으로 인간의 무능함 때문입니다.
  - 경제 위기는 전적으로 사람들의 집단적 행복감에 기인합니다.
explanation: |
  이 장에서는 이 강좌가 어떻게
  경제 위기는 인간의 무능함, 시장
  조작 또는 사람들의 집단적 행복감으로 인해 경제 위기가 어떻게 발생할 수 있는지 살펴봅니다.
reviewed: true
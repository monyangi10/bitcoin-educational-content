question: อะไรเป็นสาเหตุของวิกฤติเศรษฐกิจตามที่หลักสูตรกล่าวถึง?
answer: วิกฤติเศรษฐกิจอาจเกิดจากความไร้ความสามารถของมนุษย์ การบิดเบือนตลาด หรือความอิ่มเอมใจร่วมกันของผู้คน
wrong_answers:
  - วิกฤติเศรษฐกิจเกิดจากการบิดเบือนตลาดเพียงอย่างเดียว
  - วิกฤติเศรษฐกิจเกิดจากความไร้ความสามารถของมนุษย์เท่านั้น
  - วิกฤติเศรษฐกิจเกิดจากความฮึกเหิมร่วมกันของผู้คนเท่านั้น
explanation: |
  บทนี้กล่าวถึงว่าหลักสูตรจะสำรวจว่าภาวะวิกฤติเศรษฐกิจสามารถเกิดจากความไร้ความสามารถของมนุษย์ การบิดเบือนตลาด หรือความฮือฮาร่วมกันของผู้คนได้อย่างไร
reviewed: true
question: Wat veroorzaakt economische crises volgens de cursus?
answer: Economische crises kunnen het gevolg zijn van menselijke incompetentie, marktmanipulatie of collectieve euforie van mensen.
wrong_answers:
  - Economische crises zijn uitsluitend te wijten aan marktmanipulatie.
  - Economische crises zijn uitsluitend te wijten aan menselijke incompetentie.
  - Economische crises zijn uitsluitend te wijten aan de collectieve euforie van mensen.
explanation: |
  Het hoofdstuk vermeldt dat de cursus zal onderzoeken hoe
  economische crises het gevolg kunnen zijn van menselijke onbekwaamheid, markt
  manipulatie of collectieve euforie van mensen.
reviewed: true
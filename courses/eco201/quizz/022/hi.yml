question: श्रम विभाजन के संदर्भ में कैदी की दुविधा क्या है?
answer: यह एक ऐसी स्थिति है जहां आपसी सहयोग से व्यक्तियों को कम फायदा होता है, लेकिन पूरे समूह को अधिकतम लाभ मिलता है।
wrong_answers:
  - यह एक ऐसी स्थिति है जहां लोग मिलकर काम करने से इनकार कर देते हैं, जिससे ग्रुप को अधिकतम फायदा होता है।
  - यह एक ऐसी स्थिति है जहां लोग मिलकर काम करते हैं, जिससे उन्हें खुद को अधिकतम फायदा होता है लेकिन ग्रुप को कम फायदा मिलता है।
  - यह एक ऐसी स्थिति है जहां लोग मिलकर काम करने से इनकार कर देते हैं, जिससे खुद के और ग्रुप दोनों के फायदे कम हो जाते हैं।

question: ภาวะกลืนไม่เข้าคายไม่ออกของนักโทษในบริบทของการแบ่งงานคืออะไร?
answer: มันเป็นสถานการณ์ที่การร่วมมือกันส่งผลให้เกิดผลประโยชน์ที่ไม่สูงสุดสำหรับแต่ละบุคคล แต่ให้ผลประโยชน์สูงสุดสำหรับกลุ่ม
wrong_answers:
  - มันเป็นสถานการณ์ที่บุคคลปฏิเสธที่จะร่วมมือกัน นำไปสู่ผลประโยชน์สูงสุดสำหรับกลุ่ม
  - มันเป็นสถานการณ์ที่บุคคลร่วมมือกัน นำไปสู่ผลประโยชน์สูงสุดสำหรับตนเองแต่ผลประโยชน์ที่ไม่เหมาะสมสำหรับกลุ่ม
  - มันเป็นสถานการณ์ที่บุคคลปฏิเสธที่จะร่วมมือกัน นำไปสู่ผลประโยชน์ที่ไม่เหมาะสมสำหรับตนเองและกลุ่ม
explanation: |
  ภาวะที่กลืนไม่เข้าคายไม่ออกของนักโทษเป็นแนวคิดในทฤษฎีเกมที่บุคคลมีแรงจูงใจในการเลือกกลยุทธ์ที่เพิ่มผลประโยชน์ส่วนตัวสูงสุด โดยไม่คำนึงถึงกลยุทธ์ที่ผู้อื่นเลือก แม้ว่าจะมีความสมดุลที่น่าพึงพอใจมากกว่าผ่านการประสานงาน/ความร่วมมือก็ตาม
reviewed: true
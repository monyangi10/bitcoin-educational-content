question: Какво представлява дилемата на затворника в контекста на разделението на труда?
answer: Това е ситуация, в която взаимното сътрудничество води до неоптимални печалби за отделните хора, но до максимални печалби за групата.
wrong_answers:
  - Това е ситуация, в която хората отказват да си сътрудничат, което води до максимални печалби за групата.
  - Това е ситуация, в която хората си сътрудничат, което води до максимални печалби за тях самите, но до неоптимални печалби за групата.
  - Това е ситуация, в която хората отказват да си сътрудничат, което води до неоптимални ползи за тях самите и за групата.
explanation: |
  Дилемата на затворника е концепция в теорията на игрите, при която
  индивидите имат стимул да избират стратегии, които
  да максимизират индивидуалната си печалба, независимо от
  стратегии, избрани от другите, дори когато по-желана стратегия
  равновесие чрез координация/сътрудничество.
reviewed: true

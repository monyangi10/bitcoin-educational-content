question: 什麼是分工背景下的囚徒困境？
answer: 在這種情況下，相互協作會為個人帶來次佳收益，但為團體帶來最大收益。
wrong_answers:
  - 這是一種個人拒絕合作，導致團體收益最大化的情況。
  - 這是一種個人合作的情況，導致個人獲得最大收益，但團體卻獲得次佳收益。
  - 這是一種個人拒絕合作的情況，導致個人和團體都無法獲得最佳收益。
explanation: |
  囚徒困境是博弈論中的一個概念，其中
  個人有誘因選擇以下策略
  最大化其個人收益，不論
  其他人選擇的策略，即使有更理想的
  透過協調/合作達到平衡是可能的。
reviewed: true
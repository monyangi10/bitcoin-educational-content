question: Czym jest dylemat więźnia w kontekście podziału pracy?
answer: Jest to sytuacja, w której wzajemna współpraca skutkuje nieoptymalnymi korzyściami dla jednostek, ale maksymalnymi korzyściami dla grupy.
wrong_answers:
  - Jest to sytuacja, w której jednostki odmawiają współpracy, co prowadzi do maksymalnych korzyści dla grupy.
  - Jest to sytuacja, w której jednostki współpracują, co prowadzi do maksymalnych korzyści dla nich samych, ale nieoptymalnych korzyści dla grupy.
  - Jest to sytuacja, w której jednostki odmawiają współpracy, co prowadzi do nieoptymalnych korzyści dla nich samych i grupy.
explanation: |
  Dylemat więźnia to koncepcja w teorii gier, w której
  jednostki mają motywację do wyboru strategii, które
  maksymalizują ich indywidualny zysk, niezależnie od
  strategi wybranych przez innych nawet, jeśli poprzez koordynację/współpracę możliwy jest bardziej korzystny wynik.
reviewed: true

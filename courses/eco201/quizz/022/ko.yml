question: 분업의 맥락에서 죄수의 딜레마란 무엇인가요?
answer: 상호 협업을 통해 개인에게는 차선의 이익을 가져다주지만 그룹에게는 최대의 이익을 가져다주는 상황입니다.
wrong_answers:
  - 개인이 협업을 거부하여 그룹의 이익이 극대화되는 상황입니다.
  - 개인이 협력하여 자신에게는 최대 이익을 가져다주지만 그룹에게는 차선의 이익을 가져다주는 상황입니다.
  - 개인이 협업을 거부하여 자신과 그룹에게 최적의 이익이 아닌 차선의 이익을 가져오는 상황입니다.
explanation: |
  죄수의 딜레마는 게임 이론의 개념입니다
  개인이 자신의 이익을 극대화하는 전략을 선택하려는 인센티브가
  다른 사람들이 선택한 전략에 관계없이 개인의 이익을 극대화합니다
  다른 사람들이 선택한 전략, 더 바람직한 경우에도
  조정/협력을 통한 균형이 가능한 경우에도 개인은 다른 사람이 선택한 전략에 관계없이 개인의 이익을 극대화하는 전략을 선택할 유인이 있습니다.
reviewed: true
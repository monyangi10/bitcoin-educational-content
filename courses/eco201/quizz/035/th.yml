question: จะเกิดอะไรขึ้นเมื่ออัตราดอกเบี้ยลดลงเนื่องจากการเพิ่มขึ้นของการออมตามทฤษฎีวัฏจักรธุรกิจของออสเตรีย?
answer: ปริมาณของสินค้าสำเร็จรูปที่บริโภคจะลดลง อัตราดอกเบี้ยจะลดลง ผู้ประกอบการจะใช้กระแสเงินทุนนี้เพื่อสร้างสินค้าการลงทุนใหม่และยืดโครงสร้างการผลิต
wrong_answers:
  - ปริมาณของสินค้าสำเร็จรูปที่บริโภคจะเพิ่มขึ้น อัตราดอกเบี้ยจะสูงขึ้น ผู้ประกอบการจะใช้กระแสเงินทุนนี้ในการสร้างสินค้าการลงทุนใหม่และทำให้โครงสร้างการผลิตสั้นลง

  - ปริมาณของสินค้าสำเร็จรูปที่บริโภคจะเพิ่มขึ้น อัตราดอกเบี้ยจะลดลง ผู้ประกอบการจะใช้กระแสเงินทุนนี้ในการสร้างสินค้าการลงทุนใหม่และทำให้โครงสร้างการผลิตสั้นลง
explanation: |
  ตามทฤษฎีวัฏจักรธุรกิจของออสเตรีย เมื่อมีการลดลงของอัตราดอกเบี้ยเนื่องจากการเพิ่มขึ้นของการออม ปริมาณของสินค้าสุดท้ายที่บริโภคจะลดลงเนื่องจากการออมเกี่ยวข้องกับการเลื่อนการบริโภคบางส่วนไปยังวันที่ภายหลัง เป็นผลให้อัตราดอกเบี้ยลดลงเนื่องจากอุปทานของทุนเพิ่มขึ้น สิ่งนี้ทำให้นักธุรกิจสามารถใช้การไหลเข้าของทุนนี้เพื่อสร้างสินค้าการลงทุนใหม่และยืดโครงสร้างการผลิตออกไป
reviewed: true
explanation: |
  Dukurikije inyigisho y’i Otirishiya yerekeye uruzitiro rw’ubudandaji, iyo hari .
  igabanuka ry’inyungu bitewe n’ukwiyongera kw’amahera azigamiwe, igitigiri c’amahera ya nyuma .

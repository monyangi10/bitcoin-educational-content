  ku musi wo mu nyuma. Ivyo bizotuma inyungu zigabanuka kubera ko Supply y’umutungo kamere .
  iriko iragwira. Ivyo bituma abashoramare bakoresha iyo nzira y’amahera kugira ngo bareme .

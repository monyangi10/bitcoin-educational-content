question: Bigenda gute iyo inyungu zigabanutse kubera ukwiyongera kw’amahera azigamiwe hakurikijwe inyigisho y’Ubudagi y’Ikigereranyo c’Ubucuruzi?
answer: Igitigiri c’ibintu vya nyuma bikoreshwa kizogabanuka, inyungu zizogabanuka, abashoramare bazokoresha iyo nzira y’amahera kugira ngo bareme ibintu bishasha vyo gushora imari mu bikorwa, gutyo bazoramba uburyo bwo gukora.

question: 根據奧地利商業週期理論，當儲蓄增加導致利率下降時，會發生什麼情況？
answer: 最終消費品的數量會減少，利率會下降，企業家會利用這些流入的資金創造新的投資品，進而延長生產結構。
wrong_answers:
  - 最終消費品的數量會增加，利率會上升，企業家會利用這些湧入的資金來創造新的投資品，進而縮短生產結構。
  - 最終消費品的數量會減少，利率會上升，企業家會利用這些湧入的資金來創造新的投資品，進而縮短生產結構。
  - 最終商品的消費量會增加，利率會下降，企業家會利用這些湧入的資金創造新的投資商品，進而縮短生產結構。

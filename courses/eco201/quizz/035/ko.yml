question: 오스트리아 경기순환 이론에 따르면 저축이 증가하여 금리가 하락하면 어떻게 되나요?
answer: 최종 소비되는 재화의 양이 줄어들고 이자율이 하락하며 기업가들은 이러한 자본 유입을 통해 새로운 투자 상품을 만들어 생산 구조를 연장할 것입니다.
wrong_answers:
  - 최종 상품의 소비량이 증가하고 금리가 상승하며 기업가들은 이러한 자본 유입을 통해 새로운 투자 상품을 창출하여 생산 구조를 단축할 것입니다.
  - 최종 소비되는 재화의 양은 감소하고 금리는 상승하며 기업가들은 이러한 자본 유입을 통해 새로운 투자 재화를 창출하여 생산 구조를 단축할 것입니다.
  - 최종 재화의 소비량은 증가하고 이자율은 하락하며 기업가는 이러한 자본 유입을 통해 새로운 투자 상품을 창출하여 생산 구조를 단축할 것입니다.
explanation: |
  오스트리아 경기순환 이론에 따르면, 다음과 같은 경우
  저축 증가로 인한 이자율 하락, 최종 소비되는 재화의 양이 감소합니다
  저축은 소비의 일부를 나중으로 연기하는 것을 포함하기 때문에 소비되는 재화의 양이 감소합니다
  나중으로 연기하기 때문입니다. 결과적으로 자본의 Supply이 증가하기 때문에 이자율은 하락합니다
  가 증가하기 때문에 금리가 하락합니다. 이를 통해 기업가들은 이 유입된 자본을 사용하여
  새로운 투자 상품을 만들어 생산 구조를 연장할 수 있습니다.

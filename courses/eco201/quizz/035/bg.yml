question: Какво се случва, когато лихвените проценти намалеят поради увеличаване на спестяванията според австрийската теория за бизнес цикъла?
answer: Количеството на потребяваните крайни стоки ще намалее, лихвените проценти ще спаднат, предприемачите ще използват този приток на капитал, за да създадат нови инвестиционни стоки и по този начин да удължат производствената структура.
wrong_answers:
  - Количеството на потребяваните крайни стоки ще се увеличи, лихвените проценти ще нараснат, предприемачите ще използват този приток на капитал за създаване на нови инвестиционни стоки и по този начин ще съкратят производствената структура.
  - Количеството на потребяваните крайни стоки ще намалее, лихвените проценти ще се повишат, предприемачите ще използват този приток на капитал, за да създадат нови инвестиционни стоки и по този начин ще съкратят производствената структура.
  - Количеството на потребяваните крайни стоки ще се увеличи, лихвените проценти ще спаднат, предприемачите ще използват този приток на капитал, за да създадат нови инвестиционни стоки и по този начин ще съкратят производствената структура.
explanation: |
  Според австрийската теория за бизнес цикъла, когато има спад
  на лихвените проценти поради нарастване на спестяванията, количеството на крайните продукти спада
  тъй като спестяването е свързано с отлагане на част от потреблението
  за по-късна дата. В резултат на това лихвените проценти ще се понижат, тъй като предлагането на капитал
  се увеличава. Това позволява на предприемачите да използват този приток на капитал, за да създадат
  нови инвестиционни стоки и по този начин удължават производствената структура.
reviewed: true

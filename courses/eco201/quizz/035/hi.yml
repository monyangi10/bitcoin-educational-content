  - अंतिम वस्तुओं की खपत की मात्रा कम हो जाएगी, ब्याज दरें बढ़ जाएंगी, उद्यमी पूंजी के इस प्रवाह का उपयोग नए निवेश सामान बनाने के लिए करेंगे और इस तरह उत्पादन संरचना को छोटा कर देंगे।
  - अंतिम माल की खपत की मात्रा बढ़ेगी, ब्याज दरें गिरेंगी, उद्यमी पूंजी के इस प्रवाह का उपयोग नए निवेश सामान बनाने के लिए करेंगे और इस तरह उत्पादन संरचना को छोटा कर देंगे।

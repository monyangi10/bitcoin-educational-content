question: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी के मुताबिक, जब बचत बढ़ने की वजह से ब्याज दरें कम होती हैं, तो क्या होता है?
answer: अंतिम वस्तुओं की खपत की मात्रा कम हो जाएगी, ब्याज दरें गिर जाएंगी, उद्यमी पूंजी के इस प्रवाह का उपयोग नए निवेश सामान बनाने के लिए करेंगे और इस तरह उत्पादन संरचना को लंबा करेंगे।

question: Co według austriackiej teorii cyklu koniunkturalnego dzieje się, gdy następuje spadek stóp procentowych z powodu wzrostu oszczędności?
answer: Ilość konsumowanych dóbr finalnych zmniejszy się, stopy procentowe spadną, przedsiębiorcy wykorzystają ten napływ kapitału do tworzenia nowych dóbr inwestycyjnych, a tym samym wydłużą strukturę produkcji.
wrong_answers:
  - Ilość konsumowanych dóbr finalnych wzrośnie, stopy procentowe wzrosną, przedsiębiorcy wykorzystają ten napływ kapitału do tworzenia nowych dóbr inwestycyjnych, a tym samym skrócą strukturę produkcji.
  - Ilość konsumowanych dóbr finalnych zmniejszy się, stopy procentowe wzrosną, przedsiębiorcy wykorzystają ten napływ kapitału do tworzenia nowych dóbr inwestycyjnych, a tym samym skrócą strukturę produkcji.
  - Ilość konsumowanych dóbr finalnych wzrośnie, stopy procentowe spadną, przedsiębiorcy wykorzystają ten napływ kapitału do tworzenia nowych dóbr inwestycyjnych, a tym samym skrócą strukturę produkcji.
explanation: |
  Zgodnie z austriacką teorią cyklu koniunkturalnego, gdy następuje
  spadek stóp procentowych spowodowany wzrostem oszczędności, ilość konsumowanych dóbr finalnych zmniejszy się, ponieważ oszczędzanie wiąże się z odłożeniem części konsumpcji na później. W rezultacie stopy procentowe spadną, ponieważ wzrasta podaż kapitału. Pozwala to przedsiębiorcom na wykorzystanie tego napływu kapitału do tworzenia
  nowych dóbr inwestycyjnych, a tym samym wydłużenie struktury produkcji.
reviewed: true

explanation: |
  Prema Austrijskoj teoriji poslovnog ciklusa, kada dođe do smanjenja kamatnih stopa zbog povećanja štednje, količina konačnih dobara koja se konzumiraju će se smanjiti jer štednja podrazumeva odlaganje dela potrošnje za kasniji datum. Kao rezultat toga, kamatne stope će pasti jer Supply kapitala raste. Ovo omogućava preduzetnicima da iskoriste ovaj priliv kapitala za stvaranje novih investicionih dobara i time produže strukturu proizvodnje.
reviewed: true
question: Šta se dešava kada dođe do smanjenja kamatnih stopa usled povećanja štednje prema Austrijskoj teoriji poslovnog ciklusa?
answer: Količina konačnih dobara koja se konzumiraju će se smanjiti, kamatne stope će pasti, preduzetnici će iskoristiti ovaj priliv kapitala za stvaranje novih investicionih dobara i na taj način produžiti strukturu proizvodnje.

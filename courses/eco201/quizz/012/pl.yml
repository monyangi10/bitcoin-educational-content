question: Jaki jest główny cel kursu o Bitcoinie wspomnianego w rozdziale?
answer: Głównym celem kursu jest edukacja nowych entuzjastów Bitcoina w zakresie zdrowych zasad ekonomicznych.
wrong_answers:
  - Głównym celem kursu jest nauczenie nowych entuzjastów Bitcoina, jak wydobywać bitcoiny.
  - Głównym celem kursu jest nauczenie nowych entuzjastów Bitcoina, jak inwestować w Bitcoina.
  - Głównym celem kursu jest nauczenie nowych entuzjastów Bitcoina, jak tworzyć własne kryptowaluty.
explanation: |
  Kurs ma na celu edukację nowych entuzjastów Bitcoina w zakresie
  podstawowych zasad ekonomii, w szczególności tych
  austriackiej szkoły ekonomii. Wiedza ta jest
  kluczowa dla zrozumienia wartości i potencjału
  Bitcoina jako alternatywy dla tradycyjnych systemów monetarnych.
reviewed: true

question: Каква е основната цел на курса относно Bitcoin, спомената в главата?
answer: Основната цел на курса е да запознае новите ентусиасти на Bitcoin с разумните икономически принципи.
wrong_answers:
  - Основната цел на курса е да научи новите ентусиасти на Bitcoin как да добиват Bitcoin.
  - Основната цел на курса е да научи новите ентусиасти на Bitcoin как да инвестират в Bitcoin.
  - Основната цел на курса е да научи новите ентусиасти на Bitcoin как да създават свои собствени криптовалути.
explanation: |
  Курсът има за цел да запознае новите ентусиасти на Bitcoin с
  основните принципи на икономиката, особено тези
  на Австрийската икономическа школа. Тези знания са
  за разбиране на стойността и потенциала на
  Bitcoin като алтернатива на традиционните парични системи.
reviewed: true

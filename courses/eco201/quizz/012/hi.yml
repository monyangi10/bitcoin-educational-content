question: अध्याय में बताए गए Bitcoin कोर्स का मुख्य उद्देश्य क्या है?
answer: कोर्स का मुख्य मकसद नए Bitcoin के दीवानों को अच्छे आर्थिक सिद्धांतों की शिक्षा देना है।
wrong_answers:
  - कोर्स का मुख्य मकसद नए Bitcoin के दीवानों को Bitcoin माइनिंग करना सिखाना है।
  - इस कोर्स का मुख्य उद्देश्य नए Bitcoin के शौकीनों को सिखाना है कि Bitcoin में निवेश कैसे करें।
  - कोर्स का मुख्य मकसद नए Bitcoin के शौकीनों को यह सिखाना है कि वे अपनी खुद की क्रिप्टोकरेंसी कैसे बना सकते हैं।
explanation: |
  कोर्स का उद्देश्य नए Bitcoin उत्साही लोगों को शिक्षित करना है
  अर्थशास्त्र के मूलभूत सिद्धांत, खासकर वो
  ऑस्ट्रियन स्कूल ऑफ इकॉनॉमिक्स का। यह ज्ञान है
  समझने के लिए अहम है कि इसकी कीमत और संभावना क्या है
  जीडब्ल्यू-6 पारंपरिक मौद्रिक प्रणालियों के विकल्प के रूप में।
reviewed: true
question: วัตถุประสงค์หลักของหลักสูตร Bitcoin ที่กล่าวถึงในบทคืออะไร?
answer: วัตถุประสงค์หลักของหลักสูตรคือการให้ความรู้แก่ผู้ที่สนใจใหม่ใน Bitcoin เกี่ยวกับหลักการทางเศรษฐศาสตร์ที่ถูกต้อง
wrong_answers:
  - วัตถุประสงค์หลักของหลักสูตรคือการสอนผู้ที่สนใจใหม่ใน Bitcoin วิธีการขุด Bitcoin
  - วัตถุประสงค์หลักของหลักสูตรคือการสอนผู้ที่สนใจใหม่ใน Bitcoin ถึงวิธีการลงทุนใน Bitcoin
  - วัตถุประสงค์หลักของหลักสูตรคือการสอนผู้ที่สนใจ Bitcoin ใหม่ให้สร้างสกุลเงินดิจิทัลของตนเอง
explanation: |
  หลักสูตรนี้มีเป้าหมายเพื่อให้ความรู้แก่ผู้ที่สนใจ Bitcoin ใหม่เกี่ยวกับ
  หลักการพื้นฐานของเศรษฐศาสตร์ โดยเฉพาะอย่างยิ่งของ
  สำนักเศรษฐศาสตร์ออสเตรีย ความรู้นี้มีความสำคัญ
  สำหรับการเข้าใจคุณค่าและศักยภาพของ
  Bitcoin ในฐานะทางเลือกแทนระบบการเงินแบบดั้งเดิม
reviewed: true
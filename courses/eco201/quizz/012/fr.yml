question: Quel est l'objectif principal du cours sur le Bitcoin mentionné dans le chapitre ?
answer: L'objectif principal du cours est d'éduquer les nouveaux enthousiastes de Bitcoin sur des principes économiques solides.
wrong_answers:
  - L'objectif principal du cours est d'apprendre aux nouveaux enthousiastes de Bitcoin comment miner du Bitcoin.
  - L'objectif principal du cours est d'apprendre aux nouveaux enthousiastes de Bitcoin comment investir dans le Bitcoin.
  - L'objectif principal du cours est d'apprendre aux nouveaux enthousiastes de Bitcoin comment créer leurs propres cryptomonnaies.
explanation: |
  Le cours vise à éduquer les nouveaux enthousiastes de Bitcoin sur les principes fondamentaux
  de l'économie, en particulier ceux de l'École autrichienne d'économie.
  Cette connaissance est cruciale pour comprendre la valeur et le potentiel de Bitcoin en tant
  qu'alternative aux systèmes monétaires traditionnels.
reviewed: false

question: 이 장에서 언급된 Bitcoin 과정의 주요 목표는 무엇인가요?
answer: 이 과정의 주요 목표는 새로운 Bitcoin 애호가에게 건전한 경제 원리를 교육하는 것입니다.
wrong_answers:
  - 이 과정의 주요 목표는 새로운 Bitcoin 애호가에게 Bitcoin 채굴 방법을 가르치는 것입니다.
  - 이 과정의 주요 목표는 새로운 Bitcoin 애호가에게 Bitcoin에 투자하는 방법을 가르치는 것입니다.
  - 이 과정의 주요 목표는 새로운 Bitcoin 애호가에게 자신만의 암호화폐를 만드는 방법을 가르치는 것입니다.
explanation: |
  이 과정은 새로운 Bitcoin 애호가에게 다음 사항을 교육하는 것을 목표로합니다
  경제학의 기본 원리, 특히 오스트리아 경제학의 기본 원리
  오스트리아 경제학파의 기본 원리를 교육하는 것을 목표로 합니다. 이 지식은
  가치와 잠재력을 이해하는 데 중요합니다
  기존 화폐 시스템의 대안으로서의 Bitcoin.
reviewed: true
  - फ्रैक्शनल रिज़र्व बैंकिंग एक बैंकिंग प्रथा है जहां बैंकों को लोन देने की अनुमति नहीं होती।
  - फ्रैक्शनल रिज़र्व बैंकिंग एक बैंकिंग प्रथा है जहां बैंकों को जमा राशि के बराबर ही रिज़र्व रखना ज़रूरी होता है।

question: फ्रैक्शनल रिज़र्व बैंकिंग क्या है?
answer: फ्रैक्शनल रिज़र्व बैंकिंग एक बैंकिंग प्रथा है जहां बैंकों को जितना डिपॉजिट मिलता है, उतना रिज़र्व रखने की ज़रूरत नहीं होती। इससे वे लोन देते समय नई खरीदारी की ताकत (पर्चेज़िंग पावर) पैदा कर पाते हैं।
wrong_answers:

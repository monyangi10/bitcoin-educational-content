question: การธนาคารสำรองเศษส่วนคืออะไร?
answer: การธนาคารสำรองเศษส่วนเป็นแนวปฏิบัติทางการธนาคารที่ธนาคารไม่จำเป็นต้องถือสำรองเท่ากับจำนวนเงินฝากที่ได้รับ ทำให้พวกเขาสามารถสร้างอำนาจการซื้อใหม่เมื่อให้สินเชื่อ
wrong_answers:
  - การธนาคารสำรองเศษส่วนเป็นแนวปฏิบัติทางการธนาคารที่ธนาคารจะต้องถือสำรองมากกว่าที่ได้รับจากเงินฝาก
  - การธนาคารสำรองเศษส่วนเป็นแนวปฏิบัติทางการธนาคารที่ธนาคารไม่ได้รับอนุญาตให้ให้กู้ยืมเงิน
  - การธนาคารสำรองเศษส่วนเป็นแนวปฏิบัติทางการธนาคารที่ธนาคารจะต้องถือเงินสำรองในจำนวนที่เท่ากับเงินฝากที่ได้รับ
explanation: |
  การธนาคารสำรองเศษส่วนเป็นระบบที่ธนาคารถือเงินสำรองเพียงเศษส่วนของเงินฝากของผู้ฝากเงิน โดยปล่อยกู้ส่วนที่เหลือ ระบบนี้ช่วยให้ธนาคารสามารถสร้างเงินใหม่ในรูปแบบของเงินกู้ ซึ่งจะเพิ่มปริมาณเงินโดยรวมในเศรษฐกิจ
reviewed: true
question: Какво представлява банкирането с частичен резерв?
answer: Банкирането с фракционни резерви е банкова практика, при която банките не са задължени да държат толкова резерви, колкото получават като депозити, което им позволява да създават нова покупателна способност при отпускането на кредити.
wrong_answers:
  - Банкирането с фракционни резерви е банкова практика, при която от банките се изисква да държат повече резерви, отколкото получават под формата на депозити.
  - Банкирането с частични резерви е банкова практика, при която на банките не се разрешава да отпускат заеми.
  - Банкирането с частични резерви е банкова практика, при която от банките се изисква да държат точно толкова резерви, колкото получават под формата на депозити.
explanation: |
  Банкирането с фракционни резерви е система, при която банките държат
  държат в резерв само част от средствата на своите вложители,
  а останалата част отпускат в заем. Тази система позволява на банките да създават
  нови пари под формата на заеми, което увеличава общата
  паричното предлагане в икономиката.
reviewed: true
question: 부분 준비금 은행이란 무엇인가요?
answer: 부분지급준비금제도는 은행이 예금으로 받은 만큼의 지급준비금을 보유할 필요가 없는 은행 관행으로, 대출을 제공할 때 새로운 구매력을 창출할 수 있습니다.
wrong_answers:
  - 부분지급준비금제도는 은행이 예금보다 더 많은 준비금을 보유해야 하는 은행 관행입니다.
  - 부분 준비금 은행은 은행이 대출을 허용하지 않는 은행 관행입니다.
  - 부분지급준비금제도는 은행이 예금으로 받은 금액과 정확히 동일한 금액의 준비금을 보유해야 하는 은행 관행입니다.
explanation: |
  부분 준비금 은행은 은행이 예금자 자금의 일부만
  예금자 자금의 일부만 보유하는 시스템입니다,
  나머지는 대출하는 시스템입니다. 이 시스템을 통해 은행은 대출 형태로
  대출의 형태로 새로운 자금을 창출하여 전체 경제에서
  경제의 통화량을 증가시킵니다.
reviewed: true
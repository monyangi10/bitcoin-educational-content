question: banki y’ububiko bw’imice ni iki?
answer: Fractional reserve banking ni ubuhinga bwo gukoresha amabanki, aho amabanki adasabwa kugira amafaranga menshi nk’ayo aronka mu yaziganywa, bikaba bituma ashobora kurema ubushobozi bushasha bwo kugura igihe atanga ingurane.
wrong_answers:
  - Ivy’ububiko bw'imice bw'amabanki ni ubuhinga bwo gukoresha amabanki aho amabanki asabwa kugira amafaranga menshi kuruta ayo aronka mu yaziganijwe.
  - Amabanki y’ububiko bw’ibice ni umugenzo w’amabanki aho amabanki atemerewe gutanga ingurane.
  - Fractional reserve banking ni ubuhinga bwo gukoresha amabanki aho amabanki asabwa kugira amafaranga angana neza na neza n’ayo abona mu yo baziganije.
explanation: |
  Amabanki y'ububiko bw'imice ni uburyo amabanki afise
  agace gatoyi gusa k’amahera y’ababitse mu bibanza vyabo,
  gutizanya ibindi. Uwo murongo utuma amabanki ashobora kurema .
  amahera mashasha mu buryo bw’inguzanyo, ivyo bikaba bituma muri rusangi .
  amafaranga asabwa mu butunzi.
reviewed: true

question: Czym jest bankowość oparta na rezerwach cząstkowych?
answer: Praktyka bankowa, w której banki nie muszą utrzymywać tylu rezerw, ile otrzymują w depozytach, co pozwala im tworzyć nową siłę nabywczą przy udzielaniu pożyczek.
wrong_answers:
  - Praktyka bankowa, w której banki muszą utrzymywać więcej rezerw niż otrzymują w depozytach.
  - Praktyka bankowa, w której banki nie mogą udzielać pożyczek.
  - Praktyka bankowa, w której banki są zobowiązane do utrzymywania dokładnie takiej samej ilości rezerw, jaką otrzymują w depozytach.
explanation: |
  Bankowość oparta na rezerwach cząstkowych to system, w którym banki trzymają
  tylko część środków swoich deponentów w rezerwie,
  pożyczając resztę. System ten pozwala bankom tworzyć
  nowe pieniądze w formie pożyczek, co zwiększa ogólną ilość pieniądza w gospodarce.
reviewed: true

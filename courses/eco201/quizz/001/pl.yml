question: Na czym skupia się ekonomia austriacka?
answer: Ekonomia austriacka kładzie nacisk na bardziej trzeźwą wizję wzrostu gospodarczego i ludzkiej racjonalności.
wrong_answers:
  - Ekonomia austriacka koncentruje się na drukowaniu monetarnym i wydatkach w celu promowania wzrostu gospodarczego.
  - Ekonomia austriacka kładzie nacisk na centralizację władzy monetarnej.
  - Ekonomia austriacka koncentruje się na produkcji i zarządzaniu pieniędzmi przez władze centralne.
explanation: |
  Rozdział ten wyjaśnia, że ekonomia austriacka kładzie nacisk na
  bardziej trzeźwą wizję wzrostu gospodarczego i ludzkiej racjonalności w naszej gospodarce, znacznie różniąc się od doktryny keynesowskiej.
reviewed: true

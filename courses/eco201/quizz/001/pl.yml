question: Na czym skupia się ekonomia austriacka?
answer: Ekonomia austriacka kładzie nacisk na bardziej trzeźwą wizję wzrostu i ludzkiej racjonalności.
wrong_answers:
  - Ekonomia austriacka koncentruje się na drukowaniu monetarnym i wydatkach w celu promowania wzrostu.
  - Ekonomia austriacka kładzie nacisk na centralizację władzy monetarnej.
  - Ekonomia austriacka koncentruje się na produkcji i zarządzaniu pieniędzmi przez władze centralne
explanation: |
  Rozdział ten wyjaśnia, że ekonomia austriacka kładzie nacisk na
  bardziej trzeźwą wizję wzrostu i ludzkiej racjonalności w naszej gospodarce
  gospodarki, znacznie różniąc się od doktryny keynesowskiej.
reviewed: true
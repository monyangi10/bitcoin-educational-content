question: จุดสนใจหลักของเศรษฐศาสตร์ออสเตรียคืออะไร?
answer: เศรษฐศาสตร์ออสเตรียเน้นมุมมองที่มีความรอบคอบมากขึ้นเกี่ยวกับการเติบโตและความมีเหตุผลของมนุษย์
wrong_answers:
  - เศรษฐศาสตร์ออสเตรียเน้นการพิมพ์เงินและการใช้จ่ายเพื่อส่งเสริมการเติบโต
  - เศรษฐศาสตร์ออสเตรียเน้นการรวมศูนย์อำนาจทางการเงิน
  - เศรษฐศาสตร์ออสเตรียเน้นการผลิตและการจัดการเงินโดยศูนย์กลาง
explanation: |
  บทนี้อธิบายว่าเศรษฐศาสตร์ออสเตรียเน้นมุมมองที่มีสติสัมปชัญญะมากขึ้นเกี่ยวกับการเติบโตและความมีเหตุผลของมนุษย์ในเศรษฐกิจของเรา ซึ่งแตกต่างอย่างมากจากหลักคำสอนของเคนส์
reviewed: true
question: Ni iyihe ntumbero nyamukuru y-ubutunzi bwa otirishi?
answer: Ubutunzi bwa Otirishi burashimika ku ciyumviro gikomeye kuruta c’iterambere n’ugutahura kw’abantu.
wrong_answers:
  - Ubutunzi bwa Otirishi bwibanda ku gucapura amahera no kuyakoresha kugira ngo haboneke iterambere.
  - Ubutunzi bwa Otirishi gushira hamwe canke gucungera ububasha(inzego canke abajejwe) amahera.
  - Ubutunzi bwa Otirishi bwibanda ku guhingura no gucunga amafaranga n-amabanki makuru .
explanation: |
  Ico gice kirasigura yuko ubutunzi bwa Otirishi bushimika.
  Ubutunzi bwacu bushira imbere kubona ibintu mu buryo bworoshe ku bijanye n’iterambere no ku buryo bw’ubwenge bw’abantu, ivyo bitandukanye cane n’inyigisho ya Keynes.
reviewed: true

question: Wat is de belangrijkste focus van de Oostenrijkse economie?
answer: Oostenrijkse economie benadrukt een meer nuchtere visie op groei en menselijke rationaliteit.
wrong_answers:
  - De Oostenrijkse economie richt zich op monetaire druk en uitgaven om groei te bevorderen.
  - Oostenrijkse economie benadrukt de centralisatie van monetaire macht.
  - De Oostenrijkse economie richt zich op de productie en het beheer van geld door centrale banken
explanation: |
  Het hoofdstuk legt uit dat de Oostenrijkse economie de nadruk legt op een
  meer nuchtere visie op groei en menselijke rationaliteit in onze
  economie, die sterk verschilt van de Keynesiaanse doctrine.
reviewed: true
question: Какъв е основният фокус на австрийската икономика?
answer: Австрийската икономика набляга на по-трезво виждане за растежа и човешката рационалност.
wrong_answers:
  - Австрийската икономика се фокусира върху печатането на парични знаци и разходите за насърчаване на растежа.
  - Австрийската икономика набляга на централизацията на паричната власт.
  - Австрийската икономика се фокусира върху производството и управлението на парите от централните
explanation: |
  В главата се обяснява, че австрийската икономика набляга на
  по-трезво виждане за растежа и човешката рационалност в нашата
  и се различава значително от кейнсианската доктрина.
reviewed: true
question: Какъв е основният фокус на австрийската икономическа школа?
answer: набляга на по-трезво виждане за растежа и човешката рационалност.
wrong_answers:
  - Австрийската се фокусира върху печатането на парични знаци и разходите за насърчаване на растежа.
  - Австрийската набляга на централизацията на паричната власт.
  - Австрийската се фокусира върху производството и управлението на парите от централните
explanation: |
  В главата се обяснява, че австрийската икономическа школа набляга на
  по-трезво виждане за растежа и човешката рационалност
  и се различава значително от кейнсианската доктрина.
reviewed: true

question: Koji je glavni fokus austrijske ekonomije?
answer: Austrijska ekonomija naglašava trezveniju viziju rasta i ljudske racionalnosti.
wrong_answers:
  - Austrijska ekonomija se fokusira na štampanje novca i potrošnju kako bi se podstakao rast.
  - Austrijska ekonomija naglašava centralizaciju monetarne moći.
  - Austrijska ekonomija fokusira se na proizvodnju i upravljanje novcem od strane centralnih
explanation: |
  Poglavlje objašnjava da austrijska ekonomija naglašava
  trezveniju viziju rasta i ljudske racionalnosti u našoj
  ekonomiji, koja se uveliko razlikuje od kejnzijanske doktrine.
reviewed: true
question: ऑस्ट्रियन इकोनॉमिक्स का मुख्य फोकस क्या है?
answer: ऑस्ट्रियन इकोनॉमिक्स में ग्रोथ और इंसानी तर्कसंगतता को लेकर एक ज़्यादा संजीदा नज़रिया होता है।
wrong_answers:
  - ऑस्ट्रियन इकोनॉमिक्स ग्रोथ बढ़ाने के लिए पैसे छापने और खर्च करने पर फोकस करती है।
  - ऑस्ट्रियन इकोनॉमिक्स मुद्रा शक्ति के केंद्रीकरण पर जोर देती है।
  - ऑस्ट्रियन इकोनॉमिक्स सेंट्रल बैंक द्वारा पैसे के उत्पादन और प्रबंधन पर ध्यान केंद्रित करती है।
explanation: |
  अध्याय बताता है कि ऑस्ट्रियन इकोनॉमिक्स इस बात पर जोर देता है
  विकास और मानवीय तर्कसंगतता का एक ज़्यादा संयमित नज़रिया हमारे...
  अर्थव्यवस्था, जो कीन्सियन सिद्धांत से बिल्कुल अलग है।
reviewed: true
question: Avusturya ekonomisinin ana odak noktası nedir?
answer: Avusturya ekonomisi, büyüme ve insan rasyonalitesine ilişkin daha ölçülü bir vizyonu vurgulamaktadır.
wrong_answers:
  - Avusturya ekonomisi büyümeyi teşvik etmek için parasal baskı ve harcamalara odaklanır.
  - Avusturya ekonomisi parasal gücün merkezileştirilmesini vurgular.
  - Avusturya ekonomisi, paranın merkezi yönetim tarafından üretilmesi ve yönetilmesine odaklanır
explanation: |
  Bu bölümde, Avusturya ekonomisinin, bireyin
  büyüme ve insan rasyonalitesine ilişkin daha ölçülü bir vizyon
  keynesyen doktrinden büyük ölçüde farklılaşan ekonomi.
reviewed: true
question: Wat is de belangrijkste benadering van de Oostenrijkse economie om economie te begrijpen?
answer: De Oostenrijkse economie begrijpt economie vanuit het perspectief van de menselijke logica en sociologie.
wrong_answers:
  - De Oostenrijkse economie begrijpt economie door middel van wiskundige vergelijkingen.
  - De Oostenrijkse economie begrijpt economie vanuit het perspectief van monetaire druk en uitgaven.
  - Oostenrijkse economie begrijpt economie vanuit het perspectief van centrale banken.
explanation: |
  Het hoofdstuk legt uit dat de Oostenrijkse economie economie begrijpt
  vanuit het perspectief van de menselijke logica en de
  sociologie, in plaats van deze discipline te benaderen door middel van
  wiskundige vergelijkingen.
reviewed: true
question: 오스트리아 경제학에서 경제를 이해하기 위한 주요 접근 방식은 무엇인가요?
answer: 오스트리아 경제학은 인간 논리와 사회학의 관점에서 경제를 이해합니다.
wrong_answers:
  - 오스트리아 경제학은 수학적 방정식을 통해 경제를 이해합니다.
  - 오스트리아 경제학은 화폐 발행과 지출의 관점에서 경제를 이해합니다.
  - 오스트리아 경제학은 중앙은행의 관점에서 경제를 이해합니다.
explanation: |
  이 장에서는 오스트리아 경제학의 이해에 대해 설명합니다
  인간 논리의 관점에서 경제학 및
  사회학의 관점에서 경제학을 이해한다는 것을 설명합니다

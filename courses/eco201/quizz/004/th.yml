question: แนวทางหลักของเศรษฐศาสตร์ออสเตรียในการทำความเข้าใจเศรษฐศาสตร์คืออะไร?
answer: เศรษฐศาสตร์ออสเตรียเข้าใจเศรษฐศาสตร์จากมุมมองของตรรกะมนุษย์และสังคมวิทยา
wrong_answers:
  - เศรษฐศาสตร์ออสเตรียเข้าใจเศรษฐศาสตร์ผ่านสมการทางคณิตศาสตร์
  - เศรษฐศาสตร์ออสเตรียเข้าใจเศรษฐศาสตร์จากมุมมองของการพิมพ์เงินและการใช้จ่ายเงิน
  - เศรษฐศาสตร์ออสเตรียเข้าใจเศรษฐศาสตร์จากมุมมองของธนาคารกลาง
explanation: |
  บทนี้อธิบายว่าเศรษฐศาสตร์ออสเตรียเข้าใจเศรษฐศาสตร์จากมุมมองของตรรกะมนุษย์และสังคมวิทยา แทนที่จะเข้าถึงศาสตร์นี้ผ่านสมการทางคณิตศาสตร์
reviewed: true
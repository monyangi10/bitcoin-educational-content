question: Какъв е основният подход на австрийската икономика към разбирането на икономиката?
answer: Австрийската икономика разглежда икономиката от гледна точка на човешката логика и социологията.
wrong_answers:
  - Австрийската икономика разбира икономиката чрез математически уравнения.
  - Австрийската икономика разбира икономиката от гледна точка на паричното печатане и харчене.
  - Австрийската икономика разбира икономиката от гледна точка на централните банки.
explanation: |
  В главата се обяснява, че австрийската икономика разбира
  икономиката от гледна точка на човешката логика и
  социология, а не подхожда към тази дисциплина чрез
  математически уравнения.
reviewed: true
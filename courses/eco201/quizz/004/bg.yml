question: Какъв е основният подход на австрийската икономическа школа към разбирането на икономиката?
answer: Австрийската икономическа школа разглежда икономиката от гледна точка на човешката логика и социологията.
wrong_answers:
  - Австрийската икономическа школа разбира икономиката чрез математически уравнения.
  - Австрийската икономическа школа разбира икономиката от гледна точка на паричното печатане и харчене.
  - Австрийската икономическа школа разбира икономиката от гледна точка на централните банки.
explanation: |
  В главата се обяснява, че австрийската икономическа школа разбира
  икономиката от гледна точка на човешката логика и
  социология, а не подхожда към тази дисциплина чрез
  математически уравнения.
reviewed: true

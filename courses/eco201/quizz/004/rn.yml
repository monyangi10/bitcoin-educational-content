question: Ni ubuhe buryo nyamukuru ubutunzi bwa Otirishi bukoresha mu gutahura ubutunzi?
answer: Ubutunzi bwa Otirishi butahura ubutunzi bushingiye ku nzira y’ubwenge bw’umuntu n’ubuhinga bw’imibano.
wrong_answers:
  - Ubutunzi bwa Otirishi buratahura ubutunzi biciye mu biharuro.
  - Ubutunzi bwa Otirishi butahura ubutunzi bushingiye ku gucapura amahera no kuyasohora.
  - Ubutunzi bwa Otirishi butahura ubutunzi bushingiye ku mbonerahamwe y’amabanki makura.
explanation: |
  Ico kigabane kirasigura ko ubutunzi bwa Otirishi butahura.
  ubutunzi bushingiye ku nzira y’ivyiyumviro vy’umuntu n’
  icigwa c'imibano, aho kwegera iyo nyigisho biciye ku biharuro.
reviewed: true

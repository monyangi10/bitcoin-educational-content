question: มุมมองของนักเศรษฐศาสตร์ออสเตรียเกี่ยวกับการกำหนดอัตราดอกเบี้ยคืออะไร?
answer: นักเศรษฐศาสตร์ออสเตรียเน้นย้ำว่าการกำหนดอัตราดอกเบี้ยโดยพลการอาจนำไปสู่วิกฤตเศรษฐกิจได้
wrong_answers:
  - นักเศรษฐศาสตร์ออสเตรียเชื่อว่ารัฐบาลควรกำหนดอัตราดอกเบี้ย
  - นักเศรษฐศาสตร์ออสเตรียเชื่อว่าอัตราดอกเบี้ยควรถูกกำหนดและไม่เปลี่ยนแปลง
  - นักเศรษฐศาสตร์ออสเตรียเชื่อว่าอัตราดอกเบี้ยควรถูกกำหนดโดยธนาคารกลาง
explanation: |
  นักเศรษฐศาสตร์ชาวออสเตรียเน้นย้ำว่าการกำหนดอัตราดอกเบี้ยโดยพลการ
  อาจนำไปสู่วิกฤตเศรษฐกิจและทำให้การคำนวณเป็นไปไม่ได้ในระบอบสังคมนิยม
  พวกเขาโต้แย้งว่าความสัมพันธ์ในการประเมินค่าเป็นเรื่องส่วนบุคคล ดังนั้นอัตราดอกเบี้ยจึงสามารถเปลี่ยนแปลงได้
  ขึ้นอยู่กับบุคคลและสถานการณ์
reviewed: true
question: Ni gute abahinga b’ubutunzi bo muri otirishi babona ishingwa ry'ibiciro vy’inyungu?
answer: Abahinga mu vy’ubutunzi bo muri Otirishi barashimika ku vy’uko gushinga inyungu ata co bimaze bishobora gutuma haba ingorane mu vy’ubutunzi.
wrong_answers:
  - Abahinga mu vy’ubutunzi bo muri Otirishi bemera ko Leta ariyo ikwiye gushinga inyungu.
  - Abahinga mu vy’ubutunzi bo muri Otirishi bemera ko inyungu zikwiye kuba zidahinduka kandi zidahinduka.
  - Abahinga mu vy’ubutunzi bo muri Otirishi bemera ko inyungu zikwiye gushirwaho na banki nkuru.
explanation: |
  Abahinga b’ubutunzi bo muri otirishi barashimangira ko gushiraho igipimo c’inyungu ku mafaranga ata mpamvu runaka gishobora gutera akaduruvayo mu butunzi kandi bigatuma gutunganya ibiharuro vy'ubutunzi bidashoboka mu bwitwarariko bwa socialisme.
  Barashigikira ko uburyo ibintu bihabwa agaciro bushingiye ku myiyumvire y’abantu, bivuga ko igipimo c’inyungu gishobora guhinduka hakurikijwe abantu n’ibihe.
reviewed: true

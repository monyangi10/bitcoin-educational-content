question: Какво е мнението на австрийските икономисти за определянето на лихвените проценти?
answer: Австрийските икономисти подчертават, че произволното определяне на лихвения процент може да доведе до икономически кризи.
wrong_answers:
  - Австрийските икономисти смятат, че правителството трябва да определя лихвените проценти.
  - Австрийските икономисти смятат, че лихвените проценти трябва да бъдат фиксирани и непроменливи.
  - Австрийските икономисти смятат, че лихвените проценти трябва да се определят от централната банка.
explanation: |
  Австрийските икономисти подчертават, че произволното определяне на лихвения процент
  може да доведе до икономически кризи и да направи невъзможни изчисленията в един социалистически режим.
  Те твърдят, че оценъчните отношения са субективни, така че лихвените проценти могат да варират
  в зависимост от индивидите и обстоятелствата.
reviewed: true
question: Jaki jest pogląd ekonomistów austriackich na ustalanie stóp procentowych?
answer: Ekonomiści austriaccy podkreślają, że arbitralne ustalanie stopy procentowej może prowadzić do kryzysów gospodarczych.
wrong_answers:
  - Ekonomiści austriaccy uważają, że rząd powinien ustalać stopy procentowe.
  - Ekonomiści austriaccy uważają, że stopy procentowe powinny być stałe i niezmienne.
  - Ekonomiści austriaccy uważają, że stopy procentowe powinny być ustalane przez bank centralny.
explanation: |
  Ekonomiści austriaccy podkreślają, że arbitralne ustalanie stopy procentowej
  może prowadzić do kryzysów gospodarczych i uniemożliwić kalkulację w reżimie socjalistycznym.
  Argumentują, że relacje wyceny są subiektywne, więc stopy procentowe mogą się różnić w zależności od osób i okoliczności.
reviewed: true

question: Jaki jest pogląd austriackich ekonomistów na ustalanie stóp procentowych?
answer: Austriaccy ekonomiści podkreślają, że arbitralne ustalanie stopy procentowej może prowadzić do kryzysów gospodarczych.
wrong_answers:
  - Austriaccy ekonomiści uważają, że rząd powinien ustalać stopy procentowe.
  - Austriaccy ekonomiści uważają, że stopy procentowe powinny być stałe i niezmienne.
  - Austriaccy ekonomiści uważają, że stopy procentowe powinny być ustalane przez bank centralny.
explanation: |
  Austriaccy ekonomiści podkreślają, że arbitralne ustalanie stopy procentowej
  może prowadzić do kryzysów gospodarczych i uniemożliwić kalkulację w reżimie socjalistycznym.
  Argumentują, że relacje wyceny są subiektywne, więc stopy procentowe mogą się różnić w zależności od osób i okoliczności
  w zależności od osób i okoliczności.
reviewed: true
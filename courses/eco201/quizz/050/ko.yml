question: 금리 설정에 대한 오스트리아 경제학자들의 견해는 무엇인가요?
answer: 오스트리아 경제학자들은 금리를 임의로 설정하면 경제 위기로 이어질 수 있다고 강조합니다.
wrong_answers:
  - 오스트리아 경제학자들은 정부가 금리를 결정해야 한다고 생각합니다.
  - 오스트리아 경제학자들은 이자율은 고정되어 있고 변하지 않아야 한다고 생각합니다.
  - 오스트리아 경제학자들은 금리는 중앙은행에서 결정해야 한다고 생각합니다.
explanation: |
  오스트리아 경제학자들은 이자율을 임의로 설정하면
  는 경제 위기를 초래할 수 있으며 사회주의 체제에서는 계산을 불가능하게 만들 수 있다고 강조합니다.
  그들은 가치 평가 관계는 주관적이기 때문에 이자율은 개인과 상황에 따라 달라질 수 있다고 주장합니다

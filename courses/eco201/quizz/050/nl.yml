question: Wat is het standpunt van de Oostenrijkse economen over het vaststellen van rentetarieven?
answer: Oostenrijkse economen benadrukken dat het willekeurig vaststellen van de rente kan leiden tot economische crises.
wrong_answers:
  - Oostenrijkse economen vinden dat de overheid de rentetarieven moet bepalen.
  - Oostenrijkse economen geloven dat rentetarieven vast en onveranderlijk moeten zijn.
  - Oostenrijkse economen geloven dat rentetarieven moeten worden vastgesteld door de centrale bank.
explanation: |
  Oostenrijkse economen benadrukken dat het willekeurig vaststellen van de rentevoet
  kan leiden tot economische crises en berekening onmogelijk kan maken in een socialistisch regime.
  Ze stellen dat waarderingsrelaties subjectief zijn, dus rentetarieven kunnen variëren
  afhankelijk van individuen en omstandigheden.
reviewed: true
question: ऑस्ट्रियाई अर्थशास्त्रियों का ब्याज दरों के निर्धारण पर क्या नज़रिया है?  

वे मानते हैं कि ब्याज दरें बाज़ार की ताकतों (मांग और आपूर्ति) द्वारा तय होनी चाहिए, न कि सरकार या केंद्रीय बैंकों द्वारा। उनका कहना है कि कृत्रिम तरीके से ब्याज दरें कम रखने से निवेश गड़बड़ा जाता है, जिससे आर्थिक उतार-चढ़ाव (बूम-बस्ट साइकल) पैदा होता है।  

लुडविग वॉन मिसेस और फ़्रीडरिक हायक जैसे अर्थशास्त्रियों का मानना था कि बाज़ार को खुद ब्याज दरें तय करने देना चाहिए, तभी संसाधनों का सही आवंटन हो पाता है।
answer: ऑस्ट्रियन इकोनॉमिस्ट्स का कहना है कि ब्याज दर को मनमाने ढंग से तय करने से आर्थिक संकट पैदा हो सकता है।
wrong_answers:
  - ऑस्ट्रियाई अर्थशास्त्रियों का मानना है कि सरकार को ब्याज दरें तय करनी चाहिए।
  - ऑस्ट्रियन इकोनॉमिस्ट्स का मानना है कि ब्याज दरें फिक्स्ड और अपरिवर्तनीय होनी चाहिए।
  - ऑस्ट्रियन इकोनॉमिस्ट्स का मानना है कि ब्याज दरें सेंट्रल बैंक द्वारा तय की जानी चाहिए।
explanation: |
  ऑस्ट्रियन इकोनॉमिस्ट्स इस बात पर जोर देते हैं कि ब्याज दर को मनमाने ढंग से तय करना
  समाजवादी व्यवस्था में आर्थिक संकट पैदा कर सकता है और हिसाब-किताब असंभव बना सकता है।
  वे कहते हैं कि मूल्यांकन संबंध व्यक्तिपरक होते हैं, इसलिए ब्याज दरें अलग-अलग हो सकती हैं
  व्यक्ति और परिस्थितियों पर निर्भर करता है।
reviewed: true
question: Jaka jest rola cen w austriackiej szkole ekonomii?
answer: Ceny odgrywają kluczową rolę w racjonalnej organizacji jednostek posiadających częściowe informacje.
wrong_answers:
  - Ceny są nieistotne.
  - Ceny są ustalane przez rząd.
  - Ceny są stałe i nie zmieniają się.
explanation: |
  W austriackiej szkole ekonomii ceny odgrywają kluczową rolę w racjonalnej organizacji jednostek posiadających częściowe informacje. Pomagają zrównoważyć popyt na kapitał na rynku, promując w ten sposób gospodarkę.
reviewed: true

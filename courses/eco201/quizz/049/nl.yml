question: Wat is de rol van prijzen in de Oostenrijkse economische school?
answer: Prijzen spelen een cruciale rol in de rationele organisatie van individuen met gedeeltelijke informatie.
wrong_answers:
  - Prijzen zijn irrelevant in de Oostenrijkse economische school.
  - In de Oostenrijkse economische school worden prijzen bepaald door de overheid.
  - In de Oostenrijkse economische school staan prijzen vast en veranderen ze niet.
explanation: |
  In de Oostenrijkse economische school spelen prijzen een cruciale rol in de
  rationele organisatie van individuen met gedeeltelijke informatie. Ze helpen
  de Supply en de vraag naar kapitaal op de markt in evenwicht te brengen en zo de economie te bevorderen.
reviewed: true
question: Каква е ролята на цените в австрийската икономическа школа?
answer: Цените играят ключова роля в рационалната организация на индивидите с частична информация.
wrong_answers:
  - В австрийската икономическа школа цените са без значение.
  - В австрийската икономическа школа цените се определят от правителството.
  - В австрийската икономическа школа цените са фиксирани и не се променят.
explanation: |
  В австрийската икономическа школа цените играят решаваща роля за
  рационалната организация на индивидите с частична информация. Те спомагат за балансирането
  търсенето и предлагането на капитал на пазара, като по този начин насърчават икономиката.
reviewed: true
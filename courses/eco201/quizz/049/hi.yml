question: ऑस्ट्रियन स्कूल ऑफ इकोनॉमिक्स में कीमतों की क्या भूमिका है?
answer: दाम आंशिक जानकारी वाले लोगों के तर्कसंगत संगठन में अहम भूमिका निभाते हैं।
wrong_answers:
  - ऑस्ट्रियन स्कूल ऑफ इकॉनॉमिक्स में कीमतें कोई मायने नहीं रखतीं।
  - ऑस्ट्रियन स्कूल ऑफ इकॉनॉमिक्स में कीमतें सरकार द्वारा तय की जाती हैं।
  - ऑस्ट्रियन स्कूल ऑफ इकॉनॉमिक्स में कीमतें फिक्स्ड होती हैं और बदलती नहीं।
explanation: |
  ऑस्ट्रियन इकोनॉमिक्स स्कूल में, कीमतों का एक अहम रोल होता है
  आंशिक जानकारी वाले व्यक्तियों का तर्कसंगत संगठन। ये संतुलन बनाने में मदद करते हैं
  जीडब्ल्यू-0 और बाजार में पूंजी की मांग, जिससे अर्थव्यवस्था को बढ़ावा मिलता है।
reviewed: true
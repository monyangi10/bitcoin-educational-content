question: 오스트리아 경제학파에서 가격의 역할은 무엇인가요?
answer: 가격은 부분적인 정보를 가진 개인이 합리적으로 조직을 구성하는 데 중요한 역할을 합니다.
wrong_answers:
  - 오스트리아 경제학파에서는 가격이 중요하지 않습니다.
  - 가격은 오스트리아 경제학파의 정부에 의해 결정됩니다.
  - 오스트리아 경제학파에서는 가격이 고정되어 있으며 변경되지 않습니다.
explanation: |
  오스트리아 경제학파에서 가격은 부분적인 정보를 가진 개인들을
  개인을 합리적으로 조직하는 데 중요한 역할을 합니다. 가격은 시장에서 자본의 공급과
  시장에서 자본의 공급과 수요를 조절하여 경제를 촉진합니다.
reviewed: true
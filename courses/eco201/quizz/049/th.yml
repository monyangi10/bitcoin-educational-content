question: บทบาทของราคาในสำนักเศรษฐศาสตร์ออสเตรียคืออะไร?
answer: ราคามีบทบาทสำคัญในการจัดระเบียบอย่างมีเหตุผลของบุคคลที่มีข้อมูลบางส่วน
wrong_answers:
  - ราคานั้นไม่เกี่ยวข้องในสำนักเศรษฐศาสตร์ออสเตรีย
  - ราคาถูกกำหนดโดยรัฐบาลในสำนักเศรษฐศาสตร์ออสเตรีย
  - ราคาคงที่และไม่เปลี่ยนแปลงในสำนักเศรษฐศาสตร์ออสเตรีย
explanation: |
  ในสำนักเศรษฐศาสตร์ออสเตรีย ราคามีบทบาทสำคัญในการจัดระเบียบอย่างมีเหตุผลของบุคคลที่มีข้อมูลบางส่วน พวกเขาช่วยปรับสมดุลอุปสงค์และอุปทานของทุนในตลาด ซึ่งส่งเสริมเศรษฐกิจ
reviewed: true
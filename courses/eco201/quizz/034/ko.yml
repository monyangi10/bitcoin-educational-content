question: 오스트리아 경기순환 이론이란 무엇인가요?
answer: 오스트리아 경기순환 이론은 경기 사이클을 부분 준비 은행 시스템의 내생적 역학으로 설명하는 이론으로, 인간 행동의 순차적 특성과 금리 변동이 경제 주체들의 시공간적 조정에 미치는 영향을 강조합니다.

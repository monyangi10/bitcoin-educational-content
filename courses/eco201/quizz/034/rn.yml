question: Ni igiki ciyumviro ca Otirishi kwi zinguzingu y'ubutunzi?
answer: Ivyiyumviro vy’ubu otirirshi vyerekeye Inzinguzingu y’Ubucuruzi(ubutunzi) ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’inguvu z’imbere mu gihugu z’uburyo bw’amabanki y’ububiko bw’ibice, bishimika ku kamere k’urutonde rw’ibikorwa vy’abantu n’ingaruka z’uguhinduka kw’inyungu ku guhuza ibikorwa vy’ubutunzi hagati y’ibihe.
wrong_answers:
  - Ivyiyumviro vy’Abanya otirishi vyerekeye Inzinguzingu y’Ubucuruzi ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’ingaruka y’ibintu biva hanze hamwe n'ibiva mubikorwa vy'abajejwe ubutunzi.
  - Ivyiyumviro vy’Abanya otirishi vyerekeye Inzinguzingu y’Ubucuruzi ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’inyishu y’amahinduka mu bisabwa vyose hamwe n'ibitangwa.
  - Ivyiyumviro vy’abanya otirishi vyerekeye Inzinguzingu y’Ubucuruzi ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’inyishu y’ihinduka ry’ingero z’akazi, GDP(umusaruro w'igihugu), canke urutonde rw’ibiciro vy’abaguzi.
explanation: |
  Ivyiyumviro vy’Abanyaotirishi vyerekeye Inzinguzingu y’Ubucuruzi, vyateguwe na Ludwig Von Mises .
  na Friedrich Hayek, asigura ko inzinguzingu z’ubutunzi ari uguhinduka kw’imbere mu gihugu .
  uburyo bwo gukoresha amabanki y’ububiko bw'imice. Rishimika ku kuntu ibikorwa vy’umuntu bikurikirana kandi .
  ingaruka z'uguhinduka kw'inyungu ku guhuza ubutunzi hagati y'ibihe
  abakozi.
reviewed: true

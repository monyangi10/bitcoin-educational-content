question: Ni igiki ciyumviro ca Otirishiya ku bijanye n’ingendo y’ubudandaji?
answer: Ivyiyumviro vy’Ubudagi vyerekeye Inzinguzingu y’Ubucuruzi ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’inguvu z’imbere mu gihugu z’uburyo bw’amabanki y’ububiko bw’ibice, bishimika ku kamere k’urutonde rw’ibikorwa vy’abantu n’ingaruka z’uguhinduka kw’inyungu ku guhuza ibikorwa vy’ubutunzi hagati y’ibihe.
wrong_answers:
  - Ivyiyumviro vy’Abanyaotirishiya vyerekeye Inzinguzingu y’Ubucuruzi ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’ingaruka y’ibintu biva hanze n’impwemu z’ibikoko.
  - Ivyiyumviro vy’Ubudagi vyerekeye Inzinguzingu y’Ubucuruzi ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’inyishu y’amahinduka mu bisabwa vyose hamwe na Supply.
  - Ivyiyumviro vy’Ubudagi vyerekeye Inzinguzingu y’Ubucuruzi ni iciyumviro gisobanura inzinguzingu z’ubutunzi nk’inyishu y’ihinduka ry’ingero z’akazi, GDP, canke urutonde rw’ibiciro vy’abaguzi.
explanation: |
  Ivyiyumviro vy’Abanyaotirishiya vyerekeye Inzinguzingu y’Ubucuruzi, vyateguwe na Ludwig Von Mises .
  na Friedrich Hayek, asigura ko inzinguzingu z’ubutunzi ari uguhinduka kw’imbere mu gihugu kw’imice .
  uburyo bwo gukoresha amabanki y’ububiko. Rishimika ku kuntu ibikorwa vy’umuntu bikurikirana kandi .
  ingaruka z'uguhinduka kw'inyungu ku guhuza ubutunzi hagati y'ibihe
  abakozi.
reviewed: true
question: Wat is de Oostenrijkse theorie van de conjunctuurcyclus?
answer: De Oostenrijkse theorie van de conjunctuurcyclus is een theorie die economische cycli verklaart als endogene dynamiek van het 'fractional reserve banking'-systeem, waarbij de nadruk ligt op de sequentiële aard van menselijk handelen en de invloed van renteschommelingen op de intertemporele coördinatie van economische agenten.
wrong_answers:
  - De Oostenrijkse theorie van de conjunctuurcyclus is een theorie die economische cycli verklaart als een gevolg van externe gebeurtenissen en dierlijke geesten.
  - De Oostenrijkse theorie van de conjunctuurcyclus is een theorie die economische cycli verklaart als het resultaat van veranderingen in de geaggregeerde vraag en Supply.
  - De Oostenrijkse theorie van de conjunctuurcyclus is een theorie die economische cycli verklaart als een gevolg van veranderingen in de werkgelegenheid, het BBP of de consumentenprijsindex.
explanation: |
  De Oostenrijkse theorie van de conjunctuurcyclus, ontwikkeld door Ludwig Von Mises
  en Friedrich Hayek, verklaart economische cycli als endogene dynamiek van het fractionele
  reserve banksysteem. Het benadrukt de sequentiële aard van menselijk handelen en
  de invloed van renteschommelingen op de intertemporele coördinatie van economische agenten
  agenten.
reviewed: true
question: Какво представлява австрийската теория за бизнес цикъла?
answer: Австрийската теория за бизнес цикъла е теория, която обяснява икономическите цикли като ендогенна динамика на банковата система с частичен резерв, като подчертава последователния характер на човешките действия и влиянието на колебанията на лихвените проценти върху междувременната координация на икономическите агенти.
wrong_answers:
  - Австрийската теория за бизнес цикъла е теория, която обяснява икономическите цикли като резултат от външни събития и животински дух.
  - Австрийската теория за бизнес цикъла е теория, която обяснява икономическите цикли като резултат от промени в съвкупното търсене и предлагане.
  - Австрийската теория за бизнес цикъла е теория, която обяснява икономическите цикли като резултат от промените в равнището на заетостта, БВП или индекса на потребителските цени.
explanation: |
  Австрийската теория за бизнес цикъла, разработена от Лудвиг фон Мизес
  и Фридрих Хайек, обяснява икономическите цикли като ендогенна динамика на дробния
  на банковата система. Тя набляга на последователния характер на човешките действия и
  влиянието на колебанията на лихвените проценти върху междувремевата координация на икономическите
  агентите.
reviewed: true
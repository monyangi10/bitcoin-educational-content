question: 什麼是奧地利商業週期理論？
answer: 奧地利商業週期理論 (Austrian Theory of the Business Cycle) 是一種將經濟週期解釋為部分儲備金銀行體系內生動力的理論，強調人類行動的連續性及利率波動對經濟代理人跨期協調的影響。
wrong_answers:
  - 奧地利商業週期理論 (Austrian Theory of the Business Cycle) 將經濟週期解釋為外部事件和動物精神的結果。
  - 奧地利商業週期理論 (Austrian Theory of the Business Cycle) 將經濟週期解釋為總需求和 Supply 變化的結果。
  - 奧地利商業週期理論 (Austrian Theory of the Business Cycle) 是一種將經濟週期解釋為就業水平、國內生產總值或消費者物價指數變動結果的理論。
explanation: |

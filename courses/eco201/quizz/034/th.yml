question: ทฤษฎีวัฏจักรธุรกิจของออสเตรียคืออะไร?
answer: ทฤษฎีวัฏจักรธุรกิจของออสเตรียเป็นทฤษฎีที่อธิบายวัฏจักรเศรษฐกิจว่าเป็นพลวัตภายในของระบบธนาคารสำรองเศษส่วน โดยเน้นถึงลักษณะตามลำดับของการกระทำของมนุษย์และผลกระทบของความผันผวนของอัตราดอกเบี้ยต่อการประสานงานระหว่างเวลาในตัวแทนทางเศรษฐกิจ
wrong_answers:
  - ทฤษฎีวัฏจักรธุรกิจของออสเตรียเป็นทฤษฎีที่อธิบายวัฏจักรเศรษฐกิจว่าเป็นผลมาจากเหตุการณ์ภายนอกและจิตวิญญาณของสัตว์.
  - ทฤษฎีวัฏจักรธุรกิจของออสเตรียเป็นทฤษฎีที่อธิบายวัฏจักรเศรษฐกิจว่าเป็นผลมาจากการเปลี่ยนแปลงในอุปสงค์และอุปทานรวม
  - ทฤษฎีวัฏจักรธุรกิจของออสเตรียเป็นทฤษฎีที่อธิบายวัฏจักรเศรษฐกิจว่าเป็นผลมาจากการเปลี่ยนแปลงในระดับการจ้างงาน, GDP, หรือดัชนีราคาผู้บริโภค
explanation: |
  ทฤษฎีวัฏจักรธุรกิจของออสเตรีย ซึ่งพัฒนาโดยลุดวิก ฟอน มีเซส และฟรีดริช ฮาเย็ค อธิบายวัฏจักรเศรษฐกิจว่าเป็นพลวัตภายในของระบบธนาคารสำรองเศษส่วน โดยเน้นถึงลักษณะตามลำดับของการกระทำของมนุษย์และผลกระทบของความผันผวนของอัตราดอกเบี้ยต่อการประสานงานระหว่างช่วงเวลาของตัวแทนทางเศรษฐกิจ
reviewed: true
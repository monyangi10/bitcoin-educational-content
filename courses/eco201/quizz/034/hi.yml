question: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी क्या है?
answer: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी एक ऐसा सिद्धांत है जो आर्थिक चक्रों को फ्रैक्शनल रिज़र्व बैंकिंग सिस्टम की अंदरूनी गतिशीलता के रूप में समझाता है। यह मानवीय कार्यों के क्रमिक स्वभाव और आर्थिक एजेंट्स के बीच समय-अंतराल समन्वय पर ब्याज दरों के उतार-चढ़ाव के प्रभाव पर ज़ोर देता है।
wrong_answers:
  - ऑस्ट्रियन बिज़नेस साइकिल थ्योरी एक ऐसा सिद्धांत है जो आर्थिक चक्रों को बाहरी घटनाओं और 'एनिमल स्पिरिट्स' (जानवरों जैसी प्रवृत्ति) के परिणाम के रूप में समझाता है।
  - ऑस्ट्रियन बिजनेस साइकिल थ्योरी एक ऐसा सिद्धांत है जो आर्थिक चक्रों को समग्र मांग और Supply में परिवर्तनों के परिणाम के रूप में समझाता है।
  - ऑस्ट्रियन बिज़नेस साइकिल थ्योरी एक ऐसा सिद्धांत है जो आर्थिक चक्रों को रोज़गार के स्तर, जीडीपी या उपभोक्ता मूल्य सूचकांक में बदलाव के परिणाम के रूप में समझाता है।
explanation: |
  ऑस्ट्रियन बिज़नेस साइकिल थ्योरी, जिसे लुडविग वॉन मिसेस ने विकसित किया था
  और फ्रेडरिक हायेक, आर्थिक चक्रों को आंशिक की अंतर्जात गतिशीलता के रूप में समझाते हैं।
  रिज़र्व बैंकिंग सिस्टम। यह मानव क्रिया के क्रमिक स्वरूप पर ज़ोर देता है और
  ब्याज दर में उतार-चढ़ाव का अर्थव्यवस्था के अंतराल समन्वय पर प्रभाव
  एजेंट्स
reviewed: true
question: Czym jest austriacka teoria cyklu koniunkturalnego?
answer: Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako endogeniczną dynamikę systemu bankowego opartego na rezerwie cząstkowej, podkreślając sekwencyjny charakter ludzkich działań i wpływ wahań stóp procentowych na międzyokresową koordynację podmiotów gospodarczych.
wrong_answers:
  - Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako wynik wydarzeń zewnętrznych i duchów zwierząt.
  - Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako wynik zmian w zagregowanym popycie i Supply.
  - Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako wynik zmian w poziomie zatrudnienia, PKB lub wskaźniku cen konsumpcyjnych.

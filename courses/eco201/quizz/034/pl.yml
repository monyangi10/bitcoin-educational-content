question: Czym jest austriacka teoria cyklu koniunkturalnego?
answer: Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako endogeniczną dynamikę systemu bankowego opartego na rezerwach cząstkowych, podkreślając sekwencyjny charakter ludzkich działań i wpływ wahań stóp procentowych na międzyokresową koordynację podmiotów gospodarczych.
wrong_answers:
  - Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako wynik wydarzeń zewnętrznych i duchów zwierząt.
  - Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako wynik zmian w zagregowanym popycie i podaży.
  - Austriacka teoria cyklu koniunkturalnego to teoria, która wyjaśnia cykle gospodarcze jako wynik zmian w poziomie zatrudnienia, PKB lub wskaźniku cen konsumpcyjnych.
explanation: |
  Austriacka teoria cyklu koniunkturalnego, opracowana przez Ludwiga Von Misesa i Friedricha Hayeka, wyjaśnia cykle koniunkturalne jako endogeniczną dynamikę systemu bankowości rezerw cząstkowych. Podkreśla ona sekwencyjny charakter ludzkich działań i wpływ wahań stóp procentowych na międzyokresową koordynację podmiotów gospodarczych.
reviewed: true

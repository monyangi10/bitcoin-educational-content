question: Keynesyen ve Avusturya ekonomisi arasındaki temel fark nedir?
answer: Keynesyen ekonomi, büyümeyi teşvik etmek için para basmaya ve harcamaya inanırken, Avusturya ekonomisi daha ölçülü bir büyüme ve insan rasyonalitesi vizyonunu vurgular.
wrong_answers:
  - Keynesyen ekonomi daha ölçülü bir büyüme ve insan rasyonalitesi vizyonunu vurgularken, Avusturya ekonomisi büyümeyi teşvik etmek için para basmaya ve harcamaya inanmaktadır.
  - Keynesyen ekonomi, paranın merkez bankaları tarafından üretilmesi ve yönetilmesine odaklanırken, Avusturya ekonomisi parasal gücün ademi merkeziyetçiliğine inanmaktadır.
  - Keynesyen ekonomi parasal gücün merkezileştirilmesine inanırken, Avusturya ekonomisi paranın merkez bankaları tarafından üretilmesi ve yönetilmesine odaklanır.
explanation: |
  Bu bölüm, Keynesyen ekonominin aşağıdaki hususları desteklediğini açıklamaktadır
  paranın üretimi ve yönetiminin
  merkez bankalarının sorumluluğunda olduğunu ve para basmanın
  ve harcamalar büyümeyi teşvik eder. Öte yandan, Avusturyalı
  ekonomisi, 200 yılı aşkın bir süredir devam eden araştırma ve geliştirme çalışmaları,
  felsefi düşünceler ve ünlü yazarların yazıları
  yazarlar, daha ölçülü bir büyüme ve insan vizyonunu vurgular
  ekonomimizde rasyonellik.
reviewed: true
question: 凱恩斯經濟學與奧地利經濟學的主要差異是什麼？
answer: 凱恩斯經濟學相信以印製貨幣和支出來促進成長，而奧地利經濟學則強調更清醒的成長觀和人類的理性。
wrong_answers:
  - 凱恩斯經濟學強調對成長與人類理性更清醒的看法，而奧地利經濟學則相信印製貨幣與支出可以促進成長。
  - 凱恩斯經濟學著重於中央銀行的貨幣生產與管理，而奧地利經濟學則相信貨幣權力的分散。
  - 凱恩斯經濟學相信貨幣權力的集中，而奧地利經濟學則著重於中央銀行對貨幣的生產與管理。
explanation: |

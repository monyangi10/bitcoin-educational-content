question: Jaka jest główna różnica między ekonomią keynesowską a austriacką?
answer: Ekonomia keynesowska wierzy w dodruk pieniądza i wydatki w celu promowania wzrostu gospodarczego, podczas gdy ekonomia austriacka kładzie nacisk na bardziej trzeźwą wizję wzrostu i ludzkiej racjonalności.
wrong_answers:
  - Ekonomia keynesowska kładzie nacisk na bardziej trzeźwą wizję wzrostu gospodarczego i ludzkiej racjonalności, podczas gdy ekonomia austriacka wierzy w druk monetarny i wydatki w celu promowania wzrostu.
  - Ekonomia keynesowska koncentruje się na produkcji i zarządzaniu pieniędzmi przez banki centralne, podczas gdy ekonomia austriacka wierzy w decentralizację władzy monetarnej.
  - Ekonomia keynesowska wierzy w centralizację władzy monetarnej, podczas gdy ekonomia austriacka koncentruje się na produkcji i zarządzaniu pieniędzmi przez banki centralne.
explanation: |
  W rozdziale tym wyjaśniono, że ekonomia keynesowska promuje ideę,
  że za produkcję i zarządzanie pieniądzem odpowiedzialne są banki centralne oraz że dodruk pieniądza i wydatki promują wzrost gospodarczy. Z drugiej strony ekonomia austriacka, z ponad 200 latami badań nad refleksjami filozoficznymi i pismami znanych autorów, podkreśla bardziej trzeźwą wizję wzrostu gospodarczego i ludzkiej racjonalności w naszej gospodarce.
reviewed: true

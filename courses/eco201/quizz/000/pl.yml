question: Jaka jest główna różnica między ekonomią keynesowską a austriacką?
answer: Ekonomia keynesowska wierzy w dodruk pieniądza i wydatki w celu promowania wzrostu, podczas gdy ekonomia austriacka kładzie nacisk na bardziej trzeźwą wizję wzrostu i ludzkiej racjonalności.
wrong_answers:
  - Ekonomia keynesowska kładzie nacisk na bardziej trzeźwą wizję wzrostu i ludzkiej racjonalności, podczas gdy ekonomia austriacka wierzy w druk monetarny i wydatki w celu promowania wzrostu.
  - Ekonomia keynesowska koncentruje się na produkcji i zarządzaniu pieniędzmi przez banki centralne, podczas gdy ekonomia austriacka wierzy w decentralizację władzy monetarnej.
  - Ekonomia keynesowska wierzy w centralizację władzy monetarnej, podczas gdy ekonomia austriacka koncentruje się na produkcji i zarządzaniu pieniędzmi przez banki centralne.

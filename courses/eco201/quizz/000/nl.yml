question: Wat is het belangrijkste verschil tussen Keynesiaanse en Oostenrijkse economie?
answer: Keynesiaanse economie gelooft in geld drukken en uitgeven om groei te bevorderen, terwijl Oostenrijkse economie een meer nuchtere visie op groei en menselijke rationaliteit benadrukt.
wrong_answers:
  - Keynesiaanse economie benadrukt een meer nuchtere visie op groei en menselijke rationaliteit, terwijl Oostenrijkse economie gelooft in het drukken van geld en uitgaven om groei te bevorderen.
  - Keynesiaanse economie richt zich op de productie en het beheer van geld door centrale banken, terwijl Oostenrijkse economie gelooft in de decentralisatie van monetaire macht.
  - Keynesiaanse economie gelooft in de centralisatie van monetaire macht, terwijl Oostenrijkse economie zich richt op de productie en het beheer van geld door centrale banken.

question: Koja je glavna razlika između kejnzijanske i austrijske ekonomije?
answer: Kejnzijanska ekonomija veruje u štampanje novca i trošenje kako bi se podstakao rast, dok austrijska ekonomija naglašava trezveniju viziju rasta i ljudske racionalnosti.
wrong_answers:
  - Kejnzijanska ekonomija naglašava trezveniju viziju rasta i ljudske racionalnosti, dok austrijska ekonomija veruje u štampanje novca i trošenje kako bi se podstakao rast.
  - Kejnzijanska ekonomija fokusira se na proizvodnju i upravljanje novcem od strane centralnih banaka, dok austrijska ekonomija veruje u decentralizaciju monetarne moći.
  - Kejnzijanska ekonomija veruje u centralizaciju monetarne moći, dok austrijska ekonomija fokus stavlja na proizvodnju i upravljanje novcem od strane centralnih banaka.
explanation: |
  Poglavlje objašnjava da kejnzijanska ekonomija podržava ideju da su proizvodnja i upravljanje novcem odgovornost centralnih banaka, te da štampanje novca i potrošnja podstiču rast. S druge strane, austrijska ekonomija, sa preko 200 godina istraživanja i razvoja, filozofskih refleksija i spisa renomiranih autora, naglašava trezveniju viziju rasta i ljudske racionalnosti u našoj ekonomiji.

question: Ni itandukaniro irihe rikomeye riri hagati y’ubutunzi bwa Keynes n’ubw’abanya otirishi?
answer: Ubutunzi bwa Keynes bwizera gucapura canke gukora amahera no kuyasohora(kuyakoresha) kugira ngo habe iterambere, mu gihe ubutunzi bwa Otirishi bushimika ku ciyumviro gikomeye kuruta c’iterambere n’ugutahura kw’abantu.
wrong_answers:
  - Ubutunzi bwa Keynes bushimika ku ciyumviro gikomeye kuruta ic’iterambere n’ugutahura kw’abantu, mu gihe ubutunzi bwa Otirishi bwizera gukora amahera no gukoresha amahera kugira ngo umuntu atere imbere.
  - Ubutunzi bwa Keynes bwibanda ku guhingura no gucunga amafaranga n’amabanki akomeye, mu gihe ubutunzi bwa Otirishi bwizera mu Kugabanganya ububasha mu bijanye n’amafaranga(aho atanumwe yifatira ingingo).
  - Ubutunzi bwa Keynes bwizera ko ububasha bw-ukugenzura bw’amahera bushirwa hamwe(hari abafata ingingo), mu gihe ubutunzi bwa Otirishi bwibanda ku guhingura no gucunga amahera n’amabanki akomeye.
explanation: |
  Ico gice kirasigura ko ubutunzi bushingiye kuvyiyumviro vya Keynes bushigikira .
  iciyumviro c’uko umwimbu n’ugucungera canke kugenzura amahera ari co gikorwa c’amabanki makuru, n’uko gucapura amahera .
  kandi gukoresha amahera biratuma haba iterambere. Ku rundi ruhande, Ubutunzi bw'Abanyaotirishi .
  , bufise imyaka irenga 200 y’ubushakashatsi n’iterambere,
  ivyiyumviro vya filozofiya, n’ivyanditswe n’abanditsi bazwi cane .
  abanditsi, ashimika ku ciyumviro gikomeye kuruta c’ugutera imbere kw'abantu .
  n’ugutahura ibintu mu butunzi bwacu.
reviewed: true

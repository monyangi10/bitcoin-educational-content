question: Ni itandukaniro irihe rikomeye riri hagati y’ubutunzi bwa Keynes n’ubw’Ubudagi?
answer: Ubutunzi bwa Keynes bwizera gucapura amahera no kuyakoresha kugira ngo umuntu atere imbere, mu gihe ubutunzi bwa Otirishiya bushimika ku ciyumviro gikomeye kuruta c’iterambere n’ugutahura kw’abantu.
wrong_answers:
  - Ubutunzi bwa Keynes bushimika ku ciyumviro gikomeye kuruta c’iterambere n’ugutahura kw’abantu, mu gihe ubutunzi bwa Otirishiya bwizera gucapura amahera no gukoresha amahera kugira ngo umuntu atere imbere.
  - Ubutunzi bwa Keynes bwibanda ku guhingura no gucunga amafaranga n’amabanki akomeye, mu gihe ubutunzi bwa Otirishiya bwizera ko ububasha bw’amahera bushobora gushirwa ahantu hamwe.
  - Ubutunzi bwa Keynes bwizera ko ububasha bw’amahera bushirwa hamwe, mu gihe ubutunzi bwa Otirishiya bwibanda ku guhingura no gucunga amahera n’amabanki akomeye.
explanation: |
  Ico kigabane kirasigura ko ubutunzi bwa Keynes bushigikira .
  iciyumviro c’uko uguhingura n’ugucungera amahera ari vyo .
  inshingano z’amabanki akomeye, n’uko gucapura amahera .
  kandi gukoresha amahera biratuma haba iterambere. Ku rundi ruhande, Abanyaotirishiya .
  ubutunzi, bufise imyaka irenga 200 y’ubushakashatsi n’iterambere,
  ivyiyumviro vya filozofiya, n’ivyanditswe n’abantu bazwi cane .
  abanditsi, ashimika ku ciyumviro gikomeye kuruta c’ukukura n’abantu .
  n’ugutahura ibintu mu bukungu bwacu.
reviewed: true
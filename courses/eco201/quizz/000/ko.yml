question: 케인즈주의 경제학과 오스트리아 경제학의 주요 차이점은 무엇인가요?
answer: 케인즈주의 경제학은 성장을 촉진하기 위해 화폐 발행과 지출을 믿지만, 오스트리아 경제학은 성장과 인간의 합리성에 대한 보다 냉정한 비전을 강조합니다.
wrong_answers:
  - 케인즈주의 경제학은 성장과 인간의 합리성에 대한 보다 냉정한 비전을 강조하는 반면, 오스트리아 경제학은 성장을 촉진하기 위해 화폐 발행과 지출을 믿습니다.
  - 케인즈주의 경제학은 중앙은행이 화폐를 생산하고 관리하는 데 중점을 두는 반면, 오스트리아 경제학은 화폐 권력의 분권화를 믿습니다.
  - 케인즈 경제학은 통화 권력의 중앙 집중화를 믿는 반면, 오스트리아 경제학은 중앙 은행의 화폐 생산과 관리에 초점을 맞추고 있습니다.
explanation: |
  이 장에서는 케인즈 경제학이 다음과 같은 생각을 지지한다고 설명합니다
  돈의 생산과 관리가 중앙 은행의 책임이라는 생각
  중앙은행의 책임이며, 통화 인쇄와 지출은
  및 지출이 성장을 촉진한다는 생각을 지지한다고 설명합니다. 반면에 오스트리아
  경제학은 200년 이상 연구와 발전을 거듭하며
  철학적 성찰과 저명한 저술가들의 저서를 통해
  저자들은 성장과 인간에 대한 보다 냉정한 비전을 강조합니다
  합리성을 강조합니다.

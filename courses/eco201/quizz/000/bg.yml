question: Каква е основната разлика между кейнсианската и австрийската икономика?
answer: Кейнсианската икономика вярва в паричното печатане и харченето за насърчаване на растежа, докато австрийската икономика набляга на по-трезво виждане за растежа и човешката рационалност.
wrong_answers:
  - Кейнсианската икономика набляга на по-трезво виждане за растежа и човешката рационалност, докато австрийската икономика вярва в паричното печатане и разходите за насърчаване на растежа.
  - Кейнсианската икономика се фокусира върху производството и управлението на парите от централните банки, докато австрийската икономика вярва в децентрализацията на паричната власт.
  - Кейнсианската икономика вярва в централизацията на паричната власт, докато австрийската икономика се фокусира върху производството и управлението на парите от централните банки.

question: Каква е основната разлика между кейнсианската и австрийската икономическа школа?
answer: Кейнсианската вярва в паричното печатане и харченето за насърчаване на растежа, докато австрийската набляга на по-трезво виждане за растежа и човешката рационалност.
wrong_answers:
  - Кейнсианската набляга на по-трезво виждане за растежа и човешката рационалност, докато австрийската вярва в паричното печатане и разходите за насърчаване на растежа.
  - Кейнсианската се фокусира върху производството и управлението на парите от централните банки, докато австрийската вярва в децентрализацията на паричната власт.
  - Кейнсианската вярва в централизацията на паричната власт, докато австрийската се фокусира върху производството и управлението на парите от централните банки.
explanation: |
  В главата се обяснява, че кейнсианската икономическа школа подкрепя
  идеята, че производството и управлението на парите са
  на централните банки и че паричното печатане
  и разходите насърчават растежа. От друга страна, австрийската, с повече от 200 години изследвания и развитие,
  философски размисли и трудове на известни
  автори, набляга на по-трезво виждане за растежа и
  рационалност в нашата икономика.
reviewed: true

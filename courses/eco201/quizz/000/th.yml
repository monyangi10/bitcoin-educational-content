question: ความแตกต่างหลักระหว่างเศรษฐศาสตร์เคนส์และเศรษฐศาสตร์ออสเตรียคืออะไร?
answer: เศรษฐศาสตร์เคนส์เชื่อในการพิมพ์เงินและการใช้จ่ายเพื่อส่งเสริมการเติบโต ในขณะที่เศรษฐศาสตร์ออสเตรียเน้นมุมมองที่มีสติและเหตุผลของการเติบโตและความมีเหตุผลของมนุษย์
wrong_answers:
  - เศรษฐศาสตร์เคนส์เน้นการมองเห็นการเติบโตและความมีเหตุผลของมนุษย์ในแบบที่มีความรอบคอบมากขึ้น ในขณะที่เศรษฐศาสตร์ออสเตรียเชื่อในการพิมพ์เงินและการใช้จ่ายเพื่อส่งเสริมการเติบโต
  - เศรษฐศาสตร์เคนส์เน้นการผลิตและการจัดการเงินโดยธนาคารกลาง ในขณะที่เศรษฐศาสตร์ออสเตรียเชื่อในการกระจายอำนาจทางการเงิน
  - เศรษฐศาสตร์เคนส์เชื่อในการรวมศูนย์อำนาจทางการเงิน ในขณะที่เศรษฐศาสตร์ออสเตรียเน้นการผลิตและการจัดการเงินโดยธนาคารกลาง
explanation: |
  บทนี้อธิบายว่าเศรษฐศาสตร์แบบเคนส์สนับสนุนแนวคิดที่ว่าการผลิตและการจัดการเงินเป็นความรับผิดชอบของธนาคารกลาง และการพิมพ์เงินและการใช้จ่ายส่งเสริมการเติบโต ในทางกลับกัน เศรษฐศาสตร์แบบออสเตรีย ซึ่งมีการวิจัยและพัฒนามากว่า 200 ปี การสะท้อนทางปรัชญา และงานเขียนโดยผู้เขียนที่มีชื่อเสียง เน้นย้ำถึงวิสัยทัศน์ที่มีสติปัญญามากขึ้นเกี่ยวกับการเติบโตและความมีเหตุผลของมนุษย์ในเศรษฐกิจของเรา
reviewed: true
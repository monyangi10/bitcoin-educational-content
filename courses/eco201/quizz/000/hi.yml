question: केन्सियन और ऑस्ट्रियन इकोनॉमिक्स में मुख्य अंतर क्या है?
answer: कीन्सियन अर्थशास्त्र मानता है कि पैसा छापकर और खर्च करके विकास को बढ़ावा दिया जा सकता है, जबकि ऑस्ट्रियन अर्थशास्त्र विकास और मानवीय तर्कसंगतता के प्रति एक संयमित नज़रिया अपनाता है।
wrong_answers:
  - केन्सियन इकोनॉमिक्स ग्रोथ और इंसानी तर्कसंगतता को लेकर एक संजीदा नज़रिया रखती है, वहीं ऑस्ट्रियन इकोनॉमिक्स ग्रोथ बढ़ाने के लिए पैसा छापने और खर्च करने में यकीन रखती है।
  - केन्सियन इकोनॉमिक्स सेंट्रल बैंकों द्वारा पैसे के उत्पादन और प्रबंधन पर फोकस करती है, जबकि ऑस्ट्रियन इकोनॉमिक्स मौद्रिक शक्ति के विकेंद्रीकरण में विश्वास करती है।
  - केन्सियन इकोनॉमिक्स मानती है कि मोनेटरी पावर को केंद्रीकृत किया जाना चाहिए, जबकि ऑस्ट्रियन इकोनॉमिक्स सेंट्रल बैंकों द्वारा पैसे के उत्पादन और प्रबंधन पर ध्यान केंद्रित करती है।
explanation: |
  अध्याय बताता है कि कीन्सियन अर्थशास्त्र समर्थन करता है
  यह विचार कि पैसे का उत्पादन और प्रबंधन ही
  केंद्रीय बैंकों की ज़िम्मेदारी, और मुद्रा छपाई (मोनेटरी प्रिंटिंग)
  और खर्च करने से विकास होता है। वहीं, ऑस्ट्रियाई
  अर्थशास्त्र, जिसमें 200 साल से ज़्यादा का शोध और विकास शामिल है,
  दार्शनिक विचार, और मशहूर लेखकों की रचनाएँ
  लेखक, विकास और मानवता के प्रति एक अधिक संयमित दृष्टिकोण पर ज़ोर देते हैं।
  हमारी अर्थव्यवस्था में तर्कसंगतता।
reviewed: true
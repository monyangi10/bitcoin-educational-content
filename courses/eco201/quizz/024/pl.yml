question: Jakie jest rozwiązanie problemu bezpośredniej wymiany w podziale pracy?
answer: Pośrednia wymiana umożliwiona przez pieniądze.
wrong_answers:
  - Bezpośrednia wymiana umożliwiona przez barter.
  - Pośrednia wymiana umożliwiona przez barter.
  - Bezpośrednia wymiana umożliwiona przez pieniądze.
explanation: |
  Pieniądze pozwalają na pośrednią wymianę, w której jednostka może
  kupić coś od innej osoby, która z kolei może użyć uzyskanych tak pieniędzy
  gdzie indziej, w innym czasie i z kimś innym.
reviewed: true

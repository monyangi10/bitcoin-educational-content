question: Какво е решението на проблема с пряката размяна при разделението на труда?
answer: Косвен обмен, улеснен от парите.
wrong_answers:
  - Пряка размяна, улеснена от бартера.
  - Непряк обмен, улеснен от бартера.
  - Пряк обмен, улеснен от парите.
explanation: |
  Парите позволяват непряк обмен, при който човек може да
  купува от друг, а продавачът може да използва тази парична единица
  на друго място, по друго време и с друг човек.
reviewed: true
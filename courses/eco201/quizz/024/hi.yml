question: "डायरेक्ट Exchange की समस्या का समाधान श्रम विभाजन में क्या है?"
answer: पैसे से होने वाला अप्रत्यक्ष Exchange।
wrong_answers:
  - सीधा Exchange बार्टर द्वारा सुगम बनाया गया।
  - अप्रत्यक्ष Exchange वस्तु विनिमय द्वारा सुगम।
  - पैसे से सीधा Exchange करवाया।
explanation: |
  पैसा अप्रत्यक्ष Exchange की अनुमति देता है, जहां एक व्यक्ति कर सकता है
  दूसरे से खरीदो, और बेचने वाला उस पैसे वाली इकाई का इस्तेमाल कर सकता है
  कहीं और, किसी और समय, और किसी और के साथ।
reviewed: true
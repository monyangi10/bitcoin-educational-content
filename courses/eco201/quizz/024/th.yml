question: ทางแก้ปัญหาการแลกเปลี่ยนโดยตรงในการแบ่งงานคืออะไร?
answer: การแลกเปลี่ยนทางอ้อมที่อำนวยความสะดวกโดยเงิน
wrong_answers:
  - การแลกเปลี่ยนโดยตรงที่อำนวยความสะดวกโดยการแลกเปลี่ยนสินค้า
  - การแลกเปลี่ยนทางอ้อมที่อำนวยความสะดวกโดยการแลกเปลี่ยนสินค้า
  - การแลกเปลี่ยนโดยตรงที่อำนวยความสะดวกโดยเงิน
explanation: |
  เงินช่วยให้เกิดการแลกเปลี่ยนทางอ้อม ซึ่งบุคคลสามารถซื้อจากผู้อื่นได้ และผู้ขายสามารถใช้หน่วยเงินนั้นที่อื่น ในเวลาอื่น และกับคนอื่นได้
reviewed: true
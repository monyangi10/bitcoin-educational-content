question: 한계 효용 감소의 개념은 무엇인가요?
answer: 상품의 각 추가 단위는 이전 단위보다 덜 바람직합니다.
wrong_answers:
  - 재화의 각 추가 단위는 이전 단위보다 더 바람직합니다.
  - 상품의 각 추가 단위는 앞의 단위와 동일하게 원하는 것입니다.
  - 재화의 각 추가 단위에 대한 욕구는 예측할 수 없을 정도로 변동합니다.
explanation: |
  한계 효용 감소의 개념은 재화의 각 추가 단위가
  재화의 추가 단위가 앞의
  보다 덜 바람직하다는 개념입니다. 이는 개인이 재화를 더 많이 획득할수록

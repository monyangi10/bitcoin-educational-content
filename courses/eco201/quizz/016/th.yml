question: แนวคิดของอรรถประโยชน์ส่วนเพิ่มที่ลดลงคืออะไร?
answer: แต่ละหน่วยเพิ่มเติมของสินค้ามีความต้องการน้อยกว่าหน่วยก่อนหน้า
wrong_answers:
  - แต่ละหน่วยเพิ่มเติมของสินค้ามีความต้องการมากกว่าหน่วยก่อนหน้า
  - แต่ละหน่วยเพิ่มเติมของสินค้ามีความต้องการเท่ากับหน่วยก่อนหน้า
  - ความต้องการสำหรับแต่ละหน่วยเพิ่มเติมของสินค้าผันผวนอย่างไม่สามารถคาดเดาได้
explanation: |
  แนวคิดของอรรถประโยชน์ส่วนเพิ่มที่ลดลงระบุว่าแต่ละหน่วยเพิ่มเติมของสินค้ามีความต้องการน้อยกว่าหน่วยก่อนหน้า นี่เป็นเพราะเมื่อบุคคลได้รับสินค้ามากขึ้น อรรถประโยชน์ที่แต่ละหน่วยเพิ่มเติมของสินค้านั้นให้จะน้อยลง
reviewed: true
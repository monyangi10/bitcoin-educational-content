question: घटती हुई सीमांत उपयोगिता (decreasing marginal utility) का कॉन्सेप्ट क्या है?
answer: हर अगली चीज़ की इकाई पिछली वाली से कम चाही जाती है।
wrong_answers:
  - हर अगली वस्तु की इकाई पिछली से ज़्यादा चाही जाती है।
  - हर अतिरिक्त वस्तु की इकाई पहले वाली के बराबर ही चाही जाती है।
  - हर अतिरिक्त वस्तु की इच्छा अचानक और अनियमित तरीके से बदलती रहती है।
explanation: |
  यह कॉन्सेप्ट कहता है कि हर एक
  माल की एक अतिरिक्त इकाई पहले से कम चाही जाती है
  पहले वाला। ऐसा इसलिए क्योंकि जैसे-जैसे कोई व्यक्ति अधिक हासिल करता है
  एक अच्छी चीज़ की, हर अतिरिक्त इकाई का उपयोगिता कम होती जाती है
  अच्छा सामान।
reviewed: true
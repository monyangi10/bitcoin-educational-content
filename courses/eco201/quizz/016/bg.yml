question: Каква е концепцията за намаляващата пределна полезност?
answer: Всяка допълнителна единица от дадена стока е по-малко желана от предходната.
wrong_answers:
  - Всяка допълнителна единица от дадена стока е по-желана от предходната.
  - Всяка допълнителна единица от дадена стока е еднакво желана с предходната.
  - Желанието за всяка допълнителна единица от дадена стока се колебае непредсказуемо.
explanation: |
  Концепцията за намаляващата пределна полезност гласи, че всеки
  допълнителна единица от дадена стока е по-малко желана от
  предишната. Това е така, защото когато индивидът придобива повече
  от дадена стока, толкова по-малка е полезността на всяка допълнителна единица от тази стока
  предоставя.
reviewed: true
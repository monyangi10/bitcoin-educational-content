question: Ni igiki ciyumviro co kugabanya akamaro ko kuruhande?
answer: Igipande cose c’inyongera c’ikintu kirakenewe cane kuruta icatanguye.
wrong_answers:
  - ingero yose y'ikintu usanga ikenenwe cane kuruta iyabanje.
  - ingero yose yiyongeyeko y'ikintu usanga gikenenwe cane kurusha icabanje.
  - Icipfuzo co kuronka igice cose c’inyongera c’ikintu ciza kirahindukahinduka ata co umuntu ashobora kumenya.
explanation: |
  Iciyumviro co kugabanya akamaro ko kuruhande kivuga ko buri .
  igice c'inyongera c'ikintu ni gitoyi cipfuzwa kuruta
  icabanje. Ivyo ni kubera ko uko umuntu aronka vyinshi .
  y'ikintu ciza, ni ko n'akamaro gatoyi k'inyongera ku gice cose c'ico
  ivyiza biratanga.
reviewed: true

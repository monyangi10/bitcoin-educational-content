question: 경제에서 자본재의 역할은 무엇인가요?
answer: 자본재는 다른 재화의 생산에 사용됩니다. 이를 통해 개인은 소비재를 얻을 수 있습니다.
wrong_answers:
  - 자본재는 소비에 사용됩니다.
  - 자본재는 경제에서 어떤 역할도 하지 않습니다.
  - 자본재는 다른 자본재를 생산하는 데 사용됩니다.
explanation: |
  소비재를 생산하기 위해 기업가들은 다양한 중간재를
  중간재를 원래의 생산 요소(노동, 토지, 자본)와
  (노동, 토지, 자본)을 결합하는 패턴에 따라
  결과 생산량을 극대화합니다. 경제의 다른 모든 재화는
  중간재라고 부를 수 있는 경제의 다른 모든 재화는
  개인이 이러한 재화를 얻을 수 있게 해주기 때문에 가치가 있습니다
  소비재; 다른 재화의 생산에 사용되는 재화입니다
  다른 재화.

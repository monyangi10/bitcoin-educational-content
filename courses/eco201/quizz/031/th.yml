question: บทบาทของสินค้าทุนในเศรษฐกิจคืออะไร?
answer: สินค้าทุนถูกใช้ในการผลิตสินค้าประเภทอื่น ๆ พวกมันช่วยให้บุคคลสามารถได้รับสินค้าบริโภค
wrong_answers:
  - สินค้าทุนถูกใช้เพื่อการบริโภค
  - สินค้าทุนไม่มีบทบาทในเศรษฐกิจ
  - สินค้าทุนถูกใช้ในการผลิตสินค้าทุนอื่น ๆ
explanation: |
  ในการผลิตสินค้าอุปโภคบริโภค ผู้ประกอบการจะรวมสินค้าขั้นกลางต่างๆ เข้ากับปัจจัยการผลิตดั้งเดิม (แรงงาน ที่ดิน และทุน) ตามรูปแบบที่เพิ่มผลผลิตสูงสุด สินค้าอื่นๆ ทั้งหมดในเศรษฐกิจ ซึ่งเราสามารถเรียกว่าสินค้าขั้นกลาง มีมูลค่าเพียงเพราะพวกเขาช่วยให้บุคคลสามารถได้รับสินค้าอุปโภคบริโภคเหล่านี้; พวกมันเป็นสินค้าที่ใช้ในการผลิตสินค้าชนิดอื่นๆ
reviewed: true
question: Ni uruhara uruhe rw’ibikoresho(vyo mubuzima bwa minsi yose) mu butunzi?
answer: ibikoresho bikoreshwa mu guhingura ibindi bikoresho. Bituma abantu bashobora kuronka ibintu bakoresha.
wrong_answers:
  - Ibikoresho bakoresha mu gukora ibindi bikorwa.
  - Ibikoresho nta ruhara bifise mu butunzi.
  - Ibikoresho bikoreshwa mu guhingura ibindi bikoresho.
explanation: |
  Kugira ngo abacuruzi bashobore guhingura ibintu bikoreshwa, barahuza ibintu bitandukanye .
  Ibicuruzwa vyo hagati bifise ibintu vy'intango vy'uguhingura
  (abakozi, ubutaka n’umutahe) bishingiye ku citegererezo c’uko .
  iratuma umwimbu uvamwo urushirizaho kuba mwinshi. Ibindi bicuruzwa vyose biri mu
  ubutunzi, ivyo twokwita ibicuruzwa vyo hagati, bifise gusa .
  agaciro kubera ko bituma abantu bashobora kuronka ivyo .
  ibintu vy’abaguzi; ni ibintu bikoreshwa mu guhingura .
  ibindi bicuruzwa.
reviewed: true

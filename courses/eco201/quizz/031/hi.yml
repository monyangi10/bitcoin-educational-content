question: पूंजीगत वस्तुओं की अर्थव्यवस्था में क्या भूमिका है?
answer: पूंजीगत सामान (Capital goods) दूसरे सामान बनाने में इस्तेमाल होते हैं। ये लोगों को उपभोक्ता सामान (consumer goods) हासिल करने में मदद करते हैं।
wrong_answers:
  - पूंजीगत सामानों का उपयोग खपत के लिए किया जाता है।
  - पूंजीगत सामानों का अर्थव्यवस्था में कोई भूमिका नहीं होती।
  - पूंजीगत सामान का इस्तेमाल दूसरे पूंजीगत सामान बनाने के लिए किया जाता है।
explanation: |
  उपभोक्ता सामान बनाने के लिए, उद्यमी कई चीज़ों को मिलाते हैं...
  मूल उत्पादन कारकों के साथ मध्यवर्ती वस्तुएं
  (मेहनत, ज़मीन, और पूंजी) एक ऐसे तरीके से जो
  परिणामी उत्पादन को अधिकतम करता है। अन्य सभी वस्तुएं
  अर्थव्यवस्था, जिसे हम मध्यवर्ती सामान कह सकते हैं, केवल होते हैं
  मूल्य क्योंकि ये लोगों को इन्हें हासिल करने में सक्षम बनाते हैं
  उपभोक्ता वस्तुएं; ये उत्पादन में इस्तेमाल होने वाली वस्तुएं हैं
  दूसरे सामान।
reviewed: true
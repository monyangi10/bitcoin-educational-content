question: Каква е ролята на капиталовите стоки в икономиката?
answer: Капиталовите стоки се използват за производството на други стоки. Те дават възможност на хората да се сдобият с потребителски стоки.
wrong_answers:
  - Капиталовите стоки се използват за потребление.
  - Капиталовите стоки нямат роля в икономиката.
  - Капиталовите стоки се използват за производството на други капиталови стоки.
explanation: |
  За да произвеждат потребителски стоки, предприемачите комбинират различни
  междинни стоки с оригинални производствени фактори
  (труд, земя и капитал) по модел, който
  максимизира резултата от производството. Всички други стоки в
  икономиката, които можем да наречем междинни стоки, имат само
  стойност, защото дават възможност на хората да получат тези
  потребителски стоки; те са стоки, използвани в производството на
  други стоки.
reviewed: true
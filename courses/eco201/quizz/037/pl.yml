question: Jakie są natychmiastowe skutki spadku stóp procentowych spowodowanego wzrostem akcji kredytowej zgodnie z austriacką teorią cyklu koniunkturalnego?
answer: Przedsiębiorcy mogą pożyczać więcej zasobów i w ten sposób tworzyć etapy produkcji wyższego rzędu. Rozszerzenie struktury produkcji nie spowoduje spadku konsumpcji, ponieważ konsumenci nie odkładają obecnej konsumpcji na później. Innymi słowy, PKB rośnie.

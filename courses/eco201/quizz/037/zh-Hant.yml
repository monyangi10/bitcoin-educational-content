question: 根據奧地利商業週期理論，由於信貸增加而導致利率下降的直接影響是什麼？
answer: 企業家可以借用更多的資源，從而創造更高階的生產階段。生產結構的擴展不會導致消費減少，因為消費者沒有延遲目前的消費。換句話說，GDP 會成長。
wrong_answers:
  - 企業家可以借用較少的資源，進而創造較低階的生產階段。生產結構的擴展會導致消費增加，因為有消費者延遲目前的消費。換句話說，GDP 會縮小。
  - 企業家可以借用更多的資源，從而創造更低階的生產階段。生產結構的擴展會導致消費減少，因為消費者沒有延遲目前的消費。換句話說，GDP 萎縮。
  - 企業家可以借用較少的資源，從而創造更高階的生產階段。生產結構的擴展會導致消費增加，因為有消費者延遲目前的消費。換句話說，GDP 會成長。

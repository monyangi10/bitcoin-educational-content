question: 오스트리아 경기순환 이론에 따르면 신용 증가로 인한 이자율 하락의 즉각적인 효과는 무엇인가요?
answer: 기업가들은 더 많은 자원을 빌릴 수 있으므로 더 높은 주문 생산 단계를 만들 수 있습니다. 이러한 생산 구조의 확장은 소비자가 현재 소비를 연기한 것이 아니기 때문에 소비 감소로 이어지지 않습니다. 즉, GDP는 증가합니다.

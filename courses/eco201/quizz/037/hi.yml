question: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी के मुताबिक, क्रेडिट बढ़ने से ब्याज दरें कम होने का तुरंत असर क्या होता है?
answer: उद्यमी ज्यादा संसाधन उधार ले सकते हैं और इस तरह उच्च स्तर के उत्पादन चरण बना सकते हैं। उत्पादन संरचना का यह विस्तार खपत में कमी नहीं लाएगा क्योंकि वर्तमान खपत को टालने वाला कोई उपभोक्ता नहीं है। दूसरे शब्दों में, जीडीपी बढ़ती है।
wrong_answers:
  - उद्यमी कम संसाधन उधार ले सकते हैं और इस तरह कम स्तर के उत्पादन चरण बना सकते हैं। उत्पादन संरचना का यह विस्तार खपत में वृद्धि का कारण बनेगा क्योंकि उपभोक्ताओं ने वर्तमान खपत को टाल दिया है। दूसरे शब्दों में, जीडीपी सिकुड़ जाती है।
  - उद्यमी ज्यादा संसाधन उधार ले सकते हैं और इस तरह निचले स्तर के उत्पादन चरण बना सकते हैं। उत्पादन संरचना के इस विस्तार से खपत कम होगी क्योंकि वर्तमान खपत को टालने के लिए उपभोक्ताओं ने कोई कदम नहीं उठाया है। दूसरे शब्दों में, जीडीपी सिकुड़ जाती है।
  - उद्यमी कम संसाधन उधार ले सकते हैं और इस तरह उच्च स्तर के उत्पादन चरण बना सकते हैं। उत्पादन संरचना के इस विस्तार से खपत बढ़ेगी क्योंकि उपभोक्ताओं ने वर्तमान खपत को टाल दिया है। दूसरे शब्दों में, जीडीपी बढ़ती है।
explanation: |
  ऑस्ट्रियन बिज़नेस साइकिल थ्योरी के मुताबिक, जब होता है
  ब्याज दरों में कमी होने से क्रेडिट बढ़ जाता है, उद्यमी कर्ज़ ले सकते हैं
  ज़्यादा संसाधन और इस तरह उच्च स्तर के उत्पादन चरण बनाएँ। यह विस्तार
  उत्पादन संरचना से खपत में कमी नहीं आएगी क्योंकि
  वर्तमान खपत में उपभोक्ताओं द्वारा कोई देरी नहीं हुई है। दूसरे शब्दों में, जीडीपी बढ़ती है।

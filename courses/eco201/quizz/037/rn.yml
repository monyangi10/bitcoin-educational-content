question: Ni ingaruka izihe zica ziza iyo inyungu zigabanutse bivuye ku kwiyongera kw’ingurane hakurikijwe inyigisho y’Ubucuruzi y’abanya otirishi?
answer: Abanyamigambi barashobora kugurana ubutunzi bwinshi ivyo bikarema inzira z’uguhingura ziri ku rutonde rwo hejuru. Ukwo kwagura uko ubuhinga buteye ntikuzotuma ugukoresha kugabanuka kuko nta gusubiramwo kw’abaguzi kw’ugukoresha ubu. Mu yandi majambo, GDP irakura.
wrong_answers:

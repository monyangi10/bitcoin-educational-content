  - Abanyamigambi barashobora kugurana ubutunzi bwinshi kubwivyo bakarema inzira z’uguhingura ziri mu rutonde rwo hasi. Ukwo kwagura uko ibikorwa bitunganije bizovamwo ukugabanya ugukoresha kuko ata gusubiramwo kw’abaguzi kw’ugukoresha ubu. Mu yandi majambo, GDP iragabanuka.

question: Ni ingaruka izihe zica ziza iyo inyungu zigabanutse bivuye ku kwiyongera kw’inguzanyo hakurikijwe inyigisho y’Ubucuruzi y’Ubudagi?
answer: Abanyamigambi barashobora kugurana ubutunzi bwinshi gutyo bagahingura inzira z’uguhingura ziri ku rutonde rwo hejuru. Ukwo kwagura imiterere y’ubuhinga ntikuzotuma ugukoresha kugabanuka kuko nta gusubiramwo kw’abaguzi kw’ugukoresha ubu. Mu yandi majambo, GDP irakura.

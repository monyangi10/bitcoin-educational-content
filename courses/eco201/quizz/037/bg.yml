question: Какви са непосредствените последици от намаляването на лихвените проценти вследствие на увеличаването на кредита според австрийската теория за бизнес цикъла?
answer: Предприемачите могат да заемат повече ресурси и по този начин да създават производствени етапи от по-висок порядък. Това разширяване на производствената структура няма да доведе до намаляване на потреблението, тъй като не е налице отлагане на настоящото потребление от страна на потребителите. С други думи, БВП нараства.

question: ผลกระทบในทันทีของการลดลงของอัตราดอกเบี้ยเนื่องจากการเพิ่มขึ้นของเครดิตตามทฤษฎีวัฏจักรธุรกิจของออสเตรียคืออะไร?
answer: ผู้ประกอบการสามารถยืมทรัพยากรมากขึ้นและสร้างขั้นตอนการผลิตที่สูงขึ้นได้ โครงสร้างการผลิตที่ขยายตัวนี้จะไม่ส่งผลให้การบริโภคลดลงเพราะไม่มีการเลื่อนการบริโภคในปัจจุบันของผู้บริโภค กล่าวอีกนัยหนึ่ง GDP เติบโต
wrong_answers:
  - ผู้ประกอบการสามารถยืมทรัพยากรน้อยลงและดังนั้นจึงสร้างขั้นตอนการผลิตที่มีลำดับต่ำกว่า การขยายโครงสร้างการผลิตนี้จะส่งผลให้การบริโภคเพิ่มขึ้นเนื่องจากมีการเลื่อนการบริโภคในปัจจุบันของผู้บริโภค กล่าวอีกนัยหนึ่ง GDP หดตัว
  - ผู้ประกอบการสามารถยืมทรัพยากรมากขึ้นและสร้างขั้นตอนการผลิตที่มีลำดับต่ำกว่า การขยายโครงสร้างการผลิตนี้จะส่งผลให้การบริโภคลดลงเนื่องจากไม่มีการเลื่อนการบริโภคในปัจจุบันของผู้บริโภค กล่าวอีกนัยหนึ่ง GDP หดตัว

explanation: |
  ตามทฤษฎีวัฏจักรธุรกิจของออสเตรีย เมื่อมีการลดลงของอัตราดอกเบี้ยเนื่องจากการเพิ่มขึ้นของเครดิต ผู้ประกอบการสามารถกู้ยืมทรัพยากรได้มากขึ้นและดังนั้นจึงสามารถสร้างขั้นตอนการผลิตที่สูงขึ้นได้ การขยายโครงสร้างการผลิตนี้จะไม่ส่งผลให้การบริโภคลดลงเพราะไม่มีการเลื่อนการบริโภคในปัจจุบันของผู้บริโภค กล่าวอีกนัยหนึ่ง GDP เติบโตขึ้น

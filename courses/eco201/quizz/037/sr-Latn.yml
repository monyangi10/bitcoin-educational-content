question: Koja su trenutna dejstva smanjenja kamatnih stopa usled povećanja kredita prema Austrijskoj teoriji poslovnog ciklusa?
answer: Preduzetnici mogu pozajmiti više resursa i tako stvoriti proizvodne faze višeg reda. Ovo proširenje proizvodne strukture neće rezultirati smanjenom potrošnjom jer nije došlo do odlaganja trenutne potrošnje od strane potrošača. Drugim rečima, BDP raste.
wrong_answers:

  - Preduzetnici mogu pozajmiti više resursa i tako stvoriti niže redove proizvodnih faza. Ovo proširenje proizvodne strukture rezultiraće smanjenom potrošnjom jer nije došlo do odlaganja trenutne potrošnje od strane potrošača. Drugim rečima, BDP se smanjuje.

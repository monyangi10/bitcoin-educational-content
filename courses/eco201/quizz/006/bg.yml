question: Каква е основната цел на курса?
answer: Курсът има за цел да разгледа основните концепции на австрийската икономическа школа.
wrong_answers:
  - Курсът има за цел да популяризира кейнсианската доктрина.
  - Курсът има за цел да обясни функционирането на централните банки.
  - Курсът има за цел да насърчи централизацията на паричната власт.
explanation: |
  В главата се споменава, че курсът има за цел да изследва
  основните концепции на австрийската икономическа школа.
reviewed: true

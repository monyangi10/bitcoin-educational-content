question: कोर्स का मुख्य लक्ष्य क्या है?
answer: कोर्स का मकसद ऑस्ट्रियन इकोनॉमिक्स के बुनियादी सिद्धांतों को समझना है।
wrong_answers:
  - कोर्स का उद्देश्य कीन्सियन सिद्धांत को बढ़ावा देना है।
  - कोर्स का मकसद सेंट्रल बैंकों के कामकाज को समझाना है।
  - कोर्स का उद्देश्य मौद्रिक शक्ति के केंद्रीकरण को बढ़ावा देना है।
explanation: |
  अध्याय में यह बताया गया है कि यह कोर्स का उद्देश्य है...
  ऑस्ट्रियाई अर्थशास्त्र के मूलभूत सिद्धांत।
reviewed: true
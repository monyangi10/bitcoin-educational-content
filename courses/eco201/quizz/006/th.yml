question: เป้าหมายหลักของหลักสูตรคืออะไร?
answer: หลักสูตรนี้มีเป้าหมายเพื่อสำรวจแนวคิดพื้นฐานของเศรษฐศาสตร์ออสเตรีย
wrong_answers:
  - หลักสูตรนี้มีเป้าหมายเพื่อส่งเสริมหลักคำสอนของเคนส์
  - หลักสูตรนี้มีเป้าหมายเพื่ออธิบายการทำงานของธนาคารกลาง
  - หลักสูตรนี้มีเป้าหมายเพื่อส่งเสริมการรวมศูนย์อำนาจทางการเงิน
explanation: |
  บทนี้กล่าวถึงว่าหลักสูตรมีเป้าหมายที่จะสำรวจแนวคิดพื้นฐานของเศรษฐศาสตร์ออสเตรีย
reviewed: true
question: एक केंद्रीय रूप से नियोजित अर्थव्यवस्था में पूंजी का गलत आवंटन क्यों होता है? इसका मुख्य कारण यह है कि सरकारी योजनाकारों के पास बाजार की असली मांग और आपूर्ति के बारे में सही जानकारी नहीं होती। वे लोगों की जरूरतों और प्राथमिकताओं को ठीक से समझ नहीं पाते, जिससे गलत निवेश निर्णय होते हैं।
answer: बाजार की कीमतें या दिवालियापन नहीं होता जो गलत आवंटन को उजागर और सुधार सके।
wrong_answers:
  - केंद्रीय योजनाकार कुशल नहीं होते।
  - केंद्रीय योजनाकारों के पास पर्याप्त जानकारी नहीं होती।
  - केंद्रीय योजनाकारों को संसाधनों को कुशलता से आवंटित करने का कोई प्रोत्साहन नहीं होता।
explanation: |
  एक केंद्रीय योजनाबद्ध अर्थव्यवस्था में, कोई बाजार मूल्य या दिवालियापन नहीं होता
  गलत आवंटन को उजागर करने और सही करने के लिए। नतीजतन, गलतियाँ जमा होती रहेंगी जब तक
  बर्बादी ज़िंदगी की हालत में बड़ी गिरावट से साफ़ दिखने लगती है।
reviewed: true
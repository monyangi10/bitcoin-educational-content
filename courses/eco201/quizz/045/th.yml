question: เหตุผลหลักที่ทำให้เศรษฐกิจที่วางแผนจากศูนย์กลางจะประสบกับการจัดสรรทุนที่ผิดพลาดอย่างหลีกเลี่ยงไม่ได้คืออะไร?
answer: ไม่มีราคาตลาดหรือการล้มละลายที่จะเปิดเผยและแก้ไขการจัดสรรที่ผิดพลาด
wrong_answers:
  - นักวางแผนส่วนกลางไม่มีประสิทธิภาพ
  - นักวางแผนส่วนกลางไม่มีข้อมูลเพียงพอ
  - นักวางแผนส่วนกลางไม่มีแรงจูงใจในการจัดสรรทรัพยากรอย่างมีประสิทธิภาพ
explanation: |
  ในระบบเศรษฐกิจที่มีการวางแผนจากส่วนกลาง จะไม่มีราคาตลาดหรือการล้มละลายเพื่อเปิดเผยและแก้ไขการจัดสรรที่ผิดพลาด ดังนั้น ข้อผิดพลาดจะสะสมจนกระทั่งความสิ้นเปลืองปรากฏชัดผ่านการลดลงอย่างมีนัยสำคัญในสภาพความเป็นอยู่
reviewed: true
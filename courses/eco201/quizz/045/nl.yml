question: Wat is de belangrijkste reden waarom een centraal geplande economie onvermijdelijk te maken krijgt met een verkeerde allocatie van kapitaal?
answer: Er zijn geen marktprijzen of faillissementen om verkeerde toewijzingen te onthullen en te corrigeren.
wrong_answers:
  - Centrale planners zijn niet efficiënt.
  - Centrale planners hebben niet genoeg informatie.
  - Centrale planners zijn niet gemotiveerd om middelen efficiënt toe te wijzen.
explanation: |
  In een centraal geplande economie zijn er geen marktprijzen of faillissementen
  om verkeerde toewijzingen te onthullen en te corrigeren. Als gevolg daarvan zullen fouten zich opstapelen totdat
  de verspilling duidelijk wordt door een significante verslechtering van de levensomstandigheden.
reviewed: true
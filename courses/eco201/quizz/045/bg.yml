question: Коя е основната причина, поради която централно планираната икономика неизбежно ще се сблъска с неправилно разпределение на капитала?
answer: Няма пазарни цени или фалити, които да разкриват и коригират неправилните разпределения.
wrong_answers:
  - Централните плановици не са ефективни.
  - Централните плановици не разполагат с достатъчно информация.
  - Централните плановици не са мотивирани да разпределят ресурсите ефективно.
explanation: |
  В една централно планирана икономика няма пазарни цени или фалити,
  които да разкриват и коригират неправилното разпределение. В резултат на това грешките ще се натрупват, докато
  разхищението стане очевидно чрез значително влошаване на условията на живот.
reviewed: true

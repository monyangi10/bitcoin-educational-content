question: 중앙 계획 경제에서 필연적으로 자본의 잘못된 배분이 발생하는 주된 이유는 무엇인가요?
answer: 시장 가격이나 파산으로 인해 잘못된 할당을 공개하고 수정할 수 없습니다.
wrong_answers:
  - 중앙 기획자는 효율적이지 않습니다.
  - 중앙 기획자는 충분한 정보를 가지고 있지 않습니다.
  - 중앙 기획자는 리소스를 효율적으로 할당할 동기가 없습니다.
explanation: |
  중앙 계획 경제에서는 시장 가격이나 파산이 존재하지 않습니다
  잘못된 배분을 드러내고 수정할 수 없습니다. 결과적으로 오류는 누적되어
  생활 여건의 현저한 저하를 통해 낭비가 명백해질 때까지 오류가 누적됩니다.
reviewed: true
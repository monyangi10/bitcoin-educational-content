question: 칼 멩거에 따르면, 두 개인 간의 자발적인 Exchange이 발생하는 이유는 무엇일까요?
answer: 각 당사자는 그것이 자신의 주관적 효용을 증가시킬 것이라고 믿습니다.
wrong_answers:
  - 각 당사자는 주관적 효용이 감소할 것이라고 생각합니다.
  - 각 당사자는 그것이 주관적인 효용을 유지할 것이라고 믿습니다.
  - 각 당사자는 주관적 효용에 영향을 미치지 않을 것이라고 믿습니다.
explanation: |
  멩거는 두 개인 간의 자발적인 Exchange은
  각 당사자가 그것이 자신의 주관적 효용을 증가시킬 것이라고 믿기 때문에 발생합니다
  주관적 효용을 증가시킬 것이라고 믿기 때문입니다. 즉, 각
  당사자들은 Exchange 이후 더 나은 삶을 살 수 있을 것이라고 믿습니다.
reviewed: true
question: Według Carla Mengera, dlaczego dochodzi do dobrowolnej wymiany między dwiema osobami?
answer: Każda ze stron uważa, że zwiększy to ich subiektywną użyteczność.
wrong_answers:
  - Każda ze stron uważa, że zmniejszy to ich subiektywną użyteczność.
  - Każda ze stron wierzy, że utrzyma swoją subiektywną użyteczność.
  - Każda ze stron uważa, że nie będzie to miało wpływu na ich subiektywną użyteczność.
explanation: |
  Menger wywnioskował, że dobrowolna wymiana pomiędzy dwoma
  osobami ma miejsce, ponieważ każda ze stron wierzy, że
  zwiększy to ich subiektywną użyteczność - czyli, że po wymianie każdemu będzie lepiej.
reviewed: true

question: कार्ल मेंगर के अनुसार, दो व्यक्तियों के बीच स्वैच्छिक Exchange क्यों होता है?
answer: हर पार्टी को लगता है कि इससे उनका अपना फायदा बढ़ेगा।
wrong_answers:
  - हर पार्टी को लगता है कि इससे उनका अपना फायदा कम हो जाएगा।
  - हर पार्टी को यकीन है कि वह अपने खुद के फायदे को बरकरार रखेगी।
  - हर पार्टी को लगता है कि इसका उनके व्यक्तिगत फायदे पर कोई असर नहीं पड़ेगा।
explanation: |
  मेंगर ने निष्कर्ष निकाला कि दो लोगों के बीच स्वैच्छिक Exchange
  लोग ऐसा इसलिए करते हैं क्योंकि हर पार्टी को लगता है कि उसे फायदा होगा
  उनकी व्यक्तिगत संतुष्टि बढ़ाना। इसका मतलब है कि हर
  पार्टी को लगता है कि Exchange के बाद उनका हाल बेहतर होगा।
reviewed: true
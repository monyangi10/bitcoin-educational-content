question: ตามที่คาร์ล เมงเกอร์กล่าวไว้ ทำไมการแลกเปลี่ยนโดยสมัครใจระหว่างบุคคลสองคนจึงเกิดขึ้น?
answer: แต่ละฝ่ายเชื่อว่าจะเพิ่มอรรถประโยชน์เชิงอัตวิสัยของตนเอง
wrong_answers:
  - แต่ละฝ่ายเชื่อว่าจะลดอรรถประโยชน์เชิงอัตวิสัยของตนเอง
  - แต่ละฝ่ายเชื่อว่าจะรักษาประโยชน์เชิงอัตวิสัยของตนเองไว้ได้
  - แต่ละฝ่ายเชื่อว่าจะไม่มีผลกระทบต่ออรรถประโยชน์เชิงอัตวิสัยของตน
explanation: |
  เมงเกอร์สรุปว่าการแลกเปลี่ยนโดยสมัครใจระหว่างบุคคลสองคนเกิดขึ้นเพราะแต่ละฝ่ายเชื่อว่าจะเพิ่มประโยชน์เชิงอัตวิสัยของตน ซึ่งหมายความว่าแต่ละฝ่ายเชื่อว่าตนจะอยู่ในสถานะที่ดีกว่าหลังจากการแลกเปลี่ยน
reviewed: true
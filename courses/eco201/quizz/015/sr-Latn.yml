question: Prema Karlu Mengeru, dobrovoljna Exchange između dve individue se dešava zbog toga što obe strane očekuju da će izmenom dobara ili usluga poboljšati svoju situaciju.
answer: Svaka strana veruje da će to povećati njihovu subjektivnu korisnost.
wrong_answers:
  - Svaka strana veruje da će to smanjiti njihovu subjektivnu korisnost.
  - Svaka strana veruje da će zadržati svoju subjektivnu korisnost.
  - Svaka stranka veruje da to neće imati efekta na njihovu subjektivnu korisnost.
explanation: |
  Menger zaključuje da se dobrovoljni Exchange između dve
  osobe dešava zato što svaka strana veruje da će to
  povećati njihovu subjektivnu korisnost. To znači da svaka
  strana veruje da će biti u boljoj situaciji nakon Exchange.
reviewed: true
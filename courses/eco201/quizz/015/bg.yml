question: Според Карл Менгер защо се осъществява доброволен обмен между двама души?
answer: Всяка от страните вярва, че това ще увеличи субективната ѝ полезност.
wrong_answers:
  - Всяка от страните смята, че това ще намали субективната ѝ полезност.
  - Всяка от страните вярва, че ще запази субективната си полезност.
  - Всяка от страните вярва, че това няма да се отрази на нейната субективна полезност.
explanation: |
  Менгер заключава, че доброволната размяна между двама
  се осъществява, защото всяка от страните вярва, че ще
  увеличава субективната си полезност. Това означава, че всеки
  вярва, че ще бъде в по-добро положение след размяната.
reviewed: true
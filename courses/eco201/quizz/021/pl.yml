question: Jaka jest natura wartości według Carla Mengera?
answer: Wartość jest subiektywnym zjawiskiem psychologicznym właściwym jednostce.
wrong_answers:
  - Wartość jest nieodłączną właściwością towarów.
  - Wartość jest zjawiskiem obiektywnym i mierzalnym.
  - Wartość jest określana przez ilość pracy wykorzystanej do produkcji.
explanation: |
  Według Mengera wartość jest subiektywnym zjawiskiem psychologicznym właściwym jednostce. Oznacza to, że wartość nie jest nieodłączną właściwością towarów, ale raczej wynika z
  opinii jednostki na temat użyteczności, jaką może czerpać
  z tych dóbr.
reviewed: true

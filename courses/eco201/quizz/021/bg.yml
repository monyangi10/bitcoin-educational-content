question: Каква е същността на стойността според Карл Менгер?
answer: Ценността е субективен психологически феномен в рамките на индивида.
wrong_answers:
  - Стойността е присъщо свойство на стоките.
  - Стойността е обективно и измеримо явление.
  - Стойността се определя от количеството труд, използвано в производството.
explanation: |
  Според Менгер стойността е субективна психологическа
  в рамките на индивида. Това означава, че стойността е
  не е присъщо свойство на стоките, а по-скоро произтича от
  мнението на индивида за полезността, която може да извлече
  от тези стоки.
reviewed: true
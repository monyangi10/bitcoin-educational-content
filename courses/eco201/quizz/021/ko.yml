question: 칼 멩거에 따르면 가치의 본질은 무엇일까요?
answer: 가치는 개인 내면의 주관적인 심리 현상입니다.
wrong_answers:
  - 가치는 상품의 고유한 속성입니다.
  - 가치는 객관적이고 측정 가능한 현상입니다.
  - 가치는 생산에 사용된 노동량에 따라 결정됩니다.
explanation: |
  멩거에 따르면 가치는 개인의 주관적인 심리적
  현상입니다. 즉, 가치는
  상품의 본질적인 속성이 아니라
  그 재화를 통해 얻을 수 있는 효용에 대한 개인의 의견에서
  개인의 의견에서 비롯됩니다.
reviewed: true
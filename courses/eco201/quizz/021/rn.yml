question: Nk’uko Carl Menger abivuga, agaciro n'iki?
answer: Agaciro ni ikintu kiba mu mutwe w'umuntu ku giti ciwe.
wrong_answers:
  - Agaciro ni itunga usanzwe w’ibintu.
  - Agaciro ni ikintu gifise intumbero kandi gishobora gupimwa.
  - Agaciro kagenwa n'uko akazi kakozwe mu guhingura kangana.
explanation: |
  Nk’uko Menger abivuga, agaciro ni ikintu umuntu yiyumvira mu mutwe .
  ikintu gikomeye kiri mu muntu. Ivyo bisigura ko agaciro
  si itunga n’ibintu,
  iciyumviro c'umuntu ku giti ciwe ku bijanye n'akamaro bashobora kuronka
  muri ivyo bintu.
reviewed: true

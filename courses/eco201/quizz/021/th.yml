question: ตามที่คาร์ล เมงเกอร์ กล่าวไว้ ธรรมชาติของมูลค่าเป็นอย่างไร?
answer: คุณค่าเป็นปรากฏการณ์ทางจิตวิทยาที่เป็นอัตวิสัยภายในบุคคล
wrong_answers:
  - มูลค่าเป็นคุณสมบัติที่มีอยู่ในตัวสินค้าตามธรรมชาติ
  - มูลค่าเป็นปรากฏการณ์ที่สามารถวัดได้และมีความเป็นกลาง
  - มูลค่าถูกกำหนดโดยปริมาณแรงงานที่ใช้ในการผลิต
explanation: |
  ตามที่เมงเกอร์กล่าวไว้ มูลค่าเป็นปรากฏการณ์ทางจิตวิทยาเชิงอัตวิสัยภายในบุคคล ซึ่งหมายความว่ามูลค่าไม่ใช่คุณสมบัติเฉพาะของสินค้า แต่เกิดจากความคิดเห็นของบุคคลเกี่ยวกับประโยชน์ที่พวกเขาสามารถได้รับจากสินค้านั้นๆ
reviewed: true
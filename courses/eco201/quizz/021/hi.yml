question: कार्ल मेंगर के अनुसार, मूल्य की प्रकृति क्या है?
answer: वैल्यू एक व्यक्ति के भीतर एक व्यक्तिपरक मनोवैज्ञानिक घटना है।
wrong_answers:
  - वस्तुओं का मूल्य उनका स्वाभाविक गुण होता है।
  - मूल्य एक वस्तुनिष्ठ और मापने योग्य घटना है।
  - मूल्य उत्पादन में लगे श्रम की मात्रा से तय होता है।
explanation: |
  मेंगर के अनुसार, मूल्य एक व्यक्तिपरक मनोवैज्ञानिक...
  व्यक्ति के भीतर एक घटना। इसका मतलब है कि मूल्य
  माल का कोई अंतर्निहित गुण नहीं है, बल्कि यह पैदा होता है
  व्यक्ति का अपने फायदे के बारे में राय
  उन सामानों से।
reviewed: true
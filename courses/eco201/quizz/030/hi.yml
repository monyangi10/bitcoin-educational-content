question: इंसानी कार्यों का क्रमिक स्वभाव उत्पादन गतिविधियों पर क्या प्रभाव डालता है?
answer: किसी भी उत्पादन में रुकावट, यानी उत्पादन संरचना में कोई भी देरी, पहले से बचत की मांग करती है।
wrong_answers:
  - मानव कार्यों का क्रमिक स्वरूप उत्पादन गतिविधियों पर कोई प्रभाव नहीं डालता।
  - मानव कार्यों का क्रमिक स्वरूप यह दर्शाता है कि उत्पादन गतिविधियाँ एक विशिष्ट क्रम में ही की जानी चाहिए।
  - मानव कार्यों का क्रमिक स्वरूप यह दर्शाता है कि उत्पादन गतिविधियाँ एक साथ चलनी चाहिए।
explanation: |
  इंसानी हरकतों का क्रमिक होने की वजह से, लोग...
  समय के साथ चुनाव करना पड़ता है - ऐसे फैसले जिनमें
  तात्कालिक ज़रूरतों को भविष्य के लक्ष्यों के साथ जोड़ना। ये चुनाव प्रभाव डालते हैं
  एक व्यक्ति जो कुछ कर सकता है, उसकी क्रमबद्ध सूची, जैसे कि अल्पकालिक
  फैसले लंबे समय के लक्ष्यों के अधीन होते हैं। मामले में
  उत्पादन में, इसका मतलब है कि उत्पादन में कोई भी चक्कर
  प्रक्रिया, यानी उत्पादन संरचना को लंबा करना,
  पहले से बचत करनी ज़रूरी है। अभी से संसाधन अलग रखने होंगे।
  व्यक्ति को ज़रूरत के समय तक सहारा देना
  लंबा, ज़्यादा उपयोगी रास्ता।
reviewed: true
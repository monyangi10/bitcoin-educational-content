question: Каква е последицата от последователния характер на човешките действия върху производствените дейности?
answer: Всяко отклонение от производството, т.е. всяко удължаване на производствената структура, изисква предварително запазване.
wrong_answers:
  - Последователният характер на човешките действия не се отразява на производствените дейности.
  - Последователният характер на човешките действия предполага, че производствените дейности трябва да се извършват в определен ред.
  - Последователният характер на човешките действия предполага, че производствените дейности трябва да се извършват едновременно.
explanation: |
  Поради последователния характер на човешките действия, хората
  трябва да правят междувремеви избори - решения, които балансират
  непосредствените нужди с бъдещите цели. Този избор оказва влияние върху
  последователността на действията, които човек може да предприеме, тъй като краткосрочните
  решения са подчинени на дългосрочните цели.
  Това означава, че всяко отклонение в производството
  в производствения процес, т.е. удължаване на производствената структура,
  изисква предварително спестяване. Ресурсите трябва да се заделят сега, за да
  поддържат индивида през времето, необходимо за
  по-дългия, по-продуктивен път.
reviewed: true

question: Jaki jest wpływ sekwencyjnego charakteru ludzkich działań na działalność produkcyjną?
answer: Każdy objazd produkcyjny, tj. każde wydłużenie struktury produkcyjnej, wymaga wcześniejszych oszczędności.
wrong_answers:
  - Sekwencyjny charakter ludzkich działań nie ma wpływu na działalność produkcyjną.
  - Sekwencyjny charakter ludzkiego działania oznacza, że czynności produkcyjne muszą być wykonywane w określonej kolejności.
  - Sekwencyjny charakter ludzkiego działania oznacza, że czynności produkcyjne muszą być wykonywane jednocześnie.
explanation: |
  Ze względu na sekwencyjny charakter ludzkich działań, jednostki
  muszą dokonywać wyborów międzyokresowych - decyzji równoważących natychmiastowe potrzeby z przyszłymi celami. Wybory te wpływają na sekwencję działań, które można podjąć, ponieważ decyzje krótkoterminowe są podporządkowane celom długoterminowym. W kategoriach
  produkcji oznacza to, że każdy objazd w procesie produkcji, tj. wydłużenie struktury produkcyjnej,
  wymaga wcześniejszych oszczędności. Zasoby muszą zostać odłożone teraz, aby
  utrzymać jednostkę w czasie potrzebnym na dłuższej, ale bardziej produktywnej ścieżce.
reviewed: true

question: 人類行為的連續性對生產活動有何影響？
answer: 任何生產迂迴，也就是生產結構的任何延長，都需要事先儲存。
wrong_answers:
  - 人類行為的連續性並不影響生產活動。
  - 人類行為的順序性質意味著生產活動必須按照特定的順序進行。
  - 人類行動的連續性意味著生產活動必須同時進行。
explanation: |
  由於人類行動的連續性，個人
  必須做出跨時選擇--平衡以下因素的決定
  眼前的需求與未來的目標。這些選擇會影響
  可採取的行動順序，如短期
  決策從屬於長期目標。以
  這意味著，生產過程中的任何迂迴都會影響生產效率。
  流程，即延長生產結構、
  需要事先儲蓄。現在就必須預留資源，以便
  維持個人在
  更長、更富有成效的道路。
reviewed: true
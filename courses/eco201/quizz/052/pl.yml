question: Jakie jest stanowisko zwolenników nowoczesnej teorii monetarnej (MMT) w odniesieniu do drukowania pieniędzy?
answer: Zwolennicy MMT popierają drukowanie pieniędzy w celu osiągnięcia celów politycznych.
wrong_answers:
  - Zwolennicy MMT są przeciwni drukowaniu pieniędzy w każdych okolicznościach.
  - Zwolennicy MMT uważają, że drukowanie pieniędzy powinno być kontrolowane przez bank centralny.
  - Zwolennicy MMT uważają, że należy unikać drukowania pieniędzy ze względu na ryzyko inflacji.
explanation: |
  Zwolennicy nowoczesnej teorii monetarnej (MMT) popierają drukowanie pieniędzy
  w celu osiągnięcia celów politycznych, wykorzystując brak inflacji w latach 2008-2019
  jako argumentu.
reviewed: true
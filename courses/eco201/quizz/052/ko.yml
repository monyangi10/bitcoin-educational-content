question: 화폐 인쇄와 관련하여 현대 통화 이론(MMT) 옹호자들의 입장은 무엇인가요?
answer: MMT 옹호자들은 정치적 목적을 달성하기 위해 화폐 발행을 지지합니다.
wrong_answers:
  - MMT 옹호자들은 어떤 상황에서도 화폐 발행에 반대합니다.
  - MMT 지지자들은 중앙은행이 화폐 발행을 통제해야 한다고 믿습니다.
  - MMT 지지자들은 인플레이션의 위험 때문에 화폐 발행을 피해야 한다고 생각합니다.
explanation: |
  현대 통화 이론(MMT)의 지지자들은 화폐 인쇄를 지지합니다
  정치적 목표를 달성하기 위해 2008년과 2019년 사이에 인플레이션이 없었다는 점을 들어
  를 논거로 삼고 있습니다.
reviewed: true
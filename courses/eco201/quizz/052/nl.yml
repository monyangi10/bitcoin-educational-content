question: Wat is het standpunt van de voorstanders van de Moderne Monetaire Theorie (MMT) met betrekking tot het drukken van geld?
answer: MMT-voorstanders steunen het drukken van geld om politieke doelen te bereiken.
wrong_answers:
  - MMT-voorstanders zijn onder alle omstandigheden tegen het drukken van geld.
  - MMT-aanhangers geloven dat het drukken van geld gecontroleerd moet worden door de centrale bank.
  - MMT-aanhangers geloven dat het drukken van geld moet worden vermeden vanwege het risico op inflatie.
explanation: |
  Voorstanders van de Moderne Monetaire Theorie (MMT) steunen het drukken van geld
  om politieke doelen te bereiken, waarbij ze de afwezigheid van inflatie tussen 2008 en 2019
  als argument.
reviewed: true
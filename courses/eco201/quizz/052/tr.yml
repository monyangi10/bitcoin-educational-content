question: Modern Para Teorisi (MMT) savunucularının para basma konusundaki tutumu nedir?
answer: MMT savunucuları siyasi hedeflere ulaşmak için para basılmasını desteklemektedir.
wrong_answers:
  - MMT savunucuları hiçbir koşulda para basılmasına karşıdır.
  - MMT savunucuları para basımının merkez bankası tarafından kontrol edilmesi gerektiğine inanmaktadır.
  - MMT savunucuları, enflasyon riski nedeniyle para basmaktan kaçınılması gerektiğine inanmaktadır.
explanation: |
  Modern Para Teorisi (MMT) savunucuları para basımını destekliyor
  siyasi hedeflere ulaşmak için 2008 ve 2019 yılları arasında enflasyonun olmamasını kullanmak
  bir argüman olarak.
reviewed: true
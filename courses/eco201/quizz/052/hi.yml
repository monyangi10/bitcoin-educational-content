question: आधुनिक मौद्रिक सिद्धांत (MMT) के समर्थक पैसे छापने (मनी प्रिंटिंग) के बारे में क्या सोचते हैं?
answer: MMT के समर्थक राजनीतिक लक्ष्यों को हासिल करने के लिए पैसा छापने (मनी प्रिंटिंग) का समर्थन करते हैं।
wrong_answers:
  - MMT के समर्थक किसी भी हालत में पैसा छापने के खिलाफ हैं।
  - MMT के समर्थकों का मानना है कि पैसे छापने पर केंद्रीय बैंक का नियंत्रण होना चाहिए।
  - MMT के समर्थकों का मानना है कि मुद्रास्फीति के जोखिम के कारण पैसा छापने से बचना चाहिए।
explanation: |
  मॉडर्न मॉनेटरी थ्योरी (MMT) पैसा छापने का समर्थन करती है
  राजनीतिक लक्ष्यों को हासिल करने के लिए, 2008 से 2019 के बीच मुद्रास्फीति की अनुपस्थिति का इस्तेमाल करते हुए
  एक बहस के तौर पर।
reviewed: true
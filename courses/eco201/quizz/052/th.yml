question: จุดยืนของผู้สนับสนุนทฤษฎีการเงินสมัยใหม่ (MMT) เกี่ยวกับการพิมพ์เงินคืออะไร?
answer: ผู้สนับสนุน MMT สนับสนุนการพิมพ์เงินเพื่อบรรลุเป้าหมายทางการเมือง
wrong_answers:
  - ผู้สนับสนุน MMT ต่อต้านการพิมพ์เงินในทุกกรณี
  - ผู้สนับสนุน MMT เชื่อว่าการพิมพ์เงินควรได้รับการควบคุมโดยธนาคารกลาง
  - ผู้สนับสนุน MMT เชื่อว่าการพิมพ์เงินควรหลีกเลี่ยงเนื่องจากความเสี่ยงของเงินเฟ้อ
explanation: |
  ทฤษฎีการเงินสมัยใหม่ (MMT) สนับสนุนการพิมพ์เงินเพื่อบรรลุเป้าหมายทางการเมือง โดยใช้การขาดเงินเฟ้อระหว่างปี 2008 ถึง 2019 เป็นข้อโต้แย้ง
reviewed: true
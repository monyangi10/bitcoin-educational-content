question: Ni ikihe kibanza ababuranira inyigisho y’amahera y’ubu (MMT) bafise ku bijanye n’ugucapura amahera?
answer: Ababuranira MMT barashigikiye icapa ry’amahera kugira ngo umuntu ashike ku ntego za politike.
wrong_answers:
  - Ababuranira MMT bararwanya gucapura amahera uko vyogenda kwose.
  - Ababuranira MMT bemera ko icapa ry’amahera rikwiye kugenzurwa na banki nkuru.
  - Ababuranira MMT bemera ko gucapura amahera bikwiye kwirindwa kubera ingorane zo gutera imbere kw’ibiciro.
explanation: |
  Ababuranira inyigisho y'amahera yo muri iki gihe (MMT) barashigikira icapa ry'amahera
  kugira ngo bashike ku ntego za politike, hakoreshejwe ukutagira inflation hagati ya 2008 na 2019
  nk’imvo n’imvano.
reviewed: true
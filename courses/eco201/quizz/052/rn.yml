question: Ni ikihe kibanza ababuranira inyigisho y’amahera nshasha (MMT) bafise ku bijanye n’ugukora amahera?
answer: Ababuranira MMT barashigikiye ikogwa ry’amahera kugira ngo umuntu ashike ku ntego za politike.
wrong_answers:
  - Ababuranira MMT bararwanya gukora amahera uko vyogenda kwose.
  - Ababuranira MMT bemera ko ikorwa ry’amahera rikwiye kugenzurwa na banki nkuru.
  - Ababuranira MMT bemera ko gukora amahera bikwiye kwirindwa kubera ingorane z'itakaza ry'agaciro k'mahera.
explanation: |
  Abashigikira Inyigisho y’Amafaranga nshasha (Modern Monetary Theory, TMM) bashigikiye gukora amafaranga kugira bashikire nyungu za politike, bakoresheje ukutagira itakaza ry’ibiciro hagati y’umwaka wa 2008 n’uwa 2019 nk’imvo n’imvano.
reviewed: true

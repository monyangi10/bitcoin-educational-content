question: Каква е позицията на привържениците на модерната парична теория (ММТ) по отношение на печатането на пари?
answer: Привържениците на ММТ подкрепят печатането на пари за постигане на политически цели.
wrong_answers:
  - Привържениците на ММТ са против печатането на пари при каквито и да било обстоятелства.
  - Привържениците на ММТ смятат, че печатането на пари трябва да се контролира от централната банка.
  - Привържениците на ММТ смятат, че печатането на пари трябва да се избягва поради риска от инфлация.
explanation: |
  Привържениците на съвременната парична теория (ММТ) подкрепят печатането на пари
  за постигане на политически цели, като използват липсата на инфлация между 2008 и 2019 г
  като аргумент.
reviewed: true
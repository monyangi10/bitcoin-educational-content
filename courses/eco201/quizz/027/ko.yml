question: 인간 행동의 시간적 조정에서 돈은 어떤 역할을 할까요?
answer: 이를 통해 현재에 가치를 저장하고 미래의 자신에게 전달할 수 있습니다.
wrong_answers:
  - 이를 통해 미래의 가치를 저장하고 현재의 자신에게 전달할 수 있습니다.
  - 현재에 가치를 저장하고 다른 사람에게 이전할 수 있습니다.
  - 이를 통해 미래의 가치를 저장하고 다른 사람에게 이전할 수 있습니다.
explanation: |
  개인은 돈을 저장, 즉 저축함으로써 미래의 불확실성에 대비하여
  미래의 불확실성에 대비하고, 따라서 더 긴 시간 동안
  더 긴 시간 동안 행동할 수 있습니다. 하지만
  사용된 돈이 가치 있는 자산이 되어야만
  가치의 저장소입니다.
reviewed: true
question: Каква роля играят парите в междувременната координация на човешките действия?
answer: Тя позволява съхраняването на стойност в настоящето и прехвърлянето ѝ към бъдещото "аз".
wrong_answers:
  - Тя позволява съхраняването на стойност в бъдещето и прехвърлянето ѝ към настоящето.
  - Тя позволява съхраняването на стойност в настоящето и прехвърлянето ѝ към други хора.
  - Той позволява съхраняването на стойност в бъдеще и прехвърлянето ѝ на други хора.
explanation: |
  Като съхраняват пари, т.е. спестяват, хората се предпазват от
  бъдещата несигурност и по този начин си позволяват да насочват
  действията си към по-дълъг времеви хоризонт. Въпреки това те
  могат да постигнат това, само ако използваните пари представляват
  на стойност.
reviewed: true
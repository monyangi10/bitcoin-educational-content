question: บทบาทของเงินในการประสานงานระหว่างช่วงเวลาของการกระทำของมนุษย์คืออะไร?
answer: มันช่วยให้สามารถเก็บรักษามูลค่าในปัจจุบันและโอนย้ายไปยังตัวตนในอนาคตของตนเองได้
wrong_answers:
  - มันช่วยให้สามารถเก็บมูลค่าไว้ในอนาคตและโอนย้ายไปยังตัวตนในปัจจุบันของตนเอง
  - มันช่วยให้สามารถเก็บรักษามูลค่าในปัจจุบันและโอนย้ายไปยังผู้อื่นได้
  - มันช่วยให้สามารถเก็บมูลค่าไว้ในอนาคตและโอนย้ายไปยังผู้อื่นได้
explanation: |
  โดยการเก็บเงินหรือการออม บุคคลสามารถป้องกันความไม่แน่นอนในอนาคตและทำให้ตนเองสามารถกำหนดการกระทำของตนไปสู่ระยะเวลาที่ยาวนานขึ้นได้ อย่างไรก็ตาม พวกเขาสามารถบรรลุสิ่งนี้ได้ก็ต่อเมื่อเงินที่ใช้นั้นเป็นแหล่งเก็บมูลค่า
reviewed: true
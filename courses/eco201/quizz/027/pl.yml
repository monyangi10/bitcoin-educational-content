question: Jaką rolę odgrywają pieniądze w międzyokresowej koordynacji ludzkich działań?
answer: Pozwala na przechowywanie wartości w teraźniejszości i przenoszenie jej do przyszłego "ja".
wrong_answers:
  - Pozwala na przechowywanie wartości w przyszłości i przenoszenie jej na teraźniejszość.
  - Umożliwia przechowywanie wartości w teraźniejszości i przekazywanie jej innym osobom.
  - Umożliwia przechowywanie wartości w przyszłości i przekazywanie jej innym osobom.
explanation: |
  Przechowując pieniądze, tj. oszczędzając, jednostki chronią się przed
  przed przyszłą niepewnością, a tym samym umożliwiają sobie kierowanie
  swoje działania w kierunku dłuższych horyzontów czasowych. Jednakże, mogą to
  mogą to osiągnąć tylko wtedy, gdy używane pieniądze stanowią magazyn
  wartości.
reviewed: true
question: Jaką rolę odgrywają pieniądze w międzyokresowej koordynacji ludzkich działań?
answer: Pozwalają na przechowywanie wartości w teraźniejszości i przenoszenie jej do przyszłości.
wrong_answers:
  - Pozwalają na przechowywanie wartości w przyszłości i przenoszenie jej na teraźniejszość.
  - Umożliwiają przechowywanie wartości w teraźniejszości i przekazywanie jej innym osobom.
  - Umożliwiają przechowywanie wartości w przyszłości i przekazywanie jej innym osobom.
explanation: |
  Przechowując pieniądze, tj. oszczędzając, jednostki chronią się przed przyszłą niepewnością, a tym samym umożliwiają sobie kierowanie
  swojego działania w kierunku dłuższych horyzontów czasowych. Jednakże mogą to osiągnąć tylko wtedy, gdy używane przez nich pieniądze dobrze przechowują wartość.
reviewed: true

question: पैसा इंसानी कार्रवाई के अंतराल समन्वय में क्या भूमिका निभाता है?
answer: यह वर्तमान में मूल्य को संग्रहित करने और उसे भविष्य के स्वयं तक पहुँचाने की सुविधा देता है।
wrong_answers:
  - यह भविष्य में मूल्य को संचित करने और उसे वर्तमान में ट्रांसफर करने की सुविधा देता है।
  - यह वर्तमान में मूल्य को स्टोर करने और दूसरों को ट्रांसफर करने की सुविधा देता है।
  - यह भविष्य में मूल्य को संग्रहित करने और दूसरों को ट्रांसफर करने की सुविधा देता है।
explanation: |
  पैसे को जमा करके, यानी बचत करके, लोग बचाव करते हैं
  भविष्य की अनिश्चितता और इस तरह खुद को निर्देशित करने में सक्षम बनाना
  उनके कार्य लंबे समय के लक्ष्यों की ओर हैं। हालांकि, वे
  ये तभी हो सकता है अगर पैसा एक भंडार का काम करे।
  मूल्यवान।
reviewed: true
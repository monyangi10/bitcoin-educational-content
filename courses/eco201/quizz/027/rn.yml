question: Ni uruhara uruhe amahera afise mu gutunganya ibikorwa vy’abantu hagati y’ibihe?
answer: Bituma umuntu ashobora kubika agaciro muri iki gihe, akakarungika muri kazoza kiwe.
wrong_answers:
  - Bituma umuntu ashobora kubika agaciro muri kazoza, akakarungika mur ari kubu.
  - Bituma agaciro kabikwa muri kubu no kugashikana(kukarungika) ku bandi bantu.
  - Bituma agaciro kabikwa muri kazoza no kukarungikira abandi bantu.
explanation: |
  Mu kubika amahera, ni ukuvuga kuziganya, abantu baririnda kubera ukutamenya ivyo muri kazoza maze bakishoboza gutunganya .
  ibikorwa vyabo mugihe kirekire. Ariko rero,
  ivyo bishobora ushika mugihe ayo amahera akoreshwa ari nk'ububiko .
  bw’agaciro.
reviewed: true

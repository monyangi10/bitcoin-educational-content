question: Welke rol speelt geld in de intertemporele coördinatie van menselijk handelen?
answer: Het maakt de opslag van waarde in het heden en de overdracht ervan naar iemands toekomstige zelf mogelijk.
wrong_answers:
  - Het maakt de opslag van waarde in de toekomst en de overdracht ervan naar het heden mogelijk.
  - Het maakt de opslag van waarde in het heden en de overdracht ervan aan andere mensen mogelijk.
  - Het maakt het mogelijk om waarde in de toekomst op te slaan en over te dragen aan andere mensen.
explanation: |
  Door geld op te slaan, d.w.z. te sparen, beschermen individuen zich tegen
  onzekerheid in de toekomst en stellen ze zichzelf zo in
  hun acties te richten op een langere tijdshorizon. Ze
  kunnen dit echter alleen bereiken als het gebruikte geld een opslagplaats
  van waarde vormt.
reviewed: true
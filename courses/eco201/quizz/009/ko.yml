question: 최후의 수단 대출 기관으로서 중앙은행의 역할은 무엇인가요?
answer: 중앙은행은 위기 시 부실 은행에 자금을 대출하여 전체 금융 시스템을 마비시킬 수 있는 도미노 효과를 방지합니다.

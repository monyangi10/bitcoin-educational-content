question: บทบาทของธนาคารกลางในฐานะผู้ให้กู้ในยามสุดท้ายคืออะไร?
answer: ธนาคารกลางให้กู้ยืมเงินแก่ธนาคารที่ประสบปัญหาในช่วงวิกฤติเพื่อป้องกันผลกระทบโดมิโนที่อาจทำให้ระบบการเงินทั้งหมดเป็นอัมพาต
wrong_answers:
  - ธนาคารกลางให้กู้ยืมเงินแก่ธนาคารที่ประสบปัญหาในช่วงวิกฤตเพื่อเพิ่มผลกำไรของตนเอง
  - ธนาคารกลางให้กู้ยืมเงินแก่ธนาคารที่ประสบปัญหาในช่วงวิกฤตเพื่อเข้าควบคุมการดำเนินงานของพวกเขา
  - ธนาคารกลางให้กู้ยืมเงินแก่ธนาคารที่ประสบปัญหาในช่วงวิกฤติเพื่อเพิ่มหนี้สาธารณะ
explanation: |
  แนวคิดของธนาคารกลางในฐานะผู้ให้กู้ในยามฉุกเฉิน
  เกิดขึ้นในศตวรรษที่ 19 ในประเทศอังกฤษเพื่อตอบสนองต่อ
  การวิ่งถอนเงินจากธนาคารซ้ำๆ ที่คุกคามเสถียรภาพทางการเงิน โดย
  การให้กู้ยืมแก่ธนาคารที่ประสบปัญหา ธนาคารกลางสามารถป้องกัน
  ผลกระทบโดมิโนของการล้มละลายของธนาคารที่อาจนำไปสู่
  ภาวะถดถอยหรือภาวะเศรษฐกิจตกต่ำ
reviewed: true
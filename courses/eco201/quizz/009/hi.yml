question: केंद्रीय बैंक का अंतिम ऋणदाता के रूप में क्या रोल होता है?
answer: केंद्रीय बैंक संकट के दौरान परेशानी में फंसे बैंकों को पैसे उधार देता है ताकि पूरे वित्तीय तंत्र को ठप होने से बचाया जा सके।
wrong_answers:
  - केंद्रीय बैंक संकट के दौरान परेशान बैंकों को अपने मुनाफे को बढ़ाने के लिए पैसे उधार देता है।
  - केंद्रीय बैंक संकट के दौरान परेशानी में फंसे बैंकों को उनके संचालन को संभालने के लिए धन उधार देता है।
  - केंद्रीय बैंक संकट के दौरान परेशानी में फंसे बैंकों को धन उधार देता है, जिससे राष्ट्रीय ऋण बढ़ता है।
explanation: |
  केंद्रीय बैंक को अंतिम उपाय के ऋणदाता के रूप में की अवधारणा
  19वीं सदी में इंग्लैंड में जवाब में उभरा
  बार-बार होने वाले बैंक दौड़ (bank runs) जिन्होंने वित्तीय स्थिरता को खतरे में डाल दिया।
  संकट में फंसे बैंकों को कर्ज़ देकर, केंद्रीय बैंक रोक सकता है
  बैंकों की एक डोमिनो प्रभाव वाली विफलता जो एक...
  मंदी या गहरी मंदी।

question: Ni uruhara uruhe amabanki makuru afise nk'ibigi bitanga ingurane?
answer: Amabanki makuru ari imbere cane y'ayandi mabanki,bivuye kukuntu ari mu bibazo canke mu bihe vy’amagume kugira ngo ntihagire ingaruka zishobora gutuma ubuhinga bwose bw’ivy’ubutunzi buhagarara.
wrong_answers:
  - Banki nkuru iragurisha amahera amabanki ari mu bibazo mu bihe vy’amagume kugira ngo aronke inyungu zayo bwite.
  - Banki nkuru iragurisha amahera amabanki ari mu bibazo mu bihe vy’amagume kugira ngo afate ibikorwa vyayo.
  - Banki nkuru igura amahera amabanki ari mu bibazo mu bihe vy’amagume ashoboze igihugu. guterimbere neza

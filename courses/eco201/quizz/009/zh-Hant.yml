question: 中央銀行作為最後貸款人的角色是什麼？
answer: 中央銀行在危機期間向受困的銀行貸款，以防止骨牌效應造成整個金融體系癱瘓。
wrong_answers:
  - 中央銀行在危機期間將資金借給陷入困境的銀行，以增加自己的利潤。
  - 中央銀行在危機期間借出資金給陷入困境的銀行，以接管其營運。
  - 中央銀行在危機期間向陷入困境的銀行貸款，以增加國債。
explanation: |
  中央銀行作為最後貸款人的概念
  於19世紀在英國出現，以回應
  銀行屢次擠提，威脅金融穩定。通過
  中央銀行向陷入困境的銀行提供貸款，可以防止
  銀行倒閉的骨牌效應可能會導致
  衰退或蕭條。
reviewed: true
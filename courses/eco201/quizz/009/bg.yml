question: Каква е ролята на централната банка като кредитор от последна инстанция?
answer: По време на криза централната банка отпуска заеми на закъсали банки, за да предотврати ефекта на доминото, който може да парализира цялата финансова система.
wrong_answers:
  - По време на кризи централната банка отпуска заеми на закъсали банки, за да увеличи собствените си печалби.
  - По време на криза централната банка отпуска заеми на закъсали банки, за да поеме техните операции.
  - По време на кризи централната банка отпуска заеми на закъсали банки, за да увеличи държавния дълг.
explanation: |
  Концепцията за централната банка като кредитор от последна инстанция
  се появява през XIX век в Англия в отговор на
  повтарящи се масови източвания на банкови сметки, които застрашават финансовата стабилност. От
  кредитиране на банки в затруднено положение, централната банка може да предотврати
  ефекта на доминото от банкови фалити, които биха могли да доведат до
  рецесия или депресия.
reviewed: true
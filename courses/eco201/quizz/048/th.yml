question: วิธีการแบบสัจพจน์-นิรนัยที่เสนอโดย Ludwig von Mises ในการศึกษาวิทยาศาสตร์สังคมคืออะไร?
answer: วิธีการนี้อิงตามข้อเสนอพื้นฐานที่เรียกว่า สัจพจน์ ซึ่งคล้ายกับที่ใช้ในคณิตศาสตร์
wrong_answers:
  - วิธีการนี้อิงจากข้อมูลเชิงประจักษ์และการสังเกตการณ์
  - วิธีการนี้อิงจากการทดลองและสมมติฐานชั่วคราว
  - แนวทางนี้อิงตามแนวทางแบบปฏิฐานนิยมที่มักใช้ในสังคมศาสตร์
explanation: |
  การทดลองทางเศรษฐศาสตร์ไม่สามารถทำซ้ำในห้องปฏิบัติการได้ และสิ่งสำคัญคือต้องสังเกตว่าการสังเกตความสัมพันธ์ระหว่างตัวแปรสองตัวไม่ได้พิสูจน์ความสัมพันธ์เชิงสาเหตุระหว่างกัน นี่คือเหตุผลที่ Ludwig von Mises เสนอวิธีการแบบสัจพจน์-นิรนัย
reviewed: true
question: Wat is de axiomatisch-deductieve methode die Ludwig von Mises voorstelde voor de studie van sociale wetenschappen?
answer: Deze benadering is gebaseerd op fundamentele stellingen die axioma's worden genoemd, vergelijkbaar met die in de wiskunde.
wrong_answers:
  - Deze aanpak is gebaseerd op empirische gegevens en observaties.
  - Deze aanpak is gebaseerd op tijdelijke experimenten en hypotheses.
  - Deze benadering is gebaseerd op de positivistische benadering die vaak gebruikt wordt in de sociale wetenschappen.

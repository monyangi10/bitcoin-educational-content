question: लुडविग वॉन मिसेस द्वारा सामाजिक विज्ञान के अध्ययन में प्रस्तावित "एक्सिओमैटिक-डिडक्टिव मेथड" क्या है?  

यह तरीका इंसानी कार्रवाई (human action) के बुनियादी सिद्धांतों से शुरू होता है, जैसे कि:  
1. "इंसान मकसद से काम करते हैं" (Individuals act purposefully)  
2. "संसाधन दुर्लभ होते हैं" (Resources are scarce)  

इन स्वयंसिद्ध सच्चाइयों (axioms) से तार्किक निष्कर्ष (deductive reasoning) निकाले जाते हैं। मिसेस का मानना था कि अर्थशास्त्र जैसे सामाजिक विज्ञानों में प्रयोगशाला जैसी विधियाँ काम नहीं करतीं, इसलिए यह तार्किक ढंग सबसे सही है।  

उनकी प्रसिद्ध किताब *Human Action* में यह दृष्टिकोण पूरी तरह समझाया गया है।
answer: यह तरीका कुछ बुनियादी सिद्धांतों पर आधारित है जिन्हें अभिगृहीत (axioms) कहते हैं, ठीक वैसे ही जैसे गणित में इस्तेमाल होते हैं।
wrong_answers:
  - यह तरीका अनुभवजन्य डेटा और निरीक्षणों पर आधारित है।
  - यह तरीका अस्थायी प्रयोगों और परिकल्पनाओं पर आधारित है।
  - यह तरीका सामाजिक विज्ञान में अक्सर इस्तेमाल होने वाले पॉज़िटिविस्ट दृष्टिकोण पर आधारित है।
explanation: |
  आर्थिक प्रयोगों को प्रयोगशाला में दोहराया नहीं जा सकता, और यह महत्वपूर्ण है...
  ध्यान रखो कि दो चरों के बीच संबंध देखने का मतलब यह नहीं है कि एक दूसरे का कारण है।
  उनके बीच का रिश्ता। यही वजह है कि लुडविग वॉन मिसेस ने सुझाव दिया
  "स्वतःसिद्ध-निगमनात्मक विधि"
reviewed: true
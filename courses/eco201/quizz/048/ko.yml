question: 사회과학 연구에서 루트비히 폰 미제스가 제안한 공리-연역적 방법은 무엇인가요?
answer: 이 접근 방식은 수학에서 사용되는 공리와 유사한 공리라는 기본 명제를 기반으로 합니다.
wrong_answers:
  - 이 접근 방식은 경험적 데이터와 관찰을 기반으로 합니다.
  - 이 접근 방식은 일시적인 실험과 가설을 기반으로 합니다.
  - 이 접근 방식은 사회 과학에서 자주 사용되는 실증주의적 접근 방식을 기반으로 합니다.
explanation: |
  경제 실험은 실험실에서 재현할 수 없으며, 다음 사항에 유의해야 합니다
  두 변수 간의 상관관계를 관찰하는 것이 인과관계를 증명하는 것은 아닙니다
  관계를 증명할 수 없습니다. 이것이 바로 루트비히 폰 미제스가 제안한
  공리 연역적 방법을 제안한 이유입니다.
reviewed: true
question: Какъв е аксиоматично-дедуктивният метод, предложен от Лудвиг фон Мизес при изучаването на социалните науки?
answer: Този подход се основава на основни положения, наречени аксиоми, подобни на тези, използвани в математиката.
wrong_answers:
  - Този подход се основава на емпирични данни и наблюдения.
  - Този подход се основава на временни експерименти и хипотези.
  - Този подход се основава на позитивисткия подход, който често се използва в социалните науки.
explanation: |
  Икономическите експерименти не могат да бъдат възпроизведени в лаборатория и е важно да се
  да се отбележи, че наблюдаването на корелация между две променливи не доказва причинно-следствена връзка
  не е причинно-следствена връзка между тях. Това е причината Лудвиг фон Мизес да предложи
  аксиоматично-дедуктивния метод.
reviewed: true
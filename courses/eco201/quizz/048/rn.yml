question: Ni ubuhe buryo bw’ugukuraho ivy’ukuri bwashikirijwe na Ludwig von Mises mu kwiga ivy’imibano?
answer: Ubwo buryo bushingiye ku vyiyumviro vy’ishimikiro vyitwa axiomes, bisa n’ivyo bikoreshwa mu biharuro.
wrong_answers:
  - Ubwo buryo bushingiye ku makuru n’ivyo umuntu abona.
  - Ubwo buryo bushingiye ku ngeragezwa n’ivyiyumviro vy’igihe gito.
  - Ubwo buryo bushingiye ku buryo bw’ivyiza bukoreshwa kenshi mu vy’imibano.
explanation: |
  Ivyagezwe vy’ubutunzi ntibishobora gusubirwamwo mu laboratwari, kandi birahambaye ko 
  menya ko kwihweza isano hagati y'ibintu bibiri bihinduka bitagaragaza ko hariho impamvu 
  ubucuti buri hagati yabo. Ivyo ni vyo vyatumye Ludwig von Mises asaba ko . 
  uburyo bw’ugukuraho ivy’ukuri.
reviewed: true
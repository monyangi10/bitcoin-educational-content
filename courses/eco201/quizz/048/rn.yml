question: Ni ubuhe buryo bwa axiomatique-déductive bwa Ludwig von Mises mu kwiga ibijanye n’imibereho y’abantu?
answer: Ubwo buryo bushingiye ku vyiyumviro ngenderwako vyitwa axiomes, bisa n’ibikoreshwa mu biharuro.
wrong_answers:
  - Ubwo buryo bushingiye ku makuru y’ivyabonetse n’ivyo abantu babonye.
  - Ubwo buryo bushingiye ku kugeragezo vy’igihe gito n’ivyiyumviro vy’inkeka.
  - Ubwo buryo bushingiye ku buryo bwa positiviste bukunze gukoreshwa vyigwa vy’imibano.
explanation: |
  Uburyo bwa axiomatique-déductive bwatangajwe na Ludwig von Mises bushingiye ku majambo atangwa yitwa axiomes, bisa n’ayo bakoresha mu biharuro.
  Ubu buryo bukoresha mu kwiga ibijanye n’ubumenyi bw’imibano, harimwo n’ubutunzi.
reviewed: true

question: Каква е връзката между времевите предпочитания и лихвените проценти в икономика с неманипулирани капиталови пазари?
answer: Увеличаването на лихвените проценти е резултат от относително нарастване на търсенето на капитал в сравнение с предлагането, което показва по-високи предпочитания към времето. Обратно, намаляването на лихвените проценти се дължи на увеличаване на спестяванията, което е увеличение на предлагането на капитал, което показва намаляване на времевите предпочитания.
wrong_answers:
  - Увеличаването на лихвените проценти показва намаляване на предпочитанията към времето, а намаляването на лихвените проценти - увеличаване на предпочитанията към времето.
  - Времевите предпочитания и лихвените проценти са в обратна зависимост.
  - Времевите предпочитания и лихвените проценти нямат пряка връзка.
explanation: |
  В икономика с неманипулирани капиталови пазари
  лихвените проценти се определят в пресечната точка на
  търсенето и предлагането на капитал. Следователно тези лихвени проценти представляват
  състоянието на времевите предпочитания за цялата икономика. Едно
  увеличение на лихвения процент е резултат от относително
  увеличаване на търсенето на капитал в сравнение с предлагането,
  което показва по-високи времеви предпочитания. Обратно, намаляването
  на лихвените проценти се дължи на увеличаване на спестяванията,
  което представлява увеличение на предлагането на капитал, което показва
  намаляване на времевите предпочитания.
reviewed: true

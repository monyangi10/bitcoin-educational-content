question: 在資本市場未受操控的經濟體系中，時間偏好與利率之間的關係為何？
answer: 與 Supply 相比，利率上升是由於資本需求相對增加，表明時間偏好提高。相反，利率的降低是由於儲蓄的增加，也就是資本 Supply 的增加，表示時間偏好的降低。
wrong_answers:
  - 利率上升表示時間偏好下降，利率下降表示時間偏好上升。
  - 時間偏好和利率成反比。
  - 時間偏好和利率沒有直接關係。
explanation: |
  在資本市場不受操控的經濟體系中，參考
  利率決定於
  資本 Supply 和需求。因此，這些費率代表
  整個經濟體的時間偏好狀態。邏輯
  利率上升是由於相對
  與 Supply 相比，資本需求增加、

question: Ni isano irihe riri hagati y’uguhitamwo umwanya n’inyungu mu bukungu bufise amasoko y’itunga atakoreshwa nabi?
answer: Ukwiyongera kw’inyungu kuva ku kwiyongera kw’abasaba umutungo ugereranije na Supply, bikaba vyerekana ko umuntu akunda igihe kinini. Ku rundi ruhande, ukugabanya inyungu biva ku kwiyongera kw’amahera azigamiwe, ari vyo kwiyongera kwa Supply y’umutungo kamere, bikaba vyerekana ko igihe umuntu akunda kigabanutse.
wrong_answers:
  - Ukwongerekana kw’inyungu vyerekana ko umuntu akunda igihe kigabanutse, mu gihe inyungu zigabanutse vyerekana ko umuntu akunda igihe kigabanutse.
  - Igihe umuntu akunda n’inyungu birafitaniye isano ritari ryo.
  - Igihe umuntu akunda n’inyungu nta sano ritandukanye bifitaniye.

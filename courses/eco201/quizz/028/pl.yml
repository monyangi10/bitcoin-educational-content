question: Jaki jest związek między preferencją czasową a stopami procentowymi w gospodarce z niezmanipulowanymi rynkami kapitałowymi?
answer: Wzrost stóp procentowych wynika ze względnego wzrostu popytu na kapitał w porównaniu do podaży, co wskazuje na wyższe preferencje czasowe. I odwrotnie, spadek stóp procentowych wynika ze wzrostu oszczędności, co oznacza wzrost podaży kapitału, wskazując na zmniejszenie preferencji czasowych.
wrong_answers:
  - Wzrost stóp procentowych wskazuje na spadek preferencji czasowych, podczas gdy spadek stóp procentowych wskazuje na wzrost preferencji czasowych.
  - Preferencja czasowa i stopy procentowe są odwrotnie powiązane.
  - Preferencja czasowa i stopy procentowe nie mają bezpośredniego związku.
explanation: |
  W gospodarce z niezmanipulowanymi rynkami kapitałowymi, referencyjne
  stopy procentowe są ustalane na przecięciu podaży i popytu na kapitał. Dlatego też stopy te reprezentują
  stan preferencji czasowych dla całej gospodarki. Wzrost stopy procentowej wynika ze względnego
  wzrostu popytu na kapitał w porównaniu do podaży,
  co wskazuje na wyższą preferencję czasową. I odwrotnie, spadek
  stóp procentowych wynika ze wzrostu oszczędności,
  co oznacza wzrost podaży kapitału, wskazujący na obniżenie preferencji czasowych.
reviewed: true

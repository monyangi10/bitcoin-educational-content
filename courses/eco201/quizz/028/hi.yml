question: एक असंचालित पूंजी बाजार वाली अर्थव्यवस्था में समय प्राथमिकता (time preference) और ब्याज दरों के बीच क्या संबंध है?  

सीधे शब्दों में:  
- **समय प्राथमिकता** का मतलब है कि लोग आज का पैसा भविष्य के पैसे के मुकाबले ज्यादा वैल्यू देते हैं।  
- जब लोगों की समय प्राथमिकता ज्यादा होती है (यानी वे जल्दी खर्च करना चाहते हैं), तो **बचत कम** होती है। इससे पूंजी की कमी होती है और ब्याज दरें **बढ़ जाती** हैं।  
- अगर समय प्राथमिकता कम हो (लोग भविष्य के लिए ज्यादा बचत करें), तो पूंजी की आपूर्ति बढ़ती है और ब्याज दरें **गिर जाती** हैं।  

यानी, बिना किसी हस्तक्षेप वाले बाजार में, ब्याज दरें लोगों की समय प्राथमिकता का प्राकृतिक प्रतिबिंब होती हैं।
answer: ब्याज दरों में वृद्धि, Supply की तुलना में पूंजी की मांग में सापेक्ष वृद्धि के कारण होती है, जो समय प्राथमिकताओं में वृद्धि को दर्शाती है। इसके विपरीत, ब्याज दरों में कमी बचत में वृद्धि के कारण होती है, जो पूंजी के Supply में वृद्धि है, और यह समय प्राथमिकताओं में कमी को दर्शाती है।
wrong_answers:
  - ब्याज दरों में वृद्धि का मतलब है समय प्राथमिकताओं में कमी, जबकि ब्याज दरों में कमी का मतलब है समय प्राथमिकताओं में वृद्धि।
  - समय प्राथमिकता और ब्याज दरें एक-दूसरे के विपरीत होती हैं।
  - समय प्राथमिकता और ब्याज दरों का कोई सीधा संबंध नहीं है।
explanation: |
  एक अर्थव्यवस्था में जहां पूंजी बाजारों में हेरफेर नहीं किया गया हो, संदर्भ
  ब्याज दरें मांग और आपूर्ति के मिलन बिंदु पर तय होती हैं।
  राजधानी Supply और मांग। इसलिए, ये दरें दर्शाती हैं
  पूरी अर्थव्यवस्था के लिए समय की प्राथमिकताओं की स्थिति।
  ब्याज दर में वृद्धि एक सापेक्ष वजह से होती है
  पूंजी की मांग में Supply की तुलना में वृद्धि,
  जिसका मतलब है कि समय की प्राथमिकता ज़्यादा है। वहीं, अगर यह कम हो तो
  ब्याज दरों में वृद्धि बचत में वृद्धि के कारण होती है,
  यह Supply में पूंजी की वृद्धि है, जो दर्शाता है
  समय प्राथमिकताओं में कमी।
reviewed: true
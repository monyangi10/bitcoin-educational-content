question: ความสัมพันธ์ระหว่างการเลือกเวลาของผู้บริโภคและอัตราดอกเบี้ยในเศรษฐกิจที่มีตลาดทุนที่ไม่ได้ถูกแทรกแซงคืออะไร?
answer: การเพิ่มขึ้นของอัตราดอกเบี้ยเกิดจากการเพิ่มขึ้นของความต้องการทุนเมื่อเทียบกับอุปทาน ซึ่งบ่งบอกถึงความชอบในเวลาที่สูงขึ้น ในทางกลับกัน การลดลงของอัตราดอกเบี้ยเกิดจากการเพิ่มขึ้นของการออม ซึ่งเป็นการเพิ่มขึ้นของอุปทานทุน บ่งบอกถึงการลดลงของความชอบในเวลา
wrong_answers:
  - การเพิ่มขึ้นของอัตราดอกเบี้ยบ่งชี้ถึงการลดลงของความพึงพอใจในเวลา ในขณะที่การลดลงของอัตราดอกเบี้ยบ่งชี้ถึงการเพิ่มขึ้นของความพึงพอใจในเวลา
  - ความชอบในเวลาและอัตราดอกเบี้ยมีความสัมพันธ์กันในทางตรงกันข้าม
  - การให้ความสำคัญกับเวลาและอัตราดอกเบี้ยไม่มีความสัมพันธ์โดยตรง
explanation: |
  ในระบบเศรษฐกิจที่ตลาดทุนไม่ได้ถูกแทรกแซง อัตราดอกเบี้ยอ้างอิงจะถูกกำหนดที่จุดตัดของอุปทานและอุปสงค์ของทุน ดังนั้น อัตราเหล่านี้จึงแสดงถึงสถานะของความพึงพอใจด้านเวลาสำหรับเศรษฐกิจทั้งหมด การเพิ่มขึ้นของอัตราดอกเบี้ยเกิดจากการเพิ่มขึ้นของอุปสงค์สำหรับทุนเมื่อเทียบกับอุปทาน ซึ่งบ่งบอกถึงความพึงพอใจด้านเวลาที่สูงขึ้น ในทางกลับกัน การลดลงของอัตราดอกเบี้ยเกิดจากการเพิ่มขึ้นของการออม ซึ่งเป็นการเพิ่มขึ้นของอุปทานของทุน บ่งบอกถึงการลดลงของความพึงพอใจด้านเวลา
reviewed: true
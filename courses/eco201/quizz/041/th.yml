question: บทบาทของภาคธนาคารในการกระตุ้นภาวะเศรษฐกิจถดถอยตามทฤษฎีวัฏจักรธุรกิจของออสเตรียคืออะไร?
answer: ภาคการธนาคารก่อให้เกิดภาวะถดถอยเมื่อมีการตัดสินใจลดความเสี่ยงและดังนั้นจึงลดการไหลเวียนของเครดิต
wrong_answers:
  - ภาคการธนาคารก่อให้เกิดภาวะถดถอยเมื่อมีการตัดสินใจเพิ่มความเสี่ยงและดังนั้นจึงเพิ่มการไหลของเครดิต
  - ภาคการธนาคารก่อให้เกิดภาวะถดถอยเมื่อมันตัดสินใจที่จะรักษาความเสี่ยงและดังนั้นจึงรักษาการไหลของเครดิต
  - ภาคการธนาคารไม่มีบทบาทในการกระตุ้นภาวะถดถอยตามทฤษฎีวัฏจักรธุรกิจของออสเตรีย
explanation: |
  ตามทฤษฎีวัฏจักรธุรกิจของออสเตรีย ภาคธนาคารก่อให้เกิดภาวะถดถอยเมื่อมันตัดสินใจลดความเสี่ยงและดังนั้นจึงลดการไหลของเครดิต สิ่งนี้นำไปสู่การล้มละลายจำนวนมาก การเข้มงวดของเครดิต การลดลงของอำนาจการซื้อที่มีอยู่ และการล่มสลายทางการเงิน
reviewed: true
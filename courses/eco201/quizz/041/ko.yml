question: 오스트리아 경기순환 이론에 따르면 경기침체를 유발하는 은행 부문의 역할은 무엇인가요?
answer: 은행 부문은 리스크를 줄이기로 결정하고 신용의 흐름을 줄이면 경기 침체를 유발합니다.
wrong_answers:
  - 은행 부문은 리스크를 늘리기로 결정하고 신용의 흐름을 증가시키면 경기 침체를 유발합니다.
  - 은행 부문은 리스크를 유지하기 위해 신용의 흐름을 유지하기로 결정할 때 경기 침체를 촉발합니다.
  - 오스트리아 경기순환 이론에 따르면 은행 부문은 경기 침체를 유발하는 데 아무런 역할을 하지 않습니다.
explanation: |
  오스트리아 경기순환 이론에 따르면, 은행 부문은
  리스크를 줄이기로 결정하면 경기 침체를 촉발하여
  신용의 흐름을 감소시킵니다. 이로 인해 많은 파산, 신용 긴축, 가용 구매력 감소, 금융 붕괴가
  구매력 감소, 금융 붕괴로 이어집니다.
reviewed: true
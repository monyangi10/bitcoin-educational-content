question: Ni uruhara uruhe urwego rw’amabanki rufise mu gutuma haba ugusubira inyuma kw’ubutunzi hakurikijwe inyigisho ya Otirishiya y’ingendo y’ubudandaji?
answer: Uruganda rw’amabanki rutera ugusubira inyuma kw’ubutunzi iyo rufashe ingingo yo kugabanya ingorane zarwo, bigatuma rero rugabanya uruja n’uruza rw’inguzanyo.
wrong_answers:
  - Uruganda rw’amabanki rutera ugusubira inyuma kw’ubutunzi iyo rufashe ingingo yo kwongera ingorane, bigatuma rero uruja n’uruza rw’inguzanyo rwongera.
  - Uruganda rw’amabanki rutera ugusubira inyuma kw’ubutunzi iyo rufashe ingingo yo kuguma rufise ingorane, bigatuma ruguma rufise inguzanyo.
  - Uruganda rw’amabanki nta ruhara rufise mu gutuma ubutunzi bugwa nk’uko bivugwa n’Iciyumviro c’Ubucuruzi c’Ubudagi.
explanation: |
  Dukurikije inyigisho y’i Otirishiya yerekeye uruzitiro rw’ubudandaji, urwego rw’amabanki .
  ivyura ugusubira inyuma kw’ubutunzi iyo ifashe ingingo yo kugabanya ingorane zayo, bigatuma igabanuka .
  uruja n’uruza rw’inguzanyo. Ivyo bituma abantu benshi bahomba, inguzanyo zigakomera, zigabanuka .
  mu bushobozi bwo kugura buriho, no mu gusenyuka kw’amahera.
reviewed: true
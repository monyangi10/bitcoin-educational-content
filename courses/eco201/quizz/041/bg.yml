question: Каква е ролята на банковия сектор за предизвикване на рецесия според австрийската теория за бизнес цикъла?
answer: Банковият сектор предизвиква рецесия, когато реши да намали риска си и следователно намали потока от кредити.
wrong_answers:
  - Банковият сектор предизвиква рецесия, когато решава да увеличи риска си и следователно увеличава кредитния поток.
  - Банковият сектор предизвиква рецесия, когато решава да запази риска си и следователно поддържа кредитния поток.
  - Според австрийската теория за бизнес цикъла банковият сектор не играе никаква роля за предизвикването на рецесия.
explanation: |
  Според австрийската теория за бизнес цикъла банковият сектор
  предизвиква рецесия, когато решава да намали риска си и следователно намалява
  кредитните потоци. Това води до много фалити, затягане на кредитирането, намаляване на
  покупателната способност и финансови сривове.
reviewed: true

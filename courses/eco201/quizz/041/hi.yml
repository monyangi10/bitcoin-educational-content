question: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी के मुताबिक, बैंकिंग सेक्टर मंदी (recession) को कैसे ट्रिगर करता है?  

इस थ्योरी के अनुसार, बैंक जब बहुत ज़्यादा सस्ता कर्ज़ देते हैं (low interest rates), तो बाज़ार में नकली उछाल (artificial boom) आता है। लोग और कंपनियाँ ग़लत निवेश (bad investments) करने लगते हैं, जो असल मांग (real demand) के बजाय सिर्फ़ सस्ते पैसे की वजह से होता है।  

जब ब्याज दरें फिर से बढ़ती हैं या कर्ज़ चुकाने का वक्त आता है, तो ये निवेश फेल हो जाते हैं। इससे कंपनियाँ बंद होती हैं, नौकरियाँ जाती हैं, और अर्थव्यवस्था मंदी में चली जाती है।  

सीधे शब्दों में: बैंकों का ज़रूरत से ज़्यादा कर्ज़ देना ही मंदी की शुरुआत करता है!
answer: बैंकिंग सेक्टर मंदी ला देता है जब वह अपना रिस्क कम करने का फैसला करता है और इस वजह से कर्ज देने की रफ्तार घट जाती है।
wrong_answers:
  - बैंकिंग सेक्टर मंदी को तब ट्रिगर करता है जब वह अपना रिस्क बढ़ाने का फैसला करता है और इस तरह क्रेडिट के प्रवाह को बढ़ा देता है।
  - बैंकिंग सेक्टर मंदी को तब ट्रिगर करता है जब वह अपना जोखिम बनाए रखने का फैसला करता है और इसलिए क्रेडिट का प्रवाह बनाए रखता है।
  - ऑस्ट्रियन बिजनेस साइकल थ्योरी के मुताबिक, मंदी लाने में बैंकिंग सेक्टर का कोई रोल नहीं होता।
explanation: |
  ऑस्ट्रियन बिज़नेस साइकिल थ्योरी के मुताबिक, बैंकिंग सेक्टर
  जब यह अपना जोखिम कम करने का फैसला करता है और इस तरह कम कर देता है, तो यह मंदी को ट्रिगर करता है।
  क्रेडिट का प्रवाह। इससे कई दिवालियापन होते हैं, क्रेडिट सख्त होता है, एक कमी
  उपलब्ध क्रय शक्ति में, और वित्तीय पतन।
reviewed: true
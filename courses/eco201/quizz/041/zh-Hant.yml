question: 根據奧地利商業週期理論，銀行業在引發衰退方面扮演什麼角色？
answer: 當銀行業決定降低風險，因而減少信貸流量時，就會引發衰退。
wrong_answers:
  - 當銀行業決定增加風險，因而增加信貸流量時，就會引發衰退。
  - 當銀行業決定維持其風險，因而維持信貸流量時，就會引發衰退。
  - 根據奧地利商業週期理論 (Austrian Theory of the Business Cycle)，銀行業在引發衰退上並無任何作用。
explanation: |
  根據奧地利商業週期理論，銀行部門
  當它決定降低其風險時，就會觸發經濟衰退，並因此減少
  信貸的流動。這導致許多人破產、信貸緊縮、信貸流動減少。
  可用購買力下降，以及金融崩潰。
reviewed: true
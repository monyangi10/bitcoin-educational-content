question: Nk’uko abahinga mu vy’ubutunzi bo muri Otirishi babivuga, ni igiki kiva mukunonosora igikorwa cabo kandi hamwe n'ukuja mu bikorwa vyo guhanahana amakuru canke kuvugana n'abandi?
answer: Abantu bama barushiriza kuba neza.
wrong_answers:
  - Abantu bama ari babi kuruta.
  - Nta mpinduka ibaho mu mibereho y’abantu.
  - Ico bivamwo kiratandukanye bivanye n’umuntu.
explanation: |
  Nk’uko abahinga mu vy’ubutunzi bo muri Otirishi babivuga, ingaruka zishikira abantu mukunonosora akazi canke igikorwa cabo
  no kwifatanya n'abandi mubiyago canke mu guhanahana amakuru ni .
  ko bama bafise ivyiza kuruta. Ivyo ni kubera ko kunonosora na kuyaga bituma abantu bashobora gushika ku rugero rwo hejuru cane muvyo bakora bakaba n'abikimazi mugikorwa cabo.
reviewed: true

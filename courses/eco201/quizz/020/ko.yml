question: 오스트리아 경제학자들에 따르면, 개인이 자신의 일을 전문으로 하고 교류에 참여하면 어떤 결과가 나올까요?
answer: 개인이 항상 더 유리합니다.
wrong_answers:
  - 개인은 항상 더 불리합니다.
  - 개인의 상황에는 변화가 없습니다.
  - 결과는 개인에 따라 다릅니다.
explanation: |
  오스트리아 경제학자들에 따르면, 개인이 자신의 일을 전문화하여
  자신의 일을 전문화하고 교류에 참여한 결과
  항상 더 나은 삶을 살게 된다는 것입니다. 그 이유는 다음과 같습니다
  전문화와 Exchange은 개인이 주관적 효용을 극대화할 수 있도록
  주관적 효용을 극대화할 수 있기 때문입니다.
reviewed: true
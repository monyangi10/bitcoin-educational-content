question: Според австрийските икономисти какъв е резултатът от специализацията на индивидите в работата им и участието им в размяна?
answer: Отделните лица винаги са в по-добро положение.
wrong_answers:
  - Лицата винаги са в по-лошо положение.
  - Няма промяна в положението на лицата.
  - Резултатът варира в зависимост от индивида.
explanation: |
  Според австрийските икономисти резултатът от дейността на индивидите по
  специализация в работата си и участие в размяна е
  че те винаги са в по-добро положение. Това е така, защото
  специализацията и размяната позволяват на хората да максимизират
  тяхната субективна полезност.
reviewed: true

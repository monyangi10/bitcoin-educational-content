question: Według ekonomistów austriackich, co wynika z tego, że jednostki specjalizują się w swojej pracy i angażują się w wymianę?
answer: Osoby takie są zawsze w lepszej sytuacji.
wrong_answers:
  - Osoby takie są zawsze w gorszej sytuacji.
  - Sytuacja poszczególnych osób nie ulega zmianie.
  - Wynik różni się w zależności od osoby.
explanation: |
  Według ekonomistów austriackich rezultatem tego, że jednostki
  specjalizują się w swojej pracy i angażują się w wymianę jest to, że są w lepszej sytuacji. Dzieje się tak, ponieważ
  specjalizacja i wymiana pozwalają jednostkom maksymalizować
  ich subiektywną użyteczność.
reviewed: true

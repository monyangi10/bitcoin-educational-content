question: Wat is volgens Oostenrijkse economen het resultaat van het feit dat individuen zich specialiseren in hun werk en deelnemen aan uitwisselingen?
answer: Individuen zijn altijd beter af.
wrong_answers:
  - Individuen zijn altijd slechter af.
  - Er is geen verandering in de situatie van de individuen.
  - Het resultaat varieert per individu.
explanation: |
  Volgens Oostenrijkse economen is het resultaat van individuele
  die zich specialiseren in hun werk en deelnemen aan uitwisselingen is
  dat ze altijd beter af zijn. Dit komt omdat
  specialisatie en Exchange individuen in staat stellen hun
  subjectief nut te maximaliseren.
reviewed: true
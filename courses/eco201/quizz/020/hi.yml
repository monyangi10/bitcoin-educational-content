question: ऑस्ट्रियाई अर्थशास्त्रियों के मुताबिक, अगर लोग अपने काम में माहिर हो जाएँ और दूसरों के साथ वस्तुओं का आदान-प्रदान करें, तो इसका क्या नतीजा होता है?
answer: लोग हमेशा बेहतर होते हैं।
wrong_answers:
  - लोग हमेशा बदतर हालत में होते हैं।
  - व्यक्तियों की स्थिति में कोई बदलाव नहीं हुआ है।
  - नतीजा हर व्यक्ति पर अलग-अलग होता है।
explanation: |
  ऑस्ट्रियाई अर्थशास्त्रियों के मुताबिक, व्यक्तियों का नतीजा...
  अपने काम में माहिर होना और आदान-प्रदान करना
  कि वे हमेशा बेहतर स्थिति में हैं। ऐसा इसलिए है क्योंकि
  विशेषज्ञता और Exchange से लोग अपनी क्षमता को पूरी तरह से इस्तेमाल कर सकते हैं
  उनकी व्यक्तिगत उपयोगिता।
reviewed: true
question: 오스트리아 경제학자들이 말하는 저축과 생활수준의 관계는 무엇인가요?
answer: 저축을 많이 할수록 더 많은 자본을 축적할 수 있고, 이는 생산성 향상으로 이어져 더 많은 재화를 생산할 수 있게 됩니다. 따라서 더 높은 생활 수준을 달성할 수 있습니다.
wrong_answers:
  - 저축을 많이 할수록 생활 수준은 낮아집니다.
  - 저축과 생활 수준 사이에는 아무런 관계가 없습니다.
  - 저축을 적게 할수록 생활 수준은 높아집니다.
explanation: |
  오스트리아 경제학자들은 시간 선호도가 낮아지는 것을 다음과 같이 생각합니다
  저축 → 더 많은 자본재 → 더 많은 생산성 → 더 많은 재화로 이어지는 선순환의 출발점이라고 생각합니다
  생산성 증가 → 더 많은 재화 → 더 높은 생활 수준 → 시간 선호도 감소로 이어지는 선순환의 출발점이라고 생각합니다.
  따라서 우리가 더 많이 저축할수록 더 많은 자본을 축적할 수 있습니다,
  이는 다시 생산성 향상으로 이어져 더 많은 재화를 생산할 수 있게 됩니다.
  이는 더 높은 생활수준으로 이어집니다.
reviewed: true
question: Wat is de relatie tussen spaargeld en levensstandaard volgens Oostenrijkse economen?
answer: Hoe meer we sparen, hoe meer kapitaal we kunnen accumuleren, wat zich weer vertaalt in productiviteitswinst die meer goederen oplevert. Zo bereiken we een hogere levensstandaard.
wrong_answers:
  - Hoe meer we sparen, hoe lager onze levensstandaard wordt.
  - Er is geen verband tussen besparingen en levensstandaard.
  - Hoe minder we sparen, hoe hoger onze levensstandaard wordt.
explanation: |
  Oostenrijkse economen zijn van mening dat de verlaging van tijdsvoorkeuren
  het startpunt is voor een opwaartse spiraal van besparingen → meer kapitaalgoederen
  → meer productiviteit → meer goederen = hogere levensstandaard → lagere tijdsvoorkeur.
  Dus hoe meer we sparen, hoe meer kapitaal we kunnen accumuleren,
  wat zich weer vertaalt in productiviteitswinst die meer goederen oplevert.
  Dit leidt tot een hogere levensstandaard.
reviewed: true
question: Ni isano irihe riri hagati y’ukuzigama n’ubuzima nk’uko abahinga mu vy’ubutunzi bo muri Otirishiya babivuga?
answer: Uko tuzigama cane niko tuzoshobora kwirundanira umutungo mwinshi, ivyo na vyo bikazotuma turonka inyungu z’umwimbu zituma turonka ibintu vyinshi. Gutyo, umuntu ashika ku rugero rwo hejuru rw’ubuzima.
wrong_answers:
  - Uko turushiriza kuzigama, ni ko ubuzima bwacu bugenda buragabanuka.
  - Nta sano riri hagati y’amahera umuntu azigama n’ingene umuntu abaho.
  - Uko tuzigama bike, ni ko n’ubuzima bwacu bugenda buratera imbere.
explanation: |
  Abahinga mu vy’ubutunzi bo muri Otirishiya babona ko ugugabanya umwanya umuntu akunda ari . 
  intango y'ingendo nziza yo kuzigama → ivyiza vyinshi 
  → gutanga umusaruro mwinshi → ibintu vyinshi = ubuzima bwo hejuru → gukunda umwanya muto. 
  Gutyo, uko tuzozigama cane, ni ko tuzoshobora kwirundanira umutungo mwinshi, . 
  ivyo navyo bizohinduka inyungu z’umwimbu zitanga ibicuruzwa vyinshi. 
  Ivyo bituma umuntu agira ubuzima bwo hejuru.
reviewed: true
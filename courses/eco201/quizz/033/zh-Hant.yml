question: 根據奧地利經濟學家的看法，儲蓄和生活水準之間的關係是什麼？
answer: 我們儲蓄越多，就能累積越多的資本，進而轉化為生產力的提升，產生更多的商品。從而達到更高的生活水準。
wrong_answers:
  - 我們儲蓄越多，生活水準就越低。
  - 儲蓄與生活水準之間沒有關係。
  - 儲蓄越少，我們的生活水準就越高。
explanation: |
  奧地利經濟學家認為降低時間偏好是
  儲蓄→更多資本貨品的良性循環的起點
  → 更高的生產力 → 更多的商品 = 更高的生活水準 → 更低的時間偏好。
  因此，我們儲蓄越多，就能累積越多的資本、
  這反过来又會轉化為生產力的提升，產生更多的商品。
  這會帶來更高的生活水準。
reviewed: true
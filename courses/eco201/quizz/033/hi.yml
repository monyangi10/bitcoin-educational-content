question: ऑस्ट्रियन इकोनॉमिस्ट्स के मुताबिक, बचत और जीवन स्तर के बीच क्या रिश्ता है?
answer: जितना बचाएंगे, उतनी ही पूंजी जमा कर पाएंगे, जिससे उत्पादकता बढ़ेगी और ज्यादा सामान मिलेंगे। इस तरह, जीवन स्तर ऊंचा होगा।
wrong_answers:
  - जितना हम बचाते हैं, उतना ही हमारा जीवन स्तर गिरता जाता है।
  - बचत और जीवन स्तर के बीच कोई संबंध नहीं है।
  - जितना कम बचत करेंगे, उतना ही ज़्यादा हमारा जीवन स्तर बढ़ेगा।
explanation: |
  ऑस्ट्रियन अर्थशास्त्रियों का मानना है कि समय प्राथमिकताओं को कम करने से
  बचत का एक सद्गुण चक्र शुरू करने का आधार → अधिक पूंजीगत वस्तुएं
  → ज्यादा उत्पादकता → ज्यादा सामान = जीवन स्तर ऊँचा होना → समय की प्राथमिकता कम होना।
  इसलिए, जितना हम बचाएंगे, उतनी ही हम पूंजी जमा कर पाएंगे,
  जिससे उत्पादकता बढ़ेगी और ज़्यादा सामान मिलेंगे।
  इससे जीवन स्तर ऊँचा होता है।
reviewed: true
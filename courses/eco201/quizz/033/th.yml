question: ความสัมพันธ์ระหว่างการออมและมาตรฐานการครองชีพตามนักเศรษฐศาสตร์ออสเตรียคืออะไร?
answer: ยิ่งเราประหยัดมากเท่าไหร่ เราก็จะสามารถสะสมทุนได้มากขึ้นเท่านั้น ซึ่งจะส่งผลให้เกิดการเพิ่มผลผลิตที่ให้สินค้ามากขึ้น ดังนั้น จึงบรรลุมาตรฐานการครองชีพที่สูงขึ้น
wrong_answers:
  - ยิ่งเราประหยัดมากเท่าไหร่ มาตรฐานการครองชีพของเราก็ยิ่งต่ำลงเท่านั้น
  - ไม่มีความสัมพันธ์ระหว่างการออมและมาตรฐานการครองชีพ
  - ยิ่งเราประหยัดน้อยลง มาตรฐานการครองชีพของเราก็ยิ่งสูงขึ้น
explanation: |
  นักเศรษฐศาสตร์ออสเตรียพิจารณาว่าการลดความพึงพอใจในเวลาเป็นจุดเริ่มต้นของวงจรคุณธรรมของการออม → สินค้าทุนมากขึ้น → ผลิตภาพมากขึ้น → สินค้ามากขึ้น = มาตรฐานการครองชีพที่สูงขึ้น → ความพึงพอใจในเวลาที่ต่ำลง ดังนั้น ยิ่งเราประหยัดมากเท่าไหร่ เราก็จะสามารถสะสมทุนได้มากขึ้น ซึ่งจะส่งผลให้เกิดการเพิ่มผลิตภาพที่ให้สินค้ามากขึ้น ซึ่งนำไปสู่มาตรฐานการครองชีพที่สูงขึ้น
reviewed: true
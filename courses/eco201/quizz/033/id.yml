question: Apa hubungan antara tabungan dan standar hidup menurut ekonom Austria?
answer: Semakin banyak kita menabung, semakin banyak modal yang dapat kita kumpulkan, yang pada gilirannya akan meningkatkan produktivitas sehingga menghasilkan lebih banyak barang. Dengan demikian, standar hidup yang lebih tinggi dapat dicapai.
wrong_answers:
  - Semakin banyak kita menabung, semakin rendah standar hidup kita.
  - Tidak ada hubungan antara tabungan dan standar hidup.
  - Semakin sedikit kita menabung, semakin tinggi standar hidup kita.
explanation: |
 Ekonom Austria menganggap bahwa penurunan preferensi waktu adalah
 titik awal dari siklus yang baik yaitu tabungan → lebih banyak barang modal
 → lebih banyak produktivitas → lebih banyak barang = standar hidup yang lebih tinggi → preferensi waktu yang lebih rendah.
 Dengan demikian, semakin banyak kita menabung, semakin banyak modal yang dapat kita kumpulkan,
 yang pada gilirannya akan menghasilkan peningkatan produktivitas yang menghasilkan lebih banyak barang.
 Hal ini mengarah pada standar hidup yang lebih tinggi.
reviewed: true

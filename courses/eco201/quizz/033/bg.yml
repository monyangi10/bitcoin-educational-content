question: Каква е връзката между спестяванията и стандарта на живот според австрийските икономисти?
answer: Колкото повече спестяваме, толкова повече капитал ще можем да натрупаме, което от своя страна ще доведе до повишаване на производителността и до производството на повече стоки. По този начин се постига по-висок стандарт на живот.
wrong_answers:
  - Колкото повече спестяваме, толкова по-нисък става стандартът ни на живот.
  - Няма връзка между спестяванията и стандарта на живот.
  - Колкото по-малко спестяваме, толкова по-висок става стандартът ни на живот.
explanation: |
  Австрийските икономисти смятат, че намаляването на времевите предпочитания е
  началото на благоприятен цикъл на спестяване → повече капиталови стоки
  → по-висока производителност → повече стоки = по-висок стандарт на живот → понижаване на времевите предпочитания.
  По този начин колкото повече спестяваме, толкова повече капитал ще можем да натрупаме,
  който от своя страна ще се превърне в повишаване на производителността, което ще доведе до повече стоки.
  Това води до по-висок стандарт на живот.
reviewed: true
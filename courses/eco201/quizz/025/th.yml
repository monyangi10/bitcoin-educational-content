question: ปัญหาความต้องการตรงกันสองฝ่ายมีสามมิติอะไรบ้าง?
answer: เชิงพื้นที่ เชิงเวลา และเชิงบุคคล
wrong_answers:
  - เชิงพื้นที่, เชิงเวลา, และเชิงบุคคลภายใน.
  - เชิงพื้นที่, เชิงระหว่างเวลา, และเชิงระหว่างบุคคล.
  - ระหว่างอวกาศ, เวลา, และระหว่างบุคคล.
explanation: |
  ปัญหาความบังเอิญสองเท่าของความต้องการหมายถึงความยากลำบากในการแลกเปลี่ยนที่ทั้งสองฝ่ายต้องมีสิ่งที่อีกฝ่ายต้องการในเวลาและสถานที่เดียวกัน ปัญหานี้มีสามมิติ; ด้านพื้นที่ (สถานที่เดียวกัน), ด้านเวลา (เวลาเดียวกัน), และด้านบุคคล (ความต้องการซึ่งกันและกันในสินค้าของกันและกัน)
reviewed: true
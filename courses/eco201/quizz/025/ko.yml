question: 이중 우연의 일치 문제의 세 가지 측면은 무엇인가요?
answer: 공간적, 시간적, 대인관계적.
wrong_answers:
  - 공간적, 시간적, 개인 내적.
  - 공간적, 시간적, 대인적.
  - 공간 간, 시간 간, 대인 간.
explanation: |
  욕구의 이중 우연의 일치 문제는
  물물교환에서 양쪽이 동시에 원하는 것을 소유해야 하는 경우
  상대방이 원하는 것을 같은 시간과 장소에서 소유해야 하는 물물교환의 어려움을 말합니다.
  이 문제는 공간적(같은 장소),
  시간적(같은 시간), 그리고 대인관계(서로의 상품에 대한
  서로의 상품에 대한 상호 욕망).
reviewed: true
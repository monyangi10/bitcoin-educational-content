question: डबल कोइन्सिडेंस ऑफ वांट्स प्रॉब्लम के तीन डायमेंशन क्या हैं?
answer: स्थानिक, समयगत, और पारस्परिक।
wrong_answers:
  - स्थानिक, कालिक, और आत्मवैयक्तिक।
  - स्थानिक, समयांतराल, और व्यक्तिगत।
  - अंतरिक्षिक, कालिक, और अंतर्वैयक्तिक।
explanation: |
  "डबल कोइन्सिडेंस ऑफ वांट्स प्रॉब्लम" का मतलब है कि
  बार्टर में दिक्कत तब होती है जब दोनों पक्षों के पास वह चीज़ होनी चाहिए जो दूसरे को चाहिए।
  वही चीज़ जो दूसरा भी उसी समय और जगह चाहता है।
  ये समस्या के तीन पहलू हैं; स्थानिक (एक ही जगह),
  समयगत (एक ही समय पर), और पारस्परिक (आपसी इच्छा)
  एक दूसरे का सामान)।
reviewed: true
question: Какви са трите измерения на проблема с двойното съвпадение на желанията?
answer: Пространствени, времеви и междуличностни.
wrong_answers:
  - Пространствени, времеви и вътрешноличностни.
  - Пространствени, междувремеви и междуличностни.
  - Междупространствени, времеви и междуличностни.
explanation: |
  Проблемът за двойното съвпадение на желанията се отнася до
  трудностите при размяната, когато и двете страни трябва да притежават
  нещо, което другата страна желае по едно и също време и на едно и също място.
  Този проблем има три измерения: пространствено (едно и също място),
  времево (едно и също време) и междуличностно (взаимно желание за
  стоките на другия).
reviewed: true

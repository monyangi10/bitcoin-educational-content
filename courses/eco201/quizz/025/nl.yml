question: Wat zijn de drie dimensies van het dubbele toevalsprobleem?
answer: Ruimtelijk, tijdelijk en interpersoonlijk.
wrong_answers:
  - Ruimtelijk, temporeel en intrapersoonlijk.
  - Ruimtelijk, intertemporeel en interpersoonlijk.
  - Interspatiaal, tijdelijk en interpersoonlijk.
explanation: |
  Het probleem van de dubbele gelijktijdigheid van behoeften verwijst naar de
  moeilijkheid bij ruilhandel waarbij beide partijen iets moeten bezitten
  moeten bezitten op hetzelfde moment en op dezelfde plaats.
  Dit probleem heeft drie dimensies: ruimtelijk (dezelfde plaats),
  temporeel (hetzelfde tijdstip) en interpersoonlijk (wederzijds verlangen naar
  elkaars goederen).
reviewed: true
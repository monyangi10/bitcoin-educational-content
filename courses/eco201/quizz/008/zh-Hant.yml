question: 什麼是康泰隆效應？
answer: 坎蒂侖效應指的是當新錢被創造出來時，一開始會讓最接近錢的來源的人得益，但卻會犧牲距離較遠的人的利益的經濟原理。
wrong_answers:
  - 康泰隆效應 (Cantillon Effect) 是指當新錢被創造出來時，經濟體系中的每個人都能平等受惠的經濟原則。
  - 康泰隆效應」是指當新錢被創造出來時，一開始會讓離錢的來源最遠的人得益，但卻會犧牲離錢較近的人的利益的經濟原理。
  - 康泰隆效應」是指當新貨幣被創造出來時，對經濟體系中的財富分配並無影響的經濟原理。
explanation: |
  康泰隆效應（Cantillon Effect），以 18 世紀經濟學家康泰隆命名。
  Richard Cantillon，描述了如何分佈新的
  經濟體系中的金錢會導致貧富懸殊。這些
  最接近新資金來源（如銀行家和金融機構）的人。
  資產所有者）最先受益，而
  那些距離較遠的人（例如普通工人和儲蓄者）會看到
  由於通貨膨脹，效益較少，甚至產生負面影響。
reviewed: true
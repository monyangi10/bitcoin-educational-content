question: None Ingaruka ya Cantillon n'iki?
answer: Ingaruka ya Cantillon yerekeza ku ngingo ngenderwako y’ubutunzi ivuga ko iyo amahera mashasha aremwe, mu ntango agira akamaro ku bari hafi cane y’aho ayo mahera akomoka, ntagirire akamaro abari kure cane y'aho.
wrong_answers:
  - Ingaruka ya Cantillon yerekeza ku ngingo ngenderwako y’ubutunzi ivuga ko iyo amahera mashasha aremwe, akagirira akamaro kimwe umuntu wese ari .mu gisata c'ubutunzi
  - Ingaruka ya Cantillon yerekeza ku ngingo ngenderwako y’ubutunzi ivuga ko iyo amahera mashasha aremwe, mu ntango agira akamaro ku bari kure cane y’aho ayo mahera akomoka, kurusha abari kure y'aho akomoka.
  - Ingaruka ya Cantillon yerekeza ku ngingo ngenderwako y’ubutunzi ivuga ko iyo amahera mashasha aremwe, ataco akora ku kugira ico atereye ubutunzi mu gisata c'ubutunzi nyene.
explanation: |
  Ingaruka ya Cantillon, yitiriwe umuhinga mu vy’ubutunzi wo mu kinjana ca 18
  Richard Cantillon, adondora ingene ugukwiragiza ibitabu bishasha .
  amahera mu gisata c'ubutunzi arashobora gutuma habaho ukutazimangana kw’ubutunzi. Abo
  hafi cane y’aho aho ayo mahera mashasha akomoka (nk’abakozi bo mu mabanki na bamwe mubafise ivyo bagaba)
  ni bo bungukirwa ubwa mbere , mu gihe,
  abo bari kure cane (nk’abakozi basanzwe n’abaziganya)
  inyungu nke canke mbere ingaruka mbi ziterwa nuguta agaciro kw'amafaranga.
reviewed: true

question: कैंटिलॉन इफेक्ट क्या है?
answer: कैंटिलॉन इफेक्ट (Cantillon Effect) एक आर्थिक सिद्धांत है जो बताता है कि जब नया पैसा बनता है, तो सबसे पहले उन लोगों को फायदा होता है जो पैसे के स्रोत के सबसे करीब होते हैं, जबकि दूर वाले लोगों को नुकसान उठाना पड़ता है।

question: Какво представлява ефектът на Кантийон?
answer: Ефектът на Кантийон се отнася до икономическия принцип, според който при създаването на нови пари първоначално се облагодетелстват тези, които са най-близо до източника на парите, за сметка на тези, които са по-далеч.
wrong_answers:
  - Ефектът на Кантийон се отнася до икономическия принцип, че когато се създават нови пари, от тях се възползват еднакво всички в икономиката.
  - Ефектът на Кантийон се отнася до икономическия принцип, според който при създаването на нови пари първоначално се облагодетелстват тези, които са най-отдалечени от източника на парите, за сметка на тези, които са по-близо.
  - Ефектът на Кантийон се отнася до икономическия принцип, че когато се създават нови пари, това не оказва влияние върху разпределението на богатството в икономиката.
explanation: |
  Ефектът на Кантийон, наречен на името на икономиста от 18-ти век
  Ришар Кантийон, описва как разпределението на нови пари
  в икономиката може да доведе до различия в богатството. Тези
  най-близо до източника на новите пари (като банкери и
  собствениците на активи) се възползват първи и най-значително, докато
  тези, които са по-далеч (като средните работници и спестителите), виждат
  по-малко ползи или дори отрицателни ефекти от инфлацията.
reviewed: true

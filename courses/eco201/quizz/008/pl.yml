question: Co to jest efekt Cantillona?
answer: Efekt Cantillona odnosi się do zasady ekonomicznej, zgodnie z którą nowe pieniądze początkowo przynoszą korzyści tym, którzy znajdują się najbliżej ich źródła, kosztem tych, którzy znajdują się dalej.
wrong_answers:
  - Efekt Cantillona odnosi się do zasady ekonomicznej, zgodnie z którą nowe pieniądze przynoszą równe korzyści wszystkim w gospodarce.
  - Efekt Cantillona odnosi się do zasady ekonomicznej, zgodnie z którą nowe pieniądze początkowo przynoszą korzyści tym, którzy znajdują się najdalej od źródła pieniądza, kosztem tych, którzy znajdują się bliżej.
  - Efekt Cantillona odnosi się do zasady ekonomicznej, zgodnie z którą tworzenie nowych pieniędzy nie ma wpływu na dystrybucję bogactwa w gospodarce.
explanation: |
  Efekt Cantillona, nazwany na cześć XVIII-wiecznego ekonomisty
  Richarda Cantillona, opisuje, w jaki sposób dystrybucja nowych
  pieniędzy w gospodarce może prowadzić do nierówności majątkowych. Ci, którzy są
  najbliżej źródła nowych pieniędzy (jak bankierzy i właściciele aktywów) odnoszą największe korzyści, podczas gdy
  bardziej oddaleni (przeciętni pracownicy i oszczędzający) widzą
  mniejsze korzyści lub nawet negatywne skutki inflacji.
reviewed: true

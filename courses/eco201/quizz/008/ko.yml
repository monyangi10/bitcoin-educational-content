question: 칸티용 효과란 무엇인가요?
answer: 칸티용 효과는 새로운 화폐가 만들어지면 처음에는 화폐의 출처와 가장 가까운 곳에 있는 사람들에게 혜택이 돌아가고 멀리 있는 사람들에게는 손해가 돌아간다는 경제 원리를 말합니다.
wrong_answers:
  - 칸티용 효과는 새로운 화폐가 만들어지면 경제 구성원 모두에게 공평하게 혜택이 돌아간다는 경제 원리를 말합니다.
  - 칸티용 효과는 새로운 화폐가 만들어지면 처음에는 화폐의 출처에서 가장 먼 곳에 있는 사람들에게 이익이 돌아가고 가까운 곳에 있는 사람들에게는 손해가 발생한다는 경제 원리를 말합니다.
  - 칸티용 효과는 새로운 화폐가 만들어져도 경제의 부의 분배에 영향을 미치지 않는다는 경제 원리를 말합니다.
explanation: |
  칸티용 효과는 18세기 경제학자
  리처드 칸티용의 이름을 딴 칸티용 효과는 경제에서 새로운 화폐의 유통이 어떻게
  새로운 화폐의 분배가 부의 격차로 이어질 수 있음을 설명합니다. 그
  새로운 화폐의 원천에 가장 가까운 사람들(예: 은행가 및
  자산 소유자)이 가장 먼저 그리고 가장 큰 혜택을 누리는 반면
  더 멀리 떨어져 있는 사람들(예: 일반 근로자 및 저축자)은
  혜택이 줄어들거나 심지어 인플레이션으로 인해 부정적인 영향을 받기도 합니다.
reviewed: true
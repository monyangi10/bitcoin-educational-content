question: Cantillon Effect คืออะไร?
answer: ผลกระทบแคนทิลลอน (Cantillon Effect) หมายถึงหลักการทางเศรษฐศาสตร์ที่ว่าเมื่อมีการสร้างเงินใหม่ขึ้นมา ผู้ที่อยู่ใกล้แหล่งที่มาของเงินนั้นจะได้รับประโยชน์ในขั้นต้น ในขณะที่ผู้ที่อยู่ห่างออกไปจะเสียเปรียบ
wrong_answers:
  - ผลคานทิลลอน (Cantillon Effect) หมายถึงหลักการทางเศรษฐศาสตร์ที่เมื่อมีการสร้างเงินใหม่ขึ้นมา มันจะเป็นประโยชน์ต่อทุกคนในระบบเศรษฐกิจอย่างเท่าเทียมกัน
  - ผลกระทบแคนทิลลอน (Cantillon Effect) หมายถึงหลักการทางเศรษฐศาสตร์ที่ว่าเมื่อมีการสร้างเงินใหม่ขึ้นมา ผู้ที่อยู่ไกลจากแหล่งที่มาของเงินจะได้รับประโยชน์ในขั้นต้น ในขณะที่ผู้ที่อยู่ใกล้จะเสียประโยชน์
  - ผลกระทบแคนติลลอน (Cantillon Effect) หมายถึงหลักการทางเศรษฐศาสตร์ที่เมื่อมีการสร้างเงินใหม่ขึ้นมา จะไม่มีผลกระทบต่อการกระจายความมั่งคั่งในเศรษฐกิจ
explanation: |
  ผลของแคนทิลลอน (Cantillon Effect) ซึ่งตั้งชื่อตามนักเศรษฐศาสตร์ในศตวรรษที่ 18 ริชาร์ด แคนทิลลอน อธิบายถึงวิธีการที่การกระจายเงินใหม่ในเศรษฐกิจสามารถนำไปสู่ความเหลื่อมล้ำทางความมั่งคั่ง ผู้ที่อยู่ใกล้แหล่งที่มาของเงินใหม่ (เช่น นายธนาคารและเจ้าของสินทรัพย์) จะได้รับประโยชน์ก่อนและมากที่สุด ในขณะที่ผู้ที่อยู่ไกลออกไป (เช่น คนงานทั่วไปและผู้ที่ออมเงิน) จะได้รับประโยชน์น้อยลงหรือแม้กระทั่งผลกระทบเชิงลบเนื่องจากเงินเฟ้อ
reviewed: true
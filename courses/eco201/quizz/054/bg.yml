question: Каква е основната разлика между австрийските икономисти и кейнсианските или монетаристките икономисти по отношение на методите им на анализ?
answer: Докато австрийците разсъждават въз основа на фундаментални аксиоми, кейнсианските или монетаристките икономисти са склонни да разчитат на емпирични данни.
wrong_answers:
  - Австрийските икономисти разчитат на емпирични данни, докато кейнсианските или монетаристките икономисти разсъждават въз основа на фундаментални аксиоми.
  - Австрийските икономисти и кейнсианските или монетаристките икономисти използват едни и същи методи на анализ.
  - Австрийските икономисти разчитат на държавните политики, докато кейнсианските или монетаристките икономисти разчитат на пазарните сили.
explanation: |
  Основната разлика между австрийските икономисти и кейнсианските или монетаристките
  икономисти по отношение на методите им на анализ е, че докато австрийците разсъждават
  от фундаментални аксиоми, от които могат да се правят логически изводи, кейнсианските или
  монетаристките икономисти са склонни да разчитат на емпирични данни, за да установят общи икономически закони.
reviewed: true
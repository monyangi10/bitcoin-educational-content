question: 奧地利經濟學家與凱恩斯或貨幣主義經濟學家在分析方法上的主要差異是什麼？
answer: 奧地利從基本公理推理，而凱恩斯或貨幣主義經濟學家則傾向於依賴經驗數據。
wrong_answers:
  - 奧地利經濟學家依賴經驗數據，而凱恩斯或貨幣主義經濟學家則從基本公理推理。
  - 奧地利經濟學家與凱恩斯或貨幣主義經濟學家使用相同的分析方法。
  - 奧地利經濟學家依賴政府政策，而凱恩斯或貨幣主義經濟學家則依賴市場力量。
explanation: |
  奧地利經濟學家與凱恩斯或貨幣主義經濟學家的主要差異
  經濟學家的分析方法是，奧地利人推論
  邏輯推論的基本公理，凱恩斯或
  貨幣主義經濟學家傾向於依賴經驗數據來建立一般經濟規律。
reviewed: true
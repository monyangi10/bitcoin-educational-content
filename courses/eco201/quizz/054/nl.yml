question: Wat is het belangrijkste verschil tussen Oostenrijkse economen en Keynesiaanse of monetaristische economen wat betreft hun analysemethoden?
answer: Terwijl Oostenrijkers redeneren vanuit fundamentele axioma's, vertrouwen Keynesiaanse of monetaristische economen eerder op empirische gegevens.
wrong_answers:
  - Austrian economists rely on empirical data, while Keynesian or monetarist economists reason from fundamental axioms.
  - Oostenrijkse economen en Keynesiaanse of monetaristische economen gebruiken dezelfde analysemethoden.
  - Oostenrijkse economen vertrouwen op overheidsbeleid, terwijl Keynesiaanse of monetaristische economen vertrouwen op marktwerking.
explanation: |
  Het belangrijkste verschil tussen Oostenrijkse economen en Keynesiaanse of monetaristische
  economen in termen van hun analysemethoden is dat Oostenrijkers redeneren
  redeneren vanuit fundamentele axioma's waaruit logische gevolgtrekkingen kunnen worden gemaakt, terwijl Keynesiaanse of
  monetaristische economen eerder vertrouwen op empirische gegevens om algemene economische wetten vast te stellen.
reviewed: true
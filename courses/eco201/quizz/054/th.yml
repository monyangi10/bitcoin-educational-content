question: ความแตกต่างหลักระหว่างนักเศรษฐศาสตร์ออสเตรียและนักเศรษฐศาสตร์เคนส์หรือมอนิทาริสต์ในแง่วิธีการวิเคราะห์ของพวกเขาคืออะไร?
answer: ในขณะที่ชาวออสเตรียใช้เหตุผลจากสัจพจน์พื้นฐาน นักเศรษฐศาสตร์เคนส์หรือมอนิทาริสต์มักจะพึ่งพาข้อมูลเชิงประจักษ์
wrong_answers:
  - นักเศรษฐศาสตร์ชาวออสเตรียพึ่งพาข้อมูลเชิงประจักษ์ ในขณะที่นักเศรษฐศาสตร์เคนส์หรือโมเนทาริสต์ใช้เหตุผลจากสัจพจน์พื้นฐาน
  - นักเศรษฐศาสตร์ออสเตรียและนักเศรษฐศาสตร์เคนส์หรือมอนิทาริสต์ใช้วิธีการวิเคราะห์เดียวกัน
  - นักเศรษฐศาสตร์ออสเตรียพึ่งพานโยบายของรัฐบาล ในขณะที่นักเศรษฐศาสตร์เคนส์หรือมอนิทาริสต์พึ่งพาแรงของตลาด
explanation: |
  ความแตกต่างหลักระหว่างนักเศรษฐศาสตร์ออสเตรียกับนักเศรษฐศาสตร์เคนส์หรือมอนิทาริสต์ในแง่ของวิธีการวิเคราะห์คือ ในขณะที่นักเศรษฐศาสตร์ออสเตรียใช้เหตุผลจากหลักการพื้นฐานที่สามารถทำการอนุมานเชิงตรรกะได้ นักเศรษฐศาสตร์เคนส์หรือมอนิทาริสต์มักจะพึ่งพาข้อมูลเชิงประจักษ์เพื่อสร้างกฎหมายเศรษฐกิจทั่วไป
reviewed: true
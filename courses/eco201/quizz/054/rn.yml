question: Ni itandukaniro irihe rikomeye riri hagati y’abahinga mu vy’ubutunzi bo muri Otirishiya n’abahinga mu vy’ubutunzi bo muri Keynes canke abakunda amahera mu bijanye n’uburyo bakoresha mu gusesangura?
answer: Naho Abanyaotirishiya bafata ingingo zishingiye ku vyiyumviro vy’ishimikiro, abahinga mu vy’ubutunzi ba Keynes canke abakunda amahera bakunda kwizigira amakuru y’ivyashikiye abantu.
wrong_answers:
  - Abahinga mu vy’ubutunzi bo muri Otirishiya bizigira amakuru y’ibintu vy’ukuri, mu gihe abahinga mu vy’ubutunzi bo muri Keynes canke abakunda amahera bafata ingingo zishingiye ku vyiyumviro vy’ishimikiro.
  - Abahinga mu vy’ubutunzi bo muri Otirishiya n’abahinga mu vy’ubutunzi bo muri Keynes canke abakunda amahera bakoresha uburyo bumwe bwo gusesangura.
  - Abahinga mu vy’ubutunzi bo muri Otirishiya bizigira politike za Leta, mu gihe abahinga mu vy’ubutunzi bo muri Keynes canke abakunda amahera bizigira inguvu z’isoko.
explanation: |
  Itandukaniro rikomeye hagati y'abahinga mu vy'ubutunzi bo muri Otirishiya n'abahinga mu vy'ubutunzi bo muri Keynes canke abahinga mu vy'amahera .
  abahinga mu vy’ubutunzi mu bijanye n’uburyo bakoresha mu gusesangura ni uko naho Abanyaotirishiya biyumvira .
  kuva ku vyiyumviro vy’ishimikiro umuntu ashobora gukuramwo ibintu bihuye n’ubwenge, Keynes canke . 
  abahinga mu vy’ubutunzi bakunda amahera bakunda kwizigira amakuru y’ivyashikiye abantu kugira ngo bashireho amategeko rusangi y’ubutunzi.
reviewed: true
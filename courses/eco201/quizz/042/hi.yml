question: ऑस्ट्रियन विश्लेषण और मोनेटारिस्ट तथा कीन्सियन विश्लेषण में मुख्य अंतर क्या है?
answer: ऑस्ट्रियन विश्लेषण उत्पादन के विभिन्न चरणों और सापेक्ष कीमतों की संरचना पर खास ध्यान देता है, जबकि मुद्रावादी और कीन्सियन लोग रोज़गार के स्तर, जीडीपी, या उपभोक्ता मूल्य सूचकांक जैसे समग्र चरों पर ही रुक जाते हैं।
wrong_answers:
  - ऑस्ट्रियन विश्लेषण सिर्फ समग्र चरों पर रुक जाता है, जैसे रोज़गार के स्तर, जीडीपी, या उपभोक्ता मूल्य सूचकांक, जबकि मुद्रावादी और कीन्सवादी उत्पादन के विभिन्न चरणों और सापेक्ष कीमतों की संरचना पर ख़ास ध्यान देते हैं।
  - ऑस्ट्रियन विश्लेषण और मुद्रावादियों तथा कीन्सवादियों का विश्लेषण मूल रूप से एक ही है।
  - ऑस्ट्रियन विश्लेषण बाहरी घटनाओं और जानवरों की प्रवृत्तियों (animal spirits) पर ध्यान केंद्रित करता है, जबकि मुद्रावादी और कीन्सियन लोग फ्रैक्शनल रिज़र्व बैंकिंग सिस्टम की अंदरूनी गतिशीलता (endogenous dynamics) पर ज़ोर देते हैं।
explanation: |
  ऑस्ट्रियन विश्लेषण और मुद्रावादियों के विश्लेषण में मुख्य अंतर यह है
  और कीन्सियन के बीच यह अंतर है कि पहला विभिन्न चरणों पर खास ध्यान देता है
  उत्पादन की और सापेक्ष कीमतों की संरचना, जबकि बाद वाला बस
  ऐसे समग्र चर जैसे कि रोज़गार के स्तर, जीडीपी, या उपभोक्ता मूल्य सूचकांक।
reviewed: true
question: Wat is het belangrijkste verschil tussen de Oostenrijkse analyse en die van monetaristen en keynesianen?
answer: De Oostenrijkse analyse besteedt bijzondere aandacht aan de verschillende productiefasen en de structuur van relatieve prijzen, terwijl monetaristen en keynesianen zich beperken tot geaggregeerde variabelen zoals werkgelegenheidsniveaus, BBP of de consumentenprijsindex.
wrong_answers:
  - De Oostenrijkse analyse stopt bij geaggregeerde variabelen zoals werkgelegenheidsniveaus, BBP of de consumentenprijsindex, terwijl monetaristen en keynesianen bijzondere aandacht besteden aan de verschillende productiefasen en de structuur van relatieve prijzen.
  - De Oostenrijkse analyse en die van monetaristen en keynesianen zijn in essentie hetzelfde.
  - De Oostenrijkse analyse richt zich op externe gebeurtenissen en animal spirits, terwijl monetaristen en keynesianen zich richten op de endogene dynamiek van het fractional reserve banking systeem.
explanation: |

  - 奧地利的分析與貨幣主義者及凱恩斯主義者的分析在本質上是相同的。
  - 奧地利的分析著重於外部事件和動物精神，而貨幣主義者和凱恩斯主義者則著重於部分儲備金銀行體系的內生動力。

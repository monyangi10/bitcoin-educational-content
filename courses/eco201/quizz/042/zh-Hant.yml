question: 奧地利的分析與貨幣主義者和凱恩斯主義者的分析之間的主要差異是什麼？
answer: 奧地利的分析特別注意生產的各個階段和相對價格的結構，而貨幣主義者和凱恩斯主義者則止步於總體變數，例如就業水平、國內生產總值或消費者物價指數。
wrong_answers:

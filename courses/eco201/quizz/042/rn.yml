question: Ni irihe tandukaniro nyamukuru riri hagati y’isesangura ry’abanya Otirishi n’umugwi w'abakunda amahera n’aba Keynes?
answer: Isesangura rya otirishi ryitaho cane cane intambwe zitandukanye z’umwimbu n’imiterere y’ibiciro bihuye, mu gihe abahinga n'abakunzi mu vy’amahera n’aba Keynes bahagarara ku bintu bihinduka bihurikiye hamwe n'urugero z’akazi, umusaruro w’igihugu, canke urutonde rw’ibiciro vy’abaguzi.
wrong_answers:
  - Isesangura ry’abanya Otirishi rihagarara ku bintu bihinduka vyose hamwe nk’ingero z’akazi, umusaruro w’igihugu, canke urutonde rw’ibiciro vy’abaguzi, mu gihe abahinga mu vy’amahera n’abanya Keynes bitaho canecane inzira zitandukanye z’uguhingura uko ibiciro biteye kandi bihuye.
  - Isesangura ry’abanya Otirishi n'abakunda amahera n’abanya Keynes, mu vy’ukuri ni kimwe.
  - Isesangura ry’Abanya otirishi ryibanda ku bintu biva hanze hamwe n'impwemu z'ibikoko, mu gihe abahinga mu vy’amahera n’abanya Keynes bibanda ku nzira y’imbere mu gihugu y’ubuhinga bwa banki y’ububiko bw’imice.
explanation: |
  Itandukaniro rikomeye hagati y’isesangura ry’abanya Otirishi n’iry’abanyagihugu bakunda amahera .
  na Keynesians(aba keynes) ni uko uwa mbere yitwararika canecane intambwe zitandukanye .
  y’umwimbu n’uko ibiciro biteye kandi bihuye, mu gihe ica nyuma gihagarara ku .
  ibintu bihinduka bihurikiye hamwe nk’ingero z’akazi, umusaruro w’igihugu, canke urutonde rw’ibiciro vy’abaguzi.
reviewed: true

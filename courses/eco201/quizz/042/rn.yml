question: Ni itandukaniro irihe rikomeye riri hagati y’isesengura ry’abanya Otirishiya n’iry’abanyagihugu bakunda amahera n’abanya Keynes?
answer: Isesengura ry’Ubudagi ryitaho cane cane intambwe zitandukanye z’umwimbu n’imiterere y’ibiciro bihuye, mu gihe abahinga mu vy’amahera n’aba Keynes bahagarara ku bintu bihinduka bihurikiye hamwe nk’ingero z’akazi, umusaruro w’igihugu, canke urutonde rw’ibiciro vy’abaguzi.
wrong_answers:
  - Isesengura ry’abanya Otirishiya rihagarara ku bintu bihinduka vyose hamwe nk’ingero z’akazi, umusaruro w’igihugu, canke urutonde rw’ibiciro vy’abaguzi, mu gihe abahinga mu vy’amahera n’abanya Keynes bitaho canecane inzira zitandukanye z’uguhingura n’imiterere y’ibiciro bihuye.
  - Isesengura ry’abanya Otirishiya n’iry’abanyagihugu b’abanyagihugu n’abanya Keynes, mu vy’ukuri ni kimwe.
  - Isesengura ry’Abanyaotirishiya ryibanda ku bintu biva hanze n’impwemu z’ibikoko, mu gihe abahinga mu vy’amahera n’abanya Keynesian bibanda ku nzira y’imbere mu gihugu y’ubuhinga bwa banki y’ububiko bw’imice.
explanation: |
  Itandukaniro rikomeye hagati y’isesengura ry’abanya Otirishiya n’iry’abanyagihugu bakunda amahera .
  na Keynesians ni uko uwa mbere yitwararika canecane intambwe zitandukanye .
  y’umwimbu n’imiterere y’ibiciro bihuye, mu gihe ica nyuma gihagarara ku .
  ibintu bihinduka bihurikiye hamwe nk’ingero z’akazi, umusaruro w’igihugu, canke urutonde rw’ibiciro vy’abaguzi.
reviewed: true
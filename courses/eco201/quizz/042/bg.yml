question: Каква е основната разлика между австрийския анализ и анализа на монетаристите и кейнсианците?
answer: Австрийският анализ обръща особено внимание на различните етапи на производството и структурата на относителните цени, докато монетаристите и кейнсианците се спират на обобщени променливи като равнището на заетост, БВП или индекса на потребителските цени.
wrong_answers:
  - Австрийският анализ се спира на обобщени променливи като равнището на заетост, БВП или индекса на потребителските цени, докато монетаристите и кейнсианците обръщат специално внимание на различните етапи на производството и структурата на относителните цени.
  - Австрийският анализ и анализът на монетаристите и кейнсианците по същество са едни и същи.
  - Австрийският анализ се фокусира върху външните събития и "животинските духове", докато монетаристите и кейнсианците се съсредоточават върху ендогенната динамика на банковата система с частични резерви.

question: Jaka jest główna różnica między analizą austriacką a analizą monetarystów i keynesistów?
answer: Analiza austriacka zwraca szczególną uwagę na różne etapy produkcji i strukturę cen względnych, podczas gdy monetaryści i keynesiści zatrzymują się na zagregowanych zmiennych, takich jak poziom zatrudnienia, PKB lub wskaźnik cen konsumpcyjnych.
wrong_answers:
  - Analiza austriacka zatrzymuje się na zagregowanych zmiennych, takich jak poziom zatrudnienia, PKB lub indeks cen konsumpcyjnych, podczas gdy monetaryści i keynesiści zwracają szczególną uwagę na różne etapy produkcji i strukturę cen względnych.
  - Analiza austriacka oraz analiza monetarystów i keynesistów są zasadniczo takie same.
  - Analiza austriacka koncentruje się na wydarzeniach zewnętrznych i duchach zwierząt, podczas gdy monetaryści i keynesiści skupiają się na endogenicznej dynamice systemu bankowego opartego na rezerwach cząstkowych.
explanation: |
  Główną różnicą między analizą austriacką a analizą monetarystów
  i keynesistów jest to, że ci pierwsi zwracają szczególną uwagę na różne etapy
  produkcji i strukturę cen względnych, podczas gdy ci drudzy zatrzymują się na analizie zagregowanych zmiennych, takich jak poziom zatrudnienia, PKB lub wskaźnik cen konsumpcyjnych.

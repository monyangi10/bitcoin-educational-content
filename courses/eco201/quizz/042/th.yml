question: ความแตกต่างหลักระหว่างการวิเคราะห์ของออสเตรียและของนักการเงินและเคนส์คืออะไร?
answer: การวิเคราะห์ของออสเตรียให้ความสนใจเป็นพิเศษกับขั้นตอนต่างๆ ของการผลิตและโครงสร้างของราคาสัมพัทธ์ ในขณะที่นักเศรษฐศาสตร์การเงินและเคนส์หยุดที่ตัวแปรรวมเช่น ระดับการจ้างงาน GDP หรือดัชนีราคาผู้บริโภค
wrong_answers:
  - การวิเคราะห์ของออสเตรียหยุดที่ตัวแปรรวม เช่น ระดับการจ้างงาน, GDP, หรือดัชนีราคาผู้บริโภค ในขณะที่นักเศรษฐศาสตร์การเงินและเคนส์เน้นเป็นพิเศษที่ขั้นตอนต่างๆ ของการผลิตและโครงสร้างของราคาสัมพัทธ์
  - การวิเคราะห์ของออสเตรียและของนักการเงินและเคนส์เซียนนั้นโดยพื้นฐานแล้วเหมือนกัน
  - การวิเคราะห์ของออสเตรียเน้นที่เหตุการณ์ภายนอกและจิตวิญญาณของสัตว์ ในขณะที่นักเศรษฐศาสตร์แนวโมเนทาริสต์และเคนส์เน้นที่พลวัตภายในของระบบธนาคารสำรองเศษส่วน
explanation: |
  ความแตกต่างหลักระหว่างการวิเคราะห์ของออสเตรียและของนักเศรษฐศาสตร์การเงินและเคนส์คือ อดีตให้ความสนใจเป็นพิเศษกับขั้นตอนต่างๆ ของการผลิตและโครงสร้างของราคาสัมพัทธ์ ในขณะที่หลังหยุดที่ตัวแปรรวมเช่น ระดับการจ้างงาน GDP หรือดัชนีราคาผู้บริโภค
reviewed: true
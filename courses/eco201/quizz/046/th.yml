question: ทฤษฎีวัฏจักรธุรกิจของออสเตรียเกี่ยวข้องกับความเป็นไปไม่ได้ของการคำนวณทางเศรษฐกิจภายใต้สังคมนิยมอย่างไร?
answer: สามารถมองได้ว่าเป็นกรณีเฉพาะของความเป็นไปไม่ได้ในการคำนวณทางเศรษฐกิจภายใต้ระบบสังคมนิยม ซึ่งนำมาใช้กับตลาดเงิน
wrong_answers:
  - มันเป็นการวิจารณ์เกี่ยวกับความเป็นไปไม่ได้ของการคำนวณทางเศรษฐกิจภายใต้ระบบสังคมนิยม
  - มันเป็นวิธีแก้ปัญหาความเป็นไปไม่ได้ของการคำนวณทางเศรษฐกิจภายใต้สังคมนิยม
  - มันไม่เกี่ยวข้องกับความเป็นไปไม่ได้ของการคำนวณทางเศรษฐกิจภายใต้สังคมนิยม
explanation: |
  ทฤษฎีวัฏจักรธุรกิจของออสเตรียอธิบายถึงพลวัตของการลงทุนเกินและการจัดสรรทุนที่ผิดพลาดซึ่งเกิดจากการปรับอัตราดอกเบี้ยโดยธนาคารกลาง ดังนั้นจึงสามารถมองว่าเป็นกรณีเฉพาะของความเป็นไปไม่ได้ในการคำนวณทางเศรษฐกิจภายใต้สังคมนิยม ซึ่งนำมาใช้ในขอบเขตของตลาดเงิน
reviewed: true
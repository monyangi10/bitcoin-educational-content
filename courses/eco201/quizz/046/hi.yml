question: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी और सोशलिज़्म के तहत इकोनॉमिक कैलकुलेशन की असंभवता कैसे जुड़ी है?
answer: इसे समाजवाद के तहत आर्थिक गणना की असंभवता के एक विशेष मामले के रूप में देखा जा सकता है, जो मुद्रा बाजारों के क्षेत्र पर लागू होता है।
wrong_answers:
  - यह समाजवाद के तहत आर्थिक गणना की असंभवता की आलोचना है।
  - यह समाजवाद के तहत आर्थिक गणना की असंभवता का एक समाधान है।
  - यह समाजवाद के तहत आर्थिक गणना की असंभवता से असंबंधित है।
explanation: |
  ऑस्ट्रियन बिज़नेस साइकिल थ्योरी बताती है कि कैसे
  ब्याज दरों में हेरफेर के कारण होने वाला अत्यधिक निवेश और पूंजी का गलत आवंटन
  सेंट्रल बैंकों द्वारा और इसलिए इसे असंभवता के एक विशेष मामले के रूप में देखा जा सकता है
  समाजवाद के तहत आर्थिक गणना, जो मुद्रा बाजारों के क्षेत्र पर लागू होती है।
reviewed: true
question: Как австрийската теория за бизнес цикъла се отнася към невъзможността за икономическо изчисление при социализма?
answer: Тя може да се разглежда като специфичен случай на невъзможността за икономическо изчисление при социализма, приложен към сферата на паричните пазари.
wrong_answers:
  - Това е критика на невъзможността за икономическо изчисление при социализма.
  - Това е решение на проблема с невъзможността за икономическо изчисление при социализма.
  - Това не е свързано с невъзможността за икономическо изчисление при социализма.
explanation: |
  Австрийската теория на бизнес цикъла обяснява динамиката на
  свръхинвестиране и неправилно разпределение на капитала в резултат на манипулиране на лихвените проценти
  от страна на централните банки и поради това може да се разглежда като специфичен случай на невъзможността за
  икономическото изчисление при социализма, приложена в сферата на паричните пазари.
reviewed: true
question: Kako se Austrijska teorija poslovnog ciklusa odnosi na nemogućnost ekonomske kalkulacije pod socijalizmom?
answer: To se može posmatrati kao specifičan slučaj nemogućnosti ekonomske kalkulacije pod socijalizmom, primenjen na oblast tržišta novca.
wrong_answers:
  - To je kritika nemogućnosti ekonomske kalkulacije pod socijalizmom.
  - To je rešenje za nemogućnost ekonomske kalkulacije pod socijalizmom.
  - To je nepovezano sa nemogućnošću ekonomske kalkulacije pod socijalizmom.
explanation: |
  Austrijska teorija poslovnog ciklusa objašnjava dinamiku prekomernog investiranja i pogrešne alokacije kapitala koja proizlazi iz manipulacije kamatnim stopama od strane centralnih banaka i stoga se može posmatrati kao specifičan slučaj nemogućnosti ekonomske kalkulacije pod socijalizmom, primenjen na oblast novčanih tržišta.
reviewed: true
question: Ni gute inyigish y’i Otirishi y’ingendo y’ubudandaji ifitaniye isano n’ukudashoboka kw’uguharura ubutunzi mu gihe c’ubusosiyalisimu?
answer: Bishobora gufatwa nk’ikibazo kidasanzwe c'uguharura ubutunzi kudashoboka mu gihe c’ubusosiyalisimu, rikoreshwa mu bijanye n’amasoko y’amahera.
wrong_answers:
  - Ni ukunegura ukuntu uguhamagara ubutunzi kudashoboka mu gihe c’ubusosiyalisimu.
  - Ni umuti w’guharura ubutunzi kudashoboka mu gihe c’ubusosiyalisimu.
  - Ntaco bihuriyeko n’ukudashoboka kw’ibara ry’ubutunzi mu gihe c’ubusosiyalisimu.
explanation: |
  Inyigisho y’aba otirishi yerekeye uko ubutunzi buhindagurika, isobanura ukuntu ukuzana imitahe kudasanzwe n’ikoreshwa nabi ry’imitahe rituruka ku gukinishwa kw’igipimo c’inyungu n’amabanki makuru, ishobora gufatwa nk’urugero rw’ukudashobora gutora ibiharuro vy'ubutinzi mu gihe socialisimu, iyo nyigisho ikaba ishirwa mu bijanye n’isoko ry’amafaranga.
reviewed: true

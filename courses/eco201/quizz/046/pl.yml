question: W jaki sposób austriacka teoria cyklu koniunkturalnego odnosi się do niemożliwości kalkulacji ekonomicznej w socjalizmie?
answer: Można to postrzegać jako szczególny przypadek niemożności kalkulacji ekonomicznej w socjalizmie, zastosowany do sfery rynków pieniężnych.
wrong_answers:
  - Jest to krytyka niemożliwości kalkulacji ekonomicznej w socjalizmie.
  - Jest to rozwiązanie problemu niemożliwości kalkulacji ekonomicznej w socjalizmie.
  - Nie ma to związku z niemożliwością kalkulacji ekonomicznej w socjalizmie.
explanation: |
  Austriacka teoria cyklu koniunkturalnego wyjaśnia dynamikę
  dynamika przeinwestowania i błędnej alokacji kapitału wynikająca z manipulacji stopami procentowymi przez banki centralne
  stóp procentowych przez banki centralne i dlatego może być postrzegana jako szczególny przypadek niemożności
  kalkulacji ekonomicznej w socjalizmie, zastosowanej do sfery rynków pieniężnych.
reviewed: true
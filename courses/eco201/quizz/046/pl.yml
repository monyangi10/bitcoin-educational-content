question: W jaki sposób austriacka teoria cyklu koniunkturalnego odnosi się do niemożliwości kalkulacji ekonomicznej w socjalizmie?
answer: Można postrzegać to jako szczególny przypadek niemożności kalkulacji ekonomicznej w socjalizmie zastosowany do sfery rynków pieniężnych.
wrong_answers:
  - Ta teoria to krytyka niemożliwości kalkulacji ekonomicznej w socjalizmie.
  - Ta teoria to rozwiązanie problemu niemożliwości kalkulacji ekonomicznej w socjalizmie.
  - Ta teoria nie ma związku z niemożliwością kalkulacji ekonomicznej w socjalizmie.
explanation: |
  Austriacka teoria cyklu koniunkturalnego wyjaśnia dynamikę przeinwestowania i błędnej alokacji kapitału wynikającą z manipulacji stopami procentowymi przez banki centralne i dlatego może być postrzegana jako szczególny przypadek niemożności
  kalkulacji ekonomicznej w socjalizmie zastosowany do sfery rynków pieniężnych.
reviewed: true

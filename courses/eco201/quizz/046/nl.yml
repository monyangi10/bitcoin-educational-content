question: Hoe verhoudt de Oostenrijkse theorie van de conjunctuurcyclus zich tot de onmogelijkheid van economische berekening onder het socialisme?
answer: Het kan worden gezien als een specifiek geval van de onmogelijkheid van economische berekening onder het socialisme, toegepast op het rijk van de geldmarkten.
wrong_answers:
  - Het is een kritiek op de onmogelijkheid van economische berekening onder het socialisme.
  - Het is een oplossing voor de onmogelijkheid van economische berekening onder het socialisme.
  - Het heeft niets te maken met de onmogelijkheid van economische berekening onder het socialisme.
explanation: |
  De Oostenrijkse theorie van de conjunctuurcyclus verklaart de dynamiek van
  overinvestering en verkeerde allocatie van kapitaal als gevolg van rentemanipulatie
  door centrale banken en kan daarom gezien worden als een specifiek geval van de onmogelijkheid van
  economische berekening onder socialisme, toegepast op de geldmarkten.
reviewed: true
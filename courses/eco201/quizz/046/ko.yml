question: 오스트리아 경기순환 이론은 사회주의 하에서 경제 계산이 불가능하다는 것과 어떤 관련이 있나요?
answer: 이는 사회주의 하에서 경제적 계산이 불가능하다는 것을 화폐 시장의 영역에 적용한 구체적인 사례로 볼 수 있습니다.
wrong_answers:
  - 사회주의 하에서 경제적 계산의 불가능성에 대한 비판입니다.
  - 사회주의 하에서 경제적 계산이 불가능한 것에 대한 해결책입니다.
  - 이는 사회주의 하에서 경제적 계산이 불가능한 것과 무관하지 않습니다.
explanation: |
  오스트리아 경기순환 이론은 다음과 같은 역학 관계를 설명합니다
  금리 조작으로 인한 과잉 투자와 자본의 잘못된 배분
  중앙은행에 의한 금리 조작으로 인한 과잉투자와 자본 오배분의 역학을 설명합니다
  사회주의 하에서의 경제 계산이 화폐 시장의 영역에 적용되는 구체적인 사례로 볼 수 있습니다.
reviewed: true
question: केन्सियन सिद्धांत के मुताबिक, सेंट्रल बैंकों की मुख्य ज़िम्मेदारी क्या है?
answer: पैसे का उत्पादन और प्रबंधन
wrong_answers:
  - मुद्रा शक्ति का विकेंद्रीकरण
  - विकास और मानवीय तर्कसंगतता का संयमित दृष्टिकोण बढ़ावा देना
  - इनमें से कोई नहीं
explanation: |
  अध्याय में उल्लेख है कि कीन्सवादी सिद्धांत के अनुसार,
  पैसे का उत्पादन और प्रबंधन ही
  केंद्रीय बैंकों की ज़िम्मेदारी।
reviewed: true
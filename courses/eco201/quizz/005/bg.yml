question: Каква е основната отговорност на централните банки според кейнсианската доктрина?
answer: Производство и управление на пари
wrong_answers:
  - Децентрализация на паричната власт
  - Насърчаване на трезво виждане за растежа и човешката рационалност
  - Нито едно от горните
explanation: |
  В главата се споменава, че според кейнсианската доктрина,
  производството и управлението на парите са
  на централните банки.
reviewed: true
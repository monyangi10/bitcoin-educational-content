question: ความรับผิดชอบหลักของธนาคารกลางตามหลักคำสอนของเคนส์คืออะไร?
answer: การผลิตและการจัดการเงิน
wrong_answers:
  - การกระจายอำนาจทางการเงิน
  - การส่งเสริมวิสัยทัศน์ที่มีสติของการเติบโตและความมีเหตุผลของมนุษย์
  - ไม่มีข้อใดข้างต้น
explanation: |
  บทนี้กล่าวถึงว่า ตามหลักคำสอนของเคนส์ การผลิตและการจัดการเงินเป็นความรับผิดชอบของธนาคารกลาง
reviewed: true
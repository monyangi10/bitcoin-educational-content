question: Ni igiki ikihe gikorwa nyamukuru c'ama banki wisunze inyigisho za Keynes?
answer: Uguhingura no gucunga amafaranga
wrong_answers:
  - Ugusanzaza ububasha bw'amahera
  - Guteza imbere imbono nziza n'ubwenge bw'umuntu
  - Nta nyishu nimwe irimwo.
explanation: |
  Ico kigabane kivuga yuko hakurikijwe inyigisho za Keynes, .
  uguhingura n’ugucungera amahera nico gikorwa c'ama banki makuru.
reviewed: true

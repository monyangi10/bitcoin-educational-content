question: Wat is de belangrijkste verantwoordelijkheid van centrale banken volgens de Keynesiaanse doctrine?
answer: De productie en het beheer van geld
wrong_answers:
  - De decentralisatie van de monetaire macht
  - De bevordering van een nuchtere visie op groei en menselijke rationaliteit
  - Geen van bovenstaande
explanation: |
  Het hoofdstuk vermeldt dat volgens de Keynesiaanse doctrine,
  de productie en het beheer van geld de
  verantwoordelijkheid van centrale banken zijn.
reviewed: true
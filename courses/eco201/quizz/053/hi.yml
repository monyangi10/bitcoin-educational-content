question: अर्थशास्त्र के संदर्भ में "चेरी-पिकिंग" क्या है?
answer: चेरी-पिकिंग में चुनिंदा तरीके से डेटा को चुनकर वेरिएबल्स के बीच रिश्ते स्थापित करना शामिल है।
wrong_answers:
  - चेरी-पिकिंग में सारे डेटा को नज़रअंदाज़ करके सिर्फ़ अंदाज़ों पर भरोसा करना शामिल है।
  - चेरी-पिकिंग में बिना किसी चयन के सारे उपलब्ध डेटा का इस्तेमाल शामिल होता है।
  - चेरी-पिकिंग में सरकार की नीतियों का समर्थन करने वाले डेटा का ही इस्तेमाल किया जाता है।
explanation: |
  अर्थशास्त्र में, चेरी-पिकिंग का मतलब है अपने मकसद के हिसाब से डेटा को चुन-चुनकर पेश करना
  वेरिएबल्स के बीच के रिश्ते। इसे एक अवैज्ञानिक और बिना कसौटी वाला तरीका माना जाता है।
  तरीका
reviewed: true
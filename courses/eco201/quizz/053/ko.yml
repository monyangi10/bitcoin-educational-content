question: 경제학의 맥락에서 체리피킹이란 무엇인가요?
answer: 체리피킹은 변수 간의 관계를 설정하기 위해 데이터를 선택적으로 선택하는 것입니다.
wrong_answers:
  - 체리피킹은 모든 데이터를 무시하고 가설에만 의존하는 것을 말합니다.
  - 체리 피킹은 선택하지 않고 사용 가능한 모든 데이터를 사용하는 것입니다.
  - 체리피킹은 정부 정책을 뒷받침하는 데이터만 사용하는 것을 말합니다.
explanation: |
  경제학에서 체리피킹은 데이터를 선별적으로 선택하여 변수 간의
  변수 간의 관계를 설정하는 것을 포함합니다. 이는 비과학적이고 엄격하지 않은
  방법으로 간주됩니다.
reviewed: true
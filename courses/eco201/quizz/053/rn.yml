question: bisiguriki gutoranura amakuru mu vy'ubutunzi?
answer: Gutoranura amakuru ugahitamwe witonze amakuru kugira ngo haboneke ubucuti hagati y’ibintu bihinduka.
wrong_answers:
  - Gutoranura amakuru ni kwirengagiza amakuru yose no kwizigira gusa ivyiyumviro.
  - Gutoranura amakuru gukoresha amakuru yose ariho ata guhitamwo.
  - Gutoranura birimwo gukoresha amakuru gusa ashigikira politike za leta.
explanation: |
  Mu vy’ubutunzi, gutoragura canke guhitamwo amakuru yo gushinga .
  imigenderanire hagati y’ibintu bihinduka. Bifatwa nk’ibintu bitajanye n’ubuhinga kandi bidashimishije.
reviewed: true

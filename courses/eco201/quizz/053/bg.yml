question: Какво е подбиране на череши в контекста на икономиката?
answer: Изборът на "череши" включва селективен подбор на данни за установяване на връзки между променливите.
wrong_answers:
  - Избирането на череши включва игнориране на всички данни и разчитане единствено на хипотези.
  - Избирането на череши включва използването на всички налични данни без никаква селекция.
  - Избирането на череши включва използването само на данни, които подкрепят политиките на правителството.
explanation: |
  В икономиката подбирането на череши включва селективен подбор на данни за установяване на
  връзки между променливите. Счита се, че това е ненаучна и недобросъвестна
  метод.
reviewed: true

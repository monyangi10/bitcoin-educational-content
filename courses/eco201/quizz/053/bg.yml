question: Какво е тенденциозен подбор на факти/данни (cherry picking на английски) в контекста на икономиката?
answer: включва тенденциозен подбор на данни за установяване на връзки между променливите.
wrong_answers:
  - включва игнориране на всички данни и разчитане единствено на хипотези.
  - включва използването на всички налични данни без никаква селекция.
  - включва използването само на данни, които подкрепят политиките на правителството.
explanation: |
  В икономиката тенденциозен подбор на факти/данни или на английски cherry picking включва тенденциозен подбор на данни за установяване на
  връзки между променливите. Счита се, че това е ненаучен и недобросъвестен
  метод.
reviewed: true

question: Ni ikihe kimwe mu vyiyumviro vy’ishimikiro mu vy’ubutunzi bwa Otirishiya?
answer: Kimwe mu vyiyumviro vy’ishimikiro ni uguhitamwo umwanya mwiza, ivyo bikaba bishingiye ku mahitamwo y’umuntu ku giti ciwe y’ibintu canke ibikorwa uno musi aho guhitamwo ejo.
wrong_answers:
  - Kimwe mu vyiyumviro vy’ishimikiro ni ugushinga inyungu ataco bimaze.
  - Kimwe mu vyiyumviro vy’ishimikiro ni ukwizigira amakuru y’ivyashikiye abantu.
  - Kimwe mu vyiyumviro vy’ishimikiro ni ugukoresha igerageza ry’igihe gito kugira ngo umuntu yemeze canke .
explanation: |
  Mu vy’ubutunzi bwa Otirishiya, kimwe mu vyiyumviro vy’ishimikiro ni igihe ciza .
  ivyo umuntu akunda, ivyo bikaba bishingiye ku mahitamwo y’umuntu ku giti ciwe y’ibintu canke ibikorwa muri iki gihe aho .
  kuruta ejo, kubera ukudakeka ku bijanye n’ivyo muri kazoza.
reviewed: true
question: ऑस्ट्रियन इकॉनॉमिक्स का एक बुनियादी सिद्धांत क्या है?
answer: एक मूलभूत सिद्धांत है - "सकारात्मक समय प्राथमिकता", जिसका मतलब है कि लोग आज के सामान या सेवाओं को कल के मुकाबले ज्यादा तरजीह देते हैं।
wrong_answers:
  - एक मूलभूत सिद्धांत यह है कि ब्याज दरों को मनमाने ढंग से तय किया जाता है।
  - एक बुनियादी सिद्धांत यह है कि अनुभवजन्य डेटा पर भरोसा किया जाता है।
  - एक मूलभूत सिद्धांतों में से एक है अस्थायी प्रयोगों का उपयोग करके पुष्टि करना या...
explanation: |
  ऑस्ट्रियन इकॉनॉमिक्स में, एक बुनियादी सिद्धांत है "पॉजिटिव टाइम" (समय का महत्व)।
  पसंद, जो आज सामान या सेवाओं के व्यक्तिगत चुनाव पर आधारित होती हैं...
  कल से बेहतर, क्योंकि भविष्य के बारे में कोई यकीन नहीं है।
reviewed: true
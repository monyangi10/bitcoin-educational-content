question: Коя е една от основните аксиоми в австрийската икономическа школа?
answer: Една от основните аксиоми са позитивните времеви предпочитания, които се основават на индивидуалния избор на стоки или услуги днес, а не утре.
wrong_answers:
  - Една от основните аксиоми е произволното определяне на лихвените проценти.
  - Една от основните аксиоми е разчитането на емпирични данни.
  - Една от основните аксиоми е използването на временни експерименти за потвърждаване или
explanation: |
  В австрийската икономическа школа една от основните аксиоми е положителното времево
  предпочитание, което се основава на индивидуалния избор на стоки или услуги днес, а не
  утре, поради несигурността за бъдещето.
reviewed: true

question: Wat is een van de fundamentele axioma's in de Oostenrijkse economie?
answer: Een van de fundamentele axioma's is positieve tijdsvoorkeuren, die gebaseerd zijn op individuele keuzes voor goederen of diensten vandaag in plaats van morgen.
wrong_answers:
  - Een van de fundamentele axioma's is de arbitraire vaststelling van rentetarieven.
  - Een van de fundamentele axioma's is het vertrouwen op empirische gegevens.
  - Een van de fundamentele axioma's is het gebruik van tijdelijke experimenten om
explanation: |
  In de Oostenrijkse economie is een van de fundamentele axioma's positieve tijdsvoorkeuren
  voorkeuren, die gebaseerd zijn op individuele keuzes voor goederen of diensten vandaag in plaats van morgen, vanwege onzekerheid over de toekomst
  dan morgen, vanwege onzekerheid over de toekomst.
reviewed: true
question: Jaki jest jeden z podstawowych aksjomatów ekonomii austriackiej?
answer: Jednym z podstawowych aksjomatów jest pozytywna preferencja czasowa, która opiera się na indywidualnych wyborach dóbr lub usług dziś, a nie jutro.

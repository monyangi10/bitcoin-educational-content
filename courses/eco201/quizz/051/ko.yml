question: 오스트리아 경제학의 기본 공리 중 하나는 무엇인가요?
answer: 기본 공리 중 하나는 긍정적 시간 선호인데, 이는 내일보다는 오늘 상품이나 서비스를 선택하는 개인의 선택에 기반합니다.
wrong_answers:
  - 기본 공리 중 하나는 이자율을 임의로 설정할 수 있다는 것입니다.
  - 기본 공리 중 하나는 경험적 데이터에 의존한다는 것입니다.
  - 기본 공리 중 하나는 임시 실험을 사용하여 확인하거나
explanation: |
  오스트리아 경제학에서 기본 공리 중 하나는 긍정적 시간 선호입니다
  선호도인데, 이는 미래의 불확실성 때문에 내일보다는 현재의 상품이나 서비스를
  미래에 대한 불확실성 때문에 내일보다는 오늘을 선호합니다.
reviewed: true
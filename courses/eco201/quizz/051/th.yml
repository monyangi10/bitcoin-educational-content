question: หนึ่งในสัจพจน์พื้นฐานในเศรษฐศาสตร์ออสเตรียคืออะไร?
answer: หนึ่งในสัจพจน์พื้นฐานคือความชอบเวลาที่เป็นบวก ซึ่งขึ้นอยู่กับการเลือกของบุคคลในการบริโภคสินค้าและบริการในวันนี้แทนที่จะเป็นวันพรุ่งนี้
wrong_answers:
  - หนึ่งในสัจพจน์พื้นฐานคือการกำหนดอัตราดอกเบี้ยโดยพลการ
  - หนึ่งในสัจพจน์พื้นฐานคือการพึ่งพาข้อมูลเชิงประจักษ์
  - หนึ่งในสัจพจน์พื้นฐานคือการใช้การทดลองชั่วคราวเพื่อยืนยันหรือ
explanation: |
  ในเศรษฐศาสตร์ออสเตรีย หนึ่งในสัจพจน์พื้นฐานคือความชอบเวลาบวก ซึ่งมีพื้นฐานมาจากการเลือกของบุคคลในการเลือกสินค้าหรือบริการในวันนี้แทนที่จะเป็นวันพรุ่งนี้ เนื่องจากความไม่แน่นอนเกี่ยวกับอนาคต
reviewed: true
question: Каква е основната разлика между теорията за пределната стойност на Карл Менгер и тази на Леон Валрас и Уилям Стенли Джевънс?
answer: Теорията на Менгер е предимно субективна, докато Валрас и Джевънс смятат, че стойността е обективно и измеримо явление.
wrong_answers:
  - Теорията на Менгер е предимно обективна, докато Валрас и Джевънс смятат, че стойността е субективно и неизмеримо явление.
  - Теорията на Менгер се основава на трудовата теория за стойността, докато Уолрас и Джевънс смятат, че стойността се основава на количеството земя, използвано в производството.
  - Теорията на Менгер се основава на теорията на физиократите за стойността на земята, докато Уолрас и Джевънс смятат, че стойността се основава на труда, използван в производството.
explanation: |
  Според главата маргиналната теория на стойността на Менгер
  е субективна, което означава, че тя се основава на индивидуалните
  възприемането на полезността, която може да извлече от дадена стока или
  услуга. От друга страна, Walras и Jevons смятат, че
  стойността за обективно и измеримо явление.
reviewed: true
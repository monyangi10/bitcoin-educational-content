question: カール・メンガーの限界効用理論とレオン・ワルラスおよびウィリアム・スタンレー・ジェヴォンズのそれとの間には、どのような根本的な違いがありますか？
answer: メンガーの理論は主に主観的であり、一方でワルラスとジェヴォンズは価値を客観的かつ測定可能な現象とみなしています。
wrong_answers:
  - メンガーの理論は主に客観的であり、一方でワルラスとジェヴォンズは価値を主観的かつ測定不可能な現象とみなしています。
  - メンガーの理論は労働価値説に基づいており、一方でワルラスとジェヴォンズは価値を生産に使用される土地の量に基づいていると考えています。
  - メンガーの理論は地価の理論に基づいており、一方でワルラスとジェヴォンズは価値を生産に使用される労働に基づいていると考えています。
explanation: |
  この章によると、メンガーの限界効用理論は主観的であり、これは個人が商品やサービスから得られると感じる有用性に基づいています。一方、ワルラスとジェヴォンズは価値を客観的かつ測定可能な現象とみなしています。

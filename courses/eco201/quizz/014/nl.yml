question: Wat is het fundamentele verschil tussen de marginale waardetheorie van Carl Menger en die van Leon Walras en William Stanley Jevons?
answer: De theorie van Menger is voornamelijk subjectief, terwijl Walras en Jevons waarde als een objectief en meetbaar fenomeen beschouwen.
wrong_answers:
  - De theorie van Menger is voornamelijk objectief, terwijl Walras en Jevons waarde als een subjectief en onmeetbaar fenomeen beschouwen.
  - De theorie van Menger is gebaseerd op de arbeidstheorie van waarde, terwijl Walras en Jevons van mening zijn dat waarde gebaseerd is op de hoeveelheid land die gebruikt wordt in de productie.
  - De theorie van Menger is gebaseerd op de theorie van de fysiocraten over de waarde van land, terwijl Walras en Jevons van mening zijn dat waarde gebaseerd is op de arbeid die in de productie wordt gebruikt.
explanation: |
  Volgens het hoofdstuk is de marginale waardetheorie van Menger
  subjectief, wat betekent dat het gebaseerd is op de individuele
  perceptie van het nut dat iemand kan ontlenen aan een goed of dienst
  dienst. Aan de andere kant beschouwen Walras en Jevons
  waarde als een objectief en meetbaar fenomeen.
reviewed: true
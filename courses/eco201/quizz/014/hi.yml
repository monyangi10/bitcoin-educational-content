question: कार्ल मेंगर का सीमांत मूल्य सिद्धांत और लियोन वालरास व विलियम स्टैनली जेवन्स के सिद्धांत में मूलभूत अंतर क्या है?
answer: मेंगर का सिद्धांत मुख्य रूप से व्यक्तिपरक है, जबकि वालरस और जेवन्स मूल्य को एक वस्तुनिष्ठ और मापने योग्य घटना मानते हैं।
wrong_answers:
  - मेंगर का सिद्धांत मुख्य रूप से वस्तुनिष्ठ है, जबकि वालरस और जेवन्स मूल्य को एक व्यक्तिपरक और अमापनीय घटना मानते हैं।
  - मेंगर का सिद्धांत मूल्य के श्रम सिद्धांत पर आधारित है, जबकि वालरास और जेवंस मूल्य को उत्पादन में प्रयुक्त भूमि की मात्रा पर आधारित मानते हैं।
  - मेंगर का सिद्धांत फिजियोक्रेट्स के जमीन की कीमत के सिद्धांत पर आधारित है, जबकि वालरास और जेवंस मानते हैं कि उत्पादन में लगे श्रम के आधार पर मूल्य तय होता है।
explanation: |
  अध्याय के अनुसार, मेंगर का सीमांत मूल्य सिद्धांत
  यह व्यक्तिपरक है, मतलब यह व्यक्ति के अपने
  उन्हें किसी वस्तु या सेवा से मिलने वाले फायदे की समझ
  सेवा। दूसरी ओर, वाल्रास और जेवन्स मानते हैं
  "वैल्यू" को एक ऑब्जेक्टिव और मेजरेबल घटना माना जाता है।
reviewed: true
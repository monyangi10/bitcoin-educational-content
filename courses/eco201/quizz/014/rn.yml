question: Ni itandukaniro irihe ry’ishimikiro riri hagati y’inyigisho y’agaciro y’inyuma ya Carl Menger n’iya Leon Walras na William Stanley Jevons?
answer: Ivyiyumviro vya Menger ni ivy’umuntu ku giti ciwe, mu gihe Walras na Jevons babona ko agaciro ari ikintu gifise intumbero kandi gishobora gupimwa.
wrong_answers:
  - Iciyumviro ca Menger ni ikintu nyamukuru gishingiye ku ntumbero, mu gihe Walras na Jevons babona ko agaciro ari ikintu gishingiye ku muntu kandi kidashobora gupimwa.
  - Iciyumviro ca Menger gishingiye ku ciyumviro c’agaciro k’abakozi, mu gihe Walras na Jevons babona ko agaciro gashingiye ku rugero rw’ubutaka bukoreshwa mu guhingura.
  - Iciyumviro ca Menger gishingiye ku ciyumviro c’aba physiocrates c’agaciro k’ubutaka, mu gihe Walras na Jevons babona ko agaciro gashingiye ku bikorwa bikoreshwa mu guhingura.
explanation: |
  Dushingiye ku kigabane, inyigisho ya Menger y’agaciro k’inyuma .
  ni ikintu umuntu yiyumvira, bisobanura ko gishingiye ku vyiyumviro vy’umuntu ku giti ciwe .
  gutahura akamaro bashobora kuronka ku ciza canke .
  igikogwa. Ku rundi ruhande, Walras na Jevons barimbura .
  agaciro ko kuba ikintu gifise intumbero kandi gishobora gupimwa.
reviewed: true
question: Ni itandukaniro irihe nyamukuru riri hagati y’inyigisho y’agaciro yo ku ruhande ya Carl Menger n’iya Leon Walras na William Stanley Jevons?
answer: Ivyiyumviro vya Menger ni ivy’umuntu ku giti ciwe, mu gihe Walras na Jevons babona ko agaciro ari ikintu gifise intumbero kandi gishobora gupimwa.
wrong_answers:
  - Iciyumviro ca Menger ni ikintu nyamukuru gishingiye ku ntumbero, mu gihe Walras na Jevons babona ko agaciro ari ikintu gishingiye ku muntu kandi kidashobora gupimwa.
  - Iciyumviro ca Menger gishingiye ku ciyumviro ca: agaciro n’abakozi, mu gihe Walras na Jevons babona ko agaciro gashingiye ku rugero rw’ubutaka bwakoreshejwe muguhingura mu guhingura.
  - Iciyumviro ca Menger gishingiye ku ciyumviro c’aba physiocrates c’agaciro k’ubutaka, mu gihe Walras na Jevons babona ko agaciro gashingiye ku bikorwa bikoreshwa mu guhingura.
explanation: |
  ico gice kivuga ko, inyigisho ya Menger y’agaciro ko kuruhande .
  ni ikintu umuntu yiyumvira, bisobanura ko gishingiye ku vyiyumviro vy’umuntu kubwiwe .
  gutahura akamaro bashobora kuronka ku ciza canke .
  igikogwa. Ku rundi ruhande, Walras na Jevons bafata ko .
  agaciro ari ikintu gifise intumbero kandi gishobora gupimwa.
reviewed: true

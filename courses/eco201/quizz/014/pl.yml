question: Jaka jest podstawowa różnica między marginalną teorią wartości Carla Mengera a teorią Leona Walrasa i Williama Stanleya Jevonsa?
answer: Wartośc w teorii Mengera jest przede wszystkim subiektywna, podczas gdy Walras i Jevons uważają wartość za zjawisko obiektywne i mierzalne.
wrong_answers:
  - Wartośc w teorii Mengera jest przede wszystkim obiektywna, podczas gdy Walras i Jevons uważają wartość za zjawisko subiektywne i niemierzalne.
  - Wartośc w teorii Mengera opiera się na teorii wartości pracy, podczas gdy Walras i Jevons uważają, że wartość opiera się na ilości ziemi wykorzystywanej w produkcji.
  - Wartośc w teorii Mengera opiera się na teorii wartości ziemi fizjokratów, podczas gdy Walras i Jevons uważają, że wartość opiera się na pracy wykorzystanej w produkcji.
explanation: |
  Zgodnie z tym rozdziałem, wartość w marginalnej teorii wartości Mengera
  jest subiektywna, co oznacza, że opiera się na indywidualnej
  percepcji użyteczności, jaką można czerpać z dobra lub usługi. Z drugiej strony Walras i Jevons uważają wartość za zjawisko obiektywne i mierzalne.
reviewed: true

question: ความแตกต่างพื้นฐานระหว่างทฤษฎีมูลค่าชายขอบของ Carl Menger กับของ Leon Walras และ William Stanley Jevons คืออะไร?
answer: ทฤษฎีของเมงเกอร์เป็นแบบอัตวิสัยเป็นหลัก ในขณะที่วาลราสและเจวอนส์มองว่ามูลค่าเป็นปรากฏการณ์ที่เป็นวัตถุวิสัยและสามารถวัดได้
wrong_answers:
  - ทฤษฎีของเมงเกอร์เป็นวัตถุวิสัยเป็นหลัก ในขณะที่วาลราสและเจวอนส์มองว่ามูลค่าเป็นปรากฏการณ์ที่เป็นอัตวิสัยและไม่สามารถวัดได้
  - ทฤษฎีของเมงเกอร์อิงตามทฤษฎีมูลค่าจากแรงงาน ในขณะที่วาลราสและเจวอนส์พิจารณาว่ามูลค่าขึ้นอยู่กับปริมาณที่ดินที่ใช้ในการผลิต
  - ทฤษฎีของเมงเกอร์มีพื้นฐานมาจากทฤษฎีมูลค่าที่ดินของนักสรีรศาสตร์ ในขณะที่วาลราสและเจวอนส์พิจารณาว่ามูลค่าขึ้นอยู่กับแรงงานที่ใช้ในการผลิต
explanation: |
  ตามบทนี้ ทฤษฎีมูลค่าชายขอบของเมงเกอร์เป็นแบบอัตวิสัย หมายความว่ามันขึ้นอยู่กับการรับรู้ของแต่ละบุคคลเกี่ยวกับประโยชน์ที่พวกเขาสามารถได้รับจากสินค้า หรือบริการ ในทางกลับกัน วาลราสและเจวอนส์พิจารณาว่ามูลค่าเป็นปรากฏการณ์ที่เป็นวัตถุวิสัยและสามารถวัดได้
reviewed: true
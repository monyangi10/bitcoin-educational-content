question: 칼 멩거의 한계 가치 이론과 레온 왈라스와 윌리엄 스탠리 제본스의 한계 가치 이론의 근본적인 차이점은 무엇인가요?
answer: 멩거의 이론은 주로 주관적인 반면, 왈라스와 제본스는 가치를 객관적이고 측정 가능한 현상으로 간주합니다.
wrong_answers:
  - 멩거의 이론은 주로 객관적인 반면, 왈라스와 제본스는 가치를 주관적이고 측정할 수 없는 현상으로 간주합니다.
  - 멩거의 이론은 노동 가치 이론에 기초한 반면, 왈라스와 제본스는 생산에 사용된 토지의 양에 따라 가치가 결정된다고 봅니다.
  - 멩거의 이론은 생리학자들의 토지 가치 이론에 기초한 반면, 왈라스와 제본스는 생산에 사용된 노동력을 가치의 기준으로 삼았습니다.
explanation: |

question: Wat zijn de gevolgen van een nulrentebeleid (ZIRP)?
answer: ZIRP holt de marges van banken uit, ontmoedigt het lenen aan ondernemers en risiconemers en moedigt overheden aan tot uitgebreide uitgaven, wat leidt tot een hogere staatsschuld.
wrong_answers:
  - ZIRP verhoogt de winsten van banken, stimuleert het lenen aan ondernemers en risiconemers en ontmoedigt overheidsuitgaven.
  - ZIRP heeft geen significante invloed op banken, leenpraktijken of overheidsuitgaven.
  - ZIRP verlaagt de staatsschuld, stimuleert het lenen aan ondernemers en risiconemers en ontmoedigt overheidsuitgaven.
explanation: |
  Nulrentebeleid (ZIRP) kan verschillende onbedoelde gevolgen hebben
  onbedoelde gevolgen hebben. Banken hebben beperkte
  om hun eigen vermogen weer op te bouwen omdat hun marges worden uitgehold.
  Ze hebben ook weinig stimulans om geld uit te lenen, vooral aan
  ondernemers en andere risiconemers. In plaats daarvan
  hun middelen aan het securitiseren van bestaand kapitaal of het verstrekken van
  leningen tegen onderpand. Bovendien moedigt ZIRP overheden aan
  overheden aan tot uitgebreide uitgaven, wat leidt tot een
  aanzienlijke stijging van de overheidsschuld.
reviewed: true
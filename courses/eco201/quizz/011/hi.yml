question: ज़ीरो इंटरेस्ट रेट पॉलिसी (ZIRP) के क्या नतीजे होते हैं?
answer: ZIRP (ज़ीरो इंटरेस्ट रेट पॉलिसी) बैंकों के मार्जिन को कमज़ोर करती है, उद्यमियों और रिस्क लेने वालों को लोन देने से हतोत्साहित करती है, और सरकारों को ज़्यादा खर्च करने के लिए प्रोत्साहित करती है, जिससे सार्वजनिक कर्ज़ बढ़ता है।
wrong_answers:
  - ज़ीआईआरपी (ZIRP) बैंकों के मुनाफ़े को बढ़ाता है, उद्यमियों और जोखिम उठाने वालों को कर्ज़ देने को प्रोत्साहित करता है, और सरकारी खर्च को हतोत्साहित करता है।
  - ZIRP का बैंकों, ऋण देने की प्रथाओं, या सरकारी खर्च पर कोई महत्वपूर्ण प्रभाव नहीं पड़ता है।
  - ज़ीआईआरपी (ZIRP) सार्वजनिक कर्ज़ को कम करता है, उद्यमियों और जोखिम उठाने वालों को कर्ज़ देने को बढ़ावा देता है, और सरकारी खर्च को हतोत्साहित करता है।
explanation: |
  ज़ीरो इंटरेस्ट रेट पॉलिसी (ZIRP) के कई प्रभाव हो सकते हैं...
  अनजाने नतीजे। बैंकों के पास मौके सीमित हैं।
  उन्हें अपनी इक्विटी को फिर से बनाना है क्योंकि उनका मार्जिन कम हो गया है।
  उन्हें उधार देने का भी बहुत कम मकसद होता है, खासकर
  उद्यमियों और अन्य जोखिम उठाने वालों के बजाय, वे आवंटित करते हैं
  उनके संसाधनों को मौजूदा पूंजी को सुरक्षित बनाने या प्रदान करने के लिए
  गिरवी रखकर लोन। इसके अलावा, ज़ीरो इंटरेस्ट रेट पॉलिसी (ZIRP) प्रोत्साहित करती है
  सरकारों को भारी खर्च करने के लिए प्रेरित करना, जिससे एक
  सार्वजनिक कर्ज के स्तर में बड़ी बढ़ोतरी।
reviewed: true
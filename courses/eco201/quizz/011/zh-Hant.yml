question: 零利率政策 (ZIRP) 會有什麼後果？
answer: ZIRP 會侵蝕銀行的利潤，減低對企業家和風險承受者貸款的意欲，並鼓勵政府大灑金錢，導致公共債務增加。
wrong_answers:
  - ZIRP 增加銀行利潤、鼓勵貸款給企業家和冒險者，並抑制政府支出。
  - ZIRP 對銀行、貸款作法或政府支出沒有顯著影響。
  - ZIRP 會減少公共債務、鼓勵借貸給企業家和冒險者，並抑制政府支出。
explanation: |
  零利率政策 (ZIRP) 可以有以下幾種效果
  意外後果。銀行的機會有限
  因為他們的利潤被侵蝕了，所以要重建他們的資產。
  他們也沒有貸款的動力，尤其是對於
  企業家和其他風險承受者。相反，他們分配
  他們的資源，以證券化現有資本或提供
  抵押貸款。此外，ZIRP 鼓勵
  政府大灑金錢，導致
  公共債務大幅增加。
reviewed: true
question: ผลกระทบของนโยบายอัตราดอกเบี้ยศูนย์ (ZIRP) คืออะไร?
answer: ZIRP กัดกร่อนกำไรของธนาคาร, ทำให้การปล่อยกู้แก่ผู้ประกอบการและผู้รับความเสี่ยงลดลง, และกระตุ้นให้รัฐบาลใช้จ่ายอย่างกว้างขวาง, ซึ่งนำไปสู่การเพิ่มขึ้นของหนี้สาธารณะ.
wrong_answers:
  - ZIRP เพิ่มผลกำไรของธนาคาร ส่งเสริมการให้กู้ยืมแก่ผู้ประกอบการและผู้ที่ยอมรับความเสี่ยง และลดการใช้จ่ายของรัฐบาล
  - ZIRP ไม่มีผลกระทบอย่างมีนัยสำคัญต่อธนาคาร แนวทางการให้กู้ยืม หรือการใช้จ่ายของรัฐบาล
  - ZIRP ลดหนี้สาธารณะ ส่งเสริมการให้กู้ยืมแก่ผู้ประกอบการและผู้ที่ยอมรับความเสี่ยง และกีดกันการใช้จ่ายของรัฐบาล
explanation: |
  นโยบายอัตราดอกเบี้ยศูนย์ (ZIRP) สามารถมีผลที่ไม่คาดคิดหลายประการ ธนาคารมีโอกาสจำกัดในการสร้างทุนใหม่เพราะกำไรของพวกเขาถูกกัดกร่อน พวกเขายังมีแรงจูงใจน้อยในการปล่อยกู้ โดยเฉพาะกับผู้ประกอบการและผู้ที่รับความเสี่ยงอื่น ๆ แทนที่จะเป็นเช่นนั้น พวกเขาจัดสรรทรัพยากรของตนเพื่อแปลงสินทรัพย์ที่มีอยู่ให้เป็นหลักทรัพย์หรือให้กู้ยืมโดยใช้หลักประกัน นอกจากนี้ ZIRP ยังส่งเสริมให้รัฐบาลใช้จ่ายอย่างกว้างขวาง นำไปสู่การเพิ่มขึ้นอย่างมากในระดับหนี้สาธารณะ
reviewed: true
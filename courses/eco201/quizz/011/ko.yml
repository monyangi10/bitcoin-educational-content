question: 제로 금리 정책(ZIRP)의 결과는 어떻게 되나요?
answer: ZIRP는 은행의 마진을 약화시키고, 기업가 및 위험 감수자에 대한 대출을 억제하며, 정부의 광범위한 지출을 장려하여 공공 부채 증가로 이어집니다.
wrong_answers:
  - ZIRP는 은행의 수익을 높이고, 기업가와 위험 감수자에 대한 대출을 장려하며, 정부 지출을 억제합니다.
  - ZIRP는 은행, 대출 관행 또는 정부 지출에 큰 영향을 미치지 않습니다.
  - ZIRP는 공공 부채를 줄이고, 기업가와 위험 감수자에 대한 대출을 장려하며, 정부 지출을 억제합니다.
explanation: |
  제로 금리 정책(ZIRP)은 여러 가지
  의도하지 않은 결과를 초래할 수 있습니다. 은행은 마진이 약화되기 때문에
  마진이 약화되기 때문에 자본을 재건할 수 있는 기회가 제한적입니다.
  또한, 특히 기업가나 기타 위험을 감수하는 사람들에게 대출할 인센티브가 거의 없습니다
  특히 기업가 및 기타 위험을 감수하는 사람들에게 대출할 유인이 거의 없습니다. 대신, 은행들은
  자원을 기존 자본을 유동화하거나
  담보 대출을 제공합니다. 또한 ZIRP는 다음을 장려합니다
  정부가 광범위한 지출에 참여하도록 유도하여
  공공 부채 수준을 크게 증가시킵니다.
reviewed: true
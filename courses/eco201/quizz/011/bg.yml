question: Какви са последиците от политиката на нулеви лихвени проценти (ZIRP)?
answer: намалява маржовете на банките, обезкуражава отпускането на кредити на предприемачи и рискови компании и насърчава правителствата да правят големи разходи, което води до увеличаване на публичния дълг.
wrong_answers:
  - увеличава печалбите на банките, насърчава кредитирането на предприемачи и рискови компании и възпрепятства държавните разходи.
  - не оказва съществено влияние върху банките, кредитните практики или държавните разходи.
  - намалява публичния дълг, насърчава кредитирането на предприемачи и рискови компании и възпрепятства държавните разходи.
explanation: |
  Политиките на нулеви лихвени проценти (ZIRP) могат да имат няколко
  непредвидени последици. Банките имат ограничени възможности
  да възстановят собствения си капитал, тъй като маржовете им са ерозирани.
  Те също така имат малък стимул да отпускат кредити, особено на
  предприемачи и други лица, които поемат риск. Вместо това те разпределят
  ресурсите си, за да секюритизират съществуващия капитал или да предоставят
  заеми срещу обезпечение. Освен това ZIRP насърчава
  правителствата да извършват големи разходи, което води до
  значително нарастване на равнището на държавния дълг.
reviewed: true

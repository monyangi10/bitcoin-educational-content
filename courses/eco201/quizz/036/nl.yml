question: Wie zijn de belangrijkste voorstanders van de Oostenrijkse theorie van de conjunctuurcyclus?
answer: Ludwig Von Mises en Friedrich Hayek
wrong_answers:
  - John Maynard Keynes en Milton Friedman
  - Adam Smith en David Ricardo
  - Karl Marx en Friedrich Engels
explanation: |
  De Oostenrijkse theorie van de conjunctuurcyclus werd ontwikkeld door Ludwig Von
  Mises en Friedrich Hayek, die beiden prominente leden van de Oostenrijkse School waren
  van de economie.
reviewed: true
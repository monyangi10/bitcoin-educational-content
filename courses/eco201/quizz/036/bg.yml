question: Кои са основните привърженици на австрийската теория за бизнес цикъла?
answer: Лудвиг фон Мизес и Фридрих Хайек
wrong_answers:
  - Джон Мейнард Кейнс и Милтън Фридман
  - Адам Смит и Дейвид Рикардо
  - Карл Маркс и Фридрих Енгелс
explanation: |
  Австрийската теория за бизнес цикъла е разработена от Лудвиг фон
  Мизес и Фридрих Хайек, които са изтъкнати представители на Австрийската икономическа школа.
reviewed: true

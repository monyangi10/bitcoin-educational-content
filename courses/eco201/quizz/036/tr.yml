question: Avusturya İş Döngüsü Teorisinin ana savunucuları kimlerdir?
answer: Ludwig Von Mises ve Friedrich Hayek
wrong_answers:
  - John Maynard Keynes ve Milton Friedman
  - Adam Smith ve David Ricardo
  - Karl Marx ve Friedrich Engels
explanation: |
  Avusturyacı İş Döngüsü Teorisi, Ludwig Von tarafından geliştirilmiştir
  Avusturya Okulu'nun önde gelen üyelerinden Mises ve Friedrich Hayek
  ekonominin.
reviewed: true
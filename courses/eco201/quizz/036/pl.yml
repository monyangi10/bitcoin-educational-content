question: Kim są główni zwolennicy austriackiej teorii cyklu koniunkturalnego?
answer: Ludwig Von Mises i Friedrich Hayek
wrong_answers:
  - John Maynard Keynes i Milton Friedman
  - Adam Smith i David Ricardo
  - Karol Marks i Fryderyk Engels
explanation: |
  Austriacka teoria cyklu koniunkturalnego została opracowana przez Ludwiga Von
  Misesa i Friedricha Hayeka, którzy byli wybitnymi członkami austriackiej szkoły
  ekonomii.
reviewed: true
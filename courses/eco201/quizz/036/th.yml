question: ใครคือผู้สนับสนุนหลักของทฤษฎีวัฏจักรธุรกิจแบบออสเตรีย?
answer: ลุดวิก ฟอน มีเซส และ ฟรีดริช ฮาเย็ค
wrong_answers:
  - จอห์น เมย์นาร์ด เคนส์ และ มิลตัน ฟรีดแมน
  - อดัม สมิธ และเดวิด ริคาร์โด
  - คาร์ล มาร์กซ์ และ ฟรีดริช เองเงิลส์
explanation: |
  ทฤษฎีวัฏจักรธุรกิจของออสเตรียถูกพัฒนาโดยลุดวิก ฟอน มีเซส และฟรีดริช ฮาเย็ค ซึ่งทั้งสองเป็นสมาชิกที่มีชื่อเสียงของสำนักเศรษฐศาสตร์ออสเตรีย
reviewed: true
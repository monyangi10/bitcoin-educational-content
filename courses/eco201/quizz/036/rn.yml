question: Ni bande bashigikiye cane inyigisho y’i Otirishiya y’ingendo y’ubudandaji?
answer: Ludwig Von Mises na Friedrich Hayek
wrong_answers:
  - Yohani Maynard Keynes na Milton Friedman
  - Adamu Smith na Dawidi Rikardo
  - Karli Marikisi na Fridiriki Engelsi
explanation: |
  Ivyiyumviro vy’Abanyaotirishiya vyerekeye Inzinguzingu y’Ubucuruzi vyateguwe na Ludwig Von .
  Mises na Friedrich Hayek, bompi bakaba bari abagize Ishure ry’i Otirishiya bazwi cane .
  y’ubutunzi.

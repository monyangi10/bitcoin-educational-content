question: Ko su glavni zagovornici austrijske teorije poslovnog ciklusa?
answer: Ludwig Von Mises i Friedrich Hayek
wrong_answers:
  - John Maynard Keynes i Milton Friedman
  - Adam Smith i David Ricardo
  - Karl Marx i Friedrich Engels
explanation: |
  Austrijska teorija poslovnog ciklusa razvijena je od strane Ludviga Von
  Misesa i Fridriha Hajeha, koji su obojica bili istaknuti članovi Austrijske škole
  ekonomije.
reviewed: true
question: ऑस्ट्रियन बिज़नेस साइकिल थ्योरी के मुख्य समर्थक कौन हैं?
answer: लुडविग वॉन मिसेस और फ्रेडरिक हायेक
wrong_answers:
  - जॉन मेनार्ड कीन्स और मिल्टन फ्रीडमैन
  - एडम स्मिथ और डेविड रिकार्डो
  - कार्ल मार्क्स और फ्रेडरिक एंगेल्स
explanation: |
  ऑस्ट्रियन बिज़नेस साइकिल थ्योरी लुडविग वॉन द्वारा विकसित की गई थी।
  माइसेस और फ्रेडरिक हायेक, जो दोनों ऑस्ट्रियन स्कूल के प्रमुख सदस्य थे
  अर्थशास्त्र का।
reviewed: true
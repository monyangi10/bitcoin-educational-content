question: None umwigisha w’ivyo vyigwa ni nde?
answer: Tewo Mojeneti
wrong_answers:
  - Tewo Bolore
  - Ivyiyumviro Bitcoin.
  - Nta na kimwe muri ivyo biri hejuru .
explanation: |
  Ico kigabane kivuga ko umwigisha w’ivyo vyigwa ari .
  Théo Mogenet, umwigisha w’umunyamwete kandi afise ubushobozi bwo
  Ubutunzi bwa Otirishiya.
reviewed: true
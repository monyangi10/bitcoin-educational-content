question: Ni kuki abahinga mu vy’ubutunzi n’abategura imigambi kenshi badakunda abahinga mu vy’ubutunzi bo muri Otirishi?
answer: Abahinga mu vy’ubutunzi bo muri Otirishi barashira ahabona ukuntu kazoza katamenyekana, ukuntu abantu bavuga ivy’ubutunzi bitari vyo, be n’ingaruka mbi ziterwa n’ugufasha k'ubutunzi.
wrong_answers:
  - Abahinga mu vy’ubutunzi bo muri Otirishi barashigikira ubusosiyalisimu.
  - Abahinga mu vy’ubutunzi bo muri Otirishi ntibemera ububasha bw’isoko.
  - Abahinga mu vy’ubutunzi bo muri Otirishi ntibakoresha ivyerekanwa n'ibiharuro.
explanation: |
  Abahinga mu vy’ubutunzi bo muri Otirishi  barashira ahabona ukuntu kazoza katamenyekana, ni ukuvuga ukutari kwo .
  y’ubuhanuzi bw’ubutunzi bushingiye ku rugero, n’ingaruka mbi z’ugufasha mu vy’ubutunzi,
  ivyo bikaba biteye kubiri n’ivyo abahinga mu vy’ubutunzi n’abahingai;
  abategura imigambi.
reviewed: true

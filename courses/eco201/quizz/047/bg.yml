question: Защо основните икономисти и централните плановици често не харесват австрийските икономисти?
answer: Австрийските икономисти подчертават несигурността на бъдещето, погрешността на количествените икономически прогнози и вредните последици от икономическата намеса.
wrong_answers:
  - Австрийските икономисти се застъпват за социализъм.
  - Австрийските икономисти не вярват в силата на пазара.
  - Австрийските икономисти не използват математически модели.
explanation: |
  Австрийските икономисти подчертават несигурността на бъдещето, заблудата
  на количественото икономическо прогнозиране и вредните ефекти от икономическата намеса,
  което е в разрез с убежденията и практиките на масовите икономисти и централните
  планиране.
reviewed: true
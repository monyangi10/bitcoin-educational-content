question: Zašto glavni ekonomisti i centralni planeri često ne vole austrijske ekonomiste?
answer: Austrijski ekonomisti ističu neizvesnost budućnosti, zabludu kvantitativnog ekonomskog predviđanja i štetne efekte ekonomske intervencije.
wrong_answers:
  - Austrijski ekonomisti zalažu se za socijalizam.
  - Austrijski ekonomisti ne veruju u moć tržišta.
  - Austrijski ekonomisti ne koriste matematičke modele.
explanation: |
  Austrijski ekonomisti ističu neizvesnost budućnosti, zabludu kvantitativnog ekonomskog predviđanja i štetne efekte ekonomske intervencije, što je suprotno verovanjima i praksama mejnstrim ekonomista i centralnih planera.
reviewed: true
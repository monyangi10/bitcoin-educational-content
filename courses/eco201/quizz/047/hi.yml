question: मुख्यधारा के अर्थशास्त्री और सेंट्रल प्लानर्स अक्सर ऑस्ट्रियन अर्थशास्त्रियों को क्यों पसंद नहीं करते?
answer: ऑस्ट्रियाई अर्थशास्त्री भविष्य की अनिश्चितता, मात्रात्मक आर्थिक भविष्यवाणी की गलतफहमी, और आर्थिक हस्तक्षेप के नुकसानदायक प्रभावों पर जोर देते हैं।
wrong_answers:
  - ऑस्ट्रियाई अर्थशास्त्री समाजवाद की वकालत करते हैं।
  - ऑस्ट्रियन अर्थशास्त्री बाज़ार की ताक़त पर यक़ीन नहीं रखते।
  - ऑस्ट्रियन इकोनॉमिस्ट्स गणितीय मॉडल्स का इस्तेमाल नहीं करते।
explanation: |
  ऑस्ट्रियाई अर्थशास्त्री भविष्य की अनिश्चितता और भ्रम पर जोर देते हैं,
  मात्रात्मक आर्थिक भविष्यवाणी का, और आर्थिक हस्तक्षेप के नुकसानदायक प्रभावों का,
  जो मुख्यधारा के अर्थशास्त्रियों और केंद्रीय बैंकों की मान्यताओं और प्रथाओं के खिलाफ जाता है
  प्लानर।
reviewed: true
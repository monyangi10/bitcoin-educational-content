question: ทำไมนักเศรษฐศาสตร์กระแสหลักและผู้วางแผนกลางมักไม่ชอบนักเศรษฐศาสตร์ออสเตรีย?
answer: นักเศรษฐศาสตร์ออสเตรียเน้นถึงความไม่แน่นอนของอนาคต ความผิดพลาดของการทำนายเศรษฐกิจเชิงปริมาณ และผลกระทบที่เป็นอันตรายของการแทรกแซงทางเศรษฐกิจ
wrong_answers:
  - นักเศรษฐศาสตร์ออสเตรียสนับสนุนสังคมนิยม
  - นักเศรษฐศาสตร์ออสเตรียไม่เชื่อในพลังของตลาด
  - นักเศรษฐศาสตร์ออสเตรียไม่ใช้แบบจำลองทางคณิตศาสตร์
explanation: |
  นักเศรษฐศาสตร์ชาวออสเตรียเน้นย้ำถึงความไม่แน่นอนของอนาคต ความผิดพลาดของการทำนายทางเศรษฐศาสตร์เชิงปริมาณ และผลกระทบที่เป็นอันตรายของการแทรกแซงทางเศรษฐกิจ ซึ่งขัดแย้งกับความเชื่อและการปฏิบัติของนักเศรษฐศาสตร์กระแสหลักและผู้วางแผนส่วนกลาง
reviewed: true
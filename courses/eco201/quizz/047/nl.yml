question: Waarom hebben mainstream economen en centrale planners vaak een hekel aan Oostenrijkse economen?
answer: Oostenrijkse economen benadrukken de onzekerheid van de toekomst, de misvatting van kwantitatieve economische voorspellingen en de schadelijke effecten van economische interventie.
wrong_answers:
  - Oostenrijkse economen pleiten voor socialisme.
  - Oostenrijkse economen geloven niet in de kracht van de markt.
  - Oostenrijkse economen gebruiken geen wiskundige modellen.
explanation: |
  Oostenrijkse economen benadrukken de onzekerheid van de toekomst, de misvatting
  van kwantitatieve economische voorspellingen en de schadelijke effecten van economische interventie,
  wat ingaat tegen de overtuigingen en praktijken van mainstream economen en centrale
  planners.
reviewed: true
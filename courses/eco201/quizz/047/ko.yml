question: 주류 경제학자와 중앙 기획자들이 오스트리아 경제학자들을 싫어하는 이유는 무엇인가요?
answer: 오스트리아 경제학자들은 미래의 불확실성, 정량적 경제 예측의 오류, 경제 개입의 해로운 영향에 대해 강조합니다.
wrong_answers:
  - 오스트리아 경제학자들은 사회주의를 옹호합니다.
  - 오스트리아의 경제학자들은 시장의 힘을 믿지 않습니다.
  - 오스트리아 경제학자들은 수학적 모델을 사용하지 않습니다.
explanation: |
  오스트리아 경제학자들은 미래의 불확실성, 양적 경제 예측의 오류와
  양적 경제 예측의 오류, 경제 개입의 해로운 영향 등을 강조합니다,
  이는 주류 경제학자와 중앙 계획가들의 신념과 관행에 위배됩니다
  기획자.
reviewed: true
question: Dlaczego ekonomiści głównego nurtu i centralni planiści często nie lubią ekonomistów austriackich?
answer: Ekonomiści austriaccy podkreślają niepewność przyszłości, błędność ilościowych prognoz ekonomicznych i szkodliwe skutki interwencji gospodarczej.
wrong_answers:
  - Ekonomiści austriaccy opowiadają się za socjalizmem.
  - Ekonomiści austriaccy nie wierzą w siłę rynku.
  - Ekonomiści austriaccy nie używają modeli matematycznych.
explanation: |
  Ekonomiści austriaccy podkreślają niepewność przyszłości, błędność
  ilościowych prognoz ekonomicznych i szkodliwe skutki interwencji gospodarczej,
  co jest sprzeczne z przekonaniami i praktykami ekonomistów głównego nurtu i centralnych
  planistów.
reviewed: true

question: Dlaczego ekonomiści głównego nurtu i centralni planiści często nie lubią austriackich ekonomistów?
answer: Austriaccy ekonomiści podkreślają niepewność przyszłości, błędność ilościowych prognoz ekonomicznych i szkodliwe skutki interwencji gospodarczej.
wrong_answers:
  - Austriaccy ekonomiści opowiadają się za socjalizmem.
  - Austriaccy ekonomiści nie wierzą w siłę rynku.
  - Austriaccy ekonomiści nie używają modeli matematycznych.
explanation: |
  Austriaccy ekonomiści podkreślają niepewność przyszłości, błędność
  ilościowych prognoz ekonomicznych i szkodliwe skutki interwencji gospodarczej,
  co jest sprzeczne z przekonaniami i praktykami ekonomistów głównego nurtu i centralnych
  planistów.
reviewed: true
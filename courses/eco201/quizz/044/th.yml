question: บทบาทของผู้ประกอบการและผู้ถือหุ้นในระบบเศรษฐกิจทุนนิยมตามที่ Mises กล่าวคืออะไร?
answer: พวกเขาจัดสรรเงินทุนในอุตสาหกรรมต่าง ๆ ซึ่งทำให้เกิดการกำหนดราคาที่ใช้เป็นข้อมูลในการคำนวณทางเศรษฐกิจของผู้จัดการ
wrong_answers:
  - พวกเขารับผิดชอบในการสร้างงานใหม่ ๆ
  - พวกเขามีหน้าที่ในการเพิ่มความมั่งคั่งของชาติ
  - พวกเขารับผิดชอบในการควบคุมปริมาณเงินในระบบเศรษฐกิจ
explanation: |
  มิเซสเน้นย้ำถึงความสำคัญของผู้ประกอบการและผู้ถือหุ้น ซึ่งในฐานะเจ้าของปัจจัยการผลิต จัดสรรทุนในอุตสาหกรรมต่าง ๆ ซึ่งก่อให้เกิดราคาที่ใช้เป็นข้อมูลในการคำนวณทางเศรษฐกิจของผู้จัดการ
reviewed: true
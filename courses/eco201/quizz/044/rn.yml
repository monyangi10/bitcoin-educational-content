question: Ni uruhara uruhe rw’abanyamigambi n’abanyamigabane mu bukungu bw’abanyagihugu nk’uko Mises abivuga?
answer: Bagabanya umutungo mu nganda zitandukanye, gutyo bagahingura ibiciro bikora nk’ibikoresho mu biharuro vy’ubutunzi vy’abarongozi.
wrong_answers:
  - Ni bo bajejwe kurema akazi gashasha.
  - Ni bo bajejwe kwongerera ubutunzi bw’igihugu.
  - Ni bo bajejwe kugenzura Supply y’amahera mu bukungu.
explanation: |
  Mises yashimikiye akamaro k’abanyamigambi n’abanyamigabane,
  abo, nk’abafise uburyo bwo gukora, bagatanga umutungo mu nganda zitandukanye,
  gutyo bikaba bihingura ibiciro bikora nk’ibintu vy’injiza mu biharuro vy’ubutunzi vy’abarongozi.
reviewed: true
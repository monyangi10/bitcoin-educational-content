question: Jaka jest rola przedsiębiorców i akcjonariuszy w gospodarce kapitalistycznej według Misesa?
answer: Alokują kapitał w różnych branżach, tworząc w ten sposób ceny, które służą jako dane wejściowe w kalkulacjach menedżerów.
wrong_answers:
  - Są odpowiedzialni za tworzenie nowych miejsc pracy.
  - Są odpowiedzialni za zwiększanie bogactwa narodu.
  - Są odpowiedzialne za kontrolowanie podaży pieniędzy w gospodarce.
explanation: |
  Mises podkreślał znaczenie przedsiębiorców i akcjonariuszy,
  którzy jako właściciele środków produkcji alokują kapitał w różnych branżach,
  tworząc w ten sposób ceny, które służą jako dane wejściowe w obliczeniach menedżerów.
reviewed: true

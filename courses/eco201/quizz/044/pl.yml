question: Jaka jest rola przedsiębiorców i akcjonariuszy w gospodarce kapitalistycznej według Misesa?
answer: Alokują one kapitał w różnych branżach, tworząc w ten sposób ceny, które służą jako dane wejściowe w kalkulacjach ekonomicznych menedżerów.
wrong_answers:
  - Są oni odpowiedzialni za tworzenie nowych miejsc pracy.
  - Są oni odpowiedzialni za zwiększanie bogactwa narodu.
  - Są one odpowiedzialne za kontrolowanie Supply pieniędzy w gospodarce.
explanation: |
  Mises podkreślał znaczenie przedsiębiorców i akcjonariuszy,
  którzy jako właściciele środków produkcji alokują kapitał w różnych branżach,
  tworząc w ten sposób ceny, które służą jako dane wejściowe w obliczeniach ekonomicznych menedżerów.
reviewed: true
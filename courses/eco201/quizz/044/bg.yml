question: Каква е ролята на предприемачите и акционерите в капиталистическата икономика според Мизес?
answer: Те разпределят капитала между различните отрасли, като по този начин формират цени, които служат като входни данни в икономическите изчисления на мениджърите.
wrong_answers:
  - Те са отговорни за създаването на нови работни места.
  - Те са отговорни за увеличаването на богатството на нацията.
  - Те отговарят за контрола върху паричното предлагане в икономиката.
explanation: |
  Мизес подчертава значението на предприемачите и акционерите,
  които, като собственици на средствата за производство, разпределят капитала между различните отрасли,
  по този начин формират цените, които служат като входни данни в икономическите изчисления на мениджърите.
reviewed: true
question: Wat is de rol van ondernemers en aandeelhouders in een kapitalistische economie volgens Mises?
answer: Ze verdelen kapitaal over verschillende industrieën en vormen zo prijzen die als input dienen in de economische berekeningen van managers.
wrong_answers:
  - Zij zijn verantwoordelijk voor het creëren van nieuwe banen.
  - Ze zijn verantwoordelijk voor het vergroten van de rijkdom van een land.
  - Zij zijn verantwoordelijk voor het controleren van de Supply van geld in de economie.
explanation: |
  Mises benadrukte het belang van ondernemers en aandeelhouders,
  die, als eigenaars van de productiemiddelen, kapitaal toewijzen aan verschillende industrieën,
  en zo prijzen vormen die dienen als input in de economische berekeningen van managers.
reviewed: true
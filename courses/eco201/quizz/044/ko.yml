question: 미제스에 따르면 자본주의 경제에서 기업가와 주주의 역할은 무엇인가요?
answer: 이들은 다양한 산업에 자본을 배분하여 관리자의 경제적 계산에 투입되는 가격을 형성합니다.
wrong_answers:
  - 이들은 새로운 일자리를 창출할 책임이 있습니다.
  - 그들은 국가의 부를 증가시킬 책임이 있습니다.
  - 이들은 경제에서 화폐의 Supply을 통제할 책임이 있습니다.
explanation: |
  미제스는 기업가와 주주의 중요성을 강조했습니다,
  생산 수단의 소유자로서 여러 산업에 자본을 배분하고,
  따라서 경영자의 경제적 계산에 입력으로 작용하는 가격을 형성합니다.
reviewed: true
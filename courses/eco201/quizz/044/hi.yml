question: मिसेस के अनुसार, पूंजीवादी अर्थव्यवस्था में उद्यमियों और शेयरधारकों की क्या भूमिका है?
answer: वे अलग-अलग उद्योगों में पूंजी आवंटित करते हैं, जिससे कीमतें बनती हैं जो प्रबंधकों के आर्थिक हिसाब-किताब में इनपुट का काम करती हैं।
wrong_answers:
  - वे नई नौकरियाँ बनाने के लिए ज़िम्मेदार हैं।
  - वे देश की संपत्ति बढ़ाने के लिए जिम्मेदार हैं।
  - वे अर्थव्यवस्था में पैसे के Supply को नियंत्रित करने के लिए ज़िम्मेदार हैं।
explanation: |
  मिसेस ने उद्यमियों और शेयरधारकों के महत्व पर जोर दिया,
  जो, उत्पादन के साधनों के मालिक होने के नाते, विभिन्न उद्योगों में पूंजी का आवंटन करते हैं,
  जिससे कीमतें बनती हैं जो प्रबंधकों के आर्थिक हिसाब-किताब में इनपुट का काम करती हैं।
reviewed: true
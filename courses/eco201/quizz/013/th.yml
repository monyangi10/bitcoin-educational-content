question: ปัญหาหลักของระบบสำรองเศษส่วนคืออะไร?
answer: ปัญหาหลักของระบบเงินสำรองบางส่วนคือการถอนเงินจำนวนมากจากธนาคารใดธนาคารหนึ่งอาจนำไปสู่การล้มละลายของธนาคารนั้นได้
wrong_answers:
  - ปัญหาหลักของระบบเงินสำรองบางส่วนคือมันป้องกันไม่ให้ธนาคารปล่อยเงินกู้
  - ปัญหาหลักของระบบเงินสำรองบางส่วนคือมันต้องการให้ธนาคารถือเงินสำรองมากกว่าที่พวกเขาได้รับจากเงินฝาก
  - ปัญหาหลักของระบบเงินสำรองบางส่วนคือมันป้องกันไม่ให้ธนาคารสร้างเงินใหม่
explanation: |
  ในระบบธนาคารสำรองบางส่วน ธนาคารจะถือเงินสำรองเพียงบางส่วนของเงินฝากของลูกค้า และปล่อยกู้ส่วนที่เหลือ หากลูกค้าจำนวนมากรีบถอนเงินพร้อมกัน ธนาคารอาจไม่มีเงินสำรองเพียงพอที่จะตอบสนองความต้องการเหล่านี้ ซึ่งอาจนำไปสู่การล้มละลายได้
reviewed: true
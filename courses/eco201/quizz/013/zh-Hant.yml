question: 部分儲備金制度的主要問題是什麼？
answer: 部分儲備金制度的主要問題是，從特定銀行大量提款有可能導致該銀行破產。
wrong_answers:
  - 部分儲備金制度的主要問題是它阻止了銀行放款。
  - 部分儲備金制度的主要問題在於它要求銀行持有的儲備金多於他們所收到的存款。
  - 部分儲備金制度的主要問題是它阻止銀行創造新的貨幣。
explanation: |
  在部分儲備金制度中，銀行只持有部分儲備金。
  存款人的資金作為儲備，並將其借出。
  休息。如果許多客戶同時趕著提款
  他們的資金，銀行可能沒有足夠的儲備來滿足
  這些要求，有可能導致破產。
reviewed: true
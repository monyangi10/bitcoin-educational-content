question: Jaki jest główny problem z systemem rezerw cząstkow?
answer: Znaczące wypłaty z danego banku mogą potencjalnie doprowadzić do jego bankructwa.
wrong_answers:
  - Uniemożliwia on bankom pożyczanie pieniędzy.
  - Wymaga on od banków utrzymywania większej ilości rezerw niż otrzymują w depozytach.
  - Uniemożliwia on bankom tworzenie nowych pieniędzy.
explanation: |
  W systemie rezerw cząstkowych banki utrzymują tylko część środków swoich deponentów w rezerwie, pożyczając resztę. Jeśli wielu klientów jednocześnie
  domaga się swoich środków, bank może nie mieć wystarczających rezerw, aby zaspokoić te żądania, potencjalnie prowadząc do jego bankructwa.
reviewed: true

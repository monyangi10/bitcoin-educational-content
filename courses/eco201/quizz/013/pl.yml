question: Jaki jest główny problem z systemem rezerwy cząstkowej?
answer: Głównym problemem systemu rezerwy cząstkowej jest to, że znaczące wypłaty z danego banku mogą potencjalnie doprowadzić do jego bankructwa.
wrong_answers:
  - Głównym problemem systemu rezerwy cząstkowej jest to, że uniemożliwia on bankom pożyczanie pieniędzy.
  - Głównym problemem systemu rezerwy cząstkowej jest to, że wymaga on od banków utrzymywania większej ilości rezerw niż otrzymują w depozytach.
  - Głównym problemem systemu rezerwy cząstkowej jest to, że uniemożliwia on bankom tworzenie nowych pieniędzy.
explanation: |

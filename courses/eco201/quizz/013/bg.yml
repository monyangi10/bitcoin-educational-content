question: Какъв е основният проблем на системата на частичните резерви?
answer: Основният проблем на системата на частичните резерви е, че значителни тегления от дадена банка могат да доведат до нейния фалит.
wrong_answers:
  - Основният проблем на системата на частичните резерви е, че тя не позволява на банките да отпускат парични заеми.
  - Основният проблем на системата на частичните резерви е, че тя изисква от банките да държат повече резерви, отколкото получават под формата на депозити.
  - Основният проблем на системата на частичните резерви е, че тя не позволява на банките да създават нови пари.
explanation: |
  В системата на частичните резерви банките държат само част от
  от средствата на своите вложители в резерв, като отпускат
  останалата част. Ако много клиенти едновременно се втурнат да изтеглят
  средствата си, банката може да няма достатъчно резерви, за да посрещне
  и това може да доведе до банкрут.
reviewed: true
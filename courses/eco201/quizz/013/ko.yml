question: 부분예치금 제도의 주요 문제점은 무엇인가요?
answer: 부분지급준비금 제도의 주요 문제점은 특정 은행에서 대규모 인출이 발생할 경우 은행 파산으로 이어질 수 있다는 점입니다.
wrong_answers:
  - 부분지급준비금 제도의 주요 문제점은 은행의 대출을 막는다는 점입니다.
  - 부분지급준비금 제도의 주요 문제점은 은행이 예금보다 더 많은 지급준비금을 보유해야 한다는 점입니다.
  - 부분지급준비금 제도의 주요 문제점은 은행이 새로운 화폐를 만들지 못하게 한다는 점입니다.
explanation: |
  부분지급준비금 제도에서 은행은 예금자 자금의 일부만
  예금자 자금의 일부만 준비금으로 보유하고 나머지를 대출합니다
  나머지는 많은 고객이 동시에 자금을 인출하려고 서두르면
  은행은 이러한 수요를 충족하기에 충분한 준비금을 보유하지 못할 수 있습니다
  은행은 이러한 수요를 감당하지 못해 파산할 수 있습니다.
reviewed: true
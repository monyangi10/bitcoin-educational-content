question: Ni ikihe kibazo nyamukuru kiri mu bijanye n’uburyo bwo gucungera amafaranga y’imice?
answer: Ikibazo nyamukuru kiri mu bijanye n’uburyo bwo kubika amahera mu buryo bw’imice ni uko gukura amahera menshi muri banki kanaka bishobora gutuma ishobora gusenyuka.
wrong_answers:
  - Ikibazo nyamukuru kiri muri iyo nzira y’ububiko bw’amahera y’imice ni uko ibuza amabanki kuguriza amahera.
  - Ikibazo nyamukuru kiri muri iyo nzira y’ububiko bw’amahera y’imice ni uko isaba ko amabanki agira amahera menshi kuruta ayo aronka mu bizigamirwa.
  - Ikibazo nyamukuru kiri muri iyo nzira y’ububiko bw’amahera y’imice ni uko ibuza amabanki kurema amahera mashasha.
explanation: |
  Mu buryo bwo kubika amafaranga y’imice, amabanki afise gusa agace .
  y’amahera y’ababikiye mu bubiko, bakaguriza .
  kuruhuka. Iyo abakiriya benshi bihutiye gukuraho icarimwe .
  amahera yabo, banki yoshobora kutagira amahera ahagije yo gushitsa .
  ivyo bisabwa, bishobora gutuma umuntu agira igihombo.
reviewed: true
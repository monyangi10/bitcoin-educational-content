question: फ्रैक्शनल रिज़र्व सिस्टम में मुख्य समस्या क्या है?
answer: फ्रैक्शनल रिज़र्व सिस्टम में मुख्य समस्या यह है कि अगर किसी खास बैंक से बड़ी रकम निकाली जाए, तो इससे उस बैंक का दिवालिया होने का खतरा हो सकता है।
wrong_answers:

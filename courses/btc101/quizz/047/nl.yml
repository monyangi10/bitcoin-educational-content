question: Wat is de tweede fase van het hyperinflatieverschijnsel?
answer: Valuta stort in en prijzen stijgen.
wrong_answers:
  - Verlies van vertrouwen.
  - De vicieuze cirkel van het bijdrukken van geld.
  - Er ontstaat een nieuwe valuta.
explanation: |
  De tweede fase van hyperinflatie is het ineenstorten van de valuta &
  prijsstijging, net na de fase van verlies van vertrouwen.
reviewed: true
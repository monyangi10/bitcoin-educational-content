question: Giai đoạn thứ hai của hiện tượng siêu lạm phát là gì?
answer: Sụp đổ của tiền tệ & tăng giá.
wrong_answers:
  - Mất niềm tin.
  - Vòng luẩn quẩn của việc in tiền.
  - Một loại tiền tệ mới xuất hiện.
explanation: |
  Giai đoạn thứ hai của siêu lạm phát là sụp đổ của tiền tệ & tăng giá, ngay sau Giai đoạn Mất niềm tin.
reviewed: true
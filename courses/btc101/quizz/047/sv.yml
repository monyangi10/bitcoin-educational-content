question: Vad är den andra fasen av hyperinflationsfenomenet?
answer: Valutakollaps och prishöjning.
wrong_answers:
  - Förlust av självförtroende.
  - Penningtryckandets onda cirkel.
  - En ny valuta växer fram.
explanation: |
  Den andra fasen av hyperinflation är valutakollaps &
  prisökning, strax efter fasen med förlorat förtroende.
reviewed: true
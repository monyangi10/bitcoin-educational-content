question: เฟสที่สองของปรากฏการณ์เงินเฟ้อสูงคืออะไร?
answer: การล่มสลายของสกุลเงิน & การเพิ่มขึ้นของราคา
wrong_answers:
  - การสูญเสียความมั่นใจ
  - วงจรอุบาทว์ของการพิมพ์เงิน
  - สกุลเงินใหม่เกิดขึ้น
explanation: |
  ระยะที่สองของภาวะเงินเฟ้อรุนแรงคือการล่มสลายของสกุลเงิน &
  การเพิ่มขึ้นของราคา, หลังจากระยะการสูญเสียความเชื่อมั่น.
reviewed: true
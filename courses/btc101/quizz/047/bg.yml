question: Каква е втората фаза на явлението хиперинфлация?
answer: Срив на валутата и повишаване на цените.
wrong_answers:
  - Загуба на увереност.
  - Омагьосаният кръг на печатането на пари.
  - Появява се нова валута.
explanation: |
  Втората фаза на хиперинфлацията е срив на валутата &
  повишаване на цените, непосредствено след фазата на загуба на доверие.
reviewed: true
question: Wat is een van de belangrijkste redenen waarom Bitcoin is gemaakt?
answer: De verandering van het financiële systeem voorstellen.
wrong_answers:
  - Voorstellen om geld uit te bannen.
  - De creatie van een nieuwe vorm van AI-technologie voorstellen.
  - Om de controle over de wereldbevolking voor te stellen.
explanation: |
  De tekst vermeldt dat Satoshi Nakamoto Bitcoin creëerde in
  2008 om de verandering van het financiële systeem voor te stellen.
reviewed: true
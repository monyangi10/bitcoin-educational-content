question: Какви са били първите форми на парични знаци?
answer: Стоки като зърно и добитък.
wrong_answers:
  - Злато и сребро.
  - Бележки на хартия.
  - Цифрови активи.
explanation: |
  Първите форми на парични знаци често са били свързани с основни
  стоки като зърно, добитък и други стоки.
  Тези стоки обаче имаха сериозни недостатъци, като например
  нетрайност, което затруднява използването им като
  дългосрочно средство за спестяване.
reviewed: true
question: รูปแบบแรกของสกุลเงินคืออะไร?
answer: สินค้าต่างๆ เช่น ธัญพืชและปศุสัตว์
wrong_answers:
  - ทองและเงิน
  - กระดาษบันทึก
  - สินทรัพย์ดิจิทัล
explanation: |
  รูปแบบแรกของสกุลเงินมักจะเชื่อมโยงกับสินค้าจำเป็น เช่น ธัญพืช ปศุสัตว์ และสินค้าโภคภัณฑ์อื่นๆ อย่างไรก็ตาม สินค้าเหล่านี้มีข้อเสียใหญ่ เช่น การเน่าเสีย ทำให้ยากต่อการใช้เป็นสื่อการออมระยะยาว
reviewed: true
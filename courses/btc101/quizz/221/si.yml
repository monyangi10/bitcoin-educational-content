question: ගෙවීම් ලබාගැනීම සඳහා Lightning සමඟ සසඳන විට Ark ලබාදෙන වාසිය කුමක්ද?
answer: ආගමන ද්‍රවශීලතාව අවශ්‍ය නොවීම
wrong_answers:
  - ගෙවීමේ ක්ෂණික අවසානය
  - ගනුදෙනු ගාස්තු නොමැති වීම
  - වොලට් එකක් අවශ්‍ය නොවීම
explanation: |
  Ark මඟින් පෙර සිට ආගමන ද්‍රවශීලතාව නොමැතිව ගෙවීම් ලබාගැනීමට ඉඩ සලසයි.
reviewed: false

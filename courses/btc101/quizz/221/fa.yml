question: آرک چه مزیتی نسبت به لایتنینگ برای دریافت پرداخت‌ها ارائه می‌دهد؟
answer: نیازی به نقدینگی ورودی نیست
wrong_answers:
  - قطعیت فوری پرداخت
  - عدم وجود کارمزد تراکنش
  - عدم نیاز به داشتن کیف پول
explanation: |
  Ark امکان دریافت پرداخت‌ها را بدون در اختیار داشتن نقدینگی ورودی از پیش فراهم می‌کند.

question: Какое преимущество Ark предлагает по сравнению с Lightning для приёма платежей?
answer: Не требуется входящая ликвидность
wrong_answers:
  - Немедленная финальность платежа
  - Отсутствие комиссий за транзакции
  - Не нужен кошелёк
explanation: |
  Ark позволяет получать платежи без предварительного наличия входящей ликвидности.

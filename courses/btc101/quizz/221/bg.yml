question: Какво предимство предлага Ark спрямо Lightning за получаване?
answer: Няма нужда от входяща ликвидност
wrong_answers:
  - Незабавна финалност на плащането
  - Липса на такси за транзакции
  - Няма нужда от портфейл
explanation: |
  Ark позволява получаване на плащания без предварително наличие на входяща ликвидност.

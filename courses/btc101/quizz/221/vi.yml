question: Ark mang lại lợi thế gì so với Lightning trong việc nhận thanh toán?
answer: Không cần thanh khoản đầu vào
wrong_answers:
  - Tính chung cuộc ngay lập tức của thanh toán
  - Không có phí giao dịch
  - Không cần có ví
explanation: |
  Ark cho phép nhận thanh toán mà không cần có thanh khoản đầu vào từ trước.
reviewed: false

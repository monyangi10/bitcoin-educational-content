question: Koju prednost Ark nudi u odnosu na Lightning za prijem plaćanja?
answer: Nema potrebe za dolaznom likvidnošću
wrong_answers:
  - Trenutna konačnost plaćanja
  - Nema transakcionih naknada
  - Nije potrebno imati novčanik
explanation: |
  Ark omogućava prijem plaćanja bez prethodnog posedovanja dolazne likvidnosti.

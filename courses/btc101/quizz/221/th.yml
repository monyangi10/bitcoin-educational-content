question: ข้อได้เปรียบของ Ark เหนือ Lightning ในการรับชำระเงินคืออะไร?
answer: ไม่จำเป็นต้องมีสภาพคล่องขาเข้า
wrong_answers:
  - การชำระเงินขั้นสุดท้ายทันที
  - ไม่มีค่าธรรมเนียมการทำธุรกรรม
  - ไม่จำเป็นต้องมี wallet
explanation: |
  Ark ช่วยให้รับชำระเงินได้โดยไม่ต้องมีสภาพคล่องขาเข้าล่วงหน้า
reviewed: false
question: Ni akahe kamaro Ark itanga ugereranije na Lightning mu kwakira?
answer: Nta bukene bw’amafaranga yinjira
wrong_answers:
  - Ukwemezwa kw’ishyura ako kanya
  - Kubura amafaranga y’ikorwa
  - Nta nkenerwa yo kugira ikofi
explanation: |
  Ark ituma umuntu yakira amahera atabanje kugira amafaranga yinjira.

question: อะไรที่ป้องกันไม่ให้ทุกคนใช้ Bitcoin wallet เดียวกัน?
answer: บุคคลที่แตกต่างกันต้องการกรณีการใช้งานที่แตกต่างกัน
wrong_answers:
  - มันมีราคาแพงที่จะใช้ Bitcoin Wallet
  - การใช้ Bitcoin Wallet เป็นสิ่งผิดกฎหมาย
  - ผู้คนจะไม่มีวันเห็นพ้องต้องกันในชื่อของ wallet เช่นนี้
explanation: |
  ในขณะที่บางคนอาจให้ความสำคัญกับความปลอดภัย คนอื่นอาจให้ความสำคัญกับความเป็นมิตรต่อผู้ใช้หรือคุณสมบัติเฉพาะ ดังนั้น Bitcoin Wallet เดียวอาจไม่ตอบสนองความต้องการของทุกคน ทำให้จำเป็นต้องมีตัวเลือก wallet หลายตัวเพื่อรองรับ
reviewed: true
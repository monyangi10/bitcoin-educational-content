question: Dlaczego nie wszyscy korzystają z takiego samego typu portfela Bitcoin?
answer: Każdy używa portfela do różnych celów.
wrong_answers:
  - Korzystanie z portfela Bitcoin jest kosztowne.
  - Używanie portfela Bitcoin jest nielegalne.
  - Ludzie nigdy nie zgodzą się co do nazwy takiego portfela.
explanation: |
  Podczas gdy jedna osoba może priorytetowo traktować bezpieczeństwo, inna może
  cenić sobie bardziej łatwość obsługi lub określone funkcje. Jeden portfel Bitcoin może nie spełniać wszystkich tych wymagań jednocześnie, co sprawia, że konieczne jest istnienie wielu typów portfeli.
reviewed: true

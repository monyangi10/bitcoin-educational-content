question: Какво пречи на всички да използват един и същ Bitcoin портфейл?
answer: Различните хора се нуждаят от различни случаи на използване.
wrong_answers:
  - Използването на Bitcoin портфейл е скъпо.
  - Използването на Bitcoin портфейл е незаконно.
  - Хората никога няма да се съгласят с името на такъв портфейл.
explanation: |
  Докато един човек може да даде приоритет на сигурността, друг може да
  да цени удобството за потребителя или определени функции. Следователно, един
  портфейл може да не отговаря на изискванията на всеки
  изискванията, което налага използването на няколко портфейла
  да съществуват различни варианти.
reviewed: true

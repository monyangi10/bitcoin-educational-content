question: Ni igiki coshobora kuba ari co gihangayikishije cane ku bijanye n’uburyo bwo gukoresha amabanki?
answer: Amategeko y’urukino rwa banki ntaboneka kandi ntashobora gutahurwa na bose.
wrong_answers:
  - Uburyo bwo gukoresha amabanki buraryoshe cane gutahura.
  - Uburyo bwo gukora amabanki buraboneka cane.
  - Ubuhinga bwa banki buratandukanye cane.
explanation: >-
reviewed: true
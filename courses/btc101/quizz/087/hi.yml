question: "Multisig" और "Wallet" क्या होता है?
answer: एक सेट वॉलेट्स जिसमें लेन-देन करने के लिए कई सिग्नेचर (हस्ताक्षर) चाहिए।
wrong_answers:
  - एक जीडब्ल्यू-2 जिसमें लेन-देन करने के लिए सिर्फ एक ही दस्तखत की ज़रूरत होती है।
  - एक Wallet जिसे लेन-देन करने के लिए किसी सिग्नेचर की जरूरत नहीं होती।
  - एक जीडब्ल्यू-4 जिसमें लेन-देन करने के लिए भौतिक हस्ताक्षर की जरूरत होती है।
explanation: |
  एक Multisig Wallet, Bitcoin Wallet का एक प्रकार है जिसकी जरूरत होती है
  एक लेन-देन करने के लिए कई हस्ताक्षरों की ज़रूरत होती है। यह एक अतिरिक्त सुरक्षा परत जोड़ देता है।
  एक्स्ट्रा जीडब्ल्यू-8 सुरक्षा का, क्योंकि इसका मतलब है कि सिर्फ एक आदमी
  बिना मंजूरी के लेन-देन नहीं कर सकते
  दूसरों।
reviewed: true
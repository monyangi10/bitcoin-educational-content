question: Multisig Wallet을 사용하면 어떤 위험이 있나요?
answer: 충분한 개별 개인 키 또는 백업 구성 요소에 액세스할 수 없습니다.
wrong_answers:
  - 충분한 개별 개인 키 또는 백업 구성 요소에 액세스할 수 있습니다.
  - 다른 당사자와 개인 키를 공유합니다.
  - 다른 당사자와 공개 키를 공유합니다.
explanation: |

question: Какъв е рискът от използването на мултисиг портфейл?
answer: Нямате достъп до достатъчно индивидуални частни ключове или резервни компоненти.
wrong_answers:
  - Да имате достъп до достатъчно индивидуални частни ключове или резервни компоненти.
  - Споделяне на частните ви ключове с други страни.
  - Споделяне на публичните ви ключове с други страни.
explanation: |
  Когато използвате мултисиг портфейл, всеки частен ключ на
  трябва да се съхраняват на различни места. Това е
  защото мултисигът изисква множество подписи, за да пренася
  транзакция, така че определен брой портфейли са
  необходими. По този начин съхраняването на всяка част на различно място
  добавя допълнително ниво на сигурност.
reviewed: true

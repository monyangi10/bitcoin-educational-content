question: Vad är risken med att använda en Multisig Wallet?
answer: Att inte ha tillgång till tillräckligt många individuella privata nycklar eller reservkomponenter.
wrong_answers:
  - Att ha tillgång till tillräckligt många individuella privata nycklar eller reservkomponenter.
  - Dela dina privata nycklar med andra parter.
  - Dela dina publika nycklar med andra parter.
explanation: |
  När du använder en Multisig Wallet ska varje privat nyckel för
  Multisig bör lagras på olika platser. Detta beror på
  eftersom Multisig kräver flera signaturer för att utföra
  för att genomföra en transaktion, så ett visst antal plånböcker
  behövs. Genom att förvara varje del på olika platser
  till en extra Layer av säkerhet.
reviewed: true
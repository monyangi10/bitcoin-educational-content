question: Multisig Wallet nedir?
answer: Bir işlem gerçekleştirmek için birden fazla imza gerektiren bir cüzdan seti.
wrong_answers:
  - Bir işlemi gerçekleştirmek için tek bir imza gerektiren bir Wallet.
  - Bir işlemi gerçekleştirmek için imza gerektirmeyen bir Wallet.
  - Bir işlemi gerçekleştirmek için fiziksel imza gerektiren bir Wallet.
explanation: |
  Bir Multisig Wallet, aşağıdakileri gerektiren bir Bitcoin Wallet türüdür
  bir işlemi gerçekleştirmek için birden fazla imza. Bu bir ekler
  ekstra Layer güvenlik, çünkü tek bir kişinin
  onayı olmadan bir işlem gerçekleştiremez
  diğerleri.
reviewed: true
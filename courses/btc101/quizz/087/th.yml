question: ความเสี่ยงของการใช้ multisig wallet คืออะไร?
answer: การไม่มีสิทธิ์เข้าถึงกุญแจส่วนตัวหรือส่วนประกอบสำรองเพียงพอ
wrong_answers:
  - การเข้าถึงกุญแจส่วนตัวหรือส่วนประกอบสำรองที่เพียงพอ
  - การแชร์คีย์ส่วนตัวของคุณกับบุคคลอื่น
  - การแชร์คีย์สาธารณะของคุณกับบุคคลอื่น
explanation: |
  เมื่อคุณใช้ multisig wallet คีย์ส่วนตัวแต่ละอันของ multisig ควรถูกเก็บไว้ในสถานที่ต่างๆ นี่เป็นเพราะ multisig ต้องการลายเซ็นหลายอันเพื่อดำเนินการทำธุรกรรม ดังนั้นจึงจำเป็นต้องมีจำนวนกระเป๋าเงินที่แน่นอน ดังนั้นการเก็บแต่ละส่วนในสถานที่ต่างๆ จะเพิ่มชั้นความปลอดภัยเพิ่มเติม
reviewed: true
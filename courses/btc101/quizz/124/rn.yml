question: Ni uruhara uruhe rw’uruzitiro rwa Bitcoin mu rubuga rwa Bitcoin?
answer: Iremeza amabuye mashasha n’ibikorwa vyashizwemwo.
wrong_answers:
  - Irema Bitcoins nshasha ikazishira mu ma blocs.
  - Igenzura igiciro ca Bitcoin.
  - Ni ryo ricungera urubuga rwa Bitcoin.
explanation: |
  Igikoresho ca Bitcoin kiri mu rubuga rwa Bitcoin gikora
  kwemeza amabuye mashasha n’ibikorwa vy’ubudandaji birimwo. Ni vyo
  uru rubuga rw'ibihimba vya Bitcoin bituma vy'ukuri
  ry’inzego zitandukanye.
reviewed: true
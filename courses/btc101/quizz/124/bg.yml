question: Каква е ролята на възела в мрежата Bitcoin?
answer: Той валидира нови блокове и включените в него транзакции.
wrong_answers:
  - Той създава нови биткойни и ги поставя в блоковете.
  - Тя регулира цената на Bitcoin.
  - Той управлява мрежата Bitcoin.
explanation: |
  Възелът в мрежата на Bitcoin обработва
  валидирането на нови блокове и включени транзакции. Той е
  част мрежа от възли в Bitcoin и го прави наистина
  децентрализиран.
reviewed: true

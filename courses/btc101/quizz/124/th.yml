question: บทบาทของโหนด Bitcoin ในเครือข่าย Bitcoin คืออะไร?
answer: มันตรวจสอบความถูกต้องของบล็อกใหม่และธุรกรรมที่รวมอยู่
wrong_answers:
  - มันสร้างบิตคอยน์ใหม่และใส่ไว้ในบล็อก
  - มันควบคุมราคาของ Bitcoin.
  - มันจัดการเครือข่าย Bitcoin
explanation: |
  โหนด Bitcoin ในเครือข่าย Bitcoin จัดการการตรวจสอบความถูกต้องของบล็อกใหม่และธุรกรรมที่รวมอยู่ เป็นเครือข่ายของโหนด Bitcoin นี้ที่ทำให้มันเป็นการกระจายศูนย์อย่างแท้จริง
reviewed: true
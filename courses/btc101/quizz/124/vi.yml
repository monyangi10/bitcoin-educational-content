question: Vai trò của một máy chủ Bitcoin trong mạng lưới Bitcoin là gì?
answer: Nó xác thực các khối mới và các giao dịch bao gồm.
wrong_answers:
  - Nó tạo ra Bitcoin mới và đưa chúng vào các khối.
  - Nó điều chỉnh giá của Bitcoin.
  - Nó quản lý mạng lưới Bitcoin.
explanation: |
  Một máy chủ Bitcoin trong mạng lưới Bitcoin xử lý
  việc xác thực các khối mới và các giao dịch bao gồm. Chính
  mạng lưới các máy chủ Bitcoin này làm cho mạng thực sự được
  phân quyền.
reviewed: true
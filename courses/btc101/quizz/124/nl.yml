question: Wat is de rol van een Bitcoin knooppunt in het Bitcoin netwerk?
answer: Het valideert nieuwe blokken en opgenomen transacties.
wrong_answers:
  - Het creëert nieuwe Bitcoins en plaatst ze in de blokken.
  - Het reguleert de prijs van Bitcoin.
  - Het beheert het Bitcoin netwerk.
explanation: |
  Een Bitcoin knooppunt in het Bitcoin netwerk zorgt voor de
  de validatie van nieuwe blokken en opgenomen transacties. Het is
  dit netwerk van Bitcoin knooppunten dat het echt
  gedecentraliseerd maakt.
reviewed: true
question: Jaka jest rola węzła Bitcoin w sieci Bitcoin?
answer: Weryfikuje nowe bloki i zawarte w nich transakcje.
wrong_answers:
  - Tworzy nowe bitcoiny i umieszcza je w blokach.
  - Reguluje cenę bitcoina.
  - Zarządza siecią Bitcoin.
explanation: |
  Węzeł Bitcoin w sieci Bitcoin obsługuje
  walidację nowych bloków i zawartych w nich transakcji. To właśnie
  ta sieć węzłów Bitcoin sprawia, że jest ona prawdziwie
  zdecentralizowana.
reviewed: true

question: หลักสูตรนี้แนะนำอะไรเกี่ยวกับจังหวะการเรียนรู้เกี่ยวกับ Bitcoin?
answer: มันซับซ้อนที่จะซึมซับทุกอย่างในครั้งเดียว ดังนั้นใช้เวลาของคุณ
wrong_answers:
  - มันง่ายที่จะเรียนรู้ทุกอย่างในครั้งเดียว
  - เป็นไปไม่ได้ที่จะเรียนรู้ทุกอย่างเกี่ยวกับ Bitcoin
  - ไม่จำเป็นต้องเรียนรู้ทุกอย่างเกี่ยวกับ Bitcoin
explanation: |
  หลักสูตรแนะนำว่ามีสิ่งมากมายให้สำรวจด้วย
  Bitcoin ซึ่งซับซ้อนเกินกว่าจะรับรู้ทุกอย่างได้ในคราวเดียว ดังนั้นควรใช้เวลาให้เต็มที่
reviewed: true
question: 이 과정은 Bitcoin에 대한 학습 속도에 대해 무엇을 제안하나요?
answer: 한 번에 모든 것을 흡수하는 것은 복잡하므로 천천히 하세요.
wrong_answers:
  - 모든 것을 한 번에 쉽게 배울 수 있습니다.
  - Bitcoin에 대한 모든 것을 배우는 것은 불가능합니다.
  - Bitcoin에 대한 모든 것을 배울 필요는 없습니다.
explanation: |
  이 과정은 탐색 할 것이 너무 많다는 것을 암시합니다
  한 번에 모든 것을 흡수하기에는 복잡하기 때문에
  한 번에 모든 것을 흡수하는 것은 복잡하므로 시간을 들여야 합니다.
reviewed: true
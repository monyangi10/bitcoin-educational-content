question: Vad säger den här kursen om takten i lärandet om Bitcoin?
answer: Det är komplicerat att ta till sig allt på en gång, så ta god tid på dig.
wrong_answers:
  - Det är lätt att lära sig allt på en gång.
  - Det är omöjligt att lära sig allt om Bitcoin.
  - Det är onödigt att lära sig allt om Bitcoin.
explanation: |
  Kursen tyder på att det finns så mycket att utforska med
  Bitcoin att det är komplicerat att ta till sig allt på en gång
  på en gång, så man bör ta sin tid.
reviewed: true
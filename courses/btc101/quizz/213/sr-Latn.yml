question: Šta ovaj kurs sugeriše o tempu učenja o Bitkoina?
answer: Komplikovano je asimilovati sve odjednom, zato uzmi svoje vreme.
wrong_answers:
  - Lako je naučiti sve odjednom.
  - Nemoguće je naučiti sve o Bitkoinu.
  - Nije neophodno naučiti sve o Bitkoinu.
explanation: |
  Kurs sugeriše da postoji mnogo toga za istraživanje sa
  Bitkoinom i da je komplikovano asimilirati sve odjednom, tako da bi trebalo uzeti vremena.
reviewed: true

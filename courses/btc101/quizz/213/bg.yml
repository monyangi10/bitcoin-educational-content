question: Какво подсказва този курс за темпото на изучаване на Bitcoin?
answer: Сложно е да се усвои всичко наведнъж, затова не бързайте.
wrong_answers:
  - Лесно е да научите всичко наведнъж.
  - Невъзможно е да научите всичко за Bitcoin.
  - Не е необходимо да научавате всичко за Bitcoin.
explanation: |
  Курсът подсказва, че има какво да се изследва с
  Bitcoin, че е сложно да се усвои всичко на
  затова трябва да се отдели време.
reviewed: true
question: Wat suggereert deze cursus over het leertempo van Bitcoin?
answer: Het is ingewikkeld om alles in één keer te verwerken, dus neem je tijd.
wrong_answers:
  - Het is gemakkelijk om alles in één keer te leren.
  - Het is onmogelijk om alles over Bitcoin te weten te komen.
  - Het is niet nodig om alles over Bitcoin te leren.
explanation: |
  De cursus suggereert dat er zoveel te ontdekken valt met
  Bitcoin dat het ingewikkeld is om alles in één keer te verwerken
  in één keer te verwerken, dus men moet er de tijd voor nemen.
reviewed: true
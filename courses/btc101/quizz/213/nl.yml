question: Wat is het belangrijkste doel van de Bitcoin revolutie volgens deze cursus?
answer: Een wereld creëren waarin menselijke soevereiniteit een recht is, privacy standaard wordt gerespecteerd en geld niet wordt gemanipuleerd.
wrong_answers:
  - Een wereld creëren waarin privacy geen mensenrecht is en geld wordt gemanipuleerd door de banken.
  - Een wereld creëren waarin regeringen geen macht hebben en de samenleving chaotisch is.
  - Een wereld creëren waarin fysiek geld overbodig is.
explanation: |
  Deze cursustekst suggereert dat het belangrijkste doel van de Bitcoin
  revolutie is om een wereld te creëren waarin menselijke soevereiniteit
  een recht is, privacy standaard wordt gerespecteerd en geld niet wordt
  gemanipuleerd wordt.
reviewed: true
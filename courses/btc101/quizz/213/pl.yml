question: Co ten kurs sugeruje na temat tempa nauki o Bitcoinie?
answer: Trudno jest przyswoić wszystko na raz, więc nie spiesz się.
wrong_answers:
  - Łatwo jest nauczyć się wszystkiego na raz.
  - Nie sposób dowiedzieć się wszystkiego o Bitcoinie.
  - Nie trzeba uczyć się wszystkiego o Bitcoinie.
explanation: |
  Kurs sugeruje, że jest tak wiele do zbadania na temat
  Bitcoina, że przyswojenie wszystkiego naraz jest skomplikowane,
  więc nie należy się spieszyć.
reviewed: true

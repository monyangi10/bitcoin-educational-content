question: Wat is het mogelijke gevolg van een plotselinge waardevermindering of een verlies van vertrouwen in een fiduciaire valuta?
answer: Hyperinflatie.
wrong_answers:
  - Deflatie.
  - Een stabiele economie.
  - Een waardestijging van de valuta.
explanation: |
  Een plotselinge devaluatie of een verlies van vertrouwen in een fiduciaire
  valuta kan leiden tot hyperinflatie. Dit is een situatie
  waarin de prijzen van goederen en diensten extreem
  extreem hoog tempo stijgen, wat vaak leidt tot economische instabiliteit.
reviewed: true
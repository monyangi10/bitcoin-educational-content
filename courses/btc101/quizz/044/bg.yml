question: Какво е влиянието на инфлацията от 2% върху покупателната способност за период от 5 години?
answer: Губите 10% от покупателната си способност.
wrong_answers:
  - Губите 2% от покупателната си способност.
  - Губите 5% от покупателната си способност.
  - Губите 20% от покупателната си способност.
explanation: |
  При 2% инфлация губите 2% от покупателната си способност
  годишно, което прави 10% за 5 години.
reviewed: true
question: ผลกระทบของเงินเฟ้อ 2% ต่ออำนาจการซื้อในระยะเวลา 5 ปีคืออะไร?
answer: คุณสูญเสียอำนาจการซื้อ 10%
wrong_answers:
  - คุณสูญเสียอำนาจการซื้อ 2%
  - คุณสูญเสียอำนาจการซื้อ 5%
  - คุณสูญเสียอำนาจการซื้อ 20%
explanation: |
  ด้วยอัตราเงินเฟ้อ 2% คุณจะสูญเสียอำนาจการซื้อ 2% ต่อปี ซึ่งเท่ากับ 10% ในระยะเวลา 5 ปี
reviewed: true
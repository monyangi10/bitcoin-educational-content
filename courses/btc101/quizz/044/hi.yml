question: अगर किसी फिड्यूशियरी करेंसी (भरोसे पर चलने वाली मुद्रा) का अचानक मूल्य गिर जाए या उस पर लोगों का भरोसा उठ जाए, तो क्या हो सकता है?  

इसके कुछ संभावित नतीजे हो सकते हैं:  

1. **महँगाई बढ़ना (Inflation)**: करेंसी के गिरने से आयातित चीज़ें महँगी हो जाएँगी, जिससे जीवनयापन का खर्च बढ़ सकता है।  
2. **ब्याज दरों में वृद्धि**: सरकार या केंद्रीय बैंक महँगाई रोकने के लिए ब्याज दरें बढ़ा सकते हैं, जिससे कर्ज लेना मुश्किल हो जाएगा।  
3. **पूँजी का बहिर्गमन (Capital Flight)**: निवेशक दूसरे देशों या स्थिर मुद्राओं (जैसे सोना, डॉलर) में पैसा लगाने लगेंगे।  
4. **आर्थिक मंदी (Recession)**: विश्वास कम होने से व्यापार और निवेश धीमा पड़ सकता है, जिससे रोज़गार और उत्पादन पर असर पड़ेगा।  
5. **सामाजिक अशांति**: कीमतें बढ़ने और आर्थिक तनाव से लोगों में नाराज़गी फैल सकती है, जिससे विरोध प्रदर्शन या राजनीतिक अस्थिरता हो सकती है।  

उदाहरण के लिए, ज़िम्बाब्वे या वेनेज़ुएला जैसे देशों में हाइपरइन्फ्लेशन के दौरान यही हुआ था।  

क्या आप किसी खास करेंसी या स्थिति के बारे में जानना चाहते हैं?
answer: हाइपरइन्फ्लेशन (महंगाई का बहुत तेजी से बढ़ना)।
wrong_answers:
  - मंदी।
  - एक स्थिर अर्थव्यवस्था।
  - मुद्रा के मूल्य में वृद्धि।
explanation: |
  अचानक मुद्रा का अवमूल्यन या किसी भरोसेमंद चीज़ पर विश्वास का नुकसान
  मुद्रा हाइपरइन्फ्लेशन की वजह बन सकती है। यह एक ऐसी स्थिति है
  माल और सेवाओं की कीमतें बढ़ने पर
  बहुत ही ज़्यादा दर, जिससे अक्सर आर्थिक अस्थिरता हो जाती है।
reviewed: true
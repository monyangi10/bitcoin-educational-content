question: 5 वर्षों में 2% मुद्रास्फीति का क्रय शक्ति पर क्या प्रभाव पड़ेगा?
answer: आप अपनी क्रय शक्ति का 10% खो देते हैं।
wrong_answers:
  - आप अपनी क्रय शक्ति का 2% खो देते हैं।
  - आप अपनी क्रय शक्ति का 5% खो देते हैं।
  - आप अपनी क्रय शक्ति का 20% खो देते हैं।
explanation: |
  2% मुद्रास्फीति के साथ, आप अपनी क्रय शक्ति का 2% सालाना खो देते हैं, जो 5 वर्षों में 10% हो जाता है।
reviewed: true
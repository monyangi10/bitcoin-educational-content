question: Какво представлява DCA?
answer: Услуга, която позволява на потребителите да инвестират фиксирана сума пари в актив на редовни интервали.
wrong_answers:
  - Вид обмен на криптовалути, който позволява търговия само с Bitcoin.
  - Финансова услуга, която предоставя заеми на инвеститори за маржин търговия.
  - Софтуерен инструмент, който проследява цените на акциите в реално време без никакви инвестиционни функции.
explanation: |
  DCA се отнася до платформа, която улеснява
  Усредняване на разходите в долари (DCA) - инвестиционна стратегия, при която
  физическо лице инвестира фиксирана сума пари в
  определен актив на редовни интервали от време, независимо от
  независимо от цената на актива.
reviewed: true

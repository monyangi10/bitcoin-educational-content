question: DCA 플랫폼이란 무엇인가요?
answer: 사용자가 일정 금액을 일정 주기로 자산에 투자할 수 있는 서비스입니다.
wrong_answers:
  - Bitcoin의 거래만 허용하는 암호화폐 Exchange의 일종입니다.
  - 투자자에게 마진 거래를 위한 대출을 제공하는 금융 서비스입니다.
  - 투자 기능 없이 실시간으로 주가를 추적하는 소프트웨어 도구입니다.
explanation: |
  DCA 플랫폼은 다음을 용이하게 하는 플랫폼을 말합니다
  투자 전략인 달러 코스트 애버리징(DCA)을 촉진하는 플랫폼을 말합니다
  개인이 특정 자산에 고정된 금액을
  특정 자산에 일정 금액을 투자하는 투자 전략입니다
  자산의 가격.
reviewed: true
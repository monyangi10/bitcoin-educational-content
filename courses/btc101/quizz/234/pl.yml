question: Czym jest platforma DCA?
answer: Usługa, która umożliwia użytkownikom inwestowanie w aktywa stałej kwoty pieniędzy w regularnych odstępach czasu.
wrong_answers:
  - Rodzaj kryptowaluty, która pozwala jedynie na handel bitcoinem.
  - Usługa finansowa, która zapewnia inwestorom pożyczki na handel z depozytem zabezpieczającym.
  - Narzędzie programowe, które śledzi ceny akcji w czasie rzeczywistym bez żadnych funkcji inwestycyjnych.
explanation: |
  Platforma DCA to platforma, która ułatwia strategię inwestycyjną o nazwie Dollar-Cost Averaging (DCA), w której
  osoba fizyczna inwestuje stałą kwotę pieniędzy w regularnych odstępach czasu niezależnie od ceny aktywa.
reviewed: true

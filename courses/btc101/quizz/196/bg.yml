question: Какво трябва да направите, след като сте закупили Bitcoin на платформа за обмен?
answer: Изтеглете биткойни и ги изпратете на вашия портфейл.
wrong_answers:
  - Оставете биткойни в платформата.
  - Незабавно продайте биткойни.
  - Прехвърляне на биткойни в друга платформа за обмен.
explanation: |
  В текста на курса се препоръчва след закупуване на Bitcoin да се
  трябва незабавно да изтегли UTXO от платформите за обмен
  за да се минимизират рисковете от хакерски атаки и блокиране на средства.
reviewed: true

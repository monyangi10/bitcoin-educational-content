question: Co należy zrobić po zakupie bitcoinów na platformie wymiany?
answer: Wypłacić bitcoiny i wysłać je do swojego portfela.
wrong_answers:
  - Pozostawić bitcoiny na platformie.
  - Natychmiast sprzedać bitcoiny.
  - Przenieść bitcoiny na inną platformę wymiany.
explanation: |
  Tekst kursu informuje, że po zakupie bitcoinów należy natychmiast wycofać UTXO z platformy wymiany,
  aby zminimalizować ryzyko hakowania i blokowania funduszy.
reviewed: true

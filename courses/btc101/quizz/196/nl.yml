question: Wat moet je doen na aankoop van Bitcoin op een Exchange platform?
answer: Bitcoins opnemen en naar je Wallet sturen.
wrong_answers:
  - Laat bitcoins achter op het platform.
  - Verkoop bitcoins onmiddellijk.
  - Bitcoins overzetten naar een ander Exchange platform.
explanation: |
  De cursustekst adviseert dat men na aanschaf van Bitcoin
  de UTXO's onmiddellijk van Exchange platforms moet halen
  om de risico's van hacken en het blokkeren van fondsen te minimaliseren.
reviewed: true
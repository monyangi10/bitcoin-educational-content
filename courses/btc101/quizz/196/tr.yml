question: Exchange platformunda Bitcoin satın aldıktan sonra ne yapmalısınız?
answer: Bitcoinleri çekin ve Wallet'nize gönderin.
wrong_answers:
  - Bitcoinleri platformda bırakın.
  - Hemen bitcoin sat.
  - Bitcoinleri başka bir Exchange platformuna aktarın.
explanation: |
  Kurs metni, Bitcoin'i satın aldıktan sonra
  uTXO'ları Exchange platformlarından derhal geri çekmelidir
  hackleme ve fon engelleme risklerini en aza indirmek için.
reviewed: true
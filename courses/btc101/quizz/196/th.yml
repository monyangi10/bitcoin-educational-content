question: คุณควรทำอะไรหลังจากซื้อ Bitcoin บนแพลตฟอร์มแลกเปลี่ยน?
answer: ถอนบิตคอยน์และส่งไปยัง wallet ของคุณ
wrong_answers:
  - ปล่อยบิทคอยน์ไว้บนแพลตฟอร์ม
  - ขายบิตคอยน์ทันที
  - โอนบิตคอยน์ไปยังแพลตฟอร์มแลกเปลี่ยนอื่น
explanation: |
  ข้อความในหลักสูตรแนะนำว่า หลังจากซื้อ Bitcoin แล้ว
  ควรถอน UTXOs จากแพลตฟอร์มแลกเปลี่ยนทันที
  เพื่อลดความเสี่ยงจากการถูกแฮ็กและการบล็อกเงินทุน
reviewed: true
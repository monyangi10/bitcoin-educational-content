question: Wat is de rol van geld als communicatiemiddel?
answer: Het maakt waardecommunicatie in ruimte en tijd mogelijk, zonder dat je een tegenpartij hoeft te vertrouwen.
wrong_answers:
  - Het maakt waardecommunicatie door de ruimte heen mogelijk, zonder de noodzaak om een tegenpartij te vertrouwen.
  - Het maakt waardecommunicatie alleen in de tijd mogelijk en zonder de noodzaak om een tegenpartij te vertrouwen.
  - Het maakt waardecommunicatie in ruimte en tijd mogelijk, zonder de noodzaak om een tegenpartij te vertrouwen.
explanation: |
  Geld als communicatiemiddel maakt communicatie mogelijk
  ruimte en tijd, omdat we onze tijd en energie omzetten in een
  activa die in de toekomst hergebruikt kunnen worden zonder het risico van
  devaluatie. Het maakt ook communicatie mogelijk in een universele
  gemeenschappelijke taal, waardoor twee vreemden Exchange, handel,
  en het eens zijn over de waarde van dingen.
reviewed: true
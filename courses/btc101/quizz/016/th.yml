question: บทบาทของเงินในฐานะเครื่องมือสื่อสารคืออะไร?
answer: มันช่วยให้การสื่อสารคุณค่าเกิดขึ้นได้ข้ามพื้นที่และเวลาโดยไม่จำเป็นต้องไว้วางใจคู่สัญญา
wrong_answers:
  - มันอนุญาตให้มีการสื่อสารมูลค่าข้ามพื้นที่เท่านั้นและไม่จำเป็นต้องไว้วางใจคู่สัญญา
  - มันอนุญาตให้มีการสื่อสารมูลค่าข้ามเวลาเท่านั้นและไม่จำเป็นต้องไว้วางใจคู่สัญญา
  - มันช่วยให้การสื่อสารคุณค่าเกิดขึ้นได้ข้ามพื้นที่และเวลา และไม่จำเป็นต้องไว้วางใจคู่สัญญา
explanation: |
  เงินในฐานะเครื่องมือสื่อสารช่วยให้การสื่อสารข้าม
  พื้นที่และเวลาเป็นไปได้ เมื่อเรานำเวลาและพลังงานของเราเปลี่ยนเป็น
  สินทรัพย์ที่สามารถนำกลับมาใช้ใหม่ในอนาคตโดยไม่มีความเสี่ยง
  จากการลดค่า นอกจากนี้ยังช่วยให้การสื่อสารในภาษากลางที่เป็นสากล
  ทำให้คนแปลกหน้าสองคนสามารถแลกเปลี่ยน ซื้อขาย
  และตกลงในมูลค่าของสิ่งต่าง ๆ ได้
reviewed: true
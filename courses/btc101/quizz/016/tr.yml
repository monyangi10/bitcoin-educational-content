question: Bir iletişim aracı olarak paranın rolü nedir?
answer: Bir karşı tarafa güvenmeye gerek kalmadan, zaman ve mekan ötesinde değer iletişimine olanak tanır.
wrong_answers:
  - Bir karşı tarafa güvenmeye gerek kalmadan yalnızca uzay üzerinden değer iletişimine izin verir.
  - Yalnızca zaman içinde ve bir karşı tarafa güvenmeye gerek kalmadan değer iletişimine izin verir.
  - Zaman ve mekan ötesinde ve bir karşı tarafa güvenme ihtiyacı olmadan değer iletişimine olanak tanır.
explanation: |
  Bir iletişim aracı olarak para, ülkeler arası iletişimi sağlar
  uzay ve zaman, zamanımızı ve enerjimizi bir
  riski olmadan gelecekte yeniden kullanılabilecek varlık
  devalüasyon. Aynı zamanda evrensel bir iletişim sağlar
  ortak dil, iki yabancının Exchange yapmasını, ticaret yapmasını sağlar,
  ve eşyaların değeri konusunda hemfikir olmak.
reviewed: true
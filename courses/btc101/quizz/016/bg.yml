question: Каква е ролята на парите като средство за комуникация?
answer: Тя позволява комуникация на стойност в пространството и времето, без да е необходимо да се доверявате на контрагент.
wrong_answers:
  - Тя позволява комуникация на стойност само в пространството и без необходимост от доверие в контрагент.
  - Той позволява комуникация на стойност само във времето и без да е необходимо да се доверявате на контрагент.
  - Тя позволява комуникация на стойност в пространството и времето, без да е необходимо да се доверявате на контрагент.
explanation: |
  Парите като средство за комуникация позволяват комуникация между
  пространството и времето, като трансформираме времето и енергията си в
  които могат да бъдат използвани отново в бъдеще без риск от
  обезценяване. Те също така позволяват комуникация в универсален
  общ език, като дава възможност на двама непознати да обменят, търгуват,
  и да се споразумеят за стойността на нещата.
reviewed: true
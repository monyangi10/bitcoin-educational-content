question: 커뮤니케이션 도구로서 돈의 역할은 무엇인가요?
answer: 상대방을 신뢰할 필요 없이 시공간을 초월하여 가치를 전달할 수 있습니다.
wrong_answers:
  - 상대방을 신뢰하지 않고도 공간을 넘어 가치 전달이 가능합니다.
  - 거래 상대방을 신뢰할 필요 없이 시간을 초월한 가치 전달이 가능합니다.
  - 시공간을 초월한 가치 소통이 가능하며 상대방을 신뢰할 수 있어야 합니다.
explanation: |
  커뮤니케이션 도구로서의 화폐는 시공간을 초월한 커뮤니케이션을 가능하게 합니다
  공간과 시간, 우리의 시간과 에너지를 미래에 위험 없이 재사용할 수 있는
  미래에 재사용할 수 있는 자산으로 전환하여
  평가 절하의 위험 없이. 또한 보편적인 공통 언어로
  보편적인 언어로 소통할 수 있게 해주며, 낯선 두 사람이 Exchange를 통해 거래하고,
  사물의 가치에 대해 합의할 수 있습니다.
reviewed: true
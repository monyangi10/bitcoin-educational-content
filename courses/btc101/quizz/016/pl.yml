question: Jaka jest rola pieniędzy jako narzędzia komunikacji?
answer: Umożliwiają komunikację wartości w przestrzeni i czasie bez konieczności zaufania kontrahentowi.
wrong_answers:
  - Pozwalają na komunikację wartości tylko w przestrzeni i bez potrzeby zaufania kontrahentowi.
  - Pozwalają na komunikację wartości tylko w czasie i bez konieczności ufania kontrahentowi.
  - Umożliwiają komunikację wartości w przestrzeni i czasie, ale wymagają zaufania kontrahentowi.
explanation: |
  Pieniądze jako narzędzie komunikacji przekraczają
  przestrzeń i czas, ponieważ przekształcamy nasz czas i energię w
  aktywa, które mogą być ponownie wykorzystane w przyszłości bez ryzyka
  dewaluacji. Umożliwiają również komunikację w uniwersalnym
  wspólnym języku, umożliwiając dwóm nieznajomym handel,
  i uzgadnianie wartości rzeczy.
reviewed: true

question: กลไกที่ทำให้มั่นใจได้ว่าบล็อกใหม่จะถูกเพิ่มลงในบล็อกเชนทุก ๆ สิบนาทีคืออะไร?
answer: การปรับความยาก
wrong_answers:
  - การปรับความเร็ว
  - การปรับเวลา
  - การปรับบล็อก
explanation: |
  กลไกที่ทำให้มั่นใจได้ว่าบล็อกใหม่จะถูกเพิ่มลงในบล็อกเชนทุก ๆ สิบนาทีคือการปรับความยาก การปรับนี้เกิดขึ้นทุก ๆ 2016 บล็อก หรือประมาณสองสัปดาห์
reviewed: true
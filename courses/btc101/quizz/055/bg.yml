question: Какъв е механизмът, който осигурява добавянето на нов блок към блокчейна на всеки десет минути?
answer: Регулиране на трудността.
wrong_answers:
  - Регулиране на скоростта.
  - Настройване на времето.
  - Регулиране на блока.
explanation: |
  Механизмът, който осигурява добавянето на нов блок в
  на всеки десет минути, е настройката на трудността.
  Тази корекция се извършва на всеки 2016 блока, или около
  две седмици.
reviewed: true
question: Какво би могло да се случи с традиционните услуги за парични преводи като Western Union, централните банки, Visa и Mastercard, ако те не приемат Lightning Network?
answer: Те могат да изчезнат.
wrong_answers:
  - Те могат да станат по-популярни.
  - Те могат да станат по-сигурни.
  - Те могат да станат по-децентрализирани.
explanation: |
  Традиционни услуги за парични преводи, като например Western Union,
  централните банки, Visa и Mastercard могат да изчезнат, ако
  не възприемат технологията Lightning Network.
reviewed: true
question: यदि वेस्टर्न यूनियन, केंद्रीय बैंक, वीज़ा और मास्टरकार्ड जैसी पारंपरिक धन हस्तांतरण सेवाओं ने Lightning Network को नहीं अपनाया तो उनका क्या होगा?
answer: वे गायब हो सकते हैं.
wrong_answers:
  - वे अधिक लोकप्रिय हो सकते हैं।
  - वे अधिक सुरक्षित हो सकते हैं।
  - वे अधिक विकेन्द्रित हो सकते हैं।
explanation: |
  वेस्टर्न यूनियन, केंद्रीय बैंक, वीज़ा और मास्टरकार्ड जैसी पारंपरिक धन हस्तांतरण सेवाएँ गायब हो सकती हैं यदि वे Lightning Network तकनीक को नहीं अपनाते हैं।
reviewed: true
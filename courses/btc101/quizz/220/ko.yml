question: 웨스턴 유니온, 중앙은행, 비자, 마스터카드와 같은 기존 송금 서비스가 Lightning Network을 채택하지 않는다면 어떻게 될까요?
answer: 사라질 수도 있습니다.
wrong_answers:
  - 더 많은 인기를 얻을 수 있습니다.
  - 보안이 더욱 강화될 수 있습니다.
  - 더 탈중앙화될 수 있습니다.
explanation: |
  웨스턴 유니온과 같은 전통적인 송금 서비스
  중앙은행, 비자, 마스터카드와 같은 전통적인 송금 서비스가 사라질 수 있습니다
  gW-1 기술을 채택하지 않으면 사라질 수 있습니다.
reviewed: true
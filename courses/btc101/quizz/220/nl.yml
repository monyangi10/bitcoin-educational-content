question: Wat zou er kunnen gebeuren met traditionele geldtransferdiensten zoals Western Union, centrale banken, Visa en Mastercard als ze Lightning Network niet aannemen?
answer: Ze kunnen verdwijnen.
wrong_answers:
  - Ze kunnen populairder worden.
  - Ze zouden veiliger kunnen worden.
  - Ze zouden meer gedecentraliseerd kunnen worden.
explanation: |
  Traditionele geldtransferdiensten zoals Western Union,
  centrale banken, Visa en Mastercard zouden kunnen verdwijnen als ze
  de Lightning Network technologie niet overnemen.
reviewed: true
question: Кое е основното предимство на златото като валута?
answer: Той е изключително издръжлив.
wrong_answers:
  - Лесно се дели или пренася на дълги разстояния.
  - Това е лесно проверимо.
  - Тя не се регулира от правителството.
explanation: |
  Въпреки че не е лесно делима или преносима през
  на големи разстояния, златото е много издръжлив материал, който
  което го прави добро средство за съхранение на стойност. Златните монети се използват като
  в миналото, но те не биха могли да служат по същия
  в днешната цифрова ера.
reviewed: true
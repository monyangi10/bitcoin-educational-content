question: Ni akamaro akahe nyamukuru k’inzahabu nk’amahera?
answer: Ni ikintu gikomeye cane.
wrong_answers:
  - Biroroshe gucapura canke gutwara ku rugendo rurerure.
  - Biroroshe kugenzura.
  - Ntibitegekanijwe na leta.
explanation: |
  Naho bidashobora gucapura canke gutwarwa bitagoranye ku .
  ingendo ndende, inzahabu ni ikintu gikomeye cane, kikaba
  bituma iba nziza ububiko bw’agaciro. Ibiceri vy’inzahabu vyakoreshwa nk’
  amafaranga yo mu bihe vya kera, ariko ntibari gukora kimwe .
  intumbero mu gihe c’ubuhinga bwa none.
reviewed: true
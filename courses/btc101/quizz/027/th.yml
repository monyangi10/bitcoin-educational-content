question: ข้อได้เปรียบหลักของทองคำในฐานะสกุลเงินคืออะไร?
answer: มันมีความทนทานอย่างมาก
wrong_answers:
  - มันสามารถแบ่งแยกหรือขนส่งได้ง่ายในระยะทางไกล
  - มันสามารถตรวจสอบได้ง่าย
  - มันไม่ได้ถูกควบคุมโดยรัฐบาล
explanation: |
  แม้ว่าจะไม่สามารถแบ่งแยกหรือขนส่งได้ง่ายในระยะทางไกล ทองคำเป็นวัสดุที่ทนทานมาก ซึ่งทำให้มันเป็นที่เก็บรักษามูลค่าที่ดี เหรียญทองเคยถูกใช้เป็นสกุลเงินในอดีต แต่จะไม่สามารถทำหน้าที่เดียวกันในยุคดิจิทัลในปัจจุบัน
reviewed: true
question: 통화로서 금의 주요 장점은 무엇인가요?
answer: 내구성이 매우 뛰어납니다.
wrong_answers:
  - 쉽게 분할하거나 장거리 이동이 가능합니다.
  - 쉽게 확인할 수 있습니다.
  - 정부의 규제를 받지 않습니다.
explanation: |
  금은 쉽게 나눌 수 있거나 장거리 운송이 가능하지는 않지만
  금은 매우 내구성이 강한 소재이기 때문에
  가치 저장 수단으로 좋습니다. 금화는 과거에 화폐로 사용되었지만
  화폐로 사용되었지만 오늘날의 디지털 시대에는
  오늘날의 디지털 시대에는 그 용도가 달라졌습니다.
reviewed: true
question: Wat is het belangrijkste voordeel van goud als betaalmiddel?
answer: Het is ongelooflijk duurzaam.
wrong_answers:
  - Het is gemakkelijk deelbaar of vervoerbaar over lange afstanden.
  - Het is gemakkelijk te verifiëren.
  - Het wordt niet gereguleerd door de overheid.
explanation: |
  Hoewel het niet makkelijk deelbaar of transporteerbaar is over
  lange afstanden, is goud een zeer duurzaam materiaal, waardoor het een goede
  waardoor het een goede waardeopslagplaats is. Gouden munten werden in het
  als valuta in het verleden, maar ze zouden niet hetzelfde
  doel in het huidige digitale tijdperk.
reviewed: true
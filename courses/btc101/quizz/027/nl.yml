question: Waarom wordt Bitcoin tegenwoordig niet algemeen aanvaard in de handel?
answer: Omdat het niet op grote schaal wordt toegepast door individuen.
wrong_answers:
  - Omdat het niet vervoerbaar is.
  - Omdat het niet deelbaar is in kleine eenheden.
  - Omdat het geen Liquid is.
explanation: |
  Ondanks zijn eigenschappen, zoals zijn strikt beperkte
  Supply, is Bitcoin nog steeds niet algemeen geaccepteerd in de handel
  door het gebrek aan acceptatie door individuen, dus worden
  winkeliers worden niet aangemoedigd om het te accepteren.
reviewed: true
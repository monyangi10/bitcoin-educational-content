question: คำว่า hodl หมายถึงอะไร?
answer: Hodl เป็นคำสแลงในชุมชนสกุลเงินดิจิทัลที่หมายถึงการถือครองการลงทุนของคุณไว้แทนที่จะขาย โดยเฉพาะในช่วงที่ตลาดมีความผันผวน
wrong_answers:
  - Hodl หมายถึงประเภทของสกุลเงินดิจิทัลที่ใช้สำหรับการซื้อขายเท่านั้น
  - Hodl เป็นคำที่หมายถึงการขายสกุลเงินดิจิทัลทั้งหมดของคุณในราคาสูง
  - Hodl เป็นกลยุทธ์สำหรับการเทรดรายวันที่เกี่ยวข้องกับการซื้อและขายบ่อยครั้ง
explanation: |
  คำว่า hodl มีต้นกำเนิดมาจากโพสต์ออนไลน์ที่สะกดผิดในปี 2013 บนฟอรัม Bitcoin เมื่อเวลาผ่านไป hodl ได้พัฒนาเป็นกลยุทธ์การลงทุนที่กว้างขึ้น มันสนับสนุนให้นักลงทุนถือครองสกุลเงินดิจิทัลของพวกเขาในระยะยาว โดยไม่คำนึงถึงความผันผวนของตลาด
reviewed: true
question: HODL शब्द का क्या अर्थ है?
answer: HODL क्रिप्टोकरेंसी समुदाय में एक प्रचलित शब्द है जिसका अर्थ है अपने निवेश को बेचने के बजाय उसे बनाए रखना, विशेष रूप से बाजार में अस्थिरता के दौरान।
wrong_answers:
  - HODL एक प्रकार की क्रिप्टोकरेंसी को संदर्भित करता है जिसका उपयोग केवल व्यापार के लिए किया जाता है।
  - HODL एक शब्द है जिसका अर्थ है अपनी सभी क्रिप्टोकरेंसी को ऊंचे मूल्य पर बेचना।
  - HODL दिन के कारोबार के लिए एक रणनीति है जिसमें बार-बार खरीदना और बेचना शामिल होता है।
explanation: |
  HODL शब्द की उत्पत्ति 2013 में Bitcoin फ़ोरम पर एक गलत वर्तनी वाली ऑनलाइन पोस्ट से हुई थी। समय के साथ, HODL एक व्यापक निवेश रणनीति का प्रतिनिधित्व करने के लिए विकसित हुआ है। यह निवेशकों को बाज़ार में उतार-चढ़ाव की परवाह किए बिना, लंबे समय तक अपनी क्रिप्टोकरेंसी को बनाए रखने के लिए प्रोत्साहित करता है।
reviewed: true
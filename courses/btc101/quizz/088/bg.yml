question: Какво означава терминът hodl?
answer: Жаргонен термин в криптовалутната общност, който означава да задържите инвестициите си, вместо да ги продавате, особено по време на пазарна волатилност.
wrong_answers:
  - Hodl се отнася за вид криптовалута, която се използва само за търговия.
  - Hodl е термин, който означава да продадете цялата си криптовалута на висока цена.
  - Hodl е стратегия за дневна търговия, която включва чести покупки и продажби.
explanation: |
  Терминът hodl произлиза от грешно написана онлайн публикация във форум на Bitcoin през 2013 г. С течение на времето hodl се превърна в по-широка инвестиционна стратегия. Тя насърчава инвеститорите да задържат своите криптовалути в дългосрочен план, независимо от пазарните колебания.
reviewed: true

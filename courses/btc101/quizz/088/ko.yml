question: HODL이란 용어는 무엇을 의미하나요?
answer: HODL은 암호화폐 커뮤니티에서 사용하는 은어로, 특히 시장 변동성이 클 때 투자금을 매도하지 말고 보유하자는 의미입니다.
wrong_answers:
  - HODL는 거래용으로만 사용되는 암호화폐의 한 종류를 말합니다.
  - HODL는 모든 암호화폐를 높은 가격에 판매한다는 의미의 용어입니다.
  - HODL는 매매를 자주 하는 데이 트레이딩을 위한 전략입니다.
explanation: |
  HODL라는 용어는 2013년 Bitcoin 포럼의 철자가 틀린 온라인 게시물에서 유래했으며, 시간이 지나면서 HODL는 더 광범위한 투자 전략을 나타내는 용어로 발전했습니다. 이는 투자자가 시장 변동에 관계없이 암호화폐를 장기적으로 보유하도록 장려합니다.
reviewed: true
question: Apa arti istilah Hold?
answer: Hold adalah istilah gaul di komunitas cryptocurrency yang berarti mempertahankan investasi Anda daripada menjualnya, terutama selama volatilitas pasar.
wrong_answers:
  - Hold mengacu pada jenis cryptocurrency yang hanya digunakan untuk perdagangan.
  - Hold adalah istilah yang berarti menjual semua cryptocurrency Anda dengan harga tinggi.
  - Hold adalah strategi perdagangan harian yang melibatkan pembelian dan penjualan secara sering.
explanation: |
  Istilah Hold berasal dari postingan online yang salah eja pada tahun 2013 di forum Bitcoin. Seiring waktu, hold telah berkembang untuk mewakili strategi investasi yang lebih luas. ini mendorong investor untuk mempertahankan cryptocurrency mereka dalam jangka panjang, terlepas dari fluktuasi pasar.
reviewed: true
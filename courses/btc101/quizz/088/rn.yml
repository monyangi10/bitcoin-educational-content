question: Ijambo HODL risobanura iki?
answer: HODL ni ijambo ry’ikirundi mu muryango w’amahera y’ibanga risobanura gufata ku vyo ushora aho kubigurisha, cane cane mu gihe isoko rihinduka.
wrong_answers:
  - HODL yerekeza ku bwoko bw’amahera y’ibanga akoreshwa mu gucuruza gusa.
  - HODL ni ijambo risobanura kugurisha amafaranga yawe yose y’ivy’ubuhinga bwa none kugiciro kinini.
  - HODL ni ubuhinga bwo gucuruza ku musi bujanye no kugura no kugurisha kenshi.
explanation: |
  Ijambo HODL ryakomotse ku vyo yanditse kuri internet mu 2013 ku rubuga rwa Bitcoin. Iremesha abashoramari gufata amafaranga yabo y’ivy’ubuhinga bwa none igihe kirekire, ataco bafatiye ku guhinduka kw’isoko.
reviewed: true
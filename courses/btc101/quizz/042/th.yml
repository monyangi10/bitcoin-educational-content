question: เฟสแรกที่เกิดขึ้นในปรากฏการณ์เงินเฟ้อสูงคืออะไร?
answer: การสูญเสียความเชื่อมั่นในสกุลเงิน
wrong_answers:
  - การล่มสลายของค่าเงิน & การเพิ่มขึ้นของราคา
  - วงจรอุบาทว์ของการพิมพ์เงิน
  - สกุลเงินใหม่เกิดขึ้น
explanation: |
  ระยะแรกของภาวะเงินเฟ้อสูงคือการสูญเสียความเชื่อมั่นในสกุลเงิน
reviewed: true
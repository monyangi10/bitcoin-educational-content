question: Wat is een mogelijk nadeel van CBDC's (Central Bank Digital Currencies)?
answer: Ze kunnen de financiële vrijheid van individuen belemmeren en autoritair misbruik in de hand werken.
wrong_answers:
  - Ze kunnen leiden tot een daling van het geld Supply.
  - Ze zouden kunnen leiden tot een daling van de waarde van Bitcoin.
  - Ze kunnen leiden tot een daling van de waarde van goud.
explanation: |
  Digitale valuta's van centrale banken (CBDC's) kunnen mogelijk
  de financiële vrijheid van individuen belemmeren en autoritair misbruik
  autoritair misbruik in de hand werken. Dit komt omdat ze een
  centraal geplande economie zouden bieden, waarbij de centrale bank
  die nog meer controle heeft over het geld Supply.
reviewed: true
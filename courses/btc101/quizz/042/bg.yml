question: Коя е първата фаза, която настъпва при явлението хиперинфлация?
answer: Загуба на доверие в дадена валута.
wrong_answers:
  - Срив на валутата и повишаване на цените.
  - Омагьосаният кръг на печатането на пари.
  - Появява се нова валута.
explanation: |
  Първата фаза на хиперинфлацията е загубата на доверие в дадена валута.
reviewed: true
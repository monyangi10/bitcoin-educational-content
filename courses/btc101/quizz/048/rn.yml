question: Ni igitigiri ikihe c’ugutera imbere kw’ibiciro mu Budagi mu kwezi kwa Gitugutu 1923 igihe ugutera imbere kw’ibiciro kwari ku rugero rwo hejuru cane?
answer: 29.500%
wrong_answers:
  - 5.200%
  - 76%
  - 110%
explanation: |
  Ukwezi kwari gufise inflation nyinshi cane mu Budagi ni Ukwakira 1923, gushika ku rwego rwo hejuru rwa 29.500%.

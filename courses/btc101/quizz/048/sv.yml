question: Vilken var den ungefärliga inflationstakten i Tyskland i oktober 1923 när hyperinflationen var som störst?
answer: 29,500%
wrong_answers:
  - 5,200%
  - 76%
  - 110%
explanation: |
  Den månad då inflationen var som högst i Tyskland var oktober 1923, då den nådde en topp på 29.500%.

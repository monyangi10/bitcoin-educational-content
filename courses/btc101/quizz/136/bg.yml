question: Какво би се случило, ако потребител на възел избере да следва различни правила, които противоречат на съществуващите правила за консенсус?
answer: Възелът вече няма да бъде част от мрежата Bitcoin.
wrong_answers:
  - Възелът ще стане част от друга мрежа Bitcoin.
  - Възелът ще бъде наказан от мрежата Bitcoin.
  - Възелът ще бъде възнаграден от мрежата Bitcoin.
explanation: |
  Ако даден потребител реши да следва други правила, които
  са невалидни за текущите правила за консенсус, тогава този възел
  вече няма да бъде част от мрежата Bitcoin.
reviewed: true

question: จะเกิดอะไรขึ้นหากผู้ใช้โหนดเลือกที่จะปฏิบัติตามกฎที่ขัดแย้งกับกฎฉันทามติที่มีอยู่?
answer: โหนดจะไม่เป็นส่วนหนึ่งของเครือข่าย Bitcoin อีกต่อไป
wrong_answers:
  - โหนดจะกลายเป็นส่วนหนึ่งของเครือข่าย Bitcoin ที่แตกต่างกัน
  - โหนดจะถูกลงโทษโดยเครือข่าย Bitcoin
  - โหนดจะได้รับรางวัลจากเครือข่าย Bitcoin
explanation: |
  หากผู้ใช้โหนดตัดสินใจที่จะปฏิบัติตามกฎอื่น ๆ ที่ทำให้กฎฉันทามติปัจจุบันเป็นโมฆะ โหนดนี้จะไม่เป็นส่วนหนึ่งของเครือข่าย Bitcoin อีกต่อไป
reviewed: true
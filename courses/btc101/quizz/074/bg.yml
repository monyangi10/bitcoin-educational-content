question: Какъв е основният въпрос, който трябва да си зададете при избора на Bitcoin портфейл от гледна точка на правилното самосъхранение?
answer: Вие ли сте собственик на средствата или оставяте контрола върху парите си на трета страна?
wrong_answers:
  - Обезопасен ли е портфейлът с passphrase?
  - Позволява ли портфейлът да получава и изпраща биткойни?
  - Мога ли да споделя своя портфейл с друго лице?
explanation: |
  При избора на Bitcoin портфейл основният въпрос е:
  дали сте собственик на средствата или оставяте контрола
  на трета страна? Това е така, защото притежателят на
  частния ключ е собственик на биткойните.
reviewed: true

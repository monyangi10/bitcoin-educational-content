question: Jakie jest główne pytanie, które należy sobie zadać przy wyborze portfela Bitcoin, jeśli chodzi o bezpieczeństwo środków?
answer: Czy jesteś właścicielem środków, czy też pozostawiasz kontrolę nad swoimi pieniędzmi stronie trzeciej?
wrong_answers:
  - Czy portfel jest zabezpieczony hasłem?
  - Czy portfel umożliwia odbieranie i wysyłanie bitcoinów?
  - Czy mogę udostępnić portfel innej osobie?
explanation: |
  Główne pytanie, które należy sobie zadać przy wyborze portfela Bitcoin, to:
  czy jesteś właścicielem środków, czy też pozostawiasz kontrolę nad nimi osobie trzeciej? Ten, kto jest posiadaczem
  klucza prywatnego jest również właścicielem bitcoinów.
reviewed: true

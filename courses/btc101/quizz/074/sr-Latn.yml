question: Koje je centralno pitanje koje treba postaviti sebi kada birate između Bitkoin novčanika, u smislu samostalnog čuvanja?
answer: Da li ste vlasnik sredstava ili kontrolu nad svojim novcem prepuštate trećoj strani?
wrong_answers:
  - Da li je novčanik osiguran sa passphrase?
  - Da li novčanik omogućava primanje i slanje bitkoina?
  - Mogu li podeliti svoj novčanik sa drugom osobom?
explanation: |
  Kada birate Bitkoin novčanik, centralno pitanje je:
  da li ste vi vlasnik sredstava ili prepuštate kontrolu
  vašeg novca trećoj strani? Ovo je zato što je vlasnik
  privatnog ključa vlasnik Bitkoina.
reviewed: true

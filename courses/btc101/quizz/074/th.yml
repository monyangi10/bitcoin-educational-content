question: คำถามสำคัญที่ควรถามตัวเองเมื่อเลือก Bitcoin wallet ในแง่ของการดูแลตนเองคืออะไร?
answer: คุณเป็นเจ้าของเงินทุนหรือคุณมอบการควบคุมเงินของคุณให้กับบุคคลที่สาม?
wrong_answers:
  - wallet ได้รับการรักษาความปลอดภัยด้วย passphrase หรือไม่?
  - wallet อนุญาตให้รับและส่งบิตคอยน์หรือไม่?
  - ฉันสามารถแชร์ wallet ของฉันกับบุคคลอื่นได้หรือไม่?
explanation: |
  เมื่อเลือก Bitcoin wallet คำถามสำคัญคือ:
  คุณเป็นเจ้าของเงินทุนหรือคุณปล่อยให้บุคคลที่สามควบคุม
  เงินของคุณ? นี่เป็นเพราะผู้ถือกุญแจส่วนตัวคือเจ้าของ Bitcoins
reviewed: true
question: Какъв е потенциалният резултат от внезапно обезценяване или загуба на доверие в доверителната валута?
answer: Хиперинфлация.
wrong_answers:
  - Дефлация.
  - Стабилна икономика.
  - Увеличаване на стойността на валутата.
explanation: |
  Внезапна девалвация или загуба на доверие в довереник
  валутата може да доведе до хиперинфлация. Това е ситуация
  при която цените на стоките и услугите нарастват с
  изключително високи темпове, което често води до икономическа нестабилност.
reviewed: true
question: किसी प्रत्ययी मुद्रा में अचानक मूल्यह्रास या विश्वास की हानि का संभावित परिणाम क्या है?
answer: अति मुद्रास्फीति.
wrong_answers:
  - अपस्फीति.
  - एक स्थिर अर्थव्यवस्था.
  - मुद्रा के मूल्य में वृद्धि.
explanation: |
  अचानक अवमूल्यन या किसी प्रत्ययी मुद्रा में विश्वास की कमी से हाइपरइन्फ्लेशन हो सकता है। यह एक ऐसी स्थिति है जिसमें वस्तुओं और सेवाओं की कीमतें अत्यधिक उच्च दर से बढ़ती हैं, जिससे अक्सर आर्थिक अस्थिरता पैदा होती है।
reviewed: true
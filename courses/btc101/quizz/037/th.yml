question: ผลลัพธ์ที่อาจเกิดขึ้นจากการลดค่าอย่างฉับพลันหรือการสูญเสียความเชื่อมั่นในสกุลเงินที่เป็นเงินตรา?
answer: ภาวะเงินเฟ้อสูง
wrong_answers:
  - ภาวะเงินฝืด
  - เศรษฐกิจที่มั่นคง
  - การเพิ่มขึ้นของมูลค่าสกุลเงิน
explanation: |
  การลดค่าเงินอย่างกะทันหันหรือการสูญเสียความเชื่อมั่นในสกุลเงินที่มีมูลค่าตามความเชื่อถือสามารถนำไปสู่ภาวะเงินเฟ้อรุนแรงได้ นี่คือสถานการณ์ที่ราคาสินค้าและบริการเพิ่มขึ้นในอัตราที่สูงมาก ซึ่งมักจะนำไปสู่ความไม่มั่นคงทางเศรษฐกิจ
reviewed: true
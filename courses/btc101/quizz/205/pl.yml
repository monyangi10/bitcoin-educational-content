question: Jak ten kurs opisuje Bitcoina?
answer: Temat interdyscyplinarny.
wrong_answers:
  - Prosty temat.
  - Przedmiot fizyczny.
  - Przedmiot jednodyscyplinarny.
explanation: |
  Bitcoin jest opisywany jako temat multidyscyplinarny, ponieważ
  porusza kwestie związane z różnymi dziedzinami, w tym
  kryptografią, teorią gier, ekonomią i polityką pieniężną,
  informatyką, filozofią, energetyką, prawem i regulacją prawną.
reviewed: true

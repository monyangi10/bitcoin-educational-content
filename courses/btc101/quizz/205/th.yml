question: หลักสูตรนี้อธิบาย Bitcoin อย่างไร?
answer: หัวข้อสหวิทยาการ
wrong_answers:
  - หัวเรื่องง่าย ๆ
  - หัวข้อทางกายภาพ
  - วิชาที่มีเพียงสาขาเดียว
explanation: |
  Bitcoin ถูกอธิบายว่าเป็นวิชาสหวิทยาการเพราะว่ามันก่อให้เกิดคำถามที่เกี่ยวข้องกับหลายสาขา รวมถึงการเข้ารหัสลับ ทฤษฎีเกม เศรษฐศาสตร์และนโยบายการเงิน วิทยาการคอมพิวเตอร์ ปรัชญา พลังงาน กฎหมาย และระเบียบข้อบังคับ
reviewed: true
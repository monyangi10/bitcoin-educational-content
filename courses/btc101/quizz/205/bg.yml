question: Как този курс описва Bitcoin?
answer: Мултидисциплинарна тема.
wrong_answers:
  - Една проста тема.
  - Физически предмет.
  - Еднодисциплинарен предмет.
explanation: |
  Bitcoin се описва като мултидисциплинарна тема, защото
  тя повдига въпроси, свързани с различни области, включително
  криптографията, теорията на игрите, икономиката и паричната политика,
  компютърни науки, философия, енергетика, закони и регулации.
reviewed: true
question: 이 과정에서는 Bitcoin에 대해 어떻게 설명하나요?
answer: 다학제적 주제입니다.
wrong_answers:
  - 간단한 주제입니다.
  - 물리적 주제.
  - 단일 학문 분야.
explanation: |
  Bitcoin은 다음과 같은 이유로 다학제적 과목으로 설명됩니다
  다음과 같은 다양한 분야와 관련된 질문을 제기하기 때문입니다
  암호화, 게임 이론, 경제학 및 통화 정책
  컴퓨터 과학, 철학, 에너지, 법률 및 규제 등 다양한 분야와 관련된 문제를 제기하기 때문에 다학제적인 과목으로 알려져 있습니다.
reviewed: true
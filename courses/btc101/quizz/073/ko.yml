question: 누군가 실수로 12개 또는 24개의 단어가 포함된 Bitcoin Wallet 목록을 맞출 확률은 얼마나 될까요?
answer: 천문학적으로 낮습니다.
wrong_answers:
  - 높음.
  - 보통.
  - 강하다.
explanation: |
  Wallet를 생성하는 데 사용된 암호화 기술 덕분에
  누군가 실수로 12개 또는 24개의 단어 목록을
  12개 또는 24개의 단어를 실수로 추측할 확률은 천문학적으로 낮습니다. 이는 마치
  1에서 $2^256$ 사이의 올바른 숫자를 찾는 것과 거의 같습니다
  우주에서 정의된 원자를 찾는 것과 거의 같습니다.
reviewed: true
question: ความน่าจะเป็นที่ใครบางคนจะเดารายการคำ 12 หรือ 24 คำของคุณใน Bitcoin wallet โดยบังเอิญคือเท่าใด?
answer: ต่ำมากในระดับดาราศาสตร์
wrong_answers:
  - สูง
  - ปานกลาง
  - แข็งแกร่ง
explanation: |
  ต้องขอบคุณการเข้ารหัสที่ใช้ในการสร้าง wallet ความน่าจะเป็นที่ใครบางคนจะเดารายการคำ 12 หรือ 24 คำของคุณได้โดยบังเอิญนั้นต่ำมากอย่างมหาศาล มันเหมือนกับการหาหมายเลขที่ถูกต้องระหว่าง 1 และ $2^{256}$ ซึ่งเกือบจะเทียบเท่ากับการหาตัวอะตอมที่กำหนดในจักรวาล
reviewed: true
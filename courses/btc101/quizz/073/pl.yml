question: Jakie jest prawdopodobieństwo, że ktoś przypadkowo odgadnie listę 12 lub 24 słów w portfelu Bitcoina?
answer: Astronomicznie niskie.
wrong_answers:
  - Wysokie.
  - Umiarkowane.
  - Silne.
explanation: |
  Dzięki kryptografii użytej do stworzenia portfela, prawdopodobieństwo, że ktoś przypadkowo odgadnie listę
  12 lub 24 słów jest astronomicznie niskie. To jak znalezienie właściwej liczby pomiędzy 1 a $2^256$, co jest prawie
  równoważne z prawdopodobieństwem znalezienia jednego konkretnego atomu we wszechświecie.
reviewed: true

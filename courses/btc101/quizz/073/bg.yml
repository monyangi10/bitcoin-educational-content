question: Каква е вероятността някой случайно да познае вашия списък от 12 или 24 думи в Bitcoin портфейл?
answer: Астрономически ниска.
wrong_answers:
  - Висока.
  - Умерено.
  - Силен.
explanation: |
  Благодарение на криптографията, използвана за създаването на портфейл
  вероятността някой случайно да отгатне вашия списък с
  12 или 24 думи, е астрономически ниска. Това е като да намерите
  правилното число между 1 и $2^256$, което е почти
  е равносилно на намирането на определен атом във Вселената.
reviewed: true

question: क्या सम्भावना है कि कोई व्यक्ति गलती से Bitcoin Wallet में आपके 12 या 24 शब्दों की सूची का अनुमान लगा ले?
answer: खगोलीय रूप से कम.
wrong_answers:
  - उच्च।
  - मध्यम।
  - मज़बूत।
explanation: |
  Wallet बनाने के लिए इस्तेमाल की गई क्रिप्टोग्राफी की बदौलत, किसी के द्वारा गलती से आपके 12 या 24 शब्दों की सूची का अनुमान लगाने की संभावना खगोलीय रूप से कम है। यह 1 और $2^256$ के बीच सही संख्या खोजने जैसा है, जो ब्रह्मांड में एक परिभाषित परमाणु को खोजने के लगभग बराबर है।
reviewed: true
question: Cypherpunklar kim?
answer: Dijital çağda mahremiyet ve özgürlüğün rolünü derinlemesine sorgulamaya başlayan bir grup insan.
wrong_answers:
  - Hükümetlerden bilgi çalan bir grup bilgisayar korsanı.
  - Bitcoin ve diğer kripto para birimlerini icat eden bir grup insan.
  - Teknoloji kullanımına karşı çıkan bir grup insan.
explanation: |
  Cypherpunk'lar, bir grup insanın
  kriptografinin bir koruma aracı olarak hizmet edebileceğini
  hükümetlerin müdahalesine karşı bireysel haklar
  ve büyük şirketler.
reviewed: true
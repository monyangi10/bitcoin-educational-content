question: ไซเฟอร์พังก์คือใคร?
answer: กลุ่มคนที่เริ่มตั้งคำถามอย่างลึกซึ้งเกี่ยวกับบทบาทของความเป็นส่วนตัวและเสรีภาพในยุคดิจิทัล
wrong_answers:
  - กลุ่มแฮกเกอร์ที่ขโมยข้อมูลจากรัฐบาล
  - กลุ่มคนที่คิดค้น Bitcoin และสกุลเงินดิจิทัลอื่น ๆ
  - กลุ่มคนที่ต่อต้านการใช้เทคโนโลยี
explanation: |
  Cypherpunks เป็นกลุ่มบุคคลที่เชื่อว่าการเข้ารหัสสามารถทำหน้าที่เป็นเครื่องมือในการปกป้องสิทธิส่วนบุคคลจากการแทรกแซงของรัฐบาลและบรรษัทขนาดใหญ่
reviewed: true
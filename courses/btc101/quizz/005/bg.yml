question: Кои са шифърпънкърите?
answer: Група хора, които започнаха да си задават дълбоки въпроси за ролята на неприкосновеността на личния живот и свободата в цифровата ера.
wrong_answers:
  - Група хакери, които крадат информация от правителства.
  - Група от хора, които са изобретили Bitcoin и други криптовалути.
  - Група хора, които се противопоставят на използването на технологиите.
explanation: |
  Шифърпънкърите са група от хора, които вярват, че
  че криптографията може да служи като инструмент за защита на
  индивидуалните права срещу намесата на правителствата
  и големите корпорации.
reviewed: true
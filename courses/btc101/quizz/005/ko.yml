question: 사이퍼펑크는 누구인가요?
answer: 디지털 시대에 프라이버시와 자유의 역할에 대해 깊은 의문을 품기 시작한 사람들이 모였습니다.
wrong_answers:
  - 정부로부터 정보를 훔친 해커 그룹.
  - Bitcoin 및 기타 암호화폐를 개발한 사람들이 모인 그룹입니다.
  - 기술 사용에 반대하는 사람들이 모였습니다.
explanation: |
  사이퍼펑크는 암호화가 개인을 보호하는 도구가 될 수 있다고
  암호화가 개인의 권리를 보호하는 도구가 될 수 있다고 믿는
  정부와 대기업의 간섭으로부터 개인의 권리를
  개인의 권리를 보호하는 도구가 될 수 있다고 믿는 사람들입니다.
reviewed: true
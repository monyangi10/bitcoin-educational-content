question: Какво трябва да се случи според нобеловия лауреат Ф. А. Хайек, за да имаме отново добри пари?
answer: Ние да вземем валутата от ръцете на правителството.
wrong_answers:
  - Даваме я на по-добро правителство.
  - Даваме я на авторитарно правителство.
  - Ние изземваме нещата от ръцете на хората.
explanation: |
  Хайек казва: "Не вярвам, че някога отново ще имаме добри пари, преди да ги измъкнем от ръцете на правителството. Ако не можем да ги отнемем насилствено от ръцете на правителството, единственото, което можем да направим, е по някакъв хитър или заобиколен начин да въведем нещо, което те не могат да спрат."
reviewed: true

question: ตามที่ผู้ได้รับรางวัลโนเบล F.A Hayek กล่าวไว้ สิ่งที่ต้องเกิดขึ้นเพื่อให้มีเงินที่ดีอีกครั้งคืออะไร?
answer: เราเอาสิ่งนั้นออกจากมือของรัฐบาล
wrong_answers:
  - เราให้สิ่งนั้นแก่รัฐบาลที่ดีกว่า
  - เราให้สิ่งนั้นแก่รัฐบาลเผด็จการ
  - เราเอาสิ่งนั้นออกจากมือของผู้คน
explanation: |
  ฮาเย็คกล่าวว่า: "ผมไม่เชื่อว่าเราจะมีเงินที่ดีอีกครั้ง จนกว่าเราจะนำสิ่งนี้ออกจากมือของรัฐบาล หากเราไม่สามารถนำมันออกจากมือของรัฐบาลด้วยความรุนแรง สิ่งที่เราทำได้คือการแนะนำบางสิ่งบางอย่างที่พวกเขาไม่สามารถหยุดได้ด้วยวิธีที่แยบยลหรืออ้อมค้อม"
reviewed: true
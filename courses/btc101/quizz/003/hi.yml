question: नोबेल पुरस्कार विजेता एफ. ए. हायेक के अनुसार, दोबारा अच्छा पैसा पाने के लिए क्या करना होगा?
answer: हम इस चीज़ को सरकार के हाथ से ले लेते हैं।
wrong_answers:
  - हम यह चीज़ एक बेहतर सरकार को देते हैं।
  - हम यह चीज़ एक तानाशाही सरकार को दे देते हैं।
  - हम लोगों के हाथ से चीज़ें छीन लेते हैं।
explanation: |
  हायेक कहते हैं: "मैं नहीं मानता कि सरकार के हाथों से पैसा छीनने से पहले हमारे पास फिर से अच्छा पैसा होना चाहिए। अगर हम सरकार के हाथों से पैसे को हिंसक तरीके से नहीं छीन सकते, तो हम बस इतना कर सकते हैं कि किसी चालाकी या घुमावदार तरीके से कुछ ऐसा पेश करें जिसे वे रोक न सकें।"
reviewed: true
question: 노벨 경제학상 수상자 F.A 하이에크에 따르면, 다시 좋은 돈을 벌려면 어떻게 해야 할까요?
answer: 우리는 정부의 손에서 벗어나 있습니다.
wrong_answers:
  - 우리는 더 나은 정부에 그 일을 넘깁니다.
  - 우리는 권위주의 정부에 그 일을 맡깁니다.
  - 우리는 사람들의 손에서 물건을 가져옵니다.
explanation: |
  하이에크는 이렇게 말합니다. "정부의 손에서 돈을 빼앗기 전에는 다시는 좋은 돈을 가져서는 안 된다고 생각합니다. 정부의 손에서 폭력적으로 빼앗을 수 없다면, 우리가 할 수 있는 것은 교묘하거나 우회적인 방법으로 그들이 막을 수 없는 것을 도입하는 것뿐입니다."라고 말합니다
reviewed: true
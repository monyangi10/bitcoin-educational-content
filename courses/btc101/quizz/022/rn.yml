question: Ni kubera iki inzahabu atari ikintu co gutwara?
answer: Kubera ko ari ryinshi kandi riremereye, ivyo bikaba bituma bigorana gutwara vyinshi.
wrong_answers:
  - Kubera ko ari ngirakamaro cane ku buryo udashobora kwimurirwa.
  - Kubera ko ridashobora guhindurwa mu buryo bworoshe ngo ribe utugingo ngengabuzima dutoduto.
  - Kuko ni Liquid mu bushuhe bwo mu cumba.
explanation: |
  Inzahabu iraremereye kandi iraremereye, ivyo bikaba bisobanura ko kuyitwara nyinshi bishobora kuba urugamba ku mubiri. Ubwo buremere butuma bidashobora gutwara neza ugereranije n’ibikoresho vyoroshe.
reviewed: true
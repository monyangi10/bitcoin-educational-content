question: Защо златото не е преносим материал?
answer: Тъй като е плътна и тежка, тя е неудобна за пренасяне в големи количества.
wrong_answers:
  - Защото е твърде ценна, за да бъде преместена.
  - Тъй като не може лесно да бъде оформен в по-малки форми.
  - Защото е течност при стайна температура.
explanation: |
  Златото е плътно и тежко, което означава, че пренасянето на големи количества от него може да бъде физическо предизвикателство. Това тегло го прави по-малко удобно за транспортиране в сравнение с по-леките материали.
reviewed: true
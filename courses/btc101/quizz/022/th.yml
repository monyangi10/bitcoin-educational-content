question: ทำไมทองคำถึงไม่ใช่วัสดุที่พกพาได้?
answer: เพราะมันมีความหนาแน่นและหนัก ทำให้ยุ่งยากในการพกพาในปริมาณมาก ๆ
wrong_answers:
  - เพราะมันมีค่ามากเกินกว่าจะเคลื่อนย้ายได้
  - เพราะไม่สามารถขึ้นรูปเป็นรูปทรงที่เล็กลงได้ง่าย
  - เพราะมันเป็นของเหลวที่อุณหภูมิห้อง
explanation: |
  ทองคำมีความหนาแน่นและหนัก ซึ่งหมายความว่าการขนย้ายทองคำในปริมาณมากอาจเป็นเรื่องที่ท้าทายทางกายภาพ น้ำหนักนี้ทำให้การขนส่งทองคำไม่สะดวกเท่ากับวัสดุที่เบากว่า
reviewed: true
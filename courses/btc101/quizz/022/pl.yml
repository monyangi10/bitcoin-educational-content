question: Dlaczego złoto nie jest materiałem przenośnym?
answer: Ponieważ jest gęste i ciężkie, co sprawia, że przenoszenie go w dużych ilościach jest uciążliwe.
wrong_answers:
  - Ponieważ jest zbyt cenne, aby je przenosić.
  - Ponieważ nie można go łatwo uformować w mniejsze jednostki.
  - Ponieważ staje się płynne w temperaturze pokojowej.
explanation: |
  Złoto jest gęste i ciężkie, co oznacza, że przenoszenie go w dużych ilościach może być fizycznym wyzwaniem. Waga złota sprawia, że jest ono mniej wygodne w transporcie w porównaniu z lżejszymi materiałami.
reviewed: true

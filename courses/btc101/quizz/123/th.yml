question: ทำไมจำนวนการยืนยันในธุรกรรม Bitcoin ถึงมีความสำคัญ?
answer: ยิ่งการทำธุรกรรมมีการยืนยันมากเท่าใด ก็ยิ่งเปลี่ยนแปลงไม่ได้มากขึ้นเท่านั้น
wrong_answers:

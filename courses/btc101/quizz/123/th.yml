  - ยิ่งการทำธุรกรรมมีการยืนยันมากเท่าใด ก็จะถูกดำเนินการได้เร็วขึ้นเท่านั้น
  - ยิ่งการทำธุรกรรมมีการยืนยันมากเท่าใด ก็ยิ่งมีความปลอดภัยน้อยลงเท่านั้น

question: ข้อความที่อยู่ในบล็อกแรกของบล็อกเชน Bitcoin คืออะไร?
answer: 03/ม.ค./2009 นายกรัฐมนตรีอยู่บนขอบของการช่วยเหลือธนาคารครั้งที่สอง
wrong_answers:
  - เราสามารถชนะการต่อสู้ครั้งใหญ่ในสงครามอาวุธและได้รับดินแดนใหม่แห่งเสรีภาพเป็นเวลาหลายปี
  - รัฐบาลมีความสามารถในการตัดหัวเครือข่ายที่ควบคุมจากศูนย์กลางเช่น Napster แต่เครือข่าย P2P บริสุทธิ์เช่น Gnutella และ Tor ดูเหมือนจะสามารถยืนหยัดได้ด้วยตัวเอง
  - ไม่มีข้อใดข้างต้น
explanation: |
  บล็อกแรกของบล็อกเชน Bitcoin ซึ่งรู้จักกันในชื่อ
  บล็อกกำเนิด ประกอบด้วยข้อความ 03/jan/2009
  Chancellor on brink of second bailout for banks, ซึ่งเป็น
  หัวข้อของ Time ในวันนั้นเพื่อประทับเวลาบล็อกกำเนิด
reviewed: true
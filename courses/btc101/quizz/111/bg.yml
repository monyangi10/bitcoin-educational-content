question: Какво е съобщението, съдържащо се в първия блок на блокчейна Bitcoin?
answer: 03/jan/2009 Канцлерът е на ръба на втора спасителна програма за банките.
wrong_answers:
  - Можем да спечелим важна битка в надпреварата във въоръжаването и да се сдобием с нова територия на свобода за няколко години.
  - Правителствата са добри в отрязването на главите на централно контролирани мрежи като Napster, но чисто P2P мрежи като Gnutella и Tor изглежда се справят сами.
  - Нито едно от горните.
explanation: |
  Първият блок на блокчейна Bitcoin, известен още като
  генезис блок, съдържа съобщението 03/jan/2009
  Канцлерът е на ръба на втора спасителна помощ за банките, която е
  заглавието на Времето в този ден за времево маркиране на блока на генезиса.
reviewed: true
question: Bitcoin Blockchain의 첫 번째 블록에 포함된 메시지는 무엇인가요?
answer: 2009년 03월 03일 은행에 대한 두 번째 구제금융을 앞둔 총리.
wrong_answers:
  - 우리는 군비 경쟁에서 중요한 전투에서 승리하고 몇 년 동안 새로운 자유의 영토를 확보할 수 있습니다.
  - 정부는 냅스터와 같이 중앙에서 통제되는 네트워크의 수장을 차단하는 데는 능숙하지만, 그누텔라나 토르와 같은 순수 P2P 네트워크는 스스로 버티고 있는 것으로 보입니다.
  - 위에 해당되지 않습니다.
explanation: |
  Bitcoin Blockchain의 첫 번째 블록, 즉
  gW-6 블록에는 03/jan/2009 메시지가 포함되어 있습니다
  은행에 대한 두 번째 구제 금융 직전의 총리, 즉
  그날의 시간 제목이 Timestamp에서 Genesis 블록으로 넘어갑니다.
reviewed: true
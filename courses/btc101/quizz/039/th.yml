question: ผลกระทบที่อาจเกิดขึ้นของระบบการเงินในปัจจุบันต่อผู้มีบทบาททางการเมืองคืออะไร?
answer: พวกเขาไม่ได้รับแรงจูงใจให้ทำการเปลี่ยนแปลงครั้งใหญ่ ปล่อยให้ระบบดำเนินต่อไปจนกว่าจะเกิดการล่มสลายที่เป็นไปได้
wrong_answers:
  - พวกเขาได้รับแรงจูงใจให้ทำการเปลี่ยนแปลงครั้งใหญ่เพื่อป้องกันการล่มสลายที่อาจเกิดขึ้นได้
  - พวกเขาไม่ได้รับแรงจูงใจให้รักษาสภาพที่เป็นอยู่เพื่อรับประกันความมั่งคั่งของตนเอง
  - พวกเขาได้รับแรงจูงใจให้คิดระยะยาว
explanation: |
  ในขณะที่นักการเมืองได้รับประโยชน์จากระบบการเงินในปัจจุบัน พวกเขาจึงไม่มีแรงจูงใจที่จะทำการเปลี่ยนแปลงที่รุนแรง ซึ่งทำให้ระบบสามารถดำเนินต่อไปได้จนกว่าจะเกิดการระเบิดที่เป็นไปได้ เนื่องจากระบบถูกควบคุมและจำกัดเพื่อหลีกเลี่ยงการล่มสลายของตัวเอง
reviewed: true
question: Wat is het belangrijkste doel achter de creatie van Bitcoin?
answer: De staat scheiden van geld.
wrong_answers:
  - De gouden standaard afschaffen.
  - Om transacties sneller en goedkoper te maken.
  - Om iedereen rijk te maken.
explanation: |
  Bitcoin werd opgericht met als doel de staat te scheiden
  van geld. Het is een antwoord op de systeemuitdagingen van
  het huidige financiële systeem, waar de staat volledige controle heeft
  controle heeft over het geld Supply en het in zijn eigen voordeel kan manipuleren
  eigen voordeel.
reviewed: true
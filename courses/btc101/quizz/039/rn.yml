question: Ni ingaruka izihe uburyo bw’ivy’ubutunzi buriho ubu bushobora kugira ku bagize politike?
answer: Ntibavyurirwa umutima wo guhindura cane, ivyo bikaba bituma iyo nzira ibandanya gushika aho ishobora gusenyuka.
wrong_answers:
  - Bararemeshwa guhindura cane kugira ngo ntihagire ikintu gishobora gutera.
  - Ntibaremeshwa gukomeza uko bari kugira ngo bashobore kwironsa ubutunzi bwabo bwite.
  - Baravyurirwa umutima wo kwiyumvira ivy’igihe kirekire.
explanation: |

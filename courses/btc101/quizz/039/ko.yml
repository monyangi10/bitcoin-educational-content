question: 현재 금융 시스템이 정치 행위자에게 미칠 수 있는 잠재적 영향은 무엇인가요?
answer: 그들은 급진적인 변화를 시도할 인센티브가 없기 때문에 시스템이 붕괴될 때까지 계속 유지될 수 있습니다.
wrong_answers:
  - 이들은 폭발 가능성을 방지하기 위해 급진적인 변화를 시도하도록 인센티브를 받습니다.
  - 그들은 자신의 부를 보장하기 위해 현상 유지를 하려는 인센티브가 없습니다.
  - 장기적으로 생각하도록 인센티브를 제공합니다.
explanation: |
  정치 행위자들은 현재의 금융 시스템으로부터 혜택을 받기 때문에
  시스템으로부터 혜택을 받기 때문에 급진적인 변화를 시도할 인센티브가 없습니다.
  이로 인해 시스템이 붕괴될 가능성이 있을 때까지
  시스템이 규제되어 있고
  자체 붕괴를 피하기 위해 제한되기 때문입니다.
reviewed: true
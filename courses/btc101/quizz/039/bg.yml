question: Какво е потенциалното въздействие на настоящата финансова система върху политическите участници?
answer: Те не са стимулирани да правят радикални промени, което позволява на системата да продължи да се развива до евентуална имплозия.
wrong_answers:
  - Те са стимулирани да правят радикални промени, за да предотвратят евентуална имплозия.
  - Те не са стимулирани да поддържат статуквото, за да си осигурят богатство.
  - Те са стимулирани да мислят в дългосрочен план.
explanation: |
  Тъй като политическите играчи се възползват от настоящата финансова
  те нямат стимул да правят радикални промени.
  Това позволява на системата да продължи да се развива, докато
  възможна имплозия, тъй като системата е регулирана и
  ограничава, за да избегне собствения си колапс.
reviewed: true

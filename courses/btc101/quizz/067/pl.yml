question: Gdzie przechowywane są bitcoiny?
answer: W łańcuchu bloków Bitcoina.
wrong_answers:
  - W portfelu Bitcoin.
  - Na urządzeniu, na którym zainstalowany jest portfel.
  - W skarbcu Rezerwy Federalnej.
explanation: |
  Chociaż klucze prywatne są przechowywane w portfelu, same
  bitcoiny są w rzeczywistości przechowywane w łańcuchu bloków Bitcoina, który jest publiczną rozproszoną księgą rozliczeniową w sieci peer-to-peer Bitcoina.
reviewed: true

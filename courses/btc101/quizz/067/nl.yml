question: Waar worden de bitcoins opgeslagen?
answer: In de Bitcoin Blockchain.
wrong_answers:
  - In de Bitcoin Wallet.
  - Op het apparaat waar de Wallet is geïnstalleerd.
  - In de kluis van de Federal Reserve.
explanation: |
  Hoewel je privésleutels zijn opgeslagen in je Wallet, zijn de
  worden de bitcoins zelf opgeslagen in Bitcoin
  Blockchain, wat de openbare gedistribueerde Ledger is binnen
  het Bitcoin peer-to-peer netwerk.
reviewed: true
question: None ama bitcoins abikwa hehe?
answer: Mu Bitcoin Blockchain.
wrong_answers:
  - Mu Bitcoin Wallet.
  - Ku gikoresho aho Wallet ishizwe.
  - Mu nzu y’ububiko bw’amahera ya Leta Zunze Ubumwe za Amerika.
explanation: |
  Naho imfunguruzo zawe z’ibanga zibitswe muri Wallet yawe,
  bitcoins ubwazo mu vy’ukuri zibitswe muri Bitcoin.
  Blockchain, ari yo Ledger itangazwa na bose mu kiringo c’2019.
  urubuga rw’urunganwe rwa Bitcoin.
reviewed: true
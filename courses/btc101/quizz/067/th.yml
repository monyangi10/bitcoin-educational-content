question: บิตคอยน์ถูกเก็บไว้ที่ไหน?
answer: ในบล็อกเชน Bitcoin
wrong_answers:
  - ใน Bitcoin wallet.
  - บนอุปกรณ์ที่ติดตั้ง wallet
  - ในห้องนิรภัยของธนาคารกลางสหรัฐฯ
explanation: |
  แม้ว่าคีย์ส่วนตัวของคุณจะถูกเก็บไว้ใน wallet ของคุณ แต่
  บิตคอยน์เองนั้นถูกเก็บไว้ในบล็อกเชน Bitcoin
  ซึ่งเป็นบัญชีแยกประเภทสาธารณะที่กระจายอยู่ภายใน
  เครือข่ายเพียร์ทูเพียร์ Bitcoin
reviewed: true
question: Gde su bitkoini uskladišteni?
answer: U Bitkoin Blockchainu.
wrong_answers:
  - U Bitkoin novčaniku.
  - Na uređaju gde je instaliran novčanik.
  - U trezoru Federalnih rezervi.
explanation: |
  Iako su vaši privatni ključevi sačuvani u vašem novčaniku, sami
  bitkoini su zapravo sačuvani na Bitkoin
  Blockchainu, koji je javni distribuirani Ledger unutar
  Bitcoin peer-to-peer mreže.
reviewed: true

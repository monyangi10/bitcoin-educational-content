question: Къде се съхраняват биткойните?
answer: В блокчейна Bitcoin.
wrong_answers:
  - В Bitcoin портфейл.
  - На устройството, на което е инсталиран портфейл.
  - В трезора на Федералния резерв.
explanation: |
  Въпреки че частните ви ключове се съхраняват в портфейл,
  самите биткойни всъщност се съхраняват в Bitcoin
  който е публичната разпределена счетоводна книга в рамките на
  peer-to-peer мрежа.
reviewed: true

question: แฮชที่ถูกต้องในบริบทของบล็อก mining ในเครือข่าย Bitcoin คืออะไร?
answer: ลายนิ้วมือที่ไม่ซ้ำกันที่เกี่ยวข้องกับบล็อก ประกอบด้วย 256 ตัวอักษร
wrong_answers:
  - รหัสเฉพาะที่ใช้ในการเข้าถึงบล็อก
  - รหัสผ่านที่ไม่ซ้ำกันที่จำเป็นสำหรับการขุดบล็อก
  - ตัวระบุเฉพาะสำหรับผู้ขุดที่ขุดบล็อก
explanation: |
  ในบริบทของบล็อก mining ในเครือข่าย Bitcoin แฮชที่ถูกต้องคือรอยนิ้วมือที่ไม่ซ้ำกันซึ่งเชื่อมโยงกับบล็อก ประกอบด้วย 256 อักขระ ความถูกต้องของแฮชนี้ขึ้นอยู่กับความยากของเครือข่าย Bitcoin
reviewed: true
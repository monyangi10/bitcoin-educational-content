question: Кой е валидният хеш в контекста на копаенето в мрежата Bitcoin?
answer: Уникален, свързан с блока, съставен от 256 символа.
wrong_answers:
  - Уникален код, използван за достъп до блока.
  - Уникална парола, необходима за извличане на блока.
  - Уникален идентификатор на миньора, който е изкопал блока.
explanation: |
  В контекста на копаенето на нов блок в мрежата Bitcoin, валиден хеш е уникално число, свързано с
  блока, състоящо се от 256 знака. Валидността зависи от трудността на мрежата Bitcoin.
reviewed: true

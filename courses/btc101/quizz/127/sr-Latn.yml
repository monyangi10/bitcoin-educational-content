question: Šta je validan Hash u kontekstu rudarenja bloka u Bitkoin mreži?
answer: Jedinstveni otisak prsta povezan sa blokom, sastavljen od 256 karaktera.
wrong_answers:
  - Jedinstveni kod koji se koristi za pristup bloku.
  - Jedinstvena lozinka potrebna za rudarenje bloka.
  - Jedinstveni identifikator za rudara koji je iskopao blok.
explanation: |
  U kontekstu rudarenja bloka u Bitkoin mreži, važeći Hash je jedinstveni otisak prsta povezan sa blokom, sastavljen od 256 karaktera. Validnost ovog Hash-a zavisi od težine Bitkoin mreži.
reviewed: true

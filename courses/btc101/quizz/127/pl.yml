question: Czym jest prawidłowy hasz w kontekście wydobywania bloku w sieci Bitcoin?
answer: Unikalny odcisk palca powiązany z blokiem, składający się z 256 znaków.
wrong_answers:
  - Unikalny kod używany do uzyskania dostępu do bloku.
  - Unikalne hasło wymagane do wydobycia bloku.
  - Unikalny identyfikator górnika, który wydobył blok.
explanation: |
  W kontekście wydobywania bloków w sieci Bitcoin, prawidłowy hasz jest unikalnym odciskiem palca powiązanym z blokiem, składającym się z 256 znaków. Ważność tego
  hasza zależy od trudności wydobycia w sieci Bitcoin.
reviewed: true

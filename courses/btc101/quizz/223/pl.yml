question: Co umożliwia sieć Lightning?
answer: Dokonywanie transakcji między osobami, które nie mają bezpośredniego połączenia kanałowego.
wrong_answers:
  - Tworzenie bezpośrednich połączeń kanałowych tylko ze scentralizowanymi centralami.
  - Tworzenie połączenia kanałów, które wymagają wielu potwierdzeń dla dowolnej transakcji.
  - Ustanawianie bezpośrednich połączeń kanałowych, które są ograniczone tylko do dużych transakcji.
explanation: |
  Sieć Lightning umożliwia dokonywanie transakcji między
  osobami, które nie mają bezpośredniego połączenia kanałowego.
reviewed: true

question: Lightning Network은 무엇을 가능하게 하나요?
answer: 직접 채널에 연결되어 있지 않은 개인 간에 거래하는 경우.
wrong_answers:
  - 중앙 집중식 거래소와만 직접 채널 연결을 만들 수 있습니다.
  - 모든 거래에 대해 여러 번의 확인이 필요한 채널 연결을 만들려면 다음과 같이 하세요.
  - 대규모 거래로만 제한되는 직접 채널 연결을 설정합니다.
explanation: |
  Lightning Network을 사용하면 직접 채널에 연결되지 않은 개인 간의 거래가 가능합니다
  개인 간의 거래가 가능합니다.
reviewed: true
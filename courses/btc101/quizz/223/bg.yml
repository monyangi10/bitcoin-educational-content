question: Какво позволява Lightning Network?
answer: Сключване на сделки между лица, които нямат пряка връзка по канал.
wrong_answers:
  - Създаване на директни канални връзки само с централизирани борси.
  - Създаване на връзки с канали, които изискват множество потвърждения за всяка транзакция.
  - Създаване на директни канални връзки, които са ограничени само до големи транзакции.
explanation: |
  Lightning Network дава възможност за осъществяване на транзакции между
  лица, които нямат директна канална връзка.
reviewed: true
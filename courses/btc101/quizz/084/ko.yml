question: 오프라인 또는 Cold, 물리적 Wallet의 권장 사용법은 무엇인가요?
answer: 대용량 저장.
wrong_answers:
  - 일일 비용 저장.
  - 소량 저장.
  - 단기 저축을 저장합니다.
explanation: |
  오프라인 또는 Cold, 물리적 Wallet는 다음과 같은 경우에 권장됩니다
  온라인 위협에 덜 취약하기 때문에 많은 양을 저장하는 경우
  온라인 위협에 덜 취약하기 때문입니다. 하지만
  일상적인 거래에는 접근성이 떨어지므로
  접근성이 떨어지므로 일상적인 거래에는 권장하지 않습니다.
reviewed: true
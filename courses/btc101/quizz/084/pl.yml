question: Jakie jest zalecane użycie fizycznego portfela w trybie offline (zimnego portfela)?
answer: Przechowywanie dużych ilości pieniędzy.
wrong_answers:
  - Przechowywanie kwot na codzienne wydatki.
  - Przechowywanie małych ilości pieniędzy.
  - Przechowywanie krótkoterminowych oszczędności.
explanation: |
  Do przechowywania dużych ilości pieniędzy zalecany jest fizyczny portfel offline lub tzw. zimny portfel, ponieważ jest mniej podatny na
  zagrożenia online niż portfele gorące. Nie jest on jednak praktyczny do używania
  do codziennych wydatków, ponieważ jest mniej wygodny do wykonywania codziennych transakcji.
reviewed: true

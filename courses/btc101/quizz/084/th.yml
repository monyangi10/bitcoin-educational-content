question: การใช้งานที่แนะนำสำหรับ wallet แบบออฟไลน์หรือแบบเย็นคืออะไร?
answer: การจัดเก็บจำนวนมาก
wrong_answers:
  - การจัดเก็บค่าใช้จ่ายรายวัน
  - การจัดเก็บในปริมาณน้อย
  - การเก็บออมระยะสั้น
explanation: |
  แนะนำให้ใช้ wallet แบบออฟไลน์ หรือแบบเย็น สำหรับการเก็บรักษาจำนวนมากเพราะมีความเสี่ยงต่อภัยคุกคามออนไลน์น้อยกว่ากระเป๋าเงินแบบร้อน อย่างไรก็ตาม ไม่แนะนำสำหรับการใช้จ่ายในชีวิตประจำวันเพราะเข้าถึงได้ยากกว่าสำหรับการทำธุรกรรมประจำวัน
reviewed: true
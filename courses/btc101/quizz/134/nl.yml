question: Wat zijn de kosten van een Bitcoin knooppunt op een Raspberry Pi 4 in termen van elektriciteitsverbruik per jaar (vanaf 2023)?
answer: Iets minder dan € 10 per jaar.
wrong_answers:
  - Iets meer dan 50€ per jaar.
  - Iets minder dan € 100 per jaar.
  - Ongeveer 200€ per jaar.
explanation: |
  Het draaien van een Bitcoin node op een Raspberry Pi 4 kost iets
  minder dan 10€ per jaar in termen van elektriciteitsverbruik
  vanaf 2023.
reviewed: true
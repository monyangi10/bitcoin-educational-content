question: Koliko košta pokretanje Bitkoin čvora na Raspberry Pi 4 u smislu potrošnje električne energije godišnje (podatak iz 2023.)?
answer: Malo manje od 10€ godišnje.
wrong_answers:
  - Malo više od 50€ godišnje.
  - Malo manje od 100€ godišnje.
  - Oko 200€ godišnje.
explanation: |
  Pokretanje Bitkoin čvora na Raspberry Pi 4 košta nešto
  manje od 10€ godišnje u smislu potrošnje električne energije prema podacima
  od 2023.godine.
reviewed: true

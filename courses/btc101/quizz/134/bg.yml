question: Какви са разходите за експлоатация на възел Bitcoin на Raspberry Pi 4 по отношение на потреблението на електроенергия за година (към 2023 г.)?
answer: Малко по-малко от 10 евро на година.
wrong_answers:
  - Малко повече от 50 евро на година.
  - Малко по-малко от 100 евро на година.
  - Около 200 евро на година.
explanation: |
  Изпълнението на възел Bitcoin на Raspberry Pi 4 струва малко
  по-малко от 10 € годишно по отношение на потреблението на електроенергия
  от 2023 г.
reviewed: true
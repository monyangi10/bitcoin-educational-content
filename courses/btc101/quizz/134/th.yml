question: ต้นทุนในการรันโหนด Bitcoin บน Raspberry Pi 4 ในแง่ของการใช้ไฟฟ้าต่อปี (ณ ปี 2023) คือเท่าไร?
answer: น้อยกว่า 10€ ต่อปีเล็กน้อย
wrong_answers:
  - มากกว่า 50€ ต่อปีเล็กน้อย
  - น้อยกว่า 100€ ต่อปีเล็กน้อย
  - ประมาณ 200€ ต่อปี
explanation: |
  การรันโหนด Bitcoin บน Raspberry Pi 4 มีค่าใช้จ่ายด้านการใช้ไฟฟ้าน้อยกว่า 10€ ต่อปี ณ ปี 2023
reviewed: true
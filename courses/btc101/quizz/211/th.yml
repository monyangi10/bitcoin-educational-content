question: ลักษณะของการนำ Bitcoin มาใช้ตามที่อธิบายไว้ในหลักสูตรนี้คืออะไร?
answer: ไวรัล
wrong_answers:
  - ช้าแต่มั่นคง
  - รวดเร็วและควบคุมไม่ได้
  - เกิดขึ้นเป็นครั้งคราวและคาดเดาไม่ได้
explanation: |
  ข้อความของหลักสูตรอธิบายการยอมรับ Bitcoin ว่าเป็นไวรัล โดยบ่งบอกว่ามันแพร่กระจายอย่างรวดเร็วและกว้างขวางจากคนหนึ่งไปยังอีกคนหนึ่ง คล้ายกับไวรัส แต่เป็นไวรัสที่ดี
reviewed: true
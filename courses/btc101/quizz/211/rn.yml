question: Ni ubuhe buryo bwo kwemera Bitcoin nk’uko buvugwa muri iri shure?
answer: Virus.
wrong_answers:
  - Buhoro kandi ushikamye.
  - Ivyihuta kandi bidashobora gucungera.
  - Ivy’ibihe bimwe bimwe kandi bitamenyekana.
explanation: |
  Ico canditswe c’amashure kidondora ukuntu Bitcoin yemerewe nk’aho ari umugera,
  bikaba vyerekana ko ikwiragizwa ningoga kandi cane kuva ku muntu umwe .
  umuntu ku wundi, nk’umugera, ariko ari mwiza.
reviewed: true
question: Какво е естеството на адопцията на Bitcoin, както е описано в този курс?
answer: Вирусен.
wrong_answers:
  - Бавно и сигурно.
  - Бързо и неконтролируемо.
  - Спорадични и непредсказуеми.
explanation: |
  Текстът на курса описва приемането на Bitcoin като вирусно,
  което предполага, че то се разпространява бързо и широко от един
  от един човек на друг, подобно на вирус, но добър.
reviewed: true

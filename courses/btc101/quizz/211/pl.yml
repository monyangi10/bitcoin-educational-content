question: Jaka jest natura adopcji Bitcoina opisana w tym kursie?
answer: Wirusowa.
wrong_answers:
  - Powolna i stabilna.
  - Gwałtowna i niekontrolowana.
  - Sporadyczna i nieprzewidywalna.
explanation: |
  Tekst kursu opisuje przyjęcie Bitcoina jako wirusowe,
  sugerując, że rozprzestrzenia się on szybko od jednej osoby do drugiej, podobnie jak wirus, ale dobry.
reviewed: true

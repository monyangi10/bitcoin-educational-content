question: Wat was het DigiCash-project?
answer: Een poging om anoniem elektronisch geld te maken door David Chaum.
wrong_answers:
  - Een project om een digitale Wallet te maken voor Bitcoin.
  - Een poging van de Federal Reserve om al het fysieke geld te digitaliseren.
  - Een project om een cryptocurrency te creëren gebaseerd op Bitcoin.
explanation: |
  David Chaum introduceerde het concept van anoniem elektronisch
  geld met zijn project DigiCash in de jaren 1980.
reviewed: true
question: ข้อเสียอย่างหนึ่งของทองคำในฐานะรูปแบบของเงินคืออะไร?
answer: มันไม่สามารถหารได้ลงตัวง่าย ๆ
wrong_answers:
  - มันไม่รักษามูลค่าของมันข้ามพื้นที่
  - มันกัดกร่อนตามกาลเวลา
  - มันง่ายที่จะผลิต
explanation: |
  หนึ่งในข้อเสียหลักของทองคำในฐานะรูปแบบของเงินคือ
  การแบ่งออกเป็นหน่วยย่อยได้ยากเมื่อมีความจำเป็น
  ซึ่งทำให้ใช้งานได้ไม่สะดวกเท่าที่ควร
reviewed: true
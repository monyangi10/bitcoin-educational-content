question: मुद्रा के रूप में सोने का एक नुकसान क्या है?
answer: यह आसानी से विभाज्य नहीं है.
wrong_answers:
  - इसका मूल्य अंतरिक्ष में एक समान नहीं रहता।
  - यह समय के साथ नष्ट हो जाता है।
  - इसका उत्पादन करना आसान है.
explanation: |
  मुद्रा के रूप में सोने का एक मुख्य नुकसान यह है कि आवश्यकता पड़ने पर इसे छोटी इकाइयों में विभाजित करना मुश्किल होता है, जिससे इसका उपयोग कम व्यावहारिक हो जाता है।
reviewed: true
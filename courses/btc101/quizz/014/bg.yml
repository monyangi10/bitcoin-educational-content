question: Кой е един от недостатъците на златото като вид пари?
answer: То не се дели лесно.
wrong_answers:
  - Той не запазва стойността си в пространството.
  - С течение на времето тя се разрушава.
  - Лесно се произвежда.
explanation: |
  Един от основните недостатъци на златото като вид пари е
  че е трудно да се раздели на малки единици, тъй като е необходимо
  което го прави по-малко практично за използване.
reviewed: true
question: หนึ่งในเหตุผลที่ Bitcoin ประสบกับฟองสบู่เก็งกำไรมากมายคืออะไร?
answer: เนื่องจากอุปทานที่จำกัดรวมกับความต้องการที่สูง
wrong_answers:

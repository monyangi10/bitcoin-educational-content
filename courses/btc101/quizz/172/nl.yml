question: Wat is het belangrijkste verschil tussen Keynesiaanse economie en Oostenrijkse economie met betrekking tot het monetaire systeem?
answer: Keynesiaanse economie houdt geen rekening met de tijdelijke en dynamische aspecten van situaties en middelen.

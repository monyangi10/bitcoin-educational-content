question: Waarom is privacy belangrijk in de context van Bitcoin?
answer: Om het risico te minimaliseren dat je geld wordt getraceerd.
wrong_answers:
  - Om de waarde van je bitcoins te verlagen.
  - Om te voorkomen dat je bitcoins worden gestolen.
  - Om belasting te betalen over je bitcoins.
explanation: |
  Privacy is belangrijk in de context van Bitcoin om het risico te minimaliseren dat
  de risico's te minimaliseren dat je geld wordt getraceerd, wat het
  uw toezicht kan vergemakkelijken.
reviewed: true
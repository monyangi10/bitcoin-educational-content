question: KYC가 아닌 비트코인을 구매해야 하는 이유는 무엇인가요?
answer: 개인 정보 보호를 위해.
wrong_answers:
  - 모든 Bitcoin 사용자의 등록을 보장합니다.
  - 저렴한 가격에 구매하기.
  - 저렴한 가격에 판매합니다.
explanation: |
  KYC가 적용되지 않은 비트코인을 구매한다는 것은 다음과 같은 절차 없이 비트코인을 획득하는 것을 의미합니다
  표준 고객 알기
  확인 절차를 거치지 않고 비트코인을 획득하는 것을 의미합니다
  요구합니다. 개인이 이 방법을 선택하는 주된 이유 중 하나는
  개인 정보 보호와 금융 활동을 보장하기 위한 것입니다
  개인 정보 및 금융 활동을
  비공개로 유지하기 위해서입니다.
reviewed: true
question: Защо трябва да купувате биткойни, които не подлежат на KYC?
answer: За да гарантираме поверителността ви.
wrong_answers:
  - За да се гарантира регистрацията на всички потребители на Bitcoin.
  - Да се купи на ниска цена.
  - Да се продава на ниска цена.
explanation: |
  Закупуването на биткойни без KYC означава придобиване на биткойни без
  преминавайки през стандартната процедура "Познай своя клиент
  процедури за проверка, които много борси и платформи
  изискват. Една от основните причини, поради които хората могат да изберат тази
  е да запазят поверителността си, като гарантират, че техните
  личните данни и финансовите дейности да останат
  не се разкриват.
reviewed: true
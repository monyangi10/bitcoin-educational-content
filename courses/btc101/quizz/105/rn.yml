question: Ni kuki ukwiye kugura ama bitcoins atari KYC?
answer: Kugira ngo ubone ubuzima bwite bwawe.
wrong_answers:
  - Kugira ngo abakoresha Bitcoin bose bandikwe.
  - Kugura kugiciro gito.
  - Kugurisha kugiciro gito.
explanation: |
  Gugura ama bitcoins atari KYC bisigura kuronka ama bitcoins ata .
  guca mu rugero rwo kumenya umukiriya wawe
  uburyo bwo kugenzura ko amahinguriro menshi n'ibibanza
  bisaba. Imvo nyamukuru imwe yotuma abantu bashobora guhitamwo ibi
  inzira ni ukubungabunga ubuzima bwite bwabo, kugira ngo .
  amakuru yerekeye umuntu n'ibikorwa vy'amahera biragumaho
  ntivyamenyekanye.
reviewed: true
question: През коя година ще се случи седмото намаление наполовина?
answer: 2036
wrong_answers:
  - 2032
  - 2028
  - 2048
explanation: |
  Седмото намаление наполовина трябва да се случи през 2036 г., а очакваната
  броят на биткойните в обращение ще бъде 20 835 937.5,
  което приблизително ще съответства на 99.22% от общия брой
  предлагането.
reviewed: true

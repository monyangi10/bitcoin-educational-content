question: Wat is het commando om de hoeveelheid bitcoins in omloop op een Bitcoin knooppunt te verifiëren?
answer: bitcoin-cli gettxoutsetinfo.
wrong_answers:
  - bitcoin-cli getblockchaininfo.
  - bitcoin-cli getwalletinfo.
  - bitcoin-cli getnetworkinfo.
explanation: |
  Het commando om de hoeveelheid bitcoins in
  circulatie op een Bitcoin knooppunt is bitcoin-cli
  gettxoutsetinfo. Dit commando biedt transparantie en
  en controleerbaarheid, waardoor het vertrouwen in het Bitcoin systeem wordt versterkt.
reviewed: true
question: ทำไมจึงแนะนำให้หลีกเลี่ยงการเก็บบิทคอยน์ไว้บนแพลตฟอร์มแลกเปลี่ยน?
answer: พวกเขาอาจเสี่ยงต่อการถูกโจมตีจากแฮกเกอร์
wrong_answers:
  - แพลตฟอร์ม Exchange เรียกเก็บค่าธรรมเนียมแบบสุ่ม
  - Bitcoin สูญเสียมูลค่าในแพลตฟอร์มการแลกเปลี่ยน
  - แพลตฟอร์ม Exchange ไม่ใช่สถาบันที่ได้รับการควบคุม
explanation: |
  ขอแนะนำให้หลีกเลี่ยงการเก็บบิตคอยน์ของคุณไว้บนแพลตฟอร์มแลกเปลี่ยน เพราะอาจเสี่ยงต่อการถูกโจมตีจากแฮกเกอร์ได้
reviewed: true
question: Zašto je preporučljivo izbegavati ostavljanje svojih Bitkoina na platformama za razmenu (menjačnicama)?
answer: Oni mogu biti podložni hakerskim napadima.
wrong_answers:
  - Platforme za razmenu naplaćuju nasumične naknade.
  - Bitkoin gubi vrednost na platformama za razmenu.
  - Platforme za razmenu nisu regulisana institucija.
explanation: |
  Preporučuje se da izbegavate ostavljanje svojih Bitkoina na menjačnicama jer mogu biti podložne hakerskim napadima.
reviewed: true

question: Dlaczego zaleca się unikanie pozostawiania bitcoinów na platformach wymiany?
answer: Mogą być podatne na ataki hakerów.
wrong_answers:
  - Platformy wymiany pobierają losowe opłaty.
  - Bitcoin traci wartość na platformach wymiany.
  - Platformy wymiany nie są instytucjami regulowanymi.
explanation: |
  Zaleca się unikanie pozostawiania bitcoinów na platformach wymiany,
  ponieważ mogą one być podatne na ataki hakerów.
reviewed: true

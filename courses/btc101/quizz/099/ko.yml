question: 비트코인을 Exchange 플랫폼에 두지 않는 것이 좋은 이유는 무엇인가요?
answer: 해커의 공격에 취약할 수 있습니다.
wrong_answers:
  - Exchange 플랫폼은 무작위 수수료를 부과합니다.
  - Bitcoin는 Exchange 플랫폼에서 가치를 잃습니다.
  - Exchange 플랫폼은 규제 기관이 아닙니다.
explanation: |
  비트코인은 해커에게 취약할 수 있으므로 Exchange
  플랫폼은 해커의 공격에 취약할 수 있으므로
  공격에 취약할 수 있습니다.
reviewed: true
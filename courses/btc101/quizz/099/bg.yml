question: Защо е препоръчително да не оставяте своите биткойни в платформите за обмен?
answer: Те могат да бъдат податливи на хакерски атаки.
wrong_answers:
  - Платформите Exchange начисляват произволни такси.
  - Bitcoin губи стойността си в платформите за обмен.
  - Платформите Exchange не са регулирана институция.
explanation: |
  Препоръчително е да избягвате да оставяте своите биткойни на борсата
  платформи, тъй като те могат да бъдат податливи на хакерски атаки
  атаки.
reviewed: true
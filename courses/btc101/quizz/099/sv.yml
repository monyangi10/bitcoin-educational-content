question: Varför är det tillrådligt att undvika att lämna dina Bitcoins på Exchange-plattformar?
answer: De kan vara mottagliga för hackerattacker.
wrong_answers:
  - Exchange-plattformar tar ut slumpmässiga avgifter.
  - Bitcoin förlorar i värde på Exchange-plattformar.
  - Exchange-plattformar är inte reglerade institutioner.
explanation: |
  Det är tillrådligt att undvika att lämna dina Bitcoins på Exchange
  plattformar eftersom de kan vara mottagliga för hacker
  attacker.
reviewed: true
question: Vad är begreppet "skin in the game" i samband med videospelsindustrin?
answer: Att ha ett ekonomiskt intresse i resultatet av en match.
wrong_answers:
  - Anpassa karaktärer med unika skins som förbättrar spelupplevelsen.
  - Köpa föremål i spelet med riktiga pengar.
  - Sälja spelskinn för riktiga pengar.
explanation: |
  Konceptet "skin in the game" är en idé som nyligen har
  nyligen blivit populär inom videospelsindustrin. Det
  i huvudsak till idén att utvecklare och intressenter har en
  och intressenter har en personlig investering eller andel i ett spels
  framgång för ett spel, vilket anpassar deras intressen till att
  leverera en kvalitetsprodukt.
reviewed: true
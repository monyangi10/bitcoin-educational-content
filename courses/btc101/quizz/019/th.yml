question: ทำไมทองคำถึงไม่สามารถทำได้ดีในโลกที่เป็นโลกาภิวัตน์และดิจิทัล?
answer: เพราะว่ามันต้องการหน่วยงานกลางเพื่อทำให้สามารถแบ่งแยกและแลกเปลี่ยนได้ง่าย
wrong_answers:
  - เพราะมันไม่มีคุณค่ามากพอ
  - เพราะมันไม่ได้หายากพอ
  - เพราะมันสึกกร่อนตามกาลเวลา
explanation: |
  ทองคำไม่สามารถตามทันในโลกที่เป็นโลกาภิวัตน์และดิจิทัลได้
  เพราะมันต้องการหน่วยงานกลางเพื่อทำให้มันแบ่งย่อยได้และ
  แลกเปลี่ยนได้ง่ายขึ้น สิ่งนี้ทำให้มันใช้งานได้น้อยลงใน
  โลกที่การทำธุรกรรมเป็นดิจิทัลและกระจายศูนย์มากขึ้นเรื่อยๆ
reviewed: true
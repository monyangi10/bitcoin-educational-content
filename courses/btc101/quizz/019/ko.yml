question: 글로벌화되고 디지털화된 세상에서 금이 좋은 성과를 내지 못하는 이유는 무엇일까요?
answer: 분할 가능하고 쉽게 교환할 수 있는 중앙 개체가 필요하기 때문입니다.
wrong_answers:
  - 가치가 충분하지 않기 때문입니다.
  - 충분히 드물기 때문입니다.
  - 시간이 지남에 따라 침식되기 때문입니다.
explanation: |
  금은 세계화되고 디지털화된 세상을 따라잡을 수 없습니다
  금을 나눌 수 있고 쉽게 교환할 수 있는
  쉽게 교환할 수 있어야 하기 때문입니다. 따라서 거래가 점점 더 디지털화되고
  거래가 점점 더 디지털화되고 탈중앙화되는 세상에서
  실용성이 떨어집니다.
reviewed: true
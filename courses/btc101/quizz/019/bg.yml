question: Защо златото не може да се представи добре в глобализирания и дигитален свят?
answer: Защото се нуждае от централен субект, който да я направи делима и лесно разменяема.
wrong_answers:
  - Защото не е достатъчно ценно.
  - Защото не е достатъчно рядък.
  - Защото с течение на времето тя се разрушава.
explanation: |
  Златото не може да върви в крак с глобализирания и цифров свят
  защото се нуждае от централна единица, която да го направи делимо и
  лесно да се разменя. Това го прави по-малко практично за използване в
  свят, в който транзакциите са все по-цифрови и
  децентрализирани.
reviewed: true

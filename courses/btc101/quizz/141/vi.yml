question: Kết quả của cuộc chiến khối vào năm 2017 là gì?
answer: Người dùng và các nút đã từ chối thay đổi đề xuất nhằm tăng kích thước khối, và đã kích hoạt một bản cập nhật gọi là SegWit.
wrong_answers:
  - Người dùng và các nút đã chấp nhận thay đổi đề xuất nhằm tăng kích thước khối, và đã kích hoạt một bản cập nhật gọi là SegWit.
  - Người dùng và các nút đã từ chối thay đổi đề xuất nhằm tăng kích thước khối, và không kích hoạt bất kỳ bản cập nhật nào.
  - Người dùng và các nút đã chấp nhận thay đổi đề xuất nhằm tăng kích thước khối, và không kích hoạt bất kỳ bản cập nhật nào.

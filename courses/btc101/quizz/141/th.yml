question: ผลลัพธ์ของสงครามบล็อกในปี 2017 คืออะไร?
answer: ผู้ใช้และโหนดปฏิเสธการเปลี่ยนแปลงที่เสนอเพื่อเพิ่มขนาดบล็อก และเปิดใช้งานการอัปเดตที่เรียกว่า SegWit
wrong_answers:
  - ผู้ใช้และโหนดต่างยอมรับการเปลี่ยนแปลงที่เสนอเพื่อเพิ่มขนาดบล็อก และได้เปิดใช้งานการอัปเดตที่เรียกว่า SegWit
  - ผู้ใช้และโหนดปฏิเสธการเปลี่ยนแปลงที่เสนอเพื่อเพิ่มขนาดบล็อก และไม่ได้เปิดใช้งานการอัปเดตใด ๆ
  - ผู้ใช้และโหนดยอมรับการเปลี่ยนแปลงที่เสนอเพื่อเพิ่มขนาดบล็อก และไม่ได้เปิดใช้งานการอัปเดตใดๆ
explanation: >-
reviewed: true
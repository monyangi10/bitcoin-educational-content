question: Raspberry Pi 4 üzerinde bir Bitcoin düğümü çalıştırmanın yıllık elektrik tüketimi açısından maliyeti nedir (2023 itibariyle)?
answer: Yıllık 10€'dan biraz daha az.
wrong_answers:
  - Yıllık 50 Avro'dan biraz daha fazla.
  - Yıllık 100 Avro'dan biraz daha az.
  - Yıllık yaklaşık 200 Avro.
explanation: |
  Raspberry Pi 4 üzerinde bir Bitcoin düğümü çalıştırmak biraz maliyetlidir
  elektrik tüketimi açısından yılda 10 €'dan az
  2023 itibariyle.
reviewed: true
question: 콘텐츠 크리에이터에게 Lightning Network의 잠재적인 이점 중 하나는 무엇인가요?
answer: 사용자의 관심을 끌기 위해 양질의 콘텐츠를 제작하도록 인센티브를 제공할 수 있습니다.
wrong_answers:
  - 콘텐츠에 더 많은 비용을 청구할 수 있게 됩니다.
  - 더 많은 잠재 고객에게 도달할 수 있을 것입니다.
  - 사용자의 관심을 끌 수 있는 콘텐츠를 더 빠르게 제작할 수 있게 됩니다.
explanation: |
  Lightning Network을 사용하면 콘텐츠 제작자는 다음과 같은 이점을 누릴 수 있습니다
  사용자의 관심을 끌 수 있는 양질의 콘텐츠를 제작하도록 인센티브를 제공합니다
  양질의 콘텐츠를 제작하도록 장려할 것입니다. 사용자는 자신이 소비한 콘텐츠에 대해서만 비용을 지불하므로
  콘텐츠에 대해서만 비용을 지불하므로 선불 구독
  수수료.
reviewed: true
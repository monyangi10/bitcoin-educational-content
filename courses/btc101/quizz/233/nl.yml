question: Wat is een van de potentiële voordelen van de Lightning Network voor contentmakers?
answer: Ze zouden gestimuleerd worden om inhoud van goede kwaliteit te produceren om de aandacht van gebruikers vast te houden.
wrong_answers:
  - Ze zouden meer kunnen vragen voor hun inhoud.
  - Ze zouden een breder publiek kunnen bereiken.
  - Ze zouden sneller inhoud kunnen produceren om de aandacht van gebruikers vast te houden.
explanation: |
  Met de Lightning Network zouden makers van inhoud
  gestimuleerd om inhoud van goede kwaliteit te produceren om de aandacht van

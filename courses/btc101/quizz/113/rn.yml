question: Ni ryari Bitcoin yakoreshejwe ubwa mbere mu kugura ibintu vy’umubiri?
answer: Igihe Laszlo Hanyecz yagura pizza 2 ku bihumbi 10 vy’ama BTC.
wrong_answers:
  - Igihe Hal Finney yagura imodoka ku madolari 100.000 BTC.
  - Igihe Satoshi Nakamoto yagura inzu ku mahera 1.000.000.000 BTC.
  - Nta n’imwe mu zindi nzira.
explanation: |
  Igihe ca mbere Bitcoin yakoreshwa mu kugura ibintu vy’umubiri .
  Ibicuruzwa vyari igihe Laszlo Hanyecz yagura pizza 2 ku bihumbi 10
  BTC, ku wa 2010/05/22 ubu izwi nka umusi wa Pizza
reviewed: true
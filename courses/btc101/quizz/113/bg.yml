question: Кога за първи път Bitcoin е използван за закупуване на физически стоки?
answer: Когато Ласло Ханиец купи 2 пици за 10 000 BTC.
wrong_answers:
  - Когато Hal Finney си купи кола за 100 000 BTC.
  - Когато Satoshi Nakamoto си купи къща за 1 000 000 000 000 BTC.
  - Нито една от другите възможности.
explanation: |
  За първи път Bitcoin е използван за закупуване на физически
  когато Ласло Ханиец купува 2 пици за 10 000
  BTC, на 22.05.2010 г., който сега е известен като Ден на пицата
reviewed: true
question: Kiedy po raz pierwszy użyto Bitcoina do zakupu towaru fizycznego?
answer: Kiedy Laszlo Hanyecz kupił 2 pizze za 10 000 BTC.
wrong_answers:
  - Kiedy Hal Finney kupił samochód za 100 000 BTC.
  - Kiedy Satoshi Nakamoto kupił dom za 1 000 000 000 BTC.
  - Żadna z pozostałych opcji.
explanation: |
  Pierwszy raz Bitcoin został użyty do zakupu towaru fizycznego, gdy Laszlo Hanyecz kupił 2 pizze za 10,000
  BTC, w dniu 2010/05/22, który jest obecnie znany jako Dzień Pizzy.
reviewed: true

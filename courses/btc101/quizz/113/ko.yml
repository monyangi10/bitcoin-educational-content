question: Bitcoin이 실물 상품 구매에 처음 사용된 것은 언제인가요?
answer: 라즐로 하녜츠는 10,000 BTC로 피자 2판을 구매했습니다.
wrong_answers:
  - 할 피니가 100,000 BTC에 자동차를 샀을 때.
  - Satoshi 나카모토가 1,000,000,000 BTC에 집을 샀을 때.
  - 다른 옵션은 없습니다.
explanation: |
  Bitcoin가 실물 상품 구매에 사용된 첫 번째 사례는
  상품을 구매한 것은 라즐로 하녜츠가 10,000달러에 피자 2판을 구매했을 때였습니다
  BTC, 현재 피자의 날로 알려진 2010/05/22에 구매했습니다
reviewed: true
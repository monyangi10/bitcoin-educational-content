question: 2% महंगाई का 5 साल में खरीदारी की ताकत पर क्या असर होता है?  

सीधे शब्दों में:  
- हर साल 2% महंगाई का मतलब है कि चीजें 2% महंगी हो जाती हैं।  
- 5 साल बाद, आपका पैसा पहले जितना नहीं खरीद पाएगा।  
- गणित से: (1 - 0.02)^5 ≈ 0.904, यानी आपकी खरीदारी की ताकत लगभग 9.6% कम हो जाएगी।  

उदाहरण:  
अगर आज 100 रुपये में 10 समोसे मिलते हैं, तो 5 साल बाद शायद सिर्फ 9 ही मिलेंगे!  

ध्यान रखें: यह सिर्फ एक अनुमान है, असल में दाम और भी चीजों से प्रभावित होते हैं।
answer: आपकी खरीदारी की ताकत 10% कम हो जाती है।
wrong_answers:
  - आपकी खरीदारी की ताकत में 2% की कमी आती है।
  - आपकी खरीदारी की ताकत में 5% की कमी आ जाती है।
  - आपकी खरीदने की ताक़त में 20% की कमी आ जाती है।
explanation: |
  2% महंगाई के साथ, आपकी खरीदारी की क्षमता 2% कम हो जाती है
  सालाना, जो 5 साल में 10% के बराबर होता है।
reviewed: true
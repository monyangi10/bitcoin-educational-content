question: เกิดอะไรขึ้นกับเงินดอลลาร์ซิมบับเวในเดือนเมษายน 2009?
answer: รัฐมนตรีว่าการกระทรวงการคลังประกาศระงับการใช้เงินดอลลาร์ซิมบับเวและอนุญาตให้ใช้สกุลเงินต่างประเทศอื่นๆ ในการค้า
wrong_answers:
  - ค่าเงินดอลลาร์ซิมบับเวลดลงกว่า 72%
  - รัฐบาลตกลงที่จะชดเชยให้กับทหารผ่านศึกเป็นจำนวนเงินเทียบเท่ากับ 450 ล้านเหรียญสหรัฐฯ
  - รัฐบาลจำเป็นต้องหันไปใช้การพิมพ์ธนบัตร
explanation: |
  ในเดือนเมษายน 2009 รัฐมนตรีว่าการกระทรวงการคลังประกาศระงับการใช้เงินดอลลาร์ซิมบับเวและอนุญาตให้ใช้สกุลเงินต่างประเทศในการค้า
reviewed: true
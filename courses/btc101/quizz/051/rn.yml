question: None idolari rya Zimbabwe ryabaye gute muri Ndamukiza 2009?
answer: Minisitiri w’ivy’imari yatangaje ko idolari rya Zimbabwe rihagaritswe, yongera yemerera gukoresha amafaranga atandukanye y’amahanga mu bucuruzi.
wrong_answers:
  - Idolari rya Zimbabwe ryaragabanutse n’ibice birenga 72%.
  - Leta yemeye guha indishi abahoze mu ntambara amahera angana n’amadolari y’Amerika miliyoni 450.
  - Leta yategerezwa gufata ingingo yo gutwara icapa.
explanation: |
  Muri Ndamukiza 2009, umushikiranganji w’ivy’imari yaratangaje ko
  guhagarika idolari rya Zimbabwe no kwemerera gukoreshwa
  y’amafaranga atandukanye y’amahanga yo gucuruza.
reviewed: true
question: Какво се случи със зимбабвийския долар през април 2009 г.?
answer: Министърът на финансите обяви спирането на зимбабвийския долар и разреши използването на различни чуждестранни валути за търговия.
wrong_answers:
  - Зимбабвийският долар се срина с над 72%.
  - Правителството се съгласи да изплати обезщетение на ветераните от войната в размер на 450 милиона щатски долара.
  - Правителството трябваше да прибегне до печатницата.

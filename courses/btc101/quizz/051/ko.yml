question: 2009년 4월에 짐바브웨 달러는 어떻게 되었나요?
answer: 재무부 장관은 짐바브웨 달러의 사용 중단을 발표하고 무역에 다른 외화를 사용할 수 있도록 승인했습니다.
wrong_answers:
  - 짐바브웨 달러는 72% 이상 폭락했습니다.
  - 정부는 4억 5천만 달러에 해당하는 금액을 참전 용사들에게 보상하기로 합의했습니다.
  - 정부는 인쇄기를 가동하는 데 의존해야 했습니다.
explanation: |
  2009년 4월, 재무부 장관은 짐바브웨 달러를
  짐바브웨 달러의 정지와 사용을 승인했습니다
  무역을 위한 다른 외화의 사용을 승인했습니다.
reviewed: true
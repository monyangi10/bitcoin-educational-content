question: ความกังวลหลักควรเป็นอะไรเมื่อคุณเป็นเจ้าของบิตคอยน์?
answer: ความปลอดภัยของเงินทุนของคุณ
wrong_answers:
  - มูลค่าของ Bitcoin ในรูปของเงินดอลลาร์
  - ความถูกต้องตามกฎหมายของการครอบครองบิตคอยน์
  - การอนุญาตให้ใช้จ่ายเงินของคุณ
explanation: |
  เมื่อคุณเป็นเจ้าของบิตคอยน์ ความกังวลหลักคือความปลอดภัยของเงินทุนของคุณ นี่เป็นเพราะว่า Bitcoin เช่นเดียวกับรูปแบบสกุลเงินอื่น ๆ สามารถถูกขโมยหรือสูญหายได้หากไม่ได้รับการรักษาความปลอดภัยอย่างเหมาะสม
reviewed: true
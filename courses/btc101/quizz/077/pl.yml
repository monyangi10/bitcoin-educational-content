question: Co powinno być twoim głównym zmartwieniem związanym z posiadaniem bitcoinów?
answer: Bezpieczeństwo twoich środków.
wrong_answers:
  - Wartość bitcoina w dolarach.
  - Legalność posiadania bitcoinów.
  - Zezwolenie na wydawanie środków.
explanation: |
  Kiedy posiadasz bitcoiny, twoim głównym zmartwieniem jest bezpieczeństwo
  środków. Wynika to z faktu, że bitcoiny, jak każda inna forma
  waluty, mogą zostać skradzione lub utracone, jeśli nie są odpowiednio zabezpieczone.
reviewed: true

question: Какво трябва да е основното ви притеснение, когато притежавате биткойн?
answer: Сигурността на вашите средства.
wrong_answers:
  - Стойността на Bitcoin в долари.
  - Законността на притежаването на биткойни.
  - Разрешението да изразходвате средствата си.
explanation: |
  Когато притежавате биткойни, основната грижа е сигурността
  на вашите средства. Това е така, защото Bitcoin, подобно на всяка друга форма
  валута, могат да бъдат откраднати или изгубени, ако не са правилно защитени.
reviewed: true
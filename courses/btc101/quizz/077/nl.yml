question: Wat is het risico van het delen van de publieke sleutel van een Bitcoin Wallet?
answer: Privacy verliezen.
wrong_answers:
  - De Bitcoin Wallet vernietigen.
  - De Bitcoins verliezen.
  - De Bitcoin Wallet hacken.
explanation: |
  Het delen van de openbare sleutel brengt risico's met zich mee voor de privacy, maar niet voor de veiligheid
  voor de veiligheid. De publieke sleutel wordt namelijk gebruikt om
  generate Bitcoin adressen en dus geld te ontvangen, maar het
  niet Ownership van de Bitcoins vertegenwoordigt.
reviewed: true
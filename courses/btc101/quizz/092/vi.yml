question: Bạn nên làm gì sau khi đã viết lại các từ của cụm từ khóa ghi nhớ?
answer: Tạo một bản sao thứ hai và lưu trữ nó ở một vị trí khác biệt.
wrong_answers:
  - Chia sẻ nó với một người bạn đáng tin cậy.
  - Gửi email cho chính mình.
  - Lưu trữ nó trong điện thoại của bạn.
explanation: |
  Một khi các từ của cụm từ khóa ghi nhớ đã được viết lại, bạn nên tạo một bản sao thứ hai và lưu trữ nó ở một vị trí khác biệt so với bản đầu tiên. Điều này cung cấp một bản sao dự phòng trong trường hợp mất mát hoặc có sự cố với bản sao đầu tiên.
reviewed: true
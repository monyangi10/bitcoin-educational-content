question: คุณควรทำอย่างไรเมื่อเขียนคำในวลีช่วยจำของคุณเสร็จแล้ว?
answer: ทำสำเนาที่สองและจัดเก็บไว้ในตำแหน่งที่แยกต่างหาก
wrong_answers:
  - แบ่งปันกับเพื่อนที่ไว้ใจได้
  - ส่งอีเมลถึงตัวเอง
  - บันทึกไว้ในโทรศัพท์ของคุณ
explanation: |
  เมื่อเขียนคำในวลีช่วยจำของคุณแล้ว ขอแนะนำให้ทำสำเนาชุดที่สองและเก็บไว้ในสถานที่ที่แยกจากชุดแรก สิ่งนี้จะเป็นการสำรองข้อมูลในกรณีที่สูญหายหรือเกิดอุบัติเหตุกับสำเนาชุดแรก
reviewed: true
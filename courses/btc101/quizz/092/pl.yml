question: Co powinieneś zrobić po napisaniu słów swojej frazy mnemonicznej?
answer: Utwórz drugą kopię i przechowuj ją w osobnym miejscu.
wrong_answers:
  - Podziel się nią z zaufanym przyjacielem.
  - Wyślij ją do siebie e-mailem.
  - Przechowuj ją w telefonie.
explanation: |
  Gdy słowa frazy mnemonicznej zostaną zapisane, zaleca się wykonanie drugiej kopii i przechowywanie jej w
  oddzielnej lokalizacji. Zapewni to dodatkową kopię zapasową na wypadek utraty pierwszej kopii.
reviewed: true

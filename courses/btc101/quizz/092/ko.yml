question: Mnemonic 문구의 문구가 작성되면 어떻게 해야 하나요?
answer: 두 번째 복사본을 만들어 별도의 장소에 보관하세요.
wrong_answers:
  - 신뢰할 수 있는 친구와 공유하세요.
  - 자신에게 이메일로 보내세요.
  - 휴대폰에 저장하세요.
explanation: |
  Mnemonic 문구의 문구를 작성한 후에는
  두 번째 사본을 만들어 첫 번째 사본과 별도의 장소에
  첫 번째 사본과 별도의 위치에 보관하는 것이 좋습니다. 이렇게 하면 첫 번째 사본을 분실하거나
  백업을 제공합니다.
reviewed: true
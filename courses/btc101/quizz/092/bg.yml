question: Какво трябва да направите, след като думите на вашата мнемонична фраза са написани?
answer: Направете второ копие и го съхранявайте на отделно място.
wrong_answers:
  - Споделете го с доверен приятел.
  - Изпратете го по имейл до себе си.
  - Съхранявайте го в телефона си.
explanation: |
  След като думите на вашата мнемонична фраза са написани, тя е
  препоръчително е да направите второ копие и да го съхраните в
  на отделно място от първото. Това осигурява резервно копие в
  в случай на загуба или инцидент с първото копие.
reviewed: true
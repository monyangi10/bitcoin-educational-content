question: Wat is het aanbevolen gebruik van een Multisig Wallet?
answer: Grote hoeveelheden opslaan voor zakelijk gebruik.
wrong_answers:
  - Kleine hoeveelheden opslaan voor persoonlijk gebruik.
  - Middelgrote hoeveelheden opslaan voor gebruik zonder winstoogmerk.
  - Dagelijkse uitgaven opslaan voor individueel gebruik.
explanation: |
  Een Multisig Wallet wordt aanbevolen voor het opslaan van grote hoeveelheden
  en voor zakelijk gebruik, omdat er meerdere
  handtekeningen nodig zijn om een transactie uit te voeren. Dit proces voegt een
  extra Layer beveiliging toe, omdat één persoon geen
  transactie uitvoeren zonder de goedkeuring van anderen.
reviewed: true
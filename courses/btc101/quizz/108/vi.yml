question: Ai là người đầu tiên tham gia mạng Bitcoin sau Satoshi Nakamoto?
answer: Hal Finney.
wrong_answers:
  - Laszlo Hanyecz.
  - Phil Champagne.
  - Rogzy.
explanation: |
  Hal Finney là người đầu tiên tham gia mạng Bitcoin
  chỉ sau Satoshi Nakamoto. Ông thậm chí đã đăng lên mạng xã hội là mình đang chạy
  Bitcoin để đánh dấu sự kiện này.
reviewed: true
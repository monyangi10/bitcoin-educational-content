question: Kto był pierwszą osobą, która dołączyła do sieci Bitcoin po Satoshim Nakamoto?
answer: Hal Finney.
wrong_answers:
  - Laszlo Hanyecz.
  - Phil Champagne.
  - Rogzy.
explanation: |
  Hal Finney był pierwszą osobą, która dołączyła do sieci Bitcoin
  po samym Satoshim Nakamoto. Aby upamiętnić ten moment, napisał nawet na Twitterze 'Running
  Bitcoin'.
reviewed: true

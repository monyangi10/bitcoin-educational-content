question: Кой е първият човек, присъединил се към мрежата Bitcoin след Сатоши Накамото?
answer: Хал Фини.
wrong_answers:
  - Ласло Ханиец.
  - Фил Шампанско.
  - Rogzy.
explanation: |
  Хал Фини е първият човек, който се присъединява към мрежата Bitcoin
  след самия Сатоши Накамото. Той дори написа в Туитър Running
  Bitcoin, за да отбележи случая.
reviewed: true

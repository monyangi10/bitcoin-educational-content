question: Ko je bila prva osoba koja se pridružila Bitkoin mreži nakon Satoshi Nakamoto?
answer: Hal Finney.
wrong_answers:
  - Laszlo Hanyecz.
  - Phil Champagne.
  - Rogzy.
explanation: |
  Hal Finney je bio prva osoba koja se pridružila Bitkoin mreži
  nakon Satoshi Nakamota samog. Čak je tvitovao "Running
  Bitcoin" (pokreće bitkoin mrežu) kako bi obeležio tu priliku.
reviewed: true

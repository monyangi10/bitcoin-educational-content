question: Wat is een Multisig Wallet?
answer: Een set wallets die meerdere handtekeningen vereist om een transactie uit te voeren.
wrong_answers:
  - Een Wallet waarvoor een enkele handtekening nodig is om een transactie uit te voeren.
  - Een Wallet die geen handtekeningen nodig heeft om een transactie uit te voeren.
  - Een Wallet waarvoor een fysieke handtekening nodig is om een transactie uit te voeren.
explanation: |
  Een Multisig Wallet is een type Bitcoin Wallet waarvoor
  meerdere handtekeningen nodig heeft om een transactie uit te voeren. Dit voegt een
  extra Layer beveiliging toe, omdat het betekent dat één persoon
  een transactie niet kan uitvoeren zonder de goedkeuring van
  anderen.
reviewed: true
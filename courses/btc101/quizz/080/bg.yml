question: Какво е multisig портфейл?
answer: Набор от портфейли, който изисква множество подписи за извършване на транзакция.
wrong_answers:
  - портфейл, който изисква само един подпис за извършване на транзакция.
  - портфейл, който не изисква подписи за извършване на транзакция.
  - портфейл, който изисква физически подпис за извършване на транзакция.
explanation: |
  Multisig портфейл е вид Bitcoin портфейл, който изисква
  няколко подписа за извършване на транзакция. Това добавя
  допълнително ниво на сигурност, тъй като това означава, че едно лице
  не може да извърши транзакция без одобрението на
  други лица.
reviewed: true

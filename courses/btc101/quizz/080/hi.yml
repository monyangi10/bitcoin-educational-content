question: किसी के द्वारा आपके 12 या 24 शब्दों की सूची को Bitcoin या Wallet में गलती से अनुमान लगाने की संभावना क्या है?
answer: "बेहद कम" या "अत्यंत न्यून"
wrong_answers:
  - हाय।
  - ठीक-ठाक।
  - मजबूत।
explanation: |
  Wallet बनाने में इस्तेमाल की गई क्रिप्टोग्राफी की वजह से,
  किसी के द्वारा गलती से आपकी लिस्ट का अंदाज़ा लगाने की संभावना
  12 या 24 शब्द बहुत ही कम हैं। यह ऐसा है जैसे खोजना...
  1 और $2^{256}$ के बीच का सही नंबर, जो लगभग...
  यूनिवर्स में एक परिभाषित एटम ढूंढने के बराबर।
reviewed: true
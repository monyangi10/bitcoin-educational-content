question: Multisig Wallet क्या है?
answer: वॉलेट्स का एक सेट जिसमें लेनदेन करने के लिए एकाधिक हस्ताक्षरों की आवश्यकता होती है।
wrong_answers:
  - Wallet जिसमें लेनदेन करने के लिए एकल हस्ताक्षर की आवश्यकता होती है।
  - एक Wallet जिसमें लेनदेन करने के लिए किसी हस्ताक्षर की आवश्यकता नहीं होती।
  - Wallet जिसमें लेनदेन करने के लिए भौतिक हस्ताक्षर की आवश्यकता होती है।
explanation: |
  Multisig Wallet एक प्रकार का Bitcoin Wallet है जिसमें लेनदेन करने के लिए
  कई हस्ताक्षरों की आवश्यकता होती है। यह सुरक्षा का एक अतिरिक्त Layer जोड़ता है, क्योंकि इसका मतलब है कि एक भी व्यक्ति दूसरों की मंजूरी के बिना लेनदेन नहीं कर सकता है।
reviewed: true
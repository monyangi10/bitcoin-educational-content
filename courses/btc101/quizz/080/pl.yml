question: Co to jest portfel wielopodpisowy?
answer: Zestaw portfeli, który wymaga wielu podpisów do przeprowadzenia transakcji.
wrong_answers:
  - Portfel, który wymaga pojedynczego podpisu do wykonania transakcji.
  - Portfel, który nie wymaga podpisów do przeprowadzenia transakcji.
  - Portfel, który wymaga fizycznego podpisu w celu przeprowadzenia transakcji.
explanation: |
  Portfel wielopodpisowy jest rodzajem portfela, który wymaga
  wielu podpisów do wykonania transakcji. Dodaje to
  dodatkową warstwę bezpieczeństwa, ponieważ oznacza, że pojedyncza osoba
  nie może wykonać transakcji bez zgody innych osób.
reviewed: true

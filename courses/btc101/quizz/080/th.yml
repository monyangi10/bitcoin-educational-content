question: มัลติซิก wallet คืออะไร?
answer: ชุดกระเป๋าเงินที่ต้องการลายเซ็นหลายรายการเพื่อดำเนินการทำธุรกรรม
wrong_answers:
  - wallet ที่ต้องการลายเซ็นเดียวในการทำธุรกรรม
  - wallet ที่ไม่ต้องการลายเซ็นเพื่อทำธุรกรรม
  - wallet ที่ต้องการลายเซ็นจริงเพื่อดำเนินการทำธุรกรรม
explanation: |
  wallet แบบ multisig เป็นประเภทของ Bitcoin wallet ที่ต้องการลายเซ็นหลายอันเพื่อดำเนินการทำธุรกรรม ซึ่งเพิ่มชั้นความปลอดภัยเพิ่มเติม เนื่องจากหมายความว่าบุคคลเพียงคนเดียวไม่สามารถดำเนินการทำธุรกรรมได้โดยไม่ได้รับการอนุมัติจากผู้อื่น
reviewed: true
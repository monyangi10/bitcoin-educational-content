question: Šta je Multisig novčanik?
answer: Skup novčanika koji zahteva više potpisa za obavljanje transakcije.
wrong_answers:
  - Novčanik koji zahteva jedan potpis za obavljanje transakcije.
  - Novčanik koji ne zahteva potpise za obavljanje transakcije.
  - Novčanik koji zahteva fizički potpis za obavljanje transakcije.
explanation: |
  Multisig novčanik je tip BitKoin novčanikA koji zahteva
  višestruke potpise za obavljanje transakcije. Ovo dodaje
  dodatni sloj sigurnosti, jer znači da jedna osoba
  ne može obaviti transakciju bez odobrenja drugih.
reviewed: true

question: ตัวเลือกใดต่อไปนี้เป็นเท็จเกี่ยวกับการสูญเสียอุปกรณ์ที่คุณมี Bitcoin wallet ของคุณ?
answer: คุณสามารถสร้าง wallet ของคุณใหม่และใช้จ่ายบิตคอยน์ของคุณโดยการรีเซ็ตรหัสผ่านของคุณ
wrong_answers:
  - คุณจะสูญเสีย Bitcoin ทั้งหมดของคุณหากคุณไม่มีวลีช่วยจำ
  - คุณสามารถตรวจสอบด้วยกุญแจสาธารณะของคุณว่า bitcoins ของคุณยังไม่ได้ถูกใช้จ่าย
  - คุณสามารถสร้าง wallet ของคุณใหม่และใช้จ่ายบิตคอยน์ของคุณโดยใช้วลีช่วยจำ
explanation: |
  การสูญเสียอุปกรณ์ที่คุณมี wallet ของคุณไม่ได้หมายความว่าคุณจะสูญเสีย Bitcoin ของคุณเสมอไป สิ่งที่ช่วยให้คุณสร้าง wallet ของคุณขึ้นมาใหม่และใช้จ่าย Bitcoin ของคุณคือวลีช่วยจำ
reviewed: true
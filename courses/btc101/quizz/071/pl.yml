question: Która z tych opcji jest fałszywa w odniesieniu do utraty urządzenia, na którym znajduje się portfel Bitcoin?
answer: Możesz odtworzyć portfel i wydawać bitcoiny poprzez zresetowanie hasła.
wrong_answers:
  - Stracisz wszystkie swoje bitcoiny, jeśli nie masz frazy mnemonicznej.
  - Za pomocą kluczy publicznych można zweryfikować, czy bitcoiny nie zostały wydane.
  - Możesz odtworzyć portfel i wydawać bitcoiny używając frazy mnemonicznej.
explanation: |
  Utrata urządzenia, na którym znajduje się portfel, nie musi oznaczać utraty bitcoinów. To, co pozwala
  na odtworzenie portfela i wydawanie bitcoinów to fraza mnemoniczna.
reviewed: true

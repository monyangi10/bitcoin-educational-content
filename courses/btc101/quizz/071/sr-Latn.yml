question: Koja od ovih opcija je netačna u vezi sa gubitkom uređaja na kojem imate svoj Bitkoin novčanik?
answer: Možete ponovo kreirati svoj novčanik i potrošiti svoj Bitkoin resetovanjem lozinke.
wrong_answers:
  - Izgubićete sve svoje Bitkoine ako nemate Mnemonic frazu.
  - Možete proveriti sa svojim javnim ključevima da vaši bitkoini nisu potrošeni.
  - Možete ponovo kreirati svoj novčanik i potrošiti svoj Bitkoin koristeći Mnemonic frazu.
explanation: |
  Gubljenje uređaja na kojem imate svoj novčanik ne znači nužno gubitak vaših Bitkoina. Ono što vam omogućava da ponovo kreirate svoj novčanik i potrošite svoj Bitkoin je Mnemonic fraza.
reviewed: true

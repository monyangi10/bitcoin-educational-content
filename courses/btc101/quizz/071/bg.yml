question: Коя от тези възможности е невярна относно загубата на устройството, на което е разположен вашият Bitcoin портфейл?
answer: Можете да пресъздадете своя портфейл и да похарчите биткойните си, като нулирате паролата си.
wrong_answers:
  - Ако не разполагате с мнемоничната фраза, губите всичките си биткойни.
  - С публичните си ключове можете да проверите дали вашите биткойни не са били похарчени.
  - Можете да пресъздадете своя портфейл и да похарчите биткойните си, като използвате мнемоничната фраза.
explanation: |
  Загубата на устройството, на което е инсталиран вашият портфейл, не
  непременно означава загуба на вашите биткойни. Това, което ви позволява
  да възстановите портфейл и да похарчите биткойните си, е
  мнемоничната фраза.
reviewed: true

question: หลักสูตรนี้บ่งบอกถึงอนาคตของ Bitcoin อย่างไร?
answer: มันจะไม่หายไปไหน
wrong_answers:
  - มันจะถูกแทนที่ด้วยเทคโนโลยีที่ดีกว่า
  - มันจะถูกแบนทั่วโลก
  - มันจะสูญเสียคุณค่า
explanation: |
  ข้อความในหลักสูตรระบุว่า Bitcoin จะไม่หายไป ในทางตรงกันข้าม การปฏิวัติพึ่งเริ่มต้นขึ้นเท่านั้น
reviewed: true
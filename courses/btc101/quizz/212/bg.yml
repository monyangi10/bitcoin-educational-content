question: Какво подсказва този курс за бъдещето на Bitcoin?
answer: Bitcoin няма да изчезне.
wrong_answers:
  - Bitcoin ще бъде заменен с по-добра технология.
  - Bitcoin ще бъде забранен в целия свят.
  - Bitcoin ще загуби стойността си.
explanation: |
  Текстът на курса предполага, че Bitcoin няма да
  изчезне. Напротив, революцията тепърва започва.
reviewed: true

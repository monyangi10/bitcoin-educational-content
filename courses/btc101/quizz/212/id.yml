question: Apa yang disarankan kursus ini tentang masa depan Bitcoin?
answer: Tidak akan menghilang
wrong_answers:
  - Akan digantikan oleh teknologi yang lebih baik
  - Akan dilarang di seluruh dunia
  - Akan kehilangan nilainya
explanation: >-
 Teks kursus menunjukkan bahwa Bitcoin tidak akan
 hilang. Sebaliknya, revolusi baru saja dimulai.
reviewed: true

question: Koja je uloga rudara u Bitkoin protokolu?
answer: Oni osiguravaju trenutnu i istorijsku mrežu.
wrong_answers:
  - Oni regulišu cenu Bitkoina.
  - Oni kontrolišu ponudu Bitkoina.
  - Oni upravljaju transakcijama između korisnika.
explanation: |
  Rudari u Bitkoin protokolu osiguravaju i trenutnu i
  istorijsku mrežu. Oni ne regulišu cenu
  Bitkoina, ne kontrolišu njegovu ponudu, niti upravljaju transakcijama
  između korisnika.
reviewed: true

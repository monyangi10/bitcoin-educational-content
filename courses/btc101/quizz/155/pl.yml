question: Jaka jest rola górników w protokole Bitcoin?
answer: Zabezpieczają bieżącą i historyczną sieć.
wrong_answers:
  - Regulują cenę bitcoina.
  - Kontrolują podaż bitcoina.
  - Zarządzają transakcjami między użytkownikami.
explanation: |
  Górnicy w protokole Bitcoin zabezpieczają zarówno sieć bieżącą, jak i historyczną. Nie regulują oni ceny
  bitcoina, nie kontrolują podaży ani nie zarządzają transakcjami
  między użytkownikami.
reviewed: true

question: Wat is de rol van miners in het Bitcoin protocol?
answer: Ze beveiligen het huidige en het historische netwerk.
wrong_answers:
  - Ze regelen de prijs van Bitcoin.
  - Ze controleren de Supply van Bitcoin.
  - Ze beheren transacties tussen gebruikers.
explanation: |
  Mijnwerkers in het Bitcoin protocol beveiligen zowel het huidige als het
  het historische netwerk. Ze regelen niet de prijs van
  Bitcoin, controleren Supply niet en beheren geen transacties
  tussen gebruikers.
reviewed: true
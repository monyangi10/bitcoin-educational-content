question: บทบาทของนักขุดในโปรโตคอล Bitcoin คืออะไร?
answer: พวกเขารักษาความปลอดภัยของเครือข่ายปัจจุบันและเครือข่ายในอดีต
wrong_answers:
  - พวกเขาควบคุมราคาของ Bitcoin.
  - พวกเขาควบคุมการจัดหา Bitcoin.
  - พวกเขาจัดการธุรกรรมระหว่างผู้ใช้
explanation: |
  นักขุดในโปรโตคอล Bitcoin ทำหน้าที่รักษาความปลอดภัยให้กับทั้งเครือข่ายปัจจุบันและเครือข่ายในอดีต พวกเขาไม่ได้ควบคุมราคาของ Bitcoin ควบคุมอุปทาน หรือจัดการธุรกรรมระหว่างผู้ใช้
reviewed: true
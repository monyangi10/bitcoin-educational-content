question: Каква е ролята на миньорите в протокола Bitcoin?
answer: Те осигуряват сигурността на текущата и историческата мрежа.
wrong_answers:
  - Те регулират цената на Bitcoin.
  - Те контролират доставките на Bitcoin.
  - Те управляват транзакциите между потребителите.
explanation: |
  Миньорите в протокола Bitcoin осигуряват както текущата, така и
  историческата мрежа. Те не регулират цената на
  Bitcoin, не контролират предлагането му, нито управляват транзакциите
  между потребителите.
reviewed: true
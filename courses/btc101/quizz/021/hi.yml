question: सोने को पैसे के रूप में इस्तेमाल करने का एक नुकसान क्या है?  

(या फिर अगर ज्यादा कैजुअल तरीके से पूछना हो तो:)  

सोने को पैसे की तरह यूज करने में क्या दिक्कत हो सकती है?  

(नोट: सोने के मुद्रा के रूप में नुकसानों में भारीपन, सुरक्षित भंडारण की चुनौती, या मूल्य में उतार-चढ़ाव जैसे पॉइंट्स शामिल हो सकते हैं।)
answer: यह आसानी से बाँटने लायक नहीं है।
wrong_answers:
  - यह अपनी कीमत को जगह-जगह बरकरार नहीं रखता।
  - यह समय के साथ घिस जाता है।
  - इसे बनाना आसान है।
explanation: |
  सोने को पैसे के रूप में इस्तेमाल करने का एक बड़ा नुकसान यह है कि
  छोटे यूनिट्स में बाँटना मुश्किल होना जैसी ज़रूरत
  होता है, जिसकी वजह से इसका इस्तेमाल करना कम व्यावहारिक हो जाता है।
reviewed: true
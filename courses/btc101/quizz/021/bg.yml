question: Какъв е пътят на развитие на днешната валута?
answer: Камъни, метали, сол, добитък, бартер -> Монета -> Банкнота -> Банкова карта -> Блокчейн -> Биткойн и Светкавичната мрежа
wrong_answers:
  - Суров камък -> Монета -> Банкнота -> Блокчейн -> Биткойн и Светкавичната мрежа
  - Суров камък -> Монета -> Банкнота -> Банкова карта -> Биткойн и Светкавичната мрежа
  - Суров камък -> Монета -> Банкова карта -> Банкнота -> Блокчейн -> Биткойн и Светкавичната мрежа
explanation: |
  Валутата е технология, която еволюира с времето,
  като се започне от представянето на сурови камъни и се
  в метални монети, след това в банкноти, банкови карти и
  и накрая в мрежи от типа peer-to-peer с помощта на
  Bitcoin.
reviewed: true

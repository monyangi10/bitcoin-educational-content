question: Wat is het evolutiepad van de huidige valuta?
answer: Ruwe steen -> Munt -> Bankbiljet -> Bankpas -> Blockchain -> Lightning Network
wrong_answers:
  - Ruwe steen -> Munt -> Bankbiljet -> Blockchain -> Lightning Network
  - Ruwe steen -> Munt -> Bankbiljet -> Bankpas -> Lightning Network
  - Ruwe steen -> Munt -> Bankpas -> Bankbiljet -> Blockchain -> Lightning Network
explanation: |
  Valuta is een technologie die met de tijd is geëvolueerd,
  beginnend met ruwe stenen, veranderend
  in metalen munten, dan in bankbiljetten, bankkaarten en
  en uiteindelijk in peer-to-peer netwerken met het gebruik van de
  Bitcoin Blockchain en de Lightning Network.
reviewed: true
question: Vilken är utvecklingsvägen för dagens valuta?
answer: Rå sten -> Mynt -> Sedel -> Bankkort -> Blockchain -> Lightning Network
wrong_answers:
  - Rå sten -> mynt -> sedel -> Blockchain -> Lightning Network
  - Rå sten -> Mynt -> Sedel -> Bankkort -> Lightning Network
  - Rå sten -> Mynt -> Bankkort -> Sedel -> Blockchain -> Lightning Network
explanation: |
  Valuta är en teknik som har utvecklats med tiden,
  från att ha representerats av råa stenar, övergått till
  till metallmynt, sedan till sedlar, bankkort och slutligen till
  slutligen till peer-to-peer-nätverk med användning av
  Bitcoin Blockchain och Lightning Network.
reviewed: true
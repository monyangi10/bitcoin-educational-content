question: Mikä mekanismi tekee Lightning-maksuista atomisia?
answer: HTLC
wrong_answers:
  - Moniallekirjoitus
  - Proof of Work
  - SegWit
explanation: |
  HTLC:t ehdollistavat maksun salaisuuden paljastamiseen ja takaavat täydellisen onnistumisen tai epäonnistumisen ilman tappiota.

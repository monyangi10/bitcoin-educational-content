question: กลไกใดที่ทำให้การชำระเงินด้วย Lightning เป็นอะตอมมิก?
answer: HTLC
wrong_answers:
  - มัลติซิกเนเจอร์
  - Proof of Work
  - SegWit
explanation: |
  HTLCs กำหนดเงื่อนไขการชำระเงินโดยอิงจากการเปิดเผยความลับ เพื่อให้มั่นใจถึงความสำเร็จหรือความล้มเหลวอย่างสมบูรณ์โดยไม่มีการสูญเสีย
reviewed: false
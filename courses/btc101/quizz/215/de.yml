question: Welcher Mechanismus macht Lightning-Zahlungen atomar?
answer: HTLC
wrong_answers:
  - Multisignatur
  - Proof of Work
  - SegWit
explanation: |
  HTLC knüpfen die Zahlung an die Offenlegung eines Geheimnisses und garantieren vollständigen Erfolg oder Misserfolg ohne Verlust.

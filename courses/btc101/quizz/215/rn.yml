question: Ni ikihe kibazo c’ugutera imbere kwa Bitcoin?
answer: Ingorane yo gushirwa mu ngiro uburyo bw’amahera bushobora gutanga umubare w’amahera uguma wiyongera ku segonda uko bugenda burashirwa mu ngiro.

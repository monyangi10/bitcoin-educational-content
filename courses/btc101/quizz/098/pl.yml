question: Dlaczego prywatność jest ważna w kontekście Bitcoina?
answer: Aby zminimalizować ryzyko śledzenia środków.
wrong_answers:
  - Aby zmniejszyć wartość swoich bitcoinów.
  - Aby zapobiec kradzieży bitcoinów.
  - Aby płacić podatki od bitcoinów.
explanation: |
  Prywatność jest ważna w kontekście Bitcoina, aby zminimalizować
  ryzyko śledzenia środków, co może ułatwić inwigilację użytkowników.
reviewed: true

question: Защо поверителността е важна в контекста на Bitcoin?
answer: За да сведете до минимум риска от проследяване на вашите средства.
wrong_answers:
  - Да намалите стойността на вашите биткойни.
  - За да предотвратите кражба на вашите биткойни.
  - Плащане на данъци върху вашите биткойни.
explanation: |
  Поверителността е важна в контекста на Bitcoin, за да се сведе до минимум
  рисковете от проследяване на вашите средства, което може да улесни
  вашето наблюдение.
reviewed: true
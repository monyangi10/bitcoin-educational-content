question: ผู้ใช้โอนความเป็นเจ้าของเงินของพวกเขาในเครือข่าย Bitcoin ได้อย่างไร?
answer: โดยการลงนามธุรกรรมแบบดิจิทัลด้วยกุญแจส่วนตัวของพวกเขา
wrong_answers:
  - โดยการส่งมอบบิตคอยน์ของพวกเขาโดยตรง
  - โดยการส่งอีเมลไปยังผู้รับ
  - โดยการให้ที่อยู่ Bitcoin ของพวกเขาแก่ผู้รับ
explanation: |
  ผู้ใช้ในเครือข่าย Bitcoin โอนกรรมสิทธิ์ของเงินของพวกเขาโดยการลงนามธุรกรรมดิจิทัลด้วยกุญแจส่วนตัวของพวกเขา ซึ่งจะยืนยันว่าพวกเขาเป็นเจ้าของบิตคอยน์ที่ต้องการโอน
reviewed: true
question: 사용자가 Bitcoin 네트워크에서 Ownership의 돈을 어떻게 송금하나요?
answer: 개인 키를 사용하여 거래에 디지털 서명합니다.
wrong_answers:
  - 물리적으로 비트코인을 넘겨주면 됩니다.
  - 수신자에게 이메일을 보내면 됩니다.
  - 수신자에게 Bitcoin Address를 제공하면 됩니다.
explanation: |
  Bitcoin 네트워크의 사용자는 자신의 Ownership를
  개인 키를 사용하여 거래에 디지털 서명하여
  키로 디지털 서명합니다. 이를 통해 사용자가 송금하려는 비트코인의 소유자임을
  비트코인의 소유자임을 확인합니다.
reviewed: true
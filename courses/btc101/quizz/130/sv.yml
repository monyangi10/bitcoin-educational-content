question: Hur överför användare Ownership av sina pengar i Bitcoin-nätverket?
answer: Genom att digitalt signera transaktioner med sina privata nycklar.
wrong_answers:
  - Genom att fysiskt lämna över sina Bitcoins.
  - Genom att skicka ett e-postmeddelande till mottagaren.
  - Genom att tillhandahålla sin Bitcoin Address till mottagaren.
explanation: |
  Användare i Bitcoin-nätverket överför Ownership av sina
  pengar genom att digitalt signera transaktioner med sina privata
  nycklar. Detta verifierar att de är ägare till de
  bitcoins som de vill överföra.
reviewed: true
question: Как потребителите прехвърлят собствеността върху парите си в мрежата Bitcoin?
answer: Чрез цифрово подписване на трансакциите с техните частни ключове.
wrong_answers:
  - Като физически предадат своите биткойни.
  - Чрез изпращане на имейл до получателя.
  - Като предоставите на получателя своя Bitcoin адрес.
explanation: |
  Потребителите в мрежата Bitcoin прехвърлят собствеността върху своите
  пари чрез цифрово подписване на транзакциите с техните лични
  ключове. По този начин те удостоверяват, че са собственици на
  биткойни, които искат да прехвърлят.
reviewed: true
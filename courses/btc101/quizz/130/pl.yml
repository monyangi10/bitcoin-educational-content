question: W jaki sposób użytkownicy przekazują własność swoich pieniędzy w sieci Bitcoin?
answer: Cyfrowo podpisując transakcje swoimi kluczami prywatnymi.
wrong_answers:
  - Poprzez fizyczne przekazanie swoich bitcoinów.
  - Wysyłając wiadomość e-mail do odbiorcy.
  - Poprzez dostarczenie odbiorcy adresu bitcoin.
explanation: |
  Użytkownicy w sieci Bitcoin przekazują własność swoich środków
  cyfrowo podpisując transakcje za pomocą swoich kluczy prywatnych. Weryfikuje to, że są oni właścicielami
  bitcoinów, które chcą przelać.
reviewed: true

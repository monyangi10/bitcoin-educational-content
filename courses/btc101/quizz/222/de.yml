question: Was ist das zentrale Prinzip von RGB?
answer: Clientseitige Validierung
wrong_answers:
  - Globale Ausführung auf der Blockchain
  - Föderierter Konsens
  - Proof-of-Work
explanation: |
  RGB basiert auf einer lokalen Validierung der Zustände, wobei die Blockchain lediglich als kryptografische Verankerung und als Schutz vor Doppelausgaben dient.
reviewed: false

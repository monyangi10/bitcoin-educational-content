question: หลักการสำคัญของ RGB คืออะไร?
answer: การตรวจสอบความถูกต้องฝั่งไคลเอนต์
wrong_answers:
  - การดำเนินการทั่วโลกบนบล็อกเชน
  - ฉันทามติแบบสหพันธ์
  - Proof-of-Work
explanation: |
  RGB อาศัยการตรวจสอบสถานะในท้องถิ่น โดยที่บล็อกเชนทำหน้าที่เป็นเพียงจุดยึดทางการเข้ารหัสและป้องกันการใช้จ่ายซ้ำซ้อนเท่านั้น
reviewed: false
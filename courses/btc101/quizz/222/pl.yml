question: Jaka jest centralna zasada RGB?
answer: Walidacja po stronie klienta
wrong_answers:
  - Globalne wykonanie na blockchainie
  - Konsensus federacyjny
  - Proof-of-Work
explanation: |
  RGB opiera się na lokalnej walidacji stanów, a blockchain służy jedynie jako kryptograficzne zakotwiczenie i ochrona przed podwójnym wydatkowaniem.

question: Каков центральный принцип RGB?
answer: Валидация на стороне клиента
wrong_answers:
  - Глобальное исполнение в блокчейне
  - Федеративный консенсус
  - Proof-of-Work
explanation: |
  RGB основан на локальной валидации состояний, при этом блокчейн служит лишь криптографической привязкой и защитой от двойного расходования.

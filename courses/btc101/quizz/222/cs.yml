question: Jaký je ústřední princip RGB?
answer: Validace na straně klienta
wrong_answers:
  - Globální provádění na blockchainu
  - Federovaný konsensus
  - Proof-of-Work
explanation: |
  RGB je založeno na lokální validaci stavů, přičemž blockchain slouží pouze jako kryptografické ukotvení a ochrana proti dvojímu utrácení.

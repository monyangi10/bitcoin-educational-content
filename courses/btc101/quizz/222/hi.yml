question: RGB का केंद्रीय सिद्धांत क्या है?
answer: क्लाइंट-साइड सत्यापन
wrong_answers:
  - ब्लॉकचेन पर वैश्विक निष्पादन
  - संघीय सर्वसम्मति
  - Proof-of-Work
explanation: |
  RGB अवस्थाओं के स्थानीय सत्यापन पर आधारित है, जहाँ ब्लॉकचेन केवल क्रिप्टोग्राफ़िक एंकर और डबल-स्पेंडिंग से सुरक्षा के रूप में कार्य करता है।
reviewed: false

question: Koji je centralni princip RGB-a?
answer: Validacija na strani klijenta
wrong_answers:
  - Globalno izvršavanje na blokčejnu
  - Federativni konsenzus
  - Proof-of-Work
explanation: |
  RGB se oslanja na lokalnu validaciju stanja, dok blokčejn služi samo kao kriptografsko sidro i zaštita od dvostruke potrošnje.

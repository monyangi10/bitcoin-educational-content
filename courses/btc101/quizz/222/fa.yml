question: اصل مرکزی RGB چیست؟
answer: اعتبارسنجی در سمت کاربر
wrong_answers:
  - اجرای سراسری روی بلاکچین
  - اجماع فدرالی
  - Proof-of-Work
explanation: |
  RGB بر اعتبارسنجی محلی وضعیت‌ها تکیه دارد و بلاکچین تنها به‌عنوان لنگر رمزنگاری‌شده و محافظت در برابر دوباره‌خرج‌کردن عمل می‌کند.
reviewed: false

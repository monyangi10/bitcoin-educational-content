question: RGB හි මූලික මූලධර්මය කුමක්ද?
answer: පාරිභෝගික පැත්තේ සත්‍යාපනය
wrong_answers:
  - බ්ලොක්චේන් මත ගෝලීය ක්‍රියාත්මක කිරීම
  - ෆෙඩරේටඩ් එකඟතාව
  - Proof-of-Work
explanation: |
  RGB තත්ත්වයන්ගේ ස්ථානික සත්‍යාපනය මත පදනම් වන අතර, බ්ලොක්චේන් ක්‍රිප්ටෝග්‍රැෆික් ඇන්කරයක් සහ ද්විත්ව වියදම් වලින් ආරක්ෂාවක් ලෙස පමණක් සේවය කරයි.
reviewed: false

question: Какъв е централният принцип на RGB?
answer: Валидация от страна на клиента
wrong_answers:
  - Глобално изпълнение върху блокчейна
  - Федерален консенсус
  - Proof-of-Work
explanation: |
  RGB се основава на локална валидация на състоянията, като блокчейнът служи само като криптографско закотвяне и защита срещу двойно харчене.
reviewed: false

question: Vad är den centrala principen bakom RGB?
answer: Validering på klientsidan
wrong_answers:
  - Global exekvering på blockkedjan
  - Federerad konsensus
  - Proof-of-Work
explanation: |
  RGB bygger på lokal validering av tillstånd, där blockkedjan endast fungerar som ett kryptografiskt ankare och skydd mot dubbelspendering.

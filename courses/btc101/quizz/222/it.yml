question: Qual è il principio centrale di RGB?
answer: La validazione lato client
wrong_answers:
  - L’esecuzione globale sulla blockchain
  - Il consenso federato
  - Proof-of-Work
explanation: |
  RGB si basa su una validazione locale degli stati, con la blockchain che funge solo da ancoraggio crittografico e da protezione contro la doppia spesa.
reviewed: false

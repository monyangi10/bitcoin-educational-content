question: Czym jest AMF?
answer: Autorité des Marchés Financiers.
wrong_answers:
  - Amerykański Fundusz Walutowy.
  - Stowarzyszenie Placówek Wydobywczych.
  - Zautomatyzowany przepływ pieniędzy.
explanation: |
  AMF, czyli Autorité des Marchés Financiers, jest francuską organizacją, która reguluje platformy sprzedające instrumenty finansowe.
reviewed: true

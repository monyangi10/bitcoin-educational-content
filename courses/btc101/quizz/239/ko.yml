question: Bitcoin는 기술 및 사회의 미래와 어떤 관련이 있나요?
answer: Bitcoin는 신뢰할 수 있는 제3자 없이도 Exchange의 가치를 실현할 수 있는 기술 혁명입니다.
wrong_answers:
  - Bitcoin는 중앙 서버를 통해 사람들이 Exchange 정보를 얻을 수 있도록 하는 AI 기술의 한 형태입니다.
  - Bitcoin는 전 세계 인구를 통제하여 빈곤을 퇴치할 수 있는 도구입니다.
  - Bitcoin는 정부가 자국민의 금융 거래를 추적할 수 있는 방법입니다.
explanation: |
  본문은 Bitcoin이 인터넷과 같은 통신 수단과 마찬가지로
  통신 수단을위한 인터넷과 마찬가지로 기술 혁명입니다
  새로운 방식의 대규모 조직을위한 기회를 창출합니다
  조직, 우리에게 교환 가능성을 가져다줍니다
  가치를 교환할 수 있는 가능성을 제공합니다.
reviewed: true
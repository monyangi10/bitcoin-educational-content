question: Kakva je veza Bitkoina sa budućnošću tehnologije i društva?
answer: Bitkoin je tehnološka revolucija koja omogućava razmenu vrednosti bez ikakve pouzdane treće strane.
wrong_answers:
  - Bitkoin je oblik AI tehnologije koji omogućava ljudima da razmenjuju informacije putem centralnog servera.
  - Bitkoin je alat za kontrolu svetske populacije, omogućavajući eliminaciju siromaštva.
  - Bitkoin je metoda kojom vlade prate finansijske transakcije svojih građana.
explanation: |
  Tekst objašnjava da je Bitkoin, poput interneta za sredstva komunikacije, tehnološka revolucija koja stvara šansu za nove načine organizacije velikih razmera, donoseći nam mogućnost razmene vrednosti bez ikakve pouzdane treće strane.
reviewed: true

question: Jaka jest strategia stosowana przez podmioty centralne w celu dewaluacji waluty fiducjarnej?
answer: Zwiększają masę pieniężną o kilka procent każdego roku.
wrong_answers:
  - Zmniejszają masę monetarną o kilka procent każdego roku.
  - Utrzymują stałą masę pieniężną w porównaniu do masy początkowej.
  - Ich masa pieniężna zmienia się losowo w porównaniu do masy początkowej.
explanation: |
  Podmioty centralne często dewaluują walutę, zwiększając jej
  masę monetarną w porównaniu do początkowej o kilka procent rocznie
  każdego roku. Ta cicha dewaluacja jest często uzasadniana interesem ludzi.
reviewed: true

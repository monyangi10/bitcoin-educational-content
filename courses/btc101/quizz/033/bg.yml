question: Каква е стратегията, използвана от централните институции за обезценяване на фиатна валута?
answer: Те увеличават паричната маса с няколко процента всяка година.
wrong_answers:
  - Те намаляват паричната си маса с няколко процента всяка година.
  - Те поддържат паричната му маса постоянна в сравнение с началната маса.
  - При тях монетарната маса се колебае произволно в сравнение с първоначалната маса.
explanation: |
  Централните институции често девалвират дадена валута, като увеличават нейната
  паричната маса в сравнение с първоначалната с няколко процента
  всяка година. Тази тиха девалвация често се оправдава като
  в интерес на хората.
reviewed: true
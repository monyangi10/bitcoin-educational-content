question: กลยุทธ์ที่ใช้โดยหน่วยงานกลางในการลดค่าเงินเฟียตคืออะไร?
answer: พวกเขาเพิ่มมวลเงินตราขึ้นไม่กี่เปอร์เซ็นต์ในแต่ละปี
wrong_answers:
  - พวกเขาลดปริมาณเงินลงไม่กี่เปอร์เซ็นต์ในแต่ละปี
  - พวกเขารักษามวลทางการเงินให้คงที่เมื่อเทียบกับมวลเริ่มต้น
  - พวกเขามีมวลทางการเงินที่ผันผวนแบบสุ่มเมื่อเทียบกับมวลเริ่มต้น
explanation: |
  หน่วยงานกลางมักจะลดค่าเงินโดยการเพิ่มมวลเงินเมื่อเทียบกับมวลเงินเริ่มต้นเป็นเปอร์เซ็นต์เล็กน้อยในแต่ละปี การลดค่าเงินแบบเงียบนี้มักจะถูกอ้างว่าเป็นประโยชน์ต่อประชาชน
reviewed: true
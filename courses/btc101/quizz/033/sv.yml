question: Vilken är den strategi som centrala enheter använder för att devalvera en fiatvaluta?
answer: De ökar den monetära massan med några procent varje år.
wrong_answers:
  - De minskar den monetära massan med några procent varje år.
  - De håller dess monetära massa konstant jämfört med den ursprungliga massan.
  - De får sin monetära massa att slumpmässigt fluktuera i jämförelse med den ursprungliga massan.
explanation: |
  Centrala enheter devalverar ofta en valuta genom att öka dess
  monetära massan jämfört med den ursprungliga med några procent
  varje år. Denna tysta devalvering motiveras ofta som
  att den ligger i folkets intresse.
reviewed: true
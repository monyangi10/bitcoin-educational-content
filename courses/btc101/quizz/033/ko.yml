question: 중앙 기관이 법정화폐의 가치를 떨어뜨리기 위해 사용하는 전략은 무엇인가요?
answer: 매년 몇 퍼센트씩 통화량이 증가합니다.
wrong_answers:
  - 매년 통화량이 몇 퍼센트씩 감소합니다.
  - 초기 질량과 비교하여 화폐 질량을 일정하게 유지합니다.
  - 화폐 질량은 초기 질량과 비교하여 무작위로 변동합니다.
explanation: |
  중앙 기관은 종종 통화의 가치를 떨어뜨립니다
  초기 화폐 질량에 비해 몇 퍼센트씩
  매년. 이러한 조용한 평가절하는 종종 다음과 같은 이유로 정당화됩니다
  국민에게 이익이 되기 때문입니다.
reviewed: true
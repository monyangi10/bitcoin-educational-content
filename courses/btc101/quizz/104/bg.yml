question: Какво означава KYC?
answer: Опознайте своя клиент.
wrong_answers:
  - Пазете парите си.
  - Ключови кодове.
  - Любезно Съответствие на добива.
explanation: |
  KYC или "Познай своя клиент" се отнася до процедурата, която
  фирмите прилагат, за да проверяват самоличността на своите клиенти.
  Обикновено това се прави, за да се гарантира спазването на
  и да се предотвратят незаконни дейности, като например пари
  изпиране на пари или измама.
reviewed: true
question: KYC ย่อมาจากอะไร?
answer: รู้จักลูกค้าของคุณ
wrong_answers:
  - เก็บเงินของคุณไว้
  - คีย์รหัสของคุณ
  - กรุณาปฏิบัติตามข้อกำหนด
explanation: |
  KYC หรือ Know Your Customer หมายถึง กระบวนการที่ธุรกิจใช้ในการยืนยันตัวตนของลูกค้า โดยทั่วไปจะทำเพื่อให้เป็นไปตามข้อบังคับและป้องกันกิจกรรมที่ผิดกฎหมาย เช่น การฟอกเงินหรือการฉ้อโกง
reviewed: true
question: Giai đoạn cuối cùng của hiện tượng siêu lạm phát là gì?
answer: Một loại tiền tệ mới xuất hiện.
wrong_answers:
  - Mất niềm tin.
  - Sụp đổ tiền tệ & tăng giá.
  - Vòng luẩn quẩn của việc in tiền.
explanation: |
  Giai đoạn cuối cùng của siêu lạm phát xảy ra khi một loại tiền tệ mới được giới thiệu để thay thế cho loại tiền cũ.
reviewed: true
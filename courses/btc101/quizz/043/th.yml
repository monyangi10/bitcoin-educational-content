question: เฟสสุดท้ายที่เกิดขึ้นในปรากฏการณ์เงินเฟ้อสูงคืออะไร?
answer: สกุลเงินใหม่เกิดขึ้น
wrong_answers:
  - การสูญเสียความเชื่อมั่นในสกุลเงิน
  - การล่มสลายของค่าเงิน & การเพิ่มขึ้นของราคา
  - วงจรอุบาทว์ของการพิมพ์เงิน
explanation: |
  ระยะสุดท้ายของภาวะเงินเฟ้อสูงเกิดขึ้นเมื่อมีการนำสกุลเงินใหม่มาใช้แทนที่สกุลเงินเก่า
reviewed: true
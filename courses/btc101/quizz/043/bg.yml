question: Коя е последната фаза, която настъпва при явлението хиперинфлация?
answer: Появява се нова валута.
wrong_answers:
  - Загуба на доверие във валутата.
  - Срив на валутата и повишаване на цените.
  - Омагьосаният кръг на печатането на пари.
explanation: |
  Последната фаза на хиперинфлацията настъпва, когато се
  се въвежда валута, която заменя старата.
reviewed: true
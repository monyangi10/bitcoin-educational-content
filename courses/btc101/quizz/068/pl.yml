question: Czym jest fraza mnemoniczna w portfelu Bitcoin?
answer: Lista 12 lub 24 słów, które umożliwiają dostęp do bitcoinów.
wrong_answers:
  - Wybrane hasło dostępu do portfela Bitcoin.
  - Kod do szyfrowania transakcji Bitcoin.
  - Tajna fraza odzyskiwania, która niszczy portfel Bitcoin w razie potrzeby.
explanation: |
  Od 2017 r. klucz prywatny może być zakodowany na prostej liście
  składającej się z 12 lub 24 słów, zwanej frazą mnemoniczną. Ta fraza
  jest kopią zapasową portfela Bitcoin, więc pozwala na
  dostęp do bitcoinów za pomocą dowolnego oprogramowania/aplikacji portfela Bitcoin.
reviewed: true

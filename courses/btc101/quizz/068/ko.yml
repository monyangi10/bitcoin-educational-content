question: Bitcoin Wallet의 Mnemonic 문구는 무엇인가요?
answer: 비트코인에 액세스할 수 있는 12개 또는 24개의 단어 목록입니다.
wrong_answers:
  - Bitcoin Wallet에 액세스하기 위해 선택한 비밀번호입니다.
  - Bitcoin 트랜잭션을 암호화하는 코드입니다.
  - 필요 시 Bitcoin Wallet을 파괴하는 비밀 복구 문구입니다.
explanation: |
  2017년부터 개인 키는 12개 또는 24개의 간단한 목록으로 인코딩할 수 있습니다
  12개 또는 24개의 단어로 구성된 간단한 목록으로 인코딩할 수 있습니다. 이 문구
  은 Bitcoin Wallet의 백업이므로 다음을 수행할 수 있습니다
  gW-9 Wallet을 사용하여 비트코인에 액세스합니다
  소프트웨어/앱을 사용하여 비트코인에 액세스할 수 있습니다.
reviewed: true
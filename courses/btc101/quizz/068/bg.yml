question: Каква е мнемоничната фраза в Bitcoin портфейлите?
answer: Списък от 12 или 24 думи, който ви позволява да получите достъп до вашите биткойни.
wrong_answers:
  - Избрана парола за достъп до Bitcoin портфейлите.
  - Код за криптиране на транзакциите Bitcoin.
  - Тайна фраза за възстановяване, която унищожава Bitcoin портфейлите в случай на нужда.
explanation: |
  От 2017 г. частният ключ може да бъде кодиран в прост списък
  от 12 или 24 думи, наречен мнемонична фраза. Тази фраза
  е резервно копие на вашия Bitcoin портфейл, така че тя ви позволява да
  достъп до вашите биткойни, като използвате всеки Bitcoin портфейл.
reviewed: true

question: Mining için ödül ne sıklıkla yarıya indirilir?
answer: Her 210.000 blokta bir.
wrong_answers:
  - Her 120.000 blokta bir.
  - Her 540.000 blokta bir.
  - Her 2.100.000 blokta bir.
explanation: |
  Mining için ödül her 210.000'de bir yarıya düşecek şekilde programlanmıştır
  blokları, yaklaşık olarak her dört yılda bir: bir etkinlik
  gW-1 olarak bilinir.
reviewed: true
question: วลีช่วยจำใน Bitcoin wallet คืออะไร?
answer: รายการคำ 12 หรือ 24 คำที่ช่วยให้คุณเข้าถึงบิตคอยน์ของคุณได้
wrong_answers:
  - รหัสผ่านที่เลือกเพื่อเข้าถึง Bitcoin wallet.
  - รหัสสำหรับเข้ารหัสธุรกรรม Bitcoin
  - วลีการกู้คืนลับที่ทำลาย Bitcoin wallet ในกรณีที่จำเป็น
explanation: |
  ตั้งแต่ปี 2017 คีย์ส่วนตัวสามารถเข้ารหัสในรูปแบบรายการง่าย ๆ ของคำ 12 หรือ 24 คำ ซึ่งเรียกว่า วลีช่วยจำ วลีนี้เป็นการสำรองข้อมูลของ Bitcoin wallet ของคุณ ดังนั้นมันจึงช่วยให้คุณเข้าถึงบิตคอยน์ของคุณได้โดยใช้ซอฟต์แวร์/แอป Bitcoin wallet ใด ๆ
reviewed: true
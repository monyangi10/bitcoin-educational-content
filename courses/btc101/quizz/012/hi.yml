question: धन के तीन विहित कार्य क्या हैं?
answer: मूल्य का भण्डार, Exchange का माध्यम, लेखा की इकाई।
wrong_answers:
  - मूल्य का भण्डार, जी.डब्लू.-1 का माध्यम, उत्पादन के साधन।
  - मूल्य का भण्डार, उत्पादन के साधन, लेखांकन की इकाई।
  - जी.डब्लू.-2 का माध्यम, उत्पादन के साधन, लेखांकन की इकाई।
explanation: |
  अरस्तू के अनुसार, पैसा तीन कार्य करता है: यह मूल्य का भंडार है, Exchange का माध्यम है, और खाते की इकाई है। आजकल, Exchange फ़ंक्शन का माध्यम अन्य दो से पहले मुख्य के रूप में व्यापक रूप से पहचाना जाता है।
reviewed: true
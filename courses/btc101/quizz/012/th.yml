question: หน้าที่หลักสามประการของเงินคืออะไร?
answer: ร้านค้าแห่งมูลค่า, สื่อกลางในการแลกเปลี่ยน, หน่วยของบัญชี.
wrong_answers:
  - ร้านค้าแห่งมูลค่า, สื่อกลางในการแลกเปลี่ยน, วิธีการผลิต.
  - ร้านค้าแห่งมูลค่า, วิธีการผลิต, หน่วยของบัญชี.
  - สื่อกลางการแลกเปลี่ยน, วิธีการผลิต, หน่วยวัดมูลค่า.
explanation: |
  ตามที่อริสโตเติลกล่าวไว้ เงินมีหน้าที่สามประการ: เป็นแหล่งเก็บมูลค่า, สื่อกลางในการแลกเปลี่ยน, และหน่วยวัดมูลค่า ปัจจุบันนี้ หน้าที่สื่อกลางในการแลกเปลี่ยนได้รับการยอมรับอย่างกว้างขวางว่าเป็นหน้าที่หลัก ก่อนหน้าที่อื่นๆ สองประการ
reviewed: true
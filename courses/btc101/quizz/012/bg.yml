question: Кои са трите канонични функции на парите?
answer: Съхранител на стойност, средство за размяна, разчетна единица.
wrong_answers:
  - Съхранение на стойност, Средство за размяна, Средство за производство.
  - Стойност, средства за производство, разчетна единица.
  - Средство за размяна, Средство за производство, Разчетна единица.
explanation: |
  Според Аристотел парите изпълняват три функции: те са
  съхранение на стойност, средство за размяна и парична единица
  сметка. В днешно време функцията на средство за размяна е
  широко призната като основна, преди другите две.
reviewed: true
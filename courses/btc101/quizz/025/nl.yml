question: Hoe wordt deugdelijk geld gecreëerd?
answer: Gezond geld moet op natuurlijke wijze voortkomen uit de markt en de vrijwillige consensus.
wrong_answers:
  - Gezond geld moet door de overheid worden afgedwongen door monetaire wetten uit te vaardigen.
  - Gezond geld moet door bedrijven met geweld worden opgelegd.
  - Gezond geld kan niet worden gecreëerd.
explanation: |
  Gezond geld is een natuurlijk sociaal fenomeen dat moet voortkomen
  uit de markt en de vrijwillige consensus. Geen mens of
  groep mensen kan geld creëren.
reviewed: true
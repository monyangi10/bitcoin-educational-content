question: Hur skapas sunda pengar?
answer: Sunda pengar måste på ett naturligt sätt växa fram ur marknaden och det frivilliga samförståndet.
wrong_answers:
  - Sunda pengar måste genomdrivas av regeringen genom att utfärda penninglagar.
  - Sunda pengar måste tvingas fram av företagen med hjälp av våld.
  - Sunda pengar kan inte skapas.
explanation: |
  Sunda pengar är ett naturligt socialt fenomen som måste växa fram
  från marknaden och det frivilliga samförståndet. Ingen människa eller
  grupp av människor kan skapa pengar.
reviewed: true
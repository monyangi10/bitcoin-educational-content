question: เงินที่มีเสียงถูกสร้างขึ้นได้อย่างไร?
answer: เงินที่มีเสถียรภาพต้องเกิดขึ้นตามธรรมชาติจากตลาดและความเห็นพ้องต้องกันโดยสมัครใจ
wrong_answers:
  - เงินที่มั่นคงจำเป็นต้องได้รับการบังคับใช้โดยรัฐบาลผ่านการออกกฎหมายการเงิน
  - เงินที่มั่นคงต้องถูกบังคับใช้โดยบริษัทผ่านการใช้ความรุนแรง
  - เงินที่มั่นคงไม่สามารถสร้างขึ้นได้
explanation: |
  เงินที่มั่นคงเป็นปรากฏการณ์ทางสังคมตามธรรมชาติที่ต้องเกิดขึ้นจากตลาดและการยินยอมพร้อมใจโดยสมัครใจ ไม่มีมนุษย์หรือกลุ่มมนุษย์ใดสามารถสร้างเงินได้
reviewed: true
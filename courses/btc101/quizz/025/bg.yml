question: Как се създават стабилни пари?
answer: Здравите пари трябва да се появят по естествен начин на пазара и на доброволния консенсус.
wrong_answers:
  - Правителството трябва да наложи разумни парични средства чрез издаване на парични закони.
  - Здравите пари трябва да бъдат наложени от компаниите чрез използване на насилие.
  - Здрави пари не могат да бъдат създадени.
explanation: |
  Здравите пари са естествено социално явление, което трябва да се появи
  от пазара и доброволния консенсус. Никой човек или
  група хора могат да създадат пари.
reviewed: true
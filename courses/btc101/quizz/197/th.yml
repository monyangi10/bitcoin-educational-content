question: สิ่งหนึ่งที่คุณควรพิจารณาเมื่อเลือกแพลตฟอร์ม DCA คืออะไร?
answer: ความพร้อมใช้งานในประเทศของคุณ
wrong_answers:
  - สีของโลโก้แพลตฟอร์ม
  - จำนวนผู้ใช้บนแพลตฟอร์ม
  - อายุของแพลตฟอร์ม
explanation: |
  ข้อความในหลักสูตรนี้กล่าวถึงว่าเมื่อเลือกแพลตฟอร์ม DCA การเลือกที่ถูกต้องจะขึ้นอยู่กับความพร้อมใช้งานในประเทศของคุณมากกว่า
reviewed: true
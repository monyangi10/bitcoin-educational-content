question: Bitcoin satın almanın risklerinden biri nedir?
answer: Fiyatı 0'a kadar düşebilir.
wrong_answers:
  - Kolayca çalınabilir.
  - Çoğaltılabilir.
  - Fiziksel olarak kaybolabilir.
explanation: |
  Kurs metninde Bitcoin'in oldukça uçucu bir madde olduğundan bahsedilmektedir
  finansal varlıktır ve fiyatı 0'a düşebilir, bu da bir
  gW-1'in satın alınmasıyla ilgili riskler.
reviewed: true
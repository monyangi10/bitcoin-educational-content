question: Bir DCA platformu seçerken göz önünde bulundurmanız gereken şeylerden biri nedir?
answer: Ülkenizde bulunabilirlik.
wrong_answers:
  - Platformun logosunun rengi.
  - Platformdaki kullanıcı sayısı.
  - Platformun yaşı.
explanation: |
  Bu kurs metni, bir DCA seçerken
  platformunda, doğru seçim daha çok platformun
  ülkenizde bulunabilirlik.
reviewed: true
question: Co należy wziąć pod uwagę przy wyborze platformy DCA?
answer: Dostępność w danym kraju.
wrong_answers:
  - Kolor loga platformy.
  - Liczbę użytkowników na platformie.
  - Wiek platformy.
explanation: |
  W tekście kursu wspomniano, że przy wyborze platformy DCA
  właściwy wybór będzie bardziej zależał od jej dostępności w danym kraju.
reviewed: true

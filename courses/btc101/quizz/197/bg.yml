question: Кое е едно от нещата, които трябва да вземете предвид, когато избирате платформа DCA?
answer: Наличност във вашата страна.
wrong_answers:
  - Цветът на логото на платформата.
  - Броят на потребителите на платформата.
  - Възрастта на платформата.
explanation: |
  В този текст на курса се споменава, че при избора на DCA
  платформа, правилният избор ще зависи повече от нейната
  наличността й във вашата страна.
reviewed: true
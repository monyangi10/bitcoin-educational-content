question: Điều gì là một trong những yếu tố bạn cần xem xét khi chọn một nền tảng hỗ trợ Dollar Cost Averaging (DCA)?
answer: Sự có mặt tại quốc gia của bạn.
wrong_answers:
  - Màu sắc của logo nền tảng.
  - Số lượng người dùng trên nền tảng.
  - Tuổi của nền tảng.
explanation: |
  Khóa học này đề cập rằng khi chọn một nền tảng hỗ trợ Dollar Cost Averaging (DCA),
  sự lựa chọn đúng đắn sẽ phụ thuộc nhiều hơn vào việc nó
  có mặt tại quốc gia của bạn hay không.
reviewed: true
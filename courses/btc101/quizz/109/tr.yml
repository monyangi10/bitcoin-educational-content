question: Kaydedilen ilk Bitcoin işlemi nedir?
answer: Satoshi Nakamoto ve Hal Finney arasında 10 BTC'lik bir işlem.
wrong_answers:
  - 2 pizza için 10.000 BTC'lik bir işlem.
  - Satoshi Nakamoto ve Hal Finney arasında 1 BTC'lik bir işlem.
  - Laszlo Hanyecz ve Hal Finney arasında 10.000 BTC'lik bir işlem.
explanation: |
  Kaydedilen ilk Bitcoin işlemi, aşağıdaki işlemlerden biriydi
  10 BTC Satoshi Nakamoto ve Hal Finney arasında.
reviewed: true
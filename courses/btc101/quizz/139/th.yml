question: ทำไมจึงสำคัญที่โหนด Bitcoin ควรยังคงมีราคาที่เข้าถึงได้และสามารถเข้าถึงได้สำหรับผู้ใช้ทุกคน?
answer: เพราะมันช่วยให้การกระจายอำนาจของเครือข่ายเป็นไปได้ง่ายขึ้น
wrong_answers:
  - เพราะมันเพิ่มความสามารถในการทำธุรกรรมของเครือข่าย
  - เพราะมันลดความสามารถในการทำธุรกรรมของเครือข่าย
  - เพราะมันเพิ่มรางวัลบล็อกสำหรับนักขุด
explanation: |
  ต้นทุนที่ไม่แพงและการเข้าถึงของโหนด Bitcoin มีความสำคัญเพราะมันช่วยให้การกระจายอำนาจของเครือข่ายเป็นไปได้ง่ายขึ้น
reviewed: true
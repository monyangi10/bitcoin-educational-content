question: Zašto je važno da Bitkoin čvor ostane pristupačan i dostupan svim mogućim korisnicima?
answer: Jer omogućava decentralizaciju mreže.
wrong_answers:
  - Zato što povećava kapacitet transakcija mreže.
  - Zato što smanjuje kapacitet transakcija mreže.
  - Zato što povećava Block nagradu za rudare.
explanation: |
  Povoljna cena i dostupnost Bitkoin čvora su
  važni jer olakšavaju decentralizaciju
  mreže.
reviewed: true

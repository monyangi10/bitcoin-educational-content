question: Защо е важно възелът Bitcoin да остане на достъпна цена и да бъде достъпен за всички възможни потребители?
answer: Защото улеснява децентрализацията на мрежата.
wrong_answers:
  - Защото увеличава капацитета на транзакциите в мрежата.
  - Защото намалява капацитета за транзакции на мрежата.
  - Защото увеличава възнаграждението за блок за миньорите.
explanation: |
  Достъпната цена и достъпността на възел Bitcoin е
  важно, защото улеснява децентрализацията на
  мрежата.
reviewed: true
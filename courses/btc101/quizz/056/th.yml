question: แนวคิดทางคณิตศาสตร์ที่อิงจากความมีเหตุผลของมนุษย์และถูกใช้ใน Bitcoin คืออะไร?
answer: ทฤษฎีเกม
wrong_answers:
  - ทฤษฎีความน่าจะเป็น
  - ทฤษฎีจำนวน
  - ทฤษฎีเซต
explanation: |
  ทฤษฎีเกมเป็นแนวคิดทางคณิตศาสตร์ที่มีพื้นฐานมาจาก
  ความมีเหตุผลของมนุษย์ ใน Bitcoin การเปลี่ยนแปลงโปรโตคอลจะถูกบังคับใช้โดยผู้ใช้ ทำให้การแก้ไขใด ๆ ต่อโปรโตคอล Bitcoin มีความซับซ้อนสูง
reviewed: true
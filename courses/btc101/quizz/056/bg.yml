question: Коя е математическата концепция, която се основава на човешката рационалност и се използва в Bitcoin?
answer: Теория на игрите.
wrong_answers:
  - Теория на вероятностите.
  - Теория на числата.
  - Теория на множествата.
explanation: |
  Теорията на игрите е математическа концепция, която се основава на
  човешката рационалност. В Bitcoin промените в протокола са
  налагат от потребителите, което прави всяка промяна в Bitcoin
  на протокола е изключително сложна.
reviewed: true
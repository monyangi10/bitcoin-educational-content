question: Cypherpunk Manifesto คืออะไร?
answer: ข้อความที่เขียนโดย Eric Hughes ยืนยันว่าความเป็นส่วนตัวเป็นสิทธิขั้นพื้นฐาน
wrong_answers:
  - หนังสือที่เขียนโดย Julian Assange เกี่ยวกับอนาคตของเทคโนโลยี
  - เอกสารที่สรุปหลักการของ Bitcoin
  - แถลงการณ์ที่เขียนโดย David Chaum เกี่ยวกับความสำคัญของสกุลเงินดิจิทัล
explanation: |
  แถลงการณ์ Cypherpunk ถูกเขียนโดย Eric Hughes ในปี 1993 และยืนยันว่าความเป็นส่วนตัวเป็นสิทธิขั้นพื้นฐาน
reviewed: true
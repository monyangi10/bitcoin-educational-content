question: Wat is het Cypherpunk Manifest?
answer: Een tekst geschreven door Eric Hughes waarin hij beweert dat privacy een grondrecht is.
wrong_answers:
  - Een boek geschreven door Julian Assange over de toekomst van technologie.
  - Een document waarin de principes van Bitcoin worden beschreven.
  - Een manifest geschreven door David Chaum over het belang van digitale valuta.
explanation: |
  Het Cypherpunk Manifest werd in 1993 geschreven door Eric Hughes
  en stelt dat privacy een grondrecht is.
reviewed: true
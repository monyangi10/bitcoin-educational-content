question: Кое от следните неща не е предимство на Bitcoin като валута?
answer: Тя се използва за плащане на данъци.
wrong_answers:
  - Тя е делима.
  - Той е преносим.
  - Тя е без разрешение.
explanation: |
  Bitcoin, поради свойствата му като делимост,
  проверяемост, липса на разрешителни и преносимост,
  предлага отлично средство за съхранение на стойност. Освен това, като неутрален
  интернет валута, той представлява добро средство за размяна
  който не познава граници.
reviewed: true
question: ข้อใดต่อไปนี้ไม่ใช่ข้อดีของ Bitcoin ในฐานะสกุลเงิน?
answer: มันถูกใช้เพื่อจ่ายภาษี
wrong_answers:
  - มันหารได้ลงตัว
  - มันสามารถเคลื่อนย้ายได้
  - มันไม่มีข้อจำกัดในการอนุญาต
explanation: |
  Bitcoin เนื่องจากคุณสมบัติต่างๆ เช่น การแบ่งย่อยได้ การตรวจสอบได้ ลักษณะที่ไม่ต้องขออนุญาต และการขนส่งได้ จึงเป็นแหล่งเก็บมูลค่าที่ดีเยี่ยม นอกจากนี้ ในฐานะสกุลเงินอินเทอร์เน็ตที่เป็นกลาง มันยังเป็นสื่อกลางในการแลกเปลี่ยนที่ดีที่ไม่มีพรมแดน
reviewed: true
question: Które z poniższych nie jest zaletą Bitcoina jako waluty?
answer: Służy do płacenia podatków.
wrong_answers:
  - Jest podzielny.
  - Jest przenośny.
  - Nie wymaga pozwolenia.
explanation: |
  Bitcoin, ze względu na swoje właściwości, takie jak podzielność,
  weryfikowalność, bezwarunkowość i możliwość transportu,
  oferuje doskonały środek przechowywania wartości. Ponadto, jako neutralna
  waluta internetowa, stanowi dobry środek wymiany,
  który nie zna granic.
reviewed: true

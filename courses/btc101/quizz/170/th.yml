question: เหตุการณ์สำคัญในโลกของสกุลเงินดิจิทัลในปี 2017 คือการเพิ่มขึ้นอย่างรวดเร็วของมูลค่า Bitcoin ซึ่งทำให้ราคาของ Bitcoin พุ่งสูงขึ้นจนถึงเกือบ $20,000 ในเดือนธันวาคม 2017 นอกจากนี้ยังเป็นปีที่มีการเปิดตัว Initial Coin Offerings (ICOs) จำนวนมาก ซึ่งเป็นวิธีการระดมทุนสำหรับโครงการสกุลเงินดิจิทัลใหม่ ๆ
answer: การเปิดตัวของ Initial Coin Offerings (ICOs) นับพันรายการ
wrong_answers:
  - การแบน Bitcoin.
  - การสร้าง Bitcoin.
  - การหายไปของสกุลเงินดิจิทัลทั้งหมด
explanation: >-
reviewed: true
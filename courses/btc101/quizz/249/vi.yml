question: Một trong những hệ quả chính của Bitcoin đối với hệ thống ngân hàng là gì?
answer: Nó cho phép thoát khỏi hệ thống ngân hàng truyền thống.
wrong_answers:
  - Nó cho phép kiểm soát hệ thống ngân hàng.
  - Nó cho phép loại bỏ hệ thống ngân hàng.
  - Nó cho phép làm hỏng hệ thống ngân hàng.
explanation: >-
  Khóa học đề cập rằng Bitcoin cho phép thoát khỏi hệ thống ngân hàng.
reviewed: true
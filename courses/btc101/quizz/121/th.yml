question: เมื่อคุณสร้างแผนการสืบทอดทรัพย์สิน สิ่งใดที่ไม่จำเป็นต้องรวมไว้?
answer: ชื่อของ Bitcoin wallet ที่คุณใช้เป็นประจำ
wrong_answers:
  - จดหมายลายมือที่ระบุทรัพย์สินของคุณ
  - คำอธิบายเกี่ยวกับวิธีการเข้าถึงเงินทุนของคุณ
  - ข้อมูลการติดต่อของบุคคลที่เชื่อถือได้
explanation: |
  การสร้างแผนการสืบทอดเป็นขั้นตอนสำคัญเพื่อให้แน่ใจว่า บิทคอยน์ของคุณจะได้รับการจัดการอย่างเหมาะสมหลังจากที่คุณเสียชีวิต 
  แผนนี้สามารถรวมถึงจดหมายที่เขียนด้วยลายมือซึ่งระบุสินทรัพย์ของคุณ 
  วิธีการเข้าถึง และข้อมูลติดต่อของบุคคลที่เชื่อถือได้ที่จะติดต่อ
reviewed: true
question: 상속 계획을 작성할 때 포함할 필요가 없는 항목은 무엇인가요?
answer: 일반적으로 사용하는 Bitcoin Wallet의 이름입니다.
wrong_answers:
  - 자산을 나열한 자필 편지.
  - 자금에 액세스하는 방법에 대한 설명입니다.
  - 신뢰할 수 있는 개인의 연락처 정보.
explanation: |
  상속 계획을 세우는 것은 사후에 비트코인이 제대로 관리될 수 있도록 하기 위한 중요한 단계입니다.
  이 계획에는 자산을 나열하는 자필 편지가 포함될 수 있습니다,
  자산에 대한 접근 방법, 연락할 수 있는 신뢰할 수 있는 사람의 연락처 정보를 기재할 수 있습니다
reviewed: true
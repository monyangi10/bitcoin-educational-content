question: Czego nie trzeba uwzględniać podczas tworzenia planu spadkowego?
answer: Nazwa zwykle używanego urządzenia portfela Bitcoin.
wrong_answers:
  - Odręcznie napisany list z listą aktywów.
  - Opis sposobu uzyskania dostępu do środków.
  - Dane kontaktowe zaufanych osób.
explanation: |
  Stworzenie planu spadkowego jest kluczowym krokiem do zapewnienia odpowiedniego zarządzania bitcoinami po śmierci ich właściciela.
  Plan ten może obejmować odręczny list z listą aktywów,
  metody dostępu do nich oraz dane zaufanych osób, z którymi należy się skontaktować.
reviewed: true

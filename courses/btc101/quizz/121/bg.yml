question: Какво не е необходимо да включвате, когато създавате план за наследяване?
answer: Името на Bitcoin портфейла, което обикновено използвате.
wrong_answers:
  - Собственоръчно написано писмо със списък на имуществото ви.
  - Описание на начина за достъп до средствата ви.
  - Информация за контакт с доверени лица.
explanation: |
  създаването на план за наследяване е важна стъпка, за да се гарантира, че вашите биткойни ще бъдат правилно управлявани след смъртта ви.
  Този план може да включва саморъчно написано писмо, в което се изброяват вашите активи,
  методите за достъп до тях, както и информация за контакт с доверени лица, с които да се свържете
reviewed: true

question: Bitcoin ถูกนำเสนอให้โลกเห็นครั้งแรกเมื่อใด?
answer: 31 ตุลาคม 2008
wrong_answers:
  - 3 มกราคม 2009
  - 22 พฤศจิกายน 2009
  - 12 ธันวาคม 2010
explanation: |
  Bitcoin ถูกนำเสนอให้โลกได้รู้จักครั้งแรกเมื่อวันที่ 31 ตุลาคม 2008 เมื่อ Satoshi Nakamoto ส่งอีเมลไปยังรายชื่อผู้รับจดหมาย cypherpunk ที่มีเอกสารไวท์เปเปอร์ของ Bitcoin แนบมาด้วย
reviewed: true
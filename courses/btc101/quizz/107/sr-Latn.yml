question: Kada je Bitkoin prvi put predstavljen svetu?
answer: 31. oktobar 2008.
wrong_answers:
  - 3. januar 2009.
  - 22. novembar 2009.
  - 12. decembar 2010.
explanation: |
  Bitkoin je prvi put predstavljen svetu 31. oktobra 2008. godine, kada je Satoshi Nakamoto poslao email na Cypherpunk mailing listu koji je sadržao Bitcoin White Paper (beli papir).
reviewed: true

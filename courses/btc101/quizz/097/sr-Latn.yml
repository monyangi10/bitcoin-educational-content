question: Šta nije Mnemonic fraza u kontekstu Bitkoina?
answer: Lozinka za vaš Bitkoin novčanik.
wrong_answers:
  - Spisak od 12 reči iz određenog rečnika.
  - Lista od 24 reči iz određenog rečnika.
  - Tajna za pristup vašem Bitkoin fondu.
explanation: |
  Fraza Mnemonic u kontekstu Bitkoina je lista od 12 ili 24 reči koja vam omogućava da povratite vaš novčanik na bilo kojoj Bitkoin aplikaciji za novčanike. Svako ko ima pristup ovoj listi takođe može pristupiti vašim bitkoinima.
reviewed: true

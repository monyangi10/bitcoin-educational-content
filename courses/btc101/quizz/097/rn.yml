question: Ni igiki kitari ijambo Mnemonic mu bijanye n’ijambo Bitcoin?
answer: Ijambobanga rya Bitcoin Wallet yawe.
wrong_answers:
  - Urutonde rw’amajambo 12 yo mu nkoranyamagambo yihariye.
  - Urutonde rw’amajambo 24 yo mu nkoranyamagambo yihariye.
  - Ibanga ryo gushika ku kigega cawe ca Bitcoin.
explanation: |
  Invugo ya Mnemonic iri mu rwego rwa Bitcoin ni urutonde rw’ibintu 12 .
  canke amajambo 24 atuma ushobora kugarura Wallet yawe ku .
  Bitcoin Gukoresha Wallet. Umuntu wese afise uburenganzira bwo gushika kuri uru rutonde
  cal kandi ushobora gushika ku bitcoins zawe.
reviewed: true
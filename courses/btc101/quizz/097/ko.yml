question: Bitcoin의 맥락에서 Mnemonic 문구가 아닌 것은 무엇인가요?
answer: Bitcoin Wallet의 비밀번호입니다.
wrong_answers:
  - 특정 사전의 12개 단어 목록입니다.
  - 특정 사전의 24개 단어 목록입니다.
  - Bitcoin 기금에 액세스하는 비결입니다.
explanation: |
  Bitcoin의 맥락에서 Mnemonic 구문은 12개 또는 24개
  또는 24개의 단어로 구성된 목록입니다
  Bitcoin Wallet 애플리케이션. 이 목록에 액세스할 수 있는 사람은 누구나
  칼도 비트코인에 액세스할 수 있습니다.
reviewed: true
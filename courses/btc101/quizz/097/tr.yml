question: Bitcoin bağlamında bir Mnemonic ifadesi olmayan nedir?
answer: Bitcoin Wallet'ünüz için bir parola.
wrong_answers:
  - Belirli bir sözlükten 12 kelimelik bir liste.
  - Belirli bir sözlükten 24 kelimelik bir liste.
  - Bitcoin fonunuza erişmenin sırrı.
explanation: |
  Bitcoin bağlamında bir Mnemonic ifadesi, 12 ifadeden oluşan bir listedir
  veya Wallet'nizi herhangi bir zamanda geri yüklemenizi sağlayan 24 kelime
  Bitcoin Wallet uygulaması. Bu listeye erişimi olan herkes
  cal ayrıca bitcoinlerinize de erişebilir.
reviewed: true
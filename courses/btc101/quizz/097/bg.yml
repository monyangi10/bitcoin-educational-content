question: Какво не е мнемонична фраза в контекста на Bitcoin?
answer: Парола за вашия Bitcoin портфейл.
wrong_answers:
  - Списък с 12 думи от определен речник.
  - Списък с 24 думи от определен речник.
  - Тайната за достъп до вашия биткойн фонд.
explanation: |
  Мнемонична фраза в контекста на Bitcoin е списък от 12
  или 24 думи, които ви позволяват да възстановите портфейл. Всеки, който има достъп до този списък
  може да получи достъп и до вашите биткойни.
reviewed: true

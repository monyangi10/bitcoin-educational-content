question: Co nie jest frazą mnemoniczną w kontekście Bitcoina?
answer: Hasło do portfela Bitcoina.
wrong_answers:
  - Lista 12 słów z konkretnego słownika.
  - Lista 24 słów z konkretnego słownika.
  - Sekret dostępu do funduszu Bitcoina.
explanation: |
  Fraza mnemoniczna w kontekście Bitcoina jest listą 12
  lub 24 słów, które umożliwiają przywrócenie portfela w dowolnej aplikacji Bitcoin Wallet. Każdy, kto ma dostęp do tej listy
  może również uzyskać dostęp do bitcoinów.
reviewed: true

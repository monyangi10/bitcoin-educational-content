question: อะไรที่ไม่ใช่วลีช่วยจำในบริบทของ Bitcoin?
answer: รหัสผ่านสำหรับ Bitcoin wallet ของคุณ
wrong_answers:
  - รายการคำศัพท์ 12 คำจากพจนานุกรมเฉพาะ
  - รายการคำศัพท์ 24 คำจากพจนานุกรมเฉพาะ
  - ความลับในการเข้าถึงกองทุนบิตคอยน์ของคุณ
explanation: |
  วลีช่วยจำในบริบทของ Bitcoin คือรายการคำ 12 หรือ 24 คำที่ช่วยให้คุณสามารถกู้คืน wallet ของคุณบนแอปพลิเคชัน Bitcoin wallet ใด ๆ ได้ ใครก็ตามที่เข้าถึงรายการนี้ได้ก็สามารถเข้าถึงบิตคอยน์ของคุณได้เช่นกัน
reviewed: true
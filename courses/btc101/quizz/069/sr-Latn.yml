question: Koja je uloga javnog ključa u Bitkoin novčaniku?
answer: Koristi se za generate Bitkoin adrese i tako prima novac.
wrong_answers:
  - Koristi se za šifrovanje Bitkoin transakcija.
  - Koristi se za pristup Bitkoin novčaniku.
  - Koristi se za pravljenje rezervne kopije Bitkoin novčanik.
explanation: |
  Javni ključ se izvodi iz privatnog ključa i koristi se
  za generisanje Bitkoin adrese kako bi se primio novac.
reviewed: true

question: Wat was het geschatte aantal bitcoins in omloop na de eerste Halving?
answer: 10.500.000 BTC.
wrong_answers:
  - 5.250.000 BTC.
  - 15.750.000 BTC.
  - 21.000.000 BTC.
explanation: |
  Na de eerste Halving, die plaatsvond op blokhoogte
  210.000, was het geschatte aantal bitcoins in omloop
  10.500.000 BTC, wat de helft is van het totale aantal
  bitcoins dat in omloop zal zijn.
reviewed: true
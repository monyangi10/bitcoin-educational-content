question: İlk Halving'dan sonra dolaşımdaki tahmini bitcoin sayısı neydi?
answer: 10,500,000 BTC.
wrong_answers:
  - 5,250,000 BTC.
  - 15,750,000 BTC.
  - 21,000,000 BTC.
explanation: |
  Blok yüksekliğinde meydana gelen ilk Halving'den sonra
  210.000, dolaşımdaki tahmini bitcoin sayısı
  toplam BTC sayısının yarısı olan 10.500.000 BTC idi
  dolaşımda olacak bitcoinler.
reviewed: true
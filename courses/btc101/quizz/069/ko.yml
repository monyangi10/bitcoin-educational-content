question: Bitcoin Wallet에서 공개 키의 역할은 무엇인가요?
answer: generate Bitcoin 주소에 사용되며 따라서 돈을 받습니다.
wrong_answers:
  - Bitcoin 트랜잭션을 암호화하는 데 사용됩니다.
  - Bitcoin Wallet에 액세스하는 데 사용됩니다.
  - Bitcoin Wallet을 백업하는 데 사용됩니다.
explanation: |
  공개 키는 개인 키에서 파생되며, 돈을 받기 위해
  를 generate Bitcoin 주소로 전송하여 돈을 받습니다.
reviewed: true
question: Каква е ролята на публичния ключ в Bitcoin портфейлите?
answer: Той се използва за генериране на Bitcoin адрес и по този начин получава пари.
wrong_answers:
  - Използва се за криптиране на транзакциите Bitcoin.
  - Той се използва за достъп до Bitcoin портфейлите.
  - Той се използва за архивиране на Bitcoin портфейлите.
explanation: |
  Публичният ключ се получава от частния ключ и се използва
  за генериране на Bitcoin адрес, за да се получат пари.
reviewed: true

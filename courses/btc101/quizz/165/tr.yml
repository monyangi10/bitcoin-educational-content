question: Keynesyen ekonomi ile Avusturya ekonomisi arasında parasal sisteme ilişkin temel fark nedir?
answer: Keynesyen ekonomi, durumların ve kaynakların zamansal ve dinamik yönlerini dikkate almaz.
wrong_answers:
  - Keynesyen ekonomi para birimlerinin aşırı tüketimini teşvik eder.
  - Keynesyen ekonomi, durumların ve kaynakların kıtlığını kabul eder.
  - Keynesyen ekonomi enflasyonu teşvik eder.

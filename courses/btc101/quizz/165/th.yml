question: ความแตกต่างหลักระหว่างเศรษฐศาสตร์เคนส์และเศรษฐศาสตร์ออสเตรียเกี่ยวกับระบบการเงินคืออะไร?
answer: เศรษฐศาสตร์เคนส์ไม่ได้คำนึงถึงแง่มุมเชิงเวลาและพลวัตของสถานการณ์และทรัพยากร
wrong_answers:
  - เศรษฐศาสตร์เคนส์สนับสนุนการบริโภคสกุลเงินมากเกินไป
  - เศรษฐศาสตร์เคนส์ยอมรับถึงความขาดแคลนของสถานการณ์และทรัพยากร
  - เศรษฐศาสตร์เคนส์สนับสนุนเงินเฟ้อ
explanation: >-
reviewed: true
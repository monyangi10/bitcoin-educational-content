question: Ni itandukaniro irihe rikomeye riri hagati y’ubutunzi bwa Keynes n’ubutunzi bwa Otirishiya ku bijanye n’uburyo bw’amahera?
answer: Ubutunzi bwa Keynes ntibufata mu muzirikanyi imice y’igihe n’inguvu y’ibintu n’ubutunzi.
wrong_answers:
  - Ubutunzi bwa Keynes buratera imbere gukoresha amafaranga birenze urugero.
  - Ubutunzi bwa Keynes bwemera ko ibintu n’ubutunzi ari bike.
  - Ubutunzi bwa Keynes buraremesha ugutera imbere kw’ibiciro.
explanation: >-
reviewed: true
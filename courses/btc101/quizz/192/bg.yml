question: Какво е DCA?
answer: Купуване на малки количества Bitcoin на равни интервали от време.
wrong_answers:
  - Закупуване на голямо количество Bitcoin наведнъж.
  - Купувам Bitcoin само когато цената падне.
  - Купуване на Bitcoin само когато цената се повиши.
explanation: |
  В текста на курса се обяснява, че DCA
  включва закупуване на малки количества Bitcoin по
  на равни интервали. Този метод изравнява цената
  и осигурява постоянен растеж на цената
  на Bitcoin.
reviewed: true

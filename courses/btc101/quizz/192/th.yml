question: Dollar Cost Average คืออะไร?
answer: การซื้อ Bitcoin ในปริมาณเล็กน้อยเป็นระยะ ๆ
wrong_answers:
  - การซื้อ Bitcoin จำนวนมากในครั้งเดียว
  - ซื้อ Bitcoin เฉพาะเมื่อราคาลดลงเท่านั้น
  - ซื้อ Bitcoin เฉพาะเมื่อราคาสูงขึ้นเท่านั้น
explanation: |
  ข้อความในหลักสูตรอธิบายว่าเทคนิค Dollar Cost Average เกี่ยวข้องกับการซื้อ Bitcoin ในปริมาณเล็กน้อยเป็นระยะ ๆ วิธีนี้ช่วยปรับระดับความผันผวนของราคาในช่วงเวลาหนึ่งและรับประกันการเติบโตอย่างต่อเนื่องในปริมาณของ Bitcoin ที่เป็นเจ้าของ
reviewed: true
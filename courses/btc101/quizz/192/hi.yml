question: डॉलर लागत औसत क्या है?
answer: नियमित अंतराल पर छोटी मात्रा में Bitcoin खरीदना।
wrong_answers:
  - एक बार में बड़ी मात्रा में Bitcoin खरीदना।
  - Bitcoin को केवल तभी खरीदें जब कीमत गिर जाए।
  - Bitcoin को केवल तभी खरीदें जब कीमत बढ़े।
explanation: |
  पाठ्यक्रम पाठ में बताया गया है कि डॉलर लागत औसत तकनीक में नियमित अंतराल पर Bitcoin की छोटी मात्रा खरीदना शामिल है। यह विधि समय के साथ मूल्य में उतार-चढ़ाव को संतुलित करती है और स्वामित्व वाली Bitcoin की मात्रा में निरंतर वृद्धि सुनिश्चित करती है।
reviewed: true
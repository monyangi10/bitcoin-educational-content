question: 달러 비용 평균이란 무엇인가요?
answer: 일정한 간격으로 소량의 Bitcoin을 구매합니다.
wrong_answers:
  - 한 번에 많은 양의 Bitcoin을 구매합니다.
  - 가격이 하락할 때만 Bitcoin를 구매합니다.
  - 가격이 상승할 때만 Bitcoin를 구매합니다.
explanation: |
  강의 텍스트는 달러 비용 평균
  기법은 소량의 Bitcoin를 일정한 간격으로
  일정한 간격으로 구매하는 것이라고 설명합니다. 이 방법은 시간이 지남에 따라 가격
  가격 변동을 평준화하고
  지속적인 성장을 보장합니다.
reviewed: true
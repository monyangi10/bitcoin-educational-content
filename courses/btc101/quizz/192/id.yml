question: Apa itu Dollar Cost Averaging?
answer: Membeli Bitcoin dalam jumlah kecil secara berkala.
wrong_answers:
  - Membeli jumlah besar Bitcoin sekaligus.
  - Membeli Bitcoin hanya ketika harga turun.
  - Membeli Bitcoin hanya ketika harga naik.
explanation: >-
  Teks kursus menjelaskan bahwa teknik Dollar Cost Averaging melibatkan pembelian Bitcoin dalam jumlah kecil secara berkala.
  Metode ini meratakan fluktuasi harga dari waktu ke waktu dan memastikan pertumbuhan berkelanjutan dalam jumlah Bitcoin yang dimiliki.
reviewed: true

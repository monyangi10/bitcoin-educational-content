question: Koja je svrha Proof of Work u Bitkoin mreži?
answer: Proof of Work osigurava verodostojnost informacija bez poverenja trećoj strani.
wrong_answers:
  - Proof of Work se koristi za kreiranje novih bitkoina poveravanjem trećoj strani.
  - Proof of Work se koristi za verifikaciju Bitkoin transakcija poveravanjem trećoj strani.
  - Proof of Work se koristi za promenu Bitkoin protokola bez poverenja trećoj strani.

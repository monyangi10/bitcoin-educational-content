question: Какво е предназначението на Proof of Work в мрежата Bitcoin?
answer: Proof of Work гарантира достоверността на информацията, без да се доверява на трета страна.
wrong_answers:
  - Proof of Work се използва за създаване на нови биткойни, като се доверява на трета страна.
  - Proof of Work се използва за проверка на трансакциите Bitcoin чрез доверяване на трета страна.
  - Proof of Work се използва за промяна на протокола Bitcoin, без да се доверява на трета страна.

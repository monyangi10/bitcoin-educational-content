question: Jaki jest cel dowodu pracy w sieci Bitcoin?
answer: Dowód pracy zapewnia prawdziwość informacji bez ufania stronie trzeciej.
wrong_answers:
  - Dowód pracy służy do tworzenia nowych bitcoinów poprzez zaufanie stronie trzeciej.
  - Dowód pracy służy do weryfikacji transakcji Bitcoin poprzez zaufanie stronie trzeciej.
  - Dowód pracy jest używany do zmiany protokołu Bitcoin bez ufania stronie trzeciej.

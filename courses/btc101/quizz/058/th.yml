question: หลักเศรษฐศาสตร์ใดที่ Bitcoin สอดคล้องกับ?
answer: หลักการของเศรษฐศาสตร์ออสเตรีย
wrong_answers:
  - หลักเศรษฐศาสตร์เคนส์
  - หลักเศรษฐศาสตร์มาร์กซิสต์
  - หลักการของเศรษฐศาสตร์นีโอคลาสสิก
explanation: |
  Bitcoin สอดคล้องกับหลักการของเศรษฐศาสตร์ออสเตรีย
  ปริมาณที่จำกัดและการไม่มีหน่วยงานกลางช่วยปกป้องมัน
  จากความเสี่ยงของเงินเฟ้อที่มีอยู่ใน
  สกุลเงินแบบดั้งเดิม
reviewed: true
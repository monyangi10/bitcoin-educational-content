question: Какви икономически принципи спазва Bitcoin?
answer: Принципи на австрийската икономическа школа.
wrong_answers:
  - Принципи на кейнсианската икономика.
  - Принципи на марксистката икономика.
  - Принципи на неокласическата икономика.
explanation: |
  Bitcoin е в съответствие с принципите на австрийската икономическа школа.
  Ограниченото му количество и липсата на централен субект го защитават
  от присъщите рискове от инфлация, които се наблюдават при
  традиционните валути.
reviewed: true

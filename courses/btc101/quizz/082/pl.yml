question: Jakie jest ryzyko nadmiernego komplikowania bezpieczeństwa i dostępności bitcoinów?
answer: Niewłaściwe obchodzenie się z kopiami zapasowymi portfeli może spowodować straty.
wrong_answers:
  - Nieumiejętne obchodzenie się z portfelami fizycznymi może spowodować straty.
  - Nieumiejętne obchodzenie się z portfelami cyfrowymi może spowodować straty.
  - Nieumiejętne obchodzenie się z portfelami wielopodpisowymi może spowodować straty.
explanation: |
  Nadmierne komplikowanie bezpieczeństwa i dostępności
  bitcoinów może zaszkodzić, jeśli, na przykład, źle zarządzasz
  kopiami zapasowymi portfeli. Dzieje się tak, ponieważ proste rozwiązania
  mają kluczowe znaczenie dla odzyskania dostępu do środków
  w przypadku utraty telefonu lub komputera.
reviewed: true

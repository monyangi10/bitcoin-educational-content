question: Какъв е рискът от прекалено усложняване на сигурността и достъпността на вашите биткойни?
answer: Можете да си навредите, ако боравите неправилно с резервните портфейли.
wrong_answers:
  - Можете да се нараните, ако боравите неправилно с физическите портфейли.
  - Можете да си навредите, ако боравите неправилно с цифровите портфейли.
  - Можете да си навредите, ако боравите неправилно с multisig портфейли.
explanation: |
  Прекалено усложняване на сигурността и достъпността на вашите
  биткойни може да ви навреди, ако, например, злоупотребите с
  резервните копия на вашите портфейли. Това е така, защото простото архивиране
  процедури са от решаващо значение за възстановяване на достъпа до вашите средства
  в случай на загуба на телефона или компютъра ви.
reviewed: true

question: 비트코인의 보안과 접근성을 지나치게 복잡하게 만들면 어떤 위험이 있나요?
answer: 백업 지갑을 잘못 다루면 스스로에게 해를 끼칠 수 있습니다.
wrong_answers:
  - 실물 지갑을 잘못 취급하면 스스로에게 해를 끼칠 수 있습니다.
  - 디지털 지갑을 잘못 다루면 스스로에게 해를 끼칠 수 있습니다.
  - Multisig 지갑을 잘못 다루면 스스로에게 해를 끼칠 수 있습니다.
explanation: |
  비트코인의 보안과 접근성을 지나치게 복잡하게 만들면
  비트코인의 보안과 접근성을 복잡하게 만들면, 예를 들면
  지갑 백업을 잘못하면 해를 입을 수 있습니다. 간단한 백업
  절차는 자금에 다시 액세스하는 데 매우 중요하기 때문입니다
  자금에 다시 액세스하려면 간단한 백업 절차가 중요하기 때문입니다.

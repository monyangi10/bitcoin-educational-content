question: Ni ikihe kibazo co gutera ingorane cane umutekano n’ugushikira amafaranga yawe ya bitcoins?
answer: Ushobora kwigirira nabi iyo ukoresheje nabi ama wallets y’inyuma.
wrong_answers:
  - Ushobora kwigirira nabi iyo ukoresheje nabi amasakoshi y’umubiri.
  - Ushobora kwigirira nabi iyo ukoresheje nabi ama wallets ya digitale.
  - Ushobora kwigirira nabi iyo ukoresheje nabi ama wallet ya Multisig.
explanation: |
  Gutera ingorane cane umutekano n’uburyo bwo kuronka
  bitcoins zishobora kukugirira nabi iyo, nk’akarorero, ukoresheje nabi
  ama backups y’amasakoshi yawe. Ivyo ni kubera ko gusubiza inyuma vyoroshe
  Uburyo bwo kubikora ni ngirakamaro kugira ngo usubire kuronka amahera yawe
  mu gihe woba watakaje telefone yawe canke mudasobwa yawe.
reviewed: true
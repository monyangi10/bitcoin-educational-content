question: ความเสี่ยงของการทำให้ความปลอดภัยและการเข้าถึงบิทคอยน์ของคุณซับซ้อนเกินไปคืออะไร?
answer: คุณอาจทำร้ายตัวเองได้หากจัดการกระเป๋าสำรองผิดพลาด
wrong_answers:
  - คุณอาจทำร้ายตัวเองได้หากคุณจัดการกระเป๋าเงินทางกายภาพผิดพลาด
  - คุณอาจทำร้ายตัวเองได้หากจัดการกระเป๋าเงินดิจิทัลผิดพลาด
  - คุณอาจทำร้ายตัวเองได้หากจัดการกระเป๋าเงิน multisig ผิดพลาด
explanation: |
  การทำให้ความปลอดภัยและการเข้าถึงบิตคอยน์ของคุณซับซ้อนเกินไปอาจทำให้คุณเสียหายได้ หากคุณจัดการสำรองข้อมูลกระเป๋าเงินผิดพลาด ตัวอย่างเช่น เนื่องจากขั้นตอนการสำรองข้อมูลที่ง่ายเป็นสิ่งสำคัญสำหรับการเข้าถึงเงินของคุณอีกครั้งในกรณีที่โทรศัพท์หรือคอมพิวเตอร์ของคุณสูญหาย
reviewed: true
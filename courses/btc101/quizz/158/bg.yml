question: Как протоколът Bitcoin поддържа постоянно средно време между създаването на два блока?
answer: Трудността за намиране на валиден хеш се променя на всеки 2016 блока.
wrong_answers:
  - Броят на миньорите се регулира до определен брой.
  - Размерът на блоковете се настройва на 10 мегабайта.
  - Наградата за намиране на валиден хеш се увеличава.
explanation: |
  Протоколът Bitcoin гарантира, че средното време между
  на два блока остава постоянно чрез регулиране на трудността на
  намиране на валиден хеш на всеки 2016 блока. Това събитие се случва
  независимо от броя на миньорите и техните изчислителни
  мощност.
reviewed: true
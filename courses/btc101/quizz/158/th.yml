question: โปรโตคอล Bitcoin รักษาความสม่ำเสมอของเวลาเฉลี่ยระหว่างการสร้างบล็อกสองบล็อกได้อย่างไร?
answer: ความยากในการหาค่าแฮชที่ถูกต้องจะปรับทุกๆ 2016 บล็อก
wrong_answers:
  - จำนวนคนงานเหมืองถูกควบคุมให้เป็นจำนวนคงที่
  - ขนาดของบล็อกถูกปรับให้เป็น 10 เมกะไบต์
  - รางวัลสำหรับการค้นหาแฮชที่ถูกต้องเพิ่มขึ้น
explanation: |
  โปรโตคอล Bitcoin รับประกันว่าเวลาเฉลี่ยระหว่างสองบล็อกจะคงที่โดยการปรับความยากในการหาค่าแฮชที่ถูกต้องทุกๆ 2016 บล็อก เหตุการณ์นี้เกิดขึ้นโดยไม่คำนึงถึงจำนวนของนักขุดและพลังการประมวลผลของพวกเขา
reviewed: true
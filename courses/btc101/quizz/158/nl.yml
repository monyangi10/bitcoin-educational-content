question: Wat is het doel van de Proof of Work in het Bitcoin netwerk?
answer: De Proof of Work garandeert de waarheidsgetrouwheid van informatie zonder een derde partij te vertrouwen.
wrong_answers:
  - De Proof of Work wordt gebruikt om nieuwe bitcoins te creëren door een derde partij te vertrouwen.
  - De Proof of Work wordt gebruikt om Bitcoin transacties te verifiëren door een derde partij te vertrouwen.
  - De Proof of Work wordt gebruikt om het Bitcoin protocol te wijzigen zonder een derde partij te vertrouwen.

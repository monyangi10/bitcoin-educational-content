question: Bitcoin 프로토콜은 어떻게 두 블록 생성 사이의 평균 시간을 일정하게 유지하나요?
answer: 유효한 Hash을 찾는 난이도는 2016블록마다 조정됩니다.
wrong_answers:
  - 채굴자 수는 고정된 수로 제한됩니다.
  - 블록의 크기는 10메가바이트로 조정됩니다.
  - 유효한 Hash를 찾으면 보상이 증가합니다.
explanation: |
  Bitcoin 프로토콜은 두 블록 사이의 평균 시간을 보장합니다
  두 블록 사이의 평균 시간이 일정하게 유지되도록 보장합니다
  2016 블록마다 유효한 Hash를 찾음으로써 평균 시간을 일정하게 유지합니다. 이 이벤트는
  채굴자의 수와 컴퓨팅 파워에 관계없이 발생합니다
  파워.
reviewed: true
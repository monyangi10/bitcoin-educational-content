question: ปัญหาแม่ทัพไบแซนไทน์คืออะไร?
answer: มันเป็นปัญหาของการประสานข้อมูลในระบบที่ไม่สามารถไว้วางใจผู้มีส่วนร่วมต่าง ๆ ได้
wrong_answers:
  - มันเป็นปัญหาของการตรวจสอบธุรกรรมในเครือข่ายแบบกระจายศูนย์
  - มันเป็นปัญหาของการป้องกันการใช้จ่ายซ้ำในสกุลเงินดิจิทัล
  - มันเป็นปัญหาของการรักษาฉันทามติในเครือข่ายแบบรวมศูนย์
explanation: |
  ปัญหาของนายพลไบแซนไทน์เป็นปัญหาคลาสสิกใน
  การคำนวณแบบกระจาย ซึ่งเกี่ยวข้องกับการบรรลุฉันทามติ
  ในเครือข่ายที่บางโหนดอาจมีข้อบกพร่องหรือ
  เป็นอันตราย Bitcoin แก้ปัญหานี้โดยใช้
  บล็อกเชนที่อิงจาก Proof of Work ซึ่งทำให้มั่นใจได้ว่า
  โหนดทั้งหมดเห็นพ้องต้องกันในสถานะของประวัติการทำธุรกรรม
reviewed: true
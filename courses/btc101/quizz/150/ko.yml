question: 비잔틴 장군의 문제는 무엇인가요?
answer: 다양한 주체들을 신뢰할 수 없는 시스템에서 정보를 조정하는 것이 문제입니다.
wrong_answers:
  - 이는 탈중앙화 네트워크에서 트랜잭션을 검증하는 문제입니다.
  - 디지털 화폐의 이중 지출을 방지하는 문제입니다.
  - 중앙 집중식 네트워크에서 합의를 유지하는 것이 문제입니다.
explanation: |
  비잔틴 장군의 문제는 분산 컴퓨팅의 고전적인 문제입니다
  분산 컴퓨팅의 고전적인 문제입니다
  네트워크에서 일부 노드에 결함이 있거나
  악의적인. Bitcoin는 이 문제를 해결하기 위해
  Proof of Work에 기반한 Blockchain을 사용하여 이 문제를 해결합니다
  노드가 거래 내역의 상태에 동의하도록 보장합니다.
reviewed: true
question: Какво представлява проблемът на византийските генерали?
answer: Това е проблем с координацията на информацията в система, в която не може да се има доверие на различните участници.
wrong_answers:
  - Това е проблем с проверката на транзакциите в децентрализирана мрежа.
  - Това е проблем, свързан с предотвратяването на двойно харчене в цифрова валута.
  - Това е проблем с поддържането на консенсус в централизирана мрежа.
explanation: |
  Проблемът на византийските генерали е класически проблем в
  разпределени изчисления, който включва постигането на консенсус
  в мрежа, в която някои от възлите могат да бъдат повредени или
  злонамерени. Bitcoin решава този проблем чрез използването на
  блокчейн, базиран на Proof of Work, който гарантира, че всички
  възлите са съгласни със състоянието на историята на транзакциите.
reviewed: true
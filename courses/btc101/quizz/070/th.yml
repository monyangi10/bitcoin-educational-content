question: ความเสี่ยงของการแชร์กุญแจสาธารณะของ Bitcoin wallet คืออะไร?
answer: สูญเสียความเป็นส่วนตัว
wrong_answers:
  - ทำลาย Bitcoin wallet.
  - การสูญเสียบิตคอยน์
  - การแฮ็ก Bitcoin wallet.
explanation: |
  การแชร์กุญแจสาธารณะมีความเสี่ยงต่อความเป็นส่วนตัว แต่ไม่ใช่
  ต่อความปลอดภัย นี่เป็นเพราะกุญแจสาธารณะถูกใช้เพื่อ
  generate Bitcoin ที่อยู่และดังนั้นรับเงิน แต่
  มันไม่ได้แสดงถึงความเป็นเจ้าของของ Bitcoins
reviewed: true
question: วัตถุประสงค์ของกฎระเบียบ KYC คืออะไร?
answer: เพื่อต่อสู้กับการสนับสนุนทางการเงินแก่การก่อการร้าย การหลีกเลี่ยงภาษี และการฟอกเงิน
wrong_answers:
  - เพื่อเพิ่มราคาของ Bitcoin และให้ผู้ใช้จ่ายภาษีมากขึ้น
  - เพื่อควบคุมการจัดหา Bitcoin.
  - เพื่อป้องกันไม่ให้คนซื้อ Bitcoin
explanation: |
  ข้อความในหลักสูตรอธิบายว่า กฎระเบียบการรู้จักลูกค้า (KYC) กำหนดให้ผู้ใช้ต้องแสดงตัวตนเพื่อป้องกันการสนับสนุนทางการเงินแก่การก่อการร้าย การหลีกเลี่ยงภาษี และการฟอกเงิน
reviewed: true
question: Jaki jest cel przepisów KYC?
answer: Zwalczanie finansowania terroryzmu, uchylania się od opodatkowania i prania pieniędzy.
wrong_answers:
  - Podniesienie ceny bitcoina i zmuszenie użytkownika do płacenia wyższych podatków.
  - Kontrola podaży bitcoina.
  - Uniemożliwienie ludziom zakupu bitcoinów.
explanation: |
  Tekst kursu wyjaśnia, że przepisy Know Your Customer (KYC)
  wymagają od użytkowników podania tożsamości w celu zwalczania finansowania terroryzmu, uchylania się od opodatkowania i prania pieniędzy.
reviewed: true

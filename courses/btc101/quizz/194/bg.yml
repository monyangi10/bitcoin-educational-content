question: Каква е целта на разпоредбите за KYC?
answer: Борба с финансирането на тероризма, укриването на данъци и прането на пари.
wrong_answers:
  - Да се увеличи цената на Bitcoin и потребителят да плаща повече данъци.
  - Контролиране на доставките на Bitcoin.
  - За да се предотврати купуването на Bitcoin.
explanation: |
  В текста на курса се обяснява, че "Познай своя клиент" (KYC)
  изисква от потребителите да предоставят идентификация на
  за борба с финансирането на тероризма, укриването на данъци и парите
  изпирането на пари.
reviewed: true
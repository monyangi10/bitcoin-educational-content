question: Koja je svrha KYC propisa?
answer: Da bi se suzbilo finansiranje terorizma, utaja poreza i pranje novca.
wrong_answers:
  - Da se poveća cena Bitkoina i da korisnik plati više poreza.
  - Da se kontroliše ponuda od Bitkoina.
  - Da bi se sprečilo da ljudi kupuju Bitkoin.
explanation: |
  Tekst kursa objašnjava da propisi Znaj Svojeg Kupca (KYC) zahtevaju od korisnika da pruže identifikaciju kako bi se borili protiv finansiranja terorizma, utaje poreza i pranja novca.
reviewed: true

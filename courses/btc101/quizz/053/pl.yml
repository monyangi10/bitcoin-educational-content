question: Jak nazywa się proces weryfikacji transakcji w sieci Bitcoin?
answer: Wydobycie
wrong_answers:
  - Odkrywanie
  - Zbieranie
  - Rolnictwo
explanation: |
  Proces, który weryfikuje transakcje w sieci Bitcoin
  jest nazywany wydobyciem. Górnicy wykonują zadanie kryptograficzne i są nagradzani emisją nowych bitcoinów.
reviewed: true

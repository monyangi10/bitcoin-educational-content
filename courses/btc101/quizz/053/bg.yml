question: Как се нарича процесът, който добавя транзакциите в мрежата Bitcoin?
answer: Копаене
wrong_answers:
  - Копаене
  - Събиране на реколтата
  - Фермерство
explanation: |
  Процесът, който проверява транзакциите в Bitcoin
  се нарича копаене. Миньорите извършват криптографска
  задача и получават възнаграждение чрез издаване на нови биткойни.
reviewed: true

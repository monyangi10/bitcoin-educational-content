question: Er is een historisch geval van een dagelijkse inflatie van 100%; waar en wanneer gebeurde dat?
answer: In Zimbabwe, 2007.
wrong_answers:
  - In Hongarije, 1945.
  - In China, 1940.
  - Dit is eigenlijk een onrealistisch geval dat niet kan gebeuren.
explanation: |
  Een inflatie van 100% per dag is een realistisch scenario dat
  gebeurde in Zimbabwe in 2007, waar de geldwaarde ruwweg
  elke 24 uur verdubbelde.
reviewed: true
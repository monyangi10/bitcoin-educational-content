question: Czym jest sieć Lightning?
answer: Natychmiastową siecią płatności Bitcoin opartą na łańcuchu bloków Bitcoina.
wrong_answers:
  - Oddzielną siecią niezależną od łańcucha bloków Bitcoina.
  - Siecią górników Bitcoina.
  - Siecią giełd Bitcoina.
explanation: |
  Sieć Lightning to sieć płatności natychmiastowych Bitcoin,
  która jest oparta na łańcuchu bloków Bitcoina.
reviewed: true

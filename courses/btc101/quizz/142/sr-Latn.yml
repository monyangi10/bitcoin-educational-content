question: Šta je Lightning mreža?
answer: Mreža za instant plaćanja bitkoinom zasnovana na Bitkoin Blockchain-u.
wrong_answers:
  - Posebna Blockchain mreža od Bitkoin Blockchain.
  - Mreža Bitkoin rudara.
  - Mreža Bitkoin razmena.
explanation: |
  Lightning mreža je instant Bitkoin platna mreža
  koja se zasniva na Bitkoin Blockchain-u.
reviewed: true

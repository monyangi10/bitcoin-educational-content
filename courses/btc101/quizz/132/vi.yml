question: Số lượng máy chủ được phân bố trên toàn cầu vào tháng 9 năm 2023 là bao nhiêu?
answer: 45,000 máy chủ.
wrong_answers:
  - 10,000 máy chủ.
  - 100,000 máy chủ.
  - 500,000 máy chủ.
explanation: >-
  Tính đến tháng 9 năm 2023, có khoảng 45,000 máy chủ được phân bố trên toàn cầu.
reviewed: true
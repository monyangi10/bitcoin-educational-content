question: 대규모 조직이나 열정적인 Bitcoin 애호가를 위한 Bitcoin 수용을 위한 도구에는 어떤 것이 있나요?
answer: BTCpay 서버.
wrong_answers:
  - Bitcoin Wallet.
  - Bitcoin Exchange.
  - BTCpay Mining.
explanation: |
  BTCpay 서버는 대규모 조직이나 열정적인 비트코인 사용자들을 위한
  구조 또는 열정적인 비트코인을 위한 도구입니다. 기타 솔루션
  간단한 온라인 비즈니스를 위한 OpenNode와 아마추어 판매자를 위한 스위스
  아마추어 판매자를 위한 Bitcoin Pay가 있습니다.
reviewed: true
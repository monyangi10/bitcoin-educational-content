question: Czym jest zakup spontaniczny?
answer: Natychmiastowy zakup bitcoin w celu uzyskania ekspozycji.
wrong_answers:
  - Kupowanie bitcoina w regularnych odstępach czasu.
  - Kupowanie bitcoina tylko wtedy, gdy cena spadnie.
  - Kupowanie bitcoina tylko wtedy, gdy cena wzrośnie.
explanation: |
  Tekst kursu wyjaśnia, że zakup spontaniczny
  służy do natychmiastowego uzyskania ekspozycji na bitcoina. Na przykład,
  może oznaczać zakup podczas krachu lub skorzystanie z
  bonusu.
reviewed: true

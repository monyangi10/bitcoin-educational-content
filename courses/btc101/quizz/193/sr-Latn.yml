question: Šta je spontana kupovina?
answer: Kupovina Bitkoina odmah radi sticanja izloženosti.
wrong_answers:
  - Kupovina Bitkoina u redovnim intervalima.
  - Kupovina Bitkoina samo kada cena padne.
  - Kupovina Bitkoina samo kada cena poraste.
explanation: |
  Tekst kursa objašnjava da se spontana kupovina koristi za trenutno sticanje izloženosti Bitkoinu. Na primer, to može značiti kupovinu tokom pada ili iskorišćavanje bonusa.
reviewed: true

question: स्वतःस्फूर्त खरीदारी क्या है?
answer: एक्सपोजर प्राप्त करने के लिए तुरंत Bitcoin खरीदें।
wrong_answers:
  - नियमित अंतराल पर Bitcoin खरीदना।
  - Bitcoin को केवल तभी खरीदें जब कीमत गिर जाए।
  - Bitcoin को केवल तभी खरीदें जब कीमत बढ़े।
explanation: |
  पाठ्यक्रम पाठ में बताया गया है कि एक सहज खरीद का उपयोग तुरंत Bitcoin के संपर्क में आने के लिए किया जाता है। उदाहरण के लिए, इसका मतलब क्रैश के दौरान खरीदारी करना या बोनस का लाभ उठाना हो सकता है।
reviewed: true
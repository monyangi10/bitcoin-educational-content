question: การซื้อแบบฉับพลันคืออะไร?
answer: ซื้อ Bitcoin ทันทีเพื่อรับการเปิดเผย
wrong_answers:
  - ซื้อ Bitcoin เป็นระยะ ๆ
  - ซื้อ Bitcoin เฉพาะเมื่อราคาลดลงเท่านั้น
  - ซื้อ Bitcoin เฉพาะเมื่อราคาสูงขึ้นเท่านั้น
explanation: |
  ข้อความในหลักสูตรอธิบายว่าการซื้อแบบฉับพลันนั้นใช้เพื่อให้ได้รับการเปิดเผยต่อ Bitcoin ทันที ตัวอย่างเช่น อาจหมายถึงการซื้อในช่วงที่ตลาดตกหรือการใช้ประโยชน์จากโบนัส
reviewed: true
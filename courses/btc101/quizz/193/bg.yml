question: Какво е lump sum покупка?
answer: закупуване на Bitcoin наведнъж, за да получите експозиция.
wrong_answers:
  - Купуване на Bitcoin на редовни интервали.
  - Купувам Bitcoin само когато цената падне.
  - Купуване на Bitcoin само когато цената се повиши.
explanation: |
  В текста на курса се обяснява, че спонтанната покупка е
  се използва, за да се получи незабавно купуване на Bitcoin. Например,
  тя може да означава покупка по време на срив или възползване от
  бонус.
reviewed: true

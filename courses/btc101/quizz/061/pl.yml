question: Jak często nagroda za wydobycie jest zmniejszana o połowę?
answer: Co 210 000 bloków.
wrong_answers:
  - Co 120 000 bloków.
  - Co 540 000 bloków.
  - Co 2 100 000 bloków.
explanation: |
  Nagroda za wydobycie jest zaprogramowana tak, aby zmniejszać się o połowę co 210 000 bloków, czyli mniej więcej co cztery lata: wydarzenie
  znane jako halving.
reviewed: true

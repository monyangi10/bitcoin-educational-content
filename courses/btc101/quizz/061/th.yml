question: รางวัลสำหรับ mining ถูกลดลงครึ่งหนึ่งบ่อยแค่ไหน?
answer: ทุก ๆ 210,000 บล็อก
wrong_answers:
  - ทุก ๆ 120,000 บล็อก
  - ทุก ๆ 540,000 บล็อก
  - ทุก ๆ 2,100,000 บล็อก
explanation: |
  รางวัลสำหรับ mining ถูกตั้งโปรแกรมให้ลดลงครึ่งหนึ่งทุก ๆ 210,000 บล็อก ซึ่งประมาณทุก ๆ สี่ปี: เหตุการณ์นี้เรียกว่าการลดลงครึ่งหนึ่ง
reviewed: true
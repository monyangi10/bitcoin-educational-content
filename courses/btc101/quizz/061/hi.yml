question: Mining का इनाम आधा होने वाले इवेंट को क्या कहते हैं?
answer: जीडब्ल्यू-1
wrong_answers:
  - दोगुना
  - "क्वार्टरिंग" (Quartering)
  - ट्रिपलिंग
explanation: |
  Mining का इनाम आधा होने वाले इवेंट को कहते हैं
  Halving. यह इवेंट मुद्रा जारी करने वाले कर्व (मोनेटरी इश्यूअन्स कर्व) को एक...
  सीढ़ीनुमा आकार।
reviewed: true
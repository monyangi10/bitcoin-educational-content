question: Колко често наградата за копаене се намалява наполовина?
answer: На всеки 210 000 блока.
wrong_answers:
  - На всеки 120 000 блока.
  - На всеки 540 000 блока.
  - На всеки 2 100 000 блока.
explanation: |
  Наградата за копаене е програмирана да се намалява наполовина на всеки 210 000
  блокове, което е приблизително на всеки четири години: събитие
  известно като намаляване наполовина или халвинг.
reviewed: true

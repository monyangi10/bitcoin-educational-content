question: 다음 중 Lightning Network에서의 소액 결제의 주요 기능이 아닌 것은 무엇인가요?
answer: 결제 시간이 오래 걸립니다.
wrong_answers:
  - 저렴한 수수료.
  - 즉시 결제.
  - 확장성.
explanation: |
  Lightning Network 소액 거래를 통해 사용자는 다음과 같은 이점을 누릴 수 있습니다
  거래 수수료가 저렴하여 경제적으로 송금할 수 있습니다
  아주 적은 양의 Bitcoin를 보낼 수 있습니다. 또한 즉시
  결제가 가능하여 실시간 거래가 가능합니다. 마지막으로
  확장성을 확보하여 많은 수의 트랜잭션을 동시에 처리할 수 있습니다
  많은 수의 트랜잭션을 동시에 처리할 수 있습니다. 따라서 잘못된
  정답은 긴 결제 시간입니다.
reviewed: true
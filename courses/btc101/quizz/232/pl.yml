question: Które z poniższych NIE jest kluczową cechą mikrotransakcji w sieci Lightning?
answer: Długi czas płatności.
wrong_answers:
  - Niskie opłaty.
  - Natychmiastowe płatności.
  - Skalowalność.
explanation: |
  Dzięki mikrotransakcjom w sieci Lightning użytkownicy cieszą się niskimi opłatami transakcyjnymi, dzięki czemu opłacalne jest wysyłanie
  bardzo małych ilości bitcoinów. Mogą również dokonywać płatności natychmiastowo, pozwalając na transakcje w czasie rzeczywistym. Wreszcie
  sskalowalność sieci umożliwia obsługę dużej liczby transakcji jednocześnie. Tak więc niepoprawną
  odpowiedzią jest długi czas płatności.
reviewed: true

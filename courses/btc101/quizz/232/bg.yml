question: Кое от следните неща не е ключова характеристика на микротранзакциите в Lightning Network?
answer: Дълги срокове за плащане.
wrong_answers:
  - Ниски такси.
  - Незабавни плащания.
  - Мащабируемост.
explanation: |
  С микротранзакциите на Lightning Network потребителите могат
  да имат ниски такси за транзакции, което прави изпращането на
  много малки количества Bitcoin. Те също така могат да имат незабавни
  плащания, което позволява транзакции в реално време. Накрая те
  могат да получат мащабируемост, позволяваща обработката на големи
  брой транзакции едновременно. По този начин, грешните
  отговор е дългият срок за плащане.
reviewed: true
question: หนึ่งในเหตุผลหลักที่ Bitcoin ถูกสร้างขึ้นคืออะไร?
answer: เพื่อเสนอการเปลี่ยนแปลงระบบการเงิน
wrong_answers:
  - เพื่อเสนอการยกเลิกเงิน
  - เพื่อเสนอการสร้างรูปแบบใหม่ของเทคโนโลยี AI
  - เพื่อเสนอการควบคุมประชากรของโลก
explanation: |
  ข้อความกล่าวถึงว่า Satoshi Nakamoto สร้าง Bitcoin ในปี 2008 เพื่อเสนอการเปลี่ยนแปลงของระบบการเงิน
reviewed: true
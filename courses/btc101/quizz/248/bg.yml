question: Коя е една от основните причини за създаването на Bitcoin?
answer: Да предложи промяна на финансовата система.
wrong_answers:
  - Да се предложи премахване на парите.
  - Да предложи създаването на нова форма на технология за изкуствен интелект.
  - Да предложи контрол върху световното население.
explanation: |
  В текста се споменава, че Satoshi Nakamoto е създал Bitcoin в
  2008 г., за да предложи промяна на финансовата система.
reviewed: true
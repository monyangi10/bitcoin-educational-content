question: Jaki jest jeden z głównych powodów, dla których Bitcoin został stworzony?
answer: Jako propozycja zmiany systemu finansowego.
wrong_answers:
  - Jako propozycja eliminacji pieniędzy.
  - Jako propozycja stworzenia nowej formy technologii AI.
  - Jako propozycja przejęcia kontroli nad populacją świata.
explanation: |
  W tekście wspomniano, że Satoshi Nakamoto stworzył Bitcoina w
  2008 jako propozycję zmiany systemu finansowego.
reviewed: true

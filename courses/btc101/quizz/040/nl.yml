question: Wat is hyperinflatie?
answer: Een drastische toename van de monetaire massa.
wrong_answers:
  - Een kleine toename in de monetaire massa.
  - Een drastische afname van de monetaire massa.
  - Een kleine afname in de monetaire massa.
explanation: |
  Hyperinflatie is een monetair verschijnsel dat wordt gekenmerkt door een
  drastische toename van de inflatie door het drukken van geld
  door de autoriteiten, wat leidt tot een volledig verlies van
  vertrouwen in een munt.
reviewed: true
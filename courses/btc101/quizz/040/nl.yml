question: Wat is de strategie die centrale entiteiten gebruiken om een fiatvaluta te devalueren?
answer: Ze verhogen de monetaire massa elk jaar met een paar procent.
wrong_answers:
  - Ze verminderen hun monetaire massa elk jaar met een paar procent.
  - Ze houden de monetaire massa constant ten opzichte van de beginmassa.
  - Ze laten de monetaire massa willekeurig fluctueren in vergelijking met de initiële massa.
explanation: |
  Centrale entiteiten devalueren een munt vaak door de
  monetaire massa ten opzichte van de oorspronkelijke massa met een paar procent
  elk jaar. Deze stille devaluatie wordt vaak gerechtvaardigd
  in het belang van het volk.
reviewed: true
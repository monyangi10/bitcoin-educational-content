question: ภาวะเงินเฟ้อขั้นรุนแรงคืออะไร?
answer: การเพิ่มขึ้นอย่างมากของมวลเงิน
wrong_answers:
  - การเพิ่มขึ้นเล็กน้อยในมวลเงินตรา
  - การลดลงอย่างมากของมวลเงิน
  - การลดลงเล็กน้อยในมวลเงินตรา
explanation: |
  ภาวะเงินเฟ้อรุนแรงเป็นปรากฏการณ์ทางการเงินที่มีลักษณะการเพิ่มขึ้นของเงินเฟ้ออย่างรุนแรงผ่านการพิมพ์เงินโดยหน่วยงานที่มีอำนาจ ซึ่งนำไปสู่การสูญเสียความเชื่อมั่นในสกุลเงินอย่างสิ้นเชิง
reviewed: true
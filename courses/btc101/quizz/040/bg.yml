question: Какво представлява хиперинфлацията?
answer: Драстично увеличение на паричната маса.
wrong_answers:
  - Малко увеличение на паричната маса.
  - Драстично намаляване на паричната маса.
  - Малко намаляване на паричната маса.
explanation: |
  Хиперинфлацията е парично явление, което се характеризира с
  драстично увеличаване на инфлацията чрез парично печатане
  от страна на властите, което води до пълна загуба на
  доверие в дадена валута.
reviewed: true
question: Jakie znaczenie ma geograficzne rozmieszczenie węzłów Bitcoin?
answer: Praktycznie uniemożliwia to zniszczenie wszystkich kopii łańcucha bloków.
wrong_answers:
  - Określa cenę bitcoina w różnych regionach.
  - Wpływa na szybkość transakcji Bitcoin.
  - Określa liczbę bitcoinów, które można wydobyć w danym regionie.
explanation: |
  Rozmieszczenie geograficzne węzłów Bitcoin sprawia, że zniszczenie wszystkich kopii łańcucha bloków jest praktycznie niemożliwe. Ponieważ węzły są rozproszone, trudno jest
  fizycznie przejąć je wszystkie.
reviewed: true

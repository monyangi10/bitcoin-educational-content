question: Satoshi Nakamoto'nun e-posta yoluyla bilinen son özel mesajının tarihi nedir?
answer: 23 Nisan 2011.
wrong_answers:
  - 12 Aralık 2010.
  - 8 Ocak 2009.
  - 31 Ekim 2008.
explanation: |
  Satoshi'in bilinen son özel mesajının tarihi
  Nakamoto'ya 23 Nisan 2011 tarihinde e-posta yoluyla gönderilmiştir. Nakamoto'ya gönderilen
  geliştirici Mike Hearn.
reviewed: true
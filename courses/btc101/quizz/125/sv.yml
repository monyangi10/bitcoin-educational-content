question: Vilken betydelse har den geografiska fördelningen av Bitcoin-noderna?
answer: Det gör det praktiskt taget omöjligt att förstöra alla kopior av Blockchain.
wrong_answers:
  - Det avgör priset på Bitcoin i olika regioner.
  - Det påverkar hastigheten för Bitcoin-transaktioner.
  - Det avgör antalet bitcoins som kan utvinnas i en region.
explanation: |
  Den geografiska fördelningen av Bitcoin-noderna gör det
  praktiskt taget omöjligt att förstöra alla kopior av
  Blockchain. Eftersom noderna är utspridda är det svårt att
  fysiskt beslagta dem alla.
reviewed: true
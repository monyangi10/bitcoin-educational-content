question: ความสำคัญของการกระจายทางภูมิศาสตร์ของโหนด Bitcoin คืออะไร?
answer: มันทำให้แทบจะเป็นไปไม่ได้ที่จะทำลายสำเนาทั้งหมดของบล็อกเชน
wrong_answers:
  - มันกำหนดราคาของ Bitcoin ในภูมิภาคต่างๆ
  - มันส่งผลต่อความเร็วของธุรกรรม Bitcoin
  - มันกำหนดจำนวนบิตคอยน์ที่สามารถขุดได้ในภูมิภาคหนึ่ง
explanation: |
  การกระจายตัวทางภูมิศาสตร์ของโหนด Bitcoin ทำให้แทบจะเป็นไปไม่ได้ที่จะทำลายสำเนาทั้งหมดของบล็อกเชน เนื่องจากโหนดกระจายอยู่ ทำให้ยากที่จะยึดพวกมันทั้งหมดทางกายภาพ
reviewed: true
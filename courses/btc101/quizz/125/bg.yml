question: Какво е значението на географското разпределение на възлите Bitcoin?
answer: Това прави практически невъзможно унищожаването на всички копия на блокчейна.
wrong_answers:
  - Той определя цената на Bitcoin в различните региони.
  - Той влияе на скоростта на транзакциите Bitcoin.
  - Той определя броя на биткойните, които могат да бъдат добити в даден регион.
explanation: |
  Географското разпределение на възлите Bitcoin позволява
  е практически невъзможно да се унищожат всички копия на
  блокчейн. Тъй като възлите са разпръснати, е трудно да се
  физически да ги изземете всички.
reviewed: true
question: Koji je značaj geografske distribucije Bitkoin čvorova?
answer: To praktično onemogućava uništavanje svih kopija Blockchain-a.
wrong_answers:
  - Određuje cenu Bitkoina u različitim regionima.
  - To utiče na brzinu Bitkoin transakcija.
  - Određuje broj bitkoina koji se mogu iskopati u nekom regionu.
explanation: |
  Geografska distribucija Bitkoin čvorova čini
  praktično nemogućim uništavanje svih kopija
  Blockchain-a. Pošto su čvorovi rasprostranjeni, teško ih je
  fizički sve zapleniti.
reviewed: true

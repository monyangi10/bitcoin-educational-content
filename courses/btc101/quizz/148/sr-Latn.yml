question: Šta je Coinbase transakcija?
answer: Prva transakcija bloka koja uključuje nagradu rudaru.
wrong_answers:
  - Transakcija izvršena na menjačnici Coinbase.
  - Druga transakcija bloka koja uključuje najviše naknade.
  - Transakcija koju obavlja rudar nakon što primi nagradu.

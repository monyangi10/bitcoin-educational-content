question: Каква е една от възможните последици от неспазването на разпоредбите на вашата страна при закупуването на Bitcoin?
answer: Може да се изложите на риск.
wrong_answers:
  - Можете да увеличите цената на Bitcoin.
  - Можете да контролирате доставките на Bitcoin.
  - Възможно е да попречите на други да закупят Bitcoin.
explanation: |
  В текста на курса се споменава, че неспазването на разпоредбите
  на вашата страна при закупуване на Bitcoin може да ви изложи на риск.
reviewed: true
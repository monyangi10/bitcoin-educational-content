question: หนึ่งในผลกระทบที่อาจเกิดขึ้นจากการไม่ปฏิบัติตามกฎระเบียบของประเทศเมื่อซื้อ Bitcoin คืออะไร?
answer: คุณอาจทำให้ตัวเองตกอยู่ในความเสี่ยง
wrong_answers:
  - คุณอาจเพิ่มราคาของ Bitcoin ได้
  - คุณอาจควบคุมการจัดหา Bitcoin ได้
  - คุณอาจป้องกันไม่ให้ผู้อื่นซื้อ Bitcoin ได้
explanation: |
  ข้อความในหลักสูตรระบุว่าการไม่ปฏิบัติตามกฎระเบียบของประเทศของคุณเมื่อซื้อ Bitcoin อาจทำให้คุณเสี่ยงได้
reviewed: true
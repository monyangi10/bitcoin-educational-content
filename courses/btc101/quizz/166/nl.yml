question: Wat kunnen mijnwerkers doen voor de energiecentrales die nog niet op het net zijn aangesloten?
answer: Ze kunnen fungeren als koper in laatste instantie.
wrong_answers:
  - Ze kunnen elektriciteitscentrales van elektriciteit voorzien.
  - Ze kunnen energiecentrales aansluiten op het elektriciteitsnet.
  - Ze kunnen de prijs van elektriciteit reguleren.
explanation: |
  Mijnbouwers kunnen optreden als laatste koper voor energiecentrales die
  die nog niet zijn aangesloten op het elektriciteitsnet. Hierdoor kunnen energiecentrales
  financiering krijgen voordat ze worden aangesloten op het
  elektriciteitsnet.
reviewed: true
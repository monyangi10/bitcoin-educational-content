question: 특정 그룹에게 Bitcoin이 매력적인 이유 중 하나는 무엇인가요?
answer: Trustless 전자 현금, 검열에 대한 저항, 투명하고 불변하는 통화 정책과 같은 솔루션을 제공할 수 있습니다.
wrong_answers:
  - 위조하기 쉽고 클릭 한 번으로 더 많은 돈을 받을 수 있는 솔루션을 만들 수 있습니다.
  - 사용자에게 자본을 자유롭게 분배하는 중앙 기관에 의해 통제됩니다.
  - 익명이 아니므로 모든 사용자가 잘 알려져 있고 신뢰할 수 있습니다.

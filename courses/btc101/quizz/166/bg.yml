question: Коя е една от причините Bitcoin да е привлекателен за определени групи?
answer: Способността му да предлага решения като електронни пари без доверие, устойчивост на цензура или прозрачна и неизменна парична политика.
wrong_answers:
  - Лесно е да се фалшифицират и могат да се създават решения за получаване на повече пари с едно кликване.
  - Тя се контролира от централен орган, който свободно разпределя капитала между потребителите.
  - Тя не е псевдонимна, така че всеки потребител е добре познат и надежден.

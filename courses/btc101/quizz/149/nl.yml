question: Wat is de Lightning Network?
answer: Een instant Bitcoin betalingsnetwerk gebaseerd op de Bitcoin Blockchain.
wrong_answers:
  - Een gescheiden Blockchain netwerk van Bitcoin Blockchain.
  - Een netwerk van Bitcoin mijnwerkers.
  - Een netwerk van Bitcoin uitwisselingen.
explanation: |
  De Lightning Network is een instant Bitcoin betalingsnetwerk
  dat is gebaseerd op de Bitcoin Blockchain.
reviewed: true
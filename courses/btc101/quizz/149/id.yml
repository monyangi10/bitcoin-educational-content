question: Apa tujuan dari mining pool?
answer: Mining pool memungkinkan penambang untuk menggabungkan sumber daya komputasi mereka dan menerima imbalan yang lebih kecil tetapi lebih teratur.
wrong_answers:
  - Mining pool digunakan untuk meningkatkan HashRate dari keseluruhan jaringan Bitcoin.
  - Mining pool digunakan untuk mengurangi kesulitan penambangan.
  - Mining pool digunakan untuk meningkatkan imbalan penambangan.
explanation: >-
  Mining pool adalah kelompok penambang yang menggabungkan daya komputasi mereka
  untuk meningkatkan peluang mereka menambang blok. Dengan menggabungkan sumber daya mereka, mereka dapat
  menambang blok lebih sering dan menerima imbalan yang lebih kecil tetapi lebih teratur.
reviewed: true

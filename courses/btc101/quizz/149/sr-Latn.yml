question: Koja je svrha Mining pool-a (Rudarskog bazena)?
answer: Mining pools omogućavaju rudarima da udruže svoje računarske resurse i dobiju manje, ali redovnije nagrade.
wrong_answers:
  - Mining pools se koriste za povećanje Hashrate celokupne Bitkoin mreže.
  - Mining pools se koriste za smanjenje težine rudarenja.
  - Mining pools se koriste za povećanje nagrade za rudarenje.

question: Jaki jest cel pul wydobywczych?
answer: Pule wydobywcze pozwalają górnikom łączyć swoje zasoby obliczeniowe i otrzymywać mniejsze, ale bardziej regularne nagrody.
wrong_answers:
  - Pule wydobywcze są wykorzystywane do zwiększenia szybkości haszowania całej sieci Bitcoin.
  - Pule wydobywcze są używane w celu zmniejszenia trudności wydobycia.
  - Pule wydobywcze są wykorzystywane do zwiększenia nagrody za wydobycie.

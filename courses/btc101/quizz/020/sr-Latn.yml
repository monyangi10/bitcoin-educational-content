question: Zašto Bitkoin danas nije široko prihvaćen u trgovini?
answer: Zato što nije široko prihvaćen od strane pojedinaca.
wrong_answers:
  - Zato što nije prenosiv.
  - Zato što nije deljiv na male jedinice.
  - Zato što nije likvidan.
explanation: |
  Uprkos svojim svojstvima, kao što je strogo ograničena
  ponuda, Bitkoin još uvek nije široko prihvaćen u trgovini
  danas, zbog nedostatka usvajanja od strane pojedinaca, pa
  trgovci nisu podstaknuti da ga prihvate.
reviewed: true

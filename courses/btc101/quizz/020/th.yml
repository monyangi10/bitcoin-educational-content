question: ทำไม Bitcoin ถึงไม่ได้รับการยอมรับอย่างกว้างขวางในเชิงพาณิชย์ในปัจจุบัน?
answer: เพราะยังไม่ได้รับการยอมรับอย่างแพร่หลายจากบุคคลทั่วไป
wrong_answers:
  - เพราะว่ามันไม่สามารถขนย้ายได้
  - เพราะมันไม่สามารถแบ่งออกเป็นหน่วยย่อยได้
  - เพราะมันไม่ใช่ของเหลว
explanation: |
  แม้จะมีคุณสมบัติเช่นการมีจำนวนจำกัดอย่างเคร่งครัด แต่ Bitcoin ยังคงไม่ได้รับการยอมรับอย่างกว้างขวางในเชิงพาณิชย์ในปัจจุบัน เนื่องจากการขาดการยอมรับจากบุคคลทั่วไป ทำให้พ่อค้าไม่ถูกกระตุ้นให้ยอมรับมัน
reviewed: true
question: Защо Bitcoin не е широко разпространен в търговията днес?
answer: Тъй като не е широко разпространен сред хората.
wrong_answers:
  - Защото не може да се пренася.
  - Защото не се дели на малки единици.
  - Защото не е ликвиден.
explanation: |
  Въпреки свойствата му, като например строго ограничената
  предлагането, Bitcoin все още не е широко разпространен в търговията
  днес, поради липсата на приемане от страна на физически лица, така че
  търговците не се насърчават да го приемат.
reviewed: true

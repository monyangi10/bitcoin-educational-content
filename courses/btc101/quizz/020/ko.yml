question: 오늘날 커머스에서 Bitcoin이 널리 받아들여지지 않는 이유는 무엇인가요?
answer: 개인이 널리 채택하지 않기 때문입니다.
wrong_answers:
  - 운송이 불가능하기 때문입니다.
  - 작은 단위로 나눌 수 없기 때문입니다.
  - Liquid이 아니기 때문입니다.
explanation: |
  엄격하게 제한되어 있는
  Supply, Bitcoin는 여전히 상거래에서 널리 받아들여지지 않고 있습니다
  오늘날 개인이 채택하지 않아서
  판매자는 이를 받아들이는 것을 권장하지 않습니다.
reviewed: true
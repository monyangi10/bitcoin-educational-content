question: Кои са двете основни характеристики на Bitcoin?
answer: Bitcoin е едновременно компютърен протокол и парична единица.
wrong_answers:
  - Bitcoin е едновременно физическа валута и цифров портфейл.
  - Bitcoin е едновременно вид акция и вид облигация.
  - Bitcoin е едновременно централизирана и децентрализирана валута.
explanation: |
  Bitcoin е едновременно компютърен протокол, който използва технологии
  като криптография и блокчейн, а също и паричен
  единица, която се използва за транзакции.
reviewed: true

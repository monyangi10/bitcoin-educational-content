question: Jakie są dwie główne cechy Bitcoina?
answer: Bitcoin to zarówno protokół komputerowy jak i jednostka monetarna.
wrong_answers:
  - Bitcoin jest zarówno walutą fizyczną jak i portfelem cyfrowym.
  - Bitcoin jest zarówno rodzajem akcji jak i obligacji.
  - Bitcoin jest walutą zarówno scentralizowaną jak i zdecentralizowaną.
explanation: |
  Bitcoin jest zarówno protokołem komputerowym, który wykorzystuje
  technologie takie jak kryptografia i łańcuch bloków, a także jednostką monetarną
  która jest używana do transakcji.
reviewed: true

question: ลักษณะสำคัญสองประการของ Bitcoin คืออะไร?
answer: Bitcoin เป็นทั้งโปรโตคอลคอมพิวเตอร์และหน่วยเงินตรา
wrong_answers:
  - Bitcoin เป็นทั้งสกุลเงินทางกายภาพและ wallet ดิจิทัล
  - Bitcoin เป็นทั้งประเภทของหุ้นและประเภทของพันธบัตร
  - Bitcoin เป็นทั้งสกุลเงินแบบรวมศูนย์และแบบกระจายศูนย์
explanation: |
  Bitcoin เป็นทั้งโปรโตคอลคอมพิวเตอร์ที่ใช้เทคโนโลยี
  เช่น การเข้ารหัสและบล็อกเชน และยังเป็นหน่วยเงิน
  ที่ใช้สำหรับการทำธุรกรรม
reviewed: true
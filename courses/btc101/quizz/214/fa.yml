question: کدام‌یک از این عملیات‌ها در لایتنینگ به‌صورت آن‌چین ثبت می‌شود؟
answer: باز کردن کانال
wrong_answers:
  - پرداخت واسطه‌ای
  - به‌روزرسانی وضعیت
  - مسیریابی چندپرشی
explanation: |
  تنها باز کردن و بستن یک کانال لایتنینگ معادل تراکنش‌های بیت‌کوین هستند که روی بلاکچین منتشر می‌شوند.
reviewed: false

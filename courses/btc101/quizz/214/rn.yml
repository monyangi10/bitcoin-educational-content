question: None Lightning Network ni iki?
answer: Igikoresho co kwishura gikoresha umurongo wa Bitcoin kugira ngo bishobore gutanga amafaranga vyihuta nk’umuravyo.
wrong_answers:
  - Ubwoko bushasha bw’amahera y’ibanga.
  - Ikoranabuhanga rishasha rya Blockchain rizosubirira Bitcoin muri kazoza.
  - Uburyo bwo gukora Mining Bitcoin.
explanation: |
  Lightning Network ni urubuga rwo kwishura rukoresha
  Bitcoin protocole kugira ngo bishobore gukora amafaranga yihuta. Si
  amafaranga y’ibanga atandukanye, canke uburyo bwo gukoresha Mining Bitcoin.
reviewed: true
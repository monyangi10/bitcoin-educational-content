question: මෙම Lightning මෙහෙයුම්වලින් කුමක් onchain ලෙස ලියාපදිංචි වේද?
answer: නාලිකාව විවෘත කිරීම
wrong_answers:
  - අතරමැදි ගෙවීම
  - තත්ත්ව යාවත්කාලීන කිරීම
  - බහු-හෝප් මාර්ගගත කිරීම
explanation: |
  Lightning නාලිකාවක් විවෘත කිරීම හා වසා දැමීම පමණක් බ්ලොක්චේන් මත ප්‍රකාශයට පත් කරන Bitcoin ගනුදෙනු වලට සමාන වේ.
reviewed: false

question: Šta je Lightning mreža?
answer: Mreža plaćanja koja koristi Bitkoin protokol za omogućavanje munjevito brzih transakcija.
wrong_answers:
  - Nova vrsta kriptovalute.
  - Nova Blockchain tehnologija koja će u budućnosti zameniti Bitkoin.
  - Metoda za rudarenje Bitkoina.
explanation: |
  Lightning mreža je mreža za plaćanje koja koristi
  Bitkoin protokol za omogućavanje brzih transakcija. To nije
  posebna kriptovaluta, niti metoda za rudarenje Bitkoina.
reviewed: true

question: Коя от тези операции в Lightning се записва ончейн?
answer: Отваряне на канал
wrong_answers:
  - Междинно плащане
  - Актуализация на състоянието
  - Маршрутизиране с множество скокове
explanation: |
  Само отварянето и затварянето на Lightning канал съответстват на Bitcoin транзакции, публикувани в блокчейна.
reviewed: false

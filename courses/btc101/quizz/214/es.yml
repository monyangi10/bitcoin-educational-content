question: ¿Cuál de estas operaciones en Lightning se registra onchain?
answer: Apertura de canal
wrong_answers:
  - Pago intermedio
  - Actualización de estado
  - Enrutamiento de múltiples saltos
explanation: |
  Solo la apertura y el cierre de un canal Lightning corresponden a transacciones de Bitcoin publicadas en la blockchain.
reviewed: false

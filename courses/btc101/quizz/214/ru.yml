question: Какая из этих операций в Lightning записывается ончейн?
answer: Открытие канала
wrong_answers:
  - Промежуточный платеж
  - Обновление состояния
  - Маршрутизация с несколькими переходами
explanation: |
  Только открытие и закрытие канала Lightning соответствуют транзакциям Bitcoin, публикуемым в блокчейне.
reviewed: false

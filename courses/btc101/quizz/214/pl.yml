question: Czym jest sieć Lightning?
answer: Siecią płatności, która wykorzystuje protokół Bitcoin, aby umożliwiać błyskawiczne transakcje.
wrong_answers:
  - Nowym rodzajem kryptowaluty.
  - Nową technologią łańcucha bloków, która w przyszłości zastąpi Bitcoina.
  - Metodą wydobywania bitcoinów.
explanation: |
  Sieć Lightning to sieć płatności wykorzystująca protokół
  Bitcoin, aby umożliwiać szybkie transakcje. Nie jest
  oddzielną kryptowalutą ani metodą wydobywania bitcoinów.
reviewed: true

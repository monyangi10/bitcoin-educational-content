question: Która z tych operacji w Lightning jest rejestrowana onchain?
answer: Otwarcie kanału
wrong_answers:
  - Płatność pośrednia
  - Aktualizacja stanu
  - Routing wieloskokowy
explanation: |
  Tylko otwarcie i zamknięcie kanału Lightning odpowiadają transakcjom Bitcoin publikowanym w blockchainie.
reviewed: false

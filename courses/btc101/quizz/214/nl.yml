question: Wat is de Lightning Network?
answer: Een betaalnetwerk dat het Bitcoin protocol gebruikt om razendsnelle transacties mogelijk te maken.
wrong_answers:
  - Een nieuw type cryptocurrency.
  - Een nieuwe Blockchain technologie die in de toekomst Bitcoin zal vervangen.
  - Een methode voor Mining Bitcoin.
explanation: |
  De Lightning Network is een betaalnetwerk dat gebruik maakt van het
  Bitcoin protocol gebruikt om snelle transacties mogelijk te maken. Het is geen
  aparte cryptocurrency, noch een methode voor Mining Bitcoin.
reviewed: true
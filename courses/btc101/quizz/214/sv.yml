question: Vad är Lightning Network?
answer: Ett betalningsnätverk som använder Bitcoin-protokollet för att möjliggöra blixtsnabba transaktioner.
wrong_answers:
  - En ny typ av kryptovaluta.
  - En ny Blockchain-teknik som kommer att ersätta Bitcoin i framtiden.
  - En metod för Mining Bitcoin.
explanation: |
  Lightning Network är ett betalningsnätverk som använder sig av
  Bitcoin-protokollet för att möjliggöra snabba transaktioner. Det är inte en
  separat kryptovaluta och inte heller en metod för Mining Bitcoin.
reviewed: true
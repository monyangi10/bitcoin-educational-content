question: Bu derse göre Bitcoin devriminin ana hedefi nedir?
answer: İnsan egemenliğinin bir hak olduğu, mahremiyete varsayılan olarak saygı duyulduğu ve paranın manipüle edilmediği bir dünya yaratmak.
wrong_answers:
  - Mahremiyetin bir insan hakkı olmadığı ve paranın bankalar tarafından manipüle edildiği bir dünya yaratmak.
  - Hükümetlerin gücünün olmadığı ve toplumun kaotik olduğu bir dünya yaratmak.
  - Fiziksel paranın geçersiz olduğu bir dünya yaratmak.
explanation: |
  Bu kurs metni, Bitcoin'in ana hedefinin
  devrim, insan egemenliğinin olduğu bir dünya yaratmaktır
  bir haktır, mahremiyete varsayılan olarak saygı gösterilir ve para
  manipüle edildi.
reviewed: true
question: เป้าหมายหลักของการปฏิวัติ Bitcoin ตามหลักสูตรนี้คืออะไร?
answer: สร้างโลกที่อธิปไตยของมนุษย์เป็นสิทธิ์ ความเป็นส่วนตัวได้รับการเคารพโดยปริยาย และเงินไม่ถูกบิดเบือน
wrong_answers:
  - การสร้างโลกที่ความเป็นส่วนตัวไม่ใช่สิทธิมนุษยชน และเงินถูกควบคุมโดยธนาคาร
  - สร้างโลกที่รัฐบาลไม่มีอำนาจ และสังคมเต็มไปด้วยความวุ่นวาย
  - สร้างโลกที่เงินสดกลายเป็นสิ่งล้าสมัย
explanation: |
  ข้อความในหลักสูตรนี้แนะนำว่าเป้าหมายหลักของการปฏิวัติ Bitcoin คือการสร้างโลกที่อธิปไตยของมนุษย์เป็นสิทธิ ความเป็นส่วนตัวได้รับการเคารพโดยปริยาย และเงินไม่ถูกบิดเบือน
reviewed: true
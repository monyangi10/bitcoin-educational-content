question: Каква е основната цел на революцията Bitcoin според този курс?
answer: Създаване на свят, в който човешкият суверенитет е право, неприкосновеността на личния живот се зачита по подразбиране, а парите не се манипулират.
wrong_answers:
  - Създаване на свят, в който неприкосновеността на личния живот не е човешко право, а парите се манипулират от банките.
  - Създаване на свят, в който правителствата нямат власт, а обществото е хаотично.
  - Създаване на свят, в който физическите пари са отживелица.
explanation: |
  Този учебен текст предполага, че основната цел на Bitcoin
  е да се създаде свят, в който човешкият суверенитет е
  право, неприкосновеността на личния живот се зачита по подразбиране, а парите не са
  манипулират.
reviewed: true
question: 이 과정에 따르면 Bitcoin 혁명의 주요 목표는 무엇인가요?
answer: 인간의 주권이 권리이고, 프라이버시가 기본적으로 존중되며, 돈이 조작되지 않는 세상을 만들기 위해 노력합니다.
wrong_answers:
  - 프라이버시가 인권이 아니며 은행에 의해 돈이 조작되는 세상을 만들겠습니다.
  - 정부가 힘이 없고 사회가 혼란스러운 세상을 만들 수 있습니다.
  - 실물 화폐가 필요 없는 세상 만들기.
explanation: |
  이 강의 텍스트는 Bitcoin
  혁명의 주요 목표는 인간의 주권이 권리이고
  권리이고, 프라이버시가 기본적으로 존중되며, 돈이
  조작되지 않는 세상을 만드는 것입니다.
reviewed: true
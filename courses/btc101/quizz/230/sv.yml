question: Hur kan Lightning Network potentiellt förändra de befintliga affärsmodellerna inom videospelsbranschen?
answer: Det gör att spelarna kan satsa mycket små belopp när de spelar spel.
wrong_answers:
  - Det gör det möjligt för spelare att bryta Bitcoin samtidigt som de spelar spel.
  - Det gör det möjligt för spelutvecklare att acceptera Bitcoin som betalning för sina spel.
  - Det gör det möjligt för spelare att köpa föremål i spelet med Bitcoin.

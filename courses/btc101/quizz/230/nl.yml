question: Wat maakt de Lightning Network mogelijk?
answer: Om transacties uit te voeren tussen individuen die geen directe kanaalverbinding hebben.
wrong_answers:
  - Alleen directe kanaalverbindingen maken met gecentraliseerde centrales.
  - Kanaalverbindingen maken die meerdere bevestigingen vereisen voor elke transactie.
  - Om directe kanaalverbindingen tot stand te brengen die beperkt zijn tot grote transacties.
explanation: |
  De Lightning Network maakt het mogelijk om transacties uit te voeren tussen
  personen die geen directe kanaalverbinding hebben.
reviewed: true
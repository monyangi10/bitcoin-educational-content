question: Co oznacza brak frazy mnemonicznej w portfelu?
answer: Wskazuje to, że portfel nie jest bezpieczny do długoterminowego przechowywania bitcoinów.
wrong_answers:
  - Oznacza to, że portfel jest w pełni bezpieczny i nie wymaga tworzenia kopii zapasowych.
  - Oznacza to, że portfel może przechowywać wiele różnych obligacji.
  - Sugeruje to, że kopia zapasowa portfela jest automatycznie utworzona przez urządzenie.
explanation: |
  Brak listy 12 lub 24 słów, czyli frazy mnemonicznej, w portfelu powinien ostrzegać, że portfel nie jest bezpieczny, ponieważ nie jest zgodny ze standardowymi procedurami tworzenia kopii zapasowych.
reviewed: true

question: Какво показва липсата на мнемонична фраза в портфейл?
answer: Това показва, че портфейлът не е сигурен за дългосрочно съхранение на Bitcoin.
wrong_answers:
  - Това показва, че портфейлът е напълно защитен и не се нуждае от архивиране.
  - Това означава, че портфейлът може да съдържа много различни връзки.
  - Това предполага, че портфейлът се архивира автоматично от вашето устройство.
explanation: |
  Липсата на списък от 12 или 24 думи трябва да ви предупреди, че
  портфейлът не е сигурен, тъй като не следва стандартните правила за архивиране
  процедури.
reviewed: true

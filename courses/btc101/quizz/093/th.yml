question: การไม่มีวลีช่วยจำใน wallet บ่งบอกถึงอะไร?
answer: มันบ่งชี้ว่า wallet ไม่ปลอดภัยสำหรับการเก็บรักษา Bitcoin ในระยะยาว
wrong_answers:
  - มันบ่งชี้ว่า wallet ปลอดภัยอย่างสมบูรณ์และไม่ต้องการการสำรองข้อมูลใด ๆ
  - มันหมายความว่า wallet สามารถถือพันธบัตรที่หลากหลายได้
  - มันแสดงให้เห็นว่า wallet ได้รับการสำรองข้อมูลโดยอัตโนมัติโดยอุปกรณ์ของคุณ
explanation: |
  การไม่มีรายการคำ 12 หรือ 24 คำ ซึ่งก็คือวลีช่วยจำ ใน wallet ควรเตือนคุณว่า wallet ไม่ปลอดภัยเนื่องจากไม่ได้ปฏิบัติตามขั้นตอนการสำรองข้อมูลมาตรฐาน
reviewed: true
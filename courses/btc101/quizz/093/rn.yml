question: None iyo ata n’ijambo Mnemonic riri muri Wallet vyerekana iki?
answer: Birerekana ko Wallet idashobora kubika igihe kirekire Bitcoin.
wrong_answers:
  - Birerekana ko Wallet itekanye neza kandi ko idasaba ko umuntu agira ico akora.
  - Bisigura ko Wallet ishobora gufata amabondi menshi atandukanye.
  - Birasabwa ko Wallet ihita igira backup n’igikoresho cawe.
explanation: |
  Kubura urutonde rw’amajambo 12 canke 24, ni ukuvuga .
  Ijambo Mnemonic, muri Wallet rikwiye kukumenyesha ko
  Wallet ntitekanye kuko idakurikiza ububiko busanzwe
  uburyo bwo kubikora.
reviewed: true
question: Šta odsustvo fraze Mnemonic u novčaniku ukazuje?
answer: To ukazuje da novčanik nije siguran za dugotrajno skladištenje Bitkoina.
wrong_answers:
  - To ukazuje da je novčanik potpuno siguran i da ne zahteva nikakvu rezervnu kopiju.
  - To znači da novčanik može držati mnoge različite veze.
  - Predlaže da je novčanik automatski podržan od strane vašeg uređaja.
explanation: |
  Odsustvo liste od 12 ili 24 reči, to jest
  Mnemonic fraze, u novčaniku treba da vas upozori da
  novčanik nije siguran jer ne prati standardne procedure
  bekapa.
reviewed: true

question: Šta je BitcoinTalk?
answer: Mesto za diskusiju za korisnike Bitkoina.
wrong_answers:
  - Bitcoin softver za rudarenje.
  - Bitcoin novčanik.
  - Bitcoin Konferencija.
explanation: |
  BitcoinTalk forum je mesto za diskusiju za Bitkoin korisnike. Kreirao ga je Satoshi Nakamoto 22. novembra 2009.
reviewed: true

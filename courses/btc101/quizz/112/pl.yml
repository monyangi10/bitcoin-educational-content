question: Czym jest BitcoinTalk?
answer: Miejscem dyskusji dla użytkowników Bitcoina.
wrong_answers:
  - Oprogramowaniem do wydobywania Bitcoina.
  - Portfelem Bitcoin.
  - Konferencją Bitcoin.
explanation: |
  Forum BitcoinTalk jest miejscem dyskusji dla użytkowników Bitcoina. Zostało stworzone przez Satoshiego Nakamoto 22 listopada,
  2009.
reviewed: true

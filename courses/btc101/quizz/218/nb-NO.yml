question: Hvorfor kan en Lightning-kanal være ubrukelig i én retning?
answer: Ikke nok likviditet
wrong_answers:
  - For ny blokk
  - Utgått HTLC
  - Ikke-synkronisert node
explanation: |
  Selv med stor kapasitet tillater en kanal kun en betaling hvis tilstrekkelig likviditet er på riktig side.

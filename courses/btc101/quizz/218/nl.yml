question: Wat is de aard van Bitcoin's adoptie zoals beschreven in deze cursus?
answer: Viraal.
wrong_answers:
  - Langzaam en gestaag.
  - Snel en oncontroleerbaar.
  - Sporadisch en onvoorspelbaar.
explanation: |
  De cursustekst beschrijft de adoptie van Bitcoin als viraal,
  wat suggereert dat het zich snel en wijd verspreidt van de ene
  van de ene persoon op de andere, net als een virus, maar dan een goede.
reviewed: true
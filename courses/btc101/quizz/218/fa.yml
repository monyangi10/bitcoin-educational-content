question: چرا یک کانال لایتنینگ می‌تواند در یک جهت غیرقابل استفاده باشد؟
answer: نقدینگی ناکافی
wrong_answers:
  - بلاک بسیار جدید
  - HTLC منقضی‌شده
  - نود همگام‌نشده
explanation: |
  حتی با ظرفیت بالا، یک کانال تنها زمانی پرداخت را ممکن می‌کند که نقدینگی کافی در سمت درست قرار داشته باشد.
reviewed: false

question: ทำไมช่องทาง Lightning ถึงไม่สามารถใช้งานได้ในทิศทางเดียว?
answer: สภาพคล่องไม่เพียงพอ
wrong_answers:
  - บล็อกใหม่เกินไป
  - หมดอายุ HTLC
  - โหนดที่ไม่ซิงโครไนซ์
explanation: |
  แม้ว่าจะมีความจุขนาดใหญ่ ช่องทางจะอนุญาตให้ชำระเงินได้ก็ต่อเมื่อมีสภาพคล่องเพียงพออยู่ด้านที่ถูกต้องเท่านั้น

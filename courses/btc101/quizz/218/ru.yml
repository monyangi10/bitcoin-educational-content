question: Почему канал Lightning может быть непригоден для использования в одном направлении?
answer: Недостаточная ликвидность
wrong_answers:
  - Слишком новый блок
  - Истекший HTLC
  - Несинхронизированный узел
explanation: |
  Даже при большой ёмкости канал позволяет платёж только при наличии достаточной ликвидности на правильной стороне.

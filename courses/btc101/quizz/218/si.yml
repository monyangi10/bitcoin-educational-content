question: Lightning නාලිකාවක් එක් දිශාවක භාවිතා කළ නොහැකි විය හැක්කේ ඇයි?
answer: ප්‍රමාණවත් ද්‍රවශීලතාව නොමැතිවීම
wrong_answers:
  - ඉතා නව බ්ලොක් එකක්
  - කල් ඉකුත් වූ HTLC
  - සමකාලීන නොවූ නෝඩයක්
explanation: |
  විශාල ධාරිතාවක් තිබුණද, නිවැරදි පැත්තේ ප්‍රමාණවත් ද්‍රවශීලතාවක් තිබේ නම් පමණක් නාලිකාව ගෙවීමක් සක්‍රීය කරයි.
reviewed: false

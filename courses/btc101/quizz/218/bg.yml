question: Защо Lightning канал може да бъде неизползваем в една посока?
answer: Недостатъчна ликвидност
wrong_answers:
  - Твърде скорошен блок
  - Изтекъл HTLC
  - Несинхронизиран възел
explanation: |
  Дори при голям капацитет, каналът позволява плащане само ако достатъчно ликвидност се намира от правилната страна.
reviewed: false

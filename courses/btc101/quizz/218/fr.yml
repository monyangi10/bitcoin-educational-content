question: Pourquoi un canal Lightning peut-il être inutilisable dans un sens ?
answer: Pas assez de liquidité
wrong_answers:
  - Bloc trop récent
  - HTLC expiré
  - Nœud non synchronisé
explanation: |
  Même avec une grande capacité, un canal ne permet un paiement que si suffisament de liquidité se trouve du bon côté.

question: Yapay zeka teknolojilerinin ilerlemesinin potansiyel sonuçlarından biri nedir?
answer: Yapay zeka teknolojileri, günümüz işlerinin %80'inden fazlasının ortadan kalkmasına yol açacaktır.
wrong_answers:
  - Yapay zeka teknolojileri tüm bilgisayarları yok edecek.
  - Yapay zeka teknolojileri insan zekasının azalmasına yol açacaktır.
  - Yapay zeka teknolojileri küresel bir ekonomik çöküşe neden olacak.

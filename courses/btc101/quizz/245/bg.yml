question: Кое е едно от основните предимства на Bitcoin за хора без банкова сметка?
answer: Bitcoin дава възможност за равнопоставеност при трансакциите, независимо от социалния ви статус или политическата ви позиция.
wrong_answers:
  - Bitcoin дава възможност за неравнопоставеност при трансакциите, като възнаграждава най-богатите потребители.
  - Bitcoin облагодетелства само хората с банкова сметка и лява политическа позиция.
  - Bitcoin облагодетелства само хора с висок социален статус.
explanation: |
  В текста се споменава, че в света живеят 2,4 милиарда души
  по света нямат банкова сметка, а Bitcoin дава възможност за
  равнопоставеност при транзакциите, независимо от социалния им статус
  или политическа позиция.
reviewed: true
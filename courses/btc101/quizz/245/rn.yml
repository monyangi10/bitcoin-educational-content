question: Ni ikihe ciza kimwe mu vyiza nyamukuru vya Bitcoin ku bantu batagira konti muri banki?
answer: Bitcoin iremeza ko umuntu angana mu bikorwa, ataravye ikibanza ufise mu kibano canke ikibanza ufise mu vya politike.
wrong_answers:
  - Bitcoin iremeza ubusumbane mu bikorwa, mu guhemba abakoresha batunze kuruta abandi bose.
  - Bitcoin ifasha gusa abantu bafise konti muri banki n’ikibanza ca politike c’ubumotsi.
  - Bitcoin ifasha gusa abantu bafise ikibanza kinini mu kibano.

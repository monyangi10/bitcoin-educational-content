question: 은행 계좌가 없는 분들을 위한 Bitcoin의 주요 혜택은 무엇인가요?
answer: Bitcoin은 사회적 지위나 정치적 입장에 관계없이 평등한 거래를 허용합니다.
wrong_answers:
  - Bitcoin는 가장 부유한 사용자에게 보상을 제공함으로써 거래의 불평등을 허용합니다.
  - Bitcoin는 은행 계좌가 있고 좌파 성향의 정치적 입장을 가진 사람에게만 혜택을 제공합니다.
  - Bitcoin는 사회적 지위가 높은 사람에게만 혜택이 주어집니다.
explanation: |
  텍스트에는 전 세계에 24억 명의 사람들이 은행 계좌가 없다고 언급되어 있습니다
  은행 계좌가없는 세계, 그리고 Bitcoin는 다음을 허용합니다
  사회적 지위나 정치적 위치에 관계없이
  평등하게 거래할 수 있습니다.
reviewed: true
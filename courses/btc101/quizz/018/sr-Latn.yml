question: Koja je glavna prednost Bitkoina u odnosu na druge oblike valute?
answer: Nudi odličnu vrednost zbog strogo ograničene ponude i neutralnosti.
wrong_answers:
  - To je nedeljivo i ne može se preneti.
  - To je odličan primer valute koja trpi monetarnu inflaciju.
  - To je široko prihvaćeno u trgovini od strane svih trgovaca na svetu.
explanation: |
  Glavna prednost Bitkoina u odnosu na druge oblike valute
  je što nudi odličnu čuvanje vrednosti zahvaljujući svojoj
  strogo ograničenoj ponudi i nedostatku poverljive strane. Ovo
  ga čini dobrim izborom za dugoročne uštede.
reviewed: true

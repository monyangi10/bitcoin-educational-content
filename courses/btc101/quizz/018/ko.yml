question: 다른 형태의 화폐에 비해 Bitcoin의 주요 장점은 무엇인가요?
answer: 엄격하게 제한된 Supply과 중립성으로 인해 뛰어난 가치 저장 공간을 제공합니다.
wrong_answers:
  - 분할할 수 없고 휴대가 불가능합니다.
  - 통화 인플레이션을 겪는 화폐의 좋은 예입니다.
  - 전 세계 모든 판매자가 상거래에서 널리 사용하고 있습니다.
explanation: |
  다른 형태의 화폐에 비해 Bitcoin의 가장 큰 장점은
  가치 저장에 탁월하다는 점입니다
  엄격하게 제한된 Supply와 신뢰할 수 있는 당사자가 없다는 것입니다. 이는
  장기 저축을 위한 좋은 선택입니다.
reviewed: true
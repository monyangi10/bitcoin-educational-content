question: Кое е основното предимство на Bitcoin пред другите форми на валута?
answer: Той е отлично средство за съхранение на стойност поради строго ограниченото си предлагане и неутралността си.
wrong_answers:
  - Тя е неделима и не може да се пренася.
  - Това е чудесен пример за валута, която страда от парична инфлация.
  - Той е широко разпространен в търговията от всички търговци в света.
explanation: |
  Основното предимство на Bitcoin пред другите форми на валута
  е, че тя предлага отлично съхранение на стойност поради своята
  строго ограниченото предлагане и липсата на доверена страна. Този
  я прави добър избор за дългосрочни спестявания.
reviewed: true
question: ข้อได้เปรียบหลักของ Bitcoin เหนือกว่าสกุลเงินรูปแบบอื่นคืออะไร?
answer: มันเสนอแหล่งเก็บมูลค่าที่ยอดเยี่ยมเนื่องจากมีอุปทานที่จำกัดอย่างเคร่งครัดและความเป็นกลาง
wrong_answers:
  - มันไม่สามารถแบ่งแยกและไม่สามารถเคลื่อนย้ายได้
  - มันเป็นตัวอย่างที่ดีของสกุลเงินที่ประสบภาวะเงินเฟ้อทางการเงิน
  - เป็นที่ยอมรับอย่างกว้างขวางในวงการพาณิชย์โดยพ่อค้าทุกคนทั่วโลก
explanation: |
  ข้อได้เปรียบหลักของ Bitcoin เหนือกว่าสกุลเงินรูปแบบอื่น ๆ
  คือมันมีคุณสมบัติในการเก็บรักษามูลค่าที่ดีเยี่ยมเนื่องจาก
  มีการจำกัดปริมาณอย่างเข้มงวดและไม่มีบุคคลที่ต้องเชื่อถือ
  ทำให้มันเป็นตัวเลือกที่ดีสำหรับการออมระยะยาว
reviewed: true
question: Jaka jest główna przewaga Bitcoina nad innymi formami waluty?
answer: Oferuje doskonały magazyn wartości ze względu na ściśle ograniczoną podaż i neutralność.
wrong_answers:
  - Jest niepodzielny i nieprzenośny.
  - Jest to świetny przykład waluty, która cierpi z powodu inflacji monetarnej.
  - Jest on powszechnie akceptowany w handlu przez wszystkich kupców na świecie.
explanation: |
  Główną zaletą Bitcoina w porównaniu z innymi formami waluty
  jest to, że oferuje doskonały środek przechowywania wartości ze względu na jego
  ściśle ograniczoną podaż i brak zaufanej strony. To
  sprawia, że jest to dobry wybór dla oszczędności długoterminowych.
reviewed: true

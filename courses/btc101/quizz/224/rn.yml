question: Ni igihe kingana iki hagati y’uguhingura amabuye abiri muri porotokole ya Bitcoin?
answer: Iminota 10.
wrong_answers:
  - Iminota 5.
  - Iminota 15.
  - Iminota 20.
explanation: |
  Igihe gisanzwe kiri hagati y’iremwa ry’ibintu bibiri .
  amabuye mu porotokole ya Bitcoin ni iminota 10.
reviewed: true
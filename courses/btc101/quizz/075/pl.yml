question: Jaka technologia jest używana do bezpiecznego wydawania środków za pomocą portfela Bitcoin?
answer: Kryptografia krzywych eliptycznych.
wrong_answers:
  - Kryptografia symetryczna.
  - Kryptografia kwantowa.
  - Kryptografia RSA.
explanation: |
  Wydawanie bitcoinów wymaga od właściciela użycia algorytmu krzywej eliptycznej podpisu cyfrowego (ECDSA) do sfałszowania podpisu
  w celu propagacji transakcji Bitcoin.
reviewed: true

question: Koja je tehnologija koja se koristi za sigurno trošenje sredstava koristeći Bitkoin novčanik?
answer: Kriptografija eliptičkih krivih.
wrong_answers:
  - Simetrična kriptografija.
  - Kvantna kriptografija.
  - RSA kriptografija.
explanation: |
  Trošenje Bitkoina zahteva od vlasnika da koristi Elliptic Curve Digital Signature Algorithm (ECDSA) kako bi stvorio potpis za propagaciju Bitkoin transakcije.
reviewed: true

question: Каква е технологията, която се използва за сигурно изразходване на средства с помощта на Bitcoin портфейл?
answer: Криптография с елиптична крива.
wrong_answers:
  - Симетрична криптография.
  - Квантова криптография.
  - Криптография RSA.
explanation: |
  Изразходването на биткойни изисква от собственика да използва елиптична крива
  (ECDSA) за подправяне на подпис
  за разпространение на транзакция Bitcoin.
reviewed: true

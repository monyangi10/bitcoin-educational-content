question: Wat is de Mnemonic zin in een Bitcoin Wallet?
answer: Een lijst van 12 of 24 woorden waarmee je toegang krijgt tot je bitcoins.
wrong_answers:
  - Een gekozen wachtwoord voor toegang tot Bitcoin Wallet.
  - Een code om Bitcoin transacties te versleutelen.
  - Een geheime herstelzin die de Bitcoin Wallet vernietigt in geval van nood.
explanation: |
  Sinds 2017 kan de privésleutel gecodeerd worden in een eenvoudige lijst
  van 12 of 24 woorden, de Mnemonic-zin genoemd. Deze zin
  is een back-up van je Bitcoin Wallet, dus het stelt je in staat om
  toegang tot je bitcoins met elke Bitcoin Wallet
  software/app te gebruiken.
reviewed: true
question: Какво могат да направят миньорите за онези електроцентрали, които все още не са свързани към мрежата?
answer: Те могат да действат като купувач от последна инстанция.
wrong_answers:
  - Те могат да захранват електроцентралите с електроенергия.
  - Те могат да свързват електроцентрали към мрежата.
  - Те могат да регулират цената на електроенергията.
explanation: |
  Миньорите могат да действат като купувач от последна инстанция за електроцентрали, които
  които все още не са свързани към мрежата. Това позволява на електроцентралите
  да си осигурят финансиране още преди да бъдат свързани към мрежата
  електрическата мрежа.
reviewed: true
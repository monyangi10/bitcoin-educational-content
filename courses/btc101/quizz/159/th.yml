question: นักขุดสามารถทำอะไรได้บ้างสำหรับโรงไฟฟ้าที่ไม่ได้เชื่อมต่อกับกริด?
answer: พวกเขาสามารถทำหน้าที่เป็นผู้ซื้อทางเลือกสุดท้ายได้
wrong_answers:
  - พวกเขาสามารถจัดหาไฟฟ้าให้กับโรงไฟฟ้าได้
  - พวกเขาสามารถเชื่อมต่อโรงไฟฟ้ากับกริดได้
  - พวกเขาสามารถควบคุมราคาของไฟฟ้าได้
explanation: |
  คนขุดเหมืองสามารถทำหน้าที่เป็นผู้ซื้อทางเลือกสุดท้ายสำหรับโรงไฟฟ้าที่
  ยังไม่ได้เชื่อมต่อกับโครงข่ายไฟฟ้า ซึ่งช่วยให้โรงไฟฟ้า
  สามารถจัดหาเงินทุนได้แม้จะยังไม่ได้เชื่อมต่อกับ
  เครือข่ายไฟฟ้า
reviewed: true
question: Bitcoin Mining'de enerji harcamasının önemi nedir?
answer: Bilgiyi üretmek için enerji harcanması gerekir, ancak bilginin doğrulanması ihmal edilebilir bir maliyete sahiptir. Bu asimetri ağın güvenliğini garanti eder.
wrong_answers:
  - Mining'de kullanılan ASIC makinelerine güç sağlamak için enerji maliyeti gereklidir ve bilgilerin doğrulanmasının yüksek bir maliyeti vardır.
  - Bitcoin ağının bakımı için enerji harcaması gereklidir ve bilgilerin doğrulanmasının değişken maliyetleri vardır.
  - Yeni bitcoinler yaratmak için enerji maliyetine gerek yoktur.

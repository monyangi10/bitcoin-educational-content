question: Co górnicy mogą zrobić dla elektrowni, które nie są jeszcze podłączone do sieci?
answer: Mogą kupować energię zanim elektrownia jest podłączona do sieci.
wrong_answers:
  - Mogą dostarczać energię elektryczną do elektrowni.
  - Mogą podłączać elektrownie do sieci.
  - Mogą regulować cenę energii elektrycznej.
explanation: |
  Górnicy mogą działać jako ostateczny nabywca dla elektrowni, które
  nie są jeszcze podłączone do sieci. Pozwala to elektrowniom
  zabezpieczyć finansowanie jeszcze przed podłączeniem do
  sieci elektrycznej.
reviewed: true

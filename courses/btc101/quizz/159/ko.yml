question: 아직 전력망에 연결되지 않은 발전소를 위해 채굴자가 할 수 있는 일은 무엇일까요?
answer: 최후의 수단으로 구매자의 역할을 할 수 있습니다.
wrong_answers:
  - 발전소에 전기를 공급할 수 있습니다.
  - 발전소를 전력망에 연결할 수 있습니다.
  - 전기 가격을 규제할 수 있습니다.
explanation: |
  채굴자는 아직 전력망에 연결되지 않은 발전소의 최후의 구매자 역할을 할 수 있습니다
  최후의 구매자가 될 수 있습니다. 이를 통해 발전소는
  전력망에 연결되기 전에도 자금을 확보할 수 있습니다
  자금을 확보할 수 있습니다.
reviewed: true
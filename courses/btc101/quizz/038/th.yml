question: คุณลักษณะสำคัญของ Bitcoin ที่ทำให้แตกต่างจากสกุลเงินเฟียตคืออะไร?
answer: นโยบายการเงินของมันถูกบังคับใช้โดยฉันทามติทั่วไป
wrong_answers:
  - มันสามารถพิมพ์ได้ในปริมาณไม่จำกัดโดยธนาคารกลาง
  - มันได้รับการสนับสนุนโดยสินค้าโภคภัณฑ์ทางกายภาพเช่นทองคำหรือเงิน
  - มันถูกควบคุมโดยธนาคารกลาง
explanation: |
  เนื่องจากลักษณะที่เป็นการกระจายศูนย์และการเข้ารหัสของมัน Bitcoin ไม่สามารถถูกปลอมแปลงได้และถูกจำกัดไว้ที่ 21 ล้านหน่วย นี่เป็นคุณสมบัติสำคัญที่ทำให้มันแตกต่างจากสกุลเงินเฟียต ซึ่งปฏิบัติตามนโยบายการเงินที่สามารถเปลี่ยนแปลงได้โดยธนาคารกลาง
reviewed: true
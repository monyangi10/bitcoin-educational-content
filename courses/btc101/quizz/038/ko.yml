question: 법정화폐와 차별화되는 Bitcoin의 주요 특징은 무엇인가요?
answer: 통화 정책은 일반적인 합의에 의해 시행됩니다.
wrong_answers:
  - 중앙 은행에서 수량에 제한 없이 인쇄할 수 있습니다.
  - 금이나 은과 같은 실물 상품으로 뒷받침됩니다.
  - 중앙 은행의 규제를 받습니다.
explanation: |
  탈중앙화되고 암호화되어 있기 때문입니다,
  Bitcoin은 위조가 불가능하며 2,100만 개로 제한됩니다
  단위로 제한됩니다. 이는 통화 정책을 따르는 법정 화폐와 차별화되는
  중앙은행에 의해 변경될 수 있는 통화 정책을 따르는
  중앙은행에 의해 변경될 수 있습니다.
reviewed: true
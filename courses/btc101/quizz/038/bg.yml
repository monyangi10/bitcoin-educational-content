question: Коя е основната характеристика на Bitcoin, която я отличава от фиатните валути?
answer: Нейната парична политика се налага с общ консенсус.
wrong_answers:
  - Централните банки могат да го печатат в неограничени количества.
  - Той е обезпечен с физическа стока като злато или сребро.
  - Тя се регулира от централна банка.
explanation: |
  Поради децентрализирания си и криптографски характер,
  Bitcoin не може да бъде фалшифицирана и е ограничена до 21 млн
  бройки. Това е ключова характеристика, която я отличава от
  фиатните валути, които следват парична политика, която може да бъде
  от централните банки.
reviewed: true
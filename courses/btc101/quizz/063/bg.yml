question: Колко е възнаграждението за BTC след четвъртото намаляване наполовина?
answer: 3.125 BTC.
wrong_answers:
  - 1.5625 BTC.
  - 6.25 BTC.
  - 12.5 BTC.
explanation: |
  След четвъртото разделяне на половина, което се извършва на височината на блока
  840 000, наградата от BTC за копаене е 3.125 BTC.
reviewed: true

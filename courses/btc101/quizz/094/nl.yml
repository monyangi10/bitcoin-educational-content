question: Wat is een standaardmethode om je Wallet te herstellen?
answer: Uw Mnemonic zin invoeren in Wallet software.
wrong_answers:
  - Je Mnemonic zin opslaan in een digitaal bestand.
  - Schrijf je Mnemonic zin op een whiteboard.
  - Je Mnemonic zin delen met een vertrouwde vriend.
explanation: |
  De standaardmethode om een back-up te maken van de private sleutel in een
  Bitcoin Wallet is door uw Mnemonic zinsdeel in te voeren in elke
  Wallet software. Hiermee kun je je Wallet herstellen.
reviewed: false
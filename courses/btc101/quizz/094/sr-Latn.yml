question: Koji je standardni metod za vraćanje vašeg novčanika?
answer: Unos vaše Mnemonic fraze u bilo koji softver novčanika.
wrong_answers:
  - Čuvanje vaše Mnemonic fraze u digitalnom fajlu.
  - Pisanje vaše Mnemonic fraze na beloj tabli.
  - Deljenje vaše Mnemonic fraze sa pouzdanim prijateljem.
explanation: |
  Standardna metoda za pravljenje rezervne kopije privatnog ključa u
  Bitkoin novčaniku je unosom vaše Mnemonic fraze u bilo koji
  softver novčanika. Ovo vam omogućava da povratite vaš novčanik.

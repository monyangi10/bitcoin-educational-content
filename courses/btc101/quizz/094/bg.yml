question: Какъв е стандартният метод за възстановяване на вашия портфейл?
answer: Въвеждане на мнемоничната фраза в софтуера на портфейла.
wrong_answers:
  - Запазване на мнемоничната фраза в цифров файл.
  - Написване на мнемоничната фраза на бяла дъска.
  - Споделяне на вашата мнемонична фраза с доверен приятел.
explanation: |
  Стандартният метод за архивиране на частния ключ в
  Bitcoin портфейл е чрез въвеждане на вашата мнемонична фраза. Това ви позволява да възстановите вашия портфейл.
reviewed: false

question: Каква е функцията на регулирането на трудността в мрежата Bitcoin?
answer: Тя гарантира, че в блокчейна се добавя блок приблизително на всеки десет минути.
wrong_answers:
  - Той определя цената на Bitcoin.
  - Тя регулира броя на биткойните, които могат да бъдат добити в блокчейна.
  - Той определя размера на блока.

question: Co należy zarchiwizować podczas korzystania z portfela z hasłem?
answer: Należy utworzyć kopię zapasową zarówno listy 12 lub 24 słów, jak i hasła.
wrong_answers:
  - Wystarczy utworzyć kopię zapasową listy 12 lub 24 słów.
  - Wystarczy wykonać kopię zapasową hasła.
  - Nie musisz tworzyć kopii zapasowej listy 12 lub 24 słów ani hasła.
explanation: |
  W przypadku korzystania z portfela z hasłem należy wykonać kopię zapasową
  zarówno listy 12 lub 24 słów, jak i hasła,
  ponieważ zarówno lista słów, jak i hasło są
  niezbędne do odzyskania dostępu do środków w przypadku
  utraty telefonu lub komputera. Bez jednego lub drugiego,
  środki są niedostępne.
reviewed: true

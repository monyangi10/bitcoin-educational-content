question: คุณต้องสำรองข้อมูลอะไรเมื่อใช้ wallet กับ passphrase?
answer: คุณจำเป็นต้องสำรองข้อมูลทั้งรายการ 12 หรือ 24 คำและ passphrase ของคุณ
wrong_answers:
  - คุณจำเป็นต้องสำรองข้อมูลเฉพาะรายการคำ 12 หรือ 24 คำเท่านั้น
  - คุณจำเป็นต้องสำรองข้อมูลเฉพาะ passphrase ของคุณเท่านั้น
  - คุณไม่จำเป็นต้องสำรองรายการ 12 หรือ 24 คำ หรือ passphrase ของคุณ
explanation: |
  เมื่อคุณใช้ wallet กับ passphrase คุณจำเป็นต้องสำรองข้อมูลทั้งรายการคำ 12 หรือ 24 คำและ passphrase ของคุณ เพราะรายการคำและ passphrase นั้นจำเป็นสำหรับการเข้าถึงเงินของคุณอีกครั้งในกรณีที่โทรศัพท์หรือคอมพิวเตอร์ของคุณสูญหาย หากขาดสิ่งใดสิ่งหนึ่ง เงินจะไม่สามารถเข้าถึงได้
reviewed: true
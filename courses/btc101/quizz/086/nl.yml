question: Wat moet je back-uppen als je een Wallet met een passphrase gebruikt?
answer: Je moet een back-up maken van zowel de lijst van 12 of 24 woorden als je passphrase.
wrong_answers:
  - Je hoeft alleen een back-up te maken van de lijst van 12 of 24 woorden.
  - Je hoeft alleen een back-up te maken van je passphrase.
  - Je hoeft geen back-up te maken van de lijst van 12 of 24 woorden of van je passphrase.
explanation: |
  Wanneer je een Wallet met een passphrase gebruikt, moet je een back-up maken van
  van zowel de lijst met 12 of 24 woorden als van je passphrase,
  omdat de lijst met woorden en de passphrase beide
  nodig zijn om weer toegang te krijgen tot uw geld in geval van
  verlies van uw telefoon of computer. Zonder het een of het ander,
  zijn de fondsen niet toegankelijk.
reviewed: true
question: Ni igiki ukeneye gukora backup iyo ukoresha Wallet iri kumwe na passphrase?
answer: Ukeneye gukora backup y'urutonde rw'amajambo 12 canke 24 be na passphrase yawe.
wrong_answers:
  - Ukeneye gusa gukora backup y’urutonde rw’amajambo 12 canke 24.
  - Ukeneye gusa gukora backup ya passphrase yawe.
  - Ntukeneye gukora backup y’urutonde rw’amajambo 12 canke 24 canke passphrase yawe.
explanation: |
  Iyo ukoresheje Wallet iri kumwe na passphrase, ukeneye gukora backup .

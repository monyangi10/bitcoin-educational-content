question: Какво трябва да се архивира при използване на портфейл с passphrase?
answer: Трябва да направите резервно копие на списъка с 12 или 24 думи и на passphrase.
wrong_answers:
  - Необходимо е да архивирате само списъка от 12 или 24 думи.
  - Необходимо е да направите резервно копие само на passphrase.
  - Не е необходимо да архивирате нито списъка с 12 или 24 думи, нито своя passphrase.
explanation: |
  Когато използвате портфейл с passphrase, трябва да направите резервно копие на
  както списъка с 12 или 24 думи, така и вашия passphrase,
  защото списъкът с думи и passphrase са едновременно
  необходими за възстановяване на достъпа до вашите средства в случай на
  загубване на телефона или компютъра ви. Без едното или другото,
  средствата са недостъпни.
reviewed: true

question: "फिएट मनी" का मतलब क्या है?
answer: फिएट मनी वह करेंसी है जिसकी कीमत सिर्फ इसलिए होती है क्योंकि सरकार इसे मान्यता देती है और लोगों को इसकी वैल्यू पर भरोसा होता है, न कि किसी भौतिक चीज़ जैसे सोने से बैक्ड होने के कारण।
wrong_answers:
  - फिएट मनी वह करेंसी है जो किसी भौतिक वस्तु जैसे सोने या चांदी से बैक्ड होती है, मतलब इसकी वैल्यू सीधे उस वस्तु की कीमत से जुड़ी होती है।
  - फिएट मनी एक तरह की क्रिप्टोकरेंसी है जो एक डिसेंट्रलाइज्ड नेटवर्क पर चलती है, जिससे बिना किसी केंद्रीय अथॉरिटी के पीयर-टू-पीयर ट्रांजैक्शन्स हो सकते हैं।
  - फिएट मनी वह करेंसी है जिसकी कोई अपनी वैल्यू नहीं होती और जिसे ट्रांजैक्शन्स के लिए इस्तेमाल नहीं किया जा सकता, जिससे यह इकोनॉमी में बिल्कुल बेकार हो जाती है।
explanation: |
  सरकारी आदेश से फिएट मनी को कानूनी मुद्रा घोषित किया जाता है, और इसकी कीमत किसी भौतिक वस्तु से नहीं मिलती।
reviewed: true
question: Какви са потенциалните недостатъци на цифровите валути на централните банки (CBDC)?
answer: Те могат да попречат на финансовата свобода на хората и да улеснят авторитарните злоупотреби.
wrong_answers:
  - Те могат да доведат до намаляване на паричното предлагане.
  - Те биха могли да доведат до намаляване на стойността на Bitcoin.
  - Те могат да доведат до намаляване на стойността на златото.
explanation: |
  Цифровите валути на централните банки (CBDCs) могат потенциално
  да възпрепятстват финансовата свобода на хората и да улеснят
  авторитарни злоупотреби. Това е така, защото те биха предложили
  по-централизирано планирана икономика, като централната банка
  да има още по-голям контрол върху паричното предлагане.
reviewed: true
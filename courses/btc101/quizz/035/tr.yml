question: İtibari paranın anlamı nedir?
answer: İtibari para, altın gibi fiziksel bir emtia ile desteklenmek yerine, bir hükümet tarafından korunduğu ve insanlar değerine inandığı için değeri olan para birimidir.
wrong_answers:
  - İtibari para, altın veya gümüş gibi fiziksel bir emtia ile desteklenen para birimidir; bu da değerinin doğrudan bu emtianın değerine bağlı olduğu anlamına gelir.
  - İtibari para, merkezi olmayan bir ağ üzerinde çalışan ve merkezi bir otoriteye ihtiyaç duymadan eşler arası işlemlere izin veren bir kripto para türüdür.
  - İtibari para, gerçek bir değeri olmayan ve işlemler için kullanılamayan para birimidir, bu da onu ekonomide esasen değersiz kılar.
explanation: |
  İtibari para, hükümet kararnamesiyle yasal ödeme aracı olarak belirlenir ve değeri herhangi bir fiziksel maldan türetilmez.
reviewed: true
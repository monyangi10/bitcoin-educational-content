question: Jakie są potencjalne wady walut cyfrowych banku centralnego (CBDC)?
answer: Mogą ograniczać wolność finansową jednostek i ułatwiać autorytarne nadużycia.
wrong_answers:
  - Mogą doprowadzić do spadku wartości pieniądza.
  - Mogą doprowadzić do spadku wartości bitcoina.
  - Mogą doprowadzić do spadku wartości złota.
explanation: |
  Waluty cyfrowe banku centralnego (CBDC) mogą potencjalnie
  ograniczać wolność finansową jednostek i ułatwiać
  autorytarne nadużycia. Wynika to z faktu, że umożliwiłyby powstanie
  bardziej centralnie planowanej gospodarki, gdzie banki centralne
  miałby jeszcze większą kontrolę nad pieniądzem.
reviewed: true

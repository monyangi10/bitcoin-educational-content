question: ข้อเสียที่อาจเกิดขึ้นของสกุลเงินดิจิทัลของธนาคารกลาง (CBDCs) คืออะไร?
answer: พวกเขาอาจขัดขวางเสรีภาพทางการเงินของบุคคลและส่งเสริมการละเมิดอำนาจเผด็จการ
wrong_answers:
  - พวกเขาอาจนำไปสู่การลดลงของปริมาณเงินในระบบเศรษฐกิจ
  - พวกเขาอาจนำไปสู่การลดลงของมูลค่า Bitcoin.
  - พวกเขาอาจนำไปสู่การลดลงของมูลค่าทองคำ
explanation: |
  สกุลเงินดิจิทัลของธนาคารกลาง (CBDCs) อาจขัดขวางเสรีภาพทางการเงินของบุคคลและเอื้อต่อการละเมิดอำนาจนิยมได้ เนื่องจากพวกเขาจะเสนอเศรษฐกิจที่มีการวางแผนจากศูนย์กลางมากขึ้น โดยที่ธนาคารกลางมีการควบคุมปริมาณเงินมากยิ่งขึ้น
reviewed: true
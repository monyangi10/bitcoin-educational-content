question: Когда произошла война размера блока?
answer: В 2017 году.
wrong_answers:
  - В 2008 году.
  - В 2010 году.
  - В 2019 году.
explanation: |
  Война размера блока произошла в 2017 году. Этот конфликт противопоставил участников, желавших изменить Bitcoin, увеличив размер блока для повышения пропускной способности транзакций, тем, кто стремился сохранить независимость и власть пользователей, сохраняя размер в 1 МБ.
reviewed: true

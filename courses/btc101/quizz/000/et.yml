question: Millal toimus ploki suuruse sõda?
answer: Aastal 2017.
wrong_answers:
  - Aastal 2008.
  - Aastal 2010.
  - Aastal 2019.
explanation: |
  Ploki suuruse sõda toimus 2017. aastal. See konflikt vastandas osalejaid, kes soovisid Bitcoini muuta, suurendades ploki suurust tehingumahu suurendamiseks, neile, kes püüdsid säilitada kasutajate sõltumatust ja võimu, hoides suurust 1 MB juures.
reviewed: true

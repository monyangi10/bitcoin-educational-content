question: วัตถุประสงค์ของ Bitcoin wallet คืออะไร?
answer: เพื่อเก็บคีย์ส่วนตัวในการทำธุรกรรมบิตคอยน์
wrong_answers:
  - ใช้ทรัพยากรของอุปกรณ์เพื่อขุดบิตคอยน์
  - ซื้อบิตคอยน์ผ่านคีย์สาธารณะ
  - เก็บบิตคอยน์บนอุปกรณ์
explanation: |
  กระเป๋าเงิน Bitcoin เป็นซอฟต์แวร์ประเภทหนึ่งที่ใช้ในการเก็บรักษาคีย์ส่วนตัวที่ช่วยให้คุณทำธุรกรรมบิตคอยน์ของคุณได้
reviewed: true
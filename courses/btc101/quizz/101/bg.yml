question: Какво е предназначението на Bitcoin портфейла?
answer: За съхраняване на частни ключове с цел транзакции с биткойни.
wrong_answers:
  - Използване на ресурсите на устройството за добив на биткойни.
  - За да купите биткойни чрез публичния ключ.
  - Съхраняване на биткойни в устройство.
explanation: |
  Bitcoin портфейлите са вид софтуер, който се използва за
  съхраняват частните ключове, които ви позволяват да извършвате транзакции с вашите
  биткойни.
reviewed: true

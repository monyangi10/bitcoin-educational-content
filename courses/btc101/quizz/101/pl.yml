question: Jaki jest cel korzystania z portfela Bitcoin?
answer: Przechowywanie kluczy prywatnych w celu dokonywania transakcji bitcoinami.
wrong_answers:
  - Wykorzystywanie zasobów urządzenia do wydobywania bitcoinów.
  - Kupowanie bitcoinów za pomocą klucza publicznego.
  - Przechowywanie bitcoinów na urządzeniu.
explanation: |
  Portfele Bitcoin to rodzaj oprogramowania, które służy do
  przechowywania kluczy prywatnych umożliwiających dokonywanie transakcji
  bitcoinami.
reviewed: true

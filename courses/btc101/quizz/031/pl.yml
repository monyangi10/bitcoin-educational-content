question: Jaka jest maksymalna liczba jednostek Bitcoina, która może istnieć?
answer: 21 milionów.
wrong_answers:
  - 3 biliony.
  - 100 milionów.
  - Nie ma żadnych ograniczeń.
explanation: |
  Całkowita podaż Bitcoina jest ograniczona do 21 milionów jednostek.
  Jest to kluczowa cecha Bitcoina, która odróżnia go
  od walut fiducjarnych, które mogą być drukowane w nieograniczonych ilościach przez banki centralne.
reviewed: true

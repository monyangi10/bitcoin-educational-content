question: Koliki je maksimalan broj bitkoin jedinica koje ikada mogu postojati?
answer: 21 milion.
wrong_answers:
  - 3 triliona.
  - 100 miliona.
  - Nema ograničenja.
explanation: |
  Ukupna ponuda od bitkoina je ograničena na 21 milion jedinica. Ovo je ključna karakteristika Bitkoina koja ga razlikuje od fiducijarnih valuta, koje centralne banke mogu štampati u neograničenim količinama.
reviewed: true

question: จำนวนหน่วย Bitcoin สูงสุดที่สามารถมีอยู่ได้คือเท่าใด?
answer: 21 ล้าน
wrong_answers:
  - 3 ล้านล้าน
  - 100 ล้าน
  - ไม่มีขีดจำกัด
explanation: |
  อุปทานรวมของ Bitcoin ถูกจำกัดไว้ที่ 21 ล้านหน่วย
  นี่เป็นคุณสมบัติสำคัญของ Bitcoin ที่ทำให้แตกต่างจาก
  สกุลเงินที่มีมูลค่าโดยคำสั่ง ซึ่งสามารถพิมพ์ได้
  ในปริมาณไม่จำกัดโดยธนาคารกลาง
reviewed: true
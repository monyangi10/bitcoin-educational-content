question: Какъв е максималният брой единици Bitcoin, които могат да съществуват някога?
answer: 21 милиона.
wrong_answers:
  - 3 трилиона.
  - 100 милиона.
  - Няма ограничение.
explanation: |
  Общото предлагане на Bitcoin е ограничено до 21 милиона единици.
  Това е ключова характеристика на Bitcoin, която го отличава
  от фидуциарните валути, които могат да бъдат отпечатани в
  централните банки могат да печатат неограничени количества.
reviewed: true
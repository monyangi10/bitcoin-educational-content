question: Какъв е основният проблем на настоящата финансова система по отношение на околната среда?
answer: Тя насърчава свръхпотреблението и задлъжняването.
wrong_answers:
  - Тя насърчава използването на изкопаеми горива.
  - Тя не инвестира във възобновяема енергия.
  - Тя не регулира производството на стоки.
explanation: |
  Настоящата финансова система е критикувана за това, че насърчава
  свръхпотреблението и задлъжнялостта, което създава сериозни
  екологични проблеми. Това се дължи на лесния достъп до
  кредитиране, емитирането на парични средства от банките и използването на
  банкиране с частични резерви.
reviewed: true
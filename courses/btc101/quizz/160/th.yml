question: ปัญหาหลักของระบบการเงินในปัจจุบันที่เกี่ยวข้องกับสิ่งแวดล้อมคืออะไร?
answer: มันส่งเสริมการบริโภคเกินพอดีและหนี้สิน
wrong_answers:
  - มันส่งเสริมการใช้เชื้อเพลิงฟอสซิล
  - มันไม่ได้ลงทุนในพลังงานหมุนเวียน
  - มันไม่ได้ควบคุมการผลิตสินค้า
explanation: |
  ระบบการเงินในปัจจุบันถูกวิพากษ์วิจารณ์ว่าเป็นการส่งเสริมการบริโภคเกินพอดีและหนี้สิน ซึ่งก่อให้เกิดปัญหาด้านสิ่งแวดล้อมอย่างรุนแรง สาเหตุนี้เกิดจากการเข้าถึงเครดิตได้ง่าย การออกเงินโดยธนาคาร และการใช้ระบบธนาคารสำรองเศษส่วน
reviewed: true
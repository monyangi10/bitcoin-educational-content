question: 환경과 관련하여 현재 금융 시스템의 주요 이슈는 무엇인가요?
answer: 이는 과소비와 부채를 조장합니다.
wrong_answers:
  - 화석 연료 사용을 촉진합니다.
  - 재생 에너지에 투자하지 않습니다.
  - 상품 생산을 규제하지 않습니다.
explanation: |
  현재의 금융 시스템은 과소비와 부채를 조장한다는 비판을 받고 있습니다
  과소비와 부채를 조장한다는 비판을 받고 있습니다
  환경 문제를 야기한다는 비판을 받고 있습니다. 이는 은행에 의한 신용
  신용, 은행에 의한 화폐 발행, 그리고
  부분 준비금 제도.
reviewed: true
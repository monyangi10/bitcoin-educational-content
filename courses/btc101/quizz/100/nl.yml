question: Wat betekent de afwezigheid van een Mnemonic zin in een Wallet?
answer: Dit geeft aan dat Wallet niet veilig is voor langdurige opslag van Bitcoin.
wrong_answers:
  - Het geeft aan dat de Wallet volledig veilig is en geen back-up nodig heeft.
  - Dit betekent dat de Wallet veel verschillende bindingen kan bevatten.
  - Het suggereert dat de Wallet automatisch wordt geback-upt door je apparaat.
explanation: |
  Het ontbreken van een lijst van 12 of 24 woorden, dat is de
  Mnemonic zin, in een Wallet zou je moeten waarschuwen dat de
  Wallet niet veilig is, omdat het geen standaard back-up
  procedures.
reviewed: true
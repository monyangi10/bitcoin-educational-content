question: Каква е ролята на нотариуса в контекста на наследяването по Bitcoin?
answer: Те гарантират спазването на данъчното законодателство.
wrong_answers:
  - Те управляват вашите биткойни след смъртта ви.
  - Те променят плана ви за наследяване.
  - Те съхраняват вашите биткойни в сейф.
explanation: |
  В контекста на унаследяването на Bitcoin е важно да се
  да се обсъди наследяването на биткойни с нотариус, за да се гарантира, че
  спазването на данъчното законодателство.
reviewed: false
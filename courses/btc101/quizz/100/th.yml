question: บทบาทของทนายความในบริบทของการสืบทอด Bitcoin คืออะไร?
answer: พวกเขารับรองการปฏิบัติตามภาษี
wrong_answers:
  - พวกเขาจัดการบิตคอยน์ของคุณหลังจากที่คุณเสียชีวิต
  - พวกเขาแก้ไขแผนการรับมรดกของคุณ
  - พวกเขาเก็บบิทคอยน์ของคุณไว้ในที่ปลอดภัย
explanation: |
  ในบริบทของการสืบทอด Bitcoin การพูดคุยเกี่ยวกับการสืบทอดบิตคอยน์กับทนายความเป็นสิ่งสำคัญเพื่อให้แน่ใจว่ามีการปฏิบัติตามภาษี
reviewed: false
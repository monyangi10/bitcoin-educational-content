question: Jaka jest rola notariusza w kontekście dziedziczenia Bitcoina?
answer: Zapewnia zgodność z przepisami podatkowymi.
wrong_answers:
  - Zarządza bitcoinami po śmierci użytkownika.
  - Modyfikuje plan spadkowy.
  - Zabezpiecza bitcoiny w sejfie.
explanation: |
  W kontekście dziedziczenia bitcoina ważne jest omówienie kwestii dziedziczenia bitcoinów z notariuszem, aby zapewnić
  zgodność z przepisami podatkowymi.
reviewed: true

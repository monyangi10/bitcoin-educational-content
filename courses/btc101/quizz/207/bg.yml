question: Какво прогнозира Милтън Фридман през 1999 г.?
answer: Разработване на надеждна електронна парична наличност.
wrong_answers:
  - Залезът на физическите пари.
  - Възходът на Bitcoin.
  - Край на държавния контрол върху парите.
explanation: |
  Милтън Фридман, известен икономист, прогнозира през 1999 г
  че скоро ще бъде разработен надежден електронен паричен превод, метод
  чрез който в интернет можете да превеждате средства от А до Б,
  без А да знае за Б или обратното.
reviewed: true
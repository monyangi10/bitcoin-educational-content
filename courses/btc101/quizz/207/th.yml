question: มิลตัน ฟรีดแมนทำนายอะไรในปี 1999?
answer: การพัฒนาเงินสดอิเล็กทรอนิกส์ที่เชื่อถือได้
wrong_answers:
  - การสิ้นสุดของเงินสด
  - การเพิ่มขึ้นของ Bitcoin.
  - จุดจบของการควบคุมเงินโดยรัฐบาล
explanation: |
  มิลตัน ฟรีดแมน นักเศรษฐศาสตร์ที่มีชื่อเสียง ทำนายไว้ในปี 1999
  ว่าจะมีการพัฒนาเงินสดอิเล็กทรอนิกส์ที่เชื่อถือได้ในไม่ช้า ซึ่งเป็นวิธีการ
  ที่คุณสามารถโอนเงินผ่านอินเทอร์เน็ตจาก A ไปยัง B
  โดยที่ A ไม่รู้จัก B หรือในทางกลับกัน
reviewed: true
question: 밀턴 프리드먼은 1999년에 무엇을 예측했나요?
answer: 신뢰할 수 있는 전자 화폐 개발.
wrong_answers:
  - 실물 화폐의 종말.
  - Bitcoin의 부상.
  - 화폐에 대한 정부의 통제는 끝났습니다.
explanation: |
  저명한 경제학자 밀턴 프리드먼은 1999년에 다음과 같이 예측했습니다
  신뢰할 수 있는 전자 현금이 곧 개발될 것이라고 예측했습니다
  인터넷에서 A에서 B로 자금을 이체할 수 있습니다,
  a가 B를 알지 못하거나 그 반대의 경우도 마찬가지입니다.
reviewed: true
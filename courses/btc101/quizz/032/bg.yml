question: Каква е основната цел на създаването на Bitcoin?
answer: Отделяне на държавата от парите.
wrong_answers:
  - Премахване на златния стандарт.
  - Да направите транзакциите по-бързи и по-евтини.
  - Да направи всички богати.
explanation: |
  Bitcoin е създаден с цел разделяне на държавата
  от парите. Тя е отговор на системните предизвикателства на
  сегашната финансова система, в която държавата има пълна
  контрол върху паричното предлагане и може да го манипулира, за да
  в своя полза.
reviewed: true
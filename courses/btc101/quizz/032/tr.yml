question: Bitcoin'ın yaratılmasının ardındaki temel amaç nedir?
answer: Devleti paradan ayırmak için.
wrong_answers:
  - Altın standardını ortadan kaldırmak için.
  - İşlemleri daha hızlı ve daha ucuz hale getirmek için.
  - Herkesi zengin etmek için.
explanation: |
  Bitcoin, Eyalet ile Türkiye'yi birbirinden ayırmak amacıyla oluşturulmuştur
  paradan. Bu, aşağıdaki sistemik zorluklara bir yanıttır
  devletin tam yetkiye sahip olduğu mevcut finansal sistem
  gW-2 parası üzerinde kontrol sahibidir ve onu istediği gibi manipüle edebilir
  kendi avantajı.
reviewed: true
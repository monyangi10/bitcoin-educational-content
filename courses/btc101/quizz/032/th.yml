question: วัตถุประสงค์หลักเบื้องหลังการสร้าง Bitcoin คืออะไร?
answer: ที่จะแยกรัฐออกจากเงิน
wrong_answers:
  - เพื่อยกเลิกมาตรฐานทองคำ
  - เพื่อทำให้การทำธุรกรรมเร็วขึ้นและถูกลง
  - เพื่อทำให้ทุกคนร่ำรวย
explanation: |
  Bitcoin ถูกสร้างขึ้นโดยมีเป้าหมายในการแยกรัฐออกจากเงิน เป็นการตอบสนองต่อความท้าทายเชิงระบบของระบบการเงินปัจจุบัน ที่ซึ่งรัฐมีการควบคุมเต็มรูปแบบเหนือการจัดหาเงินและสามารถจัดการเพื่อประโยชน์ของตนเอง
reviewed: true
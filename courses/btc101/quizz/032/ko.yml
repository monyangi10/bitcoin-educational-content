question: Bitcoin을 만든 주요 목적은 무엇인가요?
answer: 국가와 돈을 분리하기 위해.
wrong_answers:
  - 금본위제를 없애기 위해.
  - 더 빠르고 저렴하게 거래할 수 있습니다.
  - 모두를 부자로 만들기 위해.
explanation: |
  Bitcoin은 국가와 돈을 분리하기 위한 목적으로 만들어졌습니다
  돈으로부터. 이는 국가가 모든 권한을 가진 현 금융 시스템의
  현재의 금융 시스템에 대한 대응입니다
  돈을 통제하고 자신의 이익에 맞게 조작할 수 있습니다
  자신의 이익을 위해.
reviewed: true
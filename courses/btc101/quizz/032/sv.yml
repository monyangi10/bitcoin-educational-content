question: Vad är huvudsyftet bakom skapandet av Bitcoin?
answer: Att skilja staten från pengar.
wrong_answers:
  - Att avskaffa guldmyntfoten.
  - För att göra transaktioner snabbare och billigare.
  - Att göra alla rika.
explanation: |
  Bitcoin skapades i syfte att skilja staten från pengar
  från pengar. Det är ett svar på de systemiska utmaningarna i
  nuvarande finansiella systemet, där staten har full
  kontroll över pengarna Supply och kan manipulera dem till sin egen
  egen fördel.
reviewed: true
question: Bitcoin protokolü, sonraki blok için geçerli bir Hash bulan Miner'i nasıl ödüllendirir?
answer: Mutabakat kuralları tarafından tanımlanan bir ödülle ve geçerli bloğa dahil olan tüm işlemlerden elde edilen ücretlerle.
wrong_answers:
  - Konsensüs kuralları ile tanımlanmamış sabit miktarda bitcoin ile.
  - Toplam Bitcoin Supply ve önceki bloklarda yer alan tüm işlemlerden elde edilen ücretlerin bir yüzdesi ile.
  - Geçerli bloğa dahil edilen tüm işlemlerden alınan ücretlerle.
explanation: |
  Bitcoin protokolü, geçerli bir Miner bulan Miner'yı ödüllendirir
  Bir sonraki blok için Hash miktarı şu olan bir ödül ile
  mutabakat kuralları tarafından tanımlanan ücretler ile birlikte
  geçerli blokta yer alan tüm işlemler.
reviewed: true
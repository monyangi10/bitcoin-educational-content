question: Wei Dai's b-money คืออะไร?
answer: แนวคิดของสกุลเงินดิจิทัลที่ไม่ระบุตัวตนซึ่งการตรวจจับการฉ้อโกงดำเนินการโดยชุมชนของผู้ประเมินแทนที่จะเป็นหน่วยงานกลาง
wrong_answers:
  - สกุลเงินดิจิทัลที่ถูกใช้อย่างแพร่หลายก่อน Bitcoin และถูกควบคุมโดยกลุ่มไซเฟอร์พังค์
  - รูปแบบหนึ่งของเงินดิจิทัลที่สร้างขึ้นโดย CIA และใช้โดยทหาร
  - สกุลเงินดิจิทัลที่สร้างขึ้นโดย Wei Dai เพื่อแข่งขันกับ Bitcoin ให้มีความสามารถในการขยายตัวมากขึ้น
explanation: |
  แนวคิด b-money ของ Wei Dai คือสกุลเงินดิจิทัลที่ไม่ระบุตัวตนโดยไม่มีหน่วยงานกลาง ซึ่งเป็นแรงบันดาลใจอย่างมากในการสร้าง Bitcoin ในความเป็นจริง มันถูกอ้างถึงในเอกสารไวท์เปเปอร์ของ Bitcoin
reviewed: true
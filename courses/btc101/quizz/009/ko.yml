question: 웨이 다이의 비머니는 무엇인가요?
answer: 중앙 기관이 아닌 평가자 커뮤니티가 사기 탐지를 수행하는 익명의 디지털 화폐에 대한 아이디어입니다.
wrong_answers:
  - Bitcoin 이전에 널리 사용되던 디지털 화폐로, 사이퍼펑크 그룹에 의해 통제되었습니다.
  - CIA가 만들어 군대에서 사용하는 디지털 화폐의 한 형태입니다.
  - 웨이 다이가 Bitcoin의 경쟁자로서 확장성을 높이기 위해 만든 디지털 화폐입니다.
explanation: |
  웨이 다이의 비머니는 중앙 주체가 없는 익명의 디지털
  중앙 기관이 없는 익명의 디지털 화폐에 대한 아이디어였습니다
  gW-2의 탄생에 큰 영감을 주었습니다. 실제로 이 아이디어는 Bitcoin
  백서에도 인용되어 있습니다.
reviewed: true
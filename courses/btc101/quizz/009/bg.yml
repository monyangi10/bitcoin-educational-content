question: Какви са парите на Вей Дай?
answer: Идея за анонимна цифрова валута, при която откриването на измами се извършва от общност от оценители, а не от централен орган.
wrong_answers:
  - Дигитална валута, широко използвана преди Bitcoin и контролирана от група шифровчици.
  - Форма на цифрови пари, създадена от ЦРУ и използвана от военните.
  - Цифрова валута, създадена от Уей Дай като конкурент на Bitcoin, за да бъде по-широко мащабируема.
explanation: |
  B-money на Уей Дай е идеята за анонимна цифрова
  валута без централна структура, която силно вдъхнови
  за създаването на Bitcoin. Всъщност тя е цитирана в Bitcoin
  в белия лист.
reviewed: true
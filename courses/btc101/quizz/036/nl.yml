question: Wat is het historische pad dat instellingen hebben gevolgd bij de introductie van fiatvaluta's?
answer: Leiders centraliseren goud en introduceren een nieuwe valuta die in waarde gelijk is aan goud, dat vervolgens geleidelijk wordt gedevalueerd.
wrong_answers:
  - Leiders introduceren een nieuwe munteenheid die gedekt wordt door goud en vervolgens geleidelijk in waarde toeneemt.
  - Leiders introduceren een nieuwe valuta zonder intrinsieke waarde, die vervolgens geleidelijk in waarde wordt verhoogd.
  - Leiders introduceren een nieuwe munteenheid die wordt ondersteund door een mandje grondstoffen en vervolgens waardevast wordt gehouden.
explanation: |
  In het verleden hebben leiders goud gecentraliseerd en een nieuwe
  een nieuwe valuta geïntroduceerd die in waarde gelijk is aan goud. Deze nieuwe
  valuta wordt dan geleidelijk gedevalueerd, vaak onder het mom van
  van het belang van het volk.
reviewed: true
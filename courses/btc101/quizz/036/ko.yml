question: 역사적으로 기관들이 법정화폐를 도입하는 과정에서 어떤 경로를 밟아왔나요?
answer: 지도자들은 금을 중앙집권화하고 금과 동등한 가치를 지닌 새로운 화폐를 도입한 후 점차 가치를 떨어뜨립니다.
wrong_answers:
  - 지도자들은 금으로 뒷받침되는 새로운 화폐를 도입하고, 이 화폐의 가치를 점차적으로 높입니다.
  - 리더는 내재 가치가 없는 새로운 화폐를 도입한 후 점차 가치를 높입니다.
  - 리더는 상품 바스켓으로 뒷받침되는 새로운 통화를 도입하고, 그 가치를 안정적으로 유지합니다.

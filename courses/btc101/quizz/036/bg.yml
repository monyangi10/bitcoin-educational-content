question: Какъв е историческият път, който институциите следват при въвеждането на фиатните валути?
answer: Лидерите централизират златото и въвеждат нова валута, еквивалентна на златото по стойност, която след това постепенно се обезценява.
wrong_answers:
  - Лидерите въвеждат нова валута, обезпечена със злато, чиято стойност постепенно се увеличава.
  - Лидерите въвеждат нова валута без собствена стойност, която след това постепенно се оскъпява.
  - Лидерите въвеждат нова валута, обезпечена с кошница от стоки, чиято стойност се поддържа стабилна.
explanation: |
  В миналото лидерите са централизирали златото и са въвеждали
  нова валута, еквивалентна по стойност на златото. Тази нова
  след това постепенно се обезценява, често под прикритието на
  че е в интерес на хората.
reviewed: true
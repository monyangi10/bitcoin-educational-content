question: เส้นทางประวัติศาสตร์ที่สถาบันต่างๆ ได้ดำเนินการในการแนะนำสกุลเงินเฟียตคืออะไร?
answer: ผู้นำรวมศูนย์ทองคำและแนะนำสกุลเงินใหม่ที่มีมูลค่าเทียบเท่ากับทองคำ ซึ่งต่อมาจะถูกลดค่าอย่างค่อยเป็นค่อยไป
wrong_answers:
  - ผู้นำแนะนำสกุลเงินใหม่ที่มีทองคำหนุนหลัง ซึ่งจากนั้นจะค่อยๆ เพิ่มมูลค่า
  - ผู้นำแนะนำสกุลเงินใหม่ที่ไม่มีมูลค่าในตัวเอง ซึ่งจากนั้นจะค่อยๆ เพิ่มมูลค่า
  - ผู้นำแนะนำสกุลเงินใหม่ที่ได้รับการสนับสนุนโดยตะกร้าสินค้าโภคภัณฑ์ ซึ่งจะถูกทำให้มีค่าเสถียรภาพ
explanation: |
  ในทางประวัติศาสตร์ ผู้นำได้รวมศูนย์ทองคำและแนะนำ
  สกุลเงินใหม่ที่มีมูลค่าเทียบเท่ากับทองคำ สกุลเงินใหม่นี้
  จากนั้นจะถูกลดค่าอย่างค่อยเป็นค่อยไป มักจะภายใต้ข้ออ้าง
  ว่าเป็นประโยชน์ต่อประชาชน
reviewed: true
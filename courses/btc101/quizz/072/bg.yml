question: Как можете да подсилите сигурността по подразбиране на вашия Bitcoin портфейл?
answer: Като добавите passphrase към Bitcoin портфейл.
wrong_answers:
  - Чрез добавяне на втори частен ключ към вашия Bitcoin портфейл.
  - Чрез добавяне на втори публичен ключ към вашия Bitcoin портфейл.
  - Като добавите втора мнемонична фраза към своя Bitcoin портфейл.
explanation: |
  Ако не сте доволни от сигурността по подразбиране на вашия
  Bitcoin портфейл, винаги можете да я подсилите, като добавите
  passphrase към вашия Bitcoin портфейл.
reviewed: true

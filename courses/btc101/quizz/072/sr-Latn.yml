question: Kako možete ojačati podrazumevanu sigurnost vašeg Bitkoin novčanika?
answer: Dodavanjem passphrase vašem Bitkoin novčaniku.
wrong_answers:
  - Dodavanjem drugog privatnog ključa vašem Bitkoin novčaniku.
  - Dodavanjem drugog javnog ključa vašem Bitoin novčaniku.
  - Dodavanjem druge Mnemonic fraze vašem Bitkoin novčaniku.
explanation: |
  Ako niste zadovoljni podrazumevanom sigurnošću vašeg
  Bitkoin novčanika, uvek je možete pojačati dodavanjem
  passphrase.
reviewed: true

question: Jak wzmocnić domyślne zabezpieczenia portfela Bitcoin?
answer: Dodając hasło do porfela Bitcoin.
wrong_answers:
  - Dodając drugi klucz prywatny do portfela Bitcoin.
  - Dodając drugi klucz publiczny do portfela Bitcoin.
  - Dodając drugą frazę Mnemonic do portfela Bitcoin.
explanation: |
  Jeśli nie jesteś zadowolony z domyślnego zabezpieczenia swojego
  portfela Bitcoin, zawsze można je wzmocnić, dodając do portfela moduł hasła.
reviewed: true

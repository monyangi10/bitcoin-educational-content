question: През коя година се очаква да бъде прекратено създаването на биткойни?
answer: 2140
wrong_answers:
  - 2050
  - 2030
  - 2200
explanation: |
  Благодарение на механизма за намаляване наполовина, математически може да се
  да се предвиди, че създаването на биткойни ще спре през 2140 г,
  когато общият брой на биткойните достигне лимита си от 21
  милиона.
reviewed: true
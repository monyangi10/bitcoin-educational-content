question: Какво се случва, ако частният ви ключ бъде разкрит на трета страна?
answer: Третата страна може да харчи вашите биткойни.
wrong_answers:
  - Третата страна може да преглежда само историята на трансакциите ви.
  - Третата страна може да промени частния ви ключ.
  - Третата страна може да получи достъп до вашата лична информация.
explanation: |
  Ако частният ви ключ бъде разкрит на трета страна
  свързаните с него средства вече не са защитени, тъй като частният
  ключ позволява достъп до вашите средства.
reviewed: true
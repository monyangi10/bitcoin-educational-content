question: จะเกิดอะไรขึ้นหากกุญแจส่วนตัวของคุณถูกเปิดเผยต่อบุคคลที่สาม?
answer: บุคคลที่สามสามารถใช้จ่ายบิตคอยน์ของคุณได้
wrong_answers:
  - บุคคลที่สามสามารถดูประวัติการทำธุรกรรมของคุณได้เท่านั้น
  - บุคคลที่สามสามารถเปลี่ยนคีย์ส่วนตัวของคุณได้
  - บุคคลที่สามสามารถเข้าถึงข้อมูลส่วนบุคคลของคุณได้
explanation: |
  หากกุญแจส่วนตัวของคุณถูกเปิดเผยต่อบุคคลที่สาม
  เงินที่เกี่ยวข้องจะไม่ปลอดภัยอีกต่อไป เพราะกุญแจส่วนตัว
  อนุญาตให้พวกเขาเข้าถึงเงินของคุณได้
reviewed: true
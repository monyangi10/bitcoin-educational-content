question: ข้อได้เปรียบหลักของสกุลเงินเฟียตคืออะไร?
answer: พวกมันสามารถแบ่งแยกได้ง่าย
wrong_answers:
  - พวกเขาถูกควบคุมโดยพรรคกลาง
  - พวกมันไม่สามารถขนย้ายได้ง่าย
  - พวกมันมีประสิทธิภาพในการรักษามูลค่าไว้ตลอดเวลา
explanation: |
  สกุลเงินเฟียต เช่น ดอลลาร์และยูโร มีสภาพคล่องสูงและสามารถขนส่งได้ง่ายเพราะปัจจุบันเป็นดิจิทัลเป็นส่วนใหญ่ อย่างไรก็ตาม มูลค่าของพวกมันถูกกัดกร่อนอย่างต่อเนื่องจากเงินเฟ้อทางการเงิน
reviewed: true
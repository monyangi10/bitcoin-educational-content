question: 법정 화폐의 주요 장점은 무엇인가요?
answer: 쉽게 나눌 수 있습니다.
wrong_answers:
  - 이들은 중앙 당에 의해 통제됩니다.
  - 쉽게 운반할 수 없습니다.
  - 시간이 지나도 가치를 유지하는 데 효과적입니다.
explanation: |
  달러와 유로와 같은 법정 화폐는 매우
  Liquid이며 대부분 디지털화되어 있기 때문에 쉽게 전송할 수 있습니다
  디지털화되어 있기 때문입니다. 하지만 그 가치는 다음과 같은 이유로 지속적으로 약화되고 있습니다
  화폐 인플레이션.
reviewed: true
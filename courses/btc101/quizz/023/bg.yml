question: Кое е основното предимство на фиатните валути?
answer: Те са лесно делими.
wrong_answers:
  - Те се контролират от централна партия.
  - Те не са лесно преносими.
  - Те са ефективни и запазват стойността си във времето.
explanation: |
  Фиатните валути, като долара и еврото, са много
  ликвидни и лесно преносими, тъй като сега са предимно
  цифрови. Въпреки това стойността им постоянно се понижава от
  паричната инфлация.
reviewed: true
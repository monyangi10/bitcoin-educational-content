question: Koja je glavna prednost fiat valuta?
answer: Deljivost.
wrong_answers:
  - One su pod kontrolom centralne banke.
  - One nisu lako prenosive.
  - One su efikasne u očuvanju vrednosti kroz vreme.
explanation: |
  Fiat valute, kao što su dolar i evro, su veoma
  likvidne i lako prenosive jer su sada uglavnom
  digitalne. Međutim, njihova vrednost je konstantno narušena
  monetarnom inflacijom.
reviewed: true

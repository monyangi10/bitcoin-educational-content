question: Ni akamaro akahe nyamukuru k’amahera ya fiat?
answer: Biroroshe gucapura.
wrong_answers:
  - Bigenzurwa n’umuhari wo hagati.
  - Ntivyoroshe gutwara.
  - Ni vyiza kugira ngo bigumye agaciro mu gihe cose.
explanation: |
  Amafaranga y’i Fiat, nk’idolari n’amayero, ni menshi cane .
  Liquid kandi zishobora gutwarwa bitagoranye kuko ubu ahanini .
  digitale. Ariko rero, agaciro kavyo karaguma gasenyuka kubera .
  ugutera imbere kw’amahera.
reviewed: true
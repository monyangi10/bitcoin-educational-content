question: İtibari para birimlerinin temel avantajı nedir?
answer: Kolayca bölünebilirler.
wrong_answers:
  - Merkezi bir parti tarafından kontrol edilirler.
  - Kolayca taşınamazlar.
  - Zaman içinde değerlerini korumak için etkilidirler.
explanation: |
  Dolar ve euro gibi fiat para birimleri çok
  Liquid ve kolayca taşınabilir çünkü artık çoğunlukla
  dijital. Bununla birlikte, değerleri sürekli olarak aşağıdakiler tarafından aşındırılmaktadır
  parasal enflasyon.
reviewed: true
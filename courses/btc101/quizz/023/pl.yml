question: Jaka jest główna zaleta walut fiducjarnych?
answer: Są łatwo podzielne.
wrong_answers:
  - Są kontrolowane przez partię centralną.
  - Nie są łatwe w transporcie.
  - Skutecznie utrzymują wartość w czasie.
explanation: |
  Waluty fiducjarne, takie jak dolar i euro, są bardzo
  płynne i łatwe w transporcie, ponieważ są teraz w większości
  cyfrowe. Jednak ich wartość jest stale obniżana przez inflację monetarną.
reviewed: true

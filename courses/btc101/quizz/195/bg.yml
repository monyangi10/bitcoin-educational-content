question: Кой е един от начините за придобиване на биткойни без KYC?
answer: Bitcoin банкомати.
wrong_answers:
  - Брокерски платформи.
  - Платформи DCA.
  - Банкови преводи.
explanation: |
  В текста на курса се споменава, че има няколко начина да
  придобиване на биткойни без KYC, като един от тях е банкомат Bitcoin.
reviewed: true
question: หนึ่งในวิธีการที่จะได้รับบิตคอยน์โดยไม่ต้องผ่าน KYC คือการใช้แพลตฟอร์มการซื้อขายแบบเพียร์ทูเพียร์ (P2P)
answer: Bitcoin ตู้เอทีเอ็ม
wrong_answers:
  - แพลตฟอร์มนายหน้า
  - แพลตฟอร์ม DCA
  - การโอนเงินผ่านธนาคาร
explanation: |
  ข้อความในหลักสูตรกล่าวถึงว่ามีหลายวิธีในการ
  รับบิตคอยน์โดยไม่ต้องใช้ KYC ซึ่งหนึ่งในนั้นคือ Bitcoin ATMs.
reviewed: true
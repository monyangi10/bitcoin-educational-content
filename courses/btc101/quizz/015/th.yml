question: ทำไมทองคำถึงกลายเป็นมาตรฐานในการแลกเปลี่ยน?
answer: เนื่องจากความหายาก ความทนทาน และความสามารถในการแบ่งแยก
wrong_answers:
  - เนื่องจากความอุดมสมบูรณ์ ความทนทาน และการแบ่งแยกไม่ได้
  - เนื่องจากความหายาก ความเน่าเสียง่าย และความสามารถในการแบ่งแยก
  - เนื่องจากความอุดมสมบูรณ์ ความเน่าเสียง่าย และความไม่สามารถแบ่งแยกได้
explanation: |
  ทองคำกลายเป็นมาตรฐานของสื่อกลางในการแลกเปลี่ยนเนื่องจากความหายาก, ความทนทาน, และความสามารถในการแบ่งแยก: ความหายากของมันป้องกันการลดค่าเนื่องจากการผลิต; ความทนทานของมันทำให้มั่นใจได้ว่าจะไม่สึกกร่อนตามกาลเวลา, และความสามารถในการแบ่งแยกของมันทำให้สามารถใช้ในการทำธุรกรรมขนาดต่างๆ ได้
reviewed: true
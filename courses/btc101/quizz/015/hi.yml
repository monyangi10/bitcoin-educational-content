question: "साइबरस्पेस की स्वतंत्रता की घोषणा" क्या है?
answer: एक ऐसा टेक्स्ट जो दावा करता है कि साइबरस्पेस भौतिक दुनिया से अलग एक अलग ही दायरा है और उस पर वही कानून लागू नहीं होने चाहिए।
wrong_answers:
  - एक घोषणा जो Bitcoin की पारंपरिक वित्तीय प्रणालियों से स्वतंत्रता की घोषणा करती है।
  - एक पाठ जो यह दावा करता है कि साइबरस्पेस को सरकारी नियमों द्वारा नियंत्रित किया जाना चाहिए।
  - एक घोषणा जो यह दावा करती है कि समुद्री डाकू आंदोलन किसी भी नियमन से स्वतंत्र है।
explanation: |
  साइबरस्पेस की स्वतंत्रता की घोषणा थी
  जॉन पैरी बार्लो द्वारा 1996 में लिखा गया। यह दस्तावेज़ दावा करता है
  कि साइबरस्पेस भौतिक दुनिया से एक अलग ही दायरा है
  गोला, इसलिए औद्योगिक सरकारें अपने नियम लागू नहीं कर सकतीं
  वहाँ अधिकार।
reviewed: true
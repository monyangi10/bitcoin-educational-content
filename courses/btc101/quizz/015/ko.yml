question: 금이 Exchange의 표준 매체가 된 이유는 무엇인가요?
answer: 희귀성, 내구성 및 분할 가능성으로 인해.
wrong_answers:
  - 풍부하고 내구성이 뛰어나며 분할이 불가능하기 때문입니다.
  - 희귀성, 부패성 및 분할 가능성으로 인해.
  - 풍부하고 부패하기 쉬우며 분할할 수 없기 때문입니다.
explanation: |
  금은 다음과 같은 이유로 Exchange의 표준 매체가 되었습니다
  희귀성, 내구성 및 분할 가능성: 금의 희귀성은 생산으로 인한
  생산으로 인한 평가절하를 방지하고, 내구성이 뛰어나 시간이 지나도 부식되지 않으며
  시간이 지나도 침식되지 않도록 보장하고, 분할 가능성은
  덕분에 다양한 규모의 거래에서 사용할 수 있었습니다.
reviewed: true
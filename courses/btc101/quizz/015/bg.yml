question: Защо златото се превръща в стандартно средство за размяна?
answer: Заради неговата рядкост, трайност и делимост.
wrong_answers:
  - Заради изобилието, дълготрайността и неделимостта си.
  - Поради своята рядкост, нетрайност и делимост.
  - Заради изобилието, нетрайността и неделимостта му.
explanation: |
  Златото се превръща в стандартно средство за размяна поради своята
  рядкост, трайност и делимост: неговата рядкост не позволяваше
  обезценяването, причинено от производството; неговата трайност
  гарантирала, че то няма да ерозира с течение на времето, а делимостта му
  позволява да се използва в транзакции с различен размер.
reviewed: true
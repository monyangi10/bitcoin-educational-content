question: Какво е влиянието на 20% инфлация върху покупателната способност за период от 3 години?
answer: Губите 50% от покупателната си способност.
wrong_answers:
  - Губите 100% от покупателната си способност.
  - Губите 60% от покупателната си способност.
  - Губите 30% от покупателната си способност.
explanation: |
  При 20-процентна инфлация губите почти половината от покупателната си способност
  за 3 години.

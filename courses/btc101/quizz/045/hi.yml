question: 3 वर्षों में क्रय शक्ति पर 20% मुद्रास्फीति का क्या प्रभाव पड़ेगा?
answer: आप अपनी क्रय शक्ति का 50% खो देते हैं।
wrong_answers:
  - आप अपनी क्रय शक्ति का 100% खो देते हैं।
  - आप अपनी क्रय शक्ति का 60% खो देते हैं।
  - आप अपनी क्रय शक्ति का 30% खो देते हैं।
explanation: |
  20% मुद्रास्फीति के साथ, आप 3 वर्षों में अपनी क्रय शक्ति का लगभग आधा हिस्सा खो देते हैं।
reviewed: true
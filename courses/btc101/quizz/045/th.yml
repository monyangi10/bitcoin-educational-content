question: ผลกระทบของเงินเฟ้อ 20% ต่ออำนาจการซื้อในระยะเวลา 3 ปีคืออะไร?
answer: คุณสูญเสียอำนาจการซื้อ 50%
wrong_answers:
  - คุณสูญเสียอำนาจการซื้อ 100%
  - คุณสูญเสียอำนาจการซื้อ 60%
  - คุณสูญเสียอำนาจการซื้อ 30%
explanation: |
  ด้วยอัตราเงินเฟ้อ 20% คุณจะสูญเสียกำลังซื้อเกือบครึ่งหนึ่งในเวลา 3 ปี
reviewed: true
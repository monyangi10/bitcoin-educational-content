question: Bitcoin 프로토콜은 후속 블록에 대해 유효한 Hash를 찾은 Miner에게 어떻게 보상하나요?
answer: 합의 규칙에 따라 정의된 보상과 유효한 블록에 포함된 모든 트랜잭션의 수수료로 보상을 받을 수 있습니다.
wrong_answers:
  - 합의 규칙에 의해 정의되지 않은 고정된 양의 비트코인이 있습니다.
  - 이전 블록에 포함된 모든 트랜잭션의 수수료와 총 Bitcoin Supply의 비율로 계산됩니다.
  - 유효한 블록에 포함된 모든 거래의 수수료가 포함됩니다.
explanation: |
  Bitcoin 프로토콜은 유효한 Miner을 찾은 Hash에게 다음 블록에 대한
  다음 블록에 대한 Hash에게 합의 규칙에 의해 정의 된 금액의 보상으로
  합의 규칙에 의해 정의되며, 유효한 블록에 포함된 모든 트랜잭션의 수수료와 함께
  수수료와 함께 정의된 금액을 보상으로 지급합니다.
reviewed: true
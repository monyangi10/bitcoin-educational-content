question: Как протоколът Bitcoin възнаграждава миньора, който намери валиден хеш за следващия блок?
answer: С възнаграждение, определено от правилата на консенсуса, и с таксите от всички транзакции, включени във валидния блок.
wrong_answers:
  - С фиксирано количество биткойни, което не се определя от правила за консенсус.
  - С процент от общото предлагане на Bitcoin и таксите от всички транзакции, включени в предходните блокове.
  - С таксите от всички трансакции, включени във валидния блок.
explanation: |
  Протоколът Bitcoin възнаграждава миньора, който намери валидна
  хеш за следващия блок с награда, чийто размер е
  определена от правилата за консенсус, заедно с таксите от
  всички транзакции, включени във валидния блок.
reviewed: true
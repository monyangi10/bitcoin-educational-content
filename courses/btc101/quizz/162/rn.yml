question: Ni gute protocole ya Bitcoin ihemba Miner aronka Hash ibereye ku bijanye n’ibarabara rikurikira?
answer: N’impera isobanurwa n’amategeko y’uguhurizako, n’amahera ava mu bikorwa vyose bishizwe mu gice gifise akamaro.
wrong_answers:
  - N’umubare udahinduka w’ama bitcoins adasobanurwa n’amategeko y’uguhurizako.
  - N’ijanisha ry’amahera yose hamwe Bitcoin Supply n’amahera ava mu bikorwa vyose vyashizwe mu mabarabara yabanje.
  - N’amahera ava mu bikorwa vyose vy’ubudandaji ari muri block ikora.
explanation: |
  Itegeko rya Bitcoin rihemba Miner abona ivyiza
  Hash ku gice gikurikira gifise impembo igiciro caco ari 100.000.
  bisobanurwa n’amategeko y’uguhurizako, hamwe n’amahera ava ku
  ibikorwa vyose biri mu gice gifise akamaro.
reviewed: true
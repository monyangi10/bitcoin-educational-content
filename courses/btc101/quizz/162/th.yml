question: โปรโตคอล Bitcoin ให้รางวัลแก่นักขุดที่ค้นพบแฮชที่ถูกต้องสำหรับบล็อกถัดไปอย่างไร?
answer: ด้วยรางวัลที่กำหนดโดยกฎของฉันทามติ และด้วยค่าธรรมเนียมจากธุรกรรมทั้งหมดที่รวมอยู่ในบล็อกที่ถูกต้อง
wrong_answers:
  - ด้วยจำนวนบิตคอยน์ที่กำหนดไว้ไม่แน่นอนตามกฎของฉันทามติ
  - ด้วยเปอร์เซ็นต์ของอุปทาน Bitcoin ทั้งหมดและค่าธรรมเนียมจากธุรกรรมทั้งหมดที่รวมอยู่ในบล็อกก่อนหน้า
  - ด้วยค่าธรรมเนียมจากธุรกรรมทั้งหมดที่รวมอยู่ในบล็อกที่ถูกต้อง
explanation: |
  โปรโตคอล Bitcoin ให้รางวัลแก่ผู้ขุดที่พบแฮชที่ถูกต้องสำหรับบล็อกถัดไปด้วยรางวัลที่มีจำนวนกำหนดโดยกฎของฉันทามติ พร้อมกับค่าธรรมเนียมจากธุรกรรมทั้งหมดที่รวมอยู่ในบล็อกที่ถูกต้อง
reviewed: true
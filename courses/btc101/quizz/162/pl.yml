question: W jaki sposób protokół Bitcoin wynagradza górnika, który znajdzie ważny hasz dla kolejnego bloku?
answer: Nagrodą określoną przez zasady konsensusu i opłatami ze wszystkich transakcji zawartych w ważnym bloku.
wrong_answers:
  - Stałą ilością bitcoinów nieokreśloną przez zasady konsensusu.
  - Procentem całkowitej podaży bitcoina i opłatami ze wszystkich transakcji zawartych w poprzednich blokach.
  - Opłatami ze wszystkich transakcji zawartych w ważnym bloku.
explanation: |
  Protokół Bitcoin wynagradza górnika, który znajdzie prawidłowy
  hasz dla kolejnego bloku nagrodą, której kwota jest
  określona przez zasady konsensusu oraz opłatami od
  wszystkich transakcji zawartych w ważnym bloku.
reviewed: true

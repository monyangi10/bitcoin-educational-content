question: Wat is de potentiële impact van het huidige financiële systeem op politieke actoren?
answer: Ze worden niet gestimuleerd om radicale veranderingen door te voeren, waardoor het systeem zijn gang kan blijven gaan tot een mogelijke implosie.
wrong_answers:
  - Ze worden gestimuleerd om radicale veranderingen door te voeren om een mogelijke implosie te voorkomen.
  - Ze worden niet gestimuleerd om de status quo te handhaven om hun eigen rijkdom veilig te stellen.
  - Ze worden gestimuleerd om op lange termijn te denken.
explanation: |
  Omdat politieke actoren profiteren van het huidige financiële
  systeem, worden ze niet gestimuleerd om radicale veranderingen door te voeren.
  Hierdoor kan het systeem zijn gang blijven gaan tot een
  mogelijke implosie, omdat het systeem wordt gereguleerd en
  beperkt om zijn eigen ineenstorting te voorkomen.
reviewed: true
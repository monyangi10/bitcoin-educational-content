question: Hariho ikibazo c’amateka c’uko igipimo c’ugutera imbere kw’ibiciro ku musi ku musi kingana n’ibice 100 kw’ijana; vyabaye hehe kandi ryari?
answer: Muri Zimbabwe, 2007.
wrong_answers:
  - Muri Hongiriya, mu 1945.
  - Mu Bushinwa, 1940.
  - Ivyo mu vy’ukuri ni ikibazo kitari co kandi kidashobora kubaho.
explanation: |
  Igipimo c’ugutera imbere kw’ibiciro 100% ku musi ni ikintu gishoboka ko
  vyabaye muri Zimbabwe mu 2007, aho amahera afise agaciro nk’aka .
  n’incuro zibiri amasaha 24 yose.
reviewed: true
question: มีกรณีทางประวัติศาสตร์ที่อัตราเงินเฟ้อรายวันเทียบเท่ากับ 100%; มันเกิดขึ้นที่ไหนและเมื่อไหร่?
answer: ในซิมบับเว, 2007.
wrong_answers:
  - ในฮังการี, 1945.
  - ในประเทศจีน ปี 1940
  - นี่เป็นกรณีที่ไม่สมจริงที่ไม่สามารถเกิดขึ้นได้จริง
explanation: |
  อัตราเงินเฟ้อ 100% ต่อวันเป็นสถานการณ์ที่เกิดขึ้นจริงในซิมบับเวในปี 2007 ซึ่งมูลค่าเงินเพิ่มขึ้นประมาณสองเท่าทุก ๆ 24 ชั่วโมง
reviewed: true
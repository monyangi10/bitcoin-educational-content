question: Има исторически случай на дневен темп на инфлация, равен на 100%; къде и кога се е случило това?
answer: В Зимбабве, 2007 г.
wrong_answers:
  - В Унгария, 1945 г.
  - В Китай, 1940 г.
  - Това всъщност е нереалистичен случай, който не може да се случи.
explanation: |
  Инфлация от 100% на ден е реалистичен сценарий, който
  се случи в Зимбабве през 2007 г., когато стойността на парите приблизително
  удвояваше на всеки 24 часа.
reviewed: true
question: Wat is een van de mogelijke gevolgen van het niet volgen van de voorschriften van uw land bij het kopen van Bitcoin?
answer: Je kunt jezelf in gevaar brengen.
wrong_answers:
  - Je mag de prijs van Bitcoin verhogen.
  - Je mag de Supply van Bitcoin controleren.
  - Je kunt voorkomen dat anderen Bitcoin kopen.
explanation: |
  De cursustekst vermeldt dat het niet volgen van de voorschriften
  van uw land bij het kopen van Bitcoin u in gevaar kan brengen.
reviewed: true
question: ความเสี่ยงอย่างหนึ่งที่เกี่ยวข้องกับการซื้อ Bitcoin คืออะไร?
answer: ราคาของมันสามารถลดลงเหลือ 0
wrong_answers:
  - มันสามารถถูกขโมยได้ง่าย
  - มันสามารถทำซ้ำได้
  - มันสามารถสูญหายทางกายภาพได้
explanation: |
  ข้อความในหลักสูตรกล่าวว่า Bitcoin เป็นสินทรัพย์ทางการเงินที่มีความผันผวนสูง และราคาของมันสามารถลดลงเหลือ 0 ซึ่งเป็นหนึ่งในความเสี่ยงที่เกี่ยวข้องกับการซื้อ Bitcoin
reviewed: true
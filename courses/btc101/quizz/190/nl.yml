question: Wat is een van de risico's van het kopen van Bitcoin?
answer: De prijs kan dalen tot 0.
wrong_answers:
  - Het kan gemakkelijk gestolen worden.
  - Het kan worden gedupliceerd.
  - Het kan fysiek verloren gaan.
explanation: |
  De cursustekst vermeldt dat Bitcoin een zeer volatiel
  financieel actief is en dat de prijs tot 0 kan dalen, wat een van de
  van de risico's van het kopen van Bitcoin.
reviewed: true
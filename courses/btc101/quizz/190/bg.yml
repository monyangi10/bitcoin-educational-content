question: Какъв е един от рисковете, свързани с покупката на Bitcoin?
answer: Цената му може да падне до 0.
wrong_answers:
  - Той може лесно да бъде откраднат.
  - Може да се дублира.
  - Тя може да бъде загубена физически.
explanation: |
  В текста на курса се споменава, че Bitcoin е силно летлив
  финансов актив и цената му може да падне до 0, което е една
  от рисковете, свързани с покупката на Bitcoin.
reviewed: true
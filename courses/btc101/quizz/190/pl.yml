question: Jakie jest jedno z zagrożeń związanych z zakupem bitcoina?
answer: Jego cena może spaść do 0.
wrong_answers:
  - Można go łatwo ukraść.
  - Może być powielany.
  - Może zostać fizycznie utracony.
explanation: |
  W tekście kursu wspomniano, że bitcoin jest wysoce niestabilnym aktywem,
  a jego cena może spaść do 0, co jest jednym z ryzyk związanych z zakupem bitcoina.
reviewed: true

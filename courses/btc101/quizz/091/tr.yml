question: Mnemonic ifadenizi saklamak için kağıt kullanmanın önerilen bir alternatifi nedir?
answer: Metal bir plaka üzerine kazıyarak.
wrong_answers:
  - Dijital bir dosyada saklamak.
  - Beyaz tahtaya yazıyorum.
  - Telefonunuza bir kişi olarak kaydedin.
explanation: |
  Depolama için kağıda önerilen alternatiflerden biri
  gW-1 ifadenizi metal bir plaka üzerine kazımaktır. Bu
  çözümü daha dayanıklı ve uzun ömürlüdür.
reviewed: true
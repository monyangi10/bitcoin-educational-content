question: Wat is het aanbevolen gebruik van een offline, of Cold, fysieke Wallet?
answer: Grote hoeveelheden opslaan.
wrong_answers:
  - Dagelijkse uitgaven opslaan.
  - Kleine hoeveelheden bewaren.
  - Sparen op korte termijn.
explanation: |
  Een offline, of Cold, fysieke Wallet wordt aanbevolen voor
  voor het opslaan van grote bedragen, omdat deze minder kwetsbaar is voor
  online bedreigingen dan Hot portemonnees. Het is echter niet
  aanbevolen voor dagelijkse uitgaven, omdat het minder
  toegankelijk is voor dagelijkse transacties.
reviewed: true
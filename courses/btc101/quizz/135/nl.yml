question: Wat is een gesnoeide node in de context van Bitcoin?
answer: Een knooppunt dat alleen de laatste N blokken in het geheugen bewaart.
wrong_answers:
  - Een knooppunt dat alleen transacties valideert.
  - Een knooppunt dat alleen informatie verzendt naar andere knooppunten.
  - Een knooppunt dat alleen de regels van het Bitcoin protocol afdwingt.

question: Wat is de functie van de moeilijkheidsaanpassing in het Bitcoin netwerk?
answer: Het zorgt ervoor dat er ongeveer elke tien minuten een blok wordt toegevoegd aan de Blockchain.
wrong_answers:
  - Het bepaalt de prijs van Bitcoin.
  - Het regelt het aantal bitcoins dat kan worden gemined in de Blockchain.
  - Het bepaalt de grootte van een blok.

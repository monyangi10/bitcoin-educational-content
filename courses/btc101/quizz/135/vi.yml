question: Pruned Node (nút rút gọn) trong bối cảnh của Bitcoin là gì?
answer: Một nút chỉ giữ lại N khối cuối cùng trong bộ nhớ.
wrong_answers:
  - Một nút chỉ xác nhận các giao dịch.
  - Một nút chỉ truyền thông tin cho các nút khác.
  - Một nút chỉ thực thi các quy tắc của giao thức Bitcoin.
explanation: >-
  Một pruned Node (nút rút gọn) cắt tỉa trong bối cảnh của Bitcoin là một nút chỉ giữ lại
  N khối cuối cùng trong bộ nhớ.
reviewed: true
question: Wat is de analogie die in deze cursus wordt gebruikt om uit te leggen hoe je bitcoins kunt ontvangen zonder dat de verzender jouw geld kan stelen?
answer: Een brievenbus.
wrong_answers:
  - Een bankrekening.
  - Een kluis.
  - Een huis.
explanation: |
  De analogie die wordt gebruikt om uit te leggen hoe u Bitcoins kunt ontvangen
  zonder dat de verzender uw geld kan stelen is een
  brievenbus. Mensen deponeren er geld in, maar u bent de enige
  die hem kan openen.
reviewed: true
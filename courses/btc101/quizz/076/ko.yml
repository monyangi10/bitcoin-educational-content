question: 이 과정에서는 송금인이 자금을 훔치지 않고 비트코인을 받을 수 있는 방법을 설명하기 위해 어떤 비유를 사용하나요?
answer: 사서함입니다.
wrong_answers:
  - 은행 계좌.
  - 금고.
  - 집입니다.
explanation: |
  송금인이 자금을 도용하지 않고 비트코인을 받는 방법을 설명하기 위해 사용된 비유는
  송금인이 자금을 훔치지 않고 비트코인을 받는 방법을 설명하기 위해 사용된 비유는
  우편함입니다. 사람들이 우편함에 돈을 넣지만, 우편함을 열 수 있는 사람은 오직
  여러분만 열 수 있습니다.
reviewed: true
question: Jakiej analogii użyto w tym kursie, aby wyjaśnić, w jaki sposób można otrzymywać bitcoiny, nie pozwalając nadawcy na kradzież środków?
answer: Skrzynka pocztowa.
wrong_answers:
  - Konto bankowe.
  - Sejf.
  - Dom.
explanation: |
  Analogia używana do wyjaśnienia, w jaki sposób można otrzymywać bitcoiny
  nie pozwalając nadawcy na kradzież środków, to skrzynka pocztowa. Ludzie wpłacają do niej pieniądze, ale tylko ty możesz ją otworzyć.
reviewed: true

question: Каква аналогия се използва в този курс, за да се обясни как можете да получавате биткойни, без да позволите на изпращача да открадне средствата ви?
answer: Пощенска кутия.
wrong_answers:
  - Банкова сметка.
  - Сейф.
  - Къща.
explanation: |
  Аналогията, използвана за обяснение на начина, по който можете да получите биткойни
  без изпращачът да може да открадне средствата ви, е
  пощенска кутия. Хората депозират пари в нея, но вие сте единственият
  който може да я отвори.
reviewed: true
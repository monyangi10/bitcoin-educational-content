question: คำอุปมาในหลักสูตรนี้ที่ใช้อธิบายว่าคุณสามารถรับบิตคอยน์ได้อย่างไรโดยไม่ให้ผู้ส่งขโมยเงินของคุณคืออะไร?
answer: ตู้จดหมาย
wrong_answers:
  - บัญชีธนาคาร
  - ตู้เซฟ
  - บ้าน
explanation: |
  การเปรียบเทียบที่ใช้เพื่ออธิบายว่าคุณสามารถรับบิตคอยน์ได้อย่างไรโดยไม่ให้ผู้ส่งขโมยเงินของคุณคือกล่องจดหมาย ผู้คนฝากเงินในนั้น แต่คุณเป็นคนเดียวที่สามารถเปิดมันได้
reviewed: true
question: Bitcoin Wallet'de açık anahtarın rolü nedir?
answer: generate Bitcoin adresleri için kullanılır ve böylece para alır.
wrong_answers:
  - Bitcoin işlemlerini şifrelemek için kullanılır.
  - Bitcoin Wallet'ya erişmek için kullanılır.
  - Bitcoin Wallet'i yedeklemek için kullanılır.
explanation: |
  Açık anahtar özel anahtardan türetilir ve kullanılır
  para alabilmek için generate Bitcoin adreslerine göndermeleri gerekmektedir.
reviewed: true
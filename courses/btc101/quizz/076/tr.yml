question: Bu kursta, göndericinin paranızı çalmasına izin vermeden nasıl bitcoin alabileceğinizi açıklamak için kullanılan benzetme nedir?
answer: Bir posta kutusu.
wrong_answers:
  - Bir banka hesabı.
  - Bir kasa.
  - Bir ev.
explanation: |
  Bitcoin'leri nasıl alabileceğinizi açıklamak için kullanılan benzetme
  gönderenin paranızı çalmasına izin vermeden
  posta kutusu. İnsanlar içine para atıyor, ama sen sadece
  onu açabilecek biri.
reviewed: true
question: 장기적으로 비트코인을 안전하게 보관할 수 있는 방법은 무엇인가요?
answer: 강철과 같은 내구성 있는 소재에 Mnemonic 문구를 각인할 수 있습니다.
wrong_answers:
  - Hot Wallet에 저장합니다.
  - Exchange 플랫폼에 유지합니다.
  - 동료와 Mnemonic 문구를 공유하세요.
explanation: |
  강철과 같은 내구성 있는 소재에 Mnemonic 문구를 각인하면
  강철과 같은 내구성 있는 소재에 각인하면 물과 화재에 강한
  물과 화재에 강해 장기적으로 비트코인을 안전하게 보호할 수 있습니다
  장기적으로 비트코인을 보호할 수 있습니다.
reviewed: true
question: Jaka jest jedna z metod długoterminowego zabezpieczenia bitcoinów?
answer: Wygrawerowanie frazy mnemonicznej w odpornym materiale, takim jak stal.
wrong_answers:
  - Przechowywanie frazy mnemonicznej w gorącym portfelu.
  - Utrzymanie frazy mnemonicznej na platformie wymiany.
  - Podzielenie się frazą mnemoniczną ze współpracownikiem.
explanation: |
  Wygrawerowanie frazy mnemonicznej w odpornym materiale, takim jak stal, tworzy fizyczną kopię zapasową kluczy, która jest
  odporna zarówno na wodę, jak i ogień, i zabezpiecza w ten sposób
  bitcoiny w dłuższej perspektywie.
reviewed: true

question: "HODL" शब्द का क्या मतलब है?
answer: HODL क्रिप्टोकरेंसी कम्युनिटी में एक स्लैंग टर्म है जिसका मतलब होता है मार्केट के उतार-चढ़ाव के दौरान अपने इन्वेस्टमेंट को बेचने की बजाय होल्ड करके रखना।
wrong_answers:
  - जीडब्ल्यू-2 एक तरह की क्रिप्टोकरेंसी है जो सिर्फ ट्रेडिंग के लिए इस्तेमाल होती है।
  - HODL एक ऐसा शब्द है जिसका मतलब होता है कि आप अपनी सारी क्रिप्टोकरेंसी को ऊंचे दाम पर बेच दें।
  - जीडब्ल्यू-4 एक डे ट्रेडिंग की रणनीति है जिसमें बार-बार खरीदना और बेचना शामिल है।
explanation: |
  टर्म HODL की शुरुआत 2013 में Bitcoin फोरम पर एक गलत स्पेलिंग वाले ऑनलाइन पोस्ट से हुई थी। समय के साथ, HODL एक व्यापक निवेश रणनीति का प्रतीक बन गया है। यह निवेशकों को बाजार के उतार-चढ़ाव की परवाह किए बिना, लंबी अवधि तक अपनी क्रिप्टोकरेंसी को होल्ड करने के लिए प्रोत्साहित करता है।
reviewed: true
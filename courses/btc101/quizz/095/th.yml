question: วิธีหนึ่งในการรักษาความปลอดภัยของบิตคอยน์ในระยะยาวคืออะไร?
answer: สลักวลีช่วยจำของคุณบนวัสดุที่ทนทานเช่นเหล็ก
wrong_answers:
  - เก็บไว้ใน wallet ที่ร้อน
  - เก็บไว้บนแพลตฟอร์มแลกเปลี่ยน
  - การแบ่งปันวลีช่วยจำของคุณกับเพื่อนร่วมงาน
explanation: |
  การแกะสลักวลีช่วยจำของคุณบนวัสดุที่ทนทานเช่น
  เหล็กสร้างการสำรองข้อมูลทางกายภาพของกุญแจของคุณที่
  ทนทานต่อทั้งความเสียหายน้ำและไฟ จึงรักษาความปลอดภัย
  บิตคอยน์ของคุณในระยะยาว
reviewed: true
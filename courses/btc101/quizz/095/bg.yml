question: Какъв е начинът да защитите биткойните си в дългосрочен план?
answer: Гравиране на вашата мнемонична фраза върху устойчив материал като стомана.
wrong_answers:
  - Съхраняването им в горещ портфейл.
  - Поддържането им в платформа за обмен.
  - Споделяне на вашата мнемонична фраза с колега.
explanation: |
  Гравиране на вашата мнемонична фраза върху устойчив материал като
  стомана, създава физическо резервно копие на вашите ключове, което е
  устойчив на повреда от вода и пожар, като по този начин осигурява сигурността на вашите ключове
  биткойни в дългосрочен план.
reviewed: true

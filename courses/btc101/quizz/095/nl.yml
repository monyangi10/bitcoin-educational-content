question: Wat is een methode om je bitcoins op de lange termijn veilig te stellen?
answer: Graveer je Mnemonic zin op een bestendig materiaal zoals staal.
wrong_answers:
  - Opslaan in een Hot Wallet.
  - Ze op een Exchange platform houden.
  - Je Mnemonic zin delen met een collega.
explanation: |
  Door je Mnemonic zin te graveren op een bestendig materiaal zoals
  staal creëert een fysieke back-up van uw sleutels die
  bestand is tegen waterschade en brand, waardoor je bitcoins op de lange
  bitcoins op de lange termijn.
reviewed: true
question: Inom vilka områden väcker Bitcoin frågor?
answer: Kryptografi, spelteori, ekonomi och penningpolitik, datavetenskap, filosofi, energi, lagar och regler.
wrong_answers:
  - Endast datavetenskap och ekonomi
  - Endast kryptografi och spelteori.
  - Bara filosofi och energi.
explanation: |
  Bitcoin är ett tvärvetenskapligt ämne som väcker frågor
  frågor som rör olika områden, bland annat
  kryptografi, spelteori, ekonomi och penningpolitik,
  datavetenskap, filosofi, energi, lagar och reglering.
reviewed: true
question: Bitcoin ทำให้เกิดคำถามในด้านใดบ้าง?
answer: การเข้ารหัสลับ, ทฤษฎีเกม, เศรษฐศาสตร์และนโยบายการเงิน, วิทยาการคอมพิวเตอร์, ปรัชญา, พลังงาน, กฎหมาย, และระเบียบข้อบังคับ.
wrong_answers:
  - เฉพาะวิทยาการคอมพิวเตอร์และเศรษฐศาสตร์
  - เฉพาะการเข้ารหัสและทฤษฎีเกมเท่านั้น
  - มีเพียงปรัชญาและพลังงานเท่านั้น
explanation: |
  Bitcoin เป็นวิชาสหวิทยาการที่หยิบยกคำถามที่เกี่ยวข้องกับหลายสาขา รวมถึงการเข้ารหัสลับ ทฤษฎีเกม เศรษฐศาสตร์และนโยบายการเงิน วิทยาการคอมพิวเตอร์ ปรัชญา พลังงาน กฎหมาย และระเบียบข้อบังคับ
reviewed: true
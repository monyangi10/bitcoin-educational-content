question: Bitcoin hangi alanlarda soru işaretleri yaratıyor?
answer: Kriptografi, oyun teorisi, ekonomi ve para politikası, bilgisayar bilimi, felsefe, enerji, yasalar ve düzenlemeler.
wrong_answers:
  - Sadece bilgisayar bilimleri ve ekonomi
  - Sadece kriptografi ve oyun teorisi.
  - Sadece felsefe ve enerji.
explanation: |
  KİS-1 çok disiplinli bir konu olup, aşağıdaki konuları gündeme getirmektedir
  dahil olmak üzere çeşitli alanlarla ilgili sorular
  kriptografi, oyun teorisi, ekonomi ve para politikası,
  bilgisayar bilimi, felsefe, enerji, kanunlar ve yönetmelikler.
reviewed: true
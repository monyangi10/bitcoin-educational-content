question: В кои области Bitcoin повдига въпроси?
answer: Криптография, теория на игрите, икономика и парична политика, компютърни науки, философия, енергетика, закони и регулации.
wrong_answers:
  - Само компютърни науки и икономика
  - Само криптография и теория на игрите.
  - Само философия и енергия.
explanation: |
  Bitcoin е мултидисциплинарна тема, която повдига
  въпроси, свързани с различни области, включително
  криптографията, теорията на игрите, икономиката и паричната политика,
  компютърни науки, философия, енергетика, закони и регулации.
reviewed: true
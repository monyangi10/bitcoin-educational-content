question: Bitcoin은 어떤 분야에서 문제를 제기하나요?
answer: 암호화, 게임 이론, 경제학 및 통화 정책, 컴퓨터 과학, 철학, 에너지, 법률 및 규제.
wrong_answers:
  - 컴퓨터 과학 및 경제학만
  - 암호화와 게임 이론만 있습니다.
  - 오직 철학과 에너지.
explanation: |
  Bitcoin은 다학제적인 과목으로 다음과 같은 다양한 분야에 대한
  다음과 같은 다양한 분야와 관련된 질문을
  암호화, 게임 이론, 경제학 및 통화 정책
  컴퓨터 과학, 철학, 에너지, 법률 및 규제 등 다양한 분야에 관련된 문제를 제기합니다.
reviewed: true
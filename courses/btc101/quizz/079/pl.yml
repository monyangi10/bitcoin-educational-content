question: Co to jest zimny portfel?
answer: Wallet to fizyczne urządzenie, które przechowuje klucze i nie jest połączone z Internetem.
wrong_answers:
  - Portfel, który jest zimny w dotyku.
  - Portfel, który jest niepopularny wśród użytkowników Bitcoina.
  - Portfel, który jest zalecany do przechowywania niewielkich ilości bitcoinów.
explanation: |
  Zimny portfel to termin używany do opisania portfela,
  który jest przechowywany na urządzeniu, które nie jest podłączone do Internetu. Dzięki temu jest mniej podatny na zagrożenia online,
  ale oznacza to również, że jest on mniej dostępny do wykonywania codziennych transakcji.
reviewed: true

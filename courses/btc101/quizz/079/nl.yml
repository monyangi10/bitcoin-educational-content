question: Hoe kun je de standaardbeveiliging van je Bitcoin Wallet versterken?
answer: Door een passphrase toe te voegen aan je Bitcoin Wallet.
wrong_answers:
  - Door een tweede privésleutel aan je Bitcoin Wallet toe te voegen.
  - Door een tweede publieke sleutel toe te voegen aan je Bitcoin Wallet.
  - Door een tweede Mnemonic zin toe te voegen aan je Bitcoin Wallet.
explanation: |
  Als je niet tevreden bent met de standaardbeveiliging van je
  Bitcoin Wallet, kun je die altijd versterken door een
  passphrase toe te voegen aan je Bitcoin Wallet.
reviewed: true
question: Какво представлява студеният портфейл?
answer: физическо устройство, което съхранява вашите ключове и не е свързано с интернет.
wrong_answers:
  - портфейл, който е физически студен при допир.
  - портфейл, който е непопулярен сред потребителите на Bitcoin.
  - портфейл, който се препоръчва за съхранение на малки количества биткойни.
explanation: |
  Студен портфейл е термин, използван за описание на Bitcoin портфейл
  който се съхранява на устройство, което не е свързано с
  интернет. Това го прави по-малко уязвим към онлайн заплахи,
  но също така означава, че портфейл е по-малко достъпен за
  ежедневните транзакции.
reviewed: true

question: wallet เย็นคืออะไร?
answer: wallet ในอุปกรณ์ทางกายภาพที่เก็บกุญแจของคุณและไม่ได้เชื่อมต่อกับอินเทอร์เน็ต
wrong_answers:
  - wallet ที่เย็นจนสัมผัสได้
  - wallet ที่ไม่เป็นที่นิยมในหมู่ผู้ใช้ Bitcoin
  - wallet ที่แนะนำสำหรับการเก็บบิตคอยน์ในปริมาณเล็กน้อย
explanation: |
  wallet แบบเย็นเป็นคำที่ใช้เพื่ออธิบาย Bitcoin wallet ซึ่งถูกเก็บไว้ในอุปกรณ์ที่ไม่ได้เชื่อมต่อกับอินเทอร์เน็ต ซึ่งทำให้มีความเสี่ยงต่อภัยคุกคามออนไลน์น้อยลง แต่ก็หมายความว่า wallet จะเข้าถึงได้ยากขึ้นสำหรับการทำธุรกรรมประจำวัน
reviewed: true
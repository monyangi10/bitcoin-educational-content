question: Cold Wallet nedir?
answer: Wallet, anahtarlarınızı saklayan ve internete bağlı olmayan fiziksel bir cihazdır.
wrong_answers:
  - Dokunulduğunda fiziksel olarak Cold olan bir Wallet.
  - Bitcoin kullanıcıları arasında popüler olmayan bir Wallet.
  - Küçük miktarlarda bitcoin saklamak için önerilen bir Wallet.
explanation: |
  Cold Wallet, Bitcoin Wallet'u tanımlamak için kullanılan bir terimdir
  bağlı olmayan bir cihazda depolanan
  internet. Bu da onu çevrimiçi tehditlere karşı daha az savunmasız hale getirir,
  ancak bu aynı zamanda Wallet'a daha az erişilebileceği anlamına da geliyor
  günlük işlemler.
reviewed: true
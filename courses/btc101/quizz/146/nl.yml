question: Waarom is het belangrijk dat een Bitcoin knooppunt betaalbaar en toegankelijk blijft voor alle mogelijke gebruikers?
answer: Omdat het de decentralisatie van het netwerk vergemakkelijkt.
wrong_answers:
  - Omdat het de transactiecapaciteit van het netwerk verhoogt.
  - Omdat het de transactiecapaciteit van het netwerk vermindert.
  - Omdat het de Block reward voor mijnwerkers verhoogt.
explanation: |
  De betaalbare kosten en toegankelijkheid van een Bitcoin knooppunt is
  belangrijk omdat het de decentralisatie van
  het netwerk.
reviewed: true
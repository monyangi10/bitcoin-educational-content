question: Какъв е основният недостатък на фиатните валути?
answer: Стойността им постоянно се намалява от паричната инфлация.
wrong_answers:
  - Те не са лесно преносими.
  - Тяхната стойност постоянно се повишава в резултат на паричната инфлация.
  - Те не са делими.
explanation: |
  Основният недостатък на фиатните валути, като например
  долара и еврото, е, че стойността им постоянно се
  от паричната инфлация. Това се дължи на
  девалвацията, причинена от субектите, които ги контролират (крал, цар,
  централна банка, император, диктатор).
reviewed: true

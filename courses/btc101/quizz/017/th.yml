question: ข้อเสียหลักของสกุลเงินเฟียตคืออะไร?
answer: มูลค่าของพวกเขาถูกกัดกร่อนอย่างต่อเนื่องโดยเงินเฟ้อทางการเงิน
wrong_answers:
  - พวกมันไม่สามารถขนย้ายได้ง่าย
  - มูลค่าของพวกเขาเพิ่มขึ้นอย่างต่อเนื่องจากเงินเฟ้อทางการเงิน
  - พวกมันไม่สามารถหารได้ลงตัว
explanation: |
  ข้อเสียหลักของสกุลเงินเฟียต เช่น ดอลลาร์และยูโร คือมูลค่าของพวกมันถูกกัดกร่อนอย่างต่อเนื่องจากเงินเฟ้อทางการเงิน นี่เป็นผลมาจากการลดค่าเงินที่เกิดจากหน่วยงานที่ควบคุมพวกมัน (กษัตริย์ ธนาคารกลาง จักรพรรดิ ผู้เผด็จการ)
reviewed: true
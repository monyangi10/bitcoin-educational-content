question: Wat is het grootste nadeel van fiatvaluta's?
answer: Hun waarde wordt voortdurend uitgehold door monetaire inflatie.
wrong_answers:
  - Ze zijn niet gemakkelijk te vervoeren.
  - Hun waarde wordt constant verhoogd door monetaire inflatie.
  - Ze zijn niet deelbaar.
explanation: |
  Het grootste nadeel van fiatvaluta's, zoals de
  dollar en de euro, is dat hun waarde voortdurend wordt
  wordt uitgehold door monetaire inflatie. Dit komt door de
  devaluatie veroorzaakt door de entiteiten die ze controleren (koning,
  centrale bank, keizer, dictator).
reviewed: true
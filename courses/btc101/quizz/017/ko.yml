question: 법정 화폐의 주요 단점은 무엇인가요?
answer: 화폐 인플레이션으로 인해 그 가치는 지속적으로 약화되고 있습니다.
wrong_answers:
  - 쉽게 운반할 수 없습니다.
  - 화폐 인플레이션으로 인해 그 가치는 지속적으로 상승하고 있습니다.
  - 분할할 수 없습니다.
explanation: |
  달러와 유로와 같은 법정 화폐의 가장 큰 단점은
  달러와 유로와 같은 법정 화폐의 주요 단점은 통화 인플레이션으로 인해 가치가 지속적으로
  화폐 인플레이션에 의해 가치가 지속적으로 하락한다는 것입니다. 이는 통화를 통제하는 주체에 의한
  통화를 통제하는 주체에 의한 평가 절하(왕
  중앙은행, 황제, 독재자) 때문입니다.
reviewed: true
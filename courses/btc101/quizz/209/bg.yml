question: Какво е състоянието на Bitcoin в Салвадор?
answer: Законно платежно средство.
wrong_answers:
  - Криминализиран.
  - Неизвестно.
  - Нерегулиран.
explanation: |
  В текста на курса се споменава, че някои страни са забранили
  и криминализират употребата на Bitcoin, което допълнително
  сложността на приемането на Bitcoin в зависимост от културите, епохите и
  нации. Въпреки това Салвадор е бил достатъчно смел, за да го приеме
  като законно платежно средство.
reviewed: true
question: Kakav je status Bitkoina u El Salvadoru?
answer: Zakonsko sredstvo plaćanja.
wrong_answers:
  - Kriminalizovano.
  - Nepoznato.
  - Neregulisano.
explanation: |
  Tekst kursa pominje da su neke zemlje zabranile i kriminalizovale upotrebu Bitkoina, što dodaje složenost usvajanju Bitkoina zasnovanom na kulturama, epohama i nacijama. Međutim, El Salvador je bio dovoljno hrabar da ga usvoji kao zakonsko sredstvo plaćanja.
reviewed: true

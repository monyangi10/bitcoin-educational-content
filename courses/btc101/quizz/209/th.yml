question: สถานะของ Bitcoin ในเอลซัลวาดอร์เป็นอย่างไร?
answer: เงินที่ชำระหนี้ได้ตามกฎหมาย
wrong_answers:
  - ถูกทำให้เป็นอาชญากรรม
  - ไม่ทราบ
  - ไม่มีการควบคุม
explanation: |
  ข้อความในหลักสูตรกล่าวถึงว่าบางประเทศได้ห้ามและทำให้การใช้ Bitcoin เป็นอาชญากรรม ซึ่งเพิ่มความซับซ้อนในการนำ Bitcoin มาใช้ตามวัฒนธรรม ยุคสมัย และประเทศต่างๆ อย่างไรก็ตาม เอลซัลวาดอร์กล้าพอที่จะนำมาใช้เป็นเงินที่ถูกกฎหมาย
reviewed: true
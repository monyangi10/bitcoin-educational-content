question:  Bagaimana status Bitcoin di El Salvador
answer: Alat pembayaran yang sah.
wrong_answers:
  - Kriminalisasi.
  - Tidak diketahui.
  - Tidak diatur.
explanation: >-
  Teks kuliah menyebutkan bahwa beberapa negara telah melarang
  dan mengkriminalisasi penggunaan Bitcoin, yang menambah
  kompleksitas adopsi Bitcoin berdasarkan budaya, era, dan
  negara. Namun, El Salvador cukup berani untuk mengadopsinya
  sebagai alat pembayaran yang sah.
reviewed: true

question: Jaki jest status Bitcoina w Salwadorze?
answer: Prawny środek płatniczy.
wrong_answers:
  - Kryminalizacja.
  - Nieznany.
  - Nieuregulowany.
explanation: |
  W tekście kursu wspomniano, że niektóre kraje zakazały
  i skryminalizowały użycie Bitcoina, dodając do tego
  złożoność przyjęcia Bitcoina w oparciu o kultury, epoki i narody. Jednak Salwador był na tyle odważny, by przyjąć Bitcoina
  jako legalny środek płatniczy.
reviewed: true

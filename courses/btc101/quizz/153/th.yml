question: เกิดอะไรขึ้นในกรณีการโจมตี 51% บนเครือข่าย Bitcoin?
answer: ตัวแทนมี hashrate มากกว่าครึ่งและสามารถพยายามแก้ไขบล็อกเชนได้
wrong_answers:
  - ตัวแทนควบคุมบิตคอยน์มากกว่าครึ่งหนึ่งที่หมุนเวียนอยู่
  - ตัวแทนควบคุมโหนดมากกว่าครึ่งหนึ่งในเครือข่าย Bitcoin ได้
  - ตัวแทนควบคุมมากกว่าครึ่งหนึ่งของกลุ่ม mining ใน Bitcoin
explanation: |
  ในการโจมตีแบบ 51% ตัวแทนที่มีมากกว่าครึ่งหนึ่งของเครือข่าย hashrate อาจสามารถจัดการบล็อกเชนได้โดยการสร้างสายโซ่บล็อกทางเลือก อย่างไรก็ตาม การโจมตีดังกล่าวจะมีค่าใช้จ่ายสูงมากและไม่น่าจะทำกำไรได้ ทำให้เป็นสถานการณ์ที่ไม่น่าเป็นไปได้
reviewed: true
question: Bitcoin 네트워크에서 51% 공격이 발생하면 어떻게 되나요?
answer: 에이전트는 Hashrate의 절반 이상을 소유하고 있으며 Blockchain의 수정을 시도할 수 있습니다.
wrong_answers:
  - 에이전트는 유통되는 비트코인의 절반 이상을 통제할 수 있습니다.
  - 에이전트는 Bitcoin 네트워크의 절반 이상의 노드를 제어할 수 있습니다.
  - 에이전트는 Bitcoin에서 Mining 풀의 절반 이상을 제어할 수 있습니다
explanation: |
  51% 공격에서 네트워크 Hashrate의 절반 이상을 가진 에이전트는
  네트워크 Hashrate의 절반 이상을 가진 에이전트는 잠재적으로
  대체 블록 체인을 생성하여 Blockchain을 조작할 수 있습니다.
  그러나 이러한 공격은 비용이 매우 많이 들고
  수익성이 낮기 때문에 실현 가능성이 낮은 시나리오입니다.
reviewed: true
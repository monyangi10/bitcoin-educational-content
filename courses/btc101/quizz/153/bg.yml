question: Какво се случва при 51% атака на мрежата Bitcoin?
answer: Един агент притежава повече от половината от хашрейт и може да се опита да модифицира блокчейна.
wrong_answers:
  - Един агент получава контрол над повече от половината биткойни в обращение.
  - Един агент получава контрол над повече от половината възли в мрежата Bitcoin.
  - Агентът получава контрол върху повече от половината от пуловете mining в Bitcoin
explanation: |
  При 51% атака агент с повече от половината от
  хашрейта в мрежата може потенциално да манипулира
  блокчейн, като създаде алтернативна верига от блокове.
  Такава атака обаче би била изключително скъпа и
  малко вероятно да бъде печеливша, което я прави малко вероятен сценарий.
reviewed: true

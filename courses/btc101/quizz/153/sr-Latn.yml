question: Šta se dešava u napadu od 51% na Bitkoin mrežu?
answer: Agent poseduje više od polovine Hashrate-a i može pokušati da modifikuje Blockchain.
wrong_answers:
  - Agent preuzima kontrolu nad više od polovine bitkoina u opticaju.
  - Agent preuzima kontrolu nad više od polovine čvorova u Bitkoin mreži.
  - Agent preuzima kontrolu nad više od polovine Mining pool-ova u Bitkoinu
explanation: |
  U napadu od 51%, agent sa više od polovine
  Hashrate-a mogao bi potencijalno manipulisati
  Blockchain-om kreiranjem alternativnog lanca blokova.
  Međutim, takav napad bi bio izuzetno skup i
  verovatno ne bi bio isplativ, što ga čini malo verovatnim scenarijem.
reviewed: true

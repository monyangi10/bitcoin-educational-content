question: Какво рискува Lightning възел, който публикува старо състояние на канала?
answer: Наказание
wrong_answers:
  - Предупреждение
  - Допълнителни такси за копаене
  - Временно замразяване
explanation: |
  Протоколът предвижда възпираща санкция, която позволява на другата страна да възстанови всички средства.

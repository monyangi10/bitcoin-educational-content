question: Какво представлява трилемата на блокчейн?
answer: Протокол, базиран на блокчейн, може да удовлетвори само два от критериите за децентрализация, сигурност и мащабируемост.
wrong_answers:
  - Протокол, базиран на блокчейн, може да удовлетвори само един от критериите за децентрализация, сигурност и мащабируемост.
  - Протокол, базиран на блокчейн, може да удовлетвори всички критерии за децентрализация, сигурност и мащабируемост.
  - Протокол, базиран на блокчейн, не може да удовлетвори нито един от критериите за децентрализация, сигурност и мащабируемост.
explanation: |
  Трилемата за блокчейн се отнася до предизвикателството, че един
  протокол, базиран на блокчейн, може да удовлетвори само два критерия от
  децентрализация, сигурност и мащабируемост.
reviewed: true
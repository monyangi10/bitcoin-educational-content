question: Ni hatari gani nodi ya Lightning hukabiliwa nayo inapochapisha hali ya zamani ya kituo?
answer: Adhabu
wrong_answers:
  - Onyo
  - Ada za ziada za uchimbaji
  - Kugandishwa kwa muda
explanation: |
  Itifaki inaweka adhabu ya kuzuia inayomruhusu upande mwingine kurejesha fedha zote.

question: Какому риску подвергается узел Lightning, публикующий старое состояние канала?
answer: Штрафу
wrong_answers:
  - Предупреждению
  - Дополнительным комиссиям за майнинг
  - Временному замораживанию
explanation: |
  Протокол предусматривает сдерживающий штраф, позволяющий другой стороне вернуть все средства.
reviewed: false

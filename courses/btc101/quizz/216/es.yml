question: ¿Qué riesgo corre un nodo Lightning al publicar un estado antiguo del canal?
answer: Una penalización
wrong_answers:
  - Una advertencia
  - Comisiones de minado adicionales
  - Una congelación temporal
explanation: |
  El protocolo prevé una penalización disuasoria que permite a la otra parte recuperar la totalidad de los fondos.

question: Czym jest trylemat łańcucha bloków?
answer: Protokół oparty na łańcuchu bloków może spełnić tylko dwa z następujących kryteriów, decentralizacja, bezpieczeństwo i skalowalność.
wrong_answers:
  - Protokół oparty na łańcuchu bloków może spełnić tylko jedno z następujących kryteriów: decentralizacja, bezpieczeństwo i skalowalność.
  - Protokół oparty na łańcuchu bloków może spełnić wszystkie z następujących kryteriów: decentralizacja, bezpieczeństwo i skalowalność.
  - Protokół oparty na łańcuchu bloków nie może spełnić żadnego z następujących kryteriów: decentralizacja, bezpieczeństwo i skalowalność.
explanation: |
  Trylemat łańcucha bloków odnosi się do wyzwania polegającego na tym, że
  protokół na nim oparty może spełnić tylko dwa spośrod następujących kryteriów:
  decentralizacja, bezpieczeństwo i skalowalność.
reviewed: true

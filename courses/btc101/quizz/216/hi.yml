question: किसी पुराने चैनल स्टेट को प्रकाशित करने पर एक Lightning नोड को क्या जोखिम होता है?
answer: एक दंड
wrong_answers:
  - चेतावनी
  - अतिरिक्त माइनिंग शुल्क
  - अस्थायी फ्रीज़
explanation: |
  प्रोटोकॉल एक निवारक दंड का प्रावधान करता है, जिससे दूसरी पक्ष को सभी धनराशि वापस प्राप्त करने की अनुमति मिलती है।
reviewed: false

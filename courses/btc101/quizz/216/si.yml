question: පැරණි නාලිකා තත්ත්වයක් ප්‍රකාශයට පත් කළහොත් Lightning නෝඩ් එකක්ට ඇති අවදානම කුමක්ද?
answer: දඩයක්
wrong_answers:
  - අනතුරු ඇඟවීමක්
  - අමතර මයිනින් ගාස්තු
  - තාවකාලික තහනමක්
explanation: |
  ප්‍රොටෝකෝලය අනෙකුත් පාර්ශ්වයට සියලු මුදල් නැවත ලබා ගැනීමට ඉඩ සලසන වැළැක්වීමේ දඩයක් සපයයි.
reviewed: false

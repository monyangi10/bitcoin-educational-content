question: Lightning node เสี่ยงต่อการสูญเสียเงินทุนทั้งหมดในช่องทางโดยการเผยแพร่สถานะช่องทางเก่า
answer: การลงโทษ
wrong_answers:
  - คำเตือน
  - ค่าธรรมเนียม mining เพิ่มเติม
  - การหยุดชั่วคราว
explanation: |
  โปรโตคอลกำหนดบทลงโทษที่เป็นการยับยั้งให้ฝ่ายอื่นสามารถกู้คืนเงินทั้งหมดได้
reviewed: false
question: Blockchain trilemması nedir?
answer: Blockchain'e dayalı bir protokol, ademi merkeziyetçilik, güvenlik ve ölçeklenebilirlik kriterlerinden yalnızca ikisini karşılayabilir.
wrong_answers:
  - Blockchain'ye dayalı bir protokol, ademi merkeziyetçilik, güvenlik ve ölçeklenebilirlik kriterlerinden yalnızca birini karşılayabilir.
  - Blockchain'e dayalı bir protokol, ademi merkeziyetçilik, güvenlik ve ölçeklenebilirlik kriterlerinin tümünü karşılayabilir.
  - Blockchain'e dayalı bir protokol, ademi merkeziyetçilik, güvenlik ve ölçeklenebilirlik kriterlerinin hiçbirini karşılayamaz.
explanation: |
  Blockchain trilemması, bir devlet kurumunun
  gW-5'e dayalı protokol, aşağıdaki kriterlerden yalnızca ikisini karşılayabilir
  ademi merkeziyetçilik, güvenlik ve ölçeklenebilirlik.
reviewed: true
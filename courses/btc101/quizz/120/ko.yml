question: Bitcoin 거래에서 거래 수수료의 목적은 무엇인가요?
answer: 이는 채굴자가 다음 블록에 트랜잭션을 포함하도록 하는 인센티브입니다.
wrong_answers:
  - 이는 정부에서 부과하는 세금입니다.
  - 이는 Bitcoin 네트워크에서 서비스 사용에 대해 부과하는 수수료입니다.
  - Wallet 제공업체에서 부과하는 수수료입니다.
explanation: |
  Bitcoin 트랜잭션의 트랜잭션 수수료는
  채굴자가 다음 블록에 해당 트랜잭션을 포함하도록 하는
  블록에 포함하도록 유도합니다. 수수료는 블록에 트랜잭션을 포함하기 위한 자유 시장을 조성합니다
  트랜잭션을 포함하는 자유 시장을 형성합니다.
reviewed: true
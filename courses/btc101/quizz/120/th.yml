question: วัตถุประสงค์ของค่าธรรมเนียมการทำธุรกรรมในธุรกรรม Bitcoin คืออะไร?
answer: พวกเขาเป็นแรงจูงใจสำหรับนักขุดในการรวมธุรกรรมในบล็อกถัดไป
wrong_answers:
  - พวกเขาเป็นภาษีที่รัฐบาลกำหนด
  - พวกเขาคือค่าธรรมเนียมที่เรียกเก็บโดยเครือข่าย Bitcoin สำหรับการใช้บริการของมัน
  - พวกเขาคือค่าธรรมเนียมที่เรียกเก็บโดยผู้ให้บริการ wallet
explanation: |
  ค่าธรรมเนียมการทำธุรกรรมในธุรกรรม Bitcoin ทำหน้าที่เป็นแรงจูงใจให้กับนักขุดในการรวมธุรกรรมในบล็อกถัดไป ค่าธรรมเนียมสร้างตลาดเสรีสำหรับการรวมธุรกรรมในบล็อก
reviewed: true
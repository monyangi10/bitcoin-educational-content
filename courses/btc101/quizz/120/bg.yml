question: Каква е целта на транзакционните такси при транзакциите Bitcoin?
answer: Те са стимул за миньорите да включат транзакцията в следващия блок.
wrong_answers:
  - Те са данък, наложен от правителството.
  - Те представляват такса, начислявана от мрежата Bitcoin за използване на нейните услуги.
  - Те представляват такса, начислявана от доставчика на портфейла.
explanation: |
  Таксите за транзакции при транзакции Bitcoin служат като
  стимул за миньорите да включат транзакцията в следващата
  блок. Таксите създават свободен пазар за включване на
  транзакции в блокове.
reviewed: true

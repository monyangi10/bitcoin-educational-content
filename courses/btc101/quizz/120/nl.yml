question: Wanneer is Bitcoin voor het eerst gebruikt om fysieke goederen te kopen?
answer: Toen Laszlo Hanyecz 2 pizza's kocht voor 10.000 BTC.
wrong_answers:
  - Toen Hal Finney een auto kocht voor 100.000 BTC.
  - Toen Satoshi Nakamoto een huis kocht voor 1.000.000.000 BTC.
  - Geen van de andere opties.
explanation: |
  De eerste keer dat Bitcoin werd gebruikt om fysieke goederen te kopen, was toen
  goederen was toen Laszlo Hanyecz 2 pizza's kocht voor 10.000
  BTC, op 2010/05/22, wat nu bekend staat als Pizza Dag
reviewed: true
question: Каква е последицата от хиперинфлацията?
answer: Драстично намаляване на стойността на валутата.
wrong_answers:
  - Малък спад в стойността на валутата.
  - Драстично увеличение на стойността на валутата.
  - Малко увеличение на стойността на валутата.
explanation: |
  Поради хиперинфлацията хората бързо имат
  пълна загуба на доверие във валутата, което води до
  драстично намаляване на нейната стойност за кратък период от време
  за кратко време.
reviewed: true
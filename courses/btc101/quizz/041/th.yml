question: ผลกระทบของภาวะเงินเฟ้อสูงคืออะไร?
answer: การลดลงอย่างมากในมูลค่าของสกุลเงิน
wrong_answers:
  - การลดลงเล็กน้อยในมูลค่าของสกุลเงิน
  - การเพิ่มขึ้นอย่างมากในมูลค่าของสกุลเงิน
  - การเพิ่มขึ้นเล็กน้อยในมูลค่าของสกุลเงิน
explanation: |
  เนื่องจากภาวะเงินเฟ้อรุนแรง บุคคลทั่วไปสูญเสียความเชื่อมั่นในสกุลเงินอย่างรวดเร็ว ซึ่งนำไปสู่การลดลงของมูลค่าอย่างมากในช่วงเวลาสั้น ๆ
reviewed: true
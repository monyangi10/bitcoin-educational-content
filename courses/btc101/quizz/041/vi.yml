question: Hậu quả của siêu lạm phát là gì?
answer: Một sự giảm giá trị nghiêm trọng của đồng tiền.
wrong_answers:
  - Một sự giảm nhỏ giá trị của đồng tiền.
  - Một sự tăng nghiêm trọng giá trị của đồng tiền.
  - Một sự tăng nhỏ giá trị của đồng tiền.
explanation: |
  Do lạm phát cao, mọi người nhanh chóng mất hoàn toàn niềm tin vào đồng tiền, dẫn đến
  một sự giảm giá trị nghiêm trọng của nó trong một khoảng thời gian ngắn.
reviewed: true
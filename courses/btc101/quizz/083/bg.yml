question: Каква е препоръчителната употреба на мобилен портфейл?
answer: Съхраняване на ежедневните разходи.
wrong_answers:
  - Съхраняване на дългосрочни спестявания.
  - Съхраняване на средносрочни спестявания.
  - Съхраняване на големи количества.
explanation: |
  Мобилен портфейл се препоръчва за ежедневни разходи, защото
  с него лесно се извършват транзакции. Въпреки това, той
  не се препоръчва за съхраняване на големи суми или за
  дългосрочни спестявания, тъй като е потенциално уязвим на
  онлайн заплахи.
reviewed: true

question: Wat is het aanbevolen gebruik van een mobiele Wallet?
answer: Dagelijkse uitgaven opslaan.
wrong_answers:
  - Sparen op lange termijn.
  - Sparen op middellange termijn.
  - Grote hoeveelheden opslaan.
explanation: |
  Een mobiele Wallet wordt aanbevolen voor dagelijkse uitgaven omdat
  het gemakkelijk is om er transacties mee uit te voeren. Het
  niet aanbevolen voor het opslaan van grote bedragen of voor
  langetermijnsparen, omdat het potentieel kwetsbaar is voor
  online bedreigingen.
reviewed: true
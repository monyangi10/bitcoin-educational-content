question: Jakie jest zalecane zastosowanie portfela mobilnego?
answer: Przechowywanie kwot do codziennych wydatków.
wrong_answers:
  - Przechowywanie długoterminowych oszczędności.
  - Przechowywanie oszczędności średnioterminowych.
  - Przechowywanie dużych ilości pieniędzy.
explanation: |
  Portfel mobilny jest zalecany do codziennych wydatków, ponieważ
  łatwo za jego pomocą przeprowadzać transakcje. Jednakże
  nie jest zalecany do przechowywania dużych kwot lub
  długoterminowych oszczędności, ponieważ jest potencjalnie podatny na
  zagrożenia internetowe.
reviewed: true

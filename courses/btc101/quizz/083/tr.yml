question: Mobil Wallet için önerilen kullanım şekli nedir?
answer: Günlük harcamaların saklanması.
wrong_answers:
  - Uzun vadeli birikimlerin saklanması.
  - Orta vadeli tasarrufların saklanması.
  - Büyük miktarlarda depolama.
explanation: |
  Günlük harcamalar için mobil bir Wallet önerilir çünkü
  onunla işlem yapmak kolaydır. Ancak, bu
  büyük miktarlarda depolamak için veya
  uzun vadeli tasarruflar çünkü potansiyel olarak
  çevrimiçi tehditler.
reviewed: true
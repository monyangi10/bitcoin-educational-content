question: การใช้ที่แนะนำของ wallet มือถือคืออะไร?
answer: การจัดเก็บค่าใช้จ่ายรายวัน
wrong_answers:
  - การเก็บออมระยะยาว
  - การเก็บออมระยะกลาง
  - การจัดเก็บจำนวนมาก
explanation: |
  แนะนำให้ใช้ wallet มือถือสำหรับค่าใช้จ่ายประจำวันเพราะ
  สามารถทำธุรกรรมได้ง่าย อย่างไรก็ตาม
  ไม่แนะนำให้ใช้สำหรับการเก็บเงินจำนวนมากหรือ
  การออมระยะยาวเพราะอาจมีความเสี่ยงต่อ
  ภัยคุกคามออนไลน์
reviewed: true
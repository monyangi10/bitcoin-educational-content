question: Какъв беше проектът DigiCash?
answer: Опит за създаване на анонимни електронни пари от Дейвид Чаум.
wrong_answers:
  - Проект за създаване на цифров портфейл за Bitcoin.
  - Опит за дигитализиране на всички физически парични средства от страна на Федералния резерв.
  - Проект за създаване на криптовалута, базирана на Bitcoin.
explanation: |
  Дейвид Чаум представи концепцията за анонимни електронни
  с проекта си DigiCash през 80-те години на миналия век.
reviewed: true

question: Wat moet er volgens Nobelprijswinnaar F.A Hayek gebeuren om weer goed geld te hebben?
answer: We nemen de zaak uit handen van de overheid.
wrong_answers:
  - We geven het ding aan een betere regering.
  - We geven het ding aan een autoritaire regering.
  - We nemen de zaak uit handen van de mensen.
explanation: |
  Hayek zegt: "Ik geloof niet dat we ooit nog goed geld zouden moeten hebben, voordat we het ding uit handen van de overheid hebben genomen. Als we ze niet met geweld uit handen van de overheid kunnen nemen, dan is het enige wat we kunnen doen op de een of andere slinkse manier iets introduceren wat zij niet kunnen stoppen."
reviewed: true
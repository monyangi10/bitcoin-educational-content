question: โครงการ DigiCash คืออะไร?
answer: ความพยายามในการสร้างเงินอิเล็กทรอนิกส์แบบไม่ระบุตัวตนโดย David Chaum.
wrong_answers:
  - โครงการสร้าง wallet ดิจิทัลสำหรับ Bitcoin
  - ความพยายามในการแปลงเงินสดทั้งหมดให้เป็นดิจิทัลโดยธนาคารกลางสหรัฐฯ
  - โครงการสร้างสกุลเงินดิจิทัลโดยใช้ Bitcoin
explanation: |
  David Chaum แนะนำแนวคิดของเงินอิเล็กทรอนิกส์แบบไม่ระบุตัวตนด้วยโครงการ DigiCash ของเขาในทศวรรษ 1980
reviewed: true
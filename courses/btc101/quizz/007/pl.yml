question: Czym był projekt DigiCash?
answer: Próbą stworzenia anonimowego pieniądza elektronicznego przez Davida Chauma.
wrong_answers:
  - Projektem stworzenia cyfrowego portfela Bitcoina.
  - Próbą digitalizacji całej fizycznej gotówki przez Rezerwę Federalną.
  - Projektem stworzenia kryptowaluty opartej na Bitcoinie.
explanation: |
  David Chaum wprowadził koncepcję anonimowych pieniędzy elektronicznych
  w swoim projekcie DigiCash w latach 80-tych.
reviewed: true

question: नोबेल पुरस्कार विजेता एफ.ए. हायेक के अनुसार, अच्छे पैसे (मुद्रा) को फिर से प्राप्त करने के लिए क्या होना चाहिए?
answer: हम सरकार के हाथ से चीज़ को छीन लेते हैं।
wrong_answers:
  - हम एक अच्छी सरकार को चीज़ देते हैं।
  - हम एक तानाशाह सरकार को चीज़ देते हैं।
  - हम लोग लोगों के हाथ से चीज़ छीन लेते हैं।
  Hayek says: "I don't believe that we should ever have a good money again, before we take the thing out of the hands of the government. If we can't take them violently out of the hands of the government, all we can do is by some sly or roundabout way introduce something they can't stop."
reviewed: true
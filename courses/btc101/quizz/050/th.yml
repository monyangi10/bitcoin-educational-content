question: อัตราเงินเฟ้อในซิมบับเวในเดือนพฤศจิกายน 2008 อยู่ที่เท่าไร?
answer: 79,600,000,000%
wrong_answers:
  - 796%
  - 79,600,000,000,000,000%
  - 100%
explanation: |
  ในเดือนพฤศจิกายน 2008 อัตราเงินเฟ้อรายเดือนของสกุลเงินซิมบับเวพุ่งสูงถึง 79,600,000,000% ซึ่งทำให้มูลค่าของดอลลาร์ซิมบับเวลดลงเหลือ 0
reviewed: true
question: None mu kwezi kwa Munyonyo 2008, igitigiri c’ibiciro cari giteye gute muri Zimbabwe?
answer: 79.600.000.000%
wrong_answers:
  - 796%
  - 79.600.000.000.000.000%
  - 100%
explanation: |
  Mu kwezi kwa cumi na kumwe 2008, igiciro c'amahera ya Zimbabwe ku kwezi caradutse kigera ku bice 79.600.000.000%, ivyo bikaba vyatumye agaciro k'idolari rya Zimbabwe gashika kuri 0.
reviewed: true
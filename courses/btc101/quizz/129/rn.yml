question: Ni gute urubuga rwa Bitcoin rukora kugira ngo rube ruzimvye cane kugira ngo rukore nabi mu gihe c’amasezerano ya Bitcoin?
answer: Biciye mu mategeko y’amasezerano n’inzego z’ubutunzi.
wrong_answers:

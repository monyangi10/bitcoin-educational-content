question: เครือข่าย Bitcoin ทำให้การกระทำที่เป็นอันตรายภายในโปรโตคอล Bitcoin มีค่าใช้จ่ายสูงได้อย่างไร?
answer: ผ่านกฎระเบียบของโปรโตคอลและแรงจูงใจทางเศรษฐกิจ
wrong_answers:

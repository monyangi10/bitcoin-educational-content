question: Какой подход структурирует эволюцию Биткойна, описанную в этой главе?
answer: Многоуровневая эволюция
wrong_answers:
  - Монолитный блокчейн
  - Нативный шардинг
  - Обобщённое ончейн-исполнение
explanation: |
  Биткойн сохраняет простой и надёжный базовый уровень, тогда как протоколы верхнего уровня добавляют специфические функции.

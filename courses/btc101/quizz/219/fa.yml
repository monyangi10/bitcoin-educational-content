question: کدام رویکرد، تکامل بیت‌کوین توصیف‌شده در این فصل را ساختار می‌دهد؟
answer: تکامل لایه‌ای
wrong_answers:
  - بلاکچین یکپارچه
  - شاردینگ بومی
  - اجرای آن‌چین تعمیم‌یافته
explanation: |
  بیت‌کوین یک لایه پایه ساده و مقاوم را حفظ می‌کند، در حالی که پروتکل‌های بالادستی قابلیت‌های مشخصی را اضافه می‌کنند.
reviewed: false

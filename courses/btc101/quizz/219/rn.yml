question: Ni ubuhe buryo butunganya ihinduka rya Bitcoin risobanuwe muri iki gice?
answer: Ihinduka mu nzego
wrong_answers:
  - Blockchain imwe rukumbi
  - Sharding kavukire
  - Gushyira mu bikorwa onchain rusangi
explanation: |
  Bitcoin igumana urwego shingiro rworoshe kandi rukomeye, mu gihe porotokole zo hejuru zongeramo imikorere yihariye.
reviewed: false

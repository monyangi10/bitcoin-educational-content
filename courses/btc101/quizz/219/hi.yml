question: इस अध्याय में वर्णित Bitcoin के विकास को कौन-सा दृष्टिकोण संरचित करता है?
answer: परतों में विकास
wrong_answers:
  - मोनोलिथिक ब्लॉकचेन
  - मूल शार्डिंग
  - सामान्यीकृत ऑनचेन निष्पादन
explanation: |
  Bitcoin एक सरल और मजबूत आधार परत बनाए रखता है, जबकि ऊपरी स्तर के प्रोटोकॉल विशिष्ट कार्यक्षमताएँ जोड़ते हैं।
reviewed: false

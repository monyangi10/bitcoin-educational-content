question: ¿Qué enfoque estructura la evolución de Bitcoin descrita en este capítulo?
answer: Evolución en capas
wrong_answers:
  - Blockchain monolítica
  - Sharding nativo
  - Ejecución onchain generalizada
explanation: |
  Bitcoin conserva una capa base simple y robusta, mientras que los protocolos superiores añaden funcionalidades específicas.

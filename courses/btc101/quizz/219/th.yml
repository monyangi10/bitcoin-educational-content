question: วิธีการใดที่โครงสร้างวิวัฒนาการของ Bitcoin ที่อธิบายไว้ในบทนี้?
answer: วิวัฒนาการแบบชั้น
wrong_answers:
  - บล็อกเชนแบบโมโนลิทิก
  - การแบ่งส่วนแบบเนทีฟ
  - การดำเนินการบนเชนทั่วไป
explanation: |
  Bitcoin รักษาชั้นฐานที่เรียบง่ายและแข็งแกร่ง ในขณะที่โปรโตคอลระดับสูงกว่าจะเพิ่มฟังก์ชันการทำงานเฉพาะเจาะจง
reviewed: false
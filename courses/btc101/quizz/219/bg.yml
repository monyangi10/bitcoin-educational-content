question: Кой подход структурира еволюцията на Bitcoin, описана в тази глава?
answer: Еволюция на слоеве
wrong_answers:
  - Монолитна блокчейн
  - Нативен шардинг
  - Обобщено ончейн изпълнение
explanation: |
  Bitcoin запазва проста и устойчива базова слой, докато по-горните протоколи добавят специфични функционалности.

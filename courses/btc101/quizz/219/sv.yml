question: Vilket angreppssätt strukturerar den utveckling av Bitcoin som beskrivs i detta kapitel?
answer: Skiktad utveckling
wrong_answers:
  - Monolitisk blockkedja
  - Inbyggd sharding
  - Generaliserad onchain-exekvering
explanation: |
  Bitcoin behåller ett enkelt och robust baslager, medan överliggande protokoll lägger till specifika funktioner.

question: මෙම අධ්‍යායයේ විස්තර කර ඇති Bitcoin හි විකාසය සංවිධානය කරන ප්‍රවේශය කුමක්ද?
answer: ස්ථරමය විකාසය
wrong_answers:
  - එකම බ්ලොක්චේන් පද්ධතිය
  - ස්වභාවික ශාර්ඩිං
  - සාමාන්‍යකරණය කළ onchain ක්‍රියාත්මක කිරීම
explanation: |
  Bitcoin සරල සහ ශක්තිමත් මූලික ස්ථරයක් රඳවා ගනී, එ අතර ඉහළ මට්ටමේ ප්‍රොටෝකෝල විශේෂිත ක්‍රියාකාරකම් එක් කරයි.
reviewed: false

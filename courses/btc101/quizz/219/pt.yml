question: Que abordagem estrutura a evolução do Bitcoin descrita neste capítulo?
answer: Evolução em camadas
wrong_answers:
  - Blockchain monolítica
  - Sharding nativo
  - Execução onchain generalizada
explanation: |
  O Bitcoin mantém uma camada base simples e robusta, enquanto protocolos superiores adicionam funcionalidades específicas.

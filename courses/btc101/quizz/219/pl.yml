question: Jakie podejście strukturyzuje ewolucję Bitcoina opisaną w tym rozdziale?
answer: Ewolucja warstwowa
wrong_answers:
  - Monolityczny blockchain
  - Natywny sharding
  - Uogólnione wykonanie onchain
explanation: |
  Bitcoin zachowuje prostą i solidną warstwę bazową, podczas gdy wyższe protokoły dodają określone funkcjonalności.
reviewed: false

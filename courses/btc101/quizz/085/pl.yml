question: Jakie jest zalecane zastosowanie portfela wielopodpisowego?
answer: Przechowywanie dużych ilości pieniędzy do użytku korporacyjnego.
wrong_answers:
  - Przechowywanie niewielkich ilości pieniędzy na własny użytek.
  - Przechowywanie średnich ilości pieniędzy do użytku non-profit.
  - Przechowywanie pieniędzy na codzienne wydatki do indywidualnego użytku.
explanation: |
  Portfel wielopodpisowy jest zalecany do przechowywania dużych ilości danych
  i do użytku korporacyjnego, ponieważ do wykonania transakcji wymaga wielu
  podpisów. Ten proces dodaje dodatkową warstwę bezpieczeństwa, ponieważ pojedyncza osoba nie może
  przeprowadzić transakcji bez zgody innych osób.
reviewed: true

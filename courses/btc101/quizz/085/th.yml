question: การใช้งานที่แนะนำของ multisig wallet คืออะไร?
answer: การจัดเก็บจำนวนมากสำหรับการใช้งานขององค์กร
wrong_answers:
  - การเก็บในปริมาณเล็กน้อยเพื่อใช้ส่วนตัว
  - การจัดเก็บในปริมาณปานกลางเพื่อการใช้งานที่ไม่แสวงหาผลกำไร
  - การจัดเก็บค่าใช้จ่ายรายวันสำหรับการใช้งานส่วนบุคคล
explanation: |
  แนะนำให้ใช้ multisig wallet สำหรับการเก็บรักษาจำนวนเงินมากๆ และสำหรับการใช้งานในองค์กร เพราะต้องการลายเซ็นหลายลายเพื่อดำเนินการทำธุรกรรม กระบวนการนี้เพิ่มชั้นความปลอดภัยเพิ่มเติม เพราะบุคคลเพียงคนเดียวไม่สามารถดำเนินการทำธุรกรรมได้โดยไม่ได้รับการอนุมัติจากผู้อื่น
reviewed: true
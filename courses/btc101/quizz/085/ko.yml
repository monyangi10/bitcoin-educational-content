question: Multisig Wallet의 권장 사용법은 무엇인가요?
answer: 기업용으로 많은 양을 저장합니다.
wrong_answers:
  - 개인적인 용도로 소량을 저장합니다.
  - 비영리 목적으로 중간 금액을 저장합니다.
  - 개인이 사용할 일일 비용을 저장합니다.
explanation: |
  많은 양을 저장할 때는 Multisig Wallet을 권장합니다
  그리고 거래를 수행하기 위해 여러 명의 서명이 필요하므로
  서명이 필요하기 때문에 기업용으로 권장됩니다. 이 프로세스는 한 명의 서명으로
  보안이 추가되므로 한 사람이 다른 사람의 승인 없이는
  다른 사람의 승인 없이는 거래를 수행할 수 없기 때문입니다.
reviewed: true
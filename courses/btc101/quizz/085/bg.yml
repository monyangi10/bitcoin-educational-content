question: Каква е препоръчителната употреба на multisig портфейл?
answer: Съхраняване на големи количества за корпоративна употреба.
wrong_answers:
  - Съхраняване на малки количества за лична употреба.
  - Съхраняване на средни количества за употреба с нестопанска цел.
  - Съхраняване на ежедневни разходи за индивидуално ползване.
explanation: |
  За съхраняване на големи количества се препоръчва multisig портфейл за корпоративна употреба, тъй като изисква множество
  подписи за извършване на транзакция. Този процес добавя
  допълнително ниво на сигурност, тъй като едно лице не може да
  да извърши транзакция без одобрението на други лица.
reviewed: true

question: "Hot" और "Wallet" क्या होता है?
answer: एक Bitcoin Wallet आपके फोन या कंप्यूटर पर जो इंटरनेट से कनेक्टेड हो।
wrong_answers:
  - एक Wallet जो छूने में Hot जैसा लगता है।
  - Bitcoin यूजर्स के बीच पॉपुलर एक Wallet।
  - एक Wallet जो बड़ी मात्रा में बिटकॉइन स्टोर करने के लिए सुझाया जाता है।
explanation: |
  एक जीडब्ल्यू-11 जीडब्ल्यू-10 एक ऐसा शब्द है जिसका इस्तेमाल जीडब्ल्यू-9 जीडब्ल्यू-10 को बताने के लिए किया जाता है
  वह इंटरनेट एक्सेस वाले डिवाइस पर स्टोर होता है, जैसे कि
  फोन या कंप्यूटर। इस तरह, यह आसानी से किया जा सकता है
  लेन-देन, लेकिन इसका मतलब यह भी है कि Wallet
  ऑनलाइन खतरों के लिए संभावित रूप से असुरक्षित।
reviewed: true
question: Wat is een praktische manier om Bitcoins te verkrijgen?
answer: Ze kopen via gereguleerde of niet-gereguleerde platforms.
wrong_answers:
  - Mining ze met een laptop.
  - Ze vinden in de fysieke wereld.
  - Maak ze met speciale software.
explanation: |
  De tekst vermeldt dat gebruikers Bitcoins kunnen verkrijgen door
  door ze te accepteren voor handel of door ze te kopen via
  gereguleerde of niet-gereguleerde platforms.
reviewed: true
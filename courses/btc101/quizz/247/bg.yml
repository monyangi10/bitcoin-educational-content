question: Какъв е практичният начин за получаване на биткойни?
answer: Закупуването им чрез регулирани или нерегулирани платформи.
wrong_answers:
  - Копаене с помощта на лаптоп.
  - Намирането им във физическия свят.
  - Създаването им става с помощта на специален софтуер.
explanation: |
  В текста се споменава, че потребителите могат да получат биткойни чрез
  предлагане на свои стоки и услуги за тях или да ги купуват чрез
  регулирани или нерегулирани платформи.
reviewed: true

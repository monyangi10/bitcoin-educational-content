question: วิธีที่ปฏิบัติได้จริงในการรับบิตคอยน์คืออะไร?
answer: การซื้อผ่านแพลตฟอร์มที่มีการควบคุมหรือไม่มีการควบคุม
wrong_answers:
  - Mining พวกเขาโดยใช้แล็ปท็อป
  - ค้นหาพวกเขาในโลกทางกายภาพ
  - สร้างพวกมันโดยใช้ซอฟต์แวร์พิเศษ
explanation: |
  ข้อความระบุว่าผู้ใช้สามารถรับ Bitcoin ได้โดยการยอมรับในการแลกเปลี่ยนหรือโดยการซื้อผ่านแพลตฟอร์มที่มีการควบคุมหรือไม่มีการควบคุม
reviewed: true
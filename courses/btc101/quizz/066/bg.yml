question: Какъв е частният ключ в Bitcoin портфейла?
answer: Таен ключ, който ви позволява да подписвате трансакциите си.
wrong_answers:
  - Публичен ключ, използван за генериране на адреси в Bitcoin.
  - Таен списък с думи за унищожаване на портфейла в случай на нужда.
  - Таен ключ за криптиране на транзакциите Bitcoin.

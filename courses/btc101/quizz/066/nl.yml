question: In welk jaar zal de aanmaak van bitcoins stoppen?
answer: 2140
wrong_answers:
  - 2050
  - 2030
  - 2200
explanation: |
  Door het Halving mechanisme kan wiskundig voorspeld worden
  voorspeld worden dat de aanmaak van bitcoins zal stoppen in 2140,
  wanneer het totale aantal bitcoins de grens van 21 miljoen bereikt
  miljoen bereikt.
reviewed: true
question: Điều gì là một trong những thứ bạn cần có trước khi mua Bitcoin?
answer: Một ví Bitcoin an toàn.
wrong_answers:
  - Một két sắt vật lý.
  - Một tài khoản ngân hàng.
  - Một thẻ tín dụng.
explanation: |
  Khóa học đề cập rằng trước khi mua Bitcoin, bạn
  cần có một ví Bitcoin an toàn nơi bạn sẽ lưu trữ các khóa của mình.
reviewed: true
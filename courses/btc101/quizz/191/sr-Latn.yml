question: Šta je jedna od stvari koju treba da imate pre nego što kupite Bitkoin?
answer: Siguran novčanik.
wrong_answers:
  - Fizički sef.
  - Bankovni račun.
  - Kreditnu karticu.
explanation: |
  Tekst kursa pominje da pre kupovine Bitkoina,
  treba da imate siguran novačnik gde ćete čuvati svoje ključeve.
reviewed: true

question: Wat is een van de dingen die je moet hebben voordat je Bitcoin koopt?
answer: Een veilige Wallet.
wrong_answers:
  - Een fysieke kluis.
  - Een bankrekening.
  - Een creditcard.
explanation: |
  In de tekst van de cursus staat dat voordat je Bitcoin koopt, je
  een beveiligde Wallet moet hebben waar je je sleutels in bewaart.
reviewed: true
question: Jakie znaczenie w Bitcoinie ma indywidualna odpowiedzialność?
answer: Ma kluczowe znaczenie, ponieważ jesteś odpowiedzialny za tworzenie kopii zapasowych.
wrong_answers:
  - Jest niezbędna, ponieważ musisz wydobywać bitcoiny.
  - Zakup bitcoinów jest niezbędny.
  - Jest kluczowa, ponieważ jesteś odpowiedzialny za motyw portfela.
explanation: |
  W Bitcoinie suwerenność finansowa idzie w parze z indywidualną odpowiedzialnością, ponieważ musisz samodzielnie dbać o
  swoje fundusze, przestrzegając zalecanych procedur tworzenia kopii zapasowych.
reviewed: true

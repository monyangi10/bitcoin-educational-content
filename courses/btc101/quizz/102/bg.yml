question: Какво е значението на индивидуалната отговорност в Bitcoin?
answer: Това е от решаващо значение, защото вие отговаряте за резервните копия.
wrong_answers:
  - Това е от съществено значение, защото трябва да добивате биткойни.
  - От съществено значение е да купувате биткойни.
  - Това е от решаващо значение, защото вие отговаряте за портфейла.
explanation: |
  В Bitcoin финансовият суверенитет върви ръка за ръка с
  индивидуална отговорност, защото трябва да се грижите за себе си
  средствата си, като следвате препоръчаните процедури за архивиране.
reviewed: true

question: ความสำคัญของความรับผิดชอบส่วนบุคคลใน Bitcoin คืออะไร?
answer: มันมีความสำคัญเพราะคุณเป็นผู้รับผิดชอบการสำรองข้อมูล
wrong_answers:
  - มันเป็นสิ่งสำคัญเพราะคุณต้องขุดบิตคอยน์
  - การซื้อบิตคอยน์เป็นสิ่งสำคัญ
  - มันมีความสำคัญเพราะคุณรับผิดชอบธีม wallet
explanation: |
  ใน Bitcoin อธิปไตยทางการเงินควบคู่ไปกับ
  ความรับผิดชอบส่วนบุคคล เพราะคุณต้องเก็บรักษา
  เงินทุนของคุณเองโดยปฏิบัติตามขั้นตอนการสำรองข้อมูลที่แนะนำ
reviewed: true
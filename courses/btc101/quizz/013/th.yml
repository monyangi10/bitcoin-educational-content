question: ลักษณะสำคัญของสกุลเงินที่มีประสิทธิภาพคืออะไร?
answer: Fungible, Divisible, Liquid.
wrong_answers:
  - ใช้แทนกันได้, แบ่งแยกได้, เน่าเสียได้.
  - Fungible, Indivisible, Liquid.
  - ไม่สามารถทดแทนได้, แบ่งได้, Liquid.
explanation: |
  สกุลเงินที่มีประสิทธิภาพต้องมีคุณสมบัติที่สามารถแลกเปลี่ยนได้ (สามารถแลกเปลี่ยนได้โดยไม่สูญเสียมูลค่า), แบ่งแยกได้ (สามารถแยกออกเป็นส่วนเล็ก ๆ เพื่ออำนวยความสะดวกในการทำธุรกรรมที่มีปริมาณต่างกัน), และมีสภาพคล่อง (สามารถแปลงเป็นสินค้าและบริการได้อย่างง่ายดาย).
reviewed: true
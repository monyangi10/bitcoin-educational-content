question: Jakie są główne cechy dobrze funkcjonującej waluty?
answer: Wymienialna, podzielna, płynna.
wrong_answers:
  - Wymienialna, podzielna, nietrwała.
  - Wymienialna, niepodzielna, płynna.
  - Niewymienialna, podzielna, płynna.
explanation: |
  Dobrze funkcjonująca waluta musi być wymienialna
  bez utraty wartości, podzielna na małe
  części, aby ułatwić transakcje o różnych wielkościach oraz płynna (łatwo wymienialna na towary lub usługi).
reviewed: true

question: 효과적인 통화의 주요 특징은 무엇인가요?
answer: 대체 가능, 분할 가능, Liquid.
wrong_answers:
  - 대체 가능, 분할 가능, 부패 가능.
  - 대체 가능, 분할 불가, Liquid.
  - 대체 불가능, 분할 가능, Liquid.
explanation: |
  유효 통화는 대체 가능해야 하며(가치 손실 없이
  가치 손실없이), 분할 가능 (작은 부분으로 분리 가능)
  작은 단위로 분리 가능), 그리고
  Liquid(상품이나 서비스로 쉽게 전환 가능)이어야 합니다.
reviewed: true
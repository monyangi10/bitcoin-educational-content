question: Kullanıcılar Bitcoin ağındaki paralarının Ownership'ını nasıl transfer ederler?
answer: İşlemleri kendi özel anahtarları ile dijital olarak imzalayarak.
wrong_answers:
  - Bitcoin'lerini fiziksel olarak teslim ederek.
  - Alıcıya bir e-posta göndererek.
  - Alıcıya Bitcoin Address'lerini sağlayarak.
explanation: |
  Bitcoin ağındaki kullanıcılar kendi Ownership'lerini
  işlemlerini dijital olarak imzalayarak para
  anahtarlar. Bu, anahtarların sahiplerinin onlar olduğunu doğrular
  transfer etmek istedikleri bitcoinler.
reviewed: true
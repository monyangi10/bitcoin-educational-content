question: Какви са последиците от печатането на парични знаци?
answer: Това води до инфлация, която постепенно води до обедняване на населението.
wrong_answers:
  - Тя води до дефлация, като постепенно обогатява населението.
  - Тя води до стабилна икономика без инфлация или дефлация.
  - Това води до намаляване на паричното предлагане.
explanation: |
  Печатането на парични знаци или създаването на нови пари от централните
  банки, води до инфлация. Това е така, защото увеличението на
  паричното предлагане намалява покупателната способност на парите,
  води до повишаване на цените и намаляване на стойността на
  спестяванията.
reviewed: true
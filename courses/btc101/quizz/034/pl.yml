question: Jakie są konsekwencje dodruku pieniądza?
answer: Prowadzi do inflacji, stopniowo zubożając ludność.
wrong_answers:
  - Prowadzi do deflacji, stopniowo wzbogacając populację.
  - Prowadzi do powstania stabilnej gospodarki bez inflacji lub deflacji.
  - Prowadzi do spadku wartości pieniądza.
explanation: |
  Drukowanie pieniądza lub tworzenie nowych pieniędzy przez banki centralne prowadzi do inflacji. Dzieje się tak, ponieważ wzrost ilości pieniądza zmniejsza jego siłę nabywczą,
  prowadząc do wyższych cen i spadku wartości oszczędności.
reviewed: true

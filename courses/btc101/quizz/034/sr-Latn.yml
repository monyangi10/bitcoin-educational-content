question: Koja je posledica štampanja novca?
answer: To vodi do inflacije, postepeno osiromašujući stanovništvo.
wrong_answers:
  - To dovodi do deflacije, postepeno obogaćujući stanovništvo.
  - To vodi ka stabilnoj ekonomiji bez inflacije ili deflacije.
  - To dovodi do smanjenja ponude novca.
explanation: |
  Štampanje novca, ili stvaranje novog novca od strane centralnih banaka, 
  dovodi do inflacije. To je zato što povećanje novčane mase smanjuje 
  kupovnu moć novca, što dovodi do viših cena i smanjenja vrednosti štednje.
reviewed: true

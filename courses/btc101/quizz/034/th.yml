question: ผลที่ตามมาของการพิมพ์เงินคืออะไร?
answer: มันนำไปสู่ภาวะเงินเฟ้อ ทำให้ประชาชนยากจนลงทีละน้อย
wrong_answers:
  - มันนำไปสู่ภาวะเงินฝืด ทำให้ประชากรร่ำรวยขึ้นอย่างค่อยเป็นค่อยไป
  - มันนำไปสู่เศรษฐกิจที่มั่นคงโดยไม่มีเงินเฟ้อหรือเงินฝืด
  - มันนำไปสู่การลดลงของปริมาณเงินในระบบ
explanation: |
  การพิมพ์เงิน หรือการสร้างเงินใหม่โดยธนาคารกลาง นำไปสู่ภาวะเงินเฟ้อ เนื่องจากการเพิ่มขึ้นของปริมาณเงินทำให้กำลังซื้อของเงินลดลง นำไปสู่ราคาที่สูงขึ้นและมูลค่าของการออมลดลง
reviewed: true
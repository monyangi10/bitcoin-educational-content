question: Altının bir para birimi olarak temel avantajı nedir?
answer: İnanılmaz derecede dayanıklıdır.
wrong_answers:
  - Kolayca bölünebilir veya uzun mesafelere taşınabilir.
  - Kolayca doğrulanabilir.
  - Hükümet tarafından düzenlenmemektedir.
explanation: |
  Kolayca bölünebilir veya taşınabilir olmamasına rağmen
  uzun mesafelerde altın çok dayanıklı bir malzemedir
  onu iyi bir değer deposu yapar. Altın sikkeler
  geçmişte para birimi, ancak aynı şekilde hizmet etmeyeceklerdi
  günümüzün dijital çağında bir amaç.
reviewed: true
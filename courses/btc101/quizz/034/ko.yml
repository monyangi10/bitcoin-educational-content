question: 화폐 인쇄의 결과는 어떻게 되나요?
answer: 이는 인플레이션으로 이어져 점차 인구를 빈곤하게 만듭니다.
wrong_answers:
  - 이는 디플레이션으로 이어져 점차 인구가 풍요로워집니다.
  - 인플레이션이나 디플레이션이 없는 안정적인 경제로 이어집니다.
  - 이는 Supply의 감소로 이어집니다.
explanation: |
  화폐 인쇄, 즉 중앙은행이 새로운 화폐를 찍어내는 것은
  인플레이션으로 이어집니다. 그 이유는
  화폐의 구매력이 감소하기 때문입니다,
  물가 상승과 저축의 가치 하락으로 이어지기 때문입니다
  저축.
reviewed: true
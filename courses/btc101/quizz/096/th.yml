question: วัตถุประสงค์ของการสร้างแผนการสืบทอดสำหรับบิตคอยน์ของคุณคืออะไร?
answer: เพื่อให้แน่ใจว่า bitcoins ของคุณจะได้รับการจัดการอย่างถูกต้องหลังจากที่คุณเสียชีวิต
wrong_answers:
  - เพื่อหลีกเลี่ยงภาษีจากบิทคอยน์ของคุณ
  - เพื่อลดมูลค่าของบิตคอยน์ของคุณ
  - เพื่อป้องกันไม่ให้บิตคอยน์ของคุณถูกขโมย
explanation: |
  แผนการรับมรดกช่วยให้มั่นใจได้ว่า บิตคอยน์ของคุณจะได้รับการจัดการอย่างเหมาะสมหลังจากที่คุณเสียชีวิต มันสามารถรวมถึงจดหมายที่เขียนด้วยลายมือซึ่งระบุรายละเอียดทรัพย์สินของคุณ วิธีการเข้าถึง และข้อมูลการติดต่อของบุคคลที่เชื่อถือได้ที่จะติดต่อ
reviewed: true
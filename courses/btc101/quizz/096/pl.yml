question: Jaki jest cel stworzenia planu dziedziczenia bitcoinów?
answer: Aby zapewnić, że twoje bitcoiny będą odpowiednio zarządzane po twojej śmierci.
wrong_answers:
  - Aby uniknąć podatków od bitcoinów.
  - Aby zmniejszyć wartość swoich bitcoinów.
  - Aby zapobiec kradzieży bitcoinów.
explanation: |
  Plan spadkowy gwarantuje, że bitcoiny będą odpowiednio zarządzane po twojej śmierci. Może on zawierać
  odręczny list z wyszczególnieniem aktywów, metod dostępu do nich
  oraz dane kontaktowe zaufanych osób, z którymi należy się skontaktować.
reviewed: true

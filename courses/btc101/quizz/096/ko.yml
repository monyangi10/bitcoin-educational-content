question: 비트코인의 상속 계획을 만드는 목적은 무엇인가요?
answer: 사후에 비트코인이 제대로 관리될 수 있도록 하기 위해서입니다.
wrong_answers:
  - 비트코인에 대한 세금을 피하기 위해.
  - 비트코인의 가치를 낮추려면.
  - 비트코인을 도난당하는 것을 방지합니다.
explanation: |
  상속 계획은 여러분의 비트코인이 사망 후에도
  적절하게 관리되도록 보장합니다. 여기에는 다음과 같은 내용이 포함될 수 있습니다
  자산, 액세스 방법, 신뢰할 수 있는 사람의 연락처를 자세히 설명하는 자필 편지
  방법, 연락할 수 있는 신뢰할 수 있는 개인의 연락처 정보
  연락할 수 있습니다.
reviewed: true
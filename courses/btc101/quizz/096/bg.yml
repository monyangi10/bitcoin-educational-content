question: Каква е целта на създаването на план за наследяване на вашите биткойни?
answer: За да се уверите, че вашите биткойни ще бъдат правилно управлявани след смъртта ви.
wrong_answers:
  - За да избегнете данъци върху вашите биткойни.
  - Да намалите стойността на вашите биткойни.
  - За да предотвратите кражба на вашите биткойни.
explanation: |
  Планът за наследяване гарантира, че вашите биткойни ще бъдат
  управляват правилно след смъртта ви. Той може да включва
  писмо, в което подробно са описани вашите активи, достъпът до тях
  методите за достъп и информация за контакт с доверени лица
  с които да се свържем.
reviewed: true
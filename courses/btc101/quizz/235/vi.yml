question: Mạng Lưới Lightning có thể được ứng dụng như thế nào cho thương mại hàng hóa và dịch vụ?
answer: Người dùng có thể được tính phí theo phút, hoặc thậm chí theo giây, cho thời gian họ sử dụng hàng hóa và dịch vụ.
wrong_answers:
  - Người dùng có thể được tính phí cao cho việc thuê hàng hóa và dịch vụ.
  - Người dùng có thể được tính phí dựa trên giá trị của hàng hóa và dịch vụ.
  - Người dùng có thể được tính phí dựa trên tình trạng của hàng hóa và dịch vụ.
explanation: >-
  Với Mạng Lưới Lightning, việc sử dụng hệ thống này cho việc thuê bao hàng hóa và dịch vụ là điều có thể. Người dùng có thể được tính phí theo phút, hoặc thậm chí theo giây, cho thời gian họ sử dụng hàng hóa và dịch vụ.
reviewed: true
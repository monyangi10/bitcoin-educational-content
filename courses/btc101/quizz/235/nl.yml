question: Hoe kan de Lightning Network mogelijk worden gebruikt voor het verhuren van goederen?
answer: Gebruikers zouden per minuut of zelfs per seconde kunnen worden afgerekend voor de tijd dat ze de goederen gebruiken.
wrong_answers:
  - Gebruikers zouden een hoge vergoeding kunnen krijgen voor het huren van de goederen.
  - Gebruikers zouden kunnen worden belast op basis van de waarde van de goederen.
  - Gebruikers zouden kunnen worden belast op basis van de staat van de goederen.
explanation: >-
reviewed: true
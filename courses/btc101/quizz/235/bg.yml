question: Как Lightning Network може да се използва за отдаване на стоки под наем?
answer: Потребителите могат да бъдат таксувани на минута или дори на секунда за времето, през което използват стоките.
wrong_answers:
  - На потребителите може да се начислява висока такса за наемане на стоките.
  - Потребителите могат да бъдат таксувани въз основа на стойността на стоките.
  - Потребителите могат да бъдат таксувани в зависимост от състоянието на стоките.

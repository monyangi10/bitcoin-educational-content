question: None Lightning Network yoshobora gute gukoreshwa mu gukodesha ibintu?
answer: Abakoresha boshobora guhabwa amahera ku munota, canke mbere ku segonda, ku gihe bakoresha ivyo bintu.
wrong_answers:
  - Abakoresha ivyo bintu boshobora gusaba amahera menshi kubera bakodesha ivyo bintu.
  - Abakoresha boshobora guhabwa amahera bivanye n’agaciro k’ivyo bintu.
  - Abakoresha boshobora guhabwa amahera bivanye n’ingene ivyo bintu vyifashe.

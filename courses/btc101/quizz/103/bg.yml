question: Какво е Blockmit в контекста на сигурността на Bitcoin?
answer: Евтино решение за гравиране на вашата мнемонична фраза върху парче стомана.
wrong_answers:
  - Вид Bitcoin портфейл за подписване на няколко трансакции едновременно.
  - Евтино решение за добив на биткойни у дома.
  - Вид Bitcoin портфейл, който изисква множество подписи за изразходване на UTXO.
explanation: |
  Blockmit е евтино решение за гравиране на вашите
  менна фраза върху устойчив материал като стомана, като по този начин
  така ще защитите биткойните си в дългосрочен план.
reviewed: true

question: Czym jest Blockmit w kontekście bezpieczeństwa Bitcoina?
answer: Niedrogie rozwiązanie do grawerowania frazy mnemonicznej na kawałku stali.
wrong_answers:
  - Rodzaj portfela Bitcoin do podpisywania wielu transakcji jednocześnie.
  - Tanie rozwiązanie do wydobywania bitcoinów w domu.
  - Typ portfela Bitcoin, który wymaga wielu podpisów, aby wydać UTXO.
explanation: |
  Blockmit to niedrogie rozwiązanie do grawerowania frazy mnemonicznej na odpornym materiale, takim jak stal, aby zabezpieczyć twoje bitcoiny w dłuższej perspektywie.
reviewed: true

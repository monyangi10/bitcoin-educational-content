question: W jaki sposób protokół Bitcoin zapewnia odporność na cenzurę?
answer: Każdy element protokołu jest geograficznie rozmieszczony na całym świecie.
wrong_answers:
  - Wykorzystuje lokalną sieć węzłów rozmieszczonych w Europie.
  - Wykorzystuje złożony algorytm do weryfikacji transakcji.
  - Wykorzystuje wysoki poziom szyfrowania.
explanation: |
  Protokół Bitcoin zapewnia odporność na cenzurę, ponieważ każdy składnik protokołu jest
  rozproszony geograficznie na całym świecie. Na wszystkich kontynentach znajduje się około 40 000 węzłów Bitcoina.
reviewed: true

question: Bitcoin 프로토콜은 검열 저항성과 복원력을 어떻게 보장하나요?
answer: 프로토콜의 각 구성 요소는 전 세계에 지리적으로 분산되어 있습니다.
wrong_answers:
  - 유럽에 분산된 로컬 노드 네트워크를 사용합니다.
  - 복잡한 알고리즘을 사용하여 트랜잭션의 유효성을 검사합니다.
  - 높은 수준의 암호화를 사용합니다.
explanation: |
  Bitcoin 프로토콜은 검열 저항성과 복원력을 보장합니다
  프로토콜의 각 구성 요소가 전 세계에 걸쳐
  전 세계에 지리적으로 분산되어 있기 때문입니다. 예를 들어
  모든 대륙에 약 40,000개의 Bitcoin 노드가
  대륙.
reviewed: true
question: Bitcoin protokolü sansüre karşı direncini ve esnekliğini nasıl sağlıyor?
answer: Protokolün her bir bileşeni coğrafi olarak dünya genelinde dağıtılmıştır.
wrong_answers:
  - Avrupa'da dağıtılmış düğümlerden oluşan yerel bir ağ kullanır.
  - İşlemleri doğrulamak için karmaşık bir algoritma kullanır.
  - Yüksek düzeyde şifreleme kullanır.
explanation: |
  Bitcoin protokolü sansüre karşı dayanıklılığını ve
  esneklik çünkü protokolün her bir bileşeni
  dünya genelinde coğrafi olarak dağıtılmıştır. Örneğin,
  genelinde yaklaşık 40.000 Bitcoin düğümü bulunmaktadır
  kıtalar.
reviewed: true
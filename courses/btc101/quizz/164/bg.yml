question: Как протоколът Bitcoin гарантира своята устойчивост и устойчивост на цензура?
answer: Всеки компонент на протокола е географски разпределен по целия свят.
wrong_answers:
  - Тя използва локална мрежа от възли, разпределени в Европа.
  - Той използва сложен алгоритъм за валидиране на трансакциите.
  - Той използва високо ниво на криптиране.
explanation: |
  Протоколът Bitcoin осигурява устойчивост на цензура и
  устойчивост, тъй като всеки компонент на протокола е
  разпределен географски по цялото земно кълбо. Например,
  има приблизително 40 000 възли Bitcoin във всички
  континенти.
reviewed: true
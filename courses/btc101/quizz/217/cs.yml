question: Jaký je hlavní cíl Lightning Network?
answer: Umožnit offchain platby, rychlé a levné
wrong_answers:
  - Zvýšit velikost bloků bitcoinového blockchainu
  - Postupně nahradit bitcoinový blockchain výkonnějším systémem
  - Učinit těžební farmy velmi bohatými
explanation: |
  Lightning Network si klade za cíl umožnit téměř okamžité platby v bitcoinech s nízkými poplatky, aniž by zatěžoval hlavní blockchain.
reviewed: false

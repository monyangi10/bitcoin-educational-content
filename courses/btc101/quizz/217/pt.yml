question: Qual é o principal objetivo da Lightning Network?
answer: Permitir pagamentos offchain, rápidos e de baixo custo
wrong_answers:
  - Aumentar o tamanho dos blocos da blockchain do Bitcoin
  - Substituir progressivamente a blockchain do Bitcoin por um sistema mais eficiente
  - Tornar as fazendas de mineração muito ricas
explanation: |
  A Lightning Network visa permitir pagamentos em bitcoin quase instantâneos, com taxas reduzidas, sem sobrecarregar a blockchain principal.
reviewed: false

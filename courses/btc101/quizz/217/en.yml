question: What is the main objective of the Lightning Network?
answer: Enable offchain payments that are fast and low-cost
wrong_answers:
  - Increase the block size of the Bitcoin blockchain
  - Gradually replace the Bitcoin blockchain with a more efficient system
  - Make mining farms very rich
explanation: |
  The Lightning Network aims to enable near-instant Bitcoin payments with low fees, without overloading the main blockchain.
reviewed: false

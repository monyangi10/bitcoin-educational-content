question: Jaki jest główny cel Lightning Network?
answer: Umożliwienie płatności offchain, szybkich i tanich
wrong_answers:
  - Zwiększenie rozmiaru bloków w blockchainie Bitcoina
  - Stopniowe zastąpienie blockchaina Bitcoina bardziej wydajnym systemem
  - Uczynienie farm wydobywczych bardzo bogatymi
explanation: |
  Lightning Network ma na celu umożliwienie niemal natychmiastowych płatności w bitcoinach przy niskich opłatach, bez przeciążania głównego blockchaina.
reviewed: false

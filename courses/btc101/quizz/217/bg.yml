question: Каква е основната цел на Lightning Network?
answer: Да позволи офчейн плащания, бързи и с ниски разходи
wrong_answers:
  - Да увеличи размера на блоковете в блокчейна на Bitcoin
  - Постепенно да замени блокчейна на Bitcoin с по-ефективна система
  - Да направи миньорските ферми много богати
explanation: |
  Lightning Network има за цел да позволи почти мигновени плащания в биткойни с ниски такси, без да натоварва основната блокчейн.

question: Mục tiêu chính của Lightning Network là gì?
answer: Cho phép các khoản thanh toán offchain nhanh chóng và chi phí thấp
wrong_answers:
  - Tăng kích thước khối của blockchain Bitcoin
  - Dần dần thay thế blockchain Bitcoin bằng một hệ thống hiệu quả hơn
  - Làm cho các trang trại khai thác trở nên rất giàu
explanation: |
  Lightning Network nhằm cho phép các khoản thanh toán bitcoin gần như tức thì với phí thấp, mà không làm quá tải blockchain chính.
reviewed: false

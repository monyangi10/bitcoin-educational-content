question: Lightning Network の主な目的は何ですか？
answer: 高速かつ低コストなオフチェーン決済を可能にすること
wrong_answers:
  - ビットコインのブロックチェーンのブロックサイズを拡大すること
  - ビットコインのブロックチェーンをより高性能なシステムに段階的に置き換えること
  - マイニングファームを非常に裕福にすること
explanation: |
  Lightning Network は、メインのブロックチェーンに負荷をかけることなく、低手数料でほぼ即時のビットコイン決済を可能にすることを目的としています。
reviewed: false

question: Lightning Network හි ප්‍රධාන අරමුණ කුමක්ද?
answer: වේගවත් සහ අඩු වියදම් සහිත offchain ගෙවීම් සක්‍රීය කිරීම
wrong_answers:
  - Bitcoin බ්ලොක්චේන්හි බ්ලොක් ප්‍රමාණය වැඩි කිරීම
  - Bitcoin බ්ලොක්චේන් එක වඩා කාර්යක්ෂම පද්ධතියකින් පියවරෙන් පියවර ප්‍රතිස්ථාපනය කිරීම
  - මයිනින් ගොවිපල ඉතා ධනවත් කිරීම
explanation: |
  Lightning Network හි අරමුණ වන්නේ ප්‍රධාන බ්ලොක්චේන් එක අධික ලෙස භාර නොවී, අඩු ගාස්තු සහිත සමානවම ක්ෂණික bitcoin ගෙවීම් සක්‍රීය කිරීමයි.
reviewed: false

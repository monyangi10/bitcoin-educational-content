question: Какова основная цель Lightning Network?
answer: Обеспечить быстрые и недорогие офчейн-платежи
wrong_answers:
  - Увеличить размер блоков блокчейна Bitcoin
  - Постепенно заменить блокчейн Bitcoin более эффективной системой
  - Сделать майнинговые фермы очень богатыми
explanation: |
  Lightning Network нацелен на обеспечение почти мгновенных биткоин-платежей с низкими комиссиями без перегрузки основной блокчейн-сети.

question: Lengo kuu la Lightning Network ni lipi?
answer: Kuwezesha malipo ya offchain yaliyo ya haraka na yenye gharama nafuu
wrong_answers:
  - Kuongeza ukubwa wa vitalu vya blockchain ya Bitcoin
  - Kuchukua nafasi ya blockchain ya Bitcoin hatua kwa hatua kwa mfumo wenye ufanisi zaidi
  - Kuyafanya mashamba ya uchimbaji kuwa matajiri sana
explanation: |
  Lightning Network inalenga kuwezesha malipo ya bitcoin karibu ya papo hapo kwa ada ndogo, bila kulemea blockchain kuu.

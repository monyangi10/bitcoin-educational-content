question: Ni iyihe ntumbero nyamukuru ya Lightning Network?
answer: Gutuma habaho ukwishyura offchain vuba kandi bidahenze
wrong_answers:
  - Kwongereza ingano y’amablock ya blockchain ya Bitcoin
  - Gusimbura buhoro buhoro blockchain ya Bitcoin n’uburyo bukora neza kurushaho
  - Gutuma amasambu y’ubucukuzi aba abakire cane
explanation: |
  Lightning Network igamije gutuma habaho ukwishyura kwa bitcoin hafi y’ako kanya, n’amafaranga make, hatabayeho kuremera blockchain nyamukuru.

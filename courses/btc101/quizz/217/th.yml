question: วัตถุประสงค์หลักของ Lightning Network คืออะไร?
answer: เปิดใช้งานการชำระเงินนอกเครือข่ายที่รวดเร็วและมีต้นทุนต่ำ
wrong_answers:
  - เพิ่มขนาดบล็อกของบล็อกเชน Bitcoin
  - ค่อยๆ แทนที่บล็อกเชน Bitcoin ด้วยระบบที่มีประสิทธิภาพมากขึ้น
  - ทำให้ฟาร์ม mining ร่ำรวยมาก
explanation: |
  Lightning Network มีเป้าหมายเพื่อให้สามารถทำการชำระเงิน Bitcoin ได้เกือบจะทันทีด้วยค่าธรรมเนียมต่ำ โดยไม่ทำให้บล็อกเชนหลักมีภาระมากเกินไป
reviewed: false
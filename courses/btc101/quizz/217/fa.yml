question: هدف اصلی شبکه لایتنینگ چیست؟
answer: امکان‌پذیر کردن پرداخت‌های آف‌چین، سریع و کم‌هزینه
wrong_answers:
  - افزایش اندازه بلاک‌های بلاکچین بیت‌کوین
  - جایگزینی تدریجی بلاکچین بیت‌کوین با یک سیستم کارآمدتر
  - بسیار ثروتمند کردن مزارع استخراج
explanation: |
  هدف شبکه لایتنینگ امکان‌پذیر ساختن پرداخت‌های تقریباً آنی بیت‌کوین با کارمزدهای پایین، بدون بارگذاری بیش از حد بلاکچین اصلی است.
reviewed: false

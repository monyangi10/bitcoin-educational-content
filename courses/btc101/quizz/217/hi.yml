question: Lightning Network का मुख्य उद्देश्य क्या है?
answer: तेज़ और कम लागत वाले ऑफचेन भुगतानों को सक्षम बनाना
wrong_answers:
  - Bitcoin ब्लॉकचेन के ब्लॉकों का आकार बढ़ाना
  - Bitcoin ब्लॉकचेन को धीरे-धीरे अधिक कुशल प्रणाली से बदलना
  - माइनिंग फ़ार्मों को बहुत अमीर बनाना
explanation: |
  Lightning Network का उद्देश्य मुख्य ब्लॉकचेन पर भार डाले बिना, कम शुल्क के साथ लगभग त्वरित बिटकॉइन भुगतान सक्षम करना है।

question: Šta je Hot Wallet (vrući novčanik)?
answer: Bitkoin novčanik na vašem telefonu ili računaru povezanom na internet.
wrong_answers:
  - Novčanik koji je fizički Hot (vruć) na dodir.
  - Novčanik koji je popularan među korisnicima Bitkoina.
  - Novčanik koji se preporučuje za čuvanje velike količine bitkoina.
explanation: |
  Hot Wallet (vrući novčanik) je termin koji se koristi za opisivanje Bitkoin novčanika
  koji je uskladišten na uređaju sa pristupom internetu, kao što je
  telefon ili računar. Na ovaj način, lako je obavljati
  transakcije, ali to takođe znači da je novčanik
  potencijalno ranjiv na online pretnje.
reviewed: true

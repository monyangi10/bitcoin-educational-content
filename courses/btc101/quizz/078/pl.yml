question: Co to jest gorący portfel?
answer: Portfel Bitcoin na telefonie lub komputerze podłączonym do Internetu.
wrong_answers:
  - Portfel, który jest gorący w dotyku.
  - Portfel, który jest popularny wśród użytkowników Bitcoina.
  - Portfel, który jest zalecany do przechowywania dużych ilości bitcoinów.
explanation: |
 Gorący portfel to termin używany do opisania portfela,
  który jest przechowywany na urządzeniu z dostępem do Internetu, takim jak
  telefon lub komputer. W ten sposób można łatwo przeprowadzać
  transakcje, ale oznacza to również, że portfel jest potencjalnie podatny na zagrożenia internetowe.
reviewed: true

question: Wat is een Hot Wallet?
answer: Een Bitcoin Wallet op je telefoon of computer met internetverbinding.
wrong_answers:
  - Een Wallet die fysiek Hot is om aan te raken.
  - Een Wallet die populair is onder Bitcoin gebruikers.
  - Een Wallet die wordt aanbevolen voor het opslaan van grote hoeveelheden bitcoins.
explanation: |
  Een Hot Wallet is een term die gebruikt wordt om een Bitcoin Wallet te beschrijven
  dat is opgeslagen op een apparaat met internettoegang, zoals een
  telefoon of computer. Op deze manier is het gemakkelijk om
  transacties uit te voeren, maar het betekent ook dat de Wallet
  potentieel kwetsbaar is voor online bedreigingen.
reviewed: true
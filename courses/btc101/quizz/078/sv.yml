question: Vad är en Hot Wallet?
answer: En Bitcoin Wallet på din telefon eller dator som är ansluten till internet.
wrong_answers:
  - En Wallet som är fysiskt Hot att röra vid.
  - En Wallet som är populär bland Bitcoin-användare.
  - En Wallet som rekommenderas för förvaring av stora mängder bitcoins.
explanation: |
  En Hot Wallet är en term som används för att beskriva en Bitcoin Wallet
  som lagras på en enhet med internetåtkomst, till exempel en
  telefon eller dator. På så sätt är det lätt att genomföra
  transaktioner, men det innebär också att Wallet är
  potentiellt sårbar för hot online.
reviewed: true
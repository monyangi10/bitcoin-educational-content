question: wallet ที่ร้อนคืออะไร?
answer: Bitcoin wallet บนโทรศัพท์หรือคอมพิวเตอร์ของคุณที่เชื่อมต่อกับอินเทอร์เน็ต
wrong_answers:
  - wallet ที่ร้อนจนสัมผัสได้
  - wallet ที่เป็นที่นิยมในหมู่ผู้ใช้ Bitcoin
  - wallet ที่แนะนำสำหรับการเก็บบิตคอยน์จำนวนมาก
explanation: |
  wallet ร้อน เป็นคำที่ใช้เพื่ออธิบาย Bitcoin wallet ที่ถูกเก็บไว้บนอุปกรณ์ที่มีการเชื่อมต่ออินเทอร์เน็ต เช่น โทรศัพท์หรือคอมพิวเตอร์ วิธีนี้ทำให้สามารถทำธุรกรรมได้ง่าย แต่ก็หมายความว่า wallet อาจมีความเสี่ยงต่อภัยคุกคามออนไลน์ได้เช่นกัน
reviewed: true
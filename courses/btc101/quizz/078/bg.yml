question: Какво е горещ портфейл?
answer: Bitcoin портфейл в телефона или компютъра, свързан с интернет.
wrong_answers:
  - портфейл, който е физически горещ при допир.
  - портфейл, който е популярен сред потребителите на Bitcoin.
  - портфейл, който се препоръчва за съхранение на големи количества биткойни.
explanation: |
  Горещ портфейл е термин, използван за описание на Bitcoin портфейл
  който се съхранява на устройство с достъп до интернет, като например
  телефон или компютър. По този начин е лесно да се извърши
  транзакции, но това също така означава, че портфейл е
  потенциално уязвим към онлайн заплахи.
reviewed: true

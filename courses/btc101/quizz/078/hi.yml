question: Hot Wallet क्या है?
answer: आपके फोन या इंटरनेट से जुड़े कंप्यूटर पर Bitcoin Wallet.
wrong_answers:
  - एक Wallet जो स्पर्श करने पर भौतिक रूप से Hot है।
  - Wallet जो Bitcoin उपयोगकर्ताओं के बीच लोकप्रिय है।
  - Wallet जो बड़ी मात्रा में बिटकॉइन संग्रहीत करने के लिए अनुशंसित है।
explanation: |
  Hot Wallet एक शब्द है जिसका उपयोग Bitcoin Wallet का वर्णन करने के लिए किया जाता है जिसे इंटरनेट एक्सेस वाले डिवाइस जैसे फ़ोन या कंप्यूटर पर संग्रहीत किया जाता है। इस तरह, लेन-देन करना आसान है, लेकिन इसका मतलब यह भी है कि Wallet ऑनलाइन खतरों के लिए संभावित रूप से असुरक्षित है।
reviewed: true
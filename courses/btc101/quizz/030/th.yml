question: หน่วยงานใดบ้างที่รับผิดชอบในการออกสกุลเงินที่มีมูลค่าในตัวเอง?
answer: ธนาคารกลาง
wrong_answers:
  - ธนาคารพาณิชย์
  - รัฐบาล
  - สถาบันเอกชน
explanation: |
  ธนาคารกลางเป็นหน่วยงานที่รับผิดชอบในการออกสกุลเงินที่มีมูลค่าในตัวเอง พวกเขาตัดสินใจนโยบายการเงินและกำหนดว่าควรจะนำเงินเข้าสู่การหมุนเวียนหรือพิมพ์ออกมาเท่าใด
reviewed: true
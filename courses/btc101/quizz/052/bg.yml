question: Кое от изброените не е характеристика на Bitcoin?
answer: Тя лесно се цензурира.
wrong_answers:
  - Пренася се веднага.
  - Разходите за проверка са незначителни.
  - Тя има фиксирана парична политика.
explanation: |
  Bitcoin притежава всички необходими характеристики, за да бъде ефективна и здравословна валута: делима, незабавно преносима, нецензурируема, с незначителни разходи за проверка и с парична политика, която вече е определена за векове напред с 21 милиона единици.
reviewed: true
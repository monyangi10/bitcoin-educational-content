question: Manakah dari berikut ini yang bukan karakteristik Bitcoin?
answer: Mudah disensor.
wrong_answers:
  - Dapat dipindahkan secara instan.
  - Biaya verifikasinya sangat rendah.
  - Memiliki kebijakan moneter tetap.
explanation: |
  Bitcoin memiliki semua karakteristik yang diperlukan untuk menjadi mata uang yang efisien dan sehat: dapat dibagi, dapat dipindahkan secara instan, tidak dapat disensor, biaya verifikasi sangat rendah, dan dengan kebijakan moneter yang telah ditetapkan untuk berabad-abad mendatang dengan 21 juta unit.
reviewed: true

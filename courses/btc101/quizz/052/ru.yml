question: Что из перечисленного не является характеристикой Bitcoin?
answer: Его легко цензурировать.
wrong_answers:
  - Он мгновенно переносим.
  - Затраты на проверку незначительны.
  - У него фиксированная денежная политика.
explanation: |
  Bitcoin обладает всеми необходимыми характеристиками для эффективной и здоровой валюты: делимость, мгновенная переносимость, устойчивость к цензуре, незначительные затраты на проверку и денежная политика, установленная на века вперёд с 21 миллионом единиц.
reviewed: true

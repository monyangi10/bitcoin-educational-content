question: 다음 중 Bitcoin 특성이 아닌 것은 무엇인가요?
answer: 쉽게 검열됩니다.
wrong_answers:
  - 즉시 휴대할 수 있습니다.
  - 검증 비용이 거의 들지 않습니다.
  - 고정된 통화 정책을 가지고 있습니다.
explanation: |
  Bitcoin은 분할 가능하고, 즉시 전송 가능하며, 검열할 수 없고, 검증 비용이 거의 들지 않으며, 이미 2100만 개가 발행되어 향후 수 세기 동안 사용할 수 있는 통화 정책 등 효율적이고 건강한 화폐가 되기 위해 필요한 모든 특성을 갖추고 있습니다.
reviewed: true
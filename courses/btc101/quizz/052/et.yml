question: Milline järgnevatest ei ole Bitcoini omadus?
answer: Seda on lihtne tsenseerida.
wrong_answers:
  - See on koheselt ülekantav.
  - Selle kontrollimise kulud on tühised.
  - Sellel on fikseeritud rahapoliitika.
explanation: |
  Bitcoinil on kõik vajalikud omadused, et olla tõhus ja terve valuuta: jagatav, koheselt ülekantav, tsenseerimatu, tühised kontrollimise kulud ja rahapoliitika, mis on juba sajandiks ette määratud 21 miljoni ühikuga.
reviewed: true

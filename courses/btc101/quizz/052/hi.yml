question: निम्नलिखित में से कौन सी Bitcoin विशेषता नहीं है?
answer: इसे आसानी से सेंसर कर दिया जाता है।
wrong_answers:
  - इसे तुरन्त परिवहन योग्य बनाया जा सकता है।
  - इसमें सत्यापन की लागत नगण्य है।
  - इसकी एक निश्चित मौद्रिक नीति है।
explanation: |
  जी.डब्लू.-1 में एक कुशल और स्वस्थ मुद्रा होने के लिए सभी आवश्यक विशेषताएं हैं: विभाज्य, तुरंत परिवहन योग्य, बिना सेंसर, सत्यापन के लिए नगण्य लागत, और 21 मिलियन इकाइयों के साथ आने वाली शताब्दियों के लिए पहले से ही निर्धारित मौद्रिक नीति।
reviewed: true
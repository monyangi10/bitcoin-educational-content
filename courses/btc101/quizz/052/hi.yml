question: 20% महंगाई का 3 साल में खरीदने की क्षमता पर क्या असर होगा?  

सीधे शब्दों में:  
- 20% महंगाई का मतलब है कि चीजें हर साल 20% महंगी हो जाएंगी।  
- 3 साल बाद, ₹100 की खरीदारी करने के लिए आपको लगभग ₹173 (यानी 100 × 1.2 × 1.2 × 1.2) चाहिए होंगे।  
- आपका पैसा लगभग 42% कमजोर हो जाएगा (क्योंकि 100/173 ≈ 0.58, यानी सिर्फ 58% खरीदने की ताकत बचेगी)।  

संक्षेप में:  
3 साल में 20% की महंगाई आपके पैसे की ताकत को आधे से भी कम कर देगी!
answer: आपकी खरीदारी की ताकत 50% कम हो जाती है।
wrong_answers:
  - आपकी खरीदारी की शक्ति का 100% नुकसान हो जाता है।
  - आपकी खरीदारी की ताकत 60% कम हो जाती है।
  - आपकी खरीदारी की ताक़त 30% कम हो जाती है।
explanation: |
  20% महंगाई के साथ, आपकी खरीदारी की क्षमता लगभग आधी रह जाती है।
  3 साल में ताकत।
reviewed: true
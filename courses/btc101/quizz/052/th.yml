question: ข้อใดต่อไปนี้ไม่ใช่ลักษณะของ Bitcoin?
answer: มันถูกเซ็นเซอร์ได้ง่าย
wrong_answers:
  - มันสามารถเคลื่อนย้ายได้ทันที
  - มันมีต้นทุนในการตรวจสอบที่น้อยมาก
  - มันมีนโยบายการเงินที่คงที่
explanation: |
  Bitcoin มีลักษณะที่จำเป็นทั้งหมดในการเป็นสกุลเงินที่มีประสิทธิภาพและดีต่อสุขภาพ: แบ่งแยกได้, ขนส่งได้ทันที, ไม่สามารถถูกเซ็นเซอร์, มีค่าใช้จ่ายในการตรวจสอบที่น้อยมาก, และมีนโยบายการเงินที่กำหนดไว้แล้วสำหรับหลายศตวรรษข้างหน้าด้วยจำนวน 21 ล้านหน่วย
reviewed: true
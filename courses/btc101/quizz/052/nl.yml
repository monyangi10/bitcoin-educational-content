question: Welke van de volgende is geen Bitcoin eigenschap?
answer: Het wordt gemakkelijk gecensureerd.
wrong_answers:
  - Het is onmiddellijk transporteerbaar.
  - De verificatiekosten zijn verwaarloosbaar.
  - Het heeft een vast monetair beleid.
explanation: |
  Bitcoin heeft alle eigenschappen die nodig zijn om een efficiënte en gezonde valuta te zijn: deelbaar, direct vervoerbaar, niet te controleren, verwaarloosbare kosten voor verificatie en met een monetair beleid dat al voor eeuwen is vastgesteld met 21 miljoen eenheden.
reviewed: true
question: Muri ibi bikurikira, ni ikihe kitari ikiranga Bitcoin?
answer: Bica bicengera bitagoranye.
wrong_answers:
  - Ni ikintu gishobora gutwarwa ubwo nyene.
  - Irafise amafaranga makeyi yo kugenzura.
  - Irafise politike y’amahera idahinduka.
explanation: |
  Bitcoin ifise ibiranga vyose bikenewe kugira ngo ibe ifaranga rikora neza kandi rifise amagara meza: rishobora kugabanywa, rishobora gutwarwa ubwo nyene, ridashobora gusuzumwa, rifise igiciro gitoyi co kugenzura, kandi rifise politike y’amahera imaze gushirwaho mu binjana n’ibindi bizoza n’amamiliyoni 21 y’amafaranga.
reviewed: true
question: Bitcoin แทนสัญลักษณ์อะไรนอกเหนือจากเทคโนโลยีของมัน?
answer: การปฏิวัติต่อต้านระบบการเงินแบบดั้งเดิมและทางเลือกที่ยึดถือความโปร่งใส การกระจายอำนาจ และอธิปไตยของปัจเจกบุคคล
wrong_answers:
  - รูปแบบใหม่ของสกุลเงินดิจิทัลที่มีประสิทธิภาพมากกว่าสกุลเงินแบบดั้งเดิมเพราะมีความรวดเร็วกว่า
  - วิธีการที่บุคคลสามารถทำเงินผ่าน mining
  - เครื่องมือสำหรับอาชญากรในการทำธุรกรรมที่ผิดกฎหมาย
explanation: |
  นอกเหนือจากเทคโนโลยีของมัน Bitcoin เป็นสัญลักษณ์ของการปฏิวัติต่อต้านระบบการเงินแบบดั้งเดิม: โปรโตคอลบังคับใช้ระบบการเงินใหม่โดยไม่มีหน่วยงานกลางใด ๆ
reviewed: true
question: Bitcoin은 기술 그 이상의 무엇을 상징하나요?
answer: 기존 금융 시스템에 대한 혁명이자 투명성, 탈중앙화, 개인 주권에 기반한 대안입니다.
wrong_answers:
  - 기존 통화보다 더 빠른 새로운 형태의 디지털 통화로, 기존 통화보다 효율적입니다.
  - 개인이 Mining을 통해 수익을 창출할 수 있는 방법입니다.
  - 범죄자들이 불법 거래를 하기 위한 도구입니다.
explanation: |
  Bitcoin는 기술을 넘어 기존 금융 시스템에 대한 혁명을 상징합니다
  기존 금융 시스템에 대한 혁명을 상징합니다
  프로토콜은 중앙 기관 없이 새로운 통화 시스템을 시행합니다.
reviewed: true
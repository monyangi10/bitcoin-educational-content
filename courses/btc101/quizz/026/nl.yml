question: Waarom kan goud niet goed presteren in een geglobaliseerde en digitale wereld?
answer: Omdat het een centrale entiteit nodig heeft om het deelbaar en gemakkelijk uitwisselbaar te maken.
wrong_answers:
  - Omdat het niet waardevol genoeg is.
  - Omdat het niet zeldzaam genoeg is.
  - Omdat het na verloop van tijd erodeert.
explanation: |
  Goud kan niet bijblijven in een geglobaliseerde en digitale wereld
  omdat het een centrale entiteit nodig heeft om het deelbaar en
  gemakkelijk uitwisselbaar te maken. Dit maakt het minder praktisch om te gebruiken in
  een wereld waar transacties steeds meer digitaal en
  gedecentraliseerd.
reviewed: true
question: Защо Bitcoin се смята за нова форма на пари?
answer: Защото това са дигитални пари без централна структура.
wrong_answers:
  - Защото това е цифрова валута, обезпечена със злато.
  - Защото това е валута, която изисква блокчейн на банката.
  - Защото така казва Федералният резерв.
explanation: |
  Bitcoin може да се разглежда като нова форма на пари, тъй като се появява
  в мрежа от равнопоставени партньори без централна структура.
reviewed: true
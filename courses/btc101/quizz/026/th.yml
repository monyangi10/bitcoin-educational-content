question: ทำไม Bitcoin ถึงถูกพิจารณาว่าเป็นรูปแบบใหม่ของเงิน?
answer: เพราะมันเป็นเงินดิจิทัลที่ไม่มีหน่วยงานกลาง
wrong_answers:
  - เพราะมันเป็นสกุลเงินดิจิทัลที่มีทองคำหนุนหลัง
  - เพราะมันเป็นสกุลเงินที่ต้องการบล็อกเชนของธนาคาร
  - เพราะว่าธนาคารกลางสหรัฐกล่าวเช่นนั้น
explanation: |
  Bitcoin สามารถถูกมองว่าเป็นรูปแบบใหม่ของเงิน เนื่องจากมันเกิดขึ้นจากเครือข่ายแบบเพียร์ทูเพียร์โดยไม่มีหน่วยงานกลาง
reviewed: true
question: 사이버 공간 독립 선언이란 무엇인가요?
answer: 사이버 공간은 물리적 영역과 별개의 영역이므로 동일한 법의 적용을 받아서는 안 된다고 주장하는 글입니다.
wrong_answers:
  - 기존 금융 시스템으로부터 Bitcoin의 독립을 선언하는 선언문입니다.
  - 사이버 공간을 정부 규제로 통제해야 한다고 주장하는 글입니다.
  - 해적 운동이 어떤 규제로부터도 독립할 것을 보증하는 선언문입니다.
explanation: |
  사이버 공간 독립 선언문은
  1996년 존 페리 발로우가 작성했습니다. 이 문서는 다음과 같이 주장합니다
  사이버 공간은 물리적 공간과는 별개의 영역이므로
  영역이므로 산업 정부는 그곳에서 자신의 권한을
  권한을 행사할 수 없다고 주장합니다.
reviewed: true
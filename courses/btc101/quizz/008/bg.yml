question: Какво представлява Декларацията за независимост на киберпространството?
answer: Текст, в който се твърди, че киберпространството е отделна сфера от физическата и не трябва да се подчинява на същите закони.
wrong_answers:
  - Декларация, в която се заявява независимостта на Bitcoin от традиционните финансови системи.
  - Текст, в който се твърди, че киберпространството трябва да се контролира от правителството.
  - Декларация, която гарантира независимостта на пиратското движение от всякакви разпоредби.
explanation: |
  Декларацията за независимост на киберпространството е
  написана от Джон Пери Барлоу през 1996 г. В този документ се твърди, че
  че киберпространството е отделна област от физическото
  сфера, така че индустриалните правителства не могат да налагат своите
  в него.
reviewed: true
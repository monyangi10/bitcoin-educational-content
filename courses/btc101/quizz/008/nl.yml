question: Wat betekent het voor Bitcoin om een neutrale valuta te zijn?
answer: Het wordt door geen enkele entiteit of instelling gecontroleerd.
wrong_answers:
  - Het wordt gecontroleerd door een enkele entiteit of instelling.
  - Het wordt gereguleerd door de overheid.
  - Het wordt alleen gebruikt voor grote transacties.
explanation: |
  Bitcoin is een neutrale valuta, wat betekent dat het niet wordt gecontroleerd
  door geen enkele entiteit of instelling, dus elke gebruiker heeft dezelfde
  rechten. Dit is een belangrijk aspect van de decentralisatie.
reviewed: true
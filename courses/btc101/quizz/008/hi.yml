question: साइबरस्पेस की स्वतंत्रता की घोषणा क्या है?
answer: एक पाठ जिसमें यह कहा गया है कि साइबरस्पेस भौतिक क्षेत्र से अलग क्षेत्र है और उस पर समान कानून लागू नहीं होने चाहिए।
wrong_answers:
  - एक घोषणा जिसमें पारंपरिक वित्तीय प्रणालियों से Bitcoin की स्वतंत्रता का उल्लेख किया गया है।
  - एक पाठ जिसमें जोर दिया गया है कि साइबरस्पेस को सरकारी विनियमन द्वारा नियंत्रित किया जाना चाहिए।
  - एक घोषणा जो समुद्री डाकू आंदोलन की किसी भी विनियमन से स्वतंत्रता की गारंटी देती है।
explanation: |
  साइबरस्पेस की स्वतंत्रता की घोषणा जॉन पेरी बार्लो ने 1996 में लिखी थी। इस दस्तावेज़ में कहा गया है कि साइबरस्पेस भौतिक क्षेत्र से अलग क्षेत्र है, इसलिए औद्योगिक सरकारें वहाँ अपना अधिकार लागू नहीं कर सकतीं।
reviewed: true
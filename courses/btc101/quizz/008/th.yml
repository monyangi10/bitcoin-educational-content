question: ปฏิญญาอิสรภาพแห่งไซเบอร์สเปซคืออะไร?
answer: ข้อความที่ยืนยันว่าไซเบอร์สเปซเป็นอาณาจักรที่แตกต่างจากโลกทางกายภาพและไม่ควรถูกบังคับใช้ด้วยกฎหมายเดียวกัน
wrong_answers:
  - คำประกาศแสดงถึงการเป็นอิสระของ Bitcoin จากระบบการเงินแบบดั้งเดิม
  - ข้อความที่ยืนยันว่าพื้นที่ไซเบอร์ควรได้รับการควบคุมโดยกฎระเบียบของรัฐบาล
  - คำประกาศที่รับรองความเป็นอิสระของขบวนการโจรสลัดจากกฎระเบียบใด ๆ
explanation: |
  ปฏิญญาอิสรภาพแห่งไซเบอร์สเปซถูกเขียนขึ้นโดย John Perry Barlow ในปี 1996 เอกสารนี้ยืนยันว่าไซเบอร์สเปซเป็นอาณาจักรที่แตกต่างจากโลกทางกายภาพ ดังนั้นรัฐบาลอุตสาหกรรมไม่สามารถบังคับใช้สิทธิอำนาจของตนที่นั่นได้
reviewed: true
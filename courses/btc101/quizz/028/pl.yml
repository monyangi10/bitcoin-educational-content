question: Czym są waluty fiducjarne (fiat)?
answer: Pieniądz fiat to waluta, która ma wartość, ponieważ utrzymuje ją rząd, a ludzie wierzą w jej wartość, ale nie jest zabezpieczona żadnym dobrem fizycznym, takim jak złoto.
wrong_answers:
  - Pieniądz fiat to waluta, która jest zabezpieczona dobrem fizycznym, takim jak złoto lub srebro, co oznacza, że jej wartość jest bezpośrednio powiązana z wartością tego towaru.
  - Pieniądze fiducjarne to rodzaj kryptowaluty, która działa w zdecentralizowanej sieci, umożliwiając transakcje peer-to-peer bez potrzeby posiadania centralnego organu.
  - Pieniądz fiat to waluta, która nie ma wartości wewnętrznej i nie może być wykorzystywana do transakcji, co czyni ją zasadniczo bezwartościową w gospodarce.
explanation: |
  Pieniądz fiat jest prawnym środkiem płatniczym ustanowionym dekretem rządowym, a jego wartość nie jest oparta na żadnym towarze fizycznym.
reviewed: true

question: Какво е значението на фиатните пари?
answer: Фиатните пари са валута, която има стойност, защото правителството я поддържа и хората вярват в нейната стойност, а не е обезпечена с физическа стока като златото.
wrong_answers:
  - Фиатните пари са пари, които са обезпечени с физическа стока, например злато или сребро, което означава, че стойността им е пряко обвързана със стойността на тази стока.
  - Фиатните пари са вид криптовалута, която работи в децентрализирана мрежа, позволяваща транзакции между равнопоставени партньори без нуждата от централен орган.
  - Фиатните пари са пари, които нямат вътрешна стойност и не могат да се използват за транзакции, което ги прави по същество безполезни в икономиката.
explanation: |
  Фиатните пари са установени като законно платежно средство с правителствен декрет и тяхната стойност не се определя от никаква физическа стока.
reviewed: true
question: 법정 화폐의 의미는 무엇인가요?
answer: 법정화폐는 금과 같은 실물 상품에 의해 뒷받침되는 것이 아니라 정부가 이를 유지하고 사람들이 그 가치에 대한 믿음을 가지고 있기 때문에 가치가 있는 화폐입니다.
wrong_answers:
  - 법정 화폐는 금이나 은과 같은 실물 상품이 뒷받침하는 화폐로, 그 가치가 해당 상품의 가치와 직접적으로 연계되어 있습니다.
  - 법정 화폐는 탈중앙화된 네트워크에서 작동하는 암호화폐의 일종으로, 중앙 기관 없이 P2P 거래가 가능합니다.
  - 법정 화폐는 내재적 가치가 없고 거래에 사용할 수 없는 화폐로, 경제에서 본질적으로 가치가 없는 화폐입니다.
explanation: |
  법정 화폐는 정부 법령에 의해 법정 통화로 정해지며, 그 가치는 실물 상품에서 파생되지 않습니다.
reviewed: true
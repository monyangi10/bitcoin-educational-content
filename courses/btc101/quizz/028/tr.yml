question: Günümüz para biriminin evrim yolu nedir?
answer: Ham taş -> Coin -> Banknot -> Banka kartı -> Blockchain -> Lightning Network
wrong_answers:
  - Ham taş -> Coin -> Banknot -> Blockchain -> Lightning Network
  - Ham taş -> Coin -> Banknot -> Banka kartı -> Lightning Network
  - Ham taş -> Coin -> Banka kartı -> Banknot -> Blockchain -> Lightning Network
explanation: |
  Para birimi zamanla gelişen bir teknolojidir,
  ham taşlarla temsil edilmekten başlayarak, değişen
  metal paralara, daha sonra banknotlara, banka kartlarına ve
  kullanımı ile nihayet eşler arası ağlara
  Bitcoin Blockchain ve Lightning Network.
reviewed: true
question: फिएट मनी का क्या अर्थ है?
answer: फिएट मुद्रा वह मुद्रा है जिसका मूल्य इसलिए होता है क्योंकि सरकार इसका रखरखाव करती है और लोगों को इसके मूल्य पर विश्वास होता है, न कि यह सोने जैसी भौतिक वस्तु द्वारा समर्थित होती है।
wrong_answers:
  - फिएट मुद्रा वह मुद्रा होती है जो किसी भौतिक वस्तु, जैसे सोना या चांदी, द्वारा समर्थित होती है, जिसका अर्थ है कि इसका मूल्य सीधे उस वस्तु के मूल्य से जुड़ा होता है।
  - फिएट मनी एक प्रकार की क्रिप्टोकरेंसी है जो विकेन्द्रीकृत नेटवर्क पर संचालित होती है, जिससे केंद्रीय प्राधिकरण की आवश्यकता के बिना पीयर-टू-पीयर लेनदेन की अनुमति मिलती है।
  - फिएट मुद्रा वह मुद्रा है जिसका कोई आंतरिक मूल्य नहीं होता है और इसका उपयोग लेनदेन के लिए नहीं किया जा सकता है, जिससे यह अर्थव्यवस्था में अनिवार्यतः बेकार हो जाती है।
explanation: |
  फिएट मुद्रा को सरकारी आदेश द्वारा कानूनी निविदा के रूप में स्थापित किया जाता है, तथा इसका मूल्य किसी भी भौतिक वस्तु से प्राप्त नहीं होता है।

question: Wat is een van de dingen die je moet overwegen bij het kiezen van een DCA-platform?
answer: Beschikbaarheid in jouw land.
wrong_answers:
  - De kleur van het logo van het platform.
  - Het aantal gebruikers op het platform.
  - De leeftijd van het platform.
explanation: |
  Deze cursus tekst vermeldt dat bij het kiezen van een DCA
  platform, de juiste keuze meer zal afhangen van de
  beschikbaarheid in jouw land.
reviewed: true
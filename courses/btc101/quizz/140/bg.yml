question: Какви биха били последиците за потребителите на Bitcoin, ако блоковете са 100 пъти по-тежки?
answer: Пускането на възел Bitcoin няма да е достъпно за обикновения човек, което ще компрометира децентрализацията на протокола и неизменността на транзакциите и правилата за консенсус.
wrong_answers:
  - Управлението на възел Bitcoin ще бъде по-достъпно за обикновения човек, което ще подобри децентрализацията на протокола и неизменността на транзакциите и правилата за консенсус.
  - Капацитетът на мрежата за транзакции ще намалее.
  - Възнаграждението за блок за миньорите ще се увеличи.
explanation: |
  Ако блоковете са 100 пъти по-тежки, при работа с Bitcoin
  щеше да е необходим твърд диск с капацитет 50 TB, пропускателна способност над
  500GB/месец и хардуер, способен да валидира стотици
  хиляди транзакции за по-малко от 10 минути. Този
  би направило работата на възел Bitcoin недостъпна за
  средностатистическият човек ще се компрометира децентрализацията на
  протокола и неизменността на транзакциите и консенсуса
  правила.
reviewed: true
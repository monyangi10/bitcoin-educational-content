question: ผลกระทบต่อผู้ใช้ Bitcoin จะเป็นอย่างไรหากบล็อกหนักขึ้น 100 เท่า?
answer: การรันโหนด Bitcoin จะไม่สามารถเข้าถึงได้สำหรับบุคคลทั่วไป ซึ่งจะส่งผลกระทบต่อการกระจายอำนาจของโปรโตคอลและความไม่เปลี่ยนแปลงของทั้งธุรกรรมและกฎฉันทามติ
wrong_answers:
  - การรันโหนด Bitcoin จะทำให้บุคคลทั่วไปเข้าถึงได้ง่ายขึ้น ซึ่งจะช่วยเพิ่มการกระจายอำนาจของโปรโตคอลและความไม่เปลี่ยนแปลงของทั้งธุรกรรมและกฎฉันทามติ
  - ความสามารถในการทำธุรกรรมของเครือข่ายจะลดลง
  - รางวัลบล็อกสำหรับนักขุดจะเพิ่มขึ้น
explanation: |
  หากบล็อกมีน้ำหนักมากขึ้น 100 เท่า การรันโหนด Bitcoin จะต้องใช้ฮาร์ดดิสก์ขนาด 50TB แบนด์วิดท์มากกว่า 500GB/เดือน และฮาร์ดแวร์ที่สามารถตรวจสอบธุรกรรมหลายแสนรายการในเวลาน้อยกว่า 10 นาที สิ่งนี้จะทำให้การรันโหนด Bitcoin ไม่สามารถเข้าถึงได้สำหรับคนทั่วไป ซึ่งจะส่งผลกระทบต่อการกระจายศูนย์ของโปรโตคอลและความไม่เปลี่ยนแปลงของธุรกรรมและกฎเกณฑ์การตกลงร่วมกัน
reviewed: true
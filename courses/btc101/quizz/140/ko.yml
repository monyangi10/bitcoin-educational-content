question: 블록이 100배 무거울 경우 Bitcoin 사용자에게는 어떤 영향이 있을까요?
answer: Bitcoin 노드를 실행하는 것은 일반인이 접근할 수 없으므로 프로토콜의 탈중앙화와 트랜잭션 및 합의 규칙의 불변성이 손상될 수 있습니다.
wrong_answers:
  - Bitcoin 노드를 운영하면 일반인이 더 쉽게 접근할 수 있어 프로토콜의 탈중앙화와 트랜잭션 및 합의 규칙의 불변성을 강화할 수 있습니다.
  - 네트워크의 트랜잭션 용량이 감소합니다.
  - 채굴자의 Block reward가 증가합니다.
explanation: |
  블록이 100배 더 무거울 경우, Bitcoin
  노드를 실행하려면 50TB Hard 디스크, 월 500GB 이상의 대역폭이 필요합니다
  500GB/월, 그리고 수백 개의 트랜잭션을 1분 이내에
  수천 개의 트랜잭션을 10분 이내에 검증할 수 있는 하드웨어가 필요합니다. 이
  일반인이 Bitcoin 노드를 실행하는 것은 불가능합니다
  일반인이 Bitcoin 노드를 운영할 수 없게 됩니다
  프로토콜의 탈중앙화와 트랜잭션 및 합의의 불변성
  규칙을 손상시킬 수 있습니다.

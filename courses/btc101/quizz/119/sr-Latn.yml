question: Šta je Bitkoin transakcija?
answer: Prijenos vlasništva bitkoina, koristeći kriptografiju.
wrong_answers:
  - Fizička razmena bitkoina, koristeći notara.
  - Prenos vlasništva bitkoina, korišćenjem fizičke adrese.
  - Prenos vlasništva bitkoina, koristeći email adresu.
explanation: |
  Bitkoin transakcija je digitalni prenos
  vlasništva bitkoina, korišćenjem Bitcoin adrese
  dobijenog zahvaljujući kriptografiji eliptičke krive. Ova
  adresa je jedinstven za novčanik osobe koja prima
  bitkoine.
reviewed: true

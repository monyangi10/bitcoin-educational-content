question: ธุรกรรม Bitcoin คืออะไร?
answer: การโอนกรรมสิทธิ์ของบิตคอยน์ โดยใช้การเข้ารหัสลับ
wrong_answers:
  - การแลกเปลี่ยนบิตคอยน์ทางกายภาพ โดยใช้ทนายความ
  - การโอนกรรมสิทธิ์ของบิตคอยน์ โดยใช้ที่อยู่ทางกายภาพ
  - การโอนกรรมสิทธิ์ของบิตคอยน์ โดยใช้ที่อยู่อีเมล
explanation: |
  การทำธุรกรรม Bitcoin คือการโอนกรรมสิทธิ์ของบิตคอยน์แบบดิจิทัล โดยใช้ที่อยู่ Bitcoin ที่ได้มาจากการเข้ารหัส Elliptic Curve ที่อยู่นี้เป็นเอกลักษณ์เฉพาะสำหรับ wallet ของบุคคลที่ได้รับบิตคอยน์
reviewed: true
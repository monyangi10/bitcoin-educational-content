question: Vad är en Bitcoin-transaktion?
answer: En överföring av Ownership bitcoins med hjälp av kryptografi.
wrong_answers:
  - En fysisk Exchange av bitcoins, med hjälp av en notarie.
  - En överföring av Ownership bitcoins med hjälp av en fysisk Address.
  - En överföring av Ownership bitcoins med hjälp av ett e-postmeddelande Address.
explanation: |
  En Bitcoin-transaktion är en digital överföring av
  Ownership av bitcoins, genom användning av en Bitcoin Address
  som härleds tack vare kryptografi med elliptisk kurva. Denna
  Address är unik för Wallet hos den person som tar emot bitcoins
  bitcoins.
reviewed: true
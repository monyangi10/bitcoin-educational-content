question: Czym jest transakcja Bitcoin?
answer: Transfer własności bitcoinów przy użyciu kryptografii.
wrong_answers:
  - Fizyczna wymiana bitcoinów przy użyciu notariusza.
  - Transfer własności bitcoinów przy użyciu adresu fizycznego.
  - Transfer własności bitcoinów przy użyciu adresu e-mail.
explanation: |
  Transakcja Bitcoin jest cyfrowym transferem własności bitcoinów, poprzez wykorzystanie adresu Bitcoin
  uzyskanego dzięki kryptografii krzywej eliptycznej. Adres ten jest unikalny dla portfela osoby otrzymującej bitcoiny.
reviewed: true

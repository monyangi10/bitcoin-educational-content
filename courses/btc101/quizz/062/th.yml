question: จำนวนบิตคอยน์ที่หมุนเวียนหลังจากการลดรางวัลครั้งแรกคือเท่าใด?
answer: 10,500,000 BTC.
wrong_answers:
  - 5,250,000 BTC.
  - 15,750,000 BTC.
  - 21,000,000 BTC.
explanation: |
  หลังจากการ Halving ครั้งแรก ซึ่งเกิดขึ้นที่ความสูงของบล็อก
  210,000 จำนวนบิตคอยน์ที่หมุนเวียนอยู่โดยประมาณ
  คือ 10,500,000 BTC ซึ่งเป็นครึ่งหนึ่งของจำนวนบิตคอยน์ทั้งหมด
  ที่จะหมุนเวียนอยู่ในระบบ
reviewed: true
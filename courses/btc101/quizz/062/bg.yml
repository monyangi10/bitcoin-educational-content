question: Какъв е приблизителният брой на биткойните в обращение след първото намаляване наполовина?
answer: 10 500 000 BTC.
wrong_answers:
  - 5,250,000 BTC.
  - 15 750 000 BTC.
  - 21 000 000 BTC.
explanation: |
  След първото намаляване на половина, което се извършва на височината на блока
  210 000, приблизителният брой на биткойните в обращение
  беше 10 500 000 BTC, което е половината от общия брой на
  биткойни, които ще бъдат в обращение.
reviewed: true
question: 첫 번째 Halving 이후 유통된 비트코인의 예상 수량은 얼마였나요?
answer: 10,500,000 BTC.
wrong_answers:
  - 5,250,000 BTC.
  - 15,750,000 BTC.
  - 21,000,000 BTC.
explanation: |
  블록 높이에서 발생한 첫 번째 Halving 이후
  210,000 이후, 유통되는 비트코인의 추정 수량은
  10,500,000 BTC로, 이는 전체 비트코인 수의 절반에 해당합니다
  유통될 비트코인의 절반입니다.
reviewed: true
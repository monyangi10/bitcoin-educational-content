question: Vad var det uppskattade antalet bitcoins i omlopp efter den första Halving?
answer: 10.500.000 BTC.
wrong_answers:
  - 5 250 000 BTC.
  - 15.750.000 BTC.
  - 21.000.000 BTC.
explanation: |
  Efter den första Halving, som inträffade vid blockhöjd
  210.000, det uppskattade antalet bitcoins i omlopp
  var 10 500 000 BTC, vilket är hälften av det totala antalet
  bitcoins som kommer att vara i omlopp.
reviewed: true
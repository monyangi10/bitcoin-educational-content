question: Какво означава Bitcoin да бъде неутрална валута?
answer: Той не се контролира от нито една организация или институция.
wrong_answers:
  - Тя се контролира от едно лице или институция.
  - Тя се регулира от правителството.
  - Използва се само за големи транзакции.
explanation: |
  Bitcoin е неутрална валута, което означава, че не се контролира
  от никоя организация или институция, така че всеки потребител има една и съща
  права. Това е ключов аспект на нейната децентрализация.
reviewed: true
question: None Bitcoin kuba ifaranga ritagira aho ribogamiye bisobanura iki?
answer: Nta kigo canke ikigo na kimwe kigenzurwa.
wrong_answers:
  - Igenzurwa n’ikigo kimwe canke ikigo kimwe.
  - Igenzurwa na leta.
  - Ikoreshwa gusa mu bikorwa bininibinini.
explanation: |
  Bitcoin ni ifaranga ritagira aho ribogamiye, bisobanura ko ridagenzurwa
  n'ikigo ico ari co cose canke ikigo, rero umukoresha wese afise kimwe
  uburenganzira. Ivyo ni vyo bihambaye mu bijanye no kwegereza ubutegetsi bwayo.
reviewed: true
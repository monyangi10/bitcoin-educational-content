question: Bitcoin เป็นสกุลเงินที่เป็นกลางหมายความว่าอย่างไร?
answer: มันไม่ได้ถูกควบคุมโดยหน่วยงานหรือสถาบันใด ๆ
wrong_answers:
  - มันถูกควบคุมโดยหน่วยงานหรือสถาบันเดียว
  - มันถูกควบคุมโดยรัฐบาล
  - มันใช้สำหรับการทำธุรกรรมขนาดใหญ่เท่านั้น
explanation: |
  Bitcoin เป็นสกุลเงินที่เป็นกลาง หมายความว่าไม่ได้ถูกควบคุมโดยหน่วยงานหรือสถาบันใด ๆ ดังนั้นผู้ใช้ทุกคนจึงมีสิทธิเท่าเทียมกัน นี่เป็นแง่มุมสำคัญของการกระจายอำนาจของมัน
reviewed: true
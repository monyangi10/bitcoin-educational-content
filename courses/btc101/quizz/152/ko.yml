question: Bitcoin Mining에서 에너지 소비의 의미는 무엇인가요?
answer: 정보를 생성하는 데는 에너지 소비가 필요하지만 정보를 검증하는 데는 비용이 무시할 수 없을 정도로 적습니다. 이러한 비대칭성이 네트워크의 보안을 보장합니다.
wrong_answers:
  - ASIC에 사용되는 Mining 기계에 전력을 공급하기 위해서는 에너지 비용이 필요하며, 정보 검증에는 많은 비용이 듭니다.
  - Bitcoin 네트워크를 유지하려면 에너지 소비가 필요하고, 정보 검증에는 가변적인 비용이 발생합니다.
  - 새로운 비트코인을 생성하는 데 에너지 비용이 필요하지 않습니다.

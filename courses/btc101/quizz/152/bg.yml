question: Какво е значението на разхода на енергия в Bitcoin копаенето?
answer: Разходът на енергия е необходим, за да се създаде информацията, но проверката на информацията е с незначителни разходи. Тази асиметрия гарантира сигурността на мрежата.
wrong_answers:
  - Разходите за енергия са необходими за захранване на машините ASIC, използвани в копаенето, а проверката на информацията е свързана с високи разходи.
  - Разходите за енергия са необходими за поддържане на мрежата Bitcoin, а проверката на информацията е свързана с променливи разходи.
  - Разходите за енергия не са необходими за създаването на нови биткойни.

question: ความถี่ของการปรับความยากคือเท่าใด?
answer: ทุก ๆ 2016 บล็อก
wrong_answers:
  - ทุก ๆ 1048 บล็อก
  - ทุก ๆ 512 บล็อก
  - ทุก ๆ 4032 บล็อก
explanation: |
  การปรับความยากเป็นกลไกที่เกิดขึ้นทุก ๆ 2016 บล็อก หรือประมาณสองสัปดาห์ เพื่อให้แน่ใจว่ามีการเพิ่มบล็อกใหม่ในบล็อกเชนทุก ๆ สิบนาทีโดยเฉลี่ย โดยไม่คำนึงถึง hashrate ทั่วโลก
reviewed: true
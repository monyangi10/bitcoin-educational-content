question: Каква е честотата на коригиране на трудността?
answer: На всеки 2016 блока.
wrong_answers:
  - На всеки 1048 блока.
  - На всеки 512 блока.
  - На всеки 4032 блока.
explanation: |
  Регулирането на трудността е механизъм, който се осъществява
  на всеки 2016 блока или около две седмици, за да се гарантира, че
  нов блок се добавя към блокчейна на всеки десет минути на
  средно, независимо от глобалния хашрейт.
reviewed: true

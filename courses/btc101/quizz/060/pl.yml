question: Jaka jest częstotliwość regulacji trudności?
answer: Co 2016 bloków.
wrong_answers:
  - Co 1048 bloków.
  - Co 512 bloków.
  - Co 4032 bloki.
explanation: |
  Dostosowanie trudności to mechanizm, który ma miejsce
  co 2016 bloków lub co około dwa tygodnie, aby zapewnić, że nowy blok jest dodawany do łańcucha bloków średnio co dziesięć minut, niezależnie od globalnej prędkości haszowania.
reviewed: true

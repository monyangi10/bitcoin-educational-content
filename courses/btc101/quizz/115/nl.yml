question: Wie was de eerste persoon die lid werd van het Bitcoin netwerk na Satoshi Nakamoto?
answer: Hal Finney.
wrong_answers:
  - Laszlo Hanyecz.
  - Phil Champagne.
  - Rogzy.
explanation: |
  Hal Finney was de eerste persoon die zich aansloot bij het Bitcoin netwerk
  na Satoshi Nakamoto zelf. Hij tweette zelfs Running
  Bitcoin om de gelegenheid te markeren.
reviewed: true
question: Bitcoin으로 수수료를 지불하는 이유는 무엇인가요?
answer: 블록에 트랜잭션을 포함하기 위한 자유 시장을 만들 수 있습니다.
wrong_answers:
  - Bitcoin 채굴 방법을 소개합니다.
  - 부자들이 더 많은 비용을 지불하도록 허용합니다.
  - 네트워크에서 정부를 제외하려면
explanation: |
  블록에 트랜잭션을 포함하는 자유 시장을 만들기 위해서는 수수료가 필수적입니다. 실제로 블록의 크기는 1MB(SegWit 업데이트 이후 4MB로 확장됨)이므로 블록에 '삽입'할 수 있는 트랜잭션의 수는 블록당 수천 개로 제한됩니다.
reviewed: true
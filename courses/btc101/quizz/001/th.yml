question: ทำไมเราต้องจ่ายค่าธรรมเนียมใน Bitcoin?
answer: เพื่อสร้างตลาดเสรีสำหรับการรวมธุรกรรมในบล็อก
wrong_answers:
  - เพื่อแนะนำวิธีการขุด Bitcoin
  - ให้คนรวยจ่ายมากขึ้น
  - เพื่อแยกรัฐบาลออกจากเครือข่าย
explanation: |
  ค่าธรรมเนียมมีความสำคัญในการสร้างตลาดเสรีสำหรับการรวมธุรกรรมในบล็อก ในความเป็นจริง บล็อกมีขนาด 1 MB (ซึ่งขยายเป็น 4MB หลังจากการอัปเดต Segwit) ดังนั้นจำนวนธุรกรรมที่สามารถ "แทรก" ในบล็อกจึงจำกัดอยู่ที่ไม่กี่พันธุรกรรมต่อบล็อก
reviewed: true
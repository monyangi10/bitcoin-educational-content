question: Защо плащаме такси в Bitcoin?
answer: Създаване на свободен пазар за включване на транзакции в блокове.
wrong_answers:
  - Представяне на начина на разработване на Bitcoin.
  - Да се позволи на богатите хора да плащат повече.
  - Изключване на правителства от мрежата.
explanation: |
  Таксите са от съществено значение за създаването на свободен пазар за включване на транзакции в блокове. Всъщност размерът на блока е 1 MB (който беше увеличен на 4 MB след актуализацията на Segwit), така че броят на трансакциите, които могат да бъдат "вмъкнати" в блока, е ограничен до няколко хиляди трансакции на блок.
reviewed: true
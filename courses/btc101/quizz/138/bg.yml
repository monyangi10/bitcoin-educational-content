question: За какво беше блоковата война през 2017 г.?
answer: Конфликт относно това дали да се увеличи размерът на блока, за да се увеличи капацитетът на транзакциите.
wrong_answers:
  - Конфликт относно това дали да се намали размерът на блока, за да се намали капацитетът на транзакциите.
  - Конфликт относно това дали да се увеличи възнаграждението за блок, за да се стимулират миньорите.
  - Конфликт относно това дали да се намали възнаграждението за блок, за да се демотивират миньорите.
explanation: |
  Войната на блоковете през 2017 г. беше конфликт за това дали да се
  да се модифицира Bitcoin чрез увеличаване на размера на блока, за да се разшири
  капацитета на транзакциите.
reviewed: true
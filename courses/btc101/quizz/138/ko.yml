question: 2017년의 블록 전쟁은 무엇 때문이었나요?
answer: 트랜잭션 용량을 확장하기 위해 블록 크기를 늘릴지 여부에 대한 갈등.
wrong_answers:
  - 트랜잭션 용량을 줄이기 위해 블록 크기를 줄일지 여부에 대한 충돌입니다.
  - 채굴자에게 인센티브를 제공하기 위해 Block reward을 늘릴 것인지에 대한 갈등이 있었습니다.
  - 채굴자의 인센티브를 줄이기 위해 Block reward을 낮출지 여부에 대한 갈등이 있었습니다.
explanation: |
  2017년의 블록 전쟁은 다음을 둘러싼 갈등이었습니다
  블록 크기를 늘려 Bitcoin를 수정하여
  트랜잭션 용량을 늘릴지 여부였습니다.
reviewed: true
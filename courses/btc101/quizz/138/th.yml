question: สงครามบล็อกในปี 2017 เกี่ยวกับอะไร?
answer: ความขัดแย้งเกี่ยวกับการเพิ่มขนาดบล็อกเพื่อขยายความจุในการทำธุรกรรม
wrong_answers:
  - ความขัดแย้งเกี่ยวกับการลดขนาดบล็อกเพื่อลดความจุในการทำธุรกรรม
  - ความขัดแย้งเกี่ยวกับว่าจะเพิ่มรางวัลบล็อกเพื่อจูงใจนักขุดหรือไม่
  - ความขัดแย้งเกี่ยวกับว่าจะลดรางวัลบล็อกเพื่อไม่ให้แรงจูงใจแก่ผู้ขุดหรือไม่
explanation: |
  สงครามบล็อกในปี 2017 เป็นความขัดแย้งเกี่ยวกับว่าจะปรับเปลี่ยน Bitcoin โดยการเพิ่มขนาดบล็อกเพื่อขยายความจุในการทำธุรกรรมหรือไม่
reviewed: true
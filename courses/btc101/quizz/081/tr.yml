question: Bir Bitcoin Wallet seçerken, kişisel gözetim açısından kendinize sormanız gereken temel soru nedir?
answer: Fonların sahibi siz misiniz yoksa paranızın kontrolünü üçüncü bir tarafa mı bırakıyorsunuz?
wrong_answers:
  - Wallet bir passphrase ile emniyete alındı mı?
  - Wallet bitcoin almaya ve göndermeye izin veriyor mu?
  - Wallet'imi başka bir kişiyle paylaşabilir miyim?
explanation: |
  Bir Bitcoin Wallet seçerken, temel soru şudur:
  fonların sahibi siz misiniz yoksa fonların kontrolünü
  paranızı üçüncü bir tarafa mı veriyorsunuz? Bunun nedeni paranın sahibinin
  özel anahtar Bitcoin'lerin sahibidir.
reviewed: true
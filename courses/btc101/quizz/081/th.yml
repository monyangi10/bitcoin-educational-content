question: ความเสี่ยงหลักของการใช้บริการรับฝากเพื่อเก็บบิตคอยน์ของคุณคืออะไร?
answer: บุคคลที่สามที่เชื่อถือได้สามารถจำกัดการเข้าถึงเงินทุนของคุณได้ตลอดเวลา
wrong_answers:
  - บุคคลที่สามที่เชื่อถือได้สามารถเพิ่มมูลค่าของบิตคอยน์ของคุณได้ตลอดเวลา
  - บุคคลที่สามที่เชื่อถือได้สามารถลดมูลค่าของบิตคอยน์ของคุณได้ตลอดเวลา
  - บุคคลที่สามที่เชื่อถือไม่ได้สามารถทำซ้ำบิตคอยน์ของคุณได้ตลอดเวลา
explanation: >-
reviewed: true
question: Коя е една от основните характеристики на Bitcoin?
answer: Той може да бъде обменян навсякъде по света без разрешение от страна на който и да е орган.
wrong_answers:
  - Тя може да се използва само от избрана група хора.
  - За да се използва, се изисква разрешение от централен орган.
  - Може да се използва само в определени държави.
explanation: |
  В текста се споменава, че Bitcoin е псевдоанонимен и може да се обменя навсякъде по света без разрешение
  от която и да е организация.
reviewed: true

question: DCA platformu nedir?
answer: Kullanıcıların düzenli aralıklarla bir varlığa sabit miktarda para yatırmasını sağlayan bir hizmet.
wrong_answers:
  - Yalnızca Bitcoin ticaretine izin veren bir tür kripto para birimi Exchange.
  - Yatırımcılara marj ticareti için kredi sağlayan bir finansal hizmet.
  - Herhangi bir yatırım özelliği olmadan hisse senedi fiyatlarını gerçek zamanlı olarak izleyen bir yazılım aracı.
explanation: |
  Bir DCA platformu, aşağıdakileri kolaylaştıran bir platform anlamına gelir
  Dolar Maliyet Ortalaması (DCA), aşağıdakileri içeren bir yatırım stratejisidir
  bir birey, sabit bir miktar parayı bir bankaya yatırır
  ne olursa olsun, düzenli aralıklarla belirli bir varlık
  varlığın fiyatı.
reviewed: true
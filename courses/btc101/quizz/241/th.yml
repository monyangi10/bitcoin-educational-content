question: หนึ่งในลักษณะสำคัญของ Bitcoin คืออะไร?
answer: สามารถแลกเปลี่ยนได้ทุกที่ในโลกโดยไม่ต้องได้รับอนุญาตจากหน่วยงานใด ๆ
wrong_answers:
  - สามารถใช้ได้โดยกลุ่มคนที่ได้รับการคัดเลือกเท่านั้น
  - จำเป็นต้องได้รับอนุญาตจากหน่วยงานกลางเพื่อใช้งาน
  - สามารถใช้ได้ในบางประเทศเท่านั้น
explanation: |
  ข้อความระบุว่า Bitcoin เป็นนามแฝงและสามารถแลกเปลี่ยนได้ทุกที่ในโลกโดยไม่ต้องได้รับอนุญาตจากหน่วยงานใด ๆ
reviewed: true
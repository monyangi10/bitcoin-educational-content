question: Jaka jest jedna z głównych cech Bitcoina?
answer: Może być użyty do przeprowadzenia transakcji w dowolnym miejscu na świecie bez autoryzacji ze strony jakiegokolwiek podmiotu.
wrong_answers:
  - Może być używany tylko przez wybraną grupę osób.
  - Wymaga autoryzacji organu centralnego.
  - Może być używany tylko w niektórych krajach.
explanation: |
  Tekst wspomina, że Bitcoin jest pseudonimowy i może być
  użyty do przeprowadzenia transakcji w dowolnym miejscu na świecie bez autoryzacji
  jakiegokolwiek podmiotu.
reviewed: true

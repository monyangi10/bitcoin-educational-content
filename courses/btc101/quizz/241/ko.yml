question: Bitcoin의 주요 특징 중 하나는 무엇인가요?
answer: 어떤 기관의 승인 없이도 전 세계 어디에서나 교환할 수 있습니다.
wrong_answers:
  - 선택한 그룹만 사용할 수 있습니다.
  - 이를 사용하려면 중앙 기관의 승인이 필요합니다.
  - 특정 국가에서만 사용할 수 있습니다.
explanation: |
  텍스트에는 Bitcoin이 익명이며 승인 없이 전 세계 어디서든
  전 세계 어디에서나 교환할 수 있으며
  없이 전 세계 어디에서나 교환할 수 있다고 언급합니다.
reviewed: true
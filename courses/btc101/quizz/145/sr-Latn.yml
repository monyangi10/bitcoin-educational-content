question: Šta je Hashrate?
answer: Broj Hash proračuna koje uređaj za rudarenje može izvršiti po sekundi da bi rešio Proof of Work.
wrong_answers:
  - Brzina kojom uređaj za rudarenje može rešiti Proof of Work.
  - Ukupan broj rudara u Bitkoin mreži.
  - Ukupna količina bitkoina iskopanih izvođenjem određenog broja pokušaja u sekundi za rešavanje Proof of Work.

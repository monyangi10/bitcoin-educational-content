question: एक स्पॉन्टेनियस पर्चेस (spontaneous purchase) वो होता है जब आप बिना पहले से सोचे-समझे, अचानक कुछ खरीद लेते हैं। यानी पहले से प्लान नहीं होता, बस उस वक्त मन कर गया और आपने खरीद लिया! 😊  

जैसे: मार्केट जा रहे थे दूध लेने, और अचानक आइसक्रीम देखकर मन कर गया... खरीद ली! यही स्पॉन्टेनियस पर्चेस है।  

कभी-कभी इसे "इम्पल्स बाय" (impulse buy) भी कहते हैं।
answer: Bitcoin खरीद रहा हूँ तुरंत एक्सपोज़र पाने के लिए।
wrong_answers:
  - नियमित अंतराल पर Bitcoin खरीद रहा हूँ।
  - Bitcoin खरीदूंगा तभी जब दाम गिरेगा।
  - Bitcoin खरीदेंगे सिर्फ तभी जब कीमत बढ़ेगी।
explanation: |
  कोर्स के टेक्स्ट में बताया गया है कि एक सहज खरीदारी
  Bitcoin में तुरंत एक्सपोजर पाने के लिए इस्तेमाल किया जाता था। उदाहरण के लिए,
  इसका मतलब हो सकता है क्रैश के दौरान खरीदारी करना या फायदा उठाना
  एक बोनस।
reviewed: true
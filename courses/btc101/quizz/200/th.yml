question: ความเสี่ยงอย่างหนึ่งของการทิ้ง Bitcoin ไว้บนแพลตฟอร์มแลกเปลี่ยนคืออะไร?
answer: ความเสี่ยงของการแฮ็กและการบล็อกเงินทุน
wrong_answers:
  - ความเสี่ยงที่แพลตฟอร์มจะเพิ่มราคาของ Bitcoin
  - ความเสี่ยงของแพลตฟอร์มในการควบคุมการจัดหา Bitcoin
  - ความเสี่ยงที่ Bitcoin จะถูกแซงหน้าในด้านราคาด้วยสกุลเงินดิจิทัล
explanation: >-
reviewed: true
question: Ni igiki gikorwa nyamukuru c’ibihimba vyo mu murongo wa Bitcoin?
answer: Kubungabunga kopi ya Bitcoin Blockchain, kwemeza amafaranga, gutanga amakuru ku zindi nzira, no gukurikiza amategeko y’amasezerano ya Bitcoin.
wrong_answers:
  - Gucungera kopi ya Bitcoin Blockchain, kwemeza amafaranga, gutanga amakuru kuri leta, no guhindura amategeko y’amasezerano ya Bitcoin.
  - Gukomeza gusa kopi ya Bitcoin Blockchain.
  - Gutanga amakuru ku zindi nzira gusa.
explanation: >-
reviewed: true
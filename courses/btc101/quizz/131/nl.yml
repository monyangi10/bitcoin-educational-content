question: Wat is de primaire functie van knooppunten in het Bitcoin netwerk?
answer: Een kopie van Bitcoin Blockchain bijhouden, transacties valideren, informatie naar andere knooppunten sturen en de regels van het Bitcoin protocol afdwingen.
wrong_answers:
  - Het bijhouden van een kopie van het Bitcoin Blockchain, het valideren van transacties, het verzenden van informatie naar de overheid en het wijzigen van de regels van het Bitcoin protocol.
  - Alleen een kopie van de Bitcoin Blockchain bijhouden.
  - Alleen informatie verzenden naar andere knooppunten.

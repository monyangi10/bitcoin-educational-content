question: หน้าที่หลักของโหนดในเครือข่าย Bitcoin คืออะไร?
answer: การรักษาสำเนาของบล็อกเชน Bitcoin, การตรวจสอบธุรกรรม, การส่งข้อมูลไปยังโหนดอื่น ๆ, และการบังคับใช้กฎของโปรโตคอล Bitcoin
wrong_answers:
  - การรักษาสำเนาของบล็อกเชน Bitcoin, การตรวจสอบธุรกรรม, การส่งข้อมูลไปยังรัฐบาล, และการเปลี่ยนแปลงกฎของโปรโตคอล Bitcoin.
  - การรักษาสำเนาของบล็อกเชน Bitcoin เท่านั้น
  - การส่งข้อมูลไปยังโหนดอื่นเท่านั้น

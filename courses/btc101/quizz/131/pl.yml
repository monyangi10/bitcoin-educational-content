question: Jaka jest podstawowa funkcja węzłów w sieci Bitcoin?
answer: Utrzymywanie kopii łańucha bloków Bitcoina, zatwierdzanie transakcji, przekazywanie informacji do innych węzłów i egzekwowanie zasad protokołu Bitcoin.
wrong_answers:
  - Utrzymywanie kopii łańcucha bloków Bitcoina, zatwierdzanie transakcji, przekazywanie informacji do rządu i zmiana zasad protokołu Bitcoin.
  - Utrzymywanie kopii łańcucha bloków Bitcoin.
  - Przesyłanie informacji do innych węzłów.

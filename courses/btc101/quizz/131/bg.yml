question: Каква е основната функция на възлите в мрежата Bitcoin?
answer: Поддържане на копие на блокчейна Bitcoin, валидиране на транзакции, предаване на информация на други възли и прилагане на правилата на протокола Bitcoin.
wrong_answers:
  - Поддържане на копие на блокчейна Bitcoin, валидиране на транзакции, предаване на информация на правителството и промяна на правилата на протокола Bitcoin.
  - Поддържане само на копие от блокчейна на Bitcoin.
  - Предаване на информация само на други възли.

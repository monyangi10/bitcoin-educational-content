question: Wat is de eerste fase die optreedt bij hyperinflatie?
answer: Verlies van vertrouwen in een valuta.
wrong_answers:
  - Valuta stort in en prijzen stijgen.
  - De vicieuze cirkel van het bijdrukken van geld.
  - Er ontstaat een nieuwe valuta.
explanation: |
  De eerste fase van hyperinflatie is het verlies van vertrouwen in een munt.
reviewed: true
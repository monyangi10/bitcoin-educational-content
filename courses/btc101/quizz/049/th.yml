question: อัตราเงินเฟ้อในฮังการีในเดือนกรกฎาคม ปี 1946 อยู่ที่ระดับสูงสุดที่เคยบันทึกไว้ โดยมีอัตราเงินเฟ้อรายเดือนสูงถึง 41,900,000,000,000,000% (41.9 quadrillion percent)
answer: 41,900,000,000,000,000%
wrong_answers:
  - 207%
  - 50%
  - 100%
explanation: |
  เดือนที่มีอัตราเงินเฟ้อสูงที่สุดในฮังการีคือเดือนกรกฎาคม ปี 1946 โดยมีอัตราเงินเฟ้อของราคาสูงถึง 41,900,000,000,000,000%
reviewed: true
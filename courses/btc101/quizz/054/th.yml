question: ชื่อของเหตุการณ์เมื่อรางวัลสำหรับ mining ถูกลดลงครึ่งหนึ่งคืออะไร?
answer: Halving
wrong_answers:
  - การเพิ่มเป็นสองเท่า
  - Quartering
  - การเพิ่มขึ้นเป็นสามเท่า
explanation: |
  เหตุการณ์ที่รางวัลสำหรับ mining ถูกลดลงครึ่งหนึ่งเรียกว่า
  halving เหตุการณ์นี้ทำให้เส้นโค้งการออกเงินมีรูปร่างคล้ายบันได
reviewed: true
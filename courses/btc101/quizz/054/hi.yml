question: उस घटना का नाम क्या है जब Mining का इनाम आधा कर दिया जाता है?
answer: जीडब्ल्यू-1
wrong_answers:
  - दोहरीकरण
  - अर्थों
  - तीन गुना
explanation: |
  वह घटना जब Mining के लिए इनाम आधा कर दिया जाता है, उसे Halving कहा जाता है। यह घटना मौद्रिक निर्गम वक्र को सीढ़ी जैसा आकार देती है।
reviewed: true
question: Как се нарича събитието, при което наградата за копаене се намалява наполовина?
answer: халвинг
wrong_answers:
  - Удвояване
  - Кварталиране
  - Утрояване
explanation: |
  Събитието, при което наградата за копаене се намалява наполовина, се нарича
  намаляване наполовина или халвинг.
reviewed: true

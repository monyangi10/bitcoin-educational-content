question: Jak nazywa się moment, w którym nagroda za wydobycie zostaje zmniejszona o połowę?
answer: Halving
wrong_answers:
  - Podwojenie
  - Ćwiartowanie
  - Potrojenie
explanation: |
  Moment, w którym nagroda za wydobycie jest zmniejszona o połowę, nazywany jest
  halving. To zdarzenie nadaje krzywej emisji monetarnej kształt przypominający schody.
reviewed: true

question: "Dollar Cost Average" क्या है?
answer: थोड़ी-थोड़ी मात्रा में Bitcoin नियमित अंतराल पर खरीदना।
wrong_answers:
  - एक साथ बड़ी मात्रा में Bitcoin खरीदना।
  - Bitcoin खरीदूंगा, लेकिन तभी जब इसकी कीमत गिरेगी।
  - Bitcoin खरीदेंगे सिर्फ तभी जब कीमत बढ़ेगी।
explanation: |
  कोर्स टेक्स्ट में बताया गया है कि डॉलर कॉस्ट एवरेज
  तकनीक में Bitcoin की छोटी मात्रा खरीदना शामिल है
  नियमित अंतराल पर। यह तरीका कीमत को संतुलित कर देता है।
  समय के साथ उतार-चढ़ाव और निरंतर विकास सुनिश्चित करता है
  Bitcoin की मात्रा जो आपके पास है।
reviewed: true
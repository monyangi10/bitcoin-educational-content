question: Que sont le FOMO et le FUD ?
answer: Des émotions qui peuvent conduire à des prises de décision impulsives et potentiellement nocives.
wrong_answers:
  - Des types de portefeuilles Bitcoin.
  - Des stratégies pour acheter du Bitcoin.
  - Des réglementations liées au Bitcoin.
explanation: >-
  Le FOMO (Fear of Missing Out) et le FUD (Fear, Uncertainty, Doubt) sont des émotions qui peuvent conduire 
  à des prises de décision impulsives et potentiellement nocives lors de l'achat de Bitcoin.
reviewed: true

question: Qu'est-ce que le Dollar Cost Average ?
answer: Acheter de petites quantités de bitcoin à intervalles réguliers.
wrong_answers:
  - Acheter une grande quantité de bitcoin en une seule fois.
  - Acheter du bitcoin uniquement lorsque le prix baisse.
  - Acheter du bitcoin uniquement lorsque le prix monte.
explanation: |
  La technique du Dollar Cost Average implique d'acheter de 
  petites quantités de bitcoin à intervalles réguliers. 
  Cette méthode permet de lisser les fluctuations de prix au fil du 
  temps et assure une croissance continue de la quantité de bitcoin possédée.
reviewed: true

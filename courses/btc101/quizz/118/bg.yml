question: Коя е датата на последното известно частно съобщение на Satoshi Nakamoto по имейл?
answer: 23 април 2011 г.
wrong_answers:
  - 12 декември 2010 г.
  - 8 януари 2009 г.
  - 31 октомври 2008 г.
explanation: |
  Датата на последното известно лично съобщение на Satoshi
  Накамото по електронната поща е 23 април 2011 г. То е изпратено до
  разработчика Майк Хърн.
reviewed: true
question: วันที่ของข้อความส่วนตัวครั้งสุดท้ายที่ทราบของ Satoshi Nakamoto ผ่านทางอีเมลคืออะไร?
answer: 23 เมษายน 2011
wrong_answers:
  - 12 ธันวาคม 2010
  - 8 มกราคม 2009
  - 31 ตุลาคม 2008
explanation: |
  วันที่ของข้อความส่วนตัวครั้งสุดท้ายที่ทราบของ Satoshi นากาโมโตะผ่านทางอีเมลคือวันที่ 23 เมษายน 2011 ข้อความนี้ถูกส่งไปยังนักพัฒนา Mike Hearn
reviewed: true
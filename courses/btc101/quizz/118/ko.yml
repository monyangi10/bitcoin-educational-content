question: Satoshi 나카모토가 마지막으로 이메일을 통해 비공개 메시지를 보낸 날짜는 언제인가요?
answer: 2011년 4월 23일.
wrong_answers:
  - 2010년 12월 12일.
  - 2009년 1월 8일.
  - 2008년 10월 31일.
explanation: |
  Satoshi의 마지막으로 알려진 비공개 메시지 날짜는 2011년 4월 1일입니다
  나카모토가 이메일을 통해 마지막으로 보낸 날짜는 2011년 4월 23일입니다. 이 메시지는
  개발자 마이크 헌에게 보냈습니다.
reviewed: true
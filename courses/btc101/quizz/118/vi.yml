question: Ngày của tin nhắn riêng cuối cùng được biết đến của Satoshi Nakamoto qua email là khi nào?
answer: 23 tháng 4, 2011.
wrong_answers:
  - 12 tháng 12, 2010.
  - 8 tháng 1, 2009.
  - 31 tháng 10, 2008.
explanation: |
  Ngày của tin nhắn riêng cuối cùng được biết đến của Satoshi Nakamoto qua email là 23 tháng 4, 2011. Nó được gửi cho lập trình viên Mike Hearn.
reviewed: true

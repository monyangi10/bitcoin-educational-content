question: ฟังก์ชันหลักสามประการของ Bitcoin wallet คืออะไร?
answer: รับบิตคอยน์ ส่งบิตคอยน์ ป้องกันการแฮ็กและการโจรกรรม
wrong_answers:
  - เก็บบิตคอยน์, ส่งบิตคอยน์, ป้องกันการแฮ็กและการโจรกรรม.
  - อนุญาตให้รับบิตคอยน์ เก็บบิตคอยน์ ป้องกันการแฮ็กและการโจรกรรม
  - อนุญาตให้รับบิตคอยน์, อนุญาตให้ส่งบิตคอยน์, ขายบิตคอยน์.
explanation: |
  Bitcoin wallet ถูกใช้เพื่อโต้ตอบกับเครือข่าย Bitcoin ฟังก์ชันหลักสามประการของมันคือการอนุญาตให้รับบิตคอยน์ อนุญาตให้ส่งบิตคอยน์ และป้องกันพวกมันจากการแฮ็กและการพยายามขโมย
reviewed: true
question: Koje su tri glavne funkcije Bitkoin novčanika?
answer: Primanje bitkoina, slanje bitkoina, zaštita od pokušaja hakovanja i krađe.
wrong_answers:
  - Čuvanje bitkoina, slanje bitkoina, osiguravanje protiv pokušaja hakovanja i krađe.
  - Da dozvoli primanje bitkoina, čuvanje bitkoina, osiguravanje protiv pokušaja hakovanja i krađe.
  - Da dozvoli primanje bitkoina, slanje bitkoina i prodaju bitkoina.
explanation: |
  Bitcoin novčanik se koristi za interakciju sa Bitkoin mrežom. Njegove tri glavne funkcije su omogućavanje primanja bitkoina, omogućavanje slanja bitkoina i njihovo osiguranje protiv pokušaja hakovanja i krađe.
reviewed: true

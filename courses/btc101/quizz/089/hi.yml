question: Bitcoin Wallet में निजी कुंजी को प्रायः किसके द्वारा दर्शाया जाता है?
answer: 12 या 24 शब्दों की सूची.
wrong_answers:
  - 12 या 48 शब्दों की सूची.
  - 32 शब्दों की सूची.
  - 64 शब्दों की सूची.
explanation: |
  Bitcoin Wallet में, निजी कुंजी को अक्सर 12 या 24 शब्दों की सूची द्वारा दर्शाया जाता है, जिसे seed वाक्यांश या Mnemonic वाक्यांश के रूप में भी जाना जाता है।
reviewed: true
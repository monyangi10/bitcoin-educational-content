question: Wat is het risico om de beveiliging en toegankelijkheid van je bitcoins te ingewikkeld te maken?
answer: Je kunt jezelf beschadigen als je de back-ups portemonnees verkeerd gebruikt.
wrong_answers:
  - Je kunt jezelf verwonden als je de fysieke portemonnees verkeerd hanteert.
  - Je kunt jezelf beschadigen als je de digitale portemonnees verkeerd gebruikt.
  - Je kunt jezelf verwonden als je de Multisig portemonnees verkeerd gebruikt.
explanation: |
  Het te ingewikkeld maken van de beveiliging en toegankelijkheid van uw
  bitcoins kan je schade berokkenen als je bijvoorbeeld de
  back-ups van je portemonnees. Dit komt omdat eenvoudige back-up
  procedures cruciaal zijn om weer toegang te krijgen tot je geld
  in geval van verlies van je telefoon of computer.
reviewed: true
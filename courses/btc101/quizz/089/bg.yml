question: С какво често се представя частният ключ в Bitcoin портфейл?
answer: Списък от 12 или 24 думи.
wrong_answers:
  - Списък от 12 или 48 думи.
  - Списък с 32 думи.
  - Списък с 64 думи.
explanation: |
  В Bitcoin портфейл частният ключ често се представя като
  чрез списък от 12 или 24 думи, известен също като сийд фраза
  или мнемонична фраза.
reviewed: true

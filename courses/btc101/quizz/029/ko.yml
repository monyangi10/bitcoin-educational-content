question: 통화와 관련하여 수탁자라는 용어는 무엇을 의미하나요?
answer: 화폐를 규제하는 중앙 기관에 대한 신뢰가 있어야만 가치가 있는 화폐를 말합니다.
wrong_answers:
  - 금으로 뒷받침되며 소규모 상업 은행에서 발행하는 화폐를 말합니다.
  - 신탁 거래에만 가치가 있는 통화를 말합니다.
  - 특정 기관 내에서만 사용되는 통화를 말합니다.
explanation: |
  신탁 통화는 금이나 은과 같은 실물 상품으로 뒷받침되지 않습니다
  금이나 은과 같은 실물 상품이 아닙니다. 신탁 통화의 가치는 발행 기관에 대한 사람들의 신뢰
  신탁 통화를 발행하고 규제하는 기관에 대한
  신뢰에서 비롯됩니다.
reviewed: true
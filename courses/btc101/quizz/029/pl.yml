question: Co oznacza termin powiernik w kontekście walut?
answer: Odnosi się do walut, które mają wartość tylko ze względu na zaufanie do instytucji centralnej, która je reguluje.
wrong_answers:
  - Odnosi się do walut, które są oparte na parytecie złota i są emitowane przez małe banki komercyjne.
  - Odnosi się do walut, które mają wartość tylko w transakcjach powierniczych.
  - Odnosi się do walut, które są używane tylko w określonej instytucji.
explanation: |
  Wartość walut fiducjarnych nie jest oparta o dobro fizyczne
  jak złoto czy srebro. Ich wartość wynika z zaufania ludzi do instytucji, które je emitują i regulują.
reviewed: true

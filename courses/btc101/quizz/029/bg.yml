question: Какво означава терминът "довереник" в контекста на фиатните валути?
answer: Той се отнася до валути, които са ценни само поради доверието в централната институция, която ги регулира.
wrong_answers:
  - Това са валути, които са обезпечени със злато и се емитират от малки търговски банки.
  - Той се отнася до валути, които са ценни само за фидуциарни транзакции.
  - Той се отнася до валути, които се използват само в рамките на определена институция.
explanation: |
  Фидуциарните или фиатните валути не са обезпечени с физическа стока
  като злато или сребро. Тяхната стойност се определя от доверието
  и доверието на хората в институциите, които емитират
  и ги регулират.
reviewed: true

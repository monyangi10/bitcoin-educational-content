question: คำว่า "fiduciary" ในบริบทของสกุลเงินหมายถึงอะไร?
answer: มันหมายถึงสกุลเงินที่มีค่าเพียงเพราะความไว้วางใจในสถาบันกลางที่ควบคุมพวกมัน
wrong_answers:
  - มันหมายถึงสกุลเงินที่ได้รับการสนับสนุนโดยทองคำและออกโดยธนาคารพาณิชย์ขนาดเล็ก
  - มันหมายถึงสกุลเงินที่มีค่าเฉพาะสำหรับการทำธุรกรรมทางการเงินเท่านั้น
  - มันหมายถึงสกุลเงินที่ใช้เฉพาะภายในสถาบันเฉพาะเท่านั้น
explanation: |
  สกุลเงินที่เป็นเงินตราไม่ได้รับการสนับสนุนจากสินค้าโภคภัณฑ์ทางกายภาพ
  เช่น ทองคำหรือเงิน มูลค่าของพวกมันมาจากความไว้วางใจ
  และความเชื่อมั่นที่ผู้คนมีต่อสถาบันที่ออกและควบคุมพวกมัน
reviewed: true
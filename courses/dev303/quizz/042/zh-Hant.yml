question: 在 Rust 中，迭代器採用偷懶方式的主要優點是什麼？
answer: 它們在消耗之前不執行任何工作，因此可以有效地進行鏈結，而無需建立中間集合
wrong_answers:
  - 它們會自動在多個 CPU 核心上進行平行運算，以獲得更佳效能
  - 它們會將先前的結果快取到記憶體中，以避免多次重複計算相同的值
  - 它們只儲存參考資料，而不是複製實際資料值，因此使用較少的記憶體。
explanation: |
  Rust 迭代器中的懶惰評估 (Lazy evaluation) 意味著它們在消耗方法被呼叫之前不會執行任何處理。這允許您將多個操作（如 map、filter 及其他適應器）串連起來，而不需要在每個步驟之間建立中間集合。編譯器可以將整個鏈最佳化為有效率的程式碼，透過所有轉換一次處理一個元素，而不是在每個階段建立臨時向量或其他集合。
question: Rustで反復子が遅延であることの主な利点は何ですか？
answer: 中間コレクションを作成することなく、効率的な連鎖を可能にする。
wrong_answers:
  - 複数のCPUコアにまたがる処理を自動的に並列化し、パフォーマンスを向上させる。
  - 同じ値を何度も再計算するのを避けるため、以前の結果をメモリにキャッシュする。
  - 実際のデータ値をコピーする代わりに参照のみを格納することで、より少ないメモリを使用する。
explanation: |
  Rustイテレータの遅延評価とは、消費メソッドが呼ばれるまで処理を実行しないことを意味する。これにより、各ステップの間に中間コレクションを作成することなく、map、filter、その他のアダプタのような複数の処理を連鎖させることができます。コンパイラは、各段階で一時的なベクタやその他のコレクションを作成するのではなく、すべての変換を通して要素を一度に1つずつ処理する効率的なコードにチェーン全体を最適化することができます。
question: ข้อได้เปรียบหลักของการที่ตัววนซ้ำเป็นแบบขี้เกียจใน Rust คืออะไร?
answer: พวกมันจะไม่ทำงานใด ๆ จนกว่าจะถูกใช้งาน ทำให้สามารถเชื่อมโยงได้อย่างมีประสิทธิภาพโดยไม่สร้างคอลเลกชันกลาง
wrong_answers:
  - พวกเขาทำการประมวลผลแบบขนานโดยอัตโนมัติผ่านหลายแกน CPU เพื่อประสิทธิภาพที่ดียิ่งขึ้น
  - พวกเขาเก็บผลลัพธ์ก่อนหน้าไว้ในหน่วยความจำเพื่อหลีกเลี่ยงการคำนวณค่าเดิมซ้ำหลายครั้ง
  - พวกเขาใช้หน่วยความจำน้อยลงโดยการเก็บเฉพาะการอ้างอิงแทนที่จะคัดลอกค่าข้อมูลจริง
explanation: |
  การประเมินแบบ Lazy ในตัววนซ้ำ Rust หมายความว่าพวกมันจะไม่ดำเนินการประมวลผลใด ๆ จนกว่าจะมีการเรียกใช้เมธอดที่ใช้ประโยชน์ ซึ่งช่วยให้คุณสามารถเชื่อมโยงการดำเนินการหลายอย่าง เช่น map, filter และตัวปรับแต่งอื่น ๆ เข้าด้วยกันโดยไม่ต้องสร้างคอลเลกชันชั่วคราวระหว่างแต่ละขั้นตอน คอมไพเลอร์สามารถปรับให้เหมาะสมทั้งสายโซ่เป็นโค้ดที่มีประสิทธิภาพซึ่งประมวลผลองค์ประกอบทีละรายการผ่านการแปลงทั้งหมด แทนที่จะสร้างเวกเตอร์ชั่วคราวหรือคอลเลกชันอื่น ๆ ในแต่ละขั้นตอน
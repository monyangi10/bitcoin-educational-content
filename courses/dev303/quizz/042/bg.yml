question: Какво е основното предимство на мързеливите итератори в Rust?
answer: Те не извършват никаква работа, докато не бъдат използвани, което позволява ефективно верижно свързване без създаване на междинни колекции
wrong_answers:
  - Те автоматично паралелизират операциите в няколко процесорни ядра за по-добра производителност
  - Те кешират предишни резултати в паметта, за да се избегне многократното пресмятане на едни и същи стойности
  - Те използват по-малко памет, тъй като съхраняват само препратки, вместо да копират действителните стойности на данните
explanation: |
  Мързеливото оценяване в итераторите на Rust означава, че те не изпълняват никаква обработка, докато не бъде извикан консумиращ метод. Това ви позволява да свързвате няколко операции като map, filter и други адаптери заедно, без да създавате междинни колекции между всяка стъпка. Компилаторът може да оптимизира цялата верига в ефективен код, който обработва елементите един по един през всички трансформации, вместо да създава временни вектори или други колекции на всеки етап.
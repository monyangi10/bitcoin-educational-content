question: Qual é a principal vantagem do facto de os iteradores serem preguiçosos no Rust?
answer: Não realizam qualquer trabalho até serem consumidas, permitindo um encadeamento eficiente sem criar colecções intermédias
wrong_answers:
  - Paralelizam automaticamente as operações em vários núcleos de CPU para um melhor desempenho
  - Colocam em cache os resultados anteriores na memória para evitar recalcular os mesmos valores várias vezes
  - Utilizam menos memória, pois armazenam apenas referências em vez de copiarem valores de dados reais
explanation: |
  A avaliação preguiçosa nos iteradores do Rust significa que eles não executam nenhum processamento até que um método de consumo seja chamado. Isto permite-lhe encadear várias operações como map, filter e outros adaptadores sem criar colecções intermédias entre cada passo. O compilador pode otimizar toda a cadeia num código eficiente que processa os elementos um de cada vez através de todas as transformações, em vez de criar vectores temporários ou outras colecções em cada fase.
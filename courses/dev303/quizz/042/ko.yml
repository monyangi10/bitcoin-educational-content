question: Rust에서 이터레이터가 게으르면 어떤 이점이 있나요?
answer: 소비될 때까지 아무런 작업도 수행하지 않으므로 중간 컬렉션을 만들지 않고도 효율적인 체인 연결이 가능합니다
wrong_answers:
  - 여러 CPU 코어에서 자동으로 연산을 병렬화하여 성능을 향상시킵니다
  - 이전 결과를 메모리에 캐시하여 동일한 값을 여러 번 재계산하지 않도록 합니다
  - 실제 데이터 값을 복사하는 대신 참조만 저장하여 메모리를 적게 사용합니다
explanation: |
  Rust 이터레이터의 지연 평가는 소모적인 메서드가 호출될 때까지 어떤 처리도 실행하지 않는다는 의미입니다. 이를 통해 각 단계 사이에 중간 컬렉션을 만들지 않고도 맵, 필터 및 기타 어댑터와 같은 여러 작업을 함께 체인화할 수 있습니다. 컴파일러는 각 단계에서 임시 벡터나 다른 컬렉션을 생성하지 않고 모든 변환을 통해 한 번에 하나씩 요소를 처리하는 효율적인 코드로 전체 체인을 최적화할 수 있습니다.
question: مزیت اصلی تنبل بودن تکرارگرها در Rust چیست؟
answer: آن‌ها هیچ کاری انجام نمی‌دهند تا زمانی که مصرف شوند، که این امکان را می‌دهد تا بدون ایجاد مجموعه‌های میانی، زنجیره‌سازی کارآمدی داشته باشند.
wrong_answers:
  - آن‌ها به‌طور خودکار عملیات را برای عملکرد بهتر در چندین هسته CPU موازی‌سازی می‌کنند.
  - آن‌ها نتایج قبلی را در حافظه ذخیره می‌کنند تا از محاسبه مجدد همان مقادیر به دفعات متعدد جلوگیری کنند.
  - آن‌ها با ذخیره‌سازی تنها ارجاعات به جای کپی کردن مقادیر واقعی داده‌ها، از حافظه کمتری استفاده می‌کنند.
explanation: |
  ارزیابی تنبل در تکرارگرهای Rust به این معناست که آن‌ها هیچ پردازشی را تا زمانی که یک متد مصرف‌کننده فراخوانی نشود، اجرا نمی‌کنند. این امکان را به شما می‌دهد که چندین عملیات مانند map، filter و سایر تطبیق‌دهنده‌ها را بدون ایجاد مجموعه‌های میانی بین هر مرحله به هم زنجیر کنید. کامپایلر می‌تواند کل زنجیره را به کدی بهینه تبدیل کند که عناصر را یکی‌یکی از طریق تمام تبدیلات پردازش می‌کند، به جای اینکه در هر مرحله بردارهای موقت یا مجموعه‌های دیگر ایجاد کند.
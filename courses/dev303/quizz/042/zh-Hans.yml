question: 在 Rust 中，迭代器懒惰的主要优点是什么？
answer: 它们在被消耗前不执行任何操作，因此可以进行高效的链式处理，而无需创建中间集合
wrong_answers:
  - 它们会自动在多个 CPU 内核上进行并行操作，以提高性能
  - 它们将以前的结果缓存在内存中，以避免多次重新计算相同的值
  - 它们只存储引用，而不是复制实际数据值，因此内存用量更少
explanation: |
  Rust 迭代器中的懒惰评估意味着，在调用消耗方法之前，它们不会执行任何处理。这样，您就可以将多个操作（如 map、过滤器和其他适配器）串联起来，而无需在每一步之间创建中间集合。编译器可以将整个链优化为高效代码，通过所有转换一次处理一个元素，而不是在每个阶段创建临时向量或其他集合。
question: В чем главное преимущество ленивых итераторов в Rust?
answer: Они не выполняют никакой работы до тех пор, пока не будут потреблены, что позволяет эффективно выстраивать цепочки без создания промежуточных коллекций
wrong_answers:
  - Они автоматически распараллеливают операции на нескольких ядрах процессора для повышения производительности
  - Они кэшируют предыдущие результаты в памяти, чтобы не пересчитывать одни и те же значения несколько раз
  - Они занимают меньше памяти, поскольку хранят только ссылки, а не копируют фактические значения данных
explanation: |
  Ленивая оценка в итераторах Rust означает, что они не выполняют никакой обработки до вызова потребляющего метода. Это позволяет объединять в цепочку несколько операций, таких как map, filter и другие адаптеры, без создания промежуточных коллекций между каждым шагом. Компилятор может оптимизировать всю цепочку в эффективный код, который обрабатывает элементы по одному через все преобразования, а не создает временные векторы или другие коллекции на каждом этапе.
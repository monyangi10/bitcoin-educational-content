question: Rust में इटरेटर के लेज़ी होने का मुख्य लाभ क्या है?
answer: उपभोग होने तक वे कोई कार्य नहीं करते, जिससे मध्यवर्ती संग्रह बनाए बिना कुशल श्रृंखला निर्माण संभव हो पाता है।
wrong_answers:
  - वे बेहतर प्रदर्शन के लिए कई सीपीयू कोर में ऑपरेशनों को स्वचालित रूप से समानांतर करते हैं।
  - वे पिछले परिणामों को मेमोरी में संग्रहित कर लेते हैं ताकि एक ही मान की बार-बार गणना करने से बचा जा सके।
  - वे वास्तविक डेटा मानों की प्रतिलिपि बनाने के बजाय केवल संदर्भों को संग्रहीत करके कम मेमोरी का उपयोग करते हैं।
explanation: |
  Rust इटरेटर में लेज़ी इवैल्यूएशन का मतलब है कि जब तक कोई कंज्यूमिंग मेथड कॉल नहीं होती, तब तक वे कोई प्रोसेसिंग नहीं करते। इससे आप मैप, फ़िल्टर और अन्य एडेप्टर जैसे कई ऑपरेशन्स को एक साथ जोड़ सकते हैं, बिना हर स्टेप के बीच में इंटरमीडिएट कलेक्शन बनाए। कंपाइलर पूरी चेन को ऐसे कुशल कोड में ऑप्टिमाइज़ कर सकता है जो हर स्टेज पर टेम्पररी वेक्टर या अन्य कलेक्शन बनाने के बजाय, सभी ट्रांसफ़ॉर्मेशन के दौरान एलिमेंट्स को एक-एक करके प्रोसेस करता है।
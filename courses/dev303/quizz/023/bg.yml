question: Какво се случва с оригиналния екземпляр на структурата, когато използвате синтаксиса struct update с типове, които не са копиране?
answer: Копираните полета стават неизползваеми в оригиналния екземпляр поради семантиката на преместването
wrong_answers:
  - Първоначалният екземпляр остава напълно непроменен и напълно достъпен
  - Целият оригинален екземпляр се клонира, като двата екземпляра остават напълно функционални
  - Само полетата, които изрично сте променили, стават недостъпни в оригиналния
explanation: |
  При използване на синтаксиса за обновяване на структури с типове, които не са копирани, системата за собственост на Rust премества копираните полета от оригиналния екземпляр в новия. Това означава, че тези специфични полета стават неизползваеми в оригиналния екземпляр, въпреки че полетата, които не са били копирани, остават достъпни. Компилаторът проследява тези частични премествания интелигентно, като предотвратява достъпа до преместените полета, като същевременно позволява продължаване на използването на непреместените полета. Това поведение осигурява безопасност на паметта, като предотвратява множество собственици на едни и същи данни.
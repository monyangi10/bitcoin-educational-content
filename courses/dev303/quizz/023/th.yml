question: เกิดอะไรขึ้นกับอินสแตนซ์โครงสร้างเดิมเมื่อคุณใช้ไวยากรณ์การอัปเดตโครงสร้างกับประเภทที่ไม่ใช่ Copy?
answer: ฟิลด์ที่ถูกคัดลอกจะไม่สามารถใช้งานได้ในอินสแตนซ์ต้นฉบับเนื่องจากการเคลื่อนย้ายตามความหมาย
wrong_answers:
  - อินสแตนซ์ดั้งเดิมยังคงไม่เปลี่ยนแปลงและสามารถเข้าถึงได้อย่างเต็มที่
  - อินสแตนซ์ต้นฉบับทั้งหมดถูกโคลน ทำให้ทั้งสองอินสแตนซ์ทำงานได้อย่างสมบูรณ์
  - เฉพาะฟิลด์ที่คุณเปลี่ยนแปลงอย่างชัดเจนเท่านั้นที่จะไม่สามารถเข้าถึงได้ในต้นฉบับ
explanation: |
  เมื่อใช้ไวยากรณ์การอัปเดต struct กับประเภทที่ไม่ใช่ Copy ระบบการเป็นเจ้าของของ Rust จะย้ายฟิลด์ที่ถูกคัดลอกจากอินสแตนซ์ต้นฉบับไปยังอินสแตนซ์ใหม่ ซึ่งหมายความว่าฟิลด์เฉพาะเหล่านั้นจะไม่สามารถใช้งานได้ในอินสแตนซ์ต้นฉบับ แม้ว่าฟิลด์ที่ไม่ได้ถูกคัดลอกจะยังคงเข้าถึงได้อยู่ ตัวคอมไพเลอร์จะติดตามการย้ายบางส่วนเหล่านี้อย่างชาญฉลาด โดยป้องกันการเข้าถึงฟิลด์ที่ถูกย้าย ในขณะที่ยังคงอนุญาตให้ใช้ฟิลด์ที่ไม่ได้ถูกย้ายต่อไป พฤติกรรมนี้ช่วยให้มั่นใจในความปลอดภัยของหน่วยความจำโดยการป้องกันการมีเจ้าของหลายคนของข้อมูลเดียวกัน
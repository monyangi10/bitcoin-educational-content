question: وقتی از نحو به‌روزرسانی ساختار با انواع غیر قابل کپی استفاده می‌کنید، چه اتفاقی برای نمونه ساختار اصلی می‌افتد؟
answer: فیلدهایی که کپی می‌شوند به دلیل معنای جابجایی در نمونه اصلی غیرقابل استفاده می‌شوند.
wrong_answers:
  - نمونه اصلی کاملاً بدون تغییر باقی می‌ماند و به‌طور کامل قابل دسترسی است.
  - کل نمونه اصلی شبیه‌سازی می‌شود و هر دو نمونه به‌طور کامل عملیاتی باقی می‌مانند.
  - فقط فیلدهایی که به‌طور صریح تغییر می‌دهید در نسخه اصلی غیرقابل‌دسترس می‌شوند.
explanation: |
  هنگام استفاده از نحو به‌روزرسانی ساختار با انواع غیر-Copy، سیستم مالکیت Rust فیلدهای کپی‌شده را از نمونه اصلی به نمونه جدید منتقل می‌کند. این بدان معناست که آن فیلدهای خاص در نمونه اصلی غیرقابل استفاده می‌شوند، اگرچه فیلدهایی که کپی نشده‌اند همچنان قابل دسترسی باقی می‌مانند. کامپایلر این انتقال‌های جزئی را به‌طور هوشمندانه پیگیری می‌کند و از دسترسی به فیلدهای منتقل‌شده جلوگیری می‌کند در حالی که استفاده مداوم از فیلدهای منتقل‌نشده را مجاز می‌داند. این رفتار با جلوگیری از وجود چندین مالک برای داده‌های یکسان، ایمنی حافظه را تضمین می‌کند.
question: 在使用非复制类型的结构更新语法时，原始结构实例会发生什么变化？
answer: 由于移动语义的原因，被复制的字段在原始实例中变得不可用
wrong_answers:
  - 原始实例完全保持不变，完全可以访问
  - 克隆整个原始实例，使两个实例都能正常运行
  - 只有您明确更改的字段才无法访问原始的
explanation: |
  当使用非复制类型的结构更新语法时，Rust 的所有权系统会将复制的字段从原始实例移到新实例中。这意味着这些特定字段在原始实例中将无法使用，但未被复制的字段仍可访问。编译器会智能跟踪这些部分移动，阻止访问已移动的字段，同时允许继续使用未移动的字段。这种行为通过防止同一数据的多个所有者来确保内存安全。
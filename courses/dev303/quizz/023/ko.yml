question: 복사 유형이 아닌 구조체 업데이트 구문을 사용하면 원래 구조체 인스턴스는 어떻게 되나요?
answer: 복사된 필드는 이동 의미론으로 인해 원래 인스턴스에서 사용할 수 없게 됩니다
wrong_answers:
  - 원본 인스턴스는 완전히 변경되지 않고 완전히 액세스 가능한 상태로 유지됩니다
  - 원본 인스턴스 전체가 복제되어 두 인스턴스가 모두 완벽하게 작동합니다
  - 원본에서는 명시적으로 변경한 필드만 액세스할 수 없게 됩니다
explanation: |
  복사 유형이 아닌 구조체 업데이트 구문을 사용하는 경우 Rust의 소유권 시스템은 복사된 필드를 원래 인스턴스에서 새 인스턴스로 이동합니다. 즉, 복사되지 않은 필드는 계속 액세스할 수 있지만 특정 필드는 원래 인스턴스에서 사용할 수 없게 됩니다. 컴파일러는 이러한 부분적인 이동을 지능적으로 추적하여 이동된 필드에 대한 액세스는 차단하고 이동되지 않은 필드는 계속 사용할 수 있도록 합니다. 이 동작은 동일한 데이터의 소유자가 여러 명이 되는 것을 방지하여 메모리 안전을 보장합니다.
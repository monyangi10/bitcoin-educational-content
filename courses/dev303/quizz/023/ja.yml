question: 構造体の更新構文を非コピー型で使用した場合、元の構造体のインスタンスはどうなりますか？
answer: コピーされたフィールドは、移動のセマンティクスにより元のインスタンスでは使用できなくなる。
wrong_answers:
  - オリジナルのインスタンスは完全に変更されず、完全にアクセス可能なままである。
  - 元のインスタンス全体がクローン化され、両方のインスタンスは完全に機能する。
  - 明示的に変更したフィールドだけが、元の
explanation: |
  構造体の更新構文を非コピー型で使用する場合、Rustの所有権システムはコピーされたフィールドを元のインスタンスから新しいインスタンスに移動します。これは、コピーされなかったフィールドはアクセス可能なままですが、それらの特定のフィールドが元のインスタンスで使用できなくなることを意味します。コンパイラーはこのような部分的な移動をインテリジェントに追跡し、移動されたフィールドへのアクセスを防止する一方で、移動されていないフィールドの継続的な使用を許可します。この動作により、同じデータを複数所有することを防いでメモリの安全性を確保している。
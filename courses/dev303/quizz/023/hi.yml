question: जब आप नॉन-कॉपी टाइप के साथ स्ट्रक्चर अपडेट सिंटैक्स का उपयोग करते हैं तो मूल स्ट्रक्चर इंस्टेंस का क्या होता है?
answer: कॉपी किए गए फ़ील्ड, मूव सिमेंटिक्स के कारण मूल इंस्टेंस में अनुपयोगी हो जाते हैं।
wrong_answers:
  - मूल उदाहरण पूरी तरह से अपरिवर्तित और पूरी तरह से सुलभ रहता है।
  - मूल इंस्टेंस की पूरी कॉपी क्लोन की जाती है, जिससे दोनों इंस्टेंस पूरी तरह से काम करने योग्य रहते हैं।
  - केवल वे फ़ील्ड जिन्हें आप स्पष्ट रूप से बदलते हैं, मूल फ़ाइल में अनुपलब्ध हो जाते हैं।
explanation: |
  नॉन-कॉपी प्रकारों के साथ स्ट्रक्चर अपडेट सिंटैक्स का उपयोग करते समय, Rust की ओनरशिप प्रणाली कॉपी किए गए फ़ील्ड्स को मूल इंस्टेंस से नए इंस्टेंस में स्थानांतरित कर देती है। इसका मतलब है कि वे विशिष्ट फ़ील्ड मूल इंस्टेंस में अनुपयोगी हो जाते हैं, हालांकि जो फ़ील्ड कॉपी नहीं किए गए हैं वे सुलभ बने रहते हैं। कंपाइलर इन आंशिक स्थानांतरणों को बुद्धिमानी से ट्रैक करता है, स्थानांतरित फ़ील्ड्स तक पहुंच को रोकता है जबकि अपरिवर्तित फ़ील्ड्स के निरंतर उपयोग की अनुमति देता है। यह व्यवहार एक ही डेटा के कई मालिकों को रोककर मेमोरी सुरक्षा सुनिश्चित करता है।
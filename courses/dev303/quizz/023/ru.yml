question: Что происходит с исходным экземпляром структуры, когда вы используете синтаксис struct update с типами, не являющимися копиями?
answer: Поля, которые копируются, становятся непригодными для использования в исходном экземпляре из-за семантики перемещения
wrong_answers:
  - Оригинальный экземпляр остается полностью неизменным и полностью доступным
  - Весь оригинальный экземпляр клонируется, и оба экземпляра остаются полностью функциональными
  - Только те поля, которые вы явно изменили, становятся недоступными в оригинале
explanation: |
  При использовании синтаксиса struct update с типами, не являющимися копиями, система владения Rust перемещает скопированные поля из исходного экземпляра в новый. Это означает, что конкретные поля становятся непригодными для использования в исходном экземпляре, хотя поля, которые не были скопированы, остаются доступными. Компилятор разумно отслеживает эти частичные перемещения, предотвращая доступ к перемещенным полям и позволяя продолжать использовать неперемещенные поля. Такое поведение обеспечивает безопасность памяти, предотвращая появление нескольких владельцев одних и тех же данных.
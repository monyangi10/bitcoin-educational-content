question: 當您使用非複製類型的 struct update 語法時，原始結構實例會發生什麼情況？
answer: 由於移動語義的關係，被複製的欄位在原始實例中變得無法使用
wrong_answers:
  - 原始實例完全保持不變且完全可存取
  - 複製整個原始實體，讓兩個實體都能完全運作
  - 只有您明確變更的欄位會變成無法存取原始的
explanation: |
  當使用非複製類型的 struct update 語法時，Rust 的所有權系統會將原實例中被複製的欄位移到新實例中。這表示這些特定欄位在原始實例中將無法使用，但未被複製的欄位仍可存取。編譯器會智慧地追蹤這些部分移動，防止存取已移動的欄位，同時允許繼續使用未移動的欄位。此行為可防止同一資料有多個擁有者，以確保記憶體安全。
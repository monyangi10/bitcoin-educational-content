question: Каква е основната цел на изброения тип Option<T> на Rust?
answer: Безопасно представяне на стойности, които могат да съществуват или не, като се предотвратяват грешки с нулеви указатели
wrong_answers:
  - Съхраняване на няколко различни типа данни в една променлива без проверка на типа
  - Създаване на незадължителни параметри в дефинициите на функциите, които могат да се пропускат по време на извикванията
  - Предоставяне на начин за връщане на няколко възможни типа грешки от една функция
explanation: |
  Изброяването Option<T> служи като решение на Rust на проблемите с нулевите указатели, като налага изрична обработка на липсващи стойности. Той има два варианта: Some(T) за налични стойности и None за липсващи стойности. Компилаторът изисква от вас да проверите кой вариант имате, преди да използвате стойността, което предотвратява грешки по време на изпълнение. Грешните отговори объркват Option с други понятия: съюзи/варианти (първо), параметри по подразбиране (второ) и типове Result за обработка на грешки (трето).
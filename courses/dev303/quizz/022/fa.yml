question: هدف اصلی نوع enum Option<T> در Rust چیست؟
answer: برای نمایش ایمن مقادیری که ممکن است وجود داشته یا نداشته باشند، جلوگیری از خطاهای اشاره‌گر null
wrong_answers:
  - برای ذخیره چندین نوع داده مختلف در یک متغیر بدون بررسی نوع
  - برای ایجاد پارامترهای اختیاری در تعریف توابع که می‌توان در هنگام فراخوانی از آن‌ها صرف‌نظر کرد
  - برای ارائه روشی جهت بازگرداندن چندین نوع خطای ممکن از یک تابع واحد
explanation: |
  گزینه Option<T> در Rust به عنوان راه‌حلی برای مشکلات اشاره‌گر null عمل می‌کند و با مجبور کردن به مدیریت صریح مقادیر مفقود، این مشکل را حل می‌کند. این گزینه دو نوع دارد: Some(T) برای مقادیر موجود و None برای مقادیر غایب. کامپایلر از شما می‌خواهد که قبل از استفاده از مقدار، بررسی کنید که کدام نوع را دارید، که این کار از خطاهای زمان اجرا جلوگیری می‌کند. پاسخ‌های نادرست Option را با مفاهیم دیگر اشتباه می‌گیرند: اتحادیه‌ها/انواع (اول)، پارامترهای پیش‌فرض (دوم)، و انواع Result برای مدیریت خطا (سوم).
question: Rust의 Option<T> 열거형 타입의 주요 용도는 무엇인가요?
answer: 존재할 수도 있고 존재하지 않을 수도 있는 값을 안전하게 표현하여 널 포인터 오류를 방지합니다
wrong_answers:
  - 유형 검사 없이 여러 가지 데이터 유형을 단일 변수에 저장하려면 다음과 같이 하세요
  - 함수 정의에서 호출 중에 건너뛸 수 있는 선택적 매개변수를 만들려면 다음과 같이 하세요
  - 단일 함수에서 가능한 여러 오류 유형을 반환하는 방법을 제공하려면 다음과 같이 하세요
explanation: |
  Option<T> 열거형은 누락된 값을 명시적으로 처리하도록 강제함으로써 널 포인터 문제에 대한 Rust의 솔루션 역할을 합니다. 두 가지 변형이 있습니다: 현재 값의 경우 일부(T), 없는 값의 경우 없음입니다. 컴파일러는 값을 사용하기 전에 어떤 변형이 있는지 확인해야 하므로 런타임 오류를 방지할 수 있습니다. 오답은 Option을 다른 개념인 유니온/배리언트(첫 번째), 기본 매개 변수(두 번째), 오류 처리를 위한 결과 유형(세 번째)과 혼동하고 있습니다.
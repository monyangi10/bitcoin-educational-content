question: Rust के Option<T> एनम प्रकार का प्राथमिक उद्देश्य क्या है?
answer: मौजूद हो भी सकते हैं और नहीं भी, ऐसे मानों को सुरक्षित रूप से दर्शाने के लिए, जिससे नल पॉइंटर त्रुटियों को रोका जा सके।
wrong_answers:
  - टाइप चेकिंग के बिना एक ही वेरिएबल में कई अलग-अलग डेटा प्रकारों को स्टोर करने के लिए
  - फ़ंक्शन परिभाषाओं में वैकल्पिक पैरामीटर बनाने के लिए जिन्हें कॉल के दौरान छोड़ा जा सकता है
  - एक ही फ़ंक्शन से कई संभावित त्रुटि प्रकारों को वापस करने का तरीका प्रदान करना।
explanation: |
  Option<T> एनम, Rust में नल पॉइंटर की समस्याओं के समाधान के रूप में काम करता है, जिससे अनुपस्थित मानों को स्पष्ट रूप से संभालने की आवश्यकता होती है। इसके दो प्रकार हैं: मौजूद मानों के लिए Some(T) और अनुपस्थित मानों के लिए None। कंपाइलर आपसे मान का उपयोग करने से पहले यह जांचने की अपेक्षा करता है कि आपके पास कौन सा प्रकार है, जिससे रनटाइम त्रुटियों को रोका जा सके। गलत उत्तर Option को अन्य अवधारणाओं के साथ भ्रमित करते हैं: यूनियन/वेरिएंट (पहला), डिफ़ॉल्ट पैरामीटर (दूसरा), और त्रुटि प्रबंधन के लिए Result प्रकार (तीसरा)।
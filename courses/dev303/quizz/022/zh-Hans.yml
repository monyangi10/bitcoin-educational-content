question: Rust 的 Option<T> 枚举类型的主要用途是什么？
answer: 安全地表示可能存在或可能不存在的值，防止出现空指针错误
wrong_answers:
  - 在一个变量中存储多种不同的数据类型，而不进行类型检查
  - 在函数定义中创建调用时可跳过的可选参数
  - 提供从一个函数返回多种可能错误类型的方法
explanation: |
  Option<T> 枚举通过强制对缺失值进行显式处理，成为 Rust 解决空指针问题的方法。它有两种变体：Some(T) 表示有值，None 表示无值。编译器会要求您在使用值之前检查所使用的变体，以防止运行时出错。错误答案将 Option 与其他概念混淆：联合/变体（第一）、默认参数（第二）和用于错误处理的结果类型（第三）。
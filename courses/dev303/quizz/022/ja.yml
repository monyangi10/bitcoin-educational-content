question: RustのOption<T>列挙型の主な目的は何ですか？
answer: ヌル・ポインタ・エラーを防止し、存在するかどうかわからない値を安全に表現する。
wrong_answers:
  - 型チェックをせずに、複数の異なるデータ型を1つの変数に格納するには
  - 呼び出し中にスキップできるオプション・パラメータを関数定義に作成するには
  - 単一の関数から複数のエラー・タイプを返す方法を提供する。
explanation: |
  Option<T>列挙型は、Rustのヌル・ポインタの問題に対する解決策として、欠落値を明示的に処理することを強制します。これには2つのバリエーションがあります：Some(T)は存在する値を表し、Noneは存在しない値を表します。コンパイラは、実行時エラーを防ぐために、値を使用する前にどちらのバリアントを持っているかをチェックすることを要求します。間違った答えは、Optionを他の概念と混同させる。すなわち、ユニオン/バリアント(1つ目)、デフォルト・パラメータ(2つ目)、エラー処理のための結果型(3つ目)である。
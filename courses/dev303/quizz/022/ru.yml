question: Каково основное назначение перечислительного типа Option<T> в Rust?
answer: Для безопасного представления значений, которые могут быть или не быть, предотвращая ошибки нулевого указателя
wrong_answers:
  - Хранение нескольких различных типов данных в одной переменной без проверки типа
  - Чтобы создать необязательные параметры в определениях функций, которые можно пропускать во время вызовов
  - Обеспечить возможность возврата нескольких возможных типов ошибок из одной функции
explanation: |
  Перечисление Option<T> служит решением проблемы нулевых указателей в Rust, заставляя явно обрабатывать отсутствующие значения. У него есть два варианта: Some(T) для присутствующих значений и None для отсутствующих. Компилятор требует проверить, какой вариант у вас есть, прежде чем использовать значение, что предотвращает ошибки во время выполнения. Неправильные ответы путают Option с другими понятиями: объединениями/вариантами (первое), параметрами по умолчанию (второе) и типами Result для обработки ошибок (третье).
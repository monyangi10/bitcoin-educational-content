question: Rust 的 Option<T> 枚舉類型的主要目的是什麼？
answer: 安全地表示可能存在或可能不存在的值，防止出现空指针错误
wrong_answers:
  - 在單一變數中儲存多種不同的資料類型，而不進行類型檢查
  - 在函數定義中建立可在呼叫時跳過的可選參數
  - 提供從單一函數回傳多種可能錯誤類型的方法
explanation: |
  Option<T> 枚舉透過強制顯式處理遺失值，作為 Rust 對於 null 指針問題的解決方案。它有兩個變體：Some(T) 表示有值，None 表示沒有值。編譯器要求您在使用值之前先檢查哪一個變體，以避免執行時出錯。錯誤的答案會將 Option 與其他概念混淆：聯合體/變體 (第一)、預設參數 (第二) 以及錯誤處理的結果類型 (第三)。
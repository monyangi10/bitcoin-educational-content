question: วัตถุประสงค์หลักของประเภท enum Option<T> ของ Rust คืออะไร?
answer: เพื่อแสดงค่าที่อาจมีหรือไม่มีอย่างปลอดภัย ป้องกันข้อผิดพลาดจาก null pointer
wrong_answers:
  - การจัดเก็บประเภทข้อมูลที่แตกต่างกันหลายประเภทในตัวแปรเดียวโดยไม่ตรวจสอบประเภท
  - ในการสร้างพารามิเตอร์ที่เป็นทางเลือกในนิยามฟังก์ชันที่สามารถข้ามได้ระหว่างการเรียกใช้
  - เพื่อให้มีวิธีการคืนค่าประเภทข้อผิดพลาดที่เป็นไปได้หลายประเภทจากฟังก์ชันเดียว
explanation: |
  Option<T> enum เป็นวิธีแก้ปัญหาของ Rust สำหรับปัญหาการชี้ไปที่ null โดยบังคับให้จัดการกับค่าที่หายไปอย่างชัดเจน มีสองรูปแบบ: Some(T) สำหรับค่าที่มีอยู่และ None สำหรับค่าที่ไม่มีอยู่ ตัวคอมไพเลอร์จะบังคับให้คุณตรวจสอบว่าคุณมีรูปแบบใดก่อนที่จะใช้ค่า ป้องกันข้อผิดพลาดในขณะรันไทม์ คำตอบที่ผิดจะสับสนระหว่าง Option กับแนวคิดอื่น ๆ: unions/variants (ข้อแรก), default parameters (ข้อที่สอง), และ Result types สำหรับการจัดการข้อผิดพลาด (ข้อที่สาม)
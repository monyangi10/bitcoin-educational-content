question: "Quel est l'avantage architectural fondamental de l'approche du SDK Breez pour la gestion des nœuds Lightning par rapport aux implémentations Lightning auto-hébergées traditionnelles ?"
answer: "Les utilisateurs gèrent leurs propres nœuds Lightning sur l'infrastructure de Greenlight tout en conservant le contrôle exclusif des clés privées, qui ne quittent jamais leurs appareils".
wrong_answers:
  - "Les utilisateurs partagent les canaux Lightning communs gérés par Breez tout en conservant la garde individuelle des fonds par le biais d'accords multi-signatures".
  - "Les utilisateurs utilisent localement des nœuds légers Lightning qui se synchronisent avec les nœuds maîtres de Breez, ce qui améliore la fiabilité et réduit les besoins en bande passante".
  - "Les utilisateurs délèguent la gestion des canaux aux fournisseurs de services Lightning tout en conservant la garde grâce à des modules de sécurité matériels intégrés dans les appareils mobiles".
explanation: |
  L'architecture du SDK Breez donne à chaque utilisateur son propre nœud Lightning dédié, fonctionnant sur l'infrastructure cloud de Greenlight, mais surtout, les clés privées ne quittent jamais l'appareil de l'utilisateur. Cela signifie que Greenlight ne peut effectuer aucune opération Lightning sans que l'application de l'utilisateur ne signe activement les transactions. Cela diffère des pools de canaux partagés, des nœuds légers locaux ou des modules de sécurité matériels - il s'agit d'une approche hybride unique qui élimine la complexité opérationnelle tout en préservant de véritables principes d'autodétention.

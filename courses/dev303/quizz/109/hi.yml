question: पारंपरिक सेल्फ-होस्टेड लाइटनिंग कार्यान्वयनों की तुलना में लाइटनिंग नोड प्रबंधन के लिए Breez SDK के दृष्टिकोण का मूलभूत वास्तुशिल्पीय लाभ क्या है?
answer: उपयोगकर्ता ग्रीनलाइट इंफ्रास्ट्रक्चर पर अपने स्वयं के लाइटनिंग नोड्स को बनाए रखते हैं, साथ ही निजी कुंजियों पर अपना अनन्य नियंत्रण बरकरार रखते हैं जो कभी भी उनके उपकरणों से बाहर नहीं जाती हैं।
wrong_answers:
  - उपयोगकर्ता Breez द्वारा प्रबंधित साझा लाइटनिंग चैनलों को साझा करते हैं, साथ ही बहु-हस्ताक्षर व्यवस्थाओं के माध्यम से व्यक्तिगत रूप से धनराशि की अभिरक्षा बनाए रखते हैं।
  - "उपयोगकर्ता स्थानीय रूप से हल्के लाइटनिंग नोड्स चलाते हैं जो बेहतर विश्वसनीयता और कम बैंडविड्थ आवश्यकताओं के लिए Breez के मास्टर नोड्स के साथ सिंक्रनाइज़ होते हैं।"
  - उपयोगकर्ता चैनल प्रबंधन का दायित्व लाइटनिंग सेवा प्रदाताओं को सौंपते हैं, जबकि मोबाइल उपकरणों में एकीकृत हार्डवेयर सुरक्षा मॉड्यूल के माध्यम से सुरक्षा बनाए रखते हैं।
explanation: |
  Breez SDK का आर्किटेक्चर प्रत्येक उपयोगकर्ता को ग्रीनलाइट के क्लाउड इंफ्रास्ट्रक्चर पर चलने वाला अपना समर्पित लाइटनिंग नोड प्रदान करता है, लेकिन सबसे महत्वपूर्ण बात यह है कि निजी कुंजी कभी भी उपयोगकर्ता के डिवाइस से बाहर नहीं जाती हैं। इसका मतलब है कि उपयोगकर्ता के एप्लिकेशन द्वारा लेनदेन पर सक्रिय रूप से हस्ताक्षर किए बिना ग्रीनलाइट कोई भी लाइटनिंग ऑपरेशन नहीं कर सकता है। यह साझा चैनल पूल, स्थानीय लाइटवेट नोड्स या हार्डवेयर सुरक्षा मॉड्यूल से अलग है - यह एक अनूठा हाइब्रिड दृष्टिकोण है जो वास्तविक स्व-संरक्षण सिद्धांतों को बनाए रखते हुए परिचालन जटिलता को समाप्त करता है।
question: Какво е основното архитектурно предимство на подхода на Breez SDK към управлението на възли на Lightning в сравнение с традиционните самостоятелно хоствани реализации на Lightning?
answer: Потребителите поддържат свои собствени Lightning възли в инфраструктурата на Greenlight, като запазват изключителен контрол върху частните ключове, които никога не напускат устройствата им
wrong_answers:
  - Потребителите споделят обединени канали за мълнии, управлявани от Breez, като същевременно запазват индивидуалното съхранение на средствата чрез споразумения с множество подписи
  - "Потребителите управляват локално леки възли Lightning, които се синхронизират с главните възли на Breez за по-голяма надеждност и намалени изисквания за широчина на честотната лента"
  - Потребителите делегират управлението на каналите на доставчиците на светкавични услуги, като същевременно поддържат контрол чрез хардуерни модули за сигурност, интегрирани в мобилните устройства
explanation: |
  Архитектурата на Breez SDK предоставя на всеки потребител собствен специализиран възел Lightning, работещ в облачната инфраструктура на Greenlight, но от решаващо значение е, че частните ключове никога не напускат устройството на потребителя. Това означава, че Greenlight не може да извършва никакви операции с Lightning, без приложението на потребителя да подписва активно транзакциите. Това се различава от споделените канални пулове, локалните Lightning възли или хардуерните модули за сигурност - това е уникален хибриден подход, който елиминира оперативната сложност, като същевременно запазва истинските принципи за самоохрана.
question: 与传统的自托管 Lightning 实施方案相比，Breez SDK 的 Lightning 节点管理方法在架构上有何根本优势？
answer: 用户在Greenlight基础设施上维护自己的Lightning节点，同时保留对私钥的独家控制权，这些私钥不会离开他们的设备
wrong_answers:
  - 用户共享由 Breez 管理的集合闪电渠道，同时通过多重签名安排保持对资金的单独保管
  - 用户在本地运行与 Breez 主节点同步的轻量级 "闪电 "节点，以提高可靠性并降低带宽需求。
  - 用户将渠道管理委托给 Lightning 服务提供商，同时通过集成在移动设备中的硬件安全模块进行监管
explanation: |
  Breez SDK的架构为每个用户提供了在Greenlight云基础设施上运行的专用Lightning节点，但至关重要的是，私钥永远不会离开用户的设备。这意味着，如果用户的应用程序不主动签署交易，Greenlight就无法执行任何Lightning操作。这不同于共享通道池、本地轻量级节点或硬件安全模块--它是一种独特的混合方法，既消除了操作复杂性，又保留了真正的自我保管原则。
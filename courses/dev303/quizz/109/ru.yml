question: В чем заключается фундаментальное архитектурное преимущество подхода Breez SDK к управлению узлами Lightning по сравнению с традиционными самостоятельными реализациями Lightning?
answer: Пользователи обслуживают свои собственные узлы Lightning на инфраструктуре Greenlight, сохраняя эксклюзивный контроль над закрытыми ключами, которые никогда не покидают их устройства
wrong_answers:
  - Пользователи пользуются общими каналами Lightning, управляемыми Breez, сохраняя при этом индивидуальное хранение средств с помощью мультиподписей
  - "Пользователи запускают локальные легкие узлы Lightning, которые синхронизируются с основными узлами Breez для повышения надежности и снижения требований к пропускной способности"
  - Пользователи делегируют управление каналами поставщикам услуг Lightning, сохраняя при этом контроль над ними с помощью аппаратных модулей безопасности, интегрированных в мобильные устройства
explanation: |
  Архитектура Breez SDK предоставляет каждому пользователю свой собственный узел Lightning, работающий в облачной инфраструктуре Greenlight, но, что очень важно, приватные ключи никогда не покидают устройство пользователя. Это означает, что Greenlight не может выполнять какие-либо операции с Lightning без активного подписания транзакций приложением пользователя. Это отличается от общих пулов каналов, локальных облегченных узлов или аппаратных модулей безопасности - это уникальный гибридный подход, который устраняет операционные сложности, сохраняя при этом истинные принципы самоохраны.
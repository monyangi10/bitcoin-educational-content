question: مزیت معماری اساسی رویکرد SDK Breez در مدیریت نودهای Lightning در مقایسه با پیاده‌سازی‌های سنتی خودمیزبان Lightning چیست؟
answer: کاربران گره‌های لایتنینگ خود را بر روی زیرساخت Greenlight نگهداری می‌کنند در حالی که کنترل انحصاری کلیدهای خصوصی که هرگز دستگاه‌هایشان را ترک نمی‌کنند، در اختیار دارند.
wrong_answers:
  - کاربران کانال‌های لایتنینگ مشترک را که توسط Breez مدیریت می‌شود به اشتراک می‌گذارند، در حالی که از طریق ترتیبات چند امضایی، نگهداری فردی وجوه را حفظ می‌کنند.
  - "کاربران نودهای سبک لایتنینگ را به صورت محلی اجرا می‌کنند که با نودهای اصلی Breez همگام‌سازی می‌شوند تا قابلیت اطمینان را افزایش داده و نیازهای پهنای باند را کاهش دهند"
  - کاربران مدیریت کانال را به ارائه‌دهندگان خدمات لایتنینگ واگذار می‌کنند در حالی که از طریق ماژول‌های امنیتی سخت‌افزاری که در دستگاه‌های موبایل یکپارچه شده‌اند، حضانت را حفظ می‌کنند.
explanation: |
  معماری SDK Breez به هر کاربر یک نود لایتنینگ اختصاصی می‌دهد که بر روی زیرساخت ابری Greenlight اجرا می‌شود، اما نکته مهم این است که کلیدهای خصوصی هرگز دستگاه کاربر را ترک نمی‌کنند. این بدان معناست که Greenlight نمی‌تواند هیچ عملیات لایتنینگی را بدون اینکه برنامه کاربر به‌طور فعال تراکنش‌ها را امضا کند، انجام دهد. این با استخرهای کانال مشترک، نودهای سبک محلی یا ماژول‌های امنیتی سخت‌افزاری متفاوت است - این یک رویکرد ترکیبی منحصر به فرد است که پیچیدگی عملیاتی را از بین می‌برد و در عین حال اصول واقعی نگهداری شخصی را حفظ می‌کند.
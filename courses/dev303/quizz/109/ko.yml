question: 기존의 자체 호스팅된 라이트닝 구현과 비교하여 라이트닝 노드 관리에 대한 Breez SDK의 접근 방식의 근본적인 아키텍처적 장점은 무엇인가요?
answer: 사용자는 그린라이트 인프라에서 자신의 라이트닝 노드를 유지하면서 자신의 디바이스를 벗어나지 않는 개인 키를 독점적으로 제어할 수 있습니다
wrong_answers:
  - 사용자는 다중 서명 계약을 통해 개별적인 자금 관리를 유지하면서 Breez에서 관리하는 풀링된 라이트닝 채널을 공유합니다
  - "사용자는 Breez의 마스터 노드와 동기화되는 경량 라이트닝 노드를 로컬에서 실행하여 안정성을 향상하고 대역폭 요구 사항을 줄입니다."
  - 사용자는 모바일 디바이스에 통합된 하드웨어 보안 모듈을 통해 관리 권한을 유지하면서 채널 관리를 라이트닝 서비스 제공업체에 위임합니다
explanation: |
  Breez SDK의 아키텍처는 각 사용자에게 그린라이트의 클라우드 인프라에서 실행되는 전용 라이트닝 노드를 제공하지만, 결정적으로 개인 키가 사용자의 디바이스를 떠나지 않습니다. 즉, 사용자의 애플리케이션이 트랜잭션에 적극적으로 서명하지 않으면 Greenlight는 어떠한 Lightning 작업도 수행할 수 없습니다. 이는 공유 채널 풀, 로컬 경량 노드 또는 하드웨어 보안 모듈과는 다른 방식으로, 진정한 자기 보관 원칙을 유지하면서 운영상의 복잡성을 제거하는 고유한 하이브리드 접근 방식입니다.
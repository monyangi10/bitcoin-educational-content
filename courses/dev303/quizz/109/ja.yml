question: Breez SDKのライトニング・ノード管理アプローチは、従来のセルフホスト・ライトニング実装と比較して、アーキテクチャ上の基本的な利点は何ですか？
answer: ユーザーは、Greenlightインフラストラクチャ上で自分のLightningノードを維持しながら、自分のデバイスから離れることのない秘密鍵を独占的に管理できる。
wrong_answers:
  - Breezが管理するプールされたライトニング・チャネルを利用者が共有する一方、マルチシグネチャーの取り決めにより、資金の個別保管を維持する。
  - 「ユーザーは、Breezのマスター・ノードと同期する軽量ライトニング・ノードをローカルで稼動させ、信頼性の向上と帯域幅の削減を実現する。
  - ユーザーは、モバイル・デバイスに統合されたハードウェア・セキュリティ・モジュールによって身柄を管理しながら、チャネル管理をライトニング・サービス・プロバイダーに委任する。
explanation: |
  Breez SDKのアーキテクチャは、Greenlightのクラウドインフラストラクチャ上で動作する各ユーザー専用のLightningノードを提供しますが、重要なことは、秘密鍵がユーザーのデバイスから離れることがないということです。つまり、Greenlightは、ユーザーのアプリケーションがアクティブにトランザクションに署名することなく、Lightningオペレーションを実行することはできません。これは、共有チャネルプール、ローカル軽量ノード、ハードウェアセキュリティモジュールとは異なり、真のセルフカストディの原則を維持しながら運用の複雑性を排除する独自のハイブリッドアプローチです。
question: 與傳統的自託管 Lightning 實作相比，Breez SDK 的 Lightning 節點管理方法在架構上有什麼基本優勢？
answer: 用戶在Greenlight基礎設施上維護自己的Lightning節點，同時保留對私密金鑰的獨家控制，私密金鑰不會離開他們的設備。
wrong_answers:
  - 使用者共享由 Breez 管理的匯集閃電管道，同時透過多重簽章安排維持個人的資金保管
  - 「使用者可在本機執行輕量級 Lightning 節點，這些節點可與 Breez 的主節點同步，以提高可靠性並降低頻寬需求」
  - 使用者可將通路管理委託給 Lightning 服務供應商，同時透過整合至行動裝置的硬體安全模組來維持監控。
explanation: |
  Breez SDK的架構讓每個使用者都有自己專屬的Lightning節點，在Greenlight的雲端基礎架構上執行，但最重要的是，私密金鑰從未離開使用者的裝置。這意味著，如果用戶的應用程式沒有主動簽署交易，Greenlight就無法執行任何Lightning操作。這不同於共用通道池、本地輕量級節點或硬件安全模組 - 這是一種獨特的混合方法，消除了操作複雜性，同時保留了真正的自我保管原則。
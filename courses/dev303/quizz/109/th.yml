question: ข้อได้เปรียบทางสถาปัตยกรรมพื้นฐานของวิธีการของ Breez SDK ในการจัดการโหนด Lightning เมื่อเทียบกับการใช้งาน Lightning แบบโฮสต์ด้วยตนเองแบบดั้งเดิมคืออะไร?
answer: ผู้ใช้ดูแลโหนด Lightning ของตนเองบนโครงสร้างพื้นฐาน Greenlight ในขณะที่ยังคงควบคุมคีย์ส่วนตัวที่ไม่เคยออกจากอุปกรณ์ของตนเอง
wrong_answers:
  - ผู้ใช้แชร์ช่องทาง Lightning ที่รวมกันซึ่งจัดการโดย Breez ในขณะที่ยังคงการดูแลเงินทุนส่วนบุคคลผ่านการจัดการหลายลายเซ็น
  - "ผู้ใช้เรียกใช้โหนด Lightning ที่มีน้ำหนักเบาในเครื่องซึ่งซิงโครไนซ์กับโหนดหลักของ Breez เพื่อเพิ่มความน่าเชื่อถือและลดความต้องการแบนด์วิดท์"
  - ผู้ใช้มอบหมายการจัดการช่องทางให้กับผู้ให้บริการ Lightning ในขณะที่ยังคงการควบคุมผ่านโมดูลความปลอดภัยฮาร์ดแวร์ที่ผสานรวมเข้ากับอุปกรณ์เคลื่อนที่
explanation: |
  สถาปัตยกรรมของ Breez SDK มอบโหนด Lightning เฉพาะให้กับผู้ใช้แต่ละรายที่ทำงานบนโครงสร้างพื้นฐานคลาวด์ของ Greenlight แต่ที่สำคัญคือ คีย์ส่วนตัวจะไม่ออกจากอุปกรณ์ของผู้ใช้ ซึ่งหมายความว่า Greenlight ไม่สามารถดำเนินการใด ๆ บน Lightning ได้โดยที่แอปพลิเคชันของผู้ใช้ไม่ได้ลงนามในธุรกรรมอย่างแข็งขัน สิ่งนี้แตกต่างจากกลุ่มช่องทางที่ใช้ร่วมกัน โหนดน้ำหนักเบาในเครื่อง หรือโมดูลความปลอดภัยของฮาร์ดแวร์ - เป็นแนวทางแบบไฮบริดที่ไม่เหมือนใครซึ่งขจัดความซับซ้อนในการดำเนินงานในขณะที่ยังคงรักษาหลักการการดูแลตนเองที่แท้จริง
question: Rust ปล่อยเวอร์ชันเสถียรใหม่บ่อยแค่ไหนตามกำหนดการปล่อยของพวกเขา?
answer: ประมาณทุกหกสัปดาห์
wrong_answers:
  - ประมาณทุกสามเดือน
  - ประมาณทุกสองสัปดาห์
  - ประมาณทุกสี่เดือน
explanation: |
  Rust ปฏิบัติตามตารางการเปิดตัวที่คาดการณ์ได้ โดยมีเวอร์ชันเสถียรใหม่ออกมาประมาณทุกหกสัปดาห์ วงจรการเปิดตัวที่บ่อยครั้งนี้ช่วยให้ฟีเจอร์ใหม่และการปรับปรุงต่างๆ เข้าถึงผู้ใช้ได้อย่างสม่ำเสมอในขณะที่ยังคงรักษาเสถียรภาพไว้ กรอบเวลาอื่นๆ นั้นไม่ถูกต้อง - สามเดือนและสี่เดือนจะช้ากว่าจังหวะที่แท้จริงของ Rust มาก ในขณะที่สองสัปดาห์จะเร็วเกินไปสำหรับการเปิดตัวที่เสถียรซึ่งต้องการการทดสอบอย่างละเอียดถี่ถ้วน
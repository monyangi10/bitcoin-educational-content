question: Rustのリリーススケジュールでは、どれくらいの頻度で新しい安定版がリリースされるのですか？
answer: 約6週間ごと
wrong_answers:
  - 約3ヶ月に1度
  - 約2週間ごと
  - 約4ヶ月に1度
explanation: |
  Rustは、予測可能なリリーススケジュールに従い、約6週間ごとに新しい安定版がリリースされます。この頻繁なリリースサイクルにより、安定性を維持しながら、新機能や改良が定期的にユーザーに届くようになっている。3ヶ月や4ヶ月はRustの実際のペースよりずっと遅いでしょうし、2週間は徹底的なテストを必要とする安定版リリースとしては非現実的な速さです。
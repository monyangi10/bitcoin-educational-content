question: Rust अपने रिलीज शेड्यूल के अनुसार कितनी बार एक नया स्थिर संस्करण जारी करता है?
answer: लगभग हर छह सप्ताह में
wrong_answers:
  - लगभग हर तीन महीने में
  - लगभग हर दो सप्ताह में
  - लगभग हर चार महीने में
explanation: |
  Rust एक निश्चित रिलीज़ शेड्यूल का पालन करता है, जिसके तहत लगभग हर छह सप्ताह में नए स्थिर संस्करण जारी किए जाते हैं। यह नियमित रिलीज़ चक्र स्थिरता बनाए रखते हुए यह सुनिश्चित करता है कि नए फ़ीचर और सुधार नियमित रूप से उपयोगकर्ताओं तक पहुँचें। अन्य समयसीमाएँ गलत हैं - तीन महीने और चार महीने Rust की वास्तविक गति से बहुत धीमी होंगी, जबकि दो सप्ताह उन स्थिर रिलीज़ के लिए अवास्तविक रूप से तेज़ होंगे जिनके लिए गहन परीक्षण की आवश्यकता होती है।
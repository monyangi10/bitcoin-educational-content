question: Колко често Rust издава нова стабилна версия според графика си за издаване?
answer: Приблизително на всеки шест седмици
wrong_answers:
  - Приблизително на всеки три месеца
  - Приблизително на всеки две седмици
  - Приблизително на всеки четири месеца
explanation: |
  Rust следва предсказуем график на издаване, като нови стабилни версии излизат приблизително на всеки шест седмици. Този често срещан цикъл на издаване гарантира, че новите функции и подобрения достигат редовно до потребителите, като същевременно се запазва стабилността. Другите срокове са неправилни - три месеца и четири месеца биха били много по-бавни от действителното темпо на Rust, а две седмици биха били нереалистично бързи за стабилни версии, които изискват задълбочено тестване.
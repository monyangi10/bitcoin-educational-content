question: Rust는 출시 일정에 따라 얼마나 자주 새로운 안정 버전을 출시하나요?
answer: 약 6주마다
wrong_answers:
  - 약 3개월마다
  - 약 2주마다
  - 약 4개월마다
explanation: |
  Rust은 약 6주마다 새로운 안정 버전이 출시되는 예측 가능한 릴리스 일정을 따릅니다. 이렇게 빈번한 릴리스 주기를 통해 안정성을 유지하면서 새로운 기능과 개선 사항을 정기적으로 사용자에게 제공할 수 있습니다. 3개월과 4개월은 Rust의 실제 속도보다 훨씬 느리고, 2주는 철저한 테스트가 필요한 안정적인 릴리스의 경우 비현실적으로 빠를 수 있기 때문에 다른 주기는 정확하지 않습니다.
question: Ni mara ngapi Rust hutoa toleo jipya thabiti kulingana na ratiba yao ya kutolewa?
answer: Takriban kila baada ya wiki sita
wrong_answers:
  - Takriban kila baada ya miezi mitatu
  - Takriban kila baada ya wiki mbili
  - Takriban kila baada ya miezi minne
explanation: |
  Rust hufuata ratiba ya kutolewa inayotabirika huku matoleo mapya thabiti yakitoka takriban kila baada ya wiki sita. Mzunguko huu wa kutolewa mara kwa mara unahakikisha kwamba vipengele na maboresho mapya huwafikia watumiaji mara kwa mara huku ukidumisha uthabiti. Muda mwingine si sahihi - miezi mitatu na miezi minne itakuwa polepole zaidi kuliko kasi halisi ya Rust, huku wiki mbili zikiwa za kasi isiyo ya kweli kwa matoleo thabiti ambayo yanahitaji majaribio ya kina.
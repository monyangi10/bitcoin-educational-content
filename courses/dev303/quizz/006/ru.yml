question: Как часто Rust выпускает новую стабильную версию в соответствии с их графиком релизов?
answer: Примерно раз в шесть недель
wrong_answers:
  - Примерно раз в три месяца
  - Примерно раз в две недели
  - Примерно раз в четыре месяца
explanation: |
  Rust следует предсказуемому графику выпуска: новые стабильные версии выходят примерно каждые шесть недель. Такой частый цикл выпуска гарантирует, что новые функции и улучшения будут регулярно доходить до пользователей, сохраняя при этом стабильность. Другие временные рамки некорректны - три месяца и четыре месяца были бы гораздо медленнее, чем реальный темп работы Rust, а две недели были бы нереально быстрыми для стабильных релизов, требующих тщательного тестирования.
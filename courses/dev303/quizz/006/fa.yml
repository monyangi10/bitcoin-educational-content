question: طبق برنامه زمان‌بندی انتشار، Rust هر چند وقت یک‌بار نسخه پایدار جدیدی منتشر می‌کند؟
answer: تقریباً هر شش هفته یک‌بار
wrong_answers:
  - تقریباً هر سه ماه
  - تقریباً هر دو هفته یکبار
  - تقریباً هر چهار ماه
explanation: |
  Rust از یک برنامه انتشار قابل پیش‌بینی پیروی می‌کند که نسخه‌های پایدار جدید تقریباً هر شش هفته یک‌بار منتشر می‌شوند. این چرخه انتشار مکرر تضمین می‌کند که ویژگی‌ها و بهبودهای جدید به طور منظم به کاربران می‌رسند و در عین حال پایداری حفظ می‌شود. بازه‌های زمانی دیگر نادرست هستند - سه ماه و چهار ماه بسیار کندتر از سرعت واقعی Rust خواهند بود، در حالی که دو هفته برای انتشارهای پایدار که نیاز به آزمایش دقیق دارند، به طور غیرواقعی سریع خواهد بود.
question: Rustにおいて、最初の宣言後に変数を変更可能にするために必要なキーワードは？
answer: ミュー
wrong_answers:
  - ヴァール
  - 可変
  - 変更
explanation: |
  Rustでは、変数をミュータブルとして宣言するために、'mut'キーワードが必要です。デフォルトでは、Rustのすべての変数は安全上の理由から不変です。構文は、ミュータブル変数の場合は'let mut x = 5'、イミュータブル変数の場合は'let x = 5'となります。var'、'mutable'、'change'のような他のオプションは、この目的のために有効なRustキーワードではありません。
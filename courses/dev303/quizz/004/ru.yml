question: Какое ключевое слово необходимо для того, чтобы сделать переменную изменяемой после ее первоначального объявления в Rust?
answer: мут
wrong_answers:
  - var
  - изменяемый
  - изменить
explanation: |
  В Rust ключевое слово 'mut' необходимо для объявления переменной как мутабельной, что позволяет изменять ее значение после первоначального присвоения. По умолчанию все переменные в Rust являются неизменяемыми по соображениям безопасности. Синтаксис таков: 'let mut x = 5' для мутабельной переменной и 'let x = 5' для неизменяемой. Другие варианты, такие как 'var', 'mutable' и 'change', не являются допустимыми ключевыми словами Rust для этой цели.
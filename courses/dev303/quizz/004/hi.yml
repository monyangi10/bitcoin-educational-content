question: Rust में किसी वेरिएबल की प्रारंभिक घोषणा के बाद उसे संशोधनीय बनाने के लिए किस कीवर्ड की आवश्यकता होती है?
answer: मुठ
wrong_answers:
  - वर
  - परिवर्तनशील
  - परिवर्तन
explanation: |
  Rust में, किसी वेरिएबल को म्यूटेबल घोषित करने के लिए 'mut' कीवर्ड आवश्यक है, जिससे प्रारंभिक असाइनमेंट के बाद उसके मान को बदला जा सकता है। सुरक्षा कारणों से, Rust में सभी वेरिएबल डिफ़ॉल्ट रूप से इम्यूटेबल होते हैं। म्यूटेबल वेरिएबल के लिए सिंटैक्स 'let mut x = 5' है, जबकि इम्यूटेबल वेरिएबल के लिए 'let x = 5' है। 'var', 'mutable' और 'change' जैसे अन्य विकल्प इस उद्देश्य के लिए मान्य Rust कीवर्ड नहीं हैं।
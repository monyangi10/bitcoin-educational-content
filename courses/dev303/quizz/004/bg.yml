question: Коя ключова дума е необходима, за да може променлива да бъде променяна след първоначалното ѝ деклариране в Rust?
answer: мут
wrong_answers:
  - var
  - mutable
  - промяна
explanation: |
  В Rust ключовата дума 'mut' е необходима, за да се декларира променлива като променлива, което позволява стойността ѝ да бъде променяна след първоначалното присвояване. По подразбиране всички променливи в Rust са неизменни от съображения за сигурност. Синтаксисът е "let mut x = 5" за променлива променлива срещу "let x = 5" за непроменлива променлива. Другите опции като 'var', 'mutable' и 'change' не са валидни ключови думи в Rust за тази цел.
question: Rust에서 최초 선언 후 변수를 수정 가능하게 만들려면 어떤 키워드가 필요하나요?
answer: mut
wrong_answers:
  - var
  - 변경 가능
  - 변경
explanation: |
  Rust에서 변수를 변경 가능한 것으로 선언하려면 'mut' 키워드가 필요하며, 이를 통해 최초 할당 후 값을 변경할 수 있습니다. 기본적으로 Rust의 모든 변수는 안전상의 이유로 변경 불가능합니다. 구문은 변경 가능한 변수의 경우 'let mut x = 5'이고, 변경 불가능한 변수의 경우 'let x = 5'입니다. 'var', 'mutable', 'change'와 같은 다른 옵션은 이 목적에 유효한 Rust 키워드가 아닙니다.
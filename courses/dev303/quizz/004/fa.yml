question: چه کلمه کلیدی برای قابل تغییر کردن یک متغیر پس از اعلام اولیه آن در Rust لازم است؟
answer: جهش
wrong_answers:
  - وار
  - قابل تغییر
  - تغییر
explanation: |
  در Rust، کلمه کلیدی 'mut' برای اعلام یک متغیر به عنوان قابل تغییر لازم است، که اجازه می‌دهد مقدار آن پس از تخصیص اولیه تغییر کند. به طور پیش‌فرض، تمام متغیرها در Rust به دلایل ایمنی غیرقابل تغییر هستند. نحو آن به صورت 'let mut x = 5' برای یک متغیر قابل تغییر در مقابل 'let x = 5' برای یک متغیر غیرقابل تغییر است. گزینه‌های دیگر مانند 'var'، 'mutable' و 'change' کلمات کلیدی معتبر Rust برای این منظور نیستند.
question: คำสำคัญใดที่จำเป็นในการทำให้ตัวแปรสามารถแก้ไขได้หลังจากการประกาศครั้งแรกใน Rust?
answer: มุต
wrong_answers:
  - var
  - เปลี่ยนแปลงได้
  - เปลี่ยน
explanation: |
  ใน Rust คำสำคัญ 'mut' จำเป็นต้องใช้ในการประกาศตัวแปรให้เป็นแบบ mutable ซึ่งอนุญาตให้เปลี่ยนแปลงค่าได้หลังจากการกำหนดค่าเริ่มต้น โดยปกติแล้วตัวแปรทั้งหมดใน Rust จะเป็นแบบ immutable เพื่อเหตุผลด้านความปลอดภัย ไวยากรณ์คือ 'let mut x = 5' สำหรับตัวแปรแบบ mutable เทียบกับ 'let x = 5' สำหรับตัวแปรแบบ immutable ตัวเลือกอื่นๆ เช่น 'var', 'mutable', และ 'change' ไม่ใช่คำสำคัญที่ถูกต้องใน Rust สำหรับวัตถุประสงค์นี้
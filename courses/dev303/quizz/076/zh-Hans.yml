question: 为什么对编译器验证过的硬编码值使用 expect() 会给生产代码带来潜在问题？
answer: 硬编码值可能会随着时间的推移通过重构而发生变化，从而将以前有效的值变成运行时失效的值
wrong_answers:
  - 编译器无法在编译时验证硬编码值的有效性，导致 expect() 不可靠
  - 硬编码值比动态值消耗更多内存，导致 expect() 的性能问题
  - 在处理已知有效值时，expect() 方法比 unwrap() 方法增加了不必要的开销
explanation: |
  正确答案强调了本章的一个重要观点：即使是看似安全的硬编码值，随着时间的推移也会变得危险。该示例说明了一个有效的 IP 地址是如何被重构为一个常量，随后又被更改为 "localhost"，从而打破了最初的假设。错误答案之所以不正确，是因为：编译器可以在编译时验证硬编码值，内存消耗不是 expect() 的问题，而且与 unwrap() 相比，expect() 的性能开销并不大。
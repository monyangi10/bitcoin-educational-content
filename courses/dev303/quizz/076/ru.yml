question: Почему использование expect() для жестко закодированных значений, которые кажутся проверенными компилятором, потенциально проблематично в производственном коде?
answer: Жестко закодированные значения могут изменяться со временем в результате рефакторинга, превращая ранее правильные значения в сбои во время выполнения
wrong_answers:
  - Компилятор не может проверить правильность жестко закодированных значений во время компиляции, что делает expect() ненадежным
  - Жестко закодированные значения занимают больше памяти, чем динамические, что приводит к проблемам с производительностью при использовании функции expect()
  - Метод expect() добавляет лишние расходы по сравнению с unwrap() при работе с известными допустимыми значениями
explanation: |
  Правильный ответ подчеркивает важную мысль главы: даже кажущиеся безопасными жестко закодированные значения могут со временем стать опасными. Пример показывает, как действительный IP-адрес может быть рефакторизован в константу, а затем изменен на 'localhost', что нарушает первоначальное предположение. Неправильные ответы неверны, потому что: компилятор может проверить жестко закодированные значения во время компиляции, потребление памяти не является проблемой для expect(), и expect() не имеет значительных потерь производительности по сравнению с unwrap().
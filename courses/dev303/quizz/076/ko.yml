question: 컴파일러에서 확인된 하드코딩된 값에 기대()를 사용하는 것이 프로덕션 코드에서 문제가 될 수 있는 이유는 무엇인가요?
answer: 하드코딩된 값은 리팩터링을 통해 시간이 지남에 따라 진화하여 이전에 유효했던 값이 런타임 오류로 바뀔 수 있습니다
wrong_answers:
  - 컴파일러는 컴파일 타임에 하드 코딩된 값의 유효성을 확인할 수 없으므로 기대()를 신뢰할 수 없게 만듭니다
  - 하드코딩된 값은 동적 값보다 더 많은 메모리를 소비하므로 기대()에서 성능 문제가 발생합니다
  - 기대() 메서드는 알려진 유효한 값을 처리할 때 unwrap()에 비해 불필요한 오버헤드를 추가합니다
explanation: |
  정답은 이 장의 중요한 통찰력을 강조합니다. 겉보기에 안전해 보이는 하드코딩된 값도 시간이 지나면 위험해질 수 있다는 것입니다. 이 예제는 유효한 IP 주소가 상수로 리팩터링된 후 나중에 'localhost'로 변경되어 원래 가정을 깨뜨리는 방법을 보여줍니다. 컴파일러가 컴파일 시 하드코딩된 값을 확인할 수 있고, 기대()의 메모리 소비는 문제가 되지 않으며, 기대()는 언랩()에 비해 성능 오버헤드가 크지 않으므로 정답이 틀립니다.
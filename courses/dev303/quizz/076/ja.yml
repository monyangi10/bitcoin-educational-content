question: なぜ、コンパイラが検証したように見えるハードコードされた値に対して expect() を使用すると、量産コードで問題が発生する可能性があるのでしょうか？
answer: ハードコードされた値は、リファクタリングによって時間の経過とともに変化し、以前は有効であった値を実行時の失敗に変える可能性がある。
wrong_answers:
  - コンパイラはコンパイル時にハードコードされた値の妥当性を検証できないため、 expect() は信頼できない。
  - ハードコードされた値は、動的な値よりも多くのメモリを消費し、expect()のパフォーマンス問題を引き起こす。
  - expect() メソッドは、既知の有効な値を扱う際に unwrap() と比較して不必要なオーバーヘッドを追加します。
explanation: |
  一見安全そうに見えるハードコードされた値も、時間が経つにつれて危険になることがある。この例では、有効なIPアドレスが定数にリファクタリングされ、後に'localhost'に変更され、元の仮定が破られる可能性を示しています。コンパイラはコンパイル時にハードコードされた値を検証することができ、 expect()ではメモリ消費は問題にならず、 expect()はunwrap()と比べて大きな性能オーバーヘッドを持ちません。
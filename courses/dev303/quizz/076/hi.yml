question: कंपाइलर द्वारा सत्यापित प्रतीत होने वाले हार्ड-कोडेड मानों पर expect() का उपयोग करना प्रोडक्शन कोड में संभावित रूप से समस्याग्रस्त क्यों हो सकता है?
answer: हार्ड-कोडेड मान समय के साथ रिफैक्टरिंग के माध्यम से विकसित हो सकते हैं, जिससे पहले से मान्य मान रनटाइम विफलताओं में बदल सकते हैं।
wrong_answers:
  - कंपाइलर संकलन समय पर हार्ड-कोडेड मानों की वैधता को सत्यापित नहीं कर सकता है, जिससे expect() अविश्वसनीय हो जाता है।
  - हार्ड-कोडेड मान डायनामिक मानों की तुलना में अधिक मेमोरी का उपयोग करते हैं, जिससे expect() फ़ंक्शन के प्रदर्शन में समस्याएँ आती हैं।
  - expect() विधि ज्ञात मान्य मानों से निपटने के दौरान unwrap() की तुलना में अनावश्यक ओवरहेड जोड़ती है।
explanation: |
  सही उत्तर अध्याय के एक महत्वपूर्ण पहलू को उजागर करता है: दिखने में सुरक्षित लगने वाले हार्ड-कोडेड मान भी समय के साथ खतरनाक हो सकते हैं। उदाहरण दिखाता है कि कैसे एक वैध आईपी एड्रेस को एक कॉन्स्टेंट में बदला जा सकता है और बाद में उसे 'localhost' में परिवर्तित किया जा सकता है, जिससे मूल धारणा टूट जाती है। गलत उत्तर इसलिए गलत हैं क्योंकि: कंपाइलर कंपाइल टाइम पर हार्ड-कोडेड मानों को सत्यापित कर सकता है, expect() के साथ मेमोरी खपत की समस्या नहीं है, और unwrap() की तुलना में expect() में प्रदर्शन पर कोई खास असर नहीं पड़ता है।
question: چرا استفاده از expect() بر روی مقادیر ثابت که به نظر می‌رسد توسط کامپایلر تأیید شده‌اند، می‌تواند در کد تولید مشکل‌ساز باشد؟
answer: مقادیر هاردکد شده می‌توانند با گذشت زمان از طریق بازسازی کد تکامل یابند و مقادیر قبلاً معتبر را به خطاهای زمان اجرا تبدیل کنند.
wrong_answers:
  - کامپایلر نمی‌تواند درستی مقادیر ثابت را در زمان کامپایل تأیید کند، که این امر باعث می‌شود expect() غیرقابل‌اعتماد باشد.
  - مقادیر ثابت حافظه بیشتری نسبت به مقادیر پویا مصرف می‌کنند و باعث مشکلات عملکردی با expect() می‌شوند.
  - متد expect() در مقایسه با unwrap() هنگام کار با مقادیر معتبر شناخته‌شده، سربار غیرضروری اضافه می‌کند.
explanation: |
  پاسخ صحیح یک بینش حیاتی از فصل را برجسته می‌کند: حتی مقادیر به ظاهر امن هاردکد شده می‌توانند با گذشت زمان خطرناک شوند. مثال نشان می‌دهد که چگونه یک آدرس IP معتبر ممکن است به یک ثابت تبدیل شود و بعداً به 'localhost' تغییر کند و فرض اولیه را بشکند. پاسخ‌های نادرست اشتباه هستند زیرا: کامپایلر می‌تواند مقادیر هاردکد شده را در زمان کامپایل تأیید کند، مصرف حافظه مسئله‌ای با expect() نیست، و expect() در مقایسه با unwrap() سربار عملکردی قابل توجهی ندارد.
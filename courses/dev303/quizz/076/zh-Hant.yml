question: 為什麼在生產程式碼中，使用 expect() 來處理經編譯器驗證的硬編碼值會有潛在的問題？
answer: 硬體編碼的值可能會隨著時間的推移透過重構而演變，將先前有效的值變成執行時失敗的值。
wrong_answers:
  - 編譯器無法在編譯時驗證硬編碼值的有效性，因此 expect() 並不可靠
  - 硬編碼值比動態值消耗更多記憶體，導致 expect() 的效能問題
  - 當處理已知的有效值時，expect() 方法會比 unwrap() 方法增加不必要的開銷。
explanation: |
  正確答案突顯了本章的一個重要觀點：即使是看似安全的硬編碼值，隨著時間的推移也可能變得危險。這個範例顯示了一個有效的 IP 位址可能會被重構成常數，之後變成 'localhost'，破壞了原本的假設。錯誤答案是不正確的，因為：編譯器可以在編譯時驗證硬編碼值，記憶體消耗不是 expect() 的問題，而且與 unwrap() 相比，expect() 沒有顯著的效能開銷。
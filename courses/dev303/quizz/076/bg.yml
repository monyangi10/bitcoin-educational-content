question: Защо използването на expect() за твърдо кодирани стойности, които изглеждат проверени от компилатора, е потенциално проблематично в производствения код?
answer: Стойностите, кодирани с твърд код, могат да се променят с течение на времето чрез рефакторинг, превръщайки предишни валидни стойности в грешки по време на изпълнение
wrong_answers:
  - Компилаторът не може да провери валидността на твърдо кодираните стойности по време на компилация, което прави функцията expect() ненадеждна
  - Стойностите, кодирани с твърд код, изразходват повече памет от динамичните стойности, което води до проблеми с производителността на функцията expect()
  - Методът expect() добавя ненужни режийни разходи в сравнение с метода unwrap(), когато се работи с известни валидни стойности
explanation: |
  Правилният отговор подчертава критично важно прозрение от главата: дори привидно безопасни стойности, кодирани с твърд код, могат да станат опасни с течение на времето. Примерът показва как един валиден IP адрес може да бъде преформулиран в константа и по-късно да бъде променен на "localhost", което нарушава първоначалното предположение. Неправилните отговори са неверни, защото: компилаторът може да проверява твърдо кодираните стойности по време на компилация, консумацията на памет не е проблем при expect() и expect() няма значителен преразход на производителност в сравнение с unwrap().
question: ทำไมการใช้ expect() กับค่าที่ถูกกำหนดไว้ล่วงหน้าที่ดูเหมือนจะได้รับการตรวจสอบจากคอมไพเลอร์อาจเป็นปัญหาในโค้ดที่ใช้งานจริง?
answer: ค่าที่ถูกเขียนโค้ดอย่างตายตัวสามารถพัฒนาไปตามเวลาได้ผ่านการปรับโครงสร้างใหม่ ทำให้ค่าที่เคยถูกต้องกลายเป็นความล้มเหลวในขณะรันไทม์
wrong_answers:
  - คอมไพเลอร์ไม่สามารถตรวจสอบความถูกต้องของค่าที่ถูกฮาร์ดโค้ดในขณะคอมไพล์ ทำให้ expect() ไม่น่าเชื่อถือ
  - ค่าที่ถูกกำหนดแบบฮาร์ดโค้ดใช้หน่วยความจำมากกว่าค่าแบบไดนามิก ทำให้เกิดปัญหาด้านประสิทธิภาพกับ expect()
  - เมธอด expect() เพิ่มภาระที่ไม่จำเป็นเมื่อเทียบกับ unwrap() เมื่อจัดการกับค่าที่ทราบว่าเป็นค่าที่ถูกต้อง
explanation: |
  คำตอบที่ถูกต้องเน้นย้ำถึงข้อมูลเชิงลึกที่สำคัญจากบทนี้: แม้แต่ค่าที่ถูกฝังไว้ซึ่งดูเหมือนปลอดภัยก็อาจกลายเป็นอันตรายได้เมื่อเวลาผ่านไป ตัวอย่างแสดงให้เห็นว่า IP address ที่ถูกต้องอาจถูกปรับโครงสร้างใหม่เป็นค่าคงที่และต่อมาเปลี่ยนเป็น 'localhost' ซึ่งทำลายสมมติฐานเดิม คำตอบที่ผิดไม่ถูกต้องเพราะ: คอมไพเลอร์สามารถตรวจสอบค่าที่ถูกฝังไว้ได้ในขณะคอมไพล์, การใช้หน่วยความจำไม่ใช่ปัญหากับ expect(), และ expect() ไม่มีภาระด้านประสิทธิภาพที่สำคัญเมื่อเทียบกับ unwrap().
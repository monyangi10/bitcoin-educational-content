question: ความแตกต่างหลักระหว่างข้อผิดพลาดที่สามารถกู้คืนได้และข้อผิดพลาดที่ไม่สามารถกู้คืนได้ในระบบการจัดการข้อผิดพลาดของ Rust คืออะไร?
answer: ข้อผิดพลาดที่สามารถกู้คืนได้สามารถจัดการได้อย่างราบรื่นทำให้โปรแกรมสามารถดำเนินการต่อไปได้ ในขณะที่ข้อผิดพลาดที่ไม่สามารถกู้คืนได้จะยุติโปรแกรม
wrong_answers:
  - ข้อผิดพลาดที่สามารถกู้คืนได้ใช้มาโคร panic! ในขณะที่ข้อผิดพลาดที่ไม่สามารถกู้คืนได้ใช้ enum Result สำหรับการจัดการข้อผิดพลาดอย่างเหมาะสม
  - ข้อผิดพลาดที่สามารถกู้คืนได้เกิดขึ้นในขณะคอมไพล์ ในขณะที่ข้อผิดพลาดที่ไม่สามารถกู้คืนได้จะเกิดขึ้นเฉพาะในระหว่างการรันโปรแกรมเท่านั้น
  - ข้อผิดพลาดที่สามารถกู้คืนได้ต้องการการคลายสแต็ก ในขณะที่ข้อผิดพลาดที่ไม่สามารถกู้คืนได้สามารถถูกละเลยโดยโค้ดที่เรียก
explanation: |
  Rust จัดประเภทข้อผิดพลาดตามความสามารถของโปรแกรมในการกู้คืนจากข้อผิดพลาดเหล่านั้น ข้อผิดพลาดที่สามารถกู้คืนได้หมายถึงเงื่อนไขความล้มเหลวที่คาดการณ์ได้ เช่น ไฟล์ที่หายไปหรือปัญหาเครือข่ายที่โปรแกรมสามารถจัดการได้อย่างราบรื่นโดยใช้ประเภทผลลัพธ์ (Result types) ทำให้การดำเนินการสามารถดำเนินต่อไปได้พร้อมกับการจัดการข้อผิดพลาดที่เหมาะสม ข้อผิดพลาดที่ไม่สามารถกู้คืนได้บ่งบอกถึงปัญหาพื้นฐาน เช่น การละเมิดความปลอดภัยของหน่วยความจำหรือข้อผิดพลาดทางตรรกะที่โปรแกรมไม่สามารถดำเนินการต่อได้อย่างปลอดภัย ทำให้เกิดการหยุดทำงาน (panics) ที่ยุติการดำเนินการเพื่อป้องกันการเสียหายเพิ่มเติม
question: تفاوت اصلی بین خطاهای قابل بازیابی و غیرقابل بازیابی در سیستم مدیریت خطای Rust چیست؟
answer: خطاهای قابل بازیابی می‌توانند به‌طور مؤثری مدیریت شوند و به برنامه‌ها اجازه ادامه کار دهند، در حالی که خطاهای غیرقابل بازیابی برنامه را خاتمه می‌دهند.
wrong_answers:
  - خطاهای قابل بازیابی از ماکروی panic! استفاده می‌کنند در حالی که خطاهای غیرقابل بازیابی از enum نتیجه برای مدیریت صحیح خطا استفاده می‌کنند
  - خطاهای قابل بازیابی در زمان کامپایل رخ می‌دهند، در حالی که خطاهای غیرقابل بازیابی تنها در زمان اجرای برنامه اتفاق می‌افتند.
  - خطاهای قابل بازیابی نیاز به بازگردانی پشته دارند، در حالی که خطاهای غیرقابل بازیابی می‌توانند توسط کد فراخوان نادیده گرفته شوند.
explanation: |
  Rust خطاها را بر اساس اینکه آیا برنامه‌ها می‌توانند به‌طور منطقی از آن‌ها بازیابی کنند یا خیر، دسته‌بندی می‌کند. خطاهای قابل بازیابی شرایط شکست مورد انتظار مانند فایل‌های گم‌شده یا مشکلات شبکه را نشان می‌دهند که برنامه‌ها می‌توانند با استفاده از انواع Result به‌طور مناسب مدیریت کنند و اجازه می‌دهند اجرا با مدیریت خطای مناسب ادامه یابد. خطاهای غیرقابل بازیابی مشکلات اساسی مانند نقض ایمنی حافظه یا خطاهای منطقی را نشان می‌دهند که در آن برنامه نمی‌تواند به‌طور ایمن ادامه دهد و باعث ایجاد وحشت می‌شود که اجرای برنامه را برای جلوگیری از فساد بیشتر متوقف می‌کند.
question: 在 Rust 的錯誤處理系統中，可恢復錯誤和不可恢復錯誤的主要區別是什麼？
answer: 可修復的錯誤可以優雅的方式處理，讓程式繼續運作，而不可修復的錯誤則會終止程式。
wrong_answers:
  - 可恢復的錯誤使用 panic! 巨集，而不可恢復的錯誤使用 Result enum 來進行適當的錯誤管理。
  - 可修復的錯誤發生在編譯時，而不可修復的錯誤只發生在程式執行時
  - 可恢復的錯誤需要解除堆疊，而不可恢復的錯誤可以被呼叫程式碼忽略。
explanation: |
  Rust 根據程式是否能合理地從錯誤中恢復來分類錯誤。可恢復錯誤代表預期的失敗情況，例如遺失檔案或網路問題，程式可以使用結果類型從容處理，允許以適當的錯誤處理方式繼續執行。無法復原的錯誤表示基本問題，例如違反記憶體安全或邏輯錯誤，程式無法安全地繼續執行，因此會觸發恐慌，終止執行以防止進一步的損壞。
question: В чем заключается основное различие между восстанавливаемыми и невосстанавливаемыми ошибками в системе обработки ошибок Rust?
answer: Восстанавливаемые ошибки могут быть обработаны изящно, позволяя программам продолжать работу, в то время как невосстанавливаемые ошибки завершают работу программы
wrong_answers:
  - Восстанавливаемые ошибки используют макрос panic!, а невосстанавливаемые ошибки используют перечисление Result для правильного управления ошибками
  - Восстанавливаемые ошибки возникают во время компиляции, а неустранимые - только во время выполнения программы
  - Восстанавливаемые ошибки требуют разворачивания стека, в то время как неустранимые ошибки могут быть проигнорированы вызывающим кодом
explanation: |
  Rust классифицирует ошибки в зависимости от того, могут ли программы разумно восстановиться после них. Восстанавливаемые ошибки представляют собой ожидаемые условия сбоя, такие как отсутствие файлов или проблемы с сетью, которые программы могут изящно обрабатывать с помощью типов Result, позволяя продолжить выполнение с соответствующей обработкой ошибок. Невосстанавливаемые ошибки указывают на фундаментальные проблемы, такие как нарушения безопасности памяти или логические ошибки, когда программа не может безопасно продолжать работу, вызывая панику, которая завершает выполнение, чтобы предотвратить дальнейшее повреждение.
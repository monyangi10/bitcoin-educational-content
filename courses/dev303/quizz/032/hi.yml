question: Rust की त्रुटि प्रबंधन प्रणाली में पुनर्प्राप्त करने योग्य और अपूरणीय त्रुटियों के बीच मुख्य अंतर क्या है?
answer: ठीक की जा सकने वाली त्रुटियों को सुचारू रूप से संभाला जा सकता है जिससे प्रोग्राम चलते रहते हैं, जबकि ठीक न की जा सकने वाली त्रुटियां प्रोग्राम को समाप्त कर देती हैं।
wrong_answers:
  - ठीक किए जा सकने वाले त्रुटियों के लिए panic! मैक्रो का उपयोग किया जाता है, जबकि ठीक न किए जा सकने वाले त्रुटियों के लिए उचित त्रुटि प्रबंधन हेतु Result enum का उपयोग किया जाता है।
  - संकलन समय पर सुधार योग्य त्रुटियाँ होती हैं, जबकि सुधार न होने योग्य त्रुटियाँ केवल प्रोग्राम के रनटाइम निष्पादन के दौरान होती हैं।
  - ठीक होने योग्य त्रुटियों के लिए स्टैक को अनवाइंड करना आवश्यक होता है, जबकि ठीक न होने योग्य त्रुटियों को कॉलिंग कोड द्वारा अनदेखा किया जा सकता है।
explanation: |
  Rust त्रुटियों को इस आधार पर वर्गीकृत करता है कि क्या प्रोग्राम उनसे उचित रूप से उबर सकते हैं। उबरने योग्य त्रुटियाँ अपेक्षित विफलता स्थितियों को दर्शाती हैं, जैसे कि अनुपलब्ध फ़ाइलें या नेटवर्क समस्याएँ, जिन्हें प्रोग्राम रिजल्ट प्रकारों का उपयोग करके सुचारू रूप से संभाल सकते हैं, जिससे उचित त्रुटि प्रबंधन के साथ निष्पादन जारी रह सकता है। न उबरने योग्य त्रुटियाँ मूलभूत समस्याओं को इंगित करती हैं, जैसे कि मेमोरी सुरक्षा उल्लंघन या तर्क त्रुटियाँ, जहाँ प्रोग्राम सुरक्षित रूप से जारी नहीं रह सकता है, जिससे पैनिक उत्पन्न होते हैं जो आगे की क्षति को रोकने के लिए निष्पादन को समाप्त कर देते हैं।
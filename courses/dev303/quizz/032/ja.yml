question: Rustのエラー処理システムにおいて、回復可能なエラーと回復不可能なエラーの主な違いは何ですか？
answer: 回復可能なエラーは潔く処理され、プログラムは継続できるが、回復不可能なエラーはプログラムを終了させる。
wrong_answers:
  - 回復可能なエラーはpanic! マクロを使用し、回復不可能なエラーはResult enumを使用して適切なエラー管理を行う。
  - 回復可能なエラーはコンパイル時に発生するが、回復不可能なエラーはプログラムの実行時にのみ発生する。
  - 回復可能なエラーはスタックを巻き戻す必要があるが、回復不可能なエラーは呼び出しコードによって無視できる。
explanation: |
  Rustは、プログラムが合理的に回復できるかどうかに基づいてエラーを分類する。回復可能なエラーは、ファイルが見つからないとか、ネットワークに問題があるとか、プログラムがResult型を使って優雅に処理できるような、予想される障害状態を表し、適切なエラー処理で実行を継続できるようにする。回復不可能なエラーは、メモリ安全性違反やロジック・エラーなど、プログラムが安全に続行できない根本的な問題を示し、さらなる破損を防ぐために実行を終了するパニックを引き起こします。
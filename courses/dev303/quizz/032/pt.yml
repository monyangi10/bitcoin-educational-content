question: Qual é a principal diferença entre erros recuperáveis e irrecuperáveis no sistema de tratamento de erros do Rust?
answer: Os erros recuperáveis podem ser tratados de forma graciosa, permitindo que os programas continuem, enquanto os erros irrecuperáveis encerram o programa
wrong_answers:
  - Os erros recuperáveis utilizam a macro panic! enquanto os erros irrecuperáveis utilizam o enum Result para uma gestão adequada dos erros
  - Os erros recuperáveis ocorrem em tempo de compilação, enquanto os erros irrecuperáveis só ocorrem durante a execução do programa em tempo de execução
  - Os erros recuperáveis exigem o desenrolar da pilha, enquanto os erros irrecuperáveis podem ser ignorados pelo código de chamada
explanation: |
  O Rust categoriza os erros com base no facto de os programas poderem recuperar razoavelmente deles. Os erros recuperáveis representam condições de falha esperadas, como ficheiros em falta ou problemas de rede, que os programas podem tratar graciosamente utilizando tipos de resultados, permitindo que a execução continue com o tratamento de erros adequado. Erros irrecuperáveis indicam problemas fundamentais, como violações de segurança de memória ou erros lógicos em que o programa não pode continuar com segurança, acionando pânicos que encerram a execução para evitar mais corrupção.
question: Rust의 오류 처리 시스템에서 복구 가능한 오류와 복구 불가능한 오류의 주요 차이점은 무엇인가요?
answer: 복구 가능한 오류는 정상적으로 처리되어 프로그램을 계속할 수 있으며, 복구 불가능한 오류는 프로그램을 종료합니다
wrong_answers:
  - 복구 가능한 오류는 패닉! 매크로를 사용하고 복구 불가능한 오류는 적절한 오류 관리를 위해 결과 열거형을 사용합니다
  - 복구 가능한 오류는 컴파일 타임에 발생하는 반면 복구 불가능한 오류는 프로그램 런타임 실행 중에만 발생합니다
  - 복구 가능한 오류는 스택을 풀어야 하지만 복구 불가능한 오류는 호출 코드에서 무시할 수 있습니다
explanation: |
  Rust은 프로그램이 오류를 합리적으로 복구할 수 있는지 여부에 따라 오류를 분류합니다. 복구 가능한 오류는 프로그램이 결과 유형을 사용하여 정상적으로 처리할 수 있는 파일 누락이나 네트워크 문제와 같은 예상되는 오류 조건을 나타내며, 적절한 오류 처리를 통해 실행을 계속할 수 있습니다. 복구 불가능한 오류는 메모리 안전 위반이나 논리 오류와 같이 프로그램을 안전하게 계속할 수 없는 근본적인 문제를 나타내며, 추가 손상을 방지하기 위해 실행을 종료하는 패닉을 트리거합니다.
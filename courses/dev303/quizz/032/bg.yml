question: Каква е основната разлика между възстановимите и невъзстановимите грешки в системата за обработка на грешки на Rust?
answer: Възстановимите грешки могат да се обработват по елегантен начин, което позволява на програмите да продължат, докато невъзстановимите грешки прекратяват програмата
wrong_answers:
  - Възстановимите грешки използват макроса panic!, а невъзстановимите грешки - енума Result за правилно управление на грешките
  - Възстановимите грешки се появяват по време на компилиране, а невъзстановимите - само по време на изпълнение на програмата
  - Възстановимите грешки изискват разгъване на стека, докато невъзстановимите грешки могат да бъдат игнорирани от извикващия код
explanation: |
  Rust категоризира грешките въз основа на това дали програмите могат разумно да се възстановят от тях. Възстановимите грешки представляват очаквани състояния на неизправност, като например липсващи файлове или мрежови проблеми, с които програмите могат да се справят елегантно, използвайки типове резултати, което позволява изпълнението да продължи с подходяща обработка на грешките. Невъзстановимите грешки показват фундаментални проблеми като нарушения на безопасността на паметта или логически грешки, при които програмата не може да продължи безопасно, като предизвиква паника, която прекратява изпълнението, за да предотврати по-нататъшни повреди.
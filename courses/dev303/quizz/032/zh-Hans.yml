question: 在 Rust 的错误处理系统中，可恢复错误和不可恢复错误的主要区别是什么？
answer: 可恢复的错误可以优雅地处理，让程序继续运行，而不可恢复的错误则会终止程序
wrong_answers:
  - 可恢复的错误使用 panic! 宏，不可恢复的错误使用结果枚举进行适当的错误管理
  - 可恢复的错误发生在编译时，而不可恢复的错误只发生在程序运行时
  - 可恢复的错误需要释放堆栈，而不可恢复的错误可以被调用代码忽略
explanation: |
  Rust 根据程序能否合理地恢复错误，对错误进行了分类。可恢复错误代表预期的故障情况，如文件丢失或网络问题，程序可使用结果类型从容应对，允许通过适当的错误处理继续执行。无法恢复的错误表示根本性问题，如违反内存安全规定或逻辑错误，程序无法安全地继续执行，从而引发恐慌，终止执行以防止进一步损坏。
question: تفاوت کلیدی بین نحوه مدیریت بازیابی خطا توسط panic و Result در برنامه‌های Rust چیست؟
answer: هراس اجرای برنامه را بلافاصله متوقف می‌کند و نمی‌توان از آن بازیابی کرد، در حالی که Result به فراخوانان اجازه می‌دهد تا خطاها را به‌طور مؤدبانه مدیریت کنند.
wrong_answers:
  - وحشت اطلاعات خطای دقیقی ارائه می‌دهد در حالی که Result تنها موفقیت یا شکست را بدون زمینه نشان می‌دهد.
  - وحشت ایمن در برابر نخ است و می‌تواند در میان نخ‌ها مدیریت شود، در حالی که خطاهای نتیجه به نخ‌های منفرد محدود می‌شوند.
  - وحشت به‌طور خودکار خطاها را به سیستم ثبت می‌کند، در حالی که نتیجه نیاز به ثبت و گزارش دستی خطا دارد.
explanation: |
  هراس نشان‌دهنده خطاهای غیرقابل بازیابی است که بلافاصله از طریق بازگشت یا توقف، اجرا را خاتمه می‌دهند و امکان مدیریت خطا و ادامه توسط کد فراخوان را غیرممکن می‌سازند. Result، به عنوان یک enum که شامل Ok(value) یا Err(error) است، به‌طور صریح فراخوان‌ها را مجبور می‌کند تا به شکست‌های احتمالی توجه کنند و انتخاب کنند که چگونه پاسخ دهند - چه با مدیریت خطا، ارائه مقادیر پیش‌فرض، یا انتقال آن به بالای پشته فراخوانی. این تفاوت اساسی Result را به انتخاب ترجیحی برای خطاهای قابل بازیابی در کد تولیدی تبدیل می‌کند، در حالی که هراس باید برای موقعیت‌های واقعاً غیرقابل بازیابی یا سناریوهای توسعه محفوظ بماند.
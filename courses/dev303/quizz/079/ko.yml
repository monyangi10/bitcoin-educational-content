question: Rust 애플리케이션에서 패닉과 Result가 오류 복구를 처리하는 방법의 주요 차이점은 무엇인가요?
answer: 패닉은 실행을 즉시 중지하고 복구할 수 없는 반면, 결과에서는 호출자가 오류를 우아하게 처리할 수 있습니다
wrong_answers:
  - 패닉은 자세한 오류 정보를 제공하는 반면, 결과는 컨텍스트 없이 성공 또는 실패만 표시합니다
  - 패닉은 스레드에 안전하며 스레드 전체에서 처리할 수 있는 반면 결과 오류는 단일 스레드에 국한됩니다
  - 패닉은 자동으로 오류를 시스템에 기록하는 반면 결과에는 수동 오류 기록 및 보고가 필요합니다
explanation: |
  패닉은 복구할 수 없는 오류를 나타내며, 풀기 또는 중단을 통해 실행을 즉시 종료하여 호출 코드가 오류를 처리하고 계속할 수 없게 만듭니다. 반면, Ok(값) 또는 Err(오류)를 포함하는 열거형인 Result는 호출자가 오류를 처리하거나 기본값을 제공하거나 호출 스택으로 전파하는 등 잠재적인 실패를 인식하고 대응 방법을 선택하도록 명시적으로 강제합니다. 이러한 근본적인 차이로 인해 프로덕션 코드에서 복구 가능한 오류의 경우 Result가 선호되는 반면, 패닉은 복구가 불가능한 상황이나 개발 시나리오에 사용해야 합니다.
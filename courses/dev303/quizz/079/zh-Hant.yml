question: 在 Rust 應用程式中，panic 和 Result 處理錯誤復原的主要差異為何？
answer: Panic 會立即停止執行且無法恢復，而 Result 則允許呼叫者優雅地處理錯誤。
wrong_answers:
  - Panic 提供詳細的錯誤資訊，而 Result 僅顯示成功或失敗，沒有上下文。
  - Panic 是線程安全的，可以跨線程處理，而結果錯誤只限於單線程。
  - Panic 會自動將錯誤記錄到系統中，而 Result 則需要手動記錄和報告錯誤。
explanation: |
  Panic 代表無法復原的錯誤，會透過解除或中止立即終止執行，使得呼叫程式無法處理錯誤並繼續。Result 作為一個包含 Ok(value) 或 Err(error) 的枚舉，明確地強制呼叫者承認潛在的失敗，並選擇如何回應 - 無論是處理錯誤、提供預設值，或是將錯誤往上傳到呼叫堆疊。這個基本差異使得 Result 成為生產程式碼中可恢復錯誤的首選，而 panic 則應該保留給真正無法恢復的情況或開發情境。
question: パニックとリザルトでは、GW中にエラーリカバリーをどのように処理するのですか？
answer: パニックは即座に実行を停止し、回復できない。一方、リザルトは呼び出し元がエラーを優雅に処理できるようにする。
wrong_answers:
  - パニックは詳細なエラー情報を提供するが、リザルトは文脈を無視して成功か失敗かを示すだけである。
  - パニックはスレッドセーフで、スレッドをまたいで処理できる。
  - パニックは自動的にエラーをシステムに記録するが、リザルトは手動でエラーを記録し、報告する必要がある。
explanation: |
  Panicは回復不可能なエラーを表し、巻き戻しやアボートによって実行を即座に終了させ、呼び出し元のコードがエラーを処理して続行することを不可能にします。Ok(value)またはErr(error)を含む列挙型であるResultは、呼び出し元に潜在的なエラーを認識させ、エラー処理、デフォルトの提供、コールスタックの上への伝播など、どのように対応するかを明示的に選択させます。この根本的な違いにより、Resultは実運用コードで回復可能なエラーに優先的に選択され、一方panicは本当に回復不可能な状況や開発シナリオのために予約されるべきです。
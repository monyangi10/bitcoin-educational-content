question: 在 Rust 应用程序中，panic 和 Result 处理错误恢复的主要区别是什么？
answer: 恐慌 "会立即停止执行且无法恢复，而 "结果 "则允许调用者优雅地处理错误
wrong_answers:
  - Panic 提供详细的错误信息，而 Result 只显示成功或失败，没有上下文信息
  - 恐慌是线程安全的，可跨线程处理，而结果错误仅限于单线程处理
  - 恐慌 "会自动将错误记录到系统中，而 "结果 "则需要手动记录和报告错误
explanation: |
  Panic 表示不可恢复的错误，它会通过松开或中止立即终止执行，使调用代码无法处理错误并继续执行。结果作为一个包含 Ok(value) 或 Err(error) 的枚举，明确地迫使调用者承认潜在的故障，并选择如何应对--是处理错误、提供默认值，还是将错误向上传播到调用堆栈。这一本质区别使得 Result 成为生产代码中可恢复错误的首选，而 panic 则应保留给真正不可恢复的情况或开发场景。
question: 在 Rust 的記憶體配置中，組成 String 結構的三個元件是什麼？
answer: 堆資料的指標、目前的長度和總容量
wrong_answers:
  - 堆疊資料的指標、目前大小和最大長度
  - 記憶體位址、字元數量和分配類型
  - 資料參考、位元組大小和所有權狀態
explanation: |
  Rust 中的字串正好由三個儲存在堆疊上的元件組成：指向堆所分配字元資料的指標、字串內容的目前長度，以及所分配緩衝區的總容量。此結構允許字串有效地成長或縮小，同時保持對其邊界的瞭解。其他選項之所以不正確，是因為它們引用了錯誤的位置 (堆疊而非堆)、使用了不精確的術語 (大小 vs 長度、字元數目 vs 字節長度)，或是包含了分配類型或所有權狀態等不存在的元件。
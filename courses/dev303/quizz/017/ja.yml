question: Rustのメモリーレイアウトにおいて、Stringの構造を構成する3つの要素とは？
answer: ヒープデータへのポインタ、現在の長さ、総容量
wrong_answers:
  - スタックデータへのポインタ、現在のサイズ、最大長
  - メモリアドレス、文字数、割り当てタイプ
  - データ参照、バイトサイズ、所有権の状態
explanation: |
  Rustにおける文字列は、スタック上に格納された3つの要素、すなわち、ヒープ上に確保された文字データへのポインタ、文字列内容の現在の長さ、および確保されたバッファの総容量から構成される。この構造により、文字列はその境界を認識しながら効率的に伸縮することができる。他の選択肢は、間違った場所（ヒープではなくスタック）を参照したり、不正確な用語（サイズ対長さ、文字数対バイト長）を使用したり、アロケーションタイプや所有権の状態など存在しないコンポーネントを含んでいるため、不正確です。
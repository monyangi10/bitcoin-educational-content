question: Rust के मेमोरी लेआउट में स्ट्रिंग की संरचना बनाने वाले तीन घटक कौन से हैं?
answer: हीप डेटा, वर्तमान लंबाई और कुल क्षमता का एक पॉइंटर
wrong_answers:
  - स्टैक डेटा, वर्तमान आकार और अधिकतम लंबाई का एक पॉइंटर
  - मेमोरी एड्रेस, कैरेक्टर काउंट और एलोकेशन टाइप
  - डेटा संदर्भ, बाइट आकार और स्वामित्व स्थिति
explanation: |
  Rust में एक स्ट्रिंग में स्टैक पर संग्रहीत ठीक तीन घटक होते हैं: हीप-आवंटित वर्ण डेटा का एक पॉइंटर, स्ट्रिंग सामग्री की वर्तमान लंबाई और आवंटित बफर की कुल क्षमता। यह संरचना स्ट्रिंग को उनकी सीमाओं की जानकारी बनाए रखते हुए कुशलतापूर्वक बढ़ने और घटने की अनुमति देती है। अन्य विकल्प गलत हैं क्योंकि वे या तो गलत स्थानों (हीप के बजाय स्टैक) का संदर्भ देते हैं, अस्पष्ट शब्दावली (आकार बनाम लंबाई, वर्ण गणना बनाम बाइट लंबाई) का उपयोग करते हैं, या आवंटन प्रकार या स्वामित्व स्थिति जैसे गैर-मौजूद घटकों को शामिल करते हैं।
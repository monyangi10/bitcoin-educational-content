question: سه جزء که ساختار یک رشته را در چیدمان حافظه Rust تشکیل می‌دهند چیست؟
answer: یک اشاره‌گر به داده‌های هیپ، طول فعلی، و ظرفیت کل
wrong_answers:
  - اشاره‌گری به داده‌های پشته، اندازه فعلی و حداکثر طول
  - یک آدرس حافظه، تعداد کاراکترها، و نوع تخصیص
  - یک مرجع داده، اندازه بایت، و وضعیت مالکیت
explanation: |
  یک رشته در Rust دقیقاً شامل سه مؤلفه است که در پشته ذخیره می‌شوند: یک اشاره‌گر به داده‌های کاراکتری تخصیص‌یافته در هیپ، طول فعلی محتوای رشته، و ظرفیت کل بافر تخصیص‌یافته. این ساختار به رشته‌ها اجازه می‌دهد تا به‌طور کارآمد رشد کرده و کوچک شوند در حالی که از مرزهای خود آگاه هستند. گزینه‌های دیگر نادرست هستند زیرا یا به مکان‌های اشتباه اشاره می‌کنند (پشته به جای هیپ)، از اصطلاحات نادقیق استفاده می‌کنند (اندازه در مقابل طول، تعداد کاراکتر در مقابل طول بایت)، یا شامل مؤلفه‌های غیرموجود مانند نوع تخصیص یا وضعیت مالکیت هستند.
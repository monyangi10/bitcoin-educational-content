question: องค์ประกอบสามส่วนที่ประกอบขึ้นเป็นโครงสร้างของ String ในการจัดวางหน่วยความจำของ Rust คืออะไร?
answer: ตัวชี้ไปยังข้อมูลฮีป, ความยาวปัจจุบัน, และความจุทั้งหมด
wrong_answers:
  - ตัวชี้ไปยังข้อมูลสแตก ขนาดปัจจุบัน และความยาวสูงสุด
  - ที่อยู่หน่วยความจำ, จำนวนตัวอักษร, และประเภทการจัดสรร
  - การอ้างอิงข้อมูล, ขนาดไบต์, และสถานะความเป็นเจ้าของ
explanation: |
  สตริงใน Rust ประกอบด้วยสามองค์ประกอบที่เก็บไว้ในสแตก: ตัวชี้ไปยังข้อมูลตัวอักษรที่จัดสรรในฮีป, ความยาวปัจจุบันของเนื้อหาสตริง, และความจุทั้งหมดของบัฟเฟอร์ที่จัดสรร โครงสร้างนี้ช่วยให้สตริงสามารถขยายและหดตัวได้อย่างมีประสิทธิภาพในขณะที่ยังคงรักษาความรู้เกี่ยวกับขอบเขตของมัน ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะอ้างอิงตำแหน่งที่ผิด (สแตกแทนที่จะเป็นฮีป), ใช้คำศัพท์ที่ไม่แม่นยำ (ขนาดเทียบกับความยาว, จำนวนตัวอักษรเทียบกับความยาวไบต์), หรือรวมถึงองค์ประกอบที่ไม่มีอยู่จริงเช่นประเภทการจัดสรรหรือสถานะความเป็นเจ้าของ
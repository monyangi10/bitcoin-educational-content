question: Кои са трите компонента, които съставляват структурата на низ в паметта на Rust?
answer: Указател към данните в купчината, текущата дължина и общия капацитет
wrong_answers:
  - Указател към данните в стека, текущия размер и максималната дължина
  - Адрес на паметта, брой символи и тип на разпределение
  - Препратка към данни, размер на байта и статус на собственост
explanation: |
  Стрингът в Rust се състои от точно три компонента, съхранявани в стека: указател към символните данни, разпределени в купчината, текущата дължина на съдържанието на стринга и общия капацитет на разпределения буфер. Тази структура позволява на низовете ефективно да нарастват и да се свиват, като същевременно се запазва знанието за техните граници. Другите варианти са некоректни, защото или се позовават на грешни места (стек вместо купчина), или използват неточна терминология (размер срещу дължина, брой символи срещу дължина на байтове), или включват несъществуващи компоненти като тип на разпределение или състояние на собственост.
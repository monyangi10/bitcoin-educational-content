question: Rust의 메모리 레이아웃에서 스트링의 구조를 구성하는 세 가지 구성 요소는 무엇인가요?
answer: 힙 데이터, 현재 길이, 총 용량에 대한 포인터입니다
wrong_answers:
  - 스택 데이터, 현재 크기, 최대 길이에 대한 포인터입니다
  - 메모리 주소, 문자 수, 할당 유형
  - 데이터 참조, 바이트 크기 및 소유권 상태
explanation: |
  Rust의 문자열은 힙에 할당된 문자 데이터에 대한 포인터, 문자열 콘텐츠의 현재 길이, 할당된 버퍼의 총 용량 등 스택에 저장된 정확히 세 가지 구성 요소로 이루어져 있습니다. 이 구조를 사용하면 문자열을 효율적으로 늘리고 줄이면서 경계를 파악할 수 있습니다. 다른 옵션은 잘못된 위치(힙 대신 스택)를 참조하거나 부정확한 용어(크기 대 길이, 문자 수 대 바이트 길이)를 사용하거나 할당 유형 또는 소유권 상태와 같이 존재하지 않는 구성 요소를 포함하기 때문에 올바르지 않습니다.
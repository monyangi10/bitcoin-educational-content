question: Какие три компонента составляют структуру строки в схеме памяти Rust?
answer: Указатель на данные кучи, текущую длину и общий объем
wrong_answers:
  - Указатель на данные стека, текущий размер и максимальную длину
  - Адрес памяти, количество символов и тип выделения
  - Ссылка на данные, размер байта и статус владения
explanation: |
  Строка в Rust состоит ровно из трех компонентов, хранящихся в стеке: указателя на выделенные из кучи символьные данные, текущей длины содержимого строки и общего объема выделенного буфера. Такая структура позволяет строкам эффективно увеличиваться и уменьшаться, сохраняя при этом знание своих границ. Остальные варианты неверны, поскольку либо ссылаются на неправильные места (стек вместо кучи), либо используют неточную терминологию (size vs length, character count vs byte length), либо включают несуществующие компоненты, такие как тип выделения или статус владения.
question: 在 Rust 的内存布局中，构成字符串结构的三个部分是什么？
answer: 堆数据指针、当前长度和总容量
wrong_answers:
  - 堆栈数据指针、当前大小和最大长度
  - 内存地址、字符数和分配类型
  - 数据引用、字节大小和所有权状态
explanation: |
  Rust 中的字符串由存储在堆栈中的三个部分组成：指向堆分配字符数据的指针、字符串内容的当前长度以及分配缓冲区的总容量。这种结构允许字符串有效地增长和收缩，同时保持对其边界的了解。其他选项都不正确，因为它们要么引用了错误的位置（堆栈而不是堆），要么使用了不准确的术语（大小与长度、字符数与字节长度），要么包含了不存在的成分，如分配类型或所有权状态。
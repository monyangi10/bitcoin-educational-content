question: การรวม Lightning Service Provider (LSP) ของ Breez SDK ช่วยแก้ปัญหาการจัดการสภาพคล่องสำหรับการรับชำระเงินได้อย่างไร?
answer: LSPs เปิดช่องทาง Lightning ใหม่โดยอัตโนมัติพร้อมสภาพคล่องขาเข้าทันทีที่การชำระเงินมาถึง โดยใช้การสร้างช่องทางแบบทันเวลา
wrong_answers:
  - LSPs เติมเงินล่วงหน้าสำหรับช่องทางผู้ใช้ทั้งหมดด้วยความจุสภาพคล่องสูงสุดและปรับสมดุลเงินทุนเป็นระยะ ๆ ทั่วโครงสร้างเครือข่าย
  - ผู้ให้บริการสภาพคล่อง (LSPs) รักษากองทุนสภาพคล่องร่วมที่ให้ยืมเงินแก่ผู้ใช้ชั่วคราวในระหว่างการรับชำระเงินก่อนที่จะเกิดการชำระเงิน
  - LSPs ส่งผ่านการชำระเงินผ่านช่องทางกลางหลายช่องทางเพื่อค้นหาเส้นทางสภาพคล่องที่มีอยู่โดยไม่สร้างความสัมพันธ์ช่องทางใหม่
explanation: |
  SDK Breez ใช้ช่องทาง 'just-in-time' ที่ LSPs เปิดช่องทาง Lightning ใหม่โดยอัตโนมัติเมื่อผู้ใช้ต้องการรับการชำระเงินแต่ขาดสภาพคล่องขาเข้า สิ่งนี้เกิดขึ้นอย่างราบรื่นโดยไม่ต้องมีการแทรกแซงจากผู้ใช้ แก้ปัญหาข้อจำกัดสภาพคล่องพื้นฐานของ Lightning ที่เงินสามารถไหลไปในทิศทางที่มีความจุของช่องทางเท่านั้น ตัวเลือกอื่นๆ อธิบายวิธีการที่แตกต่างกันซึ่งไม่ตรงกับการใช้งานจริงของ SDK ในการสร้างช่องทางแบบไดนามิก
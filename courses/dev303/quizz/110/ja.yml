question: Breez SDKのライトニング・サービス・プロバイダー（LSP）の統合は、支払を受ける際の流動性管理の問題をどのように解決するのですか？
answer: LSPは、ジャスト・イン・タイム・チャネル作成機能により、支払いが到着した瞬間に、インバウンドの流動性で新しいライトニング・チャネルを自動的に開設します。
wrong_answers:
  - LSPは、すべてのユーザー・チャネルに最大流動性キャパシティで事前に資金を供給し、ネットワーク・トポロジー全体で定期的に資金をリバランスする。
  - LSPは共有流動性プールを維持し、決済が発生する前の支払受付時に、ユーザーに一時的に資金を貸し出す。
  - LSPは、新たなチャネル関係を構築することなく、既存の流動性経路を見つけるために、複数の中間チャネルを経由して支払いをルーティングする。
explanation: |
  Breez SDKは「ジャスト・イン・タイム」チャネルを実装しており、LSPは、ユーザーが支払いを受け取る必要があるにもかかわらず十分なインバウンド流動性がない場合に、自動的に新しいLightningチャネルを開設します。これはユーザーの介入なしにシームレスに行われ、チャネルのキャパシティが存在する方向にしか資金が流れないというLightningの基本的な流動性制約を解決します。他の選択肢は、SDKの動的チャネル作成の実際の実装と一致しない異なるアプローチを説明しています。
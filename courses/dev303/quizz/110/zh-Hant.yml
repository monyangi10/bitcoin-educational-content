question: Breez SDK 的 Lightning Service Provider (LSP) 整合如何解決收取付款的流動性管理問題？
answer: LSP 使用即時通道創建功能，在付款到達時自動開啟具有入站流動資金的新 Lightning 通道。
wrong_answers:
  - LSP 預先為所有使用者通道提供最大的流動資金容量，並定期在整個網路拓樸中重新平衡資金
  - LSP 維持一個共用的流動資金池，在結算發生前的付款接收期間，暫時將資金借給使用者
  - LSP 透過多個中間管道進行支付，以尋找現有的流動資金路徑，而無需建立新的管道關係
explanation: |
  Breez SDK 實現了 "just-in-time "通道，當用戶需要接收付款但缺乏足夠的入站流動資金時，LSP 會自動開啟新的 Lightning 通道。這種情況無需用戶干預即可無縫發生，解決了 Lightning 的基本流動性限制，即資金只能流向存在通道容量的方向。其他選項描述了不同的方法，但與 SDK 的動態通道創建實際實現不符。
question: Как интеграция с Lightning Service Provider (LSP) в Breez SDK решает проблему управления ликвидностью при приеме платежей?
answer: LSP автоматически открывают новые каналы Lightning с входящей ликвидностью в момент поступления платежа, используя метод создания каналов "точно в срок"
wrong_answers:
  - LSP предварительно финансируют все пользовательские каналы с максимальной ликвидностью и периодически ребалансируют средства по всей топологии сети
  - LSP содержат общий пул ликвидности, который временно предоставляет средства пользователям во время приема платежей до проведения расчетов
  - LSP направляют платежи через множество промежуточных каналов, чтобы найти существующие пути ликвидности без создания новых каналов
explanation: |
  Breez SDK реализует каналы "точно в срок", когда LSP автоматически открывают новые каналы Lightning именно тогда, когда пользователю необходимо получить платеж, но у него нет достаточной входящей ликвидности. Это происходит без вмешательства пользователя, решая фундаментальное ограничение ликвидности в Lightning, когда средства могут поступать только в тех направлениях, где существует пропускная способность канала. Другие варианты описывают различные подходы, которые не соответствуют реальной реализации динамического создания каналов в SDK.
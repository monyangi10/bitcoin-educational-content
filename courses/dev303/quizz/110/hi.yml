question: Breez SDK का लाइटनिंग सर्विस प्रोवाइडर (LSP) इंटीग्रेशन भुगतान प्राप्त करने के लिए तरलता प्रबंधन की समस्या को कैसे हल करता है?
answer: भुगतान प्राप्त होते ही, एलएसपी स्वचालित रूप से जस्ट-इन-टाइम चैनल निर्माण का उपयोग करके इनबाउंड लिक्विडिटी के साथ नए लाइटनिंग चैनल खोल देते हैं।
wrong_answers:
  - एलएसपी अधिकतम तरलता क्षमता के साथ सभी उपयोगकर्ता चैनलों को पहले से ही फंड प्रदान करते हैं और नेटवर्क टोपोलॉजी में समय-समय पर फंड को पुनर्संतुलित करते हैं।
  - एलएसपी एक साझा तरलता पूल बनाए रखते हैं जो भुगतान प्राप्ति के दौरान निपटान होने से पहले उपयोगकर्ताओं को अस्थायी रूप से धनराशि उधार देता है।
  - एलएसपी (लीवर सर्विस प्रोवाइडर) नए चैनल संबंध बनाए बिना मौजूदा तरलता मार्गों को खोजने के लिए कई मध्यवर्ती चैनलों के माध्यम से भुगतान को रूट करते हैं।
explanation: |
  Breez SDK 'जस्ट-इन-टाइम' चैनल लागू करता है, जिसमें LSP स्वचालित रूप से नए लाइटनिंग चैनल खोलते हैं, ठीक उसी समय जब किसी उपयोगकर्ता को भुगतान प्राप्त करने की आवश्यकता होती है लेकिन उसके पास पर्याप्त इनबाउंड लिक्विडिटी नहीं होती है। यह प्रक्रिया उपयोगकर्ता के हस्तक्षेप के बिना सहजता से होती है, जिससे लाइटनिंग की मूलभूत लिक्विडिटी संबंधी बाधा का समाधान हो जाता है, जिसके अनुसार धन केवल उन्हीं दिशाओं में प्रवाहित हो सकता है जहां चैनल की क्षमता उपलब्ध हो। अन्य विकल्प अलग-अलग दृष्टिकोणों का वर्णन करते हैं जो SDK के गतिशील चैनल निर्माण के वास्तविक कार्यान्वयन से मेल नहीं खाते हैं।
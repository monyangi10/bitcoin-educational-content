question: Breez SDK 的闪电服务提供商（LSP）集成如何解决接收付款的流动性管理问题？
answer: 本地服务提供商利用及时通道创建功能，在付款到达时自动打开新的 "闪电 "通道，提供入站流动性
wrong_answers:
  - LSP 为所有用户通道预先提供最大流动容量的资金，并定期在整个网络拓扑结构中重新平衡资金
  - LSP 维护一个共享流动性池，在结算发生前接收付款期间临时向用户出借资金
  - LSP 通过多个中间渠道进行支付，找到现有的流动性路径，而无需创建新的渠道关系
explanation: |
  Breez SDK实现了 "及时 "通道，当用户需要接收付款但缺乏足够的入站流动资金时，LSP会自动打开新的闪电通道。这无需用户干预即可无缝实现，解决了闪电的基本流动性限制，即资金只能流向有通道容量的方向。其他选项描述了不同的方法，但与 SDK 动态通道创建的实际实现并不匹配。
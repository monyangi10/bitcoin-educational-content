question: Как интеграцията на Breez SDK с Lightning Service Provider (LSP) решава проблема с управлението на ликвидността при получаване на плащания?
answer: ДУУ автоматично отварят нови канали Lightning с входяща ликвидност в момента на постъпване на плащането, като използват създаването на канали "точно навреме"
wrong_answers:
  - LSP предварително финансират всички потребителски канали с максимален ликвиден капацитет и периодично ребалансират средствата в топологията на мрежата
  - ДУУ поддържат споделен пул от ликвидност, който временно предоставя средства на потребителите по време на получаване на плащането, преди да се извърши сетълментът
  - ДУУ пренасочват плащанията през множество междинни канали, за да намерят съществуващите пътища за ликвидност, без да създават нови връзки с каналите
explanation: |
  В Breez SDK се реализират канали "точно навреме", при които ДУУ автоматично отварят нови канали Lightning точно когато даден потребител трябва да получи плащане, но няма достатъчно входяща ликвидност. Това се случва безпроблемно, без намесата на потребителя, като по този начин се решава основното ликвидно ограничение на Lightning, при което средствата могат да постъпват само в посоки, в които съществува капацитет на канала. Другите варианти описват различни подходи, които не съответстват на действителната реализация на динамичното създаване на канали в SDK.
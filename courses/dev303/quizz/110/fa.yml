question: ادغام ارائه‌دهنده خدمات لایتنینگ (LSP) در SDK Breez چگونه مشکل مدیریت نقدینگی برای دریافت پرداخت‌ها را حل می‌کند؟
answer: ارائه‌دهندگان خدمات نقدینگی (LSPs) به‌طور خودکار کانال‌های جدید لایتنینگ با نقدینگی ورودی را در لحظه‌ای که یک پرداخت می‌رسد، با استفاده از ایجاد کانال به‌موقع باز می‌کنند.
wrong_answers:
  - LSPها تمام کانال‌های کاربر را با حداکثر ظرفیت نقدینگی پیش‌پرداخت می‌کنند و به‌طور دوره‌ای وجوه را در سراسر توپولوژی شبکه متعادل می‌کنند.
  - ارائه‌دهندگان خدمات نقدینگی (LSPs) یک استخر نقدینگی مشترک را حفظ می‌کنند که به طور موقت وجوه را به کاربران در هنگام دریافت پرداخت قبل از تسویه وام می‌دهد.
  - ارائه‌دهندگان خدمات پرداخت (LSPs) پرداخت‌ها را از طریق چندین کانال واسطه‌ای هدایت می‌کنند تا مسیرهای نقدینگی موجود را بدون ایجاد روابط کانال جدید پیدا کنند.
explanation: |
  SDK Breez کانال‌های 'در لحظه' را پیاده‌سازی می‌کند که در آن‌ها LSPها به‌طور خودکار کانال‌های لایتنینگ جدیدی را دقیقاً زمانی باز می‌کنند که کاربر نیاز به دریافت پرداخت دارد اما نقدینگی ورودی کافی ندارد. این فرآیند بدون دخالت کاربر و به‌صورت یکپارچه انجام می‌شود و مشکل اساسی محدودیت نقدینگی لایتنینگ را حل می‌کند، جایی که وجوه تنها می‌توانند در جهت‌هایی جریان یابند که ظرفیت کانال وجود دارد. گزینه‌های دیگر رویکردهای متفاوتی را توصیف می‌کنند که با پیاده‌سازی واقعی SDK در ایجاد پویا کانال‌ها مطابقت ندارند.
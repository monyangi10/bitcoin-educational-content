question: Breez SDK의 LSP(라이트닝 서비스 공급자) 통합은 결제 수취를 위한 유동성 관리 문제를 어떻게 해결하나요?
answer: LSP는 적시 채널 생성을 사용하여 결제가 도착하는 순간 인바운드 유동성이 있는 새로운 Lightning 채널을 자동으로 엽니다
wrong_answers:
  - LSP는 최대 유동성 용량으로 모든 사용자 채널에 사전 자금을 지원하고 네트워크 토폴로지에서 주기적으로 자금을 리밸런싱합니다
  - LSP는 정산이 발생하기 전에 결제 접수 중에 사용자에게 일시적으로 자금을 빌려주는 공유 유동성 풀을 유지합니다
  - LSP는 여러 중간 채널을 통해 결제를 라우팅하여 새로운 채널 관계를 만들지 않고 기존 유동성 경로를 찾습니다
explanation: |
  Breez SDK는 사용자가 결제를 받아야 하지만 충분한 인바운드 유동성이 부족할 때 LSP가 자동으로 새로운 라이트닝 채널을 개설하는 '적시성' 채널을 구현합니다. 이는 사용자 개입 없이 원활하게 이루어지며, 채널 용량이 존재하는 방향으로만 자금이 흘러갈 수 있는 라이트닝의 근본적인 유동성 제약을 해결합니다. 다른 옵션은 동적 채널 생성에 대한 SDK의 실제 구현과 일치하지 않는 다른 접근 방식을 설명합니다.
question: Кой метод ви позволява да извличате стойност от Result, като същевременно предоставяте персонализирано съобщение за паника, ако възникне грешка?
answer: очаквайте
wrong_answers:
  - unwrap_or_else
  - unwrap_with_message
  - panic_with
explanation: |
  Методът expect е специално разработен за извличане на стойността на успеха от Result, като същевременно ви позволява да предоставите персонализирано паник-съобщение, което ще се покаже при възникване на грешка. Това улеснява отстраняването на грешки в сравнение с метода unwrap, който използва общо паник съобщение. Методът unwrap_or_else не предизвиква паника, а вместо това изпълнява затваряне при възникване на грешка. Другите опции (unwrap_with_message и panic_with) не са действителни методи на Rust за работа с типове Result.
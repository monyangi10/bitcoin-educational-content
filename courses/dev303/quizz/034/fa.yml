question: کدام روش به شما اجازه می‌دهد تا یک مقدار را از یک Result استخراج کنید در حالی که یک پیام وحشت سفارشی در صورت وقوع خطا ارائه می‌دهد؟
answer: انتظار داشتن
wrong_answers:
  - باز کردن_یا_دیگر
  - باز کردن_با_پیام
  - وحشت_با
explanation: |
  متد expect به‌طور خاص برای استخراج مقدار موفقیت از یک Result طراحی شده است، در حالی که به شما اجازه می‌دهد یک پیام وحشت سفارشی ارائه دهید که در صورت وقوع خطا نمایش داده می‌شود. این کار اشکال‌زدایی را در مقایسه با unwrap که از یک پیام وحشت عمومی استفاده می‌کند، آسان‌تر می‌کند. متد unwrap_or_else وحشت نمی‌کند، بلکه به جای آن یک closure را در صورت وقوع خطا اجرا می‌کند. گزینه‌های دیگر (unwrap_with_message و panic_with) متدهای واقعی Rust برای مدیریت انواع Result نیستند.
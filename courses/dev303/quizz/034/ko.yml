question: 오류 발생 시 사용자 지정 패닉 메시지를 제공하면서 결과에서 값을 추출할 수 있는 방법은 무엇인가요?
answer: 기대
wrong_answers:
  - 언랩_또는_다른
  - 언랩_위드_메시지
  - panic_with
explanation: |
  Expect 메서드는 결과에서 성공 값을 추출하는 동시에 오류 발생 시 표시할 사용자 지정 패닉 메시지를 제공할 수 있도록 특별히 설계되었습니다. 따라서 일반 패닉 메시지를 사용하는 unwrap에 비해 디버깅이 더 쉽습니다. Unwrap_or_else 메서드는 오류가 발생하면 패닉을 표시하지 않고 대신 클로저를 실행합니다. 다른 옵션(unwrap_with_message 및 panic_with)은 결과 유형을 처리하기 위한 실제 Rust 메서드가 아닙니다.
question: वह कौन सा तरीका है जो आपको परिणाम से एक मान निकालने की अनुमति देता है, साथ ही त्रुटि होने पर एक अनुकूलित पैनिक संदेश भी प्रदान करता है?
answer: अपेक्षा करना
wrong_answers:
  - अनरैप_या_अन्यथा
  - संदेश के साथ खोलें
  - घबराहट_के साथ
explanation: |
  expect विधि विशेष रूप से Result से सफलता मान निकालने के लिए डिज़ाइन की गई है, साथ ही यह आपको एक कस्टम पैनिक संदेश प्रदान करने की अनुमति देती है जो त्रुटि होने पर प्रदर्शित होगा। इससे unwrap की तुलना में डिबगिंग आसान हो जाती है, जो एक सामान्य पैनिक संदेश का उपयोग करता है। unwrap_or_else विधि पैनिक नहीं करती है, बल्कि त्रुटि होने पर एक क्लोज़र को निष्पादित करती है। अन्य विकल्प (unwrap_with_message और panic_with) Result प्रकारों को संभालने के लिए वास्तविक Rust विधियाँ नहीं हैं।
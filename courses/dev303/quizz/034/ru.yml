question: Какой метод позволяет извлекать значение из Result и при этом выдавать пользовательское сообщение о панике в случае ошибки?
answer: ожидать
wrong_answers:
  - развернуть_или_все
  - развернуть_с_сообщением
  - panic_with
explanation: |
  Метод expect специально разработан для извлечения значения success из Result и позволяет задать пользовательское сообщение о панике, которое будет выведено в случае ошибки. Это облегчает отладку по сравнению с методом unwrap, который использует общее сообщение о панике. Метод unwrap_or_else не вызывает паники, а вместо этого выполняет закрытие при возникновении ошибки. Другие опции (unwrap_with_message и panic_with) не являются актуальными методами Rust для работы с типами Result.
question: エラーが発生した場合にカスタム・パニック・メッセージを提供しながら、Resultから値を抽出できるメソッドはどれですか？
answer: 期待する
wrong_answers:
  - アンラップ・オア・エルゼ
  - メッセージ付きアンラップ
  - パニック・ウィズ
explanation: |
  expect メソッドは、エラーが発生した場合に表示されるカスタムパニックメッセージを提供できるようにしながら、Result から成功値を抽出するように特別に設計されています。これは、一般的なパニック・メッセージを使用する unwrap と比較して、デバッグを容易にします。unwrap_or_elseメソッドはパニックを起こしませんが、代わりにエラーが発生したときにクロージャを実行します。他のオプション（unwrap_with_messageとpanic_with）は、Result型を扱うための実際のRustメソッドではありません。
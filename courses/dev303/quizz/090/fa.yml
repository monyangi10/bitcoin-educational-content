question: محدودیت اصلی که توسعه‌دهندگان باید هنگام استفاده از UniFFI برای توسعه برنامه‌های موبایل با رابط‌های کاربری واکنش‌گرا برطرف کنند چیست؟
answer: UniFFI فقط از رابط‌های هم‌زمان پشتیبانی می‌کند و نیاز دارد که توسعه‌دهندگان عملیات‌های ناهم‌زمان را از طریق مکانیزم‌های رشته‌بندی جداگانه مدیریت کنند.
wrong_answers:
  - UniFFI نمی‌تواند انواع داده‌های پیچیده مانند enumها و structها را مدیریت کند، که این امر غنای رابط‌های API موبایل را محدود می‌کند.
  - UniFFI بایندینگ‌هایی تولید می‌کند که در مرزهای زبانی ایمنی حافظه را تضمین نمی‌کنند و نیاز به مدیریت دستی حافظه دارند.
  - یونی‌اف‌اف‌آی از ترجمه مدیریت خطا پشتیبانی نمی‌کند و توسعه‌دهندگان را مجبور می‌کند تا مدیریت استثناهای سفارشی را در هر زبان هدف پیاده‌سازی کنند.
explanation: |
  بزرگ‌ترین محدودیت UniFFI عدم پشتیبانی از رابط‌های ناهمگام است - تمام بایندینگ‌های تولید شده همگام هستند. این موضوع چالش‌هایی را برای توسعه موبایل ایجاد می‌کند، جایی که رابط‌های کاربری پاسخگو حیاتی هستند، زیرا توسعه‌دهندگان باید راه‌حل‌های رشته‌بندی خود را پیاده‌سازی کنند تا از مسدود شدن رشته اصلی جلوگیری کنند. پاسخ‌های نادرست اشتباه هستند زیرا UniFFI در واقع در مدیریت انواع پیچیده مانند enums و structs عالی عمل می‌کند، مارشالینگ خودکار ایمن از نظر حافظه را در مرزهای زبانی فراهم می‌کند و دارای ترجمه مدیریت خطای پیشرفته‌ای است که انواع نتیجه Rust را به مدل‌های استثنای بومی برای زبان‌های هدف تبدیل می‌کند.
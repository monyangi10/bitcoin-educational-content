question: 開發人員在使用 UniFFI 進行需要回應式使用者介面的行動應用程式開發時，必須繞過的主要限制是什麼？
answer: UniFFI 僅支援同步介面，要求開發人員透過獨立的線程機制處理非同步操作
wrong_answers:
  - UniFFI 無法處理複雜的資料類型，例如枚數和結構體，因此限制了行動版 API 介面的豐富性。
  - UniFFI 產生的綁定在跨語言界限時並不安全，需要手動記憶體管理。
  - UniFFI 不支援錯誤處理翻譯，迫使開發人員在每種目標語言中實作自訂的異常處理。
explanation: |
  UniFFI 最大的限制是它不支援非同步介面 - 所有產生的綁定都是同步的。這對行動開發造成挑戰，因為在行動開發中，回應式使用者介面是關鍵，開發人員必須實作自己的線程解決方案，以避免阻塞主線程。錯誤的答案是不正確的，因為 UniFFI 實際上擅長於處理複雜的類型，例如枚數與結構體，提供跨語言界限的自動記憶體安全遷移，並具有精密的錯誤處理轉換功能，可將 Rust 結果類型轉換為目標語言的原生異常模型。
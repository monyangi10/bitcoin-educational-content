question: 在使用 UniFFI 开发需要响应式用户界面的移动应用时，开发人员必须克服的主要限制是什么？
answer: UniFFI 仅支持同步接口，要求开发人员通过单独的线程机制处理异步操作
wrong_answers:
  - UniFFI 无法处理枚举和结构体等复杂数据类型，从而限制了移动 API 接口的丰富性
  - UniFFI 生成的绑定在跨语言边界时内存不安全，需要手动进行内存管理
  - UniFFI 不支持错误处理翻译，迫使开发人员在每种目标语言中实施自定义异常处理
explanation: |
  UniFFI 最大的局限是不支持异步接口--所有生成的绑定都是同步的。这给移动开发带来了挑战，因为在移动开发中，响应式用户界面至关重要，开发人员必须实施自己的线程解决方案，以避免阻塞主线程。错误的答案是不正确的，因为 UniFFI 擅长处理枚举和结构体等复杂类型，提供跨语言边界的自动内存安全编译，并具有复杂的错误处理翻译功能，可将 Rust 结果类型转换为目标语言的本地异常模型。
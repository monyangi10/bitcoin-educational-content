question: レスポンシブ・ユーザーインターフェースを必要とするモバイルアプリケーション開発にUniFFIを使用する場合、開発者が回避しなければならない主な制限は何ですか？
answer: UniFFIは同期インターフェイスのみをサポートしており、開発者は別のスレッド機構によって非同期操作を処理する必要がある。
wrong_answers:
  - UniFFIはenumやstructのような複雑なデータ型を扱えないため、モバイルAPIインターフェースの豊かさが制限される。
  - UniFFIは、言語境界を越えてメモリセーフではないバインディングを生成するため、手動でのメモリ管理が必要。
  - UniFFIはエラー処理の翻訳をサポートしていないため、開発者はターゲット言語ごとにカスタムの例外処理を実装する必要があります。
explanation: |
  UniFFIの最も大きな制限は、非同期インターフェースをサポートしていないことです。このため、レスポンシブUIが重要なモバイル開発では、メインスレッドのブロックを避けるために、開発者が独自のスレッド処理ソリューションを実装する必要があります。UniFFIは、enumやstructのような複雑な型の扱いに優れており、言語の境界を越えて自動的にメモリセーフなマーシャリングを提供し、Rustの結果型をターゲット言語のネイティブ例外モデルに変換する洗練されたエラー処理変換機能を備えているためです。
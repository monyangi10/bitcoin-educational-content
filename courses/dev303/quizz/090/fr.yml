question: Quelle est la principale limitation que les développeurs doivent contourner lorsqu'ils utilisent UniFFI pour le développement d'applications mobiles nécessitant des interfaces utilisateur réactives ?
answer: L'interface UniFFI ne prend en charge que les interfaces synchrones, ce qui oblige les développeurs à gérer les opérations asynchrones à l'aide de mécanismes de filtrage distincts
wrong_answers:
  - L'interface UniFFI ne peut pas gérer des types de données complexes comme les enums et les structures, ce qui limite la richesse des interfaces API mobiles
  - L'interface utilisateur génère des liaisons qui ne sont pas sûres sur le plan de la mémoire au-delà des frontières linguistiques, ce qui nécessite une gestion manuelle de la mémoire
  - L'interface utilisateur ne permet pas de traduire la gestion des erreurs, ce qui oblige les développeurs à mettre en œuvre une gestion des exceptions personnalisée dans chaque langue cible
explanation: |
  La limitation la plus importante de l'UniFFI est son manque de support pour les interfaces asynchrones - toutes les liaisons générées sont synchrones. Cela pose des problèmes pour le développement mobile où les interfaces utilisateur réactives sont essentielles, car les développeurs doivent mettre en œuvre leurs propres solutions de threading pour éviter de bloquer le thread principal. Les mauvaises réponses sont incorrectes car UniFFI excelle en fait dans la gestion de types complexes tels que les enums et les structs, fournit un marshaling automatique à sécurité mémoire à travers les frontières linguistiques, et dispose d'une traduction sophistiquée de la gestion des erreurs qui convertit les types Rust Result en modèles d'exception natifs pour les langages cibles.
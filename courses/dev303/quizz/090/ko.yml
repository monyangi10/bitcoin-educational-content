question: 반응형 사용자 인터페이스가 필요한 모바일 애플리케이션 개발에 UniFFI를 사용할 때 개발자가 해결해야 하는 주요 제한 사항은 무엇인가요?
answer: UniFFI는 동기식 인터페이스만 지원하므로 개발자는 별도의 스레딩 메커니즘을 통해 비동기식 작업을 처리해야 합니다
wrong_answers:
  - UniFFI는 열거형 및 구조체와 같은 복잡한 데이터 유형을 처리할 수 없으므로 모바일 API 인터페이스의 풍부함을 제한합니다
  - UniFFI는 언어 경계를 넘어 메모리 안전하지 않은 바인딩을 생성하므로 수동 메모리 관리가 필요합니다
  - UniFFI는 오류 처리 번역을 지원하지 않으므로 개발자는 각 대상 언어에서 사용자 지정 예외 처리를 구현해야 합니다
explanation: |
  비동기 인터페이스를 지원하지 않는다는 점, 즉 생성된 모든 바인딩이 동기식이라는 점이 UniFFI의 가장 큰 한계입니다. 따라서 개발자는 메인 스레드를 차단하지 않기 위해 자체 스레딩 솔루션을 구현해야 하므로 반응형 UI가 중요한 모바일 개발에는 어려움이 있습니다. UniFFI는 열거형 및 구조체와 같은 복잡한 유형을 처리하는 데 탁월하고, 언어 경계를 넘어 메모리 안전 자동 마샬링을 제공하며, Rust 결과 유형을 대상 언어의 기본 예외 모델로 변환하는 정교한 오류 처리 번역 기능을 갖추고 있으므로 오답은 틀린 답입니다.
question: Кое е основното ограничение, което разработчиците трябва да заобиколят, когато използват UniFFI за разработване на мобилни приложения, които изискват адаптивни потребителски интерфейси?
answer: UniFFI поддържа само синхронни интерфейси, което изисква от разработчиците да обработват асинхронни операции чрез отделни механизми за нишки
wrong_answers:
  - UniFFI не може да обработва сложни типове данни като enums и structs, което ограничава богатството на мобилните интерфейси API
  - UniFFI генерира връзки, които не са защитени откъм памет между езиковите граници, което изисква ръчно управление на паметта
  - UniFFI не поддържа превод на обработката на грешки, което принуждава разработчиците да прилагат персонализирана обработка на изключенията на всеки целеви език
explanation: |
  Най-същественото ограничение на UniFFI е липсата на поддръжка на асинхронни интерфейси - всички генерирани връзки са синхронни. Това създава предизвикателства при разработката на мобилни устройства, при които отзивчивите потребителски интерфейси са от решаващо значение, тъй като разработчиците трябва да приложат собствени решения за нишки, за да избегнат блокирането на основната нишка. Грешните отговори са неверни, защото UniFFI всъщност се справя отлично с обработката на сложни типове като енуми и структури, осигурява автоматично маршализиране, безопасно за паметта, през езиковите граници и има усъвършенстван превод за обработка на грешки, който преобразува Rust Result типове в местни модели на изключения за целевите езици.
question: ข้อจำกัดหลักที่นักพัฒนาต้องแก้ไขเมื่อใช้ UniFFI สำหรับการพัฒนาแอปพลิเคชันมือถือที่ต้องการอินเทอร์เฟซผู้ใช้ที่ตอบสนองคืออะไร?
answer: UniFFI รองรับเฉพาะอินเทอร์เฟซแบบซิงโครนัสเท่านั้น ทำให้นักพัฒนาต้องจัดการกับการดำเนินการแบบอะซิงโครนัสผ่านกลไกการใช้เธรดแยกต่างหาก
wrong_answers:
  - UniFFI ไม่สามารถจัดการกับประเภทข้อมูลที่ซับซ้อนเช่น enums และ structs ซึ่งจำกัดความหลากหลายของอินเทอร์เฟซ API บนมือถือ
  - UniFFI สร้าง bindings ที่ไม่ปลอดภัยต่อหน่วยความจำข้ามขอบเขตของภาษา ซึ่งต้องการการจัดการหน่วยความจำด้วยตนเอง
  - UniFFI ไม่รองรับการแปลการจัดการข้อผิดพลาด ทำให้นักพัฒนาต้องดำเนินการจัดการข้อยกเว้นที่กำหนดเองในแต่ละภาษาเป้าหมาย
explanation: |
  ข้อจำกัดที่สำคัญที่สุดของ UniFFI คือการขาดการสนับสนุนสำหรับอินเทอร์เฟซแบบอะซิงโครนัส - การผูกที่สร้างขึ้นทั้งหมดเป็นแบบซิงโครนัส สิ่งนี้สร้างความท้าทายสำหรับการพัฒนาแอปพลิเคชันบนมือถือที่ UI ที่ตอบสนองเป็นสิ่งสำคัญ เนื่องจากนักพัฒนาต้องใช้โซลูชันการจัดการเธรดของตนเองเพื่อหลีกเลี่ยงการบล็อกเธรดหลัก คำตอบที่ผิดนั้นไม่ถูกต้องเพราะ UniFFI นั้นยอดเยี่ยมในการจัดการประเภทที่ซับซ้อนเช่น enum และ struct ให้การจัดการหน่วยความจำที่ปลอดภัยโดยอัตโนมัติข้ามขอบเขตของภาษา และมีการแปลการจัดการข้อผิดพลาดที่ซับซ้อนซึ่งแปลงประเภทผลลัพธ์ Rust เป็นโมเดลข้อยกเว้นเนทีฟสำหรับภาษาที่เป็นเป้าหมาย
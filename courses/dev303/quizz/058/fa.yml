question: هنگام ایجاد یک ماکروی تابع‌مانند سفارشی که نیاز به مدیریت تعداد مختلفی از آرگومان‌های ورودی دارد، کدام ترکیب مشخص‌کننده قطعه و الگوی تکرار مناسب‌ترین خواهد بود؟
answer: از $($x:expr),* برای تطبیق صفر یا چندین عبارت که با کاما جدا شده‌اند استفاده کنید.
wrong_answers:
  - از $($x:ident)+ برای تطبیق یک یا چند شناسه بدون جداکننده‌ها استفاده کنید
  - از $($x:ty);* برای تطبیق صفر یا چند نوع جدا شده با نقطه ویرگول استفاده کنید
  - از $($x:expr)? برای تطبیق یک عبارت اختیاری منفرد بدون تکرار استفاده کنید
explanation: |
  الگوی $($x:expr),* به طور خاص برای ماکروهای آرگومان متغیر طراحی شده است، جایی که expr با هر عبارتی مطابقت دارد و نحو ,* صفر یا بیشتر تکرارها را که با کاما جدا شده‌اند، مدیریت می‌کند. این دقیقاً همان چیزی است که برای ماکروهایی مانند vec! که می‌توانند تعداد متغیری از آرگومان‌ها را بپذیرند، مورد نیاز است. گزینه‌های دیگر نادرست هستند زیرا: ident فقط با شناسه‌ها مطابقت دارد (نه عبارات کامل)، ty با انواع (نه مقادیر) مطابقت دارد، و ? با آیتم‌های تکی اختیاری به جای تکرارهای متغیر مطابقت دارد.
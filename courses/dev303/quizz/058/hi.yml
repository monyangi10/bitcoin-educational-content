question: जब आप एक कस्टम फ़ंक्शन-जैसे मैक्रो बना रहे हों जिसे अलग-अलग संख्या में इनपुट आर्गुमेंट को संभालने की आवश्यकता हो, तो कौन सा फ़्रैगमेंट स्पेसिफ़ायर और रिपीटीशन पैटर्न संयोजन सबसे उपयुक्त होगा?
answer: अल्पविराम से अलग किए गए शून्य या अधिक व्यंजकों का मिलान करने के लिए $($x:expr),* का उपयोग करें
wrong_answers:
  - बिना विभाजकों के एक या अधिक पहचानकर्ताओं का मिलान करने के लिए $($x:ident)+ का उपयोग करें।
  - सेमीकोलन द्वारा अलग किए गए शून्य या अधिक प्रकारों का मिलान करने के लिए $($x:ty);* का उपयोग करें।
  - बिना दोहराव वाले वैकल्पिक एकल व्यंजक से मिलान करने के लिए $($x:expr)? का उपयोग करें।
explanation: |
  पैटर्न $($x:expr),* विशेष रूप से वेरिएबल आर्गुमेंट मैक्रोज़ के लिए डिज़ाइन किया गया है, जहाँ expr किसी भी एक्सप्रेशन से मेल खाता है और ,* सिंटैक्स अल्पविराम से अलग किए गए शून्य या अधिक पुनरावृत्तियों को संभालता है। यह ठीक वही है जिसकी आवश्यकता vec! जैसे मैक्रोज़ के लिए होती है जो अलग-अलग संख्या में आर्गुमेंट स्वीकार कर सकते हैं। अन्य विकल्प गलत हैं क्योंकि: ident केवल पहचानकर्ताओं से मेल खाता है (पूर्ण एक्सप्रेशन से नहीं), ty प्रकारों से मेल खाता है (मानों से नहीं), और ? वैकल्पिक एकल आइटमों से मेल खाता है न कि वेरिएबल पुनरावृत्तियों से।
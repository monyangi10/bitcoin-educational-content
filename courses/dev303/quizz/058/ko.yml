question: 다양한 수의 입력 인수를 처리해야 하는 사용자 지정 함수형 매크로를 만들 때 어떤 조각 지정자와 반복 패턴 조합이 가장 적합할까요?
answer: 쉼표로 구분된 0개 이상의 표현식을 일치시키려면 $($x:expr),*를 사용합니다
wrong_answers:
  - 구분 기호 없이 하나 이상의 식별자를 일치시키려면 $($x:ident)+를 사용합니다
  - 세미콜론으로 구분된 0개 이상의 유형을 일치시키려면 $($x:ty);*를 사용합니다
  - 반복되지 않는 선택적 단일 표현식을 일치시키려면 $($x:expr)? 를 사용합니다
explanation: |
  ($x:expr),* 패턴은 가변 인수 매크로를 위해 특별히 설계되었으며, 여기서 expr은 모든 표현식과 일치하고 ,* 구문은 쉼표로 구분된 0개 이상의 반복을 처리합니다. 이는 다양한 수의 인수를 허용할 수 있는 vec! 같은 매크로에 꼭 필요한 기능입니다. 다른 옵션은 식별자(전체 표현식이 아닌)와만 일치하고, ty는 유형(값이 아닌)과 일치하며, ? 은 변수 반복이 아닌 선택적 단일 항목과 일치하므로 올바르지 않습니다.
question: Когато създавате персонализиран макрос, подобен на функция, който трябва да обработва различен брой входни аргументи, коя комбинация от спецификатор на фрагмента и шаблон за повторение би била най-подходяща?
answer: Използвайте $($x:expr),*, за да съответствате на нула или повече изрази, разделени със запетаи
wrong_answers:
  - Използвайте $($x:ident)+ за съвпадение с един или повече идентификатори без разделители
  - Използвайте $($x:ty);*, за да съответствате на нула или повече типове, разделени с точка и запетая
  - Използвайте $($x:expr)?, за да съответствате на незадължителен единичен израз без повторение
explanation: |
  Шаблонът $($x:expr),* е специално разработен за макроси с променливи аргументи, където expr съответства на всеки израз, а синтаксисът ,* позволява да се използват нула или повече повторения, разделени със запетаи. Това е точно това, което е необходимо за макроси като vec!, които могат да приемат различен брой аргументи. Другите опции са неправилни, защото: ident съвпада само с идентификатори (не с пълни изрази), ty съвпада с типове (не със стойности), а ? съвпада с незадължителни единични елементи, а не с повторения на променливи.
question: При создании пользовательского функциональноподобного макроса, который должен обрабатывать различное количество входных аргументов, какая комбинация спецификатора фрагмента и шаблона повторения будет наиболее подходящей?
answer: Используйте $($x:expr),* для соответствия нулю или нескольким выражениям, разделенным запятыми
wrong_answers:
  - Используйте $($x:ident)+ для соответствия одному или нескольким идентификаторам без разделителей
  - Используйте $($x:ty);* для соответствия нулю или нескольким типам, разделенным точками с запятой
  - Используйте $($x:expr)? для соответствия необязательному одиночному выражению без повторений
explanation: |
  Шаблон $($x:expr),* специально разработан для макросов с переменным аргументом, где expr соответствует любому выражению, а синтаксис ,* обрабатывает ноль или более повторений, разделенных запятыми. Это именно то, что нужно для макросов типа vec!, которые могут принимать различное количество аргументов. Остальные варианты неверны, поскольку: ident соответствует только идентификаторам (не полным выражениям), ty соответствует типам (не значениям), а ? соответствует необязательным одиночным элементам, а не повторениям переменных.
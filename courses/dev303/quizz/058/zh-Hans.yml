question: 在创建需要处理不同数量输入参数的自定义函数式宏时，哪种片段指定符和重复模式组合最合适？
answer: 使用$($x:expr),*来匹配由逗号分隔的零个或多个表达式
wrong_answers:
  - 使用 $(x:ident)+ 来匹配一个或多个不带分隔符的标识符
  - 使用 $($x:ty);* 来匹配由分号分隔的零个或多个类型
  - 使用$($x:expr)?匹配不重复的可选单一表达式
explanation: |
  模式 $($x:expr),* 专为可变参数宏而设计，其中 expr 可匹配任何表达式，而 ,* 语法可处理零个或多个由逗号分隔的重复表达式。这正是像 vec! 这样可以接受不同数量参数的宏所需要的。其他选项都不正确，因为：ident 只匹配标识符（而不是完整表达式），ty 匹配类型（而不是值），? 匹配可选的单项而不是变量重复。
question: เมื่อสร้างแมโครที่มีลักษณะคล้ายฟังก์ชันซึ่งจำเป็นต้องจัดการกับจำนวนอาร์กิวเมนต์ที่แตกต่างกัน ควรใช้การผสมผสานระหว่างตัวระบุส่วนและรูปแบบการทำซ้ำใดที่เหมาะสมที่สุด?
answer: ใช้ $($x:expr),* เพื่อจับคู่ศูนย์หรือมากกว่าของนิพจน์ที่คั่นด้วยเครื่องหมายจุลภาค
wrong_answers:
  - ใช้ $($x:ident)+ เพื่อจับคู่ตัวระบุหนึ่งตัวหรือมากกว่าโดยไม่มีตัวคั่น
  - ใช้ $($x:ty);* เพื่อจับคู่ประเภทศูนย์หรือมากกว่าที่คั่นด้วยเครื่องหมายอัฒภาค
  - ใช้ $($x:expr)? เพื่อจับคู่กับนิพจน์เดี่ยวที่เป็นทางเลือกโดยไม่มีการทำซ้ำ
explanation: |
  รูปแบบ $($x:expr),* ถูกออกแบบมาโดยเฉพาะสำหรับแมโครที่มีอาร์กิวเมนต์แบบแปรผัน ซึ่ง expr จะจับคู่กับนิพจน์ใด ๆ และไวยากรณ์ ,* จะจัดการกับการทำซ้ำศูนย์ครั้งหรือมากกว่าที่คั่นด้วยเครื่องหมายจุลภาค นี่คือสิ่งที่จำเป็นสำหรับแมโครอย่าง vec! ที่สามารถรับจำนวนอาร์กิวเมนต์ที่แตกต่างกันได้ ตัวเลือกอื่น ๆ ไม่ถูกต้องเพราะ: ident จับคู่ได้เฉพาะตัวระบุ (ไม่ใช่นิพจน์เต็ม), ty จับคู่ประเภท (ไม่ใช่ค่า), และ ? จับคู่กับรายการเดี่ยวที่เป็นทางเลือกแทนที่จะเป็นการทำซ้ำแบบแปรผัน
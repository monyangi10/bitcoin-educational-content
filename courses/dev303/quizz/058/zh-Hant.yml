question: 當建立類似函數的自訂巨集，需要處理不同數量的輸入參數時，哪個片段指定符和重複模式組合最為適當？
answer: 使用$($x:expr),*來匹配以逗號分隔的零個或多個表達式
wrong_answers:
  - 使用 $($x:ident)+ 來匹配一個或多個不帶分隔符的識別碼
  - 使用$($x:ty);*匹配以分號分隔的零個或多個類型
  - 使用$($x:expr)?來匹配沒有重複的可選單個表達式
explanation: |
  模式 $($x:expr),* 是專為可變參數巨集設計的，其中 expr 可以匹配任何表達式，而 ,* 語法可以處理零個或多個以逗號分隔的重複。這正是像 vec! 這樣可以接受不同數量參數的巨集所需要的。其他選項是不正確的，因為：ident 只會匹配識別符 (而非完整的表達式)，ty 會匹配類型 (而非值)，而 ? 會匹配可選的單項而非變數重複。
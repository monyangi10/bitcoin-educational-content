question: 異なる数の入力引数を処理する必要があるカスタム関数のようなマクロを作成する場合、どのフラグメント指定子と繰り返しパターンの組み合わせが最も適切でしょうか？
answer: カンマで区切られた0個以上の式にマッチさせるには $($x:expr),* を使う。
wrong_answers:
  - 1つ以上の識別子をセパレータなしでマッチさせるには$($x:ident)+を使う。
  - セミコロンで区切られた0個以上の型にマッチさせるには$($x:ty);*を使う。
  - 繰り返しのないオプションの単一表現にマッチさせるには$($x:expr)?
explanation: |
  パターン$($x:expr),*は特に可変引数マクロ用に設計されており、exprは任意の式にマッチし、,*構文はカンマで区切られたゼロ以上の繰り返しを扱う。これは、vec！のような、さまざまな数の引数を受け付けるマクロに必要なものです。identは（完全な式ではなく）識別子にのみマッチし、tyは（値ではなく）型にマッチし、?
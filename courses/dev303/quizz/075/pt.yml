question: Qual é a principal vantagem da utilização dos métodos map() e map_err() nos tipos Result em comparação com os padrões tradicionais de tratamento de erros try-catch?
answer: Permitem o encadeamento de operações ao estilo funcional, mantendo o tratamento de erros próximo das operações que podem falhar
wrong_answers:
  - Convertem automaticamente todos os tipos de erro em mensagens de cadeia de caracteres para facilitar a depuração e a visualização pelo utilizador
  - Eliminam a necessidade do operador de ponto de interrogação, fornecendo mecanismos de propagação de erros incorporados
  - Evitam situações de pânico, envolvendo todas as operações potencialmente falhadas em contentores de resultados seguros
explanation: |
  Os métodos map() e map_err() permitem o tratamento de erros no estilo funcional, onde é possível encadear operações e transformar valores ou erros no ponto em que eles ocorrem. Isso mantém a lógica de tratamento de erros próxima às operações que podem falhar, ao contrário dos blocos try-catch, onde o tratamento de erros é separado das operações reais. As outras opções estão incorrectas: os métodos map não convertem os erros em strings (esse é o papel do anyhow), funcionam juntamente com o operador de ponto de interrogação em vez de o substituírem e não evitam panics, mas fornecem um tratamento de erros estruturado para os resultados.
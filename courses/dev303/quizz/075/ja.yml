question: Result型でmap()メソッドとmap_err()メソッドを使うことの、従来のtry-catchエラー処理パターンと比較した場合の主な利点は何ですか？
answer: エラー処理を失敗する可能性のある操作の近くに保ちながら、関数型スタイルの操作の連鎖を可能にする。
wrong_answers:
  - デバッグやユーザー表示を容易にするために、すべてのエラータイプを自動的に文字列メッセージに変換します。
  - 組み込みのエラー伝播メカニズムを提供することで、クエスチョンマーク演算子の必要性を排除している。
  - 失敗する可能性のあるすべての操作を安全な結果コンテナでラップすることにより、パニック状態を防止する。
explanation: |
  map()メソッドとmap_err()メソッドは、関数型のエラー処理を可能にし、操作を連鎖させ、発生した時点で値やエラーを変換することができる。エラー処理が実際の処理から切り離される try-catch ブロックとは異なり、 エラー処理ロジックを失敗する可能性のある処理に近づけることができます。マップメソッドはエラーを文字列に変換せず（これはanyhowの役割です）、クエスチョンマーク演算子を置き換えるのではなく、クエスチョンマーク演算子と一緒に働きます。
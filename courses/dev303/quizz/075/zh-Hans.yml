question: 与传统的 try-catch 错误处理模式相比，在结果类型上使用 map() 和 map_err() 方法的主要优势是什么？
answer: 它们允许函数式的操作链，同时使错误处理靠近可能失败的操作
wrong_answers:
  - 它们会自动将所有错误类型转换为字符串信息，以方便调试和用户显示
  - 它们通过提供内置错误传播机制，消除了对问号运算符的需求
  - 它们将所有可能失效的操作封装在安全 Result 容器中，从而防止出现恐慌情况
explanation: |
  map() 和 map_err()方法支持函数式错误处理，可以在错误发生时直接进行链式操作并转换值或错误。这使得错误处理逻辑靠近可能失败的操作，而不像 try-catch 块那样将错误处理与实际操作分开。其他选项都不正确：map 方法不会将错误转换为字符串（这是 anyhow 的职责），它们与问号操作符一起工作，而不是取而代之，而且它们不会防止恐慌，而是为 Results 提供结构化的错误处理。
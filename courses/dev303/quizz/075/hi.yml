question: पारंपरिक ट्राई-कैच त्रुटि प्रबंधन पैटर्न की तुलना में रिजल्ट प्रकारों पर map() और map_err() विधियों का उपयोग करने का प्राथमिक लाभ क्या है?
answer: ये कार्यात्मक शैली में संक्रियाओं की श्रृंखला बनाने की अनुमति देते हैं, साथ ही त्रुटि प्रबंधन को उन संक्रियाओं के करीब रखते हैं जिनमें विफलता की संभावना हो सकती है।
wrong_answers:
  - ये स्वचालित रूप से सभी प्रकार की त्रुटियों को स्ट्रिंग संदेशों में परिवर्तित कर देते हैं, जिससे डिबगिंग और उपयोगकर्ता प्रदर्शन आसान हो जाता है।
  - वे अंतर्निहित त्रुटि प्रसार तंत्र प्रदान करके प्रश्न चिह्न ऑपरेटर की आवश्यकता को समाप्त कर देते हैं।
  - वे संभावित रूप से विफल होने वाली सभी प्रक्रियाओं को सुरक्षित परिणाम कंटेनरों में लपेटकर घबराहट की स्थिति को रोकते हैं।
explanation: |
  map() और map_err() विधियाँ कार्यात्मक-शैली त्रुटि प्रबंधन को सक्षम बनाती हैं, जहाँ आप संक्रियाओं को श्रृंखलाबद्ध कर सकते हैं और त्रुटियों या मानों को ठीक उसी स्थान पर रूपांतरित कर सकते हैं जहाँ वे घटित होती हैं। यह त्रुटि प्रबंधन तर्क को उन संक्रियाओं के निकट रखता है जो विफल हो सकती हैं, try-catch ब्लॉकों के विपरीत जहाँ त्रुटि प्रबंधन वास्तविक संक्रियाओं से अलग होता है। अन्य विकल्प गलत हैं: map विधियाँ त्रुटियों को स्ट्रिंग में परिवर्तित नहीं करतीं (यह कार्य तो `map_err` का है), वे प्रश्न चिह्न ऑपरेटर के साथ कार्य करती हैं न कि उसे प्रतिस्थापित करती हैं, और वे पैनिक को रोकती नहीं हैं बल्कि परिणामों के लिए संरचित त्रुटि प्रबंधन प्रदान करती हैं।
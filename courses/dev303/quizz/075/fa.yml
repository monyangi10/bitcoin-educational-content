question: مزیت اصلی استفاده از متدهای map() و map_err() بر روی انواع Result در مقایسه با الگوهای سنتی مدیریت خطا با try-catch چیست؟
answer: آن‌ها اجازه می‌دهند که عملیات به سبک تابعی زنجیره‌ای شوند در حالی که مدیریت خطا را نزدیک به عملیات‌هایی که ممکن است شکست بخورند نگه می‌دارند.
wrong_answers:
  - آن‌ها به‌طور خودکار همه انواع خطا را به پیام‌های رشته‌ای تبدیل می‌کنند تا اشکال‌زدایی و نمایش به کاربر آسان‌تر شود.
  - آن‌ها با ارائه مکانیزم‌های انتشار خطای داخلی، نیاز به عملگر علامت سوال را از بین می‌برند.
  - آن‌ها با قرار دادن تمام عملیات‌هایی که ممکن است شکست بخورند در کانتینرهای ایمن Result، از شرایط وحشت جلوگیری می‌کنند.
explanation: |
  متدهای map() و map_err() امکان مدیریت خطا به سبک تابعی را فراهم می‌کنند، جایی که می‌توانید عملیات را زنجیره کنید و مقادیر یا خطاها را درست در نقطه‌ای که رخ می‌دهند، تغییر دهید. این کار منطق مدیریت خطا را نزدیک به عملیاتی که ممکن است شکست بخورند نگه می‌دارد، برخلاف بلوک‌های try-catch که در آن مدیریت خطا از عملیات واقعی جدا شده است. گزینه‌های دیگر نادرست هستند: متدهای map خطاها را به رشته تبدیل نمی‌کنند (این نقش anyhow است)، آن‌ها در کنار عملگر سوالی کار می‌کنند و جایگزین آن نمی‌شوند، و آن‌ها از وقوع panics جلوگیری نمی‌کنند بلکه مدیریت خطای ساختاریافته برای نتایج را فراهم می‌کنند.
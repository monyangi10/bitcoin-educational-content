question: 與傳統的 try-catch 錯誤處理模式相比，在 Result 類型上使用 map() 和 map_err() 方法的主要優勢是什麼？
answer: 它們允許功能式的操作鏈，同時讓錯誤處理靠近可能失敗的操作
wrong_answers:
  - 它們會自動將所有錯誤類型轉換為字串訊息，以方便除錯和使用者顯示
  - 它們透過提供內建錯誤傳播機制，消除了對問號運算符的需求
  - 它們會將所有可能失敗的作業包裝在安全 Result 容器中，以防止恐慌情況發生。
explanation: |
  map() 和 map_err()方法啟用了函式式錯誤處理，您可以在發生錯誤時直接鏈結操作和轉換值或錯誤。這讓錯誤處理邏輯靠近可能失敗的操作，不像 try-catch 區塊，錯誤處理與實際操作分開。其他選項是不正確的：map 方法不會將錯誤轉換為字串 (那是 anyhow 的角色)，它們與問號運算符一起工作，而不是取代它，而且它們不會防止恐慌，而是為 Results 提供結構化的錯誤處理。
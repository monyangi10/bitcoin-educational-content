question: 기존의 try-catch 오류 처리 패턴과 비교하여 결과 유형에 map() 및 map_err() 메서드를 사용하면 어떤 주요 이점이 있나요?
answer: 오류 처리를 실패할 수 있는 작업에 가깝게 유지하면서 기능적 스타일의 작업 연쇄를 허용합니다
wrong_answers:
  - 모든 오류 유형을 문자열 메시지로 자동 변환하여 디버깅 및 사용자 표시를 용이하게 합니다
  - 내장된 오류 전파 메커니즘을 제공하여 물음표 연산자가 필요하지 않습니다
  - 잠재적으로 실패할 수 있는 모든 작업을 안전한 결과 컨테이너에 담아 패닉 상태를 방지합니다
explanation: |
  Map() 및 map_err() 메서드를 사용하면 연산을 연결하고 값이나 오류가 발생하는 지점에서 바로 변환할 수 있는 함수형 오류 처리가 가능합니다. 이렇게 하면 오류 처리가 실제 연산과 분리되어 있는 try-catch 블록과 달리 오류 처리 로직이 실패할 수 있는 연산에 가깝게 유지됩니다. 맵 메서드는 오류를 문자열로 변환하지 않으며(이는 어쨌든 이 메서드의 역할입니다), 물음표 연산자를 대체하는 것이 아니라 함께 작동하며, 패닉을 방지하는 것이 아니라 결과에 대한 구조화된 오류 처리를 제공한다는 점에서 다른 옵션은 올바르지 않습니다.
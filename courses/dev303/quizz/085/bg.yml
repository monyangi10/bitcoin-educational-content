question: Когато дефинирате интерфейси за обратна връзка в UniFFI, какви допълнителни граници на чертата Rust обикновено се изискват за чертата за обратна връзка, за да се осигури безопасно извикване на различни езици?
answer: Изискват се граници за изпращане и синхронизиране, тъй като обратните повиквания могат да пресичат границите на нишките между Rust и целевите езици
wrong_answers:
  - Необходими са граници за клониране и копиране, за да могат данните за обратната връзка да се дублират между езиците
  - Необходими са граници за Debug и Display, за да се даде възможност за правилно отчитане на грешките, когато обратните извиквания се провалят по време на изпълнението
  - Границите Serialize и Deserialize са необходими за преобразуване на параметрите на обратната връзка между различни езикови среди
explanation: |
  Интерфейсите за обратна връзка в UniFFI изискват граници Send и Sync, тъй като те позволяват двупосочна комуникация, при която кодът на Rust се обръща към кода на приложението, написан на целевите езици. Тъй като тези обратни повиквания могат да пресичат границите на нишките по време на изпълнение, типовата система на Rust изисква Send (безопасно прехвърляне между нишките) и Sync (безопасно споделяне на препратки между нишките) граници, за да се гарантира безопасността на паметта. Другите варианти са неправилни: Clone/Copy не са необходими за междуезикови извиквания, Debug/Display са за форматиране, а не за безопасност, а Serialize/Deserialize се обработват автоматично от маршализиращата система на UniFFI.
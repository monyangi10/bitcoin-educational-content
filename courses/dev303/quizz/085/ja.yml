question: UniFFIでコールバックインタフェースを定義する場合、言語間の安全な呼び出しを保証するために、コールバック形質には通常どのようなRust形質境界が追加されますか？
answer: コールバックがRustとターゲット言語間のスレッド境界を越える可能性があるため、送信と同期の境界が必要である。
wrong_answers:
  - クローンとコピーの境界は、コールバック・データを言語境界を越えて複製できるようにするために必要である。
  - 実行中にコールバックが失敗したときに適切なエラー報告を行うには、デバッグ境界と表示境界が必要です。
  - シリアライズとデシリアライズの境界は、異なる言語ランタイム間でコールバック・パラメータをマーシャライズするために必要です。
explanation: |
  UniFFIのコールバックインターフェースは、Rustのコードがターゲット言語で書かれたアプリケーションコードをコールバックする双方向通信を可能にするため、Send境界とSync境界を必要とします。これらのコールバックは実行中にスレッド境界を越えるかもしれないので、Rustの型システムはメモリ安全を保証するためにSend（スレッド間の転送が安全）とSync（スレッド間の参照共有が安全）境界を必要とします。他の選択肢は間違っています：Clone/Copyは言語間の呼び出しには必要なく、Debug/Displayは安全性ではなくフォーマットのためであり、Serialize/DeserializeはUniFFIのマーシャリングシステムによって自動的に処理されます。
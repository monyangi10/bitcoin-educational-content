question: UniFFI에서 콜백 인터페이스를 정의할 때 안전한 언어 간 호출을 보장하기 위해 일반적으로 콜백 특성에서 어떤 추가 Rust 특성 바운드가 필요하나요?
answer: 콜백이 Rust과 대상 언어 간의 스레드 경계를 넘을 수 있으므로 보내기 및 동기화 바운드가 필요합니다
wrong_answers:
  - 언어 경계를 넘어 콜백 데이터를 복제하려면 복제 및 복사 바운드가 필요합니다
  - 디버그 및 표시 바운드는 실행 중 콜백이 실패할 때 적절한 오류 보고를 활성화하는 데 필요합니다
  - 서로 다른 언어 런타임 간에 콜백 매개변수를 마샬링하려면 직렬화 및 역직렬화 바운드가 필요합니다
explanation: |
  UniFFI의 콜백 인터페이스는 Rust 코드가 대상 언어로 작성된 애플리케이션 코드에 다시 호출하는 양방향 통신을 가능하게 하므로 Send 및 Sync 바운드가 필요합니다. 이러한 콜백은 실행 중에 스레드 경계를 넘을 수 있으므로 Rust의 유형 시스템에서는 메모리 안전을 보장하기 위해 Send(스레드 간 전송에 안전) 및 Sync(스레드 간 참조 공유에 안전) 바운드를 요구합니다. 다른 옵션은 올바르지 않습니다: Clone/Copy는 언어 간 호출에 필요하지 않으며, Debug/Display는 안전이 아닌 포맷을 위한 것이고, Serialize/Deserialize는 UniFFI의 마샬링 시스템에 의해 자동으로 처리됩니다.
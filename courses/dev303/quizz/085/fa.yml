question: هنگام تعریف رابط‌های callback در UniFFI، چه محدودیت‌های اضافی Rust معمولاً بر روی trait callback لازم است تا از فراخوانی ایمن بین زبان‌ها اطمینان حاصل شود؟
answer: ارسال و همگام‌سازی محدودیت‌ها لازم است زیرا بازخوردها ممکن است مرزهای رشته‌ای بین Rust و زبان‌های هدف را عبور کنند.
wrong_answers:
  - کلون و کپی محدودیت‌ها برای اجازه دادن به داده‌های بازگشتی برای تکثیر در مرزهای زبانی مورد نیاز است.
  - اشکال‌زدایی و نمایش حدود برای فعال‌سازی گزارش‌دهی صحیح خطا زمانی که فراخوانی‌های بازگشتی در حین اجرا شکست می‌خورند، ضروری است.
  - سریال‌سازی و دی‌سریال‌سازی محدودیت‌ها برای انتقال پارامترهای بازگشتی بین محیط‌های اجرایی زبان‌های مختلف ضروری هستند.
explanation: |
  رابط‌های بازگشتی در UniFFI نیاز به محدودیت‌های Send و Sync دارند زیرا آن‌ها ارتباط دوطرفه‌ای را امکان‌پذیر می‌سازند که در آن کد Rust به کد برنامه نوشته‌شده در زبان‌های هدف بازمی‌گردد. از آنجا که این بازگشت‌ها ممکن است در طول اجرا از مرزهای رشته‌ای عبور کنند، سیستم نوع Rust نیاز به محدودیت‌های Send (ایمن برای انتقال بین رشته‌ها) و Sync (ایمن برای به اشتراک‌گذاری ارجاعات بین رشته‌ها) دارد تا ایمنی حافظه را تضمین کند. گزینه‌های دیگر نادرست هستند: Clone/Copy برای تماس‌های بین‌زبانی لازم نیستند، Debug/Display برای قالب‌بندی هستند نه ایمنی، و Serialize/Deserialize به‌طور خودکار توسط سیستم مارشالینگ UniFFI مدیریت می‌شوند.
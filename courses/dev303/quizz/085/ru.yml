question: При определении интерфейсов обратного вызова в UniFFI какие дополнительные границы черты Rust обычно требуются для черты обратного вызова, чтобы обеспечить безопасность межъязыковых вызовов?
answer: Границы отправки и синхронизации необходимы, поскольку обратные вызовы могут пересекать границы потоков между Rust и целевым языком
wrong_answers:
  - Границы Clone и Copy необходимы для того, чтобы данные обратного вызова можно было дублировать через границы языка
  - Границы отладки и отображения необходимы для правильного сообщения об ошибках, когда обратные вызовы не работают во время выполнения
  - Границы Serialize и Deserialize необходимы для передачи параметров обратного вызова между различными языковыми средами исполнения
explanation: |
  Интерфейсы обратных вызовов в UniFFI требуют ограничений Send и Sync, поскольку они обеспечивают двунаправленную связь, когда код Rust обращается к коду приложений, написанных на целевых языках. Поскольку эти обратные вызовы могут пересекать границы потоков во время выполнения, система типов Rust требует границ Send (безопасная передача между потоками) и Sync (безопасный обмен ссылками между потоками) для обеспечения безопасности памяти. Остальные варианты неверны: Clone/Copy не нужны для межъязыковых вызовов, Debug/Display нужны для форматирования, а не для безопасности, а Serialize/Deserialize обрабатываются автоматически системой маршалинга UniFFI.
question: 在 UniFFI 中定义回调接口时，为了确保安全的跨语言调用，回调特质通常还需要哪些 Rust 特质边界？
answer: 由于回调可能会跨越 Rust 和目标语言之间的线程边界，因此需要发送和同步边界
wrong_answers:
  - 需要克隆和复制边界，以便跨语言边界复制回调数据
  - 需要调试和显示边界，以便在执行过程中回调失败时进行适当的错误报告
  - 需要序列化和反序列化边界，以便在不同语言运行时之间传递回调参数
explanation: |
  UniFFI 中的回调接口需要 "发送 "和 "同步 "边界，因为它们实现了双向通信，即 Rust 代码调用目标语言编写的应用程序代码。由于这些回调在执行过程中可能会跨越线程边界，因此 Rust 的类型系统需要 Send（线程间安全传输）和 Sync（线程间安全共享引用）边界来确保内存安全。其他选项都是错误的：跨语言调用不需要克隆/拷贝，调试/显示是为了格式化而不是安全，序列化/反序列化由 UniFFI 的 marshaling 系统自动处理。
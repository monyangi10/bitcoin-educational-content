question: UniFFI में कॉलबैक इंटरफेस को परिभाषित करते समय, सुरक्षित क्रॉस-लैंग्वेज इनवोकेशन सुनिश्चित करने के लिए कॉलबैक ट्रेट पर आमतौर पर कौन सी अतिरिक्त Rust ट्रेट सीमाएं आवश्यक होती हैं?
answer: सेंड और सिंक बाउंड्स आवश्यक हैं क्योंकि कॉलबैक Rust और लक्ष्य भाषाओं के बीच थ्रेड सीमाओं को पार कर सकते हैं।
wrong_answers:
  - भाषा सीमाओं के पार कॉलबैक डेटा को डुप्लिकेट करने की अनुमति देने के लिए क्लोन और कॉपी सीमाएँ आवश्यक हैं।
  - निष्पादन के दौरान कॉलबैक विफल होने पर उचित त्रुटि रिपोर्टिंग सक्षम करने के लिए डिबग और डिस्प्ले बाउंड्स आवश्यक हैं।
  - विभिन्न भाषा रनटाइम के बीच कॉलबैक पैरामीटर को मार्शल करने के लिए सीरियलाइज़ और डीसीरियलाइज़ बाउंड की आवश्यकता होती है।
explanation: |
  UniFFI में कॉलबैक इंटरफेस के लिए Send और Sync बाउंड्स आवश्यक हैं क्योंकि ये द्विदिशात्मक संचार को सक्षम बनाते हैं, जहां Rust कोड लक्ष्य भाषाओं में लिखे गए एप्लिकेशन कोड को वापस कॉल करता है। चूंकि ये कॉलबैक निष्पादन के दौरान थ्रेड सीमाओं को पार कर सकते हैं, इसलिए Rust की टाइप प्रणाली मेमोरी सुरक्षा सुनिश्चित करने के लिए Send (थ्रेड्स के बीच सुरक्षित स्थानांतरण) और Sync (थ्रेड्स के बीच संदर्भों को सुरक्षित रूप से साझा करना) बाउंड्स की आवश्यकता होती है। अन्य विकल्प गलत हैं: क्रॉस-लैंग्वेज कॉल के लिए Clone/Copy की आवश्यकता नहीं है, Debug/Display फॉर्मेटिंग के लिए हैं, सुरक्षा के लिए नहीं, और Serialize/Deserialize को UniFFI की मार्शलिंग प्रणाली द्वारा स्वचालित रूप से नियंत्रित किया जाता है।
question: เมื่อกำหนด callback interfaces ใน UniFFI, ข้อจำกัดของ Rust trait ที่เพิ่มเติมที่มักจะต้องการบน callback trait เพื่อให้แน่ใจว่าการเรียกข้ามภาษาเป็นไปอย่างปลอดภัยคืออะไร?
answer: ส่งและซิงค์ขอบเขตเป็นสิ่งจำเป็นเนื่องจากการเรียกกลับอาจข้ามขอบเขตเธรดระหว่าง Rust และภาษาที่เป็นเป้าหมาย
wrong_answers:
  - โคลนและคัดลอกขอบเขตจำเป็นต้องมีเพื่อให้ข้อมูลการเรียกกลับสามารถทำซ้ำข้ามขอบเขตภาษาได้
  - การดีบักและแสดงขอบเขตเป็นสิ่งจำเป็นเพื่อเปิดใช้งานการรายงานข้อผิดพลาดที่เหมาะสมเมื่อการเรียกกลับล้มเหลวระหว่างการดำเนินการ
  - การทำให้เป็นอนุกรมและการยกเลิกการทำให้เป็นอนุกรมขอบเขตเป็นสิ่งจำเป็นในการจัดการพารามิเตอร์การเรียกกลับระหว่างรันไทม์ของภาษาที่แตกต่างกัน
explanation: |
  อินเทอร์เฟซ Callback ใน UniFFI ต้องการขอบเขต Send และ Sync เพราะพวกมันเปิดใช้งานการสื่อสารแบบสองทิศทางที่โค้ด Rust เรียกกลับไปยังโค้ดแอปพลิเคชันที่เขียนในภาษาปลายทาง เนื่องจากการเรียกกลับเหล่านี้อาจข้ามขอบเขตเธรดระหว่างการดำเนินการ ระบบประเภทของ Rust จึงต้องการขอบเขต Send (ปลอดภัยในการถ่ายโอนระหว่างเธรด) และ Sync (ปลอดภัยในการแชร์การอ้างอิงระหว่างเธรด) เพื่อให้แน่ใจว่าหน่วยความจำปลอดภัย ตัวเลือกอื่นๆ ไม่ถูกต้อง: Clone/Copy ไม่จำเป็นสำหรับการเรียกข้ามภาษา, Debug/Display ใช้สำหรับการจัดรูปแบบไม่ใช่ความปลอดภัย, และ Serialize/Deserialize ถูกจัดการโดยอัตโนมัติโดยระบบ marshaling ของ UniFFI
question: Rustメソッドが、呼び出し元が所有権を保持したまま構造体のインスタンスを変更する必要がある場合、どのパラメータ・タイプを使うべきか？
answer: "&mutセルフ"
wrong_answers:
  - "&self"
  - 自己
  - mut self
explanation: |
  呼び出し元が所有権を保持したまま構造体のインスタンスを変更する必要があるメソッドは、最初のパラメータとして `&mut self` を使用する必要がある。これはインスタンスへの変更可能な参照を作成し、メソッドが呼び出し元から所有権を奪うことなく構造体のフィールドを変更できるようにする。self`はインスタンスを完全に消費してしまうし、`mut self`はメソッドのパラメータとして有効なRustの構文ではない。
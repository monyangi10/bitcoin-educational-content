question: Кой тип параметър трябва да използва методът Rust, ако трябва да модифицира екземпляра на структурата, като позволява на викащия да запази собствеността?
answer: "&mut self"
wrong_answers:
  - "&self"
  - самостоятелно
  - mut self
explanation: |
  Методите, които трябва да модифицират екземпляр на структура, като позволяват на викащия да запази собствеността си, трябва да използват `&mut self` като първи параметър. Това създава променлива референция към инстанцията, което позволява на метода да променя полетата на структурата, без да отнема собствеността на викащия. Използването на `&self` ще позволи само четене на инстанцията, `self` ще консумира изцяло инстанцията, а `mut self` не е валиден синтаксис на Rust за параметри на методи.
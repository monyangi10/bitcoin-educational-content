question: ควรใช้ประเภทพารามิเตอร์ใดสำหรับวิธี Rust หากจำเป็นต้องแก้ไขอินสแตนซ์โครงสร้างในขณะที่อนุญาตให้ผู้เรียกยังคงเป็นเจ้าของ?
answer: "&mut self"
wrong_answers:
  - "&self"
  - ตัวเอง
  - mut self
explanation: |
  Methods that need to modify a structure instance while allowing the caller to retain ownership should use `&mut self` as their first parameter. This creates a mutable reference to the instance, enabling the method to change the structure's fields without taking ownership away from the caller. Using `&self` would only allow reading the instance, `self` would consume the instance entirely, and `mut self` is not valid Rust syntax for method parameters.
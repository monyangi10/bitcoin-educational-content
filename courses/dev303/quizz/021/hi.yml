question: यदि किसी Rust विधि को संरचना इंस्टेंस को संशोधित करने की आवश्यकता है, जबकि कॉलर को स्वामित्व बनाए रखने की अनुमति भी देनी हो, तो उसे किस प्रकार के पैरामीटर का उपयोग करना चाहिए?
answer: "&mut self"
wrong_answers:
  - "&खुद"
  - खुद
  - म्यूट सेल्फ
explanation: |
  वे विधियाँ जिन्हें संरचना इंस्टेंस को संशोधित करने की आवश्यकता होती है, लेकिन कॉलर को स्वामित्व बनाए रखने की अनुमति देती हैं, उन्हें अपने पहले पैरामीटर के रूप में `&mut self` का उपयोग करना चाहिए। यह इंस्टेंस का एक परिवर्तनीय संदर्भ बनाता है, जिससे विधि कॉलर से स्वामित्व छीने बिना संरचना के फ़ील्ड को बदल सकती है। `&self` का उपयोग करने से केवल इंस्टेंस को पढ़ा जा सकेगा, `self` इंस्टेंस को पूरी तरह से उपयोग कर लेगा, और `mut self` विधि पैरामीटर के लिए मान्य Rust सिंटैक्स नहीं है।
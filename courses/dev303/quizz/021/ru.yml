question: Какой тип параметра должен использовать метод Rust, если ему нужно изменить экземпляр структуры, позволяя вызывающему сохранять право собственности?
answer: "&mut self"
wrong_answers:
  - "&self"
  - себя
  - mut self
explanation: |
  Методы, которым нужно изменить экземпляр структуры, позволяя вызывающей стороне сохранить право собственности, должны использовать `&mut self` в качестве первого параметра. Это создает мутабельную ссылку на экземпляр, позволяя методу изменять поля структуры, не отнимая права собственности у вызывающего. Использование `&self` позволит только читать экземпляр, `self` полностью поглотит экземпляр, а `mut self` не является допустимым синтаксисом Rust для параметров метода.
question: اگر یک روش Rust نیاز داشته باشد که نمونه ساختار را تغییر دهد در حالی که به فراخواننده اجازه می‌دهد مالکیت را حفظ کند، باید از نوع پارامتر مرجع استفاده کند.
answer: "&mut self"
wrong_answers:
  - "&self"
  - خود
  - mut self
explanation: |
  روش‌هایی که نیاز به تغییر یک نمونه ساختار دارند در حالی که به فراخواننده اجازه می‌دهند مالکیت را حفظ کند، باید از `&mut self` به عنوان اولین پارامتر خود استفاده کنند. این کار یک ارجاع قابل تغییر به نمونه ایجاد می‌کند و به روش اجازه می‌دهد تا فیلدهای ساختار را بدون گرفتن مالکیت از فراخواننده تغییر دهد. استفاده از `&self` تنها اجازه خواندن نمونه را می‌دهد، `self` نمونه را به طور کامل مصرف می‌کند و `mut self` در نحو Rust برای پارامترهای روش معتبر نیست.
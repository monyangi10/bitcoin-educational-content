question: 호출자가 소유권을 유지하면서 구조체 인스턴스를 수정해야 하는 경우 Rust 메서드는 어떤 파라미터 유형을 사용해야 하나요?
answer: "&뮤트 셀프"
wrong_answers:
  - "&self"
  - self
  - mut self
explanation: |
  호출자가 소유권을 유지하면서 구조체 인스턴스를 수정해야 하는 메서드는 첫 번째 파라미터로 `&mut self`를 사용해야 합니다. 이렇게 하면 인스턴스에 대한 변경 가능한 참조가 생성되어 메서드가 호출자로부터 소유권을 빼앗지 않고 구조체의 필드를 변경할 수 있습니다. Self`를 사용하면 인스턴스 읽기만 허용되고, `self`는 인스턴스를 완전히 소비하며, `mut self`는 메서드 매개변수에 대한 유효한 Rust 구문이 아닙니다.
question: 如果需要修改结构实例，同时允许调用者保留所有权，Rust 方法应该使用哪种参数类型？
answer: "&mut self"
wrong_answers:
  - "&self"
  - 自我
  - mut self
explanation: |
  如果方法需要修改结构体实例，同时允许调用者保留所有权，则应使用 `&mut self` 作为第一个参数。这会创建一个对实例的可变引用，从而使方法可以更改结构体的字段，而不会从调用者那里夺走所有权。使用 `&self` 只允许读取实例，而 `self` 则会完全消耗实例，而且 `mut self` 不是方法参数的有效 Rust 语法。
question: เหตุผลพื้นฐานที่สถาปัตยกรรมของ Breez SDK ป้องกันอุปสรรคด้านกฎระเบียบที่มักส่งผลกระทบต่อบริการ Lightning แบบ custodial คืออะไร?
answer: ผู้ใช้ควบคุมคีย์ส่วนตัวของตนเองอย่างสมบูรณ์ซึ่งไม่เคยออกจากอุปกรณ์ของพวกเขา ทำให้เป็นซอฟต์แวร์ที่ไม่ต้องมีการดูแลรักษา
wrong_answers:
  - SDK ทำงานผ่าน LSP แบบกระจายอำนาจที่กระจายความรับผิดชอบด้านกฎระเบียบไปยังหลายเขตอำนาจศาล
  - โครงสร้างพื้นฐานของ Greenlight ถูกโฮสต์ในเขตอำนาจศาลที่เป็นมิตรกับกฎระเบียบซึ่งยกเว้นบริการ Lightning บนคลาวด์
  - กลไกช่องทางการชำระเงินแบบทันเวลาพอดีสร้างช่องทางการชำระเงินชั่วคราวที่อยู่นอกเหนือกฎระเบียบทางการเงินแบบดั้งเดิม
explanation: |
  Breez SDK หลีกเลี่ยงอุปสรรคด้านกฎระเบียบเพราะมันรักษาหลักการที่ไม่ใช่การดูแล - กุญแจส่วนตัวของผู้ใช้ไม่เคยออกจากอุปกรณ์ของพวกเขาและ Greenlight ไม่สามารถเข้าถึงเงินของผู้ใช้หรือดำเนินการที่ไม่ได้รับอนุญาต สถาปัตยกรรมที่ไม่ใช่การดูแลนี้หมายความว่าซอฟต์แวร์ไม่ถือเงินของลูกค้า ซึ่งแตกต่างจากบริการที่ดูแลซึ่งต้องเผชิญกับข้อกำหนดด้านกฎระเบียบที่สำคัญเนื่องจากพวกเขาควบคุมสินทรัพย์ของผู้ใช้ ตัวเลือกอื่น ๆ แนะนำอย่างไม่ถูกต้องว่าข้อได้เปรียบด้านกฎระเบียบมาจากคุณสมบัติทางเทคนิคหรือกลยุทธ์ด้านเขตอำนาจศาล ในขณะที่ข้อได้เปรียบหลักคือซอฟต์แวร์ที่ไม่ใช่การดูแลเผชิญกับอุปสรรคด้านกฎระเบียบน้อยลงทั่วโลก
question: Breez SDKのアーキテクチャが、一般的にカストディアル・ライトニング・サービスに影響する規制上のハードルを防いでいる根本的な理由は何ですか？
answer: ユーザーは秘密鍵を完全に管理することができ、デバイスから離れることはありません。
wrong_answers:
  - SDKは、複数の管轄区域に規制責任を分散する分散型LSPを通じて運営される。
  - Greenlightインフラストラクチャは、クラウドベースのライトニングサービスを免除する規制に優しい管轄区域でホストされている。
  - ジャスト・イン・タイム・チャネルの仕組みは、従来の金融規制から外れた一時的な支払いチャネルを作り出す。
explanation: |
  Breez SDKは、非カストディアル原則を維持するため、規制上のハードルを回避することができる。この非カストディアル・アーキテクチャーは、カストディアル・サービスがユーザー資産を管理するために重要な規制要件に直面するのとは異なり、ソフトウェアが顧客資金を保有しないことを意味する。他の選択肢は、規制上の利点が技術的な特徴や管轄区域の戦略によるものであると誤って示唆しているが、核となる利点は、非カストディアル・ソフトウェアが世界的に規制上の障壁に直面することが少ないということだけである。
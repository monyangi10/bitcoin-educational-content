question: دلیل اساسی که معماری SDK Breez از موانع نظارتی که معمولاً بر خدمات نگهداری لایتنینگ تأثیر می‌گذارد جلوگیری می‌کند چیست؟
answer: کاربران کنترل کامل بر کلیدهای خصوصی خود دارند که هرگز دستگاه‌هایشان را ترک نمی‌کنند، و این نرم‌افزار را غیرامانی می‌سازد.
wrong_answers:
  - SDK از طریق LSPهای غیرمتمرکز عمل می‌کند که مسئولیت‌های نظارتی را در چندین حوزه قضایی توزیع می‌کنند.
  - زیرساخت Greenlight در حوزه‌های قضایی میزبانی می‌شود که از خدمات ابری Lightning معاف هستند و با مقررات سازگارند.
  - مکانیزم کانال به‌موقع کانال‌های پرداخت موقتی ایجاد می‌کند که خارج از مقررات مالی سنتی قرار می‌گیرند.
explanation: |
  SDK Breez از موانع نظارتی اجتناب می‌کند زیرا اصول غیرامانی را حفظ می‌کند - کلیدهای خصوصی کاربران هرگز دستگاه‌هایشان را ترک نمی‌کنند و Greenlight نمی‌تواند به وجوه کاربران دسترسی داشته باشد یا عملیات غیرمجاز انجام دهد. این معماری غیرامانی به این معناست که نرم‌افزار وجوه مشتریان را نگه نمی‌دارد، برخلاف خدمات امانی که با الزامات نظارتی قابل توجهی مواجه هستند زیرا دارایی‌های کاربران را کنترل می‌کنند. گزینه‌های دیگر به اشتباه مزایای نظارتی را ناشی از ویژگی‌های فنی یا استراتژی‌های قضایی پیشنهاد می‌دهند، در حالی که مزیت اصلی این است که نرم‌افزار غیرامانی با موانع نظارتی کمتری در سطح جهانی مواجه است.
question: Breez SDK 的架構避免了通常會影響保管閃電服務的監管障礙，其根本原因是什麼？
answer: 使用者可完全控制自己的私密金鑰，這些金鑰從未離開他們的裝置，使其成為非監護軟體
wrong_answers:
  - SDK 透過分散的 LSP 運作，在多個管轄區間分配監管責任
  - Greenlight 基礎設施託管在豁免雲端 Lightning 服務的監管友好司法管轄區
  - 即時通路機制創造了傳統金融法規以外的臨時付款通路
explanation: |
  Breez SDK 可避免監管障礙，因為它維持非保管原則 - 使用者的私密金鑰不會離開他們的裝置，Greenlight 也無法存取使用者的資金或執行未經授權的操作。這種非託管架構意味著該軟體不會持有客戶資金，這與託管服務不同，因為託管服務會控制用戶資產，因而面臨重大的監管要求。其他選項錯誤地認為監管優勢來自於技術功能或司法策略，其實核心優勢只是非保管軟體在全球面臨的監管障礙較少。
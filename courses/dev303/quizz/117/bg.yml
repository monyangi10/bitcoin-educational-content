question: Каква е основната причина, поради която архитектурата на Breez SDK предотвратява регулаторните пречки, които обикновено засягат попечителските услуги на Lightning?
answer: Потребителите запазват пълен контрол върху своите частни ключове, които никога не напускат устройствата им, което го прави софтуер, който не е наложен на личния им живот
wrong_answers:
  - SDK функционира чрез децентрализирани ДУУ, които разпределят регулаторната отговорност между множество юрисдикции
  - Инфраструктурата на Greenlight се хоства в благоприятни за регулациите юрисдикции, които освобождават от данъци базираните в облака услуги на Lightning
  - Механизмът "точно навреме" създава временни канали за плащане, които не попадат в обхвата на традиционните финансови разпоредби
explanation: |
  Breez SDK избягва регулаторните пречки, тъй като поддържа принципите на несеквестируемост - частните ключове на потребителите никога не напускат устройствата им и Greenlight не може да получи достъп до средствата на потребителите или да извършва неоторизирани операции. Тази нехранителна архитектура означава, че софтуерът не държи средства на клиентите, за разлика от попечителските услуги, които са изправени пред значителни регулаторни изисквания, тъй като контролират активите на потребителите. Другите варианти неправилно предполагат, че регулаторните предимства идват от технически характеристики или стратегии за юрисдикции, докато основното предимство е просто, че софтуерът, който не е попечителски, е изправен пред по-малко регулаторни бариери в световен мащаб.
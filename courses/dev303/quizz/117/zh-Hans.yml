question: Breez SDK的架构避免了通常会影响托管闪电服务的监管障碍，其根本原因是什么？
answer: 用户可以完全控制自己的私人密钥，这些密钥永远不会离开他们的设备，使其成为非托管软件
wrong_answers:
  - SDK 通过分散的 LSP 运作，将监管责任分配给多个管辖区
  - Greenlight 基础设施托管在对监管有利的司法管辖区，这些管辖区豁免基于云的闪电服务
  - 及时渠道机制创建了传统金融监管之外的临时支付渠道
explanation: |
  Breez SDK 可避免监管障碍，因为它坚持非托管原则--用户的私钥从未离开过他们的设备，Greenlight 无法访问用户资金或执行未经授权的操作。这种非托管架构意味着软件不会持有客户资金，这与托管服务不同，后者由于控制用户资产而面临大量监管要求。其他选项错误地认为监管优势来自技术功能或司法策略，而核心优势仅仅是非托管软件在全球面临的监管障碍更少。
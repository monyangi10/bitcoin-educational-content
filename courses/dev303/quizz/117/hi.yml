question: Breez SDK की वास्तुकला किस मूलभूत कारण से उन नियामकीय बाधाओं को रोकती है जो आमतौर पर कस्टोडियल लाइटनिंग सेवाओं को प्रभावित करती हैं?
answer: उपयोगकर्ता अपनी निजी कुंजियों पर पूर्ण नियंत्रण बनाए रखते हैं जो कभी भी उनके उपकरणों से बाहर नहीं निकलती हैं, जिससे यह गैर-संरक्षण सॉफ्टवेयर बन जाता है।
wrong_answers:
  - यह एसडीके विकेंद्रीकृत एलएसपी के माध्यम से संचालित होता है जो नियामक जिम्मेदारी को कई अधिकारक्षेत्रों में वितरित करता है।
  - ग्रीनलाइट इंफ्रास्ट्रक्चर उन नियामक-अनुकूल अधिकार क्षेत्रों में होस्ट किया जाता है जो क्लाउड-आधारित लाइटनिंग सेवाओं को छूट देते हैं।
  - जस्ट-इन-टाइम चैनल तंत्र अस्थायी भुगतान चैनल बनाता है जो पारंपरिक वित्तीय नियमों के दायरे से बाहर होते हैं।
explanation: |
  Breez SDK नियामकीय बाधाओं से बचता है क्योंकि यह गैर-संरक्षण सिद्धांतों का पालन करता है - उपयोगकर्ताओं की निजी कुंजी कभी भी उनके उपकरणों से बाहर नहीं जाती और ग्रीनलाइट उपयोगकर्ता निधियों तक पहुंच नहीं सकता या अनधिकृत संचालन नहीं कर सकता। इस गैर-संरक्षण वास्तुकला का अर्थ है कि सॉफ़्टवेयर ग्राहक निधियों को अपने पास नहीं रखता, जबकि अभिरक्षण सेवाओं को उपयोगकर्ता परिसंपत्तियों को नियंत्रित करने के कारण महत्वपूर्ण नियामक आवश्यकताओं का सामना करना पड़ता है। अन्य विकल्प गलत तरीके से यह सुझाव देते हैं कि नियामकीय लाभ तकनीकी विशेषताओं या क्षेत्राधिकार रणनीतियों से प्राप्त होते हैं, जबकि मूल लाभ यह है कि गैर-संरक्षण सॉफ़्टवेयर को वैश्विक स्तर पर कम नियामकीय बाधाओं का सामना करना पड़ता है।
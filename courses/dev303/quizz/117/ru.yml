question: В чем заключается основная причина того, что архитектура Breez SDK не допускает препятствий со стороны регулирующих органов, которые обычно влияют на кастодиальные услуги Lightning?
answer: Пользователи сохраняют полный контроль над своими закрытыми ключами, которые никогда не покидают их устройства, что делает это программное обеспечение не требующим хранения
wrong_answers:
  - SDK работает через децентрализованные LSP, которые распределяют ответственность за регулирование между несколькими юрисдикциями
  - Инфраструктура Greenlight размещается в юрисдикциях, благоприятных для регулирования, в которых облачные сервисы Lightning не облагаются налогом
  - Механизм каналов "точно в срок" создает временные платежные каналы, которые выходят за рамки традиционного финансового регулирования
explanation: |
  Breez SDK позволяет избежать препятствий со стороны регулирующих органов, поскольку он поддерживает принципы некастодиального управления - закрытые ключи пользователей никогда не покидают их устройства, и Greenlight не может получить доступ к средствам пользователей или выполнить несанкционированные операции. Такая некастодиальная архитектура означает, что программное обеспечение не хранит средства клиентов, в отличие от кастодиальных услуг, которые сталкиваются с серьезными регулятивными требованиями, поскольку контролируют активы пользователей. В других вариантах неверно предполагается, что преимущества в области регулирования обусловлены техническими особенностями или юрисдикционными стратегиями, в то время как основное преимущество заключается в том, что некастодиальное программное обеспечение сталкивается с меньшим количеством регуляторных барьеров на глобальном уровне.
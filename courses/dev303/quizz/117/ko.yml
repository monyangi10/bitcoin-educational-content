question: Breez SDK의 아키텍처가 일반적으로 커스터디 라이트닝 서비스에 영향을 미치는 규제 장애물을 방지하는 근본적인 이유는 무엇인가요?
answer: 사용자는 자신의 개인 키를 완벽하게 제어할 수 있으며, 디바이스를 떠나지 않으므로 비수탁 소프트웨어입니다
wrong_answers:
  - SDK는 여러 관할권에 걸쳐 규제 책임을 분산하는 분산형 LSP를 통해 운영됩니다
  - 그린라이트 인프라는 클라우드 기반 Lightning 서비스를 면제하는 규제 친화적인 관할 구역에서 호스팅됩니다
  - 적시 채널 메커니즘은 기존 금융 규정을 벗어난 임시 결제 채널을 생성합니다
explanation: |
  Breez SDK는 비수탁 원칙을 유지하여 사용자의 개인 키가 디바이스를 떠나지 않으며, Greenlight가 사용자 자금에 액세스하거나 무단 작업을 수행할 수 없기 때문에 규제의 장애물을 피할 수 있습니다. 이러한 비수탁 아키텍처는 사용자 자산을 관리하기 때문에 상당한 규제 요건에 직면하는 커스터디 서비스와 달리 소프트웨어가 고객 자금을 보유하지 않는다는 것을 의미합니다. 다른 옵션은 비수탁형 소프트웨어가 전 세계적으로 규제 장벽이 적다는 것이 핵심적인 장점인데도 불구하고 기술적 특징이나 관할권 전략에서 규제상의 이점이 있다고 잘못 제시하고 있습니다.
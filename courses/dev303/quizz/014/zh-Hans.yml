question: 在 Rust 中，字符串和字符串字面量 (&str) 的主要区别是什么？
answer: 字符串管理动态分配的堆内存，可以修改，而 &str 是不可变字符串数据的视图
wrong_answers:
  - 为了提高性能，字符串存储在堆栈中，而 &str 则存储在堆上
  - 字符串只能包含 ASCII 字符，而 &str 可以包含任何 Unicode 字符
  - String 自动实现借用，而 &str 需要显式所有权转移
explanation: |
  String 和 &str 代表了 Rust 中处理字符串的不同方法。String 是一种堆分配、可增长的字符串类型，它拥有自己的数据，可以在运行时修改。相比之下，&str（字符串片段）是对字符串数据的不可变引用，通常指向嵌入程序二进制文件中的字符串文字或现有字符串数据的片段。这种区别使得 Rust 可以同时优化灵活性（String 用于动态内容）和效率（&str 用于只读访问，无需分配）。
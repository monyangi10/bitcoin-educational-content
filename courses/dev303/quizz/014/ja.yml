question: Rustにおける文字列と文字列リテラル（&str）の主な違いは何ですか？
answer: Stringは動的に確保されたヒープ・メモリーを管理し、変更可能であるのに対し、&strは不変の文字列データへのビューである。
wrong_answers:
  - 文字列はスタックに格納され、&strはヒープに格納される。
  - 文字列はASCII文字のみを含むことができるが、&strは任意のユニコード文字を含むことができる。
  - Stringは自動的に借用を実装するが、&strは明示的な所有権移転が必要である。
explanation: |
  Stringと&strは、Rustにおける文字列処理の異なるアプローチを表している。Stringはヒープに割り当てられ、成長可能な文字列型で、そのデータを所有し、実行時に変更することができます。対照的に、&str (string slice) は文字列データへの不変の参照であり、しばしばプログラムバイナリに埋め込まれた文字列リテラルや既存のStringデータのスライスを指します。この区別により、Rustは柔軟性（動的コンテンツ用のString）と効率性（割り当てなしの読み取り専用アクセス用の&str）の両方を最適化することができます。
question: В чем основная разница между строкой и строковым литералом (&str) в Rust?
answer: String управляет динамически выделяемой памятью кучи и может быть изменена, в то время как &str - это представление неизменяемых строковых данных
wrong_answers:
  - Строка хранится в стеке, а &str - в куче, что повышает производительность
  - Строка может содержать только символы ASCII, в то время как &str может содержать любые символы Unicode
  - String автоматически реализует заимствование, в то время как &str требует явной передачи прав собственности
explanation: |
  String и &str представляют собой разные подходы к работе со строками в Rust. String - это распределяемый по куче растущий строковый тип, который владеет своими данными и может быть изменен во время выполнения программы. Напротив, &str (string slice) - это неизменяемая ссылка на строковые данные, часто указывающая на строковые литералы, встроенные в бинарные файлы программы, или на фрагменты существующих данных String. Это различие позволяет Rust оптимизировать как гибкость (String для динамического содержимого), так и эффективность (&str для доступа только для чтения без выделения).
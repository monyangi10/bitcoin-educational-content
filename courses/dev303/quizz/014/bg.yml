question: Каква е основната разлика между символа String и символа string literal (&str) в Rust?
answer: String управлява динамично разпределената памет на купчината и може да бъде променян, докато &str е изглед към неизменни данни за низ
wrong_answers:
  - String се съхранява в стека, докато &str се съхранява в купчината за по-добра производителност
  - String може да съдържа само ASCII символи, докато &str може да съдържа всякакви Unicode символи
  - String автоматично реализира заемане, докато &str изисква изрично прехвърляне на собствеността
explanation: |
  String и &str представляват различни подходи за работа с низове в Rust. String е тип низ, който се разпределя в купчината, може да се увеличава, притежава своите данни и може да се променя по време на изпълнение. За разлика от това, &str (string slice) е неизменна препратка към string данни, често сочеща към string литерали, вградени в бинарната програма, или части от съществуващи String данни. Това разграничение позволява на Rust да оптимизира както гъвкавостта (String за динамично съдържание), така и ефективността (&str за достъп само за четене без разпределение).
question: Rust में स्ट्रिंग और स्ट्रिंग लिटरल (&str) के बीच मुख्य अंतर क्या है?
answer: String गतिशील रूप से आवंटित हीप मेमोरी को प्रबंधित करता है और इसे संशोधित किया जा सकता है, जबकि &str अपरिवर्तनीय स्ट्रिंग डेटा का एक दृश्य है।
wrong_answers:
  - बेहतर प्रदर्शन के लिए स्ट्रिंग को स्टैक पर स्टोर किया जाता है जबकि &str को हीप पर स्टोर किया जाता है।
  - स्ट्रिंग में केवल ASCII वर्ण हो सकते हैं जबकि &str में कोई भी यूनिकोड वर्ण हो सकते हैं
  - String स्वचालित रूप से उधार लेने की प्रक्रिया को लागू करता है जबकि &str के लिए स्पष्ट स्वामित्व हस्तांतरण की आवश्यकता होती है।
explanation: |
  Rust में स्ट्रिंग हैंडलिंग के लिए String और &str अलग-अलग दृष्टिकोण दर्शाते हैं। String एक हीप-आवंटित, बढ़ने योग्य स्ट्रिंग प्रकार है जो अपने डेटा का मालिक होता है और रनटाइम पर संशोधित किया जा सकता है। इसके विपरीत, &str (स्ट्रिंग स्लाइस) स्ट्रिंग डेटा का एक अपरिवर्तनीय संदर्भ है, जो अक्सर प्रोग्राम बाइनरी में एम्बेडेड स्ट्रिंग लिटरल या मौजूदा String डेटा के स्लाइस को इंगित करता है। यह अंतर Rust को लचीलेपन (गतिशील सामग्री के लिए String) और दक्षता (आवंटन के बिना केवल पढ़ने के लिए &str) दोनों के लिए अनुकूलन करने की अनुमति देता है।
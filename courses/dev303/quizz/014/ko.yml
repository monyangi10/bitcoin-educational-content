question: Rust에서 문자열과 문자열 리터럴(&str)의 주요 차이점은 무엇인가요?
answer: String은 동적으로 할당된 힙 메모리를 관리하고 수정할 수 있으며, &str은 변경 불가능한 문자열 데이터에 대한 보기입니다
wrong_answers:
  - 문자열은 스택에 저장되고 &str은 힙에 저장되어 성능이 향상됩니다
  - 문자열은 ASCII 문자만 포함할 수 있지만 &str은 모든 유니코드 문자를 포함할 수 있습니다
  - 문자열은 자동으로 차용을 구현하는 반면 &str은 명시적인 소유권 이전이 필요합니다
explanation: |
  String과 &str은 Rust에서 문자열 처리에 대한 서로 다른 접근 방식을 나타냅니다. String은 데이터를 소유하고 런타임에 수정할 수 있는 힙에 할당된 성장 가능한 문자열 유형입니다. 반면, &str(문자열 슬라이스)은 문자열 데이터에 대한 불변 참조로, 프로그램 바이너리에 포함된 문자열 리터럴이나 기존 문자열 데이터의 슬라이스를 가리키는 경우가 많습니다. 이러한 구분을 통해 Rust는 유연성(동적 콘텐츠의 경우 String)과 효율성(할당 없이 읽기 전용 액세스의 경우 &str) 모두를 최적화할 수 있습니다.
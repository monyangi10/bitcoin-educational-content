question: ความแตกต่างหลักระหว่าง String และ string literal (&str) ใน Rust คืออะไร?
answer: String จัดการหน่วยความจำ heap ที่จัดสรรแบบไดนามิกและสามารถแก้ไขได้ ในขณะที่ &str เป็นมุมมองของข้อมูลสตริงที่ไม่เปลี่ยนแปลง
wrong_answers:
  - สตริงถูกเก็บไว้บนสแตกในขณะที่ &str ถูกเก็บไว้บนฮีปเพื่อประสิทธิภาพที่ดีกว่า
  - สตริงสามารถมีได้เฉพาะอักขระ ASCII ในขณะที่ &str สามารถมีอักขระ Unicode ใดๆ ก็ได้
  - สตริงจะใช้การยืมโดยอัตโนมัติในขณะที่ &str ต้องการการโอนความเป็นเจ้าของอย่างชัดเจน
explanation: |
  String และ &str แสดงถึงวิธีการจัดการสตริงที่แตกต่างกันใน Rust โดย String เป็นประเภทสตริงที่จัดสรรใน heap และสามารถเติบโตได้ ซึ่งเป็นเจ้าของข้อมูลของตัวเองและสามารถแก้ไขได้ในขณะรันไทม์ ในทางตรงกันข้าม &str (string slice) เป็นการอ้างอิงที่ไม่เปลี่ยนแปลงต่อข้อมูลสตริง มักจะชี้ไปที่สตริงลิเทอรัลที่ฝังอยู่ในโปรแกรมไบนารีหรือสไลซ์ของข้อมูล String ที่มีอยู่แล้ว ความแตกต่างนี้ทำให้ Rust สามารถเพิ่มประสิทธิภาพทั้งในด้านความยืดหยุ่น (String สำหรับเนื้อหาแบบไดนามิก) และประสิทธิภาพ (&str สำหรับการเข้าถึงแบบอ่านอย่างเดียวโดยไม่ต้องจัดสรร)
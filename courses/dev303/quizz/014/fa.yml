question: تفاوت اصلی بین یک String و یک string literal (&str) در Rust چیست؟
answer: رشته (String) حافظه پشته تخصیص داده شده را به صورت پویا مدیریت می‌کند و قابل تغییر است، در حالی که &str نمایی از داده‌های رشته‌ای تغییرناپذیر است.
wrong_answers:
  - رشته در پشته ذخیره می‌شود در حالی که &str برای عملکرد بهتر در هیپ ذخیره می‌شود.
  - رشته فقط می‌تواند شامل کاراکترهای ASCII باشد در حالی که &str می‌تواند شامل هر کاراکتر یونیکد باشد.
  - رشته به‌طور خودکار قرض‌گیری را پیاده‌سازی می‌کند، در حالی که &str نیاز به انتقال مالکیت صریح دارد.
explanation: |
  رشته و &str رویکردهای متفاوتی برای مدیریت رشته در Rust را نشان می‌دهند. String یک نوع رشته‌ای است که در heap تخصیص داده می‌شود، قابل رشد است، مالک داده‌های خود است و می‌تواند در زمان اجرا تغییر کند. در مقابل، &str (برش رشته) یک ارجاع غیرقابل تغییر به داده‌های رشته است که اغلب به رشته‌های ثابت تعبیه‌شده در باینری برنامه یا برش‌هایی از داده‌های موجود String اشاره می‌کند. این تمایز به Rust اجازه می‌دهد تا هم برای انعطاف‌پذیری (String برای محتوای پویا) و هم برای کارایی (&str برای دسترسی فقط خواندنی بدون تخصیص) بهینه‌سازی کند.
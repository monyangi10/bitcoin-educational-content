question: Breez SDK가 라이트닝과 on-chain Bitcoin 기능을 모두 유지하면서 사용자에게 통합된 밸런스를 제공할 수 있는 주요 기술 메커니즘은 무엇인가요?
answer: 필요에 따라 라이트닝과 on-chain Bitcoin를 백그라운드에서 자동 전환하는 자동 스왑 서비스
wrong_answers:
  - 실제 전환 없이 라이트닝과 on-chain 펀드의 합계를 표시하는 실시간 잔액 집계
  - 채널 리저브 풀링을 통해 동일한 UTXO 내에서 라이트닝과 on-chain 상태 간에 자금을 자유롭게 이동할 수 있습니다
  - 라이트닝과 on-chain 결제를 모두 받을 수 있는 하이브리드 주소를 생성하는 이중 레이어 주소 생성
explanation: |
  정답은 자동 스왑 서비스입니다. 사용자가 다른 유형의 결제를 해야 할 때 라이트닝과 on-chain Bitcoin 간에 원활하게 전환할 수 있도록 Breez SDK가 on-chain 스왑 기능을 특별히 구현하고 있기 때문입니다. 이를 통해 사용자는 단일 잔액을 확인할 수 있으며, 시스템은 레이어 간 자금 이동의 기술적 복잡성을 처리합니다. 오답은 존재하지 않거나 기술적으로 불가능한 메커니즘을 설명하는 것으로, 잔액 집계는 레이어 간 기능을 활성화하지 않고 합산된 금액만 표시하고, 채널 준비금은 on-chain 상태로 자금을 이동할 수 없으며, 하이브리드 주소는 Bitcoin의 프로토콜에 존재하지 않습니다.
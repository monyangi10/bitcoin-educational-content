question: กลไกทางเทคนิคหลักที่ช่วยให้ Breez SDK สามารถนำเสนอผู้ใช้ด้วยยอดคงเหลือที่รวมเป็นหนึ่งเดียวในขณะที่ยังคงรักษาฟังก์ชันการทำงานของทั้ง Lightning และ on-chain Bitcoin คืออะไร?
answer: บริการสวอปอัตโนมัติที่แปลงระหว่าง Lightning และ on-chain Bitcoin เบื้องหลังตามความจำเป็น
wrong_answers:
  - การรวมยอดคงเหลือแบบเรียลไทม์ที่แสดงผลรวมของเงินทุน Lightning และ on-chain โดยไม่ต้องแปลงจริง
  - การรวมสำรองช่องทางที่อนุญาตให้เงินทุนเคลื่อนย้ายได้อย่างอิสระระหว่างสถานะ Lightning และ on-chain ภายใน UTXO เดียวกัน
  - การสร้างที่อยู่แบบสองชั้นที่สร้างที่อยู่แบบไฮบริดซึ่งสามารถรับการชำระเงินทั้ง Lightning และ on-chain
explanation: |
  คำตอบที่ถูกต้องคือบริการสลับอัตโนมัติเพราะ Breez SDK ได้ดำเนินการฟังก์ชันการสลับ on-chain โดยเฉพาะเพื่อแปลงระหว่าง Lightning และ on-chain Bitcoin อย่างราบรื่นเมื่อผู้ใช้ต้องการทำการชำระเงินประเภทต่างๆ ซึ่งช่วยให้ผู้ใช้เห็นยอดคงเหลือเดียวในขณะที่ระบบจัดการความซับซ้อนทางเทคนิคของการย้ายเงินระหว่างเลเยอร์ คำตอบที่ผิดอธิบายกลไกที่ไม่มีอยู่จริงหรือเป็นไปไม่ได้ทางเทคนิค - การรวมยอดคงเหลือจะแสดงเฉพาะจำนวนรวมโดยไม่เปิดใช้งานฟังก์ชันข้ามเลเยอร์ การสำรองช่องทางไม่สามารถย้ายเงินไปยังสถานะ on-chain ได้ และที่อยู่ไฮบริดไม่มีอยู่ในโปรโตคอลของ Bitcoin
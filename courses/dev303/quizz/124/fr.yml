question: Quel est le principal mécanisme technique qui permet au SDK Breez de présenter aux utilisateurs un équilibre unifié tout en conservant les fonctionnalités de Lightning et de on-chain Bitcoin ?
answer: Services de permutation automatique qui assurent la conversion entre Lightning et on-chain Bitcoin en arrière-plan, selon les besoins
wrong_answers:
  - Agrégation des soldes en temps réel qui affiche la somme des fonds Lightning et on-chain sans conversion réelle
  - La mise en commun des réserves des canaux qui permet aux fonds de circuler librement entre les États Lightning et on-chain au sein d'une même UTXO
  - La génération d'adresses à double couche permet de créer des adresses hybrides capables de recevoir à la fois des paiements Lightning et on-chain
explanation: |
  La bonne réponse est le service de swap automatique, car le SDK Breez met spécifiquement en œuvre la fonctionnalité de swap on-chain pour assurer une conversion transparente entre Lightning et le on-chain Bitcoin lorsque les utilisateurs doivent effectuer différents types de paiements. Cela permet aux utilisateurs de voir un seul solde tandis que le système gère la complexité technique du transfert de fonds entre les couches. Les mauvaises réponses décrivent des mécanismes inexistants ou techniquement impossibles - l'agrégation des soldes n'afficherait que des montants combinés sans activer la fonctionnalité inter-couches, les réserves de canaux ne peuvent pas déplacer des fonds vers des états on-chain, et les adresses hybrides n'existent pas dans le protocole Bitcoin.
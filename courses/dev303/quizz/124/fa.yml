question: مکانیسم فنی اصلی که به Breez SDK امکان می‌دهد تا با حفظ عملکردهای Lightning و on-chain Bitcoin، یک تراز یکپارچه به کاربران ارائه دهد چیست؟
answer: خدمات تعویض خودکار که در صورت نیاز به‌طور پنهانی بین Lightning و on-chain Bitcoin تبدیل می‌کنند
wrong_answers:
  - تجمیع موجودی در زمان واقعی که مجموع وجوه Lightning و on-chain را بدون تبدیل واقعی نمایش می‌دهد
  - تجمع ذخیره کانال که اجازه می‌دهد وجوه به‌طور آزاد بین حالت‌های Lightning و on-chain در همان UTXO جابجا شوند.
  - تولید آدرس دو لایه که آدرس‌های هیبریدی ایجاد می‌کند که قادر به دریافت هر دو پرداخت Lightning و on-chain هستند
explanation: |
  پاسخ صحیح خدمات مبادله خودکار است زیرا Breez SDK به طور خاص قابلیت مبادله on-chain را پیاده‌سازی می‌کند تا به‌طور یکپارچه بین Lightning و on-chain Bitcoin زمانی که کاربران نیاز به انجام انواع مختلف پرداخت دارند، تبدیل کند. این به کاربران اجازه می‌دهد تا یک موجودی واحد را ببینند در حالی که سیستم پیچیدگی فنی انتقال وجوه بین لایه‌ها را مدیریت می‌کند. پاسخ‌های نادرست مکانیزم‌های غیرموجود یا از نظر فنی غیرممکن را توصیف می‌کنند - تجمیع موجودی فقط مقادیر ترکیبی را نمایش می‌دهد بدون اینکه قابلیت عملکرد بین لایه‌ای را فعال کند، ذخایر کانال نمی‌توانند وجوه را به حالت‌های on-chain منتقل کنند و آدرس‌های ترکیبی در پروتکل Bitcoin وجود ندارند.
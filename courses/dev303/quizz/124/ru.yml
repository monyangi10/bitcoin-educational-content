question: Каков основной технический механизм, позволяющий Breez SDK предоставлять пользователям единый баланс, сохраняя при этом функциональность Lightning и on-chain Bitcoin?
answer: Службы автоматической подмены, которые по мере необходимости за кулисами конвертируют между Lightning и on-chain Bitcoin
wrong_answers:
  - Агрегация баланса в режиме реального времени, которая отображает сумму средств Lightning и on-chain без фактической конвертации
  - Объединение резервных каналов, позволяющее свободно перемещать средства между государствами Lightning и on-chain в рамках одной UTXO
  - Двухслойная генерация адресов позволяет создавать гибридные адреса, способные принимать как платежи Lightning, так и on-chain
explanation: |
  Правильный ответ - автоматические своп-сервисы, поскольку Breez SDK специально реализует своп-функции on-chain для плавной конвертации между Lightning и on-chain Bitcoin, когда пользователям необходимо совершить различные типы платежей. Это позволяет пользователям видеть единый баланс, в то время как система справляется с технической сложностью перемещения средств между уровнями. Неправильные ответы описывают несуществующие или технически невозможные механизмы - агрегирование баланса будет отображать только объединенные суммы, не обеспечивая межуровневую функциональность, резервы каналов не могут перемещать средства в состояния on-chain, а гибридные адреса не существуют в протоколе Bitcoin.
question: Breez SDKが、ライトニングとon-chain Bitcoinの両方の機能を維持しながら、統一されたバランスをユーザーに提示することを可能にする主な技術的メカニズムは何ですか？
answer: Lightningとon-chain Bitcoin間を必要に応じて裏で変換する自動スワップサービス
wrong_answers:
  - ライトニングとon-chainの資金の合計を、実際に換金することなく表示するリアルタイム残高集計機能
  - 同じUTXOの中で、ライトニングとon-chainの州間で資金を自由に移動させるチャネル・リザーブ・プーリング
  - ライトニングとon-chainの両方の支払いを受けられるハイブリッドアドレスを作成するデュアルレイヤーアドレス生成
explanation: |
  正解は自動スワップサービスです。Breez SDKはon-chainスワップ機能を特別に実装しており、ユーザーが異なるタイプの支払いを行う必要がある場合に、Lightningとon-chain Bitcoinの間でシームレスに変換します。これにより、レイヤー間の資金移動という技術的に複雑な処理をシステムが行う一方で、ユーザーは単一の残高を確認することができます。間違った答えは、存在しない、または技術的に不可能なメカニズムについて述べている。残高集約は、クロスレイヤー機能を有効にすることなく、合計金額のみを表示し、チャネル・リザーブはon-chainの状態に資金を移動することができず、ハイブリッド・アドレスはBitcoinのプロトコルには存在しない。
question: वह प्राथमिक तकनीकी तंत्र क्या है जो Breez SDK को लाइटनिंग और on-chain Bitcoin दोनों की कार्यक्षमता को बनाए रखते हुए उपयोगकर्ताओं को एक एकीकृत संतुलन प्रस्तुत करने में सक्षम बनाता है?
answer: आवश्यकतानुसार लाइटनिंग और on-chain Bitcoin के बीच रूपांतरण करने वाली स्वचालित स्वैप सेवाएं पृष्ठभूमि में काम करती हैं।
wrong_answers:
  - वास्तविक समय में बैलेंस एग्रीगेशन जो वास्तविक रूपांतरण के बिना लाइटनिंग और on-chain फंडों का योग प्रदर्शित करता है
  - चैनल रिजर्व पूलिंग जो एक ही UTXO के भीतर लाइटनिंग और on-chain राज्यों के बीच धन को स्वतंत्र रूप से स्थानांतरित करने की अनुमति देता है
  - दोहरी-स्तरीय पता निर्माण जो हाइब्रिड पते बनाता है जो लाइटनिंग और on-chain दोनों भुगतान प्राप्त करने में सक्षम हैं
explanation: |
  सही उत्तर स्वचालित स्वैप सेवाएं हैं क्योंकि Breez SDK विशेष रूप से on-chain स्वैप कार्यक्षमता को लागू करता है ताकि उपयोगकर्ताओं को विभिन्न प्रकार के भुगतान करने की आवश्यकता होने पर लाइटनिंग और on-chain Bitcoin के बीच निर्बाध रूप से रूपांतरण हो सके। इससे उपयोगकर्ता एक ही शेष राशि देख सकते हैं जबकि सिस्टम विभिन्न स्तरों के बीच धनराशि स्थानांतरित करने की तकनीकी जटिलता को संभालता है। गलत उत्तरों में ऐसी प्रक्रियाओं का वर्णन है जो मौजूद नहीं हैं या तकनीकी रूप से असंभव हैं - शेष राशि एकत्रीकरण केवल संयुक्त राशि प्रदर्शित करेगा, क्रॉस-लेयर कार्यक्षमता को सक्षम किए बिना, चैनल रिजर्व on-chain स्टेट्स में धनराशि स्थानांतरित नहीं कर सकते हैं, और हाइब्रिड पते Bitcoin के प्रोटोकॉल में मौजूद नहीं हैं।
question: Какъв е основният технически механизъм, който позволява на Breez SDK да предоставя на потребителите единен баланс, като същевременно поддържа функционалността на Lightning и on-chain Bitcoin?
answer: Автоматични услуги за смяна, които преобразуват между Lightning и on-chain Bitcoin зад кулисите, когато е необходимо
wrong_answers:
  - Обобщаване на салдата в реално време, което показва сумата на средствата от Lightning и on-chain без реално преобразуване
  - Обединяване на резервите на каналите, което позволява свободното движение на средства между държави от типа Lightning и on-chain в рамките на една и съща UTXO
  - Двуслойно генериране на адреси, което създава хибридни адреси за получаване на плащания Lightning и on-chain
explanation: |
  Правилният отговор е автоматични услуги за размяна, тъй като Breez SDK специално имплементира функцията за размяна на on-chain за безпроблемно преобразуване между Lightning и on-chain Bitcoin, когато потребителите трябва да извършват различни видове плащания. Това позволява на потребителите да виждат един-единствен баланс, докато системата се справя с техническата сложност на преместването на средства между слоевете. Неправилните отговори описват несъществуващи или технически невъзможни механизми - агрегирането на салдата би показало само комбинирани суми, без да позволява функционалност между слоевете, резервите на каналите не могат да преместват средства в състояния на on-chain, а хибридните адреси не съществуват в протокола на Bitcoin.
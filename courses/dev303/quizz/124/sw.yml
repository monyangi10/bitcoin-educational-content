question: Ni utaratibu gani mkuu wa kiufundi unaowezesha Breez SDK kuwapa watumiaji usawa uliounganishwa huku wakidumisha utendakazi wa Lightning na on-chain Bitcoin?
answer: Huduma za kubadilisha kiotomatiki zinazobadilisha kati ya Lightning na on-chain Bitcoin nyuma ya pazia inapohitajika
wrong_answers:
  - Mkusanyiko wa salio la wakati halisi unaoonyesha jumla ya fedha za Umeme na on-chain bila ubadilishaji halisi
  - Kukusanya akiba ya chaneli ambayo inaruhusu fedha kusafiri kwa uhuru kati ya majimbo ya Lightning na on-chain ndani ya UTXO hiyo hiyo
  - Uundaji wa anwani zenye safu mbili zinazounda anwani mseto zenye uwezo wa kupokea malipo ya Lightning na on-chain
explanation: |
  Jibu sahihi ni huduma za ubadilishaji otomatiki kwa sababu Breez SDK hutekeleza haswa utendaji wa ubadilishaji wa on-chain ili kubadilisha kati ya Lightning na on-chain Bitcoin bila shida wakati watumiaji wanahitaji kufanya aina tofauti za malipo. Hii inaruhusu watumiaji kuona salio moja huku mfumo ukishughulikia ugumu wa kiufundi wa kuhamisha fedha kati ya tabaka. Majibu yasiyo sahihi yanaelezea mifumo isiyopo au isiyowezekana kitaalamu - mkusanyiko wa salio ungeonyesha tu kiasi kilichounganishwa bila kuwezesha utendaji wa tabaka mtambuka, akiba ya chaneli haiwezi kuhamisha fedha hadi hali za on-chain, na anwani mseto hazipo katika Bitcoin protocol.

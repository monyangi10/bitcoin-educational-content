question: 是什麼讓 Rust 的類型系統對於預防 Bitcoin 應用程式中與記憶體相關的漏洞特別有效？
answer: 類型系統透過相同的機制處理業務邏輯建模和記憶體所有權控制
wrong_answers:
  - 編譯器會自動產生記憶體分配例程，防止緩衝記憶體溢出攻擊
  - 靜態類型要求在編譯時而非運行時宣告所有記憶體位址
  - 在執行過程中，強分類可將所有指標操作轉換為安全的陣列邊界檢查
explanation: |
  Rust 的類型系統是獨一無二的，因為它具有雙重目的 - 在建立複雜業務邏輯模型的同時，透過所有權、借用和參考計數管理記憶體安全。這種整合意味著，確保程式邏輯正確的類型檢查也能在編譯時消除記憶體洩漏、雙重錯誤和競爭條件。錯誤答案所描述的機制在 Rust 中並不存在：編譯器不會自動執行 generate 分配例程，記憶體位址不需要成為編譯時常數，指標安全來自所有權規則而非執行時邊界檢查。
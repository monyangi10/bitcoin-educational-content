question: Rust 的类型系统为何能特别有效地防止 Bitcoin 应用程序中与内存有关的漏洞？
answer: 类型系统通过同一机制处理业务逻辑建模和内存所有权控制
wrong_answers:
  - 编译器自动生成内存分配例程，防止缓冲区溢出攻击
  - 静态类型要求在编译时而不是运行时声明所有内存地址
  - 强类型在执行过程中将所有指针操作转换为安全的数组边界检查
explanation: |
  Rust 的类型系统是独一无二的，因为它具有双重功能--在对复杂的业务逻辑进行建模的同时，通过所有权、借用和引用计数管理内存安全。这种整合意味着，确保程序逻辑正确的类型检查也能在编译时消除内存泄漏、双重错误和竞赛条件。错误答案描述了 Rust 中不存在的机制：编译器不会自动执行 generate 分配例程，内存地址不需要成为编译时常量，指针安全来自所有权规则而非运行时边界检查。
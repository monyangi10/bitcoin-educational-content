question: چه چیزی سیستم نوع Rust را به‌ویژه برای جلوگیری از آسیب‌پذیری‌های مرتبط با حافظه در برنامه‌های Bitcoin مؤثر می‌سازد؟
answer: سیستم نوع از طریق همان مکانیزم هم مدل‌سازی منطق کسب‌وکار و هم کنترل مالکیت حافظه را مدیریت می‌کند.
wrong_answers:
  - کامپایلر به‌طور خودکار روال‌های تخصیص حافظه‌ای را تولید می‌کند که از حملات سرریز بافر جلوگیری می‌کنند.
  - تایپ ایستا نیاز دارد که تمام آدرس‌های حافظه در زمان کامپایل اعلام شوند نه در زمان اجرا.
  - تایپ قوی تمام عملیات اشاره‌گر را به بررسی ایمن محدوده آرایه‌ها در حین اجرا تبدیل می‌کند.
explanation: |
  سیستم نوع Rust منحصر به فرد است زیرا دو هدف را دنبال می‌کند - مدل‌سازی منطق پیچیده کسب‌وکار در حالی که به طور همزمان مدیریت ایمنی حافظه از طریق مالکیت، قرض‌گیری و شمارش مرجع را انجام می‌دهد. این یکپارچگی به این معناست که همان بررسی نوع که منطق صحیح برنامه را تضمین می‌کند، همچنین نشت حافظه، خطاهای آزادسازی دوباره و شرایط رقابتی را در زمان کامپایل از بین می‌برد. پاسخ‌های نادرست مکانیزم‌هایی را توصیف می‌کنند که در Rust وجود ندارند: کامپایلر به طور خودکار روال‌های تخصیص generate را انجام نمی‌دهد، آدرس‌های حافظه نیازی به ثابت‌های زمان کامپایل ندارند و ایمنی اشاره‌گر از قوانین مالکیت به جای بررسی حدود در زمان اجرا ناشی می‌شود.
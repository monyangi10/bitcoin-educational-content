question: Кое прави системата от типове на Rust особено ефективна за предотвратяване на уязвимости, свързани с паметта, в приложенията на Bitcoin?
answer: Системата от типове се справя както с моделирането на бизнес логиката, така и с контрола на собствеността на паметта чрез един и същ механизъм
wrong_answers:
  - Компилаторът автоматично генерира процедури за разпределение на паметта, които предотвратяват атаки за препълване на буфера
  - Статичното типизиране изисква всички адреси на паметта да бъдат декларирани по време на компилация, а не по време на изпълнение
  - Силното типизиране превръща всички операции с указатели в безопасна проверка на границите на масива по време на изпълнение
explanation: |
  Системата от типове на Rust е уникална, тъй като служи за двойна цел - моделира сложна бизнес логика и същевременно управлява сигурността на паметта чрез собственост, заемане и броене на референции. Тази интеграция означава, че същата проверка на типовете, която осигурява правилна програмна логика, също така елиминира изтичането на памет, грешките без дублиране и състезателните условия по време на компилация. Неправилните отговори описват механизми, които не съществуват в Rust: компилаторът не използва автоматично рутинни процедури за разпределение на generate, не се изисква адресите на паметта да бъдат константи по време на компилация, а безопасността на указателите идва от правила за собственост, а не от проверка на границите по време на изпълнение.
question: Rust의 유형 시스템이 Bitcoin 애플리케이션의 메모리 관련 취약점을 방지하는 데 특히 효과적인 이유는 무엇인가요?
answer: 타입 시스템은 동일한 메커니즘을 통해 비즈니스 로직 모델링과 메모리 소유권 제어를 모두 처리합니다
wrong_answers:
  - 컴파일러는 버퍼 오버플로 공격을 방지하는 메모리 할당 루틴을 자동으로 생성합니다
  - 정적 타이핑은 모든 메모리 주소를 런타임이 아닌 컴파일 타임에 선언해야 합니다
  - 강력한 타이핑은 실행 중에 모든 포인터 연산을 안전한 배열 범위 검사로 변환합니다
explanation: |
  Rust의 타입 시스템은 복잡한 비즈니스 로직을 모델링하는 동시에 소유권, 차용, 참조 계수를 통해 메모리 안전을 관리하는 두 가지 목적을 동시에 수행한다는 점에서 독특합니다. 이러한 통합은 올바른 프로그램 로직을 보장하는 동일한 유형 검사를 통해 컴파일 시 메모리 누수, 이중 오류 및 경합 조건도 제거할 수 있음을 의미합니다. 오답은 컴파일러가 자동 generate 할당 루틴을 수행하지 않고, 메모리 주소가 컴파일 타임 상수일 필요가 없으며, 포인터 안전성이 런타임 바운드 검사가 아닌 소유권 규칙에서 비롯되는 등 Rust에 존재하지 않는 메커니즘을 설명합니다.
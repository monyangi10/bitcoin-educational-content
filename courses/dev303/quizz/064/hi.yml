question: Rust की टाइप प्रणाली Bitcoin अनुप्रयोगों में मेमोरी से संबंधित कमजोरियों को रोकने में विशेष रूप से प्रभावी क्यों है?
answer: टाइप सिस्टम एक ही तंत्र के माध्यम से व्यावसायिक तर्क मॉडलिंग और मेमोरी स्वामित्व नियंत्रण दोनों को संभालता है।
wrong_answers:
  - कंपाइलर स्वचालित रूप से मेमोरी आवंटन रूटीन उत्पन्न करता है जो बफर ओवरफ्लो हमलों को रोकता है।
  - स्टैटिक टाइपिंग के लिए सभी मेमोरी एड्रेस को रनटाइम के बजाय कंपाइल टाइम पर घोषित करना आवश्यक है।
  - स्ट्रॉन्ग टाइपिंग निष्पादन के दौरान सभी पॉइंटर ऑपरेशनों को सुरक्षित ऐरे बाउंड्स चेकिंग में परिवर्तित कर देती है।
explanation: |
  Rust की टाइप प्रणाली अद्वितीय है क्योंकि यह दोहरे उद्देश्य की पूर्ति करती है - यह जटिल व्यावसायिक तर्क को मॉडल करती है और साथ ही स्वामित्व, उधार लेने और संदर्भ गणना के माध्यम से मेमोरी सुरक्षा का प्रबंधन करती है। इस एकीकरण का अर्थ है कि वही टाइप चेकिंग जो सही प्रोग्राम तर्क सुनिश्चित करती है, संकलन समय पर मेमोरी लीक, डबल-फ्री त्रुटियों और रेस स्थितियों को भी समाप्त करती है। गलत उत्तर उन तंत्रों का वर्णन करते हैं जो Rust में मौजूद नहीं हैं: कंपाइलर स्वचालित रूप से generate आवंटन रूटीन का उपयोग नहीं करता है, मेमोरी पते संकलन समय स्थिरांक होना आवश्यक नहीं है, और पॉइंटर सुरक्षा रनटाइम बाउंड्स चेकिंग के बजाय स्वामित्व नियमों से आती है।
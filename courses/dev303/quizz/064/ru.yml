question: Что делает систему типов Rust особенно эффективной для предотвращения уязвимостей, связанных с памятью, в приложениях Bitcoin?
answer: Система типов управляет моделированием бизнес-логики и контролем владения памятью с помощью одного и того же механизма
wrong_answers:
  - Компилятор автоматически генерирует процедуры выделения памяти, которые предотвращают атаки переполнения буфера
  - Статическая типизация требует, чтобы все адреса памяти были объявлены во время компиляции, а не во время выполнения программы
  - Сильная типизация преобразует все операции с указателями в безопасную проверку границ массива во время выполнения
explanation: |
  Система типов Rust уникальна тем, что служит двойной цели - она моделирует сложную бизнес-логику и одновременно управляет безопасностью памяти с помощью владения, заимствования и подсчета ссылок. Эта интеграция означает, что та же проверка типов, которая обеспечивает правильную логику программы, также устраняет утечки памяти, ошибки double-free и условия гонки во время компиляции. Неправильные ответы описывают механизмы, которых нет в Rust: компилятор не использует рутины автоматического выделения generate, адреса памяти не обязаны быть константами времени компиляции, а безопасность указателей обеспечивается правилами владения, а не проверкой границ во время выполнения.
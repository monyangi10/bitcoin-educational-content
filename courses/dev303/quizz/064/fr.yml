question: Qu'est-ce qui rend le système de type Rust particulièrement efficace pour prévenir les vulnérabilités liées à la mémoire dans les applications Bitcoin ?
answer: Le système de types gère à la fois la modélisation de la logique commerciale et le contrôle de la propriété de la mémoire par le biais d'un même mécanisme.
wrong_answers:
  - Le compilateur génère automatiquement des routines d'allocation de mémoire qui empêchent les attaques par débordement de mémoire tampon.
  - Le typage statique exige que toutes les adresses mémoire soient déclarées au moment de la compilation plutôt qu'au moment de l'exécution.
  - Le typage fort convertit toutes les opérations de pointeur en une vérification sûre des limites des tableaux pendant l'exécution.
explanation: |
  Le système de types de Rust est unique parce qu'il sert un double objectif : il modélise la logique commerciale complexe tout en gérant simultanément la sécurité de la mémoire par le biais de la propriété, de l'emprunt et du comptage des références. Cette intégration signifie que la même vérification de type qui assure une logique de programme correcte élimine également les fuites de mémoire, les erreurs sans double et les conditions de course au moment de la compilation. Les mauvaises réponses décrivent des mécanismes qui n'existent pas dans Rust : le compilateur ne gère pas automatiquement les routines d'allocation de mémoire, les adresses mémoire ne sont pas tenues d'être des constantes au moment de la compilation et la sécurité des pointeurs provient des règles de propriété plutôt que de la vérification des limites au moment de l'exécution.

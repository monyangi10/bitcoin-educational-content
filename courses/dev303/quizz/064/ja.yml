question: Bitcoinのアプリケーションにおけるメモリー関連の脆弱性を防ぐために、Rustの型システムが特に効果的なのはなぜですか？
answer: 型システムは、ビジネスロジックのモデリングとメモリ所有権の制御の両方を同じメカニズムで処理する。
wrong_answers:
  - コンパイラは、バッファオーバーフロー攻撃を防ぐメモリ割り当てルーチンを自動的に生成します。
  - 静的型付けでは、すべてのメモリアドレスを実行時ではなくコンパイル時に宣言する必要がある。
  - 強い型付けは、実行中にすべてのポインタ操作を安全な配列境界チェックに変換する。
explanation: |
  Rustの型システムは、複雑なビジネス・ロジックをモデル化すると同時に、所有権、借用、参照カウントを通してメモリ安全性を管理するという、2つの目的を果たすユニークなものです。この統合は、正しいプログラムロジックを保証する同じ型チェックが、コンパイル時にメモリリーク、ダブルフリーエラー、レースコンディションを排除することも意味します。間違った答えは、Rustには存在しないメカニズムについて述べています：コンパイラはgenerateのアロケーション・ルーチンを自動生成しませんし、メモリ・アドレスはコンパイル時の定数である必要はありません。
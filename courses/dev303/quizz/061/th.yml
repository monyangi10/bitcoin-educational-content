question: ความแตกต่างพื้นฐานระหว่างการประมวลผลมาโครและฟังก์ชันใน Rust คืออะไร?
answer: แมโครจะถูกขยายโดยคอมไพเลอร์ในช่วงเวลาคอมไพล์ก่อนที่การคอมไพล์จะเริ่มต้น ในขณะที่ฟังก์ชันจะถูกเรียกใช้ในช่วงเวลารันไทม์
wrong_answers:
  - แมโครใช้การจับคู่รูปแบบสำหรับการตรวจสอบประเภทในขณะที่ฟังก์ชันใช้การวิเคราะห์แบบสถิติเพื่อการตรวจสอบความถูกต้องในขณะรันไทม์
  - มาโคร generate ปรับปรุงโค้ดแอสเซมบลีโดยตรง ในขณะที่ฟังก์ชันถูกตีความโดยเครื่องเสมือน Rust
  - แมโครจะถูกเก็บไว้ในหน่วยความจำระหว่างการทำงาน ในขณะที่ฟังก์ชันจะถูกโหลดจากดิสก์เมื่อถูกเรียกใช้
explanation: |
  คำตอบที่ถูกต้องระบุความแตกต่างทางเวลา: มาโครทำงานระหว่างการคอมไพล์ผ่านการขยายโค้ด ในขณะที่ฟังก์ชันทำงานระหว่างการรันไทม์ของโปรแกรม คำตอบที่ผิดทำให้เกิดความสับสนในแนวคิดการเขียนโปรแกรมต่างๆ - Rust ไม่ใช้เครื่องเสมือน ทั้งมาโครและฟังก์ชันผ่านการตรวจสอบประเภท (แต่ในขั้นตอนที่ต่างกัน) และไม่มีทั้งฟังก์ชันหรือมาโครที่ถูกโหลดจากดิสก์ระหว่างการทำงานในลักษณะที่อธิบายไว้
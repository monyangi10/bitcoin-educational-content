question: تفاوت اساسی بین نحوه پردازش ماکروها و توابع در Rust چیست؟
answer: ماکروها توسط کامپایلر در زمان کامپایل قبل از شروع کامپایل گسترش می‌یابند، در حالی که توابع در زمان اجرا فراخوانی می‌شوند.
wrong_answers:
  - ماکروها از تطبیق الگو برای بررسی نوع استفاده می‌کنند در حالی که توابع از تحلیل ایستا برای اعتبارسنجی در زمان اجرا استفاده می‌کنند.
  - ماکروهای generate کد اسمبلی بهینه‌شده را مستقیماً اجرا می‌کنند در حالی که توابع توسط ماشین مجازی Rust تفسیر می‌شوند.
  - ماکروها در حین اجرا در حافظه ذخیره می‌شوند در حالی که توابع هنگام فراخوانی از دیسک بارگذاری می‌شوند.
explanation: |
  پاسخ صحیح تفاوت زمانی کلیدی را شناسایی می‌کند: ماکروها در طول کامپایل از طریق گسترش کد عمل می‌کنند، در حالی که توابع در زمان اجرای برنامه اجرا می‌شوند. پاسخ‌های نادرست مفاهیم مختلف برنامه‌نویسی را اشتباه می‌گیرند - Rust از ماشین مجازی استفاده نمی‌کند، هم ماکروها و هم توابع تحت بررسی نوع قرار می‌گیرند (اما در مراحل مختلف)، و نه توابع و نه ماکروها به شیوه توصیف‌شده از دیسک در طول اجرا بارگذاری می‌شوند.
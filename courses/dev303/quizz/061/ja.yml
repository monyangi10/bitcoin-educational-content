question: Rustでのマクロと関数の処理方法の根本的な違いは何ですか？
answer: マクロはコンパイル開始前にコンパイラによって展開されるが、関数は実行時に呼び出される。
wrong_answers:
  - マクロは型チェックにパターンマッチングを使用し、関数は実行時の検証に静的解析を使用する。
  - 関数はRust仮想マシンで解釈されるが、マクロはgenerateで最適化されたアセンブリ・コードを直接使用する。
  - マクロは実行中にメモリに保存されるが、関数は呼び出されたときにディスクからロードされる。
explanation: |
  マクロはコンパイル時にコード拡張を行い、関数はプログラム実行時に実行されます。Rustは仮想マシンを使用せず、マクロも関数も型チェックを受け（ただし段階は異なる）、関数もマクロも記述された方法で実行中にディスクからロードされない。
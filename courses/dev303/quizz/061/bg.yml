question: Каква е основната разлика между обработката на макроси и функции в Rust?
answer: Макросите се разширяват от компилатора по време на компилиране, преди да започне компилирането, докато функциите се извикват по време на изпълнение
wrong_answers:
  - Макросите използват съвпадение на шаблони за проверка на типа, докато функциите използват статичен анализ за валидиране по време на изпълнение
  - Макроси generate оптимизиран асемблерен код директно, докато функциите се интерпретират от виртуалната машина Rust
  - Макросите се съхраняват в паметта по време на изпълнение, докато функциите се зареждат от диска при извикване
explanation: |
  Правилният отговор идентифицира ключовото времево разграничение: макросите работят по време на компилация чрез разширяване на кода, докато функциите се изпълняват по време на изпълнение на програмата. Неправилните отговори объркват различни концепции за програмиране - Rust не използва виртуална машина, както макросите, така и функциите преминават през проверка на типа (но на различни етапи) и нито функциите, нито макросите се зареждат от диска по време на изпълнение по описания начин.
question: 在 Rust 中，巨集和函數的處理方式有何基本差異？
answer: 巨集在編譯開始前由編譯器在編譯時展開，而函式則在執行時呼叫
wrong_answers:
  - 巨集使用模式匹配進行類型檢查，而函數則在執行時使用靜態分析進行驗證。
  - 巨集直接使用 generate 最佳化的組合程式碼，而函式則由 Rust 虛擬機器解釋
  - 巨集會在執行過程中儲存在記憶體中，而函式則會在呼叫時從磁碟載入。
explanation: |
  正確答案指出了關鍵的時間區別：巨集在編譯期間透過程式碼擴充運作，而函數則在程式執行期間執行。錯誤的答案混淆了各種程式設計概念 - Rust 並未使用虛擬機，巨集和函數都經過類型檢查 (但在不同階段)，而且在執行過程中，函數和巨集都不會以所述方式從磁碟載入。
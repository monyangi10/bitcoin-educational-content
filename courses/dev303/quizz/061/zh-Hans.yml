question: 宏和函数在 Rust 中的处理方式有什么本质区别？
answer: 宏在编译开始前由编译器在编译时展开，而函数则在运行时调用
wrong_answers:
  - 宏使用模式匹配进行类型检查，而函数则使用静态分析在运行时进行验证
  - 宏 generate 直接优化汇编代码，而函数则由 Rust 虚拟机解释
  - 宏在执行过程中存储在内存中，而函数在调用时从磁盘加载
explanation: |
  正确答案指出了关键的时间区别：宏在编译期间通过代码扩展运行，而函数在程序运行期间执行。错误答案混淆了各种编程概念--Rust 不使用虚拟机，宏和函数都要进行类型检查（但在不同阶段），而且函数和宏在执行过程中都不会以所述方式从磁盘加载。
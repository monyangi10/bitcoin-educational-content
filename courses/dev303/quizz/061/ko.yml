question: Rust에서 매크로와 함수가 처리되는 방식의 근본적인 차이점은 무엇인가요?
answer: 매크로는 컴파일이 시작되기 전 컴파일 타임에 컴파일러에 의해 확장되는 반면 함수는 런타임에 호출됩니다
wrong_answers:
  - 매크로는 유형 검사를 위해 패턴 매칭을 사용하고 함수는 런타임에 유효성 검사를 위해 정적 분석을 사용합니다
  - 매크로 generate은 어셈블리 코드를 직접 최적화하고 함수는 Rust 가상 머신에서 해석합니다
  - 매크로는 실행 중에 메모리에 저장되고 함수가 호출될 때 디스크에서 로드됩니다
explanation: |
  정답은 매크로는 코드 확장을 통해 컴파일 중에 작동하는 반면 함수는 프로그램 런타임 중에 실행된다는 중요한 시간적 차이를 파악하고 있습니다. 오답은 다양한 프로그래밍 개념을 혼동하고 있습니다. Rust는 가상 머신을 사용하지 않으며, 매크로와 함수 모두 유형 검사를 거치지만 단계가 다르며, 함수나 매크로 모두 설명된 방식으로 실행 중에 디스크에서 로드되지 않습니다.
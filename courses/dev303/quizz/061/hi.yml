question: Rust में मैक्रो और फंक्शन को प्रोसेस करने के तरीके में मूलभूत अंतर क्या है?
answer: संकलन शुरू होने से पहले कंपाइलर द्वारा मैक्रो का विस्तार किया जाता है, जबकि फ़ंक्शन रनटाइम पर कॉल किए जाते हैं।
wrong_answers:
  - मैक्रो टाइप चेकिंग के लिए पैटर्न मैचिंग का उपयोग करते हैं, जबकि फ़ंक्शन रनटाइम पर सत्यापन के लिए स्टैटिक विश्लेषण का उपयोग करते हैं।
  - generate में मैक्रो सीधे असेंबली कोड को अनुकूलित करते हैं जबकि Rust में फ़ंक्शन वर्चुअल मशीन द्वारा व्याख्या किए जाते हैं।
  - मैक्रो को निष्पादन के दौरान मेमोरी में संग्रहीत किया जाता है, जबकि फ़ंक्शन को कॉल किए जाने पर डिस्क से लोड किया जाता है।
explanation: |
  सही उत्तर समय के मुख्य अंतर को स्पष्ट करता है: मैक्रो कोड विस्तार के माध्यम से संकलन के दौरान कार्य करते हैं, जबकि फ़ंक्शन प्रोग्राम रनटाइम के दौरान निष्पादित होते हैं। गलत उत्तर विभिन्न प्रोग्रामिंग अवधारणाओं को भ्रमित करते हैं - Rust वर्चुअल मशीन का उपयोग नहीं करता है, मैक्रो और फ़ंक्शन दोनों की टाइप जाँच की जाती है (लेकिन अलग-अलग चरणों में), और न ही फ़ंक्शन और न ही मैक्रो को वर्णित तरीके से निष्पादन के दौरान डिस्क से लोड किया जाता है।
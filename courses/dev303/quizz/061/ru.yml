question: В чем принципиальная разница между тем, как обрабатываются макросы и функции в Rust?
answer: Макросы расширяются компилятором во время компиляции до начала компиляции, а функции вызываются во время выполнения
wrong_answers:
  - Макросы используют сопоставление образцов для проверки типов, а функции - статический анализ для проверки во время выполнения
  - Макросы generate оптимизируют ассемблерный код напрямую, а функции интерпретируются виртуальной машиной Rust
  - Макросы хранятся в памяти во время выполнения, а функции загружаются с диска при вызове
explanation: |
  Правильный ответ определяет ключевое временное различие: макросы работают во время компиляции через расширение кода, а функции выполняются во время выполнения программы. Неправильные ответы путают различные концепции программирования - Rust не использует виртуальную машину, и макросы, и функции проходят проверку типов (но на разных этапах), и ни функции, ни макросы не загружаются с диска во время выполнения описанным способом.
question: Какъв синтаксис се използва за дефиниране на параметри в затворите на Rust?
answer: Символи на тръбата (|) за ограждане на параметри
wrong_answers:
  - Скоби () за ограждане на параметри
  - Квадратни скоби [] за ограждане на параметри
  - Къдрави скоби {} за ограждане на параметри
explanation: |
  Затварянията Rust използват знаци за тръба (|) за дефиниране на параметри, което ги отличава от обикновените функции, които използват скоби. Например затваряне без параметри се записва като ||, докато затваряне с параметри изглежда като |x, y|. Този уникален синтаксис прави затварянията лесно разпознаваеми и ги разграничава от дефинициите на функции. Скобите се използват за обикновените функции, докато квадратните скоби и къдравите скоби служат за други цели в синтаксиса на Rust.
question: Rust 클로저에서 매개변수를 정의하는 데 어떤 구문이 사용되나요?
answer: 파이프 문자(|)로 매개변수를 묶는 방법
wrong_answers:
  - 매개 변수를 괄호()로 묶는 방법
  - 매개 변수를 둘러싸는 대괄호 []를 사용합니다
  - 중괄호 {}를 사용하여 매개 변수를 묶습니다
explanation: |
  Rust 클로저는 파이프 문자(|)를 사용하여 매개변수를 정의하므로 괄호를 사용하는 일반 함수와 구별됩니다. 예를 들어 매개변수가 없는 클로저는 ||로 작성되는 반면, 매개변수가 있는 클로저는 |x, y|처럼 보입니다. 이 독특한 구문 덕분에 클로저를 쉽게 알아볼 수 있고 함수 정의와 구분할 수 있습니다. 괄호는 일반 함수에 사용되는 반면, 대괄호와 중괄호는 Rust 구문에서 다른 용도로 사용됩니다.
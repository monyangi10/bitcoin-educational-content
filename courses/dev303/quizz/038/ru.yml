question: Какой синтаксис используется для определения параметров в закрытиях Rust?
answer: Символы трубы (|) для заключения параметров
wrong_answers:
  - Скобки () для заключения параметров
  - Квадратные скобки [] для заключения параметров
  - Фигурные скобки {} для заключения параметров
explanation: |
  В закрытиях Rust для определения параметров используются символы трубы (|), что отличает их от обычных функций, в которых используются круглые скобки. Например, закрытие без параметров записывается как ||, а закрытие с параметрами выглядит как |x, y|. Этот уникальный синтаксис делает закрытия легко узнаваемыми и отличает их от определений функций. Скобки используются для обычных функций, в то время как квадратные и фигурные скобки служат для других целей в синтаксисе Rust.
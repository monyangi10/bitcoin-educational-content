question: What syntax is used to define parameters in Rust closures?
answer: Pipe characters (|) to enclose parameters
wrong_answers:
  - Parentheses () to enclose parameters
  - Square brackets [] to enclose parameters
  - Curly braces {} to enclose parameters
explanation: |
  Rust closures use pipe characters (|) to define parameters, which distinguishes them from regular functions that use parentheses. For example, a closure with no parameters is written as ||, while a closure with parameters looks like |x, y|. This unique syntax makes closures easily recognizable and differentiates them from function definitions. Parentheses are used for regular functions, while square brackets and curly braces serve other purposes in Rust syntax.

question: Rustのクロージャでパラメータを定義するには、どのような構文を使うのですか？
answer: パラメータを囲むパイプ文字 (|)
wrong_answers:
  - 括弧（）でパラメータを囲む
  - 角括弧 [] でパラメータを囲む
  - 中括弧 {} でパラメータを囲む
explanation: |
  Rustクロージャは、パラメータを定義するためにパイプ文字(|)を使い、括弧を使う通常の関数と区別します。例えば、パラメータを持たないクロージャは || と書かれ、パラメータを持つクロージャは |x, y| のようになります。このユニークな構文により、クロージャを簡単に認識でき、関数定義と区別することができます。括弧は通常の関数に使用され、角括弧と中括弧はRustの構文で他の目的に使用されます。
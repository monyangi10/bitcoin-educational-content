question: ไวยากรณ์ใดที่ใช้ในการกำหนดพารามิเตอร์ใน Rust closures?
answer: ใช้เครื่องหมายท่อ (|) เพื่อครอบคลุมพารามิเตอร์
wrong_answers:
  - วงเล็บ () เพื่อปิดล้อมพารามิเตอร์
  - ใช้วงเล็บเหลี่ยม [] เพื่อครอบพารามิเตอร์
  - วงเล็บปีกกา {} เพื่อครอบพารามิเตอร์
explanation: |
  Rust closures ใช้เครื่องหมายท่อ (|) เพื่อกำหนดพารามิเตอร์ ซึ่งทำให้แตกต่างจากฟังก์ชันปกติที่ใช้วงเล็บ ตัวอย่างเช่น closure ที่ไม่มีพารามิเตอร์จะเขียนเป็น || ในขณะที่ closure ที่มีพารามิเตอร์จะเขียนเป็น |x, y| ไวยากรณ์ที่เป็นเอกลักษณ์นี้ทำให้ closures สามารถจดจำได้ง่ายและแยกแยะจากการกำหนดฟังก์ชัน วงเล็บถูกใช้สำหรับฟังก์ชันปกติ ในขณะที่วงเล็บเหลี่ยมและวงเล็บปีกกามีวัตถุประสงค์อื่นในไวยากรณ์ของ Rust
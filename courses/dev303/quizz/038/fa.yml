question: برای تعریف پارامترها در بسته‌های Rust از چه نحوی استفاده می‌شود؟
answer: کاراکترهای پایپ (|) برای محصور کردن پارامترها
wrong_answers:
  - پرانتز () برای محصور کردن پارامترها
  - براکت‌های مربعی [] برای محصور کردن پارامترها
  - آکولاد {} برای محصور کردن پارامترها
explanation: |
  بسته‌های Rust از کاراکترهای لوله‌ای (|) برای تعریف پارامترها استفاده می‌کنند، که آن‌ها را از توابع معمولی که از پرانتز استفاده می‌کنند متمایز می‌سازد. به عنوان مثال، یک بسته بدون پارامتر به صورت || نوشته می‌شود، در حالی که یک بسته با پارامترها به صورت |x, y| است. این نحو منحصر به فرد باعث می‌شود بسته‌ها به راحتی قابل تشخیص باشند و از تعریف توابع متمایز شوند. پرانتزها برای توابع معمولی استفاده می‌شوند، در حالی که براکت‌های مربعی و آکولادها در نحو Rust برای مقاصد دیگر به کار می‌روند.
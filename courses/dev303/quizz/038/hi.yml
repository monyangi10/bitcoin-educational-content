question: Rust क्लोजर में पैरामीटर परिभाषित करने के लिए किस सिंटैक्स का उपयोग किया जाता है?
answer: पैरामीटरों को घेरने के लिए पाइप वर्णों (|) का उपयोग करें
wrong_answers:
  - पैरामीटरों को कोष्ठकों () में बंद किया जाता है
  - पैरामीटरों को वर्गाकार कोष्ठकों [] में बंद करें
  - पैरामीटरों को घेरने के लिए घुंघराले कोष्ठक {} का उपयोग किया जाता है।
explanation: |
  Rust क्लोज़र में पैरामीटर परिभाषित करने के लिए पाइप कैरेक्टर (|) का उपयोग किया जाता है, जो इन्हें कोष्ठक (parentheses) का उपयोग करने वाले सामान्य फ़ंक्शन से अलग करता है। उदाहरण के लिए, बिना पैरामीटर वाले क्लोज़र को || के रूप में लिखा जाता है, जबकि पैरामीटर वाले क्लोज़र को |x, y| के रूप में लिखा जाता है। यह विशिष्ट सिंटैक्स क्लोज़र को आसानी से पहचानने योग्य बनाता है और उन्हें फ़ंक्शन परिभाषाओं से अलग करता है। सामान्य फ़ंक्शन के लिए कोष्ठक का उपयोग किया जाता है, जबकि वर्गाकार कोष्ठक और घुंघराले कोष्ठक Rust सिंटैक्स में अन्य उद्देश्यों के लिए उपयोग किए जाते हैं।
question: В чем заключается основное архитектурное преимущество, позволяющее Breez SDK устранить традиционный для Lightning Network барьер ручного открытия каналов для новых пользователей?
answer: Интегрированная функция Lightning Service Provider (LSP), которая автоматически обеспечивает входящую ликвидность после установки wallet
wrong_answers:
  - Встроенные услуги подводной подмены, которые преобразуют каналы on-chain Bitcoin в каналы Lightning без вмешательства пользователя
  - Предварительно профинансированные пулы каналов, управляемые Greenlight, динамически распределяются между пользователями в зависимости от спроса
  - Механизмы автоматического обнаружения пиров, которые соединяют новые кошельки с высоколиквидными узлами для мгновенного создания канала
explanation: |
  Интегрированная в Breez SDK функциональность LSP специально разработана для устранения барьера ручного открытия канала путем автоматического обеспечения входящей ликвидности, когда пользователи устанавливают wallet. Это позволяет немедленно принимать платежи без технической настройки. Подводные свопы справляются с преобразованием уровней, но не решают проблему первоначального предоставления канала. Пулы с предварительным финансированием и обнаружение аналогов не являются механизмами, которые использует Breez - вместо этого интеграция LSP напрямую обеспечивает необходимую входящую емкость для новых пользователей, чтобы они могли немедленно получать платежи.
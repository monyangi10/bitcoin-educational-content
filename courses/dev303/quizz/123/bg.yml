question: Кое е основното архитектурно предимство, което позволява на Breez SDK да премахне традиционната бариера на Lightning Network за ръчно отваряне на канали за нови потребители?
answer: Интегрирана функционалност на доставчика на услуги Lightning (LSP), която автоматично осигурява входяща ликвидност при инсталиране на wallet
wrong_answers:
  - Вградени услуги за подводна смяна, които преобразуват on-chain Bitcoin в Lightning канали без намесата на потребителя
  - Предварително финансирани канали, управлявани от Greenlight, които се разпределят динамично между потребителите в зависимост от търсенето
  - Механизми за автоматично откриване на равнопоставени партньори, които свързват нови портфейли с възли с висока ликвидност за незабавно създаване на канал
explanation: |
  Интегрираната функционалност на LSP в Breez SDK е специално проектирана да премахне бариерата за ръчно отваряне на канала, като автоматично осигурява входяща ликвидност, когато потребителите инсталират своя wallet. Това позволява незабавно получаване на плащания без техническа настройка. Подводните суичове се справят с преобразуването на слоевете, но не решават проблема с първоначалното осигуряване на канала. Предварително финансираните пулове и откриването на партньори не са механизмите, които Breez използва - вместо това интеграцията на LSP директно осигурява необходимия входящ капацитет за новите потребители, за да получават плащания незабавно.
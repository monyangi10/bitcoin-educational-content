question: Breez SDK का वह प्राथमिक वास्तुशिल्पीय लाभ क्या है जो इसे नए उपयोगकर्ताओं के लिए मैन्युअल चैनल खोलने की पारंपरिक Lightning Network बाधा को दूर करने में सक्षम बनाता है?
answer: एकीकृत लाइटनिंग सर्विस प्रोवाइडर (एलएसपी) कार्यक्षमता जो wallet की स्थापना पर स्वचालित रूप से इनबाउंड लिक्विडिटी प्रदान करती है
wrong_answers:
  - अंतर्निहित सबमरीन स्वैप सेवाएं जो उपयोगकर्ता के हस्तक्षेप के बिना on-chain और Bitcoin को लाइटनिंग चैनलों में परिवर्तित करती हैं
  - ग्रीनलाइट द्वारा प्रबंधित पूर्व-वित्तपोषित चैनल पूल, जो मांग के आधार पर उपयोगकर्ताओं को गतिशील रूप से आवंटित किए जाते हैं।
  - स्वचालित पीयर डिस्कवरी तंत्र जो नए वॉलेट को उच्च-तरलता वाले नोड्स से जोड़कर तत्काल चैनल निर्माण सुनिश्चित करते हैं।
explanation: |
  Breez SDK की एकीकृत LSP कार्यक्षमता विशेष रूप से उपयोगकर्ताओं द्वारा wallet स्थापित करने पर स्वचालित रूप से इनबाउंड लिक्विडिटी प्रदान करके मैन्युअल चैनल खोलने की बाधा को दूर करने के लिए डिज़ाइन की गई है। इससे तकनीकी सेटअप के बिना तत्काल भुगतान प्राप्त करना संभव हो जाता है। सबमरीन स्वैप लेयर रूपांतरण को संभालते हैं लेकिन प्रारंभिक चैनल प्रोविज़निंग को संबोधित नहीं करते हैं। प्री-फंडेड पूल और पीयर डिस्कवरी वे तंत्र नहीं हैं जिनका उपयोग Breez करता है - इसके बजाय, LSP एकीकरण सीधे नए उपयोगकर्ताओं को तत्काल भुगतान प्राप्त करने के लिए आवश्यक इनबाउंड क्षमता प्रदान करता है।
question: Quel est le principal avantage architectural qui permet au SDK Breez d'éliminer la barrière traditionnelle Lightning Network de l'ouverture manuelle des canaux pour les nouveaux utilisateurs ?
answer: Fonctionnalité Lightning Service Provider (LSP) intégrée, qui fournit automatiquement des liquidités entrantes lors de l'installation du wallet.
wrong_answers:
  - Services de permutation sous-marine intégrés qui convertissent les canaux on-chain Bitcoin en canaux Lightning sans intervention de l'utilisateur.
  - Des pools de canaux préfinancés gérés par Greenlight et attribués dynamiquement aux utilisateurs en fonction de la demande.
  - Mécanismes de découverte automatique des pairs qui connectent les nouveaux portefeuilles à des nœuds à forte liquidité pour la création instantanée de canaux.
explanation: |
  La fonctionnalité LSP intégrée au SDK Breez est spécialement conçue pour éliminer l'obstacle de l'ouverture manuelle des canaux en fournissant automatiquement des liquidités entrantes lorsque les utilisateurs installent leur wallet. Cela permet une réception immédiate des paiements sans configuration technique. Les swaps sous-marins gèrent la conversion des couches mais n'abordent pas la question de l'approvisionnement initial des canaux. Les pools préfinancés et la découverte des pairs ne sont pas les mécanismes utilisés par le Breez. Au lieu de cela, l'intégration des LSP fournit directement la capacité entrante nécessaire pour que les nouveaux utilisateurs puissent recevoir des paiements immédiatement.

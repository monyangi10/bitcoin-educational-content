question: ข้อได้เปรียบทางสถาปัตยกรรมหลักที่ทำให้ Breez SDK สามารถขจัดอุปสรรค Lightning Network แบบดั้งเดิมในการเปิดช่องทางด้วยตนเองสำหรับผู้ใช้ใหม่คืออะไร?
answer: ฟังก์ชันการทำงานของผู้ให้บริการสายฟ้าแบบบูรณาการ (LSP) ที่จัดเตรียมสภาพคล่องขาเข้าโดยอัตโนมัติเมื่อทำการติดตั้ง wallet
wrong_answers:
  - บริการแลกเปลี่ยนเรือดำน้ำในตัวที่แปลง on-chain Bitcoin เป็นช่องทาง Lightning โดยไม่ต้องมีการแทรกแซงจากผู้ใช้
  - ช่องทางที่ได้รับการสนับสนุนล่วงหน้าที่บริหารโดย Greenlight ซึ่งถูกจัดสรรให้กับผู้ใช้อย่างไดนามิกตามความต้องการ
  - กลไกการค้นหาเพื่อนอัตโนมัติที่เชื่อมต่อกระเป๋าเงินใหม่กับโหนดที่มีสภาพคล่องสูงเพื่อการสร้างช่องทางทันที
explanation: |
  ฟังก์ชัน LSP ที่รวมอยู่ใน Breez SDK ได้รับการออกแบบมาโดยเฉพาะเพื่อขจัดอุปสรรคในการเปิดช่องทางแบบแมนนวลโดยการจัดหาสภาพคล่องขาเข้าโดยอัตโนมัติเมื่อผู้ใช้ติดตั้ง wallet ของพวกเขา สิ่งนี้ช่วยให้การรับชำระเงินทันทีโดยไม่ต้องตั้งค่าทางเทคนิค การแลกเปลี่ยน Submarine จัดการการแปลงเลเยอร์แต่ไม่แก้ไขการจัดเตรียมช่องทางเริ่มต้น สระที่มีเงินทุนล่วงหน้าและการค้นหาเพื่อนไม่ใช่กลไกที่ Breez ใช้ - แต่การรวม LSP จะให้ความจุขาเข้าที่จำเป็นโดยตรงสำหรับผู้ใช้ใหม่เพื่อรับการชำระเงินทันที
question: Qual é a principal vantagem arquitetónica que permite ao Breez SDK eliminar a barreira tradicional do Lightning Network de abertura manual de canais para novos utilizadores?
answer: Funcionalidade LSP (Lightning Service Provider) integrada que provisiona automaticamente a liquidez de entrada após a instalação do wallet
wrong_answers:
  - Serviços de troca submarina integrados que convertem on-chain Bitcoin em canais Lightning sem intervenção do utilizador
  - Grupos de canais pré-financiados geridos pelo Greenlight que são atribuídos dinamicamente aos utilizadores com base na procura
  - Mecanismos automáticos de descoberta de pares que ligam novas carteiras a nós de elevada liquidez para a criação instantânea de canais
explanation: |
  A funcionalidade LSP integrada do Breez SDK foi especificamente concebida para eliminar a barreira da abertura manual de canais, fornecendo automaticamente liquidez de entrada quando os utilizadores instalam o seu wallet. Isto permite a receção imediata de pagamentos sem configuração técnica. As trocas submarinas tratam da conversão de camadas, mas não abordam o provisionamento inicial do canal. Os pools pré-financiados e a descoberta de pares não são os mecanismos utilizados pelo Breez - em vez disso, a integração do LSP fornece diretamente a capacidade de entrada necessária para que os novos utilizadores recebam pagamentos imediatamente.
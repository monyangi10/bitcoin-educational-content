question: Breez SDK가 신규 사용자를 위한 수동 채널 개설이라는 기존의 Lightning Network 장벽을 제거할 수 있는 주요 아키텍처적 이점은 무엇인가요?
answer: wallet 설치 시 인바운드 유동성을 자동으로 프로비저닝하는 통합 라이트닝 서비스 공급자(LSP) 기능
wrong_answers:
  - 사용자 개입 없이 on-chain Bitcoin를 라이트닝 채널로 변환하는 내장형 서브마린 스왑 서비스
  - 수요에 따라 사용자에게 동적으로 할당되는 Greenlight에서 관리하는 사전 자금 지원 채널 풀
  - 새로운 지갑을 유동성이 높은 노드에 연결하여 즉시 채널을 생성하는 자동 피어 검색 메커니즘
explanation: |
  Breez SDK의 통합 LSP 기능은 사용자가 wallet를 설치할 때 자동으로 인바운드 유동성을 제공함으로써 수동 채널 개설 장벽을 제거하도록 특별히 설계되었습니다. 따라서 기술적인 설정 없이도 즉시 결제를 받을 수 있습니다. 서브마린 스왑은 레이어 변환을 처리하지만 초기 채널 프로비저닝은 처리하지 않습니다. 사전 자금 풀과 피어 디스커버리는 Breez가 사용하는 메커니즘이 아니며, 대신 LSP 통합을 통해 신규 사용자가 즉시 결제를 받을 수 있도록 필요한 인바운드 용량을 직접 제공합니다.
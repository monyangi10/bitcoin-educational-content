question: Breez SDKが、Lightning Networkの伝統的な障壁であった新規ユーザーのための手動チャネル開設を排除することを可能にする、アーキテクチャ上の主な利点は何ですか？
answer: walletのインストール時にインバウンド流動性を自動的にプロビジョニングする統合ライトニング・サービス・プロバイダー（LSP）機能
wrong_answers:
  - ユーザーの介入なしにon-chain Bitcoinをライトニング・チャンネルに変換するサブマリン・スワップ・サービスを内蔵
  - Greenlightが管理する、需要に応じてユーザーに動的に割り当てられる事前資金提供型チャンネルプール
  - 新しいウォレットを流動性の高いノードに接続し、即座にチャネルを作成する自動ピア発見メカニズム
explanation: |
  Breez SDKの統合LSP機能は、ユーザーがwalletをインストールする際に自動的にインバウンド流動性を提供することで、手動チャネル開設の障壁を排除するために特別に設計されています。これにより、技術的なセットアップなしに即座に支払いを受け取ることができます。サブマリンスワップはレイヤー変換を処理しますが、初期チャネルのプロビジョニングには対応しません。その代わり、LSPの統合により、新規ユーザーが即座に支払いを受け取るために必要なインバウンド容量が直接提供されます。
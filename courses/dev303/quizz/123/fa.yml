question: مزیت اصلی معماری که به Breez SDK امکان می‌دهد تا مانع سنتی Lightning Network در باز کردن دستی کانال برای کاربران جدید را از بین ببرد چیست؟
answer: قابلیت ارائه‌دهنده خدمات رعد و برق یکپارچه (LSP) که به‌طور خودکار نقدینگی ورودی را پس از نصب wallet فراهم می‌کند.
wrong_answers:
  - خدمات تعویض زیردریایی داخلی که on-chain Bitcoin را به کانال‌های Lightning تبدیل می‌کنند بدون دخالت کاربر
  - استخرهای کانال پیش‌تأمین‌شده که توسط Greenlight مدیریت می‌شوند و به‌طور پویا بر اساس تقاضا به کاربران اختصاص می‌یابند.
  - مکانیزم‌های کشف خودکار همتا که کیف‌پول‌های جدید را به نودهای با نقدینگی بالا برای ایجاد فوری کانال متصل می‌کنند
explanation: |
  عملکرد LSP یکپارچه در SDK Breez به‌طور خاص برای از بین بردن مانع باز کردن کانال دستی طراحی شده است، با ارائه خودکار نقدینگی ورودی زمانی که کاربران wallet خود را نصب می‌کنند. این امکان دریافت پرداخت فوری بدون تنظیمات فنی را فراهم می‌کند. مبادلات زیرآبی تبدیل لایه را مدیریت می‌کنند اما به تأمین اولیه کانال نمی‌پردازند. استخرهای پیش‌پرداخت شده و کشف همتا مکانیزم‌هایی نیستند که Breez استفاده می‌کند - در عوض، یکپارچه‌سازی LSP به‌طور مستقیم ظرفیت ورودی لازم را برای کاربران جدید فراهم می‌کند تا بلافاصله پرداخت‌ها را دریافت کنند.
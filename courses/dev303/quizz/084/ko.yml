question: Rust 라이브러리를 Swift 또는 Kotlin과 같은 대상 언어와 통합할 때 UniFFI의 계층화된 접근 방식의 주요 아키텍처적 이점은 무엇인가요?
answer: 바인딩 계층은 유형 번역 및 메모리 관리를 처리하는 동시에 대상 언어에 대한 완전한 네이티브 인터페이스를 제공합니다
wrong_answers:
  - UDL 파일은 Rust 코드를 번역 없이 모바일 플랫폼에서 기본적으로 실행할 수 있는 바이트코드로 자동 컴파일합니다
  - Rust 라이브러리 코드는 타깃 언어 구문으로 자동 재작성되어 외부 함수 인터페이스 호출을 제거합니다
  - 대상 언어 애플리케이션은 데이터 마샬링 오버헤드를 피하기 위해 공유 포인터를 통해 Rust 메모리 구조에 직접 액세스합니다
explanation: |
  UniFFI의 아키텍처는 생성된 바인딩 코드가 대상 언어와 Rust 사이의 번역 레이어 역할을 하는 분리된 구조를 만듭니다. 이 계층은 데이터 유형의 복잡한 마샬링/언마샬링을 처리하고 언어 경계를 넘어 메모리를 안전하게 관리하며 대상 언어 규칙에 따른 오류 처리를 제공합니다. UniFFI는 바이트코드로 컴파일하지 않고(바인딩 생성), 다른 언어로 Rust 코드를 다시 작성하지 않으며(원래 Rust 구현 유지), 공유 메모리 액세스를 사용하지 않으므로(경계를 넘어 데이터를 안전하게 마샬링) 다른 옵션은 올바르지 않습니다.
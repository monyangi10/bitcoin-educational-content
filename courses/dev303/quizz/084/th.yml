question: ประโยชน์หลักทางสถาปัตยกรรมของการใช้วิธีการแบบชั้นของ UniFFI เมื่อรวมไลบรารี Rust เข้ากับภาษาเป้าหมายเช่น Swift หรือ Kotlin คืออะไร?
answer: ชั้นการผูกมัดจัดการการแปลประเภทและการจัดการหน่วยความจำในขณะที่นำเสนออินเทอร์เฟซที่เป็นเนทีฟอย่างสมบูรณ์ให้กับภาษาที่เป็นเป้าหมาย
wrong_answers:
  - ไฟล์ UDL จะทำการคอมไพล์โค้ด Rust เป็นไบต์โค้ดโดยอัตโนมัติ ซึ่งสามารถรันได้โดยตรงบนแพลตฟอร์มมือถือโดยไม่ต้องแปล
  - โค้ดไลบรารี Rust จะถูกเขียนใหม่โดยอัตโนมัติในไวยากรณ์ของภาษาปลายทางเพื่อกำจัดการเรียกใช้งานอินเตอร์เฟซฟังก์ชันต่างประเทศ
  - แอปพลิเคชันภาษาเป้าหมายเข้าถึงโครงสร้างหน่วยความจำ Rust โดยตรงผ่านตัวชี้ที่ใช้ร่วมกันเพื่อหลีกเลี่ยงค่าใช้จ่ายในการจัดการข้อมูล
explanation: |
  สถาปัตยกรรมของ UniFFI สร้างการแยกส่วนที่โค้ดการผูกที่สร้างขึ้นทำหน้าที่เป็นชั้นแปลระหว่างภาษาที่ต้องการและ Rust ชั้นนี้จัดการการแปลงข้อมูลประเภทที่ซับซ้อน การจัดการหน่วยความจำอย่างปลอดภัยข้ามขอบเขตภาษา และจัดการข้อผิดพลาดตามธรรมเนียมของภาษาที่ต้องการ ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะ UniFFI ไม่ได้คอมไพล์เป็นไบต์โค้ด (มันสร้างการผูก) ไม่ได้เขียนโค้ด Rust ใหม่ในภาษาอื่น (มันรักษาการดำเนินการ Rust ดั้งเดิม) และไม่ได้ใช้การเข้าถึงหน่วยความจำร่วมกัน (มันแปลงข้อมูลข้ามขอบเขตอย่างปลอดภัย)
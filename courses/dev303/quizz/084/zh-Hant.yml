question: 在將 Rust 函式庫與 Swift 或 Kotlin 等目標語言整合時，UniFFI 的分層方法在架構上的主要優點是什麼？
answer: 綁定層處理類型轉換和記憶體管理，同時為目標語言提供完全本機的介面。
wrong_answers:
  - UDL 檔案會自動將 Rust 程式碼編譯成可在行動平台上原生執行的 bytecode，無須翻譯
  - Rust 函式庫程式碼會自動以目標語言的語法重寫，以消除任何外來函式介面的呼叫
  - 目標語言應用程式可透過共用指標直接存取 Rust 記憶體結構，以避免資料遷移開銷
explanation: |
  UniFFI 的架構創造了一個分離層，在這個分離層中，產生的綁定程式碼作為目標語言與 Rust 之間的轉譯層。這層會處理複雜的資料類型的 marshaling/unmarshaling、跨語言邊界安全地管理記憶體，並依據目標語言的慣例提供錯誤處理。其他選項是不正確的，因為 UniFFI 不會編譯為 bytecode (它會產生綁定程式碼)、不會在其他語言中重寫 Rust 程式碼 (它會保留原始的 Rust 實作)、不會使用共用記憶體存取 (它會安全地跨區域遷移資料)。
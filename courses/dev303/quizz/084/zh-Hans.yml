question: 在将 Rust 库与 Swift 或 Kotlin 等目标语言集成时，UniFFI 的分层方法在架构上的主要优势是什么？
answer: 绑定层处理类型转换和内存管理，同时为目标语言提供完全本地化的界面
wrong_answers:
  - UDL 文件可自动将 Rust 代码编译成字节码，无需翻译即可在移动平台上本地运行
  - Rust 库代码会自动按目标语言语法重写，以消除任何外来函数接口调用
  - 目标语言应用程序通过共享指针直接访问 Rust 内存结构，以避免数据编译开销
explanation: |
  UniFFI 的架构创建了一个分离层，生成的绑定代码在目标语言和 Rust 之间充当翻译层。该层处理复杂的数据类型迁移/解迁移，安全地管理跨语言边界的内存，并按照目标语言约定提供错误处理。其他选项都是不正确的，因为 UniFFI 不会编译成字节码（它会生成绑定代码），不会用其他语言重写 Rust 代码（它会保留原始的 Rust 实现），也不会使用共享内存访问（它会安全地跨边界交换数据）。
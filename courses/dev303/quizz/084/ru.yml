question: В чем главное архитектурное преимущество многоуровневого подхода UniFFI при интеграции библиотек Rust с целевыми языками, такими как Swift или Kotlin?
answer: Слой связывания обрабатывает трансляцию типов и управление памятью, представляя при этом полностью "родной" интерфейс для целевого языка
wrong_answers:
  - Файл UDL автоматически компилирует код Rust в байткод, который может работать на мобильных платформах без перевода
  - Код библиотеки Rust автоматически переписывается в синтаксисе целевого языка, чтобы исключить любые вызовы интерфейса посторонних функций
  - Приложения целевого языка напрямую обращаются к структурам памяти Rust через общие указатели, чтобы избежать накладных расходов на маршалинг данных
explanation: |
  Архитектура UniFFI создает разделение, в котором генерируемый код связывания выступает в качестве слоя трансляции между целевым языком и Rust. Этот слой обрабатывает сложные маршалинги и размаршалинги типов данных, безопасно управляет памятью на границах языка и обеспечивает обработку ошибок в соответствии с соглашениями целевого языка. Остальные варианты неверны, поскольку UniFFI не компилируется в байткод (он генерирует привязки), не переписывает код Rust на другие языки (он сохраняет оригинальную реализацию Rust) и не использует общий доступ к памяти (он безопасно маршалирует данные через границы).
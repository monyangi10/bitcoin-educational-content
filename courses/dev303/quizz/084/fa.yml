question: مزیت اصلی معماری رویکرد لایه‌ای UniFFI هنگام یکپارچه‌سازی کتابخانه‌های Rust با زبان‌های هدف مانند Swift یا Kotlin چیست؟
answer: لایه اتصال، ترجمه نوع و مدیریت حافظه را انجام می‌دهد و در عین حال یک رابط کاملاً بومی به زبان هدف ارائه می‌دهد.
wrong_answers:
  - فایل UDL به‌طور خودکار کد Rust را به بایت‌کدی تبدیل می‌کند که می‌تواند به‌صورت بومی بر روی پلتفرم‌های موبایل بدون نیاز به ترجمه اجرا شود.
  - کد کتابخانه Rust به‌طور خودکار در نحو زبان هدف بازنویسی می‌شود تا هرگونه فراخوانی رابط تابع خارجی را حذف کند.
  - برنامه‌های زبان هدف به‌طور مستقیم به ساختارهای حافظه Rust از طریق اشاره‌گرهای مشترک دسترسی پیدا می‌کنند تا از سربار انتقال داده جلوگیری کنند.
explanation: |
  معماری UniFFI جداسازی‌ای ایجاد می‌کند که در آن کدهای بایندینگ تولید شده به عنوان یک لایه ترجمه بین زبان هدف و Rust عمل می‌کنند. این لایه مدیریت پیچیده مارشالینگ/آنامارشالینگ انواع داده‌ها را بر عهده دارد، حافظه را به‌صورت ایمن در مرزهای زبانی مدیریت می‌کند و مدیریت خطا را بر اساس کنوانسیون‌های زبان هدف فراهم می‌کند. گزینه‌های دیگر نادرست هستند زیرا UniFFI به بایت‌کد کامپایل نمی‌شود (بلکه بایندینگ تولید می‌کند)، کد Rust را در زبان‌های دیگر بازنویسی نمی‌کند (اجرای اصلی Rust را حفظ می‌کند)، و از دسترسی به حافظه مشترک استفاده نمی‌کند (بلکه داده‌ها را به‌صورت ایمن در مرزها مارشال می‌کند).
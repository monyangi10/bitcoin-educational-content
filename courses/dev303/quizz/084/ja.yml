question: RustライブラリをSwiftやKotlinのようなターゲット言語と統合する場合、UniFFIのレイヤーアプローチの主なアーキテクチャ上の利点は何ですか？
answer: バインディング・レイヤーは、型変換とメモリー管理を行い、同時にターゲット言語への完全なネイティブ・インターフェースを提供する。
wrong_answers:
  - UDLファイルは、Rustコードを翻訳なしでモバイルプラットフォーム上でネイティブに実行できるバイトコードに自動的にコンパイルします。
  - Rustライブラリのコードは、ターゲット言語の構文で自動的に書き換えられ、外来関数のインターフェイス呼び出しがなくなります。
  - ターゲット言語アプリケーションは、データマーシャリングのオーバーヘッドを避けるために、共有ポインタを通してRustメモリ構造に直接アクセスします。
explanation: |
  UniFFIのアーキテクチャは、生成されたバインディングコードがターゲット言語とRustの間の翻訳レイヤーとして機能する分離を作り出します。このレイヤーはデータ型の複雑なマーシャリング/アンマーシャリングを処理し、言語の境界を越えてメモリを安全に管理し、ターゲット言語の規約に従ったエラー処理を提供します。UniFFIはバイトコードにコンパイルせず（バインディングを生成する）、Rustのコードを他の言語で書き直さず（オリジナルのRust実装を維持する）、共有メモリアクセスを使用しない（境界を越えて安全にデータをマーシャルする）ため、他のオプションは正しくありません。
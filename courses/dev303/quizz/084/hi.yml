question: Swift या Kotlin जैसी लक्ष्य भाषाओं के साथ Rust लाइब्रेरी को एकीकृत करते समय UniFFI के स्तरित दृष्टिकोण का प्राथमिक वास्तुशिल्पीय लाभ क्या है?
answer: बाइंडिंग लेयर टाइप ट्रांसलेशन और मेमोरी मैनेजमेंट को संभालती है, साथ ही लक्ष्य भाषा के लिए पूरी तरह से नेटिव इंटरफेस प्रस्तुत करती है।
wrong_answers:
  - UDL फ़ाइल स्वचालित रूप से Rust कोड को बाइटकोड में संकलित करती है जिसे बिना अनुवाद के मोबाइल प्लेटफ़ॉर्म पर मूल रूप से चलाया जा सकता है।
  - Rust लाइब्रेरी कोड को लक्ष्य भाषा के सिंटैक्स में स्वचालित रूप से पुनः लिखा जाता है ताकि किसी भी बाहरी फ़ंक्शन इंटरफ़ेस कॉल को हटाया जा सके।
  - लक्ष्य भाषा के अनुप्रयोग डेटा मार्शलिंग ओवरहेड से बचने के लिए साझा पॉइंटर्स के माध्यम से सीधे Rust मेमोरी संरचनाओं तक पहुँच प्राप्त करते हैं।
explanation: |
  UniFFI की संरचना एक ऐसा पृथक्करण बनाती है जहाँ उत्पन्न बाइंडिंग कोड लक्ष्य भाषा और Rust के बीच एक अनुवाद परत के रूप में कार्य करता है। यह परत डेटा प्रकारों के जटिल मार्शलिंग/अनमार्शलिंग को संभालती है, भाषा सीमाओं के पार मेमोरी को सुरक्षित रूप से प्रबंधित करती है, और लक्ष्य भाषा के नियमों के अनुसार त्रुटि प्रबंधन प्रदान करती है। अन्य विकल्प गलत हैं क्योंकि UniFFI बाइटकोड में संकलित नहीं होता (यह बाइंडिंग उत्पन्न करता है), Rust कोड को अन्य भाषाओं में पुनर्लिखित नहीं करता (यह मूल Rust कार्यान्वयन को बनाए रखता है), और साझा मेमोरी एक्सेस का उपयोग नहीं करता (यह सीमाओं के पार डेटा को सुरक्षित रूप से मार्शल करता है)।
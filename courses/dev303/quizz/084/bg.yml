question: Каква е основната архитектурна полза от многопластовия подход на UniFFI при интегрирането на библиотеки Rust с целеви езици като Swift или Kotlin?
answer: Свързващият слой се справя с превода на типове и управлението на паметта, като същевременно представя напълно естествен интерфейс на целевия език
wrong_answers:
  - Файлът UDL автоматично компилира кода на Rust в байткод, който може да работи на мобилни платформи без превод
  - Кодът на библиотеката Rust се пренаписва автоматично в синтаксиса на целевия език, за да се елиминират всички повиквания на интерфейса на чужди функции
  - Приложенията на целевия език имат директен достъп до структурите на паметта на Rust чрез споделени указатели, за да се избегне преразход на данни
explanation: |
  Архитектурата на UniFFI създава разделение, при което генерираният код за свързване действа като слой за превод между целевия език и Rust. Този слой се справя със сложното преобразуване на типове данни, управлява безопасно паметта между езиковите граници и осигурява обработка на грешки, следвайки конвенциите на целевия език. Другите варианти са некоректни, тъй като UniFFI не компилира до байткод (генерира обвързване), не пренаписва кода на Rust на други езици (поддържа оригиналната реализация на Rust) и не използва споделен достъп до паметта (безопасно маршализира данни през границите).
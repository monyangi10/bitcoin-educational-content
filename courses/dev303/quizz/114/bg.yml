question: Кой е основният механизъм за сигурност, който гарантира, че инфраструктурата на Greenlight няма достъп до средствата на потребителите, въпреки че разполага с възли Lightning в облака?
answer: Частните ключове никога не напускат устройствата на потребителите и всички операции изискват активно подписване на приложенията
wrong_answers:
  - Портфейли с множество подписи с разпределени части от ключове в множество доставчици на облачни услуги
  - Хардуерни модули за сигурност, които криптират всички транзакции преди обработка в облака
  - Интелигентни договори с времево заключване, които автоматично връщат средства при неоторизиран достъп
explanation: |
  Breez SDK поддържа сигурността чрез архитектура без доверие, при която частните ключове остават изключително на потребителските устройства. Въпреки че Greenlight е домакин на инфраструктурата на възела Lightning, той не може да извършва никакви операции без активно свързано приложение, което може да подписва транзакции и съобщения. Този дизайн гарантира, че въпреки че възелът работи в облака, Greenlight никога няма достъп до потребителските ключове и не може да премества средства без изрична оторизация от страна на потребителя чрез неговото локално приложение. Другите варианти описват различни механизми за сигурност, които не се използват в тази архитектура.
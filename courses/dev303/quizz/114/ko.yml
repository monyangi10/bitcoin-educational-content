question: 클라우드에서 라이트닝 노드를 호스팅하더라도 그린라이트 인프라가 사용자 자금에 액세스할 수 없도록 보장하는 기본 보안 메커니즘은 무엇인가요?
answer: 개인 키는 사용자 디바이스를 떠나지 않으며 모든 작업에는 활성 애플리케이션 서명이 필요합니다
wrong_answers:
  - 여러 클라우드 제공업체에 키 샤드가 분산된 다중 서명 지갑
  - 클라우드 처리 전에 모든 트랜잭션을 암호화하는 하드웨어 보안 모듈
  - 무단 액세스가 발생하면 자동으로 자금을 반환하는 시간 잠금 스마트 컨트랙트
explanation: |
  Breez SDK는 개인 키가 사용자 디바이스에만 유지되는 신뢰 없는 아키텍처를 통해 보안을 유지합니다. 그린라이트는 라이트닝 노드 인프라를 호스팅하지만, 트랜잭션과 메시지에 서명할 수 있는 애플리케이션이 활발하게 연결되어 있지 않으면 어떤 작업도 수행할 수 없습니다. 이러한 설계는 노드가 클라우드에서 실행되더라도 Greenlight가 사용자 키에 액세스할 수 없으며 로컬 애플리케이션을 통한 명시적인 사용자 승인 없이는 자금을 이동할 수 없도록 보장합니다. 다른 옵션은 이 아키텍처에서 사용되지 않는 다른 보안 메커니즘을 설명합니다.
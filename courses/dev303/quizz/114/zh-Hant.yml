question: 儘管在雲端託管 Lightning 節點，確保 Greenlight 基礎設施無法存取用戶資金的主要安全機制是什麼？
answer: 私密金鑰永遠不會離開使用者裝置，所有操作都需要主動應用程式簽署
wrong_answers:
  - 在多個雲端供應商之間使用分散式金鑰分塊的多重簽章錢包
  - 硬體安全模組可在雲端處理前加密所有交易
  - 有時間鎖定的智慧型契約，如果發生未經授權的存取，會自動退回資金
explanation: |
  Breez SDK通過無信任架構來保持安全性，其中私鑰只保留在用戶設備上。雖然Greenlight託管Lightning節點基礎設施，但如果沒有一個可以簽署交易和訊息的主動連接應用程式，它就無法執行任何操作。這種設計確保了即使節點在雲端運行，Greenlight 也永遠無法存取用戶的金鑰，也無法在未透過用戶本機應用程式進行明確用戶授權的情況下移動資金。其他選項描述了本架構中沒有使用的不同安全機制。
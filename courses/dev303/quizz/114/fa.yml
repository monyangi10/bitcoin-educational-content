question: مکانیزم امنیتی اصلی که تضمین می‌کند زیرساخت Greenlight نمی‌تواند به وجوه کاربران دسترسی پیدا کند، علی‌رغم میزبانی نودهای Lightning در فضای ابری، چیست؟
answer: کلیدهای خصوصی هرگز دستگاه‌های کاربر را ترک نمی‌کنند و تمام عملیات نیاز به امضای فعال برنامه دارند.
wrong_answers:
  - کیف‌پول‌های چند امضایی با قطعات کلید توزیع‌شده در میان ارائه‌دهندگان مختلف ابر
  - ماژول‌های امنیتی سخت‌افزاری که تمام تراکنش‌ها را قبل از پردازش ابری رمزگذاری می‌کنند
  - قراردادهای هوشمند زمان‌قفل که در صورت وقوع دسترسی غیرمجاز به‌طور خودکار وجوه را بازمی‌گردانند
explanation: |
  SDK Breez امنیت را از طریق معماری بدون اعتماد حفظ می‌کند که در آن کلیدهای خصوصی به‌طور انحصاری روی دستگاه‌های کاربر باقی می‌مانند. در حالی که Greenlight زیرساخت نود Lightning را میزبانی می‌کند، نمی‌تواند هیچ عملیاتی را بدون یک برنامه متصل فعال که قادر به امضای تراکنش‌ها و پیام‌ها باشد، انجام دهد. این طراحی تضمین می‌کند که حتی اگر نود در فضای ابری اجرا شود، Greenlight هرگز به کلیدهای کاربر دسترسی ندارد و نمی‌تواند بدون مجوز صریح کاربر از طریق برنامه محلی آن‌ها، وجوه را جابجا کند. گزینه‌های دیگر مکانیزم‌های امنیتی متفاوتی را توصیف می‌کنند که در این معماری استفاده نمی‌شوند.
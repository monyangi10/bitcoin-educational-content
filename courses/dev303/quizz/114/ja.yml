question: Lightningノードをクラウドでホスティングしているにもかかわらず、Greenlightインフラがユーザーの資金にアクセスできないようにする主なセキュリティメカニズムは何ですか？
answer: 秘密鍵がユーザーのデバイスから離れることはなく、すべての操作はアクティブなアプリケーション署名を必要とする。
wrong_answers:
  - 複数のクラウドプロバイダーに分散されたキーシャードによるマルチ署名ウォレット
  - クラウド処理前にすべてのトランザクションを暗号化するハードウェア・セキュリティ・モジュール
  - 不正アクセスが発生した場合、自動的に資金を返却するタイムロックのスマートコントラクト
explanation: |
  Breez SDKは、秘密鍵がユーザーデバイスにのみ残るトラストレスアーキテクチャによってセキュリティを維持している。GreenlightはLightningノードのインフラをホストしていますが、トランザクションとメッセージに署名できるアクティブに接続されたアプリケーションがなければ、いかなる操作も実行できません。この設計により、ノードがクラウドで実行されていても、Greenlightがユーザーの鍵にアクセスすることはなく、ユーザーのローカルアプリケーションを通じた明示的なユーザー承認なしに資金を移動させることはできません。他のオプションは、このアーキテクチャでは使用されない異なるセキュリティメカニズムを説明します。
question: กลไกความปลอดภัยหลักที่รับรองว่าโครงสร้างพื้นฐานของ Greenlight ไม่สามารถเข้าถึงเงินของผู้ใช้ได้แม้จะโฮสต์โหนด Lightning ในคลาวด์คืออะไร?
answer: คีย์ส่วนตัวจะไม่ออกจากอุปกรณ์ของผู้ใช้และการดำเนินการทั้งหมดต้องการการลงชื่อเข้าใช้แอปพลิเคชันที่ใช้งานอยู่
wrong_answers:
  - กระเป๋าเงินหลายลายเซ็นที่มีการกระจายชิ้นส่วนกุญแจไปยังผู้ให้บริการคลาวด์หลายราย
  - โมดูลความปลอดภัยฮาร์ดแวร์ที่เข้ารหัสธุรกรรมทั้งหมดก่อนการประมวลผลบนคลาวด์
  - สัญญาอัจฉริยะที่ล็อคด้วยเวลาและจะคืนเงินโดยอัตโนมัติหากเกิดการเข้าถึงโดยไม่ได้รับอนุญาต
explanation: |
  Breez SDK รักษาความปลอดภัยผ่านสถาปัตยกรรมที่ไม่ต้องพึ่งพาความไว้วางใจ โดยที่คีย์ส่วนตัวจะอยู่บนอุปกรณ์ของผู้ใช้เท่านั้น ในขณะที่ Greenlight เป็นผู้ให้บริการโครงสร้างพื้นฐานของ Lightning node แต่ไม่สามารถดำเนินการใดๆ ได้หากไม่มีแอปพลิเคชันที่เชื่อมต่ออยู่ซึ่งสามารถลงนามธุรกรรมและข้อความได้ การออกแบบนี้ทำให้มั่นใจได้ว่าแม้ว่า node จะทำงานในระบบคลาวด์ แต่ Greenlight จะไม่มีวันเข้าถึงคีย์ของผู้ใช้และไม่สามารถเคลื่อนย้ายเงินได้หากไม่ได้รับอนุญาตจากผู้ใช้ผ่านแอปพลิเคชันในเครื่องของพวกเขา ตัวเลือกอื่นๆ อธิบายกลไกความปลอดภัยที่แตกต่างกันซึ่งไม่ได้ใช้ในสถาปัตยกรรมนี้
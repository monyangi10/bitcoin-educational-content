question: 什么是确保Greenlight基础设施无法获取用户资金的主要安全机制？
answer: 私钥永远不会离开用户设备，所有操作都需要主动应用程序签名
wrong_answers:
  - 在多个云提供商之间使用分布式密钥碎片的多签名钱包
  - 硬件安全模块可在云处理之前对所有交易进行加密
  - 锁定时间的智能合约，在发生未经授权的访问时自动返还资金
explanation: |
  Breez SDK通过无信任架构维护安全性，私钥只保留在用户设备上。虽然Greenlight托管了闪电节点基础设施，但如果没有能签署交易和信息的主动连接应用程序，它就无法执行任何操作。这种设计确保了即使节点在云中运行，Greenlight 也永远无法访问用户密钥，也无法在未经用户通过本地应用程序明确授权的情况下转移资金。其他选项描述了本架构中未使用的不同安全机制。
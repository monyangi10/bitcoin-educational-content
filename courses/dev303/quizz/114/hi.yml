question: वह प्राथमिक सुरक्षा तंत्र क्या है जो यह सुनिश्चित करता है कि क्लाउड में लाइटनिंग नोड्स होस्ट करने के बावजूद ग्रीनलाइट इंफ्रास्ट्रक्चर उपयोगकर्ता के फंड तक पहुंच न सके?
answer: निजी कुंजी कभी भी उपयोगकर्ता के उपकरणों से बाहर नहीं जाती है और सभी कार्यों के लिए सक्रिय एप्लिकेशन हस्ताक्षर की आवश्यकता होती है।
wrong_answers:
  - कई क्लाउड प्रदाताओं में वितरित कुंजी शार्ड के साथ मल्टी-सिग्नेचर वॉलेट
  - हार्डवेयर सुरक्षा मॉड्यूल जो क्लाउड प्रोसेसिंग से पहले सभी लेनदेन को एन्क्रिप्ट करते हैं
  - समय-सीमित स्मार्ट अनुबंध जो अनधिकृत पहुंच होने पर स्वचालित रूप से धनराशि वापस कर देते हैं।
explanation: |
  Breez SDK एक ट्रस्टलेस आर्किटेक्चर के माध्यम से सुरक्षा बनाए रखता है, जहाँ निजी कुंजियाँ केवल उपयोगकर्ता उपकरणों पर ही रहती हैं। ग्रीनलाइट लाइटनिंग नोड इन्फ्रास्ट्रक्चर को होस्ट करता है, लेकिन यह सक्रिय रूप से कनेक्टेड एप्लिकेशन के बिना कोई भी ऑपरेशन नहीं कर सकता जो लेनदेन और संदेशों पर हस्ताक्षर कर सके। यह डिज़ाइन सुनिश्चित करता है कि भले ही नोड क्लाउड में चल रहा हो, ग्रीनलाइट को कभी भी उपयोगकर्ता कुंजियों तक पहुँच नहीं होती है और वह अपने स्थानीय एप्लिकेशन के माध्यम से स्पष्ट उपयोगकर्ता प्राधिकरण के बिना धनराशि स्थानांतरित नहीं कर सकता है। अन्य विकल्प विभिन्न सुरक्षा तंत्रों का वर्णन करते हैं जिनका उपयोग इस आर्किटेक्चर में नहीं किया जाता है।
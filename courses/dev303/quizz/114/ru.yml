question: Какой основной механизм безопасности гарантирует, что инфраструктура Greenlight не сможет получить доступ к средствам пользователей, несмотря на размещение узлов Lightning в облаке?
answer: Приватные ключи никогда не покидают пользовательских устройств, а все операции требуют активной подписи приложений
wrong_answers:
  - Кошельки с несколькими подписями и распределенными хранилищами ключей среди нескольких облачных провайдеров
  - Аппаратные модули безопасности, которые шифруют все транзакции перед обработкой в облаке
  - Смарт-контракты с временной блокировкой, которые автоматически возвращают средства в случае несанкционированного доступа
explanation: |
  Breez SDK обеспечивает безопасность благодаря архитектуре без доверия, в которой приватные ключи хранятся исключительно на пользовательских устройствах. Хотя Greenlight содержит инфраструктуру узла Lightning, он не может выполнять никаких операций без активно подключенного приложения, которое может подписывать транзакции и сообщения. Такая конструкция гарантирует, что даже если узел работает в облаке, Greenlight никогда не получит доступ к ключам пользователей и не сможет перемещать средства без явной авторизации пользователя через его локальное приложение. Другие варианты описывают различные механизмы безопасности, которые не используются в данной архитектуре.
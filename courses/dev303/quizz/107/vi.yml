question: Khả năng quan trọng nào cho phép LDK duy trì chức năng Lightning trên các ví di động với kết nối không ổn định so với các node Lightning truyền thống dựa trên daemon?
answer: Khả năng của LDK trong việc đồng bộ hóa với các nhà cung cấp dịch vụ Lightning (LSP) khi kết nối trực tuyến, đồng thời duy trì quyền kiểm soát khóa riêng không lưu giữ.
wrong_answers:
  - "Hệ thống xử lý thanh toán ngoại tuyến tích hợp sẵn của LDK sẽ xếp hàng các giao dịch cho đến khi kết nối mạng được khôi phục."
  - "Hệ thống sao lưu trạng thái kênh phân tán của LDK tự động sao chép dữ liệu trên nhiều nhà cung cấp dịch vụ đám mây."
  - "Giao thức mạng lưới ngang hàng của LDK cho phép thanh toán Lightning trực tiếp giữa các thiết bị mà không cần internet."
explanation: |
  Kiến trúc mô-đun của LDK cho phép các ứng dụng di động triển khai các mô hình kết nối gián đoạn bằng cách đồng bộ hóa với các nhà cung cấp dịch vụ thanh toán (LSP) khi trực tuyến, cho phép người dùng nhận thanh toán và quản lý kênh ngay cả khi thiết bị di động ngoại tuyến. Điều này khác biệt về cơ bản so với các tiến trình nền Lightning truyền thống yêu cầu hoạt động liên tục. Các câu trả lời sai mô tả các tính năng không tồn tại - LDK không có khả năng xử lý thanh toán ngoại tuyến tích hợp, sao lưu phân tán hoặc khả năng mạng lưới dạng lưới.
question: Коя критична способност позволява на LDK да поддържа функционалността на Lightning в мобилни портфейли с непостоянна свързаност в сравнение с традиционните възли Lightning, базирани на daemon?
answer: Способността на LDK да се синхронизира с доставчиците на услуги Lightning (LSP) при влизане в онлайн режим, като същевременно се поддържа контрол върху частния ключ, който не е поверителен
wrong_answers:
  - "вградената в LDK система за офлайн обработка на плащания, която поставя транзакции на опашка до възстановяване на мрежовата свързаност"
  - "Разпределена система за архивиране на състоянието на каналите на LDK, която автоматично репликира данни в множество доставчици на облачни услуги"
  - "Протоколът за мрежова връзка peer-to-peer на LDK, който позволява директни плащания между устройствата Lightning без интернет"
explanation: |
  Модулната архитектура на LDK позволява на мобилните приложения да прилагат модели на периодична свързаност, като се синхронизират с LSP при влизане в режим онлайн, позволявайки на потребителите да получават плащания и да управляват канали, дори когато мобилното устройство е било офлайн. Това се различава коренно от традиционните демони на Lightning, които изискват непрекъсната работа. Грешните отговори описват несъществуващи функции - LDK няма вградена обработка на офлайн плащания, разпределени резервни копия или възможности за работа в мрежова структура.
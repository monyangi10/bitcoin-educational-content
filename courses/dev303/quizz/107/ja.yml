question: LDKは、従来のdaemonベースのLightningノードと比較して、断続的な接続が可能なモバイルウォレットでLightningの機能を維持することができますか？
answer: LDKは、オンライン化時にライトニング・サービス・プロバイダー（LSP）と同期し、秘密鍵の非保管を維持することができる。
wrong_answers:
  - "ネットワーク接続が回復するまでトランザクションをキューに入れるLDK内蔵のオフライン決済処理システム"
  - "複数のクラウドプロバイダーにデータを自動複製するLDKの分散型チャネル状態バックアップシステム"
  - "LDKのピア・ツー・ピア・メッシュ・ネットワーキング・プロトコルは、インターネットなしでデバイス間のライトニング決済を直接可能にする"
explanation: |
  LDKのモジュラーアーキテクチャは、オンライン時にLSPと同期することで、モバイルアプリケーションが断続的な接続パターンを実装することを可能にし、モバイルデバイスがオフラインの状態でも、ユーザーが支払いを受け取り、チャネルを管理できるようにします。これは、継続的な動作を必要とする従来のLightningデーモンとは根本的に異なる。LDKには、オフライン決済処理、分散バックアップ、メッシュネットワーキング機能が組み込まれていません。
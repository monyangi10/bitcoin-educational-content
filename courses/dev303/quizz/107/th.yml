question: ความสามารถที่สำคัญอะไรที่ช่วยให้ LDK รักษาฟังก์ชันการทำงานของ Lightning ในกระเป๋าเงินมือถือที่มีการเชื่อมต่อไม่ต่อเนื่องเมื่อเทียบกับโหนด Lightning แบบดั้งเดิมที่ใช้ daemon?
answer: ความสามารถของ LDK ในการซิงโครไนซ์กับผู้ให้บริการ Lightning Service (LSPs) เมื่อออนไลน์ในขณะที่ยังคงควบคุมคีย์ส่วนตัวแบบไม่รับฝาก
wrong_answers:
  - "ระบบประมวลผลการชำระเงินออฟไลน์ในตัวของ LDK ที่จัดคิวธุรกรรมจนกว่าการเชื่อมต่อเครือข่ายจะได้รับการคืนค่า"
  - "ระบบสำรองสถานะช่องทางแบบกระจายของ LDK ที่ทำการจำลองข้อมูลอัตโนมัติข้ามผู้ให้บริการคลาวด์หลายราย"
  - "โปรโตคอลเครือข่ายแบบตาข่าย peer-to-peer ของ LDK ที่อนุญาตให้ชำระเงิน Lightning จากอุปกรณ์ถึงอุปกรณ์โดยตรงโดยไม่ต้องใช้อินเทอร์เน็ต"
explanation: |
  สถาปัตยกรรมแบบโมดูลาร์ของ LDK ช่วยให้แอปพลิเคชันมือถือสามารถใช้งานรูปแบบการเชื่อมต่อแบบไม่ต่อเนื่องได้โดยการซิงโครไนซ์กับ LSPs เมื่อออนไลน์ ทำให้ผู้ใช้สามารถรับการชำระเงินและจัดการช่องทางได้แม้ว่าอุปกรณ์มือถือจะออฟไลน์อยู่ก็ตาม ซึ่งแตกต่างจากไดมอนส์ Lightning แบบดั้งเดิมที่ต้องการการทำงานอย่างต่อเนื่อง คำตอบที่ผิดอธิบายถึงคุณสมบัติที่ไม่มีอยู่จริง - LDK ไม่มีการประมวลผลการชำระเงินแบบออฟไลน์ในตัว, การสำรองข้อมูลแบบกระจาย, หรือความสามารถในการเชื่อมต่อแบบเมช.
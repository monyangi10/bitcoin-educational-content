question: 与传统的基于 daemon 的 Lightning 节点相比，LDK 具有哪些关键能力，能够在连接时断时续的移动钱包中保持 Lightning 功能？
answer: LDK 能够在上线时与闪电服务提供商（LSP）同步，同时保持对私钥的非托管控制
wrong_answers:
  - "赛维LDK内置离线支付处理系统，可在网络连接恢复前对交易进行排队"
  - "LDK 的分布式通道状态备份系统可在多个云提供商之间自动复制数据"
  - 赛维LDK的点对点网状网络协议，无需互联网即可实现设备对设备的直接 "闪电支付"。
explanation: |
  LDK的模块化架构使移动应用程序能够在上线后与LSP同步，从而实现间歇性连接模式，让用户即使在移动设备离线时也能接收付款和管理渠道。这与需要持续运行的传统 Lightning 守护进程有着本质区别。错误答案描述了不存在的功能 - LDK 没有内置离线支付处理、分布式备份或网状网络功能。
question: Какая критически важная способность позволяет LDK поддерживать функциональность Lightning в мобильных кошельках с прерывистым соединением по сравнению с традиционными узлами Lightning на базе daemon?
answer: Способность LDK синхронизироваться с поставщиками услуг Lightning (LSP) при выходе в сеть, сохраняя при этом контроль над закрытым ключом, не подлежащим хранению
wrong_answers:
  - "Встроенная в LDK система обработки автономных платежей, которая ставит транзакции в очередь до тех пор, пока не будет восстановлено подключение к сети"
  - "Распределенная система резервного копирования состояния каналов LDK, которая автоматически реплицирует данные через несколько облачных провайдеров"
  - "Протокол одноранговой ячеистой сети LDK, позволяющий осуществлять прямые молниеносные платежи между устройствами без интернета"
explanation: |
  Модульная архитектура LDK позволяет мобильным приложениям реализовывать прерывистые схемы подключения, синхронизируясь с LSP при выходе в сеть, что позволяет пользователям получать платежи и управлять каналами, даже когда мобильное устройство находится в автономном режиме. Это принципиально отличается от традиционных демонов Lightning, которые требуют непрерывной работы. Неправильные ответы описывают несуществующие функции - в LDK нет встроенной обработки платежей в автономном режиме, распределенного резервного копирования или возможностей создания ячеистых сетей.
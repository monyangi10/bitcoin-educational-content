question: वह कौन सी महत्वपूर्ण क्षमता है जो LDK को पारंपरिक daemon-आधारित लाइटनिंग नोड्स की तुलना में रुक-रुक कर कनेक्टिविटी वाले मोबाइल वॉलेट में लाइटनिंग कार्यक्षमता बनाए रखने की अनुमति देती है?
answer: ऑनलाइन आने पर लाइटनिंग सर्विस प्रोवाइडर्स (एलएसपी) के साथ सिंक्रनाइज़ करने की एलडीके की क्षमता, साथ ही गैर-अभिभावक निजी कुंजी नियंत्रण को बनाए रखना।
wrong_answers:
  - "एलडीके की अंतर्निर्मित ऑफ़लाइन भुगतान प्रसंस्करण प्रणाली जो नेटवर्क कनेक्टिविटी बहाल होने तक लेनदेन को कतार में रखती है।"
  - "एलडीके की वितरित चैनल स्टेट बैकअप प्रणाली जो कई क्लाउड प्रदाताओं में डेटा को स्वचालित रूप से दोहराती है"
  - "एलडीके का पीयर-टू-पीयर मेश नेटवर्किंग प्रोटोकॉल जो इंटरनेट के बिना सीधे डिवाइस-टू-डिवाइस लाइटनिंग भुगतान की अनुमति देता है।"
explanation: |
  LDK की मॉड्यूलर संरचना मोबाइल एप्लिकेशन को ऑनलाइन आने पर LSP के साथ सिंक्रनाइज़ करके बीच-बीच में कनेक्टिविटी पैटर्न लागू करने में सक्षम बनाती है, जिससे उपयोगकर्ता मोबाइल डिवाइस के ऑफ़लाइन होने पर भी भुगतान प्राप्त कर सकते हैं और चैनल प्रबंधित कर सकते हैं। यह पारंपरिक लाइटनिंग डेमन से मौलिक रूप से भिन्न है, जिन्हें निरंतर संचालन की आवश्यकता होती है। गलत उत्तर उन सुविधाओं का वर्णन करते हैं जो मौजूद नहीं हैं - LDK में अंतर्निहित ऑफ़लाइन भुगतान प्रसंस्करण, वितरित बैकअप या मेश नेटवर्किंग क्षमताएं नहीं हैं।
question: چه قابلیت حیاتی به LDK اجازه می‌دهد تا عملکرد Lightning را در کیف‌پول‌های موبایل با اتصال متناوب در مقایسه با نودهای Lightning مبتنی بر daemon سنتی حفظ کند؟
answer: قابلیت LDK برای همگام‌سازی با ارائه‌دهندگان خدمات لایتنینگ (LSPs) هنگام آنلاین شدن در حالی که کنترل کلید خصوصی غیرامانی را حفظ می‌کند
wrong_answers:
  - "سیستم پردازش پرداخت آفلاین داخلی LDK که تراکنش‌ها را تا زمان بازیابی اتصال شبکه در صف قرار می‌دهد"
  - "سیستم پشتیبان‌گیری از وضعیت کانال توزیع‌شده LDK که به‌طور خودکار داده‌ها را در میان چندین ارائه‌دهنده ابر تکرار می‌کند"
  - "پروتکل شبکه مش LDK که امکان پرداخت‌های لایتنینگ مستقیم دستگاه به دستگاه را بدون اینترنت فراهم می‌کند"
explanation: |
  معماری ماژولار LDK به برنامه‌های موبایل این امکان را می‌دهد که الگوهای اتصال متناوب را با همگام‌سازی با LSPها هنگام آنلاین شدن پیاده‌سازی کنند، و به کاربران اجازه می‌دهد تا پرداخت‌ها را دریافت کرده و کانال‌ها را حتی زمانی که دستگاه موبایل آفلاین بود مدیریت کنند. این به طور اساسی با دیمن‌های سنتی لایتنینگ که نیاز به عملیات پیوسته دارند متفاوت است. پاسخ‌های نادرست ویژگی‌های غیر موجود را توصیف می‌کنند - LDK پردازش پرداخت آفلاین داخلی، پشتیبان‌گیری توزیع‌شده یا قابلیت‌های شبکه مش ندارد.
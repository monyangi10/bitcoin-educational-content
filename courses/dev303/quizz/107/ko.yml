question: 기존 daemon 기반 라이트닝 노드에 비해 간헐적으로 연결되는 모바일 지갑에서 LDK가 라이트닝 기능을 유지할 수 있는 중요한 기능은 무엇인가요?
answer: 비수탁 개인 키 제어를 유지하면서 온라인 상태가 될 때 Lightning 서비스 공급자(LSP)와 동기화할 수 있는 LDK의 기능
wrong_answers:
  - "네트워크 연결이 복구될 때까지 거래를 대기열에 넣는 LDK의 내장 오프라인 결제 처리 시스템"
  - "여러 클라우드 제공업체에 걸쳐 데이터를 자동으로 복제하는 LDK의 분산 채널 상태 백업 시스템"
  - "인터넷 없이 디바이스 간 직접 라이트닝 결제를 가능하게 하는 LDK의 P2P 메시 네트워킹 프로토콜"
explanation: |
  LDK의 모듈식 아키텍처를 사용하면 모바일 애플리케이션이 온라인 상태가 되면 LSP와 동기화하여 간헐적인 연결 패턴을 구현할 수 있으므로 사용자는 모바일 디바이스가 오프라인 상태일 때도 결제를 받고 채널을 관리할 수 있습니다. 이는 지속적인 작동이 필요한 기존의 라이트닝 데몬과는 근본적으로 다릅니다. 오답은 존재하지 않는 기능을 설명하는 것으로, LDK에는 오프라인 결제 처리, 분산 백업 또는 메시 네트워킹 기능이 내장되어 있지 않습니다.
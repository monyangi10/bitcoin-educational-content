question: जब किसी क्लोज़र को विशिष्ट प्रकारों के साथ कॉल किया जाता है, तो क्लोज़र प्रकार के अनुमान का क्या होता है?
answer: वे प्रकार उस क्लोजर इंस्टेंस के लिए निश्चित हो जाते हैं
wrong_answers:
  - यह बंद प्रणाली भविष्य में आने वाले विभिन्न प्रकार के कॉलों को स्वीकार कर सकती है।
  - कंपाइलर अगले फ़ंक्शन कॉल के लिए प्रकारों को रीसेट करता है।
  - प्रकार लचीले रहते हैं और संदर्भ के आधार पर बदल सकते हैं।
explanation: |
  Rust में, क्लोज़र स्वचालित प्रकार अनुमान से लाभान्वित होते हैं, लेकिन इस लचीलेपन की सीमाएँ हैं। एक बार जब किसी क्लोज़र को विशिष्ट पैरामीटर प्रकारों के साथ कॉल किया जाता है, तो कंपाइलर उस विशेष क्लोज़र इंस्टेंस के लिए उन प्रकारों को लॉक कर देता है। इसका अर्थ है कि उसी क्लोज़र को बाद में विभिन्न प्रकारों के साथ कॉल नहीं किया जा सकता - यह पहले मिले प्रकारों में मोनोमॉर्फाइज़ हो जाता है। यह जेनेरिक फ़ंक्शंस से अलग है जिन्हें विभिन्न प्रकारों के साथ कॉल किया जा सकता है क्योंकि प्रत्येक कॉल एक अलग इंस्टेंशिएशन बनाता है। अन्य विकल्प गलत हैं क्योंकि वे निरंतर लचीलेपन का सुझाव देते हैं जो क्लोज़र के प्रकार निर्धारित होने के बाद मौजूद नहीं होता है।
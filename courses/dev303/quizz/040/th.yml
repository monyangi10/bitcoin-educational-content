question: เกิดอะไรขึ้นกับการอนุมานประเภทของ closure เมื่อมีการเรียก closure ด้วยประเภทที่เฉพาะเจาะจง?
answer: ประเภทเหล่านั้นจะถูกกำหนดคงที่สำหรับอินสแตนซ์การปิดนั้น
wrong_answers:
  - การปิดยังคงสามารถยอมรับประเภทต่างๆ ในการเรียกใช้ในอนาคต
  - คอมไพเลอร์รีเซ็ตประเภทสำหรับการเรียกฟังก์ชันถัดไป
  - ประเภทต่างๆ ยังคงยืดหยุ่นและสามารถเปลี่ยนแปลงได้ตามบริบท
explanation: |
  ใน Rust, closure ได้ประโยชน์จากการอนุมานประเภทอัตโนมัติ แต่ความยืดหยุ่นนี้มีขีดจำกัด เมื่อ closure ถูกเรียกด้วยประเภทพารามิเตอร์ที่เฉพาะเจาะจง คอมไพเลอร์จะล็อกประเภทเหล่านั้นสำหรับ instance ของ closure นั้น ซึ่งหมายความว่า closure เดียวกันไม่สามารถถูกเรียกด้วยประเภทที่แตกต่างกันในภายหลังได้ - มันจะถูก monomorphized ไปยังประเภทแรกที่มันพบ นี่แตกต่างจากฟังก์ชัน generic ที่สามารถถูกเรียกด้วยประเภทที่แตกต่างกันได้เพราะการเรียกแต่ละครั้งจะสร้างการติดตั้งแยกต่างหาก ตัวเลือกอื่น ๆ นั้นไม่ถูกต้องเพราะพวกเขาแนะนำถึงความยืดหยุ่นที่ต่อเนื่องซึ่งไม่มีอยู่จริงเมื่อประเภทของ closure ถูกกำหนดแล้ว
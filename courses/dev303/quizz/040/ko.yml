question: 특정 유형으로 클로저가 호출되면 클로저 유형 추론은 어떻게 되나요?
answer: 이러한 유형은 해당 폐쇄 인스턴스에 대해 고정됩니다
wrong_answers:
  - 폐쇄는 향후 통화에서 다른 유형을 계속 허용할 수 있습니다
  - 컴파일러는 다음 함수 호출을 위해 유형을 재설정합니다
  - 유형은 유연하게 유지되며 상황에 따라 변경될 수 있습니다
explanation: |
  Rust에서 클로저는 자동 유형 추론의 이점을 제공하지만 이러한 유연성에는 한계가 있습니다. 특정 매개변수 유형으로 클로저가 호출되면 컴파일러는 해당 클로저 인스턴스에 대해 해당 유형을 잠급니다. 즉, 동일한 클로저를 나중에 다른 유형으로 호출할 수 없으며 처음 접하는 유형으로 단일화됩니다. 이는 각 호출이 별도의 인스턴스화를 생성하기 때문에 다른 유형으로 호출할 수 있는 일반 함수와 다릅니다. 다른 옵션은 클로저의 유형이 결정된 후에는 존재하지 않는 지속적인 유연성을 제안하기 때문에 올바르지 않습니다.
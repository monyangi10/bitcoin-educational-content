question: وقتی یک closure با انواع خاصی فراخوانی می‌شود، چه اتفاقی برای استنتاج نوع closure می‌افتد؟
answer: آن نوع‌ها برای آن نمونه بسته ثابت می‌شوند.
wrong_answers:
  - بسته شدن هنوز می‌تواند در تماس‌های آینده انواع مختلفی را بپذیرد.
  - کامپایلر انواع را برای فراخوانی تابع بعدی بازنشانی می‌کند
  - انواع باقی می‌مانند انعطاف‌پذیر و می‌توانند بر اساس زمینه تغییر کنند
explanation: |
  در Rust، کلوزرها از استنتاج نوع خودکار بهره‌مند می‌شوند، اما این انعطاف‌پذیری محدودیت‌هایی دارد. زمانی که یک کلوزر با انواع پارامترهای خاصی فراخوانی می‌شود، کامپایلر آن انواع را برای آن نمونه خاص از کلوزر قفل می‌کند. این بدان معناست که همان کلوزر نمی‌تواند بعداً با انواع مختلف فراخوانی شود - به اولین انواعی که با آن‌ها مواجه می‌شود، تک‌ریخت می‌شود. این با توابع جنریک که می‌توانند با انواع مختلف فراخوانی شوند متفاوت است، زیرا هر فراخوانی یک نمونه‌سازی جداگانه ایجاد می‌کند. گزینه‌های دیگر نادرست هستند زیرا انعطاف‌پذیری مداومی را پیشنهاد می‌دهند که پس از تعیین انواع کلوزر وجود ندارد.
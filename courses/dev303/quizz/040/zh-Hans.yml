question: 一旦使用特定类型调用闭包，闭包类型推断会发生什么变化？
answer: 这些类型将成为该闭合实例的固定类型
wrong_answers:
  - 在未来的调用中，闭包仍然可以接受不同的类型
  - 编译器会为下一次函数调用重置类型
  - 类型保持灵活，可根据具体情况进行更改
explanation: |
  在 Rust 中，闭包受益于自动类型推断，但这种灵活性是有限制的。一旦使用特定的参数类型调用闭包，编译器就会为该特定闭包实例锁定这些类型。这意味着同一闭包以后不能用不同的类型调用--它会变成它遇到的第一个类型的单态。这与泛型函数不同，后者可以用不同的类型调用，因为每次调用都会创建一个单独的实例。其他选项都是不正确的，因为它们所暗示的持续灵活性在闭包的类型确定后就不存在了。
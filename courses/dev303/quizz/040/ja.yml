question: クロージャが特定の型を使って呼び出されると、クロージャの型推論はどうなるのか？
answer: これらのタイプは、そのクロージャのインスタンスで固定される。
wrong_answers:
  - クロージャは、将来呼び出しで異なるタイプを受け入れることができます。
  - コンパイラーは次の関数呼び出しのために型をリセットする。
  - タイプは柔軟性を保ち、文脈に応じて変更することができる。
explanation: |
  Rustでは、クロージャは自動型推論の恩恵を受けているが、この柔軟性には限界がある。一旦クロージャが特定のパラメータ型で呼び出されると、コンパイラーはその特定のクロージャのインスタンスに対してその型を固定する。つまり、同じクロージャを後で別の型で呼び出すことはできません。これは、異なる型で呼び出すことができるジェネリック関数とは異なります。他の選択肢は、クロージャの型が決まれば存在しない柔軟性を示唆するもので、正しくない。
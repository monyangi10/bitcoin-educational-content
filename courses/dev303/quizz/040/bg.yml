question: Какво се случва с извеждането на типа на затваряне, след като затварянето е извикано с определени типове?
answer: Тези типове стават фиксирани за този пример на затваряне
wrong_answers:
  - Затварянето може да приема различни типове и в бъдещи повиквания
  - Компилаторът нулира типовете за следващото извикване на функция
  - Видовете остават гъвкави и могат да се променят в зависимост от контекста
explanation: |
  В Rust затворите се възползват от автоматичното извеждане на типове, но тази гъвкавост има граници. След като затворът бъде извикан с определени типове параметри, компилаторът фиксира тези типове за конкретния случай на затваряне. Това означава, че същото затваряне не може да бъде извикано по-късно с различни типове - то става мономорфно за първите типове, които среща. Това е различно от общите функции, които могат да се извикват с различни типове, тъй като всяко извикване създава отделна инстанция. Другите варианти са некоректни, защото предполагат текуща гъвкавост, която не съществува, след като типовете на затварянето са определени.
question: 一旦使用特定類型呼叫閉鎖，閉鎖類型推理會發生什麼情況？
answer: 這些類型對於該封閉實例而言是固定的
wrong_answers:
  - 封閉仍可在未來的呼叫中接受不同的類型
  - 編譯器會為下一次函式呼叫重設類型
  - 類型保持彈性，可根據上下文進行變更
explanation: |
  在 Rust 中，閉包受益於自動類型推斷，但這種靈活性是有限制的。一旦使用特定的參數類型來呼叫閉包，編譯器就會鎖定該特定閉包實例的類型。這表示同一個 closure 之後不能再以不同的類型來呼叫 - 它會變成它遇到的第一種類型的單態化。這與泛型函數不同，泛型函數可以用不同的類型來呼叫，因為每次呼叫都會建立一個獨立的實體。其他的選項是不正確的，因為它們所暗示的持續彈性，在閉合的類型決定之後就不存在了。
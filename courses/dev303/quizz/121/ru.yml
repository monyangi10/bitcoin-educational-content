question: Каков основной механизм, с помощью которого функция нулевого канала резервирования в Breez SDK создает дополнительный риск, который должны взять на себя поставщики услуг Lightning?
answer: LSP должны принять на себя риск того, что пользователи израсходуют весь баланс канала, устранив буфер безопасности, который традиционно защищает от принудительного закрытия канала
wrong_answers:
  - LSP становятся ответственными за поддержание непрерывной синхронизации сетевого графа на множестве пользовательских устройств без традиционной компенсации на основе резервирования
  - LSP должны гарантировать мгновенную маршрутизацию платежей без подушки ликвидности, которую обеспечивают канальные резервы для обработки сценариев перегрузки сети
  - LSP берут на себя ответственность за сбои в обмене on-chain, когда пользователи пытаются перевести весь свой баланс Lightning на Bitcoin в периоды высоких тарифов
explanation: |
  Резервы нулевого канала позволяют пользователям расходовать весь отображаемый баланс, но это исключает традиционный буфер безопасности, который защищает поставщиков услуг Lightning во время принудительного закрытия каналов. Резервы каналов обычно гарантируют, что часть средств останется заблокированной для покрытия расходов на закрытие и обеспечения безопасности от злонамеренного поведения. Устранив эти резервы для улучшения пользовательского опыта, LSP должны взять на себя дополнительные операционные и финансовые риски, для снижения которых были разработаны эти буферы, что представляет собой очевидный компромисс, когда техническая сложность и риск перекладываются с пользователей на поставщиков услуг.
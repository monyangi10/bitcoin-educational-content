question: Какъв е основният механизъм, чрез който функцията за резервиране на нулевия канал на Breez SDK създава допълнителен риск, който трябва да бъде поет от доставчиците на услуги за мълнии?
answer: ДУУ трябва да поемат риска потребителите да изразходват целия си баланс на канала, като елиминират предпазния буфер, който традиционно предпазва от принудително затваряне на канала
wrong_answers:
  - LSP стават отговорни за поддържането на непрекъсната синхронизация на мрежовите графики в множество потребителски устройства без традиционната компенсация на базата на резерви
  - LSP трябва да гарантират незабавното маршрутизиране на плащанията, без да разполагат с резервите за ликвидност, които предоставят резервите на каналите за справяне със сценарии на претоварване на мрежата
  - ДУУ поемат отговорност за неуспехите при замяна на on-chain, когато потребителите се опитват да конвертират пълния си баланс на светкавицата в Bitcoin по време на периоди с високи такси
explanation: |
  Резервите с нулев канал позволяват на потребителите да изразходват целия си показан баланс, но това елиминира традиционния предпазен буфер, който защитава доставчиците на услуги Lightning при принудително затваряне на канали. Резервите на каналите обикновено гарантират, че някои средства остават блокирани, за да покрият разходите за затваряне и да осигурят сигурност срещу злонамерено поведение. Премахвайки тези резерви, за да подобрят потребителското преживяване, доставчиците на услуги трябва да поемат допълнителните оперативни и финансови рискове, които тези буфери са били предназначени да смекчат, което представлява ясен компромис, при който техническата сложност и рискът се прехвърлят от потребителите към доставчиците на услуги.
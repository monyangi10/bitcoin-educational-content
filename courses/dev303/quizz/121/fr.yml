question: Quel est le principal mécanisme par lequel la fonction de réserves sans canal du SDK Breez crée un risque supplémentaire qui doit être absorbé par les fournisseurs de services Lightning ?
answer: Les LSP doivent accepter le risque que les utilisateurs dépensent la totalité de leur solde de canaux, ce qui élimine le tampon de sécurité qui protège traditionnellement contre les fermetures forcées de canaux.
wrong_answers:
  - Les prestataires de services linguistiques deviennent responsables du maintien de la synchronisation continue du graphe du réseau sur plusieurs appareils d'utilisateurs sans compensation traditionnelle basée sur les réserves.
  - Les LSP doivent garantir l'acheminement instantané des paiements sans le coussin de liquidités que les réserves de canaux fournissent pour gérer les scénarios de congestion du réseau.
  - Les fournisseurs de services locaux assument la responsabilité des échecs d'échange on-chain lorsque les utilisateurs tentent de convertir l'intégralité de leur solde Lightning en Bitcoin pendant les périodes où les frais sont élevés.
explanation: |
  Les réserves de canal zéro permettent aux utilisateurs de dépenser la totalité de leur solde affiché, mais cela élimine le tampon de sécurité traditionnel qui protège les fournisseurs de services de foudre lors des fermetures forcées de canaux. Les réserves de canaux garantissent généralement que certains fonds restent bloqués pour couvrir les coûts de fermeture et fournir une sécurité contre les comportements malveillants. En supprimant ces réserves pour améliorer l'expérience des utilisateurs, les fournisseurs de services Lightning doivent absorber les risques opérationnels et financiers supplémentaires que ces tampons ont été conçus pour atténuer, ce qui représente un compromis clair où la complexité technique et le risque sont déplacés des utilisateurs vers les fournisseurs de services.

question: Breez SDK की ज़ीरो-चैनल रिज़र्व सुविधा किस प्राथमिक तंत्र के माध्यम से अतिरिक्त जोखिम पैदा करती है जिसे लाइटनिंग सर्विस प्रोवाइडर्स को वहन करना होगा?
answer: एलएसपी को उपयोगकर्ताओं द्वारा अपने पूरे चैनल बैलेंस का उपयोग करने के जोखिम को स्वीकार करना होगा, जिससे वह सुरक्षा कवच समाप्त हो जाएगा जो परंपरागत रूप से चैनल को जबरन बंद होने से बचाता है।
wrong_answers:
  - एलएसपी (लाइसेंस्ड सर्विस प्रोवाइडर) पारंपरिक रिजर्व-आधारित शुल्क मुआवजे के बिना कई उपयोगकर्ता उपकरणों में निरंतर नेटवर्क ग्राफ सिंक्रोनाइज़ेशन बनाए रखने के लिए जिम्मेदार हो जाते हैं।
  - एलएसपी को नेटवर्क भीड़भाड़ की स्थितियों से निपटने के लिए चैनल रिजर्व द्वारा प्रदान किए जाने वाले तरलता कुशन के बिना तत्काल भुगतान रूटिंग की गारंटी देनी होगी।
  - उच्च शुल्क अवधि के दौरान जब उपयोगकर्ता अपने पूरे लाइटनिंग बैलेंस को Bitcoin में परिवर्तित करने का प्रयास करते हैं, तो on-chain स्वैप विफलताओं के लिए LSPs उत्तरदायित्व ग्रहण करते हैं।
explanation: |
  ज़ीरो-चैनल रिज़र्व उपयोगकर्ताओं को उनकी पूरी प्रदर्शित राशि खर्च करने की अनुमति देते हैं, लेकिन इससे लाइटनिंग सर्विस प्रोवाइडर्स (एलएसपी) को चैनल बंद होने के दौरान सुरक्षा प्रदान करने वाला पारंपरिक सुरक्षा कवच समाप्त हो जाता है। चैनल रिज़र्व आमतौर पर यह सुनिश्चित करते हैं कि कुछ धनराशि चैनल बंद करने की लागत को कवर करने और दुर्भावनापूर्ण गतिविधियों से सुरक्षा प्रदान करने के लिए सुरक्षित रहे। उपयोगकर्ता अनुभव को बेहतर बनाने के लिए इन रिज़र्व को हटाने से, एलएसपी को उन अतिरिक्त परिचालन और वित्तीय जोखिमों को वहन करना पड़ता है जिन्हें कम करने के लिए ये बफर बनाए गए थे। यह एक स्पष्ट समझौता है जहां तकनीकी जटिलता और जोखिम उपयोगकर्ताओं से सेवा प्रदाताओं पर स्थानांतरित हो जाते हैं।
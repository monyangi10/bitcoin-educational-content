question: Breez SDKのゼロ・チャンネル・リザーブ機能によって、ライトニング・サービス・プロバイダーが吸収しなければならない追加リスクが発生する主なメカニズムは何ですか？
answer: LSPは、ユーザーがチャンネル残高を使い果たすリスクを受け入れなければならないため、従来はチャンネル強制閉鎖から保護するセーフティ・バッファがなくなる。
wrong_answers:
  - LSPは、従来のリザーブ・ベースの料金補償なしに、複数のユーザー・デバイスにまたがる継続的なネットワーク・グラフの同期を維持する責任を負う。
  - LSPは、ネットワークの輻輳シナリオを処理するためにチャネル・リザーブが提供する流動性クッションなしで、即時の支払いルーティングを保証しなければならない。
  - LSPは、高料金の期間にユーザーがライトニングの残高を全額Bitcoinに変換しようとした場合、on-chainのスワップ失敗の責任を負う。
explanation: |
  ゼロ・チャネル・リザーブでは、ユーザーは表示された残高をすべて使用することができるが、チャネルの強制閉鎖時にライトニング・サービス・プロバイダを保護する従来のセーフティ・バッファは排除される。チャネルリザーブは通常、閉鎖コストをカバーし、悪意のある行為に対するセキュリティを提供するために、一部の資金がロックされたままであることを保証します。ユーザーエクスペリエンスを向上させるためにこれらのリザーブを削除することで、LSPは、これらのバッファが軽減するように設計されていた追加の運用リスクと財務リスクを吸収する必要があり、技術的な複雑さとリスクがユーザーからサービスプロバイダにシフトするという明確なトレードオフを意味します。
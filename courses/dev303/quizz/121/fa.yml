question: مکانیسم اصلی که ویژگی ذخایر صفر کانال Breez SDK باعث ایجاد ریسک اضافی می‌شود که باید توسط ارائه‌دهندگان خدمات لایتنینگ جذب شود چیست؟
answer: ارائه‌دهندگان خدمات نقدینگی باید ریسک خرج کردن کل موجودی کانال توسط کاربران را بپذیرند و از بین بردن حاشیه ایمنی که به طور سنتی از بسته شدن اجباری کانال‌ها محافظت می‌کند را قبول کنند.
wrong_answers:
  - ارائه‌دهندگان خدمات محلی مسئولیت حفظ همگام‌سازی پیوسته نمودار شبکه در دستگاه‌های متعدد کاربران را بدون جبران هزینه‌های مبتنی بر ذخیره‌سازی سنتی بر عهده می‌گیرند.
  - ارائه‌دهندگان خدمات نقدینگی باید مسیریابی پرداخت فوری را بدون بالشتک نقدینگی که ذخایر کانال برای مدیریت سناریوهای ازدحام شبکه فراهم می‌کنند، تضمین کنند.
  - LSPها مسئولیت شکست‌های مبادله on-chain را بر عهده می‌گیرند زمانی که کاربران تلاش می‌کنند تا کل موجودی لایتنینگ خود را در دوره‌های با کارمزد بالا به Bitcoin تبدیل کنند.
explanation: |
  ذخایر صفر کانال به کاربران اجازه می‌دهد تا کل موجودی نمایش داده شده خود را خرج کنند، اما این امر بافر ایمنی سنتی که از ارائه‌دهندگان خدمات لایتنینگ در طول بسته شدن اجباری کانال‌ها محافظت می‌کند را حذف می‌کند. ذخایر کانال معمولاً تضمین می‌کنند که مقداری از وجوه قفل شده باقی بماند تا هزینه‌های بسته شدن را پوشش دهد و امنیتی در برابر رفتارهای مخرب فراهم کند. با حذف این ذخایر برای بهبود تجربه کاربری، ارائه‌دهندگان خدمات لایتنینگ باید ریسک‌های عملیاتی و مالی اضافی را که این بافرها برای کاهش آن‌ها طراحی شده بودند، جذب کنند، که نشان‌دهنده یک معاوضه واضح است که در آن پیچیدگی فنی و ریسک از کاربران به ارائه‌دهندگان خدمات منتقل می‌شود.
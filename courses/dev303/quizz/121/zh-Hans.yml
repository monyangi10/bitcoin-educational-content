question: Breez SDK 的零信道储备功能产生额外风险的主要机制是什么？
answer: 本地服务提供商必须接受用户花光全部信道余额的风险，从而消除了传统上防止信道被迫关闭的安全缓冲区
wrong_answers:
  - LSP 负责在多个用户设备之间保持连续的网络图同步，而无需传统的预留费用补偿
  - LSP 必须保证即时支付路由，而不需要通道储备为处理网络拥塞情况提供流动性缓冲
  - 当用户试图在高收费期间将全部闪电余额转换为 Bitcoin 时，本地服务提供商承担 on-chain 转换失败的责任
explanation: |
  零通道准备金允许用户使用全部显示余额，但这消除了传统的安全缓冲区，在通道强制关闭期间保护闪电服务提供商。渠道准备金通常确保锁定部分资金，以支付关闭费用，并提供安全保障，防止恶意行为。通过取消这些准备金来改善用户体验，LSP 必须承担额外的运营和财务风险，而这些缓冲正是为了减轻风险而设计的，这显然是一种权衡，即技术复杂性和风险从用户转移到了服务提供商。
question: Breez SDK의 제로 채널 예약 기능으로 인해 라이트닝 서비스 제공업체가 흡수해야 하는 추가 위험이 발생하는 주요 메커니즘은 무엇인가요?
answer: LSP는 사용자가 채널 잔액을 모두 소진할 위험을 감수해야 하며, 기존에 채널 강제 폐쇄를 방지하는 안전 버퍼를 제거해야 합니다
wrong_answers:
  - LSP는 기존의 예약 기반 요금 보상 없이 여러 사용자 장치에서 지속적인 네트워크 그래프 동기화를 유지할 책임이 있습니다
  - LSP는 네트워크 혼잡 시나리오를 처리하기 위해 채널 준비금이 제공하는 유동성 쿠션 없이도 즉각적인 결제 라우팅을 보장해야 합니다
  - 사용자가 고수수료 기간 동안 전체 라이트닝 잔액을 Bitcoin로 전환하려고 시도할 때 on-chain 스왑 실패에 대해 LSP가 책임을 집니다
explanation: |
  채널 준비금이 0이 되면 사용자가 표시된 잔액을 모두 사용할 수 있지만, 채널 강제 폐쇄 시 라이트닝 서비스 제공자를 보호하는 기존의 안전 버퍼가 없어집니다. 채널 준비금은 일반적으로 폐쇄 비용을 충당하고 악의적인 행동에 대한 보안을 제공하기 위해 일부 자금을 잠그는 역할을 합니다. 사용자 경험을 개선하기 위해 이러한 준비금을 제거함으로써 LSP는 이러한 버퍼가 완화하도록 설계된 추가적인 운영 및 재무 위험을 흡수해야 하며, 이는 기술적 복잡성과 위험이 사용자에서 서비스 제공업체로 이전되는 분명한 절충안을 나타냅니다.
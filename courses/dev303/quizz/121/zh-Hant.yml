question: Breez SDK 的零通道儲備功能造成 Lightning 服務供應商必須承受額外風險的主要機制是什麼？
answer: LSP 必須接受使用者花光全部頻道餘額的風險，消除傳統上防止頻道強制關閉的安全緩衝。
wrong_answers:
  - LSP 負責維持多個使用者裝置之間的連續網路圖形同步，而無需傳統的預留費用補償
  - LSP 必須保證即時支付路由，而不需要通道儲備提供的流動性緩衝來處理網路擁塞情況
  - 當用戶在高收費期間嘗試將其全部 Lightning 結餘轉換為 Bitcoin 時，LSP 將承擔 on-chain 轉換失敗的責任。
explanation: |
  零通道儲備允許用戶使用其完整的顯示餘額，但這會消除傳統的安全緩衝，在通道強制關閉時保護閃電服務提供商。通道儲備通常可確保部分資金保持鎖定，以支付關閉成本，並提供安全保障，防止惡意行為。為了改善用戶體驗而移除這些儲備，LSP 必須承擔這些緩衝旨在減輕的額外運營和財務風險，這顯示出技術複雜性和風險從用戶轉移到服務提供商身上的明顯權衡。
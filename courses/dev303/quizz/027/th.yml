question: ไวยากรณ์การอัปเดต struct ช่วยให้คุณสามารถทำอะไรได้เมื่อสร้างอินสแตนซ์โครงสร้างใหม่ใน Rust?
answer: สร้างอินสแตนซ์ใหม่โดยระบุเฉพาะฟิลด์ที่เปลี่ยนแปลง ในขณะที่คัดลอกฟิลด์ที่เหลือจากอินสแตนซ์ที่มีอยู่
wrong_answers:
  - ปรับเปลี่ยนฟิลด์โครงสร้างที่มีอยู่ในตำแหน่งโดยไม่ต้องสร้างอินสแตนซ์ใหม่
  - โดยอัตโนมัติ generate ค่าเริ่มต้นสำหรับฟิลด์ที่ไม่ได้ระบุโดยใช้คุณลักษณะ Default
  - รวมอินสแตนซ์โครงสร้างหลายรายการเข้าด้วยกันเป็นอินสแตนซ์รวมเดียว
explanation: |
  ไวยากรณ์การอัปเดตโครงสร้างใน Rust ช่วยให้คุณสร้างอินสแตนซ์โครงสร้างใหม่โดยระบุเฉพาะฟิลด์ที่คุณต้องการเปลี่ยน ในขณะที่คัดลอกฟิลด์อื่นๆ ทั้งหมดจากอินสแตนซ์ที่มีอยู่โดยอัตโนมัติ สิ่งนี้ทำได้โดยใช้ไวยากรณ์ `..existing_instance` ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: ไวยากรณ์การอัปเดตโครงสร้างจะสร้างอินสแตนซ์ใหม่เสมอแทนที่จะปรับเปลี่ยนอินสแตนซ์ที่มีอยู่ มันไม่ใช้ค่าเริ่มต้นของ generate แต่คัดลอกจากอินสแตนซ์ที่มีอยู่ และมันทำงานกับอินสแตนซ์ต้นทางเดียวแทนที่จะรวมหลายอินสแตนซ์เข้าด้วยกัน
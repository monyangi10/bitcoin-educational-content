question: 在 Rust 中建立新的結構實例時，結構更新語法可以讓您做什麼？
answer: 只指定已變更的欄位來建立新的實例，同時從現有實例複製其餘的欄位
wrong_answers:
  - 就地修改現有的結構欄位，而無需建立新的實例
  - 使用 Default 特質自動 generate 未指定欄位的預設值
  - 將多個結構實例合併為單一合併實例
explanation: |
  Rust 中的 struct update 語法允許您只指定要變更的欄位來建立新的結構實例，同時自動複製現有實例中的所有其他欄位。這是使用`...existing_instance`語法完成的。其他選項是不正確的：struct update 語法總是建立新的實例，而不是修改現有的實例；它不會 generate 預設值，而是從現有的實例複製；而且它只針對一個來源實例，而不是將多個實例合併在一起。
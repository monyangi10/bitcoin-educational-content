question: سینتکس به‌روزرسانی ساختار به شما اجازه می‌دهد تا هنگام ایجاد نمونه‌های جدید ساختار در Rust، مقادیر برخی از فیلدها را از یک نمونه موجود کپی کرده و فقط فیلدهای خاصی را تغییر دهید.
answer: با ایجاد یک نمونه جدید با مشخص کردن فقط فیلدهای تغییر یافته، در حالی که فیلدهای باقی‌مانده را از نمونه موجود کپی می‌کنید.
wrong_answers:
  - تغییر فیلدهای ساختار موجود در محل بدون ایجاد یک نمونه جدید
  - به‌طور خودکار مقادیر پیش‌فرض generate را برای فیلدهای مشخص‌نشده با استفاده از ویژگی Default تنظیم کنید.
  - ترکیب چندین نمونه ساختار به یک نمونه ترکیبی واحد
explanation: |
  سینتکس به‌روزرسانی ساختار در Rust به شما اجازه می‌دهد تا یک نمونه ساختار جدید ایجاد کنید با مشخص کردن فقط فیلدهایی که می‌خواهید تغییر دهید، در حالی که به‌طور خودکار تمام فیلدهای دیگر را از یک نمونه موجود کپی می‌کند. این کار با استفاده از سینتکس `..existing_instance` انجام می‌شود. گزینه‌های دیگر نادرست هستند: سینتکس به‌روزرسانی ساختار همیشه یک نمونه جدید ایجاد می‌کند و نمونه‌های موجود را تغییر نمی‌دهد، از مقادیر پیش‌فرض generate استفاده نمی‌کند بلکه از نمونه‌های موجود کپی می‌کند، و با یک نمونه منبع کار می‌کند و چندین نمونه را با هم ادغام نمی‌کند.
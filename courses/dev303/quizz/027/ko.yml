question: Rust에서 새 구조체 인스턴스를 생성할 때 구조체 업데이트 구문을 사용하면 어떤 작업을 할 수 있나요?
answer: 기존 인스턴스에서 나머지 필드를 복사하면서 변경된 필드만 지정하여 새 인스턴스를 만듭니다
wrong_answers:
  - 새 인스턴스를 만들지 않고 기존 구조 필드를 수정합니다
  - 기본 특성을 사용하여 지정되지 않은 필드에 대해 기본값을 자동으로 generate로 설정합니다
  - 여러 구조 인스턴스를 하나의 결합된 인스턴스로 병합하기
explanation: |
  Rust의 구조 업데이트 구문을 사용하면 변경하려는 필드만 지정하여 새 구조 인스턴스를 생성하고 다른 모든 필드는 기존 인스턴스에서 자동으로 복사할 수 있습니다. 이 작업은 '..existing_instance' 구문을 사용하여 수행됩니다. 다른 옵션은 올바르지 않습니다. 구조체 업데이트 구문은 항상 기존 인스턴스를 수정하지 않고 새 인스턴스를 생성하고, generate 기본값이 아니라 기존 인스턴스에서 복사하며, 여러 인스턴스를 병합하지 않고 하나의 소스 인스턴스로만 작동합니다.
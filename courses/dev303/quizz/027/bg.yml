question: Какво ви позволява синтаксисът за обновяване на структури, когато създавате нови екземпляри на структури в Rust?
answer: Създаване на нов екземпляр чрез посочване само на променените полета, като останалите полета се копират от съществуващ екземпляр
wrong_answers:
  - Промяна на съществуващи полета на структурата на място, без да се създава нова инстанция
  - Автоматично generate стойности по подразбиране за непосочени полета с помощта на признака По подразбиране
  - Сливане на няколко екземпляра на структури в един комбиниран екземпляр
explanation: |
  Синтаксисът за обновяване на структура в Rust позволява да създадете нов екземпляр на структура, като посочите само полетата, които искате да промените, а всички останали полета се копират автоматично от съществуващ екземпляр. Това се прави с помощта на синтаксиса `..existing_instance`. Другите варианти са некоректни: синтаксисът struct update винаги създава нов екземпляр, а не променя съществуващите, не използва стойностите по подразбиране на generate, а копира от съществуващи екземпляри, и работи с един екземпляр източник, а не обединява няколко екземпляра заедно.
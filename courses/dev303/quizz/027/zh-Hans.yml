question: 在 Rust 中创建新结构实例时，结构更新语法允许您做什么？
answer: 创建新实例时，只指定已更改的字段，同时从现有实例中复制其余字段
wrong_answers:
  - 就地修改现有结构字段，无需创建新实例
  - 使用默认特质为未指定字段自动生成 generate 默认值
  - 将多个结构实例合并为一个综合实例
explanation: |
  Rust 中的结构体更新语法允许您仅指定要更改的字段来创建新的结构体实例，同时自动复制现有实例中的所有其他字段。这是使用 `...existing_instance`（...现有实例）语法完成的。其他选项是不正确的：结构更新语法总是创建一个新实例，而不是修改现有实例；它不使用 generate 默认值，而是从现有实例中复制；它只使用一个源实例，而不是将多个实例合并在一起。
question: Rustで新しい構造体のインスタンスを作成するとき、構造体の更新構文では何ができるのですか？
answer: 既存のインスタンスから残りのフィールドをコピーしながら、変更されたフィールドのみを指定して新しいインスタンスを作成する。
wrong_answers:
  - 新しいインスタンスを作成することなく、既存の構造体フィールドをその場で修正する。
  - Default 特性を使用して、指定されていないフィールドのデフォルト値を自動的に generate に設定します。
  - 複数の構造体インスタンスを1つの結合インスタンスにマージする。
explanation: |
  Rustの構造体更新構文では、変更したいフィールドだけを指定して新しい構造体インスタンスを作成し、他のフィールドは既存のインスタンスから自動的にコピーすることができます。これは `..existing_instance` 構文を使って行います。構造体更新構文は、既存のインスタンスを変更するのではなく、常に新しいインスタンスを作成します。また、generateのデフォルト値ではなく、既存のインスタンスからコピーします。さらに、複数のインスタンスをマージするのではなく、1つのソースインスタンスで動作します。
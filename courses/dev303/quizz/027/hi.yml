question: Rust में नए स्ट्रक्चर इंस्टेंस बनाते समय स्ट्रक्चर अपडेट सिंटैक्स आपको क्या करने की अनुमति देता है?
answer: मौजूदा इंस्टेंस से शेष फ़ील्ड्स को कॉपी करते हुए, केवल परिवर्तित फ़ील्ड्स को निर्दिष्ट करके एक नया इंस्टेंस बनाएँ।
wrong_answers:
  - नया इंस्टेंस बनाए बिना मौजूदा संरचना फ़ील्ड को यथास्थान संशोधित करें
  - डिफ़ॉल्ट ट्रेट का उपयोग करके अनिर्दिष्ट फ़ील्ड के लिए generate डिफ़ॉल्ट मान स्वचालित रूप से सेट करें
  - कई संरचना इंस्टेंस को एक साथ मिलाकर एक संयुक्त इंस्टेंस बनाएं
explanation: |
  Rust में स्ट्रक्चर अपडेट सिंटैक्स आपको केवल उन फ़ील्ड्स को निर्दिष्ट करके एक नया स्ट्रक्चर इंस्टेंस बनाने की अनुमति देता है जिन्हें आप बदलना चाहते हैं, जबकि अन्य सभी फ़ील्ड्स को मौजूदा इंस्टेंस से स्वचालित रूप से कॉपी कर लिया जाता है। यह `..existing_instance` सिंटैक्स का उपयोग करके किया जाता है। अन्य विकल्प गलत हैं: स्ट्रक्चर अपडेट सिंटैक्स हमेशा मौजूदा इंस्टेंस को संशोधित करने के बजाय एक नया इंस्टेंस बनाता है, यह generate के डिफ़ॉल्ट मानों का उपयोग नहीं करता है बल्कि मौजूदा इंस्टेंस से कॉपी करता है, और यह कई इंस्टेंस को मर्ज करने के बजाय एक स्रोत इंस्टेंस के साथ काम करता है।
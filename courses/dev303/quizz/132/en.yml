question: What architectural design principle of LDK made it most suitable for mobile Lightning wallet development compared to complete node implementations?
answer: LDK was designed as a collection of modular Rust crates that can be selectively integrated rather than a monolithic application
wrong_answers:
  - LDK was built specifically for mobile devices with optimized battery usage and reduced memory footprint requirements
  - LDK provides complete blockchain synchronization and payment history functionality out of the box for mobile applications
  - LDK implements automatic channel management and recovery mechanisms that eliminate the need for custom persistence solutions
explanation: |
  LDK's modular architecture as discrete Rust crates allows developers to include only necessary functionality, reducing application size and resource consumption critical for mobile environments. Unlike monolithic implementations like LND that were designed as complete applications, LDK's library-based approach provides core Lightning functionality while allowing developers to implement mobile-specific optimizations and user experience features. The other options are incorrect because LDK wasn't specifically designed for mobile (it's platform-agnostic), doesn't provide complete functionality out of the box (requiring custom implementations for synchronization and payment history), and doesn't include automatic channel management or recovery mechanisms.

question: 在多執行緒環境中使用 RefCell 時，主要的安全問題是什麼？
answer: RefCell 不是線程安全的，如果從多個線程存取，會導致未定義的行為。
wrong_answers:
  - RefCell 會自動同步處理線程間的存取，但會造成顯著的效能開銷
  - 當多個線程試圖同時存取 RefCell 時，RefCell 會在執行時發生恐慌。
  - 當多個線程試圖同時借用相同的資料時，RefCell 就會發生死鎖。
explanation: |
  RefCell 專為單線程場景設計，缺乏任何線程同步機制。與 Mutex 之類的線程安全替代方案不同，RefCell 不執行原子操作或鎖定，因此多線程的並發存取會導致未定義的行為和潛在的資料競賽。RefCell 執行的執行時借用檢查不是線程安全的，可能會被並發存取所破壞，導致違反記憶體安全，而 Rust 通常會防止這種情況發生。
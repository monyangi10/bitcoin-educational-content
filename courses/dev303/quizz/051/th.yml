question: เมื่อใช้ RefCell ในสภาพแวดล้อมที่มีหลายเธรด ความกังวลหลักด้านความปลอดภัยคืออะไร?
answer: RefCell ไม่ปลอดภัยต่อเธรดและจะทำให้เกิดพฤติกรรมที่ไม่สามารถคาดเดาได้หากเข้าถึงจากหลายเธรด
wrong_answers:
  - RefCell จะซิงโครไนซ์การเข้าถึงระหว่างเธรดโดยอัตโนมัติแต่มีค่าใช้จ่ายด้านประสิทธิภาพที่สูง
  - RefCell จะเกิด panic ในขณะรันไทม์เมื่อมีหลายเธรดพยายามเข้าถึงพร้อมกัน
  - RefCell จะเกิดการ deadlock เมื่อหลายเธรดพยายามยืมข้อมูลเดียวกันพร้อมกัน
explanation: |
  RefCell ได้รับการออกแบบมาเฉพาะสำหรับสถานการณ์ที่ใช้เธรดเดียวและไม่มีกลไกการซิงโครไนซ์เธรด แตกต่างจากทางเลือกที่ปลอดภัยต่อเธรดอย่าง Mutex, RefCell ไม่ได้ทำการดำเนินการแบบอะตอมิกหรือการล็อกใด ๆ ทำให้การเข้าถึงพร้อมกันจากหลายเธรดส่งผลให้เกิดพฤติกรรมที่ไม่สามารถคาดเดาได้และอาจเกิดการแข่งข้อมูล การตรวจสอบการยืมในขณะรันไทม์ที่ RefCell ดำเนินการนั้นไม่ปลอดภัยต่อเธรดและอาจถูกทำลายโดยการเข้าถึงพร้อมกัน นำไปสู่การละเมิดความปลอดภัยของหน่วยความจำที่ Rust ปกติจะป้องกัน
question: 在多线程环境中使用 RefCell 时，主要的安全问题是什么？
answer: RefCell 不是线程安全的，如果从多个线程访问，会导致未定义的行为
wrong_answers:
  - RefCell 会自动同步线程之间的访问，但会造成很大的性能开销
  - 当多个线程试图同时访问 RefCell 时，RefCell 会在运行时崩溃
  - 当多个线程同时尝试借用相同数据时，RefCell 会出现死锁现象
explanation: |
  RefCell 专为单线程设计，缺乏任何线程同步机制。与 Mutex 等线程安全替代方案不同，RefCell 不执行原子操作或锁定，因此从多个线程并发访问会导致未定义的行为和潜在的数据竞赛。RefCell 执行的运行时借用检查不是线程安全的，可能会被并发访问破坏，从而导致违反内存安全性，而 Rust 通常可以防止这种情况。
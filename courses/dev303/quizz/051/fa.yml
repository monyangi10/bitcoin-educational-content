question: هنگام استفاده از RefCell در یک محیط چند رشته‌ای، نگرانی اصلی ایمنی چیست؟
answer: RefCell ایمن در برابر نخ نیست و در صورت دسترسی از چندین نخ باعث رفتار نامشخص خواهد شد.
wrong_answers:
  - RefCell به‌طور خودکار دسترسی بین رشته‌ها را همگام‌سازی می‌کند اما با سربار عملکرد قابل توجهی همراه است.
  - RefCell در زمان اجرا دچار وحشت می‌شود وقتی که چندین رشته به‌طور همزمان سعی در دسترسی به آن داشته باشند.
  - RefCell زمانی که چندین رشته به طور همزمان سعی می‌کنند همان داده را قرض بگیرند، منجر به بن‌بست خواهد شد.
explanation: |
  RefCell به‌طور انحصاری برای سناریوهای تک‌ریسمانی طراحی شده است و فاقد هرگونه مکانیزم همگام‌سازی ریسمان است. برخلاف جایگزین‌های ایمن در برابر ریسمان مانند Mutex، RefCell هیچ عملیات اتمی یا قفلی انجام نمی‌دهد، که باعث می‌شود دسترسی همزمان از چندین ریسمان منجر به رفتار نامشخص و رقابت داده‌های بالقوه شود. بررسی‌های زمان اجرا که RefCell انجام می‌دهد، ایمن در برابر ریسمان نیستند و می‌توانند توسط دسترسی همزمان خراب شوند، که منجر به نقض ایمنی حافظه می‌شود که Rust به‌طور معمول از آن جلوگیری می‌کند.
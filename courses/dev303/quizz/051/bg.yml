question: Каква е основната грижа за безопасността при използване на RefCell в многонишкова среда?
answer: RefCell не е безопасен за нишки и ще доведе до недефинирано поведение, ако е достъпен от няколко нишки
wrong_answers:
  - RefCell автоматично синхронизира достъпа между нишките, но със значителни преразходи в производителността
  - RefCell ще изпадне в паника по време на изпълнение, когато няколко нишки се опитат да получат достъп до него едновременно
  - RefCell ще зацикли, когато няколко нишки се опитват да заемат едни и същи данни едновременно
explanation: |
  RefCell е проектиран изключително за сценарии с една нишка и не разполага с механизми за синхронизация на нишките. За разлика от алтернативите за безопасност на нишки като Mutex, RefCell не извършва атомарни операции или заключване, поради което едновременният достъп от няколко нишки води до недефинирано поведение и потенциални състезания с данни. Проверките за заемане по време на изпълнение, които RefCell извършва, не са безопасни за нишките и могат да бъдат повредени от едновременния достъп, което води до нарушения на безопасността на паметта, които Rust обикновено предотвратява.
question: При использовании RefCell в многопоточной среде в чем заключается основная проблема безопасности?
answer: RefCell не является потокобезопасным и будет вызывать неопределенное поведение при обращении к нему из нескольких потоков
wrong_answers:
  - RefCell будет автоматически синхронизировать доступ между потоками, но с существенным увеличением производительности
  - RefCell будет паниковать во время выполнения, если несколько потоков попытаются получить к нему доступ одновременно
  - RefCell заходит в тупик, когда несколько потоков пытаются одновременно заимствовать одни и те же данные
explanation: |
  RefCell разработан исключительно для однопоточных сценариев и не имеет механизмов синхронизации потоков. В отличие от потокобезопасных альтернатив, таких как Mutex, RefCell не выполняет атомарных операций или блокировки, поэтому одновременный доступ из нескольких потоков приводит к неопределенному поведению и потенциальным гонкам данных. Проверки заимствования во время выполнения, которые выполняет RefCell, не являются потокобезопасными и могут быть испорчены при одновременном доступе, что приводит к нарушениям безопасности памяти, которые Rust обычно предотвращает.
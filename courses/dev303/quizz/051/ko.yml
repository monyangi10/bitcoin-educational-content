question: 멀티 스레드 환경에서 RefCell을 사용할 때 가장 중요한 안전 문제는 무엇인가요?
answer: RefCell은 스레드 안전하지 않으며 여러 스레드에서 액세스하면 정의되지 않은 동작이 발생합니다
wrong_answers:
  - RefCell은 스레드 간 액세스를 자동으로 동기화하지만 성능 오버헤드가 상당합니다
  - 여러 스레드가 동시에 액세스를 시도하면 RefCell이 런타임에 패닉에 빠집니다
  - 여러 스레드가 동시에 동일한 데이터를 빌리려고 하면 RefCell이 교착 상태에 빠집니다
explanation: |
  RefCell은 단일 스레드 시나리오 전용으로 설계되었으며 스레드 동기화 메커니즘이 없습니다. Mutex와 같은 스레드 안전 대안과 달리 RefCell은 원자 연산이나 잠금을 수행하지 않으므로 여러 스레드에서 동시에 액세스하면 정의되지 않은 동작과 잠재적인 데이터 경합이 발생할 수 있습니다. RefCell이 수행하는 런타임 차용 검사는 스레드 안전하지 않으며 동시 액세스로 인해 손상될 수 있으며, 이로 인해 Rust이 일반적으로 방지하는 메모리 안전 위반이 발생할 수 있습니다.
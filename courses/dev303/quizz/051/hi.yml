question: मल्टी-थ्रेडेड वातावरण में RefCell का उपयोग करते समय, प्राथमिक सुरक्षा संबंधी चिंता क्या है?
answer: RefCell थ्रेड-सेफ नहीं है और यदि इसे कई थ्रेड्स से एक्सेस किया जाता है तो यह अनिश्चित व्यवहार उत्पन्न करेगा।
wrong_answers:
  - RefCell थ्रेड्स के बीच एक्सेस को स्वचालित रूप से सिंक्रनाइज़ करेगा, लेकिन इससे परफॉर्मेंस पर काफी असर पड़ेगा।
  - जब एक से अधिक थ्रेड एक साथ RefCell को एक्सेस करने का प्रयास करते हैं, तो रनटाइम पर RefCell क्रैश हो जाएगा।
  - जब कई थ्रेड एक साथ एक ही डेटा उधार लेने का प्रयास करते हैं तो RefCell में गतिरोध उत्पन्न हो जाता है।
explanation: |
  RefCell को विशेष रूप से सिंगल-थ्रेडेड परिदृश्यों के लिए डिज़ाइन किया गया है और इसमें किसी भी प्रकार का थ्रेड सिंक्रोनाइज़ेशन तंत्र नहीं है। Mutex जैसे थ्रेड-सुरक्षित विकल्पों के विपरीत, RefCell कोई एटॉमिक ऑपरेशन या लॉकिंग नहीं करता है, जिससे कई थ्रेड्स द्वारा एक साथ एक्सेस करने पर अनिश्चित व्यवहार और डेटा रेस की संभावना उत्पन्न हो सकती है। RefCell द्वारा किए जाने वाले रनटाइम बरोइंग चेक थ्रेड-सुरक्षित नहीं हैं और एक साथ एक्सेस करने से दूषित हो सकते हैं, जिससे मेमोरी सुरक्षा उल्लंघन हो सकते हैं जिन्हें Rust सामान्यतः रोकता है।
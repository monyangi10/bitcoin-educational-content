question: Какова основная цель использования map_err() при цепочке операций с типами Result в Rust?
answer: Для преобразования типов ошибок, оставляя значения успеха неизменными при распространении ошибки
wrong_answers:
  - Для преобразования успешных значений при автоматическом распространении ошибок без изменений
  - Для преобразования типов Result в типы Option, когда необходимо игнорировать ошибки
  - Чтобы предотвратить распространение ошибок, преобразуйте все ошибки в значения успеха по умолчанию
explanation: |
  Метод map_err() специально разработан для преобразования типов ошибок при сохранении неизменными значений успеха. Это очень важно для создания многоуровневых приложений, в которых разные компоненты нуждаются в различных представлениях ошибок. Например, вы можете преобразовать низкоуровневые ошибки парсинга в специфические для домена ошибки, которые обеспечивают лучший контекст. Другие варианты неверны: map() преобразует значения успеха (не map_err()), map_err() не преобразует в опциональные типы, не предотвращает распространение и не создает значения успеха по умолчанию.
question: 在 Rust 中使用结果类型进行连锁操作时，使用 map_err() 的主要目的是什么？
answer: 转换错误类型，同时在错误传播过程中保持成功值不变
wrong_answers:
  - 转换成功值，同时自动传播错误，无需修改
  - 当需要忽略错误时，将结果类型转换为选项类型
  - 将所有错误转换为默认成功值，以防止错误传播
explanation: |
  map_err() 方法专门用于转换错误类型，同时保留成功值不变。这对于构建分层应用程序至关重要，因为不同的组件需要不同的错误表示。例如，您可以将低级解析错误转换为特定领域的错误，从而提供更好的上下文。其他选项都不正确：map() 会转换成功值（而不是 map_err()），map_err() 不会转换为选项类型，也不会阻止传播或创建默认成功值。
question: 在 Rust 中使用結果類型進行連鎖操作時，使用 map_err() 的主要目的是什麼？
answer: 轉換錯誤類型，同時在錯誤傳播過程中保持成功值不變
wrong_answers:
  - 轉換成功值，同時自動傳播錯誤而不做修改
  - 當需要忽略錯誤時，將結果類型轉換為選項類型
  - 將所有錯誤轉換為預設成功值，以防止錯誤傳播
explanation: |
  map_err() 方法專門用來轉換錯誤類型，同時保留成功值不變。這對於建立分層應用程式非常重要，不同的元件需要不同的錯誤表示。例如，您可以將低階解析錯誤轉換為特定領域的錯誤，以提供更好的上下文。其他選項是不正確的：map() 會轉換成功值 (而不是 map_err())，map_err() 不會轉換為 Option 類型，也不會阻止傳播或建立預設的成功值。
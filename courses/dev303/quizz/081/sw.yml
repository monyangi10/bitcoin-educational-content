question: Kusudi kuu la kutumia map_err() wakati wa kuunganisha shughuli na aina za Results katika Rust ni lipi?
answer: Kubadilisha aina za makosa huku ukiacha thamani za mafanikio zikiwa hazijabadilika wakati wa uenezaji wa makosa
wrong_answers:
  - Kubadilisha thamani za mafanikio huku ukieneza makosa kiotomatiki bila marekebisho
  - Kubadilisha aina za Matokeo kuwa aina za Chaguo wakati makosa yanahitaji kupuuzwa
  - Ili kuzuia uenezaji wa makosa kwa kubadilisha makosa yote kuwa thamani chaguo-msingi za mafanikio
explanation: |
  Mbinu ya map_err() imeundwa mahsusi kubadilisha aina za makosa huku ikihifadhi thamani za mafanikio bila kubadilika. Hii ni muhimu kwa ajili ya kujenga programu zenye tabaka ambapo vipengele tofauti vinahitaji uwakilishi tofauti wa makosa. Kwa mfano, unaweza kubadilisha makosa ya uchanganuzi wa kiwango cha chini kuwa makosa maalum ya kikoa ambayo hutoa muktadha bora. Chaguzi zingine si sahihi: map() hubadilisha thamani za mafanikio (sio map_err()), map_err() haibadilishi kuwa aina za Chaguo, na haizuii uenezaji au kuunda thamani chaguo-msingi za mafanikio.

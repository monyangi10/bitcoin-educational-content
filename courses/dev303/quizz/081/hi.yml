question: Rust में रिजल्ट प्रकारों के साथ ऑपरेशनों को चेन करते समय map_err() का उपयोग करने का प्राथमिक उद्देश्य क्या है?
answer: त्रुटि प्रसार के दौरान सफलता मूल्यों को अपरिवर्तित रखते हुए त्रुटि प्रकारों को रूपांतरित करना।
wrong_answers:
  - त्रुटियों को बिना किसी संशोधन के स्वचालित रूप से प्रसारित करते हुए सफलता मूल्यों को रूपांतरित करना।
  - त्रुटियों को अनदेखा करने की आवश्यकता होने पर परिणाम प्रकारों को विकल्प प्रकारों में परिवर्तित करने के लिए
  - त्रुटि प्रसार को रोकने के लिए सभी त्रुटियों को डिफ़ॉल्ट सफलता मानों में परिवर्तित करना।
explanation: |
  map_err() विधि विशेष रूप से त्रुटि प्रकारों को रूपांतरित करने के लिए डिज़ाइन की गई है, जबकि सफलता मान अपरिवर्तित रहते हैं। यह स्तरित अनुप्रयोगों के निर्माण के लिए महत्वपूर्ण है जहाँ विभिन्न घटकों को त्रुटि के विभिन्न निरूपणों की आवश्यकता होती है। उदाहरण के लिए, आप निम्न-स्तरीय पार्सिंग त्रुटियों को डोमेन-विशिष्ट त्रुटियों में परिवर्तित कर सकते हैं जो बेहतर संदर्भ प्रदान करती हैं। अन्य विकल्प गलत हैं: map() सफलता मानों को रूपांतरित करता है (map_err() नहीं), map_err() विकल्प प्रकारों में परिवर्तित नहीं करता है, और यह प्रसार को नहीं रोकता है या डिफ़ॉल्ट सफलता मान नहीं बनाता है।
question: วัตถุประสงค์หลักของการใช้ map_err() เมื่อเชื่อมโยงการดำเนินการกับประเภท Result ใน Rust คืออะไร?
answer: เพื่อแปลงประเภทข้อผิดพลาดในขณะที่ปล่อยให้ค่าความสำเร็จไม่เปลี่ยนแปลงระหว่างการแพร่กระจายข้อผิดพลาด
wrong_answers:
  - เพื่อแปลงค่าความสำเร็จในขณะที่เผยแพร่ข้อผิดพลาดโดยอัตโนมัติโดยไม่ต้องแก้ไข
  - ในการแปลงประเภท Result เป็นประเภท Option เมื่อจำเป็นต้องละเว้นข้อผิดพลาด
  - เพื่อป้องกันการแพร่กระจายของข้อผิดพลาดโดยการแปลงข้อผิดพลาดทั้งหมดเป็นค่าความสำเร็จเริ่มต้น
explanation: |
  เมธอด map_err() ถูกออกแบบมาเพื่อแปลงประเภทข้อผิดพลาดในขณะที่รักษาค่าความสำเร็จไว้ไม่เปลี่ยนแปลง ซึ่งเป็นสิ่งสำคัญสำหรับการสร้างแอปพลิเคชันแบบเลเยอร์ที่ส่วนประกอบต่างๆ ต้องการการแสดงข้อผิดพลาดที่แตกต่างกัน ตัวอย่างเช่น คุณสามารถแปลงข้อผิดพลาดการแยกวิเคราะห์ระดับต่ำให้เป็นข้อผิดพลาดเฉพาะโดเมนที่ให้บริบทที่ดีกว่า ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: map() แปลงค่าความสำเร็จ (ไม่ใช่ map_err()), map_err() ไม่ได้แปลงเป็นประเภท Option และไม่ได้ป้องกันการแพร่กระจายหรือสร้างค่าความสำเร็จเริ่มต้น
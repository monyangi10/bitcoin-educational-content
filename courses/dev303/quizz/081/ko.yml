question: Rust에서 결과 유형으로 연산을 연결할 때 map_err()를 사용하는 주요 목적은 무엇인가요?
answer: 오류 전파 중에 성공 값을 변경하지 않고 오류 유형을 변환하려면 다음과 같이 하세요
wrong_answers:
  - 수정 없이 오류를 자동으로 전파하면서 성공 값을 변환하려면 다음과 같이 하세요
  - 오류를 무시해야 할 때 결과 유형을 옵션 유형으로 변환하려면 다음과 같이 하세요
  - 모든 오류를 기본 성공 값으로 변환하여 오류 전파를 방지하려면 다음과 같이 하세요
explanation: |
  Map_err() 메서드는 성공값은 그대로 유지하면서 오류 유형을 변환하도록 특별히 설계되었습니다. 이는 여러 구성 요소가 서로 다른 오류 표현을 필요로 하는 계층화된 애플리케이션을 구축하는 데 매우 중요합니다. 예를 들어 저수준 구문 분석 오류를 더 나은 컨텍스트를 제공하는 도메인별 오류로 변환할 수 있습니다. 다른 옵션은 올바르지 않습니다. map()은 성공 값을 변환하고(map_err() 대신), map_err()는 옵션 유형으로 변환하지 않으며, 전파를 방지하거나 기본 성공 값을 만들지 않습니다.
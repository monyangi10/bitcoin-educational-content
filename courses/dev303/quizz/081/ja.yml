question: Rustにおいて、Result型で処理を連鎖させる際にmap_err()を使用する主な目的は何ですか？
answer: エラー伝播中に成功値を変更せずにエラータイプを変換する。
wrong_answers:
  - エラーを修正せずに自動的に伝播しながら成功値を変換する
  - エラーを無視する必要がある場合に、Result型をOption型に変換する。
  - すべてのエラーをデフォルトの成功値に変換してエラーの伝播を防ぐ
explanation: |
  map_err()メソッドは、成功値を変更せずにエラー・タイプを変換するように特別に設計されている。これは、異なるコンポーネントが異なるエラー表現を必要とするようなレイヤー化されたアプリケーションを構築する際に非常に重要です。たとえば、低レベルのパースエラーをドメイン固有のエラーに変換することで、 よりよいコンテキストを提供することができます。map()は成功値を変換し（map_err()ではありません）、 map_err()はOption型に変換せず、伝播を防止したりデフォルトの成功値を作成したりしません。
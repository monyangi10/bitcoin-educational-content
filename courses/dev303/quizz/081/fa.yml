question: هدف اصلی استفاده از تابع map_err() هنگام زنجیره‌سازی عملیات با انواع Result در Rust چیست؟
answer: برای تبدیل انواع خطا در حالی که مقادیر موفقیت را در طول انتشار خطا بدون تغییر باقی می‌گذارد
wrong_answers:
  - برای تبدیل مقادیر موفقیت در حالی که خطاها را به طور خودکار بدون تغییر انتقال می‌دهید
  - برای تبدیل انواع Result به انواع Option زمانی که نیاز است خطاها نادیده گرفته شوند
  - برای جلوگیری از انتشار خطا با تبدیل تمام خطاها به مقادیر موفقیت پیش‌فرض
explanation: |
  متد map_err() به‌طور خاص برای تبدیل انواع خطا طراحی شده است در حالی که مقادیر موفقیت را بدون تغییر حفظ می‌کند. این امر برای ساخت برنامه‌های لایه‌ای که در آن اجزای مختلف به نمایش‌های خطای متفاوتی نیاز دارند، حیاتی است. به عنوان مثال، می‌توانید خطاهای تجزیه سطح پایین را به خطاهای خاص دامنه تبدیل کنید که زمینه بهتری را فراهم می‌کنند. گزینه‌های دیگر نادرست هستند: map() مقادیر موفقیت را تبدیل می‌کند (نه map_err())، map_err() به انواع Option تبدیل نمی‌شود و از انتشار جلوگیری نمی‌کند یا مقادیر موفقیت پیش‌فرض ایجاد نمی‌کند.
question: Каква е основната цел на използването на map_err() при верижни операции с типове резултати в Rust?
answer: Трансформиране на типовете грешки, като стойностите за успех остават непроменени по време на разпространението на грешката
wrong_answers:
  - Трансформиране на стойностите за успех при автоматично разпространение на грешките без модификация
  - Конвертиране на типове резултати в типове опции, когато е необходимо да се игнорират грешки
  - Предотвратяване на разпространението на грешки чрез преобразуване на всички грешки в стойности за успех по подразбиране
explanation: |
  Методът map_err() е специално разработен за трансформиране на типове грешки, като запазва стойностите за успех непроменени. Това е от решаващо значение за изграждането на многослойни приложения, при които различните компоненти се нуждаят от различни представяния на грешките. Например можете да преобразувате грешки от ниско ниво на парсиране в специфични за областта грешки, които осигуряват по-добър контекст. Другите варианти са некоректни: map() преобразува стойностите на успеха (не map_err()), map_err() не преобразува в типове Option и не предотвратява разпространението или не създава стойности на успеха по подразбиране.
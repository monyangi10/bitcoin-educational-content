question: Какъв критичен проблем решава механизмът за каналите "точно навреме" на Breez SDK, с който традиционните реализации на Lightning се борят?
answer: Тя автоматично създава нови канали с достатъчна входяща ликвидност при постъпване на плащания, като елиминира необходимостта потребителите ръчно да управляват капацитета на каналите
wrong_answers:
  - Тя предотвратява принудителното затваряне на каналите чрез автоматично ребалансиране на средствата в няколко канала, когато един от тях не реагира или е офлайн
  - Той намалява таксите за трансакции чрез групиране на множество малки плащания в по-големи операции по каналите, които се обработват в часовете извън пиковите часове на мрежата
  - Той елиминира нуждата от услуги за наблюдение чрез създаване на временни канали, които автоматично изтичат след успешно приключване на плащането
explanation: |
  Механизмът на канала "точно навреме" е насочен към предизвикателството на Lightning за управление на ликвидността, при което средствата могат да се движат само в посоки, в които има капацитет. Когато даден потребител трябва да получи плащане, но няма достатъчно входяща ликвидност, LSP автоматично отваря нов канал в момента на пристигане на плащането, което става безпроблемно, без намесата на потребителя. Грешните отговори описват други предизвикателства на Lightning, но не и специфичния проблем с ликвидността, който каналите "точно навреме" решават.
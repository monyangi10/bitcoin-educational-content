question: Breez SDK 的及时通道机制解决了传统 Lightning 实现中难以解决的什么关键问题？
answer: 当付款到达时，它会自动创建具有足够入站流动性的新渠道，用户无需手动管理渠道容量
wrong_answers:
  - 当一个渠道无法响应或脱机时，它可自动重新平衡多个渠道的资金，从而防止渠道被强行关闭
  - 它通过将多个小额支付批量转化为在非高峰网络时段处理的较大通道业务，降低了交易费用
  - 它通过创建临时通道，在付款成功后自动失效，从而消除了对 Watchtower 服务的需求。
explanation: |
  及时通道机制专门解决了 "闪电 "的流动性管理难题，即资金只能流向有能力的方向。当用户需要接收付款但缺乏足够的入站流动资金时，LSP 会在付款到达时自动打开一个新通道，无需用户干预即可实现无缝操作。错误答案描述的是其他 "闪电 "挑战，而不是及时通道所能解决的具体流动性问题。
question: Breez SDK का जस्ट-इन-टाइम चैनल तंत्र किस महत्वपूर्ण समस्या का समाधान करता है जिससे पारंपरिक लाइटनिंग कार्यान्वयन जूझते हैं?
answer: भुगतान प्राप्त होने पर यह स्वचालित रूप से पर्याप्त आवक तरलता वाले नए चैनल बनाता है, जिससे उपयोगकर्ताओं को चैनल क्षमता को मैन्युअल रूप से प्रबंधित करने की आवश्यकता समाप्त हो जाती है।
wrong_answers:
  - यह चैनल के अचानक बंद होने से बचाता है, क्योंकि जब कोई चैनल काम करना बंद कर देता है या ऑफ़लाइन हो जाता है, तो यह स्वचालित रूप से कई चैनलों में फंड को रीबैलेंस कर देता है।
  - यह कई छोटे भुगतानों को एक बड़े चैनल लेनदेन में एकत्रित करके लेनदेन शुल्क को कम करता है, जिन्हें नेटवर्क के व्यस्त समय के बाहर संसाधित किया जाता है।
  - यह अस्थायी चैनल बनाकर निगरानी सेवाओं की आवश्यकता को समाप्त करता है जो भुगतान सफलतापूर्वक पूरा होने के बाद स्वतः समाप्त हो जाते हैं।
explanation: |
  जस्ट-इन-टाइम चैनल तंत्र विशेष रूप से लाइटनिंग की तरलता प्रबंधन चुनौती का समाधान करता है, जहां धनराशि केवल उसी दिशा में प्रवाहित हो सकती है जहां क्षमता मौजूद हो। जब किसी उपयोगकर्ता को भुगतान प्राप्त करने की आवश्यकता होती है लेकिन उसके पास पर्याप्त आवक तरलता नहीं होती है, तो एलएसपी भुगतान प्राप्त होते ही स्वचालित रूप से एक नया चैनल खोल देता है, जो उपयोगकर्ता के हस्तक्षेप के बिना निर्बाध रूप से होता है। गलत उत्तर लाइटनिंग की अन्य चुनौतियों का वर्णन करते हैं, लेकिन उस विशिष्ट तरलता समस्या का नहीं जिसे जस्ट-इन-टाइम चैनल हल करते हैं।
question: Какую критическую проблему решает механизм каналов "точно в срок" в Breez SDK, с которой сталкиваются традиционные реализации Lightning?
answer: Она автоматически создает новые каналы с достаточным объемом входящей ликвидности при поступлении платежей, избавляя пользователей от необходимости вручную управлять пропускной способностью каналов
wrong_answers:
  - Он предотвращает принудительное закрытие каналов, автоматически перераспределяя средства по нескольким каналам, когда один из них перестает отвечать на запросы или выходит из строя
  - Он снижает комиссионные за транзакции, объединяя множество мелких платежей в более крупные канальные операции, которые обрабатываются в непиковые часы работы сети
  - Он устраняет необходимость в услугах сторожа, создавая временные каналы, которые автоматически заканчиваются после успешного завершения оплаты
explanation: |
  Механизм каналов "точно в срок" специально решает проблему управления ликвидностью в Lightning, когда средства могут поступать только в тех направлениях, где есть пропускная способность. Когда пользователю необходимо получить платеж, но у него нет достаточной входящей ликвидности, LSP автоматически открывает новый канал в момент поступления платежа, что происходит без вмешательства пользователя. Неправильные ответы описывают другие проблемы Lightning, но не конкретную проблему ликвидности, которую решают каналы "точно в срок".
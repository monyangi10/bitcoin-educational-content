question: Breez SDK 的即時通道機制解決了傳統 Lightning 實作中難以解決的什麼關鍵問題？
answer: 當付款到達時，它會自動建立有足夠入站流動資金的新通道，省去使用者手動管理通道容量的麻煩。
wrong_answers:
  - 當一個渠道無法回應或離線時，它會自動重新平衡多個渠道的資金，以防止渠道強制封閉。
  - 它透過將多筆小額付款分批轉換為在非繁忙網路時段處理的較大通道作業，以降低交易費用。
  - 它透過建立臨時通道，在成功完成付款後自動失效，從而消除了對 watchtower 服務的需求。
explanation: |
  及時通道機制專門針對 Lightning 的流動資金管理挑戰，即資金只能流向存在容量的方向。當用戶需要接收付款，但缺乏足夠的流入流動資金時，LSP 會在付款到達時自動打開一個新通道，無需用戶干預。錯誤的答案描述了其他 Lightning 挑戰，但沒有描述即時通道解決的特定流動性問題。
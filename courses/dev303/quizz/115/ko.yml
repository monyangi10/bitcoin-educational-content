question: Breez SDK의 적시 채널 메커니즘은 기존의 라이트닝 구현이 어려움을 겪는 어떤 중요한 문제를 해결하나요?
answer: 결제가 도착하면 충분한 인바운드 유동성을 갖춘 새 채널을 자동으로 생성하므로 사용자가 채널 용량을 수동으로 관리할 필요가 없습니다
wrong_answers:
  - 한 채널이 응답하지 않거나 오프라인 상태가 되면 여러 채널의 자금을 자동으로 리밸런싱하여 채널 강제 폐쇄를 방지합니다
  - 네트워크 사용량이 적은 시간대에 처리되는 여러 개의 소액 결제를 대규모 채널 작업으로 일괄 처리하여 거래 수수료를 절감합니다
  - 결제 완료 후 자동으로 만료되는 임시 채널을 생성하여 워치타워 서비스가 필요하지 않습니다
explanation: |
  적시 채널 메커니즘은 특히 자금이 용량이 있는 방향으로만 흘러갈 수 있는 라이트닝의 유동성 관리 문제를 해결합니다. 사용자가 결제를 받아야 하지만 충분한 인바운드 유동성이 부족한 경우, LSP는 결제가 도착하는 순간 자동으로 새 채널을 열어 사용자 개입 없이 원활하게 진행합니다. 오답은 적시 채널이 해결하는 특정 유동성 문제가 아닌 다른 Lightning 문제를 설명하는 것입니다.
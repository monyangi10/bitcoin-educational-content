question: مکانیزم کانال لحظه‌ای Breez SDK چه مشکلی اساسی را حل می‌کند که پیاده‌سازی‌های سنتی لایتنینگ با آن دست و پنجه نرم می‌کنند؟
answer: به‌طور خودکار کانال‌های جدیدی با نقدینگی ورودی کافی ایجاد می‌کند وقتی پرداخت‌ها می‌رسند، و نیاز کاربران به مدیریت دستی ظرفیت کانال را از بین می‌برد.
wrong_answers:
  - این کار با متعادل‌سازی خودکار وجوه در چندین کانال زمانی که یکی از آن‌ها غیرپاسخگو یا آفلاین می‌شود، از بسته شدن اجباری کانال‌ها جلوگیری می‌کند.
  - این کار با تجمیع چندین پرداخت کوچک به عملیات کانال بزرگ‌تر که در ساعات غیر اوج شبکه پردازش می‌شوند، هزینه‌های تراکنش را کاهش می‌دهد.
  - این نیاز به خدمات برج مراقبت را با ایجاد کانال‌های موقتی که پس از تکمیل موفقیت‌آمیز پرداخت به‌طور خودکار منقضی می‌شوند، از بین می‌برد.
explanation: |
  مکانیزم کانال به‌موقع به‌طور خاص به چالش مدیریت نقدینگی لایتنینگ می‌پردازد، جایی که وجوه تنها در جهت‌هایی که ظرفیت وجود دارد، می‌توانند جریان یابند. هنگامی که یک کاربر نیاز به دریافت پرداخت دارد اما نقدینگی ورودی کافی ندارد، LSP به‌طور خودکار یک کانال جدید را در لحظه‌ای که پرداخت می‌رسد باز می‌کند، که بدون دخالت کاربر به‌صورت یکپارچه انجام می‌شود. پاسخ‌های نادرست چالش‌های دیگر لایتنینگ را توصیف می‌کنند اما نه مشکل خاص نقدینگی که کانال‌های به‌موقع حل می‌کنند.
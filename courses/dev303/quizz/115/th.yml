question: กลไกช่องทางแบบทันเวลาของ Breez SDK แก้ปัญหาสำคัญอะไรที่การใช้งาน Lightning แบบดั้งเดิมต้องเผชิญ?
answer: มันสร้างช่องทางใหม่โดยอัตโนมัติด้วยสภาพคล่องขาเข้าที่เพียงพอเมื่อการชำระเงินมาถึง ทำให้ไม่จำเป็นต้องให้ผู้ใช้จัดการความจุของช่องทางด้วยตนเอง
wrong_answers:
  - มันป้องกันการปิดช่องทางโดยอัตโนมัติโดยการปรับสมดุลเงินทุนในหลายช่องทางเมื่อช่องทางหนึ่งไม่ตอบสนองหรือออฟไลน์
  - มันลดค่าธรรมเนียมการทำธุรกรรมโดยการรวมการชำระเงินขนาดเล็กหลายรายการเข้าด้วยกันเป็นการดำเนินการช่องทางที่ใหญ่ขึ้นซึ่งจะถูกประมวลผลในช่วงเวลาที่เครือข่ายไม่หนาแน่น
  - มันกำจัดความจำเป็นสำหรับบริการหอคอยเฝ้าดูโดยการสร้างช่องทางชั่วคราวที่หมดอายุโดยอัตโนมัติหลังจากการชำระเงินเสร็จสมบูรณ์
explanation: |
  กลไกช่องทางแบบทันเวลา (just-in-time) จัดการกับความท้าทายในการจัดการสภาพคล่องของ Lightning โดยเฉพาะ ซึ่งเงินทุนสามารถไหลไปในทิศทางที่มีความจุเท่านั้น เมื่อผู้ใช้ต้องการรับการชำระเงินแต่ขาดสภาพคล่องขาเข้าเพียงพอ LSP จะเปิดช่องทางใหม่โดยอัตโนมัติในขณะที่การชำระเงินมาถึง ซึ่งเกิดขึ้นอย่างราบรื่นโดยไม่ต้องมีการแทรกแซงจากผู้ใช้ คำตอบที่ผิดอธิบายถึงความท้าทายอื่น ๆ ของ Lightning แต่ไม่ใช่ปัญหาสภาพคล่องเฉพาะที่ช่องทางแบบทันเวลาแก้ไขได้
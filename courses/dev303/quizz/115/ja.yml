question: Breez SDKのジャストインタイム・チャネル・メカニズムは、従来のLightning実装が苦労している、どのような重要な問題を解決するのでしょうか？
answer: 入金が確認されると、十分なインバウンド流動性を備えた新しいチャネルが自動的に作成されるため、ユーザがチャネルのキャパシティを手動で管理する必要がなくなります。
wrong_answers:
  - 1つのチャネルが応答不能になったりオフラインになった場合、複数のチャネルにまたがる資金を自動的にリバランスすることで、チャネルの強制閉鎖を防ぎます。
  - 複数の少額決済を、オフピークのネットワーク時間帯に処理される大規模なチャネルオペレーションにバッチ処理することで、取引手数料を削減します。
  - 支払い完了後に自動的に期限切れとなる一時的なチャンネルを作成することで、監視塔サービスの必要性を排除します。
explanation: |
  ジャストインタイム・チャネル・メカニズムは、資金がキャパシティのある方向にしか流れないというLightningの流動性管理の課題に特化している。ユーザーが支払いを受け取る必要があるが、十分な流入流動性がない場合、LSPは支払いが到着した瞬間に自動的に新しいチャネルを開設し、ユーザーの介入なしにシームレスに行われる。間違った答えは、ジャスト・イン・タイム・チャネルが解決する特定の流動性問題ではなく、他のライトニングの課題を説明している。
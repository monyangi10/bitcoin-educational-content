question: Rust에서 일반적으로 차입 규칙을 시행하는 방식과 RefCell에서 시행하는 방식의 주요 차이점은 무엇인가요?
answer: Rust은 일반적으로 컴파일 타임에 차용 규칙을 적용하는 반면 RefCell은 런타임에 적용합니다
wrong_answers:
  - Rust는 일반적으로 여러 개의 변경 가능한 참조를 허용하지만 RefCell은 하나로 제한합니다
  - Rust는 일반적으로 안전을 위해 레퍼런스 카운팅을 사용하는 반면, RefCell은 정적 분석을 사용합니다
  - Rust는 일반적으로 명시적인 메모리 관리가 필요하지만 RefCell은 이를 자동으로 처리합니다
explanation: |
  RefCell의 핵심 혁신은 차용 규칙 적용을 컴파일 타임에서 런타임으로 옮긴 것입니다. 일반적인 Rust 참조는 컴파일 중에 컴파일러가 안전을 보장하기 위해 검사하지만, RefCell은 프로그램이 실행되는 동안 동일한 검사를 수행합니다. 따라서 컴파일러의 정적 분석이 지나치게 보수적인 상황에서 내부 가변성을 제공할 수 있지만, 차용 규칙을 위반할 경우 런타임 패닉이 발생할 수 있다는 단점이 있습니다. 다른 옵션은 Rust의 기본 안전 메커니즘이나 RefCell의 실제 동작을 잘못 설명합니다.
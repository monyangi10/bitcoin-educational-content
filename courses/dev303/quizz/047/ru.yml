question: В чем основная разница между тем, как Rust обычно применяет правила заимствования, и тем, как их применяет RefCell?
answer: Rust обычно применяет правила заимствования во время компиляции, в то время как RefCell применяет их во время выполнения
wrong_answers:
  - Rust обычно допускает несколько изменяемых ссылок, в то время как RefCell ограничивает их одной
  - Rust обычно использует подсчет ссылок для обеспечения безопасности, в то время как RefCell использует статический анализ
  - Rust обычно требует явного управления памятью, в то время как RefCell справляется с этим автоматически
explanation: |
  Ключевым новшеством RefCell является перенос исполнения правил заимствования с момента компиляции на время выполнения программы. Обычные ссылки Rust проверяются компилятором во время компиляции для обеспечения безопасности, но RefCell выполняет те же проверки во время выполнения программы. Это позволяет RefCell обеспечить внутреннюю изменяемость в ситуациях, когда статический анализ компилятора слишком консервативен, но в качестве компромисса - потенциальные паники во время выполнения при нарушении правил заимствования. Другие варианты неверно описывают фундаментальные механизмы безопасности Rust или реальное поведение RefCell.
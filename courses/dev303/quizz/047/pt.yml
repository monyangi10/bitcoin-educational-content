question: Qual é a principal diferença entre a forma como o Rust aplica normalmente as regras de empréstimo e a forma como a RefCell as aplica?
answer: O Rust normalmente impõe regras de empréstimo em tempo de compilação, enquanto o RefCell as impõe em tempo de execução
wrong_answers:
  - O Rust permite normalmente múltiplas referências mutáveis, enquanto o RefCell as limita a uma
  - O Rust utiliza normalmente a contagem de referências para segurança, enquanto o RefCell utiliza a análise estática
  - O Rust requer normalmente uma gestão explícita da memória, enquanto que o RefCell trata disso automaticamente
explanation: |
  A principal inovação do RefCell é mover a aplicação da regra de empréstimo do tempo de compilação para o tempo de execução. As referências Rust normais são verificadas pelo compilador durante a compilação para garantir a segurança, mas o RefCell realiza essas mesmas verificações enquanto o programa está em execução. Isso permite que o RefCell forneça mutabilidade interior em situações onde a análise estática do compilador é muito conservadora, mas vem com a desvantagem de potenciais panes em tempo de execução se as regras de empréstimo forem violadas. As outras opções descrevem incorretamente os mecanismos de segurança fundamentais do Rust ou o comportamento real do RefCell.
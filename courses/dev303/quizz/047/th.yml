question: ความแตกต่างหลักระหว่างวิธีที่ Rust บังคับใช้กฎการยืมตามปกติและวิธีที่ RefCell บังคับใช้คืออะไร?
answer: Rust มักจะบังคับใช้กฎการยืมในขณะคอมไพล์ ในขณะที่ RefCell บังคับใช้กฎเหล่านั้นในขณะรันไทม์
wrong_answers:
  - Rust โดยปกติจะอนุญาตให้มีการอ้างอิงที่เปลี่ยนแปลงได้หลายรายการ ในขณะที่ RefCell จำกัดให้มีเพียงหนึ่งเดียว
  - Rust ปกติจะใช้การนับอ้างอิงเพื่อความปลอดภัย ในขณะที่ RefCell ใช้การวิเคราะห์แบบสถิต
  - Rust โดยปกติจะต้องจัดการหน่วยความจำอย่างชัดเจน ในขณะที่ RefCell จัดการโดยอัตโนมัติ
explanation: |
  นวัตกรรมหลักของ RefCell คือการย้ายการบังคับใช้กฎการยืมจากเวลาคอมไพล์ไปยังเวลารันไทม์ การอ้างอิง Rust ปกติจะถูกตรวจสอบโดยคอมไพเลอร์ระหว่างการคอมไพล์เพื่อความปลอดภัย แต่ RefCell ทำการตรวจสอบเดียวกันนี้ในขณะที่โปรแกรมกำลังทำงาน สิ่งนี้ทำให้ RefCell สามารถให้การเปลี่ยนแปลงภายในในสถานการณ์ที่การวิเคราะห์แบบสถิตของคอมไพเลอร์อนุรักษ์นิยมเกินไป แต่มีการแลกเปลี่ยนกับความเสี่ยงที่จะเกิดการหยุดทำงานของโปรแกรมหากกฎการยืมถูกละเมิด ตัวเลือกอื่น ๆ อธิบายกลไกความปลอดภัยพื้นฐานของ Rust หรือพฤติกรรมจริงของ RefCell อย่างไม่ถูกต้อง
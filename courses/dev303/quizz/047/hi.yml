question: Rust द्वारा उधार लेने के नियमों को लागू करने के सामान्य तरीके और RefCell द्वारा उन्हें लागू करने के तरीके में मुख्य अंतर क्या है?
answer: Rust सामान्यतः संकलन समय पर उधार लेने के नियमों को लागू करता है, जबकि RefCell उन्हें रनटाइम पर लागू करता है।
wrong_answers:
  - Rust सामान्यतः कई परिवर्तनीय संदर्भों की अनुमति देता है, जबकि RefCell उन्हें एक तक सीमित रखता है।
  - सुरक्षा के लिए Rust सामान्यतः संदर्भ गणना का उपयोग करता है, जबकि RefCell स्थैतिक विश्लेषण का उपयोग करता है।
  - Rust को सामान्यतः स्पष्ट मेमोरी प्रबंधन की आवश्यकता होती है, जबकि RefCell इसे स्वचालित रूप से संभालता है।
explanation: |
  RefCell की प्रमुख नवीनता यह है कि यह उधार नियमों के प्रवर्तन को संकलन समय से रनटाइम पर स्थानांतरित करता है। सामान्य Rust संदर्भों की सुरक्षा सुनिश्चित करने के लिए संकलन के दौरान कंपाइलर द्वारा जाँच की जाती है, लेकिन RefCell प्रोग्राम के चलने के दौरान यही जाँच करता है। इससे RefCell उन स्थितियों में आंतरिक परिवर्तनशीलता प्रदान कर सकता है जहाँ कंपाइलर का स्थैतिक विश्लेषण बहुत रूढ़िवादी होता है, लेकिन उधार नियमों के उल्लंघन की स्थिति में रनटाइम पैनिक की संभावना बनी रहती है। अन्य विकल्प Rust के मूलभूत सुरक्षा तंत्रों या RefCell के वास्तविक व्यवहार का गलत वर्णन करते हैं।
question: Rustの借用ルールの適用方法と、RefCellの適用方法の主な違いは何ですか？
answer: Rustは通常、コンパイル時に借用ルールを適用するが、RefCellは実行時に適用する。
wrong_answers:
  - Rustは通常、複数の変更可能な参照を許可しているが、RefCellはそれを1つに制限している。
  - Rustは通常、安全のために参照カウントを使用するが、RefCellは静的解析を使用する。
  - Rustでは通常、明示的なメモリ管理が必要だが、RefCellでは自動的に処理される。
explanation: |
  RefCellの主な革新点は、借用ルールの実施をコンパイル時から実行時に移したことだ。通常の Rust 参照はコンパイラによってコンパイル時にチェックされ、安全性が確保されますが、RefCell はプログラムの実行中に同じチェックを行います。これにより、RefCellは、コンパイラの静的解析が保守的すぎるような状況で、内部的な変異性を提供することができますが、借用ルールに違反した場合に実行時にパニックが発生する可能性があるというトレードオフを伴います。他のオプションは、Rustの基本的な安全メカニズムやRefCellの実際の動作を正しく説明していません。
question: تفاوت اصلی بین نحوه اجرای قوانین قرض‌گیری توسط Rust و RefCell در چیست؟
answer: Rust به طور معمول قوانین قرض‌گیری را در زمان کامپایل اعمال می‌کند، در حالی که RefCell آن‌ها را در زمان اجرا اعمال می‌کند.
wrong_answers:
  - Rust به طور معمول اجازه می‌دهد تا چندین ارجاع قابل تغییر وجود داشته باشد، در حالی که RefCell آنها را به یک ارجاع محدود می‌کند.
  - Rust به طور معمول از شمارش مرجع برای ایمنی استفاده می‌کند، در حالی که RefCell از تحلیل ایستا بهره می‌برد.
  - Rust معمولاً به مدیریت حافظه صریح نیاز دارد، در حالی که RefCell آن را به‌طور خودکار مدیریت می‌کند.
explanation: |
  نوآوری کلیدی RefCell انتقال اجرای قوانین قرض‌گیری از زمان کامپایل به زمان اجرا است. مراجع معمولی Rust توسط کامپایلر در طول کامپایل بررسی می‌شوند تا ایمنی را تضمین کنند، اما RefCell همین بررسی‌ها را در حین اجرای برنامه انجام می‌دهد. این امر به RefCell اجازه می‌دهد تا در شرایطی که تحلیل استاتیک کامپایلر بیش از حد محافظه‌کارانه است، قابلیت تغییر داخلی را فراهم کند، اما با این معاوضه که در صورت نقض قوانین قرض‌گیری، ممکن است در زمان اجرا با خطا مواجه شود. گزینه‌های دیگر به اشتباه مکانیزم‌های ایمنی بنیادی Rust یا رفتار واقعی RefCell را توصیف می‌کنند.
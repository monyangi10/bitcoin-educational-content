question: Каква е основната разлика между начина, по който Rust обикновено прилага правилата за заемане, и начина, по който ги прилага RefCell?
answer: Rust обикновено налага правилата за заемане по време на компилиране, докато RefCell ги налага по време на изпълнение
wrong_answers:
  - Rust обикновено позволява множество променливи препратки, докато RefCell ги ограничава до една
  - Rust обикновено използва броене на референции за безопасност, докато RefCell използва статичен анализ
  - Rust обикновено изисква изрично управление на паметта, докато RefCell се справя с него автоматично
explanation: |
  Основната иновация на RefCell е преместването на прилагането на правилата за заемане от времето на компилиране към времето на изпълнение. Обикновените препратки Rust се проверяват от компилатора по време на компилация, за да се гарантира безопасността, но RefCell извършва същите проверки по време на изпълнение на програмата. Това позволява на RefCell да осигури вътрешна променливост в ситуации, в които статичният анализ на компилатора е твърде консервативен, но е свързано с компромиса на потенциална паника по време на изпълнение, ако правилата за заемане са нарушени. Другите варианти некоректно описват основните механизми за безопасност на Rust или действителното поведение на RefCell.
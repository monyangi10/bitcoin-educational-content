question: Какво се случва, когато клонирате екземпляр на RC<T>, съдържащ голяма структура от данни?
answer: Копира се само препратката и се увеличава броячът на препратките, като оригиналните данни остават непроменени
wrong_answers:
  - Цялата структура от данни се дублира в паметта и двете копия поддържат отделни броячи на референции
  - Създава се плитко копие, при което примитивните полета се копират, но сложните полета остават споделени референции
  - Данните се преместват на ново място в паметта и оригиналният RC става невалиден, докато не се реинициализира
explanation: |
  При клонирането на RC Rust копира само референтния указател и увеличава вътрешния референтен брояч, което прави операцията изключително ефективна независимо от размера на данните. Базовите данни остават на същото място в паметта и се споделят от всички екземпляри на RC. Това е коренно различно от клонирането на действителните данни, което би осуетило целта на споделената собственост и би довело до разхищение на памет.
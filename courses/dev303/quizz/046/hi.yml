question: जब आप किसी बड़े डेटा स्ट्रक्चर वाले RC<T> इंस्टेंस को क्लोन करते हैं तो क्या होता है?
answer: केवल संदर्भ की प्रतिलिपि बनाई जाती है और संदर्भ काउंटर को बढ़ाया जाता है, जिससे मूल डेटा अपरिवर्तित रहता है।
wrong_answers:
  - संपूर्ण डेटा संरचना को मेमोरी में डुप्लिकेट किया जाता है और दोनों प्रतियां अलग-अलग संदर्भ काउंटर बनाए रखती हैं।
  - शैलो कॉपी बनाई जाती है जिसमें प्रिमिटिव फ़ील्ड कॉपी किए जाते हैं लेकिन कॉम्प्लेक्स फ़ील्ड साझा संदर्भ बने रहते हैं
  - डेटा को एक नए मेमोरी स्थान पर स्थानांतरित कर दिया जाता है और मूल RC तब तक अमान्य हो जाता है जब तक कि उसे पुनः आरंभ नहीं किया जाता।
explanation: |
  आरसी की क्लोनिंग करते समय, Rust केवल संदर्भ पॉइंटर की प्रतिलिपि बनाता है और आंतरिक संदर्भ काउंटर को बढ़ाता है, जिससे डेटा के आकार की परवाह किए बिना यह प्रक्रिया अत्यंत कुशल हो जाती है। अंतर्निहित डेटा उसी मेमोरी स्थान में रहता है और सभी आरसी इंस्टेंस के बीच साझा किया जाता है। यह वास्तविक डेटा की क्लोनिंग से मौलिक रूप से भिन्न है, क्योंकि क्लोनिंग से साझा स्वामित्व का उद्देश्य ही समाप्त हो जाएगा और मेमोरी की बर्बादी होगी।
question: 克隆包含大型数据结构的 RC<T> 实例时会发生什么情况？
answer: 只复制引用和递增引用计数器，原始数据保持不变
wrong_answers:
  - 整个数据结构在内存中复制，两个副本分别维护不同的引用计数器
  - 创建的浅层副本中，原始字段被复制，但复杂字段仍是共享引用
  - 数据被移动到新的内存位置，原始 RC 将失效，直至重新初始化
explanation: |
  克隆 RC 时，Rust 只复制引用指针并递增内部引用计数器，因此无论数据大小如何，操作都非常高效。底层数据保留在同一内存位置，并在所有 RC 实例之间共享。这与克隆实际数据有着本质区别，因为克隆实际数据会破坏共享所有权的目的并浪费内存。
question: จะเกิดอะไรขึ้นเมื่อคุณโคลนอินสแตนซ์ RC<T> ที่มีโครงสร้างข้อมูลขนาดใหญ่?
answer: มีเพียงการคัดลอกการอ้างอิงและตัวนับการอ้างอิงจะถูกเพิ่มขึ้น โดยที่ข้อมูลต้นฉบับไม่เปลี่ยนแปลง
wrong_answers:
  - โครงสร้างข้อมูลทั้งหมดถูกทำซ้ำในหน่วยความจำและสำเนาทั้งสองชุดจะรักษาตัวนับการอ้างอิงแยกกัน
  - สำเนาตื้นถูกสร้างขึ้นโดยที่ฟิลด์ปฐมภูมิถูกคัดลอกแต่ฟิลด์ที่ซับซ้อนยังคงเป็นการอ้างอิงร่วมกัน
  - ข้อมูลถูกย้ายไปยังตำแหน่งหน่วยความจำใหม่และ RC ดั้งเดิมจะไม่ถูกต้องจนกว่าจะถูกเริ่มต้นใหม่
explanation: |
  เมื่อทำการโคลน RC, Rust จะคัดลอกเฉพาะตัวชี้อ้างอิงและเพิ่มตัวนับอ้างอิงภายใน ทำให้การดำเนินการมีประสิทธิภาพสูงมากไม่ว่าจะมีขนาดข้อมูลเท่าใดก็ตาม ข้อมูลพื้นฐานยังคงอยู่ในตำแหน่งหน่วยความจำเดิมและถูกแชร์ระหว่างอินสแตนซ์ RC ทั้งหมด นี่แตกต่างอย่างสิ้นเชิงจากการโคลนข้อมูลจริง ซึ่งจะทำลายวัตถุประสงค์ของการเป็นเจ้าของร่วมกันและสิ้นเปลืองหน่วยความจำ
question: 大きなデータ構造を含むRC<T>インスタンスをクローンするとどうなるのか？
answer: 参照のみがコピーされ、参照カウンタがインクリメントされる。
wrong_answers:
  - データ構造全体がメモリ上に複製され、両方の複製が別々の参照カウンタを保持する。
  - シャローコピーが作成され、プリミティブフィールドはコピーされるが、複雑なフィールドは共有参照のままとなる。
  - データは新しいメモリ位置に移動し、元のRCは再初期化されるまで無効となる。
explanation: |
  RCのクローンを作成する際、Rustは参照ポインタをコピーし、内部参照カウンタをインクリメントするだけであるため、データサイズに関係なく非常に効率的な操作が可能である。基礎となるデータは同じメモリ位置に残り、すべてのRCインスタンス間で共有される。これは、実際のデータをクローンするのとは根本的に異なるものであり、共有所有権の目的を達成できず、メモリを浪費することになる。
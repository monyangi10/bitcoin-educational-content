question: Что произойдет, если клонировать экземпляр RC<T>, содержащий большую структуру данных?
answer: Копируется только ссылка и увеличивается счетчик ссылок, при этом исходные данные остаются неизменными
wrong_answers:
  - Вся структура данных дублируется в памяти, и обе копии ведут отдельные счетчики ссылок
  - Создается неглубокая копия, в которой копируются примитивные поля, но сложные поля остаются общими ссылками
  - Данные перемещаются в новую ячейку памяти, и исходный RC становится недействительным до повторной инициализации
explanation: |
  При клонировании RC Rust копирует только указатель ссылки и увеличивает внутренний счетчик ссылок, что делает эту операцию чрезвычайно эффективной независимо от размера данных. Базовые данные остаются в той же ячейке памяти и являются общими для всех экземпляров RC. Это принципиально отличается от клонирования фактических данных, которое нарушило бы цель совместного владения и привело бы к пустой трате памяти.
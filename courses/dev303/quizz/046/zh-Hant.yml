question: 當您複製包含大型資料結構的 RC<T> 範例時，會發生什麼情況？
answer: 只複製參照，並遞增參照計數器，原始資料保持不變
wrong_answers:
  - 整個資料結構會在記憶體中複製，而兩個複製本都會維持獨立的參考計數器
  - 建立淺層複本，複製原始欄位，但複雜欄位保持共用參考
  - 資料被移至新的記憶體位置，原始 RC 變得無效，直到重新初始化為止。
explanation: |
  複製 RC 時，Rust 只會複製參考指針並增加內部參考計數器，因此不論資料大小，操作都非常有效率。底層資料會保留在相同的記憶體位置，並在所有 RC 實體間共用。這與複製實際資料根本不同，因為複製實際資料會違反共用所有權的目的，並浪費記憶體。
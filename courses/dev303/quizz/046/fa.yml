question: وقتی یک نمونه RC<T> که حاوی یک ساختار داده بزرگ است را کلون می‌کنید، فقط شمارنده مرجع آن افزایش می‌یابد و داده‌های واقعی کپی نمی‌شوند. این به این معنی است که عملیات کلونینگ بسیار کارآمد است زیرا فقط یک اشاره‌گر و شمارنده مرجع کپی می‌شود، نه کل ساختار داده.
answer: فقط مرجع کپی می‌شود و شمارنده مرجع افزایش می‌یابد، در حالی که داده اصلی بدون تغییر باقی می‌ماند.
wrong_answers:
  - کل ساختار داده در حافظه تکرار می‌شود و هر دو نسخه شمارنده‌های مرجع جداگانه‌ای را حفظ می‌کنند.
  - یک کپی سطحی ایجاد می‌شود که در آن فیلدهای اولیه کپی می‌شوند اما فیلدهای پیچیده به صورت ارجاعات مشترک باقی می‌مانند.
  - داده‌ها به مکان حافظه جدیدی منتقل می‌شوند و RC اصلی تا زمانی که مجدداً مقداردهی اولیه نشود، نامعتبر می‌شود.
explanation: |
  هنگام کلون کردن یک RC، Rust تنها اشاره‌گر مرجع را کپی کرده و شمارنده مرجع داخلی را افزایش می‌دهد، که این عملیات را بدون توجه به اندازه داده‌ها بسیار کارآمد می‌سازد. داده‌های زیرین در همان مکان حافظه باقی می‌مانند و بین تمام نمونه‌های RC به اشتراک گذاشته می‌شوند. این اساساً با کلون کردن داده‌های واقعی متفاوت است، که هدف مالکیت مشترک را از بین می‌برد و حافظه را هدر می‌دهد.
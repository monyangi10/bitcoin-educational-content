question: 대규모 데이터 구조가 포함된 RC<T> 인스턴스를 복제하면 어떻게 되나요?
answer: 참조만 복사되고 참조 카운터는 증분되며 원본 데이터는 변경되지 않습니다
wrong_answers:
  - 전체 데이터 구조가 메모리에 복제되고 두 복사본 모두 별도의 참조 카운터를 유지합니다
  - 얕은 복사본은 기본 필드는 복사되지만 복잡한 필드는 공유 참조로 남아있는 경우 생성됩니다
  - 데이터가 새 메모리 위치로 이동되고 원래 RC는 다시 초기화될 때까지 유효하지 않게 됩니다
explanation: |
  RC를 복제할 때 Rust은 참조 포인터만 복사하고 내부 참조 카운터를 증가시키므로 데이터 크기에 관계없이 매우 효율적으로 작업할 수 있습니다. 기본 데이터는 동일한 메모리 위치에 유지되며 모든 RC 인스턴스 간에 공유됩니다. 이는 실제 데이터를 복제하는 것과는 근본적으로 다르며, 이는 소유권 공유의 목적에 어긋나고 메모리를 낭비하게 됩니다.
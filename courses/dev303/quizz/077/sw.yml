question: Ni nini hutokea unapopiga simu lock() kwenye butex katika Rust na kwa nini watengenezaji wengi wanaona inakubalika kufungua operesheni hii?
answer: Inarudisha Matokeo ambayo yanaweza kushindwa ikiwa uzi mwingine utaingiwa na hofu wakati umeshikilia bubtex, na kufungua kunakubalika kwa sababu huwezi kushughulikia makosa kutokana na hofu za uzi mwingine.
wrong_answers:
  - Inarudisha Chaguo ambalo linaweza kuwa Hakuna ikiwa mutex inatumiks, na kufungua kunakubalika kwa sababu mutex zinazotumiks zinapaswa kusababisha kusitishwa kwa programu mara moja.
  - Inarudisha Matokeo ambayo yanaweza kushindwa kutokana na ugunduzi wa mkwamo, na kufungua kunakubalika kwa sababu mkwamo unaonyesha dosari za msingi za muundo ambazo zinapaswa kuogopesha.
  - Hufanikiwa kila wakati na hurudisha kinga ya kufuli moja kwa moja, na kufanya kufungua kusiwe lazima kwani shughuli za mutex zimehakikishwa kuwa salama kwa nyuzi katika Rust.
explanation: |
  Unapopiga simu lock() kwenye mutex, Rust hurejesha Matokeo kwa sababu operesheni inaweza kushindwa ikiwa uzi mwingine utaingiwa na hofu wakati unashikilia mutex, na kuiacha katika hali ya sumu. Hii huunda hali ya kipekee ambapo msimbo wako wa ndani hupokea hitilafu kwa kitu kilichotokea katika muktadha tofauti kabisa wa uzi. Kwa kuwa huwezi kushughulikia au kupona kutokana na hitilafu iliyotokana na hofu ya uzi mwingine, watengenezaji wengi wanaona kuwa inakubalika kufungua mutex kufuli, haswa katika besi za msimbo zisizo na hofu. Chaguzi zingine si sahihi kwa sababu mutex hazirudishi Chaguo kwa hali zenye shughuli nyingi, hazina ugunduzi wa mda uliojengewa ndani unaosababisha kushindwa kwa Matokeo, na operesheni hiyo haifanikiwi kila wakati kutokana na utaratibu wa sumu.

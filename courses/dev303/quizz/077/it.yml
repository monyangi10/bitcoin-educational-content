question: Cosa succede quando si chiama lock() su un mutex in Rust e perché molti sviluppatori considerano accettabile l'unwrap di questa operazione?
answer: Restituisce un Risultato che può fallire se un altro thread è andato in panico mentre teneva il mutex e l'unwrapping è accettabile perché non è possibile gestire ragionevolmente gli errori dovuti al panico di altri thread
wrong_answers:
  - Restituisce un'opzione che può essere None se il mutex è occupato e l'unwrapping è accettabile perché i mutex occupati dovrebbero causare la terminazione immediata del programma
  - Restituisce un risultato che può fallire a causa del rilevamento di un deadlock e l'unwrapping è accettabile perché i deadlock indicano difetti fondamentali di progettazione che dovrebbero essere mandati in panico
  - Ha sempre successo e restituisce direttamente il lock guard, rendendo superfluo l'unwrapping, dato che le operazioni con i mutex sono garantite come thread-safe in Rust
explanation: |
  Quando si chiama lock() su un mutex, Rust restituisce un Risultato perché l'operazione può fallire se un altro thread è andato nel panico mentre teneva il mutex, lasciandolo in uno stato avvelenato. Questo crea una situazione unica in cui il codice locale riceve un errore per qualcosa che è avvenuto in un contesto di thread completamente diverso. Poiché non si può ragionevolmente gestire o recuperare un errore originato dal panico di un altro thread, molti sviluppatori considerano accettabile l'unwrap dei blocchi mutex, soprattutto nelle basi di codice prive di panico. Le altre opzioni non sono corrette, perché i mutex non restituiscono opzioni per gli stati occupati, non hanno un rilevamento di deadlock incorporato che causa fallimenti di Result e l'operazione non ha sempre successo a causa del meccanismo di veleno.
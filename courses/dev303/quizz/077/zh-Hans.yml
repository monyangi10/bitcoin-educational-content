question: 在 Rust 中对互斥体调用 lock() 时会发生什么？为什么许多开发人员认为可以接受解除这种操作？
answer: 它返回一个结果，如果另一个线程在持有互斥时发生恐慌，这个结果就会失败，而解包是可以接受的，因为你无法合理地处理其他线程的恐慌带来的错误。
wrong_answers:
  - 它返回一个选项，如果互斥项处于忙状态，该选项可以为 "无"；如果互斥项处于忙状态，解包是可以接受的，因为忙互斥项应导致程序立即终止。
  - 它返回的结果可能会因死锁检测而失败，而解包是可以接受的，因为死锁表明存在根本性的设计缺陷，应该引起恐慌。
  - 由于互斥操作在 Rust 中保证线程安全，因此无需解包。
explanation: |
  当调用互斥体上的 lock() 时，Rust 会返回一个结果，因为如果另一个线程在持有互斥体时发生慌乱，导致互斥体处于中毒状态，那么操作就会失败。这就造成了一种独特的情况，即你的本地代码会因为在完全不同的线程上下文中发生的事情而收到错误。由于无法合理地处理或恢复源于其他线程恐慌的错误，许多开发人员认为解除互斥锁是可以接受的，尤其是在无恐慌代码库中。其他选项都是不正确的，因为互斥锁不会返回忙状态下的选项，没有会导致结果失败的内置死锁检测，而且由于中毒机制，操作并不总是会成功。
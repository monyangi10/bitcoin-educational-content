question: وقتی که lock() را روی یک mutex در Rust فراخوانی می‌کنید، چه اتفاقی می‌افتد و چرا بسیاری از توسعه‌دهندگان باز کردن این عملیات را قابل قبول می‌دانند؟
answer: این یک Result برمی‌گرداند که ممکن است شکست بخورد اگر یک رشته دیگر در حالی که mutex را نگه داشته بود، دچار وحشت شود، و باز کردن آن قابل قبول است زیرا شما نمی‌توانید به طور منطقی خطاهای ناشی از وحشت رشته‌های دیگر را مدیریت کنید.
wrong_answers:
  - این یک Option برمی‌گرداند که می‌تواند None باشد اگر mutex مشغول باشد، و باز کردن آن قابل قبول است زیرا mutex‌های مشغول باید باعث خاتمه فوری برنامه شوند.
  - این یک Result را برمی‌گرداند که ممکن است به دلیل تشخیص بن‌بست شکست بخورد، و باز کردن آن قابل قبول است زیرا بن‌بست‌ها نشان‌دهنده نقص‌های اساسی طراحی هستند که باید باعث وحشت شوند.
  - همیشه موفق می‌شود و قفل محافظ را مستقیماً برمی‌گرداند، که باز کردن آن را غیرضروری می‌سازد زیرا عملیات mutex در Rust تضمین می‌شود که ایمن در برابر نخ باشند.
explanation: |
  هنگام فراخوانی lock() بر روی یک mutex، Rust یک Result برمی‌گرداند زیرا این عملیات می‌تواند شکست بخورد اگر یک رشته دیگر در حالی که mutex را نگه داشته بود، دچار panic شود و آن را در حالت مسموم باقی بگذارد. این وضعیت منحصر به فردی ایجاد می‌کند که کد محلی شما برای چیزی که در زمینه یک رشته کاملاً متفاوت اتفاق افتاده است، خطا دریافت می‌کند. از آنجا که نمی‌توانید به طور منطقی با خطایی که از panic یک رشته دیگر ناشی شده است، برخورد یا بازیابی کنید، بسیاری از توسعه‌دهندگان در نظر می‌گیرند که باز کردن قفل‌های mutex قابل قبول است، به ویژه در پایگاه‌های کد بدون panic. گزینه‌های دیگر نادرست هستند زیرا mutexها برای حالت‌های مشغول Options برنمی‌گردانند، تشخیص بن‌بست داخلی که باعث شکست Result شود ندارند، و عملیات به دلیل مکانیزم مسموم همیشه موفق نمی‌شود.
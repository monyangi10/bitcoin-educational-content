question: Rustでミューテックスに対してlock()を呼び出すと何が起こるのか、なぜ多くの開発者はこの操作をアンラップしてもよいと考えるのか？
answer: これは、ミューテックスを保持している間に他のスレッドがパニックに陥った場合に失敗する可能性のあるResultを返します。
wrong_answers:
  - もしミューテックスがビジー状態であれば、NoneであるOptionを返します。ビジー状態のミューテックスは即座にプログラムを終了させるべきであるので、アンラップは許容されます。
  - デッドロックはパニックを起こすべき根本的な設計上の欠陥を示すため、アンラップは許容される。
  - Rustではミューテックス操作はスレッドセーフであることが保証されているので、アンラップは不要である。
explanation: |
  ミューテックス上でlock()を呼び出すと、RustはResultを返します。これは、ミューテックスを保持している間に他のスレッドがパニックを起こし、毒状態になったままだと、操作が失敗する可能性があるからです。これは、全く別のスレッドのコンテキストで起こったことに対して、あなたのローカルコードがエラーを受け取るというユニークな状況を作り出します。他のスレッドのパニックに起因するエラーを合理的に処理したり回復したりすることはできないので、多くの開発者は、特にパニックのないコードベースでは、ミューテックスロックをアンラップすることを許容できると考えている。ミューテックスはビジー状態のオプションを返さず、結果失敗の原因となるデッドロック検出を内蔵しておらず、ポイズン機構により操作が常に成功するとは限らないため、他の選択肢は正しくありません。
question: Что происходит, когда вы вызываете lock() на мьютексе в Rust, и почему многие разработчики считают приемлемым разворачивать эту операцию?
answer: Он возвращает результат, который может завершиться неудачей, если другой поток запаниковал, удерживая мьютекс, и разворачивание допустимо, поскольку вы не можете разумно обрабатывать ошибки от паники других потоков
wrong_answers:
  - Возвращает опцию Option, которая может быть None, если мьютекс занят, и разворачивание допустимо, поскольку занятые мьютексы должны приводить к немедленному завершению программы
  - Он возвращает результат, который может не сработать из-за обнаружения тупика, и разворачивание допустимо, потому что тупики указывают на фундаментальные недостатки конструкции, которые должны вызывать панику
  - Она всегда успешна и возвращает непосредственно защиту блокировки, делая разворачивание ненужным, поскольку операции с мьютексом гарантированно потокобезопасны в Rust
explanation: |
  При вызове lock() на мьютексе Rust возвращает Result, потому что операция может завершиться неудачей, если другой поток запаниковал, удерживая мьютекс, и оставил его в отравленном состоянии. Это создает уникальную ситуацию, когда ваш локальный код получает ошибку из-за того, что произошло в контексте совершенно другого потока. Поскольку вы не можете разумно обработать или восстановить ошибку, возникшую в результате паники другого потока, многие разработчики считают приемлемым разворачивать мьютексные блокировки, особенно в кодовых базах без паники. Другие варианты некорректны, поскольку мьютексы не возвращают опции для занятых состояний, не имеют встроенного обнаружения тупиков, что приводит к сбоям в результатах, и операция не всегда успешна из-за механизма poison.
question: Какво се случва, когато извикате lock() върху mutex в Rust, и защо много разработчици смятат за приемливо да развързват тази операция?
answer: Връща резултат, който може да се окаже неуспешен, ако друга нишка изпадне в паника, докато държи мутекса, а разопаковането е приемливо, защото не можете разумно да се справите с грешки от паниката на други нишки
wrong_answers:
  - Връща опция, която може да бъде None, ако мутексът е зает, а разопаковането е приемливо, тъй като заетите мутекси трябва да предизвикат незабавно прекратяване на програмата
  - Връща резултат, който може да се провали поради откриване на задънена улица, а разгъването е приемливо, тъй като задънените улици показват фундаментални недостатъци на дизайна, които трябва да се паникьосват
  - Тя винаги е успешна и връща директно охраната на ключалката, което прави разопаковането ненужно, тъй като операциите с мутексите са гарантирано безопасни за нишки в Rust
explanation: |
  При извикване на lock() върху мутекс Rust връща резултат, тъй като операцията може да се провали, ако друга нишка изпадне в паника, докато държи мутекса, оставяйки го в отровно състояние. Това създава уникална ситуация, при която вашият локален код получава грешка за нещо, което се е случило в контекста на съвсем друга нишка. Тъй като не можете разумно да се справите или да се възстановите от грешка, възникнала в резултат на паниката на друга нишка, много разработчици смятат за приемливо да развързват ключалките на мутексите, особено в кодови бази без паника. Другите варианти са некоректни, тъй като мутексите не връщат Опции за заети състояния, нямат вградено откриване на мъртва точка, което да води до грешки в Result, и операцията не винаги е успешна поради механизма на отровата.
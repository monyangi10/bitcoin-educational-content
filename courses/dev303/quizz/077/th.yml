question: เกิดอะไรขึ้นเมื่อคุณเรียกใช้ lock() บน mutex ใน Rust และทำไมนักพัฒนาหลายคนถึงพิจารณาว่าการแกะห่อการดำเนินการนี้เป็นที่ยอมรับ?
answer: มันคืนค่า Result ที่อาจล้มเหลวหากเธรดอื่นเกิด panic ขณะถือ mutex และการใช้ unwrap เป็นที่ยอมรับได้เพราะคุณไม่สามารถจัดการข้อผิดพลาดจาก panic ของเธรดอื่นได้อย่างสมเหตุสมผล
wrong_answers:
  - มันคืนค่า Option ที่สามารถเป็น None ได้หาก mutex กำลังใช้งานอยู่ และการ unwrapping เป็นที่ยอมรับได้เพราะ mutex ที่กำลังใช้งานควรทำให้โปรแกรมหยุดทำงานทันที
  - มันคืนค่า Result ที่อาจล้มเหลวเนื่องจากการตรวจจับการล็อกตาย และการแกะห่อเป็นที่ยอมรับได้เพราะการล็อกตายบ่งบอกถึงข้อบกพร่องในการออกแบบพื้นฐานที่ควรตื่นตระหนก
  - มันประสบความสำเร็จเสมอและส่งคืนตัวล็อคการ์ดโดยตรง ทำให้ไม่จำเป็นต้องแกะห่อเนื่องจากการดำเนินการของ mutex รับประกันว่าจะปลอดภัยต่อเธรดใน Rust
explanation: |
  เมื่อเรียกใช้ lock() บน mutex, Rust จะคืนค่าเป็น Result เพราะการดำเนินการอาจล้มเหลวหากมีเธรดอื่นเกิด panic ขณะถือ mutex ทำให้มันอยู่ในสถานะที่เสียหาย (poisoned state) สิ่งนี้สร้างสถานการณ์ที่ไม่เหมือนใครที่โค้ดในเครื่องของคุณได้รับข้อผิดพลาดจากสิ่งที่เกิดขึ้นในบริบทของเธรดอื่น เนื่องจากคุณไม่สามารถจัดการหรือกู้คืนจากข้อผิดพลาดที่เกิดจาก panic ของเธรดอื่นได้อย่างสมเหตุสมผล นักพัฒนาหลายคนจึงพิจารณาว่าสามารถยอมรับได้ที่จะ unwrap mutex locks โดยเฉพาะในโค้ดเบสที่ไม่มี panic ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะ mutexes ไม่คืนค่า Options สำหรับสถานะที่ยุ่ง ไม่มีการตรวจจับ deadlock ในตัวที่ทำให้เกิดความล้มเหลวของ Result และการดำเนินการไม่สำเร็จเสมอไปเนื่องจากกลไก poison
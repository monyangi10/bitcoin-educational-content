question: Rust में म्यूटेक्स पर lock() फ़ंक्शन को कॉल करने पर क्या होता है और कई डेवलपर इस ऑपरेशन को अनरैप करना स्वीकार्य क्यों मानते हैं?
answer: यह एक ऐसा परिणाम लौटाता है जो विफल हो सकता है यदि कोई अन्य थ्रेड म्यूटेक्स को पकड़े हुए पैनिक हो जाए, और अनरैपिंग स्वीकार्य है क्योंकि आप अन्य थ्रेड्स के पैनिक से होने वाली त्रुटियों को उचित रूप से संभाल नहीं सकते हैं।
wrong_answers:
  - यह एक Option लौटाता है जो म्यूटेक्स व्यस्त होने पर None हो सकता है, और अनरैपिंग स्वीकार्य है क्योंकि व्यस्त म्यूटेक्स के कारण प्रोग्राम तुरंत समाप्त हो जाना चाहिए।
  - यह एक ऐसा परिणाम लौटाता है जो डेडलॉक का पता चलने के कारण विफल हो सकता है, और अनरैपिंग स्वीकार्य है क्योंकि डेडलॉक मौलिक डिज़ाइन दोषों को इंगित करते हैं जिनके कारण पैनिक होना चाहिए।
  - यह हमेशा सफल होता है और लॉक गार्ड को सीधे लौटाता है, जिससे अनरैपिंग अनावश्यक हो जाती है क्योंकि Rust में म्यूटेक्स ऑपरेशन थ्रेड-सेफ होने की गारंटी है।
explanation: |
  म्यूटेक्स पर lock() फ़ंक्शन को कॉल करते समय, Rust एक Result लौटाता है क्योंकि यदि कोई अन्य थ्रेड म्यूटेक्स को पकड़े हुए पैनिक करता है, तो ऑपरेशन विफल हो सकता है, जिससे म्यूटेक्स एक पॉइज़न्ड स्थिति में रह जाता है। इससे एक ऐसी अनोखी स्थिति उत्पन्न होती है जहाँ आपके स्थानीय कोड को किसी ऐसी चीज़ के लिए त्रुटि प्राप्त होती है जो पूरी तरह से किसी भिन्न थ्रेड के संदर्भ में हुई हो। चूंकि आप किसी अन्य थ्रेड के पैनिक से उत्पन्न त्रुटि को उचित रूप से संभाल या उससे उबर नहीं सकते, इसलिए कई डेवलपर म्यूटेक्स लॉक को अनरैप करना स्वीकार्य मानते हैं, विशेष रूप से पैनिक-मुक्त कोडबेस में। अन्य विकल्प गलत हैं क्योंकि म्यूटेक्स व्यस्त स्थितियों के लिए Options नहीं लौटाते हैं, उनमें अंतर्निहित डेडलॉक डिटेक्शन नहीं होता है जो Result विफलताओं का कारण बनता है, और पॉइज़न तंत्र के कारण ऑपरेशन हमेशा सफल नहीं होता है।
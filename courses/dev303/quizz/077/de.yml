question: Was passiert, wenn man lock() auf einem Mutex in Rust aufruft, und warum halten es viele Entwickler für akzeptabel, diesen Vorgang zu entpacken?
answer: Es gibt ein Ergebnis zurück, das fehlschlagen kann, wenn ein anderer Thread in Panik gerät, während er den Mutex hält, und das Unwrapping ist akzeptabel, weil man Fehler durch Panik anderer Threads nicht vernünftig behandeln kann
wrong_answers:
  - Es gibt eine Option zurück, die None sein kann, wenn der Mutex beschäftigt ist, und Unwrapping ist akzeptabel, weil beschäftigte Mutexe sofortige Programmbeendigung verursachen sollten
  - Es gibt ein Ergebnis zurück, das aufgrund einer Deadlock-Erkennung fehlschlagen kann, und Unwrapping ist akzeptabel, weil Deadlocks auf grundlegende Designfehler hinweisen, die zu einer Panik führen sollten
  - Sie ist immer erfolgreich und gibt den Lock Guard direkt zurück, so dass ein Unwrapping nicht notwendig ist, da Mutex-Operationen in Rust garantiert thread-sicher sind
explanation: |
  Beim Aufruf von lock() für einen Mutex gibt Rust ein Ergebnis zurück, weil die Operation fehlschlagen kann, wenn ein anderer Thread in Panik gerät, während er den Mutex hält, und ihn in einem vergifteten Zustand zurücklässt. Dies führt zu einer einzigartigen Situation, in der Ihr lokaler Code einen Fehler für etwas erhält, das im Kontext eines völlig anderen Threads passiert ist. Da Sie einen Fehler, der durch die Panik eines anderen Threads verursacht wurde, nicht vernünftig behandeln oder beheben können, halten es viele Entwickler für akzeptabel, Mutex-Sperren aufzuheben, insbesondere in panikfreien Codebasen. Die anderen Optionen sind falsch, weil Mutexe keine Optionen für belegte Zustände zurückgeben, keine eingebaute Deadlock-Erkennung haben, die Ergebnisfehler verursacht, und die Operation aufgrund des Giftmechanismus nicht immer erfolgreich ist.
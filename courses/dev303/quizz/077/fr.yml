question: Que se passe-t-il lorsque vous appelez lock() sur un mutex en Rust et pourquoi de nombreux développeurs considèrent-ils qu'il est acceptable de déballer cette opération ?
answer: Il renvoie un résultat qui peut échouer si un autre thread a paniqué pendant qu'il détenait le mutex, et le déballage est acceptable parce que vous ne pouvez pas raisonnablement gérer les erreurs dues aux paniques d'autres threads.
wrong_answers:
  - Elle renvoie une option qui peut être None si le mutex est occupé, et le déballage est acceptable parce que les mutex occupés doivent entraîner l'arrêt immédiat du programme.
  - Elle renvoie un résultat qui peut échouer en raison de la détection d'un blocage, et le déballage est acceptable parce que les blocages indiquent des défauts de conception fondamentaux qui devraient provoquer une panique.
  - Elle réussit toujours et renvoie directement le verrou, ce qui rend le déballage inutile puisque les opérations sur les mutex sont garanties sans risque pour les threads dans Rust.
explanation: |
  Lorsque l'on appelle lock() sur un mutex, Rust renvoie un Result parce que l'opération peut échouer si un autre thread a paniqué pendant qu'il détenait le mutex, le laissant dans un état empoisonné. Cela crée une situation unique où votre code local reçoit une erreur pour quelque chose qui s'est produit dans le contexte d'un thread complètement différent. Puisque vous ne pouvez pas raisonnablement gérer ou récupérer une erreur qui provient de la panique d'un autre thread, de nombreux développeurs considèrent qu'il est acceptable de débloquer les verrous mutex, en particulier dans les bases de code sans panique. Les autres options sont incorrectes car les mutex ne renvoient pas d'options pour les états occupés, n'ont pas de détection de blocage intégrée qui provoque des échecs de résultat, et l'opération ne réussit pas toujours en raison du mécanisme de poison.

question: 在 Rust 中，當您在互斥體上呼叫 lock() 時會發生什麼事？為什麼許多開發者認為解除這個操作是可以接受的？
answer: 如果另一個線程在持有互斥時發生恐慌，它會回傳一個可能失敗的結果，而解除封包是可以接受的，因為你無法合理地處理其他線程恐慌所造成的錯誤。
wrong_answers:
  - 它會回傳一個 Option，如果忙的互斥項目是 None，那麼解除封包是可以接受的，因為忙的互斥項目應該會導致程式立即終止。
  - 它會回傳一個結果，這個結果可能會因為死鎖偵測而失敗，而解除包裝是可以接受的，因為死鎖表示基本的設計缺陷，應該恐慌。
  - 它總是成功，並直接回傳鎖保護，使解除封包變得不必要，因為在 Rust 中，mutex 操作保證是線程安全的。
explanation: |
  當在一個互斥項上呼叫 lock() 時，Rust 會回傳一個結果，因為如果另一個線程在持有互斥項時發生恐慌，導致互斥項處於中毒狀態，操作就可能失敗。這會造成一種獨特的情況，您的本機程式碼會因為發生在完全不同的線程上下文中的事情而收到錯誤。由於您無法合理地處理或復原源自其他線程恐慌的錯誤，因此許多開發人員認為解除互斥鎖是可以接受的，尤其是在無恐慌的程式碼庫中。其他選項是不對的，因為 mutex 不會回傳忙碌狀態的選項，也沒有內建的死鎖偵測會導致 Result 失敗，而且由於中毒機制的關係，操作也不一定會成功。
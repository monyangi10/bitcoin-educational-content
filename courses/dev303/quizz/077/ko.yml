question: Rust에서 뮤텍스에서 lock()을 호출하면 어떤 일이 발생하며, 많은 개발자가 이 연산을 언래핑해도 된다고 생각하는 이유는 무엇인가요?
answer: 뮤텍스를 보유하는 동안 다른 스레드가 패닉에 빠지면 실패할 수 있는 결과를 반환하며, 다른 스레드의 패닉으로 인한 오류를 합리적으로 처리할 수 없으므로 언래핑이 허용됩니다
wrong_answers:
  - 뮤텍스가 사용 중이면 None이 될 수 있는 옵션을 반환하며, 사용 중인 뮤텍스는 즉시 프로그램을 종료해야 하므로 언래핑이 허용됩니다
  - 데드락 감지로 인해 실패할 수 있는 결과를 반환하며, 데드락은 당황해야 하는 근본적인 설계 결함을 나타내므로 언래핑은 허용됩니다
  - 항상 성공하고 잠금 가드를 직접 반환하므로, 뮤텍스 연산은 Rust에서 스레드 안전이 보장되므로 언래핑이 불필요합니다
explanation: |
  뮤텍스에서 lock()을 호출할 때 다른 스레드가 뮤텍스를 보유하는 동안 당황하여 포이즌 상태에 빠지면 작업이 실패할 수 있으므로 Rust는 결과(Result)를 반환합니다. 이로 인해 완전히 다른 스레드의 컨텍스트에서 발생한 일에 대해 로컬 코드가 오류를 수신하는 독특한 상황이 발생합니다. 다른 스레드의 패닉으로 인해 발생한 오류를 합리적으로 처리하거나 복구할 수 없기 때문에 많은 개발자는 특히 패닉이 없는 코드베이스에서 뮤텍스 잠금을 해제하는 것이 허용되는 것으로 간주합니다. 뮤텍스는 사용 중 상태에 대한 옵션을 반환하지 않고, 결과 실패를 유발하는 데드락 감지 기능이 내장되어 있지 않으며, 포이즌 메커니즘으로 인해 작업이 항상 성공하는 것은 아니기 때문에 다른 옵션은 올바르지 않습니다.
question: Cargo를 통한 Rust의 통합 툴링 에코시스템은 Bitcoin 개발을 위해 C++와 같은 이전 언어에서 사용된 접근 방식과 어떻게 다른가요?
answer: Cargo는 하나의 도구에서 표준화된 종속성 관리, 빌드, 테스트 및 문서화를 제공하여 파편화를 제거합니다
wrong_answers:
  - 카고는 메모리 안전성 검증에만 집중하는 반면, C++ 툴은 컴파일 속도 최적화에 우선순위를 둡니다
  - 카고는 여러 개별 툴을 수동으로 구성해야 하는 반면, C++는 통합 개발 환경을 제공합니다
  - 카고는 Bitcoin 전용 라이브러리만 지원하며, C++ 도구는 범용 금융 애플리케이션에서 작동합니다
explanation: |
  Rust의 Cargo는 표준화된 단일 도구를 통해 모든 필수 개발 작업을 처리하는 프로젝트 관리에 대한 통합 접근 방식을 나타냅니다. 따라서 종속성 관리, 빌드 및 테스트를 위한 여러 경쟁 도구가 프로젝트 전반에서 일관성을 잃는 C++의 파편화 문제를 해결할 수 있습니다. Bitcoin 개발의 경우 이러한 표준화는 여러 프로젝트와 팀에서 일관된 빌드 프로세스, 안정적인 종속성 해결, 균일한 코드 품질 검사를 보장하여 보안을 손상시킬 수 있는 구성 관련 오류의 위험을 줄여주기 때문에 매우 중요합니다.
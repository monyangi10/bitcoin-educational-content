question: کدام دستور Cargo بررسی‌های کامپایل را بدون تولید فایل اجرایی انجام می‌دهد؟
answer: بار چک کنید
wrong_answers:
  - cargo build
  - cargo run
  - تست بارگیری
explanation: |
  دستور 'cargo check' تمام بررسی‌های کامپایل را انجام می‌دهد و تأیید می‌کند که کد شما به درستی کامپایل می‌شود بدون اینکه فایل اجرایی نهایی را تولید کند. این کار را به طور قابل توجهی سریع‌تر از یک ساخت کامل انجام می‌دهد زمانی که شما فقط می‌خواهید درستی کد را بررسی کنید. در مقابل، 'cargo build' فایل‌های اجرایی را کامپایل و تولید می‌کند، 'cargo run' هم برنامه را می‌سازد و هم اجرا می‌کند، و 'cargo test' تست‌ها را کامپایل و اجرا می‌کند.
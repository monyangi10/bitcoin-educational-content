question: कौन सा कार्गो कमांड निष्पादन योग्य फ़ाइल बनाए बिना संकलन जांच करता है?
answer: कार्गो चेक
wrong_answers:
  - कार्गो निर्माण
  - माल ढुलाई
  - कार्गो परीक्षण
explanation: |
  'cargo check' कमांड सभी कंपाइलेशन जांच करता है और यह सत्यापित करता है कि आपका कोड सही ढंग से कंपाइल हो रहा है, लेकिन यह अंतिम एक्जीक्यूटेबल फ़ाइल उत्पन्न नहीं करता है। इससे कोड की शुद्धता की जांच करने के लिए यह पूर्ण बिल्ड की तुलना में काफी तेज़ हो जाता है। इसके विपरीत, 'cargo build' कंपाइल करता है और एक्जीक्यूटेबल फ़ाइलें उत्पन्न करता है, 'cargo run' प्रोग्राम को बिल्ड और एक्जीक्यूट दोनों करता है, और 'cargo test' कंपाइल करता है और टेस्ट रन करता है।
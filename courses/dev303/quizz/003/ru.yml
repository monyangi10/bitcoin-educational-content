question: Какая команда Cargo выполняет проверку компиляции без создания исполняемого файла?
answer: проверка груза
wrong_answers:
  - сборка груза
  - грузовой пробег
  - испытание груза
explanation: |
  Команда 'cargo check' выполняет все проверки компиляции и проверяет правильность компиляции вашего кода без создания конечного исполняемого файла. Это делает ее значительно быстрее полной сборки, когда вы просто хотите проверить корректность кода. В отличие от этого, команда 'cargo build' компилирует и генерирует исполняемые файлы, 'cargo run' одновременно собирает и выполняет программу, а 'cargo test' компилирует и запускает тесты.
question: Коя команда на Cargo извършва проверки на компилацията, без да генерира изпълним файл?
answer: проверка на товара
wrong_answers:
  - изграждане на товари
  - товарен пробег
  - изпитване на товара
explanation: |
  Командата 'cargo check' извършва всички проверки за компилиране и проверява дали кодът ви се компилира правилно, без да генерира окончателния изпълним файл. Това я прави значително по-бърза от пълното компилиране, когато просто искате да проверите коректността на кода. За разлика от нея, командата 'cargo build' компилира и генерира изпълними файлове, 'cargo run' едновременно компилира и изпълнява програмата, а 'cargo test' компилира и изпълнява тестове.
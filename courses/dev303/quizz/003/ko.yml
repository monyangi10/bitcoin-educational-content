question: 실행 파일을 생성하지 않고 컴파일 검사를 수행하는 Cargo 명령은 무엇인가요?
answer: 화물 확인
wrong_answers:
  - 화물 빌드
  - 카고 런
  - 화물 테스트
explanation: |
  'cargo check' 명령은 모든 컴파일 검사를 수행하며 최종 실행 파일을 실제로 생성하지 않고도 코드가 올바르게 컴파일되는지 확인합니다. 따라서 단순히 코드의 정확성을 확인하려는 경우 전체 빌드보다 훨씬 빠릅니다. 반면 'cargo build'는 컴파일과 실행 파일 생성을, 'cargo run'은 프로그램 빌드와 실행을, 'cargo test'는 컴파일과 테스트 실행을 모두 수행합니다.
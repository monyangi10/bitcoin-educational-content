question: คำสั่ง Cargo ใดที่ทำการตรวจสอบการคอมไพล์โดยไม่สร้างไฟล์ปฏิบัติการ?
answer: cargo check
wrong_answers:
  - cargo build
  - เรียกใช้ cargo
  - ทดสอบสินค้า
explanation: |
  คำสั่ง 'cargo check' ทำการตรวจสอบการคอมไพล์ทั้งหมดและยืนยันว่ารหัสของคุณคอมไพล์ได้อย่างถูกต้องโดยไม่ต้องสร้างไฟล์ปฏิบัติการสุดท้าย ซึ่งทำให้เร็วกว่าการสร้างเต็มรูปแบบอย่างมากเมื่อคุณต้องการเพียงตรวจสอบความถูกต้องของรหัส ในทางตรงกันข้าม 'cargo build' จะคอมไพล์และสร้างไฟล์ปฏิบัติการ 'cargo run' จะสร้างและรันโปรแกรม และ 'cargo test' จะคอมไพล์และรันการทดสอบ
question: Ni amri gani ya Cargo inayofanya ukaguzi wa mkusanyiko bila kutoa faili inayoweza kutekelezwa?
answer: ukaguzi wa mizigo
wrong_answers:
  - ujenzi wa mizigo
  - usafirishaji wa mizigo
  - jaribio la mizigo
explanation: |
  Amri ya 'uhakiki wa mizigo' hufanya ukaguzi wote wa mkusanyiko na kuthibitisha kwamba msimbo wako unakusanywa kwa usahihi bila kutoa faili ya mwisho inayoweza kutekelezwa. Hii inafanya iwe haraka zaidi kuliko ujenzi kamili unapotaka tu kuthibitisha usahihi wa msimbo. Kwa upande mwingine, 'ujenzi wa mizigo' hukusanya na kutoa faili zinazoweza kutekelezwa, 'uendeshaji wa mizigo' hujenga na kutekeleza programu, na 'ujaribu wa mizigo' hukusanya na kuendesha majaribio.
question: 実行ファイルを生成せずにコンパイルチェックを行うCargoコマンドはどれですか？
answer: 貨物検査
wrong_answers:
  - カーゴビルド
  - カーゴ・ラン
  - カーゴテスト
explanation: |
  cargo check」コマンドは、最終的な実行ファイルを実際に生成することなく、すべてのコンパイルチェックを実行し、コードが正しくコンパイルされているかどうかを検証します。このため、単にコードの正しさを検証したい場合には、完全なビルドよりも大幅に高速になります。一方、「cargo build」はコンパイルと実行ファイルの生成を行い、「cargo run」はプログラムのビルドと実行の両方を行い、「cargo test」はコンパイルとテストの実行を行います。
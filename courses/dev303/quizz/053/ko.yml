question: RC가 메모리 안전성을 유지하면서 다중 소유권을 허용할 수 있는 근본적인 메커니즘은 무엇인가요?
answer: 참조를 추적하고 카운터가 0에 도달할 때만 메모리를 해제하는 내부 카운터입니다
wrong_answers:
  - 프로그램 실행 전에 모든 참조 패턴을 검증하는 컴파일 타임 분석
  - 도달할 수 없는 메모리 할당을 주기적으로 스캔하고 정리하는 가비지 컬렉터
  - 동일한 데이터의 여러 소유자 간에 액세스를 동기화하는 잠금 기반 시스템
explanation: |
  RC는 복제가 되면 증가하고 삭제되면 감소하는 내부 참조 카운터를 유지하여 참조가 남아있지 않을 때만 메모리가 해제되도록 합니다. 이는 컴파일 타임 분석(Box에서 사용하는), 가비지 컬렉션(Rust에서는 사용하지 않음) 또는 잠금 메커니즘(소유권 추적이 아닌 스레드 동기화에 사용됨)과는 다릅니다. 카운터 기반 접근 방식은 가비지 컬렉션의 런타임 오버헤드나 단일 소유권의 제한 없이 안전한 공유 소유권을 허용합니다.
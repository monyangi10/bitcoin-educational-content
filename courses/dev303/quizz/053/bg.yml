question: Какъв е основният механизъм, който позволява на RC да позволява многократна собственост, като същевременно запазва сигурността на паметта?
answer: Вътрешен брояч, който проследява препратките и освобождава памет само когато броячът достигне нула
wrong_answers:
  - Анализ по време на компилация, който проверява всички референтни модели преди изпълнението на програмата
  - Колектор на боклука, който периодично сканира и почиства недостъпните разпределения на паметта
  - Система, базирана на заключване, която синхронизира достъпа между множество собственици на едни и същи данни
explanation: |
  RC поддържа вътрешен брояч на препратките, който се увеличава при клониране и намалява при отпадане, като по този начин се гарантира, че паметта се освобождава само когато не са останали препратки. Това се различава от анализа по време на компилация (който Box използва), събирането на отпадъци (което Rust не използва) или механизмите за заключване (които се използват за синхронизация на нишки, а не за проследяване на собствеността). Подходът, базиран на броячи, позволява сигурна споделена собственост без излишни разходи по време на изпълнение, свързани със събирането на отпадъци, или ограниченията на единичната собственост.
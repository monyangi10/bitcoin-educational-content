question: 是什么基本机制使 RC 能够在保持内存安全的同时允许多重所有权？
answer: 跟踪引用的内部计数器，只有当计数器达到零时才释放内存
wrong_answers:
  - 编译时分析，在程序执行前验证所有引用模式
  - 垃圾回收器会定期扫描和清理无法到达的内存分配
  - 基于锁的系统，可在同一数据的多个所有者之间实现同步访问
explanation: |
  RC 维护一个内部引用计数器，在克隆时递增，在丢弃时递减，确保只有在没有引用时才释放内存。这不同于编译时分析（Box 使用）、垃圾回收（Rust 不使用）或锁定机制（用于线程同步，而非所有权跟踪）。基于计数器的方法允许安全共享所有权，而无需垃圾回收的运行时开销或单一所有权的限制。
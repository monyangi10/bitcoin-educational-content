question: RCがメモリ安全性を維持しながら複数のオーナーシップを可能にする基本的なメカニズムとは何か？
answer: 参照を追跡し、カウンタがゼロになったときだけメモリを解放する内部カウンタ。
wrong_answers:
  - プログラム実行前にすべての参照パターンを検証するコンパイル時分析
  - 定期的にスキャンし、到達不可能なメモリ割り当てをクリーンアップするガベージコレクタ。
  - 同じデータの複数の所有者間のアクセスを同期させるロックベースのシステム
explanation: |
  RCは内部の参照カウンターを維持し、クローンされたときにインクリメントし、削除されたときにデクリメントする。これは、コンパイル時の解析（Boxが使用）やガベージ・コレクション（Rustは採用していない）、ロック機構（所有権の追跡ではなく、スレッドの同期に使用される）とは異なる。カウンタ・ベースのアプローチは、ガベージ・コレクションの実行時オーバーヘッドや単一所有の制限なしに、安全な共有所有権を可能にする。
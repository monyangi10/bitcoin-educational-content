question: مکانیزم اساسی که به RC اجازه می‌دهد تا مالکیت چندگانه را در حالی که ایمنی حافظه را حفظ می‌کند، چیست؟
answer: یک شمارنده داخلی که ارجاعات را پیگیری می‌کند و تنها زمانی که شمارنده به صفر می‌رسد، حافظه را آزاد می‌کند.
wrong_answers:
  - تجزیه و تحلیل زمان کامپایل که تمام الگوهای مرجع را قبل از اجرای برنامه تأیید می‌کند
  - یک جمع‌کننده زباله که به‌طور دوره‌ای تخصیص‌های حافظه غیرقابل دسترس را اسکن و پاک‌سازی می‌کند
  - یک سیستم مبتنی بر قفل که دسترسی بین چندین مالک از داده‌های یکسان را همگام‌سازی می‌کند
explanation: |
  RC یک شمارنده مرجع داخلی را نگه می‌دارد که هنگام کلون شدن افزایش و هنگام حذف کاهش می‌یابد، و اطمینان حاصل می‌کند که حافظه تنها زمانی آزاد می‌شود که هیچ مرجعی باقی نمانده باشد. این با تحلیل زمان کامپایل (که Box استفاده می‌کند)، جمع‌آوری زباله (که Rust به کار نمی‌برد)، یا مکانیزم‌های قفل (که برای همگام‌سازی رشته‌ها استفاده می‌شوند، نه ردیابی مالکیت) متفاوت است. رویکرد مبتنی بر شمارنده اجازه می‌دهد مالکیت مشترک ایمن بدون سربار زمان اجرای جمع‌آوری زباله یا محدودیت‌های مالکیت واحد داشته باشید.
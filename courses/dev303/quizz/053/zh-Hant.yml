question: 什麼是讓 RC 在維持記憶體安全的同時允許多重擁有權的基本機制？
answer: 追蹤引用的內部計數器，只有當計數器到達零時才釋放記憶體
wrong_answers:
  - 編譯時分析可在程式執行前驗證所有參考模式
  - 垃圾收集器會定期掃描並清理無法存取的記憶體分配
  - 以鎖為基礎的系統，可在相同資料的多位擁有者之間進行同步存取
explanation: |
  RC 維護一個內部參考計數器，當複製時會遞增，當丟棄時會遞減，以確保記憶體只有在沒有參考時才會被釋放。這與編譯時分析（Box 使用）、垃圾回收（Rust 沒有使用）或鎖定機制（用於線程同步，而非擁有權追蹤）不同。以計數器為基礎的方法允許安全的共用所有權，而不需要垃圾回收的執行時間開銷或單一所有權的限制。
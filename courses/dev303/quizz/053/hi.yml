question: वह मूलभूत तंत्र क्या है जो RC को मेमोरी सुरक्षा बनाए रखते हुए एकाधिक स्वामित्व की अनुमति देने में सक्षम बनाता है?
answer: एक आंतरिक काउंटर जो संदर्भों को ट्रैक करता है और मेमोरी को तभी मुक्त करता है जब काउंटर शून्य पर पहुंच जाता है।
wrong_answers:
  - एक कंपाइल-टाइम विश्लेषण जो प्रोग्राम निष्पादन से पहले सभी संदर्भ पैटर्न को सत्यापित करता है
  - एक गार्बेज कलेक्टर जो समय-समय पर उन मेमोरी आवंटनों को स्कैन और साफ करता है जिन तक पहुंचना संभव नहीं है।
  - एक लॉक-आधारित प्रणाली जो एक ही डेटा के कई मालिकों के बीच पहुंच को सिंक्रनाइज़ करती है
explanation: |
  RC एक आंतरिक संदर्भ काउंटर बनाए रखता है जो क्लोन होने पर बढ़ता है और ड्रॉप होने पर घटता है, यह सुनिश्चित करते हुए कि मेमोरी तभी मुक्त हो जब कोई संदर्भ शेष न रहे। यह कंपाइल-टाइम विश्लेषण (जिसका उपयोग Box करता है), गार्बेज कलेक्शन (जिसका उपयोग Rust नहीं करता) या लॉकिंग तंत्र (जिनका उपयोग थ्रेड सिंक्रोनाइज़ेशन के लिए किया जाता है, स्वामित्व ट्रैकिंग के लिए नहीं) से भिन्न है। काउंटर-आधारित दृष्टिकोण गार्बेज कलेक्शन के रनटाइम ओवरहेड या एकल स्वामित्व की सीमाओं के बिना सुरक्षित साझा स्वामित्व की अनुमति देता है।
question: Каков фундаментальный механизм, позволяющий RC разрешать множественное владение, сохраняя при этом безопасность памяти?
answer: Внутренний счетчик, который отслеживает ссылки и освобождает память только тогда, когда счетчик достигает нуля
wrong_answers:
  - Анализ во время компиляции, который проверяет все шаблоны ссылок перед выполнением программы
  - Сборщик мусора, который периодически сканирует и очищает недоступные выделения памяти
  - Система, основанная на блокировке, которая синхронизирует доступ между несколькими владельцами одних и тех же данных
explanation: |
  RC ведет внутренний счетчик ссылок, который увеличивается при клонировании и уменьшается при удалении, обеспечивая освобождение памяти только тогда, когда в ней не остается ссылок. Это отличается от анализа во время компиляции (который использует Box), сборки мусора (которую Rust не использует) или механизмов блокировки (которые используются для синхронизации потоков, а не для отслеживания владения). Подход, основанный на счетчиках, позволяет обеспечить безопасное совместное владение без накладных расходов на сборку мусора во время выполнения программы или ограничений на единое владение.
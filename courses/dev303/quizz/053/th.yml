question: กลไกพื้นฐานที่ทำให้ RC สามารถอนุญาตให้มีการเป็นเจ้าของหลายรายการในขณะที่ยังคงความปลอดภัยของหน่วยความจำคืออะไร?
answer: เคาน์เตอร์ภายในที่ติดตามการอ้างอิงและปลดปล่อยหน่วยความจำเมื่อเคาน์เตอร์ถึงศูนย์เท่านั้น
wrong_answers:
  - การวิเคราะห์ในช่วงเวลาแปลโปรแกรมที่ตรวจสอบรูปแบบการอ้างอิงทั้งหมดก่อนการดำเนินการของโปรแกรม
  - ตัวเก็บขยะที่สแกนและทำความสะอาดการจัดสรรหน่วยความจำที่ไม่สามารถเข้าถึงได้เป็นระยะ ๆ
  - ระบบที่ใช้การล็อกเพื่อซิงโครไนซ์การเข้าถึงระหว่างเจ้าของหลายคนของข้อมูลเดียวกัน
explanation: |
  RC รักษาตัวนับอ้างอิงภายในที่เพิ่มขึ้นเมื่อถูกโคลนและลดลงเมื่อถูกทิ้ง เพื่อให้แน่ใจว่าหน่วยความจำจะถูกปล่อยเมื่อไม่มีการอ้างอิงเหลืออยู่เท่านั้น ซึ่งแตกต่างจากการวิเคราะห์ในเวลาคอมไพล์ (ซึ่ง Box ใช้), การเก็บขยะ (ซึ่ง Rust ไม่ใช้), หรือกลไกการล็อก (ซึ่งใช้สำหรับการประสานเธรด ไม่ใช่การติดตามความเป็นเจ้าของ) วิธีการที่ใช้ตัวนับช่วยให้การเป็นเจ้าของร่วมกันอย่างปลอดภัยโดยไม่มีค่าใช้จ่ายในเวลารันไทม์ของการเก็บขยะหรือข้อจำกัดของการเป็นเจ้าของเพียงผู้เดียว
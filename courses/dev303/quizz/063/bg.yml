question: Когато в дефиницията на макрос се използва шаблонът `$($x:expr),*``, какво се постига с този шаблон?
answer: Той съвпада с нула или повече изрази, разделени със запетаи, което позволява създаването на списъци с аргументи с различна дължина
wrong_answers:
  - Той съвпада с точно един израз и повтаря макроразширението многократно
  - Съчетава произволен брой дефиниции на типове, разделени с точка и запетая, за генериране на код
  - Той създава цикъл, който изпълнява макроса по време на изпълнение с различни стойности на израза
explanation: |
  Шаблонът `$($x:expr),*` използва синтаксиса за макроповторения на Rust, където квантификаторът `*` означава 'нула или повече', `$x:expr` улавя всеки израз, а запетаята определя разделителя между изразите. Това позволява макроси като `vec!` да приемат произволен брой аргументи: `vec![1, 2, 3]` или `vec![]`. Другите варианти са некоректни, тъй като: шаблонът обработва множество изрази, а не само един, съчетава конкретно изрази, а не дефиниции на типове, и използва запетаи, а не точка и запетая, а макросите се изпълняват по време на компилация при генериране на код, а не по време на изпълнение.
question: 매크로가 정의에 `$($x:expr),*` 패턴을 사용하는 경우, 이 패턴은 어떤 기능을 수행하나요?
answer: 쉼표로 구분된 0개 이상의 표현식을 일치시켜 가변 길이의 인수 목록을 사용할 수 있습니다
wrong_answers:
  - 정확히 하나의 표현식과 일치하고 매크로 확장을 여러 번 반복합니다
  - 코드 생성을 위해 세미콜론으로 구분된 유형 정의를 원하는 수만큼 일치시킵니다
  - 런타임에 다른 표현식 값으로 매크로를 실행하는 루프를 만듭니다
explanation: |
  패턴 `$($x:expr),*`는 `*` 수량자는 '0 이상'을 의미하고 `$x:expr`은 각 표현식을 캡처하며 쉼표는 표현식 사이의 구분자를 지정하는 Rust의 매크로 반복 구문을 사용합니다. 이렇게 하면 `vec!`와 같은 매크로가 원하는 수의 인수를 받을 수 있습니다: vec![1, 2, 3]` 또는 `vec![]`와 같은 매크로를 사용할 수 있습니다. 다른 옵션은 패턴이 하나가 아닌 여러 표현식을 처리하고, 유형 정의가 아닌 표현식을 구체적으로 일치시키며, 세미콜론이 아닌 쉼표를 사용하고, 매크로가 런타임이 아닌 코드 생성 중 컴파일 타임에 실행되기 때문에 올바르지 않습니다.
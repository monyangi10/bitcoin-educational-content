question: เมื่อมาโครใช้รูปแบบ `$($x:expr),*` ในการกำหนด มันทำอะไรสำเร็จ?
answer: ตรงกับนิพจน์ศูนย์หรือมากกว่าที่คั่นด้วยเครื่องหมายจุลภาค ช่วยให้สามารถใช้รายการอาร์กิวเมนต์ที่มีความยาวแปรผันได้
wrong_answers:
  - ตรงกับนิพจน์เพียงหนึ่งเดียวและทำการขยายมาโครซ้ำหลายครั้ง
  - มันตรงกับคำจำกัดความของประเภทใด ๆ ที่คั่นด้วยเครื่องหมายอัฒภาคสำหรับการสร้างโค้ด
  - มันสร้างลูปที่รันแมโครในขณะรันไทม์ด้วยค่าการแสดงออกที่แตกต่างกัน
explanation: |
  รูปแบบ `$($x:expr),*` ใช้ไวยากรณ์การทำซ้ำของมาโคร Rust ซึ่งตัวกำหนด `*` หมายถึง 'ศูนย์หรือมากกว่า', `$x:expr` จับแต่ละนิพจน์, และเครื่องหมายจุลภาคระบุการคั่นระหว่างนิพจน์ สิ่งนี้ทำให้มาโครเช่น `vec!` ยอมรับจำนวนอาร์กิวเมนต์ใดๆ: `vec![1, 2, 3]` หรือ `vec![]` ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะ: รูปแบบนี้จัดการกับนิพจน์หลายตัวไม่ใช่เพียงตัวเดียว, มันจับคู่กับนิพจน์โดยเฉพาะไม่ใช่การกำหนดประเภทและใช้เครื่องหมายจุลภาคไม่ใช่เครื่องหมายอัฒภาค, และมาโครทำงานในช่วงเวลาแปลโค้ดไม่ใช่ในช่วงเวลารันไทม์
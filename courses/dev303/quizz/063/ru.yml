question: Когда макрос использует шаблон `$($x:expr),*` в своем определении, что он делает?
answer: Он соответствует нулю или нескольким выражениям, разделенным запятыми, что позволяет составлять списки аргументов переменной длины
wrong_answers:
  - Он соответствует ровно одному выражению и повторяет макрорасширение несколько раз
  - Он сопоставляет любое количество определений типов, разделенных точками с запятой для генерации кода
  - Он создает цикл, который выполняет макрос во время выполнения с различными значениями выражений
explanation: |
  Шаблон `$($x:expr),*` использует синтаксис повторения макросов Rust, где квантификатор `*` означает "ноль или больше", `$x:expr` фиксирует каждое выражение, а запятая указывает на разделитель между выражениями. Это позволяет макросам типа `vec!` принимать любое количество аргументов: `vec![1, 2, 3]` или `vec![]`. Другие варианты неверны, потому что: шаблон обрабатывает несколько выражений, а не одно, он подбирает именно выражения, а не определения типов, и использует запятые, а не точки с запятой, и макросы выполняются во время компиляции при генерации кода, а не во время выполнения.
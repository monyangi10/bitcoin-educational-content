question: وقتی یک ماکرو از الگوی `$($x:expr),*` در تعریف خود استفاده می‌کند، این الگو چه کاری انجام می‌دهد؟
answer: این با صفر یا چند عبارت که با کاما جدا شده‌اند مطابقت دارد و امکان لیست‌های آرگومان با طول متغیر را فراهم می‌کند
wrong_answers:
  - این دقیقاً با یک عبارت مطابقت دارد و گسترش ماکرو را چندین بار تکرار می‌کند.
  - این با هر تعداد تعریف نوع که با نقطه‌ویرگول جدا شده‌اند برای تولید کد مطابقت دارد.
  - این یک حلقه ایجاد می‌کند که ماکرو را در زمان اجرا با مقادیر مختلف عبارت اجرا می‌کند.
explanation: |
  الگوی `$($x:expr),*` از نحو تکرار ماکرو Rust استفاده می‌کند که در آن کمیت‌ساز `*` به معنای 'صفر یا بیشتر' است، `$x:expr` هر عبارت را ضبط می‌کند و کاما جداکننده بین عبارات را مشخص می‌کند. این امکان را به ماکروهایی مانند `vec!` می‌دهد تا هر تعداد آرگومان را بپذیرند: `vec![1, 2, 3]` یا `vec![]`. گزینه‌های دیگر نادرست هستند زیرا: الگو چندین عبارت را مدیریت می‌کند نه فقط یکی، به طور خاص با عبارات مطابقت دارد نه تعریف نوع‌ها و از کاماها استفاده می‌کند نه نقطه‌ویرگول‌ها، و ماکروها در زمان کامپایل در طول تولید کد اجرا می‌شوند نه در زمان اجرا.
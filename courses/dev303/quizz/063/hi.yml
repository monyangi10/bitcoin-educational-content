question: जब कोई मैक्रो अपनी परिभाषा में `$($x:expr),*` पैटर्न का उपयोग करता है, तो यह पैटर्न क्या कार्य करता है?
answer: यह अल्पविरामों द्वारा अलग किए गए शून्य या अधिक अभिव्यक्तियों का मिलान करता है, जिससे परिवर्तनीय लंबाई वाली तर्क सूचियों को सक्षम किया जा सकता है।
wrong_answers:
  - यह बिल्कुल एक ही एक्सप्रेशन से मेल खाता है और मैक्रो विस्तार को कई बार दोहराता है।
  - यह कोड जनरेशन के लिए अर्धविराम द्वारा अलग किए गए किसी भी संख्या में टाइप परिभाषाओं से मेल खाता है।
  - यह एक लूप बनाता है जो रनटाइम पर अलग-अलग एक्सप्रेशन मानों के साथ मैक्रो को निष्पादित करता है।
explanation: |
  पैटर्न `$($x:expr),*` Rust के मैक्रो रिपीटीशन सिंटैक्स का उपयोग करता है, जहाँ `*` क्वांटिफायर का अर्थ 'शून्य या अधिक' है, `$x:expr` प्रत्येक एक्सप्रेशन को कैप्चर करता है, और अल्पविराम एक्सप्रेशन के बीच विभाजक को निर्दिष्ट करता है। यह `vec!` जैसे मैक्रो को किसी भी संख्या में आर्गुमेंट स्वीकार करने में सक्षम बनाता है: `vec![1, 2, 3]` या `vec![]`। अन्य विकल्प गलत हैं क्योंकि: यह पैटर्न केवल एक नहीं बल्कि कई एक्सप्रेशन को हैंडल करता है, यह विशेष रूप से टाइप परिभाषाओं के बजाय एक्सप्रेशन से मेल खाता है और अर्धविराम के बजाय अल्पविराम का उपयोग करता है, और मैक्रो रनटाइम पर नहीं बल्कि कोड जनरेशन के दौरान कंपाइल-टाइम पर निष्पादित होते हैं।
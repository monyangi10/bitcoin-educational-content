question: 當一個巨集在定義中使用 `$($x:expr),*` 的模式時，這個模式會達到什麼目的？
answer: 它會匹配以逗號分隔的零個或多個表達式，使參數清單的長度可變
wrong_answers:
  - 它完全匹配一個表達式，並重複多次巨集擴充
  - 它可以匹配由分號分隔的任意數量的類型定義，用於代碼生成
  - 它會建立一個循環，在執行時以不同的表達值執行巨集
explanation: |
  模式`$($x:expr),*`使用 Rust 的巨集重複語法，其中`*`定量符表示 「零或更多」，`$x:expr`捕捉每個表達式，逗號指定表達式之間的分隔符。這使得類似 `vec!` 的巨集可以接受任意數量的參數：`vec![1, 2, 3]` 或 `vec![]`。其他選項是不正確的，因為：樣式處理多個表達式而不只是一個，它特別匹配表達式而不是類型定義，並且使用逗號而不是分號，而且宏在編譯時代代代代碼時執行，而不是在運行時執行。
question: 当一个宏在其定义中使用模式 `$($x:expr),*` 时，该模式的作用是什么？
answer: 它可以匹配由逗号分隔的零个或多个表达式，从而实现长度可变的参数列表
wrong_answers:
  - 它完全匹配一个表达式，并多次重复宏扩展
  - 它可以匹配任意多个用分号分隔的类型定义，以便生成代码
  - 它会创建一个循环，在运行时以不同的表达式值执行宏
explanation: |
  模式 `$($x:expr),*` 使用 Rust 的宏重复语法，其中 `*` 数量词表示 "零或更多"，`$x:expr` 表示每个表达式，逗号指定表达式之间的分隔符。这使得像 `vec!` 这样的宏可以接受任意数量的参数：或 `vec![]`。其他选项是不正确的，因为：该模式处理的是多个表达式，而不仅仅是一个表达式；它专门匹配表达式，而不是类型定义；使用的是逗号，而不是分号；宏在代码生成的编译时执行，而不是在运行时执行。
question: उत्पादन Rust कोड में त्रुटि प्रबंधन के लिए पैनिक की तुलना में रिजल्ट और ऑप्शन प्रकारों का उपयोग करने का सबसे महत्वपूर्ण लाभ क्या है?
answer: वे संभावित विफलताओं की स्पष्ट स्वीकृति को बाध्य करते हैं और त्रुटि से उबरने की सुगम प्रक्रिया को सक्षम बनाते हैं।
wrong_answers:
  - त्रुटि की स्थिति में स्टैक अनवाइंडिंग से बचकर वे बेहतर प्रदर्शन प्रदान करते हैं।
  - वे डिबगिंग को आसान बनाने के लिए सभी प्रकार की त्रुटियों को स्वचालित रूप से स्ट्रिंग संदेशों में परिवर्तित कर देते हैं।
  - वे विफलता के बिंदु पर त्रुटियों को संभालकर त्रुटि प्रसार की आवश्यकता को समाप्त कर देते हैं।
explanation: |
  रिजल्ट और ऑप्शन प्रकार त्रुटि प्रबंधन को स्पष्ट और पुनर्प्राप्त करने योग्य बनाते हैं, जिससे डेवलपर्स को यह स्वीकार करना पड़ता है कि ऑपरेशन विफल हो सकते हैं और उन विफलताओं को सुचारू रूप से संभालने के लिए तंत्र प्रदान करते हैं। पैनिक के विपरीत, जो निष्पादन को तुरंत समाप्त कर देता है, ये प्रकार प्रोग्राम को चलते रहने और त्रुटि स्थितियों पर उचित प्रतिक्रिया देने की अनुमति देते हैं। गलत उत्तर उनकी क्षमताओं को गलत तरीके से प्रस्तुत करते हैं: प्रदर्शन उनका प्राथमिक लाभ नहीं है, वे त्रुटियों को स्वचालित रूप से स्ट्रिंग में परिवर्तित नहीं करते हैं (यह तो वैसे भी की विशेषता है), और वे वास्तव में ? जैसे ऑपरेटरों के माध्यम से त्रुटि प्रसार को समाप्त करने के बजाय उसे बढ़ावा देते हैं।
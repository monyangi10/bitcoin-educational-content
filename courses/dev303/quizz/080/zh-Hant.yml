question: 在生產中的 Rust 程式碼中，使用 Result 和 Option 種類比 panic 種類處理錯誤的最大優點是什麼？
answer: 它們強制對潛在故障進行明確確認，並實現優越的錯誤恢復。
wrong_answers:
  - 它們可避免在錯誤情況下堆疊解除，從而提供更佳的效能。
  - 它們會自動將所有錯誤類型轉換為字串訊息，以方便除錯
  - 它們透過在故障點處理錯誤，消除了錯誤傳播的需要
explanation: |
  Result 和 Option 類型強迫開發人員承認操作可能會失敗，並提供從容處理這些失敗的機制，使錯誤處理變得明確和可恢復。與立即終止執行的 panic 不同，這些類型允許程式繼續執行，並適當地回應錯誤情況。錯誤的答案歪曲了這些類型的功能：效能並不是它們的主要優勢，它們不會自動將錯誤轉換為字串 (這是 anyhow 的功能)，而且它們實際上是透過運算子 (例如 ?) 促進而非消除錯誤傳播。
question: 本番のRustコードにおけるエラー処理で、panic型よりもResult型やOption型を使うことの最大の利点は何ですか？
answer: 潜在的な障害を明示的に認識させ、グレースフル・エラーリカバリーを可能にする。
wrong_answers:
  - エラー状態でのスタック巻き戻しを回避することで、より良いパフォーマンスを提供する。
  - デバッグしやすいように、すべてのエラータイプを自動的に文字列メッセージに変換する。
  - 障害発生時にエラーを処理することで、エラー伝播の必要性を排除する。
explanation: |
  Result型とOption型は、操作に失敗する可能性があることを開発者に認識させ、それらの失敗を優雅に処理するメカニズムを提供することによって、エラー処理を明示的かつ回復可能にする。即座に実行を終了するpanicとは異なり、これらの型はプログラムの実行を継続し、エラー状態に適切に対応することを可能にする。間違った答えは、その能力を誤って伝えている。パフォーマンスはその主な利点ではなく、エラーを自動的に文字列に変換するわけでもなく（これはanyhowの機能である）、?
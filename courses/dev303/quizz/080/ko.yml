question: 프로덕션 Rust 코드에서 오류 처리를 위해 패닉 대신 결과 및 옵션 유형을 사용하면 가장 큰 장점은 무엇인가요?
answer: 잠재적 실패를 명시적으로 인정하고 오류를 정상적으로 복구할 수 있습니다
wrong_answers:
  - 오류 조건에서 스택이 풀리지 않도록 하여 더 나은 성능을 제공합니다
  - 모든 오류 유형을 문자열 메시지로 자동 변환하여 디버깅을 쉽게 할 수 있습니다
  - 장애 발생 지점에서 오류를 처리하여 오류 전파의 필요성을 제거합니다
explanation: |
  결과 및 옵션 유형은 개발자가 작업이 실패할 수 있음을 인정하고 이러한 실패를 정상적으로 처리하는 메커니즘을 제공함으로써 오류 처리를 명시적이고 복구 가능하게 만듭니다. 실행을 즉시 종료하는 패닉과 달리 이러한 유형은 프로그램을 계속 실행하고 오류 조건에 적절히 대응할 수 있도록 합니다. 오답은 그 기능을 잘못 표현하고 있습니다. 성능이 주요 이점이 아니며, 오류를 문자열로 자동 변환하지 않으며(이는 어쨌든 기능입니다), ? 같은 연산자를 통해 오류 전파를 제거하기보다는 오히려 촉진합니다.
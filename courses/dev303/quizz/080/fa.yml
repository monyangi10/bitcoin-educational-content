question: مزیت مهم استفاده از انواع Result و Option به جای panic برای مدیریت خطا در کد تولیدی Rust چیست؟
answer: آن‌ها اذعان صریح به شکست‌های احتمالی را مجبور می‌کنند و بازیابی خطای زیبا را ممکن می‌سازند.
wrong_answers:
  - آن‌ها با اجتناب از بازگشایی پشته در شرایط خطا، عملکرد بهتری ارائه می‌دهند.
  - آن‌ها به‌طور خودکار همه انواع خطا را به پیام‌های رشته‌ای تبدیل می‌کنند تا اشکال‌زدایی آسان‌تر شود.
  - آن‌ها با مدیریت خطاها در نقطه شکست، نیاز به انتشار خطا را از بین می‌برند.
explanation: |
  نوع‌های Result و Option با مجبور کردن توسعه‌دهندگان به پذیرش این که عملیات می‌تواند شکست بخورد و ارائه مکانیزم‌هایی برای مدیریت این شکست‌ها به صورت مؤدبانه، مدیریت خطا را صریح و قابل بازیابی می‌کنند. برخلاف panic که بلافاصله اجرای برنامه را متوقف می‌کند، این نوع‌ها به برنامه‌ها اجازه می‌دهند که به اجرا ادامه دهند و به شرایط خطا به‌طور مناسب پاسخ دهند. پاسخ‌های نادرست قابلیت‌های آن‌ها را نادرست نشان می‌دهند: عملکرد مزیت اصلی آن‌ها نیست، آن‌ها به‌طور خودکار خطاها را به رشته تبدیل نمی‌کنند (این ویژگی anyhow است)، و در واقع به جای حذف انتشار خطا، آن را از طریق عملگرهایی مانند ? تسهیل می‌کنند.
question: ข้อได้เปรียบที่สำคัญที่สุดของการใช้ประเภท Result และ Option แทนการใช้ panic สำหรับการจัดการข้อผิดพลาดในโค้ดการผลิต Rust คืออะไร?
answer: พวกเขาบังคับให้มีการยอมรับความล้มเหลวที่อาจเกิดขึ้นอย่างชัดเจนและช่วยให้การกู้คืนข้อผิดพลาดเป็นไปอย่างราบรื่น
wrong_answers:
  - พวกเขาให้ประสิทธิภาพที่ดีกว่าโดยการหลีกเลี่ยงการคลายสแตกในระหว่างเงื่อนไขข้อผิดพลาด
  - พวกเขาจะแปลงประเภทข้อผิดพลาดทั้งหมดเป็นข้อความสตริงโดยอัตโนมัติเพื่อให้ง่ายต่อการดีบัก
  - พวกเขากำจัดความจำเป็นในการแพร่กระจายข้อผิดพลาดโดยการจัดการข้อผิดพลาดที่จุดที่เกิดข้อผิดพลาด
explanation: |
  ผลลัพธ์และประเภทตัวเลือกทำให้การจัดการข้อผิดพลาดชัดเจนและสามารถกู้คืนได้โดยการบังคับให้นักพัฒนารับรู้ว่าการดำเนินการสามารถล้มเหลวและให้กลไกในการจัดการกับความล้มเหลวนั้นอย่างสง่างาม ต่างจาก panic ซึ่งจะยุติการทำงานทันที ประเภทเหล่านี้อนุญาตให้โปรแกรมดำเนินการต่อและตอบสนองต่อเงื่อนไขข้อผิดพลาดอย่างเหมาะสม คำตอบที่ผิดแสดงความสามารถของพวกเขาผิด: ประสิทธิภาพไม่ใช่ข้อได้เปรียบหลักของพวกเขา พวกเขาไม่ได้แปลงข้อผิดพลาดเป็นสตริงโดยอัตโนมัติ (นั่นคือคุณสมบัติของ anyhow) และพวกเขาจริง ๆ แล้วอำนวยความสะดวกแทนที่จะกำจัดการแพร่กระจายข้อผิดพลาดผ่านตัวดำเนินการเช่น ?.
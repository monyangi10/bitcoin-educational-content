question: Кое е най-същественото предимство на използването на типове Result и Option пред panic за обработка на грешки в производствен код на Rust?
answer: Те налагат изрично потвърждаване на потенциални грешки и позволяват плавно възстановяване на грешки
wrong_answers:
  - Те осигуряват по-добра производителност, като избягват разгъването на стека при състояния на грешка
  - Те автоматично преобразуват всички типове грешки в символни съобщения за по-лесно отстраняване на грешки
  - Те елиминират нуждата от разпространение на грешки, като обработват грешките в точката на повреда
explanation: |
  Типовете Result (Резултат) и Option (Опция) правят обработката на грешки явна и възстановима, като принуждават разработчиците да признаят, че операциите могат да се провалят, и осигуряват механизми за елегантна обработка на тези грешки. За разлика от паниката, която незабавно прекратява изпълнението, тези типове позволяват на програмите да продължат да работят и да реагират по подходящ начин на условията на грешка. Грешните отговори представят погрешно техните възможности: производителността не е основното им предимство, те не преобразуват автоматично грешки в низове (това е функция на anyhow) и всъщност улесняват, а не елиминират разпространението на грешки чрез оператори като ?.
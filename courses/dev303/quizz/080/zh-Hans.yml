question: 在 Rust 生产代码的错误处理中，使用 Result 和 Option 类型（而不是 panic）的最大优势是什么？
answer: 它们强制对潜在故障进行明确确认，并实现优美的错误恢复
wrong_answers:
  - 它们能避免在错误条件下进行堆栈解卷，从而提供更好的性能
  - 它们会自动将所有错误类型转换为字符串信息，以方便调试
  - 它们通过在故障点处理错误，消除了错误传播的需要
explanation: |
  Result 和 Option 类型通过强制开发人员承认操作可能会失败，并提供从容处理这些失败的机制，使错误处理变得明确和可恢复。与立即终止执行的 panic 不同，这些类型允许程序继续运行，并对错误条件做出适当的响应。错误的答案歪曲了这些类型的功能：性能并不是它们的主要优势，它们不会自动将错误转换为字符串（这是 anyhow 的功能），而且它们实际上是通过操作符（如?
question: Rust संरचनाओं में विधियों और संबंधित कार्यों के बीच मुख्य अंतर क्या है?
answer: मेथड्स स्वयं को अपने पहले पैरामीटर के रूप में लेते हैं, जबकि एसोसिएटेड फंक्शन्स ऐसा नहीं करते हैं।
wrong_answers:
  - विधियाँ डिफ़ॉल्ट रूप से सार्वजनिक होती हैं, जबकि संबंधित फ़ंक्शन डिफ़ॉल्ट रूप से निजी होते हैं।
  - विधियाँ केवल डेटा पढ़ सकती हैं, जबकि संबंधित फ़ंक्शन संरचना फ़ील्ड को संशोधित कर सकते हैं।
  - मेथड्स को कॉल करने के लिए डॉट नोटेशन का उपयोग किया जाता है, जबकि एसोसिएटेड फंक्शन्स के लिए एरो नोटेशन का उपयोग किया जाता है।
explanation: |
  Rust में मेथड, इम्प्लीमेंटेशन ब्लॉक में परिभाषित फंक्शन होते हैं जो अपने पहले पैरामीटर के रूप में self (self, &self, या &mut self) लेते हैं, जिससे वे स्ट्रक्चर के इंस्टेंस पर कार्य कर सकते हैं। एसोसिएटेड फंक्शन भी इम्प्लीमेंटेशन ब्लॉक में परिभाषित होते हैं लेकिन self को पैरामीटर के रूप में नहीं लेते हैं, जिससे वे अन्य भाषाओं में स्टैटिक मेथड के समान हो जाते हैं। एसोसिएटेड फंक्शन को डबल कॉलन सिंटैक्स (Type::function_name()) का उपयोग करके कॉल किया जाता है और आमतौर पर कंस्ट्रक्टर के रूप में उपयोग किया जाता है, जबकि मेथड को डॉट नोटेशन का उपयोग करके इंस्टेंस पर कॉल किया जाता है। अन्य विकल्प गलत हैं क्योंकि मेथड और एसोसिएटेड फंक्शन दोनों समान विजिबिलिटी नियमों का पालन करते हैं, दोनों को उनके इम्प्लीमेंटेशन के आधार पर डेटा को संशोधित या पढ़ने के लिए डिज़ाइन किया जा सकता है, और एसोसिएटेड फंक्शन डबल कॉलन सिंटैक्स का उपयोग करते हैं, न कि एरो नोटेशन का।
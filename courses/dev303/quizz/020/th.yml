question: ความแตกต่างหลักระหว่างเมธอดและฟังก์ชันที่เกี่ยวข้องในโครงสร้าง Rust คืออะไร?
answer: เมธอดใช้ self เป็นพารามิเตอร์แรก ในขณะที่ฟังก์ชันที่เกี่ยวข้องไม่ใช้
wrong_answers:
  - เมธอดเป็นสาธารณะโดยค่าเริ่มต้น ในขณะที่ฟังก์ชันที่เกี่ยวข้องเป็นส่วนตัวโดยค่าเริ่มต้น
  - วิธีการสามารถอ่านข้อมูลได้เท่านั้น ในขณะที่ฟังก์ชันที่เกี่ยวข้องสามารถแก้ไขฟิลด์โครงสร้างได้
  - เมธอดใช้การเรียกแบบจุด ในขณะที่ฟังก์ชันที่เกี่ยวข้องใช้การเรียกแบบลูกศร
explanation: |
  วิธีการใน Rust คือฟังก์ชันที่ถูกกำหนดในบล็อก impl ที่รับรูปแบบของ self เป็นพารามิเตอร์แรก (self, &self, หรือ &mut self) ทำให้สามารถทำงานกับอินสแตนซ์ของโครงสร้างได้ ฟังก์ชันที่เกี่ยวข้องก็ถูกกำหนดในบล็อก impl เช่นกันแต่ไม่รับ self เป็นพารามิเตอร์ ทำให้คล้ายกับเมธอดสแตติกในภาษาอื่น ฟังก์ชันที่เกี่ยวข้องถูกเรียกใช้โดยใช้ไวยากรณ์ดับเบิลโคลอน (Type::function_name()) และมักถูกใช้เป็นคอนสตรัคเตอร์ ในขณะที่วิธีการถูกเรียกใช้บนอินสแตนซ์โดยใช้จุด ไวยากรณ์ ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะทั้งวิธีการและฟังก์ชันที่เกี่ยวข้องปฏิบัติตามกฎการมองเห็นเดียวกัน ทั้งสองสามารถถูกออกแบบให้แก้ไขหรืออ่านข้อมูลขึ้นอยู่กับการนำไปใช้ และฟังก์ชันที่เกี่ยวข้องใช้ไวยากรณ์ดับเบิลโคลอน ไม่ใช่ไวยากรณ์ลูกศร
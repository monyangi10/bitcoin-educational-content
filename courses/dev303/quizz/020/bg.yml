question: Каква е основната разлика между методите и свързаните с тях функции в структурите Rust?
answer: Методите приемат self като първи параметър, а свързаните с тях функции - не
wrong_answers:
  - Методите са публични по подразбиране, а свързаните с тях функции са частни по подразбиране
  - Методите могат само да четат данни, докато свързаните с тях функции могат да променят полета на структурата
  - За извикване на методите се използва точкова нотация, а за свързаните с тях функции - стрелкова нотация
explanation: |
  Методите в Rust са функции, дефинирани в блок impl, които приемат някаква форма на self като първи параметър (self, &self или &mut self), което им позволява да оперират с екземпляри на структурата. Асоциираните функции също са дефинирани в блокове impl, но не приемат self като параметър, което ги прави подобни на статичните методи в други езици. Асоциираните функции се извикват с помощта на синтаксис с двойно двоеточие (Type::function_name()) и обикновено се използват като конструктори, докато методите се извикват върху екземпляри с помощта на точкова нотация. Другите варианти са некоректни, тъй като и методите, и асоциираните функции следват едни и същи правила за видимост, и двете могат да бъдат предназначени за модифициране или четене на данни в зависимост от тяхната реализация, а асоциираните функции използват синтаксис на двойното двоеточие, а не на стрелковия запис.
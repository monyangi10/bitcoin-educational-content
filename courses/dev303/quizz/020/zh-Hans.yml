question: 在 Rust 结构中，方法和相关函数的主要区别是什么？
answer: 方法以自身为第一个参数，而相关函数不以自身为第一个参数
wrong_answers:
  - 方法默认为公共方法，而相关函数默认为私有函数
  - 方法只能读取数据，而相关函数可以修改结构字段
  - 方法使用圆点符号调用，而相关函数使用箭头符号调用
explanation: |
  Rust 中的方法是在 impl 代码块中定义的函数，它们以某种形式的 self 作为第一个参数（self、&self 或 &mut self），从而可以对结构的实例进行操作。关联函数也定义在 impl 代码块中，但不将 self 作为参数，因此与其他语言中的静态方法类似。关联函数的调用使用双冒号语法（Type::function_name()），通常用作构造函数，而方法在实例上的调用使用点符号。其他选项都不正确，因为方法和关联函数都遵循相同的可见性规则，两者都可以根据其实现来修改或读取数据，而且关联函数使用双冒号语法，而不是箭头符号。
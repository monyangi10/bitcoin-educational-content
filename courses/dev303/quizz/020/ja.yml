question: Rustの構造におけるメソッドと関連関数の主な違いは何ですか？
answer: メソッドは self を最初のパラメータとするが、関連する関数はそうではない。
wrong_answers:
  - メソッドはデフォルトでパブリックであり、関連する関数はデフォルトでプライベートである。
  - メソッドはデータを読み取ることしかできないが、関連する関数は構造体フィールドを変更することができる。
  - メソッドはドット表記で呼び出し、関連する関数は矢印表記で呼び出します。
explanation: |
  Rustのメソッドは、implブロックの中で定義される関数で、最初のパラメーターとしてselfをとる（self、&self、&mut self）。連想関数もimplブロックで定義されますが、selfをパラメータとして取らないため、他の言語のスタティック・メソッドに似ています。関連関数はダブルコロン構文（Type::function_name()）で呼び出され、一般的にコンストラクタとして使用されます。メソッドもアソシエーション関数も同じ可視性ルールに従いますし、実装によってはデータを変更したり読み込んだりすることもできます。
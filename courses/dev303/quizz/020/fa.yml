question: تفاوت اصلی بین متدها و توابع مرتبط در ساختارهای Rust چیست؟
answer: روش‌ها self را به عنوان اولین پارامتر خود می‌گیرند، در حالی که توابع وابسته این کار را نمی‌کنند.
wrong_answers:
  - روش‌ها به‌طور پیش‌فرض عمومی هستند، در حالی که توابع وابسته به‌طور پیش‌فرض خصوصی هستند.
  - روش‌ها فقط می‌توانند داده‌ها را بخوانند، در حالی که توابع مرتبط می‌توانند فیلدهای ساختار را تغییر دهند.
  - متدها از نقطه‌گذاری برای فراخوانی استفاده می‌کنند، در حالی که توابع مرتبط از نشانه‌گذاری پیکان استفاده می‌کنند.
explanation: |
  متدها در Rust توابعی هستند که در یک بلوک impl تعریف می‌شوند و نوعی از self را به عنوان اولین پارامتر خود می‌گیرند (self، &self، یا &mut self)، که به آن‌ها اجازه می‌دهد بر روی نمونه‌های ساختار عمل کنند. توابع وابسته نیز در بلوک‌های impl تعریف می‌شوند اما self را به عنوان پارامتر نمی‌گیرند، که آن‌ها را مشابه متدهای استاتیک در زبان‌های دیگر می‌سازد. توابع وابسته با استفاده از سینتکس دو نقطه (::) فراخوانی می‌شوند (Type::function_name()) و معمولاً به عنوان سازنده‌ها استفاده می‌شوند، در حالی که متدها بر روی نمونه‌ها با استفاده از نقطه‌گذاری فراخوانی می‌شوند. گزینه‌های دیگر نادرست هستند زیرا هم متدها و هم توابع وابسته از قوانین دیدپذیری یکسانی پیروی می‌کنند، هر دو می‌توانند برای تغییر یا خواندن داده‌ها بسته به پیاده‌سازی‌شان طراحی شوند، و توابع وابسته از سینتکس دو نقطه استفاده می‌کنند، نه سینتکس پیکان.
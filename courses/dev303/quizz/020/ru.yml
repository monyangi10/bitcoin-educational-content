question: В чем заключается основное различие между методами и связанными с ними функциями в структурах Rust?
answer: Методы принимают self в качестве первого параметра, а связанные с ними функции - нет
wrong_answers:
  - Методы по умолчанию являются общедоступными, а связанные с ними функции по умолчанию являются частными
  - Методы могут только читать данные, в то время как связанные с ними функции могут изменять поля структуры
  - Для вызова методов используется точечная нотация, а для связанных с ними функций - стрелочная нотация
explanation: |
  Методы в Rust - это функции, определенные в блоке impl, которые принимают в качестве первого параметра self (self, &self или &mut self), что позволяет им оперировать с экземплярами структуры. Ассоциированные функции также определяются в блоках impl, но не принимают self в качестве параметра, что делает их похожими на статические методы в других языках. Ассоциированные функции вызываются с помощью синтаксиса двойного двоеточия (Type::function_name()) и обычно используются в качестве конструкторов, в то время как методы вызываются на экземплярах с помощью точечной нотации. Остальные варианты неверны, поскольку и методы, и ассоциированные функции следуют одним и тем же правилам видимости, и те и другие могут быть предназначены для модификации или чтения данных в зависимости от их реализации, а ассоциированные функции используют синтаксис двойного двоеточия, а не стрелочную нотацию.
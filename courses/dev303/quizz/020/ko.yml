question: Rust 구조에서 메서드와 관련 함수의 주요 차이점은 무엇인가요?
answer: 메서드는 첫 번째 매개변수로 자기를 취하지만, 연관 함수는 그렇지 않습니다
wrong_answers:
  - 메서드는 기본적으로 공개이고 관련 함수는 기본적으로 비공개입니다
  - 메서드는 데이터만 읽을 수 있고, 연관된 함수는 구조 필드를 수정할 수 있습니다
  - 메서드는 점 표기법을 사용하여 호출하고, 연관된 함수는 화살표 표기법을 사용합니다
explanation: |
  Rust의 메서드는 임포트 블록에 정의된 함수로, 구조체의 인스턴스에서 작동할 수 있도록 첫 번째 파라미터로 어떤 형태의 self(self, &self 또는 &mut self)를 취합니다. 연관 함수 역시 임포트 블록에 정의되지만 self를 매개변수로 받지 않으므로 다른 언어의 정적 메서드와 유사합니다. 연관 함수는 이중 콜론 구문(Type::function_name())을 사용하여 호출되며 일반적으로 생성자로 사용되는 반면, 메서드는 점 표기법을 사용하여 인스턴스에서 호출됩니다. 다른 옵션은 메서드와 연관 함수 모두 동일한 표시 규칙을 따르고, 구현에 따라 데이터를 수정하거나 읽도록 설계할 수 있으며, 연관 함수는 화살표 표기법이 아닌 이중 콜론 구문을 사용하므로 올바르지 않습니다.
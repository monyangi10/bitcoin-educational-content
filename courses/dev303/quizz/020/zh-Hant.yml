question: 在 Rust 結構中，方法和相關函數的主要差異是什麼？
answer: 方法以 self 為第一參數，而相關函數則不以 self 為第一參數。
wrong_answers:
  - 方法預設為公開，而相關函數預設為私有
  - 方法只能讀取資料，而相關函式則可以修改結構欄位
  - 方法使用圓點符號來呼叫，而相關函數則使用箭頭符號
explanation: |
  Rust 中的方法是在 impl 區塊中定義的函數，這些函數以某種形式的 self 作為其第一個參數 (self、&self 或 &mut self)，允許它們對結構的實體進行操作。關聯函數也定義在 impl 區塊中，但不以 self 為參數，因此類似於其他語言中的靜態方法。關聯函數使用雙冒號語法 (Type::function_name()) 來呼叫，通常用於構建器，而方法則使用點符號在實體上呼叫。其他選項都不對，因為方法和關聯函數都遵循相同的可見性規則，兩者都可以根據其實作設計來修改或讀取資料，而且關聯函數使用雙冒號語法，而不是箭頭符號。
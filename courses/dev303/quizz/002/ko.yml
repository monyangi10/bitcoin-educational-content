question: 추가 키워드 없이 'let x = 5'를 사용하여 Rust에서 변수를 선언하면 어떻게 되나요?
answer: 변수는 불변이 되며 할당 후에는 변경할 수 없습니다
wrong_answers:
  - 변수는 변경 가능하며 언제든지 수정할 수 있습니다
  - 이 변수는 릴리스 빌드에만 자동으로 최적화됩니다
  - 변수를 성공적으로 컴파일하려면 명시적 유형 어노테이션이 필요합니다
explanation: |
  Rust에서 변수는 'let'으로 선언하면 기본적으로 변경할 수 없습니다. 즉, 'let x = 5'와 같이 변수에 값을 할당하면 나중에 프로그램에서 해당 값을 변경할 수 없습니다. 이를 수정하려고 하면 컴파일러에서 오류가 발생합니다. 이 기본 불변성은 예기치 않은 상태 변경으로 인해 발생하는 많은 일반적인 프로그래밍 버그를 방지하는 핵심 안전 기능입니다. 변수를 변경 가능하게 만들려면 'let mut x = 5'와 같이 'mut' 키워드를 명시적으로 사용해야 합니다.
question: Rustで『let x = 5』を使って変数を宣言した場合、キーワードを追加しないとどうなるのか？
answer: 変数は不変となり、代入後は変更できません。
wrong_answers:
  - 変数は変更可能になり、いつでも変更できるようになります。
  - 変数は自動的にリリースビルドのみに最適化されます。
  - コンパイルに成功するには、明示的な型アノテーションが必要です。
explanation: |
  Rustでは、'let'で宣言された変数はデフォルトで不変である。つまり、一度'let x = 5'のように変数に値を代入すると、プログラムの後半でその値を変更することはできない。もし変更しようとすると、コンパイラーはエラーを出す。このデフォルトの不変性は、予期せぬ状態変化によって引き起こされる多くの一般的なプログラミングのバグを防ぐ、重要な安全機能である。変数をミュータブルにするには、「let mut x = 5」のように明示的に「mut」キーワードを使う必要があります。
question: Rust में 'let x = 5' का उपयोग करके बिना किसी अतिरिक्त कीवर्ड के किसी वेरिएबल को घोषित करने पर क्या होता है?
answer: असाइनमेंट के बाद वेरिएबल अपरिवर्तनीय हो जाता है और उसे बदला नहीं जा सकता।
wrong_answers:
  - यह वेरिएबल परिवर्तनीय हो जाता है और इसे किसी भी समय संशोधित किया जा सकता है।
  - यह वेरिएबल केवल रिलीज़ बिल्ड के लिए स्वचालित रूप से अनुकूलित किया गया है।
  - इस वेरिएबल को सफलतापूर्वक कंपाइल करने के लिए स्पष्ट प्रकार एनोटेशन की आवश्यकता होती है।
explanation: |
  Rust में, 'let' के साथ घोषित किए गए चर डिफ़ॉल्ट रूप से अपरिवर्तनीय होते हैं। इसका मतलब है कि एक बार जब आप किसी चर को कोई मान असाइन कर देते हैं, जैसे 'let x = 5', तो आप प्रोग्राम में बाद में उस मान को नहीं बदल सकते। यदि आप इसे बदलने का प्रयास करते हैं, तो कंपाइलर त्रुटि उत्पन्न करेगा। यह डिफ़ॉल्ट अपरिवर्तनीयता एक महत्वपूर्ण सुरक्षा विशेषता है जो अप्रत्याशित स्थिति परिवर्तनों के कारण होने वाली कई सामान्य प्रोग्रामिंग त्रुटियों को रोकती है। किसी चर को परिवर्तनीय बनाने के लिए, आपको स्पष्ट रूप से 'mut' कीवर्ड का उपयोग करना होगा, जैसे 'let mut x = 5'।
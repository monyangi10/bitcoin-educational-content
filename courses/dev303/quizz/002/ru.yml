question: Что произойдет, если вы объявите переменную в Rust с помощью 'let x = 5' без дополнительных ключевых слов?
answer: Переменная становится неизменяемой и не может быть изменена после присвоения
wrong_answers:
  - Переменная становится изменяемой и может быть изменена в любое время
  - Переменная автоматически оптимизируется только для релизных сборок
  - Для успешной компиляции переменной требуется явная аннотация типа
explanation: |
  В Rust переменные по умолчанию неизменяемы, если они объявлены с помощью 'let'. Это означает, что, присвоив переменной значение, например 'let x = 5', вы не сможете изменить его в дальнейшем в программе. Если вы попытаетесь изменить его, компилятор выдаст ошибку. Эта неизменяемость по умолчанию является ключевым элементом безопасности, который предотвращает многие распространенные ошибки программирования, вызванные неожиданными изменениями состояния. Чтобы сделать переменную изменяемой, необходимо явно использовать ключевое слово 'mut', например, 'let mut x = 5'.
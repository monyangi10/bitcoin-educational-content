question: وقتی در Rust یک متغیر را با استفاده از 'let x = 5' بدون هیچ کلمه کلیدی اضافی اعلام می‌کنید، چه اتفاقی می‌افتد؟
answer: متغیر غیرقابل تغییر می‌شود و پس از انتساب نمی‌تواند تغییر کند
wrong_answers:
  - متغیر قابل تغییر می‌شود و می‌تواند در هر زمانی اصلاح شود
  - متغیر به‌طور خودکار فقط برای نسخه‌های انتشار بهینه‌سازی می‌شود.
  - متغیر نیاز به حاشیه‌نویسی نوع صریح دارد تا به‌طور موفقیت‌آمیز کامپایل شود.
explanation: |
  در Rust، متغیرها به‌طور پیش‌فرض زمانی که با 'let' اعلام می‌شوند، تغییرناپذیر هستند. این بدان معناست که وقتی مقداری را به یک متغیر مانند 'let x = 5' اختصاص می‌دهید، نمی‌توانید آن مقدار را بعداً در برنامه تغییر دهید. اگر سعی کنید آن را تغییر دهید، کامپایلر خطا تولید خواهد کرد. این تغییرناپذیری پیش‌فرض یک ویژگی ایمنی کلیدی است که از بسیاری از باگ‌های رایج برنامه‌نویسی که ناشی از تغییرات غیرمنتظره در وضعیت هستند، جلوگیری می‌کند. برای قابل تغییر کردن یک متغیر، باید به‌طور صریح از کلمه کلیدی 'mut' استفاده کنید مانند 'let mut x = 5'.
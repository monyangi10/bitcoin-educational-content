question: 如果您在 Rust 中使用 'let x = 5' 來宣告變數，而不使用任何額外的關鍵字，會發生什麼情況？
answer: 變數變為不可變，且在指派之後不能變更
wrong_answers:
  - 變數變得可變，可以隨時修改
  - 變數僅針對釋出版本自動最佳化
  - 變數需要明確的類型註解才能成功編譯
explanation: |
  在 Rust 中，當使用「let」宣告時，預設變數是不可變的。這表示一旦您為變數指定一個值，例如 'let x = 5'，您就無法在程式中變更該值。如果您嘗試修改它，編譯器會產生錯誤。這種預設的不可變性是一種關鍵的安全特性，可以防止許多由意外狀態改變所引起的常見程式錯誤。要使變數可變，您必須明確地使用 'mut「 關鍵字，例如 」let mut x = 5'。
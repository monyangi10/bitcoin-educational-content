question: จะเกิดอะไรขึ้นเมื่อคุณประกาศตัวแปรใน Rust โดยใช้ 'let x = 5' โดยไม่มีคีย์เวิร์ดเพิ่มเติม?
answer: ตัวแปรจะกลายเป็นค่าคงที่และไม่สามารถเปลี่ยนแปลงได้หลังจากการกำหนดค่า
wrong_answers:
  - ตัวแปรกลายเป็นแบบเปลี่ยนแปลงได้และสามารถแก้ไขได้ตลอดเวลา
  - ตัวแปรจะถูกปรับให้เหมาะสมโดยอัตโนมัติสำหรับการสร้างเวอร์ชันที่ปล่อยออกมาเท่านั้น
  - ตัวแปรต้องการการระบุชนิดข้อมูลอย่างชัดเจนเพื่อให้คอมไพล์สำเร็จ
explanation: |
  ใน Rust ตัวแปรจะไม่เปลี่ยนแปลงโดยค่าเริ่มต้นเมื่อประกาศด้วย 'let' ซึ่งหมายความว่าเมื่อคุณกำหนดค่าให้กับตัวแปรเช่น 'let x = 5' คุณไม่สามารถเปลี่ยนค่านั้นในภายหลังในโปรแกรมได้ หากคุณพยายามแก้ไขมัน คอมไพเลอร์จะสร้างข้อผิดพลาด การไม่เปลี่ยนแปลงโดยค่าเริ่มต้นนี้เป็นคุณสมบัติความปลอดภัยที่สำคัญที่ป้องกันข้อบกพร่องในการเขียนโปรแกรมทั่วไปหลายอย่างที่เกิดจากการเปลี่ยนแปลงสถานะที่ไม่คาดคิด หากต้องการทำให้ตัวแปรเปลี่ยนแปลงได้ คุณต้องใช้คีย์เวิร์ด 'mut' อย่างชัดเจนเช่น 'let mut x = 5'
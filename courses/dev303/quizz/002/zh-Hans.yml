question: 如果在 Rust 中使用 "let x = 5 "声明一个变量，而不使用任何附加关键字，会发生什么情况？
answer: 赋值后，变量变得不可变，且不能更改
wrong_answers:
  - 变量变得可变，可随时修改
  - 变量已自动优化，仅适用于发布版本
  - 变量需要显式类型注解才能成功编译
explanation: |
  在 Rust 中，使用 "let "声明的变量默认是不可变的。这意味着一旦你为变量赋值，如 "let x = 5"，以后就无法在程序中修改该值了。如果你试图修改它，编译器会产生错误。这种默认的不变性是一个关键的安全特性，可以防止许多由意外状态变化引起的常见程序错误。要使变量可变，必须明确使用 "mut "关键字，如 "let mut x = 5"。
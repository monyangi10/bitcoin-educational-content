question: Какво се случва, когато декларирате променлива в Rust с 'let x = 5' без допълнителни ключови думи?
answer: Променливата става неизменна и не може да бъде променяна след присвояване
wrong_answers:
  - Променливата става променлива и може да бъде променяна по всяко време
  - Променливата се оптимизира автоматично само за версиите на версията
  - Променливата изисква изрична анотация на типа, за да се компилира успешно
explanation: |
  В Rust променливите са неизменни по подразбиране, когато са декларирани с 'let'. Това означава, че след като присвоите стойност на променлива, например 'let x = 5', не можете да промените тази стойност по-късно в програмата. Ако се опитате да я промените, компилаторът ще отчете грешка. Тази неизменност по подразбиране е ключова характеристика за безопасност, която предотвратява много често срещани грешки в програмирането, причинени от неочаквани промени в състоянието. За да направите една променлива променлива променлива, трябва изрично да използвате ключовата дума 'mut', например 'let mut x = 5'.
question: دستور `cargo new project_name` به‌طور خودکار به‌عنوان بخشی از ساختار پروژه موارد زیر را ایجاد می‌کند
answer: یک مخزن Git، فایل Cargo.toml، و فایل main.rs پایه با برنامه Hello World
wrong_answers:
  - فقط یک فایل پیکربندی Cargo.toml و ساختار دایرکتوری منبع خالی
  - یک مجموعه تست کامل، فایل‌های مستندات، و پیکربندی آماده برای تولید
  - فایل‌های اجرایی باینری، دایرکتوری هدف، و پیکربندی ساخت نسخه نهایی
explanation: |
  دستور `cargo new` یک پایه پروژه جامع ایجاد می‌کند که شامل یک مخزن Git برای کنترل نسخه، یک فایل Cargo.toml برای پیکربندی پروژه و وابستگی‌ها، و یک فایل main.rs پایه حاوی برنامه 'Hello, world!' است. این همه چیز مورد نیاز برای شروع توسعه را فراهم می‌کند. گزینه‌های دیگر نادرست هستند زیرا cargo new مجموعه‌های تست، فایل‌های مستندات، باینری‌های اجرایی یا مصنوعات ساخت را ایجاد نمی‌کند - فقط ساختار اولیه پروژه را تنظیم می‌کند.

question: "คำสั่ง `cargo new project_name` จะสร้างโครงสร้างโปรเจกต์ดังนี้:"
answer: "ที่เก็บ Git, ไฟล์ Cargo.toml, และไฟล์ main.rs พื้นฐานพร้อมโปรแกรม Hello World"
wrong_answers:
  - "เฉพาะไฟล์การกำหนดค่า Cargo.toml และโครงสร้างไดเรกทอรีต้นทางที่ว่างเปล่า"
  - "ชุดทดสอบที่สมบูรณ์, ไฟล์เอกสาร, และการกำหนดค่าพร้อมใช้งานในสภาพแวดล้อมการผลิต"
  - "ไฟล์ปฏิบัติการไบนารี, ไดเรกทอรีเป้าหมาย, และการกำหนดค่าการสร้างเวอร์ชันปล่อย"
explanation: |
  คำสั่ง `cargo new` สร้างพื้นฐานโครงการที่ครอบคลุมรวมถึงที่เก็บ Git สำหรับการควบคุมเวอร์ชัน, ไฟล์ Cargo.toml สำหรับการกำหนดค่าโครงการและการพึ่งพา, และไฟล์ main.rs พื้นฐานที่มีโปรแกรม 'Hello, world!' ซึ่งให้ทุกสิ่งที่จำเป็นในการเริ่มพัฒนาได้ทันที ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะ cargo new ไม่ได้สร้างชุดทดสอบ, ไฟล์เอกสาร, ไบนารีที่ปฏิบัติการได้, หรือสิ่งประดิษฐ์การสร้าง - มันเพียงแค่ตั้งค่าโครงสร้างโครงการเริ่มต้นเท่านั้น

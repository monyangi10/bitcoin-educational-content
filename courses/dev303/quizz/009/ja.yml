question: cargo new project_name` コマンドは、プロジェクト構造の一部として何を自動的に作成しますか？
answer: Gitリポジトリ、Cargo.tomlファイル、Hello Worldプログラムを含む基本的なmain.rsファイル
wrong_answers:
  - Cargo.toml設定ファイルのみと空のソースディレクトリ構造
  - 完全なテストスイート、ドキュメントファイル、本番環境設定
  - バイナリ実行ファイル、ターゲットディレクトリ、リリースビルド設定
explanation: |
  cargo new`コマンドは、バージョン管理のためのGitリポジトリ、プロジェクトの設定と依存関係のためのCargo.tomlファイル、そして'Hello, world!'プログラムを含む基本的なmain.rsファイルを含む包括的なプロジェクト基盤を作成します。これで、すぐに開発を開始するのに必要なものがすべて揃いました。なぜなら、cargo newは、テスト・スイート、ドキュメント・ファイル、実行可能なバイナリ、ビルド成果物を作成しないからです。
question: 프로젝트 구조의 일부로 `cargo new project_name` 명령이 자동으로 생성하는 항목은 무엇인가요?
answer: 헬로월드 프로그램의 Git 리포지토리, Cargo.toml 파일 및 기본 main.rs 파일
wrong_answers:
  - Cargo.toml 구성 파일과 빈 소스 디렉토리 구조만 있습니다
  - 완벽한 테스트 제품군, 문서 파일 및 프로덕션에 바로 사용할 수 있는 구성
  - 바이너리 실행 파일, 대상 디렉터리 및 릴리스 빌드 구성
explanation: |
  'cargo new` 명령은 버전 관리를 위한 Git 저장소, 프로젝트 구성 및 종속성을 위한 Cargo.toml 파일, 'Hello, world!' 프로그램이 포함된 기본 main.rs 파일 등 포괄적인 프로젝트 기반을 생성합니다. 이렇게 하면 즉시 개발을 시작하는 데 필요한 모든 것이 제공됩니다. 다른 옵션은 테스트 스위트, 문서 파일, 실행 가능한 바이너리 또는 빌드 아티팩트를 생성하지 않고 초기 프로젝트 구조만 설정하기 때문에 올바르지 않습니다.
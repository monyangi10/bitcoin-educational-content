question: Какво автоматично създава командата `cargo new project_name` като част от структурата на проекта?
answer: Хранилище Git, файл Cargo.toml и основен файл main.rs с програма Hello World
wrong_answers:
  - Само конфигурационен файл Cargo.toml и празна структура на директориите с източници
  - Пълен набор от тестове, файлове с документация и готова за производство конфигурация
  - Бинарни изпълними файлове, целева директория и конфигурация за създаване на версия
explanation: |
  Командата `cargo new` създава цялостна основа на проекта, включваща хранилище Git за контрол на версиите, файл Cargo.toml за конфигурация и зависимости на проекта и основен файл main.rs, съдържащ програма "Hello, world!". Това осигурява всичко необходимо за незабавно започване на разработката. Другите опции са неправилни, защото cargo new не създава тестови пакети, файлове с документация, изпълними двоични файлове или артефакти за изграждане - той само създава първоначалната структура на проекта.
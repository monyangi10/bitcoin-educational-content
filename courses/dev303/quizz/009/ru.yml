question: Что команда `cargo new project_name` автоматически создает в структуре проекта?
answer: Git-репозиторий, файл Cargo.toml и базовый файл main.rs с программой Hello World
wrong_answers:
  - Только файл конфигурации Cargo.toml и пустая структура исходных каталогов
  - Полный набор тестов, файлы документации и готовая к производству конфигурация
  - Двоичные исполняемые файлы, целевой каталог и конфигурация сборки релиза
explanation: |
  Команда `cargo new` создает полную основу проекта, включая репозиторий Git для контроля версий, файл Cargo.toml для конфигурации проекта и зависимостей, а также базовый файл main.rs, содержащий программу "Hello, world!". Это обеспечивает все необходимое для немедленного начала разработки. Другие варианты неверны, потому что cargo new не создает тестовые наборы, файлы документации, исполняемые двоичные файлы или артефакты сборки - он только устанавливает начальную структуру проекта.
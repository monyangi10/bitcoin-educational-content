question: "`cargo new project_name` कमांड प्रोजेक्ट संरचना के हिस्से के रूप में स्वचालित रूप से क्या बनाता है?"
answer: "एक Git रिपॉजिटरी, Cargo.toml फ़ाइल और Hello World प्रोग्राम वाली एक बेसिक main.rs फ़ाइल"
wrong_answers:
  - "केवल एक Cargo.toml कॉन्फ़िगरेशन फ़ाइल और खाली स्रोत निर्देशिका संरचना।"
  - "एक संपूर्ण परीक्षण सूट, दस्तावेज़ीकरण फ़ाइलें और उत्पादन के लिए तैयार कॉन्फ़िगरेशन"
  - "बाइनरी निष्पादन योग्य फ़ाइलें, लक्ष्य निर्देशिका और रिलीज़ बिल्ड कॉन्फ़िगरेशन"
explanation: |
  `cargo new` कमांड एक व्यापक प्रोजेक्ट आधार तैयार करता है जिसमें वर्ज़न कंट्रोल के लिए एक Git रिपॉज़िटरी, प्रोजेक्ट कॉन्फ़िगरेशन और निर्भरताओं के लिए एक Cargo.toml फ़ाइल और एक बुनियादी main.rs फ़ाइल शामिल होती है जिसमें 'Hello, world!' प्रोग्राम होता है। यह विकास तुरंत शुरू करने के लिए आवश्यक सब कुछ प्रदान करता है। अन्य विकल्प गलत हैं क्योंकि cargo new टेस्ट सूट, दस्तावेज़ीकरण फ़ाइलें, निष्पादन योग्य बाइनरी या बिल्ड आर्टिफैक्ट नहीं बनाता है - यह केवल प्रारंभिक प्रोजेक्ट संरचना स्थापित करता है।

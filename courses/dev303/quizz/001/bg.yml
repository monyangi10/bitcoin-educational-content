question: Каква е основната цел на Rustup в екосистемата за разработка на Rust?
answer: Цялостна система за управление на веригата от инструменти за инсталиране и управление на Rust
wrong_answers:
  - Мениджър на пакети за работа със зависимости в проекти на Rust
  - Усъвършенстван лайнър, който анализира кода и предоставя предложения за подобрения
  - Система за изграждане, която компилира програми Rust и управлява структурата на проекта
explanation: |
  Rustup е специално проектиран като система за управление на вериги от инструменти, която се занимава с инсталирането, актуализирането и управлението на самия Rust в различни проекти и платформи. Докато Cargo служи като мениджър на пакети и система за изграждане за проектите на Rust, а Clippy функционира като лайнър за анализ на кода, Rustup работи на по-високо ниво, като управлява цялата среда за разработка на Rust. Той позволява на разработчиците да инсталират различни версии на Rust, да управляват цели за компилиране за различни платформи и лесно да актуализират до нови версии на Rust с прости команди като "rustup update".
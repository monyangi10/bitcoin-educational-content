question: Rust 개발 생태계에서 러스텁의 주요 목적은 무엇인가요?
answer: Rust 설치 및 관리를 위한 종합적인 툴체인 관리 시스템
wrong_answers:
  - Rust 프로젝트에서 종속성을 처리하기 위한 패키지 관리자
  - 코드를 분석하고 개선 제안을 제공하는 고급 린터
  - Rust 프로그램을 컴파일하고 프로젝트 구조를 관리하는 빌드 시스템
explanation: |
  Rustup은 다양한 프로젝트와 플랫폼에서 Rust 자체의 설치, 업데이트, 관리를 처리하는 툴체인 관리 시스템으로 특별히 설계되었습니다. Cargo가 Rust 프로젝트의 패키지 관리자 및 빌드 시스템 역할을 하고 Clippy가 코드 분석을 위한 린터 역할을 한다면, Rustup은 전체 Rust 개발 환경을 관리함으로써 더 높은 수준에서 작동합니다. 이를 통해 개발자는 다양한 Rust 버전을 설치하고, 다양한 플랫폼의 컴파일 대상을 관리하고, 'rustup update'와 같은 간단한 명령으로 새로운 Rust 릴리스로 쉽게 업데이트할 수 있습니다.
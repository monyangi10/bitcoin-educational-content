question: Rust विकास पारिस्थितिकी तंत्र में Rustup का प्राथमिक उद्देश्य क्या है?
answer: Rust की स्थापना और प्रबंधन के लिए एक व्यापक टूलचेन प्रबंधन प्रणाली
wrong_answers:
  - Rust परियोजनाओं में निर्भरताओं को संभालने के लिए एक पैकेज प्रबंधक
  - एक उन्नत लिंटर जो कोड का विश्लेषण करता है और सुधार के सुझाव प्रदान करता है।
  - एक बिल्ड सिस्टम जो Rust प्रोग्रामों को संकलित करता है और परियोजना संरचना का प्रबंधन करता है।
explanation: |
  Rustup को विशेष रूप से एक टूलचेन प्रबंधन प्रणाली के रूप में डिज़ाइन किया गया है जो विभिन्न परियोजनाओं और प्लेटफार्मों पर Rust की स्थापना, अद्यतन और प्रबंधन का कार्य संभालती है। Cargo Rust परियोजनाओं के लिए पैकेज प्रबंधक और बिल्ड सिस्टम के रूप में कार्य करता है, और Clippy कोड विश्लेषण के लिए लिंटर के रूप में कार्य करता है, जबकि Rustup संपूर्ण Rust विकास परिवेश का प्रबंधन करके उच्च स्तर पर कार्य करता है। यह डेवलपर्स को विभिन्न Rust संस्करणों को स्थापित करने, विभिन्न प्लेटफार्मों के लिए संकलन लक्ष्यों का प्रबंधन करने और 'rustup update' जैसे सरल कमांड के साथ नए Rust रिलीज़ में आसानी से अपडेट करने की सुविधा देता है।
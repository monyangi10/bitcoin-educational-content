question: วัตถุประสงค์หลักของ Rustup ในระบบนิเวศการพัฒนา Rust คืออะไร?
answer: ระบบการจัดการเครื่องมือที่ครอบคลุมสำหรับการติดตั้งและจัดการ Rust
wrong_answers:
  - ตัวจัดการแพ็กเกจสำหรับจัดการการพึ่งพาในโครงการ Rust
  - ตัวตรวจสอบโค้ดขั้นสูงที่วิเคราะห์โค้ดและให้คำแนะนำในการปรับปรุง
  - ระบบการสร้างที่คอมไพล์โปรแกรม Rust และจัดการโครงสร้างโครงการ
explanation: |
  Rustup ได้รับการออกแบบมาโดยเฉพาะเป็นระบบจัดการเครื่องมือที่จัดการการติดตั้ง การอัปเดต และการจัดการ Rust เองในโครงการและแพลตฟอร์มต่างๆ ในขณะที่ Cargo ทำหน้าที่เป็นตัวจัดการแพ็คเกจและระบบสร้างสำหรับโครงการ Rust และ Clippy ทำหน้าที่เป็นตัวตรวจสอบโค้ด Rustup ทำงานในระดับที่สูงกว่าโดยจัดการสภาพแวดล้อมการพัฒนา Rust ทั้งหมด มันช่วยให้นักพัฒนาสามารถติดตั้งเวอร์ชัน Rust ที่แตกต่างกัน จัดการเป้าหมายการคอมไพล์สำหรับแพลตฟอร์มต่างๆ และอัปเดตเป็นรุ่นใหม่ของ Rust ได้อย่างง่ายดายด้วยคำสั่งง่ายๆ เช่น 'rustup update'
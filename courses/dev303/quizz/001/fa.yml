question: هدف اصلی Rustup در اکوسیستم توسعه Rust چیست؟
answer: یک سیستم مدیریت زنجیره ابزار جامع برای نصب و مدیریت Rust
wrong_answers:
  - یک مدیر بسته برای مدیریت وابستگی‌ها در پروژه‌های Rust
  - یک لینتر پیشرفته که کد را تحلیل کرده و پیشنهاداتی برای بهبود ارائه می‌دهد
  - یک سیستم ساخت که برنامه‌های Rust را کامپایل کرده و ساختار پروژه را مدیریت می‌کند
explanation: |
  Rustup به‌طور خاص به‌عنوان یک سیستم مدیریت ابزار زنجیره‌ای طراحی شده است که نصب، به‌روزرسانی و مدیریت خود Rust را در پروژه‌ها و پلتفرم‌های مختلف انجام می‌دهد. در حالی که Cargo به‌عنوان مدیر بسته و سیستم ساخت برای پروژه‌های Rust عمل می‌کند و Clippy به‌عنوان تحلیل‌گر کد فعالیت می‌کند، Rustup در سطح بالاتری با مدیریت کل محیط توسعه Rust عمل می‌کند. این ابزار به توسعه‌دهندگان اجازه می‌دهد تا نسخه‌های مختلف Rust را نصب کنند، اهداف کامپایل را برای پلتفرم‌های مختلف مدیریت کنند و به‌راحتی با دستورات ساده‌ای مانند 'rustup update' به نسخه‌های جدید Rust به‌روزرسانی کنند.
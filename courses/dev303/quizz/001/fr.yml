question: Quel est l'objectif principal de Rustup dans l'écosystème de développement Rust ?
answer: Un système complet de gestion de la chaîne d'outils pour l'installation et la gestion de Rust
wrong_answers:
  - Un gestionnaire de paquets pour gérer les dépendances dans les projets Rust
  - Un linter avancé qui analyse le code et fournit des suggestions d'amélioration
  - Un système de construction qui compile les programmes Rust et gère la structure du projet
explanation: |
  Rustup est spécifiquement conçu comme un système de gestion de la chaîne d'outils qui gère l'installation, la mise à jour et la gestion de Rust lui-même à travers différents projets et plates-formes. Alors que Cargo sert de gestionnaire de paquets et de système de construction pour les projets Rust, et que Clippy fonctionne comme un linter pour l'analyse du code, Rustup opère à un niveau plus élevé en gérant l'ensemble de l'environnement de développement Rust. Il permet aux développeurs d'installer différentes versions de Rust, de gérer les cibles de compilation pour différentes plateformes et de mettre à jour facilement les nouvelles versions de Rust à l'aide de commandes simples telles que "rustup update".
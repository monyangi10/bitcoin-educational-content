question: چه محدودیت بحرانی در اکوسیستم‌های اپلیکیشن موبایل توسط اپلیکیشن اصلی Breez آشکار شد که بر توسعه معماری SDK تأثیر گذاشت؟
answer: برنامه‌های موبایل نمی‌توانند به راحتی با یکدیگر ارتباط برقرار کنند، که این امر توسعه‌دهندگان را مجبور می‌کند تا تمامی ویژگی‌های Lightning را در برنامه‌های واحدی بسازند به جای اینکه زیرساخت Lightning را به اشتراک بگذارند.
wrong_answers:
  - دستگاه‌های همراه قدرت محاسباتی کافی برای اجرای گره‌های لایتنینگ به‌صورت قابل‌اعتماد را ندارند و نیاز به زیرساخت مبتنی بر ابر برای مدیریت محاسبات پیچیده مسیریابی دارند.
  - سیستم‌عامل‌های موبایل فرآیندهای پس‌زمینه را به شدت محدود می‌کنند و مانع از آن می‌شوند که نودهای Lightning اتصالات پایدار به شبکه را حفظ کنند.
  - فروشگاه‌های اپلیکیشن موبایل برنامه‌های مالی غیر حضانتی را ممنوع می‌کنند و توسعه‌دهندگان را مجبور می‌سازند تا برای دریافت تأییدیه فروشگاه اپلیکیشن، راه‌حل‌های حضانتی را پیاده‌سازی کنند.
explanation: |
  اپلیکیشن اصلی Breez نشان داد که اکوسیستم‌های موبایل ارتباط بین اپلیکیشنی را تسهیل نمی‌کنند و مانع از آن می‌شوند که اپلیکیشن‌های تخصصی از زیرساخت مشترک Lightning بهره‌برداری کنند. این محدودیت معماری، تمام قابلیت‌های Lightning را به اپلیکیشن‌های یکپارچه محدود کرد. گزینه‌های دیگر نادرست هستند: دستگاه‌های موبایل می‌توانند نودهای Lightning را اجرا کنند (همانطور که Breez ثابت کرد)، محدودیت‌های پس‌زمینه با معماری مناسب قابل مدیریت هستند و فروشگاه‌های اپلیکیشن به طور کلی اپلیکیشن‌های مالی غیر حضانتی را مجاز می‌دانند.
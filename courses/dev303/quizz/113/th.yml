question: ข้อจำกัดที่สำคัญของระบบนิเวศแอปมือถือที่แอป Breez ดั้งเดิมเปิดเผยซึ่งมีอิทธิพลต่อการพัฒนาโครงสร้าง SDK คืออะไร?
answer: แอปพลิเคชันมือถือไม่สามารถสื่อสารกันได้ง่าย ๆ ทำให้นักพัฒนาต้องสร้างฟีเจอร์ Lightning ทั้งหมดในแอปพลิเคชันเดียวแทนที่จะใช้โครงสร้างพื้นฐาน Lightning ร่วมกัน
wrong_answers:
  - อุปกรณ์เคลื่อนที่ขาดพลังการประมวลผลที่เพียงพอในการรันโหนด Lightning อย่างน่าเชื่อถือ จำเป็นต้องใช้อินฟราสตรัคเจอร์บนคลาวด์เพื่อจัดการการคำนวณการกำหนดเส้นทางที่ซับซ้อน
  - ระบบปฏิบัติการมือถือจำกัดกระบวนการเบื้องหลังอย่างเข้มงวดเกินไป ทำให้โหนด Lightning ไม่สามารถรักษาการเชื่อมต่อที่ต่อเนื่องกับเครือข่ายได้
  - ร้านค้าแอปบนมือถือห้ามแอปการเงินที่ไม่ใช่การดูแลบังคับให้นักพัฒนาต้องใช้โซลูชันการดูแลเพื่อให้ได้รับการอนุมัติจากร้านค้าแอป
explanation: |
  แอป Breez ดั้งเดิมแสดงให้เห็นว่าระบบนิเวศมือถือไม่เอื้อต่อการสื่อสารระหว่างแอป ทำให้แอปพลิเคชันเฉพาะทางไม่สามารถใช้โครงสร้างพื้นฐาน Lightning ร่วมกันได้ ข้อจำกัดทางสถาปัตยกรรมนี้บังคับให้ฟังก์ชันการทำงานของ Lightning ทั้งหมดอยู่ในแอปพลิเคชันแบบโมโนลิทิก ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: อุปกรณ์มือถือสามารถรันโหนด Lightning ได้ (ตามที่ Breez พิสูจน์แล้ว) ข้อจำกัดเบื้องหลังสามารถจัดการได้ด้วยสถาปัตยกรรมที่เหมาะสม และร้านค้าแอปโดยทั่วไปอนุญาตให้แอปการเงินที่ไม่ใช่การคุมขังได้
question: Какое критическое ограничение экосистем мобильных приложений выявило оригинальное приложение Breez, которое повлияло на разработку архитектуры SDK?
answer: Мобильные приложения не могут легко взаимодействовать друг с другом, что вынуждает разработчиков встраивать все функции Lightning в отдельные приложения, а не совместно использовать инфраструктуру Lightning
wrong_answers:
  - Мобильные устройства не обладают достаточной вычислительной мощностью для надежной работы узлов Lightning, поэтому для выполнения сложных расчетов маршрутизации требуется облачная инфраструктура
  - Мобильные операционные системы слишком жестко ограничивают фоновые процессы, не позволяя узлам Lightning поддерживать постоянные соединения с сетью
  - Магазины мобильных приложений запрещают финансовые приложения, не относящиеся к кастодиальным, что вынуждает разработчиков внедрять кастодиальные решения, чтобы получить одобрение магазина приложений
explanation: |
  Оригинальное приложение Breez продемонстрировало, что мобильные экосистемы не способствуют межприкладному взаимодействию, не позволяя специализированным приложениям использовать общую инфраструктуру Lightning. Это архитектурное ограничение вынудило весь функционал Lightning перевести в монолитные приложения. Остальные варианты неверны: мобильные устройства могут запускать узлы Lightning (что доказал Breez), фоновые ограничения преодолимы при правильной архитектуре, а магазины приложений обычно разрешают финансовые приложения, не связанные с опекой.
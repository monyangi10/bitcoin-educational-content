question: オリジナルのBreezアプリが明らかにした、SDKアーキテクチャの開発に影響を与えたモバイルアプリのエコシステムの重大な限界とは？
answer: モバイルアプリ同士が簡単に通信できないため、開発者はLightningインフラを共有するのではなく、すべてのLightning機能を単一のアプリケーションに構築せざるを得ない。
wrong_answers:
  - モバイル・デバイスには、ライトニング・ノードを確実に実行するための十分な計算能力がないため、複雑なルーティング計算を処理するためにクラウドベースのインフラストラクチャが必要となる。
  - モバイル・オペレーティング・システムは、バックグラウンド・プロセスを厳しく制限しすぎているため、ライトニング・ノードがネットワークへの持続的な接続を維持できない。
  - モバイルアプリストアは非保管型金融アプリを禁止しているため、開発者はアプリストアの承認を得るために保管型ソリューションを導入せざるを得ない。
explanation: |
  オリジナルのBreezアプリは、モバイルエコシステムがアプリ間通信を促進しないため、特殊なアプリケーションが共有Lightningインフラストラクチャを活用できないことを実証した。このアーキテクチャ上の制限により、すべてのLightning機能はモノリシックなアプリケーションに押し込められることになった。モバイルデバイスはLightningノードを実行でき（Breezが証明したように）、バックグラウンドの制限は適切なアーキテクチャで管理可能であり、アプリストアは一般的に非保護の金融アプリを許可している。
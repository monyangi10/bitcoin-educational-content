question: 最初的 Breez 應用程式揭示了行動應用程式生態系統的哪些關鍵限制，進而影響 SDK 架構的開發？
answer: 行動應用程式無法輕易相互溝通，迫使開發人員將所有 Lightning 功能建置在單一應用程式中，而非共用 Lightning 基礎架構
wrong_answers:
  - 行動裝置缺乏足夠的運算能力來可靠地執行 Lightning 節點，因此需要雲端基礎架構來處理複雜的路由計算
  - 行動作業系統過度限制背景程序，使 Lightning 節點無法維持與網路的持續連線
  - 行動應用程式商店禁止非保管型金融應用程式，迫使開發人員實施保管型解決方案，以獲得應用程式商店的認可
explanation: |
  最初的 Breez 應用程式顯示，行動生態系統無法促進應用程式間的溝通，使得專門的應用程式無法利用共用的 Lightning 基礎架構。這種架構上的限制迫使所有 Lightning 功能都變成單一的應用程式。其他選項都是不正確的：行動裝置可以執行 Lightning 節點 (正如 Breez 所證明的)，只要有適當的架構，背景限制是可以管理的，而且應用程式商店一般都允許非監管性的金融應用程式。
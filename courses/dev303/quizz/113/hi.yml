question: मूल Breez ऐप ने मोबाइल ऐप इकोसिस्टम की कौन सी महत्वपूर्ण सीमा को उजागर किया जिसने SDK आर्किटेक्चर के विकास को प्रभावित किया?
answer: मोबाइल ऐप्स आपस में आसानी से संवाद नहीं कर सकते, जिसके कारण डेवलपर्स को लाइटनिंग इंफ्रास्ट्रक्चर साझा करने के बजाय सभी लाइटनिंग सुविधाओं को एकल एप्लिकेशन में ही शामिल करना पड़ता है।
wrong_answers:
  - मोबाइल उपकरणों में लाइटनिंग नोड्स को विश्वसनीय रूप से चलाने के लिए पर्याप्त कम्प्यूटेशनल शक्ति नहीं होती है, इसलिए जटिल रूटिंग गणनाओं को संभालने के लिए क्लाउड-आधारित बुनियादी ढांचे की आवश्यकता होती है।
  - मोबाइल ऑपरेटिंग सिस्टम बैकग्राउंड प्रक्रियाओं को बहुत सख्ती से प्रतिबंधित करते हैं, जिससे लाइटनिंग नोड्स नेटवर्क से लगातार कनेक्शन बनाए रखने में असमर्थ हो जाते हैं।
  - मोबाइल ऐप स्टोर गैर-कस्टोडियल वित्तीय अनुप्रयोगों को प्रतिबंधित करते हैं, जिससे डेवलपर्स को ऐप स्टोर की स्वीकृति प्राप्त करने के लिए कस्टोडियल समाधान लागू करने के लिए मजबूर होना पड़ता है।
explanation: |
  मूल Breez ऐप ने यह प्रदर्शित किया कि मोबाइल इकोसिस्टम अंतर-ऐप संचार को सुगम नहीं बनाते, जिससे विशिष्ट एप्लिकेशन साझा लाइटनिंग इन्फ्रास्ट्रक्चर का लाभ नहीं उठा पाते। इस आर्किटेक्चरल सीमा ने लाइटनिंग की सभी कार्यक्षमताओं को मोनोलिथिक एप्लिकेशन में सीमित कर दिया। अन्य विकल्प गलत हैं: मोबाइल डिवाइस लाइटनिंग नोड्स चला सकते हैं (जैसा कि Breez ने सिद्ध किया), उचित आर्किटेक्चर के साथ बैकग्राउंड प्रतिबंधों को प्रबंधित किया जा सकता है, और ऐप स्टोर आमतौर पर गैर-कस्टोडियल वित्तीय ऐप्स की अनुमति देते हैं।
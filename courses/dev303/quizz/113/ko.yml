question: 원래 Breez 앱에서 드러난 모바일 앱 에코시스템의 어떤 중요한 한계가 SDK 아키텍처 개발에 영향을 미쳤나요?
answer: 모바일 앱은 서로 쉽게 통신할 수 없기 때문에 개발자는 Lightning 인프라를 공유하는 대신 모든 Lightning 기능을 단일 애플리케이션으로 구축해야 합니다
wrong_answers:
  - 모바일 디바이스에는 라이트닝 노드를 안정적으로 실행할 수 있는 충분한 연산 능력이 부족하여 복잡한 라우팅 계산을 처리할 수 있는 클라우드 기반 인프라가 필요합니다
  - 모바일 운영 체제는 백그라운드 프로세스를 지나치게 엄격하게 제한하여 라이트닝 노드가 네트워크에 대한 지속적인 연결을 유지하지 못하도록 합니다
  - 모바일 앱 스토어는 비수탁 금융 애플리케이션을 금지하고 있어 개발자는 앱 스토어 승인을 받기 위해 수탁 솔루션을 구현해야 합니다
explanation: |
  최초의 Breez 앱은 모바일 에코시스템이 앱 간 통신을 용이하게 하지 않아 특수 애플리케이션이 공유된 Lightning 인프라를 활용하지 못한다는 것을 보여주었습니다. 이러한 구조적 한계로 인해 모든 Lightning 기능이 모놀리식 애플리케이션에 강제 적용되었습니다. 다른 옵션은 올바르지 않습니다. 모바일 디바이스는 (Breez에서 입증된 것처럼) Lightning 노드를 실행할 수 있고, 백그라운드 제한은 적절한 아키텍처로 관리할 수 있으며, 앱 스토어는 일반적으로 비수탁 금융 앱을 허용합니다.
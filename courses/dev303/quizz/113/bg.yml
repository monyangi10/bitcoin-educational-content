question: Кое критично ограничение на екосистемите за мобилни приложения разкри оригиналното приложение Breez, което повлия на разработването на архитектурата на SDK?
answer: Мобилните приложения не могат лесно да комуникират помежду си, което принуждава разработчиците да изграждат всички функции на Lightning в отделни приложения, вместо да споделят инфраструктурата на Lightning
wrong_answers:
  - Мобилните устройства не разполагат с достатъчна изчислителна мощност, за да управляват надеждно възли за светкавици, което изисква инфраструктура, базирана на облак, за обработка на сложни изчисления за маршрутизация
  - Операционните системи за мобилни устройства ограничават фоновите процеси твърде строго, което пречи на възлите на Lightning да поддържат постоянни връзки с мрежата
  - Магазините за мобилни приложения забраняват финансови приложения, които не са с попечителски функции, което принуждава разработчиците да прилагат попечителски решения, за да получат одобрение от магазина за приложения
explanation: |
  Оригиналното приложение Breez показа, че мобилните екосистеми не улесняват комуникацията между приложенията, което пречи на специализираните приложения да използват споделена инфраструктура Lightning. Това архитектурно ограничение принуди всички функционалности на Lightning да бъдат включени в монолитни приложения. Другите варианти са некоректни: мобилните устройства могат да работят с възли на Lightning (както доказа Breez), фоновите ограничения са управляеми с подходяща архитектура, а магазините за приложения по принцип позволяват използването на финансови приложения, които не са свързани със системата.
question: Quelle limitation critique des écosystèmes d'applications mobiles l'application Breez originale a-t-elle révélée et qui a influencé le développement de l'architecture SDK ?
answer: Les applications mobiles ne peuvent pas communiquer facilement entre elles, ce qui oblige les développeurs à intégrer toutes les fonctionnalités de Lightning dans des applications uniques plutôt que de partager l'infrastructure de Lightning.
wrong_answers:
  - Les appareils mobiles ne disposent pas d'une puissance de calcul suffisante pour faire fonctionner les nœuds Lightning de manière fiable, ce qui nécessite une infrastructure basée dans le nuage pour gérer les calculs de routage complexes.
  - Les systèmes d'exploitation mobiles limitent trop sévèrement les processus d'arrière-plan, ce qui empêche les nœuds de foudre de maintenir des connexions persistantes avec le réseau.
  - Les magasins d'applications mobiles interdisent les applications financières non dépositaires, ce qui oblige les développeurs à mettre en œuvre des solutions dépositaires pour obtenir l'approbation du magasin d'applications.
explanation: |
  L'application Breez originale a démontré que les écosystèmes mobiles ne facilitent pas la communication entre les applications, ce qui empêche les applications spécialisées de tirer parti de l'infrastructure Lightning partagée. Cette limitation architecturale a contraint toutes les fonctionnalités de Lightning à être intégrées dans des applications monolithiques. Les autres options sont incorrectes : les appareils mobiles peuvent exécuter des nœuds Lightning (comme l'a prouvé Breez), les restrictions d'arrière-plan sont gérables avec une architecture appropriée, et les magasins d'applications autorisent généralement les applications financières non gardiennes.

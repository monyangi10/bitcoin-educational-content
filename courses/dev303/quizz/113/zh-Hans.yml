question: 最初的 Breez 应用程序揭示了移动应用程序生态系统的哪些关键局限性，从而影响了 SDK 架构的开发？
answer: 移动应用程序之间无法轻松通信，迫使开发人员将所有 Lightning 功能构建到单个应用程序中，而不是共享 Lightning 基础设施
wrong_answers:
  - 移动设备缺乏足够的计算能力来可靠运行照明节点，因此需要基于云的基础设施来处理复杂的路由计算
  - 移动操作系统对后台进程的限制过于严格，使 "闪电 "节点无法保持与网络的持久连接
  - 移动应用程序商店禁止非托管金融应用程序，迫使开发人员实施托管解决方案，以获得应用程序商店的批准
explanation: |
  最初的 Breez 应用程序表明，移动生态系统无法促进应用程序之间的通信，从而阻碍了专业应用程序利用共享的 Lightning 基础设施。这种架构上的限制迫使所有Lightning功能都变成了单体应用。其他选项都是错误的：移动设备可以运行 Lightning 节点（正如 Breez 所证明的那样），后台限制在适当的架构下是可以管理的，而且应用商店通常允许非托管金融应用。
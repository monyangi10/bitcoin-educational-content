question: Според системата за собственост на Rust колко собственици може да има една стойност в даден момент?
answer: Точно един собственик
wrong_answers:
  - Разрешени са множество собственици
  - Максимум двама собственици
  - Няма собственици, докато не се получи достъп
explanation: |
  Системата за собственост на Rust се основава на три основни правила, като първото е, че всяка стойност има точно един собственик във всеки един момент. Този принцип на единствен собственик е от решаващо значение за безопасността на паметта, тъй като не позволява на няколко части на програмата да се опитват да освободят една и съща памет или да променят данни едновременно. Наличието на множество собственици би довело до грешки, свързани с употребата след освобождаването, и състезания с данни, а липсата на собственици би означавала, че паметта никога не може да бъде правилно почистена.
question: طبقاً به سیستم مالکیت Rust، در هر لحظه چند مالک می‌تواند برای یک مقدار وجود داشته باشد؟
answer: دقیقاً یک مالک
wrong_answers:
  - اجازه داده می‌شود که چندین مالک وجود داشته باشد
  - حداکثر دو مالک
  - بدون مالک تا زمان دسترسی
explanation: |
  سیستم مالکیت Rust بر اساس سه قانون اساسی عمل می‌کند، که اولین آن این است که هر مقدار در هر لحظه دقیقاً یک مالک دارد. این اصل مالکیت واحد برای ایمنی حافظه بسیار مهم است زیرا از تلاش بخش‌های مختلف برنامه برای آزادسازی همان حافظه یا تغییر داده‌ها به‌طور همزمان جلوگیری می‌کند. داشتن چندین مالک منجر به باگ‌های استفاده پس از آزادسازی و رقابت داده‌ها می‌شود، در حالی که نداشتن مالک به این معناست که حافظه هرگز نمی‌تواند به‌طور صحیح پاکسازی شود.
question: Rustのオーナーシップ・システムによると、1つのバリューは何人のオーナーを持つことができるのですか？
answer: まさにワンオーナー
wrong_answers:
  - 複数所有可
  - 最大2オーナー
  - アクセスするまで所有者なし
explanation: |
  Rustのオーナーシップ・システムは、3つの基本的なルールに基づいて運用されている。この単一所有権の原則は、プログラムの複数の部分が同じメモリを解放しようとしたり、同時にデータを変更しようとしたりするのを防ぐため、メモリ安全性にとって極めて重要である。所有者が複数いると、use-after-freeバグやデータ・レースにつながるし、所有者がいないと、メモリが適切にクリーンアップされないことになる。
question: Rust의 소유권 시스템에 따르면, 특정 순간에 한 가치가 몇 명의 소유자를 가질 수 있나요?
answer: 정확히 한 명의 소유자
wrong_answers:
  - 여러 소유자 허용
  - 최대 두 명의 소유자
  - 액세스하기 전까지는 소유자 없음
explanation: |
  Rust의 소유권 시스템은 세 가지 기본 규칙에 따라 작동하는데, 첫 번째는 모든 값의 소유자가 특정 순간에 정확히 한 명이라는 것입니다. 이 단일 소유권 원칙은 프로그램의 여러 부분이 동시에 동일한 메모리를 해제하거나 데이터를 수정하려고 시도하는 것을 방지하기 때문에 메모리 안전에 매우 중요합니다. 소유자가 여러 명이면 사용 후 버그와 데이터 경합이 발생하고, 소유자가 없으면 메모리가 제대로 정리되지 않을 수 있습니다.
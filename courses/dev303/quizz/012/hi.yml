question: Rust की स्वामित्व प्रणाली के अनुसार, किसी भी समय किसी मूल्य के कितने मालिक हो सकते हैं?
answer: केवल एक ही मालिक
wrong_answers:
  - एक से अधिक मालिक होने की अनुमति है
  - अधिकतम दो मालिक
  - जब तक प्रवेश नहीं किया जाता तब तक कोई मालिक नहीं।
explanation: |
  Rust की स्वामित्व प्रणाली तीन मूलभूत नियमों पर आधारित है, जिनमें से पहला यह है कि किसी भी समय प्रत्येक मान का केवल एक ही स्वामी होता है। यह एकल स्वामित्व सिद्धांत मेमोरी सुरक्षा के लिए अत्यंत महत्वपूर्ण है क्योंकि यह प्रोग्राम के कई भागों को एक ही मेमोरी को मुक्त करने या डेटा को एक साथ संशोधित करने से रोकता है। एक से अधिक स्वामी होने से उपयोग-बाद-मुक्त बग और डेटा रेस जैसी समस्याएं उत्पन्न हो सकती हैं, जबकि कोई स्वामी न होने का अर्थ यह होगा कि मेमोरी को कभी भी ठीक से साफ नहीं किया जा सकेगा।
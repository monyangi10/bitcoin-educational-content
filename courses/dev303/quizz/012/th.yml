question: ตามระบบความเป็นเจ้าของของ Rust ค่าหนึ่งสามารถมีเจ้าของได้กี่คนในขณะใดขณะหนึ่ง?
answer: เจ้าของเพียงคนเดียว
wrong_answers:
  - อนุญาตให้มีเจ้าของหลายคน
  - เจ้าของไม่เกินสองคน
  - ไม่มีเจ้าของจนกว่าจะเข้าถึง
explanation: |
  ระบบการเป็นเจ้าของของ Rust ทำงานบนกฎพื้นฐานสามข้อ โดยข้อแรกคือทุกค่าจะมีเจ้าของเพียงคนเดียวในแต่ละช่วงเวลา หลักการการเป็นเจ้าของเพียงคนเดียวนี้มีความสำคัญต่อความปลอดภัยของหน่วยความจำเพราะมันป้องกันไม่ให้หลายส่วนของโปรแกรมพยายามที่จะปลดปล่อยหน่วยความจำเดียวกันหรือแก้ไขข้อมูลพร้อมกัน การมีเจ้าของหลายคนจะนำไปสู่ข้อผิดพลาดการใช้หลังจากปลดปล่อยและการแข่งข้อมูล ในขณะที่การไม่มีเจ้าของจะหมายความว่าหน่วยความจำไม่สามารถถูกทำความสะอาดได้อย่างถูกต้อง
question: Согласно системе владения Rust, сколько владельцев может быть у ценности в каждый момент времени?
answer: Ровно один владелец
wrong_answers:
  - Допускается несколько владельцев
  - Не более двух владельцев
  - Нет владельцев, пока нет доступа
explanation: |
  Система владения Rust основана на трех фундаментальных правилах, первое из которых заключается в том, что каждое значение имеет ровно одного владельца в любой момент времени. Принцип единственного владельца очень важен для безопасности памяти, поскольку он не позволяет нескольким частям программы одновременно пытаться освободить одну и ту же память или модифицировать данные. Наличие нескольких владельцев привело бы к ошибкам использования после освобождения и гонкам данных, а отсутствие владельцев означало бы, что память никогда не может быть очищена должным образом.
question: تفاوت اساسی بین رویکرد یکپارچه‌سازی بلاک‌چین LDK و نودهای سنتی لایتنینگ در محیط‌های با منابع محدود چیست؟
answer: LDK یک انتزاع مبتنی بر فیلتر ارائه می‌دهد که به برنامه‌ها اجازه می‌دهد تا از طریق منابع داده سبک مانند سرورهای Electrum نظارت را پیاده‌سازی کنند.
wrong_answers:
  - ‏LDK نیاز به همگام‌سازی کامل بلاک‌چین دارد اما از طریق فشرده‌سازی سرآیندهای بلاک و مکانیزم‌های هرس تراکنش، بهینه‌سازی ذخیره‌سازی را انجام می‌دهد.
  - LDK یک پروتکل بلاکچین سفارشی را پیاده‌سازی می‌کند که با نگهداری تنها تراکنش‌های مرتبط با کانال در حافظه، پهنای باند را کاهش می‌دهد.
  - LDK از یک مکانیزم اجماع ترکیبی استفاده می‌کند که تنها تراکنش‌های مربوط به Lightning را تأیید می‌کند و عملیات استاندارد Bitcoin را نادیده می‌گیرد.
explanation: |
  ادغام بلاک‌چین LDK با دو حالت طراحی شده است: حالت بلاک کامل برای محیط‌های غنی از منابع و حالت مبتنی بر فیلتر برای محیط‌های محدود. رویکرد فیلتر کردن به LDK اجازه می‌دهد تا نیازهای نظارتی خود را از طریق رابط‌های انتزاعی ارتباط دهد و نظارت بر تراکنش‌های خاص، UTXOها یا الگوهای اسکریپت را درخواست کند. سپس برنامه‌ها می‌توانند این نظارت را با استفاده از منابع سبک مانند سرورهای Electrum یا کاوشگرهای بلاک پیاده‌سازی کنند، که به طور چشمگیری نیازهای پهنای باند و ذخیره‌سازی را در مقایسه با همگام‌سازی کامل بلاک‌چین کاهش می‌دهد. این انتزاع به کیف‌پول‌های موبایل و برنامه‌های وب اجازه می‌دهد تا عملکرد لایتنینگ را بدون سربار منابعی که نودهای سنتی لایتنینگ نیاز دارند، حفظ کنند.
question: 在资源有限的环境中，LDK 的区块链集成方法与传统的 Lightning 节点有什么根本区别？
answer: LDK 提供了一个基于过滤的抽象概念，允许应用程序通过 Electrum 服务器等轻量级数据源实施监控
wrong_answers:
  - LDK 需要完全的区块链同步，但通过压缩区块头和交易剪枝机制优化存储
  - LDK 实现了一种定制的区块链协议，该协议只在内存中保留与通道相关的交易，从而降低了带宽
  - LDK 采用混合共识机制，只验证与闪电相关的交易，而忽略标准的 Bitcoin 操作
explanation: |
  LDK 的区块链集成设计有两种模式：适用于资源丰富环境的全块模式和适用于受限环境的基于过滤的模式。过滤方法允许 LDK 通过抽象接口传达其监控需求，请求对特定交易、UTXO 或脚本模式进行监控。然后，应用程序就可以使用 Electrum 服务器或区块探索器等轻量级源来实现监控，与完全区块链同步相比，大大降低了带宽和存储要求。这种抽象化使移动钱包和网络应用能够维持闪电功能，而无需像传统闪电节点那样需要资源开销。
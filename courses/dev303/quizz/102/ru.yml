question: В чем принципиальное отличие подхода LDK к интеграции блокчейна от традиционных узлов Lightning в условиях ограниченных ресурсов?
answer: LDK предоставляет абстракцию на основе фильтрации, которая позволяет приложениям осуществлять мониторинг через легкие источники данных, такие как серверы Electrum
wrong_answers:
  - LDK требует полной синхронизации блокчейна, но оптимизирует хранение за счет сжатых заголовков блоков и механизмов обрезки транзакций
  - LDK реализует собственный протокол блокчейна, который снижает пропускную способность, сохраняя в памяти только транзакции, имеющие отношение к каналу
  - LDK использует гибридный механизм консенсуса, который проверяет только транзакции, связанные с Молнией, игнорируя стандартные операции Bitcoin
explanation: |
  Интеграция с блокчейном в LDK реализована в двух режимах: режим полного блокчейна для сред с большим количеством ресурсов и режим фильтрации для ограниченных сред. Подход на основе фильтрации позволяет LDK сообщать о своих потребностях в мониторинге через абстрактные интерфейсы, запрашивая наблюдение за конкретными транзакциями, UTXO или шаблонами сценариев. Приложения могут реализовать этот мониторинг с помощью легких источников, таких как серверы Electrum или блокчейн, что значительно снижает требования к пропускной способности и хранению данных по сравнению с полной синхронизацией блокчейна. Такая абстракция позволяет мобильным кошелькам и веб-приложениям поддерживать функциональность Lightning без накладных расходов ресурсов, которые требуют традиционные узлы Lightning.
question: Каква е основната разлика между подхода на LDK за интегриране на блокчейн и традиционните Lightning възли по отношение на средите с ограничени ресурси?
answer: LDK предоставя абстракция, базирана на филтриране, която позволява на приложенията да осъществяват мониторинг чрез леки източници на данни като сървъри Electrum
wrong_answers:
  - LDK изисква пълна синхронизация на блокчейн, но оптимизира съхранението чрез компресирани заглавия на блокове и механизми за изрязване на транзакции
  - LDK прилага персонализиран протокол за блокчейн, който намалява честотната лента, като поддържа в паметта само транзакции, свързани с канала
  - LDK използва хибриден механизъм за консенсус, който потвърждава само транзакции, свързани с Lightning, като игнорира стандартните операции на Bitcoin
explanation: |
  Интеграцията на блокчейн на LDK е проектирана с два режима: режим на пълен блок за среди, богати на ресурси, и режим на базата на филтриране за ограничени среди. Подходът на филтриране позволява на LDK да съобщава нуждите си от наблюдение чрез абстрактни интерфейси, като изисква наблюдение на конкретни транзакции, UTXO или модели на скриптове. След това приложенията могат да реализират това наблюдение, използвайки леки източници като Electrum сървъри или блокчейн експлоратори, като драстично намаляват изискванията за широчина на честотната лента и съхранение в сравнение с пълната синхронизация на блокчейн. Тази абстракция дава възможност на мобилните портфейли и уеб приложенията да поддържат функционалността на Lightning без натоварването на ресурсите, което изискват традиционните Lightning възли.
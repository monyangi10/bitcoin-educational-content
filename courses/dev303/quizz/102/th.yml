question: ความแตกต่างพื้นฐานระหว่างแนวทางการบูรณาการบล็อกเชนของ LDK กับโหนด Lightning แบบดั้งเดิมเกี่ยวกับสภาพแวดล้อมที่มีข้อจำกัดด้านทรัพยากรคืออะไร?
answer: LDK ให้การยกเว้นตามการกรองที่ช่วยให้แอปพลิเคชันสามารถดำเนินการตรวจสอบผ่านแหล่งข้อมูลที่มีน้ำหนักเบา เช่น เซิร์ฟเวอร์ Electrum
wrong_answers:
  - LDK ต้องการการซิงโครไนซ์บล็อกเชนแบบเต็มรูปแบบแต่เพิ่มประสิทธิภาพการจัดเก็บข้อมูลผ่านกลไกการบีบอัดส่วนหัวของบล็อกและการตัดแต่งธุรกรรม
  - LDK ใช้โปรโตคอลบล็อกเชนที่กำหนดเองซึ่งลดแบนด์วิดท์โดยการเก็บเฉพาะธุรกรรมที่เกี่ยวข้องกับช่องทางในหน่วยความจำ
  - LDK ใช้กลไกฉันทามติแบบไฮบริดที่ตรวจสอบเฉพาะธุรกรรมที่เกี่ยวข้องกับ Lightning ในขณะที่ละเว้นการดำเนินการ Bitcoin มาตรฐาน
explanation: |
  การผสานรวมบล็อกเชนของ LDK ถูกออกแบบด้วยสองโหมด: โหมดบล็อกเต็มสำหรับสภาพแวดล้อมที่มีทรัพยากรสูง และโหมดที่ใช้การกรองสำหรับสภาพแวดล้อมที่มีข้อจำกัด วิธีการกรองนี้ช่วยให้ LDK สามารถสื่อสารความต้องการในการตรวจสอบผ่านอินเทอร์เฟซแบบนามธรรม โดยขอการเฝ้าระวังธุรกรรมเฉพาะ, UTXOs, หรือรูปแบบสคริปต์ แอปพลิเคชันสามารถดำเนินการตรวจสอบนี้โดยใช้แหล่งข้อมูลที่มีน้ำหนักเบา เช่น เซิร์ฟเวอร์ Electrum หรือ block explorers ซึ่งลดความต้องการแบนด์วิดท์และการจัดเก็บข้อมูลอย่างมากเมื่อเทียบกับการซิงโครไนซ์บล็อกเชนเต็มรูปแบบ การนามธรรมนี้ช่วยให้กระเป๋าเงินมือถือและแอปพลิเคชันเว็บสามารถรักษาฟังก์ชันการทำงานของ Lightning โดยไม่ต้องมีภาระทรัพยากรที่โหนด Lightning แบบดั้งเดิมต้องการ
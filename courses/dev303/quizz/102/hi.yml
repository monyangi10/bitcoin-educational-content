question: संसाधन-सीमित वातावरणों के संबंध में LDK के ब्लॉकचेन एकीकरण दृष्टिकोण और पारंपरिक लाइटनिंग नोड्स के बीच मूलभूत अंतर क्या है?
answer: LDK एक फ़िल्टरिंग-आधारित एब्स्ट्रैक्शन प्रदान करता है जो अनुप्रयोगों को Electrum सर्वर जैसे हल्के डेटा स्रोतों के माध्यम से निगरानी लागू करने की अनुमति देता है।
wrong_answers:
  - LDK को पूर्ण ब्लॉकचेन सिंक्रोनाइज़ेशन की आवश्यकता होती है, लेकिन यह संपीड़ित ब्लॉक हेडर और लेनदेन छंटाई तंत्र के माध्यम से भंडारण को अनुकूलित करता है।
  - LDK एक कस्टम ब्लॉकचेन प्रोटोकॉल लागू करता है जो मेमोरी में केवल चैनल-संबंधित लेनदेन को बनाए रखकर बैंडविड्थ को कम करता है।
  - LDK एक हाइब्रिड सहमति तंत्र का उपयोग करता है जो मानक Bitcoin संचालन को अनदेखा करते हुए केवल लाइटनिंग-संबंधित लेनदेन को ही मान्य करता है।
explanation: |
  LDK का ब्लॉकचेन एकीकरण दो मोड में डिज़ाइन किया गया है: संसाधन-समृद्ध वातावरण के लिए पूर्ण ब्लॉक मोड और सीमित संसाधनों वाले वातावरण के लिए फ़िल्टरिंग-आधारित मोड। फ़िल्टरिंग दृष्टिकोण LDK को अमूर्त इंटरफ़ेस के माध्यम से अपनी निगरानी आवश्यकताओं को संप्रेषित करने की अनुमति देता है, जिसमें विशिष्ट लेनदेन, UTXO या स्क्रिप्ट पैटर्न की निगरानी का अनुरोध किया जाता है। इसके बाद एप्लिकेशन Electrum सर्वर या ब्लॉक एक्सप्लोरर जैसे हल्के स्रोतों का उपयोग करके इस निगरानी को लागू कर सकते हैं, जिससे पूर्ण ब्लॉकचेन सिंक्रोनाइज़ेशन की तुलना में बैंडविड्थ और स्टोरेज की आवश्यकताएं काफी कम हो जाती हैं। यह अमूर्तता मोबाइल वॉलेट और वेब एप्लिकेशन को पारंपरिक लाइटनिंग नोड्स द्वारा आवश्यक संसाधन ओवरहेड के बिना लाइटनिंग कार्यक्षमता बनाए रखने में सक्षम बनाती है।
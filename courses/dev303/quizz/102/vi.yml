question: Sự khác biệt cơ bản giữa phương pháp tích hợp blockchain của LDK và các nút Lightning truyền thống trong môi trường hạn chế tài nguyên là gì?
answer: LDK cung cấp một lớp trừu tượng dựa trên bộ lọc cho phép các ứng dụng triển khai giám sát thông qua các nguồn dữ liệu nhẹ như máy chủ Electrum.
wrong_answers:
  - LDK yêu cầu đồng bộ hóa toàn bộ chuỗi khối nhưng tối ưu hóa việc lưu trữ thông qua các tiêu đề khối được nén và cơ chế cắt tỉa giao dịch.
  - LDK triển khai một giao thức blockchain tùy chỉnh giúp giảm băng thông bằng cách chỉ lưu trữ các giao dịch liên quan đến kênh trong bộ nhớ.
  - LDK sử dụng cơ chế đồng thuận lai, chỉ xác thực các giao dịch liên quan đến Lightning trong khi bỏ qua các hoạt động Bitcoin tiêu chuẩn.
explanation: |
  Việc tích hợp blockchain của LDK được thiết kế với hai chế độ: chế độ khối đầy đủ cho môi trường giàu tài nguyên và chế độ dựa trên lọc cho môi trường hạn chế. Phương pháp lọc cho phép LDK truyền đạt nhu cầu giám sát của mình thông qua các giao diện trừu tượng, yêu cầu giám sát các giao dịch, UTXO hoặc mẫu kịch bản cụ thể. Sau đó, các ứng dụng có thể triển khai việc giám sát này bằng cách sử dụng các nguồn nhẹ như máy chủ Electrum hoặc trình khám phá khối, giảm đáng kể yêu cầu về băng thông và lưu trữ so với việc đồng bộ hóa blockchain đầy đủ. Sự trừu tượng này cho phép ví di động và ứng dụng web duy trì chức năng Lightning mà không cần đến chi phí tài nguyên mà các nút Lightning truyền thống yêu cầu.
question: 關於資源有限的環境，LDK 的區塊鏈整合方式與傳統 Lightning 節點有什麼根本性的差異？
answer: LDK 提供以過濾為基礎的抽象，可讓應用程式透過 Electrum 伺服器等輕量級資料來源實施監控
wrong_answers:
  - LDK 需要完整的區塊鏈同步，但透過壓縮區塊標頭和交易剪枝機制優化儲存。
  - LDK 實作自訂區塊鏈通訊協定，只在記憶體中維護通道相關的交易，以降低頻寬。
  - LDK 使用混合共識機制，僅驗證與 Lightning 相關的交易，而忽略標準 Bitcoin 作業
explanation: |
  LDK 的區塊鏈整合設計有兩種模式：適用於資源豐富環境的完整區塊模式，以及適用於受限環境的過濾式模式。過濾方式允許 LDK 透過抽象介面傳達其監控需求，要求監控特定交易、UTXO 或腳本模式。應用程式可以使用 Electrum 伺服器或區塊探索器等輕量級來源實現此監控，與完整的區塊鏈同步化相比，可大幅降低頻寬和儲存需求。這種抽象功能可讓行動錢包和 Web 應用程式維持 Lightning 功能，而無需傳統 Lightning 節點所需的資源開銷。
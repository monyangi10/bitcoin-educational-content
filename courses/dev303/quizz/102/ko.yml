question: 리소스가 제한된 환경과 관련하여 LDK의 블록체인 통합 접근 방식과 기존 라이트닝 노드의 근본적인 차이점은 무엇인가요?
answer: LDK는 애플리케이션이 Electrum 서버와 같은 경량 데이터 소스를 통해 모니터링을 구현할 수 있도록 필터링 기반 추상화를 제공합니다
wrong_answers:
  - LDK는 전체 블록체인 동기화가 필요하지만 압축된 블록 헤더와 트랜잭션 가지치기 메커니즘을 통해 스토리지를 최적화합니다
  - LDK는 채널 관련 트랜잭션만 메모리에 유지하여 대역폭을 줄이는 맞춤형 블록체인 프로토콜을 구현합니다
  - LDK는 표준 Bitcoin 연산을 무시하고 라이트닝 관련 트랜잭션만 검증하는 하이브리드 합의 메커니즘을 사용합니다
explanation: |
  LDK의 블록체인 통합은 리소스가 풍부한 환경을 위한 전체 블록 모드와 제한된 환경을 위한 필터링 기반 모드의 두 가지 모드로 설계되었습니다. 필터링 방식을 사용하면 LDK가 추상적인 인터페이스를 통해 모니터링 요구 사항을 전달하여 특정 트랜잭션, UTXO 또는 스크립트 패턴에 대한 감시를 요청할 수 있습니다. 그런 다음 애플리케이션은 Electrum 서버나 블록 탐색기와 같은 경량 소스를 사용하여 이러한 모니터링을 구현할 수 있으므로 전체 블록체인 동기화에 비해 대역폭과 스토리지 요구 사항을 크게 줄일 수 있습니다. 이러한 추상화를 통해 모바일 지갑과 웹 애플리케이션은 기존 라이트닝 노드에 필요한 리소스 오버헤드 없이도 라이트닝 기능을 유지할 수 있습니다.
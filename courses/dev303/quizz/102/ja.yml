question: リソースに制約のある環境に関して、LDKのブロックチェーン統合アプローチと従来のLightningノードとの根本的な違いは何ですか？
answer: LDKはフィルタリング・ベースの抽象化を提供し、アプリケーションはElectrumサーバーのような軽量なデータ・ソースを通してモニタリングを実装することができます。
wrong_answers:
  - LDKはブロックチェーンの完全な同期を必要とするが、圧縮されたブロックヘッダとトランザクションの刈り込みメカニズムによってストレージを最適化する。
  - LDKはカスタム・ブロックチェーン・プロトコルを実装し、チャネルに関連するトランザクションのみをメモリに保持することで帯域幅を削減する
  - LDKは、標準的なBitcoinオペレーションを無視し、ライトニング関連のトランザクションのみを検証するハイブリッド・コンセンサス・メカニズムを採用している。
explanation: |
  LDKのブロックチェーン統合は、リソースが豊富な環境向けのフルブロックモードと、制約のある環境向けのフィルタリングベースモードの2つのモードで設計されている。フィルタリング・アプローチにより、LDKは抽象的なインターフェースを介して監視の必要性を伝え、特定のトランザクション、UTXO、またはスクリプト・パターンの監視を要求することができます。アプリケーションはElectrumサーバーやブロックエクスプローラーのような軽量なソースを使用してこの監視を実装することができ、完全なブロックチェーンの同期と比較して帯域幅とストレージの要件を劇的に削減することができます。この抽象化により、モバイルウォレットやウェブアプリケーションは、従来のLightningノードが必要とするリソースのオーバーヘッドなしに、Lightningの機能を維持することができます。
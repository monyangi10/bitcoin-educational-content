question: Каково основное назначение оператора Rust с вопросительным знаком (?) при использовании с типами Result?
answer: Чтобы автоматически разворачивать успешные значения и сразу возвращать ошибки из текущей функции
wrong_answers:
  - Преобразование всех типов Result в типы Option для упрощения работы с нулями
  - Для автоматической паники с пользовательским сообщением при возникновении любой ошибки
  - Чтобы обернуть успешные ценности в дополнительный слой Result для дополнительной безопасности
explanation: |
  Оператор вопросительного знака (?) разработан специально для распространения ошибок в Rust. Применяясь к результату, он извлекает значение успеха, если операция прошла успешно, позволяя коду продолжить работу с этим значением. Однако если произошла ошибка, оператор ? немедленно возвращает эту ошибку из текущей функции, эффективно распространяя ее вверх по стеку вызовов. Это устраняет необходимость в многословных выражениях соответствия, сохраняя явную семантику обработки ошибок. Оператор может использоваться только в функциях, возвращающих типы Result, что обеспечивает правильную схему распространения ошибок.
question: 在与结果类型一起使用时，Rust 的问号运算符 (?) 的主要用途是什么？
answer: 从当前函数中自动解包成功值并立即返回错误值
wrong_answers:
  - 将所有结果类型转换为选项类型，以便于处理空值
  - 当出现任何错误时，自动通过自定义信息进行紧急处理
  - 将成功值包裹在额外的结果层中，以提高安全性
explanation: |
  问号运算符（?）是专门为 Rust 中的错误传播而设计的。当应用于结果时，如果操作成功，它将提取成功值，允许代码继续使用该值。但是，如果出现错误，问号操作符会立即从当前函数中返回该错误，从而有效地将错误向上传播到调用堆栈。这样就无需使用冗长的匹配表达式，同时还能保持明确的错误处理语义。操作符只能在返回结果类型的函数中使用，以确保正确的错误传播模式。
question: 결과 유형과 함께 사용할 때 Rust의 물음표 연산자(?)의 주요 용도는 무엇인가요?
answer: 현재 함수에서 성공한 값의 래핑을 자동으로 해제하고 오류를 즉시 반환하려면 다음과 같이 하세요
wrong_answers:
  - 널 처리를 쉽게 하기 위해 모든 결과 유형을 옵션 유형으로 변환하려면 다음과 같이 하세요
  - 오류가 발생하면 자동으로 사용자 지정 메시지로 패닉에 빠지게 하려면 다음과 같이 하세요
  - 안전성을 높이기 위해 추가 결과 레이어에 성공 값을 래핑하려면 다음과 같이 하세요
explanation: |
  물음표 연산자(?)는 Rust에서 오류 전파를 위해 특별히 설계되었습니다. 이 연산자를 결과에 적용하면 연산이 성공하면 성공 값을 추출하여 코드가 해당 값으로 계속 진행할 수 있도록 합니다. 그러나 오류가 발생하면 ? 연산자는 즉시 현재 함수에서 해당 오류를 반환하여 호출 스택 위로 효과적으로 전파합니다. 따라서 명시적인 오류 처리 시맨틱을 유지하면서 자세한 일치 표현식을 사용할 필요가 없습니다. 이 연산자는 결과 유형을 반환하는 함수에서만 사용할 수 있으므로 적절한 오류 전파 패턴을 보장합니다.
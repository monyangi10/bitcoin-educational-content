question: Rustのクエスチョンマーク演算子（？
answer: 現在の関数から自動的に成功した値をアンラップし、エラーを即座に返すには
wrong_answers:
  - すべての結果型を Option 型に変換し、NULL の取り扱いを容易にする。
  - エラー発生時にカスタムメッセージで自動的にパニックを起こすには
  - 成功した値をさらに安全なResultレイヤーで包むには
explanation: |
  クエスチョンマーク演算子(?)は、Rustにおけるエラー伝播のために特別に設計された。Resultに適用されると、操作が成功した場合は成功値を取り出し、その値でコードを続行できるようにする。しかし、エラーが発生した場合、?演算子はそのエラーを現在の関数から即座に返し、効果的にコールスタックを伝搬します。これにより、明示的なエラー処理のセマンティクスを維持したまま、冗長なマッチ式を使用する必要がなくなります。この演算子は、Result型を返す関数でのみ使用でき、適切なエラー伝播パターンを保証します。
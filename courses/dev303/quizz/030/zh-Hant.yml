question: 當使用結果類型時，Rust 的問號運算符號 (?) 的主要目的是什麼？
answer: 自動解除成功值的包裝，並立即從目前的函式傳回錯誤值
wrong_answers:
  - 將所有結果類型轉換成 Option 類型，以便更容易處理 null
  - 當發生任何錯誤時，自動以自訂訊息恐慌
  - 將成功的值包覆在額外的結果層中，以增加安全性
explanation: |
  問號運算符 (?) 是專為 Rust 中的錯誤傳播而設計的。當應用於結果時，如果操作成功，它會提取成功值，允許程式碼繼續使用該值。但是，如果發生錯誤，? 運算符號會立即從目前的函式回傳該錯誤，有效地將它傳送到呼叫堆疊。這樣就不需要冗長的匹配表達式，同時保持了明確的錯誤處理語意。運算子只能用於回傳結果類型的函數中，以確保正確的錯誤傳播模式。
question: Каква е основната цел на оператора на въпросителния знак (?) в Rust, когато се използва с типове резултати?
answer: Автоматично разопаковане на успешни стойности и незабавно връщане на грешки от текущата функция
wrong_answers:
  - Конвертиране на всички типове резултати в типове опции за по-лесна работа с нули
  - Автоматична паника с персонализирано съобщение при възникване на грешка
  - Обвиване на успешните стойности в допълнителен слой Result за по-голяма сигурност
explanation: |
  Операторът с въпросителен знак (?) е създаден специално за разпространение на грешки в Rust. Когато се прилага към Резултат, той извлича стойността на успеха, ако операцията е успешна, което позволява на кода да продължи с тази стойност. Ако обаче е възникнала грешка, операторът ? незабавно връща тази грешка от текущата функция, като ефективно я разпространява нагоре по стека на повикванията. Това премахва необходимостта от многословни изрази за съвпадение, като същевременно запазва ясната семантика за обработка на грешки. Операторът може да се използва само във функции, които връщат типове Резултат, като по този начин се осигуряват правилни модели за разпространение на грешки.
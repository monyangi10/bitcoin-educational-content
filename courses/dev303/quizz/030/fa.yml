question: هدف اصلی عملگر علامت سوال Rust (?) هنگام استفاده با انواع Result چیست؟
answer: برای باز کردن خودکار مقادیر موفق و بازگرداندن خطاها بلافاصله از تابع فعلی
wrong_answers:
  - برای تبدیل همه انواع Result به انواع Option برای مدیریت ساده‌تر null
  - برای ایجاد وحشت خودکار با یک پیام سفارشی هنگامی که هر خطایی رخ می‌دهد
  - برای پیچیدن مقادیر موفقیت‌آمیز در یک لایه Result اضافی برای ایمنی بیشتر
explanation: |
  عملگر علامت سوال (?) به طور خاص برای انتشار خطا در Rust طراحی شده است. هنگامی که به یک Result اعمال می‌شود، در صورت موفقیت عملیات، مقدار موفقیت را استخراج می‌کند و به کد اجازه می‌دهد با آن مقدار ادامه دهد. با این حال، اگر خطایی رخ دهد، عملگر ? بلافاصله آن خطا را از تابع فعلی بازمی‌گرداند و به طور مؤثر آن را در پشته فراخوانی منتشر می‌کند. این امر نیاز به عبارات match طولانی را از بین می‌برد و در عین حال معنای صریح مدیریت خطا را حفظ می‌کند. این عملگر تنها در توابعی که نوع Result را بازمی‌گردانند قابل استفاده است و الگوهای صحیح انتشار خطا را تضمین می‌کند.
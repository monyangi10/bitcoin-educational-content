question: रिजल्ट टाइप के साथ उपयोग किए जाने पर Rust के प्रश्न चिह्न ऑपरेटर (?) का प्राथमिक उद्देश्य क्या है?
answer: सफल मानों को स्वचालित रूप से अनरैप करने और वर्तमान फ़ंक्शन से त्रुटियों को तुरंत वापस करने के लिए
wrong_answers:
  - नल हैंडलिंग को आसान बनाने के लिए सभी रिजल्ट प्रकारों को ऑप्शन प्रकारों में परिवर्तित करना।
  - किसी भी त्रुटि के होने पर कस्टम संदेश के साथ स्वचालित रूप से पैनिक उत्पन्न करने के लिए
  - अतिरिक्त सुरक्षा के लिए सफल मानों को एक अतिरिक्त परिणाम परत में लपेटना।
explanation: |
  प्रश्न चिह्न ऑपरेटर (?) को विशेष रूप से Rust में त्रुटि प्रसार के लिए डिज़ाइन किया गया है। जब इसे किसी परिणाम पर लागू किया जाता है, तो यह सफल होने पर सफलता मान निकालता है, जिससे कोड उस मान के साथ आगे बढ़ सकता है। हालांकि, यदि कोई त्रुटि होती है, तो ? ऑपरेटर वर्तमान फ़ंक्शन से तुरंत उस त्रुटि को लौटा देता है, जिससे वह कॉल स्टैक में ऊपर तक पहुंच जाती है। इससे विस्तृत मिलान अभिव्यक्तियों की आवश्यकता समाप्त हो जाती है, साथ ही स्पष्ट त्रुटि प्रबंधन के नियम भी बने रहते हैं। इस ऑपरेटर का उपयोग केवल उन फ़ंक्शन में किया जा सकता है जो परिणाम प्रकार लौटाते हैं, जिससे त्रुटि प्रसार के उचित पैटर्न सुनिश्चित होते हैं।
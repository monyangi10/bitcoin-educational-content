question: วัตถุประสงค์หลักของเครื่องหมายคำถาม (?) ของ Rust เมื่อใช้กับประเภท Result คืออะไร?
answer: ในการแกะค่าที่สำเร็จโดยอัตโนมัติและส่งคืนข้อผิดพลาดทันทีจากฟังก์ชันปัจจุบัน
wrong_answers:
  - ในการแปลงประเภท Result ทั้งหมดเป็นประเภท Option เพื่อการจัดการค่า null ที่ง่ายขึ้น
  - ตื่นตระหนกโดยอัตโนมัติพร้อมข้อความที่กำหนดเองเมื่อเกิดข้อผิดพลาดใด ๆ
  - เพื่อห่อหุ้มค่าที่ประสบความสำเร็จในชั้น Result เพิ่มเติมเพื่อความปลอดภัยที่มากขึ้น
explanation: |
  เครื่องหมายคำถาม (?) ถูกออกแบบมาโดยเฉพาะสำหรับการส่งต่อข้อผิดพลาดใน Rust เมื่อใช้กับ Result มันจะดึงค่าความสำเร็จหากการดำเนินการสำเร็จ ทำให้โค้ดสามารถดำเนินการต่อด้วยค่านั้น อย่างไรก็ตาม หากเกิดข้อผิดพลาด เครื่องหมาย ? จะส่งคืนข้อผิดพลาดนั้นทันทีจากฟังก์ชันปัจจุบัน ส่งผลให้มันถูกส่งต่อขึ้นไปในสแต็กการเรียก ซึ่งช่วยลดความจำเป็นในการใช้การแสดงออก match ที่ยาวเหยียด ในขณะที่ยังคงรักษาความหมายของการจัดการข้อผิดพลาดอย่างชัดเจน เครื่องหมายนี้สามารถใช้ได้เฉพาะในฟังก์ชันที่ส่งคืนประเภท Result เท่านั้น เพื่อให้แน่ใจว่ามีรูปแบบการส่งต่อข้อผิดพลาดที่ถูกต้อง
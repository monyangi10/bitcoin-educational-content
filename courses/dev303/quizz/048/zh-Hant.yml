question: 在 Rust 程式設計中，結合 RC 與 RefCell 的主要目的是什麼？
answer: 使多個擁有者能夠透過運行時借用檢查來共用和變更相同的資料
wrong_answers:
  - 將借用規則的執行從執行時移回編譯時，以獲得更好的效能
  - 建立不可變的共用資料，可跨多執行緒安全存取
  - 在多個擁有者之間共用資料時，防止參考循環和記憶體洩漏
explanation: |
  RC<RefCell<T>> 結合了共用所有權的引用計數與運行時檢查變異的內部變異性。RC 允許程式碼的多個部分擁有相同的資料，而 RefCell 則透過在運行時檢查借用規則，透過不可變的引用來實現突變。其他選項都是不正確的：這種模式實際上是將檢查移至執行時（而非編譯時）、建立可變（而非不可變）的共用資料，而且實際上會造成參考循環，而非防止它們。
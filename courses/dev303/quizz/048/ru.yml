question: Какова основная цель сочетания RC и RefCell в программировании Rust?
answer: Предоставление возможности нескольким владельцам совместно использовать и изменять одни и те же данные с проверкой заимствования во время выполнения
wrong_answers:
  - Перенос применения правил заимствования из времени выполнения в время компиляции для повышения производительности
  - Для создания неизменяемых общих данных, к которым можно безопасно обращаться в нескольких потоках
  - Для предотвращения циклов ссылок и утечек памяти при совместном использовании данных несколькими владельцами
explanation: |
  RC<RefCell<T>> сочетает в себе подсчет ссылок для совместного владения и внутреннюю мутабельность для мутаций, проверяемых во время выполнения. RC позволяет нескольким частям кода владеть одними и теми же данными, а RefCell обеспечивает мутацию через неизменяемые ссылки, проверяя правила заимствования во время выполнения. Остальные варианты неверны: этот паттерн фактически переносит проверку на время выполнения (а не на время компиляции), создает мутируемые (а не неизменяемые) общие данные и может вызывать циклы ссылок, а не предотвращать их.
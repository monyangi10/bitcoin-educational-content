question: GW中にRCとRefCellを組み合わせる目的は何ですか？
answer: 複数のオーナーが同じデータを共有し、実行時の借用チェックで変更できるようにする。
wrong_answers:
  - パフォーマンスを向上させるために、借用ルールの実施をランタイムからコンパイルタイムに戻す。
  - 複数のスレッド間で安全にアクセスできる不変の共有データを作成する。
  - 複数の所有者間でデータを共有する際に、参照サイクルとメモリリークを防止する。
explanation: |
  RC<RefCell<T>>は、共有所有権のための参照カウントと、実行時にチェックされる変異のための内部変異可能性を組み合わせたものである。RCはコードの複数の部分が同じデータを所有することを可能にし、RefCellは実行時に借用ルールをチェックすることで不変参照による変異を可能にする。他の選択肢は正しくない。このパターンは、実際にはチェックを（コンパイル時ではなく）実行時に移し、（不変ではなく）変更可能な共有データを作成し、参照サイクルを防止するのではなく、実際に参照サイクルを引き起こす可能性がある。
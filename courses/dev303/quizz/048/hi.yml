question: Rust प्रोग्रामिंग में RC को RefCell के साथ संयोजित करने का प्राथमिक उद्देश्य क्या है?
answer: रनटाइम बरोइंग चेक के साथ एक ही डेटा को कई मालिकों द्वारा साझा करने और उसमें बदलाव करने में सक्षम बनाना।
wrong_answers:
  - बेहतर प्रदर्शन के लिए उधार लेने के नियमों को लागू करने की प्रक्रिया को रनटाइम से वापस कंपाइल टाइम पर स्थानांतरित करना।
  - अपरिवर्तनीय साझा डेटा बनाने के लिए जिसे कई थ्रेड्स में सुरक्षित रूप से एक्सेस किया जा सके।
  - कई मालिकों के बीच डेटा साझा करते समय संदर्भ चक्रों और मेमोरी लीक को रोकने के लिए
explanation: |
  RC<RefCell<T>> साझा स्वामित्व के लिए संदर्भ गणना को रनटाइम-जांचित परिवर्तनों के लिए आंतरिक परिवर्तनशीलता के साथ जोड़ता है। RC कोड के कई हिस्सों को एक ही डेटा का स्वामित्व रखने की अनुमति देता है, जबकि RefCell रनटाइम पर उधार नियमों की जांच करके अपरिवर्तनीय संदर्भों के माध्यम से उत्परिवर्तन को सक्षम बनाता है। अन्य विकल्प गलत हैं: यह पैटर्न वास्तव में जांच को रनटाइम (संकलन समय नहीं) पर स्थानांतरित करता है, अपरिवर्तनीय नहीं बल्कि परिवर्तनीय साझा डेटा बनाता है, और वास्तव में संदर्भ चक्रों को रोकने के बजाय उन्हें उत्पन्न कर सकता है।
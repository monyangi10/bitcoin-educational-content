question: Каква е основната цел на комбинирането на RC с RefCell в програмирането на Rust?
answer: Да се даде възможност на множество собственици да споделят и мутират едни и същи данни с проверки за заемане по време на изпълнение
wrong_answers:
  - Преместване на прилагането на правилата за заемане от времето на изпълнение обратно към времето на компилиране за по-добра производителност
  - Създаване на неизменни споделени данни, до които може да се осъществява безопасен достъп от няколко нишки
  - Предотвратяване на референтни цикли и изтичане на памет при споделяне на данни между няколко собственика
explanation: |
  RC<RefCell<T>> комбинира броене на референции за споделена собственост с вътрешна променливост за проверени по време на изпълнение мутации. RC позволява на няколко части от кода да притежават едни и същи данни, докато RefCell позволява мутация чрез неизменни препратки чрез проверка на правилата за заемане по време на изпълнение. Другите варианти са некоректни: този модел всъщност премества проверките по време на изпълнение (а не по време на компилиране), създава променливи (а не непроменливи) споделени данни и всъщност може да предизвика цикли от препратки, вместо да ги предотврати.
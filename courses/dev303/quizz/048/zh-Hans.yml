question: 在 Rust 编程中将 RC 与 RefCell 结合起来的主要目的是什么？
answer: 通过运行时借用检查，使多个所有者能够共享和更改相同的数据
wrong_answers:
  - 将借用规则的执行从运行时移回编译时，以提高性能
  - 创建不可变的共享数据，供多个线程安全访问
  - 在多个所有者共享数据时，防止引用循环和内存泄漏
explanation: |
  RC<RefCell<T>> 结合了用于共享所有权的引用计数和用于运行时检查突变的内部可变性。RC 允许代码的多个部分拥有相同的数据，而 RefCell 则通过在运行时检查借用规则，通过不可变引用实现突变。其他选项都不正确：这种模式实际上是将检查转移到了运行时（而不是编译时），创建了可变（而非不可变）的共享数据，而且实际上会导致引用循环，而不是防止引用循环。
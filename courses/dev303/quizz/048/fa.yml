question: هدف اصلی ترکیب RC با RefCell در برنامه‌نویسی Rust چیست؟
answer: برای فعال‌سازی چندین مالک برای به اشتراک‌گذاری و تغییر همان داده‌ها با بررسی‌های قرض‌گیری در زمان اجرا
wrong_answers:
  - برای انتقال اجرای قوانین وام‌گیری از زمان اجرا به زمان کامپایل برای عملکرد بهتر
  - برای ایجاد داده‌های مشترک تغییرناپذیر که می‌توان به‌طور ایمن در چندین رشته به آن‌ها دسترسی داشت
  - برای جلوگیری از چرخه‌های مرجع و نشت حافظه هنگام به اشتراک‌گذاری داده‌ها بین چندین مالک
explanation: |
  RC<RefCell<T>> ترکیبی از شمارش مرجع برای مالکیت مشترک با قابلیت تغییر داخلی برای تغییرات بررسی‌شده در زمان اجرا است. RC به بخش‌های مختلف کد اجازه می‌دهد تا مالک داده‌های یکسان باشند، در حالی که RefCell امکان تغییر از طریق ارجاعات غیرقابل تغییر را با بررسی قوانین قرض‌گیری در زمان اجرا فراهم می‌کند. گزینه‌های دیگر نادرست هستند: این الگو در واقع بررسی‌ها را به زمان اجرا منتقل می‌کند (نه زمان کامپایل)، داده‌های مشترک قابل تغییر (نه غیرقابل تغییر) ایجاد می‌کند و در واقع می‌تواند باعث ایجاد چرخه‌های مرجع شود نه جلوگیری از آن‌ها.
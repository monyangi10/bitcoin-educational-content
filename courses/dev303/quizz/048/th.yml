question: วัตถุประสงค์หลักของการรวม RC กับ RefCell ในการเขียนโปรแกรม Rust คืออะไร?
answer: เพื่อให้เจ้าของหลายคนสามารถแชร์และเปลี่ยนแปลงข้อมูลเดียวกันได้ด้วยการตรวจสอบการยืมในขณะรันไทม์
wrong_answers:
  - ย้ายการบังคับใช้กฎการยืมจากเวลารันไทม์กลับไปยังเวลาคอมไพล์เพื่อประสิทธิภาพที่ดีขึ้น
  - เพื่อสร้างข้อมูลที่ไม่เปลี่ยนแปลงที่สามารถเข้าถึงได้อย่างปลอดภัยข้ามหลายเธรด
  - เพื่อป้องกันวงจรอ้างอิงและการรั่วไหลของหน่วยความจำเมื่อมีการแชร์ข้อมูลระหว่างเจ้าของหลายราย
explanation: |
  RC<RefCell<T>> รวมการนับอ้างอิงสำหรับการเป็นเจ้าของร่วมกับการเปลี่ยนแปลงภายในสำหรับการตรวจสอบการเปลี่ยนแปลงในขณะรันไทม์ RC อนุญาตให้หลายส่วนของโค้ดเป็นเจ้าของข้อมูลเดียวกัน ในขณะที่ RefCell ช่วยให้สามารถเปลี่ยนแปลงผ่านการอ้างอิงที่ไม่เปลี่ยนแปลงโดยการตรวจสอบกฎการยืมในขณะรันไทม์ ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: รูปแบบนี้จริงๆ แล้วเลื่อนการตรวจสอบไปที่ขณะรันไทม์ (ไม่ใช่เวลาคอมไพล์) สร้างข้อมูลที่ใช้ร่วมกันที่เปลี่ยนแปลงได้ (ไม่ใช่ไม่เปลี่ยนแปลง) และอาจทำให้เกิดวงจรการอ้างอิงแทนที่จะป้องกันได้
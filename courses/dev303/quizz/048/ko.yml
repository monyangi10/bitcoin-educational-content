question: Rust 프로그래밍에서 RC와 RefCell을 결합하는 주요 목적은 무엇인가요?
answer: 여러 소유자가 런타임 차입 검사를 통해 동일한 데이터를 공유하고 변경할 수 있도록 하려면 다음과 같이 하세요
wrong_answers:
  - 성능 향상을 위해 차용 규칙 적용을 런타임에서 컴파일 시간으로 되돌리려면 다음과 같이 하세요
  - 여러 스레드에서 안전하게 액세스할 수 있는 변경 불가능한 공유 데이터를 만들려면 다음과 같이 하세요
  - 여러 소유자 간에 데이터를 공유할 때 참조 주기 및 메모리 누수를 방지하려면 다음과 같이 하세요
explanation: |
  RC<RefCell<T>>는 공유 소유권을 위한 참조 카운팅과 런타임에 확인된 변형을 위한 내부 변경 가능성을 결합합니다. RC는 코드의 여러 부분이 동일한 데이터를 소유할 수 있도록 허용하는 반면, RefCell은 런타임에 차용 규칙을 검사하여 변경 불가능한 참조를 통한 변이를 가능하게 합니다. 이 패턴은 실제로 컴파일 타임이 아닌 런타임으로 검사를 이동하고, 변경 가능한(불변이 아닌) 공유 데이터를 생성하며, 참조 주기를 방지하는 것이 아니라 실제로 참조 주기를 유발할 수 있기 때문에 다른 옵션은 올바르지 않습니다.
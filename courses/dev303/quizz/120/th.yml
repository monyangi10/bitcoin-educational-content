question: การแลกเปลี่ยนความเป็นส่วนตัวที่สำคัญที่สุดที่เกิดขึ้นเมื่อย้ายจากการใช้งาน LDK ที่จัดการด้วยตนเองไปยังสถาปัตยกรรมบนคลาวด์ของ Breez SDK คืออะไร?
answer: Greenlight ได้รับศักยภาพในการมองเห็นปลายทางการชำระเงินและกิจกรรมการสร้างใบแจ้งหนี้ผ่านการกำหนดเส้นทางบนคลาวด์
wrong_answers:
  - "คีย์ส่วนตัวถูกเก็บไว้บนเซิร์ฟเวอร์ของ Blockstream แทนที่จะเก็บไว้ในอุปกรณ์ของผู้ใช้"
  - ข้อมูลสถานะช่องสัญญาณจะปรากฏให้เห็นต่อสาธารณะบนกราฟ Lightning Network ผ่านโหนด Greenlight
  - บริการ LSP สามารถตรวจสอบธุรกรรม on-chain ทั้งหมดและเชื่อมโยงกับรูปแบบการชำระเงิน Lightning ได้แล้ว
explanation: |
  คำตอบที่ถูกต้องระบุถึงการเสื่อมสภาพของความเป็นส่วนตัวที่สำคัญ: การกำหนดเส้นทางบนคลาวด์ทำให้ Greenlight สามารถสังเกตปลายทางการชำระเงินได้ ในขณะที่การสร้างใบแจ้งหนี้บนคลาวด์ขยายการเปิดเผยข้อมูลเกินกว่าที่สถาปัตยกรรม LSP แบบดั้งเดิมเปิดเผย คำตอบที่ผิดไม่ถูกต้องเพราะ: คีย์ส่วนตัวยังคงอยู่ภายใต้การควบคุมของผู้ใช้แม้จะมีสถาปัตยกรรมคลาวด์; สถานะช่องทางไม่ได้ถูกทำให้มองเห็นได้สาธารณะผ่านการกำหนดเส้นทาง; และ LSPs ไม่ได้รับความสามารถในการตรวจสอบธุรกรรม on-chain เพิ่มเติมผ่านการเปลี่ยนแปลงสถาปัตยกรรมนี้
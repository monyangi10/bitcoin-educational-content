question: सेल्फ-मैनेज्ड LDK इम्प्लीमेंटेशन से Breez SDK के क्लाउड-आधारित आर्किटेक्चर में माइग्रेट करते समय गोपनीयता से संबंधित सबसे महत्वपूर्ण समझौता क्या है?
answer: क्लाउड-आधारित रूटिंग के माध्यम से ग्रीनलाइट को भुगतान स्थलों और चालान निर्माण गतिविधियों में संभावित दृश्यता प्राप्त होती है।
wrong_answers:
  - "प्राइवेट कीज़ उपयोगकर्ता के डिवाइस पर स्थानीय रूप से संग्रहीत होने के बजाय ब्लॉकस्ट्रीम के सर्वरों पर संग्रहीत होती हैं।"
  - ग्रीनलाइट नोड्स के माध्यम से Lightning Network ग्राफ पर चैनल की स्थिति संबंधी जानकारी सार्वजनिक रूप से दिखाई देती है।
  - अब एलएसपी सेवाएं सभी जीडब्ल्यू-2 लेनदेन की निगरानी कर सकती हैं और उन्हें लाइटनिंग भुगतान पैटर्न से जोड़ सकती हैं।
explanation: |
  सही उत्तर गोपनीयता में होने वाली मुख्य कमी को उजागर करता है: क्लाउड-आधारित रूटिंग ग्रीनलाइट को भुगतान गंतव्यों पर नज़र रखने की अनुमति देता है, जबकि क्लाउड इनवॉइस जनरेशन से जानकारी का दायरा पारंपरिक एलएसपी-आधारित आर्किटेक्चर की तुलना में कहीं अधिक बढ़ जाता है। गलत उत्तर इसलिए गलत हैं क्योंकि: क्लाउड आर्किटेक्चर के बावजूद निजी कुंजी उपयोगकर्ता के नियंत्रण में रहती है; रूटिंग के माध्यम से चैनल की स्थिति सार्वजनिक रूप से दिखाई नहीं देती; और इस आर्किटेक्चरल बदलाव से एलएसपी को अतिरिक्त on-chain लेनदेन निगरानी क्षमताएं प्राप्त नहीं होती हैं।
question: Какъв е най-значимият компромис с поверителността, който се прави при преминаването от самостоятелно управлявана LDK реализация към облачната архитектура на Breez SDK?
answer: Greenlight придобива потенциална видимост за дестинациите на плащанията и дейностите по генериране на фактури чрез маршрутизация, базирана на облак
wrong_answers:
  - "Частните ключове се съхраняват на сървърите на Blockstream, а не локално на устройството на потребителя"
  - Информацията за състоянието на канала става публично видима в графа Lightning Network чрез възлите Greenlight
  - Услугите на LSP вече могат да наблюдават всички транзакции on-chain и да ги свързват с моделите на плащане на Lightning
explanation: |
  Правилният отговор идентифицира ключовото влошаване на неприкосновеността на личния живот: маршрутизацията в облак позволява на Greenlight потенциално да наблюдава дестинациите на плащане, докато генерирането на фактури в облак разширява разкриването на информация отвъд това, което традиционните архитектури, базирани само на LSP, разкриват. Грешните отговори са неправилни, защото: частните ключове остават под контрола на потребителя въпреки облачната архитектура; състоянията на каналите не стават публично видими чрез маршрутизацията; и LSP не получават допълнителни възможности за наблюдение на транзакциите на on-chain чрез тази архитектурна промяна.
question: Какой наиболее существенный компромисс в области конфиденциальности возникает при переходе от самоуправляемой реализации LDK к облачной архитектуре Breez SDK?
answer: Greenlight получает потенциальную возможность отслеживать направления платежей и деятельность по формированию счетов-фактур с помощью облачной маршрутизации
wrong_answers:
  - "Приватные ключи хранятся на серверах Blockstream, а не локально на устройстве пользователя"
  - Информация о состоянии канала становится общедоступной на графе Lightning Network благодаря узлам Greenlight
  - Службы LSP теперь могут отслеживать все транзакции on-chain и связывать их с шаблонами платежей Lightning
explanation: |
  Правильный ответ определяет ключевое снижение конфиденциальности: облачная маршрутизация позволяет Greenlight потенциально наблюдать за назначениями платежей, а облачная генерация счетов расширяет доступ к информации, выходя за рамки традиционной архитектуры, использующей только LSP. Неправильные ответы неверны, потому что: приватные ключи остаются под контролем пользователя, несмотря на облачную архитектуру; состояния каналов не становятся публично видимыми благодаря маршрутизации; LSP не получают дополнительных возможностей мониторинга транзакций on-chain благодаря этому архитектурному изменению.
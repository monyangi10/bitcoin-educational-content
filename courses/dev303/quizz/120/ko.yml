question: 자체 관리형 LDK 구현에서 Breez SDK의 클라우드 기반 아키텍처로 마이그레이션할 때 발생하는 가장 중요한 개인정보 보호 트레이드오프는 무엇인가요?
answer: 그린라이트는 클라우드 기반 라우팅을 통해 결제 대상 및 송장 생성 활동에 대한 잠재적 가시성을 확보합니다
wrong_answers:
  - "개인 키는 사용자 디바이스에 로컬로 저장되지 않고 블록스트림의 서버에 저장됩니다."
  - 채널 상태 정보는 그린라이트 노드를 통해 Lightning Network 그래프에 공개적으로 표시됩니다
  - 이제 LSP 서비스는 모든 on-chain 트랜잭션을 모니터링하고 이를 라이트닝 결제 패턴에 연결할 수 있습니다
explanation: |
  정답은 클라우드 기반 라우팅을 통해 그린라이트가 결제 대상을 잠재적으로 관찰할 수 있고, 클라우드 송장 생성은 기존 LSP 전용 아키텍처에서 드러난 것 이상으로 정보 노출을 확대한다는 주요 개인정보 보호 저하를 나타냅니다. 오답은 클라우드 아키텍처에도 불구하고 개인 키는 여전히 사용자의 통제 하에 있고, 라우팅을 통해 채널 상태가 공개적으로 표시되지 않으며, 이러한 아키텍처 변경을 통해 LSP가 추가적인 on-chain 트랜잭션 모니터링 기능을 얻지 못한다는 점에서 정답이 아닙니다.
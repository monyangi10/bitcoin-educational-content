question: مهم‌ترین معاوضه حریم خصوصی که هنگام مهاجرت از یک پیاده‌سازی LDK خودمدیریتی به معماری مبتنی بر ابر Breez SDK معرفی می‌شود چیست؟
answer: چراغ سبز به‌طور بالقوه به مقصدهای پرداخت و فعالیت‌های تولید فاکتور از طریق مسیریابی ابری دسترسی پیدا می‌کند.
wrong_answers:
  - "کلیدهای خصوصی به جای ذخیره محلی در دستگاه کاربر، بر روی سرورهای Blockstream ذخیره می‌شوند"
  - اطلاعات وضعیت کانال از طریق گره‌های Greenlight بر روی نمودار Lightning Network به صورت عمومی قابل مشاهده می‌شود.
  - خدمات LSP اکنون می‌توانند تمامی تراکنش‌های on-chain را نظارت کرده و آن‌ها را به الگوهای پرداخت Lightning متصل کنند.
explanation: |
  پاسخ صحیح، کاهش کلیدی حریم خصوصی را شناسایی می‌کند: مسیریابی مبتنی بر ابر به Greenlight این امکان را می‌دهد که به‌طور بالقوه مقصدهای پرداخت را مشاهده کند، در حالی که تولید فاکتور ابری، افشای اطلاعات را فراتر از آنچه معماری‌های سنتی فقط LSP نشان می‌دادند، گسترش می‌دهد. پاسخ‌های نادرست اشتباه هستند زیرا: کلیدهای خصوصی علی‌رغم معماری ابری تحت کنترل کاربر باقی می‌مانند؛ وضعیت کانال‌ها از طریق مسیریابی به‌طور عمومی قابل مشاهده نیستند؛ و LSPها از طریق این تغییر معماری قابلیت‌های نظارت بر تراکنش on-chain اضافی به دست نمی‌آورند.
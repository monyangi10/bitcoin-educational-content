question: ¿Cuál es el compromiso de privacidad más importante que se introduce al migrar de una implementación LDK autogestionada a la arquitectura basada en la nube del SDK de Breez?
answer: Greenlight obtiene visibilidad potencial de los destinos de los pagos y de las actividades de generación de facturas gracias al enrutamiento basado en la nube
wrong_answers:
  - "Las claves privadas se almacenan en los servidores de Blockstream en lugar de localmente en el dispositivo del usuario"
  - La información sobre el estado del canal se hace visible públicamente en el gráfico Lightning Network a través de los nodos Greenlight
  - Los servicios LSP pueden ahora supervisar todas las transacciones on-chain y vincularlas a los patrones de pago de Lightning
explanation: |
  La respuesta correcta identifica la degradación clave de la privacidad: el enrutamiento basado en la nube permite a Greenlight observar potencialmente los destinos de los pagos, mientras que la generación de facturas en la nube amplía la exposición de la información más allá de lo que revelaban las arquitecturas tradicionales de solo LSP. Las respuestas erróneas son incorrectas porque: las claves privadas siguen estando bajo el control del usuario a pesar de la arquitectura en la nube; los estados de los canales no se hacen visibles públicamente a través del enrutamiento; y los PSL no obtienen capacidades adicionales de supervisión de transacciones de on-chain a través de este cambio arquitectónico.
question: 自己管理型LDKの実装からBreez SDKのクラウドベースのアーキテクチャに移行する際に導入される最も重要なプライバシーのトレードオフは何ですか？
answer: Greenlightは、クラウドベースのルーティングを通じて、支払い先や請求書作成活動の潜在的な可視性を獲得する。
wrong_answers:
  - 「秘密鍵は、ユーザーの端末にローカルに保管されるのではなく、ブロックストリームのサーバーに保管される。
  - チャネルの状態情報は、Greenlightノードを通じてLightning Networkグラフ上に公開される。
  - LSPサービスは、すべてのon-chainトランザクションを監視し、Lightningの支払いパターンにリンクできるようになった。
explanation: |
  クラウドベースのルーティングにより、Greenlightは潜在的に支払い先を観察することができ、クラウド請求書生成により、従来のLSPのみのアーキテクチャーが明らかにしていた以上の情報露出が拡大する。なぜなら、クラウドアーキテクチャにもかかわらず、秘密鍵はユーザの管理下に置かれたままであり、チャネルの状態はルーティングによって一般に公開されることはなく、LSPはこのアーキテクチャの変更によってon-chainのトランザクション監視機能を追加で得ることはないからである。
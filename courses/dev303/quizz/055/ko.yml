question: 컴파일 과정에서 Rust 컴파일러가 매크로 호출을 만나면 어떤 일이 발생하나요?
answer: 컴파일러는 입력을 정의된 패턴과 일치시키고 유형 검사가 발생하기 전에 매크로 호출을 생성된 코드로 대체합니다
wrong_answers:
  - 컴파일러는 코드 유효성을 보장하기 위해 매크로 확장을 형식 검사 및 최적화 이후까지 연기합니다
  - 컴파일러는 매크로 호출을 바이트코드로 저장하고 런타임 실행 중에 동적으로 확장합니다
  - 컴파일러는 매크로 구문의 유효성을 검사하지만 실제 확장은 링커가 처리하도록 남겨둡니다
explanation: |
  매크로는 컴파일 중에 확장된 후 유형 검사 및 최적화가 수행됩니다. 컴파일러는 매크로 호출이 발생하면 즉시 매크로의 정의된 패턴과 입력을 일치시키고 전체 매크로 호출을 생성된 코드로 대체합니다. 이렇게 확장된 코드는 유형 검사를 포함한 정상적인 컴파일 프로세스를 거칩니다. 다른 옵션은 매크로가 런타임이 아닌 컴파일 타임에 작동하고, 생성된 코드의 정확성을 검증해야 하므로 유형 검사 전에 확장이 이루어져야 하기 때문에 올바르지 않습니다.
question: Que se passe-t-il au cours du processus de compilation lorsque le compilateur Rust rencontre une invocation de macro ?
answer: Le compilateur compare l'entrée à des modèles définis et remplace l'appel de la macro par le code généré avant que la vérification du type n'ait lieu
wrong_answers:
  - Le compilateur reporte l'expansion des macros jusqu'à ce que la vérification des types et l'optimisation soient terminées afin de garantir la validité du code
  - Le compilateur stocke l'appel de macro sous forme de bytecode et l'étend dynamiquement pendant l'exécution
  - Le compilateur valide la syntaxe de la macro mais laisse à l'éditeur de liens le soin de gérer l'expansion proprement dite
explanation: |
  Les macros sont développées au cours de la compilation avant que la vérification des types et l'optimisation n'interviennent. Lorsque le compilateur rencontre une invocation de macro, il compare immédiatement l'entrée avec les modèles définis de la macro et remplace l'ensemble de l'appel de macro par le code généré. Ce code étendu subit ensuite les processus de compilation normaux, y compris la vérification des types. Les autres options sont incorrectes car les macros agissent au moment de la compilation, et non de l'exécution, et l'expansion doit avoir lieu avant la vérification de type puisque le code généré doit être validé pour être correct.
question: Rustコンパイラがマクロ呼び出しに遭遇した場合、コンパイルの過程で何が起こるのか？
answer: コンパイラーは入力を定義されたパターンと照合し、型チェックが行われる前にマクロ呼び出しを生成されたコードに置き換える。
wrong_answers:
  - コンパイラは、コードの妥当性を保証するために、型チェックと最適化の後までマクロの展開を延期する。
  - コンパイラはマクロ呼び出しをバイトコードとして保存し、実行時に動的に展開します。
  - コンパイラーはマクロ構文を検証するが、実際の展開はリンカーに任せる。
explanation: |
  マクロはコンパイル時に展開され、型チェックと最適化が行われる前に展開される。コンパイラーはマクロ呼び出しに遭遇すると、直ちにマクロの定義パターンと入力を照合し、マクロ呼び出し全体を生成されたコードに置き換える。この拡張されたコードは、その後、型チェックを含む通常のコンパイル処理を受ける。マクロは実行時ではなくコンパイル時に動作し、生成されたコードが正しいかどうかを検証する必要があるため、型チェックの前に展開が行われなければならないからである。
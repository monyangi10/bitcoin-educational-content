question: เกิดอะไรขึ้นระหว่างกระบวนการคอมไพล์เมื่อคอมไพเลอร์ Rust พบการเรียกใช้แมโคร?
answer: คอมไพเลอร์จะจับคู่ข้อมูลนำเข้ากับรูปแบบที่กำหนดและแทนที่การเรียกมาโครด้วยโค้ดที่สร้างขึ้นก่อนที่จะเกิดการตรวจสอบประเภท
wrong_answers:
  - คอมไพเลอร์เลื่อนการขยายมาโครจนกว่าจะตรวจสอบประเภทและเพิ่มประสิทธิภาพเพื่อให้แน่ใจว่ารหัสถูกต้อง
  - คอมไพเลอร์จัดเก็บการเรียกมาโครเป็นไบต์โค้ดและขยายแบบไดนามิกระหว่างการดำเนินการรันไทม์
  - คอมไพเลอร์ตรวจสอบความถูกต้องของไวยากรณ์มาโครแต่ปล่อยให้การขยายจริงเป็นหน้าที่ของลิงเกอร์
explanation: |
  มาโครจะถูกขยายระหว่างการคอมไพล์ก่อนที่การตรวจสอบประเภทและการเพิ่มประสิทธิภาพจะเกิดขึ้น เมื่อคอมไพเลอร์พบการเรียกใช้มาโคร มันจะจับคู่ข้อมูลที่ป้อนเข้ากับรูปแบบที่กำหนดของมาโครทันทีและแทนที่การเรียกมาโครทั้งหมดด้วยโค้ดที่สร้างขึ้น โค้ดที่ขยายนี้จะผ่านกระบวนการคอมไพล์ปกติรวมถึงการตรวจสอบประเภท ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะมาโครทำงานในช่วงเวลาคอมไพล์ ไม่ใช่ช่วงเวลารันไทม์ และการขยายต้องเกิดขึ้นก่อนการตรวจสอบประเภทเนื่องจากโค้ดที่สร้างขึ้นจำเป็นต้องได้รับการตรวจสอบความถูกต้อง
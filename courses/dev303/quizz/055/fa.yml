question: هنگام فرآیند کامپایل، زمانی که کامپایلر Rust با یک فراخوانی ماکرو مواجه می‌شود، چه اتفاقی می‌افتد؟
answer: کامپایلر ورودی را با الگوهای تعریف‌شده مطابقت می‌دهد و قبل از اینکه بررسی نوع انجام شود، فراخوانی ماکرو را با کد تولیدشده جایگزین می‌کند.
wrong_answers:
  - کامپایلر گسترش ماکرو را تا بعد از بررسی نوع و بهینه‌سازی به تعویق می‌اندازد تا از صحت کد اطمینان حاصل کند.
  - کامپایلر فراخوانی ماکرو را به‌صورت بایت‌کد ذخیره می‌کند و آن را به‌طور پویا در زمان اجرای برنامه گسترش می‌دهد.
  - کامپایلر نحو ماکرو را اعتبارسنجی می‌کند اما گسترش واقعی را به لینک‌کننده واگذار می‌کند.
explanation: |
  ماکروها در طول کامپایل قبل از بررسی نوع و بهینه‌سازی گسترش می‌یابند. وقتی کامپایلر با یک فراخوانی ماکرو مواجه می‌شود، بلافاصله ورودی را با الگوهای تعریف‌شده ماکرو مطابقت می‌دهد و کل فراخوانی ماکرو را با کد تولیدشده جایگزین می‌کند. این کد گسترش‌یافته سپس تحت فرآیندهای عادی کامپایل از جمله بررسی نوع قرار می‌گیرد. گزینه‌های دیگر نادرست هستند زیرا ماکروها در زمان کامپایل عمل می‌کنند، نه در زمان اجرا، و گسترش باید قبل از بررسی نوع اتفاق بیفتد زیرا کد تولیدشده نیاز به اعتبارسنجی برای درستی دارد.
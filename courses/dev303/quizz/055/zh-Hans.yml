question: 在编译过程中，当 Rust 编译器遇到宏调用时会发生什么？
answer: 编译器会根据定义的模式匹配输入，并在进行类型检查之前用生成的代码替换宏调用
wrong_answers:
  - 编译器会将宏扩展推迟到类型检查和优化之后，以确保代码的有效性
  - 编译器会将宏调用存储为字节码，并在运行时进行动态扩展
  - 编译器会验证宏的语法，但实际扩展则由链接器处理
explanation: |
  在类型检查和优化之前，宏会在编译过程中展开。当编译器遇到宏调用时，它会立即将输入与宏定义的模式相匹配，并用生成的代码替换整个宏调用。扩展后的代码将执行正常的编译过程，包括类型检查。其他选项都不正确，因为宏是在编译时而不是运行时运行的，扩展必须在类型检查之前进行，因为生成的代码需要进行正确性验证。
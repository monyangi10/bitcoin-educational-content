question: Что происходит в процессе компиляции, когда компилятор Rust сталкивается с вызовом макроса?
answer: Компилятор сопоставляет входные данные с заданными шаблонами и заменяет вызов макроса сгенерированным кодом до того, как произойдет проверка типов
wrong_answers:
  - Компилятор откладывает расширение макросов до проверки типов и оптимизации, чтобы обеспечить корректность кода
  - Компилятор сохраняет макровызов в виде байткода и динамически расширяет его во время выполнения
  - Компилятор проверяет синтаксис макроса, но оставляет фактическое расширение на усмотрение компоновщика
explanation: |
  Макросы раскрываются во время компиляции до проверки типов и оптимизации. Когда компилятор встречает вызов макроса, он немедленно сопоставляет входные данные с определенными шаблонами макроса и заменяет весь вызов макроса сгенерированным кодом. Затем этот расширенный код подвергается обычным процессам компиляции, включая проверку типов. Другие варианты неверны, поскольку макросы работают во время компиляции, а не во время выполнения, и расширение должно происходить до проверки типов, поскольку сгенерированный код должен быть проверен на корректность.
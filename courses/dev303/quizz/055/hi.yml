question: संकलन प्रक्रिया के दौरान क्या होता है जब Rust कंपाइलर को मैक्रो आह्वान का सामना करना पड़ता है?
answer: कंपाइलर इनपुट का मिलान परिभाषित पैटर्न से करता है और टाइप चेकिंग होने से पहले मैक्रो कॉल को जनरेटेड कोड से बदल देता है।
wrong_answers:
  - कोड की वैधता सुनिश्चित करने के लिए कंपाइलर टाइप चेकिंग और ऑप्टिमाइज़ेशन के बाद ही मैक्रो विस्तार को स्थगित करता है।
  - कंपाइलर मैक्रो कॉल को बाइटकोड के रूप में संग्रहीत करता है और रनटाइम निष्पादन के दौरान इसे गतिशील रूप से विस्तारित करता है।
  - कंपाइलर मैक्रो सिंटैक्स को मान्य करता है, लेकिन वास्तविक विस्तार का कार्य लिंकर पर छोड़ देता है।
explanation: |
  टाइप चेकिंग और ऑप्टिमाइज़ेशन से पहले कंपाइलेशन के दौरान मैक्रोज़ का विस्तार किया जाता है। जब कंपाइलर को मैक्रो का आह्वान मिलता है, तो वह तुरंत इनपुट का मिलान मैक्रो के परिभाषित पैटर्न से करता है और पूरे मैक्रो कॉल को जनरेट किए गए कोड से बदल देता है। फिर यह विस्तारित कोड टाइप चेकिंग सहित सामान्य कंपाइलेशन प्रक्रियाओं से गुजरता है। अन्य विकल्प गलत हैं क्योंकि मैक्रोज़ कंपाइल-टाइम पर काम करते हैं, रनटाइम पर नहीं, और टाइप चेकिंग से पहले विस्तार होना आवश्यक है क्योंकि जनरेट किए गए कोड की शुद्धता की पुष्टि की जानी चाहिए।
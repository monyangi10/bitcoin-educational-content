question: 在編譯過程中，當 Rust 編譯器遇到巨集調用時會發生什麼情況？
answer: 編譯器會比對輸入與定義的模式，並在進行類型檢查之前，以產生的程式碼取代巨集呼叫。
wrong_answers:
  - 編譯器會將巨集擴充延遲到類型檢查和最佳化之後，以確保代碼的有效性
  - 編譯器會將巨集呼叫儲存為 bytecode，並在執行時動態擴充。
  - 編譯器會驗證巨集語法，但實際的擴充工作則交由連結器處理
explanation: |
  巨集在類型檢查和最佳化之前的編譯過程中展開。編譯器遇到巨集呼叫時，會立即將輸入內容與巨集定義的模式進行比對，並將整個巨集呼叫置換為產生的程式碼。擴充後的程式碼會經過正常的編譯程序，包括類型檢查。其他選項都是不正確的，因為巨集是在編譯時而非執行時運作，而且擴充必須在類型檢查之前進行，因為產生的程式碼需要驗證其正確性。
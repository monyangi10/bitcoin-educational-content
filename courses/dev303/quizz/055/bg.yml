question: Какво се случва по време на процеса на компилиране, когато компилаторът Rust срещне макроизвикване?
answer: Компилаторът сравнява входните данни с дефинирани шаблони и заменя макроизвикването с генериран код, преди да се извърши проверка на типа
wrong_answers:
  - Компилаторът отлага разширяването на макроси до проверката на типа и оптимизацията, за да осигури валидността на кода
  - Компилаторът съхранява макроизвикването като байткод и го разширява динамично по време на изпълнение
  - Компилаторът проверява синтаксиса на макроса, но оставя действителното разширение за обработка от линкер
explanation: |
  Макросите се разширяват по време на компилацията, преди да се извърши проверка на типа и оптимизация. Когато компилаторът срещне извикване на макрос, той веднага сравнява входа с дефинираните шаблони на макроса и заменя цялото извикване на макроса с генерирания код. След това този разширен код преминава през нормалните процеси на компилиране, включително проверка на типа. Другите варианти са неправилни, тъй като макросите действат по време на компилация, а не по време на изпълнение, и разширяването трябва да се извърши преди проверката на типа, тъй като генерираният код трябва да бъде потвърден за коректност.
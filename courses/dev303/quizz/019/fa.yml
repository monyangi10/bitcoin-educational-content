question: Rust چه نام‌گذاری‌ای را به ترتیب برای نام‌های ساختار و نام‌های فیلد اعمال می‌کند؟
answer: نام‌های ساختار به صورت CamelCase و نام‌های فیلد به صورت snake_case
wrong_answers:
  - نام‌گذاری ساختارها با snake_case و نام‌گذاری فیلدها با CamelCase
  - نام‌گذاری ساختارها به صورت kebab-case و نام‌گذاری فیلدها به صورت camelCase
  - نام‌های ساختار را با حروف بزرگ و نام‌های فیلد را با حروف کوچک بنویسید.
explanation: |
  ‏Rust از قراردادهای نام‌گذاری خاصی پیروی می‌کند که کامپایلر از طریق هشدارها اعمال می‌کند. نام‌های ساختار باید از CamelCase (که به عنوان PascalCase نیز شناخته می‌شود) استفاده کنند، جایی که هر کلمه با حرف بزرگ شروع می‌شود مانند 'MyStruct'. نام‌های فیلد درون ساختارها باید از snake_case با زیرخط‌هایی که کلمات را جدا می‌کنند استفاده کنند مانند 'my_field'. این قرارداد، یکنواختی را در کدبیس‌های Rust حفظ می‌کند و خوانایی را برای توسعه‌دهندگان بهبود می‌بخشد.
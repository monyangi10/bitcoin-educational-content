question: Rustでは、構造体名とフィールド名にそれぞれどのような命名規則がありますか？
answer: 構造体名にはキャメルケース、フィールド名にはsnake_caseを使用。
wrong_answers:
  - 構造体名にはsnake_case、フィールド名にはCamelCaseを使用する。
  - 構造体名にはケーバブ・ケース、フィールド名にはキャメルケース
  - 構造体名には UPPER_CASE を、フィールド名には小文字を使用する。
explanation: |
  Rustは、コンパイラが警告を通して強制する特定の命名規則に従っています。構造体名はキャメルケース（パスカルケースとも呼ばれる）を使用し、各単語は'MyStruct'のように大文字で始まります。構造体内のフィールド名は、'my_field'のようにアンダースコアで単語を区切るsnake_caseを使うべきである。この規則により、Rustコードベースの一貫性が保たれ、開発者の読みやすさが向上します。
question: Каква конвенция за именуване прилага Rust за имената на структурите и съответно за имената на полетата?
answer: CamelCase за имена на структури и snake_case за имена на полета
wrong_answers:
  - snake_case за имена на структури и CamelCase за имена на полета
  - kebab-case за имена на структури и camelCase за имена на полета
  - UPPER_CASE за имена на структури и малки букви за имена на полета
explanation: |
  Rust следва специфични конвенции за именуване, които компилаторът налага чрез предупреждения. Имената на структурите трябва да използват CamelCase (известна също като PascalCase), където всяка дума започва с главна буква като "MyStruct". Имената на полетата в структурите трябва да използват snake_case, като думите се разделят с подчертаване, например "my_field". Тази конвенция поддържа съгласуваност в кодовите бази на Rust и подобрява четимостта за разработчиците.
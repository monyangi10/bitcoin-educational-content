question: Rust संरचना नामों और फ़ील्ड नामों के लिए क्रमशः कौन सी नामकरण पद्धति लागू करता है?
answer: संरचना नामों के लिए CamelCase और फ़ील्ड नामों के लिए snake_case का उपयोग करें
wrong_answers:
  - संरचना नामों के लिए snake_case और फ़ील्ड नामों के लिए CamelCase का उपयोग किया जाता है।
  - संरचना नामों के लिए केबाब केस और फ़ील्ड नामों के लिए कैमल केस
  - संरचना नामों के लिए अपर केस और फ़ील्ड नामों के लिए लोअर केस का उपयोग करें।
explanation: |
  Rust कुछ विशिष्ट नामकरण नियमों का पालन करता है जिन्हें कंपाइलर चेतावनियों के माध्यम से लागू करता है। संरचना के नाम CamelCase (जिसे PascalCase भी कहा जाता है) में होने चाहिए, जहाँ प्रत्येक शब्द बड़े अक्षर से शुरू होता है, जैसे 'MyStruct'। संरचनाओं के भीतर फ़ील्ड के नाम snake_case में होने चाहिए, जिसमें शब्दों को अंडरस्कोर से अलग किया जाता है, जैसे 'my_field'। यह नियम Rust कोडबेस में एकरूपता बनाए रखता है और डेवलपर्स के लिए पठनीयता में सुधार करता है।
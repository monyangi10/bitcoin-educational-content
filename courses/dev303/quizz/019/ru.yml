question: Какое соглашение об именовании Rust применяет для имен структур и полей соответственно?
answer: CamelCase для имен структур и snake_case для имен полей
wrong_answers:
  - snake_case для имен структур и CamelCase для имен полей
  - kebab-case для имен структур и camelCase для имен полей
  - UPPER_CASE для имен структур и нижний регистр для имен полей
explanation: |
  Rust следует определенным соглашениям об именовании, которые компилятор соблюдает с помощью предупреждений. Имена структур должны использовать CamelCase (также известный как PascalCase), где каждое слово начинается с заглавной буквы, например 'MyStruct'. Имена полей в структурах должны использоваться в змеином регистре с подчеркиваниями, разделяющими слова, например 'my_field'. Это соглашение поддерживает согласованность между кодовыми базами Rust и улучшает читаемость для разработчиков.
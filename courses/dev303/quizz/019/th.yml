question: Rust บังคับใช้รูปแบบการตั้งชื่อแบบใดสำหรับชื่อโครงสร้างและชื่อฟิลด์ตามลำดับ?
answer: CamelCase สำหรับชื่อโครงสร้างและ snake_case สำหรับชื่อฟิลด์
wrong_answers:
  - snake_case สำหรับชื่อโครงสร้างและ CamelCase สำหรับชื่อฟิลด์
  - kebab-case สำหรับชื่อโครงสร้างและ camelCase สำหรับชื่อฟิลด์
  - UPPER_CASE สำหรับชื่อโครงสร้างและ lowercase สำหรับชื่อฟิลด์
explanation: |
  Rust ปฏิบัติตามหลักการตั้งชื่อเฉพาะที่คอมไพเลอร์บังคับใช้ผ่านคำเตือน ชื่อโครงสร้างควรใช้ CamelCase (หรือที่รู้จักในชื่อ PascalCase) โดยที่แต่ละคำขึ้นต้นด้วยตัวอักษรตัวใหญ่ เช่น 'MyStruct' ชื่อฟิลด์ภายในโครงสร้างควรใช้ snake_case โดยมีขีดล่างคั่นระหว่างคำ เช่น 'my_field' หลักการนี้ช่วยรักษาความสม่ำเสมอในฐานรหัส Rust และช่วยเพิ่มความสามารถในการอ่านสำหรับนักพัฒนา
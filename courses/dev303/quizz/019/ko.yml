question: Rust에서는 구조 이름과 필드 이름에 각각 어떤 명명 규칙을 적용하나요?
answer: 구조명에는 CamelCase, 필드명에는 snake_case를 사용합니다
wrong_answers:
  - 구조명에는 snake_case, 필드명에는 CamelCase를 사용합니다
  - 구조 이름은 케밥 케이스, 필드 이름은 카멜 케이스
  - 구조체 이름은 대문자, 필드 이름은 소문자
explanation: |
  Rust은 컴파일러가 경고를 통해 강제하는 특정 명명 규칙을 따릅니다. 구조체 이름은 'MyStruct'와 같이 각 단어가 대문자로 시작하는 CamelCase(파스칼 케이스라고도 함)를 사용해야 합니다. 구조체 내의 필드 이름은 'my_field'와 같이 밑줄로 단어를 구분하는 snake_case를 사용해야 합니다. 이 규칙은 Rust 코드베이스 전반에서 일관성을 유지하고 개발자의 가독성을 향상시킵니다.
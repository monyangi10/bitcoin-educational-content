question: مکانیسم اصلی که Rust برای جلوگیری از اشکالات مرتبط با حافظه مانند استفاده پس از آزادسازی و سرریز بافر استفاده می‌کند چیست؟
answer: تجزیه و تحلیل ایستا که به طور کامل در زمان کامپایل انجام می‌شود
wrong_answers:
  - جمع‌آوری زباله زمان اجرا با پاکسازی خودکار حافظه
  - بررسی حافظه پویا در حین اجرای برنامه
  - مدیریت دستی حافظه با فراخوانی‌های تخصیص صریح
explanation: |
  ‏Rust با استفاده از تحلیل ایستا که به‌طور کامل در زمان کامپایل انجام می‌شود، از بروز باگ‌های مرتبط با حافظه جلوگیری می‌کند. در این روش، کامپایلر کد منبع را بررسی کرده و با اطمینان تعیین می‌کند که عملیات حافظه ایمن هستند. این روش با جمع‌آوری زباله (که توسط Java/Go استفاده می‌شود) که سربار زمان اجرا را معرفی می‌کند، بررسی پویا که نیاز به تأیید در زمان اجرا دارد، و مدیریت دستی حافظه (که توسط C/C++ استفاده می‌شود) که به انضباط برنامه‌نویس متکی است، متفاوت است. رویکرد زمان کامپایل Rust ایمنی حافظه را بدون هزینه‌های زمان اجرا یا توقف‌های غیرقابل پیش‌بینی تضمین می‌کند.
question: Какой основной механизм использует Rust для предотвращения ошибок, связанных с памятью, таких как use-after-free и переполнение буфера?
answer: Статический анализ выполняется полностью во время компиляции
wrong_answers:
  - Сборка мусора во время выполнения программы с автоматической очисткой памяти
  - Динамическая проверка памяти во время выполнения программы
  - Ручное управление памятью с явными вызовами выделения
explanation: |
  Rust предотвращает ошибки, связанные с памятью, с помощью статического анализа, выполняемого полностью во время компиляции, когда компилятор изучает исходный код и с уверенностью определяет, безопасны ли операции с памятью. Это отличается от сборки мусора (используемой в Java/Go), которая создает накладные расходы во время выполнения, динамической проверки, требующей проверки во время выполнения, и ручного управления памятью (используемого в C/C++), которое зависит от дисциплины программиста. Подход Rust, основанный на компиляции, обеспечивает безопасность памяти без затрат времени выполнения или непредсказуемых пауз.
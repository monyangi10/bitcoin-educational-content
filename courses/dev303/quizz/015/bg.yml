question: Какъв е основният механизъм, който Rust използва за предотвратяване на грешки, свързани с паметта, като use-after-free и препълване на буфера?
answer: Статичен анализ, извършван изцяло по време на компилация
wrong_answers:
  - Събиране на отпадъци по време на работа с автоматично почистване на паметта
  - Динамична проверка на паметта по време на изпълнение на програмата
  - Ръчно управление на паметта с изрични извиквания за заделяне
explanation: |
  Rust предотвратява грешки, свързани с паметта, чрез статичен анализ, извършван изцяло по време на компилиране, при който компилаторът изследва изходния код и определя със сигурност дали операциите с памет са безопасни. Това се различава от събирането на боклук (използвано от Java/Go), което въвежда режийни разходи по време на изпълнение, динамичната проверка, която изисква проверка по време на изпълнение, и ръчното управление на паметта (използвано от C/C++), което разчита на дисциплината на програмиста. Подходът на Rust по време на компилиране осигурява безопасност на паметта без разходи по време на изпълнение или непредсказуеми паузи.
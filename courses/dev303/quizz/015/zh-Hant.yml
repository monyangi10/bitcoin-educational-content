question: Rust 用來預防記憶體相關 bug（如 use-after-free 和緩衝記憶體溢出）的主要機制是什麼？
answer: 靜態分析完全在編譯時執行
wrong_answers:
  - 運行時垃圾回收與自動記憶體清理
  - 程式執行期間的動態記憶體檢查
  - 使用明確的分配呼叫進行手動記憶體管理
explanation: |
  Rust 透過完全在編譯時執行的靜態分析來防止記憶體相關的錯誤，編譯器會檢查原始程式碼，並確定記憶體操作是否安全。這與垃圾回收（Java/Go 使用）、動態檢查及手動記憶體管理（C/C++ 使用）不同，前者會產生執行時開銷，而後者則需要執行時驗證。Rust 的編譯時方法可確保記憶體安全，而無需運行時成本或不可預測的停頓。
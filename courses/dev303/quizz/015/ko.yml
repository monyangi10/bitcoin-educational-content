question: 사용 후 해제 및 버퍼 오버플로와 같은 메모리 관련 버그를 방지하기 위해 Rust이 사용하는 주요 메커니즘은 무엇인가요?
answer: 전적으로 컴파일 시점에 수행되는 정적 분석
wrong_answers:
  - 자동 메모리 정리를 통한 런타임 가비지 컬렉션
  - 프로그램 실행 중 동적 메모리 검사
  - 명시적 할당 호출을 통한 수동 메모리 관리
explanation: |
  Rust은 컴파일 시 컴파일러가 소스 코드를 검사하고 메모리 연산이 안전한지 여부를 확실하게 판단하는 정적 분석을 통해 메모리 관련 버그를 방지합니다. 이는 런타임 오버헤드를 유발하는 가비지 컬렉션(Java/Go에서 사용), 런타임 검증이 필요한 동적 검사, 프로그래머의 규율에 의존하는 수동 메모리 관리(C/C++에서 사용)와는 다른 방식입니다. Rust의 컴파일 타임 접근 방식은 런타임 비용이나 예기치 않은 일시 정지 없이 메모리 안전을 보장합니다.
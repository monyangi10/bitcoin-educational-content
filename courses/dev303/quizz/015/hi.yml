question: Rust मेमोरी से संबंधित बग जैसे कि यूज़-आफ्टर-फ्री और बफर ओवरफ्लो को रोकने के लिए मुख्य रूप से किस तंत्र का उपयोग करता है?
answer: स्थैतिक विश्लेषण पूरी तरह से संकलन समय पर किया जाता है
wrong_answers:
  - स्वचालित मेमोरी सफाई के साथ रनटाइम गार्बेज संग्रह
  - प्रोग्राम निष्पादन के दौरान गतिशील मेमोरी जाँच
  - स्पष्ट आवंटन कॉल के साथ मैन्युअल मेमोरी प्रबंधन
explanation: |
  Rust कंपाइल टाइम पर किए गए स्टैटिक एनालिसिस के माध्यम से मेमोरी संबंधी बग्स को रोकता है, जिसमें कंपाइलर सोर्स कोड की जांच करता है और निश्चित रूप से यह निर्धारित करता है कि मेमोरी ऑपरेशन सुरक्षित हैं या नहीं। यह गार्बेज कलेक्शन (जावा/गो द्वारा उपयोग किया जाता है) से भिन्न है, जो रनटाइम ओवरहेड उत्पन्न करता है, डायनेमिक चेकिंग जिसके लिए रनटाइम सत्यापन की आवश्यकता होती है, और मैनुअल मेमोरी मैनेजमेंट (सी/सी++ द्वारा उपयोग किया जाता है) जो प्रोग्रामर के अनुशासन पर निर्भर करता है। Rust का कंपाइल-टाइम दृष्टिकोण रनटाइम लागत या अप्रत्याशित रुकावटों के बिना मेमोरी सुरक्षा सुनिश्चित करता है।
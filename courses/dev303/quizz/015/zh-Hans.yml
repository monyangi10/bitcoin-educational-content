question: Rust 用来防止内存相关错误（如使用后无限制和缓冲区溢出）的主要机制是什么？
answer: 静态分析完全在编译时进行
wrong_answers:
  - 运行时垃圾回收，自动清理内存
  - 程序执行过程中的动态内存检查
  - 使用显式分配调用进行手动内存管理
explanation: |
  Rust 通过完全在编译时进行的静态分析（编译器检查源代码并确定内存操作是否安全）来防止与内存相关的错误。这不同于垃圾收集（Java/Go 使用），垃圾收集会带来运行时开销；也不同于动态检查，动态检查需要运行时验证；还不同于手动内存管理（C/C++ 使用），手动内存管理依赖于程序员的纪律。Rust 的编译时方法可确保内存安全，而无需运行时成本或不可预测的停顿。
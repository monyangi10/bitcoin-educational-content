question: use-after-freeやバッファオーバーフローのようなメモリ関連のバグを防ぐために、Rustが使っている主なメカニズムは何ですか？
answer: 静的解析はすべてコンパイル時に実行される
wrong_answers:
  - 自動メモリ・クリーンアップ機能付きランタイム・ガベージ・コレクション
  - プログラム実行中の動的メモリ・チェック
  - 明示的アロケーション呼び出しによる手動メモリ管理
explanation: |
  Rustは、コンパイラがソースコードを検査し、メモリ操作が安全かどうかを確実に判断する、コンパイル時に完全に実行される静的解析によって、メモリ関連のバグを防止する。これは、実行時オーバーヘッドをもたらすガベージコレクション（Java/Goで使用）、実行時検証を必要とする動的チェック、プログラマの規律に依存する手動メモリ管理（C/C++で使用）とは異なる。Rustのコンパイル時のアプローチは、実行時のコストや予測不可能な中断なしに、メモリ安全を保証します。
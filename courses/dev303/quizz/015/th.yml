question: กลไกหลักที่ Rust ใช้เพื่อป้องกันบั๊กที่เกี่ยวข้องกับหน่วยความจำ เช่น การใช้หลังจากปล่อย (use-after-free) และการล้นของบัฟเฟอร์ (buffer overflows) คืออะไร?
answer: การวิเคราะห์แบบสถิติดำเนินการทั้งหมดในเวลาคอมไพล์
wrong_answers:
  - การเก็บขยะในรันไทม์พร้อมการทำความสะอาดหน่วยความจำอัตโนมัติ
  - การตรวจสอบหน่วยความจำแบบไดนามิกระหว่างการทำงานของโปรแกรม
  - การจัดการหน่วยความจำด้วยตนเองด้วยการเรียกการจัดสรรอย่างชัดเจน
explanation: |
  Rust ป้องกันบั๊กที่เกี่ยวข้องกับหน่วยความจำผ่านการวิเคราะห์แบบสถิตที่ดำเนินการทั้งหมดในขณะคอมไพล์ ซึ่งคอมไพเลอร์จะตรวจสอบซอร์สโค้ดและกำหนดด้วยความแน่นอนว่าการดำเนินการหน่วยความจำนั้นปลอดภัย วิธีนี้แตกต่างจากการเก็บขยะ (ที่ใช้โดย Java/Go) ซึ่งเพิ่มภาระงานในขณะรันไทม์ การตรวจสอบแบบไดนามิกที่ต้องการการตรวจสอบในขณะรันไทม์ และการจัดการหน่วยความจำด้วยตนเอง (ที่ใช้โดย C/C++) ซึ่งพึ่งพาวินัยของโปรแกรมเมอร์ วิธีการในขณะคอมไพล์ของ Rust ช่วยให้มั่นใจในความปลอดภัยของหน่วยความจำโดยไม่มีค่าใช้จ่ายในขณะรันไทม์หรือการหยุดชะงักที่ไม่สามารถคาดเดาได้
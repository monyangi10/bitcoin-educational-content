question: 與垃圾回收相比，Rust 的編譯時記憶體安全方法的主要優勢是什麼？
answer: 它消除了運行時的開銷和不可預測的性能暫停
wrong_answers:
  - 它使用更多的記憶體，但提供更好的安全性保證
  - 它需要編寫的程式碼較少，但運行速度比垃圾回收慢
  - 它可防止所有執行時錯誤，但會在執行時使用更多 CPU
explanation: |
  Rust 的編譯時記憶體安全方法可在編譯期間分析程式碼，以確保記憶體安全，而無需任何執行時成本。Rust 的系統與 Java 和 Go 等語言使用的垃圾回收不同，垃圾回收會帶來效能開銷，並可能在程式執行時造成無法預測的停頓，而 Rust 的系統對執行時間的影響為零。其他選項是不正確的，因為 Rust 實際上使用記憶體的效率更高 (而不是更多)、運行速度不會更慢 (在沒有運行時檢查的情況下運行速度更快)，而且在執行過程中不會使用更多 CPU (工作在編譯時就完成了)。
question: مزیت اصلی رویکرد ایمنی حافظه در زمان کامپایل Rust در مقایسه با جمع‌آوری زباله چیست؟
answer: این باعث حذف سربار زمان اجرا و توقف‌های غیرقابل پیش‌بینی عملکرد می‌شود.
wrong_answers:
  - از حافظه بیشتری استفاده می‌کند اما تضمین‌های امنیتی بهتری ارائه می‌دهد
  - نوشتن آن به کد کمتری نیاز دارد اما کندتر از جمع‌آوری زباله اجرا می‌شود.
  - این از تمام خطاهای زمان اجرا جلوگیری می‌کند اما در حین اجرا از CPU بیشتری استفاده می‌کند.
explanation: |
  رویکرد ایمنی حافظه در زمان کامپایل Rust کد را در حین کامپایل تحلیل می‌کند تا ایمنی حافظه را بدون هیچ هزینه‌ای در زمان اجرا تضمین کند. برخلاف جمع‌آوری زباله که در زبان‌هایی مانند Java و Go استفاده می‌شود و باعث افزایش بار عملکرد و می‌تواند توقف‌های غیرقابل پیش‌بینی در حین اجرای برنامه ایجاد کند، سیستم Rust هیچ تأثیری در زمان اجرا ندارد. گزینه‌های دیگر نادرست هستند زیرا Rust در واقع از حافظه به‌طور کارآمدتری استفاده می‌کند (نه بیشتر)، کندتر اجرا نمی‌شود (بدون بررسی‌های زمان اجرا سریع‌تر اجرا می‌شود)، و در حین اجرا از CPU بیشتری استفاده نمی‌کند (کار در زمان کامپایل انجام می‌شود).
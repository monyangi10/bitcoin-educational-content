question: ข้อได้เปรียบหลักของวิธีการความปลอดภัยของหน่วยความจำในเวลาแปลของ Rust เมื่อเทียบกับการเก็บขยะคืออะไร?
answer: มันกำจัดค่าใช้จ่ายในเวลารันไทม์และการหยุดชะงักของประสิทธิภาพที่ไม่สามารถคาดเดาได้
wrong_answers:
  - มันใช้หน่วยความจำมากขึ้นแต่ให้การรับประกันความปลอดภัยที่ดีกว่า
  - มันต้องการโค้ดน้อยกว่าในการเขียนแต่ทำงานช้ากว่าการเก็บขยะ
  - มันป้องกันข้อผิดพลาดในขณะรันไทม์ทั้งหมดแต่ใช้ CPU มากขึ้นระหว่างการดำเนินการ
explanation: |
  แนวทางความปลอดภัยของหน่วยความจำในช่วงเวลาแปลของ Rust จะวิเคราะห์โค้ดระหว่างการคอมไพล์เพื่อให้แน่ใจว่ามีความปลอดภัยของหน่วยความจำโดยไม่มีค่าใช้จ่ายในช่วงรันไทม์ แตกต่างจากการเก็บขยะที่ใช้ในภาษาอย่าง Java และ Go ซึ่งทำให้เกิดภาระด้านประสิทธิภาพและอาจทำให้เกิดการหยุดชะงักที่ไม่สามารถคาดการณ์ได้ระหว่างการทำงานของโปรแกรม ระบบของ Rust ไม่มีผลกระทบในช่วงรันไทม์ ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะ Rust ใช้หน่วยความจำได้อย่างมีประสิทธิภาพมากขึ้น (ไม่ใช่มากขึ้น) ไม่ทำงานช้าลง (มันทำงานเร็วขึ้นโดยไม่มีการตรวจสอบในช่วงรันไทม์) และไม่ใช้ CPU มากขึ้นระหว่างการทำงาน (งานจะทำในช่วงคอมไพล์)
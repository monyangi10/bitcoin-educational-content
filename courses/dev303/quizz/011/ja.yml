question: Rustのコンパイル時メモリーセーフティ・アプローチは、ガベージコレクションと比較してどのような利点がありますか？
answer: ランタイムオーバーヘッドと予測不可能なパフォーマンスの一時停止を排除します。
wrong_answers:
  - より多くのメモリを使用するが、より優れたセキュリティ保証を提供する。
  - ガベージコレクションは、記述するコードは少ないが、実行速度はガベージコレクションより遅い。
  - すべてのランタイムエラーを防ぐが、実行時に多くのCPUを使用する。
explanation: |
  Rustのコンパイル時メモリ安全性アプローチは、コンパイル時にコードを解析し、実行時にコストをかけることなくメモリ安全性を確保します。JavaやGoのような言語で使われるガベージ・コレクションがパフォーマンスのオーバーヘッドをもたらし、プログラムの実行中に予測不可能な休止を引き起こすことがあるのとは異なり、Rustのシステムは実行時の影響がゼロである。Rustは実際にメモリをより効率的に使用し（より多く使用するわけではない）、実行速度は遅くならず（実行時のチェックなしでより速く実行される）、実行時にCPUをより多く使用しない（作業はコンパイル時に行われる）ので、他の選択肢は正しくない。
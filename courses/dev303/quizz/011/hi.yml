question: गार्बेज कलेक्शन की तुलना में Rust के कंपाइल-टाइम मेमोरी सेफ्टी दृष्टिकोण का प्राथमिक लाभ क्या है?
answer: यह रनटाइम ओवरहेड और अप्रत्याशित प्रदर्शन रुकावटों को समाप्त करता है।
wrong_answers:
  - यह अधिक मेमोरी का उपयोग करता है लेकिन बेहतर सुरक्षा गारंटी प्रदान करता है।
  - इसमें कम कोड लिखने की आवश्यकता होती है, लेकिन यह गार्बेज कलेक्शन की तुलना में धीमी गति से चलता है।
  - यह सभी रनटाइम त्रुटियों को रोकता है लेकिन निष्पादन के दौरान अधिक CPU का उपयोग करता है।
explanation: |
  Rust का कंपाइल-टाइम मेमोरी सुरक्षा दृष्टिकोण, रनटाइम लागत के बिना मेमोरी सुरक्षा सुनिश्चित करने के लिए कंपाइलेशन के दौरान कोड का विश्लेषण करता है। जावा और गो जैसी भाषाओं में उपयोग किए जाने वाले गार्बेज कलेक्शन के विपरीत, जो प्रदर्शन पर प्रभाव डालता है और प्रोग्राम निष्पादन के दौरान अप्रत्याशित रुकावटें पैदा कर सकता है, Rust की प्रणाली का रनटाइम पर कोई प्रभाव नहीं पड़ता है। अन्य विकल्प गलत हैं क्योंकि Rust वास्तव में मेमोरी का अधिक कुशलता से उपयोग करता है (अधिक नहीं), धीमा नहीं चलता (यह रनटाइम जांच के बिना तेज़ चलता है), और निष्पादन के दौरान अधिक CPU का उपयोग नहीं करता (कार्य कंपाइल समय पर ही हो जाता है)।
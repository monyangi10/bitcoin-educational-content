question: 与垃圾回收相比，Rust 的编译时内存安全方法的主要优势是什么？
answer: 它消除了运行时开销和不可预测的性能停顿
wrong_answers:
  - 它使用更多内存，但提供更好的安全保障
  - 它需要编写的代码更少，但运行速度比垃圾回收慢
  - 它可以防止所有运行时错误，但在执行过程中会消耗更多 CPU
explanation: |
  Rust 的编译时内存安全方法在编译过程中分析代码，以确保内存安全，而无需任何运行时成本。Java 和 Go 等语言中使用的垃圾回收会带来性能开销，并可能在程序执行过程中造成不可预知的停顿，而 Rust 的系统则不同，它对运行时的影响为零。其他选项都是错误的，因为 Rust 实际上能更有效地使用内存（而不是更多），运行速度不会更慢（在没有运行时检查的情况下运行速度更快），在执行过程中也不会使用更多的 CPU（工作在编译时完成）。
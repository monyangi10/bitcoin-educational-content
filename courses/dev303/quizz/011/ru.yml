question: В чем основное преимущество подхода Rust к обеспечению безопасности памяти во время компиляции по сравнению со сборкой мусора?
answer: Он устраняет накладные расходы во время выполнения и непредсказуемые паузы в производительности
wrong_answers:
  - Он использует больше памяти, но обеспечивает лучшие гарантии безопасности
  - Он требует меньше кода для написания, но работает медленнее, чем сборка мусора
  - Он предотвращает все ошибки времени выполнения, но использует больше процессора во время выполнения
explanation: |
  Подход Rust к обеспечению безопасности памяти во время компиляции анализирует код во время компиляции, чтобы обеспечить безопасность памяти без каких-либо затрат во время выполнения. В отличие от сборки мусора, используемой в таких языках, как Java и Go, которая приводит к накладным расходам на производительность и может вызывать непредсказуемые паузы во время выполнения программы, система Rust не оказывает никакого влияния на время выполнения. Другие варианты неверны, потому что Rust на самом деле использует память более эффективно (а не больше), не работает медленнее (она работает быстрее без проверок во время выполнения) и не использует больше процессора во время выполнения (работа выполняется во время компиляции).
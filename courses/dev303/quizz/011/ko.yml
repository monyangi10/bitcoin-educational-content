question: 가비지 컬렉션에 비해 Rust의 컴파일 타임 메모리 안전 접근 방식의 주요 장점은 무엇인가요?
answer: 런타임 오버헤드와 예측할 수 없는 성능 일시 중지를 제거합니다
wrong_answers:
  - 더 많은 메모리를 사용하지만 더 나은 보안을 보장합니다
  - 작성해야 하는 코드가 적지만 가비지 컬렉션보다 느리게 실행됩니다
  - 모든 런타임 오류를 방지하지만 실행 중에 더 많은 CPU를 사용합니다
explanation: |
  Rust의 컴파일 타임 메모리 안전 접근 방식은 컴파일 중에 코드를 분석하여 런타임 비용 없이 메모리 안전을 보장합니다. 성능 오버헤드를 유발하고 프로그램 실행 중 예기치 않은 일시 중지를 유발할 수 있는 Java나 Go와 같은 언어에서 사용되는 가비지 컬렉션과 달리, Rust의 시스템은 런타임에 전혀 영향을 미치지 않습니다. Rust은 실제로 메모리를 더 효율적으로 사용하고(더 많이 사용하지 않음), 실행 속도가 느려지지 않으며(런타임 검사 없이 더 빠르게 실행됨), 실행 중에 더 많은 CPU를 사용하지 않으므로(컴파일 타임에 작업이 수행됨) 다른 옵션은 올바르지 않습니다.
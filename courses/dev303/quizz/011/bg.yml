question: Кое е основното предимство на подхода на Rust за безопасност на паметта по време на компилация в сравнение със събирането на отпадъци?
answer: Той елиминира режийните разходи по време на изпълнение и непредсказуемите паузи в производителността
wrong_answers:
  - Той използва повече памет, но осигурява по-добри гаранции за сигурност
  - Изисква по-малко код за писане, но работи по-бавно от събирането на отпадъци
  - Предотвратява всички грешки по време на изпълнение, но използва повече процесор по време на изпълнение
explanation: |
  Подходът на Rust за безопасност на паметта по време на компилация анализира кода по време на компилация, за да осигури безопасност на паметта без никакви разходи по време на изпълнение. За разлика от събирането на боклук, използвано в езици като Java и Go, което внася наднормени разходи за производителност и може да предизвика непредвидими паузи по време на изпълнението на програмата, системата на Rust има нулево въздействие по време на изпълнение. Другите варианти са некоректни, защото Rust всъщност използва паметта по-ефективно (а не повече), не работи по-бавно (работи по-бързо без проверки по време на изпълнение) и не използва повече процесор по време на изпълнение (работата се извършва по време на компилиране).
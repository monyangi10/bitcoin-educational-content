question: Qual é a principal consequência técnica da filosofia de conceção opinativa do SDK Breez em comparação com a abordagem do kit de ferramentas genérico do LDK para o desenvolvimento do Lightning wallet?
answer: Permite a integração direta de serviços essenciais, como a funcionalidade LSP, no próprio SDK, permitindo a receção imediata de pagamentos sem configuração manual do canal
wrong_answers:
  - Exige que os programadores implementem mais protocolos de rede de baixo nível e algoritmos de encaminhamento de pagamentos em comparação com a utilização de bibliotecas Lightning genéricas
  - Força as aplicações wallet a lidar com a sincronização do gráfico de rede e a gestão da saída de âncora independentemente da implementação subjacente do Lightning
  - É necessária uma implementação personalizada do suporte LNURL e dos serviços de taxas de câmbio, uma vez que os SDKs opinativos não podem incluir integrações de terceiros
explanation: |
  O design opinativo do Breez SDK visa especificamente as aplicações wallet, permitindo-lhe integrar serviços essenciais como a funcionalidade LSP diretamente no SDK. Isto contrasta fortemente com a abordagem genérica do LDK, que exige que os programadores implementem estes serviços separadamente. A integração permite experiências de utilizador perfeitas, como a receção imediata de pagamentos para novas carteiras, enquanto o âmbito alargado do LDK significa que os programadores têm de criar estas funcionalidades específicas do wallet a partir do zero, aumentando significativamente a complexidade do desenvolvimento e o tempo de colocação no mercado.
question: Lightning walletの開発において、LDKの汎用ツールキットのアプローチと比較して、Breez SDKの意見重視の設計思想の主な技術的帰結は何ですか？
answer: SDK自体にLSP機能のような重要なサービスを直接統合することができ、手動でチャネルを設定することなく、即座に支払いを受け取ることができます。
wrong_answers:
  - 汎用的なライトニング・ライブラリを使用する場合と比べて、開発者はより低レベルのネットワーキング・プロトコルや決済ルーティング・アルゴリズムを実装する必要がある。
  - walletアプリケーションは、ライトニングの実装に依存することなく、ネットワークグラフの同期とアンカー出力の管理を行う。
  - オピニオンSDKにはサードパーティの統合を含めることができないため、LNURLサポートと為替レートサービスをカスタムで実装する必要がある。
explanation: |
  Breez SDKは、walletアプリケーションを特にターゲットとした意見設計により、LSP機能のような重要なサービスをSDKに直接統合することができます。これは、開発者がこれらのサービスを個別に実装する必要があるLDKの一般的なアプローチとは対照的です。この統合により、新しいウォレットの即時支払い受付のようなシームレスなユーザー体験が可能になります。一方、LDKの広範な範囲は、開発者がこれらのwallet固有の機能をゼロから構築しなければならないことを意味し、開発の複雑さと市場投入までの時間を大幅に増加させます。
question: 与 LDK 用于 Lightning wallet 开发的通用工具包方法相比，Breez SDK 固执己见的设计理念在技术上的主要后果是什么？
answer: 它可在 SDK 中直接集成 LSP 功能等基本服务，无需手动设置通道即可立即接收付款
wrong_answers:
  - 与使用通用 Lightning 库相比，它要求开发人员实施更多底层网络协议和支付路由算法
  - 它迫使 wallet 应用程序独立于底层 Lightning 实现来处理网络图同步和锚点输出管理。
  - 由于意见 SDK 不能包含第三方集成，因此需要定制实施 LNURL 支持和汇率服务。
explanation: |
  Breez SDK 的意见设计专门针对 wallet 应用程序，使其能够将 LSP 功能等基本服务直接集成到 SDK 中。这与 LDK 的通用方法形成鲜明对比，后者要求开发人员单独实现这些服务。这种集成实现了无缝的用户体验，如新钱包的即时支付接收，而 LDK 的宽泛范围意味着开发人员必须从头开始构建这些 wallet 特有的功能，从而大大增加了开发的复杂性和上市时间。
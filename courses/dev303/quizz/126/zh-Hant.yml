question: 在 Lightning wallet 開發中，與 LDK 的通用工具包方法相比，Breez SDK 有主見的設計理念的主要技術後果是什麼？
answer: 它可在 SDK 內直接整合 LSP 功能等基本服務，無須手動設定通道即可立即接收付款。
wrong_answers:
  - 與使用通用 Lightning 函式庫相比，它需要開發人員實施更多低階網路通訊協定和支付路由演算法。
  - 它強制 wallet 應用程式獨立於底層 Lightning 實作來處理網路圖同步和錨點輸出管理。
  - 由於意見 SDK 無法包含第三方整合，因此必須客製化實作 LNURL 支援和匯率服務。
explanation: |
  Breez SDK 的主見設計特別針對 wallet 應用程式，讓它可以直接將 LSP 功能等基本服務整合到 SDK 中。這與 LDK 的通用方法形成強烈對比，LDK 要求開發人員單獨實作這些服務。整合可實現無縫的使用者體驗，例如立即接收新錢包的付款，而 LDK 的廣泛範圍意味著開發人員必須從頭建立這些 wallet 特定功能，大幅增加開發複雜度和上市時間。
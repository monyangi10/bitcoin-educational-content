question: Каква е основната техническа последица от философията на проектиране на Breez SDK в сравнение с подхода на LDK за разработване на общ инструментариум за Lightning wallet?
answer: Тя позволява директна интеграция на основни услуги като функционалността на LSP в рамките на самия SDK, което позволява незабавно получаване на плащания без ръчна настройка на каналите
wrong_answers:
  - Това изисква от разработчиците да прилагат повече мрежови протоколи на ниско ниво и алгоритми за маршрутизиране на плащания в сравнение с използването на общи библиотеки Lightning
  - Тя принуждава приложенията на wallet да се справят със синхронизацията на мрежовите графики и управлението на изхода на котвата независимо от основната имплементация на Lightning
  - Това налага персонализирано изпълнение на поддръжката на LNURL и услугите за обменни курсове, тъй като SDK с изказано мнение не могат да включват интеграции на трети страни
explanation: |
  Дизайнът на Breez SDK е специално насочен към приложенията на wallet, което му позволява да интегрира основни услуги като LSP функционалност директно в SDK. Това рязко контрастира с общия подход на LDK, който изисква от разработчиците да имплементират тези услуги отделно. Интеграцията дава възможност за безпроблемно потребителско изживяване, като например незабавно получаване на плащания за нови портфейли, докато широкият обхват на LDK означава, че разработчиците трябва да изградят тези специфични за wallet функции от нулата, което значително увеличава сложността на разработката и времето за пускане на пазара.
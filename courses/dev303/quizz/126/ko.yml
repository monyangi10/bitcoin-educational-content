question: LDK의 일반적인 툴킷 접근 방식과 비교하여 Breez SDK의 독창적인 설계 철학의 주요 기술적 결과는 무엇인가요?
answer: SDK 자체 내에서 LSP 기능과 같은 필수 서비스를 직접 통합할 수 있어 수동 채널 설정 없이도 즉시 결제를 받을 수 있습니다
wrong_answers:
  - 개발자는 일반 라이트닝 라이브러리를 사용할 때보다 더 낮은 수준의 네트워킹 프로토콜과 결제 라우팅 알고리즘을 구현해야 합니다
  - wallet 애플리케이션이 기본 Lightning 구현과 독립적으로 네트워크 그래프 동기화 및 앵커 출력 관리를 처리하도록 강제합니다
  - 의견에 따른 SDK에는 타사 통합을 포함할 수 없으므로 LNURL 지원 및 환율 서비스를 맞춤 구현해야 합니다
explanation: |
  Breez SDK는 특히 wallet 애플리케이션을 타깃으로 설계되어 LSP 기능과 같은 필수 서비스를 SDK에 직접 통합할 수 있습니다. 이는 개발자가 이러한 서비스를 별도로 구현해야 하는 LDK의 일반적인 접근 방식과 크게 대조됩니다. 통합을 통해 새로운 지갑에 대한 즉각적인 결제 수락과 같은 원활한 사용자 경험을 제공하는 반면, LDK의 광범위한 범위는 개발자가 이러한 wallet 전용 기능을 처음부터 구축해야 하므로 개발 복잡성과 출시 시간이 크게 늘어납니다.
question: پیامد فنی اصلی فلسفه طراحی نظر محور Breez SDK در مقایسه با رویکرد جعبه ابزار عمومی LDK برای توسعه Lightning wallet چیست؟
answer: این امکان را فراهم می‌کند که خدمات ضروری مانند قابلیت LSP به‌طور مستقیم درون SDK ادغام شوند و دریافت فوری پرداخت‌ها بدون نیاز به تنظیم دستی کانال‌ها را ممکن می‌سازد.
wrong_answers:
  - این نیازمند آن است که توسعه‌دهندگان پروتکل‌های شبکه‌ای سطح پایین‌تر و الگوریتم‌های مسیریابی پرداخت بیشتری را پیاده‌سازی کنند، در مقایسه با استفاده از کتابخانه‌های عمومی لایتنینگ.
  - این برنامه‌ها را مجبور می‌کند تا همگام‌سازی نمودار شبکه و مدیریت خروجی لنگر را به‌طور مستقل از پیاده‌سازی Lightning زیرین انجام دهند.
  - این نیازمند پیاده‌سازی سفارشی پشتیبانی از LNURL و خدمات نرخ تبادل است زیرا SDKهای نظر محور نمی‌توانند ادغام‌های شخص ثالث را شامل شوند.
explanation: |
  طراحی نظر محور Breez SDK به طور خاص برنامه‌های wallet را هدف قرار می‌دهد و به آن اجازه می‌دهد تا خدمات ضروری مانند عملکرد LSP را مستقیماً در SDK ادغام کند. این در تضاد شدید با رویکرد عمومی LDK است که نیاز دارد توسعه‌دهندگان این خدمات را به صورت جداگانه پیاده‌سازی کنند. این ادغام تجربه‌های کاربری بدون درز مانند دریافت فوری پرداخت برای کیف‌پول‌های جدید را ممکن می‌سازد، در حالی که دامنه گسترده LDK به این معناست که توسعه‌دهندگان باید این ویژگی‌های خاص wallet را از ابتدا بسازند، که به طور قابل توجهی پیچیدگی توسعه و زمان عرضه به بازار را افزایش می‌دهد.
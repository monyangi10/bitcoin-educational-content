question: Каковы основные технические последствия философии проектирования Breez SDK, основанной на мнениях, по сравнению с общим подходом LDK к разработке инструментария для Lightning wallet?
answer: Это позволяет напрямую интегрировать основные сервисы, такие как LSP, в сам SDK, обеспечивая немедленный прием платежей без ручной настройки каналов
wrong_answers:
  - Это требует от разработчиков реализации более низкоуровневых сетевых протоколов и алгоритмов маршрутизации платежей по сравнению с использованием общих библиотек Lightning
  - Это заставляет приложения wallet обрабатывать синхронизацию сетевого графа и управление выводом якорей независимо от базовой реализации Lightning
  - Для этого необходимо реализовать поддержку LNURL и сервисы обменных курсов, так как SDK, созданные на основе мнений, не могут включать в себя сторонние интеграции
explanation: |
  Особое внимание в Breez SDK уделяется приложениям wallet, что позволяет интегрировать такие важные сервисы, как LSP, непосредственно в SDK. Это резко контрастирует с общим подходом LDK, который требует от разработчиков реализовывать эти сервисы отдельно. Интеграция обеспечивает бесперебойную работу пользователей, например, немедленный прием платежей на новые кошельки, в то время как широкий охват LDK означает, что разработчики должны создавать эти специфические для wallet функции с нуля, что значительно увеличивает сложность разработки и время выхода на рынок.
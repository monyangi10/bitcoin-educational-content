question: ผลทางเทคนิคหลักของปรัชญาการออกแบบที่มีความเห็นของ Breez SDK เมื่อเปรียบเทียบกับแนวทางชุดเครื่องมือทั่วไปของ LDK สำหรับการพัฒนา Lightning wallet คืออะไร?
answer: ช่วยให้สามารถผสานรวมบริการที่จำเป็น เช่น ฟังก์ชันการทำงานของ LSP ภายใน SDK ได้โดยตรง ทำให้สามารถรับการชำระเงินได้ทันทีโดยไม่ต้องตั้งค่าช่องทางด้วยตนเอง
wrong_answers:
  - มันต้องการให้นักพัฒนาต้องดำเนินการโปรโตคอลเครือข่ายระดับต่ำและอัลกอริธึมการกำหนดเส้นทางการชำระเงินมากขึ้นเมื่อเทียบกับการใช้ไลบรารี Lightning ทั่วไป
  - มันบังคับให้แอปพลิเคชัน wallet จัดการการซิงโครไนซ์กราฟเครือข่ายและการจัดการเอาต์พุตจุดยึดโดยไม่ขึ้นกับการใช้งาน Lightning ที่อยู่เบื้องล่าง
  - จำเป็นต้องมีการพัฒนาการสนับสนุน LNURL และบริการอัตราแลกเปลี่ยนแบบกำหนดเอง เนื่องจาก SDK ที่มีความคิดเห็นไม่สามารถรวมการผสานรวมของบุคคลที่สามได้
explanation: |
  การออกแบบที่มีความเห็นเฉพาะของ Breez SDK มุ่งเป้าไปที่แอปพลิเคชัน wallet โดยเฉพาะ ทำให้สามารถรวมบริการที่จำเป็นเช่นฟังก์ชัน LSP เข้ากับ SDK ได้โดยตรง ซึ่งแตกต่างอย่างมากกับแนวทางทั่วไปของ LDK ที่ต้องการให้นักพัฒนาสร้างบริการเหล่านี้แยกต่างหาก การรวมเข้าด้วยกันนี้ช่วยให้ประสบการณ์ผู้ใช้เป็นไปอย่างราบรื่น เช่น การรับชำระเงินทันทีสำหรับกระเป๋าเงินใหม่ ในขณะที่ขอบเขตที่กว้างของ LDK หมายความว่านักพัฒนาต้องสร้างฟีเจอร์เฉพาะ wallet เหล่านี้ตั้งแต่เริ่มต้น ซึ่งเพิ่มความซับซ้อนในการพัฒนาและเวลาสู่ตลาดอย่างมาก
question: Breezは、Lightningの採用に関するどのような基本的な洞察によって、単一のモバイルアプリの構築からSDKアーキテクチャの開発へとシフトしたのでしょうか？
answer: モバイル・アプリのエコシステムでは、アプリケーション間の通信が容易でないため、専用アプリがライトニングの共有インフラを活用できない。
wrong_answers:
  - モバイル・デバイスには、ライトニング・ノードを確実に動作させるのに十分な計算能力がないため、適切な動作にはクラウドベースのインフラが必要
  - 規制遵守のため、ライトニング機能を個々のモバイルアプリケーションに分散させるのではなく、SDKに一元化する必要がある
  - ユーザー・エクスペリエンス調査の結果、消費者はライトニング決済を個別のアプリではなく、サードパーティ・サービスで管理することを好むことがわかった。
explanation: |
  正解は、オリジナルのBreezアプリを通じて発見されたアーキテクチャ上の重要な制限を特定するものです。モバイルエコシステムではアプリ間の通信が容易ではないため、開発者はLightningインフラストラクチャを共有する特別なアプリケーションを作成するのではなく、すべてのLightning機能を単一のアプリに組み込むことを余儀なくされます。この洞察が、複数のアプリが同じLightningノードに接続できるようにするSDKアプローチにつながった。間違った答えは、技術的な制限、規制上の問題、またはユーザーの嗜好に焦点を当てていますが、これらはSDKモデルへの戦略的シフトを推進した基本的なアーキテクチャの洞察ではありませんでした。
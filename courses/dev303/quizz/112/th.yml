question: ข้อมูลเชิงลึกพื้นฐานเกี่ยวกับการนำ Lightning มาใช้ที่ทำให้ Breez เปลี่ยนจากการสร้างแอปมือถือเดียวไปสู่การพัฒนาโครงสร้าง SDK คืออะไร?
answer: ระบบนิเวศของแอปพลิเคชันบนมือถือไม่ได้เอื้อต่อการสื่อสารระหว่างแอปพลิเคชันได้อย่างง่ายดาย ทำให้แอปเฉพาะทางไม่สามารถใช้ประโยชน์จากโครงสร้างพื้นฐาน Lightning ที่ใช้ร่วมกันได้
wrong_answers:
  - อุปกรณ์เคลื่อนที่ขาดพลังการประมวลผลที่เพียงพอในการรันโหนด Lightning อย่างน่าเชื่อถือ จำเป็นต้องใช้อินฟราสตรัคเจอร์บนคลาวด์เพื่อการทำงานที่เหมาะสม
  - การปฏิบัติตามกฎระเบียบต้องการให้ฟังก์ชันการทำงานของ Lightning ถูกรวมศูนย์ใน SDKs แทนที่จะกระจายไปยังแอปพลิเคชันมือถือแต่ละตัว
  - การวิจัยประสบการณ์ผู้ใช้แสดงให้เห็นว่าผู้บริโภคชอบให้การชำระเงินด้วย Lightning ถูกจัดการโดยบริการของบุคคลที่สามมากกว่าแอปพลิเคชันแต่ละตัว
explanation: |
  คำตอบที่ถูกต้องระบุข้อจำกัดทางสถาปัตยกรรมที่สำคัญที่ค้นพบผ่านแอป Breez ดั้งเดิม: ระบบนิเวศมือถือไม่อนุญาตให้มีการสื่อสารระหว่างแอปได้ง่าย ทำให้นักพัฒนาต้องสร้างฟีเจอร์ Lightning ทั้งหมดในแอปเดียวแทนที่จะสร้างแอปพลิเคชันเฉพาะที่แชร์โครงสร้างพื้นฐานของ Lightning ข้อมูลเชิงลึกนี้นำไปสู่แนวทาง SDK ที่ช่วยให้แอปหลายตัวสามารถเชื่อมต่อกับโหนด Lightning เดียวกันได้ คำตอบที่ผิดมุ่งเน้นไปที่ข้อจำกัดทางเทคนิค ปัญหาด้านกฎระเบียบ หรือความชอบของผู้ใช้ แต่สิ่งเหล่านี้ไม่ใช่ข้อมูลเชิงลึกทางสถาปัตยกรรมพื้นฐานที่ผลักดันให้เกิดการเปลี่ยนแปลงเชิงกลยุทธ์ไปสู่โมเดล SDK
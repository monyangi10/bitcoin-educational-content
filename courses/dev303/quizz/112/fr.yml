question: Quelle intuition fondamentale concernant l'adoption de Lightning a conduit Breez à passer de la construction d'une application mobile unique au développement d'une architecture SDK ?
answer: L'écosystème des applications mobiles ne facilite pas la communication entre les applications, ce qui empêche les applications spécialisées de tirer parti de l'infrastructure Lightning partagée
wrong_answers:
  - Les appareils mobiles ne disposent pas d'une puissance de calcul suffisante pour faire fonctionner les nœuds Lightning de manière fiable, ce qui nécessite une infrastructure en nuage pour un fonctionnement correct
  - La conformité réglementaire exige que la fonctionnalité Lightning soit centralisée dans des SDK plutôt que distribuée dans des applications mobiles individuelles
  - Une étude sur l'expérience des utilisateurs a montré que les consommateurs préfèrent que les paiements Lightning soient gérés par des services tiers plutôt que par des applications individuelles
explanation: |
  La bonne réponse identifie la principale limite architecturale découverte grâce à l'application Breez originale : les écosystèmes mobiles ne permettent pas une communication inter-applications aisée, ce qui oblige les développeurs à intégrer toutes les fonctionnalités Lightning dans des applications uniques plutôt que de créer des applications spécialisées qui partagent l'infrastructure Lightning. Cette constatation a conduit à l'approche SDK permettant à plusieurs applications de se connecter au même nœud Lightning. Les mauvaises réponses se concentrent sur les limitations techniques, les questions réglementaires ou les préférences des utilisateurs, mais ce n'est pas l'idée architecturale fondamentale qui a conduit au changement stratégique vers un modèle SDK.
question: Какой фундаментальный вывод о внедрении Lightning заставил Breez перейти от создания одного мобильного приложения к разработке архитектуры SDK?
answer: Экосистема мобильных приложений не способствует легкому обмену информацией между приложениями, не позволяя специализированным приложениям использовать общую инфраструктуру Lightning
wrong_answers:
  - Мобильные устройства не обладают достаточной вычислительной мощностью для надежной работы узлов Lightning, поэтому для их нормальной работы требуется облачная инфраструктура
  - Соответствие нормативным требованиям требует, чтобы функциональность Lightning была централизована в SDK, а не распределялась по отдельным мобильным приложениям
  - Исследование пользовательского опыта показало, что потребители предпочитают, чтобы молниеносными платежами управляли сторонние сервисы, а не отдельные приложения
explanation: |
  Правильный ответ указывает на ключевое архитектурное ограничение, обнаруженное в оригинальном приложении Breez: мобильные экосистемы не позволяют легко взаимодействовать между приложениями, что вынуждает разработчиков встраивать все функции Lightning в отдельные приложения, а не создавать специализированные приложения, совместно использующие инфраструктуру Lightning. Это понимание привело к созданию SDK, позволяющего нескольким приложениям подключаться к одному узлу Lightning. Неправильные ответы сосредоточены на технических ограничениях, нормативных вопросах или предпочтениях пользователей, но не они были основополагающими архитектурными идеями, которые привели к стратегическому переходу на модель SDK.
question: 라이트닝 도입에 대한 근본적인 인사이트를 통해 Breez가 단일 모바일 앱 구축에서 SDK 아키텍처 개발로 전환하게 된 계기는 무엇인가요?
answer: 모바일 앱 생태계는 애플리케이션 간 통신이 용이하지 않아 특수 앱이 공유된 Lightning 인프라를 활용하지 못합니다
wrong_answers:
  - 모바일 디바이스에는 라이트닝 노드를 안정적으로 실행하기에 충분한 컴퓨팅 성능이 부족하므로 적절한 운영을 위해 클라우드 기반 인프라가 필요합니다
  - 규정을 준수하려면 개별 모바일 애플리케이션에 분산되지 않고 SDK에 Lightning 기능을 중앙 집중화해야 합니다
  - 사용자 경험 조사에 따르면 소비자들은 개별 앱보다는 타사 서비스에서 Lightning 결제를 관리하는 것을 더 선호합니다
explanation: |
  정답은 원래 Breez 앱을 통해 발견한 주요 아키텍처의 한계, 즉 모바일 에코시스템은 앱 간 통신을 쉽게 허용하지 않아 개발자가 모든 Lightning 기능을 단일 앱으로 구축하는 대신 Lightning 인프라를 공유하는 전문 애플리케이션을 만들도록 강요한다는 점을 파악하고 있습니다. 이러한 인사이트를 바탕으로 여러 앱이 동일한 Lightning 노드에 연결할 수 있는 SDK 접근 방식이 탄생했습니다. 오답은 기술적 한계, 규제 문제 또는 사용자 선호도에 초점을 맞추고 있지만, 이는 SDK 모델로의 전략적 전환을 이끈 근본적인 아키텍처 통찰력이 아니었습니다.
question: چه بینش بنیادی درباره پذیرش لایتنینگ باعث شد Breez از ساخت یک اپلیکیشن موبایل واحد به توسعه یک معماری SDK تغییر جهت دهد؟
answer: اکوسیستم برنامه‌های موبایل ارتباط آسان بین برنامه‌ها را تسهیل نمی‌کند و مانع از آن می‌شود که برنامه‌های تخصصی از زیرساخت مشترک Lightning بهره‌برداری کنند.
wrong_answers:
  - دستگاه‌های همراه فاقد قدرت محاسباتی کافی برای اجرای قابل‌اعتماد نودهای لایتنینگ هستند و برای عملکرد صحیح به زیرساخت مبتنی بر ابر نیاز دارند.
  - انطباق مقرراتی نیاز دارد که عملکرد Lightning در SDKها متمرکز شود و نه اینکه در برنامه‌های موبایل جداگانه توزیع شود.
  - تحقیقات تجربه کاربری نشان داد که مصرف‌کنندگان ترجیح می‌دهند پرداخت‌های Lightning توسط خدمات شخص ثالث مدیریت شود تا برنامه‌های فردی.
explanation: |
  پاسخ صحیح محدودیت کلیدی معماری را که از طریق اپلیکیشن اصلی Breez کشف شد، شناسایی می‌کند: اکوسیستم‌های موبایل اجازه ارتباط آسان بین اپلیکیشن‌ها را نمی‌دهند و توسعه‌دهندگان را مجبور می‌کنند تا تمام ویژگی‌های Lightning را در اپلیکیشن‌های واحد بسازند، به جای اینکه اپلیکیشن‌های تخصصی ایجاد کنند که زیرساخت Lightning را به اشتراک بگذارند. این بینش منجر به رویکرد SDK شد که به چندین اپلیکیشن اجازه می‌دهد به یک نود Lightning متصل شوند. پاسخ‌های نادرست بر محدودیت‌های فنی، مسائل نظارتی یا ترجیحات کاربر تمرکز دارند، اما این‌ها بینش معماری بنیادی نبودند که تغییر استراتژیک به مدل SDK را هدایت کردند.
question: Кое фундаментално прозрение за приемането на Lightning накара Breez да премине от изграждане на единично мобилно приложение към разработване на SDK архитектура?
answer: Екосистемата за мобилни приложения не улеснява лесната комуникация между приложенията, което пречи на специализираните приложения да използват споделената инфраструктура на Lightning
wrong_answers:
  - Мобилните устройства не разполагат с достатъчна изчислителна мощност, за да управляват надеждно възлите на Lightning, което изисква инфраструктура, базирана на облак, за правилното им функциониране
  - Спазването на нормативните изисквания изисква функционалността на Lightning да бъде централизирана в SDK, а не да бъде разпределена в отделни мобилни приложения
  - Проучване на потребителския опит показа, че потребителите предпочитат плащанията с мълния да се управляват от услуги на трети страни, а не от отделни приложения
explanation: |
  Правилният отговор идентифицира ключовото архитектурно ограничение, открито чрез оригиналното приложение Breez: мобилните екосистеми не позволяват лесна комуникация между приложенията, което принуждава разработчиците да вграждат всички функции на Lightning в отделни приложения, вместо да създават специализирани приложения, които споделят инфраструктурата на Lightning. Това прозрение доведе до подхода на SDK, позволяващ на множество приложения да се свързват с един и същ Lightning възел. Грешните отговори се фокусират върху техническите ограничения, регулаторните въпроси или предпочитанията на потребителите, но не те бяха основното архитектурно прозрение, което доведе до стратегическото преминаване към SDK модела.
question: 對於 Lightning 的採用，有什麼基本的見解促使 Breez 從建立單一的行動應用程式轉向開發 SDK 架構？
answer: 行動應用程式生態系統無法促進應用程式之間的簡易溝通，使專門應用程式無法利用共用的 Lightning 基礎架構
wrong_answers:
  - 行動裝置缺乏足夠的運算能力來可靠地執行 Lightning 節點，因此需要雲端基礎架構才能正常運作
  - 法規遵循要求將 Lightning 功能集中在 SDK 中，而不是分散在各個行動應用程式中
  - 使用者體驗研究顯示，消費者偏好由第三方服務管理 Lightning 付款，而非個別應用程式
explanation: |
  正確答案指出透過原始 Breez 應用程式所發現的關鍵架構限制：行動生態系統不允許應用程式間輕鬆溝通，迫使開發人員將所有 Lightning 功能建置在單一應用程式中，而非建立共享 Lightning 基礎架構的專門應用程式。這一洞察力促成了 SDK 方法，使多個應用程式能夠連接至同一 Lightning 節點。錯誤答案的重點在於技術限制、法規問題或使用者偏好，但這些都不是驅使策略轉向 SDK 模式的基本架構洞察力。
question: 关于 Lightning 应用的哪些基本见解促使 Breez 从构建单一移动应用程序转向开发 SDK 架构？
answer: 移动应用程序生态系统不便于应用程序之间的通信，导致专用应用程序无法利用共享的 "闪电 "基础设施
wrong_answers:
  - 移动设备缺乏足够的计算能力来可靠地运行照明节点，因此需要基于云的基础设施才能正常运行
  - 监管合规性要求 "闪电 "功能集中在 SDK 中，而不是分布在各个移动应用程序中
  - 用户体验研究表明，消费者更喜欢由第三方服务管理闪电支付，而不是单个应用程序
explanation: |
  正确答案指出了通过最初的Breez应用程序发现的关键架构限制：移动生态系统不允许应用程序之间轻松通信，这迫使开发人员在单个应用程序中构建所有Lightning功能，而不是创建共享Lightning基础架构的专用应用程序。这一洞察力促成了SDK方法，使多个应用程序能够连接到同一个Lightning节点。错误的答案主要集中在技术限制、监管问题或用户偏好上，但这些并不是推动向SDK模式战略转变的根本架构见解。
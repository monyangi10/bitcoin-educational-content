question: लाइटनिंग को अपनाने के बारे में किस मूलभूत अंतर्दृष्टि ने Breez को एक एकल मोबाइल ऐप बनाने से SDK आर्किटेक्चर विकसित करने की ओर अग्रसर किया?
answer: मोबाइल ऐप इकोसिस्टम विभिन्न एप्लिकेशनों के बीच आसान संचार की सुविधा नहीं देता है, जिससे विशिष्ट ऐप्स साझा लाइटनिंग इन्फ्रास्ट्रक्चर का लाभ उठाने में असमर्थ हो जाते हैं।
wrong_answers:
  - मोबाइल उपकरणों में लाइटनिंग नोड्स को विश्वसनीय रूप से चलाने के लिए पर्याप्त कंप्यूटिंग शक्ति नहीं होती है, इसलिए उनके सुचारू संचालन के लिए क्लाउड-आधारित बुनियादी ढांचे की आवश्यकता होती है।
  - नियामक अनुपालन के लिए आवश्यक है कि लाइटनिंग की कार्यक्षमता को अलग-अलग मोबाइल एप्लिकेशन में वितरित करने के बजाय SDK में केंद्रीकृत किया जाए।
  - उपयोगकर्ता अनुभव अनुसंधान से पता चला है कि उपभोक्ता व्यक्तिगत ऐप्स के बजाय तृतीय-पक्ष सेवाओं द्वारा लाइटनिंग भुगतान प्रबंधित करवाना पसंद करते हैं।
explanation: |
  सही उत्तर मूल Breez ऐप के माध्यम से खोजी गई प्रमुख वास्तुशिल्पीय सीमा को दर्शाता है: मोबाइल इकोसिस्टम में ऐप्स के बीच आसान संचार संभव नहीं है, जिसके कारण डेवलपर्स को लाइटनिंग इन्फ्रास्ट्रक्चर साझा करने वाले विशेष एप्लिकेशन बनाने के बजाय सभी लाइटनिंग सुविधाओं को एक ही ऐप में शामिल करना पड़ता है। इसी जानकारी के आधार पर SDK दृष्टिकोण अपनाया गया, जिससे कई ऐप्स एक ही लाइटनिंग नोड से जुड़ सकते हैं। गलत उत्तर तकनीकी सीमाओं, नियामक मुद्दों या उपयोगकर्ता प्राथमिकताओं पर केंद्रित हैं, लेकिन ये वे मूलभूत वास्तुशिल्पीय जानकारी नहीं थीं जिनके कारण SDK मॉडल की ओर रणनीतिक बदलाव हुआ।
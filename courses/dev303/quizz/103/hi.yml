question: LDK की मॉड्यूलर कंपोनेंट आर्किटेक्चर किस प्रकार लाइटनिंग ट्रांजैक्शन के लिए हार्डवेयर सिक्योरिटी मॉड्यूल (HSM) इंटीग्रेशन को सक्षम बनाती है?
answer: लाइटनिंग लेनदेन के संदर्भ और सुरक्षा निहितार्थों का विश्लेषण करने वाले विशिष्ट हस्ताक्षर घटकों को निकालने की अनुमति देकर।
wrong_answers:
  - एक पूर्ण HSM daemon प्रदान करके जो स्वतंत्र रूप से चलता है और एन्क्रिप्टेड चैनलों के माध्यम से संचार करता है
  - क्रिप्टोग्राफिक कार्यों के लिए HSM चिपसेट के साथ सीधे इंटरफेस करने वाले हार्डवेयर-विशिष्ट ड्राइवरों को लागू करके।
  - HSM वातावरण के भीतर ही लाइटनिंग प्रोटोकॉल लॉजिक को पूरी तरह से निष्पादित करने वाले पृथक सैंडबॉक्स बनाकर।
explanation: |
  LDK का मॉड्यूलर डिज़ाइन डेवलपर्स को HSM एकीकरण के लिए केवल लेनदेन हस्ताक्षर और सत्यापन घटकों को निकालने की अनुमति देता है। इससे लाइटनिंग-सक्षम हस्ताक्षर उपकरण बनाना संभव होता है जो साधारण हस्ताक्षर से परे लेनदेन संदर्भ को समझते हैं - वे मूल्यांकन कर सकते हैं कि कोई लेनदेन वैध भुगतान, रूटिंग संचालन या संभावित सुरक्षा खतरों का प्रतिनिधित्व करता है या नहीं। अन्य विकल्प मोनोलिथिक या हार्डवेयर-विशिष्ट दृष्टिकोणों का वर्णन करते हैं जो LDK के लचीले, मॉड्यूलर सिद्धांत के विपरीत हैं, जो पूर्ण समाधानों के बजाय संयोजनीय घटक प्रदान करता है।
question: LDK의 모듈형 컴포넌트 아키텍처는 어떻게 Lightning 트랜잭션에 하드웨어 보안 모듈(HSM)을 통합할 수 있나요?
answer: Lightning 트랜잭션 컨텍스트와 보안 영향을 분석할 수 있는 특정 서명 구성 요소를 추출할 수 있습니다
wrong_answers:
  - 독립적으로 실행되고 암호화된 채널을 통해 통신하는 완벽한 HSM daemon을 제공함으로써 다음과 같은 이점을 누릴 수 있습니다
  - 암호화 작업을 위해 HSM 칩셋과 직접 인터페이스하는 하드웨어 전용 드라이버를 구현하여 다음과 같은 작업을 수행합니다
  - HSM 환경 내에서 전적으로 라이트닝 프로토콜 로직을 실행하는 격리된 샌드박스를 생성하여 다음과 같이 할 수 있습니다
explanation: |
  LDK의 모듈식 설계를 통해 개발자는 HSM 통합을 위한 트랜잭션 서명 및 검증 구성 요소만 추출할 수 있습니다. 이를 통해 단순한 서명을 넘어 거래 컨텍스트를 이해하는 Lightning 인식 서명 장치를 만들 수 있으며, 거래가 합법적인 결제, 라우팅 작업 또는 잠재적인 보안 위협을 나타내는지 여부를 평가할 수 있습니다. 다른 옵션은 모놀리식 또는 하드웨어별 접근 방식을 설명하는데, 이는 완전한 솔루션이 아닌 구성 가능한 구성 요소를 제공한다는 LDK의 유연한 모듈식 철학과 모순됩니다.
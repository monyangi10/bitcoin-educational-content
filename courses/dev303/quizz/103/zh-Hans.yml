question: LDK 的模块化组件架构如何实现 Lightning 交易的硬件安全模块 (HSM) 集成？
answer: 允许提取可分析照明交易背景和安全影响的特定签名组件
wrong_answers:
  - 通过提供独立运行并通过加密通道通信的完整 HSM daemon
  - 实施特定于硬件的驱动程序，直接与 HSM 芯片组连接，进行加密操作
  - 创建完全在 HSM 环境中执行闪电协议逻辑的隔离沙箱
explanation: |
  LDK 的模块化设计允许开发人员只提取交易签名和验证组件，以便与 HSM 集成。这样就能创建 "闪电感知 "签名设备，这些设备不仅能进行简单的签名，还能了解交易上下文--它们可以评估交易是否代表合法支付、路由操作或潜在的安全威胁。其他选项描述的是单片或硬件特定方法，与 LDK 灵活、模块化的理念相悖，即提供可组合的组件而非完整的解决方案。
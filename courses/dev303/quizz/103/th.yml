question: สถาปัตยกรรมโมดูลาร์ของ LDK ช่วยให้การรวมโมดูลความปลอดภัยฮาร์ดแวร์ (HSM) สำหรับการทำธุรกรรม Lightning ได้อย่างไร?
answer: โดยอนุญาตให้สกัดส่วนประกอบการลงนามเฉพาะที่สามารถวิเคราะห์บริบทของธุรกรรม Lightning และผลกระทบด้านความปลอดภัย
wrong_answers:
  - โดยการจัดหา HSM daemon ที่สมบูรณ์ซึ่งทำงานอย่างอิสระและสื่อสารผ่านช่องทางที่เข้ารหัส
  - โดยการใช้งานไดรเวอร์เฉพาะทางฮาร์ดแวร์ที่เชื่อมต่อโดยตรงกับชิปเซ็ต HSM สำหรับการดำเนินการเข้ารหัสลับ
  - โดยการสร้างแซนด์บ็อกซ์ที่แยกออกมา ซึ่งดำเนินการตรรกะของโปรโตคอล Lightning ทั้งหมดภายในสภาพแวดล้อม HSM
explanation: |
  การออกแบบแบบแยกส่วนของ LDK ช่วยให้นักพัฒนาสามารถแยกเฉพาะส่วนประกอบการลงนามและการตรวจสอบธุรกรรมสำหรับการรวม HSM ได้ สิ่งนี้ช่วยให้สามารถสร้างอุปกรณ์ลงนามที่รับรู้ Lightning ซึ่งเข้าใจบริบทของธุรกรรมมากกว่าการลงนามอย่างง่าย - พวกเขาสามารถประเมินได้ว่าธุรกรรมนั้นเป็นการชำระเงินที่ถูกต้องตามกฎหมาย การดำเนินการกำหนดเส้นทาง หรือภัยคุกคามด้านความปลอดภัยที่อาจเกิดขึ้นหรือไม่ ตัวเลือกอื่น ๆ อธิบายถึงแนวทางที่เป็นเอกภาพหรือเฉพาะฮาร์ดแวร์ซึ่งขัดแย้งกับปรัชญาแบบแยกส่วนที่ยืดหยุ่นของ LDK ในการจัดหาส่วนประกอบที่ประกอบได้แทนที่จะเป็นโซลูชันที่สมบูรณ์
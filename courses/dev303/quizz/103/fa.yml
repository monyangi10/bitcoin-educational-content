question: معماری مؤلفه‌ای مدولار LDK چگونه امکان یکپارچه‌سازی ماژول امنیتی سخت‌افزار (HSM) را برای تراکنش‌های Lightning فراهم می‌کند؟
answer: با اجازه دادن به استخراج اجزای امضای خاص که می‌توانند زمینه تراکنش لایتنینگ و پیامدهای امنیتی را تحلیل کنند
wrong_answers:
  - با ارائه یک HSM daemon کامل که به صورت مستقل اجرا می‌شود و از طریق کانال‌های رمزگذاری شده ارتباط برقرار می‌کند
  - با پیاده‌سازی درایورهای خاص سخت‌افزاری که به‌طور مستقیم با چیپ‌ست‌های HSM برای عملیات رمزنگاری ارتباط برقرار می‌کنند
  - با ایجاد سندباکس‌های ایزوله که منطق پروتکل لایتنینگ را به‌طور کامل در محیط HSM اجرا می‌کنند
explanation: |
  طراحی ماژولار LDK به توسعه‌دهندگان اجازه می‌دهد تا تنها اجزای امضای تراکنش و تأیید را برای یکپارچه‌سازی با HSM استخراج کنند. این امکان ایجاد دستگاه‌های امضای آگاه به لایتنینگ را فراهم می‌کند که فراتر از امضای ساده، زمینه تراکنش را درک می‌کنند - آن‌ها می‌توانند ارزیابی کنند که آیا یک تراکنش نمایانگر پرداخت‌های قانونی، عملیات مسیریابی یا تهدیدات امنیتی بالقوه است. گزینه‌های دیگر رویکردهای یکپارچه یا خاص سخت‌افزاری را توصیف می‌کنند که با فلسفه انعطاف‌پذیر و ماژولار LDK در ارائه اجزای ترکیبی به جای راه‌حل‌های کامل، در تضاد هستند.
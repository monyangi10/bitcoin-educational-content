question: LDK 的模組化元件架構如何實現 Lightning 交易的硬體安全模組 (HSM) 整合？
answer: 允許擷取特定簽章元件，以分析照明交易情境和安全影響
wrong_answers:
  - 透過提供完整的 HSM daemon，可獨立執行並透過加密通道進行通訊
  - 透過實作特定硬體的驅動程式，直接與 HSM 晶片組連接，進行加密操作
  - 透過建立完全在 HSM 環境中執行 Lightning 通訊協定邏輯的隔離沙盒
explanation: |
  LDK 的模組化設計允許開發人員僅抽取交易簽章和驗證元件進行 HSM 整合。這樣就能建立 Lightning 感知簽章裝置，除了簡單的簽章之外，還能瞭解交易情境 - 可以評估交易是否代表合法付款、路由操作或潛在的安全威脅。其他選項描述的是單一或特定硬體的方法，與 LDK 靈活、模組化的理念相違背，即提供可組合的元件，而非完整的解決方案。
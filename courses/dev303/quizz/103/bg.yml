question: Как модулната архитектура на компонентите на LDK позволява интегрирането на хардуерен модул за сигурност (HSM) за трансакциите Lightning?
answer: Като позволява извличането на специфични компоненти за подписване, които могат да анализират контекста на транзакцията Lightning и последиците за сигурността
wrong_answers:
  - Предоставяне на цялостен HSM daemon, който работи независимо и комуникира чрез криптирани канали
  - Чрез прилагане на специфични за хардуера драйвери, които директно взаимодействат с чипсетите на HSM за криптографски операции
  - Чрез създаване на изолирани пясъчни кутии, които изпълняват логиката на протокола Lightning изцяло в средата на HSM
explanation: |
  Модулният дизайн на LDK позволява на разработчиците да извличат само компонентите за подписване и проверка на транзакции за интегриране на HSM. Това дава възможност за създаване на устройства за подписване, които разбират контекста на транзакциите отвъд простото подписване - те могат да преценят дали дадена транзакция представлява легитимни плащания, маршрутизиращи операции или потенциални заплахи за сигурността. Другите варианти описват монолитни или специфични за хардуера подходи, които противоречат на гъвкавата, модулна философия на LDK за предоставяне на съставни компоненти, а не на цялостни решения.
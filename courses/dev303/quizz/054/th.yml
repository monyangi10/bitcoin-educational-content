question: ในสถานการณ์ใดที่ RefCell จะถูกใช้อย่างเหมาะสมที่สุดเพื่อแก้ไขข้อจำกัดการยืมในเวลาคอมไพล์?
answer: เมื่อใช้งานวัตถุจำลองที่จำเป็นต้องติดตามการเปลี่ยนแปลงสถานะภายในผ่านอินเทอร์เฟซลักษณะเฉพาะที่ไม่เปลี่ยนแปลง
wrong_answers:
  - เมื่อคุณต้องการแชร์ข้อมูลระหว่างเธรดหลายตัวและต้องการการนับอ้างอิงแบบอะตอมมิก
  - เมื่อคุณต้องการหลีกเลี่ยงค่าใช้จ่ายในขณะรันไทม์โดยการย้ายการตรวจสอบการยืมทั้งหมดไปยังเวลาคอมไพล์
  - เมื่อสร้างการอ้างอิงแบบวงกลมระหว่างโครงสร้างข้อมูลที่ต้องการการทำความสะอาดหน่วยความจำอัตโนมัติ
explanation: |
  RefCell ได้รับการออกแบบมาสำหรับสถานการณ์ที่ต้องการการเปลี่ยนแปลงข้อมูลภายในผ่านการอ้างอิงที่ไม่เปลี่ยนแปลง โดยเฉพาะเมื่อการวิเคราะห์แบบสถิตของคอมไพเลอร์มีความระมัดระวังเกินไป วัตถุจำลองที่ใช้คุณลักษณะที่มีวิธีการที่ไม่เปลี่ยนแปลงแต่ต้องการติดตามสถานะภายในเป็นกรณีการใช้งานที่สมบูรณ์แบบ ตัวเลือกอื่นๆ ไม่ถูกต้อง: RefCell ไม่ปลอดภัยต่อเธรด, มันย้ายการตรวจสอบไปยังเวลาใช้งาน (ไม่ใช่เวลาเขียนโปรแกรม), และมันไม่ได้แก้ปัญหาการอ้างอิงแบบวงกลม - มันอาจจะมีส่วนทำให้เกิดปัญหาเมื่อใช้ร่วมกับ RC.
question: در چه سناریویی استفاده از RefCell برای حل محدودیت‌های وام‌گیری در زمان کامپایل مناسب‌تر است؟
answer: هنگام پیاده‌سازی یک شیء ساختگی که نیاز به ردیابی تغییرات وضعیت داخلی از طریق یک رابط ویژگی تغییرناپذیر دارد
wrong_answers:
  - وقتی نیاز دارید داده‌ها را بین چندین رشته به اشتراک بگذارید و به شمارش مرجع اتمی نیاز دارید
  - وقتی می‌خواهید با انتقال تمام بررسی‌های قرض به زمان کامپایل، از سربار زمان اجرا جلوگیری کنید
  - هنگام ایجاد ارجاعات دایره‌ای بین ساختارهای داده که نیاز به پاکسازی خودکار حافظه دارند
explanation: |
  RefCell برای سناریوهای تغییرپذیری داخلی طراحی شده است که در آن نیاز دارید داده‌ها را از طریق یک ارجاع غیرقابل تغییر تغییر دهید، به‌ویژه زمانی که تحلیل استاتیک کامپایلر بیش از حد محافظه‌کارانه است. اشیاء ساختگی که ویژگی‌هایی با متدهای غیرقابل تغییر را پیاده‌سازی می‌کنند اما نیاز به ردیابی وضعیت داخلی دارند، یک مورد استفاده عالی را نشان می‌دهند. گزینه‌های دیگر نادرست هستند: RefCell ایمن در برابر نخ نیست، بررسی را به زمان اجرا منتقل می‌کند (نه زمان کامپایل)، و مشکلات ارجاع دایره‌ای را حل نمی‌کند - در واقع می‌تواند زمانی که با RC ترکیب می‌شود به آن‌ها کمک کند.
question: В каком сценарии RefCell будет наиболее уместно использовать для решения ограничения на заимствование во время компиляции?
answer: При реализации имитационного объекта, который должен отслеживать изменения внутреннего состояния через неизменяемый интерфейс трейта
wrong_answers:
  - Если вам нужно обмениваться данными между несколькими потоками и требуется атомарный подсчет ссылок
  - Если вы хотите избежать накладных расходов во время выполнения, перенеся проверку заимствований на время компиляции
  - При создании циклических ссылок между структурами данных, которые нуждаются в автоматической очистке памяти
explanation: |
  RefCell предназначен для сценариев внутренней мутабельности, когда вам нужно изменять данные через неизменяемую ссылку, особенно когда статический анализ компилятора слишком консервативен. Макетные объекты, реализующие трейты с неизменяемыми методами, но нуждающиеся в отслеживании внутреннего состояния, представляют собой идеальный вариант использования. Остальные варианты неверны: RefCell не является потокобезопасным, он переносит проверку на время выполнения (а не на время компиляции), и он не решает проблемы с круговыми ссылками - в сочетании с RC он может их усугубить.
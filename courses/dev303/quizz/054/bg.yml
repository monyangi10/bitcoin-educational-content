question: В кой сценарий RefCell би бил най-подходящ за решаване на ограничение за заемане по време на компилация?
answer: Когато имплементирате обект-присмехулник, който трябва да проследява промените във вътрешното състояние чрез неизменен интерфейс на черта
wrong_answers:
  - Когато трябва да споделяте данни между няколко нишки и се нуждаете от атомично отчитане на референциите
  - Когато искате да избегнете режийни разходи по време на изпълнение, като преместите цялата проверка за заемане в момента на компилиране
  - При създаване на кръгови препратки между структури от данни, които се нуждаят от автоматично почистване на паметта
explanation: |
  RefCell е проектиран за сценарии с вътрешна променливост, при които е необходимо да се променят данни чрез неизменна референция, особено когато статичният анализ на компилатора е твърде консервативен. Мокетираните обекти, които имплементират черти с неизменни методи, но трябва да следят вътрешното състояние, представляват идеален случай на употреба. Другите варианти са неправилни: RefCell не е безопасен за нишки, премества проверката към времето на изпълнение (а не към времето на компилация) и не решава проблемите с кръговите референции - всъщност може да допринесе за тях, когато се комбинира с RC.
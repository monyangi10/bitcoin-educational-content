question: 在什麼情況下，RefCell 最適合用來解決編譯時借用限制？
answer: 當實作一個需要透過不可變的特徵介面來追蹤內部狀態變更的模擬物件時
wrong_answers:
  - 當您需要在多個線程之間共用資料，並且需要原子參照計數時
  - 當您想要將所有借用檢查移至編譯時，以避免執行時開銷時
  - 在需要自動清理記憶體的資料結構之間建立循環參考時
explanation: |
  RefCell 專為內部可變性情況所設計，在這種情況下，您需要透過不可變的參照來變更資料，尤其是當編譯器的靜態分析過於保守時。實作具有不可變方法的 traits 但需要追蹤內部狀態的 Mock 物件就是一個完美的使用案例。其他選項都不對：RefCell 不是線程安全的，它將檢查移到執行時（而非編譯時），而且它無法解決循環引用的問題 - 當與 RC 結合時，它實際上會造成這些問題。
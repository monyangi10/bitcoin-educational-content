question: 在哪种情况下，使用 RefCell 解决编译时借用限制最合适？
answer: 在实现需要通过不可变特质接口跟踪内部状态变化的模拟对象时
wrong_answers:
  - 当您需要在多个线程之间共享数据并需要原子引用计数时
  - 当您想通过将所有借用检查移至编译时来避免运行时开销时
  - 在需要自动清理内存的数据结构之间创建循环引用时
explanation: |
  RefCell 专为内部可变性设计，在这种情况下，您需要通过不可变引用来更改数据，尤其是当编译器的静态分析过于保守时。使用不可变方法实现特质但需要跟踪内部状态的模拟对象就是一个很好的用例。其他选项都不正确：RefCell 并不是线程安全的，它将检查转移到了运行时（而不是编译时），而且它并不能解决循环引用问题--与 RC 结合使用时，它实际上会助长循环引用问题。
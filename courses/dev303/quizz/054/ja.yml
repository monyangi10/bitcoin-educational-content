question: コンパイル時の借用制限を解決するためにRefCellを使用する場合、どのようなシナリオが最も適切でしょうか？
answer: イミュータブル・トレイト・インターフェイスを通じて内部状態の変化を追跡する必要があるモック・オブジェクトを実装する場合
wrong_answers:
  - 複数のスレッド間でデータを共有する必要があり、アトミックな参照カウントが必要な場合
  - すべての借用チェックをコンパイル時に移すことで、実行時のオーバーヘッドを回避したい場合
  - 自動メモリ・クリーンアップが必要なデータ構造間で循環参照を作成する場合
explanation: |
  RefCellは、特にコンパイラの静的解析が保守的すぎる場合に、イミュータブルな参照を通じてデータを変更する必要がある、内部ミュータビリティのシナリオのために設計されています。イミュータブル・メソッドを持つtraitを実装しているが、内部の状態を追跡する必要があるモック・オブジェクトは、完璧なユースケースです。他の選択肢は正しくない：RefCellはスレッドセーフではないし、チェックを（コンパイル時ではなく）実行時に移すし、循環参照の問題を解決するわけでもない。
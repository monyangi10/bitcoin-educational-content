question: 어떤 시나리오에서 컴파일 시간 차용 제한을 해결하기 위해 RefCell을 가장 적절하게 사용할 수 있을까요?
answer: 불변 특성 인터페이스를 통해 내부 상태 변화를 추적해야 하는 모의 오브젝트를 구현하는 경우
wrong_answers:
  - 여러 스레드 간에 데이터를 공유해야 하고 원자 참조 카운팅이 필요한 경우
  - 모든 차용 검사를 컴파일 시간으로 이동하여 런타임 오버헤드를 피하려는 경우
  - 자동 메모리 정리가 필요한 데이터 구조 간에 순환 참조를 생성하는 경우
explanation: |
  RefCell은 변경 불가능한 참조를 통해 데이터를 변경해야 하는 내부 변경성 시나리오, 특히 컴파일러의 정적 분석이 너무 보수적인 경우에 적합하도록 설계되었습니다. 변경 불가능한 메서드로 특성을 구현하지만 내부 상태를 추적해야 하는 모의 객체가 완벽한 사용 사례입니다. 다른 옵션은 올바르지 않습니다: RefCell은 스레드에 안전하지 않고, 컴파일 시간이 아닌 런타임으로 검사를 이동하며, 순환 참조 문제를 해결하지 못하지만 RC와 결합하면 실제로 문제를 일으킬 수 있습니다.
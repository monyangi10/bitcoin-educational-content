question: जब किसी Bitcoin एप्लिकेशन को अमान्य इनपुट त्रुटि का सामना करना पड़ता है, जैसे कि किसी ऐसे फ़ील्ड के लिए नकारात्मक मान प्राप्त करना जिसके लिए केवल धनात्मक पूर्णांकों की आवश्यकता होती है, तो सबसे उपयुक्त प्रतिक्रिया क्या होगी?
answer: इनपुट को अस्वीकार करें और कॉलर को त्रुटि संकेत लौटाएं।
wrong_answers:
  - ऋणात्मक मान को उसके निरपेक्ष मान में परिवर्तित करें और प्रक्रिया जारी रखें।
  - त्रुटि को रिकॉर्ड करें, लेकिन डिफ़ॉल्ट मान का उपयोग करके ऑपरेशन जारी रखें।
  - डेटा खराब होने से बचाने के लिए पूरे एप्लिकेशन को तुरंत बंद कर दें।
explanation: |
  अमान्य इनपुट त्रुटियाँ कॉलर और फ़ंक्शन के बीच अनुबंध उल्लंघन को दर्शाती हैं, जहाँ दिए गए पैरामीटर फ़ंक्शन की आवश्यकताओं को पूरा नहीं करते हैं। सही तरीका यह है कि इनपुट को अस्वीकार कर दिया जाए और त्रुटि का संकेत दिया जाए, जिससे कॉलर स्थिति को उचित रूप से संभाल सके। ऋणात्मक मानों को धनात्मक मानों में परिवर्तित करने से त्रुटि छिप जाती है और अनपेक्षित व्यवहार हो सकता है। डिफ़ॉल्ट मानों का उपयोग करने से कॉलर के इरादे की अनदेखी होती है और गलत डेटा संसाधित हो सकता है। इनपुट सत्यापन विफलताओं के लिए पूरे एप्लिकेशन को बंद करना अत्यधिक है और Bitcoin अनुप्रयोगों में खराब उपयोगकर्ता अनुभव उत्पन्न करेगा जहाँ त्रुटि प्रबंधन अत्यंत महत्वपूर्ण है।
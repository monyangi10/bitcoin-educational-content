question: Какъв е най-подходящият отговор, когато приложението Bitcoin се сблъска с грешка за невалидно въвеждане, например получаване на отрицателна стойност за поле, което изисква само положителни цели числа?
answer: Отхвърляне на входа и връщане на индикация за грешка на викащия
wrong_answers:
  - Преобразувайте отрицателната стойност в абсолютна стойност и продължете обработката
  - Регистрирайте грешката, но продължете операцията, като използвате стойност по подразбиране
  - Незабавно прекратяване на цялото приложение, за да се предотврати повреда на данните
explanation: |
  Грешките за невалиден вход представляват нарушения на договора между викащия и функцията, при които предоставените параметри не отговарят на изискванията на функцията. Правилният подход е да се отхвърли входът и да се върне индикация за грешка, като се позволи на викащия да се справи със ситуацията по подходящ начин. Превръщането на отрицателни стойности в положителни безшумно прикрива грешката и може да доведе до непредвидено поведение. Използването на стойности по подразбиране пренебрегва намерението на викащия и може да обработи неправилни данни. Прекратяването на цялото приложение е прекомерно при неуспехи при валидиране на входни данни и би създало лошо потребителско преживяване в Bitcoin приложенията, в които е изключително важно да се обработват грешките по подходящ начин.
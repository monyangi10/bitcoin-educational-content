question: 當 Bitcoin 應用程式遇到無效輸入錯誤時，最適當的回應是什麼？
answer: 拒絕輸入，並傳回錯誤訊息給呼叫者
wrong_answers:
  - 將負值轉換為絕對值，然後繼續處理
  - 記錄錯誤，但使用預設值繼續操作
  - 立即終止整個應用程式，以防止資料損毀
explanation: |
  無效輸入錯誤代表呼叫者與函式之間違反契約，即所提供的參數不符合函式的要求。正確的做法是拒絕輸入並傳回錯誤訊息，允許呼叫者適當地處理情況。將負值轉換為正值會無聲地掩蓋錯誤，並可能導致非預期的行為。使用預設值會忽略呼叫者的意圖，並可能處理不正確的資料。終止整個應用程式對於輸入驗證失敗是過度的，而且會在優雅錯誤處理非常重要的 Bitcoin 應用程式中造成不佳的使用者體驗。
question: Bitcoinアプリケーションが無効な入力エラーに遭遇した場合、例えば、正の整数値しか必要としないフィールドに負の値が入力された場合、最も適切な応答は何でしょうか？
answer: 入力を拒否し、呼び出し元にエラー表示を返す。
wrong_answers:
  - 負の値を絶対値に変換し、処理を続ける。
  - エラーをログに記録するが、デフォルト値を使用して処理を続行する。
  - データの破損を防ぐため、アプリケーション全体を即座に終了させる。
explanation: |
  無効な入力エラーは、提供されたパラメータが関数の要件を満たしていない場合、呼び出し側と関数の間の契約違反を表します。正しいアプローチは、入力を拒否してエラー表示を返し、呼び出し元が状況を適切に処理できるようにすることです。負の値を正の値に変換すると、エラーが隠蔽され、意図しない動作につながる可能性があります。デフォルト値の使用は、呼び出し元の意図を無視し、誤ったデータを処理する可能性がある。アプリケーション全体を終了させることは、入力検証の失敗に対して過剰であり、グレースフル・エラーハンドリングが重要であるBitcoinアプリケーションにおいて、貧弱なユーザーエクスペリエンスを生み出すことになる。
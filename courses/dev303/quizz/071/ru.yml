question: Каков наиболее подходящий ответ, когда приложение Bitcoin сталкивается с ошибкой недопустимого ввода, например, получает отрицательное значение для поля, которое требует только положительных целых чисел?
answer: Отклонить входные данные и вернуть вызывающей стороне сообщение об ошибке
wrong_answers:
  - Преобразуйте отрицательное значение в его абсолютное значение и продолжите обработку
  - Зафиксируйте ошибку, но продолжите операцию, используя значение по умолчанию
  - Немедленно завершите работу всего приложения, чтобы предотвратить повреждение данных
explanation: |
  Ошибки недопустимого ввода представляют собой нарушение контракта между вызывающей стороной и функцией, когда предоставленные параметры не соответствуют требованиям функции. Правильным подходом является отклонение ввода и возврат сообщения об ошибке, что позволяет вызывающей функции соответствующим образом разрешить ситуацию. Преобразование отрицательных значений в положительные молча маскирует ошибку и может привести к нежелательному поведению. Использование значений по умолчанию игнорирует намерения вызывающей стороны и может привести к обработке некорректных данных. Завершение работы всего приложения является чрезмерным для ошибок проверки ввода и может привести к ухудшению пользовательского опыта в приложениях Bitcoin, где очень важна изящная обработка ошибок.
question: คำตอบที่เหมาะสมที่สุดเมื่อแอปพลิเคชัน Bitcoin พบข้อผิดพลาดในการป้อนข้อมูลที่ไม่ถูกต้อง เช่น การได้รับค่าลบสำหรับฟิลด์ที่ต้องการเฉพาะจำนวนเต็มบวกคืออะไร?
answer: ปฏิเสธข้อมูลที่ป้อนและส่งคืนข้อผิดพลาดให้กับผู้เรียก
wrong_answers:
  - แปลงค่าลบให้เป็นค่าบวกและดำเนินการต่อ
  - บันทึกข้อผิดพลาดแต่ดำเนินการต่อด้วยค่าเริ่มต้น
  - ยุติการทำงานของแอปพลิเคชันทั้งหมดทันทีเพื่อป้องกันการเสียหายของข้อมูล
explanation: |
  ข้อผิดพลาดของข้อมูลที่ไม่ถูกต้องแสดงถึงการละเมิดสัญญาระหว่างผู้เรียกและฟังก์ชัน ซึ่งพารามิเตอร์ที่ให้มาไม่ตรงตามข้อกำหนดของฟังก์ชัน วิธีที่ถูกต้องคือการปฏิเสธข้อมูลที่ป้อนและส่งคืนข้อบ่งชี้ข้อผิดพลาด เพื่อให้ผู้เรียกสามารถจัดการสถานการณ์ได้อย่างเหมาะสม การแปลงค่าลบเป็นค่าบวกโดยไม่แจ้งเตือนจะปกปิดข้อผิดพลาดและอาจนำไปสู่พฤติกรรมที่ไม่ตั้งใจ การใช้ค่าดีฟอลต์จะเพิกเฉยต่อเจตนาของผู้เรียกและอาจประมวลผลข้อมูลที่ไม่ถูกต้อง การยุติแอปพลิเคชันทั้งหมดเป็นการกระทำที่เกินความจำเป็นสำหรับความล้มเหลวในการตรวจสอบข้อมูลที่ป้อน และจะสร้างประสบการณ์ผู้ใช้ที่ไม่ดีในแอปพลิเคชัน Bitcoin ซึ่งการจัดการข้อผิดพลาดอย่างราบรื่นเป็นสิ่งสำคัญ
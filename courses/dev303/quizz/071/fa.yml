question: مناسب‌ترین پاسخ زمانی که یک برنامه Bitcoin با خطای ورودی نامعتبر مواجه می‌شود، مانند دریافت یک مقدار منفی برای فیلدی که فقط به اعداد صحیح مثبت نیاز دارد، چیست؟
answer: ورودی را رد کنید و یک نشانه خطا به فراخوان ارسال کنید
wrong_answers:
  - مقدار منفی را به مقدار مطلق آن تبدیل کرده و پردازش را ادامه دهید.
  - خطا را ثبت کنید اما عملیات را با استفاده از یک مقدار پیش‌فرض ادامه دهید
  - بلافاصله کل برنامه را متوقف کنید تا از خرابی داده‌ها جلوگیری شود.
explanation: |
  خطاهای ورودی نامعتبر نشان‌دهنده نقض قرارداد بین فراخوان و تابع هستند، جایی که پارامترهای ارائه‌شده با نیازهای تابع مطابقت ندارند. رویکرد صحیح این است که ورودی را رد کرده و یک نشانه خطا برگردانید، به طوری که فراخوان بتواند وضعیت را به‌درستی مدیریت کند. تبدیل مقادیر منفی به مثبت به‌طور خاموش خطا را پنهان می‌کند و می‌تواند به رفتار ناخواسته منجر شود. استفاده از مقادیر پیش‌فرض نیت فراخوان را نادیده می‌گیرد و ممکن است داده‌های نادرست را پردازش کند. خاتمه دادن به کل برنامه برای شکست‌های اعتبارسنجی ورودی بیش از حد است و تجربه کاربری ضعیفی در برنامه‌های Bitcoin ایجاد می‌کند، جایی که مدیریت خطای مناسب ضروری است.
question: Ni inyishu iyihe ibereye iyo igikorwa ca Bitcoin gihuye n’ikosa ry’injiza ritagira akamaro, nk’ukwakira agaciro kabi k’umurima usaba gusa imibare yose y’ukuri?
answer: Wanka ivyo winjije maze usubize ikimenyetso c'ikosa ku wuhamagara
wrong_answers:
  - Guhindura agaciro kabi mu gaciro kayo nyako maze ukomeze gukora
  - Gushiramwo ikosa ariko ubandanye n'igikorwa ukoresheje agaciro mburabuzi
  - Guhagarika porogaramu yose ubwo nyene kugira ngo wirinde gusesagura amakuru
explanation: |
  Amakosa y'injiza atagira akamaro agereranya ukurenga ku masezerano hagati y'uwuhamagara n'igikorwa, aho ibipimo vyatanzwe bidahuye n'ibisabwa n'igikorwa. Uburyo bwiza ni ubwo kwanka ivyo winjije maze ugasubiza ikimenyetso c’ikosa, bigatuma uwuhamagara ashobora gufata neza ivyo bintu. Guhindura agaciro kabi ngo kabe keza birapfuka ikosa mu gacerere kandi vyoshobora gutuma umuntu agira inyifato ataco yiyumviriye. Gukoresha agaciro mburabuzi birengagiza umugambi w'uwuhamagara kandi bishobora gukora amakuru atari yo. Guhagarika porogaramu yose ni ikintu kirenze urugero kubera ukunanirwa kwemeza ivyinjijwe kandi vyotuma abakoresha bagira ubumenyi buke mu porogaramu za Bitcoin aho gutorera umuti amakosa ari ngirakamaro.
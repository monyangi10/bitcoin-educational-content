question: 当 Bitcoin 应用程序遇到无效输入错误时，例如在一个只需要正整数的字段中收到一个负值，最合适的响应是什么？
answer: 拒绝输入并向调用者返回错误提示
wrong_answers:
  - 将负值转换为绝对值并继续处理
  - 记录错误，但使用默认值继续执行操作
  - 立即终止整个应用程序，防止数据损坏
explanation: |
  无效输入错误代表调用者与函数之间的违约行为，即所提供的参数不符合函数的要求。正确的做法是拒绝输入并返回错误提示，允许调用者适当处理这种情况。将负值转换为正值会无声地掩盖错误，并可能导致意外行为。使用默认值会忽略调用者的意图，并可能处理错误数据。对于输入验证失败来说，终止整个应用程序是过分的，而且会给 Bitcoin 应用程序带来糟糕的用户体验，因为在这种应用程序中，优雅的错误处理至关重要。
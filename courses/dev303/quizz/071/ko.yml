question: 양수만 필요한 필드에 음수 값이 수신되는 등 Bitcoin 애플리케이션에 잘못된 입력 오류가 발생하는 경우 가장 적절한 응답은 무엇인가요?
answer: 입력을 거부하고 호출자에게 오류 표시를 반환합니다
wrong_answers:
  - 음수 값을 절대값으로 변환하고 처리를 계속합니다
  - 오류를 기록하되 기본값을 사용하여 작업을 계속 진행합니다
  - 데이터 손상을 방지하기 위해 전체 애플리케이션을 즉시 종료하세요
explanation: |
  잘못된 입력 오류는 제공된 매개변수가 함수의 요구 사항을 충족하지 않는 호출자와 함수 간의 계약 위반을 나타냅니다. 올바른 접근 방식은 입력을 거부하고 오류 표시를 반환하여 호출자가 상황을 적절히 처리할 수 있도록 하는 것입니다. 음수 값을 양수 값으로 변환하면 오류가 은폐되어 의도하지 않은 동작이 발생할 수 있습니다. 기본값을 사용하면 호출자의 의도를 무시하고 잘못된 데이터를 처리할 수 있습니다. 입력 유효성 검사 실패에 대해 전체 애플리케이션을 종료하는 것은 과도하며, 우아한 오류 처리가 중요한 Bitcoin 애플리케이션에서 사용자 경험이 저하될 수 있습니다.
question: ลักษณะสำคัญที่ทำให้ closures ทรงพลังใน Rust คืออะไร?
answer: ความสามารถของพวกเขาในการจับตัวแปรจากสภาพแวดล้อมรอบข้าง
wrong_answers:
  - ความสามารถของพวกเขาในการวิ่งได้เร็วกว่าฟังก์ชันปกติ
  - ความสามารถของพวกเขาในการจัดการการจัดสรรหน่วยความจำโดยอัตโนมัติ
  - ความสามารถของพวกเขาในการดำเนินการโค้ดในเธรดคู่ขนาน
explanation: |
  ลักษณะพื้นฐานที่ทำให้ closures ทรงพลังคือความสามารถในการ "ปิดทับ" สภาพแวดล้อมของพวกมัน หมายความว่าพวกมันสามารถเข้าถึงและใช้ตัวแปรที่มีอยู่ในขอบเขตที่ closure ถูกกำหนดไว้ได้ ความสามารถในการจับนี้ทำให้ closures สามารถรักษาสถานะและบริบทจากสภาพแวดล้อมที่สร้างขึ้น ทำให้มีความยืดหยุ่นมากกว่าฟังก์ชันทั่วไป แม้ว่า closures สามารถปรับให้เหมาะสมสำหรับประสิทธิภาพและใช้ในบริบทของการ threading ได้ แต่สิ่งเหล่านี้เป็นประโยชน์รอง - พลังหลักของพวกมันมาจากการจับตัวแปรสภาพแวดล้อม
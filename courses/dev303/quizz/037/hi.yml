question: Rust में क्लोजर को शक्तिशाली बनाने वाली प्राथमिक विशेषता क्या है?
answer: अपने आस-पास के वातावरण से विभिन्न कारकों को ग्रहण करने की उनकी क्षमता
wrong_answers:
  - उनकी सामान्य कार्यों की तुलना में तेज़ दौड़ने की क्षमता
  - मेमोरी आवंटन को स्वचालित रूप से संभालने की उनकी क्षमता
  - समानांतर थ्रेड्स में कोड निष्पादित करने की उनकी क्षमता
explanation: |
  क्लोज़र की सबसे बड़ी खूबी यह है कि वे अपने परिवेश पर नियंत्रण कर सकते हैं, यानी वे उस दायरे में मौजूद वैरिएबल्स को एक्सेस और इस्तेमाल कर सकते हैं जहां क्लोज़र को परिभाषित किया गया है। यह क्षमता क्लोज़र को उनके निर्माण परिवेश से स्थिति और संदर्भ बनाए रखने की अनुमति देती है, जिससे वे सामान्य फ़ंक्शंस की तुलना में कहीं अधिक लचीले हो जाते हैं। हालांकि क्लोज़र को प्रदर्शन के लिए अनुकूलित किया जा सकता है और थ्रेडिंग संदर्भों में उपयोग किया जा सकता है, ये गौण लाभ हैं - उनकी मुख्य शक्ति परिवेशीय वैरिएबल कैप्चर से आती है।
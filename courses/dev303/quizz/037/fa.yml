question: ویژگی اصلی که closures را در Rust قدرتمند می‌سازد چیست؟
answer: توانایی آنها در ضبط متغیرها از محیط اطرافشان
wrong_answers:
  - توانایی آن‌ها برای اجرا سریع‌تر از توابع معمولی
  - توانایی آن‌ها در مدیریت خودکار تخصیص حافظه
  - توانایی آنها در اجرای کد در رشته‌های موازی
explanation: |
  ویژگی اساسی که closures را قدرتمند می‌سازد، توانایی آن‌ها در "بستن بر روی" محیط خود است، به این معنا که آن‌ها می‌توانند به متغیرهایی که در حوزه‌ای که closure تعریف شده است وجود دارند، دسترسی داشته و از آن‌ها استفاده کنند. این قابلیت ضبط به closures اجازه می‌دهد تا حالت و زمینه را از محیط ایجاد خود حفظ کنند، که آن‌ها را بسیار انعطاف‌پذیرتر از توابع معمولی می‌سازد. در حالی که closures می‌توانند برای عملکرد بهینه‌سازی شوند و در زمینه‌های threading استفاده شوند، این‌ها مزایای ثانویه هستند - قدرت اصلی آن‌ها از ضبط متغیرهای محیطی ناشی می‌شود.
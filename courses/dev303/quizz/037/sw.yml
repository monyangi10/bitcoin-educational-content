question: Ni sifa gani kuu inayofanya kufungwa kuwa na nguvu katika Rust?
answer: Uwezo wao wa kunasa vigeu kutoka kwa mazingira yanayowazunguka
wrong_answers:
  - Uwezo wao wa kufanya kazi kwa kasi zaidi kuliko kazi za kawaida
  - Uwezo wao wa kushughulikia kiotomatiki ugawaji wa kumbukumbu
  - Uwezo wao wa kutekeleza msimbo katika nyuzi sambamba
explanation: |
  Sifa ya msingi inayofanya kufungwa kuwa na nguvu ni uwezo wao wa "kufunga" mazingira yao, ikimaanisha kuwa wanaweza kufikia na kutumia vigeu vilivyopo katika wigo ambapo kufungwa kunafafanuliwa. Uwezo huu wa kunasa huruhusu kufungwa kudumisha hali na muktadha kutoka kwa mazingira yao ya uundaji, na kuvifanya kuwa rahisi zaidi kuliko vitendaji vya kawaida. Ingawa kufungwa kunaweza kuboreshwa kwa utendaji na kutumika katika miktadha ya kuzungusha, hizi ni faida za pili - nguvu zao kuu hutokana na kunasa vigeu vya mazingira.
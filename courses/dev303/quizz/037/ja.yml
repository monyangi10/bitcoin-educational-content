question: Rustでクロージャを強力なものにしている主な特徴は？
answer: 周囲の環境から変数を取り込む能力
wrong_answers:
  - 通常の機能よりも高速に動作する能力
  - メモリ割り当てを自動的に処理する機能
  - 並列スレッドでのコード実行能力
explanation: |
  つまり、クロージャが定義されたスコープに存在する変数にアクセスし、それを使用することができる。このキャプチャ機能により、クロージャは作成環境からステートとコンテキストを維持することができ、通常の関数よりもはるかに柔軟性が高くなります。クロージャはパフォーマンスを最適化したり、スレッディング・コンテキストで使用することができますが、これらは二次的な利点です。
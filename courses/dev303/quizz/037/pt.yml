question: Qual é a principal caraterística que torna os fechos poderosos no Rust?
answer: A sua capacidade de captar variáveis do ambiente circundante
wrong_answers:
  - A sua capacidade de funcionar mais rapidamente do que as funções normais
  - A sua capacidade de tratar automaticamente a atribuição de memória
  - A sua capacidade de executar código em threads paralelas
explanation: |
  A caraterística fundamental que torna as closures poderosas é a sua capacidade de "fechar" o seu ambiente, o que significa que podem aceder e utilizar variáveis que existem no âmbito em que a closure é definida. Esta capacidade de captura permite que as closures mantenham o estado e o contexto do seu ambiente de criação, tornando-as muito mais flexíveis do que as funções regulares. Embora as closures possam ser optimizadas para desempenho e utilizadas em contextos de threading, estes são benefícios secundários - o seu poder central vem da captura de variáveis ambientais.
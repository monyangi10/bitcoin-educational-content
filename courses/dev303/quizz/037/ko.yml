question: Rust에서 클로저를 강력하게 만드는 주요 특징은 무엇인가요?
answer: 주변 환경의 변수를 포착하는 능력
wrong_answers:
  - 일반 함수보다 빠르게 실행되는 기능
  - 메모리 할당을 자동으로 처리하는 기능
  - 병렬 스레드에서 코드를 실행하는 기능
explanation: |
  클로저를 강력하게 만드는 근본적인 특징은 클로저가 정의된 범위에 존재하는 변수에 액세스하고 사용할 수 있는 환경을 "클로즈 오버"할 수 있다는 점입니다. 이러한 캡처 기능을 통해 클로저는 생성 환경의 상태와 컨텍스트를 유지할 수 있으므로 일반 함수보다 훨씬 더 유연하게 사용할 수 있습니다. 클로저는 성능을 최적화하고 스레딩 컨텍스트에서 사용할 수 있지만 이는 부차적인 이점이며, 클로저의 핵심 기능은 환경 변수 캡처에서 비롯됩니다.
question: 在 Rust 中，當變數的所有權移到另一個變數時，該變數會發生什麼變化？
answer: 原始變數變得無效，無法再使用。
wrong_answers:
  - 原始變數變成資料的唯讀參照
  - 兩個變數共用所有權，並可獨立修改資料
  - 原始變數會自動轉換為可變參照
explanation: |
  當擁有權在 Rust 中被移動時，原本的變數會完全失效，無法再被存取。這是一個基本的安全功能，可以防止多個變數管理相同的堆記憶體，這可能會導致 use-after-free bug 或 double-free 錯誤。移動操作會將控制權完全轉移到新變數上，如果在移動之後您嘗試使用原始變數，編譯器會產生錯誤。這與複製 (兩個變數都保持有效) 和借用 (原始擁有者保留所有權) 不同。
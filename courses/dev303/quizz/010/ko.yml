question: Rust에서 소유권이 다른 변수로 이동하면 변수는 어떻게 되나요?
answer: 원래 변수가 유효하지 않게 되어 더 이상 사용할 수 없게 됩니다
wrong_answers:
  - 원래 변수는 데이터에 대한 읽기 전용 참조가 됩니다
  - 두 변수 모두 소유권을 공유하며 독립적으로 데이터를 수정할 수 있습니다
  - 원래 변수는 자동으로 변경 가능한 참조로 변환됩니다
explanation: |
  Rust에서 소유권이 이동하면 원래 변수는 완전히 무효화되어 더 이상 액세스할 수 없게 됩니다. 이는 여러 변수가 동일한 힙 메모리를 관리하는 것을 방지하는 근본적인 안전 기능으로, 사용 후 버그 또는 이중 오류를 유발할 수 있습니다. 이동 작업은 새 변수에 대한 완전한 제어권을 이전하며, 이동 후 원래 변수를 사용하려고 하면 컴파일러에서 오류를 생성합니다. 이는 두 변수가 모두 유효한 복사 및 차용(원래 소유자가 소유권을 유지하는)과는 다릅니다.
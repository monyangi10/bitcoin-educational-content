question: Rustで所有権が別の変数に移った場合、変数はどうなるのか？
answer: 元の変数は無効となり、使用できなくなる。
wrong_answers:
  - 元の変数は、データへの読み取り専用参照となる。
  - 両方の変数が所有権を共有し、独立してデータを変更できる
  - 元の変数は自動的に変更可能な参照に変換される。
explanation: |
  Rustで所有権が移動すると、元の変数は完全に無効となり、それ以上アクセスできなくなる。これは、複数の変数が同じヒープ・メモリを管理することで、use-after-freeバグやdouble-freeエラーを引き起こすことを防ぐための基本的な安全機能です。移動操作によって制御は完全に新しい変数に移され、移動後に元の変数を使おうとするとコンパイラーはエラーを出します。これは、コピー（両方の変数が有効なまま）や借用（元の所有者が所有権を保持する）とは異なります。
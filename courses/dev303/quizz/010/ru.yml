question: Что происходит с переменной, когда право собственности переходит к другой переменной в Rust?
answer: Исходная переменная становится недействительной и больше не может использоваться
wrong_answers:
  - Исходная переменная становится ссылкой на данные только для чтения
  - Обе переменные имеют общую собственность и могут изменять данные независимо друг от друга
  - Исходная переменная автоматически преобразуется в изменяемую ссылку
explanation: |
  При перемещении права собственности в Rust исходная переменная становится полностью недействительной и к ней больше нельзя обращаться. Это фундаментальная функция безопасности, которая не позволяет нескольким переменным управлять одной и той же памятью кучи, что может привести к ошибкам use-after-free или double-free. Операция перемещения полностью передает управление новой переменной, и компилятор выдаст ошибку, если вы попытаетесь использовать исходную переменную после перемещения. Это отличается от копирования (когда обе переменные остаются действительными) и заимствования (когда первоначальный владелец сохраняет право собственности).
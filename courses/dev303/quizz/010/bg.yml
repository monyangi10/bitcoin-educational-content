question: Какво се случва с дадена променлива, когато собствеността се прехвърли към друга променлива в Rust?
answer: Оригиналната променлива става невалидна и не може да се използва повече
wrong_answers:
  - Първоначалната променлива се превръща в препратка само за четене към данните
  - Двете променливи споделят собствеността и могат да променят данните независимо
  - Първоначалната променлива се преобразува автоматично в променлива референция
explanation: |
  Когато собствеността се премести в Rust, оригиналната променлива става напълно невалидна и вече не може да бъде достъпна. Това е фундаментална функция за безопасност, която предотвратява управлението на една и съща памет на купчината от няколко променливи, което може да доведе до грешки, свързани с използването на променливите или до грешки, свързани с двойното освобождаване. Операцията за преместване прехвърля пълния контрол върху новата променлива и компилаторът ще генерира грешка, ако се опитате да използвате оригиналната променлива след преместването. Това се различава от копирането (при което и двете променливи остават валидни) и заемането (при което първоначалният собственик запазва собствеността си).
question: Rust में किसी वेरिएबल का स्वामित्व दूसरे वेरिएबल को स्थानांतरित करने पर क्या होता है?
answer: मूल वेरिएबल अमान्य हो जाता है और अब इसका उपयोग नहीं किया जा सकता है।
wrong_answers:
  - मूल वेरिएबल डेटा का केवल पढ़ने योग्य संदर्भ बन जाता है।
  - दोनों चर स्वामित्व साझा करते हैं और डेटा को स्वतंत्र रूप से संशोधित कर सकते हैं।
  - मूल वेरिएबल स्वचालित रूप से एक परिवर्तनीय संदर्भ में परिवर्तित हो जाता है।
explanation: |
  Rust में जब स्वामित्व स्थानांतरित होता है, तो मूल चर पूरी तरह से अमान्य हो जाता है और उसे पुनः एक्सेस नहीं किया जा सकता है। यह एक मूलभूत सुरक्षा विशेषता है जो एक ही हीप मेमोरी को कई चरों द्वारा प्रबंधित होने से रोकती है, जिससे उपयोग-आफ्टर-फ्री बग या डबल-फ्री त्रुटियां हो सकती हैं। स्थानांतरण प्रक्रिया पूर्ण नियंत्रण नए चर को हस्तांतरित कर देती है, और स्थानांतरण के बाद मूल चर का उपयोग करने का प्रयास करने पर कंपाइलर त्रुटि उत्पन्न करेगा। यह कॉपी करने (जहां दोनों चर मान्य रहते हैं) और उधार लेने (जहां मूल स्वामी स्वामित्व बनाए रखता है) से भिन्न है।
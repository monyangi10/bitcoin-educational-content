question: จะเกิดอะไรขึ้นกับตัวแปรเมื่อการเป็นเจ้าของถูกย้ายไปยังตัวแปรอื่นใน Rust?
answer: ตัวแปรเดิมกลายเป็นโมฆะและไม่สามารถใช้งานได้อีกต่อไป
wrong_answers:
  - ตัวแปรเดิมกลายเป็นการอ้างอิงแบบอ่านอย่างเดียวไปยังข้อมูล
  - ทั้งสองตัวแปรมีการเป็นเจ้าของร่วมกันและสามารถแก้ไขข้อมูลได้อย่างอิสระ
  - ตัวแปรดั้งเดิมจะถูกแปลงเป็นการอ้างอิงที่เปลี่ยนแปลงได้โดยอัตโนมัติ
explanation: |
  เมื่อการเป็นเจ้าของถูกย้ายใน Rust ตัวแปรเดิมจะกลายเป็นโมฆะโดยสมบูรณ์และไม่สามารถเข้าถึงได้อีกต่อไป นี่เป็นคุณสมบัติความปลอดภัยพื้นฐานที่ป้องกันไม่ให้ตัวแปรหลายตัวจัดการหน่วยความจำ heap เดียวกัน ซึ่งอาจนำไปสู่ข้อผิดพลาดการใช้หลังจากการปล่อยหรือข้อผิดพลาดการปล่อยซ้ำ การดำเนินการย้ายจะโอนการควบคุมทั้งหมดไปยังตัวแปรใหม่ และคอมไพเลอร์จะสร้างข้อผิดพลาดหากคุณพยายามใช้ตัวแปรเดิมหลังจากการย้าย นี่แตกต่างจากการคัดลอก (ซึ่งตัวแปรทั้งสองยังคงใช้ได้) และการยืม (ซึ่งเจ้าของเดิมยังคงรักษาการเป็นเจ้าของ)
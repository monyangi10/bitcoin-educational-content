question: وقتی مالکیت یک متغیر در Rust به متغیر دیگری منتقل می‌شود، چه اتفاقی می‌افتد؟
answer: متغیر اصلی نامعتبر می‌شود و دیگر نمی‌توان از آن استفاده کرد.
wrong_answers:
  - متغیر اصلی به یک مرجع فقط خواندنی به داده تبدیل می‌شود.
  - هر دو متغیر مالکیت را به اشتراک می‌گذارند و می‌توانند به‌طور مستقل داده‌ها را تغییر دهند.
  - متغیر اصلی به طور خودکار به یک مرجع قابل تغییر تبدیل می‌شود
explanation: |
  هنگامی که مالکیت در Rust منتقل می‌شود، متغیر اصلی به‌طور کامل نامعتبر می‌شود و دیگر قابل دسترسی نیست. این یک ویژگی ایمنی اساسی است که از مدیریت حافظه heap توسط چندین متغیر جلوگیری می‌کند، که می‌تواند منجر به باگ‌های استفاده پس از آزادسازی یا خطاهای آزادسازی دوباره شود. عملیات انتقال، کنترل کامل را به متغیر جدید منتقل می‌کند و اگر سعی کنید از متغیر اصلی پس از انتقال استفاده کنید، کامپایلر خطا تولید خواهد کرد. این با کپی کردن (که در آن هر دو متغیر معتبر باقی می‌مانند) و قرض گرفتن (که در آن مالک اصلی مالکیت را حفظ می‌کند) متفاوت است.
question: 在 Rust 中，当一个变量的所有权转移到另一个变量时，该变量会发生什么变化？
answer: 原始变量失效，无法继续使用
wrong_answers:
  - 原始变量成为数据的只读引用
  - 两个变量共享所有权，可独立修改数据
  - 原始变量会自动转换为可变引用
explanation: |
  当所有权在 Rust 中转移时，原来的变量将完全失效，无法再被访问。这是一个基本的安全特性，可以防止多个变量管理相同的堆内存，从而避免出现 "使用后释放"（use-after-free）错误或 "双重释放"（double-free）错误。移动操作会将控制权完全转移到新变量，如果在移动后试图使用原变量，编译器会产生错误。这与复制（两个变量都保持有效）和借用（原所有者保留所有权）不同。
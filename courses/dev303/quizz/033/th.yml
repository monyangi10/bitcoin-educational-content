question: ตัวแปรสภาพแวดล้อมใดที่สามารถตั้งค่าเพื่อแสดงการติดตามสแต็กการเรียกที่สมบูรณ์เมื่อเกิด panic ใน Rust?
answer: RUST_BACKTRACE
wrong_answers:
  - RUST_STACKTRACE
  - RUST_DEBUG_TRACE
  - RUST_PANIC_TRACE
explanation: |
  RUST_BACKTRACE เป็นตัวแปรสภาพแวดล้อมที่ถูกต้องซึ่งให้ข้อมูลการดีบักเพิ่มเติมโดยการแสดงสแต็กการเรียกทั้งหมดที่นำไปสู่การแพนิค ซึ่งช่วยให้นักพัฒนาติดตามได้อย่างแม่นยำว่าลำดับการเรียกฟังก์ชันใดที่ทำให้เกิดข้อผิดพลาด ตัวเลือกอื่น ๆ (RUST_STACKTRACE, RUST_DEBUG_TRACE, และ RUST_PANIC_TRACE) ไม่ใช่ตัวแปรสภาพแวดล้อม Rust ที่ถูกต้องและจะไม่สร้างผลลัพธ์การดีบักใด ๆ เมื่อเกิดการแพนิค
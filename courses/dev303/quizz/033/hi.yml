question: Rust में पैनिक होने पर संपूर्ण कॉल स्टैक ट्रेस प्रदर्शित करने के लिए कौन सा पर्यावरण चर सेट किया जा सकता है?
answer: रस्ट_बैकट्रेस
wrong_answers:
  - रस्ट_स्टैकट्रेस
  - रस्ट_डीबग_ट्रेस
  - रस्ट_पैनिक_ट्रेस
explanation: |
  RUST_BACKTRACE सही एनवायरनमेंट वेरिएबल है जो पैनिक की ओर ले जाने वाले संपूर्ण कॉल स्टैक को दिखाकर अतिरिक्त डिबगिंग जानकारी प्रदान करता है। इससे डेवलपर्स को यह पता लगाने में मदद मिलती है कि फंक्शन कॉल के किस क्रम के कारण त्रुटि हुई। अन्य विकल्प (RUST_STACKTRACE, RUST_DEBUG_TRACE और RUST_PANIC_TRACE) मान्य Rust एनवायरनमेंट वेरिएबल नहीं हैं और पैनिक होने पर कोई डिबगिंग आउटपुट नहीं देंगे।
question: Коя променлива на средата може да се зададе, за да се покаже пълна следа от стека на извикванията при възникване на паника в Rust?
answer: RUST_BACKTRACE
wrong_answers:
  - RUST_STACKTRACE
  - RUST_DEBUG_TRACE
  - RUST_PANIC_TRACE
explanation: |
  RUST_BACKTRACE е правилната променлива на средата, която предоставя допълнителна информация за отстраняване на грешки, като показва пълния стек от повиквания, довел до паниката. Това помага на разработчиците да проследят точно коя последователност от извиквания на функции е довела до грешката. Другите опции (RUST_STACKTRACE, RUST_DEBUG_TRACE и RUST_PANIC_TRACE) не са валидни променливи на средата на Rust и няма да дадат никаква изходна информация за отстраняване на грешки при възникване на паника.
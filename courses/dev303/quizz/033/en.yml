question: What environment variable can be set to display a complete call stack trace when a panic occurs in Rust?
answer: RUST_BACKTRACE
wrong_answers:
  - RUST_STACKTRACE
  - RUST_DEBUG_TRACE
  - RUST_PANIC_TRACE
explanation: |
  RUST_BACKTRACE is the correct environment variable that provides additional debugging information by showing the complete call stack that led to a panic. This helps developers trace exactly which sequence of function calls resulted in the error. The other options (RUST_STACKTRACE, RUST_DEBUG_TRACE, and RUST_PANIC_TRACE) are not valid Rust environment variables and will not produce any debugging output when a panic occurs.

question: کدام متغیر محیطی می‌تواند تنظیم شود تا هنگام وقوع یک panic در Rust، یک ردگیری کامل از پشته فراخوانی‌ها نمایش داده شود؟
answer: RUST_BACKTRACE
wrong_answers:
  - RUST_STACKTRACE
  - RUST_DEBUG_TRACE
  - RUST_PANIC_TRACE
explanation: |
  RUST_BACKTRACE متغیر محیطی صحیحی است که با نمایش کامل پشته‌ی فراخوانی که منجر به یک وحشت شده است، اطلاعات اشکال‌زدایی اضافی را فراهم می‌کند. این به توسعه‌دهندگان کمک می‌کند تا دقیقاً دنباله‌ای از فراخوانی‌های تابع که منجر به خطا شده است را ردیابی کنند. گزینه‌های دیگر (RUST_STACKTRACE، RUST_DEBUG_TRACE و RUST_PANIC_TRACE) متغیرهای محیطی معتبر Rust نیستند و هنگام وقوع یک وحشت، هیچ خروجی اشکال‌زدایی تولید نخواهند کرد.
question: Rust에서 패닉이 발생했을 때 전체 호출 스택 추적을 표시하도록 설정할 수 있는 환경 변수는 무엇인가요?
answer: RUST_BACKTRACE
wrong_answers:
  - 녹_스택트레이스
  - 러스트_디버그_트레이스
  - 러스트패닉_트레이스
explanation: |
  RUST_BACKTRACE는 패닉을 일으킨 전체 호출 스택을 표시하여 추가 디버깅 정보를 제공하는 올바른 환경 변수입니다. 이를 통해 개발자는 어떤 함수 호출 시퀀스에서 오류가 발생했는지 정확히 추적할 수 있습니다. 다른 옵션(RUST_STACKTRACE, RUST_DEBUG_TRACE 및 RUST_PANIC_TRACE)은 유효한 Rust 환경 변수가 아니며 패닉 발생 시 디버깅 출력을 생성하지 않습니다.
question: Какую переменную окружения можно установить для отображения полной трассировки стека вызовов при возникновении паники в Rust?
answer: RUST_BACKTRACE
wrong_answers:
  - RUST_STACKTRACE
  - RUST_DEBUG_TRACE
  - RUST_PANIC_TRACE
explanation: |
  RUST_BACKTRACE - это правильная переменная окружения, которая предоставляет дополнительную отладочную информацию, показывая полный стек вызовов, приведших к панике. Это помогает разработчикам отследить, какая именно последовательность вызовов функций привела к ошибке. Остальные опции (RUST_STACKTRACE, RUST_DEBUG_TRACE и RUST_PANIC_TRACE) не являются допустимыми переменными окружения Rust и не выдают никакой отладочной информации при возникновении паники.
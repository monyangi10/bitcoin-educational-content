question: В чем основная разница между методами unwrap_or() и unwrap_or_default() при работе с типами Result и Option?
answer: unwrap_or() требует указания значения отката, в то время как unwrap_or_default() использует реализацию типа по умолчанию
wrong_answers:
  - unwrap_or() паникует при ошибках, в то время как unwrap_or_default() возвращает None, обеспечивая более безопасную обработку ошибок в производстве
  - unwrap_or() работает только с типами Result, в то время как unwrap_or_default() работает исключительно с типами Option для извлечения значений
  - unwrap_or() распространяет ошибки вверх по стеку вызовов, а unwrap_or_default() преобразует все ошибки в строковые сообщения по умолчанию
explanation: |
  Метод unwrap_or() позволяет указать конкретное запасное значение, когда Result содержит ошибку или Option содержит None, что дает вам возможность контролировать, какое значение использовать в случаях отказа. В отличие от этого, метод unwrap_or_default() автоматически использует реализацию признака Default типа, что удобно, когда значение по умолчанию подходит для вашего случая использования. Оба метода работают как с типами Result, так и Option, и ни один из них не вызывает паники и не распространяет ошибки - они оба обеспечивают изящную деградацию, возвращая пригодные для использования значения вместо отказа.
question: ความแตกต่างหลักระหว่างเมธอด unwrap_or() และ unwrap_or_default() เมื่อจัดการกับประเภท Result และ Option คืออะไร?
answer: unwrap_or() ต้องการให้คุณระบุค่าทดแทน ในขณะที่ unwrap_or_default() ใช้การใช้งานค่าเริ่มต้นของประเภท
wrong_answers:
  - unwrap_or() ทำให้เกิด panic เมื่อเกิดข้อผิดพลาด ในขณะที่ unwrap_or_default() คืนค่า None ซึ่งให้การจัดการข้อผิดพลาดที่ปลอดภัยกว่าในสภาพแวดล้อมการผลิต
  - unwrap_or() ใช้ได้เฉพาะกับประเภท Result ในขณะที่ unwrap_or_default() ใช้ได้เฉพาะกับประเภท Option สำหรับการดึงค่า
  - unwrap_or() ส่งต่อข้อผิดพลาดขึ้นไปตามสแต็กการเรียก ในขณะที่ unwrap_or_default() แปลงข้อผิดพลาดทั้งหมดเป็นข้อความสตริงเริ่มต้น
explanation: |
  เมธอด unwrap_or() ช่วยให้คุณสามารถระบุค่าทดแทนเฉพาะเมื่อ Result มีข้อผิดพลาดหรือ Option มีค่า None ทำให้คุณสามารถควบคุมได้ว่าจะใช้ค่าใดในกรณีที่ล้มเหลว ในทางตรงกันข้าม unwrap_or_default() จะใช้การใช้งาน Default trait ของประเภทโดยอัตโนมัติ ซึ่งสะดวกเมื่อค่าดีฟอลต์เหมาะสมกับกรณีการใช้งานของคุณ ทั้งสองเมธอดทำงานร่วมกับทั้งประเภท Result และ Option และไม่มีการแพนิคหรือส่งต่อข้อผิดพลาด - ทั้งสองให้การเสื่อมสภาพอย่างสง่างามโดยการคืนค่าที่ใช้งานได้แทนที่จะล้มเหลว
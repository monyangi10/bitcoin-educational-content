question: تفاوت اصلی بین متدهای `unwrap_or()` و `unwrap_or_default()` در هنگام کار با انواع `Result` و `Option` چیست؟
answer: تابع unwrap_or() نیاز دارد که یک مقدار جایگزین مشخص کنید، در حالی که unwrap_or_default() از پیاده‌سازی پیش‌فرض نوع استفاده می‌کند.
wrong_answers:
  - تابع unwrap_or() در صورت بروز خطاها باعث وحشت می‌شود، در حالی که unwrap_or_default() مقدار None را برمی‌گرداند و در نتیجه مدیریت خطای ایمن‌تری در تولید ارائه می‌دهد.
  - تابع unwrap_or() فقط با نوع‌های Result کار می‌کند در حالی که unwrap_or_default() به طور انحصاری با نوع‌های Option برای استخراج مقدار کار می‌کند.
  - unwrap_or() خطاها را در پشته‌ی فراخوانی به بالا منتقل می‌کند، در حالی که unwrap_or_default() تمام خطاها را به پیام‌های رشته‌ای پیش‌فرض تبدیل می‌کند.
explanation: |
  متد unwrap_or() به شما اجازه می‌دهد تا یک مقدار جایگزین خاص را زمانی که یک Result حاوی خطا است یا یک Option حاوی None است، ارائه دهید و به شما کنترل می‌دهد که در موارد شکست از چه مقداری استفاده کنید. در مقابل، unwrap_or_default() به طور خودکار از پیاده‌سازی ویژگی Default نوع استفاده می‌کند که زمانی که مقدار پیش‌فرض برای مورد استفاده شما مناسب است، راحت است. هر دو متد با هر دو نوع Result و Option کار می‌کنند و هیچ‌کدام باعث وحشت یا انتشار خطا نمی‌شوند - هر دو با بازگرداندن مقادیر قابل استفاده به جای شکست، کاهش تدریجی را فراهم می‌کنند.
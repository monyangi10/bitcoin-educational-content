question: 결과 및 옵션 유형을 처리할 때 언랩_or()와 언랩_or_default() 메서드의 주요 차이점은 무엇인가요?
answer: unwrap_or()는 대체 값을 지정해야 하는 반면, unwrap_or_default()는 타입의 기본 구현을 사용합니다
wrong_answers:
  - unwrap_or()는 오류 발생 시 패닉을 일으키고, unwrap_or_default()는 None을 반환하여 프로덕션에서 더 안전한 오류 처리를 제공합니다
  - unwrap_or()는 결과 유형에서만 작동하는 반면, unwrap_or_default()는 값 추출을 위한 옵션 유형에서만 작동합니다
  - unwrap_or()는 호출 스택 위로 오류를 전파하는 반면, unwrap_or_default()는 모든 오류를 기본 문자열 메시지로 변환합니다
explanation: |
  Unwrap_or() 메서드를 사용하면 결과값에 오류가 있거나 옵션에 없음이 포함된 경우 특정 대체 값을 제공하여 실패 사례에서 어떤 값을 사용할지 제어할 수 있습니다. 이와 대조적으로 unwrap_or_default()는 자동으로 해당 유형의 기본 특성 구현을 사용하므로 기본값이 사용 사례에 적합한 경우에 편리합니다. 두 메서드 모두 결과 및 옵션 유형 모두에서 작동하며 오류를 발생시키거나 전파하지 않으며, 실패 대신 사용 가능한 값을 반환하여 점진적인 성능 저하를 제공합니다.
question: Каква е основната разлика между методите unwrap_or() и unwrap_or_default() при работа с типове Result и Option?
answer: unwrap_or() изисква от вас да посочите резервна стойност, докато unwrap_or_default() използва реализацията по подразбиране на типа
wrong_answers:
  - unwrap_or() изпада в паника при грешки, докато unwrap_or_default() връща None, което осигурява по-безопасна обработка на грешки в производството
  - unwrap_or() работи само с типове Result, докато unwrap_or_default() работи изключително с типове Option за извличане на стойност
  - unwrap_or() разпространява грешките нагоре по стека на повикванията, докато unwrap_or_default() преобразува всички грешки в съобщения по подразбиране
explanation: |
  Методът unwrap_or() ви позволява да предоставите конкретна резервна стойност, когато резултатът съдържа грешка или опцията съдържа None, като ви дава възможност да контролирате коя стойност да се използва в случаи на грешка. За разлика от това, unwrap_or_default() автоматично използва реализацията на чертата Default на типа, което е удобно, когато стойността по подразбиране е подходяща за вашия случай на употреба. И двата метода работят както с типове Result, така и с типове Option, и нито един от тях не предизвиква паника или разпространение на грешки - и двата осигуряват плавно влошаване на състоянието, като връщат използваеми стойности, вместо да се провалят.
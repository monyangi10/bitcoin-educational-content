question: Result और Option प्रकारों को संभालते समय unwrap_or() और unwrap_or_default() विधियों के बीच मुख्य अंतर क्या है?
answer: unwrap_or() फ़ंक्शन में फ़ॉलबैक मान निर्दिष्ट करना आवश्यक होता है, जबकि unwrap_or_default() फ़ंक्शन टाइप के डिफ़ॉल्ट कार्यान्वयन का उपयोग करता है।
wrong_answers:
  - unwrap_or() त्रुटियों पर पैनिक उत्पन्न करता है, जबकि unwrap_or_default() None लौटाता है, जिससे उत्पादन में सुरक्षित त्रुटि प्रबंधन सुनिश्चित होता है।
  - unwrap_or() केवल Result प्रकारों के साथ काम करता है जबकि unwrap_or_default() मान निकालने के लिए विशेष रूप से Option प्रकारों के साथ काम करता है।
  - unwrap_or() कॉल स्टैक में त्रुटियों को ऊपर की ओर प्रसारित करता है, जबकि unwrap_or_default() सभी त्रुटियों को डिफ़ॉल्ट स्ट्रिंग संदेशों में परिवर्तित करता है।
explanation: |
  unwrap_or() विधि आपको Result में त्रुटि होने पर या Option में None होने पर एक विशिष्ट फ़ॉलबैक मान प्रदान करने की अनुमति देती है, जिससे आपको विफलता की स्थिति में उपयोग किए जाने वाले मान पर नियंत्रण मिलता है। इसके विपरीत, unwrap_or_default() विधि स्वचालित रूप से प्रकार के Default ट्रेट कार्यान्वयन का उपयोग करती है, जो तब सुविधाजनक होता है जब डिफ़ॉल्ट मान आपके उपयोग के लिए उपयुक्त हो। ये दोनों विधियाँ Result और Option दोनों प्रकारों के साथ काम करती हैं और न तो पैनिक उत्पन्न करती हैं और न ही त्रुटियों को आगे बढ़ाती हैं - ये दोनों विफल होने के बजाय उपयोगी मान लौटाकर सुचारू रूप से कार्य करती हैं।
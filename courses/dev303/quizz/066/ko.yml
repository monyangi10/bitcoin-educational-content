question: Rust 기능의 어떤 조합이 Bitcoin 트랜잭션의 비가역적 특성을 처리하는 데 특히 적합할까요?
answer: 컴파일 시 오류를 잡아내고 메모리 관련 취약점을 방지하는 정적 강력 유형 시스템
wrong_answers:
  - 메모리 관리를 위한 런타임 검사 및 자동 가비지 수집 기능을 갖춘 동적 타이핑
  - 성능 최적화를 위한 유연한 변환 및 수동 메모리 관리 기능을 갖춘 약형 시스템
  - 유연성을 위한 런타임 최적화 및 해석된 오류 처리 기능을 갖춘 Just-in-Time 컴파일
explanation: |
  Rust의 정적 강력한 유형 시스템은 프로그램이 실행되기 전에 유형 불일치 및 논리 오류를 잡아내어 사용자 자금에 영향을 미칠 수 있는 문제를 방지하기 때문에 Bitcoin 개발에 매우 중요합니다. 정적 특성은 실제 트랜잭션을 처리할 때 런타임이 아닌 컴파일 타임에 오류가 발견된다는 것을 의미합니다. 또한 Rust의 타입 시스템은 메모리 소유권을 처리하고 이중 자유 오류 및 경쟁 조건과 같은 메모리 관련 취약성을 방지합니다. 이는 지불 거절 메커니즘이 있는 기존 금융 시스템과 달리 실수를 되돌릴 수 없고 자금 회수를 위해 이의를 제기할 기관이 없는 Bitcoin 애플리케이션에 필수적인 요소입니다.
question: Lightning Network 支付的哪些基本限制为 wallet 开发商带来了 on-chain Bitcoin 交易中不存在的独特挑战？
answer: 闪电支付仅作为支付渠道内的临时状态存在，不会永久记录在区块链上，因此需要定制支付历史跟踪系统
wrong_answers:
  - 闪电支付需要比 on-chain 交易更多的计算资源来处理，因此移动实施需要大量资源
  - 闪电支付无法以与 on-chain 交易相同的方式进行加密验证，从而为 wallet 实现带来安全漏洞
  - 闪电支付必须通过集中路由节点处理，因此不可能维持真正的非托管 wallet 架构
explanation: |
  正确答案指出了闪电支付与 on-chain 支付在架构上的核心区别。链上 Bitcoin 交易永久记录在区块链上，因此可以通过区块链查询直接检索支付历史。而闪电支付仅作为临时通道状态存在，不留下永久的区块链记录，这就迫使开发人员实施定制的跟踪和存储系统。答案错误的原因是闪电支付的计算效率高（不是资源密集型的），与 Bitcoin 保持相同的加密安全性，路由是去中心化的（不是中心化的）。
question: Quelle limitation fondamentale des paiements Lightning Network crée un défi unique pour les développeurs wallet qui n'existe pas avec les transactions on-chain Bitcoin ?
answer: Les paiements éclairs n'existent qu'en tant qu'états temporaires au sein des canaux de paiement et ne sont pas enregistrés de manière permanente sur la blockchain, ce qui nécessite des systèmes personnalisés de suivi de l'historique des paiements
wrong_answers:
  - Le traitement des paiements Lightning nécessite beaucoup plus de ressources informatiques que celui des transactions on-chain, ce qui rend la mise en œuvre mobile très gourmande en ressources
  - Les paiements Lightning ne peuvent pas être vérifiés cryptographiquement de la même manière que les transactions on-chain, ce qui crée des failles de sécurité pour les implémentations wallet
  - Les paiements Lightning doivent être traités par des nœuds de routage centralisés, ce qui rend impossible le maintien d'une architecture wallet véritablement non privative de liberté
explanation: |
  La bonne réponse identifie la principale différence architecturale entre les paiements Lightning et on-chain. Les transactions Bitcoin en cours de chaîne sont enregistrées de manière permanente sur la blockchain, ce qui permet de retrouver facilement l'historique des paiements par le biais de requêtes sur la blockchain. Les paiements Lightning, en revanche, n'existent qu'en tant qu'états temporaires du canal et ne laissent aucun enregistrement permanent sur la blockchain, ce qui oblige les développeurs à mettre en œuvre des systèmes de suivi et de stockage personnalisés. Les mauvaises réponses sont incorrectes car : Les paiements Lightning sont efficaces en termes de calcul (et non de ressources), ils conservent la même sécurité cryptographique que le Bitcoin et le routage est décentralisé (et non centralisé).
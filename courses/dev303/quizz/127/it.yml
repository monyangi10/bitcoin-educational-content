question: Quale limitazione fondamentale dei pagamenti Lightning Network crea una sfida unica per gli sviluppatori wallet che non esiste con le transazioni on-chain Bitcoin?
answer: I pagamenti lampo esistono solo come stati temporanei all'interno dei canali di pagamento e non sono registrati in modo permanente sulla blockchain, richiedendo sistemi di tracciamento della cronologia dei pagamenti personalizzati
wrong_answers:
  - I pagamenti Lightning richiedono un numero significativamente maggiore di risorse computazionali per l'elaborazione rispetto alle transazioni on-chain, rendendo l'implementazione mobile dispendiosa in termini di risorse
  - I pagamenti Lightning non possono essere verificati crittograficamente come le transazioni on-chain, creando vulnerabilità di sicurezza per le implementazioni wallet
  - I pagamenti Lightning devono essere elaborati attraverso nodi di routing centralizzati, rendendo impossibile mantenere un'architettura wallet veramente non custodiale
explanation: |
  La risposta corretta identifica la principale differenza architettonica tra i pagamenti Lightning e quelli on-chain. Le transazioni on-chain Bitcoin sono registrate in modo permanente sulla blockchain, rendendo semplice il recupero della cronologia dei pagamenti tramite interrogazioni sulla blockchain. I pagamenti Lightning, invece, esistono solo come stati temporanei del canale e non lasciano alcuna registrazione permanente sulla blockchain, costringendo gli sviluppatori a implementare sistemi di tracciamento e archiviazione personalizzati. Le risposte sbagliate sono errate perché: I pagamenti Lightning sono efficienti dal punto di vista computazionale (non richiedono risorse), mantengono la stessa sicurezza crittografica di Bitcoin e il routing è decentralizzato (non centralizzato).
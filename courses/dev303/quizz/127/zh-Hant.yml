question: Lightning Network 支付的哪些基本限制為 wallet 開發人員帶來了 on-chain Bitcoin 交易所沒有的獨特挑戰？
answer: 閃電支付僅作為支付通道中的臨時狀態存在，不會永久記錄在區塊鏈上，因此需要定制的支付歷史追蹤系統
wrong_answers:
  - 與 on-chain 交易相比，閃電支付需要更多的計算資源來處理，因此移動實施需要大量資源。
  - 閃電付款無法以與 on-chain 交易相同的方式進行加密驗證，這會為 wallet 實作帶來安全漏洞
  - Lightning 付款必須透過集中式路由節點處理，因此無法維持真正的非監護 wallet 架構
explanation: |
  正確答案指出了 Lightning 和 on-chain 支付之間的核心架構差異。鏈上 Bitcoin 交易永久記錄在區塊鏈上，因此可透過區塊鏈查詢直接檢索支付歷史。而 Lightning 支付僅作為臨時通道狀態存在，不會留下永久的區塊鏈記錄，這迫使開發人員實施定制的追蹤和存儲系統。答案錯誤的原因是閃電支付的計算效率高（而非資源密集型），與 Bitcoin 保持相同的加密安全性，路由分散（而非集中）。
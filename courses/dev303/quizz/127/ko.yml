question: Lightning Network 결제의 어떤 근본적인 제한으로 인해 on-chain Bitcoin 거래에는 존재하지 않는 wallet 개발자에게 고유한 문제가 발생하나요?
answer: 라이트닝 결제는 결제 채널 내에서 일시적인 상태로만 존재하며 블록체인에 영구적으로 기록되지 않으므로 맞춤형 결제 내역 추적 시스템이 필요합니다
wrong_answers:
  - 라이트닝 결제는 on-chain 트랜잭션보다 처리하는 데 훨씬 더 많은 컴퓨팅 리소스가 필요하므로 모바일 구현에 리소스 집약적입니다
  - 라이트닝 결제는 on-chain 거래와 같은 방식으로 암호학적으로 검증할 수 없으므로 wallet 구현에 보안 취약점이 발생합니다
  - 라이트닝 결제는 중앙 집중식 라우팅 노드를 통해 처리되어야 하므로 진정한 비수탁형 wallet 아키텍처를 유지할 수 없습니다
explanation: |
  정답은 라이트닝과 on-chain 결제의 핵심적인 구조적 차이점을 나타냅니다. 온체인 Bitcoin 거래는 블록체인에 영구적으로 기록되므로 블록체인 쿼리를 통해 결제 내역을 쉽게 검색할 수 있습니다. 그러나 라이트닝 결제는 임시 채널 상태로만 존재하며 영구적인 블록체인 기록을 남기지 않으므로 개발자는 맞춤형 추적 및 저장 시스템을 구현해야 합니다. 오답이 틀린 이유는 다음과 같습니다: 라이트닝 결제는 계산 효율이 높고(리소스 집약적이지 않음), Bitcoin와 동일한 암호화 보안을 유지하며, 라우팅이 중앙 집중식이 아닌 탈중앙화되어 있습니다.
question: on-chain、Bitcoinの取引には存在しない、Lightning Networkの支払いにおける根本的な制約が、walletの開発者にどのようなユニークな課題をもたらしているのか？
answer: ライトニング決済は決済チャネル内の一時的な状態としてのみ存在し、ブロックチェーン上に永続的に記録されないため、カスタム決済履歴追跡システムが必要となる。
wrong_answers:
  - ライトニング決済の処理には、on-chainトランザクションよりもはるかに多くの計算リソースが必要なため、モバイルでの実装はリソース集約的となる。
  - ライトニング決済はon-chainのトランザクションと同じように暗号的に検証することができず、walletの実装にセキュリティ上の脆弱性が生じる。
  - ライトニング決済は中央集権的なルーティング・ノードを介して処理されなければならないため、真に非保護的なwalletアーキテクチャを維持することは不可能である。
explanation: |
  正解は、Lightning決済とon-chain決済のコアとなるアーキテクチャの違いを示している。オンチェーンのBitcoinトランザクションはブロックチェーン上に永続的に記録されるため、ブロックチェーンクエリによって支払い履歴を簡単に検索できる。しかし、Lightning決済は一時的なチャネルの状態としてのみ存在し、永続的なブロックチェーンの記録は残らないため、開発者はカスタムの追跡・保存システムを実装せざるを得ない。不正解の理由はライトニング・ペイメントは計算効率が高く（リソースを必要としない）、Bitcoinと同じ暗号セキュリティを維持し、ルーティングは分散化されている（中央集権ではない）。
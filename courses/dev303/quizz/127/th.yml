question: ข้อจำกัดพื้นฐานของการชำระเงิน Lightning Network ที่สร้างความท้าทายเฉพาะสำหรับนักพัฒนา wallet ซึ่งไม่เกิดขึ้นกับธุรกรรม on-chain และ Bitcoin คืออะไร?
answer: การชำระเงินด้วย Lightning มีอยู่เพียงในรูปแบบสถานะชั่วคราวภายในช่องทางการชำระเงินและไม่ได้ถูกบันทึกถาวรบนบล็อกเชน ซึ่งต้องการระบบติดตามประวัติการชำระเงินที่กำหนดเอง
wrong_answers:
  - การชำระเงินด้วย Lightning ต้องการทรัพยากรการคำนวณมากกว่าการประมวลผลธุรกรรม on-chain อย่างมาก ทำให้การใช้งานบนมือถือใช้ทรัพยากรมาก
  - การชำระเงินด้วย Lightning ไม่สามารถตรวจสอบได้ด้วยการเข้ารหัสในลักษณะเดียวกับธุรกรรม on-chain ซึ่งสร้างช่องโหว่ด้านความปลอดภัยสำหรับการใช้งาน wallet
  - การชำระเงินผ่าน Lightning จะต้องดำเนินการผ่านโหนดการกำหนดเส้นทางแบบรวมศูนย์ ทำให้ไม่สามารถรักษาสถาปัตยกรรม wallet ที่ไม่ต้องมีการควบคุมอย่างแท้จริงได้
explanation: |
  คำตอบที่ถูกต้องระบุความแตกต่างทางสถาปัตยกรรมหลักระหว่างการชำระเงิน Lightning และ on-chain การทำธุรกรรม Bitcoin บนเชนจะถูกบันทึกถาวรบนบล็อกเชน ทำให้การดึงประวัติการชำระเงินเป็นเรื่องง่ายผ่านการสืบค้นบล็อกเชน อย่างไรก็ตาม การชำระเงิน Lightning มีอยู่เพียงสถานะช่องทางชั่วคราวและไม่ทิ้งบันทึกถาวรบนบล็อกเชน ทำให้นักพัฒนาต้องใช้ระบบติดตามและจัดเก็บข้อมูลที่กำหนดเอง คำตอบที่ผิดไม่ถูกต้องเพราะ: การชำระเงิน Lightning มีประสิทธิภาพในการคำนวณ (ไม่ใช้ทรัพยากรมาก) พวกเขารักษาความปลอดภัยทางการเข้ารหัสเช่นเดียวกับ Bitcoin และการกำหนดเส้นทางเป็นแบบกระจายศูนย์ (ไม่ใช่แบบศูนย์กลาง)
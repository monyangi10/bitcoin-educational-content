question: چه محدودیت اساسی در پرداخت‌های Lightning Network چالشی منحصر به فرد برای توسعه‌دهندگان wallet ایجاد می‌کند که در تراکنش‌های on-chain و Bitcoin وجود ندارد؟
answer: پرداخت‌های لایتنینگ تنها به عنوان وضعیت‌های موقت در کانال‌های پرداخت وجود دارند و به صورت دائمی در بلاکچین ثبت نمی‌شوند، که نیاز به سیستم‌های سفارشی برای ردیابی تاریخچه پرداخت دارند.
wrong_answers:
  - پرداخت‌های لایتنینگ به منابع محاسباتی بسیار بیشتری برای پردازش نیاز دارند نسبت به تراکنش‌های on-chain، که اجرای آن‌ها بر روی موبایل را منابع‌بر می‌کند.
  - پرداخت‌های لایتنینگ نمی‌توانند به همان روشی که تراکنش‌های on-chain به‌صورت رمزنگاری تأیید می‌شوند، تأیید شوند و این امر باعث ایجاد آسیب‌پذیری‌های امنیتی برای پیاده‌سازی‌های wallet می‌شود.
  - پرداخت‌های لایتنینگ باید از طریق نودهای مسیریابی متمرکز پردازش شوند، که حفظ معماری واقعاً غیرامانی wallet را غیرممکن می‌سازد.
explanation: |
  پاسخ صحیح تفاوت اصلی معماری بین پرداخت‌های Lightning و on-chain را شناسایی می‌کند. تراکنش‌های زنجیره‌ای Bitcoin به‌طور دائمی در بلاکچین ثبت می‌شوند و بازیابی تاریخچه پرداخت را از طریق جستجوهای بلاکچین ساده می‌سازند. با این حال، پرداخت‌های Lightning فقط به‌عنوان وضعیت‌های موقت کانال وجود دارند و هیچ رکورد دائمی در بلاکچین باقی نمی‌گذارند، که توسعه‌دهندگان را مجبور به پیاده‌سازی سیستم‌های ردیابی و ذخیره‌سازی سفارشی می‌کند. پاسخ‌های نادرست اشتباه هستند زیرا: پرداخت‌های Lightning از نظر محاسباتی کارآمد هستند (نه منابع‌بر)، همان امنیت رمزنگاری Bitcoin را حفظ می‌کنند و مسیریابی غیرمتمرکز است (نه متمرکز).
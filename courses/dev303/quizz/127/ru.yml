question: Какое фундаментальное ограничение платежей Lightning Network создает уникальную проблему для разработчиков wallet, которая не существует в случае транзакций on-chain Bitcoin?
answer: Молниеносные платежи существуют только как временные состояния в платежных каналах и не записываются в блокчейн на постоянной основе, что требует создания собственных систем отслеживания истории платежей
wrong_answers:
  - Молниеносные платежи требуют значительно больше вычислительных ресурсов для обработки, чем транзакции on-chain, что делает мобильное внедрение ресурсоемким
  - Платежи Lightning не могут быть проверены криптографически так же, как транзакции on-chain, что создает уязвимости в безопасности реализаций wallet
  - Молниеносные платежи должны обрабатываться через централизованные узлы маршрутизации, что делает невозможным поддержание действительно нехранимой архитектуры wallet
explanation: |
  Правильный ответ определяет основное архитектурное различие между платежами Lightning и on-chain. Транзакции Bitcoin постоянно записываются в блокчейн, что упрощает поиск истории платежей с помощью запросов к блокчейну. Платежи Lightning, однако, существуют только как временные состояния канала и не оставляют постоянной записи в блокчейне, что вынуждает разработчиков создавать собственные системы отслеживания и хранения. Ответы неверны, потому что: Молниеносные платежи эффективны с точки зрения вычислений (не ресурсоемки), они поддерживают ту же криптографическую безопасность, что и Bitcoin, а маршрутизация децентрализована (не централизована).
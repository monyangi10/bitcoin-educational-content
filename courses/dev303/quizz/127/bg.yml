question: Кое основно ограничение на плащанията Lightning Network създава уникално предизвикателство за разработчиците на wallet, което не съществува при транзакциите on-chain Bitcoin?
answer: Мълниеносните плащания съществуват само като временни състояния в рамките на каналите за плащане и не се записват постоянно в блокчейна, което изисква персонализирани системи за проследяване на историята на плащанията
wrong_answers:
  - За обработката на светкавичните плащания са необходими значително повече изчислителни ресурси, отколкото за трансакциите on-chain, което прави мобилното им прилагане ресурсоемко
  - Плащанията със светкавици не могат да бъдат проверявани криптографски по същия начин като трансакциите в on-chain, което създава уязвимости в сигурността на реализациите на wallet
  - Мълниеносните плащания трябва да се обработват чрез централизирани маршрутизиращи възли, което прави невъзможно поддържането на наистина несеквестируема архитектура wallet
explanation: |
  Правилният отговор идентифицира основната архитектурна разлика между плащанията Lightning и on-chain. Транзакциите в Bitcoin се записват трайно в блокчейна, което прави извличането на историята на плащанията лесно чрез заявки в блокчейна. Плащанията Lightning обаче съществуват само като временни състояния на канала и не оставят постоянен запис в блокчейна, което принуждава разработчиците да внедряват персонализирани системи за проследяване и съхранение. Грешните отговори са неправилни, защото: Плащанията с мълния са изчислително ефективни (а не ресурсоемки), поддържат същата криптографска сигурност като Bitcoin и маршрутизирането е децентрализирано (а не централизирано).
question: Lightning Network भुगतान की कौन सी मूलभूत सीमा wallet डेवलपर्स के लिए एक अनूठी चुनौती पैदा करती है जो on-chain और Bitcoin लेनदेन में मौजूद नहीं है?
answer: लाइटनिंग पेमेंट केवल भुगतान चैनलों के भीतर अस्थायी स्थिति के रूप में मौजूद होते हैं और ब्लॉकचेन पर स्थायी रूप से रिकॉर्ड नहीं होते हैं, जिसके लिए कस्टम भुगतान इतिहास ट्रैकिंग सिस्टम की आवश्यकता होती है।
wrong_answers:
  - लाइटनिंग पेमेंट को प्रोसेस करने के लिए on-chain ट्रांजैक्शन की तुलना में काफी अधिक कंप्यूटेशनल संसाधनों की आवश्यकता होती है, जिससे मोबाइल कार्यान्वयन संसाधन-गहन हो जाता है।
  - लाइटनिंग पेमेंट को on-chain लेनदेन की तरह क्रिप्टोग्राफिक रूप से सत्यापित नहीं किया जा सकता है, जिससे wallet कार्यान्वयन के लिए सुरक्षा कमजोरियां पैदा होती हैं।
  - बिजली की गति से होने वाले भुगतान को केंद्रीकृत रूटिंग नोड्स के माध्यम से संसाधित किया जाना चाहिए, जिससे पूरी तरह से गैर-कस्टोडियल wallet आर्किटेक्चर को बनाए रखना असंभव हो जाता है।
explanation: |
  सही उत्तर लाइटनिंग और on-chain भुगतानों के बीच मुख्य वास्तुशिल्पीय अंतर को दर्शाता है। ऑन-चेन Bitcoin लेनदेन ब्लॉकचेन पर स्थायी रूप से दर्ज होते हैं, जिससे ब्लॉकचेन क्वेरी के माध्यम से भुगतान इतिहास को आसानी से प्राप्त किया जा सकता है। हालांकि, लाइटनिंग भुगतान केवल अस्थायी चैनल स्थितियों के रूप में मौजूद होते हैं और ब्लॉकचेन पर कोई स्थायी रिकॉर्ड नहीं छोड़ते हैं, जिससे डेवलपर्स को कस्टम ट्रैकिंग और स्टोरेज सिस्टम लागू करने के लिए मजबूर होना पड़ता है। गलत उत्तर इसलिए गलत हैं क्योंकि: लाइटनिंग भुगतान गणनात्मक रूप से कुशल हैं (संसाधन-गहन नहीं), वे Bitcoin के समान क्रिप्टोग्राफिक सुरक्षा बनाए रखते हैं, और रूटिंग विकेंद्रीकृत है (केंद्रीकृत नहीं)।
question: ประโยชน์หลักของคุณสมบัติการเขียนโปรแกรมเชิงฟังก์ชันของ Rust ที่รักษาการยกเว้นต้นทุนเป็นศูนย์คืออะไร?
answer: พวกเขาผลิตโค้ดเครื่องที่มีประสิทธิภาพเทียบเท่ากับวิธีการที่ใช้ลูปแบบดั้งเดิมโดยไม่ลดทอนประสิทธิภาพ
wrong_answers:
  - พวกเขาจัดการการจัดสรรและการปลดปล่อยหน่วยความจำโดยอัตโนมัติเพื่อป้องกันค่าใช้จ่ายในเวลารันไทม์อย่างสมบูรณ์
  - พวกเขากำจัดความจำเป็นในการตรวจสอบประเภทในขณะคอมไพล์ในขณะที่ยังคงรักษาการรับประกันความปลอดภัย
  - พวกเขาให้ฟังก์ชันการเก็บขยะที่ทำงานโดยไม่ส่งผลกระทบต่อความเร็วในการทำงานของโปรแกรม
explanation: |
  นามธรรมที่ไม่มีค่าใช้จ่ายในคุณสมบัติการเขียนโปรแกรมเชิงฟังก์ชันของ Rust หมายความว่าการใช้ closures และ iterators ไม่ได้เสียสละประสิทธิภาพเพื่อความสามารถในการแสดงออก คอมไพเลอร์ของ Rust ปรับแต่งโครงสร้างระดับสูงเหล่านี้เพื่อสร้างโค้ดเครื่องที่ทำงานได้ดีเท่ากับลูปแบบดั้งเดิมที่เขียนด้วยมือ สิ่งนี้ช่วยให้นักพัฒนาสามารถเขียนโค้ดที่แสดงออกและอ่านได้มากขึ้นโดยไม่ต้องเสียค่าปรับประสิทธิภาพในขณะรันไทม์ ซึ่งเป็นหลักการสำคัญของปรัชญาการออกแบบของ Rust
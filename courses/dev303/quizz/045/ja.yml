question: Rustの関数型プログラミング機能がゼロコスト抽象化を維持する主な利点は何ですか？
answer: パフォーマンスを犠牲にすることなく、従来のループベースのアプローチに匹敵する効率的なマシンコードを生成する。
wrong_answers:
  - 実行時のオーバーヘッドを完全に防ぐために、メモリの割り当てと解放を自動的に処理する。
  - 安全性の保証を維持しながら、コンパイル時の型チェックの必要性を排除する。
  - プログラムの実行速度に影響を与えることなく実行されるガベージコレクション機能を提供する。
explanation: |
  Rustの関数型プログラミング機能におけるゼロコスト抽象化とは、クロージャやイテレータを使っても、表現力のためにパフォーマンスが犠牲にならないことを意味する。Rustコンパイラーは、これらの高レベルの構成要素を最適化し、手書きの従来のループと同等の性能を持つマシン・コードを生成します。これによって、開発者は、Rustの設計哲学の核となる原則である実行時のパフォーマンス・ペナルティを支払うことなく、より表現力豊かで読みやすいコードを書くことができる。
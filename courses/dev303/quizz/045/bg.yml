question: Какво е основното предимство на функциите за функционално програмиране на Rust, които поддържат абстракции с нулеви разходи?
answer: Те създават ефективен машинен код, сравним с традиционните подходи, базирани на цикли, без да се жертва производителността
wrong_answers:
  - Те се справят автоматично с разпределянето на паметта, за да предотвратят натоварването по време на изпълнение
  - Те премахват необходимостта от проверка на типа по време на компилация, като същевременно запазват гаранциите за безопасност
  - Те осигуряват функционалност за събиране на отпадъци, която се изпълнява, без да влияе на скоростта на изпълнение на програмата
explanation: |
  Абстракциите с нулеви разходи във функциите за функционално програмиране на Rust означават, че използването на затваряния и итератори не води до загуба на производителност в полза на изразителността. Компилаторът на Rust оптимизира тези конструкции от високо ниво, за да създаде машинен код, който се представя толкова добре, колкото и ръчно написаните традиционни цикли. Това позволява на разработчиците да пишат по-изразителен и четим код, без да плащат неустойка за производителността по време на изпълнение, което е основен принцип на философията на дизайна на Rust.
question: 제로 비용 추상화를 유지하는 Rust의 함수형 프로그래밍 기능의 주요 이점은 무엇인가요?
answer: 성능 저하 없이 기존 루프 기반 접근 방식에 필적하는 효율적인 머신 코드를 생성합니다
wrong_answers:
  - 메모리 할당 및 할당을 자동으로 처리하여 런타임 오버헤드를 완전히 방지합니다
  - 안전성을 보장하면서 컴파일 시 유형 검사를 할 필요가 없습니다
  - 프로그램 실행 속도에 영향을 주지 않고 실행되는 가비지 컬렉션 기능을 제공합니다
explanation: |
  Rust의 함수형 프로그래밍 기능의 제로 비용 추상화는 클로저와 이터레이터를 사용해도 표현력을 위해 성능을 희생하지 않는다는 것을 의미합니다. Rust 컴파일러는 이러한 고수준 구조를 최적화하여 손으로 직접 작성한 기존 루프와 동일한 성능을 발휘하는 머신 코드를 생성합니다. 이를 통해 개발자는 런타임 성능 저하 없이 보다 표현력이 풍부하고 읽기 쉬운 코드를 작성할 수 있으며, 이는 Rust의 설계 철학의 핵심 원칙입니다.
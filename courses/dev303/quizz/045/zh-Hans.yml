question: Rust 的函数式编程功能维护零成本抽象的主要好处是什么？
answer: 它们产生的高效机器代码可与传统的基于循环的方法相媲美，而不会降低性能
wrong_answers:
  - 它们会自动处理内存的分配和删除，以完全避免运行时的开销
  - 它们消除了在编译时进行类型检查的需要，同时保持了安全保证
  - 它们提供垃圾回收功能，运行时不会影响程序执行速度
explanation: |
  Rust 的函数式编程功能中的零成本抽象意味着，使用闭包和迭代器并不会因为表达能力而牺牲性能。Rust 编译器优化了这些高级结构，生成的机器代码与手工编写的传统循环代码性能相当。这样，开发人员就可以编写更具表现力和可读性的代码，而无需支付运行时的性能损失，这也是 Rust 设计理念的核心原则。
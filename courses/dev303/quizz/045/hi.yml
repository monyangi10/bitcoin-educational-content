question: जीडब्ल्यू-0 की फंक्शनल प्रोग्रामिंग सुविधाओं का मुख्य लाभ क्या है जो शून्य लागत अमूर्तता को बनाए रखती हैं?
answer: वे प्रदर्शन से समझौता किए बिना पारंपरिक लूप-आधारित दृष्टिकोणों के समान कुशल मशीन कोड उत्पन्न करते हैं।
wrong_answers:
  - ये रनटाइम ओवरहेड को पूरी तरह से रोकने के लिए मेमोरी आवंटन और डी-आवंटन को स्वचालित रूप से संभालते हैं।
  - वे सुरक्षा गारंटी बनाए रखते हुए संकलन समय पर टाइप चेकिंग की आवश्यकता को समाप्त कर देते हैं।
  - वे गार्बेज कलेक्शन कार्यक्षमता प्रदान करते हैं जो प्रोग्राम के निष्पादन की गति को प्रभावित किए बिना चलती है।
explanation: |
  Rust की फंक्शनल प्रोग्रामिंग विशेषताओं में शून्य लागत वाले एब्स्ट्रैक्शन का मतलब है कि क्लोज़र और इटरेटर का उपयोग करने से अभिव्यक्ति के लिए प्रदर्शन का त्याग नहीं करना पड़ता। Rust कंपाइलर इन उच्च-स्तरीय संरचनाओं को अनुकूलित करता है ताकि मशीन कोड उतना ही अच्छा प्रदर्शन करे जितना कि हाथ से लिखे गए पारंपरिक लूप। इससे डेवलपर्स रनटाइम प्रदर्शन में कमी किए बिना अधिक अभिव्यंजक और पठनीय कोड लिख सकते हैं, जो Rust के डिजाइन दर्शन का एक मूल सिद्धांत है।
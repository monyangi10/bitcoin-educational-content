question: مزیت اصلی ویژگی‌های برنامه‌نویسی تابعی Rust که انتزاعات بدون هزینه را حفظ می‌کنند چیست؟
answer: آن‌ها کد ماشین کارآمدی تولید می‌کنند که قابل مقایسه با روش‌های مبتنی بر حلقه سنتی است، بدون اینکه عملکرد را قربانی کنند.
wrong_answers:
  - آن‌ها به‌طور خودکار تخصیص و آزادسازی حافظه را مدیریت می‌کنند تا به‌طور کامل از سربار زمان اجرا جلوگیری کنند.
  - آن‌ها نیاز به بررسی نوع در زمان کامپایل را از بین می‌برند در حالی که تضمین‌های ایمنی را حفظ می‌کنند.
  - آن‌ها قابلیت جمع‌آوری زباله را فراهم می‌کنند که بدون تأثیر بر سرعت اجرای برنامه اجرا می‌شود.
explanation: |
  انتزاع بدون هزینه در ویژگی‌های برنامه‌نویسی تابعی Rust به این معناست که استفاده از closures و iterators عملکرد را فدای بیان‌پذیری نمی‌کند. کامپایلر Rust این ساختارهای سطح بالا را بهینه‌سازی می‌کند تا کدی ماشینی تولید کند که به خوبی حلقه‌های سنتی دست‌نویس عمل می‌کند. این امر به توسعه‌دهندگان اجازه می‌دهد تا کدی بیان‌پذیرتر و خواناتر بنویسند بدون اینکه جریمه عملکردی در زمان اجرا بپردازند، که این یک اصل اساسی در فلسفه طراحی Rust است.
question: В чем главное преимущество функциональных возможностей программирования Rust, поддерживающих абстракции с нулевыми затратами?
answer: Они создают эффективный машинный код, сравнимый с традиционными подходами, основанными на циклах, без ущерба для производительности
wrong_answers:
  - Они автоматически обрабатывают выделение и удаление памяти, чтобы полностью исключить накладные расходы во время выполнения
  - Они устраняют необходимость проверки типов во время компиляции, сохраняя при этом гарантии безопасности
  - Они обеспечивают сборку мусора, не влияя на скорость выполнения программы
explanation: |
  Абстракции функционального программирования Rust с нулевыми затратами означают, что использование замыканий и итераторов не приносит производительность в жертву выразительности. Компилятор Rust оптимизирует эти высокоуровневые конструкции для создания машинного кода, который работает так же хорошо, как и традиционные циклы, написанные вручную. Это позволяет разработчикам писать более выразительный и читабельный код без ущерба для производительности во время выполнения, что является основным принципом философии проектирования Rust.
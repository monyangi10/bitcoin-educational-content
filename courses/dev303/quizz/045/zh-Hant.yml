question: Rust 的函式程式設計功能維持零成本抽象的主要好處是什麼？
answer: 它們產生的高效率機器程式碼，可媲美傳統的循環式方法，且不會犧牲效能。
wrong_answers:
  - 它們會自動處理記憶體的分配與取消分配，以完全避免執行時的開銷。
  - 它們不需要在編譯時進行類型檢查，同時保持安全保證
  - 它們提供垃圾回收功能，執行時不影響程式執行速度
explanation: |
  Rust 的函式編程功能中的零成本抽象，意味著使用閉包和迭代器並不會為了表達能力而犧牲效能。Rust 編譯器優化了這些高階結構，產生的機器程式碼效能不亞於手寫的傳統循環。這讓開發人員可以寫出更具表達力和可讀性的程式碼，而無需付出執行時效能的代價，這也是 Rust 設計哲學的核心原則。
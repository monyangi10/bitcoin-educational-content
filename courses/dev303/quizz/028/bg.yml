question: Какво се случва по време на процеса на развъртане, когато в Rust настъпи паника?
answer: Rust преминава обратно през стека на повикванията, за да предостави подробно проследяване на стека
wrong_answers:
  - Rust незабавно прекратява програмата без почистване или информация
  - Rust автоматично преобразува паниката във възстановим тип резултат
  - Rust рестартира неуспешната операция от началото на функцията
explanation: |
  Когато в Rust възникне паника, процесът на размотаване преминава обратно през стека на повикванията, за да предостави подробно проследяване на стека, показващо къде точно е възникнала паниката. Това помага на разработчиците да идентифицират източника на проблемите по време на отстраняване на грешки. Другите опции са некоректни: Rust не се прекратява незабавно без почистване (това се случва само когато размотаването е деактивирано), паниката не може да се преобразува автоматично в типове резултати и Rust не рестартира неуспешни операции.
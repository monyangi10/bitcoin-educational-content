question: 當 Rust 發生恐慌時，平倉過程中會發生什麼？
answer: Rust 回溯呼叫堆疊，提供詳細的堆疊追蹤
wrong_answers:
  - Rust 會立即終止程式，不會進行任何清理或提供任何資訊
  - Rust 會自動將恐慌轉換為可復原的結果類型
  - Rust 從功能的起始點重新啟動失敗的操作
explanation: |
  當 Rust 中發生恐慌時，unwinding 程序會回溯呼叫堆疊，提供詳細的堆疊追蹤，準確顯示恐慌發生的位置。這有助於開發人員在除錯時找出問題的來源。其他選項是不正確的：Rust 不會在沒有清理的情況下立即終止（只有在關閉 unwinding 時才會發生），panic 無法自動轉換為 Result 類型，而且 Rust 不會重新啟動失敗的作業。
question: 当 Rust 发生恐慌时，平仓过程中会发生什么？
answer: Rust 回溯调用堆栈，提供详细的堆栈跟踪
wrong_answers:
  - Rust 立即终止程序，不做任何清理或提供任何信息
  - Rust 将恐慌自动转换为可恢复的结果类型
  - Rust 从功能的起点重新启动失败的操作
explanation: |
  当 Rust 中发生恐慌时，解卷过程会回溯调用堆栈，提供详细的堆栈跟踪，准确显示恐慌发生的位置。这有助于开发人员在调试过程中找出问题的根源。其他选项是不正确的：Rust 不会在没有清理的情况下立即终止（只有在解除绑定时才会发生），恐慌无法自动转换为结果类型，而且 Rust 不会重启失败的操作。
question: Rust में घबराहट की स्थिति उत्पन्न होने पर अनवाइंडिंग प्रक्रिया के दौरान क्या होता है?
answer: Rust कॉल स्टैक के माध्यम से पीछे की ओर जाकर विस्तृत स्टैक ट्रेस प्रदान करता है।
wrong_answers:
  - Rust बिना किसी सफाई या सूचना के प्रोग्राम को तुरंत समाप्त कर देता है।
  - Rust पैनिक को स्वचालित रूप से रिकवरेबल रिजल्ट टाइप में परिवर्तित कर देता है।
  - Rust विफल ऑपरेशन को फ़ंक्शन की शुरुआत से पुनः आरंभ करता है।
explanation: |
  जब Rust में कोई पैनिक (अचानक प्रतिक्रिया) होती है, तो अनवाइंडिंग प्रक्रिया कॉल स्टैक में पीछे की ओर जाकर एक विस्तृत स्टैक ट्रेस प्रदान करती है जिससे पैनिक की सटीक स्थिति का पता चलता है। इससे डेवलपर्स को डीबगिंग के दौरान समस्याओं के स्रोत की पहचान करने में मदद मिलती है। अन्य विकल्प गलत हैं: Rust बिना क्लीनअप के तुरंत समाप्त नहीं होता (यह केवल तभी होता है जब अनवाइंडिंग अक्षम हो), पैनिक को स्वचालित रूप से रिजल्ट प्रकारों में परिवर्तित नहीं किया जा सकता है, और Rust विफल ऑपरेशनों को पुनः आरंभ नहीं करता है।
question: Что происходит в процессе раскручивания, когда в Rust возникает паника?
answer: Rust проходит назад по стеку вызовов, чтобы предоставить подробную трассировку стека
wrong_answers:
  - Rust немедленно завершает работу программы без какой-либо очистки или информации
  - Rust автоматически преобразует панику в восстанавливаемый тип Result
  - Rust перезапускает неудачную операцию с начала функции
explanation: |
  Когда в Rust возникает паника, процесс разворачивания проходит назад по стеку вызовов, чтобы предоставить подробную трассировку стека, показывающую, где именно возникла паника. Это помогает разработчикам определить источник проблем во время отладки. Другие варианты неверны: Rust не завершает работу сразу без очистки (это происходит только при отключенной размотке), паники не могут быть автоматически преобразованы в типы Result, и Rust не перезапускает неудачные операции.
question: ¿Qué ocurre durante el proceso de desenrollado cuando se produce un pánico en Rust?
answer: Rust vuelve a recorrer la pila de llamadas para proporcionar una traza detallada de la pila
wrong_answers:
  - Rust termina inmediatamente el programa sin ninguna limpieza o información
  - Rust convierte automáticamente el pánico en un tipo de resultado recuperable
  - Rust reinicia la operación fallida desde el principio de la función
explanation: |
  Cuando se produce un pánico en Rust, el proceso de desenrollado recorre la pila de llamadas para proporcionar un seguimiento detallado de la pila que muestra exactamente dónde se produjo el pánico. Esto ayuda a los desarrolladores a identificar el origen de los problemas durante la depuración. Las otras opciones son incorrectas: Rust no termina inmediatamente sin limpieza (eso sólo ocurre cuando el desenrollado está deshabilitado), los pánicos no se pueden convertir automáticamente a tipos Resultado, y Rust no reinicia las operaciones fallidas.
question: เกิดอะไรขึ้นระหว่างกระบวนการคลี่คลายเมื่อเกิดความตื่นตระหนกใน Rust?
answer: Rust เดินย้อนกลับผ่านสแตกของการเรียกเพื่อให้รายละเอียดของสแตกเทรซ
wrong_answers:
  - Rust ยุติโปรแกรมทันทีโดยไม่มีการทำความสะอาดหรือข้อมูลใดๆ
  - Rust แปลงความตื่นตระหนกเป็นประเภทผลลัพธ์ที่กู้คืนได้โดยอัตโนมัติ
  - Rust เริ่มต้นการดำเนินการที่ล้มเหลวใหม่ตั้งแต่ต้นฟังก์ชัน
explanation: |
  เมื่อเกิด panic ใน Rust กระบวนการ unwinding จะย้อนกลับผ่าน call stack เพื่อให้รายละเอียด stack trace ที่แสดงให้เห็นอย่างชัดเจนว่า panic เกิดขึ้นที่ใด ซึ่งช่วยให้นักพัฒนาระบุแหล่งที่มาของปัญหาในระหว่างการดีบัก ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: Rust จะไม่หยุดทำงานทันทีโดยไม่มีการทำความสะอาด (ซึ่งจะเกิดขึ้นเฉพาะเมื่อปิดการใช้งาน unwinding เท่านั้น), panic ไม่สามารถถูกแปลงเป็นประเภท Result ได้โดยอัตโนมัติ, และ Rust จะไม่เริ่มต้นการทำงานที่ล้มเหลวใหม่อีกครั้ง
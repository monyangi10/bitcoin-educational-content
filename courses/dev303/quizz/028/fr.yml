question: Que se passe-t-il au cours du processus de déroulement lorsqu'une panique se produit dans Rust ?
answer: Rust parcourt la pile d'appels pour fournir une trace de pile détaillée.
wrong_answers:
  - Rust met immédiatement fin au programme sans nettoyage ni information.
  - Rust convertit automatiquement la panique en un type de résultat récupérable.
  - Rust redémarre l'opération défaillante depuis le début de la fonction.
explanation: |
  Lorsqu'une panique se produit dans Rust, le processus de déroulement remonte la pile d'appels pour fournir une trace de pile détaillée indiquant exactement où la panique s'est produite. Cela aide les développeurs à identifier la source des problèmes pendant le débogage. Les autres options sont incorrectes : Rust ne se termine pas immédiatement sans nettoyage (cela ne se produit que lorsque le déroulement est désactivé), les paniques ne peuvent pas être automatiquement converties en types de résultats et Rust ne redémarre pas les opérations qui ont échoué.

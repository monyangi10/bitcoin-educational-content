question: Rustでパニックが発生した場合、巻き戻しプロセスでは何が起こるのですか？
answer: Rustは、コールスタックを遡り、詳細なスタックトレースを提供する。
wrong_answers:
  - Rustは、後始末や情報なしにプログラムを即座に終了させる。
  - Rustはパニックを自動的に回復可能なResult型に変換する。
  - Rustは、失敗したオペレーションをファンクションの最初からやり直す。
explanation: |
  Rustでパニックが発生すると、アンワインドプロセスはコールスタックを遡り、パニックが発生した場所を正確に示す詳細なスタックトレースを提供する。これは開発者がデバッグ中に問題の原因を特定するのに役立ちます。他のオプションは正しくない：Rustはクリーンアップなしで即座に終了せず（それは巻き戻しが無効な場合にのみ起こる）、パニックは自動的に結果型に変換されず、Rustは失敗した操作を再開しない。
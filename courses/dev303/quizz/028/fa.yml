question: در طول فرآیند بازگشایی زمانی که یک وحشت در Rust رخ می‌دهد، چه اتفاقی می‌افتد؟
answer: Rust از طریق پشته تماس به عقب برمی‌گردد تا یک ردیابی پشته دقیق ارائه دهد.
wrong_answers:
  - Rust بلافاصله برنامه را بدون هیچ گونه پاکسازی یا اطلاعاتی خاتمه می‌دهد.
  - Rust به‌طور خودکار وحشت را به یک نوع نتیجه قابل بازیابی تبدیل می‌کند.
  - Rust عملیات ناموفق را از ابتدای تابع دوباره شروع می‌کند.
explanation: |
  وقتی یک وحشت در Rust رخ می‌دهد، فرآیند بازگشت از طریق پشته تماس به عقب می‌رود تا یک ردیابی پشته دقیق ارائه دهد که دقیقاً نشان می‌دهد وحشت کجا رخ داده است. این به توسعه‌دهندگان کمک می‌کند تا منبع مشکلات را در حین اشکال‌زدایی شناسایی کنند. گزینه‌های دیگر نادرست هستند: Rust بلافاصله بدون پاکسازی خاتمه نمی‌یابد (این فقط زمانی اتفاق می‌افتد که بازگشت غیرفعال باشد)، وحشت‌ها نمی‌توانند به طور خودکار به انواع Result تبدیل شوند، و Rust عملیات ناموفق را دوباره شروع نمی‌کند.
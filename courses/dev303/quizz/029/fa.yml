question: دو نوع از شمارشگر Result در Rust که برای مدیریت خطاهای قابل بازیابی استفاده می‌شوند، کدامند؟
answer: باشه(T) برای عملیات موفق و خطا(E) برای شکست‌ها
wrong_answers:
  - موفقیت(T) برای عملیات موفق و شکست(E) برای شکست‌ها
  - برخی(T) برای عملیات موفق و هیچ برای شکست‌ها
  - عبور(T) برای عملیات موفق و وحشت(E) برای شکست‌ها
explanation: |
  در شمارش Result در Rust دقیقاً دو نوع متغیر وجود دارد: Ok(T) که حاوی یک مقدار موفق از نوع T است، و Err(E) که حاوی یک خطا از نوع E است. این طراحی توسعه‌دهندگان را مجبور می‌کند تا به‌طور صریح هر دو حالت موفقیت و شکست را مدیریت کنند. گزینه‌های دیگر نادرست هستند - Success/Failure متغیرهای Result نیستند، Some/None به شمارش Option برای مدیریت مقادیر null تعلق دارند، و Pass/Panic متغیرهای استاندارد شمارش Rust برای مدیریت خطا نیستند.
question: Rust के रिजल्ट एनम के दो प्रकार कौन से हैं जिनका उपयोग रिकवरेबल त्रुटियों को संभालने के लिए किया जाता है?
answer: सफल संचालन के लिए Ok(T) और विफलताओं के लिए Err(E)
wrong_answers:
  - सफल संचालन के लिए सफलता (T) और विफलताओं के लिए विफलता (E)
  - सफल संचालन के लिए Some(T) और विफलताओं के लिए None।
  - सफल संचालन के लिए पास (T) और विफलताओं के लिए पैनिक (E)
explanation: |
  Rust में Result enum के ठीक दो वेरिएंट हैं: Ok(T) जिसमें T प्रकार का सफल मान होता है, और Err(E) जिसमें E प्रकार की त्रुटि होती है। यह डिज़ाइन डेवलपर्स को सफलता और विफलता दोनों मामलों को स्पष्ट रूप से संभालने के लिए बाध्य करता है। अन्य विकल्प गलत हैं - Success/Failure, Result के वेरिएंट नहीं हैं, Some/None, null मानों को संभालने के लिए Option enum के अंतर्गत आते हैं, और Pass/Panic, त्रुटि प्रबंधन के लिए मानक Rust enum वेरिएंट नहीं हैं।
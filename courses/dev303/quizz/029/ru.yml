question: Какие два варианта перечисления Result в Rust используются для обработки восстанавливаемых ошибок?
answer: Ok(T) для успешных операций и Err(E) для неудач
wrong_answers:
  - Success(T) для успешных операций и Failure(E) для неудач
  - Some(T) для успешных операций и None для неудач
  - Pass(T) для успешных операций и Panic(E) для неудач
explanation: |
  Перечисление Result в Rust имеет ровно два варианта: Ok(T), содержащий успешное значение типа T, и Err(E), содержащий ошибку типа E. Такая конструкция заставляет разработчиков явно обрабатывать как случаи успеха, так и неудачи. Другие варианты неверны - Success/Failure не являются вариантами Result, Some/None относятся к перечислению Option для обработки нулевых значений, а Pass/Panic не являются стандартными вариантами перечисления Rust для обработки ошибок.
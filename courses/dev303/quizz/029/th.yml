question: ตัวแปรสองแบบของ Rust's Result enum ที่ใช้สำหรับจัดการข้อผิดพลาดที่สามารถกู้คืนได้คืออะไร?
answer: ตกลง(T) สำหรับการดำเนินการที่ประสบความสำเร็จและข้อผิดพลาด(E) สำหรับความล้มเหลว
wrong_answers:
  - Success(T) สำหรับการดำเนินการที่ประสบความสำเร็จและ Failure(E) สำหรับความล้มเหลว
  - บาง(T) สำหรับการดำเนินการที่ประสบความสำเร็จและไม่มีสำหรับความล้มเหลว
  - ผ่าน (T) สำหรับการดำเนินการที่ประสบความสำเร็จและตื่นตระหนก (E) สำหรับความล้มเหลว
explanation: |
  Result enum ใน Rust มีสองรูปแบบที่แน่นอน: Ok(T) ซึ่งประกอบด้วยค่าที่สำเร็จของประเภท T และ Err(E) ซึ่งประกอบด้วยข้อผิดพลาดของประเภท E การออกแบบนี้บังคับให้นักพัฒนาต้องจัดการทั้งกรณีที่สำเร็จและล้มเหลวอย่างชัดเจน ตัวเลือกอื่นๆ ไม่ถูกต้อง - Success/Failure ไม่ใช่รูปแบบของ Result, Some/None เป็นของ Option enum สำหรับการจัดการค่าที่เป็น null และ Pass/Panic ไม่ใช่รูปแบบมาตรฐานของ Rust enum สำหรับการจัดการข้อผิดพลาด
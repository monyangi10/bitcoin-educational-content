question: Кои са двата варианта на енума Result на Rust, използвани за обработка на възстановими грешки?
answer: Ok(T) за успешни операции и Err(E) за неуспешни
wrong_answers:
  - Success(T) за успешни операции и Failure(E) за неуспешни
  - Some(T) за успешни операции и None за неуспешни
  - Pass(T) за успешни операции и Panic(E) за неуспешни
explanation: |
  Изброяването на резултатите в Rust има точно два варианта: Ok(T), който съдържа успешна стойност от тип T, и Err(E), който съдържа грешка от тип E. Този дизайн принуждава разработчиците изрично да обработват както случаите на успех, така и случаите на неуспех. Другите варианти са некоректни - Success/Failure не са варианти на Result, Some/None принадлежат към enum Option за обработка на нулеви стойности, а Pass/Panic не са стандартни варианти на enum Rust за обработка на грешки.
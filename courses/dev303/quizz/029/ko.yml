question: 복구 가능한 오류를 처리하는 데 사용되는 Rust의 결과 열거형에는 어떤 두 가지 변형이 있나요?
answer: 작업 성공 시 Ok(T), 실패 시 Err(E)를 반환합니다
wrong_answers:
  - 성공적인 작업의 경우 성공(T), 실패의 경우 실패(E)
  - 성공적인 작업의 경우 일부(T), 실패의 경우 없음
  - 작업 성공 시 합격(T), 실패 시 패닉(E)
explanation: |
  Rust의 Result 열거형에는 정확히 두 가지 변형이 있습니다: 유형 T의 성공 값을 포함하는 Ok(T)와 유형 E의 오류를 포함하는 Err(E)입니다. 이 설계는 개발자가 성공 및 실패 사례를 모두 명시적으로 처리하도록 합니다. 다른 옵션은 올바르지 않습니다. 성공/실패는 결과 변형이 아니고, 일부/없음은 null 값 처리를 위한 Option 열거형에 속하며, 통과/패닉은 오류 처리를 위한 표준 Rust 열거형 변형이 아닙니다.
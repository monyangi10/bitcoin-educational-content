question: 在 Rust 中開發類似自訂函數的巨集時，在模式匹配中使用 `expr`、`ty` 和 `ident` 等片段指定符的主要目的是什麼？
answer: 定義可以匹配的程式碼元素種類，並確保輸入的語法有效
wrong_answers:
  - 指定生成代碼的返回類型，優化編譯性能
  - 確定巨集分支的執行順序，並處理執行時的類型檢查
  - 在擴充程式碼中控制記憶體配置模式及定義變數作用範圍規則
explanation: |
  巨集模式中的片段指定符可作為類型約束，在巨集擴充期間驗證輸入符記的語法。它們可確保宏收到正確類型的程式碼元素 (表達式、類型、識別符等)，並在遇到無效語法時提供清楚的錯誤訊息。這發生在編譯時的模式匹配過程中，而不是在執行時的執行過程中，而且它們不會直接控制記憶體分配、執行順序或所產生代碼的回傳類型。
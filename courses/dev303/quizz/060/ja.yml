question: Rustでカスタム関数のようなマクロを開発するとき、パターン・マッチで`expr`、`ty`、`ident`のようなフラグメント指定子を使う主な目的は何ですか？
answer: どのようなコード要素がマッチング可能かを定義し、構文的に有効な入力を保証する。
wrong_answers:
  - 生成されるコードのリターン・タイプを指定し、コンパイルのパフォーマンスを最適化する。
  - マクロ分岐の実行順序を決定し、実行時の型チェックを処理する。
  - メモリ割り当てパターンを制御し、拡張コードで変数のスコープルールを定義する。
explanation: |
  マクロ パターンのフラグメント指定子は、マクロ展開時に入力トークンの構文を検証する型制約として機能します。マクロが正しい種類のコード要素（式、型、識別子など）を受け取ることを保証し、無効な構文に遭遇したときに明確なエラーメッセージを提供します。これは実行時ではなく、パターン マッチングのコンパイル時に行われ、生成されたコードのメモリ割り当て、実行順序、戻り値の型を直接制御することはありません。
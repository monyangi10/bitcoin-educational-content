question: Когато разработвате потребителски макрос, подобен на функция, в Rust, каква е основната цел на използването на спецификатори на фрагменти като `expr`, `ty` и `ident` при съпоставянето на шаблони?
answer: Определяне на вида на елементите на кода, които могат да бъдат сравнявани, и осигуряване на синтактично валиден вход
wrong_answers:
  - Определяне на типа на връщане на генерирания код и оптимизиране на производителността на компилацията
  - Определяне на реда на изпълнение на разклоненията на макросите и обработка на проверката на типа по време на изпълнение
  - Контролиране на моделите за разпределение на паметта и определяне на правилата за определяне на обхвата на променливите в разширения код
explanation: |
  Спецификаторите на фрагменти в макрошаблоните служат като ограничения на типа, които потвърждават синтаксиса на входните лексеми по време на разширяването на макроса. Те гарантират, че макросът получава правилния вид елемент на кода (израз, тип, идентификатор и т.н.) и предоставят ясни съобщения за грешка, когато се срещне невалиден синтаксис. Това се случва по време на компилиране по време на съпоставянето на шаблони, а не по време на изпълнение и те не контролират пряко разпределението на паметта, реда на изпълнение или типовете на връщане на генерирания код.
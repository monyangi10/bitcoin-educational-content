question: При разработке пользовательского функциональноподобного макроса в Rust какова основная цель использования спецификаторов фрагментов `expr`, `ty` и `ident` при сопоставлении образцов?
answer: Чтобы определить, какие элементы кода могут быть сопоставлены, и обеспечить синтаксически корректный ввод
wrong_answers:
  - Чтобы указать возвращаемый тип генерируемого кода и оптимизировать производительность компиляции
  - Для определения порядка выполнения ветвей макросов и проверки типов во время выполнения
  - Для управления распределением памяти и определения правил определения объема переменных в расширенном коде
explanation: |
  Спецификаторы фрагментов в макрошаблонах служат в качестве ограничений типа, которые проверяют синтаксис входных лексем во время расширения макроса. Они гарантируют, что макрос получит правильный тип элемента кода (выражение, тип, идентификатор и т. д.), и выдают четкие сообщения об ошибках, если встречается неправильный синтаксис. Это происходит во время компиляции при сопоставлении шаблонов, а не во время выполнения, и они не управляют непосредственно распределением памяти, порядком выполнения или возвращаемыми типами сгенерированного кода.
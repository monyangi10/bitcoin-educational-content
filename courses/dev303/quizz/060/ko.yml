question: Rust에서 사용자 지정 함수형 매크로를 개발할 때 패턴 매칭에서 `expr`, `ty`, `ident`와 같은 조각 지정자를 사용하는 주된 목적은 무엇인가요?
answer: 일치시킬 수 있는 코드 요소의 종류를 정의하고 구문적으로 유효한 입력을 보장하려면 다음과 같이 하세요
wrong_answers:
  - 생성된 코드의 반환 유형을 지정하고 컴파일 성능을 최적화하려면 다음과 같이 하세요
  - 매크로 브랜치의 실행 순서를 결정하고 런타임 유형 검사를 처리하려면 다음과 같이 하세요
  - 확장 코드에서 메모리 할당 패턴을 제어하고 변수 범위 지정 규칙을 정의하려면 다음과 같이 하세요
explanation: |
  매크로 패턴의 조각 지정자는 매크로 확장 중에 입력 토큰의 구문을 검증하는 유형 제약 조건 역할을 합니다. 매크로가 올바른 종류의 코드 요소(표현식, 유형, 식별자 등)를 수신하도록 보장하고 잘못된 구문이 발견되면 명확한 오류 메시지를 제공합니다. 이는 런타임 실행 중이 아닌 패턴 매칭 중 컴파일 타임에 발생하며, 생성된 코드의 메모리 할당, 실행 순서 또는 반환 유형을 직접 제어하지 않습니다.
question: 在 Rust 中开发自定义函数式宏时，在模式匹配中使用片段指定符（如 `expr`、`ty` 和 `ident`）的主要目的是什么？
answer: 定义可匹配的代码元素类型，确保输入语法有效
wrong_answers:
  - 指定生成代码的返回类型，优化编译性能
  - 确定宏分支的执行顺序并处理运行时类型检查
  - 在扩展代码中控制内存分配模式和定义变量作用域规则
explanation: |
  宏模式中的片段规范作为类型约束，可在宏扩展过程中验证输入标记的语法。它们确保宏接收正确类型的代码元素（表达式、类型、标识符等），并在遇到无效语法时提供明确的错误信息。这发生在编译时的模式匹配过程中，而不是运行时的执行过程中，它们不会直接控制生成代码的内存分配、执行顺序或返回类型。
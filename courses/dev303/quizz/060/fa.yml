question: هنگام توسعه یک ماکروی شبیه به تابع سفارشی در Rust، هدف اصلی استفاده از مشخص‌کننده‌های قطعه مانند `expr`، `ty` و `ident` در تطبیق الگو چیست؟
answer: برای تعریف اینکه چه نوع عناصر کدی می‌توانند مطابقت داشته باشند و اطمینان از ورودی نحوی معتبر
wrong_answers:
  - برای مشخص کردن نوع بازگشتی کد تولید شده و بهینه‌سازی عملکرد کامپایلیشن
  - برای تعیین ترتیب اجرای شاخه‌های ماکرو و مدیریت بررسی نوع در زمان اجرا
  - برای کنترل الگوهای تخصیص حافظه و تعریف قوانین دامنه متغیرها در کد توسعه‌یافته
explanation: |
  مشخص‌کننده‌های قطعه در الگوهای ماکرو به عنوان محدودیت‌های نوع عمل می‌کنند که نحو توکن‌های ورودی را در طول گسترش ماکرو اعتبارسنجی می‌کنند. آن‌ها اطمینان حاصل می‌کنند که ماکرو نوع صحیحی از عنصر کد (عبارت، نوع، شناسه و غیره) را دریافت می‌کند و پیام‌های خطای واضحی را زمانی که نحو نامعتبر مواجه می‌شود، ارائه می‌دهند. این در زمان کامپایل در طول تطبیق الگو اتفاق می‌افتد، نه در زمان اجرای برنامه، و آن‌ها به طور مستقیم تخصیص حافظه، ترتیب اجرا، یا نوع بازگشتی کد تولید شده را کنترل نمی‌کنند.
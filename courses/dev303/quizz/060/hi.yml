question: Rust में कस्टम फ़ंक्शन-जैसे मैक्रो विकसित करते समय, पैटर्न मिलान में `expr`, `ty` और `ident` जैसे फ़्रैगमेंट स्पेसिफ़ायर का उपयोग करने का प्राथमिक उद्देश्य क्या है?
answer: यह परिभाषित करने के लिए कि किस प्रकार के कोड तत्वों का मिलान किया जा सकता है और यह सुनिश्चित करने के लिए कि इनपुट वाक्यविन्यास की दृष्टि से मान्य हो।
wrong_answers:
  - जनरेट किए गए कोड के रिटर्न टाइप को निर्दिष्ट करने और संकलन प्रदर्शन को अनुकूलित करने के लिए
  - मैक्रो शाखाओं के निष्पादन क्रम को निर्धारित करने और रनटाइम टाइप चेकिंग को संभालने के लिए
  - विस्तारित कोड में मेमोरी आवंटन पैटर्न को नियंत्रित करने और चर स्कोपिंग नियमों को परिभाषित करने के लिए
explanation: |
  मैक्रो पैटर्न में फ़्रैगमेंट स्पेसिफ़ायर टाइप कंस्ट्रेंट के रूप में कार्य करते हैं जो मैक्रो विस्तार के दौरान इनपुट टोकन के सिंटैक्स को मान्य करते हैं। वे सुनिश्चित करते हैं कि मैक्रो को सही प्रकार का कोड एलिमेंट (एक्सप्रेशन, टाइप, आइडेंटिफ़ायर, आदि) प्राप्त हो और अमान्य सिंटैक्स मिलने पर स्पष्ट त्रुटि संदेश प्रदान करते हैं। यह प्रक्रिया कंपाइल-टाइम पर पैटर्न मैचिंग के दौरान होती है, न कि रनटाइम निष्पादन के दौरान, और वे मेमोरी आवंटन, निष्पादन क्रम या जेनरेट किए गए कोड के रिटर्न टाइप को सीधे नियंत्रित नहीं करते हैं।
question: เมื่อพัฒนามาโครที่มีลักษณะคล้ายฟังก์ชันใน Rust วัตถุประสงค์หลักของการใช้ตัวระบุส่วนเช่น `expr`, `ty` และ `ident` ในการจับคู่รูปแบบคืออะไร?
answer: เพื่อกำหนดว่าประเภทขององค์ประกอบโค้ดใดที่สามารถจับคู่ได้และเพื่อให้แน่ใจว่าข้อมูลนำเข้านั้นถูกต้องตามไวยากรณ์
wrong_answers:
  - เพื่อระบุประเภทการคืนค่าของโค้ดที่สร้างขึ้นและเพิ่มประสิทธิภาพการคอมไพล์
  - เพื่อกำหนดลำดับการดำเนินการของสาขามาโครและจัดการการตรวจสอบประเภทในขณะรันไทม์
  - เพื่อควบคุมรูปแบบการจัดสรรหน่วยความจำและกำหนดกฎการกำหนดขอบเขตของตัวแปรในโค้ดที่ขยาย
explanation: |
  ตัวระบุชิ้นส่วนในรูปแบบมาโครทำหน้าที่เป็นข้อจำกัดประเภทที่ตรวจสอบความถูกต้องของไวยากรณ์ของโทเค็นอินพุตระหว่างการขยายมาโคร พวกเขาทำให้แน่ใจว่ามาโครได้รับองค์ประกอบโค้ดประเภทที่ถูกต้อง (นิพจน์, ประเภท, ตัวระบุ, ฯลฯ) และให้ข้อความแสดงข้อผิดพลาดที่ชัดเจนเมื่อพบไวยากรณ์ที่ไม่ถูกต้อง สิ่งนี้เกิดขึ้นในช่วงเวลาแปลโปรแกรมระหว่างการจับคู่รูปแบบ ไม่ใช่ระหว่างการดำเนินการในช่วงเวลารันไทม์ และพวกเขาไม่ได้ควบคุมการจัดสรรหน่วยความจำ ลำดับการดำเนินการ หรือประเภทการส่งคืนของโค้ดที่สร้างขึ้นโดยตรง
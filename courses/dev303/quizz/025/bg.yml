question: Коя ключова дума се използва за дефиниране на блокове за изпълнение, които съдържат методи и свързани функции за структури в Rust?
answer: impl
wrong_answers:
  - метод
  - структура
  - fn
explanation: |
  Ключовата дума `impl` се използва специално за създаване на блокове за изпълнение, в които се дефинират методи и свързани функции за структури. Докато `struct` дефинира самата структура, `fn` дефинира отделни функции, а `method` изобщо не е ключова дума на Rust, само `impl` създава блок, който съдържа поведението, свързано с даден тип. Блоковете за реализация, използващи `impl`, ви позволяват да добавяте функционалност към вашите структури, превръщайки ги в нещо повече от контейнери за данни.
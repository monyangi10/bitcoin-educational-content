question: คีย์เวิร์ดใดที่ใช้ในการกำหนดบล็อกการใช้งานที่มีเมธอดและฟังก์ชันที่เกี่ยวข้องสำหรับโครงสร้างใน Rust?
answer: impl
wrong_answers:
  - วิธี
  - struct
  - ฟังก์ชัน
explanation: |
  คำสำคัญ `impl` ถูกใช้เฉพาะเพื่อสร้างบล็อกการใช้งานที่คุณกำหนดวิธีการและฟังก์ชันที่เกี่ยวข้องสำหรับโครงสร้าง ในขณะที่ `struct` กำหนดโครงสร้างเอง, `fn` กำหนดฟังก์ชันแต่ละตัว, และ `method` ไม่ใช่คำสำคัญ Rust เลย, มีเพียง `impl` เท่านั้นที่สร้างบล็อกที่มีพฤติกรรมที่เกี่ยวข้องกับประเภท บล็อกการใช้งานที่ใช้ `impl` ช่วยให้คุณเพิ่มฟังก์ชันการทำงานให้กับโครงสร้างของคุณ ทำให้มันมากกว่าแค่ตัวเก็บข้อมูลเท่านั้น
question: Rust में संरचनाओं के लिए विधियों और संबंधित कार्यों वाले कार्यान्वयन ब्लॉकों को परिभाषित करने के लिए किस कीवर्ड का उपयोग किया जाता है?
answer: इम्प्ल
wrong_answers:
  - तरीका
  - struct
  - एफएन
explanation: |
  `impl` कीवर्ड का उपयोग विशेष रूप से इम्प्लीमेंटेशन ब्लॉक बनाने के लिए किया जाता है, जहाँ आप स्ट्रक्चर के लिए मेथड और संबंधित फ़ंक्शन परिभाषित करते हैं। जबकि `struct` स्वयं स्ट्रक्चर को परिभाषित करता है, `fn` व्यक्तिगत फ़ंक्शन को परिभाषित करता है, और `method` Rust कीवर्ड नहीं है, केवल `impl` ही वह ब्लॉक बनाता है जिसमें किसी प्रकार से संबंधित व्यवहार शामिल होता है। `impl` का उपयोग करके बनाए गए इम्प्लीमेंटेशन ब्लॉक आपको अपने स्ट्रक्चर में कार्यक्षमता जोड़ने की अनुमति देते हैं, जिससे वे केवल डेटा कंटेनर से कहीं अधिक बन जाते हैं।
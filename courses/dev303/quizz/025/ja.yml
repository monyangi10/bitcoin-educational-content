question: Rustの構造体のメソッドと関連関数を含む実装ブロックを定義するために使われるキーワードは？
answer: インプラント
wrong_answers:
  - 方法
  - 構造体
  - fn
explanation: |
  impl`キーワードは特に、構造体のメソッドと関連する関数を定義する実装ブロックを作成するために使用します。struct`は構造体そのものを定義し、`fn`は個々の関数を定義し、`method`はRustキーワードではありませんが、`impl`だけが型に関連する動作を含むブロックを作成します。impl`を使った実装ブロックでは、構造体に機能を追加することができ、単なるデータコンテナ以上のものにすることができる。
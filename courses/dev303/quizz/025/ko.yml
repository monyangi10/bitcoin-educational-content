question: Rust에서 구조체에 대한 메서드 및 관련 함수를 포함하는 구현 블록을 정의하는 데 사용되는 키워드는 무엇인가요?
answer: impl
wrong_answers:
  - 메서드
  - 구조체
  - fn
explanation: |
  특히 `impl` 키워드는 구조체에 대한 메서드와 관련 함수를 정의하는 구현 블록을 만드는 데 사용됩니다. 구조체`는 구조체 자체를 정의하고 `fn`은 개별 함수를 정의하며 `method`는 Rust 키워드가 아니지만, `impl`만이 유형과 관련된 동작을 포함하는 블록을 생성합니다. Impl`을 사용하는 구현 블록을 사용하면 구조체에 기능을 추가하여 단순한 데이터 컨테이너 이상의 기능을 추가할 수 있습니다.
question: Ni neno gani muhimu linalotumika kufafanua blocks za utekelezaji zenye mbinu na vitendaji vinavyohusiana kwa miundo katika Rust?
answer: impl
wrong_answers:
  - mbinu
  - muundo
  - fn
explanation: |
  Neno muhimu la `impl` hutumika mahususi kuunda blocks za utekelezaji ambapo unafafanua mbinu na vitendaji vinavyohusiana kwa miundo. Ingawa `struct` hufafanua muundo wenyewe, `fn` hufafanua vitendaji vya mtu binafsi, na `method` si neno muhimu la Rust hata kidogo, `impl` pekee ndiyo huunda block ambayo ina tabia inayohusiana na aina. Blocks za utekelezaji zinazotumia `impl` hukuruhusu kuongeza utendakazi kwenye miundo yako, na kuifanya kuwa zaidi ya vyombo vya data tu.

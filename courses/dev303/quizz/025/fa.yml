question: در Rust، از کدام کلمه کلیدی برای تعریف بلوک‌های پیاده‌سازی که شامل متدها و توابع مرتبط برای ساختارها هستند، استفاده می‌شود؟
answer: ایمپڵ
wrong_answers:
  - روش
  - ساختار
  - fn
explanation: |
  کلمه کلیدی `impl` به طور خاص برای ایجاد بلوک‌های پیاده‌سازی استفاده می‌شود که در آن شما متدها و توابع مرتبط با ساختارها را تعریف می‌کنید. در حالی که `struct` خود ساختار را تعریف می‌کند، `fn` توابع فردی را تعریف می‌کند و `method` اصلاً یک کلمه کلیدی Rust نیست، تنها `impl` بلوکی را ایجاد می‌کند که شامل رفتار مرتبط با یک نوع است. بلوک‌های پیاده‌سازی با استفاده از `impl` به شما اجازه می‌دهند تا به ساختارهای خود قابلیت اضافه کنید و آن‌ها را به چیزی بیش از صرفاً محفظه‌های داده تبدیل کنید.
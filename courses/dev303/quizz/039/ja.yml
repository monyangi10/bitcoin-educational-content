question: 取り込まれた環境を変異させることなく複数回呼び出すことができるクロージャを表す特質はどれか。
answer: エフエヌ
wrong_answers:
  - フンワンス
  - フンムート
  - Fnキャプチャ
explanation: |
  Fnは最も制限的なクロージャ特質で、取り込んだ環境を変更することなく複数回呼び出せるクロージャを表す。これらのクロージャは不変参照によってのみキャプチャされ、安全に同時呼び出しが可能です。FnOnceは1回だけ呼び出すことができるクロージャを表し、FnMutは複数回呼び出すことができるが、キャプチャした環境を変更する可能性があるクロージャを表します。FnCaptureは本当のRustの特性ではありません。
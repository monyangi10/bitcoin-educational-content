question: ลักษณะใดที่แสดงถึง closures ที่สามารถเรียกใช้หลายครั้งโดยไม่เปลี่ยนแปลงสภาพแวดล้อมที่ถูกจับ?
answer: Fn
wrong_answers:
  - FnOnce
  - FnMut
  - FnCapture
explanation: |
  Fn เป็น trait การปิดที่มีข้อจำกัดมากที่สุดซึ่งแสดงถึงการปิดที่สามารถเรียกได้หลายครั้งโดยไม่เปลี่ยนแปลงสภาพแวดล้อมที่จับไว้ การปิดเหล่านี้จะจับโดยการอ้างอิงที่ไม่เปลี่ยนแปลงเท่านั้นและสามารถเรียกพร้อมกันได้อย่างปลอดภัย FnOnce แสดงถึงการปิดที่สามารถเรียกได้เพียงครั้งเดียว ในขณะที่ FnMut แสดงถึงการปิดที่สามารถเรียกได้หลายครั้งแต่สามารถเปลี่ยนแปลงสภาพแวดล้อมที่จับไว้ได้ FnCapture ไม่ใช่ trait Rust จริง
question: 캡처한 환경을 변경하지 않고 여러 번 호출할 수 있는 클로저를 나타내는 특성은 무엇인가요?
answer: Fn
wrong_answers:
  - FnOnce
  - FnMut
  - FnCapture
explanation: |
  Fn은 캡처된 환경을 변경하지 않고 여러 번 호출할 수 있는 클로저를 나타내는 가장 제한적인 클로저 특성입니다. 이러한 클로저는 불변 참조로만 캡처하며 동시에 안전하게 호출할 수 있습니다. FnOnce는 한 번만 호출할 수 있는 클로저를 나타내고, FnMut은 여러 번 호출할 수 있지만 캡처된 환경이 변경될 수 있는 클로저를 나타냅니다. FnCapture는 실제 Rust 특성이 아닙니다.
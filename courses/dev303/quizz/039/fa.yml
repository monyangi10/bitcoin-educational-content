question: کدام ویژگی نشان‌دهنده‌ی کلوزرهایی است که می‌توان آن‌ها را بدون تغییر محیط ضبط‌شده‌شان چندین بار فراخوانی کرد؟
answer: Fn
wrong_answers:
  - FnOnce
  - FnMut
  - FnCapture
explanation: |
  Fn محدودترین ویژگی بستن است که نشان‌دهنده بستن‌هایی است که می‌توان آن‌ها را چندین بار بدون تغییر محیطی که در آن قرار گرفته‌اند، فراخوانی کرد. این بستن‌ها فقط با ارجاع غیرقابل تغییر (immutable) محیط خود را ضبط می‌کنند و می‌توانند به صورت همزمان و ایمن فراخوانی شوند. FnOnce نشان‌دهنده بستن‌هایی است که فقط یک بار می‌توان آن‌ها را فراخوانی کرد، در حالی که FnMut نشان‌دهنده بستن‌هایی است که می‌توان آن‌ها را چندین بار فراخوانی کرد اما ممکن است محیط ضبط‌شده خود را تغییر دهند. FnCapture یک ویژگی واقعی Rust نیست.
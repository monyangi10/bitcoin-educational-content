question: Which trait represents closures that can be called multiple times without mutating their captured environment?
answer: Fn
wrong_answers:
  - FnOnce
  - FnMut
  - FnCapture
explanation: |
  Fn is the most restrictive closure trait that represents closures callable multiple times without mutating their captured environment. These closures only capture by immutable reference and can be called concurrently safely. FnOnce represents closures that can only be called once, while FnMut represents closures that can be called multiple times but may mutate their captured environment. FnCapture is not a real Rust trait.

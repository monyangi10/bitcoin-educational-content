question: कौन सा गुण उन क्लोजर को दर्शाता है जिन्हें उनके कैप्चर किए गए वातावरण को बदले बिना कई बार कॉल किया जा सकता है?
answer: एफएन
wrong_answers:
  - एफएनओन्स
  - एफएनएम्यूट
  - एफएनकैप्चर
explanation: |
  Fn सबसे प्रतिबंधात्मक क्लोज़र ट्रेट है जो उन क्लोज़र्स को दर्शाता है जिन्हें उनके कैप्चर किए गए वातावरण को बदले बिना कई बार कॉल किया जा सकता है। ये क्लोज़र्स केवल अपरिवर्तनीय संदर्भ द्वारा कैप्चर करते हैं और इन्हें एक साथ सुरक्षित रूप से कॉल किया जा सकता है। FnOnce उन क्लोज़र्स को दर्शाता है जिन्हें केवल एक बार कॉल किया जा सकता है, जबकि FnMut उन क्लोज़र्स को दर्शाता है जिन्हें कई बार कॉल किया जा सकता है लेकिन वे अपने कैप्चर किए गए वातावरण को बदल सकते हैं। FnCapture एक वास्तविक Rust ट्रेट नहीं है।
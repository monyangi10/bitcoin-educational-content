question: Коя черта представя затваряния, които могат да се извикват многократно, без да мутират завладяната среда?
answer: Fn
wrong_answers:
  - FnOnce
  - FnMut
  - FnCapture
explanation: |
  Fn е най-ограничителната черта на затваряне, която представлява затваряне, което може да се извика многократно, без да се променя заснетата среда. Тези затваряния се улавят само чрез неизменна референция и могат да се извикват едновременно безопасно. FnOnce представлява затваряне, което може да бъде извикано само веднъж, докато FnMut представлява затваряне, което може да бъде извикано многократно, но може да мутира заснетата среда. FnCapture не е истинска черта на Rust.
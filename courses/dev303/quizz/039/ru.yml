question: Какой признак представляет закрытия, которые могут быть вызваны несколько раз без изменения их захваченного окружения?
answer: Fn
wrong_answers:
  - FnOnce
  - FnMut
  - FnCapture
explanation: |
  Fn - это наиболее ограничительный признак закрытия, который представляет закрытия, вызываемые несколько раз без изменения их захваченного окружения. Эти закрытия захватывают только неизменяемую ссылку и могут безопасно вызываться одновременно. FnOnce представляет закрытия, которые могут быть вызваны только один раз, а FnMut представляет закрытия, которые могут быть вызваны несколько раз, но могут мутировать их захваченное окружение. FnCapture не является настоящим трейтом Rust.
question: ความท้าทายในการกู้คืนที่สำคัญที่สุดที่ผู้ใช้เผชิญเมื่อเงินทุนของพวกเขาถูกจัดการผ่านสถาปัตยกรรมโหนด Lightning บนคลาวด์ของ Greenlight คืออะไร?
answer: ผู้ใช้จะต้องมีความเชี่ยวชาญทางเทคนิคในการสร้างโหนด Core Lightning อิสระและกู้คืนสถานะช่องโดยไม่ใช้โครงสร้างพื้นฐานของ Greenlight
wrong_answers:
  - "ผู้ใช้สูญเสียการเข้าถึงกุญแจส่วนตัวของพวกเขาซึ่งถูกเก็บไว้เฉพาะบนเซิร์ฟเวอร์ของ Blockstream"
  - "สถานะช่องทางถูกเข้ารหัสโดยใช้กุญแจเฉพาะของ Greenlight ทำให้การกู้คืนเงินเป็นไปไม่ได้ทางคณิตศาสตร์"
  - "ช่องทางสายฟ้าจะหมดอายุโดยอัตโนมัติหลังจาก 30 วันหากไม่มีบริการบำรุงรักษาอย่างต่อเนื่องของ Greenlight"
explanation: |
  คำตอบที่ถูกต้องเน้นถึงความซับซ้อนทางเทคนิคที่แท้จริงของการกู้คืนเงินในสถาปัตยกรรมของ Greenlight ในขณะที่ผู้ใช้เก็บรักษากุญแจส่วนตัวของพวกเขา การเข้าถึงเงินโดยไม่ใช้ Greenlight จำเป็นต้องรันโหนด Core Lightning และกู้คืนสถานะช่องทางด้วยตนเอง - กระบวนการที่เกินความสามารถของผู้ใช้ส่วนใหญ่ คำตอบที่ผิดไม่ถูกต้องเพราะ: ผู้ใช้ควบคุมกุญแจส่วนตัวของพวกเขา (ไม่ได้เก็บไว้บนเซิร์ฟเวอร์), สถานะช่องทางใช้โปรโตคอล Lightning มาตรฐาน (ไม่ใช่การเข้ารหัสที่เป็นกรรมสิทธิ์), และช่องทาง Lightning ไม่มีตัวจับเวลาหมดอายุอัตโนมัติที่ผูกกับผู้ให้บริการ
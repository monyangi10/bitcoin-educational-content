question: چالش بحرانی‌ترین بازیابی که کاربران با آن مواجه می‌شوند زمانی که وجوه آن‌ها از طریق معماری نود لایتنینگ مبتنی بر ابر Greenlight مدیریت می‌شود چیست؟
answer: کاربران به تخصص فنی نیاز دارند تا گره‌های مستقل Core Lightning را راه‌اندازی کرده و وضعیت کانال‌ها را بدون زیرساخت Greenlight بازیابی کنند.
wrong_answers:
  - "کاربران دسترسی به کلیدهای خصوصی خود را که به‌طور انحصاری روی سرورهای Blockstream ذخیره شده‌اند، از دست می‌دهند"
  - "وضعیت‌های کانال با استفاده از کلیدهای اختصاصی Greenlight رمزگذاری می‌شوند و بازیابی وجوه را از نظر ریاضی غیرممکن می‌سازند"
  - "کانال‌های لایتنینگ به‌طور خودکار پس از ۳۰ روز بدون خدمات نگهداری مداوم گرین‌لایت منقضی می‌شوند"
explanation: |
  پاسخ صحیح پیچیدگی فنی واقعی بازیابی وجوه در معماری Greenlight را برجسته می‌کند. در حالی که کاربران کلیدهای خصوصی خود را حفظ می‌کنند، دسترسی به وجوه بدون Greenlight نیاز به اجرای نودهای Core Lightning و بازیابی دستی وضعیت کانال‌ها دارد - فرآیندی که فراتر از توانایی‌های اکثر کاربران است. پاسخ‌های نادرست اشتباه هستند زیرا: کاربران کنترل کلیدهای خصوصی خود را دارند (که روی سرورها ذخیره نمی‌شوند)، وضعیت کانال‌ها از پروتکل‌های استاندارد Lightning استفاده می‌کنند (نه رمزگذاری اختصاصی)، و کانال‌های Lightning تایمرهای انقضای خودکار مرتبط با ارائه‌دهندگان خدمات ندارند.
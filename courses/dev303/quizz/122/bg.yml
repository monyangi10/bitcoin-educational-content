question: Кое е най-сериозното предизвикателство за възстановяване, с което се сблъскват потребителите, когато средствата им се управляват чрез облачно базираната архитектура на възела Lightning на Greenlight?
answer: Потребителите се нуждаят от технически познания, за да създадат независими възли Core Lightning и да възстановят състоянието на каналите без инфраструктурата на Greenlight
wrong_answers:
  - "Потребителите губят достъп до своите частни ключове, които се съхраняват изключително на сървърите на Blockstream"
  - "Състоянията на каналите са криптирани с помощта на патентовани ключове на Greenlight, което прави възстановяването на средства математически невъзможно"
  - "Светкавичните канали автоматично изтичат след 30 дни без услугите за непрекъсната поддръжка на Greenlight"
explanation: |
  Правилният отговор подчертава истинската техническа сложност на възстановяването на средства в архитектурата на Greenlight. Въпреки че потребителите запазват частните си ключове, достъпът до средства без Greenlight изисква стартиране на възлите Core Lightning и ръчно възстановяване на състоянията на каналите - процес, който е извън възможностите на повечето потребители. Грешните отговори са неправилни, защото: потребителите контролират частните си ключове (не се съхраняват на сървъри), състоянията на каналите използват стандартни протоколи на Lightning (а не патентовано криптиране) и каналите на Lightning нямат автоматични таймери за изтичане на срока на валидност, обвързани с доставчиците на услуги.
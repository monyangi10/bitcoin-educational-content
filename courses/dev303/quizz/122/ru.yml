question: С какой наиболее важной проблемой восстановления сталкиваются пользователи, управляющие своими средствами через облачную архитектуру Lightning node компании Greenlight?
answer: Пользователям потребуются технические знания для создания независимых узлов Core Lightning и восстановления состояния каналов без инфраструктуры Greenlight
wrong_answers:
  - "Пользователи теряют доступ к своим приватным ключам, которые хранятся исключительно на серверах Blockstream"
  - "Состояние каналов зашифровано с помощью фирменных ключей Greenlight, что делает возврат средств математически невозможным"
  - "Срок действия каналов Lightning автоматически истекает через 30 дней без постоянного обслуживания Greenlight"
explanation: |
  Правильный ответ подчеркивает реальную техническую сложность восстановления средств в архитектуре Greenlight. Хотя пользователи сохраняют свои приватные ключи, доступ к средствам без Greenlight требует запуска узлов Core Lightning и ручного восстановления состояний каналов - процесс, выходящий за рамки возможностей большинства пользователей. Неправильные ответы неверны, потому что: пользователи действительно контролируют свои закрытые ключи (не хранятся на серверах), состояния каналов используют стандартные протоколы Lightning (не проприетарное шифрование), а каналы Lightning не имеют автоматических таймеров истечения срока действия, привязанных к поставщикам услуг.
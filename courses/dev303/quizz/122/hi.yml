question: ग्रीनलाइट के क्लाउड-आधारित लाइटनिंग नोड आर्किटेक्चर के माध्यम से अपने फंड का प्रबंधन करते समय उपयोगकर्ताओं को रिकवरी से जुड़ी सबसे महत्वपूर्ण चुनौती क्या है?
answer: ग्रीनलाइट इंफ्रास्ट्रक्चर के बिना स्वतंत्र कोर लाइटनिंग नोड्स को स्थापित करने और चैनल की स्थिति को पुनर्स्थापित करने के लिए उपयोगकर्ताओं को तकनीकी विशेषज्ञता की आवश्यकता होगी।
wrong_answers:
  - "उपयोगकर्ता अपनी निजी कुंजियों तक पहुंच खो देते हैं, जो केवल ब्लॉकस्ट्रीम के सर्वरों पर ही संग्रहीत होती हैं।"
  - "चैनल की स्थिति को ग्रीनलाइट की मालिकाना कुंजियों का उपयोग करके एन्क्रिप्ट किया जाता है, जिससे धनराशि की वसूली गणितीय रूप से असंभव हो जाती है।"
  - "ग्रीनलाइट की निरंतर रखरखाव सेवाओं के बिना लाइटनिंग चैनल 30 दिनों के बाद स्वतः समाप्त हो जाते हैं।"
explanation: |
  सही उत्तर ग्रीनलाइट की संरचना में फंड रिकवरी की वास्तविक तकनीकी जटिलता को उजागर करता है। हालांकि उपयोगकर्ता अपनी निजी कुंजी अपने पास रखते हैं, ग्रीनलाइट के बिना फंड तक पहुंचने के लिए कोर लाइटनिंग नोड्स चलाने और चैनल की स्थिति को मैन्युअल रूप से पुनर्स्थापित करने की आवश्यकता होती है - एक ऐसी प्रक्रिया जो अधिकांश उपयोगकर्ताओं की क्षमता से परे है। गलत उत्तर इसलिए गलत हैं क्योंकि: उपयोगकर्ता अपनी निजी कुंजी को नियंत्रित करते हैं (सर्वर पर संग्रहीत नहीं), चैनल की स्थिति मानक लाइटनिंग प्रोटोकॉल का उपयोग करती है (स्वामित्व वाली एन्क्रिप्शन का नहीं), और लाइटनिंग चैनलों में सेवा प्रदाताओं से जुड़े स्वचालित समाप्ति टाइमर नहीं होते हैं।
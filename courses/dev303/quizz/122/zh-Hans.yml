question: 当用户的资金通过Greenlight基于云的闪电节点架构进行管理时，他们面临的最关键的恢复挑战是什么？
answer: 用户需要专业技术知识，才能在没有 Greenlight 基础设施的情况下启动独立的 Core Lightning 节点并恢复通道状态
wrong_answers:
  - "用户无法访问其私人密钥，而这些密钥只存储在 Blockstream 的服务器上"
  - "通道状态使用 Greenlight 的专有密钥加密，在数学上不可能恢复资金"
  - 如果没有 Greenlight 的持续维护服务，"闪电 "频道将在 30 天后自动失效。
explanation: |
  正确答案凸显了 Greenlight 架构中资金恢复的真正技术复杂性。虽然用户保留了自己的私人密钥，但在没有Greenlight的情况下访问资金需要运行核心闪电节点并手动恢复通道状态，这一过程超出了大多数用户的能力范围。错误答案的原因是：用户确实可以控制自己的私钥（不存储在服务器上），通道状态使用标准的 Lightning 协议（不是专有加密），Lightning 通道没有与服务提供商绑定的自动过期计时器。
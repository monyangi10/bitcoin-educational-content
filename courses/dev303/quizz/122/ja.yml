question: Greenlightのクラウドベースのライトニング・ノード・アーキテクチャで資金を管理する場合、ユーザーが直面する最も重大なリカバリーの課題は何ですか？
answer: Greenlightインフラなしで、独立したCore Lightningノードをスピンアップし、チャネル状態をリストアするには、技術的な専門知識が必要です。
wrong_answers:
  - 「ユーザーは、ブロックストリームのサーバーにのみ保管されている秘密鍵にアクセスできなくなる。
  - 「チャネルの状態はグリーンライト独自のキーで暗号化されており、資金の回収は数学的に不可能である。
  - "ライトニング・チャンネルは、グリーンライトの継続的な保守サービスがなければ、30日後に自動的に失効する"
explanation: |
  正解は、Greenlightのアーキテクチャにおける資金回収の技術的な複雑さを浮き彫りにしている。ユーザーは秘密鍵を保持しているが、Greenlightなしで資金にアクセスするには、コアライトニングノードを実行し、チャンネル状態を手動で復元する必要がある。間違った答えは、ユーザーが秘密鍵を管理していること（サーバーに保存されていない）、チャネルの状態が標準的なLightningプロトコルを使用していること（独自の暗号化ではない）、Lightningチャネルがサービスプロバイダに縛られた自動有効期限タイマーを持たないことです。
question: Thách thức quan trọng nhất mà người dùng phải đối mặt khi quản lý tiền của họ thông qua kiến trúc nút Lightning dựa trên đám mây của Greenlight là gì?
answer: Người dùng sẽ cần có chuyên môn kỹ thuật để khởi tạo các node Core Lightning độc lập và khôi phục trạng thái kênh nếu không có cơ sở hạ tầng Greenlight.
wrong_answers:
  - "Người dùng sẽ mất quyền truy cập vào khóa riêng tư của họ, vốn được lưu trữ độc quyền trên máy chủ của Blockstream."
  - "Trạng thái kênh được mã hóa bằng các khóa độc quyền của Greenlight, khiến việc khôi phục tiền về mặt toán học là bất khả thi."
  - "Các kênh Lightning sẽ tự động hết hạn sau 30 ngày nếu không có dịch vụ bảo trì liên tục của Greenlight."
explanation: |
  Câu trả lời đúng nêu bật sự phức tạp về mặt kỹ thuật thực sự của việc khôi phục quỹ trong kiến trúc của Greenlight. Mặc dù người dùng vẫn giữ khóa riêng của họ, nhưng việc truy cập quỹ mà không có Greenlight yêu cầu phải chạy các node Core Lightning và khôi phục trạng thái kênh theo cách thủ công - một quy trình vượt quá khả năng của hầu hết người dùng. Các câu trả lời sai là không chính xác vì: người dùng vẫn kiểm soát khóa riêng của họ (không được lưu trữ trên máy chủ), trạng thái kênh sử dụng các giao thức Lightning tiêu chuẩn (không phải mã hóa độc quyền) và các kênh Lightning không có bộ hẹn giờ hết hạn tự động được liên kết với các nhà cung cấp dịch vụ.
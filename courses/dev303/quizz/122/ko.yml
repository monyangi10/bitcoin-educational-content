question: 그린라이트의 클라우드 기반 라이트닝 노드 아키텍처를 통해 자금을 관리할 때 사용자가 직면하는 가장 중요한 복구 과제는 무엇인가요?
answer: 사용자는 그린라이트 인프라 없이 독립적인 코어 라이트닝 노드를 스핀업하고 채널 상태를 복원하려면 기술적 전문 지식이 필요합니다
wrong_answers:
  - "사용자는 블록스트림 서버에만 저장된 개인 키에 대한 액세스 권한을 잃게 됩니다."
  - "채널 상태는 Greenlight의 독점 키를 사용하여 암호화되므로 자금 회수가 수학적으로 불가능합니다."
  - "Greenlight의 지속적인 유지 관리 서비스 없이 30일이 지나면 라이트닝 채널이 자동으로 만료됩니다."
explanation: |
  정답은 그린라이트 아키텍처에서 자금 복구의 진정한 기술적 복잡성을 강조합니다. 사용자는 자신의 개인 키를 유지하지만, 그린라이트 없이 자금에 액세스하려면 코어 라이트닝 노드를 실행하고 채널 상태를 수동으로 복원해야 하는데, 이는 대부분의 사용자가 처리할 수 없는 프로세스입니다. 정답이 틀린 이유는 사용자가 자신의 개인 키를 제어하고(서버에 저장되지 않음), 채널 상태는 독점 암호화가 아닌 표준 라이트닝 프로토콜을 사용하며, 라이트닝 채널에는 서비스 제공업체와 연결된 자동 만료 타이머가 없기 때문입니다.
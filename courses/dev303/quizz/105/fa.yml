question: تفاوت اساسی بین طراحی لایه پایداری LDK و مدیریت داده‌های نود لایتنینگ سنتی که امکان انعطاف‌پذیری در استقرار چندپلتفرمی را فراهم می‌کند چیست؟
answer: LDK داده‌های دودویی انتزاعی را برای ذخیره‌سازی فراهم می‌کند در حالی که برنامه‌ها مکانیزم‌های ذخیره‌سازی خود را پیاده‌سازی می‌کنند.
wrong_answers:
  - LDK از پایگاه‌های داده SQL استاندارد استفاده می‌کند در حالی که نودهای سنتی به پیاده‌سازی‌های سفارشی سیستم فایل نیاز دارند.
  - LDK به‌طور خودکار داده‌ها را در چندین پلتفرم همگام‌سازی می‌کند، در حالی که نودهای سنتی داده‌ها را فقط به‌صورت محلی ذخیره می‌کنند.
  - ‏LDK به‌طور پیش‌فرض تمام داده‌های پایداری را رمزگذاری می‌کند، در حالی که نودهای سنتی به رمزگذاری در سطح برنامه متکی هستند.
explanation: |
  لایه پایداری LDK ذخیره‌سازی را با ارائه بلوک‌های داده باینری سریال‌شده به برنامه‌ها که باید به‌طور قابل‌اعتمادی ذخیره و بازیابی شوند، انتزاع می‌کند، در حالی که تمام پیچیدگی‌های سریال‌سازی وضعیت‌های کانال لایتنینگ و داده‌های شبکه را به‌صورت داخلی مدیریت می‌کند. این امر به برنامه‌ها اجازه می‌دهد تا هر راه‌حل ذخیره‌سازی (سیستم‌های فایل، ذخیره‌سازی ابری، پایگاه‌های داده) را که با نیازهای پلتفرم آن‌ها مطابقت دارد، انتخاب کنند. نودهای سنتی لایتنینگ معمولاً سیستم‌های مدیریت داده خاص خود را که به مکانیزم‌های ذخیره‌سازی خاصی متصل هستند، پیاده‌سازی می‌کنند و این امر آن‌ها را در محیط‌های استقرار مختلف کمتر انعطاف‌پذیر می‌سازد.
question: LDK的持久层设计与传统的Lightning节点数据管理之间的关键区别是什么？
answer: LDK 提供用于存储的抽象二进制数据 Blob，而应用程序则实施自己的存储机制
wrong_answers:
  - LDK 使用标准化 SQL 数据库，而传统节点需要自定义文件系统实现
  - LDK 可在多个平台上自动同步数据，而传统节点只能在本地存储数据
  - LDK 默认对所有持久性数据进行加密，而传统节点则依赖于应用级加密
explanation: |
  LDK 的持久层通过向应用程序提供必须可靠存储和检索的序列化二进制数据 Blob 来抽象存储，同时在内部处理所有复杂的序列化闪电通道状态和网络数据。这样，应用程序就可以选择符合其平台要求的任何存储解决方案（文件系统、云存储、数据库）。传统的 Lightning 节点通常会实施自己的特定数据管理系统，并与特定的存储机制绑定，因此在不同的部署环境中灵活性较差。
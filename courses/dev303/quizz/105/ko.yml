question: 플랫폼 간 배포 유연성을 지원하는 LDK의 지속성 계층 설계와 기존 Lightning 노드 데이터 관리의 중요한 차이점은 무엇인가요?
answer: LDK는 애플리케이션이 자체 스토리지 메커니즘을 구현하는 동안 스토리지를 위한 추상적인 바이너리 데이터 블롭을 제공합니다
wrong_answers:
  - 기존 노드에는 사용자 정의 파일 시스템 구현이 필요한 반면, LDK는 표준화된 SQL 데이터베이스를 사용합니다
  - 기존 노드가 로컬에만 데이터를 저장하는 반면, LDK는 여러 플랫폼에서 데이터를 자동으로 동기화합니다
  - 기존 노드는 애플리케이션 수준 암호화에 의존하는 반면, LDK는 기본적으로 모든 지속성 데이터를 암호화합니다
explanation: |
  LDK의 지속성 계층은 애플리케이션에 안정적으로 저장 및 검색해야 하는 직렬화된 바이너리 데이터 블롭을 제공하는 동시에 내부적으로 Lightning 채널 상태 및 네트워크 데이터를 직렬화하는 모든 복잡성을 처리함으로써 스토리지를 추상화합니다. 이를 통해 애플리케이션은 플랫폼 요구 사항에 맞는 스토리지 솔루션(파일 시스템, 클라우드 스토리지, 데이터베이스)을 선택할 수 있습니다. 기존의 라이트닝 노드는 일반적으로 특정 스토리지 메커니즘에 연결된 자체적인 데이터 관리 시스템을 구현하기 때문에 다양한 배포 환경에서 유연성이 떨어집니다.
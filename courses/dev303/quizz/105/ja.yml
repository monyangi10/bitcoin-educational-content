question: LDKの永続化レイヤーの設計と、クロスプラットフォームの柔軟な展開を可能にする従来のLightningノードのデータ管理との決定的な違いは何でしょうか？
answer: LDKは抽象的なバイナリデータBLOBをストレージとして提供し、アプリケーションは独自のストレージメカニズムを実装する。
wrong_answers:
  - LDKは標準化されたSQLデータベースを使用するが、従来のノードではカスタム・ファイル・システムの実装が必要だった。
  - 従来のノードがローカルにのみデータを保存するのに対し、LDKは複数のプラットフォーム間でデータを自動的に同期する
  - 従来のノードがアプリケーション・レベルの暗号化に依存していたのに対し、LDKはデフォルトですべての永続性データを暗号化します。
explanation: |
  LDKの永続化レイヤーは、アプリケーションにシリアライズされたバイナリデータブロブを提供することでストレージを抽象化し、信頼性の高い保存と取得を実現します。これにより、アプリケーションは、プラットフォーム要件に合致する任意のストレージソリューション（ファイルシステム、クラウドストレージ、データベース）を選択できます。従来のLightningノードは通常、特定のストレージメカニズムに結びついた独自のデータ管理システムを実装しているため、さまざまな展開環境において柔軟性に欠ける。
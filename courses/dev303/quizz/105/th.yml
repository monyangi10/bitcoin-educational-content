question: ความแตกต่างที่สำคัญระหว่างการออกแบบชั้นความคงทนของ LDK และการจัดการข้อมูลโหนด Lightning แบบดั้งเดิมที่ช่วยให้มีความยืดหยุ่นในการปรับใช้ข้ามแพลตฟอร์มคืออะไร?
answer: LDK ให้ข้อมูลไบนารีแบบนามธรรมสำหรับการจัดเก็บ ในขณะที่แอปพลิเคชันจะใช้กลไกการจัดเก็บของตนเอง
wrong_answers:
  - LDK ใช้ฐานข้อมูล SQL มาตรฐาน ในขณะที่โหนดแบบดั้งเดิมต้องการการใช้งานระบบไฟล์ที่กำหนดเอง
  - LDK ซิงโครไนซ์ข้อมูลโดยอัตโนมัติข้ามหลายแพลตฟอร์ม ในขณะที่โหนดแบบดั้งเดิมจะจัดเก็บข้อมูลเฉพาะในเครื่องเท่านั้น
  - LDK เข้ารหัสข้อมูลการคงอยู่ทั้งหมดโดยค่าเริ่มต้น ในขณะที่โหนดแบบดั้งเดิมพึ่งพาการเข้ารหัสในระดับแอปพลิเคชัน
explanation: |
  เลเยอร์ความคงทนของ LDK ทำการแยกการจัดเก็บข้อมูลโดยให้แอปพลิเคชันมีข้อมูลไบนารีที่ถูกจัดเก็บและเรียกคืนได้อย่างน่าเชื่อถือ ในขณะที่จัดการความซับซ้อนทั้งหมดของการทำให้สถานะช่องทาง Lightning และข้อมูลเครือข่ายเป็นแบบซีเรียลภายใน ซึ่งช่วยให้แอปพลิเคชันสามารถเลือกโซลูชันการจัดเก็บข้อมูลใด ๆ (ระบบไฟล์, การจัดเก็บบนคลาวด์, ฐานข้อมูล) ที่ตรงกับความต้องการของแพลตฟอร์มของพวกเขาได้ โหนด Lightning แบบดั้งเดิมมักจะใช้ระบบการจัดการข้อมูลเฉพาะของตนเองที่ผูกติดกับกลไกการจัดเก็บข้อมูลเฉพาะ ทำให้มีความยืดหยุ่นน้อยลงในสภาพแวดล้อมการปรับใช้ที่แตกต่างกัน
question: LDK的持久層設計與傳統的Lightning節點資料管理有何關鍵性差異，可實現跨平台部署的靈活性？
answer: LDK 提供抽象的二進位資料 Blob 用於儲存，而應用程式則實作自己的儲存機制
wrong_answers:
  - LDK 使用標準化的 SQL 資料庫，而傳統節點則需要自訂檔案系統實作
  - LDK 可在多個平台上自動同步資料，而傳統節點只能在本機儲存資料
  - LDK 預設會加密所有持久性資料，而傳統節點則依賴應用程式層級加密
explanation: |
  LDK 的持久層透過提供應用程式序列化的二進位資料 Blob 來抽象儲存，這些資料必須可靠地儲存與擷取，同時在內部處理所有序列化 Lightning 通道狀態與網路資料的複雜性。這允許應用程式選擇符合其平台需求的任何儲存解決方案（檔系統、雲儲存、資料庫）。傳統的 Lightning 節點通常會實作自己特定的資料管理系統，並與特定的儲存機制綁在一起，因此在不同的部署環境中靈活性較低。
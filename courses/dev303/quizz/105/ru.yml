question: В чем критическое отличие конструкции слоя персистентности LDK от традиционного управления данными узла Lightning, обеспечивающее гибкость кросс-платформенного развертывания?
answer: LDK предоставляет абстрактные двоичные блоки данных для хранения, а приложения реализуют собственные механизмы хранения
wrong_answers:
  - LDK использует стандартизированные базы данных SQL, в то время как традиционные узлы требуют реализации собственной файловой системы
  - LDK автоматически синхронизирует данные между несколькими платформами, в то время как традиционные узлы хранят данные только локально
  - LDK по умолчанию шифрует все сохраняемые данные, в то время как традиционные узлы полагаются на шифрование на уровне приложений
explanation: |
  Уровень постоянства LDK абстрагирует хранение данных, предоставляя приложениям сериализованные двоичные данные, которые должны надежно храниться и извлекаться, при этом вся сложность сериализации состояний канала Lightning и сетевых данных решается внутри приложения. Это позволяет приложениям выбирать любое решение для хранения данных (файловые системы, облачные хранилища, базы данных), соответствующее их требованиям к платформе. Традиционные узлы Lightning обычно реализуют свои собственные системы управления данными, привязанные к определенным механизмам хранения, что делает их менее гибкими в различных средах развертывания.
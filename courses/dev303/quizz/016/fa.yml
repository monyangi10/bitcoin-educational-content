question: هنگام اختصاص یک متغیر رشته‌ای به متغیر دیگر، Rust به طور پیش‌فرض چه نوع عملیاتی را انجام می‌دهد؟
answer: عملیات انتقالی که مالکیت را منتقل کرده و متغیر منبع را نامعتبر می‌کند
wrong_answers:
  - یک کپی عمیق که تمام داده‌های heap را برای ایجاد رشته‌های مستقل تکرار می‌کند
  - یک کپی سطحی که دو اشاره‌گر به همان حافظه heap ایجاد می‌کند
  - ایجاد مرجعی که به هر دو متغیر اجازه می‌دهد به‌صورت فقط خواندنی دسترسی داشته باشند
explanation: |
  Rust به‌طور پیش‌فرض هنگام اختصاص انواع پیچیده مانند String، یک عملیات انتقال انجام می‌دهد. این کار مالکیت را از متغیر منبع به متغیر مقصد منتقل می‌کند و منبع را نامعتبر می‌سازد، که از سناریوهای خطرناکی که در آن چندین متغیر می‌توانند همان حافظه heap را تغییر دهند، جلوگیری می‌کند. یک کپی عمیق برای رشته‌های بزرگ ناکارآمد خواهد بود، یک کپی سطحی مسائل ایمنی حافظه را با اشاره‌گرهای متعدد به داده‌های یکسان ایجاد می‌کند، و ایجاد مرجع نیاز به نحو صریح با عملگر ampersand دارد.
question: Rust ทำการดำเนินการประเภทใดโดยค่าเริ่มต้นเมื่อกำหนดตัวแปร String หนึ่งให้กับอีกตัวแปรหนึ่ง?
answer: การดำเนินการย้ายที่โอนความเป็นเจ้าของและทำให้ตัวแปรต้นทางไม่ถูกต้อง
wrong_answers:
  - สำเนาลึกที่ทำซ้ำข้อมูล heap ทั้งหมดเพื่อสร้างสตริงที่เป็นอิสระ
  - สำเนาตื้นที่สร้างตัวชี้สองตัวไปยังหน่วยความจำกองเดียวกัน
  - การสร้างการอ้างอิงที่อนุญาตให้ตัวแปรทั้งสองใช้การเข้าถึงแบบอ่านอย่างเดียวร่วมกัน
explanation: |
  Rust ดำเนินการย้ายข้อมูลโดยค่าเริ่มต้นเมื่อกำหนดประเภทข้อมูลที่ซับซ้อนเช่น String ซึ่งจะโอนความเป็นเจ้าของจากตัวแปรต้นทางไปยังตัวแปรปลายทางในขณะที่ทำให้ตัวแปรต้นทางไม่ถูกต้อง ป้องกันสถานการณ์อันตรายที่ตัวแปรหลายตัวสามารถแก้ไขหน่วยความจำ heap เดียวกันได้ การคัดลอกแบบลึกจะไม่มีประสิทธิภาพสำหรับสตริงขนาดใหญ่ การคัดลอกแบบตื้นจะสร้างปัญหาด้านความปลอดภัยของหน่วยความจำกับตัวชี้หลายตัวไปยังข้อมูลเดียวกัน และการสร้างการอ้างอิงต้องใช้ไวยากรณ์ที่ชัดเจนด้วยตัวดำเนินการ ampersand
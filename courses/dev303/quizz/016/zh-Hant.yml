question: 當將一個 String 變數指定給另一個 String 變數時，Rust 預設會執行哪種類型的操作？
answer: 移動操作會轉移所有權並使來源變數無效。
wrong_answers:
  - 深度複製，複製所有堆資料以建立獨立字串
  - 淺層複製會建立兩個指向相同堆記憶體的指針
  - 建立參考，可讓兩個變數共用唯讀存取權限
explanation: |
  Rust 在指定複雜類型如 String 時，預設會執行 move 操作。這將所有權從源變數轉移到目的變數，同時使源變數無效，防止出現多個變數可能修改相同堆記憶體的危險情況。對於大型字串來說，深度複製的效率會很低，淺度複製會因為有多個指針指向相同的資料而產生記憶體安全問題，而引用的建立需要使用安培運算符的明確語法。
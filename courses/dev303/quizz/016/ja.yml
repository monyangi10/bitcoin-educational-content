question: あるString変数を別の変数に代入するとき、Rustはデフォルトでどのような操作を行うのですか？
answer: 所有権を移譲し、移譲元変数を無効にする移動操作。
wrong_answers:
  - 独立した文字列を作成するために、すべてのヒープデータを複製するディープコピー
  - 同じヒープ・メモリーへの2つのポインターを作る浅いコピー
  - 両方の変数が読み取り専用アクセスを共有できる参照作成
explanation: |
  Rustでは、Stringのような複雑な型を代入する場合、デフォルトで移動操作を行います。これは、移動元を無効にしながら移動先の変数に所有権を移すもので、複数の変数が同じヒープ・メモリを変更するような危険なシナリオを防ぎます。ディープコピーは大きな文字列に対して非効率的であり、シャローコピーは同じデータへの複数のポインタでメモリ安全性の問題を引き起こし、参照作成はアンパサンド演算子による明示的な構文が必要である。
question: 하나의 문자열 변수를 다른 변수에 할당할 때 Rust은 기본적으로 어떤 유형의 연산을 수행하나요?
answer: 소유권을 이전하고 소스 변수를 무효화하는 이동 작업입니다
wrong_answers:
  - 모든 힙 데이터를 복제하여 독립된 문자열을 생성하는 딥 카피
  - 동일한 힙 메모리에 대한 두 개의 포인터를 생성하는 얕은 복사본입니다
  - 두 변수가 읽기 전용 액세스를 공유할 수 있는 참조 생성
explanation: |
  Rust은 문자열과 같은 복잡한 유형을 할당할 때 기본적으로 이동 작업을 수행합니다. 이렇게 하면 소스에서 대상 변수로 소유권이 이전되는 동시에 소스가 무효화되어 여러 변수가 동일한 힙 메모리를 수정할 수 있는 위험한 시나리오를 방지할 수 있습니다. 딥 카피는 큰 문자열의 경우 비효율적이고, 얕은 카피는 동일한 데이터에 대한 여러 포인터로 인해 메모리 안전 문제가 발생하며, 참조를 생성하려면 앰퍼샌드 연산자를 사용한 명시적인 구문이 필요합니다.
question: 在将一个字符串变量赋值给另一个字符串变量时，Rust 默认执行哪种类型的操作？
answer: 移动操作可转移所有权并使源变量失效
wrong_answers:
  - 深度复制，复制所有堆数据以创建独立字符串
  - 浅层拷贝可创建两个指向相同堆内存的指针
  - 创建引用，允许两个变量共享只读访问权限
explanation: |
  Rust 在分配字符串等复杂类型时默认执行移动操作。这将所有权从源变量转移到目标变量，同时使源变量失效，防止出现多个变量修改同一堆内存的危险情况。对于大型字符串来说，深度拷贝的效率很低；浅层拷贝则会因指向相同数据的多个指针而产生内存安全问题；而创建引用则需要使用带 "ampersand "操作符的显式语法。
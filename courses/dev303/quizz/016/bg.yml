question: Какъв тип операция изпълнява Rust по подразбиране, когато присвоява една променлива String към друга?
answer: Операция за преместване, която прехвърля собствеността и обезсилва променливата на източника
wrong_answers:
  - Дълбоко копие, което дублира всички данни от купчината, за да създаде независими низове
  - Плитко копие, което създава два указателя към една и съща памет на купчината
  - Създаване на референция, която позволява на двете променливи да споделят достъп само за четене
explanation: |
  Rust извършва операция за преместване по подразбиране при присвояване на сложни типове като String. По този начин се прехвърля собствеността от променливата източник към променливата получател, като същевременно се обезсилва източникът, което предотвратява опасни сценарии, при които няколко променливи могат да модифицират една и съща памет на купчината. Дълбокото копиране би било неефективно за големи низове, плиткото копиране би създало проблеми с безопасността на паметта при множество указатели към едни и същи данни, а създаването на препратки изисква изричен синтаксис с оператора ampersand.
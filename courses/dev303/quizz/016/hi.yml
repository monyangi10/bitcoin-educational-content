question: एक स्ट्रिंग वेरिएबल को दूसरे स्ट्रिंग वेरिएबल में असाइन करते समय Rust डिफ़ॉल्ट रूप से किस प्रकार का ऑपरेशन करता है?
answer: एक मूव ऑपरेशन जो स्वामित्व को स्थानांतरित करता है और स्रोत चर को अमान्य कर देता है
wrong_answers:
  - एक डीप कॉपी जो स्वतंत्र स्ट्रिंग बनाने के लिए सभी हीप डेटा को डुप्लिकेट करती है
  - एक शैलो कॉपी जो एक ही हीप मेमोरी के लिए दो पॉइंटर बनाती है
  - एक संदर्भ निर्माण जो दोनों चरों को केवल पढ़ने की पहुँच साझा करने की अनुमति देता है
explanation: |
  Rust स्ट्रिंग जैसे जटिल प्रकारों को असाइन करते समय डिफ़ॉल्ट रूप से एक मूव ऑपरेशन करता है। यह स्रोत चर से गंतव्य चर को स्वामित्व हस्तांतरित करता है, जबकि स्रोत चर को अमान्य कर देता है, जिससे उन खतरनाक स्थितियों को रोका जा सकता है जहां कई चर एक ही हीप मेमोरी को संशोधित कर सकते हैं। बड़ी स्ट्रिंग के लिए डीप कॉपी अप्रभावी होगी, शैलो कॉपी एक ही डेटा के लिए कई पॉइंटर्स के साथ मेमोरी सुरक्षा संबंधी समस्याएं पैदा करेगी, और संदर्भ निर्माण के लिए एम्परसेंड ऑपरेटर के साथ स्पष्ट सिंटैक्स की आवश्यकता होती है।
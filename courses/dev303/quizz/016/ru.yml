question: Какую операцию Rust выполняет по умолчанию при присвоении одной переменной String другой?
answer: Операция перемещения, передающая право собственности и аннулирующая исходную переменную
wrong_answers:
  - Глубокая копия, которая дублирует все данные кучи для создания независимых строк
  - Неглубокое копирование, создающее два указателя на одну и ту же память кучи
  - Создание ссылки, которая позволяет обеим переменным иметь общий доступ только для чтения
explanation: |
  По умолчанию Rust выполняет операцию перемещения при присвоении сложных типов, таких как String. Это передает право собственности от исходной переменной к переменной назначения, одновременно аннулируя исходную, предотвращая опасные сценарии, когда несколько переменных могут модифицировать одну и ту же память кучи. Глубокое копирование было бы неэффективным для больших строк, неглубокое копирование создавало бы проблемы с безопасностью памяти при наличии нескольких указателей на одни и те же данные, а создание ссылок требует явного синтаксиса с оператором ampersand.
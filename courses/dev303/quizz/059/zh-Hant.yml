question: 與手動實作自訂類型的 traits 相比，使用派生巨集（如 #[derive(Debug)]）的主要優勢是什麼？
answer: 它們會在編譯時自動 generate 完整的特徵實作，減少模板程式碼
wrong_answers:
  - 它們透過優化執行過程中的特徵方法呼叫，提供更好的執行時效能
  - 它們允許以不同的行為多次實作同一類型的特徵
  - 它們允許在執行時根據程式狀態修改動態特徵實作
explanation: |
  Derive 巨集會在編譯過程中自動 generate 特徵實作，省去手動編寫重複的模板程式碼。當您使用 #[derive(Debug)]，編譯器會為該特徵產生所有必要的格式化邏輯。錯誤的答案是不正確的，因為：derive 巨集不會改善執行時的效能（它們 generate 與您手寫的程式碼相同），特徵不論如何實作，每個類型只能實作一次，而且在編譯時，derive 巨集 generate 靜態程式碼，而不是啟用執行時修改。
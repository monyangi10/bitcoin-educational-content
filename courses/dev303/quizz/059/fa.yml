question: مزیت کلیدی استفاده از ماکروهای مشتق مانند #[derive(Debug)] در مقایسه با پیاده‌سازی دستی صفات برای انواع سفارشی چیست؟
answer: آن‌ها به‌طور خودکار generate پیاده‌سازی‌های کامل ویژگی را در زمان کامپایل تکمیل می‌کنند و کد تکراری را کاهش می‌دهند.
wrong_answers:
  - آن‌ها با بهینه‌سازی فراخوانی‌های متد ویژگی در حین اجرا، عملکرد زمان اجرا بهتری ارائه می‌دهند.
  - آن‌ها اجازه می‌دهند ویژگی‌ها برای یک نوع با رفتارهای مختلف چندین بار پیاده‌سازی شوند.
  - آن‌ها پیاده‌سازی ویژگی‌های پویا را امکان‌پذیر می‌سازند که می‌تواند بر اساس وضعیت برنامه در زمان اجرا تغییر کند.
explanation: |
  مشتقات ماکروها به‌طور خودکار پیاده‌سازی‌های ویژگی generate را در طول کامپایل تولید می‌کنند و نیاز به نوشتن کد تکراری و خسته‌کننده را به‌صورت دستی از بین می‌برند. وقتی از #[derive(Debug)] استفاده می‌کنید، کامپایلر تمام منطق قالب‌بندی لازم برای آن ویژگی را تولید می‌کند. پاسخ‌های نادرست اشتباه هستند زیرا: ماکروهای مشتق عملکرد زمان اجرا را بهبود نمی‌بخشند (آن‌ها generate همان کدی را که به‌صورت دستی می‌نویسید تولید می‌کنند)، ویژگی‌ها فقط یک‌بار برای هر نوع می‌توانند پیاده‌سازی شوند، صرف‌نظر از اینکه چگونه پیاده‌سازی می‌شوند، و ماکروهای مشتق generate کد ایستا را در زمان کامپایل تولید می‌کنند و نه اینکه تغییرات زمان اجرا را فعال کنند.
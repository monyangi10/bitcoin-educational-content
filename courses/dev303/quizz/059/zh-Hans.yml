question: 使用派生宏（如 #[derive(Debug)]）与为自定义类型手动实现特质相比，主要优势是什么？
answer: 它们在编译时自动实现 generate 完整特质，减少了模板代码
wrong_answers:
  - 它们通过优化执行过程中的特质方法调用，提供更好的运行时性能
  - 它们允许对同一类型的特质执行多次，并具有不同的行为
  - 它们实现了动态特质实现，可在运行时根据程序状态进行修改
explanation: |
  派生宏可在编译过程中自动实现 generate 特质，从而无需手动编写重复的模板代码。使用 #[derive(Debug)] 时，编译器会为该特质生成所有必要的格式化逻辑。错误答案是不正确的，因为：派生宏不能提高运行时性能（它们与手动编写的代码相同）；无论以何种方式实现，每个类型只能实现一次特质；派生宏是在编译时实现静态代码，而不是在运行时进行修改。
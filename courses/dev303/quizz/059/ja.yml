question: derive(Debug)]のようなderiveマクロを使用することの主な利点は、カスタム型のために手作業でtraitを実装することと比較して何ですか？
answer: コンパイル時に自動的にgenerateの完全な特質実装を行い、定型的なコードを削減します。
wrong_answers:
  - 実行中の形質メソッド呼び出しを最適化することで、実行時のパフォーマンスを向上させます。
  - これにより、同じ型に異なる振る舞いをする特性を複数回実装することができる。
  - プログラムの状態に応じて実行時に変更できる動的な形質の実装を可能にする。
explanation: |
  Derive マクロを使用すると、コンパイル時に自動的に generate trait 実装が生成されるため、反復的な定型 コードを手動で記述する必要がなくなります。derive(Debug)]を使用すると、コンパイラはそのtraitに必要なすべてのフォーマットロジックを生成します。不正解の理由は、deriveマクロは実行時のパフォーマンスを向上させない（手動で記述するのと同じコードをgenerateする）、traitは実装方法に関係なく1つの型につき1回しか実装できない、deriveマクロは実行時の修正を可能にするのではなくコンパイル時に静的コードをgenerateする、などです。
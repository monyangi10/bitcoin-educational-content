question: Какво е основното предимство на използването на макроси за извеждане като #[derive(Debug)] в сравнение с ръчното въвеждане на черти за потребителски типове?
answer: Те автоматично въвеждат generate пълни реализации на черти по време на компилация, като намаляват шаблонния код
wrong_answers:
  - Те осигуряват по-добра производителност по време на изпълнение чрез оптимизиране на извикванията на методите на чертите по време на изпълнение
  - Те позволяват многократно прилагане на черти за един и същ тип с различно поведение
  - Те позволяват динамично прилагане на черти, които могат да се променят по време на изпълнение въз основа на състоянието на програмата
explanation: |
  Автоматично извеждане на макроси generate на имплементации на черти по време на компилация, което премахва необходимостта от ръчно писане на повтарящ се код. Когато използвате #[derive(Debug)], компилаторът генерира цялата необходима логика за форматиране на тази черта. Грешните отговори са неверни, защото: макросите derive не подобряват производителността по време на изпълнение (те generate същия код, който бихте написали ръчно), чертите могат да бъдат реализирани само веднъж за тип, независимо от начина на реализацията им, и макросите derive generate статичен код по време на компилация, а не позволяват модификации по време на изпълнение.
question: В чем ключевое преимущество использования макросов derive, таких как #[derive(Debug)], по сравнению с ручной реализацией трейтов для пользовательских типов?
answer: Они автоматически generate полные реализации признаков во время компиляции, сокращая количество шаблонизированного кода
wrong_answers:
  - Они обеспечивают лучшую производительность во время выполнения за счет оптимизации вызовов методов трейтов во время выполнения
  - Они позволяют реализовывать черты несколько раз для одного и того же типа с разным поведением
  - Они позволяют реализовать динамические черты, которые могут быть изменены во время выполнения программы в зависимости от ее состояния
explanation: |
  Макросы Derive автоматически генерируют реализации трейтов generate во время компиляции, избавляя вас от необходимости писать повторяющийся код вручную. Когда вы используете #[derive(Debug)], компилятор генерирует всю необходимую логику форматирования для этого трейта. Неверные ответы неверны, потому что: макросы derive не улучшают производительность во время выполнения (они генерируют тот же код, который вы написали бы вручную), трейты могут быть реализованы только один раз для каждого типа, независимо от способа их реализации, а макросы derive генерируют статический код во время компиляции, а не позволяют модифицировать его во время выполнения.
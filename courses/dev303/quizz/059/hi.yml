question: कस्टम प्रकारों के लिए मैन्युअल रूप से ट्रेट्स को लागू करने की तुलना में #[derive(Debug)] जैसे डिराइव मैक्रो का उपयोग करने का मुख्य लाभ क्या है?
answer: वे संकलन समय पर स्वचालित रूप से generate पूर्ण ट्रेट कार्यान्वयन करते हैं, जिससे अनावश्यक कोड कम हो जाता है।
wrong_answers:
  - वे निष्पादन के दौरान ट्रेट मेथड कॉल को अनुकूलित करके बेहतर रनटाइम प्रदर्शन प्रदान करते हैं।
  - वे एक ही प्रकार के लिए अलग-अलग व्यवहारों के साथ कई बार विशेषताओं को लागू करने की अनुमति देते हैं।
  - ये गतिशील ट्रेट कार्यान्वयन को सक्षम बनाते हैं जिसे प्रोग्राम की स्थिति के आधार पर रनटाइम पर संशोधित किया जा सकता है।
explanation: |
  संकलन के दौरान डिराइव मैक्रो स्वचालित रूप से generate ट्रेट कार्यान्वयन को लागू करते हैं, जिससे बार-बार दोहराए जाने वाले कोड को मैन्युअल रूप से लिखने की आवश्यकता समाप्त हो जाती है। जब आप #[derive(Debug)] का उपयोग करते हैं, तो कंपाइलर उस ट्रेट के लिए सभी आवश्यक फ़ॉर्मेटिंग लॉजिक उत्पन्न करता है। गलत उत्तर इसलिए गलत हैं क्योंकि: डिराइव मैक्रो रनटाइम प्रदर्शन में सुधार नहीं करते (वे उसी कोड को generate करते हैं जिसे आप मैन्युअल रूप से लिखते), ट्रेट को किसी भी प्रकार से लागू किया जा सकता है, और डिराइव मैक्रो रनटाइम संशोधनों को सक्षम करने के बजाय संकलन समय पर स्टैटिक कोड को generate करते हैं।
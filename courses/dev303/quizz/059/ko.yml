question: 사용자 지정 유형에 대한 특성을 수동으로 구현하는 것과 비교하여 #[derive(Debug)]와 같은 파생 매크로를 사용하면 어떤 주요 이점이 있나요?
answer: 컴파일 시 자동으로 완전한 특성 구현을 generate화하여 상용구 코드를 줄입니다
wrong_answers:
  - 실행 중 특성 메서드 호출을 최적화하여 더 나은 런타임 성능을 제공합니다
  - 이를 통해 동일한 유형에 대해 서로 다른 동작을 가진 특성을 여러 번 구현할 수 있습니다
  - 프로그램 상태에 따라 런타임에 수정할 수 있는 동적 특성 구현이 가능합니다
explanation: |
  컴파일 중에 매크로가 자동으로 generate 특성 구현을 파생하므로 반복적인 상용구 코드를 수동으로 작성할 필요가 없습니다. Derive(Debug)]를 사용하면 컴파일러가 해당 특성에 필요한 모든 서식 지정 로직을 생성합니다. 정답이 틀린 이유는 다음과 같습니다. 파생 매크로는 런타임 성능을 향상시키지 않으며(수동으로 작성하는 것과 동일한 코드를 generate), 특성은 구현 방법에 관계없이 유형당 한 번만 구현할 수 있으며, 런타임 수정을 가능하게 하는 대신 컴파일 시 정적 코드를 generate 매크로를 생성합니다.
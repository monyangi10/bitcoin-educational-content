question: ข้อได้เปรียบหลักของการใช้ derive macros เช่น #[derive(Debug)] เมื่อเทียบกับการ implement traits ด้วยตนเองสำหรับประเภทที่กำหนดเองคืออะไร?
answer: พวกเขา generate การใช้งานคุณลักษณะให้สมบูรณ์โดยอัตโนมัติในเวลาคอมไพล์ ลดโค้ดที่ซ้ำซ้อน
wrong_answers:
  - พวกเขาให้ประสิทธิภาพการทำงานที่ดีกว่าโดยการเพิ่มประสิทธิภาพการเรียกใช้เมธอดของ trait ระหว่างการดำเนินการ
  - พวกเขาอนุญาตให้ลักษณะถูกนำมาใช้หลายครั้งสำหรับประเภทเดียวกันด้วยพฤติกรรมที่แตกต่างกัน
  - พวกเขาช่วยให้การใช้งานคุณลักษณะแบบไดนามิกสามารถปรับเปลี่ยนได้ในขณะรันไทม์ตามสถานะของโปรแกรม
explanation: |
  สร้างมาโครโดยอัตโนมัติ generate การใช้งานลักษณะเฉพาะระหว่างการคอมไพล์ กำจัดความจำเป็นในการเขียนโค้ดที่ซ้ำซากด้วยตนเอง เมื่อคุณใช้ #[derive(Debug)] คอมไพเลอร์จะสร้างตรรกะการจัดรูปแบบที่จำเป็นทั้งหมดสำหรับลักษณะเฉพาะนั้น คำตอบที่ผิดนั้นไม่ถูกต้องเพราะ: มาโครที่สร้างขึ้นไม่ได้ปรับปรุงประสิทธิภาพการทำงานในขณะรันไทม์ (พวกเขา generate โค้ดเดียวกันที่คุณจะเขียนด้วยตนเอง) ลักษณะเฉพาะสามารถถูกใช้งานได้เพียงครั้งเดียวต่อประเภทไม่ว่าจะถูกใช้งานอย่างไร และมาโครที่สร้างขึ้น generate โค้ดแบบสแตติกในขณะคอมไพล์แทนที่จะเปิดใช้งานการปรับเปลี่ยนในขณะรันไทม์
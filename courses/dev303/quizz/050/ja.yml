question: RC<RefCell<T>>を共有のミュータブルステートに使用する場合の最も大きなリスクは何ですか？
answer: メモリ・リークを引き起こす参照サイクル、弱い参照の使用で防止
wrong_answers:
  - RefCellの代わりにMutexを使用することで、スレッド間のデータ競合を防止。
  - 借用違反によるランタイムパニック、コンパイル時チェックで防止
  - 深い再帰によるスタックオーバーフロー、参照深度の制限で防止
explanation: |
  RC<RefCell<T>を使用する場合、主な危険は、データ構造が自分自身を直接、またはチェーンを通して参照する参照サイクルを作成することです。これらのサイクルは参照カウントがゼロになるのを防ぎ、データが常にアクティブな参照を持っているように見えるため、メモリリークの原因となります。弱参照は、メモリ管理に使われる参照カウントに寄与しないことで、この問題を解決します。他のオプションは正しくない：RC<RefCell<T>>はスレッドセーフではないので、データレースは主な懸念事項ではない。RefCellは特に、コンパイル時にチェックを防ぐのではなく、実行時にチェックを移動させる。
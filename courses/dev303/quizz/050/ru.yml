question: Каков наиболее существенный риск при использовании RC<RefCell<T>> для общего мутабельного состояния, и какой механизм помогает его предотвратить?
answer: Циклы ссылок, приводящие к утечкам памяти, предотвращаются использованием слабых ссылок
wrong_answers:
  - Гонки данных между потоками, предотвращаемые использованием Mutex вместо RefCell
  - Время выполнения паникует из-за нарушений заимствования, предотвращаемых проверкой во время компиляции
  - Переполнение стека при глубокой рекурсии, предотвращаемое ограничением глубины ссылок
explanation: |
  При использовании RC<RefCell<T>> основная опасность заключается в создании циклов ссылок, когда структуры данных ссылаются на себя напрямую или через цепочки. Эти циклы не позволяют количеству ссылок достигнуть нуля, что приводит к утечкам памяти, так как кажется, что данные всегда имеют активные ссылки. Слабые ссылки решают эту проблему, поскольку не вносят вклад в счетчик ссылок, используемый для управления памятью, разрушая циклы и сохраняя связи. Остальные варианты неверны: RC<RefCell<T>> не является потокобезопасным, поэтому гонки данных не являются основной проблемой, RefCell специально переносит проверки на время выполнения, а не предотвращает их во время компиляции, а переполнение стека не связано с механизмом подсчета ссылок.
question: ความเสี่ยงที่สำคัญที่สุดเมื่อใช้ RC<RefCell<T>> สำหรับสถานะแชร์ที่เปลี่ยนแปลงได้คือการเกิดการยืมซ้อน (borrow) ที่ไม่ปลอดภัย ซึ่งอาจนำไปสู่การเกิด panic ใน runtime กลไกที่ช่วยป้องกันปัญหานี้คือการตรวจสอบการยืม (borrow checking) ของ RefCell ซึ่งจะตรวจสอบใน runtime ว่ามีการยืมแบบไม่ปลอดภัยเกิดขึ้นหรือไม่
answer: การอ้างอิงแบบวนซ้ำที่ทำให้เกิดการรั่วไหลของหน่วยความจำ ป้องกันได้โดยการใช้การอ้างอิงแบบอ่อน
wrong_answers:
  - การแข่งขันข้อมูลระหว่างเธรด ป้องกันโดยใช้ Mutex แทน RefCell
  - รันไทม์แพนิคจากการละเมิดการยืม ป้องกันโดยการตรวจสอบในเวลาคอมไพล์
  - สแต็กโอเวอร์โฟลว์จากการเรียกซ้ำลึก ป้องกันโดยการจำกัดความลึกของการอ้างอิง
explanation: |
  เมื่อใช้ RC<RefCell<T>> อันตรายหลักคือการสร้างวงจรอ้างอิงที่โครงสร้างข้อมูลอ้างอิงถึงตัวเองโดยตรงหรือผ่านทางสายโซ่ วงจรเหล่านี้ป้องกันไม่ให้นับอ้างอิงถึงศูนย์ ทำให้เกิดการรั่วไหลของหน่วยความจำเนื่องจากข้อมูลดูเหมือนจะมีการอ้างอิงที่ใช้งานอยู่เสมอ การอ้างอิงแบบอ่อนแก้ปัญหานี้โดยไม่ส่งผลต่อนับอ้างอิงที่ใช้ในการจัดการหน่วยความจำ ทำลายวงจรในขณะที่ยังคงรักษาการเชื่อมต่อ ตัวเลือกอื่นๆ ไม่ถูกต้อง: RC<RefCell<T>> ไม่ปลอดภัยต่อเธรด ดังนั้นการแข่งข้อมูลจึงไม่ใช่ปัญหาหลัก RefCell ย้ายการตรวจสอบไปยังเวลารันไทม์แทนที่จะป้องกันในเวลาคอมไพล์ และ stack overflow ไม่เกี่ยวข้องกับกลไกการนับอ้างอิง
question: 當使用 RC<RefCell<T>> 來共用可變狀態時，最顯著的風險是什麼？有什麼機制可以協助預防？
answer: 參考循環會造成記憶體洩漏，可透過使用弱參考來避免
wrong_answers:
  - 使用 Mutex 取代 RefCell 可避免線程間的資料競賽
  - 運行時因借用違規而恐慌，可透過編譯時檢查預防
  - 堆疊溢出來自深度遞歸，藉由限制參考深度來防止
explanation: |
  當使用 RC<RefCell<T>> 時，主要的危險是會產生資料結構直接或透過鏈來引用自己的引用循環。這些循環會阻止引用次數達到零，造成記憶體洩漏，因為資料看起來總是有活動的引用。弱參照解決了這個問題，它不會增加用於記憶體管理的參照次數，打破了循環，同時保留了連接。其他選項都是不正確的：RC<RefCell<T>> 不是線程安全的，所以資料競賽不是主要的問題，RefCell 特別將檢查移到執行時，而不是在編譯時防止它們，而且堆疊滿溢與參考計數機制無關。
question: بزرگ‌ترین خطر هنگام استفاده از RC<RefCell<T>> برای حالت مشترک قابل تغییر، خطر ایجاد وضعیت رقابتی (race condition) است، زیرا RefCell<T> ایمنی نخ (thread safety) را تضمین نمی‌کند. مکانیزمی که به جلوگیری از این خطر کمک می‌کند، استفاده از RefCell<T> در یک زمینه تک‌نخی است، جایی که اطمینان حاصل می‌شود که دسترسی همزمان از چندین نخ به داده‌ها وجود ندارد.
answer: چرخه‌های ارجاعی که باعث نشت حافظه می‌شوند، با استفاده از ارجاعات ضعیف جلوگیری می‌شوند.
wrong_answers:
  - رقابت داده‌ها بین رشته‌ها، با استفاده از Mutex به جای RefCell جلوگیری می‌شود.
  - وحشت‌های زمان اجرا ناشی از نقض‌های قرض‌گیری، که با بررسی زمان کامپایل جلوگیری می‌شود
  - سرریز پشته از بازگشت عمیق، جلوگیری شده با محدود کردن عمق ارجاع
explanation: |
  هنگام استفاده از RC<RefCell<T>>، خطر اصلی ایجاد چرخه‌های مرجع است که در آن ساختارهای داده به‌طور مستقیم یا از طریق زنجیره‌ها به خودشان ارجاع می‌دهند. این چرخه‌ها مانع از رسیدن شمارش مراجع به صفر می‌شوند و باعث نشت حافظه می‌شوند زیرا داده‌ها به نظر می‌رسد همیشه مراجع فعال دارند. مراجع ضعیف این مشکل را با عدم مشارکت در شمارش مراجع مورد استفاده برای مدیریت حافظه حل می‌کنند و چرخه‌ها را می‌شکنند در حالی که اتصالات را حفظ می‌کنند. گزینه‌های دیگر نادرست هستند: RC<RefCell<T>> ایمن در برابر نخ نیست بنابراین مسابقات داده‌ای نگرانی اصلی نیستند، RefCell به‌طور خاص بررسی‌ها را به زمان اجرا منتقل می‌کند به‌جای اینکه آن‌ها را در زمان کامپایل جلوگیری کند، و سرریز پشته به مکانیزم شمارش مراجع مربوط نمی‌شود.
question: 在使用 RC<RefCell<T>> 共享可变状态时，最大的风险是什么？
answer: 通过使用弱引用防止引用循环导致内存泄漏
wrong_answers:
  - 通过使用 Mutex 代替 RefCell 防止线程间的数据竞赛
  - 运行时因违反借用规定而恐慌，编译时检查可防止这种情况发生
  - 通过限制引用深度防止深度递归产生堆栈溢出
explanation: |
  在使用 RC<RefCell<T>> 时，主要危险在于创建引用循环，在循环中数据结构直接或通过链引用自身。这些循环会阻止引用计数为零，从而导致内存泄漏，因为数据似乎总是有活动引用。弱引用解决了这一问题，它不会增加用于内存管理的引用计数，从而打破了循环，同时保留了连接。其他选项都不正确：RC<RefCell<T>> 不是线程安全的，因此数据竞赛不是主要问题；RefCell 特别将检查转移到运行时，而不是在编译时防止它们；堆栈溢出与引用计数机制无关。
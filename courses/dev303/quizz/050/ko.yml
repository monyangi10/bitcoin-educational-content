question: 공유 가변 상태에 RC<RefCell<T>>를 사용할 때 가장 큰 위험은 무엇이며, 이를 방지하는 데 도움이 되는 메커니즘은 무엇인가요?
answer: 메모리 누수를 유발하는 참조 주기, 약한 참조 사용으로 방지
wrong_answers:
  - RefCell 대신 Mutex를 사용하여 스레드 간 데이터 경합 방지
  - 컴파일 타임 검사를 통해 차용 위반으로 인한 런타임 패닉 방지
  - 참조 깊이를 제한하여 딥 재귀로 인한 스택 오버플로 방지
explanation: |
  RC<RefCell<T>>를 사용할 때 가장 큰 위험은 데이터 구조가 직접 또는 체인을 통해 자신을 참조하는 참조 주기를 생성하는 것입니다. 이러한 주기는 참조 카운트가 0에 도달하는 것을 방지하여 데이터에 항상 활성 참조가 있는 것처럼 보이므로 메모리 누수를 유발합니다. 약한 참조는 메모리 관리에 사용되는 참조 횟수에 기여하지 않음으로써 연결을 유지하면서 주기를 끊어 이 문제를 해결합니다. 다른 옵션은 올바르지 않습니다: RC<RefCell<T>>는 스레드 안전하지 않으므로 데이터 경합이 주요 관심사가 아니며, RefCell은 컴파일 타임에 검사를 방지하지 않고 런타임으로 이동하며, 스택 오버플로는 참조 카운팅 메커니즘과 관련이 없습니다.
question: साझा परिवर्तनीय अवस्था के लिए RC<RefCell<T>> का उपयोग करते समय सबसे महत्वपूर्ण जोखिम क्या है, और कौन सा तंत्र इसे रोकने में मदद करता है?
answer: मेमोरी लीक का कारण बनने वाले रेफरेंस साइकल को वीक रेफरेंस का उपयोग करके रोका जा सकता है।
wrong_answers:
  - थ्रेड्स के बीच डेटा रेस को रोकने के लिए RefCell के बजाय Mutex का उपयोग किया जाता है।
  - कंपाइल-टाइम चेकिंग द्वारा उधार उल्लंघन से उत्पन्न रनटाइम पैनिक को रोका जा सकता है।
  - संदर्भ गहराई को सीमित करके गहन पुनरावर्तन से उत्पन्न स्टैक ओवरफ्लो को रोका जा सकता है।
explanation: |
  RC<RefCell<T>> का उपयोग करते समय, मुख्य खतरा रेफरेंस साइकल बनने का होता है, जहां डेटा संरचनाएं सीधे या चेन के माध्यम से स्वयं को रेफरेंस करती हैं। ये साइकल रेफरेंस काउंट को शून्य तक पहुंचने से रोकते हैं, जिससे मेमोरी लीक होती है क्योंकि डेटा में हमेशा सक्रिय रेफरेंस मौजूद प्रतीत होते हैं। कमजोर रेफरेंस मेमोरी प्रबंधन के लिए उपयोग किए जाने वाले रेफरेंस काउंट में योगदान न देकर इस समस्या का समाधान करते हैं, जिससे कनेक्शन बनाए रखते हुए साइकल टूट जाते हैं। अन्य विकल्प गलत हैं: RC<RefCell<T>> थ्रेड-सेफ नहीं है, इसलिए डेटा रेस मुख्य चिंता का विषय नहीं है, RefCell विशेष रूप से जांच को संकलन समय पर रोकने के बजाय रनटाइम पर स्थानांतरित करता है, और स्टैक ओवरफ्लो रेफरेंस काउंटिंग तंत्र से संबंधित नहीं है।
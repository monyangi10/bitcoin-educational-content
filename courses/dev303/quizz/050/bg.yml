question: Кой е най-значителният риск при използването на RC<RefCell<T>> за споделено променливо състояние и какъв механизъм помага за предотвратяването му?
answer: Цикли на препратките, причиняващи изтичане на памет, предотвратени чрез използване на слаби препратки
wrong_answers:
  - Състезания за данни между нишки, предотвратени чрез използване на Mutex вместо RefCell
  - Паника по време на изпълнение от нарушения на заемането, предотвратени чрез проверка по време на компилиране
  - Препълване на стека от дълбока рекурсия, предотвратено чрез ограничаване на дълбочината на референцията
explanation: |
  При използването на RC<RefCell<T>> основната опасност е създаването на референтни цикли, при които структурите от данни се позовават директно или чрез вериги. Тези цикли не позволяват броят на референциите да достигне нула, което води до изтичане на памет, тъй като изглежда, че данните винаги имат активни референции. Слабите препратки решават този проблем, като не допринасят за броя на препратките, използвани за управление на паметта, прекъсвайки циклите и запазвайки връзките. Другите варианти са неправилни: RC<RefCell<T>> не е безопасен за нишки, така че състезанията с данни не са основният проблем, RefCell специално премества проверките към времето на изпълнение, вместо да ги предотвратява по време на компилиране, а препълването на стека не е свързано с механизма за броене на референции.
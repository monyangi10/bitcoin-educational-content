question: อะไรคือสามวิธีที่ closures สามารถจับตัวแปรจากสภาพแวดล้อมของพวกมันใน Rust?
answer: โดยการอ้างอิงที่ไม่เปลี่ยนแปลง, โดยการอ้างอิงที่เปลี่ยนแปลงได้, หรือโดยการครอบครอง
wrong_answers:
  - โดยการคัดลอกค่า, โดยการยืมอ้างอิง, หรือโดยการยกเลิกการอ้างอิงตัวชี้
  - โดยการจัดสรรสแต็ก, โดยการจัดสรรฮีป, หรือโดยการจัดเก็บแบบสแตติก
  - โดยการเข้าถึงร่วมกัน โดยการเข้าถึงเฉพาะ หรือโดยการเข้าถึงพร้อมกัน
explanation: |
  การปิดใน Rust จับตัวแปรสภาพแวดล้อมในสามวิธีที่แน่นอน: โดยการอ้างอิงที่ไม่เปลี่ยนแปลง (เมื่อพวกเขาต้องการเพียงแค่อ่าน), โดยการอ้างอิงที่เปลี่ยนแปลงได้ (เมื่อพวกเขาต้องการแก้ไข), หรือโดยการครอบครอง (เมื่อพวกเขาต้องการย้ายค่า, มักเพื่อความปลอดภัยของเธรด) คอมไพเลอร์จะเลือกวิธีที่จำกัดที่สุดที่ตอบสนองความต้องการของการปิด โดยปฏิบัติตามหลักการของสิทธิพิเศษน้อยที่สุด
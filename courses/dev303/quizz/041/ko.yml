question: 클로저가 Rust에서 환경의 변수를 캡처할 수 있는 세 가지 방법은 무엇인가요?
answer: 불변 참조, 변경 가능한 참조 또는 소유권 획득 방법
wrong_answers:
  - 값 복사, 참조 차용 또는 포인터 역참조 방식
  - 스택 할당, 힙 할당 또는 정적 스토리지별
  - 공유 액세스, 독점 액세스 또는 동시 액세스 기준
explanation: |
  Rust의 클로저는 불변 참조(읽기만 필요한 경우), 변경 참조(수정이 필요한 경우), 소유권 가져오기(스레드 안전을 위해 값을 이동해야 하는 경우) 등 정확히 세 가지 방식으로 환경 변수를 캡처합니다. 컴파일러는 최소 권한 원칙에 따라 클로저의 요구 사항을 충족하는 가장 제한적인 방법을 자동으로 선택합니다.
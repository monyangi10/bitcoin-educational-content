question: Кои са трите начина, по които затворите могат да улавят променливи от средата си в Rust?
answer: Чрез неизменна референция, чрез променлива референция или чрез поемане на собственост
wrong_answers:
  - Чрез копиране на стойност, заемане на референция или деференциране на указател
  - Чрез заделяне на стека, на купчината или чрез статично съхранение
  - Чрез споделен достъп, изключителен достъп или едновременен достъп
explanation: |
  Затворите в Rust завладяват променливите на средата по точно три начина: чрез неизменна референция (когато трябва само да четат), чрез променлива референция (когато трябва да модифицират) или чрез поемане на собственост (когато трябва да преместят стойността, често за безопасност на нишките). Компилаторът автоматично избира най-рестриктивния метод, който удовлетворява нуждите на затварянето, следвайки принципа на най-малките привилегии.
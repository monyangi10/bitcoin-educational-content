question: سه روش که closures می‌توانند متغیرها را از محیط خود در Rust بگیرند چیست؟
answer: با ارجاع غیرقابل تغییر، با ارجاع قابل تغییر، یا با گرفتن مالکیت
wrong_answers:
  - با کپی کردن مقدار، با قرض گرفتن مرجع، یا با اشاره‌گر اشاره‌زدایی
  - توسط تخصیص پشته، توسط تخصیص هیپ، یا توسط ذخیره‌سازی ایستا
  - از طریق دسترسی مشترک، از طریق دسترسی انحصاری، یا از طریق دسترسی همزمان
explanation: |
  بسته‌ها در Rust متغیرهای محیطی را به سه روش دقیقاً به دام می‌اندازند: با ارجاع غیرقابل تغییر (زمانی که فقط نیاز به خواندن دارند)، با ارجاع قابل تغییر (زمانی که نیاز به تغییر دارند)، یا با گرفتن مالکیت (زمانی که نیاز به انتقال مقدار دارند، اغلب برای ایمنی در برابر نخ‌ها). کامپایلر به‌طور خودکار محدودترین روشی را که نیازهای بسته را برآورده می‌کند، انتخاب می‌کند و از اصل حداقل امتیاز پیروی می‌کند.
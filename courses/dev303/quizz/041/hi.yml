question: Rust में क्लोजर अपने परिवेश से चर को कैप्चर करने के तीन तरीके क्या हैं?
answer: अपरिवर्तनीय संदर्भ द्वारा, परिवर्तनीय संदर्भ द्वारा, या स्वामित्व ग्रहण करके
wrong_answers:
  - मान प्रतिलिपि बनाकर, संदर्भ उधार लेकर, या पॉइंटर डीरेफरेंसिंग द्वारा
  - स्टैक आवंटन द्वारा, हीप आवंटन द्वारा, या स्थिर भंडारण द्वारा
  - साझा पहुँच द्वारा, अनन्य पहुँच द्वारा, या समवर्ती पहुँच द्वारा
explanation: |
  Rust में क्लोज़र पर्यावरण चरों को ठीक तीन तरीकों से कैप्चर करते हैं: अपरिवर्तनीय संदर्भ द्वारा (जब उन्हें केवल पढ़ने की आवश्यकता होती है), परिवर्तनीय संदर्भ द्वारा (जब उन्हें संशोधित करने की आवश्यकता होती है), या स्वामित्व लेकर (जब उन्हें मान को स्थानांतरित करने की आवश्यकता होती है, अक्सर थ्रेड सुरक्षा के लिए)। कंपाइलर न्यूनतम विशेषाधिकार के सिद्धांत का पालन करते हुए, क्लोज़र की आवश्यकताओं को पूरा करने वाली सबसे प्रतिबंधात्मक विधि को स्वचालित रूप से चुनता है।
question: Какими тремя способами закрытия могут захватывать переменные из своего окружения в Rust?
answer: По неизменяемой ссылке, по изменяемой ссылке или путем принятия права собственности
wrong_answers:
  - Путем копирования значения, заимствования ссылки или разыменования указателя
  - Выделение стека, выделение кучи или статическое хранение
  - Совместный доступ, эксклюзивный доступ или одновременный доступ
explanation: |
  Закрытия в Rust получают переменные окружения ровно тремя способами: по неизменяемой ссылке (когда им нужно только читать), по изменяемой ссылке (когда им нужно модифицировать) или путем принятия права собственности (когда им нужно переместить значение, часто для безопасности потока). Компилятор автоматически выбирает наиболее ограничительный метод, удовлетворяющий потребностям закрытия, следуя принципу наименьших привилегий.
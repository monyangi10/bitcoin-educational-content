question: Rustでクロージャが環境から変数を取り込む3つの方法とは？
answer: 不変参照、可変参照、または所有権の取得による
wrong_answers:
  - 値のコピー、参照の借用、またはポインタの再参照による
  - スタックアロケーション、ヒープアロケーション、またはスタティックストレージによる
  - 共有アクセス、排他的アクセス、同時アクセス
explanation: |
  Rustにおけるクロージャは、3つの方法で環境変数を取り込みます。すなわち、不変参照（読み込みだけが必要な場合）、可変参照（変更が必要な場合）、所有権取得（スレッドセーフのために値を移動する必要がある場合）です。コンパイラーは、最小特権の原則に従って、クロージャーのニーズを満たす最も制限的な方法を自動的に選択します。
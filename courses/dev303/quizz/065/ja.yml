question: 従来のソフトウェア開発と比較して、「速く動いて、壊す」という哲学がBitcoinの開発に特に不向きなのはなぜか？
answer: Bitcoinの取引は不可逆的であり、ミスから資金を回収する中央当局がない。
wrong_answers:
  - Bitcoin開発では、従来のウェブ・アプリケーションよりも速い反復サイクルが要求される。
  - "Rustのコンパイラーは、ブロックチェーンのイノベーションに必要な迅速なプロトタイピングを妨げる"
  - 「Bitcoinはオープンソースであるため、配備後にバグを修正するのが難しい。
explanation: |
  正解は、Bitcoinの基本的な特徴を浮き彫りにしている。分散型であるため、一度取引が流れると、資金回収のために訴える当局が存在しないのだ。規制による保護やチャージバックの仕組みがある従来の金融システムとは異なり、Bitcoinのミスは永久的かつ不可逆的である。間違った答えは核心的な問題を誤解している。それは開発スピードやコンパイラの制限、オープンソースの課題ではなく、ユーザーの資金が恒久的なリスクにさらされる分散型システムにおける金融業務の不可逆的な性質についてである。
question: Защо философията "move fast and break things" е особено неподходяща за разработка на Bitcoin в сравнение с традиционната разработка на софтуер?
answer: Транзакциите Bitcoin са необратими и няма централен орган, който да възстановява средства при грешки
wrong_answers:
  - Разработката на Bitcoin изисква по-бързи цикли на итерации в сравнение с традиционните уеб приложения
  - "Компилаторът на Rust предотвратява бързото създаване на прототипи, необходимо за блокчейн иновациите"
  - "Характерът на Bitcoin като софтуер с отворен код затруднява отстраняването на грешки след внедряването му"
explanation: |
  Правилният отговор подчертава основната характеристика на Bitcoin: децентрализираният му характер означава, че няма орган, към който да се обърнете за възстановяване на средства, след като транзакциите бъдат излъчени. За разлика от традиционните финансови системи с регулаторни защити и механизми за връщане на средства, грешките в Bitcoin са постоянни и необратими. Грешните отговори не разбират основния въпрос - не става въпрос за скоростта на разработката, ограниченията на компилатора или предизвикателствата на отворения код, а за необратимия характер на финансовите операции в децентрализирана система, където средствата на потребителите са изложени на постоянен риск.
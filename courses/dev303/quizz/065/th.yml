question: ทำไมปรัชญา 'move fast and break things' ถึงไม่เหมาะสมอย่างยิ่งสำหรับการพัฒนา Bitcoin เมื่อเทียบกับการพัฒนาซอฟต์แวร์แบบดั้งเดิม?
answer: ธุรกรรม Bitcoin ไม่สามารถย้อนกลับได้และไม่มีหน่วยงานกลางในการกู้คืนเงินจากข้อผิดพลาด
wrong_answers:
  - การพัฒนา Bitcoin ต้องการรอบการทำซ้ำที่เร็วกว่าการพัฒนาเว็บแอปพลิเคชันแบบดั้งเดิม
  - "คอมไพเลอร์ของ Rust ขัดขวางการสร้างต้นแบบอย่างรวดเร็วที่จำเป็นสำหรับนวัตกรรมบล็อกเชน"
  - "ลักษณะโอเพ่นซอร์สของ Bitcoin ทำให้การแก้ไขข้อบกพร่องหลังการปรับใช้ยากขึ้น"
explanation: |
  คำตอบที่ถูกต้องเน้นลักษณะพื้นฐานของ Bitcoin: ธรรมชาติที่กระจายอำนาจหมายความว่าไม่มีหน่วยงานใดให้ยื่นอุทธรณ์เพื่อกู้คืนเงินเมื่อธุรกรรมถูกส่งออกไปแล้ว ไม่เหมือนกับระบบการเงินแบบดั้งเดิมที่มีการคุ้มครองตามกฎระเบียบและกลไกการเรียกเงินคืน ข้อผิดพลาดของ Bitcoin เป็นสิ่งถาวรและไม่สามารถย้อนกลับได้ คำตอบที่ผิดเข้าใจผิดในประเด็นหลัก - มันไม่เกี่ยวกับความเร็วในการพัฒนา ข้อจำกัดของคอมไพเลอร์ หรือความท้าทายของโอเพ่นซอร์ส แต่เกี่ยวกับธรรมชาติที่ไม่สามารถย้อนกลับได้ของการดำเนินการทางการเงินในระบบที่กระจายอำนาจซึ่งเงินของผู้ใช้มีความเสี่ยงถาวร
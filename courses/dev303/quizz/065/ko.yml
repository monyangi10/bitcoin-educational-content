question: "'빨리 움직이고 깨는' 철학이 기존 소프트웨어 개발과 비교했을 때 Bitcoin 개발에 특히 부적합한 이유는 무엇인가요?"
answer: "Bitcoin 거래는 되돌릴 수 없으며, 실수로 인한 자금 회수를 위한 중앙 권한이 없습니다"
wrong_answers:
  - Bitcoin 개발에는 기존 웹 애플리케이션보다 빠른 반복 주기가 필요합니다
  - "Rust의 컴파일러는 블록체인 혁신에 필요한 신속한 프로토타이핑을 지원합니다."
  - "Bitcoin의 오픈 소스 특성으로 인해 배포 후 버그 수정이 더 어려워졌습니다."
explanation: |
  정답은 탈중앙화된 특성으로 인해 거래가 송금된 후에는 자금 회수를 요청할 기관이 없다는 Bitcoin의 근본적인 특징을 강조하고 있습니다. 규제 보호 및 지불 거절 메커니즘을 갖춘 기존 금융 시스템과 달리, Bitcoin의 실수는 영구적이고 되돌릴 수 없습니다. 오답은 개발 속도, 컴파일러 제한, 오픈 소스 문제가 아니라 사용자 자금이 영구적으로 위험에 노출되는 탈중앙화 시스템에서 금융 운영의 돌이킬 수 없는 특성이라는 핵심 문제를 잘못 이해하고 있습니다.

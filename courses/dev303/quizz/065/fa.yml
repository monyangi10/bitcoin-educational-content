question: چرا فلسفه 'سریع حرکت کن و چیزها را بشکن' برای توسعه Bitcoin نسبت به توسعه نرم‌افزار سنتی به‌خصوص نامناسب است؟
answer: تراکنش‌های Bitcoin غیرقابل برگشت هستند و هیچ مرجع مرکزی برای بازیابی وجوه از اشتباهات وجود ندارد.
wrong_answers:
  - توسعه Bitcoin نیاز به چرخه‌های تکرار سریع‌تر نسبت به برنامه‌های وب سنتی دارد.
  - "کامپایلر Rust مانع از نمونه‌سازی سریع مورد نیاز برای نوآوری در بلاک‌چین می‌شود"
  - "ماهیت متن‌باز Bitcoin رفع اشکالات پس از استقرار را دشوارتر می‌کند"
explanation: |
  پاسخ صحیح ویژگی اساسی Bitcoin را برجسته می‌کند: ماهیت غیرمتمرکز آن به این معناست که هیچ مرجعی برای درخواست بازگشت وجه پس از پخش تراکنش‌ها وجود ندارد. برخلاف سیستم‌های مالی سنتی با حفاظت‌های نظارتی و مکانیزم‌های بازگشت وجه، اشتباهات Bitcoin دائمی و غیرقابل برگشت هستند. پاسخ‌های نادرست مسئله اصلی را اشتباه درک می‌کنند - موضوع سرعت توسعه، محدودیت‌های کامپایلر یا چالش‌های منبع باز نیست، بلکه درباره ماهیت غیرقابل برگشت عملیات مالی در یک سیستم غیرمتمرکز است که در آن وجوه کاربران در معرض خطر دائمی قرار دارند.
question: 與傳統軟體開發相比，為什麼「快速移動並打破事物」的哲學特別不適合 Bitcoin 開發？
answer: Bitcoin 交易是不可逆的，沒有中央機關可從錯誤中追回資金
wrong_answers:
  - Bitcoin 開發需要比傳統網路應用程式更快的迭代週期
  - 「Rust的編譯器可防止區塊鏈創新所需的快速原型」
  - "Bitcoin 的開放原始碼性質會增加部署後修復錯誤的難度"
explanation: |
  正確答案突顯了 Bitcoin 的基本特點：其分散性意味著一旦交易被廣播，就沒有任何機構可以追回資金。與有監管保護和退款機制的傳統金融系統不同，Bitcoin 的錯誤是永久且不可逆轉的。錯誤的答案誤解了核心問題 - 這並非關於開發速度、編譯器限制或開放原始碼的挑戰，而是關於分散式系統中金融作業的不可逆性，使用者的資金永遠處於風險之中。
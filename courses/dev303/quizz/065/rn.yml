question: Ni kuki filozofiya yo ‘kwihuta no guca ibintu’ idakwiriye cane cane mu gutegura Bitcoin ugereranyije n’ugutegura porogarama za kera?
answer: Amafaranga ya Bitcoin ntashobora gusubirwamwo ata butegetsi buhambaye bwo gusubiza amafaranga mu makosa .
wrong_answers:
  - Iterambere rya Bitcoin risaba gusubiramwo vyihuta kurusha ibikorwa vya kera vy'urubuga
  - "Igikoresho ca Rust kirabuza gukora ivyerekanwa vyihuta bikenewe kugira ngo haboneke ubuhinga bushasha bwa blockchain"
  - "Ubuhinga bwa Bitcoin bufunguye butuma bigorana gukosora ibibazo inyuma yo gukoreshwa"
explanation: |
  Inyishu ibereye irerekana ikintu nyamukuru kiranga Bitcoin: kuba ifise ububasha bwo gusaba ko amafaranga asubizwa iyo amafaranga amaze gutangazwa. Mu buryo butandukanye n’uburyo bw’ivy’ubutunzi bwa kera bufise uburinzi bushingiye ku mategeko n’uburyo bwo kwishura, amakosa ya Bitcoin ni ahoraho kandi ntashobora gusubirwamwo. Inyishu zitari zo ntizitahura neza ikibazo nyamukuru - si ivyerekeye umuvuduko w’iterambere, imipaka y’abakozi, canke ingorane z’inkomoko yuguruye, ariko ni ivyerekeye kamere idashobora gusubirwamwo y’ibikorwa vy’ivy’ubutunzi mu buryo bwegerejwe aho amahera y’abakoresha ari mu kaga ubudasiba.
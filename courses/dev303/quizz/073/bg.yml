question: Кога операторът с въпросителен знак (?) трябва да бъде предпочетен пред методите unwrap() или expect() при обработката на грешки в Rust?
answer: Когато трябва да разпространите грешки нагоре по стека на повикванията, за да може извикващата функция да се справи с тях
wrong_answers:
  - Когато искате да предоставите персонализирани съобщения за грешки за отстраняване на грешки при неуспешни операции
  - Когато сте сигурни, че операцията ще бъде успешна, и искате да избегнете обработката на грешки
  - Когато трябва да преобразувате грешките в стойност по подразбиране и да продължите изпълнението на програмата
explanation: |
  Операторът с въпросителен знак (?) е предназначен за разпространение на грешки - той извлича стойности за успех, но незабавно връща грешки от текущата функция, като позволява на извикващите да ги обработят. За разлика от функциите unwrap()/expect(), които при грешки изпадат в паника, или unwrap_or(), която предоставя настройки по подразбиране, операторът ? поддържа контекста на грешката и прехвърля отговорността на код от по-високо ниво, който може да вземе подходящи решения за обработка.
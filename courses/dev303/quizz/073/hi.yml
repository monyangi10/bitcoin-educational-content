question: Rust त्रुटि प्रबंधन में unwrap() या expect() विधियों के बजाय प्रश्न चिह्न ऑपरेटर (?) को कब प्राथमिकता दी जानी चाहिए?
answer: जब आपको कॉलिंग फ़ंक्शन द्वारा त्रुटियों को संभालने के लिए कॉल स्टैक में ऊपर की ओर प्रसारित करने की आवश्यकता होती है
wrong_answers:
  - जब आप विफल कार्यों को डीबग करने के लिए कस्टम त्रुटि संदेश प्रदान करना चाहते हैं
  - जब आपको पूरा यकीन हो कि ऑपरेशन सफल होगा और आप त्रुटि प्रबंधन से बचना चाहते हों।
  - जब आपको त्रुटियों को डिफ़ॉल्ट मान में परिवर्तित करने और प्रोग्राम निष्पादन जारी रखने की आवश्यकता हो
explanation: |
  प्रश्न चिह्न ऑपरेटर (?) त्रुटि प्रसार के लिए डिज़ाइन किया गया है - यह सफलता मानों को निकालता है लेकिन त्रुटियों को तुरंत वर्तमान फ़ंक्शन से लौटा देता है, जिससे कॉल करने वाले उन्हें संभाल सकें। unwrap()/expect() के विपरीत, जो त्रुटियों पर पैनिक करते हैं, या unwrap_or() के विपरीत, जो डिफ़ॉल्ट मान प्रदान करते हैं, ? ऑपरेटर त्रुटि संदर्भ को बनाए रखता है और ज़िम्मेदारी उच्च-स्तरीय कोड को सौंपता है जो उचित हैंडलिंग निर्णय ले सकता है।
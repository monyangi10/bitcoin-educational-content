question: Когда при обработке ошибок в Rust следует предпочесть оператор вопросительного знака (?) методам unwrap() или expect()?
answer: Когда вам нужно передать ошибки в стек вызовов, чтобы вызывающая функция обработала их
wrong_answers:
  - Если вы хотите предоставить пользовательские сообщения об ошибках для отладки неудачных операций
  - Если вы уверены, что операция пройдет успешно, и хотите избежать обработки ошибок
  - Когда нужно преобразовать ошибки в значение по умолчанию и продолжить выполнение программы
explanation: |
  Оператор вопросительного знака (?) предназначен для распространения ошибок - он извлекает значения успеха, но сразу же возвращает ошибки из текущей функции, позволяя вызывающей стороне обработать их. В отличие от unwrap()/expect(), которые паникуют при ошибках, или unwrap_or(), который предоставляет значения по умолчанию, оператор ? сохраняет контекст ошибки и передает ответственность коду более высокого уровня, который может принимать соответствующие решения по обработке.
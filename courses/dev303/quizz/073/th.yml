question: ควรใช้เครื่องหมายคำถาม (?) เมื่อใดแทนที่จะใช้วิธีการ unwrap() หรือ expect() ในการจัดการข้อผิดพลาด Rust?
answer: เมื่อคุณต้องการส่งต่อข้อผิดพลาดขึ้นไปยังสแตกของการเรียกเพื่อให้ฟังก์ชันที่เรียกจัดการ
wrong_answers:
  - เมื่อคุณต้องการให้ข้อความแสดงข้อผิดพลาดที่กำหนดเองสำหรับการดีบักการดำเนินการที่ล้มเหลว
  - เมื่อคุณมั่นใจว่าการดำเนินการจะสำเร็จและต้องการหลีกเลี่ยงการจัดการข้อผิดพลาด
  - เมื่อคุณต้องการแปลงข้อผิดพลาดเป็นค่าเริ่มต้นและดำเนินการโปรแกรมต่อไป
explanation: |
  เครื่องหมายคำถาม (?) ถูกออกแบบมาเพื่อการส่งต่อข้อผิดพลาด - มันจะดึงค่าความสำเร็จออกมาแต่จะส่งคืนข้อผิดพลาดจากฟังก์ชันปัจจุบันทันที ทำให้ผู้เรียกสามารถจัดการกับข้อผิดพลาดเหล่านั้นได้ ต่างจาก unwrap()/expect() ที่จะเกิด panic เมื่อเกิดข้อผิดพลาด หรือ unwrap_or() ที่ให้ค่าเริ่มต้น เครื่องหมาย ? จะรักษาบริบทของข้อผิดพลาดและส่งต่อความรับผิดชอบไปยังโค้ดระดับสูงที่สามารถตัดสินใจจัดการได้อย่างเหมาะสม
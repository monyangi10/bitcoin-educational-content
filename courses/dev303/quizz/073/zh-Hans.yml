question: 在 Rust 错误处理中，什么情况下问号运算符 (?) 比 unwrap() 或 expect() 方法更受欢迎？
answer: 当需要将错误上传到调用堆栈供调用函数处理时
wrong_answers:
  - 当您想提供自定义错误信息以调试失败的操作时
  - 当您确定操作会成功并希望避免错误处理时
  - 需要将错误转换为默认值并继续执行程序时
explanation: |
  问号操作符（?）是专为错误传播而设计的--它会提取成功值，但会立即从当前函数返回错误，允许调用者处理这些错误。不同于会在出错时引起恐慌的 unwrap()/expect()，或提供默认值的 unwrap_or()，问号运算符保留了错误上下文，并将责任移交给可以做出适当处理决定的高层代码。
question: 在 Rust 錯誤處理中，什麼時候應該使用問號運算符 (?) 而不是 unwrap() 或 expect() 方法？
answer: 當您需要將錯誤傳送到呼叫堆疊，讓呼叫函式處理時
wrong_answers:
  - 當您想要提供自訂錯誤訊息以除錯失敗的作業時
  - 當您確定操作會成功，並希望避免錯誤處理時
  - 當您需要將錯誤轉換為預設值，並繼續執行程式時
explanation: |
  問號運算符 (?) 是專為錯誤傳播而設計的 - 它會擷取成功值，但會立即從目前的函式回傳錯誤，讓呼叫者可以處理這些錯誤。不像 unwrap()/expect() 會在發生錯誤時恐慌，或 unwrap_or() 會提供預設值，? 運算子會維護錯誤上下文，並將責任交給可以做出適當處理決定的較高層級程式碼。
question: Rust 오류 처리에서 물음표 연산자(?)를 언랩(?) 또는 기대(?) 메서드보다 선호해야 하는 경우는 언제인가요?
answer: 호출 함수가 처리할 오류를 호출 스택 위로 전파해야 하는 경우
wrong_answers:
  - 실패한 작업 디버깅을 위한 사용자 지정 오류 메시지를 제공하려는 경우
  - 작업이 성공할 것이라고 확신하고 오류 처리를 피하고 싶은 경우
  - 오류를 기본값으로 변환하고 프로그램 실행을 계속해야 하는 경우
explanation: |
  물음표 연산자(?)는 오류 전파를 위해 설계된 것으로, 성공 값을 추출하지만 현재 함수에서 오류를 즉시 반환하여 호출자가 오류를 처리할 수 있도록 합니다. 오류 발생 시 패닉 상태에 빠지는 unwrap()/expect()나 기본값을 제공하는 unwrap_or()와 달리 ? 연산자는 오류 컨텍스트를 유지하면서 적절한 처리 결정을 내릴 수 있는 상위 수준의 코드로 책임을 넘깁니다.
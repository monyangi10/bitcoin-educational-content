question: چه زمانی باید از عملگر علامت سوال (?) به جای روش‌های unwrap() یا expect() در مدیریت خطای Rust استفاده کرد؟
answer: وقتی نیاز دارید خطاها را در پشته‌ی فراخوانی به بالا منتقل کنید تا تابع فراخوان آن‌ها را مدیریت کند
wrong_answers:
  - وقتی می‌خواهید پیام‌های خطای سفارشی برای اشکال‌زدایی عملیات ناموفق ارائه دهید
  - وقتی مطمئن هستید که عملیات موفق خواهد شد و می‌خواهید از مدیریت خطا اجتناب کنید
  - وقتی نیاز دارید خطاها را به یک مقدار پیش‌فرض تبدیل کنید و اجرای برنامه را ادامه دهید
explanation: |
  عملگر علامت سوال (?) برای انتشار خطا طراحی شده است - این عملگر مقادیر موفقیت را استخراج می‌کند اما بلافاصله خطاها را از تابع جاری بازمی‌گرداند و به فراخوان‌ها اجازه می‌دهد تا آنها را مدیریت کنند. برخلاف unwrap()/expect() که در صورت بروز خطا وحشت می‌کنند، یا unwrap_or() که مقادیر پیش‌فرض ارائه می‌دهد، عملگر ? زمینه خطا را حفظ کرده و مسئولیت را به کد سطح بالاتری که می‌تواند تصمیمات مناسب برای مدیریت بگیرد، منتقل می‌کند.
question: Rustのエラー処理において、unwrap()メソッドやexpect()メソッドよりも疑問符演算子(?)を優先すべきなのはどのような場合ですか？
answer: 呼び出し関数が処理するために、コールスタックにエラーを伝播させる必要がある場合
wrong_answers:
  - 失敗した操作のデバッグ用にカスタムエラーメッセージを提供したい場合
  - 操作の成功が確実で、エラー処理を避けたい場合
  - エラーをデフォルト値に変換し、プログラムの実行を継続する必要がある場合
explanation: |
  クエスチョンマーク演算子(?)は、エラー伝播のために設計されている - 成功値を抽出するが、現在の関数から直ちにエラーを返し、呼び出し元がエラーを処理できるようにする。エラー時にパニックを起こすunwrap()/expect()や、デフォルトを提供するunwrap_or()とは異なり、?
question: Rust 라이브러리 개발에서 오류 처리를 위해 애니웨이 라이브러리를 사용할 때의 주요 제한 사항은 무엇인가요?
answer: 모든 오류를 문자열 메시지로 변환하여 소비자가 다양한 오류 조건에 프로그래밍 방식으로 대응할 수 없도록 합니다
wrong_answers:
  - 결과 유형에서만 작동하며 옵션 유형은 처리할 수 없으므로 혼합 시나리오에서 유용성이 제한됩니다
  - 각 오류 유형에 대해 수동 오류 변환이 필요하므로 표준 결과 처리보다 더 장황합니다
  - 특정 오류 유형에 대해 자동으로 패닉을 발생시켜 프로덕션 라이브러리 코드에 적합하지 않습니다
explanation: |
  라이브러리 개발 시 애니웨이 라이브러리의 가장 큰 단점은 기본적으로 모든 오류를 문자열 표현으로 평준화하여 라이브러리 소비자가 프로그래밍 방식으로 결정을 내리는 데 필요한 구조화된 오류 정보를 잃게 된다는 점입니다. 애니웨어는 오류가 주로 표시되는 최종 사용자 애플리케이션의 오류 처리를 단순화하는 데 탁월하지만, 라이브러리는 소비자가 다양한 오류 모드(예: 잘못된 입력과 런타임 오류)를 구분하고 적절히 대응할 수 있도록 특정 오류 유형을 제공해야 합니다. 결과 및 옵션 유형 모두에서 잘 작동하고, 자동 변환을 통해 실제로 장황함을 줄이며, 패닉을 일으키지 않는 다른 옵션은 올바르지 않습니다.
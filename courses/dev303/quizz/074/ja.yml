question: Rustライブラリ開発において、エラー処理にanyhowライブラリを使用することの主な制限は何ですか？
answer: すべてのエラーを文字列メッセージに変換し、コンシューマが異なるエラー状態にプログラムで対応できないようにする。
wrong_answers:
  - Result型でのみ動作し、Option型は扱えないため、混合シナリオでの有用性が制限される。
  - エラータイプごとに手動でエラー変換を行う必要があるため、標準的なResult処理よりも冗長になります。
  - 特定のエラータイプで自動的にパニックになるため、プロダクション・ライブラリのコードには適さない。
explanation: |
  ライブラリ開発におけるanyhowライブラリの主な欠点は、基本的にすべてのエラーを文字列表現に平坦化し、ライブラリ利用者がプログラム上の判断を下すために必要な構造化されたエラー情報を失ってしまうことです。anyhowは、主にエラーが表示されるエンドユーザーアプリケーションのエラー処理を簡素化するのに優れていますが、ライブラリは、コンシューマーが異なるエラー・モード（無効な入力とランタイム・エラーのような）を区別して適切に対応できるように、特定のエラー・タイプを提供する必要があります。他の選択肢は正しくありません。anyhowはResult型でもOption型でも問題なく動作し、自動変換によって実際に冗長性を減らし、パニックを引き起こしません。
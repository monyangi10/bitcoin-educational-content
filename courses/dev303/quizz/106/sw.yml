question: Ni kanuni gani ya msingi ya muundo inayoruhusu LDK kuunda HSM zinazofahamu lightning ambazo zinaweza kutathmini kwa busara ikiwa muamala unawakilisha uelekezaji halali wa malipo dhidi ya majaribio yanayoweza kuwa mabaya?
answer: Usanifu wa moduli wa LDK huwezesha uchimbaji wa vipengele maalum vya kusaini na kuthibitisha miamala huku ukidumisha ufahamu wa muktadha wa lightning protocol
wrong_answers:
  - "Mfumo wa LDK unaoendeshwa na matukio huashiria kiotomatiki miamala inayotiliwa shaka kupitia algoriti za kujifunza kwa mashine zilizojumuishwa katika mchakato mkuu wa utiaji saini"
  - "Safu ya uondoaji wa blockchain ya LDK hutoa ugunduzi wa ulaghai wa wakati halisi kwa kurejelea miamala yote dhidi ya data ya uvumi wa mtandao"
  - "Mfumo wa usimamizi wa peer wa LDK hutekeleza sahihi za hali ya juu za cryptography ambazo hutofautisha kati ya mifumo halali na mienendo hasidi"
explanation: |
  Ubunifu wa moduli wa LDK huruhusu watengenezaji kutoa vipengele vya utiaji saini na uthibitishaji pekee huku wakihifadhi akili ya lightning protocol inayohitajika kuelewa muktadha wa miamala. Hii inawawezesha HSM kufanya maamuzi sahihi kuhusu usambazaji wa malipo, shughuli za njia, na vitisho vya usalama badala ya kusaini miamala kiotomatiki. Majibu yasiyo sahihi yanahusisha kimakosa uwezo huu na ugunduzi wa ulaghai kiotomatiki, ufuatiliaji wa blockchain, au sahihi za kriptografia, wakati kwa kweli ni uwezo wa usanifu wa moduli wa kudumisha ufahamu wa itifaki katika vipengele vilivyotengwa vinavyowezesha tathmini ya miamala yenye akili.

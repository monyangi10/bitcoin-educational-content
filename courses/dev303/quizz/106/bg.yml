question: Кой основен принцип на проектиране позволява на LDK да създаде HSM, отчитащи светкавиците, които могат интелигентно да преценят дали дадена транзакция представлява легитимно маршрутизиране на плащане в сравнение с потенциално злонамерени опити?
answer: Модулната архитектура на LDK дава възможност за извличане на специфични компоненти за подписване и проверка на транзакции, като същевременно се запазва осведомеността за контекста на протокола Lightning
wrong_answers:
  - "Системата на LDK, управлявана от събития, автоматично отбелязва подозрителни транзакции чрез алгоритми за машинно обучение, интегрирани в основния процес на подписване"
  - "Слоят за абстрахиране на блокчейн на LDK осигурява откриване на измами в реално време чрез съпоставяне на всички транзакции с данните за клюки в мрежата"
  - "Системата за управление на равнопоставени партньори на LDK прилага усъвършенствани криптографски подписи, които по своята същност разграничават легитимните от злонамерените модели на транзакции."
explanation: |
  Модулният дизайн на LDK позволява на разработчиците да извличат само компонентите за подписване и проверка, като същевременно запазват интелигентността на протокола Lightning, необходима за разбиране на контекста на транзакцията. Това дава възможност на HSM да вземат информирани решения за пренасочване на плащанията, операции по каналите и заплахи за сигурността, вместо да подписват трансакциите на сляпо. Неправилните отговори неправилно приписват тази възможност на автоматизираното откриване на измами, наблюдението на блокчейн или криптографските подписи, докато всъщност това е способността на модулната архитектура да поддържа протоколна осведоменост в изолираните компоненти, която позволява интелигентна оценка на транзакциите.
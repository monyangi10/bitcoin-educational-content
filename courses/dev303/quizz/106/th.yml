question: หลักการออกแบบพื้นฐานใดที่ช่วยให้ LDK สามารถสร้าง HSM ที่รับรู้ Lightning ซึ่งสามารถประเมินได้อย่างชาญฉลาดว่าธุรกรรมแสดงถึงการกำหนดเส้นทางการชำระเงินที่ถูกต้องตามกฎหมายหรือความพยายามที่อาจเป็นอันตราย?
answer: สถาปัตยกรรมแบบโมดูลาร์ของ LDK ช่วยให้สามารถแยกส่วนประกอบการลงนามและการตรวจสอบธุรกรรมเฉพาะได้ ในขณะที่ยังคงรักษาความตระหนักในบริบทของโปรโตคอล Lightning
wrong_answers:
  - "ระบบที่ขับเคลื่อนด้วยเหตุการณ์ของ LDK จะทำการตั้งค่าสถานะธุรกรรมที่น่าสงสัยโดยอัตโนมัติผ่านอัลกอริธึมการเรียนรู้ของเครื่องที่ถูกรวมเข้ากับกระบวนการลงนามหลัก"
  - "เลเยอร์นามธรรมของบล็อกเชน LDK ให้การตรวจจับการฉ้อโกงแบบเรียลไทม์โดยการอ้างอิงข้ามธุรกรรมทั้งหมดกับข้อมูลซุบซิบของเครือข่าย"
  - "ระบบการจัดการเพื่อนของ LDK ใช้ลายเซ็นทางเข้ารหัสขั้นสูงที่สามารถแยกแยะรูปแบบธุรกรรมที่ถูกต้องและเป็นอันตรายได้โดยธรรมชาติ"
explanation: |
  การออกแบบแบบแยกส่วนของ LDK ช่วยให้นักพัฒนาสามารถแยกเฉพาะส่วนประกอบการลงนามและการตรวจสอบในขณะที่ยังคงรักษาความฉลาดของโปรโตคอล Lightning ที่จำเป็นในการทำความเข้าใจบริบทของธุรกรรม ซึ่งช่วยให้ HSMs สามารถตัดสินใจอย่างมีข้อมูลเกี่ยวกับการส่งต่อการชำระเงิน การดำเนินการของช่องทาง และภัยคุกคามด้านความปลอดภัยแทนที่จะลงนามธุรกรรมโดยไม่พิจารณา คำตอบที่ผิดพลาดมักจะระบุความสามารถนี้อย่างไม่ถูกต้องว่าเป็นการตรวจจับการฉ้อโกงอัตโนมัติ การตรวจสอบบล็อกเชน หรือการลงนามด้วยการเข้ารหัส ในความเป็นจริงแล้วเป็นความสามารถของสถาปัตยกรรมแบบแยกส่วนในการรักษาการรับรู้โปรโตคอลในส่วนประกอบที่แยกออกมา ซึ่งช่วยให้การประเมินธุรกรรมอย่างชาญฉลาดเป็นไปได้
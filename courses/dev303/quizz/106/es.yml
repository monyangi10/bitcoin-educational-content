question: ¿Qué principio de diseño fundamental permite a LDK crear HSM conscientes de Lightning que puedan evaluar de forma inteligente si una transacción representa un enrutamiento de pago legítimo frente a intentos potencialmente maliciosos?
answer: La arquitectura modular de LDK permite extraer componentes específicos de firma y verificación de transacciones, al tiempo que se mantiene el conocimiento del contexto del protocolo Lightning
wrong_answers:
  - "El sistema basado en eventos de LDK señala automáticamente las transacciones sospechosas mediante algoritmos de aprendizaje automático integrados en el núcleo del proceso de firma"
  - "La capa de abstracción blockchain de LDK proporciona detección de fraude en tiempo real cruzando todas las transacciones con los datos de cotilleo de la red"
  - "El sistema de gestión de pares de LDK implementa firmas criptográficas avanzadas que distinguen intrínsecamente entre patrones de transacción legítimos y maliciosos"
explanation: |
  El diseño modular de LDK permite a los desarrolladores extraer sólo los componentes de firma y verificación, conservando la inteligencia del protocolo Lightning necesaria para comprender el contexto de la transacción. Esto permite a los HSM tomar decisiones informadas sobre el reenvío de pagos, las operaciones del canal y las amenazas a la seguridad, en lugar de firmar ciegamente las transacciones. Las respuestas erróneas atribuyen incorrectamente esta capacidad a la detección automatizada de fraudes, la supervisión de blockchain o las firmas criptográficas, cuando en realidad es la capacidad de la arquitectura modular de mantener el conocimiento del protocolo en componentes aislados lo que permite la evaluación inteligente de las transacciones.
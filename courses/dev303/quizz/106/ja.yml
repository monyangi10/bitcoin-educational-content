question: LDKは、トランザクションが正当な支払いルーティングであるか、悪意のある試みであるかをインテリジェントに評価できるLightning対応のHSMを開発することができますが、その基本的な設計原理はどのようなものでしょうか？
answer: LDKのモジュラー・アーキテクチャは、ライトニング・プロトコルのコンテキストを認識したまま、特定のトランザクション署名および検証コンポーネントを抽出することができます。
wrong_answers:
  - "LDKのイベント・ドリブン・システムは、コア署名プロセスに統合された機械学習アルゴリズムにより、疑わしい取引に自動的にフラグを立てる"
  - "LDKのブロックチェーン抽象化レイヤーは、ネットワーク・ゴシップ・データと全取引を相互参照することで、リアルタイムの不正検知を提供する"
  - "LDKのピアマネジメント・システムは、合法的な取引パターンと悪意のある取引パターンを本質的に区別する高度な暗号署名を実装している"
explanation: |
  LDKのモジュール設計により、開発者はトランザクションのコンテキストを理解するために必要なLightningプロトコルのインテリジェンスを維持したまま、署名と検証のコンポーネントだけを抽出することができます。これによりHSMは、やみくもにトランザクションに署名するのではなく、決済の転送、チャネルの運用、セキュリティ上の脅威について、情報に基づいた意思決定を行うことができます。間違った回答は、この機能を自動不正検知、ブロックチェーン監視、暗号署名と誤って説明していますが、実際には、インテリジェントなトランザクション評価を可能にするのは、分離されたコンポーネントでプロトコルの認識を維持するモジュラーアーキテクチャの能力です。
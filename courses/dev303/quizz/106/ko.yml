question: LDK가 거래가 합법적인 결제 라우팅인지, 잠재적으로 악의적인 시도인지 지능적으로 평가할 수 있는 Lightning 인식 HSM을 만들 수 있는 기본 설계 원칙은 무엇인가요?
answer: LDK의 모듈식 아키텍처를 통해 특정 트랜잭션 서명 및 검증 구성 요소를 추출하는 동시에 라이트닝 프로토콜 컨텍스트 인식을 유지할 수 있습니다
wrong_answers:
  - "LDK의 이벤트 중심 시스템은 핵심 서명 프로세스에 통합된 머신러닝 알고리즘을 통해 의심스러운 거래를 자동으로 플래그 지정합니다."
  - "LDK의 블록체인 추상화 계층은 모든 거래를 네트워크 가십 데이터와 상호 참조하여 실시간 사기 탐지 기능을 제공합니다."
  - "LDK의 피어 관리 시스템은 합법적인 거래 패턴과 악의적인 거래 패턴을 본질적으로 구분하는 고급 암호화 서명을 구현합니다."
explanation: |
  LDK의 모듈식 설계를 통해 개발자는 트랜잭션 컨텍스트를 이해하는 데 필요한 Lightning 프로토콜 인텔리전스를 유지하면서 서명 및 검증 구성 요소만 추출할 수 있습니다. 이를 통해 HSM은 맹목적으로 거래에 서명하는 대신 결제 전달, 채널 운영, 보안 위협에 대해 정보에 입각한 결정을 내릴 수 있습니다. 오답은 이 기능을 자동화된 사기 탐지, 블록체인 모니터링 또는 암호화 서명으로 잘못 설명하지만, 실제로는 모듈식 아키텍처가 격리된 구성 요소에서 프로토콜 인식을 유지하여 지능형 거래 평가를 가능하게 하는 기능입니다.
question: "Quel est le principe de conception fondamental qui permet à LDK de créer des HSM sensibles à la lumière, capables d'évaluer intelligemment si une transaction représente un routage de paiement légitime ou des tentatives potentiellement malveillantes ?"
answer: "L'architecture modulaire de LDK permet d'extraire des composants spécifiques de signature et de vérification des transactions tout en conservant la connaissance du contexte du protocole Lightning".
wrong_answers:
  - "Le système événementiel de LDK signale automatiquement les transactions suspectes grâce à des algorithmes d'apprentissage automatique intégrés dans le processus de signature de base".
  - "La couche d'abstraction blockchain de LDK permet de détecter les fraudes en temps réel en croisant toutes les transactions avec les données de ragots du réseau".
  - "Le système de gestion des pairs de LDK met en œuvre des signatures cryptographiques avancées qui permettent de distinguer de manière inhérente les modèles de transaction légitimes et malveillants".
explanation: |
  La conception modulaire de LDK permet aux développeurs d'extraire uniquement les composants de signature et de vérification tout en préservant l'intelligence du protocole Lightning nécessaire pour comprendre le contexte de la transaction. Cela permet aux HSM de prendre des décisions éclairées sur le transfert des paiements, les opérations sur les canaux et les menaces de sécurité, plutôt que de signer aveuglément les transactions. Les mauvaises réponses attribuent à tort cette capacité à la détection automatisée des fraudes, à la surveillance de la blockchain ou aux signatures cryptographiques, alors que c'est en fait la capacité de l'architecture modulaire à maintenir la connaissance du protocole dans des composants isolés qui permet une évaluation intelligente des transactions.

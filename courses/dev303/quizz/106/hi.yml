question: वह कौन सा मूलभूत डिजाइन सिद्धांत है जो LDK को लाइटनिंग-जागरूक HSM बनाने की अनुमति देता है जो बुद्धिमानी से यह मूल्यांकन कर सकते हैं कि कोई लेनदेन वैध भुगतान रूटिंग का प्रतिनिधित्व करता है या संभावित रूप से दुर्भावनापूर्ण प्रयासों का?
answer: LDK की मॉड्यूलर संरचना लाइटनिंग प्रोटोकॉल के संदर्भ को बनाए रखते हुए विशिष्ट लेनदेन हस्ताक्षर और सत्यापन घटकों को निकालने में सक्षम बनाती है।
wrong_answers:
  - "एलडीके की इवेंट-ड्रिवन प्रणाली, कोर साइनिंग प्रक्रिया में एकीकृत मशीन लर्निंग एल्गोरिदम के माध्यम से संदिग्ध लेनदेन को स्वचालित रूप से चिह्नित करती है।"
  - "एलडीके की ब्लॉकचेन एब्स्ट्रैक्शन लेयर नेटवर्क गॉसिप डेटा के आधार पर सभी लेनदेन का क्रॉस-रेफरेंस करके वास्तविक समय में धोखाधड़ी का पता लगाने की सुविधा प्रदान करती है।"
  - "एलडीके की पीयर मैनेजमेंट प्रणाली उन्नत क्रिप्टोग्राफिक हस्ताक्षरों को लागू करती है जो वैध और दुर्भावनापूर्ण लेनदेन पैटर्न के बीच स्वाभाविक रूप से अंतर करती है।"
explanation: |
  LDK का मॉड्यूलर डिज़ाइन डेवलपर्स को केवल हस्ताक्षर और सत्यापन घटकों को निकालने की अनुमति देता है, जबकि लेन-देन के संदर्भ को समझने के लिए आवश्यक लाइटनिंग प्रोटोकॉल इंटेलिजेंस को संरक्षित रखता है। इससे HSMs को लेन-देन पर अंधाधुंध हस्ताक्षर करने के बजाय भुगतान अग्रेषण, चैनल संचालन और सुरक्षा खतरों के बारे में सूचित निर्णय लेने में मदद मिलती है। गलत उत्तर इस क्षमता को स्वचालित धोखाधड़ी का पता लगाने, ब्लॉकचेन निगरानी या क्रिप्टोग्राफिक हस्ताक्षरों से जोड़ते हैं, जबकि वास्तव में यह मॉड्यूलर आर्किटेक्चर की पृथक घटकों में प्रोटोकॉल जागरूकता बनाए रखने की क्षमता है जो बुद्धिमान लेन-देन मूल्यांकन को सक्षम बनाती है।
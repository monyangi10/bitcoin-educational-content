question: چه اصل طراحی بنیادی به LDK اجازه می‌دهد تا HSMهای آگاه به Lightning ایجاد کند که بتوانند به‌طور هوشمندانه ارزیابی کنند که آیا یک تراکنش نمایانگر مسیریابی پرداخت قانونی است یا تلاش‌های بالقوه مخرب؟
answer: معماری ماژولار LDK امکان استخراج اجزای خاص امضای تراکنش و تأیید را فراهم می‌کند در حالی که آگاهی از زمینه پروتکل لایتنینگ حفظ می‌شود.
wrong_answers:
  - "سیستم مبتنی بر رویداد LDK به‌طور خودکار تراکنش‌های مشکوک را از طریق الگوریتم‌های یادگیری ماشین که در فرآیند اصلی امضا ادغام شده‌اند، شناسایی می‌کند"
  - "لایه انتزاعی بلاکچین LDK با بررسی متقابل تمام تراکنش‌ها در برابر داده‌های شایعه شبکه، تشخیص تقلب در زمان واقعی را فراهم می‌کند"
  - "سیستم مدیریت همتا LDK امضاهای رمزنگاری پیشرفته‌ای را پیاده‌سازی می‌کند که به‌طور ذاتی بین الگوهای تراکنش مشروع و مخرب تمایز قائل می‌شود"
explanation: |
  طراحی ماژولار LDK به توسعه‌دهندگان اجازه می‌دهد تا تنها اجزای امضا و تأیید را استخراج کنند، در حالی که هوش پروتکل لایتنینگ مورد نیاز برای درک زمینه تراکنش را حفظ می‌کند. این امر به HSMها امکان می‌دهد تا تصمیمات آگاهانه‌ای درباره انتقال پرداخت، عملیات کانال و تهدیدات امنیتی بگیرند، به جای اینکه به‌طور کورکورانه تراکنش‌ها را امضا کنند. پاسخ‌های نادرست این قابلیت را به تشخیص خودکار تقلب، نظارت بر بلاکچین یا امضاهای رمزنگاری نسبت می‌دهند، در حالی که در واقع این توانایی معماری ماژولار برای حفظ آگاهی پروتکل در اجزای جداگانه است که ارزیابی هوشمندانه تراکنش را ممکن می‌سازد.
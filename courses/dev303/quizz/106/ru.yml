question: Какой основополагающий принцип проектирования позволяет LDK создавать HSM с поддержкой Lightning, которые могут разумно оценивать, является ли транзакция законной маршрутизацией платежа по сравнению с потенциально вредоносными попытками?
answer: Модульная архитектура LDK позволяет извлекать отдельные компоненты для подписания и проверки транзакций, сохраняя при этом понимание контекста протокола Lightning
wrong_answers:
  - "Система LDK, ориентированная на события, автоматически отмечает подозрительные транзакции с помощью алгоритмов машинного обучения, интегрированных в основной процесс подписания"
  - "Уровень абстракции блокчейна LDK обеспечивает обнаружение мошенничества в режиме реального времени путем перекрестного сопоставления всех транзакций с данными сетевых сплетен"
  - "В системе управления аналогами LDK реализованы передовые криптографические подписи, которые по своей сути отличают законные транзакции от вредоносных"
explanation: |
  Модульная конструкция LDK позволяет разработчикам извлекать только компоненты подписания и верификации, сохраняя при этом интеллектуальные возможности протокола Lightning, необходимые для понимания контекста транзакции. Это позволяет HSM принимать обоснованные решения о переадресации платежей, работе каналов и угрозах безопасности, а не подписывать транзакции вслепую. Неправильные ответы ошибочно приписывают эту возможность автоматическому обнаружению мошенничества, мониторингу блокчейна или криптографическим подписям, в то время как на самом деле именно способность модульной архитектуры поддерживать осведомленность о протоколе в изолированных компонентах позволяет проводить интеллектуальную оценку транзакций.
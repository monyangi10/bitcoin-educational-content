question: 是什麼基本設計原則讓 LDK 能夠建立可感知 Lightning 的 HSM，並能夠智慧地評估交易是否代表合法的付款路由，以及潛在的惡意嘗試？
answer: LDK 的模組化架構可抽取特定的交易簽署與驗證元件，同時維持 Lightning 通訊協定情境感知功能
wrong_answers:
  - 「LDK的事件驅動系統透過整合到核心簽署流程中的機器學習演算法，自動標示可疑交易」
  - 「LDK的區塊鏈抽象層可透過交叉比對所有交易與網路閒言碎語資料，提供即時詐騙偵測」
  - 「LDK的同業管理系統實施先進的加密簽章，本質上可區分合法與惡意的交易模式」
explanation: |
  LDK 的模組化設計可讓開發人員僅抽取簽章與驗證元件，同時保留瞭解交易情境所需的 Lightning 通訊協定智慧。這使得 HSM 能夠就付款轉發、通道操作和安全威脅做出明智的決策，而不是盲目地簽署交易。錯誤的答案錯誤地將這項功能歸因於自動詐欺偵測、區塊鏈監控或加密簽章，而實際上是模組化架構在獨立元件中維持通訊協定感知的能力，使智慧型交易評估成為可能。
question: "什么基本设计原则使 LDK 能够创建可感知闪电的 HSM，从而智能地评估交易是否代表合法的支付路由和潜在的恶意企图？"
answer: "LDK 的模块化架构可提取特定的交易签名和验证组件，同时保持对闪电协议上下文的了解"
wrong_answers:
  - "LDK 的事件驱动系统通过集成到核心签署流程中的机器学习算法自动标记可疑交易"
  - "LDK的区块链抽象层通过将所有交易与网络流言数据进行交叉对比，提供实时欺诈检测"
  - "赛维LDK的同行管理系统采用了先进的加密签名技术，从本质上区分了合法交易模式和恶意交易模式"
explanation: |
  LDK的模块化设计允许开发人员只提取签名和验证组件，同时保留了解交易上下文所需的Lightning协议智能。这使 HSM 能够就支付转发、通道操作和安全威胁做出明智的决策，而不是盲目地签署交易。错误答案错误地将这一功能归因于自动欺诈检测、区块链监控或加密签名，而实际上是模块化架构在孤立组件中保持协议感知的能力实现了智能交易评估。

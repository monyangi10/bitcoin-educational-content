question: Как UniFFI се справя с разпространението на грешки от функциите на Rust към целеви езици като Kotlin и Python?
answer: Функциите, които връщат типове резултати, се маркират с "хвърля" в UDL и generate изключения на целевите езици
wrong_answers:
  - Типовете грешки се преобразуват автоматично в символни съобщения и се връщат като незадължителни стойности на всички целеви езици
  - Всички грешки на Rust са обвити в общ тип грешка на UniFFI, който трябва да бъде разопакован ръчно от разработчиците
  - Обработката на грешки изисква от разработчиците да прилагат ръчно код за превод на грешки за всяка целева езикова платформа
explanation: |
  UniFFI осигурява усъвършенствана обработка на грешки, която запазва модела за грешки на Rust, базиран на резултатите, като го превежда по подходящ начин за всеки целеви език. Функциите, които връщат типове Result в Rust, са маркирани с ключовата дума "throws" в UDL и тези generate родни обработки на изключения в целевите езици - методите на Kotlin хвърлят изключения, следвайки конвенциите на Java/Kotlin, докато Python използва модела на изключения на Python. Това гарантира, че обработката на грешки е естествена и идиоматична на всеки език, като същевременно се запазва семантичното значение на оригиналните типове грешки на Rust, за разлика от общите обвивки или подходите за ръчен превод.
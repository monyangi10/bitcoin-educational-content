question: UniFFI چگونه انتشار خطا را از توابع Rust به زبان‌های هدف مانند Kotlin و Python مدیریت می‌کند؟
answer: توابعی که نوع Result را برمی‌گردانند با 'throws' در UDL و استثناهای بومی generate در زبان‌های هدف علامت‌گذاری می‌شوند.
wrong_answers:
  - انواع خطا به طور خودکار به پیام‌های رشته‌ای تبدیل می‌شوند و به عنوان مقادیر اختیاری در همه زبان‌های هدف بازگردانده می‌شوند.
  - همه خطاهای Rust در یک نوع خطای عمومی UniFFI پیچیده شده‌اند که باید به‌صورت دستی توسط توسعه‌دهندگان باز شوند.
  - مدیریت خطا نیازمند این است که توسعه‌دهندگان به صورت دستی کد ترجمه خطا را برای هر پلتفرم زبان هدف پیاده‌سازی کنند.
explanation: |
  UniFFI مدیریت خطای پیشرفته‌ای را ارائه می‌دهد که مدل خطای مبتنی بر Result در Rust را حفظ کرده و آن را به‌طور مناسب برای هر زبان هدف ترجمه می‌کند. توابعی که در Rust نوع‌های Result را برمی‌گردانند، با کلیدواژه 'throws' در UDL علامت‌گذاری می‌شوند و این مدیریت استثنای بومی generate در زبان‌های هدف را فراهم می‌کند - متدهای Kotlin استثناها را بر اساس کنوانسیون‌های Java/Kotlin پرتاب می‌کنند، در حالی که Python از مدل استثنای Python استفاده می‌کند. این امر تضمین می‌کند که مدیریت خطا در هر زبان طبیعی و بومی به نظر برسد و در عین حال معنای معنایی نوع‌های خطای اصلی Rust را حفظ کند، برخلاف رویکردهای پوشش‌دهی عمومی یا ترجمه دستی.
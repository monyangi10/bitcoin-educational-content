question: Как UniFFI справляется с распространением ошибок из функций Rust в целевые языки, такие как Kotlin и Python?
answer: Функции, возвращающие типы Result, помечаются 'throws' в UDL и "родными" исключениями generate в целевых языках
wrong_answers:
  - Типы ошибок автоматически преобразуются в строковые сообщения и возвращаются как необязательные значения во всех целевых языках
  - Все ошибки Rust обернуты в общий тип ошибки UniFFI, который разработчики должны разворачивать вручную
  - Обработка ошибок требует от разработчиков ручной реализации кода перевода ошибок для каждой целевой языковой платформы
explanation: |
  UniFFI обеспечивает сложную обработку ошибок, которая сохраняет модель ошибок Rust, основанную на результатах, и при этом переводит ее соответствующим образом для каждого целевого языка. Функции, возвращающие типы Result в Rust, помечаются ключевым словом 'throws' в UDL, а в целевых языках эта обработка исключений соответствует generate - методы Kotlin бросают исключения, следуя соглашениям Java/Kotlin, а Python использует модель исключений Python. Это обеспечивает естественность и идиоматичность обработки ошибок в каждом языке, сохраняя при этом семантическое значение оригинальных типов ошибок Rust, в отличие от общих оберток или ручного перевода.
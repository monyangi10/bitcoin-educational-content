question: UniFFI, Rust फ़ंक्शंस से Kotlin और Python जैसी लक्ष्य भाषाओं तक त्रुटि प्रसार को कैसे संभालता है?
answer: UDL और generate में लक्ष्य भाषाओं में 'throws' के साथ Result प्रकार लौटाने वाले फ़ंक्शन चिह्नित किए जाते हैं।
wrong_answers:
  - त्रुटि प्रकारों को स्वचालित रूप से स्ट्रिंग संदेशों में परिवर्तित कर दिया जाता है और सभी लक्षित भाषाओं में वैकल्पिक मानों के रूप में लौटा दिया जाता है।
  - सभी Rust त्रुटियों को एक सामान्य UniFFI त्रुटि प्रकार में लपेटा जाता है जिसे डेवलपर्स द्वारा मैन्युअल रूप से अनरैप किया जाना चाहिए।
  - त्रुटि प्रबंधन के लिए डेवलपर्स को प्रत्येक लक्ष्य भाषा प्लेटफ़ॉर्म के लिए त्रुटि अनुवाद कोड को मैन्युअल रूप से लागू करना आवश्यक होता है।
explanation: |
  UniFFI उन्नत त्रुटि प्रबंधन प्रदान करता है जो Rust के परिणाम-आधारित त्रुटि मॉडल को संरक्षित रखता है और साथ ही प्रत्येक लक्ष्य भाषा के लिए इसे उपयुक्त रूप से अनुवादित करता है। Rust में परिणाम प्रकार लौटाने वाले फ़ंक्शन UDL में 'throws' कीवर्ड से चिह्नित होते हैं, और ये लक्ष्य भाषाओं में generate की मूल अपवाद प्रबंधन प्रणाली का उपयोग करते हैं - Kotlin विधियाँ Java/Kotlin परंपराओं के अनुसार अपवाद उत्पन्न करती हैं, जबकि Python Python के अपवाद मॉडल का उपयोग करता है। यह सुनिश्चित करता है कि त्रुटि प्रबंधन प्रत्येक भाषा में स्वाभाविक और मुहावरेदार लगे, साथ ही मूल Rust त्रुटि प्रकारों के अर्थ को भी संरक्षित रखे, जो सामान्य रैपर या मैन्युअल अनुवाद दृष्टिकोणों से अलग है।
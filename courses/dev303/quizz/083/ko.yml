question: UniFFI는 Rust 함수에서 Kotlin 및 Python과 같은 대상 언어로 오류 전파를 어떻게 처리하나요?
answer: 결과 유형을 반환하는 함수는 대상 언어의 UDL 및 generate 기본 예외에서 'throws'로 표시됩니다
wrong_answers:
  - 오류 유형은 자동으로 문자열 메시지로 변환되어 모든 대상 언어에서 선택적 값으로 반환됩니다
  - 모든 Rust 오류는 개발자가 수동으로 래핑을 해제해야 하는 일반 UniFFI 오류 유형으로 래핑됩니다
  - 오류 처리를 위해 개발자는 각 대상 언어 플랫폼에 대한 오류 번역 코드를 수동으로 구현해야 합니다
explanation: |
  UniFFI는 Rust의 결과 기반 오류 모델을 유지하면서 각 대상 언어에 맞게 적절하게 번역하는 정교한 오류 처리 기능을 제공합니다. Rust에서 결과 유형을 반환하는 함수는 UDL에서 'throws' 키워드로 표시되며, 대상 언어에서 이러한 generate 기본 예외 처리(Kotlin 메서드는 Java/Kotlin 규칙에 따라 예외를 던지는 반면 Python은 Python의 예외 모델을 사용합니다)를 지원합니다. 따라서 일반 래퍼나 수동 번역 접근 방식과 달리 원래 Rust 오류 유형의 의미적 의미를 유지하면서 각 언어에서 오류 처리가 자연스럽고 관용적으로 느껴지도록 보장합니다.
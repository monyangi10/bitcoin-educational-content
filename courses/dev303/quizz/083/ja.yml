question: UniFFIは、Rustの関数からKotlinやPythonのようなターゲット言語へのエラー伝搬をどのように処理していますか？
answer: 結果型を返す関数は、UDLでは'throws'でマークされ、ターゲット言語ではgenerateのネイティブ例外となる。
wrong_answers:
  - エラータイプは自動的に文字列メッセージに変換され、すべてのターゲット言語でオプション値として返されます。
  - すべてのRustエラーは一般的なUniFFIエラータイプでラップされており、開発者が手動でラップを解除する必要がある。
  - エラー処理は、開発者がターゲット言語プラットフォームごとにエラー変換コードを手動で実装する必要がある。
explanation: |
  UniFFIは、RustのResultベースのエラーモデルを維持しながら、各ターゲット言語に適切に翻訳する洗練されたエラーハンドリングを提供します。RustでResult型を返す関数はUDLで'throws'キーワードでマークされ、ターゲット言語ではこれらのgenerateネイティブな例外処理が行われます-KotlinのメソッドはJava/Kotlinの規則に従って例外をスローし、PythonはPythonの例外モデルを使用します。これは、一般的なラッパーや手作業による翻訳アプローチとは異なり、元のRustのエラー型の意味的な意味を保持しながら、各言語で自然で慣用的なエラーハンドリングを保証します。
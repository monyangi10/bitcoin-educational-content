question: UniFFI จัดการการแพร่กระจายข้อผิดพลาดจากฟังก์ชัน Rust ไปยังภาษาเป้าหมายเช่น Kotlin และ Python อย่างไร?
answer: ฟังก์ชันที่ส่งคืนประเภทผลลัพธ์จะถูกทำเครื่องหมายด้วย 'throws' ใน UDL และข้อยกเว้นพื้นเมือง generate ในภาษาปลายทาง
wrong_answers:
  - ประเภทข้อผิดพลาดจะถูกแปลงเป็นข้อความสตริงโดยอัตโนมัติและส่งคืนเป็นค่าทางเลือกในทุกภาษาเป้าหมาย
  - ข้อผิดพลาด Rust ทั้งหมดถูกห่อหุ้มในประเภทข้อผิดพลาด UniFFI ทั่วไปที่นักพัฒนาต้องแกะออกด้วยตนเอง
  - การจัดการข้อผิดพลาดต้องการให้นักพัฒนาซอฟต์แวร์ดำเนินการเขียนโค้ดการแปลข้อผิดพลาดด้วยตนเองสำหรับแต่ละแพลตฟอร์มภาษาที่ต้องการ
explanation: |
  UniFFI มีการจัดการข้อผิดพลาดที่ซับซ้อนซึ่งรักษารูปแบบข้อผิดพลาดตามผลลัพธ์ของ Rust ในขณะที่แปลให้เหมาะสมกับแต่ละภาษาเป้าหมาย ฟังก์ชันที่ส่งคืนประเภทผลลัพธ์ใน Rust จะถูกทำเครื่องหมายด้วยคีย์เวิร์ด 'throws' ใน UDL และการจัดการข้อยกเว้นเนทีฟของ generate ในภาษาเป้าหมาย - เมธอดของ Kotlin จะโยนข้อยกเว้นตามแนวทางของ Java/Kotlin ในขณะที่ Python ใช้โมเดลข้อยกเว้นของ Python สิ่งนี้ทำให้การจัดการข้อผิดพลาดรู้สึกเป็นธรรมชาติและเป็นไปตามแนวทางของแต่ละภาษา ในขณะที่ยังคงรักษาความหมายทางความหมายของประเภทข้อผิดพลาดดั้งเดิมของ Rust ไว้ ไม่เหมือนกับการห่อทั่วไปหรือวิธีการแปลด้วยตนเอง
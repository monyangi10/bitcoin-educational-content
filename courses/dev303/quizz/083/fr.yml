question: Comment l'UniFFI gère-t-elle la propagation des erreurs entre les fonctions Rust et les langages cibles tels que Kotlin et Python ?
answer: Les fonctions renvoyant des types de résultats sont marquées par des exceptions "throws" dans l'UDL et des exceptions natives générées dans les langues cibles.
wrong_answers:
  - Les types d'erreurs sont automatiquement convertis en messages sous forme de chaînes et renvoyés en tant que valeurs optionnelles dans toutes les langues cibles.
  - Toutes les erreurs Rust sont enveloppées dans un type d'erreur générique UniFFI qui doit être déballé manuellement par les développeurs.
  - La gestion des erreurs oblige les développeurs à mettre en œuvre manuellement un code de traduction des erreurs pour chaque plateforme linguistique cible.
explanation: |
  L'interface utilisateur unique propose une gestion des erreurs sophistiquée qui préserve le modèle d'erreur basé sur les résultats de Rust tout en le traduisant de manière appropriée pour chaque langue cible. Les fonctions qui renvoient des types Result dans Rust sont marquées par le mot-clé "throws" dans l'UDL, et cette gestion native des exceptions générées dans les langues cibles - les méthodes Kotlin lancent des exceptions en suivant les conventions Java/Kotlin, tandis que Python utilise le modèle d'exception de Python. Cela garantit une gestion des erreurs naturelle et idiomatique dans chaque langue, tout en préservant la signification sémantique des types d'erreur Rust originaux, contrairement aux wrappers génériques ou aux approches de traduction manuelle.

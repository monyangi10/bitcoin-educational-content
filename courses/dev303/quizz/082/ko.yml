question: UniFFI 워크플로우에서 UDL(통합 정의 언어) 파일은 어떤 역할을 하나요?
answer: Rust 라이브러리의 어떤 부분을 다른 언어에 노출해야 하는지 설명하는 인터페이스 사양의 역할을 합니다
wrong_answers:
  - 여기에는 대상 언어 바인딩으로 컴파일되는 실제 Rust 구현 코드가 포함되어 있습니다
  - 서로 다른 언어 환경 간의 메모리 할당을 관리하는 런타임 구성 파일 역할을 합니다
  - 여러 플랫폼에서 생성된 바인딩의 정확성을 검증하기 위한 테스트 프레임워크를 제공합니다
explanation: |
  UDL 파일은 Rust 구현과 생성된 언어 바인딩 간의 계약 또는 사양 역할을 합니다. 이 파일은 Rust 코드 자체를 포함하지 않으며 런타임 작업이나 테스트를 처리하지도 않습니다. 대신 Rust 라이브러리의 함수, 유형 및 인터페이스를 다른 언어에서 사용할 수 있도록 선언적으로 정의하여 대상 언어의 기본 인터페이스에 어떻게 매핑되고 표시되어야 하는지를 지정합니다.
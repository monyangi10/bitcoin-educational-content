question: UniFFIのワークフローにおいて、UDL（Unified Definition Language）ファイルはどのような役割を果たしますか？
answer: Rustライブラリのどの部分を他の言語に公開すべきかを記述するインターフェース仕様として機能する。
wrong_answers:
  - ターゲット言語バインディングにコンパイルされる実際のRust実装コードが含まれている。
  - 異なる言語環境間でのメモリ割り当てを管理するランタイム設定ファイルとして機能する。
  - 生成されたバインディングの正しさを複数のプラットフォームで検証するためのテストフレームワークを提供します。
explanation: |
  UDLファイルは、Rustの実装と生成された言語バインディングの間の契約や仕様の役割を果たします。それはRustのコードそのものを含んでいませんし、実行時の操作やテストも扱いません。その代わりに、Rustライブラリからどの関数、型、インタフェースが他の言語で利用可能になるべきかを宣言的に定義し、それらがターゲット言語のネイティブインタフェースにどのようにマッピングされ、表示されるべきかを指定します。
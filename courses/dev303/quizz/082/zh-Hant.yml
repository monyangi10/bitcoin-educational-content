question: 統一定義語言 (UDL) 檔案在 UniFFI 工作流程中扮演什麼角色？
answer: 它是一個介面規格，說明 Rust 函式庫的哪些部分應該暴露給其他語言。
wrong_answers:
  - 它包含實際的 Rust 實作程式碼，這些程式碼會被編譯成目標語言綁定檔
  - 它可作為執行時的設定檔，管理不同語言環境之間的記憶體分配
  - 它提供了一個測試框架，用於驗證跨多個平台生成的綁定的正確性。
explanation: |
  UDL 檔案是 Rust 實作與產生的語言綁定之間的契約或規範。它本身不包含 Rust 程式碼，也不處理執行時的操作或測試。相反地，它宣告性地定義了 Rust 函式庫中的哪些函式、類型和介面應該提供給其他語言使用，並指定這些函式、類型和介面應該如何映射並顯示在目標語言的原生介面中。
question: 统一定义语言（UDL）文件在 UniFFI 工作流程中起什么作用？
answer: 它作为一种接口规范，描述了 Rust 库的哪些部分应暴露给其他语言
wrong_answers:
  - 它包含实际的 Rust 实现代码，这些代码会被编译到目标语言绑定中
  - 它是一个运行时配置文件，用于管理不同语言环境之间的内存分配
  - 它提供了一个测试框架，用于验证跨多个平台生成的绑定的正确性
explanation: |
  UDL 文件是 Rust 实现与生成的语言绑定之间的契约或规范。它本身不包含 Rust 代码，也不处理运行时操作或测试。相反，它声明性地定义了 Rust 库中的哪些函数、类型和接口应提供给其他语言使用，并规定了这些函数、类型和接口应如何映射并显示在目标语言的本地接口中。
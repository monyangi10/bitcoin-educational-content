question: فایل زبان تعریف یکپارچه (UDL) چه نقشی در جریان کار UniFFI ایفا می‌کند؟
answer: به عنوان یک مشخصات رابط عمل می‌کند که توضیح می‌دهد کدام بخش‌های کتابخانه Rust باید به زبان‌های دیگر ارائه شوند.
wrong_answers:
  - این شامل کد پیاده‌سازی واقعی Rust است که به زبان‌های هدف کامپایل می‌شود.
  - این به عنوان یک فایل پیکربندی زمان اجرا عمل می‌کند که تخصیص حافظه بین محیط‌های زبان مختلف را مدیریت می‌کند.
  - این یک چارچوب تست برای اعتبارسنجی درستی اتصالات تولید شده در چندین پلتفرم فراهم می‌کند.
explanation: |
  فایل UDL به عنوان یک قرارداد یا مشخصات بین پیاده‌سازی Rust و زبان‌های بایندینگ تولید شده عمل می‌کند. این فایل خود شامل کد Rust نیست و عملیات زمان اجرا یا تست را مدیریت نمی‌کند. بلکه به صورت اعلامی تعریف می‌کند که کدام توابع، انواع و رابط‌ها از کتابخانه Rust باید برای زبان‌های دیگر در دسترس قرار گیرند و مشخص می‌کند که چگونه باید در رابط بومی زبان هدف نگاشت و ارائه شوند.
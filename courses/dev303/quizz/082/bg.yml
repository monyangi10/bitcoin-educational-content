question: Каква е ролята на файла на унифицирания език за дефиниране (UDL) в работния процес на UniFFI?
answer: Той действа като спецификация на интерфейса, която описва кои части на библиотеката Rust трябва да бъдат достъпни за други езици
wrong_answers:
  - Той съдържа действителния код за реализация на Rust, който се компилира в обвързаностите на целевия език
  - Той служи като конфигурационен файл за изпълнение, който управлява разпределението на паметта между различните езикови среди
  - Той предоставя рамка за тестване за потвърждаване на коректността на генерираните връзки в различни платформи
explanation: |
  Файлът UDL служи като договор или спецификация между реализацията на Rust и генерираните езикови връзки. Той не съдържа самия код на Rust, нито се занимава с операции по време на изпълнение или тестване. Вместо това той декларативно определя кои функции, типове и интерфейси от библиотеката на Rust трябва да бъдат предоставени на други езици, като посочва как те трябва да бъдат картографирани и представени в родния интерфейс на целевия език.
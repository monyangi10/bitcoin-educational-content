question: यूनिएफ़एफआई वर्कफ़्लो में यूनिफाइड डेफिनिशन लैंग्वेज (यूडीएल) फ़ाइल की क्या भूमिका होती है?
answer: यह एक इंटरफ़ेस विनिर्देश के रूप में कार्य करता है जो यह बताता है कि Rust लाइब्रेरी के किन हिस्सों को अन्य भाषाओं के लिए उपलब्ध कराया जाना चाहिए।
wrong_answers:
  - इसमें वास्तविक Rust कार्यान्वयन कोड शामिल है जिसे लक्ष्य भाषा बाइंडिंग में संकलित किया जाता है।
  - यह एक रनटाइम कॉन्फ़िगरेशन फ़ाइल के रूप में कार्य करता है जो विभिन्न भाषा वातावरणों के बीच मेमोरी आवंटन का प्रबंधन करता है।
  - यह कई प्लेटफार्मों पर उत्पन्न बाइंडिंग की शुद्धता को मान्य करने के लिए एक परीक्षण ढांचा प्रदान करता है।
explanation: |
  UDL फ़ाइल Rust कार्यान्वयन और जनित भाषा बाइंडिंग के बीच एक अनुबंध या विनिर्देश के रूप में कार्य करती है। इसमें स्वयं Rust कोड नहीं होता है, न ही यह रनटाइम संचालन या परीक्षण को संभालती है। इसके बजाय, यह घोषणात्मक रूप से परिभाषित करती है कि Rust लाइब्रेरी से कौन से फ़ंक्शन, प्रकार और इंटरफ़ेस अन्य भाषाओं के लिए उपलब्ध कराए जाने चाहिए, और यह निर्दिष्ट करती है कि उन्हें लक्ष्य भाषा के मूल इंटरफ़ेस में कैसे मैप और प्रस्तुत किया जाना चाहिए।
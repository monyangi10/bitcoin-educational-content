question: Какую роль играет файл унифицированного языка определений (UDL) в рабочем процессе UniFFI?
answer: Он действует как спецификация интерфейса, описывающая, какие части библиотеки Rust должны быть доступны для других языков
wrong_answers:
  - Он содержит фактический код реализации Rust, который компилируется в привязку к целевому языку
  - Он служит файлом конфигурации времени выполнения, который управляет распределением памяти между различными языковыми средами
  - Она предоставляет механизм тестирования для проверки корректности сгенерированных привязок на различных платформах
explanation: |
  Файл UDL служит контрактом или спецификацией между реализацией Rust и генерируемыми языковыми связками. Он не содержит сам код Rust, не управляет операциями во время выполнения или тестированием. Вместо этого он декларативно определяет, какие функции, типы и интерфейсы из библиотеки Rust должны быть доступны другим языкам, указывая, как они должны быть отображены и представлены в родном интерфейсе целевого языка.
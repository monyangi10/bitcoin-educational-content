question: ไฟล์ Unified Definition Language (UDL) มีบทบาทอะไรในกระบวนการทำงานของ UniFFI?
answer: มันทำหน้าที่เป็นสเปคของอินเทอร์เฟซที่อธิบายว่าส่วนใดของไลบรารี Rust ควรถูกเปิดเผยให้กับภาษาอื่น ๆ
wrong_answers:
  - มันมีโค้ดการใช้งาน Rust ที่แท้จริงซึ่งถูกคอมไพล์เป็นการเชื่อมโยงภาษาที่ต้องการ
  - มันทำหน้าที่เป็นไฟล์การกำหนดค่ารันไทม์ที่จัดการการจัดสรรหน่วยความจำระหว่างสภาพแวดล้อมภาษาต่าง ๆ
  - มันให้กรอบการทดสอบสำหรับการตรวจสอบความถูกต้องของการเชื่อมโยงที่สร้างขึ้นในหลายแพลตฟอร์ม
explanation: |
  ไฟล์ UDL ทำหน้าที่เป็นสัญญาหรือข้อกำหนดระหว่างการใช้งาน Rust และการสร้างการเชื่อมโยงภาษาที่เกิดขึ้น มันไม่ได้มีโค้ด Rust เอง และไม่ได้จัดการการทำงานในช่วงรันไทม์หรือการทดสอบ แต่จะกำหนดอย่างชัดเจนว่าฟังก์ชัน, ชนิดข้อมูล, และอินเทอร์เฟซใดจากไลบรารี Rust ควรถูกทำให้สามารถใช้งานได้ในภาษาอื่น ๆ โดยระบุว่าควรจะถูกแมปและนำเสนอในอินเทอร์เฟซพื้นเมืองของภาษาปลายทางอย่างไร
question: UniFFI UDL 파일에서 네임스페이스 선언의 주요 목적은 무엇인가요?
answer: 객체 인스턴스화 없이 직접 호출할 수 있는 함수를 위한 컨테이너를 제공하려면 다음과 같이 하세요
wrong_answers:
  - 생성된 언어 바인딩에 대한 패키지 구조 및 임포트 종속성을 정의하려면 다음과 같이 하세요
  - UniFFI를 통해 Rust 라이브러리를 사용할 대상 프로그래밍 언어를 지정하려면 다음과 같이 하세요
  - 언어 간 데이터 마샬링 작업을 위한 메모리 관리 전략 수립하기
explanation: |
  UniFFI UDL의 네임스페이스는 객체를 먼저 만들지 않고 바로 호출할 수 있는 독립형 함수를 위한 컨테이너 역할을 합니다. 이러한 네임스페이스 함수는 일반적으로 값을 매개변수로 받아 결과를 반환하는 간단한 연산을 처리합니다. 다른 옵션은 패키지 구조와 임포트가 바인딩 생성 프로세스에서 자동으로 처리되고, 대상 언어가 UDL 파일이 아닌 빌드 프로세스 중에 지정되며, 메모리 관리가 네임스페이스에 명시적으로 선언되지 않고 UniFFI의 런타임 계층에서 투명하게 처리되기 때문에 올바르지 않습니다.
question: วัตถุประสงค์หลักของการประกาศ namespace ในไฟล์ UniFFI UDL คืออะไร?
answer: เพื่อให้คอนเทนเนอร์สำหรับฟังก์ชันที่สามารถเรียกใช้ได้โดยตรงโดยไม่ต้องสร้างวัตถุ
wrong_answers:
  - เพื่อกำหนดโครงสร้างแพ็กเกจและนำเข้าการพึ่งพาสำหรับการผูกภาษาที่สร้างขึ้น
  - เพื่อระบุภาษาโปรแกรมเป้าหมายที่จะใช้ไลบรารี Rust ผ่าน UniFFI
  - เพื่อกำหนดกลยุทธ์การจัดการหน่วยความจำสำหรับการดำเนินการส่งข้อมูลข้ามภาษา
explanation: |
  เนมสเปซใน UDL ของ UniFFI ทำหน้าที่เป็นคอนเทนเนอร์สำหรับฟังก์ชันที่สามารถเรียกใช้ได้โดยตรงโดยไม่ต้องสร้างอ็อบเจ็กต์ก่อน ฟังก์ชันเนมสเปซเหล่านี้มักจะจัดการกับการดำเนินการง่ายๆ ที่รับค่าเป็นพารามิเตอร์และส่งคืนผลลัพธ์ ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะ: โครงสร้างแพ็กเกจและการนำเข้าจะถูกจัดการโดยกระบวนการสร้างบันด์อัตโนมัติ, ภาษาที่เป็นเป้าหมายจะถูกระบุในระหว่างกระบวนการสร้างแทนที่จะอยู่ในไฟล์ UDL, และการจัดการหน่วยความจำจะถูกจัดการโดยชั้นรันไทม์ของ UniFFI อย่างโปร่งใสแทนที่จะถูกประกาศอย่างชัดเจนในเนมสเปซ
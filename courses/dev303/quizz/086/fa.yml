question: هدف اصلی اعلام فضای نام در یک فایل UDL UniFFI چیست؟
answer: برای فراهم کردن یک محفظه برای توابعی که می‌توانند مستقیماً بدون نیاز به نمونه‌سازی شیء فراخوانی شوند
wrong_answers:
  - برای تعریف ساختار بسته و وارد کردن وابستگی‌ها برای اتصال‌های زبانی تولید شده
  - برای مشخص کردن زبان‌های برنامه‌نویسی هدف که از کتابخانه Rust از طریق UniFFI استفاده خواهند کرد
  - برای تعیین استراتژی مدیریت حافظه برای عملیات مارشالینگ داده‌ها بین زبان‌های مختلف
explanation: |
  فضای نام در UDL مربوط به UniFFI به عنوان یک محفظه برای توابع مستقل عمل می‌کند که می‌توان آن‌ها را مستقیماً بدون ایجاد اشیاء ابتدا فراخوانی کرد. این توابع فضای نام معمولاً عملیات ساده‌ای را انجام می‌دهند که مقادیر را به عنوان پارامتر می‌گیرند و نتایج را برمی‌گردانند. گزینه‌های دیگر نادرست هستند زیرا: ساختار بسته و واردات به صورت خودکار توسط فرآیند تولید بایندینگ مدیریت می‌شوند، زبان‌های هدف در طول فرآیند ساخت به جای فایل UDL مشخص می‌شوند، و مدیریت حافظه به صورت شفاف توسط لایه زمان اجرای UniFFI مدیریت می‌شود و نیازی به اعلام صریح در فضاهای نام نیست.
question: UniFFI UDLファイルの名前空間宣言の主な目的は何ですか？
answer: オブジェクトのインスタンス化を必要とせず、直接呼び出せる関数のコンテナを提供する。
wrong_answers:
  - 生成された言語バインディングのパッケージ構造とインポート依存関係を定義するには
  - UniFFIを通じてRustライブラリを消費するターゲット・プログラミング言語を指定するには
  - 言語間のデータ・マーシャリング操作のためのメモリ管理戦略を確立する。
explanation: |
  UniFFIのUDLにおける名前空間は、オブジェクトを最初に生成することなく直接呼び出すことができるスタンドアロン関数のコンテナとして機能します。これらの名前空間関数は通常、値をパラメータとして受け取り、結果を返す単純な操作を扱います。パッケージ構造とインポートはバインディング生成プロセスで自動的に処理され、ターゲット言語はUDLファイルではなくビルドプロセスで指定され、メモリ管理は名前空間で明示的に宣言されるのではなく、UniFFIのランタイムレイヤーで透過的に処理されるためです。
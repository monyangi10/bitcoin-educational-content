question: UniFFI UDL फ़ाइल में नेमस्पेस घोषणा का प्राथमिक उद्देश्य क्या है?
answer: उन फ़ंक्शनों के लिए एक कंटेनर प्रदान करना जिन्हें ऑब्जेक्ट इंस्टेंशिएशन की आवश्यकता के बिना सीधे कॉल किया जा सकता है।
wrong_answers:
  - जनरेट किए गए भाषा बाइंडिंग के लिए पैकेज संरचना और आयात निर्भरताओं को परिभाषित करने के लिए
  - UniFFI के माध्यम से Rust लाइब्रेरी का उपयोग करने वाली लक्षित प्रोग्रामिंग भाषाओं को निर्दिष्ट करने के लिए
  - विभिन्न भाषाओं में डेटा प्रबंधन कार्यों के लिए मेमोरी प्रबंधन रणनीति स्थापित करना।
explanation: |
  UniFFI की UDL में मौजूद नेमस्पेस, स्टैंडअलोन फ़ंक्शंस के लिए एक कंटेनर के रूप में कार्य करता है जिन्हें पहले ऑब्जेक्ट बनाए बिना सीधे कॉल किया जा सकता है। ये नेमस्पेस फ़ंक्शंस आमतौर पर सरल ऑपरेशन्स को संभालते हैं जो पैरामीटर के रूप में मान लेते हैं और परिणाम लौटाते हैं। अन्य विकल्प गलत हैं क्योंकि: पैकेज संरचना और आयात बाइंडिंग जनरेशन प्रक्रिया द्वारा स्वचालित रूप से नियंत्रित किए जाते हैं, लक्ष्य भाषाएँ UDL फ़ाइल के बजाय बिल्ड प्रक्रिया के दौरान निर्दिष्ट की जाती हैं, और मेमोरी प्रबंधन को नेमस्पेस में स्पष्ट रूप से घोषित करने के बजाय UniFFI की रनटाइम लेयर द्वारा पारदर्शी रूप से नियंत्रित किया जाता है।
question: Какво е основното предназначение на декларацията за пространство от имена в UDL файла на UniFFI?
answer: Предоставяне на контейнер за функции, които могат да се извикват директно, без да се изисква инстанциране на обект
wrong_answers:
  - Определяне на структурата на пакета и зависимостите за импортиране за генерираните езикови връзки
  - Задаване на целевите езици за програмиране, които ще използват библиотеката Rust чрез UniFFI
  - Установяване на стратегията за управление на паметта за операциите за преобразуване на данни между езиците
explanation: |
  Пространството от имена в UDL на UniFFI служи като контейнер за самостоятелни функции, които могат да бъдат извиквани директно, без да се създават обекти. Тези функции от пространството от имена обикновено обработват прости операции, които приемат стойности като параметри и връщат резултати. Другите варианти не са правилни, защото: структурата на пакетите и импортите се обработват автоматично от процеса на генериране на връзки, целевите езици се задават по време на процеса на изграждане, а не в UDL файла, и управлението на паметта се обработва прозрачно от runtime слоя на UniFFI, а не се декларира изрично в пространствата от имена.
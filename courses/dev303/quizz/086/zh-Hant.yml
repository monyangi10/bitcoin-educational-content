question: UniFFI UDL 檔案中名稱空間宣告的主要目的是什麼？
answer: 提供可直接呼叫的函數容器，而不需要物件實體化
wrong_answers:
  - 為已產生的語言綁定定義套件結構和匯入依賴關係
  - 指定將透過 UniFFI 使用 Rust 函式庫的目標程式語言
  - 建立跨語言資料遷移作業的記憶體管理策略
explanation: |
  在 UniFFI 的 UDL 中，命名空間是獨立函數的容器，這些函數可以直接被呼叫，而不需要先建立物件。這些命名空間函數通常處理簡單的操作，將值當作參數並傳回結果。其他選項是不正確的，因為：套裝結構和匯入是由綁定產生過程自動處理的，目標語言是在建立過程中指定的，而不是在 UDL 檔案中指定的，記憶體管理是由 UniFFI 的執行時層透明處理的，而不是在命名空間中明確聲明的。
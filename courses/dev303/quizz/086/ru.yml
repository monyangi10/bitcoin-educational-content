question: Каково основное назначение объявления пространства имен в файле UniFFI UDL?
answer: Предоставление контейнера для функций, которые можно вызывать напрямую, не требуя инстанцирования объекта
wrong_answers:
  - Чтобы определить структуру пакетов и зависимости импорта для сгенерированных языковых привязок
  - Чтобы указать целевые языки программирования, которые будут использовать библиотеку Rust через UniFFI
  - Определить стратегию управления памятью для межъязыковых операций маршалинга данных
explanation: |
  Пространство имен в UDL UniFFI служит контейнером для автономных функций, которые можно вызывать напрямую, без предварительного создания объектов. Эти функции пространства имен обычно выполняют простые операции, которые принимают значения в качестве параметров и возвращают результаты. Остальные варианты неверны, поскольку: структура пакетов и импорт обрабатываются процессом генерации привязок автоматически, целевые языки указываются в процессе сборки, а не в UDL-файле, а управление памятью обрабатывается прозрачно уровнем времени выполнения UniFFI, а не объявляется явно в пространствах имен.
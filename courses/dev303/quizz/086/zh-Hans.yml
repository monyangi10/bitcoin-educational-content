question: UniFFI UDL 文件中名称空间声明的主要目的是什么？
answer: 为无需实例化对象就可直接调用的函数提供一个容器
wrong_answers:
  - 为生成的语言绑定定义软件包结构和导入依赖关系
  - 指定将通过 UniFFI 使用 Rust 库的目标编程语言
  - 为跨语言数据编译操作制定内存管理策略
explanation: |
  UniFFI UDL 中的命名空间是独立函数的容器，可以直接调用而无需先创建对象。这些命名空间函数通常处理将值作为参数并返回结果的简单操作。其他选项不正确的原因是：包结构和导入由绑定生成过程自动处理，目标语言在构建过程中而不是在 UDL 文件中指定，内存管理由 UniFFI 的运行时层透明处理，而不是在命名空间中明确声明。
question: Какъв синтаксис се използва за достъп до първото поле на структура кортеж в Rust?
answer: Точково означение с индекс 0 (напр. instance.0)
wrong_answers:
  - Квадратни скоби с индекс 0 (напр. instance[0])
  - Записване на стрелки с индекс 0 (напр. instance->0)
  - Двойно двоеточие с индекс 0 (напр. instance::0)
explanation: |
  Структурите на кортежите в Rust използват точкова нотация, последвана от индекса на полето, за да получат достъп до неназованите си полета. Първото поле се достъпва с .0, второто с .1 и т.н. Това е различно от масивите или векторите, които използват квадратни скоби, и за разлика от C++, където се използва запис със стрелки за указатели. Синтаксисът на двойното двоеточие е запазен за асоциирани функции и маркиране на имена, а не за достъп до полета.
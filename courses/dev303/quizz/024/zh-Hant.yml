question: 在 Rust 中，使用什麼語法存取元組架構的第一個欄位？
answer: 索引為 0 的點符號 (例如：instance.0)
wrong_answers:
  - 索引為 0 的方括號 (例如：instance[0])
  - 索引為 0 的箭頭符號 (例如：instance->0)
  - 索引為 0 的雙冒號 (例如：instance::0)
explanation: |
  Rust 中的 Tuple 結構使用點符號，後跟欄位索引來存取未命名的欄位。存取第一個欄位時使用 .0，存取第二個欄位時使用 .1，如此類推。這與使用方括號的陣列或向量不同，也不像 C++ 使用箭頭符號來表示指標。雙冒號語法保留用於關聯函數和命名間隔，而非欄位存取。
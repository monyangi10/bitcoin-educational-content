question: Rust에서 튜플 구조의 첫 번째 필드에 액세스하는 데 사용되는 구문은 무엇인가요?
answer: "인덱스가 0인 점 표기법(예: instance.0)"
wrong_answers:
  - "인덱스가 0인 대괄호(예: 인스턴스[0])"
  - "인덱스가 0인 화살표 표기법(예: 인스턴스->0)"
  - "인덱스가 0인 이중 콜론(예: 인스턴스::0)"
explanation: |
  Rust의 튜플 구조는 명명되지 않은 필드에 액세스하기 위해 점 표기법과 필드 인덱스를 사용합니다. 첫 번째 필드는 .0으로, 두 번째 필드는 .1로 액세스하는 식입니다. 이는 대괄호를 사용하는 배열이나 벡터와 다르며, 포인터에 화살표 표기법을 사용하는 C++와도 다릅니다. 이중 콜론 구문은 필드 액세스가 아닌 관련 함수 및 네임스페이스를 위해 예약되어 있습니다.

question: Rust में टपल संरचना के पहले फ़ील्ड तक पहुँचने के लिए किस सिंटैक्स का उपयोग किया जाता है?
answer: सूचकांक 0 के साथ डॉट नोटेशन (उदाहरण के लिए, instance.0)
wrong_answers:
  - इंडेक्स 0 वाले वर्गाकार कोष्ठक (उदाहरण के लिए, instance[0])
  - इंडेक्स 0 के साथ तीर का संकेतन (उदाहरण के लिए, इंस्टेंस->0)
  - इंडेक्स 0 के साथ डबल कोलन (उदाहरण के लिए, instance::0)
explanation: |
  Rust में टपल संरचनाएं अपने अनाम फ़ील्ड तक पहुँचने के लिए डॉट नोटेशन के बाद फ़ील्ड इंडेक्स का उपयोग करती हैं। पहले फ़ील्ड को .0 से, दूसरे को .1 से, और इसी तरह आगे भी एक्सेस किया जाता है। यह एरे या वेक्टर से अलग है जो वर्ग कोष्ठक का उपयोग करते हैं, और C++ से भी अलग है जो पॉइंटर्स के लिए एरो नोटेशन का उपयोग करता है। डबल कॉलन सिंटैक्स एसोसिएटेड फ़ंक्शंस और नेमस्पेसिंग के लिए आरक्षित है, फ़ील्ड एक्सेस के लिए नहीं।
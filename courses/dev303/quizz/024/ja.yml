question: Rustでタプル構造の最初のフィールドにアクセスするには、どのような構文を使うのか？
answer: インデックス0のドット表記（例：instance.0）
wrong_answers:
  - インデックス0の角括弧（例：instance[0])
  - インデックス0の矢印表記（例：インスタンス->0）
  - インデックス0を持つダブルコロン（例：instance::0）
explanation: |
  Rustのタプル構造では、無名フィールドにアクセスするために、ドット記法の後にフィールド・インデックスを使用する。最初のフィールドは.0、2番目のフィールドは.1、といった具合である。これは、角括弧を使う配列やベクトルとは異なり、ポインタに矢印表記を使うC++とも異なります。二重コロン構文は、関連する関数や名前空間のために予約されているのであって、フィールド・アクセスのために予約されているのではない。
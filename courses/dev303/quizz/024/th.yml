question: ไวยากรณ์ใดที่ใช้ในการเข้าถึงฟิลด์แรกของโครงสร้างทูเพิลใน Rust?
answer: สัญลักษณ์จุดพร้อมดัชนี 0 (เช่น instance.0)
wrong_answers:
  - วงเล็บเหลี่ยมที่มีดัชนี 0 (เช่น instance[0])
  - สัญลักษณ์ลูกศรพร้อมดัชนี 0 (เช่น instance->0)
  - ดับเบิลโคลอนกับดัชนี 0 (เช่น instance::0)
explanation: |
  โครงสร้างทูเพิลใน Rust ใช้การบันทึกแบบจุดตามด้วยดัชนีฟิลด์เพื่อเข้าถึงฟิลด์ที่ไม่มีชื่อ ฟิลด์แรกเข้าถึงด้วย .0 ฟิลด์ที่สองด้วย .1 และต่อไปเรื่อย ๆ ซึ่งแตกต่างจากอาเรย์หรือเวกเตอร์ที่ใช้วงเล็บเหลี่ยม และไม่เหมือนกับ C++ ที่ใช้การบันทึกแบบลูกศรสำหรับพอยน์เตอร์ ไวยากรณ์ดับเบิลโคลอนถูกสงวนไว้สำหรับฟังก์ชันที่เกี่ยวข้องและการตั้งชื่อพื้นที่ ไม่ใช่การเข้าถึงฟิลด์
question: Какой синтаксис используется для доступа к первому полю кортежной структуры в Rust?
answer: Точечные обозначения с индексом 0 (например, instance.0)
wrong_answers:
  - Квадратные скобки с индексом 0 (например, instance[0])
  - Обозначение стрелок с индексом 0 (например, экземпляр->0)
  - Двойное двоеточие с индексом 0 (например, instance::0)
explanation: |
  Структуры кортежей в Rust используют точечную нотацию с последующим индексом поля для доступа к своим неименованным полям. К первому полю обращаются через .0, ко второму - через .1 и так далее. Это отличается от массивов или векторов, в которых используются квадратные скобки, и от C++, в котором для указателей используется стрелочная нотация. Синтаксис двойного двоеточия предназначен для ассоциированных функций и пространства имен, а не для доступа к полям.
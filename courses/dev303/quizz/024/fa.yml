question: در Rust، برای دسترسی به اولین فیلد یک ساختار تاپل از چه سینتکسی استفاده می‌شود؟
answer: نشانه‌گذاری نقطه‌ای با شاخص 0 (مثلاً، instance.0)
wrong_answers:
  - براکت‌های مربعی با شاخص 0 (مثلاً، instance[0])
  - نماد پیکان با اندیس 0 (مثلاً instance->0)
  - دو نقطه با شاخص ۰ (مثلاً، instance::0)
explanation: |
  ساختارهای تاپل در Rust از نشانه‌گذاری نقطه‌ای به همراه شاخص فیلد برای دسترسی به فیلدهای بدون نام خود استفاده می‌کنند. فیلد اول با .0، فیلد دوم با .1 و به همین ترتیب دسترسی پیدا می‌کند. این با آرایه‌ها یا وکتورها که از کروشه استفاده می‌کنند متفاوت است و برخلاف C++ که از نشانه‌گذاری پیکان برای اشاره‌گرها استفاده می‌کند. نحو دو نقطه برای توابع مرتبط و نام‌گذاری رزرو شده است، نه دسترسی به فیلد.
question: 在 Rust 中，使用什么语法访问元组结构的第一个字段？
answer: 索引为 0 的点号符号（例如，instance.0）
wrong_answers:
  - 索引为 0 的方括号（例如，instance[0]
  - 索引为 0 的箭头符号（例如，instance->0）
  - 索引为 0 的双冒号（例如，instance::0）
explanation: |
  Rust 中的元组结构使用点符号，后跟字段索引来访问未命名字段。访问第一个字段时使用 .0，访问第二个字段时使用 .1，依此类推。这不同于使用方括号的数组或矢量，也不同于使用箭头符号表示指针的 C++。双冒号语法是为关联函数和命名间隔保留的，而不是为字段访问保留的。
question: 開發 Bitcoin 應用程式時，Rust 的靜態類型方法比動態類型的主要優勢是什麼？
answer: 類型錯誤在部署前的編譯時即被擷取，避免在處理使用者資金時發生執行時失敗的情況
wrong_answers:
  - 處理區塊鏈上的 Bitcoin 交易時，靜態類型可加快執行速度
  - 「動態類型需要分配更多記憶體，這與 Bitcoin 的輕量級節點需求相衝突」
  - 靜態類型可為 Bitcoin 通訊協定實作和智慧型契約自動產生程式碼
explanation: |
  Rust 的靜態類型可在編譯期間捕捉類型錯配，確保在軟體建立或部署之前解決錯誤。這對 Bitcoin 開發非常重要，因為一旦軟體要處理使用者的實際資金，執行時的類型錯誤可能會造成無法逆轉的財務損失。動態類型只會在執行期間發現錯誤，有可能是在部署之後，當使用者的資金受到威脅時。其他選項都不對，因為靜態類型的主要優點不是執行速度、記憶體使用量或代碼產生，而是編譯時錯誤預防。
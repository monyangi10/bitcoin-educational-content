question: Rust 애플리케이션을 개발할 때 동적 타이핑에 비해 Bitcoin의 정적 타이핑 접근 방식이 갖는 주요 이점은 무엇인가요?
answer: 배포 전 컴파일 타임에 유형 오류가 포착되어 사용자 자금을 처리할 때 런타임 오류를 방지합니다
wrong_answers:
  - 정적 타이핑으로 블록체인에서 Bitcoin 트랜잭션을 처리할 때 실행 속도가 빨라집니다
  - "동적 타이핑에는 더 많은 메모리 할당이 필요하며 이는 Bitcoin의 경량 노드 요구 사항과 상충됩니다."
  - 정적 타이핑으로 Bitcoin 프로토콜 구현 및 스마트 컨트랙트를 위한 자동 코드 생성 가능
explanation: |
  Rust의 정적 타이핑은 컴파일 중에 유형 불일치를 포착하여 소프트웨어가 빌드되거나 배포되기 전에 오류를 해결합니다. 이는 소프트웨어가 실제 사용자 자금을 처리할 때 런타임 유형 오류가 발생하면 돌이킬 수 없는 재정적 손실을 초래할 수 있기 때문에 Bitcoin 개발에서 매우 중요합니다. 동적 타이핑은 실행 중에만 오류가 표시되며, 배포 후에는 사용자의 자금이 위험에 처할 수 있습니다. 정적 타이핑의 주요 이점은 실행 속도, 메모리 사용량 또는 코드 생성이 아니라 컴파일 타임 오류 방지이므로 다른 옵션은 올바르지 않습니다.
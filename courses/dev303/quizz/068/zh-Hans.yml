question: 在开发 Bitcoin 应用程序时，Rust 的静态类型方法比动态类型方法的主要优势是什么？
answer: 在部署前的编译时捕获类型错误，防止在处理用户资金时出现运行时故障
wrong_answers:
  - 在处理区块链上的 Bitcoin 交易时，静态类型可加快执行速度
  - "动态类型需要分配更多内存，这与 Bitcoin 的轻量级节点要求相冲突"
  - 静态类型可为 Bitcoin 协议实现和智能合约自动生成代码
explanation: |
  Rust 的静态类型可在编译过程中捕捉类型错配，确保在软件构建或部署前解决错误。这对 Bitcoin 的开发至关重要，因为一旦软件要处理用户的实际资金，运行时的类型错误就可能造成不可挽回的经济损失。动态类型只能在执行过程中发现错误，有可能是在部署之后，当用户的资金面临风险时。其他选项都不正确，因为静态类型的主要优点不是执行速度、内存使用或代码生成，而是编译时错误预防。
question: ข้อได้เปรียบหลักของการใช้การกำหนดประเภทแบบคงที่ของ Rust เหนือการกำหนดประเภทแบบไดนามิกเมื่อพัฒนาแอปพลิเคชัน Bitcoin คืออะไร?
answer: ข้อผิดพลาดประเภทจะถูกจับได้ในเวลาคอมไพล์ก่อนการปรับใช้ ป้องกันความล้มเหลวในขณะรันไทม์เมื่อจัดการกับเงินของผู้ใช้
wrong_answers:
  - การพิมพ์แบบสแตติกช่วยให้ความเร็วในการประมวลผลธุรกรรม Bitcoin บนบล็อกเชนเร็วขึ้น
  - "การพิมพ์แบบไดนามิกต้องการการจัดสรรหน่วยความจำมากขึ้นซึ่งขัดแย้งกับข้อกำหนดของโหนดน้ำหนักเบาของ Bitcoin"
  - การพิมพ์แบบสแตติกช่วยให้สามารถสร้างโค้ดอัตโนมัติสำหรับการใช้งานโปรโตคอล Bitcoin และสัญญาอัจฉริยะ
explanation: |
  การพิมพ์แบบคงที่ของ Rust จะตรวจจับการไม่ตรงกันของประเภทระหว่างการคอมไพล์ เพื่อให้แน่ใจว่าข้อผิดพลาดจะได้รับการแก้ไขก่อนที่ซอฟต์แวร์จะถูกสร้างหรือปรับใช้ นี่เป็นสิ่งสำคัญสำหรับการพัฒนา Bitcoin เพราะเมื่อซอฟต์แวร์จัดการกับเงินของผู้ใช้จริง ข้อผิดพลาดประเภทที่เกิดขึ้นในขณะรันไทม์อาจทำให้เกิดการสูญเสียทางการเงินที่ไม่สามารถย้อนกลับได้ การพิมพ์แบบไดนามิกจะเปิดเผยข้อผิดพลาดในระหว่างการดำเนินการ ซึ่งอาจเกิดขึ้นหลังจากการปรับใช้เมื่อเงินของผู้ใช้ตกอยู่ในความเสี่ยง ตัวเลือกอื่น ๆ นั้นไม่ถูกต้องเพราะประโยชน์หลักของการพิมพ์แบบคงที่ไม่ใช่ความเร็วในการดำเนินการ การใช้หน่วยความจำ หรือการสร้างโค้ด แต่เป็นการป้องกันข้อผิดพลาดในขณะคอมไพล์
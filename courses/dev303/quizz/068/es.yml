question: ¿Cuál es la principal ventaja del enfoque de tipado estático de Rust sobre el tipado dinámico a la hora de desarrollar aplicaciones Bitcoin?
answer: Los errores tipográficos se detectan en tiempo de compilación antes de la implantación, lo que evita fallos en tiempo de ejecución al gestionar los fondos de los usuarios
wrong_answers:
  - La tipificación estática permite una mayor velocidad de ejecución al procesar transacciones Bitcoin en la blockchain
  - "La tipificación dinámica requiere más asignación de memoria, lo que entra en conflicto con los requisitos de nodo ligero de Bitcoin"
  - La tipificación estática permite la generación automática de código para las implementaciones del protocolo Bitcoin y los contratos inteligentes
explanation: |
  La tipificación estática de Rust detecta los desajustes de tipo durante la compilación, garantizando que los errores se resuelven antes de que el software pueda construirse o desplegarse. Esto es crucial para el desarrollo de Bitcoin porque una vez que el software maneja fondos reales de los usuarios, los errores de tipo en tiempo de ejecución podrían causar pérdidas financieras irreversibles. La tipificación dinámica solo revela los errores durante la ejecución, potencialmente después del despliegue, cuando el dinero de los usuarios está en riesgo. Las otras opciones son incorrectas porque el principal beneficio de la tipificación estática no es la velocidad de ejecución, el uso de memoria o la generación de código, sino la prevención de errores en tiempo de compilación.
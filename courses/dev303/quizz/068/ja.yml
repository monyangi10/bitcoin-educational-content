question: Bitcoinのアプリケーション開発において、動的型付けに対するRustの静的型付けの主な利点は何ですか？
answer: デプロイ前のコンパイル時に型エラーが検出されるため、ユーザー資金を処理する際のランタイムの失敗を防ぐことができる。
wrong_answers:
  - 静的型付けにより、ブロックチェーン上でBitcoinのトランザクションを処理する際の実行速度が速くなる。
  - "動的型付けは、Bitcoinの軽量ノード要件と相反する、より多くのメモリ割り当てを必要とする"
  - 静的型付けにより、Bitcoinプロトコルの実装とスマート・コントラクトの自動コード生成が可能
explanation: |
  Rustの静的型付けは、コンパイル時に型の不一致を検出し、ソフトウェアがビルドまたはデプロイされる前にエラーが解決されることを保証する。これはBitcoinの開発にとって極めて重要である。というのも、いったんソフトウェアが実際のユーザーの資金を扱うようになると、実行時の型エラーが取り返しのつかない金銭的損失を引き起こす可能性があるからだ。動的型付けは、実行中にエラーを明らかにするだけであり、ユーザーの資金が危険にさらされるデプロイメント後にエラーを明らかにする可能性がある。静的型付けの主な利点は、実行速度、メモリ使用量、コード生成ではなく、コンパイル時のエラー防止であるため、他の選択肢は正しくない。
question: مزیت اصلی رویکرد تایپ استاتیک Rust نسبت به تایپ داینامیک در هنگام توسعه برنامه‌های Bitcoin چیست؟
answer: خطاهای نوع در زمان کامپایل قبل از استقرار شناسایی می‌شوند و از خرابی‌های زمان اجرا هنگام مدیریت وجوه کاربران جلوگیری می‌کنند.
wrong_answers:
  - تایپ ایستا اجازه می‌دهد تا سرعت اجرای سریع‌تری هنگام پردازش تراکنش‌های Bitcoin در بلاکچین داشته باشیم.
  - "تایپ پویا نیاز به تخصیص حافظه بیشتری دارد که با الزامات نود سبک Bitcoin در تضاد است"
  - تایپ ایستا امکان تولید خودکار کد برای پیاده‌سازی‌های پروتکل Bitcoin و قراردادهای هوشمند را فراهم می‌کند.
explanation: |
  تایپ ایستای Rust ناسازگاری‌های نوع را در طول کامپایل شناسایی می‌کند و اطمینان حاصل می‌کند که خطاها قبل از ساخت یا استقرار نرم‌افزار برطرف می‌شوند. این برای توسعه Bitcoin حیاتی است زیرا زمانی که نرم‌افزار با وجوه واقعی کاربران سروکار دارد، خطاهای نوع در زمان اجرا می‌تواند باعث زیان‌های مالی غیرقابل جبران شود. تایپ پویا فقط خطاها را در طول اجرا آشکار می‌کند، که ممکن است پس از استقرار و زمانی که پول کاربران در خطر است، رخ دهد. گزینه‌های دیگر نادرست هستند زیرا مزیت اصلی تایپ ایستا سرعت اجرا، استفاده از حافظه یا تولید کد نیست، بلکه پیشگیری از خطا در زمان کامپایل است.
question: Rust प्रोग्राम में किस प्रकार की त्रुटि से पैनिक उत्पन्न होना चाहिए?
answer: ऐसी अपूरणीय त्रुटियाँ जो प्रोग्रामिंग लॉजिक त्रुटियों या असुरक्षित स्थितियों को दर्शाती हैं
wrong_answers:
  - बाह्य सेवाओं से नेटवर्क कनेक्शन विफलताएँ या टाइमआउट त्रुटियाँ
  - गलत उपयोगकर्ता इनपुट या कॉन्फ़िगरेशन फ़ाइलें अनुपलब्ध
  - फ़ाइल नहीं मिली त्रुटियाँ या अनुमति अस्वीकृत अपवाद
explanation: |
  पैनिक का उपयोग केवल उन अपूरणीय त्रुटियों के लिए किया जाना चाहिए जो प्रोग्रामिंग की गलतियों या ऐसी स्थितियों को दर्शाती हैं जहां प्रोग्राम असुरक्षित स्थिति में चला गया हो, जैसे कि ऐरे बाउंड्स का उल्लंघन या मेमोरी सुरक्षा संबंधी समस्याएं। गलत उत्तर सभी ऐसी त्रुटियों का वर्णन करते हैं जिन्हें ठीक किया जा सकता है - नेटवर्क विफलताएं, उपयोगकर्ता इनपुट समस्याएं और फ़ाइल सिस्टम समस्याएं ऐसी अपेक्षित स्थितियां हैं जिन्हें प्रोग्राम को क्रैश होने के बजाय रिजल्ट प्रकारों का उपयोग करके सुचारू रूप से संभालना चाहिए। ये ठीक होने योग्य त्रुटियां उचित त्रुटि प्रबंधन रणनीतियों को लागू करके प्रोग्राम को चलते रहने की अनुमति देती हैं।
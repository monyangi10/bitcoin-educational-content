question: Какъв тип грешка трябва да предизвика паника в програмите Rust?
answer: Невъзстановими грешки, които показват грешки в програмната логика или опасни състояния
wrong_answers:
  - Неуспешни мрежови връзки или грешки при изтичане на времето от външни услуги
  - Невалиден потребителски вход или липсващи конфигурационни файлове
  - Грешки, че не е намерен файл, или изключения с отказано разрешение
explanation: |
  Паниката трябва да бъде запазена за непоправими грешки, които представляват грешки в програмирането или ситуации, в които програмата е навлязла в опасно състояние, като например нарушения на границите на масива или проблеми с безопасността на паметта. Всички грешни отговори описват възстановими грешки - мрежови сривове, проблеми с потребителския вход и проблеми с файловата система са очаквани състояния, с които програмите трябва да се справят градивно, използвайки типове резултати, а не да се сриват. Тези възстановими грешки позволяват на програмите да продължат да работят чрез прилагане на подходящи стратегии за обработка на грешки.
question: ข้อผิดพลาดประเภทใดที่ควรกระตุ้นให้เกิดการตื่นตระหนกในโปรแกรม Rust?
answer: ข้อผิดพลาดที่ไม่สามารถกู้คืนได้ที่บ่งชี้ถึงข้อผิดพลาดทางตรรกะของการเขียนโปรแกรมหรือสถานะที่ไม่ปลอดภัย
wrong_answers:
  - ข้อผิดพลาดในการเชื่อมต่อเครือข่ายหรือหมดเวลาจากบริการภายนอก
  - อินพุตผู้ใช้ไม่ถูกต้องหรือไฟล์การกำหนดค่าหายไป
  - ข้อผิดพลาดไม่พบไฟล์หรือข้อยกเว้นการปฏิเสธการอนุญาต
explanation: |
  ความตื่นตระหนกควรถูกสงวนไว้สำหรับข้อผิดพลาดที่ไม่สามารถกู้คืนได้ซึ่งแสดงถึงข้อผิดพลาดในการเขียนโปรแกรมหรือสถานการณ์ที่โปรแกรมเข้าสู่สถานะที่ไม่ปลอดภัย เช่น การละเมิดขอบเขตของอาร์เรย์หรือปัญหาความปลอดภัยของหน่วยความจำ คำตอบที่ผิดทั้งหมดอธิบายถึงข้อผิดพลาดที่สามารถกู้คืนได้ - ความล้มเหลวของเครือข่าย ปัญหาการป้อนข้อมูลของผู้ใช้ และปัญหาระบบไฟล์เป็นเงื่อนไขที่คาดหวังที่โปรแกรมควรจัดการอย่างสง่างามโดยใช้ประเภทผลลัพธ์แทนที่จะหยุดทำงาน ข้อผิดพลาดที่สามารถกู้คืนได้เหล่านี้ช่วยให้โปรแกรมสามารถทำงานต่อไปได้โดยการใช้กลยุทธ์การจัดการข้อผิดพลาดที่เหมาะสม
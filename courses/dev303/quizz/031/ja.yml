question: Rustプログラムでは、どのようなエラーがパニックを引き起こすのでしょうか？
answer: プログラミング・ロジックのエラーや安全でない状態を示す回復不可能なエラー
wrong_answers:
  - 外部サービスからのネットワーク接続障害またはタイムアウトエラー
  - 無効なユーザー入力または設定ファイルが見つからない
  - ファイルが見つからないエラーまたはパーミッションが拒否された例外
explanation: |
  パニックは、プログラミングのミスや、配列の境界違反やメモリ安全性の問題など、プログラムが安全でない状態に陥ったことを示す回復不能なエラーにのみ適用されるべきです。ネットワーク障害、ユーザー入力の問題、ファイル・システムの問題は、プログラムがクラッシュするのではなく、Result型を使用して優雅に処理することが期待される状態です。これらの回復可能なエラーは、適切なエラー処理ストラテジーを実装することで、プログラムの実行を継続させます。
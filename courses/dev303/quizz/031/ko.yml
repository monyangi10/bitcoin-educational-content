question: Rust 프로그램에서 패닉을 유발하는 오류 유형은 무엇인가요?
answer: 프로그래밍 논리 오류 또는 안전하지 않은 상태를 나타내는 복구할 수 없는 오류
wrong_answers:
  - 외부 서비스의 네트워크 연결 실패 또는 시간 초과 오류
  - 잘못된 사용자 입력 또는 누락된 구성 파일
  - 파일을 찾을 수 없음 오류 또는 권한 거부 예외
explanation: |
  패닉은 프로그래밍 실수 또는 배열 범위 위반이나 메모리 안전 문제와 같이 프로그램이 안전하지 않은 상태로 진입한 상황을 나타내는 복구 불가능한 오류에 대해서만 사용해야 합니다. 네트워크 오류, 사용자 입력 문제, 파일 시스템 문제는 프로그램이 충돌이 아닌 결과 유형을 사용하여 정상적으로 처리해야 하는 예상되는 조건으로, 모두 복구 가능한 오류를 설명하는 오답입니다. 이러한 복구 가능한 오류는 적절한 오류 처리 전략을 구현하여 프로그램을 계속 실행할 수 있게 해줍니다.
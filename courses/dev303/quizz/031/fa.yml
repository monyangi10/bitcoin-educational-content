question: چه نوع خطایی باید باعث ایجاد وحشت در برنامه‌های Rust شود؟
answer: خطاهای غیرقابل بازیابی که نشان‌دهنده خطاهای منطقی برنامه‌نویسی یا وضعیت‌های ناامن هستند
wrong_answers:
  - قطع اتصال شبکه یا خطاهای زمان‌بندی از خدمات خارجی
  - ورودی نامعتبر کاربر یا فایل‌های پیکربندی مفقود
  - خطاهای فایل یافت نشد یا استثناهای عدم اجازه دسترسی
explanation: |
  وحشت‌ها باید برای خطاهای غیرقابل بازیابی که نشان‌دهنده اشتباهات برنامه‌نویسی یا شرایطی هستند که برنامه به یک وضعیت ناامن وارد شده است، مانند نقض مرزهای آرایه یا مشکلات ایمنی حافظه، محفوظ بمانند. پاسخ‌های نادرست همگی خطاهای قابل بازیابی را توصیف می‌کنند - شکست‌های شبکه، مشکلات ورودی کاربر و مسائل سیستم فایل شرایط مورد انتظاری هستند که برنامه‌ها باید با استفاده از انواع Result به‌جای کرش کردن به‌طور مؤثر مدیریت کنند. این خطاهای قابل بازیابی به برنامه‌ها اجازه می‌دهند با اجرای استراتژی‌های مناسب مدیریت خطا به کار خود ادامه دهند.
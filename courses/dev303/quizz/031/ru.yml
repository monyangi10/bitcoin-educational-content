question: Какой тип ошибки должен вызывать панику в программах Rust?
answer: Неустранимые ошибки, указывающие на логические ошибки программирования или небезопасные состояния
wrong_answers:
  - Сбои сетевого соединения или ошибки таймаута внешних служб
  - Неверный пользовательский ввод или отсутствие файлов конфигурации
  - Ошибки "Файл не найден" или исключения "Разрешение запрещено
explanation: |
  Паника должна быть зарезервирована для неустранимых ошибок, которые представляют собой ошибки программирования или ситуации, когда программа вошла в небезопасное состояние, например, нарушение границ массива или проблемы с безопасностью памяти. Все неправильные ответы описывают восстанавливаемые ошибки - сбои в сети, проблемы с пользовательским вводом и проблемы с файловой системой являются ожидаемыми условиями, которые программы должны обрабатывать изящно, используя типы Result, а не аварийно. Эти восстанавливаемые ошибки позволяют программам продолжать работу благодаря применению соответствующих стратегий обработки ошибок.
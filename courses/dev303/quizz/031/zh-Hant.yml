question: 在 Rust 程式中，哪種類型的錯誤應該會觸發恐慌？
answer: 無法復原的錯誤表示程式邏輯錯誤或不安全狀態
wrong_answers:
  - 來自外部服務的網路連線故障或超時錯誤
  - 使用者輸入無效或配置檔案遺失
  - 檔案未找到錯誤或權限被拒異常
explanation: |
  Panics 應該保留給無法復原的錯誤，這些錯誤代表程式設計錯誤或程式進入不安全狀態的情況，例如違反陣列邊界或記憶體安全問題。錯誤的答案都描述了可恢復的錯誤 - 網路故障、使用者輸入問題和檔案系統問題都是預期的狀況，程式應該使用結果類型從容處理，而不是當機。這些可恢復的錯誤可讓程式透過執行適當的錯誤處理策略繼續執行。
question: Какво позволява на LDK да поддържа различни транспортни механизми като TCP сокети, WebSocket и USB серийни връзки за комуникация с Lightning Network?
answer: Системата за управление на равнопоставени партньори работи независимо от основния транспортен механизъм, като обработва криптирането на шумовия протокол
wrong_answers:
  - Мениджърът на канали координира работата си с множество мрежови адаптери чрез унифициран слой за абстракция на сокети
  - LDK имплементира специфични за протокола драйвери за всеки тип транспорт в рамките на основния си мрежов модул
  - Системата за събития автоматично открива наличните методи за пренос и конфигурира подходящи обработчици на връзки
explanation: |
  Системата за управление на връстници на LDK е специално проектирана да обработва комуникацията по протокола Lightning (включително криптиране на шума и структури на съобщенията) независимо от действителния транспортен слой. Това архитектурно разделение позволява на разработчиците да реализират всеки двупосочен канал за комуникация, докато партньорският мениджър се фокусира единствено върху съответствието с протокола Lightning. Другите варианти неправилно внушават, че LDK осигурява вградени транспортни имплементации или автоматично откриване, докато в действителност силата на LDK се състои в това, че се абстрахира изцяло от конкретни транспортни механизми.
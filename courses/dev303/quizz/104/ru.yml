question: Что позволяет LDK поддерживать различные транспортные механизмы, такие как TCP-сокеты, WebSockets и последовательные соединения USB для связи Lightning Network?
answer: Система управления пирами работает независимо от базового транспортного механизма при шифровании протокола шума
wrong_answers:
  - Менеджер каналов координирует работу с несколькими сетевыми адаптерами через унифицированный уровень абстракции сокетов
  - LDK реализует драйверы, специфичные для каждого типа транспорта, в рамках своего основного сетевого модуля
  - Система событий автоматически определяет доступные методы транспортировки и настраивает соответствующие обработчики соединений
explanation: |
  Система управления пирами в LDK специально разработана для обработки взаимодействия по протоколу Lightning (включая шифрование и структуры сообщений) независимо от собственно транспортного уровня. Такое архитектурное разделение позволяет разработчикам реализовать любой двунаправленный канал связи, в то время как менеджер пиров сосредоточен исключительно на соответствии протоколу Lightning. Другие варианты неверно предполагают, что LDK предоставляет встроенные реализации транспорта или автоматическое обнаружение, в то время как на самом деле сила LDK заключается в полном абстрагировании от конкретных транспортных механизмов.
question: 是什麼讓 LDK 能夠支援各種傳輸機制，例如 TCP 套接字、WebSockets 和 USB 序列連接，以進行 Lightning Network 通訊？
answer: 對等管理系統獨立於底層傳輸機制運作，同時處理雜訊通訊協定加密
wrong_answers:
  - 通道管理器透過統一的套接字抽象層與多個網路介面卡協調
  - LDK 在其核心網路模組中為每種傳輸類型實作特定於通訊協定的驅動程式
  - 事件系統會自動偵測可用的傳輸方法，並設定適當的連線處理程式
explanation: |
  LDK的對等管理系統是專門設計來處理Lightning通訊協定（包括噪音加密和訊息結構），獨立於實際的傳輸層。這種架構上的分離允許開發人員實作任何雙向通訊通道，而對等管理器則只專注於 Lightning 協定的合規性。其他選項錯誤地暗示 LDK 提供內建的傳輸實作或自動偵測，而實際上 LDK 的優勢在於完全抽象出特定的傳輸機制。
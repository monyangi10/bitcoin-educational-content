question: LDK가 Lightning Network 통신을 위한 TCP 소켓, 웹 소켓, USB 직렬 연결과 같은 다양한 전송 메커니즘을 지원할 수 있는 이유는 무엇인가요?
answer: 피어 관리 시스템은 노이즈 프로토콜 암호화를 처리하면서 기본 전송 메커니즘과 독립적으로 작동합니다
wrong_answers:
  - 채널 관리자는 통합 소켓 추상화 계층을 통해 여러 네트워크 어댑터와 조정합니다
  - LDK는 핵심 네트워킹 모듈 내에서 각 전송 유형에 대한 프로토콜별 드라이버를 구현합니다
  - 이벤트 시스템은 사용 가능한 전송 방법을 자동으로 감지하고 적절한 연결 핸들러를 구성합니다
explanation: |
  LDK의 피어 관리 시스템은 실제 전송 계층과 독립적으로 라이트닝 프로토콜 통신(노이즈 암호화 및 메시지 구조 포함)을 처리하도록 특별히 설계되었습니다. 이러한 아키텍처 분리 덕분에 개발자는 모든 양방향 통신 채널을 구현할 수 있으며, 피어 관리자는 Lightning 프로토콜 준수에만 집중할 수 있습니다. 다른 옵션은 LDK가 내장된 전송 구현 또는 자동 감지를 제공한다고 잘못 알고 있는데, 실제로는 특정 전송 메커니즘을 완전히 추상화하는 것이 LDK의 강점입니다.
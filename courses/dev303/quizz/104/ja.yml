question: LDKがTCPソケット、ウェブソケット、Lightning Network通信のためのUSBシリアル接続といった多様なトランスポート・メカニズムをサポートできるのはなぜか？
answer: ピアマネジメントシステムは、ノイズプロトコルの暗号化を扱いながら、基盤となるトランスポートメカニズムから独立して動作する。
wrong_answers:
  - チャネル・マネージャは、統一されたソケット抽象化レイヤを通して複数のネットワーク・アダプタと連携する。
  - LDKは、そのコアネットワーキングモジュール内に、各トランスポートタイプのプロトコル専用ドライバを実装しています。
  - イベントシステムは、利用可能なトランスポートメソッドを自動的に検出し、適切な接続ハンドラを設定します。
explanation: |
  LDKのピアマネジメントシステムは、実際のトランスポートレイヤーから独立してLightningプロトコルの通信（ノイズ暗号化やメッセージ構造を含む）を処理するよう特別に設計されています。このアーキテクチャの分離により、開発者は任意の双方向通信チャネルを実装でき、ピアマネージャーはLightningプロトコルのコンプライアンスのみに集中できます。他の選択肢は、LDKが組み込みのトランスポート実装や自動検出を提供することを誤って示唆していますが、実際にはLDKの強みは特定のトランスポートメカニズムから完全に抽象化することにあります。
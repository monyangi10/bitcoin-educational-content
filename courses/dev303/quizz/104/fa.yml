question: چه چیزی به LDK امکان می‌دهد تا از مکانیزم‌های حمل و نقل متنوعی مانند سوکت‌های TCP، WebSockets و اتصالات سریال USB برای ارتباط Lightning Network پشتیبانی کند؟
answer: سیستم مدیریت همتا به طور مستقل از مکانیزم حمل و نقل زیرین عمل می‌کند در حالی که رمزگذاری پروتکل نویز را مدیریت می‌کند.
wrong_answers:
  - مدیر کانال از طریق یک لایه انتزاعی سوکت یکپارچه با چندین آداپتور شبکه هماهنگ می‌شود.
  - LDK پروتکل‌های خاص راننده را برای هر نوع انتقال در ماژول شبکه اصلی خود پیاده‌سازی می‌کند.
  - سیستم رویداد به‌طور خودکار روش‌های حمل‌ونقل موجود را شناسایی کرده و مدیریت‌کننده‌های اتصال مناسب را پیکربندی می‌کند.
explanation: |
  سیستم مدیریت همتای LDK به‌طور خاص برای مدیریت ارتباطات پروتکل لایتنینگ (شامل رمزنگاری نویز و ساختارهای پیام) به‌صورت مستقل از لایه حمل‌ونقل واقعی طراحی شده است. این جداسازی معماری به توسعه‌دهندگان اجازه می‌دهد تا هر کانال ارتباطی دوطرفه‌ای را پیاده‌سازی کنند، در حالی که مدیر همتا تنها بر رعایت پروتکل لایتنینگ تمرکز دارد. گزینه‌های دیگر به‌اشتباه پیشنهاد می‌دهند که LDK پیاده‌سازی‌های حمل‌ونقل داخلی یا تشخیص خودکار ارائه می‌دهد، در حالی که در واقعیت، قدرت LDK در انتزاع از مکانیزم‌های حمل‌ونقل خاص به‌طور کامل نهفته است.
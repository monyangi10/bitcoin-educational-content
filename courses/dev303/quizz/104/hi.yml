question: LDK को Lightning Network संचार के लिए TCP सॉकेट, वेबसॉकेट और USB सीरियल कनेक्शन जैसे विविध परिवहन तंत्रों का समर्थन करने में क्या सक्षम बनाता है?
answer: पीयर मैनेजमेंट सिस्टम नॉइज़ प्रोटोकॉल एन्क्रिप्शन को संभालते हुए अंतर्निहित परिवहन तंत्र से स्वतंत्र रूप से कार्य करता है।
wrong_answers:
  - चैनल मैनेजर एक एकीकृत सॉकेट एब्स्ट्रैक्शन लेयर के माध्यम से कई नेटवर्क एडेप्टर के साथ समन्वय करता है।
  - LDK अपने कोर नेटवर्किंग मॉड्यूल के भीतर प्रत्येक परिवहन प्रकार के लिए प्रोटोकॉल-विशिष्ट ड्राइवर लागू करता है।
  - इवेंट सिस्टम उपलब्ध परिवहन विधियों का स्वचालित रूप से पता लगाता है और उपयुक्त कनेक्शन हैंडलर को कॉन्फ़िगर करता है।
explanation: |
  LDK का पीयर मैनेजमेंट सिस्टम विशेष रूप से लाइटनिंग प्रोटोकॉल संचार (नॉइज़ एन्क्रिप्शन और मैसेज स्ट्रक्चर सहित) को वास्तविक ट्रांसपोर्ट लेयर से स्वतंत्र रूप से संभालने के लिए डिज़ाइन किया गया है। यह आर्किटेक्चरल अलगाव डेवलपर्स को किसी भी द्विदिश संचार चैनल को लागू करने की अनुमति देता है, जबकि पीयर मैनेजर पूरी तरह से लाइटनिंग प्रोटोकॉल के अनुपालन पर ध्यान केंद्रित करता है। अन्य विकल्प गलत तरीके से यह सुझाव देते हैं कि LDK अंतर्निहित ट्रांसपोर्ट कार्यान्वयन या स्वचालित पहचान प्रदान करता है, जबकि वास्तविकता में LDK की ताकत विशिष्ट ट्रांसपोर्ट तंत्रों से पूरी तरह से अलग होने में निहित है।
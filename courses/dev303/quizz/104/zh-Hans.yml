question: 是什么让 LDK 支持 TCP 套接字、WebSockets 和 USB 串行连接等多种传输机制来进行 Lightning Network 通信？
answer: 对等管理系统在处理噪音协议加密时独立于底层传输机制运行
wrong_answers:
  - 通道管理器通过统一的套接字抽象层与多个网络适配器进行协调
  - LDK 在其核心网络模块中为每种传输类型实现了特定于协议的驱动程序
  - 事件系统会自动检测可用的传输方法，并配置适当的连接处理程序
explanation: |
  LDK的对等管理系统专门用于处理Lightning协议通信（包括噪音加密和消息结构），与实际传输层无关。这种架构上的分离允许开发人员实现任何双向通信通道，而对等管理器只关注 Lightning 协议的合规性。其他选项错误地暗示 LDK 提供内置传输实现或自动检测，而实际上 LDK 的优势在于完全抽象出特定的传输机制。
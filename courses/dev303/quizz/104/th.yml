question: อะไรที่ทำให้ LDK สามารถรองรับกลไกการขนส่งที่หลากหลาย เช่น TCP sockets, WebSockets และการเชื่อมต่อ USB serial สำหรับการสื่อสาร Lightning Network?
answer: ระบบการจัดการเพื่อนทำงานอย่างอิสระจากกลไกการขนส่งพื้นฐานในขณะที่จัดการการเข้ารหัสโปรโตคอลเสียงรบกวน
wrong_answers:
  - ผู้จัดการช่องประสานงานกับอะแดปเตอร์เครือข่ายหลายตัวผ่านเลเยอร์นามธรรมซ็อกเก็ตแบบรวม
  - LDK ใช้ไดรเวอร์เฉพาะโปรโตคอลสำหรับแต่ละประเภทการขนส่งภายในโมดูลเครือข่ายหลักของมัน
  - ระบบเหตุการณ์ตรวจจับวิธีการขนส่งที่มีอยู่โดยอัตโนมัติและกำหนดค่าตัวจัดการการเชื่อมต่อที่เหมาะสม
explanation: |
  ระบบการจัดการเพื่อนของ LDK ได้รับการออกแบบมาโดยเฉพาะเพื่อจัดการการสื่อสารโปรโตคอล Lightning (รวมถึงการเข้ารหัส noise และโครงสร้างข้อความ) โดยแยกออกจากเลเยอร์การขนส่งจริง การแยกสถาปัตยกรรมนี้ช่วยให้นักพัฒนาสามารถใช้งานช่องทางการสื่อสารแบบสองทิศทางใด ๆ ในขณะที่ผู้จัดการเพื่อนมุ่งเน้นเฉพาะการปฏิบัติตามโปรโตคอล Lightning เท่านั้น ตัวเลือกอื่น ๆ แนะนำอย่างไม่ถูกต้องว่า LDK มีการใช้งานการขนส่งในตัวหรือการตรวจจับอัตโนมัติ ในความเป็นจริง ความแข็งแกร่งของ LDK อยู่ที่การแยกออกจากกลไกการขนส่งเฉพาะทั้งหมด
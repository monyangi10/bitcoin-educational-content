question: LDK（ライトニング・デベロップメント・キット）の基本的なアーキテクチャー上の制限は、ネットワーク料金の高騰時にモバイルwalletユーザーに最も深刻な運用リスクをもたらすのか？
answer: アンカー出力がないため、プリセット手数料が取引確認に不足する場合に、チャネルの強制閉鎖ができない。
wrong_answers:
  - LNURLのサポートがないため、すべてのLightningトランザクションで請求書の作成と支払い処理を手動で行う必要がある。
  - ネットワークグラフの同期が欠落しているため、モバイルアプリケーションが長時間経過した後に再起動すると、支払いルーティングに失敗する
  - チャネルリザーブの管理が不十分なため、ユーザーが表示された残高をすべて使用しようとすると、資金がロックされる。
explanation: |
  LDKにアンカー出力がないため、手数料の高騰時にチャネルを強制閉鎖できないという致命的な脆弱性が生じる。これは特にモバイルウォレットにとって危険で、ユーザーは協調的な閉鎖を行わずにアプリケーションを放棄する可能性があり、資金が無期限に滞留する可能性があります。LNURLの不在はユーザーエクスペリエンスに影響を与え、ルーティングの問題は信頼性に影響を与えますが、どちらも手数料が高い環境下でアンカー出力の制限がもたらす資金回収への本質的なリスクは生じません。
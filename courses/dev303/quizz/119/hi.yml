question: लाइटनिंग डेवलपमेंट किट (एलडीके) की कौन सी मूलभूत वास्तुशिल्पीय सीमा नेटवर्क शुल्क में अचानक वृद्धि के दौरान मोबाइल जीडब्ल्यू-0 उपयोगकर्ताओं के लिए सबसे गंभीर परिचालन जोखिम पैदा करती है?
answer: एंकर आउटपुट की अनुपस्थिति के कारण, पूर्व निर्धारित शुल्क लेनदेन की पुष्टि के लिए अपर्याप्त हो जाने पर चैनल को जबरन बंद करना संभव नहीं होता है।
wrong_answers:
  - LNURL सपोर्ट की कमी के कारण सभी लाइटनिंग लेनदेन के लिए मैन्युअल रूप से चालान तैयार करना और भुगतान प्रक्रिया करना आवश्यक हो जाता है।
  - नेटवर्क ग्राफ सिंक्रोनाइज़ेशन की कमी के कारण लंबे समय के बाद मोबाइल एप्लिकेशन के पुनः आरंभ होने पर भुगतान रूटिंग में विफलताएँ आती हैं।
  - चैनल रिजर्व प्रबंधन की अपर्याप्तता के कारण उपयोगकर्ताओं द्वारा अपनी पूरी प्रदर्शित शेष राशि खर्च करने का प्रयास करने पर धनराशि लॉक हो जाती है।
explanation: |
  LDK में एंकर आउटपुट की अनुपस्थिति एक गंभीर खामी पैदा करती है, जहाँ शुल्क में अचानक वृद्धि होने पर चैनलों को जबरन बंद नहीं किया जा सकता क्योंकि पूर्व निर्धारित शुल्क ब्लॉकचेन पुष्टिकरण के लिए अपर्याप्त हो जाते हैं। यह मोबाइल वॉलेट के लिए विशेष रूप से खतरनाक है, जहाँ उपयोगकर्ता सहयोगात्मक समापन के बिना एप्लिकेशन छोड़ सकते हैं, जिससे धनराशि अनिश्चित काल के लिए फंसी रह सकती है। हालाँकि LNURL की अनुपस्थिति उपयोगकर्ता अनुभव को प्रभावित करती है और रूटिंग संबंधी समस्याएँ विश्वसनीयता पर असर डालती हैं, लेकिन उच्च शुल्क वाले वातावरण में एंकर आउटपुट की सीमाओं से उत्पन्न होने वाला धनराशि पुनर्प्राप्ति का खतरा इन दोनों में से किसी से भी नहीं होता है।
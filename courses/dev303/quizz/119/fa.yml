question: محدودیت بنیادی معماری کیت توسعه لایتنینگ (LDK) که بیشترین ریسک عملیاتی را برای کاربران موبایل wallet در زمان افزایش ناگهانی هزینه‌های شبکه ایجاد می‌کند چیست؟
answer: عدم وجود خروجی‌های لنگر که مانع از بسته شدن کانال‌ها می‌شود زمانی که کارمزدهای از پیش تعیین‌شده برای تأیید تراکنش کافی نیستند.
wrong_answers:
  - عدم پشتیبانی از LNURL که نیاز به تولید دستی فاکتور و پردازش پرداخت برای تمامی تراکنش‌های Lightning دارد.
  - عدم همگام‌سازی نمودار شبکه باعث شکست در مسیریابی پرداخت‌ها می‌شود زمانی که برنامه‌های موبایل پس از دوره‌های طولانی مجدداً راه‌اندازی می‌شوند.
  - مدیریت ناکافی ذخیره کانال منجر به قفل شدن وجوه می‌شود زمانی که کاربران تلاش می‌کنند تا کل موجودی نمایش داده شده خود را خرج کنند.
explanation: |
  عدم وجود خروجی‌های لنگر در LDK یک آسیب‌پذیری بحرانی ایجاد می‌کند که در آن کانال‌ها نمی‌توانند در زمان افزایش هزینه‌ها به‌طور اجباری بسته شوند زیرا هزینه‌های از پیش تعیین‌شده برای تأیید در بلاک‌چین کافی نیستند. این موضوع به‌ویژه برای کیف‌پول‌های موبایل خطرناک است، جایی که کاربران ممکن است بدون بستن تعاونی برنامه را رها کنند و احتمالاً وجوه را به‌طور نامحدود معلق بگذارند. در حالی که عدم وجود LNURL بر تجربه کاربری تأثیر می‌گذارد و مشکلات مسیریابی بر قابلیت اطمینان تأثیر می‌گذارد، هیچ‌کدام خطر وجودی برای بازیابی وجوه که محدودیت‌های خروجی لنگر در محیط‌های با هزینه بالا ارائه می‌دهند، ایجاد نمی‌کنند.
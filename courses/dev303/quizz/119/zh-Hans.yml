question: 闪电开发工具包（LDK）的哪些基本架构限制会在网络费用激增时给移动 wallet 用户带来最严重的运营风险？
answer: 没有锚定输出，当预设费用不足以确认交易时，无法强制关闭通道
wrong_answers:
  - 缺乏对 LNURL 的支持，需要为所有 Lightning 交易手动生成发票和处理付款
  - 当移动应用程序长时间重启后，网络图同步缺失会导致支付路由失败
  - 渠道储备金管理不足，导致用户试图使用全部显示余额时资金被锁定
explanation: |
  LDK 中没有锚定输出，这就造成了一个关键漏洞，即在费用激增时无法强制关闭通道，因为预设费用不足以进行区块链确认。这对于移动钱包来说尤其危险，因为用户可能会在没有合作关闭的情况下放弃应用，从而可能无限期地滞留资金。虽然 LNURL 的缺失会影响用户体验，路由问题会影响可靠性，但两者都不会像高费用环境下的锚定输出限制那样给资金回收带来重大风险。
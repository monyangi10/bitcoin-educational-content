question: 네트워크 요금이 급증하는 동안 모바일 wallet 사용자에게 가장 심각한 운영 위험을 초래하는 LDK(Lightning 개발 키트)의 근본적인 구조적 한계는 무엇인가요?
answer: 사전 설정된 수수료가 거래 확인에 부족할 때 채널 강제 폐쇄를 방지하는 앵커 출력 부재
wrong_answers:
  - 모든 Lightning 거래에 대해 수동 인보이스 생성 및 결제 처리를 요구하는 LNURL 지원 부족
  - 네트워크 그래프 동기화 누락으로 인해 모바일 애플리케이션이 장시간 후 다시 시작될 때 결제 라우팅 실패 발생
  - 불충분한 채널 예약금 관리로 인해 사용자가 표시된 전체 잔액을 사용하려고 할 때 자금 잠금이 발생합니다
explanation: |
  LDK에 앵커 출력이 없으면 사전 설정된 수수료가 블록체인 확인에 충분하지 않아 수수료가 급등하는 동안 채널을 강제 종료할 수 없는 심각한 취약점이 발생합니다. 이는 특히 모바일 지갑의 경우 사용자가 협력적인 폐쇄 없이 애플리케이션을 포기할 수 있어 자금이 무기한 묶일 수 있는 위험성이 있습니다. LNURL 부재는 사용자 경험에 영향을 미치고 라우팅 문제는 안정성에 영향을 주지만, 고수수료 환경에서 발생하는 앵커 출력 제한과 같은 자금 회수에 대한 실존적 위험을 초래하지는 않습니다.
question: Какое фундаментальное архитектурное ограничение в Lightning Development Kit (LDK) создает наиболее серьезный операционный риск для пользователей мобильных wallet во время скачков платы за пользование сетью?
answer: Отсутствие якорных выходов, предотвращающих принудительное закрытие канала, когда установленной комиссии становится недостаточно для подтверждения транзакции
wrong_answers:
  - Отсутствие поддержки LNURL требует ручного формирования счетов и обработки платежей для всех транзакций Lightning
  - Отсутствие синхронизации сетевого графа приводит к сбоям в маршрутизации платежей при перезапуске мобильных приложений после длительных периодов работы
  - Недостаточное управление резервом канала, приводящее к блокировке средств, когда пользователи пытаются потратить весь отображаемый баланс
explanation: |
  Отсутствие якорных выходов в LDK создает критическую уязвимость, когда каналы не могут быть принудительно закрыты во время скачков комиссии, поскольку установленной комиссии становится недостаточно для подтверждения в блокчейне. Это особенно опасно для мобильных кошельков, где пользователи могут покинуть приложение без принудительного закрытия, потенциально оставляя средства на неопределенный срок. Хотя отсутствие LNURL влияет на пользовательский опыт, а проблемы с маршрутизацией - на надежность, ни то, ни другое не создает такого экзистенциального риска для возврата средств, как ограничения якорного вывода, возникающие в условиях высоких комиссий.
question: Кое фундаментално архитектурно ограничение на Lightning Development Kit (LDK) създава най-сериозния оперативен риск за потребителите на мобилни wallet по време на скоковете на мрежовите такси?
answer: Липса на анкерни изходи, които да предотвратяват принудителното затваряне на канала, когато предварително зададените такси станат недостатъчни за потвърждаване на транзакцията
wrong_answers:
  - Липса на поддръжка на LNURL, което налага ръчно генериране на фактури и обработка на плащания за всички транзакции Lightning
  - Липсваща синхронизация на мрежовия граф, която води до неуспехи при маршрутизирането на плащанията, когато мобилните приложения се рестартират след продължителни периоди
  - Недостатъчно управление на резервите на каналите, което води до блокиране на средства, когато потребителите се опитват да изразходват целия си показан баланс
explanation: |
  Липсата на анкерни изходи в LDK създава критична уязвимост, при която каналите не могат да бъдат принудително затворени по време на скокове на таксите, тъй като предварително зададените такси стават недостатъчни за потвърждаване на блокчейн. Това е особено опасно за мобилните портфейли, където потребителите могат да изоставят приложението без кооперативно затваряне, което потенциално може да доведе до блокиране на средства за неопределено време. Въпреки че липсата на LNURL влияе върху потребителското изживяване, а проблемите с маршрутизацията - върху надеждността, нито едно от двете не създава екзистенциален риск за възстановяването на средствата, какъвто представляват ограниченията на изхода на котвата по време на среда с високи такси.
question: Lightning Development Kit (LDK) 的哪個基本架構限制會在網路費用激增時為行動 wallet 使用者帶來最嚴重的作業風險？
answer: 當預設費用不足以進行交易確認時，缺乏錨點輸出可防止通道強制關閉
wrong_answers:
  - 缺乏 LNURL 支援，所有 Lightning 交易都需要手動產生發票和處理付款。
  - 當行動應用程式在長時間後重新啟動時，網路圖同步的缺失會導致支付路由失敗
  - 頻道儲備管理不足，當使用者嘗試花光全部顯示的餘額時，會導致資金凍結
explanation: |
  LDK 中缺乏錨點輸出造成了一個關鍵漏洞，在費用激增時通道無法被強制關閉，因為預設費用不足以進行區塊鏈確認。這對於行動錢包來說尤其危險，因為使用者可能會在沒有合作關閉的情況下放棄應用程式，導致資金無限期滯留。雖然 LNURL 的缺失會影響使用者體驗，路由問題也會影響可靠性，但兩者都不會造成高費用環境下錨點輸出限制所造成的資金回收風險。
question: ข้อจำกัดทางสถาปัตยกรรมพื้นฐานของ Lightning Development Kit (LDK) ที่สร้างความเสี่ยงในการดำเนินงานที่รุนแรงที่สุดสำหรับผู้ใช้ wallet บนมือถือในช่วงที่ค่าธรรมเนียมเครือข่ายพุ่งสูงขึ้นคืออะไร?
answer: การขาดแคลนเอาท์พุตของแองเคอร์ที่ป้องกันการปิดช่องทางบังคับเมื่อค่าธรรมเนียมที่ตั้งไว้ล่วงหน้าไม่เพียงพอสำหรับการยืนยันธุรกรรม
wrong_answers:
  - การขาดการสนับสนุน LNURL ที่ต้องสร้างใบแจ้งหนี้และดำเนินการชำระเงินด้วยตนเองสำหรับธุรกรรม Lightning ทั้งหมด
  - การขาดการซิงโครไนซ์กราฟเครือข่ายทำให้เกิดความล้มเหลวในการกำหนดเส้นทางการชำระเงินเมื่อแอปพลิเคชันมือถือเริ่มต้นใหม่หลังจากช่วงเวลานาน
  - การจัดการสำรองช่องทางที่ไม่เพียงพอทำให้เกิดการล็อคเงินเมื่อผู้ใช้พยายามใช้จ่ายยอดคงเหลือที่แสดงทั้งหมดของพวกเขา
explanation: |
  การขาด anchor outputs ใน LDK สร้างช่องโหว่ที่สำคัญที่ช่องทางไม่สามารถปิดแบบบังคับได้ในช่วงที่ค่าธรรมเนียมพุ่งสูงขึ้น เพราะค่าธรรมเนียมที่ตั้งไว้ล่วงหน้ากลายเป็นไม่เพียงพอสำหรับการยืนยันบนบล็อกเชน นี่เป็นอันตรายอย่างยิ่งสำหรับกระเป๋าเงินมือถือที่ผู้ใช้อาจละทิ้งแอปพลิเคชันโดยไม่ปิดแบบร่วมมือกัน ซึ่งอาจทำให้เงินติดค้างอย่างไม่มีกำหนด ในขณะที่การขาด LNURL ส่งผลกระทบต่อประสบการณ์ผู้ใช้และปัญหาการกำหนดเส้นทางส่งผลต่อความน่าเชื่อถือ แต่ไม่มีสิ่งใดสร้างความเสี่ยงต่อการกู้คืนเงินที่ anchor output limitations นำเสนอในสภาพแวดล้อมที่มีค่าธรรมเนียมสูง
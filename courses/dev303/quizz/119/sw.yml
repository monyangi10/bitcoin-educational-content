question: Ni kizuizi gani cha msingi cha usanifu wa Kifaa cha Lightning Development Kit (LDK) kinachosababisha hatari kubwa zaidi ya uendeshaji kwa watumiaji wa simu za mkononi wa wallet wakati wa ongezeko la ada ya mtandao?
answer: Kutokuwepo kwa matokeo ya nanga yanayozuia kufungwa kwa nguvu ya chaneli wakati ada za awali zinakuwa hazitoshi kwa uthibitisho wa muamala
wrong_answers:
  - Ukosefu wa usaidizi wa LNURL unaohitaji utengenezaji wa ankara kwa mikono na usindikaji wa malipo kwa miamala yote ya Lightning
  - Kukosekana kwa usawazishaji wa grafu ya mtandao na kusababisha hitilafu za uelekezaji wa malipo wakati programu za simu zinapoanza tena baada ya muda mrefu
  - Usimamizi duni wa akiba ya chaneli unaosababisha kufadhili kufungwa kwa akaunti wakati watumiaji wanapojaribu kutumia salio lao kamili lililoonyeshwa
explanation: |
  Kutokuwepo kwa matokeo ya nanga katika LDK husababisha udhaifu mkubwa ambapo njia haziwezi kufungwa kwa nguvu wakati wa ongezeko la ada kwa sababu ada zilizowekwa awali hazitoshi kwa uthibitisho wa blockchain. Hii ni hatari sana kwa wallet za simu ambapo watumiaji wanaweza kuacha programu bila kufungwa kwa ushirikiano, na hivyo kusababisha kukwama kwa fedha kwa muda usiojulikana. Ingawa kutokuwepo kwa LNURL huathiri uzoefu wa mtumiaji na masuala ya uelekezaji huathiri uaminifu, hakuna hata moja inayounda hatari ya kuwepo kwa fedha za urejeshaji ambayo mapungufu ya matokeo ya nanga yanapo wakati wa mazingira ya ada kubwa.

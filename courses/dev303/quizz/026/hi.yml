question: Rust एनम के प्रत्येक वेरिएंट के भीतर डेटा ले जाने में सक्षम होने का प्राथमिक लाभ क्या है?
answer: यह टाइप इंडिकेटर और संबंधित डेटा को एक साथ बंडल करके उनके बीच विसंगतियों को रोकता है।
wrong_answers:
  - यह एनम को स्पष्ट घोषणा के बिना सभी मानक गुणों को स्वचालित रूप से लागू करने की अनुमति देता है।
  - यह एनम को किसी भी फ़ंक्शन या विधि में जेनेरिक पैरामीटर के रूप में उपयोग करने में सक्षम बनाता है।
  - इससे एनम समान डेटा वाले पारंपरिक स्ट्रक्चर की तुलना में कम मेमोरी का उपयोग करते हैं।
explanation: |
  Rust एनम प्रत्येक वेरिएंट से सीधे डेटा संलग्न कर सकते हैं, जिससे टाइप इंडिकेटर और उनसे संबंधित डेटा के लिए अलग-अलग वेरिएबल बनाए रखने की आम प्रोग्रामिंग त्रुटि समाप्त हो जाती है। यह डिज़ाइन सुनिश्चित करता है कि डेटा हमेशा वेरिएंट से मेल खाता है, जिससे विसंगतियों को रोका जा सकता है जो रनटाइम त्रुटियों का कारण बन सकती हैं। अन्य भाषाओं के विपरीत, जहाँ टाइप के लिए अलग-अलग एनम और डेटा के लिए अलग-अलग वेरिएबल हो सकते हैं, Rust सब कुछ एक साथ बंडल करता है, जिससे टाइप और डेटा के बेमेल होने की संभावना नहीं रहती।
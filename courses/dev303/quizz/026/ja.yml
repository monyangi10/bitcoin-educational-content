question: Rust列挙型が各バリアント内でデータを持ち運べることの主な利点は何ですか？
answer: 型指標と関連データをひとまとめにすることで、型指標と関連データのミスマッチを防ぐ。
wrong_answers:
  - これにより、列挙型は、明示的な宣言なしに、すべての標準的な特性を自動的に実装することができます。
  - これにより、あらゆる関数やメソッドで、列挙型を汎用的なパラメータとして使用できるようになります。
  - これにより、列挙型は同様のデータを持つ従来の構造体よりも少ないメモリ消費で済む。
explanation: |
  Rustの列挙型は各バリアントに直接データをアタッチすることができ、型インジケータとそれに関連するデータのために別々の変数を維持するという一般的なプログラミングエラーを排除します。この設計は、データが常にバリアントと一致することを保証し、実行時エラーにつながる不整合を防ぎます。型のためのenumとデータのための変数を別々に持つような他の言語とは異なり、Rustはすべてを一緒に束ね、型とデータが不一致になることを不可能にします。
question: مزیت اصلی توانایی Rust enums در حمل داده در هر واریانت چیست؟
answer: این از عدم تطابق بین نشانگرهای نوع و داده‌های مرتبط با باندل کردن آنها با هم جلوگیری می‌کند
wrong_answers:
  - این امکان را فراهم می‌کند که enumها به‌طور خودکار تمام ویژگی‌های استاندارد را بدون اعلام صریح پیاده‌سازی کنند
  - این امکان را فراهم می‌کند که از شمارش‌ها به عنوان پارامترهای عمومی در هر تابع یا متدی استفاده شود.
  - این باعث می‌شود که enums نسبت به ساختارهای سنتی با داده‌های مشابه حافظه کمتری مصرف کنند.
explanation: |
  در Rust، شمارش‌ها می‌توانند داده‌ها را مستقیماً به هر واریانت متصل کنند، که این امر خطای رایج برنامه‌نویسی در نگهداری متغیرهای جداگانه برای نشانگرهای نوع و داده‌های مرتبط با آن‌ها را از بین می‌برد. این طراحی تضمین می‌کند که داده‌ها همیشه با واریانت مطابقت دارند و از ناسازگاری‌هایی که می‌تواند منجر به خطاهای زمان اجرا شود، جلوگیری می‌کند. برخلاف زبان‌های دیگر که ممکن است شمارش جداگانه‌ای برای نوع و متغیرهایی برای داده‌ها داشته باشید، Rust همه چیز را با هم ترکیب می‌کند و امکان عدم تطابق نوع و داده را از بین می‌برد.
question: Qual é a principal vantagem do facto de os enums Rust poderem transportar dados dentro de cada variante?
answer: Evita incompatibilidades entre os indicadores de tipo e os dados associados, agrupando-os
wrong_answers:
  - Permite que os enums implementem automaticamente todas as caraterísticas padrão sem declaração explícita
  - Permite que os enums sejam utilizados como parâmetros genéricos em qualquer função ou método
  - Faz com que os enums consumam menos memória do que as estruturas tradicionais com dados semelhantes
explanation: |
  Os enums Rust podem anexar dados diretamente a cada variante, o que elimina o erro de programação comum de manter variáveis separadas para indicadores de tipo e os respectivos dados associados. Esta conceção garante que os dados correspondem sempre à variante, evitando inconsistências que poderiam levar a erros de tempo de execução. Ao contrário de outras linguagens em que pode haver um enum separado para o tipo e variáveis para os dados, o Rust agrupa tudo, tornando impossível que o tipo e os dados não correspondam.
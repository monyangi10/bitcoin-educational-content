question: 각 변형 내에서 데이터를 전달할 수 있는 Rust 열거형의 주요 장점은 무엇인가요?
answer: 유형 지표와 관련 데이터를 함께 묶어 유형 지표와 관련 데이터 간의 불일치를 방지합니다
wrong_answers:
  - 열거형은 명시적인 선언 없이 모든 표준 특성을 자동으로 구현할 수 있습니다
  - 열거형을 모든 함수나 메서드에서 일반 매개 변수로 사용할 수 있습니다
  - 열거형은 비슷한 데이터를 가진 기존 구조보다 메모리를 덜 소비합니다
explanation: |
  Rust 열거형은 각 변형에 직접 데이터를 첨부할 수 있으므로 유형 표시기와 관련 데이터에 대해 별도의 변수를 유지해야 하는 일반적인 프로그래밍 오류를 제거합니다. 이러한 설계는 데이터가 항상 변형과 일치하도록 보장하여 런타임 오류로 이어질 수 있는 불일치를 방지합니다. 유형에 대한 열거형과 데이터에 대한 변수가 따로 있는 다른 언어와 달리 Rust은 모든 것을 함께 묶어 유형과 데이터가 불일치하는 것을 불가능하게 합니다.
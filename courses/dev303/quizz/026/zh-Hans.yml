question: Rust 枚举能够在每个变体中携带数据的主要优势是什么？
answer: 它通过将类型指标和相关数据捆绑在一起，防止了类型指标和相关数据之间的不匹配
wrong_answers:
  - 它允许枚举自动实现所有标准特质，而无需明确声明
  - 它使枚举可以在任何函数或方法中作为通用参数使用
  - 与数据类似的传统结构相比，枚举占用的内存更少
explanation: |
  Rust 枚举可以将数据直接附加到每个变量，从而避免了为类型指示符及其相关数据维护单独变量的常见编程错误。这种设计确保了数据始终与变量相匹配，从而避免了可能导致运行时错误的不一致性。与其他语言不同的是，Rust 将所有内容捆绑在一起，这样就不会出现类型和数据不匹配的情况。
question: ข้อได้เปรียบหลักของ Rust enums ที่สามารถบรรทุกข้อมูลภายในแต่ละตัวแปรคืออะไร?
answer: มันป้องกันความไม่ตรงกันระหว่างตัวบ่งชี้ประเภทและข้อมูลที่เกี่ยวข้องโดยการรวมเข้าด้วยกัน
wrong_answers:
  - ช่วยให้ enums สามารถใช้งานคุณลักษณะมาตรฐานทั้งหมดได้โดยอัตโนมัติโดยไม่ต้องประกาศอย่างชัดเจน
  - มันช่วยให้ enums ถูกใช้เป็นพารามิเตอร์ทั่วไปในฟังก์ชันหรือเมธอดใด ๆ
  - มันทำให้ enums ใช้หน่วยความจำน้อยกว่าสโครงสร้างแบบดั้งเดิมที่มีข้อมูลคล้ายกัน
explanation: |
  Rust enums สามารถแนบข้อมูลโดยตรงกับแต่ละตัวแปร ซึ่งช่วยขจัดข้อผิดพลาดในการเขียนโปรแกรมทั่วไปที่ต้องรักษาตัวแปรแยกต่างหากสำหรับตัวบ่งชี้ประเภทและข้อมูลที่เกี่ยวข้อง การออกแบบนี้ทำให้มั่นใจได้ว่าข้อมูลจะตรงกับตัวแปรเสมอ ป้องกันความไม่สอดคล้องกันที่อาจนำไปสู่ข้อผิดพลาดในขณะรันไทม์ ไม่เหมือนกับภาษาอื่น ๆ ที่คุณอาจมี enum แยกต่างหากสำหรับประเภทและตัวแปรสำหรับข้อมูล Rust รวมทุกอย่างเข้าด้วยกัน ทำให้เป็นไปไม่ได้ที่ประเภทและข้อมูลจะไม่ตรงกัน
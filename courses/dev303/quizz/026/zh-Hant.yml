question: Rust 枚舉能夠在每個變體中攜帶資料的主要優勢是什麼？
answer: 它可將類型指標和相關資料捆綁在一起，防止類型指標和相關資料不匹配
wrong_answers:
  - 它允許枚舉自動實作所有標準特徵，而無需明確宣告
  - 它使枚舉能夠在任何函數或方法中作為一般參數使用
  - 它使枚举比具有类似数据的传统结构消耗更少的内存
explanation: |
  Rust 枚舉能夠直接將資料附加到每個變體，這消除了為類型指標及其相關資料維護獨立變數的常見程式錯誤。此設計可確保資料永遠與變體相符，避免可能導致執行時錯誤的不一致。不像其他語言，您可能會為類型設定獨立的枚數，並為資料設定變數，Rust 將所有東西都綑綁在一起，讓類型和資料不可能不匹配。
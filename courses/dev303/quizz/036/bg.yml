question: Какво прави Rust по време на процеса на развързване, когато настъпи паника?
answer: Връща се назад през стека на повикванията, за да предостави подробно проследяване на стека
wrong_answers:
  - Незабавно прекратяване на програмата без почистване или информация
  - Преобразува паниката в тип резултат, който може да бъде възстановен, за обработка на грешки
  - Рестартира изпълнението на текущата функция отначало
explanation: |
  Когато в Rust възникне паника, процесът на размотаване преминава обратно през стека на повикванията, за да предостави подробно проследяване на стека, показващо къде точно е възникнала паниката. Това помага на разработчиците да идентифицират източника на проблема по време на отстраняване на грешки. Другите варианти са некоректни: Rust не се прекратява незабавно без почистване (това се случва само когато размотаването е деактивирано), паниката не може да се преобразува в типове Резултат, тъй като представлява невъзстановима грешка, и Rust не рестартира изпълнението на функцията при възникване на паника.
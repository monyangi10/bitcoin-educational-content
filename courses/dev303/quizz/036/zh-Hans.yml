question: 当发生恐慌时，Rust 在平仓过程中会做什么？
answer: 回溯调用堆栈，提供详细的堆栈跟踪
wrong_answers:
  - 立即终止程序，不做任何清理或提供任何信息
  - 将恐慌转换为可恢复的结果类型，以便处理错误
  - 从头开始重启当前函数的执行
explanation: |
  当 Rust 发生恐慌时，解卷过程会回溯调用堆栈，提供详细的堆栈跟踪，准确显示恐慌发生的位置。这有助于开发人员在调试过程中找出问题的根源。其他选项都是错误的：Rust 不会在没有清理的情况下立即终止（只有在解除绑定时才会发生），恐慌不能转换为结果类型，因为它们代表了不可恢复的错误，而且 Rust 不会在恐慌发生时重新启动函数的执行。
question: पैनिक की स्थिति उत्पन्न होने पर अनवाइंडिंग प्रक्रिया के दौरान Rust क्या करता है?
answer: कॉल स्टैक के माध्यम से पीछे जाकर विस्तृत स्टैक ट्रेस प्रदान करता है।
wrong_answers:
  - बिना किसी सफाई या सूचना के प्रोग्राम को तुरंत समाप्त कर देता है।
  - पैनिक को त्रुटि प्रबंधन के लिए रिकवर करने योग्य रिजल्ट प्रकार में परिवर्तित करता है
  - वर्तमान फ़ंक्शन का निष्पादन प्रारंभ से पुनः शुरू करता है
explanation: |
  जब Rust में कोई पैनिक उत्पन्न होता है, तो अनवाइंडिंग प्रक्रिया कॉल स्टैक में पीछे की ओर जाकर एक विस्तृत स्टैक ट्रेस प्रदान करती है जिससे पैनिक की सटीक स्थिति का पता चलता है। इससे डेवलपर्स को डीबगिंग के दौरान समस्या के स्रोत की पहचान करने में मदद मिलती है। अन्य विकल्प गलत हैं: Rust बिना क्लीनअप के तुरंत समाप्त नहीं होता (यह केवल तभी होता है जब अनवाइंडिंग अक्षम हो), पैनिक को रिजल्ट प्रकारों में परिवर्तित नहीं किया जा सकता क्योंकि वे अपूरणीय त्रुटियों का प्रतिनिधित्व करते हैं, और पैनिक होने पर Rust फ़ंक्शन निष्पादन को पुनः आरंभ नहीं करता है।
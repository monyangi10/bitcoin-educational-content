question: Rust در طول فرآیند باز کردن زمانی که یک وحشت رخ می‌دهد چه کاری انجام می‌دهد؟
answer: از طریق پشته تماس به عقب برمی‌گردد تا یک ردیابی پشته دقیق ارائه دهد
wrong_answers:
  - بلافاصله برنامه را بدون هیچ‌گونه پاکسازی یا اطلاعاتی خاتمه می‌دهد
  - وحشت را به یک نوع نتیجه قابل بازیابی برای مدیریت خطا تبدیل می‌کند.
  - اجرای تابع جاری را از ابتدا مجدداً شروع می‌کند
explanation: |
  وقتی یک وحشت در Rust رخ می‌دهد، فرآیند بازگشت از طریق پشته فراخوانی به عقب می‌رود تا یک ردیابی پشته دقیق ارائه دهد که دقیقاً نشان می‌دهد وحشت کجا رخ داده است. این به توسعه‌دهندگان کمک می‌کند تا منبع مشکل را در حین اشکال‌زدایی شناسایی کنند. گزینه‌های دیگر نادرست هستند: Rust بلافاصله بدون پاکسازی خاتمه نمی‌یابد (این فقط زمانی اتفاق می‌افتد که بازگشت غیرفعال باشد)، وحشت‌ها نمی‌توانند به انواع Result تبدیل شوند زیرا آنها نشان‌دهنده خطاهای غیرقابل بازیابی هستند، و Rust اجرای تابع را زمانی که وحشت رخ می‌دهد، دوباره شروع نمی‌کند.
question: What does Rust do during the unwinding process when a panic occurs?
answer: Walks back through the call stack to provide a detailed stack trace
wrong_answers:
  - Immediately terminates the program without any cleanup or information
  - Converts the panic into a recoverable Result type for error handling
  - Restarts the current function execution from the beginning
explanation: |
  When a panic occurs in Rust, the unwinding process walks back through the call stack to provide a detailed stack trace showing exactly where the panic occurred. This helps developers identify the source of the problem during debugging. The other options are incorrect: Rust doesn't immediately terminate without cleanup (that only happens when unwinding is disabled), panics cannot be converted to Result types as they represent unrecoverable errors, and Rust doesn't restart function execution when panics occur.

question: 패닉이 발생했을 때 Rust은 긴장을 푸는 과정에서 어떤 역할을 하나요?
answer: 호출 스택을 거슬러 올라가 자세한 스택 추적을 제공합니다
wrong_answers:
  - 정리 또는 정보 없이 프로그램을 즉시 종료합니다
  - 오류 처리를 위해 패닉을 복구 가능한 결과 유형으로 변환합니다
  - 현재 함수 실행을 처음부터 다시 시작합니다
explanation: |
  Rust에서 패닉이 발생하면 언와인딩 프로세스는 호출 스택을 거슬러 올라가 패닉이 발생한 위치를 정확히 보여주는 상세한 스택 추적을 제공합니다. 이를 통해 개발자는 디버깅 중에 문제의 원인을 파악할 수 있습니다. 다른 옵션은 올바르지 않습니다. Rust은 정리 없이 즉시 종료되지 않으며(언와인딩이 비활성화된 경우에만 발생), 패닉은 복구 불가능한 오류를 나타내므로 결과 유형으로 변환할 수 없으며, 패닉 발생 시 함수 실행을 다시 시작하지 않습니다.
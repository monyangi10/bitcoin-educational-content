question: Rust ทำอะไรระหว่างกระบวนการคลี่คลายเมื่อเกิดความตื่นตระหนก?
answer: เดินย้อนกลับผ่านสแตกของการเรียกเพื่อให้รายละเอียดของสแตกเทรซ
wrong_answers:
  - ยุติโปรแกรมทันทีโดยไม่มีการทำความสะอาดหรือข้อมูลใด ๆ
  - แปลงความตื่นตระหนกเป็นประเภทผลลัพธ์ที่กู้คืนได้สำหรับการจัดการข้อผิดพลาด
  - เริ่มการทำงานของฟังก์ชันปัจจุบันใหม่ตั้งแต่ต้น
explanation: |
  เมื่อเกิด panic ใน Rust กระบวนการ unwinding จะย้อนกลับผ่าน call stack เพื่อให้รายละเอียด stack trace ที่แสดงให้เห็นอย่างชัดเจนว่า panic เกิดขึ้นที่ใด ซึ่งช่วยให้นักพัฒนาระบุแหล่งที่มาของปัญหาในระหว่างการดีบัก ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: Rust จะไม่ยุติทันทีโดยไม่มีการทำความสะอาด (ซึ่งจะเกิดขึ้นเมื่อปิดใช้งานการ unwinding เท่านั้น), panic ไม่สามารถแปลงเป็นประเภท Result ได้เนื่องจากเป็นข้อผิดพลาดที่ไม่สามารถกู้คืนได้, และ Rust จะไม่เริ่มการทำงานของฟังก์ชันใหม่เมื่อเกิด panic ขึ้น
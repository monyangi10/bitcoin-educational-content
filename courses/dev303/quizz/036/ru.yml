question: Что делает Rust в процессе раскручивания, когда возникает паника?
answer: Проходит назад по стеку вызовов, чтобы получить подробную трассировку стека
wrong_answers:
  - Немедленное завершение программы без какой-либо очистки или информации
  - Преобразует панику в восстанавливаемый тип Result для обработки ошибок
  - Перезапускает выполнение текущей функции с самого начала
explanation: |
  Когда в Rust возникает паника, процесс разворачивания проходит назад по стеку вызовов и предоставляет подробную трассировку стека, показывающую, где именно возникла паника. Это помогает разработчикам определить источник проблемы во время отладки. Другие варианты неверны: Rust не завершает работу сразу без очистки (это происходит только при отключенной размотке), паники нельзя преобразовывать в типы Result, поскольку они представляют собой неустранимые ошибки, и Rust не перезапускает выполнение функции при возникновении паники.
question: パニックが発生したとき、Rustは巻き戻しの過程で何をするのか？
answer: コールスタックをウォークバックし、詳細なスタックトレースを提供する。
wrong_answers:
  - クリーンアップや情報なしにプログラムを直ちに終了する。
  - エラー処理のために、パニックを回復可能な結果型に変換する。
  - 現在の関数の実行を最初からやり直す
explanation: |
  Rustでパニックが発生すると、アンワインドプロセスはコールスタックを遡り、パニックが発生した場所を正確に示す詳細なスタックトレースを提供する。これは、開発者がデバッグ中に問題の原因を特定するのに役立ちます。Rustはクリーンアップなしで即座に終了せず（これは巻き戻しが無効な場合にのみ起こる）、パニックは回復不可能なエラーを表すので結果型に変換できず、Rustはパニックが発生しても関数の実行を再開しない。
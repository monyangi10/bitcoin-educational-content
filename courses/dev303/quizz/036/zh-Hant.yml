question: 發生恐慌時，Rust 在解除過程中會做什麼？
answer: 回溯呼叫堆疊，提供詳細的堆疊追蹤
wrong_answers:
  - 立即終止程式，不進行任何清理或提供任何資訊
  - 將恐慌轉換成可復原的結果類型，以進行錯誤處理
  - 從頭重新開始執行目前的函式
explanation: |
  當 Rust 發生恐慌時，unwinding 程序會回溯至呼叫堆疊，以提供詳細的堆疊追蹤，準確顯示恐慌發生的位置。這有助於開發人員在除錯時找出問題的來源。其他選項是不正確的：Rust 不會在沒有清理的情況下立即終止（只有在關閉 unwinding 時才會發生），panic 不能轉換成結果類型，因為它們代表無法復原的錯誤，而且 Rust 在發生 panic 時不會重新啟動函式的執行。
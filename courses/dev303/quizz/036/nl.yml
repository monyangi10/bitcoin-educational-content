question: Wat doet Rust tijdens het afwikkelingsproces wanneer er paniek optreedt?
answer: Loopt terug door de aanroepstapel om een gedetailleerde stacktrace te geven
wrong_answers:
  - Beëindigt het programma onmiddellijk zonder opruiming of informatie
  - Converteert de panic in een herstelbaar resultaattype voor foutafhandeling
  - Herstart de huidige functie-uitvoering vanaf het begin
explanation: |
  Wanneer er een panic optreedt in Rust, loopt het afwikkelproces terug door de aanroepstack om een gedetailleerde stacktrace te geven die precies laat zien waar de panic optrad. Dit helpt ontwikkelaars om de bron van het probleem te identificeren tijdens het debuggen. De andere opties zijn onjuist: Rust eindigt niet onmiddellijk zonder op te ruimen (dat gebeurt alleen als afwikkelen is uitgeschakeld), paniek kan niet worden geconverteerd naar Resultaat-types, omdat het onherstelbare fouten zijn, en Rust herstart de functie-uitvoering niet wanneer paniek optreedt.
question: هنگام نصب Rust با استفاده از Rustup، باید به ملاحظات امنیتی توجه کنید.
answer: نصب شامل دانلود و اجرای یک اسکریپت است، اگرچه از HTTPS استفاده می‌کند و از منابع رسمی و معتبر می‌آید.
wrong_answers:
  - نصب به مجوزهای مدیر نیاز دارد که می‌تواند آسیب‌پذیری‌های احتمالی سیستم را ایجاد کند.
  - زنجیره ابزار پایدار شامل ویژگی‌های آزمایشی است که ممکن است دارای نقص‌های امنیتی کشف‌نشده باشند.
  - فرآیند نصب به‌طور خودکار تمامی اهداف کامپایل، از جمله معماری‌های بالقوه ناامن را فعال می‌کند.
explanation: |
  هنگام نصب Rustup، شما یک اسکریپت را از وب‌سایت رسمی Rust دانلود و اجرا می‌کنید. این کار از HTTPS برای امنیت لایه انتقال استفاده می‌کند و بسته‌ها از منابع معتبری مانند crates.io می‌آیند. در حالی که این برای اکثر موارد استفاده امن است، برخی سازمان‌ها با سیاست‌های امنیتی سخت‌گیرانه ممکن است مدیر بسته توزیع خود را ترجیح دهند که زیرساخت امضای خاص توزیع را اضافه می‌کند. گزینه‌های دیگر نادرست هستند: Rustup در دایرکتوری خانگی کاربر نصب می‌شود بدون نیاز به مجوزهای مدیر، زنجیره ابزار پایدار به‌طور خاص ویژگی‌های آزمایشی را شامل نمی‌شود، و اهداف کامپایل به‌طور جداگانه اضافه می‌شوند و خطرات امنیتی ذاتی ندارند.
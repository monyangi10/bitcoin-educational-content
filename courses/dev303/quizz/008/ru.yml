question: На какие соображения безопасности следует обратить внимание при установке Rust с помощью Rustup?
answer: Установка включает в себя загрузку и выполнение скрипта, хотя он использует HTTPS и поступает из официальных надежных источников
wrong_answers:
  - Для установки требуются привилегии администратора, что создает потенциальные уязвимости системы
  - Стабильный набор инструментов содержит экспериментальные функции, которые могут иметь необнаруженные недостатки безопасности
  - В процессе установки автоматически включаются все цели компиляции, включая потенциально опасные архитектуры
explanation: |
  При установке Rustup вы загружаете и выполняете скрипт с официального сайта Rust. При этом используется HTTPS для обеспечения безопасности на транспортном уровне, а пакеты поступают из надежных источников, таких как crates.io. Хотя это безопасно для большинства случаев использования, некоторые организации со строгой политикой безопасности могут предпочесть менеджер пакетов своего дистрибутива, который добавляет собственную инфраструктуру подписи дистрибутива. Остальные варианты неверны: Rustup устанавливается в домашний каталог пользователя, не требуя привилегий администратора, стабильный набор инструментов специально исключает экспериментальные функции, а цели компиляции добавляются отдельно и не несут в себе рисков безопасности.
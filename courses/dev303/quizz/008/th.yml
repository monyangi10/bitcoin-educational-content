question: ข้อควรพิจารณาด้านความปลอดภัยที่คุณควรทราบเมื่อทำการติดตั้ง Rust โดยใช้ Rustup คืออะไร?
answer: การติดตั้งเกี่ยวข้องกับการดาวน์โหลดและเรียกใช้สคริปต์ แม้ว่าจะใช้ HTTPS และมาจากแหล่งที่เชื่อถือได้อย่างเป็นทางการ
wrong_answers:
  - การติดตั้งต้องการสิทธิ์ของผู้ดูแลระบบซึ่งอาจสร้างช่องโหว่ในระบบ
  - เครื่องมือที่เสถียรประกอบด้วยคุณสมบัติทดลองที่อาจมีข้อบกพร่องด้านความปลอดภัยที่ยังไม่ถูกค้นพบ
  - กระบวนการติดตั้งจะเปิดใช้งานเป้าหมายการคอมไพล์ทั้งหมดโดยอัตโนมัติรวมถึงสถาปัตยกรรมที่อาจไม่ปลอดภัย
explanation: |
  เมื่อทำการติดตั้ง Rustup คุณจะดาวน์โหลดและเรียกใช้สคริปต์จากเว็บไซต์ทางการ Rust ซึ่งใช้ HTTPS สำหรับความปลอดภัยในระดับการขนส่ง และแพ็กเกจมาจากแหล่งที่เชื่อถือได้เช่น crates.io แม้ว่านี่จะปลอดภัยสำหรับการใช้งานส่วนใหญ่ แต่บางองค์กรที่มีนโยบายความปลอดภัยที่เข้มงวดอาจต้องการใช้ตัวจัดการแพ็กเกจของการแจกจ่ายของพวกเขาเอง ซึ่งเพิ่มโครงสร้างพื้นฐานการลงนามของการแจกจ่ายเอง ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง: Rustup ติดตั้งในไดเรกทอรีของผู้ใช้โดยไม่ต้องใช้สิทธิ์ผู้ดูแลระบบ เครื่องมือเวอร์ชันเสถียรจะไม่รวมคุณสมบัติทดลอง และเป้าหมายการคอมไพล์จะถูกเพิ่มแยกต่างหากและไม่ก่อให้เกิดความเสี่ยงด้านความปลอดภัยโดยธรรมชาติ
question: 使用 Rustup 安裝 Rust 時，您應該注意哪些安全考量？
answer: 安裝涉及下載和執行腳本，雖然它使用 HTTPS 且來自官方可信來源
wrong_answers:
  - 安裝需要管理員權限，會產生潛在的系統漏洞
  - 穩定工具鏈包含實驗性功能，可能有未發現的安全漏洞
  - 安裝程序會自動啟用所有編譯目標，包括可能不安全的架構
explanation: |
  安裝 Rustup 時，您會從 Rust 官方網站下載並執行腳本。這會使用 HTTPS 來提供傳輸層的安全性，而套件則來自可信的來源，例如 crates.io。雖然這對大多數用戶而言是安全的，但一些有嚴格安全政策的組織可能會偏好他們的發行版套件管理器，因為套件管理器會加入發行版本身的簽章基礎架構。其他選項都是不正確的：Rustup 會安裝在使用者的主目錄中，不需要 admin 權限；穩定的工具鏈特別排除實驗性的功能；編譯目標是另外新增的，並不構成內在的安全風險。
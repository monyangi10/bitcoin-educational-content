question: Rustup का उपयोग करके Rust इंस्टॉल करते समय आपको किन सुरक्षा संबंधी बातों का ध्यान रखना चाहिए?
answer: इस प्रक्रिया में एक स्क्रिप्ट डाउनलोड और निष्पादित करना शामिल है, हालांकि यह HTTPS का उपयोग करती है और आधिकारिक विश्वसनीय स्रोतों से आती है।
wrong_answers:
  - इस इंस्टॉलेशन के लिए एडमिनिस्ट्रेटर विशेषाधिकारों की आवश्यकता होती है, जिससे सिस्टम में संभावित कमजोरियां उत्पन्न हो सकती हैं।
  - स्थिर टूलचेन में प्रायोगिक सुविधाएँ शामिल हैं जिनमें अज्ञात सुरक्षा खामियाँ हो सकती हैं।
  - स्थापना प्रक्रिया संभावित रूप से असुरक्षित आर्किटेक्चर सहित सभी संकलन लक्ष्यों को स्वचालित रूप से सक्षम करती है।
explanation: |
  Rustup इंस्टॉल करते समय, आप आधिकारिक Rust वेबसाइट से एक स्क्रिप्ट डाउनलोड और एक्जीक्यूट करते हैं। यह ट्रांसपोर्ट-लेयर सुरक्षा के लिए HTTPS का उपयोग करता है, और पैकेज crates.io जैसे विश्वसनीय स्रोतों से आते हैं। हालांकि यह अधिकांश उपयोग मामलों के लिए सुरक्षित है, सख्त सुरक्षा नीतियों वाले कुछ संगठन अपने डिस्ट्रीब्यूशन के पैकेज मैनेजर को प्राथमिकता दे सकते हैं, जो डिस्ट्रीब्यूशन के स्वयं के साइनिंग इंफ्रास्ट्रक्चर को जोड़ता है। अन्य विकल्प गलत हैं: Rustup उपयोगकर्ता की होम डायरेक्टरी में एडमिनिस्ट्रेटर विशेषाधिकारों की आवश्यकता के बिना इंस्टॉल हो जाता है, स्टेबल टूलचेन में प्रायोगिक सुविधाओं को स्पष्ट रूप से शामिल नहीं किया गया है, और कंपाइलेशन टारगेट अलग से जोड़े जाते हैं और उनमें अंतर्निहित सुरक्षा जोखिम नहीं होते हैं।
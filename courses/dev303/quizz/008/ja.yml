question: Rustupを使ってRustをインストールする場合、どのようなセキュリティ上の注意が必要ですか？
answer: インストールにはスクリプトのダウンロードと実行が必要ですが、HTTPSを使用し、信頼できる公式ソースから提供されています。
wrong_answers:
  - インストールには管理者権限が必要なため、システムの脆弱性が生じる可能性がある。
  - 安定版ツールチェーンには、発見されていないセキュリティ上の欠陥があるかもしれない実験的な機能が含まれています。
  - インストールプロセスでは、潜在的に安全でないアーキテクチャを含むすべてのコンパイルターゲットが自動的に有効になります。
explanation: |
  Rustupをインストールする際には、Rustの公式サイトからスクリプトをダウンロードして実行します。これはトランスポート層のセキュリティのためにHTTPSを使用し、パッケージはcrates.ioのような信頼できるソースから提供されます。これはほとんどのユースケースで安全ですが、厳しいセキュリティポリシーを持つ組織の中には、ディストリビューション独自の署名インフラを追加するディストリビューションのパッケージマネージャを好むかもしれません。他の選択肢は正しくない：Rustupは管理者権限を必要とせずユーザのホームディレクトリにインストールされ、安定版ツールチェーンは実験的な機能を特に除外し、コンパイルターゲットは個別に追加され、固有のセキュリティリスクはありません。
question: 使用 Rustup 安装 Rust 时应注意哪些安全问题？
answer: 安装涉及下载和执行一个脚本，不过该脚本使用 HTTPS 且来自官方可信来源
wrong_answers:
  - 安装需要管理员权限，这会造成潜在的系统漏洞
  - 稳定版工具链包含的实验功能可能存在尚未发现的安全漏洞
  - 安装过程会自动启用所有编译目标，包括潜在的不安全架构
explanation: |
  安装 Rustup 时，你需要从 Rust 官方网站下载并执行一个脚本。它使用 HTTPS 实现传输层安全，软件包来自可信来源，如 crates.io。虽然这对大多数用例来说是安全的，但一些有严格安全策略的组织可能更喜欢其发行版的软件包管理器，因为它添加了发行版自己的签名基础架构。其他选项都不正确：Rustup 安装在用户的主目录下，无需管理员权限；稳定版工具链明确排除了实验性功能；编译目标是单独添加的，不会带来固有的安全风险。
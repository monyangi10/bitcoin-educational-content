question: Какви съображения за сигурност трябва да имате предвид, когато инсталирате Rust с помощта на Rustup?
answer: Инсталацията включва изтегляне и изпълнение на скрипт, който обаче използва HTTPS и идва от официални надеждни източници
wrong_answers:
  - Инсталацията изисква администраторски привилегии, което създава потенциални уязвимости на системата
  - Стабилната верига от инструменти съдържа експериментални функции, които може да имат неоткрити недостатъци в сигурността
  - Процесът на инсталиране автоматично разрешава всички цели за компилиране, включително потенциално опасни архитектури
explanation: |
  При инсталирането на Rustup изтегляте и изпълнявате скрипт от официалния уебсайт на Rust. При това се използва HTTPS за сигурност на транспортния слой, а пакетите идват от надеждни източници като crates.io. Въпреки че това е сигурно за повечето случаи на използване, някои организации със строги политики за сигурност могат да предпочетат мениджъра на пакети на своята дистрибуция, който добавя собствена инфраструктура за подписване на дистрибуцията. Другите варианти са неправилни: Rustup се инсталира в домашната директория на потребителя, без да изисква администраторски права, стабилната верига от инструменти изрично изключва експериментални функции, а целите за компилиране се добавят отделно и не представляват присъщи рискове за сигурността.
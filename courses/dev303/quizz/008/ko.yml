question: Rustup을 사용하여 Rust을 설치할 때 주의해야 할 보안 고려 사항은 무엇인가요?
answer: 설치에는 스크립트 다운로드 및 실행이 포함되지만, HTTPS를 사용하며 신뢰할 수 있는 공식 출처에서 제공됩니다
wrong_answers:
  - 설치 시 관리자 권한이 필요하므로 잠재적인 시스템 취약점이 발생할 수 있습니다
  - 안정적인 툴체인에는 아직 발견되지 않은 보안 결함이 있을 수 있는 실험적인 기능이 포함되어 있습니다
  - 설치 프로세스는 잠재적으로 안전하지 않을 수 있는 아키텍처를 포함한 모든 컴파일 대상을 자동으로 활성화합니다
explanation: |
  Rustup을 설치할 때 공식 Rust 웹사이트에서 스크립트를 다운로드하여 실행합니다. 이 스크립트는 전송 계층 보안을 위해 HTTPS를 사용하며, 패키지는 crates.io와 같은 신뢰할 수 있는 소스에서 제공됩니다. 이 방법은 대부분의 사용 사례에서 안전하지만, 보안 정책이 엄격한 일부 조직에서는 배포판의 자체 서명 인프라를 추가하는 배포판의 패키지 관리자를 선호할 수 있습니다. 다른 옵션은 올바르지 않습니다: Rustup은 관리자 권한 없이 사용자의 홈 디렉터리에 설치되며, 안정적인 툴체인은 실험적 기능을 제외하며, 컴파일 대상은 별도로 추가되어 내재된 보안 위험을 초래하지 않습니다.
question: 開発中に`cargo check`コマンドを使う主な利点は何ですか？
answer: 実行ファイルを生成することなく、フルビルドよりも高速にコンパイルチェックを行う。
wrong_answers:
  - プロジェクトのコンパイルエラーやコードスタイルの問題を自動的に修正します。
  - すべてのプロジェクトの依存関係をダウンロードし、最新バージョンに更新します。
  - デバッグ情報と詳細なエラーレポートとともにプログラムを実行します。
explanation: |
  cargo check` コマンドは、`cargo build` と同じようにすべてのコンパイルチェックを行うが、最終的な実行ファイルの生成ステップはスキップすることで、迅速な開発の繰り返しを実現するように設計されている。このため、コードが正しくコンパイルされているかどうかだけを確認する必要がある場合には、完全なビルドよりも大幅に速くなります。間違った答えは他のツールの機能を説明しています：また、`cargo update` は依存関係の更新を処理し、`cargo run` はデバッグ機能を持つプログラムを実行します。
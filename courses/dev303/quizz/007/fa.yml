question: مزیت اصلی استفاده از دستور `cargo check` در طول توسعه چیست؟
answer: این کار بررسی‌های کامپایل را سریع‌تر از یک ساخت کامل انجام می‌دهد بدون اینکه فایل‌های اجرایی تولید کند.
wrong_answers:
  - به‌طور خودکار خطاهای کامپایل و مشکلات سبک کد را در پروژه شما برطرف می‌کند.
  - همه وابستگی‌های پروژه را به آخرین نسخه‌هایشان دانلود و به‌روزرسانی می‌کند.
  - برنامه شما را با اطلاعات اشکال‌زدایی و گزارش‌دهی خطاهای دقیق اجرا می‌کند.
explanation: |
  دستور `cargo check` برای تکرار سریع توسعه طراحی شده است و تمام بررسی‌های کامپایل مشابه `cargo build` را انجام می‌دهد اما مرحله نهایی تولید فایل اجرایی را نادیده می‌گیرد. این باعث می‌شود که به طور قابل توجهی سریع‌تر از یک ساخت کامل باشد زمانی که فقط نیاز دارید تأیید کنید که کد شما به درستی کامپایل می‌شود. پاسخ‌های نادرست عملکرد ابزارهای دیگر را توصیف می‌کنند: Clippy و سایر لینترها می‌توانند پیشنهاداتی برای رفع مشکلات ارائه دهند اما به طور خودکار آنها را اعمال نمی‌کنند، `cargo update` به‌روزرسانی وابستگی‌ها را مدیریت می‌کند، و `cargo run` برنامه‌ها را با قابلیت‌های اشکال‌زدایی اجرا می‌کند.
question: विकास के दौरान `cargo check` कमांड का उपयोग करने का मुख्य लाभ क्या है?
answer: यह निष्पादन योग्य फ़ाइलें उत्पन्न किए बिना, पूर्ण बिल्ड की तुलना में संकलन जाँच को तेज़ी से करता है।
wrong_answers:
  - यह आपके प्रोजेक्ट में संकलन त्रुटियों और कोड शैली संबंधी समस्याओं को स्वचालित रूप से ठीक करता है।
  - यह प्रोजेक्ट की सभी निर्भरताओं को डाउनलोड करता है और उन्हें उनके नवीनतम संस्करणों में अपडेट करता है।
  - यह आपके प्रोग्राम को डिबग जानकारी और विस्तृत त्रुटि रिपोर्टिंग के साथ चलाता है।
explanation: |
  `cargo check` कमांड को तेजी से विकास करने के लिए डिज़ाइन किया गया है। यह `cargo build` के समान सभी संकलन जाँच करता है, लेकिन अंतिम निष्पादन योग्य जनरेशन चरण को छोड़ देता है। इससे यह पूर्ण बिल्ड की तुलना में काफी तेज हो जाता है, खासकर तब जब आपको केवल यह सत्यापित करना हो कि आपका कोड सही ढंग से संकलित हो रहा है। गलत उत्तर अन्य उपकरणों की कार्यप्रणाली का वर्णन करते हैं: क्लिपी और अन्य लिंटर सुधार सुझा सकते हैं, लेकिन उन्हें स्वचालित रूप से लागू नहीं करते हैं; `cargo update` निर्भरता अपडेट को संभालता है; और `cargo run` डिबगिंग क्षमताओं के साथ प्रोग्राम निष्पादित करता है।
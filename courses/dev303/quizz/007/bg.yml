question: Кое е основното предимство на използването на командата `cargo check` по време на разработка?
answer: Извършва проверки за компилиране по-бързо от пълно изграждане, без да генерира изпълними файлове
wrong_answers:
  - Автоматично поправя грешки при компилиране и проблеми със стила на кода в проекта ви
  - Изтегля и актуализира всички зависимости на проекта до най-новите им версии
  - Изпълнява програмата ви с информация за дебъгване и подробно отчитане на грешки
explanation: |
  Командата `cargo check` е предназначена за бърза итерация на разработката, като извършва същите проверки за компилиране като `cargo build`, но пропуска крайната стъпка за генериране на изпълним файл. Това я прави значително по-бърза от пълното изграждане, когато трябва само да проверите дали кодът ви се компилира правилно. Грешните отговори описват функционалността на други инструменти: Clippy и други програми за изчистване могат да предлагат поправки, но не ги прилагат автоматично, `cargo update` обработва актуализации на зависимости, а `cargo run` изпълнява програми с възможности за отстраняване на грешки.
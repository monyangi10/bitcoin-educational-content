question: В чем основное преимущество использования команды `cargo check` во время разработки?
answer: Он выполняет проверку компиляции быстрее, чем полная сборка, не создавая исполняемых файлов
wrong_answers:
  - Он автоматически исправляет ошибки компиляции и проблемы со стилем кода в вашем проекте
  - Он загружает и обновляет все зависимости проекта до последних версий
  - Он запускает вашу программу с отладочной информацией и подробным отчетом об ошибках
explanation: |
  Команда `cargo check` предназначена для быстрой итерации разработки, выполняя все те же проверки компиляции, что и `cargo build`, но пропуская шаг создания финального исполняемого файла. Это делает ее значительно быстрее полной сборки, когда вам нужно только убедиться, что ваш код компилируется правильно. Неправильные ответы описывают функциональность других инструментов: Clippy и другие линтеры могут предлагать исправления, но не применяют их автоматически, `cargo update` обрабатывает обновления зависимостей, а `cargo run` выполняет программы с возможностью отладки.
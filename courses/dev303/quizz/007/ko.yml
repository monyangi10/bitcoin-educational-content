question: 개발 중에 '화물 확인' 명령을 사용하면 어떤 이점이 있나요?
answer: 실행 파일을 생성하지 않고 전체 빌드보다 빠르게 컴파일 검사를 수행합니다
wrong_answers:
  - 프로젝트의 컴파일 오류 및 코드 스타일 문제를 자동으로 수정합니다
  - 모든 프로젝트 종속성을 다운로드하고 최신 버전으로 업데이트합니다
  - 디버그 정보 및 자세한 오류 보고와 함께 프로그램을 실행합니다
explanation: |
  '화물 검사' 명령은 '화물 빌드'와 동일한 컴파일 검사를 모두 수행하지만 최종 실행 파일 생성 단계를 생략하여 신속한 개발 반복을 위해 설계되었습니다. 따라서 코드가 올바르게 컴파일되는지 확인하기만 하면 되는 경우 전체 빌드보다 훨씬 빠릅니다. 오답은 다른 도구의 기능을 설명한 것입니다: 클리피 및 기타 린터는 수정 사항을 제안할 수는 있지만 자동으로 적용하지는 않으며, `cargo update`는 종속성 업데이트를 처리하고, `cargo run`은 디버깅 기능이 있는 프로그램을 실행합니다.
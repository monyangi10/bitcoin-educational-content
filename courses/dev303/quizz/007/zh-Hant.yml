question: 在開發過程中使用 `cargo check` 指令的主要優點是什麼？
answer: 在不產生可執行檔的情況下，它執行編譯檢查的速度比完整建立還要快
wrong_answers:
  - 它會自動修正專案中的編譯錯誤和程式碼樣式問題
  - 它會下載所有專案依賴項目並更新至最新版本
  - 它運行您的程式，並提供除錯資訊和詳細的錯誤報告
explanation: |
  `cargo check` 指令是專為快速開發迭代所設計，它執行所有與 `cargo build` 相同的編譯檢查，但跳過最後的執行檔產生步驟。當您只需要驗證您的程式碼是否正確編譯時，這使得它比完整的 build 快很多。錯誤答案描述其他工具的功能：Clippy 和其他 linters 可以提出修正建議，但不會自動套用；`cargo update` 會處理相依性更新；`cargo run` 會執行具有除錯功能的程式。
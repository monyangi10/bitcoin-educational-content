question: ข้อดีหลักของการใช้คำสั่ง `cargo check` ระหว่างการพัฒนาคืออะไร?
answer: มันทำการตรวจสอบการคอมไพล์ได้เร็วกว่าแบบสร้างเต็มรูปแบบโดยไม่สร้างไฟล์ปฏิบัติการ
wrong_answers:
  - มันจะแก้ไขข้อผิดพลาดในการคอมไพล์และปัญหาสไตล์โค้ดในโปรเจกต์ของคุณโดยอัตโนมัติ
  - มันดาวน์โหลดและอัปเดตการพึ่งพาของโปรเจกต์ทั้งหมดให้เป็นเวอร์ชันล่าสุด
  - มันรันโปรแกรมของคุณพร้อมข้อมูลการดีบักและรายงานข้อผิดพลาดอย่างละเอียด
explanation: |
  คำสั่ง `cargo check` ถูกออกแบบมาเพื่อการพัฒนาอย่างรวดเร็วโดยทำการตรวจสอบการคอมไพล์ทั้งหมดเหมือนกับ `cargo build` แต่ข้ามขั้นตอนการสร้างไฟล์ปฏิบัติการสุดท้าย ซึ่งทำให้มันเร็วกว่าอย่างมากเมื่อคุณต้องการเพียงตรวจสอบว่ารหัสของคุณคอมไพล์ได้ถูกต้อง คำตอบที่ผิดอธิบายถึงฟังก์ชันการทำงานของเครื่องมืออื่น ๆ: Clippy และ linter อื่น ๆ สามารถแนะนำการแก้ไขได้แต่ไม่สามารถใช้การแก้ไขโดยอัตโนมัติ, `cargo update` จัดการการอัปเดตการพึ่งพา, และ `cargo run` ทำการรันโปรแกรมพร้อมความสามารถในการดีบัก
question: 在开发过程中使用 "货物检查 "命令的主要优势是什么？
answer: 在不生成可执行文件的情况下，它执行编译检查的速度比全面构建更快
wrong_answers:
  - 它能自动修复项目中的编译错误和代码样式问题
  - 它会下载所有项目依赖项并将其更新为最新版本
  - 它运行程序时会提供调试信息和详细的错误报告
explanation: |
  Cargo check "命令与 "cargo build "命令执行相同的编译检查，但跳过了生成可执行文件的最后一步，是专为快速开发迭代而设计的。当你只需要验证代码编译是否正确时，它比完整的编译要快得多。错误答案描述了其他工具的功能：Clippy 和其他精简工具可以提出修复建议，但不会自动应用；`cargo update` 处理依赖关系更新；`cargo run` 执行具有调试功能的程序。
question: ความท้าทายพื้นฐานในการพัฒนาข้ามแพลตฟอร์มที่ UniFFI แก้ไขเมื่อทำงานกับไลบรารี Rust คืออะไร?
answer: ความจำเป็นในการสร้างโค้ดการผูกแบบกำหนดเองด้วยตนเองสำหรับแต่ละภาษาที่ต้องการเมื่อเปิดเผย FFI ระดับต่ำของ Rust
wrong_answers:
  - การไม่สามารถของ Rust ในการคอมไพล์เป็นไบนารีเนทีฟที่สามารถทำงานบนระบบปฏิบัติการหลายระบบ
  - การขาดการรับประกันความปลอดภัยของหน่วยความจำเมื่อโค้ด Rust โต้ตอบกับภาษาที่มีการเก็บขยะอัตโนมัติ
  - "ค่าใช้จ่ายด้านประสิทธิภาพที่เกิดขึ้นเมื่อแปลโมเดลความเป็นเจ้าของของ Rust ไปยังภาษาที่นับจำนวนการอ้างอิง"
explanation: |
  UniFFI แก้ปัญหาโดยเฉพาะในการเขียนโค้ด binding ด้วยตนเองสำหรับแต่ละภาษาที่เป็นเป้าหมาย เมื่อ Rust คอมไพล์เป็นเอาต์พุตไบนารี มันจะสร้าง Foreign Function Interface (FFI) ที่เป็นระดับต่ำและท้าทายในการใช้งานโดยตรงจากภาษาระดับสูง โดยทั่วไปแล้ว นักพัฒนาต้องเขียนโค้ด binding ที่กำหนดเองสำหรับทุกภาษาที่เป็นเป้าหมาย (Python, Swift, Kotlin, ฯลฯ) ซึ่งสร้างอุปสรรคสำคัญต่อการนำไปใช้ UniFFI กำจัดความซ้ำซ้อนนี้โดยการสร้าง binding เหล่านี้โดยอัตโนมัติผ่านระบบ UDL specification ของมัน
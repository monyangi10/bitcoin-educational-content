question: Rust लाइब्रेरी के साथ काम करते समय UniFFI क्रॉस-प्लेटफ़ॉर्म विकास में किस मूलभूत चुनौती का समाधान करता है?
answer: Rust के निम्न-स्तरीय FFI को प्रदर्शित करते समय प्रत्येक लक्ष्य भाषा के लिए कस्टम बाइंडिंग कोड को मैन्युअल रूप से बनाने की आवश्यकता होती है।
wrong_answers:
  - Rust की कई ऑपरेटिंग सिस्टमों पर चलने वाले नेटिव बाइनरी में कंपाइल करने में असमर्थता
  - गार्बेज-कलेक्टेड भाषाओं के साथ Rust कोड के परस्पर क्रिया करने पर मेमोरी सुरक्षा गारंटी का अभाव
  - "जीडब्ल्यू-4 के स्वामित्व मॉडल को संदर्भ-गणना वाली भाषाओं में अनुवाद करते समय उत्पन्न होने वाला प्रदर्शन संबंधी अतिरिक्त भार"
explanation: |
  UniFFI विशेष रूप से प्रत्येक लक्ष्य भाषा के लिए मैन्युअल रूप से बाइंडिंग कोड लिखने की समस्या का समाधान करता है। जब Rust बाइनरी आउटपुट में कंपाइल होता है, तो यह एक फॉरेन फंक्शन Interface (FFI) उत्पन्न करता है जो निम्न-स्तरीय होता है और उच्च-स्तरीय भाषाओं से सीधे उपयोग करना चुनौतीपूर्ण होता है। परंपरागत रूप से, डेवलपर्स को प्रत्येक लक्ष्य भाषा (Python, Swift, Kotlin, आदि) के लिए कस्टम बाइंडिंग कोड लिखना पड़ता था, जिससे इसके उपयोग में महत्वपूर्ण बाधाएँ उत्पन्न होती थीं। UniFFI अपनी UDL विनिर्देश प्रणाली के माध्यम से इन बाइंडिंग को स्वचालित रूप से उत्पन्न करके इस अनावश्यकता को समाप्त करता है।
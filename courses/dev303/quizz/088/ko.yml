question: Rust 라이브러리로 작업할 때 크로스 플랫폼 개발의 근본적인 과제는 무엇인가요?
answer: Rust의 로우레벨 FFI를 노출할 때 각 대상 언어에 대한 사용자 지정 바인딩 코드를 수동으로 생성해야 합니다
wrong_answers:
  - Rust가 여러 운영 체제에서 실행할 수 있는 네이티브 바이너리로 컴파일할 수 없음
  - Rust 코드가 가비지 수집 언어와 상호 작용할 때 메모리 안전성이 보장되지 않습니다
  - "Rust의 소유권 모델을 참조 계산 언어로 번역할 때 발생하는 성능 오버헤드"
explanation: |
  UniFFI는 특히 각 대상 언어에 대한 바인딩 코드를 수동으로 작성하는 문제를 해결합니다. Rust가 바이너리 출력으로 컴파일되면 저수준으로 상위 언어에서 직접 사용하기 어려운 외부 함수 Interface(FFI)가 생성됩니다. 기존에는 개발자가 모든 대상 언어(Python, Swift, Kotlin 등)에 대해 사용자 지정 바인딩 코드를 작성해야 했기 때문에 도입에 상당한 장벽이 있었습니다. UniFFI는 UDL 사양 시스템을 통해 이러한 바인딩을 자동으로 생성함으로써 이러한 중복 작업을 제거합니다.
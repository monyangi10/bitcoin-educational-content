question: 在使用 Rust 库时，UniFFI 解决了跨平台开发中的哪些基本难题？
answer: 在公开 Rust 的低级 FFI 时，需要为每种目标语言手动创建自定义绑定代码
wrong_answers:
  - Rust 无法编译成可在多个操作系统上运行的本地二进制文件
  - Rust 代码与垃圾收集语言交互时缺乏内存安全保障
  - "将 Rust 的所有权模型转换为引用计数语言时引入的性能开销"
explanation: |
  UniFFI 专门解决了为每种目标语言手动编写绑定代码的问题。当 Rust 编译成二进制输出时，会产生一个外来函数 Interface (FFI)，该函数级别较低，难以直接从高级语言中使用。传统上，开发人员必须为每种目标语言（Python、Swift、Kotlin 等）编写自定义绑定代码，这给采用带来了巨大障碍。UniFFI 通过其 UDL 规范系统自动生成这些绑定，从而消除了这种冗余。
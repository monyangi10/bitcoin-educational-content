question: 在使用 Rust 函式庫時，UniFFI 能解決跨平台開發中的什麼基本挑戰？
answer: 暴露 Rust 的低階 FFI 時，需要針對每種目標語言手動建立自訂的綁定程式碼
wrong_answers:
  - Rust 無法編譯成可在多種作業系統上執行的原生二進位檔
  - 當 Rust 程式碼與垃圾收集語言互動時，缺乏記憶體安全保證
  - 「將 Rust 的所有權模型轉換為參考計數語言時所產生的效能開銷」
explanation: |
  UniFFI 特別解決了為每種目標語言手動編寫綁定程式碼的問題。當 Rust 編譯為二進位輸出時，會產生一個外來函數 Interface (FFI)，這個函數是低階的，對於直接從高階語言使用具有挑戰性。傳統上，開發人員必須為每一種目標語言 (Python、Swift、Kotlin 等) 寫自訂的綁定程式碼，這對採用造成很大的障礙。UniFFI 透過其 UDL 規格系統自動產生這些綁定，消除了這種冗餘。
question: چه چالش اساسی در توسعه چندسکویی را UniFFI هنگام کار با کتابخانه‌های Rust برطرف می‌کند؟
answer: نیاز به ایجاد دستی کد اتصال سفارشی برای هر زبان هدف هنگام افشای FFI سطح پایین Rust
wrong_answers:
  - ناتوانی Rust در کامپایل به باینری‌های بومی که می‌توانند بر روی سیستم‌عامل‌های متعدد اجرا شوند
  - فقدان تضمین‌های ایمنی حافظه زمانی که کد Rust با زبان‌های جمع‌آوری زباله تعامل دارد
  - "هزینه عملکردی که هنگام ترجمه مدل مالکیت Rust به زبان‌های مبتنی بر شمارش مرجع معرفی می‌شود"
explanation: |
  UniFFI به‌طور خاص مشکل نوشتن دستی کدهای اتصال برای هر زبان هدف را حل می‌کند. زمانی که Rust به خروجی باینری کامپایل می‌شود، یک Foreign Function Interface (FFI) تولید می‌کند که سطح پایین است و استفاده مستقیم از آن در زبان‌های سطح بالاتر چالش‌برانگیز است. به‌طور سنتی، توسعه‌دهندگان مجبور بودند برای هر زبان هدف (پایتون، سوئیفت، کاتلین و غیره) کد اتصال سفارشی بنویسند که موانع قابل توجهی برای پذیرش ایجاد می‌کرد. UniFFI این تکرار را با تولید خودکار این اتصالات از طریق سیستم مشخصات UDL خود از بین می‌برد.
question: Кое основно предизвикателство в междуплатформената разработка решава UniFFI при работа с библиотеки Rust?
answer: Необходимостта от ръчно създаване на потребителски код за свързване за всеки целеви език при разкриване на FFI на Rust на ниско ниво
wrong_answers:
  - Невъзможността Rust да се компилира до собствени двоични файлове, които могат да се изпълняват на множество операционни системи
  - Липсата на гаранции за безопасност на паметта при взаимодействие на кода Rust с езици, които се събират с отпадъци
  - "Превишаване на производителността при превода на модела за собственост на Rust на езици с отчитане на референции"
explanation: |
  UniFFI специално решава проблема с ръчното писане на код за свързване за всеки целеви език. Когато Rust се компилира до двоичен изход, той създава чуждестранна функция Interface (FFI), която е от ниско ниво и е предизвикателство за директна употреба от езици от по-високо ниво. Традиционно разработчиците трябваше да пишат потребителски код за свързване за всеки целеви език (Python, Swift, Kotlin и т.н.), което създаваше значителни пречки пред приемането. UniFFI елиминира този излишък, като автоматично генерира тези обвързвания чрез своята система за спецификация на UDL.
question: UniFFIは、Rustライブラリを使用したクロスプラットフォーム開発において、どのような基本的な課題に取り組んでいるのでしょうか？
answer: Rustの低レベルFFIを公開する場合、ターゲット言語ごとにカスタム・バインディング・コードを手作業で作成する必要がある。
wrong_answers:
  - Rustは、複数のオペレーティングシステム上で動作するネイティブバイナリにコンパイルすることができない。
  - Rustコードがガベージコレクション言語と相互作用する際のメモリ安全性保証の欠如
  - "Rustの所有権モデルを参照カウント言語に翻訳する際に生じるパフォーマンス・オーバーヘッド"
explanation: |
  UniFFIは特に、ターゲット言語ごとに手作業でバインディングコードを書くという問題を解決します。Rustがバイナリ出力にコンパイルされると、低レベルで高水準言語から直接使用するのが難しい外国関数Interface（FFI）が生成される。従来、開発者はターゲット言語（Python、Swift、Kotlinなど）ごとにカスタムバインディングコードを書かなければならず、採用の大きな障壁となっていました。UniFFIは、UDL仕様システムを通じてバインディングを自動生成することで、このような冗長性を排除します。
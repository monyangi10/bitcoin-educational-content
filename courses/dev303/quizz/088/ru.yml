question: Какую фундаментальную проблему кроссплатформенной разработки решает UniFFI при работе с библиотеками Rust?
answer: Необходимость вручную создавать пользовательский код привязки для каждого целевого языка при раскрытии низкоуровневого FFI Rust
wrong_answers:
  - Невозможность компиляции Rust в собственные двоичные файлы, которые могут работать в нескольких операционных системах
  - Отсутствие гарантий сохранности памяти при взаимодействии кода Rust с языками, собирающими мусор
  - "Накладные расходы на производительность, возникающие при переводе модели владения Rust в языки с подсчетом ссылок"
explanation: |
  UniFFI специально решает проблему ручного написания кода привязки для каждого целевого языка. Когда Rust компилируется в двоичный код, получается Foreign Function Interface (FFI), которая является низкоуровневой и сложной для использования непосредственно из языков более высокого уровня. Традиционно разработчикам приходилось писать собственный код привязки для каждого целевого языка (Python, Swift, Kotlin и т. д.), что создавало значительные препятствия для внедрения. UniFFI устраняет эту избыточность, автоматически генерируя эти привязки с помощью своей системы спецификаций UDL.
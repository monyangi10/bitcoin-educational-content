question: Rust از چه مکانیزمی برای پاکسازی خودکار متغیرها و منابع آن‌ها هنگامی که از حوزه خارج می‌شوند استفاده می‌کند؟
answer: مکانیزم رهاسازی که توابع رهاسازی را بر روی متغیرها فراخوانی می‌کند
wrong_answers:
  - یک جمع‌آوری‌کننده زباله که به‌طور دوره‌ای به دنبال حافظه استفاده‌نشده می‌گردد.
  - Dealokasi دستی حافظه از طریق فراخوانی‌های صریح تابع free()
  - شمارش مرجع که تعداد اشاره‌گرهایی که به هر مقدار اشاره می‌کنند را پیگیری می‌کند
explanation: |
  ‏Rust از مکانیزم drop برای پاکسازی خودکار منابع هنگامی که متغیرها از حوزه خارج می‌شوند، استفاده می‌کند. این سیستم به‌طور ضمنی یک تابع drop را بر روی هر متغیر هنگامی که از حوزه خارج می‌شود، فراخوانی می‌کند، حافظه را به عنوان قابل استفاده مجدد علامت‌گذاری کرده و عملیات پاکسازی لازم مانند بستن دسته‌های فایل را انجام می‌دهد. این رویکرد که از الگوی RAII در C++ قرض گرفته شده است، مدیریت خودکار منابع را بدون نیاز به جمع‌آوری زباله، مدیریت دستی حافظه، یا سیستم‌های شمارش مرجع که توسط زبان‌های دیگر استفاده می‌شود، تضمین می‌کند.
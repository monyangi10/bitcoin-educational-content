question: กลไกใดที่ Rust ใช้ในการทำความสะอาดตัวแปรและทรัพยากรของพวกมันโดยอัตโนมัติเมื่อพวกมันออกนอกขอบเขต?
answer: กลไกการปล่อยที่เรียกใช้ฟังก์ชันการปล่อยบนตัวแปร
wrong_answers:
  - ตัวเก็บขยะที่สแกนหาหน่วยความจำที่ไม่ได้ใช้งานเป็นระยะ ๆ
  - การจัดสรรหน่วยความจำด้วยตนเองผ่านการเรียกใช้ฟังก์ชัน free() โดยตรง
  - การนับการอ้างอิงที่ติดตามจำนวนพอยน์เตอร์ที่อ้างอิงถึงแต่ละค่า
explanation: |
  Rust ใช้กลไกการ drop เพื่อทำความสะอาดทรัพยากรโดยอัตโนมัติเมื่อมีการออกจากขอบเขตของตัวแปร ระบบนี้จะเรียกใช้ฟังก์ชัน drop โดยปริยายในแต่ละตัวแปรเมื่อออกจากขอบเขต ทำให้หน่วยความจำสามารถนำกลับมาใช้ใหม่ได้และดำเนินการทำความสะอาดที่จำเป็น เช่น การปิดการใช้งานไฟล์แฮนด์เดิล วิธีการนี้ยืมมาจากรูปแบบ RAII ของ C++ ซึ่งช่วยให้การจัดการทรัพยากรเป็นไปโดยอัตโนมัติโดยไม่ต้องใช้การเก็บขยะ การจัดการหน่วยความจำด้วยตนเอง หรือระบบการนับอ้างอิงที่ใช้โดยภาษาอื่น ๆ
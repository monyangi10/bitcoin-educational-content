question: Rust 使用什么机制在变量超出范围时自动清理变量及其资源？
answer: 对变量调用丢弃函数的丢弃机制
wrong_answers:
  - 定期扫描未使用内存的垃圾回收器
  - 通过显式 free() 函数调用手动删除内存
  - 引用计数可追踪每个值有多少个指针引用
explanation: |
  Rust 使用 drop 机制在变量退出作用域时自动清理资源。该系统会在每个变量退出作用域时隐式调用一个 drop 函数，将内存标记为可重用，并执行关闭文件句柄等必要的清理操作。这种方法借鉴了 C++ 的 RAII 模式，可确保自动资源管理，而无需垃圾回收、手动内存管理或其他语言使用的引用计数系统。
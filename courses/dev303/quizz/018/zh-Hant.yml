question: 當變數超出範圍時，Rust 使用什麼機制來自動清理變數及其資源？
answer: 在變數上呼叫 drop 函數的 drop 機制
wrong_answers:
  - 定期掃描未使用記憶體的垃圾回收器
  - 透過明確的 free() 函式呼叫手動取消記憶體分配
  - 參照計數可追蹤每個值有多少個指標參照
explanation: |
  Rust 使用 drop 機制在變數離開作用範圍時自動清理資源。當變數離開範圍時，這個系統會隱式地呼叫每個變數的 drop 函式，將記憶體標示為可供重複使用，並執行任何必要的清理作業，例如關閉檔案句柄。此方法借用了 C++ 的 RAII 模式，可確保自動資源管理，而不需要垃圾回收、手動記憶體管理或其他語言使用的參考計數系統。
question: Rustでは、変数とそのリソースがスコープ外に出たときに、自動的にクリーンアップする仕組みはどうなっていますか？
answer: 変数にドロップ関数を呼び出すドロップメカニズム
wrong_answers:
  - 定期的に未使用メモリをスキャンするガベージコレクタ
  - 明示的なfree()関数呼び出しによる手動メモリ解放
  - 各値を参照するポインタの数を追跡する参照カウント
explanation: |
  Rustでは、変数がスコープ外に出たときに、自動的にリソースをクリーンアップするドロップ・メカニズムを使っている。このシステムは、各変数がスコープから外れると、暗黙のうちにドロップ関数を呼び出し、再利用可能なメモリとしてマークし、ファイルハンドルを閉じるなどの必要なクリーンアップ処理を実行する。このアプローチはC++のRAIIパターンから借用したもので、ガベージ・コレクションや手動のメモリー管理、他の言語で使われる参照カウント・システムを必要とせずに、自動的なリソース管理を保証する。
question: 변수가 범위를 벗어났을 때 변수와 해당 리소스를 자동으로 정리하기 위해 Rust는 어떤 메커니즘을 사용하나요?
answer: 변수에 드롭 함수를 호출하는 드롭 메커니즘
wrong_answers:
  - 사용하지 않는 메모리를 주기적으로 스캔하는 가비지 컬렉터
  - 명시적 free() 함수 호출을 통한 수동 메모리 할당 해제
  - 각 값을 참조하는 포인터 수를 추적하는 참조 카운팅
explanation: |
  Rust은 변수가 범위를 벗어날 때 드롭 메커니즘을 사용하여 리소스를 자동으로 정리합니다. 이 시스템은 각 변수가 범위를 벗어날 때 암시적으로 드롭 함수를 호출하여 메모리를 재사용 가능한 것으로 표시하고 파일 핸들 닫기 등 필요한 정리 작업을 수행합니다. C++의 RAII 패턴에서 차용한 이 접근 방식은 다른 언어에서 사용하는 가비지 컬렉션, 수동 메모리 관리 또는 참조 카운팅 시스템 없이도 자동 리소스 관리를 보장합니다.
question: Rust किस तंत्र का उपयोग करके वेरिएबल्स और उनके संसाधनों को स्कोप से बाहर होने पर स्वचालित रूप से साफ करता है?
answer: ड्रॉप तंत्र जो चरों पर ड्रॉप फ़ंक्शन को कॉल करता है
wrong_answers:
  - एक गार्बेज कलेक्टर जो समय-समय पर अप्रयुक्त मेमोरी की जांच करता है
  - स्पष्ट free() फ़ंक्शन कॉल के माध्यम से मैन्युअल मेमोरी डीएलोकेशन
  - रेफरेंस काउंटिंग जो यह ट्रैक करती है कि कितने पॉइंटर प्रत्येक मान को रेफरेंस करते हैं
explanation: |
  Rust, वेरिएबल्स के स्कोप से बाहर होने पर संसाधनों को स्वचालित रूप से साफ़ करने के लिए ड्रॉप मैकेनिज़्म का उपयोग करता है। यह सिस्टम स्कोप से बाहर होते ही प्रत्येक वेरिएबल पर ड्रॉप फ़ंक्शन को अप्रत्यक्ष रूप से कॉल करता है, जिससे मेमोरी को पुन: उपयोग के लिए उपलब्ध के रूप में चिह्नित किया जाता है और फ़ाइल हैंडल बंद करने जैसे आवश्यक सफ़ाई कार्य किए जाते हैं। C++ के RAII पैटर्न से लिया गया यह दृष्टिकोण, अन्य भाषाओं द्वारा उपयोग किए जाने वाले गार्बेज कलेक्शन, मैन्युअल मेमोरी प्रबंधन या संदर्भ गणना प्रणालियों की आवश्यकता के बिना स्वचालित संसाधन प्रबंधन सुनिश्चित करता है।
question: Какъв механизъм използва Rust за автоматично почистване на променливите и техните ресурси, когато те излязат извън обхвата?
answer: Механизмът за пускане, който извиква функции за пускане на променливи
wrong_answers:
  - Колектор на боклука, който периодично проверява за неизползвана памет
  - Ръчно разпределяне на паметта чрез изрични извиквания на функцията free()
  - Отчитане на референции, което проследява колко указателя се позовават на всяка стойност
explanation: |
  Rust използва механизма за отпадане, за да почиства автоматично ресурсите, когато променливите излязат от обхвата. Тази система имплицитно извиква функция за отпадане на всяка променлива, когато тя излезе от обхвата, като маркира паметта като налична за повторно използване и извършва всички необходими операции за почистване, като например затваряне на файлови дръжки. Този подход, заимстван от модела RAII на C++, осигурява автоматично управление на ресурсите, без да се налага събиране на отпадъци, ръчно управление на паметта или системи за броене на референции, използвани от други езици.
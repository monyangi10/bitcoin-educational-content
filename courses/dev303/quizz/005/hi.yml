question: Rust विकास पारिस्थितिकी तंत्र में क्लिपी का प्राथमिक कार्य क्या है?
answer: एक उन्नत लिंटर जो कोड का विश्लेषण करता है और बेहतर Rust मुहावरों के लिए सुधारों का सुझाव देता है।
wrong_answers:
  - एक पैकेज मैनेजर जो निर्भरता समाधान और प्रोजेक्ट बिल्ड को संभालता है
  - एक कंपाइलर टूल जो Rust सोर्स कोड को निष्पादन योग्य बाइनरी में परिवर्तित करता है
  - एक दस्तावेज़ जनरेटर जो स्वचालित रूप से API संदर्भ सामग्री तैयार करता है
explanation: |
  Clippy एक उन्नत लिंटर है जो बुनियादी सिंटैक्स जाँच से आगे बढ़कर आपके Rust कोड का विश्लेषण करता है और सुधार के सुझाव देता है। साधारण सिंटैक्स चेकर के विपरीत, Clippy Rust के मुहावरों को समझता है और विशिष्ट कार्यों को पूरा करने के अधिक कुशल या मुहावरेदार तरीके सुझा सकता है। अन्य विकल्प विभिन्न टूल का वर्णन करते हैं: Cargo पैकेज मैनेजर है जो निर्भरताओं और बिल्ड को संभालता है, rustc कंपाइलर है जो सोर्स कोड को निष्पादन योग्य फ़ाइलों में बदलता है, और rustdoc दस्तावेज़ीकरण जनरेटर है। Clippy विशेष रूप से कोड गुणवत्ता विश्लेषण पर ध्यान केंद्रित करता है और सर्वोत्तम प्रथाओं का सुझाव देकर डेवलपर्स को बेहतर, अधिक रखरखाव योग्य Rust कोड लिखने में मदद करता है।
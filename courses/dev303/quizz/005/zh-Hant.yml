question: Clippy 在 Rust 開發生態系統中的主要功能是什麼？
answer: 先進的燒錄器可分析程式碼並提出改進建議，以獲得更好的 Rust 慣用語
wrong_answers:
  - 可處理相依性解析與專案建置的套件管理員
  - 可將 Rust 原始碼轉換為可執行二進位檔案的編譯工具
  - 自動建立 API 參考資料的文件產生器
explanation: |
  Clippy 是一款進階的內嵌程式，它超越了基本的語法檢查功能，可分析您的 Rust 程式碼並提供改進建議。與簡單的語法檢查不同，Clippy 能夠理解 Rust 的習慣，並建議更有效率或更習慣的方式來完成特定的工作。其他選項描述了不同的工具：Cargo 是套件管理器，用來處理相依性與建立；rustc 是編譯器，用來將源碼轉換成可執行檔，而 rustdoc 則是文件產生器。Clippy 特別著重於程式碼品質分析，並透過建議最佳實作來幫助開發人員寫出更好、更易維護的 Rust 程式碼。
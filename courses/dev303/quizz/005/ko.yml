question: Rust 개발 에코시스템에서 클리피의 주요 기능은 무엇인가요?
answer: 코드를 분석하고 더 나은 Rust 관용구를 위한 개선 사항을 제안하는 고급 린터
wrong_answers:
  - 종속성 해결 및 프로젝트 빌드를 처리하는 패키지 관리자
  - Rust 소스 코드를 실행 가능한 바이너리로 변환하는 컴파일러 도구
  - API 참조 자료를 자동으로 생성하는 문서 생성기
explanation: |
  Clippy는 기본적인 구문 검사를 넘어 Rust 코드를 분석하고 개선 사항을 제안하는 고급 린터입니다. 단순한 구문 검사기와 달리 Clippy는 Rust 관용구를 이해하고 특정 작업을 수행하기 위한 보다 효율적이거나 관용적인 방법을 추천할 수 있습니다. 다른 옵션은 다른 도구를 설명합니다: Cargo는 종속성 및 빌드를 처리하는 패키지 관리자이고, rustc는 소스 코드를 실행 파일로 변환하는 컴파일러이며, rustdoc은 문서 생성기입니다. Clippy는 특히 코드 품질 분석에 초점을 맞추고 모범 사례를 제안하여 개발자가 더 우수하고 유지 관리하기 쉬운 Rust 코드를 작성하도록 돕습니다.
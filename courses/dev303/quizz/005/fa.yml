question: عملکرد اصلی Clippy در اکوسیستم توسعه Rust چیست؟
answer: یک لینتر پیشرفته که کد را تحلیل می‌کند و بهبودهایی برای اصطلاحات بهتر Rust پیشنهاد می‌دهد.
wrong_answers:
  - یک مدیر بسته که به حل وابستگی‌ها و ساخت پروژه‌ها می‌پردازد
  - ابزاری کامپایلر که کد منبع Rust را به باینری‌های اجرایی تبدیل می‌کند
  - یک مولد مستندات که به‌طور خودکار مواد مرجع API ایجاد می‌کند
explanation: |
  کلیپی یک ابزار پیشرفته برای بررسی کد است که فراتر از بررسی ساده نحو عمل می‌کند تا کد Rust شما را تحلیل کرده و پیشنهاداتی برای بهبود ارائه دهد. برخلاف بررسی‌کننده‌های ساده نحو، کلیپی با اصطلاحات Rust آشنا است و می‌تواند روش‌های کارآمدتر یا اصطلاحی‌تری برای انجام وظایف خاص پیشنهاد دهد. گزینه‌های دیگر ابزارهای متفاوتی را توصیف می‌کنند: کارگو مدیر بسته‌ای است که وابستگی‌ها و ساخت‌ها را مدیریت می‌کند، rustc کامپایلری است که کد منبع را به فایل‌های اجرایی تبدیل می‌کند، و rustdoc تولیدکننده مستندات است. کلیپی به‌طور خاص بر تحلیل کیفیت کد تمرکز دارد و به توسعه‌دهندگان کمک می‌کند تا کد Rust بهتری بنویسند که نگهداری‌پذیرتر باشد و بهترین شیوه‌ها را پیشنهاد می‌دهد.
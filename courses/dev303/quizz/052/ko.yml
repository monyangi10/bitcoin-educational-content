question: 일반 Rust 참조와 RefCell에서 차용 위반을 처리하는 방법의 주요 차이점은 무엇인가요?
answer: 일반 참조는 컴파일 타임 오류를 유발하고 RefCell은 런타임 패닉을 유발합니다
wrong_answers:
  - 일반 참조는 런타임 패닉을 유발하고 RefCell은 컴파일 타임 오류를 유발합니다
  - 일반 참조는 여러 개의 변경 가능한 차용을 허용하는 반면 RefCell은 단일 변경 가능한 액세스를 강제합니다
  - 일반 참조에는 명시적인 수명 주석이 필요하지만 RefCell은 자동 정리를 사용합니다
explanation: |
  RefCell은 Rust의 차용 규칙 적용을 컴파일 타임에서 런타임으로 옮깁니다. 컴파일러는 프로그램이 실행되기 전에 정적으로 일반 참조를 분석하고 차용 위반을 방지하지만, RefCell은 프로그램 실행 중에 이와 동일한 안전 검사를 수행합니다. 따라서 프로그래머가 코드가 안전하다는 것을 알고 있지만 컴파일 실패 대신 런타임 패닉이 발생하는 경우 RefCell은 컴파일러의 보수적인 제한을 우회할 수 있습니다.
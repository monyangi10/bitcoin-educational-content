question: 通常のRust参照とRefCellでの借用違反の処理方法の主な違いは何ですか？
answer: 正規参照はコンパイル時エラーを引き起こすが、RefCellは実行時パニックを引き起こす
wrong_answers:
  - RefCellはコンパイル時エラーを引き起こすが、正規参照は実行時パニックを引き起こす
  - RefCellが単一のミュータブル・アクセスを強制するのに対して、通常の参照は複数のミュータブルな借用を許す。
  - 通常の参照は明示的な寿命アノテーションを必要とするが、RefCellは自動クリーンアップを使用する。
explanation: |
  RefCellは、Rustの借用ルールの実施をコンパイル時から実行時に移す。コンパイラはプログラム実行前に静的に正規参照を解析し、借用違反を防ぎますが、RefCellはプログラム実行中に同じ安全性チェックを行います。これによりRefCellは、プログラマはコードが安全であることを知っているが、違反がコンパイル失敗ではなく実行時のパニックにつながるような場合に、コンパイラの保守的な制限をバイパスすることができる。
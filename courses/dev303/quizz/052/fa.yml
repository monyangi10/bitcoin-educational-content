question: تفاوت کلیدی بین نحوه‌ی مدیریت نقض‌های قرض‌گیری با مراجع معمولی Rust و RefCell چیست؟
answer: ارجاعات معمولی باعث خطاهای زمان کامپایل می‌شوند در حالی که RefCell باعث پنیک‌های زمان اجرا می‌شود
wrong_answers:
  - ارجاعات معمولی باعث ایجاد وحشت در زمان اجرا می‌شوند در حالی که RefCell باعث خطاهای زمان کامپایل می‌شود
  - ارجاعات معمولی اجازه می‌دهند تا چندین قرض‌گیری قابل تغییر انجام شود، در حالی که RefCell دسترسی قابل تغییر واحدی را اعمال می‌کند.
  - ارجاعات معمولی نیاز به حاشیه‌نویسی‌های طول عمر صریح دارند در حالی که RefCell از پاکسازی خودکار استفاده می‌کند
explanation: |
  RefCell اجرای قوانین قرض‌گیری Rust را از زمان کامپایل به زمان اجرا منتقل می‌کند. در حالی که کامپایلر به صورت ایستا مراجع معمولی را تحلیل کرده و از نقض قوانین قرض‌گیری قبل از اجرای برنامه جلوگیری می‌کند، RefCell همین بررسی‌های ایمنی را در حین اجرای برنامه انجام می‌دهد. این امر به RefCell اجازه می‌دهد تا محدودیت‌های محافظه‌کارانه کامپایلر را در مواردی که برنامه‌نویس می‌داند کد ایمن است، دور بزند، اما نقض‌ها منجر به وحشت در زمان اجرا به جای شکست در زمان کامپایل می‌شوند.
question: ความแตกต่างที่สำคัญระหว่างการจัดการการละเมิดการยืมด้วยการอ้างอิง Rust ปกติกับ RefCell คืออะไร?
answer: การอ้างอิงปกติทำให้เกิดข้อผิดพลาดในขณะคอมไพล์ ในขณะที่ RefCell ทำให้เกิดการหยุดทำงานในขณะรันไทม์
wrong_answers:
  - การอ้างอิงปกติทำให้เกิดการหยุดทำงานขณะรันไทม์ ในขณะที่ RefCell ทำให้เกิดข้อผิดพลาดขณะคอมไพล์
  - การอ้างอิงปกติอนุญาตให้ยืมแบบเปลี่ยนแปลงได้หลายครั้ง ในขณะที่ RefCell บังคับให้เข้าถึงแบบเปลี่ยนแปลงได้เพียงครั้งเดียว
  - การอ้างอิงแบบปกติต้องการการระบุอายุการใช้งานอย่างชัดเจน ในขณะที่ RefCell ใช้การทำความสะอาดอัตโนมัติ
explanation: |
  RefCell ย้ายการบังคับใช้กฎการยืมของ Rust จากเวลาคอมไพล์ไปยังเวลารันไทม์ ในขณะที่คอมไพเลอร์วิเคราะห์การอ้างอิงปกติแบบสถิตและป้องกันการละเมิดการยืมก่อนที่โปรแกรมจะทำงาน RefCell จะทำการตรวจสอบความปลอดภัยเดียวกันนี้ในระหว่างการทำงานของโปรแกรม สิ่งนี้ทำให้ RefCell สามารถข้ามข้อจำกัดที่อนุรักษ์นิยมของคอมไพเลอร์ในกรณีที่โปรแกรมเมอร์ทราบว่ารหัสนั้นปลอดภัย แต่การละเมิดจะส่งผลให้เกิดการหยุดทำงานในเวลารันไทม์แทนที่จะเป็นความล้มเหลวในการคอมไพล์
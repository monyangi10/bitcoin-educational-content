question: В чем ключевое различие между тем, как обрабатываются нарушения заимствования при использовании обычных ссылок Rust и RefCell?
answer: Обычные ссылки вызывают ошибки компиляции, а RefCell - панику во время выполнения
wrong_answers:
  - Обычные ссылки вызывают панику во время выполнения, а RefCell - ошибки компиляции
  - Обычные ссылки допускают многократное заимствование, в то время как RefCell обеспечивает однократный доступ к мутантам
  - Обычные ссылки требуют явных аннотаций времени жизни, в то время как RefCell использует автоматическую очистку
explanation: |
  RefCell переносит исполнение правил заимствования Rust со времени компиляции на время выполнения. В то время как компилятор статически анализирует регулярные ссылки и предотвращает нарушения правил заимствования до запуска программы, RefCell выполняет те же проверки безопасности во время выполнения программы. Это позволяет RefCell обойти консервативные ограничения компилятора в случаях, когда программист знает, что код безопасен, но нарушения приводят к панике во время выполнения вместо сбоев компиляции.
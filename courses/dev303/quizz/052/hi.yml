question: रेगुलर Rust रेफरेंस और RefCell के साथ उधार उल्लंघन को संभालने के तरीके में मुख्य अंतर क्या है?
answer: रेगुलर रेफरेंस कंपाइल-टाइम एरर उत्पन्न करते हैं जबकि रेफसेल रनटाइम पैनिक का कारण बनता है।
wrong_answers:
  - रेगुलर रेफरेंस रनटाइम पैनिक का कारण बनते हैं जबकि रेफसेल कंपाइल-टाइम एरर उत्पन्न करता है।
  - रेगुलर रेफरेंस कई म्यूटेबल बोरो की अनुमति देते हैं जबकि रेफसेल केवल एक म्यूटेबल एक्सेस को ही लागू करता है।
  - रेगुलर रेफरेंस के लिए स्पष्ट लाइफटाइम एनोटेशन की आवश्यकता होती है, जबकि रेफसेल स्वचालित सफाई का उपयोग करता है।
explanation: |
  RefCell, Rust के बरोइंग रूल एनफोर्समेंट को कंपाइल टाइम से रनटाइम पर ले जाता है। जबकि कंपाइलर प्रोग्राम चलने से पहले रेगुलर रेफरेंस का स्टैटिक विश्लेषण करता है और बरोइंग उल्लंघन को रोकता है, RefCell प्रोग्राम के एग्जीक्यूशन के दौरान ही ये सुरक्षा जांच करता है। इससे RefCell उन मामलों में कंपाइलर के रूढ़िवादी प्रतिबंधों को दरकिनार कर सकता है जहां प्रोग्रामर जानता है कि कोड सुरक्षित है, लेकिन उल्लंघन के कारण कंपाइलेशन विफलताओं के बजाय रनटाइम पैनिक होता है।
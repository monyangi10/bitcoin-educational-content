question: 使用一般 Rust 參照與 RefCell 處理借用違規的主要差異為何？
answer: 常規引用會造成編譯時錯誤，而 RefCell 則會造成執行時恐慌
wrong_answers:
  - 常規引用會造成執行時恐慌，而 RefCell 則會造成編譯時錯誤
  - 常規引用允許多重可變借用，而 RefCell 強制單一可變存取
  - 常規引用需要明確的生命週期註解，而 RefCell 使用自動清理
explanation: |
  RefCell 將 Rust 的借用規則執行從編譯時間移到執行時間。在程式執行前，編譯器會靜態分析正規引用並防止違反借用規則，而 RefCell 則會在程式執行時執行這些相同的安全檢查。這允許 RefCell 在程式設計師知道程式碼是安全的，但違規會導致執行時恐慌而非編譯失敗的情況下，繞過編譯器的保守限制。
question: 普通 Rust 引用与 RefCell 处理违规借用的主要区别是什么？
answer: 常规引用会导致编译时错误，而 RefCell 则会导致运行时慌乱
wrong_answers:
  - 常规引用会导致运行时恐慌，而 RefCell 会导致编译时错误
  - 常规引用允许多次可变借用，而 RefCell 则强制执行单次可变访问
  - 常规引用需要明确的生命周期注释，而 RefCell 则使用自动清理功能
explanation: |
  RefCell 将 Rust 的借用规则执行从编译时间转移到运行时间。编译器会在程序运行前静态分析常规引用并防止借用违规，而 RefCell 则会在程序执行过程中执行相同的安全检查。这样，当程序员知道代码是安全的，但违反规则会导致运行时慌乱而不是编译失败时，RefCell 就能绕过编译器的保守限制。
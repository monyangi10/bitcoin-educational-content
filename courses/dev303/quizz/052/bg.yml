question: Каква е основната разлика между начина, по който се обработват нарушенията на заемането при обикновените препратки Rust и RefCell?
answer: Обикновените препратки причиняват грешки по време на компилация, а RefCell - паника по време на изпълнение
wrong_answers:
  - Обикновените препратки предизвикват паника по време на изпълнение, а RefCell - грешки по време на компилиране
  - Обикновените препратки позволяват многократно променливо заемане, докато RefCell налага единичен променлив достъп
  - Обикновените препратки изискват изрични анотации за срока на живот, докато RefCell използва автоматично почистване
explanation: |
  RefCell премества прилагането на правилата за заемане на Rust от времето на компилиране към времето на изпълнение. Докато компилаторът статично анализира регулярните препратки и предотвратява нарушенията на заемането преди изпълнението на програмата, RefCell извършва същите проверки за безопасност по време на изпълнението на програмата. Това позволява на RefCell да заобиколи консервативните ограничения на компилатора в случаите, когато програмистът знае, че кодът е безопасен, но нарушенията водят до паника по време на изпълнение вместо до грешки при компилиране.
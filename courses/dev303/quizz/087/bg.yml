question: Какво се случва със структурите Rust и свързаните с тях методи, когато те се картографират чрез UDL на UniFFI към целеви езици като Kotlin или Swift?
answer: Те се представят като интерфейси в UDL и generate като класове с методи в обектно-ориентираните целеви езици
wrong_answers:
  - Те се преобразуват в прости речници без функционалност на методите в целевите езици
  - Те изискват ръчно изпълнение на всеки метод на целевия език с помощта на интерфейси за обратна връзка
  - Те се трансформират автоматично във функции на пространството от имена, които приемат структурата като първи параметър
explanation: |
  UniFFI запазва обектно-ориентираните шаблони за проектиране, като съпоставя структури Rust със свързани методи към интерфейси в UDL, които след това generate като родни класове с методи в целевите езици. По този начин се запазва структурната цялост и поведението на оригиналната реализация на Rust, като същевременно се представят познати обектно-ориентирани интерфейси на разработчиците в езици като Kotlin и Swift. Другите варианти са некоректни, тъй като UniFFI специално поддържа функционалността на методите, а не се сплесква до речници, не изисква ръчно изпълнение, тъй като връзките се генерират автоматично, и не преобразува методите на структурата във функции на пространството от имена.
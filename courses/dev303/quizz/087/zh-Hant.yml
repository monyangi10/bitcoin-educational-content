question: 當 Rust 結構與相關方法透過 UniFFI 的 UDL 映射到 Kotlin 或 Swift 等目標語言時，會發生什麼情況？
answer: 它們在 UDL 和 generate 中以介面的形式顯示，在物件導向的目標語言中，則以具有方法的類別的形式顯示。
wrong_answers:
  - 它們被轉換成簡單的字典，在目標語言中沒有任何方法功能
  - 它們需要使用回呼介面在目標語言中手動實作每個方法
  - 它們會自動轉換為以結構體為第一參數的命名空間函數
explanation: |
  UniFFI 透過將 Rust 結構與相關方法映射為 UDL 中的介面，以保留物件導向設計模式。這可維護原始 Rust 實作的結構完整性與行為，同時為 Kotlin 和 Swift 等語言的開發人員提供熟悉的物件導向介面。其他選項都是不正確的，因為 UniFFI 特別維持方法功能，而不是扁平化為字典，不需要手動實作，因為綁定是自動產生的，而且不會將 struct 方法轉換為命名空間函數。
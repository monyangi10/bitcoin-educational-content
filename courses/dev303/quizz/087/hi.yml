question: जब Rust संरचनाओं को उनसे जुड़े तरीकों के साथ UniFFI के UDL के माध्यम से Kotlin या Swift जैसी लक्ष्य भाषाओं में मैप किया जाता है, तो उनका क्या होता है?
answer: वे UDL और generate में इंटरफेस के रूप में, ऑब्जेक्ट-ओरिएंटेड लक्ष्य भाषाओं में विधियों के साथ कक्षाओं के रूप में प्रदर्शित होते हैं।
wrong_answers:
  - इन्हें लक्ष्य भाषाओं में किसी भी विधि कार्यक्षमता के बिना सरल शब्दकोशों में परिवर्तित कर दिया जाता है।
  - इनमें कॉलबैक इंटरफेस का उपयोग करके लक्ष्य भाषा में प्रत्येक विधि का मैन्युअल कार्यान्वयन आवश्यक होता है।
  - वे स्वचालित रूप से नेमस्पेस फ़ंक्शन में परिवर्तित हो जाते हैं जो संरचना को पहले पैरामीटर के रूप में लेते हैं।
explanation: |
  UniFFI, Rust संरचनाओं और उनसे जुड़े तरीकों को UDL में इंटरफ़ेस से मैप करके ऑब्जेक्ट-ओरिएंटेड डिज़ाइन पैटर्न को संरक्षित करता है, जिन्हें फिर लक्ष्य भाषाओं में generate नेटिव क्लास के रूप में विधियों के साथ रूपांतरित किया जाता है। यह मूल Rust कार्यान्वयन की संरचनात्मक अखंडता और व्यवहार को बनाए रखता है, साथ ही Kotlin और Swift जैसी भाषाओं के डेवलपर्स को परिचित ऑब्जेक्ट-ओरिएंटेड इंटरफ़ेस प्रदान करता है। अन्य विकल्प गलत हैं क्योंकि UniFFI विशेष रूप से विधियों की कार्यक्षमता को बनाए रखता है, उन्हें शब्दकोशों में परिवर्तित नहीं करता, बाइंडिंग स्वतः उत्पन्न होने के कारण मैन्युअल कार्यान्वयन की आवश्यकता नहीं होती, और संरचना विधियों को नेमस्पेस फ़ंक्शन में परिवर्तित नहीं करता।
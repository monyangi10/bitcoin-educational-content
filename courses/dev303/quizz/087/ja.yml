question: UniFFIのUDLを通してKotlinやSwiftのようなターゲット言語にマッピングされた場合、関連するメソッドを持つRust構造体はどうなるのでしょうか？
answer: これらは、UDLではインターフェースとして、generateではオブジェクト指向ターゲット言語ではメソッドを持つクラスとして公開される。
wrong_answers:
  - これらの辞書は、ターゲット言語のメソッド機能を持たない単純な辞書に変換されます。
  - これらのメソッドは、コールバック・インターフェースを使用して、ターゲット言語で各メソッドを手動で実装する必要があります。
  - これらは自動的に、構造体を最初のパラメータとする名前空間関数に変換される。
explanation: |
  UniFFIは、関連するメソッドを持つRustの構造体をUDLのインターフェースにマッピングすることで、オブジェクト指向のデザインパターンを保持します。これは、KotlinやSwiftのような言語の開発者に馴染みのあるオブジェクト指向インターフェースを提示しながら、元のRust実装の構造的な整合性と動作を維持します。UniFFIは、辞書へのフラット化ではなくメソッドの機能を特に維持し、バインディングが自動生成されるため手動での実装を必要とせず、構造体メソッドを名前空間関数に変換しないため、他の選択肢は正しくありません。
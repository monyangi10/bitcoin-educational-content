question: Что происходит со структурами Rust и связанными с ними методами, когда они отображаются через UDL UniFFI на целевые языки, такие как Kotlin или Swift?
answer: Они раскрываются как интерфейсы в UDL и generate, как классы с методами в объектно-ориентированных целевых языках
wrong_answers:
  - Они преобразуются в простые словари без какой-либо функциональности метода в целевых языках
  - Они требуют ручной реализации каждого метода на целевом языке с использованием интерфейсов обратного вызова
  - Они автоматически преобразуются в функции пространства имен, которые принимают struct в качестве первого параметра
explanation: |
  UniFFI сохраняет объектно-ориентированные паттерны проектирования, отображая структуры Rust со связанными методами на интерфейсы в UDL, которые затем generate как родные классы с методами в целевых языках. Это позволяет сохранить структурную целостность и поведение оригинальной реализации Rust, одновременно представляя знакомые объектно-ориентированные интерфейсы для разработчиков на таких языках, как Kotlin и Swift. Остальные варианты неверны, поскольку UniFFI специально поддерживает функциональность методов, а не сглаживает их до словарей, не требует ручной реализации, поскольку привязки генерируются автоматически, и не преобразует методы struct в функции пространства имен.
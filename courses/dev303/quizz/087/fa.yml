question: هنگامی که ساختارهای Rust با متدهای مرتبط از طریق UDL یونی‌اف‌اف‌آی به زبان‌های هدف مانند کاتلین یا سوئیفت نگاشت می‌شوند، چه اتفاقی می‌افتد؟
answer: آن‌ها به‌عنوان رابط‌ها در UDL و generate به‌عنوان کلاس‌هایی با متدها در زبان‌های هدف شیءگرا نمایش داده می‌شوند.
wrong_answers:
  - آنها به دیکشنری‌های ساده تبدیل می‌شوند بدون هیچ‌گونه عملکرد متدی در زبان‌های هدف
  - آن‌ها نیاز به پیاده‌سازی دستی هر روش در زبان هدف با استفاده از رابط‌های کال‌بک دارند.
  - آن‌ها به‌طور خودکار به توابع فضای نام تبدیل می‌شوند که ساختار را به‌عنوان اولین پارامتر می‌گیرند.
explanation: |
  UniFFI با نگاشت ساختارهای Rust با متدهای مرتبط به رابط‌ها در UDL، الگوهای طراحی شیءگرا را حفظ می‌کند، که سپس generate به عنوان کلاس‌های بومی با متدها در زبان‌های هدف تبدیل می‌شود. این کار یکپارچگی ساختاری و رفتار پیاده‌سازی اصلی Rust را حفظ می‌کند در حالی که رابط‌های شیءگرای آشنا را به توسعه‌دهندگان در زبان‌هایی مانند Kotlin و Swift ارائه می‌دهد. گزینه‌های دیگر نادرست هستند زیرا UniFFI به طور خاص عملکرد متدها را حفظ می‌کند و به جای تبدیل به دیکشنری‌ها، نیازی به پیاده‌سازی دستی ندارد زیرا بایندینگ‌ها به صورت خودکار تولید می‌شوند و متدهای ساختار را به توابع فضای نام تبدیل نمی‌کند.
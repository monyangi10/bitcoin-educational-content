question: What happens to Rust structs with associated methods when they are mapped through UniFFI's UDL to target languages like Kotlin or Swift?
answer: พวกมันถูกเปิดเผยเป็นอินเทอร์เฟซใน UDL และ generate เป็นคลาสที่มีเมธอดในภาษาวัตถุประสงค์ที่มุ่งเน้น
wrong_answers:
  - พวกมันถูกแปลงเป็นพจนานุกรมง่าย ๆ โดยไม่มีฟังก์ชันวิธีการใด ๆ ในภาษาปลายทาง
  - พวกเขาต้องการการดำเนินการด้วยตนเองของแต่ละวิธีในภาษาปลายทางโดยใช้การเชื่อมต่อแบบ callback
  - พวกมันจะถูกแปลงเป็นฟังก์ชัน namespace โดยอัตโนมัติที่รับ struct เป็นพารามิเตอร์แรก
explanation: |
  UniFFI รักษาโครงสร้างการออกแบบเชิงวัตถุโดยการแมปโครงสร้าง Rust พร้อมด้วยเมธอดที่เกี่ยวข้องไปยังอินเทอร์เฟซใน UDL ซึ่งจากนั้น generate เป็นคลาสเนทีฟพร้อมเมธอดในภาษาปลายทาง วิธีนี้จะรักษาความสมบูรณ์ของโครงสร้างและพฤติกรรมของการใช้งาน Rust ดั้งเดิมในขณะที่นำเสนออินเทอร์เฟซเชิงวัตถุที่คุ้นเคยให้กับนักพัฒนาในภาษาต่างๆ เช่น Kotlin และ Swift ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะ UniFFI รักษาฟังก์ชันการทำงานของเมธอดโดยเฉพาะแทนที่จะทำให้แบนเป็นดิกชันนารี ไม่ต้องการการใช้งานด้วยตนเองเนื่องจากการผูกถูกสร้างขึ้นโดยอัตโนมัติ และไม่แปลงเมธอดของโครงสร้างเป็นฟังก์ชันเนมสเปซ
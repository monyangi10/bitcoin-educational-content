question: 当通过 UniFFI 的 UDL 将 Rust 结构与相关方法映射到 Kotlin 或 Swift 等目标语言时，它们会发生什么变化？
answer: 在 UDL 和 generate 中，它们作为接口被暴露出来，在面向对象的目标语言中，它们作为带有方法的类被暴露出来
wrong_answers:
  - 在目标语言中，它们被转换成没有任何方法功能的简单字典
  - 它们要求使用回调接口在目标语言中手动实现每个方法
  - 它们会自动转换为以结构体为第一个参数的命名空间函数
explanation: |
  UniFFI 通过将带有相关方法的 Rust 结构映射为 UDL 中的接口来保留面向对象的设计模式，然后将 generate 映射为目标语言中带有方法的本地类。这既保持了原始 Rust 实现的结构完整性和行为，又为 Kotlin 和 Swift 等语言的开发人员提供了熟悉的面向对象接口。其他选项都不正确，因为 UniFFI 专门维护了方法功能，而不是将其扁平化为字典，由于绑定是自动生成的，因此不需要手动实现，也不会将结构方法转换为命名空间函数。
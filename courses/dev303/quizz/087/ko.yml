question: 관련 메서드가 있는 Rust 구조가 UniFFI의 UDL을 통해 Kotlin 또는 Swift와 같은 대상 언어에 매핑되면 어떻게 되나요?
answer: 이들은 객체 지향 대상 언어의 메서드가 있는 클래스로서 UDL 및 generate에서 인터페이스로 노출됩니다
wrong_answers:
  - 대상 언어의 메서드 기능이 없는 간단한 사전으로 변환됩니다
  - 콜백 인터페이스를 사용하여 대상 언어로 각 메서드를 수동으로 구현해야 합니다
  - 구조체를 첫 번째 매개변수로 사용하는 네임스페이스 함수로 자동 변환됩니다
explanation: |
  UniFFI는 관련 메서드가 있는 Rust 구조를 UDL의 인터페이스에 매핑한 다음, 대상 언어의 메서드가 있는 네이티브 클래스로 generate를 매핑하여 객체 지향 디자인 패턴을 보존합니다. 이렇게 하면 원래 Rust 구현의 구조적 무결성과 동작을 유지하면서 Kotlin 및 Swift와 같은 언어로 개발자에게 친숙한 객체 지향 인터페이스를 제공할 수 있습니다. 다른 옵션은 사전으로 플랫화하지 않고 메서드 기능을 유지하고, 바인딩이 자동 생성되므로 수동 구현이 필요하지 않으며, 구조체 메서드를 네임스페이스 함수로 변환하지 않으므로 올바르지 않습니다.
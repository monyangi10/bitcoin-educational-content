question: 什么关键字用于强制闭包对捕获的变量拥有所有权，而不是借用它们？
answer: 行动
wrong_answers:
  - 拥有
  - 捕捉
  - 从...中获取
explanation: |
  关键字 `move` 用于闭包参数之前，以强制闭包从其环境中获取所有捕获变量的所有权。这在闭包可能超出变量最初定义的作用域（例如生成线程时）的情况下非常重要。如果没有 `move`，闭包通常会采用限制最少的方法（先是不可变引用，然后是可变引用，最后是所有权）来捕获变量，但 `move` 会覆盖这种自动行为，以确保所有权的转移。其他选项（`own`, `capture`, `take`）都不是有效的 Rust 关键字。
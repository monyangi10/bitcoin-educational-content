question: 클로저가 캡처된 변수를 빌리는 대신 소유권을 갖도록 강제하는 데 사용되는 키워드는 무엇인가요?
answer: 이동
wrong_answers:
  - own
  - 캡처
  - take
explanation: |
  'move` 키워드는 클로저 매개변수 앞에 사용되어 클로저가 환경으로부터 캡처된 모든 변수의 소유권을 갖도록 강제합니다. 이는 스레드를 생성할 때와 같이 클로저가 변수가 원래 정의된 범위보다 오래 지속될 수 있는 경우에 필수적입니다. Move`가 없으면 클로저는 일반적으로 가장 제한이 적은 방법(변경 불가능한 참조, 변경 가능한 참조, 소유권)으로 캡처하지만 `move`는 이 자동 동작을 재정의하여 소유권 이전을 보장합니다. 다른 옵션(`own`, `capture`, `take`)은 이 목적에 유효한 Rust 키워드가 아닙니다.
question: 什麼關鍵字用來強制封閉取得所擷取變數的所有權，而不是借用它們？
answer: 移動
wrong_answers:
  - 自己
  - 捕捉
  - 從...中獲取
explanation: |
  關鍵字 `move` 用於閉包參數之前，以強制閉包從其環境中取得所有擷取變數的所有權。當閉包可能會超越變數最初定義的範圍時，這是非常重要的，例如當產生線程時。如果沒有 `move`，閉包通常會以限制最少的方法來擷取 (先是不可變的參照，然後是可變的參照，最後是擁有權)，但是 `move` 會覆寫這個自動的行為，以確保擁有權的轉移。其他的選項 (`own`、`capture`、`take`) 在這個用途上並不是有效的 Rust 關鍵字。
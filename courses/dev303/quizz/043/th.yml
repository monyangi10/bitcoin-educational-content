question: "`move`"
answer: "ย้าย"
wrong_answers:
  - "เป็นเจ้าของ"
  - "จับภาพ"
  - "ใช้"
explanation: |
  คีย์เวิร์ด `move` ถูกใช้ก่อนพารามิเตอร์ของ closure เพื่อบังคับให้ closure รับสิทธิ์ความเป็นเจ้าของของตัวแปรทั้งหมดที่ถูกจับจากสภาพแวดล้อมของมัน นี่เป็นสิ่งจำเป็นเมื่อ closure อาจมีอายุยืนยาวกว่าขอบเขตที่ตัวแปรถูกกำหนดขึ้นในตอนแรก เช่น เมื่อสร้างเธรดใหม่ หากไม่มี `move` closure มักจะจับโดยวิธีที่มีข้อจำกัดน้อยที่สุด (การอ้างอิงแบบไม่เปลี่ยนแปลง, การอ้างอิงแบบเปลี่ยนแปลง, แล้วจึงความเป็นเจ้าของ) แต่ `move` จะลบล้างพฤติกรรมอัตโนมัตินี้เพื่อให้แน่ใจว่ามีการโอนสิทธิ์ความเป็นเจ้าของ ตัวเลือกอื่นๆ (`own`, `capture`, `take`) ไม่ใช่คีย์เวิร์ด Rust ที่ถูกต้องสำหรับวัตถุประสงค์นี้

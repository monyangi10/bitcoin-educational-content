question: Коя ключова дума се използва, за да принуди затварянето да поеме собствеността върху завладените променливи, вместо да ги заема?
answer: преместване
wrong_answers:
  - собствен
  - заснемане
  - вземете
explanation: |
  Ключовата дума `move` се използва преди параметрите на затварянето, за да принуди затварянето да поеме собствеността върху всички заснети променливи от неговата среда. Това е от съществено значение, когато затварянето може да надхвърли обхвата, в който променливите са били първоначално дефинирани, например при създаване на нишки. Без `move` затварянето обикновено заснема променливите по най-малко рестриктивния метод (неизменна референция, след това променлива референция, след това собственост), но `move` отменя това автоматично поведение, за да осигури прехвърляне на собствеността. Другите опции (`own`, `capture`, `take`) не са валидни ключови думи на Rust за тази цел.
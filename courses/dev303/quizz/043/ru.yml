question: Какое ключевое слово используется для того, чтобы заставить закрытие принять права собственности на захваченные переменные, а не заимствовать их?
answer: перейти
wrong_answers:
  - собственный
  - захват
  - взять
explanation: |
  Ключевое слово `move` используется перед параметрами закрытия, чтобы заставить закрытие принять права собственности на все захваченные переменные из своего окружения. Это необходимо, когда закрытие может выйти за пределы области, в которой переменные были изначально определены, например, при порождении потоков. Без `move` закрытия обычно захватывают переменные наименее ограничительным методом (неизменяемая ссылка, затем мутабельная ссылка, затем право собственности), но `move` отменяет это автоматическое поведение, чтобы обеспечить передачу права собственности. Другие опции (`own`, `capture`, `take`) не являются допустимыми ключевыми словами Rust для этой цели.
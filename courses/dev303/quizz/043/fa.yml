question: کلمه کلیدی که برای مجبور کردن یک closure به مالکیت متغیرهای گرفته شده به جای قرض گرفتن آنها استفاده می‌شود چیست؟
answer: حرکت دادن
wrong_answers:
  - خود
  - گرفتن
  - بگیر
explanation: |
  کلمه کلیدی `move` قبل از پارامترهای closure استفاده می‌شود تا closure را مجبور کند مالکیت تمام متغیرهای گرفته شده از محیط خود را به دست آورد. این امر زمانی ضروری است که closure ممکن است بیشتر از محدوده‌ای که متغیرها در آن ابتدا تعریف شده‌اند، زنده بماند، مانند زمانی که رشته‌ها را ایجاد می‌کنید. بدون `move`، closureها معمولاً با کمترین روش محدودکننده (ارجاع غیرقابل تغییر، سپس ارجاع قابل تغییر، سپس مالکیت) متغیرها را می‌گیرند، اما `move` این رفتار خودکار را لغو می‌کند تا انتقال مالکیت را تضمین کند. گزینه‌های دیگر (`own`, `capture`, `take`) کلمات کلیدی معتبر Rust برای این منظور نیستند.
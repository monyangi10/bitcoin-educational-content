question: クロージャが変数を借用する代わりに、その変数の所有権を強制的に取得するにはどのキーワードを使うか？
answer: 動く
wrong_answers:
  - 所有する
  - 捕獲
  - 取る
explanation: |
  move`キーワードはクロージャパラメータの前に使用し、クロージャが環境からキャプチャした変数をすべて所有するようにします。これは、スレッドを生成するときなど、変数が元々定義されていたスコープよりもクロージャが長生きする可能性がある場合に重要です。move` がない場合、クロージャは通常最も制限の少ない方法（不変参照、 変数参照、所有権の順）でキャプチャを行いますが、 `move` はこの自動的な動作を上書きし、確実に所有権を移譲します。他のオプション（`own`, `capture`, `take`）は、この目的のために有効なRustキーワードではない。
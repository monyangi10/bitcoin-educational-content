question: कैप्चर किए गए वेरिएबल्स को उधार लेने के बजाय क्लोजर को उनका स्वामित्व लेने के लिए बाध्य करने के लिए किस कीवर्ड का उपयोग किया जाता है?
answer: कदम
wrong_answers:
  - अपना
  - कब्जा
  - लेना
explanation: |
  क्लोज़र पैरामीटर से पहले `move` कीवर्ड का उपयोग क्लोज़र को उसके वातावरण से सभी कैप्चर किए गए वैरिएबल का स्वामित्व लेने के लिए बाध्य करने के लिए किया जाता है। यह तब आवश्यक होता है जब क्लोज़र उस स्कोप से बाहर निकल सकता है जहां वैरिएबल मूल रूप से परिभाषित किए गए थे, जैसे कि थ्रेड बनाते समय। `move` के बिना, क्लोज़र आमतौर पर सबसे कम प्रतिबंधात्मक विधि (अपरिवर्तनीय संदर्भ, फिर परिवर्तनीय संदर्भ, फिर स्वामित्व) द्वारा कैप्चर करते हैं, लेकिन `move` स्वामित्व हस्तांतरण सुनिश्चित करने के लिए इस स्वचालित व्यवहार को ओवरराइड करता है। अन्य विकल्प (`own`, `capture`, `take`) इस उद्देश्य के लिए मान्य Rust कीवर्ड नहीं हैं।
question: 根據 Rust 最佳實務，在 Bitcoin 應用程式開發中斷言的主要作用是什麼？
answer: 在測試期間捕捉錯誤、在問題發生時導致程式早期失敗，並作為程式設計師假設的可執行文件
wrong_answers:
  - 以優雅的方式處理執行時的資源錯誤，例如檔案存取失敗和網路連線問題
  - 將低階程式庫錯誤轉化成使用者可以理解並採取行動的高階應用程式錯誤
  - 限制功能參數只接受有效範圍內的值，以防止無效的輸入錯誤
explanation: |
  在穩健的 Bitcoin 軟體開發中，断言有三個關鍵功能：在測試階段捕捉錯誤、確保程式在違反基本假設時及早失敗（使除錯更容易），以及作為可執行文件，描述程式設計師對程式狀態的期望。其他選項描述了不同的錯誤處理策略 - 外部資源故障的優雅處理、抽象層之間的錯誤轉換，以及輸入驗證 - 這些都很重要，但有別於断言在驗證內部程式假設的特定角色。
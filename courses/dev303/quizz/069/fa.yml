question: نقش اصلی ادعاها در توسعه برنامه Bitcoin طبق بهترین شیوه‌های Rust چیست؟
answer: برای شناسایی باگ‌ها در طول تست، ایجاد خرابی زودهنگام برنامه هنگام بروز مشکلات، و به عنوان مستندات اجرایی فرضیات برنامه‌نویس خدمت کند
wrong_answers:
  - برای مدیریت خطاهای منابع زمان اجرا مانند شکست‌های دسترسی به فایل و مشکلات اتصال شبکه به صورت مؤدبانه
  - برای ترجمه خطاهای سطح پایین کتابخانه به خطاهای سطح بالای برنامه که کاربران می‌توانند آن‌ها را درک کرده و بر اساس آن‌ها عمل کنند
  - برای جلوگیری از خطاهای ورودی نامعتبر با محدود کردن پارامترهای تابع به پذیرش فقط مقادیر در محدوده‌های معتبر
explanation: |
  اظهارات سه عملکرد حیاتی در توسعه نرم‌افزار قوی Bitcoin دارند: آنها باگ‌ها را در مرحله آزمایش شناسایی می‌کنند، اطمینان حاصل می‌کنند که برنامه‌ها در صورت نقض فرضیات اساسی زودتر شکست می‌خورند (که اشکال‌زدایی را آسان‌تر می‌کند)، و به عنوان مستندات اجرایی عمل می‌کنند که انتظارات برنامه‌نویس درباره وضعیت برنامه را توصیف می‌کنند. گزینه‌های دیگر استراتژی‌های مختلف مدیریت خطا را توصیف می‌کنند - مدیریت مؤدبانه شکست‌های منابع خارجی، ترجمه خطا بین لایه‌های انتزاعی، و اعتبارسنجی ورودی - که مهم هستند اما از نقش خاص اظهارات در تأیید فرضیات داخلی برنامه متمایز هستند.
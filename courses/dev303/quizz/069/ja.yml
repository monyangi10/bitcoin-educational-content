question: Rustのベストプラクティスに従って、Bitcoinのアプリケーション開発におけるアサーションの主な役割は何ですか？
answer: テスト中にバグをキャッチし、問題が発生したときに早期にプログラムを失敗させ、プログラマーの仮定を実行可能な文書として提供する。
wrong_answers:
  - ファイルアクセスの失敗やネットワーク接続の問題など、ランタイムリソースのエラーを優雅に処理する。
  - 低レベルのライブラリエラーを、ユーザーが理解し対処できる高レベルのアプリケーションエラーに変換する。
  - 関数のパラメータが有効な範囲内の値しか受け付けないように制限することで、無効な入力エラーを防ぐ。
explanation: |
  アサーションは、堅牢なBitcoinソフトウェア開発において3つの重要な機能を果たす。すなわち、テスト段階でバグを捕捉すること、基本的な仮定に違反した場合にプログラムが早期に失敗することを保証すること（デバッグを容易にする）、そして、プログラム状態に関するプログラマの期待値を記述する実行可能な文書として機能することである。他の選択肢は、外部リソース障害の優雅な処理、抽象化レイヤ間のエラー変換、入力検証など、さまざまなエラー処理戦略を記述している。これらは重要であるが、プログラム内部の前提条件を検証するアサーションの特定の役割とは異なる。
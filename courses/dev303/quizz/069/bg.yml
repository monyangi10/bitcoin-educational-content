question: Каква е основната роля на твърденията в разработката на приложения Bitcoin според най-добрите практики на Rust?
answer: Да улавя грешки по време на тестването, да предизвиква ранен провал на програмата при възникване на проблеми и да служи като изпълнима документация на предположенията на програмиста
wrong_answers:
  - Обработване на грешки в ресурсите по време на изпълнение, като например неуспешен достъп до файлове и проблеми с мрежовата свързаност, по естествен начин
  - Превръщане на библиотечните грешки на ниско ниво в грешки на приложенията на високо ниво, които потребителите могат да разберат и да предприемат действия
  - Предотвратяване на невалидни грешки при въвеждане чрез ограничаване на параметрите на функциите да приемат стойности само в рамките на валидни диапазони
explanation: |
  Твърденията изпълняват три критични функции при разработката на надежден софтуер Bitcoin: те откриват грешки по време на фазата на тестване, гарантират, че програмите се провалят рано, когато се нарушат основни предположения (което улеснява отстраняването на грешки), и действат като изпълнима документация, която описва очакванията на програмиста относно състоянието на програмата. Другите варианти описват различни стратегии за обработка на грешки - грациозна обработка на сривове на външни ресурси, превод на грешки между слоевете на абстракция и проверка на входните данни - които са важни, но се различават от специфичната роля на твърденията за проверка на вътрешните допускания на програмата.
question: Какова основная роль утверждений в разработке приложений Bitcoin в соответствии с лучшими практиками Rust?
answer: Вылавливать ошибки во время тестирования, приводить к раннему отказу программы при возникновении проблем и служить исполняемой документацией предположений программиста
wrong_answers:
  - Для изящной обработки ошибок ресурсов во время выполнения, таких как сбои доступа к файлам и проблемы с сетевым подключением
  - Перевод низкоуровневых ошибок библиотеки в высокоуровневые ошибки приложения, которые пользователи могут понять и принять соответствующие меры
  - Чтобы предотвратить ошибки ввода недопустимых значений, ограничьте параметры функции, чтобы они принимали значения только в допустимых диапазонах
explanation: |
  Утверждения выполняют три важнейшие функции при разработке надежного программного обеспечения Bitcoin: они отлавливают ошибки на этапе тестирования, обеспечивают ранний отказ программ при нарушении фундаментальных предположений (что облегчает отладку) и выступают в качестве исполняемой документации, описывающей ожидания программиста относительно состояния программы. Другие варианты описывают различные стратегии обработки ошибок - изящную обработку отказов внешних ресурсов, трансляцию ошибок между уровнями абстракции и проверку ввода - которые важны, но отличаются от специфической роли утверждений в проверке внутренних предположений программы.
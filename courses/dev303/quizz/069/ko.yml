question: Rust 모범 사례에 따르면 Bitcoin 애플리케이션 개발에서 어설션의 주요 역할은 무엇인가요?
answer: 테스트 중 버그를 포착하고, 문제 발생 시 프로그램 오류를 조기에 발견하며, 프로그래머의 가정에 대한 실행 가능한 문서 역할을 합니다
wrong_answers:
  - 파일 액세스 실패 및 네트워크 연결 문제와 같은 런타임 리소스 오류를 원활하게 처리하려면 다음과 같이 하세요
  - 낮은 수준의 라이브러리 오류를 사용자가 이해하고 조치할 수 있는 높은 수준의 애플리케이션 오류로 변환하려면 다음과 같이 하세요
  - 함수 매개변수가 유효한 범위 내의 값만 허용하도록 제한하여 잘못된 입력 오류를 방지하려면 다음과 같이 하세요
explanation: |
  어설션은 테스트 단계에서 버그를 잡아내고, 기본 가정을 위반할 때 프로그램이 조기에 실패하도록 하며(디버깅을 더 쉽게 함), 프로그램 상태에 대한 프로그래머의 기대치를 설명하는 실행 문서 역할을 하는 등 강력한 Bitcoin 소프트웨어 개발에서 세 가지 중요한 기능을 수행합니다. 다른 옵션은 외부 리소스 오류의 우아한 처리, 추상화 계층 간의 오류 변환, 입력 유효성 검사 등 다양한 오류 처리 전략을 설명하며, 이는 중요하지만 내부 프로그램 가정을 검증하는 어설션의 구체적인 역할과는 구별됩니다.
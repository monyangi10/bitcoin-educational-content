question: 根据 Rust 最佳实践，断言在 Bitcoin 应用程序开发中的主要作用是什么？
answer: 在测试过程中捕捉错误，在出现问题时导致程序提前失效，并作为程序员假设的可执行文档
wrong_answers:
  - 以优雅的方式处理运行时资源错误，如文件访问失败和网络连接问题
  - 将低级程序库错误转化为高级应用程序错误，以便用户理解并采取行动
  - 通过限制功能参数只接受有效范围内的值，防止出现无效输入错误
explanation: |
  断言在稳健的 Bitcoin 软件开发中具有三个关键功能：在测试阶段捕捉错误；确保程序在违反基本假设时及早失败（使调试更容易）；充当可执行文档，描述程序员对程序状态的期望。其他选项描述了不同的错误处理策略--外部资源故障的优美处理、抽象层之间的错误转换和输入验证--这些都很重要，但有别于断言在验证内部程序假设方面的特殊作用。
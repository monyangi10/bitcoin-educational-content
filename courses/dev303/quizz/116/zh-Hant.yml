question: Breez SDK的互操作性功能允許多個應用程式使用相同的seed短語連接到同一個Lightning節點，它的主要優勢是什麼？
answer: 用戶可在不同的專門應用程式中維持單一的 Lightning 結餘，同時避免管理多個 Lightning 節點的複雜性
wrong_answers:
  - 應用程式之間可直接共用私密金鑰，無需使用者介入即可進行無縫的跨應用程式交易簽署
  - 多個應用程式可將其流動資金匯集在一起，建立更大的 Lightning 通道，增加網路的路由能力
  - 開發人員可以存取共用的 Lightning 基礎架構，而無需執行自己的節點管理，從而降低開發成本和複雜性
explanation: |
  SDK 的互操作性允許用戶從多個專門應用程式（如一般 wallet 和播客應用程式）存取相同的 Lightning 節點和資金，而無需管理獨立的餘額或節點。錯誤的答案歪曲了架構：私鑰永遠不會離開使用者的裝置，也不會在應用程式之間共用；流動資金池並非系統的運作方式；雖然開發者確實可以從簡化的基礎架構中獲益，但所述的主要優勢是跨應用程式的統一使用者體驗。
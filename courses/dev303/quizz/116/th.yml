question: ข้อได้เปรียบหลักของฟีเจอร์การทำงานร่วมกันของ Breez SDK ที่อนุญาตให้แอปพลิเคชันหลายตัวเชื่อมต่อกับโหนด Lightning เดียวกันโดยใช้วลี seed เดียวกันคืออะไร?
answer: ผู้ใช้สามารถรักษายอดคงเหลือ Lightning เดียวในแอปพลิเคชันเฉพาะทางต่าง ๆ ในขณะที่หลีกเลี่ยงความซับซ้อนของการจัดการโหนด Lightning หลายตัว
wrong_answers:
  - แอปพลิเคชันสามารถแชร์คีย์ส่วนตัวระหว่างกันได้โดยตรง ทำให้สามารถลงนามธุรกรรมข้ามแอปได้อย่างราบรื่นโดยไม่ต้องมีการแทรกแซงจากผู้ใช้
  - แอปพลิเคชันหลายตัวสามารถรวมสภาพคล่องของพวกเขาเข้าด้วยกันเพื่อสร้างช่องทาง Lightning ที่ใหญ่ขึ้นด้วยความสามารถในการกำหนดเส้นทางที่เพิ่มขึ้นสำหรับเครือข่าย
  - นักพัฒนาสามารถเข้าถึงโครงสร้างพื้นฐาน Lightning ที่ใช้ร่วมกันได้โดยไม่ต้องจัดการโหนดของตนเอง ลดต้นทุนและความซับซ้อนในการพัฒนา
explanation: |
  ความสามารถในการทำงานร่วมกันของ SDK ช่วยให้ผู้ใช้สามารถเข้าถึงโหนด Lightning และเงินทุนเดียวกันจากแอปเฉพาะทางหลายแอป (เช่น wallet ทั่วไปและแอปพอดแคสต์) โดยไม่ต้องจัดการยอดคงเหลือหรือโหนดแยกต่างหาก คำตอบที่ผิดแสดงสถาปัตยกรรมผิด: คีย์ส่วนตัวไม่เคยออกจากอุปกรณ์ของผู้ใช้และไม่ได้แชร์ระหว่างแอป การรวมสภาพคล่องไม่ใช่วิธีการทำงานของระบบ และแม้ว่านักพัฒนาจะได้รับประโยชน์จากโครงสร้างพื้นฐานที่เรียบง่าย แต่ข้อได้เปรียบหลักที่อธิบายไว้คือประสบการณ์ผู้ใช้ที่เป็นหนึ่งเดียวกันในแอปพลิเคชันต่างๆ
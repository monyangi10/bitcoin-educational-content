question: 複数のアプリケーションが同じseedフレーズを使用して同じライトニング・ノードに接続できるBreez SDKの相互運用性機能の主な利点は何ですか？
answer: ユーザーは、複数のLightningノードを管理する複雑さを回避しながら、異なる専用アプリケーション間で単一のLightning残高を維持することができます。
wrong_answers:
  - アプリケーション間で秘密鍵を直接共有できるため、ユーザーの介入なしにシームレスなアプリケーション間トランザクションの署名が可能。
  - 複数のアプリケーションが流動性をプールすることで、ネットワークのルーティング容量を増やし、より大きなライトニング・チャンネルを作ることができる。
  - 開発者は、独自のノード管理を実装することなく、共有のLightningインフラストラクチャにアクセスでき、開発コストと複雑さを軽減できる。
explanation: |
  SDKの相互運用性により、ユーザーは複数の専用アプリ（一般的なwalletとポッドキャスティングアプリなど）から、別々の残高やノードを管理することなく、同じLightningノードと資金にアクセスできる。秘密鍵はユーザーのデバイスから離れることはなく、アプリ間で共有されることもない。流動性プーリングはシステムの仕組みではない。開発者は簡素化されたインフラから恩恵を受けるが、説明されている主な利点はアプリケーション間で統一されたユーザーエクスペリエンスである。
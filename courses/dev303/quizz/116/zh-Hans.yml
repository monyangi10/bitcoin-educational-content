question: Breez SDK的互操作性功能允许多个应用程序使用同一个seed短语连接到同一个Lightning节点，该功能的主要优势是什么？
answer: 用户可以在不同的专业应用中保持单一的 Lightning 余额，同时避免管理多个 Lightning 节点的复杂性
wrong_answers:
  - 应用程序之间可直接共享私钥，实现无缝跨应用程序交易签名，无需用户干预
  - 多个应用程序可将其流动资金汇集在一起，创建更大的闪电通道，提高网络的路由能力
  - 开发人员可以访问共享的 Lightning 基础设施，而无需实施自己的节点管理，从而降低开发成本和复杂性
explanation: |
  SDK 的互操作性允许用户从多个专用应用程序（如通用 wallet 和播客应用程序）访问同一个 Lightning 节点和资金，而无需管理单独的余额或节点。错误的答案歪曲了架构：私钥从未离开用户的设备，也不会在应用程序之间共享；流动资金池不是系统的工作原理；虽然开发人员确实能从简化的基础设施中受益，但所述的主要优势是跨应用程序的统一用户体验。
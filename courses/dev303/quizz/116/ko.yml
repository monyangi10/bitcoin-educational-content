question: 여러 애플리케이션이 동일한 seed 문구를 사용하여 동일한 라이트닝 노드에 연결할 수 있는 Breez SDK의 상호 운용성 기능의 주요 장점은 무엇인가요?
answer: 사용자는 여러 라이트닝 노드를 관리하는 복잡성을 피하면서 여러 전문 애플리케이션에서 단일 라이트닝 밸런스를 유지할 수 있습니다
wrong_answers:
  - 애플리케이션 간에 직접 개인 키를 공유할 수 있어 사용자 개입 없이 원활한 앱 간 트랜잭션 서명이 가능합니다
  - 여러 애플리케이션이 유동성을 함께 풀링하여 네트워크의 라우팅 용량을 늘려 더 큰 규모의 라이트닝 채널을 만들 수 있습니다
  - 개발자는 자체 노드 관리를 구현하지 않고도 공유 Lightning 인프라에 액세스할 수 있으므로 개발 비용과 복잡성을 줄일 수 있습니다
explanation: |
  SDK의 상호운용성을 통해 사용자는 별도의 잔액이나 노드를 관리하지 않고도 여러 특수 앱(예: 일반 wallet와 팟캐스팅 앱)에서 동일한 라이트닝 노드와 자금에 액세스할 수 있습니다. 오답은 아키텍처를 잘못 설명한 것입니다. 개인 키는 사용자의 기기를 떠나지 않으며 앱 간에 공유되지 않고, 유동성 풀링은 시스템 작동 방식이 아니며, 개발자는 간소화된 인프라의 이점을 누릴 수 있지만, 설명된 주요 장점은 애플리케이션 전반에서 통합된 사용자 경험이라는 것입니다.
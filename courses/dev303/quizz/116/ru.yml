question: В чем основное преимущество функции функциональной совместимости Breez SDK, которая позволяет нескольким приложениям подключаться к одному узлу Lightning, используя одну и ту же фразу seed?
answer: Пользователи могут поддерживать единый баланс Lightning в различных специализированных приложениях, избегая сложности управления несколькими узлами Lightning
wrong_answers:
  - Приложения могут напрямую обмениваться закрытыми ключами между собой, обеспечивая беспрепятственное подписание транзакций между приложениями без вмешательства пользователя
  - Несколько приложений могут объединять свои ликвидные средства для создания более крупных каналов Lightning с увеличенной пропускной способностью сети
  - Разработчики могут получить доступ к общей инфраструктуре Lightning, не прибегая к собственному управлению узлами, что снижает затраты и сложность разработки
explanation: |
  Взаимодействие SDK позволяет пользователям получать доступ к одному и тому же узлу Lightning и средствам из нескольких специализированных приложений (например, общего wallet и приложения для подкастинга) без управления отдельными балансами или узлами. Неправильные ответы искажают архитектуру: приватные ключи никогда не покидают устройство пользователя и не передаются между приложениями, объединение ликвидности не является принципом работы системы, и хотя разработчики получают выгоду от упрощения инфраструктуры, основное преимущество, о котором говорится, - это единый пользовательский опыт в приложениях.
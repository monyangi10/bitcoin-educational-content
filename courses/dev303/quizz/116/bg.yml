question: Какво е основното предимство на функцията за оперативна съвместимост на Breez SDK, която позволява на множество приложения да се свързват към един и същ възел Lightning, използвайки една и съща фраза seed?
answer: Потребителите могат да поддържат един-единствен баланс на Lightning в различни специализирани приложения, като избягват сложността на управлението на множество възли на Lightning
wrong_answers:
  - Приложенията могат да споделят частни ключове директно помежду си, което позволява безпроблемно подписване на транзакции между приложенията без намесата на потребителя
  - Няколко приложения могат да обединят ликвидността си, за да създадат по-големи канали за светкавици с увеличен капацитет за маршрутизиране в мрежата
  - Разработчиците имат достъп до споделена инфраструктура на Lightning, без да прилагат собствено управление на възли, което намалява разходите за разработка и сложността
explanation: |
  Оперативната съвместимост на SDK позволява на потребителите да имат достъп до един и същ възел на Lightning и до средства от няколко специализирани приложения (например общо приложение wallet и приложение за подкастинг), без да управляват отделни баланси или възли. Неправилните отговори представят архитектурата погрешно: частните ключове никога не напускат устройството на потребителя и не се споделят между приложенията, обединяването на ликвидност не е начинът, по който работи системата, и макар че разработчиците се възползват от опростената инфраструктура, основното описано предимство е унифицираното потребителско изживяване във всички приложения.
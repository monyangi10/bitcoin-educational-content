question: Breez SDK की इंटरऑपरेबिलिटी सुविधा का प्राथमिक लाभ क्या है जो कई अनुप्रयोगों को एक ही seed वाक्यांश का उपयोग करके एक ही लाइटनिंग नोड से कनेक्ट करने की अनुमति देता है?
answer: उपयोगकर्ता विभिन्न विशिष्ट अनुप्रयोगों में एक ही लाइटनिंग बैलेंस बनाए रख सकते हैं, जिससे कई लाइटनिंग नोड्स को प्रबंधित करने की जटिलता से बचा जा सकता है।
wrong_answers:
  - एप्लिकेशन आपस में सीधे निजी कुंजी साझा कर सकते हैं, जिससे उपयोगकर्ता के हस्तक्षेप के बिना निर्बाध क्रॉस-ऐप लेनदेन हस्ताक्षर संभव हो जाता है।
  - कई एप्लिकेशन अपनी लिक्विडिटी को एक साथ मिलाकर बड़े लाइटनिंग चैनल बना सकते हैं, जिससे नेटवर्क के लिए रूटिंग क्षमता बढ़ जाती है।
  - डेवलपर्स अपने स्वयं के नोड प्रबंधन को लागू किए बिना साझा लाइटनिंग इन्फ्रास्ट्रक्चर तक पहुंच सकते हैं, जिससे विकास लागत और जटिलता कम हो जाती है।
explanation: |
  SDK की इंटरऑपरेबिलिटी उपयोगकर्ताओं को अलग-अलग बैलेंस या नोड्स को मैनेज किए बिना कई विशिष्ट ऐप्स (जैसे कि एक सामान्य wallet और एक पॉडकास्टिंग ऐप) से एक ही लाइटनिंग नोड और फंड तक पहुंचने की अनुमति देती है। गलत उत्तर आर्किटेक्चर को गलत तरीके से प्रस्तुत करते हैं: निजी कुंजी कभी भी उपयोगकर्ता के डिवाइस से बाहर नहीं जाती और ऐप्स के बीच साझा नहीं की जाती, लिक्विडिटी पूलिंग सिस्टम के काम करने का तरीका नहीं है, और हालांकि डेवलपर्स को सरलीकृत इंफ्रास्ट्रक्चर से लाभ होता है, वर्णित प्राथमिक लाभ सभी एप्लिकेशन में एकीकृत उपयोगकर्ता अनुभव है।
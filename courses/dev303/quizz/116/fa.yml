question: مزیت اصلی ویژگی قابلیت همکاری Breez SDK که به برنامه‌های متعدد اجازه می‌دهد با استفاده از همان عبارت seed به یک نود Lightning متصل شوند چیست؟
answer: کاربران می‌توانند یک موجودی لایتنینگ واحد را در برنامه‌های تخصصی مختلف حفظ کنند و در عین حال از پیچیدگی مدیریت چندین نود لایتنینگ اجتناب کنند.
wrong_answers:
  - برنامه‌ها می‌توانند کلیدهای خصوصی را مستقیماً بین یکدیگر به اشتراک بگذارند و امضای تراکنش بین برنامه‌ای را بدون دخالت کاربر امکان‌پذیر کنند.
  - برنامه‌های متعدد می‌توانند نقدینگی خود را با هم ترکیب کنند تا کانال‌های لایتنینگ بزرگتری با ظرفیت مسیریابی بیشتر برای شبکه ایجاد کنند.
  - توسعه‌دهندگان می‌توانند به زیرساخت مشترک Lightning دسترسی پیدا کنند بدون اینکه نیاز به پیاده‌سازی مدیریت نود خود داشته باشند، که این امر هزینه‌ها و پیچیدگی توسعه را کاهش می‌دهد.
explanation: |
  قابلیت همکاری SDK به کاربران اجازه می‌دهد تا به همان نود و وجوه Lightning از چندین اپلیکیشن تخصصی (مانند یک wallet عمومی و یک اپلیکیشن پادکست) دسترسی داشته باشند بدون اینکه نیاز به مدیریت موجودی‌ها یا نودهای جداگانه داشته باشند. پاسخ‌های نادرست معماری را نادرست نشان می‌دهند: کلیدهای خصوصی هرگز دستگاه کاربر را ترک نمی‌کنند و بین اپلیکیشن‌ها به اشتراک گذاشته نمی‌شوند، تجمیع نقدینگی نحوه کار سیستم نیست، و در حالی که توسعه‌دهندگان از زیرساخت ساده‌شده بهره‌مند می‌شوند، مزیت اصلی توصیف‌شده تجربه کاربری یکپارچه در سراسر اپلیکیشن‌ها است.
question: مزیت اصلی استفاده از دستور `cargo expand` هنگام توسعه ماکروهای پیچیده در Rust چیست؟
answer: این کد کاملاً توسعه‌یافته‌ای را که توسط فراخوانی‌های ماکرو تولید شده است، نمایش می‌دهد و به توسعه‌دهندگان اجازه می‌دهد تا خروجی تولید شده را تأیید کرده و مشکلات را اشکال‌زدایی کنند.
wrong_answers:
  - این به‌طور خودکار عملکرد ماکرو را با کاهش زمان کامپایل و حذف شاخه‌های تطبیق الگوی زائد بهینه می‌کند.
  - در زمان اجرا، نحو ماکرو را اعتبارسنجی می‌کند و بررسی خطای بلادرنگ برای اعتبارسنجی آرگومان‌های پویا ماکرو ارائه می‌دهد.
  - این به‌طور خودکار ماکروهای شبیه به تابع را به ماکروهای مشتق تبدیل می‌کند و قابلیت استفاده مجدد از کد و کارایی پیاده‌سازی ویژگی‌ها را بهبود می‌بخشد.
explanation: |
  دستور `cargo expand` برای توسعه ماکرو بسیار ارزشمند است زیرا کد واقعی که ماکروها generate در زمان کامپایل تولید می‌کنند را نشان می‌دهد. از آنجا که ماکروها در زمان کامپایل عمل می‌کنند و الگوهای ورودی را به کد تولید شده تبدیل می‌کنند، توسعه‌دهندگان نیاز دارند تا این خروجی گسترش‌یافته را ببینند تا اطمینان حاصل کنند که ماکروهایشان به درستی کار می‌کنند. این امر به ویژه زمانی که کد تولید شده توسط ماکرو حاوی خطا باشد، حیاتی است، زیرا خروجی گسترش‌یافته کمک می‌کند تا مشخص شود که آیا مشکلات از تعریف ماکرو ناشی می‌شوند یا از ساختار کد تولید شده. گزینه‌های دیگر نادرست هستند زیرا `cargo expand` صرفاً یک ابزار اشکال‌زدایی و بازرسی است - این ابزار عملکرد را بهینه نمی‌کند، رفتار زمان اجرا را اعتبارسنجی نمی‌کند، یا به طور خودکار بین انواع ماکرو تبدیل نمی‌کند.
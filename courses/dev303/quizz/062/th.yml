question: ข้อได้เปรียบหลักของการใช้คำสั่ง `cargo expand` เมื่อพัฒนามาโครที่ซับซ้อนใน Rust คืออะไร?
answer: จะแสดงโค้ดที่ขยายเต็มที่ซึ่งสร้างขึ้นโดยการเรียกใช้แมโคร ช่วยให้นักพัฒนาสามารถตรวจสอบผลลัพธ์ที่สร้างขึ้นและแก้ไขปัญหาได้
wrong_answers:
  - มันจะเพิ่มประสิทธิภาพของมาโครโดยอัตโนมัติด้วยการลดเวลาในการคอมไพล์และกำจัดสาขาการจับคู่รูปแบบที่ซ้ำซ้อน
  - มันตรวจสอบความถูกต้องของไวยากรณ์มาโครในขณะรันไทม์และให้การตรวจสอบข้อผิดพลาดแบบเรียลไทม์สำหรับการตรวจสอบความถูกต้องของอาร์กิวเมนต์มาโครแบบไดนามิก
  - มันแปลงมาโครที่คล้ายฟังก์ชันให้เป็นมาโครอนุพันธ์โดยอัตโนมัติ ช่วยปรับปรุงการนำโค้ดกลับมาใช้ใหม่และประสิทธิภาพในการใช้งานคุณลักษณะ
explanation: |
  คำสั่ง `cargo expand` มีคุณค่ามากสำหรับการพัฒนามาโครเพราะมันเปิดเผยโค้ดจริงที่มาโคร generate ระหว่างการคอมไพล์ เนื่องจากมาโครทำงานในช่วงเวลา compile-time และแปลงรูปแบบอินพุตเป็นโค้ดที่สร้างขึ้น นักพัฒนาจำเป็นต้องดูผลลัพธ์ที่ขยายนี้เพื่อยืนยันว่ามาโครของพวกเขาทำงานถูกต้อง นี่เป็นสิ่งสำคัญอย่างยิ่งเมื่อโค้ดที่สร้างจากมาโครมีข้อผิดพลาด เนื่องจากผลลัพธ์ที่ขยายช่วยกำหนดว่าปัญหามาจากการกำหนดมาโครเองหรือโครงสร้างของโค้ดที่สร้างขึ้น ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะ `cargo expand` เป็นเครื่องมือสำหรับการดีบักและการตรวจสอบเท่านั้น - มันไม่ได้เพิ่มประสิทธิภาพการทำงาน ตรวจสอบพฤติกรรม runtime หรือแปลงระหว่างประเภทมาโครโดยอัตโนมัติ
question: Rustで複雑なマクロを開発する場合、`cargo expand`コマンドを使う主な利点は何ですか？
answer: マクロの呼び出しによって生成されたコードを完全に展開して表示するため、開発者は生成された出力を確認したり、問題をデバッグしたりすることができる。
wrong_answers:
  - コンパイル時間を短縮し、冗長なパターンマッチング分岐を排除することで、マクロのパフォーマンスを自動的に最適化します。
  - 実行時にマクロ構文を検証し、動的なマクロ引数検証のためのリアルタイムのエラーチェックを提供します。
  - 関数のようなマクロを自動的に派生マクロに変換し、コードの再利用性と特性の実装効率を向上させます。
explanation: |
  cargo expand` コマンドは、マクロのコンパイル時にマクロが generate で生成した実際のコードを表示するため、マクロの開発にとって非常に貴重なコマンドです。マクロはコンパイル時に動作し、入力パターンを生成されたコードに変換するので、開発者はマクロが正しく動作することを確認するために、この展開された出力を見る必要があります。これは、マクロが生成したコードにエラーが含まれている場合に特に重要である。拡張出力は、問題がマクロ定義そのものに起因するのか、生成されたコードの構造に起因するのかを判断するのに役立つからである。なぜなら `cargo expand` は純粋にデバッグと検査のためのツールであり、パフォーマンスを最適化したり、実行時の動作を検証したり、マクロタイプ間を自動的に変換したりしないからです。
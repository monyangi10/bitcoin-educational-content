question: 在 Rust 中开发复杂宏时，使用 `cargo expand` 命令的主要优势是什么？
answer: 它显示宏调用生成的完全展开代码，允许开发人员验证生成的输出并调试问题
wrong_answers:
  - 它通过减少编译时间和消除多余的模式匹配分支，自动优化宏性能
  - 它在运行时验证宏语法，并为动态宏参数验证提供实时错误检查
  - 它可将函数式宏自动转换为派生宏，从而提高代码重用性和特质执行效率
explanation: |
  `cargo expand` 命令对于宏的开发非常重要，因为它可以显示宏 generate 在编译过程中的实际代码。由于宏在编译时运行，并将输入模式转换为生成代码，因此开发人员需要查看这些扩展输出，以验证他们的宏是否正常工作。当宏生成的代码包含错误时，这一点尤为重要，因为扩展输出有助于确定问题是源于宏定义本身还是源于生成代码的结构。其他选项都是不正确的，因为 `cargo expand` 纯粹是一个调试和检查工具，它不会优化性能、验证运行时行为或自动在宏类型之间进行转换。
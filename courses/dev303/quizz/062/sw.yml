question: Faida kuu ya kutumia amri ya `kupanua mizigo` ni ipi wakati wa kutengeneza makro changamano katika Rust?
answer: Inaonyesha msimbo uliopanuliwa kikamilifu unaozalishwa na maombi ya jumla, na kuruhusu watengenezaji kuthibitisha matokeo yaliyozalishwa na masuala ya utatuzi wa matatizo
wrong_answers:
  - Huboresha kiotomatiki utendaji mkuu kwa kupunguza muda wa mkusanyiko na kuondoa matawi yasiyo ya lazima ya kulinganisha ruwaza
  - Inathibitisha sintaksia ya makro wakati wa utekelezaji na hutoa ukaguzi wa hitilafu wa wakati halisi kwa uthibitisho wa hoja ya makro inayobadilika
  - Hubadilisha makro zinazofanana na utendaji kazi kuwa makro zinazotokana kiotomatiki, na kuboresha utumiaji wa msimbo tena na ufanisi wa utekelezaji wa sifa
explanation: |
  Amri ya `kupanua mizigo` ni muhimu sana kwa ajili ya ukuzaji wa jumla kwa sababu inafichua msimbo halisi ambao makro generate hutumika wakati wa mkusanyiko. Kwa kuwa makro hufanya kazi wakati wa kukusanya na kubadilisha mifumo ya ingizo kuwa msimbo uliozalishwa, wasanidi programu wanahitaji kuona matokeo haya yaliyopanuliwa ili kuthibitisha makro yao yanafanya kazi kwa usahihi. Hii ni muhimu sana wakati msimbo uliozalishwa na jumla una hitilafu, kwani matokeo yaliyopanuliwa husaidia kubaini kama masuala yanatokana na ufafanuzi wa jumla yenyewe au muundo wa msimbo uliozalishwa. Chaguzi zingine si sahihi kwa sababu `kupanua mizigo` ni zana ya utatuzi na ukaguzi tu - haiboreshi utendaji, haithibitishi tabia ya wakati wa utekelezaji, au hubadilisha kiotomatiki kati ya aina za makro.
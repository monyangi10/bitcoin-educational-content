question: Rust में जटिल मैक्रो विकसित करते समय `cargo expand` कमांड का उपयोग करने का प्राथमिक लाभ क्या है?
answer: यह मैक्रो इनवोकेशन द्वारा जनरेट किए गए पूर्ण विस्तारित कोड को प्रदर्शित करता है, जिससे डेवलपर्स जनरेट किए गए आउटपुट को सत्यापित कर सकते हैं और समस्याओं को डीबग कर सकते हैं।
wrong_answers:
  - यह संकलन समय को कम करके और अनावश्यक पैटर्न मिलान शाखाओं को हटाकर मैक्रो प्रदर्शन को स्वचालित रूप से अनुकूलित करता है।
  - यह रनटाइम पर मैक्रो सिंटैक्स को मान्य करता है और डायनामिक मैक्रो आर्गुमेंट सत्यापन के लिए वास्तविक समय में त्रुटि जाँच प्रदान करता है।
  - यह फंक्शन-जैसे मैक्रोज़ को स्वचालित रूप से डिराइव मैक्रोज़ में परिवर्तित करता है, जिससे कोड की पुन: प्रयोज्यता और ट्रेट कार्यान्वयन दक्षता में सुधार होता है।
explanation: |
  मैक्रो डेवलपमेंट के लिए `cargo expand` कमांड बेहद उपयोगी है क्योंकि यह कंपाइलेशन के दौरान generate मैक्रो द्वारा उपयोग किए जाने वाले वास्तविक कोड को दिखाता है। चूंकि मैक्रो कंपाइल-टाइम पर काम करते हैं और इनपुट पैटर्न को जेनरेटेड कोड में बदलते हैं, इसलिए डेवलपर्स को यह सुनिश्चित करने के लिए इस विस्तारित आउटपुट को देखना आवश्यक है कि उनके मैक्रो सही ढंग से काम कर रहे हैं। यह तब और भी महत्वपूर्ण हो जाता है जब मैक्रो-जनरेटेड कोड में त्रुटियां हों, क्योंकि विस्तारित आउटपुट यह निर्धारित करने में मदद करता है कि समस्या मैक्रो परिभाषा से उत्पन्न होती है या जेनरेटेड कोड की संरचना से। अन्य विकल्प गलत हैं क्योंकि `cargo expand` केवल एक डिबगिंग और निरीक्षण उपकरण है - यह प्रदर्शन को अनुकूलित नहीं करता है, रनटाइम व्यवहार को मान्य नहीं करता है, और न ही मैक्रो प्रकारों के बीच स्वचालित रूप से रूपांतरण करता है।
question: Rust에서 복잡한 매크로를 개발할 때 `cargo expand` 명령을 사용하면 어떤 이점이 있나요?
answer: 매크로 호출로 생성된 전체 확장 코드를 표시하여 개발자가 생성된 출력을 확인하고 문제를 디버그할 수 있습니다
wrong_answers:
  - 컴파일 시간을 줄이고 중복 패턴 매칭 브랜치를 제거하여 매크로 성능을 자동으로 최적화합니다
  - 런타임에 매크로 구문의 유효성을 검사하고 동적 매크로 인수 유효성 검사를 위한 실시간 오류 검사를 제공합니다
  - 함수형 매크로를 파생 매크로로 자동 변환하여 코드 재사용성 및 특성 구현 효율성을 개선합니다
explanation: |
  Cargo expand` 명령은 컴파일 중에 매크로 generate이 생성하는 실제 코드를 보여주기 때문에 매크로 개발에 매우 유용합니다. 매크로는 컴파일 시점에 작동하고 입력 패턴을 생성된 코드로 변환하기 때문에 개발자는 매크로가 올바르게 작동하는지 확인하기 위해 이 확장된 출력을 확인해야 합니다. 확장된 출력은 문제가 매크로 정의 자체에서 비롯된 것인지 아니면 생성된 코드의 구조에서 비롯된 것인지를 판단하는 데 도움이 되므로 매크로 생성 코드에 오류가 있는 경우 특히 중요합니다. 다른 옵션은 `cargo expand`가 순전히 디버깅 및 검사 도구일 뿐 성능을 최적화하거나 런타임 동작을 검증하거나 매크로 유형 간에 자동으로 변환하지 않으므로 올바르지 않습니다.
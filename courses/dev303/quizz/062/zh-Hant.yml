question: 在 Rust 中開發複雜的巨集時，使用 `cargo expand` 指令的主要優點是什麼？
answer: 它會顯示巨集調用所產生的完整擴充程式碼，讓開發人員可以驗證所產生的輸出和除錯問題
wrong_answers:
  - 它透過減少編譯時間和消除多餘的模式匹配分支，自動優化巨集效能
  - 它可在執行時驗證宏語法，並為動態宏參數驗證提供即時錯誤檢查
  - 它會自動將類函數巨集轉換為派生巨集，改善程式碼的重複使用性和特徵執行效率
explanation: |
  `cargo expand` 指令對於巨集開發非常重要，因為它可以顯示巨集在編譯期間 generate 的實際程式碼。由於巨集是在編譯時運作，並將輸入模式轉換成產生的程式碼，因此開發人員需要看到這個擴充輸出，以驗證他們的巨集是否正常運作。當宏產生的程式碼包含錯誤時，這一點尤其重要，因為擴充輸出有助於判斷問題是來自宏定義本身，還是產生程式碼的結構。其他選項是不正確的，因為 `cargo expand` 純粹是一個除錯及檢查工具 - 它不會優化效能、驗證執行時的行為，或自動在巨集類型之間轉換。
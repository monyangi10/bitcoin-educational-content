question: Rust에서 매크로 이름 뒤에 오는 느낌표(!)의 주된 용도는 무엇인가요?
answer: 런타임 함수 호출이 아닌 컴파일 타임 코드 생성이 발생하고 있음을 시각적으로 표시하는 역할을 합니다
wrong_answers:
  - 실행 중에 잘못된 입력 매개변수가 주어지면 매크로가 패닉에 빠질 수 있음을 나타냅니다
  - 매크로를 안전하지 않은 것으로 표시하고 잠재적인 메모리 안전 문제에 대한 명시적인 인정을 요구합니다
  - 매크로가 오류 확인을 통해 처리해야 하는 결과 유형을 반환하도록 지정합니다
explanation: |
  Rust 매크로 구문에서 느낌표는 매크로와 함수를 시각적으로 구분하기 위한 의도적인 디자인 선택입니다. Println!()` 또는 `vec![]`을 볼 때 `!`은 런타임 함수 호출이 아니라 컴파일 타임 코드 확장이 발생한다는 것을 즉시 알립니다. 매크로는 패턴 일치와 확장을 통해 컴파일 중에 코드를 generate로 만드는 함수와 근본적으로 다르게 작동하기 때문에 이 구분이 중요합니다. 오답은 이를 패닉, 안전하지 않은 작업 또는 오류 처리와 같은 런타임 동작과 혼동하지만 느낌표는 매크로의 컴파일 타임 메타프로그래밍 특성을 구체적으로 나타냅니다.
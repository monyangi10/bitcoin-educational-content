question: Каково основное назначение восклицательного знака (!), который следует за именем макроса в Rust?
answer: Он служит визуальным индикатором того, что происходит генерация кода во время компиляции, а не вызов функции во время выполнения
wrong_answers:
  - Указывает, что макрос будет паниковать, если во время выполнения ему будут переданы недопустимые входные параметры
  - Он помечает макрос как небезопасный и требует явного подтверждения потенциальных проблем с безопасностью памяти
  - Указывает, что макрос возвращает тип Result, который должен быть обработан с проверкой ошибок
explanation: |
  Восклицательный знак в синтаксисе макросов Rust - это намеренный выбор дизайна, который визуально отличает макросы от функций. Когда вы видите `println!()` или `vec![]`, `!` сразу сигнализирует о том, что происходит расширение кода во время компиляции, а не вызов функции во время выполнения. Это различие очень важно, потому что макросы работают принципиально иначе, чем функции - они generate код во время компиляции путем подбора шаблонов и расширения. Неправильные ответы путают это с поведением во время выполнения, таким как паника, небезопасные операции или обработка ошибок, но восклицательный знак специально указывает на метапрограммирование макросов во время компиляции.
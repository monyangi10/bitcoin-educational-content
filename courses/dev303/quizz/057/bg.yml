question: Каква е основната цел на възклицателния знак (!), който следва името на макрос в Rust?
answer: Той служи като визуален индикатор, че се генерира код по време на компилация, а не се извиква функция по време на изпълнение
wrong_answers:
  - Тя указва, че макросът ще изпадне в паника, ако му бъдат зададени невалидни входни параметри по време на изпълнението
  - Тя маркира макроса като опасен и изисква изрично потвърждение на потенциалните проблеми с безопасността на паметта
  - Тя указва, че макросът връща тип Резултат, който трябва да се обработва с проверка за грешки
explanation: |
  Възклицателният знак в синтаксиса на макросите в Rust е умишлен избор на дизайн, който визуално разграничава макросите от функциите. Когато видите `println!()` или `vec![]`, символът `!` веднага сигнализира, че ще се извърши разширяване на кода по време на компилация, а не извикване на функция по време на изпълнение. Това разграничение е от решаващо значение, тъй като макросите работят по коренно различен начин от функциите - те generate код по време на компилация чрез сравняване на шаблони и разширяване. Грешните отговори бъркат това с поведения по време на изпълнение като паника, опасни операции или обработка на грешки, но възклицателният знак изрично показва метапрограмиращата природа на макросите по време на компилация.
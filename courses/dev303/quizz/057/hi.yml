question: Rust में मैक्रो नाम के बाद आने वाले विस्मय चिह्न (!) का प्राथमिक उद्देश्य क्या है?
answer: यह एक दृश्य संकेतक के रूप में कार्य करता है कि रनटाइम फ़ंक्शन कॉल के बजाय कंपाइल-टाइम कोड जनरेशन हो रहा है।
wrong_answers:
  - यह इंगित करता है कि निष्पादन के दौरान अमान्य इनपुट पैरामीटर दिए जाने पर मैक्रो क्रैश हो जाएगा।
  - यह मैक्रो को असुरक्षित के रूप में चिह्नित करता है और संभावित मेमोरी सुरक्षा समस्याओं की स्पष्ट स्वीकृति की आवश्यकता होती है।
  - यह निर्दिष्ट करता है कि मैक्रो एक रिजल्ट प्रकार लौटाता है जिसे त्रुटि जाँच के साथ संभाला जाना चाहिए।
explanation: |
  Rust मैक्रो सिंटैक्स में विस्मय चिह्न एक जानबूझकर किया गया डिज़ाइन विकल्प है जो मैक्रो को फ़ंक्शन से स्पष्ट रूप से अलग करता है। जब आप `println!()` या `vec![]` देखते हैं, तो `!` तुरंत संकेत देता है कि कंपाइल-टाइम कोड विस्तार होगा, न कि रनटाइम फ़ंक्शन कॉल। यह अंतर महत्वपूर्ण है क्योंकि मैक्रो मूल रूप से फ़ंक्शन से भिन्न तरीके से काम करते हैं - वे पैटर्न मिलान और विस्तार के माध्यम से संकलन के दौरान generate कोड करते हैं। गलत उत्तर इसे पैनिकिंग, अनसेफ ऑपरेशन या एरर हैंडलिंग जैसे रनटाइम व्यवहारों के साथ भ्रमित करते हैं, लेकिन विस्मय चिह्न विशेष रूप से मैक्रो की कंपाइल-टाइम मेटाप्रोग्रामिंग प्रकृति को इंगित करता है।
question: 在 Rust 中，宏名稱後面的感嘆號 (!) 的主要作用是什麼？
answer: 它是編譯時代代碼產生而非運行時函式呼叫的視覺指標。
wrong_answers:
  - 它表示在執行過程中，如果給定的輸入參數無效，巨集會恐慌。
  - 它將宏標記為不安全，並要求明確承認潛在的記憶體安全問題
  - 它指定宏返回的結果類型必須用錯誤檢查處理
explanation: |
  Rust 宏語法中的感嘆號是刻意的設計選擇，在視覺上區別宏與函數。當您看見「println!()」或「vec![]」時，「!」立即表示編譯時會發生程式碼擴充，而不是執行時的函式呼叫。這個區別非常重要，因為巨集的運作與函數根本不同 - 它們在編譯期間透過模式匹配和擴充來 generate 程式碼。錯誤的答案會將這一點與執行時的行為混淆，例如恐慌、不安全的操作或錯誤處理，但是驚嘆號特別指出了巨集的編譯時元編程本質。
question: هدف اصلی علامت تعجب (!) که پس از نام یک ماکرو در Rust می‌آید چیست؟
answer: این به عنوان یک نشانگر بصری عمل می‌کند که تولید کد در زمان کامپایل در حال وقوع است و نه یک فراخوانی تابع در زمان اجرا
wrong_answers:
  - این نشان می‌دهد که ماکرو در صورت دریافت پارامترهای ورودی نامعتبر در حین اجرا دچار وحشت خواهد شد.
  - این ماکرو را به عنوان ناامن علامت‌گذاری می‌کند و نیاز به تأیید صریح مسائل احتمالی ایمنی حافظه دارد.
  - مشخص می‌کند که ماکرو یک نوع Result را برمی‌گرداند که باید با بررسی خطا مدیریت شود.
explanation: |
  علامت تعجب در نحو ماکرو Rust یک انتخاب طراحی عمدی است که ماکروها را از توابع به صورت بصری متمایز می‌کند. وقتی `println!()` یا `vec![]` را می‌بینید، `!` بلافاصله نشان می‌دهد که گسترش کد در زمان کامپایل رخ خواهد داد، نه یک فراخوانی تابع در زمان اجرا. این تمایز بسیار مهم است زیرا ماکروها به طور اساسی با توابع متفاوت عمل می‌کنند - آنها کد generate را در طول کامپایل از طریق تطبیق الگو و گسترش پردازش می‌کنند. پاسخ‌های نادرست این را با رفتارهای زمان اجرا مانند وحشت‌زدگی، عملیات ناامن یا مدیریت خطا اشتباه می‌گیرند، اما علامت تعجب به طور خاص به ماهیت متاپروگرامینگ زمان کامپایل ماکروها اشاره دارد.
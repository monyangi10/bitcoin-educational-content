question: วัตถุประสงค์หลักของเครื่องหมายอัศเจรีย์ (!) ที่ตามหลังชื่อแมโครใน Rust คืออะไร?
answer: มันทำหน้าที่เป็นตัวบ่งชี้ทางภาพว่าการสร้างโค้ดเกิดขึ้นในช่วงเวลา compile-time แทนที่จะเป็นการเรียกฟังก์ชันในช่วง runtime
wrong_answers:
  - มันบ่งชี้ว่าแมโครจะเกิดความตื่นตระหนกหากได้รับพารามิเตอร์อินพุตที่ไม่ถูกต้องระหว่างการดำเนินการ
  - มันทำให้มาโครถูกมองว่าไม่ปลอดภัยและต้องการการยอมรับอย่างชัดเจนเกี่ยวกับปัญหาความปลอดภัยของหน่วยความจำที่อาจเกิดขึ้น
  - ระบุว่าแมโครจะส่งคืนประเภทผลลัพธ์ที่ต้องจัดการด้วยการตรวจสอบข้อผิดพลาด
explanation: |
  เครื่องหมายอัศเจรีย์ในไวยากรณ์แมโครของ Rust เป็นการออกแบบที่ตั้งใจเพื่อแยกแยะแมโครออกจากฟังก์ชันอย่างชัดเจน เมื่อคุณเห็น `println!()` หรือ `vec![]` เครื่องหมาย `!` จะบ่งบอกทันทีว่าจะมีการขยายโค้ดในช่วงเวลาคอมไพล์ ไม่ใช่การเรียกฟังก์ชันในช่วงเวลารันไทม์ ความแตกต่างนี้มีความสำคัญเพราะแมโครทำงานแตกต่างจากฟังก์ชันอย่างพื้นฐาน - พวกมัน generate โค้ดในช่วงเวลาคอมไพล์ผ่านการจับคู่รูปแบบและการขยาย คำตอบที่ผิดมักสับสนกับพฤติกรรมในช่วงเวลารันไทม์ เช่น การเกิด panic, การดำเนินการที่ไม่ปลอดภัย, หรือการจัดการข้อผิดพลาด แต่เครื่องหมายอัศเจรีย์บ่งบอกถึงธรรมชาติของการเมตาโปรแกรมในช่วงเวลาคอมไพล์ของแมโครโดยเฉพาะเจาะจง
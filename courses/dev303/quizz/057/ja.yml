question: Rustでマクロ名の後に付く感嘆符（!）
answer: これは、実行時の関数呼び出しではなく、コンパイル時のコード生成が行われていることを示す視覚的な指標となる。
wrong_answers:
  - 実行中に無効な入力パラメータが与えられるとマクロがパニックになることを示す。
  - マクロを安全でないものとしてマークし、潜在的なメモリ安全性の問題を明示的に認識することを要求する。
  - これは、マクロがエラーチェックで処理されなければならない結果型を返すことを指定します。
explanation: |
  Rustのマクロ構文にある感嘆符は、マクロと関数を視覚的に区別するための意図的な設計上の選択です。println!()`や`vec![]`を見たとき、`!`は即座に実行時の関数呼び出しではなく、コンパイル時のコード展開を知らせます。マクロは関数とは根本的に動作が異なるので、この区別は非常に重要です。マクロはパターンマッチングと展開によってコンパイル時にgenerateコードを生成します。間違った答えは、これをパニックや安全でない操作、エラー処理のような実行時の動作と混同していますが、感嘆符は特にマクロのコンパイル時のメタプログラミングの性質を示しています。
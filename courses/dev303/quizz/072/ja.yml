question: Bitcoinアプリケーション開発において、ランタイム・リソース・エラーと無効な入力エラーやロジック・エラーを区別するものは何ですか？
answer: ランタイム・リソース・エラーは、ファイルやネットワーク接続のような外部の依存関係が利用できない場合に発生する。
wrong_answers:
  - "ランタイム・リソース・エラーは、関数のパラメータが要件を満たさない場合に発生し、呼び出し元と関数の間の契約違反を示す"
  - ランタイム・リソースのエラーは、プログラム実装のバグであり、適切に解決するにはデバッグとコードの修正が必要である。
  - ランタイム・リソース・エラーは、型システムがミスマッチを検出できず、誤ったデータ型がシステムを通じて伝播する場合に発生する。
explanation: |
  ランタイム・リソース・エラーはプログラム・ロジックの外部で、ファイル、ネットワーク接続、ストレージ・デバイスなどの依存関係が利用できない場合に発生する。無効な入力エラー（パラメータ契約違反）やロジックエラー（実装バグ）とは異なり、ランタイム・リソース・エラーは通常、コードの変更ではなく環境の修正が必要です。これらのエラーは一時的なものであり、プログラムが直接制御できないことが多いため、アプリケーションはこれらを優雅に扱わなければなりません。
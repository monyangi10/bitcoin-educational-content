question: อะไรที่ทำให้ข้อผิดพลาดของทรัพยากรในขณะรันไทม์แตกต่างจากข้อผิดพลาดของข้อมูลนำเข้าไม่ถูกต้องและข้อผิดพลาดทางตรรกะในการพัฒนาแอปพลิเคชัน Bitcoin?
answer: ข้อผิดพลาดของทรัพยากรในขณะรันไทม์เกิดขึ้นเมื่อการพึ่งพาภายนอกเช่นไฟล์หรือการเชื่อมต่อเครือข่ายไม่พร้อมใช้งาน ซึ่งต้องการการแก้ไขสภาพแวดล้อมแทนที่จะเป็นการเปลี่ยนแปลงโค้ด
wrong_answers:
  - "ข้อผิดพลาดของทรัพยากรในระหว่างการทำงานเกิดขึ้นเมื่อพารามิเตอร์ของฟังก์ชันไม่ตรงตามข้อกำหนด ซึ่งบ่งชี้ถึงการละเมิดสัญญาระหว่างผู้เรียกและฟังก์ชัน"
  - ข้อผิดพลาดของทรัพยากรในขณะรันไทม์แสดงถึงบั๊กในโปรแกรมที่ต้องการการดีบักและการแก้ไขโค้ดเพื่อแก้ไขอย่างถูกต้อง
  - ข้อผิดพลาดของทรัพยากรในขณะรันเกิดขึ้นเมื่อระบบประเภทไม่สามารถจับคู่ที่ไม่ตรงกันได้ ทำให้ประเภทข้อมูลที่ไม่ถูกต้องแพร่กระจายผ่านระบบ
explanation: |
  ข้อผิดพลาดของทรัพยากรขณะรันไทม์เป็นข้อผิดพลาดที่เกิดขึ้นภายนอกตรรกะของโปรแกรมและเกิดขึ้นเมื่อการพึ่งพาเช่นไฟล์, การเชื่อมต่อเครือข่าย, หรืออุปกรณ์จัดเก็บข้อมูลไม่พร้อมใช้งาน ไม่เหมือนกับข้อผิดพลาดของข้อมูลนำเข้าที่ไม่ถูกต้อง (ซึ่งเกี่ยวข้องกับการละเมิดสัญญาพารามิเตอร์) หรือข้อผิดพลาดตรรกะ (ซึ่งเป็นข้อบกพร่องในการดำเนินการ) ข้อผิดพลาดของทรัพยากรขณะรันไทม์มักต้องการการแก้ไขด้านสิ่งแวดล้อมมากกว่าการเปลี่ยนแปลงโค้ด แอปพลิเคชันต้องจัดการกับสิ่งเหล่านี้อย่างราบรื่นเนื่องจากมักเป็นเพียงชั่วคราวและอยู่นอกเหนือการควบคุมโดยตรงของโปรแกรม
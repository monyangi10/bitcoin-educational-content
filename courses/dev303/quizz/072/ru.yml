question: Что отличает ошибки ресурсов времени выполнения от ошибок недопустимого ввода и логических ошибок при разработке приложений Bitcoin?
answer: Ошибки ресурсов времени выполнения возникают, когда внешние зависимости, такие как файлы или сетевые соединения, недоступны, что требует исправления условий, а не изменения кода
wrong_answers:
  - "Ошибки ресурсов времени выполнения происходят, когда параметры функции не соответствуют требованиям, что указывает на нарушение контракта между вызывающей стороной и функцией"
  - Ошибки ресурсов времени выполнения представляют собой ошибки в реализации программы, для устранения которых требуется отладка и модификация кода
  - Ошибки ресурсов времени выполнения возникают, когда система типов не может отловить несоответствия, позволяя неправильным типам данных распространяться через систему
explanation: |
  Ошибки ресурсов времени выполнения являются внешними по отношению к логике программы и возникают при недоступности таких зависимостей, как файлы, сетевые соединения или устройства хранения данных. В отличие от ошибок недействительного ввода (которые связаны с нарушением контракта параметров) или логических ошибок (которые являются ошибками реализации), ошибки ресурсов времени выполнения обычно требуют исправления среды, а не изменения кода. Приложение должно справляться с ними изящно, поскольку они часто носят временный характер и находятся вне прямого контроля программы.
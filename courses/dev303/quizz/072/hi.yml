question: Bitcoin एप्लिकेशन डेवलपमेंट में रनटाइम रिसोर्स एरर, इनवैलिड इनपुट एरर और लॉजिक एरर में क्या अंतर है?
answer: रनटाइम संसाधन त्रुटियां तब उत्पन्न होती हैं जब फ़ाइलें या नेटवर्क कनेक्शन जैसी बाहरी निर्भरताएं अनुपलब्ध होती हैं, जिसके लिए कोड में बदलाव के बजाय पर्यावरणीय सुधारों की आवश्यकता होती है।
wrong_answers:
  - "रनटाइम संसाधन त्रुटियां तब होती हैं जब फ़ंक्शन पैरामीटर आवश्यकताओं को पूरा नहीं करते हैं, जो कॉलर और फ़ंक्शन के बीच अनुबंध उल्लंघन का संकेत देते हैं।"
  - रनटाइम संसाधन त्रुटियाँ प्रोग्राम कार्यान्वयन में बग को दर्शाती हैं जिन्हें ठीक से हल करने के लिए डिबगिंग और कोड संशोधन की आवश्यकता होती है।
  - रनटाइम संसाधन त्रुटियाँ तब उत्पन्न होती हैं जब टाइप सिस्टम विसंगतियों को पकड़ने में विफल रहता है, जिससे गलत डेटा प्रकार सिस्टम में फैल जाते हैं।
explanation: |
  रनटाइम संसाधन त्रुटियाँ प्रोग्राम लॉजिक से बाहर होती हैं और तब उत्पन्न होती हैं जब फ़ाइलें, नेटवर्क कनेक्शन या स्टोरेज डिवाइस जैसी निर्भरताएँ अनुपलब्ध होती हैं। अमान्य इनपुट त्रुटियों (जिनमें पैरामीटर अनुबंध उल्लंघन शामिल होते हैं) या लॉजिक त्रुटियों (जो कार्यान्वयन बग होते हैं) के विपरीत, रनटाइम संसाधन त्रुटियों के लिए आमतौर पर कोड परिवर्तन के बजाय पर्यावरणीय सुधार की आवश्यकता होती है। एप्लिकेशन को इन्हें सुचारू रूप से संभालना चाहिए क्योंकि ये अक्सर अस्थायी होती हैं और प्रोग्राम के सीधे नियंत्रण से बाहर होती हैं।
question: چه چیزی خطاهای منابع زمان اجرا را از خطاهای ورودی نامعتبر و خطاهای منطقی در توسعه برنامه Bitcoin متمایز می‌کند؟
answer: خطاهای منابع زمان اجرا زمانی رخ می‌دهند که وابستگی‌های خارجی مانند فایل‌ها یا اتصالات شبکه در دسترس نباشند و نیاز به اصلاحات محیطی به جای تغییرات کد دارند.
wrong_answers:
  - "خطاهای منابع زمان اجرا زمانی رخ می‌دهند که پارامترهای تابع الزامات را برآورده نمی‌کنند، که نشان‌دهنده نقض قرارداد بین فراخوان و تابع است"
  - خطاهای منابع زمان اجرا نشان‌دهنده باگ‌هایی در پیاده‌سازی برنامه هستند که نیاز به اشکال‌زدایی و اصلاح کد برای حل صحیح دارند.
  - خطاهای منابع زمان اجرا زمانی رخ می‌دهند که سیستم نوع نتواند ناسازگاری‌ها را شناسایی کند و به داده‌های نادرست اجازه دهد تا در سیستم گسترش یابند.
explanation: |
  خطاهای منابع زمان اجرا خارجی به منطق برنامه هستند و زمانی رخ می‌دهند که وابستگی‌هایی مانند فایل‌ها، اتصالات شبکه یا دستگاه‌های ذخیره‌سازی در دسترس نباشند. برخلاف خطاهای ورودی نامعتبر (که شامل نقض قرارداد پارامترها می‌شوند) یا خطاهای منطقی (که باگ‌های پیاده‌سازی هستند)، خطاهای منابع زمان اجرا معمولاً به اصلاحات محیطی نیاز دارند نه تغییرات کد. برنامه باید این خطاها را به‌طور مناسب مدیریت کند زیرا اغلب موقتی و خارج از کنترل مستقیم برنامه هستند.
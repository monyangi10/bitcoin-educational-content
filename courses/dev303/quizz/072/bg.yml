question: По какво се различават ресурсните грешки по време на изпълнение от грешките при невалидно въвеждане и логическите грешки при разработката на приложения Bitcoin?
answer: Грешки с ресурсите по време на изпълнение се появяват, когато външни зависимости като файлове или мрежови връзки са недостъпни, което изисква по-скоро поправки в средата, отколкото промени в кода
wrong_answers:
  - "Грешки с ресурсите по време на изпълнение се случват, когато параметрите на функцията не отговарят на изискванията, което показва нарушения на договора между викащия и функцията"
  - Грешките в ресурсите по време на изпълнение представляват грешки в изпълнението на програмата, които изискват отстраняване на грешки и модифициране на кода, за да бъдат разрешени правилно
  - Грешки в ресурсите по време на изпълнение възникват, когато системата за типове не успява да улови несъответствията, което позволява на неправилните типове данни да се разпространяват в системата
explanation: |
  Грешките, свързани с ресурсите по време на изпълнение, са външни за логиката на програмата и се появяват, когато зависимостите, като например файлове, мрежови връзки или устройства за съхранение, не са налични. За разлика от грешките с невалиден вход (които включват нарушения на договора за параметрите) или логическите грешки (които са грешки в изпълнението), грешките с ресурсите по време на изпълнение обикновено изискват поправки в околната среда, а не промени в кода. Приложението трябва да се справя с тях грациозно, тъй като те често са временни и са извън прекия контрол на програмата.
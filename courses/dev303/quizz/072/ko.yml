question: Bitcoin 애플리케이션 개발에서 런타임 리소스 오류와 유효하지 않은 입력 오류 및 논리 오류를 구별하는 방법은 무엇인가요?
answer: 런타임 리소스 오류는 파일이나 네트워크 연결과 같은 외부 종속성을 사용할 수 없을 때 발생하며 코드 변경이 아닌 환경 수정이 필요합니다
wrong_answers:
  - "함수 매개 변수가 요구 사항을 충족하지 않을 때 런타임 리소스 오류가 발생하여 호출자와 함수 간의 계약 위반을 나타냅니다."
  - 런타임 리소스 오류는 제대로 해결하기 위해 디버깅 및 코드 수정이 필요한 프로그램 구현의 버그를 나타냅니다
  - 런타임 리소스 오류는 유형 시스템이 불일치를 감지하지 못하여 잘못된 데이터 유형이 시스템을 통해 전파될 때 발생합니다
explanation: |
  런타임 리소스 오류는 프로그램 로직 외부에서 발생하며 파일, 네트워크 연결 또는 저장 장치와 같은 종속성을 사용할 수 없을 때 발생합니다. 잘못된 입력 오류(매개변수 계약 위반)나 로직 오류(구현 버그)와 달리 런타임 리소스 오류는 일반적으로 코드 변경이 아닌 환경 수정이 필요합니다. 이러한 오류는 일시적이고 프로그램의 직접적인 제어 범위를 벗어나는 경우가 많으므로 애플리케이션은 이러한 오류를 정상적으로 처리해야 합니다.
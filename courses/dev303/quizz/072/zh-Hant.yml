question: 在 Bitcoin 應用程式開發中，運行時資源錯誤與無效輸入錯誤和邏輯錯誤有何差異？
answer: 當檔案或網路連線等外部依賴無法使用時，會發生執行時資源錯誤，這需要環境修復而非程式碼變更
wrong_answers:
  - 「當函式參數不符合需求時，會發生執行時資源錯誤，這表示呼叫者與函式之間有違反契約的情況」
  - 執行時資源錯誤代表程式實作中的錯誤，需要除錯和修改程式碼才能正確解決。
  - 當類型系統無法捕捉錯配，允許錯誤的資料類型在系統中傳播時，就會發生執行時資源錯誤。
explanation: |
  運行時資源錯誤是程式邏輯的外部錯誤，當檔案、網路連線或儲存裝置等相關依存無法使用時就會發生。與無效輸入錯誤（涉及違反參數契約）或邏輯錯誤（屬於執行錯誤）不同，運行時資源錯誤通常需要環境修復，而非程式碼變更。應用程式必須從容處理這些錯誤，因為它們通常是暫時性的，而且不在程式的直接控制範圍內。
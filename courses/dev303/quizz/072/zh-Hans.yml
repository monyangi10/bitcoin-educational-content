question: 在 Bitcoin 应用程序开发中，运行时资源错误与无效输入错误和逻辑错误的区别是什么？
answer: 当文件或网络连接等外部依赖性不可用时，就会出现运行时资源错误，这就需要修复环境问题，而不是修改代码
wrong_answers:
  - "当函数参数不符合要求时会出现运行时资源错误，这表明调用者和函数之间违反了契约"
  - 运行时资源错误代表程序执行中的错误，需要调试和修改代码才能正确解决
  - 当类型系统无法捕捉到不匹配时，就会出现运行时资源错误，使不正确的数据类型在系统中传播
explanation: |
  运行时资源错误是程序逻辑之外的错误，当文件、网络连接或存储设备等依赖项不可用时就会发生。与无效输入错误（涉及违反参数合同）或逻辑错误（属于执行错误）不同，运行时资源错误通常需要环境修复而不是代码修改。应用程序必须优雅地处理这些错误，因为它们通常是临时性的，不在程序的直接控制范围内。
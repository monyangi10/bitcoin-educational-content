question: Qu'est-ce qui distingue les erreurs de ressources d'exécution des erreurs d'entrée non valides et des erreurs logiques dans le développement d'applications Bitcoin ?
answer: Les erreurs de ressources d'exécution se produisent lorsque des dépendances externes telles que des fichiers ou des connexions réseau ne sont pas disponibles, ce qui nécessite des corrections de l'environnement plutôt que des modifications du code.
wrong_answers:
  - "Les erreurs de ressources au moment de l'exécution se produisent lorsque les paramètres de la fonction ne répondent pas aux exigences, ce qui indique des violations de contrat entre l'appelant et la fonction".
  - Les erreurs de ressources d'exécution représentent des bogues dans la mise en œuvre du programme qui nécessitent un débogage et une modification du code pour être résolus correctement.
  - Les erreurs de ressources d'exécution se produisent lorsque le système de types ne parvient pas à détecter les incohérences, ce qui permet aux types de données incorrects de se propager dans le système.
explanation: |
  Les erreurs de ressources d'exécution sont externes à la logique du programme et se produisent lorsque des dépendances telles que des fichiers, des connexions réseau ou des périphériques de stockage ne sont pas disponibles. Contrairement aux erreurs d'entrée non valides (qui impliquent des violations de contrats de paramètres) ou aux erreurs logiques (qui sont des bogues d'implémentation), les erreurs de ressources d'exécution nécessitent généralement des correctifs environnementaux plutôt que des modifications du code. L'application doit les traiter avec élégance, car elles sont souvent temporaires et hors du contrôle direct du programme.

question: LDK 的事件驅動架構的哪個特點可讓應用程式在 Lightning 通訊協定邏輯和特定於應用程式的回應之間維持乾淨的分離？
answer: 為所有重要作業和狀態變更提供異步通知，允許自訂事件處理程式獨立執行
wrong_answers:
  - 同步回呼直接在通道管理器中觸發，需要即時回應以維持通訊協定合規性
  - 事件處理程式會根據應用程式設定自動產生，不需要自訂執行邏輯
  - 所有事件都在中央緩衝區排隊，並依序處理，以確保應用程式行為的確切性
explanation: |
  LDK的事件系統為所有Lightning操作提供異步通知，包括對等連接、付款和通道變更。這允許開發人員實現自定義的事件處理器，在保持LDK的核心功能和應用程式邏輯之間乾淨分離的同時作出適當的回應。其他選項是不正確的，因為LDK不使用阻斷通訊協定作業的同步回呼，不使用自動generate處理器，也不強制事件的順序處理。
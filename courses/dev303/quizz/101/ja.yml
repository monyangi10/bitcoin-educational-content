question: LDKのイベント・ドリブン・アーキテクチャの特徴として、アプリケーションがライトニング・プロトコルのロジックとアプリケーション固有のレスポンスを明確に分離することができるのはどれか。
answer: すべての重要な操作と状態の変更に対して非同期通知が提供され、カスタム・イベント・ハンドラを独立して実装することができます。
wrong_answers:
  - 同期コールバックはチャネル・マネージャ内で直接トリガされるため、プロトコル・コンプライアンスを維持するために即時応答が必要となる。
  - イベントハンドラは、アプリケーションの構成に基づいて自動的に生成されるため、カスタム実装ロジックは不要です。
  - すべてのイベントは中央のバッファにキューイングされ、順次処理されるため、アプリケーションの動作は決定論的になります。
explanation: |
  LDKのイベントシステムは、ピア接続、支払い、チャネル変更を含むすべてのLightning操作に対して非同期通知を提供します。これにより、開発者はLDKのコア機能とアプリケーションロジックをきれいに分離したまま、適切に応答するカスタムイベントハンドラを実装できます。LDKはプロトコル操作をブロックする同期コールバックを使用せず、自動generateハンドラを使用せず、イベントの連続処理を強制しないため、他の選択肢は正しくありません。
question: Коя специфична характеристика на архитектурата, управлявана от събития, на LDK позволява на приложенията да поддържат чисто разделение между логиката на протокола Lightning и специфичните за приложението отговори?
answer: За всички важни операции и промени в състоянието се предоставят асинхронни известия, което позволява независима реализация на персонализирани обработчици на събития
wrong_answers:
  - Синхронните обратни повиквания се задействат директно в мениджъра на канали, като изискват незабавни отговори, за да се запази съответствието с протокола
  - Обработващите събития се генерират автоматично въз основа на конфигурацията на приложението, което елиминира необходимостта от персонализирана логика на изпълнение
  - Всички събития се подреждат на опашка в централен буфер и се обработват последователно, за да се осигури детерминистично поведение на приложението
explanation: |
  Системата за събития на LDK осигурява асинхронни известия за всички операции на Lightning, включително партньорски връзки, плащания и промени в каналите. Това позволява на разработчиците да прилагат персонализирани обработчици на събития, които реагират по подходящ начин, като същевременно поддържат чисто разделение между основната функционалност на LDK и логиката на приложението. Другите варианти са неправилни, тъй като LDK не използва синхронни обратни извиквания, които блокират операциите на протокола, не използва автоматични generate обработчици и не налага последователна обработка на събитията.
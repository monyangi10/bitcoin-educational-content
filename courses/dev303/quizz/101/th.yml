question: ลักษณะเฉพาะใดของสถาปัตยกรรมที่ขับเคลื่อนด้วยเหตุการณ์ของ LDK ที่ช่วยให้แอปพลิเคชันสามารถรักษาการแยกที่ชัดเจนระหว่างตรรกะโปรโตคอล Lightning และการตอบสนองเฉพาะแอปพลิเคชัน?
answer: มีการแจ้งเตือนแบบอะซิงโครนัสสำหรับการดำเนินการที่สำคัญและการเปลี่ยนแปลงสถานะทั้งหมด ทำให้สามารถพัฒนาตัวจัดการเหตุการณ์ที่กำหนดเองได้อย่างอิสระ
wrong_answers:
  - การเรียกกลับแบบซิงโครนัสจะถูกกระตุ้นโดยตรงภายในตัวจัดการช่องสัญญาณ ซึ่งต้องการการตอบสนองทันทีเพื่อรักษาการปฏิบัติตามโปรโตคอล
  - ตัวจัดการเหตุการณ์ถูกสร้างขึ้นโดยอัตโนมัติตามการกำหนดค่าของแอปพลิเคชัน ทำให้ไม่จำเป็นต้องมีตรรกะการใช้งานที่กำหนดเอง
  - เหตุการณ์ทั้งหมดจะถูกจัดคิวในบัฟเฟอร์กลางและประมวลผลตามลำดับเพื่อให้แน่ใจว่าพฤติกรรมของแอปพลิเคชันเป็นไปตามที่กำหนด
explanation: |
  ระบบเหตุการณ์ของ LDK ให้การแจ้งเตือนแบบอะซิงโครนัสสำหรับการดำเนินการทั้งหมดของ Lightning รวมถึงการเชื่อมต่อกับเพื่อน การชำระเงิน และการเปลี่ยนแปลงช่องทาง สิ่งนี้ช่วยให้นักพัฒนาสามารถสร้างตัวจัดการเหตุการณ์ที่กำหนดเองเพื่อตอบสนองอย่างเหมาะสม ในขณะที่ยังคงแยกฟังก์ชันหลักของ LDK ออกจากตรรกะของแอปพลิเคชัน ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะ LDK ไม่ใช้การเรียกกลับแบบซิงโครนัสที่บล็อกการดำเนินการของโปรโตคอล ไม่ใช้ตัวจัดการ auto-generate และไม่บังคับให้ประมวลผลเหตุการณ์ตามลำดับ
question: Какая особенность событийно-ориентированной архитектуры LDK позволяет приложениям поддерживать чистое разделение между логикой протокола Lightning и ответами, специфичными для приложения?
answer: Для всех важных операций и изменений состояния предусмотрены асинхронные уведомления, что позволяет независимо реализовать пользовательские обработчики событий
wrong_answers:
  - Синхронные обратные вызовы запускаются непосредственно в менеджере каналов, требуя немедленной реакции для обеспечения соответствия протоколу
  - Обработчики событий автоматически генерируются на основе конфигурации приложения, что устраняет необходимость в создании собственной логики реализации
  - Все события ставятся в очередь в центральный буфер и обрабатываются последовательно для обеспечения детерминированного поведения приложения
explanation: |
  Система событий LDK обеспечивает асинхронные уведомления для всех операций Lightning, включая соединения с пирами, платежи и изменения каналов. Это позволяет разработчикам реализовывать пользовательские обработчики событий, которые реагируют соответствующим образом, сохраняя чистое разделение между основной функциональностью LDK и логикой приложения. Остальные варианты неверны, поскольку LDK не использует синхронные обратные вызовы, блокирующие протокольные операции, не использует авто-generate обработчики и не обеспечивает последовательную обработку событий.
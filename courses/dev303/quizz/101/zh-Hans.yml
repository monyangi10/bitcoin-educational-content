question: LDK 事件驱动架构的哪个具体特点使应用程序能够在 Lightning 协议逻辑和特定于应用程序的响应之间保持清晰的分离？
answer: 为所有重要操作和状态变化提供异步通知，允许独立实施自定义事件处理程序
wrong_answers:
  - 同步回调在通道管理器内直接触发，需要立即响应以保持协议合规性
  - 根据应用程序配置自动生成事件处理程序，无需自定义执行逻辑
  - 所有事件都在中央缓冲区排队，并按顺序处理，以确保应用程序行为的确定性
explanation: |
  LDK的事件系统为所有Lightning操作提供异步通知，包括对等连接、支付和渠道变更。这样，开发人员就可以实现自定义事件处理程序，在保持 LDK 核心功能与应用程序逻辑分离的同时做出适当响应。其他选项都不正确，因为LDK不使用会阻塞协议操作的同步回调，不自动generate处理程序，也不强制按顺序处理事件。
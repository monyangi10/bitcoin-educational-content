question: 애플리케이션이 Lightning 프로토콜 로직과 애플리케이션별 응답을 깔끔하게 분리할 수 있도록 지원하는 LDK의 이벤트 중심 아키텍처의 특정 특성은 무엇인가요?
answer: 모든 중요한 작업 및 상태 변경에 대해 비동기 알림이 제공되므로 사용자 지정 이벤트 핸들러를 독립적으로 구현할 수 있습니다
wrong_answers:
  - 동기식 콜백은 채널 관리자 내에서 직접 트리거되므로 프로토콜 준수를 유지하기 위해 즉각적인 응답이 필요합니다
  - 이벤트 핸들러는 애플리케이션 구성에 따라 자동으로 생성되므로 사용자 지정 구현 로직이 필요하지 않습니다
  - 모든 이벤트는 중앙 버퍼에 큐에 대기하고 순차적으로 처리하여 결정론적 애플리케이션 동작을 보장합니다
explanation: |
  LDK의 이벤트 시스템은 피어 연결, 결제, 채널 변경 등 모든 Lightning 작업에 대한 비동기 알림을 제공합니다. 이를 통해 개발자는 LDK의 핵심 기능과 애플리케이션 로직을 깔끔하게 분리하면서 적절하게 응답하는 사용자 지정 이벤트 핸들러를 구현할 수 있습니다. 다른 옵션은 LDK가 프로토콜 작업을 차단하는 동기식 콜백을 사용하지 않고, 자동 generate 핸들러를 사용하지 않으며, 이벤트의 순차적 처리를 강제하지 않으므로 올바르지 않습니다.
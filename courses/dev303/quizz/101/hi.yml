question: LDK की इवेंट-ड्रिवन आर्किटेक्चर की कौन सी विशिष्ट विशेषता अनुप्रयोगों को लाइटनिंग प्रोटोकॉल लॉजिक और एप्लिकेशन-विशिष्ट प्रतिक्रियाओं के बीच स्पष्ट अलगाव बनाए रखने में सक्षम बनाती है?
answer: सभी महत्वपूर्ण कार्यों और स्थिति परिवर्तनों के लिए अतुल्यकालिक सूचनाएं प्रदान की जाती हैं, जिससे कस्टम इवेंट हैंडलर को स्वतंत्र रूप से लागू किया जा सकता है।
wrong_answers:
  - सिंक्रोनस कॉलबैक सीधे चैनल मैनेजर के भीतर ट्रिगर होते हैं, प्रोटोकॉल अनुपालन बनाए रखने के लिए तत्काल प्रतिक्रियाओं की आवश्यकता होती है।
  - एप्लिकेशन कॉन्फ़िगरेशन के आधार पर इवेंट हैंडलर स्वचालित रूप से उत्पन्न होते हैं, जिससे कस्टम कार्यान्वयन लॉजिक की आवश्यकता समाप्त हो जाती है।
  - सभी इवेंट्स को एक केंद्रीय बफर में कतारबद्ध किया जाता है और निश्चित एप्लिकेशन व्यवहार सुनिश्चित करने के लिए क्रमिक रूप से संसाधित किया जाता है।
explanation: |
  LDK का इवेंट सिस्टम पीयर कनेक्शन, भुगतान और चैनल परिवर्तन सहित सभी लाइटनिंग ऑपरेशनों के लिए अतुल्यकालिक सूचनाएं प्रदान करता है। इससे डेवलपर्स को कस्टम इवेंट हैंडलर लागू करने की सुविधा मिलती है जो LDK की मुख्य कार्यक्षमता और एप्लिकेशन लॉजिक के बीच स्पष्ट अलगाव बनाए रखते हुए उचित प्रतिक्रिया देते हैं। अन्य विकल्प गलत हैं क्योंकि LDK सिंक्रोनस कॉलबैक का उपयोग नहीं करता है जो प्रोटोकॉल ऑपरेशनों को अवरुद्ध करते हैं, ऑटो-generate हैंडलर का उपयोग नहीं करता है, और इवेंट्स के अनुक्रमिक प्रसंस्करण को लागू नहीं करता है।
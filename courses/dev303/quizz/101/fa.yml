question: کدام ویژگی خاص معماری مبتنی بر رویداد LDK به برنامه‌ها امکان می‌دهد تا جداسازی تمیز بین منطق پروتکل Lightning و پاسخ‌های خاص برنامه را حفظ کنند؟
answer: اعلان‌های ناهمگام برای تمامی عملیات و تغییرات وضعیت مهم ارائه می‌شوند، که امکان پیاده‌سازی مستقل مدیریت‌کننده‌های رویداد سفارشی را فراهم می‌کند.
wrong_answers:
  - فراخوان‌های هم‌زمان به‌طور مستقیم در مدیر کانال فعال می‌شوند و نیاز به پاسخ‌های فوری دارند تا انطباق با پروتکل حفظ شود.
  - مدیران رویداد به‌طور خودکار بر اساس پیکربندی برنامه تولید می‌شوند و نیاز به منطق پیاده‌سازی سفارشی را از بین می‌برند.
  - همه رویدادها در یک بافر مرکزی صف‌بندی شده و به صورت متوالی پردازش می‌شوند تا رفتار قطعی برنامه تضمین شود.
explanation: |
  سیستم رویداد LDK اعلان‌های ناهمگام را برای تمامی عملیات لایتنینگ از جمله اتصالات همتا، پرداخت‌ها و تغییرات کانال فراهم می‌کند. این امکان را به توسعه‌دهندگان می‌دهد تا هندلرهای رویداد سفارشی را پیاده‌سازی کنند که به‌طور مناسب پاسخ دهند و در عین حال جدایی تمیز بین عملکرد اصلی LDK و منطق برنامه را حفظ کنند. گزینه‌های دیگر نادرست هستند زیرا LDK از بازگشت‌های همزمان که عملیات پروتکل را مسدود می‌کنند استفاده نمی‌کند، هندلرهای auto-generate را ندارد و پردازش ترتیبی رویدادها را تحمیل نمی‌کند.
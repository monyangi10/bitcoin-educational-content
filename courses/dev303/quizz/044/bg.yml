question: Коя е най-основната черта, която всички затваряния имплементират в йерархията на чертите на затварянията в Rust?
answer: FnOnce
wrong_answers:
  - FnMut
  - Fn
  - Итератор
explanation: |
  FnOnce е най-основната черта, която всички затваряния прилагат в Rust. Той представлява затваряния, които могат да бъдат извикани поне веднъж, което го прави основа на йерархията на чертите на затварянията. FnMut и Fn са по-рестриктивни черти, които се основават на FnOnce - FnMut позволява многократни извиквания с мутация, докато Fn позволява многократни извиквания без мутация. Iterator не е свързан с чертите на затваряне и се използва за обработка на последователности от данни.
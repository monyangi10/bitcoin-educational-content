question: Какой базовый признак реализуют все закрытия в иерархии признаков закрытий Rust?
answer: FnOnce
wrong_answers:
  - FnMut
  - Fn
  - Итератор
explanation: |
  FnOnce - это самый базовый признак, который реализуют все закрытия в Rust. Он представляет закрытия, которые могут быть вызваны по крайней мере один раз, что делает его основой иерархии признаков закрытия. FnMut и Fn - это более ограничительные черты, которые основываются на FnOnce. FnMut позволяет многократный вызов с мутацией, а Fn - многократный вызов без мутации. Итератор не связан с чертами закрытия и используется для обработки последовательностей данных.
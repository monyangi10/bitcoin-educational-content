question: Rust의 클로저 특성 계층 구조에서 모든 클로저가 구현하는 가장 기본적인 특성은 무엇인가요?
answer: FnOnce
wrong_answers:
  - FnMut
  - Fn
  - 이터레이터
explanation: |
  FnOnce는 Rust에서 모든 클로저가 구현하는 가장 기본적인 특성입니다. 한 번 이상 호출할 수 있는 클로저를 나타내며 클로저 특성 계층 구조의 기초가 됩니다. FnMut과 Fn은 FnOnce를 기반으로 하는 보다 제한적인 특성으로, FnMut은 변형을 동반한 여러 호출을 허용하는 반면, Fn은 변형을 동반하지 않고 여러 호출을 허용합니다. 이터레이터는 클로저 특성과 관련이 없으며 데이터 시퀀스를 처리하는 데 사용됩니다.
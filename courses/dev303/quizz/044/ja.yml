question: Rustのクロージャ特性階層で、すべてのクロージャが実装する最も基本的な特性は何ですか？
answer: フンワンス
wrong_answers:
  - フンムート
  - エフエヌ
  - イテレータ
explanation: |
  FnOnceは、Rustですべてのクロージャが実装する最も基本的な特性である。FnOnceは少なくとも1回呼び出すことができるクロージャを表し、クロージャの形質階層の基礎となる。FnMutとFnはFnOnceをベースにした、より制限的な特性で、FnMutは突然変異を伴う複数回の呼び出しを許可し、Fnは突然変異を伴わない複数回の呼び出しを許可します。Iteratorはクロージャ形質とは無関係で、データのシーケンスを処理するために使用されます。
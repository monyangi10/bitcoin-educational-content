question: Rust के क्लोज़र ट्रेट पदानुक्रम में सभी क्लोज़र द्वारा कार्यान्वित किया जाने वाला सबसे बुनियादी गुण क्या है?
answer: एफएनओन्स
wrong_answers:
  - एफएनएम्यूट
  - एफएन
  - इटरेटर
explanation: |
  FnOnce सबसे बुनियादी विशेषता है जिसे Rust में सभी क्लोज़र लागू करते हैं। यह उन क्लोज़रों को दर्शाता है जिन्हें कम से कम एक बार कॉल किया जा सकता है, जिससे यह क्लोज़र विशेषता पदानुक्रम का आधार बनता है। FnMut और Fn अधिक प्रतिबंधात्मक विशेषताएँ हैं जो FnOnce पर आधारित हैं - FnMut उत्परिवर्तन के साथ कई कॉल की अनुमति देता है, जबकि Fn उत्परिवर्तन के बिना कई कॉल की अनुमति देता है। Iterator क्लोज़र विशेषताओं से असंबंधित है और इसका उपयोग डेटा अनुक्रमों को संसाधित करने के लिए किया जाता है।
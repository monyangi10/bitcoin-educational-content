question: اساسی‌ترین ویژگی که همه‌ی closureها در سلسله مراتب ویژگی‌های closure در Rust پیاده‌سازی می‌کنند چیست؟
answer: FnOnce
wrong_answers:
  - FnMut
  - Fn
  - تکرارگر
explanation: |
  FnOnce ابتدایی‌ترین ویژگی است که تمام closureها در Rust پیاده‌سازی می‌کنند. این ویژگی نمایانگر closureهایی است که حداقل یک بار می‌توان آن‌ها را فراخوانی کرد و به همین دلیل پایه و اساس سلسله مراتب ویژگی‌های closure است. FnMut و Fn ویژگی‌های محدودکننده‌تری هستند که بر اساس FnOnce ساخته شده‌اند - FnMut اجازه فراخوانی‌های متعدد با تغییر را می‌دهد، در حالی که Fn اجازه فراخوانی‌های متعدد بدون تغییر را می‌دهد. Iterator به ویژگی‌های closure مرتبط نیست و برای پردازش توالی‌های داده استفاده می‌شود.
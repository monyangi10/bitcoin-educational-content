question: ลักษณะที่พื้นฐานที่สุดที่การปิดทั้งหมดใช้ในลำดับชั้นลักษณะการปิดของ Rust คืออะไร?
answer: FnOnce
wrong_answers:
  - FnMut
  - Fn
  - ตัววนซ้ำ
explanation: |
  FnOnce เป็น trait พื้นฐานที่สุดที่ closure ทั้งหมดใน Rust ใช้ มันแสดงถึง closure ที่สามารถถูกเรียกใช้อย่างน้อยหนึ่งครั้ง ทำให้มันเป็นรากฐานของลำดับชั้นของ closure trait FnMut และ Fn เป็น trait ที่มีข้อจำกัดมากขึ้นที่สร้างขึ้นบน FnOnce - FnMut อนุญาตให้เรียกหลายครั้งพร้อมกับการเปลี่ยนแปลง ในขณะที่ Fn อนุญาตให้เรียกหลายครั้งโดยไม่มีการเปลี่ยนแปลง Iterator ไม่เกี่ยวข้องกับ closure trait และใช้สำหรับประมวลผลลำดับของข้อมูล
question: รูปแบบไวยากรณ์มาโครใดที่ตรงกับนิพจน์ศูนย์หรือมากกว่าที่คั่นด้วยเครื่องหมายจุลภาคในมาโครแบบฟังก์ชันที่กำหนดเองได้อย่างถูกต้อง?
answer: $($x:expr),*
wrong_answers:
  - $($x:expr)*,
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  ไวยากรณ์ที่ถูกต้อง $($x:expr),* ใช้รูปแบบการทำซ้ำของ Rust ที่เครื่องหมายดอลลาร์แนะนำกลุ่มการทำซ้ำ, $x:expr จับคู่แต่ละนิพจน์ด้วยตัวระบุชิ้นส่วน expr, เครื่องหมายจุลภาคทำหน้าที่เป็นตัวคั่นระหว่างนิพจน์, และเครื่องหมายดอกจัน (*) ระบุการทำซ้ำศูนย์หรือมากกว่า คำตอบที่ผิดมีข้อผิดพลาดทางไวยากรณ์: $($x:expr)*, วางเครื่องหมายจุลภาคนอกกลุ่มการทำซ้ำ, $[x:expr],* ใช้วงเล็บเหลี่ยมแทนวงเล็บปกติและละเว้นเครื่องหมายดอลลาร์ก่อน x, และ ${$x:expr},* ใช้วงเล็บปีกกาแทนวงเล็บปกติสำหรับกลุ่มการทำซ้ำ
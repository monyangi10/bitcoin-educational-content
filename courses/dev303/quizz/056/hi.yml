question: कस्टम फंक्शन जैसे मैक्रो में अल्पविराम से अलग किए गए शून्य या अधिक एक्सप्रेशन के लिए कौन सा मैक्रो पैटर्न सिंटैक्स सही ढंग से उपयुक्त होगा?
answer: $($x:expr),*
wrong_answers:
  - $($x:expr)*,
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  सही वाक्य संरचना $($x:expr),* Rust के पुनरावृति पैटर्न का उपयोग करती है, जहाँ डॉलर चिह्न पुनरावृति समूह को दर्शाता है, $x:expr प्रत्येक व्यंजक को expr खंड विनिर्देशक से मिलाता है, अल्पविराम व्यंजकों के बीच विभाजक का कार्य करता है, और तारांकन चिह्न (*) शून्य या अधिक पुनरावृति को इंगित करता है। गलत उत्तरों में वाक्य संरचना संबंधी त्रुटियाँ हैं: $($x:expr)*, अल्पविराम को पुनरावृति समूह के बाहर रखता है, $[x:expr],* कोष्ठकों के स्थान पर वर्गाकार कोष्ठकों का उपयोग करता है और x से पहले डॉलर चिह्न को छोड़ देता है, और ${$x:expr},* पुनरावृति समूह के लिए कोष्ठकों के स्थान पर घुंघराले कोष्ठकों का उपयोग करता है।
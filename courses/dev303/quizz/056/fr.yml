question: Quelle syntaxe de modèle de macro correspondrait correctement à zéro ou plusieurs expressions séparées par des virgules dans une macro de type fonction personnalisée ?
answer: $($x:expr),*
wrong_answers:
  - $($x:expr)*,
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  La syntaxe correcte $($x:expr),* utilise le modèle de répétition de Rust où le signe dollar introduit un groupe de répétition. $x:expr correspond à chaque expression avec le spécificateur de fragment expr, la virgule agit comme séparateur entre les expressions, et l'astérisque (*) indique zéro ou plusieurs répétitions. Les mauvaises réponses contiennent des erreurs de syntaxe : $($x:expr)* place la virgule en dehors du groupe de répétition, $[x:expr],* utilise des crochets au lieu de parenthèses et omet le signe du dollar avant x, et ${$x:expr},* utilise des accolades au lieu de parenthèses pour le groupe de répétition.

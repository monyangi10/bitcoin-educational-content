question: کدام نحو الگوی ماکرو به درستی صفر یا بیشتر از عبارات جدا شده با کاما را در یک ماکروی تابع‌مانند سفارشی مطابقت می‌دهد؟
answer: $($x:expr),*
wrong_answers:
  - $($x:expr)*,
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  نحو صحیح $($x:expr),* از الگوی تکرار Rust استفاده می‌کند که در آن علامت دلار یک گروه تکرار را معرفی می‌کند، $x:expr هر عبارت را با مشخص‌کننده قطعه expr مطابقت می‌دهد، ویرگول به عنوان جداکننده بین عبارات عمل می‌کند، و ستاره (*) نشان‌دهنده صفر یا بیشتر تکرار است. پاسخ‌های نادرست شامل خطاهای نحوی هستند: $($x:expr)*، ویرگول را خارج از گروه تکرار قرار می‌دهد، $[x:expr],* از کروشه به جای پرانتز استفاده می‌کند و علامت دلار قبل از x را حذف می‌کند، و ${$x:expr},* از آکولاد به جای پرانتز برای گروه تکرار استفاده می‌کند.
question: 哪種巨集模式語法能正確匹配自訂函數巨集中以逗號分隔的零個或多個表達式？
answer: $($x:expr),*
wrong_answers:
  - $($x:expr)*、
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  正確的語法 $($x:expr),* 使用 Rust 的重複模式，其中美元符號引入重複群組，$x:expr 與 expr 片段指定符匹配每個表達式，逗號作為表達式之間的分隔符，星號 (*) 表示零次或多次重複。錯誤答案包含語法錯誤：$($x:expr)*，將逗號放在重複群組之外；$[x:expr],* 使用方括號而不是括號，並且省略了 x 前面的美元符號；${$x:expr},* 使用大括號而不是括號來表示重複群組。
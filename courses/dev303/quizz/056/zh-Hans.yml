question: 哪种宏模式语法能正确匹配自定义函数式宏中用逗号分隔的零个或多个表达式？
answer: $(x:expr),*
wrong_answers:
  - $($x:expr)*、
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  正确的语法$($x:epr),*使用了 Rust 的重复模式，其中美元符号表示重复组，$x:epr 匹配带有 expr 片段指定符的每个表达式，逗号作为表达式之间的分隔符，星号（*）表示零次或多次重复。错误答案包含语法错误：$($x:expr)* 将逗号放在重复组之外，$[x:expr]* 使用方括号而不是括号，并且省略了 x 前面的美元符号，${$x:expr},* 在重复组中使用大括号而不是括号。
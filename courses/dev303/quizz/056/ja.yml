question: カスタム関数のようなマクロで、カンマで区切られたゼロ個以上の式に正しくマッチするマクロパターン構文はどれか。
answer: ($x:expr),*
wrong_answers:
  - ($x:expr)*、
  - x:expr],*
  - x:expr},*。
explanation: |
  正しい構文$($x:expr),*は、Rustの繰り返しパターンを使用しており、ドル記号が繰り返しグループを導入し、$x:exprがexprフラグメント指定子を持つ各式にマッチし、カンマが式の区切りとして機能し、アスタリスク(*)が0回以上の繰り返しを示します。($x:expr)*は、カンマを繰り返しグループの外側に置き、$[x:expr],*は、括弧の代わりに角括弧を使用し、xの前にドル記号を省略し、${$x:expr},*は、繰り返しグループの括弧の代わりに中括弧を使用します。
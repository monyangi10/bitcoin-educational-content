question: 사용자 지정 함수형 매크로에서 쉼표로 구분된 0개 이상의 표현식과 올바르게 일치하는 매크로 패턴 구문은 무엇인가요?
answer: ($x:expr),*
wrong_answers:
  - ($x:expr)*,
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  올바른 구문 $($x:expr),*는 달러 기호가 반복 그룹을 도입하고, $x:expr이 각 표현식을 expr 조각 지정자와 일치시키고, 쉼표가 표현식 사이의 구분자 역할을 하며, 별표(*)가 0개 이상의 반복을 나타내는 Rust의 반복 패턴을 사용하는 구문입니다. 오답에는 구문 오류가 포함되어 있습니다. $($x:expr)*는 쉼표를 반복 그룹 외부에 배치하고, $[x:expr],*는 괄호 대신 대괄호를 사용하고 x 앞에 달러 기호를 생략하며, ${$x:expr},*는 반복 그룹에 괄호 대신 중괄호를 사용합니다.
question: Кой синтаксис на макрошаблона би съответствал правилно на нула или повече изрази, разделени със запетаи, в потребителски макрос, подобен на функция?
answer: $($x:expr),*
wrong_answers:
  - $($x:expr)*,
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  Правилният синтаксис $($x:expr),* използва шаблона за повторения на Rust, където знакът за долар въвежда група повторения, $x:expr съответства на всеки израз с определителя на фрагмента expr, запетаята действа като разделител между изразите, а звездичката (*) показва нула или повече повторения. Неправилните отговори съдържат синтактични грешки: $($x:expr)*, поставя запетаята извън групата за повторение, $[x:expr],* използва квадратни скоби вместо скоби и пропуска знака за долар преди x, а ${$x:expr},* използва къдрави скоби вместо скоби за групата за повторение.
question: Какой синтаксис макрошаблона будет правильно соответствовать нулю или нескольким выражениям, разделенным запятыми, в пользовательском функционально-подобном макросе?
answer: $($x:expr),*
wrong_answers:
  - $($x:expr)*,
  - $[x:expr],*
  - ${$x:expr},*
explanation: |
  Правильный синтаксис $($x:expr),* использует шаблон повторения Rust, где знак доллара вводит группу повторений, $x:expr соответствует каждому выражению со спецификатором фрагмента expr, запятая служит разделителем между выражениями, а звездочка (*) указывает на нуль или более повторений. Неправильные ответы содержат синтаксические ошибки: $($x:expr)* ставит запятую вне группы повторений, $[x:expr],* использует квадратные скобки вместо круглых скобок и опускает знак доллара перед x, а ${$x:expr},* использует фигурные скобки вместо круглых скобок для группы повторений.
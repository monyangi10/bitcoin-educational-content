question: معماری اصلی که SDK Breez برای دستیابی به یکپارچه‌سازی ساده‌تر لایتنینگ در عین حفظ اصول غیرامانی انجام می‌دهد، چیست؟
answer: کاربران با مشاهده وضعیت کانال‌ها و اطلاعات مسیریابی توسط Greenlight، بخشی از حریم خصوصی خود را قربانی می‌کنند، اما کنترل کامل بر کلیدهای خصوصی و دسترسی به وجوه را حفظ می‌کنند.
wrong_answers:
  - کاربران باید به Greenlight برای نگهداری جزئی از وجوه اعتماد کنند تا در ازای آن مدیریت خودکار کانال و کاهش پیچیدگی عملیاتی را دریافت کنند.
  - توسعه‌دهندگان دسترسی به ویژگی‌های پیشرفته لایتنینگ مانند مسیریابی سفارشی و سیاست‌های کانال را در ازای یکپارچه‌سازی ساده API و پشتیبانی از پلتفرم‌های مختلف از دست می‌دهند.
  - برنامه‌ها قابلیت‌های پردازش پرداخت در زمان واقعی را فدای امنیت بهتر از طریق اعتبارسنجی مبتنی بر ابر برای تمامی تراکنش‌های لایتنینگ می‌کنند.
explanation: |
  معماری SDK Breez نشان‌دهنده یک موازنه دقیق بین حریم خصوصی و قابلیت استفاده است. در حالی که گرین‌لایت می‌تواند وضعیت کانال‌ها و اطلاعات مسیریابی را مشاهده کند (که حریم خصوصی را کاهش می‌دهد)، کاربران کنترل کامل بر کلیدهای خصوصی خود دارند که هرگز دستگاه‌هایشان را ترک نمی‌کنند. این امر تضمین می‌کند که وجوه بدون مجوز کاربر قابل دسترسی نیستند و اصل غیرامانی اصلی را حفظ می‌کند. پاسخ‌های نادرست به اشتباه پیشنهاد می‌دهند که حضانت وجوه، محدودیت‌های ویژگی یا تأخیر در پردازش وجود دارد - که هیچ‌کدام از این‌ها در طراحی SDK موازنه واقعی نیستند.
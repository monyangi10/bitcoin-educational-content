question: Какъв е основният архитектурен компромис, който се прави в Breez SDK, за да се постигне опростена интеграция с Lightning, като същевременно се запазят принципите на несеквестируемост?
answer: Потребителите жертват част от поверителността си, тъй като Greenlight може да наблюдава състоянието на каналите и информацията за маршрутизацията, но запазват пълен контрол върху частните ключове и достъпа до средства
wrong_answers:
  - Потребителите трябва да поверят на Greenlight частично попечителство на средства в замяна на автоматизирано управление на каналите и намаляване на оперативната сложност
  - Разработчиците губят достъп до усъвършенствани функции на Lightning, като персонализирано маршрутизиране и политики за каналите, в замяна на опростена интеграция с API и междуплатформена поддръжка
  - Приложенията жертват възможностите за обработка на плащания в реално време в замяна на по-добра сигурност чрез облачно валидиране на всички транзакции с Lightning
explanation: |
  Архитектурата на Breez SDK представлява внимателно обмислен компромис между неприкосновеността на личния живот и възможността за използване. Въпреки че Greenlight може да наблюдава състоянията на каналите и информацията за маршрутизация (което намалява поверителността), потребителите запазват пълен контрол върху своите частни ключове, които никога не напускат устройствата им. Това гарантира, че достъпът до средствата не може да бъде осъществен без разрешение от страна на потребителя, като се запазва основният принцип на несеквестируемост. Неправилните отговори неправилно предполагат попечителство на средства, ограничения на функциите или забавяне на обработката - нито едно от които не е действителен компромис в дизайна на SDK.
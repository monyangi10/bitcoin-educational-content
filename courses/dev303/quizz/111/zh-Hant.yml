question: Breez SDK 在保持非囚禁原則的同時，為了實現簡化 Lightning 整合而進行的主要架構權衡是什麼？
answer: 使用者會犧牲一些隱私權，因為 Greenlight 可以觀察通道狀態和路由資訊，但保留對私人金鑰和資金存取的完全控制。
wrong_answers:
  - 使用者必須信任 Greenlight，將部分資金託管給 Greenlight，以換取自動化通路管理和降低作業複雜度
  - 開發人員無法使用自訂路由和頻道政策等先進 Lightning 功能，以換取簡化的 API 整合和跨平台支援
  - 應用程式犧牲即時付款處理功能，以換取透過雲端驗證所有 Lightning 交易的更佳安全性
explanation: |
  Breez SDK 的架構是經過仔細考慮的隱私與可用性之間的權衡。雖然 Greenlight 可以觀察通道狀態和路由資訊（降低隱私性），但使用者可以完全控制他們的私人金鑰，這些金鑰從未離開他們的設備。這可確保在未經使用者授權的情況下，資金無法被存取，保留核心的非監護原則。錯誤的答案錯誤地暗示了資金保管、功能限制或處理延遲 - 這些都不是 SDK 設計中實際的取捨。
question: 非親告罪の原則を維持しながらライトニングとの統合を簡素化するために、Breez SDKが行っている主なアーキテクチャ上のトレードオフは何ですか？
answer: Greenlightはチャネルの状態とルーティング情報を監視できるため、ユーザーはプライバシーをある程度犠牲にするが、秘密鍵と資金へのアクセスを完全に制御できる。
wrong_answers:
  - ユーザーは、自動化されたチャネル管理と運用の複雑さの軽減と引き換えに、資金の一部保管をGreenlightに託さなければならない。
  - 開発者は、API統合の簡素化とクロスプラットフォームのサポートと引き換えに、カスタムルーティングやチャネルポリシーのような高度なLightning機能へのアクセスを失う。
  - アプリケーションは、リアルタイムの決済処理機能を犠牲にする代わりに、Lightningの全取引をクラウドベースで検証することでセキュリティを向上させる。
explanation: |
  Breez SDKのアーキテクチャは、プライバシーとユーザビリティのトレードオフを慎重に考慮したものです。Greenlightはチャネルの状態とルーティング情報を観察することができますが（プライバシーを減らす）、ユーザーは自分のデバイスを離れることのない秘密鍵の完全なコントロールを維持します。これは、資金がユーザの承認なしにアクセスできないことを保証し、核となる非監護の原則を維持する。不正解は、資金保管、機能制限、処理遅延を示唆しているが、いずれもSDKの設計における実際のトレードオフではない。
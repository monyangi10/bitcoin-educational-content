question: На какой основной архитектурный компромисс идет Breez SDK, чтобы добиться упрощенной интеграции Lightning при сохранении принципов нераспространения?
answer: Пользователи жертвуют некоторой конфиденциальностью, поскольку Greenlight может наблюдать за состоянием каналов и информацией о маршрутизации, но сохраняют полный контроль над закрытыми ключами и доступом к средствам
wrong_answers:
  - Пользователи должны доверить Greenlight частичное хранение средств в обмен на автоматизированное управление каналами и снижение операционной сложности
  - Разработчики теряют доступ к расширенным функциям Lightning, таким как пользовательская маршрутизация и политики каналов, в обмен на упрощенную интеграцию API и кросс-платформенную поддержку
  - Приложения жертвуют возможностями обработки платежей в режиме реального времени в обмен на повышенную безопасность благодаря облачной проверке всех транзакций Lightning
explanation: |
  Архитектура Breez SDK представляет собой тщательно продуманный компромисс между приватностью и удобством использования. Хотя Greenlight может наблюдать за состоянием канала и информацией о маршрутизации (что снижает уровень конфиденциальности), пользователи сохраняют полный контроль над своими приватными ключами, которые никогда не покидают их устройства. Это гарантирует, что доступ к средствам без разрешения пользователя невозможен, что сохраняет основной принцип нехранимости. Неправильные ответы неверно указывают на хранение средств, ограничения функций или задержки в обработке - ни один из этих факторов не является реальным компромиссом при разработке SDK.
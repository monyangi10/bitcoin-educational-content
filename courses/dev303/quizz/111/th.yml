question: ข้อแลกเปลี่ยนทางสถาปัตยกรรมหลักที่ Breez SDK ทำเพื่อให้การรวม Lightning ง่ายขึ้นในขณะที่ยังคงรักษาหลักการที่ไม่ใช่การคุมขังคืออะไร?
answer: ผู้ใช้ยอมสละความเป็นส่วนตัวบางส่วนเนื่องจาก Greenlight สามารถสังเกตสถานะช่องทางและข้อมูลการกำหนดเส้นทาง แต่ยังคงควบคุมคีย์ส่วนตัวและการเข้าถึงเงินทุนได้อย่างเต็มที่
wrong_answers:
  - ผู้ใช้ต้องไว้วางใจ Greenlight ในการดูแลเงินบางส่วนเพื่อแลกกับการจัดการช่องทางอัตโนมัติและลดความซับซ้อนในการดำเนินงาน
  - นักพัฒนาสูญเสียการเข้าถึงฟีเจอร์ Lightning ขั้นสูง เช่น การกำหนดเส้นทางแบบกำหนดเองและนโยบายช่องทาง เพื่อแลกกับการผสานรวม API ที่ง่ายขึ้นและการสนับสนุนข้ามแพลตฟอร์ม
  - แอปพลิเคชันยอมสละความสามารถในการประมวลผลการชำระเงินแบบเรียลไทม์เพื่อแลกกับความปลอดภัยที่ดีขึ้นผ่านการตรวจสอบความถูกต้องของธุรกรรม Lightning ทั้งหมดบนคลาวด์
explanation: |
  สถาปัตยกรรมของ Breez SDK แสดงถึงการแลกเปลี่ยนระหว่างความเป็นส่วนตัวและการใช้งานที่ได้รับการพิจารณาอย่างรอบคอบ ในขณะที่ Greenlight สามารถสังเกตสถานะของช่องทางและข้อมูลการกำหนดเส้นทาง (ลดความเป็นส่วนตัว) ผู้ใช้ยังคงควบคุมกุญแจส่วนตัวของตนอย่างสมบูรณ์ ซึ่งไม่เคยออกจากอุปกรณ์ของพวกเขา สิ่งนี้ทำให้มั่นใจได้ว่าเงินไม่สามารถเข้าถึงได้หากไม่ได้รับอนุญาตจากผู้ใช้ รักษาหลักการที่ไม่ใช่การคุมขังเป็นแกนหลัก คำตอบที่ผิดแนะนำอย่างไม่ถูกต้องเกี่ยวกับการคุมขังเงิน ข้อจำกัดของฟีเจอร์ หรือความล่าช้าในการประมวลผล ซึ่งไม่มีสิ่งใดเป็นการแลกเปลี่ยนที่แท้จริงในออกแบบของ SDK
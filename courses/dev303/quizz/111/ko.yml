question: 비수탁 원칙을 유지하면서 간소화된 Lightning 통합을 달성하기 위해 Breez SDK가 수행하는 주요 아키텍처 트레이드 오프는 무엇인가요?
answer: 그린라이트가 채널 상태와 라우팅 정보를 관찰할 수 있으므로 사용자는 프라이버시를 일부 희생하지만, 개인 키와 자금 액세스에 대한 완전한 제어권을 유지합니다
wrong_answers:
  - 사용자는 자동화된 채널 관리와 운영 복잡성 감소를 위해 자금의 일부 관리권을 그린라이트에 맡겨야 합니다
  - 개발자는 간소화된 API 통합 및 크로스 플랫폼 지원 대신 사용자 지정 라우팅 및 채널 정책과 같은 고급 Lightning 기능에 액세스할 수 없습니다
  - 애플리케이션은 모든 Lightning 거래의 클라우드 기반 유효성 검사를 통해 보안을 강화하는 대신 실시간 결제 처리 기능을 희생합니다
explanation: |
  Breez SDK의 아키텍처는 개인정보 보호와 사용성의 균형을 신중하게 고려한 것입니다. Greenlight는 채널 상태와 라우팅 정보를 관찰할 수 있지만(개인정보 보호는 감소), 사용자는 자신의 개인 키를 완벽하게 제어할 수 있으며, 개인 키는 디바이스를 떠나지 않습니다. 따라서 사용자 승인 없이는 자금에 액세스할 수 없으므로 핵심적인 비수탁 원칙을 유지할 수 있습니다. 오답은 자금 보관, 기능 제한 또는 처리 지연을 잘못 제시하고 있지만, 이는 SDK의 설계에서 실제 절충안이 아닙니다.
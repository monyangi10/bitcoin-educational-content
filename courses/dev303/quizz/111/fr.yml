question: Quel est le principal compromis architectural que le SDK Breez fait pour simplifier l'intégration de Lightning tout en conservant des principes non privatifs de liberté ?
answer: Les utilisateurs sacrifient une partie de leur vie privée car Greenlight peut observer l'état des canaux et les informations de routage, mais ils conservent un contrôle total sur les clés privées et l'accès aux fonds
wrong_answers:
  - Les utilisateurs doivent confier à Greenlight la garde partielle de leurs fonds en échange d'une gestion automatisée des canaux et d'une réduction de la complexité opérationnelle
  - Les développeurs perdent l'accès aux fonctionnalités avancées de Lightning, telles que le routage personnalisé et les politiques de canaux, en échange d'une intégration API simplifiée et d'une prise en charge multiplateforme
  - Les applications sacrifient les capacités de traitement des paiements en temps réel en échange d'une meilleure sécurité grâce à la validation en nuage de toutes les transactions Lightning
explanation: |
  L'architecture du SDK Breez représente un compromis soigneusement étudié entre la confidentialité et la facilité d'utilisation. Alors que Greenlight peut observer les états des canaux et les informations de routage (ce qui réduit la confidentialité), les utilisateurs conservent un contrôle total sur leurs clés privées, qui ne quittent jamais leurs appareils. Cela garantit que les fonds ne sont pas accessibles sans l'autorisation de l'utilisateur, ce qui préserve le principe fondamental de non-détention. Les mauvaises réponses suggèrent à tort la garde des fonds, les limitations des fonctionnalités ou les retards de traitement, qui ne sont pas des compromis réels dans la conception du SDK.
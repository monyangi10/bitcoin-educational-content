question: Breez SDK为实现简化的 "闪电 "集成，同时保持非托管原则，在架构上主要做了哪些权衡？
answer: 由于 Greenlight 可以观察信道状态和路由信息，用户牺牲了部分隐私，但保留了对私钥和资金访问的完全控制权
wrong_answers:
  - 用户必须将部分资金托管给 Greenlight，以换取自动化渠道管理和降低运营复杂性
  - 开发人员无法使用自定义路由和渠道策略等高级 Lightning 功能，以换取简化的 API 集成和跨平台支持
  - 应用程序牺牲了实时支付处理能力，以换取通过对所有 Lightning 交易进行云验证来提高安全性
explanation: |
  Breez SDK 的架构是经过深思熟虑的隐私与可用性之间的权衡。虽然 Greenlight 可以观察到信道状态和路由信息（降低了隐私性），但用户可以完全控制自己的私钥，这些私钥永远不会离开他们的设备。这就确保了在没有用户授权的情况下，资金无法被访问，从而维护了核心的非托管原则。错误答案错误地暗示了资金托管、功能限制或处理延迟--这些都不是 SDK 设计中的实际权衡。
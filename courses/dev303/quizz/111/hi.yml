question: सरलीकृत लाइटनिंग एकीकरण प्राप्त करने के साथ-साथ गैर-अभिभावकीय सिद्धांतों को बनाए रखने के लिए Breez SDK द्वारा किया गया प्राथमिक वास्तुशिल्प समझौता क्या है?
answer: उपयोगकर्ता अपनी कुछ गोपनीयता खो देते हैं क्योंकि ग्रीनलाइट चैनल की स्थिति और रूटिंग जानकारी देख सकता है, लेकिन निजी कुंजी और फंड तक पहुंच पर उनका पूरा नियंत्रण बना रहता है।
wrong_answers:
  - स्वचालित चैनल प्रबंधन और परिचालन संबंधी जटिलता में कमी के बदले उपयोगकर्ताओं को धन की आंशिक सुरक्षा के लिए ग्रीनलाइट पर भरोसा करना होगा।
  - सरलीकृत API एकीकरण और क्रॉस-प्लेटफ़ॉर्म समर्थन के बदले डेवलपर्स कस्टम रूटिंग और चैनल नीतियों जैसी उन्नत लाइटनिंग सुविधाओं तक पहुंच खो देते हैं।
  - एप्लिकेशन, लाइटनिंग लेनदेन के क्लाउड-आधारित सत्यापन के माध्यम से बेहतर सुरक्षा के बदले, वास्तविक समय में भुगतान प्रसंस्करण क्षमताओं का त्याग करते हैं।
explanation: |
  Breez SDK की संरचना गोपनीयता और उपयोगिता के बीच सोच-समझकर किए गए संतुलन को दर्शाती है। ग्रीनलाइट चैनल की स्थिति और रूटिंग जानकारी देख सकता है (जिससे गोपनीयता कम हो जाती है), लेकिन उपयोगकर्ता अपनी निजी कुंजियों पर पूर्ण नियंत्रण बनाए रखते हैं, जो कभी भी उनके डिवाइस से बाहर नहीं जातीं। इससे यह सुनिश्चित होता है कि उपयोगकर्ता की अनुमति के बिना धनराशि तक पहुंच संभव नहीं है, जिससे मूल गैर-संरक्षण सिद्धांत संरक्षित रहता है। गलत उत्तर गलत तरीके से धनराशि की संरक्षा, सुविधाओं की सीमाओं या प्रसंस्करण में देरी का सुझाव देते हैं - जबकि SDK के डिज़ाइन में इनमें से कोई भी वास्तविक समझौता नहीं है।
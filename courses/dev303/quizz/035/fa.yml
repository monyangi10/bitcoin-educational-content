question: متد unwrap زمانی که بر روی یک نوع Result در Rust فراخوانی می‌شود، مقدار موفقیت‌آمیز (Ok) را برمی‌گرداند و در صورت وجود خطا (Err)، برنامه را متوقف می‌کند و یک پیام خطا نمایش می‌دهد.
answer: مقدار موفقیت را استخراج می‌کند اما در صورت بروز خطا دچار وحشت می‌شود
wrong_answers:
  - در صورت بروز خطا، None را برمی‌گرداند و در صورت موفقیت، Some را برمی‌گرداند.
  - خطا را به پیام هشدار تبدیل کرده و اجرای برنامه را ادامه می‌دهد.
  - به‌طور خودکار خطا را به تابع فراخوانی‌کننده منتقل می‌کند
explanation: |
  متد unwrap مقدار موفقیت را از یک Result استخراج می‌کند اما باعث می‌شود برنامه در صورت وقوع خطا متوقف شود. این ویژگی آن را برای نمونه‌سازی سریع یا موقعیت‌هایی که مطمئن هستید یک عملیات موفق خواهد بود، مفید می‌سازد. گزینه‌های دیگر رفتارهای متفاوتی را توصیف می‌کنند: بازگرداندن None/Some انواع Option را توصیف می‌کند، تبدیل خطاها به هشدارها یک الگوی استاندارد Rust نیست و انتشار خودکار خطا همان چیزی است که عملگر علامت سوال (?) انجام می‌دهد، نه unwrap.
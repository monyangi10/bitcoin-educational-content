question: Rust में Result प्रकार पर कॉल किए जाने पर unwrap विधि क्या करती है?
answer: सफलता का मान निकालता है, लेकिन त्रुटि होने पर पैनिक स्थिति उत्पन्न करता है।
wrong_answers:
  - त्रुटि होने पर None और सफल होने पर Some लौटाता है।
  - त्रुटि को चेतावनी संदेश में परिवर्तित करता है और निष्पादन जारी रखता है।
  - त्रुटि को स्वचालित रूप से कॉलिंग फ़ंक्शन तक पहुँचाता है
explanation: |
  अनव्रैप विधि रिजल्ट से सफलता का मान निकालती है, लेकिन त्रुटि होने पर प्रोग्राम क्रैश हो जाता है। यह त्वरित प्रोटोटाइपिंग या ऐसी स्थितियों के लिए उपयोगी है जहाँ आपको पूरा भरोसा है कि ऑपरेशन सफल होगा। अन्य विकल्प अलग-अलग व्यवहारों का वर्णन करते हैं: None/Some लौटाना ऑप्शन प्रकारों को दर्शाता है, त्रुटियों को चेतावनियों में बदलना Rust का मानक पैटर्न नहीं है, और स्वचालित त्रुटि प्रसार प्रश्न चिह्न ऑपरेटर (?) का कार्य है, न कि अनव्रैप का।
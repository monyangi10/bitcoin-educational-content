question: Какво прави методът unwrap, когато се извиква за тип Резултат в Rust?
answer: Извлича стойността на успеха, но изпада в паника, ако възникне грешка
wrong_answers:
  - Връща None, ако възникне грешка, и Some, ако е успешна
  - Превръща грешката в предупредително съобщение и продължава изпълнението
  - Автоматично разпространява грешката към извикващата функция
explanation: |
  Методът unwrap извлича стойността на успеха от Result, но кара програмата да изпадне в паника, ако възникне грешка. Това го прави полезен за бързо създаване на прототипи или в ситуации, в които сте сигурни, че операцията ще бъде успешна. Другите опции описват различно поведение: връщането на None/Some описва типове Option, преобразуването на грешки в предупреждения не е стандартен модел на Rust, а автоматичното разпространение на грешки е това, което прави операторът с въпросителен знак (?), а не unwrap.
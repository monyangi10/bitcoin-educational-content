question: 언랩 메서드는 Rust의 결과 유형에서 호출될 때 어떤 기능을 하나요?
answer: 성공 값을 추출하지만 오류가 발생하면 당황합니다
wrong_answers:
  - 오류가 발생하면 None을 반환하고 성공하면 Some을 반환합니다
  - 오류를 경고 메시지로 변환하고 실행을 계속합니다
  - 호출 함수에 오류를 자동으로 전파합니다
explanation: |
  언랩 메서드는 결과에서 성공값을 추출하지만 오류가 발생하면 프로그램이 패닉 상태에 빠집니다. 따라서 빠른 프로토타이핑이나 연산이 성공할 것이라고 확신하는 상황에 유용합니다. 다른 옵션은 다른 동작을 설명합니다. None/Some 반환은 옵션 유형을 설명하고, 오류를 경고로 변환하는 것은 표준 Rust 패턴이 아니며, 자동 오류 전파는 물음표 연산자(?)가 하는 일이지 언래핑이 아닙니다.
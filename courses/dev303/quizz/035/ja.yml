question: RustのResult型でunwrapメソッドを呼び出すと、何をするのですか？
answer: 成功値を取り出しますが、エラーが発生するとパニックになります。
wrong_answers:
  - エラーが発生した場合は None を、成功した場合は Some を返す。
  - エラーを警告メッセージに変換し、実行を継続する。
  - 呼び出し関数にエラーを自動的に伝える
explanation: |
  unwrapメソッドはResultから成功値を取り出しますが、エラーが発生するとプログラムがパニックになります。これは、迅速なプロトタイピングや、操作が成功すると確信している状況で有用です。None/Someを返すことはOption型を記述し、エラーを警告に変換することはRustの標準的なパターンではなく、自動エラー伝搬はunwrapではなく疑問符演算子(?)が行うことです。
question: 在 Rust 中，在結果類型上呼叫 unwrap 方法時會做什麼？
answer: 擷取成功值，但若發生錯誤，則會陷入恐慌
wrong_answers:
  - 如果發生錯誤，則返回 None；如果成功，則返回 Some
  - 將錯誤訊息轉換成警告訊息，並繼續執行
  - 自動將錯誤傳遞給呼叫函式
explanation: |
  unwrap 方法會從 Result 擷取成功值，但如果發生錯誤，程式就會恐慌。這使得它對快速原型設計或有把握操作會成功的情況很有用。其他選項描述了不同的行為：返回 None/Some 描述了 Option 類型，將錯誤轉換為警告不是標準的 Rust 模式，自動錯誤傳播是問號運算符 (?) 所做的，而不是 unwrap。
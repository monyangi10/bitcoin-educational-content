question: 在 Rust 中，对结果类型调用 unwrap 方法时会做什么？
answer: 提取成功值，但如果出现错误则会惊慌失措
wrong_answers:
  - 如果出错，则返回 None；如果成功，则返回 Some
  - 将错误信息转换为警告信息并继续执行
  - 自动将错误传递给调用函数
explanation: |
  解包方法从结果中提取成功值，但如果出现错误，程序就会慌乱。这使得它在快速原型开发或确信操作会成功的情况下非常有用。其他选项描述了不同的行为：返回 None/Some 描述了 Option 类型，将错误转换为警告不是标准的 Rust 模式，自动错误传播是问号操作符 (?) 的作用，而不是 unwrap。
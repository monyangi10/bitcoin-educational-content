question: Что делает метод unwrap при вызове типа Result в Rust?
answer: Извлекает значение успеха, но паникует при возникновении ошибки
wrong_answers:
  - Возвращает None в случае ошибки и Some в случае успеха
  - Преобразует ошибку в предупреждение и продолжает выполнение
  - Автоматически передает ошибку вызывающей функции
explanation: |
  Метод unwrap извлекает значение успеха из Result, но вызывает панику программы в случае ошибки. Это делает его полезным для быстрого прототипирования или ситуаций, когда вы уверены в успехе операции. Остальные варианты описывают другое поведение: возврат None/Some описывает типы Option, преобразование ошибок в предупреждения не является стандартным шаблоном Rust, а автоматическое распространение ошибок - это то, что делает оператор вопросительного знака (?), а не unwrap.
question: เกิดอะไรขึ้นเมื่อมีการเปลี่ยนแปลงตัวแปรในระบบการเป็นเจ้าของของ Rust?
answer: ค่าจะถูกลบโดยอัตโนมัติและหน่วยความจำจะถูกปลดปล่อย
wrong_answers:
  - ค่านี้ถูกย้ายไปยังขอบเขตทั่วโลกเพื่อการใช้งานซ้ำ
  - ค่าจะกลายเป็นไม่เปลี่ยนแปลงและคงอยู่ในหน่วยความจำ
  - ค่านี้ถูกคัดลอกไปยังตำแหน่งสำรองเพื่อความปลอดภัย
explanation: |
  ในระบบการเป็นเจ้าของของ Rust เมื่อมีตัวแปรออกจากขอบเขต (โดยทั่วไปเมื่อการดำเนินการออกจากบล็อกที่กำหนดโดยวงเล็บปีกกา) ค่าจะถูกลบโดยอัตโนมัติและหน่วยความจำจะถูกปล่อย การทำความสะอาดอัตโนมัตินี้ถูกนำมาใช้ผ่านกลไกการลบของ Rust ซึ่งภาษาจะเรียกฟังก์ชันการลบโดยปริยายเมื่อตัวแปรออกจากขอบเขต สิ่งนี้ช่วยให้การจัดการทรัพยากรเป็นไปอย่างถูกต้องโดยไม่ต้องใช้โค้ดทำความสะอาดที่ชัดเจนจากโปรแกรมเมอร์ ตามรูปแบบ RAII ที่ยืมมาจาก C++
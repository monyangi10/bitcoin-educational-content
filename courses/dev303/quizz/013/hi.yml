question: Rust की स्वामित्व प्रणाली में जब कोई वेरिएबल स्कोप से बाहर हो जाता है तो क्या होता है?
answer: यह मान स्वचालित रूप से हटा दिया जाता है और इसकी मेमोरी मुक्त हो जाती है।
wrong_answers:
  - इस मान को पुन: उपयोग के लिए वैश्विक दायरे में स्थानांतरित कर दिया गया है।
  - यह मान अपरिवर्तनीय हो जाता है और मेमोरी में बना रहता है।
  - सुरक्षा के लिए मान को बैकअप स्थान पर कॉपी कर लिया जाता है।
explanation: |
  Rust की स्वामित्व प्रणाली में, जब कोई चर स्कोप से बाहर हो जाता है (आमतौर पर जब निष्पादन कर्ली ब्रेसेस द्वारा परिभाषित ब्लॉक से बाहर निकलता है), तो उसका मान स्वचालित रूप से हटा दिया जाता है और उसकी मेमोरी मुक्त हो जाती है। यह स्वचालित सफाई Rust के ड्रॉप तंत्र के माध्यम से कार्यान्वित की जाती है, जहाँ भाषा स्कोप से बाहर जाने वाले चरों पर अप्रत्यक्ष रूप से एक ड्रॉप फ़ंक्शन को कॉल करती है। यह C++ से लिए गए RAII पैटर्न का अनुसरण करते हुए, प्रोग्रामर से स्पष्ट सफाई कोड की आवश्यकता के बिना उचित संसाधन प्रबंधन सुनिश्चित करता है।
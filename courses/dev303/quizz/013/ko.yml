question: Rust의 소유권 시스템에서 변수가 범위를 벗어나면 어떻게 되나요?
answer: 값이 자동으로 삭제되고 해당 메모리가 해제됩니다
wrong_answers:
  - 값은 재사용을 위해 전역 범위로 이동됩니다
  - 값은 불변이 되어 메모리에 남아 있습니다
  - 이 값은 안전을 위해 백업 위치에 복사됩니다
explanation: |
  Rust의 소유권 시스템에서는 변수가 범위를 벗어나면(일반적으로 실행이 중괄호로 정의된 블록을 벗어날 때) 해당 값이 자동으로 삭제되고 해당 메모리가 해제됩니다. 이러한 자동 정리는 Rust의 드롭 메커니즘을 통해 구현되는데, 이 메커니즘은 언어가 범위를 벗어나는 변수에 대해 암시적으로 드롭 함수를 호출합니다. 이를 통해 프로그래머가 C++에서 차용한 RAII 패턴에 따라 명시적인 정리 코드를 작성하지 않아도 적절한 리소스 관리가 가능합니다.
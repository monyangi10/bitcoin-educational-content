question: Rustのオーナーシップ・システムで、変数がスコープ外になったらどうなるのか？
answer: 値は自動的に削除され、メモリは解放されます。
wrong_answers:
  - 値は再利用のためにグローバルスコープに移される。
  - 値は不変となり、メモリに残ります。
  - 値は安全のためにバックアップの場所にコピーされる。
explanation: |
  Rustのオーナーシップ・システムでは、変数がスコープ外に出たとき（通常は中括弧で定義されたブロックから出たとき）、その値は自動的にドロップされ、メモリが解放される。この自動クリーンアップは、Rustのドロップメカニズムによって実装されており、スコープから外れる変数に対して暗黙的にドロップ関数を呼び出します。これにより、C++から借用したRAIIパターンに従い、プログラマーが明示的なクリーンアップ・コードを要求することなく、適切なリソース管理が保証される。
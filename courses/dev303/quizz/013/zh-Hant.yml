question: 在 Rust 的所有權系統中，當變數超出範圍時會發生什麼？
answer: 該值會自動丟棄，並釋放其記憶體。
wrong_answers:
  - 該值會移至全局範圍以供重複使用
  - 值變得不可變，並保留在記憶體中
  - 為了安全起見，數值會複製到備份位置。
explanation: |
  在 Rust 的所有權系統中，當變數離開範圍（通常是當執行離開一個由大括弧定義的區塊時），其值會被自動丟棄，其記憶體也會被釋放。這種自動清理是透過 Rust 的 drop 機制來實現的，在這個機制中，語言會隱式地呼叫一個對變數離開作用範圍的 drop 函數。這可確保妥善的資源管理，而不需要程式設計師執行明確的清理程式碼，遵循從 C++ 借來的 RAII 模式。
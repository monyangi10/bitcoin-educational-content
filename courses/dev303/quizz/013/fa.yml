question: وقتی یک متغیر در سیستم مالکیت Rust از حوزه خارج می‌شود، چه اتفاقی می‌افتد؟
answer: مقدار به‌طور خودکار حذف می‌شود و حافظه آن آزاد می‌شود
wrong_answers:
  - مقدار به حوزهٔ جهانی منتقل می‌شود تا مجدداً استفاده شود.
  - مقدار تغییرناپذیر می‌شود و در حافظه باقی می‌ماند.
  - مقدار به یک مکان پشتیبان برای ایمنی کپی می‌شود
explanation: |
  در سیستم مالکیت Rust، زمانی که یک متغیر از محدوده خارج می‌شود (معمولاً زمانی که اجرا از یک بلوک تعریف‌شده توسط آکولادها خارج می‌شود)، مقدار به‌طور خودکار حذف شده و حافظه آن آزاد می‌شود. این پاکسازی خودکار از طریق مکانیزم حذف Rust پیاده‌سازی می‌شود، جایی که زبان به‌طور ضمنی یک تابع حذف را بر روی متغیرهایی که از محدوده خارج می‌شوند، فراخوانی می‌کند. این امر مدیریت صحیح منابع را بدون نیاز به کد پاکسازی صریح از سوی برنامه‌نویس تضمین می‌کند و از الگوی RAII که از C++ گرفته شده است، پیروی می‌کند.
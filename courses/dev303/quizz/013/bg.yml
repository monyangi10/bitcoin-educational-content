question: Какво се случва, когато дадена променлива излезе извън обхвата в системата за собственост на Rust?
answer: Стойността автоматично се премахва и паметта ѝ се освобождава
wrong_answers:
  - Стойността се премества в глобалния обхват за повторно използване
  - Стойността става неизменна и остава в паметта
  - Стойността се копира в резервно местоположение за безопасност
explanation: |
  В системата за собственост на Rust, когато дадена променлива излезе от обхвата (обикновено когато изпълнението напуска блок, дефиниран с къдрави скоби), стойността ѝ автоматично се премахва и паметта ѝ се освобождава. Това автоматично почистване се осъществява чрез механизма за отпадане на Rust, при който езикът имплицитно извиква функция за отпадане на променливи, които излизат от обхвата. Това осигурява правилно управление на ресурсите, без да се изисква изричен код за почистване от програмиста, следвайки модела RAII, заимстван от C++.
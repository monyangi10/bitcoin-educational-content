question: Что происходит, когда переменная выходит за пределы области видимости в системе владения Rust?
answer: Значение автоматически удаляется, а его память освобождается
wrong_answers:
  - Значение перемещается в глобальную область для повторного использования
  - Значение становится неизменяемым и остается в памяти
  - Значение копируется в резервное место для сохранности
explanation: |
  В системе владения Rust, когда переменная выходит из области видимости (обычно при выходе из блока, заданного фигурными скобками), ее значение автоматически удаляется, а память освобождается. Эта автоматическая очистка реализуется с помощью механизма drop в Rust, когда язык неявно вызывает функцию drop для переменных, выходящих из области видимости. Это обеспечивает надлежащее управление ресурсами, не требуя от программиста явного кода очистки, следуя паттерну RAII, заимствованному из C++.
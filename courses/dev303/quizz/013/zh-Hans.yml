question: 在 Rust 的所有权系统中，当变量超出范围时会发生什么？
answer: 该值会自动删除并释放其内存
wrong_answers:
  - 该值被移至全局范围供重复使用
  - 值变得不可变，并保留在内存中
  - 为安全起见，该值会被复制到备份位置
explanation: |
  在 Rust 的所有权系统中，当变量离开作用域时（通常是当执行离开大括号定义的代码块时），其值会自动丢弃并释放内存。这种自动清理是通过 Rust 的丢弃机制实现的，在这种机制下，语言会在变量退出作用域时隐式调用丢弃函数。这确保了适当的资源管理，无需程序员编写明确的清理代码，遵循了从 C++ 借鉴的 RAII 模式。
question: 기존 Lightning 노드가 작동할 수 없는 웹어셈블리 브라우저 환경에서 LDK가 작동할 수 있는 주요 아키텍처적 이점은 무엇인가요?
answer: LDK의 시스템 호출이 필요 없는 설계 철학으로 파일 시스템, 네트워크 소켓 또는 엔트로피 소스에 직접 액세스하지 않고도 작동할 수 있습니다
wrong_answers:
  - "LDK의 모듈식 Rust 라이브러리 구조는 네이티브 Rust-to-WASM 컴파일 기능을 통해 WebAssembly 호환성을 자동으로 제공합니다."
  - "LDK의 이벤트 중심 아키텍처는 영구적인 연결이 필요하지 않으며 HTTP 요청-응답 주기를 통해 전적으로 작동할 수 있습니다."
  - "LDK의 경량 블록체인 통합으로 메모리 사용량을 충분히 줄여 WebAssembly의 엄격한 리소스 제약과 한계를 충족할 수 있습니다."
explanation: |
  특히 LDK의 시스템 호출 없는 설계는 브라우저 호환성을 가능하게 합니다. 기존 Lightning 노드는 네트워킹, 파일 I/O, 무작위성을 위해 직접 시스템 호출에 의존하는데, WebAssembly 환경에서는 보안상의 이유로 이를 금지하고 있습니다. LDK는 이러한 종속성을 추상화하여 개발자가 네트워킹을 위한 WebSocket과 지속성 및 무작위성을 위한 브라우저 API를 사용하여 브라우저 호환 구현을 제공하면서도 완전한 Lightning 프로토콜 준수를 유지할 수 있도록 합니다.
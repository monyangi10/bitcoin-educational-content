question: مزیت اصلی معماری که به LDK اجازه می‌دهد در محیط‌های مرورگر WebAssembly کار کند، جایی که نودهای سنتی Lightning نمی‌توانند عمل کنند، چیست؟
answer: فلسفه طراحی بدون فراخوانی سیستم LDK به آن اجازه می‌دهد بدون دسترسی مستقیم به سیستم‌های فایل، سوکت‌های شبکه یا منابع انتروپی عمل کند.
wrong_answers:
  - "ساختار کتابخانه ماژولار Rust در LDK به‌طور خودکار از طریق ویژگی‌های کامپایل بومی Rust به WASM، سازگاری با WebAssembly را فراهم می‌کند"
  - "معماری مبتنی بر رویداد LDK نیاز به اتصالات پایدار را از بین می‌برد و می‌تواند به‌طور کامل از طریق چرخه‌های درخواست-پاسخ HTTP عمل کند"
  - "یکپارچه‌سازی بلاک‌چین سبک LDK استفاده از حافظه را به اندازه‌ای کاهش می‌دهد که با محدودیت‌ها و قیود سختگیرانه WebAssembly مطابقت داشته باشد"
explanation: |
  طراحی بدون فراخوانی سیستم LDK دقیقاً همان چیزی است که امکان سازگاری با مرورگر را فراهم می‌کند. نودهای سنتی لایتنینگ برای شبکه، ورودی/خروجی فایل و تصادفی‌سازی به فراخوانی‌های مستقیم سیستم متکی هستند، که محیط‌های WebAssembly به دلایل امنیتی آن‌ها را ممنوع می‌کنند. LDK این وابستگی‌ها را انتزاع می‌کند و به توسعه‌دهندگان اجازه می‌دهد تا با استفاده از WebSockets برای شبکه و APIهای مرورگر برای پایداری و تصادفی‌سازی، پیاده‌سازی‌های سازگار با مرورگر ارائه دهند، در حالی که همچنان به طور کامل با پروتکل لایتنینگ سازگار باقی می‌مانند.
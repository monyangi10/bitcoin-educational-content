question: Какое основное архитектурное преимущество позволяет LDK работать в браузерных средах WebAssembly, где традиционные узлы Lightning работать не могут?
answer: Философия разработки LDK, не требующая системных вызовов, позволяет ему работать без прямого доступа к файловым системам, сетевым сокетам или источникам энтропии
wrong_answers:
  - "Модульная структура библиотек Rust в LDK автоматически обеспечивает совместимость с WebAssembly благодаря встроенным функциям компиляции Rust в WASM"
  - "Событийно-ориентированная архитектура LDK устраняет необходимость в постоянных соединениях и может работать полностью через циклы HTTP-запрос-ответ"
  - "Легкая интеграция блокчейна в LDK позволяет снизить потребление памяти настолько, чтобы соответствовать строгим ограничениям ресурсов WebAssembly"
explanation: |
  Безсистемная конструкция LDK обеспечивает совместимость с браузерами. Традиционные узлы Lightning полагаются на прямые системные вызовы для работы с сетью, файловым вводом-выводом и случайными данными, что в средах WebAssembly запрещено по соображениям безопасности. LDK абстрагирует эти зависимости, позволяя разработчикам создавать совместимые с браузерами реализации, использующие WebSockets для работы с сетью и браузерные API для персистентности и случайности, сохраняя при этом полное соответствие протоколу Lightning.
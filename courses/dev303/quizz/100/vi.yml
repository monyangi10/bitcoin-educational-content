question: Ưu điểm kiến trúc chính nào cho phép LDK hoạt động trong môi trường trình duyệt WebAssembly mà các node Lightning truyền thống không thể hoạt động được?
answer: Triết lý thiết kế không sử dụng lệnh gọi hệ thống của LDK cho phép nó hoạt động mà không cần truy cập trực tiếp vào hệ thống tập tin, ổ cắm mạng hoặc nguồn entropy.
wrong_answers:
  - "Cấu trúc thư viện Rust dạng mô-đun của LDK tự động cung cấp khả năng tương thích với WebAssembly thông qua các tính năng biên dịch Rust sang WASM gốc."
  - "Kiến trúc hướng sự kiện của LDK loại bỏ nhu cầu về các kết nối liên tục và có thể hoạt động hoàn toàn thông qua các chu kỳ yêu cầu-phản hồi HTTP."
  - "Việc tích hợp blockchain nhẹ nhàng của LDK giúp giảm đáng kể mức sử dụng bộ nhớ, đáp ứng các ràng buộc và hạn chế nghiêm ngặt về tài nguyên của WebAssembly."
explanation: |
  Thiết kế không sử dụng lệnh gọi hệ thống của LDK chính là yếu tố then chốt giúp đảm bảo khả năng tương thích với nhiều trình duyệt. Các node Lightning truyền thống dựa vào các lệnh gọi hệ thống trực tiếp để kết nối mạng, đọc/ghi tệp và tạo số ngẫu nhiên, điều mà môi trường WebAssembly cấm vì lý do bảo mật. LDK trừu tượng hóa các phụ thuộc này, cho phép các nhà phát triển cung cấp các triển khai tương thích với trình duyệt bằng cách sử dụng WebSockets cho việc kết nối mạng và API trình duyệt cho việc duy trì dữ liệu và tạo số ngẫu nhiên, đồng thời vẫn đảm bảo tuân thủ đầy đủ giao thức Lightning.
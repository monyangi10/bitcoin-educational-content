question: LDKが、従来のLightningノードが動作できないWebAssemblyブラウザ環境で機能するための、アーキテクチャ上の主な利点は何ですか？
answer: LDKのシステム・コール・フリー設計思想により、ファイル・システム、ネットワーク・ソケット、エントロピー・ソースに直接アクセスすることなく動作する。
wrong_answers:
  - "LDKのモジュール式Rustライブラリ構造は、ネイティブのRust-to-WASMコンパイル機能を通じて、WebAssemblyとの互換性を自動的に提供する"
  - 「LDKのイベント・ドリブン・アーキテクチャは、持続的な接続を不要にし、HTTPのリクエスト・レスポンス・サイクルのみで動作させることができます。
  - "LDKの軽量ブロックチェーン統合は、WebAssemblyの厳しいリソース制約と制限を満たすために、メモリ使用量を十分に削減する"
explanation: |
  LDKのシステムコールを使用しない設計は、特にブラウザとの互換性を可能にします。従来のLightningノードは、ネットワーキング、ファイルI/O、ランダム性のために直接システムコールに依存していましたが、WebAssembly環境はセキュリティ上の理由からこれを禁止しています。LDKはこれらの依存関係を抽象化するため、開発者はLightningプロトコルの完全なコンプライアンスを維持しながら、ネットワーキングにはWebSocketを、永続性とランダム性にはブラウザAPIを使用して、ブラウザ互換の実装を提供することができます。
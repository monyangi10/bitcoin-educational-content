question: Кое е основното архитектурно предимство, което позволява на LDK да функционира в средите на браузъра WebAssembly, където традиционните възли Lightning не могат да работят?
answer: Философията на LDK за проектиране без системни повиквания му позволява да работи без пряк достъп до файлови системи, мрежови сокети или източници на ентропия
wrong_answers:
  - "Модулната структура на библиотеката Rust на LDK автоматично осигурява съвместимост с WebAssembly чрез собствени функции за компилиране от Rust към WASM"
  - "Архитектурата на LDK, управлявана от събития, елиминира нуждата от постоянни връзки и може да работи изцяло чрез цикли HTTP заявка-отговор"
  - "Олекотената интеграция на блокчейн на LDK намалява използването на паметта достатъчно, за да отговори на строгите ограничения на ресурсите на WebAssembly."
explanation: |
  Дизайнът на LDK, който не съдържа системни повиквания, дава възможност за съвместимост с браузърите. Традиционните Lightning възли разчитат на директни системни повиквания за работа в мрежа, файлов вход/изход и случайност, които WebAssembly средите забраняват от съображения за сигурност. LDK абстрахира тези зависимости, като позволява на разработчиците да предоставят съвместими с браузъра реализации, използвайки WebSockets за работа в мрежа и API на браузъра за постоянство и случайност, като същевременно поддържат пълно съответствие с протокола Lightning.
question: वह मुख्य वास्तुशिल्पीय लाभ क्या है जिसके कारण LDK वेबअसेंबली ब्राउज़र वातावरण में कार्य कर पाता है जहाँ पारंपरिक लाइटनिंग नोड्स काम नहीं कर सकते?
answer: LDK की सिस्टम-कॉल-मुक्त डिज़ाइन फिलॉसफी इसे फाइल सिस्टम, नेटवर्क सॉकेट या एंट्रॉपी स्रोतों तक सीधी पहुंच के बिना काम करने की अनुमति देती है।
wrong_answers:
  - "एलडीके की मॉड्यूलर जीडब्ल्यू-0 लाइब्रेरी संरचना, नेटिव जीडब्ल्यू-0-से-डब्ल्यूएएसएम संकलन सुविधाओं के माध्यम से स्वचालित रूप से वेबअसेंबली संगतता प्रदान करती है।"
  - "एलडीके की इवेंट-ड्रिवन आर्किटेक्चर लगातार कनेक्शन की आवश्यकता को समाप्त करती है और पूरी तरह से एचटीटीपी अनुरोध-प्रतिक्रिया चक्रों के माध्यम से काम कर सकती है।"
  - "एलडीके का हल्का ब्लॉकचेन एकीकरण मेमोरी के उपयोग को इतना कम कर देता है कि वेबअसेंबली की सख्त संसाधन संबंधी बाधाओं और सीमाओं को पूरा किया जा सके।"
explanation: |
  LDK का सिस्टम-कॉल-मुक्त डिज़ाइन ही ब्राउज़र संगतता को संभव बनाता है। पारंपरिक लाइटनिंग नोड्स नेटवर्किंग, फ़ाइल I/O और रैंडमनेस के लिए सीधे सिस्टम कॉल पर निर्भर करते हैं, जिन्हें वेबअसेंबली वातावरण सुरक्षा कारणों से प्रतिबंधित करते हैं। LDK इन निर्भरताओं को सरल बनाता है, जिससे डेवलपर्स नेटवर्किंग के लिए वेबसॉकेट और डेटा के निरंतर उपयोग और रैंडमनेस के लिए ब्राउज़र API का उपयोग करके ब्राउज़र-संगत कार्यान्वयन प्रदान कर सकते हैं, साथ ही लाइटनिंग प्रोटोकॉल का पूर्ण अनुपालन भी बनाए रख सकते हैं।
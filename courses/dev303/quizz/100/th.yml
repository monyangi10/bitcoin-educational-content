question: ข้อได้เปรียบทางสถาปัตยกรรมหลักที่ทำให้ LDK สามารถทำงานในสภาพแวดล้อมเบราว์เซอร์ WebAssembly ซึ่งโหนด Lightning แบบดั้งเดิมไม่สามารถทำงานได้คืออะไร?
answer: ปรัชญาการออกแบบที่ปราศจากการเรียกใช้ระบบของ LDK ช่วยให้สามารถทำงานได้โดยไม่ต้องเข้าถึงระบบไฟล์, ซ็อกเก็ตเครือข่าย, หรือแหล่งเอนโทรปีโดยตรง
wrong_answers:
  - "โครงสร้างไลบรารีแบบโมดูลาร์ของ LDK Rust ให้ความเข้ากันได้กับ WebAssembly โดยอัตโนมัติผ่านคุณสมบัติการคอมไพล์ Rust-to-WASM แบบเนทีฟ"
  - "สถาปัตยกรรมที่ขับเคลื่อนด้วยเหตุการณ์ของ LDK กำจัดความจำเป็นในการเชื่อมต่อที่คงอยู่และสามารถทำงานได้ทั้งหมดผ่านวงจรการร้องขอ-ตอบสนอง HTTP"
  - "การผสานรวมบล็อกเชนแบบน้ำหนักเบาของ LDK ช่วยลดการใช้หน่วยความจำได้อย่างเพียงพอเพื่อตอบสนองข้อจำกัดและข้อจำกัดด้านทรัพยากรที่เข้มงวดของ WebAssembly"
explanation: |
  การออกแบบที่ปราศจากการเรียกใช้ระบบของ LDK เป็นสิ่งที่ทำให้สามารถใช้งานร่วมกับเบราว์เซอร์ได้ โหนด Lightning แบบดั้งเดิมพึ่งพาการเรียกใช้ระบบโดยตรงสำหรับเครือข่าย, การป้อน/ส่งออกไฟล์, และการสุ่ม ซึ่งสภาพแวดล้อม WebAssembly ห้ามเพื่อเหตุผลด้านความปลอดภัย LDK ทำการแยกการพึ่งพาเหล่านี้ออก ทำให้นักพัฒนาสามารถจัดหาโปรแกรมที่ใช้งานร่วมกับเบราว์เซอร์ได้โดยใช้ WebSockets สำหรับเครือข่ายและ API ของเบราว์เซอร์สำหรับการคงอยู่และการสุ่ม ในขณะที่ยังคงปฏิบัติตามโปรโตคอล Lightning อย่างเต็มที่
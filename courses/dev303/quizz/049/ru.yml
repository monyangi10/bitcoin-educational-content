question: Какую фундаментальную проблему решает RC, с которой не может справиться Box в системе владения Rust?
answer: RC обеспечивает множественное владение одними и теми же данными благодаря подсчету ссылок
wrong_answers:
  - RC обеспечивает более быстрое выделение и удаление памяти, чем Box
  - RC позволяет автоматически управлять памятью без каких-либо накладных расходов во время выполнения
  - RC позволяет проверять заимствования во время компиляции, которые Box не может выполнить
explanation: |
  RC (Reference Counter) специально решает проблему ограничения модели единого владения Box, позволяя нескольким частям кода одновременно владеть одними и теми же данными. Box следует традиционным правилам владения, согласно которым только один объект может владеть данными одновременно, что делает невозможным создание таких сценариев, как общие структуры данных, где несколько списков ссылаются на одну и ту же хвостовую часть. RC поддерживает внутренний счетчик, который отслеживает ссылки, увеличивая их при клонировании и уменьшая при удалении, освобождая память только тогда, когда счетчик достигает нуля. Это обеспечивает гибкие схемы совместного использования данных при сохранении безопасности памяти, что принципиально отличается от подхода Box, основанного на исключительном владении.
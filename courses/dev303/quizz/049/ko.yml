question: RC는 Rust의 소유권 시스템에서는 처리할 수 없는 근본적인 문제를 해결하나요?
answer: RC는 참조 카운팅을 통해 동일한 데이터에 대한 다중 소유권을 지원합니다
wrong_answers:
  - RC는 Box보다 빠른 메모리 할당 및 할당 해제를 제공합니다
  - RC는 런타임 오버헤드 없이 자동 메모리 관리를 지원합니다
  - RC는 Box가 수행할 수 없는 컴파일 타임 차용 검사를 가능하게 합니다
explanation: |
  RC(참조 카운터)는 특히 여러 코드 부분이 동일한 데이터의 소유권을 동시에 공유할 수 있도록 함으로써 Box의 단일 소유권 모델의 한계를 해결합니다. Box는 한 번에 하나의 엔터티만 데이터를 소유할 수 있는 기존의 소유권 규칙을 따르기 때문에 여러 목록이 동일한 꼬리 부분을 참조하는 공유 데이터 구조와 같은 시나리오를 만들 수 없습니다. RC는 참조를 추적하는 내부 카운터를 유지하여 복제가 되면 증가하고 삭제되면 감소하며, 카운트가 0에 도달할 때만 메모리를 해제합니다. 따라서 메모리 안전성을 유지하면서 유연한 데이터 공유 패턴을 구현할 수 있으며, 이는 Box의 독점적 소유권 방식과는 근본적으로 다른 방식입니다.
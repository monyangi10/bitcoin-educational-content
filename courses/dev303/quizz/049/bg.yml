question: Какъв фундаментален проблем решава RC, с който Box не може да се справи в системата за собственост на Rust?
answer: RC дава възможност за многократно притежание на едни и същи данни чрез отчитане на референции
wrong_answers:
  - RC осигурява по-бързо заделяне и разпределяне на паметта, отколкото Box
  - RC позволява автоматично управление на паметта без никакви режийни разходи по време на изпълнение
  - RC позволява проверки за заемане по време на компилация, които Box не може да извърши
explanation: |
  RC (референтен брояч) специално адресира ограничението на модела на Box с една собственост, като позволява на няколко части от кода да споделят собствеността върху едни и същи данни едновременно. Box следва традиционните правила за собственост, при които само една единица може да притежава данни в даден момент, което прави невъзможно създаването на сценарии като споделени структури от данни, при които множество списъци се позовават на една и съща част от опашката. RC поддържа вътрешен брояч, който проследява препратките, увеличавайки се при клониране и намалявайки се при отпадане, като освобождава памет само когато броят достигне нула. Това дава възможност за гъвкави модели на споделяне на данни, като същевременно се запазва безопасността на паметта, което е коренно различно от подхода на Box за изключителна собственост.
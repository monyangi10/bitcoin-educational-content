question: RC 解决了 Box 在《Rust》所有权系统中无法解决的什么根本问题？
answer: 通过引用计数，RC 实现了同一数据的多重所有权
wrong_answers:
  - RC 比 Box 更快地分配和删除内存
  - RC 可实现自动内存管理，无需任何运行时开销
  - RC 可以进行 Box 无法执行的编译时借用检查
explanation: |
  RC（引用计数器）允许代码的多个部分同时共享相同数据的所有权，从而专门解决了 Box 单一所有权模型的局限性。Box 遵循传统的所有权规则，即同一时间只能有一个实体拥有数据，因此无法创建多个列表引用同一尾部的共享数据结构等场景。RC 维护一个跟踪引用的内部计数器，当克隆时递增，当丢弃时递减，只有当计数为零时才释放内存。这样就能在保持内存安全的同时，实现灵活的数据共享模式，这与 Box 的排他性所有权方法有着本质区别。
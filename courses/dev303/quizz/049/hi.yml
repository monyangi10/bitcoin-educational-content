question: जीडब्ल्यू-0 की स्वामित्व प्रणाली में आरसी किस मूलभूत समस्या का समाधान करता है जिसे बॉक्स हल नहीं कर सकता?
answer: आरसी, रेफरेंस काउंटिंग के माध्यम से एक ही डेटा के कई स्वामित्व को सक्षम बनाता है।
wrong_answers:
  - RC, Box की तुलना में तेज़ मेमोरी आवंटन और डी-आवंटन प्रदान करता है।
  - RC रनटाइम ओवरहेड के बिना स्वचालित मेमोरी प्रबंधन की अनुमति देता है।
  - RC कंपाइल-टाइम बरोइंग चेक को सक्षम बनाता है जो Box नहीं कर सकता।
explanation: |
  आरसी (रेफरेंस काउंटर) बॉक्स के एकल स्वामित्व मॉडल की सीमा को विशेष रूप से दूर करता है, जिससे कोड के कई हिस्से एक ही डेटा का स्वामित्व एक साथ साझा कर सकते हैं। बॉक्स पारंपरिक स्वामित्व नियमों का पालन करता है, जहाँ एक समय में केवल एक इकाई ही डेटा की मालिक हो सकती है। इससे साझा डेटा संरचनाओं जैसी स्थितियाँ बनाना असंभव हो जाता है, जहाँ कई सूचियाँ एक ही अंतिम भाग को संदर्भित करती हैं। आरसी एक आंतरिक काउंटर बनाए रखता है जो संदर्भों को ट्रैक करता है, क्लोन होने पर बढ़ता है और हटाए जाने पर घटता है, और केवल शून्य होने पर ही मेमोरी को मुक्त करता है। यह मेमोरी सुरक्षा बनाए रखते हुए लचीले डेटा साझाकरण पैटर्न को सक्षम बनाता है, जो बॉक्स के अनन्य स्वामित्व दृष्टिकोण से मौलिक रूप से भिन्न है।
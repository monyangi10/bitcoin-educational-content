question: RC چه مشکل اساسی را حل می‌کند که Box نمی‌تواند در سیستم مالکیت Rust مدیریت کند؟
answer: RC از مالکیت چندگانه‌ی همان داده از طریق شمارش مرجع پشتیبانی می‌کند.
wrong_answers:
  - RC تخصیص و آزادسازی حافظه را سریع‌تر از Box انجام می‌دهد.
  - RC اجازه مدیریت خودکار حافظه را بدون هیچ‌گونه سربار زمان اجرا می‌دهد.
  - RC امکان بررسی‌های قرض‌گیری در زمان کامپایل را فراهم می‌کند که Box نمی‌تواند انجام دهد.
explanation: |
  RC (Reference Counter) به‌طور خاص به محدودیت مدل مالکیت انحصاری Box می‌پردازد و به بخش‌های مختلف کد اجازه می‌دهد تا به‌طور همزمان مالکیت داده‌های یکسان را به اشتراک بگذارند. Box از قوانین مالکیت سنتی پیروی می‌کند که در آن تنها یک موجودیت می‌تواند در هر زمان مالک داده باشد، که این امر ایجاد سناریوهایی مانند ساختارهای داده مشترک که در آن چندین لیست به همان بخش انتهایی اشاره می‌کنند را غیرممکن می‌سازد. RC یک شمارنده داخلی را نگه می‌دارد که ارجاعات را پیگیری می‌کند، به‌هنگام کلون شدن افزایش و به‌هنگام حذف کاهش می‌یابد و تنها زمانی که شمارش به صفر می‌رسد حافظه را آزاد می‌کند. این امر الگوهای اشتراک‌گذاری داده انعطاف‌پذیر را ممکن می‌سازد در حالی که ایمنی حافظه را حفظ می‌کند، که اساساً با رویکرد مالکیت انحصاری Box متفاوت است.
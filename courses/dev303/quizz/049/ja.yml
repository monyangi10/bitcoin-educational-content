question: Rustのオーナーシップ・システムでボックスが扱えない根本的な問題を、RCはどう解決しているのか？
answer: RCは参照カウントにより、同一データの複数所有が可能
wrong_answers:
  - RCはBoxよりも高速なメモリ割り当てと解放を提供する
  - RCはランタイムオーバーヘッドなしで自動メモリ管理を可能にする
  - RCは、Boxが実行できないコンパイル時の借用チェックを可能にする
explanation: |
  RC（Reference Counter）は、複数のコードパートが同時に同じデータの所有権を共有できるようにすることで、特にBoxの単一所有権モデルの制限に対処します。Boxは、一度に1つのエンティティのみがデータを所有できる従来の所有権ルールに従っているため、複数のリストが同じ末尾部分を参照する共有データ構造のようなシナリオを作成することは不可能です。RCは、参照を追跡する内部カウンターを維持し、クローンされるとインクリメントされ、削除されるとデクリメントされ、カウントがゼロになったときだけメモリを解放する。これにより、Boxの排他的所有権アプローチとは根本的に異なるメモリ安全性を維持しながら、柔軟なデータ共有パターンが可能になる。
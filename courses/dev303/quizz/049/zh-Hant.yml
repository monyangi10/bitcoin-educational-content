question: RC 能解決 Box 在 Rust 的所有權系統中無法處理的基本問題嗎？
answer: RC 可透過參考計數實現相同資料的多重擁有權
wrong_answers:
  - RC 提供比 Box 更快的記憶體分配和取消分配速度。
  - RC 允許自動記憶體管理，無需任何執行時開銷
  - RC 可執行 Box 無法執行的編譯時借用檢查
explanation: |
  RC（Reference Counter，參考計數器）特別針對 Box 單一所有權模型的限制，允許程式碼的多個部分同時分享相同資料的所有權。Box 遵循傳統的所有權規則，一次只能有一個實體擁有資料，因此無法建立類似共用資料結構的情境，即多個清單引用相同的尾端部分。RC 維護一個內部計數器來追蹤引用，當複製時會遞增，當丟棄時會遞減，只有當計數到零時才會釋放記憶體。這可在維持記憶體安全的同時，實現彈性的資料共用模式，這與 Box 的獨占所有權方式有根本的不同。
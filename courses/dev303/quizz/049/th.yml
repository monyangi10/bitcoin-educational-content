question: ปัญหาพื้นฐานที่ RC แก้ไขซึ่ง Box ไม่สามารถจัดการได้ในระบบความเป็นเจ้าของของ Rust คืออะไร?
answer: RC ช่วยให้สามารถเป็นเจ้าของข้อมูลเดียวกันได้หลายคนผ่านการนับการอ้างอิง
wrong_answers:
  - RC ให้การจัดสรรและการจัดการหน่วยความจำที่รวดเร็วกกว่า Box
  - RC ช่วยให้การจัดการหน่วยความจำอัตโนมัติโดยไม่มีค่าใช้จ่ายในเวลารันไทม์
  - RC ช่วยให้สามารถตรวจสอบการยืมในขณะคอมไพล์ที่ Box ไม่สามารถทำได้
explanation: |
  RC (Reference Counter) แก้ไขข้อจำกัดของโมเดลการเป็นเจ้าของแบบเดี่ยวของ Box โดยอนุญาตให้หลายส่วนของโค้ดสามารถแชร์การเป็นเจ้าของข้อมูลเดียวกันได้พร้อมกัน Box ปฏิบัติตามกฎการเป็นเจ้าของแบบดั้งเดิมที่อนุญาตให้มีเพียงเอนทิตีเดียวเท่านั้นที่สามารถเป็นเจ้าของข้อมูลในแต่ละครั้ง ทำให้ไม่สามารถสร้างสถานการณ์เช่นโครงสร้างข้อมูลที่แชร์ซึ่งมีหลายรายการอ้างอิงถึงส่วนท้ายเดียวกัน RC รักษาตัวนับภายในที่ติดตามการอ้างอิง โดยจะเพิ่มขึ้นเมื่อมีการโคลนและลดลงเมื่อมีการลบออก และจะปล่อยหน่วยความจำเมื่อจำนวนถึงศูนย์เท่านั้น สิ่งนี้ช่วยให้เกิดรูปแบบการแชร์ข้อมูลที่ยืดหยุ่นในขณะที่ยังคงรักษาความปลอดภัยของหน่วยความจำ ซึ่งแตกต่างจากแนวทางการเป็นเจ้าของแบบเอกสิทธิ์ของ Box อย่างสิ้นเชิง
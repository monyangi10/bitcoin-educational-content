question: UniFFIが、Rustのコードから直接バインディングを自動生成する代わりに、開発者に別のUDLファイルを作成するよう要求する主な理由は何ですか？
answer: UDLは、Rustライブラリのどの部分を他の言語に公開すべきかを指定する、明示的なインターフェイス契約として機能する。
wrong_answers:
  - 「Rustの型システムは、翻訳なしでは他のプログラミング言語と互換性がないため、UDLが必要である。
  - UDLファイルは、実行時の言語間関数呼び出しのパフォーマンスを最適化するために必要である。
  - "UDLは、Rustの所有権モデルをターゲット言語のガベージコレクションに自動的に変換する方法を提供する"
explanation: |
  UniFFIは、実装とインターフェイスの間の懸念事項の分離を維持するために、意図的な設計上の選択としてUDLを使用しています。UDLファイルは明示的な契約として機能し、開発者はRustライブラリの一部を選択的に公開できる一方、内部実装の詳細は非公開にすることができます。このアプローチは、すべての公開Rustアイテムの自動的な公開を防ぎ、開発者にAPIサーフェスのきめ細かなコントロールを与えます。Rust型はUDLなしでもマッピング可能であり（あまりエレガントではないが）、パフォーマンスの最適化はUDLの主な目的ではなく、UDLは所有権モデルを変換しないので、他の選択肢は正しくない。
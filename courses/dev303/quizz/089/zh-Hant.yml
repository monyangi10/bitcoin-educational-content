question: UniFFI 要求開發人員建立單獨的 UDL 檔案，而不是直接從 Rust 程式碼中自動產生綁定的主要原因是什麼？
answer: UDL 可作為明確的介面契約，指定 Rust 函式庫的哪些部分應該暴露給其他語言
wrong_answers:
  - 「之所以需要 UDL，是因為 Rust 的類型系統與其他未經翻譯的程式語言不相容」
  - UDL 檔案對於在執行時優化跨語言函式呼叫的效能非常必要
  - 「UDL提供了一種方法，可將Rust的所有權模型自動轉換為目標語言的垃圾回收」
explanation: |
  UniFFI 使用 UDL 是刻意的設計選擇，以維持實作與介面之間的分離。UDL 檔案作為明確的契約，允許開發者選擇性地揭露 Rust 函式庫的部分內容，同時保持內部實作細節的隱私。這種方法可以防止自動公開所有公開的 Rust 項目，讓開發人員對他們的 API 表面進行細粒度的控制。其他選項是不對的，因為 Rust 類型可以不透過 UDL 映射（雖然不那麼優雅），效能最佳化不是 UDL 的主要目的，而且 UDL 不會轉換所有權模型。
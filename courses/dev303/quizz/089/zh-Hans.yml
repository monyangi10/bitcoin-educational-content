question: "UniFFI 要求开发人员创建单独的 UDL 文件，而不是直接从 Rust 代码自动生成绑定的主要原因是什么？"
answer: "UDL 作为一种明确的接口契约，规定了 Rust 库的哪些部分应向其他语言开放"
wrong_answers:
  - "之所以需要 UDL，是因为 Rust 的类型系统在没有翻译的情况下与其他编程语言不兼容。"
  - "UDL 文件是优化运行时跨语言函数调用性能的必要条件"
  - "UDL 提供了一种方法，可将 Rust 的所有权模型自动转换为目标语言的垃圾回收"
explanation: |
  UniFFI 使用 UDL 是一种有意的设计选择，以保持实现与接口之间的分离。UDL 文件作为一种明确的契约，允许开发人员有选择地公开 Rust 库的部分内容，同时保持内部实现细节的私有性。这种方法可以防止所有 Rust 公共项目的自动公开，使开发人员能够对 API 表面进行精细控制。其他选项都是不正确的，因为 Rust 类型可以不通过 UDL 映射（尽管不那么优雅），性能优化不是 UDL 的主要目的，而且 UDL 不会转换所有权模型。

question: Какова основная причина, по которой UniFFI требует от разработчиков создания отдельного UDL-файла, вместо того чтобы автоматически генерировать привязки непосредственно из кода Rust?
answer: UDL служит явным интерфейсным контрактом, определяющим, какие части библиотеки Rust должны быть доступны для других языков
wrong_answers:
  - "UDL необходим, потому что система типов Rust несовместима с другими языками программирования без перевода"
  - Файлы UDL необходимы для оптимизации производительности межъязыковых вызовов функций во время выполнения программы
  - "UDL обеспечивает способ автоматического преобразования модели владения Rust в сборку мусора для целевых языков"
explanation: |
  UniFFI использует UDL как преднамеренный выбор дизайна, чтобы сохранить разделение забот между реализацией и интерфейсом. Файл UDL действует как явный контракт, который позволяет разработчикам выборочно раскрывать части своей библиотеки Rust, сохраняя внутренние детали реализации в тайне. Такой подход предотвращает автоматическое раскрытие всех публичных элементов Rust, предоставляя разработчикам тонкий контроль над их поверхностью API. Другие варианты неверны, поскольку типы Rust можно отображать без UDL (хотя и менее элегантно), оптимизация производительности не является основной целью UDL, и UDL не преобразует модели владения.
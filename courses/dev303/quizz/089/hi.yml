question: UniFFI द्वारा डेवलपर्स को Rust कोड से सीधे बाइंडिंग को स्वचालित रूप से उत्पन्न करने के बजाय एक अलग UDL फ़ाइल बनाने की आवश्यकता क्यों होती है? इसका मुख्य कारण क्या है?
answer: UDL एक स्पष्ट इंटरफ़ेस अनुबंध के रूप में कार्य करता है जो यह निर्दिष्ट करता है कि Rust लाइब्रेरी के किन भागों को अन्य भाषाओं के लिए उपलब्ध कराया जाना चाहिए।
wrong_answers:
  - "UDL की आवश्यकता इसलिए है क्योंकि Rust की टाइप प्रणाली अनुवाद के बिना अन्य प्रोग्रामिंग भाषाओं के साथ असंगत है।"
  - रनटाइम निष्पादन के दौरान विभिन्न भाषाओं के फंक्शन कॉल के प्रदर्शन को अनुकूलित करने के लिए UDL फ़ाइलें आवश्यक हैं।
  - "UDL, Rust के स्वामित्व मॉडल को लक्ष्य भाषाओं के लिए स्वचालित रूप से गार्बेज कलेक्शन में परिवर्तित करने का एक तरीका प्रदान करता है।"
explanation: |
  UniFFI, कार्यान्वयन और इंटरफ़ेस के बीच अलगाव बनाए रखने के लिए जानबूझकर UDL का उपयोग करता है। UDL फ़ाइल एक स्पष्ट अनुबंध के रूप में कार्य करती है जो डेवलपर्स को आंतरिक कार्यान्वयन विवरणों को गोपनीय रखते हुए अपनी Rust लाइब्रेरी के कुछ हिस्सों को चुनिंदा रूप से प्रदर्शित करने की अनुमति देती है। यह दृष्टिकोण सभी सार्वजनिक Rust आइटमों के स्वचालित रूप से प्रदर्शित होने से रोकता है, जिससे डेवलपर्स को अपने API इंटरफ़ेस पर बारीक नियंत्रण मिलता है। अन्य विकल्प गलत हैं क्योंकि Rust प्रकारों को UDL के बिना भी मैप किया जा सकता है (हालांकि कम सुव्यवस्थित तरीके से), प्रदर्शन अनुकूलन UDL का प्राथमिक उद्देश्य नहीं है, और UDL स्वामित्व मॉडल को परिवर्तित नहीं करता है।
question: เหตุผลหลักที่ UniFFI ต้องการให้นักพัฒนาสร้างไฟล์ UDL แยกต่างหากแทนที่จะสร้าง bindings โดยอัตโนมัติจากโค้ด Rust โดยตรงคืออะไร?
answer: UDL ทำหน้าที่เป็นสัญญาการเชื่อมต่อที่ชัดเจนซึ่งระบุว่าส่วนใดของไลบรารี Rust ควรถูกเปิดเผยให้กับภาษาอื่น
wrong_answers:
  - "จำเป็นต้องใช้ UDL เพราะระบบประเภทของ Rust ไม่เข้ากันกับภาษาโปรแกรมอื่นๆ โดยไม่ต้องแปล"
  - ไฟล์ UDL จำเป็นสำหรับการเพิ่มประสิทธิภาพของการเรียกฟังก์ชันข้ามภาษาในระหว่างการดำเนินการรันไทม์
  - "UDL ให้วิธีการแปลงโมเดลความเป็นเจ้าของของ Rust เป็นการเก็บขยะอัตโนมัติสำหรับภาษาปลายทาง"
explanation: |
  UniFFI ใช้ UDL เป็นการออกแบบโดยเจตนาเพื่อรักษาการแยกความกังวลระหว่างการใช้งานและอินเทอร์เฟซ ไฟล์ UDL ทำหน้าที่เป็นสัญญาที่ชัดเจนที่ช่วยให้นักพัฒนาสามารถเปิดเผยบางส่วนของไลบรารี Rust ได้อย่างเลือกสรร ในขณะที่เก็บรายละเอียดการใช้งานภายในเป็นส่วนตัว วิธีการนี้ป้องกันการเปิดเผยอัตโนมัติของรายการสาธารณะทั้งหมดของ Rust ทำให้นักพัฒนามีการควบคุมอย่างละเอียดต่อพื้นผิว API ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะประเภท Rust สามารถถูกแมปได้โดยไม่ต้องใช้ UDL (แม้จะไม่สวยงามเท่า) การเพิ่มประสิทธิภาพไม่ใช่วัตถุประสงค์หลักของ UDL และ UDL ไม่ได้แปลงโมเดลการเป็นเจ้าของ
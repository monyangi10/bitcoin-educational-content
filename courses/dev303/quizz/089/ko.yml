question: UniFFI에서 개발자가 Rust 코드에서 직접 바인딩을 자동으로 생성하는 대신 별도의 UDL 파일을 생성해야 하는 주된 이유는 무엇인가요?
answer: UDL은 Rust 라이브러리의 어느 부분을 다른 언어에 노출해야 하는지 지정하는 명시적 인터페이스 계약 역할을 합니다
wrong_answers:
  - "Rust의 유형 시스템이 번역 없이 다른 프로그래밍 언어와 호환되지 않기 때문에 UDL이 필요합니다."
  - 런타임 실행 중 언어 간 함수 호출의 성능을 최적화하려면 UDL 파일이 필요합니다
  - "UDL은 Rust의 소유권 모델을 대상 언어에 대한 가비지 컬렉션으로 자동 변환하는 방법을 제공합니다."
explanation: |
  UniFFI는 구현과 인터페이스를 분리하기 위해 의도적인 설계 선택으로 UDL을 사용합니다. UDL 파일은 개발자가 내부 구현 세부 정보를 비공개로 유지하면서 Rust 라이브러리의 일부를 선택적으로 노출할 수 있는 명시적 계약 역할을 합니다. 이 접근 방식은 모든 공개 Rust 항목의 자동 노출을 방지하여 개발자가 API 표면을 세밀하게 제어할 수 있도록 합니다. 다른 옵션은 UDL 없이도 Rust 유형을 매핑할 수 있고(덜 우아하지만) 성능 최적화가 UDL의 주요 목적이 아니며 UDL은 소유권 모델을 변환하지 않기 때문에 올바르지 않습니다.
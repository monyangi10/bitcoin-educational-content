question: Коя е основната причина UniFFI да изисква от разработчиците да създадат отделен UDL файл, вместо автоматично да генерира връзки директно от кода на Rust?
answer: UDL служи като изричен договор за интерфейс, който определя кои части на библиотеката Rust трябва да бъдат достъпни за други езици
wrong_answers:
  - "Необходим е UDL, тъй като системата от типове на Rust е несъвместима с други езици за програмиране без превод"
  - Файловете UDL са необходими за оптимизиране на работата на междуезиковите извиквания на функции по време на изпълнение
  - "UDL предоставя начин за автоматично преобразуване на модела на собственост на Rust към събиране на отпадъци за целевите езици"
explanation: |
  UniFFI използва UDL като умишлен избор при проектирането, за да се запази разделението на проблемите между изпълнението и интерфейса. Файлът UDL действа като изричен договор, който позволява на разработчиците избирателно да разкриват части от своята библиотека Rust, като същевременно запазват вътрешните детайли на изпълнението поверителни. Този подход предотвратява автоматичното разкриване на всички публични елементи на Rust, като предоставя на разработчиците фин контрол върху тяхната повърхност на API. Другите варианти не са правилни, защото типовете Rust могат да бъдат картографирани без UDL (макар и не толкова елегантно), оптимизирането на производителността не е основната цел на UDL и UDL не преобразува моделите на собственост.
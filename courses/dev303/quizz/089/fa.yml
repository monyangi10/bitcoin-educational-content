question: دلیل اصلی که UniFFI از توسعه‌دهندگان می‌خواهد یک فایل UDL جداگانه ایجاد کنند به جای اینکه به‌طور خودکار bindingها را مستقیماً از کد Rust تولید کند چیست؟
answer: UDL به عنوان یک قرارداد رابط صریح عمل می‌کند که مشخص می‌کند کدام بخش‌های کتابخانه Rust باید به زبان‌های دیگر ارائه شود.
wrong_answers:
  - "UDL مورد نیاز است زیرا سیستم نوع Rust با سایر زبان‌های برنامه‌نویسی بدون ترجمه ناسازگار است"
  - فایل‌های UDL برای بهینه‌سازی عملکرد فراخوانی‌های تابع بین زبان‌ها در زمان اجرای برنامه ضروری هستند.
  - "UDL راهی برای تبدیل خودکار مدل مالکیت Rust به جمع‌آوری زباله برای زبان‌های هدف فراهم می‌کند"
explanation: |
  UniFFI از UDL به عنوان یک انتخاب طراحی عمدی برای حفظ جداسازی نگرانی‌ها بین پیاده‌سازی و رابط استفاده می‌کند. فایل UDL به عنوان یک قرارداد صریح عمل می‌کند که به توسعه‌دهندگان اجازه می‌دهد تا بخش‌هایی از کتابخانه Rust خود را به صورت انتخابی افشا کنند در حالی که جزئیات پیاده‌سازی داخلی را خصوصی نگه می‌دارند. این رویکرد از افشای خودکار تمام آیتم‌های عمومی Rust جلوگیری می‌کند و به توسعه‌دهندگان کنترل دقیق‌تری بر سطح API خود می‌دهد. گزینه‌های دیگر نادرست هستند زیرا انواع Rust می‌توانند بدون UDL نگاشت شوند (اگرچه کمتر زیبا)، بهینه‌سازی عملکرد هدف اصلی UDL نیست و UDL مدل‌های مالکیت را تبدیل نمی‌کند.
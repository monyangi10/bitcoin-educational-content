question: Rust의 크로스 플랫폼 호환성은 다양한 배포 환경에서 Bitcoin 애플리케이션 개발에 어떤 이점을 제공하나요?
answer: 통합 코드베이스를 모바일 플랫폼, WebAssembly를 통한 웹 브라우저, 기존 운영 체제에서 실행할 수 있습니다
wrong_answers:
  - 다양한 지역 시장과 통화에서 암호화폐 환율 환전을 자동으로 처리합니다
  - 모든 네트워크 아키텍처에서 동일하게 작동하는 내장형 블록체인 동기화 프로토콜을 제공합니다
  - 지원되는 모든 플랫폼에서 하드웨어 지갑 및 보안 모듈과의 기본 통합을 제공합니다
explanation: |
  Rust의 크로스 플랫폼 기능을 통해 개발자는 모바일(Android/iOS), 웹 브라우저(웹어셈블리 컴파일을 통해), 기존 데스크톱 운영 체제 등 다양한 환경에 배포할 수 있는 Bitcoin 애플리케이션을 작성할 수 있습니다. 이러한 다목적성은 브라우저에서 직접 실행되는 라이트닝 지갑을 만들기 위해 Rust의 WebAssembly 지원을 활용하는 Mutiny Wallet과 같은 프로젝트에서 확인할 수 있습니다. 오답은 크로스 플랫폼 호환성과 관련이 없는 기능을 설명한 것으로, 통화 변환은 애플리케이션 수준의 기능이고 블록체인 프로토콜은 네트워크 계층의 문제이며 하드웨어 통합은 일반적인 크로스 플랫폼 지원이 아닌 특정 API를 필요로 합니다.
question: Rust 的跨平台相容性如何讓 Bitcoin 應用程式開發在不同的部署環境中獲益？
answer: 它可讓統一的程式碼庫在行動平台、透過 WebAssembly 的網頁瀏覽器，以及傳統作業系統上執行。
wrong_answers:
  - 它可自動處理不同區域市場和貨幣之間的加密貨幣匯率換算
  - 它提供內建區塊鏈同步通訊協定，可在所有網路架構中以相同方式運作
  - 它在每個支援的平台上提供與硬體錢包和安全模組的原生整合
explanation: |
  Rust 的跨平台功能允許開發人員編寫 Bitcoin 應用程式，這些應用程式可以部署在不同的環境中，包括手機（Android/iOS）、網頁瀏覽器（通過 WebAssembly 編譯）和傳統的桌面作業系統。Mutiny Wallet 等專案就證明了這種多樣性，該專案利用 Rust 的 WebAssembly 支援來建立可直接在瀏覽器中執行的 Lightning wallets。錯誤答案描述了與跨平台相容性無關的功能 - 貨幣轉換是應用程式層級的功能，區塊鏈協定是網路層的問題，而硬體整合需要特定的 API，而非一般的跨平台支援。
question: سازگاری متقابل پلتفرم Rust چگونه به توسعه برنامه Bitcoin در محیط‌های استقرار مختلف سود می‌رساند؟
answer: این امکان را فراهم می‌کند که پایگاه‌های کد یکپارچه بر روی پلتفرم‌های موبایل، مرورگرهای وب از طریق WebAssembly و سیستم‌عامل‌های سنتی اجرا شوند.
wrong_answers:
  - به‌طور خودکار تبدیل نرخ ارزهای رمزنگاری‌شده را در بازارها و ارزهای منطقه‌ای مختلف مدیریت می‌کند.
  - این پروتکل‌های همگام‌سازی بلاک‌چین داخلی را فراهم می‌کند که به‌طور یکسان در تمام معماری‌های شبکه کار می‌کنند.
  - این برنامه ادغام بومی با کیف‌پول‌های سخت‌افزاری و ماژول‌های امنیتی را در هر پلتفرم پشتیبانی‌شده ارائه می‌دهد.
explanation: |
  قابلیت‌های چندسکویی Rust به توسعه‌دهندگان اجازه می‌دهد تا برنامه‌های Bitcoin را بنویسند که می‌توانند در محیط‌های متنوعی از جمله موبایل (Android/iOS)، مرورگرهای وب (از طریق کامپایل WebAssembly)، و سیستم‌عامل‌های دسکتاپ سنتی مستقر شوند. این تطبیق‌پذیری توسط پروژه‌هایی مانند Mutiny Wallet نشان داده می‌شود که از پشتیبانی WebAssembly Rust برای ایجاد کیف‌پول‌های Lightning که مستقیماً در مرورگرها اجرا می‌شوند، بهره می‌برد. پاسخ‌های نادرست ویژگی‌هایی را توصیف می‌کنند که به سازگاری چندسکویی مربوط نیستند - تبدیل ارز یک ویژگی در سطح برنامه است، پروتکل‌های بلاک‌چین نگرانی‌های لایه شبکه هستند، و یکپارچه‌سازی سخت‌افزار به APIهای خاص نیاز دارد نه پشتیبانی عمومی چندسکویی.
question: Какая фундаментальная характеристика философии компонентного проектирования LDK отличает ее от монолитных реализаций узла Lightning, таких как CLightning или LND?
answer: Каждый компонент предоставляет реализацию по умолчанию, которую можно заменить на индивидуальные решения, сохраняя при этом соответствие протоколу
wrong_answers:
  - Все компоненты должны быть реализованы разработчиками с нуля, при этом библиотека не предоставляет никаких реализаций по умолчанию
  - Компоненты постоянно связаны друг с другом и не могут быть изменены после интеграции в архитектуру приложения
  - Библиотека требует, чтобы все компоненты использовали идентичные языки программирования, и не может поддерживать кроссплатформенную привязку языков
explanation: |
  Основная философия LDK заключается в предоставлении модульных компонентов с рабочими реализациями по умолчанию, которые разработчики могут выборочно заменять при необходимости. Это позволяет настраивать конкретную функциональность (например, мониторинг блокчейна или подписание транзакций), сохраняя другие компоненты неизменными. Неправильные ответы искажают подход LDK: он предоставляет стандартные реализации, а не требует создавать все с нуля, позволяет заменять компоненты, а не блокировать их вместе, и поддерживает множество языков программирования благодаря своей системе привязки.
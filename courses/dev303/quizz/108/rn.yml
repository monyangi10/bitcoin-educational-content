question: Ni ikihe kintu nyamukuru kiranga filozofiya y’uguhingura ibice vya LDK kiyitandukanya n’ugushirwa mu ngiro kw’imirongo y’umuravyo nk’iya CLightning canke LND?
answer: Buri gice gitanga ugushirwa mu ngiro mburabuzi gushobora gusubirizwa ku giti cabo n'imiti isanzwe mu gihe kigumya ukugendera ku mategeko
wrong_answers:
  - Ibice vyose bitegerezwa gushirwa mu ngiro kuva mu ntango n'abategura ata gushirwa mu ngiro kwa mbere kwatanzwe n'ububiko bw'ibitabo
  - Ibice bipfungiwe hamwe ubudasiba kandi ntibishobora guhindurwa iyo bimaze gushirwa mu nyubakwa y'ibikorwa
  - Ububiko bw'ibitabu busaba ibice vyose gukoresha indimi zisa n'izo kandi ntibushobora gushigikira ubufatanye bw'indimi zitandukanye
explanation: |
  Filozofiya nyamukuru ya LDK ishingiye ku gutanga ibice vy'ibice bifise ibikorwa bikora abahinguzi bashobora gusubirira iyo bikenewe. Ivyo bituma umuntu ashobora guhindura ibikorwa vyiwe (nk’ugukurikirana blockchain canke gusinya ku bikorwa) mu gihe ibindi bihimba biguma bitahindutse. Inyishu zitari zo zigaragaza nabi uburyo LDK ikoresha: itanga ivy’imbere aho gusaba vyose kuva mu ntango, ishoboza gusubirira ibice aho kubifunga hamwe, kandi ishigikira indimi nyinshi zo gukora porogarama biciye ku buryo bwayo bwo gufatanya.
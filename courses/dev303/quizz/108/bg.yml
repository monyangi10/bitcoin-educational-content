question: Коя основна характеристика на философията за проектиране на компоненти на LDK го отличава от монолитните имплементации на възли Lightning като CLightning или LND?
answer: Всеки компонент предоставя реализации по подразбиране, които могат да бъдат заменени с индивидуални решения, като се запази съответствието с протокола
wrong_answers:
  - Всички компоненти трябва да бъдат имплементирани от нулата от разработчиците, като библиотеката не предоставя имплементации по подразбиране
  - Компонентите са трайно свързани помежду си и не могат да бъдат променяни, след като бъдат интегрирани в архитектурата на приложението
  - Библиотеката изисква всички компоненти да използват идентични езици за програмиране и не може да поддържа междуплатформени езикови връзки
explanation: |
  Основната философия на LDK се фокусира върху предоставянето на модулни компоненти с работещи имплементации по подразбиране, които разработчиците могат избирателно да заменят, когато е необходимо. Това позволява персонализиране на специфична функционалност (като мониторинг на блокчейн или подписване на транзакции), като същевременно другите компоненти остават непроменени. Неправилните отговори представят погрешно подхода на LDK: той предоставя решения по подразбиране, вместо да изисква всичко от нулата, дава възможност за замяна на компонентите, вместо да ги заключва, и поддържа множество езици за програмиране чрез своята система за свързване.
question: LDK의 컴포넌트 설계 철학의 근본적인 특징이 CLightning이나 LND과 같은 모놀리식 라이트닝 노드 구현과 차별화되는 점은 무엇인가요?
answer: 각 구성 요소는 프로토콜 준수를 유지하면서 맞춤형 솔루션으로 개별적으로 대체할 수 있는 기본 구현을 제공합니다
wrong_answers:
  - 모든 컴포넌트는 라이브러리에서 제공하는 기본 구현 없이 개발자가 처음부터 구현해야 합니다
  - 구성 요소는 영구적으로 함께 잠기며 애플리케이션 아키텍처에 통합된 후에는 수정할 수 없습니다
  - 라이브러리에서는 모든 컴포넌트가 동일한 프로그래밍 언어를 사용해야 하며 플랫폼 간 언어 바인딩을 지원할 수 없습니다
explanation: |
  LDK의 핵심 철학은 개발자가 필요할 때 선택적으로 대체할 수 있는 기본 구현을 갖춘 모듈형 구성 요소를 제공하는 데 중점을 둡니다. 이를 통해 다른 구성 요소는 변경하지 않고 특정 기능(예: 블록체인 모니터링 또는 트랜잭션 서명)을 커스터마이징할 수 있습니다. 모든 것을 처음부터 요구하지 않고 기본값을 제공하며, 구성 요소를 함께 고정하지 않고 교체할 수 있고, 바인딩 시스템을 통해 여러 프로그래밍 언어를 지원하는 LDK의 접근 방식을 잘못 설명한 것입니다.
question: LDK 的元件設計哲學與 CLightning 或 LND 等單一的 Lightning 節點實作有何基本差異？
answer: 每個元件都提供預設實作，可個別以客製解決方案取代，同時維持通訊協定合規性
wrong_answers:
  - 所有元件都必須由開發人員從頭實作，程式庫不提供預設實作
  - 元件永久鎖定在一起，一旦整合到應用程式架構中就無法修改
  - 該函式庫要求所有元件使用相同的程式語言，且無法支援跨平台語言綁定
explanation: |
  LDK 的核心理念著重於提供具備預設實作的模組化元件，開發人員可在需要時選擇性地替換這些元件。這允許客製化特定功能 (例如區塊鏈監控或交易簽署)，同時保持其他元件不變。錯誤的答案歪曲了 LDK 的方法：它提供預設而非要求一切從頭開始，允許元件替換而非將它們鎖定在一起，並透過其綁定系統支援多種程式語言。
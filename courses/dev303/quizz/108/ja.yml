question: LDKのコンポーネント設計思想の基本的な特徴は、CLightningやLNDのようなモノリシックなLightningノード実装とどのような違いがあるのでしょうか？
answer: 各コンポーネントはデフォルトの実装を提供し、プロトコルのコンプライアンスを維持しながら、個別にカスタムソリューションに置き換えることができます。
wrong_answers:
  - すべてのコンポーネントは、開発者がゼロから実装する必要があり、ライブラリによって提供されるデフォルトの実装はない。
  - コンポーネントは恒久的に固定され、一度アプリケーション・アーキテクチャに統合されると変更できない。
  - ライブラリは、すべてのコンポーネントが同一のプログラミング言語を使用する必要があり、クロスプラットフォームの言語バインディングをサポートすることはできません。
explanation: |
  LDKの基本理念の中心は、モジュール化されたコンポーネントを提供することであり、そのコンポーネントはデフォルトの実装で動作し、開発者は必要に応じて選択的に置き換えることができる。これにより、他のコンポーネントを変更せずに、特定の機能（ブロックチェーンの監視やトランザクションの署名など）をカスタマイズすることができます。間違った答えは、LDKのアプローチを誤って表現している。LDKは、ゼロからすべてを要求するのではなくデフォルトを提供し、コンポーネントをロックするのではなくコンポーネントの入れ替えを可能にし、バインディングシステムによって複数のプログラミング言語をサポートしている。
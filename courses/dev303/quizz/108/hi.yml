question: LDK की घटक डिजाइन फिलॉसफी की कौन सी मूलभूत विशेषता इसे CLightning या LND जैसे मोनोलिथिक लाइटनिंग नोड कार्यान्वयनों से अलग करती है?
answer: प्रत्येक घटक डिफ़ॉल्ट कार्यान्वयन प्रदान करता है जिन्हें प्रोटोकॉल अनुपालन बनाए रखते हुए व्यक्तिगत रूप से कस्टम समाधानों से बदला जा सकता है।
wrong_answers:
  - सभी घटकों को डेवलपर्स द्वारा शुरू से ही कार्यान्वित किया जाना चाहिए, लाइब्रेरी द्वारा कोई डिफ़ॉल्ट कार्यान्वयन प्रदान नहीं किया गया है।
  - एक बार एप्लिकेशन आर्किटेक्चर में एकीकृत हो जाने के बाद घटक स्थायी रूप से एक साथ जुड़ जाते हैं और उनमें कोई बदलाव नहीं किया जा सकता है।
  - इस लाइब्रेरी के लिए सभी घटकों को एक ही प्रोग्रामिंग भाषा का उपयोग करना आवश्यक है और यह क्रॉस-प्लेटफ़ॉर्म भाषा बाइंडिंग का समर्थन नहीं कर सकती है।
explanation: |
  LDK का मूल सिद्धांत मॉड्यूलर कंपोनेंट्स उपलब्ध कराना है जिनमें डिफ़ॉल्ट रूप से काम करने वाले कार्यान्वयन होते हैं, जिन्हें डेवलपर ज़रूरत पड़ने पर चुनकर बदल सकते हैं। इससे अन्य कंपोनेंट्स को अपरिवर्तित रखते हुए विशिष्ट कार्यक्षमताओं (जैसे ब्लॉकचेन मॉनिटरिंग या ट्रांज़ैक्शन साइनिंग) को अनुकूलित किया जा सकता है। गलत उत्तर LDK के दृष्टिकोण को गलत तरीके से प्रस्तुत करते हैं: यह सब कुछ शुरू से अनिवार्य करने के बजाय डिफ़ॉल्ट मान प्रदान करता है, कंपोनेंट्स को आपस में लॉक करने के बजाय उन्हें बदलने की सुविधा देता है, और अपनी बाइंडिंग प्रणाली के माध्यम से कई प्रोग्रामिंग भाषाओं का समर्थन करता है।
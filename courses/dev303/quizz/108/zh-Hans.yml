question: LDK的组件设计理念与CLightning或LND等单片式Lightning节点实现有何基本特征？
answer: 每个组件都提供默认实现，可单独替换为定制解决方案，同时保持协议合规性
wrong_answers:
  - 所有组件都必须由开发人员从头开始实现，库不提供默认实现方式
  - 组件永久锁定在一起，一旦集成到应用架构中就无法修改
  - 该库要求所有组件使用相同的编程语言，无法支持跨平台语言绑定
explanation: |
  LDK 的核心理念是提供模块化组件，这些组件具有可用的默认实现，开发人员可以在需要时选择性地替换它们。这样就可以定制特定功能（如区块链监控或交易签名），同时保持其他组件不变。错误答案歪曲了 LDK 的方法：它提供默认而不是要求一切从零开始，实现组件替换而不是将它们锁定在一起，并通过其绑定系统支持多种编程语言。
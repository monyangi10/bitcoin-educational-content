question: چه ویژگی بنیادی در فلسفه طراحی مؤلفه‌های LDK آن را از پیاده‌سازی‌های نود لایتنینگ یکپارچه مانند CLightning یا LND متمایز می‌کند؟
answer: هر مؤلفه پیاده‌سازی‌های پیش‌فرضی ارائه می‌دهد که می‌توانند به‌صورت جداگانه با راه‌حل‌های سفارشی جایگزین شوند و در عین حال با پروتکل سازگاری داشته باشند.
wrong_answers:
  - همه اجزا باید از ابتدا توسط توسعه‌دهندگان پیاده‌سازی شوند و هیچ پیاده‌سازی پیش‌فرضی توسط کتابخانه ارائه نمی‌شود.
  - اجزاء به طور دائمی به یکدیگر قفل می‌شوند و پس از ادغام در معماری یک برنامه نمی‌توان آنها را تغییر داد.
  - کتابخانه نیاز دارد که همه مؤلفه‌ها از زبان‌های برنامه‌نویسی یکسان استفاده کنند و نمی‌تواند از پیوندهای زبان چندسکویی پشتیبانی کند.
explanation: |
  فلسفه اصلی LDK بر ارائه اجزای مدولار با پیاده‌سازی‌های پیش‌فرض کارآمد تمرکز دارد که توسعه‌دهندگان می‌توانند در صورت نیاز به‌طور انتخابی آن‌ها را جایگزین کنند. این امر امکان سفارشی‌سازی عملکرد خاص (مانند نظارت بر بلاک‌چین یا امضای تراکنش) را فراهم می‌کند در حالی که سایر اجزا بدون تغییر باقی می‌مانند. پاسخ‌های نادرست رویکرد LDK را نادرست نشان می‌دهند: این سیستم پیش‌فرض‌هایی ارائه می‌دهد به‌جای اینکه همه چیز را از ابتدا نیاز داشته باشد، امکان جایگزینی اجزا را فراهم می‌کند به‌جای اینکه آن‌ها را به هم قفل کند، و از چندین زبان برنامه‌نویسی از طریق سیستم اتصال خود پشتیبانی می‌کند.
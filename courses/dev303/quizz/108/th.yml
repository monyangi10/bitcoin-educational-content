question: ลักษณะพื้นฐานของปรัชญาการออกแบบส่วนประกอบของ LDK ที่ทำให้แตกต่างจากการใช้งานโหนด Lightning แบบโมโนลิทิก เช่น CLightning หรือ LND คืออะไร?
answer: แต่ละองค์ประกอบมีการใช้งานเริ่มต้นที่สามารถแทนที่ด้วยโซลูชันที่กำหนดเองได้โดยยังคงปฏิบัติตามโปรโตคอล
wrong_answers:
  - นักพัฒนาต้องพัฒนาองค์ประกอบทั้งหมดขึ้นมาใหม่เอง โดยไม่มีการใช้งานเริ่มต้นที่จัดเตรียมโดยไลบรารี
  - ส่วนประกอบถูกล็อคเข้าด้วยกันอย่างถาวรและไม่สามารถแก้ไขได้เมื่อรวมเข้ากับสถาปัตยกรรมแอปพลิเคชัน
  - ห้องสมุดต้องการให้ทุกองค์ประกอบใช้ภาษาโปรแกรมที่เหมือนกันและไม่สามารถรองรับการเชื่อมโยงภาษาข้ามแพลตฟอร์มได้
explanation: |
  ปรัชญาหลักของ LDK มุ่งเน้นไปที่การให้ส่วนประกอบแบบโมดูลาร์ที่มีการใช้งานเริ่มต้นที่ทำงานได้ ซึ่งนักพัฒนาสามารถเลือกเปลี่ยนได้ตามต้องการ สิ่งนี้ช่วยให้สามารถปรับแต่งฟังก์ชันเฉพาะ (เช่น การตรวจสอบบล็อกเชนหรือการลงนามธุรกรรม) ในขณะที่ยังคงรักษาส่วนประกอบอื่นๆ ไว้โดยไม่เปลี่ยนแปลง คำตอบที่ผิดแสดงให้เห็นถึงแนวทางของ LDK อย่างไม่ถูกต้อง: มันให้ค่าเริ่มต้นแทนที่จะต้องการทุกอย่างตั้งแต่เริ่มต้น, ช่วยให้สามารถเปลี่ยนส่วนประกอบได้แทนที่จะล็อคเข้าด้วยกัน, และรองรับหลายภาษาโปรแกรมผ่านระบบการผูกของมัน
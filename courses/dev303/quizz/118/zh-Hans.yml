question: 与传统的移动 "闪电 "实施相比，Greenlight 驱动的钱包能够实现更高的支付路由可靠性的主要技术原因是什么？
answer: Greenlight 节点在云中持续运行，保持实时网络图表同步和即时完整的图表数据访问
wrong_answers:
  - Greenlight 使用先进的机器学习算法，根据历史交易模式预测最佳支付路线
  - Greenlight 实施了专有的多路径支付分流，将交易同时分配到多个渠道，以实现冗余
  - Greenlight与主要的 "闪电 "中心保持专用的高带宽连接，确保通过最具流动性的渠道优先路由
explanation: |
  正确答案指出了 Greenlight 基于云的方法的基本架构优势。传统的移动 "闪电 "钱包必须在启动时同步网络图数据，这会造成延迟，并有可能使用陈旧的路由信息。Greenlight通过在云中持续运行Lightning节点来解决这个问题，确保它们始终拥有最新的网络知识，并能在用户连接时立即提供完整的图数据。错误答案描述了似是而非的功能--Greenlight 不使用 ML 路由算法、标准 Lightning 协议之外的专有支付分割或用于优先路由的特殊集线器连接。
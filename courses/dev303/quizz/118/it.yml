question: Qual è la ragione tecnica principale per cui i portafogli alimentati da Greenlight raggiungono un'affidabilità di routing dei pagamenti superiore rispetto alle tradizionali implementazioni di Lightning mobile?
answer: I nodi Greenlight funzionano continuamente nel cloud, mantenendo la sincronizzazione del grafo di rete in tempo reale e l'accesso istantaneo ai dati del grafo completo
wrong_answers:
  - Greenlight utilizza algoritmi avanzati di apprendimento automatico per prevedere i percorsi di pagamento ottimali sulla base di modelli di transazioni storiche
  - Greenlight implementa un sistema proprietario di suddivisione dei pagamenti su più percorsi che distribuisce le transazioni su più canali contemporaneamente per garantire la ridondanza
  - Greenlight mantiene connessioni dedicate ad alta larghezza di banda ai principali hub Lightning, garantendo un instradamento prioritario attraverso i canali più liquidi
explanation: |
  La risposta corretta identifica il vantaggio architettonico fondamentale dell'approccio basato sul cloud di Greenlight. I portafogli Lightning mobili tradizionali devono sincronizzare i dati del grafo di rete all'avvio, creando ritardi e lavorando potenzialmente con informazioni di routing non aggiornate. Greenlight risolve questo problema facendo funzionare continuamente i nodi Lightning nel cloud, assicurando che abbiano sempre una conoscenza aggiornata della rete e che possano fornire istantaneamente dati completi sul grafo quando gli utenti si connettono. Le risposte sbagliate descrivono funzionalità plausibili ma inesistenti: Greenlight non utilizza algoritmi di routing ML, suddivisione dei pagamenti proprietari al di là dei protocolli Lightning standard o connessioni hub speciali per il routing prioritario.
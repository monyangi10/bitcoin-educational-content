question: Was ist der wichtigste technische Grund dafür, dass Greenlight-betriebene Geldbörsen im Vergleich zu herkömmlichen mobilen Lightning-Implementierungen eine höhere Zuverlässigkeit bei der Weiterleitung von Zahlungen bieten?
answer: Die Greenlight-Knoten laufen kontinuierlich in der Cloud und sorgen für eine Echtzeit-Synchronisation des Netzwerkgraphen und einen sofortigen Zugriff auf alle Graphdaten
wrong_answers:
  - Greenlight nutzt fortschrittliche Algorithmen des maschinellen Lernens, um auf der Grundlage historischer Transaktionsmuster optimale Zahlungswege vorherzusagen
  - Greenlight implementiert ein proprietäres Multi-Path-Zahlungssplitting, das Transaktionen zur Redundanz auf mehrere Kanäle gleichzeitig verteilt
  - Greenlight unterhält dedizierte Verbindungen mit hoher Bandbreite zu den wichtigsten Lightning-Hubs, die eine vorrangige Weiterleitung über die liquidesten Kanäle gewährleisten
explanation: |
  Die richtige Antwort nennt den grundlegenden architektonischen Vorteil des Cloud-basierten Ansatzes von Greenlight. Herkömmliche mobile Lightning-Wallets müssen die Netzwerkgraphen-Daten beim Start synchronisieren, was zu Verzögerungen führt und möglicherweise mit veralteten Routing-Informationen arbeitet. Greenlight löst dieses Problem, indem es die Lightning-Knoten kontinuierlich in der Cloud laufen lässt und so sicherstellt, dass sie immer über aktuelles Netzwerkwissen verfügen und sofort vollständige Graphdaten bereitstellen können, wenn sich Nutzer verbinden. Die falschen Antworten beschreiben plausible, aber nicht vorhandene Funktionen - Greenlight verwendet keine ML-Routing-Algorithmen, kein proprietäres Payment-Splitting, das über die Lightning-Standardprotokolle hinausgeht, und keine speziellen Hub-Verbindungen für Prioritäts-Routing.
question: ¿Cuál es la principal razón técnica por la que los monederos Greenlight logran una mayor fiabilidad en el enrutamiento de los pagos que las implementaciones tradicionales de Lightning para móviles?
answer: Los nodos Greenlight funcionan continuamente en la nube, manteniendo la sincronización de los gráficos de red en tiempo real y el acceso instantáneo a todos los datos de los gráficos
wrong_answers:
  - Greenlight utiliza algoritmos avanzados de aprendizaje automático para predecir las rutas de pago óptimas basándose en patrones históricos de transacciones
  - Greenlight aplica una división de pagos patentada que distribuye las transacciones a través de varios canales simultáneamente para garantizar la redundancia
  - Greenlight mantiene conexiones dedicadas de gran ancho de banda con los principales concentradores Lightning, lo que garantiza un enrutamiento prioritario a través de los canales de mayor liquidez
explanation: |
  La respuesta correcta identifica la ventaja arquitectónica fundamental del enfoque basado en la nube de Greenlight. Los monederos Lightning móviles tradicionales deben sincronizar los datos del grafo de red cuando se ponen en marcha, lo que genera retrasos y la posibilidad de trabajar con información de enrutamiento obsoleta. Greenlight resuelve este problema ejecutando los nodos Lightning continuamente en la nube, lo que garantiza que siempre tengan un conocimiento actualizado de la red y puedan proporcionar al instante datos completos del grafo cuando los usuarios se conectan. Las respuestas incorrectas describen características plausibles pero inexistentes: Greenlight no utiliza algoritmos de enrutamiento ML, división de pagos patentada más allá de los protocolos estándar de Lightning, ni conexiones de hub especiales para el enrutamiento prioritario.
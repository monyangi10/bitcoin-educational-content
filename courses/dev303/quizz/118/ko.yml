question: 그린라이트 기반 지갑이 기존 모바일 라이트닝 구현에 비해 우수한 결제 라우팅 안정성을 달성하는 주요 기술적 이유는 무엇인가요?
answer: 그린라이트 노드는 클라우드에서 지속적으로 실행되어 실시간 네트워크 그래프 동기화 및 즉각적인 전체 그래프 데이터 액세스를 유지합니다
wrong_answers:
  - Greenlight는 고급 머신러닝 알고리즘을 사용하여 과거 거래 패턴을 기반으로 최적의 결제 경로를 예측합니다
  - Greenlight는 중복성을 위해 여러 채널에 동시에 거래를 분산하는 독점적인 다중 경로 결제 분할을 구현합니다
  - 그린라이트는 주요 라이트닝 허브에 대한 전용 고대역폭 연결을 유지하여 가장 유동적인 채널을 통한 우선 라우팅을 보장합니다
explanation: |
  정답은 그린라이트의 클라우드 기반 접근 방식의 근본적인 아키텍처적 이점을 나타냅니다. 기존의 모바일 라이트닝 지갑은 시작 시 네트워크 그래프 데이터를 동기화해야 하므로 지연이 발생하고 오래된 라우팅 정보로 작동할 가능성이 있습니다. 그린라이트는 클라우드에서 라이트닝 노드를 지속적으로 실행하여 항상 최신 네트워크 지식을 확보하고 사용자가 연결할 때 완전한 그래프 데이터를 즉시 제공할 수 있도록 함으로써 이 문제를 해결합니다. 오답은 그럴듯하지만 존재하지 않는 기능을 설명하는 것으로, Greenlight는 ML 라우팅 알고리즘, 표준 Lightning 프로토콜 이외의 독점적인 결제 분할 또는 우선 순위 라우팅을 위한 특수 허브 연결을 사용하지 않습니다.
question: เหตุผลทางเทคนิคหลักที่ทำให้กระเป๋าเงินที่ใช้ Greenlight มีความน่าเชื่อถือในการกำหนดเส้นทางการชำระเงินที่เหนือกว่าการใช้งาน Lightning บนมือถือแบบดั้งเดิมคืออะไร?
answer: โหนด Greenlight ทำงานอย่างต่อเนื่องในคลาวด์ รักษาการซิงโครไนซ์กราฟเครือข่ายแบบเรียลไทม์และการเข้าถึงข้อมูลกราฟที่สมบูรณ์ทันที
wrong_answers:
  - Greenlight ใช้อัลกอริธึมการเรียนรู้ของเครื่องขั้นสูงเพื่อทำนายเส้นทางการชำระเงินที่เหมาะสมที่สุดโดยอิงจากรูปแบบธุรกรรมในอดีต
  - Greenlight ใช้การแบ่งการชำระเงินแบบหลายเส้นทางที่เป็นกรรมสิทธิ์ซึ่งกระจายธุรกรรมผ่านช่องทางหลายช่องทางพร้อมกันเพื่อความซ้ำซ้อน
  - Greenlight รักษาการเชื่อมต่อแบนด์วิดท์สูงโดยเฉพาะกับฮับ Lightning หลัก ๆ เพื่อให้มั่นใจถึงการกำหนดเส้นทางที่มีลำดับความสำคัญผ่านช่องทางที่มีสภาพคล่องมากที่สุด
explanation: |
  คำตอบที่ถูกต้องระบุถึงข้อได้เปรียบทางสถาปัตยกรรมพื้นฐานของวิธีการที่ใช้ระบบคลาวด์ของ Greenlight กระเป๋าเงิน Lightning บนมือถือแบบดั้งเดิมต้องซิงโครไนซ์ข้อมูลกราฟเครือข่ายเมื่อเริ่มต้นใช้งาน ซึ่งทำให้เกิดความล่าช้าและอาจทำงานกับข้อมูลการกำหนดเส้นทางที่ล้าสมัย Greenlight แก้ปัญหานี้โดยการรันโหนด Lightning อย่างต่อเนื่องในระบบคลาวด์ เพื่อให้แน่ใจว่าพวกเขามีความรู้เกี่ยวกับเครือข่ายที่ทันสมัยอยู่เสมอและสามารถให้ข้อมูลกราฟที่สมบูรณ์ได้ทันทีเมื่อผู้ใช้เชื่อมต่อ คำตอบที่ผิดอธิบายถึงคุณสมบัติที่เป็นไปได้แต่ไม่มีอยู่จริง - Greenlight ไม่ได้ใช้อัลกอริธึมการกำหนดเส้นทาง ML, การแบ่งการชำระเงินที่เป็นกรรมสิทธิ์นอกเหนือจากโปรโตคอล Lightning มาตรฐาน หรือการเชื่อมต่อฮับพิเศษสำหรับการกำหนดเส้นทางที่มีลำดับความสำคัญ
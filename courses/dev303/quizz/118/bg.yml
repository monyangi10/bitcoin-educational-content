question: Коя е основната техническа причина, поради която портфейлите, задвижвани от Greenlight, постигат по-висока надеждност на маршрутизацията на плащанията в сравнение с традиционните мобилни реализации на Lightning?
answer: Възлите на Greenlight работят непрекъснато в облака, като поддържат синхронизация на мрежовите графи в реално време и незабавен достъп до пълни графични данни
wrong_answers:
  - Greenlight използва усъвършенствани алгоритми за машинно обучение, за да прогнозира оптимални маршрути за плащане въз основа на исторически модели на транзакции
  - Greenlight прилага патентовано многопътно разделяне на плащанията, което разпределя транзакциите по няколко канала едновременно за осигуряване на излишък
  - Greenlight поддържа специализирани високоскоростни връзки към основните центрове на Lightning, като осигурява приоритетно маршрутизиране през най-ликвидните канали
explanation: |
  Правилният отговор идентифицира основното архитектурно предимство на базирания на облак подход на Greenlight. Традиционните мобилни портфейли Lightning трябва да синхронизират данните за мрежовите графики при стартирането си, което води до забавяния и потенциално до работа със застояла информация за маршрутизация. Greenlight решава този проблем, като непрекъснато стартира Lightning възли в облака, гарантирайки, че те винаги разполагат с актуални познания за мрежата и могат незабавно да предоставят пълни графични данни, когато потребителите се свържат. Неправилните отговори описват правдоподобни, но несъществуващи функции - Greenlight не използва ML алгоритми за маршрутизиране, собствено разделяне на плащанията извън стандартните Lightning протоколи или специални връзки с възли за приоритетно маршрутизиране.
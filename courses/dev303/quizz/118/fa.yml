question: دلیل فنی اصلی که چرا کیف‌پول‌های مبتنی بر Greenlight به قابلیت اطمینان بالاتری در مسیریابی پرداخت نسبت به پیاده‌سازی‌های سنتی موبایل Lightning دست می‌یابند چیست؟
answer: گرین‌لایت نودها به‌طور مداوم در ابر اجرا می‌شوند و همگام‌سازی نمودار شبکه در زمان واقعی و دسترسی فوری به داده‌های نمودار کامل را حفظ می‌کنند.
wrong_answers:
  - گرین‌لایت از الگوریتم‌های پیشرفته یادگیری ماشین برای پیش‌بینی مسیرهای پرداخت بهینه بر اساس الگوهای تراکنش تاریخی استفاده می‌کند.
  - گرین‌لایت پیاده‌سازی تقسیم پرداخت چند مسیره اختصاصی را انجام می‌دهد که تراکنش‌ها را به‌طور همزمان برای افزونگی در چندین کانال توزیع می‌کند.
  - گرین‌لایت اتصالات اختصاصی با پهنای باند بالا به هاب‌های اصلی لایتنینگ را حفظ می‌کند و از این طریق اولویت مسیریابی از طریق کانال‌های با نقدینگی بالا را تضمین می‌کند.
explanation: |
  پاسخ صحیح مزیت بنیادی معماری رویکرد مبتنی بر ابر Greenlight را شناسایی می‌کند. کیف‌پول‌های موبایل Lightning سنتی باید هنگام راه‌اندازی داده‌های گراف شبکه را همگام‌سازی کنند که این امر باعث تأخیر می‌شود و ممکن است با اطلاعات مسیریابی قدیمی کار کنند. Greenlight این مشکل را با اجرای مداوم نودهای Lightning در ابر حل می‌کند و اطمینان می‌دهد که همیشه دانش شبکه به‌روز دارند و می‌توانند بلافاصله داده‌های کامل گراف را هنگام اتصال کاربران ارائه دهند. پاسخ‌های نادرست ویژگی‌های قابل‌قبول اما غیرواقعی را توصیف می‌کنند - Greenlight از الگوریتم‌های مسیریابی ML، تقسیم پرداخت اختصاصی فراتر از پروتکل‌های استاندارد Lightning، یا اتصالات هاب ویژه برای مسیریابی اولویت‌دار استفاده نمی‌کند.
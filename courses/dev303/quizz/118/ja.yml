question: Greenlightを搭載したウォレットが、従来のモバイルライトニングの実装と比較して、優れた支払いルーティングの信頼性を実現している主な技術的理由は何ですか？
answer: Greenlightノードはクラウド上で継続的に実行され、リアルタイムのネットワークグラフ同期を維持し、即座に完全なグラフデータにアクセスできる。
wrong_answers:
  - Greenlightは高度な機械学習アルゴリズムを使用し、過去の取引パターンに基づいて最適な決済ルートを予測する。
  - Greenlightは、冗長性のためにトランザクションを複数のチャネルに同時に分散させる独自のマルチパス支払分割を実装している。
  - Greenlightは、主要なLightningハブへの専用の広帯域接続を維持し、最も流動性の高いチャネルを介した優先ルーティングを保証します。
explanation: |
  正解は、Greenlightのクラウドベースのアプローチの基本的なアーキテクチャ上の利点を示しています。従来のモバイルLightningウォレットは、起動時にネットワークグラフデータを同期する必要があり、遅延が発生し、古いルーティング情報を使用する可能性があります。Greenlightは、Lightningノードをクラウド上で継続的に稼働させることでこれを解決し、常に最新のネットワーク知識を確保し、ユーザが接続したときに完全なグラフデータを即座に提供できるようにしている。Greenlightは、MLルーティングアルゴリズム、標準的なLightningプロトコルを超える独自の支払い分割、優先ルーティングのための特別なハブ接続を使用していません。
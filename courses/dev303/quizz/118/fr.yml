question: Quelle est la principale raison technique pour laquelle les portefeuilles alimentés par Greenlight atteignent une fiabilité d'acheminement des paiements supérieure à celle des implémentations Lightning mobiles traditionnelles ?
answer: Les nœuds Greenlight fonctionnent en continu dans le nuage, assurant la synchronisation en temps réel des graphes du réseau et l'accès instantané à l'ensemble des données des graphes.
wrong_answers:
  - Greenlight utilise des algorithmes avancés d'apprentissage automatique pour prédire les itinéraires de paiement optimaux sur la base de l'historique des transactions.
  - Greenlight met en œuvre un système exclusif de répartition des paiements sur plusieurs voies qui distribue les transactions sur plusieurs canaux simultanément pour assurer la redondance.
  - Greenlight dispose de connexions dédiées à large bande passante vers les principaux hubs Lightning, ce qui garantit un acheminement prioritaire par les canaux les plus liquides.
explanation: |
  La bonne réponse identifie l'avantage architectural fondamental de l'approche de Greenlight basée sur le cloud. Les portefeuilles Lightning mobiles traditionnels doivent synchroniser les données du graphe du réseau lorsqu'ils démarrent, ce qui crée des retards et peut entraîner l'utilisation d'informations de routage périmées. Greenlight résout ce problème en faisant fonctionner les nœuds Lightning en continu dans le nuage, ce qui garantit qu'ils ont toujours une connaissance actuelle du réseau et qu'ils peuvent instantanément fournir des données de graphe complètes lorsque les utilisateurs se connectent. Les mauvaises réponses décrivent des fonctionnalités plausibles mais inexistantes. Greenlight n'utilise pas d'algorithmes de routage ML, de fractionnement de paiement propriétaire au-delà des protocoles Lightning standard, ou de connexions hub spéciales pour le routage prioritaire.

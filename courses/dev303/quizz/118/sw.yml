question: Ni sababu gani kuu ya kiufundi kwa nini Wallet zinazoendeshwa na Greenlight hupata uaminifu mkubwa wa uelekezaji wa malipo ikilinganishwa na utekelezaji wa kawaida wa Lightning ya simu?
answer: Node za Greenlight huendelea kufanya kazi katika wingu, zikidumisha usawazishaji wa grafu ya mtandao kwa wakati halisi na ufikiaji kamili wa data ya grafu papo hapo
wrong_answers:
  - Greenlight hutumia algoriti za hali ya juu za kujifunza kwa mashine ili kutabiri njia bora za malipo kulingana na mifumo ya miamala ya kihistoria
  - Greenlight hutekeleza mgawanyiko wa malipo wa njia nyingi ambao husambaza miamala katika njia nyingi kwa wakati mmoja kwa ajili ya upungufu wa malipo.
  - Greenlight hudumisha miunganisho maalum ya kipimo data cha juu kwa vituo vikuu vya umeme, kuhakikisha uelekezaji wa kipaumbele kupitia njia nyingi za kioevu
explanation: |
  Jibu sahihi linabainisha faida ya msingi ya usanifu wa mbinu ya Greenlight inayotegemea Cloud. Wallet za kawaida za Lightning za simu lazima zilandanishe data ya grafu ya mtandao zinapoanza, na kusababisha ucheleweshaji na uwezekano wa kufanya kazi na taarifa za uelekezaji zilizopitwa na wakati. Greenlight hutatua hili kwa kuendesha nodi za Lightning mfululizo katika wingu, kuhakikisha kuwa zina ujuzi wa sasa wa mtandao na zinaweza kutoa data kamili ya grafu mara moja watumiaji wanapounganisha. Majibu yasiyo sahihi yanaelezea vipengele vinavyowezekana lakini visivyopo - Greenlight haitumii algoriti za uelekezaji za ML, mgawanyiko wa malipo ya kibinafsi zaidi ya protocol za kawaida za Lightning, au miunganisho maalum ya kitovu kwa uelekezaji wa kipaumbele.

question: Какова основная техническая причина, по которой кошельки на базе Greenlight обеспечивают более высокую надежность маршрутизации платежей по сравнению с традиционными мобильными реализациями Lightning?
answer: Узлы Greenlight непрерывно работают в облаке, поддерживая синхронизацию сетевых графов в режиме реального времени и мгновенный полный доступ к данным графов
wrong_answers:
  - Greenlight использует передовые алгоритмы машинного обучения для прогнозирования оптимальных маршрутов платежей на основе исторических моделей транзакций
  - В Greenlight реализовано собственное многоканальное разделение платежей, которое распределяет транзакции по нескольким каналам одновременно для обеспечения резервирования
  - Greenlight поддерживает выделенные высокоскоростные соединения с основными узлами Lightning, обеспечивая приоритетную маршрутизацию по наиболее ликвидным каналам
explanation: |
  Правильный ответ определяет фундаментальное архитектурное преимущество облачного подхода Greenlight. Традиционные мобильные кошельки Lightning должны синхронизировать данные сетевого графа при запуске, что приводит к задержкам и потенциальной работе с устаревшей информацией о маршрутизации. Greenlight решает эту проблему, постоянно запуская узлы Lightning в облаке, что позволяет им всегда иметь актуальную информацию о сети и мгновенно предоставлять полные данные о графе при подключении пользователей. Неправильные ответы описывают правдоподобные, но несуществующие функции - Greenlight не использует алгоритмы маршрутизации ML, собственное разделение платежей, выходящее за рамки стандартных протоколов Lightning, или специальные соединения узлов для приоритетной маршрутизации.
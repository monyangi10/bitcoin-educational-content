question: ตามอุดมการณ์เสรีนิยม แนวทางที่สอดคล้องที่สุดในการแก้ไขความขัดแย้งระหว่างผู้สนับสนุนการแต่งงานแบบดั้งเดิมและผู้สนับสนุนการแต่งงานเพศเดียวกันคืออะไร?
answer: การแปรรูปรัฐวิสาหกิจของการแต่งงานอย่างสมบูรณ์โดยการนำรัฐบาลออกจากการมีส่วนร่วมและอนุญาตให้องค์กรเอกชนกำหนดและยอมรับการแต่งงานตามมาตรฐานของตนเอง
wrong_answers:
  - รัฐบาลควรทำให้การแต่งงานของเพศเดียวกันถูกกฎหมาย ในขณะที่ยังคงปกป้องข้อยกเว้นทางศาสนาสำหรับสถาบันดั้งเดิมที่คัดค้าน
  - รัฐบาลควรรักษาคำนิยามการแต่งงานแบบดั้งเดิมไว้ แต่สร้างหมวดหมู่การจดทะเบียนคู่ชีวิตแยกต่างหากที่มีสิทธิทางกฎหมายเทียบเท่าสำหรับคู่รักเพศเดียวกัน
  - รัฐบาลควรจัดให้มีการลงประชามติระดับชาติในเรื่องการนิยามการแต่งงานเพื่อให้เสียงข้างมากในระบอบประชาธิปไตยตัดสินใจ ในขณะเดียวกันก็ปกป้องสิทธิของชนกลุ่มน้อยผ่านการแก้ไขรัฐธรรมนูญ
explanation: |
  จุดยืนของลิเบอร์ทาเรียนสนับสนุนการแยกการแต่งงานออกจากรัฐอย่างสมบูรณ์ โดยให้หน่วยงานเอกชน (โบสถ์ กลุ่มฆราวาส ฯลฯ) กำหนดการแต่งงานตามค่านิยมของพวกเขา วิธีการนี้เคารพทั้งสิทธิในทรัพย์สินและเสรีภาพส่วนบุคคลโดยไม่บังคับให้ฝ่ายใดฝ่ายหนึ่งต้องยอมรับคำจำกัดความของอีกฝ่าย คำตอบที่ผิดทั้งหมดเกี่ยวข้องกับการมีส่วนร่วมของรัฐบาลอย่างต่อเนื่องในการกำหนดการแต่งงาน ซึ่งขัดแย้งกับหลักการของลิเบอร์ทาเรียนที่ต้องการลดการแทรกแซงของรัฐในความสัมพันธ์ส่วนบุคคลและสถาบันเอกชน
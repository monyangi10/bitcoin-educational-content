question: Zgodnie z ideologią libertariańską, jakie jest najbardziej spójne podejście do rozwiązywania konfliktów między zwolennikami tradycyjnych małżeństw a zwolennikami małżeństw osób tej samej płci?
answer: Całkowita prywatyzacja małżeństwa poprzez usunięcie zaangażowania rządu i zezwolenie prywatnym organizacjom na definiowanie i uznawanie małżeństw zgodnie z ich własnymi standardami
wrong_answers:
  - Rząd powinien zalegalizować małżeństwa osób tej samej płci, jednocześnie chroniąc wyjątki religijne dla tradycyjnych instytucji, które są temu przeciwne
  - Rząd powinien utrzymać tradycyjną definicję małżeństwa, ale stworzyć oddzielne kategorie związków partnerskich z równoważnymi prawami dla par tej samej płci
  - Rząd powinien przeprowadzić krajowe referenda w sprawie definicji małżeństwa, aby umożliwić demokratycznej większości podjęcie decyzji, jednocześnie chroniąc prawa mniejszości poprzez poprawki do konstytucji
explanation: |
  Stanowisko libertariańskie opowiada się za całkowitym oddzieleniem małżeństwa od państwa, pozwalając organizacjom prywatnym (kościołom, grupom świeckim itp.) na definiowanie małżeństwa zgodnie z ich wartościami.
  Podejście to szanuje zarówno prawa własności, jak i wolność jednostki, nie zmuszając żadnej ze stron do zaakceptowania definicji drugiej strony. Wszystkie błędne odpowiedzi zakładają dalsze zaangażowanie rządu w definiowanie małżeństwa, co jest sprzeczne z libertariańską zasadą minimalizowania interwencji państwa w związki osobiste i instytucje prywatne.
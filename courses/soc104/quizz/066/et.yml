question: Milline on libertaarne ideoloogia kohaselt kõige järjekindlam lähenemisviis konfliktide lahendamiseks traditsioonilise abielu toetajate ja samasooliste abielu pooldajate vahel?
answer: Abielu täielik erastamine, kõrvaldades valitsuse sekkumise ja lubades eraorganisatsioonidel abielu määratleda ja tunnustada vastavalt oma standarditele
wrong_answers:
  - Valitsus peaks seadustama samasooliste abielu, kaitstes samal ajal usulisi erandeid traditsioonilistele institutsioonidele, kes on selle vastu
  - Valitsus peaks säilitama traditsioonilise abielu määratluse, kuid looma samasoolistele paaridele eraldi tsiviilühenduste kategooriad, millel on samaväärsed õiguslikud õigused
  - Valitsus peaks korraldama rahvahääletuse abielu määratluste üle, et lasta demokraatlikul enamusel otsustada, kaitstes samal ajal vähemuste õigusi põhiseaduse muudatuste kaudu
explanation: |
  Libertaarne seisukoht pooldab abielu ja riigi täielikku eraldamist, lubades eraorganisatsioonidel (kirikud, ilmalikud rühmad jne) määratleda abielu vastavalt oma väärtustele.
  See lähenemisviis austab nii omandiõigust kui ka individuaalset vabadust, sundimata kumbagi osapoolt aktsepteerima teise määratlust. Kõik valed vastused hõlmavad valitsuse jätkuvat sekkumist abielu määratlemisse, mis on vastuolus libertaarsete põhimõtetega, mille kohaselt peab riik minimeerima sekkumist isiklikesse suhetesse ja erainstitutsioonidesse.
question: 根据自由主义思想，解决传统婚姻支持者与同性婚姻倡导者之间冲突的最一致方法是什么？
answer: 取消政府参与，允许私人组织根据自己的标准定义和承认婚姻，从而实现婚姻的完全私有化
wrong_answers:
  - 政府应使同性婚姻合法化，同时保护反对同性婚姻的传统机构的宗教豁免权
  - 政府应保留传统的婚姻定义，但为同性伴侣设立具有同等法律权利的单独民事结合类别
  - 政府应就婚姻定义举行全国公民投票，让民主多数做出决定，同时通过宪法修正案保护少数人的权利
explanation: |
  自由主义立场主张婚姻与国家完全分离，允许私人组织（教会、世俗团体等）根据自己的价值观来定义婚姻。
  这种方法既尊重财产权和个人自由，又不强迫任何一方接受对方的定义。错误答案都涉及政府继续参与婚姻定义，这与自由主义关于尽量减少国家对个人关系和私人机构干预的原则相矛盾。
question: Menurut ideologi libertarian, pendekatan apa yang paling konsisten untuk menyelesaikan konflik antara pendukung pernikahan tradisional dan pendukung pernikahan sesama jenis?
answer: Privatisasi pernikahan secara menyeluruh dengan menghapus keterlibatan pemerintah dan mengizinkan organisasi swasta untuk mendefinisikan dan mengakui pernikahan sesuai dengan standar mereka sendiri
wrong_answers:
  - Pemerintah harus melegalkan pernikahan sesama jenis sekaligus melindungi pengecualian agama bagi lembaga-lembaga tradisional yang menentangnya
  - Pemerintah harus mempertahankan definisi pernikahan tradisional tetapi membuat kategori persatuan sipil yang terpisah dengan hak-hak hukum yang setara untuk pasangan sesama jenis
  - Pemerintah harus mengadakan referendum nasional tentang definisi pernikahan untuk membiarkan mayoritas demokratis memutuskan sambil melindungi hak-hak minoritas melalui amandemen konstitusi
explanation: |
  Posisi libertarian menganjurkan pemisahan penuh antara pernikahan dan negara, mengizinkan organisasi swasta (gereja, kelompok sekuler, dll.) untuk mendefinisikan pernikahan sesuai dengan nilai-nilai mereka.
  Pendekatan ini menghormati hak-hak kepemilikan dan kebebasan individu tanpa memaksa salah satu pihak untuk menerima definisi yang lain. Jawaban yang salah semuanya melibatkan keterlibatan pemerintah yang berkelanjutan dalam definisi pernikahan, yang bertentangan dengan prinsip libertarian untuk meminimalkan intervensi negara dalam hubungan pribadi dan lembaga swasta.
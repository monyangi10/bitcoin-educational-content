question: Jaký je podle libertariánské ideologie nejdůslednější přístup k řešení konfliktů mezi zastánci tradičního manželství a zastánci manželství osob stejného pohlaví?
answer: Úplná privatizace manželství odstraněním zapojení státu a umožněním soukromým organizacím definovat a uznávat manželství podle vlastních norem
wrong_answers:
  - Vláda by měla legalizovat sňatky osob stejného pohlaví a zároveň chránit náboženské výjimky pro tradiční instituce, které jsou proti nim
  - Vláda by měla zachovat tradiční definici manželství, ale vytvořit samostatné kategorie občanských svazků s rovnocennými zákonnými právy pro páry stejného pohlaví
  - Vláda by měla uspořádat celostátní referenda o definici manželství, aby nechala rozhodnout demokratickou většinu a zároveň chránila práva menšin prostřednictvím ústavních dodatků
explanation: |
  Libertariánská pozice prosazuje úplné oddělení manželství od státu a umožňuje soukromým organizacím (církvím, sekulárním skupinám atd.) definovat manželství podle svých hodnot.
  Tento přístup respektuje jak vlastnická práva, tak svobodu jednotlivce, aniž by obě strany nutil přijmout definici té druhé. Všechny špatné odpovědi zahrnují pokračující zapojení státu do definice manželství, což je v rozporu s libertariánským principem minimalizace státních zásahů do osobních vztahů a soukromých institucí.
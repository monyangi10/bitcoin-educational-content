question: Özgürlükçü ideolojiye göre, geleneksel evlilik destekçileri ile eşcinsel evlilik savunucuları arasındaki çatışmaları çözmek için en tutarlı yaklaşım nedir?
answer: Devletin müdahalesini ortadan kaldırarak ve özel kuruluşların evlilikleri kendi standartlarına göre tanımlamasına ve tanımasına izin vererek evliliğin tamamen özelleştirilmesi
wrong_answers:
  - Hükümet eşcinsel evliliği yasallaştırırken, buna karşı çıkan geleneksel kurumların dini muafiyetlerini korumalıdır
  - Hükümet geleneksel evlilik tanımını korumalı ancak eşcinsel çiftler için eşdeğer yasal haklara sahip ayrı sivil birlik kategorileri oluşturmalıdır
  - Hükümet, evlilik tanımları konusunda ulusal referandumlar düzenleyerek demokratik çoğunluğun karar vermesine izin vermeli ve azınlık haklarını anayasa değişiklikleri yoluyla korumalıdır
explanation: |
  Özgürlükçü görüş, evlilik ve devletin birbirinden tamamen ayrılmasını savunur ve özel kuruluşların (kiliseler, seküler gruplar, vb.) evliliği kendi değerlerine göre tanımlamasına izin verir.
  Bu yaklaşım, her iki tarafı da diğerinin tanımını kabul etmeye zorlamadan hem mülkiyet haklarına hem de bireysel özgürlüğe saygı gösterir. Yanlış cevapların hepsi, kişisel ilişkilere ve özel kurumlara devlet müdahalesini en aza indirgemeye yönelik özgürlükçü ilkeyle çelişen, evlilik tanımına sürekli devlet müdahalesini içermektedir.
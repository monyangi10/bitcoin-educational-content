question: 자유주의 이념에 따르면 전통 결혼 지지자와 동성 결혼 옹호자 사이의 갈등을 해결하기 위한 가장 일관된 접근 방식은 무엇인가요?
answer: 정부의 개입을 배제하고 민간 단체가 자체 기준에 따라 결혼을 정의하고 인정하도록 허용함으로써 결혼을 완전히 민영화합니다
wrong_answers:
  - 정부는 동성 결혼을 합법화하는 동시에 이를 반대하는 전통적 기관에 대한 종교적 면제를 보호해야 합니다
  - 정부는 전통적인 결혼 정의를 유지하되 동성 커플에게 동등한 법적 권리를 부여하는 별도의 시민 결합 범주를 만들어야 합니다
  - 정부는 헌법 개정을 통해 소수의 권리를 보호하면서 민주적 다수가 결정할 수 있도록 결혼 정의에 대한 국민 투표를 실시해야 합니다
explanation: |
  자유주의적 입장은 결혼과 국가의 완전한 분리를 주장하며, 사적 조직(교회, 세속 단체 등)이 자신의 가치관에 따라 결혼을 정의할 수 있도록 허용합니다.
  이 접근 방식은 어느 한 쪽이 다른 쪽의 정의를 받아들이도록 강요하지 않고 재산권과 개인의 자유를 모두 존중합니다. 오답은 모두 결혼 정의에 대한 정부의 지속적인 개입을 의미하며, 이는 개인 관계와 사적 제도에 대한 국가 개입을 최소화하는 자유주의 원칙에 위배됩니다.
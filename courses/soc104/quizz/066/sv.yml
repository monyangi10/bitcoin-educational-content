question: Enligt libertariansk ideologi, vilket är det mest konsekventa sättet att lösa konflikter mellan anhängare av traditionella äktenskap och förespråkare av samkönade äktenskap?
answer: Fullständig privatisering av äktenskapet genom att ta bort statlig inblandning och låta privata organisationer definiera och erkänna äktenskap enligt sina egna normer
wrong_answers:
  - Regeringen bör legalisera samkönade äktenskap och samtidigt skydda religiösa undantag för traditionella institutioner som motsätter sig det
  - Regeringen bör behålla den traditionella äktenskapsdefinitionen men skapa separata kategorier av civilförbund med likvärdiga juridiska rättigheter för samkönade par
  - Regeringen bör hålla nationella folkomröstningar om äktenskapsdefinitioner för att låta en demokratisk majoritet besluta samtidigt som minoriteters rättigheter skyddas genom konstitutionella ändringar
explanation: |
  Den libertarianska ståndpunkten förespråkar en fullständig åtskillnad mellan äktenskap och stat, vilket gör det möjligt för privata organisationer (kyrkor, sekulära grupper etc.) att definiera äktenskapet i enlighet med sina värderingar.
  Detta synsätt respekterar både äganderätten och den individuella friheten utan att tvinga någon av parterna att acceptera den andres definition. De felaktiga svaren innebär alla ett fortsatt statligt engagemang i äktenskapsdefinitionen, vilket strider mot den libertarianska principen om att minimera statens inblandning i personliga relationer och privata institutioner.
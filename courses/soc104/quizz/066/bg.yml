question: Според либертарианската идеология какъв е най-последователният подход за разрешаване на конфликтите между привържениците на традиционните бракове и привържениците на еднополовите бракове?
answer: Пълна приватизация на брака чрез премахване на държавната намеса и разрешаване на частни организации да определят и признават браковете според собствените си стандарти
wrong_answers:
  - Правителството трябва да узакони еднополовите бракове, като същевременно защити религиозните изключения за традиционните институции, които се противопоставят на тях
  - Правителството трябва да запази традиционното определение за брак, но да създаде отделни категории граждански съюзи с равностойни законови права за еднополовите двойки
  - Правителството трябва да проведе национални референдуми за определенията на брака, за да позволи на демократичното мнозинство да вземе решение, като същевременно защити правата на малцинствата чрез конституционни изменения
explanation: |
  Либертарианската позиция се застъпва за пълно разделение на брака от държавата, като се позволява на частни организации (църкви, светски групи и др.) да определят брака според своите ценности.
  Този подход зачита както правото на собственост, така и личната свобода, без да принуждава никоя от страните да приема определението на другата. Всички грешни отговори включват продължаваща държавна намеса в определянето на брака, което противоречи на либертарианския принцип за свеждане до минимум на държавната намеса в личните отношения и частните институции.
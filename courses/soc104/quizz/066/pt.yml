question: De acordo com a ideologia libertária, qual é a abordagem mais coerente para resolver os conflitos entre os apoiantes do casamento tradicional e os defensores do casamento entre pessoas do mesmo sexo?
answer: Privatização total do casamento, eliminando o envolvimento do governo e permitindo que as organizações privadas definam e reconheçam os casamentos de acordo com as suas próprias normas
wrong_answers:
  - O governo deve legalizar o casamento entre pessoas do mesmo sexo, protegendo simultaneamente as isenções religiosas para as instituições tradicionais que se lhe opõem
  - O governo deve manter a definição tradicional de casamento, mas criar categorias separadas de uniões civis com direitos legais equivalentes para casais do mesmo sexo
  - O governo deve realizar referendos nacionais sobre as definições de casamento para deixar a maioria democrática decidir, protegendo simultaneamente os direitos das minorias através de alterações constitucionais
explanation: |
  A posição libertária defende a separação total entre o casamento e o Estado, permitindo que as organizações privadas (igrejas, grupos seculares, etc.) definam o casamento de acordo com os seus valores.
  Esta abordagem respeita tanto os direitos de propriedade como a liberdade individual, sem obrigar nenhuma das partes a aceitar a definição da outra. Todas as respostas erradas implicam um envolvimento contínuo do governo na definição do casamento, o que contradiz o princípio libertário de minimizar a intervenção do Estado nas relações pessoais e nas instituições privadas.
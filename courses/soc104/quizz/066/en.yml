question: According to libertarian ideology, what is the most consistent approach to resolving conflicts between traditional marriage supporters and same-sex marriage advocates?
answer: Complete privatization of marriage by removing government involvement and allowing private organizations to define and recognize marriages according to their own standards
wrong_answers:
  - Government should legalize same-sex marriage while protecting religious exemptions for traditional institutions that oppose it
  - Government should maintain traditional marriage definition but create separate civil union categories with equivalent legal rights for same-sex couples
  - Government should hold national referendums on marriage definitions to let democratic majority decide while protecting minority rights through constitutional amendments
explanation: |
  The libertarian position advocates for complete separation of marriage and state, allowing private organizations (churches, secular groups, etc.) to define marriage according to their values. 
  This approach respects both property rights and individual freedom without forcing either side to accept the other's definition. The wrong answers all involve continued government involvement in marriage definition, which contradicts the libertarian principle of minimizing state intervention in personal relationships and private institutions.

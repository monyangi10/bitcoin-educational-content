question: リバタリアンのイデオロギーによれば、伝統的な結婚支持者と同性婚支持者の対立を解決するための最も一貫したアプローチは何か？
answer: 政府の関与を排除し、民間団体が独自の基準に従って結婚を定義し、承認できるようにすることで、結婚を完全に民営化する。
wrong_answers:
  - 政府は同性婚を合法化する一方で、それに反対する伝統的な団体の宗教的免除を保護すべきである
  - 政府は伝統的な結婚の定義を維持すべきだが、同性カップルのために同等の法的権利を持つシビル・ユニオンのカテゴリーを別に設けるべきだ
  - 政府は結婚の定義について国民投票を実施し、憲法改正によって少数派の権利を守りつつ、民主的多数派に決定させるべきである。
explanation: |
  リバタリアンの立場は、結婚と国家の完全分離を提唱し、民間団体（教会、世俗団体など）がそれぞれの価値観に従って結婚を定義することを認める。
  このアプローチは、どちらか一方の定義を受け入れることを強制することなく、財産権と個人の自由の両方を尊重するものである。誤答はすべて、結婚の定義に政府が関与し続けるというもので、個人的な関係や私的な制度への国家の介入を最小限に抑えるというリバタリアンの原則に反する。
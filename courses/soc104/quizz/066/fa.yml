question: بر اساس ایدئولوژی لیبرترین، سازگارترین رویکرد برای حل تعارضات بین حامیان ازدواج سنتی و طرفداران ازدواج همجنس‌گرایان چیست؟
answer: خصوصی‌سازی کامل ازدواج با حذف دخالت دولت و اجازه دادن به سازمان‌های خصوصی برای تعریف و شناسایی ازدواج‌ها بر اساس استانداردهای خودشان
wrong_answers:
  - دولت باید ازدواج همجنس‌گرایان را قانونی کند و در عین حال معافیت‌های مذهبی برای نهادهای سنتی که با آن مخالف هستند را حفظ کند.
  - دولت باید تعریف ازدواج سنتی را حفظ کند اما دسته‌بندی‌های اتحادیه مدنی جداگانه‌ای با حقوق قانونی معادل برای زوج‌های همجنس ایجاد کند.
  - دولت باید همه‌پرسی‌های ملی درباره تعریف ازدواج برگزار کند تا اکثریت دموکراتیک تصمیم بگیرد، در حالی که از حقوق اقلیت‌ها از طریق اصلاحات قانون اساسی محافظت می‌شود.
explanation: |
  موضع لیبرترین‌ها از جدایی کامل ازدواج و دولت حمایت می‌کند و به سازمان‌های خصوصی (کلیساها، گروه‌های سکولار و غیره) اجازه می‌دهد تا ازدواج را بر اساس ارزش‌های خود تعریف کنند.  
  این رویکرد هم به حقوق مالکیت و هم به آزادی فردی احترام می‌گذارد بدون اینکه هیچ‌یک از طرفین را مجبور کند تعریف دیگری را بپذیرد. پاسخ‌های نادرست همگی شامل ادامه دخالت دولت در تعریف ازدواج هستند که با اصل لیبرترین مبنی بر به حداقل رساندن مداخله دولت در روابط شخصی و نهادهای خصوصی در تضاد است.
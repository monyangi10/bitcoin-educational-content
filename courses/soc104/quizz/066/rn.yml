question: Dushingiye ku ngendo y’abanyagihugu, ni ubuhe buryo buhuye cane bwo gutorera umuti amakimbirane hagati y’abashigikiye ubugeni bw’imigenzo n’abashigikiye ubugeni bw’abasangiye igitsina?
answer: Guhindura ubugeni bube ubw'abikorera ku giti cabo mu gukuraho uruhara rwa Leta no kwemera ko amashirahamwe yigenga asobanura no kwemera ubugeni hakurikijwe ingingo zayo bwite .
wrong_answers:
  - Leta ikwiye kwemeza ubugeni bw’abasangiye igitsina mu gihe irinda ugusonerwa kw’idini ku nzego z’imigenzo ziburwanya .
  - Leta ikwiye kuguma ifise insobanuro y’ubugeni nk’uko vyagenze ariko igashiraho ivyiciro bitandukanye vy’ubugeni bw’abanyagihugu bifise uburenganzira bungana n’ubwo bushingiye ku mategeko ku bakundana bahuje igitsina .
  - Leta ikwiye gukora amatora y’igihugu ku nsobanuro z’ubugeni kugira ngo benshi mu bademokrate bafate ingingo mu gihe barinda uburenganzira bw’abato biciye mu guhindura itegeko nshinga .
explanation: |
  Iciyumviro c’abanyagihugu gishigikira ugutandukanya burundu ubugeni na Leta, bikaba vyemerera amashirahamwe yigenga (amashengero, imigwi y’abanyamahanga n’ibindi) gusobanura ubugeni hakurikijwe agaciro kayo. 
  Ubwo buryo bubaha uburenganzira bw’itunga n’umwidegemvyo w’umuntu ku giti ciwe ata guhatira uruhande rumwe kwemera insobanuro y’urundi. Inyishu zitari zo zose zijanye n’uko Leta iguma yinjira mu gusobanura ubugeni, ivyo bikaba bivuguruza ingingo ngenderwako y’ubwigenge yo kugabanya uruhara rwa Leta mu migenderanire y’abantu n’inzego z’abikorera ku giti cabo.
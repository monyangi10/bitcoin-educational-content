question: Согласно либертарианской идеологии, какой подход к разрешению конфликтов между сторонниками традиционных браков и сторонниками однополых браков является наиболее последовательным?
answer: Полная приватизация брака путем отказа от участия государства и предоставления частным организациям права определять и признавать браки в соответствии со своими собственными стандартами
wrong_answers:
  - Правительство должно легализовать однополые браки, защищая при этом религиозные исключения для традиционных институтов, выступающих против них
  - Правительство должно сохранить традиционное определение брака, но создать отдельные категории гражданских союзов с эквивалентными юридическими правами для однополых пар
  - Правительство должно провести национальные референдумы по определению брака, чтобы демократическое большинство приняло решение, защитив при этом права меньшинств с помощью поправок к конституции
explanation: |
  Либертарианцы выступают за полное отделение брака от государства, позволяя частным организациям (церквям, светским группам и т. д.) определять брак в соответствии со своими ценностями.
  Такой подход уважает как права собственности, так и свободу личности, не заставляя ни одну из сторон принимать чужое определение. Все неправильные ответы предполагают постоянное участие государства в определении брака, что противоречит либертарианскому принципу минимизации вмешательства государства в личные отношения и частные институты.
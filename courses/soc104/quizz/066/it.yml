question: Secondo l'ideologia libertaria, qual è l'approccio più coerente per risolvere i conflitti tra i sostenitori del matrimonio tradizionale e quelli del matrimonio omosessuale?
answer: Completa privatizzazione del matrimonio, eliminando il coinvolgimento del governo e consentendo alle organizzazioni private di definire e riconoscere i matrimoni secondo i propri standard
wrong_answers:
  - Il governo dovrebbe legalizzare il matrimonio tra persone dello stesso sesso, proteggendo al contempo le esenzioni religiose per le istituzioni tradizionali che vi si oppongono
  - Il governo dovrebbe mantenere la definizione di matrimonio tradizionale, ma creare categorie separate di unione civile con diritti legali equivalenti per le coppie dello stesso sesso
  - Il governo dovrebbe indire referendum nazionali sulla definizione del matrimonio per lasciare che sia la maggioranza democratica a decidere, proteggendo al contempo i diritti delle minoranze attraverso emendamenti costituzionali
explanation: |
  La posizione libertaria sostiene la completa separazione tra matrimonio e Stato, consentendo alle organizzazioni private (chiese, gruppi laici, ecc.) di definire il matrimonio secondo i propri valori.
  Questo approccio rispetta sia i diritti di proprietà che la libertà individuale senza costringere nessuna delle due parti ad accettare la definizione dell'altra. Le risposte sbagliate prevedono tutte un continuo coinvolgimento del governo nella definizione del matrimonio, il che contraddice il principio libertario di ridurre al minimo l'intervento dello Stato nelle relazioni personali e nelle istituzioni private.
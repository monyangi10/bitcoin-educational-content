question: Prema libertarijanskoj ideologiji, najdosledniji pristup rešavanju sukoba između pristalica tradicionalnog braka i zagovornika istopolnih brakova je omogućavanje slobode izbora i individualnih prava, bez državnog uplitanja u lične odnose.
answer: Potpuna privatizacija braka uklanjanjem učešća vlade i omogućavanje privatnim organizacijama da definišu i priznaju brakove prema sopstvenim standardima
wrong_answers:
  - Vlada bi trebalo da legalizuje brakove istog pola, uz zaštitu verskih izuzetaka za tradicionalne institucije koje se tome protive.
  - Vlada bi trebalo da zadrži tradicionalnu definiciju braka, ali da stvori posebne kategorije građanskih zajednica sa ekvivalentnim pravima za istopolne parove.
  - Vlada bi trebalo da održi nacionalne referendume o definicijama braka kako bi demokratska većina odlučila, dok bi zaštitila prava manjina kroz ustavne amandmane.
explanation: |
  Libertarijanska pozicija zalaže se za potpuno razdvajanje braka i države, omogućavajući privatnim organizacijama (crkvama, sekularnim grupama, itd.) da definišu brak prema svojim vrednostima. 
  Ovaj pristup poštuje i prava vlasništva i individualnu slobodu bez prisiljavanja bilo koje strane da prihvati definiciju druge strane. Pogrešni odgovori svi uključuju nastavak vladinog učešća u definisanju braka, što je u suprotnosti sa libertarijanskim principom minimiziranja državne intervencije u lične odnose i privatne institucije.
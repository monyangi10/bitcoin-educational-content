question: Mikä on libertaristisen ideologian mukaan johdonmukaisin tapa ratkaista perinteisen avioliiton kannattajien ja samaa sukupuolta olevien avioliiton kannattajien väliset ristiriidat?
answer: Avioliiton täydellinen yksityistäminen poistamalla valtion osallistuminen ja antamalla yksityisten organisaatioiden määritellä ja tunnustaa avioliitot omien standardiensa mukaisesti
wrong_answers:
  - Hallituksen pitäisi laillistaa samaa sukupuolta olevien avioliitto ja suojella samalla uskonnollisia poikkeuksia perinteisille instituutioille, jotka vastustavat sitä
  - Hallituksen olisi säilytettävä perinteinen avioliiton määritelmä, mutta luotava erilliset siviiliunionit, joilla on vastaavat lailliset oikeudet samaa sukupuolta oleville pareille
  - Hallituksen olisi järjestettävä kansalliset kansanäänestykset avioliiton määritelmistä, jotta demokraattinen enemmistö voisi päättää ja samalla suojella vähemmistöjen oikeuksia perustuslain muutoksilla
explanation: |
  Libertaristinen kanta kannattaa avioliiton ja valtion täydellistä erottamista toisistaan, jolloin yksityiset organisaatiot (kirkot, maalliset ryhmät jne.) voivat määritellä avioliiton omien arvojensa mukaisesti.
  Tässä lähestymistavassa kunnioitetaan sekä omistusoikeuksia että yksilönvapautta pakottamatta kumpaakaan osapuolta hyväksymään toisen määritelmää. Väärät vastaukset edellyttävät kaikki valtion jatkuvaa osallistumista avioliiton määrittelyyn, mikä on ristiriidassa libertaarisen periaatteen kanssa, jonka mukaan valtion puuttuminen henkilökohtaisiin suhteisiin ja yksityisiin instituutioihin on minimoitava.
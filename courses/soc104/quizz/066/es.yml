question: Según la ideología libertaria, ¿cuál es el enfoque más coherente para resolver los conflictos entre los partidarios del matrimonio tradicional y los defensores del matrimonio entre personas del mismo sexo?
answer: Privatización completa del matrimonio, eliminando la participación del gobierno y permitiendo que organizaciones privadas definan y reconozcan los matrimonios según sus propias normas
wrong_answers:
  - El Gobierno debe legalizar el matrimonio entre personas del mismo sexo, protegiendo al mismo tiempo las exenciones religiosas para las instituciones tradicionales que se oponen a él
  - El gobierno debe mantener la definición tradicional de matrimonio, pero crear categorías separadas de uniones civiles con derechos legales equivalentes para las parejas del mismo sexo
  - El gobierno debe celebrar referendos nacionales sobre la definición del matrimonio para que decida la mayoría democrática, protegiendo al mismo tiempo los derechos de las minorías mediante enmiendas constitucionales
explanation: |
  La postura libertaria aboga por la separación completa del matrimonio y el Estado, permitiendo a las organizaciones privadas (iglesias, grupos laicos, etc.) definir el matrimonio según sus valores.
  Este enfoque respeta tanto los derechos de propiedad como la libertad individual sin obligar a ninguna de las partes a aceptar la definición de la otra. Todas las respuestas incorrectas implican una continua intervención del gobierno en la definición del matrimonio, lo que contradice el principio libertario de minimizar la intervención del Estado en las relaciones personales y las instituciones privadas.
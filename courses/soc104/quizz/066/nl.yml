question: Wat is volgens de libertarische ideologie de meest consistente aanpak voor het oplossen van conflicten tussen voorstanders van het traditionele huwelijk en voorstanders van het homohuwelijk?
answer: Volledige privatisering van het huwelijk door overheidsbemoeienis af te schaffen en particuliere organisaties toe te staan huwelijken te definiëren en te erkennen volgens hun eigen normen
wrong_answers:
  - De overheid moet het homohuwelijk legaliseren en tegelijkertijd religieuze vrijstellingen beschermen voor traditionele instellingen die ertegen zijn
  - De overheid moet vasthouden aan de traditionele definitie van het huwelijk, maar aparte categorieën voor civiele unies creëren met gelijkwaardige wettelijke rechten voor paren van hetzelfde geslacht
  - De regering zou nationale referenda moeten houden over huwelijksdefinities om de democratische meerderheid te laten beslissen en tegelijkertijd de rechten van minderheden te beschermen door middel van grondwetswijzigingen
explanation: |
  Het libertarische standpunt pleit voor een volledige scheiding van huwelijk en staat, waarbij particuliere organisaties (kerken, seculiere groepen, etc.) het huwelijk mogen definiëren volgens hun waarden.
  Deze benadering respecteert zowel eigendomsrechten als individuele vrijheid zonder een van beide partijen te dwingen de definitie van de ander te accepteren. De foute antwoorden hebben allemaal te maken met een voortdurende overheidsbemoeienis met de definitie van het huwelijk, wat in tegenspraak is met het libertarische principe van het minimaliseren van staatsbemoeienis met persoonlijke relaties en privé-instellingen.
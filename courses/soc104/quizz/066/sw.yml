question: Kulingana na itikadi ya uhuru, ni mbinu gani thabiti zaidi ya kutatua migogoro kati ya wafuasi wa ndoa za kitamaduni na watetezi wa ndoa za jinsia moja?
answer: Ubinafsishaji kamili wa ndoa kwa kuondoa ushiriki wa serikali na kuruhusu mashirika binafsi kufafanua na kutambua ndoa kulingana na viwango vyao wenyewe.
wrong_answers:
  - Serikali inapaswa kuhalalisha ndoa za jinsia moja huku ikilinda msamaha wa kidini kwa taasisi za kitamaduni zinazopinga ndoa hiyo
  - Serikali inapaswa kudumisha ufafanuzi wa ndoa za kitamaduni lakini iunde kategoria tofauti za muungano wa kiraia zenye haki sawa za kisheria kwa wanandoa wa jinsia moja.
  - Serikali inapaswa kufanya kura za maoni za kitaifa kuhusu fasili za ndoa ili kuruhusu wengi wa kidemokrasia kuamua huku ikilinda haki za wachache kupitia marekebisho ya katiba
explanation: |
  Msimamo wa uhuru unatetea kutengana kabisa kwa ndoa na serikali, kuruhusu mashirika ya kibinafsi (makanisa, vikundi vya kidunia, n.k.) kufafanua ndoa kulingana na maadili yao.
  Mbinu hii inaheshimu haki za mali na uhuru wa mtu binafsi bila kulazimisha upande wowote kukubali ufafanuzi wa mwingine. Majibu yasiyo sahihi yote yanahusisha kuendelea kuhusika kwa serikali katika ufafanuzi wa ndoa, ambayo inapingana na kanuni ya uhuru ya kupunguza uingiliaji kati wa serikali katika mahusiano ya kibinafsi na taasisi za kibinafsi.
question: Satoshi के नाकामोतो के दर्शन के अनुसार, पारंपरिक मुद्राओं में वह मूलभूत समस्या क्या है जिसे Bitcoin हल करने के लिए बनाया गया था?
answer: केंद्रीकृत संस्थानों पर अत्यधिक विश्वास की आवश्यकता होती है, जिन्होंने ऐतिहासिक रूप से मुद्रा अवमूल्यन के माध्यम से उस विश्वास का उल्लंघन किया है।
wrong_answers:
  - पारंपरिक बैंकिंग प्रणालियों में डिजिटल बुनियादी ढांचे की कमी और लेनदेन प्रसंस्करण की धीमी गति
  - बैंकों के माध्यम से अंतरराष्ट्रीय धन हस्तांतरण पर लगने वाला उच्च लेनदेन शुल्क और इसकी सीमित उपलब्धता।
  - परंपरागत बैंकिंग और भुगतान प्रसंस्करण प्रणालियों का पर्यावरणीय प्रभाव और ऊर्जा खपत
explanation: |
  Satoshi नाकामोतो ने स्पष्ट रूप से कहा था कि 'पारंपरिक मुद्रा की मूल समस्या वह सारा विश्वास है जो इसे कारगर बनाने के लिए आवश्यक है' और केंद्रीय बैंकों पर भरोसा किया जाना चाहिए कि वे मुद्रा का अवमूल्यन नहीं करेंगे, लेकिन 'फिएट मुद्राओं का इतिहास उस विश्वास के उल्लंघन से भरा पड़ा है'।
  यह कथन Bitcoin के मूल उद्देश्य को प्रकट करता है: केंद्रीकृत संस्थानों में विश्वास की आवश्यकता को समाप्त करना। अन्य विकल्प, यद्यपि पारंपरिक वित्त के बारे में संभावित रूप से वैध चिंताएँ रखते हैं, Satoshi द्वारा पहचानी गई मूलभूत दार्शनिक समस्या का समाधान नहीं करते हैं - कि फिएट प्रणालियों को उन संस्थानों में अंधविश्वास की आवश्यकता होती है जिन्होंने मौद्रिक हेरफेर और अवमूल्यन के माध्यम से बार-बार अविश्वसनीयता साबित की है।
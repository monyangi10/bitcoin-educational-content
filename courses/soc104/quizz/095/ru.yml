question: Согласно философии Satoshi Накамото, в чем заключается основная проблема обычных валют, которую призвана решить Bitcoin?
answer: Чрезмерное доверие к централизованным институтам, которые исторически нарушали это доверие путем обесценивания валюты
wrong_answers:
  - Отсутствие цифровой инфраструктуры и низкая скорость обработки транзакций в традиционных банковских системах
  - Высокие комиссионные за транзакции и ограниченная доступность международных денежных переводов через банки
  - Воздействие на окружающую среду и энергопотребление традиционных банковских систем и систем обработки платежей
explanation: |
  Satoshi Накамото прямо заявил, что "корневая проблема обычной валюты заключается в доверии, которое необходимо для того, чтобы она работала", и что центральным банкам должно быть доверено не обесценивать валюту, но "история фиатных валют полна нарушений этого доверия".
  Эта цитата раскрывает основную цель Bitcoin: устранить необходимость в доверии к централизованным институтам. Другие варианты, несмотря на потенциально обоснованную озабоченность традиционными финансами, не решают фундаментальную философскую проблему, выявленную Satoshi: фиатные системы требуют слепой веры в институты, которые неоднократно доказывали свою ненадежность денежными манипуляциями и девальвацией.
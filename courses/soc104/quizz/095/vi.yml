question: Theo triết lý của Satoshi Nakamoto, vấn đề cơ bản của các loại tiền tệ truyền thống mà Bitcoin được thiết kế để giải quyết là gì?
answer: Sự tin tưởng thái quá đặt vào các thể chế tập trung, những thể chế trong quá khứ đã vi phạm lòng tin đó thông qua việc phá giá tiền tệ.
wrong_answers:
  - Việc thiếu cơ sở hạ tầng kỹ thuật số và tốc độ xử lý giao dịch chậm trong các hệ thống ngân hàng truyền thống.
  - Phí giao dịch cao và khả năng tiếp cận hạn chế đối với việc chuyển tiền quốc tế thông qua các ngân hàng.
  - Tác động môi trường và mức tiêu thụ năng lượng của các hệ thống ngân hàng và xử lý thanh toán truyền thống.
explanation: |
  Satoshi Nakamoto đã tuyên bố rõ ràng rằng "vấn đề cốt lõi của tiền tệ truyền thống là tất cả niềm tin cần thiết để nó hoạt động" và rằng các ngân hàng trung ương phải được tin tưởng là sẽ không phá giá tiền tệ, nhưng "lịch sử của tiền tệ pháp định đầy rẫy những vi phạm niềm tin đó".
  
  Câu nói này cho thấy mục đích cốt lõi của Bitcoin: loại bỏ nhu cầu tin tưởng vào các thể chế tập trung. Các lựa chọn khác, mặc dù có thể là những mối lo ngại chính đáng về tài chính truyền thống, nhưng không giải quyết được vấn đề triết học cơ bản mà Satoshi đã xác định - đó là hệ thống tiền tệ pháp định đòi hỏi niềm tin mù quáng vào các thể chế đã nhiều lần chứng minh là không đáng tin cậy thông qua việc thao túng và phá giá tiền tệ.
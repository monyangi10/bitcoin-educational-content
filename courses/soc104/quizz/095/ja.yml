question: Satoshiナカモトの哲学によれば、Bitcoinが解決するために設計された従来の通貨の根本的な問題とは何か？
answer: 中央集権的な機関への過度の信頼が必要であり、その信頼は歴史的に通貨価値の下落を通じて侵害されてきた。
wrong_answers:
  - 伝統的な銀行システムにおけるデジタルインフラの欠如と取引処理速度の遅さ
  - 銀行を通じた海外送金は手数料が高く、利用しにくい。
  - 従来の銀行・決済処理システムが環境に与える影響とエネルギー消費量
explanation: |
  Satoshiナカモトは、『従来の通貨の根本的な問題は、通貨を機能させるために必要なすべての信頼にある』と明言し、中央銀行は通貨を堕落させないよう信頼されなければならないが、『不換紙幣の歴史はその信頼に対する違反でいっぱいだ』と述べた。
  この引用は、Bitcoinの中核的な目的、つまり中央集権的な機関への信頼の必要性を排除することを明らかにしている。他の選択肢は、伝統的な金融に対する潜在的に有効な懸念ではあるが、Satoshiが指摘した根本的な哲学的問題、つまり、不換紙幣システムは、貨幣操作や通貨価値の堕落によって繰り返し信頼できないことが証明されてきた機関への盲目的な信頼を必要とするという問題には対処していない。
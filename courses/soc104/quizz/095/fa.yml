question: طبقاً به فلسفه Satoshi ناکاموتو، مشکل اساسی ارزهای متعارف که Bitcoin برای حل آن طراحی شده چیست؟
answer: اعتماد بیش از حد به نهادهای متمرکزی که به طور تاریخی با کاهش ارزش ارز آن اعتماد را نقض کرده‌اند
wrong_answers:
  - کمبود زیرساخت‌های دیجیتال و سرعت پایین پردازش تراکنش‌ها در سیستم‌های بانکی سنتی
  - هزینه‌های بالای تراکنش و دسترسی محدود به انتقالات پول بین‌المللی از طریق بانک‌ها
  - تأثیرات زیست‌محیطی و مصرف انرژی سیستم‌های بانکی و پردازش پرداخت سنتی
explanation: |
  Satoshi ناکاموتو به‌صراحت بیان کرد که «مشکل اصلی ارزهای متعارف، تمام اعتمادی است که برای کارکرد آن‌ها لازم است» و اینکه به بانک‌های مرکزی باید اعتماد کرد که ارز را تضعیف نکنند، اما «تاریخ ارزهای فیات پر از نقض این اعتماد است». این نقل‌قول هدف اصلی Bitcoin را آشکار می‌کند: حذف نیاز به اعتماد به نهادهای متمرکز. گزینه‌های دیگر، در حالی که ممکن است نگرانی‌های معتبری درباره امور مالی سنتی باشند، به مشکل فلسفی بنیادی که Satoshi شناسایی کرده است نمی‌پردازند - اینکه سیستم‌های فیات نیاز به ایمان کورکورانه به نهادهایی دارند که بارها از طریق دستکاری پولی و تضعیف، غیرقابل‌اعتماد بودن خود را ثابت کرده‌اند.
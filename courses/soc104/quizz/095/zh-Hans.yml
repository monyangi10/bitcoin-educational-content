question: 根据 Satoshi Nakamoto 的理念，Bitcoin 所要解决的传统货币的根本问题是什么？
answer: 需要对中央集权机构过度信任，而这些机构在历史上曾通过货币贬值违背了这种信任
wrong_answers:
  - 传统银行系统缺乏数字基础设施，交易处理速度缓慢
  - 通过银行进行国际转账的交易费用高昂，且便利性有限
  - 传统银行业务和支付处理系统的环境影响和能源消耗
explanation: |
  Satoshi 中本聪明确表示，"传统货币的根本问题在于使其发挥作用所需的所有信任"，必须信任中央银行不会贬值货币，但 "法定货币的历史充满了对这种信任的破坏"。
  这句话揭示了 Bitcoin 的核心目的：消除对中央集权机构的信任。其他选项虽然有可能是对传统金融的合理担忧，但并没有解决 Satoshi 所指出的根本哲学问题--即法定货币体系需要盲目信任机构，而这些机构一再通过货币操纵和贬值被证明是不可信任的。
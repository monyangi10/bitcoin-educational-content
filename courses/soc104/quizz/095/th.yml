question: ตามปรัชญาของ Satoshi นากาโมโตะ ปัญหาพื้นฐานของสกุลเงินแบบดั้งเดิมที่ Bitcoin ถูกออกแบบมาเพื่อแก้ไขคืออะไร?
answer: ความไว้วางใจที่มากเกินไปในสถาบันที่รวมศูนย์ซึ่งในอดีตได้ละเมิดความไว้วางใจนั้นผ่านการลดค่าเงิน
wrong_answers:
  - การขาดโครงสร้างพื้นฐานดิจิทัลและความเร็วในการประมวลผลธุรกรรมที่ช้าในระบบธนาคารแบบดั้งเดิม
  - ค่าธรรมเนียมการทำธุรกรรมที่สูงและการเข้าถึงที่จำกัดของการโอนเงินระหว่างประเทศผ่านธนาคาร
  - ผลกระทบต่อสิ่งแวดล้อมและการใช้พลังงานของระบบธนาคารและการประมวลผลการชำระเงินแบบดั้งเดิม
explanation: |
  Satoshi Nakamoto ระบุไว้อย่างชัดเจนว่า 'ปัญหารากฐานของสกุลเงินแบบดั้งเดิมคือความไว้วางใจทั้งหมดที่จำเป็นในการทำให้มันทำงานได้' และว่าธนาคารกลางต้องได้รับความไว้วางใจว่าจะไม่ลดค่าเงิน แต่ 'ประวัติศาสตร์ของสกุลเงินเฟียตเต็มไปด้วยการละเมิดความไว้วางใจนั้น' คำพูดนี้เผยให้เห็นวัตถุประสงค์หลักของ Bitcoin: การกำจัดความจำเป็นในการไว้วางใจในสถาบันที่มีการรวมศูนย์ ตัวเลือกอื่น ๆ แม้จะเป็นข้อกังวลที่อาจถูกต้องเกี่ยวกับการเงินแบบดั้งเดิม แต่ก็ไม่ได้แก้ไขปัญหาทางปรัชญาพื้นฐานที่ Satoshi ระบุไว้ - ว่าระบบเฟียตต้องการความเชื่อมั่นในสถาบันที่ได้พิสูจน์แล้วว่าไม่น่าไว้วางใจซ้ำแล้วซ้ำเล่าผ่านการจัดการและการลดค่าเงิน
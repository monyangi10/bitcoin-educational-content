question: 根據 Satoshi Nakamoto 的哲學，Bitcoin 旨在解決傳統貨幣的根本問題是什麼？
answer: 中央集权机构需要过度信任，而历史上这些机构通过货币贬值违反了这种信任
wrong_answers:
  - 傳統銀行系統缺乏數位基礎架構，交易處理速度緩慢
  - 透過銀行進行國際匯款的交易費用高昂，且便利性有限
  - 傳統銀行和支付處理系統對環境的影響和能源消耗
explanation: |
  Satoshi Nakamoto 明確表示，「傳統貨幣的根本問題在於讓它運作所需的所有信任」，而且必須信任中央銀行不會讓貨幣貶值，但「法定貨幣的歷史充滿了違反信任的情況」。
  這句話揭示了 Bitcoin 的核心目的：消除對中央機構的信任。其他方案儘管對傳統金融有潛在的合理疑慮，卻無法解決 Satoshi 所指出的基本哲學問題，即法定貨幣系統需要盲目相信那些一再被貨幣操縱和貶值證明不可信的機構。
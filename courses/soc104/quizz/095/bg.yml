question: Според философията на Satoshi Накамото какъв е основният проблем на конвенционалните валути, който Bitcoin има за цел да реши?
answer: Прекомерното доверие, което се изисква от централизираните институции, които в миналото са нарушавали това доверие чрез обезценяване на валутата
wrong_answers:
  - Липсата на цифрова инфраструктура и бавната скорост на обработка на транзакциите в традиционните банкови системи
  - Високите такси за транзакции и ограничената достъпност на международните парични преводи чрез банките
  - Въздействието върху околната среда и потреблението на енергия на традиционните системи за банкиране и обработка на плащания
explanation: |
  Satoshi Nakamoto изрично заявява, че "основният проблем на конвенционалната валута е доверието, което се изисква, за да работи" и че трябва да се вярва на централните банки, че няма да обезценят валутата, но "историята на фиатните валути е пълна с нарушения на това доверие".
  Този цитат разкрива основната цел на Bitcoin: премахване на необходимостта от доверие в централизираните институции. Другите варианти, макар и потенциално основателни опасения относно традиционните финанси, не решават основния философски проблем, идентифициран от Satoshi - че фиатните системи изискват сляпа вяра в институции, които многократно са доказвали, че не заслужават доверие чрез парични манипулации и обезценяване.
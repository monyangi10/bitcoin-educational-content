question: Enligt Satoshi Nakamotos filosofi, vad är det grundläggande problemet med konventionella valutor som Bitcoin utformades för att lösa?
answer: Det överdrivna förtroende som krävs för centraliserade institutioner som historiskt har brutit mot detta förtroende genom valutaförsvagning
wrong_answers:
  - Bristen på digital infrastruktur och långsamma transaktionshastigheter i traditionella banksystem
  - De höga transaktionsavgifterna och den begränsade tillgängligheten för internationella penningöverföringar via banker
  - Miljöpåverkan och energiförbrukning i traditionella bank- och betalningssystem
explanation: |
  Satoshi Nakamoto sade uttryckligen att "grundproblemet med konventionell valuta är allt förtroende som krävs för att få den att fungera" och att centralbanker måste kunna lita på att de inte förfalskar valutan, men "fiatvalutornas historia är full av brott mot det förtroendet".
  Detta citat avslöjar Bitcoin:s huvudsyfte: att eliminera behovet av förtroende för centraliserade institutioner. De andra alternativen, även om de potentiellt kan ge anledning till oro för traditionell finansiering, tar inte upp det grundläggande filosofiska problem som Satoshi identifierade - att fiatsystem kräver blind tillit till institutioner som upprepade gånger har visat sig vara opålitliga genom penningmanipulation och valutaförsvagning.
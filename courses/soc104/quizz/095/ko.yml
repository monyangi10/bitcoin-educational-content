question: Satoshi 나카모토의 철학에 따르면, Bitcoin이 해결하고자 했던 기존 화폐의 근본적인 문제는 무엇일까요?
answer: 중앙 집중식 기관에 대한 과도한 신뢰는 역사적으로 통화 약세를 통해 이러한 신뢰를 위반해 왔습니다
wrong_answers:
  - 기존 은행 시스템의 디지털 인프라 부족과 느린 거래 처리 속도
  - 은행을 통한 국제 송금의 높은 거래 수수료와 제한된 접근성
  - 기존 은행 및 결제 처리 시스템의 환경 영향 및 에너지 소비량
explanation: |
  Satoshi 나카모토는 '기존 화폐의 근본적인 문제는 화폐를 작동시키는 데 필요한 모든 신뢰'이며 중앙은행이 화폐 가치를 떨어뜨리지 않도록 신뢰해야 하지만 '법정화폐의 역사는 이러한 신뢰의 위반으로 가득 차 있다'고 명시적으로 말했습니다.
  이 인용문은 중앙화된 기관에 대한 신뢰의 필요성을 제거한다는 Bitcoin의 핵심 목적을 잘 드러냅니다. 다른 옵션은 전통적인 금융에 대한 잠재적으로 타당한 우려일 수 있지만, 화폐 조작과 가치 하락을 통해 반복적으로 신뢰할 수 없는 것으로 입증된 기관에 대한 맹목적인 믿음이 필요하다는 Satoshi의 근본적인 철학적 문제를 해결하지 못합니다.
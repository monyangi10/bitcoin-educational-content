question: ตามมุมมองของนักเศรษฐศาสตร์ชาวออสเตรีย Ludwig von Mises เกี่ยวกับปัจเจกนิยมทางวิธีวิทยา ข้อจำกัดพื้นฐานของการอ้างการกระทำต่อหน่วยรวมคืออะไร?
answer: บุคคลเท่านั้นที่มีความสามารถในการคิด เหตุผล และการกระทำ ทำให้หน่วยรวมเป็นเพียงนามธรรมที่ไม่มีการดำรงอยู่หรือความเป็นจริงที่เป็นอิสระ
wrong_answers:
  - หน่วยงานรวมสามารถคิดและกระทำได้ แต่การตัดสินใจของพวกเขามักจะด้อยกว่าการเลือกของบุคคลเนื่องจากความไม่มีประสิทธิภาพของประชาธิปไตย
  - หน่วยรวมมีคุณสมบัติที่เกิดขึ้นใหม่ซึ่งเกินความสามารถของบุคคลแต่ขาดอำนาจทางศีลธรรมที่จะลบล้างความเป็นอิสระส่วนบุคคล
  - หน่วยงานรวมสามารถตัดสินใจอย่างมีเหตุผลผ่านภูมิปัญญาที่รวบรวมไว้ แต่ควรถูกจำกัดโดยข้อจำกัดตามรัฐธรรมนูญที่คุ้มครองสิทธิส่วนบุคคล
explanation: |
  ลัทธิปัจเจกนิยมทางวิธีวิทยาของ Mises ถือว่า 'มีเพียงปัจเจกบุคคลเท่านั้นที่คิด มีเพียงปัจเจกบุคคลเท่านั้นที่ใช้เหตุผล มีเพียงปัจเจกบุคคลเท่านั้นที่กระทำ' ซึ่งหมายความว่าสิ่งที่เป็นกลุ่มไม่มีการดำรงอยู่หรือความเป็นจริงเกินกว่าการกระทำของสมาชิกแต่ละคน สังคมไม่มีเจตจำนงหรือความคิดของตัวเอง - การกระทำที่เป็นกลุ่มทั้งหมดต้องอธิบายผ่านองค์ประกอบของปัจเจกบุคคล ตัวเลือกอื่น ๆ เข้าใจผิดที่คิดว่าสิ่งที่เป็นกลุ่มมีความสามารถในการคิดหรือการตัดสินใจอย่างอิสระ ซึ่งขัดแย้งกับหลักการพื้นฐานของ Mises ที่ว่ามีเพียงปัจเจกบุคคลเท่านั้นที่สามารถคิดและกระทำได้จริง ๆ
question: Itävaltalaisen taloustieteilijän Ludwig von Misesin metodologista individualismia koskevan näkökulman mukaan mikä on se perustavanlaatuinen rajoitus, joka liittyy siihen, että toiminta liitetään kollektiivisiin kokonaisuuksiin?
answer: Ainoastaan yksilöillä on kyky ajatella, järkeillä ja toimia, joten kollektiiviset kokonaisuudet ovat pelkkiä abstraktioita, joilla ei ole itsenäistä olemassaoloa tai todellisuutta
wrong_answers:
  - Kollektiiviset yksiköt voivat ajatella ja toimia, mutta niiden päätökset ovat aina yksilöllisiä valintoja huonompia demokraattisen tehottomuuden vuoksi
  - Kollektiivisilla entiteeteillä on emergenttejä ominaisuuksia, jotka ylittävät yksilölliset kyvyt, mutta niillä ei ole moraalista auktoriteettia syrjäyttää henkilökohtaista autonomiaa
  - Kollektiiviset yksiköt voivat tehdä rationaalisia päätöksiä yhdistetyn viisauden avulla, mutta niitä olisi rajoitettava yksilön oikeuksia suojaavilla perustuslaillisilla rajoituksilla
explanation: |
  Misesin metodologisen individualismin mukaan "vain yksilö ajattelee, vain yksilö perustelee, vain yksilö toimii" Tämä tarkoittaa, että kollektiivisilla kokonaisuuksilla ei ole olemassaoloa tai todellisuutta niiden yksittäisten jäsenten toimien ulkopuolella. Yhteiskunnalla ei ole omaa tahtoa tai ajatusta - kaikki kollektiiviset teot on selitettävä niiden yksittäisten osien kautta. Muissa vaihtoehdoissa oletetaan virheellisesti, että kollektiivisilla kokonaisuuksilla on jonkinlainen itsenäinen ajattelu- tai päätöksentekokyky, mikä on ristiriidassa Misesin peruslähtökohdan kanssa, jonka mukaan vain yksilöt voivat todella ajatella ja toimia.
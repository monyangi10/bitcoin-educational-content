question: 根據奧地利經濟學家路德維希‧馮‧米塞斯 (Ludwig von Mises) 對方法論個人主義的觀點，將行動歸咎於集體實體的根本限制是什麼？
answer: 只有個人才有思考、推理和行動的能力，因此集體實體只是抽象的概念，沒有獨立的存在或現實。
wrong_answers:
  - 集體實體可以思考和行動，但由於民主的低效率，他們的決策總是遜色於個人的選擇
  - 集體實體擁有超越個人能力的突發特性，但缺乏凌駕個人自主的道德權威
  - 集體實體可以透過集合智慧做出理性決策，但應受到保護個人權利的憲法限制
explanation: |
  米塞斯的方法論個人主義認為，「只有個人才會思考，只有個人才有理由，只有個人才會行動。這意味著集體實體在其個別成員的行為之外，沒有任何存在或現實。社會沒有自己的意志或思想 - 所有的集體行動都必須透過其個別的組成部分來解釋。其他選項錯誤地假設集體實體擁有某種形式的獨立思考或決策能力，這與米塞斯的基本前提相矛盾，即只有個人才能真正思考和行動。
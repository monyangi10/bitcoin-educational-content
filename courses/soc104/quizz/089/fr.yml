question: According to the Austrian economist Ludwig von Mises' perspective on methodological individualism, what is the fundamental limitation of attributing actions to collective entities?
answer: Only individuals possess the capacity to think, reason, and act, making collective entities mere abstractions without independent existence or reality
wrong_answers:
  - Collective entities can think and act but their decisions are always inferior to individual choices due to democratic inefficiencies
  - Collective entities possess emergent properties that transcend individual capabilities but lack the moral authority to override personal autonomy
  - Collective entities can make rational decisions through aggregated wisdom but should be limited by constitutional constraints protecting individual rights
explanation: |
  Mises' methodological individualism holds that 'only the individual thinks, only he reasons, only he acts.' This means collectivities have no existence or reality beyond the actions of their individual members. Society has no will or thought of its own - all collective actions must be explained through their individual components. The other options incorrectly assume that collective entities possess some form of independent thinking or decision-making capacity, which contradicts Mises' fundamental premise that only individuals can truly think and act.

question: オーストリアの経済学者ルートヴィヒ・フォン・ミーゼスの方法論的個人主義の視点によれば、行動を集団的存在に帰属させることの根本的な限界とは何か？
answer: 思考、理性、行動の能力を持つのは個人だけであり、集団は独立した存在や実態を持たない単なる抽象的な存在にすぎない。
wrong_answers:
  - 集団は考え、行動することができるが、その決定は民主主義の非効率性により、常に個人の選択より劣っている。
  - 集団体は個人の能力を超越した創発的特性を持つが、個人の自律性を覆す道徳的権威を持たない。
  - 集合的な主体は、集合的な知恵によって合理的な意思決定を行うことができるが、個人の権利を保護する憲法上の制約によって制限されるべきである。
explanation: |
  ミーゼスの方法論的個人主義は、「個人だけが考え、個人だけが理由を述べ、個人だけが行動する」というものである。つまり、集団体には、個々の構成員の行動を超えた存在や実態はないということである。社会にはそれ自身の意志も思考もない。すべての集団行動は、個々の構成要素を通して説明されなければならない。他の選択肢は、集団的実体が何らかの独立した思考能力や意思決定能力を持っていると誤って仮定しているが、これは、真に思考し行動できるのは個人だけであるというミーゼスの基本的前提に反する。
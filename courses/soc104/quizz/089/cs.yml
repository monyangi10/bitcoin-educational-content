question: Jaké je podle rakouského ekonoma Ludwiga von Misese základní omezení přisuzování jednání kolektivním subjektům?
answer: Pouze jednotlivci mají schopnost myslet, uvažovat a jednat, takže kolektivní entity jsou pouhé abstrakce bez nezávislé existence a reality
wrong_answers:
  - Kolektivní subjekty mohou myslet a jednat, ale jejich rozhodnutí jsou vždy horší než individuální volby z důvodu demokratické neefektivity
  - Kolektivní entity mají emergentní vlastnosti, které přesahují individuální schopnosti, ale nemají morální autoritu, která by převážila nad osobní autonomií
  - Kolektivní subjekty mohou činit racionální rozhodnutí prostřednictvím agregované moudrosti, ale měly by být omezeny ústavními omezeními chránícími práva jednotlivců
explanation: |
  Misesův metodologický individualismus tvrdí, že "pouze jedinec myslí, pouze jedinec uvažuje, pouze jedinec jedná" To znamená, že kolektivní entity nemají žádnou existenci ani realitu mimo jednání svých individuálních členů. Společnost nemá vlastní vůli ani myšlení - veškeré kolektivní jednání musí být vysvětleno prostřednictvím jeho individuálních složek. Ostatní možnosti nesprávně předpokládají, že kolektivní entity mají nějakou formu nezávislého myšlení nebo rozhodovací schopnosti, což je v rozporu s Misesovým základním předpokladem, že pouze jednotlivci mohou skutečně myslet a jednat.
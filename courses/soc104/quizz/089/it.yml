question: Secondo la prospettiva dell'economista austriaco Ludwig von Mises sull'individualismo metodologico, qual è il limite fondamentale dell'attribuzione di azioni a entità collettive?
answer: Solo gli individui possiedono la capacità di pensare, ragionare e agire, rendendo le entità collettive mere astrazioni prive di esistenza o realtà indipendente
wrong_answers:
  - Le entità collettive possono pensare e agire, ma le loro decisioni sono sempre inferiori alle scelte individuali a causa delle inefficienze democratiche
  - Le entità collettive possiedono proprietà emergenti che trascendono le capacità individuali, ma non hanno l'autorità morale per annullare l'autonomia personale
  - Le entità collettive possono prendere decisioni razionali grazie alla saggezza aggregata, ma dovrebbero essere limitate da vincoli costituzionali che proteggono i diritti individuali
explanation: |
  L'individualismo metodologico di Mises sostiene che "solo l'individuo pensa, solo l'individuo ragiona, solo l'individuo agisce" Ciò significa che le entità collettive non hanno esistenza o realtà al di là delle azioni dei loro singoli membri. La società non ha una volontà o un pensiero proprio: tutte le azioni collettive devono essere spiegate attraverso le loro componenti individuali. Le altre opzioni presuppongono erroneamente che le entità collettive possiedano una qualche forma di pensiero o capacità decisionale indipendente, il che contraddice la premessa fondamentale di Mises secondo cui solo gli individui possono veramente pensare e agire.
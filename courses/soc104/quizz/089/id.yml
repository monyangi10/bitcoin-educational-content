question: Menurut perspektif ekonom Austria Ludwig von Mises tentang individualisme metodologis, apa batasan mendasar dalam mengaitkan tindakan dengan entitas kolektif?
answer: Hanya individu yang memiliki kapasitas untuk berpikir, bernalar, dan bertindak, membuat entitas kolektif hanya abstraksi tanpa eksistensi atau realitas yang independen
wrong_answers:
  - Entitas kolektif dapat berpikir dan bertindak, tetapi keputusan mereka selalu lebih rendah daripada pilihan individu karena ketidakefisienan demokrasi
  - Entitas kolektif memiliki sifat-sifat yang muncul yang melampaui kemampuan individu tetapi tidak memiliki otoritas moral untuk mengesampingkan otonomi pribadi
  - Entitas kolektif dapat membuat keputusan yang rasional melalui kebijaksanaan yang terkumpul, namun harus dibatasi oleh batasan konstitusional yang melindungi hak-hak individu
explanation: |
  Individualisme metodologis Mises menyatakan bahwa 'hanya individu yang berpikir, hanya individu yang bernalar, hanya individu yang bertindak' Ini berarti entitas kolektif tidak memiliki eksistensi atau realitas di luar tindakan individu-individu anggotanya. Masyarakat tidak memiliki kehendak atau pemikirannya sendiri - semua tindakan kolektif harus dijelaskan melalui komponen-komponen individualnya. Pilihan lain secara keliru mengasumsikan bahwa entitas kolektif memiliki suatu bentuk pemikiran independen atau kapasitas pengambilan keputusan, yang bertentangan dengan premis fundamental Mises bahwa hanya individu yang dapat benar-benar berpikir dan bertindak.
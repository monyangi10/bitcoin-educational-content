question: Според гледната точка на австрийския икономист Лудвиг фон Мизес за методологическия индивидуализъм, какво е основното ограничение на приписването на действия на колективни субекти?
answer: Само индивидите притежават способността да мислят, да разсъждават и да действат, което прави колективните образувания просто абстракции без независимо съществуване или реалност
wrong_answers:
  - Колективните субекти могат да мислят и да действат, но техните решения винаги са по-лоши от индивидуалните поради демократичната неефективност
  - Колективните същности притежават възникващи свойства, които надхвърлят индивидуалните възможности, но нямат морален авторитет, който да отмени личната автономия
  - Колективните субекти могат да вземат рационални решения чрез обобщена мъдрост, но трябва да бъдат ограничени от конституционни ограничения, защитаващи индивидуалните права
explanation: |
  Методологическият индивидуализъм на Мизес твърди, че "само индивидът мисли, само индивидът разсъждава, само индивидът действа" Това означава, че колективните субекти нямат съществуване или реалност отвъд действията на индивидуалните им членове. Обществото няма собствена воля или мисъл - всички колективни действия трябва да бъдат обяснени чрез техните индивидуални компоненти. Другите варианти неправилно приемат, че колективните субекти притежават някаква форма на независимо мислене или способност за вземане на решения, което противоречи на фундаменталната предпоставка на Мизес, че само индивидите могат наистина да мислят и действат.
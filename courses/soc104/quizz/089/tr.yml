question: Avusturyalı ekonomist Ludwig von Mises'in metodolojik bireycilik perspektifine göre, eylemleri kolektif varlıklara atfetmenin temel sınırlaması nedir?
answer: Yalnızca bireyler düşünme, akıl yürütme ve eyleme geçme kapasitesine sahiptir; bu da kolektif varlıkları bağımsız bir varoluşa veya gerçekliğe sahip olmayan soyutlamalar haline getirir
wrong_answers:
  - Kolektif varlıklar düşünebilir ve hareket edebilir, ancak demokratik yetersizlikler nedeniyle kararları her zaman bireysel seçimlerden daha düşüktür
  - Kolektif varlıklar, bireysel yetenekleri aşan, ancak kişisel özerkliği geçersiz kılacak ahlaki otoriteden yoksun, ortaya çıkan özelliklere sahiptir
  - Kolektif varlıklar toplu akıl yoluyla rasyonel kararlar alabilir ancak bireysel hakları koruyan anayasal kısıtlamalarla sınırlandırılmalıdır
explanation: |
  Mises'in metodolojik bireyciliği "sadece bireyin düşündüğünü, sadece bireyin akıl yürüttüğünü ve sadece bireyin eylemde bulunduğunu" savunur Bu, kolektif varlıkların, bireysel üyelerinin eylemlerinin ötesinde bir varlığa ya da gerçekliğe sahip olmadığı anlamına gelir. Toplumun kendi iradesi ya da düşüncesi yoktur - tüm kolektif eylemler bireysel bileşenleri aracılığıyla açıklanmalıdır. Diğer seçenekler yanlış bir şekilde kolektif varlıkların bir tür bağımsız düşünme veya karar verme kapasitesine sahip olduğunu varsayar ki bu da Mises'in yalnızca bireylerin gerçekten düşünebileceği ve hareket edebileceği yönündeki temel önermesiyle çelişir.
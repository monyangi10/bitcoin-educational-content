question: Hva er den grunnleggende begrensningen ved å tilskrive handlinger til kollektive enheter, ifølge den østerrikske økonomen Ludwig von Mises' perspektiv på metodologisk individualisme?
answer: Det er bare individer som har evne til å tenke, resonnere og handle, noe som gjør kollektive enheter til rene abstraksjoner uten selvstendig eksistens eller virkelighet
wrong_answers:
  - Kollektive enheter kan tenke og handle, men deres beslutninger er alltid dårligere enn individuelle valg på grunn av demokratisk ineffektivitet
  - Kollektive enheter har fremvoksende egenskaper som overskrider individuelle evner, men mangler moralsk autoritet til å tilsidesette personlig autonomi
  - Kollektive enheter kan ta rasjonelle beslutninger gjennom aggregert visdom, men bør begrenses av konstitusjonelle begrensninger som beskytter individuelle rettigheter
explanation: |
  Mises' metodologiske individualisme går ut på at "bare individet tenker, bare individet resonnerer, bare individet handler" Det betyr at kollektive enheter ikke har noen eksistens eller virkelighet utover de enkelte medlemmenes handlinger. Samfunnet har ingen egen vilje eller tanke - alle kollektive handlinger må forklares gjennom sine individuelle komponenter. De andre alternativene forutsetter feilaktig at kollektive enheter besitter en eller annen form for selvstendig tenke- eller beslutningsevne, noe som strider mot Mises' grunnleggende premiss om at bare individer virkelig kan tenke og handle.
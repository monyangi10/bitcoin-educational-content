question: Según la perspectiva del economista austriaco Ludwig von Mises sobre el individualismo metodológico, ¿cuál es la limitación fundamental de atribuir acciones a entidades colectivas?
answer: Sólo los individuos poseen la capacidad de pensar, razonar y actuar, lo que convierte a las entidades colectivas en meras abstracciones sin existencia independiente ni realidad
wrong_answers:
  - Las entidades colectivas pueden pensar y actuar, pero sus decisiones son siempre inferiores a las individuales debido a la ineficacia democrática
  - Las entidades colectivas poseen propiedades emergentes que trascienden las capacidades individuales, pero carecen de autoridad moral para anular la autonomía personal
  - Las entidades colectivas pueden tomar decisiones racionales a través de la sabiduría agregada, pero deben estar limitadas por restricciones constitucionales que protejan los derechos individuales
explanation: |
  El individualismo metodológico de Mises sostiene que "sólo el individuo piensa, sólo el individuo razona, sólo el individuo actúa" Esto significa que las entidades colectivas no tienen existencia ni realidad más allá de las acciones de sus miembros individuales. La sociedad no tiene voluntad ni pensamiento propios: todas las acciones colectivas deben explicarse a través de sus componentes individuales. Las otras opciones suponen incorrectamente que las entidades colectivas poseen alguna forma de pensamiento independiente o capacidad de decisión, lo que contradice la premisa fundamental de Mises de que sólo los individuos pueden pensar y actuar realmente.
question: Wat is volgens het perspectief van de Oostenrijkse econoom Ludwig von Mises op methodologisch individualisme de fundamentele beperking van het toeschrijven van acties aan collectieve entiteiten?
answer: Alleen individuen bezitten het vermogen om te denken, te redeneren en te handelen, waardoor collectieve entiteiten slechts abstracties zijn zonder onafhankelijk bestaan of realiteit
wrong_answers:
  - Collectieve entiteiten kunnen denken en handelen, maar hun beslissingen zijn altijd inferieur aan individuele keuzes vanwege democratische inefficiënties
  - Collectieve entiteiten bezitten opkomende eigenschappen die individuele capaciteiten overstijgen, maar hebben niet de morele autoriteit om persoonlijke autonomie terzijde te schuiven
  - Collectieve entiteiten kunnen rationele beslissingen nemen door middel van geaggregeerde wijsheid, maar moeten worden beperkt door grondwettelijke beperkingen ter bescherming van individuele rechten
explanation: |
  Mises' methodologisch individualisme stelt dat "alleen het individu denkt, alleen het individu redeneert, alleen het individu handelt" Dit betekent dat collectieve entiteiten geen bestaan of realiteit hebben buiten de acties van hun individuele leden. De maatschappij heeft geen eigen wil of gedachte - alle collectieve acties moeten verklaard worden door hun individuele componenten. De andere opties nemen ten onrechte aan dat collectieve entiteiten een vorm van onafhankelijk denken of beslissingsvermogen bezitten, wat in tegenspraak is met Mises' fundamentele uitgangspunt dat alleen individuen echt kunnen denken en handelen.
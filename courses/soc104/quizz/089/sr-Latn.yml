question: Prema perspektivi austrijskog ekonomiste Ludwiga von Misesa o metodološkom individualizmu, osnovno ograničenje pripisivanja akcija kolektivnim entitetima je to što samo pojedinci mogu delovati. Kolektivne entitete, kao što su države ili korporacije, čine pojedinci koji donose odluke i preduzimaju akcije. Stoga, prema Misesu, razumevanje društvenih fenomena zahteva analizu individualnih akcija i motivacija, a ne pripisivanje volje ili akcija apstraktnim kolektivima.
answer: Samo pojedinci poseduju sposobnost da misle, rasuđuju i deluju, čineći kolektivne entitete pukim apstrakcijama bez samostalnog postojanja ili stvarnosti.
wrong_answers:
  - Kolektivni entiteti mogu misliti i delovati, ali su njihove odluke uvek inferiorne u odnosu na individualne izbore zbog demokratskih neefikasnosti.
  - Kolektivni entiteti poseduju emergentna svojstva koja prevazilaze individualne sposobnosti, ali nemaju moralni autoritet da nadvladaju ličnu autonomiju.
  - Kolektivni entiteti mogu donositi racionalne odluke kroz agregiranu mudrost, ali bi trebali biti ograničeni ustavnim ograničenjima koja štite individualna prava.
explanation: |
  Mizesov metodološki individualizam tvrdi da 'samo pojedinac misli, samo pojedinac rezonuje, samo pojedinac deluje.' To znači da kolektivni entiteti nemaju postojanje ili realnost izvan delovanja svojih pojedinačnih članova. Društvo nema svoju volju ili misao - sva kolektivna delovanja moraju se objasniti kroz njihove pojedinačne komponente. Druge opcije pogrešno pretpostavljaju da kolektivni entiteti poseduju neki oblik nezavisnog mišljenja ili sposobnosti donošenja odluka, što je u suprotnosti sa Mizesovom osnovnom premisom da samo pojedinci mogu istinski misliti i delovati.
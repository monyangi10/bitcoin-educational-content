question: De acordo com a perspetiva do economista austríaco Ludwig von Mises sobre o individualismo metodológico, qual é a limitação fundamental da atribuição de acções a entidades colectivas?
answer: Apenas os indivíduos possuem a capacidade de pensar, raciocinar e agir, tornando as entidades colectivas meras abstracções sem existência ou realidade independentes
wrong_answers:
  - As entidades colectivas podem pensar e agir, mas as suas decisões são sempre inferiores às escolhas individuais devido a ineficiências democráticas
  - As entidades colectivas possuem propriedades emergentes que transcendem as capacidades individuais, mas não têm autoridade moral para se sobreporem à autonomia pessoal
  - As entidades colectivas podem tomar decisões racionais através da sabedoria agregada, mas devem ser limitadas por restrições constitucionais que protejam os direitos individuais
explanation: |
  O individualismo metodológico de Mises sustenta que "apenas o indivíduo pensa, apenas o indivíduo raciocina, apenas o indivíduo age" Isto significa que as entidades colectivas não têm existência ou realidade para além das acções dos seus membros individuais. A sociedade não tem vontade ou pensamento próprio - todas as acções colectivas têm de ser explicadas através das suas componentes individuais. As outras opções assumem incorretamente que as entidades colectivas possuem alguma forma de pensamento independente ou capacidade de decisão, o que contradiz a premissa fundamental de Mises de que apenas os indivíduos podem verdadeiramente pensar e agir.
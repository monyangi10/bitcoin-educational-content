question: Dukurikije ukuntu umuhinga mu vy’ubutunzi w’Umunya Otirishiya yitwa Ludwig von Mises abona ibintu ku bijanye n’uburyo bwo gukoresha umuntu ku giti ciwe, ni igiki gishobora gutuma ibikorwa bishirwa ku bigo rusangi?
answer: Abantu ku giti cabo ni bo bonyene bafise ubushobozi bwo kwiyumvira, gutekereza ku bintu no gukora, ivyo bikaba bituma ibintu vyose bihurikiye hamwe biba ibintu bitaboneka gusa bitagira ubuzima bwigenga canke ukuri .
wrong_answers:
  - Inzego rusangi zirashobora kwiyumvira no gukora ariko ingingo zazo zama ziri munsi y'amahitamwo y'umuntu ku giti ciwe kubera ubukene bwa demokarasi .
  - Inzego rusangi zifise ibintu biva mu bindi bihugu birenze ubushobozi bw'umuntu ku giti ciwe ariko zitagira ububasha bwo kwigenza runtu bwo gusumba ubwigenge bw'umuntu ku giti ciwe .
  - Inzego rusangi zishobora gufata ingingo zishingiye ku vyiyumviro biciye mu bwenge buhuriweko ariko zikwiye guhagarara kubera inzitizi z’itegeko nshinga zikingira uburenganzira bw’umuntu ku giti ciwe .
explanation: |
  Uburyo bwa Mises bwo kwiyumvira umuntu ku giti ciwe buvuga ko 'umuntu ku giti ciwe ari we wenyene yiyumvira, imvo z'umuntu ku giti ciwe gusa, umuntu ku giti ciwe wenyene ni we akora.' Ivyo bisigura ko amashirahamwe rusangi ata kubaho canke ukuri afise birenze ibikorwa vy’abagize amashirahamwe yayo umwumwe wese. Sosiyete nta bushake canke iciyumviro gifise - ibikorwa vyose rusangi bitegerezwa gusigurwa biciye mu bice vyavyo umwumwe wese. Ayandi mahitamwo yiyumvira mu buryo butari bwo ko ibigo rusangi bifise uburyo bumwe bwo kwiyumvira canke ubushobozi bwo gufata ingingo bwigenga, ivyo bikaba bivuguruza iciyumviro nyamukuru ca Mises c’uko abantu ku giti cabo bonyene ari bo bashobora kwiyumvira no gukora vy’ukuri.
question: ऑस्ट्रियाई अर्थशास्त्री लुडविग वॉन मिसेस के कार्यप्रणालीगत व्यक्तिवाद के परिप्रेक्ष्य के अनुसार, कार्यों को सामूहिक संस्थाओं को सौंपने की मूलभूत सीमा क्या है?
answer: केवल व्यक्तियों में ही सोचने, तर्क करने और कार्य करने की क्षमता होती है, जबकि सामूहिक संस्थाएँ स्वतंत्र अस्तित्व या वास्तविकता के बिना मात्र अमूर्त अवधारणाएँ होती हैं।
wrong_answers:
  - सामूहिक संस्थाएँ सोच-विचार और कार्य कर सकती हैं, लेकिन लोकतांत्रिक अक्षमताओं के कारण उनके निर्णय हमेशा व्यक्तिगत विकल्पों से निम्नतर होते हैं।
  - सामूहिक संस्थाओं में ऐसे विशिष्ट गुण होते हैं जो व्यक्तिगत क्षमताओं से परे होते हैं, लेकिन उनमें व्यक्तिगत स्वायत्तता को दरकिनार करने का नैतिक अधिकार नहीं होता।
  - सामूहिक संस्थाएँ सामूहिक बुद्धिमत्ता के आधार पर तर्कसंगत निर्णय ले सकती हैं, लेकिन व्यक्तिगत अधिकारों की रक्षा करने वाले संवैधानिक प्रतिबंधों द्वारा उन्हें सीमित किया जाना चाहिए।
explanation: |
  मीज़ेस का पद्धतिगत व्यक्तिवाद मानता है कि 'केवल व्यक्ति ही सोचता है, केवल व्यक्ति ही तर्क करता है, केवल व्यक्ति ही कार्य करता है।' इसका अर्थ है कि सामूहिक संस्थाओं का अस्तित्व या वास्तविकता उनके व्यक्तिगत सदस्यों के कार्यों से परे नहीं है। समाज की अपनी कोई इच्छा या विचार नहीं होता - सभी सामूहिक कार्यों को उनके व्यक्तिगत घटकों के माध्यम से ही समझाया जाना चाहिए। अन्य विकल्प गलत तरीके से यह मान लेते हैं कि सामूहिक संस्थाओं में किसी प्रकार की स्वतंत्र सोच या निर्णय लेने की क्षमता होती है, जो मीज़ेस के इस मूल सिद्धांत के विपरीत है कि केवल व्यक्ति ही वास्तव में सोच और कार्य कर सकते हैं।
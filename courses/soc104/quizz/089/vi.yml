question: Theo quan điểm của nhà kinh tế học người Áo Ludwig von Mises về chủ nghĩa cá nhân phương pháp luận, hạn chế cơ bản của việc quy gán hành động cho các thực thể tập thể là gì?
answer: Chỉ có cá nhân mới có khả năng suy nghĩ, lý luận và hành động, do đó các thực thể tập thể chỉ là những khái niệm trừu tượng không có sự tồn tại độc lập hay thực chất.
wrong_answers:
  - Các thực thể tập thể có thể suy nghĩ và hành động, nhưng quyết định của chúng luôn kém hiệu quả hơn so với lựa chọn cá nhân do những hạn chế của nền dân chủ.
  - Các thực thể tập thể sở hữu những đặc tính nổi bật vượt xa khả năng của cá nhân nhưng lại thiếu thẩm quyền đạo đức để bác bỏ quyền tự chủ cá nhân.
  - Các thực thể tập thể có thể đưa ra quyết định hợp lý dựa trên trí tuệ tập thể nhưng cần bị giới hạn bởi các quy định hiến pháp bảo vệ quyền cá nhân.
explanation: |
  Chủ nghĩa cá nhân phương pháp luận của Mises cho rằng "chỉ cá nhân mới suy nghĩ, chỉ cá nhân mới lý luận, chỉ cá nhân mới hành động". Điều này có nghĩa là các thực thể tập thể không có sự tồn tại hay thực chất nào ngoài hành động của các thành viên cá nhân của chúng. Xã hội không có ý chí hay tư duy riêng - tất cả các hành động tập thể phải được giải thích thông qua các thành phần cá nhân của chúng. Các lựa chọn khác giả định sai lầm rằng các thực thể tập thể sở hữu một số hình thức tư duy độc lập hoặc khả năng ra quyết định, điều này mâu thuẫn với tiền đề cơ bản của Mises rằng chỉ có cá nhân mới thực sự có thể suy nghĩ và hành động.
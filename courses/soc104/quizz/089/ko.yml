question: 오스트리아 경제학자 루트비히 폰 미제스의 방법론적 개인주의에 대한 관점에 따르면, 행동을 집단적 실체에 귀속시키는 것의 근본적인 한계는 무엇일까요?
answer: 개인만이 사고하고 추론하고 행동할 수 있는 능력을 가지고 있으며, 집단은 독립적인 존재나 실체가 없는 추상적인 존재에 불과합니다
wrong_answers:
  - 집단은 생각하고 행동할 수 있지만 민주적 비효율성으로 인해 그들의 결정은 항상 개인의 선택보다 열등합니다
  - 집단적 실체는 개인의 능력을 초월하는 비상적 속성을 가지고 있지만 개인의 자율성을 무시할 수 있는 도덕적 권한이 부족합니다
  - 집단은 집단의 지혜를 모아 합리적인 결정을 내릴 수 있지만 개인의 권리를 보호하는 헌법적 제약에 의해 제한되어야 합니다
explanation: |
  미제스의 방법론적 개인주의는 '오직 개인만이 생각하고, 오직 개인만이 사유하고, 오직 개인만이 행동한다'고 주장합니다 즉, 집단은 구성원 개개인의 행동을 넘어서는 존재나 실체가 없다는 뜻입니다. 사회는 그 자체의 의지나 생각이 없으며, 모든 집단적 행동은 개별 구성원을 통해 설명되어야 합니다. 다른 옵션은 집단이 어떤 형태의 독립적인 사고나 의사 결정 능력을 가지고 있다고 잘못 가정하는데, 이는 개인만이 진정으로 사고하고 행동할 수 있다는 미제스의 기본 전제와 모순됩니다.
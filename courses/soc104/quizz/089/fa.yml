question: بر اساس دیدگاه اقتصاددان اتریشی لودویگ فون میزس در مورد فردگرایی روش‌شناختی، محدودیت اساسی نسبت دادن اقدامات به نهادهای جمعی چیست؟
answer: تنها افراد هستند که توانایی فکر کردن، استدلال و عمل کردن را دارند، و این امر باعث می‌شود که نهادهای جمعی صرفاً انتزاعاتی بدون وجود یا واقعیت مستقل باشند.
wrong_answers:
  - نهادهای جمعی می‌توانند فکر کنند و عمل کنند اما تصمیمات آن‌ها همیشه به دلیل ناکارآمدی‌های دموکراتیک نسبت به انتخاب‌های فردی پایین‌تر است.
  - نهادهای جمعی دارای ویژگی‌های نوظهوری هستند که فراتر از قابلیت‌های فردی می‌روند اما فاقد اقتدار اخلاقی برای نادیده گرفتن خودمختاری شخصی هستند.
  - نهادهای جمعی می‌توانند از طریق خرد جمعی تصمیمات منطقی بگیرند اما باید با محدودیت‌های قانون اساسی که از حقوق فردی محافظت می‌کنند، محدود شوند.
explanation: |
  روش فردگرایی روش‌شناختی میزس بر این باور است که «تنها فرد است که می‌اندیشد، تنها فرد است که استدلال می‌کند، تنها فرد است که عمل می‌کند.» این بدان معناست که موجودیت‌های جمعی هیچ وجود یا واقعیتی فراتر از اعمال اعضای فردی خود ندارند. جامعه اراده یا اندیشه‌ای از خود ندارد - تمامی اعمال جمعی باید از طریق اجزای فردی آن‌ها توضیح داده شوند. گزینه‌های دیگر به اشتباه فرض می‌کنند که موجودیت‌های جمعی دارای نوعی ظرفیت تفکر یا تصمیم‌گیری مستقل هستند، که این با فرض اساسی میزس که تنها افراد می‌توانند واقعاً فکر کنند و عمل کنند، در تضاد است.
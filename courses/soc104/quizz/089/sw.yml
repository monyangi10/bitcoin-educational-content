question: Kulingana na mtazamo wa mchumi wa Austria Ludwig von Mises kuhusu ubinafsi wa kimbinu, ni nini kikwazo cha msingi cha kuhusisha vitendo na vyombo vya pamoja?
answer: Ni watu binafsi pekee wanao uwezo wa kufikiri, kusababu, na kutenda, na kufanya vyombo vya pamoja kuwa vitu vya kufikirika tu bila kuwepo au uhalisia huru.
wrong_answers:
  - Vyombo vya pamoja vinaweza kufikiri na kutenda lakini maamuzi yao huwa duni kuliko chaguzi za mtu binafsi kutokana na ukosefu wa ufanisi wa kidemokrasia.
  - Vyombo vya pamoja vina sifa zinazojitokeza zinazozidi uwezo wa mtu binafsi lakini havina mamlaka ya kimaadili ya kupindua uhuru wa kibinafsi.
  - Vyombo vya pamoja vinaweza kufanya maamuzi ya busara kupitia hekima iliyojumlishwa lakini vinapaswa kupunguzwa na vikwazo vya kikatiba vinavyolinda haki za mtu binafsi.
explanation: |
  Ubinafsi wa kimbinu wa Mises unashikilia kwamba 'mtu binafsi pekee ndiye anayefikiri, sababu za mtu binafsi pekee, mtu binafsi pekee ndiye anayetenda.' Hii ina maana kwamba vyombo vya pamoja havina kuwepo au uhalisia zaidi ya matendo ya wanachama wao binafsi. Jamii haina utashi au mawazo yake yenyewe - vitendo vyote vya pamoja lazima vielezwe kupitia vipengele vyao binafsi. Chaguzi zingine zinadhania kimakosa kwamba vyombo vya pamoja vina aina fulani ya mawazo huru au uwezo wa kufanya maamuzi, jambo ambalo linapingana na dhana ya msingi ya Mises kwamba ni watu binafsi pekee ndio wanaweza kufikiri na kutenda kweli.

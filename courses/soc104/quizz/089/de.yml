question: Worin besteht nach der Sichtweise des österreichischen Ökonomen Ludwig von Mises zum methodologischen Individualismus die grundlegende Einschränkung, Handlungen kollektiven Einheiten zuzuschreiben?
answer: Nur Individuen besitzen die Fähigkeit zu denken, zu denken und zu handeln, was kollektive Einheiten zu bloßen Abstraktionen ohne unabhängige Existenz oder Realität macht
wrong_answers:
  - Kollektive Einheiten können denken und handeln, aber ihre Entscheidungen sind aufgrund demokratischer Ineffizienzen immer schlechter als individuelle Entscheidungen
  - Kollektive Gebilde besitzen auftauchende Eigenschaften, die über die individuellen Fähigkeiten hinausgehen, aber nicht die moralische Autorität haben, die persönliche Autonomie außer Kraft zu setzen
  - Kollektive Gebilde können durch geballte Weisheit rationale Entscheidungen treffen, sollten aber durch verfassungsrechtliche Beschränkungen zum Schutz der individuellen Rechte begrenzt werden
explanation: |
  Der methodologische Individualismus von Mises besagt, dass "nur der Einzelne denkt, nur der Einzelne begründet, nur der Einzelne handelt" Das bedeutet, dass kollektive Einheiten keine Existenz oder Realität jenseits der Handlungen ihrer einzelnen Mitglieder haben. Die Gesellschaft hat keinen eigenen Willen und kein eigenes Denken - alle kollektiven Handlungen müssen durch ihre individuellen Komponenten erklärt werden. Die anderen Optionen gehen fälschlicherweise davon aus, dass kollektive Einheiten irgendeine Form von unabhängigem Denken oder Entscheidungsfähigkeit besitzen, was der grundlegenden Prämisse von Mises widerspricht, dass nur Individuen wirklich denken und handeln können.
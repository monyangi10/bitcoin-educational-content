question: 根据奥地利经济学家路德维希-冯-米塞斯（Ludwig von Mises）关于方法论个人主义的观点，将行动归因于集体实体的根本局限是什么？
answer: 只有个人才拥有思考、推理和行动的能力，集体实体只是抽象概念，没有独立的存在或现实性
wrong_answers:
  - 集体实体可以思考和行动，但由于民主效率低下，其决定总是不如个人选择
  - 集体实体拥有超越个人能力的新兴属性，但缺乏凌驾于个人自主之上的道德权威
  - 集体实体可以通过集思广益做出理性决策，但应受到保护个人权利的宪法约束的限制
explanation: |
  米塞斯的方法论个人主义认为，"只有个人在思考，只有个人在推理，只有个人在行动。'这意味着集体实体在其个体成员的行动之外没有任何存在或现实意义。社会没有自己的意志或思想--所有集体行动都必须通过其个体组成部分来解释。其他选项错误地假设集体实体拥有某种形式的独立思考或决策能力，这与米塞斯的基本前提--只有个人才能真正思考和行动--相矛盾。
question: Enligt den österrikiske ekonomen Ludwig von Mises perspektiv på metodologisk individualism, vad är den grundläggande begränsningen med att tillskriva handlingar till kollektiva enheter?
answer: Endast individer har förmåga att tänka, resonera och agera, vilket gör kollektiva enheter till rena abstraktioner utan självständig existens eller verklighet
wrong_answers:
  - Kollektiva enheter kan tänka och agera, men deras beslut är alltid sämre än individuella val på grund av demokratisk ineffektivitet
  - Kollektiva enheter har framväxande egenskaper som överskrider individuella förmågor men saknar moralisk auktoritet att åsidosätta personlig autonomi
  - Kollektiva enheter kan fatta rationella beslut genom aggregerad visdom, men bör begränsas av konstitutionella begränsningar som skyddar individuella rättigheter
explanation: |
  Mises metodologiska individualism innebär att "endast individen tänker, endast individen resonerar, endast individen agerar" Detta innebär att kollektiva enheter inte har någon existens eller verklighet bortom de enskilda medlemmarnas handlingar. Samhället har ingen egen vilja eller tanke - alla kollektiva handlingar måste förklaras genom sina enskilda komponenter. De andra alternativen utgår felaktigt från att kollektiva enheter besitter någon form av självständigt tänkande eller beslutskapacitet, vilket strider mot Mises grundläggande premiss att endast individer verkligen kan tänka och agera.
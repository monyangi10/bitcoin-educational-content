question: Согласно взглядам австрийского экономиста Людвига фон Мизеса на методологический индивидуализм, в чем заключается фундаментальное ограничение приписывания действий коллективным субъектам?
answer: Только отдельные люди обладают способностью мыслить, рассуждать и действовать, что делает коллективные образования просто абстракциями, не имеющими независимого существования или реальности
wrong_answers:
  - Коллективные субъекты могут думать и действовать, но их решения всегда уступают индивидуальным из-за демократической неэффективности
  - Коллективные образования обладают эмерджентными свойствами, выходящими за рамки индивидуальных возможностей, но не имеют морального авторитета, чтобы отменить личную автономию
  - Коллективные образования могут принимать рациональные решения благодаря совокупной мудрости, но должны быть ограничены конституционными ограничениями, защищающими права личности
explanation: |
  Методологический индивидуализм Мизеса гласит: "Только индивид думает, только индивид рассуждает, только индивид действует" Это означает, что коллективные образования не имеют существования или реальности вне действий их индивидуальных членов. У общества нет собственной воли или мышления - все коллективные действия должны быть объяснены через их индивидуальные компоненты. Другие варианты неверно предполагают, что коллективные образования обладают некой формой независимого мышления или способностью принимать решения, что противоречит фундаментальному постулату Мизеса о том, что только индивиды могут по-настоящему думать и действовать.
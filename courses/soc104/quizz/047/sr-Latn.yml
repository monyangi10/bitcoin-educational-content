question: Šta razlikuje ekonomsku filozofiju konzervativaca od njihovog pristupa društvenim pitanjima?
answer: Podržavaju snažne ekonomske slobode, ali favorizuju intervenciju vlade kako bi se sproveli tradicionalne društvene i moralne norme.
wrong_answers:
  - Zalažu se za minimalnu intervenciju vlade u ekonomskoj i društvenoj sferi podjednako.
  - Oni podržavaju opsežnu državnu regulaciju u ekonomiji dok promovišu potpunu socijalnu libertarijanizam.
  - Oni favorizuju snažnu državnu kontrolu nad ekonomskim tržištima i individualnim društvenim ponašanjima.
explanation: |
  Konzervativci pokazuju karakterističan dvostruki pristup: zalažu se za ekonomsku slobodu kroz niske poreze, minimalnu regulaciju poslovanja i slobodno preduzetništvo, dok istovremeno podržavaju intervenciju vlade u društvenim pitanjima kako bi očuvali tradicionalne vrednosti, red i moralne standarde. Ovo stvara očiglednu kontradikciju gde žele ograničenje vlade u ekonomiji, ali aktivno sprovođenje društvenih normi. Druge opcije pogrešno predstavljaju ovu osnovnu konzervativnu tenziju - ne teže minimalnoj intervenciji svuda, niti žele opsežnu ekonomsku regulaciju ili potpunu društvenu kontrolu.
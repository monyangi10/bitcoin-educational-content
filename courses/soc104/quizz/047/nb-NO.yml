question: Hva skiller de konservatives økonomiske filosofi fra deres tilnærming til sosiale spørsmål?
answer: De støtter sterk økonomisk frihet, men er tilhengere av statlig inngripen for å håndheve tradisjonelle sosiale og moralske normer
wrong_answers:
  - De går inn for minimal statlig inngripen på både det økonomiske og det sosiale området
  - De støtter omfattende statlig regulering av økonomien, samtidig som de fremmer fullstendig sosial libertarianisme
  - De går inn for sterk statlig kontroll over både økonomiske markeder og individuell sosial atferd
explanation: |
  Konservative har en særegen dobbel tilnærming: De går inn for økonomisk frihet gjennom lav beskatning, minimal regulering av næringslivet og fri næringsvirksomhet,
  samtidig som de støtter statlig inngripen i sosiale spørsmål for å opprettholde tradisjonelle verdier, orden og moralske standarder. Dette skaper en tilsynelatende selvmotsigelse, der de ønsker statlig tilbakeholdenhet i økonomiske spørsmål, men aktiv håndhevelse av sosiale normer. De andre alternativene gir en feilaktig fremstilling av denne grunnleggende konservative spenningen - de ønsker ikke minimal inngripen overalt, og de ønsker heller ikke omfattende økonomisk regulering eller fullstendig sosial kontroll.
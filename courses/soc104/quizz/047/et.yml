question: Mis eristab konservatiivide majandusfilosoofiat nende lähenemisest sotsiaalküsimustele?
answer: Nad toetavad tugevaid majanduslikke vabadusi, kuid pooldavad valitsuse sekkumist traditsiooniliste sotsiaalsete ja moraalinormide jõustamiseks
wrong_answers:
  - Nad pooldavad valitsuse minimaalset sekkumist nii majandus- kui ka sotsiaalvaldkonnas võrdselt
  - Nad toetavad ulatuslikku riiklikku reguleerimist majanduses, propageerides samas täielikku sotsiaalset liberaalsust
  - Nad pooldavad tugevat riiklikku kontrolli nii majandusturgude kui ka individuaalse sotsiaalse käitumise üle
explanation: |
  Konservatiividele on omane kahekordne lähenemine: nad pooldavad majanduslikku vabadust madala maksustamise, minimaalse ettevõtluse reguleerimise ja vaba ettevõtluse kaudu,
  toetades samal ajal valitsuse sekkumist sotsiaalküsimustesse, et säilitada traditsioonilisi väärtusi, korda ja moraalinorme. See tekitab näilise vastuolu, kus nad soovivad valitsuse piiratust majanduses, kuid aktiivset sotsiaalsete normide jõustamist. Teised valikud moonutavad seda põhilist konservatiivset pinget - nad ei taotle kõikjal minimaalset sekkumist ega soovi ulatuslikku majanduslikku reguleerimist või täielikku sotsiaalset kontrolli.
question: Mikä erottaa konservatiivien talousfilosofian heidän lähestymistavastaan sosiaalisiin kysymyksiin?
answer: He kannattavat vahvoja taloudellisia vapauksia, mutta suosivat hallituksen väliintuloa perinteisten sosiaalisten ja moraalisten normien valvomiseksi
wrong_answers:
  - He kannattavat hallituksen mahdollisimman vähäistä puuttumista sekä taloudellisiin että sosiaalisiin asioihin yhtä lailla
  - He kannattavat laajaa valtion sääntelyä talouden alalla ja edistävät samalla täydellistä sosiaalista libertarismia
  - He kannattavat valtion vahvaa valvontaa sekä talousmarkkinoiden että yksilöiden sosiaalisen käyttäytymisen suhteen
explanation: |
  Konservatiiveilla on omaleimainen kaksitahoinen lähestymistapa: he puolustavat taloudellista vapautta matalan verotuksen, vähäisen yrityssääntelyn ja vapaan yritystoiminnan avulla,
  mutta kannattavat samalla hallituksen puuttumista yhteiskunnallisiin asioihin perinteisten arvojen, järjestyksen ja moraalin ylläpitämiseksi. Tämä luo näennäisen ristiriidan, jossa he haluavat hallituksen hillitsevän talousasioita mutta valvovan aktiivisesti sosiaalisten normien noudattamista. Muut vaihtoehdot vääristelevät tätä konservatiivien perusjännitystä - he eivät pyri minimaaliseen puuttumiseen kaikkialla, eivätkä halua laajaa talouden sääntelyä tai täydellistä sosiaalista valvontaa.
question: Cosa distingue la filosofia economica dei conservatori dal loro approccio alle questioni sociali?
answer: Sostengono forti libertà economiche, ma sono favorevoli all'intervento del governo per far rispettare le norme sociali e morali tradizionali
wrong_answers:
  - Sostengono un intervento minimo del governo sia in ambito economico che sociale
  - Sostengono un'ampia regolamentazione governativa in economia, promuovendo al contempo un completo libertarismo sociale
  - Sono favorevoli a un forte controllo da parte dello Stato sia sui mercati economici che sui comportamenti sociali individuali
explanation: |
  I conservatori hanno un duplice approccio distintivo: sostengono la libertà economica attraverso una bassa tassazione, una regolamentazione minima delle imprese e la libera impresa,
  e contemporaneamente sostengono l'intervento del governo nelle questioni sociali per sostenere i valori tradizionali, l'ordine e gli standard morali. Questo crea un'apparente contraddizione: vogliono che il governo si limiti all'economia, ma che applichi attivamente le norme sociali. Le altre opzioni travisano questa tensione conservatrice fondamentale: non cercano un intervento minimo ovunque, né vogliono una regolamentazione economica estesa o un controllo sociale completo.
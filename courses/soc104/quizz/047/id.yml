question: Apa yang membedakan filosofi ekonomi kaum konservatif dengan pendekatan mereka terhadap isu-isu sosial?
answer: Mereka mendukung kebebasan ekonomi yang kuat tetapi lebih menyukai intervensi pemerintah untuk menegakkan norma-norma sosial dan moral tradisional
wrong_answers:
  - Mereka mengadvokasi intervensi pemerintah yang minimal di bidang ekonomi dan sosial secara merata
  - Mereka mendukung regulasi pemerintah yang luas di bidang ekonomi sambil mempromosikan libertarianisme sosial yang lengkap
  - Mereka mendukung kontrol negara yang kuat atas pasar ekonomi dan perilaku sosial individu
explanation: |
  Kaum konservatif menunjukkan pendekatan ganda yang khas: mereka memperjuangkan kebebasan ekonomi melalui pajak yang rendah, regulasi bisnis yang minimal, dan perusahaan yang bebas,
  sekaligus mendukung intervensi pemerintah dalam masalah sosial untuk menegakkan nilai-nilai tradisional, ketertiban, dan standar moral. Hal ini menciptakan kontradiksi yang jelas di mana mereka menginginkan pengekangan pemerintah dalam bidang ekonomi tetapi penegakan norma-norma sosial secara aktif. Pilihan lainnya salah menggambarkan ketegangan konservatif yang mendasar ini - mereka tidak mencari intervensi minimal di mana-mana, dan juga tidak menginginkan regulasi ekonomi yang ekstensif atau kontrol sosial yang menyeluruh.
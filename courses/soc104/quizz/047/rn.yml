question: Ni igiki gitandukanya filozofiya y’ubutunzi y’abanyapolitike b’abanyagihugu n’ingene bafata ibibazo vy’imibano?
answer: Bashigikiye umwidegemvyo ukomeye mu vy'ubutunzi ariko bagashigikira ko Leta yinjira mu gushitsa amategeko y'imibano n'inyifato runtu .
wrong_answers:
  - Basaba ko Leta yogira ico ikoze gatoyi mu vy'ubutunzi no mu vy'imibano kimwe .
  - Bashigikira amategeko menshi ya Leta mu vy’ubutunzi mu gihe batera imbere umwidegemvyo wuzuye mu kibano .
  - Bashima ko Leta igenzura cane amasoko y'ubutunzi no ku nyifato z'abantu ku giti cabo .
explanation: |
  Abanyapolitike b’abanyagihugu berekana uburyo bubiri budasanzwe: baharanira umwidegemvyo mu vy’ubutunzi biciye mu gutanga imisoro mike, mu gutegeka ubudandaji buke, no mu kwidegemvya mu vy’ubudandaji, 
  mu gihe nyene bashigikira ko Leta yinjira mu bibazo vy’imibano kugira ngo ishigikire ingingo ngenderwako z’imigenzo, urutonde n’ingingo mfatirwako z’inyifato runtu. Ivyo bituma habaho ukuvuguruzanya aho bashaka ko Leta yifata mu vy’ubutunzi ariko igashira mu ngiro amategeko agenga imibano. Ayandi mahitamwo agaragaza nabi iyo ntambara y’ishimikiro y’abanyagihugu - ntibarondera ubufasha bukeyi hose, eka mbere ntibashaka amategeko yagutse y’ubutunzi canke ubugenzuzi bushitse bw’imibano.
question: Čím se liší ekonomická filozofie konzervativců od jejich přístupu k sociálním otázkám?
answer: Podporují silné ekonomické svobody, ale upřednostňují vládní zásahy k prosazování tradičních společenských a morálních norem
wrong_answers:
  - Stejně tak prosazují minimální zásahy státu do ekonomické i sociální oblasti
  - Podporují rozsáhlou státní regulaci v ekonomice a zároveň prosazují naprosté sociální libertariánství
  - Upřednostňují silnou státní kontrolu nad ekonomickými trhy i sociálním chováním jednotlivců
explanation: |
  Konzervativci se vyznačují dvojím přístupem: prosazují ekonomickou svobodu prostřednictvím nízkých daní, minimální regulace podnikání a svobodného podnikání,
  a zároveň podporují vládní zásahy do sociálních záležitostí s cílem udržet tradiční hodnoty, řád a morální normy. To vytváří zdánlivý rozpor, kdy chtějí vládní omezení v ekonomice, ale aktivní prosazování sociálních norem. Ostatní varianty toto základní konzervativní napětí zkreslují - neusilují o minimální zásahy všude, ani nechtějí rozsáhlou ekonomickou regulaci nebo úplnou sociální kontrolu.
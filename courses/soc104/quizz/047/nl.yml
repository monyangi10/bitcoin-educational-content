question: Wat onderscheidt de economische filosofie van conservatieven van hun benadering van sociale kwesties?
answer: Ze steunen sterke economische vrijheden, maar zijn voorstander van overheidsbemoeienis om traditionele sociale en morele normen af te dwingen
wrong_answers:
  - Ze pleiten voor minimale overheidsbemoeienis op zowel economisch als sociaal gebied
  - Ze steunen uitgebreide overheidsregulering in de economie terwijl ze volledig sociaal libertarisme promoten
  - Ze zijn voorstander van een sterke staatscontrole over zowel economische markten als individueel sociaal gedrag
explanation: |
  Conservatieven hebben een kenmerkende tweeledige benadering: ze staan voor economische vrijheid door lage belastingen, minimale bedrijfsregulering en vrij ondernemerschap,
  terwijl ze tegelijkertijd overheidsinterventie in sociale zaken steunen om traditionele waarden, orde en morele normen te handhaven. Dit creëert een schijnbare tegenstrijdigheid waarbij ze terughoudendheid van de overheid willen op economisch gebied, maar actieve handhaving van sociale normen. De andere opties geven een verkeerd beeld van deze fundamentele conservatieve spanning - ze streven niet naar minimale interventie overal, noch willen ze uitgebreide economische regulering of volledige sociale controle.
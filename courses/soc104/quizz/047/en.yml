question: What distinguishes the economic philosophy of conservatives from their approach to social issues?
answer: They support strong economic freedoms but favor government intervention to enforce traditional social and moral norms
wrong_answers:
  - They advocate for minimal government intervention in both economic and social spheres equally
  - They support extensive government regulation in economics while promoting complete social libertarianism
  - They favor strong state control over both economic markets and individual social behaviors
explanation: |
  Conservatives exhibit a distinctive dual approach: they champion economic liberty through low taxation, minimal business regulation, and free enterprise, while simultaneously supporting government intervention in social matters to uphold traditional values, order, and moral standards. This creates an apparent contradiction where they want government restraint in economics but active enforcement of social norms. The other options misrepresent this fundamental conservative tension - they don't seek minimal intervention everywhere, nor do they want extensive economic regulation or complete social control.
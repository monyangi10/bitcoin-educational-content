question: 保守派の経済哲学と社会問題へのアプローチを区別するものは何か？
answer: 強い経済的自由を支持するが、伝統的な社会的・道徳的規範を強制するための政府の介入を支持する。
wrong_answers:
  - 彼らは、経済と社会の両分野において、政府の介入を最小限にすることを等しく主張している。
  - 完全な社会的リバタリアニズムを推進する一方で、経済面では広範な政府規制を支持している。
  - 彼らは、経済市場と個人の社会的行動の両方に対する国家の強力な統制を支持する。
explanation: |
  保守派は、低税率、最小限のビジネス規制、自由な企業活動を通じて経済的自由を擁護すると同時に、伝統的な価値観や秩序、道徳基準を守るために社会問題への政府の介入を支持するという、独特の二重アプローチを示す、
  同時に、伝統的な価値観、秩序、道徳基準を守るために、社会問題への政府の介入を支持する。このため、経済面では政府の抑制を求めるが、社会規範は積極的に実施するという矛盾が生じる。他の選択肢は、この基本的な保守派の緊張関係を誤って表現している。彼らは、あらゆる場所への最小限の介入を求めているわけではないし、広範な経済規制や完全な社会統制を望んでいるわけでもない。
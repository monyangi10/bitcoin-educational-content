question: Ni nini kinachotofautisha falsafa ya kiuchumi ya wahafidhina na mbinu yao ya kushughulikia masuala ya kijamii?
answer: Wanaunga mkono uhuru imara wa kiuchumi lakini wanapendelea serikali kuingilia kati ili kutekeleza kanuni za kitamaduni za kijamii na kimaadili
wrong_answers:
  - Wanatetea uingiliaji kati mdogo wa serikali katika nyanja za kiuchumi na kijamii kwa usawa
  - Wanaunga mkono kanuni pana za serikali katika uchumi huku wakiendeleza uhuru kamili wa kijamii
  - Wanapendelea udhibiti mkubwa wa serikali juu ya masoko ya kiuchumi na tabia za kijamii za mtu binafsi
explanation: |
  Wahafidhina wanaonyesha mbinu mbili tofauti: wanatetea uhuru wa kiuchumi kupitia kodi ndogo, kanuni ndogo za biashara, na biashara huru, 
  wakati huo huo wakiunga mkono uingiliaji kati wa serikali katika masuala ya kijamii ili kudumisha maadili ya kitamaduni, utaratibu, na viwango vya maadili. Hii inaunda utata dhahiri ambapo wanataka kujizuia kwa serikali katika uchumi lakini utekelezaji hai wa kanuni za kijamii. Chaguzi zingine zinapotosha mvutano huu wa kimsingi wa kihafidhina - hawataki kuingilia kati kidogo kila mahali, wala hawataki kanuni pana za kiuchumi au udhibiti kamili wa kijamii.
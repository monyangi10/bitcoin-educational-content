question: อะไรที่ทำให้ปรัชญาเศรษฐกิจของกลุ่มอนุรักษ์นิยมแตกต่างจากแนวทางของพวกเขาต่อประเด็นทางสังคม?
answer: พวกเขาสนับสนุนเสรีภาพทางเศรษฐกิจที่แข็งแกร่งแต่สนับสนุนการแทรกแซงของรัฐบาลเพื่อบังคับใช้บรรทัดฐานทางสังคมและศีลธรรมแบบดั้งเดิม
wrong_answers:
  - พวกเขาสนับสนุนการแทรกแซงของรัฐบาลให้น้อยที่สุดทั้งในด้านเศรษฐกิจและสังคมอย่างเท่าเทียมกัน
  - พวกเขาสนับสนุนการควบคุมของรัฐบาลอย่างกว้างขวางในด้านเศรษฐกิจ ในขณะที่ส่งเสริมเสรีนิยมทางสังคมอย่างเต็มที่
  - พวกเขาสนับสนุนการควบคุมของรัฐอย่างเข้มงวดทั้งในตลาดเศรษฐกิจและพฤติกรรมทางสังคมของบุคคล
explanation: |
  กลุ่มอนุรักษ์นิยมแสดงออกถึงแนวทางสองด้านที่โดดเด่น: พวกเขาสนับสนุนเสรีภาพทางเศรษฐกิจผ่านการเก็บภาษีต่ำ การควบคุมธุรกิจให้น้อยที่สุด และการค้าเสรี ในขณะเดียวกันก็สนับสนุนการแทรกแซงของรัฐบาลในเรื่องสังคมเพื่อรักษาค่านิยมดั้งเดิม ความเป็นระเบียบ และมาตรฐานทางศีลธรรม สิ่งนี้สร้างความขัดแย้งที่เห็นได้ชัดเจนที่พวกเขาต้องการให้รัฐบาลยับยั้งในด้านเศรษฐกิจแต่บังคับใช้บรรทัดฐานทางสังคมอย่างแข็งขัน ตัวเลือกอื่น ๆ บิดเบือนความตึงเครียดพื้นฐานของกลุ่มอนุรักษ์นิยม - พวกเขาไม่ได้แสวงหาการแทรกแซงน้อยที่สุดในทุกที่ และไม่ได้ต้องการการควบคุมเศรษฐกิจอย่างกว้างขวางหรือการควบคุมสังคมอย่างสมบูรณ์
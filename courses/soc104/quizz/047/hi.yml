question: रूढ़िवादियों के आर्थिक दर्शन और सामाजिक मुद्दों के प्रति उनके दृष्टिकोण में क्या अंतर है?
answer: वे मजबूत आर्थिक स्वतंत्रता का समर्थन करते हैं, लेकिन पारंपरिक सामाजिक और नैतिक मानदंडों को लागू करने के लिए सरकारी हस्तक्षेप के पक्षधर हैं।
wrong_answers:
  - वे आर्थिक और सामाजिक दोनों क्षेत्रों में न्यूनतम सरकारी हस्तक्षेप की वकालत करते हैं।
  - वे पूर्ण सामाजिक स्वतंत्रतावाद को बढ़ावा देते हुए अर्थशास्त्र में व्यापक सरकारी विनियमन का समर्थन करते हैं।
  - वे आर्थिक बाजारों और व्यक्तिगत सामाजिक व्यवहार दोनों पर मजबूत राज्य नियंत्रण के पक्षधर हैं।
explanation: |
  रूढ़िवादी विचारधारा में एक विशिष्ट दोहरा दृष्टिकोण देखने को मिलता है: वे कम कराधान, न्यूनतम व्यापार विनियमन और मुक्त उद्यम के माध्यम से आर्थिक स्वतंत्रता का समर्थन करते हैं,
  जबकि साथ ही साथ पारंपरिक मूल्यों, व्यवस्था और नैतिक मानकों को बनाए रखने के लिए सामाजिक मामलों में सरकारी हस्तक्षेप का भी समर्थन करते हैं। इससे एक स्पष्ट विरोधाभास उत्पन्न होता है, जहाँ वे अर्थव्यवस्था में सरकारी संयम चाहते हैं, लेकिन सामाजिक मानदंडों का सक्रिय प्रवर्तन भी चाहते हैं। अन्य विकल्प इस मूलभूत रूढ़िवादी विरोधाभास को गलत तरीके से प्रस्तुत करते हैं - वे हर जगह न्यूनतम हस्तक्षेप नहीं चाहते, न ही वे व्यापक आर्थिक विनियमन या पूर्ण सामाजिक नियंत्रण चाहते हैं।
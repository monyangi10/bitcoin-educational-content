question: ¿Qué distingue la filosofía económica de los conservadores de su enfoque de las cuestiones sociales?
answer: Apoyan fuertes libertades económicas pero favorecen la intervención del gobierno para hacer cumplir las normas sociales y morales tradicionales
wrong_answers:
  - Abogan por una mínima intervención gubernamental en las esferas económica y social por igual
  - Apoyan una amplia regulación gubernamental en economía, al tiempo que promueven un libertarianismo social completo
  - Están a favor de un fuerte control estatal tanto de los mercados económicos como de los comportamientos sociales individuales
explanation: |
  Los conservadores muestran un enfoque dual distintivo: defienden la libertad económica a través de una fiscalidad baja, una regulación mínima de los negocios y la libre empresa,
  al tiempo que apoyan la intervención del gobierno en asuntos sociales para defender los valores tradicionales, el orden y las normas morales. Esto crea una aparente contradicción en la que quieren que el gobierno restrinja la economía pero aplique activamente las normas sociales. Las otras opciones tergiversan esta tensión conservadora fundamental: no buscan una intervención mínima en todas partes, ni quieren una regulación económica extensiva o un control social completo.
question: Какво отличава икономическата философия на консерваторите от подхода им към социалните въпроси?
answer: Подкрепят силните икономически свободи, но подкрепят държавната намеса за налагане на традиционните социални и морални норми
wrong_answers:
  - Те се застъпват за минимална държавна намеса както в икономическата, така и в социалната сфера
  - Те подкрепят широкото държавно регулиране в икономиката, като същевременно насърчават пълен социален либертариански подход
  - Те подкрепят силния държавен контрол както върху икономическите пазари, така и върху индивидуалното социално поведение
explanation: |
  Консерваторите се отличават с двойствен подход: те защитават икономическата свобода чрез ниско данъчно облагане, минимално регулиране на бизнеса и свободно предприемачество,
  и същевременно подкрепят държавната намеса в социалната сфера, за да поддържат традиционните ценности, ред и морални норми. Това създава привидно противоречие, при което те искат правителствена сдържаност в икономиката, но активно прилагане на социалните норми. Другите варианти представят погрешно това фундаментално консервативно напрежение - те не се стремят към минимална намеса навсякъде, нито пък искат широко икономическо регулиране или пълен социален контрол.
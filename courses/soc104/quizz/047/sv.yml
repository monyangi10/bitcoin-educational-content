question: Vad skiljer de konservativas ekonomiska filosofi från deras inställning till sociala frågor?
answer: De stöder starka ekonomiska friheter men föredrar att staten ingriper för att upprätthålla traditionella sociala och moraliska normer
wrong_answers:
  - De förespråkar minimal statlig inblandning i både ekonomiska och sociala frågor
  - De stöder omfattande statlig reglering av ekonomin samtidigt som de förespråkar fullständig social libertarianism
  - De förespråkar stark statlig kontroll över både ekonomiska marknader och individuella sociala beteenden
explanation: |
  Konservativa har en distinkt dubbel strategi: de förespråkar ekonomisk frihet genom låg beskattning, minimal reglering av företag och fri företagsamhet,
  samtidigt som de stöder statligt ingripande i sociala frågor för att upprätthålla traditionella värderingar, ordning och moraliska standarder. Detta skapar en skenbar motsägelse där de vill ha statlig återhållsamhet i ekonomin men aktiv verkställighet av sociala normer. De andra alternativen ger en felaktig bild av denna grundläggande konservativa spänning - de eftersträvar inte minimalt ingripande överallt, och de vill inte heller ha omfattande ekonomisk reglering eller fullständig social kontroll.
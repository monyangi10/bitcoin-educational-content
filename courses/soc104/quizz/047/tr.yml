question: Muhafazakârların ekonomi felsefesini sosyal konulara yaklaşımlarından ayıran nedir?
answer: Güçlü ekonomik özgürlükleri desteklerler ancak geleneksel sosyal ve ahlaki normları uygulamak için devlet müdahalesini tercih ederler
wrong_answers:
  - Hem ekonomik hem de sosyal alanlarda asgari düzeyde devlet müdahalesini eşit şekilde savunurlar
  - Ekonomide kapsamlı devlet düzenlemelerini desteklerken, tam bir sosyal özgürlükçülüğü savunurlar
  - Hem ekonomik piyasalar hem de bireysel sosyal davranışlar üzerinde güçlü devlet kontrolünü desteklemektedirler
explanation: |
  Muhafazakârlar kendilerine özgü ikili bir yaklaşım sergilerler: düşük vergilendirme, asgari ticari düzenleme ve serbest girişim yoluyla ekonomik özgürlüğü savunurlar,
  aynı zamanda geleneksel değerleri, düzeni ve ahlaki standartları korumak için sosyal konularda devlet müdahalesini desteklemektedir. Bu, hükümetin ekonomide kısıtlama yapmasını ancak sosyal normların aktif olarak uygulanmasını istedikleri görünür bir çelişki yaratır. Diğer seçenekler bu temel muhafazakar gerilimi yanlış yansıtmaktadır - her yerde asgari müdahale istemedikleri gibi, kapsamlı ekonomik düzenleme veya tam sosyal kontrol de istememektedirler.
question: Điều gì tạo nên sự khác biệt giữa triết lý kinh tế của phe bảo thủ và cách tiếp cận của họ đối với các vấn đề xã hội?
answer: Họ ủng hộ các quyền tự do kinh tế mạnh mẽ nhưng lại tán thành sự can thiệp của chính phủ để duy trì các chuẩn mực xã hội và đạo đức truyền thống.
wrong_answers:
  - Họ chủ trương chính phủ can thiệp tối thiểu vào cả lĩnh vực kinh tế và xã hội một cách bình đẳng.
  - Họ ủng hộ việc chính phủ can thiệp sâu rộng vào kinh tế đồng thời thúc đẩy chủ nghĩa tự do xã hội hoàn toàn.
  - Họ ủng hộ sự kiểm soát mạnh mẽ của nhà nước đối với cả thị trường kinh tế và hành vi xã hội cá nhân.
explanation: |
  Phe bảo thủ thể hiện một cách tiếp cận kép đặc trưng: họ ủng hộ tự do kinh tế thông qua thuế thấp, quy định kinh doanh tối thiểu và doanh nghiệp tự do, đồng thời ủng hộ sự can thiệp của chính phủ vào các vấn đề xã hội để duy trì các giá trị truyền thống, trật tự và chuẩn mực đạo đức. Điều này tạo ra một mâu thuẫn rõ ràng khi họ muốn chính phủ kiềm chế kinh tế nhưng lại tích cực thực thi các chuẩn mực xã hội. Các lựa chọn khác đã xuyên tạc sự căng thẳng cơ bản này của phe bảo thủ - họ không tìm kiếm sự can thiệp tối thiểu ở mọi nơi, cũng không muốn quy định kinh tế rộng rãi hoặc kiểm soát xã hội hoàn toàn.
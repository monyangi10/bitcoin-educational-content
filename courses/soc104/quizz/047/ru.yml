question: Что отличает экономическую философию консерваторов от их подхода к социальным вопросам?
answer: Они поддерживают сильные экономические свободы, но выступают за вмешательство государства для обеспечения соблюдения традиционных социальных и моральных норм
wrong_answers:
  - Они выступают за минимальное вмешательство государства как в экономическую, так и в социальную сферу
  - Они поддерживают широкое государственное регулирование в экономике и при этом выступают за полное социальное либертарианство
  - Они выступают за жесткий государственный контроль как над экономическими рынками, так и над социальным поведением людей
explanation: |
  Консерваторы демонстрируют характерный двойной подход: они отстаивают экономическую свободу через низкое налогообложение, минимальное регулирование бизнеса и свободное предпринимательство,
  и одновременно поддерживают вмешательство государства в социальные вопросы для поддержания традиционных ценностей, порядка и моральных норм. Это создает кажущееся противоречие, когда они хотят, чтобы правительство сдерживало экономику, но активно следило за соблюдением социальных норм. Другие варианты искажают это фундаментальное консервативное противоречие - они не стремятся к минимальному вмешательству повсеместно, не хотят обширного экономического регулирования или полного социального контроля.
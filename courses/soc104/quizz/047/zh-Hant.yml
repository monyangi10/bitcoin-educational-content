question: 保守派的經濟哲學與他們處理社會議題的方式有何差異？
answer: 他們支持強大的經濟自由，但贊成政府干預以強制執行傳統的社會和道德規範
wrong_answers:
  - 他們主張政府在經濟和社會領域的干預應同樣減至最少。
  - 他們支持廣泛的政府經濟規範，同時提倡完全的社會自由主義
  - 他們傾向於國家對經濟市場和個人社會行為的強力控制
explanation: |
  保守派表現出獨特的雙重方法：他們透過低稅率、最低限度的商業管制和自由企業來主張經濟自由、
  同時支持政府介入社會事務，以維護傳統價值觀、秩序和道德標準。這就產生了一個明顯的矛盾：他們希望政府在經濟方面有所克制，但又積極執行社會規範。其他選項歪曲了這個基本的保守派緊張關係 - 他們並非處處尋求最低限度的干預，也不想要廣泛的經濟規範或完全的社會控制。
question: 보수주의자들의 경제 철학이 사회 문제에 대한 접근 방식과 다른 점은 무엇인가요?
answer: 이들은 강력한 경제적 자유를 지지하지만 전통적인 사회적, 도덕적 규범을 시행하기 위한 정부의 개입을 선호합니다
wrong_answers:
  - 이들은 경제와 사회 영역 모두에서 정부의 개입을 최소화해야 한다고 주장합니다
  - 이들은 경제에 대한 정부의 광범위한 규제를 지지하는 동시에 완전한 사회적 자유주의를 장려합니다
  - 이들은 경제 시장과 개인의 사회적 행동 모두에 대한 국가의 강력한 통제를 선호합니다
explanation: |
  보수주의자들은 낮은 세금, 최소한의 기업 규제, 자유 기업 등을 통해 경제적 자유를 옹호하는 동시에 전통적인 가치와 질서, 도덕적 규범을 지키기 위해 정부의 사회 개입을 지지하는 독특한 이중적 접근 방식을 보입니다,
  동시에 전통적인 가치와 질서, 도덕적 기준을 지키기 위해 사회 문제에 대한 정부의 개입을 지지합니다. 이는 경제에 대해서는 정부의 자제를 원하지만 사회 규범에 대해서는 적극적인 집행을 원하는 명백한 모순을 낳습니다. 다른 옵션은 이러한 근본적인 보수적 긴장을 잘못 표현한 것으로, 모든 분야에 최소한의 개입을 추구하지 않으며 광범위한 경제 규제나 완전한 사회 통제를 원하지도 않습니다.
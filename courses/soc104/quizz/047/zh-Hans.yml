question: 保守派的经济理念与他们处理社会问题的方法有何不同？
answer: 他们支持强大的经济自由，但赞成政府干预，以执行传统的社会和道德规范
wrong_answers:
  - 他们主张在经济和社会领域平等地尽量减少政府干预
  - 他们支持政府在经济领域的广泛监管，同时提倡完全的社会自由主义
  - 他们赞成国家对经济市场和个人社会行为进行强有力的控制
explanation: |
  保守派表现出独特的双重态度：他们通过低税收、最低限度的商业监管和自由企业来倡导经济自由、
  同时支持政府干预社会事务，以维护传统价值观、秩序和道德标准。这就产生了一个明显的矛盾，即他们希望政府在经济方面有所克制，但又积极执行社会规范。其他选项歪曲了这一基本的保守派矛盾--他们并不寻求在任何地方都进行最低限度的干预，也不希望进行广泛的经济监管或完全的社会控制。
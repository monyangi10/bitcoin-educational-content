question: O que distingue a filosofia económica dos conservadores da sua abordagem às questões sociais?
answer: Apoiam fortes liberdades económicas, mas favorecem a intervenção do governo para fazer cumprir as normas sociais e morais tradicionais
wrong_answers:
  - Defendem uma intervenção mínima do governo nas esferas económica e social de forma igualitária
  - Apoiam uma regulamentação governamental alargada no domínio da economia, ao mesmo tempo que promovem um libertarianismo social completo
  - São a favor de um forte controlo estatal sobre os mercados económicos e os comportamentos sociais individuais
explanation: |
  Os conservadores exibem uma abordagem dupla distinta: defendem a liberdade económica através de impostos baixos, regulamentação empresarial mínima e livre iniciativa,
  ao mesmo tempo que apoiam a intervenção do governo em questões sociais para defender os valores tradicionais, a ordem e as normas morais. Isto cria uma aparente contradição, na medida em que querem a contenção do governo na economia, mas a aplicação ativa das normas sociais. As outras opções deturpam esta tensão conservadora fundamental - não procuram uma intervenção mínima em todo o lado, nem pretendem uma regulamentação económica extensiva ou um controlo social completo.
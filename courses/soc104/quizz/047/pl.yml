question: Co odróżnia filozofię ekonomiczną konserwatystów od ich podejścia do kwestii społecznych?
answer: Popierają silne swobody gospodarcze, ale opowiadają się za interwencją rządu w celu egzekwowania tradycyjnych norm społecznych i moralnych
wrong_answers:
  - Opowiadają się za minimalną interwencją rządu zarówno w sferze gospodarczej, jak i społecznej
  - Popierają rozległe regulacje rządowe w ekonomii, jednocześnie promując całkowity libertarianizm społeczny
  - Opowiadają się za silną kontrolą państwa zarówno nad rynkami gospodarczymi, jak i indywidualnymi zachowaniami społecznymi
explanation: |
  Konserwatyści wykazują charakterystyczne podwójne podejście: bronią wolności gospodarczej poprzez niskie podatki, minimalne regulacje biznesowe i wolną przedsiębiorczość,
  jednocześnie wspierając interwencję rządu w sprawy społeczne w celu utrzymania tradycyjnych wartości, porządku i standardów moralnych. Tworzy to pozorną sprzeczność, w której chcą rządowej powściągliwości w ekonomii, ale aktywnego egzekwowania norm społecznych. Inne opcje błędnie przedstawiają to fundamentalne konserwatywne napięcie - nie dążą oni do minimalnej interwencji wszędzie, ani nie chcą szerokiej regulacji gospodarczej lub pełnej kontroli społecznej.
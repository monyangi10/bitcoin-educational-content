question: چه چیزی فلسفه اقتصادی محافظه‌کاران را از رویکرد آنها به مسائل اجتماعی متمایز می‌کند؟
answer: آن‌ها از آزادی‌های اقتصادی قوی حمایت می‌کنند اما طرفدار مداخله دولت برای اجرای هنجارهای اجتماعی و اخلاقی سنتی هستند.
wrong_answers:
  - آن‌ها به طور مساوی از حداقل مداخله دولت در هر دو حوزه اقتصادی و اجتماعی حمایت می‌کنند.
  - آن‌ها از مقررات گسترده دولتی در اقتصاد حمایت می‌کنند و در عین حال لیبرترینیسم اجتماعی کامل را ترویج می‌دهند.
  - آن‌ها کنترل قوی دولت بر بازارهای اقتصادی و رفتارهای اجتماعی فردی را ترجیح می‌دهند.
explanation: |
  محافظه‌کاران رویکرد دوگانه‌ای متمایز را نشان می‌دهند: آنها آزادی اقتصادی را از طریق مالیات پایین، حداقل مقررات تجاری و کسب‌وکار آزاد ترویج می‌کنند، 
  در حالی که به طور همزمان از مداخله دولت در امور اجتماعی برای حفظ ارزش‌های سنتی، نظم و استانداردهای اخلاقی حمایت می‌کنند. این امر تناقض ظاهری ایجاد می‌کند که آنها خواهان محدودیت دولت در اقتصاد هستند اما اجرای فعال هنجارهای اجتماعی را می‌خواهند. گزینه‌های دیگر این تنش اساسی محافظه‌کارانه را نادرست نشان می‌دهند - آنها به دنبال حداقل مداخله در همه جا نیستند و نه خواهان مقررات گسترده اقتصادی یا کنترل کامل اجتماعی هستند.
question: Was unterscheidet die Wirtschaftsphilosophie der Konservativen von ihrer Einstellung zu sozialen Fragen?
answer: Sie unterstützen starke wirtschaftliche Freiheiten, befürworten aber staatliche Eingriffe zur Durchsetzung traditioneller sozialer und moralischer Normen
wrong_answers:
  - Sie plädieren für ein Minimum an staatlichen Eingriffen sowohl im wirtschaftlichen als auch im sozialen Bereich
  - Sie befürworten eine umfassende staatliche Regulierung der Wirtschaft, während sie gleichzeitig für einen vollständigen sozialen Libertarismus eintreten
  - Sie befürworten eine starke staatliche Kontrolle sowohl der Wirtschaftsmärkte als auch des individuellen Sozialverhaltens
explanation: |
  Die Konservativen verfolgen einen ausgeprägten dualen Ansatz: Sie setzen sich für wirtschaftliche Freiheit durch niedrige Besteuerung, minimale Unternehmensregulierung und freies Unternehmertum ein,
  und unterstützen gleichzeitig staatliche Eingriffe in soziale Angelegenheiten, um traditionelle Werte, Ordnung und moralische Standards aufrechtzuerhalten. Daraus ergibt sich ein scheinbarer Widerspruch: Sie wollen, dass der Staat sich in der Wirtschaft zurückhält, aber soziale Normen aktiv durchsetzt. Die anderen Optionen stellen dieses grundlegende Spannungsfeld der Konservativen falsch dar - sie streben weder überall eine minimale Intervention an, noch wollen sie eine umfassende wirtschaftliche Regulierung oder eine vollständige soziale Kontrolle.
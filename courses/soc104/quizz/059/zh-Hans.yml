question: 根据凯恩斯主义经济理论，政府干预经济的主要作用是什么？
answer: 利用财政和货币政策，在经济衰退时刺激需求，在经济过热时冷却需求，从而稳定经济周期
wrong_answers:
  - 以中央集权的国家计划完全取代市场机制，消灭一切形式的私营企业
  - 坚持严格的自由放任政策，让市场自我调节，不受任何政府干预
  - 只关注货币政策，避免任何财政干预或公共支出调整
explanation: |
  凯恩斯主义理论主张政府通过财政政策（公共开支、税收）和货币政策（利率）进行积极干预，以管理经济周期。
  这代表了介于纯粹的自由放任资本主义和完全的国家控制之间的 "第三条道路"，通过在经济低迷时刺激需求和在经济过热时缓和需求来寻求平衡，这与中间派的务实经济管理方法是一致的。
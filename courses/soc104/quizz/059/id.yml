question: Menurut teori ekonomi Keynesian, apa peran utama intervensi pemerintah dalam perekonomian?
answer: Menggunakan kebijakan fiskal dan moneter untuk menstabilkan siklus ekonomi dengan menstimulasi permintaan selama resesi dan mendinginkannya saat terjadi overheating
wrong_answers:
  - Untuk sepenuhnya menggantikan mekanisme pasar dengan perencanaan negara yang terpusat dan menghapuskan semua bentuk perusahaan swasta
  - Mempertahankan kebijakan laissez-faire yang ketat dan membiarkan pasar mengatur dirinya sendiri tanpa campur tangan pemerintah
  - Fokus secara eksklusif pada kebijakan moneter sambil menghindari intervensi fiskal atau penyesuaian pengeluaran publik
explanation: |
  Teori Keynesian menganjurkan intervensi aktif pemerintah melalui kebijakan fiskal (pengeluaran publik, perpajakan) dan kebijakan moneter (suku bunga) untuk mengelola siklus ekonomi.
  Ini merupakan 'jalan ketiga' antara kapitalisme laissez-faire murni dan kontrol penuh oleh negara, mencari keseimbangan dengan merangsang permintaan selama penurunan dan memoderasinya selama ekonomi terlalu panas, yang sejalan dengan pendekatan pragmatis sentris terhadap manajemen ekonomi.

question: Prema Kejnzijanskoj ekonomskoj teoriji, koja je primarna uloga intervencije vlade u ekonomiji?
answer: Da bi se koristile fiskalne i monetarne politike za stabilizaciju ekonomskih ciklusa stimulisanjem potražnje tokom recesija i njenim hlađenjem tokom pregrejavanja.
wrong_answers:
  - Da se tržišni mehanizmi potpuno zamene centralizovanim državnim planiranjem i eliminišu svi oblici privatnog preduzetništva
  - Da se održavaju striktne laissez-faire politike i da se tržištima dozvoli da se samoregulišu bez ikakvog mešanja vlade
  - Da se fokusira isključivo na monetarnu politiku, izbegavajući bilo kakvu fiskalnu intervenciju ili prilagođavanje javne potrošnje
explanation: |
  Kejnzijanska teorija zagovara aktivnu intervenciju vlade kroz fiskalne politike (javna potrošnja, oporezivanje) i monetarne politike (kamatne stope) za upravljanje ekonomskim ciklusima. 
  Ovo predstavlja 'treći put' između čistog laissez-faire kapitalizma i potpune državne kontrole, tražeći ravnotežu stimulisanjem potražnje tokom padova i njenim moderiranjem tokom ekonomskog pregrevanja, što se poklapa sa centrističkim pragmatičnim pristupima ekonomskom upravljanju.
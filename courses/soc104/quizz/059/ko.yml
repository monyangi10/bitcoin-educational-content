question: 케인즈주의 경제 이론에 따르면, 경제에서 정부 개입의 주요 역할은 무엇인가요?
answer: 재정 및 통화 정책을 사용하여 경기 침체기에는 수요를 촉진하고 과열기에는 냉각시켜 경제 사이클을 안정화합니다
wrong_answers:
  - 시장 메커니즘을 중앙 집중식 국가 계획으로 완전히 대체하고 모든 형태의 민간 기업을 없애기 위해
  - 엄격한 자유방임 정책을 유지하고 정부의 간섭 없이 시장이 자율적으로 규제할 수 있도록 합니다
  - 재정 개입이나 공공 지출 조정을 피하면서 통화 정책에만 집중하는 것
explanation: |
  케인즈 이론은 경기 순환을 관리하기 위해 재정 정책(공공 지출, 세금)과 통화 정책(금리)을 통한 정부의 적극적인 개입을 옹호합니다.
  이는 순수한 자유방임 자본주의와 완전한 국가 통제 사이의 '제3의 길'로, 경기 침체기에는 수요를 자극하고 경기 과열기에는 이를 완화함으로써 균형을 추구하며, 경제 관리에 대한 중도 실용주의적 접근 방식과 일치합니다.
question: 根據凱恩斯經濟理論，政府干預經濟的主要角色是什麼？
answer: 運用財政與貨幣政策，在經濟衰退時刺激需求，在過熱時冷卻需求，以穩定經濟週期
wrong_answers:
  - 以中央集权的国家计划完全取代市场机制，消除一切形式的私营企业
  - 維持嚴格的自由放任政策，讓市場自我調節，不受任何政府干預
  - 專注於貨幣政策，避免任何財政干預或公共支出調整
explanation: |
  凱恩斯理論主張政府透過財政政策 (公共支出、稅收) 及貨幣政策 (利率) 進行積極干預，以管理經濟週期。
  這代表了介於純粹自由放任資本主義與完全國家控制之間的「第三條道路」，透過在經濟衰退時刺激需求、在經濟過熱時調節需求來尋求平衡，這與中間派務實的經濟管理方法一致。
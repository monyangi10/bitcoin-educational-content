question: According to Keynesian economic theory, what is the primary role of government intervention in the economy?
answer: To use fiscal and monetary policies to stabilize economic cycles by stimulating demand during recessions and cooling it during overheating
wrong_answers:
  - To completely replace market mechanisms with centralized state planning and eliminate all forms of private enterprise
  - To maintain strict laissez-faire policies and allow markets to self-regulate without any government interference whatsoever
  - To focus exclusively on monetary policy while avoiding any fiscal intervention or public spending adjustments
explanation: |
  Keynesian theory advocates for active government intervention through both fiscal policies (public spending, taxation) and monetary policies (interest rates) to manage economic cycles. 
  This represents a 'third way' between pure laissez-faire capitalism and complete state control, seeking balance by stimulating demand during downturns and moderating it during economic overheating, which aligns with centrist pragmatic approaches to economic management.

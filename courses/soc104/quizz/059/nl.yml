question: Wat is volgens de Keynesiaanse economische theorie de belangrijkste rol van overheidsinterventie in de economie?
answer: Fiscaal en monetair beleid gebruiken om economische cycli te stabiliseren door de vraag te stimuleren tijdens recessies en af te koelen tijdens oververhitting
wrong_answers:
  - Het volledig vervangen van marktmechanismen door gecentraliseerde staatsplanning en het elimineren van alle vormen van particulier ondernemerschap
  - Een strikt laissez-faire beleid handhaven en markten zichzelf laten reguleren zonder enige overheidsbemoeienis
  - Uitsluitend focussen op monetair beleid en geen fiscale interventies of aanpassingen van de overheidsuitgaven
explanation: |
  De keynesiaanse theorie pleit voor actieve overheidsinterventie door middel van zowel fiscaal beleid (overheidsuitgaven, belastingen) als monetair beleid (rentetarieven) om economische cycli te beheersen.
  Dit vertegenwoordigt een 'derde weg' tussen puur laissez-faire kapitalisme en volledige staatscontrole, waarbij een evenwicht wordt gezocht door de vraag te stimuleren tijdens een neergang en te matigen tijdens een economische oververhitting, wat overeenkomt met een centristische pragmatische benadering van economisch management.
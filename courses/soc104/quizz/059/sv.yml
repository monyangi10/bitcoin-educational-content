question: Enligt keynesiansk ekonomisk teori, vilken är den primära rollen för statliga ingripanden i ekonomin?
answer: Att använda finans- och penningpolitiken för att stabilisera konjunkturcyklerna genom att stimulera efterfrågan under lågkonjunkturer och kyla av den under överhettning
wrong_answers:
  - Att helt ersätta marknadsmekanismer med centraliserad statlig planering och eliminera alla former av privat företagande
  - Att upprätthålla en strikt laissez-faire-politik och låta marknaderna reglera sig själva utan någon som helst statlig inblandning
  - Att uteslutande fokusera på penningpolitiken och undvika finanspolitiska ingripanden eller justeringar av de offentliga utgifterna
explanation: |
  Keynesiansk teori förespråkar aktiv statlig inblandning genom både finanspolitik (offentliga utgifter, skatter) och penningpolitik (räntor) för att hantera ekonomiska cykler.
  Detta utgör en "tredje väg" mellan ren laissez-faire-kapitalism och fullständig statlig kontroll, där man söker balans genom att stimulera efterfrågan under nedgångsperioder och dämpa den under överhettningsperioder, vilket ligger i linje med centrismens pragmatiska syn på ekonomisk styrning.
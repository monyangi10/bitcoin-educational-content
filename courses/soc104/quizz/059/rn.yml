question: Dushingiye ku ciyumviro c’ubutunzi ca Keynes, ni uruhara uruhe rwa mbere Leta igira mu bijanye n’ubutunzi?
answer: Gukoresha politike z’ubutunzi n’iz’amahera kugira ngo ubutunzi buhagarare neza mu gutuma habaho ugusaba mu gihe c’ugusubira inyuma kw’ubutunzi no kubukonjesha mu gihe c’ugushuha cane .
wrong_answers:
  - Gusubirira burundu uburyo bwo gutanga isoko n'igenamigambi rya Leta ry'imbere mu gihugu no gukuraho ubwoko bwose bw'ibikorwa vy'abikorera ku giti cabo .
  - Gukomeza amategeko akomeye y’uburenganzira bwo gukora no kwemera ko amasoko yigenzura ata n’umwe Leta yivangamwo
  - Kwibanda gusa ku bijanye n’amahera mu gihe umuntu yirinda gufasha mu vy’amahera canke guhindura amahera Leta ikoresha .
explanation: |
  Ivyiyumviro vya Keynes bivuga ko Leta igira ico ikoze biciye mu ngingo ngenderwako z’ubutunzi (amahera ya Leta, imisoro) no mu ngingo ngenderwako z’amahera (inyungu) kugira ngo icungere inzinguzingu z’ubutunzi. 
  Ivyo bigereranya ‘inzira ya gatatu’ hagati y’ubu kapitalizimu butagira agasembwa n’ubugenzuzi bwa Leta bushitse, kurondera uburinganire mu gutuma habaho ugusaba mu gihe c’ugusubira inyuma kw’ubutunzi no kuburinganiza mu gihe c’ugushuha cane kw’ubutunzi, ivyo bikaba bihuye n’uburyo bwo gucunga ubutunzi bw’abanyagihugu.
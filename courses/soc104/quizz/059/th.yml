question: ตามทฤษฎีเศรษฐศาสตร์เคนส์เซียน บทบาทหลักของการแทรกแซงของรัฐบาลในเศรษฐกิจคืออะไร?
answer: การใช้มาตรการทางการคลังและการเงินเพื่อรักษาเสถียรภาพของวัฏจักรเศรษฐกิจโดยการกระตุ้นอุปสงค์ในช่วงเศรษฐกิจถดถอยและลดความร้อนแรงในช่วงเศรษฐกิจร้อนแรง
wrong_answers:
  - เพื่อแทนที่กลไกตลาดด้วยการวางแผนจากรัฐแบบรวมศูนย์อย่างสมบูรณ์และกำจัดรูปแบบของกิจการเอกชนทั้งหมด
  - เพื่อรักษานโยบายปล่อยให้เป็นไปตามธรรมชาติอย่างเคร่งครัดและให้ตลาดควบคุมตนเองโดยปราศจากการแทรกแซงจากรัฐบาลใด ๆ ทั้งสิ้น
  - มุ่งเน้นเฉพาะนโยบายการเงินในขณะที่หลีกเลี่ยงการแทรกแซงทางการคลังหรือการปรับการใช้จ่ายสาธารณะ
explanation: |
  ทฤษฎีเคนส์เน้นการแทรกแซงของรัฐบาลอย่างแข็งขันผ่านนโยบายการคลัง (การใช้จ่ายสาธารณะ, การเก็บภาษี) และนโยบายการเงิน (อัตราดอกเบี้ย) เพื่อจัดการกับวัฏจักรเศรษฐกิจ ซึ่งเป็นการนำเสนอ 'ทางเลือกที่สาม' ระหว่างทุนนิยมแบบปล่อยเสรีและการควบคุมโดยรัฐอย่างสมบูรณ์ โดยมุ่งหาความสมดุลผ่านการกระตุ้นอุปสงค์ในช่วงเศรษฐกิจตกต่ำและการควบคุมในช่วงเศรษฐกิจร้อนแรง ซึ่งสอดคล้องกับแนวทางการจัดการเศรษฐกิจแบบปฏิบัตินิยมที่อยู่ตรงกลาง
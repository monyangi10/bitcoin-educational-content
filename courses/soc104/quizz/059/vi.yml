question: Theo lý thuyết kinh tế Keynes, vai trò chính của sự can thiệp của chính phủ vào nền kinh tế là gì?
answer: Sử dụng các chính sách tài khóa và tiền tệ để ổn định chu kỳ kinh tế bằng cách kích thích nhu cầu trong thời kỳ suy thoái và hạ nhiệt nhu cầu trong thời kỳ kinh tế quá nóng.
wrong_answers:
  - Thay thế hoàn toàn cơ chế thị trường bằng kế hoạch hóa tập trung của nhà nước và loại bỏ mọi hình thức doanh nghiệp tư nhân.
  - Duy trì chính sách tự do kinh tế nghiêm ngặt và cho phép thị trường tự điều chỉnh mà không có bất kỳ sự can thiệp nào của chính phủ.
  - Tập trung hoàn toàn vào chính sách tiền tệ mà không can thiệp vào chính sách tài khóa hay điều chỉnh chi tiêu công.
explanation: |
  Lý thuyết Keynes chủ trương sự can thiệp tích cực của chính phủ thông qua cả chính sách tài khóa (chi tiêu công, thuế) và chính sách tiền tệ (lãi suất) để quản lý chu kỳ kinh tế.
  
  Điều này thể hiện một "con đường thứ ba" giữa chủ nghĩa tư bản tự do thuần túy và sự kiểm soát hoàn toàn của nhà nước, tìm kiếm sự cân bằng bằng cách kích thích nhu cầu trong thời kỳ suy thoái và điều tiết nhu cầu trong thời kỳ kinh tế quá nóng, phù hợp với các phương pháp quản lý kinh tế thực dụng theo chủ nghĩa trung dung.
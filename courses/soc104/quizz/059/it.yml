question: Secondo la teoria economica keynesiana, qual è il ruolo principale dell'intervento pubblico nell'economia?
answer: Utilizzare le politiche fiscali e monetarie per stabilizzare i cicli economici, stimolando la domanda durante le recessioni e raffreddandola durante il surriscaldamento
wrong_answers:
  - Sostituire completamente i meccanismi di mercato con una pianificazione statale centralizzata ed eliminare ogni forma di impresa privata
  - Mantenere politiche rigorose di laissez-faire e permettere ai mercati di autoregolarsi senza alcuna interferenza governativa
  - Concentrarsi esclusivamente sulla politica monetaria, evitando qualsiasi intervento fiscale o adeguamento della spesa pubblica
explanation: |
  La teoria keynesiana sostiene l'intervento attivo del governo attraverso politiche fiscali (spesa pubblica, tassazione) e monetarie (tassi di interesse) per gestire i cicli economici.
  Si tratta di una "terza via" tra il puro capitalismo laissez-faire e il completo controllo statale, che cerca l'equilibrio stimolando la domanda durante le flessioni e moderandola durante il surriscaldamento economico, in linea con gli approcci pragmatici centristi alla gestione economica.
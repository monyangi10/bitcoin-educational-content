question: Jaka jest główna rola interwencji rządu w gospodarkę według keynesowskiej teorii ekonomicznej?
answer: Wykorzystanie polityki fiskalnej i monetarnej do ustabilizowania cykli gospodarczych poprzez stymulowanie popytu podczas recesji i chłodzenie go podczas przegrzania
wrong_answers:
  - Całkowite zastąpienie mechanizmów rynkowych scentralizowanym planowaniem państwowym i wyeliminowanie wszelkich form prywatnej przedsiębiorczości
  - Utrzymanie ścisłej polityki leseferyzmu i umożliwienie rynkom samoregulacji bez jakiejkolwiek ingerencji ze strony rządu
  - Skupienie się wyłącznie na polityce pieniężnej przy jednoczesnym unikaniu jakichkolwiek interwencji fiskalnych lub dostosowań wydatków publicznych
explanation: |
  Teoria keynesowska opowiada się za aktywną interwencją rządu zarówno poprzez politykę fiskalną (wydatki publiczne, podatki), jak i politykę pieniężną (stopy procentowe) w celu zarządzania cyklami gospodarczymi.
  Reprezentuje to "trzecią drogę" między czystym kapitalizmem leseferystycznym a pełną kontrolą państwa, dążąc do równowagi poprzez stymulowanie popytu w okresach spowolnienia gospodarczego i łagodzenie go podczas przegrzania gospodarczego, co jest zgodne z centrowym pragmatycznym podejściem do zarządzania gospodarczego.
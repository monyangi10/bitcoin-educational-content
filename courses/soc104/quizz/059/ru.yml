question: Согласно кейнсианской экономической теории, какова основная роль государственного вмешательства в экономику?
answer: Использование фискальной и монетарной политики для стабилизации экономических циклов путем стимулирования спроса во время спадов и его охлаждения во время перегрева
wrong_answers:
  - Полностью заменить рыночные механизмы централизованным государственным планированием и ликвидировать все формы частного предпринимательства
  - Поддерживать строгую политику laissez-faire и позволить рынкам саморегулироваться без какого-либо государственного вмешательства
  - Сосредоточиться исключительно на денежно-кредитной политике, избегая любых фискальных интервенций или корректировок государственных расходов
explanation: |
  Кейнсианская теория выступает за активное вмешательство государства в экономические циклы посредством как фискальной (государственные расходы, налогообложение), так и монетарной политики (процентные ставки).
  Это представляет собой "третий путь" между чистым капитализмом laissez-faire и полным контролем государства, стремящегося к равновесию путем стимулирования спроса во время спадов и его сдерживания во время экономического перегрева, что соответствует прагматическим подходам центристов к управлению экономикой.
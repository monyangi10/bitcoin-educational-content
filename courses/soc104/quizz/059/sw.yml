question: Kulingana na nadharia ya kiuchumi ya Keynes, jukumu kuu la serikali kuingilia kati katika uchumi ni lipi?
answer: Kutumia sera za fedha na fedha ili kuleta utulivu katika mizunguko ya kiuchumi kwa kuchochea mahitaji wakati wa mdororo wa uchumi na kuyapunguza wakati wa ongezeko la joto
wrong_answers:
  - Kubadilisha kabisa mifumo ya soko na mipango ya serikali kuu na kuondoa aina zote za biashara binafsi
  - Kudumisha sera kali za uhuru na kuruhusu masoko kujidhibiti bila kuingiliwa na serikali yoyote.
  - Kuzingatia sera ya fedha pekee huku ikiepuka uingiliaji kati wa fedha au marekebisho ya matumizi ya umma
explanation: |
  Nadharia ya Keynes inatetea uingiliaji kati wa serikali kupitia sera za fedha (matumizi ya umma, kodi) na sera za fedha (viwango vya riba) ili kudhibiti mizunguko ya kiuchumi.
  
  Hii inawakilisha 'njia ya tatu' kati ya ubepari wa uhuru wa kufanya kazi na udhibiti kamili wa serikali, kutafuta usawa kwa kuchochea mahitaji wakati wa kushuka kwa uchumi na kuyadhibiti wakati wa kuongezeka kwa joto la uchumi, ambalo linaendana na mbinu za kivitendo za usimamizi wa uchumi zenye mwelekeo wa kati.
question: Jaká je podle keynesiánské ekonomické teorie hlavní úloha vládních zásahů do ekonomiky?
answer: Využití fiskální a měnové politiky ke stabilizaci hospodářských cyklů prostřednictvím stimulace poptávky během recese a jejího ochlazování během přehřátí
wrong_answers:
  - Zcela nahradit tržní mechanismy centralizovaným státním plánováním a odstranit všechny formy soukromého podnikání
  - Zachovat přísnou politiku laissez-faire a umožnit trhům samoregulaci bez jakýchkoli zásahů státu
  - Zaměřit se výhradně na měnovou politiku a vyhnout se jakýmkoli fiskálním zásahům nebo úpravám veřejných výdajů
explanation: |
  Keynesiánská teorie prosazuje aktivní zásahy vlády prostřednictvím fiskální politiky (veřejné výdaje, daně) a měnové politiky (úrokové sazby) k řízení hospodářských cyklů.
  To představuje "třetí cestu" mezi čistým laissez-faire kapitalismem a úplnou státní kontrolou, která se snaží o rovnováhu prostřednictvím stimulace poptávky v době poklesu a jejího zmírnění v době přehřátí ekonomiky, což odpovídá centristickým pragmatickým přístupům k řízení ekonomiky.
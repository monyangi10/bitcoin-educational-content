question: De acordo com a teoria económica keynesiana, qual é o principal papel da intervenção do Estado na economia?
answer: Utilizar as políticas orçamentais e monetárias para estabilizar os ciclos económicos, estimulando a procura durante as recessões e arrefecendo-a durante o sobreaquecimento
wrong_answers:
  - Substituir completamente os mecanismos de mercado por um planeamento estatal centralizado e eliminar todas as formas de iniciativa privada
  - Manter políticas estritas de laissez-faire e permitir que os mercados se auto-regulem sem qualquer interferência do governo
  - Concentrar-se exclusivamente na política monetária, evitando qualquer intervenção orçamental ou ajustamento das despesas públicas
explanation: |
  A teoria keynesiana defende a intervenção ativa do Estado através de políticas fiscais (despesa pública, tributação) e monetárias (taxas de juro) para gerir os ciclos económicos.
  Esta teoria representa uma "terceira via" entre o capitalismo puro do laissez-faire e o controlo total do Estado, procurando o equilíbrio através do estímulo da procura durante as recessões e da sua moderação durante o sobreaquecimento económico, o que está de acordo com as abordagens pragmáticas centristas da gestão económica.
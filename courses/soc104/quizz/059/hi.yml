question: कीन्सियन आर्थिक सिद्धांत के अनुसार, अर्थव्यवस्था में सरकारी हस्तक्षेप की प्राथमिक भूमिका क्या है?
answer: आर्थिक चक्रों को स्थिर करने के लिए राजकोषीय और मौद्रिक नीतियों का उपयोग करना, मंदी के दौरान मांग को प्रोत्साहित करना और अतिवृद्धि के दौरान इसे कम करना।
wrong_answers:
  - बाजार तंत्र को पूरी तरह से केंद्रीकृत राज्य नियोजन से बदलना और निजी उद्यम के सभी रूपों को समाप्त करना।
  - सख्त मुक्त बाजार नीतियों को बनाए रखना और बाजारों को बिना किसी सरकारी हस्तक्षेप के स्व-नियमन की अनुमति देना।
  - किसी भी प्रकार के राजकोषीय हस्तक्षेप या सार्वजनिक व्यय समायोजन से बचते हुए, केवल मौद्रिक नीति पर ध्यान केंद्रित करना।
explanation: |
  कीन्सियन सिद्धांत आर्थिक चक्रों को नियंत्रित करने के लिए राजकोषीय नीतियों (सार्वजनिक व्यय, कराधान) और मौद्रिक नीतियों (ब्याज दरें) दोनों के माध्यम से सक्रिय सरकारी हस्तक्षेप की वकालत करता है।
  यह शुद्ध मुक्त बाज़ार पूंजीवाद और पूर्ण राज्य नियंत्रण के बीच एक 'तीसरा मार्ग' प्रस्तुत करता है, जो आर्थिक मंदी के दौरान मांग को प्रोत्साहित करके और आर्थिक अतिभार के दौरान इसे नियंत्रित करके संतुलन स्थापित करने का प्रयास करता है, जो आर्थिक प्रबंधन के मध्यमार्गी व्यावहारिक दृष्टिकोणों के अनुरूप है।
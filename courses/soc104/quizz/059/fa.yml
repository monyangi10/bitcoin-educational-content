question: بر اساس نظریه اقتصادی کینزی، نقش اصلی مداخله دولت در اقتصاد چیست؟
answer: استفاده از سیاست‌های مالی و پولی برای تثبیت چرخه‌های اقتصادی با تحریک تقاضا در دوران رکود و کاهش آن در دوران گرمای بیش از حد اقتصادی
wrong_answers:
  - برای جایگزینی کامل مکانیسم‌های بازار با برنامه‌ریزی متمرکز دولتی و حذف تمام اشکال بنگاه‌های خصوصی
  - برای حفظ سیاست‌های سخت‌گیرانه لسه‌فر و اجازه دادن به بازارها برای خودتنظیمی بدون هیچ‌گونه دخالت دولت
  - تمرکز انحصاری بر سیاست پولی در حالی که از هرگونه مداخله مالی یا تنظیمات هزینه‌های عمومی اجتناب شود
explanation: |
  نظریه کینزی طرفدار مداخله فعال دولت از طریق سیاست‌های مالی (هزینه‌های عمومی، مالیات) و سیاست‌های پولی (نرخ بهره) برای مدیریت چرخه‌های اقتصادی است. 
  این نظریه یک «راه سوم» بین سرمایه‌داری خالص لسه‌فر و کنترل کامل دولتی را نشان می‌دهد که با تحریک تقاضا در دوران رکود و تعدیل آن در دوران رونق اقتصادی، به دنبال تعادل است و با رویکردهای عمل‌گرایانه میانه‌رو به مدیریت اقتصادی همسو می‌شود.
question: Каква е основната роля на държавната намеса в икономиката според кейнсианската икономическа теория?
answer: Използване на фискални и парични политики за стабилизиране на икономическите цикли чрез стимулиране на търсенето по време на рецесия и охлаждане по време на прегряване
wrong_answers:
  - Да замени изцяло пазарните механизми с централизирано държавно планиране и да премахне всички форми на частно предприемачество
  - Да се поддържат строги политики на laissez-faire и да се позволи на пазарите да се саморегулират без каквато и да е държавна намеса
  - Да се съсредоточи изключително върху паричната политика, като избягва всякаква фискална намеса или корекции на публичните разходи
explanation: |
  Кейнсианската теория се застъпва за активна намеса на държавата чрез фискални политики (публични разходи, данъци) и парични политики (лихвени проценти) за управление на икономическите цикли.
  Това представлява "трети път" между чистия laissez-faire капитализъм и пълния държавен контрол, като се търси баланс чрез стимулиране на търсенето по време на спадове и ограничаването му по време на прегряване на икономиката, което съответства на центристкия прагматичен подход към управлението на икономиката.
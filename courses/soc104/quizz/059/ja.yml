question: ケインズ経済理論によれば、経済における政府介入の主な役割は何か？
answer: 景気後退期には需要を刺激し、過熱期には需要を冷やすことによって、景気循環を安定させるために財政・金融政策を用いること。
wrong_answers:
  - 市場メカニズムを中央集権的な国家計画に完全に置き換え、あらゆる形態の民間企業を排除する。
  - 厳格な自由放任政策を維持し、政府の干渉を一切受けることなく市場の自主規制を認める。
  - 財政介入や公共支出の調整を避け、金融政策のみに焦点を当てる。
explanation: |
  ケインズ理論では、景気循環を管理するために、財政政策（公共支出、税制）と金融政策（金利）の両方を通じて政府が積極的に介入することを提唱している。
  これは、純粋な自由放任資本主義と完全な国家統制の間の「第三の道」を示すもので、景気後退局面では需要を刺激し、景気過熱局面では需要を緩和することでバランスを取ろうとするもので、経済管理に対する中道主義的な現実主義的アプローチと一致する。
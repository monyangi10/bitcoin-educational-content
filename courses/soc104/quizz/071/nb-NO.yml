question: Hvilken politisk familie vil mest sannsynlig støtte en politikk som kombinerer universell tilgang til helsetjenester med innovasjon og effektiviseringsmekanismer i privat sektor?
answer: Sentrumsorienterte, som foretrekker blandede systemer som balanserer offentlige garantier med bidrag fra privat sektor
wrong_answers:
  - Sosialister, som prioriterer universell tilgang gjennom utelukkende offentlige helsesystemer
  - Libertarianere, som går inn for fullstendig privatisering og individuelle valgmuligheter i helsemarkedet
  - Konservative, som foretrekker private markeder med minimal statlig inngripen for de mest sårbare
explanation: |
  Sentrumsorienterte tar eksplisitt til orde for blandede helsesystemer som garanterer universell tilgang gjennom statlig involvering, samtidig som de innlemmer elementer fra privat sektor for innovasjon og effektivitet.
  Sosialister avviser privat involvering, og ser på helsetjenester som en grunnleggende rettighet som krever offentlig tilbud. Libertarianere er helt imot statlig involvering og foretrekker markedsbaserte løsninger. Konservative foretrekker overveiende private systemer med minimal statlig rolle, ikke balanserte blandingsløsninger.
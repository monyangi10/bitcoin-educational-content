question: Golongan politik mana yang paling mungkin mendukung kebijakan yang menggabungkan akses layanan kesehatan universal dengan mekanisme inovasi dan efisiensi sektor swasta?
answer: Sentris, yang mendukung sistem campuran yang menyeimbangkan jaminan publik dengan kontribusi sektor swasta
wrong_answers:
  - Sosialis, yang memprioritaskan akses universal melalui sistem perawatan kesehatan publik secara eksklusif
  - Libertarian, yang mengadvokasi privatisasi penuh dan pilihan individu dalam pasar perawatan kesehatan
  - Konservatif, yang lebih memilih pasar swasta dengan intervensi negara yang minimal untuk kelompok yang paling rentan
explanation: |
  Kaum sentris secara eksplisit mengadvokasi sistem perawatan kesehatan campuran yang menjamin akses universal melalui keterlibatan negara sambil memasukkan elemen-elemen sektor swasta untuk inovasi dan efisiensi.
  Kaum sosialis menolak keterlibatan swasta, dan memandang perawatan kesehatan sebagai hak fundamental yang membutuhkan penyediaan publik. Kaum Libertarian menentang keterlibatan pemerintah sepenuhnya, dan lebih memilih solusi berbasis pasar. Kaum konservatif lebih menyukai sistem yang didominasi oleh swasta dengan peran negara yang minimal, bukan pendekatan campuran yang seimbang.

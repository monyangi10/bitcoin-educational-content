question: Która rodzina polityczna najprawdopodobniej poparłaby politykę łączącą powszechny dostęp do opieki zdrowotnej z innowacjami i mechanizmami wydajności sektora prywatnego?
answer: Centryści, którzy preferują systemy mieszane równoważące gwarancje publiczne z wkładem sektora prywatnego
wrong_answers:
  - Socjaliści, którzy priorytetowo traktują powszechny dostęp poprzez wyłącznie publiczne systemy opieki zdrowotnej
  - Libertarianie, którzy opowiadają się za całkowitą prywatyzacją i indywidualnym wyborem na rynku opieki zdrowotnej
  - Konserwatyści, którzy preferują prywatne rynki z minimalną interwencją państwa dla najbardziej narażonych
explanation: |
  Centryści wyraźnie opowiadają się za mieszanymi systemami opieki zdrowotnej, które gwarantują powszechny dostęp poprzez zaangażowanie państwa, przy jednoczesnym włączeniu elementów sektora prywatnego w celu zapewnienia innowacji i wydajności.
  Socjaliści odrzucają prywatne zaangażowanie, postrzegając opiekę zdrowotną jako podstawowe prawo wymagające publicznego świadczenia. Libertarianie całkowicie sprzeciwiają się zaangażowaniu rządu, preferując rozwiązania rynkowe. Konserwatyści preferują głównie systemy prywatne z minimalną rolą państwa, a nie zrównoważone podejścia mieszane.
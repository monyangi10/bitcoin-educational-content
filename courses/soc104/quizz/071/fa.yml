question: کدام خانواده سیاسی به احتمال زیاد از سیاستی که دسترسی به مراقبت‌های بهداشتی همگانی را با نوآوری و مکانیزم‌های کارآیی بخش خصوصی ترکیب می‌کند، حمایت می‌کند؟
answer: میانه‌روها، که سیستم‌های ترکیبی را ترجیح می‌دهند که تضمین‌های عمومی را با مشارکت‌های بخش خصوصی متعادل می‌کند
wrong_answers:
  - سوسیالیست‌ها، که دسترسی همگانی را از طریق سیستم‌های بهداشتی عمومی انحصاری در اولویت قرار می‌دهند
  - لیبرترین‌ها، که از خصوصی‌سازی کامل و انتخاب فردی در بازارهای مراقبت‌های بهداشتی حمایت می‌کنند
  - محافظه‌کاران، که بازارهای خصوصی با حداقل مداخله دولت برای آسیب‌پذیرترین افراد را ترجیح می‌دهند
explanation: |
  میانه‌روها به‌طور صریح از سیستم‌های بهداشتی مختلط حمایت می‌کنند که دسترسی همگانی را از طریق مشارکت دولت تضمین می‌کند و در عین حال عناصر بخش خصوصی را برای نوآوری و کارایی در بر می‌گیرد.  
  سوسیالیست‌ها مشارکت خصوصی را رد می‌کنند و مراقبت‌های بهداشتی را به‌عنوان یک حق اساسی می‌دانند که نیاز به ارائه عمومی دارد. لیبرتارین‌ها به‌طور کامل با مشارکت دولت مخالفند و راه‌حل‌های مبتنی بر بازار را ترجیح می‌دهند. محافظه‌کاران سیستم‌های عمدتاً خصوصی با نقش‌های حداقلی دولت را ترجیح می‌دهند و نه رویکردهای مختلط متعادل.
question: Která politická skupina by nejspíše podpořila politiku kombinující všeobecný přístup ke zdravotní péči s inovacemi a mechanismy účinnosti v soukromém sektoru?
answer: Centristé, kteří upřednostňují smíšené systémy vyvažující veřejné záruky s příspěvky soukromého sektoru
wrong_answers:
  - Socialisté, kteří upřednostňují všeobecný přístup prostřednictvím výhradně veřejných systémů zdravotní péče
  - Libertariáni, kteří prosazují úplnou privatizaci a individuální volbu na trhu zdravotní péče
  - Konzervativci, kteří upřednostňují soukromé trhy s minimálními zásahy státu pro nejzranitelnější osoby
explanation: |
  Centristé výslovně prosazují smíšené systémy zdravotní péče, které zaručují všeobecnou dostupnost díky zapojení státu a zároveň zahrnují prvky soukromého sektoru pro inovace a efektivitu.
  Socialisté odmítají zapojení soukromého sektoru a považují zdravotní péči za základní právo vyžadující veřejné zajištění. Libertariáni jsou zcela proti zapojení státu a dávají přednost tržním řešením. Konzervativci upřednostňují převážně soukromé systémy s minimální úlohou státu, nikoli vyvážené smíšené přístupy.
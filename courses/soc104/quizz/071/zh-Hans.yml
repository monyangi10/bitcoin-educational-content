question: 哪个政治家族最有可能支持将全民医疗服务与私营部门创新和效率机制相结合的政策？
answer: 中间派，主张混合制度，兼顾公共保障和私营部门的贡献
wrong_answers:
  - 社会主义者，他们优先考虑通过专门的公共医疗系统普及医疗服务
  - 主张医疗市场完全私有化和个人选择的自由主义者
  - 保守派倾向于私营市场，尽量减少国家对最弱势群体的干预
explanation: |
  中间派明确主张建立混合型医疗保健体系，通过国家参与保障全民享有医疗保健服务，同时融入私营部门元素以促进创新和提高效率。
  社会主义者反对私人参与，认为医疗保健是一项基本权利，需要公共提供。自由主义者完全反对政府参与，倾向于以市场为基础的解决方案。保守派倾向于以私营系统为主，国家作用最小，而非平衡的混合方法。
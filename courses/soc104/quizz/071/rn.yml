question: Ni uwuhe muryango wa politike woshobora gushigikira cane politike ihuza ubuvuzi ku bantu bose n’ubuhinga bushasha bw’abikorera ku giti cabo n’uburyo bwo gukora neza?
answer: Abanyapolitike bo hagati, bakunda uburyo buvanze bwo guhuza ivyemezo vya Leta n’intererano z’abikorera ku giti cabo
wrong_answers:
  - Abanyagihugu, bashira imbere uburyo bwo kuronka ubuvuzi ku bantu bose biciye mu buryo bwo kwivuza bwa bose
  - Abanyagihugu b’abanyagihugu, bavuganira ko ubuvuzi buba ubw’abikorera ku giti cabo n’uguhitamwo kw’umuntu ku giti ciwe mu masoko y’ubuvuzi
  - Abanyagihugu b’abanyagihugu, bakunda amasoko yigenga ataco Leta igira ico ikoze ku bakene cane
explanation: |
  Abanyapolitike bo hagati bavuganira mu buryo butomoye uburyo bwo kwivuza buvanze bushobora gutuma abantu bose bashobora kuronka ubuvuzi biciye mu kwitabira Leta mu gihe hashirwamwo ibintu vy’abikorera ku giti cabo kugira ngo haboneke ubuhinga bushasha n’ubushobozi. 
  Abasosiyalisiti banse kwivanga mu bikorwa vy’abantu ku giti cabo, babona ko ubuvuzi ari uburenganzira bw’ishimikiro busaba ko Leta itanga. Abaharanira umwidegemvyo barwanya uruhara rwa Leta rwose, bagahitamwo inyishu zishingiye ku masoko. Abanyagihugu bakunda cane cane uburyo bw’abikorera ku giti cabo bufise uruhara rutoyi rwa Leta, atari uburyo buvanze buringaniye.
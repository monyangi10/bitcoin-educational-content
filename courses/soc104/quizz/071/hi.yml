question: कौन सा राजनीतिक परिवार सार्वभौमिक स्वास्थ्य सेवा तक पहुंच को निजी क्षेत्र के नवाचार और दक्षता तंत्र के साथ संयोजित करने वाली नीति का समर्थन करने की सबसे अधिक संभावना रखता है?
answer: मध्यमार्गी, जो सार्वजनिक गारंटी और निजी क्षेत्र के योगदान के बीच संतुलन बनाने वाली मिश्रित प्रणालियों का समर्थन करते हैं।
wrong_answers:
  - समाजवादी, जो पूरी तरह से सार्वजनिक स्वास्थ्य सेवा प्रणालियों के माध्यम से सार्वभौमिक पहुंच को प्राथमिकता देते हैं।
  - स्वतंत्रतावादी, जो स्वास्थ्य सेवा बाजारों में पूर्ण निजीकरण और व्यक्तिगत पसंद की वकालत करते हैं।
  - रूढ़िवादी, जो सबसे कमजोर लोगों के लिए न्यूनतम सरकारी हस्तक्षेप वाले निजी बाजारों को प्राथमिकता देते हैं।
explanation: |
  मध्यमार्गी स्पष्ट रूप से मिश्रित स्वास्थ्य सेवा प्रणालियों की वकालत करते हैं जो राज्य की भागीदारी के माध्यम से सार्वभौमिक पहुंच सुनिश्चित करती हैं, साथ ही नवाचार और दक्षता के लिए निजी क्षेत्र के तत्वों को भी शामिल करती हैं।
  समाजवादी निजी भागीदारी को अस्वीकार करते हैं, स्वास्थ्य सेवा को एक मौलिक अधिकार मानते हैं जिसके लिए सार्वजनिक प्रावधान आवश्यक है। स्वतंत्रतावादी सरकार की भागीदारी का पूर्णतः विरोध करते हैं और बाजार-आधारित समाधानों को प्राथमिकता देते हैं। रूढ़िवादी संतुलित मिश्रित दृष्टिकोणों के बजाय न्यूनतम राज्य भूमिका वाली मुख्य रूप से निजी प्रणालियों का समर्थन करते हैं।
question: Welke politieke familie zou het meest waarschijnlijk een beleid steunen dat universele toegang tot gezondheidszorg combineert met innovatie en efficiëntiemechanismen in de privésector?
answer: Centristen, die voorstander zijn van gemengde systemen met een evenwicht tussen overheidsgaranties en bijdragen uit de particuliere sector
wrong_answers:
  - Socialisten, die prioriteit geven aan universele toegang via uitsluitend openbare gezondheidszorgstelsels
  - Libertariërs, die voorstander zijn van volledige privatisering en individuele keuze in gezondheidszorgmarkten
  - Conservatieven, die de voorkeur geven aan particuliere markten met minimale staatsinterventie voor de meest kwetsbaren
explanation: |
  Centristen pleiten expliciet voor gemengde gezondheidszorgstelsels die universele toegang garanderen door middel van staatsbemoeienis, maar die ook elementen uit de private sector bevatten voor innovatie en efficiëntie.
  Socialisten wijzen particuliere betrokkenheid af en zien gezondheidszorg als een fundamenteel recht dat door de overheid moet worden verleend. Libertariërs zijn volledig tegen overheidsbemoeienis en geven de voorkeur aan marktgebaseerde oplossingen. Conservatieven geven de voorkeur aan overwegend private systemen met een minimale rol voor de staat, niet aan een evenwichtige gemengde aanpak.
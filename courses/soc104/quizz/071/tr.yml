question: Hangi siyasi aile evrensel sağlık hizmetlerine erişimi özel sektör inovasyonu ve verimlilik mekanizmaları ile birleştiren bir politikayı büyük olasılıkla destekleyecektir?
answer: Kamu garantileri ile özel sektör katkılarını dengeleyen karma sistemleri tercih eden merkezciler
wrong_answers:
  - Sadece kamu sağlık sistemleri aracılığıyla evrensel erişime öncelik veren sosyalistler
  - Sağlık hizmetleri piyasalarında tamamen özelleştirme ve bireysel seçimi savunan Liberteryenler
  - En savunmasız durumdakiler için asgari devlet müdahalesi ile özel piyasaları tercih eden muhafazakarlar
explanation: |
  Merkezciler, devlet müdahalesi yoluyla evrensel erişimi garanti ederken yenilik ve verimlilik için özel sektör unsurlarını da içeren karma sağlık sistemlerini açıkça savunmaktadır.
  Sosyalistler, sağlık hizmetlerinin kamu tarafından sağlanmasını gerektiren temel bir hak olarak görerek özel sektör müdahalesini reddederler. Liberteryenler, piyasa temelli çözümleri tercih ederek devlet müdahalesine tamamen karşı çıkmaktadır. Muhafazakârlar, dengeli karma yaklaşımları değil, devletin minimum rol oynadığı ağırlıklı olarak özel sistemleri tercih etmektedir.
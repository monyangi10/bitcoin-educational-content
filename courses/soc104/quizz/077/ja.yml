question: サン・ラザール通りの夕べ』におけるモリナーリの分析によれば、保守派と社会主義者の間に、彼らをリバタリアンから区別する根本的な類似点が存在するのだろうか？
answer: 保守主義者も社会主義者も、国家権力によって自分たちの社会像を押し付けようとしている。
wrong_answers:
  - 保守派も社会主義者も個人の財産権を否定し、資源の集団所有に賛成する
  - 保守派も社会主義者も、自由は決して妥協したり制限したりしてはならない絶対的な原則だと考えている。
  - 保守派も社会主義者も、最小限の政府介入を支持し、あらゆる形態の社会工学に反対している。
explanation: |
  モリナーリの重要な洞察は、一見対立しているように見えるが、保守派と社会主義者には共通の方法論があるということである。保守派は人々に伝統的なルーツや構造を維持させたいと考え、社会主義者は人々に伝統的なルーツや構造を放棄させたいと考えるが、どちらも国家権力に依存している。この点が、国家権力を使って社会的ビジョンを押し付けることに反対し、その代わりに個人の選択と財産権に基づく自主的な取り決めを主張するリバタリアンとは異なる。
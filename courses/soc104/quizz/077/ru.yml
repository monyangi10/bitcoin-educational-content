question: Согласно анализу Молинари в книге "Вечера на улице Сен-Лазар" (Les Soirées de la rue Saint Lazare), какое фундаментальное сходство существует между консерваторами и социалистами, которое отличает их от либертарианцев?
answer: И консерваторы, и социалисты стремятся навязать свое видение общества через государственную власть, несмотря на то, что видение у них разное
wrong_answers:
  - И консерваторы, и социалисты отвергают право индивидуальной собственности и выступают за коллективное владение ресурсами
  - И консерваторы, и социалисты считают свободу абсолютным принципом, который никогда не должен ставиться под угрозу или ограничиваться
  - И консерваторы, и социалисты поддерживают минимальное вмешательство государства и выступают против всех форм социальной инженерии
explanation: |
  Главная мысль Молинари заключалась в том, что, несмотря на кажущееся противостояние, консерваторы и социалисты используют общую методологию: использование государственной власти для навязывания своих социальных представлений. Консерваторы хотят заставить людей сохранить традиционные корни и структуры, а социалисты - отказаться от них, но и те, и другие опираются на государственное принуждение. Это отличает их от либертарианцев, которые выступают против использования государственной власти для навязывания какой-либо социальной концепции, а вместо этого поддерживают добровольные договоренности, основанные на индивидуальном выборе и правах собственности.
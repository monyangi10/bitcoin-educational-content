question: Jaká zásadní podobnost, která odlišuje konzervativce a socialisty od libertariánů, existuje podle Molinariho analýzy v knize "Les Soirées de la rue Saint Lazare" (Večery v ulici sv. Lazara)?
answer: Jak konzervativci, tak socialisté se snaží prosadit svou vizi společnosti prostřednictvím státní moci, přestože mají odlišné vize
wrong_answers:
  - Konzervativci i socialisté odmítají individuální vlastnická práva a upřednostňují kolektivní vlastnictví zdrojů
  - Konzervativci i socialisté považují svobodu za absolutní princip, který by neměl být nikdy ohrožen nebo omezen
  - Konzervativci i socialisté podporují minimální státní zásahy a jsou proti všem formám sociálního inženýrství
explanation: |
  Molinariho klíčový poznatek spočíval v tom, že navzdory zdánlivému protikladu mají konzervativci a socialisté společnou metodologii: využívají státní moc k prosazení svých sociálních vizí. Konzervativci chtějí donutit lidi, aby si zachovali tradiční kořeny a struktury, zatímco socialisté chtějí donutit lidi, aby se jich vzdali, ale oba spoléhají na státní donucení. Tím se liší od libertariánů, kteří jsou proti používání státní moci k vnucování jakýchkoli společenských vizí a místo toho prosazují dobrovolné uspořádání založené na individuální volbě a vlastnických právech.
question: بر اساس تحلیل مولیناری در 'Les Soirées de la rue Saint Lazare' (انگ. Evenings on Saint Lazarus Street)، چه شباهت اساسی بین محافظه‌کاران و سوسیالیست‌ها وجود دارد که آن‌ها را از لیبرترین‌ها متمایز می‌کند؟
answer: هم محافظه‌کاران و هم سوسیالیست‌ها به دنبال تحمیل دیدگاه خود از جامعه از طریق قدرت دولتی هستند، هرچند دیدگاه‌های متفاوتی دارند.
wrong_answers:
  - هم محافظه‌کاران و هم سوسیالیست‌ها حقوق مالکیت فردی را رد می‌کنند و مالکیت جمعی منابع را ترجیح می‌دهند.
  - هم محافظه‌کاران و هم سوسیالیست‌ها آزادی را به عنوان یک اصل مطلق می‌دانند که هرگز نباید به خطر بیفتد یا محدود شود.
  - هم محافظه‌کاران و هم سوسیالیست‌ها از حداقل دخالت دولت حمایت می‌کنند و با همه اشکال مهندسی اجتماعی مخالفند.
explanation: |
  بینش کلیدی مولیناری این بود که علی‌رغم مخالفت ظاهری‌شان، محافظه‌کاران و سوسیالیست‌ها یک روش‌شناسی مشترک دارند: استفاده از قدرت دولت برای تحمیل دیدگاه‌های اجتماعی خود. محافظه‌کاران می‌خواهند مردم را مجبور کنند تا ریشه‌ها و ساختارهای سنتی را حفظ کنند، در حالی که سوسیالیست‌ها می‌خواهند مردم را مجبور کنند تا آن‌ها را رها کنند، اما هر دو به اجبار دولتی متکی هستند. این آن‌ها را از لیبرترین‌ها متمایز می‌کند، که با استفاده از قدرت دولت برای تحمیل هرگونه دیدگاه اجتماعی مخالفند و به جای آن از ترتیبات داوطلبانه بر اساس انتخاب فردی و حقوق مالکیت حمایت می‌کنند.
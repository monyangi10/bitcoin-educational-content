question: Molinarin analyysin mukaan teoksessa "Les Soirées de la rue Saint Lazare" (suomeksi "Iltaisin Saint Lazaruksen kadulla") konservatiivien ja sosialistien välillä on jokin perustavanlaatuinen samankaltaisuus, joka erottaa heidät libertaristeista?
answer: Sekä konservatiivit että sosialistit pyrkivät valtiovallan avulla määräämään oman näkemyksensä yhteiskunnasta, vaikka heillä on erilaisia näkemyksiä
wrong_answers:
  - Sekä konservatiivit että sosialistit hylkäävät yksilön omistusoikeudet ja suosivat resurssien yhteisomistusta
  - Sekä konservatiivit että sosialistit pitävät vapautta ehdottomana periaatteena, josta ei saa koskaan tinkiä tai jota ei saa rajoittaa
  - Sekä konservatiivit että sosialistit kannattavat mahdollisimman vähäistä valtion väliintuloa ja vastustavat kaikenlaista sosiaalista suunnittelua
explanation: |
  Molinarin keskeinen oivallus oli, että näennäisestä vastakkainasettelustaan huolimatta konservatiiveilla ja sosialisteilla on yhteinen metodologia: valtiovallan käyttäminen omien yhteiskunnallisten näkemystensä toteuttamiseen. Konservatiivit haluavat pakottaa ihmiset säilyttämään perinteiset juuret ja rakenteet, kun taas sosialistit haluavat pakottaa ihmiset hylkäämään ne, mutta molemmat turvautuvat valtion pakkokeinoihin. Tämä erottaa heidät libertaristeista, jotka vastustavat valtiovallan käyttöä minkään yhteiskunnallisen näkemyksen tyrkyttämiseen ja kannattavat sen sijaan vapaaehtoisia järjestelyjä, jotka perustuvat yksilön valintoihin ja omistusoikeuksiin.
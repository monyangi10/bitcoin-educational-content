question: 根据莫里纳利在《圣拉扎尔街的夜晚》一书中的分析，保守派和社会主义者之间有什么根本的相似之处，使他们有别于自由主义者？
answer: 保守派和社会主义者都试图通过国家权力将自己的社会愿景强加于人，尽管他们的愿景各不相同
wrong_answers:
  - 保守派和社会主义者都反对个人财产权，赞成资源的集体所有权
  - 保守派和社会主义者都认为，自由是一项绝对原则，绝不应受到损害或限制
  - 保守派和社会主义者都支持尽量减少政府干预，反对一切形式的社会工程
explanation: |
  莫利纳利的主要见解是，尽管保守派和社会主义者表面上对立，但他们有一个共同的方法论：利用国家权力来强加各自的社会愿景。保守派希望迫使人们保持传统的根基和结构，而社会主义者则希望迫使人们放弃这些根基和结构，但两者都依赖于国家强制力。自由主义者反对使用国家权力强加任何社会愿景，而是主张基于个人选择和财产权的自愿安排。
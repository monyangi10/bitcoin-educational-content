question: Volgens Molinari's analyse in 'Les Soirées de la rue Saint Lazare' (eng. Avonden in de Sint Lazarusstraat), welke fundamentele overeenkomst bestaat er tussen conservatieven en socialisten die hen onderscheidt van libertariërs?
answer: Zowel conservatieven als socialisten proberen hun visie op de samenleving op te leggen door middel van staatsmacht, ook al hebben ze verschillende visies
wrong_answers:
  - Zowel conservatieven als socialisten verwerpen individuele eigendomsrechten en geven de voorkeur aan collectief eigendom van hulpbronnen
  - Zowel conservatieven als socialisten zien vrijheid als een absoluut principe dat nooit gecompromitteerd of beperkt mag worden
  - Zowel conservatieven als socialisten steunen minimale overheidsbemoeienis en zijn tegen alle vormen van maakbaarheid
explanation: |
  Molinari's belangrijkste inzicht was dat ondanks hun ogenschijnlijke tegenstelling, conservatieven en socialisten een gemeenschappelijke methodologie delen: het gebruik van staatsmacht om hun respectievelijke sociale visies op te leggen. Conservatieven willen mensen dwingen om traditionele wortels en structuren te behouden, terwijl socialisten mensen willen dwingen om die te verlaten, maar beide vertrouwen op staatsdwang. Dit onderscheidt hen van libertariërs, die tegen het gebruik van staatsmacht zijn om welke sociale visie dan ook op te leggen en in plaats daarvan pleiten voor vrijwillige regelingen gebaseerd op individuele keuze en eigendomsrechten.
question: Zgodnie z analizą Molinariego w "Les Soirées de la rue Saint Lazare" (ang. "Wieczory na ulicy Świętego Łazarza"), jakie fundamentalne podobieństwo istnieje między konserwatystami a socjalistami, które odróżnia ich od libertarian?
answer: Zarówno konserwatyści, jak i socjaliści dążą do narzucenia swojej wizji społeczeństwa poprzez władzę państwową, mimo że mają różne wizje
wrong_answers:
  - Zarówno konserwatyści, jak i socjaliści odrzucają indywidualne prawa własności i opowiadają się za kolektywną własnością zasobów
  - Zarówno konserwatyści, jak i socjaliści postrzegają wolność jako zasadę absolutną, której nigdy nie należy naruszać ani ograniczać
  - Zarówno konserwatyści, jak i socjaliści popierają minimalną interwencję rządu i sprzeciwiają się wszelkim formom inżynierii społecznej
explanation: |
  Kluczowym spostrzeżeniem Molinariego było to, że pomimo pozornej opozycji, konserwatyści i socjaliści mają wspólną metodologię: wykorzystują władzę państwową do narzucenia swoich wizji społecznych. Konserwatyści chcą zmusić ludzi do utrzymania tradycyjnych korzeni i struktur, podczas gdy socjaliści chcą zmusić ludzi do ich porzucenia, ale obaj polegają na przymusie państwowym. To odróżnia ich od libertarian, którzy sprzeciwiają się wykorzystywaniu władzy państwowej do narzucania jakiejkolwiek wizji społecznej i zamiast tego opowiadają się za dobrowolnymi ustaleniami opartymi na indywidualnym wyborze i prawach własności.
question: Welche grundlegenden Gemeinsamkeiten zwischen Konservativen und Sozialisten, die sie von den Libertären unterscheiden, gibt es nach Molinaris Analyse in "Les Soirées de la rue Saint Lazare" (dt. Abende in der Lazarusstraße)?
answer: Sowohl die Konservativen als auch die Sozialisten versuchen, ihre Vision der Gesellschaft mit Hilfe der Staatsmacht durchzusetzen, obwohl sie unterschiedliche Visionen haben
wrong_answers:
  - Sowohl Konservative als auch Sozialisten lehnen individuelle Eigentumsrechte ab und befürworten kollektives Eigentum an Ressourcen
  - Sowohl die Konservativen als auch die Sozialisten betrachten die Freiheit als absoluten Grundsatz, der niemals gefährdet oder eingeschränkt werden darf
  - Sowohl Konservative als auch Sozialdemokraten befürworten minimale staatliche Eingriffe und lehnen jede Form von Sozialtechnik ab
explanation: |
  Molinaris wichtigste Erkenntnis war, dass Konservative und Sozialisten trotz ihrer scheinbaren Gegensätze eine gemeinsame Methodik haben: die Nutzung der Staatsmacht zur Durchsetzung ihrer jeweiligen sozialen Visionen. Die Konservativen wollen die Menschen zwingen, ihre traditionellen Wurzeln und Strukturen beizubehalten, während die Sozialisten die Menschen zwingen wollen, sie aufzugeben, aber beide stützen sich auf staatlichen Zwang. Dies unterscheidet sie von den Libertären, die den Einsatz staatlicher Macht zur Durchsetzung ihrer sozialen Visionen ablehnen und stattdessen für freiwillige Vereinbarungen auf der Grundlage individueller Entscheidungen und Eigentumsrechte eintreten.
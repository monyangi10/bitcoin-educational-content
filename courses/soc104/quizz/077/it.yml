question: Secondo l'analisi di Molinari in "Les Soirées de la rue Saint Lazare" (le serate di via Saint Lazarus), quale somiglianza fondamentale esiste tra conservatori e socialisti che li distingue dai libertari?
answer: Sia i conservatori che i socialisti cercano di imporre la loro visione della società attraverso il potere dello Stato, pur avendo visioni diverse
wrong_answers:
  - Sia i conservatori che i socialisti rifiutano i diritti di proprietà individuali e favoriscono la proprietà collettiva delle risorse
  - Sia i conservatori che i socialisti considerano la libertà come un principio assoluto che non dovrebbe mai essere compromesso o limitato
  - Sia i conservatori che i socialisti sostengono un intervento governativo minimo e si oppongono a tutte le forme di ingegneria sociale
explanation: |
  L'intuizione chiave di Molinari è che, nonostante la loro apparente opposizione, conservatori e socialisti condividono una metodologia comune: usare il potere statale per imporre le rispettive visioni sociali. I conservatori vogliono costringere le persone a mantenere le radici e le strutture tradizionali, mentre i socialisti vogliono costringerle ad abbandonarle, ma entrambi si affidano alla coercizione dello Stato. Questo li distingue dai libertari, che si oppongono all'uso del potere statale per imporre qualsiasi visione sociale e sostengono invece accordi volontari basati sulla scelta individuale e sui diritti di proprietà.
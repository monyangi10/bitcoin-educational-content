question: 根據 Molinari 在 'Les Soirées de la rue Saint Lazare' (eng. Evenings on Saint Lazarus Street) 中的分析，保守派和社會主義者之間有什麼基本相似之處，使他們有別於自由主義者？
answer: 保守派和社會主義者儘管有不同的願景，但都試圖透過國家權力強加他們對社會的願景。
wrong_answers:
  - 保守派和社會主義者都反對個人財產權，贊成集體擁有資源
  - 保守派和社會主義者都認為自由是絕對的原則，絕不應該受到妥協或限制。
  - 保守派和社會主義者都支持最少的政府干預，並反對所有形式的社會工程。
explanation: |
  莫里納利的主要見解是，儘管保守派和社會主義者表面上對立，但他們有一個共同的方法：利用國家權力來強加各自的社會願景。保守派希望強迫人們維持傳統的根基與結構，而社會主義者則希望強迫人們放棄傳統，但兩者都仰賴國家強制。這將他們與自由主義者區別開來，自由主義者反對使用國家權力強加任何社會願景，而是主張基於個人選擇和財產權的自願安排。
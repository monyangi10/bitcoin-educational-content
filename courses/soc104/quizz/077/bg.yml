question: Според анализа на Молинари в "Les Soirées de la rue Saint Lazare" (Вечер на улица "Свети Лазар"), каква основна прилика съществува между консерваторите и социалистите, която ги отличава от либертарианците?
answer: И консерваторите, и социалистите се стремят да наложат своята визия за обществото чрез държавната власт, въпреки че имат различни виждания
wrong_answers:
  - И консерваторите, и социалистите отхвърлят индивидуалните права на собственост и подкрепят колективната собственост върху ресурсите
  - Както консерваторите, така и социалистите разглеждат свободата като абсолютен принцип, който никога не трябва да се нарушава или ограничава
  - И консерваторите, и социалистите подкрепят минималната намеса на държавата и се противопоставят на всички форми на социално инженерство
explanation: |
  Ключовият извод на Молинари е, че въпреки очевидното си противопоставяне консерваторите и социалистите имат обща методология: използват държавната власт, за да наложат съответните си социални виждания. Консерваторите искат да принудят хората да запазят традиционните корени и структури, докато социалистите искат да ги принудят да се откажат от тях, но и двамата разчитат на държавна принуда. Това ги отличава от либертарианците, които се противопоставят на използването на държавната власт за налагане на каквато и да е социална визия и вместо това се застъпват за доброволни споразумения, основани на индивидуалния избор и правата на собственост.
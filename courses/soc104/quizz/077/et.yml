question: Molinari analüüsi järgi, mis on konservatiivide ja sotsialistide vahel põhimõtteline sarnasus, mis eristab neid libertaaridest, "Les Soirées de la rue Saint Lazare" ("Õhtud Saint Lazaruse tänaval")?
answer: Nii konservatiivid kui ka sotsialistid püüavad oma nägemust ühiskonnast kehtestada riigivõimu kaudu, hoolimata sellest, et neil on erinevad nägemused
wrong_answers:
  - Nii konservatiivid kui ka sotsialistid lükkavad tagasi individuaalsed omandiõigused ja pooldavad ressursside kollektiivset omandit
  - Nii konservatiivid kui ka sotsialistid peavad vabadust absoluutseks põhimõtteks, mida ei tohiks kunagi kahjustada ega piirata
  - Nii konservatiivid kui ka sotsialistid toetavad minimaalset valitsuse sekkumist ja on vastu igasugusele sotsiaalsele konstrueerimisele
explanation: |
  Molinari peamine arusaam oli, et hoolimata oma näilisest vastandumisest on konservatiividel ja sotsialistidel ühine metoodika: kasutada riigivõimu oma vastavate sotsiaalsete visioonide kehtestamiseks. Konservatiivid tahavad sundida inimesi säilitama traditsioonilisi juuri ja struktuure, samas kui sotsialistid tahavad sundida inimesi neist loobuma, kuid mõlemad tuginevad riiklikule sunnile. See eristab neid libertaarlastest, kes on vastu riigivõimu kasutamisele mis tahes sotsiaalse visiooni peale surumiseks ning pooldavad selle asemel vabatahtlikke kokkuleppeid, mis põhinevad individuaalsel valikul ja omandiõigusel.
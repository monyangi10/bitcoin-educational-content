question: Molinari'nin 'Les Soirées de la rue Saint Lazare' (Aziz Lazarus Sokağında Akşamlar) adlı kitabındaki analizine göre, muhafazakârlar ve sosyalistler arasında onları liberteryenlerden ayıran temel benzerlik nedir?
answer: Hem muhafazakârlar hem de sosyalistler, farklı vizyonlara sahip olmalarına rağmen, kendi toplum vizyonlarını devlet gücü aracılığıyla empoze etmeye çalışırlar
wrong_answers:
  - Hem muhafazakârlar hem de sosyalistler bireysel mülkiyet haklarını reddeder ve kaynakların kolektif mülkiyetinden yanadır
  - Hem muhafazakârlar hem de sosyalistler özgürlüğü asla taviz verilmemesi veya sınırlandırılmaması gereken mutlak bir ilke olarak görürler
  - Hem muhafazakârlar hem de sosyalistler asgari düzeyde devlet müdahalesini desteklemekte ve her türlü toplum mühendisliğine karşı çıkmaktadır
explanation: |
  Molinari'nin temel öngörüsü, görünürdeki karşıtlıklarına rağmen muhafazakârlar ve sosyalistlerin ortak bir metodolojiyi paylaştıklarıdır: kendi sosyal vizyonlarını dayatmak için devlet gücünü kullanmak. Muhafazakarlar insanları geleneksel köklerini ve yapılarını korumaya zorlamak isterken, sosyalistler insanları bunları terk etmeye zorlamak istiyor, ancak her ikisi de devlet zorlamasına dayanıyor. Bu durum onları, herhangi bir toplumsal vizyonu dayatmak için devlet gücünün kullanılmasına karşı çıkan ve bunun yerine bireysel seçim ve mülkiyet haklarına dayalı gönüllü düzenlemeleri savunan liberteryenlerden ayırmaktadır.
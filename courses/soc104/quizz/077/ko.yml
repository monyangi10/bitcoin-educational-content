question: 몰리나리의 분석에 따르면, 보수주의자와 사회주의자 사이에는 자유주의자와 구별되는 어떤 근본적인 유사성이 존재할까요?
answer: 보수주의자와 사회주의자는 서로 다른 비전을 가지고 있음에도 불구하고 국가 권력을 통해 사회에 대한 비전을 강요하려 합니다
wrong_answers:
  - 보수주의자와 사회주의자 모두 개인의 재산권을 거부하고 자원의 공동 소유를 선호합니다
  - 보수주의자와 사회주의자 모두 자유를 절대로 타협하거나 제한해서는 안 되는 절대적인 원칙으로 여깁니다
  - 보수주의자와 사회주의자 모두 최소한의 정부 개입을 지지하고 모든 형태의 사회 공학에 반대합니다
explanation: |
  몰리나리의 핵심 통찰은 보수주의자와 사회주의자가 겉으로는 반대하는 것처럼 보이지만 국가 권력을 이용해 각자의 사회 비전을 강요하는 공통된 방법론을 공유하고 있다는 점입니다. 보수주의자는 사람들에게 전통적인 뿌리와 구조를 유지하도록 강요하고, 사회주의자는 사람들에게 이를 버리도록 강요하지만 둘 다 국가의 강압에 의존합니다. 이는 국가 권력을 사용하여 사회적 비전을 강요하는 것에 반대하고 대신 개인의 선택과 재산권에 기반한 자발적 합의를 옹호하는 자유주의자들과 구별됩니다.
question: Enligt Molinaris analys i "Les Soirées de la rue Saint Lazare" (eng. Evenings on Saint Lazarus Street), vilken grundläggande likhet finns det mellan konservativa och socialister som skiljer dem från libertarianer?
answer: Både konservativa och socialister försöker införa sin vision av samhället genom statsmakten, trots att de har olika visioner
wrong_answers:
  - Både konservativa och socialister förkastar individuell äganderätt och förespråkar kollektivt ägande av resurser
  - Både konservativa och socialister ser frihet som en absolut princip som aldrig får äventyras eller begränsas
  - Både konservativa och socialister stöder minimal statlig inblandning och motsätter sig alla former av social ingenjörskonst
explanation: |
  Molinaris viktigaste insikt var att konservativa och socialister trots sin uppenbara motsättning har en gemensam metodik: att använda statsmakten för att genomdriva sina respektive samhällsvisioner. Konservativa vill tvinga människor att behålla traditionella rötter och strukturer, medan socialister vill tvinga människor att överge dem, men båda förlitar sig på statligt tvång. Detta skiljer dem från libertarianer, som motsätter sig att statsmakten används för att införa någon samhällsvision och istället förespråkar frivilliga arrangemang baserade på individuella val och äganderätt.
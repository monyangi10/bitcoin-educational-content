question: Prema Molinarijevoj analizi u 'Les Soirées de la rue Saint Lazare' (srp. Večeri u ulici Saint Lazarus), osnovna sličnost između konzervativaca i socijalista koja ih razlikuje od libertarijanaca je njihova sklonost ka centralizaciji moći i regulaciji društva, za razliku od libertarijanaca koji zagovaraju individualnu slobodu i minimalnu ulogu države.
answer: I konzervativci i socijalisti nastoje da nametnu svoju viziju društva putem državne moći, uprkos tome što imaju različite vizije.
wrong_answers:
  - I konzervativci i socijalisti odbacuju prava individualne svojine i favorizuju kolektivno vlasništvo nad resursima.
  - I konzervativci i socijalisti gledaju na slobodu kao na apsolutni princip koji nikada ne bi trebalo kompromitovati ili ograničiti.
  - I konzervativci i socijalisti podržavaju minimalnu intervenciju vlade i protive se svim oblicima društvenog inženjeringa
explanation: |
  Ključni uvid Molinarija bio je da, uprkos njihovoj prividnoj suprotnosti, konzervativci i socijalisti dele zajedničku metodologiju: korišćenje državne moći za nametanje svojih društvenih vizija. Konzervativci žele da prisile ljude da zadrže tradicionalne korene i strukture, dok socijalisti žele da ih prisile da ih napuste, ali oba se oslanjaju na državnu prinudu. Ovo ih razlikuje od libertarijanaca, koji se protive korišćenju državne moći za nametanje bilo koje društvene vizije i umesto toga zagovaraju dobrovoljne aranžmane zasnovane na individualnom izboru i pravima vlasništva.
question: सांस्कृतिक रूढ़िवादिता को राजनीतिक रूढ़िवादिता से अलग करने वाली मुख्य विशेषता क्या है?
answer: सांस्कृतिक रूढ़िवादिता पारंपरिक मूल्यों के प्रति व्यक्तिगत निष्ठा है, न कि कोई राजनीतिक दर्शन।
wrong_answers:
  - सांस्कृतिक रूढ़िवादिता में सरकार द्वारा पारंपरिक मूल्यों को लागू करना आवश्यक होता है, जबकि राजनीतिक रूढ़िवादिता में ऐसा नहीं होता।
  - सांस्कृतिक रूढ़िवादिता आर्थिक नीतियों पर ध्यान केंद्रित करती है जबकि राजनीतिक रूढ़िवादिता सामाजिक मुद्दों पर ध्यान केंद्रित करती है।
  - सांस्कृतिक रूढ़िवादिता हर प्रकार के परिवर्तन का विरोध करती है, जबकि राजनीतिक रूढ़िवादिता क्रमिक सुधार को स्वीकार करती है।
explanation: |
  अध्याय में स्पष्ट रूप से कहा गया है कि सांस्कृतिक रूढ़िवाद अतीत से विरासत में मिले पारंपरिक नैतिक मूल्यों, मानवशास्त्र, सौंदर्यशास्त्र और तत्वमीमांसा के प्रति व्यक्तिगत निष्ठा है,
  और यह स्पष्ट रूप से बताता है कि 'यह कोई राजनीतिक दर्शन नहीं है।' इसके विपरीत, राजनीतिक रूढ़िवाद को समाज को एक निश्चित व्यवस्था के अनुसार संगठित करने के तरीके के रूप में वर्णित किया गया है। यह अंतर महत्वपूर्ण है क्योंकि यह दर्शाता है कि कोई व्यक्ति पारंपरिक मूल्यों को व्यक्तिगत रूप से धारण कर सकता है, बिना उन्हें राजनीतिक साधनों या सरकारी बल के माध्यम से थोपने की इच्छा रखे।
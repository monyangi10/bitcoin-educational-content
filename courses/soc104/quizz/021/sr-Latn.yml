question: Koja je glavna karakteristika koja razlikuje kulturni konzervativizam od političkog konzervativizma?
answer: Kulturni konzervativizam je lična privrženost tradicionalnim vrednostima i nije politička filozofija.
wrong_answers:
  - Kulturni konzervativizam zahteva da vlada sprovodi tradicionalne vrednosti, dok politički konzervativizam to ne čini.
  - Kulturni konzervativizam se fokusira na ekonomske politike, dok se politički konzervativizam fokusira na društvena pitanja.
  - Kulturni konzervativizam se protivi svim oblicima promene, dok politički konzervativizam prihvata postepene reforme.
explanation: |
  Poglavlje jasno navodi da je kulturni konzervativizam lična privrženost tradicionalnim moralnim vrednostima, antropologiji, estetici i metafizici nasleđenim iz prošlosti, i eksplicitno napominje da 'to nije politička filozofija.' Nasuprot tome, politički konzervativizam je opisan kao način organizovanja društva prema fiksnom poretku. Ova razlika je ključna jer pokazuje da neko može lično gajiti tradicionalne vrednosti bez nužne želje da ih nametne političkim sredstvima ili silom vlade.
question: ویژگی اصلی که محافظه‌کاری فرهنگی را از محافظه‌کاری سیاسی متمایز می‌کند چیست؟
answer: محافظه‌کاری فرهنگی پایبندی شخصی به ارزش‌های سنتی است و یک فلسفه سیاسی نیست.
wrong_answers:
  - محافظه‌کاری فرهنگی نیازمند اجرای ارزش‌های سنتی توسط دولت است، در حالی که محافظه‌کاری سیاسی چنین نیست.
  - محافظه‌کاری فرهنگی بر سیاست‌های اقتصادی تمرکز دارد در حالی که محافظه‌کاری سیاسی بر مسائل اجتماعی تمرکز می‌کند.
  - محافظه‌کاری فرهنگی با همه اشکال تغییر مخالف است، در حالی که محافظه‌کاری سیاسی اصلاح تدریجی را می‌پذیرد.
explanation: |
  این فصل به وضوح بیان می‌کند که محافظه‌کاری فرهنگی، پایبندی شخصی به ارزش‌های اخلاقی سنتی، انسان‌شناسی، زیبایی‌شناسی و متافیزیک به ارث رسیده از گذشته است و به صراحت اشاره می‌کند که «این یک فلسفه سیاسی نیست.» در مقابل، محافظه‌کاری سیاسی به عنوان روشی برای سازماندهی جامعه بر اساس یک نظم ثابت توصیف می‌شود. این تمایز بسیار مهم است زیرا نشان می‌دهد که فرد می‌تواند به صورت شخصی به ارزش‌های سنتی پایبند باشد بدون اینکه لزوماً بخواهد آنها را از طریق ابزارهای سیاسی یا نیروی دولتی تحمیل کند.
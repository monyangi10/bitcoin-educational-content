question: Ni sifa gani kuu inayotofautisha uhafidhina wa kitamaduni na uhafidhina wa kisiasa?
answer: Uhafidhina wa kitamaduni ni kufuata maadili ya kitamaduni kibinafsi na si falsafa ya kisiasa
wrong_answers:
  - Uhafidhina wa kitamaduni unahitaji serikali kutekeleza maadili ya kitamaduni huku uhafidhina wa kisiasa usifanye hivyo
  - Uhafidhina wa kitamaduni unazingatia sera za kiuchumi huku uhafidhina wa kisiasa ukizingatia masuala ya kijamii
  - Uhafidhina wa kitamaduni unapinga aina zote za mabadiliko huku uhafidhina wa kisiasa ukikubali mageuzi ya taratibu
explanation: |
  Sura hiyo inasema wazi kwamba uhafidhina wa kitamaduni ni uzingatiaji binafsi wa maadili ya kitamaduni, anthropolojia, urembo, na metafizikia iliyorithiwa kutoka zamani, na inabainisha wazi kwamba 'si falsafa ya kisiasa.' Kwa upande mwingine, uhafidhina wa kisiasa unaelezewa kama njia ya kupanga jamii kulingana na utaratibu uliowekwa. Tofauti hii ni muhimu kwa sababu inaonyesha kwamba mtu anaweza kushikilia maadili ya kitamaduni kibinafsi bila kutaka kuyalazimisha kupitia njia za kisiasa au nguvu za serikali.
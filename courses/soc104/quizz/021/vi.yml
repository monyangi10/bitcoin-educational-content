question: Đặc điểm chính nào phân biệt chủ nghĩa bảo thủ văn hóa với chủ nghĩa bảo thủ chính trị?
answer: Bảo thủ văn hóa là sự tuân thủ cá nhân đối với các giá trị truyền thống và không phải là một triết lý chính trị.
wrong_answers:
  - Chủ nghĩa bảo thủ văn hóa đòi hỏi chính phủ phải thực thi các giá trị truyền thống, trong khi chủ nghĩa bảo thủ chính trị thì không.
  - Chủ nghĩa bảo thủ văn hóa tập trung vào các chính sách kinh tế trong khi chủ nghĩa bảo thủ chính trị tập trung vào các vấn đề xã hội.
  - Chủ nghĩa bảo thủ văn hóa phản đối mọi hình thức thay đổi, trong khi chủ nghĩa bảo thủ chính trị chấp nhận cải cách dần dần.
explanation: |
  Chương này nêu rõ rằng chủ nghĩa bảo thủ văn hóa là sự gắn bó cá nhân với các giá trị đạo đức truyền thống, nhân học, thẩm mỹ và siêu hình học được thừa hưởng từ quá khứ, và nhấn mạnh rằng "nó không phải là một triết học chính trị". Ngược lại, chủ nghĩa bảo thủ chính trị được mô tả như một cách thức tổ chức xã hội theo một trật tự cố định. Sự phân biệt này rất quan trọng vì nó cho thấy rằng người ta có thể giữ các giá trị truyền thống một cách cá nhân mà không nhất thiết phải muốn áp đặt chúng thông qua các phương tiện chính trị hoặc vũ lực của chính phủ.
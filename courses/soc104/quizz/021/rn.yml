question: Ni ikihe kintu nyamukuru gitandukanya ugukingira umuco n’ugukingira politike?
answer: Ugukingira umuco ni ukwisunga umuntu ku giti ciwe ingingo ngenderwako z'imigenzo kandi si filozofiya ya politike .
wrong_answers:
  - Ugukingira umuco bisaba ko Leta ishira mu ngiro ingingo ngenderwako z’imigenzo mu gihe ugukingira politike kudasaba .
  - Ugukingira umuco kwibanda ku ngingo ngenderwako z'ubutunzi mu gihe ugukingira politike kwibanda ku bibazo vy'imibano .
  - Ugukingira umuco kurwanya ubwoko bwose bw'ihinduka mu gihe ugukingira politike kwemera ihinduka buhoro buhoro .
explanation: |
  Ico kigabane kivuga neza yuko ugukingira umuco ari ukwisunga umuntu ku giti ciwe ingingo ngenderwako z’imigenzo, ivy’imico kama, ivy’ubwiza be n’ivy’ubuhinga bw’ibintu . 
  yarazwe muri kahise, kandi akavuga mu buryo butomoye yuko 'atari filozofiya ya politike.' Mu buryo butandukanye n’ubwo, ugukingira politike kudondorwa nk’uburyo bwo gutunganya ikibano hakurikijwe urutonde rudahinduka. Iryo tandukaniro ni ngirakamaro cane kuko ryerekana ko umuntu ashobora gufata ingingo ngenderwako z’imigenzo ubwiwe ataco ashaka kuzitegeka biciye mu buryo bwa politike canke inguvu za Leta.
question: 문화적 보수주의와 정치적 보수주의를 구별하는 주요 특징은 무엇인가요?
answer: 문화적 보수주의는 전통적인 가치에 대한 개인적인 고집이며 정치 철학이 아닙니다
wrong_answers:
  - 문화적 보수주의는 전통적인 가치에 대한 정부의 집행을 요구하는 반면 정치적 보수주의는 그렇지 않습니다
  - 문화적 보수주의는 경제 정책에 초점을 맞추고 정치적 보수주의는 사회적 이슈에 초점을 맞추고 있습니다
  - 문화적 보수주의는 모든 형태의 변화에 반대하는 반면 정치적 보수주의는 점진적 개혁을 받아들입니다
explanation: |
  이 장에서는 문화적 보수주의가 전통적인 도덕적 가치, 인류학, 미학, 형이상학에 대한 개인적인 고집이라고 명확하게 명시하고 있습니다
  에 대한 개인적인 신념이며, '정치 철학이 아니다'라고 명시적으로 언급하고 있습니다 이와 대조적으로 정치적 보수주의는 고정된 질서에 따라 사회를 조직하는 방식으로 설명됩니다. 이 구분은 정치적 수단이나 정부의 힘을 통해 전통적인 가치를 강요하지 않고도 개인적으로 전통적인 가치를 지킬 수 있다는 것을 보여주기 때문에 매우 중요합니다.
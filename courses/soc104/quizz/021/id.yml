question: Apa karakteristik utama yang membedakan konservatisme budaya dengan konservatisme politik?
answer: Konservatisme budaya adalah kepatuhan pribadi terhadap nilai-nilai tradisional dan bukan merupakan filosofi politik
wrong_answers:
  - Konservatisme budaya membutuhkan penegakan nilai-nilai tradisional oleh pemerintah, sementara konservatisme politik tidak
  - Konservatisme budaya berfokus pada kebijakan ekonomi, sementara konservatisme politik berfokus pada isu-isu sosial
  - Konservatisme budaya menentang segala bentuk perubahan, sementara konservatisme politik menerima reformasi secara bertahap
explanation: |
  Bab ini dengan jelas menyatakan bahwa konservatisme budaya adalah kepatuhan pribadi terhadap nilai-nilai moral tradisional, antropologi, estetika, dan metafisika
  yang diwarisi dari masa lalu, dan secara eksplisit menyatakan bahwa 'ini bukan filsafat politik' Sebaliknya, konservatisme politik digambarkan sebagai cara untuk mengatur masyarakat menurut tatanan yang tetap. Perbedaan ini sangat penting karena menunjukkan bahwa seseorang dapat memegang nilai-nilai tradisional secara pribadi tanpa harus memaksakan nilai-nilai tersebut melalui cara-cara politik atau kekuatan pemerintah.
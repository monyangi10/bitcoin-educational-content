question: Коя е основната характеристика, която отличава културния консерватизъм от политическия консерватизъм?
answer: Културният консерватизъм е лична привързаност към традиционните ценности и не е политическа философия
wrong_answers:
  - Културният консерватизъм изисква от правителството да налага традиционните ценности, докато политическият консерватизъм не го прави
  - Културният консерватизъм се фокусира върху икономическите политики, докато политическият консерватизъм - върху социалните въпроси
  - Културният консерватизъм се противопоставя на всички форми на промяна, докато политическият консерватизъм приема постепенни реформи
explanation: |
  В главата ясно се посочва, че културният консерватизъм е лично придържане към традиционните морални ценности, антропология, естетика и метафизика
  наследени от миналото, и изрично се отбелязва, че "той не е политическа философия" За разлика от него политическият консерватизъм е описан като начин за организиране на обществото според определен ред. Това разграничение е от решаващо значение, защото показва, че човек може да се придържа лично към традиционните ценности, без непременно да иска да ги налага с политически средства или с държавна сила.
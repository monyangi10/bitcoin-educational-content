question: Jaka jest główna cecha odróżniająca konserwatyzm kulturowy od konserwatyzmu politycznego?
answer: Konserwatyzm kulturowy to osobiste przywiązanie do tradycyjnych wartości, a nie filozofia polityczna
wrong_answers:
  - Konserwatyzm kulturowy wymaga rządowego egzekwowania tradycyjnych wartości, podczas gdy konserwatyzm polityczny tego nie wymaga
  - Konserwatyzm kulturowy koncentruje się na polityce gospodarczej, podczas gdy konserwatyzm polityczny skupia się na kwestiach społecznych
  - Konserwatyzm kulturowy sprzeciwia się wszelkim formom zmian, podczas gdy konserwatyzm polityczny akceptuje stopniowe reformy
explanation: |
  Rozdział wyraźnie stwierdza, że konserwatyzm kulturowy jest osobistym przywiązaniem do tradycyjnych wartości moralnych, antropologii, estetyki i metafizyki
  odziedziczonych z przeszłości i wyraźnie zauważa, że "nie jest to filozofia polityczna" W przeciwieństwie do tego, konserwatyzm polityczny jest opisywany jako sposób organizowania społeczeństwa zgodnie z ustalonym porządkiem. To rozróżnienie jest kluczowe, ponieważ pokazuje, że można osobiście wyznawać tradycyjne wartości, niekoniecznie chcąc narzucać je za pomocą środków politycznych lub siły rządowej.
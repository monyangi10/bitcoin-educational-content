question: Wat is het belangrijkste kenmerk dat cultureel conservatisme onderscheidt van politiek conservatisme?
answer: Cultureel conservatisme is een persoonlijke gehechtheid aan traditionele waarden en is geen politieke filosofie
wrong_answers:
  - Cultureel conservatisme vereist handhaving van traditionele waarden door de overheid, terwijl politiek conservatisme dat niet doet
  - Cultureel conservatisme richt zich op economisch beleid terwijl politiek conservatisme zich richt op sociale kwesties
  - Cultureel conservatisme verzet zich tegen alle vormen van verandering, terwijl politiek conservatisme geleidelijke hervormingen accepteert
explanation: |
  Het hoofdstuk stelt duidelijk dat cultureel conservatisme een persoonlijke gehechtheid is aan traditionele morele waarden, antropologie, esthetica en metafysica
  geërfd uit het verleden, en merkt expliciet op dat "het geen politieke filosofie is" Politiek conservatisme wordt daarentegen beschreven als een manier om de samenleving te organiseren volgens een vaste orde. Dit onderscheid is cruciaal omdat het laat zien dat je persoonlijk traditionele waarden kunt aanhangen zonder ze per se te willen opleggen met politieke middelen of overheidsmacht.
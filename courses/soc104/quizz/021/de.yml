question: Was ist das Hauptmerkmal, das den kulturellen Konservatismus vom politischen Konservatismus unterscheidet?
answer: Kulturkonservatismus ist ein persönliches Festhalten an traditionellen Werten und keine politische Philosophie
wrong_answers:
  - Der kulturelle Konservatismus erfordert die staatliche Durchsetzung traditioneller Werte, der politische Konservatismus hingegen nicht
  - Der kulturelle Konservatismus konzentriert sich auf die Wirtschaftspolitik, während sich der politische Konservatismus auf soziale Fragen konzentriert
  - Der kulturelle Konservatismus lehnt alle Formen des Wandels ab, während der politische Konservatismus schrittweise Reformen akzeptiert
explanation: |
  In dem Kapitel wird klar gesagt, dass der kulturelle Konservatismus ein persönliches Festhalten an traditionellen moralischen Werten, Anthropologie, Ästhetik und Metaphysik ist
  und stellt ausdrücklich fest, dass er "keine politische Philosophie" ist Im Gegensatz dazu wird der politische Konservatismus als eine Art und Weise beschrieben, die Gesellschaft gemäß einer festen Ordnung zu organisieren. Diese Unterscheidung ist von entscheidender Bedeutung, denn sie zeigt, dass man persönlich traditionelle Werte vertreten kann, ohne sie unbedingt mit politischen Mitteln oder staatlicher Gewalt durchsetzen zu wollen.
question: Mikä on tärkein piirre, joka erottaa kulttuurikonservatismin poliittisesta konservatismista?
answer: Kulttuurikonservatismi on henkilökohtaista sitoutumista perinteisiin arvoihin eikä poliittinen filosofia
wrong_answers:
  - Kulttuurikonservatismi edellyttää perinteisten arvojen valtiollista valvontaa, kun taas poliittinen konservatismi ei sitä edellytä
  - Kulttuurikonservatismi keskittyy talouspolitiikkaan, kun taas poliittinen konservatismi keskittyy sosiaalisiin kysymyksiin
  - Kulttuurikonservatismi vastustaa kaikenlaista muutosta, kun taas poliittinen konservatismi hyväksyy asteittaiset uudistukset
explanation: |
  Luvussa todetaan selvästi, että kulttuurikonservatismi on henkilökohtaista pitäytymistä perinteisiin moraalisiin arvoihin, antropologiaan, estetiikkaan ja metafysiikkaan
  joka on periytynyt menneisyydestä, ja toteaa nimenomaisesti, että "se ei ole poliittinen filosofia" Sitä vastoin poliittinen konservatismi kuvataan tapana järjestää yhteiskunta kiinteän järjestyksen mukaisesti. Tämä erottelu on ratkaiseva, koska se osoittaa, että perinteisiä arvoja voi pitää henkilökohtaisesti yllä ilman, että niitä välttämättä halutaan tyrkyttää poliittisin keinoin tai valtiovallan voimin.
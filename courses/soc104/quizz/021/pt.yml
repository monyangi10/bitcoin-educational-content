question: Qual é a principal caraterística que distingue o conservadorismo cultural do conservadorismo político?
answer: O conservadorismo cultural é uma adesão pessoal aos valores tradicionais e não uma filosofia política
wrong_answers:
  - O conservadorismo cultural exige que o governo imponha os valores tradicionais, ao passo que o conservadorismo político não o faz
  - O conservadorismo cultural centra-se nas políticas económicas, enquanto o conservadorismo político se centra nas questões sociais
  - O conservadorismo cultural opõe-se a todas as formas de mudança, enquanto o conservadorismo político aceita uma reforma gradual
explanation: |
  O capítulo afirma claramente que o conservadorismo cultural é uma adesão pessoal aos valores morais tradicionais, à antropologia, à estética e à metafísica
  herdados do passado, e refere explicitamente que "não é uma filosofia política" Em contrapartida, o conservadorismo político é descrito como uma forma de organizar a sociedade de acordo com uma ordem fixa. Esta distinção é crucial porque mostra que se pode ter valores tradicionais a nível pessoal sem necessariamente querer impô-los através de meios políticos ou da força governamental.
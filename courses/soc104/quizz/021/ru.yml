question: Какая главная черта отличает культурный консерватизм от политического консерватизма?
answer: Культурный консерватизм - это личная приверженность традиционным ценностям, а не политическая философия
wrong_answers:
  - Культурный консерватизм требует государственного принуждения к соблюдению традиционных ценностей, в то время как политический консерватизм этого не делает
  - Культурный консерватизм фокусируется на экономической политике, а политический консерватизм - на социальных вопросах
  - Культурный консерватизм выступает против любых форм перемен, в то время как политический консерватизм принимает постепенные реформы
explanation: |
  В главе четко сказано, что культурный консерватизм - это личная приверженность традиционным моральным ценностям, антропологии, эстетике и метафизике
  унаследованным от прошлого, и прямо отмечает, что "это не политическая философия" Напротив, политический консерватизм описывается как способ организации общества в соответствии с установленным порядком. Это различие крайне важно, поскольку показывает, что человек может придерживаться традиционных ценностей лично, не желая навязывать их политическими средствами или силой правительства.
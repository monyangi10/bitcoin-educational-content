question: Mis on peamine tunnus, mis eristab kultuurikonservatismi poliitilisest konservatismist?
answer: Kultuurikonservatism on isiklik kinnipidamine traditsioonilistest väärtustest, mitte poliitiline filosoofia
wrong_answers:
  - Kultuurikonservatism nõuab traditsiooniliste väärtuste jõustamist valitsuse poolt, samas kui poliitiline konservatism seda ei nõua
  - Kultuurikonservatism keskendub majanduspoliitikale, poliitiline konservatism aga sotsiaalküsimustele
  - Kultuurikonservatism on igasuguste muutuste vastu, samas kui poliitiline konservatism aktsepteerib järkjärgulist reformi
explanation: |
  Peatükis on selgelt öeldud, et kultuurikonservatism on isiklik kinnipidamine traditsioonilistest moraaliväärtustest, antropoloogiast, esteetikast ja metafüüsikast
  mis on päritud minevikust, ning märgib selgesõnaliselt, et "see ei ole poliitiline filosoofia" Seevastu poliitilist konservatismi kirjeldatakse kui viisi, kuidas korraldada ühiskonda kindla korra järgi. See eristamine on oluline, sest see näitab, et isiklikult võib omada traditsioonilisi väärtusi, ilma et tahaks neid tingimata poliitiliste vahenditega või valitsuse jõuga peale suruda.
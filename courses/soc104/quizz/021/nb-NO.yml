question: Hva er det viktigste kjennetegnet som skiller kulturkonservatisme fra politisk konservatisme?
answer: Kulturkonservatisme er en personlig tilslutning til tradisjonelle verdier og ikke en politisk filosofi
wrong_answers:
  - Kulturkonservatisme krever statlig håndhevelse av tradisjonelle verdier, mens politisk konservatisme ikke gjør det
  - Kulturkonservatisme fokuserer på økonomisk politikk, mens politisk konservatisme fokuserer på sosiale spørsmål
  - Kulturkonservatismen motsetter seg alle former for endring, mens den politiske konservatismen aksepterer gradvise reformer
explanation: |
  Kapitlet slår klart fast at kulturkonservatisme er en personlig tilslutning til tradisjonelle moralske verdier, antropologi, estetikk og metafysikk
  og metafysikk som er nedarvet fra fortiden, og det påpekes eksplisitt at "det ikke er en politisk filosofi" Politisk konservatisme beskrives derimot som en måte å organisere samfunnet på i henhold til en fast orden. Dette skillet er avgjørende fordi det viser at man kan ha tradisjonelle verdier personlig uten nødvendigvis å ønske å påtvinge dem med politiske midler eller statlig makt.
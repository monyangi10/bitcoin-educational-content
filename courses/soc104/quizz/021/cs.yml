question: Jaký je hlavní rys, který odlišuje kulturní konzervatismus od politického konzervatismu?
answer: Kulturní konzervatismus je osobním vyznáváním tradičních hodnot a není politickou filozofií
wrong_answers:
  - Kulturní konzervatismus vyžaduje vládní prosazování tradičních hodnot, zatímco politický konzervatismus nikoli
  - Kulturní konzervatismus se zaměřuje na hospodářskou politiku, zatímco politický konzervatismus na sociální otázky
  - Kulturní konzervatismus se staví proti všem formám změn, zatímco politický konzervatismus připouští postupné reformy
explanation: |
  V kapitole se jasně uvádí, že kulturní konzervatismus je osobní lpění na tradičních morálních hodnotách, antropologii, estetice a metafyzice
  zděděné z minulosti, a výslovně uvádí, že "není politickou filozofií" Naproti tomu politický konzervatismus je popisován jako způsob uspořádání společnosti podle pevného řádu. Toto rozlišení je zásadní, protože ukazuje, že člověk může osobně zastávat tradiční hodnoty, aniž by je nutně chtěl vnucovat politickými prostředky nebo vládní silou.
question: ¿Cuál es la principal característica que distingue al conservadurismo cultural del conservadurismo político?
answer: El conservadurismo cultural es una adhesión personal a los valores tradicionales y no una filosofía política
wrong_answers:
  - El conservadurismo cultural requiere que el gobierno imponga los valores tradicionales, mientras que el conservadurismo político no
  - El conservadurismo cultural se centra en las políticas económicas, mientras que el conservadurismo político se centra en las cuestiones sociales
  - El conservadurismo cultural se opone a toda forma de cambio, mientras que el conservadurismo político acepta la reforma gradual
explanation: |
  El capítulo afirma claramente que el conservadurismo cultural es una adhesión personal a los valores morales, la antropología, la estética y la metafísica tradicionales
  heredados del pasado, y señala explícitamente que "no es una filosofía política" En cambio, el conservadurismo político se describe como una forma de organizar la sociedad según un orden fijo. Esta distinción es crucial porque demuestra que se pueden tener valores tradicionales a título personal sin querer imponerlos necesariamente por medios políticos o la fuerza del gobierno.
question: 區別文化保守主義與政治保守主義的主要特徵是什麼？
answer: 文化保守主義是個人對傳統價值的堅持，而不是一種政治哲學。
wrong_answers:
  - 文化保守主義需要政府強制執行傳統價值，而政治保守主義則不需要。
  - 文化保守主義著重於經濟政策，而政治保守主義則著重於社會議題。
  - 文化保守主義反對一切形式的變革，而政治保守主義則接受循序漸進的改革。
explanation: |
  這一章清楚地指出，文化保守主義是對傳統道德價值、人類學、美學和形而上學的個人堅持。
  並明確指出「它不是一種政治哲學」。相反地，政治保守主義被描述為一種按照固定秩序組織社會的方式。這個區別是很重要的，因為它顯示出一個人可以個人堅持傳統的價值觀，而不一定想要透過政治手段或政府力量來強加這些價值觀。
question: Kültürel muhafazakârlığı siyasi muhafazakârlıktan ayıran temel özellik nedir?
answer: Kültürel muhafazakârlık geleneksel değerlere kişisel bir bağlılıktır ve siyasi bir felsefe değildir
wrong_answers:
  - Kültürel muhafazakârlık geleneksel değerlerin devlet tarafından uygulanmasını gerektirirken, siyasi muhafazakârlık bunu gerektirmez
  - Kültürel muhafazakârlık ekonomi politikalarına, siyasi muhafazakârlık ise sosyal konulara odaklanır
  - Kültürel muhafazakarlık her türlü değişime karşı çıkarken, siyasi muhafazakarlık kademeli reformu kabul eder
explanation: |
  Bu bölümde kültürel muhafazakârlığın geleneksel ahlaki değerlere, antropolojiye, estetiğe ve metafiziğe kişisel bir bağlılık olduğu açıkça belirtilmektedir
  geçmişten miras kalmıştır ve açıkça 'siyasi bir felsefe olmadığını' belirtmektedir Buna karşılık siyasi muhafazakarlık, toplumu sabit bir düzene göre organize etmenin bir yolu olarak tanımlanmaktadır. Bu ayrım çok önemlidir çünkü bir kişinin geleneksel değerlere kişisel olarak sahip olabileceğini ancak bunları siyasi yollarla ya da hükümet gücüyle empoze etmek istemeyebileceğini göstermektedir.
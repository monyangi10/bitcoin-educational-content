question: 文化保守主义区别于政治保守主义的主要特征是什么？
answer: 文化保守主义是个人对传统价值观的坚持，而不是一种政治哲学
wrong_answers:
  - 文化保守主义要求政府执行传统价值观，而政治保守主义则不需要
  - 文化保守主义侧重于经济政策，而政治保守主义侧重于社会问题
  - 文化保守主义反对一切形式的变革，而政治保守主义则接受渐进式改革
explanation: |
  该章明确指出，文化保守主义是一种对传统道德价值观、人类学、美学和形而上学的个人坚持。
  并明确指出 "它不是一种政治哲学"。相比之下，政治保守主义被描述为一种按照固定秩序组织社会的方式。这一区别至关重要，因为它表明，一个人可以个人持有传统价值观，而不一定要通过政治手段或政府力量将其强加于人。
question: ลักษณะสำคัญที่แยกความแตกต่างระหว่างอนุรักษ์นิยมทางวัฒนธรรมกับอนุรักษ์นิยมทางการเมืองคืออะไร?
answer: อนุรักษนิยมทางวัฒนธรรมคือการยึดมั่นในค่านิยมดั้งเดิมส่วนบุคคลและไม่ใช่ปรัชญาทางการเมือง
wrong_answers:
  - ลัทธิอนุรักษนิยมทางวัฒนธรรมต้องการการบังคับใช้ค่านิยมดั้งเดิมโดยรัฐบาล ในขณะที่ลัทธิอนุรักษนิยมทางการเมืองไม่ต้องการ
  - อนุรักษนิยมทางวัฒนธรรมมุ่งเน้นไปที่นโยบายเศรษฐกิจ ในขณะที่อนุรักษนิยมทางการเมืองมุ่งเน้นไปที่ประเด็นทางสังคม
  - ลัทธิอนุรักษนิยมทางวัฒนธรรมต่อต้านการเปลี่ยนแปลงทุกรูปแบบ ในขณะที่ลัทธิอนุรักษนิยมทางการเมืองยอมรับการปฏิรูปอย่างค่อยเป็นค่อยไป
explanation: |
  บทนี้ระบุไว้อย่างชัดเจนว่าการอนุรักษ์วัฒนธรรมเป็นการยึดมั่นในคุณค่าทางศีลธรรมแบบดั้งเดิม มานุษยวิทยา สุนทรียศาสตร์ และอภิปรัชญาที่สืบทอดมาจากอดีต และระบุไว้อย่างชัดเจนว่า 'มันไม่ใช่ปรัชญาทางการเมือง' ในทางตรงกันข้าม การอนุรักษ์ทางการเมืองถูกอธิบายว่าเป็นวิธีการจัดระเบียบสังคมตามลำดับที่แน่นอน ความแตกต่างนี้มีความสำคัญเพราะแสดงให้เห็นว่าคนเราสามารถยึดถือคุณค่าแบบดั้งเดิมในระดับบุคคลได้โดยไม่จำเป็นต้องการบังคับใช้ผ่านวิธีการทางการเมืองหรืออำนาจของรัฐบาล
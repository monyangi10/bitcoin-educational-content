question: Vilken är den viktigaste egenskapen som skiljer kulturkonservatism från politisk konservatism?
answer: Kulturkonservatism är en personlig anslutning till traditionella värderingar och är inte en politisk filosofi
wrong_answers:
  - Kulturell konservatism kräver att staten upprätthåller traditionella värderingar, medan politisk konservatism inte gör det
  - Kulturkonservatismen fokuserar på ekonomisk politik medan den politiska konservatismen fokuserar på sociala frågor
  - Kulturkonservatismen motsätter sig alla former av förändring medan den politiska konservatismen accepterar gradvisa reformer
explanation: |
  I kapitlet anges tydligt att kulturkonservatism är ett personligt fasthållande vid traditionella moraliska värderingar, antropologi, estetik och metafysik
  som ärvts från det förflutna, och det konstateras uttryckligen att "det inte är en politisk filosofi" Politisk konservatism beskrivs däremot som ett sätt att organisera samhället enligt en bestämd ordning. Denna distinktion är viktig eftersom den visar att man kan ha traditionella värderingar personligen utan att nödvändigtvis vilja införa dem med politiska medel eller regeringsmakt.
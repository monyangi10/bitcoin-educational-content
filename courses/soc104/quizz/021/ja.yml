question: 文化的保守主義と政治的保守主義を区別する主な特徴は何か？
answer: 文化的保守主義とは、伝統的価値観への個人的な固執であり、政治的な哲学ではない
wrong_answers:
  - 文化的保守主義は、政府による伝統的価値観の強制を必要とするが、政治的保守主義はそうではない。
  - 文化的保守主義は経済政策を重視し、政治的保守主義は社会問題を重視する
  - 文化的保守主義はあらゆる形態の変化に反対するが、政治的保守主義は緩やかな改革を受け入れる。
explanation: |
  この章では、文化的保守主義とは、過去から受け継いだ伝統的な道徳的価値観、人間学、美学、形而上学に個人的に固執することであると明確に述べている。
  文化的保守主義とは、過去から受け継いだ伝統的な道徳的価値観、人間学、美学、形而上学に個人的に固執することであり、『政治的哲学ではない』と明確に述べている。対照的に、政治的保守主義は、一定の秩序に従って社会を組織する方法として説明されている。この区別は、必ずしも政治的手段や政府の力によって伝統的価値観を押し付けようとしなくても、伝統的価値観を個人的に保持することができることを示すものであり、極めて重要である。
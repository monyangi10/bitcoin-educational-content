question: Trục kinh tế phía bên phải (hướng về 100) thể hiện điều gì trong sơ đồ chính trị hai chiều?
answer: Ưu tiên tự do kinh tế với sự can thiệp của nhà nước ít hơn, thuế thấp hơn và thị trường tự do.
wrong_answers:
  - Ưu tiên sự can thiệp mạnh mẽ của nhà nước vào nền kinh tế thông qua thuế suất và quy định cao.
  - Ưu tiên các quyền tự do cá nhân và sự khoan dung xã hội với những hạn chế đạo đức tối thiểu.
  - Ưu tiên các giá trị truyền thống, trật tự và an ninh với các chuẩn mực đạo đức do nhà nước thực thi.
explanation: |
  Trục kinh tế bên phải thể hiện tự do kinh tế, đặc trưng bởi sự can thiệp tối thiểu của nhà nước vào nền kinh tế, quy định và thuế thấp hơn, và nhấn mạnh vào thị trường tự do, quyền sở hữu tư nhân và cạnh tranh. Điều này trái ngược với trục bên trái ủng hộ sự can thiệp mạnh mẽ của nhà nước vào nền kinh tế. Các lựa chọn khác mô tả lập trường kinh tế bên trái hoặc lập trường trên trục tự do cá nhân (phía trên dành cho tự do cá nhân, phía dưới dành cho trật tự truyền thống).
question: Apa yang diwakili oleh sisi kanan sumbu ekonomi (ke arah 100) dalam diagram politik dua dimensi?
answer: Preferensi untuk kebebasan ekonomi dengan intervensi negara yang lebih sedikit, pajak yang lebih rendah, dan pasar bebas
wrong_answers:
  - Preferensi untuk intervensi negara yang kuat dalam perekonomian dengan pajak dan peraturan yang tinggi
  - Mengutamakan kebebasan pribadi individu dan toleransi sosial dengan batasan moral yang minimal
  - Preferensi untuk nilai-nilai tradisional, ketertiban, dan keamanan dengan standar moral yang ditegakkan oleh negara
explanation: |
  Sisi kanan dari poros ekonomi mewakili kebebasan ekonomi, yang ditandai dengan intervensi negara yang minimal dalam perekonomian, peraturan dan pajak yang lebih rendah,
  dan penekanan pada pasar bebas, kepemilikan pribadi, dan kompetisi. Hal ini kontras dengan sisi kiri yang mendukung intervensi ekonomi negara yang kuat. Pilihan lainnya menggambarkan posisi ekonomi kiri atau posisi pada sumbu kebebasan pribadi (atas untuk kebebasan individu, bawah untuk tatanan tradisional).
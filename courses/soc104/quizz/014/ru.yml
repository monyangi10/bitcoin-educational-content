question: Что представляет собой правая сторона экономической оси (в направлении 100) на двухмерной политической диаграмме?
answer: Предпочитает экономическую свободу с меньшим вмешательством государства, более низкими налогами и свободными рынками
wrong_answers:
  - Предпочитает сильное вмешательство государства в экономику с высокими налогами и регулированием
  - Предпочитает индивидуальные личные свободы и социальную терпимость с минимальными моральными ограничениями
  - Предпочитает традиционные ценности, порядок и безопасность с государственными нормами морали
explanation: |
  Правая сторона экономической оси представляет собой экономическую свободу, характеризующуюся минимальным вмешательством государства в экономику, более низким уровнем регулирования и налогов,
  и акцентом на свободные рынки, частную собственность и конкуренцию. Это контрастирует с левой стороной, которая выступает за сильное государственное вмешательство в экономику. Остальные варианты описывают либо левую экономическую позицию, либо позицию по оси личных свобод (верхняя часть - свобода личности, нижняя - традиционный порядок).
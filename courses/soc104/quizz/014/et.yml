question: Mida kujutab kahemõõtmelisel poliitilisel diagrammil majandustelje parem pool (100 suunas)?
answer: Eelistab majanduslikku vabadust, vähem riigipoolset sekkumist, madalamaid makse ja vabu turge
wrong_answers:
  - Riigi tugeva sekkumise eelistamine majandusse koos kõrgete maksude ja regulatsioonidega
  - Individuaalsete isikuvabaduste ja sotsiaalse sallivuse eelistamine minimaalsete moraalsete piirangutega
  - Traditsiooniliste väärtuste, korra ja turvalisuse eelistamine koos riiklikult kehtestatud moraalinormidega
explanation: |
  Majandustelje parempoolne pool esindab majanduslikku vabadust, mida iseloomustab riigi minimaalne sekkumine majandusse, madalamad eeskirjad ja maksud,
  ning rõhuasetus vabadele turgudele, eraomandile ja konkurentsile. See vastandub vasakpoolsele küljele, mis pooldab tugevat riiklikku sekkumist majandusse. Teised valikud kirjeldavad kas vasakpoolset majanduslikku positsiooni või seisukohti isikuvabaduste teljel (üleval individuaalse vabaduse, allosas traditsioonilise korra poolt).
question: Upande wa kulia wa mhimili wa kiuchumi (kuelekea 100) unawakilisha nini katika mchoro wa kisiasa wenye pande mbili?
answer: Upendeleo kwa uhuru wa kiuchumi bila kuingilia kati kwa serikali, kodi ndogo, na masoko huru
wrong_answers:
  - Upendeleo kwa uingiliaji kati mkubwa wa serikali katika uchumi wenye kodi na kanuni za juu
  - Upendeleo kwa uhuru wa kibinafsi wa mtu binafsi na uvumilivu wa kijamii bila vikwazo vikubwa vya maadili
  - Upendeleo kwa maadili ya kitamaduni, utaratibu, na usalama pamoja na viwango vya maadili vinavyotekelezwa na serikali
explanation: |
  Upande wa kulia wa mhimili wa kiuchumi unawakilisha uhuru wa kiuchumi, unaoonyeshwa na uingiliaji mdogo wa serikali katika uchumi, kanuni na kodi za chini, na msisitizo katika masoko huria, mali binafsi, na ushindani. Hii inatofautiana na upande wa kushoto ambao unapendelea uingiliaji kati mkubwa wa kiuchumi wa serikali. Chaguzi zingine zinaelezea msimamo wa kiuchumi wa kushoto au nafasi kwenye mhimili wa uhuru wa kibinafsi (juu kwa uhuru wa mtu binafsi, chini kwa utaratibu wa kitamaduni).
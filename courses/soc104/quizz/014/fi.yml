question: Mitä talousakselin oikea puoli (kohti 100) edustaa kaksiulotteisessa poliittisessa kaaviossa?
answer: Taloudellisen vapauden suosiminen vähemmällä valtion puuttumisella, alhaisemmilla veroilla ja vapailla markkinoilla
wrong_answers:
  - Valtion voimakkaan puuttumisen suosiminen talouteen korkeiden verojen ja sääntelyn avulla
  - Yksilön henkilökohtaisten vapauksien ja sosiaalisen suvaitsevaisuuden suosiminen mahdollisimman vähäisin moraalisin rajoituksin
  - Perinteisten arvojen, järjestyksen ja turvallisuuden suosiminen valtion vahvistamien moraalinormien avulla
explanation: |
  Taloudellisen akselin oikea puoli edustaa taloudellista vapautta, jolle on ominaista valtion vähäinen puuttuminen talouteen, alhaisempi sääntely ja alhaisemmat verot,
  ja vapaiden markkinoiden, yksityisomaisuuden ja kilpailun korostaminen. Tämä on ristiriidassa vasemmanpuoleisen akselin kanssa, joka suosii voimakasta valtion puuttumista talouteen. Muut vaihtoehdot kuvaavat joko vasemmiston taloudellista kantaa tai henkilökohtaisten vapauksien akselin kantoja (ylhäällä yksilönvapaus, alhaalla perinteinen järjestys).
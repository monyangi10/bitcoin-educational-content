question: Was bedeutet die rechte Seite der Wirtschaftsachse (in Richtung 100) in dem zweidimensionalen politischen Diagramm?
answer: Vorliebe für wirtschaftliche Freiheit mit weniger staatlichen Eingriffen, niedrigeren Steuern und freien Märkten
wrong_answers:
  - Vorliebe für starke staatliche Eingriffe in die Wirtschaft mit hohen Steuern und Vorschriften
  - Bevorzugung individueller persönlicher Freiheiten und sozialer Toleranz mit minimalen moralischen Einschränkungen
  - Vorliebe für traditionelle Werte, Ordnung und Sicherheit mit staatlich verordneten moralischen Standards
explanation: |
  Die rechte Seite der Wirtschaftsachse steht für wirtschaftliche Freiheit, die durch minimale staatliche Eingriffe in die Wirtschaft, geringere Vorschriften und Steuern gekennzeichnet ist,
  und die Betonung von freien Märkten, Privateigentum und Wettbewerb. Dies steht im Gegensatz zur linken Seite, die starke staatliche Eingriffe in die Wirtschaft befürwortet. Die anderen Optionen beschreiben entweder die linke wirtschaftliche Position oder Positionen auf der Achse der persönlichen Freiheiten (oben für individuelle Freiheit, unten für die traditionelle Ordnung).
question: Какво представлява дясната страна на икономическата ос (към 100) в двуизмерната политическа диаграма?
answer: Предпочитание за икономическа свобода с по-малко държавна намеса, по-ниски данъци и свободни пазари
wrong_answers:
  - Предпочитание за силна държавна намеса в икономиката с високи данъци и регулации
  - Предпочитание към индивидуалните лични свободи и социалната толерантност с минимални морални ограничения
  - Предпочитание към традиционните ценности, ред и сигурност с наложени от държавата морални норми
explanation: |
  Дясната страна на икономическата ос представлява икономическата свобода, която се характеризира с минимална държавна намеса в икономиката, по-ниски регулации и данъци,
  и акцентиране върху свободните пазари, частната собственост и конкуренцията. Това контрастира с лявата страна, която подкрепя силната държавна намеса в икономиката. Другите варианти описват или лявата икономическа позиция, или позициите по оста на личните свободи (горе за индивидуалната свобода, долу за традиционния ред).
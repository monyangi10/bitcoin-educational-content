question: What does the right side of the economic axis (toward 100) represent in the two-dimensional political diagram?
answer: Preference for economic freedom with less state intervention, lower taxes, and free markets
wrong_answers:
  - Preference for strong state intervention in the economy with high taxes and regulations
  - Preference for individual personal freedoms and social tolerance with minimal moral restrictions
  - Preference for traditional values, order, and security with state-enforced moral standards
explanation: |
  The right side of the economic axis represents economic freedom, characterized by minimal state intervention in the economy, lower regulations and taxes, 
  and emphasis on free markets, private property, and competition. This contrasts with the left side which favors strong state economic intervention. The other options describe either the left economic position or positions on the personal freedoms axis (top for individual liberty, bottom for traditional order).

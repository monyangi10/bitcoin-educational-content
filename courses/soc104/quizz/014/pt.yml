question: O que representa o lado direito do eixo económico (em direção a 100) no diagrama político bidimensional?
answer: Preferência pela liberdade económica com menos intervenção do Estado, impostos mais baixos e mercados livres
wrong_answers:
  - Preferência por uma forte intervenção do Estado na economia, com impostos e regulamentação elevados
  - Preferência pelas liberdades pessoais individuais e pela tolerância social com restrições morais mínimas
  - Preferência por valores tradicionais, ordem e segurança com normas morais impostas pelo Estado
explanation: |
  O lado direito do eixo económico representa a liberdade económica, caracterizada por uma intervenção mínima do Estado na economia, menos regulamentação e impostos,
  e ênfase nos mercados livres, na propriedade privada e na concorrência. Isto contrasta com o lado esquerdo, que favorece uma forte intervenção económica do Estado. As outras opções descrevem a posição económica da esquerda ou as posições no eixo das liberdades pessoais (em cima para a liberdade individual, em baixo para a ordem tradicional).
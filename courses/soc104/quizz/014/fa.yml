question: سمت راست محور اقتصادی (به سمت 100) در نمودار سیاسی دو بعدی نمایانگر چیست؟
answer: ترجیح آزادی اقتصادی با مداخله کمتر دولت، مالیات‌های پایین‌تر و بازارهای آزاد
wrong_answers:
  - ترجیح مداخله قوی دولت در اقتصاد با مالیات‌ها و مقررات بالا
  - ترجیح آزادی‌های شخصی فردی و تحمل اجتماعی با حداقل محدودیت‌های اخلاقی
  - ترجیح ارزش‌های سنتی، نظم و امنیت با استانداردهای اخلاقی اعمال‌شده توسط دولت
explanation: |
  سمت راست محور اقتصادی نشان‌دهنده آزادی اقتصادی است که با حداقل دخالت دولت در اقتصاد، کاهش مقررات و مالیات‌ها، و تأکید بر بازارهای آزاد، مالکیت خصوصی و رقابت مشخص می‌شود. این در تضاد با سمت چپ است که طرفدار دخالت قوی دولت در اقتصاد است. گزینه‌های دیگر یا موضع اقتصادی چپ را توصیف می‌کنند یا مواضع مربوط به محور آزادی‌های شخصی (بالا برای آزادی فردی، پایین برای نظم سنتی) را بیان می‌کنند.
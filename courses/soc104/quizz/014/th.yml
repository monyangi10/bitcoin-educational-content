question: ด้านขวาของแกนเศรษฐกิจ (ไปทาง 100) ในแผนภูมิการเมืองสองมิติแสดงถึงอะไร?
answer: ความชอบสำหรับเสรีภาพทางเศรษฐกิจที่มีการแทรกแซงของรัฐน้อยลง, ภาษีที่ต่ำกว่า, และตลาดเสรี
wrong_answers:
  - ความชื่นชอบในการแทรกแซงของรัฐอย่างเข้มแข็งในเศรษฐกิจด้วยภาษีและกฎระเบียบที่สูง
  - ความชอบในเสรีภาพส่วนบุคคลและความอดทนทางสังคมโดยมีข้อจำกัดทางศีลธรรมน้อยที่สุด
  - ความชื่นชอบในค่านิยมดั้งเดิม ความเป็นระเบียบ และความปลอดภัย พร้อมมาตรฐานทางศีลธรรมที่บังคับใช้โดยรัฐ
explanation: |
  ด้านขวาของแกนเศรษฐกิจแสดงถึงเสรีภาพทางเศรษฐกิจ ซึ่งมีลักษณะเด่นคือการแทรกแซงของรัฐในเศรษฐกิจน้อยที่สุด กฎระเบียบและภาษีที่ต่ำกว่า และการเน้นตลาดเสรี ทรัพย์สินส่วนตัว และการแข่งขัน ซึ่งตรงข้ามกับด้านซ้ายที่สนับสนุนการแทรกแซงทางเศรษฐกิจของรัฐอย่างเข้มแข็ง ตัวเลือกอื่นๆ อธิบายถึงตำแหน่งทางเศรษฐกิจด้านซ้ายหรือจุดยืนในแกนเสรีภาพส่วนบุคคล (ด้านบนสำหรับเสรีภาพส่วนบุคคล ด้านล่างสำหรับระเบียบแบบดั้งเดิม)
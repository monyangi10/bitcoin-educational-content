question: 在二維政治圖表中，經濟軸的右側（朝向 100）代表什麼？
answer: 偏好較少國家干預、較低稅率和自由市場的經濟自由
wrong_answers:
  - 偏好國家以高稅率和高規範強力干預經濟
  - 偏好個人自由和社會容忍，道德限制極少
  - 偏好傳統價值、秩序和安全，以及國家強制的道德標準
explanation: |
  經濟軸的右側代表經濟自由，其特點是國家對經濟的干預少、法規和稅收低、
  以及強調自由市場、私有財產和競爭。這與左側形成對比，左側傾向於強烈的國家經濟干預。其他選項描述的是左邊的經濟立場或個人自由軸上的立場 (上邊代表個人自由，下邊代表傳統秩序)。
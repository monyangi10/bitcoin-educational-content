question: 二次元の政治図において、経済軸の右側（100に向かって）は何を表しているのか？
answer: 国家の介入が少なく、税金が低く、自由な市場を持つ経済的自由を好む。
wrong_answers:
  - 高い税金と規制による経済への強い国家介入を好む。
  - 個人の自由と、道徳的制約を最小限に抑えた社会的寛容を好む。
  - 国家が強制する道徳基準による伝統的価値観、秩序、安全を好む。
explanation: |
  経済軸の右側は経済的自由を表し、経済への国家の介入を最小限に抑え、規制や税金を低く抑えることを特徴とする、
  自由市場、私有財産、競争を重視する。これは、国家による強い経済介入を好む左側とは対照的である。その他の選択肢は、左側の経済的立場か、個人の自由軸上の立場（上が個人の自由、下が伝統的秩序）を表している。
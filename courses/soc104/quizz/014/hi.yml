question: दो आयामी राजनीतिक आरेख में आर्थिक अक्ष का दाहिना भाग (100 की ओर) क्या दर्शाता है?
answer: कम सरकारी हस्तक्षेप, कम कर और मुक्त बाजारों के साथ आर्थिक स्वतंत्रता को प्राथमिकता देना।
wrong_answers:
  - अर्थव्यवस्था में उच्च करों और नियमों के साथ मजबूत राज्य हस्तक्षेप को प्राथमिकता देना
  - व्यक्तिगत स्वतंत्रता और सामाजिक सहिष्णुता को प्राथमिकता देना, साथ ही नैतिक प्रतिबंधों को न्यूनतम रखना।
  - राज्य द्वारा लागू नैतिक मानकों के साथ पारंपरिक मूल्यों, व्यवस्था और सुरक्षा को प्राथमिकता देना।
explanation: |
  आर्थिक अक्ष का दायाँ भाग आर्थिक स्वतंत्रता का प्रतिनिधित्व करता है, जिसकी विशेषता अर्थव्यवस्था में न्यूनतम सरकारी हस्तक्षेप, कम नियमन और कर,
  और मुक्त बाज़ार, निजी संपत्ति और प्रतिस्पर्धा पर ज़ोर देना है। यह बाएँ भाग के विपरीत है जो मजबूत सरकारी आर्थिक हस्तक्षेप का समर्थन करता है। अन्य विकल्प या तो वामपंथी आर्थिक स्थिति या व्यक्तिगत स्वतंत्रता अक्ष पर स्थित स्थितियों का वर्णन करते हैं (ऊपरी भाग व्यक्तिगत स्वतंत्रता के लिए, निचला भाग पारंपरिक व्यवस्था के लिए)।
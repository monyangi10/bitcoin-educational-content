question: Wat stelt de rechterkant van de economische as (richting 100) voor in het tweedimensionale politieke diagram?
answer: Voorkeur voor economische vrijheid met minder staatsinterventie, lagere belastingen en vrije markten
wrong_answers:
  - Voorkeur voor sterke staatsinterventie in de economie met hoge belastingen en regelgeving
  - Voorkeur voor individuele persoonlijke vrijheden en sociale tolerantie met minimale morele beperkingen
  - Voorkeur voor traditionele waarden, orde en veiligheid met door de staat opgelegde morele normen
explanation: |
  De rechterkant van de economische as vertegenwoordigt economische vrijheid, gekenmerkt door minimale staatsinterventie in de economie, lagere regelgeving en belastingen,
  en de nadruk op vrije markten, privé-eigendom en concurrentie. Dit staat in contrast met de linkerkant die voorstander is van sterke economische staatsinterventie. De andere opties beschrijven ofwel de linkse economische positie of posities op de as van persoonlijke vrijheden (bovenaan voor individuele vrijheid, onderaan voor traditionele orde).
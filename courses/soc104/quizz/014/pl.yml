question: Co reprezentuje prawa strona osi ekonomicznej (w kierunku 100) na dwuwymiarowym diagramie politycznym?
answer: Preferuje wolność gospodarczą z mniejszą interwencją państwa, niższymi podatkami i wolnymi rynkami
wrong_answers:
  - Preferowanie silnej interwencji państwa w gospodarkę z wysokimi podatkami i regulacjami
  - Preferowanie indywidualnych wolności osobistych i tolerancji społecznej przy minimalnych ograniczeniach moralnych
  - Preferowanie tradycyjnych wartości, porządku i bezpieczeństwa oraz standardów moralnych egzekwowanych przez państwo
explanation: |
  Prawa strona osi ekonomicznej reprezentuje wolność gospodarczą, charakteryzującą się minimalną interwencją państwa w gospodarkę, niższymi regulacjami i podatkami,
  oraz nacisk na wolne rynki, własność prywatną i konkurencję. Kontrastuje to z lewą stroną, która preferuje silną interwencję państwa w gospodarkę. Pozostałe opcje opisują albo lewicową pozycję ekonomiczną, albo pozycje na osi wolności osobistych (na górze wolność indywidualna, na dole tradycyjny porządek).
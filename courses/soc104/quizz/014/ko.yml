question: 2차원 정치 다이어그램에서 경제 축의 오른쪽(100을 향함)은 무엇을 의미하나요?
answer: 국가 개입이 적고, 세금이 낮으며, 자유 시장이 있는 경제적 자유를 선호합니다
wrong_answers:
  - 높은 세금과 규제로 경제에 대한 국가의 강력한 개입을 선호함
  - 최소한의 도덕적 제한으로 개인의 자유와 사회적 관용을 선호합니다
  - 국가가 강제하는 도덕적 기준과 함께 전통적인 가치, 질서, 보안에 대한 선호도
explanation: |
  경제 축의 오른쪽은 경제에 대한 국가의 개입을 최소화하고 규제와 세금을 낮추는 것이 특징인 경제적 자유를 나타냅니다,
  그리고 자유 시장, 사유 재산, 경쟁을 강조하는 것을 특징으로 합니다. 이는 국가의 강력한 경제 개입을 선호하는 왼쪽과 대조를 이룹니다. 다른 옵션은 좌파의 경제적 입장 또는 개인의 자유 축에 대한 입장을 나타냅니다(위쪽은 개인의 자유, 아래쪽은 전통적 질서).
question: 在二维政治图表中，经济轴右侧（朝向 100）代表什么？
answer: 倾向于经济自由，减少国家干预、降低税收和自由市场
wrong_answers:
  - 倾向于国家通过高税收和高监管对经济进行强有力的干预
  - 倾向于个人自由和社会宽容，尽量减少道德限制
  - 偏好传统价值观、秩序和安全，以及国家强制推行的道德标准
explanation: |
  经济轴的右侧代表经济自由，其特点是国家对经济的干预最少，法规和税收较低、
  强调自由市场、私有财产和竞争。这与左侧形成鲜明对比，左侧倾向于国家对经济的强力干预。其他选项描述的是左翼经济立场或个人自由轴上的立场（上代表个人自由，下代表传统秩序）。
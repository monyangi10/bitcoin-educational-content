question: İki boyutlu siyasi diyagramda ekonomik eksenin sağ tarafı (100'e doğru) neyi temsil ediyor?
answer: Daha az devlet müdahalesi, daha düşük vergiler ve serbest piyasalar ile ekonomik özgürlük tercihi
wrong_answers:
  - Yüksek vergi ve düzenlemelerle ekonomiye güçlü devlet müdahalesi tercihi
  - Bireysel kişisel özgürlükler ve asgari ahlaki kısıtlamalarla toplumsal hoşgörü tercihi
  - Devlet tarafından uygulanan ahlaki standartlar ile geleneksel değerler, düzen ve güvenlik tercihi
explanation: |
  Ekonomik eksenin sağ tarafı, ekonomiye minimum devlet müdahalesi, daha düşük düzenlemeler ve vergilerle karakterize edilen ekonomik özgürlüğü temsil eder,
  ve serbest piyasalara, özel mülkiyete ve rekabete vurgu yapar. Bu, güçlü devlet ekonomik müdahalesini destekleyen sol tarafla tezat oluşturmaktadır. Diğer seçenekler ya sol ekonomik pozisyonu ya da kişisel özgürlükler eksenindeki pozisyonları tanımlamaktadır (bireysel özgürlük için üst, geleneksel düzen için alt).
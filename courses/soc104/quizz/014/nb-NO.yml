question: Hva representerer den høyre siden av den økonomiske aksen (mot 100) i det todimensjonale politiske diagrammet?
answer: Preferanse for økonomisk frihet med mindre statlig inngripen, lavere skatter og frie markeder
wrong_answers:
  - Preferanse for sterk statlig inngripen i økonomien med høye skatter og reguleringer
  - Preferanse for individuell personlig frihet og sosial toleranse med minimale moralske begrensninger
  - Preferanse for tradisjonelle verdier, orden og sikkerhet med statlig håndhevede moralske standarder
explanation: |
  Den høyre siden av den økonomiske aksen representerer økonomisk frihet, som kjennetegnes av minimal statlig inngripen i økonomien, lavere reguleringer og skatter,
  og vekt på frie markeder, privat eiendom og konkurranse. Dette står i kontrast til venstresiden, som favoriserer sterk statlig økonomisk inngripen. De andre alternativene beskriver enten den økonomiske venstresiden eller posisjoner på aksen for personlig frihet (øverst for individuell frihet, nederst for tradisjonell orden).
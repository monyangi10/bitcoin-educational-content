question: Uruhande rw’iburyo rw’umurongo w’ubutunzi (ruja ku 100) rugereranya iki mu kigereranyo ca politike c’ingero zibiri?
answer: Guhitamwo umwidegemvyo mu vy’ubutunzi ataco Leta yinjiramwo, imisoro igabanutse, n’amasoko yidegemvya
wrong_answers:
  - Guhitamwo ko Leta yinjira mu bukungu n'imisoro myinshi n'amabwirizwa
  - Guhitamwo umwidegemvyo w'umuntu ku giti ciwe n'ukwihanganira abantu n'imigenzo mikeyi
  - Guhitamwo ingingo ngenderwako z'imigenzo, urutonde n'umutekano bifise ingingo mfatirwako z'inyifato runtu zishirwa mu ngiro na Leta
explanation: |
  Uruhande rw’iburyo rw’umurongo w’ubutunzi rugereranya umwidegemvyo w’ubutunzi, ugaragazwa n’ukuntu Leta yinjira mu bukungu bikeyi, amategeko n’imisoro bigabanywa, 
  no gushimika ku masoko y’uburenganzira, ku mutungo w’abantu ku giti cabo, no ku mahiganwa. Ivyo bitandukanye n’uruhande rw’ibubamfu rushigikira ko Leta igira ico ikoze mu vy’ubutunzi. Ayandi mahitamwo adondora ikibanza c’ubutunzi c’ibubamfu canke ikibanza ku bijanye n’umwidegemvyo w’umuntu ku giti ciwe (hejuru ku mwidegemvyo w’umuntu ku giti ciwe, hasi ku rutonde rwa kera).
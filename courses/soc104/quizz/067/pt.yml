question: De acordo com a posição libertária sobre questões sociais, qual é o princípio fundamental que deve orientar a política governamental em todos os domínios?
answer: O Estado deve abster-se de regular as escolhas pessoais e deixar que as instituições privadas e os mecanismos de mercado tratem dessas questões
wrong_answers:
  - O Estado deve proteger ativamente os direitos das minorias, respeitando simultaneamente os valores culturais da maioria, através de uma regulamentação equilibrada
  - O Estado deve dar prioridade à segurança pública e à ordem social, mantendo um controlo rigoroso dos comportamentos individuais potencialmente nocivos
  - O Estado deve promover a justiça social, garantindo a igualdade de acesso aos direitos e à proteção de todos os cidadãos, independentemente da sua origem
explanation: |
  A filosofia libertária defende consistentemente uma intervenção mínima do Estado em todas as questões sociais. Quer se trate do casamento (privatização em vez de reconhecimento estatal), da imigração (baseada no mercado em vez de controlada pelo Estado), das armas (direitos individuais de autodefesa) ou das drogas (escolha pessoal sem interferência do Estado), os libertários acreditam fundamentalmente que o Estado não deve regular as decisões pessoais que não prejudiquem diretamente os outros.
  As outras opções representam abordagens socialistas, conservadoras e centristas, respetivamente, que aceitam diferentes graus de envolvimento do Estado em questões pessoais.
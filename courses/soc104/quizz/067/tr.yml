question: Toplumsal konulardaki özgürlükçü pozisyona göre, tüm alanlarda hükümet politikasına rehberlik etmesi gereken temel ilke nedir?
answer: Devlet kişisel tercihleri düzenlemekten çekilmeli ve bunun yerine özel kurumların ve piyasa mekanizmalarının bu konuları ele almasına izin vermelidir
wrong_answers:
  - Devlet, dengeli düzenlemeler yoluyla çoğunluğun kültürel değerlerine saygı gösterirken azınlık haklarını aktif bir şekilde korumalıdır
  - Devlet, potansiyel olarak zararlı bireysel davranışlar üzerinde sıkı kontrol sağlayarak kamu güvenliği ve sosyal düzene öncelik vermelidir
  - Devlet, geçmişine bakılmaksızın tüm vatandaşların haklara ve korumalara eşit erişimini sağlayarak sosyal adaleti teşvik etmelidir
explanation: |
  Liberteryen felsefe, tüm toplumsal konularda sürekli olarak asgari devlet müdahalesini savunur. İster evlilik (devletin tanıması yerine özelleştirme), ister göçmenlik (devlet kontrolü yerine piyasa temelli), ister silahlar (bireysel öz savunma hakları), isterse de uyuşturucu (devlet müdahalesi olmadan kişisel seçim) tartışılsın, liberteryenler temelde devletin başkalarına doğrudan zarar vermeyen kişisel kararları düzenlememesi gerektiğine inanırlar.
  Diğer seçenekler ise sırasıyla sosyalist, muhafazakar ve merkezci yaklaşımları temsil etmekte olup, hepsi de devletin kişisel meselelere farklı derecelerde müdahil olmasını kabul etmektedir.
question: Согласно либертарианской позиции по общественным вопросам, какой основополагающий принцип должен лежать в основе государственной политики во всех областях?
answer: Государство должно отказаться от регулирования личного выбора и позволить частным институтам и рыночным механизмам решать эти вопросы
wrong_answers:
  - Государство должно активно защищать права меньшинств, уважая культурные ценности большинства, путем сбалансированного регулирования
  - Государство должно уделять первостепенное внимание общественной безопасности и социальному порядку, строго контролируя потенциально опасное поведение индивидов
  - Государство должно способствовать социальной справедливости, обеспечивая равный доступ к правам и защите для всех граждан, независимо от их происхождения
explanation: |
  Либертарианская философия последовательно выступает за минимальное вмешательство государства во все общественные вопросы. Обсуждая вопросы брака (приватизация, а не государственное признание), иммиграции (рыночные отношения, а не государственное регулирование), оружия (индивидуальные права на самооборону) или наркотиков (личный выбор без вмешательства государства), либертарианцы считают, что государство не должно регулировать личные решения, которые не наносят прямого вреда другим.
  Остальные варианты представляют собой социалистический, консервативный и центристский подходы, соответственно, которые в той или иной степени допускают участие государства в решении личных вопросов.
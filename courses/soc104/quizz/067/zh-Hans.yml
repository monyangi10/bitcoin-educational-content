question: 根据自由主义者在社会问题上的立场，指导政府所有领域政策的基本原则是什么？
answer: 国家应退出对个人选择的监管，让私人机构和市场机制来处理这些问题
wrong_answers:
  - 国家应通过平衡监管，在尊重多数人文化价值观的同时，积极保护少数人的权利
  - 国家应优先考虑公共安全和社会秩序，严格控制可能有害的个人行为
  - 国家应促进社会公正，确保所有公民，无论其背景如何，都能平等地获得权利和保护
explanation: |
  自由主义哲学一贯主张在所有社会问题上尽量减少国家干预。无论是讨论婚姻（私有化而非国家承认）、移民（以市场为基础而非国家控制）、枪支（个人自卫权）还是毒品（个人选择而非国家干预），自由主义者从根本上认为，国家不应对不直接伤害他人的个人决定进行监管。
  其他选项分别代表了社会主义、保守主义和中间派的观点，它们都接受国家对个人事务不同程度的干预。
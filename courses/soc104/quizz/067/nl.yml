question: Wat is volgens het libertarische standpunt over maatschappelijke kwesties het fundamentele principe dat het overheidsbeleid op alle gebieden zou moeten sturen?
answer: De staat moet zich terugtrekken uit het reguleren van persoonlijke keuzes en in plaats daarvan toestaan dat particuliere instellingen en marktmechanismen deze zaken afhandelen
wrong_answers:
  - De staat moet de rechten van minderheden actief beschermen en tegelijkertijd de culturele waarden van de meerderheid respecteren door middel van evenwichtige regelgeving
  - De staat moet prioriteit geven aan openbare veiligheid en sociale orde door strenge controle uit te oefenen op potentieel schadelijk individueel gedrag
  - De staat moet sociale rechtvaardigheid bevorderen door te zorgen voor gelijke toegang tot rechten en bescherming voor alle burgers, ongeacht achtergrond
explanation: |
  De libertarische filosofie pleit consequent voor minimale staatsinterventie in alle maatschappelijke kwesties. Of het nu gaat om het huwelijk (privatisering in plaats van staatserkenning), immigratie (marktwerking in plaats van staatscontrole), wapens (individueel recht op zelfverdediging) of drugs (persoonlijke keuze zonder staatsinmenging), libertariërs geloven fundamenteel dat de staat persoonlijke beslissingen die anderen niet direct schaden niet moet reguleren.
  De andere opties vertegenwoordigen respectievelijk socialistische, conservatieve en centristische benaderingen, die allemaal een verschillende mate van staatsbemoeienis met persoonlijke zaken accepteren.
question: Menurut posisi libertarian dalam isu-isu kemasyarakatan, apa prinsip dasar yang harus memandu kebijakan pemerintah di semua ranah?
answer: Negara harus menarik diri dari mengatur pilihan-pilihan pribadi dan membiarkan lembaga-lembaga swasta dan mekanisme pasar untuk menangani masalah-masalah ini sebagai gantinya
wrong_answers:
  - Negara harus secara aktif melindungi hak-hak minoritas sambil menghormati nilai-nilai budaya mayoritas melalui regulasi yang seimbang
  - Negara harus memprioritaskan keamanan publik dan ketertiban sosial dengan mempertahankan kontrol ketat atas perilaku individu yang berpotensi membahayakan
  - Negara harus mempromosikan keadilan sosial dengan memastikan akses yang sama terhadap hak dan perlindungan bagi semua warga negara tanpa memandang latar belakang
explanation: |
  Filosofi libertarian secara konsisten menganjurkan intervensi negara yang minimal di semua masalah sosial. Baik dalam membahas pernikahan (privatisasi daripada pengakuan negara), imigrasi (berbasis pasar daripada dikontrol negara), senjata (hak membela diri individu), atau narkoba (pilihan pribadi tanpa campur tangan negara), para libertarian pada dasarnya percaya bahwa negara tidak boleh mengatur keputusan pribadi yang tidak secara langsung merugikan orang lain.
  Pilihan-pilihan lainnya mewakili pendekatan sosialis, konservatif, dan sentris, yang semuanya menerima berbagai tingkat keterlibatan negara dalam masalah pribadi.
question: Welches ist nach der libertären Position zu gesellschaftlichen Fragen das grundlegende Prinzip, das die Regierungspolitik in allen Bereichen leiten sollte?
answer: Der Staat sollte sich aus der Regulierung persönlicher Entscheidungen zurückziehen und stattdessen private Institutionen und Marktmechanismen mit diesen Angelegenheiten betrauen
wrong_answers:
  - Der Staat sollte die Rechte von Minderheiten aktiv schützen und gleichzeitig die kulturellen Werte der Mehrheit durch eine ausgewogene Regulierung respektieren
  - Der Staat sollte der öffentlichen Sicherheit und der sozialen Ordnung Vorrang einräumen, indem er eine strenge Kontrolle über potenziell schädliche individuelle Verhaltensweisen ausübt
  - Der Staat sollte die soziale Gerechtigkeit fördern, indem er allen Bürgern unabhängig von ihrer Herkunft den gleichen Zugang zu Rechten und Schutzmaßnahmen gewährleistet
explanation: |
  Die libertäre Philosophie plädiert konsequent für minimale staatliche Eingriffe in allen gesellschaftlichen Bereichen. Egal, ob es um die Ehe (Privatisierung statt staatlicher Anerkennung), die Einwanderung (marktbasiert statt staatlich kontrolliert), Waffen (individuelles Selbstverteidigungsrecht) oder Drogen (persönliche Entscheidung ohne staatliche Einmischung) geht, die Libertären sind grundsätzlich der Meinung, dass der Staat persönliche Entscheidungen, die anderen nicht direkt schaden, nicht regulieren sollte.
  Die anderen Optionen stehen für sozialistische, konservative bzw. zentristische Ansätze, die alle ein unterschiedliches Maß an staatlicher Einmischung in persönliche Angelegenheiten akzeptieren.
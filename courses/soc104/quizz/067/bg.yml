question: Според либертарианската позиция по обществените въпроси кой е основният принцип, който трябва да ръководи държавната политика във всички области?
answer: Държавата трябва да се оттегли от регулирането на личния избор и да позволи на частните институции и пазарните механизми да се справят с тези въпроси
wrong_answers:
  - Държавата трябва активно да защитава правата на малцинствата, като същевременно зачита културните ценности на мнозинството чрез балансирано регулиране
  - Държавата трябва да даде приоритет на обществената сигурност и социалния ред, като поддържа строг контрол върху потенциално вредното поведение на индивидите
  - Държавата трябва да насърчава социалната справедливост, като осигурява равен достъп до права и защита за всички граждани, независимо от техния произход
explanation: |
  Либертарианската философия последователно се застъпва за минимална държавна намеса във всички обществени въпроси. Независимо дали става дума за брака (приватизация, а не признаване от държавата), имиграцията (пазарна, а не контролирана от държавата), оръжията (право на лична самозащита) или наркотиците (личен избор без държавна намеса), либертарианците вярват, че държавата не трябва да регулира личните решения, които не вредят пряко на другите.
  Другите варианти представляват съответно социалистически, консервативни и центристки подходи, които приемат различна степен на намеса на държавата в личните въпроси.
question: According to the libertarian position on societal issues, what is the fundamental principle that should guide government policy across all domains?
answer: The state should withdraw from regulating personal choices and allow private institutions and market mechanisms to handle these matters instead
wrong_answers:
  - The state should actively protect minority rights while respecting majority cultural values through balanced regulation
  - The state should prioritize public safety and social order by maintaining strict control over potentially harmful individual behaviors
  - The state should promote social justice by ensuring equal access to rights and protections for all citizens regardless of background
explanation: |
  The libertarian philosophy consistently advocates for minimal state intervention across all societal issues. Whether discussing marriage (privatization rather than state recognition), immigration (market-based rather than state-controlled), guns (individual self-defense rights), or drugs (personal choice without state interference), libertarians fundamentally believe the state should not regulate personal decisions that don't directly harm others. The other options represent socialist, conservative, and centrist approaches respectively, which all accept varying degrees of state involvement in personal matters.

question: Hva er det grunnleggende prinsippet som bør styre myndighetenes politikk på alle områder, ifølge libertarianernes syn på samfunnsspørsmål?
answer: Staten bør trekke seg tilbake fra å regulere personlige valg og i stedet la private institusjoner og markedsmekanismer håndtere disse spørsmålene
wrong_answers:
  - Staten bør aktivt beskytte minoriteters rettigheter og samtidig respektere majoritetens kulturelle verdier gjennom balansert regulering
  - Staten bør prioritere offentlig sikkerhet og sosial orden ved å opprettholde streng kontroll over potensielt skadelig individuell atferd
  - Staten skal fremme sosial rettferdighet ved å sikre lik tilgang til rettigheter og beskyttelse for alle borgere uavhengig av bakgrunn
explanation: |
  Den libertarianske filosofien tar konsekvent til orde for minimal statlig inngripen i alle samfunnsspørsmål. Enten det er snakk om ekteskap (privatisering fremfor statlig anerkjennelse), innvandring (markedsbasert fremfor statskontrollert), våpen (individuell selvforsvarsrett) eller narkotika (personlige valg uten statlig innblanding), mener libertarianere grunnleggende sett at staten ikke bør regulere personlige beslutninger som ikke direkte skader andre.
  De andre alternativene representerer henholdsvis sosialistiske, konservative og sentrumsorienterte tilnærminger, som alle aksepterer varierende grad av statlig innblanding i personlige anliggender.
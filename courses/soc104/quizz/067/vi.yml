question: Theo quan điểm tự do chủ nghĩa về các vấn đề xã hội, nguyên tắc cơ bản nào nên định hướng chính sách của chính phủ trên mọi lĩnh vực?
answer: Nhà nước nên rút khỏi việc can thiệp vào các lựa chọn cá nhân và cho phép các tổ chức tư nhân và cơ chế thị trường giải quyết những vấn đề này.
wrong_answers:
  - Nhà nước nên chủ động bảo vệ quyền của các nhóm thiểu số đồng thời tôn trọng các giá trị văn hóa của đa số thông qua việc quản lý cân bằng.
  - Nhà nước nên ưu tiên an ninh công cộng và trật tự xã hội bằng cách duy trì sự kiểm soát chặt chẽ đối với các hành vi cá nhân có khả năng gây hại.
  - Nhà nước cần thúc đẩy công bằng xã hội bằng cách đảm bảo quyền và sự bảo vệ bình đẳng cho tất cả công dân bất kể xuất thân.
explanation: |
  Triết lý tự do chủ nghĩa luôn nhất quán ủng hộ sự can thiệp tối thiểu của nhà nước vào mọi vấn đề xã hội. Cho dù thảo luận về hôn nhân (tư nhân hóa thay vì công nhận của nhà nước), nhập cư (dựa trên thị trường thay vì do nhà nước kiểm soát), súng (quyền tự vệ cá nhân) hay ma túy (quyền lựa chọn cá nhân không có sự can thiệp của nhà nước), những người theo chủ nghĩa tự do về cơ bản tin rằng nhà nước không nên điều chỉnh các quyết định cá nhân không trực tiếp gây hại cho người khác.
  Các lựa chọn khác lần lượt đại diện cho các cách tiếp cận xã hội chủ nghĩa, bảo thủ và trung dung, tất cả đều chấp nhận các mức độ can thiệp khác nhau của nhà nước vào các vấn đề cá nhân.
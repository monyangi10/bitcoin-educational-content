question: Enligt den libertarianska ståndpunkten i samhällsfrågor, vilken är den grundläggande princip som bör styra regeringens politik inom alla områden?
answer: Staten bör dra sig tillbaka från att reglera personliga val och i stället låta privata institutioner och marknadsmekanismer hantera dessa frågor
wrong_answers:
  - Staten bör aktivt skydda minoriteters rättigheter och samtidigt respektera majoritetens kulturella värderingar genom balanserad reglering
  - Staten bör prioritera allmän säkerhet och social ordning genom att upprätthålla strikt kontroll över potentiellt skadliga individuella beteenden
  - Staten bör främja social rättvisa genom att säkerställa lika tillgång till rättigheter och skydd för alla medborgare oavsett bakgrund
explanation: |
  Den libertarianska filosofin förespråkar konsekvent ett minimalt statligt ingripande i alla samhällsfrågor. Oavsett om man diskuterar äktenskap (privatisering snarare än statligt erkännande), invandring (marknadsbaserad snarare än statligt kontrollerad), vapen (individuell självförsvarsrätt) eller droger (personligt val utan statlig inblandning), anser libertarianer i grunden att staten inte bör reglera personliga beslut som inte direkt skadar andra.
  De andra alternativen representerar socialistiska, konservativa respektive centristiska synsätt, som alla accepterar varierande grad av statligt engagemang i personliga frågor.
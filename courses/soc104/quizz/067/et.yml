question: Milline on libertaarne seisukoht ühiskondlikes küsimustes, mis on põhiprintsiip, mis peaks suunama valitsuse poliitikat kõigis valdkondades?
answer: Riik peaks loobuma isiklike valikute reguleerimisest ja lubama selle asemel eraõiguslikel institutsioonidel ja turumehhanismidel neid küsimusi lahendada
wrong_answers:
  - Riik peaks aktiivselt kaitsma vähemuste õigusi, austades samal ajal enamuse kultuurilisi väärtusi tasakaalustatud reguleerimise kaudu
  - Riik peaks seadma esikohale avaliku julgeoleku ja sotsiaalse korra, säilitades range kontrolli potentsiaalselt kahjuliku individuaalse käitumise üle
  - Riik peaks edendama sotsiaalset õiglust, tagades võrdse juurdepääsu õigustele ja kaitsele kõigile kodanikele sõltumata nende taustast
explanation: |
  Libertaarne filosoofia pooldab järjekindlalt riigi minimaalset sekkumist kõigis ühiskondlikes küsimustes. Ükskõik, kas räägitakse abielust (pigem erastamine kui riiklik tunnustamine), sisserändest (pigem turupõhine kui riiklik kontroll), relvadest (individuaalne enesekaitseõigus) või uimastitest (isiklik valik ilma riigi sekkumiseta), libertaarid usuvad põhimõtteliselt, et riik ei peaks reguleerima isiklikke otsuseid, mis ei kahjusta otseselt teisi.
  Teised valikud esindavad vastavalt sotsialistlikke, konservatiivseid ja tsentristlikke lähenemisviise, mis kõik aktsepteerivad erineval määral riigi sekkumist isiklikesse küsimustesse.
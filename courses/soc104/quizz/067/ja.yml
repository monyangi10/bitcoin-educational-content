question: 社会問題に対するリバタリアンの立場によれば、あらゆる領域にわたって政府の政策を導くべき基本原則は何か？
answer: 国家は個人の選択を規制することから手を引き、代わりに民間の機関や市場メカニズムにこれらの問題を処理させるべきである。
wrong_answers:
  - 国家は、バランスの取れた規制を通じて、多数派の文化的価値を尊重しつつ、少数派の権利を積極的に保護すべきである。
  - 国家は、潜在的に有害な個人の行動を厳しく管理することによって、公共の安全と社会秩序を優先すべきである。
  - 国家は、背景の如何にかかわらず、すべての国民が権利と保護への平等なアクセスを確保することによって、社会正義を促進すべきである。
explanation: |
  リバタリアンの哲学は、あらゆる社会問題において一貫して国家の介入を最小限にすることを提唱している。結婚（国家承認ではなく民営化）、移民（国家管理ではなく市場主義）、銃（個人の自衛権）、薬物（国家の干渉を受けない個人の選択）など、リバタリアンは基本的に、他人に直接危害を加えない個人の決定については国家が規制すべきではないと考えている。
  その他の選択肢は、それぞれ社会主義、保守主義、中道主義的なアプローチを表しており、いずれも個人的な問題への国家の関与をさまざまな程度で受け入れている。
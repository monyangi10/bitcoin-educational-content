question: सामाजिक मुद्दों पर उदारवादी दृष्टिकोण के अनुसार, वह मूलभूत सिद्धांत क्या है जो सभी क्षेत्रों में सरकारी नीति का मार्गदर्शन करना चाहिए?
answer: राज्य को व्यक्तिगत विकल्पों के नियमन से पीछे हट जाना चाहिए और इसके बजाय निजी संस्थानों और बाजार तंत्रों को इन मामलों को संभालने की अनुमति देनी चाहिए।
wrong_answers:
  - राज्य को संतुलित नियमन के माध्यम से बहुसंख्यक सांस्कृतिक मूल्यों का सम्मान करते हुए अल्पसंख्यक अधिकारों की सक्रिय रूप से रक्षा करनी चाहिए।
  - राज्य को संभावित रूप से हानिकारक व्यक्तिगत व्यवहारों पर कड़ा नियंत्रण बनाए रखकर सार्वजनिक सुरक्षा और सामाजिक व्यवस्था को प्राथमिकता देनी चाहिए।
  - राज्य को सभी नागरिकों को उनकी पृष्ठभूमि की परवाह किए बिना अधिकारों और सुरक्षा तक समान पहुंच सुनिश्चित करके सामाजिक न्याय को बढ़ावा देना चाहिए।
explanation: |
  स्वतंत्रतावादी दर्शन सभी सामाजिक मुद्दों में राज्य के न्यूनतम हस्तक्षेप की वकालत करता है। चाहे विवाह (राज्य की मान्यता के बजाय निजीकरण), आप्रवासन (राज्य-नियंत्रित के बजाय बाजार-आधारित), बंदूकें (व्यक्तिगत आत्मरक्षा अधिकार) या मादक पदार्थ (राज्य के हस्तक्षेप के बिना व्यक्तिगत पसंद) की बात हो, स्वतंत्रतावादियों का मूल रूप से मानना ​​है कि राज्य को उन व्यक्तिगत निर्णयों को नियंत्रित नहीं करना चाहिए जिनसे दूसरों को प्रत्यक्ष रूप से कोई हानि न हो।
  अन्य विकल्प क्रमशः समाजवादी, रूढ़िवादी और मध्यमार्गी दृष्टिकोणों का प्रतिनिधित्व करते हैं, जो सभी व्यक्तिगत मामलों में राज्य की भागीदारी के विभिन्न स्तरों को स्वीकार करते हैं।
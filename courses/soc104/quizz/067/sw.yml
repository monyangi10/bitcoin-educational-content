question: Kulingana na msimamo wa uhuru kuhusu masuala ya kijamii, ni kanuni gani ya msingi inayopaswa kuongoza sera ya serikali katika nyanja zote?
answer: Serikali inapaswa kujiondoa katika kudhibiti chaguzi za kibinafsi na kuruhusu taasisi binafsi na mifumo ya soko kushughulikia masuala haya badala yake.
wrong_answers:
  - Serikali inapaswa kulinda kikamilifu haki za wachache huku ikiheshimu maadili ya kitamaduni ya wengi kupitia kanuni zenye usawa
  - Serikali inapaswa kuweka kipaumbele usalama wa umma na utulivu wa kijamii kwa kudumisha udhibiti mkali juu ya tabia zinazoweza kuwa na madhara kwa mtu binafsi.
  - Serikali inapaswa kukuza haki ya kijamii kwa kuhakikisha upatikanaji sawa wa haki na ulinzi kwa raia wote bila kujali historia yao.
explanation: |
  Falsafa ya uhuru hutetea mara kwa mara uingiliaji mdogo wa serikali katika masuala yote ya kijamii. Iwe ni kujadili ndoa (ubinafsishaji badala ya utambuzi wa serikali), uhamiaji (unaotegemea soko badala ya kudhibitiwa na serikali), bunduki (haki za kujilinda binafsi), au dawa za kulevya (chaguo la kibinafsi bila kuingiliwa na serikali), wanaharakati wa uhuru wanaamini kimsingi kwamba serikali haipaswi kudhibiti maamuzi ya kibinafsi ambayo hayawadhuru wengine moja kwa moja. 
  Chaguzi zingine zinawakilisha mbinu za kijamaa, kihafidhina, na za mrengo wa kati mtawalia, ambazo zote zinakubali viwango tofauti vya ushiriki wa serikali katika masuala ya kibinafsi.

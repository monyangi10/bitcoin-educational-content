question: Zgodnie z libertariańskim stanowiskiem w kwestiach społecznych, jaka jest podstawowa zasada, która powinna kierować polityką rządu we wszystkich dziedzinach?
answer: Państwo powinno wycofać się z regulowania osobistych wyborów i zamiast tego pozwolić prywatnym instytucjom i mechanizmom rynkowym zająć się tymi sprawami
wrong_answers:
  - Państwo powinno aktywnie chronić prawa mniejszości przy jednoczesnym poszanowaniu wartości kulturowych większości poprzez zrównoważone regulacje
  - Państwo powinno priorytetowo traktować bezpieczeństwo publiczne i porządek społeczny, utrzymując ścisłą kontrolę nad potencjalnie szkodliwymi zachowaniami jednostek
  - Państwo powinno promować sprawiedliwość społeczną poprzez zapewnienie równego dostępu do praw i ochrony wszystkim obywatelom, niezależnie od ich pochodzenia
explanation: |
  Filozofia libertariańska konsekwentnie opowiada się za minimalną interwencją państwa we wszystkich kwestiach społecznych. Niezależnie od tego, czy chodzi o małżeństwo (prywatyzacja, a nie uznanie przez państwo), imigrację (oparta na rynku, a nie kontrolowana przez państwo), broń (indywidualne prawo do samoobrony), czy narkotyki (osobisty wybór bez ingerencji państwa), libertarianie zasadniczo uważają, że państwo nie powinno regulować osobistych decyzji, które nie szkodzą bezpośrednio innym.
  Pozostałe opcje reprezentują odpowiednio podejście socjalistyczne, konserwatywne i centrowe, które akceptują różny stopień zaangażowania państwa w sprawy osobiste.
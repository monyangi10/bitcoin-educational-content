question: 사회 문제에 대한 자유주의적 입장에 따르면, 모든 영역에서 정부 정책을 이끌어야 하는 기본 원칙은 무엇인가요?
answer: 국가는 개인의 선택에 대한 규제를 철회하고 대신 민간 기관과 시장 메커니즘이 이러한 문제를 처리하도록 허용해야 합니다
wrong_answers:
  - 국가는 균형 잡힌 규제를 통해 다수의 문화적 가치를 존중하면서 소수의 권리를 적극적으로 보호해야 합니다
  - 국가는 잠재적으로 유해한 개인의 행동을 엄격하게 통제함으로써 공공의 안전과 사회 질서를 우선시해야 합니다
  - 국가는 배경에 관계없이 모든 시민이 동등한 권리와 보호를 받을 수 있도록 보장함으로써 사회 정의를 증진해야 합니다
explanation: |
  자유주의 철학은 모든 사회 문제에서 국가의 개입을 최소화해야 한다고 일관되게 주장합니다. 결혼(국가의 인정보다는 민영화), 이민(국가 통제보다는 시장 기반), 총기(개인의 자위권), 마약(국가의 간섭 없이 개인의 선택) 등 자유주의자들은 기본적으로 다른 사람에게 직접적인 피해를 주지 않는 개인의 결정을 국가가 규제해서는 안 된다고 믿습니다.
  다른 옵션은 각각 사회주의, 보수주의, 중도주의적 접근 방식을 대표하며, 모두 개인 문제에 대한 국가의 다양한 개입 정도를 인정합니다.
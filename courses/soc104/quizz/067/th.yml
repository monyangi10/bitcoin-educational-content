question: ตามจุดยืนของลิเบอร์ทาเรียนในประเด็นทางสังคม หลักการพื้นฐานที่ควรชี้นำการกำหนดนโยบายของรัฐบาลในทุกด้านคืออะไร?
answer: รัฐควรถอนตัวจากการควบคุมการตัดสินใจส่วนบุคคลและอนุญาตให้สถาบันเอกชนและกลไกตลาดจัดการเรื่องเหล่านี้แทน
wrong_answers:
  - รัฐควรปกป้องสิทธิของชนกลุ่มน้อยอย่างแข็งขันในขณะที่เคารพคุณค่าทางวัฒนธรรมของคนส่วนใหญ่ผ่านการกำกับดูแลที่สมดุล
  - รัฐควรให้ความสำคัญกับความปลอดภัยของประชาชนและความสงบเรียบร้อยของสังคมโดยการควบคุมพฤติกรรมส่วนบุคคลที่อาจเป็นอันตรายอย่างเข้มงวด
  - รัฐควรส่งเสริมความยุติธรรมทางสังคมโดยการรับรองการเข้าถึงสิทธิและการคุ้มครองที่เท่าเทียมกันสำหรับพลเมืองทุกคนโดยไม่คำนึงถึงภูมิหลัง
explanation: |
  ปรัชญาเสรีนิยมมักสนับสนุนการแทรกแซงของรัฐให้น้อยที่สุดในทุกประเด็นของสังคม ไม่ว่าจะเป็นการพูดคุยเรื่องการแต่งงาน (การแปรรูปแทนการรับรองโดยรัฐ), การอพยพ (ตามกลไกตลาดแทนการควบคุมโดยรัฐ), อาวุธปืน (สิทธิในการป้องกันตัวเองของบุคคล), หรือยาเสพติด (การเลือกส่วนบุคคลโดยไม่มีการแทรกแซงของรัฐ), เสรีนิยมเชื่อพื้นฐานว่ารัฐไม่ควรควบคุมการตัดสินใจส่วนบุคคลที่ไม่ทำอันตรายต่อผู้อื่นโดยตรง ตัวเลือกอื่น ๆ แสดงถึงแนวทางสังคมนิยม, อนุรักษ์นิยม, และสายกลางตามลำดับ ซึ่งทั้งหมดนี้ยอมรับการมีส่วนร่วมของรัฐในระดับต่าง ๆ ในเรื่องส่วนบุคคล
question: Prema libertarijanskom stavu o društvenim pitanjima, koji je temeljni princip koji bi trebao voditi vladinu politiku u svim oblastima?
answer: Država bi trebalo da se povuče iz regulisanja ličnih izbora i dozvoli privatnim institucijama i tržišnim mehanizmima da umesto toga rešavaju ova pitanja.
wrong_answers:
  - Država bi trebalo aktivno da štiti prava manjina, dok poštuje kulturne vrednosti većine kroz uravnoteženu regulaciju.
  - Država bi trebalo da prioritizuje javnu bezbednost i društveni red održavanjem stroge kontrole nad potencijalno štetnim individualnim ponašanjima.
  - Država treba da promoviše socijalnu pravdu osiguravanjem jednakog pristupa pravima i zaštitama za sve građane bez obzira na poreklo.
explanation: |
  Libertarijanska filozofija dosledno zagovara minimalnu intervenciju države u svim društvenim pitanjima. Bilo da se radi o braku (privatizacija umesto državnog priznanja), imigraciji (na bazi tržišta umesto državne kontrole), oružju (prava na ličnu samoodbranu) ili drogama (lični izbor bez mešanja države), libertarijanci suštinski veruju da država ne treba da reguliše lične odluke koje ne nanose direktnu štetu drugima. 
  Druge opcije predstavljaju socijalistički, konzervativni i centristički pristup, koji svi prihvataju različite stepene državnog učešća u ličnim stvarima.
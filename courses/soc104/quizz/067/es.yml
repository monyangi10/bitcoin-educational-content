question: Según la posición libertaria en cuestiones sociales, ¿cuál es el principio fundamental que debe guiar la política gubernamental en todos los ámbitos?
answer: El Estado debería dejar de regular las decisiones personales y permitir que las instituciones privadas y los mecanismos de mercado se ocupen de estos asuntos
wrong_answers:
  - El Estado debe proteger activamente los derechos de las minorías respetando los valores culturales mayoritarios mediante una regulación equilibrada
  - El Estado debe dar prioridad a la seguridad pública y al orden social manteniendo un control estricto sobre los comportamientos individuales potencialmente nocivos
  - El Estado debe promover la justicia social garantizando la igualdad de acceso a los derechos y la protección de todos los ciudadanos, independientemente de su origen
explanation: |
  La filosofía libertaria aboga sistemáticamente por una intervención mínima del Estado en todas las cuestiones sociales. Ya se trate del matrimonio (privatización en lugar de reconocimiento estatal), la inmigración (basada en el mercado en lugar de controlada por el Estado), las armas (derechos individuales de autodefensa) o las drogas (elección personal sin interferencia del Estado), los libertarios creen fundamentalmente que el Estado no debe regular las decisiones personales que no perjudiquen directamente a otros.
  Las otras opciones representan enfoques socialistas, conservadores y centristas, respectivamente, que aceptan diversos grados de implicación estatal en asuntos personales.
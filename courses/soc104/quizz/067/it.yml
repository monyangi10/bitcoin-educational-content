question: Secondo la posizione libertaria sulle questioni sociali, qual è il principio fondamentale che dovrebbe guidare la politica del governo in tutti i settori?
answer: Lo Stato dovrebbe ritirarsi dalla regolamentazione delle scelte personali e lasciare che siano le istituzioni private e i meccanismi di mercato a occuparsi di queste questioni
wrong_answers:
  - Lo Stato dovrebbe proteggere attivamente i diritti delle minoranze rispettando i valori culturali della maggioranza attraverso una regolamentazione equilibrata
  - Lo Stato dovrebbe dare priorità alla sicurezza pubblica e all'ordine sociale, mantenendo un controllo rigoroso sui comportamenti individuali potenzialmente dannosi
  - Lo Stato deve promuovere la giustizia sociale garantendo a tutti i cittadini un accesso paritario ai diritti e alle tutele, a prescindere dalla provenienza
explanation: |
  La filosofia libertaria sostiene costantemente un intervento minimo dello Stato in tutte le questioni sociali. Che si parli di matrimonio (privatizzazione piuttosto che riconoscimento da parte dello Stato), di immigrazione (basata sul mercato piuttosto che controllata dallo Stato), di armi (diritto all'autodifesa individuale) o di droghe (scelta personale senza interferenze da parte dello Stato), i libertari credono fondamentalmente che lo Stato non debba regolare le decisioni personali che non danneggiano direttamente gli altri.
  Le altre opzioni rappresentano rispettivamente gli approcci socialista, conservatore e centrista, che accettano tutti vari gradi di coinvolgimento dello Stato nelle questioni personali.
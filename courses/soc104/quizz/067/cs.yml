question: Jaký je podle libertariánského postoje ke společenským otázkám základní princip, kterým by se měla řídit vládní politika ve všech oblastech?
answer: Stát by měl ustoupit od regulace osobních rozhodnutí a nechat tyto záležitosti řešit soukromé instituce a tržní mechanismy
wrong_answers:
  - Stát by měl aktivně chránit práva menšin a zároveň respektovat kulturní hodnoty většiny prostřednictvím vyvážené regulace
  - Stát by měl upřednostňovat veřejnou bezpečnost a společenský pořádek tím, že bude udržovat přísnou kontrolu nad potenciálně škodlivým chováním jednotlivců
  - Stát by měl podporovat sociální spravedlnost tím, že zajistí rovný přístup k právům a ochraně pro všechny občany bez ohledu na jejich původ
explanation: |
  Libertariánská filozofie důsledně prosazuje minimální zásahy státu ve všech společenských otázkách. Ať už se jedná o manželství (privatizace namísto uznání státem), imigraci (tržní, nikoli státem kontrolovaná), zbraně (právo na individuální sebeobranu) nebo drogy (osobní volba bez zásahů státu), libertariáni v zásadě věří, že stát by neměl regulovat osobní rozhodnutí, která přímo neškodí ostatním.
  Ostatní možnosti představují socialistický, konzervativní, respektive centristický přístup, které všechny připouštějí různou míru zapojení státu do osobních záležitostí.
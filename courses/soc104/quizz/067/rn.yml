question: Dushingiye ku ciyumviro c’abanyagihugu ku bibazo vy’imibano, ni ingingo ngenderwako iyihe ikwiye kuyobora politike ya Leta mu nzego zose?
answer: Leta ikwiye kuva mu gutegeka amahitamwo y’umuntu ku giti ciwe, ikareka inzego z’abikorera ku giti cabo n’uburyo bw’isoko bikavyifatamwo neza aho kubigira .
wrong_answers:
  - Leta ikwiye gukingira n'umwete uburenganzira bw'abantu batobato mu gihe yubaha agaciro k'imico kama y'abantu benshi biciye mu gushinga amategeko aringaniye .
  - Leta ikwiye gushira imbere umutekano wa bose n'urutonde rw'imibano mu kuguma igenzura cane inyifato zishobora gutuma umuntu agira ingorane .
  - Leta ikwiye guteza imbere ubutungane mu kibano mu gutuma abanyagihugu bose baronka uburenganzira n’uburinzi bungana ataco bafatiye ku vyo bakomokamwo .
explanation: |
  Filozofiya y’abanyagihugu iguma ivuga ko Leta yogira ico ikoze mu bibazo vyose vy’imibano. Yaba mu kuganira ku bugeni (uguhindura ivy’abantu ku giti cabo aho kwemerwa na Leta), ukwinjira mu gihugu (bishingiye ku masoko aho kugenzurwa na Leta), imbunda (uburenganzira bw’umuntu ku giti ciwe bwo kwikingira), canke ibiyayuramutwe (uguhitamwo kw’umuntu ku giti ciwe ataco Leta yivangamwo), abaharanira umwidegemvyo bemera ko Leta idakwiye gutegeka ingingo z’umuntu ku giti ciwe zidatera ingorane abandi. 
  Ayandi mahitamwo agereranya uburyo bw’abanyagihugu, ubw’abanyagihugu, n’ubw’abanyagihugu bo hagati, bwose bukemera ko Leta yinjira mu bibazo vy’umuntu ku giti ciwe mu buryo butandukanye.
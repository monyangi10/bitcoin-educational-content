question: 根據自由主義者對於社會問題的立場，政府政策在所有領域中的基本指導原則是什麼？
answer: 國家應退出個人選擇的規範，改由私人機構和市場機制處理這些事項
wrong_answers:
  - 國家應透過平衡的規範，在尊重多數文化價值的同時，積極保護少數民族的權利
  - 國家應該將公共安全和社會秩序放在優先地位，嚴格控制可能有害的個人行為
  - 國家應透過確保所有公民不論背景，都能平等享有權利和保護，來促進社會正義
explanation: |
  自由主義哲學始終主張在所有社會議題上盡量減少國家干預。無論是討論婚姻 (私人化而非國家承認)、移民 (以市場為基礎而非國家控制)、槍械 (個人自衛權) 或毒品 (個人選擇而非國家干預)，自由主義者從根本上相信，國家不應該管制不會直接傷害他人的個人決定。
  其他選項分別代表社會主義、保守主義與中間主義，它們都接受國家在不同程度上介入個人事務。
question: Mikä on yhteiskunnallisia kysymyksiä koskevan libertaristisen kannan mukaan se perusperiaate, jonka pitäisi ohjata hallituksen politiikkaa kaikilla aloilla?
answer: Valtion tulisi vetäytyä henkilökohtaisten valintojen sääntelystä ja antaa yksityisten instituutioiden ja markkinamekanismien hoitaa nämä asiat
wrong_answers:
  - Valtion olisi aktiivisesti suojeltava vähemmistöjen oikeuksia kunnioittaen samalla enemmistön kulttuurisia arvoja tasapainoisen sääntelyn avulla
  - Valtion olisi asetettava etusijalle yleinen turvallisuus ja sosiaalinen järjestys valvomalla tiukasti yksilöiden mahdollisesti haitallisia käyttäytymismalleja
  - Valtion olisi edistettävä sosiaalista oikeudenmukaisuutta varmistamalla kaikille kansalaisille yhtäläiset oikeudet ja suojelu taustasta riippumatta
explanation: |
  Libertaristinen filosofia kannattaa johdonmukaisesti valtion mahdollisimman vähäistä puuttumista kaikkiin yhteiskunnallisiin asioihin. Olipa kyse avioliitosta (yksityistäminen valtion tunnustamisen sijaan), maahanmuutosta (markkinapohjainen valtion valvonnan sijaan), aseista (yksilön itsepuolustusoikeus) tai huumeista (henkilökohtainen valinta ilman valtion puuttumista), libertaristit uskovat pohjimmiltaan, että valtion ei pitäisi säännellä henkilökohtaisia päätöksiä, jotka eivät suoraan vahingoita muita.
  Muut vaihtoehdot edustavat sosialistisia, konservatiivisia ja keskustalaisia lähestymistapoja, jotka kaikki hyväksyvät eriasteisen valtion osallistumisen henkilökohtaisiin asioihin.
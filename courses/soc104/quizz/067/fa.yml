question: بر اساس موضع لیبرترین در مسائل اجتماعی، اصل اساسی که باید سیاست دولت را در تمامی حوزه‌ها هدایت کند چیست؟
answer: ایالت باید از تنظیم انتخاب‌های شخصی کناره‌گیری کند و به جای آن اجازه دهد نهادهای خصوصی و مکانیسم‌های بازار به این امور رسیدگی کنند.
wrong_answers:
  - ایالت باید به طور فعال از حقوق اقلیت‌ها محافظت کند و در عین حال به ارزش‌های فرهنگی اکثریت از طریق تنظیمات متعادل احترام بگذارد.
  - ایالت باید با حفظ کنترل دقیق بر رفتارهای فردی که ممکن است مضر باشند، ایمنی عمومی و نظم اجتماعی را در اولویت قرار دهد.
  - دولت باید با تضمین دسترسی برابر به حقوق و حمایت‌ها برای همه شهروندان بدون توجه به پیشینه، عدالت اجتماعی را ترویج کند.
explanation: |
  فلسفه لیبرترین به طور مداوم از حداقل مداخله دولت در تمام مسائل اجتماعی حمایت می‌کند. چه در مورد ازدواج (خصوصی‌سازی به جای شناسایی دولتی)، مهاجرت (بر اساس بازار به جای کنترل دولتی)، اسلحه (حقوق دفاع شخصی فردی)، یا مواد مخدر (انتخاب شخصی بدون دخالت دولت) بحث شود، لیبرترین‌ها به طور اساسی معتقدند که دولت نباید تصمیمات شخصی که به طور مستقیم به دیگران آسیب نمی‌رساند را تنظیم کند. 
  گزینه‌های دیگر به ترتیب نمایانگر رویکردهای سوسیالیستی، محافظه‌کارانه و میانه‌رو هستند که همگی درجات مختلفی از دخالت دولت در امور شخصی را می‌پذیرند.
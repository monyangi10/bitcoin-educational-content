question: Która ideologia polityczna najprawdopodobniej poparłaby całkowitą prywatyzację instytucji małżeństwa, usuwając wszelkie zaangażowanie rządu w uznawanie małżeństw?
answer: Libertarianie, którzy opowiadają się za oddzieleniem małżeństwa od państwa i umożliwieniem prywatnym stowarzyszeniom zajmowania się uznawaniem małżeństw
wrong_answers:
  - Socjaliści, którzy chcą rozszerzyć małżeństwa uznawane przez państwo, aby obejmowały wszystkie orientacje seksualne dla sprawiedliwości społecznej
  - Konserwatyści, którzy chcą, aby państwo zachowało tradycyjne definicje małżeństwa w celu ochrony instytucji cywilizacyjnych
  - Centryści, którzy popierają uznanie przez państwo różnych form małżeństwa przy jednoczesnym zachowaniu spójności społecznej
explanation: |
  Libertarianie proponują całkowitą prywatyzację małżeństwa, argumentując, że państwo nie powinno wymuszać uznawania żadnego rodzaju małżeństwa. Opowiadają się za tym, by kościoły, synagogi, meczety lub organizacje świeckie zajmowały się małżeństwami, nazywając to "oddzieleniem małżeństwa od państwa". Socjaliści chcą rozszerzonego uznania równości przez państwo, konserwatyści chcą państwowej ochrony tradycyjnych małżeństw, a centryści popierają integracyjne uznanie przez państwo odzwierciedlające różnorodność społeczną.
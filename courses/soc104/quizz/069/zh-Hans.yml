question: 哪种政治意识形态最有可能支持婚姻制度的完全私有化，取消政府对婚姻认可的所有参与？
answer: 自由主义者主张将婚姻与国家分离，让私人协会处理婚姻认可事宜
wrong_answers:
  - 社会主义者，他们希望扩大国家承认的婚姻范围，将所有性取向都纳入其中，以实现社会正义
  - 保守派希望国家维护传统的婚姻定义，以保护文明制度
  - 中间派，支持国家承认不同的婚姻形式，同时保持社会凝聚力
explanation: |
  自由主义者独树一帜地提出将婚姻完全私有化，认为国家不应强制承认任何类型的婚姻。他们主张由教堂、犹太教会堂、清真寺或世俗组织来处理婚姻，称之为 "政教分离"。社会主义者希望国家扩大对平等的承认，保守派希望国家保护传统婚姻，中间派则支持反映社会多样性的包容性国家承认。
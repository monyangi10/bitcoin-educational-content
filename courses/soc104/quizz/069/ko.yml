question: 결혼 기관의 완전한 민영화와 결혼 인정에 대한 정부의 모든 개입을 없애는 것을 가장 지지할 가능성이 높은 정치 이데올로기는 무엇인가요?
answer: 국가와 결혼을 분리하고 민간 협회가 결혼 인정을 처리하도록 하는 자유주의자들은 다음과 같이 주장합니다
wrong_answers:
  - 사회 정의를 위해 국가가 인정하는 결혼을 모든 성적 지향을 포함하도록 확대하려는 사회주의자들
  - 문명 제도를 보호하기 위해 국가가 전통적인 결혼 정의를 보존하기를 원하는 보수주의자들은 다음과 같이 주장합니다
  - 사회 통합을 유지하면서 다양한 결혼 형태를 국가가 인정하는 것을 지지하는 중도주의자
explanation: |
  자유주의자들은 국가가 어떤 결혼 유형도 강제로 인정해서는 안 된다고 주장하며 결혼을 완전히 사유화할 것을 독특하게 제안합니다. 이들은 교회, 유대교 회당, 이슬람 사원 또는 세속 단체가 결혼을 처리해야 한다고 주장하며 이를 '정교분리'라고 부릅니다. 사회주의자들은 평등을 위한 국가의 인정 확대를, 보수주의자들은 전통 결혼에 대한 국가의 보호를, 중도주의자들은 사회적 다양성을 반영하는 포괄적인 국가 인정을 원합니다.
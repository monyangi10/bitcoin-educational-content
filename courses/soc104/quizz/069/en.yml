question: Which political ideology would most likely support the complete privatization of marriage institutions, removing all government involvement in marriage recognition?
answer: Libertarians, who advocate for separating marriage from the state and letting private associations handle marriage recognition
wrong_answers:
  - Socialists, who want to expand state-recognized marriage to include all sexual orientations for social justice
  - Conservatives, who want the state to preserve traditional marriage definitions to protect civilizational institutions
  - Centrists, who support state recognition of diverse marriage forms while maintaining social cohesion
explanation: |
  Libertarians uniquely propose privatizing marriage entirely, arguing the state should not force recognition of any marriage type. They advocate for churches, synagogues, mosques, or secular organizations to handle marriage, calling this 'separation of marriage and state Socialists want expanded state recognition for equality, conservatives want state protection of traditional marriage, and centrists support inclusive state recognition reflecting societal diversity.
question: Milline poliitiline ideoloogia toetaks kõige tõenäolisemalt abieluinstitutsioonide täielikku erastamist, kõrvaldades igasuguse valitsuse sekkumise abielu tunnustamisse?
answer: Libertaarid, kes pooldavad abielu eraldamist riigist ja abielu tunnustamisega tegelevad eraühendused
wrong_answers:
  - Sotsiaaldemokraadid, kes soovivad laiendada riiklikult tunnustatud abielu, et see hõlmaks sotsiaalse õigluse huvides kõiki seksuaalseid orientatsioone
  - Konservatiivid, kes soovivad, et riik säilitaks traditsioonilised abielu määratlused, et kaitsta tsivilisatsioonilisi institutsioone
  - Keskerakondlased, kes toetavad erinevate abieluvormide riiklikku tunnustamist, säilitades samas sotsiaalse ühtekuuluvuse
explanation: |
  Libertaarlased teevad ainulaadse ettepaneku abielu täielikult erastada, väites, et riik ei tohiks sundida tunnustama ühtegi abielutüüpi. Nad pooldavad seda, et kirikud, sünagoogid, mošeed või ilmalikud organisatsioonid tegeleksid abieluga, nimetades seda "abielu ja riigi lahusolekuks". Sotsiaaldemokraadid soovivad võrdõiguslikkuse laiendatud riiklikku tunnustamist, konservatiivid soovivad traditsioonilise abielu riiklikku kaitset ja tsentristid toetavad kaasavat riiklikku tunnustamist, mis peegeldab ühiskondlikku mitmekesisust.
question: Welke politieke ideologie zou waarschijnlijk de volledige privatisering van huwelijksinstellingen steunen, waarbij alle overheidsbemoeienis met de erkenning van het huwelijk zou verdwijnen?
answer: Libertariërs, die ervoor pleiten het huwelijk los te koppelen van de staat en de erkenning van het huwelijk over te laten aan particuliere verenigingen
wrong_answers:
  - Socialisten, die voor sociale rechtvaardigheid het door de staat erkende huwelijk willen uitbreiden met alle seksuele geaardheden
  - Conservatieven, die willen dat de staat de traditionele huwelijksdefinities behoudt om de beschavingsinstellingen te beschermen
  - Centristen, die voorstander zijn van erkenning door de staat van verschillende huwelijksvormen met behoud van sociale cohesie
explanation: |
  Libertariërs stellen als enige voor om het huwelijk volledig te privatiseren, met het argument dat de staat geen enkele vorm van erkenning van het huwelijk zou moeten afdwingen. Ze pleiten ervoor dat kerken, synagogen, moskeeën of seculiere organisaties het huwelijk afhandelen en noemen dit 'scheiding van huwelijk en staat'. Socialisten willen een uitgebreide erkenning van gelijkheid door de staat, conservatieven willen bescherming van het traditionele huwelijk door de staat en centristen steunen een inclusieve erkenning door de staat die de maatschappelijke diversiteit weerspiegelt.
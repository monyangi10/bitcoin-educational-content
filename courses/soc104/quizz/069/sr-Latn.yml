question: Libertarijanska ideologija najverovatnije bi podržala potpunu privatizaciju institucija braka, uklanjajući svako učešće vlade u priznavanju braka.
answer: Libertarijanci, koji se zalažu za odvajanje braka od države i prepuštanje privatnim udruženjima da se bave priznavanjem braka
wrong_answers:
  - Socijalisti, koji žele proširiti brak priznat od strane države kako bi uključili sve seksualne orijentacije radi socijalne pravde
  - Konzervativci, koji žele da država očuva tradicionalne definicije braka kako bi zaštitila civilizacijske institucije
  - Centristi, koji podržavaju državno priznanje različitih oblika braka uz očuvanje društvene kohezije
explanation: |
  Libertarijanci jedinstveno predlažu potpunu privatizaciju braka, tvrdeći da država ne bi trebalo da nameće priznavanje bilo koje vrste braka. Oni zagovaraju da crkve, sinagoge, džamije ili sekularne organizacije upravljaju brakom, nazivajući to 'odvajanjem braka od države'. Socijalisti žele prošireno državno priznavanje radi jednakosti, konzervativci žele državnu zaštitu tradicionalnog braka, a centristi podržavaju inkluzivno državno priznavanje koje odražava društvenu raznolikost.
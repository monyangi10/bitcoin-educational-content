question: Que ideologia política apoiaria mais provavelmente a privatização total das instituições matrimoniais, eliminando todo o envolvimento do governo no reconhecimento do casamento?
answer: Os libertários, que defendem a separação do casamento do Estado e deixam que sejam as associações privadas a tratar do reconhecimento do casamento
wrong_answers:
  - Os socialistas, que querem alargar o casamento reconhecido pelo Estado para incluir todas as orientações sexuais, em nome da justiça social
  - Os conservadores, que querem que o Estado preserve as definições tradicionais de casamento para proteger as instituições civilizacionais
  - Centristas, que apoiam o reconhecimento pelo Estado de diversas formas de casamento, mantendo a coesão social
explanation: |
  Os libertários propõem exclusivamente a privatização total do casamento, argumentando que o Estado não deve forçar o reconhecimento de qualquer tipo de casamento. Defendem que sejam as igrejas, sinagogas, mesquitas ou organizações seculares a tratar do casamento, chamando a isto "separação do casamento e do Estado". Os socialistas querem um reconhecimento estatal alargado da igualdade, os conservadores querem a proteção estatal do casamento tradicional e os centristas apoiam um reconhecimento estatal inclusivo que reflicta a diversidade social.
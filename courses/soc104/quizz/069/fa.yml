question: کدام ایدئولوژی سیاسی به احتمال زیاد از خصوصی‌سازی کامل نهادهای ازدواج حمایت می‌کند و تمام دخالت‌های دولتی در به رسمیت شناختن ازدواج را حذف می‌کند؟
answer: لیبرترین‌ها، که از جدا کردن ازدواج از دولت و واگذاری به انجمن‌های خصوصی برای به رسمیت شناختن ازدواج حمایت می‌کنند
wrong_answers:
  - سوسیالیست‌ها، که می‌خواهند ازدواج به رسمیت شناخته شده توسط دولت را برای عدالت اجتماعی به تمامی گرایش‌های جنسی گسترش دهند
  - محافظه‌کارانی که می‌خواهند دولت تعاریف سنتی ازدواج را برای حفاظت از نهادهای تمدنی حفظ کند
  - میانه‌روها، که از به رسمیت شناختن دولتی اشکال متنوع ازدواج حمایت می‌کنند در حالی که انسجام اجتماعی را حفظ می‌کنند
explanation: |
  لیبرتارین‌ها به‌طور منحصربه‌فردی پیشنهاد می‌کنند که ازدواج به‌طور کامل خصوصی‌سازی شود و استدلال می‌کنند که دولت نباید هیچ نوع ازدواجی را به رسمیت بشناسد. آن‌ها از کلیساها، کنیسه‌ها، مساجد یا سازمان‌های سکولار برای مدیریت ازدواج حمایت می‌کنند و این را 'جدایی ازدواج از دولت' می‌نامند. سوسیالیست‌ها خواهان گسترش به رسمیت شناختن دولتی برای برابری هستند، محافظه‌کاران خواهان حفاظت دولتی از ازدواج سنتی هستند و میانه‌روها از به رسمیت شناختن فراگیر دولتی که بازتاب‌دهنده تنوع اجتماعی است، حمایت می‌کنند.
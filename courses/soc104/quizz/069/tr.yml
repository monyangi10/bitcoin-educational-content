question: Hangi siyasi ideoloji, evlilik kurumlarının tamamen özelleştirilmesini ve devletin evliliğin tanınması konusundaki tüm müdahalelerinin kaldırılmasını büyük olasılıkla destekler?
answer: Evliliğin devletten ayrılmasını ve evliliğin tanınmasının özel kuruluşlara bırakılmasını savunan Liberteryenler
wrong_answers:
  - Sosyal adalet için devlet tarafından tanınan evliliği tüm cinsel yönelimleri kapsayacak şekilde genişletmek isteyen sosyalistler
  - Medeniyet kurumlarını korumak için devletin geleneksel evlilik tanımlarını muhafaza etmesini isteyen muhafazakârlar
  - Sosyal uyumu korurken farklı evlilik biçimlerinin devlet tarafından tanınmasını destekleyen Merkezciler
explanation: |
  Liberteryenler, devletin herhangi bir evlilik türünü tanımaya zorlamaması gerektiğini savunarak evliliğin tamamen özelleştirilmesini önermektedir. Kiliselerin, sinagogların, camilerin ya da seküler kuruluşların evliliği yürütmesini savunurlar ve bunu 'evlilik ve devletin ayrılması' olarak adlandırırlar. Sosyalistler eşitlik için genişletilmiş devlet tanınması isterken, muhafazakârlar geleneksel evliliğin devlet tarafından korunmasını istemekte, merkezciler ise toplumsal çeşitliliği yansıtan kapsayıcı devlet tanınmasını desteklemektedir.
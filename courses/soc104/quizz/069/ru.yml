question: Представители какой политической идеологии скорее всего поддержали бы полную приватизацию брачных институтов, устранив всякое участие государства в признании брака?
answer: Либертарианцы, которые выступают за то, чтобы отделить брак от государства и позволить частным ассоциациям заниматься признанием брака
wrong_answers:
  - Социалисты, которые хотят расширить признанные государством браки, включив в них представителей всех сексуальных ориентаций, ради социальной справедливости
  - Консерваторы, которые хотят, чтобы государство сохраняло традиционные определения брака для защиты цивилизационных институтов
  - Центристы, которые поддерживают государственное признание различных форм брака при сохранении социальной сплоченности
explanation: |
  Либертарианцы предлагают полностью приватизировать брак, утверждая, что государство не должно принуждать к признанию какого-либо типа брака. Они выступают за то, чтобы браком занимались церкви, синагоги, мечети или светские организации, называя это "отделением брака от государства". Социалисты хотят расширенного государственного признания равенства, консерваторы - государственной защиты традиционного брака, а центристы выступают за инклюзивное государственное признание, отражающее разнообразие общества.
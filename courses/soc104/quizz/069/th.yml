question: ลิเบอร์แทเรียน (Libertarian)
answer: ลิเบอร์ทาเรียน, ผู้สนับสนุนการแยกการแต่งงานออกจากรัฐและให้สมาคมเอกชนจัดการการรับรองการแต่งงาน
wrong_answers:
  - นักสังคมนิยม, ผู้ที่ต้องการขยายการรับรองการแต่งงานโดยรัฐให้ครอบคลุมทุกเพศวิถีเพื่อความยุติธรรมทางสังคม
  - กลุ่มอนุรักษ์นิยมที่ต้องการให้รัฐรักษาคำนิยามการแต่งงานแบบดั้งเดิมเพื่อปกป้องสถาบันอารยธรรม
  - พวกสายกลางที่สนับสนุนการยอมรับของรัฐต่อรูปแบบการแต่งงานที่หลากหลายขณะเดียวกันก็รักษาความสามัคคีในสังคม
explanation: |
  ลิเบอร์ทาเรียนเสนอให้แปรรูปการแต่งงานอย่างเต็มที่ โดยโต้แย้งว่ารัฐไม่ควรบังคับให้ยอมรับการแต่งงานในรูปแบบใด ๆ พวกเขาสนับสนุนให้โบสถ์, ธรรมศาลา, มัสยิด หรือองค์กรทางโลกจัดการเรื่องการแต่งงาน เรียกสิ่งนี้ว่า 'การแยกการแต่งงานออกจากรัฐ' สังคมนิยมต้องการการยอมรับจากรัฐที่ขยายออกไปเพื่อความเท่าเทียมกัน อนุรักษ์นิยมต้องการการคุ้มครองการแต่งงานแบบดั้งเดิมจากรัฐ และกลุ่มเซ็นทรัลสนับสนุนการยอมรับจากรัฐที่ครอบคลุมซึ่งสะท้อนถึงความหลากหลายของสังคม
question: Hệ tư tưởng chính trị nào có khả năng ủng hộ nhất việc tư nhân hóa hoàn toàn các thể chế hôn nhân, loại bỏ mọi sự can thiệp của chính phủ trong việc công nhận hôn nhân?
answer: Những người theo chủ nghĩa tự do, những người chủ trương tách hôn nhân khỏi nhà nước và để các hiệp hội tư nhân xử lý việc công nhận hôn nhân, đã lên tiếng.
wrong_answers:
  - Những người theo chủ nghĩa xã hội, những người muốn mở rộng hôn nhân được nhà nước công nhận để bao gồm tất cả các khuynh hướng tình dục vì công bằng xã hội.
  - Những người bảo thủ muốn nhà nước duy trì định nghĩa hôn nhân truyền thống để bảo vệ các thể chế văn minh.
  - Những người theo chủ nghĩa trung dung, những người ủng hộ việc nhà nước công nhận các hình thức hôn nhân đa dạng trong khi vẫn duy trì sự gắn kết xã hội.
explanation: |
  Những người theo chủ nghĩa tự do đề xuất một quan điểm độc đáo là tư nhân hóa hoàn toàn hôn nhân, cho rằng nhà nước không nên ép buộc công nhận bất kỳ hình thức hôn nhân nào. Họ ủng hộ việc các nhà thờ, giáo đường Do Thái, nhà thờ Hồi giáo hoặc các tổ chức thế tục đảm nhiệm việc kết hôn, gọi đây là "sự tách biệt giữa hôn nhân và nhà nước". Những người theo chủ nghĩa xã hội muốn nhà nước mở rộng sự công nhận bình đẳng, những người bảo thủ muốn nhà nước bảo vệ hôn nhân truyền thống, và những người theo chủ nghĩa trung dung ủng hộ sự công nhận toàn diện của nhà nước phản ánh sự đa dạng của xã hội.
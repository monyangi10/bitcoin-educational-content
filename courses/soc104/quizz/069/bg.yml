question: Коя политическа идеология най-вероятно би подкрепила пълната приватизация на брачните институции, премахвайки всякакво държавно участие в признаването на брака?
answer: Либертарианците, които се застъпват за отделяне на брака от държавата и оставяне на частни сдружения да се занимават с признаването на брака
wrong_answers:
  - Социалисти, които искат да разширят обхвата на признатите от държавата бракове, така че да включват всички сексуални ориентации в името на социалната справедливост
  - Консерваторите, които искат държавата да запази традиционните брачни дефиниции, за да защити цивилизационните институции
  - Центристи, които подкрепят държавното признаване на различни форми на брак, като същевременно поддържат социалното сближаване
explanation: |
  Либертарианците предлагат изцяло да се приватизира бракът, като твърдят, че държавата не трябва да налага признаването на нито един вид брак. Те се застъпват за това църквите, синагогите, джамиите или светските организации да се занимават с брака, като наричат това "разделение на брака от държавата". Социалистите искат разширено държавно признаване на равенството, консерваторите искат държавна защита на традиционния брак, а центристите подкрепят всеобхватното държавно признаване, отразяващо общественото разнообразие.
question: ¿Qué ideología política apoyaría más probablemente la privatización completa de las instituciones matrimoniales, eliminando toda intervención del gobierno en el reconocimiento del matrimonio?
answer: Los libertarios, que abogan por separar el matrimonio del Estado y dejar que sean las asociaciones privadas las que se encarguen del reconocimiento del matrimonio
wrong_answers:
  - Los socialistas, que quieren ampliar el matrimonio reconocido por el Estado para incluir todas las orientaciones sexuales por justicia social
  - Los conservadores, que quieren que el Estado preserve las definiciones tradicionales del matrimonio para proteger las instituciones de la civilización
  - Centristas, partidarios de que el Estado reconozca diversas formas de matrimonio manteniendo la cohesión social
explanation: |
  Los libertarios proponen privatizar el matrimonio por completo, argumentando que el Estado no debería obligar a reconocer ningún tipo de matrimonio. Abogan por que iglesias, sinagogas, mezquitas u organizaciones laicas se ocupen del matrimonio, lo que denominan "separación del matrimonio y el Estado". Los socialistas quieren un mayor reconocimiento estatal de la igualdad, los conservadores quieren la protección estatal del matrimonio tradicional y los centristas apoyan un reconocimiento estatal inclusivo que refleje la diversidad social.
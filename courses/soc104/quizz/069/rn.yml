question: Ni ingengabitekerezo iyihe ya politike yoshobora gushigikira cane ko inzego z’ubugeni zihindurwa ivy’abikorera ku giti cabo, zigakuraho uruhara rwose rwa Leta mu kwemera ubugeni?
answer: Abanyagihugu bakunda umwidegemvyo, bavuga ko ubugeni bwotandukanywa na Leta, bakareka amashirahamwe yigenga akagira ivyo kwemeza ubugeni .
wrong_answers:
  - Abasosiyalisiti, bashaka kwagura ubugeni bwemewe na Leta kugira ngo bushiremwo imigenderanire yose y’igitsina kugira ngo habe ubutungane mu kibano .
  - Abanyagihugu b’abanyagihugu, bashaka ko Leta izigama insobanuro z’ubugeni z’imigenzo kugira ngo ikingire inzego z’ubutekerezi
  - Abanyapolitike bo hagati, bashigikira ko Leta yemera uburyo butandukanye bw’ubugeni mu gihe bagumana ubumwe bw’abantu
explanation: |
  Abanyagihugu b’abanyagihugu basaba ko ubugeni bwose buba ubw’abantu ku giti cabo, bavuga ko Leta idakwiye guhatira abantu kwemera ubwoko bwose bw’ubugeni. Bavuga ko amashengero, amasinagogi, imisigiti canke amashirahamwe y’isi ari yo akwiye kwitwararika ubugeni, ivyo bakavyita ‘ugutandukanya ubugeni na Leta’. Abasosiyalisiti bashaka ko Leta yemera abantu bose kubera uburinganire, aba conservateurs bashaka ko Leta ikingira ubugeni bw’imigenzo, aba centristes na bo bashigikira ko Leta yemera abantu bose, ivyo bikaba vyerekana ubudasa bw’abantu.
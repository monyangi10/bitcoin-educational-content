question: 哪種政治意識形態最有可能支持婚姻制度完全私有化，取消政府在婚姻認可上的所有參與？
answer: 自由主義者主張將婚姻與國家分離，並讓私人協會處理婚姻認證事宜
wrong_answers:
  - 社會主義者，他們希望擴大國家承認的婚姻，以涵蓋所有性取向，實現社會公義
  - 保守派，希望國家保留傳統的婚姻定義，以保護文明體制
  - 中間派，支持國家承認不同的婚姻形式，同時維持社會凝聚力
explanation: |
  自由主義者獨特地提出將婚姻完全私有化，認為國家不應強制承認任何婚姻類型。他們主張由教會、猶太會堂、清真寺或世俗組織處理婚姻，稱之為「婚姻與國家分離」。社會主義者希望擴大國家對平等的認可，保守派希望國家保護傳統婚姻，而中間派則支持反映社會多樣性的包容性國家認可。
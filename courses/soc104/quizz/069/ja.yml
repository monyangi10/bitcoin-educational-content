question: 結婚制度を完全に民営化し、結婚の承認に政府が一切関与しなくなることを最も支持しそうな政治イデオロギーはどれか？
answer: 自由主義者は、結婚を国家から切り離し、民間の団体に結婚の承認を任せることを主張する。
wrong_answers:
  - 社会正義のために、国家が認める結婚をすべての性的指向を含むように拡大しようとする社会主義者。
  - 保守派は、文明制度を守るために、伝統的な結婚の定義を国家が守ることを望んでいる。
  - 社会的結束を維持しつつ、多様な婚姻形態を国家が承認することを支持する中道派
explanation: |
  リバタリアンは、結婚を完全に私物化することを独自に提案し、国家はどのような結婚形態も強制的に認めるべきではないと主張する。彼らは、教会、シナゴーグ、モスク、あるいは世俗的な組織が結婚を扱うことを提唱し、これを「婚姻と国家の分離」と呼ぶ。社会主義者は平等のための国家承認の拡大を望み、保守主義者は伝統的な結婚の国家保護を望み、中道主義者は社会の多様性を反映した包括的な国家承認を支持する。
question: Která politická ideologie by s největší pravděpodobností podpořila úplnou privatizaci manželských institucí a odstranění veškerého zapojení státu do uznávání manželství?
answer: Libertariáni, kteří prosazují oddělení manželství od státu a ponechání uznání manželství na soukromých sdruženích
wrong_answers:
  - Socialisté, kteří chtějí rozšířit státem uznávané manželství na všechny sexuální orientace v zájmu sociální spravedlnosti
  - Konzervativci, kteří chtějí, aby stát zachoval tradiční definice manželství a chránil tak civilizační instituce
  - Centristé, kteří podporují státní uznání různých forem manželství při zachování sociální soudržnosti
explanation: |
  Libertariáni jednoznačně navrhují úplnou privatizaci manželství a tvrdí, že stát by neměl vynucovat uznání žádného typu manželství. Prosazují, aby se o manželství staraly církve, synagogy, mešity nebo sekulární organizace, a nazývají to "oddělením manželství od státu". Socialisté chtějí rozšířené státní uznání rovnosti, konzervativci státní ochranu tradičního manželství a centristé podporují inkluzivní státní uznání odrážející společenskou rozmanitost.
question: Hvilken politisk ideologi vil mest sannsynlig støtte en fullstendig privatisering av ekteskapsinstitusjonene, og fjerne all statlig involvering i anerkjennelse av ekteskap?
answer: Libertarianere, som tar til orde for å skille ekteskapet fra staten og la private organisasjoner håndtere ekteskapsinngåelse
wrong_answers:
  - Sosialister, som ønsker å utvide det statsanerkjente ekteskapet til å omfatte alle seksuelle legninger for sosial rettferdighet
  - Konservative, som ønsker at staten skal bevare tradisjonelle ekteskapsdefinisjoner for å beskytte sivilisatoriske institusjoner
  - Sentrumsorienterte, som støtter statlig anerkjennelse av ulike ekteskapsformer samtidig som det sosiale samholdet opprettholdes
explanation: |
  Libertarianere foreslår å privatisere ekteskapet helt og holdent, og argumenterer for at staten ikke skal tvinge frem anerkjennelse av noen type ekteskap. De går inn for at kirker, synagoger, moskeer eller sekulære organisasjoner skal håndtere ekteskapet, og kaller dette "separasjon av ekteskap og stat". Sosialister ønsker utvidet statlig anerkjennelse av likestilling, konservative ønsker statlig beskyttelse av det tradisjonelle ekteskapet, og sentrumsorienterte støtter en inkluderende statlig anerkjennelse som gjenspeiler samfunnets mangfold.
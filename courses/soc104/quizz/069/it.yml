question: Quale ideologia politica sosterrebbe con maggiore probabilità la completa privatizzazione delle istituzioni matrimoniali, eliminando ogni coinvolgimento del governo nel riconoscimento del matrimonio?
answer: I libertari, che sostengono la necessità di separare il matrimonio dallo Stato e di lasciare che siano le associazioni private a gestire il riconoscimento del matrimonio
wrong_answers:
  - Socialisti, che vogliono estendere il matrimonio riconosciuto dallo Stato a tutti gli orientamenti sessuali per la giustizia sociale
  - I conservatori, che vogliono che lo Stato preservi le definizioni tradizionali del matrimonio per proteggere le istituzioni civili
  - Centristi, che sostengono il riconoscimento da parte dello Stato di diverse forme di matrimonio, pur mantenendo la coesione sociale
explanation: |
  I libertari propongono di privatizzare completamente il matrimonio, sostenendo che lo Stato non dovrebbe imporre il riconoscimento di alcun tipo di matrimonio. Sostengono che siano le chiese, le sinagoghe, le moschee o le organizzazioni laiche a gestire il matrimonio, definendo questa "separazione tra matrimonio e Stato". I socialisti vogliono un riconoscimento statale esteso per l'uguaglianza, i conservatori vogliono una protezione statale del matrimonio tradizionale e i centristi sostengono un riconoscimento statale inclusivo che rifletta la diversità della società.
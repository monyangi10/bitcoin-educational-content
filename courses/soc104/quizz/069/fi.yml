question: Mikä poliittinen ideologia tukisi todennäköisimmin avioliittoinstituutioiden täydellistä yksityistämistä ja poistaisi kaiken valtion osallistumisen avioliiton tunnustamiseen?
answer: Libertaristit, jotka kannattavat avioliiton erottamista valtiosta ja avioliiton tunnustamisen antamista yksityisten yhdistysten hoidettavaksi
wrong_answers:
  - Sosialistit, jotka haluavat laajentaa valtion tunnustamaa avioliittoa koskemaan kaikkia seksuaalisia suuntautumisia sosiaalisen oikeudenmukaisuuden vuoksi
  - Konservatiivit, jotka haluavat valtion säilyttävän perinteiset avioliittomääritelmät suojellakseen sivilisaatioinstituutioita
  - Keskustalaiset, jotka kannattavat erilaisten avioliittomuotojen tunnustamista valtion toimesta säilyttäen samalla sosiaalisen yhteenkuuluvuuden
explanation: |
  Libertaristit ehdottavat avioliiton yksityistämistä kokonaan ja väittävät, että valtion ei pitäisi pakottaa tunnustamaan mitään avioliittotyyppiä. He kannattavat sitä, että kirkot, synagogat, moskeijat tai maalliset järjestöt hoitaisivat avioliiton ja kutsuvat tätä "avioliiton ja valtion erottamiseksi". Sosialistit haluavat, että valtio tunnustaa tasa-arvon laajemmin, konservatiivit haluavat, että valtio suojelee perinteistä avioliittoa, ja keskustalaiset kannattavat osallistavaa valtion tunnustamista, joka heijastaa yhteiskunnallista monimuotoisuutta.
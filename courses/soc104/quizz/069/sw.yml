question: Ni itikadi gani ya kisiasa inaweyoza kuunga mkono ubinafsishaji kamili wa taasisi za ndoa, na kuondoa ushiriki wote wa serikali katika utambuzi wa ndoa?
answer: Wanaharakati wa uhuru, ambao wanatetea kutenganisha ndoa na serikali na kuruhusu vyama vya kibinafsi kushughulikia utambuzi wa ndoa
wrong_answers:
  - Wasoshalisti, ambao wanataka kupanua ndoa inayotambuliwa na serikali ili kujumuisha mwelekeo wote wa kijinsia kwa ajili ya haki ya kijamii
  - Wahafidhina, wanaotaka serikali ihifadhi fasili za ndoa za kitamaduni ili kulinda taasisi za kistaarabu
  - Watetezi wa kati, wanaounga mkono utambuzi wa serikali wa aina mbalimbali za ndoa huku wakidumisha mshikamano wa kijamii
explanation: |
  Wanaharakati wa uhuru wanapendekeza kipekee kubinafsisha ndoa kabisa, wakisema serikali haipaswi kulazimisha utambuzi wa aina yoyote ya ndoa. Wanatetea makanisa, masinagogi, misikiti, au mashirika ya kidunia kushughulikia ndoa, wakiita hii 'mgawanyiko wa ndoa na serikali'. Wasoshalisti wanataka utambuzi uliopanuliwa wa serikali kwa usawa, wahafidhina wanataka ulinzi wa serikali kwa ndoa ya kitamaduni, na wakazi wa kati wanaunga mkono utambuzi jumuishi wa serikali unaoonyesha utofauti wa kijamii.

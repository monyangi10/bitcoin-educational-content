question: Welche politische Ideologie würde am ehesten die vollständige Privatisierung von Heiratsinstitutionen und die Abschaffung jeglicher staatlicher Beteiligung an der Anerkennung der Ehe unterstützen?
answer: Libertäre, die dafür eintreten, die Ehe vom Staat zu trennen und die Anerkennung der Ehe privaten Vereinigungen zu überlassen
wrong_answers:
  - Sozialisten, die aus Gründen der sozialen Gerechtigkeit die staatlich anerkannte Ehe auf alle sexuellen Orientierungen ausweiten wollen
  - Konservative, die wollen, dass der Staat traditionelle Ehedefinitionen bewahrt, um zivilisatorische Institutionen zu schützen
  - Zentristen, die die staatliche Anerkennung verschiedener Eheformen unter Wahrung des sozialen Zusammenhalts befürworten
explanation: |
  Libertäre schlagen vor, die Ehe vollständig zu privatisieren, und argumentieren, dass der Staat keine Anerkennung irgendeiner Eheform erzwingen sollte. Sie plädieren dafür, dass Kirchen, Synagogen, Moscheen oder säkulare Organisationen die Eheschließung übernehmen und nennen dies "Trennung von Ehe und Staat". Die Sozialdemokraten wollen eine erweiterte staatliche Anerkennung der Gleichberechtigung, die Konservativen wollen den staatlichen Schutz der traditionellen Ehe, und die Zentristen unterstützen eine umfassende staatliche Anerkennung, die die gesellschaftliche Vielfalt widerspiegelt.
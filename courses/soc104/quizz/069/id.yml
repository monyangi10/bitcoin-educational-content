question: Ideologi politik mana yang paling mungkin mendukung privatisasi penuh lembaga pernikahan, menghapus semua keterlibatan pemerintah dalam pengakuan pernikahan?
answer: Libertarian, yang menganjurkan untuk memisahkan pernikahan dari negara dan membiarkan asosiasi swasta menangani pengakuan pernikahan
wrong_answers:
  - Kaum sosialis, yang ingin memperluas pernikahan yang diakui negara untuk mencakup semua orientasi seksual demi keadilan sosial
  - Konservatif, yang menginginkan negara mempertahankan definisi pernikahan tradisional untuk melindungi lembaga-lembaga peradaban
  - Sentris, yang mendukung pengakuan negara atas beragam bentuk pernikahan sambil mempertahankan kohesi sosial
explanation: |
  Kaum Libertarian secara unik mengusulkan privatisasi pernikahan secara keseluruhan, dengan alasan bahwa negara tidak boleh memaksa pengakuan atas jenis pernikahan apa pun. Mereka menganjurkan agar gereja, sinagog, masjid, atau organisasi sekuler yang menangani pernikahan, dan menyebutnya sebagai 'pemisahan antara pernikahan dan negara'. Kaum sosialis menginginkan pengakuan negara yang lebih luas untuk kesetaraan, kaum konservatif menginginkan perlindungan negara terhadap pernikahan tradisional, dan kaum sentris mendukung pengakuan negara yang inklusif yang mencerminkan keragaman masyarakat.
question: कौन सी राजनीतिक विचारधारा विवाह संस्थानों के पूर्ण निजीकरण का समर्थन करने की सबसे अधिक संभावना रखती है, जिससे विवाह की मान्यता में सरकार की सभी भागीदारी समाप्त हो जाएगी?
answer: स्वतंत्रतावादी, जो विवाह को राज्य से अलग करने और विवाह की मान्यता को निजी संस्थाओं के हाथों में सौंपने की वकालत करते हैं।
wrong_answers:
  - समाजवादी, जो सामाजिक न्याय के लिए राज्य द्वारा मान्यता प्राप्त विवाह को सभी यौन अभिविन्यासों के लिए विस्तारित करना चाहते हैं।
  - रूढ़िवादी, जो चाहते हैं कि राज्य सभ्यतागत संस्थाओं की रक्षा के लिए विवाह की पारंपरिक परिभाषाओं को संरक्षित रखे।
  - मध्यमार्गी, जो सामाजिक सामंजस्य बनाए रखते हुए विवाह के विभिन्न रूपों को राज्य द्वारा मान्यता देने का समर्थन करते हैं।
explanation: |
  स्वतंत्रतावादी विचारधारा विवाह को पूर्णतः निजीकरण करने का अनूठा प्रस्ताव रखती है, उनका तर्क है कि राज्य को किसी भी प्रकार के विवाह को मान्यता देने के लिए बाध्य नहीं करना चाहिए। वे विवाह संबंधी मामलों को चर्चों, सभाघरों, मस्जिदों या धर्मनिरपेक्ष संगठनों द्वारा संचालित करने की वकालत करते हैं, इसे वे 'विवाह और राज्य का पृथक्करण' कहते हैं। समाजवादी समानता के लिए राज्य की मान्यता का विस्तार चाहते हैं, रूढ़िवादी पारंपरिक विवाहों के लिए राज्य के संरक्षण का समर्थन करते हैं, और मध्यमार्गी सामाजिक विविधता को प्रतिबिंबित करने वाली समावेशी राज्य मान्यता का समर्थन करते हैं।
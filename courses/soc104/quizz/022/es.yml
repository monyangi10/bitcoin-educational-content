question: ¿Qué distingue al conservadurismo cultural del conservadurismo político?
answer: El conservadurismo cultural es una adhesión personal a los valores y la sabiduría tradicionales, mientras que el conservadurismo político pretende organizar la sociedad según un orden fijo
wrong_answers:
  - El conservadurismo cultural se centra en las políticas gubernamentales, mientras que el conservadurismo político hace hincapié en las creencias personales y las tradiciones familiares
  - El conservadurismo cultural se opone a todo cambio, mientras que el conservadurismo político adapta los valores tradicionales a las estructuras modernas de gobierno
  - El conservadurismo cultural exige la aplicación legal de las normas morales, mientras que el conservadurismo político se basa en el cumplimiento voluntario de las tradiciones
explanation: |
  El conservadurismo cultural representa una filosofía de vida personal basada en valores morales, estéticos y metafísicos tradicionales heredados de civilizaciones
  como la grecorromana o la judeo-cristiana. Trata de la sabiduría individual y la elevación espiritual, no de la organización política. El conservadurismo político, sin embargo, consiste específicamente en estructurar la sociedad según un orden fijo y oponerse al progreso o al cambio. La distinción clave es que el conservadurismo cultural es personal y filosófico, mientras que el conservadurismo político se refiere a la organización gubernamental y social.
question: อะไรที่ทำให้อนุรักษนิยมทางวัฒนธรรมแตกต่างจากอนุรักษนิยมทางการเมือง?
answer: อนุรักษนิยมทางวัฒนธรรมคือการยึดมั่นในคุณค่าและภูมิปัญญาแบบดั้งเดิม ในขณะที่อนุรักษนิยมทางการเมืองมุ่งจัดระเบียบสังคมตามลำดับที่แน่นอน
wrong_answers:
  - ลัทธิอนุรักษนิยมทางวัฒนธรรมมุ่งเน้นไปที่นโยบายของรัฐบาล ในขณะที่ลัทธิอนุรักษนิยมทางการเมืองเน้นที่ความเชื่อส่วนบุคคลและประเพณีครอบครัว
  - ลัทธิอนุรักษนิยมทางวัฒนธรรมต่อต้านการเปลี่ยนแปลงทั้งหมด ในขณะที่ลัทธิอนุรักษนิยมทางการเมืองปรับค่านิยมดั้งเดิมให้เข้ากับโครงสร้างการปกครองสมัยใหม่
  - ลัทธิอนุรักษนิยมทางวัฒนธรรมต้องการการบังคับใช้ทางกฎหมายของมาตรฐานทางศีลธรรม ในขณะที่ลัทธิอนุรักษนิยมทางการเมืองพึ่งพาการปฏิบัติตามประเพณีโดยสมัครใจ
explanation: |
  ลัทธิอนุรักษนิยมทางวัฒนธรรมแสดงถึงปรัชญาชีวิตส่วนบุคคลที่ยึดตามค่านิยมทางศีลธรรมแบบดั้งเดิม สุนทรียศาสตร์ และอภิปรัชญาที่สืบทอดมาจากอารยธรรมเช่นประเพณีกรีก-โรมันหรือยิว-คริสเตียน มันเกี่ยวกับปัญญาส่วนบุคคลและการยกระดับทางจิตวิญญาณ ไม่ใช่การจัดองค์กรทางการเมือง อย่างไรก็ตาม ลัทธิอนุรักษนิยมทางการเมืองนั้นเกี่ยวกับการจัดโครงสร้างสังคมตามระเบียบที่ตายตัวและการต่อต้านความก้าวหน้าหรือการเปลี่ยนแปลง ความแตกต่างที่สำคัญคือ ลัทธิอนุรักษนิยมทางวัฒนธรรมเป็นเรื่องส่วนบุคคลและปรัชญา ในขณะที่ลัทธิอนุรักษนิยมทางการเมืองเกี่ยวกับการจัดองค์กรทางรัฐบาลและสังคม
question: Čím se kulturní konzervatismus liší od politického konzervatismu?
answer: Kulturní konzervatismus je osobní lpění na tradičních hodnotách a moudrosti, zatímco politický konzervatismus usiluje o uspořádání společnosti podle pevného řádu
wrong_answers:
  - Kulturní konzervatismus se zaměřuje na vládní politiku, zatímco politický konzervatismus zdůrazňuje osobní přesvědčení a rodinné tradice
  - Kulturní konzervatismus se staví proti všem změnám, zatímco politický konzervatismus přizpůsobuje tradiční hodnoty moderním vládním strukturám
  - Kulturní konzervatismus vyžaduje právní prosazování morálních norem, zatímco politický konzervatismus se opírá o dobrovolné dodržování tradic
explanation: |
  Kulturní konzervatismus představuje osobní životní filozofii založenou na tradičních morálních hodnotách, estetice a metafyzice zděděné z civilizací
  jako je řecko-římská nebo židovsko-křesťanská tradice. Jde o individuální moudrost a duchovní povznesení, nikoli o politické uspořádání. Politický konzervatismus je však konkrétně o strukturování společnosti podle pevného řádu a odporu k pokroku nebo změnám. Klíčový rozdíl spočívá v tom, že kulturní konzervatismus je osobní a filozofický, zatímco politický konzervatismus se týká vládní a společenské organizace.
question: Какво отличава културния консерватизъм от политическия консерватизъм?
answer: Културният консерватизъм е лична привързаност към традиционните ценности и мъдрост, докато политическият консерватизъм се стреми да организира обществото според определен ред
wrong_answers:
  - Културният консерватизъм се фокусира върху правителствените политики, докато политическият консерватизъм набляга на личните убеждения и семейните традиции
  - Културният консерватизъм се противопоставя на всички промени, докато политическият консерватизъм адаптира традиционните ценности към съвременните държавни структури
  - Културният консерватизъм изисква законово налагане на моралните норми, докато политическият консерватизъм разчита на доброволно спазване на традициите
explanation: |
  Културният консерватизъм представлява лична житейска философия, основана на традиционни морални ценности, естетика и метафизика, наследени от цивилизациите
  като гръко-римската или юдео-християнската. Става дума за индивидуална мъдрост и духовно извисяване, а не за политическа организация. Политическият консерватизъм обаче е свързан именно със структурирането на обществото според определен ред и противопоставянето на прогреса или промените. Ключовото разграничение е, че културният консерватизъм е личен и философски, докато политическият консерватизъм се отнася до държавната и обществената организация.
question: Что отличает культурный консерватизм от политического консерватизма?
answer: Культурный консерватизм - это личная приверженность традиционным ценностям и мудрости, в то время как политический консерватизм стремится организовать общество в соответствии с установленным порядком
wrong_answers:
  - Культурный консерватизм фокусируется на государственной политике, в то время как политический консерватизм делает акцент на личных убеждениях и семейных традициях
  - Культурный консерватизм выступает против любых перемен, в то время как политический консерватизм адаптирует традиционные ценности к современным государственным структурам
  - Культурный консерватизм требует юридического обеспечения моральных норм, в то время как политический консерватизм полагается на добровольное соблюдение традиций
explanation: |
  Культурный консерватизм представляет собой личную жизненную философию, основанную на традиционных моральных ценностях, эстетике и метафизике, унаследованных от таких цивилизаций, как греко-римская или иудео-христианская
  таких как греко-римская или иудео-христианская традиции. Речь идет об индивидуальной мудрости и духовном возвышении, а не о политической организации. Политический консерватизм, однако, заключается именно в структурировании общества в соответствии с установленным порядком и противодействии прогрессу или изменениям. Ключевое различие заключается в том, что культурный консерватизм является личным и философским, в то время как политический консерватизм связан с государственным и общественным устройством.
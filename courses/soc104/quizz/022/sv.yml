question: Vad skiljer kulturkonservatism från politisk konservatism?
answer: Kulturkonservatism är ett personligt fasthållande vid traditionella värderingar och visdom, medan politisk konservatism försöker organisera samhället enligt en fast ordning
wrong_answers:
  - Kulturkonservatismen fokuserar på regeringens politik medan den politiska konservatismen betonar personliga övertygelser och familjetraditioner
  - Kulturkonservatismen motsätter sig all förändring medan den politiska konservatismen anpassar traditionella värderingar till moderna myndighetsstrukturer
  - Kulturkonservatism kräver laglig tillämpning av moraliska normer medan politisk konservatism förlitar sig på frivillig efterlevnad av traditioner
explanation: |
  Kulturkonservatism representerar en personlig livsfilosofi baserad på traditionella moraliska värderingar, estetik och metafysik som ärvts från civilisationer
  som grekisk-romerska eller judisk-kristna traditioner. Det handlar om individuell visdom och andlig upphöjning, inte om politisk organisation. Politisk konservatism handlar däremot specifikt om att strukturera samhället enligt en fast ordning och motsätta sig framsteg eller förändring. Den viktigaste skillnaden är att kulturkonservatismen är personlig och filosofisk, medan politisk konservatism handlar om statlig och social organisation.
question: چه چیزی محافظه‌کاری فرهنگی را از محافظه‌کاری سیاسی متمایز می‌کند؟
answer: محافظه‌کاری فرهنگی پایبندی شخصی به ارزش‌ها و خرد سنتی است، در حالی که محافظه‌کاری سیاسی به دنبال سازماندهی جامعه بر اساس یک نظم ثابت است.
wrong_answers:
  - محافظه‌کاری فرهنگی بر سیاست‌های دولتی تمرکز دارد، در حالی که محافظه‌کاری سیاسی بر باورهای شخصی و سنت‌های خانوادگی تأکید می‌کند.
  - محافظه‌کاری فرهنگی با هرگونه تغییر مخالف است، در حالی که محافظه‌کاری سیاسی ارزش‌های سنتی را با ساختارهای مدرن حکومتی تطبیق می‌دهد.
  - محافظه‌کاری فرهنگی نیازمند اجرای قانونی استانداردهای اخلاقی است، در حالی که محافظه‌کاری سیاسی به رعایت داوطلبانه سنت‌ها متکی است.
explanation: |
  محافظه‌کاری فرهنگی نمایانگر فلسفه زندگی شخصی مبتنی بر ارزش‌های اخلاقی سنتی، زیبایی‌شناسی و متافیزیک به ارث رسیده از تمدن‌هایی مانند سنت‌های یونانی-رومی یا یهودی-مسیحی است. این موضوع به حکمت فردی و تعالی روحانی مربوط می‌شود، نه سازماندهی سیاسی. با این حال، محافظه‌کاری سیاسی به‌طور خاص به ساختاردهی جامعه بر اساس یک نظم ثابت و مخالفت با پیشرفت یا تغییر می‌پردازد. تفاوت کلیدی این است که محافظه‌کاری فرهنگی شخصی و فلسفی است، در حالی که محافظه‌کاری سیاسی به سازماندهی دولتی و اجتماعی مربوط می‌شود.
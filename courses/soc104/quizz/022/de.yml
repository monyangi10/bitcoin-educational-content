question: Was unterscheidet den kulturellen Konservatismus vom politischen Konservatismus?
answer: Der kulturelle Konservatismus ist ein persönliches Festhalten an traditionellen Werten und Weisheiten, während der politische Konservatismus versucht, die Gesellschaft nach einer festen Ordnung zu organisieren
wrong_answers:
  - Der kulturelle Konservatismus konzentriert sich auf die Regierungspolitik, während der politische Konservatismus persönliche Überzeugungen und Familientraditionen in den Vordergrund stellt
  - Der kulturelle Konservatismus lehnt jede Veränderung ab, während der politische Konservatismus die traditionellen Werte an die modernen Regierungsstrukturen anpasst
  - Kultureller Konservatismus erfordert die rechtliche Durchsetzung moralischer Normen, während politischer Konservatismus auf der freiwilligen Einhaltung von Traditionen beruht
explanation: |
  Der kulturelle Konservatismus steht für eine persönliche Lebensphilosophie, die sich auf traditionelle moralische Werte, Ästhetik und Metaphysik stützt, die von Zivilisationen
  wie den griechisch-römischen oder jüdisch-christlichen Traditionen. Es geht um individuelle Weisheit und spirituelle Erhabenheit, nicht um politische Organisation. Beim politischen Konservatismus hingegen geht es speziell darum, die Gesellschaft nach einer festen Ordnung zu strukturieren und sich dem Fortschritt oder Wandel zu widersetzen. Der Hauptunterschied besteht darin, dass der kulturelle Konservatismus persönlich und philosophisch ist, während es beim politischen Konservatismus um die staatliche und gesellschaftliche Organisation geht.
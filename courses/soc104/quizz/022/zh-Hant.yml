question: 文化保守主義與政治保守主義有什麼區別？
answer: 文化保守主義是個人對傳統價值和智慧的堅持，而政治保守主義則尋求按照固定的秩序組織社會。
wrong_answers:
  - 文化保守主義著重於政府政策，而政治保守主義則強調個人信仰和家庭傳統。
  - 文化保守主義反對一切變革，而政治保守主義則將傳統價值觀調整至現代政府架構。
  - 文化保守主義需要法律強制執行道德標準，而政治保守主義則依賴自願遵守傳統。
explanation: |
  文化保守主義代表一種個人生活哲學，以傳統道德價值、美學和形而上學為基礎，並承襲自文明
  如希臘羅馬或猶太基督教傳統。它關乎個人智慧與精神的提升，而非政治組織。政治保守主義則是根據固定的秩序來組織社會，反對進步或改變。關鍵的區別在於，文化保守主義是關於個人和哲學的，而政治保守主義則是關於政府和社會組織的。
question: Kültürel muhafazakârlığı siyasi muhafazakârlıktan ayıran nedir?
answer: Kültürel muhafazakârlık geleneksel değerlere ve bilgeliğe kişisel bir bağlılık iken, siyasi muhafazakârlık toplumu sabit bir düzene göre organize etmeye çalışır
wrong_answers:
  - Kültürel muhafazakârlık hükümet politikalarına odaklanırken, siyasi muhafazakârlık kişisel inançları ve aile geleneklerini vurgular
  - Kültürel muhafazakârlık tüm değişimlere karşı çıkarken, siyasi muhafazakârlık geleneksel değerleri modern hükümet yapılarına uyarlar
  - Kültürel muhafazakârlık ahlaki standartların yasal olarak uygulanmasını gerektirirken, siyasi muhafazakârlık geleneklere gönüllü uyuma dayanır
explanation: |
  Kültürel muhafazakârlık, medeniyetlerden miras kalan geleneksel ahlaki değerlere, estetiğe ve metafiziğe dayalı kişisel bir yaşam felsefesini temsil eder
  greko-Romen ya da Yahudi-Hıristiyan gelenekleri gibi. Bireysel bilgelik ve ruhani yükselişle ilgilidir, siyasi örgütlenmeyle değil. Siyasi muhafazakarlık ise özellikle toplumun sabit bir düzene göre yapılandırılması ve ilerleme ya da değişime karşı çıkılmasıyla ilgilidir. Temel ayrım, kültürel muhafazakârlığın kişisel ve felsefi olması, siyasi muhafazakârlığın ise hükümet ve toplumsal örgütlenme ile ilgili olmasıdır.
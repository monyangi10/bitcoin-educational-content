question: Apa perbedaan konservatisme budaya dengan konservatisme politik?
answer: Konservatisme budaya adalah kepatuhan pribadi terhadap nilai-nilai dan kebijaksanaan tradisional, sementara konservatisme politik berusaha untuk mengatur masyarakat sesuai dengan tatanan yang tetap
wrong_answers:
  - Konservatisme budaya berfokus pada kebijakan pemerintah, sementara konservatisme politik menekankan pada keyakinan pribadi dan tradisi keluarga
  - Konservatisme budaya menentang semua perubahan, sementara konservatisme politik mengadaptasi nilai-nilai tradisional ke dalam struktur pemerintahan modern
  - Konservatisme budaya membutuhkan penegakan hukum atas standar moral, sementara konservatisme politik bergantung pada kepatuhan sukarela terhadap tradisi
explanation: |
  Konservatisme budaya mewakili filosofi kehidupan pribadi yang didasarkan pada nilai-nilai moral tradisional, estetika, dan metafisika yang diwarisi dari peradaban
  seperti tradisi Yunani-Romawi atau Yudeo-Kristen. Ini adalah tentang kebijaksanaan individu dan peningkatan spiritual, bukan organisasi politik. Namun, konservatisme politik secara khusus adalah tentang penataan masyarakat menurut tatanan yang tetap dan menentang kemajuan atau perubahan. Perbedaan utamanya adalah bahwa konservatisme budaya bersifat pribadi dan filosofis, sementara konservatisme politik adalah tentang organisasi pemerintahan dan sosial.

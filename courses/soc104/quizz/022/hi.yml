question: सांस्कृतिक रूढ़िवादिता और राजनीतिक रूढ़िवादिता में क्या अंतर है?
answer: सांस्कृतिक रूढ़िवादिता पारंपरिक मूल्यों और ज्ञान के प्रति व्यक्तिगत निष्ठा है, जबकि राजनीतिक रूढ़िवादिता समाज को एक निश्चित व्यवस्था के अनुसार संगठित करने का प्रयास करती है।
wrong_answers:
  - सांस्कृतिक रूढ़िवादिता सरकारी नीतियों पर ध्यान केंद्रित करती है, जबकि राजनीतिक रूढ़िवादिता व्यक्तिगत मान्यताओं और पारिवारिक परंपराओं पर जोर देती है।
  - सांस्कृतिक रूढ़िवादिता हर बदलाव का विरोध करती है, जबकि राजनीतिक रूढ़िवादिता पारंपरिक मूल्यों को आधुनिक सरकारी ढांचों के अनुरूप ढालती है।
  - सांस्कृतिक रूढ़िवादिता नैतिक मानकों के कानूनी प्रवर्तन की मांग करती है, जबकि राजनीतिक रूढ़िवादिता परंपराओं के स्वैच्छिक अनुपालन पर निर्भर करती है।
explanation: |
  सांस्कृतिक रूढ़िवादिता एक व्यक्तिगत जीवन दर्शन है जो पारंपरिक नैतिक मूल्यों, सौंदर्यशास्त्र और तत्वमीमांसा पर आधारित है, जो ग्रीको-रोमन या यहूदी-ईसाई परंपराओं जैसी सभ्यताओं से विरासत में मिली है।
  यह व्यक्तिगत ज्ञान और आध्यात्मिक उत्थान से संबंधित है, न कि राजनीतिक संगठन से। दूसरी ओर, राजनीतिक रूढ़िवादिता विशेष रूप से समाज को एक निश्चित व्यवस्था के अनुसार संरचित करने और प्रगति या परिवर्तन का विरोध करने से संबंधित है। मुख्य अंतर यह है कि सांस्कृतिक रूढ़िवादिता व्यक्तिगत और दार्शनिक है, जबकि राजनीतिक रूढ़िवादिता सरकारी और सामाजिक संगठन से संबंधित है।
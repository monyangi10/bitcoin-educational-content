question: Wat onderscheidt cultureel conservatisme van politiek conservatisme?
answer: Cultureel conservatisme is een persoonlijke gehechtheid aan traditionele waarden en wijsheid, terwijl politiek conservatisme ernaar streeft om de samenleving te organiseren volgens een vaste orde
wrong_answers:
  - Cultureel conservatisme richt zich op overheidsbeleid, terwijl politiek conservatisme de nadruk legt op persoonlijke overtuigingen en familietradities
  - Cultureel conservatisme verzet zich tegen alle verandering, terwijl politiek conservatisme traditionele waarden aanpast aan moderne overheidsstructuren
  - Cultureel conservatisme vereist wettelijke handhaving van morele normen, terwijl politiek conservatisme vertrouwt op vrijwillige naleving van tradities
explanation: |
  Cultureel conservatisme vertegenwoordigt een persoonlijke levensfilosofie gebaseerd op traditionele morele waarden, esthetiek en metafysica geërfd van beschavingen
  zoals de Grieks-Romeinse of Joods-christelijke tradities. Het gaat om individuele wijsheid en spirituele verheffing, niet om politieke organisatie. Politiek conservatisme daarentegen gaat specifiek over het structureren van de samenleving volgens een vaste orde en verzet zich tegen vooruitgang of verandering. Het belangrijkste onderscheid is dat cultureel conservatisme persoonlijk en filosofisch is, terwijl politiek conservatisme gaat over overheids- en sociale organisatie.
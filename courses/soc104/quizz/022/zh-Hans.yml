question: 文化保守主义与政治保守主义的区别是什么？
answer: 文化保守主义是对传统价值观和智慧的个人坚持，而政治保守主义则试图按照固定的秩序来组织社会。
wrong_answers:
  - 文化保守主义注重政府政策，而政治保守主义则强调个人信仰和家庭传统
  - 文化保守主义反对一切变革，而政治保守主义则使传统价值观适应现代政府结构
  - 文化保守主义要求通过法律强制执行道德标准，而政治保守主义则依靠自愿遵守传统
explanation: |
  文化保守主义代表了一种基于传统道德价值观、美学和形而上学的个人生活哲学。
  如希腊罗马或犹太基督教传统。它关注的是个人智慧和精神升华，而不是政治组织。而政治保守主义则是按照固定的秩序来构建社会，反对进步或变革。关键的区别在于，文化保守主义是个人的和哲学的，而政治保守主义是关于政府和社会组织的。
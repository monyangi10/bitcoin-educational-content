question: O que distingue o conservadorismo cultural do conservadorismo político?
answer: O conservadorismo cultural é uma adesão pessoal aos valores e à sabedoria tradicionais, enquanto o conservadorismo político procura organizar a sociedade de acordo com uma ordem fixa
wrong_answers:
  - O conservadorismo cultural centra-se nas políticas governamentais, enquanto o conservadorismo político dá ênfase às crenças pessoais e às tradições familiares
  - O conservadorismo cultural opõe-se a qualquer mudança, enquanto o conservadorismo político adapta os valores tradicionais às estruturas governamentais modernas
  - O conservadorismo cultural exige a aplicação legal de normas morais, enquanto o conservadorismo político assenta no cumprimento voluntário das tradições
explanation: |
  O conservadorismo cultural representa uma filosofia de vida pessoal baseada em valores morais, estéticos e metafísicos tradicionais herdados de civilizações
  como as tradições greco-romanas ou judaico-cristãs. Trata-se de sabedoria individual e elevação espiritual, não de organização política. O conservadorismo político, no entanto, tem especificamente a ver com a estruturação da sociedade de acordo com uma ordem fixa e a oposição ao progresso ou à mudança. A principal distinção é que o conservadorismo cultural é pessoal e filosófico, enquanto o conservadorismo político tem a ver com a organização governamental e social.
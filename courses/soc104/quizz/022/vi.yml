question: Điều gì phân biệt chủ nghĩa bảo thủ văn hóa với chủ nghĩa bảo thủ chính trị?
answer: Bảo thủ văn hóa là sự gắn bó cá nhân với các giá trị và trí tuệ truyền thống, trong khi bảo thủ chính trị tìm cách tổ chức xã hội theo một trật tự cố định.
wrong_answers:
  - Chủ nghĩa bảo thủ văn hóa tập trung vào các chính sách của chính phủ, trong khi chủ nghĩa bảo thủ chính trị nhấn mạnh niềm tin cá nhân và truyền thống gia đình.
  - Chủ nghĩa bảo thủ văn hóa phản đối mọi sự thay đổi, trong khi chủ nghĩa bảo thủ chính trị điều chỉnh các giá trị truyền thống cho phù hợp với cấu trúc chính phủ hiện đại.
  - Chủ nghĩa bảo thủ văn hóa đòi hỏi việc thực thi pháp luật đối với các chuẩn mực đạo đức, trong khi chủ nghĩa bảo thủ chính trị dựa trên sự tuân thủ tự nguyện các truyền thống.
explanation: |
  Chủ nghĩa bảo thủ văn hóa đại diện cho một triết lý sống cá nhân dựa trên các giá trị đạo đức, thẩm mỹ và siêu hình học truyền thống được thừa hưởng từ các nền văn minh như truyền thống Hy Lạp-La Mã hoặc Do Thái-Kitô giáo. Nó hướng đến trí tuệ cá nhân và sự thăng hoa tinh thần, chứ không phải tổ chức chính trị. Tuy nhiên, chủ nghĩa bảo thủ chính trị lại đặc biệt quan tâm đến việc cấu trúc xã hội theo một trật tự cố định và phản đối sự tiến bộ hoặc thay đổi. Điểm khác biệt chính là chủ nghĩa bảo thủ văn hóa mang tính cá nhân và triết học, trong khi chủ nghĩa bảo thủ chính trị liên quan đến tổ chức chính phủ và xã hội.
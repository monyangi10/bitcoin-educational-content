question: Mikä erottaa kulttuurikonservatismin poliittisesta konservatismista?
answer: Kulttuurikonservatismi on henkilökohtaista sitoutumista perinteisiin arvoihin ja viisauteen, kun taas poliittinen konservatismi pyrkii järjestämään yhteiskunnan kiinteän järjestyksen mukaan
wrong_answers:
  - Kulttuurikonservatismi keskittyy hallituksen politiikkaan, kun taas poliittinen konservatismi korostaa henkilökohtaisia uskomuksia ja perheen perinteitä
  - Kulttuurikonservatismi vastustaa kaikkea muutosta, kun taas poliittinen konservatismi mukauttaa perinteiset arvot nykyaikaisiin hallintorakenteisiin
  - Kulttuurikonservatismi edellyttää moraalinormien oikeudellista täytäntöönpanoa, kun taas poliittinen konservatismi perustuu perinteiden vapaaehtoiseen noudattamiseen
explanation: |
  Kulttuurikonservatismi edustaa henkilökohtaista elämänfilosofiaa, joka perustuu perinteisiin moraalisiin arvoihin, estetiikkaan ja metafysiikkaan, jotka ovat periytyneet sivilisaatioilta
  kuten kreikkalais-roomalainen tai juutalais-kristillinen perinne. Siinä on kyse yksilöllisestä viisaudesta ja henkisestä kohottamisesta, ei poliittisesta järjestäytymisestä. Poliittisessa konservatismissa on kuitenkin kyse nimenomaan yhteiskunnan jäsentämisestä kiinteän järjestyksen mukaan ja edistyksen tai muutoksen vastustamisesta. Keskeinen ero on se, että kulttuurikonservatismi on henkilökohtaista ja filosofista, kun taas poliittinen konservatismi koskee valtiollista ja yhteiskunnallista organisaatiota.
question: Ni igiki gitandukanya ugukingira umuco n’ugukingira politike?
answer: Ugukingira umuco ni ukwisunga umuntu ku giti ciwe ingingo ngenderwako n’ubwenge bwa kera, mu gihe ugukingira politike kurondera gutunganya ikibano hakurikijwe urutonde rudahinduka .
wrong_answers:
  - Ugukingira umuco kwibanda ku ngingo za Leta mu gihe ugukingira politike gushimika ku vyizerwa vy’umuntu ku giti ciwe n’imigenzo y’umuryango .
  - Ugukingira umuco kurwanya ihinduka ryose mu gihe ugukingira politike guhuza ingingo ngenderwako za kera n'imiterere ya Leta y'ubu .
  - Ugukingira umuco bisaba gukurikiza ingingo mfatirwako z’inyifato runtu mu gihe ugukingira politike kwishingikiriza ku kwubahiriza imigenzo ku bushake .
explanation: |
  Ugukingira umuco guserukira ubuzima bw’umuntu ku giti ciwe bushingiye ku migenzo y’inyifato runtu, ubwiza, n’ubuhinga bwa metafizike bwarazwe mu mateka .
  nk’imigenzo y’Abagiriki n’Abaroma canke y’Abayuda n’Abakirisu. Ni ivy’ubwenge bw’umuntu ku giti ciwe n’ugushirwa hejuru mu vy’impwemu, si ivy’imiteguro ya politike. Ariko rero, ubuhinga bwo gukingira politike ni ubwo canecane gutunganya ikibano hakurikijwe urutonde rudahinduka no kurwanya iterambere canke ihinduka. Itandukaniro nyamukuru ni uko ugukingira umuco ari ukw’umuntu ku giti ciwe n’uw’ubuhinga, mu gihe ugukingira politike ari ugutunganya intwaro n’imibano.
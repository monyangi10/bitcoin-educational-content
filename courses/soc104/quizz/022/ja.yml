question: 文化的保守主義と政治的保守主義の違いは何ですか？
answer: 文化的保守主義とは、伝統的な価値観や知恵に個人的に固執することであり、政治的保守主義とは、一定の秩序に従って社会を組織しようとするものである。
wrong_answers:
  - 文化的保守主義が政府の政策を重視するのに対し、政治的保守主義は個人の信条や家族の伝統を重視する
  - 文化的保守主義はあらゆる変化に反対するが、政治的保守主義は伝統的な価値観を現代の政府構造に適応させる。
  - 文化的保守主義は道徳的基準の法的強制を必要とするが、政治的保守主義は伝統の自発的遵守に依存している。
explanation: |
  文化的保守主義とは、ギリシャ・ローマやユダヤ・キリスト教などの文明から受け継いだ伝統的な道徳的価値観、美学、形而上学に基づく個人の人生哲学のことである。
  文化的保守主義とは、グレコローマンやユダヤ・キリスト教の伝統のような文明から受け継いだ伝統的な道徳的価値観、美学、形而上学に基づく個人の人生哲学を表している。政治的組織ではなく、個人の知恵と精神的高揚を目指すものだ。一方、政治的保守主義とは、特に社会を一定の秩序に従って構造化し、進歩や変化に反対するものである。重要な違いは、文化的保守主義が個人的で哲学的であるのに対し、政治的保守主義は政府と社会組織に関するものだということだ。
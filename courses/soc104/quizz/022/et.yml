question: Mis eristab kultuurikonservatismi poliitilisest konservatiivsusest?
answer: Kultuurikonservatism on isiklik kinnipidamine traditsioonilistest väärtustest ja tarkusest, samas kui poliitiline konservatism püüab korraldada ühiskonda kindla korra kohaselt
wrong_answers:
  - Kultuurikonservatism keskendub valitsuse poliitikale, samas kui poliitiline konservatism rõhutab isiklikke tõekspidamisi ja peretraditsioone
  - Kultuurikonservatism on vastu igasugusele muutusele, samas kui poliitiline konservatism kohandab traditsioonilisi väärtusi kaasaegsetele valitsemisstruktuuridele
  - Kultuurikonservatism nõuab moraalinormide õiguslikku jõustamist, samas kui poliitiline konservatism tugineb traditsioonide vabatahtlikule järgimisele
explanation: |
  Kultuurikonservatism esindab isiklikku elufilosoofiat, mis põhineb tsivilisatsioonidest päritud traditsioonilistel moraalsetel väärtustel, esteetikal ja metafüüsikal
  nagu kreeka-rooma või juudi-kristlikud traditsioonid. Tegemist on individuaalse tarkuse ja vaimse ülestõusuga, mitte poliitilise organiseerimisega. Poliitiline konservatism aga seisneb konkreetselt ühiskonna struktureerimises kindla korra järgi ja vastuseisus progressile või muutustele. Peamine erinevus seisneb selles, et kultuurikonservatism on isiklik ja filosoofiline, samas kui poliitiline konservatism käsitleb valitsemist ja ühiskonnakorraldust.
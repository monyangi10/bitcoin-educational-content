question: Ni nini kinachotofautisha uhafidhina wa kitamaduni na uhafidhina wa kisiasa?
answer: Uhafidhina wa kitamaduni ni uzingatiaji binafsi wa maadili na hekima ya kitamaduni, huku uhafidhina wa kisiasa ukitaka kupanga jamii kulingana na utaratibu uliowekwa.
wrong_answers:
  - Uhafidhina wa kitamaduni unazingatia sera za serikali huku uhafidhina wa kisiasa ukisisitiza imani za kibinafsi na mila za familia
  - Uhafidhina wa kitamaduni unapinga mabadiliko yote huku uhafidhina wa kisiasa ukibadilisha maadili ya kitamaduni na miundo ya kisasa ya serikali
  - Uhafidhina wa kitamaduni unahitaji utekelezaji wa sheria wa viwango vya maadili huku uhafidhina wa kisiasa ukitegemea kufuata mila kwa hiari
explanation: |
  Uhafidhina wa kitamaduni unawakilisha falsafa ya maisha ya kibinafsi inayotegemea maadili ya kitamaduni, uzuri, na metafizikia iliyorithiwa kutoka kwa ustaarabu
  kama vile mila za Kigiriki-Kirumi au Kiyahudi-Kikristo. Inahusu hekima ya mtu binafsi na mwinuko wa kiroho, si shirika la kisiasa. Hata hivyo, uhafidhina wa kisiasa unahusu hasa muundo wa jamii kulingana na mpangilio maalum na kupinga maendeleo au mabadiliko. Tofauti kuu ni kwamba uhafidhina wa kitamaduni ni wa kibinafsi na wa kifalsafa, huku uhafidhina wa kisiasa ukihusu shirika la kiserikali na kijamii.
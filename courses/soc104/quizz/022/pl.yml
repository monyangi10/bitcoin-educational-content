question: Co odróżnia konserwatyzm kulturowy od konserwatyzmu politycznego?
answer: Konserwatyzm kulturowy to osobiste przywiązanie do tradycyjnych wartości i mądrości, podczas gdy konserwatyzm polityczny dąży do zorganizowania społeczeństwa zgodnie z ustalonym porządkiem
wrong_answers:
  - Konserwatyzm kulturowy koncentruje się na polityce rządu, podczas gdy konserwatyzm polityczny kładzie nacisk na osobiste przekonania i tradycje rodzinne
  - Konserwatyzm kulturowy sprzeciwia się wszelkim zmianom, podczas gdy konserwatyzm polityczny dostosowuje tradycyjne wartości do nowoczesnych struktur rządowych
  - Konserwatyzm kulturowy wymaga prawnego egzekwowania standardów moralnych, podczas gdy konserwatyzm polityczny opiera się na dobrowolnym przestrzeganiu tradycji
explanation: |
  Konserwatyzm kulturowy reprezentuje osobistą filozofię życia opartą na tradycyjnych wartościach moralnych, estetyce i metafizyce odziedziczonych po cywilizacjach, takich jak tradycje grecko-rzymskie czy judeochrześcijańskie
  takich jak tradycje grecko-rzymskie czy judeochrześcijańskie. Chodzi o indywidualną mądrość i duchowe wyniesienie, a nie o organizację polityczną. Konserwatyzm polityczny polega jednak w szczególności na kształtowaniu społeczeństwa zgodnie z ustalonym porządkiem i przeciwstawianiu się postępowi lub zmianom. Kluczowe rozróżnienie polega na tym, że konserwatyzm kulturowy jest osobisty i filozoficzny, podczas gdy konserwatyzm polityczny dotyczy organizacji rządowej i społecznej.
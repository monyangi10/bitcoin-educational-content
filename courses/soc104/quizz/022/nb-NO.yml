question: Hva skiller kulturkonservatisme fra politisk konservatisme?
answer: Kulturkonservatisme er en personlig tilslutning til tradisjonelle verdier og visdom, mens politisk konservatisme søker å organisere samfunnet i henhold til en fast orden
wrong_answers:
  - Kulturkonservatisme fokuserer på regjeringens politikk, mens politisk konservatisme legger vekt på personlig tro og familietradisjoner
  - Kulturkonservatismen motsetter seg all endring, mens den politiske konservatismen tilpasser tradisjonelle verdier til moderne statsstrukturer
  - Kulturkonservatisme krever rettslig håndhevelse av moralske standarder, mens politisk konservatisme baserer seg på frivillig overholdelse av tradisjoner
explanation: |
  Kulturkonservatisme representerer en personlig livsfilosofi basert på tradisjonelle moralske verdier, estetikk og metafysikk nedarvet fra sivilisasjoner
  som gresk-romerske eller jødisk-kristne tradisjoner. Den handler om individuell visdom og åndelig opphøyelse, ikke om politisk organisering. Politisk konservatisme handler derimot spesifikt om å strukturere samfunnet i henhold til en fast orden og motsette seg fremskritt eller endring. Det viktigste skillet er at kulturkonservatismen er personlig og filosofisk, mens politisk konservatisme handler om statlig og sosial organisering.
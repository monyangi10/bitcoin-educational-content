question: Šta razlikuje kulturni konzervativizam od političkog konzervativizma?
answer: Kulturni konzervativizam je lična privrženost tradicionalnim vrednostima i mudrosti, dok politički konzervativizam nastoji da organizuje društvo prema fiksnom poretku.
wrong_answers:
  - Kulturni konzervativizam fokusira se na vladine politike dok politički konzervativizam naglašava lična uverenja i porodične tradicije
  - Kulturni konzervativizam se protivi svim promenama, dok politički konzervativizam prilagođava tradicionalne vrednosti modernim državnim strukturama.
  - Kulturni konzervativizam zahteva pravno sprovođenje moralnih standarda, dok se politički konzervativizam oslanja na dobrovoljno pridržavanje tradicija.
explanation: |
  Kulturni konzervativizam predstavlja ličnu životnu filozofiju zasnovanu na tradicionalnim moralnim vrednostima, estetici i metafizici nasleđenim iz civilizacija poput grčko-rimskih ili judeo-hrišćanskih tradicija. Radi se o individualnoj mudrosti i duhovnom uzdizanju, a ne o političkoj organizaciji. Politički konzervativizam, međutim, konkretno se odnosi na strukturiranje društva prema fiksnom poretku i protivljenje napretku ili promenama. Ključna razlika je u tome što je kulturni konzervativizam ličan i filozofski, dok se politički konzervativizam odnosi na vladinu i društvenu organizaciju.
question: Cosa distingue il conservatorismo culturale dal conservatorismo politico?
answer: Il conservatorismo culturale è un'adesione personale ai valori e alla saggezza tradizionali, mentre il conservatorismo politico cerca di organizzare la società secondo un ordine prestabilito
wrong_answers:
  - Il conservatorismo culturale si concentra sulle politiche governative, mentre il conservatorismo politico enfatizza le convinzioni personali e le tradizioni familiari
  - Il conservatorismo culturale si oppone a qualsiasi cambiamento, mentre il conservatorismo politico adatta i valori tradizionali alle moderne strutture di governo
  - Il conservatorismo culturale richiede l'applicazione legale di norme morali, mentre il conservatorismo politico si basa sul rispetto volontario delle tradizioni
explanation: |
  Il conservatorismo culturale rappresenta una filosofia di vita personale basata su valori morali, estetici e metafisici tradizionali ereditati da civiltà come quella greco-romana o giudeo-cristiana
  come le tradizioni greco-romane o giudaico-cristiane. Si tratta di saggezza individuale e di elevazione spirituale, non di organizzazione politica. Il conservatorismo politico, invece, riguarda specificamente la strutturazione della società secondo un ordine fisso e si oppone al progresso o al cambiamento. La distinzione fondamentale è che il conservatorismo culturale è personale e filosofico, mentre il conservatorismo politico riguarda l'organizzazione governativa e sociale.
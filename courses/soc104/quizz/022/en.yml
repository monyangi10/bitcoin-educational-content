question: What distinguishes cultural conservatism from political conservatism?
answer: Cultural conservatism is a personal adherence to traditional values and wisdom, while political conservatism seeks to organize society according to a fixed order
wrong_answers:
  - Cultural conservatism focuses on government policies while political conservatism emphasizes personal beliefs and family traditions
  - Cultural conservatism opposes all change while political conservatism adapts traditional values to modern governmental structures
  - Cultural conservatism requires legal enforcement of moral standards while political conservatism relies on voluntary compliance with traditions
explanation: |
  Cultural conservatism represents a personal life philosophy based on traditional moral values, aesthetics, and metaphysics inherited from civilizations like Greco-Roman or Judeo-Christian traditions. It's about individual wisdom and spiritual elevation, not political organization. Political conservatism, however, is specifically about structuring society according to a fixed order and opposing progress or change. The key distinction is that cultural conservatism is personal and philosophical, while political conservatism is about governmental and social organization.
question: 문화적 보수주의와 정치적 보수주의의 차이점은 무엇인가요?
answer: 문화적 보수주의는 전통적인 가치와 지혜를 개인적으로 고수하는 반면, 정치적 보수주의는 고정된 질서에 따라 사회를 조직하려고 합니다
wrong_answers:
  - 문화적 보수주의는 정부 정책에 중점을 두는 반면 정치적 보수주의는 개인의 신념과 가족 전통을 강조합니다
  - 문화적 보수주의는 모든 변화에 반대하는 반면 정치적 보수주의는 전통적인 가치를 현대 정부 구조에 적용합니다
  - 문화적 보수주의는 도덕적 기준을 법적으로 강제하는 반면, 정치적 보수주의는 전통을 자발적으로 준수하는 데 의존합니다
explanation: |
  문화적 보수주의는 그리스 로마나 유대 기독교 전통과 같은 문명에서 물려받은 전통적인 도덕적 가치, 미학, 형이상학에 기반한 개인적인 삶의 철학을 의미합니다
  그리스-로마 또는 유대-기독교 전통과 같은 문명으로부터 물려받은 개인적 삶의 철학을 의미합니다. 정치적 조직이 아니라 개인의 지혜와 정신적 고양에 관한 것입니다. 그러나 정치적 보수주의는 특히 고정된 질서에 따라 사회를 구조화하고 진보나 변화에 반대하는 것입니다. 중요한 차이점은 문화적 보수주의는 개인적이고 철학적이지만 정치적 보수주의는 정부 및 사회 조직에 관한 것이라는 점입니다.
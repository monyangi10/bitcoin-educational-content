question: Hvilke grunnleggende likheter finnes det mellom konservative og sosialister til tross for deres tilsynelatende ideologiske forskjeller, ifølge Gustave Molinaris analyse i "Les Soirées de la rue Saint Lazare" (eng. Evenings on Saint Lazarus Street)?
answer: Begge søker å påtvinge samfunnet sin visjon gjennom statlig inngripen, til tross for at de har ulike sosiale mål
wrong_answers:
  - Begge avviser individuell eiendomsrett til fordel for kollektivt eierskap forvaltet av ulike institusjoner
  - Begge ser på frihet som et absolutt prinsipp som aldri bør begrenses, uavhengig av sosiale konsekvenser
  - Begge er motstandere av enhver form for statlig regulering, samtidig som de støtter ulike typer private markedsløsninger
explanation: |
  Molinaris hovedinnsikt var at konservative og sosialister, til tross for deres motstridende samfunnsvisjoner, deler en felles metodisk tilnærming: Begge bruker statsmakten til å innføre den samfunnsorden de foretrekker. Konservative bruker staten til å opprettholde tradisjonelle strukturer, mens sosialister bruker den til å skape nye, egalitære strukturer. Dette skiller dem fra libertarianere, som motsetter seg statlig sosial ingeniørkunst uavhengig av ideologisk retning. De andre alternativene gir en feilaktig fremstilling av disse ideologienes faktiske holdninger til eiendom, frihet og stat.
question: "गुस्ताव मोलिनारी के 'लेस सोइरीज़ डे ला रुए सेंट लाज़ारे' (अंग्रेजी में: सेंट लाजरस स्ट्रीट पर शामें) में किए गए विश्लेषण के अनुसार, स्पष्ट वैचारिक मतभेदों के बावजूद रूढ़िवादियों और समाजवादियों के बीच क्या मूलभूत समानता मौजूद है?"
answer: "दोनों ही अपने-अपने सामाजिक उद्देश्यों में भिन्नता होने के बावजूद राज्य के हस्तक्षेप के माध्यम से समाज के अपने दृष्टिकोण को थोपना चाहते हैं।"
wrong_answers:
  - "दोनों ही व्यक्तिगत संपत्ति अधिकारों को अस्वीकार करते हुए विभिन्न संस्थानों द्वारा प्रबंधित सामूहिक स्वामित्व का समर्थन करते हैं।"
  - "दोनों ही स्वतंत्रता को एक ऐसे पूर्ण सिद्धांत के रूप में देखते हैं जिसे सामाजिक परिणामों की परवाह किए बिना कभी सीमित नहीं किया जाना चाहिए।"
  - "दोनों ही किसी भी प्रकार के सरकारी नियमन का विरोध करते हैं, जबकि विभिन्न प्रकार के निजी बाजार समाधानों का समर्थन करते हैं।"
explanation: |
  मोलिनारी की प्रमुख अंतर्दृष्टि यह थी कि रूढ़िवादी और समाजवादी, अपने विरोधी सामाजिक दृष्टिकोणों के बावजूद, एक समान कार्यप्रणाली अपनाते हैं: दोनों ही अपनी पसंदीदा सामाजिक व्यवस्था को लागू करने के लिए राज्य की शक्ति पर निर्भर रहते हैं। रूढ़िवादी पारंपरिक संरचनाओं को बनाए रखने के लिए राज्य का उपयोग करते हैं, जबकि समाजवादी इसका उपयोग नई समतावादी संरचनाओं के निर्माण के लिए करते हैं। यह उन्हें स्वतंत्रतावादियों से अलग करता है, जो राज्य द्वारा थोपी गई सामाजिक संरचना का विरोध करते हैं, चाहे उसकी वैचारिक दिशा कुछ भी हो। अन्य विकल्प संपत्ति, स्वतंत्रता और सरकार पर इन विचारधाराओं की वास्तविक स्थिति को गलत तरीके से प्रस्तुत करते हैं।

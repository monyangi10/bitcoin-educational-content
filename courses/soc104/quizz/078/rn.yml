question: Dukurikije icegeranyo ca Gustave Molinari mu gitabu ciwe citwa ‘Les Soirées de la rue Saint Lazare’ (icong. Ijoro ku nzira ya Lazaro mweranda), ni igiki c’ishimikiro basa n’abanyagihugu b’abanyagihugu n’abanyagihugu b’abanyagihugu naho basa n’abatandukanye mu vyiyumviro?
answer: Bompi barondera gutegeka ivyiyumviro vyabo ku kibano biciye mu gufasha Leta, naho bafise intumbero zitandukanye z’imibano .
wrong_answers:
  - Bompi banse uburenganzira bw'umuntu ku giti ciwe kugira ngo bafashe ubutunzi rusangi burongowe n'inzego zitandukanye .
  - Bompi babona ko umwidegemvyo ari ingingo ngenderwako idakwiye kwigera igira aho igarukira ata kuraba ingaruka zo mu kibano .
  - Bompi barwanya uburyo bwose bw’amategeko ya Leta mu gihe bashigikira ubwoko butandukanye bw’imiti y’isoko ry’abikorera ku giti cabo .
explanation: |
  Iciyumviro nyamukuru Molinari yari afise ni uko aba conservateurs n’aba socialistes, naho bafise ivyiyumviro bitandukanye mu vy’imibano, basangiye uburyo bumwe: bompi bizigira ububasha bwa Leta kugira ngo bategeke urutonde rw’imibano bakunda. Abanyagihugu b’abanyagihugu bakoresha Leta kugira ngo bagumane imibumbe ya kera, mu gihe abasosiyalisiti bayikoresha kugira ngo bareme imibumbe mishasha y’uburinganire. Ivyo bibatandukanya n’abaharanira umwidegemvyo, barwanya ubuhinga bwo guhindura imibano bushirwaho na Leta ata kuraba iyo buja mu vy’ingengabitekerezo. Ibindi bihitamwo bigaragaza nabi aho izo ngendo zihagaze vy’ukuri ku bijanye n’itunga, umwidegemvyo be n’intwaro.
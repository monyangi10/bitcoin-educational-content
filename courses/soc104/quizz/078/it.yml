question: Secondo l'analisi di Gustave Molinari in "Les Soirées de la rue Saint Lazare" (le serate di via Saint Lazarus), quale somiglianza fondamentale esiste tra conservatori e socialisti nonostante le loro apparenti differenze ideologiche?
answer: Entrambi cercano di imporre la propria visione della società attraverso l'intervento dello Stato, pur avendo obiettivi sociali diversi
wrong_answers:
  - Entrambi rifiutano i diritti di proprietà individuali a favore di una proprietà collettiva gestita da diverse istituzioni
  - Entrambi considerano la libertà come un principio assoluto che non dovrebbe mai essere limitato, a prescindere dalle conseguenze sociali
  - Entrambi si oppongono a qualsiasi forma di regolamentazione governativa e sostengono diversi tipi di soluzioni di mercato private
explanation: |
  L'intuizione chiave di Molinari è che conservatori e socialisti, nonostante le loro visioni sociali opposte, condividono un approccio metodologico comune: entrambi si affidano al potere dello Stato per imporre l'ordine sociale che preferiscono. I conservatori usano lo Stato per mantenere le strutture tradizionali, mentre i socialisti lo usano per creare nuove strutture egualitarie. Questo li distingue dai libertari, che si oppongono all'ingegneria sociale imposta dallo Stato indipendentemente dalla sua direzione ideologica. Le altre opzioni travisano le reali posizioni di queste ideologie su proprietà, libertà e governo.
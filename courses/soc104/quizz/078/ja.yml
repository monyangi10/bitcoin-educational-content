question: サン・ラザール通りの夕べ』におけるギュスターヴ・モリナーリの分析によれば、保守派と社会主義者の間には、イデオロギーの違いこそあれ、どのような根本的な共通点があるのだろうか？
answer: 両者とも、社会的な目的は異なるものの、国家の介入を通じて自分たちの社会像を押し付けようとしている。
wrong_answers:
  - どちらも個人の所有権を否定し、異なる制度によって管理される集団所有権を支持している。
  - 両者とも、自由を絶対的な原理としてとらえ、社会的影響にかかわらず、決して制限すべきではないと考えている。
  - 両者とも、あらゆる形態の政府規制に反対する一方で、さまざまなタイプの民間市場による解決策を支持している。
explanation: |
  モリナーリの重要な洞察は、保守派と社会主義者は、その社会的ビジョンが正反対であるにもかかわらず、方法論的には共通のアプローチをとっているということである。保守派は伝統的な構造を維持するために国家を利用し、社会主義者は新たな平等主義的構造を生み出すために国家を利用する。この点が、イデオロギーの方向性にかかわらず、国家による社会工学に反対するリバタリアンとは異なる。他の選択肢は、財産、自由、政府に関するこれらのイデオロギーの実際の立場を誤って伝えている。
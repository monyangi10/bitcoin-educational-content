question: 구스타브 몰리나리의 분석에 따르면, 보수주의자와 사회주의자 사이에는 명백한 이념적 차이에도 불구하고 어떤 근본적인 유사성이 존재한다고 하는데요, '레 소아레 드 라 루 생 라자르 거리의 저녁'(eng. 성 라자루스 거리의 저녁)은 어떤 내용을 담고 있을까요?
answer: 둘 다 서로 다른 사회적 목표를 가지고 있음에도 불구하고 국가 개입을 통해 사회에 대한 비전을 강요하려 합니다
wrong_answers:
  - 둘 다 개인의 재산권을 거부하고 다른 기관에서 관리하는 공동 소유권을 선호합니다
  - 둘 다 자유를 사회적 결과에 관계없이 제한해서는 안 되는 절대적인 원칙으로 간주합니다
  - 둘 다 모든 형태의 정부 규제에 반대하는 동시에 다양한 유형의 민간 시장 솔루션을 지원합니다
explanation: |
  몰리나리의 핵심 통찰은 보수주의자와 사회주의자는 서로 반대되는 사회 비전을 가지고 있지만, 둘 다 선호하는 사회 질서를 강요하기 위해 국가 권력에 의존한다는 공통된 방법론적 접근 방식을 공유한다는 것이었습니다. 보수주의자는 전통적인 구조를 유지하기 위해 국가를 사용하는 반면, 사회주의자는 새로운 평등주의적 구조를 만들기 위해 국가를 사용합니다. 이는 이념적 방향에 관계없이 국가가 부과하는 사회 공학에 반대하는 자유주의자들과 구별됩니다. 다른 옵션은 재산, 자유, 정부에 대한 이러한 이념의 실제 입장을 잘못 표현하고 있습니다.
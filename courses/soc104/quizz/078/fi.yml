question: Gustave Molinarin analyysin mukaan teoksessa Les Soirées de la rue Saint Lazare (Saint Lazaruksen kadun illat) konservatiivien ja sosialistien välillä on ilmeisistä ideologisista eroista huolimatta perustavaa laatua olevia yhtäläisyyksiä
answer: Molemmat pyrkivät asettamaan oman näkemyksensä yhteiskunnasta voimaan valtion väliintulon avulla, vaikka niillä on erilaiset yhteiskunnalliset tavoitteet
wrong_answers:
  - Molemmat hylkäävät yksilölliset omistusoikeudet erilaisten instituutioiden hallinnoiman kollektiivisen omistuksen hyväksi
  - Molemmat pitävät vapautta absoluuttisena periaatteena, jota ei pitäisi koskaan rajoittaa yhteiskunnallisista seurauksista riippumatta
  - Molemmat vastustavat kaikenlaista valtion sääntelyä ja kannattavat samalla erilaisia yksityisten markkinoiden ratkaisuja
explanation: |
  Molinarin keskeinen oivallus oli, että konservatiiveilla ja sosialisteilla on vastakkaisista yhteiskunnallisista näkemyksistään huolimatta yhteinen metodologinen lähestymistapa: molemmat luottavat valtiovaltaan saadakseen aikaan haluamansa yhteiskuntajärjestyksen. Konservatiivit käyttävät valtiota säilyttääkseen perinteiset rakenteet, kun taas sosialistit käyttävät sitä luodakseen uusia tasa-arvoisia rakenteita. Tämä erottaa heidät libertaristeista, jotka vastustavat valtion harjoittamaa yhteiskunnallista suunnittelua sen ideologisesta suunnasta riippumatta. Muut vaihtoehdot vääristelevät näiden ideologioiden todellisia kantoja omaisuudesta, vapaudesta ja hallituksesta.
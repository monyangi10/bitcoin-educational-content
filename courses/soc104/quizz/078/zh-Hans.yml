question: 根据古斯塔夫-莫里纳利在《圣拉扎尔街的夜晚》（Les Soirées de la rue Saint Lazare）一书中的分析，尽管保守派和社会主义者在意识形态上存在明显差异，但他们之间存在哪些基本相似之处？
answer: 尽管两者的社会目标不同，但都试图通过国家干预将自己的社会愿景强加于人
wrong_answers:
  - 两者都反对个人财产权，支持由不同机构管理的集体所有权
  - 两者都将自由视为绝对原则，无论社会后果如何，都不应加以限制
  - 两者都反对任何形式的政府监管，同时支持不同类型的私人市场解决方案
explanation: |
  莫利纳利的主要见解是，保守派和社会主义者尽管社会愿景截然相反，但在方法论上却有共同之处：他们都依靠国家权力来强加他们所偏好的社会秩序。保守派利用国家来维持传统结构，而社会主义者则利用国家来建立新的平等主义结构。这将他们与自由主义者区分开来，后者反对国家强加的社会工程，无论其意识形态方向如何。其他选项歪曲了这些意识形态对财产、自由和政府的实际立场。
question: "Menurut analisis Gustave Molinari dalam 'Les Soirées de la rue Saint Lazare' (bahasa Inggris: Evenings on Saint Lazarus Street), kesamaan mendasar apa yang ada antara kaum konservatif dan sosialis terlepas dari perbedaan ideologi mereka yang tampak jelas?"
answer: "Keduanya berusaha untuk memaksakan visi mereka tentang masyarakat melalui keterlibatan negara, meskipun memiliki tujuan sosial yang berbeda"
wrong_answers:
  - "Keduanya menolak hak milik individu dan mendukung kepemilikan kolektif yang dikelola oleh lembaga yang berbeda"
  - "Keduanya memandang kebebasan sebagai prinsip mutlak yang tidak boleh dibatasi terlepas dari konsekuensi sosialnya"
  - "Keduanya menentang segala bentuk peraturan pemerintah sambil mendukung berbagai jenis solusi pasar swasta"
explanation: |
  Wawasan utama Molinari adalah bahwa kaum konservatif dan sosialis, meskipun memiliki visi sosial yang berlawanan, memiliki pendekatan metodologis yang sama: keduanya mengandalkan kekuasaan negara untuk memaksakan tatanan sosial yang mereka inginkan. Kaum konservatif menggunakan negara untuk mempertahankan struktur tradisional, sementara kaum sosialis menggunakannya untuk menciptakan struktur baru yang egaliter. Hal ini membedakan mereka dari kaum libertarian, yang menentang rekayasa sosial yang dipaksakan oleh negara, terlepas dari arah ideologisnya. Pilihan-pilihan lain salah menggambarkan posisi sebenarnya dari ideologi-ideologi ini mengenai properti, kebebasan, dan pemerintahan.

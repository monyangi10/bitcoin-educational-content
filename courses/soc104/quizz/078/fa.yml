question: "بر اساس تحلیل گوستاو مولیناری در 'Les Soirées de la rue Saint Lazare' (به انگلیسی: Evenings on Saint Lazarus Street)، چه شباهت اساسی بین محافظه‌کاران و سوسیالیست‌ها وجود دارد با وجود تفاوت‌های ایدئولوژیک ظاهری آن‌ها؟"
answer: هر دو به دنبال تحمیل دیدگاه خود از جامعه از طریق مداخله دولت هستند، با وجود اهداف اجتماعی متفاوت.
wrong_answers:
  - هر دو حقوق مالکیت فردی را به نفع مالکیت جمعی که توسط نهادهای مختلف مدیریت می‌شود، رد می‌کنند.
  - هر دو آزادی را به عنوان یک اصل مطلق می‌بینند که نباید صرف نظر از پیامدهای اجتماعی محدود شود.
  - هر دو با هر نوع مقررات دولتی مخالف هستند در حالی که از انواع مختلف راه‌حل‌های بازار خصوصی حمایت می‌کنند.
explanation: |
  بینش کلیدی مولیناری این بود که محافظه‌کاران و سوسیالیست‌ها، علیرغم دیدگاه‌های اجتماعی متضادشان، یک رویکرد روش‌شناختی مشترک دارند: هر دو به قدرت دولت برای تحمیل نظم اجتماعی مورد نظر خود متکی هستند. محافظه‌کاران از دولت برای حفظ ساختارهای سنتی استفاده می‌کنند، در حالی که سوسیالیست‌ها از آن برای ایجاد ساختارهای جدید برابرطلبانه بهره می‌برند. این موضوع آنها را از لیبرترین‌ها متمایز می‌کند، که با مهندسی اجتماعی تحمیل‌شده توسط دولت، صرف‌نظر از جهت‌گیری ایدئولوژیک آن، مخالفند. گزینه‌های دیگر مواضع واقعی این ایدئولوژی‌ها در مورد مالکیت، آزادی و دولت را نادرست نشان می‌دهند.
question: Согласно анализу Гюстава Молинари в книге "Вечера на улице Сен-Лазар" (Les Soirées de la rue Saint Lazare), какое фундаментальное сходство существует между консерваторами и социалистами, несмотря на их кажущиеся идеологические различия?
answer: Оба стремятся навязать свое видение общества с помощью государственного вмешательства, несмотря на то, что преследуют разные социальные цели
wrong_answers:
  - Оба отвергают индивидуальные права собственности в пользу коллективной собственности, управляемой различными институтами
  - И те, и другие рассматривают свободу как абсолютный принцип, который никогда не должен ограничиваться независимо от социальных последствий
  - Оба выступают против любой формы государственного регулирования, поддерживая различные виды решений на частном рынке
explanation: |
  Ключевая мысль Молинари заключалась в том, что консерваторы и социалисты, несмотря на противоположные социальные взгляды, имеют общий методологический подход: и те, и другие опираются на государственную власть, чтобы навязать предпочтительный для них социальный порядок. Консерваторы используют государство для поддержания традиционных структур, а социалисты - для создания новых, эгалитарных. Это отличает их от либертарианцев, которые выступают против навязанной государством социальной инженерии независимо от ее идеологической направленности. Другие варианты искажают реальные позиции этих идеологий в отношении собственности, свободы и правительства.
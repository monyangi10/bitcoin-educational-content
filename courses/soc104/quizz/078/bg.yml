question: Според анализа на Гюстав Молинари в "Вечерите на улица Сен Лазар" (Les Soirées de la rue Saint Lazare), каква основна прилика съществува между консерваторите и социалистите въпреки привидните им идеологически различия?
answer: И двете се стремят да наложат своята визия за обществото чрез държавна намеса, въпреки че имат различни социални цели
wrong_answers:
  - И двете отхвърлят индивидуалните права на собственост в полза на колективна собственост, управлявана от различни институции
  - И двамата разглеждат свободата като абсолютен принцип, който никога не трябва да се ограничава, независимо от социалните последици
  - И двамата се противопоставят на всяка форма на държавно регулиране, като същевременно подкрепят различни видове решения на частния пазар
explanation: |
  Ключовият извод на Молинари е, че въпреки противоположните си социални виждания консерваторите и социалистите имат общ методологически подход: и двамата разчитат на държавната власт, за да наложат предпочитания от тях социален ред. Консерваторите използват държавата, за да запазят традиционните структури, докато социалистите я използват, за да създадат нови егалитарни структури. Това ги отличава от либертарианците, които се противопоставят на наложеното от държавата социално инженерство, независимо от неговата идеологическа насоченост. Другите варианти представят погрешно действителните позиции на тези идеологии по отношение на собствеността, свободата и управлението.
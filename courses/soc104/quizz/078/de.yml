question: Welche grundsätzlichen Gemeinsamkeiten zwischen Konservativen und Sozialisten gibt es nach der Analyse von Gustave Molinari in "Les Soirées de la rue Saint Lazare" (dt. Abende in der Lazarusstraße) trotz ihrer scheinbaren ideologischen Unterschiede?
answer: Beide versuchen, ihre Vision der Gesellschaft durch staatliche Eingriffe durchzusetzen, obwohl sie unterschiedliche soziale Ziele verfolgen
wrong_answers:
  - Beide lehnen individuelle Eigentumsrechte zugunsten von kollektivem Eigentum ab, das von verschiedenen Institutionen verwaltet wird
  - Beide betrachten die Freiheit als absoluten Grundsatz, der ungeachtet der sozialen Folgen niemals eingeschränkt werden sollte
  - Beide lehnen jede Form von staatlicher Regulierung ab und unterstützen verschiedene Arten von privaten Marktlösungen
explanation: |
  Molinaris wichtigste Erkenntnis war, dass Konservative und Sozialisten trotz ihrer gegensätzlichen sozialen Visionen einen gemeinsamen methodischen Ansatz haben: Beide verlassen sich auf die Staatsmacht, um die von ihnen bevorzugte Gesellschaftsordnung durchzusetzen. Die Konservativen nutzen den Staat, um traditionelle Strukturen zu erhalten, während die Sozialisten ihn nutzen, um neue egalitäre Strukturen zu schaffen. Dies unterscheidet sie von den Libertären, die staatlich verordnetes Social Engineering unabhängig von seiner ideologischen Ausrichtung ablehnen. Die anderen Optionen geben die tatsächlichen Positionen dieser Ideologien zu Eigentum, Freiheit und Staat falsch wieder.
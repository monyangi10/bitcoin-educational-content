question: 根據 Gustave Molinari 在 'Les Soirées de la rue Saint Lazare' (eng. Evenings on Saint Lazarus Street) 中的分析，儘管保守派和社會主義者在意識形態上有明顯的差異，但他們之間有什麼基本的相似之處？
answer: 儘管兩者的社會目標不同，但都試圖透過國家干預來強加他們對社會的願景
wrong_answers:
  - 兩者都摒棄個人財產權，改為由不同機構管理的集體所有權
  - 兩者都認為自由是絕對的原則，不論社會後果如何，都不應受到限制。
  - 兩者都反對任何形式的政府規範，同時支持不同類型的私人市場解決方案
explanation: |
  Molinari 的主要見解是，保守派和社會主義者儘管社會願景截然相反，卻有一個共同的方法論：兩者都依賴國家權力來強加他們偏好的社會秩序。保守派利用國家來維持傳統結構，而社會主義者則利用國家來創造新的平等主義結構。這將他們與自由主義者區別開來，自由主義者反對國家強加的社會工程，不論其意識形態方向為何。其他選項歪曲了這些意識形態對財產、自由和政府的實際立場。
question: Prema analizi Gustava Molinarija u 'Les Soirées de la rue Saint Lazare' (srp. Večeri u ulici Sen Lazar), osnovna sličnost između konzervativaca i socijalista, uprkos njihovim očiglednim ideološkim razlikama, jeste njihova sklonost ka korišćenju državne moći za postizanje svojih ciljeva.
answer: Oboje nastoje da nametnu svoju viziju društva kroz državnu intervenciju, uprkos tome što imaju različite društvene ciljeve.
wrong_answers:
  - Oboje odbacuju individualna vlasnička prava u korist kolektivnog vlasništva kojim upravljaju različite institucije.
  - Oboje gledaju na slobodu kao na apsolutni princip koji nikada ne treba ograničavati bez obzira na društvene posledice.
  - Oboje se protive bilo kakvom obliku državne regulative, dok podržavaju različite vrste rešenja na privatnom tržištu.
explanation: |
  Ključni uvid Molinarija bio je da konzervativci i socijalisti, uprkos svojim suprotstavljenim društvenim vizijama, dele zajednički metodološki pristup: oba se oslanjaju na moć države da nametnu svoj preferirani društveni poredak. Konzervativci koriste državu da održe tradicionalne strukture, dok je socijalisti koriste da stvore nove egalitarne. Ovo ih razlikuje od libertarijanaca, koji se protive društvenom inženjeringu nametnutom od strane države bez obzira na njegov ideološki pravac. Druge opcije pogrešno predstavljaju stvarne pozicije ovih ideologija o vlasništvu, slobodi i vladi.
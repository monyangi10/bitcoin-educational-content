question: Według analizy Gustave'a Molinariego w "Les Soirées de la rue Saint Lazare" (ang. Wieczory na ulicy Świętego Łazarza), jakie fundamentalne podobieństwo istnieje między konserwatystami i socjalistami pomimo ich pozornych różnic ideologicznych?
answer: Oba dążą do narzucenia swojej wizji społeczeństwa poprzez interwencję państwa, mimo że mają różne cele społeczne
wrong_answers:
  - Oba odrzucają indywidualne prawa własności na rzecz własności zbiorowej zarządzanej przez różne instytucje
  - Obaj postrzegają wolność jako zasadę absolutną, która nigdy nie powinna być ograniczana bez względu na konsekwencje społeczne
  - Obaj sprzeciwiają się wszelkim formom regulacji rządowych, jednocześnie wspierając różne rodzaje prywatnych rozwiązań rynkowych
explanation: |
  Kluczowym spostrzeżeniem Molinariego było to, że konserwatyści i socjaliści, pomimo swoich przeciwstawnych wizji społecznych, mają wspólne podejście metodologiczne: obaj polegają na władzy państwowej, aby narzucić preferowany przez siebie porządek społeczny. Konserwatyści wykorzystują państwo do utrzymania tradycyjnych struktur, podczas gdy socjaliści używają go do tworzenia nowych, egalitarnych. To odróżnia ich od libertarian, którzy sprzeciwiają się narzuconej przez państwo inżynierii społecznej niezależnie od jej ideologicznego kierunku. Pozostałe opcje błędnie przedstawiają rzeczywiste stanowiska tych ideologii w kwestii własności, wolności i rządu.
question: ตามการวิเคราะห์ของกุสตาฟ โมลินารีใน 'Les Soirées de la rue Saint Lazare' (แปลเป็นอังกฤษว่า Evenings on Saint Lazarus Street) ความคล้ายคลึงพื้นฐานที่มีอยู่ระหว่างอนุรักษ์นิยมและสังคมนิยมแม้จะมีความแตกต่างทางอุดมการณ์ที่เห็นได้ชัดคืออะไร?
answer: ทั้งสองฝ่ายพยายามที่จะกำหนดวิสัยทัศน์ของสังคมผ่านการแทรกแซงของรัฐ แม้ว่าจะมีวัตถุประสงค์ทางสังคมที่แตกต่างกัน
wrong_answers:
  - ทั้งสองปฏิเสธสิทธิในทรัพย์สินส่วนบุคคลเพื่อสนับสนุนการเป็นเจ้าของร่วมกันที่บริหารจัดการโดยสถาบันต่าง ๆ
  - ทั้งสองมองว่าเสรีภาพเป็นหลักการที่สมบูรณ์ซึ่งไม่ควรถูกจำกัดไม่ว่าจะมีผลกระทบทางสังคมอย่างไรก็ตาม
  - ทั้งคู่คัดค้านการควบคุมโดยรัฐบาลในทุกรูปแบบ ในขณะที่สนับสนุนวิธีแก้ปัญหาตลาดเอกชนในรูปแบบที่แตกต่างกัน
explanation: |
  ข้อมูลเชิงลึกที่สำคัญของ Molinari คือ นักอนุรักษนิยมและสังคมนิยม แม้ว่าจะมีวิสัยทัศน์ทางสังคมที่ตรงข้ามกัน แต่ก็มีวิธีการที่เหมือนกัน: ทั้งสองพึ่งพาอำนาจรัฐในการกำหนดระเบียบสังคมที่พวกเขาต้องการ นักอนุรักษนิยมใช้รัฐเพื่อรักษาโครงสร้างดั้งเดิม ในขณะที่สังคมนิยมใช้รัฐเพื่อสร้างโครงสร้างใหม่ที่เท่าเทียมกัน สิ่งนี้ทำให้พวกเขาแตกต่างจากเสรีนิยมที่ต่อต้านการวิศวกรรมสังคมที่รัฐกำหนดไม่ว่าจะมีทิศทางทางอุดมการณ์อย่างไร ตัวเลือกอื่น ๆ บิดเบือนตำแหน่งที่แท้จริงของอุดมการณ์เหล่านี้เกี่ยวกับทรัพย์สิน เสรีภาพ และรัฐบาล
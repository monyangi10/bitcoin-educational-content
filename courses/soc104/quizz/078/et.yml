question: Gustave Molinari analüüsi "Les Soirées de la rue Saint Lazare" (Õhtud Saint Lazaruse tänaval) kohaselt, milline põhimõtteline sarnasus on konservatiivide ja sotsialistide vahel vaatamata nende näilistele ideoloogilistele erinevustele?
answer: Mõlemad püüavad riigi sekkumise kaudu kehtestada oma nägemust ühiskonnast, kuigi nende sotsiaalsed eesmärgid on erinevad
wrong_answers:
  - Mõlemad lükkavad tagasi individuaalsed omandiõigused erinevate institutsioonide hallatava kollektiivse omandi kasuks
  - Mõlemad peavad vabadust absoluutseks põhimõtteks, mida ei tohiks kunagi piirata, sõltumata sotsiaalsetest tagajärgedest
  - Mõlemad on igasuguse riikliku reguleerimise vastu, toetades samas erinevaid eraturulisi lahendusi
explanation: |
  Molinari peamine arusaam oli, et hoolimata oma vastandlikest sotsiaalsetest visioonidest on konservatiividel ja sotsialistidel ühine metodoloogiline lähenemine: mõlemad tuginevad riigivõimule, et kehtestada oma eelistatud ühiskonnakord. Konservatiivid kasutavad riiki traditsiooniliste struktuuride säilitamiseks, samas kui sotsialistid kasutavad seda uute egalitaarsete struktuuride loomiseks. See eristab neid libertaarlastest, kes on vastu riigi poolt kehtestatud sotsiaalsele insenerlusele, sõltumata selle ideoloogilisest suunast. Teised valikud moonutavad nende ideoloogiate tegelikke seisukohti omandi, vabaduse ja valitsuse suhtes.
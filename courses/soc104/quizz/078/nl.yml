question: Welke fundamentele overeenkomst bestaat er volgens Gustave Molinari's analyse in 'Les Soirées de la rue Saint Lazare' (Eng. Avonden in de Sint Lazarusstraat) tussen conservatieven en socialisten ondanks hun ogenschijnlijke ideologische verschillen?
answer: Beide proberen hun visie op de samenleving op te leggen door middel van staatsinterventie, ondanks hun verschillende sociale doelstellingen
wrong_answers:
  - Beide verwerpen individuele eigendomsrechten ten gunste van collectief eigendom beheerd door verschillende instellingen
  - Beiden zien vrijheid als een absoluut principe dat nooit beperkt mag worden, ongeacht de sociale gevolgen
  - Beiden zijn tegen elke vorm van overheidsregulering en steunen verschillende soorten particuliere marktoplossingen
explanation: |
  Molinari's belangrijkste inzicht was dat conservatieven en socialisten, ondanks hun tegengestelde sociale visies, een gemeenschappelijke methodologische benadering delen: beide vertrouwen op de macht van de staat om hun gewenste sociale orde op te leggen. Conservatieven gebruiken de staat om traditionele structuren in stand te houden, terwijl socialisten de staat gebruiken om nieuwe egalitaire structuren te creëren. Dit onderscheidt hen van libertariërs, die zich verzetten tegen door de staat opgelegde maakbaarheid, ongeacht de ideologische richting. De andere opties geven een verkeerd beeld van de werkelijke standpunten van deze ideologieën over eigendom, vrijheid en overheid.
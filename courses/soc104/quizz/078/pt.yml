question: De acordo com a análise de Gustave Molinari em "Les Soirées de la rue Saint Lazare" (Os Serões da Rua São Lázaro), que semelhança fundamental existe entre conservadores e socialistas, apesar das suas aparentes diferenças ideológicas?
answer: Ambos procuram impor a sua visão da sociedade através da intervenção do Estado, apesar de terem objectivos sociais diferentes
wrong_answers:
  - Ambos rejeitam os direitos de propriedade individuais em favor da propriedade colectiva gerida por diferentes instituições
  - Ambos encaram a liberdade como um princípio absoluto que nunca deve ser limitado, independentemente das consequências sociais
  - Ambos se opõem a qualquer forma de regulamentação governamental e apoiam diferentes tipos de soluções de mercado privado
explanation: |
  A principal conclusão de Molinari foi que os conservadores e os socialistas, apesar das suas visões sociais opostas, partilham uma abordagem metodológica comum: ambos se baseiam no poder do Estado para impor a sua ordem social preferida. Os conservadores utilizam o Estado para manter as estruturas tradicionais, enquanto os socialistas o utilizam para criar novas estruturas igualitárias. Isto distingue-os dos libertários, que se opõem à engenharia social imposta pelo Estado, independentemente da sua direção ideológica. As outras opções deturpam as posições efectivas destas ideologias sobre propriedade, liberdade e governo.
question: Dushingiye ku birimwo, ni kuki igice c’iburyo n’ibubamfu ca kera kidahagije kugira ngo umuntu ashobore gushiramwo Bitcoin?
answer: Kuko Bitcoin irenze amacakubiri asanzwe kandi ikwegera abayishigikiye bava mu mice itandukanye ya politike .
wrong_answers:
  - Kubera ko Bitcoin ishigikiwe gusa n’abantu b’iburyo b’abanyagihugu b’isoko ry’uburenganzira .
  - Kuko Bitcoin ahanini yemerwa n’abanyabubamfu ku bijanye no gushiramwo amafaranga y’abanyagihugu bacitse kw’icumu .
  - Kuko Bitcoin ni ubuhinga butagira aho bugarukira ataco buvuze mu vya politike canke mu vy'ingengabitekerezo .
explanation: |
  Ico canditswe kirasigura ko Bitcoin, nk’ubuhinga bushizwe ahantu hamwe, bukwegera abayishigikiye bava mu mice itandukanye ya politike, harimwo n’abo bompi bo mu buryo . 
  n’abantu b’abanyabumoso, hamwe n’abanyagitugu n’abantu batagira politike. Ubwo butandukanye bw’infashanyo bwerekana ko Bitcoin idashobora guterwa mu . 
  urutonde rwa politike rwa kera, rutandukanye n’izindi nyishu zivuga ko umuntu yokwisunga bimwe bike canke ko ata ho abogamiye.
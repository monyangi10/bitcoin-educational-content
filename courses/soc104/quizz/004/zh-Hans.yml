question: 根据内容，为什么传统的左右划分不足以对 Bitcoin 进行分类？
answer: 因为 Bitcoin 超越了传统分歧，吸引了来自不同政治背景的支持者
wrong_answers:
  - 因为 Bitcoin 只得到右翼自由市场人士的支持
  - 因为 Bitcoin 主要由左翼组织采用，目的是为弱势群体提供金融服务
  - 因为 Bitcoin 是一项中性技术，没有政治或意识形态色彩
explanation: |
  文中解释说，Bitcoin 作为一种去中心化技术，吸引了来自不同政治背景的支持者，包括右翼和左翼人士以及无政府主义者和非政治人士。
  既有右翼和左翼人士，也有无政府主义者和非政治人士。这种支持的多样性表明，Bitcoin 无法被归入传统的政治类别。
  与其他回复不同的是，这些回复显示出对单一政治阵营的有限追随或完全中立。
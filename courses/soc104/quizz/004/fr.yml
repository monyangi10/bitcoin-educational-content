question: Selon le contenu, pourquoi le clivage traditionnel droite-gauche est-il inadéquat pour classifier Bitcoin?
answer: Parce que Bitcoin transcende les clivages traditionnels et attire des partisans de divers horizons politiques
wrong_answers:
  - Parce que Bitcoin est exclusivement soutenu par des personnalités de droite favorables au libre marché
  - "Parce que Bitcoin est principalement adopté par la gauche pour l'inclusion financière des populations défavorisées"
  - "Parce que Bitcoin est une technologie neutre qui n'a aucune dimension politique ou idéologique"
explanation: |
  Le texte explique que Bitcoin, en tant que technologie décentralisée, attire des partisans de divers horizons politiques, incluant à la fois des personnalités de droite et de gauche, ainsi que des anarchistes et des individus apolitiques. Cette diversité de soutiens montre que Bitcoin ne peut être enfermé dans une catégorie politique traditionnelle, contrairement aux autres réponses qui suggèrent une adhésion limitée à un seul camp politique ou une neutralité totale.

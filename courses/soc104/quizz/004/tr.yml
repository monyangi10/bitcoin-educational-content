question: İçeriğe göre, geleneksel sağ-sol ayrımı YDD-0'ı sınıflandırmak için neden yetersizdir?
answer: Çünkü Bitcoin geleneksel ayrımları aşıyor ve farklı siyasi geçmişlerden gelen destekçileri kendine çekiyor
wrong_answers:
  - Çünkü Bitcoin sadece sağcı serbest piyasa şahsiyetleri tarafından desteklenmektedir
  - Bitcoin esas olarak dezavantajlı nüfusun finansal katılımı için sol tarafından benimsendiğinden
  - Çünkü Bitcoin siyasi veya ideolojik boyutu olmayan tarafsız bir teknolojidir
explanation: |
  Metin, merkezi olmayan bir teknoloji olarak Bitcoin'in, hem sağcı hem de solcu partiler de dahil olmak üzere çeşitli siyasi geçmişlerden destekçiler çektiğini açıklıyor
  ve sol kanat şahsiyetlerin yanı sıra anarşistler ve apolitik bireyler. Bu çeşitlilikteki destek, Bitcoin'in şu şekilde sınıflandırılamayacağını göstermektedir
  tek bir siyasi kampa sınırlı bağlılık veya tamamen tarafsızlık öneren diğer yanıtların aksine, geleneksel bir siyasi kategori.
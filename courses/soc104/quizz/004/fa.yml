question: بر اساس محتوا، چرا تقسیم‌بندی سنتی راست-چپ برای طبقه‌بندی Bitcoin ناکافی است؟
answer: زیرا Bitcoin از مرزهای سنتی فراتر می‌رود و حامیانی از پیشینه‌های سیاسی متنوع را جذب می‌کند
wrong_answers:
  - زیرا Bitcoin به‌طور انحصاری توسط شخصیت‌های راست‌گرای بازار آزاد حمایت می‌شود
  - زیرا Bitcoin عمدتاً توسط چپ‌گرایان برای شمول مالی جمعیت‌های محروم پذیرفته شده است.
  - زیرا Bitcoin یک فناوری بی‌طرف است که هیچ بُعد سیاسی یا ایدئولوژیکی ندارد
explanation: |
  متن توضیح می‌دهد که Bitcoin به عنوان یک فناوری غیرمتمرکز، حامیانی از طیف‌های مختلف سیاسی را جذب می‌کند، از جمله شخصیت‌های راست‌گرا و چپ‌گرا، همچنین آنارشیست‌ها و افراد غیرسیاسی. این تنوع حمایت نشان می‌دهد که Bitcoin نمی‌تواند به یک دسته‌بندی سیاسی سنتی محدود شود، برخلاف سایر پاسخ‌ها که پیشنهاد می‌دهند به یک اردوگاه سیاسی خاص محدود یا کاملاً بی‌طرف است.
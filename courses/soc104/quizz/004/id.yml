question: Menurut isinya, mengapa pembagian kanan-kiri tradisional tidak memadai untuk mengklasifikasikan Bitcoin?
answer: Karena Bitcoin melampaui perpecahan tradisional dan menarik pendukung dari berbagai latar belakang politik
wrong_answers:
  - Karena Bitcoin didukung secara eksklusif oleh tokoh-tokoh pasar bebas sayap kanan
  - Karena Bitcoin terutama diadopsi oleh kelompok kiri untuk inklusi keuangan bagi populasi yang kurang beruntung
  - Karena Bitcoin adalah teknologi netral tanpa dimensi politik atau ideologi
explanation: |
  Teks tersebut menjelaskan bahwa Bitcoin, sebagai teknologi terdesentralisasi, menarik pendukung dari berbagai latar belakang politik, termasuk sayap kanan
  kanan dan sayap kiri, serta individu yang anarkis dan apolitis. Keragaman dukungan ini menunjukkan bahwa Bitcoin tidak dapat dikelompokkan ke dalam
  kategori politik tradisional, tidak seperti tanggapan lain yang menunjukkan kepatuhan terbatas pada satu kubu politik atau netralitas total.
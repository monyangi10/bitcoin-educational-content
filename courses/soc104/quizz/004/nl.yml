question: Waarom is, volgens de inhoud, de traditionele scheidslijn tussen rechts en links ontoereikend om Bitcoin te classificeren?
answer: Omdat Bitcoin traditionele scheidslijnen overstijgt en aanhangers met verschillende politieke achtergronden aantrekt
wrong_answers:
  - Omdat Bitcoin uitsluitend wordt gesteund door rechtse vrijemarktpersoonlijkheden
  - Omdat Bitcoin vooral door links wordt gebruikt voor de financiële inclusie van achtergestelde bevolkingsgroepen
  - Omdat Bitcoin een neutrale technologie is zonder politieke of ideologische dimensie
explanation: |
  De tekst legt uit dat Bitcoin, als gedecentraliseerde technologie, aanhangers aantrekt met verschillende politieke achtergronden, waaronder zowel rechtse als linkse persoonlijkheden, maar ook anarchisten en apolitieke individuen
  en linkse persoonlijkheden, maar ook anarchisten en apolitieke individuen. Deze diversiteit aan steun laat zien dat Bitcoin niet in een traditionele politieke categorie kan worden ondergebracht
  een traditionele politieke categorie, in tegenstelling tot andere antwoorden die een beperkte voorkeur voor één politiek kamp of totale neutraliteit suggereren.
question: Theo triết lý tự do, sự khác biệt cơ bản giữa tiền nhà nước và tiền thị trường là gì xét về nguồn gốc và đặc điểm của chúng?
answer: Tiền nhà nước mang tính cưỡng chế và tập trung, dễ dàng tạo ra dẫn đến mất giá trị, trong khi tiền thị trường ra đời một cách tự nguyện và duy trì giá trị lâu dài.
wrong_answers:
  - Tiền nhà nước được kiểm soát dân chủ và ổn định, trong khi tiền thị trường bị thao túng bởi các lợi ích tư nhân và có tính biến động cao.
  - Tiền nhà nước phục vụ phúc lợi công cộng thông qua các cơ chế phân phối lại, trong khi tiền thị trường chỉ mang lại lợi ích cho các nhà đầu tư giàu có và những người tiên phong.
  - Tiền do nhà nước phát hành mang lại sự ổn định kinh tế thông qua sự bảo trợ của chính phủ, trong khi tiền thị trường tạo ra sự bất ổn do thiếu sự hỗ trợ từ các thể chế.
explanation: |
  Văn bản này phân biệt rõ ràng giữa tiền nhà nước (tiền pháp định) như một hệ thống tập trung, mang tính cưỡng chế, dễ tạo ra và có xu hướng mất giá, so với tiền thị trường (như vàng trong lịch sử và Bitcoin hiện nay) xuất hiện một cách tự nguyện, tự phát và giữ được giá trị lâu dài.
  Điều này phản ánh nguyên tắc tự do rộng hơn ủng hộ các hệ thống phi tập trung, tự nguyện hơn là các hệ thống tập trung, áp đặt. Các câu trả lời sai phản ánh những quan niệm sai lầm phổ biến về lợi ích của sự kiểm soát của nhà nước so với các cơ chế thị trường.
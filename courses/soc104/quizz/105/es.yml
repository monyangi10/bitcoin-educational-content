question: Según la filosofía libertaria, ¿cuál es la diferencia fundamental entre el dinero estatal y el dinero de mercado en cuanto a su aparición y características?
answer: El dinero estatal es coercitivo y centralizado, y su fácil creación conlleva una pérdida de valor, mientras que el dinero de mercado surge voluntariamente y mantiene el valor a largo plazo
wrong_answers:
  - El dinero del Estado está controlado democráticamente y es estable, mientras que el dinero del mercado está manipulado por intereses privados y es muy volátil
  - El dinero del Estado está al servicio del bienestar público a través de mecanismos de redistribución, mientras que el dinero del mercado sólo beneficia a los inversores ricos y a los pioneros
  - El dinero del Estado proporciona seguridad económica gracias al respaldo gubernamental, mientras que el dinero del mercado crea incertidumbre por la falta de apoyo institucional
explanation: |
  El texto distingue claramente entre el dinero estatal (fiduciario) como sistema coercitivo y centralizado, fácil de crear y que tiende a perder valor, y el dinero de mercado (como el oro históricamente y el Bitcoin actualmente), que surge de forma voluntaria y espontánea y conserva su valor a largo plazo.
  Esto refleja el principio libertario más amplio que favorece los sistemas voluntarios y descentralizados frente a los impuestos y centralizados. Las respuestas erróneas reflejan ideas equivocadas sobre las ventajas del control estatal frente a los mecanismos de mercado.
question: Jaka jest, według filozofii libertariańskiej, fundamentalna różnica między pieniądzem państwowym a pieniądzem rynkowym pod względem ich powstawania i cech?
answer: Pieniądz państwowy jest przymusowy i scentralizowany, a jego łatwa kreacja prowadzi do utraty wartości, podczas gdy pieniądz rynkowy powstaje dobrowolnie i utrzymuje długoterminową wartość
wrong_answers:
  - Pieniądz państwowy jest demokratycznie kontrolowany i stabilny, podczas gdy pieniądz rynkowy jest manipulowany przez prywatne interesy i wysoce niestabilny
  - Pieniądze państwowe służą dobrobytowi publicznemu poprzez mechanizmy redystrybucji, podczas gdy pieniądze rynkowe przynoszą korzyści tylko bogatym inwestorom i wczesnym nabywcom
  - Pieniądz państwowy zapewnia bezpieczeństwo ekonomiczne dzięki wsparciu rządowemu, podczas gdy pieniądz rynkowy powoduje niepewność z powodu braku wsparcia instytucjonalnego
explanation: |
  Tekst wyraźnie rozróżnia pieniądz państwowy (fiducjarny) jako przymusowy, scentralizowany system, który jest łatwy do stworzenia i ma tendencję do utraty wartości, od pieniądza rynkowego (takiego jak złoto w przeszłości i Bitcoin obecnie), który powstaje dobrowolnie, spontanicznie i zachowuje wartość w dłuższej perspektywie.
  Odzwierciedla to szerszą libertariańską zasadę faworyzującą dobrowolne, zdecentralizowane systemy nad narzuconymi, scentralizowanymi. Błędne odpowiedzi odzwierciedlają powszechne błędne przekonania na temat korzyści płynących z kontroli państwa w porównaniu z mechanizmami rynkowymi.
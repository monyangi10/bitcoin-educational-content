question: Dushingiye kuri filozofiya y’abanyagihugu, ni itandukaniro irihe ry’ishimikiro riri hagati y’amahera ya Leta n’ay’isoko mu bijanye n’ukuntu avuka n’ibiranga?
answer: Amahera ya Leta ni ay’uguhatira kandi ashizwe hamwe n’irema ryoroshe rituma umuntu atakaza agaciro, mu gihe amahera y’isoko asohoka ku bushake kandi akaguma afise agaciro k’igihe kirekire .
wrong_answers:
  - Amahera ya Leta agenzurwa na demokarasi kandi ahagaze neza, mu gihe amahera y’isoko akoreshwa n’inyungu z’abantu ku giti cabo kandi agahinduka cane .
  - Amahera ya Leta afasha abantu bose biciye mu buryo bwo kuyasangira, mu gihe amahera y’isoko afasha gusa abashoramari batunze n’abayafata mbere y’igihe .
  - Amahera ya Leta atanga umutekano mu vy’ubutunzi biciye mu gushigikirwa na Leta, mu gihe amahera y’isoko atera ukudakeka kubera ukubura infashanyo y’inzego .
explanation: |
  Ico canditswe gitandukanya neza amahera ya Leta (fiat) nk’uburyo bwo guhatira, bushizwe hamwe bworoshe kurema kandi bukunda gutakaza agaciro, n’amahera y’isoko (nk’inzahabu mu mateka na Bitcoin ubu) asohoka ku bushake, yihuta, kandi akazigama agaciro igihe kirekire. 
  Ivyo vyerekana ingingo ngenderwako yagutse y’ubwigenge ishigikira uburyo bwo ku bushake, bushizwe ahantu hamwe, kuruta ubutegetsi, bushizwe ahantu hamwe. Inyishu zitari zo zirerekana ivyiyumviro bitari vyo abantu benshi bafise ku bijanye n’ivyiza vyo kugenzura Leta n’uburyo bwo gucungera isoko.
question: Wat is volgens de libertarische filosofie het fundamentele verschil tussen staatsgeld en marktgeld wat betreft hun ontstaan en kenmerken?
answer: Staatsgeld is dwingend en gecentraliseerd met gemakkelijke creatie die leidt tot waardeverlies, terwijl marktgeld vrijwillig ontstaat en de waarde op lange termijn behoudt
wrong_answers:
  - Staatsgeld wordt democratisch gecontroleerd en is stabiel, terwijl marktgeld wordt gemanipuleerd door particuliere belangen en zeer volatiel is
  - Staatsgeld dient het algemeen welzijn via herverdelingsmechanismen, terwijl marktgeld alleen ten goede komt aan rijke investeerders en vroege gebruikers
  - Staatsgeld biedt economische zekerheid door steun van de overheid, terwijl marktgeld onzekerheid creëert door gebrek aan institutionele steun
explanation: |
  De tekst maakt een duidelijk onderscheid tussen staatsgeld (fiatgeld) als een dwingend, gecentraliseerd systeem dat gemakkelijk te creëren is en de neiging heeft waarde te verliezen, versus marktgeld (zoals goud in het verleden en Bitcoin momenteel) dat vrijwillig en spontaan ontstaat en waarde behoudt op de lange termijn.
  Dit weerspiegelt het bredere libertarische principe dat vrijwillige, gedecentraliseerde systemen verkiest boven opgelegde, gecentraliseerde systemen. De foute antwoorden weerspiegelen algemene misvattingen over de voordelen van staatscontrole versus marktmechanismen.
question: De acordo com a filosofia libertária, qual é a diferença fundamental entre a moeda do Estado e a moeda do mercado em termos do seu aparecimento e caraterísticas?
answer: A moeda do Estado é coerciva e centralizada, com uma criação fácil que conduz à perda de valor, enquanto a moeda do mercado surge voluntariamente e mantém o valor a longo prazo
wrong_answers:
  - A moeda do Estado é democraticamente controlada e estável, enquanto a moeda do mercado é manipulada por interesses privados e altamente volátil
  - O dinheiro do Estado serve o bem-estar público através de mecanismos de redistribuição, ao passo que o dinheiro do mercado apenas beneficia os investidores ricos e os primeiros utilizadores
  - A moeda do Estado proporciona segurança económica através do apoio do governo, enquanto a moeda do mercado cria incerteza devido à falta de apoio institucional
explanation: |
  O texto distingue claramente entre dinheiro estatal (fiat) como um sistema coercivo e centralizado que é fácil de criar e tende a perder valor, versus dinheiro de mercado (como o ouro historicamente e o Bitcoin atualmente) que emerge voluntariamente, espontaneamente, e preserva o valor a longo prazo.
  Isto reflecte o princípio libertário mais amplo que favorece os sistemas voluntários e descentralizados em detrimento dos sistemas impostos e centralizados. As respostas erradas reflectem concepções erradas comuns sobre os benefícios do controlo estatal versus mecanismos de mercado.
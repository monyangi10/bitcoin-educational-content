question: بر اساس فلسفه لیبرترین، تفاوت اساسی بین پول دولتی و پول بازار در زمینه ظهور و ویژگی‌های آن‌ها چیست؟
answer: پول دولتی اجباری و متمرکز است و ایجاد آسان آن منجر به از دست رفتن ارزش می‌شود، در حالی که پول بازار به صورت داوطلبانه ظهور می‌کند و ارزش بلندمدت خود را حفظ می‌کند.
wrong_answers:
  - پول دولتی به صورت دموکراتیک کنترل می‌شود و پایدار است، در حالی که پول بازار توسط منافع خصوصی دستکاری شده و بسیار ناپایدار است.
  - پول دولتی از طریق مکانیزم‌های توزیع مجدد به رفاه عمومی خدمت می‌کند، در حالی که پول بازار تنها به نفع سرمایه‌گذاران ثروتمند و پذیرندگان اولیه است.
  - پول دولتی از طریق پشتیبانی دولت امنیت اقتصادی فراهم می‌کند، در حالی که پول بازار به دلیل فقدان حمایت نهادی عدم اطمینان ایجاد می‌کند.
explanation: |
  متن به وضوح بین پول دولتی (فیات) به عنوان یک سیستم اجباری و متمرکز که به راحتی ایجاد می‌شود و تمایل به از دست دادن ارزش دارد، در مقابل پول بازار (مانند طلا به‌طور تاریخی و Bitcoin در حال حاضر) که به‌طور داوطلبانه، خودجوش ظهور می‌کند و ارزش را در بلندمدت حفظ می‌کند، تمایز قائل می‌شود. 
  این بازتاب‌دهنده اصل گسترده‌تر لیبرترین است که سیستم‌های داوطلبانه و غیرمتمرکز را بر سیستم‌های تحمیلی و متمرکز ترجیح می‌دهد. پاسخ‌های نادرست بازتاب‌دهنده تصورات غلط رایج درباره مزایای کنترل دولتی در مقابل مکانیزم‌های بازار هستند.
question: 根據自由主義哲學，國家貨幣和市場貨幣在出現和特徵上有什麼根本的差異？
answer: 國家貨幣具有強制性和集中性，創造容易導致價值損失，而市場貨幣則是自願出現並維持長期價值。
wrong_answers:
  - 國家貨幣由民主控制且穩定，而市場貨幣則由私人利益操控且高度不穩定
  - 國家資金透過再分配機制為公共福利服務，而市場資金只有利於富有的投資者和早期採用者
  - 國家貨幣透過政府支持提供經濟安全，而市場貨幣則因缺乏機構支持而產生不確定性
explanation: |
  文中清楚區分了國家貨幣（法定貨幣）與市場貨幣（如歷史上的黃金和現在的 Bitcoin），前者是強制性、集中式的系統，容易創造且傾向於失去價值，後者則是自願、自發地出現且長期保值。
  這反映了更廣泛的自由主義原則，即傾向於自願、分散的系統，而非強加、集中的系統。錯誤的答案反映了一般人對於國家控制與市場機制優點的錯誤觀念。
question: 根据自由主义哲学，国家货币和市场货币在产生和特征上有什么根本区别？
answer: 国家货币具有强制性和集中性，其创造容易导致价值损失，而市场货币则是自愿产生并保持长期价值的
wrong_answers:
  - 国家货币受民主控制且稳定，而市场货币受私人利益操纵且极不稳定
  - 国家货币通过再分配机制为公共福利服务，而市场货币只惠及富有的投资者和早期采用者
  - 国家货币通过政府支持提供经济保障，而市场货币则因缺乏机构支持而产生不确定性
explanation: |
  文中明确区分了国家（法定）货币与市场货币（如历史上的黄金和当前的 Bitcoin），前者是一种强制性的中央集权体系，易于创造且往往会失去价值，而后者则是自愿、自发产生且能长期保持价值。
  这反映了更广泛的自由主义原则，即赞成自愿的、分散的系统，而不是强加的、集中的系统。错误答案反映了人们对国家控制与市场机制利弊的普遍误解。
question: 根据哈耶克的分析，社会主义经济政策区别于自由主义经济政策的根本方法是什么？
answer: 建构主义--认为国家应通过规划和指导积极建构和塑造社会
wrong_answers:
  - 自发秩序--让市场力量在没有国家干预的情况下自然调节经济活动
  - 再分配主义--主要侧重于财富再分配，同时维持自由市场机制
  - 集体主义--强调财产的集体所有权，同时保留个人的经济决策权
explanation: |
  哈耶克认为，建构主义是一种社会主义方法，在这种方法中，国家积极建构社会，并通过规划和指导赋予社会特定的形式。
  和指导。这与自由主义的自发秩序概念形成鲜明对比，后者认为社会是自然组织起来的。再分配主义和集体主义虽然与社会主义有关，但并没有抓住哈耶克关于社会应如何组织和引导的具体区别。
question: بر اساس تحلیل هایک، چه رویکرد بنیادی سیاست اقتصادی سوسیالیستی را از سیاست اقتصادی لیبرال متمایز می‌کند؟
answer: سازه‌گرایی - اعتقاد به اینکه دولت باید به‌طور فعال جامعه را از طریق برنامه‌ریزی و هدایت بسازد و شکل دهد
wrong_answers:
  - نظم خودجوش - اجازه دادن به نیروهای بازار برای تنظیم طبیعی فعالیت‌های اقتصادی بدون دخالت دولت
  - توزیع‌گرایی - تمرکز عمدتاً بر بازتوزیع ثروت در حالی که مکانیزم‌های بازار آزاد حفظ می‌شوند
  - جمع‌گرایی - تأکید بر مالکیت گروهی اموال در حالی که تصمیم‌گیری اقتصادی فردی حفظ می‌شود
explanation: |
  هایک ساخت‌گرایی را به‌عنوان رویکرد سوسیالیستی شناسایی کرد که در آن دولت به‌طور فعال جامعه را می‌سازد و از طریق برنامه‌ریزی و هدایت به آن شکل خاصی می‌دهد. این در تضاد با مفهوم لیبرالی نظم خودجوش است، جایی که جامعه به‌طور طبیعی خود را سازمان‌دهی می‌کند. بازتوزیع‌گرایی و جمع‌گرایی، در حالی که با سوسیالیسم مرتبط هستند، تمایز خاص هایک درباره چگونگی سازمان‌دهی و هدایت جامعه را به‌طور کامل بیان نمی‌کنند.
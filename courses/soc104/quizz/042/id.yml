question: Menurut analisis Hayek, pendekatan fundamental apa yang membedakan kebijakan ekonomi sosialis dengan kebijakan ekonomi liberal?
answer: Konstruktivisme - keyakinan bahwa negara harus secara aktif membangun dan membentuk masyarakat melalui perencanaan dan pengarahan
wrong_answers:
  - Tatanan spontan - memungkinkan kekuatan pasar untuk secara alami mengatur kegiatan ekonomi tanpa campur tangan negara
  - Redistribusiisme - berfokus terutama pada redistribusi kekayaan dengan tetap mempertahankan mekanisme pasar bebas
  - Kolektivisme - menekankan kepemilikan kelompok atas properti sambil mempertahankan pengambilan keputusan ekonomi individu
explanation: |
  Hayek mengidentifikasi konstruktivisme sebagai pendekatan sosialis di mana negara secara aktif membangun masyarakat dan memberinya bentuk tertentu melalui perencanaan
  dan pengarahan. Hal ini berbeda dengan konsep liberal tentang tatanan spontan, di mana masyarakat mengatur dirinya sendiri secara alami. Redistribusi dan kolektivisme, meskipun terkait dengan sosialisme, tidak menangkap perbedaan spesifik Hayek tentang bagaimana masyarakat harus diatur dan diarahkan.
question: ตามการวิเคราะห์ของเฮเยค แนวทางพื้นฐานอะไรที่ทำให้การเมืองเศรษฐกิจแบบสังคมนิยมแตกต่างจากการเมืองเศรษฐกิจแบบเสรีนิยม?
answer: คอนสตรัคติวิสม์ - ความเชื่อที่ว่ารัฐควรมีบทบาทในการสร้างและกำหนดรูปแบบสังคมอย่างแข็งขันผ่านการวางแผนและการชี้นำ
wrong_answers:
  - ระเบียบที่เกิดขึ้นเอง - การปล่อยให้แรงตลาดควบคุมกิจกรรมทางเศรษฐกิจโดยธรรมชาติโดยไม่มีการแทรกแซงจากรัฐ
  - Redistributionism - มุ่งเน้นที่การกระจายความมั่งคั่งใหม่ในขณะที่ยังคงรักษากลไกตลาดเสรี
  - ลัทธิรวมหมู่ - เน้นการเป็นเจ้าของทรัพย์สินร่วมกันของกลุ่มในขณะที่ยังคงรักษาการตัดสินใจทางเศรษฐกิจของแต่ละบุคคล
explanation: |
  ฮาเย็คระบุว่าคอนสตรัคติวิสม์เป็นแนวทางสังคมนิยมที่รัฐสร้างสังคมอย่างแข็งขันและให้รูปแบบเฉพาะผ่านการวางแผนและการกำกับดูแล ซึ่งตรงข้ามกับแนวคิดเสรีนิยมของระเบียบที่เกิดขึ้นเองตามธรรมชาติ ที่สังคมจัดระเบียบตัวเองตามธรรมชาติ การกระจายใหม่และการรวมกลุ่ม แม้จะเกี่ยวข้องกับสังคมนิยม แต่ก็ไม่สามารถจับความแตกต่างเฉพาะของฮาเย็คเกี่ยวกับวิธีที่สังคมควรถูกจัดระเบียบและกำกับดูแลได้
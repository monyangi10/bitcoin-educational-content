question: 하이에크의 분석에 따르면, 사회주의 경제 정책과 자유주의 경제 정책을 구분하는 근본적인 접근 방식은 무엇입니까?
answer: 구성주의 - 국가가 계획과 방향을 통해 사회를 적극적으로 구성하고 형성해야 한다는 믿음
wrong_answers:
  - 자발적 질서 - 국가의 개입 없이 시장의 힘에 의해 경제 활동이 자연스럽게 규제되도록 허용합니다
  - 재분배주의 - 자유 시장 메커니즘을 유지하면서 주로 부의 재분배에 중점을 둡니다
  - 집단주의 - 개인의 경제적 의사결정을 보존하면서 재산에 대한 집단 소유권을 강조합니다
explanation: |
  하이에크는 구성주의를 국가가 적극적으로 사회를 구성하고 계획과 지시를 통해 구체적인 형태를 부여하는 사회주의적 접근법으로 규정했습니다
  그리고 방향을 제시합니다. 이는 사회가 스스로 자연스럽게 조직되는 자유주의적 개념인 자발적 질서와 대조를 이룹니다. 재분배주의와 집단주의는 사회주의와 관련이 있지만, 사회가 어떻게 조직되고 지시되어야 하는지에 대한 하이에크의 구체적인 구분을 포착하지 못합니다.
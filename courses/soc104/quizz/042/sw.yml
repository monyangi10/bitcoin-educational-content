question: Kulingana na uchambuzi wa Hayek, ni mbinu gani ya msingi inayotofautisha sera ya kiuchumi ya ujamaa na sera ya kiuchumi huria?
answer: Ujenzi - imani kwamba serikali inapaswa kujenga na kuunda jamii kikamilifu kupitia mipango na mwelekeo
wrong_answers:
  - Utaratibu wa hiari - kuruhusu nguvu za soko kudhibiti shughuli za kiuchumi bila kuingilia kati kwa serikali
  - Ugawaji Upya - unaozingatia zaidi ugawaji upya wa utajiri huku ukidumisha mifumo ya soko huria
  - Ujumuishi - kusisitiza umiliki wa mali wa kikundi huku ukihifadhi maamuzi ya kiuchumi ya mtu binafsi
explanation: |
  Hayek alitambua ujenzi kama mbinu ya kijamaa ambapo serikali hujenga jamii kikamilifu na kuipa umbo maalum kupitia mipango na mwelekeo. Hii inapingana na dhana ya kiliberali ya mpangilio wa hiari, ambapo jamii hujipanga kiasili. Ugawaji upya na ujumuiya, ingawa unahusiana na ujamaa, hauonyeshi tofauti maalum ya Hayek kuhusu jinsi jamii inavyopaswa kupangwa na kuongozwa.
question: Dushingiye ku nseguro ya Hayek, ni ubuhe buryo bw’ishimikiro butandukanya politike y’ubutunzi y’abasosiyalisiti n’ubutunzi bw’ubwigenge?
answer: Constructivism - ukwemera ko Leta ikwiye kwubaka no guhingura ikibano biciye mu gutegura no kuyobora .
wrong_answers:
  - Urutonde rwihuta - kwemerera inguvu z'isoko gutunganya ibikorwa vy'ubutunzi ataco Leta yinjiramwo
  - Gusubira gusangira - kwibanda cane cane ku gusubira gusangira ubutunzi mu gihe hagumyeho uburyo bwo gusubira gusangira ubutunzi
  - Ugukorana - gushimika ku butunzi bw'umugwi mu gihe umuntu azigama ingingo z'ubutunzi z'umuntu ku giti ciwe
explanation: |
  Hayek yerekanye ko ubuhinga bwo kwubaka ari uburyo bw’abanyagihugu aho Leta yubaka n’umwete ikibano kandi ikagiha uburyo bumwe bumwe biciye mu gutegura . 
  n’ubuyobozi. Ivyo bitandukanye n’iciyumviro c’ubwigenge c’urutonde rwihuta, aho ikibano citunganije mu buryo busanzwe. Ugusubira gusangira n’ugukorana, naho bifitaniye isano n’ubumwe, ntibifata itandukaniro ryihariye rya Hayek ku bijanye n’ingene ikibano gikwiye gutunganirizwa no kuyoborwa.
question: Prema Hajekovoj analizi, koja osnovna razlika razlikuje socijalističku ekonomsku politiku od liberalne ekonomske politike?
answer: Konstruktivizam - verovanje da država treba aktivno da konstruira i oblikuje društvo kroz planiranje i usmeravanje
wrong_answers:
  - Spontani red - omogućavanje tržišnim silama da prirodno regulišu ekonomsku aktivnost bez intervencije države
  - Redistribucionizam - fokusiranje prvenstveno na preraspodelu bogatstva uz očuvanje mehanizama slobodnog tržišta
  - Kolektivizam - naglašavanje grupnog vlasništva nad imovinom uz očuvanje individualnog ekonomskog odlučivanja
explanation: |
  Hayek je identifikovao konstruktivizam kao socijalistički pristup gde država aktivno konstruira društvo i daje mu specifičan oblik kroz planiranje i usmeravanje. Ovo je u kontrastu sa liberalnim konceptom spontanog poretka, gde se društvo prirodno organizuje samo od sebe. Redistribucionizam i kolektivizam, iako povezani sa socijalizmom, ne obuhvataju Hayekovu specifičnu distinkciju o tome kako društvo treba biti organizovano i usmeravano.
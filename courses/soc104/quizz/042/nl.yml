question: Welke fundamentele benadering onderscheidt volgens Hayeks analyse het socialistische economische beleid van het liberale economische beleid?
answer: Constructivisme - het geloof dat de staat de samenleving actief moet construeren en vormgeven door middel van planning en sturing
wrong_answers:
  - Spontane orde - de marktkrachten de economische activiteit op natuurlijke wijze laten reguleren zonder staatsinterventie
  - Herverdeling - vooral gericht op herverdeling van rijkdom met behoud van vrije marktmechanismen
  - Collectivisme - de nadruk leggen op groepseigendom van eigendommen met behoud van individuele economische besluitvorming
explanation: |
  Hayek identificeerde het constructivisme als de socialistische benadering waarbij de staat de samenleving actief construeert en een specifieke vorm geeft door middel van planning en sturing
  en sturing. Dit staat in contrast met het liberale concept van spontane orde, waarbij de samenleving zichzelf op natuurlijke wijze organiseert. Herverdelingsdenken en collectivisme zijn weliswaar verwant aan het socialisme, maar bevatten niet Hayeks specifieke onderscheid over hoe de maatschappij georganiseerd en gestuurd moet worden.
question: Hayek'in analizine göre, sosyalist ekonomi politikasını liberal ekonomi politikasından ayıran temel yaklaşım hangisidir?
answer: Konstrüktivizm - devletin planlama ve yönlendirme yoluyla toplumu aktif olarak inşa etmesi ve şekillendirmesi gerektiği inancı
wrong_answers:
  - Kendiliğinden düzen - piyasa güçlerinin devlet müdahalesi olmaksızın ekonomik faaliyetleri doğal olarak düzenlemesine izin verilmesi
  - Yeniden dağıtımcılık - serbest piyasa mekanizmalarını korurken öncelikle zenginliğin yeniden dağıtımına odaklanmak
  - Kolektivizm - bireysel ekonomik karar alma mekanizmasını korurken mülkiyetin grup mülkiyetinde olduğunu vurgulamak
explanation: |
  Hayek konstrüktivizmi, devletin aktif olarak toplumu inşa ettiği ve planlama yoluyla ona belirli bir biçim verdiği sosyalist yaklaşım olarak tanımlamıştır
  ve yönlendirme. Bu, toplumun kendi kendini doğal olarak organize ettiği liberal kendiliğinden düzen kavramıyla tezat oluşturmaktadır. Yeniden dağıtımcılık ve kolektivizm, sosyalizmle ilişkili olmakla birlikte, Hayek'in toplumun nasıl örgütlenmesi ve yönlendirilmesi gerektiğine ilişkin özel ayrımını yakalayamaz.
question: Theo phân tích của Hayek, phương pháp cơ bản nào phân biệt chính sách kinh tế xã hội chủ nghĩa với chính sách kinh tế tự do?
answer: Chủ nghĩa kiến tạo - niềm tin rằng nhà nước nên chủ động xây dựng và định hình xã hội thông qua quy hoạch và định hướng.
wrong_answers:
  - Trật tự tự phát - cho phép các lực lượng thị trường tự điều chỉnh hoạt động kinh tế mà không cần sự can thiệp của nhà nước.
  - Chủ nghĩa phân phối lại - tập trung chủ yếu vào việc phân phối lại của cải trong khi vẫn duy trì các cơ chế thị trường tự do.
  - Chủ nghĩa tập thể - nhấn mạnh quyền sở hữu tài sản theo nhóm trong khi vẫn bảo toàn quyền ra quyết định kinh tế cá nhân.
explanation: |
  Hayek xác định chủ nghĩa kiến tạo là cách tiếp cận xã hội chủ nghĩa trong đó nhà nước chủ động xây dựng xã hội và định hình nó theo một hình thức cụ thể thông qua quy hoạch và định hướng. Điều này trái ngược với khái niệm tự nhiên về trật tự tự phát của chủ nghĩa tự do, nơi xã hội tự tổ chức một cách tự nhiên. Chủ nghĩa phân phối lại và chủ nghĩa tập thể, mặc dù có liên quan đến chủ nghĩa xã hội, nhưng không thể hiện được sự phân biệt cụ thể của Hayek về cách thức xã hội nên được tổ chức và định hướng.
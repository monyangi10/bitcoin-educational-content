question: हेयक के विश्लेषण के अनुसार, कौन सा मौलिक दृष्टिकोण समाजवादी आर्थिक नीति को उदार आर्थिक नीति से अलग करता है?
answer: रचनावाद - यह विश्वास कि राज्य को योजना और निर्देशन के माध्यम से समाज का सक्रिय रूप से निर्माण और आकार देना चाहिए।
wrong_answers:
  - स्वतःस्फूर्त व्यवस्था - राज्य के हस्तक्षेप के बिना बाजार की शक्तियों को आर्थिक गतिविधि को स्वाभाविक रूप से विनियमित करने की अनुमति देना।
  - पुनर्वितरणवाद - मुक्त बाजार तंत्र को बनाए रखते हुए मुख्य रूप से धन के पुनर्वितरण पर ध्यान केंद्रित करना।
  - सामूहिकतावाद - संपत्ति पर सामूहिक स्वामित्व पर जोर देना, साथ ही व्यक्तिगत आर्थिक निर्णय लेने के अधिकार को संरक्षित रखना।
explanation: |
  हेयक ने रचनावाद को समाजवादी दृष्टिकोण के रूप में परिभाषित किया, जिसमें राज्य सक्रिय रूप से समाज का निर्माण करता है और योजना एवं निर्देशन के माध्यम से उसे एक विशिष्ट स्वरूप प्रदान करता है।
  यह सहज व्यवस्था की उदारवादी अवधारणा के विपरीत है, जिसमें समाज स्वाभाविक रूप से संगठित होता है। पुनर्वितरणवाद और सामूहिकतावाद, यद्यपि समाजवाद से संबंधित हैं, फिर भी समाज के संगठन और निर्देशन के संबंध में हेयक के विशिष्ट भेद को स्पष्ट रूप से व्यक्त नहीं करते हैं।
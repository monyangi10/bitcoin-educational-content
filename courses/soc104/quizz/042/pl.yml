question: Zgodnie z analizą Hayeka, jakie fundamentalne podejście odróżnia socjalistyczną politykę gospodarczą od liberalnej polityki gospodarczej?
answer: Konstruktywizm - przekonanie, że państwo powinno aktywnie konstruować i kształtować społeczeństwo poprzez planowanie i kierowanie
wrong_answers:
  - Spontaniczny porządek - pozwalający siłom rynkowym naturalnie regulować działalność gospodarczą bez interwencji państwa
  - Redystrybucjonizm - skupiający się przede wszystkim na redystrybucji bogactwa przy jednoczesnym zachowaniu mechanizmów wolnorynkowych
  - Kolektywizm - podkreślanie grupowej własności własności przy jednoczesnym zachowaniu indywidualnego podejmowania decyzji ekonomicznych
explanation: |
  Hayek określił konstruktywizm jako podejście socjalistyczne, w którym państwo aktywnie konstruuje społeczeństwo i nadaje mu określoną formę poprzez planowanie i kierowanie
  i kierowanie. Kontrastuje to z liberalną koncepcją spontanicznego porządku, gdzie społeczeństwo organizuje się naturalnie. Redystrybucjonizm i kolektywizm, choć związane z socjalizmem, nie oddają specyficznego rozróżnienia Hayeka dotyczącego tego, jak społeczeństwo powinno być zorganizowane i kierowane.
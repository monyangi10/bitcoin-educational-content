question: 根據哈耶克的分析，社會主義經濟政策有別於自由經濟政策的基本方法是什麼？
answer: 建構主義 - 認為國家應透過規劃和指導，積極建構和塑造社會
wrong_answers:
  - 自發秩序 - 讓市場力量自然調節經濟活動，無需國家干預
  - 再分配主義 - 主要著重於財富再分配，同時維持自由市場機制
  - 集體主義 - 強調團體擁有財產，同時保留個人的經濟決策權
explanation: |
  哈耶克認為建構主義是一種社會主義方法，在這種方法中，國家積極建構社會，並透過規劃和指導賦予社會特定的形式。
  和指導。這與自由主義的自發秩序概念形成對比，在自由主義中，社會會自然地組織起來。再分配主義與集體主義雖然與社會主義有關，但卻沒有抓住哈耶克對於社會應該如何組織與指導的具體區別。
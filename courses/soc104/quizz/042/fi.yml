question: Mikä peruslähtökohta Hayekin analyysin mukaan erottaa sosialistisen talouspolitiikan liberaalista talouspolitiikasta?
answer: Konstruktivismi - uskomus, jonka mukaan valtion tulisi aktiivisesti rakentaa ja muokata yhteiskuntaa suunnittelun ja ohjauksen avulla
wrong_answers:
  - Spontaani järjestys - markkinavoimien annetaan säännellä taloudellista toimintaa luonnollisesti ilman valtion puuttumista asiaan
  - Uudelleenjako - keskittyy ensisijaisesti varallisuuden uudelleenjakoon säilyttäen samalla vapaat markkinamekanismit
  - Kollektivismi - korostetaan omaisuuden ryhmäomistajuutta samalla kun säilytetään yksilöllinen taloudellinen päätöksenteko
explanation: |
  Hayek määritteli konstruktivismin sosialistiseksi lähestymistavaksi, jossa valtio aktiivisesti rakentaa yhteiskuntaa ja antaa sille tietyn muodon suunnittelun avulla
  ja ohjauksen avulla. Tämä on vastakohta liberaalille käsitykselle spontaanista järjestyksestä, jossa yhteiskunta järjestäytyy luonnollisesti. Redistribuutio- ja kollektivismi, vaikka ne liittyvätkin sosialismiin, eivät tavoita Hayekin tekemää erityistä eroa siitä, miten yhteiskunta tulisi järjestää ja ohjata.
question: Enligt Hayeks analys, vilket grundläggande synsätt skiljer socialistisk ekonomisk politik från liberal ekonomisk politik?
answer: Konstruktivism - tron på att staten aktivt bör konstruera och forma samhället genom planering och styrning
wrong_answers:
  - Spontan ordning - att låta marknadskrafterna naturligt reglera den ekonomiska aktiviteten utan statlig inblandning
  - Omfördelningspolitik - fokuserar främst på omfördelning av välstånd samtidigt som de fria marknadsmekanismerna upprätthålls
  - Kollektivism - betonar gruppägande av egendom samtidigt som individuellt ekonomiskt beslutsfattande bibehålls
explanation: |
  Hayek identifierade konstruktivism som det socialistiska synsätt där staten aktivt konstruerar samhället och ger det en specifik form genom planering och styrning
  och styrning. Detta står i kontrast till det liberala begreppet spontan ordning, där samhället organiserar sig självt på ett naturligt sätt. Omfördelningspolitik och kollektivism är visserligen relaterade till socialism, men fångar inte Hayeks specifika distinktion om hur samhället bör organiseras och styras.
question: Согласно анализу Хайека, какой фундаментальный подход отличает социалистическую экономическую политику от либеральной экономической политики?
answer: Конструктивизм - убеждение в том, что государство должно активно конструировать и формировать общество посредством планирования и руководства
wrong_answers:
  - Спонтанный порядок - предоставление рыночным силам возможности естественным образом регулировать экономическую деятельность без вмешательства государства
  - Редистрибуционизм - фокусируется в первую очередь на перераспределении богатства при сохранении механизмов свободного рынка
  - Коллективизм - акцент на групповом владении собственностью при сохранении индивидуального принятия экономических решений
explanation: |
  Хайек определил конструктивизм как социалистический подход, при котором государство активно конструирует общество и придает ему определенную форму посредством планирования
  и руководства. Это контрастирует с либеральной концепцией спонтанного порядка, когда общество организуется само собой. Редистрибутивизм и коллективизм, хотя и относятся к социализму, не отражают специфического различия Хайека в том, как общество должно быть организовано и направлено.
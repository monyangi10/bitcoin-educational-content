question: Jaký základní přístup podle Hayekovy analýzy odlišuje socialistickou hospodářskou politiku od liberální hospodářské politiky?
answer: Konstruktivismus - přesvědčení, že stát by měl aktivně konstruovat a utvářet společnost prostřednictvím plánování a řízení
wrong_answers:
  - Spontánní řád - umožnění tržním silám přirozeně regulovat hospodářskou činnost bez zásahů státu
  - Redistribucionismus - zaměřuje se především na přerozdělování bohatství při zachování mechanismů volného trhu
  - Kolektivismus - důraz na skupinové vlastnictví majetku při zachování individuálního ekonomického rozhodování
explanation: |
  Hayek označil konstruktivismus za socialistický přístup, kdy stát aktivně konstruuje společnost a dává jí konkrétní podobu prostřednictvím plánování
  a řízení. To kontrastuje s liberálním pojetím spontánního řádu, kde se společnost organizuje přirozeně. Redistribucionismus a kolektivismus sice se socialismem souvisejí, ale nevystihují Hayekovo specifické rozlišení toho, jak by měla být společnost organizována a řízena.
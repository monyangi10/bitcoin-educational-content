question: Според анализа на Хайек кой основен подход отличава социалистическата икономическа политика от либералната икономическа политика?
answer: Конструктивизъм - убеждението, че държавата трябва активно да конструира и оформя обществото чрез планиране и ръководство
wrong_answers:
  - Спонтанен ред - позволяване на пазарните сили естествено да регулират икономическата дейност без държавна намеса
  - Редистрибутивизъм - фокусира се основно върху преразпределението на богатството, като същевременно запазва механизмите на свободния пазар
  - Колективизъм - набляга на груповата собственост върху имуществото, като същевременно запазва индивидуалното вземане на икономически решения
explanation: |
  Хайек определя конструктивизма като социалистически подход, при който държавата активно конструира обществото и му придава специфична форма чрез планиране
  и ръководство. Това контрастира с либералната концепция за спонтанния ред, при която обществото се организира по естествен начин. Редистрибутивизмът и колективизмът, макар и свързани със социализма, не отразяват специфичното разграничение на Хайек за това как трябва да се организира и направлява обществото.
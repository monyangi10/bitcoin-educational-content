question: Milline põhimõtteline lähenemine eristab Hayeki analüüsi kohaselt sotsialistlikku majanduspoliitikat liberaalsest majanduspoliitikast?
answer: Konstruktivism - uskumus, et riik peaks aktiivselt konstrueerima ja kujundama ühiskonda planeerimise ja suunamise kaudu
wrong_answers:
  - Spontaanne kord - turujõudude loomulikku reguleerimist majandustegevusest ilma riigi sekkumiseta
  - Ümberjaotussüsteem - keskendutakse eelkõige jõukuse ümberjaotamisele, säilitades samal ajal vabaturu mehhanismid
  - Kollektivism - rõhutatakse grupi omandit, säilitades samas individuaalsed majanduslikud otsused
explanation: |
  Hayek määratles konstruktivismi kui sotsialistlikku lähenemist, kus riik aktiivselt konstrueerib ühiskonda ja annab sellele planeerimise kaudu konkreetse kuju
  ja juhtimise kaudu. See vastandub liberaalsele kontseptsioonile spontaansest korrast, kus ühiskond organiseerub iseenesest. Redistributsionism ja kollektivism on küll sotsialismiga seotud, kuid ei taba Hayeki konkreetset eristust selle kohta, kuidas ühiskond peaks olema korraldatud ja juhitud.
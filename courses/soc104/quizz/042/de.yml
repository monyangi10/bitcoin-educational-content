question: Welcher grundlegende Ansatz unterscheidet nach Hayeks Analyse die sozialistische Wirtschaftspolitik von der liberalen Wirtschaftspolitik?
answer: Konstruktivismus - die Überzeugung, dass der Staat die Gesellschaft durch Planung und Lenkung aktiv konstruieren und gestalten sollte
wrong_answers:
  - Spontane Ordnung - die Marktkräfte sollen die Wirtschaftstätigkeit auf natürliche Weise ohne staatliche Eingriffe regeln
  - Umverteilung - Konzentration auf die Umverteilung des Reichtums unter Beibehaltung der Mechanismen des freien Marktes
  - Kollektivismus - Betonung des Gruppenbesitzes von Eigentum unter Beibehaltung individueller wirtschaftlicher Entscheidungen
explanation: |
  Hayek bezeichnete den Konstruktivismus als den sozialistischen Ansatz, bei dem der Staat die Gesellschaft aktiv konstruiert und ihr durch Planung und Lenkung eine bestimmte Form gibt
  und Lenkung. Dies steht im Gegensatz zum liberalen Konzept der spontanen Ordnung, bei der sich die Gesellschaft von selbst organisiert. Umverteilung und Kollektivismus sind zwar mit dem Sozialismus verwandt, erfassen aber nicht Hayeks spezifische Unterscheidung darüber, wie die Gesellschaft organisiert und gelenkt werden sollte.
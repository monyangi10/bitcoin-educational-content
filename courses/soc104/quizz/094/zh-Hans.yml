question: 根据 Satoshi Nakamoto 的基本批评，传统法定货币系统的核心问题是什么？
answer: 它们要求人们过度信任中央集权机构，而这些机构在历史上曾通过货币贬值违背了这种信任
wrong_answers:
  - 它们缺乏足够的技术基础设施，无法高效、安全地处理现代数字交易
  - 它们造成汇率波动过大，使国际商务变得难以预测、成本高昂
  - 它们 generate 过高的交易费使小额支付在经济上对普通用户不可行
explanation: |
  Satoshi Nakamoto明确指出，"传统货币的根本问题在于使其发挥作用所需的所有信任"，"法定货币的历史充满了对信任的破坏"。
  他的批评主要集中在中央银行不贬值货币的基本依赖上，而中央银行却屡屡未能坚持这一点。其他选择虽然可能是对传统系统的合理担忧，但却忽略了中本聪对基于信任的货币系统的核心理念反对，以及他创造无信任替代方案的动机。
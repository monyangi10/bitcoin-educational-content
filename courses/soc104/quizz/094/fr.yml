question: According to Satoshi Nakamoto's fundamental critique, what is the core problem with conventional fiat currency systems?
answer: They require excessive trust in centralized institutions that historically have violated that trust through currency debasement
wrong_answers:
  - They lack sufficient technological infrastructure to handle modern digital transactions efficiently and securely
  - They create too much volatility in exchange rates making international commerce unpredictable and costly
  - They generate excessive transaction fees that make micropayments economically unviable for everyday users
explanation: |
  Satoshi Nakamoto explicitly stated that 'the root problem with conventional currency is all the trust that's required to make it work' and that 'the history of fiat currencies is full of breaches of that trust.' His critique focused on the fundamental reliance on central banks not to debase currency, which they have repeatedly failed to uphold. The other options, while potentially valid concerns about traditional systems, miss Nakamoto's core philosophical objection to trust-based monetary systems and his motivation for creating a trustless alternative.

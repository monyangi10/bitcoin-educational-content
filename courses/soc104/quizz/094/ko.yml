question: Satoshi 나카모토의 근본적인 비판에 따르면, 기존 법정화폐 시스템의 핵심적인 문제는 무엇일까요?
answer: 중앙 집중식 기관에 대한 과도한 신뢰가 필요하며, 역사적으로 화폐 가치 하락을 통해 이러한 신뢰를 위반한 적이 있습니다
wrong_answers:
  - 최신 디지털 거래를 효율적이고 안전하게 처리할 수 있는 충분한 기술 인프라가 부족합니다
  - 환율 변동성이 너무 커서 국제 상거래를 예측하기 어렵고 비용이 많이 듭니다
  - 일반 사용자가 소액 결제를 경제적으로 이용할 수 없게 만드는 과도한 거래 수수료를 generate로 지정합니다
explanation: |
  Satoshi 나카모토는 '기존 화폐의 근본적인 문제는 화폐가 작동하는 데 필요한 모든 신뢰'이며, '법정화폐의 역사는 이러한 신뢰의 위반으로 가득 차 있다'고 명시적으로 언급했습니다
  그의 비판은 중앙은행이 통화의 가치를 떨어뜨리지 않아야 한다는 근본적인 신뢰에 초점을 맞추었지만, 중앙은행은 이를 지키지 못했습니다. 다른 대안들은 기존 시스템에 대한 잠재적인 우려는 타당하지만, 신뢰 기반 통화 시스템에 대한 나카모토의 핵심 철학적 반대와 신뢰 없는 대안을 만들려는 그의 동기를 놓치고 있습니다.
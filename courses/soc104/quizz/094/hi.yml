question: जीडब्ल्यू-0 नाकामोतो की मौलिक आलोचना के अनुसार, पारंपरिक फिएट मुद्रा प्रणालियों की मूल समस्या क्या है?
answer: उन्हें केंद्रीकृत संस्थानों पर अत्यधिक विश्वास की आवश्यकता होती है, जिन्होंने ऐतिहासिक रूप से मुद्रा अवमूल्यन के माध्यम से उस विश्वास का उल्लंघन किया है।
wrong_answers:
  - उनके पास आधुनिक डिजिटल लेनदेन को कुशलतापूर्वक और सुरक्षित रूप से संभालने के लिए पर्याप्त तकनीकी बुनियादी ढांचा नहीं है।
  - वे विनिमय दरों में अत्यधिक अस्थिरता पैदा करते हैं जिससे अंतरराष्ट्रीय व्यापार अप्रत्याशित और महंगा हो जाता है।
  - generate में अत्यधिक लेनदेन शुल्क लगाए गए हैं, जिससे आम उपयोगकर्ताओं के लिए सूक्ष्म भुगतान आर्थिक रूप से अव्यवहार्य हो जाते हैं।
explanation: |
  Satoshi नाकामोतो ने स्पष्ट रूप से कहा था कि 'पारंपरिक मुद्रा की मूल समस्या वह सारा विश्वास है जो इसे कारगर बनाने के लिए आवश्यक है' और 'फिएट मुद्राओं का इतिहास उस विश्वास के उल्लंघन से भरा पड़ा है।'
  उनकी आलोचना केंद्रीय बैंकों द्वारा मुद्रा का अवमूल्यन न करने की मूलभूत निर्भरता पर केंद्रित थी, जिसे निभाने में वे बार-बार विफल रहे हैं। अन्य विकल्प, हालांकि पारंपरिक प्रणालियों के बारे में संभावित रूप से वैध चिंताएं रखते हैं, नाकामोतो की विश्वास-आधारित मौद्रिक प्रणालियों के प्रति मूल दार्शनिक आपत्ति और एक विश्वासहीन विकल्प बनाने के उनके उद्देश्य को समझने में विफल रहते हैं।
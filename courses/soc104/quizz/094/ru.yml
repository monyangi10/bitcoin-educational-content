question: Согласно фундаментальной критике Satoshi Nakamoto, в чем заключается основная проблема традиционных фиатных валютных систем?
answer: Они требуют чрезмерного доверия к централизованным институтам, которые исторически нарушали это доверие путем обесценивания валюты
wrong_answers:
  - Отсутствие достаточной технологической инфраструктуры для эффективной и безопасной обработки современных цифровых транзакций
  - Они создают слишком высокую волатильность обменных курсов, делая международную торговлю непредсказуемой и дорогостоящей
  - Они generate чрезмерные комиссии за транзакции, которые делают микроплатежи экономически нецелесообразными для обычных пользователей
explanation: |
  Satoshi Накамото прямо заявил, что "основная проблема обычной валюты заключается в доверии, которое необходимо для того, чтобы она работала", и что "история фиатных валют полна нарушений этого доверия"
  Его критика сфокусирована на фундаментальной зависимости центральных банков от девальвации валюты, которую они неоднократно не выдерживали. Другие варианты, несмотря на потенциально обоснованные опасения по поводу традиционных систем, не учитывают основное философское возражение Накамото против денежных систем, основанных на доверии, и его мотивацию для создания альтернативы, не требующей доверия.
question: 根據 Satoshi Nakamoto 的基本批判，傳統法定貨幣系統的核心問題是什麼？
answer: 他們需要過度信任中央集权機構，而這些機構在歷史上曾透過貨幣貶值違反了這種信任。
wrong_answers:
  - 他們缺乏足夠的技術基礎設施，無法有效且安全地處理現代的數位交易
  - 它們造成匯率過度波動，使國際貿易變得難以預測且成本高昂。
  - 他們 generate 過高的交易費用使得微支付在經濟上對日常使用者不可行
explanation: |
  Satoshi Nakamoto 明確表示，「傳統貨幣的根本問題在於所有的信任，而信任是讓它運作的必要條件」，而且「法定貨幣的歷史充滿了對這種信任的違背。
  他的批判集中在對中央銀行不貶值貨幣的基本依賴上，而中央銀行卻一再未能堅持這一點。其他選項儘管對傳統系統有潛在的合理疑慮，但卻忽略了中本聪對於以信任為基礎的貨幣系統的核心哲學反對意見，以及他創造無信任替代方案的動機。
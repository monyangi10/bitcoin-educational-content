question: ตามคำวิจารณ์พื้นฐานของ Satoshi Nakamoto ปัญหาหลักของระบบสกุลเงินเฟียตแบบดั้งเดิมคืออะไร?
answer: พวกเขาต้องการความไว้วางใจอย่างมากในสถาบันที่รวมศูนย์ซึ่งในประวัติศาสตร์ได้ละเมิดความไว้วางใจนั้นผ่านการลดค่าเงิน
wrong_answers:
  - พวกเขาขาดโครงสร้างพื้นฐานทางเทคโนโลยีที่เพียงพอในการจัดการธุรกรรมดิจิทัลสมัยใหม่อย่างมีประสิทธิภาพและปลอดภัย
  - พวกเขาสร้างความผันผวนมากเกินไปในอัตราแลกเปลี่ยน ทำให้การค้าระหว่างประเทศไม่สามารถคาดเดาได้และมีค่าใช้จ่ายสูง
  - พวกเขา generate ค่าธรรมเนียมการทำธุรกรรมที่มากเกินไปซึ่งทำให้การชำระเงินขนาดเล็กไม่สามารถทำได้ในเชิงเศรษฐกิจสำหรับผู้ใช้ทั่วไป
explanation: |
  Satoshi นากาโมโตะกล่าวไว้อย่างชัดเจนว่า 'ปัญหารากฐานของสกุลเงินแบบดั้งเดิมคือความไว้วางใจทั้งหมดที่จำเป็นในการทำให้มันทำงานได้' และว่า 'ประวัติศาสตร์ของสกุลเงินเฟียตเต็มไปด้วยการละเมิดความไว้วางใจนั้น' 
  การวิพากษ์วิจารณ์ของเขามุ่งเน้นไปที่การพึ่งพาพื้นฐานในธนาคารกลางที่จะไม่ลดค่าเงิน ซึ่งพวกเขาล้มเหลวซ้ำแล้วซ้ำเล่าในการรักษาไว้ ตัวเลือกอื่น ๆ แม้ว่าจะเป็นข้อกังวลที่อาจถูกต้องเกี่ยวกับระบบดั้งเดิม แต่ก็พลาดการคัดค้านทางปรัชญาหลักของนากาโมโตะต่อระบบการเงินที่อิงตามความไว้วางใจและแรงจูงใจของเขาในการสร้างทางเลือกที่ไม่ต้องพึ่งพาความไว้วางใจ
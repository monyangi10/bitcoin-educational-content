question: Satoshiナカモトの根本的な批判によれば、従来の不換紙幣システムの核心的な問題点は何か？
answer: 中央集権的な機関への過度の信頼が必要であり、その信頼は歴史的に通貨の堕落を通じて侵害されてきた。
wrong_answers:
  - 現代のデジタル取引を効率的かつ安全に処理するための十分な技術インフラがない。
  - 為替レートの変動が激しすぎるため、国際商取引は予測不可能でコストがかかる。
  - generate：マイクロペイメントを経済的に成り立たなくするような過大な取引手数料が、一般ユーザーにとって不利になる。
explanation: |
  Satoshiナカモトは、「従来の通貨の根本的な問題は、通貨を機能させるために必要なすべての信頼にある」と明言し、「不換紙幣の歴史は、その信頼に対する違反でいっぱいだ」と述べた。
  彼の批評は、中央銀行が通貨を堕落させないという基本的な信頼に焦点を当てている。他の選択肢は、伝統的なシステムに対する潜在的に妥当な懸念ではあるが、信頼に基づく通貨システムに対するナカモトの核心的な哲学的異議申し立てと、信頼のない代替手段を生み出した彼の動機を見逃している。
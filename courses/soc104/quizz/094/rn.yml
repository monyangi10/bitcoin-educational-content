question: Dushingiye ku vyo Satoshi Nakamoto yaneguye, ni ikihe kibazo nyamukuru kiri mu mice y’amahera asanzwe?
answer: Bisaba ukwizigira birenze urugero inzego zishingiye ku rwego rwo hejuru mu mateka zahonyanze ukwo kwizigira biciye mu guca bugufi kw’amahera .
wrong_answers:
  - Babura ibikorwa remezo bihagije vy’ubuhinga bwa none kugira ngo bashobore gukora neza kandi ata nkomanzi mu bikorwa vy’ubuhinga bwa none .
  - Bituma haba uguhinduka cane kw’ibiciro vy’amahera bituma ubudandaji mpuzamakungu butamenyekana kandi buzimvye .
  - Ba generate amafaranga y'ugucuruza arenze urugero atuma micropayments zidashobora gukoreshwa mu vy'ubutunzi ku bakoresha buri musi .
explanation: |
  Satoshi Nakamoto yavuze mu buryo butomoye ko 'ingorane nyamukuru y'amahera asanzwe ari ukwizigira kwose gukenewe kugira ngo akore' kandi ko 'amateka y'amahera y'ubuhinga yuzuyemwo ukurenga kuri ukwo kwizigira.' 
  Ivyo yanegura vyari vyibanze ku kwizigira cane amabanki akomeye kugira ngo ntashire hasi amafaranga, ivyo na vyo bikaba vyananiwe gushigikira incuro nyinshi. Ibindi bihitamwo, naho bishobora kuba ari ivy’agaciro ku bijanye n’imirongo y’imigenzo, birabura ivyiyumviro nyamukuru vya filozofiya vya Nakamoto ku bijanye n’imirongo y’amahera ishingiye ku kwizigira be n’intumbero yiwe yo kurema ubundi buryo butagira ukwizigira.
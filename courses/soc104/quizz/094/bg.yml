question: Според фундаменталната критика на Satoshi Nakamoto какъв е основният проблем на конвенционалните фиатни валутни системи?
answer: Те изискват прекомерно доверие в централизирани институции, които в миналото са нарушавали това доверие чрез обезценяване на валутата
wrong_answers:
  - Липса на достатъчна технологична инфраструктура за ефективна и сигурна обработка на съвременните цифрови транзакции
  - Те създават твърде голяма нестабилност на обменните курсове, което прави международната търговия непредсказуема и скъпа
  - Те generate прекомерни такси за транзакции, които правят микроплащанията икономически неизгодни за обикновените потребители
explanation: |
  Satoshi Nakamoto изрично заяви, че "основният проблем на конвенционалната валута е доверието, което се изисква за нейното функциониране" и че "историята на фиатните валути е пълна с нарушения на това доверие"
  Неговата критика се фокусира върху фундаменталното доверие в централните банки да не обезценяват валутата, което те многократно не са спазвали. Другите варианти, макар и потенциално основателни опасения относно традиционните системи, пропускат основното философско възражение на Накамото срещу основаните на доверие парични системи и мотивацията му за създаване на алтернатива без доверие.
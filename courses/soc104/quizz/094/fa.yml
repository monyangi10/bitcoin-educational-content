question: بر اساس نقد بنیادی Satoshi ناکاموتو، مشکل اصلی سیستم‌های ارز فیات متعارف چیست؟
answer: آن‌ها نیازمند اعتماد بیش از حد به نهادهای متمرکزی هستند که به‌طور تاریخی این اعتماد را از طریق کاهش ارزش ارز نقض کرده‌اند.
wrong_answers:
  - آنها فاقد زیرساخت‌های فناوری کافی برای مدیریت کارآمد و امن تراکنش‌های دیجیتال مدرن هستند.
  - آنها نوسانات زیادی در نرخ‌های ارز ایجاد می‌کنند که تجارت بین‌المللی را غیرقابل پیش‌بینی و پرهزینه می‌سازد.
  - آن‌ها generate هزینه‌های تراکنش بیش از حدی دارند که پرداخت‌های خرد را برای کاربران روزمره از نظر اقتصادی غیرقابل اجرا می‌کند.
explanation: |
  Satoshi ناکاموتو به‌طور صریح بیان کرد که «مشکل اصلی با ارزهای متعارف تمام اعتمادی است که برای کارکرد آن‌ها لازم است» و اینکه «تاریخ ارزهای فیات پر از نقض آن اعتماد است.»
  انتقاد او بر وابستگی اساسی به بانک‌های مرکزی برای جلوگیری از کاهش ارزش ارز متمرکز بود، که بارها در انجام آن ناکام بوده‌اند. گزینه‌های دیگر، در حالی که ممکن است نگرانی‌های معتبری درباره سیستم‌های سنتی باشند، از اعتراض فلسفی اصلی ناکاموتو به سیستم‌های پولی مبتنی بر اعتماد و انگیزه او برای ایجاد یک جایگزین بدون اعتماد غافل می‌شوند.
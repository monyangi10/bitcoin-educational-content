question: Wat onderscheidt John Rawls' concept van 'overlappende consensus' van andere benaderingen van politieke overeenstemming?
answer: Burgers met verschillende fundamentele overtuigingen kunnen het eens worden over gedeelde principes van rechtvaardigheid terwijl ze hun verschillende wereldbeelden behouden
wrong_answers:
  - Alle burgers moeten hun persoonlijke overtuigingen opgeven om een verenigde staatsideologie te adopteren voor politieke harmonie
  - Politieke consensus vereist volledige overeenstemming over alle morele en filosofische kwesties voordat er sprake kan zijn van samenwerking
  - Alleen technische experts kunnen rechtvaardige principes bepalen, aangezien gewone burgers de noodzakelijke rationele capaciteit missen
explanation: |
  Rawls' overlappende consensus toont de essentie van de centristische filosofie door te laten zien hoe mensen met onverenigbare religieuze, filosofische of morele doctrines toch kunnen convergeren over gedeelde politieke principes van rechtvaardigheid.
  Iedereen onderschrijft deze principes vanuit zijn eigen perspectief, zonder te eisen dat iemand zijn fundamentele overtuigingen opgeeft. Dit verschilt van totalitaire benaderingen die ideologische uniformiteit vereisen, perfectionistische theorieën die volledige morele overeenstemming vereisen, of technocratische modellen die burgerparticipatie uitsluiten ten gunste van de heerschappij van experts.
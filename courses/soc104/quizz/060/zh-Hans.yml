question: 约翰-罗尔斯的 "重叠共识 "概念与其他政治协议方法有何不同？
answer: 具有不同基本信仰的公民可以就共同的正义原则达成一致，同时保持各自不同的世界观
wrong_answers:
  - 所有公民必须放弃个人信仰，采用统一的国家意识形态，以实现政治和谐
  - 政治共识要求在任何合作之前就所有道德和哲学问题达成完全一致的意见
  - 只有技术专家才能确定公正原则，因为普通公民缺乏必要的理性能力
explanation: |
  罗尔斯的重叠共识展示了中心主义哲学的精髓，说明了在宗教、哲学或道德学说上互不相容的人们如何仍能趋同于共同的正义政治原则。
  每个人都从自己的角度认可这些原则，而不要求任何人放弃自己的基本信仰。这不同于要求意识形态一致的极权主义方法、要求道德完全一致的完美主义理论，也不同于排除公民参与而由专家统治的技术官僚模式。
question: Mikä erottaa John Rawlsin "päällekkäisen konsensuksen" käsitteen muista poliittista yhteisymmärrystä koskevista lähestymistavoista?
answer: Kansalaiset, joilla on erilaiset perususkomukset, voivat sopia yhteisistä oikeudenmukaisuuden periaatteista ja säilyttää samalla erilaiset maailmankuvansa
wrong_answers:
  - Kaikkien kansalaisten on luovuttava henkilökohtaisista vakaumuksistaan ja omaksuttava yhtenäinen valtiollinen ideologia poliittista sopusointua varten
  - Poliittinen yksimielisyys edellyttää täydellistä yhteisymmärrystä kaikista moraalisista ja filosofisista kysymyksistä ennen kuin voidaan tehdä yhteistyötä
  - Vain tekniset asiantuntijat voivat määritellä oikeudenmukaiset periaatteet, koska tavallisilta kansalaisilta puuttuu tarvittava rationaalinen kyky
explanation: |
  Rawlsin päällekkäinen konsensus osoittaa sentristisen filosofian ytimen osoittamalla, miten ihmiset, joilla on keskenään yhteensopimattomia uskonnollisia, filosofisia tai moraalisia oppeja, voivat silti lähentyä yhteisiä poliittisia oikeudenmukaisuusperiaatteita.
  Kukin tukee näitä periaatteita omasta näkökulmastaan, eikä kenenkään tarvitse luopua perususkomuksistaan. Tämä eroaa totalitaarisista lähestymistavoista, jotka vaativat ideologista yhdenmukaisuutta, perfektionistisista teorioista, jotka edellyttävät täydellistä moraalista yhteisymmärrystä, tai teknokraattisista malleista, jotka sulkevat pois kansalaisten osallistumisen asiantuntijoiden hallinnan hyväksi.
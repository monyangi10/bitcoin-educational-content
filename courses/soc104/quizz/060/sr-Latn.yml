question: Šta razlikuje koncept 'preklapajućeg konsenzusa' Džona Rolsa od drugih pristupa političkom dogovoru?
answer: Građani sa različitim fundamentalnim uverenjima mogu se složiti oko zajedničkih principa pravde, a da pritom zadrže svoje posebne poglede na svet.
wrong_answers:
  - Svi građani moraju napustiti svoja lična uverenja kako bi prihvatili jedinstvenu državnu ideologiju za političku harmoniju.
  - Politički konsenzus zahteva potpuni dogovor o svim moralnim i filozofskim pitanjima pre bilo kakve saradnje.
  - Samo tehnički stručnjaci mogu odrediti pravedne principe jer obični građani nemaju potrebnu racionalnu sposobnost
explanation: |
  Rawlsova preklapajuća saglasnost pokazuje suštinu centrističke filozofije pokazujući kako ljudi sa nespojivim religijskim, filozofskim ili moralnim doktrinama i dalje mogu doći do zajedničkih političkih principa pravde. 
  Svaka osoba podržava ove principe iz svoje perspektive, bez potrebe da iko napusti svoja osnovna uverenja. Ovo se razlikuje od totalitarnih pristupa koji zahtevaju ideološko jedinstvo, perfekcionističkih teorija koje zahtevaju potpuni moralni sporazum, ili tehnokratskih modela koji isključuju učešće građana u korist vladavine stručnjaka.
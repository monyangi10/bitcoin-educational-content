question: چه چیزی مفهوم 'اجماع همپوشان' جان رالز را از رویکردهای دیگر به توافق سیاسی متمایز می‌کند؟
answer: شهروندانی با باورهای بنیادی متفاوت می‌توانند بر اصول مشترک عدالت توافق کنند در حالی که دیدگاه‌های متمایز خود را حفظ می‌کنند.
wrong_answers:
  - همه شهروندان باید باورهای شخصی خود را رها کنند تا یک ایدئولوژی واحد دولتی را برای هماهنگی سیاسی بپذیرند.
  - اجماع سیاسی نیازمند توافق کامل بر روی تمامی سوالات اخلاقی و فلسفی قبل از هرگونه همکاری است.
  - تنها کارشناسان فنی می‌توانند اصول درست را تعیین کنند زیرا شهروندان عادی فاقد ظرفیت عقلانی لازم هستند.
explanation: |
  اجماع همپوشان راولز جوهره فلسفه میانه‌رو را نشان می‌دهد، با نشان دادن اینکه چگونه افرادی با دکترین‌های دینی، فلسفی یا اخلاقی ناسازگار می‌توانند همچنان بر اصول سیاسی مشترک عدالت توافق کنند. هر فرد این اصول را از دیدگاه خود تأیید می‌کند، بدون اینکه نیاز باشد کسی از باورهای بنیادی خود دست بکشد. این با رویکردهای توتالیتر که خواستار یکنواختی ایدئولوژیک هستند، نظریه‌های کمال‌گرا که نیاز به توافق کامل اخلاقی دارند، یا مدل‌های تکنوکراتیک که مشارکت شهروندان را به نفع حکومت کارشناسان حذف می‌کنند، متفاوت است.
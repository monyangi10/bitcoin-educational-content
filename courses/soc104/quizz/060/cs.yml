question: Čím se liší koncept "překrývajícího se konsensu" Johna Rawlse od jiných přístupů k politické dohodě?
answer: Občané s různými základními přesvědčeními se mohou shodnout na společných zásadách spravedlnosti a přitom si zachovat odlišné světonázory
wrong_answers:
  - Všichni občané se musí vzdát svého osobního přesvědčení a přijmout jednotnou státní ideologii v zájmu politické harmonie
  - Politický konsensus vyžaduje naprostou shodu ve všech morálních a filozofických otázkách před jakoukoli spoluprací
  - Spravedlivé principy mohou stanovit pouze techničtí odborníci, protože obyčejní občané nemají potřebnou schopnost racionálního uvažování
explanation: |
  Rawlsův překrývající se konsenzus ukazuje podstatu centristické filozofie tím, že ukazuje, jak se lidé s neslučitelnými náboženskými, filozofickými nebo morálními doktrínami mohou přesto shodnout na společných politických principech spravedlnosti.
  Každý člověk tyto principy podporuje ze své vlastní perspektivy, aniž by kdokoli musel opustit své základní přesvědčení. Tím se liší od totalitních přístupů, které vyžadují ideologickou uniformitu, perfekcionistických teorií, které vyžadují naprostou morální shodu, nebo technokratických modelů, které vylučují účast občanů ve prospěch vlády expertů.
question: 존 롤스의 '중첩적 합의' 개념이 정치적 합의에 대한 다른 접근 방식과 구별되는 점은 무엇인가요?
answer: 서로 다른 근본적인 신념을 가진 시민들은 각자의 세계관을 유지하면서 정의의 원칙에 동의할 수 있습니다
wrong_answers:
  - 모든 시민은 정치적 화합을 위해 개인적 신념을 버리고 통일된 국가 이념을 채택해야 합니다
  - 정치적 합의를 위해서는 협력에 앞서 모든 도덕적, 철학적 문제에 대한 완전한 합의가 필요합니다
  - 일반 시민은 필요한 합리적 능력이 부족하기 때문에 기술 전문가만이 정당한 원칙을 결정할 수 있습니다
explanation: |
  롤스의 중첩적 합의는 양립할 수 없는 종교적, 철학적, 도덕적 교리를 가진 사람들이 어떻게 정의라는 공통의 정치적 원칙에 수렴할 수 있는지 보여줌으로써 중도주의 철학의 본질을 보여 줍니다.
  각 사람은 자신의 근본적인 신념을 포기할 필요 없이 각자의 관점에서 이러한 원칙을 지지합니다. 이는 이념적 통일성을 요구하는 전체주의적 접근 방식, 완전한 도덕적 동의를 요구하는 완벽주의적 이론, 전문가의 통치를 위해 시민 참여를 배제하는 기술주의적 모델과는 다릅니다.
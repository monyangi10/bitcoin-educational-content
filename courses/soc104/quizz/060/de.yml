question: Was unterscheidet John Rawls' Konzept des "übergreifenden Konsenses" von anderen Ansätzen der politischen Einigung?
answer: Bürger mit unterschiedlichen Grundüberzeugungen können sich auf gemeinsame Gerechtigkeitsgrundsätze einigen und gleichzeitig ihre unterschiedlichen Weltanschauungen beibehalten
wrong_answers:
  - Alle Bürger müssen ihre persönlichen Überzeugungen aufgeben, um eine einheitliche Staatsideologie für politische Harmonie zu übernehmen
  - Der politische Konsens erfordert eine vollständige Übereinstimmung in allen moralischen und philosophischen Fragen, bevor eine Zusammenarbeit möglich ist
  - Nur technische Experten können gerechte Grundsätze festlegen, da den normalen Bürgern die notwendige rationale Kapazität fehlt
explanation: |
  Rawls' übergreifender Konsens zeigt das Wesen der zentristischen Philosophie, indem er aufzeigt, wie Menschen mit unvereinbaren religiösen, philosophischen oder moralischen Lehren sich dennoch auf gemeinsame politische Grundsätze der Gerechtigkeit einigen können.
  Jeder befürwortet diese Grundsätze aus seiner eigenen Perspektive, ohne dass jemand seine grundlegenden Überzeugungen aufgeben muss. Dies unterscheidet sich von totalitären Ansätzen, die ideologische Einheitlichkeit verlangen, von perfektionistischen Theorien, die völlige moralische Übereinstimmung voraussetzen, oder von technokratischen Modellen, die die Bürgerbeteiligung zugunsten einer Expertenherrschaft ausschließen.
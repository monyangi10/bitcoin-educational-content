question: Ni igiki gitandukanya iciyumviro ca John Rawls c’‘uguhurizako ibintu bimwe bimwe’ n’ubundi buryo bwo guhurizako mu vya politike?
answer: Abanyagihugu bafise imyizere y’ishimikiro itandukanye barashobora kwumvikana ku ngingo ngenderwako z’ubutungane basangiye mu gihe bagumana ukuntu babona isi mu buryo butandukanye .
wrong_answers:
  - Abanyagihugu bose bategerezwa guheba ivyo bemera kugira ngo bafate ingengabitekerezo ya Leta imwe kugira ngo habeho ubumwe mu vya politike .
  - Uguhurizako mu vya politike bisaba ko umuntu yemeranya bimwe bishitse ku bibazo vyose bijanye n’inyifato runtu be n’ubuhinga bwa filozofiya imbere y’uko haba ubufatanye ubwo ari bwo bwose .
  - Abahinga mu vy’ubuhinga ni bo bonyene bashobora gushinga ingingo ngenderwako zibereye kuko abanyagihugu basanzwe badafise ubushobozi bwo gutahura ibintu .
explanation: |
  Ukwemeranya kwa Rawls guhurikiye hamwe kwerekana akamaro ka filozofiya y’abanyapolitike bo hagati mu kwerekana ingene abantu bafise inyigisho zidahuye z’idini, za filozofiya canke z’inyifato runtu bashobora kuguma bahuriza ku ngingo ngenderwako za politike zisangiye z’ubutungane. 
  Umuntu wese ashigikira izo ngingo ngenderwako akurikije ukuntu abona ibintu, ata n’umwe asaba guheba ivyo yemera vy’ishimikiro. Ivyo bitandukanye n’uburyo bw’ubutegetsi bw’agahomerabunwa busaba ko ivyiyumviro bihuye, inyigisho z’abashaka gukora ibintu ata gatotsi zisaba ko umuntu wemeranya mu buryo bushitse mu vy’inyifato runtu, canke uburyo bw’ubuhinga burengeye uruhara rw’abanyagihugu kugira ngo bushigikire ubutegetsi bw’abahinga.
question: जॉन रॉल्स की 'ओवरलैपिंग कंसेंसस' की अवधारणा राजनीतिक समझौते के अन्य दृष्टिकोणों से किस प्रकार भिन्न है?
answer: अलग-अलग मूलभूत मान्यताओं वाले नागरिक अपने विशिष्ट विश्वदृष्टिकोण को बनाए रखते हुए भी न्याय के साझा सिद्धांतों पर सहमत हो सकते हैं।
wrong_answers:
  - राजनीतिक सद्भाव के लिए सभी नागरिकों को अपनी व्यक्तिगत मान्यताओं का त्याग करके एक एकीकृत राज्य विचारधारा को अपनाना होगा।
  - किसी भी सहयोग से पहले राजनीतिक सहमति के लिए सभी नैतिक और दार्शनिक प्रश्नों पर पूर्ण सहमति आवश्यक है।
  - केवल तकनीकी विशेषज्ञ ही उचित सिद्धांतों का निर्धारण कर सकते हैं, क्योंकि आम नागरिकों में आवश्यक तर्कसंगत क्षमता का अभाव होता है।
explanation: |
  रॉल्स का ओवरलैपिंग कंसेंसस मध्यमार्गी दर्शन के सार को दर्शाता है, यह दिखाते हुए कि कैसे असंगत धार्मिक, दार्शनिक या नैतिक मान्यताओं वाले लोग भी न्याय के साझा राजनीतिक सिद्धांतों पर एकमत हो सकते हैं।
  प्रत्येक व्यक्ति इन सिद्धांतों को अपने-अपने दृष्टिकोण से स्वीकार करता है, बिना किसी को अपने मूलभूत विश्वासों को त्यागने के लिए बाध्य किए। यह उन अधिनायकवादी दृष्टिकोणों से भिन्न है जो वैचारिक एकरूपता की मांग करते हैं, उन पूर्णतावादी सिद्धांतों से भिन्न है जो पूर्ण नैतिक सहमति की मांग करते हैं, या उन तकनीकी मॉडलों से भिन्न है जो विशेषज्ञ शासन के पक्ष में नागरिक भागीदारी को नकारते हैं।
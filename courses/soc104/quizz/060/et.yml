question: Mis eristab John Rawlsi "kattuva konsensuse" kontseptsiooni teistest poliitilise kokkuleppe käsitlustest?
answer: Erinevate põhiuskumustega kodanikud saavad kokku leppida ühistes õigluse põhimõtetes, säilitades samal ajal oma erinevad maailmavaated
wrong_answers:
  - Kõik kodanikud peavad loobuma oma isiklikest tõekspidamistest, et võtta vastu ühtne riiklik ideoloogia poliitilise harmoonia saavutamiseks
  - Poliitiline konsensus eeldab täielikku kokkulepet kõigis moraalsetes ja filosoofilistes küsimustes enne igasugust koostööd
  - Ainult tehnilised eksperdid saavad määrata õiglasi põhimõtteid, kuna tavakodanikel puudub vajalik ratsionaalne võimekus
explanation: |
  Rawlsi kattuv konsensus näitab tsentristliku filosoofia olemust, näidates, kuidas inimesed, kelle religioossed, filosoofilised või moraalsed doktriinid ei sobi omavahel kokku, saavad siiski jõuda ühiste poliitiliste õigluspõhimõtete juurde.
  Iga inimene toetab neid põhimõtteid oma vaatenurgast, ilma et keegi peaks loobuma oma põhilistest tõekspidamistest. See erineb totalitaarsetest lähenemisviisidest, mis nõuavad ideoloogilist ühtsust, perfektsionistlikest teooriatest, mis nõuavad täielikku moraalset kokkulepet, või tehnokraatlikest mudelitest, mis välistavad kodanike osaluse ekspertide valitsemise kasuks.
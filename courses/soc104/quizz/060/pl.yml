question: Co odróżnia koncepcję "nakładającego się konsensusu" Johna Rawlsa od innych podejść do porozumienia politycznego?
answer: Obywatele o różnych fundamentalnych przekonaniach mogą zgodzić się na wspólne zasady sprawiedliwości, zachowując jednocześnie swoje odrębne światopoglądy
wrong_answers:
  - Wszyscy obywatele muszą porzucić swoje osobiste przekonania, aby przyjąć jednolitą ideologię państwową dla politycznej harmonii
  - Konsensus polityczny wymaga pełnej zgody we wszystkich kwestiach moralnych i filozoficznych przed podjęciem jakiejkolwiek współpracy
  - Tylko eksperci techniczni mogą określić sprawiedliwe zasady, ponieważ zwykli obywatele nie posiadają niezbędnej zdolności rozumowania
explanation: |
  Nakładający się konsensus Rawlsa demonstruje istotę filozofii centrystycznej, pokazując, w jaki sposób ludzie o niezgodnych doktrynach religijnych, filozoficznych lub moralnych mogą nadal zbiegać się we wspólnych politycznych zasadach sprawiedliwości.
  Każda osoba popiera te zasady z własnej perspektywy, nie wymagając od nikogo porzucenia swoich fundamentalnych przekonań. Różni się to od podejść totalitarnych, które wymagają ideologicznej jednolitości, teorii perfekcjonistycznych, które wymagają pełnej zgody moralnej, lub modeli technokratycznych, które wykluczają udział obywateli na rzecz rządów ekspertów.
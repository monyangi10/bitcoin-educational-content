question: ジョン・ロールズの「オーバーラップ・コンセンサス」という概念は、政治的合意に対する他のアプローチと何が違うのか？
answer: 異なる基本的信条を持つ市民が、それぞれの世界観を維持しながら、正義の原則を共有することに合意することができる。
wrong_answers:
  - すべての国民は、政治的調和のために個人の信条を捨て、統一された国家イデオロギーを採用しなければならない。
  - 政治的なコンセンサスには、協力の前に、すべての道徳的・哲学的な問題についての完全な合意が必要である。
  - 一般市民には必要な理性的能力が欠けているため、公正な原則を決定できるのは専門家だけである。
explanation: |
  ロールズの重なり合うコンセンサスは、相容れない宗教的、哲学的、道徳的教義を持つ人々が、それでも正義の政治的原則を共有することに収斂できることを示すことによって、中道主義哲学の本質を示している。
  各人がそれぞれの立場からこれらの原則を支持するのであり、誰も基本的な信念を捨てる必要はない。これは、イデオロギーの統一を求める全体主義的なアプローチや、道徳的な完全一致を求める完全主義的な理論、あるいは専門家による統治を優先して市民の参加を排除する技術主義的なモデルとは異なる。
question: O que distingue o conceito de "consenso sobreposto" de John Rawls de outras abordagens do acordo político?
answer: Os cidadãos com crenças fundamentais diferentes podem chegar a acordo sobre princípios comuns de justiça, mantendo as suas visões do mundo distintas
wrong_answers:
  - Todos os cidadãos devem abandonar as suas crenças pessoais para adotar uma ideologia de Estado unificada para a harmonia política
  - O consenso político exige um acordo total sobre todas as questões morais e filosóficas antes de qualquer cooperação
  - Só os peritos técnicos podem determinar princípios justos, uma vez que os cidadãos comuns não têm a capacidade racional necessária
explanation: |
  O consenso sobreposto de Rawls demonstra a essência da filosofia centrista ao mostrar como pessoas com doutrinas religiosas, filosóficas ou morais incompatíveis podem ainda assim convergir em princípios políticos de justiça partilhados.
  Cada pessoa subscreve estes princípios a partir da sua própria perspetiva, sem exigir que ninguém abandone as suas crenças fundamentais. Isto difere das abordagens totalitárias que exigem uniformidade ideológica, das teorias perfeccionistas que exigem um acordo moral completo ou dos modelos tecnocráticos que excluem a participação dos cidadãos a favor de um governo de especialistas.
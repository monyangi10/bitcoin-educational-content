question: What distinguishes John Rawls' concept of 'overlapping consensus' from other approaches to political agreement?
answer: Citizens with different fundamental beliefs can agree on shared principles of justice while maintaining their distinct worldviews
wrong_answers:
  - All citizens must abandon their personal beliefs to adopt a unified state ideology for political harmony
  - Political consensus requires complete agreement on all moral and philosophical questions before any cooperation
  - Only technical experts can determine just principles since ordinary citizens lack the necessary rational capacity
explanation: |
  Rawls' overlapping consensus demonstrates the essence of centrist philosophy by showing how people with incompatible religious, philosophical, or moral doctrines can still converge on shared political principles of justice. Each person endorses these principles from their own perspective, without requiring anyone to abandon their fundamental beliefs. This differs from totalitarian approaches that demand ideological uniformity, perfectionist theories that require complete moral agreement, or technocratic models that exclude citizen participation in favor of expert rule.
question: Какво отличава концепцията на Джон Ролс за "припокриващ се консенсус" от други подходи към политическото споразумение?
answer: Гражданите с различни фундаментални убеждения могат да се споразумеят за общи принципи на правосъдието, като същевременно запазят различния си мироглед
wrong_answers:
  - Всички граждани трябва да се откажат от личните си убеждения, за да приемат единна държавна идеология за политическа хармония
  - Политическият консенсус изисква пълно съгласие по всички морални и философски въпроси преди каквото и да било сътрудничество
  - Само технически експерти могат да определят справедливи принципи, тъй като обикновените граждани нямат необходимия рационален капацитет
explanation: |
  Припокриващият се консенсус на Ролс демонстрира същността на центристката философия, като показва как хора с несъвместими религиозни, философски или морални доктрини все пак могат да се обединят около общи политически принципи за справедливост.
  Всеки човек подкрепя тези принципи от собствената си гледна точка, без да изисква от никого да се откаже от фундаменталните си убеждения. Това се различава от тоталитарните подходи, които изискват идеологическо единство, перфекционистките теории, които изискват пълно морално съгласие, или технократските модели, които изключват участието на гражданите в полза на експертното управление.
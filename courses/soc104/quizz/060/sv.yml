question: Vad skiljer John Rawls begrepp "överlappande samförstånd" från andra sätt att se på politisk enighet?
answer: Medborgare med olika grundläggande övertygelser kan enas om gemensamma principer för rättvisa samtidigt som de behåller sina olika världsbilder
wrong_answers:
  - Alla medborgare måste överge sina personliga övertygelser för att anta en enhetlig statsideologi för politisk harmoni
  - Politisk konsensus kräver fullständig enighet i alla moraliska och filosofiska frågor innan något samarbete kan inledas
  - Endast tekniska experter kan fastställa rättvisa principer eftersom vanliga medborgare saknar den nödvändiga rationella förmågan
explanation: |
  Rawls överlappande konsensus visar kärnan i den centristiska filosofin genom att visa hur människor med oförenliga religiösa, filosofiska eller moraliska doktriner ändå kan konvergera mot gemensamma politiska principer för rättvisa.
  Varje person stödjer dessa principer utifrån sitt eget perspektiv, utan att kräva att någon överger sina grundläggande övertygelser. Detta skiljer sig från totalitära förhållningssätt som kräver ideologisk enhetlighet, perfektionistiska teorier som kräver fullständig moralisk enighet eller teknokratiska modeller som utesluter medborgarnas deltagande till förmån för expertstyre.
question: John Rawls 的「重疊共識」概念與其他政治協議方法有何不同？
answer: 具有不同基本信念的公民可以就共同的正義原則達成共識，同時保持各自不同的世界觀
wrong_answers:
  - 所有公民必須放棄個人信仰，採用統一的國家意識形態，以達到政治和諧
  - 政治共識要求在任何合作之前，就所有道德和哲學問題達成完全一致的意見
  - 只有技術專家才能決定公正原則，因為普通公民缺乏必要的理性能力
explanation: |
  羅爾斯的重疊共識展示了中心主義哲學的精髓，它說明了宗教、哲學或道德教條不相容的人們如何仍能在共同的正義政治原則上達成共識。
  每個人都從自己的角度贊同這些原則，而不要求任何人放棄自己的基本信仰。這不同於要求意識形態一致的極權方法、要求道德完全一致的完美主義理論，或是排除公民參與、傾向於專家統治的技術官僚模式。
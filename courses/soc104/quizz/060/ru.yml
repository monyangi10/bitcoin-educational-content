question: Что отличает концепцию "перекрывающегося консенсуса" Джона Ролза от других подходов к политическому согласию?
answer: Граждане с различными фундаментальными убеждениями могут договориться об общих принципах справедливости, сохраняя при этом свое мировоззрение
wrong_answers:
  - Все граждане должны отказаться от своих личных убеждений и принять единую государственную идеологию для достижения политической гармонии
  - Политический консенсус требует полного согласия по всем моральным и философским вопросам до начала сотрудничества
  - Только технические эксперты могут определить справедливые принципы, поскольку обычные граждане не обладают необходимыми рациональными способностями
explanation: |
  Перекрывающийся консенсус Роулза демонстрирует суть центристской философии, показывая, как люди с несовместимыми религиозными, философскими или моральными доктринами могут сходиться на общих политических принципах справедливости.
  Каждый поддерживает эти принципы со своей точки зрения, не требуя ни от кого отказываться от своих фундаментальных убеждений. Это отличается от тоталитарных подходов, требующих идеологического единообразия, перфекционистских теорий, требующих полного морального согласия, или технократических моделей, исключающих участие граждан в управлении в пользу экспертного правления.
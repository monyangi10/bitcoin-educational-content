question: ¿Qué distingue el concepto de "consenso superpuesto" de John Rawls de otros enfoques del acuerdo político?
answer: Ciudadanos con creencias fundamentales diferentes pueden acordar principios de justicia comunes manteniendo sus distintas visiones del mundo
wrong_answers:
  - Todos los ciudadanos deben abandonar sus creencias personales para adoptar una ideología estatal unificada en aras de la armonía política
  - El consenso político requiere un acuerdo total sobre todas las cuestiones morales y filosóficas antes de cualquier cooperación
  - Sólo los expertos técnicos pueden determinar principios justos, ya que los ciudadanos de a pie carecen de la capacidad racional necesaria
explanation: |
  El consenso superpuesto de Rawls demuestra la esencia de la filosofía centrista al mostrar cómo personas con doctrinas religiosas, filosóficas o morales incompatibles pueden, aun así, converger en principios políticos de justicia compartidos.
  Cada persona respalda estos principios desde su propia perspectiva, sin exigir a nadie que abandone sus creencias fundamentales. Esto difiere de los enfoques totalitarios que exigen uniformidad ideológica, de las teorías perfeccionistas que requieren un acuerdo moral completo, o de los modelos tecnocráticos que excluyen la participación ciudadana en favor de un gobierno experto.
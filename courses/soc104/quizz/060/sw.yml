question: Ni nini kinachotofautisha dhana ya John Rawls ya 'makubaliano yanayoingiliana' na mbinu zingine za makubaliano ya kisiasa?
answer: Raia wenye imani tofauti za msingi wanaweza kukubaliana kuhusu kanuni za pamoja za haki huku wakidumisha mitazamo yao tofauti ya ulimwengu
wrong_answers:
  - Raia wote lazima waache imani zao binafsi ili kupitisha itikadi ya taifa moja kwa ajili ya maelewano ya kisiasa
  - Makubaliano ya kisiasa yanahitaji makubaliano kamili kuhusu masuala yote ya kimaadili na kifalsafa kabla ya ushirikiano wowote
  - Wataalamu wa kiufundi pekee ndio wanaweza kubaini kanuni za haki kwa kuwa raia wa kawaida hawana uwezo wa busara unaohitajika
explanation: |
  Makubaliano yanayoingiliana ya Rawls yanaonyesha kiini cha falsafa ya kiserikali kwa kuonyesha jinsi watu wenye mafundisho ya kidini, kifalsafa, au maadili yasiyolingana bado wanavyoweza kuungana katika kanuni za kisiasa za haki zinazoshirikiwa.
  
  Kila mtu anaunga mkono kanuni hizi kwa mtazamo wake mwenyewe, bila kumtaka mtu yeyote kuachana na imani zake za msingi. Hii inatofautiana na mbinu za kidikteta zinazohitaji usawa wa kiitikadi, nadharia za ukamilifu zinazohitaji makubaliano kamili ya maadili, au mifumo ya kiteknolojia inayozuia ushiriki wa raia kwa niaba ya utawala wa kitaalamu.
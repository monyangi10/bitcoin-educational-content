question: Que evolução histórica explica melhor a razão pela qual os adeptos do liberalismo clássico nos Estados Unidos adoptaram o termo "libertário" a partir dos anos 60?
answer: Os liberais americanos tinham adotado o intervencionismo estatal e as políticas do Big Government, contradizendo os princípios liberais clássicos
wrong_answers:
  - Os liberais europeus começaram por utilizar o termo "libertário", o que levou os americanos a adoptarem a mesma terminologia
  - O Partido Republicano proibiu oficialmente a utilização da terminologia "liberal" nos movimentos políticos conservadores
  - Os liberais clássicos queriam distinguir-se dos partidos sociais-democratas europeus que estavam a ganhar influência na América
explanation: |
  O texto explica claramente que os "liberais" americanos tinham evoluído para apoiar uma intervenção estatal alargada através de programas como o New Deal de FDR e a Great Society de LBJ, o que representava uma mudança fundamental em relação aos princípios de laissez-faire do liberalismo clássico. Isto obrigou os verdadeiros liberais clássicos a adoptarem o termo "libertário" para se distinguirem desta evolução estatista. As outras opções estão incorrectas porque a influência europeia, as políticas do Partido Republicano ou os partidos sociais-democratas europeus não são mencionados como factores desta mudança terminológica.
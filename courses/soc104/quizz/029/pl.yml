question: Jakie wydarzenie historyczne najlepiej wyjaśnia, dlaczego zwolennicy klasycznego liberalizmu w Stanach Zjednoczonych przyjęli termin "libertariański" począwszy od lat 60. ubiegłego wieku?
answer: Amerykańscy liberałowie przyjęli interwencjonizm państwowy i politykę wielkiego rządu, zaprzeczając klasycznym liberalnym zasadom
wrong_answers:
  - Europejscy liberałowie jako pierwsi zaczęli używać terminu "libertarianin", co skłoniło Amerykanów do przyjęcia tej samej terminologii
  - Partia Republikańska oficjalnie zakazała używania "liberalnej" terminologii w konserwatywnych ruchach politycznych
  - Klasyczni liberałowie chcieli odróżnić się od europejskich partii socjaldemokratycznych zdobywających wpływy w Ameryce
explanation: |
  Tekst jasno wyjaśnia, że amerykańscy "liberałowie" ewoluowali w kierunku wspierania szeroko zakrojonej interwencji państwa poprzez programy takie jak Nowy Ład FDR i Wielkie Społeczeństwo LBJ, reprezentujące fundamentalne odejście od zasad leseferyzmu klasycznego liberalizmu. Zmusiło to prawdziwych klasycznych liberałów do przyjęcia określenia "libertariański", aby odróżnić się od tej etatystycznej ewolucji. Pozostałe opcje są niepoprawne, ponieważ wpływy europejskie, polityka Partii Republikańskiej lub europejskich partii socjaldemokratycznych nie zostały wymienione jako czynniki tej zmiany terminologicznej.
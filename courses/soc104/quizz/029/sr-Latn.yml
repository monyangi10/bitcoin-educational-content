question: Koji istorijski razvoj najbolje objašnjava zašto su pristalice klasičnog liberalizma u Sjedinjenim Državama počele koristiti termin 'libertarijanac' počevši od 1960-ih?
answer: Američki liberali su prihvatili intervencionizam države i politike Velike Vlade, što je u suprotnosti sa klasičnim liberalnim principima.
wrong_answers:
  - Evropski liberali su prvi počeli koristiti termin 'libertarijanac', što je navelo Amerikance da usvoje istu terminologiju.
  - Republikanska stranka je zvanično zabranila upotrebu 'liberalne' terminologije unutar konzervativnih političkih pokreta.
  - Klasični liberali želeli su da se razlikuju od evropskih socijaldemokratskih partija koje su sticale uticaj u Americi.
explanation: |
  Tekst jasno objašnjava da su američki 'liberali' evoluirali da podrže opsežnu državnu intervenciju kroz programe poput FDR-ovog New Deala i LBJ-ovog Great Society, što predstavlja fundamentalni pomak od principa klasičnog liberalizma laissez-faire. Ovo je primoralo prave klasične liberale da usvoje termin 'libertarijanac' kako bi se razlikovali od ove etatističke evolucije. Druge opcije su netačne jer evropski uticaj, politike Republikanske stranke ili evropske socijaldemokratske partije nisu pomenuti kao faktori u ovoj terminološkoj promeni.
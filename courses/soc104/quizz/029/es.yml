question: ¿Qué acontecimiento histórico explica mejor por qué los partidarios del liberalismo clásico en Estados Unidos adoptaron el término "libertario" a partir de la década de 1960?
answer: Los liberales estadounidenses habían abrazado el intervencionismo estatal y las políticas de Gran Gobierno, contradiciendo los principios liberales clásicos
wrong_answers:
  - Los liberales europeos fueron los primeros en utilizar el término "libertario", lo que llevó a los estadounidenses a adoptar la misma terminología
  - El Partido Republicano prohibió oficialmente el uso de la terminología "liberal" dentro de los movimientos políticos conservadores
  - Los liberales clásicos querían distinguirse de los partidos socialdemócratas europeos que ganaban influencia en América
explanation: |
  El texto explica claramente que los "liberales" estadounidenses habían evolucionado para apoyar una amplia intervención estatal a través de programas como el New Deal de FDR y la Gran Sociedad de LBJ, lo que representaba un alejamiento fundamental de los principios de laissez-faire del liberalismo clásico. Esto obligó a los verdaderos liberales clásicos a adoptar el término "libertario" para distinguirse de esta evolución estatista. Las otras opciones son incorrectas porque la influencia europea, las políticas del Partido Republicano o los partidos socialdemócratas europeos no se mencionan como factores de este cambio terminológico.
question: Ni maendeleo gani ya kihistoria yanayoelezea vyema kwa nini wafuasi wa uliberali wa kitamaduni nchini Marekani walitumia neno 'mliberali' kuanzia miaka ya 1960?
answer: Waliberali wa Marekani walikuwa wamekumbatia uingiliaji kati wa serikali na sera za Serikali Kubwa, zikipingana na kanuni za kiliberali za kitamaduni
wrong_answers:
  - Watetezi wa haki za binaadamu wa Ulaya walianza kutumia neno 'mliberali' kwanza, na kuwafanya Wamarekani kutumia istilahi hiyo hiyo.
  - Chama cha Republican kilipiga marufuku rasmi matumizi ya istilahi za 'uliberali' ndani ya harakati za kisiasa za kihafidhina
  - Waliberali wa kitamaduni walitaka kujitofautisha na vyama vya kidemokrasia vya kijamii vya Ulaya vinavyopata ushawishi Amerika
explanation: |
  Maandishi yanaelezea wazi kwamba 'waliberali' wa Marekani walikuwa wamebadilika ili kuunga mkono uingiliaji kati mkubwa wa serikali kupitia programu kama vile Mpango Mpya wa FDR na Jumuiya Kuu ya LBJ, ikiwakilisha mabadiliko ya msingi kutoka kwa kanuni za uhuru wa kitamaduni. Hii iliwalazimisha waliberali wa kweli wa kitamaduni kupitisha 'waliberali' ili kujitofautisha na mageuzi haya ya takwimu. Chaguzi zingine si sahihi kwa sababu ushawishi wa Ulaya, sera za Chama cha Republican, au vyama vya kidemokrasia vya kijamii vya Ulaya havijatajwa kama sababu katika mabadiliko haya ya istilahi.
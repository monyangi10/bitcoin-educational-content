question: Mikä historiallinen kehitys selittää parhaiten sen, miksi klassisen liberalismin kannattajat Yhdysvalloissa käyttivät termiä "libertarian" 1960-luvulta alkaen?
answer: Amerikkalaiset liberaalit olivat omaksuneet valtion interventionismin ja suuren hallituksen politiikan, mikä oli ristiriidassa klassisten liberaalien periaatteiden kanssa
wrong_answers:
  - Eurooppalaiset liberaalit alkoivat ensin käyttää termiä "libertarian", mikä sai amerikkalaiset omaksumaan saman terminologian
  - Republikaaninen puolue kielsi virallisesti "liberaalin" terminologian käytön konservatiivisissa poliittisissa liikkeissä
  - Klassiset liberaalit halusivat erottautua eurooppalaisista sosialidemokraattisista puolueista, jotka saivat vaikutusvaltaa Amerikassa
explanation: |
  Tekstissä selitetään selvästi, että amerikkalaiset "liberaalit" olivat kehittyneet tukemaan laajaa valtiollista puuttumista FDR:n New Deal -ohjelman ja LBJ:n Great Society -ohjelman kaltaisten ohjelmien avulla, mikä merkitsi perustavanlaatuista siirtymistä pois klassisen liberalismin laissez-faire-periaatteista. Tämä pakotti todelliset klassiset liberaalit käyttämään ilmaisua "libertarian" erottaakseen itsensä tästä valtiojohtoisesta kehityksestä. Muut vaihtoehdot ovat virheellisiä, koska eurooppalaista vaikutusta, republikaanisen puolueen politiikkaa tai eurooppalaisia sosialidemokraattisia puolueita ei mainita tekijöinä tässä terminologisessa muutoksessa.
question: พัฒนาการทางประวัติศาสตร์ใดที่อธิบายได้ดีที่สุดว่าทำไมผู้สนับสนุนลัทธิเสรีนิยมคลาสสิกในสหรัฐอเมริกาจึงนำคำว่า 'ลิเบอร์ทาเรียน' มาใช้ตั้งแต่ทศวรรษ 1960?
answer: กลุ่มเสรีนิยมอเมริกันได้ยอมรับการแทรกแซงของรัฐและนโยบายรัฐบาลขนาดใหญ่ ซึ่งขัดแย้งกับหลักการเสรีนิยมแบบคลาสสิก
wrong_answers:
  - พวกเสรีนิยมชาวยุโรปเริ่มใช้คำว่า 'libertarian' ก่อน ทำให้อเมริกันนำคำศัพท์เดียวกันนี้มาใช้
  - พรรครีพับลิกันได้สั่งห้ามการใช้คำศัพท์ 'เสรีนิยม' อย่างเป็นทางการภายในขบวนการการเมืองอนุรักษ์นิยม
  - นักเสรีนิยมคลาสสิกต้องการแยกตัวเองออกจากพรรคประชาธิปไตยสังคมยุโรปที่กำลังมีอิทธิพลในอเมริกา
explanation: |
  ข้อความอธิบายอย่างชัดเจนว่า 'เสรีนิยม' ของอเมริกาได้พัฒนาไปสู่การสนับสนุนการแทรกแซงของรัฐอย่างกว้างขวางผ่านโครงการต่างๆ เช่น ข้อตกลงใหม่ของ FDR และสังคมที่ยิ่งใหญ่ของ LBJ ซึ่งแสดงถึงการเปลี่ยนแปลงพื้นฐานจากหลักการปล่อยให้เป็นไปของเสรีนิยมคลาสสิก สิ่งนี้บังคับให้เสรีนิยมคลาสสิกที่แท้จริงต้องใช้คำว่า 'ลิเบอร์ทาเรียน' เพื่อแยกตัวเองออกจากวิวัฒนาการของรัฐนิยมนี้ ตัวเลือกอื่นๆ นั้นไม่ถูกต้องเพราะอิทธิพลของยุโรป นโยบายของพรรครีพับลิกัน หรือพรรคสังคมประชาธิปไตยของยุโรปไม่ได้ถูกกล่าวถึงว่าเป็นปัจจัยในการเปลี่ยนแปลงทางคำศัพท์นี้
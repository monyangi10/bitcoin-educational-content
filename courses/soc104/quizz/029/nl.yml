question: Welke historische ontwikkeling verklaart het best waarom aanhangers van het klassiek liberalisme in de Verenigde Staten vanaf de jaren 1960 de term 'libertarisch' gingen gebruiken?
answer: Amerikaanse liberalen hadden het staatsinterventionisme en het Big Government-beleid omarmd, wat in strijd was met de klassieke liberale principes
wrong_answers:
  - Europese liberalen begonnen als eerste de term 'libertarisch' te gebruiken, waardoor Amerikanen dezelfde terminologie overnamen
  - De Republikeinse Partij verbood officieel het gebruik van 'liberale' terminologie binnen conservatieve politieke bewegingen
  - Klassiek-liberalen wilden zich onderscheiden van Europese sociaaldemocratische partijen die invloed kregen in Amerika
explanation: |
  De tekst legt duidelijk uit dat Amerikaanse 'liberalen' zich hadden ontwikkeld tot voorstanders van uitgebreide staatsinterventie door programma's als FDR's New Deal en LBJ's Great Society, wat een fundamentele verschuiving betekende weg van de laissez-faire principes van het klassieke liberalisme. Dit dwong echte klassiek-liberalen om 'libertair' te gaan heten om zich te onderscheiden van deze statistische evolutie. De andere opties zijn onjuist omdat Europese invloed, het beleid van de Republikeinse Partij of Europese sociaaldemocratische partijen niet genoemd worden als factoren in deze terminologische verschuiving.
question: Welche historische Entwicklung erklärt am besten, warum die Anhänger des klassischen Liberalismus in den Vereinigten Staaten ab den 1960er Jahren den Begriff "libertär" verwendeten?
answer: Die amerikanischen Liberalen hatten sich den Staatsinterventionismus und die Politik der großen Regierung zu eigen gemacht, was den klassischen liberalen Grundsätzen widersprach
wrong_answers:
  - Die europäischen Liberalen verwendeten zuerst den Begriff "libertär", was die Amerikaner dazu veranlasste, die gleiche Terminologie zu übernehmen
  - Die Republikanische Partei verbot offiziell die Verwendung der "liberalen" Terminologie innerhalb der konservativen politischen Bewegungen
  - Die klassischen Liberalen wollten sich von den europäischen sozialdemokratischen Parteien unterscheiden, die in Amerika an Einfluss gewannen
explanation: |
  In dem Text wird deutlich erklärt, dass die amerikanischen "Liberalen" durch Programme wie FDRs New Deal und LBJs Great Society zu Befürwortern umfangreicher staatlicher Eingriffe geworden sind, was eine grundlegende Abkehr von den Laissez-faire-Prinzipien des klassischen Liberalismus darstellt. Dies zwang die echten klassischen Liberalen dazu, den Begriff "libertär" anzunehmen, um sich von dieser staatsorientierten Entwicklung abzugrenzen. Die anderen Optionen sind falsch, da der europäische Einfluss, die Politik der Republikanischen Partei oder die europäischen sozialdemokratischen Parteien nicht als Faktoren für diese terminologische Veränderung genannt werden.
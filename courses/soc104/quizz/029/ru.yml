question: Какое историческое событие лучше всего объясняет, почему сторонники классического либерализма в США приняли термин "либертарианец", начиная с 1960-х годов?
answer: Американские либералы приняли политику государственного интервенционизма и "большого правительства", что противоречило классическим либеральным принципам
wrong_answers:
  - Европейские либералы начали использовать термин "либертарианец" первыми, что побудило американцев принять ту же терминологию
  - Республиканская партия официально запретила использование "либеральной" терминологии в консервативных политических движениях
  - Классические либералы хотели отличиться от европейских социал-демократических партий, набирающих влияние в Америке
explanation: |
  В тексте четко объясняется, что американские "либералы" стали поддерживать широкое государственное вмешательство в рамках таких программ, как "Новый курс" Рузвельта и "Великое общество" ЛБДж, что представляет собой фундаментальный сдвиг в сторону от принципов laissez-faire, принятых в классическом либерализме. Это заставило истинных классических либералов принять термин "либертарианец", чтобы отличить себя от этой статистской эволюции. Другие варианты неверны, поскольку европейское влияние, политика Республиканской партии или европейские социал-демократические партии не упоминаются в качестве факторов этого терминологического сдвига.
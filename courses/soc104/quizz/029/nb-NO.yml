question: Hvilken historisk utvikling forklarer best hvorfor tilhengere av klassisk liberalisme i USA tok i bruk begrepet "libertarian" fra 1960-tallet?
answer: Amerikanske liberale hadde omfavnet statsintervensjonisme og Big Government-politikk, i strid med klassiske liberale prinsipper
wrong_answers:
  - Europeiske liberale begynte først å bruke begrepet "libertarian", noe som fikk amerikanerne til å ta i bruk samme terminologi
  - Det republikanske partiet forbød offisielt bruken av "liberal" terminologi innenfor konservative politiske bevegelser
  - De klassiske liberalistene ønsket å skille seg fra de europeiske sosialdemokratiske partiene som fikk innflytelse i Amerika
explanation: |
  Teksten forklarer tydelig at amerikanske "liberale" hadde utviklet seg til å støtte omfattende statlig intervensjon gjennom programmer som FDRs New Deal og LBJs Great Society, noe som representerte et fundamentalt skifte bort fra den klassiske liberalismens laissez-faire-prinsipper. Dette tvang sanne klassiske liberale til å ta i bruk "libertarian" for å skille seg fra denne statlige utviklingen. De andre alternativene er feil fordi europeisk innflytelse, det republikanske partiets politikk eller europeiske sosialdemokratiske partier ikke nevnes som faktorer i dette terminologiske skiftet.
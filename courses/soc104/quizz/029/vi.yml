question: Diễn biến lịch sử nào giải thích rõ nhất lý do tại sao những người ủng hộ chủ nghĩa tự do cổ điển ở Hoa Kỳ lại bắt đầu sử dụng thuật ngữ "người theo chủ nghĩa tự do" từ những năm 1960?
answer: Những người theo chủ nghĩa tự do Mỹ đã chấp nhận chủ nghĩa can thiệp của nhà nước và các chính sách chính phủ lớn, trái ngược với các nguyên tắc tự do cổ điển.
wrong_answers:
  - Những người theo chủ nghĩa tự do ở châu Âu là những người đầu tiên sử dụng thuật ngữ "libertarian" (người theo chủ nghĩa tự do cá nhân), và sau đó người Mỹ cũng áp dụng thuật ngữ tương tự.
  - Đảng Cộng hòa chính thức cấm sử dụng thuật ngữ "tự do" trong các phong trào chính trị bảo thủ.
  - Những người theo chủ nghĩa tự do cổ điển muốn phân biệt mình với các đảng dân chủ xã hội châu Âu đang ngày càng có ảnh hưởng ở Mỹ.
explanation: |
  Văn bản giải thích rõ ràng rằng những người theo chủ nghĩa tự do Mỹ đã phát triển theo hướng ủng hộ sự can thiệp rộng rãi của nhà nước thông qua các chương trình như Chính sách Kinh tế Mới của FDR và Xã hội Vĩ đại của LBJ, thể hiện sự chuyển dịch cơ bản khỏi các nguyên tắc tự do kinh tế của chủ nghĩa tự do cổ điển. Điều này buộc những người theo chủ nghĩa tự do cổ điển chân chính phải sử dụng thuật ngữ "tự do chủ nghĩa" để phân biệt mình với sự phát triển theo hướng ủng hộ nhà nước này. Các lựa chọn khác không chính xác vì ảnh hưởng của châu Âu, các chính sách của Đảng Cộng hòa, hoặc các đảng dân chủ xã hội châu Âu không được đề cập như những yếu tố trong sự thay đổi thuật ngữ này.
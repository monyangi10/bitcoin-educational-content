question: Ni igiki cabaye mu mateka gisobanura neza igituma abashigikiye uburenganzira bwa kera muri Leta Zunze Ubumwe za Amerika bafata ijambo ‘libertarian’ guhera mu myaka ya 1960?
answer: Abanyamerika b’abanyagihugu bari bakiriye ubufasha bwa Leta n’ingingo za Leta Nkuru, bikaba bivuguruza ingingo ngenderwako za kera z’abanyagihugu .
wrong_answers:
  - Abanyaburaya b’abanyagihugu b’abanyagihugu batanguye gukoresha ijambo ‘libertarian’ mbere, ivyo bica bituma Abanyamerika na bo bafata iryo jambo nyene .
  - Ishirahamwe ry'abarepubulikani ryabujije ku mugaragaro gukoresha amajambo 'ubwigenge' mu migwi ya politike y'abanyagihugu
  - Aba liberals ba kera bashaka kwitandukanya n’imigambwe y’i Buraya ya demokarasi y’imibano iriko iraronka ububasha muri Amerika .
explanation: |
  Ico canditswe gisigura neza ko ‘abanyagihugu b’abanyagihugu’ bo muri Amerika bari barateye imbere kugira ngo bashigikire ingene Leta igira ico ikoze cane biciye mu migambi nka New Deal ya FDR na Great Society ya LBJ, ivyo bikaba bigereranya uguhinduka kw’ishimikiro kuva ku ngingo ngenderwako z’uburenganzira bwa kera zo kwidegemvya. Ivyo vyatumye aba liberalisme b’ukuri ba kera bafata ‘libertarien’ kugira ngo bitandukanye n’iyi nzira y’iterambere ry’abanyagihugu. Ayandi mahitamwo ntabwo ari meza kubera ko akosho k’Uburayi, politike y’Ishirahamwe rya Repubulika, canke imigambwe y’Uburaya y’abanyademokarasi y’imibano ntibivugwa ko ari vyo vyatumye haba iyo mpinduka y’amajambo.
question: Perkembangan historis apa yang paling baik menjelaskan mengapa para pendukung liberalisme klasik di Amerika Serikat mengadopsi istilah 'libertarian' mulai tahun 1960-an?
answer: Kaum liberal Amerika telah menganut intervensionisme negara dan kebijakan Pemerintah Besar, yang bertentangan dengan prinsip-prinsip liberal klasik
wrong_answers:
  - Kaum liberal Eropa mulai menggunakan istilah 'libertarian' terlebih dahulu, yang kemudian mendorong orang Amerika untuk mengadopsi terminologi yang sama
  - Partai Republik secara resmi melarang penggunaan terminologi 'liberal' dalam gerakan politik konservatif
  - Kaum liberal klasik ingin membedakan diri mereka dari partai-partai sosial demokrat Eropa yang mendapatkan pengaruh di Amerika
explanation: |
  Teks tersebut dengan jelas menjelaskan bahwa kaum 'liberal' Amerika telah berevolusi untuk mendukung intervensi negara yang luas melalui program-program seperti New Deal dari FDR dan Great Society dari LBJ, yang merepresentasikan pergeseran mendasar dari prinsip-prinsip laissez-faire liberalisme klasik. Hal ini memaksa kaum liberal klasik sejati untuk mengadopsi 'libertarian' untuk membedakan diri mereka dari evolusi negara ini. Pilihan lainnya tidak tepat karena pengaruh Eropa, kebijakan Partai Republik, atau partai-partai sosial demokrat Eropa tidak disebutkan sebagai faktor dalam pergeseran terminologi ini.
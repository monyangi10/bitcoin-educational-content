question: Кое историческо развитие обяснява най-добре защо поддръжниците на класическия либерализъм в САЩ възприемат термина "либертарианец" от 60-те години на миналия век?
answer: Американските либерали бяха възприели държавния интервенционизъм и политиката на голямото правителство, което противоречеше на класическите либерални принципи
wrong_answers:
  - Европейските либерали първи започват да използват термина "либертарианец", което подтиква американците да възприемат същата терминология
  - Републиканската партия официално забрани използването на "либерална" терминология в консервативните политически движения
  - Класическите либерали искаха да се разграничат от европейските социалдемократически партии, които придобиват влияние в Америка
explanation: |
  В текста ясно се обяснява, че американските "либерали" са се развили в подкрепа на широката държавна намеса чрез програми като "Новия курс" на ФДР и "Голямото общество" на ЛБДЖ, което представлява фундаментална промяна от принципите на laissez-faire на класическия либерализъм. Това принуди истинските класически либерали да приемат термина "либертариански", за да се разграничат от тази етатистка еволюция. Другите варианти са неправилни, тъй като европейското влияние, политиката на Републиканската партия или европейските социалдемократически партии не са споменати като фактори за тази терминологична промяна.
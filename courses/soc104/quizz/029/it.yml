question: Quale sviluppo storico spiega meglio perché i sostenitori del liberalismo classico negli Stati Uniti hanno adottato il termine "libertario" a partire dagli anni '60?
answer: I liberali americani avevano abbracciato l'interventismo statale e le politiche del Big Government, contraddicendo i principi liberali classici
wrong_answers:
  - I liberali europei hanno iniziato a usare per primi il termine "libertario", spingendo gli americani ad adottare la stessa terminologia
  - Il Partito Repubblicano ha ufficialmente vietato l'uso della terminologia "liberale" all'interno dei movimenti politici conservatori
  - I liberali classici volevano distinguersi dai partiti socialdemocratici europei che stavano guadagnando influenza in America
explanation: |
  Il testo spiega chiaramente che i "liberali" americani si sono evoluti per sostenere un ampio intervento statale attraverso programmi come il New Deal di FDR e la Great Society di LBJ, che rappresentano un allontanamento fondamentale dai principi del laissez-faire del liberalismo classico. Ciò ha costretto i veri liberali classici ad adottare il termine "libertario" per distinguersi da questa evoluzione statalista. Le altre opzioni non sono corrette perché l'influenza europea, le politiche del Partito Repubblicano o i partiti socialdemocratici europei non sono menzionati come fattori di questo cambiamento terminologico.
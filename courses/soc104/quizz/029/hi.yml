question: कौन सा ऐतिहासिक घटनाक्रम सबसे अच्छी तरह से यह समझाता है कि संयुक्त राज्य अमेरिका में शास्त्रीय उदारवाद के समर्थकों ने 1960 के दशक से 'स्वतंत्रतावादी' शब्द को क्यों अपनाया?
answer: अमेरिकी उदारवादियों ने राज्य के हस्तक्षेपवाद और बड़ी सरकारी नीतियों को अपना लिया था, जो शास्त्रीय उदारवादी सिद्धांतों के विपरीत था।
wrong_answers:
  - यूरोपीय उदारवादियों ने सबसे पहले 'स्वतंत्रतावादी' शब्द का प्रयोग शुरू किया, जिससे प्रेरित होकर अमेरिकियों ने भी इसी शब्दावली को अपनाया।
  - रिपब्लिकन पार्टी ने आधिकारिक तौर पर रूढ़िवादी राजनीतिक आंदोलनों के भीतर 'उदारवादी' शब्दावली के उपयोग पर प्रतिबंध लगा दिया है।
  - शास्त्रीय उदारवादी स्वयं को अमेरिका में प्रभाव प्राप्त कर रही यूरोपीय सामाजिक लोकतांत्रिक पार्टियों से अलग दिखाना चाहते थे।
explanation: |
  इस लेख में स्पष्ट रूप से बताया गया है कि अमेरिकी 'उदारवादियों' का दृष्टिकोण एफडीआर के न्यू डील और एलबीजे के ग्रेट सोसाइटी जैसे कार्यक्रमों के माध्यम से व्यापक राज्य हस्तक्षेप का समर्थन करने की ओर विकसित हुआ, जो शास्त्रीय उदारवाद के मुक्त बाज़ार सिद्धांतों से एक मौलिक बदलाव को दर्शाता है। इसने सच्चे शास्त्रीय उदारवादियों को इस राज्यवादी विकास से खुद को अलग करने के लिए 'स्वतंत्रतावादी' शब्द अपनाने के लिए मजबूर किया। अन्य विकल्प गलत हैं क्योंकि इस शब्दावलीगत बदलाव में यूरोपीय प्रभाव, रिपब्लिकन पार्टी की नीतियों या यूरोपीय सामाजिक लोकतांत्रिक दलों का उल्लेख नहीं किया गया है।
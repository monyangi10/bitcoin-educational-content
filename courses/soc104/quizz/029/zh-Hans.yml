question: 什么历史发展最能解释为什么美国古典自由主义的支持者从 20 世纪 60 年代开始使用 "自由主义者 "一词？
answer: 美国自由主义者奉行国家干预主义和大政府政策，违背了古典自由主义原则
wrong_answers:
  - 欧洲自由主义者首先开始使用 "自由主义者 "一词，促使美国人也采用了同样的术语
  - 共和党正式禁止在保守派政治运动中使用 "自由派 "术语
  - 古典自由主义者希望将自己与在美国获得影响力的欧洲社会民主党区别开来
explanation: |
  文中清楚地说明，美国的 "自由主义者 "通过罗斯福的 "新政 "和雷蒙德-J 的 "伟大社会 "等计划，支持广泛的国家干预，从根本上背离了古典自由主义的自由放任原则。这迫使真正的古典自由主义者采用 "自由主义"，以区别于这种国家主义的演变。其他选项都不正确，因为没有提到欧洲的影响、共和党的政策或欧洲社会民主党是导致这一术语转变的因素。
question: 什麼歷史發展最能解釋為什麼美國古典自由主義的支持者從 1960 年代開始採用「自由主義者」一詞？
answer: 美國自由主義者奉行國家干預主義和大政府政策，與古典自由主義原則背道而馳。
wrong_answers:
  - 歐洲的自由主義者首先開始使用「自由主義者」一詞，促使美國人採用相同的術語
  - 共和黨正式禁止在保守派政治運動中使用「自由派」術語
  - 古典自由主義者希望將自己與在美國獲得影響力的歐洲社會民主黨派區別開來
explanation: |
  文中清楚地解釋了美國的「自由主義者」已經發展成支持廣泛的國家干預計畫，例如 FDR 的「新政」(New Deal) 和 LBJ 的「偉大社會」(Great Society)，代表著從根本上遠離古典自由主義的自由放任原則。這迫使真正的古典自由主義者採用「自由主義」來區別於這種國家主義的演變。其他的選項是不正確的，因為歐洲的影響、共和黨的政策或歐洲的社會民主黨都沒有被提及為這個術語轉變的因素。
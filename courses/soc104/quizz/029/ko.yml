question: 미국의 고전적 자유주의 지지자들이 1960년대부터 '자유주의자'라는 용어를 채택한 이유를 가장 잘 설명할 수 있는 역사적 발전은 무엇인가요?
answer: 미국의 자유주의자들은 국가 개입주의와 큰 정부 정책을 수용하여 고전적 자유주의 원칙과 모순되었습니다
wrong_answers:
  - 유럽의 자유주의자들이 먼저 '자유주의자'라는 용어를 사용하기 시작했고, 미국인들도 같은 용어를 채택하게 되었습니다
  - 공화당은 보수 정치 운동 내에서 '진보적' 용어 사용을 공식적으로 금지했습니다
  - 고전적 자유주의자들은 미국에서 영향력을 얻고 있는 유럽 사회민주주의 정당과 차별화되기를 원했습니다
explanation: |
  이 텍스트는 미국의 '자유주의자'가 FDR의 뉴딜 정책과 LBJ의 위대한 사회와 같은 프로그램을 통해 광범위한 국가 개입을 지지하도록 진화했으며, 이는 고전적 자유주의의 자유방임 원칙에서 근본적인 변화를 의미한다고 명확하게 설명합니다. 이로 인해 진정한 고전적 자유주의자들은 이러한 통계학적 진화로부터 자신을 구별하기 위해 '자유주의자'를 채택해야 했습니다. 유럽의 영향력, 공화당 정책 또는 유럽의 사회민주주의 정당은 이 용어 변화의 요인으로 언급되지 않았기 때문에 다른 옵션은 올바르지 않습니다.
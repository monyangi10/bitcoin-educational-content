question: Jaký historický vývoj nejlépe vysvětluje, proč stoupenci klasického liberalismu ve Spojených státech od 60. let 20. století přijali termín "libertarián"?
answer: Američtí liberálové přijali státní intervencionismus a politiku velké vlády, což bylo v rozporu s klasickými liberálními zásadami
wrong_answers:
  - Evropští liberálové začali používat termín "libertarián" jako první, což podnítilo Američany k převzetí stejné terminologie
  - Republikánská strana oficiálně zakázala používání "liberální" terminologie v rámci konzervativních politických hnutí
  - Klasičtí liberálové se chtěli odlišit od evropských sociálně demokratických stran, které získávají vliv v Americe
explanation: |
  Text jasně vysvětluje, že američtí "liberálové" začali podporovat rozsáhlé státní zásahy prostřednictvím programů, jako byl FDR New Deal a LBJ Great Society, což představuje zásadní odklon od principů laissez-faire klasického liberalismu. To přinutilo skutečné klasické liberály přijmout označení "libertariánský", aby se odlišili od tohoto etatistického vývoje. Ostatní možnosti jsou nesprávné, protože evropský vliv, politika Republikánské strany ani evropské sociálnědemokratické strany nejsou zmíněny jako faktory tohoto terminologického posunu.
question: 米国で古典的自由主義の支持者が1960年代から「リバタリアン」という言葉を採用した理由を最もよく説明できる歴史的展開は？
answer: アメリカのリベラル派は、古典的なリベラルの原則に反して、国家介入主義や大きな政府政策を受け入れていた。
wrong_answers:
  - ヨーロッパのリベラル派が最初に「リバタリアン」という用語を使い始めたので、アメリカ人も同じ用語を使うようになった。
  - 共和党は、保守的な政治運動において「リベラル」用語を使用することを公式に禁止した。
  - 古典派リベラルは、アメリカで影響力を持つようになったヨーロッパの社会民主主義政党とは一線を画したかった。
explanation: |
  この文章は、アメリカの「リベラル」が、FDRのニューディールやLBJのグレート・ソサエティのようなプログラムを通じて、国家による広範な介入を支持するように進化し、古典的リベラリズムの自由放任主義から根本的に転換したことを明確に説明している。このため、真の古典的リベラルは、この国家主義的進化から自らを区別するために「リバタリアン」を採用せざるを得なくなった。欧州の影響、共和党の政策、欧州の社会民主主義政党がこの用語の転換の要因として言及されていないため、他の選択肢は不正解である。
question: Vilken historisk utveckling förklarar bäst varför anhängare av klassisk liberalism i USA började använda termen "libertarian" från och med 1960-talet?
answer: Amerikanska liberaler hade anammat statlig interventionism och Big Government-politik, vilket stred mot klassiska liberala principer
wrong_answers:
  - Europeiska liberaler började använda termen "libertarian" först, vilket ledde till att amerikanerna antog samma terminologi
  - Det republikanska partiet förbjöd officiellt användningen av "liberal" terminologi inom konservativa politiska rörelser
  - Klassiska liberaler ville skilja sig från europeiska socialdemokratiska partier som fick inflytande i Amerika
explanation: |
  Texten förklarar tydligt att amerikanska "liberaler" hade utvecklats till att stödja omfattande statliga ingripanden genom program som FDR:s New Deal och LBJ:s Great Society, vilket innebar en grundläggande förändring bort från den klassiska liberalismens laissez-faire-principer. Detta tvingade sanna klassiska liberaler att anta "libertarian" för att skilja sig från denna statstrogna utveckling. De andra alternativen är felaktiga eftersom europeiskt inflytande, republikanska partiets politik eller europeiska socialdemokratiska partier inte nämns som faktorer i denna terminologiska förändring.
question: چه تحول تاریخی به بهترین شکل توضیح می‌دهد که چرا حامیان لیبرالیسم کلاسیک در ایالات متحده از دهه ۱۹۶۰ به بعد اصطلاح 'لیبرتارین' را پذیرفتند؟
answer: لیبرال‌های آمریکایی مداخله‌گرایی دولتی و سیاست‌های دولت بزرگ را پذیرفته بودند که با اصول لیبرالیسم کلاسیک در تضاد بود.
wrong_answers:
  - لیبرال‌های اروپایی ابتدا از اصطلاح 'لیبرتارین' استفاده کردند و آمریکایی‌ها را واداشتند تا از همان اصطلاح استفاده کنند.
  - حزب جمهوری‌خواه به طور رسمی استفاده از اصطلاحات 'لیبرال' را در جنبش‌های سیاسی محافظه‌کار ممنوع کرد.
  - لیبرال‌های کلاسیک می‌خواستند خود را از احزاب سوسیال دموکرات اروپایی که در آمریکا نفوذ پیدا می‌کردند، متمایز کنند.
explanation: |
  متن به وضوح توضیح می‌دهد که 'لیبرال‌های' آمریکایی به حمایت از مداخله گسترده دولت از طریق برنامه‌هایی مانند نیو دیل اف‌دی‌آر و جامعه بزرگ ال‌بی‌جی تکامل یافته‌اند، که نشان‌دهنده یک تغییر اساسی از اصول لسه‌فر لیبرالیسم کلاسیک است. این امر لیبرال‌های کلاسیک واقعی را مجبور کرد تا برای تمایز خود از این تکامل دولتی، اصطلاح 'لیبرتارین' را اتخاذ کنند. گزینه‌های دیگر نادرست هستند زیرا تأثیر اروپایی، سیاست‌های حزب جمهوری‌خواه، یا احزاب سوسیال دموکرات اروپایی به عنوان عواملی در این تغییر اصطلاحی ذکر نشده‌اند.
question: What historical development best explains why supporters of classical liberalism in the United States adopted the term 'libertarian' starting in the 1960s?
answer: American liberals had embraced state interventionism and Big Government policies, contradicting classical liberal principles
wrong_answers:
  - "European liberals began using the term 'libertarian' first, prompting Americans to adopt the same terminology"
  - "The Republican Party officially banned the use of 'liberal' terminology within conservative political movements"
  - Classical liberals wanted to distinguish themselves from European social democratic parties gaining influence in America
explanation: |
  The text clearly explains that American 'liberals' had evolved to support extensive state intervention through programs like FDR's New Deal and LBJ's Great Society, representing a fundamental shift away from classical liberalism's laissez-faire principles. This forced true classical liberals to adopt 'libertarian' to distinguish themselves from this statist evolution. The other options are incorrect because European influence, Republican Party policies, or European social democratic parties are not mentioned as factors in this terminological shift.

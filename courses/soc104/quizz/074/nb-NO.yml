question: Hvilken politisk familie vil mest sannsynlig støtte både avskaffelse av minstelønnslover og fullstendig privatisering av helsevesenet?
answer: Libertarianere, som anser både minstelønn og offentlige helsetjenester som illegitime statlige inngrep i frie markeder
wrong_answers:
  - Konservative, som konsekvent motsetter seg alle former for statlig regulering i økonomiske spørsmål
  - Sentrumsorienterte, som foretrekker markedsbaserte løsninger samtidig som de opprettholder en viss sosial beskyttelse
  - Sosialister, ettersom de prioriterer økonomisk frihet fremfor sosiale velferdsprogrammer
explanation: |
  Libertarianere er den eneste politiske familien som kategorisk motsetter seg både minstelønnslover (de ser på dem som brudd på avtalefriheten som skaper arbeidsledighet) og offentlige helsetjenester (de anser helsetjenester som en tjeneste som alle andre, og som bør overlates til private markeder). Konservative støtter markedsmekanismer, men kan tolerere minstelønn hvis det ikke skader konkurranseevnen, og foretrekker private helsetjenester samtidig som de aksepterer en minimal statlig rolle for de fattige. Sentrumsorienterte støtter eksplisitt opprettholdelse av minstelønn og foretrekker blandede helsesystemer. Sosialister forsvarer sterkt både minstelønn som et verktøy for sosial rettferdighet og offentlige helsetjenester som grunnleggende rettigheter.
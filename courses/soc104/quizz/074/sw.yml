question: Ni familia gani ya kisiasa ambayo inaweza kuunga mkono kuondolewa kwa sheria za mshahara wa chini na ubinafsishaji kamili wa mifumo ya huduma ya afya?
answer: Wanaliberali, kwani wanaona mshahara wa chini kabisa na huduma ya afya ya umma kama hatua haramu za serikali katika masoko huria
wrong_answers:
  - Wahafidhina, kwani wanapinga kila mara aina zote za kanuni za serikali katika masuala ya kiuchumi
  - Watetezi wa kati, kwani wanapendelea suluhisho zinazotegemea soko huku wakidumisha ulinzi wa kijamii
  - Wasoshalisti, wanapoweka kipaumbele uhuru wa kiuchumi kuliko mipango ya ustawi wa jamii
explanation: |
  Wanaliberali ndio familia pekee ya kisiasa inayopinga vikali sheria zote mbili za mshahara wa chini (wakiziona kama ukiukaji wa uhuru wa kimkataba unaosababisha ukosefu wa ajira) na huduma ya afya ya umma (wakizingatia huduma ya afya kama huduma kama nyingine yoyote ambayo inapaswa kuachwa kwa masoko ya kibinafsi). Wahafidhina wanaunga mkono mifumo ya soko lakini wanaweza kuvumilia mshahara wa chini ikiwa hautadhuru ushindani na wanapendelea huduma ya afya ya kibinafsi huku wakikubali nafasi ndogo ya serikali kwa maskini. Wakomunisti wa kati wanaunga mkono waziwazi kudumisha mshahara wa chini na wanapendelea mifumo mchanganyiko ya huduma ya afya. Wasoshalisti wanatetea vikali mshahara wa chini kama zana za haki za kijamii na huduma ya afya ya umma kama haki za msingi.
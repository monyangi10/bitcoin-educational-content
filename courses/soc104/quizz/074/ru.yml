question: Представители какой политической семьи, скорее всего, поддержат отмену законов о минимальной заработной плате и полную приватизацию систем здравоохранения?
answer: Либертарианцы, поскольку они считают минимальную зарплату и государственное здравоохранение незаконным вмешательством государства в свободные рынки
wrong_answers:
  - Консерваторы, поскольку они последовательно выступают против всех форм государственного регулирования в экономических вопросах
  - Центристы, поскольку выступают за рыночные решения при сохранении некоторых социальных гарантий
  - Социалисты, поскольку для них экономическая свобода важнее программ социального обеспечения
explanation: |
  Либертарианцы - единственная политическая семья, которая категорически выступает против законов о минимальной зарплате (рассматривая их как нарушение свободы договора, порождающее безработицу) и против государственного здравоохранения (считая здравоохранение такой же услугой, как и все остальные, которую следует оставить частным рынкам). Консерваторы поддерживают рыночные механизмы, но могут мириться с минимальной зарплатой, если она не вредит конкурентоспособности, и предпочитают частное здравоохранение, соглашаясь с минимальной ролью государства для бедных. Центристы однозначно поддерживают сохранение минимальной зарплаты и выступают за смешанные системы здравоохранения. Социалисты решительно защищают минимальную зарплату как инструмент социальной справедливости и государственное здравоохранение как фундаментальное право.
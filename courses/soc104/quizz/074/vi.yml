question: Gia đình chính trị nào có khả năng ủng hộ cả việc bãi bỏ luật lương tối thiểu và việc tư nhân hóa hoàn toàn hệ thống chăm sóc sức khỏe nhất?
answer: Những người theo chủ nghĩa tự do coi cả mức lương tối thiểu và chăm sóc sức khỏe cộng đồng là những can thiệp bất hợp pháp của chính phủ vào thị trường tự do.
wrong_answers:
  - Phe bảo thủ luôn phản đối mọi hình thức can thiệp của chính phủ vào các vấn đề kinh tế.
  - Những người theo chủ nghĩa trung dung ủng hộ các giải pháp dựa trên thị trường trong khi vẫn duy trì một số biện pháp bảo vệ xã hội.
  - Những người theo chủ nghĩa xã hội, vì họ ưu tiên tự do kinh tế hơn các chương trình phúc lợi xã hội.
explanation: |
  Những người theo chủ nghĩa tự do là nhóm chính trị duy nhất kiên quyết phản đối cả luật lương tối thiểu (coi đó là sự vi phạm quyền tự do hợp đồng và gây ra thất nghiệp) và y tế công cộng (coi y tế là một dịch vụ như bao dịch vụ khác và nên được để cho thị trường tư nhân quản lý). Những người bảo thủ ủng hộ cơ chế thị trường nhưng có thể chấp nhận lương tối thiểu nếu nó không làm tổn hại đến khả năng cạnh tranh và thích y tế tư nhân hơn trong khi chấp nhận vai trò tối thiểu của nhà nước đối với người nghèo. Những người theo chủ nghĩa trung dung công khai ủng hộ việc duy trì lương tối thiểu và ủng hộ các hệ thống chăm sóc sức khỏe hỗn hợp. Những người theo chủ nghĩa xã hội kiên quyết bảo vệ cả lương tối thiểu như một công cụ công bằng xã hội và y tế công cộng như một quyền cơ bản.
question: Кое политическо семейство най-вероятно би подкрепило както премахването на законите за минималната работна заплата, така и пълната приватизация на здравните системи?
answer: Либертарианци, тъй като те смятат минималната заплата и общественото здравеопазване за нелегитимна държавна намеса в свободните пазари
wrong_answers:
  - Консерватори, които последователно се противопоставят на всички форми на държавно регулиране в областта на икономиката
  - Центристи, тъй като предпочитат пазарни решения, като същевременно запазват някои социални защити
  - Социалисти, тъй като дават приоритет на икономическата свобода пред програмите за социално подпомагане
explanation: |
  Либертарианците са единственото политическо семейство, което категорично се противопоставя както на законите за минималната работна заплата (считайки ги за нарушаване на договорната свобода, което води до безработица), така и на общественото здравеопазване (считайки здравеопазването за услуга като всяка друга, която трябва да бъде оставена на частните пазари). Консерваторите подкрепят пазарните механизми, но могат да толерират минималната работна заплата, ако тя не вреди на конкурентоспособността, и предпочитат частното здравеопазване, като приемат минималната роля на държавата за бедните. Центристите изрично подкрепят запазването на минималната работна заплата и предпочитат смесени системи на здравеопазване. Социалистите категорично защитават както минималната работна заплата като инструмент за социална справедливост, така и общественото здравеопазване като основно право.
question: ¿Qué familia política apoyaría más probablemente tanto la eliminación de las leyes de salario mínimo como la privatización total de los sistemas sanitarios?
answer: Los libertarios, ya que consideran que tanto el salario mínimo como la sanidad pública son intervenciones gubernamentales ilegítimas en los mercados libres
wrong_answers:
  - Conservadores, ya que se oponen sistemáticamente a toda forma de regulación gubernamental en materia económica
  - Centristas, ya que favorecen las soluciones basadas en el mercado, manteniendo al mismo tiempo algunas protecciones sociales
  - Socialistas, ya que dan prioridad a la libertad económica frente a los programas de bienestar social
explanation: |
  Los libertarios son la única familia política que se opone categóricamente tanto a las leyes de salario mínimo (por considerarlas violaciones de la libertad contractual que crean desempleo) como a la sanidad pública (por considerar la sanidad un servicio como cualquier otro que debe dejarse en manos de los mercados privados). Los conservadores apoyan los mecanismos de mercado, pero pueden tolerar el salario mínimo si no perjudica la competitividad, y prefieren la sanidad privada aceptando un papel mínimo del Estado para los pobres. Los centristas apoyan explícitamente el mantenimiento del salario mínimo y favorecen los sistemas sanitarios mixtos. Los socialistas defienden firmemente tanto el salario mínimo como herramienta de justicia social como la sanidad pública como derechos fundamentales.
question: Milline poliitiline perekond toetaks kõige tõenäolisemalt nii miinimumpalga seaduste kaotamist kui ka tervishoiusüsteemide täielikku erastamist?
answer: Libertaarid, kuna nad peavad nii miinimumpalka kui ka riiklikku tervishoiuteenust ebaseaduslikuks riiklikuks sekkumiseks vabaturgudele
wrong_answers:
  - Konservatiivid, kuna nad on järjekindlalt vastu igasugusele riiklikule reguleerimisele majandusküsimustes
  - Keskerakondlased, kuna nad pooldavad turupõhiseid lahendusi, säilitades samas mõningaid sotsiaalseid kaitsemeetmeid
  - Sotsiaaldemokraadid, kuna nad seavad majandusliku vabaduse sotsiaalhoolekandeprogrammide asemel esikohale
explanation: |
  Libertaarid on ainus poliitiline perekond, kes on kategooriliselt vastu nii miinimumpalga seadustele (pidades neid lepinguvabaduse rikkumiseks, mis tekitab tööpuudust) kui ka riiklikule tervishoiule (pidades tervishoiu teenust nagu iga teistki, mis tuleks jätta eraturgudele). Konservatiivid toetavad turumehhanisme, kuid võivad taluda miinimumpalka, kui see ei kahjusta konkurentsivõimet, ja eelistavad eratervishoiu, aktsepteerides samas riigi minimaalset rolli vaeste jaoks. Keskerakondlased toetavad selgesõnaliselt miinimumpalga säilitamist ja pooldavad tervishoiusüsteemide segatüüpi. Sotsiaaldemokraadid kaitsevad kindlalt nii miinimumpalka kui sotsiaalse õigluse vahendeid kui ka riiklikku tervishoiuteenust kui põhiõigust.
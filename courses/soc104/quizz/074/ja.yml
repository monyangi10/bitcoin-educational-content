question: 最低賃金法の撤廃と医療制度の完全民営化の両方を最も支持しそうな政治家一族は？
answer: リバタリアンは、最低賃金も公的医療も、自由市場に対する政府の非合法な介入と見なしている。
wrong_answers:
  - 保守派は、経済問題におけるあらゆる形態の政府規制に一貫して反対している。
  - 社会的保護をある程度維持しつつ、市場ベースの解決策を支持する中道派
  - 社会福祉プログラムよりも経済的自由を優先する社会主義者
explanation: |
  リバタリアンは、最低賃金法（失業を生む契約自由の侵害とみなす）と公的医療（医療は他のサービスと同様、民間市場に委ねるべきと考える）の両方に断固反対する唯一の政治家系である。保守派は市場メカニズムを支持するが、競争力を損なわないのであれば最低賃金は容認し、貧困層に対する国家の役割は最小限にとどめつつ、民間医療を好む。中道派は最低賃金の維持を明確に支持し、混合医療制度を支持する。社会主義者は、社会正義の手段としての最低賃金と、基本的権利としての公的医療の両方を強く擁護する。
question: Welke politieke familie zou waarschijnlijk de afschaffing van het minimumloon en de volledige privatisering van de gezondheidszorg steunen?
answer: Libertariërs, omdat zij zowel het minimumloon als de openbare gezondheidszorg beschouwen als onrechtmatige overheidsinterventies in de vrije markt
wrong_answers:
  - Conservatieven, omdat ze consequent tegen alle vormen van overheidsregulering in economische zaken zijn
  - Centristen, omdat zij voorstander zijn van marktgebaseerde oplossingen met behoud van enkele sociale beschermingen
  - Socialisten, omdat ze economische vrijheid verkiezen boven sociale welvaartsprogramma's
explanation: |
  Libertariërs zijn de enige politieke familie die categorisch zowel tegen minimumloonwetten is (ze beschouwen ze als schendingen van contractuele vrijheid die werkloosheid creëren) als tegen openbare gezondheidszorg (ze beschouwen gezondheidszorg als een dienst zoals alle andere die aan particuliere markten moet worden overgelaten). Conservatieven ondersteunen marktmechanismen maar kunnen minimumloon tolereren als het de concurrentiepositie niet schaadt en geven de voorkeur aan particuliere gezondheidszorg terwijl ze een minimale rol van de staat voor de armen accepteren. Centristen zijn expliciet voorstander van handhaving van het minimumloon en zijn voorstander van gemengde gezondheidszorgstelsels. Socialisten verdedigen zowel het minimumloon als sociale rechtvaardigheidsinstrumenten en de openbare gezondheidszorg als grondrechten.
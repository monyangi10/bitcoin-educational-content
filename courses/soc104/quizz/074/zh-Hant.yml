question: 哪個政治家族最有可能同時支持取消最低工資法和醫療保健系統的完全私有化？
answer: 自由主義者，因為他們認為最低工資和公共健康照護都是政府對自由市場的非法干預
wrong_answers:
  - 保守派，因為他們始終反對政府在經濟事務上的所有形式的規範
  - 中間派，因為他們偏好以市場為基礎的解決方案，同時維持一些社會保護措施
  - 社會主義者，因為他們重視經濟自由而非社會福利計畫
explanation: |
  自由主義者是唯一斷然反對最低工資法（視為違反合約自由，造成失業）和公共醫療照護（認為醫療照護和其他服務一樣，應該交由私人市場處理）的政治家族。保守派支持市場機制，但可能會容忍最低工資，如果它不損害競爭力的話。中间派明确支持维持最低工资，并赞成混合医疗保健系统。社會主義者強烈捍衛最低工資作為社會正義工具，以及公共醫療保健作為基本權利。
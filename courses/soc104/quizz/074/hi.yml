question: कौन सा राजनीतिक परिवार न्यूनतम मजदूरी कानूनों को समाप्त करने और स्वास्थ्य सेवा प्रणालियों के पूर्ण निजीकरण दोनों का समर्थन करने की सबसे अधिक संभावना रखता है?
answer: स्वतंत्रतावादी न्यूनतम मजदूरी और सार्वजनिक स्वास्थ्य सेवा दोनों को मुक्त बाजारों में सरकार का अवैध हस्तक्षेप मानते हैं।
wrong_answers:
  - रूढ़िवादी लोग आर्थिक मामलों में सरकार के सभी प्रकार के नियमों का लगातार विरोध करते हैं।
  - मध्यमार्गी, क्योंकि वे कुछ सामाजिक सुरक्षा उपायों को बनाए रखते हुए बाजार आधारित समाधानों का समर्थन करते हैं।
  - समाजवादी, क्योंकि वे सामाजिक कल्याण कार्यक्रमों की तुलना में आर्थिक स्वतंत्रता को प्राथमिकता देते हैं।
explanation: |
  स्वतंत्रतावादी एकमात्र राजनीतिक समूह हैं जो न्यूनतम मजदूरी कानूनों (इन्हें संविदात्मक स्वतंत्रता का उल्लंघन और बेरोजगारी पैदा करने वाला मानते हुए) और सार्वजनिक स्वास्थ्य सेवा (स्वास्थ्य सेवा को अन्य सेवाओं की तरह निजी बाज़ारों पर छोड़ देना चाहिए) दोनों का स्पष्ट रूप से विरोध करते हैं। रूढ़िवादी बाज़ार तंत्र का समर्थन करते हैं, लेकिन यदि न्यूनतम मजदूरी प्रतिस्पर्धा को नुकसान नहीं पहुँचाती है तो वे इसे बर्दाश्त कर सकते हैं और गरीबों के लिए राज्य की न्यूनतम भूमिका को स्वीकार करते हुए निजी स्वास्थ्य सेवा को प्राथमिकता देते हैं। मध्यमार्गी स्पष्ट रूप से न्यूनतम मजदूरी बनाए रखने का समर्थन करते हैं और मिश्रित स्वास्थ्य सेवा प्रणालियों के पक्षधर हैं। समाजवादी न्यूनतम मजदूरी को सामाजिक न्याय के साधन के रूप में और सार्वजनिक स्वास्थ्य सेवा को मौलिक अधिकार के रूप में दृढ़ता से बचाव करते हैं।
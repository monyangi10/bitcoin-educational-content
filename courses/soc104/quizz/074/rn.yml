question: Ni uwuhe muryango wa politike woshobora gushigikira cane ugukuraho amategeko agenga umushahara mutoyi be n’uguhindura ubuvuzi bube ubw’abikorera ku giti cabo?
answer: Abaharanira umwidegemvyo, kuko babona ko umushahara mutoyi n’ubuvuzi bwa bose ari ibikorwa bitemewe na Leta mu masoko y’ubwigenge
wrong_answers:
  - Abanyapolitike b’abanyagihugu, kuko baguma barwanya uburyo bwose bwo gutegeka Leta mu vy’ubutunzi .
  - Abanyapolitike bo hagati, kuko bakunda inyishu zishingiye ku masoko mu gihe bagumana uburinzi bumwe bumwe bw’imibano
  - Abasosiyalisiti, uko bashira imbere umwidegemvyo mu vy’ubutunzi kuruta porogarama z’imibereho myiza
explanation: |
  Abanyagihugu b’abanyagihugu ni bo muryango wa politike umwe rudende urwanya cane amategeko agenga umushahara mutoyi (babona ko ari ukurenga ku mwidegemvyo w’amasezerano bituma abantu batagira akazi) n’ubuvuzi bwa bose (babona ko ubuvuzi ari igikorwa nk’ibindi vyose bikwiye gusigara ku masoko yigenga). Abanyagihugu bashigikiye uburyo bw’isoko ariko bashobora kwihanganira umushahara mutoyi iyo utagira ico ukoze ku bijanye n’uguhiganwa kandi bagahitamwo ubuvuzi bwigenga mu gihe bemera uruhara rutoyi rwa Leta ku bakene. Abanyapolitike bashigikiye cane ko umushahara mutoyi ugumaho kandi bagashigikira uburyo bwo kwivuza buvanze. Abasosiyalisiti barwanira cane umushahara mutoyi nk’ibikoresho vy’ubutungane bw’abantu n’ubuvuzi bwa bose nk’uburenganzira bw’ishimikiro.
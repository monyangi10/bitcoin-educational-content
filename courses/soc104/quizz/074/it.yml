question: Quale famiglia politica è più propensa a sostenere sia l'eliminazione delle leggi sul salario minimo sia la completa privatizzazione dei sistemi sanitari?
answer: I libertari, che considerano il salario minimo e l'assistenza sanitaria pubblica come interventi governativi illegittimi nel libero mercato
wrong_answers:
  - I conservatori, poiché si oppongono costantemente a tutte le forme di regolamentazione governativa in campo economico
  - Centristi, in quanto favorevoli a soluzioni basate sul mercato, pur mantenendo alcune protezioni sociali
  - Socialisti, in quanto privilegiano la libertà economica rispetto ai programmi di assistenza sociale
explanation: |
  I libertari sono l'unica famiglia politica che si oppone categoricamente sia alle leggi sul salario minimo (considerandole come violazioni della libertà contrattuale che creano disoccupazione) sia all'assistenza sanitaria pubblica (considerando l'assistenza sanitaria un servizio come un altro che dovrebbe essere lasciato ai mercati privati). I conservatori sostengono i meccanismi di mercato, ma possono tollerare il salario minimo se non danneggia la competitività e preferiscono l'assistenza sanitaria privata, pur accettando un ruolo minimo dello Stato per i poveri. I centristi sostengono esplicitamente il mantenimento del salario minimo e sono favorevoli a sistemi sanitari misti. I socialisti difendono con forza sia il salario minimo come strumento di giustizia sociale sia l'assistenza sanitaria pubblica come diritto fondamentale.
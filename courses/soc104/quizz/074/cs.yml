question: Která politická rodina by s největší pravděpodobností podpořila jak zrušení zákonů o minimální mzdě, tak úplnou privatizaci zdravotnictví?
answer: Libertariáni považují minimální mzdu i veřejnou zdravotní péči za nelegitimní zásahy státu do volného trhu
wrong_answers:
  - Konzervativci se důsledně staví proti všem formám státní regulace v ekonomických otázkách
  - Centristé, protože upřednostňují tržní řešení při zachování určité sociální ochrany
  - Socialisté, protože upřednostňují ekonomickou svobodu před sociálními programy
explanation: |
  Libertariáni jsou jedinou politickou rodinou, která kategoricky odmítá jak zákony o minimální mzdě (považuje je za porušení smluvní svobody, které způsobuje nezaměstnanost), tak veřejné zdravotnictví (považuje zdravotní péči za službu jako každou jinou, která by měla být ponechána soukromému trhu). Konzervativci podporují tržní mechanismy, ale mohou tolerovat minimální mzdu, pokud nepoškozuje konkurenceschopnost, a dávají přednost soukromé zdravotní péči, přičemž akceptují minimální roli státu pro chudé. Centristé výslovně podporují zachování minimální mzdy a upřednostňují smíšené systémy zdravotní péče. Socialisté důrazně hájí jak minimální mzdu jako nástroj sociální spravedlnosti, tak veřejné zdravotnictví jako základní právo.
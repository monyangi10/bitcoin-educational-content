question: 哪个政治家族最有可能同时支持取消最低工资法和医疗保健系统完全私有化？
answer: 自由主义者，因为他们认为最低工资和公共医疗都是政府对自由市场的非法干预
wrong_answers:
  - 保守派，因为他们一贯反对政府对经济事务进行任何形式的监管
  - 中间派，因为他们倾向于以市场为基础的解决方案，同时保留一些社会保护措施
  - 社会主义者，因为他们将经济自由置于社会福利计划之上
explanation: |
  自由主义者是唯一一个明确反对最低工资法（认为其侵犯了契约自由，造成失业）和公共医疗保健（认为医疗保健与其他服务一样，应交由私人市场处理）的政治家族。保守派支持市场机制，但如果不损害竞争力，可能会容忍最低工资，并倾向于私人医疗保健，同时接受国家为穷人发挥最低限度的作用。中间派明确支持维持最低工资标准，并赞成混合医疗体系。社会主义者坚决捍卫作为社会正义工具的最低工资和作为基本权利的公共医疗保健。
question: ครอบครัวการเมืองใดที่มีแนวโน้มจะสนับสนุนทั้งการยกเลิกกฎหมายค่าจ้างขั้นต่ำและการแปรรูประบบสุขภาพทั้งหมด?
answer: Libertarians, as they view both minimum wage and public healthcare as illegitimate government interventions in free markets
wrong_answers:
  - พรรคอนุรักษ์นิยม, เนื่องจากพวกเขาคัดค้านการควบคุมของรัฐบาลในเรื่องเศรษฐกิจทุกรูปแบบอย่างต่อเนื่อง
  - พวกสายกลาง เนื่องจากพวกเขาชื่นชอบวิธีแก้ปัญหาที่อิงตลาดในขณะที่ยังคงรักษาการคุ้มครองทางสังคมบางประการ
  - สังคมนิยม, เนื่องจากพวกเขาให้ความสำคัญกับเสรีภาพทางเศรษฐกิจมากกว่ารายการสวัสดิการสังคม
explanation: |
  ลิเบอร์ทาเรียนเป็นกลุ่มการเมืองเดียวที่คัดค้านกฎหมายค่าแรงขั้นต่ำอย่างเด็ดขาด (มองว่าเป็นการละเมิดเสรีภาพในการทำสัญญาที่สร้างการว่างงาน) และการดูแลสุขภาพของรัฐ (พิจารณาว่าการดูแลสุขภาพเป็นบริการเช่นเดียวกับบริการอื่น ๆ ที่ควรปล่อยให้ตลาดเอกชนจัดการ) นักอนุรักษนิยมสนับสนุนกลไกตลาดแต่ยอมรับค่าแรงขั้นต่ำหากไม่ทำลายความสามารถในการแข่งขันและชอบการดูแลสุขภาพเอกชนในขณะที่ยอมรับบทบาทของรัฐขั้นต่ำสำหรับคนยากจน กลุ่มเซ็นทรัลสนับสนุนการรักษาค่าแรงขั้นต่ำอย่างชัดเจนและชื่นชอบระบบการดูแลสุขภาพแบบผสมผสาน สังคมนิยมปกป้องทั้งค่าแรงขั้นต่ำในฐานะเครื่องมือความยุติธรรมทางสังคมและการดูแลสุขภาพของรัฐในฐานะสิทธิขั้นพื้นฐานอย่างแข็งขัน
question: Welche politische Familie würde am ehesten sowohl die Abschaffung von Mindestlohngesetzen als auch die vollständige Privatisierung der Gesundheitssysteme unterstützen?
answer: Libertäre, da sie sowohl den Mindestlohn als auch die öffentliche Gesundheitsversorgung als unzulässige staatliche Eingriffe in den freien Markt betrachten
wrong_answers:
  - Konservative, die sich konsequent gegen jede Form von staatlicher Regulierung in Wirtschaftsfragen aussprechen
  - Zentristen, da sie marktwirtschaftliche Lösungen bevorzugen und gleichzeitig einen gewissen sozialen Schutz beibehalten
  - Sozialdemokraten, da sie der wirtschaftlichen Freiheit Vorrang vor sozialen Wohlfahrtsprogrammen einräumen
explanation: |
  Die Libertären sind die einzige politische Familie, die sowohl Mindestlohngesetze kategorisch ablehnt (sie betrachten sie als Verletzung der Vertragsfreiheit, die zu Arbeitslosigkeit führt) als auch die öffentliche Gesundheitsversorgung (sie betrachten die Gesundheitsversorgung als eine Dienstleistung wie jede andere, die dem privaten Markt überlassen werden sollte). Konservative befürworten Marktmechanismen, können aber Mindestlöhne tolerieren, wenn sie der Wettbewerbsfähigkeit nicht schaden, und bevorzugen eine private Gesundheitsversorgung, akzeptieren aber eine minimale Rolle des Staates für die Armen. Zentristen unterstützen ausdrücklich die Beibehaltung des Mindestlohns und befürworten gemischte Gesundheitssysteme. Sozialdemokraten verteidigen sowohl den Mindestlohn als Instrument der sozialen Gerechtigkeit als auch die öffentliche Gesundheitsversorgung als Grundrecht.
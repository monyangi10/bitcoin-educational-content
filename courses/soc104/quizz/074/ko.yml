question: 최저임금법 철폐와 의료 시스템의 완전한 민영화를 모두 지지할 가능성이 가장 높은 정파는 어디일까요?
answer: 자유주의자들은 최저임금과 공공 의료를 모두 자유 시장에 대한 정부의 불법적인 개입으로 간주합니다
wrong_answers:
  - 보수주의자들은 경제 문제에서 모든 형태의 정부 규제에 일관되게 반대합니다
  - 중도주의자들은 일부 사회적 보호를 유지하면서 시장 기반 솔루션을 선호합니다
  - 사회주의자들은 사회 복지 프로그램보다 경제적 자유를 우선시하기 때문에
explanation: |
  자유주의자들은 최저임금법(실업자를 양산하는 계약 자유의 침해로 간주)과 공공 의료(의료도 다른 서비스와 마찬가지로 민간 시장에 맡겨야 한다고 간주)에 모두 반대하는 유일한 정치 집단입니다. 보수주의자는 시장 메커니즘을 지지하지만 경쟁력을 해치지 않는다면 최저임금을 용인할 수 있으며, 빈곤층을 위한 최소한의 국가 역할을 인정하면서 민간의료보험을 선호합니다. 중도주의자는 최저임금 유지를 명시적으로 지지하며 혼합형 의료 시스템을 선호합니다. 사회주의자들은 사회 정의의 도구로서 최저임금과 기본권으로서 공공 의료를 강력히 옹호합니다.
question: Koja politička porodica bi najverovatnije podržala i ukidanje zakona o minimalnoj zaradi i potpunu privatizaciju zdravstvenih sistema?
answer: Libertarijanci, jer smatraju da su i minimalna zarada i javno zdravstvo nelegitimne vladine intervencije na slobodnim tržištima
wrong_answers:
  - Konzervativci, jer dosledno se protive svim oblicima vladine regulative u ekonomskim pitanjima
  - Centristi, jer favorizuju rešenja zasnovana na tržištu dok održavaju određene socijalne zaštite
  - Socijalisti, jer daju prednost ekonomskoj slobodi nad programima socijalne zaštite
explanation: |
  Libertarijanci su jedina politička porodica koja kategorički se protivi i zakonima o minimalnoj zaradi (smatrajući ih kršenjem ugovorne slobode koje stvara nezaposlenost) i javnom zdravstvu (posmatrajući zdravstvo kao uslugu poput svake druge koja bi trebala biti prepuštena privatnim tržištima). Konzervativci podržavaju tržišne mehanizme, ali mogu tolerisati minimalnu zaradu ako ne šteti konkurentnosti i preferiraju privatno zdravstvo dok prihvataju minimalnu ulogu države za siromašne. Centristi eksplicitno podržavaju održavanje minimalne zarade i favorizuju mešovite zdravstvene sisteme. Socijalisti snažno brane i minimalnu zaradu kao alat socijalne pravde i javno zdravstvo kao osnovna prava.
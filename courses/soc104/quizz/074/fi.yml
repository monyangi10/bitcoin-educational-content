question: Mikรค poliittinen perhe todennรคkรถisesti tukisi sekรค minimipalkkalakien poistamista ettรค terveydenhuoltojรคrjestelmien tรคydellistรค yksityistรคmistรค?
answer: Libertaristit, koska he pitรคvรคt sekรค minimipalkkaa ettรค julkista terveydenhuoltoa laittomina valtion puuttumisina vapaisiin markkinoihin
wrong_answers:
  - Konservatiivit, koska he vastustavat johdonmukaisesti kaikenlaista valtion sรครคntelyรค talousasioissa
  - Keskustalaiset, koska he suosivat markkinapohjaisia ratkaisuja sรคilyttรคen kuitenkin jonkin verran sosiaalista suojaa
  - Sosialistit, koska he asettavat taloudellisen vapauden sosiaalisten hyvinvointiohjelmien edelle
explanation: |
  Libertaristit ovat ainoa poliittinen perhe, joka vastustaa kategorisesti sekรค minimipalkkalakeja (koska he pitรคvรคt niitรค sopimusvapauden loukkauksina, jotka luovat tyรถttรถmyyttรค) ettรค julkista terveydenhuoltoa (koska he pitรคvรคt terveydenhuoltoa samanlaisena palveluna kuin mitรค tahansa muuta, joka pitรคisi jรคttรครค yksityisille markkinoille). Konservatiivit kannattavat markkinamekanismeja, mutta saattavat sietรครค vรคhimmรคispalkkaa, jos se ei vahingoita kilpailukykyรค, ja suosivat yksityistรค terveydenhuoltoa ja hyvรคksyvรคt samalla valtion minimaalisen roolin kรถyhien hyvรคksi. Keskustalaiset kannattavat nimenomaisesti vรคhimmรคispalkan sรคilyttรคmistรค ja suosivat terveydenhuollon sekajรคrjestelmiรค. Sosialistit puolustavat voimakkaasti sekรค vรคhimmรคispalkkaa sosiaalisen oikeudenmukaisuuden vรคlineenรค ettรค julkista terveydenhuoltoa perusoikeutena.
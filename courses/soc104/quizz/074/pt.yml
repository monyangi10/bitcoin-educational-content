question: Qual é a família política que mais provavelmente apoiaria a eliminação das leis do salário mínimo e a privatização total dos sistemas de saúde?
answer: Libertários, uma vez que consideram o salário mínimo e os cuidados de saúde públicos como intervenções ilegítimas do governo nos mercados livres
wrong_answers:
  - Conservadores, uma vez que se opõem sistematicamente a todas as formas de regulamentação governamental em matéria económica
  - Centristas, porque são a favor de soluções baseadas no mercado, mantendo ao mesmo tempo algumas protecções sociais
  - Socialistas, porque dão prioridade à liberdade económica em detrimento dos programas de bem-estar social
explanation: |
  Os libertários são a única família política que se opõe categoricamente tanto às leis do salário mínimo (considerando-as violações da liberdade contratual que criam desemprego) como aos cuidados de saúde públicos (considerando os cuidados de saúde um serviço como qualquer outro que deve ser deixado ao critério dos mercados privados). Os conservadores apoiam os mecanismos de mercado, mas podem tolerar o salário mínimo se este não prejudicar a competitividade e preferem os cuidados de saúde privados, embora aceitem um papel mínimo do Estado para os pobres. Os centristas apoiam explicitamente a manutenção do salário mínimo e favorecem os sistemas de saúde mistos. Os socialistas defendem firmemente o salário mínimo como instrumento de justiça social e os cuidados de saúde públicos como direitos fundamentais.
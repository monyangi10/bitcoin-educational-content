question: Która rodzina polityczna najprawdopodobniej poparłaby zarówno zniesienie przepisów o płacy minimalnej, jak i całkowitą prywatyzację systemów opieki zdrowotnej?
answer: Libertarianie, ponieważ uważają zarówno płacę minimalną, jak i publiczną opiekę zdrowotną za nielegalne interwencje rządu w wolne rynki
wrong_answers:
  - Konserwatyści, ponieważ konsekwentnie sprzeciwiają się wszelkim formom regulacji rządowych w sprawach gospodarczych
  - Centryści, ponieważ opowiadają się za rozwiązaniami rynkowymi przy jednoczesnym zachowaniu pewnych zabezpieczeń socjalnych
  - Socjaliści, ponieważ przedkładają wolność gospodarczą nad programy opieki społecznej
explanation: |
  Libertarianie są jedyną rodziną polityczną, która kategorycznie sprzeciwia się zarówno przepisom o płacy minimalnej (postrzegając je jako naruszenie swobody zawierania umów, które powoduje bezrobocie), jak i publicznej opiece zdrowotnej (uważając opiekę zdrowotną za usługę jak każda inna, którą należy pozostawić prywatnym rynkom). Konserwatyści wspierają mechanizmy rynkowe, ale mogą tolerować płacę minimalną, jeśli nie szkodzi ona konkurencyjności i preferują prywatną opiekę zdrowotną, akceptując minimalną rolę państwa dla ubogich. Centryści wyraźnie popierają utrzymanie płacy minimalnej i preferują mieszane systemy opieki zdrowotnej. Socjaliści zdecydowanie bronią zarówno płacy minimalnej jako narzędzia sprawiedliwości społecznej, jak i publicznej opieki zdrowotnej jako praw podstawowych.
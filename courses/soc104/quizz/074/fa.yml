question: کدام خانواده سیاسی به احتمال زیاد از حذف قوانین حداقل دستمزد و خصوصی‌سازی کامل سیستم‌های بهداشتی حمایت می‌کند؟
answer: لیبرترین‌ها، زیرا آنها حداقل دستمزد و مراقبت‌های بهداشتی عمومی را به عنوان مداخلات نامشروع دولت در بازارهای آزاد می‌بینند
wrong_answers:
  - محافظه‌کاران، همان‌طور که به‌طور مداوم با همه اشکال مقررات دولتی در مسائل اقتصادی مخالفت می‌کنند
  - میانه‌روها، زیرا آنها راه‌حل‌های مبتنی بر بازار را ترجیح می‌دهند در حالی که برخی از حمایت‌های اجتماعی را حفظ می‌کنند
  - سوسیالیست‌ها، زیرا آنها آزادی اقتصادی را بر برنامه‌های رفاه اجتماعی اولویت می‌دهند
explanation: |
  لیبرتارین‌ها تنها خانواده سیاسی هستند که به‌طور قاطع با قوانین حداقل دستمزد (که آن‌ها را نقض آزادی قراردادی می‌دانند و معتقدند باعث بیکاری می‌شود) و بهداشت عمومی (که آن را خدمتی مانند سایر خدمات می‌دانند که باید به بازارهای خصوصی واگذار شود) مخالفند. محافظه‌کاران از مکانیزم‌های بازار حمایت می‌کنند اما ممکن است حداقل دستمزد را تحمل کنند اگر به رقابت‌پذیری آسیب نرساند و بهداشت خصوصی را ترجیح می‌دهند در حالی که نقش حداقلی دولت برای فقرا را می‌پذیرند. میانه‌روها به‌طور صریح از حفظ حداقل دستمزد حمایت می‌کنند و سیستم‌های بهداشتی مختلط را ترجیح می‌دهند. سوسیالیست‌ها به شدت از هر دو حداقل دستمزد به عنوان ابزار عدالت اجتماعی و بهداشت عمومی به عنوان حقوق اساسی دفاع می‌کنند.
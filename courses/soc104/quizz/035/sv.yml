question: Vilken är den grundläggande meningsskiljaktigheten mellan libertarianer och liberaler när det gäller ekonomisk organisation?
answer: Libertarianer stöder privat egendom och fria marknader, medan libertaires motsätter sig kapitalism och förespråkar kollektivt ägande
wrong_answers:
  - Libertarianer förespråkar statlig reglering av marknader, medan libertaire förespråkar fullständig ekonomisk avreglering
  - Libertarianer motsätter sig alla former av egendom, medan libertaire försvarar individuell äganderätt inom kapitalismen
  - Libertarianer stöder statligt kontrollerade ekonomier, medan libertaires förespråkar privatisering av alla offentliga tjänster
explanation: |
  Den grundläggande ekonomiska klyftan beror på deras motsatta syn på egendom och kapitalism. Libertarianer anser att privat äganderätt och fri marknad
  kapitalism är avgörande för individens frihet, medan libertaires (anarkistiska socialister) ser privat egendom som stöld och kapitalism som i sig förtryckande. Libertaires förespråkar istället alternativa ekonomiska modeller som mutualism, kollektivism eller libertariansk kommunism, som förkastar både statlig kontroll och privat ägande till förmån för kollektiva arrangemang.
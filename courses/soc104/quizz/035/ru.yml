question: В чем заключается фундаментальное разногласие между либертарианцами и либертарианцами по поводу организации экономики?
answer: Либертарианцы поддерживают частную собственность и свободные рынки, а либертарианцы выступают против капитализма и за коллективную собственность
wrong_answers:
  - Либертарианцы выступают за государственное регулирование рынков, а либертарианцы - за полное дерегулирование экономики
  - Либертарианцы выступают против всех форм собственности, в то время как либертарианцы защищают право индивидуальной собственности в рамках капитализма
  - Либертарианцы поддерживают экономику, контролируемую государством, а либертарианцы выступают за приватизацию всех государственных услуг
explanation: |
  Основное экономическое разделение обусловлено их противоположными взглядами на собственность и капитализм. Либертарианцы считают, что права частной собственности и свободный рынок
  капитализм необходимы для свободы личности, в то время как либертарианцы (анархисты-социалисты) считают частную собственность кражей, а капитализм - угнетением по своей сути. Вместо этого либертарианцы выступают за альтернативные экономические модели, такие как мутуализм, коллективизм или либертарный коммунизм, отвергая как государственный контроль, так и частную собственность в пользу коллективных механизмов.
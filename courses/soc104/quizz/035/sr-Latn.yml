question: Koja je osnovna neslaganja između libertarijanaca i libertaira u pogledu ekonomske organizacije?
answer: Libertarijanci podržavaju privatnu svojinu i slobodna tržišta, dok se libertairi protive kapitalizmu i zalažu za kolektivno vlasništvo.
wrong_answers:
  - Libertarijanci favorizuju državnu regulaciju tržišta, dok libertairi podržavaju potpunu ekonomsku deregulaciju.
  - Libertarijanci se protive svim oblicima vlasništva, dok libertaires brane prava individualnog vlasništva unutar kapitalizma.
  - Libertarijanci podržavaju ekonomije pod kontrolom države, dok se libertaires zalažu za privatizaciju svih javnih usluga
explanation: |
  Osnovna ekonomska podela proizlazi iz njihovih suprotstavljenih pogleda na vlasništvo i kapitalizam. Libertarijanci veruju da su prava privatnog vlasništva i slobodno tržišni kapitalizam ključni za individualnu slobodu, dok libertairi (anarhistički socijalisti) vide privatno vlasništvo kao krađu, a kapitalizam kao inherentno opresivan. Libertairi umesto toga zagovaraju alternativne ekonomske modele poput mutualizma, kolektivizma ili libertarijanskog komunizma, odbacujući i državnu kontrolu i privatno vlasništvo u korist kolektivnih aranžmana.
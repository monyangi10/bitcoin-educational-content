question: Na czym polega fundamentalna różnica zdań między libertarianami a wolnościowcami w kwestii organizacji gospodarki?
answer: Libertarianie wspierają własność prywatną i wolny rynek, podczas gdy liberałowie sprzeciwiają się kapitalizmowi i opowiadają się za własnością zbiorową
wrong_answers:
  - Libertarianie opowiadają się za rządową regulacją rynków, podczas gdy liberałowie popierają całkowitą deregulację gospodarki
  - Libertarianie sprzeciwiają się wszelkim formom własności, podczas gdy liberałowie bronią indywidualnych praw własności w ramach kapitalizmu
  - Libertarianie popierają gospodarki kontrolowane przez państwo, podczas gdy liberałowie opowiadają się za prywatyzacją wszystkich usług publicznych
explanation: |
  Podstawowy podział ekonomiczny wynika z ich przeciwstawnych poglądów na własność i kapitalizm. Libertarianie uważają, że prawa własności prywatnej i wolnorynkowy
  kapitalizm są niezbędne dla wolności jednostki, podczas gdy libertyni (anarchistyczni socjaliści) postrzegają własność prywatną jako kradzież, a kapitalizm jako z natury opresyjny. Libertarianie opowiadają się za alternatywnymi modelami ekonomicznymi, takimi jak mutualizm, kolektywizm czy libertariański komunizm, odrzucając zarówno kontrolę państwa, jak i własność prywatną na rzecz układów zbiorowych.
question: Какво е основното несъгласие между либертарианците и либертарианците по отношение на икономическата организация?
answer: Либертарианците подкрепят частната собственост и свободните пазари, докато либертарианците се противопоставят на капитализма и се застъпват за колективната собственост
wrong_answers:
  - Либертарианците подкрепят държавното регулиране на пазарите, докато либертарианците подкрепят пълното икономическо дерегулиране
  - Либертарианците се противопоставят на всички форми на собственост, докато либертарианците защитават индивидуалните права на собственост в рамките на капитализма
  - Либертарианците подкрепят контролираната от държавата икономика, докато либертарианците се застъпват за приватизация на всички обществени услуги
explanation: |
  Основното икономическо разделение се дължи на противоположните им възгледи за собствеността и капитализма. Либертарианците вярват, че правата на частна собственост и свободният пазар
  капитализъм са от съществено значение за индивидуалната свобода, докато либертарианците (анархисти-социалисти) смятат, че частната собственост е кражба, а капитализмът е потиснически по своята същност. Вместо това либертарианците се застъпват за алтернативни икономически модели като мутуализъм, колективизъм или либертариански комунизъм, като отхвърлят както държавния контрол, така и частната собственост в полза на колективни споразумения.
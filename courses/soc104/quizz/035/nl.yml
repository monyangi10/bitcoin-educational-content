question: Wat is het fundamentele verschil van mening tussen libertariërs en libertairen over economische organisatie?
answer: Libertariërs steunen privébezit en vrije markten, terwijl libertairen tegen kapitalisme zijn en voor collectief eigendom pleiten
wrong_answers:
  - Libertariërs zijn voor overheidsregulering van markten, terwijl libertairen voorstander zijn van volledige deregulering van de economie
  - Libertariërs zijn tegen alle vormen van eigendom, terwijl libertairen individuele eigendomsrechten binnen het kapitalisme verdedigen
  - Libertariërs zijn voorstander van door de staat gecontroleerde economieën, terwijl libertairen voorstander zijn van privatisering van alle openbare diensten
explanation: |
  De belangrijkste economische kloof komt voort uit hun tegengestelde opvattingen over eigendom en kapitalisme. Libertariërs geloven dat privé-eigendomsrechten en vrijemarktkapitalisme essentieel zijn voor individuele vrijheid
  kapitalisme essentieel zijn voor individuele vrijheid, terwijl libertairen (anarchistische socialisten) privébezit zien als diefstal en kapitalisme als inherent onderdrukkend. Libertairen pleiten in plaats daarvan voor alternatieve economische modellen zoals mutualisme, collectivisme of libertair communisme, waarbij ze zowel staatscontrole als privébezit afwijzen ten gunste van collectieve regelingen.
question: ¿Cuál es el desacuerdo fundamental entre libertarios y libertaires respecto a la organización económica?
answer: Los libertarios apoyan la propiedad privada y el libre mercado, mientras que los liberales se oponen al capitalismo y abogan por la propiedad colectiva
wrong_answers:
  - Los libertarios están a favor de la regulación gubernamental de los mercados, mientras que los liberales apoyan la desregulación económica total
  - Los libertarios se oponen a toda forma de propiedad, mientras que los libertaires defienden el derecho de propiedad individual dentro del capitalismo
  - Los libertarios apoyan las economías controladas por el Estado, mientras que los libertaires abogan por la privatización de todos los servicios públicos
explanation: |
  La principal división económica proviene de sus opiniones opuestas sobre la propiedad y el capitalismo. Los libertarios creen que los derechos de propiedad privada y el
  y el capitalismo de libre mercado son esenciales para la libertad individual, mientras que los libertarios (socialistas anarquistas) consideran la propiedad privada como un robo y el capitalismo como algo inherentemente opresivo. Los libertarios abogan por modelos económicos alternativos como el mutualismo, el colectivismo o el comunismo libertario, rechazando tanto el control estatal como la propiedad privada en favor de acuerdos colectivos.
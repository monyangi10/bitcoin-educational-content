question: ความขัดแย้งพื้นฐานระหว่างลิเบอร์ทาเรียนส์และลิเบอร์แตร์เกี่ยวกับการจัดระเบียบเศรษฐกิจคืออะไร?
answer: พวกเสรีนิยมสนับสนุนทรัพย์สินส่วนตัวและตลาดเสรี ในขณะที่พวกเสรีนิยมต่อต้านระบบทุนนิยมและสนับสนุนการเป็นเจ้าของร่วมกัน
wrong_answers:
  - ลิเบอร์ทาเรียนสนับสนุนการควบคุมตลาดโดยรัฐบาล ในขณะที่ลิเบอร์แตร์สนับสนุนการยกเลิกการควบคุมทางเศรษฐกิจอย่างสมบูรณ์
  - ลิเบอร์ทาเรียนต่อต้านทุกรูปแบบของทรัพย์สิน ในขณะที่ลิเบอร์แตร์สนับสนุนสิทธิการเป็นเจ้าของส่วนบุคคลภายในระบบทุนนิยม
  - พวกเสรีนิยมสนับสนุนเศรษฐกิจที่ควบคุมโดยรัฐ ในขณะที่พวกเสรีนิยมสนับสนุนการแปรรูปรัฐวิสาหกิจทั้งหมด
explanation: |
  ความแตกแยกทางเศรษฐกิจหลักเกิดจากมุมมองที่ขัดแย้งกันเกี่ยวกับทรัพย์สินและระบบทุนนิยม เสรีนิยมเชื่อว่าสิทธิในทรัพย์สินส่วนบุคคลและระบบทุนนิยมตลาดเสรีเป็นสิ่งจำเป็นสำหรับเสรีภาพส่วนบุคคล ในขณะที่ลิเบอร์แตร์ (สังคมนิยมอนาธิปไตย) มองว่าทรัพย์สินส่วนบุคคลเป็นการขโมยและระบบทุนนิยมเป็นการกดขี่โดยเนื้อแท้ ลิเบอร์แตร์สนับสนุนโมเดลเศรษฐกิจทางเลือกเช่น มิวชวลลิสม์, คอลเลคทีฟวิสม์, หรือคอมมิวนิสต์เสรีนิยม โดยปฏิเสธทั้งการควบคุมของรัฐและการเป็นเจ้าของส่วนบุคคลเพื่อสนับสนุนการจัดการแบบรวมกลุ่ม
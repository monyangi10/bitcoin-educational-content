question: Apa ketidaksepakatan mendasar antara kaum libertarian dan libertarian mengenai organisasi ekonomi?
answer: Libertarian mendukung kepemilikan pribadi dan pasar bebas, sementara libertarian menentang kapitalisme dan menganjurkan kepemilikan kolektif
wrong_answers:
  - Libertarian mendukung regulasi pemerintah atas pasar, sementara libertarian mendukung deregulasi ekonomi secara menyeluruh
  - Libertarian menentang semua bentuk kepemilikan, sementara libertarian membela hak kepemilikan individu dalam kapitalisme
  - Libertarian mendukung ekonomi yang dikendalikan oleh negara, sementara libertarian menganjurkan privatisasi semua layanan publik
explanation: |
  Inti perpecahan ekonomi berasal dari pandangan mereka yang berlawanan tentang properti dan kapitalisme. Libertarian percaya bahwa hak milik pribadi dan pasar bebas
  kapitalisme sangat penting untuk kebebasan individu, sementara libertarian (sosialis anarkis) memandang kepemilikan pribadi sebagai pencurian dan kapitalisme secara inheren menindas. Libertarian menganjurkan model ekonomi alternatif seperti mutualisme, kolektivisme, atau komunisme libertarian, yang menolak kontrol negara dan kepemilikan pribadi dan mendukung pengaturan kolektif.
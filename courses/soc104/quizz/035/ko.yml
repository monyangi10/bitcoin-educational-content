question: 경제 조직과 관련하여 자유주의자들과 자유주의자들의 근본적인 의견 차이는 무엇인가요?
answer: 자유주의자들은 사유 재산과 자유 시장을 지지하는 반면, 자유주의자들은 자본주의에 반대하고 집단 소유를 옹호합니다
wrong_answers:
  - 자유주의자들은 정부의 시장 규제에 찬성하는 반면, 자유주의자들은 완전한 경제 규제 완화를 지지합니다
  - 자유주의자들은 모든 형태의 재산에 반대하는 반면, 자유주의자들은 자본주의 내에서 개인의 소유권을 옹호합니다
  - 자유주의자들은 국가가 통제하는 경제를 지지하는 반면, 자유주의자들은 모든 공공 서비스의 민영화를 주장합니다
explanation: |
  핵심적인 경제적 분열은 재산과 자본주의에 대한 상반된 견해에서 비롯됩니다. 자유주의자들은 사유 재산권과 자유 시장
  자본주의가 개인의 자유를 위해 필수적이라고 믿는 반면, 자유주의자(무정부주의 사회주의자)는 사유재산은 도둑질이고 자본주의는 본질적으로 억압적이라고 봅니다. 대신 자유주의자들은 상호주의, 집단주의 또는 자유주의적 공산주의와 같은 대안 경제 모델을 옹호하며 국가 통제와 사적 소유를 모두 거부하고 집단적 협정을 선호합니다.
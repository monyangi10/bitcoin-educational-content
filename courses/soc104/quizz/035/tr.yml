question: Liberteryenler ve liberteryenler arasındaki ekonomik örgütlenmeye ilişkin temel anlaşmazlık nedir?
answer: Liberteryenler özel mülkiyeti ve serbest piyasayı desteklerken, liberteryenler kapitalizme karşı çıkar ve kolektif mülkiyeti savunurlar
wrong_answers:
  - Liberteryenler piyasaların devlet tarafından düzenlenmesinden yanayken, liberteryenler ekonominin tamamen kuralsızlaştırılmasını desteklemektedir
  - Liberteryenler her türlü mülkiyete karşı çıkarken, liberaller kapitalizm içinde bireysel mülkiyet haklarını savunurlar
  - Liberteryenler devlet kontrolündeki ekonomileri desteklerken, liberaller tüm kamu hizmetlerinin özelleştirilmesini savunurlar
explanation: |
  Temel ekonomik bölünme, mülkiyet ve kapitalizm konusundaki karşıt görüşlerinden kaynaklanmaktadır. Liberteryenler özel mülkiyet haklarına ve serbest piyasaya inanırlar
  kapitalizmin bireysel özgürlük için gerekli olduğunu savunurken, libertaires (anarşist sosyalistler) özel mülkiyeti hırsızlık ve kapitalizmi de doğası gereği baskıcı olarak görmektedir. Libertaires bunun yerine mutualizm, kolektivizm veya liberter komünizm gibi alternatif ekonomik modelleri savunur ve kolektif düzenlemeler lehine hem devlet kontrolünü hem de özel mülkiyeti reddeder.
question: Mikä on libertaristien ja libertaareiden välinen perusero talouden järjestämisestä?
answer: Libertaristit kannattavat yksityisomaisuutta ja vapaita markkinoita, kun taas libertaarit vastustavat kapitalismia ja kannattavat yhteisomistusta
wrong_answers:
  - Libertaristit kannattavat markkinoiden valtiollista sääntelyä, kun taas libertaarit kannattavat talouden täydellistä sääntelyn purkamista
  - Libertaristit vastustavat kaikenlaista omistusta, kun taas libertaarit puolustavat yksilön omistusoikeuksia kapitalismissa
  - Libertaristit kannattavat valtiojohtoista taloutta, kun taas libertaarit kannattavat kaikkien julkisten palvelujen yksityistämistä
explanation: |
  Keskeinen taloudellinen ero johtuu heidän vastakkaisista näkemyksistään omaisuudesta ja kapitalismista. Libertaristit uskovat yksityisomistusoikeuksiin ja vapaisiin markkinoihin
  kapitalismi ovat yksilönvapauden kannalta välttämättömiä, kun taas libertaarit (anarkistiset sosialistit) pitävät yksityisomaisuutta varkautena ja kapitalismia luonnostaan alistavana. Libertaires sen sijaan kannattaa vaihtoehtoisia talousmalleja, kuten mutualismia, kollektivismia tai libertaarista kommunismia, joissa hylätään sekä valtion valvonta että yksityisomistus kollektiivisten järjestelyjen hyväksi.
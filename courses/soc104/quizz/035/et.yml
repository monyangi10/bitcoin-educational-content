question: Milline on libertaarlaste ja libertaarlaste põhimõtteline erimeelsus majanduskorralduse osas?
answer: Libertaarid toetavad eraomandit ja vaba turgu, samas kui libertaarid on kapitalismi vastu ja pooldavad kollektiivset omandit
wrong_answers:
  - Libertaarid pooldavad turgude riiklikku reguleerimist, samas kui libertaarid toetavad majanduse täielikku dereguleerimist
  - Libertaarid on igasuguse omandi vastu, samas kui libertaarid kaitsevad individuaalset omandiõigust kapitalismi raames
  - Libertaarid toetavad riigi kontrolli all olevat majandust, samas kui libertaarid pooldavad kõigi avalike teenuste erastamist
explanation: |
  Põhiline majanduslik lõhe tuleneb nende vastandlikest vaadetest omandile ja kapitalismile. Libertaarid usuvad eraomandiõigustesse ja vabaturgudesse
  kapitalism on individuaalse vabaduse jaoks hädavajalikud, samas kui libertaarid (anarhistlikud sotsialistid) peavad eraomandit varguseks ja kapitalismi olemuslikult rõhuvaks. Libertaarid pooldavad hoopis alternatiivseid majandusmudeleid, nagu mutualism, kollektivism või libertaarne kommunism, mis lükkavad tagasi nii riikliku kontrolli kui ka eraomandi kollektiivse korralduse kasuks.
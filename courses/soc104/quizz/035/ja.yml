question: 自由主義者と自由主義者の間で、経済組織に関して根本的に意見の相違があるのはなぜですか？
answer: リバタリアンは私有財産と自由市場を支持し、リベラリストは資本主義に反対し、集団所有を主張する。
wrong_answers:
  - リバタリアンは政府による市場規制を支持し、リベラリストは完全な経済規制緩和を支持する。
  - リバタリアンはあらゆる形態の財産に反対するが、リバテールは資本主義の中で個人の所有権を擁護する
  - リバタリアンは国家統制経済を支持し、リベラリストはあらゆる公共サービスの民営化を主張する。
explanation: |
  経済的な対立の核心は、財産と資本主義に対する両者の見解の対立から生じている。リバタリアンは、私有財産権と自由市場資本主義が個人の自由にとって不可欠だと考えている。
  資本主義が個人の自由にとって不可欠であると考えるのに対し、リバタリアン（無政府社会主義者）は私有財産を窃盗とみなし、資本主義は本質的に抑圧的であると考える。リベラリストはその代わりに、相互主義、集団主義、自由主義的共産主義などの代替経済モデルを提唱し、集団的な取り決めを支持して国家管理と私的所有権の両方を拒否する。
question: Ni kutokubaliana gani kwa msingi kati ya wanaliberali na wanaliberali kuhusu upangaji wa kiuchumi?
answer: Wanaliberali wanaunga mkono mali binafsi na masoko huria, huku wanaliberali wakipinga ubepari na kutetea umiliki wa pamoja
wrong_answers:
  - Wanaharakati wa uhuru wanapendelea udhibiti wa serikali wa masoko, huku wanaharakati wa uhuru wakiunga mkono kuondolewa kabisa kwa udhibiti wa kiuchumi
  - Wanaliberali wanapinga aina zote za mali, huku wanaliberali wakitetea haki za umiliki wa mtu binafsi ndani ya ubepari
  - Wanaharakati wa uhuru wanaunga mkono uchumi unaodhibitiwa na serikali, huku wanaharakati wa uhuru wakitetea ubinafsishaji wa huduma zote za umma
explanation: |
  Mgawanyiko mkuu wa kiuchumi unatokana na mitazamo yao inayopingana kuhusu mali na ubepari. Wanaliberali wanaamini haki za mali binafsi na ubepari wa soko huria ni muhimu kwa uhuru wa mtu binafsi, huku wanaliberali (wanajamaa wa anarchist) wakiona mali binafsi kama wizi na ubepari kama ukandamizaji wa kiasili. Badala yake, wanaliberali wanatetea mifumo mbadala ya kiuchumi kama vile ushirikina, ujumuishaji, au ukomunisti wa uhuru, wakikataa udhibiti wa serikali na umiliki binafsi badala ya mipango ya pamoja.
question: Ni kutokubaliana gani kwa msingi kati ya wanalibertarian na wanalibertaire kuhusu upangaji wa kiuchumi?
answer: wanalibertarian wanaunga mkono mali binafsi na masoko huria, huku wanalibertaire wakipinga ubepari na kutetea umiliki wa pamoja
wrong_answers:
  - Wanaharakati wa uhuru wanapendelea udhibiti wa serikali wa masoko, huku wanaharakati wa uhuru wakiunga mkono kuondolewa kabisa kwa udhibiti wa kiuchumi
  - Wanalibertarian wanapinga aina zote za mali, huku wanalibertaire wakitetea haki za umiliki wa mtu binafsi ndani ya ubepari
  - Wanaharakati wa uhuru wanaunga mkono uchumi unaodhibitiwa na serikali, huku wanaharakati wa uhuru wakitetea ubinafsishaji wa huduma zote za umma
explanation: |
  Mgawanyiko mkuu wa kiuchumi unatokana na mitazamo yao inayopingana kuhusu mali na ubepari. Wanalibertarian wanaamini haki za mali binafsi na ubepari wa soko huria ni muhimu kwa uhuru wa mtu binafsi, huku wanalibertaire (wanajamaa wa anarchist) wakiona mali binafsi kama wizi na ubepari kama ukandamizaji wa kiasili. Badala yake, wanalibertaire wanatetea mifumo mbadala ya kiuchumi kama vile ushirikina, ujumuishaji, au ukomunisti wa uhuru, wakikataa udhibiti wa serikali na umiliki binafsi badala ya mipango ya pamoja.

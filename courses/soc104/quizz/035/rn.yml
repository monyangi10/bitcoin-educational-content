question: Ni ukutumvikana gute kw’ishimikiro hagati y’abaharanira umwidegemvyo n’abaharanira umwidegemvyo ku bijanye n’imitunganirize y’ubutunzi?
answer: Abaharanira umwidegemvyo bashigikira umutungo w’abantu ku giti cabo n’amasoko y’ubwigenge, mu gihe abaharanira umwidegemvyo barwanya ubu kapitalizimu kandi bagashigikira ubutunzi bw’abantu bose .
wrong_answers:
  - Abaharanira umwidegemvyo bashigikiye ko Leta itegeka amasoko, mu gihe abaharanira umwidegemvyo bashigikiye gukuraho amategeko agenga ubutunzi
  - Abaharanira umwidegemvyo barwanya ubwoko bwose bw’itunga, mu gihe abaharanira umwidegemvyo barwanira uburenganzira bw’umuntu ku giti ciwe mu bu kapitalizimu .
  - Abaharanira umwidegemvyo bashigikira ubutunzi bugenzurwa na Leta, mu gihe abaharanira umwidegemvyo bashigikira ko ibikorwa vyose vya Leta bihindurwa ivy’abikorera ku giti cabo .
explanation: |
  Amacakubiri nyamukuru y’ubutunzi akomoka ku vyiyumviro vyabo bitandukanye ku bijanye n’itunga n’ubutunzi. Abaharanira umwidegemvyo bemera uburenganzira bw'umuntu ku giti ciwe n'isoko ry'ubwigenge 
  ubu kapitalizimu ni ngirakamaro ku mwidegemvyo w’umuntu ku giti ciwe, mu gihe aba libertaires (abasosiyalisiti b’abanyagitugu) babona ko umutungo w’umuntu ku giti ciwe ari ubusuma, ubukapitalizimu na bwo bukaba ari ubukandamiza busanzwe. Ahubwo aba Libertaires bavuganira ubundi buryo bw’ubutunzi nk’ubumwe, ubumwe, canke ubukomunisiti bw’ubwigenge, banka ubugenzuzi bwa Leta n’ubutunzi bw’abantu ku giti cabo kugira ngo bashigikire intunganyo rusangi.
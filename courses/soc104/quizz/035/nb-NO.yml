question: Hva er den grunnleggende uenigheten mellom libertarianere og liberalister når det gjelder økonomisk organisering?
answer: Libertarianere støtter privat eiendom og frie markeder, mens liberalister er motstandere av kapitalisme og tar til orde for kollektivt eierskap
wrong_answers:
  - Libertarianere går inn for statlig regulering av markeder, mens liberalister går inn for fullstendig økonomisk deregulering
  - Libertarianere er motstandere av alle former for eiendom, mens liberalister forsvarer individuell eiendomsrett innenfor kapitalismen
  - Libertarianere støtter statskontrollerte økonomier, mens libertaires tar til orde for privatisering av alle offentlige tjenester
explanation: |
  Den viktigste økonomiske skillelinjen ligger i deres ulike syn på eiendom og kapitalisme. Libertarianere mener at privat eiendomsrett og fri markedskapitalisme
  kapitalisme er avgjørende for individets frihet, mens libertaire (anarkistiske sosialister) ser på privat eiendom som tyveri og kapitalisme som iboende undertrykkende. Libertaires tar i stedet til orde for alternative økonomiske modeller som mutualisme, kollektivisme eller frihetlig kommunisme, og avviser både statlig kontroll og privat eierskap til fordel for kollektive ordninger.
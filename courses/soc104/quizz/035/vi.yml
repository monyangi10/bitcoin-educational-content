question: Sự bất đồng cơ bản giữa những người theo chủ nghĩa tự do và những người theo chủ nghĩa tự do cực đoan về tổ chức kinh tế là gì?
answer: Những người theo chủ nghĩa tự do ủng hộ quyền sở hữu tư nhân và thị trường tự do, trong khi những người theo chủ nghĩa tự do cực đoan phản đối chủ nghĩa tư bản và ủng hộ quyền sở hữu tập thể.
wrong_answers:
  - Những người theo chủ nghĩa tự do ủng hộ việc chính phủ điều tiết thị trường, trong khi những người theo chủ nghĩa tự do cực đoan ủng hộ việc bãi bỏ hoàn toàn các quy định kinh tế.
  - Những người theo chủ nghĩa tự do phản đối mọi hình thức sở hữu, trong khi những người theo chủ nghĩa tự do bảo vệ quyền sở hữu cá nhân trong khuôn khổ chủ nghĩa tư bản.
  - Những người theo chủ nghĩa tự do ủng hộ nền kinh tế do nhà nước kiểm soát, trong khi những người theo chủ nghĩa tự do cực đoan chủ trương tư nhân hóa tất cả các dịch vụ công cộng.
explanation: |
  Sự khác biệt cốt lõi về kinh tế bắt nguồn từ quan điểm đối lập của họ về quyền sở hữu và chủ nghĩa tư bản. Những người theo chủ nghĩa tự do tin rằng quyền sở hữu tư nhân và chủ nghĩa tư bản thị trường tự do là thiết yếu cho tự do cá nhân, trong khi những người theo chủ nghĩa tự do (chủ nghĩa xã hội vô chính phủ) coi quyền sở hữu tư nhân là trộm cắp và chủ nghĩa tư bản là áp bức. Thay vào đó, những người theo chủ nghĩa tự do ủng hộ các mô hình kinh tế thay thế như chủ nghĩa tương trợ, chủ nghĩa tập thể hoặc chủ nghĩa cộng sản tự do, bác bỏ cả sự kiểm soát của nhà nước và quyền sở hữu tư nhân để ủng hộ các thỏa thuận tập thể.
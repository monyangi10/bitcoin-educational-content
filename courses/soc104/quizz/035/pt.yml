question: Qual é o desacordo fundamental entre libertários e libertários relativamente à organização económica?
answer: Os libertários apoiam a propriedade privada e os mercados livres, enquanto os libertários se opõem ao capitalismo e defendem a propriedade colectiva
wrong_answers:
  - Os libertários são a favor da regulamentação governamental dos mercados, enquanto os libertários apoiam a desregulamentação económica total
  - Os libertários opõem-se a todas as formas de propriedade, enquanto os libertários defendem o direito de propriedade individual no capitalismo
  - Os libertários apoiam economias controladas pelo Estado, enquanto os libertários defendem a privatização de todos os serviços públicos
explanation: |
  A principal divisão económica resulta das suas opiniões opostas sobre a propriedade e o capitalismo. Os libertários acreditam que os direitos de propriedade privada e o capitalismo de mercado livre
  os libertários acreditam que os direitos de propriedade privada e o capitalismo de mercado livre são essenciais para a liberdade individual, enquanto os libertários (socialistas anarquistas) vêem a propriedade privada como um roubo e o capitalismo como inerentemente opressivo. Os libertários defendem modelos económicos alternativos como o mutualismo, o coletivismo ou o comunismo libertário, rejeitando tanto o controlo estatal como a propriedade privada em favor de acordos colectivos.
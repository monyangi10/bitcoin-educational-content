question: تفاوت اساسی بین لیبرتارین‌ها و لیبرتر‌ها در مورد سازماندهی اقتصادی چیست؟
answer: لیبرترین‌ها از مالکیت خصوصی و بازارهای آزاد حمایت می‌کنند، در حالی که لیبرترها با سرمایه‌داری مخالفند و از مالکیت جمعی حمایت می‌کنند.
wrong_answers:
  - لیبرتارین‌ها طرفدار تنظیم مقررات دولتی بازارها هستند، در حالی که لیبرترها از لغو کامل مقررات اقتصادی حمایت می‌کنند.
  - لیبرترین‌ها با همه اشکال مالکیت مخالفند، در حالی که لیبرترها از حقوق مالکیت فردی در چارچوب سرمایه‌داری دفاع می‌کنند.
  - لیبرتارین‌ها از اقتصادهای تحت کنترل دولت حمایت می‌کنند، در حالی که لیبرترها خواستار خصوصی‌سازی تمام خدمات عمومی هستند.
explanation: |
  تقسیم‌بندی اصلی اقتصادی از دیدگاه‌های متضاد آن‌ها درباره مالکیت و سرمایه‌داری ناشی می‌شود. لیبرتارین‌ها معتقدند که حقوق مالکیت خصوصی و سرمایه‌داری بازار آزاد برای آزادی فردی ضروری هستند، در حالی که لیبرترها (سوسیالیست‌های آنارشیست) مالکیت خصوصی را دزدی و سرمایه‌داری را ذاتاً سرکوبگر می‌دانند. لیبرترها به جای آن از مدل‌های اقتصادی جایگزین مانند متقابل‌گرایی، جمع‌گرایی یا کمونیسم لیبرتارین حمایت می‌کنند و کنترل دولتی و مالکیت خصوصی را به نفع ترتیبات جمعی رد می‌کنند.
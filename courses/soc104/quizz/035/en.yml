question: What is the fundamental disagreement between libertarians and libertaires regarding economic organization?
answer: Libertarians support private property and free markets, while libertaires oppose capitalism and advocate for collective ownership
wrong_answers:
  - Libertarians favor government regulation of markets, while libertaires support complete economic deregulation
  - Libertarians oppose all forms of property, while libertaires defend individual ownership rights within capitalism
  - Libertarians support state-controlled economies, while libertaires advocate for privatization of all public services
explanation: |
  The core economic divide stems from their opposing views on property and capitalism. Libertarians believe private property rights and free market capitalism are essential for individual freedom, while libertaires (anarchist socialists) view private property as theft and capitalism as inherently oppressive. Libertaires instead advocate for alternative economic models like mutualism, collectivism, or libertarian communism, rejecting both state control and private ownership in favor of collective arrangements.
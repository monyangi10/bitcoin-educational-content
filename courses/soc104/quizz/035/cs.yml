question: V čem spočívá zásadní neshoda mezi libertariány a libertaires ohledně organizace ekonomiky?
answer: Libertariáni podporují soukromé vlastnictví a volný trh, zatímco libertariáni jsou proti kapitalismu a prosazují kolektivní vlastnictví
wrong_answers:
  - Libertariáni podporují státní regulaci trhů, zatímco libertariáni podporují úplnou deregulaci ekonomiky
  - Libertariáni jsou proti všem formám vlastnictví, zatímco libertariáni hájí individuální vlastnická práva v rámci kapitalismu
  - Libertariáni podporují státem řízenou ekonomiku, zatímco libertariáni prosazují privatizaci všech veřejných služeb
explanation: |
  Základní ekonomický rozkol pramení z jejich protichůdných názorů na vlastnictví a kapitalismus. Libertariáni věří, že práva na soukromé vlastnictví a volný trh
  kapitalismus jsou nezbytné pro svobodu jednotlivce, zatímco libertariáni (anarchističtí socialisté) považují soukromé vlastnictví za krádež a kapitalismus za ve své podstatě utlačovatelský. Libertariáni naopak prosazují alternativní ekonomické modely, jako je mutualismus, kolektivismus nebo libertariánský komunismus, a odmítají jak státní kontrolu, tak soukromé vlastnictví ve prospěch kolektivního uspořádání.
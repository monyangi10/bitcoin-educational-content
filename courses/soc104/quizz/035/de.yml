question: Worin besteht die grundlegende Meinungsverschiedenheit zwischen Libertären und Libertären hinsichtlich der Wirtschaftsorganisation?
answer: Libertäre unterstützen Privateigentum und freie Märkte, während Libertäre den Kapitalismus ablehnen und für kollektives Eigentum eintreten
wrong_answers:
  - Libertäre befürworten eine staatliche Regulierung der Märkte, während Libertäre für eine vollständige Deregulierung der Wirtschaft eintreten
  - Libertäre lehnen alle Formen von Eigentum ab, während Libertäre die individuellen Eigentumsrechte im Kapitalismus verteidigen
  - Libertäre befürworten staatlich kontrollierte Volkswirtschaften, während Libertäre für die Privatisierung aller öffentlichen Dienstleistungen eintreten
explanation: |
  Die zentrale wirtschaftliche Kluft ergibt sich aus ihren gegensätzlichen Ansichten über Eigentum und Kapitalismus. Libertäre glauben, dass private Eigentumsrechte und der Kapitalismus des freien Marktes
  kapitalismus für die individuelle Freiheit unerlässlich sind, während Libertäre (anarchistische Sozialisten) Privateigentum als Diebstahl und Kapitalismus als von Natur aus unterdrückerisch ansehen. Libertäre setzen sich stattdessen für alternative Wirtschaftsmodelle wie Mutualismus, Kollektivismus oder libertären Kommunismus ein, die sowohl staatliche Kontrolle als auch Privateigentum zugunsten kollektiver Vereinbarungen ablehnen.
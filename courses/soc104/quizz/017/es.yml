question: Según el concepto del diagrama de Nolan, ¿cuál es el factor clave que distingue a las distintas filosofías políticas?
answer: El grado de control gubernamental sobre la acción humana en las esferas personal y económica
wrong_answers:
  - La preferencia por los valores tradicionales o por el cambio social progresista
  - El nivel de apoyo a la redistribución de la riqueza y a los programas de bienestar social
  - El compromiso con los derechos individuales o la responsabilidad colectiva
explanation: |
  La idea central del diagrama de Nolan es que la principal diferencia entre las filosofías políticas es el grado de control gubernamental sobre la acción humana, tanto en la esfera personal como en la económica
  tanto en la esfera personal como en la económica. Esto crea un modelo bidimensional en lugar de un simple espectro izquierda-derecha. Las otras opciones representan formas tradicionales de categorizar la política, pero pasan por alto la idea clave de que tanto la izquierda como la derecha pueden ser estatistas: difieren en las áreas en las que desean el control gubernamental, pero ambas tratan de utilizar el poder del Estado para imponer su visión a la sociedad.
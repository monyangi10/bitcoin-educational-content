question: Vilken är enligt Nolan-diagramkonceptet den viktigaste faktorn som skiljer olika politiska filosofier åt?
answer: Graden av statlig kontroll över människors agerande på det personliga och ekonomiska planet
wrong_answers:
  - Företräde för antingen traditionella värderingar eller progressiv social förändring
  - Nivån på stödet för omfördelning av välstånd och sociala välfärdsprogram
  - Engagemanget för antingen individuella rättigheter eller kollektivt ansvar
explanation: |
  Nolan-diagrammets centrala idé är att den största skillnaden mellan politiska filosofier är graden av statlig kontroll över mänskligt handlande i
  både personliga och ekonomiska sfärer. Detta skapar en tvådimensionell modell snarare än ett enkelt vänster-högerspektrum. De andra alternativen representerar traditionella sätt att kategorisera politik men missar den viktiga insikten att både vänster och höger kan vara statstrogna - de skiljer sig åt i vilka områden de vill ha statlig kontroll, men båda försöker använda statsmakten för att påtvinga samhället sin vision.
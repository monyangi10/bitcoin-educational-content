question: 놀란 다이어그램 개념에 따르면, 서로 다른 정치 철학을 구분하는 핵심 요소는 무엇인가요?
answer: 개인 및 경제 영역에서 인간의 행동에 대한 정부의 통제 정도
wrong_answers:
  - 전통적인 가치 또는 진보적인 사회 변화에 대한 선호도
  - 부의 재분배 및 사회 복지 프로그램에 대한 지원 수준
  - 개인의 권리 또는 집단적 책임에 대한 약속
explanation: |
  놀란 다이어그램의 핵심 아이디어는 정치 철학의 가장 큰 차이점은 개인과 경제 영역에서 인간의 행동에 대한 정부의 통제 정도라는 것입니다
  정부의 통제 정도라는 것입니다. 따라서 단순한 좌우 스펙트럼이 아닌 2차원적 모델이 만들어집니다. 다른 옵션은 정치를 분류하는 전통적인 방법을 나타내지만, 좌파와 우파 모두 정부의 통제를 원하는 영역은 다르지만 국가 권력을 사용하여 자신의 비전을 사회에 강요하려 한다는 핵심 통찰을 놓치고 있습니다.
question: Согласно концепции диаграммы Нолана, что является ключевым фактором, который отличает различные политические философии?
answer: Степень государственного контроля над действиями человека в личной и экономической сферах
wrong_answers:
  - Предпочтение либо традиционным ценностям, либо прогрессивным социальным изменениям
  - Уровень поддержки перераспределения богатства и программ социального обеспечения
  - Приверженность либо индивидуальным правам, либо коллективной ответственности
explanation: |
  Главная идея диаграммы Нолана заключается в том, что основное различие между политическими философиями заключается в степени правительственного контроля над действиями человека в
  личной и экономической сферах. Это создает двухмерную модель, а не простой спектр "левый-правый". Другие варианты представляют собой традиционные способы классификации политики, но упускают из виду ключевой момент: и левые, и правые могут быть статистами - они различаются тем, в каких областях они хотят государственного контроля, но и те, и другие стремятся использовать государственную власть для навязывания обществу своего видения.
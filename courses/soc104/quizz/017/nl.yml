question: Wat is volgens het concept van het Nolan-diagram de belangrijkste factor die verschillende politieke filosofieën van elkaar onderscheidt?
answer: De mate van overheidscontrole over menselijk handelen op persoonlijk en economisch gebied
wrong_answers:
  - De voorkeur voor ofwel traditionele waarden ofwel progressieve sociale verandering
  - De mate van steun voor herverdeling van rijkdom en sociale welvaartsprogramma's
  - De toewijding aan individuele rechten of collectieve verantwoordelijkheid
explanation: |
  Het centrale idee van het Nolan-diagram is dat het grootste verschil tussen politieke filosofieën de mate van overheidscontrole is over het menselijk handelen op zowel persoonlijk als economisch gebied
  zowel persoonlijk als economisch gebied. Dit creëert een tweedimensionaal model in plaats van een eenvoudig links-rechts spectrum. De andere opties vertegenwoordigen traditionele manieren om politiek te categoriseren, maar missen het belangrijke inzicht dat zowel links als rechts statistisch kunnen zijn - ze verschillen op welke gebieden ze overheidscontrole willen, maar beide willen staatsmacht gebruiken om hun visie aan de samenleving op te leggen.
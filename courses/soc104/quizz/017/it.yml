question: Secondo il concetto di diagramma di Nolan, qual è il fattore chiave che distingue le diverse filosofie politiche?
answer: Il grado di controllo governativo sull'azione umana nella sfera personale ed economica
wrong_answers:
  - La preferenza per i valori tradizionali o per il cambiamento sociale progressivo
  - Il livello di sostegno alla redistribuzione della ricchezza e ai programmi di assistenza sociale
  - L'impegno per i diritti individuali o per la responsabilità collettiva
explanation: |
  L'idea centrale del diagramma di Nolan è che la differenza principale tra le filosofie politiche è il grado di controllo governativo sull'azione umana sia nella sfera personale che in quella economica
  sfera personale ed economica. Questo crea un modello bidimensionale piuttosto che un semplice spettro destra-sinistra. Le altre opzioni rappresentano modi tradizionali di categorizzare la politica, ma non colgono l'idea chiave che sia la destra che la sinistra possono essere stataliste: differiscono in quali aree vogliono il controllo del governo, ma entrambe cercano di usare il potere dello Stato per imporre la loro visione alla società.
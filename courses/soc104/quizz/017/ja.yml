question: ノーラン・ダイアグラムの概念によれば、異なる政治哲学を区別する重要な要素は何か？
answer: 個人的・経済的領域における人間の行動に対する政府の統制の程度
wrong_answers:
  - 伝統的な価値観か進歩的な社会変革のどちらかを好むこと
  - 富の再分配と社会福祉プログラムに対する支持の度合い
  - 個人の権利または集団的責任のいずれかにコミットすること
explanation: |
  ノーラン・ダイアグラムの中心的な考え方は、政治哲学間の大きな違いは、個人と経済の両分野における人間の行動に対する政府のコントロールの度合いであるということである。
  個人的・経済的領域における人間の行動に対する政府のコントロールの度合いである。これにより、単純な左右のスペクトルではなく、2次元のモデルが生まれる。他の選択肢は、政治を分類する伝統的な方法を表しているが、左派も右派も国家主義的でありうるという重要な洞察を見逃している。つまり、どの領域で政府による統制を望むかは異なるが、どちらも国家権力を使って自分たちのビジョンを社会に押し付けようとしているのである。
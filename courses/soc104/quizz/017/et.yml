question: Milline on Nolani diagrammi kontseptsiooni kohaselt peamine tegur, mis eristab erinevaid poliitilisi filosoofiaid?
answer: Valitsuse kontrolli ulatus inimeste tegevuse üle isiklikul ja majanduslikul tasandil
wrong_answers:
  - Kas traditsiooniliste väärtuste või progressiivsete sotsiaalsete muutuste eelistamine
  - Toetuse tase rikkuse ümberjaotamisele ja sotsiaalhoolekande programmidele
  - Pühendumine kas individuaalsetele õigustele või kollektiivsele vastutusele
explanation: |
  Nolani diagrammi keskne mõte on, et peamine erinevus poliitiliste filosoofiate vahel on valitsuse kontrolli ulatus inimeste tegevuse üle, mis on
  nii isiklikus kui ka majanduslikus sfääris. See tekitab lihtsa vasak-parempoolse spektri asemel kahemõõtmelise mudeli. Teised valikud esindavad traditsioonilisi viise poliitika liigitamiseks, kuid jätavad tähelepanuta võtmetunnetuse, et nii vasak- kui ka parempoolsed võivad olla statistilised - nad erinevad selles, millistes valdkondades nad soovivad valitsuse kontrolli, kuid mõlemad püüavad kasutada riigivõimu, et suruda ühiskonnale peale oma nägemus.
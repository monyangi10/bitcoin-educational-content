question: Theo sơ đồ Nolan, yếu tố then chốt nào phân biệt các triết lý chính trị khác nhau?
answer: Mức độ kiểm soát của chính phủ đối với hành động của con người trong các lĩnh vực cá nhân và kinh tế.
wrong_answers:
  - Sự ưu tiên cho các giá trị truyền thống hoặc sự thay đổi xã hội tiến bộ.
  - Mức độ ủng hộ đối với các chương trình phân phối lại của cải và phúc lợi xã hội
  - Cam kết đối với quyền cá nhân hoặc trách nhiệm tập thể
explanation: |
  Ý tưởng trung tâm của sơ đồ Nolan là sự khác biệt chính giữa các triết lý chính trị nằm ở mức độ kiểm soát của chính phủ đối với hành động của con người trong cả lĩnh vực cá nhân và kinh tế. Điều này tạo ra một mô hình hai chiều thay vì một phổ tả-hữu đơn giản. Các lựa chọn khác thể hiện cách phân loại chính trị truyền thống nhưng bỏ qua nhận định quan trọng rằng cả tả và hữu đều có thể theo chủ nghĩa nhà nước - họ khác nhau ở những lĩnh vực mà họ muốn chính phủ kiểm soát, nhưng cả hai đều tìm cách sử dụng quyền lực nhà nước để áp đặt tầm nhìn của mình lên xã hội.
question: Prema konceptu Nolanovog dijagrama, ključni faktor koji razlikuje različite političke filozofije je stepen ekonomske i lične slobode.
answer: Stepen vladine kontrole nad ljudskim delovanjem u ličnoj i ekonomskoj sferi
wrong_answers:
  - Preferencija za tradicionalne vrednosti ili progresivne društvene promene
  - Nivo podrške za preraspodelu bogatstva i programe socijalne pomoći
  - Posvećenost ili individualnim pravima ili kolektivnoj odgovornosti
explanation: |
  Centralna ideja Nolanovog dijagrama je da je glavna razlika između političkih filozofija stepen vladine kontrole nad ljudskim delovanjem u ličnoj i ekonomskoj sferi. Ovo stvara dvodimenzionalni model umesto jednostavnog spektra levo-desno. Druge opcije predstavljaju tradicionalne načine kategorizacije politike, ali propuštaju ključni uvid da i levica i desnica mogu biti etatističke - razlikuju se u oblastima u kojima žele vladinu kontrolu, ali obe teže korišćenju državne moći da nametnu svoju viziju društvu.
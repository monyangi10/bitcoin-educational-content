question: Jaký je podle konceptu Nolanova diagramu klíčový faktor, který odlišuje různé politické filozofie?
answer: Míra vládní kontroly nad lidským jednáním v osobní a ekonomické sféře
wrong_answers:
  - Preference tradičních hodnot nebo progresivních společenských změn
  - Míra podpory přerozdělování bohatství a sociálních programů
  - Závazek k individuálním právům nebo kolektivní odpovědnosti
explanation: |
  Ústřední myšlenkou Nolanova diagramu je, že hlavní rozdíl mezi politickými filozofiemi spočívá v míře vládní kontroly nad lidským jednáním v oblasti politiky
  jak v osobní, tak v ekonomické sféře. To vytváří spíše dvourozměrný model než jednoduché levo-pravé spektrum. Ostatní možnosti představují tradiční způsoby kategorizace politiky, ale postrádají klíčový poznatek, že jak levice, tak pravice mohou být etatistické - liší se v tom, které oblasti chtějí mít pod kontrolou vlády, ale obě se snaží využít státní moc k tomu, aby společnosti vnutily svou vizi.
question: Was ist nach dem Konzept des Nolan-Diagramms der wichtigste Faktor, der die verschiedenen politischen Philosophien unterscheidet?
answer: Das Ausmaß der staatlichen Kontrolle über das menschliche Handeln im persönlichen und wirtschaftlichen Bereich
wrong_answers:
  - Bevorzugung traditioneller Werte oder progressiver sozialer Veränderungen
  - Der Grad der Unterstützung für Wohlstandsumverteilung und Sozialhilfeprogramme
  - Das Engagement für individuelle Rechte oder kollektive Verantwortung
explanation: |
  Der zentrale Gedanke des Nolan-Diagramms ist, dass der Hauptunterschied zwischen den politischen Philosophien im Ausmaß der staatlichen Kontrolle über das menschliche Handeln in
  sowohl im persönlichen als auch im wirtschaftlichen Bereich. Dadurch entsteht ein zweidimensionales Modell und nicht ein einfaches Links-Rechts-Spektrum. Die anderen Optionen stellen traditionelle Wege der Kategorisierung von Politik dar, lassen aber die wichtige Erkenntnis außer Acht, dass sowohl die Linke als auch die Rechte staatsgläubig sein können - sie unterscheiden sich darin, welche Bereiche sie staatlich kontrollieren wollen, aber beide versuchen, die Staatsmacht zu nutzen, um der Gesellschaft ihre Vision aufzuzwingen.
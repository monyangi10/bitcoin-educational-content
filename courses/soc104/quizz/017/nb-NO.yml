question: Hva er den viktigste faktoren som skiller ulike politiske filosofier fra hverandre, ifølge Nolan-diagramkonseptet?
answer: Graden av statlig kontroll over menneskelige handlinger på det personlige og økonomiske området
wrong_answers:
  - Preferansen for enten tradisjonelle verdier eller progressive samfunnsendringer
  - Støtten til omfordeling av rikdom og sosiale velferdsprogrammer
  - Forpliktelsen til enten individuelle rettigheter eller kollektivt ansvar
explanation: |
  Nolan-diagrammets hovedtanke er at den største forskjellen mellom politiske filosofier er graden av statlig kontroll over menneskelige handlinger i
  både personlige og økonomiske sfærer. Dette skaper en todimensjonal modell snarere enn et enkelt venstre-høyre-spektrum. De andre alternativene representerer tradisjonelle måter å kategorisere politikk på, men går glipp av den viktige innsikten at både høyre- og venstresiden kan være statsorienterte - de er forskjellige når det gjelder hvilke områder de ønsker statlig kontroll, men begge søker å bruke statsmakt til å påtvinge samfunnet sin visjon.
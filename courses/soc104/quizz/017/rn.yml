question: Dushingiye ku ciyumviro c’ikigereranyo ca Nolan, ni igiki nyamukuru gitandukanya filozofiya zitandukanye za politike?
answer: Urugero Leta igenzura ibikorwa vya muntu mu vy'umuntu ku giti ciwe no mu vy'ubutunzi
wrong_answers:
  - Guhitamwo ingingo ngenderwako za kera canke ihinduka ry'imibano ritera imbere
  - Urugero rw'ugushigikira ugusubira gusangira ubutunzi n'imigambi y'imibereho myiza
  - Ukwiyemeza uburenganzira bw'umuntu ku giti ciwe canke inshingano rusangi
explanation: |
  Iciyumviro nyamukuru c’ikigereranyo ca Nolan ni uko itandukaniro rikomeye hagati ya filozofiya za politike ari urugero Leta igenzura ibikorwa vy’abantu mu 1914. 
  mu vy’umuntu ku giti ciwe no mu vy’ubutunzi. Ivyo bituma haba ikigereranyo c’ingero zibiri aho kuba ikigereranyo coroshe c’ibubamfu n’iburyo. Ayandi mahitamwo agereranya uburyo bwa kera bwo gushikiriza politike mu migwi ariko akabura ubumenyi nyamukuru bw’uko ibubamfu n’iburyo vyose bishobora kuba ivy’imibare - biratandukanye mu vyo bishaka ko Leta igenzura, ariko vyose birondera gukoresha ububasha bwa Leta kugira ngo bitegeke ivyiyumviro vyavyo ku kibano.
question: नोलन आरेख अवधारणा के अनुसार, विभिन्न राजनीतिक दर्शनों को अलग करने वाला प्रमुख कारक क्या है?
answer: व्यक्तिगत और आर्थिक क्षेत्रों में मानवीय कार्यों पर सरकारी नियंत्रण की सीमा
wrong_answers:
  - पारंपरिक मूल्यों या प्रगतिशील सामाजिक परिवर्तन में से किसी एक को प्राथमिकता देना
  - धन के पुनर्वितरण और सामाजिक कल्याण कार्यक्रमों के लिए समर्थन का स्तर
  - व्यक्तिगत अधिकारों या सामूहिक जिम्मेदारी के प्रति प्रतिबद्धता
explanation: |
  नोलन आरेख का केंद्रीय विचार यह है कि राजनीतिक दर्शनों के बीच प्रमुख अंतर व्यक्तिगत और आर्थिक दोनों क्षेत्रों में मानवीय क्रियाओं पर सरकारी नियंत्रण की मात्रा में निहित है। इससे एक सरल वाम-दक्षिण स्पेक्ट्रम के बजाय एक द्वि-आयामी मॉडल बनता है। अन्य विकल्प राजनीति को वर्गीकृत करने के पारंपरिक तरीकों का प्रतिनिधित्व करते हैं, लेकिन इस महत्वपूर्ण अंतर्दृष्टि को नज़रअंदाज़ करते हैं कि वाम और दक्षिण दोनों ही राज्यवादी हो सकते हैं - वे उन क्षेत्रों में भिन्न हैं जिनमें वे सरकारी नियंत्रण चाहते हैं, लेकिन दोनों ही समाज पर अपनी दृष्टि थोपने के लिए राज्य शक्ति का उपयोग करना चाहते हैं।
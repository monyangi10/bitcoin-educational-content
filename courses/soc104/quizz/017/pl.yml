question: Zgodnie z koncepcją diagramu Nolana, jaki jest kluczowy czynnik, który odróżnia różne filozofie polityczne?
answer: Stopień rządowej kontroli nad ludzkimi działaniami w sferze osobistej i gospodarczej
wrong_answers:
  - Preferowanie tradycyjnych wartości lub postępowych zmian społecznych
  - Poziom poparcia dla redystrybucji bogactwa i programów opieki społecznej
  - Zaangażowanie w prawa jednostki lub odpowiedzialność zbiorową
explanation: |
  Główną ideą diagramu Nolana jest to, że główną różnicą między filozofiami politycznymi jest stopień rządowej kontroli nad ludzkimi działaniami w sferze osobistej i ekonomicznej
  zarówno w sferze osobistej, jak i ekonomicznej. Tworzy to dwuwymiarowy model zamiast prostego spektrum lewica-prawica. Pozostałe opcje reprezentują tradycyjne sposoby kategoryzacji polityki, ale brakuje im kluczowego spostrzeżenia, że zarówno lewica, jak i prawica mogą być etatystyczne - różnią się w obszarach, w których chcą kontroli rządowej, ale obie dążą do wykorzystania władzy państwowej do narzucenia swojej wizji społeczeństwu.
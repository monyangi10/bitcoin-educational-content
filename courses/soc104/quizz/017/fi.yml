question: Mikä on Nolanin kaaviokäsitteen mukaan keskeinen tekijä, joka erottaa eri poliittiset filosofiat toisistaan?
answer: Ihmisten toimintaan henkilökohtaisella ja taloudellisella tasolla kohdistuvan valtiollisen valvonnan aste
wrong_answers:
  - Perinteisten arvojen tai edistyksellisen yhteiskunnallisen muutoksen suosiminen
  - Varallisuuden uudelleenjaon ja sosiaalihuolto-ohjelmien kannatuksen taso
  - Sitoutuminen joko yksilön oikeuksiin tai kollektiiviseen vastuuseen
explanation: |
  Nolanin kaavion keskeinen ajatus on, että suurin ero poliittisten filosofioiden välillä on se, missä määrin hallitus valvoo ihmisten toimintaa
  sekä henkilökohtaisella että taloudellisella tasolla. Tämä luo kaksiulotteisen mallin yksinkertaisen vasen-oikea -spektrin sijaan. Muut vaihtoehdot edustavat perinteisiä tapoja luokitella politiikkaa, mutta niistä puuttuu se keskeinen oivallus, että sekä vasemmisto että oikeisto voivat olla valtiovaltaisia - ne eroavat toisistaan sen suhteen, millä aloilla ne haluavat hallituksen kontrollia, mutta molemmat pyrkivät käyttämään valtiovaltaa saadakseen näkemyksensä läpi yhteiskunnassa.
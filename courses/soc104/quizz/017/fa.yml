question: بر اساس مفهوم نمودار نولان، عامل کلیدی که فلسفه‌های سیاسی مختلف را از یکدیگر متمایز می‌کند چیست؟
answer: درجه کنترل دولتی بر اقدامات انسانی در حوزه‌های شخصی و اقتصادی
wrong_answers:
  - ترجیح برای ارزش‌های سنتی یا تغییر اجتماعی پیشرو
  - سطح حمایت از توزیع مجدد ثروت و برنامه‌های رفاه اجتماعی
  - تعهد به حقوق فردی یا مسئولیت جمعی
explanation: |
  ایده مرکزی نمودار نولان این است که تفاوت اصلی بین فلسفه‌های سیاسی، میزان کنترل دولتی بر اقدامات انسانی در هر دو حوزه شخصی و اقتصادی است. این یک مدل دو بعدی ایجاد می‌کند به جای یک طیف ساده چپ-راست. گزینه‌های دیگر نمایانگر روش‌های سنتی دسته‌بندی سیاست هستند اما نکته کلیدی را از دست می‌دهند که هم چپ و هم راست می‌توانند دولت‌گرا باشند - آنها در زمینه‌هایی که می‌خواهند کنترل دولتی داشته باشند تفاوت دارند، اما هر دو به دنبال استفاده از قدرت دولت برای تحمیل دیدگاه خود بر جامعه هستند.
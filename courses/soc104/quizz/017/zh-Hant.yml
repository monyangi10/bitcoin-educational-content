question: 根據 Nolan 圖概念，區別不同政治哲學的關鍵因素是什麼？
answer: 政府在個人和經濟領域對人類行動的控制程度
wrong_answers:
  - 偏好傳統價值或進步的社會變革
  - 支持財富再分配和社會福利計畫的程度
  - 對個人權利或集體責任的承諾
explanation: |
  Nolan 圖表的中心思想是，政治哲學之間的主要差異在於政府對人類在個人與經濟領域的行為的控制程度。
  在個人和經濟領域。這創造了一個二維模型，而非簡單的左右光譜。其他選項代表了傳統的政治分類方式，但遺漏了一個關鍵的洞察，即左派和右派都可能是國家主義者 - 他們在希望政府控制的領域上有所不同，但都試圖利用國家權力將他們的願景強加於社會。
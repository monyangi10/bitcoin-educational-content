question: 根据诺兰图概念，区分不同政治哲学的关键因素是什么？
answer: 政府在个人和经济领域对人类行动的控制程度
wrong_answers:
  - 偏好传统价值观或进步的社会变革
  - 对财富再分配和社会福利计划的支持程度
  - 对个人权利或集体责任的承诺
explanation: |
  诺兰图的中心思想是，政治哲学之间的主要区别在于政府对人类在个人和经济领域的行为的控制程度。
  这就形成了一个二维模型，而不是简单的左右光谱。这就形成了一个二维模型，而不是简单的左右光谱。其他选项代表了传统的政治分类方法，但却忽略了一个关键观点，即左派和右派都可能是国家主义者--他们希望政府控制的领域不同，但都试图利用国家权力将自己的理念强加于社会。
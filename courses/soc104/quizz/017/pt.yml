question: De acordo com o conceito do diagrama de Nolan, qual é o principal fator que distingue as diferentes filosofias políticas?
answer: O grau de controlo governamental sobre a ação humana nas esferas pessoal e económica
wrong_answers:
  - A preferência pelos valores tradicionais ou pela mudança social progressiva
  - O nível de apoio à redistribuição da riqueza e aos programas de proteção social
  - O compromisso com os direitos individuais ou com a responsabilidade colectiva
explanation: |
  A ideia central do diagrama de Nolan é que a principal diferença entre as filosofias políticas é o grau de controlo governamental sobre a ação humana nas esferas pessoal e económica
  ação humana, tanto na esfera pessoal como na económica. Isto cria um modelo bidimensional em vez de um simples espetro esquerda-direita. As outras opções representam formas tradicionais de categorizar a política, mas ignoram a ideia-chave de que tanto a esquerda como a direita podem ser estatistas - diferem nas áreas em que pretendem o controlo governamental, mas ambas procuram utilizar o poder do Estado para impor a sua visão à sociedade.
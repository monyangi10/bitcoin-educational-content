question: Menurut konsep diagram Nolan, apa faktor kunci yang membedakan filosofi politik yang berbeda?
answer: Tingkat kontrol pemerintah atas tindakan manusia dalam bidang pribadi dan ekonomi
wrong_answers:
  - Preferensi untuk nilai-nilai tradisional atau perubahan sosial yang progresif
  - Tingkat dukungan terhadap program pembagian ulang kekayaan dan kesejahteraan sosial
  - Komitmen terhadap hak-hak individu atau tanggung jawab kolektif
explanation: |
  Ide utama dari diagram Nolan adalah bahwa perbedaan utama antara filosofi politik adalah tingkat kontrol pemerintah terhadap tindakan manusia dalam
  baik dalam bidang pribadi maupun ekonomi. Hal ini menciptakan model dua dimensi, bukan spektrum kiri-kanan yang sederhana. Pilihan-pilihan lain mewakili cara-cara tradisional dalam mengkategorikan politik, tetapi kehilangan wawasan kunci bahwa baik kiri maupun kanan dapat menjadi negarawan - mereka berbeda dalam bidang-bidang yang mereka inginkan untuk dikontrol oleh pemerintah, tetapi keduanya berusaha untuk menggunakan kekuasaan negara untuk memaksakan visi mereka pada masyarakat.

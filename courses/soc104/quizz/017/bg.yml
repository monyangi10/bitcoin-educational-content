question: Според концепцията на Нолановата диаграма кой е основният фактор, който разграничава различните политически философии?
answer: Степента на правителствен контрол върху човешките действия в личната и икономическата сфера
wrong_answers:
  - Предпочитанията към традиционните ценности или прогресивната социална промяна
  - Равнището на подкрепа за преразпределение на богатството и програми за социално подпомагане
  - Ангажимент за индивидуални права или колективна отговорност
explanation: |
  Основната идея на Нолановата диаграма е, че основната разлика между политическите философии е степента на правителствен контрол върху човешките действия в
  както в личната, така и в икономическата сфера. Това създава двуизмерен модел, а не прост ляво-дясно спектър. Другите варианти представляват традиционни начини за категоризиране на политиката, но пропускат ключовото прозрение, че и левите, и десните могат да бъдат етатистки - те се различават по това в кои области искат държавен контрол, но и двете се стремят да използват държавната власт, за да наложат своето виждане на обществото.
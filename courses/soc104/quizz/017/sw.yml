question: Kulingana na dhana ya mchoro wa Nolan, ni jambo gani muhimu linalotofautisha falsafa tofauti za kisiasa?
answer: Kiwango cha udhibiti wa serikali juu ya vitendo vya binadamu katika nyanja za kibinafsi na kiuchumi
wrong_answers:
  - Upendeleo wa maadili ya kitamaduni au mabadiliko ya kijamii yanayoendelea
  - Kiwango cha usaidizi kwa ajili ya ugawaji upya wa utajiri na programu za ustawi wa jamii
  - Kujitolea kwa haki za mtu binafsi au uwajibikaji wa pamoja
explanation: |
  Wazo kuu la mchoro wa Nolan ni kwamba tofauti kubwa kati ya falsafa za kisiasa ni kiwango cha udhibiti wa kiserikali juu ya vitendo vya binadamu katika nyanja za kibinafsi na kiuchumi. Hii huunda mfumo wa pande mbili badala ya wigo rahisi wa kushoto-kulia. Chaguzi zingine zinawakilisha njia za kitamaduni za kuainisha siasa lakini zinakosa ufahamu muhimu kwamba pande zote mbili za kushoto na kulia zinaweza kuwa za kitakwimu - zinatofautiana katika maeneo ambayo zinahitaji udhibiti wa kiserikali, lakini zote mbili zinatafuta kutumia nguvu ya serikali kulazimisha maono yao kwa jamii.
question: According to the Nolan diagram concept, what is the key factor that distinguishes different political philosophies?
answer: The degree of governmental control over human action in personal and economic spheres
wrong_answers:
  - The preference for either traditional values or progressive social change
  - The level of support for wealth redistribution and social welfare programs
  - The commitment to either individual rights or collective responsibility
explanation: |
  The Nolan diagram's central idea is that the major difference between political philosophies is the degree of governmental control over human action in both personal and economic spheres. This creates a two-dimensional model rather than a simple left-right spectrum. The other options represent traditional ways of categorizing politics but miss the key insight that both left and right can be statist - they differ in which areas they want governmental control, but both seek to use state power to impose their vision on society.
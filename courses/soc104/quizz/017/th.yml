question: ตามแนวคิดของแผนภาพโนแลน ปัจจัยสำคัญที่แยกแยะปรัชญาทางการเมืองต่างๆ คืออะไร?
answer: ระดับของการควบคุมโดยรัฐบาลต่อการกระทำของมนุษย์ในด้านส่วนบุคคลและเศรษฐกิจ
wrong_answers:
  - ความชื่นชอบในค่านิยมดั้งเดิมหรือการเปลี่ยนแปลงทางสังคมแบบก้าวหน้า
  - ระดับการสนับสนุนการกระจายความมั่งคั่งและโครงการสวัสดิการสังคม
  - ความมุ่งมั่นต่อสิทธิส่วนบุคคลหรือความรับผิดชอบร่วมกัน
explanation: |
  แนวคิดหลักของแผนภาพโนแลนคือความแตกต่างที่สำคัญระหว่างปรัชญาทางการเมืองคือระดับของการควบคุมโดยรัฐบาลต่อการกระทำของมนุษย์ในทั้งด้านส่วนบุคคลและเศรษฐกิจ สิ่งนี้สร้างแบบจำลองสองมิติแทนที่จะเป็นสเปกตรัมซ้าย-ขวาแบบง่าย ตัวเลือกอื่น ๆ แสดงถึงวิธีการดั้งเดิมในการจัดหมวดหมู่การเมืองแต่พลาดการเข้าใจที่สำคัญว่าทั้งซ้ายและขวาสามารถเป็นรัฐนิยมได้ - พวกเขาแตกต่างกันในพื้นที่ที่พวกเขาต้องการการควบคุมของรัฐบาล แต่ทั้งสองต้องการใช้พลังของรัฐเพื่อกำหนดวิสัยทัศน์ของพวกเขาต่อสังคม
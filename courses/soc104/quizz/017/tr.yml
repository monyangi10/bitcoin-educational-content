question: Nolan diyagramı kavramına göre, farklı siyasi felsefeleri birbirinden ayıran temel faktör nedir?
answer: Kişisel ve ekonomik alanlarda insan eylemleri üzerindeki hükümet kontrolünün derecesi
wrong_answers:
  - Geleneksel değerler ya da ilerici sosyal değişim tercihi
  - Servetin yeniden dağıtılması ve sosyal refah programlarına verilen destek düzeyi
  - Bireysel haklara ya da kolektif sorumluluğa bağlılık
explanation: |
  Nolan diyagramının ana fikri, siyasi felsefeler arasındaki temel farkın, insan eylemleri üzerindeki hükümet kontrolünün derecesi olduğudur
  hem kişisel hem de ekonomik alanlarda. Bu da basit bir sol-sağ spektrumundan ziyade iki boyutlu bir model yaratmaktadır. Diğer seçenekler siyaseti kategorize etmenin geleneksel yollarını temsil etmekte, ancak hem solun hem de sağın devletçi olabileceğine dair temel kavrayışı gözden kaçırmaktadır - hükümet kontrolünü istedikleri alanlarda farklılık gösterirler, ancak her ikisi de kendi vizyonlarını topluma empoze etmek için devlet gücünü kullanmaya çalışırlar.
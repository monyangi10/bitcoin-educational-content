question: Vilken är den grundläggande skillnaden mellan libertarianer och libertaires när det gäller samhällets och ekonomins organisation?
answer: Libertarianer försvarar privat egendom och fria marknader medan libertaire motsätter sig kapitalism och främjar kollektivt ägande
wrong_answers:
  - Libertarianer stöder statligt ingripande i ekonomin medan libertaires förespråkar fullständig ekonomisk avreglering
  - Libertarianer förespråkar våldsam revolution mot staten medan libertaires strävar efter fredlig samexistens med regeringen
  - Libertarianer förkastar alla former av individuell egendom medan libertaires starkt försvarar den personliga äganderätten
explanation: |
  Den centrala skillnaden ligger i deras motsatta syn på egendom och ekonomiska system. Libertarianer anser att privat egendom är avgörande för
  individuell frihet och stöder marknadskapitalism, medan libertaires (anarkister) ser privat egendom som stöld och kapitalism som förtryckande, och istället föredrar kollektivt ägande, kooperativ och alternativa ekonomiska modeller som mutualism eller libertariansk kommunism. Denna grundläggande oenighet om äganderätten präglar alla andra aspekter av deras respektive filosofier.
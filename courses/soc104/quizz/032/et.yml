question: Milline on libertaarlaste ja libertaarlaste põhimõtteline erinevus ühiskonna ja majanduse korralduse osas?
answer: Libertaarid kaitsevad eraomandit ja vaba turgu, samas kui libertaarid on kapitalismi vastu ja propageerivad kollektiivset omandit
wrong_answers:
  - Libertaarid toetavad riigi sekkumist majandusse, samas kui libertaarid pooldavad majanduse täielikku dereguleerimist
  - Libertaarid propageerivad vägivaldset revolutsiooni riigi vastu, samas kui libertaarid otsivad rahumeelset kooseksisteerimist valitsusega
  - Libertaarid lükkavad tagasi kõik individuaalse omandi vormid, samas kui libertaarid kaitsevad tugevalt isikliku omandiõigust
explanation: |
  Põhiline erinevus seisneb nende vastandlikes vaadetes omandi- ja majandussüsteemidele. Libertaarid usuvad, et eraomand on oluline, et
  individuaalset vabadust ja toetavad turukapitalismi, samas kui libertaarid (anarhistid) peavad eraomandit varguseks ja kapitalismi rõhuvaks, eelistades selle asemel kollektiivset omandit, ühistuid ja alternatiivseid majandusmudeleid, nagu mutualism või libertaarne kommunism. See põhimõtteline erimeelsus omandiõiguse osas kujundab nende filosoofiate kõiki teisi aspekte.
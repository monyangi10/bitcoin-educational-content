question: Jaka jest podstawowa różnica między libertarianami a wolnościowcami w kwestii organizacji społeczeństwa i gospodarki?
answer: Libertarianie bronią własności prywatnej i wolnego rynku, podczas gdy liberałowie sprzeciwiają się kapitalizmowi i promują kolektywną własność
wrong_answers:
  - Libertarianie popierają interwencję państwa w gospodarkę, podczas gdy liberałowie opowiadają się za całkowitą deregulacją gospodarki
  - Libertarianie promują gwałtowną rewolucję przeciwko państwu, podczas gdy liberałowie dążą do pokojowego współistnienia z rządem
  - Libertarianie odrzucają wszelkie formy własności indywidualnej, podczas gdy liberałowie zdecydowanie bronią praw własności osobistej
explanation: |
  Podstawowa różnica polega na ich przeciwstawnych poglądach na własność i systemy gospodarcze. Libertarianie uważają, że własność prywatna jest niezbędna dla
  wolności jednostki i wspierają kapitalizm rynkowy, podczas gdy libertarianie (anarchiści) postrzegają własność prywatną jako kradzież, a kapitalizm jako opresyjny, zamiast tego preferując kolektywną własność, spółdzielnie i alternatywne modele ekonomiczne, takie jak mutualizm lub libertariański komunizm. Ta fundamentalna różnica zdań w kwestii praw własności kształtuje wszystkie inne aspekty ich filozofii.
question: Ni itandukaniro irihe ry’ishimikiro riri hagati y’abaharanira umwidegemvyo n’abaharanira umwidegemvyo ku bijanye n’imitunganirize y’imibano n’ubutunzi?
answer: Abaharanira umwidegemvyo barwanira umutungo w'abantu ku giti cabo n'amasoko yidegemvya mu gihe abaharanira umwidegemvyo barwanya ubu kapitalizimu kandi bagateza imbere ubutunzi rusangi .
wrong_answers:
  - Abaharanira umwidegemvyo bashigikiye ko Leta yinjira mu bukungu mu gihe abaharanira umwidegemvyo bashigikira ko ubutunzi bwokurwaho burundu .
  - Abaharanira umwidegemvyo batera imbere mu guhindura ubukazi ku gihugu mu gihe abaharanira umwidegemvyo barondera kubana n'ubutegetsi mu mahoro .
  - Abaharanira umwidegemvyo banka ubwoko bwose bw'itunga ry'umuntu ku giti ciwe mu gihe abaharanira umwidegemvyo barwanira cane uburenganzira bw'umuntu ku giti ciwe .
explanation: |
  Itandukaniro nyamukuru riri mu vyiyumviro vyabo bihushanye ku bijanye n’itunga n’ubutunzi. Abaharanira umwidegemvyo bemera ko umutungo w’umuntu ku giti ciwe ari ngombwa kugira 
  umwidegemvyo w’umuntu ku giti ciwe no gushigikira ubu kapitalizimu bw’isoko, mu gihe aba libertaires (abanyagitugu) babona ko umutungo w’abantu ku giti cabo ari ubusuma, ubu kapitalizimu na bwo bakabona ko ari uguhahaza, ahubwo bagashigikira ubutunzi rusangi, amakoperative, n’ubundi buryo bw’ubutunzi nk’ubumwe canke ubukomunisimu bw’ubwigenge. Ukwo kutumvikana kw’ishimikiro ku vyerekeye uburenganzira bw’itunga ni kwo guhingura ibindi bice vyose vy’ubuhinga bwabo.
question: Liberteryenler ve liberteryenler arasında toplumun ve ekonominin örgütlenmesine ilişkin temel fark nedir?
answer: Liberteryenler özel mülkiyeti ve serbest piyasayı savunurken, liberteryenler kapitalizme karşı çıkar ve kolektif mülkiyeti teşvik eder
wrong_answers:
  - Liberteryenler devletin ekonomiye müdahalesini desteklerken, liberaller ekonominin tamamen serbestleştirilmesini savunurlar
  - Liberteryenler devlete karşı şiddet içeren devrimi teşvik ederken, libertaire'ler hükümetle barış içinde bir arada yaşama arayışındadır
  - Liberteryenler her türlü bireysel mülkiyeti reddederken, liberaller kişisel mülkiyet haklarını güçlü bir şekilde savunurlar
explanation: |
  Temel ayrım, mülkiyet ve ekonomik sistemler hakkındaki karşıt görüşlerinde yatmaktadır. Liberteryenler özel mülkiyetin ekonomik sistem için gerekli olduğuna inanırlar
  libertaires (anarşistler) özel mülkiyeti hırsızlık ve kapitalizmi baskıcı olarak görürken, bunun yerine kolektif mülkiyeti, kooperatifleri ve mutualizm veya liberter komünizm gibi alternatif ekonomik modelleri tercih ederler. Mülkiyet hakları konusundaki bu temel anlaşmazlık, her iki grubun felsefelerinin diğer tüm yönlerini şekillendirmektedir.
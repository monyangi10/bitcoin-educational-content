question: Koja je osnovna razlika između libertarijanaca i libertara u pogledu organizacije društva i ekonomije?
answer: Libertarijanci brane privatnu svojinu i slobodna tržišta dok se libertairi protive kapitalizmu i promovišu kolektivno vlasništvo
wrong_answers:
  - Libertarijanci podržavaju državnu intervenciju u ekonomiji dok libertairi zagovaraju potpunu deregulaciju ekonomije
  - Libertarijanci promovišu nasilnu revoluciju protiv države dok libertaires traže miran suživot sa vladom
  - Libertarijanci odbacuju sve oblike individualne svojine dok libertairi snažno brane prava lične svojine
explanation: |
  Osnovna razlika leži u njihovim suprotnim pogledima na imovinske i ekonomske sisteme. Libertarijanci veruju da je privatna svojina ključna za individualnu slobodu i podržavaju tržišni kapitalizam, dok libertairi (anarhisti) vide privatnu svojinu kao krađu, a kapitalizam kao represivan, umesto toga favorizujući kolektivno vlasništvo, zadruge i alternativne ekonomske modele poput mutualizma ili libertarijanskog komunizma. Ovo fundamentalno neslaganje oko imovinskih prava oblikuje sve druge aspekte njihovih filozofija.
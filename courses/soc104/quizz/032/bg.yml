question: Каква е основната разлика между либертарианците и либертарианците по отношение на организацията на обществото и икономиката?
answer: Либертарианците защитават частната собственост и свободните пазари, докато либертарианците се противопоставят на капитализма и насърчават колективната собственост
wrong_answers:
  - Либертарианците подкрепят държавната намеса в икономиката, докато либертарианците се застъпват за пълна икономическа дерегулация
  - Либертарианците насърчават насилствена революция срещу държавата, докато либертарианците се стремят към мирно съвместно съществуване с правителството
  - Либертарианците отхвърлят всички форми на индивидуална собственост, докато либертарианците твърдо защитават правото на лична собственост
explanation: |
  Основното различие се състои в противоположните им възгледи за собствеността и икономическите системи. Либертарианците вярват, че частната собственост е от съществено значение за
  индивидуалната свобода и подкрепят пазарния капитализъм, докато либертарианците (анархистите) смятат частната собственост за кражба, а капитализма - за потисничество, като вместо това предпочитат колективната собственост, кооперативите и алтернативните икономически модели като мутуализъм или либертариански комунизъм. Това фундаментално несъгласие по отношение на правата на собственост определя всички останали аспекти на съответните им философии.
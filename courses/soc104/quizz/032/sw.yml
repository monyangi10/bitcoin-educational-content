question: Kuna tofauti gani ya msingi kati ya wanalibertarian na wanalibertaire kuhusu mpangilio wa jamii na uchumi?
answer: Wanalibertarian hutetea mali binafsi na masoko huria huku wanalibertaire wakipinga ubepari na kukuza umiliki wa pamoja
wrong_answers:
  - Wanaharakati wa uhuru wanaunga mkono uingiliaji kati wa serikali katika uchumi huku wanaharakati wa uhuru wakitetea kuondolewa kabisa kwa udhibiti wa kiuchumi
  - Wanaharakati wa uhuru wanakuza mapinduzi ya vurugu dhidi ya serikali huku wanaharakati wa uhuru wakitafuta kuishi kwa amani na serikali.
  - Wanaharakati wa uhuru wanakataa aina zote za mali ya mtu binafsi huku wanaharakati wa uhuru wakitetea vikali haki za umiliki binafsi
explanation: |
  Tofauti kuu iko katika maoni yao yanayopingana kuhusu mali na mifumo ya kiuchumi. Wana-Libertarians wanaamini mali binafsi ni muhimu kwa uhuru wa mtu binafsi na wanaunga mkono ubepari wa soko, huku wana-Libertaries (wana-Anarchist) wakiona mali binafsi kama wizi na ubepari kama ukandamizaji, badala yake wanapendelea umiliki wa pamoja, vyama vya ushirika, na mifumo mbadala ya kiuchumi kama vile ushirikishwaji au ukomunisti wa uhuru. Kutokubaliana huku kwa msingi kuhusu haki za mali huunda vipengele vingine vyote vya falsafa zao husika.

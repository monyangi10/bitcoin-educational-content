question: Jaký je zásadní rozdíl mezi libertariány a libertaires, pokud jde o uspořádání společnosti a ekonomiky?
answer: Libertariáni hájí soukromé vlastnictví a volný trh, zatímco libertariáni jsou proti kapitalismu a podporují kolektivní vlastnictví
wrong_answers:
  - Libertariáni podporují státní zásahy do ekonomiky, zatímco libertariáni prosazují úplnou deregulaci ekonomiky
  - Libertariáni podporují násilnou revoluci proti státu, zatímco libertariáni usilují o mírové soužití s vládou
  - Libertariáni odmítají všechny formy individuálního vlastnictví, zatímco libertariáni důrazně hájí právo na osobní vlastnictví
explanation: |
  Základní rozdíl spočívá v jejich protichůdných názorech na vlastnictví a ekonomické systémy. Libertariáni se domnívají, že soukromé vlastnictví je nezbytné k tomu
  a podporují tržní kapitalismus, zatímco libertariáni (anarchisté) považují soukromé vlastnictví za krádež a kapitalismus za útlak a upřednostňují kolektivní vlastnictví, družstva a alternativní ekonomické modely, jako je mutualismus nebo libertariánský komunismus. Tento zásadní nesoulad v otázce vlastnických práv formuje všechny ostatní aspekty jejich filozofií.
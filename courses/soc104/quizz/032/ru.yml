  Основное различие заключается в их противоположных взглядах на собственность и экономические системы. Либертарианцы считают, что частная собственность необходима для
  в то время как либертарианцы (анархисты) считают частную собственность кражей, а капитализм - угнетением, отдавая предпочтение коллективной собственности, кооперативам и альтернативным экономическим моделям, таким как мутуализм или либертарный коммунизм. Это фундаментальное разногласие по вопросу прав собственности определяет все остальные аспекты их философий.
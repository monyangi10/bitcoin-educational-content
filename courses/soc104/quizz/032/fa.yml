question: تفاوت اساسی بین لیبرتارین‌ها و لیبرترها در مورد سازماندهی جامعه و اقتصاد چیست؟
answer: لیبرتارین‌ها از مالکیت خصوصی و بازارهای آزاد دفاع می‌کنند در حالی که لیبرترها با سرمایه‌داری مخالفند و مالکیت جمعی را ترویج می‌کنند.
wrong_answers:
  - لیبرترین‌ها از مداخله دولت در اقتصاد حمایت می‌کنند در حالی که لیبرترها طرفدار رفع کامل مقررات اقتصادی هستند.
  - لیبرترین‌ها ترویج انقلاب خشونت‌آمیز علیه دولت را می‌دهند در حالی که لیبرترها به دنبال همزیستی مسالمت‌آمیز با دولت هستند.
  - لیبرتارین‌ها همه اشکال مالکیت فردی را رد می‌کنند، در حالی که لیبرترها به شدت از حقوق مالکیت شخصی دفاع می‌کنند.
explanation: |
  تفاوت اصلی در دیدگاه‌های متضاد آن‌ها نسبت به مالکیت و سیستم‌های اقتصادی نهفته است. لیبرترین‌ها معتقدند که مالکیت خصوصی برای آزادی فردی ضروری است و از سرمایه‌داری بازار حمایت می‌کنند، در حالی که لیبرترها (آنارشیست‌ها) مالکیت خصوصی را دزدی و سرمایه‌داری را سرکوبگر می‌دانند و به جای آن از مالکیت جمعی، تعاونی‌ها و مدل‌های اقتصادی جایگزین مانند متقابل‌گرایی یا کمونیسم لیبرترین حمایت می‌کنند. این اختلاف اساسی در حقوق مالکیت، سایر جنبه‌های فلسفه‌های مربوطه آن‌ها را شکل می‌دهد.
question: Wat is het fundamentele verschil tussen libertariërs en libertairen met betrekking tot de organisatie van de samenleving en de economie?
answer: Libertariërs verdedigen privébezit en vrije markten, terwijl libertairen tegen kapitalisme zijn en collectief eigendom promoten
wrong_answers:
  - Libertariërs zijn voorstander van staatsinterventie in de economie, terwijl libertairen voorstander zijn van volledige deregulering van de economie
  - Libertariërs promoten een gewelddadige revolutie tegen de staat, terwijl libertairen streven naar vreedzame coëxistentie met de overheid
  - Libertariërs verwerpen alle vormen van individueel eigendom, terwijl libertairen sterk opkomen voor persoonlijke eigendomsrechten
explanation: |
  Het belangrijkste verschil ligt in hun tegengestelde opvattingen over eigendom en economische systemen. Libertariërs geloven dat privébezit essentieel is voor individuele vrijheid en steunen het marktkapitalisme
  individuele vrijheid en steunen het marktkapitalisme, terwijl libertairen (anarchisten) privébezit als diefstal en kapitalisme als onderdrukkend zien en in plaats daarvan de voorkeur geven aan collectief eigendom, coöperaties en alternatieve economische modellen zoals mutualisme of libertair communisme. Dit fundamentele meningsverschil over eigendomsrechten vormt alle andere aspecten van hun respectievelijke filosofieën.
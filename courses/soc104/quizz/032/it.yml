question: Qual è la differenza fondamentale tra libertari e liberisti per quanto riguarda l'organizzazione della società e dell'economia?
answer: I libertari difendono la proprietà privata e il libero mercato, mentre i liberisti si oppongono al capitalismo e promuovono la proprietà collettiva
wrong_answers:
  - I libertari sostengono l'intervento dello Stato nell'economia, mentre i liberisti sono favorevoli a una completa deregolamentazione economica
  - I libertari promuovono la rivoluzione violenta contro lo Stato, mentre i liberti cercano una coesistenza pacifica con il governo
  - I libertari rifiutano ogni forma di proprietà individuale, mentre i liberisti difendono strenuamente i diritti di proprietà personale
explanation: |
  La distinzione principale risiede nei loro punti di vista opposti sulla proprietà e sui sistemi economici. I libertari credono che la proprietà privata sia essenziale per la
  libertà individuale e sostengono il capitalismo di mercato, mentre i libertaires (anarchici) considerano la proprietà privata un furto e il capitalismo un'oppressione, favorendo invece la proprietà collettiva, le cooperative e modelli economici alternativi come il mutualismo o il comunismo libertario. Questo disaccordo fondamentale sui diritti di proprietà influenza tutti gli altri aspetti delle rispettive filosofie.
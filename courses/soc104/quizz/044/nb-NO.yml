question: Hva er ifølge sosialistisk økonomisk filosofi den viktigste begrunnelsen for sterk statlig kontroll over økonomien?
answer: Å sikre rettferdighet ved å gi alle mulighet til å dekke sine grunnleggende behov gjennom omfordeling av rikdom
wrong_answers:
  - Å maksimere individuell økonomisk frihet og fremme konkurransedyktig markedsdynamikk
  - Å eliminere alle former for statlig inngripen og skape en spontan markedsorden
  - Å konsentrere rikdommen blant de mest produktive medlemmene av samfunnet for å oppnå effektivitet
explanation: |
  Sosialistisk økonomisk filosofi prioriterer rettferdighet fremfor effektivitet, og ser sterk statlig kontroll som nødvendig for å omfordele velstand og sikre at alle
  kan dekke sine grunnleggende behov. Sosialister misliker frie markeder, og ser på dem som systemer som gjør det mulig for de sterke å utnytte de svake. Dette står i skarp kontrast til liberal økonomisk filosofi, som favoriserer minimal statlig inngripen og spontan markedsorden. De gale svarene gjenspeiler liberale eller kapitalistiske tilnærminger som sosialister eksplisitt avviser, ettersom de mener at disse systemene opprettholder ulikhet i stedet for å utjevne den.
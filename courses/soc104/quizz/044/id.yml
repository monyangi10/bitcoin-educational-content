question: Menurut filosofi ekonomi sosialis, apa pembenaran utama untuk kontrol negara yang kuat atas ekonomi?
answer: Memastikan kesetaraan dengan memungkinkan setiap orang untuk memenuhi kebutuhan dasar mereka melalui redistribusi kekayaan
wrong_answers:
  - Untuk memaksimalkan kebebasan ekonomi individu dan mendorong dinamika pasar yang kompetitif
  - Menghilangkan semua bentuk intervensi pemerintah dan menciptakan ketertiban pasar yang spontan
  - Untuk memusatkan kekayaan di antara anggota masyarakat yang paling produktif demi efisiensi
explanation: |
  Filosofi ekonomi sosialis memprioritaskan kesetaraan di atas efisiensi, memandang kontrol negara yang kuat sebagai hal yang diperlukan untuk mendistribusikan kembali kekayaan dan memastikan semua orang
  semua orang dapat memenuhi kebutuhan dasar mereka. Kaum sosialis tidak mempercayai pasar bebas, dan menganggapnya sebagai sistem yang memungkinkan pihak yang kuat mengeksploitasi pihak yang lemah. Hal ini sangat kontras dengan filosofi ekonomi liberal, yang mendukung intervensi negara yang minimal dan tatanan pasar yang spontan. Jawaban yang salah mencerminkan pendekatan liberal atau kapitalis yang secara eksplisit ditolak oleh kaum sosialis, karena mereka percaya bahwa sistem-sistem ini melanggengkan ketidaksetaraan dan bukan mengatasinya.
question: Согласно социалистической экономической философии, что является главным оправданием для сильного государственного контроля над экономикой?
answer: Обеспечить равенство, позволив каждому удовлетворить свои основные потребности за счет перераспределения богатства
wrong_answers:
  - Обеспечение максимальной экономической свободы личности и развитие конкурентной динамики рынка
  - Устранить все формы государственного вмешательства и создать спонтанный рыночный порядок
  - Концентрация богатства среди наиболее продуктивных членов общества для повышения эффективности
explanation: |
  Социалистическая экономическая философия ставит во главу угла справедливость, а не эффективность, считая, что сильный государственный контроль необходим для перераспределения богатства и обеспечения того, чтобы каждый человек мог удовлетворить свои основные потребности
  чтобы каждый мог удовлетворить свои основные потребности. Социалисты не доверяют свободным рынкам, считая их системами, позволяющими сильным эксплуатировать уязвимые слои населения. Это резко контрастирует с либеральной экономической философией, которая отдает предпочтение минимальному вмешательству государства и спонтанному рыночному порядку. Неправильные ответы отражают либеральные или капиталистические подходы, которые социалисты открыто отвергают, поскольку считают, что эти системы скорее увековечивают неравенство, чем борются с ним.
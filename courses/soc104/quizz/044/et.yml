question: Mis on sotsialistliku majandusfilosoofia kohaselt peamine põhjendus tugevale riiklikule kontrollile majanduse üle?
answer: Tagada võrdsus, võimaldades jõukuse ümberjaotamise kaudu kõigile oma põhivajaduste rahuldamist
wrong_answers:
  - Maksimeerida individuaalseid majanduslikke vabadusi ja edendada konkurentsivõimelist turudünaamikat
  - Kaotada igasugune valitsuse sekkumine ja luua spontaanne turukorraldus
  - Rikkuse koondamine ühiskonna kõige tootlikumate liikmete hulka, et saavutada tõhusus
explanation: |
  Sotsiaaldemokraatlik majandusfilosoofia seab võrdsuse tõhususe asemel esikohale, pidades tugevat riiklikku kontrolli vajalikuks rikkuse ümberjagamiseks ja kõigi inimeste jaoks
  et kõik saaksid rahuldada oma põhivajadusi. Sotsiaaldemokraadid ei usalda vaba turgu, sest nad peavad neid süsteemideks, mis võimaldavad tugevatel ekspluateerida haavatavaid. See on teravas vastuolus liberaalse majandusfilosoofiaga, mis pooldab minimaalset riigi sekkumist ja spontaanset turukorraldust. Valed vastused peegeldavad liberaalseid või kapitalistlikke lähenemisviise, mida sotsialistid selgesõnaliselt tagasi lükkavad, sest nende arvates kinnistavad need süsteemid ebavõrdsust, selle asemel et sellega tegeleda.
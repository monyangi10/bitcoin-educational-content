question: Was ist nach der sozialistischen Wirtschaftsphilosophie die wichtigste Rechtfertigung für eine starke staatliche Kontrolle der Wirtschaft?
answer: Gewährleistung von Gerechtigkeit, indem jedem die Möglichkeit gegeben wird, seine Grundbedürfnisse durch eine Umverteilung des Wohlstands zu befriedigen
wrong_answers:
  - Maximierung der individuellen wirtschaftlichen Freiheiten und Förderung einer wettbewerbsorientierten Marktdynamik
  - Beseitigung aller Formen staatlicher Eingriffe und Schaffung einer spontanen Marktordnung
  - Konzentration des Reichtums auf die produktivsten Mitglieder der Gesellschaft zur Steigerung der Effizienz
explanation: |
  Die sozialistische Wirtschaftsphilosophie räumt der Gerechtigkeit Vorrang vor der Effizienz ein und betrachtet eine starke staatliche Kontrolle als notwendig, um den Wohlstand umzuverteilen und sicherzustellen, dass jeder
  ihre Grundbedürfnisse befriedigen kann. Sozialisten misstrauen freien Märkten, da sie diese als Systeme betrachten, die es den Starken ermöglichen, die Schwachen auszubeuten. Dies steht im krassen Gegensatz zur liberalen Wirtschaftsphilosophie, die minimale staatliche Eingriffe und eine spontane Marktordnung befürwortet. Die falschen Antworten spiegeln liberale oder kapitalistische Ansätze wider, die Sozialisten ausdrücklich ablehnen, da sie der Meinung sind, dass diese Systeme die Ungleichheit aufrechterhalten, anstatt sie zu beseitigen.
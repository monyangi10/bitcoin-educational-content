question: Kulingana na falsafa ya kiuchumi ya ujamaa, ni nini sababu kuu ya udhibiti mkubwa wa serikali juu ya uchumi?
answer: Kuhakikisha usawa kwa kuwezesha kila mtu kukidhi mahitaji yake ya msingi kupitia ugawaji upya wa utajiri
wrong_answers:
  - Kuongeza uhuru wa kiuchumi wa mtu binafsi na kukuza mienendo ya soko yenye ushindani
  - Kuondoa aina zote za uingiliaji kati wa serikali na kuunda utaratibu wa soko wa hiari
  - Kukusanya utajiri miongoni mwa watu wenye tija zaidi katika jamii kwa ajili ya ufanisi
explanation: |
  Falsafa ya kiuchumi ya Kijamaa hupa kipaumbele usawa kuliko ufanisi, ikiona udhibiti imara wa serikali kama muhimu ili kugawanya utajiri upya na kuhakikisha kila mtu anaweza kukidhi mahitaji yake ya msingi. Wajamaa hawaamini masoko huria, wakiona kama mifumo inayowaruhusu wenye nguvu kuwanyonya walio dhaifu. Hii inatofautiana sana na falsafa ya kiuchumi huria, ambayo inapendelea uingiliaji kati mdogo wa serikali na mpangilio wa soko wa hiari. Majibu yasiyo sahihi yanaonyesha mbinu za huria au za kibepari ambazo wajamaa wanakataa waziwazi, kwani wanaamini mifumo hii inaendeleza ukosefu wa usawa badala ya kuushughulikia.

question: Prema socijalističkoj ekonomskoj filozofiji, primarna opravdanost za snažnu državnu kontrolu nad ekonomijom je osiguranje pravedne raspodele resursa i bogatstva, smanjenje nejednakosti i obezbeđivanje osnovnih potreba za sve građane.
answer: Da bi se osigurala jednakost omogućavanjem svima da zadovolje svoje osnovne potrebe kroz preraspodelu bogatstva
wrong_answers:
  - Da se maksimizuju individualne ekonomske slobode i promovišu dinamični konkurentni tržišni uslovi
  - Da se eliminišu svi oblici državne intervencije i stvori spontani tržišni poredak
  - Da se bogatstvo koncentriše među najproduktivnijim članovima društva radi efikasnosti
explanation: |
  Socijalistička ekonomska filozofija daje prioritet pravičnosti nad efikasnošću, smatrajući da je jaka državna kontrola neophodna za preraspodelu bogatstva i osiguranje da svako može zadovoljiti svoje osnovne potrebe. Socijalisti ne veruju slobodnim tržištima, videći ih kao sisteme koji omogućavaju jakima da eksploatišu ranjive. Ovo je u oštrom kontrastu sa liberalnom ekonomskom filozofijom, koja favorizuje minimalnu državnu intervenciju i spontani tržišni poredak. Pogrešni odgovori odražavaju liberalne ili kapitalističke pristupe koje socijalisti eksplicitno odbacuju, jer veruju da ti sistemi perpetuiraju nejednakost umesto da je rešavaju.
question: Según la filosofía económica socialista, ¿cuál es la principal justificación de un fuerte control estatal sobre la economía?
answer: Garantizar la equidad permitiendo a todos satisfacer sus necesidades básicas mediante la redistribución de la riqueza
wrong_answers:
  - Maximizar las libertades económicas individuales y promover una dinámica de mercado competitiva
  - Eliminar toda forma de intervención gubernamental y crear un orden de mercado espontáneo
  - Concentrar la riqueza entre los miembros más productivos de la sociedad en aras de la eficiencia
explanation: |
  La filosofía económica socialista da prioridad a la equidad sobre la eficiencia, y considera necesario un fuerte control estatal para redistribuir la riqueza y garantizar que todo el mundo pueda satisfacer sus necesidades básicas
  puedan satisfacer sus necesidades básicas. Los socialistas desconfían de los mercados libres, por considerarlos sistemas que permiten a los fuertes explotar a los vulnerables. Esto contrasta fuertemente con la filosofía económica liberal, que favorece una intervención mínima del Estado y un orden espontáneo del mercado. Las respuestas incorrectas reflejan planteamientos liberales o capitalistas que los socialistas rechazan explícitamente, ya que consideran que estos sistemas perpetúan la desigualdad en lugar de abordarla.
question: Jakie jest główne uzasadnienie silnej kontroli państwa nad gospodarką według socjalistycznej filozofii gospodarczej?
answer: Zapewnienie sprawiedliwości poprzez umożliwienie każdemu zaspokojenia podstawowych potrzeb poprzez redystrybucję bogactwa
wrong_answers:
  - Maksymalizacja indywidualnych swobód gospodarczych i promowanie konkurencyjnej dynamiki rynkowej
  - Wyeliminowanie wszelkich form interwencji rządowej i stworzenie spontanicznego porządku rynkowego
  - Koncentracja bogactwa wśród najbardziej produktywnych członków społeczeństwa w celu zwiększenia wydajności
explanation: |
  Socjalistyczna filozofia gospodarcza przedkłada sprawiedliwość nad wydajność, postrzegając silną kontrolę państwa jako niezbędną do redystrybucji bogactwa i zapewnienia wszystkim możliwości zaspokojenia podstawowych potrzeb
  może zaspokoić swoje podstawowe potrzeby. Socjaliści nie ufają wolnym rynkom, postrzegając je jako systemy, które pozwalają silnym wykorzystywać słabszych. Kontrastuje to z liberalną filozofią ekonomiczną, która preferuje minimalną interwencję państwa i spontaniczny porządek rynkowy. Błędne odpowiedzi odzwierciedlają liberalne lub kapitalistyczne podejście, które socjaliści wyraźnie odrzucają, ponieważ uważają, że systemy te raczej utrwalają nierówności, niż je eliminują.
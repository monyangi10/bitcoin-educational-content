question: Secondo la filosofia economica socialista, qual è la principale giustificazione per un forte controllo statale sull'economia?
answer: Garantire l'equità consentendo a tutti di soddisfare i propri bisogni fondamentali attraverso la redistribuzione della ricchezza
wrong_answers:
  - Massimizzare le libertà economiche individuali e promuovere le dinamiche competitive del mercato
  - Eliminare ogni forma di intervento pubblico e creare un ordine di mercato spontaneo
  - Concentrare la ricchezza tra i membri più produttivi della società per ottenere efficienza
explanation: |
  La filosofia economica socialista privilegia l'equità rispetto all'efficienza, considerando il forte controllo dello Stato come necessario per ridistribuire la ricchezza e garantire che tutti possano soddisfare i propri bisogni fondamentali
  di soddisfare i propri bisogni primari. I socialisti diffidano dei mercati liberi, considerandoli sistemi che permettono ai forti di sfruttare i vulnerabili. Ciò contrasta nettamente con la filosofia economica liberale, che favorisce un intervento minimo dello Stato e l'ordine spontaneo del mercato. Le risposte sbagliate riflettono approcci liberali o capitalistici che i socialisti rifiutano esplicitamente, poiché ritengono che questi sistemi perpetuino la disuguaglianza anziché affrontarla.
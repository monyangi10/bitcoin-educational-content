question: 사회주의 경제 철학에 따르면, 경제에 대한 국가의 강력한 통제를 정당화하는 주요 근거는 무엇인가요?
answer: 부의 재분배를 통해 모든 사람이 기본적인 필요를 충족할 수 있도록 하여 형평성을 보장합니다
wrong_answers:
  - 개인의 경제적 자유를 극대화하고 경쟁적 시장 역동성을 촉진하기 위해
  - 모든 형태의 정부 개입을 배제하고 자발적인 시장 질서를 만들기 위해
  - 효율성을 위해 가장 생산적인 사회 구성원에게 부를 집중시키기 위해
explanation: |
  사회주의 경제 철학은 효율성보다 형평성을 우선시하며, 강력한 국가 통제가 부를 재분배하고 모든 사람이 기본적인 필요를 충족시킬 수 있도록
  모든 사람이 기본적인 필요를 충족시킬 수 있다고 생각합니다. 사회주의자들은 자유 시장을 불신하며 강자가 약자를 착취할 수 있는 시스템으로 간주합니다. 이는 최소한의 국가 개입과 자발적인 시장 질서를 선호하는 자유주의 경제 철학과 극명한 대조를 이룹니다. 오답은 자유주의 또는 자본주의적 접근 방식을 반영하는데, 사회주의자들은 이러한 시스템이 불평등을 해소하기보다는 영속화한다고 믿기 때문에 명시적으로 거부합니다.
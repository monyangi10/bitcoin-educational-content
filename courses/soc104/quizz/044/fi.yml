question: Mikä on sosialistisen talousfilosofian mukaan ensisijainen peruste talouden voimakkaalle valtionvalvonnalle?
answer: Varallisuuden uudelleenjaon avulla varmistetaan oikeudenmukaisuus siten, että jokainen voi tyydyttää perustarpeensa
wrong_answers:
  - Maksimoidaan yksilön taloudelliset vapaudet ja edistetään markkinoiden kilpailudynamiikkaa
  - Poistetaan kaikenlainen valtion puuttuminen ja luodaan spontaani markkinajärjestys
  - Varallisuuden keskittäminen yhteiskunnan tuottavimmille jäsenille tehokkuuden vuoksi
explanation: |
  Sosialistinen talousfilosofia asettaa oikeudenmukaisuuden tehokkuuden edelle ja pitää vahvaa valtionvalvontaa välttämättömänä varallisuuden uudelleen jakamiseksi ja sen varmistamiseksi, että jokainen
  että jokainen voi tyydyttää perustarpeensa. Sosialistit suhtautuvat epäluuloisesti vapaisiin markkinoihin, sillä he pitävät niitä järjestelminä, joiden avulla vahvat voivat käyttää hyväkseen haavoittuvia. Tämä on jyrkässä ristiriidassa liberaalin talousfilosofian kanssa, joka suosii vähäistä valtion väliintuloa ja spontaania markkinajärjestystä. Väärät vastaukset heijastavat liberaalia tai kapitalistista lähestymistapaa, jonka sosialistit nimenomaisesti torjuvat, koska heidän mielestään nämä järjestelmät pikemminkin ylläpitävät eriarvoisuutta kuin puuttuvat siihen.
question: Sosyalist ekonomi felsefesine göre, ekonomi üzerinde güçlü devlet kontrolünün temel gerekçesi nedir?
answer: Servetin yeniden dağıtılması yoluyla herkesin temel ihtiyaçlarını karşılamasını sağlayarak eşitliği temin etmek
wrong_answers:
  - Bireysel ekonomik özgürlükleri en üst düzeye çıkarmak ve rekabetçi piyasa dinamiklerini teşvik etmek
  - Her türlü devlet müdahalesini ortadan kaldırmak ve kendiliğinden oluşan bir piyasa düzeni yaratmak
  - Verimlilik için zenginliği toplumun en üretken üyeleri arasında yoğunlaştırmak
explanation: |
  Sosyalist ekonomi felsefesi verimlilikten ziyade eşitliğe öncelik verir, güçlü devlet kontrolünü zenginliğin yeniden dağıtılması ve herkesin
  temel ihtiyaçlarını karşılayabilir. Sosyalistler serbest piyasalara güvenmemekte, onları güçlülerin zayıfları sömürmesine izin veren sistemler olarak görmektedir. Bu, asgari devlet müdahalesini ve kendiliğinden oluşan piyasa düzenini destekleyen liberal ekonomi felsefesiyle keskin bir tezat oluşturmaktadır. Yanlış cevaplar, sosyalistlerin açıkça reddettiği liberal veya kapitalist yaklaşımları yansıtmaktadır, çünkü bu sistemlerin eşitsizliği gidermek yerine sürdürdüğüne inanmaktadırlar.
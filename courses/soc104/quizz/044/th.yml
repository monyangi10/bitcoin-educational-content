question: ตามปรัชญาเศรษฐกิจสังคมนิยม เหตุผลหลักสำหรับการควบคุมเศรษฐกิจโดยรัฐอย่างเข้มงวดคืออะไร?
answer: เพื่อให้เกิดความเท่าเทียมกันโดยการอนุญาตให้ทุกคนสามารถตอบสนองความต้องการพื้นฐานของตนเองผ่านการกระจายความมั่งคั่ง
wrong_answers:
  - เพื่อเพิ่มเสรีภาพทางเศรษฐกิจของบุคคลและส่งเสริมพลวัตตลาดที่มีการแข่งขัน
  - เพื่อกำจัดการแทรกแซงของรัฐบาลทุกรูปแบบและสร้างระเบียบตลาดที่เกิดขึ้นเอง
  - เพื่อกระจายความมั่งคั่งไปยังสมาชิกที่มีประสิทธิภาพสูงสุดของสังคมเพื่อประสิทธิภาพ
explanation: |
  ปรัชญาเศรษฐกิจแบบสังคมนิยมให้ความสำคัญกับความเสมอภาคมากกว่าประสิทธิภาพ โดยมองว่าการควบคุมโดยรัฐอย่างเข้มแข็งเป็นสิ่งจำเป็นในการกระจายความมั่งคั่งและรับรองว่าทุกคนสามารถตอบสนองความต้องการพื้นฐานของตนได้ สังคมนิยมไม่ไว้วางใจตลาดเสรี โดยมองว่าเป็นระบบที่อนุญาตให้ผู้แข็งแกร่งเอารัดเอาเปรียบผู้ที่อ่อนแอ ซึ่งแตกต่างอย่างมากกับปรัชญาเศรษฐกิจแบบเสรีนิยมที่สนับสนุนการแทรกแซงของรัฐให้น้อยที่สุดและระเบียบของตลาดที่เกิดขึ้นเอง คำตอบที่ผิดสะท้อนถึงแนวทางแบบเสรีนิยมหรือทุนนิยมที่สังคมนิยมปฏิเสธอย่างชัดเจน เนื่องจากพวกเขาเชื่อว่าระบบเหล่านี้สร้างความไม่เท่าเทียมกันแทนที่จะแก้ไขปัญหาดังกล่าว
question: Dushingiye kuri filozofiya y’ubutunzi y’abasosiyalisiti, ni igiki nyamukuru gituma Leta igenzura ubutunzi bikomeye?
answer: Kugira ngo habeho uburinganire mu kureka umuntu wese akaronka ivyo akeneye biciye mu gusubira gusangira ubutunzi .
wrong_answers:
  - Kugira ngo umuntu agire umwidegemvyo mwinshi mu vy'ubutunzi no guteza imbere uguhiganwa kw'isoko
  - Gukuraho uburyo bwose bwo gufasha Leta no gutuma habaho urutonde rw'isoko rwihuta
  - Kwibanda ku butunzi mu bantu bafise umwimbu mwinshi mu kibano kugira ngo bube bwiza
explanation: |
  Filozofiya y’ubutunzi y’abasosiyalisiti ishira imbere uburinganire kuruta ubushobozi, ibona ko ubugenzuzi bukomeye bwa Leta ari ngombwa kugira ngo ubutunzi busubire gusangira no kumenya neza ko umuntu wese . 
  birashobora kubaronsa ivyo bakeneye vy’ishimikiro. Abasosiyalisiti ntibizigira amasoko y’uburenganzira, babona ko ari uburyo butuma abakomeye bakoresha nabi abakene. Ivyo bitandukanye cane na filozofiya y’ubutunzi y’ubwigenge, ishigikira ko Leta igira ico ikoze bikeyi kandi ko isoko ry’ibintu rigira urutonde rw’ibintu. Inyishu zitari zo zirerekana uburyo bwo kwidegemvya canke bw’abanyagihugu abasosiyalisiti banka mu buryo butomoye, kuko bemera ko izo nzira zituma ubusumbane bugumaho aho kubutorera umuti.
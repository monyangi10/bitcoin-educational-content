question: بر اساس فلسفه اقتصادی سوسیالیستی، توجیه اصلی برای کنترل قوی دولت بر اقتصاد چیست؟
answer: برای اطمینان از عدالت با اجازه دادن به همه برای برآورده کردن نیازهای اساسی خود از طریق توزیع مجدد ثروت
wrong_answers:
  - برای به حداکثر رساندن آزادی‌های اقتصادی فردی و ترویج پویایی‌های بازار رقابتی
  - برای حذف تمام اشکال مداخله دولت و ایجاد نظم خودجوش بازار
  - برای تمرکز ثروت در میان اعضای پربازده‌تر جامعه به منظور کارایی
explanation: |
  فلسفه اقتصادی سوسیالیستی برابری را بر کارایی اولویت می‌دهد و کنترل قوی دولت را برای توزیع مجدد ثروت و اطمینان از اینکه همه می‌توانند نیازهای اساسی خود را برآورده کنند، ضروری می‌داند. سوسیالیست‌ها به بازارهای آزاد بی‌اعتمادند و آنها را به عنوان سیستم‌هایی می‌بینند که به قوی اجازه می‌دهند از آسیب‌پذیران سوءاستفاده کنند. این دیدگاه به شدت با فلسفه اقتصادی لیبرال که طرفدار حداقل مداخله دولت و نظم خودجوش بازار است، در تضاد است. پاسخ‌های نادرست رویکردهای لیبرال یا سرمایه‌داری را منعکس می‌کنند که سوسیالیست‌ها به صراحت آنها را رد می‌کنند، زیرا معتقدند این سیستم‌ها نابرابری را تداوم می‌بخشند به جای اینکه به آن رسیدگی کنند.
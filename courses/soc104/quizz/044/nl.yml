question: Wat is volgens de socialistische economische filosofie de belangrijkste rechtvaardiging voor een sterke staatscontrole over de economie?
answer: Rechtvaardigheid garanderen door iedereen in staat te stellen in zijn basisbehoeften te voorzien door herverdeling van rijkdom
wrong_answers:
  - Individuele economische vrijheden maximaliseren en een concurrerende marktdynamiek bevorderen
  - Alle vormen van overheidsinterventie elimineren en spontane marktorde creëren
  - Om rijkdom te concentreren onder de meest productieve leden van de samenleving voor efficiëntie
explanation: |
  De socialistische economische filosofie geeft voorrang aan rechtvaardigheid boven efficiëntie en ziet sterke staatscontrole als noodzakelijk om rijkdom te herverdelen en ervoor te zorgen dat iedereen
  in hun basisbehoeften kan voorzien. Socialisten wantrouwen vrije markten omdat ze die zien als systemen die de sterken in staat stellen de kwetsbaren uit te buiten. Dit staat in schril contrast met de liberale economische filosofie, die voorstander is van minimale staatsinterventie en spontane marktorde. De foute antwoorden weerspiegelen liberale of kapitalistische benaderingen die socialisten expliciet afwijzen, omdat ze geloven dat deze systemen ongelijkheid in stand houden in plaats van aanpakken.
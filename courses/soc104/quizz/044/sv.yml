question: Vad är enligt socialistisk ekonomisk filosofi det främsta skälet till en stark statlig kontroll över ekonomin?
answer: Att säkerställa rättvisa genom att låta alla tillgodose sina grundläggande behov genom omfördelning av välstånd
wrong_answers:
  - Att maximera individens ekonomiska frihet och främja en konkurrenskraftig marknadsdynamik
  - Att eliminera alla former av statliga ingripanden och skapa en spontan marknadsordning
  - Att koncentrera rikedomarna till de mest produktiva samhällsmedlemmarna för att öka effektiviteten
explanation: |
  Den socialistiska ekonomiska filosofin prioriterar rättvisa framför effektivitet och anser att en stark statlig kontroll är nödvändig för att omfördela rikedomar och se till att alla
  kan tillgodose sina grundläggande behov. Socialister misstror fria marknader och ser dem som system som gör det möjligt för de starka att utnyttja de sårbara. Detta står i skarp kontrast till liberal ekonomisk filosofi, som förespråkar minimal statlig inblandning och spontan marknadsordning. De felaktiga svaren återspeglar liberala eller kapitalistiska synsätt som socialister uttryckligen förkastar, eftersom de anser att dessa system vidmakthåller ojämlikhet snarare än att ta itu med den.
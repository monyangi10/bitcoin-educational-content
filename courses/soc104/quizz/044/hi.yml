question: समाजवादी आर्थिक दर्शन के अनुसार, अर्थव्यवस्था पर राज्य के मजबूत नियंत्रण का प्राथमिक औचित्य क्या है?
answer: धन के पुनर्वितरण के माध्यम से सभी को अपनी बुनियादी जरूरतों को पूरा करने की अनुमति देकर समानता सुनिश्चित करना।
wrong_answers:
  - व्यक्तिगत आर्थिक स्वतंत्रता को अधिकतम करने और प्रतिस्पर्धी बाजार गतिशीलता को बढ़ावा देने के लिए
  - सरकार के सभी प्रकार के हस्तक्षेप को समाप्त करना और स्वतःस्फूर्त बाजार व्यवस्था स्थापित करना।
  - दक्षता के लिए समाज के सबसे उत्पादक सदस्यों के बीच धन का केंद्रीकरण करना।
explanation: |
  समाजवादी आर्थिक दर्शन दक्षता की तुलना में समानता को प्राथमिकता देता है, और धन के पुनर्वितरण और यह सुनिश्चित करने के लिए कि हर कोई अपनी बुनियादी जरूरतों को पूरा कर सके, मजबूत राज्य नियंत्रण को आवश्यक मानता है। समाजवादी मुक्त बाजारों पर अविश्वास करते हैं, क्योंकि वे उन्हें ऐसी व्यवस्था मानते हैं जो शक्तिशाली लोगों को कमजोरों का शोषण करने की अनुमति देती है। यह उदार आर्थिक दर्शन के बिल्कुल विपरीत है, जो न्यूनतम राज्य हस्तक्षेप और सहज बाजार व्यवस्था का समर्थन करता है। गलत उत्तर उदार या पूंजीवादी दृष्टिकोणों को दर्शाते हैं जिन्हें समाजवादी स्पष्ट रूप से अस्वीकार करते हैं, क्योंकि उनका मानना ​​है कि ये व्यवस्थाएं असमानता को दूर करने के बजाय उसे और बढ़ाती हैं।
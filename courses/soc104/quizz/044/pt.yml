question: De acordo com a filosofia económica socialista, qual é a principal justificação para um forte controlo estatal sobre a economia?
answer: Garantir a equidade, permitindo que todos satisfaçam as suas necessidades básicas através da redistribuição da riqueza
wrong_answers:
  - Maximizar as liberdades económicas individuais e promover uma dinâmica de mercado competitiva
  - Eliminar todas as formas de intervenção governamental e criar uma ordem de mercado espontânea
  - Concentrar a riqueza entre os membros mais produtivos da sociedade para fins de eficiência
explanation: |
  A filosofia económica socialista dá prioridade à equidade sobre a eficiência, considerando necessário um forte controlo estatal para redistribuir a riqueza e garantir que todos possam satisfazer as suas necessidades básicas
  e garantir que todos possam satisfazer as suas necessidades básicas. Os socialistas desconfiam dos mercados livres, vendo-os como sistemas que permitem aos mais fortes explorar os vulneráveis. Isto contrasta fortemente com a filosofia económica liberal, que favorece a intervenção mínima do Estado e a ordem espontânea do mercado. As respostas erradas reflectem abordagens liberais ou capitalistas que os socialistas rejeitam explicitamente, pois consideram que estes sistemas perpetuam a desigualdade em vez de a resolverem.
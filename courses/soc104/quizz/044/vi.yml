question: Theo triết lý kinh tế xã hội chủ nghĩa, lý do chính đáng nhất cho sự kiểm soát mạnh mẽ của nhà nước đối với nền kinh tế là gì?
answer: Đảm bảo sự công bằng bằng cách cho phép mọi người đáp ứng được các nhu cầu cơ bản thông qua việc phân phối lại của cải.
wrong_answers:
  - Nhằm tối đa hóa các quyền tự do kinh tế cá nhân và thúc đẩy động lực cạnh tranh của thị trường.
  - Nhằm loại bỏ mọi hình thức can thiệp của chính phủ và thiết lập trật tự thị trường tự phát.
  - Tập trung của cải vào tay những thành viên năng suất nhất của xã hội để đạt hiệu quả.
explanation: |
  Triết lý kinh tế xã hội chủ nghĩa ưu tiên sự công bằng hơn hiệu quả, coi sự kiểm soát mạnh mẽ của nhà nước là cần thiết để phân phối lại của cải và đảm bảo mọi người đều có thể đáp ứng các nhu cầu cơ bản của mình. Những người theo chủ nghĩa xã hội không tin tưởng vào thị trường tự do, coi chúng là những hệ thống cho phép kẻ mạnh bóc lột kẻ yếu. Điều này trái ngược hoàn toàn với triết lý kinh tế tự do, vốn ủng hộ sự can thiệp tối thiểu của nhà nước và trật tự thị trường tự phát. Các câu trả lời sai phản ánh các phương pháp tiếp cận tự do hoặc tư bản mà những người theo chủ nghĩa xã hội bác bỏ một cách rõ ràng, vì họ tin rằng những hệ thống này duy trì sự bất bình đẳng thay vì giải quyết nó.
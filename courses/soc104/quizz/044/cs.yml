question: Co je podle socialistické ekonomické filozofie hlavním důvodem pro silnou kontrolu státu nad ekonomikou?
answer: Zajistit spravedlnost tím, že každý bude moci uspokojit své základní potřeby prostřednictvím přerozdělování bohatství
wrong_answers:
  - Maximalizovat ekonomické svobody jednotlivců a podporovat dynamiku konkurenčního trhu
  - Odstranit všechny formy státních zásahů a vytvořit spontánní tržní řád
  - Soustředit bohatství mezi nejproduktivnější členy společnosti za účelem zvýšení efektivity
explanation: |
  Socialistická ekonomická filozofie upřednostňuje spravedlnost před efektivitou a považuje silnou státní kontrolu za nezbytnou pro přerozdělování bohatství a zajištění toho, aby všichni
  uspokojit své základní potřeby. Socialisté nedůvěřují volnému trhu, protože ho považují za systém, který umožňuje silným vykořisťovat slabší. To ostře kontrastuje s liberální ekonomickou filozofií, která upřednostňuje minimální státní zásahy a spontánní tržní řád. Špatné odpovědi odrážejí liberální nebo kapitalistické přístupy, které socialisté výslovně odmítají, protože se domnívají, že tyto systémy nerovnost spíše udržují, než aby ji řešily.
question: Според социалистическата икономическа философия кое е основното основание за силен държавен контрол върху икономиката?
answer: Да се гарантира справедливост, като се даде възможност на всеки да посрещне основните си нужди чрез преразпределение на богатството
wrong_answers:
  - Максимално увеличаване на индивидуалните икономически свободи и насърчаване на конкурентната пазарна динамика
  - Премахване на всички форми на държавна намеса и създаване на спонтанен пазарен ред
  - Концентриране на богатството сред най-продуктивните членове на обществото с цел ефективност
explanation: |
  Социалистическата икономическа философия дава предимство на справедливостта пред ефективността, като счита силния държавен контрол за необходим за преразпределяне на богатството и гарантиране на всички
  да могат да задоволяват основните си нужди. Социалистите не вярват на свободните пазари, тъй като ги разглеждат като системи, които позволяват на силните да експлоатират уязвимите. Това рязко контрастира с либералната икономическа философия, която подкрепя минималната държавна намеса и спонтанния пазарен ред. Неправилните отговори отразяват либерални или капиталистически подходи, които социалистите изрично отхвърлят, тъй като според тях тези системи по-скоро затвърждават неравенството, отколкото да се справят с него.
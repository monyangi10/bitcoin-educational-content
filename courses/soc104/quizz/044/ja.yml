question: 社会主義経済哲学によれば、国家が経済を強力に管理する主な理由は何か？
answer: 富の再分配を通じて、すべての人が基本的ニーズを満たせるようにすることで、公平性を確保する。
wrong_answers:
  - 個人の経済的自由を最大化し、競争的な市場力学を促進する。
  - あらゆる形態の政府介入を排除し、自然発生的な市場秩序を創出する。
  - 効率化のため、社会の最も生産的な構成員に富を集中させる。
explanation: |
  社会主義の経済哲学は、効率性よりも公平性を優先し、富を再分配し、すべての人が基本的なニーズを満たせるようにするためには、強力な国家統制が必要であると考える。
  が基本的なニーズを満たせるようにするために必要であると考える。社会主義者は自由市場に不信感を抱き、強者が弱者を搾取するシステムだと考える。これは、最小限の国家介入と自然発生的な市場秩序を好む自由主義経済哲学とは対照的である。誤答は、社会主義者が明確に否定している自由主義的または資本主義的アプローチを反映したものであり、これらのシステムは不平等に対処するのではなく、不平等を永続させると考えているからである。
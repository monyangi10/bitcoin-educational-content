question: 根据社会主义经济哲学，国家对经济实行强有力控制的主要理由是什么？
answer: 通过财富再分配，让每个人都能满足其基本需求，从而确保公平
wrong_answers:
  - 最大限度地实现个人经济自由，促进市场竞争活力
  - 消除一切形式的政府干预，建立自发的市场秩序
  - 将财富集中于社会生产力最强的成员，以提高效率
explanation: |
  社会主义经济哲学将公平置于效率之上，将强有力的国家控制视为重新分配财富和确保每个人
  满足其基本需求。社会主义者不信任自由市场，认为自由市场是允许强者剥削弱者的体系。这与自由主义经济哲学形成鲜明对比，后者倾向于最小化国家干预和自发的市场秩序。错误答案反映了社会主义者明确反对的自由主义或资本主义方法，因为他们认为这些制度会使不平等永久化，而不是解决不平等问题。
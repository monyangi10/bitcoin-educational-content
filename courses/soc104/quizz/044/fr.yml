question: According to socialist economic philosophy, what is the primary justification for strong state control over the economy?
answer: To ensure equity by allowing everyone to meet their basic needs through wealth redistribution
wrong_answers:
  - To maximize individual economic freedoms and promote competitive market dynamics
  - To eliminate all forms of government intervention and create spontaneous market order
  - To concentrate wealth among the most productive members of society for efficiency
explanation: |
  Socialist economic philosophy prioritizes equity over efficiency, viewing strong state control as necessary to redistribute wealth and ensure everyone can meet their basic needs. Socialists distrust free markets, seeing them as systems that allow the strong to exploit the vulnerable. This contrasts sharply with liberal economic philosophy, which favors minimal state intervention and spontaneous market order. The wrong answers reflect liberal or capitalist approaches that socialists explicitly reject, as they believe these systems perpetuate inequality rather than addressing it.

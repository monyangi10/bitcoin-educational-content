question: 根據社會主義經濟哲學，國家強力控制經濟的主要理由是什麼？
answer: 透過財富再分配，讓每個人都能滿足基本需求，以確保公平
wrong_answers:
  - 最大化個人經濟自由並促進市場競爭動力
  - 消除一切形式的政府干預，建立自發的市場秩序
  - 將財富集中於社會上最具生產力的成員，以提高效率
explanation: |
  社會主義經濟哲學重視公平而非效率，將強大的國家控制視為重新分配財富和確保每個人
  滿足基本需求。社會主義者不信任自由市場，認為自由市場是讓強者剝削弱者的制度。這與自由經濟哲學形成強烈對比，自由經濟哲學傾向於最少的國家干預及自發的市場秩序。錯誤的答案反映出社會主義者明確拒絕的自由主義或資本主義方法，因為他們認為這些制度會讓不平等持續下去，而不是解決不平等問題。
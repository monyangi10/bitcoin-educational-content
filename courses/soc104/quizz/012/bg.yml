question: Какво представлява дясната страна на икономическата ос (към 100) в двуизмерната политическа диаграма?
answer: Предпочитание за икономическа свобода с по-малко държавна намеса, по-ниски данъци и свободни пазари
wrong_answers:
  - Предпочитание към силна държавна намеса с високи данъци и широки обществени услуги
  - Предпочитание към индивидуалните свободи и толерантността в личен и социален план
  - Предпочитание към традиционните ценности, реда и сигурността, налагани от държавата
explanation: |
  Дясната страна на икономическата ос представлява икономическата свобода, която се характеризира с минимална държавна намеса в икономиката, намалени регулации,
  по-ниски данъци и по-голяма свобода на предприятията и хората да произвеждат, разменят и потребяват. Тази позиция набляга на свободните пазари, частната собственост и конкуренцията като двигатели на просперитета. Другите варианти описват или лявата страна на икономическата ос (силна държавна намеса), или позиции по оста на личните свободи (индивидуални свободи или традиционни ценности), които са отделни измерения в тази политическа рамка.
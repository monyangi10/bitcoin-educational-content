question: What does the right side of the economic axis (towards 100) represent in the two-dimensional political diagram?
answer: Preference for economic freedom with less state intervention, lower taxes, and free markets
wrong_answers:
  - Preference for strong state intervention with high taxes and extensive public services
  - Preference for individual liberties and tolerance in personal and social matters
  - Preference for traditional values, order, and security enforced by the state
explanation: |
  The right side of the economic axis represents economic freedom, characterized by minimal state intervention in the economy, reduced regulations, lower taxes, and greater freedom for businesses and individuals to produce, exchange, and consume. This position emphasizes free markets, private property, and competition as drivers of prosperity. The other options describe either the left side of the economic axis (strong state intervention) or positions on the personal freedoms axis (individual liberties or traditional values), which are separate dimensions in this political framework.
question: Cosa rappresenta il lato destro dell'asse economico (verso 100) nel diagramma politico bidimensionale?
answer: Preferenza per la libertà economica con meno interventi statali, tasse più basse e mercati liberi
wrong_answers:
  - Preferenza per un forte intervento statale, con tasse elevate e servizi pubblici estesi
  - Preferenza per le libertà individuali e la tolleranza nelle questioni personali e sociali
  - Preferenza per i valori tradizionali, l'ordine e la sicurezza garantiti dallo Stato
explanation: |
  Il lato destro dell'asse economico rappresenta la libertà economica, caratterizzata da un intervento minimo dello Stato nell'economia, da una riduzione delle normative, da tasse più basse e da una maggiore libertà per le imprese e gli individui di produrre, scambiare e consumare,
  tasse più basse e una maggiore libertà per le imprese e gli individui di produrre, scambiare e consumare. Questa posizione enfatizza il libero mercato, la proprietà privata e la concorrenza come motori della prosperità. Le altre opzioni descrivono il lato sinistro dell'asse economico (forte intervento dello Stato) o le posizioni sull'asse delle libertà personali (libertà individuali o valori tradizionali), che sono dimensioni separate in questo quadro politico.
question: Wat stelt de rechterkant van de economische as (richting 100) voor in het tweedimensionale politieke diagram?
answer: Voorkeur voor economische vrijheid met minder staatsinterventie, lagere belastingen en vrije markten
wrong_answers:
  - Voorkeur voor sterke staatsinterventie met hoge belastingen en uitgebreide openbare diensten
  - Voorkeur voor individuele vrijheden en tolerantie in persoonlijke en sociale aangelegenheden
  - Voorkeur voor traditionele waarden, orde en veiligheid afgedwongen door de staat
explanation: |
  De rechterkant van de economische as vertegenwoordigt economische vrijheid, gekenmerkt door minimale staatsinterventie in de economie, minder regelgeving,
  lagere belastingen en meer vrijheid voor bedrijven en individuen om te produceren, ruilen en consumeren. Deze positie benadrukt vrije markten, privé-eigendom en concurrentie als drijvende krachten achter welvaart. De andere opties beschrijven ofwel de linkerkant van de economische as (sterke staatsinterventie) of posities op de as van persoonlijke vrijheden (individuele vrijheden of traditionele waarden), die afzonderlijke dimensies zijn in dit politieke kader.
question: 二次元の政治図において、経済軸の右側（100に向かって）は何を表しているか？
answer: 国家の介入が少なく、税金が低く、自由な市場を持つ経済的自由を好む。
wrong_answers:
  - 高い税金と広範な公共サービスによる強力な国家介入を好む
  - 個人的および社会的な問題において、個人の自由と寛容を優先する。
  - 国家が強制する伝統的な価値観、秩序、安全を好む。
explanation: |
  経済軸の右側は経済的自由を表し、経済への国家の介入を最小限に抑え、規制を緩和し、税金を引き下げ、企業や個人の生産、交換、消費の自由度を高めることを特徴とする、
  税金を引き下げ、企業や個人の生産、交換、消費の自由を拡大する。この立場は、繁栄の原動力として自由市場、私有財産、競争を強調する。他の選択肢は、経済軸の左側（強い国家介入）か、個人的自由軸の立場（個人の自由や伝統的価値観）を示すもので、この政治的枠組みではこれらは別の次元のものである。
question: O que é que o lado direito do eixo económico (em direção a 100) representa no diagrama político bidimensional?
answer: Preferência pela liberdade económica com menos intervenção do Estado, impostos mais baixos e mercados livres
wrong_answers:
  - Preferência por uma forte intervenção do Estado, com impostos elevados e serviços públicos alargados
  - Preferência pelas liberdades individuais e pela tolerância em questões pessoais e sociais
  - Preferência pelos valores tradicionais, pela ordem e pela segurança impostas pelo Estado
explanation: |
  O lado direito do eixo económico representa a liberdade económica, caracterizada por uma intervenção mínima do Estado na economia, regulamentação reduzida,
  impostos mais baixos e maior liberdade para as empresas e os indivíduos produzirem, trocarem e consumirem. Esta posição dá ênfase aos mercados livres, à propriedade privada e à concorrência como factores de prosperidade. As outras opções descrevem o lado esquerdo do eixo económico (forte intervenção do Estado) ou posições no eixo das liberdades pessoais (liberdades individuais ou valores tradicionais), que são dimensões distintas neste quadro político.
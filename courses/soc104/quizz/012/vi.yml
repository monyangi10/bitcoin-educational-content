question: Trục kinh tế phía bên phải (hướng về 100) thể hiện điều gì trong sơ đồ chính trị hai chiều?
answer: Ưu tiên tự do kinh tế với sự can thiệp của nhà nước ít hơn, thuế thấp hơn và thị trường tự do.
wrong_answers:
  - Ưu tiên sự can thiệp mạnh mẽ của nhà nước với thuế cao và dịch vụ công cộng rộng khắp.
  - Ưu tiên các quyền tự do cá nhân và lòng khoan dung trong các vấn đề cá nhân và xã hội.
  - Ưu tiên các giá trị truyền thống, trật tự và an ninh được nhà nước bảo đảm.
explanation: |
  Trục kinh tế bên phải thể hiện tự do kinh tế, đặc trưng bởi sự can thiệp tối thiểu của nhà nước vào nền kinh tế, giảm thiểu quy định, thuế thấp hơn và tự do lớn hơn cho doanh nghiệp và cá nhân trong sản xuất, trao đổi và tiêu dùng. Quan điểm này nhấn mạnh thị trường tự do, quyền sở hữu tư nhân và cạnh tranh là động lực của sự thịnh vượng. Các lựa chọn khác mô tả trục kinh tế bên trái (sự can thiệp mạnh mẽ của nhà nước) hoặc các quan điểm trên trục tự do cá nhân (quyền tự do cá nhân hoặc giá trị truyền thống), là những chiều cạnh riêng biệt trong khuôn khổ chính trị này.
question: Šta desna strana ekonomske ose (ka 100) predstavlja u dvodimenzionalnom političkom dijagramu?
answer: Preferencija za ekonomsku slobodu sa manje državne intervencije, nižim porezima i slobodnim tržištima
wrong_answers:
  - Preferencija za snažnu državnu intervenciju sa visokim porezima i obimnim javnim uslugama
  - Preferencija za individualne slobode i toleranciju u ličnim i društvenim pitanjima
  - Preferencija za tradicionalne vrednosti, red i sigurnost koju sprovodi država
explanation: |
  Desna strana ekonomskog spektra predstavlja ekonomsku slobodu, koju karakteriše minimalna intervencija države u ekonomiju, smanjena regulativa, niži porezi i veća sloboda za preduzeća i pojedince da proizvode, razmenjuju i konzumiraju. Ova pozicija naglašava slobodna tržišta, privatnu svojinu i konkurenciju kao pokretače prosperiteta. Druge opcije opisuju ili levu stranu ekonomskog spektra (snažna državna intervencija) ili pozicije na osi ličnih sloboda (individualne slobode ili tradicionalne vrednosti), koje su odvojene dimenzije u ovom političkom okviru.
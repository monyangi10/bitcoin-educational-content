question: Vad representerar den högra sidan av den ekonomiska axeln (mot 100) i det tvådimensionella politiska diagrammet?
answer: Preferens för ekonomisk frihet med mindre statlig inblandning, lägre skatter och fria marknader
wrong_answers:
  - Preferens för stark statlig inblandning med höga skatter och omfattande offentliga tjänster
  - Företräde för individuella friheter och tolerans i personliga och sociala frågor
  - Företräde för traditionella värderingar, ordning och säkerhet som upprätthålls av staten
explanation: |
  Den högra sidan av den ekonomiska axeln representerar ekonomisk frihet, som kännetecknas av minimal statlig inblandning i ekonomin, minskade regleringar,
  lägre skatter och större frihet för företag och individer att producera, byta och konsumera. Denna position betonar fria marknader, privat egendom och konkurrens som drivkrafter för välstånd. De övriga alternativen beskriver antingen den vänstra sidan av den ekonomiska axeln (stark statlig inblandning) eller positioner på axeln för personliga friheter (individuella friheter eller traditionella värderingar), vilka är separata dimensioner i detta politiska ramverk.
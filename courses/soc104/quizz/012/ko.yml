question: 2차원 정치 다이어그램에서 경제 축의 오른쪽(100을 향함)은 무엇을 의미하나요?
answer: 국가 개입이 적고, 세금이 낮으며, 자유 시장이 있는 경제적 자유를 선호합니다
wrong_answers:
  - 높은 세금과 광범위한 공공 서비스를 통한 국가의 강력한 개입을 선호합니다
  - 개인 및 사회 문제에서 개인의 자유와 관용에 대한 선호도
  - 국가가 시행하는 전통적인 가치, 질서 및 보안에 대한 선호도
explanation: |
  경제 축의 오른쪽은 경제에 대한 국가 개입을 최소화하고 규제를 줄이며, 기업과 개인의 생산과 소비의 자유를 특징으로 하는 경제적 자유를 나타냅니다,
  세금 인하, 기업과 개인이 생산, 교환, 소비할 수 있는 더 큰 자유를 특징으로 합니다. 이 입장은 번영의 원동력으로서 자유 시장, 사유 재산, 경쟁을 강조합니다. 다른 옵션은 경제 축의 왼쪽(강력한 국가 개입) 또는 개인의 자유 축(개인의 자유 또는 전통적 가치)에 대한 입장을 설명하며, 이 정치적 프레임워크에서는 별도의 차원입니다.
question: Co reprezentuje prawa strona osi ekonomicznej (w kierunku 100) na dwuwymiarowym diagramie politycznym?
answer: Preferuje wolność gospodarczą z mniejszą interwencją państwa, niższymi podatkami i wolnymi rynkami
wrong_answers:
  - Preferowanie silnej interwencji państwa z wysokimi podatkami i rozbudowanymi usługami publicznymi
  - Preferowanie wolności osobistych i tolerancji w sprawach osobistych i społecznych
  - Preferowanie tradycyjnych wartości, porządku i bezpieczeństwa egzekwowanych przez państwo
explanation: |
  Prawa strona osi ekonomicznej reprezentuje wolność gospodarczą, charakteryzującą się minimalną interwencją państwa w gospodarkę, ograniczonymi regulacjami,
  niższe podatki i większa swoboda dla firm i osób fizycznych w zakresie produkcji, wymiany i konsumpcji. Stanowisko to kładzie nacisk na wolne rynki, własność prywatną i konkurencję jako czynniki napędzające dobrobyt. Pozostałe opcje opisują lewą stronę osi ekonomicznej (silna interwencja państwa) lub stanowiska na osi wolności osobistych (wolności indywidualne lub tradycyjne wartości), które są odrębnymi wymiarami w tych ramach politycznych.
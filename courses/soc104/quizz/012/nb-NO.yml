question: Hva representerer den høyre siden av den økonomiske aksen (mot 100) i det todimensjonale politiske diagrammet?
answer: Preferanse for økonomisk frihet med mindre statlig inngripen, lavere skatter og frie markeder
wrong_answers:
  - Preferanse for sterk statlig inngripen med høye skatter og omfattende offentlige tjenester
  - Preferanse for individuell frihet og toleranse i personlige og sosiale spørsmål
  - Preferanse for tradisjonelle verdier, orden og sikkerhet håndhevet av staten
explanation: |
  Den høyre siden av den økonomiske aksen representerer økonomisk frihet, som kjennetegnes av minimal statlig inngripen i økonomien, færre reguleringer,
  lavere skatter og større frihet for bedrifter og enkeltpersoner til å produsere, utveksle og forbruke. Denne posisjonen vektlegger frie markeder, privat eiendom og konkurranse som drivkrefter for velstand. De andre alternativene beskriver enten venstresiden av den økonomiske aksen (sterk statlig inngripen) eller posisjoner på aksen for personlige friheter (individuelle friheter eller tradisjonelle verdier), som er separate dimensjoner i dette politiske rammeverket.
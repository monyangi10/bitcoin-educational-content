question: Apa yang diwakili oleh sisi kanan sumbu ekonomi (ke arah 100) dalam diagram politik dua dimensi?
answer: Preferensi untuk kebebasan ekonomi dengan intervensi negara yang lebih minim, pajak yang lebih rendah, dan pasar bebas
wrong_answers:
  - Preferensi untuk intervensi negara yang kuat dengan pajak yang tinggi dan layanan publik yang luas
  - Mengutamakan kebebasan individu dan toleransi dalam masalah pribadi dan sosial
  - Preferensi terhadap nilai-nilai tradisional, ketertiban, dan keamanan yang ditegakkan oleh negara
explanation: |
  Sisi kanan dari poros ekonomi mewakili kebebasan ekonomi, yang ditandai dengan intervensi negara yang minimal dalam perekonomian, regulasi yang lebih rendah,
  pajak yang lebih rendah, dan kebebasan yang lebih besar bagi bisnis dan individu untuk memproduksi, bertukar, dan mengkonsumsi. Posisi ini menekankan pasar bebas, kepemilikan pribadi, dan kompetisi sebagai pendorong kemakmuran. Pilihan lainnya menggambarkan sisi kiri poros ekonomi (intervensi negara yang kuat) atau posisi pada poros kebebasan pribadi (kebebasan individu atau nilai-nilai tradisional), yang merupakan dimensi yang terpisah dalam kerangka kerja politik ini.

question: Что представляет собой правая часть экономической оси (в направлении 100) на двухмерной политической диаграмме?
answer: Предпочитает экономическую свободу с меньшим вмешательством государства, более низкими налогами и свободными рынками
wrong_answers:
  - Предпочитает сильное государственное вмешательство с высокими налогами и обширными государственными услугами
  - Предпочитает индивидуальные свободы и терпимость в личных и общественных вопросах
  - Предпочитает традиционные ценности, порядок и безопасность, обеспечиваемые государством
explanation: |
  Правая сторона экономической оси представляет экономическую свободу, характеризующуюся минимальным вмешательством государства в экономику, снижением регулирования,
  снижение налогов и большая свобода для предприятий и частных лиц в производстве, обмене и потреблении. Эта позиция подчеркивает, что свободные рынки, частная собственность и конкуренция являются движущими силами процветания. Остальные варианты описывают либо левую сторону экономической оси (сильное государственное вмешательство), либо позиции по оси личных свобод (индивидуальные свободы или традиционные ценности), которые являются отдельными измерениями в данной политической системе.
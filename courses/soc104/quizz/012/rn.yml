question: Uruhande rw’iburyo rw’umurongo w’ubutunzi (ruja ku 100) rugereranya iki mu kigereranyo ca politike c’ingero zibiri?
answer: Guhitamwo umwidegemvyo mu vy’ubutunzi ataco Leta yinjiramwo, imisoro igabanutse, n’amasoko yidegemvya
wrong_answers:
  - Guhitamwo gufasha Leta ikomeye n'imisoro myinshi n'ibikorwa vyinshi vya Leta
  - Guhitamwo umwidegemvyo w'umuntu ku giti ciwe no kwihanganirana mu bibazo vy'umuntu ku giti ciwe n'ivy'imibano
  - Guhitamwo ingingo ngenderwako za kera, urutonde n'umutekano bishirwa mu ngiro na Leta
explanation: |
  Uruhande rw’iburyo rw’umurongo w’ubutunzi rugereranya umwidegemvyo w’ubutunzi, ugaragazwa n’ukuntu Leta yinjira mu bukungu bikeyi, amategeko agabanywa, 
  imisoro igabanuka, n’umwidegemvyo mwinshi w’ubudandaji n’abantu ku giti cabo wo guhingura, guhindura no gukoresha. Ico kibanza gishimika ku masoko y’uburenganzira, ku mutungo w’abantu ku giti cabo, no ku mahiganwa nk’ibituma umuntu atera imbere. Ayandi mahitamwo adondora uruhande rw’ibubamfu rw’umurongo w’ubutunzi (ugufasha kwa Leta gukomeye) canke ivyicaro ku murongo w’umwidegemvyo w’umuntu ku giti ciwe (umwidegemvyo w’umuntu ku giti ciwe canke agaciro k’imigenzo), ari vyo bipimo bitandukanye muri iyo nzira ya politike.
question: दो आयामी राजनीतिक आरेख में आर्थिक अक्ष का दाहिना भाग (100 की ओर) क्या दर्शाता है?
answer: कम सरकारी हस्तक्षेप, कम कर और मुक्त बाजारों के साथ आर्थिक स्वतंत्रता को प्राथमिकता देना।
wrong_answers:
  - उच्च करों और व्यापक सार्वजनिक सेवाओं के साथ मजबूत राज्य हस्तक्षेप को प्राथमिकता देना
  - व्यक्तिगत स्वतंत्रता और निजी एवं सामाजिक मामलों में सहिष्णुता को प्राथमिकता देना।
  - राज्य द्वारा लागू किए गए पारंपरिक मूल्यों, व्यवस्था और सुरक्षा को प्राथमिकता देना।
explanation: |
  आर्थिक अक्ष का दायाँ भाग आर्थिक स्वतंत्रता का प्रतिनिधित्व करता है, जिसकी विशेषता अर्थव्यवस्था में न्यूनतम सरकारी हस्तक्षेप, कम नियमन,
  कम कर और व्यवसायों एवं व्यक्तियों को उत्पादन, विनिमय एवं उपभोग की अधिक स्वतंत्रता है। यह दृष्टिकोण मुक्त बाज़ार, निजी संपत्ति और प्रतिस्पर्धा को समृद्धि के चालक के रूप में महत्व देता है। अन्य विकल्प या तो आर्थिक अक्ष के बाएँ भाग (मजबूत सरकारी हस्तक्षेप) या व्यक्तिगत स्वतंत्रता अक्ष (व्यक्तिगत स्वतंत्रता या पारंपरिक मूल्य) पर स्थितियाँ दर्शाते हैं, जो इस राजनीतिक ढांचे में अलग-अलग आयाम हैं।
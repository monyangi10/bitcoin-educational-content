question: ด้านขวาของแกนเศรษฐกิจ (ไปทาง 100) ในแผนภาพการเมืองสองมิติแสดงถึงอะไร?
answer: ความชอบในเสรีภาพทางเศรษฐกิจที่มีการแทรกแซงจากรัฐน้อยลง, ภาษีที่ต่ำลง, และตลาดเสรี
wrong_answers:
  - ความชอบสำหรับการแทรกแซงของรัฐอย่างเข้มแข็งด้วยภาษีสูงและบริการสาธารณะที่กว้างขวาง
  - ความชอบในเสรีภาพส่วนบุคคลและความอดทนในเรื่องส่วนตัวและสังคม
  - ความชื่นชอบในค่านิยมดั้งเดิม ความเป็นระเบียบ และความมั่นคงที่รัฐบังคับใช้
explanation: |
  ด้านขวาของแกนเศรษฐกิจแสดงถึงเสรีภาพทางเศรษฐกิจ ซึ่งมีลักษณะการแทรกแซงของรัฐในเศรษฐกิจน้อยที่สุด ลดกฎระเบียบ ลดภาษี และให้เสรีภาพมากขึ้นแก่ธุรกิจและบุคคลในการผลิต แลกเปลี่ยน และบริโภค ตำแหน่งนี้เน้นตลาดเสรี ทรัพย์สินส่วนตัว และการแข่งขันเป็นตัวขับเคลื่อนความเจริญรุ่งเรือง ตัวเลือกอื่น ๆ อธิบายถึงด้านซ้ายของแกนเศรษฐกิจ (การแทรกแซงของรัฐอย่างเข้มแข็ง) หรือจุดยืนในแกนเสรีภาพส่วนบุคคล (เสรีภาพของบุคคลหรือค่านิยมดั้งเดิม) ซึ่งเป็นมิติที่แยกต่างหากในกรอบการเมืองนี้
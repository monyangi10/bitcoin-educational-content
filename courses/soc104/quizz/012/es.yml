question: ¿Qué representa el lado derecho del eje económico (hacia 100) en el diagrama político bidimensional?
answer: Preferencia por la libertad económica con menos intervención estatal, impuestos más bajos y mercados libres
wrong_answers:
  - Preferencia por una fuerte intervención estatal con impuestos elevados y amplios servicios públicos
  - Preferencia por las libertades individuales y la tolerancia en asuntos personales y sociales
  - Preferencia por los valores tradicionales, el orden y la seguridad impuestos por el Estado
explanation: |
  El lado derecho del eje económico representa la libertad económica, caracterizada por una intervención mínima del Estado en la economía, regulaciones reducidas
  menores impuestos y mayor libertad para que las empresas y los individuos produzcan, intercambien y consuman. Esta posición hace hincapié en el libre mercado, la propiedad privada y la competencia como motores de la prosperidad. Las otras opciones describen el lado izquierdo del eje económico (fuerte intervención del Estado) o posiciones en el eje de las libertades personales (libertades individuales o valores tradicionales), que son dimensiones separadas en este marco político.
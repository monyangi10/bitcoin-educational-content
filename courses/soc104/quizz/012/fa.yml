question: سمت راست محور اقتصادی (به سمت 100) در نمودار سیاسی دو بعدی چه چیزی را نشان می‌دهد؟
answer: ترجیح برای آزادی اقتصادی با مداخله کمتر دولت، مالیات‌های پایین‌تر و بازارهای آزاد
wrong_answers:
  - ترجیح مداخله قوی دولت با مالیات‌های بالا و خدمات عمومی گسترده
  - ترجیح آزادی‌های فردی و مدارا در امور شخصی و اجتماعی
  - ترجیح به ارزش‌های سنتی، نظم و امنیتی که توسط دولت اعمال می‌شود
explanation: |
  سمت راست محور اقتصادی نشان‌دهنده آزادی اقتصادی است که با حداقل مداخله دولت در اقتصاد، کاهش مقررات، مالیات‌های پایین‌تر و آزادی بیشتر برای کسب‌وکارها و افراد برای تولید، مبادله و مصرف مشخص می‌شود. این موضع بر بازارهای آزاد، مالکیت خصوصی و رقابت به عنوان محرک‌های شکوفایی تأکید دارد. گزینه‌های دیگر یا سمت چپ محور اقتصادی (مداخله قوی دولت) را توصیف می‌کنند یا مواضعی در محور آزادی‌های شخصی (آزادی‌های فردی یا ارزش‌های سنتی) که ابعاد جداگانه‌ای در این چارچوب سیاسی هستند.
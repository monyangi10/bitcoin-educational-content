question: Upande wa kulia wa mhimili wa kiuchumi (kuelekea 100) unawakilisha nini katika mchoro wa kisiasa wenye pande mbili?
answer: Upendeleo kwa uhuru wa kiuchumi bila kuingilia kati kwa serikali, kodi ndogo, na masoko huru
wrong_answers:
  - Upendeleo kwa uingiliaji kati mkali wa serikali na kodi kubwa na huduma kubwa za umma
  - Upendeleo kwa uhuru wa mtu binafsi na uvumilivu katika masuala ya kibinafsi na kijamii
  - Upendeleo kwa maadili ya kitamaduni, utaratibu, na usalama unaotekelezwa na serikali
explanation: |
  Upande wa kulia wa mhimili wa kiuchumi unawakilisha uhuru wa kiuchumi, unaoonyeshwa na uingiliaji mdogo wa serikali katika uchumi, kanuni zilizopunguzwa, kodi za chini, na uhuru mkubwa kwa biashara na watu binafsi kuzalisha, kubadilishana, na kutumia. Msimamo huu unasisitiza masoko huria, mali binafsi, na ushindani kama vichocheo vya ustawi. Chaguzi zingine zinaelezea upande wa kushoto wa mhimili wa kiuchumi (uingiliaji mkali wa serikali) au nafasi kwenye mhimili wa uhuru wa kibinafsi (uhuru wa mtu binafsi au maadili ya kitamaduni), ambayo ni vipimo tofauti katika mfumo huu wa kisiasa.
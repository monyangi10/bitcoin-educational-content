question: 在二维政治图表中，经济轴右侧（朝向 100）代表什么？
answer: 倾向于经济自由，减少国家干预、降低税收和自由市场
wrong_answers:
  - 倾向于国家通过高税收和广泛的公共服务进行强有力的干预
  - 在个人和社会事务中偏好个人自由和宽容
  - 偏好由国家强制推行的传统价值观、秩序和安全
explanation: |
  经济轴的右侧代表经济自由，其特点是国家对经济的干预最少，法规减少，税收降低，企业和个人有更大的生产、交换和消费自由、
  降低税收，企业和个人有更大的生产、交换和消费自由。这一立场强调自由市场、私有财产和竞争是繁荣的驱动力。其他选项描述的是经济轴左侧（强有力的国家干预）或个人自由轴上的立场（个人自由或传统价值观），它们是这一政治框架中的不同维度。
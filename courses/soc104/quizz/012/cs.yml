question: Co představuje pravá strana ekonomické osy (směrem k číslu 100) ve dvourozměrném politickém diagramu?
answer: Preference ekonomické svobody s menšími zásahy státu, nižšími daněmi a volným trhem
wrong_answers:
  - Preference silných státních zásahů s vysokými daněmi a rozsáhlými veřejnými službami
  - Preference osobních svobod a tolerance v osobních a společenských záležitostech
  - Preference tradičních hodnot, pořádku a bezpečnosti prosazovaných státem
explanation: |
  Pravá strana ekonomické osy představuje ekonomickou svobodu, která je charakterizována minimálními zásahy státu do ekonomiky a omezením regulací,
  nižší daně a větší svoboda pro podniky a jednotlivce při výrobě, směně a spotřebě. Tato pozice zdůrazňuje volný trh, soukromé vlastnictví a konkurenci jako hnací sílu prosperity. Ostatní možnosti popisují buď levou stranu ekonomické osy (silné státní zásahy), nebo postoje na ose osobních svobod (individuální svobody nebo tradiční hodnoty), které jsou v tomto politickém rámci samostatnými dimenzemi.
question: Mitä talousakselin oikea puoli (kohti 100) edustaa kaksiulotteisessa poliittisessa kaaviossa?
answer: Taloudellisen vapauden suosiminen vähemmällä valtion puuttumisella, alhaisemmilla veroilla ja vapailla markkinoilla
wrong_answers:
  - Valtion voimakkaan puuttumisen, korkeiden verojen ja laajojen julkisten palvelujen suosiminen
  - Yksilönvapauksien ja suvaitsevaisuuden suosiminen henkilökohtaisissa ja yhteiskunnallisissa asioissa
  - Perinteisten arvojen, järjestyksen ja valtion valvoman turvallisuuden suosiminen
explanation: |
  Taloudellisen akselin oikea puoli edustaa taloudellista vapautta, jolle on ominaista valtion vähäinen puuttuminen talouteen ja sääntelyn vähentäminen,
  alhaisemmat verot ja yritysten ja yksilöiden suurempi vapaus tuottaa, vaihtaa ja kuluttaa. Tämä kanta korostaa vapaita markkinoita, yksityisomaisuutta ja kilpailua vaurauden moottorina. Muut vaihtoehdot kuvaavat joko taloudellisen akselin vasenta puolta (voimakas valtion puuttuminen) tai henkilökohtaisten vapauksien akselin kantoja (yksilönvapaudet tai perinteiset arvot), jotka ovat erillisiä ulottuvuuksia tässä poliittisessa viitekehyksessä.
question: Mida kujutab kahemõõtmelisel poliitilisel diagrammil majandustelje parem pool (100 suunas)?
answer: Eelistab majanduslikku vabadust, vähem riigipoolset sekkumist, madalamaid makse ja vabu turge
wrong_answers:
  - Riigi tugeva sekkumise eelistamine koos kõrgete maksude ja ulatuslike avalike teenustega
  - Individuaalsete vabaduste ja sallivuse eelistamine isiklikes ja sotsiaalsetes küsimustes
  - Eelistus traditsioonilistele väärtustele, korrale ja turvalisusele, mida toetab riik
explanation: |
  Majandustelje parempoolne pool esindab majanduslikku vabadust, mida iseloomustab riigi minimaalne sekkumine majandusse, vähendatud reguleerimine,
  madalamad maksud ning ettevõtete ja üksikisikute suurem vabadus toota, vahetada ja tarbida. See positsioon rõhutab vabu turge, eraomandit ja konkurentsi kui jõukuse edasiviivaid tegureid. Teised valikud kirjeldavad kas majandustelje vasakpoolset osa (tugev riiklik sekkumine) või seisukohti isikuvabaduste teljel (individuaalsed vabadused või traditsioonilised väärtused), mis on selles poliitilises raamistikus eraldi mõõtmed.
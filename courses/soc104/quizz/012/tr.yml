question: İki boyutlu siyasi diyagramda ekonomik eksenin sağ tarafı (100'e doğru) neyi temsil ediyor?
answer: Daha az devlet müdahalesi, daha düşük vergiler ve serbest piyasalar ile ekonomik özgürlük tercihi
wrong_answers:
  - Yüksek vergiler ve kapsamlı kamu hizmetleri ile güçlü devlet müdahalesi tercihi
  - Kişisel ve sosyal konularda bireysel özgürlükleri ve hoşgörüyü tercih etmek
  - Devlet tarafından uygulanan geleneksel değerler, düzen ve güvenlik tercihi
explanation: |
  Ekonomik eksenin sağ tarafı, ekonomiye minimum devlet müdahalesi, azaltılmış düzenlemeler ile karakterize edilen ekonomik özgürlüğü temsil eder,
  daha düşük vergiler, işletmeler ve bireyler için daha fazla üretim, değişim ve tüketim özgürlüğü. Bu pozisyon, refahın itici güçleri olarak serbest piyasaları, özel mülkiyeti ve rekabeti vurgular. Diğer seçenekler ya ekonomik eksenin sol tarafını (güçlü devlet müdahalesi) ya da bu siyasi çerçevede ayrı boyutlar olan kişisel özgürlükler eksenindeki pozisyonları (bireysel özgürlükler veya geleneksel değerler) tanımlamaktadır.
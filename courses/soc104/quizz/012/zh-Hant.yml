question: 在二維政治圖表中，經濟軸的右側（朝向 100）代表什麼？
answer: 偏好較少國家干預、較低稅率和自由市場的經濟自由
wrong_answers:
  - 偏好強力的國家干預、高稅率和廣泛的公共服務
  - 在個人和社會事務上偏好個人自由和寬容
  - 偏好由國家強制執行的傳統價值、秩序與安全
explanation: |
  經濟軸的右側代表經濟自由，其特點是國家對經濟的干預最小、規範減少、稅率降低，以及企業和個人在生產、交換和消費上有更大的自由、
  稅率較低，企業與個人有較大的生產、交換與消費自由。這個立場強調自由市場、私有財產和競爭是繁榮的動力。其他選項描述的是經濟軸線左側（強烈的國家干預）或個人自由軸線上的立場（個人自由或傳統價值觀），在此政治架構中，它們是不同的層面。
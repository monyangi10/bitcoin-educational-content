question: بر اساس تحلیل گوستاو مولیناری در 'Les Soirées de la rue Saint Lazare' (انگ. Evenings on Saint Lazarus Street)، چه شباهت اساسی بین محافظه‌کاران و سوسیالیست‌ها وجود دارد با وجود تفاوت‌های ایدئولوژیک ظاهری آن‌ها؟
answer: هر دو تلاش می‌کنند تا دیدگاه خود از جامعه را از طریق مداخله دولت تحمیل کنند، با وجود اینکه دیدگاه‌های متفاوتی از اینکه آن جامعه باید چگونه باشد دارند.
wrong_answers:
  - هر دو حقوق مالکیت فردی را رد می‌کنند و مالکیت جمعی وسایل تولید را در جوامع ایده‌آل خود ترجیح می‌دهند.
  - هر دو آزادی را به عنوان یک اصل مطلق در نظر می‌گیرند که هرگز نباید به خطر بیفتد، بدون توجه به پیامدهای اجتماعی یا ملاحظات عملی.
  - هر دو با هر نوع مقررات دولتی مخالفند و از خصوصی‌سازی کامل تمامی خدمات و نهادهای عمومی حمایت می‌کنند.
explanation: |
  بینش کلیدی مولیناری این بود که محافظه‌کاران و سوسیالیست‌ها، علیرغم اختلافات سطحی‌شان، در رویکرد بنیادین به حکومت‌داری مشترک هستند: هر دو به استفاده از قدرت دولت برای تحمیل دیدگاه خاص خود از چگونگی سازماندهی جامعه باور دارند. محافظه‌کاران می‌خواهند ساختارهای سنتی را از طریق مداخله دولت حفظ کنند، در حالی که سوسیالیست‌ها می‌خواهند جامعه ایده‌آل خود را از طریق کنترل دولت ایجاد کنند. این در تضاد با شخصیت اقتصاددان لیبرترین است که با هر دو مخالف است زیرا استفاده از اجبار دولتی برای تحمیل هر دیدگاه اجتماعی خاص، چه سنتی و چه پیشرو، را رد می‌کند.
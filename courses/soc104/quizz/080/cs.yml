question: Jaká zásadní podobnost existuje mezi konzervativci a socialisty navzdory jejich zdánlivým ideologickým rozdílům podle analýzy Gustava Molinariho v knize "Les Soirées de la rue Saint Lazare" (Večery v ulici sv. Lazara)?
answer: Oba se snaží prosadit svou vizi společnosti prostřednictvím státních zásahů, přestože mají odlišné představy o tom, jak by tato společnost měla vypadat
wrong_answers:
  - Oba odmítají individuální vlastnická práva a ve svých ideálních společnostech upřednostňují kolektivní vlastnictví výrobních prostředků
  - Obě považují svobodu za absolutní princip, který by neměl být nikdy ohrožen bez ohledu na sociální důsledky nebo praktické ohledy
  - Oba jsou proti jakékoli formě státní regulace a prosazují úplnou privatizaci všech veřejných služeb a institucí
explanation: |
  Molinariho klíčový poznatek spočíval v tom, že konzervativci a socialisté mají navzdory povrchním neshodám společný základní přístup k vládnutí: oba věří, že je třeba využívat státní moc k prosazování své konkrétní vize uspořádání společnosti. Konzervativci chtějí zachovat tradiční struktury prostřednictvím státních zásahů, zatímco socialisté chtějí vytvořit svou ideální společnost prostřednictvím státní kontroly. To stojí v protikladu k postavě libertariánského ekonoma, který se staví proti oběma, protože odmítá používání státního donucení k vnucování jakékoli konkrétní společenské vize, ať už tradiční, nebo progresivní.
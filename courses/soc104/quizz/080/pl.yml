question: Według analizy Gustave'a Molinariego w "Les Soirées de la rue Saint Lazare" (ang. Wieczory na ulicy Świętego Łazarza), jakie fundamentalne podobieństwo istnieje między konserwatystami i socjalistami pomimo ich pozornych różnic ideologicznych?
answer: Obaj starają się narzucić swoją wizję społeczeństwa poprzez interwencję państwa, mimo że mają różne wizje tego, jak to społeczeństwo powinno wyglądać
wrong_answers:
  - Obaj odrzucają indywidualne prawa własności i opowiadają się za kolektywną własnością środków produkcji w swoich idealnych społeczeństwach
  - Obaj traktują wolność jako absolutną zasadę, której nigdy nie należy naruszać, bez względu na konsekwencje społeczne lub względy praktyczne
  - Obaj sprzeciwiają się jakiejkolwiek formie regulacji rządowej i opowiadają się za całkowitą prywatyzacją wszystkich usług i instytucji publicznych
explanation: |
  Kluczowym spostrzeżeniem Molinariego było to, że konserwatyści i socjaliści, pomimo powierzchownych nieporozumień, podzielają fundamentalne podejście do rządzenia: obaj wierzą w wykorzystanie władzy państwowej do narzucenia swojej konkretnej wizji tego, jak społeczeństwo powinno być zorganizowane. Konserwatyści chcą zachować tradycyjne struktury poprzez interwencję państwa, podczas gdy socjaliści chcą stworzyć swoje idealne społeczeństwo poprzez kontrolę państwa. Kontrastuje to z libertariańską postacią ekonomisty, który sprzeciwia się obu, ponieważ odrzuca użycie przymusu państwowego w celu narzucenia jakiejkolwiek konkretnej wizji społecznej, czy to tradycyjnej, czy postępowej.
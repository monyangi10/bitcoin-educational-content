question: Enligt Gustave Molinaris analys i "Les Soirées de la rue Saint Lazare" (eng. Evenings on Saint Lazarus Street), vilken grundläggande likhet finns det mellan konservativa och socialister trots deras uppenbara ideologiska skillnader?
answer: Båda försöker införa sin vision av samhället genom statliga ingripanden, trots att de har olika visioner av hur samhället ska se ut
wrong_answers:
  - Båda förkastar individuell äganderätt och förespråkar kollektivt ägande av produktionsmedlen i sina idealsamhällen
  - Båda betraktar frihet som en absolut princip som aldrig får äventyras, oavsett sociala konsekvenser eller praktiska överväganden
  - Båda motsätter sig alla former av statliga regleringar och förespråkar en fullständig privatisering av alla offentliga tjänster och institutioner
explanation: |
  Molinaris viktigaste insikt var att konservativa och socialister, trots sina ytliga meningsskiljaktigheter, delar en grundläggande syn på styrning: båda tror på att använda statsmakten för att införa sin speciella vision av hur samhället bör organiseras. Konservativa vill bevara traditionella strukturer genom statliga ingripanden, medan socialister vill skapa sitt idealsamhälle genom statlig kontroll. Detta står i kontrast till den libertarianska ekonomen som motsätter sig båda eftersom han avvisar användandet av statligt tvång för att införa en viss samhällsvision, oavsett om den är traditionell eller progressiv.
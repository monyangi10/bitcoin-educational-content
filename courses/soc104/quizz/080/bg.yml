question: Според анализа на Гюстав Молинари в "Вечерите на улица Сен Лазар" (Les Soirées de la rue Saint Lazare), каква основна прилика съществува между консерваторите и социалистите въпреки привидните им идеологически различия?
answer: И двамата се стремят да наложат своята визия за обществото чрез държавна намеса, въпреки че имат различни виждания за това как трябва да изглежда това общество
wrong_answers:
  - И двамата отхвърлят индивидуалните права на собственост и подкрепят колективната собственост върху средствата за производство в своите идеални общества
  - И двете разглеждат свободата като абсолютен принцип, който никога не трябва да се нарушава, независимо от социалните последици или практическите съображения
  - И двамата се противопоставят на всяка форма на държавно регулиране и се застъпват за пълна приватизация на всички обществени услуги и институции
explanation: |
  Ключовото прозрение на Молинари е, че консерваторите и социалистите, въпреки повърхностните си разногласия, споделят един фундаментален подход към управлението: и двамата вярват, че трябва да използват държавната власт, за да наложат своята конкретна визия за това как трябва да бъде организирано обществото. Консерваторите искат да запазят традиционните структури чрез държавна намеса, докато социалистите искат да създадат своето идеално общество чрез държавен контрол. Това контрастира с либертарианския характер на икономиста, който се противопоставя и на двамата, тъй като отхвърля използването на държавна принуда за налагане на всяка конкретна социална визия, независимо дали е традиционна или прогресивна.
question: Gustave Molinarin analyysin mukaan teoksessa Les Soirées de la rue Saint Lazare (Saint Lazaruksen kadun illat) konservatiivien ja sosialistien välillä on ilmeisistä ideologisista eroista huolimatta perustavaa laatua olevia yhtäläisyyksiä
answer: Molemmat pyrkivät pakottamaan näkemyksensä yhteiskunnasta valtion väliintulon avulla, vaikka heillä on erilaiset näkemykset siitä, miltä yhteiskunnan pitäisi näyttää
wrong_answers:
  - Molemmat hylkäävät yksilön omistusoikeudet ja suosivat tuotantovälineiden kollektiivista omistusta ihanneyhteiskunnissaan
  - Molemmat pitävät vapautta ehdottomana periaatteena, josta ei pidä koskaan tinkiä yhteiskunnallisista seurauksista tai käytännöllisistä näkökohdista riippumatta
  - Molemmat vastustavat kaikenlaista valtion sääntelyä ja kannattavat kaikkien julkisten palvelujen ja instituutioiden täydellistä yksityistämistä
explanation: |
  Molinarin keskeinen oivallus oli, että konservatiivit ja sosialistit jakavat pinnallisista erimielisyyksistään huolimatta perustavanlaatuisen lähestymistavan hallintoon: molemmat uskovat, että valtiovallan avulla on voitava tyrkyttää omaa näkemystään siitä, miten yhteiskunta tulisi järjestää. Konservatiivit haluavat säilyttää perinteiset rakenteet valtion väliintulon avulla, kun taas sosialistit haluavat luoda ihanneyhteiskunnan valtion valvonnan avulla. Tämä on vastakohta libertaristiselle taloustieteilijälle, joka vastustaa molempia, koska hän torjuu valtion pakkokeinojen käytön minkä tahansa tietyn yhteiskunnallisen näkemyksen, olipa kyseessä sitten perinteinen tai edistyksellinen näkemys, tyrkyttämiseksi.
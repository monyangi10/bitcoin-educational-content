question: Welke fundamentele overeenkomst bestaat er volgens Gustave Molinari's analyse in 'Les Soirées de la rue Saint Lazare' (Eng. Avonden in de Sint Lazarusstraat) tussen conservatieven en socialisten ondanks hun ogenschijnlijke ideologische verschillen?
answer: Beiden proberen hun visie op de samenleving op te leggen door middel van staatsinterventie, ondanks dat ze verschillende visies hebben op hoe die samenleving eruit zou moeten zien
wrong_answers:
  - Beiden verwerpen individuele eigendomsrechten en geven de voorkeur aan collectief eigendom van de productiemiddelen in hun ideale samenlevingen
  - Beide behandelen vrijheid als een absoluut principe dat nooit mag worden aangetast, ongeacht sociale gevolgen of praktische overwegingen
  - Beiden zijn tegen elke vorm van overheidsregulering en pleiten voor volledige privatisering van alle openbare diensten en instellingen
explanation: |
  Molinari's belangrijkste inzicht was dat conservatieven en socialisten, ondanks hun oppervlakkige meningsverschillen, een fundamentele benadering van bestuur delen: beiden geloven in het gebruik van staatsmacht om hun specifieke visie op de organisatie van de samenleving op te leggen. Conservatieven willen traditionele structuren behouden door middel van staatsinterventie, terwijl socialisten hun ideale samenleving willen creëren door middel van staatscontrole. Dit staat in contrast met de libertarische econoom die tegen beide is omdat hij het gebruik van staatsdwang afwijst om een bepaalde sociale visie op te leggen, of die nu traditioneel of progressief is.
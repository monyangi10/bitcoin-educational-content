question: "गुस्ताव मोलिनारी के 'लेस सोइरीज़ डे ला रुए सेंट लाज़ारे' (अंग्रेजी में: सेंट लाजरस स्ट्रीट पर शामें) में किए गए विश्लेषण के अनुसार, स्पष्ट वैचारिक मतभेदों के बावजूद रूढ़िवादियों और समाजवादियों के बीच क्या मूलभूत समानता मौजूद है?"
answer: दोनों ही राज्य के हस्तक्षेप के माध्यम से समाज के अपने-अपने दृष्टिकोण को थोपना चाहते हैं, भले ही उस समाज के स्वरूप के बारे में उनके विचार अलग-अलग हों।
wrong_answers:
  - दोनों ही अपने आदर्श समाजों में व्यक्तिगत संपत्ति के अधिकारों को अस्वीकार करते हैं और उत्पादन के साधनों के सामूहिक स्वामित्व का समर्थन करते हैं।
  - दोनों ही स्वतंत्रता को एक ऐसे परम सिद्धांत के रूप में मानते हैं जिससे सामाजिक परिणामों या व्यावहारिक विचारों की परवाह किए बिना कभी समझौता नहीं किया जाना चाहिए।
  - दोनों ही किसी भी प्रकार के सरकारी नियमन का विरोध करते हैं और सभी सार्वजनिक सेवाओं और संस्थानों के पूर्ण निजीकरण की वकालत करते हैं।
explanation: |
  मोलिनारी का प्रमुख विचार यह था कि रूढ़िवादी और समाजवादी, सतही मतभेदों के बावजूद, शासन के प्रति एक मूलभूत दृष्टिकोण साझा करते हैं: दोनों का मानना ​​है कि राज्य शक्ति का उपयोग समाज के संगठन के अपने विशेष दृष्टिकोण को लागू करने के लिए किया जाना चाहिए। रूढ़िवादी राज्य के हस्तक्षेप के माध्यम से पारंपरिक संरचनाओं को संरक्षित करना चाहते हैं, जबकि समाजवादी राज्य नियंत्रण के माध्यम से अपने आदर्श समाज का निर्माण करना चाहते हैं। यह उदारवादी अर्थशास्त्री के चरित्र के विपरीत है, जो इन दोनों का विरोध करता है क्योंकि वह किसी भी विशेष सामाजिक दृष्टिकोण, चाहे वह पारंपरिक हो या प्रगतिशील, को थोपने के लिए राज्य के दबाव का उपयोग करने को अस्वीकार करता है।
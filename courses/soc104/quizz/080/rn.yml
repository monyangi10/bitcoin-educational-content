question: Dukurikije icegeranyo ca Gustave Molinari mu gitabu ciwe citwa ‘Les Soirées de la rue Saint Lazare’ (icong. Ijoro ku nzira ya Lazaro mweranda), ni igiki c’ishimikiro basa n’abanyagihugu b’abanyagihugu n’abanyagihugu b’abanyagihugu naho basa n’abatandukanye mu vyiyumviro?
answer: Bompi barondera gutegeka ivyiyumviro vyabo ku kibano biciye mu gufasha Leta, naho bafise ivyiyumviro bitandukanye ku bijanye n’ingene ico kibano gikwiye gusa .
wrong_answers:
  - Bompi banse uburenganzira bw’umuntu ku giti ciwe kandi bagashigikira ko bose bafise uburyo bwo guhingura mu mibano yabo nziza .
  - Bompi bafata umwidegemvyo nk’ingingo ngenderwako idakwiye kwigera ihungabanywa, ata kuraba ingaruka zo mu kibano canke ibintu bishobora gukorwa .
  - Bompi barwanya uburyo bwose bwo gutegeka Leta kandi bagasaba ko ibikorwa vyose vya Leta n'inzego zose vyohindurwa ivy'abikorera ku giti cabo .
explanation: |
  Iciyumviro nyamukuru Molinari yari afise ni uko aba conservateurs n’aba socialistes, naho badahuza ku rugero rwo hejuru, basangiye uburyo bw’ishimikiro bwo gutwara: bompi bemera gukoresha ububasha bwa Leta kugira ngo bategeke iciyumviro cabo kidasanzwe c’ingene igihugu gikwiye gutunganirizwa. Abanyagihugu bashaka kuzigama imibumbe y’imigenzo biciye mu gufasha Leta, mu gihe abasosiyalisiti bashaka kurema ikibano cabo ciza biciye mu kugenzura Leta. Ivyo bitandukanye n’akaranga k’umunyabutunzi w’umunyagihugu arwanya ivyo vyose kuko yanse gukoresha inguvu za Leta kugira ngo zitegeke iyerekwa ryose ry’imibano, ryaba iry’imigenzo canke iry’iterambere.
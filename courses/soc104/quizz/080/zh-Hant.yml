question: 根據 Gustave Molinari 在 'Les Soirées de la rue Saint Lazare' (eng. Evenings on Saint Lazarus Street) 中的分析，儘管保守派和社會主義者在意識形態上有明顯的差異，但他們之間有什麼基本的相似之處？
answer: 兩者都試圖透過國家干預來強加他們對社會的願景，儘管他們對社會應該是什麼樣子有不同的願景
wrong_answers:
  - 在他們的理想社會中，兩者都拒絕個人產權，傾向於生產手段的集體所有權
  - 兩者都將自由視為絕對原則，不論社會後果或實際考量如何，都絕對不能妥協。
  - 兩者都反對任何形式的政府規範，並主張所有公共服務和機構完全私有化
explanation: |
  Molinari 的主要見解是，保守派和社會主義者儘管表面上有分歧，但在治理方面卻有共同的基本方法：兩者都相信要運用國家權力來強加他們對社會組織方式的特定願景。保守派希望透過國家干預來維護傳統結構，而社會主義者則希望透過國家控制來創造他們的理想社會。這與自由主義經濟學家的性格形成對比，自由主義經濟學家反對兩者，因為他拒絕使用國家強權來強加任何特定的社會願景，不論是傳統或進步的願景。
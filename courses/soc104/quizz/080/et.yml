question: Gustave Molinari analüüsi "Les Soirées de la rue Saint Lazare" (Õhtud Saint Lazaruse tänaval) kohaselt, milline põhimõtteline sarnasus on konservatiivide ja sotsialistide vahel vaatamata nende näilistele ideoloogilistele erinevustele?
answer: Mõlemad püüavad riigi sekkumise kaudu kehtestada oma nägemust ühiskonnast, hoolimata sellest, et neil on erinevad nägemused sellest, milline see ühiskond peaks välja nägema
wrong_answers:
  - Mõlemad lükkavad tagasi individuaalsed omandiõigused ja pooldavad tootmisvahendite kollektiivset omandiõigust oma ideaalses ühiskonnas
  - Mõlemad käsitlevad vabadust kui absoluutset põhimõtet, mida ei tohiks kunagi kahjustada, sõltumata sotsiaalsetest tagajärgedest või praktilistest kaalutlustest
  - Mõlemad on igasuguse riikliku reguleerimise vastu ja pooldavad kõigi avalike teenuste ja institutsioonide täielikku erastamist
explanation: |
  Molinari peamine arusaam oli, et konservatiivid ja sotsialistid jagavad vaatamata oma pealiskaudsetele erimeelsustele põhimõttelist lähenemist valitsemisele: mõlemad usuvad, et riigivõimu tuleb kasutada selleks, et kehtestada oma nägemus sellest, kuidas ühiskond peaks olema korraldatud. Konservatiivid soovivad riigi sekkumise kaudu säilitada traditsioonilisi struktuure, samas kui sotsialistid soovivad riigi kontrolli abil luua oma ideaalset ühiskonda. See on vastuolus libertaarne majandusteadlane, kes on mõlema vastu, sest ta lükkab tagasi riikliku sunni kasutamise mis tahes konkreetse sotsiaalse nägemuse, olgu see siis traditsiooniline või progressiivne, kehtestamiseks.
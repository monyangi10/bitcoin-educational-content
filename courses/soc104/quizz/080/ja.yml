question: サン・ラザール通りの夕べ』におけるギュスターヴ・モリナーリの分析によれば、保守派と社会主義者の間には、イデオロギーの違いこそあれ、どのような根本的な共通点があるのだろうか？
answer: 両者とも、社会のあるべき姿について異なるビジョンを持っているにもかかわらず、国家の介入を通じて社会のビジョンを押し付けようとしている。
wrong_answers:
  - どちらも個人の所有権を否定し、理想社会における生産手段の集団所有に賛成している。
  - 両者とも、社会的な影響や現実的な配慮にかかわらず、自由を決して妥協してはならない絶対的な原理として扱っている。
  - 両者とも、あらゆる形態の政府規制に反対し、あらゆる公共サービスや公共機関の完全民営化を主張している。
explanation: |
  モリナーリの重要な洞察は、保守派と社会主義者は、表面的な意見の相違にもかかわらず、統治に対する基本的なアプローチを共有しているということである。保守派は国家の介入によって伝統的な構造を維持したいと考え、社会主義者は国家の統制によって理想的な社会を作りたいと考える。これは、伝統的であれ進歩的であれ、特定の社会的ビジョンを押し付けるために国家権力を行使することを否定するリバタリアン・エコノミストとは対照的である。
question: Gustave Molinari'nin 'Les Soirées de la rue Saint Lazare' (Saint Lazarus Sokağında Akşamlar) adlı eserindeki analizine göre, görünürdeki ideolojik farklılıklarına rağmen muhafazakârlar ve sosyalistler arasında hangi temel benzerlik vardır?
answer: Her ikisi de toplumun neye benzemesi gerektiğine dair farklı vizyonlara sahip olmalarına rağmen, devlet müdahalesi yoluyla kendi toplum vizyonlarını empoze etmeye çalışmaktadır
wrong_answers:
  - Her ikisi de bireysel mülkiyet haklarını reddeder ve ideal toplumlarında üretim araçlarının kolektif mülkiyetini destekler
  - Her ikisi de özgürlüğü, sosyal sonuçlarına veya pratik mülahazalara bakılmaksızın asla taviz verilmemesi gereken mutlak bir ilke olarak ele alır
  - Her ikisi de her türlü hükümet düzenlemesine karşı çıkmakta ve tüm kamu hizmetlerinin ve kurumlarının tamamen özelleştirilmesini savunmaktadır
explanation: |
  Molinari'nin temel öngörüsü, muhafazakârlar ve sosyalistlerin, yüzeysel anlaşmazlıklarına rağmen, yönetişim konusunda temel bir yaklaşımı paylaştıklarıdır: her ikisi de toplumun nasıl örgütlenmesi gerektiğine dair kendi özel vizyonlarını dayatmak için devlet gücünü kullanmaya inanmaktadır. Muhafazakârlar devlet müdahalesi yoluyla geleneksel yapıları korumak isterken, sosyalistler devlet kontrolü yoluyla ideal toplumlarını yaratmak istemektedir. Bu durum, ister geleneksel ister ilerici olsun, herhangi bir toplumsal vizyonu dayatmak için devlet zorunun kullanılmasını reddettiği için her ikisine de karşı çıkan liberteryen ekonomist karakterle tezat oluşturmaktadır.
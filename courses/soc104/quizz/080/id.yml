question: "Menurut analisis Gustave Molinari dalam 'Les Soirées de la rue Saint Lazare' (bahasa Inggris: Evenings on Saint Lazarus Street), kesamaan mendasar apa yang ada antara kaum konservatif dan sosialis terlepas dari perbedaan ideologi mereka yang tampak jelas?"
answer: "Keduanya berusaha untuk memaksakan visi mereka tentang masyarakat melalui keterlibatan negara, meskipun memiliki visi yang berbeda tentang seperti apa masyarakat itu seharusnya"
wrong_answers:
  - "Keduanya menolak hak milik individu dan mendukung kepemilikan kolektif atas alat-alat produksi dalam masyarakat ideal mereka"
  - "Keduanya memperlakukan kebebasan sebagai prinsip mutlak yang tidak boleh dikompromikan, terlepas dari konsekuensi sosial atau pertimbangan praktis"
  - "Keduanya menentang segala bentuk peraturan pemerintah dan mengadvokasi privatisasi penuh atas semua layanan dan institusi publik"
explanation: |
  Wawasan utama Molinari adalah bahwa kaum konservatif dan sosialis, terlepas dari ketidaksepakatan mereka di permukaan, memiliki pendekatan yang sama terhadap tata kelola pemerintahan: keduanya percaya bahwa kekuasaan negara dapat digunakan untuk memaksakan visi mereka tentang bagaimana masyarakat harus diatur. Kaum konservatif ingin melestarikan struktur tradisional melalui intervensi negara, sementara kaum sosialis ingin menciptakan masyarakat ideal mereka melalui kontrol negara. Hal ini berbeda dengan karakter ekonom libertarian yang menentang keduanya karena ia menolak penggunaan paksaan negara untuk memaksakan visi sosial tertentu, baik yang tradisional maupun yang progresif.

question: 구스타브 몰리나리의 분석에 따르면, 보수주의자와 사회주의자 사이에는 명백한 이념적 차이에도 불구하고 어떤 근본적인 유사성이 존재한다고 하는데요, '레 소아레 드 라 루 생 라자르 거리의 저녁'(eng. 성 라자루스 거리의 저녁)은 어떤 내용을 담고 있을까요?
answer: 둘 다 국가 개입을 통해 사회에 대한 비전을 강요하려 하지만, 그 사회가 어떤 모습이어야 하는지에 대한 비전은 서로 다릅니다
wrong_answers:
  - 둘 다 개인의 재산권을 거부하고 이상적인 사회에서 생산 수단의 집단적 소유를 선호합니다
  - 둘 다 자유를 사회적 결과나 현실적 고려 사항에 관계없이 절대로 타협해서는 안 되는 절대 원칙으로 취급합니다
  - 두 사람 모두 모든 형태의 정부 규제에 반대하며 모든 공공 서비스 및 기관의 완전한 민영화를 옹호합니다
explanation: |
  몰리나리의 핵심 통찰은 보수주의자와 사회주의자는 표면적인 의견 차이에도 불구하고 통치에 대한 근본적인 접근 방식을 공유한다는 점, 즉 둘 다 국가 권력을 사용하여 사회가 어떻게 조직되어야 하는지에 대한 특정 비전을 강요하는 것을 믿는다는 점입니다. 보수주의자들은 국가의 개입을 통해 전통적인 구조를 보존하고자 하는 반면, 사회주의자들은 국가의 통제를 통해 이상적인 사회를 만들고자 합니다. 이는 전통적이든 진보적이든 특정 사회 비전을 강요하기 위해 국가의 강압을 사용하는 것을 거부하기 때문에 두 가지 모두에 반대하는 자유주의 경제학자 성격과 대조를 이룹니다.
question: 根据古斯塔夫-莫里纳利在《圣拉扎尔街的夜晚》（Les Soirées de la rue Saint Lazare）一书中的分析，尽管保守派和社会主义者在意识形态上存在明显差异，但他们之间存在哪些基本相似之处？
answer: 两人都试图通过国家干预将自己的社会愿景强加于人，尽管他们对这个社会应该是什么样子有着不同的看法
wrong_answers:
  - 在他们的理想社会中，两者都反对个人财产权，主张生产资料集体所有制
  - 两者都将自由视为绝对原则，无论社会后果或实际考虑如何，都绝不能妥协
  - 两者都反对任何形式的政府监管，主张将所有公共服务和机构完全私有化
explanation: |
  莫利纳利的主要见解是，保守派和社会主义者尽管表面上意见不一，但在治理问题上却有着共同的基本方法：他们都相信利用国家权力来强加他们对社会组织方式的特定看法。保守派希望通过国家干预来维护传统结构，而社会主义者则希望通过国家控制来创造他们的理想社会。与此形成鲜明对比的是，自由主义经济学家反对这两种观点，因为他反对使用国家强制力来强加任何特定的社会愿景，无论是传统的还是进步的。
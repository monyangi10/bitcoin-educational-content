question: Hvilke grunnleggende likheter finnes det mellom konservative og sosialister til tross for deres tilsynelatende ideologiske forskjeller, ifølge Gustave Molinaris analyse i "Les Soirées de la rue Saint Lazare" (eng. Evenings on Saint Lazarus Street)?
answer: Begge søker å påtvinge samfunnet sin visjon gjennom statlig inngripen, til tross for at de har ulike visjoner om hvordan dette samfunnet bør se ut
wrong_answers:
  - Begge avviser individuell eiendomsrett og går inn for kollektivt eierskap til produksjonsmidlene i sine idealsamfunn
  - Begge ser på frihet som et absolutt prinsipp som aldri bør kompromitteres, uavhengig av sosiale konsekvenser eller praktiske hensyn
  - Begge er motstandere av enhver form for statlig regulering og går inn for fullstendig privatisering av alle offentlige tjenester og institusjoner
explanation: |
  Molinaris hovedinnsikt var at konservative og sosialister, til tross for uenigheter på overflaten, deler en grunnleggende tilnærming til styresett: Begge tror på å bruke statsmakt til å påtvinge sin spesielle visjon om hvordan samfunnet bør organiseres. Konservative ønsker å bevare tradisjonelle strukturer gjennom statlig inngripen, mens sosialister ønsker å skape sitt idealsamfunn gjennom statlig kontroll. Dette står i kontrast til den libertarianske økonomen, som er motstander av begge deler fordi han avviser bruk av statlig tvang for å påtvinge en bestemt samfunnsvisjon, enten den er tradisjonell eller progressiv.
question: Welche grundsätzlichen Gemeinsamkeiten zwischen Konservativen und Sozialisten gibt es nach der Analyse von Gustave Molinari in "Les Soirées de la rue Saint Lazare" (dt. Abende in der Lazarusstraße) trotz ihrer scheinbaren ideologischen Unterschiede?
answer: Beide versuchen, ihre Vorstellung von der Gesellschaft durch staatliche Eingriffe durchzusetzen, obwohl sie unterschiedliche Vorstellungen davon haben, wie diese Gesellschaft aussehen sollte
wrong_answers:
  - Beide lehnen individuelle Eigentumsrechte ab und bevorzugen in ihren idealen Gesellschaften das kollektive Eigentum an den Produktionsmitteln
  - Beide betrachten die Freiheit als ein absolutes Prinzip, das ungeachtet sozialer Konsequenzen oder praktischer Erwägungen niemals in Frage gestellt werden darf
  - Beide lehnen jede Form von staatlicher Regulierung ab und befürworten die vollständige Privatisierung aller öffentlichen Dienste und Einrichtungen
explanation: |
  Molinaris wichtigste Erkenntnis war, dass Konservative und Sozialisten trotz ihrer oberflächlichen Meinungsverschiedenheiten einen grundlegenden Ansatz für das Regieren teilen: Beide glauben an den Einsatz staatlicher Macht zur Durchsetzung ihrer besonderen Vision davon, wie die Gesellschaft organisiert sein sollte. Die Konservativen wollen traditionelle Strukturen durch staatliche Eingriffe bewahren, während die Sozialisten ihre ideale Gesellschaft durch staatliche Kontrolle schaffen wollen. Dies steht im Gegensatz zum libertären Ökonomen, der beides ablehnt, weil er den Einsatz von staatlichem Zwang zur Durchsetzung einer bestimmten gesellschaftlichen Vision, sei sie nun traditionell oder fortschrittlich, zurückweist.
question: Prema analizi Gustava Molinarija u 'Les Soirées de la rue Saint Lazare' (srp. Večeri u ulici Sen Lazar), koja fundamentalna sličnost postoji između konzervativaca i socijalista uprkos njihovim očiglednim ideološkim razlikama?
answer: Oboje nastoje da nametnu svoju viziju društva putem državne intervencije, uprkos tome što imaju različite vizije o tome kako bi to društvo trebalo da izgleda.
wrong_answers:
  - Oboje odbacuju individualna vlasnička prava i favorizuju kolektivno vlasništvo nad sredstvima za proizvodnju u svojim idealnim društvima.
  - Oboje tretiraju slobodu kao apsolutni princip koji nikada ne treba kompromitovati, bez obzira na društvene posledice ili praktična razmatranja.
  - Oboje se protive bilo kakvom obliku državne regulacije i zalažu se za potpunu privatizaciju svih javnih usluga i institucija.
explanation: |
  Ključni uvid Molinarija bio je da konzervativci i socijalisti, uprkos svojim površinskim neslaganjima, dele fundamentalni pristup upravljanju: oba veruju u korišćenje državne moći za nametanje svoje posebne vizije o tome kako društvo treba da bude organizovano. Konzervativci žele da očuvaju tradicionalne strukture kroz državnu intervenciju, dok socijalisti žele da stvore svoje idealno društvo kroz državnu kontrolu. Ovo je u suprotnosti sa libertarijanskim ekonomistom koji se protivi oboma jer odbacuje korišćenje državne prinude za nametanje bilo koje posebne društvene vizije, bilo tradicionalne ili progresivne.
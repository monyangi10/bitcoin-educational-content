question: Secondo l'analisi di Gustave Molinari in "Les Soirées de la rue Saint Lazare" (le serate di via Saint Lazarus), quale somiglianza fondamentale esiste tra conservatori e socialisti nonostante le loro apparenti differenze ideologiche?
answer: Entrambi cercano di imporre la loro visione della società attraverso l'intervento dello Stato, pur avendo visioni diverse di come dovrebbe essere questa società
wrong_answers:
  - Entrambi rifiutano i diritti di proprietà individuali e favoriscono la proprietà collettiva dei mezzi di produzione nelle loro società ideali
  - Entrambi trattano la libertà come un principio assoluto che non dovrebbe mai essere compromesso, a prescindere dalle conseguenze sociali o dalle considerazioni pratiche
  - Entrambi si oppongono a qualsiasi forma di regolamentazione governativa e sostengono la completa privatizzazione di tutti i servizi e le istituzioni pubbliche
explanation: |
  L'intuizione chiave di Molinari è che conservatori e socialisti, nonostante i disaccordi di superficie, condividono un approccio fondamentale alla governance: entrambi credono nell'uso del potere statale per imporre la loro particolare visione di come la società dovrebbe essere organizzata. I conservatori vogliono preservare le strutture tradizionali attraverso l'intervento dello Stato, mentre i socialisti vogliono creare la loro società ideale attraverso il controllo dello Stato. Ciò è in contrasto con il personaggio dell'economista libertario, che si oppone a entrambi perché rifiuta l'uso della coercizione statale per imporre una particolare visione sociale, sia essa tradizionale o progressista.
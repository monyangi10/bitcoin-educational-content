question: Согласно анализу Гюстава Молинари в книге "Вечера на улице Сен-Лазар" (Les Soirées de la rue Saint Lazare), какое фундаментальное сходство существует между консерваторами и социалистами, несмотря на их кажущиеся идеологические различия?
answer: Оба стремятся навязать свое видение общества с помощью государственного вмешательства, несмотря на то, что у них разные представления о том, как должно выглядеть это общество
wrong_answers:
  - Оба отвергают право индивидуальной собственности и выступают за коллективное владение средствами производства в своих идеальных обществах
  - В обоих случаях свобода рассматривается как абсолютный принцип, которым нельзя поступиться, независимо от социальных последствий или практических соображений
  - Оба выступают против любой формы государственного регулирования и за полную приватизацию всех государственных служб и учреждений
explanation: |
  Главная мысль Молинари заключалась в том, что консерваторы и социалисты, несмотря на поверхностные разногласия, разделяют фундаментальный подход к управлению: и те, и другие верят в использование государственной власти для навязывания своего особого видения того, как должно быть организовано общество. Консерваторы хотят сохранить традиционные структуры с помощью государственного вмешательства, в то время как социалисты стремятся создать свое идеальное общество с помощью государственного контроля. Это контрастирует с либертарианским экономистом, который выступает против обоих, поскольку отвергает использование государственного принуждения для навязывания какого-либо конкретного социального видения, будь то традиционное или прогрессивное.
question: 다이아몬드 모델에 따르면 좌익과 우익 통계학자의 주요 차이점은 무엇인가요?
answer: 둘 다 정부 권력을 사용하려고 하지만 가치와 우선 순위는 다릅니다
wrong_answers:
  - 좌파 통계학자들은 더 많은 정부를 원하고 우파 통계학자들은 더 적은 정부를 원합니다
  - 우익 통계학자들은 경제적 자유를 지지하는 반면 좌익 통계학자들은 모든 자유에 반대합니다
  - 좌파 통계학자는 진보적인 반면 우파 통계학자는 보수적이라고 정의할 수 있습니다
explanation: |
  이 장에서는 좌파와 우파 모두 국가주의의 한 형태이며, 둘 다 정부의 힘을 이용해 자신의 비전을 사회에 강요하고자 한다고 설명합니다.
  우파 통계학자들은 도덕과 전통을 법제화하는 데 중점을 두면서 경제적 자유를 어느 정도 허용하는 반면, 좌파 통계학자들은 사회 정의와 부의 재분배를 우선시하면서 전통적인 도덕적 요구에는 덜 신경을 쓴다는 차이점이 있습니다. 두 사람 모두 궁극적으로 입법을 통해 사회를 통제하려고 하기 때문에 단순한 좌우 스펙트럼의 대립이 아니라 서로 다른 유형의 통계학자라고 할 수 있습니다.
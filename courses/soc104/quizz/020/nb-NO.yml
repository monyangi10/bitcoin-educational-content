question: Hva er den viktigste forskjellen mellom høyre- og venstreradikale statstilhengere, ifølge diamantmodellen?
answer: Begge ønsker å bruke statlig makt, men for ulike verdier og prioriteringer
wrong_answers:
  - Venstreorienterte statstilhengere vil ha mer stat, mens høyreorienterte statstilhengere vil ha mindre stat
  - Høyreorienterte statstilhengere støtter økonomisk frihet, mens venstreorienterte statstilhengere er motstandere av alle friheter
  - Venstreorienterte statstilhengere er liberale, mens høyreorienterte statstilhengere per definisjon er konservative
explanation: |
  Kapitlet forklarer at både høyre- og venstresiden er former for statisme - de ønsker begge å bruke statlig makt for å påtvinge samfunnet sin visjon.
  Forskjellen ligger i prioriteringene: Høyresidens statstilhengere fokuserer på å lovfeste moral og tradisjon, samtidig som de tillater en viss økonomisk frihet, mens venstresidens statstilhengere prioriterer sosial rettferdighet og omfordeling av rikdom, samtidig som de er mindre opptatt av tradisjonelle moralske krav. Begge søker til syvende og sist å kontrollere samfunnet gjennom lovgivning, noe som gjør dem til ulike typer statstilhengere snarere enn motsetninger på et enkelt venstre-høyre-spektrum.
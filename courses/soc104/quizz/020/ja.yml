question: ダイヤモンド・モデルによると、左翼と右翼の国家主義者の決定的な違いは何か？
answer: どちらも政府の権力を利用しようとしているが、価値観や優先順位は異なる。
wrong_answers:
  - 左翼の国家主義者は政府を増やすことを望み、右翼の国家主義者は政府を減らすことを望む。
  - 右翼の国家主義者は経済的自由を支持し、左翼の国家主義者はすべての自由に反対する。
  - 左翼の国家主義者はリベラルであり、右翼の国家主義者は保守的である。
explanation: |
  この章では、左翼も右翼も国家主義の一形態であり、どちらも政府の力を使って自分たちのビジョンを社会に押し付けようとしていると説明する。
  右派の国家主義者は、ある程度の経済的自由を認める一方で、道徳や伝統を法制化することに重きを置くのに対し、左派の国家主義者は、社会正義と富の再分配を優先する一方で、伝統的な道徳的要件にはあまり関心を示さない。両者とも最終的には法制化によって社会をコントロールしようとしており、単純な左右の対立軸ではなく、異なるタイプの国家主義者である。
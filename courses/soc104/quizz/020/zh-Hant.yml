question: 根據鑽石模型，左翼和右翼國家主義者之間的主要差異是什麼？
answer: 兩者都試圖運用政府權力，但卻有不同的價值觀與優先順序
wrong_answers:
  - 左翼國家主義者想要更多的政府，而右翼國家主義者則想要更少的政府
  - 右翼國家主義者支持經濟自由，而左翼國家主義者反對所有自由
  - 根據定義，左翼國家主義者是自由主義者，而右翼國家主義者是保守主義者。
explanation: |
  本章說明左翼和右翼都是國家主義的形式 - 他們都想利用政府力量將他們的願景強加於社會。
  兩者的差異在於他們的優先順序：右翼國家主義者著重於道德與傳統的立法，同時允許一些經濟自由；而左翼國家主義者則以社會正義與財富再分配為優先順序，同時較不關心傳統的道德要求。兩者最終都尋求透過立法來控制社會，這使得他們成為不同類型的國家主義者，而非簡單的左右光譜上的對立。
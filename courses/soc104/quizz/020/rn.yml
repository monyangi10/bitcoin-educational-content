question: Dushingiye ku citegererezo c’amadayimoni, ni irihe tandukaniro nyamukuru riri hagati y’abahinga mu vy’imibare bo mu bubamfu n’abo mu buryo?
answer: Bompi barondera gukoresha ububasha bwa Leta ariko kubera agaciro n’ivyo bashira imbere bitandukanye .
wrong_answers:
  - Abahinga mu vy’imibare bo mu bubamfu bashaka intwaro nyinshi mu gihe abahinga mu vy’imibare bo mu buryo bashaka intwaro nke
  - Abanyapolitike bo mu buryo bashigikiye umwidegemvyo mu vy'ubutunzi mu gihe abanyapolitike bo mu bubamfu barwanya umwidegemvyo wose
  - Abahinga mu vy'imibare bo mu bubamfu ni abafise uburenganzira bwo kwidegemvya mu gihe abahinga mu vy'imibare bo mu buryo bw'iburyo ari abakunda ivy'ubuhinga
explanation: |
  Ico gice kirasigura ko ibubamfu n’iburyo vyose ari uburyo bwa statism - vyose bishaka gukoresha inguvu za Leta kugira ngo bitegeke ivyiyumviro vyavyo ku kibano. 
  Itandukaniro riri mu vyo bashira imbere: abahinga mu vy’imibare bo mu buryo bw’iburyo bibanda ku gushinga amategeko yerekeye inyifato runtu n’imigenzo mu gihe bemera umwidegemvyo kanaka wo mu vy’ubutunzi, mu gihe abahinga mu vy’imibare bo mu bubamfu bashira imbere ubutungane mu kibano no gusubira gusangira ubutunzi mu gihe batagira ico bitaho cane ku bijanye n’inyifato runtu isaba mu migenzo. Bompi amaherezo barondera gucungera ikibano biciye mu mategeko, bikabagira ubwoko butandukanye bw’abahinga mu vy’imibare aho kuba ibihushanye ku rugero rworoshe rw’ibubamfu n’iburyo.
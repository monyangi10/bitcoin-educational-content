question: Theo mô hình kim cương, điểm khác biệt chính giữa những người theo chủ nghĩa nhà nước cánh tả và cánh hữu là gì?
answer: Cả hai đều tìm cách sử dụng quyền lực chính phủ nhưng vì những giá trị và ưu tiên khác nhau.
wrong_answers:
  - Những người theo chủ nghĩa nhà nước cánh tả muốn chính phủ can thiệp nhiều hơn, trong khi những người theo chủ nghĩa nhà nước cánh hữu muốn chính phủ can thiệp ít hơn.
  - Những người theo chủ nghĩa nhà nước cánh hữu ủng hộ tự do kinh tế, trong khi những người theo chủ nghĩa nhà nước cánh tả phản đối mọi loại tự do.
  - Theo định nghĩa, những người theo chủ nghĩa nhà nước cánh tả là những người theo chủ nghĩa tự do, trong khi những người theo chủ nghĩa nhà nước cánh hữu là những người theo chủ nghĩa bảo thủ.
explanation: |
  Chương này giải thích rằng cả cánh tả và cánh hữu đều là những hình thức của chủ nghĩa nhà nước - cả hai đều muốn sử dụng sức mạnh của chính phủ để áp đặt tầm nhìn của họ lên xã hội.
  Sự khác biệt nằm ở các ưu tiên của họ: những người theo chủ nghĩa nhà nước cánh hữu tập trung vào việc lập pháp hóa đạo đức và truyền thống trong khi vẫn cho phép một số tự do kinh tế, trong khi những người theo chủ nghĩa nhà nước cánh tả ưu tiên công bằng xã hội và phân phối lại của cải trong khi ít quan tâm đến các yêu cầu đạo đức truyền thống. Cả hai cuối cùng đều tìm cách kiểm soát xã hội thông qua luật pháp, khiến chúng trở thành những loại người theo chủ nghĩa nhà nước khác nhau chứ không phải là hai thái cực đối lập trên một phổ tả-hữu đơn giản.
question: डायमंड मॉडल के अनुसार, वामपंथी और दक्षिणपंथी सत्तावादियों के बीच मुख्य अंतर क्या है?
answer: वे दोनों ही सरकारी शक्ति का उपयोग करना चाहते हैं, लेकिन अलग-अलग मूल्यों और प्राथमिकताओं के लिए।
wrong_answers:
  - वामपंथी सत्तावादी अधिक सरकारी हस्तक्षेप चाहते हैं जबकि दक्षिणपंथी सत्तावादी कम सरकारी हस्तक्षेप चाहते हैं
  - दक्षिणपंथी सत्तावादी आर्थिक स्वतंत्रता का समर्थन करते हैं जबकि वामपंथी सत्तावादी सभी प्रकार की स्वतंत्रताओं का विरोध करते हैं।
  - परिभाषा के अनुसार, वामपंथी सत्तावादी उदारवादी होते हैं जबकि दक्षिणपंथी सत्तावादी रूढ़िवादी होते हैं।
explanation: |
  इस अध्याय में यह स्पष्ट किया गया है कि वामपंथी और दक्षिणपंथी दोनों ही राज्यवाद के रूप हैं - दोनों ही समाज पर अपनी विचारधारा थोपने के लिए सरकारी बल का प्रयोग करना चाहते हैं।
  अंतर उनकी प्राथमिकताओं में निहित है: दक्षिणपंथी राज्यवादी नैतिकता और परंपराओं को कानून द्वारा नियंत्रित करने पर ध्यान केंद्रित करते हैं, जबकि कुछ आर्थिक स्वतंत्रता की अनुमति देते हैं। वहीं, वामपंथी राज्यवादी सामाजिक न्याय और धन के पुनर्वितरण को प्राथमिकता देते हैं और पारंपरिक नैतिक आवश्यकताओं के प्रति कम चिंतित रहते हैं। अंततः दोनों ही कानून के माध्यम से समाज को नियंत्रित करना चाहते हैं, जिससे वे सरल वाम-दक्षिण स्पेक्ट्रम पर विपरीत ध्रुवों के बजाय विभिन्न प्रकार के राज्यवादी बन जाते हैं।
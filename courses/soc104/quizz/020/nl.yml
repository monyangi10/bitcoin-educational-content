question: Wat is volgens het diamantmodel het belangrijkste verschil tussen linkse en rechtse statisten?
answer: Ze willen allebei de macht van de overheid gebruiken, maar voor verschillende waarden en prioriteiten
wrong_answers:
  - Linkse statisten willen meer overheid terwijl rechtse statisten minder overheid willen
  - Rechtse statisten steunen economische vrijheid terwijl linkse statisten tegen alle vrijheden zijn
  - Linkse statisten zijn liberaal, terwijl rechtse statisten per definitie conservatief zijn
explanation: |
  Het hoofdstuk legt uit dat zowel links als rechts vormen van statisme zijn - ze willen allebei overheidsmacht gebruiken om hun visie aan de samenleving op te leggen.
  Het verschil ligt in hun prioriteiten: rechtse statisten richten zich op het wettelijk vastleggen van moraliteit en traditie terwijl ze enige economische vrijheid toestaan, terwijl linkse statisten prioriteit geven aan sociale rechtvaardigheid en herverdeling van rijkdom terwijl ze zich minder bekommeren om traditionele morele eisen. Beide streven er uiteindelijk naar om de samenleving te controleren door middel van wetgeving, waardoor ze verschillende soorten statisten zijn in plaats van tegenpolen in een eenvoudig links-rechts spectrum.
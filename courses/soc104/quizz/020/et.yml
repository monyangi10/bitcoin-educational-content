question: Milline on teemantmudeli kohaselt peamine erinevus vasakpoolsete ja parempoolsete riigimeeste vahel?
answer: Mõlemad püüavad kasutada valitsuse võimu, kuid erinevate väärtuste ja prioriteetide saavutamiseks
wrong_answers:
  - Vasakpoolsed statistid tahavad rohkem valitsemist, samas kui parempoolsed statistid tahavad vähem valitsemist
  - Parempoolsed statistid toetavad majandusvabadust, vasakpoolsed aga on kõigi vabaduste vastu
  - Vasakpoolsed statistid on liberaalsed, samas kui parempoolsed statistid on määratluse järgi konservatiivsed
explanation: |
  Peatükis selgitatakse, et nii vasakpoolsed kui ka parempoolsed on staatismi vormid - mõlemad tahavad kasutada valitsusväge, et suruda ühiskonnale peale oma nägemus.
  Erinevus seisneb nende prioriteetides: parempoolsed statistid keskenduvad moraali ja traditsioonide seadustamisele, lubades samal ajal mõningast majanduslikku vabadust, samas kui vasakpoolsed statistid seavad esikohale sotsiaalse õigluse ja jõukuse ümberjaotamise, olles samas vähem mures traditsiooniliste moraalinõuete pärast. Mõlemad püüavad lõppkokkuvõttes kontrollida ühiskonda seadusandluse kaudu, mis teeb neist pigem eri tüüpi statistid kui vastandid lihtsas vasak-parem spektris.
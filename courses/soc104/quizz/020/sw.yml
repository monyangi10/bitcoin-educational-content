question: Kulingana na mfumo wa almasi, ni tofauti gani kuu kati ya takwimu za mrengo wa kushoto na mrengo wa kulia?
answer: Wote wawili wanatafuta kutumia mamlaka ya serikali lakini kwa maadili na vipaumbele tofauti.
wrong_answers:
  - Wanatakwimu wa mrengo wa kushoto wanataka serikali zaidi huku wanatakwimu wa mrengo wa kulia wakitaka serikali ndogo
  - Wanatakwimu wa mrengo wa kulia wanaunga mkono uhuru wa kiuchumi huku wanatakwimu wa mrengo wa kushoto wakipinga uhuru wote
  - Wanatakwimu wa mrengo wa kushoto ni waliberali huku wanatakwimu wa mrengo wa kulia wakiwa wahafidhina kwa ufafanuzi.
explanation: |
  Sura hiyo inaelezea kwamba pande zote mbili za kushoto na kulia ni aina za takwimu - zote mbili zinataka kutumia nguvu ya serikali kulazimisha maono yao kwa jamii.
  Tofauti iko katika vipaumbele vyao: wanatakwimu wa mrengo wa kulia wanazingatia kutunga sheria za maadili na mila huku wakiruhusu uhuru fulani wa kiuchumi, huku wanatakwimu wa mrengo wa kushoto wakipa kipaumbele haki ya kijamii na ugawaji upya wa utajiri huku wakiwa hawajali sana mahitaji ya kitamaduni ya maadili. Zote mbili hatimaye hutafuta kudhibiti jamii kupitia sheria, na kuzifanya kuwa aina tofauti za wanatakwimu badala ya kinyume katika wigo rahisi wa kushoto-kulia.
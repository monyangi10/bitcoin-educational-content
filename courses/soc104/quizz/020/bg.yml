question: Каква е основната разлика между левите и десните етатисти според модела на диаманта?
answer: И двете се стремят да използват държавната власт, но за различни ценности и приоритети
wrong_answers:
  - Левите етатисти искат повече правителство, докато десните етатисти искат по-малко правителство
  - Десните етатисти подкрепят икономическата свобода, докато левите етатисти се противопоставят на всички свободи
  - Левите етатисти са либерални, докато десните етатисти са консервативни по дефиниция
explanation: |
  В тази глава се обяснява, че и лявото, и дясното са форми на етатизъм - и двете искат да използват държавна сила, за да наложат своето виждане на обществото.
  Разликата се състои в техните приоритети: десните етатисти се фокусират върху законодателното уреждане на морала и традициите, като същевременно допускат известна икономическа свобода, докато левите етатисти дават приоритет на социалната справедливост и преразпределението на богатството, като същевременно са по-малко загрижени за традиционните морални изисквания. В крайна сметка и двамата се стремят да контролират обществото чрез законодателство, което ги прави различни видове етатисти, а не противоположности в простия спектър ляво-дясно.
question: Jaký je podle diamantového modelu klíčový rozdíl mezi levicovými a pravicovými etatisty?
answer: Obě se snaží využívat vládní moc, ale pro různé hodnoty a priority
wrong_answers:
  - Levicoví etatisté chtějí více vlády, zatímco pravicoví etatisté chtějí méně vlády
  - Pravicoví etatisté podporují ekonomickou svobodu, zatímco levicoví etatisté jsou proti všem svobodám
  - Levicoví etatisté jsou liberální, zatímco pravicoví etatisté jsou z definice konzervativní
explanation: |
  Kapitola vysvětluje, že jak levice, tak pravice jsou formami etatismu - obě chtějí použít vládní sílu, aby společnosti vnutily svou vizi.
  Rozdíl spočívá v jejich prioritách: pravicoví etatisté se zaměřují na uzákonění morálky a tradic a zároveň umožňují určitou ekonomickou svobodu, zatímco levicoví etatisté upřednostňují sociální spravedlnost a přerozdělování bohatství, přičemž se méně zabývají tradičními morálními požadavky. Oba se nakonec snaží ovládat společnost prostřednictvím legislativy, což z nich činí spíše různé typy etatistů než protiklady na jednoduchém pravolevém spektru.
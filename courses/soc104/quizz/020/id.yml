question: Menurut model berlian, apa perbedaan utama antara statistik sayap kiri dan sayap kanan?
answer: Keduanya berusaha untuk menggunakan kekuasaan pemerintah tetapi untuk nilai dan prioritas yang berbeda
wrong_answers:
  - Kelompok sayap kiri menginginkan lebih banyak pemerintah, sementara kelompok sayap kanan menginginkan lebih sedikit pemerintah
  - Politisi sayap kanan mendukung kebebasan ekonomi, sementara politisi sayap kiri menentang semua kebebasan
  - Statistisi sayap kiri adalah liberal sementara statistisi sayap kanan adalah konservatif menurut definisi
explanation: |
  Bab ini menjelaskan bahwa baik sayap kiri maupun kanan merupakan bentuk statisme - keduanya ingin menggunakan kekuatan pemerintah untuk memaksakan visi mereka pada masyarakat.
  Perbedaannya terletak pada prioritas mereka: kaum statis sayap kanan berfokus pada legislasi moralitas dan tradisi sambil mengizinkan beberapa kebebasan ekonomi, sedangkan kaum statis sayap kiri memprioritaskan keadilan sosial dan redistribusi kekayaan sementara tidak terlalu peduli dengan persyaratan moral tradisional. Keduanya pada akhirnya berusaha untuk mengendalikan masyarakat melalui undang-undang, menjadikan mereka tipe-tipe yang berbeda dari kaum statist, bukannya berlawanan dalam spektrum kiri-kanan yang sederhana.
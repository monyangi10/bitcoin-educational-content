question: Jaka jest kluczowa różnica między lewicowymi i prawicowymi etatystami według modelu diamentowego?
answer: Obaj dążą do wykorzystania władzy rządowej, ale dla różnych wartości i priorytetów
wrong_answers:
  - Lewicowi etatyści chcą więcej rządu, podczas gdy prawicowi etatyści chcą mniej rządu
  - Prawicowi etatyści wspierają wolność gospodarczą, podczas gdy lewicowi etatyści sprzeciwiają się wszelkim wolnościom
  - Lewicowi etatyści są liberalni, podczas gdy prawicowi etatyści są z definicji konserwatywni
explanation: |
  Rozdział wyjaśnia, że zarówno lewica, jak i prawica są formami etatyzmu - obie chcą użyć siły rządowej, aby narzucić społeczeństwu swoją wizję.
  Różnica polega na ich priorytetach: prawicowi etatyści koncentrują się na ustanawianiu moralności i tradycji, jednocześnie pozwalając na pewną swobodę gospodarczą, podczas gdy lewicowi etatyści priorytetowo traktują sprawiedliwość społeczną i redystrybucję bogactwa, jednocześnie mniej przejmując się tradycyjnymi wymogami moralnymi. Obaj ostatecznie dążą do kontrolowania społeczeństwa poprzez ustawodawstwo, co czyni ich różnymi typami etatystów, a nie przeciwieństwami w prostym spektrum lewica-prawica.
question: Согласно алмазной модели, в чем заключается ключевое различие между левыми и правыми статистами?
answer: Они оба стремятся использовать государственную власть, но для достижения разных ценностей и приоритетов
wrong_answers:
  - Левые статисты хотят больше правительства, а правые - меньше
  - Правые статисты поддерживают экономическую свободу, а левые статисты выступают против всех свобод
  - Левые статисты - либералы, а правые статисты - консерваторы по определению
explanation: |
  В главе объясняется, что и левые, и правые являются разновидностями статизма - и те, и другие хотят использовать государственную силу, чтобы навязать обществу свое видение.
  Разница заключается в их приоритетах: правые статисты сосредоточены на законодательном закреплении морали и традиций, допуская при этом некоторую экономическую свободу, в то время как левые статисты ставят во главу угла социальную справедливость и перераспределение богатства, но при этом меньше заботятся о традиционных моральных требованиях. И те, и другие в конечном итоге стремятся контролировать общество с помощью законодательства, что делает их скорее разными типами статистов, чем противоположностями в простом спектре левых и правых.
question: According to the diamond model, what is the key difference between left-wing and right-wing statists?
answer: They both seek to use government power but for different values and priorities
wrong_answers:
  - Left-wing statists want more government while right-wing statists want less government
  - Right-wing statists support economic freedom while left-wing statists oppose all freedoms
  - Left-wing statists are liberal while right-wing statists are conservative by definition
explanation: |
  The chapter explains that both left and right are forms of statism - they both want to use government force to impose their vision on society. 
  The difference lies in their priorities: right-wing statists focus on legislating morality and tradition while allowing some economic freedom, whereas left-wing statists prioritize social justice and wealth redistribution while being less concerned with traditional moral requirements. Both ultimately seek to control society through legislation, making them different types of statists rather than opposites on a simple left-right spectrum.

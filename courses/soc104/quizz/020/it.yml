question: Secondo il modello a diamante, qual è la differenza fondamentale tra statalisti di destra e di sinistra?
answer: Entrambi cercano di usare il potere del governo, ma per valori e priorità diverse
wrong_answers:
  - Gli statalisti di sinistra vogliono più governo mentre gli statalisti di destra vogliono meno governo
  - Gli statalisti di destra sostengono la libertà economica, mentre gli statalisti di sinistra si oppongono a tutte le libertà
  - Gli statalisti di sinistra sono liberali, mentre quelli di destra sono conservatori per definizione
explanation: |
  Il capitolo spiega che sia la destra che la sinistra sono forme di statalismo: entrambe vogliono usare la forza del governo per imporre la loro visione alla società.
  La differenza sta nelle loro priorità: gli statalisti di destra si concentrano sulla legiferazione della moralità e della tradizione, pur consentendo una certa libertà economica, mentre gli statalisti di sinistra danno la priorità alla giustizia sociale e alla redistribuzione della ricchezza, pur essendo meno interessati ai requisiti morali tradizionali. Entrambi cercano in definitiva di controllare la società attraverso la legislazione, il che li rende tipi diversi di statalisti piuttosto che opposti in un semplice spettro sinistra-destra.
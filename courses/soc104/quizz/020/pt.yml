question: De acordo com o modelo do diamante, qual é a principal diferença entre os estatistas de esquerda e de direita?
answer: Ambos procuram utilizar o poder do governo, mas para valores e prioridades diferentes
wrong_answers:
  - Os estatistas de esquerda querem mais governo, enquanto os estatistas de direita querem menos governo
  - Os estatistas de direita apoiam a liberdade económica, enquanto os estatistas de esquerda se opõem a todas as liberdades
  - Os estatistas de esquerda são liberais, enquanto os estatistas de direita são conservadores por definição
explanation: |
  O capítulo explica que tanto a esquerda como a direita são formas de estatismo - ambas querem utilizar a força do governo para impor a sua visão à sociedade.
  A diferença reside nas suas prioridades: os estatistas de direita concentram-se em legislar a moralidade e a tradição, permitindo ao mesmo tempo alguma liberdade económica, enquanto os estatistas de esquerda dão prioridade à justiça social e à redistribuição da riqueza, estando menos preocupados com os requisitos morais tradicionais. Ambos procuram, em última análise, controlar a sociedade através da legislação, o que os torna diferentes tipos de estatistas e não opostos num simples espetro esquerda-direita.
question: Prema dijamantskom modelu, koja je ključna razlika između levičarskih i desničarskih statista?
answer: Oboje žele da koriste moć vlade, ali za različite vrednosti i prioritete.
wrong_answers:
  - Levičarski statisti žele više vlade dok desničarski statisti žele manje vlade
  - Desničarski statisti podržavaju ekonomsku slobodu dok levičarski statisti se protive svim slobodama
  - Levičarski statisti su liberalni dok su desničarski statisti konzervativni po definiciji
explanation: |
  Poglavlje objašnjava da su i levica i desnica oblici statizma - obe žele da koriste državnu silu kako bi nametnule svoju viziju društvu. 
  Razlika leži u njihovim prioritetima: desničarski statisti se fokusiraju na zakonodavstvo koje podržava moral i tradiciju dok dopuštaju određenu ekonomsku slobodu, dok levičarski statisti daju prioritet socijalnoj pravdi i preraspodeli bogatstva, manje se brinući o tradicionalnim moralnim zahtevima. Obe strane na kraju žele da kontrolišu društvo kroz zakonodavstvo, čineći ih različitim tipovima statista, a ne suprotnostima na jednostavnom levica-desnica spektru.
question: Enligt diamantmodellen, vad är den viktigaste skillnaden mellan vänster- och högerorienterade statister?
answer: De vill båda använda regeringsmakten, men för olika värden och prioriteringar
wrong_answers:
  - Vänsterorienterade statister vill ha mer stat medan högerorienterade statister vill ha mindre stat
  - Statister på högerkanten stöder ekonomisk frihet medan statister på vänsterkanten motsätter sig alla friheter
  - Vänsterorienterade statister är liberala medan högerorienterade statister per definition är konservativa
explanation: |
  Kapitlet förklarar att både vänster och höger är former av statism - de vill båda använda regeringsmakten för att införa sin vision i samhället.
  Skillnaden ligger i deras prioriteringar: högerstatsanhängare fokuserar på att lagstifta om moral och traditioner samtidigt som de tillåter viss ekonomisk frihet, medan vänsterstatsanhängare prioriterar social rättvisa och omfördelning av rikedomar samtidigt som de är mindre bekymrade över traditionella moraliska krav. Båda strävar i slutändan efter att kontrollera samhället genom lagstiftning, vilket gör dem till olika typer av statister snarare än motsatser på ett enkelt vänster-högerspektrum.
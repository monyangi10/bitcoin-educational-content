question: Elmas modeline göre, solcu ve sağcı devletçiler arasındaki temel fark nedir?
answer: Her ikisi de devlet gücünü kullanmaya çalışıyor ancak farklı değerler ve öncelikler için
wrong_answers:
  - Solcu devletçiler daha fazla hükümet isterken, sağcı devletçiler daha az hükümet istiyor
  - Sağcı devletçiler ekonomik özgürlüğü desteklerken, solcu devletçiler tüm özgürlüklere karşı çıkmaktadır
  - Solcu devletçiler liberal, sağcı devletçiler ise tanım gereği muhafazakârdır
explanation: |
  Bu bölümde hem sol hem de sağın devletçiliğin bir biçimi olduğu açıklanmaktadır - her ikisi de kendi vizyonlarını topluma dayatmak için hükümet gücünü kullanmak istemektedir.
  Aralarındaki fark önceliklerinde yatmaktadır: sağ kanat devletçiler bir miktar ekonomik özgürlüğe izin verirken ahlak ve gelenekleri yasallaştırmaya odaklanırken, sol kanat devletçiler geleneksel ahlaki gerekliliklerle daha az ilgilenirken sosyal adalet ve zenginliğin yeniden dağıtımına öncelik vermektedir. Her ikisi de nihayetinde toplumu yasalar yoluyla kontrol etmeye çalışmakta, bu da onları basit bir sol-sağ spektrumundaki karşıtlardan ziyade farklı devletçi türleri haline getirmektedir.
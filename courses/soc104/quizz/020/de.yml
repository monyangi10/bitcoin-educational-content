question: Was ist nach dem Diamantenmodell der Hauptunterschied zwischen linken und rechten Statisten?
answer: Beide wollen die Macht der Regierung nutzen, aber für unterschiedliche Werte und Prioritäten
wrong_answers:
  - Linke Statisten wollen mehr Staat, rechte Statisten wollen weniger Staat
  - Rechtsgerichtete Statisten unterstützen die wirtschaftliche Freiheit, während linksgerichtete Statisten alle Freiheiten ablehnen
  - Linksgerichtete Statisten sind liberal, während rechtsgerichtete Statisten per Definition konservativ sind
explanation: |
  In diesem Kapitel wird erläutert, dass sowohl die Linke als auch die Rechte eine Form des Etatismus sind - beide wollen der Gesellschaft mit staatlicher Gewalt ihre Vorstellungen aufzwingen.
  Der Unterschied liegt in ihren Prioritäten: Rechtsgerichtete Statisten konzentrieren sich darauf, Moral und Traditionen gesetzlich zu regeln, während sie eine gewisse wirtschaftliche Freiheit zulassen, während linksgerichtete Statisten soziale Gerechtigkeit und Wohlstandsumverteilung priorisieren, während sie sich weniger um die traditionellen moralischen Anforderungen kümmern. Beide versuchen letztlich, die Gesellschaft durch Gesetzgebung zu kontrollieren, was sie zu verschiedenen Arten von Statisten macht und nicht zu Gegensätzen auf einem einfachen Links-Rechts-Spektrum.
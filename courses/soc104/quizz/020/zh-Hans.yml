question: 根据钻石模型，左翼和右翼国家主义者的主要区别是什么？
answer: 它们都寻求利用政府权力，但价值观和优先事项不同
wrong_answers:
  - 左翼国家主义者想要更多的政府，而右翼国家主义者想要更少的政府
  - 右翼国家主义者支持经济自由，而左翼国家主义者反对一切自由
  - 根据定义，左翼国家主义者是自由主义者，而右翼国家主义者是保守主义者
explanation: |
  该章解释说，左翼和右翼都是国家主义的形式--他们都想利用政府力量将自己的理念强加给社会。
  区别在于他们的优先事项：右翼国家主义者侧重于道德和传统的立法，同时允许一定的经济自由；而左翼国家主义者则优先考虑社会正义和财富再分配，同时较少关注传统的道德要求。两者最终都寻求通过立法来控制社会，这使他们成为不同类型的国家主义者，而不是简单的左右光谱上的对立面。
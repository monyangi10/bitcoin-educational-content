question: بر اساس مدل الماس، تفاوت کلیدی بین دولت‌گرایان چپ‌گرا و راست‌گرا چیست؟
answer: آن‌ها هر دو به دنبال استفاده از قدرت دولت هستند، اما برای ارزش‌ها و اولویت‌های متفاوت.
wrong_answers:
  - چپ‌گرایان دولتی خواهان دولت بیشتر هستند در حالی که راست‌گرایان دولتی خواهان دولت کمتر هستند
  - دولت‌گرایان راست‌گرا از آزادی اقتصادی حمایت می‌کنند در حالی که دولت‌گرایان چپ‌گرا با همه آزادی‌ها مخالفند
  - چپ‌گرایان دولتی به‌طور تعریف لیبرال هستند، در حالی که راست‌گرایان دولتی محافظه‌کار محسوب می‌شوند.
explanation: |
  این فصل توضیح می‌دهد که هم چپ و هم راست اشکالی از دولت‌گرایی هستند - هر دو می‌خواهند از نیروی دولت برای تحمیل دیدگاه خود بر جامعه استفاده کنند. تفاوت در اولویت‌های آن‌هاست: دولت‌گرایان راست‌گرا بر قانون‌گذاری اخلاق و سنت تمرکز می‌کنند در حالی که مقداری آزادی اقتصادی را مجاز می‌دانند، در حالی که دولت‌گرایان چپ‌گرا اولویت را به عدالت اجتماعی و توزیع مجدد ثروت می‌دهند و کمتر به الزامات اخلاقی سنتی توجه دارند. هر دو در نهایت به دنبال کنترل جامعه از طریق قانون‌گذاری هستند و آن‌ها را به انواع مختلفی از دولت‌گرایان تبدیل می‌کنند، نه به عنوان مخالفان در یک طیف ساده چپ-راست.
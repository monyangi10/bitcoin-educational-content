question: Según el modelo del diamante, ¿cuál es la diferencia clave entre los estatistas de izquierdas y los de derechas?
answer: Ambos pretenden utilizar el poder gubernamental, pero para valores y prioridades diferentes
wrong_answers:
  - Los estatistas de izquierdas quieren más gobierno mientras que los estatistas de derechas quieren menos gobierno
  - Los estatistas de derechas apoyan la libertad económica mientras que los estatistas de izquierdas se oponen a todas las libertades
  - Los estatistas de izquierdas son liberales mientras que los estatistas de derechas son conservadores por definición
explanation: |
  El capítulo explica que tanto la izquierda como la derecha son formas de estatismo: ambas quieren utilizar la fuerza gubernamental para imponer su visión a la sociedad.
  La diferencia radica en sus prioridades: los estatistas de derechas se centran en legislar la moralidad y la tradición al tiempo que permiten cierta libertad económica, mientras que los estatistas de izquierdas priorizan la justicia social y la redistribución de la riqueza al tiempo que se preocupan menos por los requisitos morales tradicionales. En última instancia, ambos pretenden controlar la sociedad mediante la legislación, lo que los convierte en distintos tipos de estatistas y no en opuestos en un simple espectro izquierda-derecha.
question: ตามโมเดลเพชร ความแตกต่างที่สำคัญระหว่างฝ่ายซ้ายและฝ่ายขวาที่สนับสนุนรัฐคืออะไร?
answer: พวกเขาทั้งสองต่างแสวงหาการใช้พลังของรัฐบาลแต่เพื่อค่านิยมและลำดับความสำคัญที่แตกต่างกัน
wrong_answers:
  - นักรัฐนิยมฝ่ายซ้ายต้องการรัฐบาลมากขึ้นในขณะที่นักรัฐนิยมฝ่ายขวาต้องการรัฐบาลน้อยลง
  - นักสถิตินิยมฝ่ายขวาสนับสนุนเสรีภาพทางเศรษฐกิจในขณะที่นักสถิตินิยมฝ่ายซ้ายคัดค้านเสรีภาพทั้งหมด
  - นักรัฐนิยมฝ่ายซ้ายเป็นเสรีนิยม ในขณะที่นักรัฐนิยมฝ่ายขวาเป็นอนุรักษ์นิยมตามคำนิยาม
explanation: |
  บทนี้อธิบายว่าทั้งซ้ายและขวาเป็นรูปแบบของรัฐนิยม - ทั้งสองต้องการใช้กำลังของรัฐบาลเพื่อบังคับใช้วิสัยทัศน์ของตนในสังคม ความแตกต่างอยู่ที่ลำดับความสำคัญของพวกเขา: รัฐนิยมฝ่ายขวามุ่งเน้นไปที่การออกกฎหมายด้านศีลธรรมและประเพณีในขณะที่อนุญาตให้มีเสรีภาพทางเศรษฐกิจบางส่วน ในขณะที่รัฐนิยมฝ่ายซ้ายให้ความสำคัญกับความยุติธรรมทางสังคมและการกระจายความมั่งคั่งใหม่ในขณะที่ไม่ค่อยกังวลกับข้อกำหนดทางศีลธรรมแบบดั้งเดิม ทั้งสองในที่สุดต้องการควบคุมสังคมผ่านกฎหมาย ทำให้พวกเขาเป็นรัฐนิยมประเภทต่างๆ มากกว่าจะเป็นฝ่ายตรงข้ามในสเปกตรัมซ้าย-ขวาแบบง่ายๆ
question: ตามปรัชญาของ Satoshi นากาโมโตะ ปัญหาพื้นฐานของสกุลเงินแบบดั้งเดิมที่ Bitcoin มุ่งแก้ไขคืออะไร?
answer: ความไว้วางใจที่มากเกินไปในสถาบันที่รวมศูนย์ซึ่งในประวัติศาสตร์ได้ละเมิดความไว้วางใจนั้นผ่านการลดค่าเงิน
wrong_answers:
  - ความไม่มีประสิทธิภาพทางเทคนิคของระบบการชำระเงินแบบดั้งเดิมที่ดำเนินการธุรกรรมช้าเกินไปสำหรับการค้าระดับโลก
  - ผลกระทบต่อสิ่งแวดล้อมจากการผลิตเงินตราและรอยเท้าคาร์บอนของโครงสร้างพื้นฐานทางการธนาคาร
  - ข้อจำกัดทางภูมิศาสตร์ของสกุลเงินประจำชาติที่ขัดขวางการค้าและพาณิชย์ระหว่างประเทศอย่างราบรื่น
explanation: |
  Satoshi ระบุไว้อย่างชัดเจนว่า 'ปัญหารากฐานของสกุลเงินแบบดั้งเดิมคือความไว้วางใจทั้งหมดที่จำเป็นในการทำให้มันใช้งานได้' และสังเกตว่า 'ประวัติศาสตร์ของสกุลเงินเฟียตเต็มไปด้วยการละเมิดความไว้วางใจนั้น' 
  Bitcoin ถูกออกแบบให้เป็นระบบที่ไม่ต้องอาศัยความไว้วางใจ เพื่อขจัดการพึ่งพาธนาคารกลางที่ในอดีตได้ทำให้สกุลเงินเสื่อมค่า ตัวเลือกอื่นๆ แม้จะเป็นข้อกังวลที่อาจมีความถูกต้อง แต่ไม่ได้เป็นแรงจูงใจทางปรัชญาพื้นฐานเบื้องหลังการสร้าง Bitcoin ตามที่ผู้สร้างได้กล่าวไว้
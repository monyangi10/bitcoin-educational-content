question: Kulingana na falsafa ya Satoshi Nakamoto, ni tatizo gani la msingi kuhusu sarafu za kawaida ambalo Bitcoin inalenga kutatua?
answer: Uaminifu mkubwa unaohitajika katika taasisi kuu ambazo kihistoria huvunja uaminifu huo kupitia kushushwa kwa sarafu
wrong_answers:
  - Udhaifu wa kiufundi wa mifumo ya malipo ya jadi ambayo husindika miamala polepole sana kwa biashara ya kimataifa
  - Athari za kimazingira za uzalishaji wa sarafu halisi na athari ya kaboni kwenye miundombinu ya benki
  - Vikwazo vya kijiografia vya sarafu za kitaifa vinavyozuia biashara na biashara ya kimataifa isiyo na mshono
explanation: |
  Satoshi ilisema waziwazi kwamba 'tatizo kuu la sarafu ya kawaida ni uaminifu wote unaohitajika ili kuifanya ifanye kazi' na ikabainisha kwamba 'historia ya sarafu za fiat imejaa uvunjaji wa uaminifu huo.'
  Bitcoin iliundwa kama mfumo usioaminika ili kuondoa utegemezi kwa benki kuu ambazo zina sarafu zilizoharibika kihistoria. Chaguzi zingine, ingawa zinaweza kuwa na wasiwasi halali, hazikuwa motisha ya msingi ya kifalsafa nyuma ya uundaji wa Bitcoin kama ilivyoelezwa na muundaji wake.
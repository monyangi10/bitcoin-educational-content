question: Согласно философии Satoshi Накамото, какую фундаментальную проблему обычных валют стремится решить Bitcoin?
answer: Чрезмерное доверие к централизованным институтам, которые исторически нарушают это доверие путем обесценивания валюты
wrong_answers:
  - Техническая неэффективность традиционных платежных систем, которые обрабатывают транзакции слишком медленно для глобальной торговли
  - Воздействие на окружающую среду производства физической валюты и "углеродный след" банковской инфраструктуры
  - Географические ограничения национальных валют, препятствующие беспрепятственной международной торговле и коммерции
explanation: |
  В Satoshi прямо говорится, что "основная проблема обычной валюты заключается в доверии, которое требуется, чтобы она работала", и отмечается, что "история фиатных валют полна нарушений этого доверия"
  Bitcoin была разработана как система, не требующая доверия, чтобы устранить зависимость от центральных банков, которые исторически обесценивали валюту. Другие варианты, несмотря на потенциально обоснованные опасения, не были основополагающей философской мотивацией создания Bitcoin, как ее сформулировал создатель.
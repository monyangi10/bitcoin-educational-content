question: Satoshiナカモトの哲学によれば、Bitcoinが解決しようとしている従来の通貨の根本的な問題とは何か？
answer: 中央集権的な機関への過度の信頼が必要であり、歴史的に通貨安によってその信頼が損なわれてきた。
wrong_answers:
  - グローバルな商取引には処理速度が遅すぎる従来の決済システムの技術的非効率性
  - 現物通貨生産が環境に与える影響と銀行インフラのカーボンフットプリント
  - シームレスな国際貿易と通商を妨げる、各国通貨の地理的制約
explanation: |
  Satoshiは、「従来の通貨の根本的な問題は、それを機能させるために必要なすべての信頼にある」と明言し、「不換紙幣の歴史は、その信頼に対する違反でいっぱいだ」と指摘した。
  Bitcoinは、歴史的に通貨を堕落させてきた中央銀行への依存をなくすために、信頼のないシステムとして設計された。他の選択肢は、潜在的に有効な懸念ではあるが、Bitcoin創設者が明言したBitcoin創設の基本的な哲学的動機ではなかった。
question: بر اساس فلسفه Satoshi ناکاموتو، Bitcoin قصد دارد چه مشکل اساسی‌ای را که در ارزهای متعارف وجود دارد، حل کند؟
answer: اعتماد بیش از حد مورد نیاز به نهادهای متمرکزی که به طور تاریخی این اعتماد را از طریق کاهش ارزش ارز نقض می‌کنند
wrong_answers:
  - ناکارآمدی فنی سیستم‌های پرداخت سنتی که تراکنش‌ها را برای تجارت جهانی بسیار کند پردازش می‌کنند
  - تأثیرات زیست‌محیطی تولید ارز فیزیکی و ردپای کربنی زیرساخت‌های بانکی
  - محدودیت‌های جغرافیایی ارزهای ملی که مانع تجارت و بازرگانی بین‌المللی بدون مرز می‌شوند
explanation: |
  Satoshi به‌طور صریح بیان کرد که 'مشکل اصلی با ارزهای متعارف تمام اعتمادی است که برای کارکرد آن‌ها لازم است' و اشاره کرد که 'تاریخ ارزهای فیات پر از نقض آن اعتماد است.' 
  Bitcoin به‌عنوان یک سیستم بدون نیاز به اعتماد طراحی شد تا وابستگی به بانک‌های مرکزی که به‌طور تاریخی ارزها را تضعیف کرده‌اند، از بین ببرد. گزینه‌های دیگر، در حالی که ممکن است نگرانی‌های معتبری باشند، انگیزه فلسفی بنیادی پشت ایجاد Bitcoin نبودند همان‌طور که توسط خالق آن بیان شده است.
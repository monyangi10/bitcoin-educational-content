question: Според философията на Satoshi Накамото какъв основен проблем на традиционните валути цели да реши Bitcoin?
answer: Прекомерното доверие в централизираните институции, които исторически нарушават това доверие чрез обезценяване на валутата
wrong_answers:
  - Техническата неефективност на традиционните платежни системи, които обработват транзакциите твърде бавно за глобалната търговия
  - Екологичното въздействие на производството на физическа валута и въглеродния отпечатък на банковата инфраструктура
  - Географските ограничения на националните валути, които възпрепятстват безпроблемната международна търговия и обмен
explanation: |
  Satoshi изрично заяви, че "основният проблем на конвенционалната валута е доверието, което се изисква, за да функционира", и отбеляза, че "историята на фиатните валути е пълна с нарушения на това доверие"
  Bitcoin е замислена като система без доверие, за да се премахне зависимостта от централните банки, които в миналото са обезценявали валутите. Другите варианти, макар и потенциално основателни, не бяха основната философска мотивация за създаването на Bitcoin, както е формулирана от нейния създател.
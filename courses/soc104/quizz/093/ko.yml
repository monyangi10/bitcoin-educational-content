question: Satoshi 나카모토의 철학에 따르면, Bitcoin은 기존 화폐의 어떤 근본적인 문제를 해결하고자 하나요?
answer: 중앙 집중식 기관에 대한 과도한 신뢰는 역사적으로 통화 약세를 통해 그 신뢰를 위반했습니다
wrong_answers:
  - 글로벌 상거래에 비해 너무 느리게 거래를 처리하는 기존 결제 시스템의 기술적 비효율성
  - 실물 화폐 생산이 환경에 미치는 영향과 은행 인프라의 탄소 발자국
  - 원활한 국제 무역과 상거래를 방해하는 국가 통화의 지리적 한계
explanation: |
  Satoshi는 '기존 통화의 근본적인 문제는 통화가 작동하는 데 필요한 모든 신뢰'라고 명시적으로 언급하며 '법정화폐의 역사는 이러한 신뢰의 위반으로 가득 차 있다'고 지적했습니다
  Bitcoin는 역사적으로 통화의 가치를 떨어뜨린 중앙은행에 대한 의존을 없애기 위해 신뢰가 필요 없는 시스템으로 설계되었습니다. 다른 옵션은 잠재적으로 타당한 우려가 될 수 있지만, Bitcoin의 창시자가 밝힌 것처럼 Bitcoin의 근본적인 철학적 동기는 아니었습니다.
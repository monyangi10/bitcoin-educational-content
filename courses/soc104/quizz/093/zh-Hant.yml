question: 根據 Satoshi Nakamoto 的哲學，Bitcoin 旨在解決傳統貨幣的什麼基本問題？
answer: 中央集权机构需要过度信任，而历史上这些机构通过货币贬值违背了这种信任
wrong_answers:
  - 傳統支付系統的技術效率太低，處理交易的速度太慢，無法滿足全球商業的需求
  - 實體貨幣生產對環境的影響以及銀行基礎設施的碳足跡
  - 各國貨幣的地理限制妨礙了國際貿易和商業的無縫接軌
explanation: |
  Satoshi 明確指出，「傳統貨幣的根本問題在於需要信任才能運作」，並指出「法定貨幣的歷史充滿了違反信任的情況。
  Bitcoin 被設計為無信任系統，以消除對中央銀行的依賴，因為中央銀行在歷史上曾使貨幣貶值。其他選項雖然有潛在的合理疑慮，但並非 Bitcoin 創造者所闡述的創造背後的基本哲學動機。
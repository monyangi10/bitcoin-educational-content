question: According to Satoshi Nakamoto's philosophy, what fundamental problem with conventional currencies does Bitcoin aim to solve?
answer: The excessive trust required in centralized institutions that historically breach that trust through currency debasement
wrong_answers:
  - The technical inefficiency of traditional payment systems that process transactions too slowly for global commerce
  - The environmental impact of physical currency production and the carbon footprint of banking infrastructure
  - The geographical limitations of national currencies that prevent seamless international trade and commerce
explanation: |
  Satoshi explicitly stated that 'the root problem with conventional currency is all the trust that's required to make it work' and noted that 'the history of fiat currencies is full of breaches of that trust.' Bitcoin was designed as a trustless system to eliminate reliance on central banks that have historically debased currencies. The other options, while potentially valid concerns, were not the foundational philosophical motivation behind Bitcoin's creation as articulated by its creator.
question: Dushingiye ku filozofiya ya Satoshi Nakamoto, ni ingorane iyihe y’ishimikiro yerekeye amafaranga asanzwe Bitcoin ishaka gutorera umuti?
answer: Ukwizigira birenze urugero bisabwa mu nzego zishingiye ku rwego rwo hejuru zica mu mateka zirenga kuri ukwo kwizigira biciye mu guca bugufi kw’amahera .
wrong_answers:
  - Ubukene bw'ubuhinga bw'uburyo bwo kwishura busanzwe bukora buhoro cane ku bucuruzi bwo kw'isi yose
  - Ingaruka ku bidukikije ziterwa n'uguhingura amafaranga y'umubiri n'ikirenge c'umuyagankuba c'ibikorwa remezo vy'amabanki
  - Imipaka y'ubutaka y'amafaranga y'igihugu ibuza ubudandaji mpuzamakungu n'ubucuruzi butagira umurongo
explanation: |
  Satoshi yavuze neza ko 'ingorane nyamukuru y'amafaranga asanzwe ari ukwizigira kwose gukenewe kugira ngo akore' yongera avuga ko 'amateka y'amafaranga y'amahera yuzuye ukurenga kuri ukwo kwizigira.' 
  Bitcoin yagenewe nk’uburyo butagira icizigiro kugira ngo umuntu akureho kwizigira amabanki akomeye afise amafaranga y’agaciro mu mateka. Ibindi bihitamwo, naho bishobora kuba ari ivy’ukuri, ntivyari ivy’ishimikiro vy’ubuhinga bwa filozofiya vyatumye Bitcoin iremwa nk’uko vyavuzwe n’uwayiremye.
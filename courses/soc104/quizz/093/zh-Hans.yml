question: 根据 Satoshi Nakamoto 的理念，Bitcoin 旨在解决传统货币的什么根本问题？
answer: 中央集权机构需要过度信任，而历史上这些机构通过货币贬值违背了这种信任
wrong_answers:
  - 传统支付系统的技术效率低下，处理交易的速度太慢，无法满足全球商务的需要
  - 实物货币生产对环境的影响和银行基础设施的碳足迹
  - 国家货币的地域限制阻碍了国际贸易和商业的无缝对接
explanation: |
  Satoshi 明确指出，"传统货币的根本问题在于使其发挥作用所需的所有信任"，并指出，"法定货币的历史充满了对信任的破坏。
  Bitcoin 被设计为一种无信任系统，以消除对中央银行的依赖，而中央银行在历史上曾使货币贬值。其他选择虽然可能是合理的担忧，但并不是 Bitcoin 创造者所阐述的 Bitcoin 创造背后的基本哲学动机。
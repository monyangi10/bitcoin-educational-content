question: Satoshi नाकामोतो के दर्शन के अनुसार, Bitcoin पारंपरिक मुद्राओं की किस मूलभूत समस्या को हल करने का लक्ष्य रखता है?
answer: केंद्रीकृत संस्थानों पर अत्यधिक भरोसा करने की आवश्यकता होती है, जो ऐतिहासिक रूप से मुद्रा अवमूल्यन के माध्यम से उस भरोसे को तोड़ते रहे हैं।
wrong_answers:
  - वैश्विक वाणिज्य के लिए लेनदेन की प्रक्रिया बहुत धीमी गति से करने वाली पारंपरिक भुगतान प्रणालियों की तकनीकी अक्षमता।
  - भौतिक मुद्रा उत्पादन का पर्यावरणीय प्रभाव और बैंकिंग अवसंरचना का कार्बन फुटप्रिंट
  - राष्ट्रीय मुद्राओं की भौगोलिक सीमाएँ निर्बाध अंतर्राष्ट्रीय व्यापार और वाणिज्य में बाधा डालती हैं।
explanation: |
  Satoshi ने स्पष्ट रूप से कहा कि 'पारंपरिक मुद्रा की मूल समस्या इसके संचालन के लिए आवश्यक अत्यधिक विश्वास है' और यह भी बताया कि 'फिएट मुद्राओं का इतिहास इस विश्वास के उल्लंघन से भरा पड़ा है।'
  Bitcoin को एक विश्वासहीन प्रणाली के रूप में डिज़ाइन किया गया था ताकि उन केंद्रीय बैंकों पर निर्भरता समाप्त की जा सके जिन्होंने ऐतिहासिक रूप से मुद्राओं का अवमूल्यन किया है। अन्य विकल्प, हालांकि संभावित रूप से वैध चिंताएँ थीं, Bitcoin के निर्माण के पीछे का मूल दार्शनिक उद्देश्य नहीं थे, जैसा कि इसके निर्माता ने बताया है।
question: Согласно теории рассеянного знания Хайека, почему в странах с централизованной плановой экономикой возникают трудности с установлением цен по сравнению со свободными рынками?
answer: Центральные планировщики не могут получить доступ к субъективным, локализованным знаниям об индивидуальных затратах, выгодах и предпочтениях, которыми обладают только участники рынка
wrong_answers:
  - Центральные планировщики не обладают достаточной вычислительной мощностью и передовыми алгоритмами для обработки всех доступных им экономических данных
  - Центральные планировщики по своей природе коррумпированы и устанавливают цены в интересах себя, а не общества, в отличие от участников рынка, которые альтруистичны
  - Центральные планировщики уделяют слишком много внимания долгосрочной экономической стабильности, а не реагированию на немедленные колебания спроса и предложения
explanation: |
  Ключевая мысль Хайека заключается в том, что знание существует только как "разрозненные фрагменты неполного и часто противоречивого знания, которым обладают все отдельные индивиды" Это знание субъективно и локализовано - только отдельные люди знают свои собственные затраты, выгоды и предпочтения. Свободные рынки посредством добровольного обмена и согласования цен позволяют этим разрозненным знаниям появиться и координировать экономическую деятельность.
  Центральные планировщики, независимо от их намерений и возможностей, не могут получить доступ к этой субъективной, рассеянной информации, которая существует в умах миллионов людей, что делает эффективное установление цен невозможным.
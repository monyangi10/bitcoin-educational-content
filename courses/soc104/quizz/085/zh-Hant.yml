question: 根據哈耶克的分散知識理論，與自由市場相比，中央計畫經濟體為何在制定價格方面舉步維艱？
answer: 中央計畫者無法獲得只有市場參與者才具備的個人成本、利益和偏好的主觀、地方化知識。
wrong_answers:
  - 中央規劃者缺乏足夠的運算能力和先進的演算法，無法處理所有可用的經濟資料
  - 中央計畫者天生腐敗，他們設定價格的目的是為了自己而非社會謀利，不像市場參與者是利他的
  - 中央計劃者過度著重長期經濟穩定，而非回應即時的供需波動
explanation: |
  哈耶克的主要見解是，知識只存在於「所有不同的個人所擁有的不完整且經常互相矛盾的知識的片段分散」。這種知識是主觀和局部的 - 只有個人才知道自己的成本、利益和偏好。自由市場透過自願交換和價格協商，讓這些分散的知識得以出現，並協調經濟活動。
  中央計畫者無論其意圖或能力如何，都無法取得這些存在於數百萬個人心中的主觀、分散的資訊，因此不可能制定有效的價格。
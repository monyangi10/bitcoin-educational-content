question: 하이에크의 분산 지식 이론에 따르면 중앙 계획 경제는 왜 자유 시장에 비해 가격 설정에 어려움을 겪을까요?
answer: 중앙 기획자는 시장 참여자만이 가지고 있는 개별 비용, 편익 및 선호도에 대한 주관적이고 국지적인 지식에 접근할 수 없습니다
wrong_answers:
  - 중앙 계획가들은 사용 가능한 모든 경제 데이터를 처리할 수 있는 충분한 계산 능력과 고급 알고리즘이 부족합니다
  - 중앙 계획자들은 본질적으로 부패하고 이타적인 시장 참여자들과 달리 사회보다는 자신에게 이익이 되도록 가격을 책정합니다
  - 중앙 기획자들은 즉각적인 수요와 공급 변동에 대응하기보다는 장기적인 경제 안정에 지나치게 집중합니다
explanation: |
  하이에크의 핵심 통찰은 지식은 '모든 개인이 가지고 있는 불완전하고 종종 모순되는 지식이 분산된 파편'으로만 존재한다는 것입니다 이러한 지식은 주관적이고 국지적인 것으로, 개인만이 자신의 비용, 편익, 선호도를 알고 있습니다. 자발적인 교환과 가격 협상을 통한 자유 시장은 이러한 분산된 지식이 출현하고 경제 활동을 조정할 수 있도록 합니다.
  중앙 기획자들은 그들의 의도나 능력에 관계없이 수백만 명의 개인이 마음속에 가지고 있는 이 주관적이고 흩어진 정보에 접근할 수 없기 때문에 효과적인 가격 설정이 불가능합니다.
question: Waarom hebben centraal geleide economieën volgens Hayeks theorie van verspreide kennis moeite met prijsbepaling in vergelijking met vrije markten?
answer: Centrale planners hebben geen toegang tot de subjectieve, lokale kennis van individuele kosten, voordelen en voorkeuren die alleen marktdeelnemers bezitten
wrong_answers:
  - Centrale planners beschikken niet over voldoende rekenkracht en geavanceerde algoritmen om alle beschikbare economische gegevens te verwerken
  - Centrale planners zijn van nature corrupt en stellen prijzen vast om er zelf beter van te worden dan de samenleving, in tegenstelling tot marktdeelnemers die altruïstisch zijn
  - Centrale planners richten zich te veel op economische stabiliteit op de lange termijn in plaats van te reageren op onmiddellijke schommelingen in vraag en aanbod
explanation: |
  Hayeks belangrijkste inzicht is dat kennis alleen bestaat als "verspreide fragmenten van onvolledige en vaak tegenstrijdige kennis die alle verschillende individuen bezitten" Deze kennis is subjectief en gelokaliseerd - alleen individuen kennen hun eigen kosten, voordelen en voorkeuren. Vrije markten door vrijwillige uitwisseling en prijsonderhandelingen laten deze verspreide kennis ontstaan en coördineren de economische activiteit.
  Centrale planners, ongeacht hun bedoelingen of mogelijkheden, hebben geen toegang tot deze subjectieve, verspreide informatie die bestaat in de hoofden van miljoenen individuen, waardoor effectieve prijsbepaling onmogelijk is.
question: Dushingiye ku ciyumviro ca Hayek c’ubumenyi bushize ahabona, ni kuki ubutunzi butegekanijwe hagati buhangana n’ugushinga ibiciro ugereranyije n’amasoko yidegemvya?
answer: Abategura imigambi yo hagati ntibashobora kuronka ubumenyi bw’umuntu ku giti ciwe, bw’aho hantu ku bijanye n’ibiciro vy’umuntu ku giti ciwe, inyungu, n’ivyo akunda, ivyo abaje mw’isoko gusa bafise .
wrong_answers:
  - Abategura imigambi yo hagati ntibagira ubushobozi buhagije bwo gukoresha ubuhinga bwo guharura be n’ubuhinga buteye imbere bwo gukora amakuru yose yerekeye ubutunzi bafise .
  - Abategura imigambi yo hagati barafise ibiturire kandi bagashinga ibiciro kugira ngo bivyungukireko aho kuvyungukirako abantu, bitandukanye n’abaje mw’isoko bikunda abandi .
  - Abategura imigambi yo hagati bitaho cane ugushikama kw’ubutunzi kw’igihe kirekire aho kwishura ku guhinduka kw’ugutanga n’ugusaba .
explanation: |
  Iciyumviro nyamukuru Hayek abona ni uko ubumenyi bubaho gusa nk''ibice vy'ubumenyi butatunganye kandi buvuguruzanya kenshi bufise abantu bose batandukanye.' Ubwo bumenyi ni ubw’umuntu ku giti ciwe kandi bushingiye ku karere - abantu bonyene ni bo bazi ivyo batwara, inyungu zabo, n’ivyo bakunda. Amasoko y’ubuntu biciye mu guhinduranya ubushake no guhanahana ibiciro bituma ubwo bumenyi bushize ahabona bushobora guseruka no guhuza ibikorwa vy’ubutunzi. 
  Abategura imigambi yo hagati, ataco bafatiye ku migambi yabo canke ubushobozi bwabo, ntibashobora kuronka ayo makuru y’umuntu ku giti ciwe, atandukanye ari mu vyiyumviro vy’abantu amamiliyoni, ivyo bikaba bituma gushinga igiciro ciza bidashoboka.
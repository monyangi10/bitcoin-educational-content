question: Menurut teori Hayek tentang pengetahuan yang tersebar, mengapa ekonomi yang direncanakan secara terpusat mengalami kesulitan dalam menetapkan harga dibandingkan dengan pasar bebas?
answer: Perencana pusat tidak dapat mengakses pengetahuan subyektif dan lokal mengenai biaya, manfaat, dan preferensi individu yang hanya dimiliki oleh para pelaku pasar
wrong_answers:
  - Para perencana pusat tidak memiliki daya komputasi yang memadai dan algoritme yang canggih untuk memproses semua data ekonomi yang tersedia bagi mereka
  - Para perencana pusat pada dasarnya korup dan menetapkan harga untuk menguntungkan diri mereka sendiri daripada masyarakat, tidak seperti para pelaku pasar yang bersifat altruistik
  - Para perencana pusat terlalu berfokus pada stabilitas ekonomi jangka panjang daripada menanggapi fluktuasi penawaran dan permintaan secara langsung
explanation: |
  Wawasan utama Hayek adalah bahwa pengetahuan hanya ada sebagai 'fragmen-fragmen yang tersebar dari pengetahuan yang tidak lengkap dan sering kali saling bertentangan yang dimiliki oleh semua individu yang berbeda Pengetahuan ini bersifat subjektif dan lokal - hanya individu yang mengetahui biaya, manfaat, dan preferensi mereka sendiri. Pasar bebas melalui pertukaran sukarela dan negosiasi harga memungkinkan pengetahuan yang tersebar ini muncul dan mengkoordinasikan kegiatan ekonomi.
  Para perencana pusat, terlepas dari niat atau kemampuan mereka, tidak dapat mengakses informasi subjektif dan tersebar yang ada di benak jutaan orang ini, sehingga penetapan harga yang efektif menjadi tidak mungkin dilakukan.
question: بر اساس نظریه دانش پراکنده هایک، چرا اقتصادهای برنامه‌ریزی شده مرکزی در مقایسه با بازارهای آزاد با مشکل در تعیین قیمت مواجه می‌شوند؟
answer: برنامه‌ریزان مرکزی نمی‌توانند به دانش ذهنی و محلی هزینه‌ها، مزایا و ترجیحات فردی که تنها شرکت‌کنندگان بازار دارند، دسترسی پیدا کنند.
wrong_answers:
  - برنامه‌ریزان مرکزی فاقد قدرت محاسباتی کافی و الگوریتم‌های پیشرفته برای پردازش تمام داده‌های اقتصادی در دسترس خود هستند.
  - برنامه‌ریزان مرکزی ذاتاً فاسد هستند و قیمت‌ها را به نفع خودشان و نه جامعه تعیین می‌کنند، برخلاف شرکت‌کنندگان در بازار که نوع‌دوست هستند.
  - برنامه‌ریزان مرکزی بیش از حد بر ثبات اقتصادی بلندمدت تمرکز می‌کنند و به نوسانات فوری عرضه و تقاضا پاسخ نمی‌دهند.
explanation: |
  بینش کلیدی هایک این است که دانش تنها به صورت «قطعات پراکنده‌ای از دانش ناقص و اغلب متناقض که توسط تمام افراد متمایز دارا می‌شود» وجود دارد. این دانش ذهنی و محلی است - تنها افراد خودشان از هزینه‌ها، منافع و ترجیحات خود آگاهند. بازارهای آزاد از طریق مبادله داوطلبانه و مذاکره قیمت به این دانش پراکنده اجازه می‌دهند تا ظهور کند و فعالیت اقتصادی را هماهنگ کند. 
  برنامه‌ریزان مرکزی، صرف نظر از نیت یا توانایی‌هایشان، نمی‌توانند به این اطلاعات ذهنی و پراکنده که در ذهن میلیون‌ها فرد وجود دارد دسترسی پیدا کنند، که این امر تعیین قیمت مؤثر را غیرممکن می‌سازد.
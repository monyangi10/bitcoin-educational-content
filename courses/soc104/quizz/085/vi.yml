question: Theo lý thuyết về kiến thức phân tán của Hayek, tại sao các nền kinh tế kế hoạch hóa tập trung lại gặp khó khăn trong việc định giá so với các nền kinh tế thị trường tự do?
answer: Các nhà hoạch định trung ương không thể tiếp cận được kiến thức chủ quan, mang tính địa phương về chi phí, lợi ích và sở thích cá nhân mà chỉ những người tham gia thị trường mới có được.
wrong_answers:
  - Các nhà hoạch định trung ương thiếu năng lực tính toán và thuật toán tiên tiến cần thiết để xử lý tất cả dữ liệu kinh tế hiện có.
  - Các nhà hoạch định trung ương vốn dĩ tham nhũng và ấn định giá cả để có lợi cho bản thân chứ không phải cho xã hội, trái ngược với những người tham gia thị trường vốn vị tha.
  - Các nhà hoạch định trung ương quá chú trọng vào sự ổn định kinh tế dài hạn mà bỏ qua việc ứng phó với những biến động cung cầu tức thời.
explanation: |
  Quan điểm then chốt của Hayek là tri thức chỉ tồn tại dưới dạng "những mảnh vụn phân tán của tri thức không đầy đủ và thường mâu thuẫn, được nắm giữ bởi tất cả các cá nhân riêng biệt". Tri thức này mang tính chủ quan và cục bộ - chỉ có cá nhân mới biết chi phí, lợi ích và sở thích của riêng mình. Thị trường tự do thông qua trao đổi tự nguyện và đàm phán giá cả cho phép tri thức phân tán này xuất hiện và điều phối hoạt động kinh tế.
  
  Các nhà hoạch định trung ương, bất kể ý định hay khả năng của họ, không thể tiếp cận được thông tin chủ quan, phân tán này tồn tại trong tâm trí của hàng triệu cá nhân, khiến việc thiết lập giá cả hiệu quả trở nên bất khả thi.
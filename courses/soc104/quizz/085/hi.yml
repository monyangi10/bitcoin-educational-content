question: हेयक के विकेंद्रीकृत ज्ञान के सिद्धांत के अनुसार, मुक्त बाजारों की तुलना में केंद्रीय रूप से नियोजित अर्थव्यवस्थाओं को मूल्य निर्धारण में कठिनाई क्यों होती है?
answer: केंद्रीय योजनाकारों के पास व्यक्तिगत लागतों, लाभों और प्राथमिकताओं के बारे में वह व्यक्तिपरक, स्थानीय ज्ञान नहीं होता जो केवल बाजार प्रतिभागियों के पास होता है।
wrong_answers:
  - केंद्रीय योजनाकारों के पास उपलब्ध सभी आर्थिक आंकड़ों को संसाधित करने के लिए पर्याप्त कम्प्यूटेशनल शक्ति और उन्नत एल्गोरिदम की कमी है।
  - केंद्रीय योजनाकार स्वभावतः भ्रष्ट होते हैं और समाज के लाभ के बजाय स्वयं के लाभ के लिए कीमतें निर्धारित करते हैं, जबकि बाजार में भाग लेने वाले लोग परोपकारी होते हैं।
  - केंद्रीय योजनाकार तात्कालिक आपूर्ति और मांग में होने वाले उतार-चढ़ाव का जवाब देने के बजाय दीर्घकालिक आर्थिक स्थिरता पर बहुत अधिक ध्यान केंद्रित करते हैं।
explanation: |
  हेयक का प्रमुख विचार यह है कि ज्ञान केवल 'अपूर्ण और अक्सर विरोधाभासी ज्ञान के बिखरे हुए टुकड़ों' के रूप में ही मौजूद होता है, जो विभिन्न व्यक्तियों के पास होता है। यह ज्ञान व्यक्तिपरक और स्थानीय होता है - केवल व्यक्ति ही अपने स्वयं के लागत, लाभ और प्राथमिकताओं को जानते हैं। स्वैच्छिक विनिमय और मूल्य वार्ता के माध्यम से मुक्त बाजार इस बिखरे हुए ज्ञान को उभरने और आर्थिक गतिविधि को समन्वित करने की अनुमति देते हैं।
  केंद्रीय योजनाकार, चाहे उनके इरादे या क्षमताएं कुछ भी हों, लाखों व्यक्तियों के मन में मौजूद इस व्यक्तिपरक, बिखरी हुई जानकारी तक नहीं पहुंच सकते, जिससे प्रभावी मूल्य निर्धारण असंभव हो जाता है।
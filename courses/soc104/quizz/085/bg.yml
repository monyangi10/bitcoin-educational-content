question: Защо според теорията на Хайек за разпръснатото знание централно планираните икономики изпитват трудности при определянето на цените в сравнение със свободните пазари?
answer: Централните плановици нямат достъп до субективните, локални познания за индивидуалните разходи, ползи и предпочитания, които притежават само участниците на пазара
wrong_answers:
  - Централните плановици не разполагат с достатъчно изчислителна мощ и усъвършенствани алгоритми, за да обработят всички икономически данни, с които разполагат
  - Централните плановици са по своята същност корумпирани и определят цените така, че да облагодетелстват себе си, а не обществото, за разлика от участниците на пазара, които са алтруисти
  - Централните плановици се фокусират твърде много върху дългосрочната икономическа стабилност, вместо да реагират на непосредствените колебания в търсенето и предлагането
explanation: |
  Ключовото прозрение на Хайек е, че знанието съществува само като "разпръснати фрагменти от непълно и често противоречиво знание, притежавано от всички отделни индивиди" Тези знания са субективни и локализирани - само индивидите познават собствените си разходи, ползи и предпочитания. Свободните пазари чрез доброволна размяна и договаряне на цените позволяват на това разпръснато знание да се появи и да координира икономическата дейност.
  Централните плановици, независимо от техните намерения или възможности, не могат да получат достъп до тази субективна, разпръсната информация, която съществува в съзнанието на милиони индивиди, което прави невъзможно ефективното определяне на цените.
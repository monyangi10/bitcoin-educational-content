question: Kulingana na nadharia ya Hayek ya maarifa yaliyotawanyika, kwa nini uchumi uliopangwa kati unapambana na upangaji wa bei ikilinganishwa na masoko huria?
answer: Wapangaji mipango wakuu hawawezi kupata maarifa ya kibinafsi, ya ndani kuhusu gharama, faida, na mapendeleo ya mtu binafsi ambayo washiriki wa soko pekee ndio wanao.
wrong_answers:
  - Wapangaji wa kati hawana nguvu ya kutosha ya kompyuta na algoriti za hali ya juu za kuchakata data zote za kiuchumi zinazopatikana kwao.
  - Wapangaji mipango wakuu kwa asili ni wafisadi na huweka bei ili kujinufaisha wao wenyewe badala ya jamii, tofauti na washiriki wa soko ambao ni wakarimu.
  - Wapangaji wakuu huzingatia sana utulivu wa kiuchumi wa muda mrefu badala ya kujibu mabadiliko ya haraka ya usambazaji na mahitaji
explanation: |
  Ufahamu muhimu wa Hayek ni kwamba maarifa yapo tu kama 'vipande vilivyotawanyika vya maarifa yasiyokamilika na yanayokinzana mara nyingi yanayomilikiwa na watu wote tofauti.' Maarifa haya ni ya kibinafsi na ya ndani - ni watu binafsi pekee wanaojua gharama, faida, na mapendeleo yao wenyewe. Masoko huria kupitia ubadilishanaji wa hiari na mazungumzo ya bei huruhusu maarifa haya yaliyotawanyika kuibuka na kuratibu shughuli za kiuchumi.
  
  Wapangaji wakuu, bila kujali nia au uwezo wao, hawawezi kufikia taarifa hii ya kibinafsi, iliyotawanyika ambayo ipo akilini mwa mamilioni ya watu, na kufanya upangaji wa bei kuwa mgumu.
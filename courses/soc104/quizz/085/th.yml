question: ตามทฤษฎีความรู้กระจายของ Hayek ทำไมเศรษฐกิจที่วางแผนจากศูนย์กลางถึงมีปัญหาในการกำหนดราคาเมื่อเทียบกับตลาดเสรี?
answer: นักวางแผนส่วนกลางไม่สามารถเข้าถึงความรู้เชิงอัตวิสัยและเฉพาะที่เกี่ยวกับต้นทุน ผลประโยชน์ และความชอบส่วนบุคคลที่มีเพียงผู้เข้าร่วมตลาดเท่านั้นที่มี
wrong_answers:
  - นักวางแผนส่วนกลางขาดพลังการคำนวณที่เพียงพอและอัลกอริธึมขั้นสูงในการประมวลผลข้อมูลทางเศรษฐกิจทั้งหมดที่มีอยู่
  - นักวางแผนส่วนกลางมีความทุจริตโดยเนื้อแท้และตั้งราคาเพื่อประโยชน์ของตนเองมากกว่าสังคม ซึ่งแตกต่างจากผู้เข้าร่วมตลาดที่มีความเห็นแก่ประโยชน์ส่วนรวม
  - นักวางแผนส่วนกลางมุ่งเน้นมากเกินไปที่เสถียรภาพทางเศรษฐกิจในระยะยาวแทนที่จะตอบสนองต่อความผันผวนของอุปสงค์และอุปทานในทันที
explanation: |
  แนวคิดสำคัญของ Hayek คือความรู้มีอยู่เพียงเป็น 'เศษเสี้ยวที่กระจัดกระจายของความรู้ที่ไม่สมบูรณ์และมักขัดแย้งกันซึ่งบุคคลที่แตกต่างกันทั้งหมดมีอยู่' ความรู้นี้เป็นเรื่องส่วนบุคคลและมีลักษณะเฉพาะท้องถิ่น - มีเพียงบุคคลเท่านั้นที่รู้ต้นทุน, ประโยชน์, และความชอบของตนเอง ตลาดเสรีผ่านการแลกเปลี่ยนโดยสมัครใจและการเจรจาราคาทำให้ความรู้ที่กระจัดกระจายนี้ปรากฏขึ้นและประสานกิจกรรมทางเศรษฐกิจ 
  ผู้วางแผนส่วนกลาง ไม่ว่าจะมีเจตนาหรือความสามารถเพียงใด ก็ไม่สามารถเข้าถึงข้อมูลที่เป็นเรื่องส่วนบุคคลและกระจัดกระจายซึ่งมีอยู่ในจิตใจของบุคคลนับล้าน ทำให้การตั้งราคาที่มีประสิทธิภาพเป็นไปไม่ได้
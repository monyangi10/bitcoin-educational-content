question: ハイエクの知識分散理論によれば、なぜ中央計画経済は自由市場と比較して価格設定に苦労するのか？
answer: 中央プランナーは、市場参加者だけが持つ、個人のコスト、便益、嗜好に関する主観的で地域的な知識にアクセスできない。
wrong_answers:
  - 中央プランナーには、利用可能なすべての経済データを処理するのに十分な計算能力と高度なアルゴリズムがない。
  - 中央計画者は本質的に腐敗しており、利他的な市場参加者とは異なり、社会よりも自分たちの利益のために価格を設定する。
  - 中央計画者は、目先の需給変動に対応することよりも、長期的な経済の安定を重視しすぎる。
explanation: |
  ハイエクの重要な洞察は、知識は「すべての異なる個人が持つ不完全でしばしば矛盾する知識の分散した断片」としてのみ存在するということである。この知識は主観的で局所的なものであり、個人だけが自分自身のコスト、便益、選好を知っている。自発的な交換と価格交渉による自由市場は、この分散した知識を出現させ、経済活動を調整することを可能にする。
  中央計画者は、その意図や能力にかかわらず、何百万もの個人の心の中に存在するこの主観的で散在した情報にアクセスすることはできず、効果的な価格設定を不可能にしている。
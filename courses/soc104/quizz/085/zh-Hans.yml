question: 根据哈耶克的知识分散理论，与自由市场相比，为什么中央计划经济体在制定价格方面会举步维艰？
answer: 中央规划者无法获得只有市场参与者才拥有的关于个人成本、收益和偏好的主观、本地化知识
wrong_answers:
  - 中央规划者缺乏足够的计算能力和先进的算法来处理所有可用的经济数据
  - 中央计划者本质上是腐败的，他们制定价格是为了造福自己而非社会，这与利他主义的市场参与者不同
  - 中央规划者过于关注长期经济稳定，而不是应对眼前的供需波动
explanation: |
  哈耶克的关键见解是，知识只存在于'所有不同个体所拥有的不完整且经常相互矛盾的知识的碎片中'。这种知识是主观的、局部的--只有个人知道自己的成本、收益和偏好。自由市场通过自愿交换和价格谈判，使这种分散的知识得以出现并协调经济活动。
  中央计划者，无论其意图或能力如何，都无法获取存在于千百万个人头脑中的这种主观、分散的信息，从而无法有效地制定价格。
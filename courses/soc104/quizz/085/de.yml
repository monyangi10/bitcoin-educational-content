question: Warum haben zentrale Planwirtschaften nach Hayeks Theorie des verteilten Wissens im Vergleich zu freien Märkten Probleme mit der Preisbildung?
answer: Zentrale Planer haben keinen Zugang zu dem subjektiven, lokalen Wissen über individuelle Kosten, Nutzen und Präferenzen, das nur Marktteilnehmern zur Verfügung steht
wrong_answers:
  - Die zentralen Planer verfügen nicht über genügend Rechenleistung und fortschrittliche Algorithmen, um alle ihnen zur Verfügung stehenden Wirtschaftsdaten zu verarbeiten
  - Zentralplaner sind von Natur aus korrupt und legen die Preise so fest, dass sie ihnen selbst und nicht der Gesellschaft zugute kommen, im Gegensatz zu den Marktteilnehmern, die altruistisch sind
  - Die Zentralplaner konzentrieren sich zu sehr auf die langfristige wirtschaftliche Stabilität, anstatt auf unmittelbare Angebots- und Nachfrageschwankungen zu reagieren
explanation: |
  Hayeks Schlüsselerkenntnis ist, dass Wissen nur als "verstreute Fragmente unvollständigen und häufig widersprüchlichen Wissens existiert, das alle verschiedenen Individuen besitzen" Dieses Wissen ist subjektiv und lokal begrenzt - nur der Einzelne kennt seine eigenen Kosten, Vorteile und Präferenzen. Freie Märkte ermöglichen durch freiwilligen Austausch und Preisverhandlungen die Herausbildung dieses verstreuten Wissens und die Koordinierung der Wirtschaftstätigkeit.
  Zentrale Planer, unabhängig von ihren Absichten oder Fähigkeiten, haben keinen Zugang zu diesem subjektiven, verstreuten Wissen, das in den Köpfen von Millionen von Individuen existiert, was eine effektive Preisfestsetzung unmöglich macht.
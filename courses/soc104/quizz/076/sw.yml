question: Kulingana na uchambuzi wa Gustave Molinari katika 'Les Soirées de la rue Saint Lazare' (Kiingereza. Evenings on Saint Lazarus Street), kuna kufanana gani kwa msingi kati ya wahafidhina na wasoshalisti kunakowatofautisha na watetezi wa uhuru?
answer: Wahafidhina na wasoshalisti wote hutafuta kulazimisha maono yao ya jamii kupitia uingiliaji kati wa serikali, licha ya kuwa na maono tofauti.
wrong_answers:
  - Wahafidhina na wasoshalisti wote wanaona uhuru kama kanuni kamili badala ya suala la fursa au vitendo
  - Wahafidhina na wasoshalisti wanakataa dhana ya mali binafsi na wanatetea umiliki wa pamoja wa rasilimali
  - Wahafidhina na wasoshalisti wote wanaunga mkono uingiliaji kati mdogo wa serikali na wanapendelea suluhisho zinazotegemea soko kwa matatizo ya kijamii.
explanation: |
  Ufahamu muhimu wa Molinari ulikuwa kwamba licha ya tofauti zao dhahiri za kiitikadi, wahafidhina na wasoshalisti wanashiriki mbinu moja: wote wawili hutumia mamlaka ya serikali kulazimisha maono yao kuhusu jinsi jamii inavyopaswa kupangwa. Wahafidhina wanataka kuhifadhi miundo ya kitamaduni kupitia utekelezaji wa serikali, huku wasoshalisti wakitaka kuunda upya jamii kulingana na maadili yao, pia kupitia hatua za serikali. Hii inatofautiana sana na watetezi wa uhuru, ambao wanapinga kutumia mamlaka ya serikali kulazimisha maono yoyote maalum ya kijamii na badala yake wanatetea kuongeza uhuru wa mtu binafsi na kupunguza uingiliaji kati wa serikali.
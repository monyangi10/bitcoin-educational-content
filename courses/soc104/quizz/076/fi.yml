question: Gustave Molinarin teoksessa Les Soirées de la rue Saint Lazare esittämän analyysin mukaan konservatiivien ja sosialistien välillä on jokin sellainen perustavanlaatuinen samankaltaisuus, joka erottaa heidät libertaristeista?
answer: Sekä konservatiivit että sosialistit pyrkivät asettamaan yhteiskuntanäkemyksensä voimaan valtion väliintulon avulla, vaikka heillä on erilaiset näkemykset
wrong_answers:
  - Sekä konservatiivit että sosialistit pitävät vapautta ehdottomana periaatteena eikä niinkään mahdollisuuksien tai pragmatismin kysymyksenä
  - Sekä konservatiivit että sosialistit hylkäävät yksityisomaisuuden käsitteen ja kannattavat resurssien yhteisomistusta
  - Sekä konservatiivit että sosialistit kannattavat mahdollisimman vähäistä valtion väliintuloa ja suosivat markkinapohjaisia ratkaisuja sosiaalisiin ongelmiin
explanation: |
  Molinarin keskeinen oivallus oli, että näennäisistä ideologisista eroista huolimatta konservatiiveilla ja sosialisteilla on yhteinen lähestymistapa: molemmat käyttävät valtiovaltaa saadakseen aikaan oman näkemyksensä siitä, miten yhteiskunta tulisi järjestää. Konservatiivit haluavat säilyttää perinteiset rakenteet valtiollisen valvonnan avulla, kun taas sosialistit haluavat muokata yhteiskuntaa ihanteidensa mukaisesti, myös valtion toimien avulla. Tämä on jyrkässä ristiriidassa libertaristien kanssa, jotka vastustavat valtiovallan käyttämistä minkään tietyn yhteiskunnallisen näkemyksen läpiviemiseksi ja kannattavat sen sijaan yksilönvapauden maksimoimista ja valtion puuttumisen minimoimista.
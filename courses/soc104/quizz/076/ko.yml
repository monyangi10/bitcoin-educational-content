question: "구스타브 몰리나리의 분석에 따르면, 보수주의자와 사회주의자 사이에는 자유주의자와 구별되는 어떤 근본적인 유사성이 존재한다고 하는데요, '레 소아레 드 라 루에 생 라자르'(영문: 생 라자르 거리의 저녁)는 어떤 점에서 자유주의자와 구별될까요?"
answer: "보수주의자와 사회주의자는 서로 다른 비전을 가지고 있음에도 불구하고 국가 개입을 통해 사회에 대한 비전을 강요하려 합니다"
wrong_answers:
  - "보수주의자와 사회주의자 모두 자유를 기회나 실용주의의 문제가 아니라 절대적인 원칙으로 간주합니다"
  - "보수주의자와 사회주의자 모두 사유 재산의 개념을 거부하고 자원의 공동 소유를 옹호합니다"
  - "보수주의자와 사회주의자 모두 최소한의 정부 개입을 지지하고 사회 문제에 대한 시장 기반 해결책을 선호합니다"
explanation: |
  몰리나리의 핵심 통찰은 명백한 이념적 차이에도 불구하고 보수주의자와 사회주의자 모두 국가 권력을 이용해 사회가 어떻게 조직되어야 하는지에 대한 각자의 비전을 강요한다는 공통점을 가지고 있다는 것입니다. 보수주의자는 국가의 강제력을 통해 전통적인 구조를 보존하고자 하는 반면, 사회주의자는 국가의 행동을 통해 자신의 이상에 따라 사회를 재구성하고자 합니다. 이는 특정 사회 비전을 강요하기 위해 국가 권력을 사용하는 것에 반대하고 대신 개인의 자유를 극대화하고 국가 개입을 최소화하는 것을 옹호하는 자유주의자들과는 뚜렷한 대조를 이룹니다.

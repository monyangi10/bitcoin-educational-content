question: Согласно анализу Гюстава Молинари в книге "Вечера на улице Сен-Лазар" (Les Soirées de la rue Saint Lazare), какое фундаментальное сходство существует между консерваторами и социалистами, которое отличает их от либертарианцев?
answer: И консерваторы, и социалисты стремятся навязать свое видение общества с помощью государственного вмешательства, несмотря на то, что видение у них разное
wrong_answers:
  - И консерваторы, и социалисты рассматривают свободу как абсолютный принцип, а не как вопрос возможностей или прагматизма
  - И консерваторы, и социалисты отвергают концепцию частной собственности и выступают за коллективное владение ресурсами
  - И консерваторы, и социалисты выступают за минимальное вмешательство государства и предпочитают рыночные решения социальных проблем
explanation: |
  Главная мысль Молинари заключалась в том, что, несмотря на очевидные идеологические различия, консерваторы и социалисты придерживаются общего подхода: они используют государственную власть для навязывания своих представлений о том, как должно быть устроено общество. Консерваторы хотят сохранить традиционные структуры с помощью государственного принуждения, в то время как социалисты стремятся перестроить общество в соответствии со своими идеалами, также с помощью государства. Это резко контрастирует с либертарианцами, которые выступают против использования государственной власти для навязывания какого-либо конкретного социального видения, а вместо этого ратуют за максимальную свободу личности и минимизацию вмешательства государства.
question: Gustave Molinari analüüsis "Les Soirées de la rue Saint Lazare" (eesti keeles "Õhtud Saint Lazaruse tänaval"), milline põhimõtteline sarnasus on konservatiivide ja sotsialistide vahel, mis eristab neid liberaalidest?
answer: Nii konservatiivid kui ka sotsialistid püüavad oma nägemust ühiskonnast riigi sekkumise kaudu kehtestada, kuigi neil on erinevad nägemused
wrong_answers:
  - Nii konservatiivid kui ka sotsialistid peavad vabadust pigem absoluutseks põhimõtteks kui võimaluste või pragmaatilisuse küsimuseks
  - Nii konservatiivid kui ka sotsialistid lükkavad tagasi eraomandi kontseptsiooni ja pooldavad ressursside kollektiivset omandit
  - Nii konservatiivid kui ka sotsialistid toetavad minimaalset valitsuse sekkumist ja eelistavad sotsiaalsete probleemide lahendamiseks turupõhiseid lahendusi
explanation: |
  Molinari peamine arusaam oli, et vaatamata oma näilistele ideoloogilistele erinevustele on konservatiividel ja sotsialistidel ühine lähenemine: nad mõlemad kasutavad riigivõimu, et kehtestada oma nägemus sellest, kuidas ühiskond peaks olema korraldatud. Konservatiivid tahavad säilitada traditsioonilisi struktuure riikliku jõustamise kaudu, samas kui sotsialistid tahavad ühiskonda ümber kujundada vastavalt oma ideaalidele, samuti riigi tegevuse kaudu. See on teravas vastuolus libertaristidega, kes on vastu riigivõimu kasutamisele mingi konkreetse sotsiaalse visiooni kehtestamiseks ning pooldavad selle asemel individuaalse vabaduse maksimeerimist ja riigi sekkumise minimeerimist.
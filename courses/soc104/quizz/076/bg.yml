question: Според анализа на Густав Молинари в "Вечерите на улица "Сен Лазар" (Les Soirées de la rue Saint Lazare) каква основна прилика съществува между консерваторите и социалистите, която ги отличава от либертарианците?
answer: И консерваторите, и социалистите се стремят да наложат своята визия за обществото чрез държавна намеса, въпреки че имат различни виждания
wrong_answers:
  - И консерваторите, и социалистите разглеждат свободата като абсолютен принцип, а не като въпрос на възможности или прагматизъм
  - И консерваторите, и социалистите отхвърлят концепцията за частната собственост и се застъпват за колективна собственост върху ресурсите
  - И консерваторите, и социалистите подкрепят минималната намеса на държавата и предпочитат пазарните решения на социалните проблеми
explanation: |
  Ключовият извод на Молинари е, че въпреки очевидните си идеологически различия консерваторите и социалистите имат общ подход: и двамата използват държавната власт, за да наложат своите виждания за това как трябва да бъде организирано обществото. Консерваторите искат да запазят традиционните структури чрез налагане на държавната власт, докато социалистите искат да преобразят обществото според своите идеали, също чрез държавни действия. Това рязко контрастира с либертарианците, които се противопоставят на използването на държавната власт за налагане на конкретна социална визия и вместо това се застъпват за максимална индивидуална свобода и минимална държавна намеса.
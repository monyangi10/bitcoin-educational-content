question: "गुस्ताव मोलिनारी के 'लेस सोइरीज़ डे ला रुए सेंट लाज़ारे' (अंग्रेजी में: सेंट लाजरस स्ट्रीट पर शामें) में किए गए विश्लेषण के अनुसार, रूढ़िवादियों और समाजवादियों के बीच कौन सी मूलभूत समानता मौजूद है जो उन्हें स्वतंत्रतावादियों से अलग करती है?"
answer: "रूढ़िवादी और समाजवादी दोनों ही विचारधाराएं भिन्न होने के बावजूद राज्य के हस्तक्षेप के माध्यम से समाज के प्रति अपनी-अपनी दृष्टि थोपने का प्रयास करती हैं।"
wrong_answers:
  - "रूढ़िवादी और समाजवादी दोनों ही स्वतंत्रता को अवसर या व्यावहारिकता का विषय मानने के बजाय एक निरपेक्ष सिद्धांत के रूप में देखते हैं।"
  - "रूढ़िवादी और समाजवादी दोनों ही निजी संपत्ति की अवधारणा को अस्वीकार करते हैं और संसाधनों के सामूहिक स्वामित्व की वकालत करते हैं।"
  - "रूढ़िवादी और समाजवादी दोनों ही न्यूनतम सरकारी हस्तक्षेप का समर्थन करते हैं और सामाजिक समस्याओं के लिए बाजार-आधारित समाधानों को प्राथमिकता देते हैं।"
explanation: |
  मोलिनारी की प्रमुख अंतर्दृष्टि यह थी कि वैचारिक मतभेदों के बावजूद, रूढ़िवादी और समाजवादी एक समान दृष्टिकोण साझा करते हैं: वे दोनों ही समाज के संगठन के संबंध में अपने-अपने दृष्टिकोण को थोपने के लिए राज्य शक्ति का उपयोग करते हैं। रूढ़िवादी राज्य के नियंत्रण के माध्यम से पारंपरिक संरचनाओं को संरक्षित करना चाहते हैं, जबकि समाजवादी राज्य की कार्रवाई के माध्यम से अपने आदर्शों के अनुसार समाज को नया रूप देना चाहते हैं। यह स्वतंत्रतावादियों के बिल्कुल विपरीत है, जो किसी विशेष सामाजिक दृष्टिकोण को थोपने के लिए राज्य शक्ति के उपयोग का विरोध करते हैं और इसके बजाय व्यक्तिगत स्वतंत्रता को अधिकतम करने और राज्य के हस्तक्षेप को न्यूनतम करने की वकालत करते हैं।

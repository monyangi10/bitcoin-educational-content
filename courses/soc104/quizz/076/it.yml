question: Secondo l'analisi di Gustave Molinari in "Les Soirées de la rue Saint Lazare" (le serate di via Saint Lazarus), quale somiglianza fondamentale esiste tra conservatori e socialisti che li distingue dai libertari?
answer: Sia i conservatori che i socialisti cercano di imporre la loro visione della società attraverso l'intervento dello Stato, pur avendo visioni diverse
wrong_answers:
  - Sia i conservatori che i socialisti considerano la libertà come un principio assoluto piuttosto che come una questione di opportunità o di pragmatismo
  - Sia i conservatori che i socialisti rifiutano il concetto di proprietà privata e sostengono la proprietà collettiva delle risorse
  - Sia i conservatori che i socialisti sostengono un intervento governativo minimo e preferiscono soluzioni basate sul mercato ai problemi sociali
explanation: |
  L'intuizione chiave di Molinari è che, nonostante le apparenti differenze ideologiche, conservatori e socialisti condividono un approccio comune: entrambi usano il potere dello Stato per imporre le rispettive visioni di come dovrebbe essere organizzata la società. I conservatori vogliono preservare le strutture tradizionali attraverso l'applicazione dello Stato, mentre i socialisti vogliono rimodellare la società secondo i loro ideali, sempre attraverso l'azione dello Stato. Ciò contrasta nettamente con i libertari, che si oppongono all'uso del potere statale per imporre una particolare visione sociale e sostengono invece la massimizzazione della libertà individuale e la minimizzazione dell'intervento statale.
question: Jaká zásadní podobnost, která odlišuje konzervativce a socialisty od libertariánů, existuje podle analýzy Gustava Molinariho v knize "Les Soirées de la rue Saint Lazare" (Večery v ulici sv. Lazara)?
answer: Jak konzervativci, tak socialisté se snaží prosadit svou vizi společnosti prostřednictvím státních zásahů, přestože mají odlišné vize
wrong_answers:
  - Konzervativci i socialisté považují svobodu za absolutní princip, nikoli za otázku příležitostí nebo pragmatismu
  - Konzervativci i socialisté odmítají koncept soukromého vlastnictví a prosazují kolektivní vlastnictví zdrojů
  - Konzervativci i socialisté podporují minimální zásahy státu a preferují tržní řešení sociálních problémů
explanation: |
  Molinariho klíčový poznatek spočíval v tom, že navzdory zdánlivým ideologickým rozdílům mají konzervativci a socialisté společný přístup: oba využívají státní moc k prosazení svých představ o uspořádání společnosti. Konzervativci chtějí zachovat tradiční struktury prostřednictvím státního donucení, zatímco socialisté chtějí přetvořit společnost podle svých ideálů, rovněž prostřednictvím státních opatření. To ostře kontrastuje s libertariány, kteří jsou proti využívání státní moci k vnucování jakékoli konkrétní společenské vize a místo toho prosazují maximalizaci svobody jednotlivce a minimalizaci státních zásahů.
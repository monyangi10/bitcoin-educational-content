question: "بر اساس تحلیل گوستاو مولیناری در 'Les Soirées de la rue Saint Lazare' (به انگلیسی: Evenings on Saint Lazarus Street)، چه شباهت اساسی بین محافظه‌کاران و سوسیالیست‌ها وجود دارد که آن‌ها را از لیبرترین‌ها متمایز می‌کند؟"
answer: هم محافظه‌کاران و هم سوسیالیست‌ها به دنبال تحمیل دیدگاه خود از جامعه از طریق مداخله دولت هستند، هرچند دیدگاه‌های متفاوتی دارند.
wrong_answers:
  - هم محافظه‌کاران و هم سوسیالیست‌ها آزادی را به‌عنوان یک اصل مطلق می‌بینند نه به‌عنوان مسئله‌ای از فرصت یا عمل‌گرایی.
  - هم محافظه‌کاران و هم سوسیالیست‌ها مفهوم مالکیت خصوصی را رد می‌کنند و از مالکیت جمعی منابع حمایت می‌کنند.
  - هم محافظه‌کاران و هم سوسیالیست‌ها از حداقل مداخله دولت حمایت می‌کنند و راه‌حل‌های مبتنی بر بازار را برای مشکلات اجتماعی ترجیح می‌دهند.
explanation: |
  بینش کلیدی مولیناری این بود که علی‌رغم تفاوت‌های ایدئولوژیک ظاهری‌شان، محافظه‌کاران و سوسیالیست‌ها رویکرد مشترکی دارند: هر دو از قدرت دولت برای تحمیل دیدگاه‌های خود درباره چگونگی سازماندهی جامعه استفاده می‌کنند. محافظه‌کاران می‌خواهند ساختارهای سنتی را از طریق اجرای دولتی حفظ کنند، در حالی که سوسیالیست‌ها می‌خواهند جامعه را بر اساس ایده‌آل‌های خود بازسازی کنند، که این نیز از طریق اقدام دولتی صورت می‌گیرد. این در تضاد شدید با لیبرترین‌ها است که با استفاده از قدرت دولت برای تحمیل هرگونه دیدگاه اجتماعی خاص مخالفند و به جای آن، خواستار حداکثر آزادی فردی و حداقل مداخله دولت هستند.
question: Enligt Gustave Molinaris analys i "Les Soirées de la rue Saint Lazare" (eng. Evenings on Saint Lazarus Street), vilken grundläggande likhet finns det mellan konservativa och socialister som skiljer dem från libertarianer?
answer: Både konservativa och socialister försöker införa sin vision av samhället genom statliga ingripanden, trots att de har olika visioner
wrong_answers:
  - Både konservativa och socialister ser frihet som en absolut princip snarare än en fråga om möjligheter eller pragmatism
  - Både konservativa och socialister förkastar begreppet privat egendom och förespråkar kollektivt ägande av resurser
  - Både konservativa och socialister stöder minimal statlig inblandning och föredrar marknadsbaserade lösningar på sociala problem
explanation: |
  Molinaris viktigaste insikt var att konservativa och socialister trots sina uppenbara ideologiska skillnader har en gemensam strategi: de använder båda statsmakten för att genomdriva sina respektive visioner om hur samhället bör organiseras. Konservativa vill bevara traditionella strukturer genom statliga tvångsåtgärder, medan socialister vill omforma samhället enligt sina ideal, också det genom statliga åtgärder. Detta står i skarp kontrast till libertarianer, som motsätter sig att statsmakten används för att införa någon särskild samhällsvision och i stället förespråkar maximal individuell frihet och minimalt statligt ingripande.
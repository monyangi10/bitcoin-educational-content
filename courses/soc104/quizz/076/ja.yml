question: サン・ラザール通りの夕べ』（Les Soirées de la rue Saint Lazare）におけるギュスターヴ・モリナーリの分析によれば、保守派と社会主義者の間に、彼らをリバタリアンから区別する根本的な類似点が存在するのだろうか？
answer: 保守主義者も社会主義者も、異なるビジョンを持っているにもかかわらず、国家の介入によって社会のビジョンを押し付けようとしている。
wrong_answers:
  - 保守派も社会主義者も、自由を機会やプラグマティズムの問題ではなく、絶対的な原理としてとらえている。
  - 保守派も社会主義者も、私有財産の概念を否定し、資源の集団所有を提唱している。
  - 保守派も社会主義者も、政府の介入を最小限にとどめ、社会問題に対する市場ベースの解決策を好む。
explanation: |
  モリナーリの重要な洞察は、イデオロギー的な相違は見られるものの、保守派と社会主義者には共通のアプローチがあるということである。保守派は国家の強制力によって伝統的な構造を維持したいと考え、社会主義者は同じく国家の行動によって、自分たちの理想に従って社会を再構築したいと考える。これは、国家権力を使って特定の社会ビジョンを押し付けることに反対し、その代わりに個人の自由を最大化し、国家の介入を最小化することを主張するリバタリアンとは対照的である。
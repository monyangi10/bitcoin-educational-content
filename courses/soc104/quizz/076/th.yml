question: ตามการวิเคราะห์ของ Gustave Molinari ใน 'Les Soirées de la rue Saint Lazare' (แปลเป็นอังกฤษว่า Evenings on Saint Lazarus Street) ความคล้ายคลึงพื้นฐานที่มีอยู่ระหว่างกลุ่มอนุรักษ์นิยมและสังคมนิยมที่ทำให้พวกเขาแตกต่างจากกลุ่มเสรีนิยมคืออะไร?
answer: ทั้งอนุรักษ์นิยมและสังคมนิยมต่างพยายามที่จะกำหนดวิสัยทัศน์ของสังคมผ่านการแทรกแซงของรัฐ แม้ว่าจะมีวิสัยทัศน์ที่แตกต่างกัน
wrong_answers:
  - ทั้งอนุรักษ์นิยมและสังคมนิยมมองว่าเสรีภาพเป็นหลักการที่สมบูรณ์แบบมากกว่าจะเป็นเรื่องของโอกาสหรือปฏิบัตินิยม
  - ทั้งฝ่ายอนุรักษ์นิยมและสังคมนิยมปฏิเสธแนวคิดเรื่องทรัพย์สินส่วนตัวและสนับสนุนการเป็นเจ้าของทรัพยากรร่วมกัน
  - ทั้งอนุรักษ์นิยมและสังคมนิยมสนับสนุนการแทรกแซงของรัฐบาลให้น้อยที่สุดและชอบวิธีแก้ปัญหาสังคมที่อิงกับตลาด
explanation: |
  ข้อมูลเชิงลึกที่สำคัญของ Molinari คือ แม้จะมีความแตกต่างทางอุดมการณ์ที่เห็นได้ชัด แต่พวกอนุรักษ์นิยมและสังคมนิยมมีแนวทางร่วมกัน: ทั้งสองใช้พลังของรัฐในการบังคับใช้วิสัยทัศน์ของตนเองเกี่ยวกับการจัดระเบียบสังคม พวกอนุรักษ์นิยมต้องการรักษาโครงสร้างดั้งเดิมผ่านการบังคับใช้ของรัฐ ในขณะที่พวกสังคมนิยมต้องการปรับเปลี่ยนสังคมตามอุดมคติของตนเอง ซึ่งก็ผ่านการกระทำของรัฐเช่นกัน ซึ่งแตกต่างอย่างมากกับพวกเสรีนิยมที่คัดค้านการใช้พลังของรัฐในการบังคับใช้วิสัยทัศน์ทางสังคมใด ๆ และแทนที่จะสนับสนุนการเพิ่มเสรีภาพส่วนบุคคลและลดการแทรกแซงของรัฐให้น้อยที่สุด
question: Według analizy Gustave'a Molinariego w "Les Soirées de la rue Saint Lazare" (ang. "Wieczory na ulicy Świętego Łazarza"), jakie fundamentalne podobieństwo istnieje między konserwatystami a socjalistami, które odróżnia ich od libertarian?
answer: Zarówno konserwatyści, jak i socjaliści dążą do narzucenia swojej wizji społeczeństwa poprzez interwencję państwa, mimo że mają różne wizje
wrong_answers:
  - Zarówno konserwatyści, jak i socjaliści postrzegają wolność jako zasadę absolutną, a nie kwestię możliwości czy pragmatyzmu
  - Zarówno konserwatyści, jak i socjaliści odrzucają koncepcję własności prywatnej i opowiadają się za kolektywną własnością zasobów
  - Zarówno konserwatyści, jak i socjaliści popierają minimalną interwencję rządu i preferują rynkowe rozwiązania problemów społecznych
explanation: |
  Kluczowym spostrzeżeniem Molinariego było to, że pomimo pozornych różnic ideologicznych, konserwatyści i socjaliści mają wspólne podejście: obaj wykorzystują władzę państwową do narzucenia swoich wizji tego, jak społeczeństwo powinno być zorganizowane. Konserwatyści chcą zachować tradycyjne struktury poprzez egzekwowanie prawa przez państwo, podczas gdy socjaliści chcą przekształcić społeczeństwo zgodnie ze swoimi ideałami, również poprzez działania państwa. Kontrastuje to wyraźnie z libertarianami, którzy sprzeciwiają się wykorzystywaniu władzy państwowej do narzucania jakiejkolwiek konkretnej wizji społecznej i zamiast tego opowiadają się za maksymalizacją wolności jednostki i minimalizacją interwencji państwa.
question: Gustave Molinari'nin 'Les Soirées de la rue Saint Lazare' (Aziz Lazar Sokağı Akşamları) adlı eserindeki analizine göre, muhafazakârlar ve sosyalistler arasında onları liberteryenlerden ayıran temel benzerlik nedir?
answer: Hem muhafazakârlar hem de sosyalistler, farklı vizyonlara sahip olmalarına rağmen, kendi toplum vizyonlarını devlet müdahalesi yoluyla empoze etmeye çalışırlar
wrong_answers:
  - Hem muhafazakârlar hem de sosyalistler özgürlüğü bir fırsat ya da pragmatizm meselesi olmaktan ziyade mutlak bir ilke olarak görürler
  - Hem muhafazakarlar hem de sosyalistler özel mülkiyet kavramını reddeder ve kaynakların kolektif mülkiyetini savunurlar
  - Hem muhafazakârlar hem de sosyalistler asgari düzeyde devlet müdahalesini destekler ve sosyal sorunlara piyasa temelli çözümleri tercih eder
explanation: |
  Molinari'nin temel öngörüsü, görünürdeki ideolojik farklılıklarına rağmen muhafazakârlar ve sosyalistlerin ortak bir yaklaşımı paylaştıklarıdır: her ikisi de toplumun nasıl örgütlenmesi gerektiğine dair kendi vizyonlarını dayatmak için devlet gücünü kullanmaktadır. Muhafazakârlar geleneksel yapıları devlet zoruyla korumak isterken, sosyalistler yine devlet eliyle toplumu kendi ideallerine göre yeniden şekillendirmek istemektedir. Bu durum, herhangi bir toplumsal vizyonu dayatmak için devlet gücünün kullanılmasına karşı çıkan ve bunun yerine bireysel özgürlüğün en üst düzeye çıkarılmasını ve devlet müdahalesinin en aza indirilmesini savunan liberteryenlerle keskin bir tezat oluşturmaktadır.
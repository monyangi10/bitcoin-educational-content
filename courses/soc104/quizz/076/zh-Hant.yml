question: 根據 Gustave Molinari 在 'Les Soirées de la rue Saint Lazare' (eng. Evenings on Saint Lazarus Street) 中的分析，保守派和社會主義者之間存在什麼基本的相似性，使他們有別於自由主義者？
answer: 保守派和社會主義者儘管有不同的願景，但都試圖透過國家干預來強加他們對社會的願景。
wrong_answers:
  - 保守派和社會主義者都將自由視為絕對原則，而非機會或實用主義。
  - 保守派和社會主義者都拒絕私有財產的概念，主張集體擁有資源
  - 保守派和社會主義者都支持最少的政府干預，並偏好以市場為基礎的社會問題解決方案
explanation: |
  莫里納利的主要見解是，儘管保守派和社會主義者在意識形態上有明顯的差異，但他們有一個共同的方法：他們都利用國家權力來強加各自對社會應該如何組織的願景。保守派希望透過國家強制執行來維護傳統結構，而社會主義者則希望根據他們的理想來重塑社會，同樣也是透過國家行動。這與自由主義者形成了強烈的對比，自由主義者反對使用國家權力來強加任何特定的社會願景，而是主張最大化個人自由和最小化國家干預。
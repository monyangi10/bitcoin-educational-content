question: Volgens de analyse van Gustave Molinari in 'Les Soirées de la rue Saint Lazare' (Eng. Avonden in de Sint Lazarusstraat), welke fundamentele overeenkomst bestaat er tussen conservatieven en socialisten die hen onderscheidt van libertariërs?
answer: Zowel conservatieven als socialisten proberen hun visie op de samenleving op te leggen door middel van staatsinterventie, ook al hebben ze verschillende visies
wrong_answers:
  - Zowel conservatieven als socialisten zien vrijheid als een absoluut principe in plaats van een kwestie van kansen of pragmatisme
  - Zowel conservatieven als socialisten verwerpen het concept van privébezit en pleiten voor collectief eigendom van hulpbronnen
  - Zowel conservatieven als socialisten steunen minimale overheidsbemoeienis en geven de voorkeur aan marktgebaseerde oplossingen voor sociale problemen
explanation: |
  Molinari's belangrijkste inzicht was dat ondanks hun ogenschijnlijke ideologische verschillen, conservatieven en socialisten een gemeenschappelijke aanpak hebben: ze gebruiken allebei de macht van de staat om hun respectievelijke visie op de organisatie van de samenleving op te leggen. Conservatieven willen traditionele structuren behouden door middel van handhaving door de staat, terwijl socialisten de maatschappij willen hervormen volgens hun idealen, ook door middel van staatsmaatregelen. Dit staat in schril contrast met libertariërs, die zich verzetten tegen het gebruik van staatsmacht om een bepaalde sociale visie op te leggen en in plaats daarvan pleiten voor het maximaliseren van individuele vrijheid en het minimaliseren van staatsinterventie.
question: 根据古斯塔夫-莫里纳利在《圣拉扎尔街的夜晚》（Les Soirées de la rue Saint Lazare）一书中的分析，保守派和社会主义者之间有什么根本的相似之处，使他们有别于自由主义者？
answer: 保守派和社会主义者都试图通过国家干预将自己的社会愿景强加于人，尽管他们有不同的愿景
wrong_answers:
  - 保守派和社会主义者都将自由视为绝对原则，而不是机会或实用主义问题
  - 保守派和社会主义者都反对私有财产的概念，主张资源的集体所有制
  - 保守派和社会主义者都支持尽量减少政府干预，更倾向于以市场为基础解决社会问题
explanation: |
  莫利纳利的主要见解是，尽管保守派和社会主义者在意识形态上存在明显差异，但他们有一个共同的方法：他们都利用国家权力来强加各自对社会组织方式的看法。保守派希望通过国家强制力来维护传统结构，而社会主义者则希望按照他们的理想来重塑社会，同样也是通过国家行动来实现。这与自由主义者形成了鲜明对比，后者反对利用国家权力强加任何特定的社会愿景，而是主张最大限度地扩大个人自由，最大限度地减少国家干预。
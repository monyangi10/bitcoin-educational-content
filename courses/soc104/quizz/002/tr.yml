question: Metne göre, geleneksel sol-sağ siyasi yelpazenin temel sorunu nedir?
answer: Klasik liberal düşünceye yer bırakmıyor
wrong_answers:
  - Merkezci ve ılımlı pozisyonları çok fazla destekliyor
  - Radikal partilere aşırı vurgu yapıyor
  - Her şeyi ekonomiye indirgeyerek tartışmaları basitleştiriyor
explanation: |
  Bu bölüm, sol-sağ ekseniyle ilgili temel sorunun, klasik liberal düşünceyi sınıflandıramaması olduğunu açıkça ortaya koymaktadır
  ne solcu eşitlikçilik ne de sağcı milliyetçilik. Thomas Jefferson, Frédéric Bastiat gibi figürler ya da Bitcoin gibi hareketler
  bu geleneksel kategoriler. Diğer seçenekler yanlıştır, çünkü metin merkezciliği eleştirmemekte, aşırılığa odaklanmamakta ve
  ekonomi dışında birçok yönü vardır.
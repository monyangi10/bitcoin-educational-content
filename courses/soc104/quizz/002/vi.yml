question: Theo văn bản, vấn đề chính của phổ chính trị truyền thống tả-hữu là gì?
answer: Nó không chừa chỗ cho tư tưởng tự do cổ điển.
wrong_answers:
  - Nó quá thiên về các quan điểm trung dung và ôn hòa.
  - Ông ta quá đề cao các đảng cực đoan.
  - Ông đơn giản hóa các cuộc tranh luận bằng cách quy mọi thứ về kinh tế.
explanation: |
  Chương này làm rõ rằng vấn đề chính của trục tả-hữu là nó không thể phân loại tư tưởng tự do cổ điển, vốn không tương ứng với chủ nghĩa bình đẳng cánh tả cũng không phải chủ nghĩa dân tộc cánh hữu. Những nhân vật như Thomas Jefferson, Frédéric Bastiat hay các phong trào như Bitcoin vượt ra ngoài những phạm trù truyền thống này. Các lựa chọn khác đều không chính xác, vì văn bản không chỉ trích chủ nghĩa trung dung nói chung, không tập trung vào chủ nghĩa cực đoan, và đề cập đến nhiều khía cạnh khác ngoài kinh tế.
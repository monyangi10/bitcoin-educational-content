question: ตามข้อความ ปัญหาหลักของสเปกตรัมการเมืองซ้าย-ขวาแบบดั้งเดิมคืออะไร?
answer: มันไม่เหลือที่ว่างสำหรับความคิดเสรีนิยมแบบคลาสสิก
wrong_answers:
  - มันสนับสนุนจุดยืนที่เป็นกลางและปานกลางมากเกินไป
  - เขาให้ความสำคัญกับพรรคสุดโต่งมากเกินไป
  - เขาทำให้การอภิปรายง่ายขึ้นโดยการลดทุกอย่างให้เหลือแค่เศรษฐศาสตร์
explanation: |
  บทนี้ทำให้เห็นชัดเจนว่าปัญหาหลักของแกนซ้าย-ขวาคือไม่สามารถจัดประเภทความคิดเสรีนิยมคลาสสิกได้ ซึ่งไม่ตรงกับทั้งความเสมอภาคนิยมฝ่ายซ้ายหรือชาตินิยมฝ่ายขวา บุคคลเช่น Thomas Jefferson, Frédéric Bastiat หรือขบวนการเช่น Bitcoin ก้าวข้ามหมวดหมู่ดั้งเดิมเหล่านี้ ตัวเลือกอื่นๆ นั้นไม่ถูกต้อง เนื่องจากข้อความไม่ได้วิจารณ์ความเป็นกลาง ไม่ได้มุ่งเน้นที่ความสุดโต่ง และกล่าวถึงหลายแง่มุมที่นอกเหนือจากเศรษฐศาสตร์
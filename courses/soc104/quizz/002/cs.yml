question: Jaký je podle textu hlavní problém tradičního pravolevého politického spektra?
answer: Neponechává žádný prostor pro klasické liberální myšlení
wrong_answers:
  - Příliš upřednostňuje centristické a umírněné postoje
  - Přeceňuje extremistické strany
  - Zjednodušuje debaty tím, že vše redukuje na ekonomiku
explanation: |
  Kapitola jasně ukazuje, že hlavní problém osy levice-pravice spočívá v tom, že na ni nelze zařadit klasické liberální myšlení, které odpovídá
  ani levicovému rovnostářství, ani pravicovému nacionalismu. Osobnosti jako Thomas Jefferson, Frédéric Bastiat nebo hnutí jako Bitcoin překračují hranice
  tyto tradiční kategorie. Ostatní možnosti jsou nesprávné, neboť text nekritizuje centrismus jako takový, nezaměřuje se na extremismus a evokuje
  mnoho jiných aspektů než ekonomii.
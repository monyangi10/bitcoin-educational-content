question: В чем, согласно тексту, заключается главная проблема традиционного лево-правого политического спектра?
answer: Он не оставляет места для классического либерального мышления
wrong_answers:
  - Он слишком сильно отдает предпочтение центристам и умеренным позициям
  - Он слишком много внимания уделяет экстремистским партиям
  - Он упрощает дебаты, сводя все к экономике
explanation: |
  В главе ясно показано, что главная проблема оси "левый-правый" заключается в том, что она не может классифицировать классическую либеральную мысль, которая не соответствует ни левому эгалитаризму, ни правому национализму
  ни левому эгалитаризму, ни правому национализму. Такие фигуры, как Томас Джефферсон, Фредерик Бастиат, или движения, подобные Bitcoin, выходят за рамки этих традиционных категорий
  эти традиционные категории. Остальные варианты неверны, поскольку текст не критикует центризм как таковой, не фокусируется на экстремизме и затрагивает многие аспекты, помимо экономики
  в нем затрагиваются многие аспекты, помимо экономики.
question: 텍스트에 따르면 전통적인 좌우 정치 스펙트럼의 주요 문제점은 무엇인가요?
answer: 고전적인 자유주의적 사고의 여지를 남기지 않습니다
wrong_answers:
  - 중도 및 온건 입장을 지나치게 선호합니다
  - 그는 극단주의 정당을 지나치게 강조합니다
  - 그는 모든 것을 경제학으로 환원하여 논쟁을 단순화합니다
explanation: |
  이 장에서는 좌-우 축의 주요 문제점은 다음과 같은 고전적 자유주의 사상을 분류할 수 없다는 것임을 분명히 밝힙니다
  좌파 평등주의도 우파 민족주의도 아닙니다. 토머스 제퍼슨, 프레데릭 바스티앙과 같은 인물이나 Bitcoin와 같은 운동은
  이러한 전통적인 범주를 초월합니다. 다른 옵션은 텍스트가 중도주의를 비판하지 않고 극단주의에 초점을 맞추지 않고
  경제학 이외의 많은 측면을 불러일으키기 때문입니다.
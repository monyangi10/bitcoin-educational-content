question: Mikä on tekstin mukaan perinteisen vasemmisto-oikeistopolitiikan tärkein ongelma?
answer: Se ei jätä tilaa klassiselle liberaalille ajattelulle
wrong_answers:
  - Se suosii liikaa keskustalaisia ja maltillisia kantoja
  - Hän korostaa liikaa ääriryhmiä
  - Hän yksinkertaistaa keskusteluja pelkistämällä kaiken talouteen
explanation: |
  Luvussa tehdään selväksi, että vasemmisto-oikeisto -akselin suurin ongelma on se, että sillä ei voida luokitella klassista liberaalia ajattelua, joka vastaa "vasemmisto-oikeistoa"
  vasemmistolaista egalitarismia eikä oikeistolaista nationalismia. Thomas Jeffersonin ja Frédéric Bastiat'n kaltaiset hahmot tai Bitcoin:n kaltaiset liikkeet ylittävät..
  nämä perinteiset kategoriat. Muut vaihtoehdot ovat virheellisiä, sillä tekstissä ei kritisoida keskustalaisuutta sellaisenaan, siinä ei keskitytä ääriliikkeisiin, ja se tuo mieleen
  monia muitakin näkökohtia kuin taloutta.
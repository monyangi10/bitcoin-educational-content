question: طبق متن، مشکل اصلی طیف سیاسی سنتی چپ-راست چیست؟
answer: این هیچ جایی برای تفکر لیبرال کلاسیک باقی نمی‌گذارد.
wrong_answers:
  - این بیش از حد به مواضع میانه‌رو و معتدل تمایل دارد.
  - او بر احزاب افراطی بیش از حد تأکید می‌کند
  - او مناظرات را با کاهش همه چیز به اقتصاد ساده می‌کند.
explanation: |
  این فصل به وضوح بیان می‌کند که مشکل اصلی محور چپ-راست این است که نمی‌تواند تفکر لیبرال کلاسیک را طبقه‌بندی کند، که نه با برابری‌طلبی چپ‌گرا و نه با ناسیونالیسم راست‌گرا مطابقت دارد. شخصیت‌هایی مانند توماس جفرسون، فردریک باستیا یا جنبش‌هایی مانند Bitcoin از این دسته‌بندی‌های سنتی فراتر می‌روند. گزینه‌های دیگر نادرست هستند، زیرا متن به عنوان چنین از مرکزگرایی انتقاد نمی‌کند، بر افراط‌گرایی تمرکز ندارد و جنبه‌های بسیاری غیر از اقتصاد را مطرح می‌کند.
question: Prema tekstu, koji je glavni problem sa tradicionalnim levim-desnim političkim spektrom?
answer: Ne ostavlja prostora za klasično liberalno razmišljanje
wrong_answers:
  - Previše favorizuje centrističke i umerene pozicije
  - Previše naglašava ekstremističke stranke
  - On pojednostavljuje debate svodeći sve na ekonomiju.
explanation: |
  Poglavlje jasno pokazuje da je glavni problem sa levim-desnim spektrom to što ne može klasifikovati klasičnu liberalnu misao, koja ne odgovara ni levom egalitarizmu ni desnom nacionalizmu. Ličnosti poput Tomasa Džefersona, Frédérica Bastiata ili pokreti poput Bitcoin prevazilaze ove tradicionalne kategorije. Druge opcije su netačne, jer tekst ne kritikuje centrizam kao takav, ne fokusira se na ekstremizam i pominje mnoge aspekte osim ekonomije.
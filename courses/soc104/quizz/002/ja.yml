question: 本文によると、伝統的な左右の政治スペクトルの主な問題点は何か？
answer: 古典的なリベラル思想が入り込む余地はない
wrong_answers:
  - 中道・穏健派を優遇しすぎている
  - 過激派政党を強調しすぎ
  - 彼はすべてを経済学に還元することで、議論を単純化している。
explanation: |
  この章では、左右軸の主な問題は、古典的なリベラル思想を分類できないことであることを明らかにしている。
  左翼的平等主義でも右翼的ナショナリズムでもない。トマス・ジェファーソンやフレデリック・バスティアのような人物や、Bitcoinのような運動は、こうした従来のカテゴリーを超越している。
  これらの伝統的なカテゴリーを超越している。本文は中道主義を批判しておらず、極端主義に焦点を当てておらず、経済以外の多くの側面を想起させるので、他の選択肢は正しくない。
  経済学以外の多くの側面を想起させる。
question: Hva er, ifølge teksten, hovedproblemet med det tradisjonelle politiske venstre-høyre-spekteret?
answer: Det gir ikke rom for klassisk liberal tenkning
wrong_answers:
  - Den favoriserer sentrumsorienterte og moderate posisjoner i for stor grad
  - Han legger for stor vekt på ekstremistpartier
  - Han forenkler debattene ved å redusere alt til økonomi
explanation: |
  Kapitlet gjør det klart at hovedproblemet med venstre-høyre-aksen er at den ikke kan klassifisere klassisk liberal tenkning, som verken svarer til
  verken tilsvarer venstresidens egalitarisme eller høyresidens nasjonalisme. Skikkelser som Thomas Jefferson, Frédéric Bastiat eller bevegelser som Bitcoin overskrider
  disse tradisjonelle kategoriene. De andre alternativene er feil, ettersom teksten ikke kritiserer sentrisme som sådan, ikke fokuserer på ekstremisme og trekker frem
  mange andre aspekter enn økonomi.
question: Vad är enligt texten det största problemet med det traditionella politiska spektrumet vänster-höger?
answer: Den lämnar inget utrymme för klassiskt liberalt tänkande
wrong_answers:
  - Den gynnar centristiska och moderata ståndpunkter i alltför hög grad
  - Han överbetonar extremistpartier
  - Han förenklar debatterna genom att reducera allt till ekonomi
explanation: |
  I kapitlet klargörs att huvudproblemet med vänster-högeraxeln är att den inte kan klassificera klassiskt liberalt tänkande, som varken motsvarar
  varken vänsterns egalitarism eller högerns nationalism. Gestalter som Thomas Jefferson, Frédéric Bastiat eller rörelser som Bitcoin överskrider
  dessa traditionella kategorier. De andra alternativen är felaktiga, eftersom texten inte kritiserar centrism som sådan, inte fokuserar på extremism och tar upp
  många andra aspekter än ekonomi.
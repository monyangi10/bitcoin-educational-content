question: Dushingiye ku canditswe, ni ikihe kibazo nyamukuru kiri mu bijanye n’imirongo ya politike y’ububamfu n’iburyo?
answer: Nta kibanza bisiga ku vyiyumviro vya kera vy'ubwigenge .
wrong_answers:
  - Ikunda cane ivyicaro vy'abanyacentre n'abanyamahanga
  - Ashimika cane ku migambwe y’abanyaruyeri .
  - Yorosha impaka mu kugabanya vyose mu vy'ubutunzi .
explanation: |
  Ico gice kiratomora neza ko ingorane nyamukuru iri ku bijanye n’umurongo w’ibubamfu n’iburyo ari uko udashobora gushikiriza mu migwi ivyiyumviro vya kera vy’ubwigenge, ivyo bikaba bihuye n’ 
  nta n’uburinganire bw’abanyabubamfu canke ubunyagihugu bw’iburyo. Ibiharuro nka Thomas Jefferson, Frédéric Bastiat canke imigwi nka Bitcoin irarenga 
  ivyo vyiciro vy’imigenzo. Ayandi mahitamwo ntabwo ari meza, kuko ico canditswe kitanegura ubucentrisme nk’uko buri, ntikibanda ku vyo gushira hejuru, kandi kivyura . 
  imice myinshi uretse ubutunzi.
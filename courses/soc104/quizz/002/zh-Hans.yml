question: 根据课文内容，传统的左右政治光谱的主要问题是什么？
answer: 它没有给古典自由主义思想留下任何空间
wrong_answers:
  - 过于偏向中间派和温和派立场
  - 他过分强调极端主义政党
  - 他把一切都归结为经济问题，从而简化了辩论
explanation: |
  本章明确指出，左右轴线的主要问题在于它无法对古典自由主义思想进行分类，而古典自由主义思想既不属于左翼平等主义，也不属于右翼民族主义。
  既不符合左翼平等主义，也不符合右翼民族主义。托马斯-杰斐逊（Thomas Jefferson）、弗雷德里克-巴斯蒂亚特（Frédéric Bastiat）等人物或 "Bitcoin "运动都超越了这些传统范畴。
  这些传统范畴。其他选项都是错误的，因为文章并没有批评中间主义，也没有关注极端主义，而且还提到了经济学以外的许多方面。
  经济学以外的许多方面。
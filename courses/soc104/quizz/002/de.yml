question: Was ist dem Text zufolge das Hauptproblem des traditionellen politischen Spektrums von links nach rechts?
answer: Sie lässt keinen Raum für klassisches liberales Denken
wrong_answers:
  - Sie begünstigt zu sehr zentristische und gemäßigte Positionen
  - Er überbetont die extremistischen Parteien
  - Er vereinfacht Debatten, indem er alles auf die Wirtschaft reduziert
explanation: |
  Das Kapitel macht deutlich, dass das Hauptproblem der Links-Rechts-Achse darin besteht, dass sie das klassische liberale Denken nicht einordnen kann, das weder dem
  weder dem linken Egalitarismus noch dem rechten Nationalismus entspricht. Figuren wie Thomas Jefferson, Frédéric Bastiat oder Bewegungen wie Bitcoin überschreiten
  diese traditionellen Kategorien. Die anderen Optionen sind falsch, da der Text den Zentrismus als solchen nicht kritisiert, sich nicht auf den Extremismus konzentriert und
  viele andere Aspekte als die Wirtschaft.
question: Milline on teksti kohaselt traditsioonilise vasak-parempoolse poliitilise spektri peamine probleem?
answer: See ei jäta ruumi klassikalisele liberaalsele mõtlemisele
wrong_answers:
  - See soosib liiga palju tsentristlikke ja mõõdukaid seisukohti
  - Ta rõhutab liialt äärmuslikke parteisid
  - Ta lihtsustab arutelusid, taandades kõik majandusele
explanation: |
  Peatükis tehakse selgeks, et vasak-parempoolse telje peamine probleem seisneb selles, et sellega ei saa liigitada klassikalist liberaalset mõtlemist, mis vastab
  ei vasta ei vasakpoolsele egalitarismile ega parempoolsele natsionalismile. Sellised tegelased nagu Thomas Jefferson, Frédéric Bastiat või sellised liikumised nagu Bitcoin ületavad
  neid traditsioonilisi kategooriaid. Teised valikud on valed, sest tekst ei kritiseeri tsentrismi kui sellist, ei keskendu ekstremismile ja kutsub esile
  paljusid muid aspekte peale majanduse.
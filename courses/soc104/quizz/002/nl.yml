question: Wat is volgens de tekst het grootste probleem met het traditionele links-rechts politieke spectrum?
answer: Het laat geen ruimte voor klassiek liberaal denken
wrong_answers:
  - Het geeft te veel voorkeur aan centristische en gematigde standpunten
  - Hij legt te veel nadruk op extremistische partijen
  - Hij vereenvoudigt debatten door alles terug te brengen tot economie
explanation: |
  Het hoofdstuk maakt duidelijk dat het belangrijkste probleem met de links-rechts as is dat deze het klassiek liberale gedachtegoed niet kan classificeren
  noch links egalitarisme noch rechts nationalisme. Figuren als Thomas Jefferson, Frédéric Bastiat of bewegingen als Bitcoin overstijgen deze traditionele categorieën
  deze traditionele categorieën. De andere opties zijn onjuist, omdat de tekst het centrisme als zodanig niet bekritiseert, niet focust op extremisme en veel andere aspecten dan economie oproept
  veel andere aspecten dan economie.
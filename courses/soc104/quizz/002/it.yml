question: Secondo il testo, qual è il problema principale del tradizionale spettro politico destra-sinistra?
answer: Non lascia spazio al pensiero liberale classico
wrong_answers:
  - Favorisce eccessivamente le posizioni centriste e moderate
  - Dà eccessiva importanza ai partiti estremisti
  - Semplifica i dibattiti riducendo tutto all'economia
explanation: |
  Il capitolo chiarisce che il problema principale dell'asse sinistra-destra è che non può classificare il pensiero liberale classico, che non corrisponde né all'egualitarismo di sinistra né al nazionalismo di destra
  né all'egualitarismo di sinistra né al nazionalismo di destra. Figure come Thomas Jefferson, Frédéric Bastiat o movimenti come il Bitcoin trascendono
  queste categorie tradizionali. Le altre opzioni non sono corrette, poiché il testo non critica il centrismo in quanto tale, non si concentra sull'estremismo ed evoca molti aspetti diversi dall'economia
  molti aspetti diversi dall'economia.
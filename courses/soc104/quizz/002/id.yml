question: Menurut teks tersebut, apa masalah utama dari spektrum politik kiri-kanan tradisional?
answer: Tidak ada ruang untuk pemikiran liberal klasik
wrong_answers:
  - Terlalu mendukung posisi sentris dan moderat
  - Dia terlalu menekankan partai-partai ekstremis
  - Dia menyederhanakan perdebatan dengan mereduksi segala sesuatu menjadi ekonomi
explanation: |
  Bab ini menjelaskan bahwa masalah utama dengan poros kiri-kanan adalah bahwa ia tidak dapat mengklasifikasikan pemikiran liberal klasik, yang sesuai dengan
  egalitarianisme sayap kiri maupun nasionalisme sayap kanan. Tokoh-tokoh seperti Thomas Jefferson, Frédéric Bastiat atau gerakan-gerakan seperti Bitcoin melampaui
  melampaui kategori-kategori tradisional ini. Pilihan lainnya tidak tepat, karena teks tersebut tidak mengkritik sentrisme, tidak berfokus pada ekstremisme, dan membangkitkan
  banyak aspek selain ekonomi.

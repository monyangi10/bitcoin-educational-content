question: Selon le texte, quel est le principal problème du spectre politique gauche-droite traditionnel?
answer: Il ne laisse aucune place à la pensée libérale classique
wrong_answers:
  - Il favorise trop les positions centristes et modérées
  - Il donne une importance excessive aux partis extrémistes
  - "Il simplifie les débats en réduisant tout à l'économie"
explanation: |
  Le chapitre explique clairement que le problème principal de l'axe gauche-droite est qu'il ne peut pas classer la pensée libérale classique, qui ne correspond ni à l'égalitarisme de gauche ni au nationalisme de droite. Des figures comme Thomas Jefferson, Frédéric Bastiat ou des mouvements comme Bitcoin transcendent ces catégories traditionnelles. Les autres options sont incorrectes car le texte ne critique pas le centrisme en tant que tel, ne se concentre pas sur l'extrémisme, et évoque bien d'autres aspects que l'économie.

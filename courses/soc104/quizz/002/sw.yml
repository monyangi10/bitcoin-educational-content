question: Kulingana na maandishi, tatizo kuu la wigo wa kisiasa wa jadi wa kushoto-kulia ni lipi?
answer: Haiachi nafasi yoyote kwa mawazo ya kiliberali ya kitamaduni
wrong_answers:
  - Inapendelea nafasi za mrengo wa kati na wa wastani kupita kiasi
  - Anasisitiza kupita kiasi vyama vyenye msimamo mkali
  - Anarahisisha mijadala kwa kupunguza kila kitu kwenye uchumi
explanation: |
  Sura hiyo inaweka wazi kwamba tatizo kuu la mhimili wa kushoto-kulia ni kwamba haiwezi kuainisha mawazo ya kiliberali ya kitamaduni, ambayo yanalingana na usawa wa mrengo wa kushoto wala utaifa wa mrengo wa kulia. Watu kama Thomas Jefferson, Frédéric Bastiat au harakati kama Bitcoin hupita kategoria hizi za kitamaduni. Chaguzi zingine si sahihi, kwani maandishi hayakosoa ukatili kama hivyo, hayazingatii msimamo mkali, na yanaakisi vipengele vingi zaidi ya uchumi.
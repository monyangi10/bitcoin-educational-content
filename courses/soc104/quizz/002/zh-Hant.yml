question: 根據文中所述，傳統左右政治光譜的主要問題是什麼？
answer: 它沒有為古典自由主義思想留下任何空間
wrong_answers:
  - 它過於偏向中間派和溫和的立場
  - 他過度強調極端主義政黨
  - 他將辯論簡單化，將一切歸結為經濟學
explanation: |
  本章明確指出，左右軸心的主要問題在於它無法分類古典自由主義思想，而古典自由主義思想既不符合左翼平等主義，也不符合右翼民族主義。
  既不符合左翼的平等主義，也不符合右翼的民族主義。托馬斯‧傑佛遜 (Thomas Jefferson)、弗雷德里克‧巴斯蒂亞 (Frédéric Bastiat) 等人物或 Bitcoin 等運動都超越了這些傳統的分類。
  這些傳統類別。其他選項不正確，因為文中並沒有批判中間主義，也沒有聚焦於極端主義，而且喚起了經濟以外的許多方面。
  經濟以外的許多其他方面。
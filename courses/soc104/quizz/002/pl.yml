question: Jaki jest główny problem z tradycyjnym lewicowo-prawicowym spektrum politycznym?
answer: Nie pozostawia miejsca na klasyczne liberalne myślenie
wrong_answers:
  - Zbyt mocno faworyzuje pozycje centrowe i umiarkowane
  - Nadmiernie podkreśla partie ekstremistyczne
  - Upraszcza debaty, sprowadzając wszystko do ekonomii
explanation: |
  Rozdział ten wyjaśnia, że głównym problemem z osią lewica-prawica jest to, że nie może ona klasyfikować klasycznej myśli liberalnej, która nie odpowiada ani lewicowemu egalitaryzmowi, ani prawicowemu nacjonalizmowi

question: Според текста какъв е основният проблем на традиционния политически спектър ляво-дясно?
answer: Тя не оставя място за класическото либерално мислене
wrong_answers:
  - Тя твърде много предпочита центристките и умерените позиции
  - Прекалено набляга на екстремистките партии
  - Той опростява дебатите, като свежда всичко до икономиката
explanation: |
  В главата се изяснява, че основният проблем на оста ляво-дясно е, че тя не може да класифицира класическата либерална мисъл, която съответства на
  нито на левия егалитаризъм, нито на десния национализъм. Личности като Томас Джеферсън, Фредерик Бастиа или движения като Bitcoin надхвърлят
  тези традиционни категории. Другите варианти са неправилни, тъй като текстът не критикува центризма като такъв, не се фокусира върху екстремизма и предизвиква
  много аспекти, различни от икономиката.
question: De acordo com o texto, qual é o principal problema do espetro político tradicional esquerda-direita?
answer: Não deixa espaço para o pensamento liberal clássico
wrong_answers:
  - Favorece demasiado as posições centristas e moderadas
  - Dá demasiada importância aos partidos extremistas
  - Simplifica os debates reduzindo tudo à economia
explanation: |
  O capítulo esclarece que o principal problema do eixo esquerda-direita é o facto de não poder classificar o pensamento liberal clássico, que não corresponde nem ao igualitarismo de esquerda nem ao nacionalismo de direita
  que não corresponde nem ao igualitarismo de esquerda nem ao nacionalismo de direita. Figuras como Thomas Jefferson, Frédéric Bastiat ou movimentos como o Bitcoin transcendem
  estas categorias tradicionais. As outras opções estão incorrectas, pois o texto não critica o centrismo enquanto tal, não se centra no extremismo e evoca
  evoca muitos outros aspectos para além da economia.
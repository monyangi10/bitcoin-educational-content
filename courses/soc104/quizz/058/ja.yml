question: ケインズ経済理論によれば、経済における政府介入の主な役割は何か？
answer: 不況時には需要を刺激し、過熱時には冷やすことで、経済を安定させるために財政・金融政策を用いること。
wrong_answers:
  - 自由な市場メカニズムを完全に排除し、すべての経済部門を中央集権的な国家計画に置き換える。
  - 絶対的な自由放任主義を維持し、政府の干渉を一切受けずに市場の自主規制を認める。
  - あらゆる形態の公的セクターの関与を最小限に抑えながら、政府支出と課税の削減に専心する。
explanation: |
  ケインズ理論は、純粋な自由放任資本主義と完全な国家統制の両方を否定する中道的な「第三の道」アプローチを代表する。
  ケインズは、景気循環を管理するために、財政政策（歳出と課税）と金融政策（金利）を通じた政府の積極的介入を提唱した。このアプローチは、市場の自由と国家の指導のバランスを追求し、景気後退局面では総需要を刺激し、景気過熱局面では総需要を抑制するもので、中道主義的な実利的中庸の哲学を体現している。
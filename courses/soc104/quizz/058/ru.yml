question: Согласно кейнсианской экономической теории, какова основная роль государственного вмешательства в экономику?
answer: Использование фискальной и монетарной политики для стабилизации экономики путем стимулирования спроса во время рецессий и его охлаждения во время перегрева
wrong_answers:
  - Полностью ликвидировать механизмы свободного рынка и заменить их централизованным государственным планированием во всех секторах экономики
  - Поддерживать политику абсолютного laissez-faire и позволить рынкам саморегулироваться без какого-либо вмешательства со стороны государства
  - Сосредоточиться исключительно на сокращении государственных расходов и налогов при минимизации всех форм участия государственного сектора
explanation: |
  Кейнсианская теория представляет собой центристский подход "третьего пути", отвергающий как чистый капитализм laissez-faire, так и полный государственный контроль.
  Кейнс выступал за активное вмешательство государства через фискальную политику (расходы и налогообложение) и монетарную политику (процентные ставки) для управления экономическими циклами. Этот подход ищет баланс между рыночной свободой и государственным управлением, стимулируя совокупный спрос во время спадов и сдерживая его во время экономического перегрева, воплощая центристскую философию прагматической умеренности.
question: Prema Kejnzijanskoj ekonomskoj teoriji, primarna uloga vladine intervencije u ekonomiji je stabilizacija privrede kroz fiskalne i monetarne politike, posebno tokom perioda recesije ili ekonomske nestabilnosti.
answer: Da bi se koristile fiskalne i monetarne politike za stabilizaciju ekonomije stimulisanjem potražnje tokom recesija i njenim hlađenjem tokom pregrevanja
wrong_answers:
  - Da se potpuno eliminišu mehanizmi slobodnog tržišta i zamene centralizovanim državnim planiranjem za sve ekonomske sektore
  - Da se održavaju apsolutne laissez-faire politike i da se tržištima dozvoli da se samoregulišu bez ikakvog mešanja vlade
  - Da se fokusira isključivo na smanjenje državne potrošnje i oporezivanja, uz minimiziranje svih oblika učešća javnog sektora.
explanation: |
  Kejnzijanska teorija predstavlja centristički pristup 'trećeg puta' koji odbacuje i čisti laissez-faire kapitalizam i potpunu državnu kontrolu. Kejnz se zalagao za aktivnu intervenciju vlade kroz fiskalne politike (potrošnja i oporezivanje) i monetarne politike (kamatne stope) kako bi upravljao ekonomskim ciklusima. Ovaj pristup teži ravnoteži između slobode tržišta i državnog vođenja, stimulisanju agregatne tražnje tokom padova i njenom obuzdavanju tokom ekonomskog pregrevanja, oličavajući centrističku filozofiju pragmatične umjerenosti.
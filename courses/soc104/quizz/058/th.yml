question: ตามทฤษฎีเศรษฐศาสตร์เคนส์เซียน บทบาทหลักของการแทรกแซงของรัฐบาลในเศรษฐกิจคืออะไร?
answer: ใช้มาตรการการคลังและการเงินเพื่อรักษาเสถียรภาพของเศรษฐกิจโดยกระตุ้นอุปสงค์ในช่วงเศรษฐกิจถดถอยและทำให้เย็นลงในช่วงที่เศรษฐกิจร้อนเกินไป
wrong_answers:
  - เพื่อกำจัดกลไกตลาดเสรีอย่างสมบูรณ์และแทนที่ด้วยการวางแผนของรัฐที่มีศูนย์กลางสำหรับทุกภาคเศรษฐกิจ
  - เพื่อรักษานโยบายปล่อยเสรีอย่างสมบูรณ์และปล่อยให้ตลาดควบคุมตนเองโดยไม่มีการแทรกแซงจากรัฐบาลแต่อย่างใด
  - มุ่งเน้นเฉพาะการลดการใช้จ่ายของรัฐบาลและการเก็บภาษี ในขณะเดียวกันก็ลดการมีส่วนร่วมของภาครัฐในทุกรูปแบบให้เหลือน้อยที่สุด
explanation: |
  ทฤษฎีเคนส์เซียนแสดงถึงแนวทาง 'ทางสายกลาง' ที่ปฏิเสธทั้งทุนนิยมแบบปล่อยเสรีและการควบคุมโดยรัฐอย่างสมบูรณ์ เคนส์สนับสนุนการแทรกแซงของรัฐบาลอย่างแข็งขันผ่านนโยบายการคลัง (การใช้จ่ายและการเก็บภาษี) และนโยบายการเงิน (อัตราดอกเบี้ย) เพื่อจัดการกับวัฏจักรเศรษฐกิจ แนวทางนี้มุ่งหาความสมดุลระหว่างเสรีภาพของตลาดและการชี้นำของรัฐ โดยกระตุ้นอุปสงค์รวมในช่วงเศรษฐกิจตกต่ำและยับยั้งในช่วงเศรษฐกิจร้อนแรง ซึ่งเป็นการสะท้อนปรัชญาทางสายกลางของการประนีประนอมอย่างมีเหตุผล
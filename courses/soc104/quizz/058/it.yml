question: Secondo la teoria economica keynesiana, qual è il ruolo principale dell'intervento pubblico nell'economia?
answer: Utilizzare le politiche fiscali e monetarie per stabilizzare l'economia stimolando la domanda durante le recessioni e raffreddandola durante il surriscaldamento
wrong_answers:
  - Eliminare completamente i meccanismi del libero mercato e sostituirli con una pianificazione statale centralizzata per tutti i settori economici
  - Mantenere politiche di assoluto laissez-faire e permettere ai mercati di autoregolarsi senza alcuna interferenza governativa
  - Concentrarsi esclusivamente sulla riduzione della spesa pubblica e della tassazione, riducendo al minimo ogni forma di coinvolgimento del settore pubblico
explanation: |
  La teoria keynesiana rappresenta un approccio centrista alla "terza via" che rifiuta sia il puro capitalismo laissez-faire sia il completo controllo statale.
  Keynes sosteneva l'intervento attivo del governo attraverso politiche fiscali (spesa e tassazione) e monetarie (tassi di interesse) per gestire i cicli economici. Questo approccio cerca un equilibrio tra la libertà del mercato e la guida dello Stato, stimolando la domanda aggregata durante le flessioni e contenendola durante il surriscaldamento economico, incarnando la filosofia centrista della moderazione pragmatica.
question: Каква е основната роля на държавната намеса в икономиката според кейнсианската икономическа теория?
answer: Използване на фискалната и паричната политика за стабилизиране на икономиката чрез стимулиране на търсенето по време на рецесия и охлаждане по време на прегряване
wrong_answers:
  - Да се премахнат напълно механизмите на свободния пазар и да се заменят с централизирано държавно планиране във всички икономически сектори
  - Да се поддържат абсолютни политики на laissez-faire и да се позволи на пазарите да се саморегулират без каквато и да е държавна намеса
  - Да се съсредоточи изключително върху намаляване на държавните разходи и данъчното облагане, като същевременно сведе до минимум всички форми на участие на публичния сектор
explanation: |
  Кейнсианската теория представлява центристки "трети път", който отхвърля както чистия laissez-faire капитализъм, така и пълния държавен контрол.
  Кейнс се застъпва за активна държавна намеса чрез фискални политики (разходи и данъци) и парични политики (лихвени проценти) за управление на икономическите цикли. Този подход търси баланс между свободата на пазара и държавното ръководство, като стимулира съвкупното търсене по време на спадове и го ограничава по време на икономическо прегряване, въплъщавайки центристката философия на прагматичната умереност.
question: 根据凯恩斯主义经济理论，政府干预经济的主要作用是什么？
answer: 利用财政和货币政策，在经济衰退时刺激需求，在经济过热时冷却需求，从而稳定经济
wrong_answers:
  - 彻底消除自由市场机制，代之以对所有经济部门实行中央集权的国家计划
  - 坚持绝对的自由放任政策，让市场自我调节，不受任何政府干预
  - 将重点完全放在减少政府开支和税收上，同时尽量减少各种形式的公共部门参与
explanation: |
  凯恩斯理论代表了中间派的 "第三条道路"，既反对纯粹的自由放任资本主义，也反对完全的国家控制。
  凯恩斯主张政府通过财政政策（支出和税收）和货币政策（利率）进行积极干预，以管理经济周期。这种方法在市场自由和国家引导之间寻求平衡，在经济低迷时刺激总需求，在经济过热时抑制总需求，体现了中间派的务实节制哲学。
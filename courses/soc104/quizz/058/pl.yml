question: Jaka jest główna rola interwencji rządu w gospodarkę według keynesowskiej teorii ekonomicznej?
answer: Wykorzystanie polityki fiskalnej i monetarnej do stabilizacji gospodarki poprzez stymulowanie popytu podczas recesji i chłodzenie go podczas przegrzania
wrong_answers:
  - Całkowite wyeliminowanie mechanizmów wolnorynkowych i zastąpienie ich scentralizowanym planowaniem państwowym we wszystkich sektorach gospodarki
  - Utrzymanie polityki absolutnego leseferyzmu i umożliwienie rynkom samoregulacji bez jakiejkolwiek ingerencji ze strony rządu
  - Skupienie się wyłącznie na zmniejszeniu wydatków rządowych i opodatkowania przy jednoczesnym zminimalizowaniu wszelkich form zaangażowania sektora publicznego
explanation: |
  Teoria keynesowska reprezentuje centrowe podejście "trzeciej drogi", które odrzuca zarówno czysty leseferystyczny kapitalizm, jak i pełną kontrolę państwa.
  Keynes opowiadał się za aktywną interwencją rządu poprzez politykę fiskalną (wydatki i podatki) oraz monetarną (stopy procentowe) w celu zarządzania cyklami gospodarczymi. Podejście to dąży do równowagi między wolnością rynku a kontrolą państwa, stymulując zagregowany popyt w okresach spowolnienia gospodarczego i ograniczając go podczas przegrzania gospodarczego, ucieleśniając centrystyczną filozofię pragmatycznego umiaru.
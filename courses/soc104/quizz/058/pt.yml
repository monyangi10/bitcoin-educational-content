question: De acordo com a teoria económica keynesiana, qual é o principal papel da intervenção do Estado na economia?
answer: Utilizar as políticas orçamentais e monetárias para estabilizar a economia, estimulando a procura durante as recessões e arrefecendo-a durante o sobreaquecimento
wrong_answers:
  - Eliminar completamente os mecanismos de mercado livre e substituí-los por um planeamento estatal centralizado para todos os sectores económicos
  - Manter políticas de laissez-faire absoluto e permitir que os mercados se auto-regulem sem qualquer interferência governamental
  - Concentrar-se exclusivamente na redução das despesas públicas e da tributação, minimizando todas as formas de envolvimento do sector público
explanation: |
  A teoria keynesiana representa uma abordagem centrista de "terceira via" que rejeita tanto o capitalismo laissez-faire puro como o controlo total do Estado.
  Keynes defendeu a intervenção ativa do Estado através de políticas fiscais (despesas e impostos) e monetárias (taxas de juro) para gerir os ciclos económicos. Esta abordagem procura um equilíbrio entre a liberdade do mercado e a orientação do Estado, estimulando a procura agregada durante as recessões e restringindo-a durante o sobreaquecimento económico, incorporando a filosofia centrista da moderação pragmática.
question: Dushingiye ku ciyumviro c’ubutunzi ca Keynes, ni uruhara uruhe rwa mbere Leta igira mu bijanye n’ubutunzi?
answer: Gukoresha politike y’ubutunzi n’iy’amahera kugira ngo ubutunzi buhagaze neza mu gutuma abantu basaba mu gihe c’ugusubira inyuma kw’ubutunzi no kubukonjesha mu gihe c’ugushuha cane .
wrong_answers:
  - Gukuraho burundu uburyo bw'isoko ry'uburenganzira no kubusubirira n'igenamigambi rya Leta ry'inzego zose z'ubutunzi .
  - Kubungabunga politike y’uburenganzira bwo gukora vyose no kwemera ko amasoko yigenzura ata n’umwe Leta yivangamwo
  - Kwibanda gusa ku kugabanya amafaranga Leta ikoresha n’imisoro mu gihe hagabanywa uburyo bwose bwo kwitabira urwego rwa Leta .
explanation: |
  Ivyiyumviro vya Keynes bigereranya uburyo bw’‘inzira ya gatatu’ y’abanyacentre bwanka ubukapitaliste butagira agasembwa n’ubugenzuzi bwa Leta bushitse. 
  Keynes yasavye ko Leta yogira ico ikoze biciye mu ngingo ngenderwako z’ivy’ubutunzi (ugukoresha amahera n’imisoro) no mu vy’amahera (inyungu) kugira ngo ishobore gucunga inzinguzingu z’ubutunzi. Ubwo buryo burarondera uburinganire hagati y’umwidegemvyo w’isoko n’ubuyobozi bwa Leta, bugatuma habaho ivyipfuzo vyose mu gihe c’ugusubira inyuma kw’ubutunzi no kubibuza mu gihe c’ugushuha cane kw’ubutunzi, bugashiramwo filozofiya y’abanyapolitike bo hagati y’uburinganire bushingiye ku bikorwa.
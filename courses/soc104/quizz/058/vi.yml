question: Theo lý thuyết kinh tế Keynes, vai trò chính của sự can thiệp của chính phủ vào nền kinh tế là gì?
answer: Sử dụng các chính sách tài khóa và tiền tệ để ổn định nền kinh tế bằng cách kích thích nhu cầu trong thời kỳ suy thoái và hạ nhiệt nhu cầu trong thời kỳ kinh tế quá nóng.
wrong_answers:
  - Loại bỏ hoàn toàn các cơ chế thị trường tự do và thay thế chúng bằng kế hoạch hóa tập trung của nhà nước đối với tất cả các lĩnh vực kinh tế.
  - Duy trì chính sách tự do tuyệt đối và cho phép thị trường tự điều chỉnh mà không có bất kỳ sự can thiệp nào của chính phủ.
  - Tập trung hoàn toàn vào việc giảm chi tiêu và thuế của chính phủ, đồng thời giảm thiểu mọi hình thức can thiệp của khu vực công.
explanation: |
  Lý thuyết Keynes đại diện cho một cách tiếp cận "con đường thứ ba" trung dung, bác bỏ cả chủ nghĩa tư bản tự do thuần túy và sự kiểm soát hoàn toàn của nhà nước.
  Keynes chủ trương sự can thiệp tích cực của chính phủ thông qua các chính sách tài khóa (chi tiêu và thuế) và chính sách tiền tệ (lãi suất) để quản lý các chu kỳ kinh tế. Cách tiếp cận này tìm kiếm sự cân bằng giữa tự do thị trường và sự hướng dẫn của nhà nước, kích thích tổng cầu trong thời kỳ suy thoái và kiềm chế nó trong thời kỳ kinh tế quá nóng, thể hiện triết lý trung dung về sự điều độ thực dụng.
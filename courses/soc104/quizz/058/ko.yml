question: 케인즈주의 경제 이론에 따르면, 경제에서 정부 개입의 주요 역할은 무엇인가요?
answer: 재정 및 통화 정책을 사용하여 경기 침체기에는 수요를 촉진하고 과열기에는 경기를 냉각하여 경제를 안정화합니다
wrong_answers:
  - 자유 시장 메커니즘을 완전히 제거하고 모든 경제 부문에 대한 중앙 집중식 국가 계획으로 대체하기 위해
  - 절대적인 자유방임 정책을 유지하고 정부의 간섭 없이 시장이 자율적으로 규제할 수 있도록 합니다
  - 모든 형태의 공공 부문 개입을 최소화하면서 정부 지출과 세금을 줄이는 데에만 집중합니다
explanation: |
  케인즈 이론은 순수한 자유방임 자본주의와 완전한 국가 통제를 모두 거부하는 중도주의적 '제3의 길' 접근법을 대표합니다.
  케인즈는 경기 순환을 관리하기 위해 재정 정책(지출 및 과세)과 통화 정책(금리)을 통한 정부의 적극적인 개입을 주장했습니다. 이러한 접근 방식은 시장의 자유와 국가의 지도 사이의 균형을 추구하며 경기 침체기에는 총수요를 자극하고 경기 과열기에는 이를 억제하여 실용적 중용의 중도주의 철학을 구현합니다.
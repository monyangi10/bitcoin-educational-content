question: Wat is volgens de Keynesiaanse economische theorie de belangrijkste rol van overheidsinterventie in de economie?
answer: Fiscaal en monetair beleid gebruiken om de economie te stabiliseren door de vraag te stimuleren tijdens recessies en af te koelen tijdens oververhitting
wrong_answers:
  - Om vrije marktmechanismen volledig te elimineren en te vervangen door gecentraliseerde staatsplanning voor alle economische sectoren
  - Een absoluut laissez-faire beleid handhaven en markten zichzelf laten reguleren zonder enige overheidsbemoeienis
  - Uitsluitend focussen op het verminderen van overheidsuitgaven en belastingen en tegelijkertijd alle vormen van betrokkenheid van de publieke sector minimaliseren
explanation: |
  De Keynesiaanse theorie vertegenwoordigt een centristische 'derde weg' benadering die zowel puur laissez-faire kapitalisme als volledige staatscontrole verwerpt.
  Keynes pleitte voor actieve overheidsinterventie door middel van fiscaal beleid (uitgaven en belastingen) en monetair beleid (rentetarieven) om economische cycli te beheersen. Deze benadering zoekt naar een evenwicht tussen marktvrijheid en sturing door de staat, waarbij de totale vraag wordt gestimuleerd in tijden van laagconjunctuur en afgeremd in tijden van economische oververhitting, en belichaamt de centristische filosofie van pragmatische matiging.
question: Hva er, ifølge keynesiansk økonomisk teori, den primære rollen til statlige inngrep i økonomien?
answer: Å bruke finans- og pengepolitikken til å stabilisere økonomien ved å stimulere etterspørselen i nedgangstider og kjøle den ned i overopphetingsperioder
wrong_answers:
  - Å fullstendig eliminere frie markedsmekanismer og erstatte dem med sentralisert statlig planlegging for alle økonomiske sektorer
  - Å opprettholde en absolutt laissez-faire-politikk og la markedene regulere seg selv uten noen som helst statlig innblanding
  - Å fokusere utelukkende på å redusere offentlige utgifter og skatter, og samtidig minimere alle former for involvering av offentlig sektor
explanation: |
  Keynesiansk teori representerer en sentrumsorientert "tredje vei" som avviser både ren laissez-faire-kapitalisme og fullstendig statlig kontroll.
  Keynes tok til orde for aktiv statlig inngripen gjennom finanspolitikk (utgifter og beskatning) og pengepolitikk (renter) for å styre økonomiske sykluser. Denne tilnærmingen søker balanse mellom markedsfrihet og statlig styring, stimulerer den samlede etterspørselen i nedgangstider og holder den tilbake i oppgangstider, og er et uttrykk for den sentrumsorienterte filosofien om pragmatisk moderasjon.
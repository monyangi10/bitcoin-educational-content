question: Enligt keynesiansk ekonomisk teori, vilken är den primära rollen för statliga ingripanden i ekonomin?
answer: Att använda finans- och penningpolitiken för att stabilisera ekonomin genom att stimulera efterfrågan under lågkonjunkturer och dämpa den under överhettning
wrong_answers:
  - Att helt eliminera fria marknadsmekanismer och ersätta dem med centraliserad statlig planering för alla ekonomiska sektorer
  - Att upprätthålla en absolut laissez-faire-politik och låta marknaderna reglera sig själva utan någon som helst statlig inblandning
  - Att uteslutande fokusera på att minska statens utgifter och skatter och samtidigt minimera alla former av engagemang från den offentliga sektorn
explanation: |
  Den keynesianska teorin representerar en centristisk "tredje väg" som förkastar både ren laissez-faire-kapitalism och fullständig statlig kontroll.
  Keynes förespråkade ett aktivt statligt ingripande genom finanspolitik (utgifter och skatter) och penningpolitik (räntor) för att hantera ekonomiska cykler. Detta synsätt söker balans mellan marknadsfrihet och statlig styrning, stimulerar den samlade efterfrågan under nedgångar och begränsar den under ekonomisk överhettning, vilket förkroppsligar den centristiska filosofin om pragmatisk måttfullhet.
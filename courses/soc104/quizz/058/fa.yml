question: بر اساس نظریه اقتصادی کینزی، نقش اصلی مداخله دولت در اقتصاد چیست؟
answer: استفاده از سیاست‌های مالی و پولی برای تثبیت اقتصاد با تحریک تقاضا در دوران رکود و کاهش آن در زمان گرمای بیش از حد
wrong_answers:
  - برای حذف کامل مکانیسم‌های بازار آزاد و جایگزینی آن‌ها با برنامه‌ریزی متمرکز دولتی برای همه بخش‌های اقتصادی
  - برای حفظ سیاست‌های کاملاً لسه‌فر و اجازه دادن به بازارها برای خودتنظیمی بدون هیچ‌گونه دخالت دولتی
  - برای تمرکز انحصاری بر کاهش هزینه‌های دولتی و مالیات‌ها در حالی که تمامی اشکال دخالت بخش عمومی را به حداقل می‌رساند.
explanation: |
  نظریه کینزی نمایانگر رویکرد میانه‌روی «راه سوم» است که هم سرمایه‌داری لسه‌فر محض و هم کنترل کامل دولتی را رد می‌کند. کینز از مداخله فعال دولت از طریق سیاست‌های مالی (هزینه‌ها و مالیات‌ها) و سیاست‌های پولی (نرخ بهره) برای مدیریت چرخه‌های اقتصادی حمایت می‌کرد. این رویکرد به دنبال تعادل بین آزادی بازار و هدایت دولت است، با تحریک تقاضای کل در دوران رکود و مهار آن در زمان داغ شدن اقتصادی، که فلسفه میانه‌روی عمل‌گرایانه را تجسم می‌بخشد.
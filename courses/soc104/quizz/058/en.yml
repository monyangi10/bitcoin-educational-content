question: According to Keynesian economic theory, what is the primary role of government intervention in the economy?
answer: To use fiscal and monetary policies to stabilize the economy by stimulating demand during recessions and cooling it during overheating
wrong_answers:
  - To completely eliminate free market mechanisms and replace them with centralized state planning for all economic sectors
  - To maintain absolute laissez-faire policies and allow markets to self-regulate without any government interference whatsoever
  - To focus exclusively on reducing government spending and taxation while minimizing all forms of public sector involvement
explanation: |
  Keynesian theory represents a centrist 'third way' approach that rejects both pure laissez-faire capitalism and complete state control. 
  Keynes advocated for active government intervention through fiscal policies (spending and taxation) and monetary policies (interest rates) to manage economic cycles. This approach seeks balance between market freedom and state guidance, stimulating aggregate demand during downturns and restraining it during economic overheating, embodying the centrist philosophy of pragmatic moderation.

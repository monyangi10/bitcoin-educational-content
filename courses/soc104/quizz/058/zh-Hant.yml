question: 根據凱恩斯經濟理論，政府干預經濟的主要角色是什麼？
answer: 運用財政與貨幣政策來穩定經濟，在經濟衰退時刺激需求，在過熱時冷卻需求
wrong_answers:
  - 徹底廢除自由市場機制，取而代之的是所有經濟領域的中央集权國家規劃
  - 維持絕對的自由放任政策，讓市場自我調節，不受任何政府干預
  - 專注於減少政府支出和稅收，同時盡量減少各種形式的公營部門參與
explanation: |
  凱恩斯理論代表了中間派的「第三條道路」，既拒絕純粹的自由放任資本主義，也拒絕完全的國家控制。
  凱恩斯主張政府透過財政政策 (支出與稅收) 與貨幣政策 (利率) 進行積極的干預，以管理經濟週期。這種方法在市場自由和國家指導之間尋求平衡，在經濟低迷時刺激總需求，在經濟過熱時抑制總需求，體現了實事求是的中間派哲學。
question: Kulingana na nadharia ya kiuchumi ya Keynes, jukumu kuu la serikali kuingilia kati katika uchumi ni lipi?
answer: Kutumia sera za fedha na fedha ili kuimarisha uchumi kwa kuchochea mahitaji wakati wa mdororo wa uchumi na kupoza uchumi wakati wa ongezeko la joto
wrong_answers:
  - Kuondoa kabisa mifumo ya soko huria na kuibadilisha na mipango ya serikali kuu kwa sekta zote za kiuchumi
  - Kudumisha sera kamili za uhuru na kuruhusu masoko kujidhibiti bila kuingiliwa na serikali yoyote.
  - Kuzingatia pekee kupunguza matumizi ya serikali na kodi huku ikipunguza aina zote za ushiriki wa sekta ya umma
explanation: |
  Nadharia ya Keynes inawakilisha mbinu ya 'njia ya tatu' ya mrengo wa kati ambayo inakataa ubepari safi wa laissez-faire na udhibiti kamili wa serikali.
  
  Keynes alitetea uingiliaji kati wa serikali kupitia sera za kifedha (matumizi na ushuru) na sera za fedha (viwango vya riba) ili kudhibiti mizunguko ya kiuchumi. Mbinu hii inatafuta usawa kati ya uhuru wa soko na mwongozo wa serikali, ikichochea mahitaji ya jumla wakati wa kushuka kwa uchumi na kuizuia wakati wa kuongezeka kwa joto la uchumi, ikijumuisha falsafa ya mrengo wa kati ya udhibiti wa vitendo.

question: Menurut teori ekonomi Keynesian, apa peran utama intervensi pemerintah dalam perekonomian?
answer: Menggunakan kebijakan fiskal dan moneter untuk menstabilkan ekonomi dengan merangsang permintaan selama resesi dan mendinginkannya saat terjadi overheating
wrong_answers:
  - Menghilangkan sama sekali mekanisme pasar bebas dan menggantinya dengan perencanaan negara yang terpusat untuk semua sektor ekonomi
  - Mempertahankan kebijakan laissez-faire absolut dan membiarkan pasar mengatur dirinya sendiri tanpa campur tangan pemerintah
  - Untuk fokus secara eksklusif pada pengurangan pengeluaran pemerintah dan perpajakan sambil meminimalkan segala bentuk keterlibatan sektor publik
explanation: |
  Teori Keynesian mewakili pendekatan 'jalan ketiga' sentris yang menolak kapitalisme laissez-faire murni dan kontrol penuh oleh negara.
  Keynes menganjurkan intervensi aktif pemerintah melalui kebijakan fiskal (pengeluaran dan perpajakan) dan kebijakan moneter (suku bunga) untuk mengelola siklus ekonomi. Pendekatan ini mencari keseimbangan antara kebebasan pasar dan panduan negara, menstimulasi permintaan agregat selama penurunan dan menahannya selama ekonomi terlalu panas, mewujudkan filosofi sentris moderasi pragmatis.
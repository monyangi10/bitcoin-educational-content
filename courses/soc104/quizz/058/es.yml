question: Según la teoría económica keynesiana, ¿cuál es el papel principal de la intervención gubernamental en la economía?
answer: Utilizar las políticas fiscal y monetaria para estabilizar la economía estimulando la demanda durante las recesiones y enfriándola durante el recalentamiento
wrong_answers:
  - Eliminar por completo los mecanismos de libre mercado y sustituirlos por una planificación estatal centralizada de todos los sectores económicos
  - Mantener políticas de laissez-faire absoluto y permitir que los mercados se autorregulen sin interferencia gubernamental alguna
  - Centrarse exclusivamente en reducir el gasto público y los impuestos, minimizando al mismo tiempo todas las formas de participación del sector público
explanation: |
  La teoría keynesiana representa un enfoque centrista de "tercera vía" que rechaza tanto el capitalismo de laissez-faire puro como el control estatal total.
  Keynes aboga por la intervención activa del Estado a través de políticas fiscales (gasto e impuestos) y monetarias (tipos de interés) para gestionar los ciclos económicos. Este enfoque busca el equilibrio entre la libertad de mercado y la orientación estatal, estimulando la demanda agregada durante las recesiones y conteniéndola durante el recalentamiento económico, encarnando la filosofía centrista de la moderación pragmática.
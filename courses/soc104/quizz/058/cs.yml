question: Jaká je podle keynesiánské ekonomické teorie hlavní úloha vládních zásahů do ekonomiky?
answer: Využití fiskální a měnové politiky ke stabilizaci ekonomiky prostřednictvím stimulace poptávky v době recese a jejího ochlazování v době přehřátí
wrong_answers:
  - Zcela odstranit mechanismy volného trhu a nahradit je centralizovaným státním plánováním ve všech hospodářských odvětvích
  - Zachovat absolutní politiku laissez-faire a umožnit trhům samoregulaci bez jakýchkoli zásahů státu
  - Zaměřit se výhradně na snižování vládních výdajů a daní a zároveň minimalizovat všechny formy zapojení veřejného sektoru
explanation: |
  Keynesiánská teorie představuje centristický přístup "třetí cesty", který odmítá jak čistý laissez-faire kapitalismus, tak úplnou státní kontrolu.
  Keynes obhajoval aktivní zásahy státu prostřednictvím fiskální politiky (výdaje a daně) a měnové politiky (úrokové sazby) k řízení hospodářských cyklů. Tento přístup hledá rovnováhu mezi svobodou trhu a státním řízením, stimuluje agregátní poptávku v době poklesu a omezuje ji v době přehřátí ekonomiky a ztělesňuje centristickou filozofii pragmatické umírněnosti.
question: कीन्सियन आर्थिक सिद्धांत के अनुसार, अर्थव्यवस्था में सरकारी हस्तक्षेप की प्राथमिक भूमिका क्या है?
answer: राजकोषीय और मौद्रिक नीतियों का उपयोग करके मंदी के दौरान मांग को प्रोत्साहित करके और अतिवृद्धि के दौरान इसे कम करके अर्थव्यवस्था को स्थिर करना।
wrong_answers:
  - मुक्त बाजार व्यवस्थाओं को पूरी तरह समाप्त करना और उनकी जगह सभी आर्थिक क्षेत्रों के लिए केंद्रीकृत राज्य नियोजन लागू करना।
  - पूर्णतः मुक्त बाजार नीतियों को बनाए रखना और बाजारों को बिना किसी सरकारी हस्तक्षेप के स्व-नियमन की अनुमति देना।
  - सरकारी खर्च और कराधान को कम करने पर विशेष ध्यान केंद्रित करना और सार्वजनिक क्षेत्र की भागीदारी के सभी रूपों को न्यूनतम करना।
explanation: |
  कीन्स का सिद्धांत एक मध्यमार्गी 'तीसरा मार्ग' दृष्टिकोण प्रस्तुत करता है जो पूर्ण मुक्त बाज़ार पूंजीवाद और पूर्ण राज्य नियंत्रण दोनों को अस्वीकार करता है।
  कीन्स ने आर्थिक चक्रों को नियंत्रित करने के लिए राजकोषीय नीतियों (खर्च और कराधान) और मौद्रिक नीतियों (ब्याज दरें) के माध्यम से सक्रिय सरकारी हस्तक्षेप की वकालत की। यह दृष्टिकोण बाज़ार की स्वतंत्रता और राज्य के मार्गदर्शन के बीच संतुलन स्थापित करने का प्रयास करता है, मंदी के दौरान कुल मांग को प्रोत्साहित करता है और आर्थिक अतिवृद्धि के दौरान इसे नियंत्रित करता है, जो व्यावहारिक संयम के मध्यमार्गी दर्शन का प्रतीक है।
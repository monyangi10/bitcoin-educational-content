question: Keynesyen ekonomi teorisine göre, devletin ekonomiye müdahalesinin birincil rolü nedir?
answer: Durgunluk dönemlerinde talebi canlandırarak ve aşırı ısınma dönemlerinde talebi soğutarak ekonomiyi istikrara kavuşturmak için mali ve parasal politikaları kullanmak
wrong_answers:
  - Serbest piyasa mekanizmalarını tamamen ortadan kaldırmak ve bunların yerine tüm ekonomik sektörler için merkezi devlet planlamasını getirmek
  - Mutlak laissez-faire politikalarını sürdürmek ve piyasaların herhangi bir hükümet müdahalesi olmaksızın kendi kendini düzenlemesine izin vermek
  - Kamu sektörünün her türlü müdahalesini en aza indirirken yalnızca devlet harcamalarını ve vergilendirmeyi azaltmaya odaklanmak
explanation: |
  Keynesyen teori, hem saf laissez-faire kapitalizmini hem de tam devlet kontrolünü reddeden merkezci bir 'üçüncü yol' yaklaşımını temsil eder.
  Keynes, ekonomik döngüleri yönetmek için mali politikalar (harcama ve vergilendirme) ve para politikaları (faiz oranları) yoluyla aktif devlet müdahalesini savunmuştur. Bu yaklaşım, piyasa özgürlüğü ile devlet rehberliği arasında bir denge arayışında olup, gerileme dönemlerinde toplam talebi teşvik ederken, ekonominin aşırı ısındığı dönemlerde talebi dizginlemekte ve pragmatik ılımlılığın merkezci felsefesini somutlaştırmaktadır.
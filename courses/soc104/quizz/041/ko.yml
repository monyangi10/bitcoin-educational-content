question: 하이에크의 분석에 따르면, 사회주의 경제 정책과 자유주의 경제 정책을 구분하는 근본적인 접근 방식은 무엇입니까?
answer: 구성주의 - 국가가 자발적인 질서를 허용하기보다는 적극적으로 사회를 구성하고 형성해야 한다는 믿음
wrong_answers:
  - 재분배주의 - 누진적 과세와 사회 프로그램을 통한 부의 재분배에 중점을 둡니다
  - 집단주의 - 개인의 재산권보다 생산 수단에 대한 집단적 소유권을 우선시하는 것
  - 개입주의 - 인식된 실패를 바로잡기 위해 정부가 시장에 직접 개입하는 관행
explanation: |
  하이에크는 사회주의적 '구성주의'와 자유주의적 '자발적 질서'를 구체적으로 대조합니다 구성주의는 국가가 의도적으로 사회 구조를 설계하고 구성해야 한다는 사회주의적 신념을 말합니다
  의도적으로 사회 구조를 설계하고 구성해야 한다는 사회주의적 신념을 말하며, 자유주의자들은 사회가 자연적으로 조직화된다고 믿습니다. 재분배주의, 집단주의, 개입주의는 실제로 사회주의적 특징이지만, 하이에크의 특별한 비판은 사회 질서가 국가에 의해 의식적으로 설계되어야 하는지 아니면 개인의 상호작용에서 유기적으로 생겨나야 하는지에 대한 근본적인 철학적 차이에 초점을 맞추고 있습니다.
question: Согласно анализу Хайека, какой фундаментальный подход отличает социалистическую экономическую политику от либеральной экономической политики?
answer: Конструктивизм - убеждение, что государство должно активно конструировать и формировать общество, а не допускать спонтанного порядка
wrong_answers:
  - Редистрибуционизм - акцент на перераспределении богатства через прогрессивное налогообложение и социальные программы
  - Коллективизм - приоритет коллективной собственности на средства производства над индивидуальными правами собственности
  - Интервенционизм - практика прямого вмешательства государства в работу рынков для исправления предполагаемых провалов
explanation: |
  Хайек специально противопоставляет социалистический "конструктивизм" и либеральный "спонтанный порядок" Конструктивизм относится к социалистической вере в то, что государство
  должно сознательно проектировать и конструировать структуру общества, в то время как либералы считают, что общество организуется само собой. Хотя перераспределение, коллективизм и интервенционизм действительно являются характерными чертами социализма, особая критика Хайека сосредоточена на этом фундаментальном философском различии в том, должен ли социальный порядок быть сознательно спроектирован государством или органически возникать из индивидуальных взаимодействий.
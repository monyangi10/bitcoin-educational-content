question: 根据哈耶克的分析，社会主义经济政策区别于自由主义经济政策的根本方法是什么？
answer: 建构主义--认为国家应积极建构和塑造社会，而不是允许社会自发形成秩序
wrong_answers:
  - 再分配主义--注重通过累进税和社会计划进行财富再分配
  - 集体主义--生产资料的集体所有权优先于个人财产权
  - 干预主义--政府直接干预市场以纠正预期失灵的做法
explanation: |
  哈耶克特别将社会主义的 "建构主义 "与自由主义的 "自发秩序 "进行了对比。建构主义指的是社会主义者认为国家
  建构主义是指社会主义者认为国家应有意设计和建构社会结构，而自由主义者则认为社会是自然组织起来的。虽然再分配主义、集体主义和干预主义确实是社会主义的特征，但哈耶克的具体批判集中在这一根本的哲学分歧上，即社会秩序应该由国家有意识地设计，还是从个人互动中有机地产生。
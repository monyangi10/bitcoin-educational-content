question: Theo phân tích của Hayek, phương pháp cơ bản nào phân biệt chính sách kinh tế xã hội chủ nghĩa với chính sách kinh tế tự do?
answer: Chủ nghĩa kiến tạo - niềm tin rằng nhà nước nên chủ động xây dựng và định hình xã hội thay vì để cho trật tự tự phát diễn ra.
wrong_answers:
  - Chủ nghĩa phân phối lại - tập trung vào việc phân phối lại của cải thông qua thuế lũy tiến và các chương trình xã hội.
  - Chủ nghĩa tập thể - ưu tiên quyền sở hữu tập thể các phương tiện sản xuất hơn quyền sở hữu cá nhân.
  - Chủ nghĩa can thiệp - thực tiễn can thiệp trực tiếp của chính phủ vào thị trường để khắc phục những thất bại được nhận thấy.
explanation: |
  Hayek đặc biệt đối lập chủ nghĩa kiến tạo xã hội chủ nghĩa với trật tự tự phát của chủ nghĩa tự do. Chủ nghĩa kiến tạo đề cập đến niềm tin của chủ nghĩa xã hội rằng nhà nước nên chủ động thiết kế và xây dựng cấu trúc xã hội, trong khi những người theo chủ nghĩa tự do tin rằng xã hội tự tổ chức một cách tự nhiên. Mặc dù chủ nghĩa phân phối lại, chủ nghĩa tập thể và chủ nghĩa can thiệp quả thực là những đặc điểm của chủ nghĩa xã hội, nhưng sự phê phán cụ thể của Hayek tập trung vào sự khác biệt triết học cơ bản này về việc liệu trật tự xã hội nên được nhà nước chủ động thiết kế hay hình thành một cách tự nhiên từ các tương tác cá nhân.
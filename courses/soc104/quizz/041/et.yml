question: Milline põhimõtteline lähenemine eristab Hayeki analüüsi kohaselt sotsialistlikku majanduspoliitikat liberaalsest majanduspoliitikast?
answer: Konstruktivism - uskumus, et riik peaks aktiivselt konstrueerima ja kujundama ühiskonda, selle asemel, et lubada spontaanset korda
wrong_answers:
  - Ümberjagamine - keskendumine jõukuse ümberjaotamisele progressiivse maksustamise ja sotsiaalprogrammide kaudu
  - Kollektivism - tootmisvahendite kollektiivse omandiõiguse eelistamine individuaalsele omandiõigusele
  - Interventiivsus - valitsuse otsese sekkumise praktika turgudele, et parandada tajutud tõrkeid
explanation: |
  Hayek vastandab konkreetselt sotsialistliku "konstruktivismi" liberaalsele "spontaansele korrale" Konstruktivism viitab sotsialistlikule veendumusele, et riik
  peaks teadlikult kujundama ja konstrueerima ühiskonna struktuuri, samas kui liberaalid usuvad, et ühiskond organiseerub iseenesest. Kuigi ümberjagamine, kollektivism ja interventsionism on tõepoolest sotsialistlikud omadused, keskendub Hayeki konkreetne kriitika sellele põhimõttelisele filosoofilisele erinevusele selles, kas ühiskondlik kord peaks olema riigi poolt teadlikult kujundatud või tekkima orgaaniliselt üksikisikute omavahelisest suhtlusest.
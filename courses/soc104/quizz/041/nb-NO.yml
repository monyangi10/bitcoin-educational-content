question: Hvilken grunnleggende tilnærming skiller sosialistisk økonomisk politikk fra liberal økonomisk politikk, ifølge Hayeks analyse?
answer: Konstruktivisme - troen på at staten aktivt bør konstruere og forme samfunnet i stedet for å tillate spontan orden
wrong_answers:
  - Omfordeling - fokus på omfordeling av rikdom gjennom progressiv beskatning og sosiale programmer
  - Kollektivisme - prioritering av kollektivt eierskap til produksjonsmidler fremfor individuell eiendomsrett
  - Intervensjonisme - direkte statlig inngripen i markeder for å rette opp det man oppfatter som markedssvikt
explanation: |
  Hayek setter sosialistisk "konstruktivisme" opp mot liberal "spontan orden" Konstruktivisme refererer til den sosialistiske troen på at staten
  staten bevisst skal utforme og konstruere samfunnets struktur, mens liberalere mener at samfunnet organiserer seg selv naturlig. Selv om omfordeling, kollektivisme og intervensjonisme faktisk er sosialistiske kjennetegn, fokuserer Hayeks kritikk på denne grunnleggende filosofiske forskjellen, som handler om hvorvidt samfunnsordenen bør utformes bevisst av staten eller vokse frem organisk fra individuelle interaksjoner.
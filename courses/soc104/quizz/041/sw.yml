question: Kulingana na uchambuzi wa Hayek, ni mbinu gani ya msingi inayotofautisha sera ya kiuchumi ya ujamaa na sera ya kiuchumi huria?
answer: Ujenzi - imani kwamba serikali inapaswa kujenga na kuunda jamii kikamilifu badala ya kuruhusu utaratibu wa hiari
wrong_answers:
  - Ugawaji Upya - mkazo katika ugawaji upya wa utajiri kupitia kodi zinazoendelea na programu za kijamii
  - Ujumuishi - kipaumbele cha umiliki wa pamoja wa njia za uzalishaji kuliko haki za mali za mtu binafsi
  - Uingiliaji kati - utaratibu wa serikali kuingilia kati moja kwa moja katika masoko ili kurekebisha mapungufu yanayoonekana
explanation: |
  Hayek anatofautisha haswa 'ujenzi' wa kijamaa na 'utaratibu wa hiari' wa kiliberali. Ujenzi unarejelea imani ya kijamaa kwamba serikali inapaswa kubuni na kujenga muundo wa jamii kwa makusudi, huku waliberali wakiamini jamii hujipanga kiasili. Ingawa ugawaji upya, ujumuiya, na uingiliaji kati kwa kweli ni sifa za kijamaa, ukosoaji maalum wa Hayek unazingatia tofauti hii ya msingi ya kifalsafa kuhusu kama utaratibu wa kijamii unapaswa kubuniwa kimakusudi na serikali au kutokea kikaboni kutokana na mwingiliano wa mtu binafsi.
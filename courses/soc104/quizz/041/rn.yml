question: Dushingiye ku nseguro ya Hayek, ni ubuhe buryo bw’ishimikiro butandukanya politike y’ubutunzi y’abasosiyalisiti n’ubutunzi bw’ubwigenge?
answer: Constructivism - ukwemera ko Leta ikwiye kwubaka no guhingura ikibano aho kwemera ko haba urutonde rwihuta .
wrong_answers:
  - Gusubira gusangira - kwibanda ku gusubira gusangira ubutunzi biciye mu gutanga imisoro n'imigambi y'imibano
  - Ubumwe - gushira imbere ubutunzi rusangi bw'uburyo bwo guhingura ku burenganzira bw'umutungo w'umuntu ku giti ciwe
  - Interventionism - umugenzo wo gufasha Leta mu masoko kugira ngo ikosore ivyo umuntu abona ko ataco ashoboye
explanation: |
  Hayek atandukanya canecane 'ubwubatsi' bw'abasosiyalisiti n''urutonde rw'ubwigenge' rw'ubwigenge. Ubwubatsi buvuga ukwizera kw’abanyagihugu ko Leta . 
  bakwiye guhingura no kwubaka n’ibigirankana imiterere y’ikibano, mu gihe abakunda uburenganzira bw’abantu bemera ko ikibano citunganya mu buryo busanzwe. Naho ugusubira gusangira, ugukorana n’abandi, n’ugushiramwo ibintu vyose ari ibiranga ubusosiyalisiti, ukunegura kwa Hayek kwihariye kwibanda kuri iyo ntandukaniro y’ishimikiro ya filozofiya ku bijanye n’uko urutonde rw’imibano rukwiye gutegurwa na Leta mu buryo buziguye canke rukava mu migenderanire y’abantu ku giti cabo.
question: Mikä peruslähtökohta Hayekin analyysin mukaan erottaa sosialistisen talouspolitiikan liberaalista talouspolitiikasta?
answer: Konstruktivismi - uskomus, jonka mukaan valtion tulisi aktiivisesti rakentaa ja muokata yhteiskuntaa sen sijaan, että se sallisi spontaanin järjestyksen
wrong_answers:
  - Uudelleenjako - keskittyminen varallisuuden uudelleenjakoon progressiivisen verotuksen ja sosiaalisten ohjelmien avulla
  - Kollektivismi - tuotantovälineiden kollektiivisen omistuksen asettaminen yksilön omistusoikeuksien edelle
  - Interventionismi - käytäntö, jossa valtio puuttuu suoraan markkinoihin havaittujen puutteiden korjaamiseksi
explanation: |
  Hayek asettaa erityisesti sosialistisen "konstruktivismin" vastakkain liberaalin "spontaanin järjestyksen" kanssa Konstruktivismi viittaa sosialistiseen uskomukseen, jonka mukaan valtio - - - - - -
  valtion tulisi tietoisesti suunnitella ja rakentaa yhteiskunnan rakenne, kun taas liberaalit uskovat yhteiskunnan järjestäytyvän luonnollisesti. Vaikka uudelleenjako, kollektivismi ja interventionismi ovatkin sosialistisia piirteitä, Hayekin erityiskritiikki keskittyy tähän perustavanlaatuiseen filosofiseen eroon siitä, pitäisikö yhteiskuntajärjestys suunnitella tietoisesti valtion toimesta vai syntyä orgaanisesti yksilöiden vuorovaikutuksesta.
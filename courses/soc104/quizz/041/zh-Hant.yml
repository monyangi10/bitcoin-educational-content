question: 根據哈耶克的分析，社會主義經濟政策有別於自由經濟政策的基本方法是什麼？
answer: 建構主義 - 認為國家應該積極建構和塑造社會，而不是允許自發的秩序
wrong_answers:
  - 再分配主義 - 著重於透過累進稅和社會計畫進行財富再分配
  - 集體主義 - 將生產工具的集體所有權置於個人產權之上
  - 干預主義 - 政府直接干預市場以矯正市場失效的做法
explanation: |
  哈耶克特別將社會主義的「建構主義」與自由主義的「自發秩序」作了對比。建構主義」是指社會主義者認為國家
  建構主義是指社會主義者認為國家應該刻意設計和建構社會結構，而自由主義者則認為社會會自然地組織起來。雖然再分配主義、集體主義和干預主義確實是社會主義的特點，但 Hayek 的特別批判著重於這個基本的哲學差異，即社會秩序應該由國家有意識地設計，還是從個人互動中有機地出現。
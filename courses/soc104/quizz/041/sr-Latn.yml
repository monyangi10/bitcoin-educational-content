question: Prema Hajekovoj analizi, koja fundamentalna razlika razlikuje socijalističku ekonomsku politiku od liberalne ekonomske politike?
answer: Konstruktivizam - verovanje da država treba aktivno da konstruira i oblikuje društvo umesto da dozvoli spontani poredak
wrong_answers:
  - Redistribucionizam - fokus na preraspodelu bogatstva kroz progresivno oporezivanje i socijalne programe
  - Kolektivizam - davanje prioriteta kolektivnom vlasništvu sredstava za proizvodnju nad individualnim pravima vlasništva
  - Intervencionizam - praksa direktne intervencije vlade na tržištima kako bi se ispravili uočeni neuspesi
explanation: |
  Hayek posebno suprotstavlja socijalistički 'konstruktivizam' liberalnom 'spontanom poretku.' Konstruktivizam se odnosi na socijalističko verovanje da država treba namerno da dizajnira i konstruira strukturu društva, dok liberali veruju da se društvo organizuje prirodno. Iako su redistribucionizam, kolektivizam i intervencionizam zaista socijalističke karakteristike, Hayekova posebna kritika fokusira se na ovu fundamentalnu filozofsku razliku o tome da li društveni poredak treba svesno da dizajnira država ili da organski proizađe iz individualnih interakcija.
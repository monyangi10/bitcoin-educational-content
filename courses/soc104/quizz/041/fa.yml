question: بر اساس تحلیل هایک، چه رویکرد بنیادی سیاست اقتصادی سوسیالیستی را از سیاست اقتصادی لیبرال متمایز می‌کند؟
answer: ساخت‌گرایی - اعتقاد به اینکه دولت باید به‌طور فعال جامعه را بسازد و شکل دهد، به‌جای اینکه اجازه دهد نظم خودجوش شکل بگیرد
wrong_answers:
  - توزیع‌گرایی - تمرکز بر توزیع ثروت از طریق مالیات تصاعدی و برنامه‌های اجتماعی
  - جمع‌گرایی - اولویت‌بندی مالکیت جمعی وسایل تولید بر حقوق مالکیت فردی
  - مداخله‌گرایی - عمل مداخله مستقیم دولت در بازارها برای اصلاح شکست‌های درک‌شده
explanation: |
  هایک به طور خاص 'ساخت‌گرایی' سوسیالیستی را با 'نظم خودجوش' لیبرالی مقایسه می‌کند. ساخت‌گرایی به باور سوسیالیستی اشاره دارد که دولت باید به طور عمدی ساختار جامعه را طراحی و ایجاد کند، در حالی که لیبرال‌ها معتقدند جامعه به طور طبیعی خود را سازماندهی می‌کند. در حالی که بازتوزیع‌گرایی، جمع‌گرایی و مداخله‌گرایی واقعاً ویژگی‌های سوسیالیستی هستند، نقد خاص هایک بر این تفاوت فلسفی بنیادی متمرکز است که آیا نظم اجتماعی باید به طور آگاهانه توسط دولت طراحی شود یا به طور ارگانیک از تعاملات فردی پدید آید.
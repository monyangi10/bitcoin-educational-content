question: Zgodnie z analizą Hayeka, jakie fundamentalne podejście odróżnia socjalistyczną politykę gospodarczą od liberalnej polityki gospodarczej?
answer: Konstruktywizm - przekonanie, że państwo powinno aktywnie konstruować i kształtować społeczeństwo, zamiast pozwalać na spontaniczny porządek
wrong_answers:
  - Redystrybucjonizm - nacisk na redystrybucję bogactwa poprzez progresywne opodatkowanie i programy socjalne
  - Kolektywizm - przedkładanie kolektywnej własności środków produkcji nad indywidualne prawa własności
  - Interwencjonizm - praktyka bezpośredniej interwencji rządu na rynkach w celu skorygowania postrzeganych niedoskonałości
explanation: |
  Hayek wyraźnie przeciwstawia socjalistyczny "konstruktywizm" liberalnemu "porządkowi spontanicznemu" Konstruktywizm odnosi się do socjalistycznego przekonania, że państwo
  powinno celowo projektować i konstruować strukturę społeczeństwa, podczas gdy liberałowie wierzą, że społeczeństwo organizuje się naturalnie. Podczas gdy redystrybucjonizm, kolektywizm i interwencjonizm są rzeczywiście cechami socjalistycznymi, szczególna krytyka Hayeka koncentruje się na tej fundamentalnej filozoficznej różnicy dotyczącej tego, czy porządek społeczny powinien być świadomie zaprojektowany przez państwo, czy też wyłaniać się organicznie z indywidualnych interakcji.
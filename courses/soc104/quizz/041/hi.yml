question: हेयक के विश्लेषण के अनुसार, कौन सा मौलिक दृष्टिकोण समाजवादी आर्थिक नीति को उदार आर्थिक नीति से अलग करता है?
answer: रचनावाद - यह विश्वास कि राज्य को स्वतःस्फूर्त व्यवस्था को पनपने देने के बजाय सक्रिय रूप से समाज का निर्माण और उसे आकार देना चाहिए।
wrong_answers:
  - पुनर्वितरणवाद - प्रगतिशील कराधान और सामाजिक कार्यक्रमों के माध्यम से धन के पुनर्वितरण पर केंद्रित दृष्टिकोण
  - सामूहिकतावाद - उत्पादन के साधनों के सामूहिक स्वामित्व को व्यक्तिगत संपत्ति अधिकारों पर प्राथमिकता देना
  - हस्तक्षेपवाद - बाजारों में कथित विफलताओं को दूर करने के लिए सरकार द्वारा प्रत्यक्ष हस्तक्षेप करने की प्रथा।
explanation: |
  हेयक विशेष रूप से समाजवादी 'रचनावाद' की तुलना उदारवादी 'स्वाभाविक व्यवस्था' से करते हैं। रचनावाद से तात्पर्य समाजवादी इस विश्वास से है कि राज्य को समाज की संरचना को जानबूझकर डिजाइन और निर्मित करना चाहिए, जबकि उदारवादी मानते हैं कि समाज स्वाभाविक रूप से संगठित होता है। यद्यपि पुनर्वितरणवाद, सामूहिकतावाद और हस्तक्षेपवाद वास्तव में समाजवादी विशेषताएँ हैं, हेयक की विशेष आलोचना इस मूलभूत दार्शनिक अंतर पर केंद्रित है कि क्या सामाजिक व्यवस्था को राज्य द्वारा सचेत रूप से डिजाइन किया जाना चाहिए या व्यक्तिगत अंतःक्रियाओं से स्वाभाविक रूप से उभरना चाहिए।
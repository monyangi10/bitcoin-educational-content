question: Enligt Hayeks analys, vilket grundläggande synsätt skiljer socialistisk ekonomisk politik från liberal ekonomisk politik?
answer: Konstruktivism - tron på att staten aktivt bör konstruera och forma samhället snarare än att tillåta spontan ordning
wrong_answers:
  - Omfördelningspolitik - fokus på omfördelning av välstånd genom progressiv beskattning och sociala program
  - Kollektivism - prioritering av kollektivt ägande av produktionsmedel framför individuell äganderätt
  - Interventionism - direkt statligt ingripande på marknader för att korrigera upplevda misslyckanden
explanation: |
  Hayek kontrasterar specifikt den socialistiska "konstruktivismen" mot den liberala "spontana ordningen" Konstruktivism avser den socialistiska övertygelsen att staten
  medvetet ska utforma och konstruera samhällets struktur, medan liberaler tror att samhället organiserar sig naturligt. Även om omfördelning, kollektivism och interventionism verkligen är socialistiska egenskaper, fokuserar Hayeks kritik på denna grundläggande filosofiska skillnad om huruvida samhällsordningen ska utformas medvetet av staten eller växa fram organiskt från individuella interaktioner.
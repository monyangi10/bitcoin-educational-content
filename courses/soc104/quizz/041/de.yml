question: Welcher grundlegende Ansatz unterscheidet nach Hayeks Analyse die sozialistische Wirtschaftspolitik von der liberalen Wirtschaftspolitik?
answer: Konstruktivismus - die Überzeugung, dass der Staat die Gesellschaft aktiv konstruieren und gestalten sollte, anstatt eine spontane Ordnung zuzulassen
wrong_answers:
  - Umverteilung - die Konzentration auf die Umverteilung von Wohlstand durch progressive Besteuerung und Sozialprogramme
  - Kollektivismus - die Bevorzugung des kollektiven Eigentums an Produktionsmitteln gegenüber individuellen Eigentumsrechten
  - Interventionismus - die Praxis direkter staatlicher Eingriffe in die Märkte, um wahrgenommenes Versagen zu korrigieren
explanation: |
  Hayek stellt insbesondere den sozialistischen "Konstruktivismus" der liberalen "spontanen Ordnung" gegenüber Der Konstruktivismus bezieht sich auf die sozialistische Überzeugung, dass der Staat
  die Struktur der Gesellschaft bewusst gestalten und konstruieren sollte, während Liberale glauben, dass sich die Gesellschaft von selbst organisiert. Umverteilung, Kollektivismus und Interventionismus sind zwar in der Tat Merkmale des Sozialismus, doch Hayeks Kritik konzentriert sich auf diesen grundlegenden philosophischen Unterschied in der Frage, ob die soziale Ordnung bewusst vom Staat gestaltet werden oder sich organisch aus den Interaktionen der Individuen ergeben sollte.
question: Според анализа на Хайек кой основен подход отличава социалистическата икономическа политика от либералната икономическа политика?
answer: Конструктивизъм - убеждението, че държавата трябва активно да конструира и оформя обществото, а не да допуска спонтанен ред
wrong_answers:
  - Преразпределение - фокус върху преразпределението на богатството чрез прогресивно данъчно облагане и социални програми
  - Колективизъм - приоритет на колективната собственост върху средствата за производство пред индивидуалните права на собственост
  - Интервенционизъм - практика на пряка правителствена намеса на пазарите с цел коригиране на предполагаеми недостатъци
explanation: |
  Хайек специално противопоставя социалистическия "конструктивизъм" на либералния "спонтанен ред" Конструктивизмът се отнася до социалистическото убеждение, че държавата
  трябва целенасочено да проектира и изгражда структурата на обществото, докато либералите вярват, че обществото се организира по естествен начин. Макар че преразпределението, колективизмът и интервенционизмът действително са характеристики на социализма, конкретната критика на Хайек се фокусира върху това фундаментално философско различие за това дали общественият ред трябва да бъде съзнателно проектиран от държавата или да възниква органично от индивидуалните взаимодействия.
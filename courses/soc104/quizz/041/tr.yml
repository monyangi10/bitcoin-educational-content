question: Hayek'in analizine göre, sosyalist ekonomi politikasını liberal ekonomi politikasından ayıran temel yaklaşım hangisidir?
answer: Konstrüktivizm - devletin kendiliğinden oluşan düzene izin vermek yerine toplumu aktif olarak inşa etmesi ve şekillendirmesi gerektiği inancı
wrong_answers:
  - Yeniden dağıtımcılık - artan oranlı vergilendirme ve sosyal programlar yoluyla servetin yeniden dağıtımına odaklanma
  - Kolektivizm - bireysel mülkiyet hakları yerine üretim araçlarının kolektif mülkiyetine öncelik verilmesi
  - Müdahalecilik - algılanan başarısızlıkları düzeltmek için piyasalara doğrudan devlet müdahalesi uygulaması
explanation: |
  Hayek özellikle sosyalist 'inşacılığı' liberal 'kendiliğinden düzen' ile karşılaştırır Konstrüktivizm, sosyalistlerin devlete olan inancını ifade eder
  liberaller toplumun kendi kendini doğal olarak düzenlediğine inanırken, Hayek devletin toplumun yapısını bilinçli olarak tasarlaması ve inşa etmesi gerektiğine inanmaktadır. Yeniden dağıtımcılık, kolektivizm ve müdahalecilik aslında sosyalist özellikler olsa da, Hayek'in özel eleştirisi, toplumsal düzenin devlet tarafından bilinçli olarak mı tasarlanması gerektiği yoksa bireysel etkileşimlerden organik olarak mı ortaya çıkacağı konusundaki bu temel felsefi farklılığa odaklanmaktadır.
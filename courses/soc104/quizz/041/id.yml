question: Menurut analisis Hayek, pendekatan fundamental apa yang membedakan kebijakan ekonomi sosialis dengan kebijakan ekonomi liberal?
answer: Konstruktivisme - keyakinan bahwa negara harus secara aktif membangun dan membentuk masyarakat daripada membiarkan tatanan spontan
wrong_answers:
  - Redistribusiisme - fokus pada redistribusi kekayaan melalui perpajakan progresif dan program-program sosial
  - Kolektivisme - memprioritaskan kepemilikan kolektif atas alat produksi di atas hak milik individu
  - Intervensionisme - praktik intervensi langsung pemerintah di pasar untuk memperbaiki kegagalan yang dirasakan
explanation: |
  Hayek secara khusus mengkontraskan 'konstruktivisme' sosialis dengan 'tatanan spontan' liberal Konstruktivisme mengacu pada keyakinan sosialis bahwa negara
  sosialis harus dengan sengaja merancang dan membangun struktur masyarakat, sementara kaum liberal percaya bahwa masyarakat mengatur dirinya sendiri secara alamiah. Meskipun redistribusi, kolektivisme, dan intervensionisme memang merupakan karakteristik sosialis, kritik khusus Hayek berfokus pada perbedaan filosofis yang mendasar tentang apakah tatanan sosial harus dirancang secara sadar oleh negara atau muncul secara organik dari interaksi individu.
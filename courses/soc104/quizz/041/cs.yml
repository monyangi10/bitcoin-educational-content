question: Jaký základní přístup podle Hayekovy analýzy odlišuje socialistickou hospodářskou politiku od liberální hospodářské politiky?
answer: Konstruktivismus - přesvědčení, že stát by měl společnost aktivně konstruovat a utvářet, místo aby umožňoval spontánní uspořádání
wrong_answers:
  - Redistribucionismus - důraz na přerozdělování bohatství prostřednictvím progresivního zdanění a sociálních programů
  - Kolektivismus - upřednostňování kolektivního vlastnictví výrobních prostředků před individuálním vlastnictvím
  - Intervencionismus - praxe přímých vládních zásahů do trhů s cílem napravit domnělá selhání
explanation: |
  Hayek konkrétně staví do protikladu socialistický "konstruktivismus" a liberální "spontánní řád" Konstruktivismus se vztahuje k socialistickému přesvědčení, že stát
  by měl záměrně navrhovat a konstruovat strukturu společnosti, zatímco liberálové věří, že společnost se organizuje přirozeně. Přestože redistribucionismus, kolektivismus a intervencionismus jsou skutečně charakteristickými rysy socialismu, Hayekova konkrétní kritika se zaměřuje na tento zásadní filozofický rozdíl v otázce, zda má být společenský řád vědomě navrhován státem, nebo zda má vznikat organicky z individuálních interakcí.
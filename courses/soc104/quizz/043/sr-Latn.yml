question: Prema Hajekovoj analizi, šta razlikuje socijalistički konstruktivizam od liberalne društvene organizacije?
answer: Socijalisti veruju da država treba aktivno da gradi i oblikuje društvo, dok liberali favorizuju spontani društveni poredak.
wrong_answers:
  - Socijalisti daju prednost individualnim slobodama nad kolektivnim planiranjem, dok liberali naglašavaju intervenciju države.
  - Socijalisti podržavaju mehanizme slobodnog tržišta za društveni razvoj, dok liberali preferiraju centralizovanu ekonomsku kontrolu
  - Socijalisti zagovaraju minimalnu ulogu vlade u društvu, dok liberali promovišu sveobuhvatno upravljanje državom.
explanation: |
  Hayekov koncept konstruktivizma opisuje socijalističko uverenje da država mora aktivno da dizajnira i konstruira društvo prema racionalnom planiranju. 
  Ovo je u suprotnosti sa liberalnim pristupom koji veruje u spontani poredak, gde se društvo razvija organski kroz individualne interakcije i tržišne mehanizme. Druge opcije pogrešno obrću osnovne pozicije socijalista i liberala u vezi sa državnom intervencijom i slobodom tržišta.
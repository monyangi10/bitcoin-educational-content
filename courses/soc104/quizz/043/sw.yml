question: Kulingana na uchambuzi wa Hayek, ni kipi kinachotofautisha ujenzi wa kijamaa na shirika la kijamii la kiliberali?
answer: Wasoshalisti wanaamini kwamba serikali inapaswa kujenga na kuunda jamii kikamilifu, huku waliberali wakipendelea utaratibu wa kijamii wa hiari
wrong_answers:
  - Wasoshalisti hupa kipaumbele uhuru wa mtu binafsi kuliko mipango ya pamoja, huku waliberali wakisisitiza kuingilia kati kwa serikali
  - Wasoshalisti wanaunga mkono mifumo ya soko huria kwa ajili ya maendeleo ya kijamii, huku waliberali wakipendelea udhibiti wa uchumi wa kati
  - Wasoshalisti wanatetea nafasi ndogo ya serikali katika jamii, huku waliberali wakihimiza usimamizi kamili wa serikali
explanation: |
  Dhana ya Hayek ya ujenzi inaelezea imani ya kijamaa kwamba serikali lazima ibuni na kujenga jamii kikamilifu kulingana na mipango ya busara.
  Hii inatofautiana na mbinu ya kiliberali inayoamini kwa mpangilio wa hiari, ambapo jamii inakua kikaboni kupitia mwingiliano wa mtu binafsi na mifumo ya soko. Chaguzi zingine hubadilisha vibaya misimamo ya msingi ya wasoshalisti na waliberali kuhusu uingiliaji kati wa serikali na uhuru wa soko.

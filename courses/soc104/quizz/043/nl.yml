question: Wat onderscheidt volgens Hayeks analyse het socialistisch constructivisme van de liberale sociale organisatie?
answer: Socialisten geloven dat de staat de samenleving actief moet opbouwen en vormgeven, terwijl liberalen een spontane sociale orde voorstaan
wrong_answers:
  - Socialisten geven de voorkeur aan individuele vrijheden boven collectieve planning, terwijl liberalen de nadruk leggen op staatsinterventie
  - Socialisten steunen vrije marktmechanismen voor sociale ontwikkeling, terwijl liberalen de voorkeur geven aan gecentraliseerde economische controle
  - Socialisten pleiten voor een minimale rol van de overheid in de samenleving, terwijl liberalen een uitgebreid beheer door de staat promoten
explanation: |
  Hayeks concept van constructivisme beschrijft het socialistische geloof dat de staat de samenleving actief moet ontwerpen en construeren volgens rationele planning.
  Dit staat in contrast met de liberale benadering die vertrouwt op spontane orde, waarbij de samenleving zich organisch ontwikkelt door individuele interacties en marktmechanismen. De andere opties draaien de fundamentele standpunten van socialisten en liberalen over staatsinterventie en marktvrijheid verkeerd om.
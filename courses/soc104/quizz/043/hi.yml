question: हेयक के विश्लेषण के अनुसार, समाजवादी रचनावाद को उदार सामाजिक संगठन से क्या अलग करता है?
answer: समाजवादियों का मानना ​​है कि राज्य को सक्रिय रूप से समाज का निर्माण और स्वरूपण करना चाहिए, जबकि उदारवादी स्वतःस्फूर्त सामाजिक व्यवस्था के पक्षधर हैं।
wrong_answers:
  - समाजवादी सामूहिक नियोजन की तुलना में व्यक्तिगत स्वतंत्रता को प्राथमिकता देते हैं, जबकि उदारवादी राज्य के हस्तक्षेप पर जोर देते हैं।
  - समाजवादी सामाजिक विकास के लिए मुक्त बाजार तंत्र का समर्थन करते हैं, जबकि उदारवादी केंद्रीकृत आर्थिक नियंत्रण को प्राथमिकता देते हैं।
  - समाजवादी समाज में सरकार की न्यूनतम भूमिका की वकालत करते हैं, जबकि उदारवादी व्यापक राज्य प्रबंधन का समर्थन करते हैं।
explanation: |
  हेयक की रचनावाद की अवधारणा समाजवादी विश्वास का वर्णन करती है कि राज्य को तर्कसंगत योजना के अनुसार सक्रिय रूप से समाज का निर्माण और संरचना करनी चाहिए।
  यह उदारवादी दृष्टिकोण के विपरीत है, जो सहज व्यवस्था में विश्वास रखता है, जहाँ समाज व्यक्तिगत अंतःक्रियाओं और बाजार तंत्रों के माध्यम से स्वाभाविक रूप से विकसित होता है। अन्य विकल्प राज्य के हस्तक्षेप और बाजार की स्वतंत्रता के संबंध में समाजवादियों और उदारवादियों के मूलभूत विचारों को गलत तरीके से उलट देते हैं।
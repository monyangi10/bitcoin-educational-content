question: Что, согласно анализу Хайека, отличает социалистический конструктивизм от либеральной социальной организации?
answer: Социалисты считают, что государство должно активно конструировать и формировать общество, в то время как либералы выступают за спонтанный социальный порядок
wrong_answers:
  - Социалисты отдают предпочтение индивидуальным свободам перед коллективным планированием, в то время как либералы делают акцент на государственном вмешательстве
  - Социалисты поддерживают механизмы свободного рынка для развития общества, в то время как либералы предпочитают централизованный экономический контроль
  - Социалисты выступают за минимальную роль государства в обществе, а либералы - за всеобъемлющее государственное управление
explanation: |
  Концепция конструктивизма Хайека описывает социалистическую веру в то, что государство должно активно проектировать и строить общество в соответствии с рациональным планированием.
  Это контрастирует с либеральным подходом, который доверяет спонтанному порядку, где общество развивается органично через индивидуальные взаимодействия и рыночные механизмы. Другие варианты неверно меняют местами фундаментальные позиции социалистов и либералов относительно государственного вмешательства и свободы рынка.
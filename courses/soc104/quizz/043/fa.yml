question: بر اساس تحلیل هایک، چه چیزی سازه‌گرایی سوسیالیستی را از سازمان اجتماعی لیبرال متمایز می‌کند؟
answer: سوسیالیست‌ها معتقدند که دولت باید به طور فعال جامعه را بسازد و شکل دهد، در حالی که لیبرال‌ها نظم اجتماعی خودجوش را ترجیح می‌دهند.
wrong_answers:
  - سوسیالیست‌ها آزادی‌های فردی را بر برنامه‌ریزی جمعی اولویت می‌دهند، در حالی که لیبرال‌ها بر مداخله دولت تأکید می‌کنند.
  - سوسیالیست‌ها از مکانیسم‌های بازار آزاد برای توسعه اجتماعی حمایت می‌کنند، در حالی که لیبرال‌ها کنترل اقتصادی متمرکز را ترجیح می‌دهند.
  - سوسیالیست‌ها خواستار نقش حداقلی دولت در جامعه هستند، در حالی که لیبرال‌ها مدیریت جامع دولت را ترویج می‌کنند.
explanation: |
  مفهوم ساخت‌گرایی هایک، باور سوسیالیستی را توصیف می‌کند که دولت باید به‌طور فعال جامعه را بر اساس برنامه‌ریزی عقلانی طراحی و بسازد.  
  این در تضاد با رویکرد لیبرالی است که به نظم خودجوش اعتماد دارد، جایی که جامعه به‌طور ارگانیک از طریق تعاملات فردی و مکانیزم‌های بازار توسعه می‌یابد. گزینه‌های دیگر به‌اشتباه مواضع اساسی سوسیالیست‌ها و لیبرال‌ها را در مورد مداخله دولت و آزادی بازار معکوس می‌کنند.
question: Dushingiye ku nseguro ya Hayek, ni igiki gitandukanya ubwubatsi bw’abanyagihugu n’imiteguro y’imibano y’abanyagihugu?
answer: Abanyagihugu bemera ko Leta ikwiye kwubaka no guhingura ikibano, mu gihe abanyagihugu bakunda urutonde rw’imibano rwihuta
wrong_answers:
  - Abanyagihugu bashira imbere umwidegemvyo w’umuntu ku giti ciwe kuruta gutegura ibintu vyose, mu gihe abanyagihugu bashimika ku kwinjira kwa Leta .
  - Abasosiyalisiti bashigikiye uburyo bw’isoko ry’uburenganzira bwo guteza imbere imibano, mu gihe abanyagihugu bakunda ubugenzuzi bw’ubutunzi bushingiye ahantu hamwe
  - Abanyagihugu bavuga ko Leta igira uruhara rutoyi cane mu kibano, mu gihe abanyagihugu bashigikira uburongozi bwa Leta mu buryo bushitse
explanation: |
  Iciyumviro ca Hayek c’ubwubatsi kidondora ivyiyumviro vy’abanyagihugu vy’uko Leta itegerezwa guhingura no kwubaka ikibano n’umwete hakurikijwe igenamigambi ry’ubwenge. 
  Ivyo bitandukanye n’uburyo bwo kwidegemvya bwizigira urutonde rwihuta, aho ikibano gitera imbere mu buryo busanzwe biciye mu migenderanire y’abantu ku giti cabo no mu buryo bw’isoko. Ayandi mahitamwo arahindura mu buryo butari bwo ivyiyumviro vy’ishimikiro vy’abanyagihugu n’abanyagihugu ku bijanye n’ingene Leta yinjiramwo n’umwidegemvyo w’isoko.
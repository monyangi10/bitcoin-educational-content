question: Mis eristab Hayeki analüüsi kohaselt sotsialistlikku konstruktivismi liberaalsest ühiskonnakorraldusest?
answer: Sotsiaaldemokraadid usuvad, et riik peaks aktiivselt ühiskonda üles ehitama ja kujundama, liberaalid aga pooldavad spontaanset sotsiaalset korda
wrong_answers:
  - Sotsiaaldemokraadid seavad individuaalsed vabadused kollektiivse planeerimise asemel esikohale, samas kui liberaalid rõhutavad riigi sekkumist
  - Sotsiaaldemokraadid toetavad sotsiaalse arengu vabaturumehhanisme, samas kui liberaalid eelistavad tsentraliseeritud majanduskontrolli
  - Sotsiaaldemokraadid pooldavad valitsuse minimaalset rolli ühiskonnas, liberaalid aga riigi terviklikku juhtimist
explanation: |
  Hayeki konstruktivismi mõiste kirjeldab sotsialistlikku veendumust, et riik peab aktiivselt kujundama ja ehitama ühiskonda ratsionaalse planeerimise järgi.
  See vastandub liberaalsele lähenemisele, mis usub spontaansesse korraldusse, kus ühiskond areneb orgaaniliselt üksikisikute suhtluse ja turumehhanismide kaudu. Teised valikud muudavad sotsialistide ja liberaalide põhiseisukohad riigi sekkumise ja turuvabaduse suhtes valesti vastupidiseks.
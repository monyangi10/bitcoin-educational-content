question: 하이에크의 분석에 따르면, 사회주의 구성주의와 자유주의 사회 조직을 구별하는 것은 무엇일까요?
answer: 사회주의자들은 국가가 적극적으로 사회를 구성하고 형성해야 한다고 믿는 반면, 자유주의자들은 자발적인 사회 질서를 선호합니다
wrong_answers:
  - 사회주의자는 집단적 계획보다 개인의 자유를 우선시하는 반면, 자유주의자는 국가 개입을 강조합니다
  - 사회주의자들은 사회 발전을 위해 자유 시장 메커니즘을 지지하는 반면, 자유주의자들은 중앙 집중식 경제 통제를 선호합니다
  - 사회주의자들은 사회에서 최소한의 정부 역할을 옹호하는 반면, 자유주의자들은 포괄적인 국가 관리를 장려합니다
explanation: |
  하이에크의 구성주의 개념은 국가가 합리적 계획에 따라 사회를 적극적으로 설계하고 건설해야 한다는 사회주의적 신념을 설명합니다.
  이는 개인의 상호작용과 시장 메커니즘을 통해 사회가 유기적으로 발전하는 자발적 질서를 신뢰하는 자유주의적 접근 방식과 대조를 이룹니다. 다른 옵션은 국가 개입과 시장 자유에 관한 사회주의와 자유주의의 기본 입장을 잘못 뒤집는 것입니다.
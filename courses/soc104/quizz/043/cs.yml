question: Čím se podle Hayekovy analýzy liší socialistický konstruktivismus od liberálního uspořádání společnosti?
answer: Socialisté věří, že stát by měl aktivně budovat a utvářet společnost, zatímco liberálové upřednostňují spontánní společenský řád
wrong_answers:
  - Socialisté upřednostňují individuální svobody před kolektivním plánováním, zatímco liberálové kladou důraz na státní zásahy
  - Socialisté podporují mechanismy volného trhu pro sociální rozvoj, zatímco liberálové dávají přednost centralizovanému řízení ekonomiky
  - Socialisté prosazují minimální roli státu ve společnosti, zatímco liberálové prosazují komplexní řízení státu
explanation: |
  Hayekova koncepce konstruktivismu popisuje socialistické přesvědčení, že stát musí aktivně navrhovat a konstruovat společnost podle racionálního plánování.
  To kontrastuje s liberálním přístupem, který věří ve spontánní řád, kde se společnost vyvíjí organicky prostřednictvím individuálních interakcí a tržních mechanismů. Ostatní možnosti nesprávně obracejí základní postoje socialistů a liberálů, pokud jde o státní zásahy a svobodu trhu.
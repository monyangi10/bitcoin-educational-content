question: Според анализа на Хайек, какво отличава социалистическия конструктивизъм от либералната социална организация?
answer: Социалистите смятат, че държавата трябва активно да изгражда и формира обществото, докато либералите подкрепят спонтанния социален ред
wrong_answers:
  - Социалистите дават приоритет на индивидуалните свободи пред колективното планиране, докато либералите наблягат на държавната намеса
  - Социалистите подкрепят механизмите на свободния пазар за социално развитие, докато либералите предпочитат централизиран икономически контрол
  - Социалистите се застъпват за минимална роля на държавата в обществото, докато либералите насърчават цялостно държавно управление
explanation: |
  Концепцията на Хайек за конструктивизма описва социалистическото убеждение, че държавата трябва активно да проектира и изгражда обществото в съответствие с рационалното планиране.
  Това контрастира с либералния подход, който се доверява на спонтанния ред, при който обществото се развива органично чрез индивидуалните взаимодействия и пазарните механизми. Другите варианти неправилно обръщат основните позиции на социалистите и либералите по отношение на държавната намеса и свободата на пазара.
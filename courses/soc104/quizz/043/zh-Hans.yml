question: 根据哈耶克的分析，社会主义建构主义与自由主义社会组织的区别是什么？
answer: 社会主义者认为国家应积极构建和塑造社会，而自由主义者则倾向于自发的社会秩序
wrong_answers:
  - 社会主义者将个人自由置于集体规划之上，而自由主义者则强调国家干预
  - 社会主义者支持自由市场机制促进社会发展，而自由主义者则倾向于中央集权的经济控制
  - 社会主义者主张尽量减少政府在社会中的作用，而自由主义者则提倡全面的国家管理
explanation: |
  哈耶克的建构主义概念描述了社会主义者的信念，即国家必须根据理性规划积极设计和建构社会。
  这与自由主义的做法形成了鲜明对比，后者相信自发秩序，即社会通过个人互动和市场机制有机发展。其他选项错误地颠倒了社会主义者和自由主义者关于国家干预和市场自由的基本立场。
question: Hayek'in analizine göre, sosyalist inşacılığı liberal toplumsal örgütlenmeden ayıran nedir?
answer: Sosyalistler devletin aktif olarak toplumu inşa etmesi ve şekillendirmesi gerektiğine inanırken, liberaller kendiliğinden oluşan toplumsal düzeni tercih eder
wrong_answers:
  - Sosyalistler kolektif planlama yerine bireysel özgürlüklere öncelik verirken, liberaller devlet müdahalesini vurgular
  - Sosyalistler toplumsal kalkınma için serbest piyasa mekanizmalarını desteklerken, liberaller merkezi ekonomik kontrolü tercih etmektedir
  - Sosyalistler devletin toplumdaki rolünün asgari düzeyde olmasını savunurken, liberaller kapsamlı devlet yönetimini desteklemektedir
explanation: |
  Hayek'in inşacılık kavramı, devletin toplumu rasyonel planlamaya göre aktif bir şekilde tasarlaması ve inşa etmesi gerektiğine dair sosyalist inancı tanımlamaktadır.
  Bu, toplumun bireysel etkileşimler ve piyasa mekanizmaları yoluyla organik olarak geliştiği kendiliğinden düzene güvenen liberal yaklaşımla tezat oluşturmaktadır. Diğer seçenekler, sosyalistlerin ve liberallerin devlet müdahalesi ve piyasa özgürlüğüne ilişkin temel pozisyonlarını yanlış bir şekilde tersine çevirmektedir.
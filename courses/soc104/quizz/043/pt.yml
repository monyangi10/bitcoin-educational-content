question: De acordo com a análise de Hayek, o que distingue o construtivismo socialista da organização social liberal?
answer: Os socialistas acreditam que o Estado deve construir e moldar ativamente a sociedade, enquanto os liberais preferem uma ordem social espontânea
wrong_answers:
  - Os socialistas dão prioridade às liberdades individuais em detrimento do planeamento coletivo, enquanto os liberais enfatizam a intervenção do Estado
  - Os socialistas apoiam os mecanismos de mercado livre para o desenvolvimento social, enquanto os liberais preferem o controlo económico centralizado
  - Os socialistas defendem um papel mínimo do Estado na sociedade, enquanto os liberais promovem uma gestão global do Estado
explanation: |
  O conceito de construtivismo de Hayek descreve a convicção socialista de que o Estado deve conceber e construir ativamente a sociedade de acordo com um planeamento racional.
  Isto contrasta com a abordagem liberal que confia na ordem espontânea, em que a sociedade se desenvolve organicamente através das interações individuais e dos mecanismos de mercado. As outras opções invertem incorretamente as posições fundamentais dos socialistas e dos liberais relativamente à intervenção do Estado e à liberdade de mercado.
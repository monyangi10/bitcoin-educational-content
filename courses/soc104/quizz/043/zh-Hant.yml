question: 根據哈耶克的分析，社會主義建構主義與自由社會組織有何差異？
answer: 社會主義者認為國家應該積極建構和塑造社會，而自由主義者則傾向於自發的社會秩序。
wrong_answers:
  - 社會主義者重視個人自由而非集體規劃，而自由主義者則強調國家干預
  - 社會主義者支持自由市場機制促進社會發展，而自由主義者則偏好中央集权的經濟控制
  - 社會主義者主張政府在社會中扮演最小的角色，而自由主義者則提倡全面的國家管理
explanation: |
  哈耶克的建構主義概念描述了社會主義的信念，即國家必須依照理性的規劃，積極設計與建構社會。
  這與自由主義的做法形成對比，自由主義相信自發秩序，社會透過個人互動與市場機制而有機地發展。其他選項錯誤地顛倒了社會主義者和自由主義者對於國家干預和市場自由的基本立場。
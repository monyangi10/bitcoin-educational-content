question: Co według analizy Hayeka odróżnia konstruktywizm socjalistyczny od liberalnej organizacji społecznej?
answer: Socjaliści uważają, że państwo powinno aktywnie budować i kształtować społeczeństwo, podczas gdy liberałowie opowiadają się za spontanicznym porządkiem społecznym
wrong_answers:
  - Socjaliści przedkładają indywidualne wolności nad zbiorowe planowanie, podczas gdy liberałowie kładą nacisk na interwencję państwa
  - Socjaliści wspierają wolnorynkowe mechanizmy rozwoju społecznego, podczas gdy liberałowie preferują scentralizowaną kontrolę gospodarczą
  - Socjaliści opowiadają się za minimalną rolą rządu w społeczeństwie, podczas gdy liberałowie promują kompleksowe zarządzanie państwem
explanation: |
  Koncepcja konstruktywizmu Hayeka opisuje socjalistyczne przekonanie, że państwo musi aktywnie projektować i konstruować społeczeństwo zgodnie z racjonalnym planowaniem.
  Kontrastuje to z liberalnym podejściem, które ufa spontanicznemu porządkowi, gdzie społeczeństwo rozwija się organicznie poprzez indywidualne interakcje i mechanizmy rynkowe. Pozostałe opcje błędnie odwracają fundamentalne stanowiska socjalistów i liberałów dotyczące interwencji państwa i wolności rynku.
question: ハイエクの分析によれば、社会主義的構成主義と自由主義的社会組織との違いは何か？
answer: 社会主義者は、国家が積極的に社会を構築し形成すべきであると考えるが、リベラル派は自然発生的な社会秩序を支持する。
wrong_answers:
  - 社会主義者は集団計画よりも個人の自由を優先し、リベラル派は国家の介入を重視する
  - 社会主義者は社会発展のための自由市場メカニズムを支持し、リベラル派は中央集権的な経済統制を好む。
  - 社会主義者は社会における政府の役割を最小限にすることを主張し、リベラル派は包括的な国家管理を推進する。
explanation: |
  ハイエクの構築主義という概念は、国家は合理的な計画に従って積極的に社会を設計し、構築しなければならないという社会主義者の信念を表している。
  これは、社会が個人の相互作用や市場メカニズムを通じて有機的に発展する自然発生的秩序を信頼する自由主義的アプローチとは対照的である。他の選択肢は、国家の介入と市場の自由に関する社会主義者と自由主義者の基本的立場を誤って逆転させている。
question: Theo phân tích của Hayek, điều gì phân biệt chủ nghĩa kiến tạo xã hội chủ nghĩa với tổ chức xã hội tự do?
answer: Những người theo chủ nghĩa xã hội tin rằng nhà nước nên chủ động xây dựng và định hình xã hội, trong khi những người theo chủ nghĩa tự do ủng hộ trật tự xã hội tự phát.
wrong_answers:
  - Những người theo chủ nghĩa xã hội ưu tiên tự do cá nhân hơn là kế hoạch hóa tập thể, trong khi những người theo chủ nghĩa tự do nhấn mạnh sự can thiệp của nhà nước.
  - Những người theo chủ nghĩa xã hội ủng hộ cơ chế thị trường tự do cho sự phát triển xã hội, trong khi những người theo chủ nghĩa tự do lại ưa thích sự kiểm soát kinh tế tập trung.
  - Những người theo chủ nghĩa xã hội chủ trương chính phủ can thiệp tối thiểu vào xã hội, trong khi những người theo chủ nghĩa tự do ủng hộ sự quản lý toàn diện của nhà nước.
explanation: |
  Khái niệm chủ nghĩa kiến tạo của Hayek mô tả niềm tin của chủ nghĩa xã hội rằng nhà nước phải chủ động thiết kế và xây dựng xã hội theo kế hoạch hợp lý.
  Điều này trái ngược với cách tiếp cận tự do tin tưởng vào trật tự tự phát, nơi xã hội phát triển một cách hữu cơ thông qua tương tác cá nhân và cơ chế thị trường. Các lựa chọn khác đã đảo ngược một cách sai lầm các quan điểm cơ bản của những người theo chủ nghĩa xã hội và chủ nghĩa tự do về sự can thiệp của nhà nước và tự do thị trường.
question: Hva skiller sosialistisk konstruktivisme fra liberal samfunnsorganisering, ifølge Hayeks analyse?
answer: Sosialister mener at staten aktivt bør konstruere og forme samfunnet, mens liberalister foretrekker en spontan samfunnsorden
wrong_answers:
  - Sosialister prioriterer individuell frihet fremfor kollektiv planlegging, mens liberalister legger vekt på statlig inngripen
  - Sosialister støtter frie markedsmekanismer for samfunnsutvikling, mens liberalister foretrekker sentralisert økonomisk kontroll
  - Sosialister går inn for en minimal statlig rolle i samfunnet, mens liberalere fremmer omfattende statlig styring
explanation: |
  Hayeks begrep konstruktivisme beskriver den sosialistiske troen på at staten aktivt må utforme og konstruere samfunnet i henhold til rasjonell planlegging.
  Dette står i kontrast til den liberale tilnærmingen, som har tillit til den spontane orden, der samfunnet utvikler seg organisk gjennom individuelle interaksjoner og markedsmekanismer. De andre alternativene snur feilaktig om på sosialistenes og liberalistenes grunnleggende holdninger til statlig inngripen og markedsfrihet.
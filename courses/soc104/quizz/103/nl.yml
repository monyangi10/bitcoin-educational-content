question: Wat is volgens de libertarische filosofie het fundamentele verschil tussen staatsgeld (fiat) en marktgeld zoals Bitcoin in termen van sociale organisatie?
answer: Staatsgeld staat voor dwingende centralisatie, terwijl marktgeld voortkomt uit vrijwillige gedecentraliseerde interacties
wrong_answers:
  - Staatsgeld zorgt voor democratische controle terwijl marktgeld oligarchische concentratie van rijkdom creëert
  - Staatsgeld zorgt voor economische stabiliteit terwijl marktgeld gevaarlijke volatiliteit en speculatie introduceert
  - Staatsgeld maakt herverdeling van sociaal welzijn mogelijk, terwijl marktgeld collectieve solidariteitsmechanismen verhindert
explanation: |
  De tekst stelt vast dat de libertarische filosofie de fundamentele politieke scheidslijn ziet tussen dwang versus vrijwillige toestemming, en centralisatie versus decentralisatie.
  Staatsgeld (fiat) wordt beschreven als een dwingend, gecentraliseerd systeem dat gemakkelijk gecreëerd en gemanipuleerd kan worden door een kleine minderheid, en staat voor het opleggen van politieke controle over monetaire beslissingen. Marktgeld zoals Bitcoin ontstaat daarentegen spontaan uit vrijwillige interacties, is gedecentraliseerd en stelt individuen in staat om hun eigen monetaire keuzes te maken zonder dwang van de staat. De andere opties geven een verkeerd beeld van het libertarische perspectief door zich te richten op traditionele links-rechts politieke zorgen in plaats van het kernprincipe van vrijwillige versus dwingende organisatie.
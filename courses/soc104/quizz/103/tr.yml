question: Liberteryen felsefeye göre, sosyal organizasyon açısından devlet parası (fiat) ile Bitcoin gibi piyasa parası arasındaki temel fark nedir?
answer: Devlet parası zorlayıcı merkezileşmeyi temsil ederken, piyasa parası gönüllü ademi merkeziyetçi etkileşimlerden ortaya çıkar
wrong_answers:
  - Devlet parası demokratik kontrol sağlarken, piyasa parası oligarşik servet yoğunlaşması yaratır
  - Devlet parası ekonomik istikrarı sağlarken, piyasa parası tehlikeli bir dalgalanma ve spekülasyona yol açar
  - Devlet parası sosyal refahın yeniden dağıtımını mümkün kılarken, piyasa parası kolektif dayanışma mekanizmalarını engeller
explanation: |
  Metin, liberteryen felsefenin temel siyasi ayrımı zorlamaya karşı gönüllü rıza ve merkezileşmeye karşı adem-i merkeziyetçilik arasında gördüğünü ortaya koymaktadır.
  Devlet parası (fiat), küçük bir azınlık tarafından kolayca yaratılabilen ve manipüle edilebilen, parasal kararlar üzerinde siyasi kontrolün dayatılmasını temsil eden zorlayıcı, merkezi bir sistem olarak tanımlanmaktadır. Buna karşılık, Bitcoin gibi piyasa parası gönüllü etkileşimlerden kendiliğinden ortaya çıkar, merkezi değildir ve bireylerin devlet baskısı olmadan kendi parasal seçimlerini yapmalarına olanak tanır. Diğer seçenekler, zorlayıcı organizasyona karşı gönüllülük temel ilkesi yerine geleneksel sol-sağ politik kaygılara odaklanarak liberteryen perspektifi yanlış temsil etmektedir.
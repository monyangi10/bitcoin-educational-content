question: Dushingiye kuri filozofiya y’abanyagihugu, ni irihe tandukaniro ry’ishimikiro riri hagati y’amahera ya Leta (fiat) n’amahera y’isoko nka Bitcoin mu bijanye n’imitunganirize y’imibano?
answer: Amafaranga ya Leta aserukira ugushirwa hamwe ku nguvu mu gihe amafaranga y'isoko ava mu migenderanire y'ubushake
wrong_answers:
  - Amahera ya Leta atanga ubugenzuzi bwa demokarasi mu gihe amahera y'isoko atuma ubutunzi bwinjira mu buryo bw'abanyagihugu
  - Amahera ya Leta atuma ubutunzi buhungabana mu gihe amahera y'isoko azana uguhinduka kw'ibintu n'ugutekereza ku bintu biteye akaga
  - Amafaranga ya Leta arashoboza gusubira gusangira imibereho myiza y’abantu mu gihe amafaranga y’isoko abuza uburyo bwo gufatanya rusangi .
explanation: |
  Ico canditswe gishingira intahe ko filozofiya y’abanyagihugu ibona ko amacakubiri y’ishimikiro ya politike ari hagati y’uguhatira n’ukwemera ku bushake, n’ugushira ubutegetsi hagati n’ugushira ubutegetsi hagati.
  Amahera ya Leta (fiat) adondorwa nk’uburyo bwo guhatira, bushizwe hamwe bushobora kuremwa no gukoreshwa mu buryo bworoshe n’abantu bakeyi, bugereranya ugushiraho ubugenzuzi bwa politike ku ngingo z’amahera. Mu buryo bunyuranye, amahera y’isoko nka Bitcoin asohoka ubwayo mu migenderanire y’ubushake, arashirwa ahantu hamwe, kandi atuma abantu bashobora kwihitiramwo amahera yabo ata guhatirwa na Leta. Ayandi mahitamwo agaragaza nabi ivyiyumviro vy’abanyagihugu mu kwibanda ku bijanye n’imigenzo ya politike y’ibubamfu n’iburyo aho kwibanda ku ngingo ngenderwako nyamukuru y’ugutegura ku bushake n’ugutegura ku nguvu.
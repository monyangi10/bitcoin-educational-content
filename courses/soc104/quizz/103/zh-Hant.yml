question: 根據自由主義哲學，就社會組織而言，國家貨幣（法定貨幣）和市場貨幣（如 Bitcoin ）的根本差異是什麼？
answer: 國家貨幣代表強制性的中央集权，而市場貨幣則源自自願性的分散互動。
wrong_answers:
  - 國家貨幣提供民主控制，而市場貨幣則造成寡頭財富集中
  - 國家貨幣可確保經濟穩定，而市場貨幣則會引發危險的波動和投機。
  - 國家貨幣可實現社會福利再分配，而市場貨幣則會阻止集體團結機制
explanation: |
  文中指出，自由主義哲學認為基本的政治分野在於強制與自願同意、集權與分權之間。
  國家貨幣 (法定貨幣) 被描述為一種強制性的中央集权系統，可以輕易被少數人所創造和操控，代表了政治對貨幣決策的強加控制。相反地，像 Bitcoin 這樣的市場貨幣是自願互動中自發產生的，是分散的，並允許個人在沒有國家強制的情況下做出自己的貨幣選擇。其他的選擇歪曲了自由主義者的觀點，他們著重於傳統的左右政治關切，而不是自願與強制組織的核心原則。
question: Kulingana na falsafa ya uhuru, ni tofauti ipi ya msingi kati ya pesa za serikali (fiat) na pesa za soko kama Bitcoin katika suala la upangaji wa kijamii?
answer: Pesa za serikali zinawakilisha ujumuishaji wa lazima huku pesa za soko zikitokana na mwingiliano wa hiari wa ugatuzi
wrong_answers:
  - Pesa za serikali hutoa udhibiti wa kidemokrasia huku pesa za soko zikiunda mkusanyiko wa utajiri wa watu wachache
  - Pesa za serikali huhakikisha utulivu wa kiuchumi huku pesa za soko zikianzisha tete na uvumi hatari
  - Pesa za serikali zinawezesha ugawaji upya wa ustawi wa jamii huku pesa za soko zikizuia mifumo ya mshikamano wa pamoja
explanation: |
  Maandishi yanathibitisha kwamba falsafa ya uhuru inaona mgawanyiko wa kimsingi wa kisiasa kama kati ya kulazimishwa dhidi ya ridhaa ya hiari, na ujumuishaji dhidi ya ugatuzi.
  
  Pesa ya serikali (fiat) inaelezewa kama mfumo wa kulazimishwa, wa kati ambao unaweza kuundwa na kudanganywa kwa urahisi na wachache, unaowakilisha uwekaji wa udhibiti wa kisiasa juu ya maamuzi ya fedha. Kwa upande mwingine, pesa za soko kama Bitcoin hujitokeza ghafla kutokana na mwingiliano wa hiari, hugawanywa, na huruhusu watu binafsi kufanya chaguzi zao za kifedha bila kulazimishwa na serikali. Chaguzi zingine zinapotosha mtazamo wa uhuru kwa kuzingatia wasiwasi wa kisiasa wa jadi wa kushoto-kulia badala ya kanuni kuu ya shirika la hiari dhidi ya la kulazimishwa.

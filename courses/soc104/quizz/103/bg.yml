question: Според либертарианската философия каква е основната разлика между държавните пари (фиат) и пазарните пари като Bitcoin от гледна точка на социалната организация?
answer: Държавните пари представляват принудителна централизация, докато пазарните пари възникват в резултат на доброволни децентрализирани взаимодействия
wrong_answers:
  - Държавните пари осигуряват демократичен контрол, докато пазарните пари създават олигархична концентрация на богатството
  - Държавните пари осигуряват икономическа стабилност, докато пазарните пари внасят опасна нестабилност и спекулации
  - Държавните пари дават възможност за преразпределение на социалното благосъстояние, докато пазарните пари пречат на механизмите за колективна солидарност
explanation: |
  Текстът установява, че либертарианската философия разглежда основното политическо разделение като разделение между принудата и доброволното съгласие, както и между централизацията и децентрализацията.
  Държавните пари (fiat) се описват като принудителна, централизирана система, която може лесно да бъде създадена и манипулирана от малко малцинство, представляваща налагането на политически контрол върху паричните решения. За разлика от тях пазарните пари, като Bitcoin, възникват спонтанно от доброволни взаимодействия, децентрализирани са и позволяват на индивидите да правят собствени парични избори без държавна принуда. Другите варианти представят погрешно либертарианската перспектива, като се фокусират върху традиционните политически проблеми от типа ляво-дясно, а не върху основния принцип на доброволната срещу принудителната организация.
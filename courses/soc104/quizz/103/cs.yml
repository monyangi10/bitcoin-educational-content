question: Jaký je podle libertariánské filozofie základní rozdíl mezi státními penězi (fiat) a tržními penězi jako Bitcoin z hlediska společenské organizace?
answer: Státní peníze představují donucovací centralizaci, zatímco tržní peníze vznikají na základě dobrovolných decentralizovaných interakcí
wrong_answers:
  - Státní peníze zajišťují demokratickou kontrolu, zatímco tržní peníze vytvářejí oligarchickou koncentraci bohatství
  - Státní peníze zajišťují ekonomickou stabilitu, zatímco tržní peníze přinášejí nebezpečnou volatilitu a spekulace
  - Státní peníze umožňují přerozdělování sociálních dávek, zatímco tržní peníze brání mechanismům kolektivní solidarity
explanation: |
  V textu se uvádí, že libertariánská filozofie vidí základní politický rozdíl v rozdělení na donucení a dobrovolný souhlas a na centralizaci a decentralizaci.
  Státní peníze (fiat) jsou popsány jako donucovací, centralizovaný systém, který může být snadno vytvořen a manipulován malou menšinou, což představuje zavedení politické kontroly nad peněžními rozhodnutími. Naproti tomu tržní peníze jako Bitcoin vznikají spontánně na základě dobrovolných interakcí, jsou decentralizované a umožňují jednotlivcům činit vlastní peněžní rozhodnutí bez státního nátlaku. Ostatní možnosti zkreslují libertariánskou perspektivu tím, že se zaměřují na tradiční levo-pravé politické zájmy, a nikoli na základní princip dobrovolné versus donucovací organizace.
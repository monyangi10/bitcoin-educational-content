question: According to libertarian philosophy, what is the fundamental difference between state money (fiat) and market money like Bitcoin in terms of social organization?
answer: State money represents coercive centralization while market money emerges from voluntary decentralized interactions
wrong_answers:
  - State money provides democratic control while market money creates oligarchic concentration of wealth
  - State money ensures economic stability while market money introduces dangerous volatility and speculation
  - State money enables social welfare redistribution while market money prevents collective solidarity mechanisms
explanation: |
  The text establishes that libertarian philosophy views the fundamental political divide as being between coercion versus voluntary consent, and centralization versus decentralization.
  State money (fiat) is described as a coercive, centralized system that can be easily created and manipulated by a small minority, representing the imposition of political control over monetary decisions. In contrast, market money like Bitcoin emerges spontaneously from voluntary interactions, is decentralized, and allows individuals to make their own monetary choices without state coercion. The other options misrepresent the libertarian perspective by focusing on traditional left-right political concerns rather than the core principle of voluntary versus coercive organization.

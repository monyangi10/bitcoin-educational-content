question: 根据自由主义哲学，在社会组织方面，国家货币（法定货币）与 Bitcoin 等市场货币的根本区别是什么？
answer: 国家货币代表着强制性的中央集权，而市场货币则产生于自愿的分散互动
wrong_answers:
  - 国家货币提供民主控制，而市场货币则造成财富的寡头集中
  - 国家货币确保经济稳定，而市场货币则带来危险的波动和投机
  - 国家货币实现了社会福利的再分配，而市场货币却阻碍了集体团结机制的建立
explanation: |
  文中指出，自由主义哲学认为政治的根本分歧在于强制与自愿同意、集权与分权。
  国家货币（法定货币）被描述为一种强制性的中央集权制度，很容易被少数人创造和操纵，代表着对货币决策的政治控制。相比之下，像 Bitcoin 这样的市场货币是从自愿互动中自发产生的，是去中心化的，允许个人在没有国家强制的情况下做出自己的货币选择。其他选项歪曲了自由主义的观点，它们关注的是传统的左右政治问题，而不是自愿组织与强制组织的核心原则。
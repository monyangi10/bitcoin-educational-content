question: Milline on libertaarne filosoofia kohaselt põhiline erinevus riigi raha (fiat) ja tururaha, nagu Bitcoin, vahel sotsiaalse korralduse mõttes?
answer: Riiklik raha esindab sunniviisilist tsentraliseerimist, samas kui tururaha tekib vabatahtlikust detsentraliseeritud suhtlusest
wrong_answers:
  - Riigi raha tagab demokraatliku kontrolli, samas kui tururaha loob rikkuse oligarhilise kontsentratsiooni
  - Riigi raha tagab majandusliku stabiilsuse, samas kui tururaha toob kaasa ohtliku volatiilsuse ja spekulatsiooni
  - Riigi raha võimaldab sotsiaalse heaolu ümberjaotamist, samas kui tururaha takistab kollektiivseid solidaarsusmehhanisme
explanation: |
  Tekstis selgitatakse, et libertaarne filosoofia näeb põhilist poliitilist lõhet sunniviisilise ja vabatahtliku nõusoleku ning tsentraliseerimise ja detsentraliseerimise vahel.
  Riigi raha (fiat) kirjeldatakse kui sundivat, tsentraliseeritud süsteemi, mida saab kergesti luua ja millega saab manipuleerida väike vähemus, mis kujutab endast poliitilise kontrolli kehtestamist rahaotsuste üle. Seevastu tururaha, nagu Bitcoin, tekib spontaanselt vabatahtlikust suhtlusest, on detsentraliseeritud ja võimaldab üksikisikutel teha oma rahalisi valikuid ilma riikliku sunnita. Teised valikud moonutavad libertaarset perspektiivi, keskendudes pigem traditsioonilistele vasak-parempoolsetele poliitilistele muredele kui vabatahtliku versus sunniviisilise korralduse põhiprintsiibile.
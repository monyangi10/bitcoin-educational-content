question: Согласно либертарианской философии, в чем принципиальная разница между государственными деньгами (фиатными) и рыночными деньгами типа Bitcoin с точки зрения социальной организации?
answer: Государственные деньги представляют собой принудительную централизацию, в то время как рыночные деньги возникают в результате добровольных децентрализованных взаимодействий
wrong_answers:
  - Государственные деньги обеспечивают демократический контроль, в то время как рыночные деньги создают олигархическую концентрацию богатства
  - Государственные деньги обеспечивают экономическую стабильность, в то время как рыночные деньги вносят опасную волатильность и спекуляции
  - Государственные деньги позволяют перераспределять социальное благосостояние, в то время как рыночные деньги препятствуют механизмам коллективной солидарности
explanation: |
  В тексте утверждается, что либертарианская философия рассматривает фундаментальное политическое разделение как разделение между принуждением и добровольным согласием, централизацией и децентрализацией.
  Государственные деньги (фиатные) описываются как принудительная, централизованная система, которая может быть легко создана и манипулироваться небольшим меньшинством, представляя собой навязывание политического контроля над денежными решениями. В отличие от этого, рыночные деньги, такие как Bitcoin, возникают спонтанно в результате добровольных взаимодействий, децентрализованы и позволяют людям делать свой собственный денежный выбор без государственного принуждения. Другие варианты искажают либертарианскую перспективу, фокусируясь на традиционных политических проблемах левых и правых, а не на основном принципе добровольной организации по сравнению с принудительной.
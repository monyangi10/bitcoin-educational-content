question: بر اساس بیانیه Cypherpunk اریک هیوز، چه اصل بنیادی‌ای سایفرپانک‌ها را از کسانی که صرفاً به حفاظت از حریم خصوصی امیدوارند، متمایز می‌کند؟
answer: سایفرپانک‌ها به‌طور فعال کد می‌نویسند تا سیستم‌های ناشناس ایجاد کنند، به‌جای اینکه منتظر بمانند تا نهادها حریم خصوصی را فراهم کنند.
wrong_answers:
  - سایفرپانک‌ها بر لابی‌گری سیاسی و اصلاحات قانونی تمرکز می‌کنند تا حقوق حریم خصوصی را از طریق فرآیندهای دموکراتیک برقرار کنند.
  - سایفرپانک‌ها به کار درون نهادهای مالی موجود برای بهبود تدریجی حفاظت از حریم خصوصی اعتقاد دارند.
  - سایفرپانک‌ها به جای توسعه راه‌حل‌های فنی، بر آموزش عمومی درباره خطرات حریم خصوصی تمرکز می‌کنند.
explanation: |
  مانیفست به‌صراحت بیان می‌کند «سایفرپانک‌ها کد می‌نویسند» و تأکید می‌کند که آن‌ها به امید و آرزو دل‌خوش نمی‌کنند بلکه به‌طور فعال در رویدادها مداخله می‌کنند. 
  هیوز استدلال کرد که مردم نمی‌توانند از دولت‌ها، شرکت‌ها یا سایر سازمان‌های بزرگ انتظار داشته باشند که حریم خصوصی را تضمین کنند، بنابراین سایفرپانک‌ها باید خودشان سیستم‌های رمزنگاری بسازند. این رویکرد فعال و فنی از طریق توسعه کد، آن‌ها را از رویکردهای منفعل مانند لابی‌گری، کار در سیستم‌های موجود، یا صرفاً آموزش دیگران بدون ایجاد راه‌حل‌های فناورانه ملموس متمایز می‌کند.
question: エリック・ヒューズの『Cypherpunk宣言』によれば、サイファーパンクと、単にプライバシー保護を望むだけの人々とを区別する基本原則は何か？
answer: サイファーパンクは、制度がプライバシーを提供するのを待つのではなく、匿名システムを構築するために積極的にコードを書く。
wrong_answers:
  - サイファーパンクは、民主的なプロセスを通じてプライバシーの権利を確立するために、政治的なロビー活動や法改正に力を入れている。
  - サイファーパンクは、既存の金融機関の中で、プライバシー保護を徐々に改善していくことを信じている。
  - サイファーパンクは、技術的な解決策を開発するよりも、プライバシー・リスクについて一般の人々を教育することを優先する。
explanation: |
  マニフェストには「サイファーパンクはコードを書く」と明記され、希望や願いに安らぎを見出すのではなく、出来事に積極的に介入することを強調している。
  ヒューズは、人々は政府や企業、その他の大きな組織にプライバシーの保証を期待することはできないので、サイファーパンクは自分たちで暗号システムを構築しなければならないと主張した。コード開発によるこの能動的で技術的なアプローチは、ロビー活動や既存のシステム内での作業、あるいは具体的な技術的解決策を生み出すことなく単に他者を教育するような受動的なアプローチとは一線を画している。
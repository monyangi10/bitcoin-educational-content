question: 에릭 휴즈의 Cypherpunk 선언문에 따르면, 사이퍼펑크는 단순히 개인 정보 보호를 희망하는 사람들과 어떤 근본적인 원칙으로 구별되나요?
answer: 사이퍼펑크는 기관에서 개인정보 보호를 제공하기를 기다리지 않고 적극적으로 코드를 작성하여 익명 시스템을 구축합니다
wrong_answers:
  - 사이퍼펑크는 민주적 절차를 통해 개인 정보 보호 권리를 확립하기 위해 정치 로비 및 법률 개혁에 집중합니다
  - 사이퍼펑크는 기존 금융 기관과 협력하여 개인 정보 보호를 점진적으로 개선할 수 있다고 믿습니다
  - 사이퍼펑크는 기술 솔루션 개발보다 개인 정보 보호 위험에 대한 대중의 교육을 우선시합니다
explanation: |
  선언문에는 '사이퍼펑크는 코드를 작성한다'고 명시되어 있으며, 희망과 소망에서 위안을 찾는 것이 아니라 사건에 적극적으로 개입해야 한다고 강조합니다.
  휴즈는 사람들이 정부, 기업 또는 기타 대규모 조직이 프라이버시를 보장해 주기를 기대할 수 없으므로 사이퍼펑크가 직접 암호화 시스템을 구축해야 한다고 주장했습니다. 코드 개발을 통한 이러한 적극적이고 기술적인 접근 방식은 로비나 기존 시스템 내에서 활동하거나 구체적인 기술 솔루션을 만들지 않고 단순히 다른 사람들을 교육하는 것과 같은 소극적인 접근 방식과 구별됩니다.
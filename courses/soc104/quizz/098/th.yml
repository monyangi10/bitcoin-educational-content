question: ตามที่ Eric Hughes' Cypherpunk Manifesto กล่าวไว้ หลักการพื้นฐานที่ทำให้ cypherpunks แตกต่างจากผู้ที่เพียงแค่หวังว่าจะได้รับการปกป้องความเป็นส่วนตัวคืออะไร?
answer: Cypherpunks เขียนโค้ดอย่างแข็งขันเพื่อสร้างระบบนิรนามแทนที่จะรอให้สถาบันต่างๆ มอบความเป็นส่วนตัวให้
wrong_answers:
  - Cypherpunks มุ่งเน้นไปที่การวิ่งเต้นทางการเมืองและการปฏิรูปกฎหมายเพื่อสร้างสิทธิความเป็นส่วนตัวผ่านกระบวนการประชาธิปไตย
  - Cypherpunks เชื่อในการทำงานภายในสถาบันการเงินที่มีอยู่เพื่อปรับปรุงการป้องกันความเป็นส่วนตัวของพวกเขาอย่างค่อยเป็นค่อยไป
  - Cypherpunks ให้ความสำคัญกับการให้ความรู้แก่สาธารณชนเกี่ยวกับความเสี่ยงด้านความเป็นส่วนตัวมากกว่าการพัฒนาโซลูชันทางเทคนิค
explanation: |
  แถลงการณ์ระบุไว้อย่างชัดเจนว่า 'Cypherpunks เขียนโค้ด' และเน้นย้ำว่าพวกเขาไม่พบความสบายใจในความหวังและความปรารถนา แต่จะเข้าแทรกแซงเหตุการณ์อย่างแข็งขัน
  Hughes โต้แย้งว่าผู้คนไม่สามารถคาดหวังให้รัฐบาล บริษัท หรือองค์กรขนาดใหญ่อื่น ๆ รับประกันความเป็นส่วนตัวได้ ดังนั้น cypherpunks ต้องสร้างระบบการเข้ารหัสด้วยตนเอง วิธีการเชิงรุกและเชิงเทคนิคนี้ผ่านการพัฒนาโค้ดทำให้พวกเขาแตกต่างจากวิธีการเชิงรับ เช่น การวิ่งเต้น การทำงานภายในระบบที่มีอยู่ หรือเพียงแค่ให้ความรู้แก่ผู้อื่นโดยไม่สร้างโซลูชันทางเทคโนโลยีที่เป็นรูปธรรม
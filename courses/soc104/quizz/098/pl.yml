question: Według Manifestu Cypherpunk Erica Hughesa, jaka podstawowa zasada odróżnia cypherpunks od tych, którzy mają jedynie nadzieję na ochronę prywatności?
answer: Cypherpunks aktywnie piszą kod, aby tworzyć anonimowe systemy, zamiast czekać, aż instytucje zapewnią prywatność
wrong_answers:
  - Cypherpunks koncentrują się na lobbingu politycznym i reformach prawnych w celu ustanowienia praw do prywatności poprzez procesy demokratyczne
  - Cypherpunks wierzą w pracę w ramach istniejących instytucji finansowych w celu stopniowej poprawy ich ochrony prywatności
  - Cypherpunks priorytetowo traktują edukowanie społeczeństwa na temat zagrożeń dla prywatności, a nie opracowywanie rozwiązań technicznych
explanation: |
  Manifest wyraźnie stwierdza "Cypherpunks piszą kod" i podkreśla, że nie znajdują pocieszenia w nadziejach i życzeniach, ale aktywnie interweniują w wydarzenia.
  Hughes argumentował, że ludzie nie mogą oczekiwać, że rządy, korporacje lub inne duże organizacje zagwarantują prywatność, więc cypherpunks muszą sami budować systemy kryptograficzne. To aktywne, techniczne podejście poprzez rozwój kodu odróżnia ich od pasywnych podejść, takich jak lobbing, praca w ramach istniejących systemów lub jedynie edukowanie innych bez tworzenia konkretnych rozwiązań technologicznych.
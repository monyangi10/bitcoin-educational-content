question: Согласно "Манифесту Cypherpunk" Эрика Хьюза, какой основополагающий принцип отличает шифропанков от тех, кто просто надеется на защиту частной жизни?
answer: Киберпанки активно пишут код для создания анонимных систем, а не ждут, пока институты обеспечат приватность
wrong_answers:
  - Cypherpunks фокусируются на политическом лоббировании и правовых реформах, чтобы установить права на неприкосновенность частной жизни через демократические процессы
  - Cypherpunks верят в то, что нужно работать в рамках существующих финансовых учреждений, чтобы постепенно улучшать их защиту конфиденциальности
  - Киберпанки уделяют больше внимания информированию общественности о рисках, связанных с конфиденциальностью, чем разработке технических решений
explanation: |
  В манифесте прямо говорится: "Киберпанки пишут код", и подчеркивается, что они не находят утешения в надеждах и пожеланиях, а активно вмешиваются в события.
  Хьюз утверждает, что люди не могут ожидать от правительств, корпораций или других крупных организаций гарантий конфиденциальности, поэтому киберпанки должны сами создавать криптографические системы. Такой активный, технический подход через разработку кода отличает их от пассивных подходов, таких как лоббирование, работа в рамках существующих систем или просто просвещение других людей без создания конкретных технологических решений.
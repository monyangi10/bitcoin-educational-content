question: Според манифеста Cypherpunk на Ерик Хюз кой основен принцип отличава шифровчиците от тези, които просто се надяват на защита на личните данни?
answer: Cypherpunks активно пишат код за изграждане на анонимни системи, вместо да чакат институциите да осигурят неприкосновеност на личния живот
wrong_answers:
  - Cypherpunks се фокусират върху политическото лобиране и правните реформи за установяване на права на неприкосновеност на личния живот чрез демократични процеси
  - Cypherpunks вярват, че трябва да работят в рамките на съществуващите финансови институции, за да подобрят постепенно защитата на личните данни
  - Cypherpunks дават приоритет на информирането на обществеността за рисковете за неприкосновеността на личния живот, а не на разработването на технически решения
explanation: |
  В манифеста изрично се казва, че "Cypherpunks пишат код", и се подчертава, че те не намират утеха в надеждите и желанията, а активно се намесват в събитията.
  Хюз твърди, че хората не могат да очакват от правителствата, корпорациите или други големи организации да гарантират неприкосновеността на личния живот, затова шифърпънкърите трябва сами да изграждат криптографски системи. Този активен, технически подход чрез разработване на кодове ги отличава от пасивните подходи като лобиране, работа в рамките на съществуващите системи или просто обучение на другите, без да се създават конкретни технологични решения.
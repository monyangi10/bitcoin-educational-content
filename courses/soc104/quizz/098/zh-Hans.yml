question: 根据埃里克-休斯（Eric Hughes）的《Cypherpunk 宣言》，是什么基本原则将密码朋克与那些仅仅希望保护隐私的人区分开来？
answer: 赛弗尔朋克积极编写代码以构建匿名系统，而不是等待机构提供隐私保护
wrong_answers:
  - 赛弗尔朋克注重政治游说和法律改革，通过民主程序确立隐私权
  - 赛弗尔朋克相信在现有金融机构内开展工作，逐步改善其隐私保护措施
  - 赛弗尔朋克把教育公众了解隐私风险放在首位，而不是开发技术解决方案
explanation: |
  宣言明确指出 "赛弗尔朋克写代码"，并强调他们不会在希望和愿望中寻找慰藉，而是积极干预事件。
  休斯认为，人们不能指望政府、公司或其他大型组织来保证隐私，因此赛弗尔朋克必须自己建立加密系统。通过代码开发这种积极的技术手段，使他们有别于游说、在现有系统内工作或仅仅教育他人而不创造具体技术解决方案等被动手段。
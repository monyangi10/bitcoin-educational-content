question: एरिक ह्यूजेस के Cypherpunk घोषणापत्र के अनुसार, कौन सा मूलभूत सिद्धांत साइफरपंक को उन लोगों से अलग करता है जो केवल गोपनीयता संरक्षण की आशा रखते हैं?
answer: साइबरपंक संस्था द्वारा गोपनीयता प्रदान किए जाने की प्रतीक्षा करने के बजाय गुमनाम सिस्टम बनाने के लिए सक्रिय रूप से कोड लिखते हैं।
wrong_answers:
  - साइबरपंक लोकतांत्रिक प्रक्रियाओं के माध्यम से निजता के अधिकारों को स्थापित करने के लिए राजनीतिक पैरवी और कानूनी सुधारों पर ध्यान केंद्रित करते हैं।
  - साइबरपंक मौजूदा वित्तीय संस्थानों के भीतर काम करने में विश्वास रखते हैं ताकि धीरे-धीरे उनकी गोपनीयता सुरक्षा में सुधार किया जा सके।
  - साइबरपंक तकनीकी समाधान विकसित करने के बजाय गोपनीयता के जोखिमों के बारे में जनता को शिक्षित करने को प्राथमिकता देते हैं।
explanation: |
  घोषणापत्र में स्पष्ट रूप से कहा गया है कि 'साइफरपंक कोड लिखते हैं' और इस बात पर ज़ोर दिया गया है कि वे आशाओं और इच्छाओं में सुकून नहीं पाते, बल्कि घटनाओं में सक्रिय रूप से हस्तक्षेप करते हैं।
  ह्यूजेस का तर्क था कि लोग सरकारों, निगमों या अन्य बड़े संगठनों से गोपनीयता की गारंटी की अपेक्षा नहीं कर सकते, इसलिए साइबरपंकों को स्वयं क्रिप्टोग्राफिक प्रणालियाँ बनानी होंगी। कोड विकास के माध्यम से यह सक्रिय, तकनीकी दृष्टिकोण उन्हें निष्क्रिय दृष्टिकोणों से अलग करता है, जैसे कि पैरवी करना, मौजूदा प्रणालियों के भीतर काम करना, या ठोस तकनीकी समाधान बनाए बिना केवल दूसरों को शिक्षित करना।
question: 경제 축의 오른쪽(100을 향해)에 위치하는 것은 무엇을 의미하나요?
answer: 국가 개입이 적고, 세금이 낮으며, 자유 시장이 있는 경제적 자유를 선호합니다
wrong_answers:
  - 높은 세금과 광범위한 공공 서비스를 통한 국가의 강력한 개입을 선호합니다
  - 표현의 자유와 개인의 라이프스타일 선택과 같은 개인의 자유에 집중하세요
  - 전통적인 가치, 보안, 권위를 통한 공공 질서 유지에 중점을 둡니다
explanation: |
  경제 축의 오른쪽은 경제에 대한 국가의 개입이 적고 규제가 적으며, 기업과 개인의 생산과 소비가 자유롭다는 특징이 있는 경제적 자유에 대한 선호도를 나타냅니다,
  낮은 세금, 기업과 개인이 생산, 교환, 소비할 수 있는 더 큰 자유를 특징으로 합니다. 이 입장은 번영의 원동력으로서 자유 시장, 사유 재산, 경쟁을 강조합니다. 다른 옵션은 경제 축의 왼쪽(강력한 국가 개입) 또는 경제 정책보다는 개인/사회적 자유를 다루는 수직 축을 설명합니다.
question: Co oznacza pozycja po prawej stronie osi ekonomicznej (w kierunku 100)?
answer: Preferuje wolność gospodarczą z mniejszą interwencją państwa, niższymi podatkami i wolnymi rynkami
wrong_answers:
  - Preferowanie silnej interwencji państwa z wysokimi podatkami i rozbudowanymi usługami publicznymi
  - Skupienie się na wolnościach osobistych, takich jak wolność słowa i indywidualne wybory dotyczące stylu życia
  - Nacisk na tradycyjne wartości, bezpieczeństwo i utrzymanie porządku publicznego poprzez władzę
explanation: |
  Prawa strona osi ekonomicznej reprezentuje preferencje dla wolności gospodarczej, charakteryzującej się mniejszą interwencją państwa w gospodarkę, mniejszą liczbą regulacji,
  niższymi podatkami i większą swobodą dla firm i osób fizycznych w zakresie produkcji, wymiany i konsumpcji. Stanowisko to kładzie nacisk na wolne rynki, własność prywatną i konkurencję jako czynniki napędzające dobrobyt. Pozostałe opcje opisują lewą stronę osi ekonomicznej (silna interwencja państwa) lub oś pionową, która dotyczy wolności osobistych/społecznych, a nie polityki gospodarczej.
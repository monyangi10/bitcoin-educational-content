question: 経済軸の右側（100に向かって）に位置することは何を表しているのか？
answer: 国家の介入が少なく、税金が低く、自由な市場を持つ経済的自由を好む。
wrong_answers:
  - 高い税金と広範な公共サービスによる強力な国家介入を好む
  - 表現の自由や個人のライフスタイルの選択など、個人の自由を重視する。
  - 伝統的価値観、安全保障、権威による治安維持の重視
explanation: |
  経済軸の右側は経済的自由を好み、経済への国家の介入が少なく、規制が少ないことを特徴とする、
  より低い税金、そして企業や個人の生産、交換、消費のより大きな自由を特徴とする。繁栄の原動力として、自由市場、私有財産、競争を重視する立場である。他の選択肢は、経済軸の左側（強い国家介入）、または経済政策よりも個人的・社会的自由を扱う縦軸を説明するものである。
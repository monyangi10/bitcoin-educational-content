question: Cosa rappresenta il posizionamento sul lato destro dell'asse economico (verso 100)?
answer: Preferenza per la libertà economica con meno interventi statali, tasse più basse e mercati liberi
wrong_answers:
  - Preferenza per un forte intervento statale, con tasse elevate e servizi pubblici estesi
  - Concentrarsi sulle libertà personali, come la libertà di espressione e le scelte di vita individuali
  - Enfasi sui valori tradizionali, sulla sicurezza e sul mantenimento dell'ordine pubblico attraverso l'autorità
explanation: |
  Il lato destro dell'asse economico rappresenta la preferenza per la libertà economica, caratterizzata da un minore intervento dello Stato nell'economia, da un minor numero di regolamenti,
  tasse più basse e una maggiore libertà per le imprese e gli individui di produrre, scambiare e consumare. Questa posizione enfatizza il libero mercato, la proprietà privata e la concorrenza come motori della prosperità. Le altre opzioni descrivono il lato sinistro dell'asse economico (forte intervento dello Stato) o l'asse verticale che si occupa delle libertà personali/sociali piuttosto che delle politiche economiche.
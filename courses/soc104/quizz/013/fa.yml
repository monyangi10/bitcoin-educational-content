question: قرارگیری در سمت راست محور اقتصادی (به سمت 100) نشان‌دهنده چیست؟
answer: ترجیح آزادی اقتصادی با مداخله کمتر دولت، مالیات‌های پایین‌تر و بازارهای آزاد
wrong_answers:
  - ترجیح مداخله قوی دولت با مالیات‌های بالا و خدمات عمومی گسترده
  - بر آزادی‌های شخصی مانند آزادی بیان و انتخاب‌های سبک زندگی فردی تمرکز کنید.
  - تأکید بر ارزش‌های سنتی، امنیت و حفظ نظم عمومی از طریق اقتدار
explanation: |
  سمت راست محور اقتصادی نشان‌دهنده ترجیح برای آزادی اقتصادی است که با مداخله کمتر دولت در اقتصاد، مقررات کمتر، مالیات‌های پایین‌تر و آزادی بیشتر برای کسب‌وکارها و افراد برای تولید، مبادله و مصرف مشخص می‌شود. این موضع بر بازارهای آزاد، مالکیت خصوصی و رقابت به عنوان محرک‌های شکوفایی تأکید دارد. گزینه‌های دیگر سمت چپ محور اقتصادی (مداخله قوی دولت) یا محور عمودی که با آزادی‌های شخصی/اجتماعی به جای سیاست‌های اقتصادی سروکار دارد را توصیف می‌کنند.
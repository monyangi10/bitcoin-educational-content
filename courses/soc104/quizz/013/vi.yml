question: Việc định vị ở phía bên phải của trục kinh tế (hướng về 100) thể hiện điều gì?
answer: Ưu tiên tự do kinh tế với sự can thiệp của nhà nước ít hơn, thuế thấp hơn và thị trường tự do.
wrong_answers:
  - Ưu tiên sự can thiệp mạnh mẽ của nhà nước với thuế cao và dịch vụ công cộng rộng khắp.
  - Hãy tập trung vào các quyền tự do cá nhân như tự do ngôn luận và quyền lựa chọn lối sống cá nhân.
  - Nhấn mạnh các giá trị truyền thống, an ninh và duy trì trật tự công cộng thông qua quyền lực.
explanation: |
  Trục kinh tế phía bên phải thể hiện sự ưu tiên cho tự do kinh tế, đặc trưng bởi sự can thiệp ít hơn của nhà nước vào nền kinh tế, ít quy định hơn, thuế thấp hơn và tự do lớn hơn cho doanh nghiệp và cá nhân trong sản xuất, trao đổi và tiêu dùng. Quan điểm này nhấn mạnh thị trường tự do, quyền sở hữu tư nhân và cạnh tranh là động lực của sự thịnh vượng. Các lựa chọn khác mô tả trục kinh tế phía bên trái (sự can thiệp mạnh mẽ của nhà nước) hoặc trục dọc liên quan đến tự do cá nhân/xã hội hơn là các chính sách kinh tế.
question: Co představuje umístění na pravé straně ekonomické osy (směrem ke 100)?
answer: Preference ekonomické svobody s menšími zásahy státu, nižšími daněmi a volným trhem
wrong_answers:
  - Preference silných státních zásahů s vysokými daněmi a rozsáhlými veřejnými službami
  - Zaměření na osobní svobody, jako je svoboda projevu a individuální volba životního stylu
  - Důraz na tradiční hodnoty, bezpečnost a udržování veřejného pořádku prostřednictvím autority
explanation: |
  Pravá strana ekonomické osy představuje preferenci ekonomické svobody, která se vyznačuje menšími zásahy státu do ekonomiky a menším počtem regulací,
  nižší daně a větší svoboda pro podniky a jednotlivce při výrobě, směně a spotřebě. Tato pozice zdůrazňuje volný trh, soukromé vlastnictví a konkurenci jako hnací sílu prosperity. Ostatní možnosti popisují levou stranu ekonomické osy (silné státní zásahy) nebo vertikální osu, která se zabývá spíše osobními/společenskými svobodami než hospodářskou politikou.
question: 经济轴右侧（朝向 100）的位置代表什么？
answer: 倾向于经济自由，减少国家干预、降低税收和自由市场
wrong_answers:
  - 倾向于国家通过高税收和广泛的公共服务进行强有力的干预
  - 关注表达自由和个人生活方式选择等个人自由
  - 强调传统价值观、安全和通过权威维护公共秩序
explanation: |
  经济轴的右侧代表对经济自由的偏好，其特点是国家对经济的干预较少，法规较少，税率较低，企业和个人的生产、交换和消费自由度较大、
  企业和个人有更大的生产、交换和消费自由。这一立场强调自由市场、私有财产和竞争是繁荣的驱动力。其他选项描述的是经济轴的左侧（国家干预强）或纵轴，涉及个人/社会自由而非经济政策。
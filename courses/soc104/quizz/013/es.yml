question: ¿Qué representa posicionarse a la derecha del eje económico (hacia 100)?
answer: Preferencia por la libertad económica con menos intervención estatal, impuestos más bajos y mercados libres
wrong_answers:
  - Preferencia por una fuerte intervención estatal con impuestos elevados y amplios servicios públicos
  - Centrarse en las libertades personales, como la libertad de expresión y las opciones individuales de estilo de vida
  - Énfasis en los valores tradicionales, la seguridad y el mantenimiento del orden público a través de la autoridad
explanation: |
  El lado derecho del eje económico representa la preferencia por la libertad económica, caracterizada por una menor intervención del Estado en la economía, menos regulaciones
  menos impuestos y mayor libertad para que las empresas y los individuos produzcan, intercambien y consuman. Esta posición hace hincapié en el libre mercado, la propiedad privada y la competencia como motores de la prosperidad. Las otras opciones describen el lado izquierdo del eje económico (fuerte intervención del Estado) o el eje vertical, que trata de las libertades personales/sociales más que de las políticas económicas.
question: Gushirwa ku ruhande rw’iburyo rw’umurongo w’ubutunzi (uja ku 100) bigereranya iki?
answer: Guhitamwo umwidegemvyo mu vy'ubutunzi ataco Leta yinjiramwo, imisoro igabanutse, n'amasoko yidegemvya
wrong_answers:
  - Guhitamwo gufasha Leta ikomeye n'imisoro myinshi n'ibikorwa vyinshi vya Leta
  - Kwibanda ku mwidegemvyo w'umuntu ku giti ciwe nk'umwidegemvyo wo kuvuga n'amahitamwo y'ubuzima bw'umuntu ku giti ciwe
  - Gushimika ku mico kama, umutekano, no kubungabunga urutonde rwa bose biciye ku butegetsi
explanation: |
  Uruhande rw’iburyo rw’umurongo w’ubutunzi rugereranya uguhitamwo umwidegemvyo w’ubutunzi, ugaragazwa n’uko Leta itagira ico ikora mu bukungu, amategeko make, 
  imisoro igabanuka, n’umwidegemvyo mwinshi w’ubudandaji n’abantu ku giti cabo wo guhingura, guhindura no gukoresha. Ico kibanza gishimika ku masoko y’uburenganzira, ku mutungo w’abantu ku giti cabo, no ku mahiganwa nk’ibituma umuntu atera imbere. Ayandi mahitamwo adondora uruhande rw’ibubamfu rw’umurongo w’ubutunzi (ugufasha kwa Leta gukomeye) canke umurongo uhagaze ukora ku mwidegemvyo w’umuntu ku giti ciwe/uw’ikibano aho gukora ku ngingo ngenderwako z’ubutunzi.
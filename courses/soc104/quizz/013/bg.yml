question: Какво представлява позиционирането в дясната част на икономическата ос (към 100)?
answer: Предпочитание за икономическа свобода с по-малко държавна намеса, по-ниски данъци и свободни пазари
wrong_answers:
  - Предпочитание към силна държавна намеса с високи данъци и широки обществени услуги
  - Фокус върху личните свободи, като свободата на изразяване и индивидуалния избор на начин на живот
  - Акцентиране върху традиционните ценности, сигурността и поддържането на обществения ред чрез властта
explanation: |
  Дясната страна на икономическата ос представлява предпочитание към икономическата свобода, която се характеризира с по-малка държавна намеса в икономиката и по-малко регулации,
  по-ниски данъци и по-голяма свобода на предприятията и хората да произвеждат, разменят и потребяват. Тази позиция набляга на свободните пазари, частната собственост и конкуренцията като двигатели на просперитета. Другите варианти описват лявата страна на икономическата ос (силна държавна намеса) или вертикалната ос, която се занимава по-скоро с личните/обществените свободи, отколкото с икономическите политики.
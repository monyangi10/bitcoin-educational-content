question: Mitä talousakselin oikealla puolella (kohti 100:aa) tapahtuva sijoittuminen tarkoittaa?
answer: Taloudellisen vapauden suosiminen vähemmällä valtion puuttumisella, alhaisemmilla veroilla ja vapailla markkinoilla
wrong_answers:
  - Valtion voimakkaan puuttumisen, korkeiden verojen ja laajojen julkisten palvelujen suosiminen
  - Keskitytään henkilökohtaisiin vapauksiin, kuten ilmaisunvapauteen ja yksilöllisiin elämäntapavalintoihin
  - Perinteisten arvojen, turvallisuuden ja yleisen järjestyksen ylläpitämisen korostaminen auktoriteetin avulla
explanation: |
  Taloudellisen akselin oikea puoli edustaa taloudellista vapautta, jolle on ominaista valtion vähäisempi puuttuminen talouteen ja vähemmän sääntelyä,
  alhaisemmat verot ja yritysten ja yksilöiden suurempi vapaus tuottaa, vaihtaa ja kuluttaa. Tämä kanta korostaa vapaita markkinoita, yksityisomaisuutta ja kilpailua vaurauden moottorina. Muut vaihtoehdot kuvaavat talousakselin vasenta puolta (voimakas valtion puuttuminen) tai pystyakselia, joka käsittelee pikemminkin henkilökohtaisia/yhteiskunnallisia vapauksia kuin talouspolitiikkaa.
question: Apa yang diwakili oleh posisi di sisi kanan sumbu ekonomi (ke arah 100)?
answer: Preferensi untuk kebebasan ekonomi dengan intervensi negara yang lebih sedikit, pajak yang lebih rendah, dan pasar bebas
wrong_answers:
  - Preferensi untuk keterlibatan negara yang kuat dengan pajak yang tinggi dan layanan publik yang luas
  - Fokus pada kebebasan pribadi seperti kebebasan berekspresi dan pilihan gaya hidup individu
  - Penekanan pada nilai-nilai tradisional, keamanan, dan menjaga ketertiban umum melalui otoritas
explanation: |
  Sisi kanan dari poros ekonomi mewakili preferensi untuk kebebasan ekonomi, yang ditandai dengan lebih sedikit intervensi negara dalam perekonomian, lebih sedikit peraturan,
  pajak yang lebih rendah, dan kebebasan yang lebih besar bagi bisnis dan individu untuk memproduksi, bertukar, dan mengkonsumsi. Posisi ini menekankan pasar bebas, kepemilikan pribadi, dan kompetisi sebagai pendorong kemakmuran. Pilihan lainnya menggambarkan sisi kiri sumbu ekonomi (intervensi negara yang kuat) atau sumbu vertikal yang berhubungan dengan kebebasan pribadi/masyarakat daripada kebijakan ekonomi.

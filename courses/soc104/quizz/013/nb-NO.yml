question: Hva betyr plasseringen på høyre side av den økonomiske aksen (mot 100)?
answer: Preferanse for økonomisk frihet med mindre statlig inngripen, lavere skatter og frie markeder
wrong_answers:
  - Preferanse for sterk statlig inngripen med høye skatter og omfattende offentlige tjenester
  - Fokus på personlige friheter som ytringsfrihet og individuelle livsstilsvalg
  - Vektlegging av tradisjonelle verdier, sikkerhet og opprettholdelse av offentlig orden gjennom autoritet
explanation: |
  Den høyre siden av den økonomiske aksen representerer en preferanse for økonomisk frihet, som kjennetegnes av mindre statlig inngripen i økonomien, færre reguleringer,
  lavere skatter og større frihet for bedrifter og enkeltpersoner til å produsere, utveksle og forbruke. Denne posisjonen vektlegger frie markeder, privat eiendom og konkurranse som drivkrefter for velstand. De andre alternativene beskriver den venstre siden av den økonomiske aksen (sterk statlig inngripen) eller den vertikale aksen, som handler om personlige/samfunnsmessige friheter snarere enn økonomisk politikk.
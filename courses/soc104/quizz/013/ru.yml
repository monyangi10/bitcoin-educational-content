question: Что означает позиционирование по правую сторону экономической оси (в направлении 100)?
answer: Предпочитает экономическую свободу с меньшим вмешательством государства, более низкими налогами и свободными рынками
wrong_answers:
  - Предпочитает сильное государственное вмешательство с высокими налогами и обширными государственными услугами
  - Сосредоточьтесь на личных свободах, таких как свобода самовыражения и индивидуальный выбор образа жизни
  - Упор на традиционные ценности, безопасность и поддержание общественного порядка с помощью власти
explanation: |
  Правая сторона экономической оси отражает предпочтение экономической свободы, характеризующейся меньшим вмешательством государства в экономику, меньшим количеством нормативных актов,
  меньшими налогами и большей свободой для предприятий и частных лиц в производстве, обмене и потреблении. Эта позиция подчеркивает, что свободные рынки, частная собственность и конкуренция являются движущими силами процветания. Остальные варианты описывают левую сторону экономической оси (сильное государственное вмешательство) или вертикальную ось, которая имеет дело с личными/общественными свободами, а не с экономической политикой.
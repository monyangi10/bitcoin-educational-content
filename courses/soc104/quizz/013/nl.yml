question: Wat betekent positionering aan de rechterkant van de economische as (richting 100)?
answer: Voorkeur voor economische vrijheid met minder staatsinterventie, lagere belastingen en vrije markten
wrong_answers:
  - Voorkeur voor sterke staatsinterventie met hoge belastingen en uitgebreide openbare diensten
  - Focus op persoonlijke vrijheden zoals vrijheid van meningsuiting en individuele levensstijlkeuzes
  - Nadruk op traditionele waarden, veiligheid en handhaving van de openbare orde door middel van autoriteit
explanation: |
  De rechterkant van de economische as vertegenwoordigt een voorkeur voor economische vrijheid, gekenmerkt door minder staatsinterventie in de economie, minder regels,
  lagere belastingen en meer vrijheid voor bedrijven en individuen om te produceren, ruilen en consumeren. Deze positie benadrukt vrije markten, privé-eigendom en concurrentie als drijvende krachten achter welvaart. De andere opties beschrijven de linkerkant van de economische as (sterke staatsinterventie) of de verticale as die gaat over persoonlijke/maatschappelijke vrijheden in plaats van economisch beleid.
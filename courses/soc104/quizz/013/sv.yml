question: Vad innebär en positionering på höger sida av den ekonomiska axeln (mot 100)?
answer: Preferens för ekonomisk frihet med mindre statlig inblandning, lägre skatter och fria marknader
wrong_answers:
  - Preferens för stark statlig inblandning med höga skatter och omfattande offentliga tjänster
  - Fokus på personliga friheter som yttrandefrihet och individuella livsstilsval
  - Tonvikt på traditionella värderingar, säkerhet och upprätthållande av allmän ordning genom auktoritet
explanation: |
  Den högra sidan av den ekonomiska axeln representerar preferens för ekonomisk frihet, som kännetecknas av mindre statlig inblandning i ekonomin, färre regleringar,
  lägre skatter och större frihet för företag och individer att producera, byta och konsumera. Denna position betonar fria marknader, privat egendom och konkurrens som drivkrafter för välstånd. De andra alternativen beskriver den vänstra sidan av den ekonomiska axeln (stark statlig inblandning) eller den vertikala axeln som handlar om personliga/samhälleliga friheter snarare än ekonomisk politik.
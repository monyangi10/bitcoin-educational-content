question: Was bedeutet die Positionierung auf der rechten Seite der Wirtschaftsachse (in Richtung 100)?
answer: Vorliebe für wirtschaftliche Freiheit mit weniger staatlichen Eingriffen, niedrigeren Steuern und freien Märkten
wrong_answers:
  - Vorliebe für starke staatliche Eingriffe mit hohen Steuern und umfangreichen öffentlichen Dienstleistungen
  - Fokus auf persönliche Freiheiten wie Meinungsfreiheit und individuelle Lebensstilentscheidungen
  - Betonung der traditionellen Werte, der Sicherheit und der Aufrechterhaltung der öffentlichen Ordnung durch Autorität
explanation: |
  Die rechte Seite der Wirtschaftsachse steht für die Präferenz für wirtschaftliche Freiheit, die durch weniger staatliche Eingriffe in die Wirtschaft, weniger Vorschriften
  niedrigere Steuern und eine größere Freiheit für Unternehmen und Einzelpersonen, zu produzieren, zu tauschen und zu konsumieren. Diese Position betont freie Märkte, Privateigentum und Wettbewerb als Triebkräfte des Wohlstands. Die anderen Optionen beschreiben die linke Seite der Wirtschaftsachse (starke staatliche Eingriffe) oder die vertikale Achse, die sich eher mit persönlichen/gesellschaftlichen Freiheiten als mit der Wirtschaftspolitik befasst.
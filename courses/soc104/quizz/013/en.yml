question: What does positioning on the right side of the economic axis (towards 100) represent?
answer: Preference for economic freedom with less state intervention, lower taxes, and free markets
wrong_answers:
  - Preference for strong state intervention with high taxes and extensive public services
  - Focus on personal freedoms like freedom of expression and individual lifestyle choices
  - Emphasis on traditional values, security, and maintaining public order through authority
explanation: |
  The right side of the economic axis represents preference for economic freedom, characterized by less state intervention in the economy, fewer regulations, 
  lower taxes, and greater freedom for businesses and individuals to produce, exchange, and consume. This position emphasizes free markets, private property, and competition as drivers of prosperity. The other options describe the left side of the economic axis (strong state intervention) or the vertical axis which deals with personal/societal freedoms rather than economic policies.

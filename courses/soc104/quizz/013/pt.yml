question: O que representa o posicionamento do lado direito do eixo económico (em direção a 100)?
answer: Preferência pela liberdade económica com menos intervenção do Estado, impostos mais baixos e mercados livres
wrong_answers:
  - Preferência por uma forte intervenção do Estado, com impostos elevados e serviços públicos alargados
  - Foco nas liberdades pessoais, como a liberdade de expressão e as escolhas individuais de estilo de vida
  - Ênfase nos valores tradicionais, na segurança e na manutenção da ordem pública através da autoridade
explanation: |
  O lado direito do eixo económico representa a preferência pela liberdade económica, caracterizada por uma menor intervenção do Estado na economia, menos regulamentação,
  impostos mais baixos e maior liberdade para as empresas e os indivíduos produzirem, trocarem e consumirem. Esta posição dá ênfase aos mercados livres, à propriedade privada e à concorrência como factores de prosperidade. As outras opções descrevem o lado esquerdo do eixo económico (forte intervenção do Estado) ou o eixo vertical, que trata das liberdades pessoais/societais e não das políticas económicas.
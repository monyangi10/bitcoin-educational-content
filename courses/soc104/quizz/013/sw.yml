question: Je, msimamo upande wa kulia wa mhimili wa kiuchumi (kuelekea 100) unawakilisha nini?
answer: Upendeleo kwa uhuru wa kiuchumi bila kuingilia kati kwa serikali, kodi ndogo, na masoko huru
wrong_answers:
  - Upendeleo kwa uingiliaji kati mkali wa serikali na kodi kubwa na huduma kubwa za umma
  - Zingatia uhuru wa kibinafsi kama vile uhuru wa kujieleza na chaguo za mtindo wa maisha wa mtu binafsi
  - Msisitizo juu ya maadili ya kitamaduni, usalama, na kudumisha utulivu wa umma kupitia mamlaka
explanation: |
  Upande wa kulia wa mhimili wa kiuchumi unawakilisha upendeleo wa uhuru wa kiuchumi, unaoonyeshwa na uingiliaji mdogo wa serikali katika uchumi, kanuni chache, kodi ndogo, na uhuru mkubwa kwa biashara na watu binafsi kuzalisha, kubadilishana, na kutumia. Msimamo huu unasisitiza masoko huria, mali binafsi, na ushindani kama vichocheo vya ustawi. Chaguzi zingine zinaelezea upande wa kushoto wa mhimili wa kiuchumi (uingiliaji mkali wa serikali) au mhimili wima unaoshughulikia uhuru wa kibinafsi/kijamii badala ya sera za kiuchumi.
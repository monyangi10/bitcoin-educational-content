question: 定位在經濟軸的右側（朝向 100）代表什麼？
answer: 偏好較少國家干預、較低稅率和自由市場的經濟自由
wrong_answers:
  - 偏好強力的國家干預、高稅率和廣泛的公共服務
  - 重視個人自由，例如表達自由和個人生活方式的選擇
  - 強調傳統價值、安全，以及透過權力維持公共秩序
explanation: |
  經濟軸的右側代表偏好經濟自由，其特點是國家對經濟的干預較少，法規較少、
  較低的稅率，以及企業與個人在生產、交換與消費上較大的自由度。這個立場強調自由市場、私有財產和競爭是繁榮的動力。其他選項描述的是經濟軸的左側（強烈的國家干預）或縱軸，處理的是個人/社會自由而非經濟政策。
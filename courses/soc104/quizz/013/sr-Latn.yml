question: Šta predstavlja pozicioniranje na desnoj strani ekonomske ose (prema 100)?
answer: Preferencija za ekonomsku slobodu sa manje državne intervencije, nižim porezima i slobodnim tržištima
wrong_answers:
  - Preferencija za snažnu državnu intervenciju sa visokim porezima i obimnim javnim uslugama
  - Fokusirajte se na lične slobode kao što su sloboda izražavanja i izbori u vezi sa individualnim stilom života
  - Naglasak na tradicionalnim vrednostima, bezbednosti i održavanju javnog reda kroz autoritet
explanation: |
  Desna strana ekonomske ose predstavlja preferenciju za ekonomsku slobodu, koju karakteriše manje državne intervencije u ekonomiji, manje regulacija, niži porezi i veća sloboda za preduzeća i pojedince da proizvode, razmenjuju i konzumiraju. Ova pozicija naglašava slobodna tržišta, privatnu svojinu i konkurenciju kao pokretače prosperiteta. Druge opcije opisuju levu stranu ekonomske ose (snažna državna intervencija) ili vertikalnu osu koja se bavi ličnim/društvenim slobodama, a ne ekonomskim politikama.
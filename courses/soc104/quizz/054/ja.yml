question: 武力の行使に関して、リバタリアンと他の政治哲学を区別する基本原則は何か？
answer: 自衛の場合を除き、他者に対して武力を行使することを禁じる不可侵原則
wrong_answers:
  - 社会秩序を維持するために力を測ることができる比例反応の原理
  - 集団安全保障原則は、民主的多数決で承認された場合に武力を容認するものである。
  - 社会にとって最大の利益をもたらす場合に武力を正当化する功利主義原理
explanation: |
  不可侵原則はリバタリアン哲学の根幹であり、何人も他人やその財産に対して物理的な力を行使したり、脅したりする権利を持たないというものである。
  権利を有しないというものである。このため、詐欺、窃盗、強要は道徳的に間違っており、武力は正当防衛の場合にのみ正当化される。この原則は、政府を含むすべての個人と集団に等しく適用され、私人が行えば不道徳とみなされる行為を国家が行うことを特別に許可することは拒否される。
question: Apa prinsip dasar yang membedakan libertarian dengan filosofi politik lainnya dalam hal penggunaan kekerasan?
answer: Prinsip non-agresi, yang melarang penggunaan kekerasan terhadap orang lain kecuali untuk membela diri
wrong_answers:
  - Prinsip respons proporsional, yang memungkinkan kekuatan terukur untuk menjaga ketertiban sosial
  - Prinsip keamanan kolektif, yang mengizinkan penggunaan kekerasan jika disetujui oleh mayoritas demokratis
  - Prinsip utilitarian, yang membenarkan penggunaan kekerasan ketika hal itu menghasilkan kebaikan terbesar bagi masyarakat
explanation: |
  Prinsip non-agresi adalah landasan filosofi libertarian, yang menyatakan bahwa tidak seorang pun memiliki hak untuk memulai atau mengancam dengan kekerasan fisik
  terhadap orang lain atau properti mereka. Hal ini membuat penipuan, pencurian, dan pemaksaan menjadi salah secara moral, dan kekerasan hanya dibenarkan untuk membela diri. Prinsip ini berlaku sama untuk semua individu dan kelompok, termasuk pemerintah, menolak setiap izin khusus bagi negara untuk melakukan tindakan yang akan dianggap tidak bermoral jika dilakukan oleh individu pribadi.
question: Milline on põhiprintsiip, mis eristab libertaarlasi teistest poliitilistest filosoofiatest seoses jõu kasutamisega?
answer: Mitteagressiooni põhimõte, mis keelab teiste vastu jõu kasutamise, välja arvatud enesekaitseks
wrong_answers:
  - Proportsionaalse reageerimise põhimõte, mis võimaldab mõõdetud jõuga säilitada sotsiaalset korda
  - Kollektiivse julgeoleku põhimõte, mis lubab jõudu, kui see on heaks kiidetud demokraatliku enamuse poolt
  - Utilitaristlik põhimõte, mis õigustab jõudu, kui see toob ühiskonnale kõige suuremat kasu
explanation: |
  Mitteagressiooni põhimõte on libertaarne filosoofia nurgakivi, mis ütleb, et kellelgi ei ole õigust algatada või ähvardada füüsilist jõudu
  teise inimese või tema vara vastu. See muudab pettuse, varguse ja sundimise moraalselt vääraks, kusjuures jõud on õigustatud ainult enesekaitseks. See põhimõte kehtib võrdselt kõigi üksikisikute ja rühmade, sealhulgas valitsuse suhtes, lükates tagasi igasuguse erilise loa riigile sooritada tegusid, mida eraisikute poolt sooritatuna peetaks ebamoraalseks.
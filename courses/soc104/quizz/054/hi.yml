question: बल प्रयोग के संबंध में स्वतंत्रतावादियों को अन्य राजनीतिक दर्शनों से अलग करने वाला मूलभूत सिद्धांत क्या है?
answer: अहिंसा का सिद्धांत, जो आत्मरक्षा को छोड़कर दूसरों के खिलाफ बल प्रयोग शुरू करने पर रोक लगाता है।
wrong_answers:
  - आनुपातिक प्रतिक्रिया का सिद्धांत, जो सामाजिक व्यवस्था बनाए रखने के लिए नियंत्रित बल का उपयोग करने की अनुमति देता है।
  - सामूहिक सुरक्षा सिद्धांत, जो लोकतांत्रिक बहुमत द्वारा अनुमोदित होने पर बल प्रयोग की अनुमति देता है।
  - उपयोगितावादी सिद्धांत, जो बल प्रयोग को तब उचित ठहराता है जब वह समाज के लिए सबसे बड़ा लाभ उत्पन्न करता है।
explanation: |
  अहिंसा का सिद्धांत स्वतंत्रतावादी दर्शन का आधार है, जो कहता है कि किसी को भी किसी अन्य व्यक्ति या उसकी संपत्ति के विरुद्ध शारीरिक बल का प्रयोग करने या उसकी धमकी देने का अधिकार नहीं है।
  इससे धोखाधड़ी, चोरी और जबरदस्ती नैतिक रूप से गलत हो जाते हैं, और केवल आत्मरक्षा में ही बल का प्रयोग उचित है। यह सिद्धांत सरकार सहित सभी व्यक्तियों और समूहों पर समान रूप से लागू होता है, और राज्य को ऐसे कार्य करने की कोई विशेष अनुमति नहीं देता है जिन्हें निजी व्यक्तियों द्वारा किए जाने पर अनैतिक माना जाएगा।
question: หลักการพื้นฐานที่แยกเสรีนิยมออกจากปรัชญาการเมืองอื่น ๆ เกี่ยวกับการใช้กำลังคืออะไร?
answer: หลักการไม่รุกราน ซึ่งห้ามการใช้กำลังกับผู้อื่น ยกเว้นเพื่อการป้องกันตัว
wrong_answers:
  - หลักการของการตอบสนองอย่างได้สัดส่วน ซึ่งอนุญาตให้ใช้กำลังอย่างพอเหมาะเพื่อรักษาความสงบเรียบร้อยในสังคม
  - หลักการความมั่นคงร่วมกัน ซึ่งอนุญาตให้ใช้กำลังเมื่อได้รับการอนุมัติจากเสียงข้างมากในระบอบประชาธิปไตย
  - หลักการประโยชน์นิยม ซึ่งให้เหตุผลในการใช้กำลังเมื่อมันก่อให้เกิดประโยชน์สูงสุดต่อสังคม
explanation: |
  หลักการไม่รุกรานเป็นรากฐานของปรัชญาเสรีนิยม โดยระบุว่าไม่มีใครมีสิทธิ์ที่จะเริ่มต้นหรือข่มขู่การใช้กำลังทางกายภาพต่อบุคคลอื่นหรือทรัพย์สินของพวกเขา สิ่งนี้ทำให้การฉ้อโกง การขโมย และการบีบบังคับเป็นสิ่งที่ผิดศีลธรรม โดยการใช้กำลังจะได้รับการยอมรับเฉพาะในกรณีป้องกันตัวเองเท่านั้น หลักการนี้ใช้กับบุคคลและกลุ่มทุกคนอย่างเท่าเทียมกัน รวมถึงรัฐบาล โดยปฏิเสธการอนุญาตพิเศษใด ๆ สำหรับรัฐในการกระทำที่ถือว่าผิดศีลธรรมถ้าทำโดยบุคคลทั่วไป
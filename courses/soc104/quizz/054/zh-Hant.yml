question: 在使用武力方面，自由主義者有別於其他政治哲學的基本原則是什麼？
answer: 除自衛外禁止對他人使用武力的不侵略原則
wrong_answers:
  - 比例反應原則，讓量力維持社會秩序
  - 集體安全原則允許在民主多數同意的情況下使用武力
  - 功利主義原則，當武力能為社會帶來最大的利益時，它就是合理的。
explanation: |
  不侵犯原則是自由主義哲學的基石，說明任何人都無權對他人或其財產使用武力或威脅使用武力。
  對他人或其財產使用武力或威脅使用武力。這使得欺詐、盜竊和強迫在道德上是錯誤的，只有在自衛時武力才是正當的。這項原則同樣適用於所有個人和團體，包括政府，摒棄任何特別允許國家做出的行為，這些行為若由私人做出會被視為不道德。
question: Koji je temeljni princip koji razlikuje libertarijance od drugih političkih filozofija u pogledu upotrebe sile?
answer: Načelo nenapadanja, koje zabranjuje iniciranje sile protiv drugih osim u samoodbrani
wrong_answers:
  - Princip propocionalnog odgovora, koji omogućava merenu silu za održavanje društvenog reda
  - Princip principa kolektivne bezbednosti, koji dozvoljava upotrebu sile kada je odobrena od strane demokratske većine
  - Utilitaristički princip, koji opravdava upotrebu sile kada proizvodi najveće dobro za društvo
explanation: |
  Načelo nenapadanja je kamen temeljac libertarijanske filozofije, koje kaže da niko nema pravo da započne ili preti fizičkom silom protiv druge osobe ili njihove imovine. Ovo čini prevaru, krađu i prinudu moralno pogrešnim, a sila je opravdana samo u samoodbrani. Ovo načelo se podjednako primenjuje na sve pojedince i grupe, uključujući vladu, odbacujući bilo kakvu posebnu dozvolu za državu da počini dela koja bi bila smatrana nemoralnim ako ih učine privatni pojedinci.
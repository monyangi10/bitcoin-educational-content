question: اصل اساسی که لیبرترین‌ها را از دیگر فلسفه‌های سیاسی در مورد استفاده از زور متمایز می‌کند چیست؟
answer: اصل عدم تجاوز، که ممنوعیت آغاز خشونت علیه دیگران را به جز در دفاع از خود مقرر می‌کند
wrong_answers:
  - اصل پاسخ متناسب، که به نیروی سنجیده اجازه می‌دهد تا نظم اجتماعی را حفظ کند
  - اصل امنیت جمعی، که استفاده از زور را زمانی که توسط اکثریت دموکراتیک تأیید شود، مجاز می‌داند
  - اصل فایده‌گرایی، که استفاده از زور را زمانی توجیه می‌کند که بیشترین خیر را برای جامعه به همراه داشته باشد
explanation: |
  اصل عدم تجاوز، سنگ‌بنای فلسفه لیبرترین است که بیان می‌کند هیچ‌کس حق ندارد به‌طور فیزیکی به شخص دیگری یا اموال او حمله کند یا تهدید کند. این اصل، تقلب، دزدی و اجبار را از نظر اخلاقی نادرست می‌داند و استفاده از زور را تنها در دفاع از خود توجیه می‌کند. این اصل به‌طور مساوی برای همه افراد و گروه‌ها، از جمله دولت، اعمال می‌شود و هرگونه اجازه ویژه برای دولت جهت انجام اعمالی که اگر توسط افراد خصوصی انجام شود غیراخلاقی محسوب می‌شود را رد می‌کند.
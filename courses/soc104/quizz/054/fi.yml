question: Mikä on se perusperiaate, joka erottaa libertaristit muista poliittisista filosofioista voimankäytön osalta?
answer: Hyökkäämättömyysperiaate, joka kieltää voimakeinojen käyttämisen muita vastaan, paitsi itsepuolustustarkoituksessa
wrong_answers:
  - Suhteellisen reagoinnin periaate, joka mahdollistaa mitatun voiman käyttämisen sosiaalisen järjestyksen ylläpitämiseksi
  - Kollektiivisen turvallisuuden periaate, joka sallii voimankäytön, kun demokraattinen enemmistö hyväksyy sen
  - Utilitaristinen periaate, jonka mukaan voimankäyttö on oikeutettua silloin, kun se tuottaa yhteiskunnalle suurimman hyödyn
explanation: |
  Hyökkäyskiellon periaate on libertaristisen filosofian kulmakivi, jonka mukaan kenelläkään ei ole oikeutta aloittaa fyysistä voimankäyttöä tai uhata sillä
  toista henkilöä tai hänen omaisuuttaan vastaan. Tämä tekee petoksesta, varkaudesta ja pakottamisesta moraalisesti väärin, ja voimankäyttö on oikeutettua vain itsepuolustuksessa. Tämä periaate koskee yhtä lailla kaikkia yksilöitä ja ryhmiä, myös hallitusta, ja se ei anna valtiolle erityistä lupaa tehdä tekoja, joita yksityishenkilöt tekisivät moraalittomina.
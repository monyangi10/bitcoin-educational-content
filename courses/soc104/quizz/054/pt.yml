question: Qual é o princípio fundamental que distingue os libertários de outras filosofias políticas no que respeita ao uso da força?
answer: O princípio da não agressão, que proíbe o recurso à força contra outros, exceto em legítima defesa
wrong_answers:
  - O princípio da resposta proporcional, que permite que a força medida mantenha a ordem social
  - O princípio da segurança colectiva, que permite o uso da força quando aprovado pela maioria democrática
  - O princípio utilitarista, que justifica a força quando esta produz o maior bem para a sociedade
explanation: |
  O princípio da não agressão é a pedra angular da filosofia libertária, afirmando que ninguém tem o direito de iniciar ou ameaçar com força física
  contra outra pessoa ou contra os seus bens. Isto torna a fraude, o roubo e a coerção moralmente errados, sendo a força apenas justificada em auto-defesa. Este princípio aplica-se igualmente a todos os indivíduos e grupos, incluindo o governo, rejeitando qualquer autorização especial para o Estado cometer actos que seriam considerados imorais se fossem praticados por indivíduos privados.
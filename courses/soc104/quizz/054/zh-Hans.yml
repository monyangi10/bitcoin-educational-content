question: 在使用武力方面，自由主义者区别于其他政治哲学的基本原则是什么？
answer: 非自卫情况下禁止对他人使用武力的互不侵犯原则
wrong_answers:
  - 比例反应原则，使有分寸的力量能够维持社会秩序
  - 集体安全原则允许在民主多数批准的情况下使用武力
  - 功利主义原则：当武力能为社会带来最大利益时，它就是合理的
explanation: |
  不侵犯原则是自由主义哲学的基石，它规定任何人都无权对他人或其财产使用或威胁使用武力。
  对他人或其财产使用武力或威胁使用武力。因此，欺诈、盗窃和胁迫在道德上都是错误的，只有在自卫时使用武力才是正当的。这一原则同样适用于包括政府在内的所有个人和团体，拒绝允许国家实施如果由个人实施则会被视为不道德的行为。
question: Nguyên tắc cơ bản nào phân biệt chủ nghĩa tự do với các triết lý chính trị khác về việc sử dụng vũ lực?
answer: Nguyên tắc không gây hấn, cấm sử dụng vũ lực chống lại người khác trừ trường hợp tự vệ.
wrong_answers:
  - Nguyên tắc phản ứng tương xứng, cho phép sử dụng lực lượng có chừng mực để duy trì trật tự xã hội.
  - Nguyên tắc an ninh tập thể, cho phép sử dụng vũ lực khi được đa số dân chủ chấp thuận.
  - Nguyên tắc vị lợi, biện minh cho việc sử dụng vũ lực khi nó mang lại lợi ích lớn nhất cho xã hội.
explanation: |
  Nguyên tắc không gây hấn là nền tảng của triết học tự do, khẳng định rằng không ai có quyền khởi xướng hoặc đe dọa sử dụng vũ lực đối với người khác hoặc tài sản của họ. Điều này khiến cho gian lận, trộm cắp và cưỡng bức trở nên sai trái về mặt đạo đức, chỉ cho phép sử dụng vũ lực để tự vệ. Nguyên tắc này áp dụng bình đẳng cho tất cả các cá nhân và nhóm, bao gồm cả chính phủ, bác bỏ bất kỳ sự cho phép đặc biệt nào cho nhà nước thực hiện các hành vi mà nếu do cá nhân thực hiện sẽ bị coi là vô đạo đức.
question: Jaka jest podstawowa zasada, która odróżnia libertarian od innych filozofii politycznych w odniesieniu do użycia siły?
answer: Zasada nieagresji, która zabrania inicjowania siły przeciwko innym, z wyjątkiem samoobrony
wrong_answers:
  - Zasada proporcjonalnej reakcji, która pozwala mierzonej sile utrzymać porządek społeczny
  - Zasada zbiorowego bezpieczeństwa, która zezwala na użycie siły, gdy zostanie zatwierdzona przez demokratyczną większość
  - Zasada utylitaryzmu, która usprawiedliwia użycie siły, gdy przynosi to największe dobro dla społeczeństwa
explanation: |
  Zasada nieagresji jest kamieniem węgielnym filozofii libertariańskiej, stwierdzając, że nikt nie ma prawa inicjować lub grozić użyciem siły fizycznej wobec innej osoby lub jej własności
  wobec innej osoby lub jej własności. Sprawia to, że oszustwo, kradzież i przymus są moralnie złe, a siła jest uzasadniona tylko w samoobronie. Zasada ta odnosi się w równym stopniu do wszystkich osób i grup, w tym rządu, odrzucając wszelkie specjalne zezwolenia dla państwa na popełnianie czynów, które byłyby uważane za niemoralne, gdyby zostały popełnione przez osoby prywatne.
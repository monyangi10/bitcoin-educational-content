question: Ni ingingo ngenderwako iyihe y’ishimikiro itandukanya abaharanira umwidegemvyo n’izindi filozofiya za politike ku bijanye n’ugukoresha inguvu?
answer: Ingingo ngenderwako y’ukudatera, ibuza gutangura gukoresha inguvu ku bandi kiretse mu kwikingira .
wrong_answers:
  - Ingingo ngenderwako y’inyishu ihuye, ituma inguvu zigereranywa ziguma zifise urutonde rw’imibano
  - Ingingo ngenderwako y’umutekano rusangi, yemerera inguvu iyo yemejwe n’abademokrate benshi
  - Ingingo ngenderwako y’ubuhinga, ishingira intahe inguvu iyo zizana ivyiza vyinshi kuruta ibindi vyose ku kibano .
explanation: |
  Ingingo ngenderwako y’ukudatera ni ryo buye ry’imfuruka ry’ubuhinga bwo kwidegemvya, rivuga ko ata n’umwe afise uburenganzira bwo gutanguza canke gutera ubwoba inguvu z’umubiri .
  ku wundi muntu canke ku mutungo wiwe. Ivyo bituma ubuhendanyi, ubusuma be n’uguhatira abantu biba bibi mu vy’inyifato runtu, inguvu zikaba zibereye gusa mu kwikingira. Iryo hame rikoreshwa kimwe ku bantu bose n’imigwi yose, harimwo na Leta, ryanka uruhusha rwose rudasanzwe Leta ishobora guhabwa ngo ikore ibikorwa vyobonwa ko ari ubusambanyi iyo bikozwe n’abantu ku giti cabo.
question: What is the fundamental principle that distinguishes libertarians from other political philosophies regarding the use of force?
answer: The non-aggression principle, which prohibits initiating force against others except in self-defense
wrong_answers:
  - The principle of proportional response, which allows measured force to maintain social order
  - The collective security principle, which permits force when approved by democratic majority
  - The utilitarian principle, which justifies force when it produces the greatest good for society
explanation: |
  The non-aggression principle is the cornerstone of libertarian philosophy, stating that no one has the right to initiate or threaten physical force against another person or their property. This makes fraud, theft, and coercion morally wrong, with force only justified in self-defense. This principle applies equally to all individuals and groups, including government, rejecting any special permission for the state to commit acts that would be considered immoral if done by private individuals.

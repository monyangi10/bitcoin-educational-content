question: Jaký je základní princip, který libertariány odlišuje od jiných politických filozofií, pokud jde o použití síly?
answer: Zásada neútočení, která zakazuje použití síly proti jiným osobám s výjimkou sebeobrany
wrong_answers:
  - Princip proporcionální reakce, který umožňuje měrnou silou udržovat společenský řád
  - Zásada kolektivní bezpečnosti, která povoluje použití síly, pokud je schválena demokratickou většinou
  - Utilitaristický princip, který ospravedlňuje použití síly, pokud přináší největší dobro pro společnost
explanation: |
  Zásada neútočení je základním kamenem libertariánské filozofie, která říká, že nikdo nemá právo iniciovat fyzickou sílu nebo jí hrozit
  proti jiné osobě nebo jejímu majetku. Podvod, krádež a nátlak jsou proto morálně špatné a použití síly je ospravedlnitelné pouze v případě sebeobrany. Tato zásada platí stejně pro všechny jednotlivce i skupiny, včetně vlády, a odmítá jakékoliv zvláštní oprávnění státu páchat činy, které by byly považovány za nemorální, kdyby je páchali soukromé osoby.
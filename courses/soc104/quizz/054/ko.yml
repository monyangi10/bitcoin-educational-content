question: 무력 사용과 관련하여 자유주의자들이 다른 정치 철학과 구별되는 근본적인 원칙은 무엇인가요?
answer: 정당방위를 제외하고 타인에게 무력을 행사하는 것을 금지하는 비침략성 원칙
wrong_answers:
  - 사회 질서를 유지하기 위해 측정된 힘을 허용하는 비례 대응의 원칙
  - 민주적 다수에 의해 승인된 경우 무력을 허용하는 집단 안보 원칙
  - 공리주의 원칙은 사회에 가장 큰 이익을 가져올 때 무력을 정당화하는 원칙입니다
explanation: |
  비침략 원칙은 자유주의 철학의 초석으로, 누구도 다른 사람이나 재산에 대해 물리력을 행사하거나 위협할 권리가
  물리력을 행사하거나 위협할 권리가 없다는 원칙입니다. 따라서 사기, 절도, 강압은 도덕적으로 잘못된 행위이며, 무력은 정당방위의 경우에만 정당화됩니다. 이 원칙은 정부를 포함한 모든 개인과 단체에 동일하게 적용되며, 개인이 행할 경우 부도덕한 행위로 간주될 수 있는 행위를 국가가 특별히 허가하는 것을 거부합니다.
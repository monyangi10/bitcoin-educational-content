question: Güç kullanımı konusunda liberteryenleri diğer siyasi felsefelerden ayıran temel ilke nedir?
answer: Meşru müdafaa dışında başkalarına karşı güç kullanılmasını yasaklayan saldırmazlık ilkesi
wrong_answers:
  - Ölçülü gücün sosyal düzeni korumasını sağlayan orantılı tepki ilkesi
  - Demokratik çoğunluk tarafından onaylandığında kuvvete izin veren kolektif güvenlik ilkesi
  - Toplum için en büyük faydayı ürettiğinde gücü haklı çıkaran faydacı ilke
explanation: |
  Saldırmazlık ilkesi liberteryen felsefenin temel taşıdır ve kimsenin fiziksel güç kullanma ya da tehdit etme hakkına sahip olmadığını belirtir
  başka bir kişiye veya mallarına karşı. Bu da dolandırıcılık, hırsızlık ve zorlamayı ahlaki açıdan yanlış kılar ve güç kullanımı yalnızca meşru müdafaa durumunda haklı görülebilir. Bu ilke, devlet de dahil olmak üzere tüm bireyler ve gruplar için eşit derecede geçerlidir ve özel şahıslar tarafından yapılması halinde ahlaka aykırı kabul edilecek eylemlerin devlet tarafından yapılmasına özel olarak izin verilmesini reddeder.
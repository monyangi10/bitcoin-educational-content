question: Ni kanuni gani ya msingi inayowatofautisha wanaharakati wa uhuru na falsafa zingine za kisiasa kuhusu matumizi ya nguvu?
answer: Kanuni ya kutotumia nguvu, inayokataza kuanzisha nguvu dhidi ya wengine isipokuwa kwa kujilinda
wrong_answers:
  - Kanuni ya mwitikio sawia, ambayo inaruhusu nguvu iliyopimwa kudumisha utaratibu wa kijamii
  - Kanuni ya usalama wa pamoja, ambayo inaruhusu nguvu inapoidhinishwa na wingi wa kidemokrasia
  - Kanuni ya matumizi, ambayo huhalalisha nguvu inapozalisha manufaa makubwa kwa jamii
explanation: |
  Kanuni ya kutotumia nguvu za kijeshi ndiyo msingi wa falsafa ya uhuru, ikisema kwamba hakuna mtu mwenye haki ya kuanzisha au kutishia nguvu za kimwili dhidi ya mtu mwingine au mali yake. Hii inafanya ulaghai, wizi, na kulazimisha kuwa makosa kimaadili, huku nguvu zikihesabiwa haki katika kujilinda pekee. Kanuni hii inatumika sawa kwa watu binafsi na vikundi vyote, ikiwa ni pamoja na serikali, ikikataa ruhusa yoyote maalum kwa serikali kufanya vitendo ambavyo vingechukuliwa kuwa visivyo vya maadili ikiwa vitafanywa na watu binafsi.

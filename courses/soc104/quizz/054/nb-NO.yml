question: Hva er det grunnleggende prinsippet som skiller libertarianere fra andre politiske filosofier når det gjelder bruk av makt?
answer: Ikke-aggresjonsprinsippet, som forbyr bruk av vold mot andre unntatt i selvforsvar
wrong_answers:
  - Prinsippet om proporsjonal respons, som gjør det mulig å opprettholde sosial orden ved hjelp av målt makt
  - Prinsippet om kollektiv sikkerhet, som tillater bruk av makt når det er godkjent av et demokratisk flertall
  - Nytteprinsippet, som rettferdiggjør bruk av makt når det fører til størst mulig nytte for samfunnet
explanation: |
  Ikke-aggresjonsprinsippet er hjørnesteinen i libertariansk filosofi, og slår fast at ingen har rett til å initiere eller true med fysisk makt
  mot en annen person eller deres eiendom. Dette gjør svindel, tyveri og tvang moralsk galt, og maktbruk kan bare rettferdiggjøres i selvforsvar. Dette prinsippet gjelder for alle individer og grupper, inkludert staten, og avviser enhver spesiell tillatelse for staten til å begå handlinger som ville blitt ansett som umoralske hvis de ble utført av privatpersoner.
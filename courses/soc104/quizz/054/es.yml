question: ¿Cuál es el principio fundamental que distingue a los libertarios de otras filosofías políticas en lo que respecta al uso de la fuerza?
answer: El principio de no agresión, que prohíbe utilizar la fuerza contra otros salvo en defensa propia
wrong_answers:
  - El principio de respuesta proporcional, que permite medir la fuerza para mantener el orden social
  - El principio de seguridad colectiva, que permite el uso de la fuerza cuando lo aprueba la mayoría democrática
  - El principio utilitarista, que justifica la fuerza cuando produce el mayor bien para la sociedad
explanation: |
  El principio de no agresión es la piedra angular de la filosofía libertaria, que afirma que nadie tiene derecho a iniciar o amenazar con el uso de la fuerza física
  contra otra persona o su propiedad. Esto hace que el fraude, el robo y la coacción sean moralmente incorrectos, y que la fuerza sólo se justifique en defensa propia. Este principio se aplica por igual a todos los individuos y grupos, incluido el gobierno, rechazando cualquier permiso especial para que el Estado cometa actos que se considerarían inmorales si fueran realizados por particulares.
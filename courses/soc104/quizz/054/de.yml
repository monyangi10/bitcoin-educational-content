question: Welches ist das grundlegende Prinzip, das die Libertären von anderen politischen Philosophien in Bezug auf die Anwendung von Gewalt unterscheidet?
answer: Der Grundsatz des Nichtangriffs, der es verbietet, Gewalt gegen andere anzuwenden, außer zur Selbstverteidigung
wrong_answers:
  - Der Grundsatz der proportionalen Reaktion, der es ermöglicht, die soziale Ordnung mit angemessener Kraft aufrechtzuerhalten
  - Der Grundsatz der kollektiven Sicherheit, der Gewalt erlaubt, wenn sie von einer demokratischen Mehrheit gebilligt wird
  - Das utilitaristische Prinzip, das Gewalt rechtfertigt, wenn sie das höchste Gut für die Gesellschaft hervorbringt
explanation: |
  Das Nichtangriffsprinzip ist der Eckpfeiler der libertären Philosophie und besagt, dass niemand das Recht hat, physische Gewalt gegen eine andere Person oder deren Eigentum anzuwenden oder anzudrohen
  gegen eine andere Person oder deren Eigentum anzuwenden oder anzudrohen. Dies macht Betrug, Diebstahl und Nötigung moralisch falsch, wobei Gewalt nur zur Selbstverteidigung gerechtfertigt ist. Dieser Grundsatz gilt für alle Individuen und Gruppen gleichermaßen, auch für die Regierung, und lehnt jede Sondererlaubnis für den Staat ab, Handlungen zu begehen, die als unmoralisch gelten würden, wenn sie von Privatpersonen ausgeführt würden.
question: Какой основополагающий принцип отличает либертарианцев от представителей других политических философий в отношении применения силы?
answer: Принцип ненападения, запрещающий применять силу против других, кроме как в целях самообороны
wrong_answers:
  - Принцип пропорционального реагирования, позволяющий с помощью дозированной силы поддерживать социальный порядок
  - Принцип коллективной безопасности, который допускает применение силы, если это одобрено демократическим большинством
  - Утилитарный принцип, который оправдывает силу, если она приносит наибольшее благо обществу
explanation: |
  Принцип ненападения - краеугольный камень либертарианской философии, утверждающий, что никто не имеет права применять физическую силу или угрожать ею
  против другого человека или его собственности. Это делает мошенничество, воровство и принуждение морально неправильными, а применение силы оправданным только в случае самообороны. Этот принцип в равной степени относится ко всем людям и группам, включая правительство, отвергая любое специальное разрешение государству совершать действия, которые считались бы аморальными, если бы совершались частными лицами.
question: Vilken är den grundläggande princip som skiljer libertarianer från andra politiska filosofier när det gäller användningen av våld?
answer: Icke-aggressionsprincipen, som förbjuder våld mot andra utom i självförsvar
wrong_answers:
  - Principen om proportionell respons, som gör det möjligt att upprätthålla social ordning med måttlig styrka
  - Principen om kollektiv säkerhet, som tillåter våld när det godkänns av en demokratisk majoritet
  - Utilitarismens princip, som rättfärdigar våld när det leder till största möjliga nytta för samhället
explanation: |
  Icke-aggressionsprincipen är hörnstenen i den libertarianska filosofin och innebär att ingen har rätt att initiera eller hota med fysiskt våld
  mot en annan person eller dennes egendom. Detta gör bedrägeri, stöld och tvång moraliskt fel, och våld är endast berättigat i självförsvar. Denna princip gäller lika för alla individer och grupper, inklusive staten, och förkastar alla särskilda tillstånd för staten att begå handlingar som skulle betraktas som omoraliska om de utfördes av privatpersoner.
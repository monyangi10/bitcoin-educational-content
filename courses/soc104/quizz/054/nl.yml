question: Wat is het fundamentele principe dat libertariërs onderscheidt van andere politieke filosofieën met betrekking tot het gebruik van geweld?
answer: Het non-agressieprincipe, dat het initiëren van geweld tegen anderen verbiedt, behalve als zelfverdediging
wrong_answers:
  - Het principe van proportionele respons, waardoor gemeten kracht de sociale orde kan handhaven
  - Het collectieve veiligheidsbeginsel, dat geweld toestaat als het wordt goedgekeurd door een democratische meerderheid
  - Het utilitaristische principe, dat geweld rechtvaardigt als het het grootste goed voor de samenleving oplevert
explanation: |
  Het non-agressieprincipe is de hoeksteen van de libertarische filosofie en stelt dat niemand het recht heeft om fysiek geweld te gebruiken of ermee te dreigen
  tegen een ander persoon of zijn eigendom. Hierdoor zijn fraude, diefstal en dwang moreel verkeerd en is geweld alleen gerechtvaardigd als zelfverdediging. Dit principe geldt in gelijke mate voor alle individuen en groepen, inclusief de overheid, en verwerpt elke speciale toestemming voor de staat om daden te plegen die als immoreel zouden worden beschouwd als ze door privépersonen zouden worden gedaan.
question: Кой е основният принцип, който отличава либертарианците от другите политически философии по отношение на употребата на сила?
answer: Принципът на ненападение, който забранява използването на сила срещу други хора, освен при самозащита
wrong_answers:
  - Принципът на пропорционалната реакция, който позволява на премерената сила да поддържа социалния ред
  - Принципът на колективната сигурност, който разрешава използването на сила, когато е одобрена от демократично мнозинство
  - Принципът на утилитаризма, който оправдава употребата на сила, когато тя води до най-голямото благо за обществото
explanation: |
  Принципът на ненападение е крайъгълен камък на либертарианската философия, според който никой няма право да предприема или да заплашва с физическа сила
  срещу друго лице или неговата собственост. Това прави измамата, кражбата и принудата морално погрешни, а силата е оправдана само при самозащита. Този принцип се прилага еднакво за всички индивиди и групи, включително и за правителството, като се отхвърля всяко специално разрешение за държавата да извършва действия, които биха се считали за неморални, ако се извършват от частни лица.
question: Qual è il principio fondamentale che distingue i libertari da altre filosofie politiche riguardo all'uso della forza?
answer: Il principio di non aggressione, che proibisce di usare la forza contro gli altri se non per autodifesa
wrong_answers:
  - Il principio della risposta proporzionale, che consente di mantenere l'ordine sociale con una forza misurata
  - Il principio della sicurezza collettiva, che consente l'uso della forza quando è approvato dalla maggioranza democratica, è stato applicato a tutti i paesi del mondo
  - Il principio utilitaristico, che giustifica la forza quando produce il massimo bene per la società
explanation: |
  Il principio di non aggressione è la pietra miliare della filosofia libertaria e afferma che nessuno ha il diritto di iniziare o minacciare la forza fisica contro un'altra persona o la sua proprietà
  contro un'altra persona o contro la sua proprietà. Ciò rende la frode, il furto e la coercizione moralmente sbagliati, e la forza è giustificata solo in caso di autodifesa. Questo principio si applica in egual misura a tutti gli individui e i gruppi, compreso il governo, rifiutando qualsiasi permesso speciale per lo Stato di commettere atti che sarebbero considerati immorali se compiuti da privati.
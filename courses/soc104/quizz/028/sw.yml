question: Ni maendeleo gani ya kihistoria yaliyowaongoza waliberali wa kitamaduni nchini Marekani kutumia neno 'libertarian' kuanzia miaka ya 1960?
answer: Watetezi wa kiliberali wa Marekani walikuwa wameelekea kuunga mkono serikali kubwa na uingiliaji kati wa majimbo, wakipingana na kanuni za kiliberali za kitamaduni
wrong_answers:
  - Waliberali wa Ulaya walianza kutumia neno 'mliberali' kwanza, na kuwalazimisha Wamarekani kufuata istilahi hiyo hiyo.
  - Chama cha Republican kilipitisha rasmi misimamo ya kiliberali ya kitamaduni, na kufanya neno 'liliberali' lisipatikane kisiasa
  - Waliberali wa kitamaduni walitaka kujitofautisha na harakati za kidemokrasia za kijamii za Ulaya zinazopata umaarufu
explanation: |
  Sura hiyo inaelezea kwamba 'waliberali' wa Marekani walibadilika ili kuunga mkono uingiliaji kati mkubwa wa serikali kupitia programu kama vile Mpango Mpya wa FDR na Jumuiya Kuu ya LBJ, na kuhusishwa na sera kubwa za serikali. Hii ilipingana moja kwa moja na kanuni za kiliberali za kitamaduni za uchumi wa laissez-faire na uingiliaji kati mdogo wa serikali. Ili kuepuka kuchanganyikiwa na 'waliberali' hawa wa kitakwimu, wafuasi wa uliberali wa kitamaduni walitumia 'uliberali' kama kitambulisho chao, wakidumisha mwendelezo na mila za kiliberali za Ulaya za karne ya 19 huku wakijitofautisha waziwazi na harakati za kiliberali za Marekani zilizobadilishwa.
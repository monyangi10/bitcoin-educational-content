question: Que evolução histórica levou os liberais clássicos dos Estados Unidos a adotar o termo "libertário" a partir dos anos 60?
answer: Os liberais americanos tinham passado a apoiar o grande governo e a intervenção do Estado, contradizendo os princípios liberais clássicos
wrong_answers:
  - Os liberais europeus começaram a usar o termo "libertário" primeiro, obrigando os americanos a seguir a mesma terminologia
  - O Partido Republicano adoptou oficialmente posições liberais clássicas, tornando o termo "liberal" politicamente indisponível
  - Os liberais clássicos queriam distinguir-se dos movimentos sociais-democratas europeus que estavam a ganhar popularidade
explanation: |
  O capítulo explica que os "liberais" americanos evoluíram no sentido de apoiar uma intervenção extensiva do Estado através de programas como o New Deal de FDR e a Great Society de LBJ, ficando associados a políticas de grande governo. Isto contradizia diretamente os princípios liberais clássicos da economia do laissez-faire e da intervenção limitada do governo. Para evitar confusão com estes "liberais" estatistas, os apoiantes do liberalismo clássico adoptaram "libertário" como identificador, mantendo a continuidade com as tradições liberais europeias do século XIX e distinguindo-se claramente do movimento liberal americano transformado.
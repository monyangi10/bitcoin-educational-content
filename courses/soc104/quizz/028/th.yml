question: พัฒนาการทางประวัติศาสตร์ใดที่ทำให้เสรีนิยมคลาสสิกในสหรัฐอเมริกาเริ่มใช้คำว่า 'ลิเบอร์ทาเรียน' ตั้งแต่ทศวรรษ 1960?
answer: กลุ่มเสรีนิยมอเมริกันได้เปลี่ยนไปสนับสนุนรัฐบาลขนาดใหญ่และการแทรกแซงของรัฐ ซึ่งขัดแย้งกับหลักการเสรีนิยมคลาสสิก
wrong_answers:
  - พวกเสรีนิยมยุโรปเริ่มใช้คำว่า 'libertarian' ก่อน ทำให้อเมริกันต้องใช้คำศัพท์เดียวกัน
  - พรรครีพับลิกันได้นำจุดยืนแบบเสรีนิยมคลาสสิกมาใช้อย่างเป็นทางการ ทำให้คำว่า 'เสรีนิยม' ไม่สามารถใช้ในทางการเมืองได้
  - นักเสรีนิยมคลาสสิกต้องการแยกตัวเองออกจากขบวนการประชาธิปไตยสังคมยุโรปที่กำลังได้รับความนิยม
explanation: |
  บทนี้อธิบายว่า 'เสรีนิยม' ของอเมริกาได้พัฒนาไปสู่การสนับสนุนการแทรกแซงของรัฐอย่างกว้างขวางผ่านโครงการต่างๆ เช่น ข้อตกลงใหม่ของ FDR และสังคมที่ยิ่งใหญ่ของ LBJ ซึ่งกลายเป็นที่เกี่ยวข้องกับนโยบายรัฐบาลขนาดใหญ่ สิ่งนี้ขัดแย้งโดยตรงกับหลักการเสรีนิยมคลาสสิกของเศรษฐกิจแบบปล่อยให้เป็นไปและการแทรกแซงของรัฐบาลที่จำกัด เพื่อหลีกเลี่ยงความสับสนกับ 'เสรีนิยม' ที่สนับสนุนรัฐเหล่านี้ ผู้สนับสนุนเสรีนิยมคลาสสิกจึงใช้ 'ลิเบอร์ทาเรียน' เป็นตัวระบุของพวกเขา โดยรักษาความต่อเนื่องกับประเพณีเสรีนิยมยุโรปในศตวรรษที่ 19 ในขณะที่แยกแยะตัวเองอย่างชัดเจนจากขบวนการเสรีนิยมอเมริกันที่เปลี่ยนแปลงไป
question: 1960년대부터 미국의 고전적 자유주의자들이 '자유주의자'라는 용어를 사용하게 된 역사적 배경은 무엇인가요?
answer: 미국의 자유주의자들은 고전적 자유주의 원칙과 모순되는 큰 정부와 국가 개입을 지지하는 방향으로 전환했습니다
wrong_answers:
  - 유럽의 자유주의자들이 먼저 '자유주의자'라는 용어를 사용하기 시작했고, 미국인들도 같은 용어를 따르게 되었습니다
  - 공화당은 공식적으로 고전적 자유주의 입장을 채택하여 '자유주의'라는 용어를 정치적으로 사용할 수 없게 만들었습니다
  - 고전적 자유주의자들은 인기를 얻고 있는 유럽의 사회민주주의 운동과 차별화되기를 원했습니다
explanation: |
  이 장에서는 미국의 '자유주의자'가 FDR의 뉴딜 정책과 LBJ의 위대한 사회와 같은 프로그램을 통해 광범위한 국가 개입을 지지하는 방향으로 진화하여 큰 정부 정책과 연관되어 왔다고 설명합니다. 이는 자유방임 경제와 제한된 정부 개입이라는 고전적 자유주의 원칙과 정면으로 모순되는 것이었습니다. 이러한 통계적 '자유주의자'와 혼동을 피하기 위해 고전적 자유주의 지지자들은 19세기 유럽의 자유주의 전통과 연속성을 유지하면서 변화된 미국 자유주의 운동과 명확히 구분하기 위해 '자유주의자'를 자신들의 정체성으로 채택했습니다.
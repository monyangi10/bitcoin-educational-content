question: Hangi tarihsel gelişme Amerika Birleşik Devletleri'ndeki klasik liberallerin 1960'lardan itibaren 'özgürlükçü' terimini benimsemesine yol açmıştır?
answer: Amerikan liberalleri, klasik liberal ilkelerle çelişerek büyük devlet ve devlet müdahalesini desteklemeye yönelmişlerdi
wrong_answers:
  - Avrupalı liberaller ilk olarak 'özgürlükçü' terimini kullanmaya başladılar ve Amerikalıları da aynı terminolojiyi kullanmaya zorladılar
  - Cumhuriyetçi Parti klasik liberal pozisyonları resmen benimseyerek 'liberal' terimini siyasi olarak kullanılamaz hale getirdi
  - Klasik liberaller kendilerini Avrupa'da popülerlik kazanan sosyal demokrat hareketlerden ayırmak istiyorlardı
explanation: |
  Bu bölüm, Amerikan 'liberallerinin' FDR'nin New Deal ve LBJ'nin Great Society gibi programları aracılığıyla kapsamlı devlet müdahalesini destekleyecek şekilde evrimleştiğini ve büyük devlet politikalarıyla ilişkilendirildiğini açıklamaktadır. Bu durum, laissez-faire ekonomisi ve sınırlı devlet müdahalesi gibi klasik liberal ilkelerle doğrudan çelişmektedir. Bu devletçi 'liberallerle' karıştırılmamak için klasik liberalizmin destekçileri, kendilerini dönüşen Amerikan liberal hareketinden açıkça ayırırken 19. yüzyıl Avrupa liberal gelenekleriyle sürekliliği koruyarak 'liberteryen' tanımlamasını benimsedi.
question: Diễn biến lịch sử nào đã dẫn đến việc những người theo chủ nghĩa tự do cổ điển ở Hoa Kỳ bắt đầu sử dụng thuật ngữ 'libertarian' từ những năm 1960?
answer: Những người theo chủ nghĩa tự do Mỹ đã chuyển hướng sang ủng hộ chính phủ lớn và sự can thiệp của nhà nước, trái ngược với các nguyên tắc tự do cổ điển.
wrong_answers:
  - Những người theo chủ nghĩa tự do ở châu Âu là những người đầu tiên sử dụng thuật ngữ "libertarian" (người theo chủ nghĩa tự do cá nhân), buộc người Mỹ phải sử dụng thuật ngữ tương tự.
  - Đảng Cộng hòa chính thức áp dụng các quan điểm tự do cổ điển, khiến thuật ngữ "tự do" không còn ý nghĩa chính trị.
  - Những người theo chủ nghĩa tự do cổ điển muốn phân biệt mình với các phong trào dân chủ xã hội châu Âu đang ngày càng phổ biến.
explanation: |
  Chương này giải thích rằng những người theo chủ nghĩa "tự do" ở Mỹ đã phát triển để ủng hộ sự can thiệp rộng rãi của nhà nước thông qua các chương trình như Chính sách Kinh tế Mới của FDR và Xã hội Vĩ đại của LBJ, và gắn liền với các chính sách chính phủ lớn. Điều này mâu thuẫn trực tiếp với các nguyên tắc tự do cổ điển về kinh tế tự do cạnh tranh và sự can thiệp hạn chế của chính phủ. Để tránh nhầm lẫn với những người theo chủ nghĩa "tự do" ủng hộ nhà nước này, những người ủng hộ chủ nghĩa tự do cổ điển đã sử dụng thuật ngữ "tự do cá nhân" (libertarian) làm định danh của họ, duy trì sự liên tục với truyền thống tự do châu Âu thế kỷ 19 trong khi phân biệt rõ ràng họ với phong trào tự do Mỹ đã chuyển đổi.
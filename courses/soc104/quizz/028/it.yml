question: Quale sviluppo storico ha portato i liberali classici negli Stati Uniti ad adottare il termine "libertario" a partire dagli anni '60?
answer: I liberali americani si erano spostati verso il sostegno al grande governo e all'intervento statale, contraddicendo i principi liberali classici
wrong_answers:
  - I liberali europei hanno iniziato a usare per primi il termine "libertario", costringendo gli americani a seguire la stessa terminologia
  - Il Partito Repubblicano ha ufficialmente adottato le posizioni liberali classiche, rendendo il termine "liberale" politicamente non disponibile
  - I liberali classici volevano distinguersi dai movimenti socialdemocratici europei che stavano guadagnando popolarità
explanation: |
  Il capitolo spiega che i "liberali" americani si sono evoluti sostenendo un ampio intervento statale attraverso programmi come il New Deal di FDR e la Great Society di LBJ, diventando associati a politiche di grande governo. Ciò contraddiceva direttamente i principi liberali classici dell'economia del laissez-faire e dell'intervento limitato del governo. Per evitare confusione con questi "liberali" statalisti, i sostenitori del liberalismo classico hanno adottato il termine "libertario" come identificativo, mantenendo la continuità con le tradizioni liberali europee del XIX secolo e distinguendosi chiaramente dal movimento liberale americano trasformato.
question: Welke historische ontwikkeling leidde ertoe dat klassiek-liberalen in de Verenigde Staten vanaf de jaren 1960 de term 'libertarisch' gingen gebruiken?
answer: Amerikaanse liberalen waren meer voorstander geworden van een grote overheid en staatsinterventie, wat in strijd was met de klassieke liberale principes
wrong_answers:
  - Europese liberalen begonnen als eerste de term 'libertarisch' te gebruiken, waardoor Amerikanen gedwongen werden dezelfde terminologie te volgen
  - De Republikeinse Partij nam officieel klassiek-liberale standpunten in, waardoor de term 'liberaal' politiek niet meer beschikbaar was
  - Klassiek-liberalen wilden zich onderscheiden van Europese sociaaldemocratische bewegingen die aan populariteit wonnen
explanation: |
  Het hoofdstuk legt uit dat Amerikaanse 'liberalen' zich ontwikkelden tot voorstanders van uitgebreide staatsinterventie via programma's als de New Deal van FDR en de Great Society van LBJ, waardoor ze geassocieerd werden met beleid van grote regeringen. Dit ging lijnrecht in tegen de klassieke liberale principes van laissez-faire economie en beperkte overheidsbemoeienis. Om verwarring met deze statistische 'liberalen' te voorkomen, namen aanhangers van het klassieke liberalisme 'libertair' als hun identificatiecode aan, waarmee ze de continuïteit met de 19e-eeuwse Europese liberale tradities behielden en zich duidelijk onderscheidden van de getransformeerde Amerikaanse liberale beweging.
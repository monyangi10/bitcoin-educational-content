question: What historical development led classical liberals in the United States to adopt the term 'libertarian' starting in the 1960s?
answer: American liberals had shifted toward supporting big government and state intervention, contradicting classical liberal principles
wrong_answers:
  - "European liberals began using the term 'libertarian' first, forcing Americans to follow the same terminology"
  - "The Republican Party officially adopted classical liberal positions, making the term 'liberal' politically unavailable"
  - Classical liberals wanted to distinguish themselves from European social democratic movements gaining popularity
explanation: |
  The chapter explains that American 'liberals' evolved to support extensive state intervention through programs like FDR's New Deal and LBJ's Great Society, becoming associated with big government policies. This directly contradicted classical liberal principles of laissez-faire economics and limited government intervention. To avoid confusion with these statist 'liberals,' supporters of classical liberalism adopted 'libertarian' as their identifier, maintaining continuity with 19th-century European liberal traditions while clearly distinguishing themselves from the transformed American liberal movement.
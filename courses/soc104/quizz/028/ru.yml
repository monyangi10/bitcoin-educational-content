question: Какое историческое событие привело к тому, что классические либералы в США стали использовать термин "либертарианец", начиная с 1960-х годов?
answer: Американские либералы перешли к поддержке большого правительства и государственного вмешательства, что противоречило классическим либеральным принципам
wrong_answers:
  - Европейские либералы начали использовать термин "либертарианец" первыми, заставив американцев следовать той же терминологии
  - Республиканская партия официально приняла классические либеральные позиции, сделав термин "либерал" политически недоступным
  - Классические либералы хотели отличиться от европейских социал-демократических движений, набирающих популярность
explanation: |
  В главе объясняется, что американские "либералы" стали поддерживать широкое государственное вмешательство в рамках таких программ, как "Новый курс" Рузвельта и "Великое общество" Л. Б. Джея, и стали ассоциироваться с политикой большого правительства. Это прямо противоречило классическим либеральным принципам экономики laissez-faire и ограниченного вмешательства государства. Чтобы избежать путаницы с этими статистами-"либералами", сторонники классического либерализма приняли "либертарианство" в качестве своего идентификатора, сохраняя преемственность с европейскими либеральными традициями XIX века и в то же время четко отличаясь от трансформировавшегося американского либерального движения.
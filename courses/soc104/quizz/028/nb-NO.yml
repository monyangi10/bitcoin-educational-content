question: Hvilken historisk utvikling førte til at klassisk liberale i USA tok i bruk begrepet "libertarianer" fra 1960-tallet?
answer: Amerikanske liberale hadde gått over til å støtte store myndigheter og statlig inngripen, noe som var i strid med klassiske liberale prinsipper
wrong_answers:
  - Europeiske liberale begynte å bruke begrepet "libertarian" først, noe som tvang amerikanerne til å følge samme terminologi
  - Det republikanske partiet inntok offisielt klassisk liberale standpunkter, noe som gjorde begrepet "liberal" politisk utilgjengelig
  - De klassiske liberalistene ønsket å skille seg fra de europeiske sosialdemokratiske bevegelsene som ble stadig mer populære
explanation: |
  Kapitlet forklarer at amerikanske "liberale" utviklet seg til å støtte omfattende statlig inngripen gjennom programmer som FDRs New Deal og LBJs Great Society, og at de ble assosiert med "big government"-politikk. Dette var stikk i strid med klassiske liberale prinsipper om laissez-faire-økonomi og begrenset statlig inngripen. For å unngå forveksling med disse statsliberale "liberalistene" tok tilhengerne av klassisk liberalisme i bruk betegnelsen "libertarianer" for å opprettholde kontinuiteten med 1800-tallets europeiske liberale tradisjoner, samtidig som de skilte seg tydelig fra den amerikanske liberale bevegelsen.
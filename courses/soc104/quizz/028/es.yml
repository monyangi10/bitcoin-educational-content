question: ¿Qué acontecimiento histórico llevó a los liberales clásicos de Estados Unidos a adoptar el término "libertario" a partir de la década de 1960?
answer: Los liberales estadounidenses habían pasado a apoyar el gran gobierno y la intervención del Estado, en contradicción con los principios liberales clásicos
wrong_answers:
  - Los liberales europeos empezaron a utilizar primero el término "libertario", obligando a los estadounidenses a seguir la misma terminología
  - El Partido Republicano adoptó oficialmente posiciones liberales clásicas, haciendo que el término "liberal" fuera políticamente inasequible
  - Los liberales clásicos querían distinguirse de los movimientos socialdemócratas europeos que ganaban popularidad
explanation: |
  El capítulo explica que los "liberales" estadounidenses pasaron a apoyar una amplia intervención estatal a través de programas como el New Deal de FDR y la Gran Sociedad de LBJ, asociándose con políticas de gran gobierno. Esto contradecía directamente los principios liberales clásicos de la economía del laissez-faire y la intervención limitada del gobierno. Para evitar la confusión con estos "liberales" estatistas, los partidarios del liberalismo clásico adoptaron el término "libertario" como identificador, manteniendo la continuidad con las tradiciones liberales europeas del siglo XIX, al tiempo que se distinguían claramente del transformado movimiento liberal estadounidense.
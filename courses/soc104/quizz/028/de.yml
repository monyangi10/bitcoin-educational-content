question: Welche historische Entwicklung führte dazu, dass die klassischen Liberalen in den Vereinigten Staaten ab den 1960er Jahren den Begriff "libertär" verwendeten?
answer: Die amerikanischen Liberalen waren dazu übergegangen, eine große Regierung und staatliche Eingriffe zu unterstützen, was den klassischen liberalen Grundsätzen widersprach
wrong_answers:
  - Die europäischen Liberalen begannen zuerst, den Begriff "libertär" zu verwenden, und zwangen die Amerikaner, dieselbe Terminologie zu verwenden
  - Die Republikanische Partei übernahm offiziell klassisch-liberale Positionen, wodurch der Begriff "liberal" politisch nicht mehr verfügbar war
  - Die klassischen Liberalen wollten sich von den europäischen sozialdemokratischen Bewegungen abgrenzen, die an Popularität gewinnen
explanation: |
  In diesem Kapitel wird erläutert, dass die amerikanischen "Liberalen" durch Programme wie FDRs New Deal und LBJs Great Society zu Befürwortern umfassender staatlicher Eingriffe wurden und mit einer Politik der großen Regierungen assoziiert wurden. Dies stand in direktem Widerspruch zu den klassischen liberalen Grundsätzen der Laissez-faire-Wirtschaft und begrenzter staatlicher Eingriffe. Um Verwechslungen mit diesen staatsgläubigen "Liberalen" zu vermeiden, nahmen die Anhänger des klassischen Liberalismus die Bezeichnung "libertär" an, um die Kontinuität mit den europäischen liberalen Traditionen des 19. Jahrhunderts zu wahren und sich gleichzeitig klar von der umgestalteten amerikanischen liberalen Bewegung abzugrenzen.
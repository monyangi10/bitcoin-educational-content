question: Jaký historický vývoj vedl klasické liberály ve Spojených státech k tomu, že od 60. let 20. století začali používat termín "libertarián"?
answer: Američtí liberálové se přiklonili k podpoře velké vlády a státních zásahů, což bylo v rozporu s klasickými liberálními zásadami
wrong_answers:
  - Evropští liberálové začali používat termín "libertarián" jako první a donutili Američany, aby se řídili stejnou terminologií
  - Republikánská strana oficiálně přijala klasické liberální postoje, čímž se pojem "liberální" stal politicky nedostupným
  - Klasičtí liberálové se chtěli odlišit od evropských sociálně demokratických hnutí, která získávala na popularitě
explanation: |
  Kapitola vysvětluje, že američtí "liberálové" začali podporovat rozsáhlé státní zásahy prostřednictvím programů, jako byl FDR New Deal a LBJ Great Society, a začali být spojováni s politikou velké vlády. To bylo v přímém rozporu s klasickými liberálními principy laissez-faire ekonomiky a omezených státních zásahů. Aby se vyhnuli záměně s těmito etatistickými "liberály", přijali stoupenci klasického liberalismu jako svůj identifikátor "libertariánský", čímž zachovali kontinuitu s evropskými liberálními tradicemi 19. století a zároveň se jasně odlišili od transformovaného amerického liberálního hnutí.
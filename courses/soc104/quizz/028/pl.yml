question: Jakie wydarzenia historyczne doprowadziły klasycznych liberałów w Stanach Zjednoczonych do przyjęcia terminu "libertariański" począwszy od lat 60. ubiegłego wieku?
answer: Amerykańscy liberałowie przesunęli się w kierunku wspierania wielkiego rządu i interwencji państwa, zaprzeczając klasycznym liberalnym zasadom
wrong_answers:
  - Europejscy liberałowie jako pierwsi zaczęli używać terminu "libertarianin", zmuszając Amerykanów do stosowania tej samej terminologii
  - Partia Republikańska oficjalnie przyjęła klasyczne liberalne stanowiska, czyniąc termin "liberalny" politycznie niedostępnym
  - Klasyczni liberałowie chcieli odróżnić się od zdobywających popularność europejskich ruchów socjaldemokratycznych
explanation: |
  Rozdział ten wyjaśnia, że amerykańscy "liberałowie" ewoluowali w kierunku wspierania szeroko zakrojonej interwencji państwa poprzez programy takie jak Nowy Ład FDR i Wielkie Społeczeństwo LBJ, stając się kojarzeni z polityką wielkiego rządu. Było to bezpośrednio sprzeczne z klasycznymi liberalnymi zasadami ekonomii leseferystycznej i ograniczonej interwencji rządu. Aby uniknąć nieporozumień z tymi etatystycznymi "liberałami", zwolennicy klasycznego liberalizmu przyjęli "libertariański" jako swój identyfikator, zachowując ciągłość z XIX-wiecznymi europejskimi tradycjami liberalnymi, jednocześnie wyraźnie odróżniając się od przekształconego amerykańskiego ruchu liberalnego.
question: Кое историческо развитие кара класическите либерали в САЩ да възприемат термина "либертарианци" от 60-те години на миналия век?
answer: Американските либерали се насочват към подкрепа на голямото правителство и държавната намеса, което противоречи на класическите либерални принципи
wrong_answers:
  - Европейските либерали първи започват да използват термина "либертарианец", което принуждава американците да следват същата терминология
  - Републиканската партия официално възприема класически либерални позиции, което прави понятието "либерал" политически недостъпно
  - Класическите либерали искаха да се разграничат от европейските социалдемократически движения, които набираха популярност
explanation: |
  В главата се обяснява, че американските "либерали" са се превърнали в поддръжници на широката държавна намеса чрез програми като "Новия курс" на ФДР и "Великото общество" на ЛБДЖ, като са се асоциирали с политиките на голямото правителство. Това е в пряко противоречие с класическите либерални принципи на laissez-faire икономиката и ограничената държавна намеса. За да избегнат объркване с тези етатистки "либерали", поддръжниците на класическия либерализъм приеха за свой идентификатор "либертариански", запазвайки приемствеността с европейските либерални традиции от XIX в., като същевременно ясно се разграничиха от трансформиралото се американско либерално движение.
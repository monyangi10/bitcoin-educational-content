question: Mikä historiallinen kehitys johti siihen, että klassiset liberaalit Yhdysvalloissa käyttivät termiä "libertarian" 1960-luvulta alkaen?
answer: Amerikkalaiset liberaalit olivat siirtyneet tukemaan suurta hallintoa ja valtion väliintuloa, mikä oli ristiriidassa klassisten liberaalien periaatteiden kanssa
wrong_answers:
  - Eurooppalaiset liberaalit alkoivat ensin käyttää termiä "libertarian", mikä pakotti amerikkalaiset noudattamaan samaa terminologiaa
  - Republikaaninen puolue omaksui virallisesti klassisen liberaalin kannan, jolloin termi "liberaali" ei ollut enää poliittisesti käytettävissä
  - Klassiset liberaalit halusivat erottautua eurooppalaisista sosialidemokraattisista liikkeistä, jotka saivat suosiota
explanation: |
  Luvussa selitetään, että amerikkalaiset "liberaalit" kehittyivät tukemaan laajaa valtiollista puuttumista FDR:n New Deal -ohjelman ja LBJ:n Great Society -ohjelman kaltaisten ohjelmien avulla, ja heidät yhdistettiin suuriin valtiollisiin politiikkoihin. Tämä oli suoraan ristiriidassa klassisten liberaalien periaatteiden kanssa, jotka perustuivat laissez-faire -talouteen ja valtion rajalliseen puuttumiseen. Välttääkseen sekaannuksen näihin valtiojohtoisiin "liberaaleihin" klassisen liberalismin kannattajat ottivat tunnuksekseen "libertaristisen" ja säilyttivät näin jatkuvuuden 1800-luvun eurooppalaisiin liberaalisiin perinteisiin samalla kun erottautuivat selvästi amerikkalaisesta liberaalista liikkeestä, joka oli muuttunut.
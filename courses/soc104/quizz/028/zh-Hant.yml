question: 什麼歷史發展導致美國的古典自由主義者從 1960 年代開始採用「自由主義者」一詞？
answer: 美國自由主義者轉向支持大政府和國家干預，與古典自由主義原則相悖
wrong_answers:
  - 歐洲自由主義者首先開始使用「自由主義者」一詞，迫使美國人跟隨相同的術語
  - 共和黨正式採納了古典自由主義的立場，使得「自由主義」一詞在政治上無法使用
  - 古典自由主義者希望將自己與日益流行的歐洲社會民主運動區分開來。
explanation: |
  本章解釋了美國的「自由主義者」透過 FDR 的「新政」(New Deal) 和 LBJ 的「偉大社會」(Great Society) 等計畫，逐漸支持廣泛的國家干預，進而與大政府政策聯繫在一起。這直接違反了古典自由主義的自由放任經濟原則和有限的政府干預。為了避免與這些國家主義的「自由主義者」混淆，古典自由主義的支持者採用「自由主義者」作為他們的識別標誌，以保持與19世紀歐洲自由主義傳統的連續性，同時清楚地將自己與轉型中的美國自由主義運動區分開來。
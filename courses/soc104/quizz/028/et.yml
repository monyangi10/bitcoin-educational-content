question: Milline ajalooline areng viis selleni, et klassikalised liberaalid võtsid Ameerika Ühendriikides alates 1960. aastatest kasutusele termini "liberaal"?
answer: Ameerika liberaalid olid liikunud suure valitsuse ja riigi sekkumise toetamise suunas, mis oli vastuolus klassikaliste liberaalsete põhimõtetega
wrong_answers:
  - Euroopa liberaalid hakkasid esimesena kasutama terminit "liberaal", sundides ameeriklasi järgima sama terminoloogiat
  - Vabariiklik partei võttis ametlikult üle klassikalised liberaalsed seisukohad, muutes mõiste "liberaalne" poliitiliselt kättesaamatuks
  - Klassikalised liberaalid tahtsid end eristada Euroopa sotsiaaldemokraatlikest liikumistest, mis koguvad populaarsust
explanation: |
  Peatükis selgitatakse, et Ameerika "liberaalid" hakkasid toetama ulatuslikku riiklikku sekkumist selliste programmide kaudu nagu FDRi New Deal ja LBJ Great Society, mis seostub suure valitsuse poliitikaga. See oli otseses vastuolus klassikaliste liberaalsete põhimõtetega, milleks olid laissez-faire'i majandus ja piiratud riiklik sekkumine. Et vältida segiajamist nende statistiliste "liberaalidega", võtsid klassikalise liberalismi pooldajad oma identifikaatoriks "liberaal", säilitades järjepidevuse 19. sajandi Euroopa liberaalsete traditsioonidega, eristades end samal ajal selgelt Ameerika liberaalse liikumise ümberkujundamisest.
question: किस ऐतिहासिक घटनाक्रम के कारण संयुक्त राज्य अमेरिका में शास्त्रीय उदारवादियों ने 1960 के दशक से 'स्वतंत्रतावादी' शब्द को अपनाना शुरू किया?
answer: अमेरिकी उदारवादियों ने बड़े सरकारी तंत्र और राज्य के हस्तक्षेप का समर्थन करना शुरू कर दिया था, जो शास्त्रीय उदारवादी सिद्धांतों के विपरीत था।
wrong_answers:
  - यूरोपीय उदारवादियों ने सबसे पहले 'स्वतंत्रतावादी' शब्द का प्रयोग शुरू किया, जिससे अमेरिकियों को भी उसी शब्दावली का पालन करने के लिए मजबूर होना पड़ा।
  - रिपब्लिकन पार्टी ने आधिकारिक तौर पर शास्त्रीय उदारवादी विचारधाराओं को अपना लिया, जिससे 'उदारवादी' शब्द राजनीतिक रूप से अनुपलब्ध हो गया।
  - शास्त्रीय उदारवादी, लोकप्रियता हासिल कर रहे यूरोपीय सामाजिक लोकतांत्रिक आंदोलनों से खुद को अलग दिखाना चाहते थे।
explanation: |
  इस अध्याय में बताया गया है कि अमेरिकी 'उदारवादी' विचारधारा, एफडीआर के न्यू डील और एलबीजे के ग्रेट सोसाइटी जैसे कार्यक्रमों के माध्यम से व्यापक सरकारी हस्तक्षेप का समर्थन करने लगी और बड़े सरकारी नीतियों से जुड़ गई। यह मुक्त बाज़ार अर्थव्यवस्था और सीमित सरकारी हस्तक्षेप के शास्त्रीय उदारवादी सिद्धांतों के सीधे विपरीत था। इन सरकारी हस्तक्षेपवादी 'उदारवादियों' से भ्रम से बचने के लिए, शास्त्रीय उदारवाद के समर्थकों ने 'स्वतंत्रतावादी' शब्द को अपना लिया। इस तरह उन्होंने 19वीं सदी की यूरोपीय उदारवादी परंपराओं से संबंध बनाए रखा और साथ ही खुद को परिवर्तित अमेरिकी उदारवादी आंदोलन से स्पष्ट रूप से अलग किया।
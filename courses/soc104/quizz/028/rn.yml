question: Ni igiki cabaye mu mateka catumye aba liberaliste ba kera bo muri Amerika bafata ijambo ‘libertarian’ guhera mu myaka ya 1960?
answer: Abanyamerika b’abanyagihugu bari barahindukiye bashigikira intwaro nini n’ingene Leta igira ico ikoze, bikaba bivuguruza ingingo ngenderwako za kera z’abanyagihugu .
wrong_answers:
  - Abanyaburaya b’abanyagihugu b’abanyagihugu batanguye gukoresha ijambo ‘libertarian’ mbere, bituma Abanyamerika bakurikiza iryo jambo nyene .
  - Ishirahamwe ry’abarepubulikani ryemeje ku mugaragaro ivyiyumviro vya kera vy’ubwigenge, bituma ijambo ‘uburenganzira’ ritaboneka mu vya politike .
  - Abanyagihugu b'abanyagihugu bashaka kwitandukanya n'imigwi y'abanyaburaya y'abanyagihugu yariko irakundwa cane .
explanation: |
  Ico gice kirasigura ko ‘abanyamerika b’abanyagihugu’ bateye imbere kugira ngo bashigikire ingingo za Leta zikomeye biciye mu migambi nka FDR’s New Deal na LBJ’s Great Society, bagafatanya n’ingingo za Leta nini. Ivyo vyari bivuguruzanya ata guca ku ruhande ingingo ngenderwako za kera z’ubutunzi bw’uburenganzira bwo kwidegemvya be n’ukuntu Leta itagira ico ikora. Kugira ngo ntibavyivangane n’abo ‘ba liberal’ b’abanyagihugu, abashigikiye uburenganzira bwa kera bafashe ‘libertarian’ nk’ikimenyetso cabo, bagumana ubudasiba n’imigenzo y’ubwigenge y’i Buraya yo mu kinjana ca 19 mu gihe baritandukanya neza n’umuhari w’abanyamerika w’ubwigenge wahindutse.
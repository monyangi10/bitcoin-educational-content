question: چه تحول تاریخی باعث شد که لیبرال‌های کلاسیک در ایالات متحده از دهه ۱۹۶۰ به بعد اصطلاح 'لیبرتارین' را بپذیرند؟
answer: لیبرال‌های آمریکایی به سمت حمایت از دولت بزرگ و مداخله دولتی حرکت کرده بودند که با اصول لیبرالیسم کلاسیک در تضاد بود.
wrong_answers:
  - لیبرال‌های اروپایی ابتدا از اصطلاح «لیبرتارین» استفاده کردند و آمریکایی‌ها را مجبور کردند از همان اصطلاح‌شناسی پیروی کنند.
  - حزب جمهوری‌خواه به طور رسمی مواضع لیبرالیسم کلاسیک را پذیرفت و اصطلاح 'لیبرال' را از نظر سیاسی غیرقابل دسترس کرد.
  - لیبرال‌های کلاسیک می‌خواستند خود را از جنبش‌های سوسیال دموکرات اروپایی که در حال محبوبیت یافتن بودند، متمایز کنند.
explanation: |
  این فصل توضیح می‌دهد که 'لیبرال‌های' آمریکایی به حمایت از مداخله گسترده دولت از طریق برنامه‌هایی مانند نیو دیل اف‌دی‌آر و جامعه بزرگ ال‌بی‌جی تکامل یافتند و با سیاست‌های دولت بزرگ مرتبط شدند. این امر به طور مستقیم با اصول لیبرالیسم کلاسیک در اقتصاد لسه‌فر و مداخله محدود دولت در تضاد بود. برای جلوگیری از سردرگمی با این 'لیبرال‌های' دولتی، حامیان لیبرالیسم کلاسیک 'لیبرتارین' را به عنوان شناسه خود انتخاب کردند و پیوستگی با سنت‌های لیبرال اروپایی قرن نوزدهم را حفظ کردند و در عین حال خود را به وضوح از جنبش لیبرال آمریکایی تحول یافته متمایز کردند.
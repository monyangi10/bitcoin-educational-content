question: 米国の古典的リベラル派が1960年代から「リバタリアン」という言葉を採用するようになったのは、どのような歴史的経緯があったのだろうか？
answer: アメリカのリベラル派は、古典的なリベラルの原則に反して、大きな政府と国家の介入を支持する方向にシフトしていた。
wrong_answers:
  - ヨーロッパのリベラル派が最初に「リバタリアン」という用語を使い始めたため、アメリカ人も同じ用語に従わざるを得なくなった。
  - 共和党は古典的リベラルの立場を公式に採用し、「リベラル」という言葉は政治的に使えなくなった。
  - 古典派リベラルは、人気を集めるヨーロッパの社会民主主義運動とは一線を画したかった。
explanation: |
  この章では、アメリカの「リベラル」が、FDRのニューディールやLBJのグレート・ソサエティのようなプログラムを通じて、大規模な国家介入を支持するようになり、大きな政府政策と結びつくようになったと説明している。これは、自由放任経済と限定的な政府介入という古典的リベラルの原則に真っ向から反するものだった。こうした国家主義的な「リベラル」との混同を避けるため、古典的自由主義の支持者は「リバタリアン」を自分たちの識別子として採用し、19世紀ヨーロッパのリベラルの伝統との連続性を維持しつつ、変質したアメリカのリベラル運動とは明確に区別した。
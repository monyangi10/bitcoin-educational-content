question: Koji istorijski razvoj događaja je naveo klasične liberale u Sjedinjenim Američkim Državama da počnu koristiti termin 'libertarijanac' počevši od 1960-ih?
answer: Američki liberali su se pomerili ka podršci velikoj vladi i državnoj intervenciji, što je u suprotnosti sa klasičnim liberalnim principima.
wrong_answers:
  - Evropski liberali su prvi počeli koristiti termin 'libertarijanac', prisiljavajući Amerikance da koriste istu terminologiju.
  - Republikanska stranka je zvanično usvojila klasične liberalne pozicije, čineći termin 'liberal' politički nedostupnim.
  - Klasični liberali želeli su da se razlikuju od evropskih socijaldemokratskih pokreta koji su sticali popularnost
explanation: |
  Poglavlje objašnjava da su američki 'liberali' evoluirali da podrže opsežnu državnu intervenciju kroz programe kao što su FDR-ov New Deal i LBJ-ovo Great Society, postajući povezani sa politikama velike vlade. Ovo je direktno kontradiktiralo klasičnim liberalnim principima laissez-faire ekonomije i ograničene vladine intervencije. Da bi izbegli konfuziju sa ovim etatističkim 'liberalima', pristalice klasičnog liberalizma usvojile su 'libertarijanac' kao svoj identifikator, održavajući kontinuitet sa evropskim liberalnim tradicijama 19. veka, dok su se jasno razlikovali od transformisanog američkog liberalnog pokreta.
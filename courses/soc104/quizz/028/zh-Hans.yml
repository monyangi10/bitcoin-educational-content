question: 是什么历史发展导致美国的古典自由主义者从 20 世纪 60 年代开始使用 "自由主义者 "一词？
answer: 美国自由主义者转向支持大政府和国家干预，这与古典自由主义原则相悖
wrong_answers:
  - 欧洲自由主义者首先开始使用 "自由主义者 "一词，迫使美国人沿用同样的术语
  - 共和党正式采纳了古典自由主义立场，使得 "自由主义 "一词在政治上无法使用
  - 古典自由主义者希望将自己与日益流行的欧洲社会民主运动区分开来
explanation: |
  该章解释说，美国的 "自由主义者 "逐渐支持通过罗斯福新政和路透社 "伟大社会 "等计划进行广泛的国家干预，从而与大政府政策联系在一起。这直接违背了自由放任经济学和限制政府干预的经典自由主义原则。为了避免与这些国家主义的 "自由主义者 "混淆，古典自由主义的支持者采用了 "自由主义者 "作为自己的标识，既保持了与 19 世纪欧洲自由主义传统的连续性，又将自己与转型后的美国自由主义运动明确区分开来。
question: Vilken historisk utveckling ledde till att klassiska liberaler i USA började använda termen "libertarian" från och med 1960-talet?
answer: Amerikanska liberaler hade skiftat till att stödja stora regeringar och statliga ingripanden, vilket strider mot klassiska liberala principer
wrong_answers:
  - Europeiska liberaler började använda termen "libertarian" först, vilket tvingade amerikanerna att använda samma terminologi
  - Det republikanska partiet antog officiellt klassiskt liberala ståndpunkter, vilket gjorde termen "liberal" politiskt otillgänglig
  - Klassiska liberaler ville skilja sig från europeiska socialdemokratiska rörelser som blev allt populärare
explanation: |
  I kapitlet förklaras att amerikanska "liberaler" utvecklades till att stödja omfattande statliga ingripanden genom program som FDR:s New Deal och LBJ:s Great Society, och kom att förknippas med en politik för stora regeringar. Detta stod i direkt motsats till de klassiska liberala principerna om laissez-faire-ekonomi och begränsad statlig inblandning. För att undvika sammanblandning med dessa statsliberala "liberaler" antog anhängare av klassisk liberalism "libertarian" som sitt signum och upprätthöll därmed kontinuiteten med 1800-talets europeiska liberala traditioner samtidigt som de tydligt skilde sig från den omvandlade amerikanska liberala rörelsen.
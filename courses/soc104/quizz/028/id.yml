question: Perkembangan historis apa yang membuat kaum liberal klasik di Amerika Serikat mengadopsi istilah 'libertarian' mulai tahun 1960-an?
answer: Kaum liberal Amerika telah bergeser ke arah mendukung pemerintah yang besar dan intervensi negara, yang bertentangan dengan prinsip-prinsip liberal klasik
wrong_answers:
  - Kaum liberal Eropa mulai menggunakan istilah 'libertarian' terlebih dahulu, memaksa orang Amerika untuk mengikuti terminologi yang sama
  - Partai Republik secara resmi mengadopsi posisi liberal klasik, sehingga istilah 'liberal' secara politis tidak tersedia
  - Kaum liberal klasik ingin membedakan diri mereka dari gerakan sosial demokrat Eropa yang semakin populer
explanation: |
  Bab ini menjelaskan bahwa kaum 'liberal' Amerika berevolusi untuk mendukung intervensi negara yang luas melalui program-program seperti New Deal dari FDR dan Great Society dari LBJ, yang kemudian diasosiasikan dengan kebijakan-kebijakan pemerintah yang besar. Hal ini secara langsung bertentangan dengan prinsip-prinsip liberal klasik tentang ekonomi laissez-faire dan intervensi pemerintah yang terbatas. Untuk menghindari kebingungan dengan para 'liberal' statistik ini, para pendukung liberalisme klasik mengadopsi 'libertarian' sebagai pengenal mereka, mempertahankan kesinambungan dengan tradisi liberal Eropa abad ke-19 sambil dengan jelas membedakan diri mereka dari gerakan liberal Amerika yang telah bertransformasi.

question: Hva er den grunnleggende forskjellen mellom statlige penger (fiat) og markedspenger som Bitcoin, ifølge libertariansk filosofi?
answer: Statspenger er tvangsmessige og sentraliserte, mens markedspenger oppstår frivillig og opprettholder langsiktig verdi
wrong_answers:
  - Statlige penger er mer stabile og regulerte, mens markedspenger er ustabile og uforutsigbare
  - Statlige penger tjener sosiale velferdsmål, mens markedspenger bare kommer velstående investorer til gode
  - Statspenger er demokratiske og ansvarlige, mens markedspenger kontrolleres av anonyme utviklere
explanation: |
  Kapitlet skiller tydelig mellom statlige penger (fiat) som et sentralisert tvangssystem som har en tendens til å miste verdi, og markedspenger som Bitcoin, som oppstår frivillig, spontant og bevarer verdien på lang sikt.
  Dette gjenspeiler det bredere libertarianske prinsippet om frivillige versus tvangssystemer. De gale svarene gir en feilaktig fremstilling av den libertarianske kritikken ved å fokusere på konvensjonelle økonomiske argumenter i stedet for det filosofiske skillet mellom frivillige og tvangsstyrte pengesystemer.
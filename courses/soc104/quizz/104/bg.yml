question: Според либертарианската философия каква е основната разлика между държавните пари (фиат) и пазарните пари като Bitcoin?
answer: Държавните пари са принудителни и централизирани, докато пазарните пари се появяват доброволно и поддържат дългосрочна стойност
wrong_answers:
  - Държавните пари са по-стабилни и регулирани, докато пазарните пари са променливи и непредсказуеми
  - Държавните пари служат за постигане на целите на социалното благосъстояние, докато пазарните пари са от полза само за богатите инвеститори
  - Държавните пари са демократични и отговорни, докато пазарните пари се контролират от анонимни разработчици
explanation: |
  В главата ясно се прави разграничение между държавните пари (фиат) като принудителна, централизирана система, която има тенденция да губи стойността си, и пазарните пари като Bitcoin, които възникват доброволно, спонтанно и запазват стойността си в дългосрочен план.
  Това отразява по-широкия либертариански принцип на доброволните срещу принудителните системи. Грешните отговори представят погрешно либертарианската критика, като се фокусират върху конвенционалните икономически аргументи, а не върху философското разграничение между доброволните и принудителните парични системи.
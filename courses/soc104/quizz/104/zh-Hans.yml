question: 根据自由主义哲学，国家货币（法定货币）和市场货币（如 Bitcoin）之间的根本区别是什么？
answer: 国家货币具有强制性和集中性，而市场货币是自愿产生的，并能保持长期价值
wrong_answers:
  - 国家货币更稳定、更规范，而市场货币则动荡不定、难以预测
  - 国家货币服务于社会福利目标，而市场货币只有利于富有的投资者
  - 国家货币是民主和负责任的，而市场货币则由匿名开发商控制
explanation: |
  本章明确区分了国家货币（法定货币）与市场货币（如 Bitcoin），前者是一种强制性的中央集权制度，往往会失去价值，而后者则是自愿、自发产生的，并能长期保持价值。
  这反映了更广泛的自由主义原则，即自愿制度与强制制度的对比。错误答案歪曲了自由主义的批判，只关注传统的经济论点，而不是自愿和强制货币体系之间的哲学区别。
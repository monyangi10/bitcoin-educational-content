question: Prema libertarijanskoj filozofiji, osnovna razlika između državnog novca (fiat) i tržišnog novca poput Bitcoin leži u načinu njihovog stvaranja i kontrole. Državni novac izdaje i reguliše centralna vlast, dok tržišni novac nastaje kroz slobodne tržišne procese i nije pod kontrolom države.
answer: Državni novac je prinudan i centralizovan dok tržišni novac nastaje dobrovoljno i održava dugoročnu vrednost
wrong_answers:
  - Državni novac je stabilniji i regulisaniji, dok je tržišni novac nestabilan i nepredvidiv.
  - Državni novac služi ciljevima socijalne dobrobiti dok tržišni novac koristi samo bogatim investitorima
  - Državni novac je demokratski i odgovoran, dok je tržišni novac pod kontrolom anonimnih programera.
explanation: |
  Poglavlje jasno razlikuje državne novce (fiat) kao prinudni, centralizovani sistem koji teži da gubi vrednost, naspram tržišnog novca poput Bitcoin koji nastaje dobrovoljno, spontano i čuva vrednost dugoročno. 
  Ovo odražava širi libertarijanski princip dobrovoljnih naspram prinudnih sistema. Pogrešni odgovori pogrešno predstavljaju libertarijansku kritiku fokusirajući se na konvencionalne ekonomske argumente umesto na filozofsku razliku između dobrovoljnih i prinudnih monetarnih sistema.
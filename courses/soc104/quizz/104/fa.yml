question: بر اساس فلسفه لیبرترین، تفاوت اساسی بین پول دولتی (فیات) و پول بازار مانند Bitcoin چیست؟
answer: پول دولتی اجباری و متمرکز است در حالی که پول بازار به صورت داوطلبانه ظهور می‌کند و ارزش بلندمدت خود را حفظ می‌کند
wrong_answers:
  - پول دولتی پایدارتر و تنظیم‌شده‌تر است، در حالی که پول بازار ناپایدار و غیرقابل پیش‌بینی است.
  - پول دولتی اهداف رفاه اجتماعی را تأمین می‌کند در حالی که پول بازار تنها به نفع سرمایه‌گذاران ثروتمند است.
  - پول دولتی دموکراتیک و پاسخگو است در حالی که پول بازار توسط توسعه‌دهندگان ناشناس کنترل می‌شود
explanation: |
  این فصل به وضوح بین پول دولتی (فیات) به عنوان یک سیستم اجباری و متمرکز که تمایل به از دست دادن ارزش دارد، و پول بازار مانند Bitcoin که به صورت داوطلبانه و خودجوش ظهور می‌کند و ارزش را در بلندمدت حفظ می‌کند، تمایز قائل می‌شود.  
  این موضوع اصل گسترده‌تر لیبرترین درباره سیستم‌های داوطلبانه در مقابل اجباری را منعکس می‌کند. پاسخ‌های نادرست نقد لیبرترین را با تمرکز بر استدلال‌های اقتصادی متعارف به جای تمایز فلسفی بین سیستم‌های پولی داوطلبانه و اجباری نادرست نشان می‌دهند.
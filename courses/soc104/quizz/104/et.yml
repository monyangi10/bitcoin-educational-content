question: Milline on libertaarne filosoofia kohaselt põhimõtteline erinevus riigi raha (fiat) ja tururaha, nagu Bitcoin, vahel?
answer: Riigi raha on sunniviisiline ja tsentraliseeritud, samas kui tururaha tekib vabatahtlikult ja säilitab pikaajalise väärtuse
wrong_answers:
  - Riigi raha on stabiilsem ja reguleeritum, samas kui tururaha on volatiilne ja ettearvamatu
  - Riigi raha teenib sotsiaalse heaolu eesmärke, samas kui tururaha toob kasu ainult jõukatele investoritele
  - Riigi raha on demokraatlik ja vastutustundlik, samas kui tururaha kontrollivad anonüümsed arendajad
explanation: |
  Peatükis eristatakse selgelt riigi raha (fiat) kui sunniviisilist, tsentraliseeritud süsteemi, mis kipub väärtust kaotama, ja tururaha, nagu Bitcoin, mis tekib vabatahtlikult, spontaanselt ja säilitab väärtuse pikaajaliselt.
  See peegeldab laiemat libertaarset põhimõtet vabatahtlike versus sunniviisiliste süsteemide kohta. Väärad vastused moonutavad libertaristlikku kriitikat, keskendudes pigem tavapärastele majanduslikele argumentidele kui filosoofilisele erinevusele vabatahtlike ja sunniviisiliste rahasüsteemide vahel.
question: リバタリアン哲学によれば、国家貨幣（不換紙幣）とBitcoinのような市場貨幣の根本的な違いは何なのか？
answer: 国家貨幣は強制的で中央集権的であるのに対し、市場貨幣は自発的に生まれ、長期的価値を維持する。
wrong_answers:
  - 国家資金はより安定し、規制されているが、市場資金は不安定で予測不可能である。
  - 国家資金は社会福祉に役立つが、市場資金は裕福な投資家に利益をもたらすだけである。
  - 国家資金は民主的で説明責任があるが、市場資金は匿名の開発者によって管理されている。
explanation: |
  この章では、国家貨幣（不換紙幣）は強制的で中央集権的なシステムであり、価値を失いがちであるのに対し、Bitcoinのような市場貨幣は自発的に生まれ、長期的に価値を維持するものである、と明確に区別している。
  これは、自発的なシステム対強制的なシステムという、より広範なリバタリアンの原則を反映している。間違った答えは、自発的な貨幣制度と強制的な貨幣制度の哲学的区別ではなく、従来の経済学的議論に焦点を当てることで、リバタリアン批判を誤って伝えている。
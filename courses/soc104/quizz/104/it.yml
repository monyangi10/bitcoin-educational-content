question: Secondo la filosofia libertaria, qual è la differenza fondamentale tra il denaro statale (fiat) e il denaro di mercato come il Bitcoin?
answer: Il denaro di Stato è coercitivo e centralizzato, mentre il denaro di mercato emerge volontariamente e mantiene il valore a lungo termine
wrong_answers:
  - Il denaro dello Stato è più stabile e regolamentato, mentre quello del mercato è volatile e imprevedibile
  - Il denaro dello Stato serve agli obiettivi di benessere sociale, mentre il denaro del mercato va a beneficio solo degli investitori più ricchi
  - Il denaro dello Stato è democratico e responsabile, mentre il denaro del mercato è controllato da sviluppatori anonimi
explanation: |
  Il capitolo distingue chiaramente tra il denaro di Stato (fiat) come sistema coercitivo e centralizzato che tende a perdere valore, e il denaro di mercato come il Bitcoin che emerge volontariamente, spontaneamente e conserva il valore a lungo termine.
  Questo riflette il più ampio principio libertario della contrapposizione tra sistemi volontari e sistemi coercitivi. Le risposte sbagliate travisano la critica libertaria concentrandosi su argomenti economici convenzionali piuttosto che sulla distinzione filosofica tra sistemi monetari volontari e coercitivi.
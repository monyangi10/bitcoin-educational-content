question: Menurut filosofi libertarian, apa perbedaan mendasar antara uang negara (fiat) dan uang pasar seperti Bitcoin?
answer: Uang negara bersifat memaksa dan terpusat, sementara uang pasar muncul secara sukarela dan mempertahankan nilai jangka panjang
wrong_answers:
  - Uang negara lebih stabil dan diatur, sementara uang pasar tidak stabil dan tidak dapat diprediksi
  - Uang negara melayani tujuan kesejahteraan sosial, sementara uang pasar hanya menguntungkan investor kaya
  - Uang negara bersifat demokratis dan dapat dipertanggungjawabkan, sementara uang pasar dikendalikan oleh pengembang yang tidak dikenal
explanation: |
  Bab ini dengan jelas membedakan antara uang negara (fiat) sebagai sistem yang memaksa dan tersentralisasi yang cenderung kehilangan nilainya, versus uang pasar seperti Bitcoin yang muncul secara sukarela, spontan, dan mempertahankan nilainya dalam jangka panjang.
  Hal ini mencerminkan prinsip libertarian yang lebih luas tentang sistem sukarela versus sistem paksaan. Jawaban yang salah menggambarkan kritik libertarian dengan berfokus pada argumen ekonomi konvensional daripada perbedaan filosofis antara sistem moneter sukarela dan paksaan.
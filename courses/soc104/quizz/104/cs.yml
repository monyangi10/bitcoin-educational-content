question: Jaký je podle libertariánské filozofie základní rozdíl mezi státními penězi (fiat) a tržními penězi, jako je Bitcoin?
answer: Státní peníze jsou donucovací a centralizované, zatímco tržní peníze vznikají dobrovolně a udržují si dlouhodobou hodnotu
wrong_answers:
  - Státní peníze jsou stabilnější a regulovanější, zatímco tržní peníze jsou nestálé a nepředvídatelné
  - Státní peníze slouží cílům sociálního blahobytu, zatímco tržní peníze přinášejí prospěch pouze bohatým investorům
  - Státní peníze jsou demokratické a zodpovědné, zatímco tržní peníze ovládají anonymní vývojáři
explanation: |
  Kapitola jasně rozlišuje mezi státními penězi (fiat) jako donucovacím, centralizovaným systémem, který má tendenci ztrácet hodnotu, a tržními penězi, jako je Bitcoin, které vznikají dobrovolně, spontánně a dlouhodobě si uchovávají hodnotu.
  To odráží širší libertariánský princip dobrovolných versus donucovacích systémů. Špatné odpovědi zkreslují libertariánskou kritiku tím, že se zaměřují na konvenční ekonomické argumenty, a nikoli na filozofický rozdíl mezi dobrovolnými a donucovacími peněžními systémy.
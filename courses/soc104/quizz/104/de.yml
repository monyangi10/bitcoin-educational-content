question: Was ist nach der libertären Philosophie der grundlegende Unterschied zwischen staatlichem Geld (fiat) und Marktgeld wie Bitcoin?
answer: Staatliches Geld ist zwangsweise und zentralisiert, während Marktgeld freiwillig entsteht und einen langfristigen Wert behält
wrong_answers:
  - Staatliches Geld ist stabiler und reguliert, während Marktgeld volatil und unberechenbar ist
  - Staatliche Gelder dienen dem Gemeinwohl, während Marktgelder nur wohlhabenden Investoren zugute kommen
  - Staatliches Geld ist demokratisch und rechenschaftspflichtig, während Marktgeld von anonymen Entwicklern kontrolliert wird
explanation: |
  Das Kapitel unterscheidet klar zwischen staatlichem Geld (fiat) als zwanghaftem, zentralisiertem System, das dazu neigt, an Wert zu verlieren, und Marktgeld wie Bitcoin, das freiwillig und spontan entsteht und seinen Wert langfristig bewahrt.
  Dies spiegelt das breitere libertäre Prinzip der Freiwilligkeit gegenüber Zwangssystemen wider. Die falschen Antworten stellen die libertäre Kritik falsch dar, indem sie sich auf konventionelle wirtschaftliche Argumente konzentrieren und nicht auf die philosophische Unterscheidung zwischen freiwilligen und erzwungenen Geldsystemen.
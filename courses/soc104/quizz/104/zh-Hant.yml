question: 根據自由主義哲學，國家貨幣（法定貨幣）和市場貨幣（如 Bitcoin）之間的根本區別是什麼？
answer: 國家貨幣具有強制性和集中性，而市場貨幣則是自願出現並維持長期價值。
wrong_answers:
  - 國家貨幣較為穩定且受監管，而市場貨幣則波動且不可預測
  - 國家資金為社會福利目標服務，而市場資金只有利於富有的投資者
  - 國家貨幣是民主和負責任的，而市場貨幣則由匿名的開發者控制。
explanation: |
  本章清楚區分了國家貨幣（法定貨幣）與市場貨幣（如 Bitcoin），前者是強制性、集中式的系統，往往會失去價值，而後者則是自願、自發地產生，並能長期保值。
  這反映了更廣泛的自由主義原則，即自願與強制系統的對立。錯誤的答案歪曲了自由主義的批判，他們著重於傳統的經濟論點，而不是自願和強制性貨幣體系之間的哲學區別。
question: Según la filosofía libertaria, ¿cuál es la diferencia fundamental entre el dinero estatal (fiat) y el dinero de mercado como el Bitcoin?
answer: El dinero estatal es coercitivo y centralizado, mientras que el dinero de mercado surge voluntariamente y mantiene su valor a largo plazo
wrong_answers:
  - El dinero del Estado es más estable y está más regulado, mientras que el del mercado es volátil e impredecible
  - El dinero del Estado está al servicio del bienestar social, mientras que el dinero del mercado sólo beneficia a los inversores ricos
  - El dinero del Estado es democrático y responsable, mientras que el dinero del mercado está controlado por promotores anónimos
explanation: |
  El capítulo distingue claramente entre el dinero estatal (fiduciario) como sistema coercitivo y centralizado que tiende a perder valor, y el dinero de mercado como el Bitcoin, que surge de forma voluntaria y espontánea y conserva su valor a largo plazo.
  Esto refleja el principio libertario más amplio de los sistemas voluntarios frente a los coercitivos. Las respuestas erróneas tergiversan la crítica libertaria al centrarse en argumentos económicos convencionales en lugar de en la distinción filosófica entre sistemas monetarios voluntarios y coercitivos.
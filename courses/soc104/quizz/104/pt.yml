question: De acordo com a filosofia libertária, qual é a diferença fundamental entre o dinheiro do Estado (fiat) e o dinheiro do mercado, como o Bitcoin?
answer: A moeda do Estado é coerciva e centralizada, enquanto a moeda do mercado surge voluntariamente e mantém o valor a longo prazo
wrong_answers:
  - A moeda do Estado é mais estável e regulamentada, enquanto a moeda do mercado é volátil e imprevisível
  - O dinheiro do Estado serve objectivos de bem-estar social, enquanto o dinheiro do mercado apenas beneficia os investidores ricos
  - O dinheiro do Estado é democrático e responsável, enquanto o dinheiro do mercado é controlado por criadores anónimos
explanation: |
  O capítulo distingue claramente entre o dinheiro do Estado (fiat) como um sistema coercivo e centralizado que tende a perder valor, e o dinheiro do mercado como o Bitcoin que surge voluntariamente, espontaneamente, e preserva o valor a longo prazo.
  Isto reflecte o princípio libertário mais amplo de sistemas voluntários versus sistemas coercivos. As respostas erradas deturpam a crítica libertária ao centrarem-se em argumentos económicos convencionais e não na distinção filosófica entre sistemas monetários voluntários e coercivos.
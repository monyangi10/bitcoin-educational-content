question: Dushingiye kuri filozofiya y’abanyagihugu, ni irihe tandukaniro ry’ishimikiro riri hagati y’amahera ya Leta (fiat) n’amahera y’isoko nka Bitcoin?
answer: Amahera ya Leta ni ay’uguhatira kandi ashirwa hamwe mu gihe amahera y’isoko asohoka ku bushake kandi akaguma afise agaciro k’igihe kirekire .
wrong_answers:
  - Amafaranga ya Leta arashikama kandi aratunganijwe mu gihe amafaranga y'isoko ahinduka kandi ntamenyekana .
  - Amafaranga ya Leta afasha mu ntumbero z’imibereho myiza y’abantu mu gihe amafaranga y’isoko afasha gusa abashoramari batunze
  - Amafaranga ya Leta ni demokarasi kandi arabazwa mu gihe amafaranga y'isoko agenzurwa n'abaterambere batazwi .
explanation: |
  Iki gice gitandukanya neza amahera ya Leta (fiat) nk’uburyo bwo guhatira, bushizwe hamwe bukunda gutakaza agaciro, n’amahera y’isoko nka Bitcoin asohoka ku bushake, yihuta, kandi akazigama agaciro igihe kirekire. 
  Ivyo vyerekana ingingo ngenderwako y’ubwigenge yagutse y’uburyo bwo gukora ku bushake n’uburyo bwo guhatira. Inyishu zitari zo zigaragaza nabi ukunegura kw’abanyagihugu mu kwibanda ku mpamvu z’ubutunzi zisanzwe aho kwibanda ku gutandukanya ubuhinga bwa filozofiya hagati y’uburyo bw’amahera bushingiye ku bushake n’uburyo bw’amahera bukoreshwa ku nguvu.
question: According to libertarian philosophy, what is the fundamental difference between state money (fiat) and market money like Bitcoin?
answer: State money is coercive and centralized while market money emerges voluntarily and maintains long-term value
wrong_answers:
  - State money is more stable and regulated while market money is volatile and unpredictable
  - State money serves social welfare goals while market money only benefits wealthy investors
  - State money is democratic and accountable while market money is controlled by anonymous developers
explanation: |
  The chapter clearly distinguishes between state money (fiat) as a coercive, centralized system that tends to lose value, versus market money like Bitcoin which emerges voluntarily, spontaneously, and preserves value long-term. This reflects the broader libertarian principle of voluntary versus coercive systems. The wrong answers misrepresent the libertarian critique by focusing on conventional economic arguments rather than the philosophical distinction between voluntary and coercive monetary systems.

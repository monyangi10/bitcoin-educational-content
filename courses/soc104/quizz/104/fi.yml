question: Mikä on libertaristisen filosofian mukaan valtion rahan (fiat) ja Bitcoin:n kaltaisen markkinarahan välinen perusero?
answer: Valtion raha on pakottavaa ja keskitettyä, kun taas markkinaraha syntyy vapaaehtoisesti ja säilyttää pitkän aikavälin arvon
wrong_answers:
  - Valtion raha on vakaampaa ja säännellympää, kun taas markkinaraha on epävakaata ja arvaamatonta
  - Valtion raha palvelee sosiaalisen hyvinvoinnin tavoitteita, kun taas markkinaraha hyödyttää vain varakkaita sijoittajia
  - Valtion raha on demokraattista ja vastuullista, kun taas markkinarahaa valvovat anonyymit kehittäjät
explanation: |
  Luvussa tehdään selvä ero valtion rahan (fiat-rahan) välillä, joka on pakottava, keskitetty järjestelmä, jolla on taipumus menettää arvonsa, ja Bitcoin:n kaltaisen markkinarahan välillä, joka syntyy vapaaehtoisesti, spontaanisti ja säilyttää arvonsa pitkällä aikavälillä.
  Tämä kuvastaa laajempaa libertaristista periaatetta, joka koskee vapaaehtoisten ja pakottavien järjestelmien vastakkainasettelua. Väärät vastaukset vääristelevät libertaristista kritiikkiä keskittymällä tavanomaisiin taloudellisiin argumentteihin sen sijaan, että keskityttäisiin vapaaehtoisten ja pakottavien rahajärjestelmien väliseen filosofiseen eroon.
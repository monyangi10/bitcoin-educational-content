question: स्वतंत्रतावादी दर्शन के अनुसार, राज्य मुद्रा (फिएट) और बाजार मुद्रा जैसे Bitcoin के बीच मूलभूत अंतर क्या है?
answer: राज्य द्वारा नियंत्रित मुद्रा बाध्यकारी और केंद्रीकृत होती है, जबकि बाजार द्वारा नियंत्रित मुद्रा स्वैच्छिक रूप से उत्पन्न होती है और दीर्घकालिक मूल्य बनाए रखती है।
wrong_answers:
  - सरकारी मुद्रा अधिक स्थिर और विनियमित होती है जबकि बाजार मुद्रा अस्थिर और अप्रत्याशित होती है।
  - सरकारी धन सामाजिक कल्याण के लक्ष्यों को पूरा करता है, जबकि बाजार से मिलने वाला धन केवल धनी निवेशकों को लाभ पहुंचाता है।
  - सरकारी धन लोकतांत्रिक और जवाबदेह होता है, जबकि बाजार का धन गुमनाम निर्माताओं द्वारा नियंत्रित होता है।
explanation: |
  यह अध्याय राज्य मुद्रा (फिएट) को एक दमनकारी, केंद्रीकृत प्रणाली के रूप में स्पष्ट रूप से अलग करता है, जिसका मूल्य समय के साथ घटता जाता है, जबकि बाजार मुद्रा जैसे Bitcoin स्वैच्छिक और स्वतः उत्पन्न होती है तथा दीर्घकालिक रूप से अपना मूल्य बनाए रखती है।
  यह स्वैच्छिक बनाम दमनकारी प्रणालियों के व्यापक स्वतंत्रतावादी सिद्धांत को प्रतिबिंबित करता है। गलत उत्तर स्वैच्छिक और दमनकारी मौद्रिक प्रणालियों के दार्शनिक अंतर के बजाय पारंपरिक आर्थिक तर्कों पर ध्यान केंद्रित करके स्वतंत्रतावादी आलोचना को गलत तरीके से प्रस्तुत करते हैं।
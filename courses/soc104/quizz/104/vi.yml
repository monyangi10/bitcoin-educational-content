question: Theo triết lý tự do, sự khác biệt cơ bản giữa tiền nhà nước (tiền pháp định) và tiền thị trường như Bitcoin là gì?
answer: Tiền nhà nước mang tính cưỡng chế và tập trung, trong khi tiền thị trường xuất hiện một cách tự nguyện và duy trì giá trị lâu dài.
wrong_answers:
  - Tiền nhà nước ổn định và được quản lý chặt chẽ hơn, trong khi tiền thị trường dễ biến động và khó dự đoán.
  - Tiền nhà nước phục vụ các mục tiêu phúc lợi xã hội, trong khi tiền thị trường chỉ mang lại lợi ích cho các nhà đầu tư giàu có.
  - Tiền nhà nước mang tính dân chủ và minh bạch, trong khi tiền thị trường lại do các nhà phát triển ẩn danh kiểm soát.
explanation: |
  Chương này phân biệt rõ ràng giữa tiền nhà nước (tiền pháp định) như một hệ thống tập trung, mang tính cưỡng chế và có xu hướng mất giá, với tiền thị trường như Bitcoin, loại tiền xuất hiện một cách tự nguyện, tự phát và giữ được giá trị lâu dài.
  Điều này phản ánh nguyên tắc tự do rộng hơn về hệ thống tự nguyện so với hệ thống cưỡng chế. Các câu trả lời sai đã xuyên tạc phê bình của chủ nghĩa tự do bằng cách tập trung vào các lập luận kinh tế thông thường thay vì sự phân biệt triết học giữa hệ thống tiền tệ tự nguyện và cưỡng chế.
question: Enligt libertariansk filosofi, vad är den grundläggande skillnaden mellan statliga pengar (fiat) och marknadspengar som Bitcoin?
answer: Statliga pengar är tvingande och centraliserade medan marknadspengar uppstår frivilligt och upprätthåller ett långsiktigt värde
wrong_answers:
  - Statliga pengar är mer stabila och reglerade medan marknadspengar är flyktiga och oförutsägbara
  - Statliga pengar tjänar sociala välfärdsmål medan marknadspengar endast gynnar rika investerare
  - Statliga pengar är demokratiska och ansvariga medan marknadspengar styrs av anonyma utvecklare
explanation: |
  Kapitlet skiljer tydligt mellan statliga pengar (fiat) som ett tvingande, centraliserat system som tenderar att förlora värde, och marknadspengar som Bitcoin som uppstår frivilligt, spontant och bevarar värdet på lång sikt.
  Detta återspeglar den bredare libertarianska principen om frivilliga system kontra tvångssystem. De felaktiga svaren ger en felaktig bild av den libertarianska kritiken genom att fokusera på konventionella ekonomiska argument snarare än den filosofiska skillnaden mellan frivilliga och tvingande monetära system.
question: Согласно либертарианской философии, в чем принципиальная разница между государственными деньгами (фиатными) и рыночными деньгами типа Bitcoin?
answer: Государственные деньги являются принудительными и централизованными, в то время как рыночные деньги возникают добровольно и сохраняют долгосрочную стоимость
wrong_answers:
  - Государственные деньги более стабильны и регулируются, в то время как рыночные деньги изменчивы и непредсказуемы
  - Государственные деньги служат целям социального обеспечения, в то время как рыночные деньги выгодны только богатым инвесторам
  - Государственные деньги демократичны и подотчетны, в то время как рыночные деньги контролируются анонимными разработчиками
explanation: |
  В главе проводится четкое различие между государственными деньгами (фиатными) как принудительной, централизованной системой, которая имеет тенденцию к потере стоимости, и рыночными деньгами, такими как Bitcoin, которые возникают добровольно, спонтанно и сохраняют стоимость в долгосрочной перспективе.
  Это отражает более широкий либертарианский принцип добровольности в сравнении с принудительными системами. Неправильные ответы искажают либертарианскую критику, фокусируясь на обычных экономических аргументах, а не на философском различии между добровольными и принудительными денежными системами.
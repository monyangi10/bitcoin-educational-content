question: Kulingana na falsafa ya uhuru, ni tofauti gani ya msingi kati ya pesa za serikali (fiat) na pesa za soko kama Bitcoin?
answer: Pesa za serikali ni za kulazimisha na za kati huku pesa za soko zikiibuka kwa hiari na kudumisha thamani ya muda mrefu.
wrong_answers:
  - Pesa za serikali ni imara zaidi na zinadhibitiwa ilhali pesa za sokoni ni tete na hazitabiriki
  - Pesa za serikali hutimiza malengo ya ustawi wa jamii huku pesa za soko zikiwanufaisha wawekezaji matajiri pekee
  - Pesa za serikali ni za kidemokrasia na zinawajibika ilhali pesa za soko zinadhibitiwa na watengenezaji wasiojulikana
explanation: |
  Sura hii inatofautisha wazi kati ya pesa za serikali (fiat) kama mfumo wa kulazimisha, ulio kati ambao huelekea kupoteza thamani, dhidi ya pesa za soko kama Bitcoin ambao huibuka kwa hiari, kwa hiari, na huhifadhi thamani kwa muda mrefu.
  
  Hii inaonyesha kanuni pana ya uhuru wa mifumo ya hiari dhidi ya kulazimisha. Majibu yasiyo sahihi yanapotosha ukosoaji wa uhuru kwa kuzingatia hoja za kawaida za kiuchumi badala ya tofauti ya kifalsafa kati ya mifumo ya fedha ya hiari na ya kulazimisha.
question: Wat is volgens de libertarische filosofie het fundamentele verschil tussen staatsgeld (fiatgeld) en marktgeld zoals Bitcoin?
answer: Staatsgeld is dwingend en gecentraliseerd, terwijl marktgeld vrijwillig ontstaat en de waarde op lange termijn behoudt
wrong_answers:
  - Staatsgeld is stabieler en gereguleerd, terwijl marktgeld volatiel en onvoorspelbaar is
  - Staatsgeld dient sociale doelen terwijl marktgeld alleen rijke investeerders ten goede komt
  - Staatsgeld is democratisch en controleerbaar, terwijl marktgeld wordt gecontroleerd door anonieme ontwikkelaars
explanation: |
  Het hoofdstuk maakt een duidelijk onderscheid tussen staatsgeld (fiatgeld) als een dwingend, gecentraliseerd systeem dat de neiging heeft waarde te verliezen, versus marktgeld zoals Bitcoin dat vrijwillig en spontaan ontstaat en op lange termijn waarde behoudt.
  Dit weerspiegelt het bredere libertarische principe van vrijwillige versus dwingende systemen. De foute antwoorden geven een verkeerd beeld van de libertarische kritiek door zich te richten op conventionele economische argumenten in plaats van op het filosofische onderscheid tussen vrijwillige en dwingende monetaire systemen.
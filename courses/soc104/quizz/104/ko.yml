question: 자유주의 철학에 따르면 국가 화폐(법정화폐)와 Bitcoin과 같은 시장 화폐의 근본적인 차이점은 무엇인가요?
answer: 국가 화폐는 강압적이고 중앙집권적인 반면, 시장 화폐는 자발적으로 출현하고 장기적인 가치를 유지합니다
wrong_answers:
  - 국가 화폐는 더 안정적이고 규제를 받는 반면 시장 화폐는 변동성이 크고 예측하기 어렵습니다
  - 국가 자금은 사회 복지 목표를 달성하는 반면 시장 자금은 부유한 투자자에게만 혜택을 제공합니다
  - 국가 자금은 민주적이고 책임감 있는 반면 시장 자금은 익명의 개발자에 의해 통제됩니다
explanation: |
  이 장에서는 가치를 잃기 쉬운 강압적이고 중앙집권적인 시스템인 국가 화폐(법정화폐)와 자발적이고 자발적으로 등장하며 장기적으로 가치를 보존하는 Bitcoin과 같은 시장 화폐를 명확하게 구분하고 있습니다.
  이는 자발적 시스템과 강압적 시스템이라는 보다 광범위한 자유주의 원칙을 반영합니다. 오답은 자발적 통화 시스템과 강압적 통화 시스템의 철학적 구분보다는 전통적인 경제 논증에 초점을 맞추어 자유주의적 비판을 잘못 표현하고 있습니다.
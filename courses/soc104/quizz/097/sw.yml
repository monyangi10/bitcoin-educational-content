question: Kulingana na Ilani ya Cypherpunk ya Eric Hughes, ni jukumu gani kuu la kulinda faragha katika jamii ya kielektroniki iliyo wazi?
answer: Watu binafsi lazima watetee faragha yao wenyewe badala ya kutegemea serikali au mashirika kutoa
wrong_answers:
  - Serikali zinapaswa kuanzisha kanuni kamili za faragha ili kuwalinda raia kutokana na ufuatiliaji wa makampuni
  - Mashirika makubwa lazima yatekeleze kwa hiari ulinzi wa faragha kama sehemu ya uwajibikaji wao wa kijamii wa shirika
  - Mikataba ya kimataifa inapaswa kujadiliwa ili kuunda viwango vya faragha vya ulimwengu vinavyotekelezwa na vyombo vya kimataifa
explanation: |
  Hughes alisema waziwazi kwamba 'Hatuwezi kutarajia serikali, mashirika, au mashirika mengine makubwa yasiyojulikana kutuhakikishia usiri' na kwamba lengo kuu la Cypherpunks ni 'kuwafanya watu watetee usiri wao, badala ya kumtegemea mtu mwingine kutoa'.
  
  Hii inaonyesha falsafa ya msingi ya cypherpunk ya uwajibikaji wa mtu binafsi na kutoamini taasisi kuu. Harakati hiyo iliamini kwamba zana za kriptografia zinapaswa kuwawezesha watu kujilinda badala ya kutegemea taasisi zile zile walizoziona kama vitisho vinavyowezekana kwa faragha na uhuru.
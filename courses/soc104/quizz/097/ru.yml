question: Согласно "Манифесту Cypherpunk" Эрика Хьюза, что является главной обязанностью по защите частной жизни в открытом электронном обществе?
answer: Люди должны сами активно защищать свою частную жизнь, а не полагаться на правительства или корпорации, которые должны ее обеспечить
wrong_answers:
  - Правительствам следует разработать всеобъемлющие правила защиты частной жизни, чтобы оградить граждан от корпоративной слежки
  - Крупные организации должны добровольно внедрять защиту конфиденциальности в рамках своей корпоративной социальной ответственности
  - Необходимо заключить международные договоры, чтобы создать универсальные стандарты конфиденциальности, соблюдаемые наднациональными органами
explanation: |
  Хьюз прямо заявил: "Мы не можем ожидать, что правительства, корпорации или другие крупные анонимные организации будут гарантировать нам конфиденциальность", и что главная цель для киберпанков - "заставить людей защищать свою конфиденциальность, а не полагаться на то, что кто-то другой ее обеспечит".
  Это отражает основную философию сайферпанка - индивидуальную ответственность и недоверие к централизованным институтам. Движение считает, что криптографические инструменты должны давать людям возможность защищать себя самостоятельно, а не зависеть от тех самых институтов, которые они рассматривают как потенциальные угрозы частной жизни и свободе.
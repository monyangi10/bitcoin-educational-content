question: طبق بیانیه Cypherpunk اریک هیوز، مسئولیت اصلی حفاظت از حریم خصوصی در یک جامعه الکترونیکی باز بر عهده کیست؟
answer: افراد باید به‌طور فعال از حریم خصوصی خود دفاع کنند و به جای تکیه بر دولت‌ها یا شرکت‌ها برای تأمین آن، خود اقدام کنند.
wrong_answers:
  - دولت‌ها باید مقررات جامع حریم خصوصی را برای حفاظت از شهروندان در برابر نظارت شرکتی وضع کنند.
  - سازمان‌های بزرگ باید به‌طور داوطلبانه حفاظت از حریم خصوصی را به‌عنوان بخشی از مسئولیت اجتماعی شرکتی خود اجرا کنند.
  - معاهدات بین‌المللی باید برای ایجاد استانداردهای جهانی حریم خصوصی که توسط نهادهای فراملی اجرا می‌شوند، مذاکره شوند.
explanation: |
  هیوز به‌صراحت بیان کرد که «ما نمی‌توانیم از دولت‌ها، شرکت‌ها یا دیگر سازمان‌های بزرگ و ناشناس انتظار داشته باشیم که محرمانگی ما را تضمین کنند» و هدف اصلی سایفرپانک‌ها این است که «مردم از محرمانگی خود دفاع کنند، به‌جای اینکه به دیگران برای تأمین آن تکیه کنند». این بازتاب‌دهنده فلسفه اصلی سایفرپانک است که بر مسئولیت فردی و بی‌اعتمادی به نهادهای متمرکز تأکید دارد. این جنبش معتقد بود که ابزارهای رمزنگاری باید افراد را قادر سازند تا خود را محافظت کنند، نه اینکه به نهادهایی وابسته باشند که آنها را به‌عنوان تهدیدهای بالقوه برای حریم خصوصی و آزادی می‌دیدند.
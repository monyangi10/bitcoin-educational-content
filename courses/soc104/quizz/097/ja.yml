question: エリック・ヒューズの『Cypherpunk宣言』によれば、オープンな電子社会におけるプライバシー保護の第一の責任は何か？
answer: 個人は、政府や企業にプライバシーを依存するのではなく、自ら積極的にプライバシーを守らなければならない。
wrong_answers:
  - 政府は、企業の監視から市民を守るために、包括的なプライバシー規制を確立すべきである。
  - 大企業は、企業の社会的責任の一環として、プライバシー保護を自主的に実施しなければならない。
  - 超国家機関によって施行される普遍的なプライバシー基準を作成するために、国際条約を交渉すべきである。
explanation: |
  ヒューズは、『政府や企業、その他の匿名性の高い大組織が私たちの秘密を保証してくれるとは期待できない』と明言し、サイファーパンクの主な目的は、『誰かに頼るのではなく、人々に自分の秘密を守らせること』だと述べた。
  これは、個人の責任と中央集権的な組織への不信という、サイファーパンクの核となる哲学を反映している。この運動では、暗号化ツールは、彼らがプライバシーと自由を脅かす潜在的脅威とみなす機関に依存するのではなく、個人が自分自身を守る力を与えるべきだと考えていた。
question: Според манифеста Cypherpunk на Ерик Хюз коя е основната отговорност за защита на личния живот в отвореното електронно общество?
answer: Хората трябва активно да защитават собствената си неприкосновеност на личния живот, а не да разчитат на правителствата или корпорациите да я осигурят
wrong_answers:
  - Правителствата трябва да въведат всеобхватни правила за защита на личните данни, за да защитят гражданите от корпоративно наблюдение
  - Големите организации трябва доброволно да прилагат защита на личните данни като част от своята корпоративна социална отговорност
  - Следва да се договорят международни договори за създаване на универсални стандарти за поверителност, които да се прилагат от наднационални органи
explanation: |
  Хюз изрично заявява, че "не можем да очакваме правителства, корпорации или други големи анонимни организации да ни гарантират поверителност" и че основната цел на Cypherpunks е "да накара хората да защитават своята поверителност, вместо да разчитат на някой друг да я осигури".
  Това отразява основната философия на шифърпънка за индивидуалната отговорност и недоверието към централизираните институции. Движението вярва, че криптографските инструменти трябва да дават възможност на хората да се защитават сами, вместо да зависят от самите институции, които те смятат за потенциални заплахи за неприкосновеността на личния живот и свободата.
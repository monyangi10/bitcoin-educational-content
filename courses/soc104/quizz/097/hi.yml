question: एरिक ह्यूजेस के जीडब्ल्यू-0 घोषणापत्र के अनुसार, एक खुले इलेक्ट्रॉनिक समाज में गोपनीयता की रक्षा करने की प्राथमिक जिम्मेदारी क्या है?
answer: व्यक्तियों को अपनी निजता की रक्षा के लिए सरकारों या निगमों पर निर्भर रहने के बजाय सक्रिय रूप से प्रयास करना चाहिए।
wrong_answers:
  - सरकारों को नागरिकों को कॉर्पोरेट निगरानी से बचाने के लिए व्यापक गोपनीयता नियम स्थापित करने चाहिए।
  - बड़ी संस्थाओं को अपनी कॉर्पोरेट सामाजिक जिम्मेदारी के तहत स्वेच्छा से गोपनीयता सुरक्षा उपायों को लागू करना चाहिए।
  - अंतर्राष्ट्रीय संधियों पर बातचीत करके सार्वभौमिक गोपनीयता मानक बनाए जाने चाहिए जिन्हें अंतर्राष्ट्रीय निकायों द्वारा लागू किया जाए।
explanation: |
  ह्यूजेस ने स्पष्ट रूप से कहा था कि 'हम सरकारों, निगमों या अन्य बड़े गुमनाम संगठनों से गोपनीयता की गारंटी की अपेक्षा नहीं कर सकते' और साइफरपंक आंदोलन का मुख्य उद्देश्य 'लोगों को अपनी गोपनीयता की रक्षा करने के लिए प्रेरित करना है, न कि इसके लिए किसी और पर निर्भर रहना'।
  यह व्यक्तिगत जिम्मेदारी और केंद्रीकृत संस्थानों पर अविश्वास के साइफरपंक दर्शन को दर्शाता है। इस आंदोलन का मानना ​​था कि क्रिप्टोग्राफिक उपकरण व्यक्तियों को स्वयं की सुरक्षा करने में सक्षम बनाएं, न कि उन संस्थानों पर निर्भर रहने के लिए जिन्हें वे निजता और स्वतंत्रता के लिए संभावित खतरा मानते थे।
question: 根据埃里克-休斯的《Cypherpunk 宣言》，在一个开放的电子社会中，保护隐私的首要责任是什么？
answer: 个人必须积极捍卫自己的隐私，而不是依靠政府或公司来提供隐私
wrong_answers:
  - 各国政府应制定全面的隐私法规，保护公民免受企业监控
  - 大型组织必须自愿实施隐私保护，将其作为企业社会责任的一部分
  - 应通过谈判达成国际条约，制定由超国家机构执行的普遍隐私标准
explanation: |
  休斯明确表示，"我们不能指望政府、公司或其他大型匿名组织来保证我们的保密性"，赛弗尔朋克的主要目标是 "让人们捍卫自己的保密性，而不是依赖别人来提供保密性"。
  这反映了赛弗朋克的核心理念，即个人责任和对中央集权机构的不信任。该运动认为，加密工具应赋予个人保护自己的能力，而不是依赖于他们认为对隐私和自由构成潜在威胁的机构。
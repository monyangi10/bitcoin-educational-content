question: 根據 Eric Hughes 的 Cypherpunk 宣言，在開放的電子社會中，保護隱私權的主要責任是什麼？
answer: 個人必須主動捍衛自己的隱私權，而不是依賴政府或企業提供隱私權
wrong_answers:
  - 政府應建立全面的隱私權法規，以保護公民不受企業監控
  - 大型機構必須自願實施隱私權保護，作為企業社會責任的一部分
  - 應洽談國際條約，以建立由超國家機構執行的普遍隱私權標準
explanation: |
  Hughes 明確表示，「我們不能期望政府、企業或其他大型匿名組織保證我們的機密性」，而 Cypherpunks 的主要目標是「讓人們捍衛自己的機密性，而不是仰賴別人提供機密性」。
  這反映了 Cypherpunk 的核心理念：個人責任和不信任集中式機構。該運動認為，加密工具應該賦予個人保護自己的能力，而不是依賴被他們視為隱私和自由潛在威脅的機構。
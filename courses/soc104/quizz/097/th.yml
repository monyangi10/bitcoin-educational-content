question: ตามที่ Eric Hughes' Cypherpunk Manifesto ระบุไว้ ความรับผิดชอบหลักในการปกป้องความเป็นส่วนตัวในสังคมอิเล็กทรอนิกส์แบบเปิดคืออะไร?
answer: บุคคลต้องปกป้องความเป็นส่วนตัวของตนเองอย่างแข็งขันแทนที่จะพึ่งพารัฐบาลหรือบริษัทต่างๆ ในการจัดหาให้
wrong_answers:
  - รัฐบาลควรจัดตั้งกฎระเบียบความเป็นส่วนตัวที่ครอบคลุมเพื่อปกป้องพลเมืองจากการสอดแนมของบริษัท
  - องค์กรขนาดใหญ่ต้องดำเนินการคุ้มครองความเป็นส่วนตัวโดยสมัครใจเป็นส่วนหนึ่งของความรับผิดชอบต่อสังคมขององค์กร
  - ควรมีการเจรจาสนธิสัญญาระหว่างประเทศเพื่อสร้างมาตรฐานความเป็นส่วนตัวสากลที่บังคับใช้โดยองค์กรเหนือชาติ
explanation: |
  Hughes ระบุไว้อย่างชัดเจนว่า 'เราไม่สามารถคาดหวังให้รัฐบาล บริษัท หรือองค์กรขนาดใหญ่อื่น ๆ ที่ไม่ระบุตัวตนมารับประกันความลับของเราได้' และวัตถุประสงค์หลักสำหรับ Cypherpunks คือ 'ทำให้ผู้คนปกป้องความลับของตนเอง แทนที่จะพึ่งพาคนอื่นในการจัดหาให้' สิ่งนี้สะท้อนถึงปรัชญาหลักของ cypherpunk ที่เน้นความรับผิดชอบส่วนบุคคลและความไม่ไว้วางใจในสถาบันที่รวมศูนย์ ขบวนการนี้เชื่อว่าเครื่องมือการเข้ารหัสควรให้อำนาจแก่บุคคลในการปกป้องตนเอง แทนที่จะพึ่งพาสถาบันที่พวกเขามองว่าเป็นภัยคุกคามต่อความเป็นส่วนตัวและเสรีภาพ
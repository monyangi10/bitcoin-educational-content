question: 에릭 휴즈의 Cypherpunk 선언문에 따르면, 개방형 전자 사회에서 프라이버시 보호를 위한 주요 책임은 무엇인가요?
answer: 개인은 정부나 기업에 의존하지 않고 자신의 프라이버시를 적극적으로 보호해야 합니다
wrong_answers:
  - 정부는 기업 감시로부터 시민을 보호하기 위해 포괄적인 개인정보 보호 규정을 수립해야 합니다
  - 대규모 조직은 기업의 사회적 책임의 일환으로 자발적으로 개인정보 보호를 구현해야 합니다
  - 초국가적 기관이 시행하는 보편적인 개인정보 보호 표준을 만들기 위해 국제 조약을 협상해야 합니다
explanation: |
  휴즈는 '정부, 기업 또는 기타 대규모 익명 조직이 기밀을 보장해 줄 것이라고 기대할 수 없다'고 명시적으로 말하며, 사이퍼펑크의 주요 목표는 '사람들이 기밀을 다른 사람에게 의존하지 않고 스스로 기밀을 지키도록 하는 것'이라고 말했습니다.
  이는 개인의 책임과 중앙집중식 기관에 대한 불신이라는 사이퍼펑크의 핵심 철학을 반영합니다. 이 운동은 사생활과 자유에 대한 잠재적 위협으로 간주되는 기관에 의존하기보다는 개인이 스스로를 보호할 수 있도록 암호화 도구가 힘을 실어주어야 한다고 믿었습니다.
question: ハンナ・アーレントの分析によれば、全体主義的教育システムの第一の目標は何か？
answer: 特定の信念を植え付けるのではなく、人々の独立した信念を形成する能力を破壊する。
wrong_answers:
  - 国民に政権のイデオロギーを教え込み、国家への絶対的な忠誠心を確保する。
  - 国の経済目標を推進できる高度な教育を受けた労働力を創出する。
  - 階級的な区別をなくし、共有された革命的原則に基づく統一社会を創る。
explanation: |
  ハンナ・アーレントは、全体主義教育の目的は信念を植え付けることではなく、独立したものを形成する能力を破壊することだと主張した。
  この点が、全体主義を単なる権威主義と区別している。全体主義は単にコンプライアンスを求めるだけでなく、独立した思考能力そのものを排除しようとしているのだ。他の選択肢は、より従来型の政治的統制や社会工学を表しており、全体主義が人間の主体性そのものを攻撃するというアーレントの重要な洞察を見逃している。
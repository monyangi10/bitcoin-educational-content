question: Theo phân tích của Hannah Arendt, mục tiêu chính của các hệ thống giáo dục toàn trị là gì?
answer: Mục đích là phá hủy khả năng hình thành niềm tin độc lập của con người thay vì gieo rắc những niềm tin cụ thể.
wrong_answers:
  - Nhằm truyền bá tư tưởng của chế độ cho người dân và đảm bảo lòng trung thành tuyệt đối với nhà nước.
  - Nhằm tạo ra một lực lượng lao động có trình độ học vấn cao, có khả năng thúc đẩy các mục tiêu kinh tế của quốc gia.
  - Xóa bỏ sự phân biệt giai cấp và tạo ra một xã hội thống nhất dựa trên các nguyên tắc cách mạng chung.
explanation: |
  Hannah Arendt lập luận rằng mục đích của nền giáo dục toàn trị không phải là gieo rắc niềm tin mà là phá hủy khả năng hình thành bất kỳ niềm tin độc lập nào.
  Điều này phân biệt chủ nghĩa toàn trị với chủ nghĩa độc đoán đơn thuần - nó không chỉ muốn sự tuân thủ mà còn tìm cách loại bỏ chính khả năng tư duy độc lập. Các lựa chọn khác đại diện cho các hình thức kiểm soát chính trị hoặc kỹ thuật xã hội thông thường hơn, bỏ qua nhận định quan trọng của Arendt về sự tấn công độc đáo của chủ nghĩa toàn trị vào chính khả năng tự chủ của con người.
question: Co je podle analýzy Hannah Arendtové hlavním cílem totalitních vzdělávacích systémů?
answer: Ničit schopnost lidí vytvářet si nezávislé přesvědčení, nikoli vštěpovat konkrétní názory
wrong_answers:
  - Indoktrinovat občany režimní ideologií a zajistit absolutní loajalitu vůči státu
  - Vytvořit vysoce vzdělanou pracovní sílu, která bude schopna podporovat ekonomické cíle země
  - Odstranit třídní rozdíly a vytvořit jednotnou společnost založenou na společných revolučních principech
explanation: |
  Hannah Arendtová tvrdila, že cílem totalitní výchovy není vštěpovat přesvědčení, ale zničit schopnost vytvářet si nezávislé přesvědčení.
  Tím se totalitarismus liší od pouhého autoritářství - nechce jen podřídit se, ale snaží se zlikvidovat samotnou schopnost nezávislého myšlení. Ostatní možnosti představují konvenčnější formy politické kontroly nebo sociálního inženýrství a chybí jim zásadní Arendtové postřeh o jedinečném útoku totalitarismu na samotnou lidskou aktivitu.
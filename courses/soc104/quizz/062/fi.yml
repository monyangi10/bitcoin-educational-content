question: Mikä on Hannah Arendtin analyysin mukaan totalitaaristen koulutusjärjestelmien ensisijainen tavoite?
answer: Tuhota ihmisten kyky muodostaa itsenäisiä vakaumuksia sen sijaan, että iskostettaisiin tiettyjä uskomuksia
wrong_answers:
  - Kansalaisia indoktrinoidaan hallinnon ideologiaan ja varmistetaan ehdoton lojaalisuus valtiolle
  - Luoda korkeasti koulutettua työvoimaa, joka kykenee edistämään kansakunnan taloudellisia tavoitteita
  - Poistaa luokkaerot ja luoda yhtenäinen yhteiskunta, joka perustuu yhteisiin vallankumouksellisiin periaatteisiin
explanation: |
  Hannah Arendt väitti, että totalitaarisen kasvatuksen tarkoituksena ei ollut opettaa vakaumuksia vaan tuhota kyky muodostaa itsenäisiä vakaumuksia.
  Tämä erottaa totalitarismin pelkästä autoritaarisuudesta - se ei halua vain mukautua, vaan pyrkii poistamaan kyvyn itsenäiseen ajatteluun. Muut vaihtoehdot edustavat tavanomaisempia poliittisen valvonnan tai sosiaalisen suunnittelun muotoja, mutta niistä puuttuu Arendtin ratkaiseva oivallus totalitarismin ainutlaatuisesta hyökkäyksestä itse inhimillistä toimijuutta vastaan.
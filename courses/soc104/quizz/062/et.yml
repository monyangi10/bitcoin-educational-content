question: Mis on Hannah Arendti analüüsi kohaselt totalitaarsete haridussüsteemide peamine eesmärk?
answer: Hävitada inimeste võimet kujundada iseseisvaid veendumusi, mitte sisendada konkreetseid uskumusi
wrong_answers:
  - Kodanike indoktrineerimine režiimi ideoloogiaga ja absoluutse lojaalsuse tagamine riigile
  - Luua kõrgelt haritud tööjõud, kes on võimeline edendama riigi majanduslikke eesmärke
  - Likvideerida klassierinevused ja luua ühtne ühiskond, mis põhineb ühistel revolutsioonilistel põhimõtetel
explanation: |
  Hannah Arendt väitis, et totalitaarse kasvatuse eesmärk ei olnud mitte veendumuste juurutamine, vaid iseseisva veendumuse kujundamise võime hävitamine.
  See eristab totalitarismi pelgalt autoritaarsusest - see ei taha mitte ainult allumist, vaid püüab kõrvaldada iseseisva mõtlemise võimet. Teised valikud esindavad tavapärasemat poliitilise kontrolli või sotsiaalse inseneri vormi, kuid neil puudub Arendti otsustav arusaam totalitarismi unikaalsest rünnakust inimtegevuse enda vastu.
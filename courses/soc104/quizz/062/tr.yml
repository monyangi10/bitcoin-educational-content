question: Hannah Arendt'in analizine göre, totaliter eğitim sistemlerinin temel amacı nedir?
answer: Belirli inançları aşılamaktan ziyade insanların bağımsız kanaatler oluşturma kapasitesini yok etmek
wrong_answers:
  - Vatandaşlara rejimin ideolojisini aşılamak ve devlete mutlak sadakati sağlamak
  - Ülkenin ekonomik hedeflerini ilerletebilecek yüksek eğitimli bir işgücü yaratmak
  - Sınıf ayrımlarını ortadan kaldırmak ve ortak devrimci ilkelere dayalı birleşik bir toplum yaratmak
explanation: |
  Hannah Arendt, totaliter eğitimin amacının inanç aşılamak değil, bağımsız inanç oluşturma yetisini yok etmek olduğunu savunmuştur.
  Bu, totalitarizmi salt otoriterlikten ayırır - totalitarizm sadece itaat istemekle kalmaz, bağımsız düşünce kapasitesini de ortadan kaldırmaya çalışır. Diğer seçenekler daha geleneksel siyasi kontrol ya da toplum mühendisliği biçimlerini temsil etmekte, Arendt'in totalitarizmin insan eylemliliğinin kendisine yönelik benzersiz saldırısına ilişkin can alıcı içgörüsünü gözden kaçırmaktadır.
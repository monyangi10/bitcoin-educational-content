question: हन्ना एरेंड्ट के विश्लेषण के अनुसार, अधिनायकवादी शिक्षा प्रणालियों का प्राथमिक लक्ष्य क्या है?
answer: लोगों में विशिष्ट विश्वास पैदा करने के बजाय, स्वतंत्र रूप से अपनी राय बनाने की उनकी क्षमता को नष्ट करना।
wrong_answers:
  - नागरिकों को शासन की विचारधारा से अवगत कराना और राज्य के प्रति पूर्ण निष्ठा सुनिश्चित करना।
  - देश के आर्थिक उद्देश्यों को आगे बढ़ाने में सक्षम उच्च शिक्षित कार्यबल का निर्माण करना।
  - वर्गभेद को समाप्त करने और साझा क्रांतिकारी सिद्धांतों पर आधारित एक एकीकृत समाज का निर्माण करने के लिए।
explanation: |
  हन्ना एरेंड्ट का तर्क था कि सर्वाधिकारवादी शिक्षा का उद्देश्य दृढ़ विश्वास पैदा करना नहीं, बल्कि स्वतंत्र विश्वास बनाने की क्षमता को नष्ट करना था।
  यह सर्वाधिकारवाद को मात्र अधिनायकवाद से अलग करता है - यह केवल आज्ञापालन नहीं चाहता, बल्कि स्वतंत्र चिंतन की क्षमता को ही समाप्त करना चाहता है। अन्य विकल्प राजनीतिक नियंत्रण या सामाजिक इंजीनियरिंग के अधिक पारंपरिक रूप हैं, जो मानव कर्म पर सर्वाधिकारवाद के अनूठे आक्रमण के बारे में एरेंड्ट की महत्वपूर्ण अंतर्दृष्टि को नजरअंदाज करते हैं।
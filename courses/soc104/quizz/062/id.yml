question: Menurut analisis Hannah Arendt, apa tujuan utama dari sistem pendidikan totaliter?
answer: Menghancurkan kapasitas orang untuk membentuk keyakinan independen dan bukannya menanamkan keyakinan tertentu
wrong_answers:
  - Untuk mengindoktrinasi warga negara dengan ideologi rezim dan memastikan kesetiaan mutlak kepada negara
  - Menciptakan tenaga kerja berpendidikan tinggi yang mampu memajukan tujuan ekonomi bangsa
  - Untuk menghilangkan perbedaan kelas dan menciptakan masyarakat yang bersatu berdasarkan prinsip-prinsip revolusioner bersama
explanation: |
  Hannah Arendt berpendapat bahwa tujuan pendidikan totaliter bukanlah untuk menanamkan keyakinan, melainkan untuk menghancurkan kemampuan untuk membentuk keyakinan yang independen.
  Hal ini membedakan totalitarianisme dari otoritarianisme belaka - totalitarianisme tidak hanya menginginkan kepatuhan, tetapi juga berusaha untuk menghilangkan kapasitas untuk berpikir independen. Pilihan-pilihan lain mewakili bentuk-bentuk kontrol politik atau rekayasa sosial yang lebih konvensional, dan tidak memiliki wawasan penting dari Arendt mengenai serangan unik totalitarianisme terhadap agensi manusia itu sendiri.
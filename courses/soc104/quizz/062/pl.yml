question: Jaki jest główny cel totalitarnych systemów edukacyjnych według analizy Hannah Arendt?
answer: Niszczenie zdolności ludzi do kształtowania niezależnych przekonań, a nie wpajanie konkretnych przekonań
wrong_answers:
  - Indoktrynacja obywateli ideologią reżimu i zapewnienie absolutnej lojalności wobec państwa
  - Stworzenie wysoko wykształconej siły roboczej zdolnej do realizacji celów gospodarczych kraju
  - Wyeliminowanie różnic klasowych i stworzenie zjednoczonego społeczeństwa opartego na wspólnych rewolucyjnych zasadach
explanation: |
  Hannah Arendt argumentowała, że celem edukacji totalitarnej nie było wpajanie przekonań, ale zniszczenie zdolności do kształtowania jakichkolwiek niezależnych przekonań.
  To odróżnia totalitaryzm od zwykłego autorytaryzmu - nie chce on jedynie podporządkowania się, ale dąży do wyeliminowania samej zdolności do niezależnego myślenia. Pozostałe opcje reprezentują bardziej konwencjonalne formy kontroli politycznej lub inżynierii społecznej, pomijając kluczowy wgląd Arendt w wyjątkowy atak totalitaryzmu na samą ludzką sprawczość.
question: Was ist nach Hannah Arendts Analyse das Hauptziel totalitärer Bildungssysteme?
answer: Die Fähigkeit der Menschen zu zerstören, sich unabhängige Überzeugungen zu bilden, anstatt ihnen bestimmte Glaubenssätze einzutrichtern
wrong_answers:
  - Indoktrinierung der Bürger mit der Ideologie des Regimes und Gewährleistung absoluter Loyalität gegenüber dem Staat
  - Schaffung hochqualifizierter Arbeitskräfte, die in der Lage sind, die wirtschaftlichen Ziele der Nation voranzutreiben
  - Beseitigung der Klassenunterschiede und Schaffung einer einheitlichen Gesellschaft auf der Grundlage gemeinsamer revolutionärer Prinzipien
explanation: |
  Hannah Arendt vertrat die Ansicht, dass die totalitäre Erziehung nicht darauf abzielt, Überzeugungen zu vermitteln, sondern die Fähigkeit zur Bildung unabhängiger Überzeugungen zu zerstören.
  Dies unterscheidet den Totalitarismus vom bloßen Autoritarismus - er will nicht nur Gehorsam, sondern zielt darauf ab, die Fähigkeit zum unabhängigen Denken zu beseitigen. Die anderen Optionen stellen eher konventionelle Formen der politischen Kontrolle oder des Social Engineering dar, wobei Arendts entscheidende Einsicht über den einzigartigen Angriff des Totalitarismus auf die menschliche Handlungsfähigkeit selbst fehlt.
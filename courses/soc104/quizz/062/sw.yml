question: Kulingana na uchambuzi wa Hannah Arendt, lengo kuu la mifumo ya elimu ya kidikteta ni lipi?
answer: Kuharibu uwezo wa watu kuunda imani huru badala ya kuingiza imani maalum
wrong_answers:
  - Kuwafundisha raia itikadi ya utawala na kuhakikisha uaminifu kamili kwa serikali
  - Kuunda nguvu kazi yenye elimu ya juu inayoweza kuendeleza malengo ya kiuchumi ya taifa
  - Kuondoa tofauti za kitabaka na kuunda jamii iliyoungana inayotegemea kanuni za mapinduzi za pamoja
explanation: |
  Hannah Arendt alisema kwamba lengo la elimu ya kidikteta halikuwa kuingiza imani bali kuharibu kitivo cha kuunda imani yoyote huru.
  
  Hii inatofautisha utawala wa kidikteta na utawala wa kidikteta tu - haitaki tu kufuata sheria, lakini inatafuta kuondoa uwezo wa mawazo huru. Chaguzi zingine zinawakilisha aina za kawaida zaidi za udhibiti wa kisiasa au uhandisi wa kijamii, zikikosa ufahamu muhimu wa Arendt kuhusu shambulio la kipekee la utawala wa kidikteta dhidi ya wakala wa binadamu wenyewe.
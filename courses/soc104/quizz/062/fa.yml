question: بر اساس تحلیل هانا آرنت، هدف اصلی سیستم‌های آموزشی توتالیتر چیست؟
answer: برای از بین بردن توانایی مردم در شکل‌گیری اعتقادات مستقل به جای القای باورهای خاص
wrong_answers:
  - برای تلقین ایدئولوژی رژیم به شهروندان و تضمین وفاداری مطلق به دولت
  - برای ایجاد نیروی کار بسیار تحصیل‌کرده‌ای که قادر به پیشبرد اهداف اقتصادی کشور باشد
  - برای از بین بردن تمایزات طبقاتی و ایجاد جامعه‌ای یکپارچه بر اساس اصول انقلابی مشترک
explanation: |
  هانا آرنت استدلال کرد که هدف آموزش توتالیتر نه القای اعتقادات بلکه نابود کردن توانایی شکل‌گیری هرگونه اعتقادات مستقل است. این موضوع توتالیتاریسم را از اقتدارگرایی صرف متمایز می‌کند - توتالیتاریسم فقط به دنبال تبعیت نیست، بلکه می‌خواهد توانایی تفکر مستقل را به‌طور کامل از بین ببرد. گزینه‌های دیگر نمایانگر اشکال متعارف‌تری از کنترل سیاسی یا مهندسی اجتماعی هستند و بینش مهم آرنت درباره حمله منحصربه‌فرد توتالیتاریسم به خودمختاری انسانی را نادیده می‌گیرند.
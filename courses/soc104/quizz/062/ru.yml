question: Согласно анализу Ханны Арендт, какова основная цель тоталитарных систем образования?
answer: Уничтожение способности людей формировать независимые убеждения, а не насаждение конкретных верований
wrong_answers:
  - Индоктринация граждан в соответствии с идеологией режима и обеспечение абсолютной лояльности государству
  - Создание высокообразованной рабочей силы, способной содействовать достижению экономических целей страны
  - Уничтожить классовые различия и создать единое общество, основанное на общих революционных принципах
explanation: |
  Ханна Арендт утверждала, что цель тоталитарного воспитания не в том, чтобы привить убеждения, а в том, чтобы уничтожить способность к формированию независимого мышления.
  Это отличает тоталитаризм от простого авторитаризма - он не просто хочет подчинения, а стремится уничтожить саму способность к независимому мышлению. Другие варианты представляют собой более традиционные формы политического контроля или социальной инженерии, но при этом упускается важнейшая мысль Арендт о том, что тоталитаризм - это уникальное нападение на саму человеческую личность.
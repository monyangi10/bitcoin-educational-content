question: 根據 Hannah Arendt 的分析，極權教育制度的主要目標是什麼？
answer: 摧毀人們形成獨立信念的能力，而不是灌輸特定的信念
wrong_answers:
  - 向公民灌輸政權的意識形態，並確保對國家的絕對忠誠
  - 培養能推動國家經濟目標的高素質勞動力
  - 消除階級差別，建立以共同革命原則為基礎的統一社會
explanation: |
  Hannah Arendt認為極權教育的目的不是灌輸信念，而是摧毀形成任何獨立信念的能力。
  這將極權主義與純粹的專制主義區分開來──它不只是想要順從，而是要剷除獨立思考的能力。其他的選擇代表了更傳統的政治控制或社會工程的形式，卻忽略了阿倫特關於極權主義對人類能動性本身的獨特攻擊的重要洞見。
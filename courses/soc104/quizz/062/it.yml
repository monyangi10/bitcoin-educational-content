question: Secondo l'analisi di Hannah Arendt, qual è l'obiettivo principale dei sistemi educativi totalitari?
answer: Distruggere la capacità delle persone di formarsi convinzioni indipendenti piuttosto che inculcare credenze specifiche
wrong_answers:
  - Indottrinare i cittadini con l'ideologia del regime e garantire l'assoluta fedeltà allo Stato
  - Creare una forza lavoro altamente istruita in grado di promuovere gli obiettivi economici della nazione
  - Eliminare le distinzioni di classe e creare una società unificata basata su principi rivoluzionari condivisi
explanation: |
  Hannah Arendt sosteneva che lo scopo dell'educazione totalitaria non era quello di instillare convinzioni, ma di distruggere la facoltà di formarne di indipendenti.
  Questo distingue il totalitarismo dal semplice autoritarismo: non vuole solo la conformità, ma cerca di eliminare la capacità stessa di un pensiero indipendente. Le altre opzioni rappresentano forme più convenzionali di controllo politico o di ingegneria sociale, ma mancano dell'intuizione cruciale di Arendt sull'assalto unico del totalitarismo all'agenzia umana stessa.
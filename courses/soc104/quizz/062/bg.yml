question: Каква е основната цел на тоталитарните образователни системи според анализа на Хана Арендт?
answer: Да се унищожи способността на хората да формират независими убеждения, а не да се внушават конкретни вярвания
wrong_answers:
  - Да индоктринира гражданите с идеологията на режима и да осигури абсолютна лоялност към държавата
  - Създаване на високообразована работна сила, способна да постига икономическите цели на страната
  - Премахване на класовите различия и създаване на единно общество, основано на общи революционни принципи
explanation: |
  Хана Аренд твърди, че целта на тоталитарното възпитание не е да внуши убеждения, а да унищожи способността за формиране на независими убеждения.
  Това отличава тоталитаризма от обикновения авторитаризъм - той не просто иска подчинение, а се стреми да елиминира самата способност за независима мисъл. Другите варианти представляват по-конвенционални форми на политически контрол или социално инженерство, като липсва решаващото прозрение на Аренд за уникалното посегателство на тоталитаризма върху самата човешка активност.
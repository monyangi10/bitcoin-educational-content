question: Wat is volgens de analyse van Hannah Arendt het hoofddoel van totalitaire onderwijssystemen?
answer: Het vernietigen van het vermogen van mensen om onafhankelijke overtuigingen te vormen in plaats van het bijbrengen van specifieke overtuigingen
wrong_answers:
  - Burgers indoctrineren met de ideologie van het regime en zorgen voor absolute loyaliteit aan de staat
  - Een hoog opgeleide beroepsbevolking creëren die de economische doelstellingen van de natie kan bevorderen
  - Het elimineren van klassentegenstellingen en het creëren van een verenigde samenleving gebaseerd op gedeelde revolutionaire principes
explanation: |
  Hannah Arendt stelde dat het doel van totalitaire opvoeding niet het bijbrengen van overtuigingen was, maar het vernietigen van het vermogen om onafhankelijke overtuigingen te vormen.
  Dit onderscheidt totalitarisme van louter autoritarisme - het wil niet alleen naleving, maar wil het vermogen tot onafhankelijk denken uitschakelen. De andere opties vertegenwoordigen meer conventionele vormen van politieke controle of social engineering en missen Arendt's cruciale inzicht over de unieke aanval van het totalitarisme op het menselijk handelen zelf.
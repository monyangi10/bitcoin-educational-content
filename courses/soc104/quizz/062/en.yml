question: According to Hannah Arendt's analysis, what is the primary goal of totalitarian education systems?
answer: To destroy people's capacity to form independent convictions rather than to instill specific beliefs
wrong_answers:
  - To indoctrinate citizens with the regime's ideology and ensure absolute loyalty to the state
  - To create a highly educated workforce capable of advancing the nation's economic objectives
  - To eliminate class distinctions and create a unified society based on shared revolutionary principles
explanation: |
  Hannah Arendt argued that totalitarian education's purpose was not to instill convictions but to destroy the faculty of forming any independent ones. 
  This distinguishes totalitarianism from mere authoritarianism - it doesn't just want compliance, but seeks to eliminate the very capacity for independent thought. The other options represent more conventional forms of political control or social engineering, missing Arendt's crucial insight about totalitarianism's unique assault on human agency itself.

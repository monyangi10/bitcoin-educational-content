question: Prema analizi Hane Arent, koji je primarni cilj totalitarnih obrazovnih sistema?
answer: Da se uništi sposobnost ljudi da formiraju nezavisna uverenja, a ne da se usade specifična verovanja
wrong_answers:
  - Da indoktriniraju građane ideologijom režima i osiguraju apsolutnu lojalnost državi
  - Da se stvori visoko obrazovana radna snaga sposobna da unapredi ekonomske ciljeve nacije
  - Da se eliminišu klasne razlike i stvori jedinstveno društvo zasnovano na zajedničkim revolucionarnim principima
explanation: |
  Hannah Arendt je tvrdila da svrha totalitarističkog obrazovanja nije da usadi uverenja, već da uništi sposobnost formiranja bilo kakvih nezavisnih uverenja. 
  Ovo razlikuje totalitarizam od pukog autoritarizma - on ne želi samo poslušnost, već nastoji da eliminiše samu sposobnost za nezavisno razmišljanje. Druge opcije predstavljaju konvencionalnije oblike političke kontrole ili društvenog inženjeringa, propuštajući Arendtov ključni uvid o jedinstvenom napadu totalitarizma na samu ljudsku agenciju.
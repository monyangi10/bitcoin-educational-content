question: Dukurikije icegeranyo ca Hannah Arendt, ni iyihe ntumbero nyamukuru y’uburezi bw’ubutegetsi bw’agahomerabunwa?
answer: Gusenyura ubushobozi abantu bafise bwo gushinga ivyiyumviro vyigenga aho kwigisha ivyiyumviro vyihariye .
wrong_answers:
  - Kwigisha abanyagihugu ingengabitekerezo y’intwaro no gutuma baba intahemuka kuri Leta ata gukeka
  - Gushinga abakozi bize cane bashobora guteza imbere intumbero z'ubutunzi bw'igihugu .
  - Gukuraho itandukaniro ry'imigwi no kurema igihugu kimwe gishingiye ku ngingo ngenderwako z'impinduka rusangi .
explanation: |
  Hannah Arendt yavuze yuko intumbero y’inyigisho y’ubutegetsi bw’agahomerabunwa atari iyo gutuma abantu bemera ibintu, ahubwo ko ari iyo gusenyura ubushobozi bwo gushinga inyigisho iyo ari yo yose yigenga. 
  Ivyo bitandukanya ubutegetsi bw’agahomerabunwa n’ubutegetsi bw’agahomerabunwa gusa - ntibushaka gusa kwubahiriza amategeko, ahubwo bushaka gukuraho ubushobozi bwo kwiyumvira bwigenga. Ibindi bihitamwo bigereranya uburyo busanzwe bwo kugenzura politike canke ubuhinga bwo gukora imibano, bibura ubumenyi buhambaye bwa Arendt ku bijanye n’igitero kidasanzwe c’ubutegetsi bw’agahomerabunwa ku burenganzira bw’umuntu ubwabwo.
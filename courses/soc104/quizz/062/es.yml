question: Según el análisis de Hannah Arendt, ¿cuál es el principal objetivo de los sistemas educativos totalitarios?
answer: Destruir la capacidad de las personas para formarse convicciones independientes en lugar de inculcar creencias específicas
wrong_answers:
  - Adoctrinar a los ciudadanos con la ideología del régimen y garantizar la lealtad absoluta al Estado
  - Crear una mano de obra altamente cualificada capaz de hacer avanzar los objetivos económicos de la nación
  - Eliminar las diferencias de clase y crear una sociedad unificada basada en principios revolucionarios compartidos
explanation: |
  Hannah Arendt sostenía que el propósito de la educación totalitaria no era inculcar convicciones, sino destruir la facultad de formarse convicciones independientes.
  Esto distingue al totalitarismo del mero autoritarismo: no sólo busca la conformidad, sino eliminar la capacidad misma de pensamiento independiente. Las otras opciones representan formas más convencionales de control político o de ingeniería social, y pasan por alto la idea crucial de Arendt sobre el ataque único del totalitarismo a la propia agencia humana.
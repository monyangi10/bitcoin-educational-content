question: 한나 아렌트의 분석에 따르면 전체주의 교육 시스템의 주요 목표는 무엇일까요?
answer: 특정 신념을 주입하기보다 독립적인 신념을 형성할 수 있는 사람들의 능력을 파괴하기 위해
wrong_answers:
  - 시민들에게 정권의 이데올로기를 주입하고 국가에 대한 절대적인 충성심을 확보하기 위해
  - 국가의 경제 목표를 발전시킬 수 있는 고도로 교육받은 인력을 양성하기 위해
  - 계급 구분을 없애고 공유된 혁명적 원칙을 바탕으로 통합된 사회를 만들기 위해
explanation: |
  한나 아렌트는 전체주의 교육의 목적은 신념을 주입하는 것이 아니라 독립적인 신념을 형성하는 능력을 파괴하는 데 있다고 주장했습니다.
  이는 전체주의가 단순한 권위주의와 구별되는 점입니다. 전체주의는 단순히 순응을 원하는 것이 아니라 독립적인 사고 능력 자체를 제거하려고 합니다. 다른 옵션은 보다 전통적인 형태의 정치적 통제 또는 사회 공학을 의미하며, 인간의 주체성 자체에 대한 전체주의의 독특한 공격에 대한 아렌트의 중요한 통찰을 놓치고 있습니다.
question: De acordo com a análise de Hannah Arendt, qual é o principal objetivo dos sistemas educativos totalitários?
answer: Destruir a capacidade das pessoas para formarem convicções independentes, em vez de incutir crenças específicas
wrong_answers:
  - Doutrinar os cidadãos com a ideologia do regime e assegurar a lealdade absoluta ao Estado
  - Criar uma força de trabalho altamente qualificada capaz de fazer avançar os objectivos económicos da nação
  - Eliminar as distinções de classe e criar uma sociedade unificada baseada em princípios revolucionários comuns
explanation: |
  Hannah Arendt argumentou que o objetivo da educação totalitária não era incutir convicções, mas destruir a faculdade de formar quaisquer convicções independentes.
  Isto distingue o totalitarismo do mero autoritarismo - não pretende apenas a conformidade, mas procura eliminar a própria capacidade de pensamento independente. As outras opções representam formas mais convencionais de controlo político ou de engenharia social, sem a visão crucial de Arendt sobre o ataque único do totalitarismo à própria agência humana.
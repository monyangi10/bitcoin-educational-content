question: Hva er det primære målet med totalitære utdanningssystemer, ifølge Hannah Arendts analyse?
answer: Å ødelegge folks evne til å danne seg selvstendige overbevisninger, snarere enn å innprente spesifikke overbevisninger
wrong_answers:
  - Å indoktrinere innbyggerne med regimets ideologi og sikre absolutt lojalitet til staten
  - Å skape en høyt utdannet arbeidsstyrke som er i stand til å fremme landets økonomiske mål
  - Å fjerne klasseskillene og skape et enhetlig samfunn basert på felles revolusjonære prinsipper
explanation: |
  Hannah Arendt hevdet at formålet med totalitær oppdragelse ikke var å innpode overbevisninger, men å ødelegge evnen til å danne seg selvstendige overbevisninger.
  Dette skiller totalitarismen fra ren autoritarisme - den ønsker ikke bare ettergivenhet, men søker å eliminere selve evnen til selvstendig tenkning. De andre alternativene representerer mer konvensjonelle former for politisk kontroll eller sosial ingeniørkunst, og går glipp av Arendts avgjørende innsikt om totalitarismens unike angrep på selve den menneskelige handlekraften.
question: 根据汉娜-阿伦特的分析，极权主义教育制度的主要目标是什么？
answer: 摧毁人们形成独立信念的能力，而不是灌输特定的信仰
wrong_answers:
  - 向公民灌输政权意识形态，确保他们对国家绝对忠诚
  - 培养受过高等教育的劳动力，使他们能够推动国家经济目标的实现
  - 消除阶级差别，在共同的革命原则基础上建立统一的社会
explanation: |
  汉娜-阿伦特认为，极权主义教育的目的不是灌输信念，而是摧毁形成任何独立信念的能力。
  这一点将极权主义与单纯的独裁主义区分开来--极权主义并不只是要人服从，而是要消除独立思考的能力。其他选择代表了更为传统的政治控制或社会工程形式，却忽略了阿伦特关于极权主义对人类能动性本身的独特攻击的重要洞察。
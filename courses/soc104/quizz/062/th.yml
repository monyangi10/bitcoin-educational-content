question: ตามการวิเคราะห์ของ Hannah Arendt เป้าหมายหลักของระบบการศึกษาของเผด็จการรวมอำนาจคืออะไร?
answer: เพื่อทำลายความสามารถของผู้คนในการสร้างความเชื่อมั่นที่เป็นอิสระแทนที่จะปลูกฝังความเชื่อเฉพาะเจาะจง
wrong_answers:
  - เพื่อปลูกฝังอุดมการณ์ของระบอบการปกครองให้กับพลเมืองและรับประกันความจงรักภักดีอย่างสมบูรณ์ต่อรัฐ
  - เพื่อสร้างแรงงานที่มีการศึกษาสูงซึ่งสามารถส่งเสริมเป้าหมายทางเศรษฐกิจของประเทศ
  - เพื่อขจัดความแตกต่างทางชนชั้นและสร้างสังคมที่เป็นเอกภาพบนพื้นฐานของหลักการปฏิวัติร่วมกัน
explanation: |
  ฮันนาห์ อาเรนดท์ โต้แย้งว่า จุดประสงค์ของการศึกษาภายใต้ระบอบเผด็จการเบ็ดเสร็จไม่ใช่เพื่อปลูกฝังความเชื่อมั่น แต่เพื่อทำลายความสามารถในการสร้างความเชื่อมั่นอิสระใดๆ นี่คือสิ่งที่ทำให้เผด็จการเบ็ดเสร็จแตกต่างจากเผด็จการทั่วไป - มันไม่เพียงต้องการการปฏิบัติตาม แต่ยังมุ่งที่จะกำจัดความสามารถในการคิดอิสระโดยสิ้นเชิง ตัวเลือกอื่นๆ แสดงถึงรูปแบบการควบคุมทางการเมืองหรือวิศวกรรมสังคมที่เป็นแบบแผนมากกว่า ซึ่งพลาดการเข้าใจที่สำคัญของอาเรนดท์เกี่ยวกับการโจมตีที่ไม่เหมือนใครของเผด็จการเบ็ดเสร็จต่อความสามารถในการตัดสินใจของมนุษย์เอง
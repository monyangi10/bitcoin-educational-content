question: Dushingiye ku ciyumviro ca Hayek c’ubumenyi bushize ahabona, ni kuki ubutunzi buteguwe hagati butashobora gutanga neza ubutunzi ugereranyije n’uburyo bw’isoko ry’uburenganzira?
answer: Abategura imigambi yo hagati ntibashobora kuronka ubumenyi bucitsemwo ibice, bushingiye ku karere abantu bafise ku bijanye n’ivyo bakeneye, ivyo bakunda be n’ivyo babayemwo, ivyo bikaba bituma ugutanga neza ibikoresho bidashoboka.
wrong_answers:
  - Abategura imigambi yo hagati ntibagira ububasha buhagije bwo gukoresha ubuhinga bwo guharura n’ubuhinga buteye imbere bwo gukora amakuru yose y’ubutunzi akenewe kugira ngo bafate ingingo nziza zo gutanga ubutunzi.
  - Abategura imigambi yo hagati barafise ibiturire kandi bikunda, bagashira imbere ineza yabo kuruta ivyo abantu bakeneye igihe bafata ingingo z’ubutunzi.
  - Abategura imigambi yo hagati bitaho cane intumbero z’igihe kirekire mu gihe birengagiza ivyo abanyagihugu ku giti cabo bakeneye n’ivyo bakunda.
explanation: |
  Iciyumviro nyamukuru Hayek abona ni uko ubumenyi bubaho gusa nk''ibice vy'ubumenyi butatunganye kandi buvuguruzanya kenshi bufise abantu bose batandukanye.' Uburyo bw’ibiciro vy’isoko bukora nk’uburyo bwo kuvumbura bukoranya ubwo bumenyi bushize ahabona biciye mu guhanahana amakuru ku bushake. Abategura imigambi yo hagati, ataco bafatiye ku migambi canke ubushobozi bwabo, ntibashobora kuronka amakuru y’abantu ku giti cabo, y’aho hantu ku bijanye n’ibiciro, inyungu n’ivyo bakunda. Ivyo bituma haba ‘ingorane y’ubumenyi’ y’ishimikiro ituma igenamigambi ry’imbere ritagira akamaro mu buryo busanzwe ugereranyije n’uguhuza isoko ry’ibintu vyihuta.
question: ハイエクの知識分散理論によれば、なぜ中央計画経済は自由市場システムに比べて資源の効率的配分に失敗するのか？
answer: 中央のプランナーは、個人のニーズや嗜好、状況に関する断片的で局所的な知識にアクセスすることができないため、最適な資源配分を行うことができない。
wrong_answers:
  - 中央プランナーには、最適な資源配分の決定に必要なすべての経済データを処理する十分な計算能力と高度なアルゴリズムがない。
  - 中央計画者は本質的に腐敗し、利己的であり、経済的な決定を下す際には社会のニーズよりも自分たちの福祉を優先する。
  - 中央のプランナーは、長期的な戦略目標に重点を置きすぎる一方で、個々の国民の目先の消費ニーズや嗜好を軽視している。
explanation: |
  ハイエクの重要な洞察は、知識は「すべての異なる個人が持つ不完全でしばしば矛盾する知識の分散した断片」としてのみ存在するということである。市場の価格システムは、自発的な交換を通じて、この分散した知識を動員する発見メカニズムとして機能する。中央計画者は、その意図や能力にかかわらず、個人が持つコスト、便益、選好に関する主観的で局所的な情報にアクセスすることはできない。このことが、中央計画を自然発生的な市場調整と比較して本質的に非効率なものにしている基本的な「知識の問題」を生み出している。
question: Kulingana na nadharia ya Hayek ya maarifa yaliyotawanyika, kwa nini uchumi uliopangwa kati hushindwa kutenga rasilimali kwa ufanisi ikilinganishwa na mifumo ya soko huria?
answer: Wapangaji wakuu hawawezi kupata maarifa yaliyogawanyika na ya ndani ambayo watu binafsi wanayo kuhusu mahitaji yao mahususi, mapendeleo, na hali zao, na hivyo kufanya mgawanyo bora wa rasilimali usiwe rahisi.
wrong_answers:
  - Wapangaji wakuu hawana nguvu ya kutosha ya kompyuta na algoriti za hali ya juu ili kuchakata data zote za kiuchumi zinazohitajika kwa maamuzi bora ya mgao wa rasilimali.
  - Wapangaji mipango wakuu kwa asili ni wafisadi na wenye maslahi binafsi, wakipa kipaumbele ustawi wao wenyewe kuliko mahitaji ya jamii wanapofanya maamuzi ya kiuchumi.
  - Wapangaji mipango wakuu huzingatia sana malengo ya kimkakati ya muda mrefu huku wakipuuza mahitaji ya matumizi ya haraka na mapendeleo ya raia binafsi.
explanation: |
  Ufahamu muhimu wa Hayek ni kwamba maarifa yapo tu kama 'vipande vilivyotawanyika vya maarifa yasiyokamilika na yanayokinzana mara nyingi yanayomilikiwa na watu wote tofauti.' Mfumo wa bei wa soko hutumika kama utaratibu wa ugunduzi unaohamasisha maarifa haya yaliyotawanyika kupitia ubadilishanaji wa hiari. Wapangaji wakuu, bila kujali nia au uwezo wao, hawawezi kufikia taarifa za kibinafsi, za ndani ambazo watu binafsi wanazo kuhusu gharama, faida, na mapendeleo. Hii inaunda 'tatizo la msingi la maarifa' ambalo hufanya upangaji mkuu kuwa usiofaa kiasili ikilinganishwa na uratibu wa soko wa hiari.
question: ตามทฤษฎีความรู้กระจายของ Hayek, ทำไมเศรษฐกิจที่วางแผนจากศูนย์กลางถึงล้มเหลวในการจัดสรรทรัพยากรอย่างมีประสิทธิภาพเมื่อเทียบกับระบบตลาดเสรี?
answer: นักวางแผนส่วนกลางไม่สามารถเข้าถึงความรู้ที่กระจัดกระจายและเฉพาะเจาะจงที่บุคคลมีเกี่ยวกับความต้องการ ความชอบ และสถานการณ์เฉพาะของพวกเขา ทำให้การจัดสรรทรัพยากรอย่างเหมาะสมเป็นไปไม่ได้
wrong_answers:
  - นักวางแผนส่วนกลางขาดพลังการคำนวณที่เพียงพอและอัลกอริธึมขั้นสูงในการประมวลผลข้อมูลทางเศรษฐกิจทั้งหมดที่จำเป็นสำหรับการตัดสินใจจัดสรรทรัพยากรอย่างเหมาะสม
  - นักวางแผนส่วนกลางมีความทุจริตและเห็นแก่ตัวโดยธรรมชาติ โดยให้ความสำคัญกับสวัสดิการของตนเองมากกว่าความต้องการของสังคมเมื่อทำการตัดสินใจทางเศรษฐกิจ
  - นักวางแผนส่วนกลางมุ่งเน้นไปที่เป้าหมายเชิงกลยุทธ์ระยะยาวมากเกินไป ในขณะที่ละเลยความต้องการและความชอบในการบริโภคทันทีของพลเมืองแต่ละคน
explanation: |
  ข้อมูลเชิงลึกที่สำคัญของ Hayek คือความรู้มีอยู่เพียงเป็น 'เศษเสี้ยวที่กระจัดกระจายของความรู้ที่ไม่สมบูรณ์และมักขัดแย้งกันซึ่งบุคคลแต่ละคนมี' ระบบราคาของตลาดทำหน้าที่เป็นกลไกการค้นพบที่ระดมความรู้ที่กระจัดกระจายนี้ผ่านการแลกเปลี่ยนโดยสมัครใจ ผู้วางแผนส่วนกลาง ไม่ว่าจะมีเจตนาหรือความสามารถเพียงใด ก็ไม่สามารถเข้าถึงข้อมูลเชิงอัตวิสัยและเฉพาะที่ที่บุคคลมีเกี่ยวกับต้นทุน ผลประโยชน์ และความชอบได้ สิ่งนี้สร้าง 'ปัญหาความรู้' พื้นฐานที่ทำให้การวางแผนส่วนกลางไม่มีประสิทธิภาพโดยเนื้อแท้เมื่อเทียบกับการประสานงานของตลาดที่เกิดขึ้นเอง
question: 根据哈耶克的知识分散理论，与自由市场体系相比，为什么中央计划经济不能有效地分配资源？
answer: 中央规划人员无法获取个人所拥有的关于其特定需求、偏好和环境的零散、本地化知识，因此无法实现最佳资源分配。
wrong_answers:
  - 中央规划人员缺乏足够的计算能力和先进的算法来处理最优资源分配决策所需的所有经济数据。
  - 中央计划者本质上是腐败和利己的，他们在做出经济决策时，会优先考虑自己的福利，而不是社会的需求。
  - 中央规划者过于注重长期战略目标，而忽视了公民个人的即时消费需求和偏好。
explanation: |
  哈耶克的主要观点是，知识只是作为'所有不同个体所拥有的不完整且经常相互矛盾的知识的碎片分散存在'。市场的价格体系是一种发现机制，通过自愿交换来调动这些分散的知识。中央计划者，无论其意图或能力如何，都无法获取个人所拥有的关于成本、收益和偏好的主观、本地化信息。这就产生了一个根本性的 "知识问题"，使得中央计划与自发的市场协调相比效率低下。
question: 하이에크의 분산 지식 이론에 따르면, 중앙 계획 경제가 자유 시장 시스템에 비해 자원을 효율적으로 배분하지 못하는 이유는 무엇일까요?
answer: 중앙 기획자는 개인이 가진 특정 요구, 선호도, 상황에 대한 단편적이고 국지적인 지식에 접근할 수 없기 때문에 최적의 리소스 배분이 불가능합니다.
wrong_answers:
  - 중앙 계획가들은 최적의 자원 할당 결정에 필요한 모든 경제 데이터를 처리할 수 있는 충분한 계산 능력과 고급 알고리즘이 부족합니다.
  - 중앙 계획가들은 본질적으로 부패하고 이기적이기 때문에 경제적 결정을 내릴 때 사회의 필요보다 자신의 복지를 우선시합니다.
  - 중앙 기획자들은 장기적인 전략 목표에 너무 집중한 나머지 개별 시민의 즉각적인 소비 요구와 선호도를 소홀히 하고 있습니다.
explanation: |
  하이에크의 핵심 통찰은 지식은 '모든 개별 개인이 보유한 불완전하고 종종 모순되는 지식의 파편으로만 존재한다'는 것입니다 시장의 가격 시스템은 이렇게 분산된 지식을 자발적인 교환을 통해 동원하는 발견 메커니즘의 역할을 합니다. 중앙 계획자들은 그들의 의도나 능력에 관계없이 개인이 비용, 편익, 선호도에 대해 가지고 있는 주관적이고 국지적인 정보에 접근할 수 없습니다. 이로 인해 중앙 계획은 자발적인 시장 조정에 비해 본질적으로 비효율적인 근본적인 '지식 문제'가 발생합니다.
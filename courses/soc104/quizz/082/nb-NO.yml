question: Ifølge Hayeks teori om spredt kunnskap, hvorfor klarer ikke planøkonomier å allokere ressurser effektivt sammenlignet med frie markedssystemer?
answer: Sentrale planleggere har ikke tilgang til den fragmenterte, lokale kunnskapen som enkeltpersoner besitter om sine spesifikke behov, preferanser og omstendigheter, noe som gjør optimal ressursallokering umulig.
wrong_answers:
  - Sentrale planleggere mangler tilstrekkelig regnekraft og avanserte algoritmer til å behandle alle de økonomiske dataene som trengs for å ta optimale beslutninger om ressursallokering.
  - Sentralplanleggere er iboende korrupte og egennyttige, og prioriterer sin egen velferd fremfor samfunnets behov når de tar økonomiske beslutninger.
  - Sentrale planleggere fokuserer i for stor grad på langsiktige strategiske mål, mens de neglisjerer de umiddelbare forbruksbehovene og preferansene til den enkelte borger.
explanation: |
  Hayeks hovedinnsikt er at kunnskap bare eksisterer som "fragmenter av ufullstendig og ofte motstridende kunnskap som alle individer besitter" Markedets prissystem fungerer som en oppdagelsesmekanisme som mobiliserer denne spredte kunnskapen gjennom frivillige utvekslinger. Sentrale planleggere, uansett intensjoner eller evner, har ikke tilgang til den subjektive, lokaliserte informasjonen som enkeltpersoner har om kostnader, fordeler og preferanser. Dette skaper det grunnleggende "kunnskapsproblemet" som gjør sentral planlegging ineffektiv sammenlignet med spontan markedskoordinering.
question: Waarom slagen centraal geplande economieën er volgens Hayeks theorie van verspreide kennis niet in om middelen efficiënt toe te wijzen in vergelijking met vrije marktsystemen?
answer: Centrale planners hebben geen toegang tot de gefragmenteerde, gelokaliseerde kennis die individuen bezitten over hun specifieke behoeften, voorkeuren en omstandigheden.
wrong_answers:
  - Centrale planners beschikken niet over voldoende rekenkracht en geavanceerde algoritmen om alle economische gegevens te verwerken die nodig zijn voor optimale beslissingen over de toewijzing van middelen.
  - Centrale planners zijn van nature corrupt en egoïstisch en geven bij het nemen van economische beslissingen voorrang aan hun eigen welzijn boven de behoeften van de maatschappij.
  - Centrale planners richten zich te veel op strategische doelen voor de lange termijn en verwaarlozen de onmiddellijke consumptiebehoeften en voorkeuren van individuele burgers.
explanation: |
  Hayeks belangrijkste inzicht is dat kennis alleen bestaat als "verspreide fragmenten van onvolledige en vaak tegenstrijdige kennis die alle afzonderlijke individuen bezitten" Het prijssysteem van de markt dient als een ontdekkingsmechanisme dat deze verspreide kennis mobiliseert door vrijwillige uitwisselingen. Centrale planners, ongeacht hun bedoelingen of mogelijkheden, hebben geen toegang tot de subjectieve, gelokaliseerde informatie die individuen hebben over kosten, voordelen en voorkeuren. Dit creëert het fundamentele 'kennisprobleem' dat centrale planning inherent inefficiënt maakt in vergelijking met spontane marktcoördinatie.
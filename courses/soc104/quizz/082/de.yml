question: Warum gelingt es nach Hayeks Theorie des verteilten Wissens in zentralen Planwirtschaften nicht, die Ressourcen im Vergleich zu freien Marktsystemen effizient zu verteilen?
answer: Zentrale Planer können nicht auf das fragmentierte, lokalisierte Wissen zugreifen, das der Einzelne über seine spezifischen Bedürfnisse, Präferenzen und Umstände besitzt, was eine optimale Ressourcenzuweisung unmöglich macht.
wrong_answers:
  - Den zentralen Planern fehlt es an ausreichender Rechenleistung und fortschrittlichen Algorithmen, um alle Wirtschaftsdaten zu verarbeiten, die für optimale Entscheidungen über die Ressourcenzuweisung erforderlich sind.
  - Zentralplaner sind von Natur aus korrupt und eigennützig und stellen bei ihren wirtschaftlichen Entscheidungen ihr eigenes Wohl über die Bedürfnisse der Gesellschaft.
  - Die zentralen Planer konzentrieren sich zu sehr auf langfristige strategische Ziele und vernachlässigen dabei die unmittelbaren Konsumbedürfnisse und Präferenzen der einzelnen Bürger.
explanation: |
  Hayeks Schlüsselerkenntnis ist, dass Wissen nur als "verstreute Fragmente unvollständigen und häufig widersprüchlichen Wissens existiert, das alle verschiedenen Individuen besitzen" Das Preissystem des Marktes dient als Entdeckungsmechanismus, der dieses verstreute Wissen durch freiwilligen Tausch mobilisiert. Zentrale Planer, unabhängig von ihren Absichten oder Fähigkeiten, haben keinen Zugang zu den subjektiven, lokalisierten Informationen, die Einzelpersonen über Kosten, Nutzen und Präferenzen haben. Dadurch entsteht das grundlegende "Wissensproblem", das die zentrale Planung im Vergleich zur spontanen Marktkoordinierung von Natur aus ineffizient macht.
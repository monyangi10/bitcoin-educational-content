question: Согласно теории рассеянного знания Хайека, почему централизованная плановая экономика не может эффективно распределять ресурсы по сравнению со свободными рыночными системами?
answer: Центральные планировщики не могут получить доступ к фрагментарным, локализованным знаниям, которыми обладают люди о своих конкретных потребностях, предпочтениях и обстоятельствах, что делает невозможным оптимальное распределение ресурсов.
wrong_answers:
  - Центральные планировщики не обладают достаточной вычислительной мощностью и развитыми алгоритмами для обработки всех экономических данных, необходимых для принятия оптимальных решений по распределению ресурсов.
  - Центральные планировщики по своей природе коррумпированы и своекорыстны, при принятии экономических решений они отдают предпочтение собственному благополучию, а не потребностям общества.
  - Центральные планировщики уделяют слишком много внимания долгосрочным стратегическим целям, игнорируя при этом насущные потребительские нужды и предпочтения отдельных граждан.
explanation: |
  Ключевая мысль Хайека заключается в том, что знания существуют только в виде "разрозненных фрагментов неполных и часто противоречивых знаний, которыми обладают все отдельные индивиды" Рыночная система цен служит механизмом обнаружения, который мобилизует эти разрозненные знания путем добровольного обмена. Центральные планировщики, независимо от их намерений и возможностей, не могут получить доступ к субъективной, локализованной информации о затратах, выгодах и предпочтениях, которой обладают отдельные люди. Это создает фундаментальную "проблему знаний", которая делает централизованное планирование изначально неэффективным по сравнению со спонтанной рыночной координацией.
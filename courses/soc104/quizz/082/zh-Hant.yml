question: 根據哈耶克的分散知識理論，與自由市場體系相比，中央計畫經濟體為何無法有效率地分配資源？
answer: 中央規劃人員無法取得個人對於其特定需求、偏好和環境所擁有的零散、地方化知識，因此無法達到最佳的資源分配。
wrong_answers:
  - 中央規劃者缺乏足夠的計算能力和先進的演算法，無法處理最佳資源分配決策所需的所有經濟資料。
  - 中央計畫者天生腐敗且自私自利，他們在做經濟決策時，會將自己的福利置於社會需求之上。
  - 中央規劃者過度著重於長期策略目標，卻忽略了個別公民的即時消費需求與偏好。
explanation: |
  哈耶克的主要見解是，知識只存在於「所有不同個體所擁有的不完整且經常互相矛盾的知識的碎片」。市場的價格系統是一種發現機制，透過自願交換來調動這些分散的知識。中央計劃者無論其意圖或能力如何，都無法獲得個人所擁有的關於成本、收益和偏好的主觀、本地化資訊。這就造成了基本的「知識問題」，使得中央計畫相較於自發的市場協調在本質上是低效的。
question: Zgodnie z teorią rozproszonej wiedzy Hayeka, dlaczego gospodarki centralnie planowane nie są w stanie efektywnie alokować zasobów w porównaniu z systemami wolnorynkowymi?
answer: Centralni planiści nie mają dostępu do fragmentarycznej, zlokalizowanej wiedzy posiadanej przez jednostki na temat ich konkretnych potrzeb, preferencji i okoliczności, co uniemożliwia optymalną alokację zasobów.
wrong_answers:
  - Centralnym planistom brakuje wystarczającej mocy obliczeniowej i zaawansowanych algorytmów do przetwarzania wszystkich danych ekonomicznych potrzebnych do podejmowania optymalnych decyzji dotyczących alokacji zasobów.
  - Centralni planiści są z natury skorumpowani i kierują się własnym interesem, przedkładając własny dobrobyt nad potrzeby społeczeństwa przy podejmowaniu decyzji gospodarczych.
  - Centralni planiści zbyt mocno koncentrują się na długoterminowych celach strategicznych, zaniedbując jednocześnie bezpośrednie potrzeby konsumpcyjne i preferencje poszczególnych obywateli.
explanation: |
  Kluczowym spostrzeżeniem Hayeka jest to, że wiedza istnieje tylko jako "rozproszone fragmenty niekompletnej i często sprzecznej wiedzy posiadanej przez wszystkie odrębne jednostki" System cen rynkowych służy jako mechanizm odkrywania, który mobilizuje tę rozproszoną wiedzę poprzez dobrowolną wymianę. Centralni planiści, niezależnie od ich intencji i możliwości, nie mogą uzyskać dostępu do subiektywnych, zlokalizowanych informacji, które jednostki posiadają na temat kosztów, korzyści i preferencji. Tworzy to fundamentalny "problem wiedzy", który sprawia, że centralne planowanie jest z natury nieefektywne w porównaniu do spontanicznej koordynacji rynkowej.
question: Menurut teori Hayek tentang pengetahuan yang tersebar, mengapa ekonomi yang direncanakan secara terpusat gagal mengalokasikan sumber daya secara efisien dibandingkan dengan sistem pasar bebas?
answer: Perencana pusat tidak dapat mengakses pengetahuan yang terfragmentasi dan terlokalisasi yang dimiliki oleh setiap orang tentang kebutuhan, preferensi, dan keadaan mereka yang spesifik, sehingga alokasi sumber daya yang optimal menjadi tidak mungkin dilakukan.
wrong_answers:
  - Para perencana pusat tidak memiliki daya komputasi yang memadai dan algoritme yang canggih untuk memproses semua data ekonomi yang dibutuhkan untuk membuat keputusan alokasi sumber daya yang optimal.
  - Para perencana di tingkat pusat pada dasarnya korup dan mementingkan diri sendiri, memprioritaskan kesejahteraan mereka sendiri di atas kebutuhan masyarakat ketika membuat keputusan ekonomi.
  - Para perencana pusat terlalu fokus pada tujuan strategis jangka panjang dan mengabaikan kebutuhan dan preferensi konsumsi individu.
explanation: |
  Wawasan utama Hayek adalah bahwa pengetahuan hanya ada sebagai 'fragmen-fragmen yang tersebar dari pengetahuan yang tidak lengkap dan sering kali saling bertentangan yang dimiliki oleh semua individu yang berbeda Sistem harga pasar berfungsi sebagai mekanisme penemuan yang memobilisasi pengetahuan yang tersebar ini melalui pertukaran sukarela. Para perencana pusat, terlepas dari niat atau kemampuan mereka, tidak dapat mengakses informasi subyektif dan terlokalisasi yang dimiliki oleh setiap orang tentang biaya, manfaat, dan preferensi. Hal ini menciptakan 'masalah pengetahuan' mendasar yang membuat perencanaan pusat secara inheren tidak efisien dibandingkan dengan koordinasi pasar yang spontan.
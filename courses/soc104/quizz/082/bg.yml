question: Защо според теорията на Хайек за разпръснатото знание централно планираните икономики не успяват да разпределят ефективно ресурсите в сравнение със системите на свободния пазар?
answer: Централните плановици не могат да получат достъп до фрагментираните, локализирани знания, които хората притежават за своите специфични нужди, предпочитания и обстоятелства, което прави невъзможно оптималното разпределение на ресурсите.
wrong_answers:
  - Централните плановици не разполагат с достатъчно изчислителна мощ и усъвършенствани алгоритми, за да обработят всички икономически данни, необходими за вземане на оптимални решения за разпределение на ресурсите.
  - Централните плановици по своята същност са корумпирани и егоистични, тъй като при вземането на икономически решения дават предимство на собственото си благосъстояние пред нуждите на обществото.
  - Централните плановици се съсредоточават твърде много върху дългосрочните стратегически цели, като пренебрегват непосредствените потребителски нужди и предпочитания на отделните граждани.
explanation: |
  Ключовото прозрение на Хайек е, че знанието съществува само като "разпръснати фрагменти от непълно и често противоречиво знание, притежавано от всички отделни индивиди" Ценовата система на пазара служи като механизъм за откриване, който мобилизира това разпръснато знание чрез доброволна размяна. Централните плановици, независимо от техните намерения или възможности, не могат да получат достъп до субективната, локализирана информация, която индивидите имат за разходите, ползите и предпочитанията. Това създава фундаменталния "проблем на знанието", който прави централното планиране изначално неефективно в сравнение със спонтанната пазарна координация.
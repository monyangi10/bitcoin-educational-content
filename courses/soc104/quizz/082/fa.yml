question: بر اساس نظریه دانش پراکنده هایک، چرا اقتصادهای برنامه‌ریزی شده مرکزی در تخصیص منابع به اندازه سیستم‌های بازار آزاد ناکام هستند؟
answer: برنامه‌ریزان مرکزی نمی‌توانند به دانش پراکنده و محلی که افراد درباره نیازها، ترجیحات و شرایط خاص خود دارند دسترسی پیدا کنند، که تخصیص بهینه منابع را غیرممکن می‌سازد.
wrong_answers:
  - برنامه‌ریزان مرکزی فاقد قدرت محاسباتی کافی و الگوریتم‌های پیشرفته برای پردازش تمام داده‌های اقتصادی مورد نیاز برای تصمیم‌گیری‌های بهینه تخصیص منابع هستند.
  - برنامه‌ریزان مرکزی ذاتاً فاسد و خودخواه هستند و در تصمیم‌گیری‌های اقتصادی، رفاه خود را بر نیازهای جامعه ترجیح می‌دهند.
  - برنامه‌ریزان مرکزی بیش از حد بر اهداف استراتژیک بلندمدت تمرکز می‌کنند و نیازها و ترجیحات مصرف فوری شهروندان فردی را نادیده می‌گیرند.
explanation: |
  بینش کلیدی هایک این است که دانش تنها به صورت «قطعات پراکنده‌ای از دانش ناقص و اغلب متناقض که در اختیار تمام افراد متمایز است» وجود دارد. سیستم قیمت بازار به عنوان یک مکانیزم کشف عمل می‌کند که این دانش پراکنده را از طریق مبادلات داوطلبانه بسیج می‌کند. برنامه‌ریزان مرکزی، صرف نظر از نیت یا توانایی‌هایشان، نمی‌توانند به اطلاعات ذهنی و محلی که افراد درباره هزینه‌ها، منافع و ترجیحات دارند، دسترسی پیدا کنند. این مسئله اساسی «مشکل دانش» را ایجاد می‌کند که باعث می‌شود برنامه‌ریزی مرکزی ذاتاً در مقایسه با هماهنگی خودجوش بازار ناکارآمد باشد.
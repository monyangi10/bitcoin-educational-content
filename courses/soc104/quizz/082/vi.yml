question: Theo lý thuyết tri thức phân tán của Hayek, tại sao các nền kinh tế kế hoạch hóa tập trung lại thất bại trong việc phân bổ nguồn lực hiệu quả hơn so với các hệ thống kinh tế thị trường tự do?
answer: Các nhà hoạch định trung ương không thể tiếp cận được lượng kiến thức rời rạc, mang tính địa phương mà mỗi cá nhân sở hữu về nhu cầu, sở thích và hoàn cảnh cụ thể của họ, khiến việc phân bổ nguồn lực tối ưu trở nên bất khả thi.
wrong_answers:
  - Các nhà hoạch định trung ương thiếu năng lực tính toán và thuật toán tiên tiến cần thiết để xử lý tất cả dữ liệu kinh tế cần thiết cho các quyết định phân bổ nguồn lực tối ưu.
  - Các nhà hoạch định trung ương vốn dĩ tham nhũng và vị kỷ, luôn ưu tiên phúc lợi cá nhân hơn nhu cầu của xã hội khi đưa ra các quyết định kinh tế.
  - Các nhà hoạch định trung ương quá chú trọng vào các mục tiêu chiến lược dài hạn mà bỏ qua nhu cầu tiêu dùng và sở thích trước mắt của từng công dân.
explanation: |
  Quan điểm then chốt của Hayek là tri thức chỉ tồn tại dưới dạng "những mảnh vụn phân tán của tri thức không đầy đủ và thường mâu thuẫn, được nắm giữ bởi tất cả các cá nhân khác nhau". Hệ thống giá cả của thị trường đóng vai trò như một cơ chế khám phá, huy động tri thức phân tán này thông qua các trao đổi tự nguyện. Các nhà hoạch định trung ương, bất kể ý định hay khả năng của họ, không thể tiếp cận được thông tin chủ quan, cục bộ mà các cá nhân có về chi phí, lợi ích và sở thích. Điều này tạo ra "vấn đề tri thức" cơ bản khiến cho việc hoạch định trung ương vốn dĩ kém hiệu quả so với sự phối hợp thị trường tự phát.
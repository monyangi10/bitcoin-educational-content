question: हेयक के विकेंद्रीकृत ज्ञान के सिद्धांत के अनुसार, मुक्त बाजार प्रणालियों की तुलना में केंद्रीय नियोजित अर्थव्यवस्थाएं संसाधनों का कुशलतापूर्वक आवंटन करने में विफल क्यों होती हैं?
answer: केंद्रीय योजनाकार व्यक्तियों की विशिष्ट आवश्यकताओं, प्राथमिकताओं और परिस्थितियों के बारे में उनके पास मौजूद खंडित, स्थानीय ज्ञान तक पहुंच नहीं सकते हैं, जिससे संसाधनों का इष्टतम आवंटन असंभव हो जाता है।
wrong_answers:
  - केंद्रीय योजनाकारों के पास इष्टतम संसाधन आवंटन निर्णयों के लिए आवश्यक सभी आर्थिक आंकड़ों को संसाधित करने के लिए पर्याप्त कम्प्यूटेशनल शक्ति और उन्नत एल्गोरिदम की कमी है।
  - केंद्रीय योजनाकार स्वभावतः भ्रष्ट और स्वार्थी होते हैं, आर्थिक निर्णय लेते समय वे समाज की जरूरतों के बजाय अपने स्वयं के कल्याण को प्राथमिकता देते हैं।
  - केंद्रीय योजनाकार व्यक्तिगत नागरिकों की तात्कालिक उपभोग आवश्यकताओं और प्राथमिकताओं की उपेक्षा करते हुए दीर्घकालिक रणनीतिक लक्ष्यों पर बहुत अधिक ध्यान केंद्रित करते हैं।
explanation: |
  हेयक का प्रमुख विचार यह है कि ज्ञान केवल 'अपूर्ण और अक्सर विरोधाभासी ज्ञान के बिखरे हुए टुकड़ों' के रूप में ही मौजूद होता है, जो विभिन्न व्यक्तियों के पास होता है। बाज़ार की मूल्य प्रणाली एक खोज तंत्र के रूप में कार्य करती है जो स्वैच्छिक आदान-प्रदान के माध्यम से इस बिखरे हुए ज्ञान को जुटाती है। केंद्रीय योजनाकार, चाहे उनके इरादे या क्षमताएं कुछ भी हों, लागत, लाभ और प्राथमिकताओं के बारे में व्यक्तियों के पास मौजूद व्यक्तिपरक, स्थानीय जानकारी तक नहीं पहुंच सकते। यही वह मूलभूत 'ज्ञान समस्या' है जो सहज बाज़ार समन्वय की तुलना में केंद्रीय नियोजन को स्वाभाविक रूप से अक्षम बनाती है।
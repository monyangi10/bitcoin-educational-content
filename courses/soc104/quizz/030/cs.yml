question: Proč si stoupenci klasického liberalismu ve Spojených státech od 60. let 20. století osvojili termín "libertarián"?
answer: Aby se odlišili od amerických liberálů, kteří se hlásili ke státním zásahům a politice velké vlády
wrong_answers:
  - Připojit se k evropským pokrokovým hnutím a sociálnědemokratickým politikám té doby
  - Aby lépe odrážely svou podporu programům New Deal a sociálním iniciativám Great Society
  - Zdůraznit svůj závazek k vládnímu přerozdělování bohatství a veřejnému systému zdravotní péče
explanation: |
  Klasičtí liberálové v Americe přijali výraz "libertariánský", protože termín "liberální" si přisvojili pokrokáři, kteří podporovali rozsáhlé státní zásahy,
  v rozporu s klasickými liberálními zásadami laissez-faire ekonomiky a omezené vlády. Američtí "liberálové" začali být spojováni s programy New Deal a Great Society, které představovaly opak toho, co klasický liberalismus historicky představoval. Ostatní možnosti nesprávně naznačují, že libertariáni podporovali politiku velké vlády, zatímco ve skutečnosti byli proti takovým intervencionistickým přístupům.
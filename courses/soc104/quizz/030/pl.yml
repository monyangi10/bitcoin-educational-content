question: Dlaczego zwolennicy klasycznego liberalizmu w Stanach Zjednoczonych przyjęli termin "libertariański" począwszy od lat 60. ubiegłego wieku?
answer: Aby odróżnić się od amerykańskich liberałów, którzy przyjęli interwencję państwa i politykę wielkiego rządu
wrong_answers:
  - Aby dostosować się do europejskich ruchów postępowych i polityki socjaldemokratycznej epoki
  - Aby lepiej odzwierciedlić ich poparcie dla programów New Deal i inicjatyw Great Society w zakresie opieki społecznej
  - Aby podkreślić swoje zaangażowanie w rządową redystrybucję bogactwa i publiczne systemy opieki zdrowotnej
explanation: |
  Klasyczni liberałowie w Ameryce przyjęli określenie "libertariański", ponieważ termin "liberalny" został przejęty przez postępowców, którzy popierali szeroko zakrojoną interwencję państwa,
  wbrew klasycznym liberalnym zasadom ekonomii leseferystycznej i ograniczonego rządu. Amerykańscy "liberałowie" zaczęli być kojarzeni z programami New Deal i Great Society, reprezentującymi przeciwieństwo tego, za czym historycznie opowiadał się klasyczny liberalizm. Pozostałe opcje błędnie sugerują, że libertarianie wspierali politykę dużego rządu, podczas gdy w rzeczywistości sprzeciwiali się takiemu interwencjonistycznemu podejściu.
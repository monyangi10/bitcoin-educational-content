question: ¿Por qué los partidarios del liberalismo clásico en Estados Unidos adoptaron el término "libertario" a partir de la década de 1960?
answer: Para distinguirse de los liberales estadounidenses que habían abrazado la intervención estatal y las políticas de gran gobierno
wrong_answers:
  - Alinearse con los movimientos progresistas europeos y las políticas socialdemócratas de la época
  - Para reflejar mejor su apoyo a los programas del New Deal y a las iniciativas de bienestar de la Gran Sociedad
  - Para subrayar su compromiso con la redistribución gubernamental de la riqueza y los sistemas públicos de sanidad
explanation: |
  Los liberales clásicos de Estados Unidos adoptaron el término "libertario" porque el término "liberal" había sido cooptado por los progresistas que apoyaban una amplia intervención estatal,
  contrario a los principios liberales clásicos de la economía del laissez-faire y el gobierno limitado. Los "liberales" estadounidenses se asociaron con los programas del New Deal y la Gran Sociedad, que representaban lo contrario de lo que históricamente defendía el liberalismo clásico. Las otras opciones sugieren incorrectamente que los libertarios apoyaban las políticas de gran gobierno, cuando en realidad se oponían a tales planteamientos intervencionistas.
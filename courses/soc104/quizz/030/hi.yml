question: अमेरिका में शास्त्रीय उदारवाद के समर्थकों ने 1960 के दशक से 'स्वतंत्रतावादी' शब्द को क्यों अपनाया?
answer: अमेरिकी उदारवादियों से खुद को अलग दिखाने के लिए, जिन्होंने राज्य के हस्तक्षेप और बड़ी सरकारी नीतियों को अपनाया था।
wrong_answers:
  - उस दौर के यूरोपीय प्रगतिशील आंदोलनों और सामाजिक लोकतांत्रिक नीतियों के साथ खुद को संरेखित करने के लिए
  - न्यू डील कार्यक्रमों और ग्रेट सोसाइटी कल्याणकारी पहलों के प्रति उनके समर्थन को बेहतर ढंग से दर्शाने के लिए
  - सरकार द्वारा धन के पुनर्वितरण और सार्वजनिक स्वास्थ्य देखभाल प्रणालियों के प्रति अपनी प्रतिबद्धता पर जोर देने के लिए
explanation: |
  अमेरिका में शास्त्रीय उदारवादियों ने 'स्वतंत्रतावादी' शब्द को अपनाया क्योंकि 'उदार' शब्द को प्रगतिवादियों ने हथिया लिया था, जो व्यापक राज्य हस्तक्षेप का समर्थन करते थे,
  जो कि मुक्त बाज़ार अर्थव्यवस्था और सीमित सरकार के शास्त्रीय उदारवादी सिद्धांतों के विपरीत था। अमेरिकी 'उदारवादी' न्यू डील और ग्रेट सोसाइटी कार्यक्रमों से जुड़ गए, जो ऐतिहासिक रूप से शास्त्रीय उदारवाद के सिद्धांतों के बिल्कुल विपरीत थे। अन्य विकल्प गलत तरीके से यह सुझाव देते हैं कि स्वतंत्रतावादियों ने बड़ी सरकारी नीतियों का समर्थन किया, जबकि वास्तव में उन्होंने ऐसे हस्तक्षेपवादी दृष्टिकोणों का विरोध किया।
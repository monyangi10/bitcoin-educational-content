question: ทำไมผู้สนับสนุนลัทธิเสรีนิยมคลาสสิกในสหรัฐอเมริกาจึงเริ่มใช้คำว่า 'ลิเบอร์ทาเรียน' ตั้งแต่ทศวรรษ 1960?
answer: เพื่อแยกตัวเองออกจากกลุ่มเสรีนิยมอเมริกันที่ยอมรับการแทรกแซงของรัฐและนโยบายรัฐบาลขนาดใหญ่
wrong_answers:
  - เพื่อให้สอดคล้องกับขบวนการก้าวหน้าในยุโรปและนโยบายสังคมประชาธิปไตยของยุคนั้น
  - เพื่อสะท้อนถึงการสนับสนุนของพวกเขาต่อโครงการ New Deal และโครงการสวัสดิการ Great Society ได้ดียิ่งขึ้น
  - เพื่อเน้นย้ำถึงความมุ่งมั่นของพวกเขาต่อการกระจายความมั่งคั่งของรัฐบาลและระบบสาธารณสุข
explanation: |
  นักเสรีนิยมคลาสสิกในอเมริการับเอาคำว่า 'ลิเบอร์ทาเรียน' มาใช้เพราะคำว่า 'ลิเบอรัล' ถูกนำไปใช้โดยกลุ่มก้าวหน้าที่สนับสนุนการแทรกแซงของรัฐอย่างกว้างขวาง ซึ่งขัดแย้งกับหลักการของเสรีนิยมคลาสสิกที่เน้นเศรษฐกิจแบบปล่อยให้เป็นไปตามธรรมชาติและรัฐบาลที่มีขอบเขตจำกัด 'ลิเบอรัล' ในอเมริกากลายเป็นที่เกี่ยวข้องกับโครงการ New Deal และ Great Society ซึ่งเป็นตัวแทนของสิ่งที่ตรงกันข้ามกับสิ่งที่เสรีนิยมคลาสสิกยืนหยัดมาตลอด ประเด็นอื่น ๆ ที่กล่าวถึงอย่างไม่ถูกต้องบ่งบอกว่าลิเบอร์ทาเรียนสนับสนุนนโยบายรัฐบาลขนาดใหญ่ ทั้งที่จริง ๆ แล้วพวกเขาคัดค้านแนวทางการแทรกแซงเช่นนั้น
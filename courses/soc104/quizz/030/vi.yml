question: Tại sao những người ủng hộ chủ nghĩa tự do cổ điển ở Hoa Kỳ lại bắt đầu sử dụng thuật ngữ 'người theo chủ nghĩa tự do cá nhân' từ những năm 1960?
answer: Để phân biệt mình với những người theo chủ nghĩa tự do Mỹ, những người đã ủng hộ sự can thiệp của nhà nước và các chính sách chính phủ lớn.
wrong_answers:
  - Để hòa nhập với các phong trào tiến bộ châu Âu và các chính sách dân chủ xã hội của thời đại.
  - Để thể hiện rõ hơn sự ủng hộ của họ đối với các chương trình New Deal và các sáng kiến phúc lợi Great Society.
  - Nhằm nhấn mạnh cam kết của họ đối với việc phân phối lại của cải của chính phủ và các hệ thống chăm sóc sức khỏe công cộng.
explanation: |
  Những người theo chủ nghĩa tự do cổ điển ở Mỹ đã sử dụng thuật ngữ "tự do chủ nghĩa" (libertarian) vì thuật ngữ "tự do" (liberal) đã bị những người theo chủ nghĩa tiến bộ chiếm dụng, những người ủng hộ sự can thiệp rộng rãi của nhà nước, trái ngược với các nguyên tắc tự do cổ điển về kinh tế tự do cạnh tranh (laissez-faire) và chính phủ hạn chế quyền lực. Những người "tự do" ở Mỹ gắn liền với các chương trình New Deal và Great Society, đại diện cho điều ngược lại với những gì chủ nghĩa tự do cổ điển vốn theo đuổi trong lịch sử. Các lựa chọn khác cho rằng sai lầm khi cho rằng những người theo chủ nghĩa tự do ủng hộ các chính sách của chính phủ lớn, trong khi thực tế họ phản đối các phương pháp can thiệp như vậy.
question: Zašto su pristalice klasičnog liberalizma u Sjedinjenim Državama počele koristiti termin 'libertarijanac' počevši od 1960-ih?
answer: Da se razlikuju od američkih liberala koji su prihvatili intervenciju države i politike velike vlade
wrong_answers:
  - Da se usklade sa evropskim progresivnim pokretima i socijaldemokratskim politikama tog doba
  - Da bolje odraze svoju podršku programima New Deala i inicijativama socijalne pomoći Velikog društva
  - Da naglase svoju posvećenost vladinoj preraspodeli bogatstva i javnim zdravstvenim sistemima
explanation: |
  Klasični liberali u Americi usvojili su termin 'libertarijanac' jer je termin 'liberal' bio preuzet od strane progresivaca koji su podržavali opsežnu državnu intervenciju, što je bilo suprotno klasičnim liberalnim principima laissez-faire ekonomije i ograničene vlade. Američki 'liberali' postali su povezani sa programima New Deal i Great Society, predstavljajući suprotnost onome za šta se klasični liberalizam istorijski zalagao. Druge opcije pogrešno sugerišu da su libertarijanci podržavali politike velike vlade, dok su zapravo bili protiv takvih intervencionističkih pristupa.
question: Mengapa para pendukung liberalisme klasik di Amerika Serikat mengadopsi istilah 'libertarian' mulai tahun 1960-an?
answer: Untuk membedakan diri mereka dari kaum liberal Amerika yang telah menerima intervensi negara dan kebijakan pemerintah yang besar
wrong_answers:
  - Menyelaraskan diri dengan gerakan progresif Eropa dan kebijakan sosial demokratis di era tersebut
  - Untuk lebih mencerminkan dukungan mereka terhadap program-program New Deal dan inisiatif kesejahteraan Great Society
  - Untuk menekankan komitmen mereka terhadap redistribusi kekayaan pemerintah dan sistem perawatan kesehatan masyarakat
explanation: |
  Kaum liberal klasik di Amerika mengadopsi 'libertarian' karena istilah 'liberal' telah dikooptasi oleh kaum progresif yang mendukung intervensi negara secara luas,
  yang bertentangan dengan prinsip-prinsip liberal klasik tentang ekonomi laissez-faire dan pemerintahan yang terbatas. 'Liberal' Amerika kemudian diasosiasikan dengan program-program New Deal dan Great Society, yang merupakan kebalikan dari apa yang diperjuangkan oleh liberalisme klasik secara historis. Pilihan lain secara keliru menunjukkan bahwa kaum libertarian mendukung kebijakan pemerintah yang besar, padahal sebenarnya mereka menentang pendekatan intervensionis semacam itu.
question: なぜアメリカでは1960年代から古典的自由主義の支持者が「リバタリアン」という言葉を使うようになったのか？
answer: 国家介入や大きな政府政策を受け入れてきたアメリカのリベラル派と一線を画すために
wrong_answers:
  - ヨーロッパの進歩的な運動や当時の社会民主主義的な政策に同調する。
  - ニューディール・プログラムと大いなる社会の福祉構想への支持をより反映させるため
  - 政府による富の再分配と公的医療制度へのコミットメントを強調するため
explanation: |
  アメリカの古典的リベラル派が「リバタリアン」を採用したのは、「リベラル」という言葉が、国家による広範な介入を支持する進歩派によって共用していたからである、
  自由放任経済と限定政府という古典的リベラルの原則に反していた。アメリカの「リベラル」は、ニューディールやグレート・ソサエティのプログラムと結びついた。他の選択肢は、リバタリアンが大きな政府政策を支持していたと誤って示唆しているが、実際にはそのような介入主義的アプローチに反対していた。
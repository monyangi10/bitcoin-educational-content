question: Why did supporters of classical liberalism in the United States adopt the term 'libertarian' starting in the 1960s?
answer: To distinguish themselves from American liberals who had embraced state intervention and big government policies
wrong_answers:
  - To align themselves with European progressive movements and social democratic policies of the era
  - To better reflect their support for New Deal programs and Great Society welfare initiatives
  - To emphasize their commitment to government redistribution of wealth and public healthcare systems
explanation: |
  Classical liberals in America adopted 'libertarian' because the term 'liberal' had been co-opted by progressives who supported extensive state intervention, contrary to classical liberal principles of laissez-faire economics and limited government. American 'liberals' became associated with New Deal and Great Society programs, representing the opposite of what classical liberalism historically stood for. The other options incorrectly suggest libertarians supported big government policies, when they actually opposed such interventionist approaches.

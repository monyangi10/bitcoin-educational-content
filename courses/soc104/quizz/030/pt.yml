question: Porque é que os defensores do liberalismo clássico nos Estados Unidos adoptaram o termo "libertário" a partir dos anos 60?
answer: Para se distinguirem dos liberais americanos que tinham abraçado a intervenção do Estado e as políticas do grande governo
wrong_answers:
  - Alinhar-se com os movimentos progressistas europeus e as políticas sociais-democratas da época
  - Para refletir melhor o seu apoio aos programas do New Deal e às iniciativas de bem-estar da Grande Sociedade
  - Para sublinhar o seu empenhamento na redistribuição governamental da riqueza e nos sistemas públicos de saúde
explanation: |
  Os liberais clássicos na América adoptaram "libertário" porque o termo "liberal" tinha sido cooptado pelos progressistas que apoiavam uma intervenção extensiva do Estado,
  contrária aos princípios liberais clássicos da economia do laissez-faire e do governo limitado. Os "liberais" americanos ficaram associados aos programas New Deal e Great Society, representando o oposto daquilo que o liberalismo clássico historicamente defendia. As outras opções sugerem incorretamente que os libertários apoiavam políticas de grande governo, quando na realidade se opunham a essas abordagens intervencionistas.
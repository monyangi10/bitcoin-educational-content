question: Miks võtsid klassikalise liberalismi pooldajad Ameerika Ühendriikides alates 1960. aastatest kasutusele termini "libertaarne"?
answer: Et eristada end Ameerika liberaalidest, kes olid omaks võtnud riigi sekkumise ja suure valitsuse poliitika
wrong_answers:
  - Viia end kooskõlla Euroopa progressiivsete liikumiste ja ajastu sotsiaaldemokraatliku poliitikaga
  - Et paremini kajastada nende toetust New Deal'i programmidele ja Suure Ühiskonna heaolualgatustele
  - Rõhutada oma pühendumust valitsuse poolsele jõukuse ümberjaotamisele ja riiklikele tervishoiusüsteemidele
explanation: |
  Klassikalised liberaalid võtsid Ameerikas kasutusele sõna "liberaal", sest mõiste "liberaal" oli omaks võetud progressiivsete poolt, kes toetasid ulatuslikku riiklikku sekkumist,
  mis on vastuolus klassikaliste liberaalsete põhimõtetega, milleks on laissez-faire'i majandus ja piiratud valitsus. Ameerika "liberaalid" seostusid New Deali ja Suure Ühiskonna programmidega, mis esindavad vastupidist sellele, mida klassikaline liberalism ajalooliselt esindas. Teiste valikute puhul väidetakse ekslikult, et liberaalid toetasid suurt valitsemispoliitikat, kuigi tegelikult olid nad selliste sekkumismeetmete vastu.
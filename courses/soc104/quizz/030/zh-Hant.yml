question: 為什麼美國古典自由主義的支持者從 1960 年代開始採用「自由主義者」這個名詞？
answer: 為了與擁護國家干預和大政府政策的美國自由主義者區別開來
wrong_answers:
  - 與當時歐洲的進步運動和社會民主政策結盟
  - 為了更好地反映他們對新政方案和偉大社會福利措施的支持
  - 強調他們對政府財富再分配和公共醫療保健系統的承諾
explanation: |
  美國的古典自由主義者採用「自由主義者」，因為「自由主義者」一詞已被支持廣泛國家干預的進步主義者合併、
  與古典自由主義的自由放任經濟和有限政府原則背道而馳。美國的「自由主義者」與「新政」（New Deal）和「偉大社會」（Great Society）計畫聯繫在一起，代表了歷史上古典自由主義所代表的相反觀點。其他選項錯誤地暗示自由主義者支持大政府政策，但實際上他們反對這種干預主義方式。
question: Varför började anhängare av klassisk liberalism i USA använda termen "libertarian" från och med 1960-talet?
answer: För att skilja sig från amerikanska liberaler som hade anammat statlig intervention och storskalig regeringspolitik
wrong_answers:
  - Att anpassa sig till den tidens europeiska progressiva rörelser och socialdemokratiska politik
  - För att bättre återspegla deras stöd för New Deal-program och Great Society välfärdsinitiativ
  - För att betona sitt engagemang för statlig omfördelning av välstånd och offentliga sjukvårdssystem
explanation: |
  Klassiska liberaler i USA antog "libertarian" eftersom termen "liberal" hade tagits över av progressiva som stödde omfattande statliga ingripanden,
  i strid med de klassiska liberala principerna om laissez-faire-ekonomi och begränsad statsmakt. Amerikanska "liberaler" kom att förknippas med New Deal och Great Society-programmen, som representerade motsatsen till vad den klassiska liberalismen historiskt sett stått för. De andra alternativen antyder felaktigt att libertarianer stödde en politik med stora regeringar, när de i själva verket motsatte sig sådana interventionistiska metoder.
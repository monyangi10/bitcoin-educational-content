question: Amerika Birleşik Devletleri'nde klasik liberalizmin destekçileri neden 1960'lardan itibaren 'liberteryen' terimini benimsedi?
answer: Kendilerini devlet müdahalesini ve büyük hükümet politikalarını benimseyen Amerikan liberallerinden ayırmak için
wrong_answers:
  - Kendilerini Avrupa'daki ilerici hareketler ve dönemin sosyal demokrat politikaları ile uyumlu hale getirmek
  - New Deal programlarına ve Büyük Toplum refah girişimlerine verdikleri desteği daha iyi yansıtmak için
  - Devletin zenginliği yeniden dağıtmasına ve kamu sağlık sistemlerine olan bağlılıklarını vurgulamak için
explanation: |
  Amerika'daki klasik liberaller 'özgürlükçü' terimini benimsemişlerdir çünkü 'liberal' terimi, kapsamlı devlet müdahalesini destekleyen ilericiler tarafından benimsenmiştir,
  laissez-faire ekonomisi ve sınırlı hükümet gibi klasik liberal ilkelere aykırıdır. Amerikan 'liberalleri', klasik liberalizmin tarihsel olarak savunduğunun tam tersini temsil eden New Deal ve Great Society programları ile ilişkilendirilmiştir. Diğer seçenekler, aslında bu tür müdahaleci yaklaşımlara karşı çıktıkları halde, yanlış bir şekilde liberteryenlerin büyük hükümet politikalarını desteklediklerini öne sürmektedir.
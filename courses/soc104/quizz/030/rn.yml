question: Ni kuki abashigikiye uburenganzira bwa kera muri Amerika bafashe ijambo ‘libertarian’ guhera mu myaka ya 1960?
answer: Kugira ngo bitandukanye n’abanyagihugu b’Abanyamerika bari bakiriye neza ko Leta igira ico ikoze be n’ingingo za Leta nini .
wrong_answers:
  - Kugira ngo bihuze n'imigwi y'abanyaburaya y'iterambere n'ingingo za demokarasi y'imibano y'ico gihe .
  - Kugira ngo bagaragaze neza ko bashigikiye porogarama za New Deal n’imigambi y’imibereho myiza y’Igihugu Gikomeye .
  - Gushimika ku kwiyemeza kwabo ko Leta isubira gusangira ubutunzi n'ubuvuzi bwa bose .
explanation: |
  Abanyagihugu b’abanyagihugu bo muri Amerika baciye bafata ijambo ‘libertarian’ kubera ko ijambo ‘libertarian’ ryari ryaratoranijwe n’abanyagihugu bashigikiye ko Leta yinjira cane,
  bitandukanye n’ingingo ngenderwako za kera z’uburenganzira bwo kwidegemvya z’ubutunzi bwo kwidegemvya n’ubutegetsi bufise aho bugarukira. Abanyamerika ‘abanyagihugu b’abanyagihugu’ baratanguye kwifatanya na porogarama za New Deal na Great Society, zikaba zigereranya ibihushanye n’ico uburenganzira bwa kera bwari buhagaze mu mateka. Ibindi bihitamwo bivuga nabi ko abaharanira umwidegemvyo bashigikiye politike nini za Leta, mu gihe mu vy’ukuri barwanya izo nzira z’ugutera imbere.
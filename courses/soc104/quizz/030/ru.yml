question: Почему сторонники классического либерализма в США стали использовать термин "либертарианец", начиная с 1960-х годов?
answer: Чтобы отличаться от американских либералов, которые поддерживали вмешательство государства и политику большого правительства
wrong_answers:
  - Присоединиться к европейским прогрессивным движениям и социал-демократической политике той эпохи
  - Чтобы лучше отразить их поддержку программ "Нового курса" и инициатив "Великого общества" в области социального обеспечения
  - Чтобы подчеркнуть свою приверженность государственному перераспределению богатства и государственным системам здравоохранения
explanation: |
  Классические либералы в Америке приняли термин "либертарианец", потому что термин "либерал" был кооптирован прогрессистами, которые поддерживали широкое вмешательство государства,
  вопреки классическим либеральным принципам экономики laissez-faire и ограниченного правительства. Американские "либералы" стали ассоциироваться с программами "Новый курс" и "Великое общество", представляя собой противоположность тому, за что исторически выступал классический либерализм. Другие варианты неверно предполагают, что либертарианцы поддерживали политику большого правительства, в то время как на самом деле они выступали против таких интервенционистских подходов.
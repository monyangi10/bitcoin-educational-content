question: Warum haben die Anhänger des klassischen Liberalismus in den Vereinigten Staaten ab den 1960er Jahren den Begriff "libertär" eingeführt?
answer: Um sich von den amerikanischen Liberalen abzugrenzen, die staatliche Interventionen und eine Politik des großen Staates befürwortet hatten
wrong_answers:
  - Sich an die fortschrittlichen europäischen Bewegungen und die sozialdemokratische Politik der damaligen Zeit anzugleichen
  - Um ihre Unterstützung für die New-Deal-Programme und die Wohlfahrtsinitiativen der Großen Gesellschaft besser zum Ausdruck zu bringen
  - Ihr Engagement für eine staatliche Umverteilung des Wohlstands und ein öffentliches Gesundheitssystem zu betonen
explanation: |
  Die klassischen Liberalen in Amerika übernahmen den Begriff "libertär", weil der Begriff "liberal" von den Progressiven übernommen worden war, die umfangreiche staatliche Eingriffe befürworteten,
  im Gegensatz zu den klassischen liberalen Grundsätzen der Laissez-faire-Wirtschaft und einer begrenzten Regierung. Die amerikanischen "Liberalen" wurden mit den Programmen des New Deal und der Großen Gesellschaft assoziiert, die das Gegenteil dessen darstellen, wofür der klassische Liberalismus historisch stand. Die anderen Optionen suggerieren fälschlicherweise, dass Libertäre eine Politik des großen Staates unterstützten, obwohl sie in Wirklichkeit gegen solche interventionistischen Ansätze waren.
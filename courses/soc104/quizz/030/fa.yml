question: چرا طرفداران لیبرالیسم کلاسیک در ایالات متحده از دهه ۱۹۶۰ به بعد اصطلاح 'لیبرتارین' را پذیرفتند؟
answer: برای متمایز کردن خود از لیبرال‌های آمریکایی که مداخله دولت و سیاست‌های دولت بزرگ را پذیرفته بودند
wrong_answers:
  - برای همسو شدن با جنبش‌های مترقی اروپایی و سیاست‌های اجتماعی دموکراتیک آن دوران
  - برای بهتر نشان دادن حمایت خود از برنامه‌های نیو دیل و ابتکارات رفاهی جامعه بزرگ
  - برای تأکید بر تعهد خود به توزیع مجدد ثروت توسط دولت و سیستم‌های بهداشت عمومی
explanation: |
  لیبرال‌های کلاسیک در آمریکا اصطلاح 'لیبرتارین' را پذیرفتند زیرا اصطلاح 'لیبرال' توسط ترقی‌خواهانی که از مداخله گسترده دولت حمایت می‌کردند، تصاحب شده بود، که برخلاف اصول لیبرالیسم کلاسیک در اقتصاد لسه‌فر و دولت محدود بود. 'لیبرال‌های' آمریکایی با برنامه‌های نیو دیل و جامعه بزرگ مرتبط شدند، که نمایانگر مخالف آن چیزی بود که لیبرالیسم کلاسیک به‌طور تاریخی برای آن ایستاده بود. گزینه‌های دیگر به اشتباه پیشنهاد می‌کنند که لیبرتارین‌ها از سیاست‌های دولت بزرگ حمایت می‌کردند، در حالی که آن‌ها در واقع با چنین رویکردهای مداخله‌گرانه مخالف بودند.
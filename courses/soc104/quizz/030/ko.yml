question: 미국의 고전적 자유주의 지지자들이 1960년대부터 '자유주의자'라는 용어를 채택한 이유는 무엇일까요?
answer: 국가 개입과 큰 정부 정책을 수용했던 미국의 자유주의자들과 차별화하기 위해
wrong_answers:
  - 유럽의 진보적 운동과 당시의 사회민주주의 정책에 발맞추기 위해
  - 뉴딜 프로그램과 위대한 사회 복지 이니셔티브에 대한 지지를 더 잘 반영하기 위해
  - 정부의 부의 재분배와 공공 의료 시스템에 대한 그들의 노력을 강조하기 위해
explanation: |
  미국의 고전적 자유주의자들은 광범위한 국가 개입을 지지하는 진보주의자들에 의해 '자유주의자'라는 용어가 채택되었기 때문에 '자유주의자'라는 용어를 채택했습니다,
  자유방임 경제와 제한적 정부라는 고전적 자유주의 원칙에 반하는 광범위한 국가 개입을 지지하는 진보주의자들에 의해 채택되었기 때문입니다. 미국의 '자유주의자'는 뉴딜 및 위대한 사회 프로그램과 연관되어 역사적으로 고전적 자유주의와 정반대의 의미를 지니게 되었습니다. 다른 옵션은 자유주의자들이 실제로는 그러한 개입주의적 접근 방식에 반대했을 때 큰 정부 정책을 지지했다고 잘못 암시합니다.
question: Waarom gebruikten aanhangers van het klassieke liberalisme in de Verenigde Staten vanaf de jaren zestig de term 'libertarisch'?
answer: Om zich te onderscheiden van Amerikaanse liberalen die staatsinterventie en een beleid van grote regeringen hadden omarmd
wrong_answers:
  - Om zich aan te sluiten bij de Europese progressieve bewegingen en het sociaaldemocratische beleid van die tijd
  - Om hun steun voor de New Deal-programma's en welzijnsinitiatieven van de Grote Samenleving beter weer te geven
  - Om hun toewijding aan de herverdeling van rijkdom door de overheid en openbare gezondheidszorgstelsels te benadrukken
explanation: |
  Klassiek liberalen in Amerika gebruikten 'libertarisch' omdat de term 'liberaal' was overgenomen door progressieven die uitgebreide staatsbemoeienis voorstonden,
  in tegenstelling tot de klassieke liberale principes van laissez-faire economie en beperkte overheid. Amerikaanse 'liberalen' werden geassocieerd met New Deal en Great Society programma's, die het tegenovergestelde vertegenwoordigden van waar het klassieke liberalisme historisch gezien voor stond. De andere opties suggereren ten onrechte dat libertariërs een beleid van grote overheden steunden, terwijl ze eigenlijk tegen een dergelijke interventionistische aanpak waren.
question: Miksi klassisen liberalismin kannattajat Yhdysvalloissa käyttivät termiä "libertarian" 1960-luvulta alkaen?
answer: Erottautuakseen amerikkalaisista liberaaleista, jotka olivat omaksuneet valtion väliintulon ja suuren hallituksen politiikan
wrong_answers:
  - Yhtyä eurooppalaisiin edistyksellisiin liikkeisiin ja aikakauden sosiaalidemokraattiseen politiikkaan
  - Heidän tukensa New Deal -ohjelmille ja Great Society -yhteiskunnan hyvinvointialoitteille tulisi paremmin esille
  - Korostamaan sitoutumistaan hallituksen suorittamaan varallisuuden uudelleenjakoon ja julkisiin terveydenhuoltojärjestelmiin
explanation: |
  Klassiset liberaalit Amerikassa ottivat "libertaristisen" käsitteen käyttöön, koska edistysmieliset, jotka kannattivat laajaa valtion puuttumista asiaan, olivat ottaneet termin "liberaali" omakseen,
  vastoin klassisen liberaalin laissez-faire-talouden ja rajoitetun hallinnon periaatteita. Amerikkalaiset "liberaalit" yhdistettiin New Deal- ja Great Society -ohjelmiin, jotka edustivat vastakohtaa sille, mitä klassinen liberalismi historiallisesti edusti. Muissa vaihtoehdoissa annetaan virheellisesti ymmärtää, että liberaalit kannattivat suuren hallituksen politiikkaa, vaikka he itse asiassa vastustivat tällaisia interventionistisia lähestymistapoja.
question: 为什么美国古典自由主义的支持者从 20 世纪 60 年代开始使用 "自由主义者 "一词？
answer: 为了将自己与美国自由主义者区分开来，后者拥护国家干预和大政府政策
wrong_answers:
  - 向欧洲进步运动和当时的社会民主政策看齐
  - 更好地反映他们对新政计划和 "伟大社会 "福利倡议的支持
  - 强调他们对政府财富再分配和公共医疗系统的承诺
explanation: |
  美国的古典自由主义者采用 "自由主义者 "一词，是因为 "自由主义者 "一词已被支持国家广泛干预的进步人士所采用、
  他们支持国家的广泛干预，这与古典自由主义的自由放任经济学和有限政府原则背道而驰。美国的 "自由主义者 "与 "新政 "和 "伟大社会 "计划联系在一起，与经典自由主义的历史主张背道而驰。其他选项错误地认为自由主义者支持大政府政策，而实际上他们反对这种干预主义做法。
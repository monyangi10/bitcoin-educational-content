question: Perché i sostenitori del liberalismo classico negli Stati Uniti hanno adottato il termine "libertario" a partire dagli anni '60?
answer: Per distinguersi dai liberali americani che avevano abbracciato l'intervento statale e le politiche di big government
wrong_answers:
  - Allinearsi ai movimenti progressisti europei e alle politiche socialdemocratiche dell'epoca
  - Per riflettere meglio il loro sostegno ai programmi del New Deal e alle iniziative assistenziali della Grande Società
  - Per sottolineare il loro impegno a favore della ridistribuzione della ricchezza da parte del governo e dei sistemi sanitari pubblici
explanation: |
  I liberali classici in America hanno adottato il termine "libertario" perché il termine "liberale" era stato cooptato dai progressisti che sostenevano un ampio intervento statale,
  in contrasto con i principi liberali classici dell'economia del laissez-faire e del governo limitato. I "liberali" americani sono stati associati ai programmi del New Deal e della Great Society, rappresentando l'opposto di ciò che il liberalismo classico ha storicamente rappresentato. Le altre opzioni suggeriscono erroneamente che i libertari sostenevano politiche di grande governo, mentre in realtà si opponevano a tali approcci interventisti.
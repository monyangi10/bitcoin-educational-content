question: Kwa nini wafuasi wa uliberali wa kitamaduni nchini Marekani walipitisha neno 'mliberali' kuanzia miaka ya 1960?
answer: Ili kujitofautisha na waliberali wa Marekani ambao walikuwa wamekumbatia uingiliaji kati wa serikali na sera kubwa za serikali
wrong_answers:
  - Kujipatanisha na harakati za maendeleo za Ulaya na sera za kidemokrasia za kijamii za enzi hiyo
  - Ili kuakisi vyema usaidizi wao kwa programu za Mpango Mpya na mipango ya ustawi wa jamii kubwa
  - Kusisitiza kujitolea kwao kwa serikali katika ugawaji upya wa utajiri na mifumo ya afya ya umma
explanation: |
  Waliberali wa kitamaduni nchini Marekani walipitisha 'liberali' kwa sababu neno 'liliberali' lilikuwa limekubaliwa na watu wenye msimamo mkali waliounga mkono uingiliaji kati mkubwa wa serikali, kinyume na kanuni za kiliberali za kitamaduni za uchumi wa laissez-faire na serikali yenye mipaka. 'Waliberali' wa Marekani walihusishwa na programu za New Deal na Great Society, zikiwakilisha kinyume cha kile ambacho kiliberali cha kitamaduni kiliwakilisha kihistoria. Chaguzi zingine zinaonyesha kimakosa kwamba waliberali waliunga mkono sera kubwa za serikali, wakati walipinga mbinu kama hizo za uingiliaji kati.
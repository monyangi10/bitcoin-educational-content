question: Защо привържениците на класическия либерализъм в САЩ приемат термина "либертариански" от 60-те години на миналия век?
answer: За да се разграничат от американските либерали, които бяха приели държавната намеса и политиките на голямото правителство
wrong_answers:
  - Да се присъединят към европейските прогресивни движения и социалдемократическите политики на епохата
  - За да се отрази по-добре подкрепата им за програмите на Новия курс и инициативите на "Великото общество" в областта на благосъстоянието
  - Да подчертаят ангажимента си към държавното преразпределение на богатството и обществените системи за здравеопазване
explanation: |
  Класическите либерали в Америка възприемат термина "либертариански", тъй като той е кооптиран от прогресистите, които подкрепят широката държавна намеса,
  в противоречие с класическите либерални принципи на laissez-faire икономика и ограничено управление. Американските "либерали" започнаха да се свързват с програмите на Новия курс и Великото общество, представляващи обратното на това, което класическият либерализъм исторически е защитавал. Другите варианти неправилно внушават, че либертарианците са подкрепяли политиките на голямото правителство, докато всъщност те са се противопоставяли на такива интервенционистки подходи.
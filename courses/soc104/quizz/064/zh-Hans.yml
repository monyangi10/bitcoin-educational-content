question: 根据汉娜-阿伦特的分析，极权主义教育与传统的专制灌输有何区别？
answer: 其目的是摧毁形成任何独立信念的能力，而不是灌输具体的信仰
wrong_answers:
  - 它的重点是通过系统的宣传活动，弘扬极端民族主义和种族优越感
  - 它强调完全服从国家权威，同时保留个人的批判性思维能力
  - 它试图通过强化政治教育计划，用世俗意识形态取代宗教信仰
explanation: |
  汉娜-阿伦特（Hannah Arendt）的重要见解揭示了极权主义教育与传统灌输式教育的根本不同。极权主义制度不是简单地用一套信仰取代另一套信仰，而是系统地摧毁人类独立思考的能力本身。这就造成了个人无法形成任何自主的信念，使他们完全受制于国家的控制。其他选项代表了传统的专制策略，但却忽略了阿伦特对极权主义如何否定政治行动和独立判断的可能性的深入分析。
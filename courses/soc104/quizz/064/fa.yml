question: بر اساس تحلیل هانا آرنت، چه چیزی آموزش توتالیتر را از تلقین اقتدارگرای سنتی متمایز می‌کند؟
answer: هدف آن نابود کردن توانایی شکل‌گیری هرگونه اعتقادات مستقل است، نه القای باورهای خاص.
wrong_answers:
  - بر ترویج ناسیونالیسم افراطی و برتری نژادی از طریق کمپین‌های تبلیغاتی سیستماتیک تمرکز دارد.
  - این بر اطاعت کامل از اقتدار دولت تأکید دارد در حالی که توانایی افراد برای تفکر انتقادی را حفظ می‌کند.
  - این تلاش می‌کند تا باورهای مذهبی را با ایدئولوژی‌های سکولار از طریق برنامه‌های آموزشی سیاسی فشرده جایگزین کند.
explanation: |
  بینش حیاتی هانا آرنت نشان می‌دهد که آموزش توتالیتر به‌طور اساسی با تلقین سنتی متفاوت عمل می‌کند. به‌جای اینکه صرفاً یک مجموعه باورها را با مجموعه‌ای دیگر جایگزین کند، سیستم‌های توتالیتر به‌طور سیستماتیک ظرفیت انسانی برای تفکر مستقل را از بین می‌برند. این امر افرادی را ایجاد می‌کند که قادر به شکل‌گیری هیچ‌گونه اعتقادات خودمختار نیستند و آن‌ها را کاملاً قابل انعطاف برای کنترل دولت می‌سازد. گزینه‌های دیگر نمایانگر تاکتیک‌های اقتدارگرایانه متعارف هستند اما تحلیل عمیق‌تر آرنت را از اینکه چگونه توتالیتاریسم امکان اقدام سیاسی و قضاوت مستقل را نفی می‌کند، از دست می‌دهند.
question: Что, согласно анализу Ханны Арендт, отличает тоталитарное воспитание от традиционной авторитарной индоктринации?
answer: Она направлена на уничтожение способности к формированию независимых убеждений, а не на привитие конкретных верований
wrong_answers:
  - Она сосредоточена на пропаганде крайнего национализма и расового превосходства посредством систематических пропагандистских кампаний
  - Она подчеркивает полное повиновение государственной власти, сохраняя при этом способность человека к критическому мышлению
  - Она стремится заменить религиозные убеждения светской идеологией с помощью интенсивных программ политического образования
explanation: |
  Ханна Арендт пришла к важнейшему выводу, что тоталитарное образование действует принципиально иначе, чем традиционная индоктринация. Вместо того чтобы просто заменить один набор убеждений другим, тоталитарные системы систематически уничтожают саму способность человека к независимому мышлению. В результате индивиды становятся неспособными к формированию каких-либо самостоятельных убеждений, что делает их полностью податливыми для государственного контроля. Другие варианты представляют собой обычную авторитарную тактику, но не учитывают более глубокий анализ Арендт того, как тоталитаризм сводит на нет саму возможность политического действия и независимого суждения.
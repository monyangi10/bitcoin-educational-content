question: Dukurikije isesengura rya Hannah Arendt, ni igiki gitandukanya inyigisho y’ubutegetsi bw’agahomerabunwa n’inyigisho z’ubutegetsi bw’agahomerabunwa za kera?
answer: Igamije gusenyura ubushobozi bwo gushinga imyizere iyo ari yo yose yigenga aho gutera imyizere yihariye .
wrong_answers:
  - Ishimikiye cane ku guteza imbere ugukunda igihugu birenze urugero no gusumba abandi kubera ubwoko biciye mu masekeza y’ivy’ugukwiragiza amakuru atunganijwe .
  - Rishimika ku kwumvira bimwe bishitse ubukuru bwa Leta mu gihe umuntu azigama ubushobozi bwo kwiyumvira neza .
  - Irarondera gusubirira imyizere y’idini n’ingengabitekerezo y’isi biciye ku migambi ikomeye y’inyigisho za politike .
explanation: |
  Ubumenyi buhambaye bwa Hannah Arendt burahishura yuko inyigisho y’ubutegetsi bw’agahomerabunwa ikora mu buryo butandukanye cane n’inyigisho z’imigenzo. Aho gusubirira gusa imyizere imwe n’iyindi, intwaro z’ubutegetsi bw’agahomerabunwa zirasenyura mu buryo butunganye ubushobozi umuntu afise bwo kwiyumvira yigenga ubwayo. Ivyo bituma abantu badashobora gushinga ivyiyumviro vy’ukwigenga, bikaba bituma bashobora gushikirwa n’ubutegetsi bwa Leta. Ayandi mahitamwo agereranya ubuhinga busanzwe bw’ubutegetsi bw’agahomerabunwa ariko arabura isesengura ry’imbere rya Arendt ry’ingene ubutegetsi bw’agahomerabunwa buhakana ubushobozi bwo gukora politike n’urubanza rwigenga.
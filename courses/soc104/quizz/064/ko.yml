question: 한나 아렌트의 분석에 따르면, 전체주의 교육이 전통적인 권위주의적 세뇌 교육과 다른 점은 무엇일까요?
answer: 특정 신념을 주입하기보다는 독립적인 신념을 형성할 수 있는 능력을 파괴하는 것을 목표로 합니다
wrong_answers:
  - 체계적인 선전 캠페인을 통해 극단적인 민족주의와 인종적 우월성을 조장하는 데 중점을 둡니다
  - 국가 권위에 대한 완전한 복종을 강조하는 동시에 개인의 비판적 사고 능력을 보존합니다
  - 집중적인 정치 교육 프로그램을 통해 종교적 신념을 세속적 이데올로기로 대체하고자 합니다
explanation: |
  한나 아렌트의 중요한 통찰은 전체주의 교육이 기존의 주입식 교육과는 근본적으로 다르게 운영된다는 사실을 보여줍니다. 전체주의 시스템은 단순히 한 신념을 다른 신념으로 대체하는 것이 아니라 인간의 독립적인 사고 능력 자체를 체계적으로 파괴합니다. 이로 인해 개인은 자율적인 신념을 형성할 수 없게 되고, 국가의 통제에 완전히 굴복하게 됩니다. 다른 옵션은 기존의 권위주의적 전술을 대표하지만 전체주의가 정치적 행동과 독립적 판단의 가능성을 어떻게 부정하는지에 대한 아렌트의 심층적인 분석을 놓치고 있습니다.
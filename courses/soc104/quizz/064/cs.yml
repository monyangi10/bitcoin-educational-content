question: Čím se podle analýzy Hannah Arendtové liší totalitní výchova od tradiční autoritářské indoktrinace?
answer: Jejím cílem je spíše zničit schopnost vytvářet si nezávislé přesvědčení než vštěpovat konkrétní názory
wrong_answers:
  - Zaměřuje se na podporu extrémního nacionalismu a rasové nadřazenosti prostřednictvím systematických propagandistických kampaní
  - Klade důraz na naprostou poslušnost vůči státní autoritě a zároveň zachovává schopnost kritického myšlení jednotlivce
  - Snaží se nahradit náboženské přesvědčení sekulárními ideologiemi prostřednictvím intenzivních programů politického vzdělávání
explanation: |
  Hannah Arendtová svým zásadním postřehem odhalila, že totalitní výchova funguje zásadně jinak než tradiční indoktrinace. Totalitní systémy spíše než prosté nahrazování jednoho souboru přesvědčení jiným systematicky ničí samotnou lidskou schopnost nezávislého myšlení. Vznikají tak jedinci neschopní vytvořit si jakékoliv autonomní přesvědčení, kteří jsou zcela poddajní státní kontrole. Ostatní možnosti představují konvenční autoritářské taktiky, ale postrádají hlubší analýzu Arendtové, jak totalitarismus popírá samotnou možnost politického jednání a nezávislého úsudku.
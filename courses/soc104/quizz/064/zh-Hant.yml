question: 根據 Hannah Arendt 的分析，極權教育與傳統的專制灌輸有何不同？
answer: 它的目的是摧毀形成任何獨立信念的能力，而不是灌輸特定的信仰。
wrong_answers:
  - 它的重點是透過有系統的宣傳活動，宣揚極端民族主義和種族優越性
  - 它強調完全服從國家權力，同時保留個人批判性思考的能力。
  - 它尋求透過密集的政治教育計畫，以世俗的意識形態取代宗教信仰。
explanation: |
  漢娜‧阿倫特(Hannah Arendt)的重要洞察力揭示出，極權教育的運作方式與傳統的灌輸教育根本不同。極權體系不是簡單地以一套信念取代另一套信念，而是有系統地摧毀人類獨立思考的能力。這會造成個人無法形成任何自主的信念，使他們完全受制於國家的控制。其他選項代表了傳統的專制策略，但卻忽略了阿倫特對極權主義如何否定政治行動與獨立判斷的可能性的深入分析。
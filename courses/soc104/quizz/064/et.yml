question: Mis eristab Hannah Arendti analüüsi kohaselt totalitaarset kasvatust traditsioonilisest autoritaarsest indoktrinatsioonist?
answer: Selle eesmärk on pigem hävitada võime kujundada iseseisvaid veendumusi kui sisendada konkreetseid uskumusi
wrong_answers:
  - See keskendub süstemaatiliste propagandakampaaniate kaudu äärmusliku natsionalismi ja rassilise üleoleku edendamisele
  - See rõhutab täielikku kuulekust riigivõimule, säilitades samas üksikisikute võime kriitiliselt mõelda
  - Selle eesmärk on asendada religioossed tõekspidamised ilmalike ideoloogiatega intensiivsete poliitiliste haridusprogrammide kaudu
explanation: |
  Hannah Arendti otsustav arusaam näitab, et totalitaarne kasvatus toimib põhimõtteliselt teisiti kui traditsiooniline indoktrinatsioon. Selle asemel, et lihtsalt asendada üks uskumuste kogum teise omaga, hävitavad totalitaarsed süsteemid süstemaatiliselt inimese võimet iseseisvaks mõtlemiseks. See loob üksikisikud, kes ei ole võimelised iseseisvaid veendumusi kujundama, muutes nad riigi kontrollile täiesti kohandatavaks. Teised valikud esindavad tavapäraseid autoritaarseid taktikaid, kuid jätavad tähelepanuta Arendti sügavama analüüsi selle kohta, kuidas totalitarism eitab poliitilise tegevuse ja iseseisva otsustamise võimaluse.
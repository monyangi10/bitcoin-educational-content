question: Was unterscheidet den minarchistisch-libertären Ansatz vom anarcho-kapitalistischen Ansatz hinsichtlich der Staatsfunktionen?
answer: Minarchisten befürworten einen minimalen Staat, der sich auf Polizei, Justiz und Verteidigung beschränkt, während Anarchokapitalisten die vollständige Privatisierung aller staatlichen Funktionen fordern
wrong_answers:
  - Minarchisten lehnen jede Form der Regierung ab, während Anarchokapitalisten regulierte Märkte mit einigen staatlichen Eingriffen befürworten
  - Minarchisten befürworten eine starke wirtschaftliche Regulierung, während Anarcho-Kapitalisten nur soziale Freiheiten ohne wirtschaftliche Freiheit unterstützen
  - Minarchisten unterstützen den demokratischen Sozialismus, während Anarchokapitalisten für von Unternehmen kontrollierte staatliche Institutionen eintreten
explanation: |
  Das Kapitel unterscheidet klar zwischen diesen beiden libertären Tendenzen: Minarchisten glauben an einen minimalen "Nachtwächterstaat", der nur wesentliche Funktionen (Polizei, Justiz, bewaffnete Verteidigung) wahrnimmt, während Anarchokapitalisten den Staat ganz abschaffen wollen, indem sie selbst diese Kernfunktionen durch Marktmechanismen privatisieren.
  Beide teilen das Grundprinzip der individuellen Souveränität, unterscheiden sich aber in der Frage, ob eine staatliche Rolle legitim ist. Die falschen Antworten stellen diese Positionen falsch dar, indem sie eine Unterstützung für Regulierung, Sozialismus oder Unternehmenskontrolle suggerieren, was den libertären Prinzipien der individuellen Freiheit und des freiwilligen Austauschs widerspricht.
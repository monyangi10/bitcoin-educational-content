question: อะไรที่ทำให้แนวทางของลิเบอร์ทาเรียนแบบมินาร์คิสต์แตกต่างจากแนวทางของอนาโค-แคปิตาลิสต์ในเรื่องหน้าที่ของรัฐ?
answer: ผู้สนับสนุนรัฐแบบมินิมอล (Minarchists) สนับสนุนรัฐที่มีขอบเขตจำกัดเฉพาะตำรวจ ความยุติธรรม และการป้องกัน ในขณะที่ผู้สนับสนุนอนาธิปไตยทุนนิยม (anarcho-capitalists) ต้องการการแปรรูปรัฐทั้งหมดให้เป็นของเอกชน
wrong_answers:
  - พวกมินาร์ชิสต์ปฏิเสธทุกรูปแบบของรัฐบาล ในขณะที่พวกอนาธิปไตยทุนนิยมสนับสนุนตลาดที่มีการควบคุมพร้อมกับการแทรกแซงของรัฐบางส่วน
  - พวกมินาร์คิสต์สนับสนุนการควบคุมทางเศรษฐกิจอย่างเข้มงวด ในขณะที่พวกอนาธิปไตยทุนนิยมสนับสนุนเฉพาะเสรีภาพทางสังคมโดยไม่มีเสรีภาพทางเศรษฐกิจ
  - มินาร์ชิสต์สนับสนุนสังคมนิยมประชาธิปไตย ในขณะที่อนาธิปไตยทุนนิยมสนับสนุนสถาบันรัฐบาลที่ควบคุมโดยบริษัท
explanation: |
  บทนี้แยกแยะความแตกต่างของแนวโน้มเสรีนิยมทั้งสองอย่างชัดเจน: มินาร์คิสต์เชื่อใน 'รัฐยามค่ำคืน' ที่มีบทบาทเพียงเล็กน้อยและทำหน้าที่ที่จำเป็นเท่านั้น (ตำรวจ, ความยุติธรรม, การป้องกันด้วยอาวุธ) ในขณะที่อนาร์โคแคปิตาลิสต์ต้องการกำจัดรัฐออกไปทั้งหมดโดยการแปรรูปลักษณะหน้าที่หลักเหล่านี้ผ่านกลไกตลาด ทั้งสองมีหลักการพื้นฐานของอธิปไตยส่วนบุคคลร่วมกัน แต่แตกต่างกันในเรื่องบทบาทของรัฐที่ถูกต้องตามกฎหมาย คำตอบที่ผิดพลาดแสดงถึงตำแหน่งเหล่านี้อย่างไม่ถูกต้องโดยการเสนอการสนับสนุนการควบคุม, สังคมนิยม, หรือการควบคุมโดยบริษัท ซึ่งขัดแย้งกับหลักการเสรีนิยมของเสรีภาพส่วนบุคคลและการแลกเปลี่ยนโดยสมัครใจ
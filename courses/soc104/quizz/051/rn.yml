question: Ni igiki gitandukanya uburyo bw’ubwigenge bw’aba minarchiste n’uburyo bw’aba anarcho-capitaliste ku bijanye n’ibikorwa vya Leta?
answer: Aba minarchiste bashigikiye Leta ntoyi cane igarukira ku bapolisi, ubutungane n’ukwigwanira mu gihe aba anarcho-capitalistes bashaka ko ibikorwa vyose vya Leta bihindurwa ivy’abantu ku giti cabo .
wrong_answers:
  - Aba minarchiste banse ubwoko bwose bw’intwaro mu gihe aba anarcho-capitalistes bashigikira amasoko atunganijwe n’ingene Leta igira ico ikoze
  - Aba minarchiste bakunda amategeko akomeye y’ubutunzi mu gihe aba anarcho-capitalistes bashigikira gusa umwidegemvyo wo mu kibano ata mwidegemvyo w’ubutunzi .
  - Aba minarchiste bashigikiye ubusosiyalisimu bwa demokarasi mu gihe aba anarcho-capitalistes bashigikira inzego za leta zigenzurwa n'amashirahamwe .
explanation: |
  Iki gice kiratandukanya neza izo mpengamiro zibiri z’ubwigenge: aba minarchiste bemera ko hariho ‘Leta y’umurinzi w’ijoro’ ikora gusa ibikorwa vy’ingenzi (abapolisi, ubutungane, uburinzi bw’intwaro), mu gihe aba anarcho-capitalistes bashaka gukuraho Leta yose mu guhindura mbere n’izo nshingano nyamukuru zibe iz’abantu ku giti cabo biciye mu buryo bw’isoko.
  Bompi barasangiye ingingo ngenderwako y’ishimikiro y’ubusegaba bw’umuntu ku giti ciwe ariko baratandukanye ku bijanye n’uko uruhara rwa Leta rwoba rubereye. Inyishu zitari zo ziserura nabi ivyo vyiyumviro mu gutanga iciyumviro co gushigikira amategeko, ubusosiyalisimu canke ubugenzuzi bw’amashirahamwe, ivyo bikaba bivuguruza ingingo ngenderwako z’ubwigenge z’umwidegemvyo w’umuntu ku giti ciwe n’uguhanahana amakuru ku bushake.
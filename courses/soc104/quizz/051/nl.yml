question: Wat onderscheidt de minarchistische libertaire benadering van de anarcho-kapitalistische benadering met betrekking tot staatsfuncties?
answer: Minarchisten steunen een minimale staat, beperkt tot politie, justitie en defensie, terwijl anarcho-kapitalisten een volledige privatisering van alle staatsfuncties willen
wrong_answers:
  - Minarchisten wijzen alle vormen van overheid af, terwijl anarcho-kapitalisten gereguleerde markten met enige staatsinterventie steunen
  - Minarchisten zijn voorstander van sterke economische regulering, terwijl anarcho-kapitalisten alleen sociale vrijheden steunen zonder economische vrijheid
  - Minarchisten zijn voorstander van democratisch socialisme, terwijl anarcho-kapitalisten voorstander zijn van door bedrijven gecontroleerde overheidsinstellingen
explanation: |
  Het hoofdstuk maakt een duidelijk onderscheid tussen deze twee libertaire stromingen: minarchisten geloven in een minimale 'nachtwakerstaat' die alleen essentiële functies uitvoert (politie, justitie, gewapende verdediging), terwijl anarcho-kapitalisten de staat volledig willen elimineren door zelfs deze kernfuncties te privatiseren via marktmechanismen.
  Beiden delen het fundamentele principe van individuele soevereiniteit, maar verschillen van mening over de vraag of enige rol van de staat legitiem is. De foute antwoorden geven een verkeerd beeld van deze standpunten door steun voor regulering, socialisme of bedrijfscontrole te suggereren, wat in tegenspraak is met de libertarische principes van individuele vrijheid en vrijwillige uitwisseling.
question: Какво отличава либертарианския подход на минархистите от анархо-капиталистическия подход по отношение на функциите на държавата?
answer: Минархистите подкрепят минимална държава, ограничена до полицията, правосъдието и отбраната, докато анархокапиталистите искат пълна приватизация на всички държавни функции
wrong_answers:
  - Минархистите отхвърлят всички форми на управление, докато анархокапиталистите подкрепят регулираните пазари с известна държавна намеса
  - Минархистите подкрепят силното икономическо регулиране, докато анархокапиталистите подкрепят само социалните свободи без икономическа свобода
  - Минархистите подкрепят демократичния социализъм, докато анархокапиталистите се застъпват за държавни институции, контролирани от корпорациите
explanation: |
  В главата ясно се разграничават тези две либертариански тенденции: минерхистите вярват в една минимална "държава-нощен пазач", която изпълнява само основни функции (полиция, правосъдие, въоръжена отбрана), докато анархокапиталистите искат да премахнат изцяло държавата, като приватизират дори тези основни функции чрез пазарни механизми.
  И двамата споделят фундаменталния принцип на индивидуалния суверенитет, но се различават по въпроса дали всяка роля на държавата е легитимна. Неправилните отговори представят тези позиции погрешно, като предполагат подкрепа за регулации, социализъм или корпоративен контрол, което противоречи на либертарианските принципи за индивидуална свобода и доброволна размяна.
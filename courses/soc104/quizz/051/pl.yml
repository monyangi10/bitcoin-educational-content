question: Co odróżnia minarchistyczne podejście libertariańskie od anarchokapitalistycznego podejścia do funkcji państwa?
answer: Minarchiści popierają minimalne państwo ograniczone do policji, wymiaru sprawiedliwości i obrony, podczas gdy anarchokapitaliści chcą całkowitej prywatyzacji wszystkich funkcji państwa
wrong_answers:
  - Minarchiści odrzucają wszelkie formy rządu, podczas gdy anarchokapitaliści wspierają regulowane rynki z pewną interwencją państwa
  - Minarchiści opowiadają się za silnymi regulacjami gospodarczymi, podczas gdy anarchokapitaliści wspierają jedynie swobody społeczne bez wolności gospodarczej
  - Minarchiści wspierają demokratyczny socjalizm, podczas gdy anarchokapitaliści opowiadają się za kontrolowanymi przez korporacje instytucjami rządowymi
explanation: |
  Rozdział ten wyraźnie rozróżnia te dwie libertariańskie tendencje: minarchiści wierzą w minimalne "państwo nocnego stróża", które pełni tylko podstawowe funkcje (policja, wymiar sprawiedliwości, obrona zbrojna), podczas gdy anarchokapitaliści chcą całkowicie wyeliminować państwo, prywatyzując nawet te podstawowe funkcje za pomocą mechanizmów rynkowych.
  Obaj podzielają fundamentalną zasadę suwerenności jednostki, ale różnią się co do tego, czy jakakolwiek rola państwa jest uzasadniona. Błędne odpowiedzi błędnie przedstawiają te stanowiska, sugerując poparcie dla regulacji, socjalizmu lub kontroli korporacyjnej, co jest sprzeczne z libertariańskimi zasadami wolności jednostki i dobrowolnej wymiany.
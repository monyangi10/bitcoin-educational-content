question: Ni nini kinachotofautisha mbinu ya uhuru wa watu wa chini ya utawala wa kifalme na mbinu ya anarcho-bepari kuhusu kazi za serikali?
answer: Wanaminarchist wanaunga mkono kiwango kidogo cha dola kinachowekwa kwenye polisi, haki na ulinzi huku wanaanarcho-kipebari wakitaka ubinafsishaji kamili wa majukumu yote ya serikali.
wrong_answers:
  - Wa-minarchist wanakataa aina zote za serikali huku wanasiasa-bepari wakiunga mkono masoko yanayodhibitiwa kwa kuingilia kati kwa kiasi fulani na serikali.
  - Wa-minarchist wanapendelea udhibiti mkali wa kiuchumi huku wanamgambo wa kibepari wakiunga mkono uhuru wa kijamii bila uhuru wa kiuchumi.
  - Wa-Minarchist wanaunga mkono ujamaa wa kidemokrasia huku wana-anarcho-bepari wakitetea taasisi za serikali zinazodhibitiwa na makampuni
explanation: |
  Sura hiyo inatofautisha waziwazi mielekeo hii miwili ya uhuru: watawala wa kidini wanaamini katika 'serikali ndogo ya walinzi wa usiku' ambayo hufanya kazi muhimu tu (polisi, haki, ulinzi wa silaha), huku watawala wa kibepari wakitaka kuiondoa serikali kabisa kwa kubinafsisha hata kazi hizi kuu kupitia mifumo ya soko.
  Wote wanashiriki kanuni ya msingi ya uhuru wa mtu binafsi lakini hutofautiana kuhusu kama jukumu lolote la serikali ni halali. Majibu yasiyo sahihi yanapotosha misimamo hii kwa kupendekeza uungwaji mkono wa udhibiti, ujamaa, au udhibiti wa kampuni, ambayo inapingana na kanuni za uhuru wa mtu binafsi na ubadilishanaji wa hiari.

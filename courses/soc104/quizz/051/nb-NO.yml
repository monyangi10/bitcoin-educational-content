question: Hva skiller den minarkistisk-libertarianske tilnærmingen fra den anarko-kapitalistiske tilnærmingen når det gjelder statens funksjoner?
answer: Minarkistene går inn for en minimalstat begrenset til politi, rettsvesen og forsvar, mens anarkokapitalistene ønsker en fullstendig privatisering av alle statlige funksjoner
wrong_answers:
  - Minarkister avviser alle former for statlig styring, mens anarkokapitalister støtter regulerte markeder med noe statlig inngripen
  - Minarkister går inn for sterk økonomisk regulering, mens anarkokapitalister kun støtter sosiale friheter uten økonomisk frihet
  - Minarkister støtter demokratisk sosialisme, mens anarkokapitalister går inn for bedriftsstyrte statsinstitusjoner
explanation: |
  Kapitlet skiller klart mellom disse to libertarianske retningene: Minarkister tror på en minimal "nattevaktstat" som kun utfører essensielle funksjoner (politi, rettsvesen, væpnet forsvar), mens anarkokapitalister ønsker å eliminere staten helt ved å privatisere selv disse kjernefunksjonene gjennom markedsmekanismer.
  Begge deler det grunnleggende prinsippet om individuell suverenitet, men er uenige om hvorvidt statens rolle er legitim. Feil svar gir en feilaktig fremstilling av disse posisjonene ved å antyde støtte til regulering, sosialisme eller selskapskontroll, noe som strider mot libertarianske prinsipper om individuell frihet og frivillig utveksling.
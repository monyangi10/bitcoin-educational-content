question: Minarşist liberteryen yaklaşımı devletin işlevlerine ilişkin anarko-kapitalist yaklaşımdan ayıran nedir?
answer: Minarşistler polis, adalet ve savunma ile sınırlı minimal devleti desteklerken, anarko-kapitalistler tüm devlet işlevlerinin tamamen özelleştirilmesini isterler
wrong_answers:
  - Minarşistler her türlü hükümeti reddederken, anarko-kapitalistler bir miktar devlet müdahalesi ile düzenlenmiş piyasaları destekler
  - Minarşistler güçlü ekonomik düzenlemeleri desteklerken, anarko-kapitalistler ekonomik özgürlük olmaksızın sadece sosyal özgürlükleri desteklerler
  - Minarşistler demokratik sosyalizmi desteklerken, anarko-kapitalistler şirket kontrolündeki devlet kurumlarını savunurlar
explanation: |
  Bölüm bu iki liberteryen eğilimi net bir şekilde birbirinden ayırmaktadır: minarşistler yalnızca temel işlevleri (polis, adalet, silahlı savunma) yerine getiren minimal bir 'gece bekçisi devlete' inanırken, anarko-kapitalistler bu temel işlevleri bile piyasa mekanizmaları aracılığıyla özelleştirerek devleti tamamen ortadan kaldırmak istemektedir.
  Her ikisi de bireysel egemenliğin temel ilkesini paylaşmakta, ancak herhangi bir devlet rolünün meşru olup olmadığı konusunda farklılık göstermektedir. Yanlış cevaplar, bireysel özgürlük ve gönüllü mübadele gibi liberteryen ilkelerle çelişen düzenleme, sosyalizm veya şirket kontrolüne destek önererek bu pozisyonları yanlış yansıtmaktadır.
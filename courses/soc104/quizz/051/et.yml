question: Mis eristab minarhistlik-liberalistlikku lähenemist anarhokapitalistlikust lähenemisest riigi funktsioonide osas?
answer: Minarhistid toetavad minimaalset riiki, mis piirdub politsei, õigusemõistmise ja kaitsega, samas kui anarhokapitalistid soovivad kõigi riigi funktsioonide täielikku erastamist
wrong_answers:
  - Minarhistid lükkavad tagasi kõik valitsemise vormid, samas kui anarhokapitalistid toetavad reguleeritud turge, millel on mõningane riiklik sekkumine
  - Minarhistid pooldavad tugevat majanduslikku reguleerimist, samas kui anarhokapitalistid toetavad ainult sotsiaalseid vabadusi ilma majandusliku vabaduseta
  - Minarhistid toetavad demokraatlikku sotsialismi, samas kui anarhokapitalistid pooldavad korporatiivse kontrolli all olevaid valitsusasutusi
explanation: |
  Peatükis eristatakse selgelt need kaks libertaarset suundumust: minarhistid usuvad minimaalsesse "öövalvurriiki", mis täidab ainult põhifunktsioone (politsei, õigusemõistmine, relvastatud kaitse), samas kui anarhokapitalistid tahavad riigi täielikult kaotada, erastades isegi need põhifunktsioonid turumehhanismide abil.
  Mõlemad jagavad individuaalse suveräänsuse aluspõhimõtet, kuid erinevad selles, kas riigi mis tahes roll on legitiimne. Väärad vastused esitavad neid seisukohti vääralt, viidates regulatsiooni, sotsialismi või ettevõtete kontrolli toetamisele, mis on vastuolus individuaalse vabaduse ja vabatahtliku vahetuse libertaarsete põhimõtetega.
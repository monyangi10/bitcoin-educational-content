question: Что отличает минархо-либертарианский подход от анархо-капиталистического подхода в отношении функций государства?
answer: Минархисты поддерживают минимальное государство, ограничивающееся полицией, правосудием и обороной, в то время как анархо-капиталисты хотят полной приватизации всех государственных функций
wrong_answers:
  - Минархисты отвергают все формы правления, в то время как анархо-капиталисты поддерживают регулируемые рынки с некоторым вмешательством государства
  - Минархисты выступают за сильное регулирование экономики, в то время как анархо-капиталисты поддерживают только социальные свободы без экономической свободы
  - Минархисты поддерживают демократический социализм, в то время как анархо-капиталисты выступают за государственные институты, контролируемые корпорациями
explanation: |
  В главе четко разграничиваются эти два либертарианских направления: минархисты верят в минимальное "государство-ночной сторож", выполняющее только основные функции (полиция, правосудие, вооруженная оборона), а анархо-капиталисты хотят полностью ликвидировать государство, приватизировав даже эти основные функции с помощью рыночных механизмов.
  И те, и другие разделяют основополагающий принцип индивидуального суверенитета, но расходятся во мнениях о том, насколько легитимна любая роль государства. Неправильные ответы искажают эти позиции, предполагая поддержку регулирования, социализма или корпоративного контроля, что противоречит либертарианским принципам индивидуальной свободы и добровольного обмена.
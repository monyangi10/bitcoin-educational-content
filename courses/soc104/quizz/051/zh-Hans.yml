question: 在国家职能方面，无政府主义自由主义方法与无政府资本主义方法的区别是什么？
answer: 无政府主义者支持仅限于警察、司法和国防的最小国家，而无政府资本主义者则希望将所有国家职能完全私有化。
wrong_answers:
  - 无政府主义者反对一切形式的政府，而无政府资本主义者则支持有国家干预的规范市场。
  - 无政府主义者支持强有力的经济监管，而无政府资本主义者只支持社会自由，不支持经济自由
  - 无政府主义者支持民主社会主义，而无政府资本主义者则主张由企业控制政府机构
explanation: |
  本章明确区分了这两种自由主义倾向：无政府主义者相信有一个最低限度的 "守夜人国家"，只履行基本职能（警察、司法、武装防卫），而无政府资本主义者则希望通过市场机制将这些核心职能私有化，从而彻底消除国家。
  两者都认同个人主权的基本原则，但在国家的任何作用是否合法的问题上存在分歧。错误答案歪曲了这些立场，暗示支持监管、社会主义或企业控制，这与自由主义的个人自由和自愿交换原则相悖。
question: Điều gì phân biệt cách tiếp cận theo chủ nghĩa tự do tối thiểu (minarchist libertarian) với cách tiếp cận theo chủ nghĩa vô chính phủ tư bản (anarcho-capitalist) về chức năng nhà nước?
answer: Những người theo chủ nghĩa nhà nước tối thiểu ủng hộ một nhà nước chỉ giới hạn ở cảnh sát, tư pháp và quốc phòng, trong khi những người theo chủ nghĩa vô chính phủ tư bản muốn tư nhân hóa hoàn toàn tất cả các chức năng của nhà nước.
wrong_answers:
  - Những người theo chủ nghĩa nhà nước tối thiểu bác bỏ mọi hình thức chính phủ, trong khi những người theo chủ nghĩa tư bản vô chính phủ ủng hộ thị trường được điều tiết với một số can thiệp của nhà nước.
  - Những người theo chủ nghĩa nhà nước tối thiểu ủng hộ việc điều tiết kinh tế mạnh mẽ, trong khi những người theo chủ nghĩa vô chính phủ tư bản chỉ ủng hộ các quyền tự do xã hội mà không có tự do kinh tế.
  - Những người theo chủ nghĩa nhà nước tối thiểu ủng hộ chủ nghĩa xã hội dân chủ, trong khi những người theo chủ nghĩa vô chính phủ tư bản chủ trương các thể chế chính phủ do doanh nghiệp kiểm soát.
explanation: |
  Chương này phân biệt rõ ràng hai xu hướng tự do chủ nghĩa này: những người theo chủ nghĩa nhà nước tối thiểu tin vào một "nhà nước canh gác đêm" tối thiểu chỉ thực hiện các chức năng thiết yếu (cảnh sát, tư pháp, quốc phòng), trong khi những người theo chủ nghĩa vô chính phủ tư bản muốn loại bỏ hoàn toàn nhà nước bằng cách tư nhân hóa ngay cả những chức năng cốt lõi này thông qua cơ chế thị trường.
  
  Cả hai đều chia sẻ nguyên tắc cơ bản về chủ quyền cá nhân nhưng khác nhau về việc liệu bất kỳ vai trò nào của nhà nước là hợp pháp hay không. Các câu trả lời sai đã xuyên tạc các quan điểm này bằng cách đề xuất ủng hộ quy định, chủ nghĩa xã hội hoặc sự kiểm soát của doanh nghiệp, điều này mâu thuẫn với các nguyên tắc tự do chủ nghĩa về tự do cá nhân và trao đổi tự nguyện.
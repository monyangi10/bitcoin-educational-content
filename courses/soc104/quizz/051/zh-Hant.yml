question: 在國家功能方面，無政府主義的自由主義方法與無政府資本主義方法有何差異？
answer: 無政府主義者支持僅限於警察、司法和國防的最小國家，而無政府資本主義者則希望所有國家功能完全私有化。
wrong_answers:
  - 無政府主義者拒絕一切形式的政府，而無政府資本主義者則支持受規範的市場，並有一些國家干預。
  - 無政府主義者贊成強力的經濟規範，而無政府資本主義者只支持社會自由，不支持經濟自由。
  - 無政府主義者支持民主社會主義，而無政府資本主義者主張企業控制政府機構
explanation: |
  本章清楚區分了這兩種自由主義的傾向：無政府主義者相信一個最低限度的「守夜人國家」，只執行基本的功能（警察、司法、武裝防衛），而無政府資本主義者則希望透過市場機制，甚至將這些核心功能私有化，從而完全消除國家。
  兩者都認同個人主權的基本原則，但對於任何國家角色是否合法則有不同的看法。錯誤的答案歪曲了這些立場，暗示支持管制、社會主義或公司控制，這與個人自由和自願交換的自由主義原則相矛盾。
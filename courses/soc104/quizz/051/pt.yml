question: O que distingue a abordagem libertária minarquista da abordagem anarco-capitalista no que respeita às funções do Estado?
answer: Os minarquistas defendem um Estado mínimo limitado à polícia, à justiça e à defesa, enquanto os anarco-capitalistas querem a privatização total de todas as funções do Estado
wrong_answers:
  - Os minarquistas rejeitam todas as formas de governo, enquanto os anarco-capitalistas apoiam mercados regulados com alguma intervenção do Estado
  - Os minarquistas defendem uma forte regulamentação económica, enquanto os anarco-capitalistas apenas apoiam as liberdades sociais sem liberdade económica
  - Os minarquistas apoiam o socialismo democrático, enquanto os anarco-capitalistas defendem instituições governamentais controladas pelas empresas
explanation: |
  O capítulo distingue claramente estas duas tendências libertárias: os minarquistas acreditam num "Estado guarda-noturno" mínimo que apenas desempenha funções essenciais (polícia, justiça, defesa armada), enquanto os anarco-capitalistas querem eliminar totalmente o Estado, privatizando mesmo estas funções essenciais através de mecanismos de mercado.
  Ambos partilham o princípio fundamental da soberania individual, mas divergem quanto à legitimidade de qualquer papel do Estado. As respostas erradas deturpam estas posições, sugerindo apoio à regulamentação, ao socialismo ou ao controlo das empresas, o que contradiz os princípios libertários da liberdade individual e da troca voluntária.
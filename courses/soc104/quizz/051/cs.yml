question: Čím se libertariánský minarchistický přístup liší od anarchokapitalistického, pokud jde o funkce státu?
answer: Minarchisté podporují minimální stát omezený na policii, soudnictví a obranu, zatímco anarchokapitalisté chtějí úplnou privatizaci všech funkcí státu
wrong_answers:
  - Minarchisté odmítají všechny formy vlády, zatímco anarchokapitalisté podporují regulované trhy s určitými zásahy státu
  - Minarchisté podporují silnou ekonomickou regulaci, zatímco anarchokapitalisté pouze sociální svobody bez ekonomické svobody
  - Minarchisté podporují demokratický socialismus, zatímco anarchokapitalisté prosazují vládní instituce kontrolované korporacemi
explanation: |
  Kapitola jasně rozlišuje tyto dvě libertariánské tendence: minarchisté věří v minimální "stát nočního hlídače", který by plnil pouze základní funkce (policie, justice, ozbrojená obrana), zatímco anarchokapitalisté chtějí stát zcela eliminovat tím, že i tyto základní funkce zprivatizují prostřednictvím tržních mechanismů.
  Oba sdílejí základní princip suverenity jednotlivce, ale liší se v názoru na to, zda je nějaká role státu legitimní. Špatné odpovědi tyto postoje zkreslují tím, že naznačují podporu regulací, socialismu nebo kontroly podniků, což je v rozporu s libertariánskými principy svobody jednotlivce a dobrovolné směny.
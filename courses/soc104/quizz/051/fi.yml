question: Mikä erottaa minarkistisen libertaristisen lähestymistavan anarkokapitalistisesta lähestymistavasta valtion tehtävien osalta?
answer: Minarkistit kannattavat minimaalista valtiota, joka rajoittuu poliisiin, oikeuteen ja puolustukseen, kun taas anarkokapitalistit haluavat kaikkien valtion toimintojen täydellisen yksityistämisen
wrong_answers:
  - Minarkistit hylkäävät kaikenlaisen hallinnon, kun taas anarkokapitalistit kannattavat säänneltyjä markkinoita, joihin valtio puuttuu jonkin verran
  - Minarkistit kannattavat vahvaa taloudellista sääntelyä, kun taas anarkokapitalistit kannattavat vain sosiaalisia vapauksia ilman taloudellista vapautta
  - Minarkistit kannattavat demokraattista sosialismia, kun taas anarkokapitalistit kannattavat yritysten valvomia hallintoelimiä
explanation: |
  Luvussa erotetaan selvästi nämä kaksi libertaristista suuntausta: minarkistit uskovat minimaaliseen "yövartijavaltioon", joka hoitaa vain välttämättömät tehtävät (poliisi, oikeuslaitos, aseellinen puolustus), kun taas anarkokapitalistit haluavat poistaa valtion kokonaan yksityistämällä jopa nämä ydintoiminnot markkinamekanismien avulla.
  Molemmat jakavat yksilön suvereniteetin perusperiaatteen, mutta eroavat toisistaan siinä, onko mikään valtion rooli oikeutettu. Väärät vastaukset vääristelevät näitä kantoja antamalla ymmärtää, että ne tukevat sääntelyä, sosialismia tai yritysten valvontaa, mikä on ristiriidassa yksilönvapautta ja vapaaehtoista vaihtoa koskevien libertarististen periaatteiden kanssa.
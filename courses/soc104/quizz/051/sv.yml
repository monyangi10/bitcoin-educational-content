question: Vad skiljer det minarkistiska libertarianska synsättet från det anarko-kapitalistiska synsättet när det gäller statens funktioner?
answer: Minarkister förespråkar en minimal stat begränsad till polis, rättsväsende och försvar medan anarkokapitalister vill ha en fullständig privatisering av alla statliga funktioner
wrong_answers:
  - Minarkister förkastar alla former av regeringar medan anarkokapitalister stöder reglerade marknader med viss statlig inblandning
  - Minarkister förespråkar stark ekonomisk reglering medan anarkokapitalister endast stöder sociala friheter utan ekonomisk frihet
  - Minarkister stöder demokratisk socialism medan anarkokapitalister förespråkar företagskontrollerade statliga institutioner
explanation: |
  Kapitlet skiljer tydligt mellan dessa två libertarianska tendenser: minarkister tror på en minimal "nattväktarstat" som endast utför väsentliga funktioner (polis, rättsväsende, väpnat försvar), medan anarkokapitalister vill eliminera staten helt genom att privatisera även dessa kärnfunktioner genom marknadsmekanismer.
  Båda delar den grundläggande principen om individens suveränitet, men har olika syn på om någon statlig roll är legitim. Fel svar ger en felaktig bild av dessa ståndpunkter genom att antyda stöd för reglering, socialism eller företagskontroll, vilket strider mot libertarianska principer om individuell frihet och frivilligt utbyte.
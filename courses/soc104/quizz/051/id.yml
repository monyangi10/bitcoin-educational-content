question: Apa perbedaan pendekatan libertarian minarkis dengan pendekatan anarko-kapitalis terkait fungsi negara?
answer: Kaum minarkis mendukung negara minimal yang terbatas pada polisi, peradilan, dan pertahanan, sementara kaum anarko-kapitalis menginginkan privatisasi penuh atas semua fungsi negara
wrong_answers:
  - Kaum minarkis menolak semua bentuk pemerintahan, sementara kaum anarko-kapitalis mendukung pasar yang diatur dengan beberapa intervensi negara
  - Kaum minarkis mendukung regulasi ekonomi yang kuat, sementara kaum anarko-kapitalis hanya mendukung kebebasan sosial tanpa kebebasan ekonomi
  - Kaum minarkis mendukung sosialisme demokratis, sementara kaum anarko-kapitalis mengadvokasi lembaga-lembaga pemerintah yang dikendalikan oleh perusahaan
explanation: |
  Bab ini dengan jelas membedakan dua kecenderungan libertarian ini: kaum minarkis percaya pada 'negara penjaga malam' minimal yang hanya menjalankan fungsi-fungsi esensial (polisi, peradilan, pertahanan bersenjata), sementara kaum anarko-kapitalis ingin menghapuskan negara sama sekali dengan menswastanisasi fungsi-fungsi inti ini melalui mekanisme pasar.
  Keduanya memiliki prinsip dasar yang sama yaitu kedaulatan individu, namun berbeda pendapat mengenai apakah peran negara itu sah. Jawaban yang salah akan salah menggambarkan posisi-posisi ini dengan menyarankan dukungan terhadap regulasi, sosialisme, atau kontrol korporasi, yang bertentangan dengan prinsip-prinsip libertarian tentang kebebasan individu dan pertukaran sukarela.

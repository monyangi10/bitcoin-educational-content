question: 국가 기능에 대한 군주주의적 자유주의 접근법과 무정부주의적 자본주의 접근법이 다른 점은 무엇인가요?
answer: 무정부주의자들은 경찰, 사법, 국방에 국한된 최소한의 국가를 지지하는 반면 무정부주의 자본가들은 모든 국가 기능의 완전한 민영화를 원합니다
wrong_answers:
  - 무정부주의자들은 모든 형태의 정부를 거부하는 반면, 무정부주의 자본가들은 일부 국가 개입을 통해 규제된 시장을 지지합니다
  - 민본주의자들은 강력한 경제 규제를 선호하는 반면 무정부주의자들은 경제적 자유가 없는 사회적 자유만을 지지합니다
  - 민나르키스트는 민주적 사회주의를 지지하고 무정부주의 자본가들은 기업이 통제하는 정부 기관을 옹호합니다
explanation: |
  이 장에서는 이 두 가지 자유주의적 경향을 명확하게 구분합니다. 군주주의자들은 경찰, 사법, 국방 등 필수 기능만 수행하는 최소한의 '야간 경비원 국가'를 믿는 반면, 아나코-자본주의자들은 시장 메커니즘을 통해 이러한 핵심 기능마저 민영화함으로써 국가를 완전히 없애고자 합니다.
  두 입장 모두 개인 주권이라는 기본 원칙은 공유하지만 국가의 역할이 정당한지에 대해서는 차이가 있습니다. 오답은 개인의 자유와 자발적 교환이라는 자유주의 원칙에 위배되는 규제, 사회주의 또는 기업 통제를 지지하는 것으로 이러한 입장을 잘못 표현하고 있습니다.
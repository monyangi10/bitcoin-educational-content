question: 国家機能に関して、無政府資本主義的アプローチと何が違うのか？
answer: 最小国家主義者は、警察、司法、防衛に限定した最小限の国家を支持し、無政府資本主義者は、すべての国家機能の完全な民営化を望んでいる。
wrong_answers:
  - 無政府資本主義者が国家の介入を伴う規制された市場を支持する一方で、無政府主義者はあらゆる形態の政府を否定する。
  - 無政府資本主義者が経済的自由を伴わない社会的自由のみを支持するのに対し、無政府主義者は強力な経済規制を支持する。
  - 無政府資本主義者が企業支配の政府機関を主張する一方で、無政府主義者は民主的社会主義を支持する。
explanation: |
  この章では、これら2つのリバタリアン的傾向を明確に区別している。ミニマリストは、必要不可欠な機能（警察、司法、武力防衛）だけを果たす最小限の「夜警国家」を信奉し、アナーコ・キャピタリストは、市場メカニズムを通じてこれらの中核機能さえも民営化することで、国家を完全に排除したいと考えている。
  どちらも個人主権という基本原則は共有しているが、国家の役割が合法的かどうかについては異なっている。間違った答えは、個人の自由と自発的な交換というリバタリアンの原則と矛盾する規制、社会主義、企業統制への支持を示唆し、これらの立場を誤って伝えている。
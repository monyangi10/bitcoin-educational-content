question: Cosa distingue l'approccio libertario minarchico da quello anarco-capitalista per quanto riguarda le funzioni dello Stato?
answer: I minarchici sostengono uno Stato minimo, limitato alla polizia, alla giustizia e alla difesa, mentre gli anarcocapitalisti vogliono la completa privatizzazione di tutte le funzioni statali
wrong_answers:
  - I minarchici rifiutano ogni forma di governo, mentre gli anarcocapitalisti sostengono i mercati regolamentati con un certo intervento dello Stato
  - I minarchici sono favorevoli a una forte regolamentazione economica, mentre gli anarcocapitalisti sostengono solo le libertà sociali senza la libertà economica
  - I minarchici sostengono il socialismo democratico, mentre gli anarcocapitalisti sono a favore di istituzioni governative controllate dalle imprese
explanation: |
  Il capitolo distingue chiaramente queste due tendenze libertarie: i minarchici credono in uno Stato minimo "guardiano notturno" che svolga solo le funzioni essenziali (polizia, giustizia, difesa armata), mentre gli anarcocapitalisti vogliono eliminare del tutto lo Stato privatizzando anche queste funzioni fondamentali attraverso meccanismi di mercato.
  Entrambi condividono il principio fondamentale della sovranità individuale, ma differiscono sulla legittimità del ruolo dello Stato. Le risposte sbagliate travisano queste posizioni, suggerendo un sostegno alla regolamentazione, al socialismo o al controllo delle imprese, che contraddice i principi libertari della libertà individuale e dello scambio volontario.
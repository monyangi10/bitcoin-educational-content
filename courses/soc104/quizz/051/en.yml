question: What distinguishes the minarchist libertarian approach from the anarcho-capitalist approach regarding state functions?
answer: Minarchists support minimal state limited to police, justice and defense while anarcho-capitalists want complete privatization of all state functions
wrong_answers:
  - Minarchists reject all forms of government while anarcho-capitalists support regulated markets with some state intervention
  - Minarchists favor strong economic regulation while anarcho-capitalists only support social freedoms without economic liberty
  - Minarchists support democratic socialism while anarcho-capitalists advocate for corporate-controlled government institutions
explanation: |
  The chapter clearly distinguishes these two libertarian tendencies: minarchists believe in a minimal 'night-watchman state' that only performs essential functions (police, justice, armed defense), while anarcho-capitalists want to eliminate the state entirely by privatizing even these core functions through market mechanisms. Both share the fundamental principle of individual sovereignty but differ on whether any state role is legitimate. The wrong answers misrepresent these positions by suggesting support for regulation, socialism, or corporate control, which contradicts libertarian principles of individual freedom and voluntary exchange.
question: Šta razlikuje minarhistički libertarijanski pristup od anarho-kapitalističkog pristupa u pogledu funkcija države?
answer: Minarhisti podržavaju minimalnu državu ograničenu na policiju, pravosuđe i odbranu, dok anarho-kapitalisti žele potpunu privatizaciju svih državnih funkcija.
wrong_answers:
  - Minarhisti odbacuju sve oblike vlade dok anarho-kapitalisti podržavaju regulisana tržišta uz određenu državnu intervenciju
  - Minarhisti favorizuju snažnu ekonomsku regulaciju, dok anarho-kapitalisti podržavaju samo socijalne slobode bez ekonomske slobode.
  - Minarhisti podržavaju demokratski socijalizam dok se anarho-kapitalisti zalažu za korporativno kontrolisane vladine institucije
explanation: |
  Poglavlje jasno razlikuje ove dve libertarijanske tendencije: minarhisti veruju u minimalnu 'državu noćnog čuvara' koja obavlja samo osnovne funkcije (policija, pravda, oružana odbrana), dok anarho-kapitalisti žele potpuno eliminisanje države privatizacijom čak i ovih osnovnih funkcija putem tržišnih mehanizama.
  Obe dele fundamentalni princip individualnog suvereniteta, ali se razlikuju po pitanju da li je bilo kakva uloga države legitimna. Pogrešni odgovori pogrešno predstavljaju ove pozicije sugerišući podršku regulaciji, socijalizmu ili korporativnoj kontroli, što je u suprotnosti sa libertarijanskim principima individualne slobode i dobrovoljne razmene.
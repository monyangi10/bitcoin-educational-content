question: چه چیزی رویکرد لیبرترین مینارشیست را از رویکرد آنارکو-کاپیتالیست در مورد وظایف دولت متمایز می‌کند؟
answer: مینارشیست‌ها از یک دولت حداقلی که به پلیس، عدالت و دفاع محدود می‌شود حمایت می‌کنند، در حالی که آنارکو-کاپیتالیست‌ها خواهان خصوصی‌سازی کامل تمام وظایف دولتی هستند.
wrong_answers:
  - مینارشیست‌ها همه اشکال حکومت را رد می‌کنند، در حالی که آنارکو-کاپیتالیست‌ها از بازارهای تنظیم‌شده با مقداری مداخله دولتی حمایت می‌کنند.
  - مینارشیست‌ها طرفدار مقررات اقتصادی قوی هستند در حالی که آنارکو-کاپیتالیست‌ها تنها از آزادی‌های اجتماعی بدون آزادی اقتصادی حمایت می‌کنند.
  - مینارشیست‌ها از سوسیالیسم دموکراتیک حمایت می‌کنند در حالی که آنارکو-کاپیتالیست‌ها از نهادهای دولتی تحت کنترل شرکت‌ها حمایت می‌کنند.
explanation: |
  این فصل به وضوح این دو گرایش لیبرترین را از هم متمایز می‌کند: مینارشیست‌ها به یک "دولت نگهبان شب" حداقلی باور دارند که تنها وظایف اساسی (پلیس، عدالت، دفاع مسلحانه) را انجام می‌دهد، در حالی که آنارکو-کاپیتالیست‌ها می‌خواهند با خصوصی‌سازی حتی این وظایف اصلی از طریق مکانیزم‌های بازار، دولت را به‌طور کامل حذف کنند.
  هر دو اصل بنیادی حاکمیت فردی را به اشتراک می‌گذارند اما در مورد اینکه آیا هر نقشی برای دولت مشروع است یا خیر، اختلاف نظر دارند. پاسخ‌های نادرست این مواضع را با پیشنهاد حمایت از مقررات، سوسیالیسم یا کنترل شرکتی که با اصول لیبرترین آزادی فردی و تبادل داوطلبانه در تضاد است، نادرست نشان می‌دهند.
question: ¿Qué distingue al planteamiento libertario minarquista del planteamiento anarcocapitalista en lo que respecta a las funciones del Estado?
answer: Los minarquistas apoyan un Estado mínimo limitado a la policía, la justicia y la defensa, mientras que los anarcocapitalistas quieren la privatización completa de todas las funciones del Estado
wrong_answers:
  - Los minarquistas rechazan toda forma de gobierno, mientras que los anarcocapitalistas apoyan los mercados regulados con cierta intervención estatal
  - Los minarquistas están a favor de una fuerte regulación económica, mientras que los anarcocapitalistas sólo apoyan las libertades sociales sin libertad económica
  - Los minarquistas apoyan el socialismo democrático, mientras que los anarcocapitalistas abogan por instituciones gubernamentales controladas por las empresas
explanation: |
  El capítulo distingue claramente estas dos tendencias libertarias: los minarquistas creen en un "Estado vigilante" mínimo que sólo desempeñe funciones esenciales (policía, justicia, defensa armada), mientras que los anarcocapitalistas quieren eliminar el Estado por completo privatizando incluso estas funciones básicas mediante mecanismos de mercado.
  Ambos comparten el principio fundamental de la soberanía individual, pero difieren sobre la legitimidad de cualquier función estatal. Las respuestas incorrectas tergiversan estas posturas sugiriendo el apoyo a la regulación, el socialismo o el control corporativo, lo que contradice los principios libertarios de libertad individual e intercambio voluntario.
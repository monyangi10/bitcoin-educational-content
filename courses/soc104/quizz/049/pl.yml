question: Jaka fundamentalna zasada filozoficzna odróżnia tradycyjny amerykański konserwatyzm od innych ideologii politycznych?
answer: Koncepcja uporządkowanej wolności, która stara się zrównoważyć wolność jednostki z odpowiedzialnością społeczności i ograniczonym rządem
wrong_answers:
  - Zasada nieograniczonej wolności jednostki w połączeniu z maksymalną interwencją rządu w sprawy społeczne
  - Wiara w rewolucyjne zmiany mające na celu przywrócenie feudalnego społeczeństwa rolniczego i odrzucenie wszelkiego postępu technologicznego
  - Doktryna interwencjonizmu wojskowego mająca na celu szerzenie demokracji na całym świecie poprzez wojnę prewencyjną
explanation: |
  Tradycyjny amerykański konserwatyzm opiera się zasadniczo na "uporządkowanej wolności", która próbuje pogodzić czasami sprzeczne aspiracje społeczności i indywidualnych potrzeb, osobistej wolności i odpowiedzialności oraz ograniczonego rządu z wolnymi rynkami.
  Błędne odpowiedzi reprezentują albo sprzeczne zasady (nieograniczona wolność z maksymalną interwencją), europejski reakcyjny konserwatyzm (restauracja feudalna) lub ideologię neokonserwatywną (interwencjonizm wojskowy), a nie zrównoważone podejście, które definiuje tradycyjną amerykańską myśl konserwatywną.
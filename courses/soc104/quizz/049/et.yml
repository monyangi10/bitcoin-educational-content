question: Milline filosoofiline aluspõhimõte eristab traditsioonilist Ameerika konservatismi teistest poliitilistest ideoloogiatest?
answer: Korrastatud vabaduse kontseptsioon, mis püüab tasakaalustada individuaalset vabadust, kogukonna vastutust ja piiratud valitsemist
wrong_answers:
  - Piiramatu individuaalse vabaduse põhimõte koos valitsuse maksimaalse sekkumisega sotsiaalsetesse küsimustesse
  - Usk revolutsioonilistesse muutustesse, et taastada feodaalne põllumajandusühiskond ja lükata tagasi igasugune tehnoloogiline areng
  - Sõjalise sekkumise doktriin, et levitada demokraatiat kogu maailmas ennetava sõjapidamise kaudu
explanation: |
  Traditsiooniline Ameerika konservatism põhineb põhimõtteliselt "korrastatud vabadusel", mis püüab ühitada mõnikord vastuolulisi püüdlusi kogukonna ja üksikisiku vajaduste, isikliku vabaduse ja vastutuse ning piiratud valitsuse ja vabade turgude vahel.
  Valed vastused esindavad kas vastuolulisi põhimõtteid (piiramatu vabadus koos maksimaalse sekkumisega), Euroopa reaktsioonilist konservatismi (feodaalne restaureerimine) või neokonservatiivset ideoloogiat (sõjaline sekkumine), mitte aga tasakaalustatud lähenemist, mis määratleb traditsioonilist Ameerika konservatiivset mõtlemist.
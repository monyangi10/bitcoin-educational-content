question: Ni kanuni gani ya msingi ya kifalsafa inayotofautisha uhafidhina wa jadi wa Marekani na itikadi zingine za kisiasa?
answer: Dhana ya uhuru uliopangwa, ambayo inatafuta kusawazisha uhuru wa mtu binafsi na uwajibikaji wa jamii na serikali yenye mipaka
wrong_answers:
  - Kanuni ya uhuru wa mtu binafsi usio na kikomo pamoja na uingiliaji kati wa serikali katika masuala ya kijamii kwa kiwango cha juu zaidi
  - Imani katika mabadiliko ya mapinduzi ili kurejesha jamii ya kilimo ya kibepari na kukataa maendeleo yote ya kiteknolojia
  - Mafundisho ya uingiliaji kati wa kijeshi ili kueneza demokrasia duniani kote kupitia vita vya kabla ya kuangamiza
explanation: |
  Uhafidhina wa jadi wa Marekani kimsingi unategemea 'uhuru uliopangwa,' ambao hujaribu kupatanisha matarajio ambayo wakati mwingine yanapingana ya mahitaji ya jamii na ya mtu binafsi, uhuru na uwajibikaji wa kibinafsi, na serikali yenye mipaka yenye masoko huria.
  
  Majibu yasiyo sahihi yanawakilisha kanuni zinazopingana (uhuru usio na kikomo wenye uingiliaji kati wa kiwango cha juu), uhafidhina wa kimapinduzi wa Ulaya (urejesho wa kimwinyi), au itikadi ya kihafidhina mamboleo (uingiliaji kati wa kijeshi) badala ya mbinu iliyosawazishwa inayofafanua mawazo ya kitamaduni ya kihafidhina ya Marekani.
question: چه اصل فلسفی بنیادی، محافظه‌کاری سنتی آمریکایی را از دیگر ایدئولوژی‌های سیاسی متمایز می‌کند؟
answer: مفهوم آزادی منظم، که به دنبال ایجاد تعادل بین آزادی فردی با مسئولیت اجتماعی و دولت محدود است
wrong_answers:
  - اصل آزادی فردی نامحدود همراه با حداکثر مداخله دولت در امور اجتماعی
  - باور به تغییر انقلابی برای بازگرداندن جامعه کشاورزی فئودالی و رد هرگونه پیشرفت تکنولوژیکی
  - دکترین مداخله نظامی برای گسترش دموکراسی در سراسر جهان از طریق جنگ پیشگیرانه
explanation: |
  محافظه‌کاری سنتی آمریکایی اساساً بر پایه 'آزادی منظم' استوار است، که تلاش می‌کند آرزوهای گاه متناقض جامعه و نیازهای فردی، آزادی و مسئولیت شخصی، و دولت محدود با بازارهای آزاد را با هم آشتی دهد.  
  پاسخ‌های نادرست نمایانگر اصول متناقض (آزادی نامحدود با حداکثر مداخله)، محافظه‌کاری واکنشی اروپایی (بازگرداندن نظام فئودالی)، یا ایدئولوژی نئومحافظه‌کاری (مداخله نظامی) هستند، نه رویکرد متعادلی که تفکر محافظه‌کاری سنتی آمریکایی را تعریف می‌کند.
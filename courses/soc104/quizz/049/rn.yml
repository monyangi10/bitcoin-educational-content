question: Ni ingingo ngenderwako iyihe y’ishimikiro yo muri filozofiya itandukanya ivyiyumviro vya kera vy’Abanyamerika n’ibindi vyiyumviro vya politike?
answer: Iciyumviro c’umwidegemvyo utegekanijwe, kirondera guhuza umwidegemvyo w’umuntu ku giti ciwe n’inshingano z’abanyagihugu be n’ubutegetsi bufise aho bugarukira .
wrong_answers:
  - Ingingo ngenderwako y'umwidegemvyo w'umuntu ku giti ciwe udafise aho ugarukira ifatanijwe n'ukwinjira kwa Leta mu bibazo vy'imibano
  - Ukwemera ihinduka ry'impinduka ryo gusubizaho igihugu c'uburimyi c'abanyagihugu no kwanka iterambere ryose ry'ubuhinga
  - Inyigisho y'uko igisirikare gishobora gukwiragiza demokarasi kw'isi yose biciye mu ntambara y'imbere y'igihe
explanation: |
  Ubuhinga bwa kera bw’Abanyamerika bushingiye ahanini ku ‘mwidegemvyo utunganijwe,’ ugerageza guhuza ivyipfuzo rimwe na rimwe bivuguruzanya vy’abanyagihugu n’ivy’umuntu ku giti ciwe, umwidegemvyo n’inshingano z’umuntu ku giti ciwe, n’intwaro ifise aho igarukira n’amasoko yidegemvya.
  Inyishu zitari zo zigereranya ingingo ngenderwako zivuguruzanya (umwidegemvyo utagira aho ugarukira n’ugufasha cane), uburenganzira bw’abanyaburaya bwo gusubira inyuma (ugusubizaho ubutegetsi bw’abanyagihugu), canke ingengabitekerezo nshasha y’ubuhinga (uburenganzira bw’igisirikare) aho gusobanura uburyo buringaniye busobanura ivyiyumviro vy’ubuhinga bwa kera vy’Abanyamerika.
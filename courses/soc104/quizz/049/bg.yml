question: Кой фундаментален философски принцип отличава традиционния американски консерватизъм от другите политически идеологии?
answer: Концепцията за организираната свобода, която се стреми да балансира индивидуалната свобода с отговорността на общността и ограниченото управление
wrong_answers:
  - Принципът на неограничена индивидуална свобода, съчетан с максимална държавна намеса в социалната сфера
  - Вярата в революционната промяна за възстановяване на феодалното земеделско общество и отхвърляне на всякакъв технологичен напредък
  - Доктрината за военна интервенция с цел разпространение на демокрацията по света чрез превантивна война
explanation: |
  Традиционният американски консерватизъм в основата си се основава на "подредената свобода", която се опитва да съчетае понякога противоречивите стремежи на общността и индивидуалните потребности, личната свобода и отговорност, ограниченото правителство и свободните пазари.
  Грешните отговори представляват или противоречиви принципи (неограничена свобода с максимална намеса), или европейски реакционен консерватизъм (феодална реставрация), или неоконсервативна идеология (военен интервенционизъм), а не балансирания подход, който определя традиционната американска консервативна мисъл.
question: 伝統的なアメリカの保守主義と他の政治イデオロギーとを区別する基本的な哲学的原理とは何か？
answer: 秩序ある自由という概念は、個人の自由と共同体の責任および制限された政府とのバランスを追求するものである。
wrong_answers:
  - 個人の無制限の自由と、社会問題への政府の最大限の介入を組み合わせた原則
  - 封建的な農耕社会を復活させ、あらゆる技術進歩を拒否する革命的変革の信念
  - 先制攻撃によって民主主義を世界に広める軍事介入主義のドクトリン。
explanation: |
  伝統的なアメリカの保守主義は、基本的に「秩序ある自由」に基づいており、共同体と個人のニーズ、個人の自由と責任、制限された政府と自由市場という、時に矛盾する願望を調和させようとするものである。
  間違った答えは、伝統的なアメリカの保守思想を定義するバランスの取れたアプローチではなく、矛盾した原則（最大限の介入を伴う無制限の自由）、ヨーロッパの反動的保守主義（封建的復古主義）、新保守主義イデオロギー（軍事介入主義）のいずれかを表している。
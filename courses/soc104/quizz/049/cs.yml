question: Jaký základní filozofický princip odlišuje tradiční americký konzervatismus od jiných politických ideologií?
answer: Koncepce uspořádané svobody, která se snaží najít rovnováhu mezi svobodou jednotlivce a odpovědností společnosti a omezenou vládou
wrong_answers:
  - Princip neomezené svobody jednotlivce v kombinaci s maximálními zásahy státu do sociálních záležitostí
  - Víra v revoluční změnu, která má obnovit feudální zemědělskou společnost a odmítnout veškerý technologický pokrok
  - Doktrína vojenského intervencionismu s cílem šířit demokracii po celém světě prostřednictvím preventivní války
explanation: |
  Tradiční americký konzervatismus je v zásadě založen na "uspořádané svobodě", která se snaží sladit někdy protichůdné snahy o naplnění potřeb společnosti a jednotlivce, osobní svobodu a odpovědnost a omezenou vládu s volným trhem.
  Špatné odpovědi představují buď protichůdné principy (neomezená svoboda s maximálními zásahy), evropský reakční konzervatismus (restaurace feudalismu), nebo neokonzervativní ideologii (vojenský intervencionismus), nikoli vyvážený přístup, který definuje tradiční americké konzervativní myšlení.
question: 美国传统保守主义区别于其他政治意识形态的基本哲学原则是什么？
answer: 有序自由的概念，寻求个人自由与社区责任和有限政府之间的平衡
wrong_answers:
  - 个人无限自由与政府最大限度干预社会事务相结合的原则
  - 信奉革命变革，恢复封建农业社会，拒绝一切技术进步
  - 通过先发制人的战争在世界范围内传播民主的军事干预主义理论
explanation: |
  美国传统保守主义的根本基础是 "有序自由"，它试图调和社区与个人需求、个人自由与责任、有限政府与自由市场这些有时相互矛盾的愿望。
  错误答案要么代表了相互矛盾的原则（最大限度干预的无限自由），要么代表了欧洲反动保守主义（封建复辟），要么代表了新保守主义意识形态（军事干预主义），而不是定义传统美国保守主义思想的平衡方法。
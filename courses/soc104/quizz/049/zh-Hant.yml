question: 傳統美國保守主義與其他政治意識形態的區別在於什麼基本哲學原則？
answer: 有秩序自由的概念，尋求個人自由與社區責任和有限政府之間的平衡
wrong_answers:
  - 無限制個人自由的原則，結合政府對社會事務的最大干預
  - 信奉革命變革，恢復封建農業社會，拒絕一切科技進步
  - 透過先發制人的戰爭，在全球散播民主的軍事干預主義理論
explanation: |
  傳統的美國保守主義根本上以「有秩序的自由」為基礎，試圖調和社區與個人需求、個人自由與責任、有限政府與自由市場等有時相互矛盾的訴求。
  錯誤的答案所代表的不是自相矛盾的原則 (無限制的自由與最大程度的干預)、歐洲反動保守主義 (封建復辟)，就是新保守主義的意識形態 (軍事干預主義)，而不是定義傳統美國保守主義思想的平衡方法。
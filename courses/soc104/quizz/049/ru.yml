question: Какой фундаментальный философский принцип отличает традиционный американский консерватизм от других политических идеологий?
answer: Концепция упорядоченной свободы, которая стремится сбалансировать индивидуальную свободу с ответственностью перед обществом и ограниченным правительством
wrong_answers:
  - Принцип неограниченной свободы личности в сочетании с максимальным вмешательством государства в социальные дела
  - Вера в революционные изменения, направленные на восстановление феодального аграрного общества и отказ от любого технического прогресса
  - Доктрина военного интервенционизма, направленная на распространение демократии по всему миру путем ведения упреждающей войны
explanation: |
  Традиционный американский консерватизм в своей основе базируется на "упорядоченной свободе", которая пытается примирить порой противоречивые устремления общества и индивидуальных потребностей, личной свободы и ответственности, ограниченного правительства и свободных рынков.
  Неправильные ответы представляют собой либо противоречивые принципы (неограниченная свобода с максимальным вмешательством), либо европейский реакционный консерватизм (феодальная реставрация), либо неоконсервативную идеологию (военный интервенционизм), а не сбалансированный подход, определяющий традиционную американскую консервативную мысль.
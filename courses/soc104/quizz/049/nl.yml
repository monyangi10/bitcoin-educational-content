question: Welk fundamenteel filosofisch principe onderscheidt het traditionele Amerikaanse conservatisme van andere politieke ideologieën?
answer: Het concept van geordende vrijheid, dat streeft naar een evenwicht tussen individuele vrijheid, gemeenschapsverantwoordelijkheid en beperkte overheid
wrong_answers:
  - Het principe van onbeperkte individuele vrijheid in combinatie met maximale overheidsbemoeienis met sociale zaken
  - Het geloof in revolutionaire verandering om de feodale landbouwmaatschappij te herstellen en alle technologische vooruitgang af te wijzen
  - De doctrine van militair interventionisme om democratie wereldwijd te verspreiden door middel van preventieve oorlogsvoering
explanation: |
  Traditioneel Amerikaans conservatisme is fundamenteel gebaseerd op 'geordende vrijheid', die de soms tegenstrijdige aspiraties van gemeenschap en individuele behoeften, persoonlijke vrijheid en verantwoordelijkheid, en beperkte overheid met vrije markten met elkaar probeert te verzoenen.
  De foute antwoorden vertegenwoordigen ofwel tegenstrijdige principes (onbeperkte vrijheid met maximale interventie), Europees reactionair conservatisme (feodaal herstel) of neoconservatieve ideologie (militair interventionisme) in plaats van de evenwichtige benadering die het traditionele Amerikaanse conservatieve gedachtegoed definieert.
question: Prinsip filosofis mendasar apa yang membedakan konservatisme tradisional Amerika dengan ideologi politik lainnya?
answer: Konsep kebebasan yang tertata, yang berusaha menyeimbangkan kebebasan individu dengan tanggung jawab masyarakat dan pemerintah yang terbatas
wrong_answers:
  - Prinsip kebebasan individu yang tidak terbatas dikombinasikan dengan intervensi maksimum pemerintah dalam masalah sosial
  - Keyakinan akan perubahan revolusioner untuk memulihkan masyarakat pertanian feodal dan menolak semua kemajuan teknologi
  - Doktrin intervensionisme militer untuk menyebarkan demokrasi di seluruh dunia melalui perang preemptive
explanation: |
  Konservatisme tradisional Amerika pada dasarnya didasarkan pada 'kebebasan yang tertata', yang mencoba untuk mendamaikan aspirasi yang terkadang kontradiktif antara kebutuhan masyarakat dan individu, kebebasan dan tanggung jawab pribadi, dan pemerintahan yang terbatas dengan pasar bebas.
  Jawaban yang salah mewakili prinsip-prinsip yang kontradiktif (kebebasan tanpa batas dengan intervensi maksimum), konservatisme reaksioner Eropa (restorasi feodal), atau ideologi neokonservatif (intervensionisme militer), dan bukannya pendekatan yang seimbang yang mendefinisikan pemikiran konservatif tradisional Amerika.
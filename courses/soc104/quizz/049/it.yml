question: Quale principio filosofico fondamentale distingue il conservatorismo americano tradizionale dalle altre ideologie politiche?
answer: Il concetto di libertà ordinata, che cerca di bilanciare la libertà individuale con la responsabilità della comunità e con un governo limitato
wrong_answers:
  - Il principio della libertà individuale illimitata combinata con il massimo intervento del governo nelle questioni sociali
  - La convinzione di un cambiamento rivoluzionario per ripristinare la società agricola feudale e rifiutare ogni progresso tecnologico
  - La dottrina dell'interventismo militare per diffondere la democrazia nel mondo attraverso la guerra preventiva
explanation: |
  Il conservatorismo americano tradizionale si basa fondamentalmente sulla "libertà ordinata", che tenta di conciliare le aspirazioni, talvolta contraddittorie, della comunità e dei bisogni individuali, della libertà personale e della responsabilità, del governo limitato e del libero mercato.
  Le risposte sbagliate rappresentano principi contraddittori (libertà illimitata con massimo intervento), il conservatorismo reazionario europeo (restaurazione feudale) o l'ideologia neoconservatrice (interventismo militare) piuttosto che l'approccio equilibrato che definisce il pensiero conservatore americano tradizionale.
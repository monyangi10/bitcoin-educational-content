question: Hvilket grunnleggende filosofisk prinsipp skiller tradisjonell amerikansk konservatisme fra andre politiske ideologier?
answer: Konseptet "ordered liberty", som søker å balansere individuell frihet med samfunnsansvar og begrenset styring
wrong_answers:
  - Prinsippet om ubegrenset individuell frihet kombinert med maksimal statlig inngripen i sosiale spørsmål
  - Troen på revolusjonære endringer for å gjenopprette det føydale jordbrukssamfunnet og avvise all teknologisk utvikling
  - Doktrinen om militær intervensjonisme for å spre demokrati over hele verden gjennom forebyggende krigføring
explanation: |
  Tradisjonell amerikansk konservatisme er grunnleggende basert på "ordnet frihet", som forsøker å forene de til tider motstridende ambisjonene om fellesskapets og individets behov, personlig frihet og ansvar, og begrenset styring med frie markeder.
  De gale svarene representerer enten motstridende prinsipper (ubegrenset frihet med maksimal intervensjon), europeisk reaksjonær konservatisme (føydal restaurasjon) eller nykonservativ ideologi (militær intervensjonisme), snarere enn den balanserte tilnærmingen som definerer tradisjonell amerikansk konservativ tenkning.
question: Vilken grundläggande filosofisk princip skiljer den traditionella amerikanska konservatismen från andra politiska ideologier?
answer: Begreppet "ordered liberty", som syftar till att balansera individuell frihet med samhällsansvar och en begränsad statsmakt
wrong_answers:
  - Principen om obegränsad individuell frihet i kombination med maximal statlig inblandning i sociala frågor
  - Tron på en revolutionär förändring för att återställa det feodala jordbrukssamhället och förkasta alla tekniska framsteg
  - Doktrinen om militär interventionism för att sprida demokrati över hela världen genom förebyggande krigföring
explanation: |
  Traditionell amerikansk konservatism bygger i grunden på "ordnad frihet", som försöker förena de ibland motsägelsefulla strävandena efter samhälleliga och individuella behov, personlig frihet och ansvar samt begränsad regering med fria marknader.
  De felaktiga svaren representerar antingen motsägelsefulla principer (obegränsad frihet med maximal intervention), europeisk reaktionär konservatism (feodal restaurering) eller neokonservativ ideologi (militär interventionism) snarare än det balanserade synsätt som definierar traditionellt amerikanskt konservativt tänkande.
question: Welches grundlegende philosophische Prinzip unterscheidet den traditionellen amerikanischen Konservatismus von anderen politischen Ideologien?
answer: Das Konzept der geordneten Freiheit, das ein Gleichgewicht zwischen individueller Freiheit, gemeinschaftlicher Verantwortung und begrenztem Staat anstrebt
wrong_answers:
  - Der Grundsatz der uneingeschränkten individuellen Freiheit in Verbindung mit einem Höchstmaß an staatlichen Eingriffen in soziale Angelegenheiten
  - Der Glaube an einen revolutionären Wandel zur Wiederherstellung der feudalen Agrargesellschaft und die Ablehnung jeglichen technischen Fortschritts
  - Die Doktrin des militärischen Interventionismus zur weltweiten Verbreitung der Demokratie durch Präventivkriege
explanation: |
  Der traditionelle amerikanische Konservatismus basiert im Wesentlichen auf der "geordneten Freiheit", die versucht, die manchmal widersprüchlichen Bestrebungen von Gemeinschaft und individuellen Bedürfnissen, persönlicher Freiheit und Verantwortung und begrenzter Regierung mit freien Märkten in Einklang zu bringen.
  Die falschen Antworten repräsentieren entweder widersprüchliche Prinzipien (unbegrenzte Freiheit mit maximaler Intervention), europäischen reaktionären Konservatismus (feudale Restauration) oder neokonservative Ideologie (militärischer Interventionismus) und nicht den ausgewogenen Ansatz, der das traditionelle amerikanische konservative Denken ausmacht.
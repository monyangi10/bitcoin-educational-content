question: What fundamental philosophical principle distinguishes traditional American conservatism from other political ideologies?
answer: The concept of ordered liberty, which seeks to balance individual freedom with community responsibility and limited government
wrong_answers:
  - The principle of unlimited individual freedom combined with maximum government intervention in social matters
  - The belief in revolutionary change to restore feudal agricultural society and reject all technological progress
  - The doctrine of military interventionism to spread democracy worldwide through preemptive warfare
explanation: |
  Traditional American conservatism is fundamentally based on 'ordered liberty,' which attempts to reconcile the sometimes contradictory aspirations of community and individual needs, personal freedom and responsibility, and limited government with free markets.
  The wrong answers represent either contradictory principles (unlimited freedom with maximum intervention), European reactionary conservatism (feudal restoration), or neoconservative ideology (military interventionism) rather than the balanced approach that defines traditional American conservative thought.

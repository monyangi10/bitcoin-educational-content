question: 전통적인 미국 보수주의가 다른 정치 이념과 구별되는 근본적인 철학적 원칙은 무엇인가요?
answer: 개인의 자유와 공동체의 책임 및 제한된 정부의 균형을 추구하는 질서 있는 자유의 개념
wrong_answers:
  - 개인의 무한한 자유와 사회 문제에 대한 정부의 최대한의 개입을 결합한 원칙
  - 봉건적 농업 사회를 복원하고 모든 기술 진보를 거부하는 혁명적 변화에 대한 믿음
  - 선제 전쟁을 통해 전 세계에 민주주의를 확산시키려는 군사 개입주의 교리
explanation: |
  전통적인 미국 보수주의는 근본적으로 공동체와 개인의 필요, 개인의 자유와 책임, 제한된 정부와 자유 시장이라는 때때로 모순되는 열망을 조화시키려는 '질서 있는 자유'에 기반을 두고 있습니다.
  오답은 전통적인 미국 보수주의 사상을 정의하는 균형 잡힌 접근 방식이 아닌 모순된 원칙(무제한 자유와 최대 개입), 유럽의 반동적 보수주의(봉건적 복고) 또는 신보수주의 이념(군사 개입주의) 중 하나를 나타냅니다.
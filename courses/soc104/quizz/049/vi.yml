question: Nguyên tắc triết học cơ bản nào phân biệt chủ nghĩa bảo thủ truyền thống của Mỹ với các hệ tư tưởng chính trị khác?
answer: Khái niệm về tự do có trật tự, nhằm mục đích cân bằng tự do cá nhân với trách nhiệm cộng đồng và chính phủ hạn chế quyền lực, là một khái niệm hướng đến sự cân bằng giữa tự do cá nhân với trách nhiệm cộng đồng và chính phủ hạn chế quyền lực.
wrong_answers:
  - Nguyên tắc tự do cá nhân vô hạn kết hợp với sự can thiệp tối đa của chính phủ vào các vấn đề xã hội.
  - Niềm tin vào sự thay đổi mang tính cách mạng để khôi phục lại xã hội nông nghiệp phong kiến và bác bỏ mọi tiến bộ công nghệ.
  - Học thuyết can thiệp quân sự nhằm truyền bá dân chủ trên toàn thế giới thông qua chiến tranh phủ đầu.
explanation: |
  Chủ nghĩa bảo thủ truyền thống của Mỹ về cơ bản dựa trên "tự do có trật tự", cố gắng dung hòa những khát vọng đôi khi mâu thuẫn của nhu cầu cộng đồng và cá nhân, tự do cá nhân và trách nhiệm, và chính phủ hạn chế với thị trường tự do.
  
  Những câu trả lời sai thể hiện những nguyên tắc mâu thuẫn (tự do vô hạn với sự can thiệp tối đa), chủ nghĩa bảo thủ phản động của châu Âu (khôi phục chế độ phong kiến), hoặc hệ tư tưởng tân bảo thủ (chủ nghĩa can thiệp quân sự) chứ không phải cách tiếp cận cân bằng vốn là đặc điểm của tư tưởng bảo thủ truyền thống của Mỹ.
question: Koji fundamentalni filozofski princip razlikuje tradicionalni američki konzervativizam od drugih političkih ideologija?
answer: Koncept uređene slobode, koji nastoji da uskladi individualnu slobodu sa odgovornošću zajednice i ograničenom vladom
wrong_answers:
  - Princip slobode pojedinca bez ograničenja u kombinaciji sa maksimalnom intervencijom vlade u društvenim pitanjima
  - Vera u revolucionarnu promenu za obnovu feudalnog poljoprivrednog društva i odbacivanje svakog tehnološkog napretka
  - Doktrina vojne intervencije za širenje demokratije širom sveta kroz preventivno ratovanje
explanation: |
  Tradicionalni američki konzervativizam je fundamentalno zasnovan na 'uređenoj slobodi', koja pokušava da pomiri ponekad kontradiktorne težnje zajednice i individualnih potreba, lične slobode i odgovornosti, te ograničene vlade sa slobodnim tržištima. Pogrešni odgovori predstavljaju ili kontradiktorne principe (neograničena sloboda sa maksimalnom intervencijom), evropski reakcionarni konzervativizam (feudalna restauracija), ili neokonzervativnu ideologiju (vojni intervencionizam) umesto uravnoteženog pristupa koji definiše tradicionalnu američku konzervativnu misao.
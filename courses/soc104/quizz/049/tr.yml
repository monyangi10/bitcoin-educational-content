question: Geleneksel Amerikan muhafazakârlığını diğer siyasi ideolojilerden ayıran temel felsefi ilke nedir?
answer: Bireysel özgürlüğü toplumsal sorumluluk ve sınırlı hükümet ile dengelemeyi amaçlayan düzenli özgürlük kavramı
wrong_answers:
  - Sınırsız bireysel özgürlük ilkesi ile sosyal konularda azami devlet müdahalesi
  - Feodal tarım toplumunu yeniden kurmak ve tüm teknolojik ilerlemeyi reddetmek için devrimci değişime olan inanç
  - Önleyici savaş yoluyla demokrasiyi dünya çapında yaymak için askeri müdahalecilik doktrini
explanation: |
  Geleneksel Amerikan muhafazakârlığı temelde, toplum ve bireysel ihtiyaçlar, kişisel özgürlük ve sorumluluk ile sınırlı hükümet ve serbest piyasa gibi bazen birbiriyle çelişen istekleri uzlaştırmaya çalışan 'düzenli özgürlüğe' dayanmaktadır.
  Yanlış cevaplar, geleneksel Amerikan muhafazakâr düşüncesini tanımlayan dengeli yaklaşımdan ziyade birbiriyle çelişen ilkeleri (maksimum müdahale ile sınırsız özgürlük), Avrupa gerici muhafazakârlığını (feodal restorasyon) ya da neo-muhafazakâr ideolojiyi (askeri müdahalecilik) temsil etmektedir.
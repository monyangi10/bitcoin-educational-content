question: ¿Qué principio filosófico fundamental distingue al conservadurismo tradicional estadounidense de otras ideologías políticas?
answer: El concepto de libertad ordenada, que trata de equilibrar la libertad individual con la responsabilidad de la comunidad y un gobierno limitado
wrong_answers:
  - El principio de la libertad individual ilimitada combinada con la máxima intervención gubernamental en asuntos sociales
  - La creencia en un cambio revolucionario para restaurar la sociedad agrícola feudal y rechazar todo progreso tecnológico
  - La doctrina del intervencionismo militar para extender la democracia por todo el mundo mediante la guerra preventiva
explanation: |
  El conservadurismo tradicional estadounidense se basa fundamentalmente en la "libertad ordenada", que intenta conciliar las aspiraciones a veces contradictorias de la comunidad y las necesidades individuales, la libertad y la responsabilidad personales, y el gobierno limitado con el libre mercado.
  Las respuestas erróneas representan principios contradictorios (libertad ilimitada con máxima intervención), el conservadurismo reaccionario europeo (restauración feudal) o la ideología neoconservadora (intervencionismo militar), en lugar del enfoque equilibrado que define el pensamiento conservador tradicional estadounidense.
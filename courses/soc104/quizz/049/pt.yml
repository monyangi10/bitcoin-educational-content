question: Que princípio filosófico fundamental distingue o conservadorismo tradicional americano de outras ideologias políticas?
answer: O conceito de liberdade ordenada, que procura equilibrar a liberdade individual com a responsabilidade da comunidade e um governo limitado
wrong_answers:
  - O princípio da liberdade individual ilimitada combinada com a máxima intervenção do governo em questões sociais
  - A crença na mudança revolucionária para restaurar a sociedade agrícola feudal e rejeitar todo o progresso tecnológico
  - A doutrina do intervencionismo militar para difundir a democracia a nível mundial através da guerra preventiva
explanation: |
  O conservadorismo americano tradicional baseia-se fundamentalmente na "liberdade ordenada", que tenta conciliar as aspirações, por vezes contraditórias, das necessidades comunitárias e individuais, da liberdade e responsabilidade pessoais e do governo limitado com mercados livres.
  As respostas erradas representam princípios contraditórios (liberdade ilimitada com intervenção máxima), o conservadorismo reacionário europeu (restauração feudal) ou a ideologia neoconservadora (intervencionismo militar), em vez da abordagem equilibrada que define o pensamento conservador americano tradicional.
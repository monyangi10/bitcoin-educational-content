question: Mikä filosofinen perusperiaate erottaa perinteisen amerikkalaisen konservatismin muista poliittisista ideologioista?
answer: Järjestäytyneen vapauden käsite, jolla pyritään tasapainottamaan yksilön vapaus yhteisön vastuun ja rajoitetun hallinnon kanssa
wrong_answers:
  - Rajattoman yksilönvapauden periaate yhdistettynä hallituksen mahdollisimman suureen puuttumiseen yhteiskunnallisiin asioihin
  - Usko vallankumoukselliseen muutokseen feodaalisen maatalousyhteiskunnan palauttamiseksi ja kaiken teknisen kehityksen hylkäämiseksi
  - Sotilaallisen interventionismin doktriini demokratian levittämiseksi maailmanlaajuisesti ennalta ehkäisevän sodankäynnin avulla
explanation: |
  Perinteinen amerikkalainen konservatismi perustuu pohjimmiltaan "järjestettyyn vapauteen", jossa pyritään sovittamaan yhteen yhteisön ja yksilön tarpeiden, henkilökohtaisen vapauden ja vastuun sekä rajoitetun hallinnon ja vapaiden markkinoiden joskus ristiriitaiset pyrkimykset.
  Väärät vastaukset edustavat joko ristiriitaisia periaatteita (rajoittamaton vapaus ja maksimaalinen interventio), eurooppalaista taantumuksellista konservatismia (feodaalinen restauraatio) tai uuskonservatiivista ideologiaa (sotilaallinen interventionismi) sen sijaan, että ne edustaisivat tasapainoista lähestymistapaa, joka määrittelee perinteisen amerikkalaisen konservatiivisen ajattelun.
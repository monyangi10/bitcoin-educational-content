question: Что отличает культурного консерватора, который также является либертарианцем, от политического консерватора, когда речь идет о поведении, которое они морально не одобряют?
answer: Они противостоят такому поведению путем убеждения и просвещения, но не приемлют законодательного запрета или принуждения
wrong_answers:
  - Они поддерживают вмешательство государства в регулирование этих видов поведения, сохраняя при этом личную свободу в других областях
  - Они выступают за создание правовых систем на базе общин, которые обеспечивают соблюдение традиционных ценностей без участия государства
  - Они верят в постепенные изменения в законодательстве, которые постепенно ограничивают такое поведение с течением времени
explanation: |
  Ключевое различие заключается в том, что культурные консерваторы-либертарианцы строго разделяют личные моральные убеждения и политические действия. Хотя
  они могут решительно не одобрять определенное поведение с моральной точки зрения, они отказываются использовать принудительную силу закона для запрета консенсуальных, неагрессивных действий. Вместо этого они полагаются на такие непринудительные средства, как убеждение, образование и личный пример, чтобы пропагандировать свои ценности, уважая право других жить по-другому в соответствии с либертарианскими принципами индивидуальной свободы.
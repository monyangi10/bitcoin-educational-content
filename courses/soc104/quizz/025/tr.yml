question: Ahlaki olarak onaylamadıkları davranışlarla uğraşırken aynı zamanda özgürlükçü olan kültürel bir muhafazakarı siyasi bir muhafazakardan ayıran nedir?
answer: Bu tür davranışlara ikna ve eğitim yoluyla karşı çıkarlar ancak yasal yasaklama veya zorlayıcı güç kullanmayı reddederler
wrong_answers:
  - Diğer alanlarda kişisel özgürlüğü korurken, bu davranışları düzenlemek için devlet müdahalesini destekliyorlar
  - Devlet müdahalesi olmadan geleneksel değerleri uygulayan toplum temelli yasal sistemleri savunuyorlar
  - Bu tür davranışları zaman içinde yavaş yavaş kısıtlayan kademeli yasal değişikliklere inanırlar
explanation: |
  Temel ayrım, kültürel muhafazakâr liberteryenlerin kişisel ahlaki inançlar ile siyasi eylem arasında katı bir ayrım gözetmeleridir. Oysa
  belirli davranışları ahlaki açıdan kesinlikle onaylamasalar da, rızaya dayalı, saldırgan olmayan eylemleri yasaklamak için hukukun zorlayıcı gücünü kullanmayı reddederler. Bunun yerine, kendi değerlerini yaymak için ikna, eğitim ve kişisel örneklik gibi zorlayıcı olmayan yollara başvurur, başkalarının özgürlükçü bireysel özgürlük ilkelerine göre farklı yaşama hakkına saygı gösterirler.
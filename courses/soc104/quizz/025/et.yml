question: Mis eristab kultuurikonservatiivi, kes on ühtlasi libertaarne, poliitilisest konservatiivist, kui ta tegeleb käitumisega, mida ta moraalselt ei kiida heaks?
answer: Nad seisavad sellise käitumise vastu veenmise ja hariduse kaudu, kuid lükkavad tagasi õigusliku keelamise või sunniviisilise jõu kasutamise
wrong_answers:
  - Nad toetavad valitsuse sekkumist, et reguleerida neid käitumisviise, säilitades samal ajal isikliku vabaduse teistes valdkondades
  - Nad pooldavad kogukonnapõhiseid õigussüsteeme, mis jõustavad traditsioonilisi väärtusi ilma riigi sekkumiseta
  - Nad usuvad järkjärgulistesse seadusandlikesse muudatustesse, mis aeglaselt piiravad sellist käitumist aja jooksul
explanation: |
  Peamine erinevus seisneb selles, et kultuurikonservatiivsed libertaarid hoiavad rangelt lahus isiklikke moraalseid tõekspidamisi ja poliitilist tegevust. Kuigi
  nad võivad teatavaid käitumisviise moraalselt tugevalt hukka mõista, keelduvad nad siiski seaduse sunnivolituste kasutamisest, et keelata konsensuslikke, mitteagressiivseid tegevusi. Selle asemel toetuvad nad oma väärtuste edendamiseks mittekohustuslikele vahenditele, nagu veenmine, haridus ja isiklik eeskuju, austades teiste õigust elada erinevalt vastavalt individuaalse vabaduse libertaarsetele põhimõtetele.
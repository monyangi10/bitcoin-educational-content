question: Wat onderscheidt een cultureel conservatief die ook libertarisch is van een politiek conservatief als het gaat om gedrag dat zij moreel afkeuren?
answer: Ze verzetten zich tegen dergelijk gedrag door middel van overreding en onderwijs, maar wijzen het gebruik van wettelijk verbod of dwangmiddelen af
wrong_answers:
  - Ze steunen overheidsingrijpen om dit gedrag te reguleren, terwijl persoonlijke vrijheid op andere gebieden behouden blijft
  - Ze pleiten voor op de gemeenschap gebaseerde rechtssystemen die traditionele waarden handhaven zonder tussenkomst van de staat
  - Zij geloven in geleidelijke wetswijzigingen die dergelijk gedrag in de loop van de tijd langzaam aan banden leggen
explanation: |
  Het belangrijkste verschil is dat cultureel conservatieve libertariërs een strikte scheiding aanhouden tussen persoonlijke morele overtuigingen en politieke actie. Hoewel
  hoewel ze bepaalde gedragingen moreel sterk afkeuren, weigeren ze de dwingende kracht van de wet te gebruiken om consensuele, niet-agressieve handelingen te verbieden. In plaats daarvan vertrouwen ze op niet-dwingende middelen zoals overreding, onderwijs en persoonlijk voorbeeld om hun waarden te promoten, waarbij ze het recht van anderen respecteren om anders te leven volgens de libertarische principes van individuele vrijheid.
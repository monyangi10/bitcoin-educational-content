question: چه چیزی یک محافظه‌کار فرهنگی که همچنین لیبرترین است را از یک محافظه‌کار سیاسی در مواجهه با رفتارهایی که از نظر اخلاقی آن‌ها را نمی‌پسندند، متمایز می‌کند؟
answer: آن‌ها با استفاده از ترغیب و آموزش با چنین رفتارهایی مخالفت می‌کنند اما استفاده از ممنوعیت قانونی یا نیروی قهری را رد می‌کنند.
wrong_answers:
  - آن‌ها از مداخله دولت برای تنظیم این رفتارها حمایت می‌کنند، در حالی که آزادی شخصی در سایر زمینه‌ها حفظ می‌شود.
  - آن‌ها از سیستم‌های حقوقی مبتنی بر جامعه حمایت می‌کنند که ارزش‌های سنتی را بدون دخالت دولت اجرا می‌کنند.
  - آن‌ها به تغییرات تدریجی قانونی اعتقاد دارند که به مرور زمان چنین رفتارهایی را محدود می‌کند.
explanation: |
  تفاوت کلیدی این است که لیبرتارین‌های محافظه‌کار فرهنگی بین باورهای اخلاقی شخصی و اقدام سیاسی جدایی سخت‌گیرانه‌ای را حفظ می‌کنند. در حالی که ممکن است به شدت با برخی رفتارها از نظر اخلاقی مخالف باشند، از استفاده از قدرت اجباری قانون برای ممنوعیت اقدامات توافقی و غیرتهاجمی خودداری می‌کنند. در عوض، آن‌ها به روش‌های غیر اجباری مانند ترغیب، آموزش و الگوی شخصی برای ترویج ارزش‌های خود تکیه می‌کنند و به حق دیگران برای زندگی متفاوت بر اساس اصول لیبرتارین آزادی فردی احترام می‌گذارند.
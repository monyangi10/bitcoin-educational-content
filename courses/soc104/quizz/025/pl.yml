question: Co odróżnia kulturowego konserwatystę, który jest również libertarianinem, od politycznego konserwatysty, gdy ma do czynienia z zachowaniami, których moralnie nie aprobuje?
answer: Przeciwstawiają się takim zachowaniom poprzez perswazję i edukację, ale odrzucają stosowanie zakazów prawnych lub przymusu
wrong_answers:
  - Popierają interwencję rządu w celu uregulowania tych zachowań przy jednoczesnym zachowaniu wolności osobistej w innych obszarach
  - Opowiadają się za systemami prawnymi opartymi na społeczności, które egzekwują tradycyjne wartości bez udziału państwa
  - Wierzą w stopniowe zmiany legislacyjne, które z czasem powoli ograniczają takie zachowania
explanation: |
  Kluczowe rozróżnienie polega na tym, że kulturowi konserwatywni libertarianie utrzymują ścisły rozdział między osobistymi przekonaniami moralnymi a działaniami politycznymi. Podczas gdy
  mogą zdecydowanie nie aprobować pewnych zachowań z moralnego punktu widzenia, odmawiają użycia przymusowej mocy prawa w celu zakazania zgodnych, nieagresywnych działań. Zamiast tego polegają na środkach nie przymusowych, takich jak perswazja, edukacja i osobisty przykład, aby promować swoje wartości, szanując prawo innych do życia inaczej zgodnie z libertariańskimi zasadami wolności osobistej.
question: Mikä erottaa kulttuurikonservatiivin, joka on myös libertaristi, poliittisesta konservatiivista, kun on kyse käyttäytymisestä, jota he moraalisesti paheksuvat?
answer: He vastustavat tällaista käyttäytymistä vakuuttamalla ja valistamalla, mutta torjuvat laillisen kiellon tai pakkokeinojen käytön
wrong_answers:
  - He kannattavat hallituksen väliintuloa näiden käyttäytymismuotojen sääntelemiseksi ja säilyttävät samalla henkilökohtaisen vapauden muilla aloilla
  - He kannattavat yhteisöpohjaisia oikeusjärjestelmiä, jotka valvovat perinteisten arvojen noudattamista ilman valtion osallistumista
  - He uskovat asteittaisiin lainsäädännöllisiin muutoksiin, joilla tällaista käyttäytymistä rajoitetaan hitaasti ajan myötä
explanation: |
  Keskeinen ero on se, että kulttuurikonservatiiviset libertaarit pitävät tiukasti erillään henkilökohtaiset moraaliset vakaumukset ja poliittisen toiminnan. Kun taas
  he saattavat moraalisesti paheksua voimakkaasti tiettyjä käyttäytymismalleja, he kieltäytyvät käyttämästä lain pakkokeinoja yhteisymmärrykseen perustuvien, ei-aggressiivisten toimien kieltämiseksi. Sen sijaan he tukeutuvat arvojensa edistämisessä muihin kuin pakkokeinoihin, kuten suostutteluun, valistukseen ja henkilökohtaiseen esimerkkiin, ja kunnioittavat muiden oikeutta elää eri tavalla yksilönvapauden libertarististen periaatteiden mukaisesti.
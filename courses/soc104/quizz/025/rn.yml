question: Ni igiki gitandukanya umuntu akunda umuco kandi ari umunyagihugu w’umwidegemvyo n’umuntu akunda politike iyo ariko arakorana n’inyifato banse mu vy’inyifato runtu?
answer: Barwanya izo nyifato biciye mu kwemeza no kwigisha ariko bakanka gukoresha ububisha butegekanijwe n’amategeko canke inguvu z’agahato .
wrong_answers:
  - Bashigikiye ko Leta igira ico ikoze kugira ngo izo nyifato zitunganirizwe mu gihe zigumya umwidegemvyo w’umuntu ku giti ciwe mu bindi bintu .
  - Bavuganira uburyo bwo gukurikiza amategeko bushingiye ku kibano bushira mu ngiro ingingo ngenderwako z’imigenzo ata Leta yinjiramwo .
  - Bemera ko amategeko ahinduka buhoro buhoro, ivyo bikaba bituma buhoro buhoro mwene izo nyifato zigabanywa uko igihe kigenda kirarenga .
explanation: |
  Itandukaniro nyamukuru ni uko abaharanira umwidegemvyo w’umuco bagumya itandukaniro rikomeye hagati y’ivyo umuntu yemera mu vy’inyifato runtu n’ibikorwa vya politike. Mu gihe 
  bashobora kwanka cane inyifato zimwe zimwe mu vy’inyifato runtu, banka gukoresha ububasha bw’itegeko bwo guhatira abantu kugira ngo babuze ibikorwa vy’uguhurizako, bitagiramwo ubukazi. Ahubwo, bizigira uburyo butagiramwo uguhatira nk’ugukwemeza, inyigisho, n’akarorero k’umuntu ku giti ciwe kugira ngo bateze imbere ingingo ngenderwako zabo, bubaha uburenganzira bw’abandi bwo kubaho mu buryo butandukanye hakurikijwe ingingo ngenderwako z’ubwigenge z’umwidegemvyo w’umuntu ku giti ciwe.
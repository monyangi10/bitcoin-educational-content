question: 在处理他们在道德上不赞成的行为时，文化保守主义者（同时也是自由主义者）与政治保守主义者的区别是什么？
answer: 他们通过说服和教育反对此类行为，但反对使用法律禁止或强制手段
wrong_answers:
  - 他们支持政府干预，以规范这些行为，同时在其他方面保持个人自由
  - 他们倡导以社区为基础的法律体系，在没有国家参与的情况下执行传统价值观
  - 他们相信循序渐进的立法变革，随着时间的推移慢慢限制这些行为
explanation: |
  关键的区别在于，文化保守主义自由主义者将个人道德信仰与政治行动严格区分开来。虽然
  他们可能在道德上强烈反对某些行为，但他们拒绝使用法律的强制力来禁止双方同意的、非攻击性的行为。相反，他们依靠说服、教育和以身作则等非强制手段来宣传自己的价值观，尊重他人根据自由主义的个人自由原则过不同生活的权利。
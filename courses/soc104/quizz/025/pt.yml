question: O que distingue um conservador cultural que é também libertário de um conservador político quando se trata de comportamentos que desaprovam moralmente?
answer: Opõem-se a esses comportamentos através da persuasão e da educação, mas rejeitam o recurso à proibição legal ou à força coerciva
wrong_answers:
  - Apoiam a intervenção do governo para regular estes comportamentos, mantendo a liberdade pessoal noutras áreas
  - Defendem sistemas jurídicos baseados na comunidade que façam cumprir os valores tradicionais sem o envolvimento do Estado
  - Acreditam em alterações legislativas graduais que restringem lentamente esses comportamentos ao longo do tempo
explanation: |
  A principal distinção é que os libertários conservadores culturais mantêm uma separação rigorosa entre as crenças morais pessoais e a ação política. Embora
  embora possam desaprovar moralmente certos comportamentos, recusam-se a utilizar o poder coercivo da lei para proibir acções consensuais e não agressivas. Em vez disso, recorrem a meios não coercivos como a persuasão, a educação e o exemplo pessoal para promover os seus valores, respeitando o direito dos outros a viverem de forma diferente, de acordo com os princípios libertários da liberdade individual.
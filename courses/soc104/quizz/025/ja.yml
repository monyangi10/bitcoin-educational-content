question: リベラリストでもある文化的保守主義者と政治的保守主義者との違いは、彼らが道徳的に否定する行動を扱う場合、どこにあるのだろうか？
answer: 説得や教育を通じてそのような行為に反対するが、法的な禁止や強制力を行使することは拒否する。
wrong_answers:
  - 他の分野では個人の自由を維持しながら、これらの行動を規制するために政府の介入を支持する。
  - 彼らは、国家の関与なしに伝統的価値観を強制する、地域社会に根ざした法制度を提唱している。
  - 彼らは、そのような行動を時間をかけて徐々に制限していく漸進的な法改正を信じている。
explanation: |
  重要な違いは、文化的保守主義のリバタリアンは、個人の道徳的信念と政治的行動を厳格に分離していることだ。その一方で
  道徳的に特定の行動を強く否定することはあっても、法律の強制力を使って、合意された非攻撃的な行動を禁止することは拒否する。その代わりに、説得、教育、個人的な模範といった非強制的な手段に頼って自らの価値観を広め、個人の自由というリバタリアンの原則に従って他人が異なる生き方をする権利を尊重する。
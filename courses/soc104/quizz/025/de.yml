question: Was unterscheidet einen Kulturkonservativen, der gleichzeitig Libertärer ist, von einem politischen Konservativen, wenn es um Verhaltensweisen geht, die er moralisch missbilligt?
answer: Sie wenden sich gegen solche Verhaltensweisen durch Überzeugung und Aufklärung, lehnen aber gesetzliche Verbote oder Zwangsmaßnahmen ab
wrong_answers:
  - Sie befürworten staatliche Eingriffe zur Regulierung dieser Verhaltensweisen, während die persönliche Freiheit in anderen Bereichen erhalten bleibt
  - Sie setzen sich für gemeinschaftsbasierte Rechtssysteme ein, die traditionelle Werte ohne staatliche Beteiligung durchsetzen
  - Sie glauben an schrittweise Gesetzesänderungen, die solche Verhaltensweisen im Laufe der Zeit langsam einschränken
explanation: |
  Der Hauptunterschied besteht darin, dass die kulturkonservativen Libertären eine strikte Trennung zwischen persönlichen moralischen Überzeugungen und politischem Handeln aufrechterhalten. Während
  auch wenn sie bestimmte Verhaltensweisen moralisch stark missbilligen, weigern sie sich, die Zwangsgewalt des Gesetzes einzusetzen, um einvernehmliche, nicht aggressive Handlungen zu verbieten. Stattdessen verlassen sie sich auf zwanglose Mittel wie Überzeugung, Erziehung und persönliches Beispiel, um ihre Werte zu verbreiten, und respektieren das Recht anderer, gemäß den libertären Prinzipien der individuellen Freiheit anders zu leben.
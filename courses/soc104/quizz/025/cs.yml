question: Čím se liší kulturní konzervativec, který je zároveň libertariánem, od politického konzervativce, když se zabývá chováním, které morálně neschvaluje?
answer: Proti takovému chování se staví přesvědčováním a vzděláváním, ale odmítají použití právního zákazu nebo donucovací síly
wrong_answers:
  - Podporují vládní zásahy, které by toto chování regulovaly, a zároveň zachovávají osobní svobodu v jiných oblastech
  - Obhajují komunitní právní systémy, které prosazují tradiční hodnoty bez účasti státu
  - Věří v postupné legislativní změny, které takové chování v průběhu času pomalu omezují
explanation: |
  Klíčový rozdíl spočívá v tom, že kulturně konzervativní libertariáni striktně oddělují osobní morální přesvědčení od politického jednání. Zatímco
  mohou s určitým chováním morálně silně nesouhlasit, odmítají používat donucovací moc zákona k zákazu konsensuálních, neagresivních akcí. Namísto toho se při prosazování svých hodnot spoléhají na prostředky, které nemají donucovací charakter, jako je přesvědčování, vzdělávání a osobní příklad, a respektují právo ostatních žít jinak v souladu s libertariánskými zásadami individuální svobody.
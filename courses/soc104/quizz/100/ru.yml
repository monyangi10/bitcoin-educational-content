question: Согласно "Манифесту Cypherpunk" Эрика Хьюза, что является главной обязанностью по защите частной жизни в открытом электронном обществе?
answer: Люди должны сами активно защищать свою частную жизнь, а не полагаться на правительства или корпорации, которые должны ее обеспечить
wrong_answers:
  - Правительствам следует разработать всеобъемлющие правила защиты частной жизни, чтобы оградить граждан от корпоративной слежки
  - Корпорации должны внедрять добровольные стандарты конфиденциальности и самостоятельно регулировать свою практику сбора данных
  - Международные организации должны создать обязательные договоры, которые обяжут все страны защищать частную жизнь
explanation: |
  Эрик Хьюз прямо заявил в Манифесте Cypherpunk: "Мы не можем ожидать, что правительства, корпорации или другие крупные анонимные организации будут гарантировать нам конфиденциальность... Моя главная цель для Cypherpunks - заставить людей защищать свою конфиденциальность, а не полагаться на то, что кто-то другой ее обеспечит"
  Эта философия подчеркивает индивидуальную ответственность и самодостаточность криптографических средств, отвергая зависимость от внешних институтов в вопросах защиты конфиденциальности, именно поэтому киберпанки разработали децентрализованные криптографические системы.
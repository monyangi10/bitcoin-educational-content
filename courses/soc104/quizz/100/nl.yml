question: Wat is volgens het Cypherpunk Manifest van Eric Hughes de primaire verantwoordelijkheid voor het verdedigen van privacy in een open elektronische samenleving?
answer: Individuen moeten actief hun eigen privacy verdedigen in plaats van te vertrouwen op overheden of bedrijven om die privacy te verschaffen
wrong_answers:
  - Regeringen moeten uitgebreide privacyregels opstellen om burgers te beschermen tegen bedrijfsbewaking
  - Bedrijven moeten vrijwillige privacynormen implementeren en hun gegevensverzamelingspraktijken zelfreguleren
  - Internationale organisaties moeten bindende verdragen opstellen die privacybescherming in alle landen verplicht stellen
explanation: |
  Eric Hughes stelde expliciet in het Cypherpunk Manifest dat 'we niet kunnen verwachten dat overheden, bedrijven of andere grote anonieme organisaties ons vertrouwelijkheid garanderen... Mijn belangrijkste doel voor Cypherpunks is om mensen hun vertrouwelijkheid te laten verdedigen, in plaats van te vertrouwen op iemand anders om het te verschaffen'
  Deze filosofie benadrukt individuele verantwoordelijkheid en zelfredzaamheid door middel van cryptografische gereedschappen, en verwerpt de afhankelijkheid van externe instellingen voor privacybescherming, wat de reden is waarom de cypherpunks gedecentraliseerde cryptografische systemen hebben ontwikkeld.
question: 根據 Eric Hughes 的 Cypherpunk 宣言，在開放的電子社會中，捍衛隱私權的主要責任是什麼？
answer: 個人必須主動捍衛自己的隱私權，而不是依賴政府或企業提供隱私權
wrong_answers:
  - 政府應建立全面的隱私權法規，以保護公民不受企業監控
  - 企業必須實施自願性隱私權標準，並自我規範其資料收集實務
  - 國際組織應制定具有約束力的條約，強制所有國家保護隱私權
explanation: |
  Eric Hughes 在 Cypherpunk 宣言中明確表示：「我們不能期望政府、企業或其他大型匿名組織保證我們的機密性...我對 Cypherpunks 的主要目標是讓人們捍衛自己的機密性，而不是仰賴別人提供機密性'。
  這種哲學強調透過密碼工具來實現個人責任和自力更生，拒絕依賴外部機構來保護隱私，這也是 Cypherpunks 發展分散式密碼系統的原因。
question: ตามที่ Eric Hughes' Cypherpunk Manifesto ระบุไว้ ความรับผิดชอบหลักในการปกป้องความเป็นส่วนตัวในสังคมอิเล็กทรอนิกส์แบบเปิดคืออะไร?
answer: บุคคลต้องปกป้องความเป็นส่วนตัวของตนเองอย่างแข็งขันแทนที่จะพึ่งพารัฐบาลหรือบริษัทในการจัดหาให้
wrong_answers:
  - รัฐบาลควรจัดตั้งกฎระเบียบความเป็นส่วนตัวที่ครอบคลุมเพื่อปกป้องพลเมืองจากการสอดส่องของบริษัท
  - บริษัทต้องดำเนินการตามมาตรฐานความเป็นส่วนตัวโดยสมัครใจและควบคุมตนเองในแนวทางการเก็บรวบรวมข้อมูลของตน
  - องค์กรระหว่างประเทศควรสร้างสนธิสัญญาที่มีผลผูกพันซึ่งกำหนดให้มีการคุ้มครองความเป็นส่วนตัวในทุกประเทศ
explanation: |
  Eric Hughes ได้กล่าวไว้อย่างชัดเจนในแถลงการณ์ Cypherpunk ว่า 'เราไม่สามารถคาดหวังให้รัฐบาล บริษัท หรือองค์กรนิรนามขนาดใหญ่อื่น ๆ มารับประกันความลับของเราได้... วัตถุประสงค์หลักของฉันสำหรับ Cypherpunks คือการทำให้ผู้คนปกป้องความลับของตนเอง แทนที่จะพึ่งพาคนอื่นในการจัดหาให้' ปรัชญานี้เน้นย้ำถึงความรับผิดชอบส่วนบุคคลและการพึ่งพาตนเองผ่านเครื่องมือการเข้ารหัส โดยปฏิเสธการพึ่งพาสถาบันภายนอกในการปกป้องความเป็นส่วนตัว ซึ่งเป็นเหตุผลที่ cypherpunks ได้พัฒนาระบบการเข้ารหัสแบบกระจายอำนาจขึ้นมา
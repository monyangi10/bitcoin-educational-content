question: De acordo com o Manifesto Cypherpunk de Eric Hughes, qual é a principal responsabilidade pela defesa da privacidade numa sociedade eletrónica aberta?
answer: Os indivíduos devem defender ativamente a sua própria privacidade, em vez de dependerem dos governos ou das empresas para a garantir
wrong_answers:
  - Os governos devem estabelecer regulamentos abrangentes em matéria de privacidade para proteger os cidadãos da vigilância das empresas
  - As empresas devem aplicar normas de privacidade voluntárias e auto-regular as suas práticas de recolha de dados
  - As organizações internacionais devem criar tratados vinculativos que imponham a proteção da privacidade em todas as nações
explanation: |
  Eric Hughes declarou explicitamente no Manifesto Cypherpunk que 'Não podemos esperar que governos, corporações ou outras grandes organizações anónimas nos garantam confidencialidade... O meu principal objetivo para os Cypherpunks é fazer com que as pessoas defendam a sua confidencialidade, em vez de dependerem de outra pessoa para a fornecer
  Esta filosofia enfatiza a responsabilidade individual e a autossuficiência através de ferramentas criptográficas, rejeitando a dependência de instituições externas para a proteção da privacidade, razão pela qual os cypherpunks desenvolveram sistemas criptográficos descentralizados.
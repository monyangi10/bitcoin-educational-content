question: 에릭 휴즈의 Cypherpunk 선언문에 따르면, 개방형 전자 사회에서 프라이버시를 보호하기 위한 주요 책임은 무엇인가요?
answer: 개인은 정부나 기업에 의존하지 않고 자신의 프라이버시를 적극적으로 보호해야 합니다
wrong_answers:
  - 정부는 기업 감시로부터 시민을 보호하기 위해 포괄적인 개인정보 보호 규정을 수립해야 합니다
  - 기업은 자발적인 개인정보 보호 표준을 구현하고 데이터 수집 관행을 자율적으로 규제해야 합니다
  - 국제기구는 모든 국가에 개인정보 보호를 의무화하는 구속력 있는 조약을 만들어야 합니다
explanation: |
  에릭 휴즈는 Cypherpunk 선언문에서 '우리는 정부, 기업 또는 기타 익명의 대규모 조직이 우리에게 기밀을 보장해 줄 것이라고 기대할 수 없다'고 명시적으로 언급했습니다. 사이퍼펑크의 주요 목표는 사람들이 기밀을 다른 사람에게 의존하지 않고 스스로 기밀을 지키도록 하는 것입니다'라고 말했습니다
  이러한 철학은 개인 정보 보호를 위해 외부 기관에 의존하는 것을 거부하고 암호화 도구를 통한 개인의 책임과 자립을 강조하며, 이것이 바로 사이퍼펑크가 탈중앙화된 암호화 시스템을 개발한 이유입니다.
question: Според манифеста Cypherpunk на Ерик Хюз коя е основната отговорност за защита на неприкосновеността на личния живот в едно отворено електронно общество?
answer: Хората трябва активно да защитават собствената си неприкосновеност на личния живот, а не да разчитат на правителствата или корпорациите да я осигурят
wrong_answers:
  - Правителствата трябва да въведат всеобхватни правила за защита на личните данни, за да защитят гражданите от корпоративно наблюдение
  - Корпорациите трябва да прилагат доброволни стандарти за поверителност и да саморегулират практиките си за събиране на данни
  - Международните организации трябва да създадат обвързващи договори, които да налагат защита на личните данни във всички държави
explanation: |
  Ерик Хюз изрично заявява в Манифеста на Cypherpunk, че "Не можем да очакваме правителства, корпорации или други големи анонимни организации да ни гарантират поверителност... Основната ми цел за Cypherpunks е да накарам хората да защитават своята поверителност, вместо да разчитат, че някой друг ще им я осигури
  Тази философия набляга на индивидуалната отговорност и самостоятелността чрез криптографски инструменти, като отхвърля зависимостта от външни институции за защита на личните данни, поради което cypherpunks разработват децентрализирани криптографски системи.
question: 根据埃里克-休斯的《Cypherpunk 宣言》，在一个开放的电子社会中，捍卫隐私的首要责任是什么？
answer: 个人必须积极捍卫自己的隐私，而不是依靠政府或公司来提供隐私
wrong_answers:
  - 各国政府应制定全面的隐私法规，保护公民免受企业监控
  - 企业必须实施自愿的隐私标准，并对其数据收集行为进行自我监管
  - 国际组织应制定具有约束力的条约，强制要求所有国家保护隐私
explanation: |
  埃里克-休斯在《Cypherpunk宣言》中明确指出："我们不能指望政府、公司或其他大型匿名组织来保证我们的机密性......我对赛弗朋克的主要目标是让人们捍卫自己的机密性，而不是依赖别人来提供机密性"。
  这一理念强调个人责任和通过加密工具实现自力更生，拒绝依赖外部机构来保护隐私，这也是赛弗朋克开发去中心化加密系统的原因。
question: طبقاً به بیانیه Cypherpunk اریک هیوز، مسئولیت اصلی دفاع از حریم خصوصی در یک جامعه الکترونیکی باز بر عهده کیست؟
answer: افراد باید به‌طور فعال از حریم خصوصی خود دفاع کنند و به جای تکیه بر دولت‌ها یا شرکت‌ها برای تأمین آن، خود اقدام کنند.
wrong_answers:
  - دولت‌ها باید مقررات جامع حریم خصوصی را برای محافظت از شهروندان در برابر نظارت شرکتی وضع کنند.
  - شرکت‌ها باید استانداردهای حریم خصوصی داوطلبانه را اجرا کرده و جمع‌آوری داده‌های خود را خودتنظیم کنند.
  - سازمان‌های بین‌المللی باید معاهدات الزام‌آوری ایجاد کنند که حفاظت از حریم خصوصی را در تمام کشورها الزامی کند.
explanation: |
  اریک هیوز به‌طور صریح در بیانیه Cypherpunk اظهار داشت که «ما نمی‌توانیم انتظار داشته باشیم که دولت‌ها، شرکت‌ها یا سایر سازمان‌های بزرگ ناشناس به ما محرمانگی را تضمین کنند... هدف اصلی من برای سایفرپانک‌ها این است که مردم از محرمانگی خود دفاع کنند، به‌جای اینکه به دیگران برای تأمین آن تکیه کنند.» این فلسفه بر مسئولیت فردی و اتکا به خود از طریق ابزارهای رمزنگاری تأکید دارد و وابستگی به نهادهای خارجی برای حفاظت از حریم خصوصی را رد می‌کند، به همین دلیل سایفرپانک‌ها سیستم‌های رمزنگاری غیرمتمرکز را توسعه دادند.
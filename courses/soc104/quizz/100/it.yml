question: Secondo il Manifesto Cypherpunk di Eric Hughes, qual è la responsabilità principale per la difesa della privacy in una società elettronica aperta?
answer: Gli individui devono difendere attivamente la propria privacy piuttosto che affidarsi ai governi o alle aziende per garantirla
wrong_answers:
  - I governi dovrebbero stabilire norme complete sulla privacy per proteggere i cittadini dalla sorveglianza delle aziende
  - Le aziende devono implementare standard di privacy volontari e autoregolamentare le loro pratiche di raccolta dei dati
  - Le organizzazioni internazionali dovrebbero creare trattati vincolanti che impongano la protezione della privacy in tutte le nazioni
explanation: |
  Eric Hughes ha dichiarato esplicitamente nel Manifesto del Cypherpunk che "non possiamo aspettarci che i governi, le aziende o altre grandi organizzazioni anonime ci garantiscano la confidenzialità... Il mio obiettivo principale per i Cypherpunk è far sì che le persone difendano la propria riservatezza, piuttosto che affidarsi a qualcun altro per garantirla"
  Questa filosofia enfatizza la responsabilità individuale e l'autosufficienza attraverso gli strumenti crittografici, rifiutando la dipendenza da istituzioni esterne per la protezione della privacy, motivo per cui i cypherpunk hanno sviluppato sistemi crittografici decentralizzati.
question: एरिक ह्यूजेस के जीडब्ल्यू-0 घोषणापत्र के अनुसार, एक खुले इलेक्ट्रॉनिक समाज में गोपनीयता की रक्षा करने की प्राथमिक जिम्मेदारी क्या है?
answer: व्यक्तियों को अपनी निजता की रक्षा के लिए सरकारों या निगमों पर निर्भर रहने के बजाय सक्रिय रूप से प्रयास करना चाहिए।
wrong_answers:
  - सरकारों को नागरिकों को कॉर्पोरेट निगरानी से बचाने के लिए व्यापक गोपनीयता नियम स्थापित करने चाहिए।
  - कंपनियों को स्वैच्छिक गोपनीयता मानकों को लागू करना होगा और अपने डेटा संग्रह प्रथाओं को स्वयं विनियमित करना होगा।
  - अंतर्राष्ट्रीय संगठनों को ऐसे बाध्यकारी समझौते बनाने चाहिए जो सभी देशों में गोपनीयता की सुरक्षा को अनिवार्य करें।
explanation: |
  एरिक ह्यूजेस ने Cypherpunk घोषणापत्र में स्पष्ट रूप से कहा था कि 'हम सरकारों, निगमों या अन्य बड़े गुमनाम संगठनों से गोपनीयता की गारंटी की अपेक्षा नहीं कर सकते... साइफरपंक के लिए मेरा मुख्य उद्देश्य लोगों को अपनी गोपनीयता की रक्षा करने के लिए प्रेरित करना है, न कि इसके लिए किसी और पर निर्भर रहना।'
  यह दर्शन क्रिप्टोग्राफिक उपकरणों के माध्यम से व्यक्तिगत जिम्मेदारी और आत्मनिर्भरता पर जोर देता है, गोपनीयता संरक्षण के लिए बाहरी संस्थानों पर निर्भरता को अस्वीकार करता है, यही कारण है कि साइफरपंक ने विकेंद्रीकृत क्रिप्टोग्राफिक प्रणालियाँ विकसित कीं।
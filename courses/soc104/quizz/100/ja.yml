question: エリック・ヒューズの『Cypherpunk宣言』によれば、オープンな電子社会でプライバシーを守る第一の責任は何か？
answer: 個人は、政府や企業にプライバシーを依存するのではなく、自ら積極的にプライバシーを守らなければならない。
wrong_answers:
  - 政府は、企業の監視から市民を守るために、包括的なプライバシー規制を設けるべきである。
  - 企業は、自主的なプライバシー基準を実施し、データ収集慣行を自主規制しなければならない。
  - 国際機関は、すべての国にプライバシー保護を義務付ける拘束力のある条約を作るべきである。
explanation: |
  エリック・ヒューズはCypherpunkマニフェストの中で、『政府や企業、その他の匿名性の高い大組織が私たちの秘密を保証してくれるとは期待できない......』と明言している。私のCypherpunksの主な目的は、誰かに頼るのではなく、人々に自分たちの機密性を守らせることである』と述べている。
  この哲学は、暗号ツールによる個人の責任と自立を強調し、プライバシー保護のための外部機関への依存を拒絶するもので、これがサイファーパンクスが分散型暗号システムを開発した理由である。
question: Dushingiye ku gitabu ca Eric Hughes citwa Cypherpunk Manifesto, ni uruhe ruhara nyamukuru rwo kurwanira ubuzima bwite mu kibano c’ubuhinga bwa none gifunguye?
answer: Abantu ku giti cabo bategerezwa kurwanira n’umwete ubuzima bwite bwabo aho kwizigira intwaro canke amashirahamwe kugira ngo abahe .
wrong_answers:
  - Leta zikwiye gushinga amategeko agenga ivy'ubuzima bwite kugira ngo zikingire abanyagihugu gucungera amashirahamwe .
  - Amashirahamwe ategerezwa gushira mu ngiro ingingo ngenderwako z'ubuzima bwite ku bushake no kwigenzura mu migenzo yabo yo gukusanya amakuru
  - Imiryango mpuzamakungu ikwiye gushinga amasezerano ategeka ko ubuzima bwite bukingirwa mu bihugu vyose .
explanation: |
  Eric Hughes yavuze neza muri Cypherpunk Manifesto ko 'Ntidushobora kwitega ko intwaro, amashirahamwe, canke ayandi mashirahamwe manini manini atazwi azoduha ibanga... Intumbero yanje nyamukuru ku bijanye na Cypherpunks ni ugutuma abantu barwanira ibanga ryabo, aho kwizigira uwundi muntu ngo arihe.' 
  Iyi filozofiya ishimika ku nshingano z’umuntu ku giti ciwe no kwiyizigira biciye mu bikoresho vy’ubuhinga bwa none, ikanka kwizigira inzego zo hanze kugira ngo umuntu akingire ubuzima bwiwe bwite, ni co gituma aba cypherpunks bateye imbere ubuhinga bwo gukora ubuhinga bwa none bushizwe ahantu hamwe.
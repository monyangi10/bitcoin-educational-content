question: Quale cambiamento storico spiega perché i liberali classici negli Stati Uniti hanno iniziato a chiamarsi "libertari" a partire dagli anni '60?
answer: I liberali americani si sono evoluti sostenendo il grande governo e l'intervento dello Stato, in contrasto con i principi liberali classici
wrong_answers:
  - I liberali europei hanno adottato per primi il termine "libertario", costringendo gli americani a distinguere il proprio movimento
  - Il Partito Repubblicano ha registrato il termine "liberale" e ha impedito ai liberali classici di usarlo
  - I liberali classici volevano sottolineare il loro sostegno a programmi sociali come il New Deal e la Great Society
explanation: |
  La risposta corretta riflette l'evoluzione storica descritta nel testo. I "liberali" americani si sono gradualmente allontanati dai principi liberali classici per sostenere un ampio intervento statale, compresi programmi come il New Deal di FDR e la Great Society di LBJ. Ciò rappresentò un allontanamento fondamentale dal liberalismo classico che poneva l'accento su un governo limitato e sull'economia del laissez-faire. Per evitare confusioni con il nuovo significato di "liberale" in America, negli anni Sessanta i sostenitori dei principi liberali classici adottarono il termine "libertario" per distinguere chiaramente la loro filosofia di minimo intervento statale dalle politiche interventiste che i "liberali" americani erano arrivati ad abbracciare.
question: Jaka historyczna zmiana wyjaśnia, dlaczego klasyczni liberałowie w Stanach Zjednoczonych zaczęli nazywać siebie "libertarianami" począwszy od lat 60. ubiegłego wieku?
answer: Amerykańscy liberałowie ewoluowali w kierunku wspierania wielkiego rządu i interwencji państwa, wbrew klasycznym liberalnym zasadom
wrong_answers:
  - Europejscy liberałowie przyjęli termin "libertariański" jako pierwsi, zmuszając Amerykanów do rozróżnienia swojego ruchu
  - Partia Republikańska opatrzyła termin "liberał" znakiem towarowym i uniemożliwiła klasycznym liberałom jego używanie
  - Klasyczni liberałowie chcieli podkreślić swoje poparcie dla programów społecznych, takich jak New Deal i Great Society
explanation: |
  Prawidłowa odpowiedź odzwierciedla historyczną ewolucję opisaną w tekście. Amerykańscy "liberałowie" stopniowo odchodzili od klasycznych liberalnych zasad w kierunku wspierania szeroko zakrojonej interwencji państwa, w tym programów takich jak Nowy Ład FDR i Wielkie Społeczeństwo LBJ. Stanowiło to fundamentalne odejście od nacisku klasycznego liberalizmu na ograniczony rząd i ekonomię leseferystyczną. Aby uniknąć nieporozumień związanych z tym nowym znaczeniem słowa "liberalny" w Ameryce, zwolennicy klasycznych zasad liberalnych przyjęli w latach 60. termin "libertariański", aby wyraźnie odróżnić swoją filozofię minimalnej interwencji państwa od interwencjonistycznej polityki, którą przyjęli amerykańscy "liberałowie".
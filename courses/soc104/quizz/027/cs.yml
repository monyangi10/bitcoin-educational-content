question: Jaký historický posun vysvětluje, proč si klasičtí liberálové ve Spojených státech začali od 60. let 20. století říkat "libertariáni"?
answer: Američtí liberálové se v rozporu s klasickými liberálními zásadami přiklonili k podpoře velké vlády a státních zásahů
wrong_answers:
  - Evropští liberálové přijali termín "libertariánský" jako první a donutili Američany, aby své hnutí odlišili
  - Republikánská strana získala ochrannou známku na výraz "liberální" a zabránila klasickým liberálům v jeho používání
  - Klasičtí liberálové chtěli zdůraznit svou podporu sociálních programů, jako byl New Deal a Great Society
explanation: |
  Správná odpověď odráží historický vývoj popsaný v textu. Američtí "liberálové" se postupně odklonili od klasických liberálních zásad a začali podporovat rozsáhlé státní zásahy, včetně programů, jako byl FDR New Deal a LBJ Great Society. To představovalo zásadní odklon od důrazu klasického liberalismu na omezenou vládu a laissez-faire ekonomiku. Aby se předešlo záměně s tímto novým významem slova "liberální" v Americe, přijali zastánci klasických liberálních zásad v 60. letech 20. století termín "libertariánský", aby jasně odlišili svou filozofii minimálních státních zásahů od intervencionistické politiky, kterou američtí "liberálové" začali prosazovat.
question: Pergeseran historis apa yang menjelaskan mengapa kaum liberal klasik di Amerika Serikat mulai menyebut diri mereka 'libertarian' mulai tahun 1960-an?
answer: Kaum liberal Amerika telah berevolusi untuk mendukung pemerintah besar dan keterlibatan negara, yang bertentangan dengan prinsip-prinsip liberal klasik
wrong_answers:
  - Kaum liberal Eropa mengadopsi istilah 'libertarian' terlebih dahulu, memaksa orang Amerika untuk membedakan gerakan mereka
  - Partai Republik menggunakan istilah 'liberal' sebagai merek dagang dan mencegah kaum liberal klasik untuk menggunakannya
  - Kaum liberal klasik ingin menekankan dukungan mereka terhadap program-program sosial seperti New Deal dan Great Society
explanation: |
  Jawaban yang benar mencerminkan evolusi historis yang dijelaskan dalam teks. Kaum 'liberal' Amerika secara bertahap bergeser dari prinsip-prinsip liberal klasik ke arah mendukung intervensi negara yang luas, termasuk program-program seperti New Deal dari FDR dan Great Society dari LBJ. Hal ini merupakan perubahan mendasar dari penekanan liberalisme klasik yang menekankan pada pemerintahan yang terbatas dan ekonomi laissez-faire. Untuk menghindari kebingungan dengan makna baru 'liberal' di Amerika, para pendukung prinsip-prinsip liberal klasik mengadopsi istilah 'libertarian' pada tahun 1960-an untuk secara jelas membedakan filosofi mereka tentang intervensi negara yang minimal dengan kebijakan-kebijakan intervensionis yang dianut oleh kaum 'liberal' Amerika.

question: Milline ajalooline muutus seletab, miks klassikalised liberaalid hakkasid end 1960. aastatest alates nimetama end "liberaalideks"?
answer: Ameerika liberaalid olid arenenud toetama suurt valitsust ja riigi sekkumist, mis on vastuolus klassikaliste liberaalsete põhimõtetega
wrong_answers:
  - Euroopa liberaalid võtsid esimesena kasutusele termini "libertaarne", mis sundis ameeriklasi eristama oma liikumist
  - Vabariiklik partei kaitses terminit "liberaal" kaubamärgina ja takistas klassikalistel liberaalidel seda kasutada
  - Klassikalised liberaalid tahtsid rõhutada oma toetust sotsiaalsetele programmidele nagu New Deal ja Great Society
explanation: |
  Õige vastus kajastab tekstis kirjeldatud ajaloolist arengut. Ameerika "liberaalid" liikusid järk-järgult klassikalistest liberaalsetest põhimõtetest ulatusliku riikliku sekkumise toetamise suunas, sealhulgas selliste programmide nagu FDRi New Deal ja LBJ Suure Ühiskonna programm. See kujutas endast põhimõttelist eemaldumist klassikalise liberalismi rõhuasetusest piiratud valitsemisele ja laissez-faire'i majandusele. Et vältida segadust selle uue "liberaalse" tähendusega Ameerikas, võtsid klassikaliste liberaalsete põhimõtete pooldajad 1960. aastatel kasutusele termini "libertarian", et selgelt eristada oma minimaalse riikliku sekkumise filosoofiat sekkumispoliitikast, mida Ameerika "liberaalid" olid omaks võtnud.
question: 什麼歷史轉變解釋了為什麼美國的古典自由主義者從 1960 年代開始自稱為「自由主義者」？
answer: 美國自由主義者已演變為支持大政府和國家干預，與古典自由主義原則背道而馳。
wrong_answers:
  - 歐洲的自由主義者首先採用「自由主義者」一詞，迫使美國人將他們的運動區分出來。
  - 共和黨將「自由主義者」一詞註冊為商標，並阻止古典自由主義者使用該詞
  - 古典自由主義者希望強調他們支持社會計畫，例如「新政」和「偉大社會」。
explanation: |
  正確答案反映了文中描述的歷史演變。美國的「自由主義者」漸漸從經典自由主義原則轉向支持廣泛的國家干預，包括 FDR 的「新政」和 LBJ 的「偉大社會」等計畫。這從根本上背離了古典自由主義強調的有限政府和自由放任經濟學。為了避免與美國「自由主義」的新涵義混淆，古典自由主義原則的支持者在1960年代採用了「自由主義者」這個名詞，以清楚區別他們的最小國家干預哲學與美國「自由主義者」所擁抱的干預主義政策。
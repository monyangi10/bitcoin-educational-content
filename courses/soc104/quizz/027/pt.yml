question: Que mudança histórica explica o facto de os liberais clássicos nos Estados Unidos se terem começado a chamar "libertários" a partir dos anos 60?
answer: Os liberais americanos tinham evoluído no sentido de apoiar a grande governação e a intervenção do Estado, contrariamente aos princípios liberais clássicos
wrong_answers:
  - Os liberais europeus adoptaram primeiro o termo "libertário", obrigando os americanos a distinguir o seu movimento
  - O Partido Republicano registou o termo "liberal" e impediu os liberais clássicos de o utilizarem
  - Os liberais clássicos queriam enfatizar o seu apoio a programas sociais como o New Deal e a Great Society
explanation: |
  A resposta correta reflecte a evolução histórica descrita no texto. Os "liberais" americanos afastaram-se gradualmente dos princípios liberais clássicos e passaram a apoiar a intervenção extensiva do Estado, incluindo programas como o New Deal de FDR e a Great Society de LBJ. Isto representou um afastamento fundamental da ênfase do liberalismo clássico no governo limitado e na economia do laissez-faire. Para evitar confusão com este novo significado de "liberal" na América, os defensores dos princípios liberais clássicos adoptaram o termo "libertário" na década de 1960 para distinguir claramente a sua filosofia de intervenção mínima do Estado das políticas intervencionistas que os "liberais" americanos tinham vindo a adotar.
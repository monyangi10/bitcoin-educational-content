question: Hvilket historisk skifte forklarer hvorfor klassiske liberalister i USA begynte å kalle seg "libertarianere" fra 1960-tallet?
answer: Amerikanske liberale hadde utviklet seg til å støtte store myndigheter og statlig inngripen, stikk i strid med klassiske liberale prinsipper
wrong_answers:
  - Europeiske liberale tok først i bruk begrepet "libertarian", noe som tvang amerikanerne til å skille bevegelsen sin
  - Det republikanske partiet varemerkebeskyttet begrepet "liberal" og hindret klassiske liberale i å bruke det
  - Klassiske liberale ønsket å fremheve sin støtte til sosiale programmer som New Deal og Great Society
explanation: |
  Det riktige svaret gjenspeiler den historiske utviklingen som beskrives i teksten. Amerikanske "liberale" gikk gradvis bort fra de klassiske liberale prinsippene og over til å støtte omfattende statlig intervensjon, inkludert programmer som FDRs New Deal og LBJs Great Society. Dette representerte et fundamentalt brudd med den klassiske liberalismens vektlegging av begrenset statlig styring og laissez-faire-økonomi. For å unngå forvirring med denne nye betydningen av "liberal" i USA, tok tilhengerne av klassisk liberale prinsipper i bruk begrepet "libertarian" på 1960-tallet for å skille tydelig mellom sin filosofi om minimal statlig inngripen og den intervensjonistiske politikken som amerikanske "liberale" hadde begynt å omfavne.
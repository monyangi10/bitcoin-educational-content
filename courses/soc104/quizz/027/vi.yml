question: Sự thay đổi lịch sử nào giải thích tại sao những người theo chủ nghĩa tự do cổ điển ở Hoa Kỳ bắt đầu tự gọi mình là "người theo chủ nghĩa tự do cá nhân" từ những năm 1960?
answer: Những người theo chủ nghĩa tự do Mỹ đã dần chuyển sang ủng hộ chính phủ lớn và sự can thiệp của nhà nước, trái ngược với các nguyên tắc tự do cổ điển.
wrong_answers:
  - Những người theo chủ nghĩa tự do châu Âu là những người đầu tiên sử dụng thuật ngữ 'libertarian', buộc người Mỹ phải phân biệt phong trào của họ.
  - Đảng Cộng hòa đã đăng ký nhãn hiệu cho thuật ngữ 'tự do' và ngăn cấm những người theo chủ nghĩa tự do truyền thống sử dụng thuật ngữ này.
  - Những người theo chủ nghĩa tự do cổ điển muốn nhấn mạnh sự ủng hộ của họ đối với các chương trình xã hội như Chính sách Kinh tế Mới (New Deal) và Xã hội Vĩ đại (Great Society).
explanation: |
  Câu trả lời đúng phản ánh sự tiến hóa lịch sử được mô tả trong văn bản. Những người theo chủ nghĩa tự do ở Mỹ dần chuyển từ các nguyên tắc tự do cổ điển sang ủng hộ sự can thiệp rộng rãi của nhà nước, bao gồm các chương trình như Chính sách Kinh tế Mới của FDR và Xã hội Vĩ đại của LBJ. Điều này thể hiện sự khác biệt cơ bản so với sự nhấn mạnh của chủ nghĩa tự do cổ điển vào chính phủ hạn chế và nền kinh tế tự do cạnh tranh. Để tránh nhầm lẫn với ý nghĩa mới này của từ "tự do" ở Mỹ, những người ủng hộ các nguyên tắc tự do cổ điển đã sử dụng thuật ngữ "tự do chủ nghĩa" vào những năm 1960 để phân biệt rõ ràng triết lý can thiệp tối thiểu của nhà nước với các chính sách can thiệp mà những người theo chủ nghĩa tự do ở Mỹ đã chấp nhận.
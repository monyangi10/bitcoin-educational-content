question: การเปลี่ยนแปลงทางประวัติศาสตร์ที่อธิบายว่าทำไมเสรีนิยมคลาสสิกในสหรัฐอเมริกาจึงเริ่มเรียกตัวเองว่า 'ลิเบอร์ทาเรียน' ตั้งแต่ทศวรรษ 1960 คือการที่คำว่า 'เสรีนิยม' ในสหรัฐอเมริกาเริ่มมีความหมายที่เกี่ยวข้องกับนโยบายสังคมและเศรษฐกิจที่มีการแทรกแซงจากรัฐบาลมากขึ้น ในขณะที่เสรีนิยมคลาสสิกเน้นความสำคัญของเสรีภาพส่วนบุคคลและตลาดเสรี ดังนั้นเพื่อแยกแยะตัวเองจากแนวคิดเสรีนิยมที่เปลี่ยนไป พวกเขาจึงเริ่มใช้คำว่า 'ลิเบอร์ทาเรียน' ซึ่งสะท้อนถึงหลักการดั้งเดิมของพวกเขามากกว่า
answer: พวกเสรีนิยมอเมริกันได้พัฒนาไปสู่การสนับสนุนรัฐบาลขนาดใหญ่และการแทรกแซงของรัฐ ซึ่งตรงข้ามกับหลักการเสรีนิยมแบบคลาสสิก
wrong_answers:
  - พวกเสรีนิยมยุโรปได้นำคำว่า 'libertarian' มาใช้ก่อน ทำให้อเมริกันต้องแยกแยะการเคลื่อนไหวของพวกเขา
  - พรรครีพับลิกันได้จดทะเบียนเครื่องหมายการค้าคำว่า 'liberal' และป้องกันไม่ให้กลุ่มเสรีนิยมคลาสสิกใช้คำนี้
  - นักเสรีนิยมคลาสสิกต้องการเน้นย้ำการสนับสนุนของพวกเขาต่อโครงการสังคม เช่น ข้อตกลงใหม่และสังคมที่ยิ่งใหญ่
explanation: |
  คำตอบที่ถูกต้องสะท้อนถึงวิวัฒนาการทางประวัติศาสตร์ที่อธิบายไว้ในข้อความ ชาวอเมริกันที่เรียกว่า 'เสรีนิยม' ค่อยๆ เปลี่ยนจากหลักการเสรีนิยมแบบคลาสสิกไปสู่การสนับสนุนการแทรกแซงของรัฐอย่างกว้างขวาง รวมถึงโครงการต่างๆ เช่น ข้อตกลงใหม่ของ FDR และสังคมที่ยิ่งใหญ่ของ LBJ ซึ่งเป็นการเปลี่ยนแปลงพื้นฐานจากการเน้นย้ำของเสรีนิยมแบบคลาสสิกในเรื่องรัฐบาลที่จำกัดและเศรษฐกิจแบบปล่อยให้เป็นไป เพื่อหลีกเลี่ยงความสับสนกับความหมายใหม่ของคำว่า 'เสรีนิยม' ในอเมริกา ผู้สนับสนุนหลักการเสรีนิยมแบบคลาสสิกจึงนำคำว่า 'ลิเบอร์ทาเรียน' มาใช้ในทศวรรษ 1960 เพื่อแยกแยะปรัชญาของพวกเขาที่เน้นการแทรกแซงของรัฐให้น้อยที่สุดจากนโยบายการแทรกแซงที่ชาวอเมริกันที่เรียกว่า 'เสรีนิยม' ได้ยอมรับไปแล้ว
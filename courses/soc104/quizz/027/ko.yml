question: 미국의 고전적 자유주의자들이 1960년대부터 스스로를 '자유주의자'라고 부르기 시작한 역사적 변화는 무엇으로 설명할 수 있을까요?
answer: 미국의 자유주의자들은 고전적 자유주의 원칙과 달리 큰 정부와 국가 개입을 지지하도록 진화했습니다
wrong_answers:
  - 유럽의 자유주의자들은 '자유주의자'라는 용어를 먼저 채택하여 미국인들이 그들의 운동을 구별하도록 강요했습니다
  - 공화당은 '자유주의자'라는 용어를 상표로 등록하고 고전적 자유주의자들이 이 용어를 사용하지 못하도록 막았습니다
  - 고전적 자유주의자들은 뉴딜과 위대한 사회와 같은 사회 프로그램에 대한 지지를 강조하고 싶었습니다
explanation: |
  정답은 텍스트에 설명된 역사적 진화를 반영한 것입니다. 미국의 '자유주의자'들은 점차 고전적 자유주의 원칙에서 FDR의 뉴딜 정책과 LBJ의 위대한 사회와 같은 프로그램을 포함한 광범위한 국가 개입을 지지하는 방향으로 전환했습니다. 이는 고전적 자유주의가 강조하는 제한적 정부와 자유방임 경제에서 근본적으로 벗어나는 것을 의미했습니다. 미국에서 '자유주의'의 새로운 의미와 혼동을 피하기 위해 고전적 자유주의 원칙을 지지하는 사람들은 1960년대에 '자유주의자'라는 용어를 채택하여 국가 개입을 최소화하는 자신들의 철학을 미국의 '자유주의자'들이 수용하게 된 개입주의 정책과 명확하게 구분했습니다.
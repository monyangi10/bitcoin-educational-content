question: "Amerika Birleşik Devletleri'ndeki klasik liberallerin 1960'lardan itibaren kendilerini neden 'özgürlükçü' olarak adlandırmaya başladıklarını hangi tarihsel değişim açıklamaktadır?"
answer: "Amerikan liberalleri, klasik liberal ilkelerin aksine, büyük hükümet ve devlet müdahalesini destekleyecek şekilde evrimleşmişti"
wrong_answers:
  - "Özgürlükçü terimini ilk olarak Avrupalı liberaller benimsemiş ve Amerikalıları kendi hareketlerini ayırt etmeye zorlamışlardır"
  - "Cumhuriyetçi Parti 'liberal' teriminin ticari markasını aldı ve klasik liberallerin bu terimi kullanmasını engelledi"
  - "Klasik liberaller, New Deal ve Great Society gibi sosyal programlara verdikleri desteği vurgulamak istediler"
explanation: |
  Doğru cevap metinde anlatılan tarihsel evrimi yansıtmaktadır. Amerikan 'liberalleri' yavaş yavaş klasik liberal ilkelerden, FDR'nin New Deal ve LBJ'nin Great Society gibi programları da içeren kapsamlı devlet müdahalesini desteklemeye doğru kaymıştır. Bu, klasik liberalizmin sınırlı hükümet ve laissez-faire ekonomisine yaptığı vurgudan temel bir sapmayı temsil ediyordu. Amerika'da 'liberal' kelimesinin bu yeni anlamıyla karışıklığı önlemek için, klasik liberal ilkelerin destekçileri 1960'larda kendi asgari devlet müdahalesi felsefelerini Amerikan 'liberallerinin' benimsediği müdahaleci politikalardan açıkça ayırmak için 'liberteryen' terimini benimsedi.

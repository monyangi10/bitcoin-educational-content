question: 从 20 世纪 60 年代开始，美国的古典自由主义者开始自称为 "自由主义者"，这是什么历史性转变的原因？
answer: 美国自由主义者逐渐支持大政府和国家干预，这与古典自由主义原则背道而驰
wrong_answers:
  - 欧洲自由主义者首先采用了 "自由主义者 "一词，迫使美国人区分他们的运动
  - 共和党将 "自由派 "一词注册为商标，并阻止经典自由派使用该词
  - 古典自由主义者希望强调他们对新政和 "伟大社会 "等社会计划的支持
explanation: |
  正确答案反映了文中描述的历史演变。美国的 "自由主义者 "逐渐从古典自由主义原则转向支持广泛的国家干预，包括罗斯福新政和伯克利分校的 "伟大社会 "等计划。这从根本上背离了古典自由主义对有限政府和自由放任经济学的强调。为了避免与美国 "自由主义 "的新含义相混淆，古典自由主义原则的支持者在 20 世纪 60 年代采用了 "自由主义者 "这一术语，以明确区分他们的最小国家干预哲学与美国 "自由主义者 "所拥护的干预主义政策。
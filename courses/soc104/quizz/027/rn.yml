question: Ni irihe hinduka ry’amateka risobanura igituma aba liberalisme classique muri Amerika batangura kwiyita ‘aba libertariens’ guhera mu myaka ya 1960?
answer: Abanyamerika b’abanyagihugu bari barateye imbere kugira ngo bashigikire intwaro nini n’ingene Leta igira ico ikoze, bitandukanye n’ingingo ngenderwako za kera z’abanyagihugu .
wrong_answers:
  - Abanyaburaya b’abanyagihugu b’abanyagihugu ni bo babanza kwemera ijambo ‘libertarian’, bituma Abanyamerika batandukanya umuhari wabo .
  - Ishirahamwe ry’abarepubulikani ryashizeho ikimenyetso c’ubudandaji ijambo ‘liberal’ kandi ryabujije aba liberals ba kera kurikoresha .
  - Abanyagihugu b’abanyagihugu bashaka gushimika ku gushigikira porogarama z’imibano nka New Deal na Great Society .
explanation: |
  Inyishu ibereye yerekana ukuntu amateka yahindutse nk’uko vyavuzwe muri ico canditswe. Abanyamerika ‘abanyagihugu b’abanyagihugu’ barahindutse buhoro buhoro bava ku ngingo ngenderwako za kera z’abanyagihugu baja mu gushigikira ubufasha bwa Leta, harimwo na porogarama nka FDR’s New Deal na LBJ’s Great Society. Ivyo vyari bigereranya ugutandukana kw’ishimikiro n’ugushimika kw’uburenganzira bwa kera ku butegetsi bufise aho bugarukira no ku bukungu bw’uburenganzira bwo kwidegemvya. Kugira ngo ntibavyivangane n’iyo nsobanuro nshasha y’ijambo ‘liberal’ muri Amerika, abashigikiye ingingo ngenderwako za kera z’ubwigenge baciye bafata ijambo ‘libertarian’ mu myaka ya 1960 kugira ngo batandukanye neza filozofiya yabo y’uko Leta igira ico ikoze mu buryo bukeyi n’ingingo ngenderwako z’abanyamerika ‘abanyagihugu’ bari baje kwakira.
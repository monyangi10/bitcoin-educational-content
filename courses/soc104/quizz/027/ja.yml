question: 米国の古典的リベラル派が1960年代から自らを「リバタリアン」と呼ぶようになったのは、どのような歴史的変化があったからか？
answer: アメリカのリベラル派は、古典的なリベラルの原則に反して、大きな政府と国家の介入を支持するように発展した。
wrong_answers:
  - ヨーロッパのリベラル派が最初に「リバタリアン」という言葉を採用したため、アメリカ人は自分たちの運動を区別する必要に迫られた。
  - 共和党は「リベラル」という言葉を商標登録し、古典的なリベラル派がこの言葉を使うのを阻止した。
  - 古典的リベラル派は、ニューディールやグレート・ソサエティのような社会計画への支持を強調したかった。
explanation: |
  正解は、本文で述べられている歴史的変遷を反映している。アメリカの「リベラル派」は、古典的自由主義の原則から、FDRのニューディールやLBJのグレート・ソサエティのようなプログラムを含む広範な国家介入を支持する方向に徐々にシフトしていった。これは、限定政府と自由放任経済を重視する古典的自由主義からの根本的な脱却を意味する。アメリカにおける「リベラル」の新しい意味との混同を避けるため、古典的リベラルの支持者は1960年代に「リバタリアン」という用語を採用し、国家の介入を最小限に抑えるという彼らの哲学を、アメリカの「リベラル」が受け入れるようになった介入主義的政策と明確に区別するようになった。
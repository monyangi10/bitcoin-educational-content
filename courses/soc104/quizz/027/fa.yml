question: چه تغییری تاریخی توضیح می‌دهد که چرا لیبرال‌های کلاسیک در ایالات متحده از دهه ۱۹۶۰ شروع به نامیدن خود به عنوان 'لیبرتارین' کردند؟
answer: لیبرال‌های آمریکایی به حمایت از دولت بزرگ و مداخله دولتی تکامل یافته‌اند، برخلاف اصول لیبرالیسم کلاسیک.
wrong_answers:
  - لیبرال‌های اروپایی ابتدا اصطلاح 'لیبرتارین' را پذیرفتند و آمریکایی‌ها را مجبور کردند تا جنبش خود را متمایز کنند.
  - حزب جمهوری‌خواه اصطلاح 'لیبرال' را به عنوان علامت تجاری ثبت کرد و از استفاده لیبرال‌های کلاسیک از آن جلوگیری کرد.
  - لیبرال‌های کلاسیک می‌خواستند حمایت خود را از برنامه‌های اجتماعی مانند نیو دیل و جامعه بزرگ برجسته کنند.
explanation: |
  پاسخ صحیح بازتاب‌دهنده تکامل تاریخی توصیف‌شده در متن است. 'لیبرال‌های' آمریکایی به تدریج از اصول لیبرالیسم کلاسیک به سمت حمایت از مداخله گسترده دولت، از جمله برنامه‌هایی مانند نیو دیل اف‌دی‌آر و جامعه بزرگ ال‌بی‌جی، حرکت کردند. این تغییر اساسی از تأکید لیبرالیسم کلاسیک بر دولت محدود و اقتصاد لسه‌فر بود. برای جلوگیری از سردرگمی با این معنای جدید 'لیبرال' در آمریکا، حامیان اصول لیبرالیسم کلاسیک در دهه ۱۹۶۰ اصطلاح 'لیبرتارین' را پذیرفتند تا فلسفه خود را که بر مداخله حداقلی دولت تأکید دارد، به وضوح از سیاست‌های مداخله‌گرایانه‌ای که 'لیبرال‌های' آمریکایی به آن روی آورده بودند، متمایز کنند.
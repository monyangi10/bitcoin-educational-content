question: Vilken historisk förändring förklarar varför klassiska liberaler i USA började kalla sig "libertarianer" från och med 1960-talet?
answer: Amerikanska liberaler hade utvecklats till att stödja stora regeringar och statliga ingripanden, i strid med klassiska liberala principer
wrong_answers:
  - Europeiska liberaler använde först termen "libertarian", vilket tvingade amerikanerna att särskilja sin rörelse
  - Republikanska partiet varumärkesskyddade termen "liberal" och hindrade klassiska liberaler från att använda den
  - Klassiska liberaler ville betona sitt stöd för sociala program som New Deal och Great Society
explanation: |
  Det korrekta svaret återspeglar den historiska utveckling som beskrivs i texten. Amerikanska "liberaler" övergick gradvis från klassiska liberala principer till att stödja omfattande statliga ingripanden, inklusive program som FDR:s New Deal och LBJ:s Great Society. Detta innebar ett fundamentalt avsteg från den klassiska liberalismens betoning på begränsad statsmakt och laissez-faire-ekonomi. För att undvika förväxling med denna nya betydelse av "liberal" i USA antog anhängare av klassiskt liberala principer termen "libertarian" på 1960-talet för att tydligt skilja sin filosofi om minimal statlig intervention från den interventionistiska politik som amerikanska "liberaler" hade kommit att omfatta.
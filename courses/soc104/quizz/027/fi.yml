question: Mikä historiallinen muutos selittää sen, miksi klassiset liberaalit alkoivat kutsua itseään libertaristeiksi 1960-luvulta alkaen?
answer: Amerikkalaiset liberaalit olivat kehittyneet tukemaan suurta hallintoa ja valtion väliintuloa klassisten liberaalien periaatteiden vastaisesti
wrong_answers:
  - Eurooppalaiset liberaalit käyttivät ensin termiä "libertarian", mikä pakotti amerikkalaiset erottamaan liikkeensä toisistaan
  - Republikaaninen puolue suojasi termin "liberaali" ja esti klassisia liberaaleja käyttämästä sitä
  - Klassiset liberaalit halusivat korostaa tukeaan sosiaalisille ohjelmille, kuten New Dealille ja Great Societylle
explanation: |
  Oikea vastaus kuvastaa tekstissä kuvattua historiallista kehitystä. Amerikkalaiset "liberaalit" siirtyivät vähitellen klassisista liberaaleista periaatteista tukemaan laajaa valtion väliintuloa, mukaan lukien FDR:n New Deal ja LBJ:n Great Society -ohjelmat. Tämä merkitsi perustavanlaatuista poikkeamista klassisen liberalismin painotuksesta, joka koski rajoitettua hallintoa ja laissez-faire-taloutta. Välttääkseen sekaannuksia tämän uuden "liberaalin" merkityksen kanssa Amerikassa klassisen liberaalin periaatteiden kannattajat ottivat 1960-luvulla käyttöön termin "libertaristi" erottaakseen selkeästi valtion minimaalisen puuttumisen filosofiansa interventiopolitiikasta, jota amerikkalaiset "liberaalit" olivat omaksuneet.
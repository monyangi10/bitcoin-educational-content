question: Koji istorijski pomak objašnjava zašto su klasični liberali u Sjedinjenim Državama počeli da se nazivaju 'libertarijancima' počevši od 1960-ih?
answer: Američki liberali su evoluirali da podržavaju veliku vladu i državnu intervenciju, suprotno klasičnim liberalnim principima.
wrong_answers:
  - Evropski liberali su prvi usvojili termin 'libertarijanac', primoravajući Amerikance da razlikuju svoj pokret.
  - Republikanska stranka je zaštitila termin 'liberal' i sprečila klasične liberale da ga koriste.
  - Klasični liberali želeli su da istaknu svoju podršku socijalnim programima poput New Deala i Great Society.
explanation: |
  Tačan odgovor odražava istorijsku evoluciju opisanu u tekstu. Američki 'liberali' su postepeno prešli sa klasičnih liberalnih principa ka podršci opsežnoj državnoj intervenciji, uključujući programe poput FDR-ovog New Deal-a i LBJ-ovog Great Society-a. Ovo je predstavljalo fundamentalno odstupanje od naglaska klasičnog liberalizma na ograničenu vladu i laissez-faire ekonomiju. Da bi izbegli zabunu sa ovim novim značenjem 'liberalnog' u Americi, pristalice klasičnih liberalnih principa usvojile su termin 'libertarijanac' 1960-ih kako bi jasno razlikovale svoju filozofiju minimalne državne intervencije od intervencionističkih politika koje su američki 'liberali' počeli da prihvataju.
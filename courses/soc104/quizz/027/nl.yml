question: Welke historische verschuiving verklaart waarom klassiek-liberalen in de Verenigde Staten zichzelf vanaf de jaren '60 'libertariërs' begonnen te noemen?
answer: Amerikaanse liberalen waren geëvolueerd naar voorstanders van een grote overheid en staatsinterventie, in tegenstelling tot de klassieke liberale principes
wrong_answers:
  - Europese liberalen gebruikten de term 'libertair' als eerste, waardoor Amerikanen gedwongen werden om hun beweging te onderscheiden van andere bewegingen
  - De Republikeinse Partij heeft de term 'liberaal' als handelsmerk en verhindert klassieke liberalen om hem te gebruiken
  - Klassiek liberalen wilden hun steun voor sociale programma's zoals de New Deal en Great Society benadrukken
explanation: |
  Het juiste antwoord weerspiegelt de historische evolutie die in de tekst wordt beschreven. Amerikaanse 'liberalen' verschoven geleidelijk van klassiek-liberale principes naar het ondersteunen van uitgebreide staatsinterventie, inclusief programma's als FDR's New Deal en LBJ's Great Society. Dit betekende een fundamentele breuk met de nadruk die het klassieke liberalisme legde op beperkte overheid en laissez-faire economie. Om verwarring met deze nieuwe betekenis van 'liberaal' in Amerika te voorkomen, namen aanhangers van klassiek-liberale principes in de jaren 1960 de term 'libertair' aan om hun filosofie van minimale staatsinterventie duidelijk te onderscheiden van het interventionistische beleid dat Amerikaanse 'liberalen' waren gaan omarmen.
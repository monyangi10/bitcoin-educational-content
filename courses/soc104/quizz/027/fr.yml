question: What historical shift explains why classical liberals in the United States began calling themselves 'libertarians' starting in the 1960s?
answer: American liberals had evolved to support big government and state intervention, contrary to classical liberal principles
wrong_answers:
  - "European liberals adopted the term 'libertarian' first, forcing Americans to distinguish their movement"
  - "The Republican Party trademarked the term 'liberal' and prevented classical liberals from using it"
  - Classical liberals wanted to emphasize their support for social programs like the New Deal and Great Society
explanation: |
  The correct answer reflects the historical evolution described in the text. American 'liberals' gradually shifted from classical liberal principles toward supporting extensive state intervention, including programs like FDR's New Deal and LBJ's Great Society. This represented a fundamental departure from classical liberalism's emphasis on limited government and laissez-faire economics. To avoid confusion with this new meaning of 'liberal' in America, supporters of classical liberal principles adopted the term 'libertarian' in the 1960s to clearly distinguish their philosophy of minimal state intervention from the interventionist policies that American 'liberals' had come to embrace.

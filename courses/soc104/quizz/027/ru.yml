question: Какой исторический сдвиг объясняет, почему классические либералы в США начали называть себя "либертарианцами" начиная с 1960-х годов?
answer: Американские либералы стали поддерживать большое правительство и государственное вмешательство, что противоречило классическим либеральным принципам
wrong_answers:
  - Европейские либералы первыми приняли термин "либертарианец", что вынудило американцев выделить свое движение
  - Республиканская партия закрепила за собой торговую марку "либерал" и не позволяет классическим либералам использовать этот термин
  - Классические либералы хотели подчеркнуть свою поддержку таких социальных программ, как "Новый курс" и "Великое общество"
explanation: |
  Правильный ответ отражает историческую эволюцию, описанную в тексте. Американские "либералы" постепенно отошли от классических либеральных принципов в сторону поддержки широкого государственного вмешательства, включая такие программы, как "Новый курс" Рузвельта и "Великое общество" ЛБДж. Это стало фундаментальным отходом от классического либерализма, в котором акцент делался на ограниченном правительстве и экономике laissez-faire. Чтобы избежать путаницы с этим новым значением слова "либерал" в Америке, сторонники классических либеральных принципов в 1960-х годах приняли термин "либертарианец", чтобы четко отличать свою философию минимального государственного вмешательства от интервенционистской политики, которую стали проводить американские "либералы".
question: Welcher historische Wandel erklärt, warum sich die klassischen Liberalen in den Vereinigten Staaten seit den 1960er Jahren als "Libertäre" bezeichneten?
answer: Die amerikanischen Liberalen hatten sich im Gegensatz zu den klassischen liberalen Grundsätzen zu Befürwortern einer großen Regierung und staatlicher Eingriffe entwickelt
wrong_answers:
  - Die europäischen Liberalen übernahmen den Begriff "libertär" zuerst und zwangen die Amerikaner, ihre Bewegung zu unterscheiden
  - Die Republikanische Partei hat sich den Begriff "liberal" schützen lassen und die klassischen Liberalen daran gehindert, ihn zu verwenden
  - Die klassischen Liberalen wollten ihre Unterstützung für Sozialprogramme wie den New Deal und die Great Society betonen
explanation: |
  Die richtige Antwort spiegelt die im Text beschriebene historische Entwicklung wider. Die amerikanischen "Liberalen" wandten sich allmählich von den klassischen liberalen Grundsätzen ab und befürworteten umfangreiche staatliche Eingriffe, darunter Programme wie FDRs New Deal und LBJs Great Society. Dies stellte eine grundlegende Abkehr vom klassischen Liberalismus dar, der sich auf eine begrenzte Regierung und eine Laissez-faire-Wirtschaft konzentrierte. Um Verwechslungen mit dieser neuen Bedeutung des Begriffs "liberal" in Amerika zu vermeiden, übernahmen die Anhänger klassischer liberaler Prinzipien in den 1960er Jahren den Begriff "libertär", um ihre Philosophie minimaler staatlicher Eingriffe klar von der interventionistischen Politik zu unterscheiden, die die amerikanischen "Liberalen" inzwischen verfolgten.
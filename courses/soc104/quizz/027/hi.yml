question: वह कौन सा ऐतिहासिक परिवर्तन है जो यह समझाता है कि संयुक्त राज्य अमेरिका में शास्त्रीय उदारवादियों ने 1960 के दशक से खुद को 'स्वतंत्रतावादी' कहना क्यों शुरू कर दिया?
answer: अमेरिकी उदारवादियों का झुकाव बड़े सरकारी तंत्र और राज्य के हस्तक्षेप का समर्थन करने की ओर हो गया था, जो शास्त्रीय उदारवादी सिद्धांतों के विपरीत था।
wrong_answers:
  - यूरोपीय उदारवादियों ने सबसे पहले 'स्वतंत्रतावादी' शब्द को अपनाया, जिसके कारण अमेरिकियों को अपने आंदोलन को इससे अलग पहचान देनी पड़ी।
  - रिपब्लिकन पार्टी ने 'उदारवादी' शब्द को ट्रेडमार्क करा लिया और शास्त्रीय उदारवादियों को इसका इस्तेमाल करने से रोक दिया।
  - शास्त्रीय उदारवादी न्यू डील और ग्रेट सोसाइटी जैसे सामाजिक कार्यक्रमों के प्रति अपने समर्थन पर ज़ोर देना चाहते थे।
explanation: |
  सही उत्तर पाठ में वर्णित ऐतिहासिक विकास को दर्शाता है। अमेरिकी 'उदारवादी' धीरे-धीरे शास्त्रीय उदारवादी सिद्धांतों से हटकर व्यापक राज्य हस्तक्षेप का समर्थन करने लगे, जिसमें एफडीआर की न्यू डील और एलबीजे की ग्रेट सोसाइटी जैसी योजनाएँ शामिल थीं। यह सीमित सरकार और मुक्त बाज़ार अर्थव्यवस्था पर ज़ोर देने वाले शास्त्रीय उदारवाद से एक मौलिक विचलन था। अमेरिका में 'उदारवादी' के इस नए अर्थ के साथ भ्रम से बचने के लिए, शास्त्रीय उदारवादी सिद्धांतों के समर्थकों ने 1960 के दशक में 'स्वतंत्रतावादी' शब्द को अपनाया ताकि न्यूनतम राज्य हस्तक्षेप के अपने दर्शन को उन हस्तक्षेपवादी नीतियों से स्पष्ट रूप से अलग किया जा सके जिन्हें अमेरिकी 'उदारवादियों' ने अपना लिया था।
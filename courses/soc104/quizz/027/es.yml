question: ¿Qué cambio histórico explica por qué los liberales clásicos de Estados Unidos empezaron a llamarse a sí mismos "libertarios" a partir de la década de 1960?
answer: Los liberales estadounidenses habían evolucionado hasta apoyar el gran gobierno y la intervención estatal, en contra de los principios liberales clásicos
wrong_answers:
  - Los liberales europeos adoptaron primero el término "libertario", obligando a los estadounidenses a distinguir su movimiento
  - El Partido Republicano registró el término "liberal" e impidió que los liberales clásicos lo utilizaran
  - Los liberales clásicos querían enfatizar su apoyo a programas sociales como el New Deal y la Gran Sociedad
explanation: |
  La respuesta correcta refleja la evolución histórica descrita en el texto. Los "liberales" estadounidenses se apartaron gradualmente de los principios liberales clásicos para apoyar una amplia intervención estatal, incluidos programas como el New Deal de FDR y la Gran Sociedad de LBJ. Esto representó un alejamiento fundamental del énfasis del liberalismo clásico en el gobierno limitado y la economía del laissez-faire. Para evitar la confusión con este nuevo significado de "liberal" en Estados Unidos, los partidarios de los principios liberales clásicos adoptaron el término "libertario" en la década de 1960 para distinguir claramente su filosofía de intervención estatal mínima de las políticas intervencionistas que los "liberales" estadounidenses habían llegado a adoptar.
question: Ni mabadiliko gani ya kihistoria yanayoelezea kwa nini waliberali wa kitamaduni nchini Marekani walianza kujiita 'waliberali' kuanzia miaka ya 1960?
answer: Wamarekani waliberali walikuwa wamebadilika ili kuunga mkono uingiliaji kati wa serikali kubwa na serikali, kinyume na kanuni za kiliberali za kitamaduni
wrong_answers:
  - Watetezi wa haki za binaadamu wa Ulaya walipitisha neno 'mliberali' kwanza, na kuwalazimisha Wamarekani kutofautisha harakati zao
  - Chama cha Republican kilitumia neno 'liliberali' kama alama ya biashara na kuwazuia waliberali wa kitamaduni kulitumia
  - Waliberali wa kitamaduni walitaka kusisitiza uungaji wao mkono kwa programu za kijamii kama vile Mpango Mpya na Jumuiya Kubwa
explanation: |
  Jibu sahihi linaonyesha mageuko ya kihistoria yaliyoelezwa katika maandishi. 'Waliberali' wa Marekani walibadilika polepole kutoka kwa kanuni za kiliberali za kitamaduni hadi kuunga mkono uingiliaji kati mkubwa wa serikali, ikiwa ni pamoja na programu kama vile Mpango Mpya wa FDR na Jumuiya Kuu ya LBJ. Hii iliwakilisha tofauti ya msingi kutoka kwa msisitizo wa kiliberali wa kitamaduni juu ya serikali ndogo na uchumi wa laissez-faire. Ili kuepuka mkanganyiko na maana hii mpya ya 'uliberali' nchini Marekani, wafuasi wa kanuni za kiliberali za kitamaduni walitumia neno 'mliberali' katika miaka ya 1960 ili kutofautisha wazi falsafa yao ya uingiliaji kati mdogo wa serikali na sera za uingiliaji kati ambazo 'waliberali' wa Marekani walikuwa wamekumbatia.
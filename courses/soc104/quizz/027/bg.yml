question: Коя историческа промяна обяснява защо класическите либерали в САЩ започват да се наричат "либертарианци" от 60-те години на ХХ век?
answer: Американските либерали са се превърнали в поддръжници на голямото правителство и държавната намеса, което противоречи на класическите либерални принципи
wrong_answers:
  - Европейските либерали първи възприемат термина "либертарианци", което принуждава американците да разграничат своето движение
  - Републиканската партия запазва търговската марка на термина "либерален" и не позволява на класическите либерали да го използват
  - Класическите либерали искаха да подчертаят подкрепата си за социални програми като "Новия курс" и "Великото общество"
explanation: |
  Правилният отговор отразява историческата еволюция, описана в текста. Американските "либерали" постепенно се изместват от класическите либерални принципи към подкрепа на широката държавна намеса, включително програми като "Новия курс" на ФДР и "Великото общество" на ЛБДЖ. Това представлява фундаментално отклонение от акцента на класическия либерализъм върху ограниченото правителство и laissez-faire икономиката. За да избегнат объркване с това ново значение на "либерален" в Америка, поддръжниците на класическите либерални принципи приемат термина "либертариански" през 60-те години на ХХ век, за да разграничат ясно философията си за минимална държавна намеса от интервенционистките политики, които американските "либерали" са започнали да възприемат.
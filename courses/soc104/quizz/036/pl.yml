question: Według Miltona Friedmana, dlaczego programy społeczne dla ubogich często nie osiągają swoich celów?
answer: Ponieważ powodują one niekorzystne skutki, takie jak zależność gospodarcza i zakłócenia rynku
wrong_answers:
  - Ponieważ ich sponsorom brakuje dobrych intencji i hojności wobec potrzebujących
  - Ponieważ nie mają wystarczających funduszy, aby zaspokoić rzeczywiste potrzeby
  - Ponieważ beneficjenci nie rozumieją, jak skutecznie korzystać z tych programów
explanation: |
  Friedman wskazuje, że polityki społeczne, pomimo ich hojnych intencji, często zawodzą, ponieważ nie uwzględniają rygorystycznej analizy ludzkich zachęt i zachowań. Programy te wywołują nieprzewidziane skutki uboczne, takie jak zależność ekonomiczna lub zniekształcenie rynku, przynosząc rezultaty sprzeczne z początkowymi celami.
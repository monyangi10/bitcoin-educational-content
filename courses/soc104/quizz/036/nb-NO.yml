question: Hvorfor mislykkes sosiale programmer for fattige ofte i å nå sine mål, ifølge Milton Friedman?
answer: Fordi de skaper perverse effekter som økonomisk avhengighet og markedsvridninger
wrong_answers:
  - Fordi sponsorene deres mangler gode intensjoner og generøsitet overfor de trengende
  - Fordi de ikke har nok midler til å dekke reelle behov
  - Fordi mottakerne ikke forstår hvordan de skal bruke disse programmene effektivt
explanation: |
  Friedman påpeker at sosialpolitikken, til tross for sine sjenerøse intensjoner, ofte mislykkes fordi den ikke tar hensyn til en grundig analyse av menneskelige insentiver og atferd. Disse programmene skaper uforutsette perverse effekter, som økonomisk avhengighet eller markedsvridning, og gir resultater som går på tvers av de opprinnelige målene.
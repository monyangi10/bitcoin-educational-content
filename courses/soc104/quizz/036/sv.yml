question: Varför misslyckas sociala program för fattiga ofta med att uppnå sina mål, enligt Milton Friedman?
answer: Eftersom de skapar perversa effekter såsom ekonomiskt beroende och snedvridningar av marknaden
wrong_answers:
  - För att deras sponsorer saknar goda avsikter och generositet gentemot de behövande
  - Eftersom de inte har tillräckligt med finansiering för att tillgodose verkliga behov
  - Eftersom mottagarna inte förstår hur de ska använda dessa program på ett effektivt sätt
explanation: |
  Friedman påpekar att socialpolitiken, trots sina generösa avsikter, ofta misslyckas eftersom den inte tar hänsyn till den rigorösa analysen av mänskliga incitament och beteenden. Dessa program skapar oförutsedda perversa effekter, t.ex. ekonomiskt beroende eller snedvridning av marknaden, vilket ger resultat som går stick i stäv med de ursprungliga målen.
question: Selon Milton Friedman, pourquoi les programmes sociaux destinés aux pauvres échouent-ils souvent à atteindre leurs objectifs?
answer: Parce qu'ils créent des effets pervers comme la dépendance économique et les distorsions de marché
wrong_answers:
  - Parce que leurs sponsors manquent de bonnes intentions et de générosité envers les nécessiteux
  - "Parce qu'ils ne disposent pas de financements suffisants pour répondre aux besoins réels"
  - Parce que les bénéficiaires ne comprennent pas comment utiliser efficacement ces programmes
explanation: |
  Friedman souligne que les politiques sociales, malgré leurs intentions généreuses, échouent souvent car elles ne prennent pas en compte l'analyse rigoureuse des incitations et des comportements humains. Ces programmes créent des effets pervers non anticipés comme la dépendance économique ou la distorsion des marchés, produisant des résultats opposés aux objectifs initiaux.

question: Theo Milton Friedman, tại sao các chương trình xã hội dành cho người nghèo thường thất bại trong việc đạt được mục tiêu của chúng?
answer: Vì chúng tạo ra những tác động tiêu cực như sự phụ thuộc kinh tế và sự méo mó thị trường.
wrong_answers:
  - Bởi vì những người tài trợ cho họ thiếu thiện chí và lòng hào phóng đối với người nghèo.
  - Vì họ không có đủ kinh phí để đáp ứng nhu cầu thực tế.
  - Vì người hưởng lợi không hiểu cách sử dụng các chương trình này một cách hiệu quả.
explanation: |
  Friedman chỉ ra rằng các chính sách xã hội, bất chấp những ý định tốt đẹp của chúng, thường thất bại vì chúng không tính đến việc phân tích kỹ lưỡng các động cơ và hành vi của con người. Những chương trình này tạo ra những tác động tiêu cực không lường trước được, chẳng hạn như sự phụ thuộc kinh tế hoặc sự bóp méo thị trường, dẫn đến những kết quả trái ngược với mục tiêu ban đầu.
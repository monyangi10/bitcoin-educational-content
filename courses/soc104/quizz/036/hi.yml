question: मिल्टन फ्रीडमैन के अनुसार, गरीबों के लिए बनाए गए सामाजिक कार्यक्रम अक्सर अपने उद्देश्यों को प्राप्त करने में विफल क्यों हो जाते हैं?
answer: क्योंकि इनसे आर्थिक निर्भरता और बाजार विकृतियों जैसे प्रतिकूल प्रभाव उत्पन्न होते हैं।
wrong_answers:
  - क्योंकि उनके प्रायोजकों में जरूरतमंदों के प्रति नेक इरादे और उदारता का अभाव है।
  - क्योंकि उनके पास वास्तविक जरूरतों को पूरा करने के लिए पर्याप्त धन नहीं है।
  - क्योंकि लाभार्थियों को इन कार्यक्रमों का प्रभावी ढंग से उपयोग करने का तरीका समझ में नहीं आता है।
explanation: |
  फ्रीडमैन बताते हैं कि सामाजिक नीतियां, अपने उदार इरादों के बावजूद, अक्सर विफल हो जाती हैं क्योंकि वे मानवीय प्रेरणाओं और व्यवहार के गहन विश्लेषण को ध्यान में नहीं रखतीं। ये कार्यक्रम अप्रत्याशित प्रतिकूल प्रभाव पैदा करते हैं, जैसे आर्थिक निर्भरता या बाजार विकृति, जिससे ऐसे परिणाम निकलते हैं जो प्रारंभिक उद्देश्यों के विपरीत होते हैं।
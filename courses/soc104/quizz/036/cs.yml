question: Proč podle Miltona Friedmana sociální programy pro chudé často nedosahují svých cílů?
answer: Protože vytvářejí škodlivé účinky, jako je ekonomická závislost a narušení trhu
wrong_answers:
  - Protože jejich sponzoři nemají dobré úmysly a velkorysost vůči potřebným
  - Protože nemají dostatek finančních prostředků na uspokojení skutečných potřeb
  - Protože příjemci nerozumí tomu, jak tyto programy účinně využívat
explanation: |
  Friedman poukazuje na to, že sociální politiky navzdory svým velkorysým záměrům často selhávají, protože neberou v úvahu důkladnou analýzu lidských podnětů a chování. Tyto programy vytvářejí nepředvídané zvrácené účinky, jako je ekonomická závislost nebo narušení trhu, což vede k výsledkům, které jsou v rozporu s původními cíli.
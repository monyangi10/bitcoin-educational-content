question: Prema Miltonu Friedmanu, zašto socijalni programi za siromašne često ne uspevaju da ostvare svoje ciljeve?
answer: Zato što stvaraju perverzne efekte kao što su ekonomska zavisnost i distorzije tržišta
wrong_answers:
  - Zato što njihovim sponzorima nedostaju dobre namere i velikodušnost prema onima kojima je pomoć potrebna.
  - Zato što nemaju dovoljno sredstava da zadovolje stvarne potrebe
  - Zato što korisnici ne razumeju kako da koriste ove programe efikasno
explanation: |
  Friedman ističe da socijalne politike, uprkos svojim velikodušnim namerama, često ne uspevaju jer ne uzimaju u obzir rigoroznu analizu ljudskih podsticaja i ponašanja. Ovi programi stvaraju nepredviđene perverzne efekte, kao što su ekonomska zavisnost ili distorzija tržišta, proizvodeći rezultate koji su suprotni početnim ciljevima.
question: Nk’uko Milton Friedman abivuga, ni kubera iki porogarama zo gufasha abakene akenshi zidashika ku ntumbero zazo?
answer: Kuko zituma habaho ingaruka mbi nk’ugushingira ku bukungu no guhindura isoko .
wrong_answers:
  - Kuko ababatera inkunga babuze imigambi myiza n’ubugwaneza ku bakene .
  - Kuko nta mahera ahagije bafise yo gushitsa ivyo bakeneye vy’ukuri .
  - Kubera ko abaronka iyo porogarama badatahura ingene bokoresha neza izo porogarama .
explanation: |
  Friedman yerekana ko politike z’imibano, naho zifise imigambi y’ubugwaneza, akenshi zitazoshika kubera ko zitazirikana icegeranyo gikomeye c’ibintu bitera intege n’inyifato vy’abantu. Izo porogarama zituma haba ingaruka mbi zitari zitezwe, nk’ugushingira ku butunzi canke uguhindura isoko, bikazana ingaruka ziteye kubiri n’intumbero z’intango.
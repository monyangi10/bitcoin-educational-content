question: ミルトン・フリードマンによれば、なぜ貧困層に対する社会プログラムはしばしば目的を達成できないのか？
answer: 経済依存や市場の歪みといった逆効果を生むからだ。
wrong_answers:
  - スポンサーに善意と恵まれない人々に対する寛大さが欠けているからだ。
  - 真のニーズに応えるだけの資金がないからだ。
  - 受益者がこれらのプログラムの効果的な利用方法を理解していないためである。
explanation: |
  フリードマンは、社会政策はその寛大な意図にもかかわらず、人間のインセンティブや行動の厳密な分析を考慮していないため、しばしば失敗すると指摘している。こうしたプログラムは、経済依存や市場の歪みといった予期せぬ逆効果を生み出し、当初の目的とは逆の結果を生む。
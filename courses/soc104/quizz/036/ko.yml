question: 밀턴 프리드먼에 따르면, 빈곤층을 위한 사회 프로그램이 목표를 달성하지 못하는 경우가 많은 이유는 무엇일까요?
answer: 경제적 의존성 및 시장 왜곡과 같은 왜곡된 효과를 초래하기 때문입니다
wrong_answers:
  - 후원자의 선한 의도와 불우이웃에 대한 관대함이 부족하기 때문입니다
  - 실제 요구 사항을 충족하기에 충분한 자금이 없기 때문입니다
  - 수혜자들이 이러한 프로그램을 효과적으로 사용하는 방법을 이해하지 못하기 때문입니다
explanation: |
  프리드먼은 사회 정책은 좋은 의도에도 불구하고 인간의 인센티브와 행동에 대한 엄격한 분석을 고려하지 않아 실패하는 경우가 많다고 지적합니다. 이러한 프로그램은 경제적 의존이나 시장 왜곡과 같은 예상치 못한 역효과를 초래하여 당초 목표와 상반되는 결과를 낳습니다.
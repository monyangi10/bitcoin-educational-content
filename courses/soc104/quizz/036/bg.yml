question: Защо според Милтън Фридман социалните програми за бедните често не постигат целите си?
answer: Тъй като те създават вредни ефекти, като икономическа зависимост и пазарни изкривявания
wrong_answers:
  - Защото спонсорите им нямат добри намерения и щедрост към нуждаещите се
  - Защото не разполагат с достатъчно средства, за да посрещнат реалните нужди
  - Тъй като бенефициентите не разбират как да използват тези програми ефективно
explanation: |
  Фридман посочва, че социалните политики, въпреки благородните си намерения, често се провалят, защото не отчитат строгия анализ на човешките стимули и поведение. Тези програми създават непредвидени обратни ефекти, като икономическа зависимост или изкривяване на пазара, което води до резултати, противоречащи на първоначалните цели.
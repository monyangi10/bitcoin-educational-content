question: ตามที่มิลตัน ฟรีดแมนกล่าว ทำไมโครงการสังคมสำหรับคนยากจนมักล้มเหลวในการบรรลุวัตถุประสงค์ของพวกเขา?
answer: เพราะพวกเขาสร้างผลกระทบที่ผิดเพี้ยน เช่น การพึ่งพาทางเศรษฐกิจและการบิดเบือนตลาด
wrong_answers:
  - เพราะผู้สนับสนุนของพวกเขาขาดเจตนาดีและความเอื้อเฟื้อต่อผู้ยากไร้
  - เพราะพวกเขาไม่มีเงินทุนเพียงพอที่จะตอบสนองความต้องการที่แท้จริง
  - เนื่องจากผู้รับผลประโยชน์ไม่เข้าใจวิธีการใช้โปรแกรมเหล่านี้อย่างมีประสิทธิภาพ
explanation: |
  ฟรีดแมนชี้ให้เห็นว่านโยบายทางสังคม แม้จะมีเจตนาที่เอื้อเฟื้อเผื่อแผ่ แต่มักล้มเหลวเพราะไม่ได้คำนึงถึงการวิเคราะห์อย่างเข้มงวดเกี่ยวกับแรงจูงใจและพฤติกรรมของมนุษย์ โปรแกรมเหล่านี้สร้างผลกระทบที่ไม่คาดคิด เช่น การพึ่งพาทางเศรษฐกิจหรือการบิดเบือนตลาด ซึ่งก่อให้เกิดผลลัพธ์ที่ตรงกันข้ามกับวัตถุประสงค์เริ่มแรก
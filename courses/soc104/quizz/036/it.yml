question: Secondo Milton Friedman, perché i programmi sociali per i poveri spesso non raggiungono i loro obiettivi?
answer: Perché creano effetti perversi come la dipendenza economica e le distorsioni del mercato
wrong_answers:
  - Perché i loro sponsor non hanno buone intenzioni e generosità verso i bisognosi
  - Perché non hanno fondi sufficienti per soddisfare i bisogni reali
  - Perché i beneficiari non capiscono come utilizzare questi programmi in modo efficace
explanation: |
  Friedman sottolinea che le politiche sociali, nonostante le loro generose intenzioni, spesso falliscono perché non tengono conto di un'analisi rigorosa degli incentivi e dei comportamenti umani. Questi programmi creano effetti perversi non previsti, come la dipendenza economica o la distorsione del mercato, producendo risultati contrari agli obiettivi iniziali.
question: Kulingana na Milton Friedman, kwa nini programu za kijamii kwa ajili ya maskini mara nyingi hushindwa kufikia malengo yao?
answer: Kwa sababu husababisha athari potofu kama vile utegemezi wa kiuchumi na upotoshaji wa soko
wrong_answers:
  - Kwa sababu wadhamini wao hawana nia njema na ukarimu kwa wahitaji
  - Kwa sababu hawana fedha za kutosha kukidhi mahitaji halisi
  - Kwa sababu walengwa hawaelewi jinsi ya kutumia programu hizi kwa ufanisi
explanation: |
  Friedman anasema kwamba sera za kijamii, licha ya nia zao nzuri, mara nyingi hushindwa kwa sababu hazizingatii uchambuzi mkali wa motisha na tabia za binadamu. Programu hizi huunda athari potofu zisizotarajiwa, kama vile utegemezi wa kiuchumi au upotoshaji wa soko, na kutoa matokeo ambayo yanapingana na malengo ya awali.
question: Warum, so Milton Friedman, verfehlen Sozialprogramme für die Armen oft ihre Ziele?
answer: Weil sie perverse Effekte wie wirtschaftliche Abhängigkeit und Marktverzerrungen verursachen
wrong_answers:
  - Weil es ihren Sponsoren an guten Absichten und Großzügigkeit gegenüber den Bedürftigen fehlt
  - Weil sie nicht genug Mittel haben, um den tatsächlichen Bedarf zu decken
  - Weil die Begünstigten nicht wissen, wie sie diese Programme effektiv nutzen können
explanation: |
  Friedman weist darauf hin, dass sozialpolitische Maßnahmen trotz ihrer großzügigen Absichten oft scheitern, weil sie die rigorose Analyse menschlicher Anreize und Verhaltensweisen nicht berücksichtigen. Diese Programme führen zu unvorhergesehenen perversen Effekten wie wirtschaftlicher Abhängigkeit oder Marktverzerrungen und damit zu Ergebnissen, die den ursprünglichen Zielen zuwiderlaufen.
question: According to Milton Friedman, why do social programs for the poor often fail to achieve their objectives?
answer: Because they create perverse effects such as economic dependence and market distortions
wrong_answers:
  - Because their sponsors lack good intentions and generosity towards the needy
  - "Because they don't have enough funding to meet real needs"
  - Because beneficiaries do not understand how to use these programs effectively
explanation: |
  Friedman points out that social policies, despite their generous intentions, often fail because they do not take into account the rigorous analysis of human incentives and behavior. These programs create unanticipated perverse effects, such as economic dependence or market distortion, producing results that run counter to the initial objectives.
question: Waarom slagen sociale programma's voor de armen er volgens Milton Friedman vaak niet in om hun doelen te bereiken?
answer: Omdat ze perverse effecten creëren zoals economische afhankelijkheid en marktverstoringen
wrong_answers:
  - Omdat het hun sponsors ontbreekt aan goede bedoelingen en vrijgevigheid tegenover de behoeftigen
  - Omdat ze niet genoeg geld hebben om aan de werkelijke behoeften te voldoen
  - Omdat begunstigden niet begrijpen hoe ze deze programma's effectief kunnen gebruiken
explanation: |
  Friedman wijst erop dat sociaal beleid, ondanks zijn genereuze bedoelingen, vaak mislukt omdat het geen rekening houdt met de rigoureuze analyse van menselijke prikkels en gedrag. Deze programma's creëren onverwachte perverse effecten, zoals economische afhankelijkheid of marktverstoring, waardoor resultaten ontstaan die tegen de oorspronkelijke doelstellingen ingaan.
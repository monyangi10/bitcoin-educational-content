question: Segundo Milton Friedman, por que razão os programas sociais para os pobres não atingem frequentemente os seus objectivos?
answer: Porque criam efeitos perversos, como a dependência económica e as distorções do mercado
wrong_answers:
  - Porque os seus patrocinadores não têm boas intenções e generosidade para com os necessitados
  - Porque não dispõem de fundos suficientes para satisfazer as necessidades reais
  - Porque os beneficiários não sabem como utilizar estes programas de forma eficaz
explanation: |
  Friedman salienta que as políticas sociais, apesar das suas generosas intenções, falham frequentemente porque não têm em conta a análise rigorosa dos incentivos e comportamentos humanos. Estes programas criam efeitos perversos imprevistos, como a dependência económica ou a distorção do mercado, produzindo resultados que contrariam os objectivos iniciais.
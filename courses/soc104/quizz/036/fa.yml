question: به گفته میلتون فریدمن، چرا برنامه‌های اجتماعی برای فقرا اغلب در دستیابی به اهداف خود ناکام می‌مانند؟
answer: زیرا آنها اثرات نامطلوبی مانند وابستگی اقتصادی و تحریفات بازار ایجاد می‌کنند
wrong_answers:
  - زیرا حامیان آنها فاقد نیت خوب و سخاوت نسبت به نیازمندان هستند
  - زیرا آنها بودجه کافی برای برآورده کردن نیازهای واقعی ندارند
  - زیرا ذینفعان نمی‌دانند چگونه از این برنامه‌ها به‌طور مؤثر استفاده کنند
explanation: |
  فریدمن اشاره می‌کند که سیاست‌های اجتماعی، علیرغم نیت‌های سخاوتمندانه‌شان، اغلب شکست می‌خورند زیرا تحلیل دقیق انگیزه‌ها و رفتارهای انسانی را در نظر نمی‌گیرند. این برنامه‌ها اثرات معکوس غیرمنتظره‌ای ایجاد می‌کنند، مانند وابستگی اقتصادی یا تحریف بازار، که نتایجی برخلاف اهداف اولیه به بار می‌آورند.
question: Menurut Milton Friedman, mengapa program-program sosial untuk masyarakat miskin sering kali gagal mencapai tujuannya?
answer: Karena mereka menciptakan efek buruk seperti ketergantungan ekonomi dan distorsi pasar
wrong_answers:
  - Karena sponsor mereka tidak memiliki niat baik dan kemurahan hati terhadap yang membutuhkan
  - Karena mereka tidak memiliki cukup dana untuk memenuhi kebutuhan nyata
  - Karena penerima manfaat tidak memahami cara menggunakan program-program ini secara efektif
explanation: |
  Friedman menunjukkan bahwa kebijakan sosial, terlepas dari niat baik mereka, sering kali gagal karena mereka tidak memperhitungkan analisis yang cermat terhadap insentif dan perilaku manusia. Program-program ini menciptakan dampak buruk yang tidak terantisipasi, seperti ketergantungan ekonomi atau distorsi pasar, sehingga memberikan hasil yang berlawanan dengan tujuan awal.
question: По мнению Милтона Фридмана, почему социальные программы для бедных часто не достигают своих целей?
answer: Поскольку они создают обратные эффекты, такие как экономическая зависимость и рыночные искажения
wrong_answers:
  - Потому что их спонсорам не хватает добрых намерений и щедрости по отношению к нуждающимся
  - Потому что у них недостаточно средств для удовлетворения реальных потребностей
  - Потому что бенефициары не понимают, как эффективно использовать эти программы
explanation: |
  Фридман отмечает, что социальная политика, несмотря на свои щедрые намерения, часто терпит неудачу, поскольку не учитывает строгий анализ человеческих стимулов и поведения. Такие программы вызывают непредвиденные обратные эффекты, такие как экономическая зависимость или искажение рынка, приводя к результатам, противоречащим первоначальным целям.
question: Prema okviru Karla Popera, fundamentalna karakteristika koja razlikuje otvoreno društvo od zatvorenog društva je sposobnost otvorenog društva da prihvati kritiku i promene, dok zatvoreno društvo teži očuvanju statusa quo i suzbijanju kritičkog mišljenja.
answer: Sposobnost pojedinaca da primene kritičko rasuđivanje i ličnu odgovornost u donošenju odluka
wrong_answers:
  - Stepen ekonomske slobode i razmene zasnovane na tržištu između različitih društvenih grupa
  - Nivo tehnološkog napretka i naučnog progresa koji je društvo postiglo
  - Obim demokratskog učešća i vladavine većine u procesima političkog odlučivanja
explanation: |
  Popper definiše otvoreno društvo kao ono gde se pojedinci suočavaju sa ličnim odlukama i mogu da primene kritički sud, dok zatvoreno društvo odbija kritičku slobodu i individualnu odgovornost. 
  Razlika se suštinski odnosi na kognitivnu i moralnu autonomiju, a ne na ekonomske sisteme, tehnološki napredak ili demokratske procedure. Zatvorena društva se plaše promene i kritike, idealizujući statički poredak, dok otvorena društva prihvataju dinamičku kritiku i individualni izbor unutar apstraktnih pravila ponašanja.
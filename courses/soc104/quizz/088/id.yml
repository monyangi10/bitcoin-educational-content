question: Menurut kerangka kerja Karl Popper, apa karakteristik mendasar yang membedakan masyarakat terbuka dengan masyarakat tertutup?
answer: Kemampuan individu untuk melakukan penilaian kritis dan tanggung jawab pribadi dalam pengambilan keputusan
wrong_answers:
  - Tingkat kebebasan ekonomi dan pertukaran berbasis pasar antara berbagai kelompok sosial
  - Tingkat kemajuan teknologi dan kemajuan ilmu pengetahuan yang dicapai oleh masyarakat
  - Tingkat partisipasi demokratis dan aturan mayoritas dalam proses pengambilan keputusan politik
explanation: |
  Popper mendefinisikan masyarakat terbuka sebagai masyarakat di mana individu dihadapkan pada keputusan pribadi dan dapat melakukan penilaian kritis, sementara masyarakat tertutup menolak kebebasan kritis dan tanggung jawab individu.
  Perbedaan ini pada dasarnya adalah tentang otonomi kognitif dan moral daripada sistem ekonomi, kemajuan teknologi, atau prosedur demokrasi. Masyarakat tertutup takut akan perubahan dan kritik, mengidealkan tatanan statis, sementara masyarakat terbuka merangkul kritik dinamis dan pilihan individu dalam aturan perilaku yang abstrak.
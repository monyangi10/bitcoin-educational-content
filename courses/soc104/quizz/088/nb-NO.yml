question: Hva er det grunnleggende kjennetegnet som skiller et åpent samfunn fra et lukket samfunn, ifølge Karl Poppers rammeverk?
answer: Den enkeltes evne til å utøve kritisk dømmekraft og ta personlig ansvar i beslutningsprosesser
wrong_answers:
  - Graden av økonomisk frihet og markedsbasert utveksling mellom ulike sosiale grupper
  - Det teknologiske og vitenskapelige fremskrittet som samfunnet har oppnådd
  - Omfanget av demokratisk deltakelse og flertallsstyre i politiske beslutningsprosesser
explanation: |
  Popper definerer det åpne samfunnet som et samfunn der individet konfronteres med personlige beslutninger og kan utøve kritisk dømmekraft, mens det lukkede samfunnet nekter kritisk frihet og individuelt ansvar.
  Skillet handler i bunn og grunn om kognitiv og moralsk autonomi snarere enn om økonomiske systemer, teknologiske fremskritt eller demokratiske prosedyrer. Lukkede samfunn frykter forandring og kritikk, og idealiserer statisk orden, mens åpne samfunn omfavner dynamisk kritikk og individuelle valg innenfor abstrakte adferdsregler.
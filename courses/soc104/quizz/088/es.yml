question: Según el marco de Karl Popper, ¿cuál es la característica fundamental que distingue a una sociedad abierta de una sociedad cerrada?
answer: La capacidad de las personas para ejercer el juicio crítico y la responsabilidad personal en la toma de decisiones
wrong_answers:
  - El grado de libertad económica y los intercambios basados en el mercado entre los diferentes grupos sociales
  - El nivel de avance tecnológico y progreso científico alcanzado por la sociedad
  - El alcance de la participación democrática y la regla de la mayoría en los procesos de toma de decisiones políticas
explanation: |
  Popper define la sociedad abierta como aquella en la que los individuos se enfrentan a decisiones personales y pueden ejercer un juicio crítico, mientras que la sociedad cerrada rechaza la libertad crítica y la responsabilidad individual.
  La distinción tiene que ver fundamentalmente con la autonomía cognitiva y moral, más que con los sistemas económicos, el progreso tecnológico o los procedimientos democráticos. Las sociedades cerradas temen el cambio y la crítica, idealizando el orden estático, mientras que las sociedades abiertas abrazan la crítica dinámica y la elección individual dentro de unas normas de conducta abstractas.
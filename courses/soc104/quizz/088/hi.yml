question: कार्ल पॉपर के सिद्धांत के अनुसार, वह मूलभूत विशेषता क्या है जो एक खुले समाज को एक बंद समाज से अलग करती है?
answer: निर्णय लेने में आलोचनात्मक विवेक और व्यक्तिगत जिम्मेदारी निभाने की व्यक्तियों की क्षमता
wrong_answers:
  - विभिन्न सामाजिक समूहों के बीच आर्थिक स्वतंत्रता और बाजार आधारित आदान-प्रदान की मात्रा
  - समाज द्वारा हासिल की गई तकनीकी उन्नति और वैज्ञानिक प्रगति का स्तर
  - राजनीतिक निर्णय लेने की प्रक्रियाओं में लोकतांत्रिक भागीदारी और बहुमत शासन की सीमा
explanation: |
  पॉपर खुले समाज को ऐसे समाज के रूप में परिभाषित करते हैं जहाँ व्यक्तियों को व्यक्तिगत निर्णय लेने होते हैं और वे आलोचनात्मक विवेक का प्रयोग कर सकते हैं, जबकि बंद समाज आलोचनात्मक स्वतंत्रता और व्यक्तिगत उत्तरदायित्व को अस्वीकार करता है।
  यह अंतर मूलतः संज्ञानात्मक और नैतिक स्वायत्तता से संबंधित है, न कि आर्थिक प्रणालियों, तकनीकी प्रगति या लोकतांत्रिक प्रक्रियाओं से। बंद समाज परिवर्तन और आलोचना से भयभीत होते हैं और स्थिर व्यवस्था को आदर्श मानते हैं, जबकि खुले समाज आचरण के अमूर्त नियमों के भीतर गतिशील आलोचना और व्यक्तिगत पसंद को अपनाते हैं।
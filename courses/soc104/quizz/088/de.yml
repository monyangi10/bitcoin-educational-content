question: Welches ist nach Karl Poppers Rahmen das grundlegende Merkmal, das eine offene Gesellschaft von einer geschlossenen Gesellschaft unterscheidet?
answer: Die Fähigkeit des Einzelnen, kritisches Urteilsvermögen und persönliche Verantwortung bei der Entscheidungsfindung auszuüben
wrong_answers:
  - Der Grad der wirtschaftlichen Freiheit und des marktwirtschaftlichen Austauschs zwischen verschiedenen gesellschaftlichen Gruppen
  - Das Niveau des technischen und wissenschaftlichen Fortschritts in der Gesellschaft
  - Das Ausmaß der demokratischen Beteiligung und der Mehrheitsregel in politischen Entscheidungsprozessen
explanation: |
  Popper definiert die offene Gesellschaft als eine Gesellschaft, in der der Einzelne mit persönlichen Entscheidungen konfrontiert wird und ein kritisches Urteil fällen kann, während die geschlossene Gesellschaft kritische Freiheit und individuelle Verantwortung ablehnt.
  Bei der Unterscheidung geht es im Wesentlichen um kognitive und moralische Autonomie und nicht um Wirtschaftssysteme, technischen Fortschritt oder demokratische Verfahren. Geschlossene Gesellschaften fürchten Veränderungen und Kritik und idealisieren eine statische Ordnung, während offene Gesellschaften dynamische Kritik und individuelle Entscheidungen innerhalb abstrakter Verhaltensregeln zulassen.
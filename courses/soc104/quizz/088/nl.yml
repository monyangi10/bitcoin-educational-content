question: Wat is volgens het raamwerk van Karl Popper het fundamentele kenmerk dat een open samenleving onderscheidt van een gesloten samenleving?
answer: Het vermogen van individuen om kritisch te oordelen en persoonlijke verantwoordelijkheid te nemen bij het nemen van beslissingen
wrong_answers:
  - De mate van economische vrijheid en marktgebaseerde uitwisselingen tussen verschillende sociale groepen
  - De mate van technologische vooruitgang en wetenschappelijke vooruitgang die de samenleving heeft bereikt
  - De mate van democratische participatie en meerderheidsregel in politieke besluitvormingsprocessen
explanation: |
  Popper definieert een open samenleving als een samenleving waarin individuen geconfronteerd worden met persoonlijke beslissingen en een kritisch oordeel kunnen vellen, terwijl een gesloten samenleving kritische vrijheid en individuele verantwoordelijkheid weigert.
  Het onderscheid gaat fundamenteel over cognitieve en morele autonomie in plaats van economische systemen, technologische vooruitgang of democratische procedures. Gesloten samenlevingen zijn bang voor verandering en kritiek en idealiseren een statische orde, terwijl open samenlevingen dynamische kritiek en individuele keuze binnen abstracte gedragsregels omarmen.
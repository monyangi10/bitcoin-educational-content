question: Milline on Karl Popperi raamistiku kohaselt peamine tunnus, mis eristab avatud ühiskonda suletud ühiskonnast?
answer: Üksikisikute võime kasutada kriitilist otsustusvõimet ja isiklikku vastutust otsuste tegemisel
wrong_answers:
  - Majandusvabaduse ja turupõhise kaubavahetuse määr erinevate sotsiaalsete rühmade vahel
  - Ühiskonna poolt saavutatud tehnoloogilise arengu ja teadusliku progressi tase
  - Demokraatliku osaluse ulatus ja enamuse valitsemine poliitilistes otsustusprotsessides
explanation: |
  Popper defineerib avatud ühiskonda kui sellist, kus üksikisikud on silmitsi isiklike otsustega ja saavad teha kriitilisi otsuseid, samas kui suletud ühiskond keeldub kriitilisest vabadusest ja individuaalsest vastutusest.
  Erinevus puudutab põhimõtteliselt pigem kognitiivset ja moraalset autonoomiat kui majandussüsteeme, tehnoloogilist arengut või demokraatlikke protseduure. Suletud ühiskonnad kardavad muutusi ja kriitikat, idealiseerides staatilist korda, samas kui avatud ühiskonnad aktsepteerivad dünaamilist kriitikat ja individuaalset valikut abstraktsete käitumisreeglite raames.
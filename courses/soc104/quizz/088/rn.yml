question: Dushingiye ku ntumbero ya Karl Popper, ni ikihe kintu nyamukuru gitandukanya ikibano gifunguye n’ikibano gipfutse?
answer: Ubushobozi bw’abantu bwo guca urubanza mu buryo bubereye be n’inshingano z’umuntu ku giti ciwe mu gufata ingingo .
wrong_answers:
  - Urugero rw'umwidegemvyo mu vy'ubutunzi n'uguhanahana amakuru bishingiye ku masoko hagati y'imigwi itandukanye y'abantu .
  - Urugero rw'iterambere ry'ubuhinga n'iterambere ry'ubuhinga ryashitsweko n'igihugu .
  - Urugero rw'uruhara rwa demokarasi n'ubutegetsi bw'abantu benshi mu gufata ingingo za politike
explanation: |
  Popper asobanura ko ikibano gifunguye ari ikibano aho abantu bahanganye n’ingingo z’umuntu ku giti ciwe kandi agashobora gufata ingingo zikomeye, mu gihe ikibano gipfutse canka umwidegemvyo ukomeye n’inshingano z’umuntu ku giti ciwe. 
  Iryo tandukaniro riri ahanini ku bijanye n’ukwigenga mu vy’ubumenyi no mu vy’inyifato runtu aho kuja ku bijanye n’uburyo bw’ubutunzi, ugutera imbere kw’ubuhinga canke uburyo bwa demokarasi. Imiryango yugarijwe iratinya ihinduka n’ugunegurwa, igashiramwo urutonde rudahinduka, mu gihe imiryango yuguruye yemera ukunegurwa gukomeye n’uguhitamwo kw’umuntu ku giti ciwe mu mategeko y’inyifato runtu ataboneka.
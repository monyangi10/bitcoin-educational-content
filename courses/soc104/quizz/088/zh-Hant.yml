question: 根據 Karl Popper 的架構，開放社會與封閉社會的基本特徵是什麼？
answer: 個人在決策過程中運用重要判斷和個人責任的能力
wrong_answers:
  - 不同社會群體間的經濟自由度和以市場為基礎的交流程度
  - 社會所達到的技術進步和科學進步水平
  - 政治決策過程中的民主參與程度和多數統治
explanation: |
  波普爾將開放社會定義為個人面對個人決策並可行使批判性判斷的社會，而封閉社會則拒絕批判性自由與個人責任。
  這個區別根本上是關於認知與道德的自主性，而非經濟制度、科技進步或民主程序。封閉的社會害怕改變與批判，將靜態秩序理想化，而開放的社會則擁抱動態的批判，並在抽象的行為規則下進行個人選擇。
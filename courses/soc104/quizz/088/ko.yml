question: 칼 포퍼의 프레임워크에 따르면 열린 사회와 폐쇄 사회를 구분하는 근본적인 특징은 무엇인가요?
answer: 개인이 의사 결정에서 비판적 판단과 개인적 책임을 행사할 수 있는 능력
wrong_answers:
  - 다양한 사회 집단 간의 경제적 자유와 시장 기반 교류의 정도
  - 사회가 달성한 기술 발전 및 과학적 진보 수준
  - 정치적 의사 결정 과정에서의 민주적 참여와 다수결의 정도
explanation: |
  포퍼는 열린 사회를 개인이 개인적인 결정에 직면하고 비판적 판단을 내릴 수 있는 사회로 정의한 반면, 폐쇄 사회는 비판적 자유와 개인의 책임을 거부하는 사회로 정의합니다.
  이 구분은 근본적으로 경제 시스템, 기술 발전 또는 민주적 절차보다는 인지적, 도덕적 자율성에 관한 것입니다. 닫힌 사회는 변화와 비판을 두려워하며 정적인 질서를 이상화하는 반면, 열린 사회는 추상적인 행동 규칙 내에서 역동적인 비판과 개인의 선택을 수용합니다.
question: Согласно концепции Карла Поппера, какая фундаментальная характеристика отличает открытое общество от закрытого?
answer: Способность людей к критическому суждению и личной ответственности при принятии решений
wrong_answers:
  - Степень экономической свободы и рыночных обменов между различными социальными группами
  - Уровень развития технологий и научного прогресса, достигнутый обществом
  - Степень демократического участия и верховенства большинства в процессах принятия политических решений
explanation: |
  Поппер определяет открытое общество как такое, где люди сталкиваются с личными решениями и могут выносить критические суждения, в то время как закрытое общество отказывается от критической свободы и индивидуальной ответственности.
  В основе этого различия лежит когнитивная и моральная автономия, а не экономические системы, технологический прогресс или демократические процедуры. Закрытые общества боятся перемен и критики, идеализируя статичный порядок, в то время как открытые общества принимают динамичную критику и индивидуальный выбор в рамках абстрактных правил поведения.
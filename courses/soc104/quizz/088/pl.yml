question: Zgodnie z założeniami Karla Poppera, jaka jest podstawowa cecha odróżniająca społeczeństwo otwarte od społeczeństwa zamkniętego?
answer: Zdolność jednostek do krytycznego osądu i osobistej odpowiedzialności w podejmowaniu decyzji
wrong_answers:
  - Stopień wolności gospodarczej i wymiany rynkowej między różnymi grupami społecznymi
  - Poziom zaawansowania technologicznego i postępu naukowego osiągnięty przez społeczeństwo
  - Zakres demokratycznego uczestnictwa i rządów większości w politycznych procesach decyzyjnych
explanation: |
  Popper definiuje społeczeństwo otwarte jako takie, w którym jednostki są konfrontowane z osobistymi decyzjami i mogą dokonywać krytycznego osądu, podczas gdy społeczeństwo zamknięte odrzuca krytyczną wolność i indywidualną odpowiedzialność.
  Rozróżnienie to zasadniczo dotyczy autonomii poznawczej i moralnej, a nie systemów gospodarczych, postępu technologicznego czy procedur demokratycznych. Społeczeństwa zamknięte obawiają się zmian i krytyki, idealizując statyczny porządek, podczas gdy społeczeństwa otwarte przyjmują dynamiczną krytykę i indywidualny wybór w ramach abstrakcyjnych zasad postępowania.
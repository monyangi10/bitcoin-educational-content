question: カール・ポパーの枠組みによれば、開かれた社会と閉ざされた社会を区別する基本的な特徴は何か？
answer: 意思決定において重要な判断力と個人的責任を発揮する能力
wrong_answers:
  - 異なる社会集団間の経済的自由と市場に基づく交流の程度
  - 社会が達成した技術的進歩と科学的進歩のレベル
  - 政治的意思決定過程における民主的参加と多数決の程度
explanation: |
  ポパーは、開かれた社会とは、個人が個人的な決定に直面し、批判的な判断を行使できる社会であり、一方、閉ざされた社会は、批判的な自由と個人の責任を拒否する社会であると定義している。
  この区別は、経済システムや技術進歩、民主的な手続きというよりも、基本的には認知的・道徳的自律性に関するものである。閉じた社会は変化や批判を恐れ、静的な秩序を理想化するが、開かれた社会はダイナミックな批判と抽象的な行動ルールの中での個人の選択を受け入れる。
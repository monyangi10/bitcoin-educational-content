question: 根据卡尔-波普尔的框架，开放社会区别于封闭社会的基本特征是什么？
answer: 个人在决策过程中做出关键判断和承担个人责任的能力
wrong_answers:
  - 不同社会群体之间的经济自由度和以市场为基础的交流程度
  - 社会所取得的技术进步和科学进步水平
  - 政治决策过程中的民主参与和少数服从多数的程度
explanation: |
  波普尔将开放社会定义为个人面临个人决定并能做出批判性判断的社会，而封闭社会则拒绝批判性自由和个人责任。
  这种区别从根本上说是关于认知和道德自主，而不是经济制度、技术进步或民主程序。封闭的社会害怕变革和批评，将静态秩序理想化，而开放的社会则在抽象的行为规则范围内接受动态的批评和个人选择。
question: Според рамката на Карл Попър коя е основната характеристика, която отличава отвореното от затвореното общество?
answer: Способността на хората да упражняват критична преценка и лична отговорност при вземането на решения
wrong_answers:
  - Степента на икономическа свобода и пазарен обмен между различните социални групи
  - Нивото на технологичен и научен напредък, постигнато от обществото
  - Степен на демократично участие и управление на мнозинството в процесите на вземане на политически решения
explanation: |
  Попър определя отвореното общество като такова, в което хората са изправени пред лични решения и могат да упражняват критична преценка, докато затвореното общество отказва критична свобода и индивидуална отговорност.
  Разграничението се отнася основно до познавателната и моралната автономия, а не до икономическите системи, технологичния прогрес или демократичните процедури. Затворените общества се страхуват от промяната и критиката, като идеализират статичния ред, докато отворените общества приемат динамичната критика и индивидуалния избор в рамките на абстрактни правила за поведение.
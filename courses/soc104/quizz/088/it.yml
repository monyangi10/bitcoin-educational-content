question: Secondo il quadro di Karl Popper, qual è la caratteristica fondamentale che distingue una società aperta da una società chiusa?
answer: La capacità degli individui di esercitare un giudizio critico e una responsabilità personale nel processo decisionale
wrong_answers:
  - Il grado di libertà economica e di scambi basati sul mercato tra gruppi sociali diversi
  - Il livello di avanzamento tecnologico e di progresso scientifico raggiunto dalla società
  - Il grado di partecipazione democratica e la regola della maggioranza nei processi decisionali politici
explanation: |
  Popper definisce la società aperta come una società in cui gli individui si confrontano con decisioni personali e possono esercitare un giudizio critico, mentre la società chiusa rifiuta la libertà critica e la responsabilità individuale.
  La distinzione riguarda fondamentalmente l'autonomia cognitiva e morale piuttosto che i sistemi economici, il progresso tecnologico o le procedure democratiche. Le società chiuse temono il cambiamento e la critica, idealizzando un ordine statico, mentre le società aperte abbracciano la critica dinamica e la scelta individuale all'interno di regole di condotta astratte.
question: Mis eristab kultuurikonservatiivi, kes on ühtlasi libertaarne, poliitilisest konservatiivist seoses traditsiooniliste väärtuste jõustamisega?
answer: Nad propageerivad traditsioonilisi väärtusi veenmise ja hariduse kaudu, kuid on vastu seadusliku jõu kasutamisele, et neid teistele peale suruda
wrong_answers:
  - Nad toetavad valitsuse õigusaktide kasutamist traditsiooniliste moraalinormide jõustamiseks, säilitades samal ajal majandusvabaduse
  - Nad usuvad, et traditsioonilisi väärtusi tuleks praktiseerida ainult eraviisiliselt, ilma igasuguse avaliku propageerimise või kogukonna mõjuta
  - Nad pooldavad konservatiivsete väärtuste järkjärgulist õiguslikku rakendamist pigem demokraatlike protsesside kui kohese jõustamise kaudu
explanation: |
  Peamine erinevus seisneb selles, et kultuurikonservatiivsed vabadussõjalased eraldavad isiklikud moraalsed tõekspidamised poliitilisest sunnist. Kuigi nad hindavad tugevalt traditsioone
  nagu perekond, religioon ja voorused, kuid nad lükkavad tagasi riigivõimu kasutamise nende väärtuste teistele peale sundimiseks. Selle asemel toetuvad nad mittekohustuslikele vahenditele, nagu veenmine, haridus ja isiklik eeskuju. Poliitilised konservatiivid seevastu püüavad korraldada ühiskonda vastavalt kindlaksmääratud traditsioonilistele korraldustele ja võivad toetada nende väärtuste õiguslikku jõustamist. Selline libertaarne lähenemine austab individuaalset valikut, säilitades samas isikliku pühendumuse traditsioonilistele põhimõtetele.
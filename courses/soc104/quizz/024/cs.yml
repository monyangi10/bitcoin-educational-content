question: Čím se liší kulturní konzervativec, který je zároveň libertariánem, od politického konzervativce, pokud jde o prosazování tradičních hodnot?
answer: Podporují tradiční hodnoty přesvědčováním a vzděláváním, ale jsou proti tomu, aby se k jejich vnucování ostatním používala právní síla
wrong_answers:
  - Podporují používání vládní legislativy k prosazování tradičních morálních norem při zachování ekonomické svobody
  - Domnívají se, že tradiční hodnoty by se měly praktikovat pouze v soukromí, bez veřejné propagace a vlivu komunity
  - Obhajují spíše postupné právní zavádění konzervativních hodnot prostřednictvím demokratických procesů než jejich okamžité prosazování
explanation: |
  Klíčový rozdíl spočívá v tom, že kulturně konzervativní libertariáni oddělují osobní morální přesvědčení od politického nátlaku. I když si silně cení tradic
  jako je rodina, náboženství a ctnost, odmítají používání státní moci k vnucování těchto hodnot ostatním. Namísto toho se spoléhají na prostředky, které nemají donucovací charakter, jako je přesvědčování, výchova a osobní příklad. Političtí konzervativci naopak usilují o uspořádání společnosti podle pevných tradičních pořádků a mohou podporovat právní prosazování těchto hodnot. Tento libertariánský přístup respektuje individuální volbu při zachování osobní oddanosti tradičním zásadám.
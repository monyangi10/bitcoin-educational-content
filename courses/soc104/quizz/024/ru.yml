question: Что отличает культурного консерватора, который также является либертарианцем, от политического консерватора в вопросах защиты традиционных ценностей?
answer: Они пропагандируют традиционные ценности путем убеждения и просвещения, но выступают против использования юридической силы для их навязывания другим
wrong_answers:
  - Они поддерживают использование государственного законодательства для обеспечения соблюдения традиционных моральных норм при сохранении экономической свободы
  - Они считают, что традиционные ценности должны исповедоваться только в частном порядке, без какой-либо публичной пропаганды или влияния общества
  - Они выступают за постепенное законодательное внедрение консервативных ценностей через демократические процессы, а не за немедленное принуждение к их исполнению
explanation: |
  Ключевое различие заключается в том, что культурные консерваторы-либертарианцы отделяют личные моральные убеждения от политического принуждения. Хотя они высоко ценят такие традиции
  такие как семья, религия и добродетель, они отвергают использование государственной власти для навязывания этих ценностей другим. Вместо этого они полагаются на такие непринудительные средства, как убеждение, образование и личный пример. Политические консерваторы, напротив, стремятся организовать общество в соответствии с неизменными традиционными порядками и могут поддерживать юридическое принуждение к соблюдению этих ценностей. Этот либертарианский подход уважает индивидуальный выбор, сохраняя при этом личную приверженность традиционным принципам.
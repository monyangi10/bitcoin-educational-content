question: 在強制執行傳統價值觀方面，兼具自由主義的文化保守派與政治保守派有何差異？
answer: 他們透過說服及教育來推廣傳統價值觀，但反對使用法律力量將傳統價值觀強加於他人。
wrong_answers:
  - 他們支持使用政府立法來強制執行傳統道德標準，同時維持經濟自由
  - 他們認為傳統價值只應在私下實踐，不應受到任何公開宣導或社區影響
  - 他們主張透過民主程序逐步在法律上落實保守的價值觀，而非立即執行
explanation: |
  關鍵的區別在於，文化保守的自由主義者將個人道德信念與政治強制分開。雖然他們非常重視傳統
  雖然他們非常重視家庭、宗教和美德等傳統，但他們拒絕使用國家權力將這些價值強加於他人。相反，他們仰賴非強迫性的方式，例如說服、教育和個人榜樣。政治保守派則相反，他們尋求依照固定的傳統秩序來組織社會，並可能支持以法律強制執行這些價值觀。這種自由主義者的方法尊重個人選擇，同時維持個人對傳統原則的承諾。
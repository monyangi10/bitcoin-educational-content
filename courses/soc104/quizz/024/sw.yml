question: Ni kipi kinachomtofautisha mhafidhina wa kitamaduni ambaye pia ni mliberali na mhafidhina wa kisiasa kuhusu utekelezaji wa maadili ya kitamaduni?
answer: Wanakuza maadili ya kitamaduni kupitia ushawishi na elimu lakini wanapinga kutumia nguvu za kisheria kuwalazimisha wengine kuyatumia
wrong_answers:
  - Wanaunga mkono matumizi ya sheria za serikali kutekeleza viwango vya maadili vya kitamaduni huku wakidumisha uhuru wa kiuchumi
  - Wanaamini maadili ya kitamaduni yanapaswa kutekelezwa kibinafsi tu bila utetezi wowote wa umma au ushawishi wa jamii
  - Wanatetea utekelezaji wa kisheria wa taratibu wa maadili ya kihafidhina kupitia michakato ya kidemokrasia badala ya utekelezaji wa haraka
explanation: |
  Tofauti kuu ni kwamba wanaharakati wa kitamaduni wa kihafidhina hutenganisha imani za kibinafsi za maadili na kulazimishwa kisiasa. Ingawa wanathamini sana mila kama vile familia, dini, na wema, wanakataa kutumia nguvu za serikali kulazimisha maadili haya kwa wengine. Badala yake, wanategemea njia zisizo za kulazimisha kama vile ushawishi, elimu, na mfano wa kibinafsi. Wahafidhina wa kisiasa, kwa upande mwingine, hutafuta kupanga jamii kulingana na amri za kitamaduni zilizowekwa na wanaweza kuunga mkono utekelezaji wa kisheria wa maadili haya. Mbinu hii ya uhuru huheshimu chaguo la mtu binafsi huku ikidumisha kujitolea binafsi kwa kanuni za kitamaduni.

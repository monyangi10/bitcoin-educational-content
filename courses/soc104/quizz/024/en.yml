question: What distinguishes a cultural conservative who is also libertarian from a political conservative regarding the enforcement of traditional values?
answer: They promote traditional values through persuasion and education but oppose using legal force to impose them on others
wrong_answers:
  - They support using government legislation to enforce traditional moral standards while maintaining economic freedom
  - They believe traditional values should only be practiced privately without any public advocacy or community influence
  - They advocate for gradual legal implementation of conservative values through democratic processes rather than immediate enforcement
explanation: |
  The key distinction is that cultural conservative libertarians separate personal moral beliefs from political coercion. While they strongly value traditions 
  like family, religion, and virtue, they reject using state power to force these values on others. Instead, they rely on non-coercive means like persuasion, education, and personal example. Political conservatives, in contrast, seek to organize society according to fixed traditional orders and may support legal enforcement of these values. This libertarian approach respects individual choice while maintaining personal commitment to traditional principles.

question: Aynı zamanda özgürlükçü olan kültürel bir muhafazakarı, geleneksel değerlerin uygulanması konusunda siyasi bir muhafazakardan ayıran nedir?
answer: İkna ve eğitim yoluyla geleneksel değerleri teşvik ederler ancak bunları başkalarına dayatmak için yasal güç kullanılmasına karşı çıkarlar
wrong_answers:
  - Ekonomik özgürlüğü korurken geleneksel ahlaki standartları uygulamak için hükümet mevzuatının kullanılmasını destekliyorlar
  - Geleneksel değerlerin herhangi bir kamu savunuculuğu veya toplum etkisi olmaksızın sadece özel olarak uygulanması gerektiğine inanırlar
  - Muhafazakâr değerlerin derhal uygulanması yerine demokratik süreçler yoluyla kademeli olarak yasal olarak uygulanmasını savunurlar
explanation: |
  Temel ayrım, kültürel muhafazakâr liberteryenlerin kişisel ahlaki inançları siyasi zorlamadan ayırmalarıdır. Geleneklere güçlü bir şekilde değer verirken
  aile, din ve erdem gibi değerleri başkalarına zorla kabul ettirmek için devlet gücünü kullanmayı reddederler. Bunun yerine ikna, eğitim ve kişisel örneklik gibi zorlayıcı olmayan araçlara güvenirler. Buna karşılık siyasi muhafazakarlar toplumu sabit geleneksel düzenlere göre organize etmeye çalışırlar ve bu değerlerin yasal olarak uygulanmasını destekleyebilirler. Bu özgürlükçü yaklaşım, geleneksel ilkelere kişisel bağlılığı sürdürürken bireysel seçimlere saygı duyar.
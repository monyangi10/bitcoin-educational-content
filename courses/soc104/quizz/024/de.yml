question: Was unterscheidet einen Kulturkonservativen, der gleichzeitig Libertärer ist, von einem politischen Konservativen, der sich für die Durchsetzung traditioneller Werte einsetzt?
answer: Sie fördern traditionelle Werte durch Überzeugung und Erziehung, lehnen es aber ab, sie mit rechtlicher Gewalt anderen aufzuzwingen
wrong_answers:
  - Sie befürworten den Einsatz staatlicher Gesetze zur Durchsetzung traditioneller moralischer Normen bei gleichzeitiger Wahrung der wirtschaftlichen Freiheit
  - Sie sind der Meinung, dass traditionelle Werte nur privat und ohne öffentliche Fürsprache oder Einflussnahme der Gemeinschaft gelebt werden sollten
  - Sie plädieren für eine schrittweise gesetzliche Umsetzung konservativer Werte durch demokratische Prozesse anstelle einer sofortigen Durchsetzung
explanation: |
  Der wichtigste Unterschied ist, dass kulturkonservative Libertäre persönliche moralische Überzeugungen von politischem Zwang trennen. Sie schätzen zwar Traditionen
  wie Familie, Religion und Tugendhaftigkeit, aber sie lehnen es ab, diese Werte anderen mit staatlicher Macht aufzuzwingen. Stattdessen verlassen sie sich auf zwanglose Mittel wie Überzeugung, Erziehung und persönliches Beispiel. Politische Konservative hingegen versuchen, die Gesellschaft nach festen traditionellen Ordnungen zu organisieren, und können die rechtliche Durchsetzung dieser Werte unterstützen. Dieser libertäre Ansatz respektiert die individuelle Entscheidungsfreiheit und hält gleichzeitig das persönliche Engagement für traditionelle Grundsätze aufrecht.
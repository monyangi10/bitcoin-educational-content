question: 자유주의자이면서 문화적 보수주의자인 사람이 전통적인 가치의 집행과 관련하여 정치적 보수주의자와 구별되는 점은 무엇인가요?
answer: 이들은 설득과 교육을 통해 전통적인 가치를 장려하지만, 다른 사람들에게 이를 강요하는 법적 강제력 사용에는 반대합니다
wrong_answers:
  - 이들은 경제적 자유를 유지하면서 전통적인 도덕적 기준을 시행하기 위해 정부 법률을 사용하는 것을 지지합니다
  - 이들은 전통적인 가치는 공적인 옹호나 커뮤니티의 영향력 없이 사적으로만 실천되어야 한다고 생각합니다
  - 이들은 즉각적인 시행보다는 민주적 절차를 통해 보수적 가치를 점진적으로 법적으로 구현해야 한다고 주장합니다
explanation: |
  문화적으로 보수적인 자유주의자들은 개인의 도덕적 신념과 정치적 강압을 분리한다는 점이 가장 큰 차이점입니다. 이들은 가족, 종교, 미덕과 같은 전통을 중요하게 여기지만
  가족, 종교, 미덕과 같은 전통을 중요하게 생각하지만, 국가 권력을 이용해 다른 사람들에게 이러한 가치를 강요하는 것은 거부합니다. 대신 설득, 교육, 개인적인 모범과 같은 비강압적인 수단에 의존합니다. 반면 정치적 보수주의자는 고정된 전통적 질서에 따라 사회를 조직하려고 하며 이러한 가치의 법적 집행을 지지할 수 있습니다. 이러한 자유주의적 접근 방식은 개인의 선택을 존중하는 동시에 전통적인 원칙에 대한 개인적인 헌신을 유지합니다.
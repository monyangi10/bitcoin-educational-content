question: Co odróżnia kulturowego konserwatystę, który jest również libertarianinem, od politycznego konserwatysty w kwestii egzekwowania tradycyjnych wartości?
answer: Promują tradycyjne wartości poprzez perswazję i edukację, ale sprzeciwiają się używaniu siły prawnej do narzucania ich innym
wrong_answers:
  - Popierają wykorzystywanie rządowego ustawodawstwa do egzekwowania tradycyjnych standardów moralnych przy jednoczesnym zachowaniu wolności gospodarczej
  - Uważają, że tradycyjne wartości powinny być praktykowane tylko prywatnie, bez żadnego publicznego poparcia lub wpływu społeczności
  - Opowiadają się oni za stopniowym wdrażaniem konserwatywnych wartości poprzez procesy demokratyczne, a nie za ich natychmiastowym egzekwowaniem
explanation: |
  Kluczowe rozróżnienie polega na tym, że kulturowi konserwatywni libertarianie oddzielają osobiste przekonania moralne od przymusu politycznego. Podczas gdy silnie cenią tradycje
  takie jak rodzina, religia i cnota, odrzucają wykorzystywanie władzy państwowej do narzucania tych wartości innym. Zamiast tego polegają na środkach nie przymusowych, takich jak perswazja, edukacja i osobisty przykład. Z kolei polityczni konserwatyści dążą do zorganizowania społeczeństwa zgodnie z ustalonymi tradycyjnymi porządkami i mogą wspierać prawne egzekwowanie tych wartości. To libertariańskie podejście szanuje indywidualny wybór przy jednoczesnym zachowaniu osobistego przywiązania do tradycyjnych zasad.
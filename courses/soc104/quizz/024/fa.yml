question: چه چیزی یک محافظه‌کار فرهنگی که همچنین لیبرتارین است را از یک محافظه‌کار سیاسی در مورد اجرای ارزش‌های سنتی متمایز می‌کند؟
answer: آن‌ها ارزش‌های سنتی را از طریق ترغیب و آموزش ترویج می‌کنند اما با استفاده از زور قانونی برای تحمیل آن‌ها به دیگران مخالفند.
wrong_answers:
  - آن‌ها از استفاده از قوانین دولتی برای اجرای استانداردهای اخلاقی سنتی حمایت می‌کنند در حالی که آزادی اقتصادی را حفظ می‌کنند.
  - آن‌ها معتقدند که ارزش‌های سنتی باید فقط به صورت خصوصی و بدون هیچ گونه تبلیغ عمومی یا تأثیرگذاری اجتماعی اجرا شوند.
  - آن‌ها از اجرای تدریجی ارزش‌های محافظه‌کارانه از طریق فرآیندهای دموکراتیک به جای اجرای فوری حمایت می‌کنند.
explanation: |
  تفاوت کلیدی این است که لیبرترین‌های محافظه‌کار فرهنگی باورهای اخلاقی شخصی را از اجبار سیاسی جدا می‌کنند. در حالی که آن‌ها به شدت به سنت‌هایی مانند خانواده، دین و فضیلت ارزش می‌دهند، از استفاده از قدرت دولت برای تحمیل این ارزش‌ها به دیگران خودداری می‌کنند. در عوض، آن‌ها به روش‌های غیر اجباری مانند ترغیب، آموزش و الگوی شخصی تکیه می‌کنند. محافظه‌کاران سیاسی، در مقابل، به دنبال سازماندهی جامعه بر اساس نظم‌های سنتی ثابت هستند و ممکن است از اجرای قانونی این ارزش‌ها حمایت کنند. این رویکرد لیبرترین به انتخاب فردی احترام می‌گذارد در حالی که تعهد شخصی به اصول سنتی را حفظ می‌کند.
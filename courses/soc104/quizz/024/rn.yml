question: Ni igiki gitandukanya umuntu akunda umuco kandi ari umunyagihugu akunda umwidegemvyo n’umuntu akunda politike ku bijanye no gushitsa ingingo ngenderwako z’imigenzo?
answer: Batera imbere ingingo ngenderwako z’imigenzo biciye mu kwemeza no kwigisha ariko bakarwanya gukoresha inguvu z’amategeko kugira ngo bazitegeke abandi .
wrong_answers:
  - Bashigikiye gukoresha amategeko ya Leta kugira ngo umuntu akurikize ingingo ngenderwako z’inyifato runtu za kera mu gihe aguma afise umwidegemvyo mu vy’ubutunzi .
  - Bemera ko ingingo ngenderwako z’imigenzo zikwiye gukorwa gusa mu bwiherero ata n’umwe avugira abantu bose canke ngo akoreshe abantu bose .
  - Bavuga ko ingingo ngenderwako z’abanyagihugu zishirwa mu ngiro buhoro buhoro biciye mu nzira za demokarasi aho gushirwa mu ngiro ubwo nyene .
explanation: |
  Itandukaniro nyamukuru ni uko abaharanira umwidegemvyo bakunda imico kama batandukanya ivyo umuntu yemera mu vy’inyifato runtu n’uguhatirwa mu vya politike. Naho baha agaciro cane imigenzo . 
  nk’umuryango, idini n’ingeso nziza, baranka gukoresha ububasha bwa Leta kugira ngo bahatire abandi gukurikiza izo ngingo ngenderwako. Ahubwo bizigira uburyo butagiramwo uguhatira nk’ugukwemeza, inyigisho be n’akarorero k’umuntu ku giti ciwe. Abanyapolitike bakunda ivy’ubuhinga bwa none, bo barondera gutunganya ikibano bisunze amategeko y’imigenzo adahinduka kandi barashobora gushigikira ugushirwa mu ngiro kw’izo ngingo mfatirwako. Ubwo buryo bw’ukwidegemvya bubaha uguhitamwo kw’umuntu ku giti ciwe mu gihe aguma yiyemeje gukurikiza ingingo ngenderwako z’imigenzo.
question: Mikä erottaa kulttuurikonservatiivin, joka on myös libertaristi, poliittisesta konservatiivista perinteisten arvojen toteuttamisen osalta?
answer: He edistävät perinteisiä arvoja vakuuttamalla ja valistamalla, mutta vastustavat oikeudellisen voiman käyttöä niiden määräämiseksi muille
wrong_answers:
  - He kannattavat hallituksen lainsäädännön käyttöä perinteisten moraalinormien noudattamisen valvomiseksi samalla kun säilytetään taloudellinen vapaus
  - He uskovat, että perinteisiä arvoja tulisi harjoittaa vain yksityisesti ilman julkista edunvalvontaa tai yhteisön vaikutusvaltaa
  - He kannattavat konservatiivisten arvojen asteittaista oikeudellista täytäntöönpanoa demokraattisten prosessien kautta välittömän täytäntöönpanon sijaan
explanation: |
  Keskeinen ero on se, että kulttuurikonservatiiviset vapaamieliset erottavat henkilökohtaiset moraaliset vakaumukset poliittisesta pakottamisesta. Vaikka he arvostavat vahvasti perinteitä
  kuten perhettä, uskontoa ja hyveellisyyttä, mutta he torjuvat valtion vallan käytön näiden arvojen pakottamiseksi muille. Sen sijaan he luottavat muihin kuin pakkokeinoihin, kuten suostutteluun, kasvatukseen ja henkilökohtaiseen esimerkkiin. Poliittiset konservatiivit sen sijaan pyrkivät järjestämään yhteiskunnan kiinteiden perinteisten järjestysten mukaisesti ja saattavat tukea näiden arvojen oikeudellista täytäntöönpanoa. Tämä libertaristinen lähestymistapa kunnioittaa yksilön valinnanvapautta säilyttäen samalla henkilökohtaisen sitoutumisen perinteisiin periaatteisiin.
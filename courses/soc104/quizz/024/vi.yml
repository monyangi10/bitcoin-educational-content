question: Điều gì phân biệt một người bảo thủ về văn hóa đồng thời là người theo chủ nghĩa tự do với một người bảo thủ về chính trị liên quan đến việc thực thi các giá trị truyền thống?
answer: Họ đề cao các giá trị truyền thống thông qua thuyết phục và giáo dục nhưng phản đối việc sử dụng vũ lực pháp luật để áp đặt chúng lên người khác.
wrong_answers:
  - Họ ủng hộ việc sử dụng luật pháp của chính phủ để thực thi các chuẩn mực đạo đức truyền thống đồng thời duy trì tự do kinh tế.
  - Họ tin rằng các giá trị truyền thống chỉ nên được thực hành riêng tư mà không cần bất kỳ sự vận động công khai hay ảnh hưởng nào từ cộng đồng.
  - Họ chủ trương thực thi pháp luật một cách dần dần các giá trị bảo thủ thông qua các quy trình dân chủ thay vì thi hành ngay lập tức.
explanation: |
  Điểm khác biệt chính là những người theo chủ nghĩa tự do bảo thủ về văn hóa tách biệt niềm tin đạo đức cá nhân khỏi sự cưỡng chế chính trị. Mặc dù họ rất coi trọng các truyền thống như gia đình, tôn giáo và đức hạnh, nhưng họ bác bỏ việc sử dụng quyền lực nhà nước để áp đặt những giá trị này lên người khác. Thay vào đó, họ dựa vào các biện pháp phi cưỡng chế như thuyết phục, giáo dục và tấm gương cá nhân. Ngược lại, những người bảo thủ chính trị tìm cách tổ chức xã hội theo các trật tự truyền thống cố định và có thể ủng hộ việc thực thi pháp luật đối với các giá trị này. Cách tiếp cận tự do này tôn trọng sự lựa chọn cá nhân trong khi vẫn duy trì cam kết cá nhân đối với các nguyên tắc truyền thống.
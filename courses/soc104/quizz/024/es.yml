question: ¿Qué distingue a un conservador cultural que también es libertario de un conservador político en cuanto a la aplicación de los valores tradicionales?
answer: Promueven los valores tradicionales mediante la persuasión y la educación, pero se oponen al uso de la fuerza legal para imponerlos a los demás
wrong_answers:
  - Apoyan el uso de la legislación gubernamental para hacer cumplir las normas morales tradicionales, manteniendo al mismo tiempo la libertad económica
  - Creen que los valores tradicionales sólo deben practicarse en privado, sin ninguna defensa pública ni influencia comunitaria
  - Abogan por una aplicación legal gradual de los valores conservadores a través de procesos democráticos, en lugar de una aplicación inmediata
explanation: |
  La distinción clave es que los libertarios conservadores culturales separan las creencias morales personales de la coerción política. Aunque valoran mucho las tradiciones
  como la familia, la religión y la virtud, rechazan el uso del poder estatal para imponer estos valores a los demás. En su lugar, confían en medios no coercitivos como la persuasión, la educación y el ejemplo personal. Los conservadores políticos, por el contrario, buscan organizar la sociedad de acuerdo con órdenes tradicionales fijos y pueden apoyar la aplicación legal de estos valores. Este enfoque libertario respeta la elección individual al tiempo que mantiene el compromiso personal con los principios tradicionales.
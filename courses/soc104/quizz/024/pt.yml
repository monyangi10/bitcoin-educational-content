question: O que distingue um conservador cultural que é também libertário de um conservador político no que respeita à aplicação dos valores tradicionais?
answer: Promovem os valores tradicionais através da persuasão e da educação, mas opõem-se à utilização da força legal para os impor aos outros
wrong_answers:
  - Defendem a utilização de legislação governamental para fazer cumprir as normas morais tradicionais, mantendo a liberdade económica
  - Acreditam que os valores tradicionais devem ser praticados apenas a nível privado, sem qualquer defesa pública ou influência da comunidade
  - Defendem a implementação legal gradual dos valores conservadores através de processos democráticos, em vez de uma aplicação imediata
explanation: |
  A principal distinção é que os libertários conservadores culturais separam as crenças morais pessoais da coerção política. Embora valorizem fortemente as tradições
  como a família, a religião e a virtude, rejeitam a utilização do poder do Estado para impor esses valores aos outros. Em vez disso, recorrem a meios não coercivos como a persuasão, a educação e o exemplo pessoal. Os conservadores políticos, pelo contrário, procuram organizar a sociedade de acordo com ordens tradicionais fixas e podem apoiar a aplicação legal desses valores. Esta abordagem libertária respeita a escolha individual, mantendo o empenhamento pessoal nos princípios tradicionais.
question: Какво отличава културния консерватор, който е и либертарианец, от политическия консерватор по отношение на налагането на традиционните ценности?
answer: Те насърчават традиционните ценности чрез убеждаване и образование, но се противопоставят на използването на правна сила за налагането им на другите
wrong_answers:
  - Те подкрепят използването на правителственото законодателство за налагане на традиционни морални норми, като същевременно се запазва икономическата свобода
  - Те вярват, че традиционните ценности трябва да се практикуват само в частен план, без публично застъпничество или влияние от страна на общността
  - Те се застъпват за постепенно законово въвеждане на консервативните ценности чрез демократични процеси, а не чрез незабавно прилагане
explanation: |
  Ключовото разграничение е, че културните консерватори-либертарианци отделят личните морални убеждения от политическата принуда. Макар че те силно ценят традициите
  като семейството, религията и добродетелта, те отхвърлят използването на държавната власт за налагане на тези ценности на другите. Вместо това те разчитат на непринудителни средства като убеждаване, образование и личен пример. Политическите консерватори, напротив, се стремят да организират обществото в съответствие с фиксирани традиционни порядки и могат да подкрепят законовото налагане на тези ценности. Този либертариански подход зачита индивидуалния избор, като същевременно запазва личната ангажираност към традиционните принципи.
question: 在执行传统价值观方面，同时也是自由主义者的文化保守主义者与政治保守主义者的区别是什么？
answer: 他们通过说服和教育宣扬传统价值观，但反对使用法律力量将传统价值观强加于人
wrong_answers:
  - 他们支持利用政府立法来执行传统道德标准，同时保持经济自由
  - 他们认为传统价值观只应在私下践行，不应受到任何公共宣传或社区影响
  - 他们主张通过民主程序逐步从法律上落实保守价值观，而不是立即执行
explanation: |
  关键的区别在于，文化保守主义自由主义者将个人道德信仰与政治强制区分开来。虽然他们非常重视家庭、宗教和美德等传统
  虽然他们非常重视家庭、宗教和美德等传统，但他们反对利用国家权力将这些价值观强加于人。相反，他们依靠说服、教育和个人榜样等非强制手段。与此相反，政治保守派则寻求按照固定的传统秩序来组织社会，并可能支持通过法律强制推行这些价值观。这种自由主义者的做法既尊重个人选择，又坚持个人对传统原则的承诺。
question: 伝統的価値観の強制に関して、リバタリアンでもある文化的保守と政治的保守を区別するものは何か？
answer: 説得や教育を通じて伝統的な価値観を促進するが、法的な力を使って他者に押し付けることには反対する。
wrong_answers:
  - 経済的自由を維持しながら、伝統的な道徳基準を強制するために政府の法律を利用することを支持する。
  - 彼らは、伝統的な価値観は、公的な擁護や地域社会の影響を受けることなく、個人的にのみ実践されるべきだと考えている。
  - 彼らは、保守的な価値観を即座に強制するのではなく、民主的なプロセスを通じて段階的に法的に実施することを提唱している。
explanation: |
  重要な違いは、文化的保守主義のリバタリアンは、個人の道徳的信条を政治的強制から切り離していることである。彼らは家族、宗教、美徳といった
  家族、宗教、美徳のような伝統を強く尊重する一方で、国家権力を使ってこれらの価値観を他者に強制することは拒否する。その代わりに、説得、教育、個人の模範といった非強制的な手段に頼る。これとは対照的に、政治的保守主義者は、固定化された伝統的秩序に従って社会を組織しようとし、こうした価値観の法的強制を支持することもある。このリバタリアン的アプローチは、伝統的原則への個人的コミットメントを維持しながら、個人の選択を尊重する。
question: Hva skiller en kulturkonservativ som også er libertarianer fra en politisk konservativ når det gjelder håndhevelsen av tradisjonelle verdier?
answer: De fremmer tradisjonelle verdier gjennom overtalelse og utdanning, men er imot å bruke juridisk makt for å påtvinge andre dem
wrong_answers:
  - De støtter bruk av statlig lovgivning for å håndheve tradisjonelle moralske standarder og samtidig opprettholde økonomisk frihet
  - De mener at tradisjonelle verdier bare bør praktiseres privat, uten offentlig påvirkning eller påvirkning fra samfunnet
  - De tar til orde for en gradvis juridisk implementering av konservative verdier gjennom demokratiske prosesser fremfor umiddelbar håndhevelse
explanation: |
  Det viktigste skillet er at kulturkonservative libertarianere skiller personlig moralsk overbevisning fra politisk tvang. Selv om de setter stor pris på tradisjoner
  som familie, religion og dyd, avviser de å bruke statsmakt til å påtvinge andre disse verdiene. I stedet setter de sin lit til ikke-tvangsmessige virkemidler som overtalelse, utdanning og personlige eksempler. Politisk konservative, derimot, ønsker å organisere samfunnet i henhold til faste, tradisjonelle ordninger og kan støtte juridisk håndhevelse av disse verdiene. Denne libertarianske tilnærmingen respekterer individuelle valg, samtidig som den personlige forpliktelsen til tradisjonelle prinsipper opprettholdes.
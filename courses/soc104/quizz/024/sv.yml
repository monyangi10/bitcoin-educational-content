question: Vad skiljer en kulturkonservativ som också är libertarian från en politisk konservativ när det gäller upprätthållandet av traditionella värderingar?
answer: De främjar traditionella värderingar genom övertalning och utbildning men motsätter sig att använda lagligt våld för att påtvinga andra dessa värderingar
wrong_answers:
  - De stöder att statlig lagstiftning används för att upprätthålla traditionella moraliska normer samtidigt som ekonomisk frihet upprätthålls
  - De anser att traditionella värderingar endast ska praktiseras privat utan någon offentlig påverkan eller inflytande från samhället
  - De förespråkar en gradvis juridisk implementering av konservativa värderingar genom demokratiska processer snarare än omedelbar tillämpning
explanation: |
  Den viktigaste skillnaden är att kulturkonservativa libertarianer skiljer personliga moraliska övertygelser från politiskt tvång. Medan de starkt värdesätter traditioner
  som familj, religion och dygd, avvisar de att använda statsmakten för att tvinga dessa värderingar på andra. Istället förlitar de sig på icke-tvingande medel som övertalning, utbildning och personliga exempel. Politiska konservativa försöker däremot organisera samhället enligt fasta traditionella ordningar och kan stödja laglig tillämpning av dessa värderingar. Detta libertarianska förhållningssätt respekterar individens valmöjligheter samtidigt som det personliga engagemanget för traditionella principer upprätthålls.
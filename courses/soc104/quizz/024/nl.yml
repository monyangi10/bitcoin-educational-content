question: Wat onderscheidt een cultureel conservatief die ook libertarisch is van een politiek conservatief als het gaat om het handhaven van traditionele waarden?
answer: Ze promoten traditionele waarden door middel van overtuiging en onderwijs, maar zijn ertegen om deze waarden met juridisch geweld aan anderen op te leggen
wrong_answers:
  - Ze steunen het gebruik van overheidswetgeving om traditionele morele normen af te dwingen met behoud van economische vrijheid
  - Zij geloven dat traditionele waarden alleen in de privésfeer mogen worden beoefend, zonder openbare pleitbezorging of invloed van de gemeenschap
  - Ze pleiten voor een geleidelijke wettelijke implementatie van conservatieve waarden via democratische processen in plaats van onmiddellijke handhaving
explanation: |
  Het belangrijkste onderscheid is dat cultureel conservatieve libertariërs persoonlijke morele overtuigingen scheiden van politieke dwang. Hoewel ze veel waarde hechten aan tradities
  zoals familie, religie en deugd, verwerpen ze het gebruik van staatsmacht om deze waarden aan anderen op te dringen. In plaats daarvan vertrouwen ze op niet-dwingende middelen zoals overreding, onderwijs en persoonlijk voorbeeld. Politieke conservatieven daarentegen willen de samenleving organiseren volgens vaste traditionele ordeningen en kunnen wettelijke handhaving van deze waarden ondersteunen. Deze libertarische benadering respecteert individuele keuze met behoud van persoonlijke toewijding aan traditionele principes.
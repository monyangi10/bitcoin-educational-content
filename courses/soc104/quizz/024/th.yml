question: อะไรที่ทำให้อนุรักษ์นิยมทางวัฒนธรรมที่เป็นเสรีนิยมแตกต่างจากอนุรักษ์นิยมทางการเมืองในเรื่องการบังคับใช้ค่านิยมดั้งเดิม?
answer: พวกเขาส่งเสริมค่านิยมดั้งเดิมผ่านการชักชวนและการศึกษา แต่คัดค้านการใช้กฎหมายบังคับเพื่อกำหนดค่านิยมเหล่านั้นกับผู้อื่น
wrong_answers:
  - พวกเขาสนับสนุนการใช้กฎหมายของรัฐบาลเพื่อบังคับใช้มาตรฐานทางศีลธรรมแบบดั้งเดิมในขณะที่รักษาเสรีภาพทางเศรษฐกิจ
  - พวกเขาเชื่อว่าค่านิยมดั้งเดิมควรปฏิบัติเป็นการส่วนตัวเท่านั้น โดยไม่มีการสนับสนุนในที่สาธารณะหรืออิทธิพลต่อชุมชน
  - พวกเขาสนับสนุนการดำเนินการทางกฎหมายของค่านิยมอนุรักษ์นิยมอย่างค่อยเป็นค่อยไปผ่านกระบวนการประชาธิปไตยแทนที่จะบังคับใช้ทันที
explanation: |
  ความแตกต่างที่สำคัญคือ นักเสรีนิยมอนุรักษ์นิยมทางวัฒนธรรมแยกความเชื่อทางศีลธรรมส่วนบุคคลออกจากการบังคับทางการเมือง แม้ว่าพวกเขาจะให้คุณค่ากับประเพณีอย่างครอบครัว ศาสนา และคุณธรรมอย่างมาก แต่พวกเขาปฏิเสธการใช้พลังของรัฐในการบังคับให้ผู้อื่นยอมรับค่านิยมเหล่านี้ แทนที่จะใช้วิธีการที่ไม่บังคับ เช่น การชักชวน การศึกษา และการเป็นแบบอย่างส่วนตัว ในทางตรงกันข้าม นักอนุรักษ์นิยมทางการเมืองพยายามจัดระเบียบสังคมตามระเบียบประเพณีที่ตายตัวและอาจสนับสนุนการบังคับใช้กฎหมายของค่านิยมเหล่านี้ วิธีการแบบเสรีนิยมนี้เคารพการเลือกของแต่ละบุคคลในขณะที่ยังคงรักษาความมุ่งมั่นส่วนตัวต่อหลักการดั้งเดิม
question: Menurut analisis Hannah Arendt, apa tujuan utama dari sistem pendidikan totaliter?
answer: Menghancurkan kapasitas manusia untuk membentuk keyakinan dan kepercayaan yang independen
wrong_answers:
  - Untuk mengindoktrinasi warga negara dengan ideologi dan nilai-nilai politik rezim tertentu
  - Menciptakan tenaga kerja berpendidikan tinggi yang mampu memajukan tujuan ekonomi negara
  - Memberantas buta huruf dan mempromosikan pengetahuan ilmiah yang bermanfaat bagi negara
explanation: |
  Hannah Arendt berpendapat bahwa tujuan pendidikan totaliter bukanlah untuk menanamkan keyakinan tertentu, melainkan untuk menghancurkan kemampuan orang untuk membentuk keyakinan independen apa pun. Hal ini membedakan totalitarianisme dari otoritarianisme atau propaganda - totalitarianisme berusaha untuk menghilangkan kapasitas kognitif untuk berpikir secara independen. Pilihan-pilihan lain mewakili bentuk-bentuk indoktrinasi politik yang lebih konvensional atau pendidikan yang diarahkan oleh negara, tetapi kehilangan wawasan penting Arendt bahwa totalitarianisme bertujuan untuk meniadakan sama sekali kebebasan manusia dan penilaian independen, bukan hanya mempromosikan ideologi tertentu.
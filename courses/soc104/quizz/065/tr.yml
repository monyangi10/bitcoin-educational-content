question: Hannah Arendt'in analizine göre, totaliter eğitim sistemlerinin temel amacı nedir?
answer: İnsanların bağımsız kanaatler ve inançlar oluşturma kapasitesini yok etmek
wrong_answers:
  - Vatandaşlara rejimin kendine özgü siyasi ideolojisini ve değerlerini aşılamak
  - Devletin ekonomik hedeflerini ilerletebilecek yüksek eğitimli bir işgücü oluşturmak
  - Cehaleti ortadan kaldırmak ve devlete hizmet eden bilimsel bilgiyi teşvik etmek
explanation: |
  Hannah Arendt, totaliter eğitimin amacının hiçbir zaman belirli inançları aşılamak olmadığını, aksine insanların herhangi bir bağımsız inanç oluşturma yeteneklerini yok etmek olduğunu savunmuştur. Bu, totalitarizmi salt otoriterlikten veya propagandadan ayırır - bağımsız düşünce için bilişsel kapasiteyi ortadan kaldırmayı amaçlar. Diğer seçenekler siyasi endoktrinasyonun veya devlet tarafından yönlendirilen eğitimin daha geleneksel biçimlerini temsil eder, ancak Arendt'in totalitarizmin sadece belirli ideolojilerin teşvik edilmesini değil, insan eylemliliğinin ve bağımsız muhakemenin tamamen yadsınmasını amaçladığı yönündeki önemli kavrayışını gözden kaçırır.
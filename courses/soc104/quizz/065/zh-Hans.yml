question: 根据汉娜-阿伦特的分析，极权主义教育制度的主要目标是什么？
answer: 摧毁人类形成独立信念和信仰的能力
wrong_answers:
  - 向公民灌输政权特定的政治意识形态和价值观念
  - 培养受过高等教育的劳动力，使其能够推动州经济目标的实现
  - 扫除文盲，推广服务于国家的科学知识
explanation: |
  汉娜-阿伦特认为，极权主义教育的目标从来不是灌输具体的信念，而是摧毁人们形成任何独立信念的能力。这使极权主义有别于单纯的专制主义或宣传--它试图消除人们独立思考的认知能力。其他选项代表了更为传统的政治灌输或国家指导的教育形式，但却忽略了阿伦特的重要见解，即极权主义的目的是彻底否定人的能动性和独立判断，而不仅仅是宣传特定的意识形态。
question: Mis on Hannah Arendti analüüsi kohaselt totalitaarsete haridussüsteemide peamine eesmärk?
answer: Hävitada inimese võimet kujundada iseseisvaid veendumusi ja tõekspidamisi
wrong_answers:
  - Kodanike indoktrineerimine režiimi konkreetse poliitilise ideoloogia ja väärtustega
  - Luua kõrgelt haritud tööjõud, mis on võimeline edendama riigi majanduslikke eesmärke
  - Likvideerida kirjaoskamatust ja edendada teaduslikke teadmisi, mis teenivad riiki
explanation: |
  Hannah Arendt väitis, et totalitaarse kasvatuse eesmärk ei olnud kunagi konkreetsete veendumuste juurutamine, vaid pigem inimeste võime hävitada igasugune iseseisev uskumus. See eristab totalitarismi pelgalt autoritaarsusest või propagandast - see püüab kõrvaldada iseseisva mõtlemise kognitiivse võime. Teised võimalused esindavad tavapärasemat poliitilise indoktrinatsiooni või riigi poolt juhitud hariduse vormi, kuid jätavad tähelepanuta Arendti olulise arusaama, et totalitarismi eesmärk on inimese tegevuse ja iseseisva otsustusvõime täielik eitamine, mitte ainult teatud ideoloogiate edendamine.
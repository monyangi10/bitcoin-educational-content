question: Según el análisis de Hannah Arendt, ¿cuál es el objetivo principal de los sistemas educativos totalitarios?
answer: Destruir la capacidad humana de formarse convicciones y creencias independientes
wrong_answers:
  - Adoctrinar a los ciudadanos con la ideología política y los valores específicos del régimen
  - Crear una mano de obra altamente cualificada capaz de impulsar los objetivos económicos del Estado
  - Eliminar el analfabetismo y promover el conocimiento científico al servicio del Estado
explanation: |
  Hannah Arendt sostenía que el objetivo de la educación totalitaria nunca fue inculcar convicciones específicas, sino destruir la capacidad de las personas para formarse cualquier creencia independiente. Esto distingue al totalitarismo del mero autoritarismo o la propaganda: pretende eliminar la propia capacidad cognitiva de pensamiento independiente. Las otras opciones representan formas más convencionales de adoctrinamiento político o educación dirigida por el Estado, pero pasan por alto la idea crucial de Arendt de que el totalitarismo persigue la negación completa de la agencia humana y el juicio independiente, no sólo la promoción de ideologías concretas.
question: Co je podle analýzy Hannah Arendtové hlavním cílem totalitních vzdělávacích systémů?
answer: Zničit lidskou schopnost vytvářet si nezávislé přesvědčení a víru
wrong_answers:
  - Indoktrinovat občany specifickou politickou ideologií a hodnotami režimu
  - Vytvořit vysoce vzdělanou pracovní sílu, která bude schopna prosazovat ekonomické cíle státu
  - Odstranit negramotnost a podporovat vědecké poznání, které slouží státu
explanation: |
  Hannah Arendtová tvrdila, že cílem totalitní výchovy nikdy nebylo vštípit lidem konkrétní přesvědčení, ale spíše zničit jejich schopnost vytvářet si jakékoliv nezávislé názory. Tím se totalitarismus liší od pouhého autoritářství nebo propagandy - usiluje o likvidaci samotné kognitivní schopnosti nezávislého myšlení. Ostatní možnosti představují konvenčnější formy politické indoktrinace nebo státem řízené výchovy, ale postrádají zásadní Arendtové poznatek, že totalitarismus usiluje o úplné popření lidského jednání a nezávislého úsudku, nikoli pouze o prosazování konkrétních ideologií.
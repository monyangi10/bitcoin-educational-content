question: Wat is volgens de analyse van Hannah Arendt het hoofddoel van totalitaire onderwijssystemen?
answer: Het menselijk vermogen vernietigen om onafhankelijke overtuigingen en geloof te vormen
wrong_answers:
  - Burgers indoctrineren met de specifieke politieke ideologie en waarden van het regime
  - Een hoogopgeleide beroepsbevolking creëren die de economische doelen van de staat kan bevorderen
  - Analfabetisme uitroeien en wetenschappelijke kennis bevorderen die de staat dient
explanation: |
  Hannah Arendt stelde dat het doel van totalitair onderwijs nooit het bijbrengen van specifieke overtuigingen was, maar eerder het vernietigen van het vermogen van mensen om welke onafhankelijke overtuiging dan ook te vormen. Dit onderscheidt totalitarisme van louter autoritarisme of propaganda - het probeert het cognitieve vermogen tot onafhankelijk denken uit te schakelen. De andere opties vertegenwoordigen meer conventionele vormen van politieke indoctrinatie of door de staat gestuurd onderwijs, maar missen Arendt's cruciale inzicht dat totalitarisme gericht is op de volledige ontkenning van menselijk handelen en onafhankelijk oordeel, en niet alleen op de bevordering van bepaalde ideologieën.
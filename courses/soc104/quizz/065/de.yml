question: Was ist nach Hannah Arendts Analyse das Hauptziel totalitärer Bildungssysteme?
answer: Zerstörung der menschlichen Fähigkeit zur Bildung unabhängiger Überzeugungen und Glaubensvorstellungen
wrong_answers:
  - Indoktrinierung der Bürger mit der spezifischen politischen Ideologie und den Werten des Regimes
  - Schaffung hochqualifizierter Arbeitskräfte, die in der Lage sind, die wirtschaftlichen Ziele des Staates voranzubringen
  - Beseitigung des Analphabetismus und Förderung wissenschaftlicher Erkenntnisse im Dienste des Staates
explanation: |
  Hannah Arendt vertrat die Ansicht, dass das Ziel der totalitären Erziehung niemals darin besteht, bestimmte Überzeugungen zu vermitteln, sondern vielmehr darin, die Fähigkeit der Menschen zu zerstören, sich überhaupt unabhängige Überzeugungen zu bilden. Dies unterscheidet den Totalitarismus von bloßem Autoritarismus oder Propaganda - er zielt darauf ab, die kognitive Fähigkeit zum unabhängigen Denken zu eliminieren. Die anderen Optionen stellen konventionellere Formen der politischen Indoktrination oder der staatlich gelenkten Erziehung dar, lassen aber Arendts entscheidende Einsicht vermissen, dass der Totalitarismus auf die vollständige Negierung der menschlichen Handlungsfähigkeit und des unabhängigen Urteilsvermögens abzielt und nicht nur auf die Förderung bestimmter Ideologien.
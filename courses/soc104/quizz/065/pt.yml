question: De acordo com a análise de Hannah Arendt, qual é o principal objetivo dos sistemas educativos totalitários?
answer: Destruir a capacidade humana de formar convicções e crenças independentes
wrong_answers:
  - Doutrinar os cidadãos com a ideologia e os valores políticos específicos do regime
  - Criar uma força de trabalho altamente qualificada capaz de fazer avançar os objectivos económicos do Estado
  - Eliminar o analfabetismo e promover o conhecimento científico ao serviço do Estado
explanation: |
  Hannah Arendt argumentou que o objetivo da educação totalitária nunca foi incutir convicções específicas, mas sim destruir a capacidade das pessoas de formarem quaisquer crenças independentes. Este facto distingue o totalitarismo do mero autoritarismo ou propaganda - procura eliminar a própria capacidade cognitiva de pensamento independente. As outras opções representam formas mais convencionais de doutrinação política ou de educação dirigida pelo Estado, mas não têm em conta a ideia crucial de Arendt de que o totalitarismo visa a negação completa da capacidade de ação e de julgamento independente do ser humano, e não apenas a promoção de ideologias específicas.
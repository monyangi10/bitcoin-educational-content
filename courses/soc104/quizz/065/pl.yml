question: Zgodnie z analizą Hannah Arendt, co jest głównym celem totalitarnych systemów edukacyjnych?
answer: Zniszczyć ludzką zdolność do kształtowania niezależnych przekonań i wierzeń
wrong_answers:
  - Indoktrynowanie obywateli specyficzną ideologią polityczną i wartościami reżimu
  - Stworzenie wysoko wykształconej siły roboczej zdolnej do realizacji państwowych celów gospodarczych
  - Eliminacja analfabetyzmu i promowanie wiedzy naukowej służącej państwu
explanation: |
  Hannah Arendt argumentowała, że celem edukacji totalitarnej nigdy nie było wpajanie konkretnych przekonań, ale raczej niszczenie zdolności ludzi do kształtowania jakichkolwiek niezależnych przekonań. To odróżnia totalitaryzm od zwykłego autorytaryzmu lub propagandy - dąży on do wyeliminowania samej zdolności poznawczej do niezależnego myślenia. Pozostałe opcje reprezentują bardziej konwencjonalne formy indoktrynacji politycznej lub edukacji kierowanej przez państwo, ale brakuje im kluczowego spostrzeżenia Arendt, że totalitaryzm ma na celu całkowite zanegowanie ludzkiej sprawczości i niezależnego osądu, a nie tylko promowanie określonych ideologii.
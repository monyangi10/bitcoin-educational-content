question: Enligt Hannah Arendts analys, vad är det primära syftet med totalitära utbildningssystem?
answer: Att förstöra människans förmåga att bilda självständiga övertygelser och trosuppfattningar
wrong_answers:
  - Att indoktrinera medborgarna med regimens specifika politiska ideologi och värderingar
  - Att skapa en högutbildad arbetskraft som kan främja delstatens ekonomiska mål
  - Att eliminera analfabetism och främja vetenskaplig kunskap som tjänar staten
explanation: |
  Hannah Arendt hävdade att den totalitära utbildningens mål aldrig var att ingjuta specifika övertygelser, utan snarare att förstöra människors förmåga att bilda sig några som helst självständiga uppfattningar. Detta skiljer totalitarism från ren auktoritarism eller propaganda - den syftar till att eliminera själva den kognitiva förmågan till självständigt tänkande. De andra alternativen representerar mer konventionella former av politisk indoktrinering eller statligt styrd utbildning, men missar Arendts avgörande insikt att totalitarism syftar till att fullständigt förneka mänsklig handlingskraft och självständigt omdöme, inte bara till att främja vissa ideologier.
question: Dukurikije icegeranyo ca Hannah Arendt, ni iyihe ntumbero nyamukuru y’uburezi bw’ubutegetsi bw’agahomerabunwa?
answer: Gusenyura ubushobozi bw'umuntu bwo gushinga imyizere n'imyizere yigenga
wrong_answers:
  - Kwigisha abanyagihugu ingendo n'agaciro vya politike vy'intwaro
  - Gushinga abakozi bize cane bashobora guteza imbere intumbero z'ubutunzi za Leta .
  - Gukuraho ubujuju no guteza imbere ubumenyi bwa siyansi bukorera Leta .
explanation: |
  Hannah Arendt yavuze ko intumbero y’inyigisho y’ubutegetsi bw’agahomerabunwa itazokwigera itera abantu ivyiyumviro vyihariye, ahubwo ko ari iyo gusenyura ubushobozi bw’abantu bwo gushinga imyizere iyo ari yo yose yigenga. Ivyo bitandukanya ubutegetsi bw’agahomerabunwa n’ubutegetsi bw’agahomerabunwa gusa canke propagande - burondera gukuraho ubushobozi bw’ubumenyi bwo kwiyumvira bwigenga. Ayandi mahitamwo agereranya uburyo busanzwe bwo kwigisha inyigisho za politike canke inyigisho zirongowe na Leta, ariko arabura ubumenyi buhambaye bwa Arendt bw’uko ubutegetsi bw’agahomerabunwa bufise intumbero yo guhakana burundu uburenganzira bwa muntu n’urubanza rwigenga, atari uguteza imbere gusa ivyiyumviro bimwebimwe.
question: According to Hannah Arendt's analysis, what is the primary objective of totalitarian education systems?
answer: To destroy the human capacity to form independent convictions and beliefs
wrong_answers:
  - To indoctrinate citizens with the regime's specific political ideology and values
  - To create a highly educated workforce capable of advancing state economic goals
  - To eliminate illiteracy and promote scientific knowledge that serves the state
explanation: |
  Hannah Arendt argued that totalitarian education's goal was never to instill specific convictions, but rather to destroy people's ability to form any independent beliefs whatsoever. This distinguishes totalitarianism from mere authoritarianism or propaganda - it seeks to eliminate the very cognitive capacity for independent thought. The other options represent more conventional forms of political indoctrination or state-directed education, but miss Arendt's crucial insight that totalitarianism aims at the complete negation of human agency and independent judgment, not just the promotion of particular ideologies.

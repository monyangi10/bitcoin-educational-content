question: بر اساس تحلیل هانا آرنت، هدف اصلی سیستم‌های آموزشی توتالیتر چیست؟
answer: برای نابود کردن توانایی انسان در شکل‌گیری اعتقادات و باورهای مستقل
wrong_answers:
  - برای تلقین ایدئولوژی و ارزش‌های سیاسی خاص رژیم به شهروندان
  - برای ایجاد نیروی کار بسیار تحصیل‌کرده‌ای که قادر به پیشبرد اهداف اقتصادی دولت باشد
  - برای از بین بردن بی‌سوادی و ترویج دانش علمی که به دولت خدمت می‌کند
explanation: |
  هانا آرنت استدلال کرد که هدف آموزش توتالیتر هرگز القای اعتقادات خاص نبود، بلکه نابودی توانایی مردم در شکل‌گیری هرگونه باور مستقل بود. این امر توتالیتاریسم را از اقتدارگرایی صرف یا تبلیغات متمایز می‌کند - هدف آن حذف ظرفیت شناختی برای تفکر مستقل است. گزینه‌های دیگر نمایانگر اشکال متعارف‌تری از تلقین سیاسی یا آموزش دولتی هستند، اما بینش مهم آرنت را که توتالیتاریسم به دنبال نفی کامل عاملیت انسانی و قضاوت مستقل است، نه فقط ترویج ایدئولوژی‌های خاص، نادیده می‌گیرند.
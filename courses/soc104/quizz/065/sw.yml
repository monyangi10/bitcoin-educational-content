question: Kulingana na uchambuzi wa Hannah Arendt, lengo kuu la mifumo ya elimu ya kidikteta ni lipi?
answer: Kuharibu uwezo wa binadamu wa kuunda imani na mawazo huru
wrong_answers:
  - Kuwaelimisha raia kuhusu itikadi na maadili maalum ya kisiasa ya utawala
  - Kuunda nguvu kazi yenye elimu ya juu inayoweza kuendeleza malengo ya kiuchumi ya serikali
  - Kuondoa ujinga na kukuza maarifa ya kisayansi yanayohudumia serikali
explanation: |
  Hannah Arendt alisema kwamba lengo la elimu ya kidikteta halikuwa kamwe kuingiza imani maalum, bali kuharibu uwezo wa watu wa kuunda imani yoyote huru hata kidogo. Hii inatofautisha utawala wa kidikteta na utawala wa kimabavu au propaganda tu - inatafuta kuondoa uwezo wa utambuzi wa mawazo huru. Chaguzi zingine zinawakilisha aina za kawaida zaidi za ufundishaji wa kisiasa au elimu inayoongozwa na serikali, lakini inakosa ufahamu muhimu wa Arendt kwamba utawala wa kidikteta unalenga kukataa kabisa mamlaka ya kibinadamu na hukumu huru, si tu kukuza itikadi maalum.

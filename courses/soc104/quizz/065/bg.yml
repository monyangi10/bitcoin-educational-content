question: Каква е основната цел на тоталитарните образователни системи според анализа на Хана Арендт?
answer: Да унищожи човешката способност да формира независими убеждения и вярвания
wrong_answers:
  - Да индоктринира гражданите с конкретната политическа идеология и ценности на режима
  - Създаване на високообразована работна сила, способна да постига икономическите цели на държавата
  - Премахване на неграмотността и насърчаване на научното познание в полза на държавата
explanation: |
  Хана Аренд твърди, че целта на тоталитарното възпитание никога не е била да се внушат конкретни убеждения, а по-скоро да се унищожи способността на хората да формират каквито и да било независими убеждения. Това отличава тоталитаризма от обикновения авторитаризъм или пропаганда - той се стреми да премахне самата познавателна способност за самостоятелно мислене. Другите варианти представляват по-конвенционални форми на политическа индоктринация или насочено от държавата образование, но пропускат решаващото прозрение на Аренд, че тоталитаризмът цели пълното отричане на човешката активност и независима преценка, а не само насърчаването на определени идеологии.
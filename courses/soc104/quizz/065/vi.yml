question: Theo phân tích của Hannah Arendt, mục tiêu chính của các hệ thống giáo dục toàn trị là gì?
answer: Phá hủy khả năng hình thành niềm tin và quan điểm độc lập của con người.
wrong_answers:
  - Nhằm truyền bá tư tưởng và giá trị chính trị cụ thể của chế độ cho người dân.
  - Nhằm tạo ra một lực lượng lao động có trình độ học vấn cao, có khả năng thúc đẩy các mục tiêu kinh tế của tiểu bang.
  - Xóa mù chữ và thúc đẩy kiến thức khoa học phục vụ nhà nước.
explanation: |
  Hannah Arendt lập luận rằng mục tiêu của nền giáo dục toàn trị không bao giờ là gieo rắc những niềm tin cụ thể, mà là phá hủy khả năng hình thành bất kỳ niềm tin độc lập nào của con người. Điều này phân biệt chủ nghĩa toàn trị với chủ nghĩa độc đoán hay tuyên truyền đơn thuần - nó tìm cách loại bỏ chính khả năng nhận thức để tư duy độc lập. Các lựa chọn khác đại diện cho các hình thức truyền bá tư tưởng chính trị hoặc giáo dục do nhà nước chỉ đạo thông thường hơn, nhưng lại bỏ qua nhận định quan trọng của Arendt rằng chủ nghĩa toàn trị hướng đến việc phủ nhận hoàn toàn khả năng tự chủ và phán đoán độc lập của con người, chứ không chỉ đơn thuần là thúc đẩy các hệ tư tưởng cụ thể.
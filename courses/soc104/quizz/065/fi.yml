question: Mikä on Hannah Arendtin analyysin mukaan totalitaaristen koulutusjärjestelmien ensisijainen tavoite?
answer: Tuhota ihmisen kyky muodostaa itsenäisiä vakaumuksia ja uskomuksia
wrong_answers:
  - Indoktrinoida kansalaiset hallinnon erityiseen poliittiseen ideologiaan ja arvoihin
  - Luoda korkeasti koulutettua työvoimaa, joka pystyy edistämään valtion taloudellisia tavoitteita
  - Poistaa lukutaidottomuus ja edistää valtiota palvelevaa tieteellistä tietoa
explanation: |
  Hannah Arendt väitti, että totalitaarisen kasvatuksen tavoitteena ei koskaan ollut tiettyjen vakaumusten opettaminen vaan pikemminkin ihmisten kyvyn tuhota kyky muodostaa itsenäisiä uskomuksia. Tämä erottaa totalitarismin pelkästä autoritaarisuudesta tai propagandasta - se pyrkii poistamaan itsenäisen ajattelun kognitiivisen kyvyn. Muut vaihtoehdot edustavat tavanomaisempia poliittisen indoktrinaation tai valtiojohtoisen kasvatuksen muotoja, mutta niistä puuttuu Arendtin ratkaiseva oivallus siitä, että totalitarismi tähtää ihmisen toimijuuden ja riippumattoman harkintakyvyn täydelliseen nollaamiseen, ei vain tiettyjen ideologioiden edistämiseen.
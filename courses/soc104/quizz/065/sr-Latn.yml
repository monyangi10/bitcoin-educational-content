question: Prema analizi Hannah Arendt, koji je primarni cilj totalitarnih obrazovnih sistema?
answer: Da uništi ljudsku sposobnost da formira nezavisna uverenja i verovanja
wrong_answers:
  - Da indoktriniraju građane specifičnom političkom ideologijom i vrednostima režima
  - Da se stvori visoko obrazovana radna snaga sposobna za unapređenje ekonomskih ciljeva države
  - Da se eliminiše nepismenost i promoviše naučno znanje koje služi državi
explanation: |
  Hannah Arendt je tvrdila da cilj totalitarne edukacije nikada nije bio da usadi specifična uverenja, već da uništi sposobnost ljudi da formiraju bilo kakva nezavisna uverenja. Ovo razlikuje totalitarizam od pukog autoritarizma ili propagande - on nastoji da eliminiše samu kognitivnu sposobnost za nezavisno razmišljanje. Druge opcije predstavljaju konvencionalnije oblike političke indoktrinacije ili državnog obrazovanja, ali propuštaju Arendtov ključni uvid da totalitarizam teži potpunom negiranju ljudske agencije i nezavisnog rasuđivanja, a ne samo promociji određenih ideologija.
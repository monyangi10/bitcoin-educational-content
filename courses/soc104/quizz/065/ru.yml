question: Согласно анализу Ханны Арендт, какова основная цель тоталитарных систем образования?
answer: Уничтожить человеческую способность формировать независимые убеждения и верования
wrong_answers:
  - Индоктринация граждан в соответствии со специфической политической идеологией и ценностями режима
  - Создать высокообразованную рабочую силу, способную продвигать экономические цели штата
  - Ликвидация неграмотности и продвижение научных знаний на благо государства
explanation: |
  Ханна Арендт утверждала, что целью тоталитарного воспитания является не привитие конкретных убеждений, а уничтожение способности людей формировать какие-либо независимые убеждения. Это отличает тоталитаризм от простого авторитаризма или пропаганды - он стремится уничтожить саму когнитивную способность к независимому мышлению. Другие варианты представляют собой более традиционные формы политической индоктринации или образования, направляемого государством, но в них упускается важнейшая мысль Арендт о том, что тоталитаризм направлен на полное отрицание человеческой самостоятельности и независимых суждений, а не только на продвижение определенных идеологий.
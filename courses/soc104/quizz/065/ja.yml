question: ハンナ・アーレントの分析によれば、全体主義的教育システムの第一の目的は何か？
answer: 独立した信念や信念を形成する人間の能力を破壊する。
wrong_answers:
  - 国民に政権特有の政治イデオロギーや価値観を教え込む。
  - 州の経済目標を推進できる高度な教育を受けた労働力を創出する。
  - 文盲をなくし、国家に役立つ科学的知識を促進する。
explanation: |
  ハンナ・アーレントは、全体主義教育の目的は決して特定の信念を植え付けることではなく、むしろ人々が自主的に信念を形成する能力を破壊することだと主張した。この点が、全体主義を単なる権威主義やプロパガンダと区別している。つまり、独立した思考をするための認知能力そのものをなくそうとしているのだ。他の選択肢は、より従来型の政治的教化や国家主導の教育を表しているが、全体主義が特定のイデオロギーの宣伝だけでなく、人間の主体性や独立した判断力の完全な否定を目指しているというアーレントの重要な洞察を見逃している。
question: 根據 Hannah Arendt 的分析，極權教育制度的主要目的是什麼？
answer: 摧毀人類形成獨立信念和信仰的能力
wrong_answers:
  - 向公民灌輸政權特定的政治意識形態和價值觀
  - 創造受過高等教育的勞動力，以推動州的經濟目標
  - 掃除文盲，推廣為國家服務的科學知識
explanation: |
  Hannah Arendt認為，極權教育的目標從不是灌輸特定的信念，而是摧毀人們形成任何獨立信念的能力。這讓極權有別於純粹的威權主義或宣傳--它試圖消除人們獨立思考的認知能力。其他的選擇代表了較傳統的政治灌輸或國家主導的教育形式，但卻忽略了阿倫特的重要洞見：極權主義的目標是徹底否定人的能動性與獨立判斷，而不只是推廣特定的意識形態。
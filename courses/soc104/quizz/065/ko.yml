question: 한나 아렌트의 분석에 따르면 전체주의 교육 시스템의 주요 목적은 무엇일까요?
answer: 독립적인 신념과 신념을 형성하는 인간의 능력을 파괴하는 것
wrong_answers:
  - 정권의 특정 정치 이념과 가치관을 시민들에게 주입하기 위해
  - 국가 경제 목표를 발전시킬 수 있는 고도로 교육받은 인력을 양성합니다
  - 문맹을 없애고 국가에 도움이 되는 과학 지식을 장려하기 위해
explanation: |
  한나 아렌트는 전체주의 교육의 목표는 특정한 신념을 주입하는 것이 아니라 사람들이 독립적인 신념을 형성하는 능력을 파괴하는 데 있다고 주장했습니다. 이는 전체주의가 단순한 권위주의나 선전과 구별되는 점으로, 전체주의는 독립적인 사고를 위한 인지 능력 자체를 제거하고자 합니다. 다른 옵션은 보다 전통적인 형태의 정치적 세뇌나 국가 주도 교육을 의미하지만, 전체주의는 특정 이데올로기의 조장뿐만 아니라 인간의 주체성과 독립적 판단을 완전히 부정하는 것을 목표로 한다는 아렌트의 중요한 통찰을 놓치고 있습니다.
question: हन्ना एरेंड्ट के विश्लेषण के अनुसार, अधिनायकवादी शिक्षा प्रणालियों का प्राथमिक उद्देश्य क्या है?
answer: स्वतंत्र रूप से दृढ़ विश्वास और आस्थाएँ बनाने की मानवीय क्षमता को नष्ट करना।
wrong_answers:
  - नागरिकों को शासन की विशिष्ट राजनीतिक विचारधारा और मूल्यों से अवगत कराना।
  - राज्य के आर्थिक लक्ष्यों को आगे बढ़ाने में सक्षम उच्च शिक्षित कार्यबल का निर्माण करना।
  - निरक्षरता को समाप्त करना और राज्य के हित में वैज्ञानिक ज्ञान को बढ़ावा देना।
explanation: |
  हन्ना एरेंड्ट का तर्क था कि सर्वाधिकारवादी शिक्षा का लक्ष्य कभी भी विशिष्ट विश्वासों को मन में बिठाना नहीं था, बल्कि लोगों की किसी भी प्रकार की स्वतंत्र मान्यताएँ बनाने की क्षमता को पूरी तरह नष्ट करना था। यही बात सर्वाधिकारवाद को मात्र अधिनायकवाद या प्रचार से अलग करती है - इसका उद्देश्य स्वतंत्र चिंतन की संज्ञानात्मक क्षमता को ही समाप्त करना है। अन्य विकल्प राजनीतिक विचारधारा थोपने या राज्य-निर्देशित शिक्षा के अधिक पारंपरिक रूप हैं, लेकिन वे एरेंड्ट की इस महत्वपूर्ण अंतर्दृष्टि को समझने में विफल रहते हैं कि सर्वाधिकारवाद का उद्देश्य केवल विशिष्ट विचारधाराओं को बढ़ावा देना नहीं, बल्कि मानवीय सक्रियता और स्वतंत्र निर्णय लेने की क्षमता का पूर्णतः खंडन करना है।
question: According to Milton Friedman's perspective, what is the primary problem with judging social policies based on their stated goals rather than their actual outcomes?
answer: Well-intentioned policies often produce unintended consequences that contradict their original objectives, such as creating dependency or market distortions
wrong_answers:
  - Politicians deliberately misrepresent their true intentions to hide their real agenda from the public and avoid accountability
  - Good intentions are inherently flawed because they reflect personal biases rather than objective scientific analysis of social problems
  - Stated goals are usually too ambitious and unrealistic to achieve within the constraints of limited government budgets and resources
explanation: |
  Friedman's critique focuses on the gap between intentions and results, not on the sincerity or feasibility of goals. He argues that policies designed 
  to help often backfire due to poor understanding of human incentives and economic mechanisms. The issue isn't dishonesty, bias, or budget constraints, but rather that good intentions don't guarantee good outcomes. This is why he advocates for structural definitions that examine how systems actually function rather than what they claim to achieve.

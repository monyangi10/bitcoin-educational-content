question: Jaký je podle Miltona Friedmana hlavní problém posuzování sociálních politik na základě jejich deklarovaných cílů, a nikoli skutečných výsledků?
answer: Dobře míněné politiky často vedou k nezamýšleným důsledkům, které jsou v rozporu s jejich původními cíli, jako je vytváření závislosti nebo narušení trhu
wrong_answers:
  - Politici záměrně zkreslují své skutečné záměry, aby před veřejností skryli svůj skutečný program a vyhnuli se odpovědnosti
  - Dobré úmysly jsou ze své podstaty chybné, protože odrážejí spíše osobní předsudky než objektivní vědeckou analýzu sociálních problémů
  - Stanovené cíle jsou obvykle příliš ambiciózní a nereálné, než aby jich bylo možné dosáhnout v rámci omezených vládních rozpočtů a zdrojů
explanation: |
  Friedmanova kritika se zaměřuje na rozdíl mezi záměry a výsledky, nikoli na upřímnost nebo proveditelnost cílů. Tvrdí, že politiky navržené
  pomáhat, se často zvrtnou kvůli špatnému pochopení lidských pobídek a ekonomických mechanismů. Problémem není nepoctivost, zaujatost nebo rozpočtová omezení, ale spíše to, že dobré úmysly nezaručují dobré výsledky. Proto se zasazuje o strukturální definice, které zkoumají, jak systémy skutečně fungují, a ne to, čeho mají podle jeho tvrzení dosáhnout.
question: ミルトン・フリードマンの視点によれば、社会政策をその実際の結果ではなく、表明された目標に基づいて判断することの主な問題点は何か？
answer: 良かれと思った政策が、依存や市場の歪みを生むなど、本来の目的と矛盾する意図せざる結果を生むことはよくある。
wrong_answers:
  - 政治家は国民から本当の意図を隠し、説明責任を回避するために、意図的に真意を偽っている。
  - 善意は、社会問題の客観的な科学的分析ではなく、個人的なバイアスを反映するため、本質的に欠陥がある。
  - 限られた政府予算と資源の制約の中で達成するには、通常、掲げた目標は野心的で非現実的すぎる。
explanation: |
  フリードマンの批判は、目標の誠実さや実現可能性ではなく、意図と結果のギャップに焦点を当てている。フリードマンは次のように主張する。
  人間のインセンティブや経済的メカニズムに対する理解が不十分なために、支援策が裏目に出ることがよくあると主張する。問題は不誠実さや偏見、予算の制約などではなく、善意が良い結果を保証するわけではないということだ。だからこそ彼は、システムが何を達成すると主張するかよりも、実際にどのように機能しているかを検証する構造的定義を提唱するのである。
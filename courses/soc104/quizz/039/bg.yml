question: Според Милтън Фридман какъв е основният проблем при оценяването на социалните политики въз основа на заявените им цели, а не на действителните резултати?
answer: Политиките с добри намерения често водят до непредвидени последици, които противоречат на първоначалните им цели, като например създаване на зависимост или изкривяване на пазара
wrong_answers:
  - Политиците умишлено представят в невярна светлина истинските си намерения, за да скрият истинските си планове от обществеността и да избегнат отговорност
  - Добрите намерения са изначално погрешни, тъй като отразяват лични пристрастия, а не обективен научен анализ на социалните проблеми
  - Поставените цели обикновено са твърде амбициозни и нереалистични, за да бъдат постигнати в рамките на ограничените държавни бюджети и ресурси
explanation: |
  Критиката на Фридман се фокусира върху разминаването между намеренията и резултатите, а не върху искреността или осъществимостта на целите. Той твърди, че политиките, предназначени
  да помагат, често водят до обратен ефект поради лошото разбиране на човешките стимули и икономическите механизми. Проблемът не е в нечестността, пристрастието или бюджетните ограничения, а в това, че добрите намерения не гарантират добри резултати. Ето защо той се застъпва за структурни дефиниции, които разглеждат как системите функционират в действителност, а не какво се твърди, че се постига с тях.
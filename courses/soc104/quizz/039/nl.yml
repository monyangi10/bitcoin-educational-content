question: Wat is volgens Milton Friedman het grootste probleem bij het beoordelen van sociaal beleid op basis van hun verklaarde doelen in plaats van hun feitelijke resultaten?
answer: Goedbedoeld beleid heeft vaak onbedoelde gevolgen die in tegenspraak zijn met de oorspronkelijke doelstellingen, zoals het creëren van afhankelijkheid of marktverstoringen
wrong_answers:
  - Politici geven opzettelijk een verkeerd beeld van hun ware bedoelingen om hun echte agenda voor het publiek te verbergen en verantwoording te vermijden
  - Goede bedoelingen zijn inherent gebrekkig omdat ze persoonlijke vooroordelen weerspiegelen in plaats van een objectieve wetenschappelijke analyse van sociale problemen
  - Gestelde doelen zijn meestal te ambitieus en onrealistisch om te bereiken binnen de beperkingen van beperkte overheidsbudgetten en -middelen
explanation: |
  Friedmans kritiek richt zich op de kloof tussen intenties en resultaten, niet op de oprechtheid of haalbaarheid van doelen. Hij stelt dat beleid dat is
  om te helpen vaak averechts werkt door een slecht begrip van menselijke prikkels en economische mechanismen. Het probleem is niet oneerlijkheid, vooringenomenheid of budgetbeperkingen, maar eerder dat goede bedoelingen geen garantie zijn voor goede resultaten. Daarom pleit hij voor structurele definities die onderzoeken hoe systemen feitelijk functioneren in plaats van wat ze beweren te bereiken.
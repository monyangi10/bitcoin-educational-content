question: Menurut perspektif Milton Friedman, apa masalah utama dalam menilai kebijakan sosial berdasarkan tujuan yang dinyatakan dan bukan hasil aktualnya?
answer: Kebijakan yang bermaksud baik sering kali menghasilkan konsekuensi yang tidak diharapkan yang bertentangan dengan tujuan awal mereka, seperti menciptakan ketergantungan atau distorsi pasar
wrong_answers:
  - Politisi dengan sengaja salah mengartikan niat mereka yang sebenarnya untuk menyembunyikan agenda mereka yang sebenarnya dari publik dan menghindari akuntabilitas
  - Niat baik pada dasarnya memiliki kekurangan karena mencerminkan bias pribadi dan bukan analisis ilmiah yang objektif terhadap masalah sosial
  - Tujuan yang dinyatakan biasanya terlalu ambisius dan tidak realistis untuk dicapai dalam keterbatasan anggaran dan sumber daya pemerintah
explanation: |
  Kritik Friedman berfokus pada kesenjangan antara niat dan hasil, bukan pada ketulusan atau kelayakan tujuan. Ia berpendapat bahwa kebijakan yang dirancang
  untuk membantu sering kali menjadi bumerang karena kurangnya pemahaman tentang insentif manusia dan mekanisme ekonomi. Masalahnya bukanlah ketidakjujuran, bias, atau keterbatasan anggaran, tetapi lebih pada niat baik yang tidak menjamin hasil yang baik. Inilah sebabnya mengapa ia menganjurkan definisi struktural yang memeriksa bagaimana sistem benar-benar berfungsi daripada apa yang diklaim untuk dicapai.
question: 밀턴 프리드먼의 관점에 따르면, 사회 정책을 실제 결과가 아닌 명시된 목표에 따라 판단할 때 가장 큰 문제점은 무엇일까요?
answer: 선의의 정책도 의존성이나 시장 왜곡을 야기하는 등 원래의 목표와 모순되는 의도치 않은 결과를 낳는 경우가 많습니다
wrong_answers:
  - 정치인들은 대중에게 진짜 의제를 숨기고 책임을 회피하기 위해 고의적으로 자신의 진짜 의도를 왜곡합니다
  - 선한 의도는 사회 문제에 대한 객관적인 과학적 분석이 아닌 개인적인 편견을 반영하기 때문에 본질적으로 결함이 있습니다
  - 제시된 목표는 대개 너무 야심차고 비현실적이어서 제한된 정부 예산과 자원의 제약 내에서 달성하기 어렵습니다
explanation: |
  프리드먼의 비판은 목표의 진정성이나 실현 가능성이 아니라 의도와 결과 사이의 격차에 초점을 맞추고 있습니다. 그는 인간의 인센티브와 경제에 대한 이해 부족으로 인해
  인간의 인센티브와 경제 메커니즘에 대한 이해 부족으로 인해 종종 역효과를 낸다고 주장합니다. 문제는 부정직, 편견, 예산 제약이 아니라 좋은 의도가 좋은 결과를 보장하지 못한다는 것입니다. 그렇기 때문에 그는 시스템이 무엇을 달성한다고 주장하기보다 실제로 어떻게 작동하는지 조사하는 구조적 정의를 옹호합니다.
question: Zgodnie z perspektywą Miltona Friedmana, jaki jest główny problem z ocenianiem polityki społecznej na podstawie jej deklarowanych celów, a nie rzeczywistych rezultatów?
answer: Polityka oparta na dobrych intencjach często powoduje niezamierzone konsekwencje, które są sprzeczne z jej pierwotnymi celami, takie jak tworzenie zależności lub zakłóceń na rynku
wrong_answers:
  - Politycy celowo fałszywie przedstawiają swoje prawdziwe intencje, aby ukryć swój prawdziwy program przed opinią publiczną i uniknąć odpowiedzialności
  - Dobre intencje są z natury wadliwe, ponieważ odzwierciedlają osobiste uprzedzenia, a nie obiektywną naukową analizę problemów społecznych
  - Określone cele są zazwyczaj zbyt ambitne i nierealistyczne, aby można je było osiągnąć w ramach ograniczonych budżetów i zasobów rządowych
explanation: |
  Krytyka Friedmana koncentruje się na rozdźwięku między intencjami a wynikami, a nie na szczerości czy wykonalności celów. Argumentuje on, że polityka
  często przynoszą odwrotny skutek ze względu na słabe zrozumienie ludzkich motywacji i mechanizmów ekonomicznych. Problemem nie jest nieuczciwość, stronniczość czy ograniczenia budżetowe, ale raczej to, że dobre intencje nie gwarantują dobrych wyników. Dlatego też opowiada się za definicjami strukturalnymi, które badają, jak systemy faktycznie funkcjonują, a nie co rzekomo osiągają.
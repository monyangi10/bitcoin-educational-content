question: Secondo la prospettiva di Milton Friedman, qual è il problema principale nel giudicare le politiche sociali in base ai loro obiettivi dichiarati piuttosto che ai loro risultati effettivi?
answer: Le politiche ben intenzionate spesso producono conseguenze non volute che contraddicono i loro obiettivi originari, come la creazione di dipendenza o di distorsioni del mercato
wrong_answers:
  - I politici travisano deliberatamente le loro vere intenzioni per nascondere all'opinione pubblica il loro vero programma ed evitare la responsabilità
  - Le buone intenzioni sono intrinsecamente sbagliate perché riflettono pregiudizi personali piuttosto che un'analisi scientifica oggettiva dei problemi sociali
  - Gli obiettivi dichiarati sono di solito troppo ambiziosi e irrealistici per essere raggiunti entro i vincoli dei bilanci e delle risorse governative limitate
explanation: |
  La critica di Friedman si concentra sul divario tra intenzioni e risultati, non sulla sincerità o sulla fattibilità degli obiettivi. Sostiene che le politiche progettate per
  di aiuto spesso si ritorcono contro a causa della scarsa comprensione degli incentivi umani e dei meccanismi economici. Il problema non è la disonestà, i pregiudizi o i vincoli di bilancio, ma piuttosto che le buone intenzioni non garantiscono buoni risultati. Per questo motivo, egli sostiene la necessità di definizioni strutturali che esaminino il funzionamento effettivo dei sistemi piuttosto che i risultati che essi pretendono di ottenere.
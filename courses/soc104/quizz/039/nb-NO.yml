question: Hva er, ifølge Milton Friedman, det største problemet med å bedømme sosialpolitikken ut fra dens uttalte mål snarere enn dens faktiske resultater?
answer: Velmenende politikk får ofte utilsiktede konsekvenser som strider mot de opprinnelige målene, for eksempel ved å skape avhengighet eller markedsvridninger
wrong_answers:
  - Politikerne gir bevisst feilaktige opplysninger om sine egentlige hensikter for å skjule sin egentlige agenda for offentligheten og unngå å stå til ansvar
  - Gode intensjoner er i seg selv mangelfulle fordi de gjenspeiler personlige fordommer snarere enn objektive vitenskapelige analyser av sosiale problemer
  - De uttalte målene er vanligvis for ambisiøse og urealistiske til at de kan nås innenfor rammene av begrensede offentlige budsjetter og ressurser
explanation: |
  Friedmans kritikk fokuserer på gapet mellom intensjoner og resultater, ikke på om målene er oppriktige eller gjennomførbare. Han hevder at politikk som er utformet
  ofte slår tilbake på grunn av dårlig forståelse av menneskelige insentiver og økonomiske mekanismer. Problemet er ikke uærlighet, partiskhet eller budsjettbegrensninger, men snarere at gode intensjoner ikke garanterer gode resultater. Derfor tar han til orde for strukturelle definisjoner som undersøker hvordan systemer faktisk fungerer, snarere enn hva de hevder å oppnå.
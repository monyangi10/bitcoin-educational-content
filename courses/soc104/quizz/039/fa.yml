question: بر اساس دیدگاه میلتون فریدمن، مشکل اصلی در قضاوت درباره سیاست‌های اجتماعی بر اساس اهداف اعلام‌شده آن‌ها به جای نتایج واقعی‌شان چیست؟
answer: سیاست‌های با نیت خوب اغلب پیامدهای ناخواسته‌ای را به وجود می‌آورند که با اهداف اصلی آن‌ها در تضاد هستند، مانند ایجاد وابستگی یا اعوجاجات بازار.
wrong_answers:
  - سیاستمداران عمداً نیات واقعی خود را نادرست جلوه می‌دهند تا برنامه‌های واقعی خود را از دید عموم پنهان کرده و از پاسخگویی اجتناب کنند.
  - نیت‌های خوب ذاتاً دارای نقص هستند زیرا به جای تحلیل علمی عینی از مشکلات اجتماعی، تعصبات شخصی را منعکس می‌کنند.
  - اهداف اعلام‌شده معمولاً بیش از حد بلندپروازانه و غیرواقع‌بینانه هستند تا در چارچوب محدودیت‌های بودجه و منابع محدود دولتی محقق شوند.
explanation: |
  انتقاد فریدمن بر فاصله بین نیت‌ها و نتایج تمرکز دارد، نه بر صداقت یا امکان‌پذیری اهداف. او استدلال می‌کند که سیاست‌هایی که برای کمک طراحی شده‌اند، اغلب به دلیل درک ضعیف از انگیزه‌های انسانی و مکانیسم‌های اقتصادی نتیجه معکوس می‌دهند. مسئله عدم صداقت، تعصب یا محدودیت‌های بودجه نیست، بلکه این است که نیت‌های خوب تضمین‌کننده نتایج خوب نیستند. به همین دلیل است که او از تعاریف ساختاری حمایت می‌کند که بررسی می‌کنند سیستم‌ها چگونه واقعاً عمل می‌کنند، نه آنچه ادعا می‌کنند به دست می‌آورند.
question: De acordo com a perspetiva de Milton Friedman, qual é o principal problema de julgar as políticas sociais com base nos seus objectivos declarados e não nos seus resultados reais?
answer: As políticas bem intencionadas produzem frequentemente consequências não intencionais que contradizem os seus objectivos originais, como a criação de dependência ou distorções do mercado
wrong_answers:
  - Os políticos deturpam deliberadamente as suas verdadeiras intenções para esconder do público a sua verdadeira agenda e evitar a responsabilização
  - As boas intenções são intrinsecamente erradas porque reflectem preconceitos pessoais e não uma análise científica objetiva dos problemas sociais
  - Os objectivos declarados são geralmente demasiado ambiciosos e irrealistas para serem alcançados dentro das restrições dos orçamentos e recursos públicos limitados
explanation: |
  A crítica de Friedman centra-se no fosso entre as intenções e os resultados, e não na sinceridade ou viabilidade dos objectivos. Ele argumenta que as políticas concebidas
  para ajudar muitas vezes saem pela culatra devido a uma má compreensão dos incentivos humanos e dos mecanismos económicos. A questão não é a desonestidade, a parcialidade ou as restrições orçamentais, mas sim o facto de as boas intenções não garantirem bons resultados. É por isso que defende definições estruturais que examinem o modo como os sistemas funcionam efetivamente e não o que pretendem alcançar.
question: Kulingana na mtazamo wa Milton Friedman, tatizo kuu la kuhukumu sera za kijamii kulingana na malengo yao yaliyotajwa badala ya matokeo yao halisi ni lipi?
answer: Sera zenye nia njema mara nyingi hutoa matokeo yasiyokusudiwa na ambayo yanapingana na malengo yao ya awali, kama vile kuunda utegemezi au upotoshaji wa soko.
wrong_answers:
  - Wanasiasa hupotosha makusudi nia zao za kweli ili kuficha ajenda zao halisi kutoka kwa umma na kuepuka uwajibikaji
  - Nia njema kimsingi ina kasoro kwa sababu inaonyesha upendeleo wa kibinafsi badala ya uchambuzi wa kisayansi usio na upendeleo wa matatizo ya kijamii.
  - Malengo yaliyotajwa kwa kawaida huwa na malengo makubwa sana na yasiyowezekana kufikiwa ndani ya vikwazo vya bajeti na rasilimali chache za serikali.
explanation: |
  Ukosoaji wa Friedman unazingatia pengo kati ya nia na matokeo, si ukweli au uwezekano wa malengo. Anasema kwamba sera zilizoundwa kusaidia mara nyingi hushindwa kutokana na uelewa duni wa motisha za kibinadamu na mifumo ya kiuchumi. Suala si ukosefu wa uaminifu, upendeleo, au vikwazo vya bajeti, bali ni kwamba nia njema hazihakikishi matokeo mazuri. Hii ndiyo sababu anatetea ufafanuzi wa kimuundo unaochunguza jinsi mifumo inavyofanya kazi badala ya kile wanachodai kufikia.

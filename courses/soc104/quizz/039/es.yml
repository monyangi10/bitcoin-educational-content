question: Según la perspectiva de Milton Friedman, ¿cuál es el principal problema de juzgar las políticas sociales en función de sus objetivos declarados y no de sus resultados reales?
answer: Las políticas bienintencionadas a menudo producen consecuencias no deseadas que contradicen sus objetivos originales, como crear dependencia o distorsiones del mercado
wrong_answers:
  - Los políticos tergiversan deliberadamente sus verdaderas intenciones para ocultar al público sus verdaderos planes y evitar la rendición de cuentas
  - Las buenas intenciones son intrínsecamente defectuosas porque reflejan prejuicios personales en lugar de un análisis científico objetivo de los problemas sociales
  - Los objetivos declarados suelen ser demasiado ambiciosos y poco realistas para alcanzarlos dentro de las limitaciones de los presupuestos y recursos gubernamentales
explanation: |
  La crítica de Friedman se centra en la diferencia entre intenciones y resultados, no en la sinceridad o viabilidad de los objetivos. Sostiene que las políticas diseñadas
  para ayudar suelen ser contraproducentes debido a la escasa comprensión de los incentivos humanos y los mecanismos económicos. El problema no es la falta de honradez, la parcialidad o las limitaciones presupuestarias, sino que las buenas intenciones no garantizan buenos resultados. Por eso aboga por definiciones estructurales que examinen cómo funcionan realmente los sistemas y no lo que pretenden conseguir.
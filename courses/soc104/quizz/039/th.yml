question: ตามมุมมองของมิลตัน ฟรีดแมน ปัญหาหลักของการตัดสินนโยบายสังคมโดยอิงจากเป้าหมายที่ระบุไว้แทนที่จะเป็นผลลัพธ์ที่แท้จริงคืออะไร?
answer: นโยบายที่มีเจตนาดีมักก่อให้เกิดผลที่ไม่คาดคิดซึ่งขัดแย้งกับวัตถุประสงค์เดิม เช่น การสร้างการพึ่งพาหรือการบิดเบือนตลาด
wrong_answers:
  - นักการเมืองบิดเบือนเจตนาที่แท้จริงของตนเพื่อซ่อนวาระที่แท้จริงจากสาธารณชนและหลีกเลี่ยงความรับผิดชอบ
  - เจตนาดีมีข้อบกพร่องโดยเนื้อแท้เพราะสะท้อนอคติส่วนบุคคลมากกว่าการวิเคราะห์ทางวิทยาศาสตร์ที่เป็นกลางของปัญหาสังคม
  - เป้าหมายที่ตั้งไว้มักจะมีความทะเยอทะยานและไม่สมจริงเกินไปที่จะบรรลุได้ภายในข้อจำกัดของงบประมาณและทรัพยากรที่จำกัดของรัฐบาล
explanation: |
  คำวิจารณ์ของฟรีดแมนมุ่งเน้นไปที่ช่องว่างระหว่างเจตนากับผลลัพธ์ ไม่ใช่ความจริงใจหรือความเป็นไปได้ของเป้าหมาย เขาโต้แย้งว่านโยบายที่ออกแบบมาเพื่อช่วยเหลือมักจะส่งผลย้อนกลับเนื่องจากความเข้าใจที่ไม่ดีเกี่ยวกับแรงจูงใจของมนุษย์และกลไกทางเศรษฐกิจ ปัญหาไม่ได้อยู่ที่ความไม่ซื่อสัตย์ อคติ หรือข้อจำกัดด้านงบประมาณ แต่เป็นเพราะเจตนาดีไม่ได้รับประกันผลลัพธ์ที่ดี นี่คือเหตุผลที่เขาสนับสนุนคำจำกัดความเชิงโครงสร้างที่ตรวจสอบว่าระบบทำงานอย่างไรจริง ๆ แทนที่จะเป็นสิ่งที่พวกเขาอ้างว่าจะบรรลุ
question: Theo quan điểm của Milton Friedman, vấn đề chính khi đánh giá các chính sách xã hội dựa trên mục tiêu đã nêu thay vì kết quả thực tế của chúng là gì?
answer: Những chính sách có thiện chí thường dẫn đến những hậu quả không mong muốn, trái ngược với mục tiêu ban đầu, chẳng hạn như tạo ra sự phụ thuộc hoặc bóp méo thị trường.
wrong_answers:
  - Các chính trị gia cố tình xuyên tạc ý định thực sự của mình để che giấu chương trình nghị sự thực sự khỏi công chúng và trốn tránh trách nhiệm.
  - Những ý định tốt đẹp vốn dĩ luôn tiềm ẩn sai sót vì chúng phản ánh những định kiến cá nhân hơn là sự phân tích khoa học khách quan về các vấn đề xã hội.
  - Các mục tiêu đề ra thường quá tham vọng và không thực tế, khó có thể đạt được trong bối cảnh ngân sách và nguồn lực hạn chế của chính phủ.
explanation: |
  Phê bình của Friedman tập trung vào khoảng cách giữa ý định và kết quả, chứ không phải vào sự chân thành hay tính khả thi của các mục tiêu. Ông lập luận rằng các chính sách được thiết kế để giúp đỡ thường phản tác dụng do sự hiểu biết kém về động cơ của con người và các cơ chế kinh tế. Vấn đề không phải là sự thiếu trung thực, thiên vị hay hạn chế về ngân sách, mà là ý định tốt không đảm bảo kết quả tốt. Đó là lý do tại sao ông ủng hộ các định nghĩa mang tính cấu trúc, xem xét cách thức các hệ thống thực sự hoạt động chứ không phải những gì chúng tuyên bố đạt được.
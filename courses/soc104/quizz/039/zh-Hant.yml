question: 根據米爾頓佛利民 (Milton Friedman) 的觀點，根據社會政策的既定目標而非實際結果來判斷社會政策，主要的問題在哪裡？
answer: 用意良好的政策往往會產生意想不到的後果，與原本的目標背道而馳，例如造成依賴性或市場扭曲。
wrong_answers:
  - 政客故意歪曲他們的真實意圖，以向大眾隱瞞他們的真正議程，並避免問責
  - 良好的意願本身就有缺陷，因為它們反映的是個人的偏見，而不是對社會問題的客觀科學分析
  - 在有限的政府預算和資源的限制下，既定目標通常過於宏大且不切實際
explanation: |
  Friedman 的批判重點在於意圖與結果之間的差距，而非目標的誠意或可行性。他認為
  他認為，由於對人類激勵因素和經濟機制理解不深，旨在幫助他人的政策往往事與願違。問題不在於不誠實、偏見或預算限制，而在於好的意願並不能保證好的結果。這就是為什麼他主張結構性定義，以檢視系統實際如何運作，而非它們聲稱要達到的目標。
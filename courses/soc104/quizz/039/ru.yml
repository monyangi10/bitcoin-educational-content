question: С точки зрения Милтона Фридмана, в чем заключается основная проблема оценки социальной политики по ее заявленным целям, а не по ее реальным результатам?
answer: Благие намерения часто приводят к непредвиденным последствиям, противоречащим их первоначальным целям, например, к возникновению зависимости или рыночных диспропорций
wrong_answers:
  - Политики намеренно искажают свои истинные намерения, чтобы скрыть от общественности свои реальные планы и избежать ответственности
  - Благие намерения по своей сути ущербны, поскольку они отражают личные предубеждения, а не объективный научный анализ социальных проблем
  - Заявленные цели обычно слишком амбициозны и нереалистичны для достижения в условиях ограниченных государственных бюджетов и ресурсов
explanation: |
  Критика Фридмана сосредоточена на разрыве между намерениями и результатами, а не на искренности или осуществимости целей. Он утверждает, что политика, призванная
  помочь, часто приводит к обратному результату из-за плохого понимания человеческих стимулов и экономических механизмов. Дело не в нечестности, предвзятости или бюджетных ограничениях, а в том, что благие намерения не гарантируют хороших результатов. Именно поэтому он выступает за структурные определения, которые изучают, как на самом деле функционируют системы, а не то, чего они хотят достичь.
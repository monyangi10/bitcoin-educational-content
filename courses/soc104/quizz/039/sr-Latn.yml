question: Prema perspektivi Miltona Friedmana, glavni problem sa ocenjivanjem socijalnih politika na osnovu njihovih deklarisanih ciljeva, umesto stvarnih ishoda, jeste taj što se time može zanemariti stvarna efikasnost i posledice tih politika. Fokusiranje samo na ciljeve može dovesti do ignorisanja negativnih efekata ili neuspeha u postizanju željenih rezultata, što može rezultirati podrškom za politike koje nisu delotvorne ili čak štetne.
answer: Politike sa dobrim namerama često proizvode nenameravane posledice koje su u suprotnosti sa njihovim originalnim ciljevima, kao što su stvaranje zavisnosti ili tržišne distorzije.
wrong_answers:
  - Političari namerno pogrešno predstavljaju svoje prave namere kako bi sakrili svoju stvarnu agendu od javnosti i izbegli odgovornost.
  - Dobre namere su inherentno manjkave jer odražavaju lične predrasude umesto objektivne naučne analize društvenih problema.
  - Izjavljeni ciljevi su obično previše ambiciozni i nerealni da bi se postigli u okviru ograničenih budžeta i resursa vlade.
explanation: |
  Friedmanova kritika fokusira se na jaz između namera i rezultata, a ne na iskrenost ili izvodljivost ciljeva. On tvrdi da politike osmišljene da pomognu često imaju suprotan efekat zbog lošeg razumevanja ljudskih podsticaja i ekonomskih mehanizama. Problem nije neiskrenost, pristrasnost ili budžetska ograničenja, već to što dobre namere ne garantuju dobre ishode. Zato se zalaže za strukturne definicije koje ispituju kako sistemi zapravo funkcionišu, a ne šta tvrde da postignu.
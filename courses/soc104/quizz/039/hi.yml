question: मिल्टन फ्रीडमैन के दृष्टिकोण के अनुसार, सामाजिक नीतियों का मूल्यांकन उनके वास्तविक परिणामों के बजाय उनके घोषित लक्ष्यों के आधार पर करने में मुख्य समस्या क्या है?
answer: अच्छी मंशा से बनाई गई नीतियां अक्सर अनपेक्षित परिणाम उत्पन्न करती हैं जो उनके मूल उद्देश्यों के विपरीत होते हैं, जैसे कि निर्भरता पैदा करना या बाजार में विकृतियां उत्पन्न करना।
wrong_answers:
  - राजनेता जानबूझकर अपने वास्तविक इरादों को गलत तरीके से पेश करते हैं ताकि जनता से अपने असली एजेंडे को छिपा सकें और जवाबदेही से बच सकें।
  - अच्छे इरादे स्वाभाविक रूप से त्रुटिपूर्ण होते हैं क्योंकि वे सामाजिक समस्याओं के वस्तुनिष्ठ वैज्ञानिक विश्लेषण के बजाय व्यक्तिगत पूर्वाग्रहों को दर्शाते हैं।
  - घोषित लक्ष्य आमतौर पर बहुत महत्वाकांक्षी और अवास्तविक होते हैं, जिन्हें सीमित सरकारी बजट और संसाधनों की सीमाओं के भीतर हासिल करना मुश्किल होता है।
explanation: |
  फ्रीडमैन की आलोचना इरादों और परिणामों के बीच के अंतर पर केंद्रित है, न कि लक्ष्यों की ईमानदारी या व्यवहार्यता पर। उनका तर्क है कि मदद के उद्देश्य से बनाई गई नीतियां अक्सर मानवीय प्रेरणाओं और आर्थिक तंत्रों की खराब समझ के कारण विपरीत परिणाम देती हैं। मुद्दा बेईमानी, पूर्वाग्रह या बजट की कमी नहीं है, बल्कि यह है कि अच्छे इरादे अच्छे परिणामों की गारंटी नहीं देते। यही कारण है कि वे संरचनात्मक परिभाषाओं की वकालत करते हैं जो यह जांच करती हैं कि प्रणालियां वास्तव में कैसे काम करती हैं, न कि वे क्या हासिल करने का दावा करती हैं।
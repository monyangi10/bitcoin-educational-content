question: 根据米尔顿-弗里德曼的观点，根据既定目标而非实际结果来判断社会政策的主要问题是什么？
answer: 用心良苦的政策往往会产生与其最初目标相悖的意外后果，例如造成依赖性或市场扭曲
wrong_answers:
  - 政客故意歪曲自己的真实意图，向公众隐瞒真实议程，逃避责任
  - 良好的愿望本质上是有缺陷的，因为它们反映的是个人偏见，而不是对社会问题的客观科学分析
  - 在有限的政府预算和资源的限制下，既定目标通常过于宏大和不切实际，难以实现
explanation: |
  弗里德曼的批评侧重于意图与结果之间的差距，而不是目标的诚意或可行性。他认为，旨在提供帮助的政策
  由于对人类动机和经济机制的理解不足，旨在帮助他人的政策往往事与愿违。问题不在于不诚实、偏见或预算限制，而在于好的意图并不能保证好的结果。这就是为什么他提倡结构性定义，研究系统如何实际运作，而不是它们声称要实现什么。
question: Enligt Milton Friedmans perspektiv, vad är det främsta problemet med att bedöma socialpolitik utifrån dess uttalade mål snarare än dess faktiska resultat?
answer: Välmenande politiska åtgärder får ofta oavsiktliga konsekvenser som strider mot de ursprungliga målen, t.ex. genom att skapa beroende eller snedvridningar av marknaden
wrong_answers:
  - Politiker ger medvetet en felaktig bild av sina verkliga avsikter för att dölja sin verkliga agenda för allmänheten och undvika ansvarsutkrävande
  - Goda avsikter är till sin natur bristfälliga eftersom de återspeglar personliga fördomar snarare än en objektiv vetenskaplig analys av sociala problem
  - Angivna mål är vanligtvis för ambitiösa och orealistiska för att kunna uppnås inom ramen för begränsade statliga budgetar och resurser
explanation: |
  Friedmans kritik fokuserar på klyftan mellan avsikter och resultat, inte på målens uppriktighet eller genomförbarhet. Han menar att politik som är utformad
  ofta slår tillbaka på grund av dålig förståelse för mänskliga incitament och ekonomiska mekanismer. Problemet är inte oärlighet, partiskhet eller budgetbegränsningar, utan snarare att goda avsikter inte garanterar goda resultat. Därför förespråkar han strukturella definitioner som undersöker hur systemen faktiskt fungerar snarare än vad de säger sig uppnå.
question: Was ist nach Milton Friedman das Hauptproblem bei der Beurteilung von Sozialpolitik auf der Grundlage ihrer erklärten Ziele und nicht ihrer tatsächlichen Ergebnisse?
answer: Gut gemeinte politische Maßnahmen haben oft unbeabsichtigte Folgen, die ihren ursprünglichen Zielen widersprechen, z. B. die Schaffung von Abhängigkeiten oder Marktverzerrungen
wrong_answers:
  - Politiker stellen ihre wahren Absichten absichtlich falsch dar, um ihre wahren Absichten vor der Öffentlichkeit zu verbergen und sich der Verantwortung zu entziehen
  - Gute Absichten sind von Natur aus fehlerhaft, weil sie eher persönliche Voreingenommenheit als eine objektive wissenschaftliche Analyse sozialer Probleme widerspiegeln
  - Die erklärten Ziele sind in der Regel zu ehrgeizig und unrealistisch, um sie mit den begrenzten Haushaltsmitteln und Ressourcen der Regierung zu erreichen
explanation: |
  Friedmans Kritik konzentriert sich auf die Diskrepanz zwischen Absichten und Ergebnissen, nicht auf die Aufrichtigkeit oder Machbarkeit der Ziele. Er argumentiert, dass politische Maßnahmen, die
  die helfen sollen, oft nach hinten losgehen, weil sie die menschlichen Anreize und wirtschaftlichen Mechanismen nicht verstehen. Das Problem liegt nicht in Unehrlichkeit, Voreingenommenheit oder Budgetbeschränkungen, sondern darin, dass gute Absichten keine Garantie für gute Ergebnisse sind. Deshalb plädiert er für strukturelle Definitionen, die untersuchen, wie Systeme tatsächlich funktionieren, und nicht, was sie zu erreichen vorgeben.
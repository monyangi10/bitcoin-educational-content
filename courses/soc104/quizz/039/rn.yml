question: Dukurikije ukuntu Milton Friedman abona ibintu, ni ikihe kibazo nyamukuru co gucira urubanza ingingo ngenderwako z’imibano zishingiye ku ntumbero zazo zavuzwe aho gushingira ku ngaruka zazo nyazo?
answer: Amategeko afise intumbero nziza akenshi azana ingaruka zitari zo zivuguruza intumbero zayo z’intango, nk’ugutuma abantu bavyifatamwo neza canke bagahindura isoko .
wrong_answers:
  - Abanyapolitike baraserukira nabi n’ibigirankana imigambi yabo nyayo kugira ngo bahishe abantu bose umugambi wabo nyawo kandi ntibazobazwe .
  - Intumbero nziza zirafise amakosa kubera ko zigaragaza ukuntu umuntu abona ibintu aho gusuzuma ingorane zo mu kibano mu buryo bubereye .
  - Intumbero zavuzwe akenshi zirakomeye cane kandi ntizishoboka ku buryo zidashobora gushikwako mu gihe ingengo y’imari n’ubutunzi bwa Leta bifise bike .
explanation: |
  Ivyo Friedman anegura vyibanda ku ntambamyi iri hagati y’imigambi n’ivyavuyemwo, ntivyibanda ku kutagira nkunzi canke ku bushobozi bw’imigambi. Avuga ko amategeko yashizweho . 
  gufasha kenshi gusubira inyuma kubera ukutamenya neza inkurikizi z’abantu n’uburyo bw’ubutunzi. Ikibazo si ukudahemuka, ukugira uruhande rumwe canke ukubura ingengo y’imari, ahubwo ni uko imigambi myiza idatuma umuntu agira ingaruka nziza. Ni co gituma avugira insobanuro z’imibumbe zisuzuma ingene mu vy’ukuri ubuhinga bukora aho gusuzuma ivyo buvuga ko bushikako.
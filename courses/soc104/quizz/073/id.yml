question: Menurut filosofi libertarian, apa pembenaran utama untuk menentang pajak penghasilan dan undang-undang upah minimum?
answer: Keduanya merupakan pelanggaran pemerintah terhadap kebebasan individu dan perjanjian kontrak sukarela antara pihak swasta
wrong_answers:
  - Keduanya menciptakan inefisiensi ekonomi yang terutama merugikan perusahaan besar dan investor kaya
  - Keduanya merupakan contoh kebijakan yang harus dikelola oleh pemerintah daerah dan bukan oleh otoritas federal
  - Keduanya mewakili teori ekonomi usang yang telah terbukti tidak efektif oleh penelitian ekonomi modern
explanation: |
  Kaum Libertarian secara konsisten menentang pajak penghasilan dan undang-undang upah minimum berdasarkan prinsip utama mereka bahwa intervensi pemerintah melanggar kebebasan individu dan mekanisme pasar bebas.
  Mereka memandang pajak penghasilan sebagai 'pencurian' yang melanggar hak milik, dan undang-undang upah minimum sebagai distorsi pasar buatan yang melanggar kebebasan pemberi kerja dan karyawan untuk menegosiasikan kontrak secara sukarela. Konsistensi filosofis ini membedakan posisi libertarian dari kelompok politik lain yang mungkin mendukung satu kebijakan dan menentang kebijakan lainnya berdasarkan alasan pragmatis dan bukan prinsip.
question: स्वतंत्रतावादी दर्शन के अनुसार, आयकर और न्यूनतम मजदूरी कानूनों दोनों का विरोध करने का प्राथमिक औचित्य क्या है?
answer: ये दोनों ही व्यक्तिगत स्वतंत्रता और निजी पक्षों के बीच स्वैच्छिक संविदात्मक समझौतों के सरकारी उल्लंघन का प्रतिनिधित्व करते हैं।
wrong_answers:
  - ये दोनों ही आर्थिक अक्षमताएं पैदा करते हैं जो मुख्य रूप से बड़ी कंपनियों और धनी निवेशकों को नुकसान पहुंचाती हैं।
  - ये दोनों ऐसी नीतियों के उदाहरण हैं जिनका प्रबंधन संघीय अधिकारियों के बजाय स्थानीय सरकारों द्वारा किया जाना चाहिए।
  - ये दोनों ही अप्रचलित आर्थिक सिद्धांतों का प्रतिनिधित्व करते हैं जो आधुनिक आर्थिक अनुसंधान द्वारा अप्रभावी सिद्ध हो चुके हैं।
explanation: |
  स्वतंत्रतावादी लगातार आयकर और न्यूनतम मजदूरी कानूनों दोनों का विरोध करते हैं, क्योंकि उनका मूल सिद्धांत यह है कि सरकारी हस्तक्षेप व्यक्तिगत स्वतंत्रता और मुक्त बाजार तंत्र का उल्लंघन करता है।
  वे आयकर को संपत्ति के अधिकारों का हनन करने वाली 'चोरी' मानते हैं, और न्यूनतम मजदूरी कानूनों को कृत्रिम बाजार विकृति मानते हैं जो नियोक्ताओं और कर्मचारियों की स्वेच्छा से अनुबंध करने की स्वतंत्रता का उल्लंघन करती है। यह दार्शनिक संगति स्वतंत्रतावादियों को अन्य राजनीतिक विचारधाराओं से अलग करती है, जो सैद्धांतिक आधारों के बजाय व्यावहारिक आधारों पर एक नीति का समर्थन करते हुए दूसरी का विरोध कर सकते हैं।
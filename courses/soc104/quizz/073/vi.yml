question: Theo triết lý tự do, lý do chính đáng nhất để phản đối cả thuế thu nhập và luật lương tối thiểu là gì?
answer: Cả hai đều thể hiện sự vi phạm tự do cá nhân của chính phủ và các thỏa thuận hợp đồng tự nguyện giữa các bên tư nhân.
wrong_answers:
  - Cả hai đều tạo ra sự kém hiệu quả về kinh tế, chủ yếu gây thiệt hại cho các tập đoàn lớn và các nhà đầu tư giàu có.
  - Cả hai đều là ví dụ về các chính sách nên được quản lý bởi chính quyền địa phương chứ không phải chính quyền liên bang.
  - Cả hai đều đại diện cho những lý thuyết kinh tế lỗi thời đã được chứng minh là không hiệu quả bởi các nghiên cứu kinh tế hiện đại.
explanation: |
  Những người theo chủ nghĩa tự do luôn phản đối cả thuế thu nhập và luật lương tối thiểu dựa trên nguyên tắc cốt lõi của họ rằng sự can thiệp của chính phủ vi phạm tự do cá nhân và cơ chế thị trường tự do.
  
  Họ coi thuế thu nhập là "hành vi trộm cắp" xâm phạm quyền sở hữu, và luật lương tối thiểu là những sự bóp méo thị trường nhân tạo vi phạm quyền tự do của người sử dụng lao động và người lao động trong việc tự nguyện đàm phán hợp đồng. Sự nhất quán về mặt triết học này phân biệt lập trường của những người theo chủ nghĩa tự do với các trường phái chính trị khác, những người có thể ủng hộ chính sách này trong khi phản đối chính sách kia dựa trên cơ sở thực dụng hơn là nguyên tắc.
question: Kulingana na falsafa ya uhuru, ni nini sababu kuu ya kupinga kodi ya mapato na sheria za mshahara wa chini kabisa?
answer: Zote mbili zinawakilisha ukiukwaji wa serikali wa uhuru wa mtu binafsi na makubaliano ya kimkataba ya hiari kati ya pande binafsi
wrong_answers:
  - Zote mbili husababisha udhaifu wa kiuchumi ambao kimsingi hudhuru makampuni makubwa na wawekezaji matajiri
  - Zote mbili ni mifano ya sera zinazopaswa kusimamiwa na serikali za mitaa badala ya mamlaka za shirikisho
  - Zote mbili zinawakilisha nadharia za kiuchumi zilizopitwa na wakati ambazo zimethibitishwa kuwa hazina ufanisi na utafiti wa kiuchumi wa kisasa
explanation: |
  Wana-Libertarians hupinga kila mara kodi ya mapato na sheria za mshahara wa chini kulingana na kanuni yao kuu kwamba uingiliaji kati wa serikali unakiuka uhuru wa mtu binafsi na mifumo ya soko huria.
  
  Wanaona kodi ya mapato kama 'wizi' unaokiuka haki za mali, na sheria za mshahara wa chini kama upotoshaji bandia wa soko unaokiuka uhuru wa waajiri na wafanyakazi kujadili mikataba kwa hiari. Uthabiti huu wa kifalsafa hutofautisha misimamo ya wana-libertarians na familia zingine za kisiasa ambazo zinaweza kuunga mkono sera moja huku zikipinga nyingine kwa misingi ya vitendo badala ya kanuni.
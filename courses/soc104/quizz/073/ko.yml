question: 자유주의 철학에 따르면 소득세와 최저임금법을 모두 반대하는 주된 근거는 무엇인가요?
answer: 둘 다 개인의 자유에 대한 정부의 침해와 민간 당사자 간의 자발적 계약 계약을 나타냅니다
wrong_answers:
  - 둘 다 주로 대기업과 부유한 투자자들에게 피해를 주는 경제적 비효율을 초래합니다
  - 두 가지 모두 연방 당국이 아닌 지방 정부에서 관리해야 하는 정책의 예입니다
  - 두 가지 모두 현대 경제 연구에 의해 효과가 없는 것으로 입증된 낡은 경제 이론입니다
explanation: |
  자유주의자들은 정부의 개입이 개인의 자유와 자유 시장 메커니즘을 침해한다는 핵심 원칙에 따라 소득세와 최저임금법에 일관되게 반대합니다.
  이들은 소득세를 재산권을 침해하는 '도둑질'로, 최저임금법을 고용주와 근로자가 자발적으로 계약을 협상할 자유를 침해하는 인위적인 시장 왜곡으로 간주합니다. 이러한 철학적 일관성은 원칙보다는 실용적 근거에 따라 한 정책을 지지하고 다른 정책을 반대하는 다른 정치 계열과 자유주의 입장을 구별합니다.
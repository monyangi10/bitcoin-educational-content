question: بر اساس فلسفه لیبرترین، چه توجیه اصلی برای مخالفت با هر دو مالیات بر درآمد و قوانین حداقل دستمزد وجود دارد؟
answer: هر دو نشان‌دهنده نقض آزادی فردی و توافقات قراردادی داوطلبانه بین طرف‌های خصوصی توسط دولت هستند.
wrong_answers:
  - هر دو باعث ایجاد ناکارآمدی‌های اقتصادی می‌شوند که عمدتاً به شرکت‌های بزرگ و سرمایه‌گذاران ثروتمند آسیب می‌رسانند.
  - هر دو نمونه‌ای از سیاست‌هایی هستند که باید توسط دولت‌های محلی مدیریت شوند نه مقامات فدرال.
  - هر دو نظریه‌های اقتصادی قدیمی را نمایندگی می‌کنند که توسط تحقیقات اقتصادی مدرن بی‌اثر بودن آن‌ها ثابت شده است.
explanation: |
  لیبرتارین‌ها به طور مداوم با مالیات بر درآمد و قوانین حداقل دستمزد مخالفند، زیرا بر اساس اصل اساسی خود معتقدند که دخالت دولت آزادی فردی و مکانیسم‌های بازار آزاد را نقض می‌کند.  
  آن‌ها مالیات بر درآمد را به عنوان «دزدی» می‌بینند که به حقوق مالکیت تجاوز می‌کند و قوانین حداقل دستمزد را به عنوان تحریف‌های مصنوعی بازار که آزادی کارفرمایان و کارمندان را برای مذاکره داوطلبانه قراردادها نقض می‌کند، تلقی می‌کنند. این ثبات فلسفی، مواضع لیبرتارین‌ها را از دیگر خانواده‌های سیاسی که ممکن است یک سیاست را حمایت کنند در حالی که دیگری را بر اساس دلایل عمل‌گرایانه و نه اصولی مخالفند، متمایز می‌کند.
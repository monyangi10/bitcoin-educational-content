question: リバタリアンの哲学によれば、所得税と最低賃金法の両方に反対する主な理由は何か？
answer: どちらも、個人の自由と私的当事者間の自発的な契約合意に対する政府の侵害である。
wrong_answers:
  - どちらも、主に大企業と裕福な投資家に害を及ぼす経済的非効率性を生み出している。
  - いずれも、連邦当局ではなく、地方自治体が管理すべき政策の例である。
  - どちらも時代遅れの経済理論であり、現代の経済研究では効果がないことが証明されている。
explanation: |
  リバタリアンは、政府の介入は個人の自由と自由市場メカニズムを侵害するという基本原則に基づき、所得税と最低賃金法の両方に一貫して反対している。
  彼らは、所得税は財産権を侵害する「窃盗」であり、最低賃金法は雇用者と被雇用者が自発的に契約を交渉する自由を侵害する人為的な市場の歪曲であるとみなしている。この哲学的な一貫性により、リバタリアンの立場は、ある政策を支持する一方で他の政策には原理的な理由ではなく現実的な理由に基づいて反対する他の政治家系とは一線を画している。
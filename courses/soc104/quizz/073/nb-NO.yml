question: Hva er, ifølge libertariansk filosofi, den viktigste begrunnelsen for å være imot både inntektsskatt og minstelønnslover?
answer: Begge representerer statlige brudd på individuell frihet og frivillige avtaler mellom private parter
wrong_answers:
  - Begge deler skaper økonomisk ineffektivitet som først og fremst rammer store selskaper og velstående investorer
  - Begge deler er eksempler på politikk som bør forvaltes av lokale myndigheter snarere enn føderale myndigheter
  - Begge representerer utdaterte økonomiske teorier som har vist seg å være ineffektive i moderne økonomisk forskning
explanation: |
  Libertarianere er konsekvent motstandere av både inntektsskatt og minstelønnslover, basert på deres kjerneprinsipp om at statlig inngripen bryter med individuell frihet og frie markedsmekanismer.
  De ser på inntektsskatt som "tyveri" som krenker eiendomsretten, og minstelønnslover som kunstige markedsvridninger som krenker arbeidsgiveres og arbeidstakeres frihet til å forhandle frem kontrakter på frivillig basis. Denne filosofiske konsistensen skiller libertarianere fra andre politiske retninger, som kan støtte den ene politikken og motarbeide den andre ut fra pragmatiske snarere enn prinsipielle grunner.
question: Prema libertarijanskoj filozofiji, primarna opravdanja za protivljenje i porezima na dohodak i zakonima o minimalnoj zaradi su zaštita individualne slobode i vlasničkih prava.
answer: Oba predstavljaju kršenja slobode pojedinca od strane vlade i dobrovoljnih ugovornih sporazuma između privatnih strana
wrong_answers:
  - Oba stvaraju ekonomske neefikasnosti koje prvenstveno štete velikim korporacijama i bogatim investitorima
  - Oba su primeri politika koje bi trebalo da upravljaju lokalne vlasti, a ne federalne vlasti.
  - Oba predstavljaju zastarele ekonomske teorije koje su se pokazale neefikasnim prema savremenim ekonomskim istraživanjima.
explanation: |
  Libertarijanci dosledno se protive i porezima na dohodak i zakonima o minimalnoj zaradi na osnovu njihovog osnovnog principa da vladina intervencija krši individualnu slobodu i mehanizme slobodnog tržišta. 
  Oni poreze na dohodak vide kao 'krađu' koja narušava prava vlasništva, a zakone o minimalnoj zaradi kao veštačke distorzije tržišta koje krše slobodu poslodavaca i zaposlenih da dobrovoljno pregovaraju o ugovorima. Ova filozofska doslednost razlikuje libertarijanske stavove od drugih političkih porodica koje mogu podržavati jednu politiku dok se protive drugoj na osnovu pragmatičnih, a ne principijelnih osnova.
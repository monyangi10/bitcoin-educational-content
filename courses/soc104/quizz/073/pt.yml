question: De acordo com a filosofia libertária, qual é a principal justificação para se opor tanto aos impostos sobre o rendimento como às leis do salário mínimo?
answer: Ambos representam violações governamentais da liberdade individual e de acordos contratuais voluntários entre partes privadas
wrong_answers:
  - Ambos criam ineficiências económicas que prejudicam principalmente as grandes empresas e os investidores ricos
  - Ambos são exemplos de políticas que devem ser geridas pelos governos locais e não pelas autoridades federais
  - Ambas representam teorias económicas ultrapassadas que se revelaram ineficazes pela investigação económica moderna
explanation: |
  Os libertários opõem-se sistematicamente aos impostos sobre o rendimento e às leis sobre o salário mínimo com base no seu princípio fundamental de que a intervenção do governo viola a liberdade individual e os mecanismos do mercado livre.
  Consideram os impostos sobre o rendimento como um "roubo" que infringe os direitos de propriedade e as leis do salário mínimo como distorções artificiais do mercado que violam a liberdade de empregadores e empregados negociarem contratos voluntariamente. Esta consistência filosófica distingue as posições libertárias de outras famílias políticas que podem apoiar uma política e opor-se a outra com base em fundamentos pragmáticos e não em princípios.
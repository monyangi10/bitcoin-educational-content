question: Was ist nach der libertären Philosophie die Hauptbegründung für die Ablehnung sowohl von Einkommenssteuern als auch von Mindestlohngesetzen?
answer: In beiden Fällen handelt es sich um staatliche Eingriffe in die individuelle Freiheit und in freiwillige vertragliche Vereinbarungen zwischen privaten Parteien
wrong_answers:
  - Beide schaffen wirtschaftliche Ineffizienzen, die in erster Linie großen Unternehmen und wohlhabenden Investoren schaden
  - Beides sind Beispiele für Politiken, die von den lokalen Regierungen und nicht von den Bundesbehörden verwaltet werden sollten
  - Beide repräsentieren veraltete Wirtschaftstheorien, die sich in der modernen Wirtschaftsforschung als unwirksam erwiesen haben
explanation: |
  Libertäre lehnen sowohl Einkommenssteuern als auch Mindestlohngesetze konsequent ab, weil sie der Meinung sind, dass staatliche Eingriffe die individuelle Freiheit und die Mechanismen des freien Marktes verletzen.
  Sie betrachten Einkommenssteuern als "Diebstahl", der die Eigentumsrechte verletzt, und Mindestlohngesetze als künstliche Marktverzerrungen, die die Freiheit von Arbeitgebern und Arbeitnehmern verletzen, Verträge freiwillig auszuhandeln. Diese philosophische Kohärenz unterscheidet libertäre Positionen von anderen politischen Familien, die eine Politik unterstützen und die andere aus pragmatischen und nicht aus prinzipiellen Gründen ablehnen.
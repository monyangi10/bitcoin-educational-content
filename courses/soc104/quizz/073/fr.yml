question: According to libertarian philosophy, what is the primary justification for opposing both income taxes and minimum wage laws?
answer: Both represent government violations of individual freedom and voluntary contractual agreements between private parties
wrong_answers:
  - Both create economic inefficiencies that primarily harm large corporations and wealthy investors
  - Both are examples of policies that should be managed by local governments rather than federal authorities
  - Both represent outdated economic theories that have been proven ineffective by modern economic research
explanation: |
  Libertarians consistently oppose both income taxes and minimum wage laws based on their core principle that government intervention violates individual liberty and free market mechanisms. They view income taxes as 'theft' that infringes on property rights, and minimum wage laws as artificial market distortions that violate the freedom of employers and employees to negotiate contracts voluntarily. This philosophical consistency distinguishes libertarian positions from other political families who may support one policy while opposing the other based on pragmatic rather than principled grounds.

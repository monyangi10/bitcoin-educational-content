question: Согласно либертарианской философии, что является главным основанием для противодействия как подоходному налогу, так и законам о минимальной заработной плате?
answer: Оба представляют собой нарушение государством свободы личности и добровольных договорных соглашений между частными лицами
wrong_answers:
  - И то, и другое создает экономическую неэффективность, которая в первую очередь вредит крупным корпорациям и богатым инвесторам
  - И то, и другое - примеры политики, которой должны заниматься местные органы власти, а не федеральные
  - Обе представляют собой устаревшие экономические теории, неэффективность которых доказана современными экономическими исследованиями
explanation: |
  Либертарианцы последовательно выступают против подоходного налога и законов о минимальной заработной плате, основываясь на своем главном принципе: вмешательство государства нарушает свободу личности и механизмы свободного рынка.
  Они считают подоходные налоги "кражей", нарушающей права собственности, а законы о минимальной заработной плате - искусственными искажениями рынка, нарушающими свободу работодателей и работников добровольно заключать контракты. Такая философская последовательность отличает либертарианцев от других политических семей, которые могут поддерживать одну политику и выступать против другой, руководствуясь прагматическими, а не принципиальными соображениями.
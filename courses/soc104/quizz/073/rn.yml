question: Dukurikije filozofiya y’abanyagihugu, ni igiki nyamukuru cotuma umuntu arwanya amategeko agenga imisoro y’inyungu be n’umushahara mutoyi?
answer: Ivyo vyose bigereranya ukurenga ku mwidegemvyo w'umuntu ku giti ciwe na Leta be n'amasezerano y'ubushake hagati y'abantu ku giti cabo .
wrong_answers:
  - Ivyo vyose bituma ubutunzi budakora neza, ivyo bikaba bitera ingorane ahanini amashirahamwe manini manini n’abatunzi bashora imari .
  - Ivyo vyose ni ingero z'ingingo ngenderwako zikwiye gucungirwa n'intwaro z'intara aho gucungirwa n'ubutegetsi bwa Leta Zunze Ubumwe za Amerika .
  - Ivyo vyose bigereranya inyigisho z’ubutunzi za kera zagaragajwe n’ubushakashatsi bw’ubutunzi bwo muri iki gihe ko ata co zimaze .
explanation: |
  Abanyagihugu bakunda umwidegemvyo bararwanya ubudasiba imisoro y’inyungu n’amategeko agenga umushahara mutoyi bishingiye ku ngingo ngenderwako yabo nyamukuru y’uko kwinjira kwa Leta bihungabanya umwidegemvyo w’umuntu ku giti ciwe n’uburyo bwo gucuruza ibintu. 
  Babona ko imisoro y’inyungu ari ‘ubusuma’ buhungabanya uburenganzira bw’itunga, kandi amategeko agenga umushahara mutoyi ari uguhinduranya isoko ry’ubuhinga buhungabanya umwidegemvyo w’abakoresha n’abakozi wo gusezerana amasezerano ku bushake. Ukwo guhuza kwa filozofiya gutandukanya ivyiyumviro vy’abanyagihugu n’iyindi miryango ya politike ishobora gushigikira politike imwe mu gihe irwanya iyindi ishingiye ku mvo z’ukuri aho gushingira ku ngingo ngenderwako.
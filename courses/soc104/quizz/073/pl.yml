question: Zgodnie z filozofią libertariańską, jakie jest główne uzasadnienie sprzeciwu zarówno wobec podatków dochodowych, jak i przepisów o płacy minimalnej?
answer: Oba stanowią naruszenie przez rząd wolności jednostki i dobrowolnych umów między stronami prywatnymi
wrong_answers:
  - Oba powodują nieefektywność gospodarczą, która szkodzi przede wszystkim dużym korporacjom i bogatym inwestorom
  - Oba są przykładami polityk, które powinny być zarządzane przez władze lokalne, a nie federalne
  - Obie reprezentują przestarzałe teorie ekonomiczne, które okazały się nieskuteczne dzięki nowoczesnym badaniom ekonomicznym
explanation: |
  Libertarianie konsekwentnie sprzeciwiają się zarówno podatkom dochodowym, jak i przepisom o płacy minimalnej, opierając się na swojej podstawowej zasadzie, że interwencja rządu narusza wolność jednostki i mechanizmy wolnorynkowe.
  Postrzegają oni podatki dochodowe jako "kradzież", która narusza prawa własności, a przepisy o płacy minimalnej jako sztuczne zakłócenia rynku, które naruszają wolność pracodawców i pracowników do dobrowolnego negocjowania umów. Ta filozoficzna spójność odróżnia libertarian od innych rodzin politycznych, które mogą popierać jedną politykę, a sprzeciwiać się drugiej, kierując się bardziej pragmatycznymi niż pryncypialnymi przesłankami.
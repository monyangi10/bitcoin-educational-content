question: ตามปรัชญาเสรีนิยม สิ่งที่เป็นเหตุผลหลักในการคัดค้านทั้งภาษีเงินได้และกฎหมายค่าแรงขั้นต่ำคืออะไร?
answer: ทั้งสองอย่างเป็นการละเมิดเสรีภาพส่วนบุคคลและข้อตกลงตามสัญญาที่สมัครใจระหว่างภาคเอกชนโดยรัฐบาล
wrong_answers:
  - ทั้งสองสร้างความไม่มีประสิทธิภาพทางเศรษฐกิจที่ส่งผลกระทบต่อบริษัทขนาดใหญ่และนักลงทุนที่มั่งคั่งเป็นหลัก
  - ทั้งสองเป็นตัวอย่างของนโยบายที่ควรได้รับการจัดการโดยรัฐบาลท้องถิ่นแทนที่จะเป็นหน่วยงานของรัฐบาลกลาง
  - ทั้งสองแสดงถึงทฤษฎีเศรษฐศาสตร์ที่ล้าสมัยซึ่งได้รับการพิสูจน์แล้วว่าไม่มีประสิทธิภาพโดยการวิจัยเศรษฐศาสตร์สมัยใหม่
explanation: |
  ลิเบอร์ทาเรียนต่อต้านทั้งภาษีเงินได้และกฎหมายค่าแรงขั้นต่ำอย่างสม่ำเสมอ โดยยึดหลักการสำคัญที่ว่าการแทรกแซงของรัฐบาลละเมิดเสรีภาพส่วนบุคคลและกลไกตลาดเสรี พวกเขามองว่าภาษีเงินได้เป็น 'การขโมย' ที่ละเมิดสิทธิในทรัพย์สิน และกฎหมายค่าแรงขั้นต่ำเป็นการบิดเบือนตลาดที่ละเมิดเสรีภาพของนายจ้างและลูกจ้างในการเจรจาสัญญาโดยสมัครใจ ความสม่ำเสมอทางปรัชญานี้ทำให้จุดยืนของลิเบอร์ทาเรียนแตกต่างจากกลุ่มการเมืองอื่น ๆ ที่อาจสนับสนุนนโยบายหนึ่งขณะต่อต้านอีกนโยบายหนึ่งโดยอิงจากเหตุผลเชิงปฏิบัติมากกว่าหลักการ
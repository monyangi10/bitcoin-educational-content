question: Özgürlükçü felsefeye göre, hem gelir vergilerine hem de asgari ücret yasalarına karşı çıkmanın temel gerekçesi nedir?
answer: Her ikisi de bireysel özgürlüğün ve özel taraflar arasındaki gönüllü sözleşmeye dayalı anlaşmaların hükümet tarafından ihlalini temsil etmektedir
wrong_answers:
  - Her ikisi de öncelikle büyük şirketlere ve zengin yatırımcılara zarar veren ekonomik verimsizlikler yaratır
  - Her ikisi de federal makamlar yerine yerel yönetimler tarafından yönetilmesi gereken politikalara örnek teşkil etmektedir
  - Her ikisi de modern ekonomik araştırmalarla etkisizliği kanıtlanmış modası geçmiş ekonomik teorileri temsil etmektedir
explanation: |
  Liberteryenler, devlet müdahalesinin bireysel özgürlüğü ve serbest piyasa mekanizmalarını ihlal ettiği yönündeki temel ilkelerine dayanarak hem gelir vergilerine hem de asgari ücret yasalarına sürekli olarak karşı çıkmaktadır.
  Gelir vergilerini mülkiyet haklarını ihlal eden 'hırsızlık', asgari ücret yasalarını ise işverenlerin ve çalışanların gönüllü olarak sözleşme yapma özgürlüğünü ihlal eden yapay piyasa çarpıklıkları olarak görürler. Bu felsefi tutarlılık, liberteryen pozisyonları, bir politikayı desteklerken diğerine ilkesel değil pragmatik gerekçelerle karşı çıkabilen diğer siyasi ailelerden ayırır.
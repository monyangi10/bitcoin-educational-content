question: Wat is volgens de libertarische filosofie de belangrijkste rechtvaardiging om tegen zowel inkomstenbelastingen als minimumloonwetten te zijn?
answer: Beide vertegenwoordigen schendingen door de overheid van individuele vrijheid en vrijwillige contractuele overeenkomsten tussen private partijen
wrong_answers:
  - Beide creëren economische inefficiënties die vooral grote bedrijven en rijke investeerders benadelen
  - Beide zijn voorbeelden van beleid dat moet worden beheerd door lokale overheden in plaats van federale autoriteiten
  - Beide vertegenwoordigen verouderde economische theorieën die ineffectief zijn gebleken door modern economisch onderzoek
explanation: |
  Libertariërs verzetten zich consequent tegen zowel inkomstenbelastingen als minimumloonwetten op basis van hun kernprincipe dat overheidsinterventie individuele vrijheid en vrije marktmechanismen schendt.
  Ze beschouwen inkomstenbelastingen als 'diefstal' die inbreuk maakt op eigendomsrechten en minimumloonwetten als kunstmatige marktverstoringen die inbreuk maken op de vrijheid van werkgevers en werknemers om vrijwillig over contracten te onderhandelen. Deze filosofische consistentie onderscheidt libertarische standpunten van andere politieke families die het ene beleid steunen en het andere afwijzen op basis van pragmatische in plaats van principiële gronden.
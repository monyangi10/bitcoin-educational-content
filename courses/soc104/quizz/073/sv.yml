question: Enligt libertariansk filosofi, vad är det främsta skälet till att motsätta sig både inkomstskatter och lagar om minimilön?
answer: Båda utgör statliga kränkningar av den individuella friheten och frivilliga avtal mellan privata parter
wrong_answers:
  - Båda skapar ekonomisk ineffektivitet som främst drabbar stora företag och rika investerare
  - Båda är exempel på politikområden som bör hanteras av lokala myndigheter snarare än av federala myndigheter
  - Båda representerar föråldrade ekonomiska teorier som har visat sig vara ineffektiva av modern ekonomisk forskning
explanation: |
  Libertarianer motsätter sig konsekvent både inkomstskatter och lagar om minimilöner, baserat på deras grundläggande princip att statliga ingripanden kränker individens frihet och den fria marknadens mekanismer.
  De ser inkomstskatter som "stöld" som inkräktar på äganderätten, och lagar om minimilöner som artificiella marknadsstörningar som kränker arbetsgivares och arbetstagares frihet att frivilligt förhandla fram avtal. Denna filosofiska konsekvens skiljer libertarianska ståndpunkter från andra politiska familjer som kan stödja en politik medan de motsätter sig den andra baserat på pragmatiska snarare än principiella skäl.
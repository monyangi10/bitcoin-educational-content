question: Mis on libertaarne filosoofia kohaselt peamine põhjendus, miks ollakse vastu nii tulumaksule kui ka miinimumpalga seadustele?
answer: Mõlemad kujutavad endast üksikisiku vabaduse ja eraõiguslike isikute vaheliste vabatahtlike lepinguliste kokkulepete rikkumist valitsuse poolt
wrong_answers:
  - Mõlemad tekitavad majanduslikku ebaefektiivsust, mis kahjustab eelkõige suurettevõtteid ja jõukaid investoreid
  - Mõlemad on näited poliitikavaldkondadest, mida peaksid haldama pigem kohalikud omavalitsused kui föderaalasutused
  - Mõlemad esindavad vananenud majandusteooriaid, mis on kaasaegsete majandusuuringute käigus osutunud ebatõhusaks
explanation: |
  Libertaarid on järjekindlalt vastu nii tulumaksule kui ka miinimumpalga seadustele, tuginedes oma põhiprintsiibile, et valitsuse sekkumine rikub individuaalset vabadust ja vabaturu mehhanisme.
  Nad peavad tulumaksu "varguseks", mis rikub omandiõigust, ja miinimumpalga seadusi kunstlikuks turumoonutuseks, mis rikub tööandjate ja töötajate vabadust pidada vabatahtlikult läbirääkimisi lepingute üle. See filosoofiline järjepidevus eristab libertaarseid seisukohti teistest poliitilistest perekondadest, kes võivad toetada üht poliitikat, kuid olla teise vastu pigem pragmaatilistel kui põhimõttelistel põhjustel.
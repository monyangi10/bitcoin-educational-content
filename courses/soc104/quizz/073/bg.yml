question: Според либертарианската философия кое е основното основание за противопоставяне на данъците върху доходите и на законите за минималната работна заплата?
answer: И двете представляват правителствени нарушения на личната свобода и доброволните договорни споразумения между частни лица
wrong_answers:
  - И двете създават икономическа неефективност, която вреди предимно на големите корпорации и богатите инвеститори
  - И двете са пример за политики, които следва да се управляват от местните власти, а не от федералните
  - И двете представляват остарели икономически теории, които са доказали своята неефективност чрез съвременните икономически изследвания
explanation: |
  Либертарианците последователно се противопоставят както на данъците върху доходите, така и на законите за минималната работна заплата въз основа на основния си принцип, че държавната намеса нарушава личната свобода и механизмите на свободния пазар.
  Те разглеждат подоходните данъци като "кражба", която нарушава правото на собственост, а законите за минималната работна заплата - като изкуствени пазарни изкривявания, които нарушават свободата на работодателите и работниците да договарят договори доброволно. Тази философска последователност отличава либертарианските позиции от други политически семейства, които могат да подкрепят една политика, докато се противопоставят на друга, по-скоро по прагматични, отколкото по принципни съображения.
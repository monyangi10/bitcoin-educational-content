question: Secondo la filosofia libertaria, qual è la principale giustificazione per opporsi sia alle imposte sul reddito che alle leggi sul salario minimo?
answer: Entrambi rappresentano violazioni governative della libertà individuale e di accordi contrattuali volontari tra privati
wrong_answers:
  - Entrambi creano inefficienze economiche che danneggiano principalmente le grandi aziende e i ricchi investitori
  - Entrambi sono esempi di politiche che dovrebbero essere gestite dai governi locali piuttosto che dalle autorità federali
  - Entrambe rappresentano teorie economiche superate che sono state dimostrate inefficaci dalla moderna ricerca economica
explanation: |
  I libertari si oppongono costantemente sia alle imposte sul reddito che alle leggi sul salario minimo, sulla base del principio fondamentale che l'intervento del governo viola la libertà individuale e i meccanismi del libero mercato.
  Considerano le imposte sul reddito come un "furto" che viola i diritti di proprietà e le leggi sul salario minimo come distorsioni artificiali del mercato che violano la libertà dei datori di lavoro e dei dipendenti di negoziare volontariamente i contratti. Questa coerenza filosofica distingue le posizioni libertarie da quelle di altre famiglie politiche che possono sostenere una politica e opporsi all'altra sulla base di motivazioni pragmatiche piuttosto che di principio.
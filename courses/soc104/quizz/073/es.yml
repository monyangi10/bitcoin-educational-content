question: Según la filosofía libertaria, ¿cuál es la principal justificación para oponerse tanto a los impuestos sobre la renta como a las leyes de salario mínimo?
answer: Ambas representan violaciones gubernamentales de la libertad individual y de acuerdos contractuales voluntarios entre partes privadas
wrong_answers:
  - Ambas crean ineficiencias económicas que perjudican principalmente a las grandes empresas y a los inversores ricos
  - Ambos son ejemplos de políticas que deberían ser gestionadas por los gobiernos locales y no por las autoridades federales
  - Ambas representan teorías económicas obsoletas que han demostrado su ineficacia en la investigación económica moderna
explanation: |
  Los libertarios se oponen sistemáticamente tanto a los impuestos sobre la renta como a las leyes de salario mínimo basándose en su principio fundamental de que la intervención del gobierno viola la libertad individual y los mecanismos del libre mercado.
  Consideran los impuestos sobre la renta como un "robo" que vulnera los derechos de propiedad, y las leyes de salario mínimo como distorsiones artificiales del mercado que violan la libertad de empresarios y empleados para negociar contratos voluntariamente. Esta coherencia filosófica distingue las posiciones libertarias de otras familias políticas que pueden apoyar una política y oponerse a otra por motivos pragmáticos y no de principios.
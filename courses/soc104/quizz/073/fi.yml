question: Mikä on libertaristisen filosofian mukaan ensisijainen peruste vastustaa sekä tuloveroja että minimipalkkalakeja?
answer: Molemmat edustavat yksilönvapauden ja yksityisten osapuolten välisten vapaaehtoisten sopimusten rikkomista hallituksen toimesta
wrong_answers:
  - Molemmat aiheuttavat taloudellista tehottomuutta, joka vahingoittaa ensisijaisesti suuryrityksiä ja varakkaita sijoittajia
  - Molemmat ovat esimerkkejä politiikoista, joita paikallishallintojen tulisi hallinnoida liittovaltion viranomaisten sijaan
  - Molemmat edustavat vanhentuneita talousteorioita, jotka nykyaikainen taloudellinen tutkimus on osoittanut tehottomiksi
explanation: |
  Libertaristit vastustavat johdonmukaisesti sekä tuloveroja että minimipalkkalakeja, koska heidän perusperiaatteensa mukaan valtion puuttuminen loukkaa yksilönvapautta ja vapaita markkinamekanismeja.
  He pitävät tuloveroja "varkautena", joka loukkaa omistusoikeuksia, ja minimipalkkalakeja keinotekoisena markkinavääristymänä, joka loukkaa työnantajien ja työntekijöiden vapautta neuvotella sopimuksia vapaaehtoisesti. Tämä filosofinen johdonmukaisuus erottaa libertaristit muista poliittisista ryhmistä, jotka saattavat tukea yhtä politiikkaa ja vastustaa toista pikemminkin pragmaattisista kuin periaatteellisista syistä.
question: 根据自由主义哲学，反对所得税和最低工资法的主要理由是什么？
answer: 两者都是政府对个人自由和私人之间自愿合同协议的侵犯
wrong_answers:
  - 两者都会造成经济效率低下，主要损害大公司和富裕投资者的利益
  - 两者都是应由地方政府而非联邦当局管理的政策范例
  - 这两种理论都是过时的经济理论，已被现代经济研究证明无效
explanation: |
  自由主义者一贯反对所得税和最低工资法，其核心原则是政府干预侵犯个人自由和自由市场机制。
  他们认为所得税是侵犯财产权的 "盗窃"，最低工资法是人为的市场扭曲，侵犯了雇主和雇员自愿协商合同的自由。这种哲学上的一致性使自由主义者的立场有别于其他政治家族，后者可能基于实用主义而非原则性的理由支持一项政策，同时反对另一项政策。
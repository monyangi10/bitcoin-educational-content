question: 根據自由主義哲學，反對所得稅和最低工資法的主要理由是什麼？
answer: 兩者都代表政府違反個人自由和私人之間的自願契約協議
wrong_answers:
  - 兩者都造成經濟效率低落，主要損害的是大企業和富裕的投資者
  - 兩者都是應該由地方政府而非聯邦當局管理的政策範例
  - 兩者都代表過時的經濟理論，已被現代經濟研究證實無效
explanation: |
  自由主義者基於政府干預違反個人自由和自由市場機制的核心原則，始終反對所得稅和最低工資法。
  他們認為所得稅是侵犯財產權的「盜竊」，而最低工資法則是人為的市場扭曲，侵犯了雇主與員工自願協商契約的自由。這種哲學上的一致性將自由主義者的立場與其他政治家族區別開來，其他政治家族可能會基於實用而非原則性的理由支持某項政策，卻反對另一項政策。
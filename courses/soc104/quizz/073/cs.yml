question: Co je podle libertariánské filozofie hlavním důvodem pro odpor k daním z příjmu i k zákonům o minimální mzdě?
answer: Obojí představuje vládní porušování osobní svobody a dobrovolných smluvních dohod mezi soukromými stranami
wrong_answers:
  - Obě způsobují ekonomickou neefektivitu, která poškozuje především velké společnosti a bohaté investory
  - Obojí je příkladem politik, které by měly být řízeny místními samosprávami, nikoli federálními orgány
  - Obě představují zastaralé ekonomické teorie, jejichž neúčinnost prokázal moderní ekonomický výzkum
explanation: |
  Libertariáni se důsledně staví proti daním z příjmu i zákonům o minimální mzdě na základě své základní zásady, že státní zásahy porušují svobodu jednotlivce a mechanismy volného trhu.
  Daně z příjmu považují za "krádež", která zasahuje do vlastnických práv, a zákony o minimální mzdě za umělé narušení trhu, které porušuje svobodu zaměstnavatelů a zaměstnanců dobrovolně sjednávat smlouvy. Tato filosofická konzistence odlišuje libertariánské postoje od jiných politických rodin, které mohou podporovat jednu politiku a zároveň se stavět proti druhé spíše na základě pragmatických než principiálních důvodů.
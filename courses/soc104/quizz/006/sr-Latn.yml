question: Koje su pet sekcija identifikovanih u političkom dijagramu Nolanove karte?
answer: Statizam (dole), Socijalizam (levo), Konzervativizam (desno), Libertarijanizam (gore), i Centrizam (sredina)
wrong_answers:
  - Autoritarizam (dole), Liberalizam (levo), Nacionalizam (desno), Anarhizam (gore), i Populizam (sredina)
  - Totalitarizam (dole), Progresivizam (levo), Tradicionalizam (desno), Kapitalizam (gore), i Moderatizam (sredina)
  - Fašizam (dole), Komunizam (levo), Republikanizam (desno), Demokratija (gore), i Pragmatizam (sredina)
explanation: |
  Nolanova karta specifično deli politički spektar na pet različitih sekcija zasnovanih na ekonomskoj i ličnoj slobodi. Statizam predstavlja maksimalnu kontrolu vlade na dnu, dok Libertarijanizam na vrhu predstavlja maksimalnu slobodu u obe dimenzije. Socijalizam (levo) podržava ličnu slobodu, ali se protivi ekonomskoj slobodi, dok Konzervatizam (desno) podržava ekonomsku slobodu, ali ograničava ličnu slobodu. Centrizam zauzima sredinu, mešajući elemente obe slobode sa određenom regulacijom.
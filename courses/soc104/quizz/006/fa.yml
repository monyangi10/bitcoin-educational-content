question: پنج بخشی که در نمودار سیاسی نولان شناسایی شده‌اند کدامند؟
answer: اتاتیسم (پایین)، سوسیالیسم (چپ)، محافظه‌کاری (راست)، لیبرترینیسم (بالا)، و مرکزگرایی (وسط)
wrong_answers:
  - اقتدارگرایی (پایین)، لیبرالیسم (چپ)، ناسیونالیسم (راست)، آنارشیسم (بالا)، و پوپولیسم (وسط)
  - توتالیتاریسم (پایین)، پیشرفت‌گرایی (چپ)، سنت‌گرایی (راست)، سرمایه‌داری (بالا)، و میانه‌روی (وسط)
  - فاشیسم (پایین)، کمونیسم (چپ)، جمهوری‌خواهی (راست)، دموکراسی (بالا)، و عمل‌گرایی (وسط)
explanation: |
  نمودار نولان به‌طور خاص طیف سیاسی را به پنج بخش مجزا بر اساس آزادی اقتصادی و شخصی تقسیم می‌کند. دولت‌گرایی در پایین نمودار نشان‌دهنده حداکثر کنترل دولت است، در حالی که لیبرترینیسم در بالا نشان‌دهنده حداکثر آزادی در هر دو بُعد است. سوسیالیسم (چپ) از آزادی شخصی حمایت می‌کند اما با آزادی اقتصادی مخالف است، در حالی که محافظه‌کاری (راست) از آزادی اقتصادی حمایت می‌کند اما آزادی شخصی را محدود می‌کند. میانه‌روی در وسط قرار دارد و عناصر هر دو آزادی را با مقداری تنظیم ترکیب می‌کند.
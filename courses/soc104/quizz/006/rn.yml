question: Ni ibihe bice bitanu vyerekanwa mu kigereranyo ca politike ca Nolan Chart?
answer: Statistique (hasi), Sosiyalisiti (ibubamfu), Conservatisme (iburyo), Libertarianisme (hejuru), na Centrisme (hagati)
wrong_answers:
  - Ubutegetsi bw’agahomerabunwa (hasi), Ukwidegemvya (ibubamfu), Ubunyagihugu (iburyo), Ubunyagitugu (hejuru), n’Ubunyagihugu (hagati)
  - Ubutegetsi bw’agahomerabunwa (hasi), Ubuterambere (ibubamfu), Ubutegetsi bw’imigenzo (iburyo), Ubutegetsi bw’abanyagihugu (hejuru), n’Ubutegetsi bw’Uburinganire (hagati)
  - Ubufashisi (hasi), Ubukomunisita (ibubamfu), Uburepubulika (iburyo), Demokarasi (hejuru), n’Ubukora (hagati)
explanation: |
  Igishushanyo ca Nolan kigabanya canecane ivy’ubutegetsi mu bice bitanu bitandukanye bishingiye ku mwidegemvyo w’ubutunzi n’uw’umuntu ku giti ciwe. Igitigiri giserukira
  ubugenzuzi burengeye ubw’ibindi vyose bwa Leta buri hasi, mu gihe uburenganzira bwo kwidegemvya buri hejuru bugereranya umwidegemvyo mwinshi cane muri ivyo bice vyose bibiri. Ubusosiyalisiti (ibubamfu) bushigikira umuntu ku giti ciwe 
  umwidegemvyo ariko urwanya umwidegemvyo w’ubutunzi, mu gihe Conservatisme (iburyo) ishigikira umwidegemvyo w’ubutunzi ariko igahagarika umwidegemvyo w’umuntu ku giti ciwe. Ugushigikira hagati ni kwo gufata ikibanza co hagati,
  kuvanga ibintu vy’uwo mwidegemvyo wompi n’amategeko amwamwe.
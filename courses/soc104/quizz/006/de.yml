question: Welches sind die fünf Abschnitte, die im politischen Diagramm des Nolan-Diagramms dargestellt sind?
answer: Statismus (unten), Sozialismus (links), Konservatismus (rechts), Libertarismus (oben) und Zentrismus (Mitte)
wrong_answers:
  - Autoritarismus (unten), Liberalismus (links), Nationalismus (rechts), Anarchismus (oben) und Populismus (Mitte)
  - Totalitarismus (unten), Progressivismus (links), Traditionalismus (rechts), Kapitalismus (oben) und Moderatismus (Mitte)
  - Faschismus (unten), Kommunismus (links), Republikanismus (rechts), Demokratie (oben) und Pragmatismus (Mitte)
explanation: |
  Das Nolan-Diagramm unterteilt das politische Spektrum in fünf verschiedene Bereiche, die auf wirtschaftlicher und persönlicher Freiheit basieren. Der Statismus steht für
  der Statismus (unten) steht für maximale staatliche Kontrolle, während der Libertarismus (oben) für maximale Freiheit in beiden Bereichen steht. Der Sozialismus (links) unterstützt die persönliche
  sozialismus (links) unterstützt die persönliche Freiheit, lehnt aber die wirtschaftliche Freiheit ab, während der Konservatismus (rechts) die wirtschaftliche Freiheit unterstützt, aber die persönliche Freiheit einschränkt. Der Zentrismus befindet sich in der Mitte,
  er mischt Elemente beider Freiheiten mit einer gewissen Regulierung.
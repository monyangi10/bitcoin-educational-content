question: 놀란 차트 정치 다이어그램에서 식별되는 5가지 섹션은 무엇인가요?
answer: 국가주의(아래), 사회주의(왼쪽), 보수주의(오른쪽), 자유주의(위), 중도주의(가운데)
wrong_answers:
  - 권위주의(아래), 자유주의(왼쪽), 민족주의(오른쪽), 아나키즘(위), 포퓰리즘(가운데)
  - 전체주의(아래), 진보주의(왼쪽), 전통주의(오른쪽), 자본주의(위), 온건주의(가운데)
  - 파시즘(아래), 공산주의(왼쪽), 공화주의(오른쪽), 민주주의(위), 실용주의(가운데)
explanation: |
  놀란 차트는 정치적 스펙트럼을 경제적 자유와 개인의 자유를 기준으로 다섯 가지 섹션으로 구체적으로 구분합니다. 아래쪽의 국가주의는
  정부의 통제를 극대화하고, 위쪽의 자유주의는 두 가지 측면에서 최대한의 자유를 추구합니다. 사회주의(왼쪽)는 개인의 자유는 지지하지만
  자유를 지지하지만 경제적 자유에는 반대하는 반면, 보수주의(오른쪽)는 경제적 자유는 지지하지만 개인의 자유는 제한합니다. 중도주의는 그 중간 지점을 차지합니다,
  두 자유의 요소와 약간의 규제를 혼합하여 중간 지점을 차지합니다.
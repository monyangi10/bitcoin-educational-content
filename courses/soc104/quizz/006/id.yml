question: Apa saja lima bagian yang diidentifikasi dalam diagram politik Bagan Nolan?
answer: Statisme (bawah), Sosialisme (kiri), Konservatisme (kanan), Libertarianisme (atas), dan Sentrisme (tengah)
wrong_answers:
  - Otoritarianisme (bawah), Liberalisme (kiri), Nasionalisme (kanan), Anarkisme (atas), dan Populisme (tengah)
  - Totalitarianisme (bawah), Progresivisme (kiri), Tradisionalisme (kanan), Kapitalisme (atas), dan Moderatisme (tengah)
  - Fasisme (bawah), Komunisme (kiri), Republikanisme (kanan), Demokrasi (atas), dan Pragmatisme (tengah)
explanation: |
  Bagan Nolan secara khusus membagi spektrum politik menjadi lima bagian yang berbeda berdasarkan kebebasan ekonomi dan kebebasan pribadi. Statisme mewakili
  kontrol pemerintah maksimum di bagian bawah, sementara Libertarianisme di bagian atas mewakili kebebasan maksimum di kedua dimensi. Sosialisme (kiri) mendukung kebebasan pribadi
  pribadi tetapi menentang kebebasan ekonomi, sementara Konservatisme (kanan) mendukung kebebasan ekonomi tetapi membatasi kebebasan pribadi. Sentrisme berada di tengah-tengah,
  mencampurkan elemen-elemen dari kedua kebebasan tersebut dengan beberapa peraturan.
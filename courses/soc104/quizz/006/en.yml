question: What are the five sections identified in the Nolan Chart political diagram?
answer: Statism (bottom), Socialism (left), Conservatism (right), Libertarianism (top), and Centrism (middle)
wrong_answers:
  - Authoritarianism (bottom), Liberalism (left), Nationalism (right), Anarchism (top), and Populism (middle)
  - Totalitarianism (bottom), Progressivism (left), Traditionalism (right), Capitalism (top), and Moderatism (middle)
  - Fascism (bottom), Communism (left), Republicanism (right), Democracy (top), and Pragmatism (middle)
explanation: |
  The Nolan Chart specifically divides the political spectrum into five distinct sections based on economic and personal freedom. Statism represents maximum government control at the bottom, while Libertarianism at the top represents maximum freedom in both dimensions. Socialism (left) supports personal freedom but opposes economic freedom, while Conservatism (right) supports economic freedom but restricts personal freedom. Centrism occupies the middle ground, mixing elements of both freedoms with some regulation.
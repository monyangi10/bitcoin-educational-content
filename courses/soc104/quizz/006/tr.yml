question: Nolan Şeması siyasi diyagramında tanımlanan beş bölüm nedir?
answer: Devletçilik (altta), Sosyalizm (solda), Muhafazakarlık (sağda), Özgürlükçülük (üstte) ve Merkezcilik (ortada)
wrong_answers:
  - Otoriterlik (alt), Liberalizm (sol), Milliyetçilik (sağ), Anarşizm (üst) ve Popülizm (orta)
  - Totalitarizm (altta), İlerlemecilik (solda), Gelenekçilik (sağda), Kapitalizm (üstte) ve Ilımlılık (ortada)
  - Faşizm (altta), Komünizm (solda), Cumhuriyetçilik (sağda), Demokrasi (üstte) ve Pragmatizm (ortada)
explanation: |
  Nolan Tablosu, siyasi yelpazeyi özellikle ekonomik ve kişisel özgürlük temelinde beş farklı bölüme ayırmaktadır. Devletçilik şunları temsil eder
  en altta maksimum hükümet kontrolü, en üstte ise Liberteryenizm her iki boyutta da maksimum özgürlüğü temsil eder. Sosyalizm (solda) kişisel özgürlükleri destekler
  ekonomik özgürlüğe karşı çıkarken, Muhafazakârlık (sağ) ekonomik özgürlüğü destekler ancak kişisel özgürlüğü kısıtlar. Merkezcilik ise orta noktada yer alır,
  her iki özgürlüğün unsurlarını bir miktar düzenleme ile karıştırmak.
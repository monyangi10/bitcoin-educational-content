question: Nolan Chart 政治圖表中指出的五個部分是什麼？
answer: 國家主義 (下)、社會主義 (左)、保守主義 (右)、自由主義 (上) 和中央主義 (中)
wrong_answers:
  - 專制主義 (下)、自由主義 (左)、民族主義 (右)、無政府主義 (上) 和民粹主義 (中)
  - 極權主義 (下)、進步主義 (左)、傳統主義 (右)、資本主義 (上) 和中庸主義 (中)
  - 法西斯主義 (下)、共產主義 (左)、共和主義 (右)、民主主義 (上) 和務實主義 (中)
explanation: |
  諾蘭圖表 (Nolan Chart) 根據經濟和個人自由，特別將政治光譜分為五個不同的部分。國家主義
  自由主義（Libertarianism）位於頂部，代表兩方面的最大自由。社會主義（左）支持個人
  社會主義（左）支持個人自由但反對經濟自由，而保守主義（右）支持經濟自由但限制個人自由。中間主義則處於中間位置、
  混合了兩種自由的元素和一些規範。
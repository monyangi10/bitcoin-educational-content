question: Ni sehemu gani tano zilizoainishwa katika mchoro wa kisiasa wa Chati ya Nolan?
answer: Takwimu (chini), Ujamaa (kushoto), Uhafidhina (kulia), Uliberali (juu), na Ukatili (katikati)
wrong_answers:
  - Udikteta (chini), Uliberali (kushoto), Utaifa (kulia), Uanarchism (juu), na Upopulism (katikati)
  - Udikteta (chini), Ustawi (kushoto), Utamaduni (kulia), Ubepari (juu), na Ukadiriaji (katikati)
  - Ufashisti (chini), Ukomunisti (kushoto), Urepublican (kulia), Demokrasia (juu), na Upragmatism (katikati)
explanation: |
  Chati ya Nolan inagawanya hasa wigo wa kisiasa katika sehemu tano tofauti kulingana na uhuru wa kiuchumi na kibinafsi. Takwimu zinawakilisha udhibiti wa juu wa serikali chini, huku Uhuru wa Uhuru wa Juu ukiwakilisha uhuru wa juu katika nyanja zote mbili. Ujamaa (kushoto) unaunga mkono uhuru wa kibinafsi lakini unapinga uhuru wa kiuchumi, huku Uhafidhina (kulia) ukiunga mkono uhuru wa kiuchumi lakini unazuia uhuru wa kibinafsi. Ukatili unashikilia msingi wa kati, ukichanganya vipengele vya uhuru wote wawili na kanuni fulani.

question: Năm phần được xác định trong sơ đồ chính trị Nolan Chart là gì?
answer: Chủ nghĩa nhà nước (dưới cùng), Chủ nghĩa xã hội (trái), Chủ nghĩa bảo thủ (phải), Chủ nghĩa tự do (trên cùng) và Chủ nghĩa trung dung (ở giữa)
wrong_answers:
  - Chủ nghĩa độc tài (dưới cùng), Chủ nghĩa tự do (trái), Chủ nghĩa dân tộc (phải), Chủ nghĩa vô chính phủ (trên cùng) và Chủ nghĩa dân túy (ở giữa)
  - Chủ nghĩa toàn trị (dưới cùng), Chủ nghĩa tiến bộ (trái), Chủ nghĩa truyền thống (phải), Chủ nghĩa tư bản (trên cùng) và Chủ nghĩa ôn hòa (ở giữa)
  - Chủ nghĩa phát xít (dưới cùng), Chủ nghĩa cộng sản (bên trái), Chủ nghĩa cộng hòa (bên phải), Dân chủ (trên cùng) và Chủ nghĩa thực dụng (ở giữa)
explanation: |
  Biểu đồ Nolan chia phổ chính trị thành năm phần riêng biệt dựa trên tự do kinh tế và tự do cá nhân. Chủ nghĩa nhà nước đại diện cho sự kiểm soát tối đa của chính phủ ở phía dưới, trong khi chủ nghĩa tự do ở phía trên đại diện cho sự tự do tối đa ở cả hai khía cạnh. Chủ nghĩa xã hội (bên trái) ủng hộ tự do cá nhân nhưng phản đối tự do kinh tế, trong khi chủ nghĩa bảo thủ (bên phải) ủng hộ tự do kinh tế nhưng hạn chế tự do cá nhân. Chủ nghĩa trung dung nằm ở vị trí giữa, kết hợp các yếu tố của cả hai loại tự do với một số quy định.
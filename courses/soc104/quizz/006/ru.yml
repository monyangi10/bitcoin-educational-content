question: Какие пять секций обозначены на политической диаграмме Nolan Chart?
answer: Статизм (внизу), социализм (слева), консерватизм (справа), либертарианство (вверху) и центризм (посередине)
wrong_answers:
  - Авторитаризм (внизу), либерализм (слева), национализм (справа), анархизм (вверху) и популизм (посередине)
  - Тоталитаризм (внизу), прогрессивизм (слева), традиционализм (справа), капитализм (вверху) и умеренность (посередине)
  - Фашизм (внизу), коммунизм (слева), республиканизм (справа), демократия (вверху) и прагматизм (в середине)
explanation: |
  Диаграмма Нолана разделяет политический спектр на пять различных секций, основанных на экономической и личной свободе. Статизм представляет собой
  максимальный контроль правительства в нижней части, в то время как либертарианство в верхней части представляет максимальную свободу в обоих измерениях. Социализм (слева) поддерживает личную
  социализм (слева) поддерживает свободу личности, но выступает против экономической свободы, а консерватизм (справа) поддерживает экономическую свободу, но ограничивает свободу личности. Центризм занимает среднюю позицию,
  смешивая элементы обеих свобод с некоторым регулированием.
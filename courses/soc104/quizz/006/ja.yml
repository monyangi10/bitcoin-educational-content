question: ノーラン・チャートの政治的ダイアグラムにある5つのセクションとは？
answer: 国家主義（下）、社会主義（左）、保守主義（右）、リバタリアニズム（上）、中道主義（中）
wrong_answers:
  - 権威主義（下）、リベラリズム（左）、ナショナリズム（右）、アナキズム（上）、ポピュリズム（中）
  - 全体主義（下）、進歩主義（左）、伝統主義（右）、資本主義（上）、穏健主義（中）
  - ファシズム（下）、共産主義（左）、共和主義（右）、民主主義（上）、プラグマティズム（中）
explanation: |
  ノーラン・チャートは、経済的自由と個人的自由に基づいて、政治的スペクトルを明確に5つに区分している。国家主義
  は経済的自由と個人的自由を基準に5つに区分している。社会主義（左）は個人の自由を支持するが
  保守主義（右）は経済的自由を支持するが、個人の自由を制限する。中道主義はその中間を占める、
  両者の自由と若干の規制の要素が混在している。
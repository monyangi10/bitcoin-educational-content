question: नोलन चार्ट के राजनीतिक आरेख में पहचाने गए पाँच खंड कौन-कौन से हैं?
answer: राज्यवाद (नीचे), समाजवाद (बाएं), रूढ़िवाद (दाएं), स्वतंत्रतावाद (ऊपर) और मध्यमार्गीवाद (बीच में)
wrong_answers:
  - अधिनायकवाद (नीचे), उदारवाद (बाएं), राष्ट्रवाद (दाएं), अराजकतावाद (ऊपर) और लोकलुभावनवाद (मध्य)
  - अधिनायकवाद (नीचे), प्रगतिवाद (बाएं), परंपरावाद (दाएं), पूंजीवाद (ऊपर) और उदारवाद (मध्य)
  - फासीवाद (नीचे), साम्यवाद (बाएं), गणतंत्रवाद (दाएं), लोकतंत्र (ऊपर) और व्यावहारिकता (मध्य)
explanation: |
  नोलन चार्ट विशेष रूप से आर्थिक और व्यक्तिगत स्वतंत्रता के आधार पर राजनीतिक स्पेक्ट्रम को पाँच अलग-अलग वर्गों में विभाजित करता है। राज्यवाद सबसे निचले स्तर पर अधिकतम सरकारी नियंत्रण का प्रतिनिधित्व करता है, जबकि स्वतंत्रतावाद सबसे ऊपरी स्तर पर दोनों आयामों में अधिकतम स्वतंत्रता का प्रतिनिधित्व करता है। समाजवाद (बाएँ) व्यक्तिगत स्वतंत्रता का समर्थन करता है लेकिन आर्थिक स्वतंत्रता का विरोध करता है, जबकि रूढ़िवाद (दाएँ) आर्थिक स्वतंत्रता का समर्थन करता है लेकिन व्यक्तिगत स्वतंत्रता को प्रतिबंधित करता है। मध्यमार्गी विचारधारा दोनों स्वतंत्रताओं के तत्वों को कुछ नियमों के साथ मिलाकर मध्य स्थिति को संभालती है।
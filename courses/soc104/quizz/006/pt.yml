question: Quais são as cinco secções identificadas no diagrama político da Carta de Nolan?
answer: Estatismo (em baixo), Socialismo (à esquerda), Conservadorismo (à direita), Libertarianismo (em cima) e Centrismo (a meio)
wrong_answers:
  - Autoritarismo (em baixo), Liberalismo (à esquerda), Nacionalismo (à direita), Anarquismo (em cima) e Populismo (a meio)
  - Totalitarismo (em baixo), Progressismo (à esquerda), Tradicionalismo (à direita), Capitalismo (em cima) e Moderatismo (a meio)
  - Fascismo (em baixo), Comunismo (à esquerda), Republicanismo (à direita), Democracia (em cima) e Pragmatismo (a meio)
explanation: |
  A Carta de Nolan divide especificamente o espetro político em cinco secções distintas com base na liberdade económica e pessoal. O estatismo representa
  representa o máximo controlo governamental na base, enquanto o Libertarianismo, no topo, representa a máxima liberdade em ambas as dimensões. O socialismo (esquerda) apoia a liberdade pessoal
  liberdade pessoal mas opõe-se à liberdade económica, enquanto o conservadorismo (direita) apoia a liberdade económica mas restringe a liberdade pessoal. O centrismo ocupa o meio-termo,
  misturando elementos de ambas as liberdades com alguma regulamentação.
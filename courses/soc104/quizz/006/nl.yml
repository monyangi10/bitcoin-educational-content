question: Wat zijn de vijf secties in het politieke diagram van de Nolan Chart?
answer: Statisme (onder), Socialisme (links), Conservatisme (rechts), Libertarisme (boven) en Centrisme (midden)
wrong_answers:
  - Autoritarisme (onder), liberalisme (links), nationalisme (rechts), anarchisme (boven) en populisme (midden)
  - Totalitarisme (onder), progressivisme (links), traditionalisme (rechts), kapitalisme (boven) en gematigdheid (midden)
  - Fascisme (onder), communisme (links), republicanisme (rechts), democratie (boven) en pragmatisme (midden)
explanation: |
  De Nolan Chart verdeelt het politieke spectrum specifiek in vijf verschillende secties gebaseerd op economische en persoonlijke vrijheid. Statisme vertegenwoordigt
  maximale overheidscontrole aan de onderkant, terwijl Libertarisme aan de bovenkant staat voor maximale vrijheid in beide dimensies. Socialisme (links) ondersteunt persoonlijke
  vrijheid maar tegen economische vrijheid, terwijl conservatisme (rechts) economische vrijheid ondersteunt maar persoonlijke vrijheid beperkt. Centrisme neemt de middenpositie in,
  het mengt elementen van beide vrijheden met enige regulering.
question: 诺兰图表政治图表中确定的五个部分是什么？
answer: 国家主义（下）、社会主义（左）、保守主义（右）、自由主义（上）和中间主义（中）
wrong_answers:
  - 专制主义（下）、自由主义（左）、民族主义（右）、无政府主义（上）和民粹主义（中）
  - 极权主义（下）、进步主义（左）、传统主义（右）、资本主义（上）和温和主义（中）
  - 法西斯主义（下）、共产主义（左）、共和主义（右）、民主主义（上）和实用主义（中）
explanation: |
  诺兰图表》根据经济和个人自由将政治光谱具体划分为五个不同的部分。国家主义
  位于底部的国家主义代表了最大程度的政府控制，而位于顶部的自由主义则代表了两个方面的最大自由。社会主义（左）支持个人
  社会主义（左）支持个人自由但反对经济自由，而保守主义（右）支持经济自由但限制个人自由。中间主义处于中间位置、
  混合了两种自由的元素和一些监管。
question: Кои са петте секции, посочени в политическата диаграма на Нолан?
answer: Статизъм (долу), социализъм (вляво), консерватизъм (вдясно), либертарианство (горе) и центризъм (в средата)
wrong_answers:
  - Авторитаризъм (долу), либерализъм (вляво), национализъм (вдясно), анархизъм (горе) и популизъм (в средата)
  - Тоталитаризъм (долу), прогресизъм (вляво), традиционализъм (вдясно), капитализъм (горе) и умереност (в средата)
  - Фашизъм (долу), комунизъм (вляво), републиканизъм (вдясно), демокрация (горе) и прагматизъм (в средата)
explanation: |
  Диаграмата на Нолан разделя политическия спектър на пет отделни части, основани на икономическата и личната свобода. Статизмът представлява
  максимален държавен контрол в долната част, докато либертарианството в горната част представлява максимална свобода и в двете измерения. Социализмът (вляво) подкрепя личната
  свобода, но се противопоставя на икономическата свобода, докато консерватизмът (вдясно) подкрепя икономическата свобода, но ограничава личната свобода. Центризмът заема средното положение,
  смесвайки елементи на двете свободи с известно регулиране.
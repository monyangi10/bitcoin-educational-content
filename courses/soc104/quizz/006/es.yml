question: ¿Cuáles son las cinco secciones identificadas en el diagrama político del Cuadro de Nolan?
answer: Estatismo (abajo), Socialismo (izquierda), Conservadurismo (derecha), Libertarianismo (arriba) y Centrismo (centro)
wrong_answers:
  - Autoritarismo (abajo), Liberalismo (izquierda), Nacionalismo (derecha), Anarquismo (arriba) y Populismo (centro)
  - Totalitarismo (abajo), Progresismo (izquierda), Tradicionalismo (derecha), Capitalismo (arriba) y Moderatismo (centro)
  - Fascismo (abajo), Comunismo (izquierda), Republicanismo (derecha), Democracia (arriba) y Pragmatismo (centro)
explanation: |
  El Gráfico Nolan divide específicamente el espectro político en cinco secciones distintas basadas en la libertad económica y personal. El estatismo representa
  el máximo control gubernamental en la parte inferior, mientras que el Libertarianismo en la parte superior representa la máxima libertad en ambas dimensiones. El socialismo (izquierda) apoya la libertad
  el socialismo (izquierda) apoya la libertad personal pero se opone a la libertad económica, mientras que el conservadurismo (derecha) apoya la libertad económica pero restringe la libertad personal. El centrismo ocupa el término medio,
  mezcla elementos de ambas libertades con cierta regulación.
question: ห้าส่วนที่ระบุในแผนภาพการเมืองของ Nolan Chart คืออะไร?
answer: สถิตนิยม (ล่าง), สังคมนิยม (ซ้าย), อนุรักษนิยม (ขวา), เสรีนิยม (บน), และสายกลาง (กลาง)
wrong_answers:
  - อำนาจนิยม (ล่าง), เสรีนิยม (ซ้าย), ชาตินิยม (ขวา), อนาธิปไตย (บน), และ ประชานิยม (กลาง)
  - เผด็จการเบ็ดเสร็จ (ล่าง), ความก้าวหน้า (ซ้าย), การยึดถือประเพณี (ขวา), ทุนนิยม (บน), และความเป็นกลาง (กลาง)
  - ลัทธิฟาสซิสต์ (ล่าง), ลัทธิคอมมิวนิสต์ (ซ้าย), ลัทธิสาธารณรัฐ (ขวา), ประชาธิปไตย (บน), และลัทธิปฏิบัตินิยม (กลาง)
explanation: |
  แผนภูมิของโนแลนแบ่งสเปกตรัมทางการเมืองออกเป็นห้าส่วนที่แตกต่างกันตามเสรีภาพทางเศรษฐกิจและส่วนบุคคล สถิตนิยมแสดงถึงการควบคุมของรัฐบาลสูงสุดที่ด้านล่าง ในขณะที่ลิเบอร์ทาเรียนิสม์ที่ด้านบนแสดงถึงเสรีภาพสูงสุดในทั้งสองมิติ สังคมนิยม (ซ้าย) สนับสนุนเสรีภาพส่วนบุคคลแต่คัดค้านเสรีภาพทางเศรษฐกิจ ในขณะที่อนุรักษนิยม (ขวา) สนับสนุนเสรีภาพทางเศรษฐกิจแต่จำกัดเสรีภาพส่วนบุคคล เซ็นทรัลลิสม์ครอบครองพื้นที่ตรงกลาง ผสมผสานองค์ประกอบของเสรีภาพทั้งสองกับการควบคุมบางประการ
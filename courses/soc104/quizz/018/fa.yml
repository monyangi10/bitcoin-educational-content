question: بر اساس مدل الماس، تفاوت اصلی بین دولت‌گرایان راست‌گرا و چپ‌گرا چیست؟
answer: آن‌ها از قدرت دولتی برای تحمیل ارزش‌های متفاوت استفاده می‌کنند اما هر دو به دنبال کنترل جامعه هستند.
wrong_answers:
  - راست‌گرایان دولتی با هرگونه مداخله دولتی مخالفند، در حالی که چپ‌گرایان از آن حمایت می‌کنند.
  - راست‌گرایان دولتی خواهان آزادی اقتصادی هستند در حالی که چپ‌گرایان خواهان آزادی شخصی هستند.
  - دولت‌گرایان راست‌گرا لیبرال هستند در حالی که دولت‌گرایان چپ‌گرا اقتدارگرا هستند
explanation: |
  این فصل توضیح می‌دهد که هر دو دولت‌گرایان راست‌گرا و چپ‌گرا هدف سیاسی مشترکی دارند: تسخیر قدرت برای سازماندهی جامعه بر اساس جهان‌بینی خود و تحمیل آن به همه. این تعریف دقیق دولت‌گرایی است - استفاده از قانون‌گذاری برای کنترل و شکل‌دهی جامعه. تفاوت در ارزش‌های آن‌هاست: دولت‌گرایان راست‌گرا اولویت را به اخلاق شخصی و سنت می‌دهند، در حالی که دولت‌گرایان چپ‌گرا بر عدالت اجتماعی و توزیع مجدد تمرکز می‌کنند. با این حال، هر دو از نیروی دولت برای تحمیل دیدگاه‌های خود استفاده می‌کنند و به همین دلیل به طور ذاتی دولت‌گرا هستند.
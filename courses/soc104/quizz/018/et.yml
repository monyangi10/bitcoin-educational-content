question: Milline on teemantmudeli kohaselt peamine erinevus parempoolsete ja vasakpoolsete riigimeeste vahel?
answer: Nad kasutavad riigivõimu erinevate väärtuste kehtestamiseks, kuid mõlemad püüavad ühiskonda kontrollida
wrong_answers:
  - Parempoolsed statistid on igasuguse valitsuse sekkumise vastu, vasakpoolsed aga toetavad seda
  - Parempoolsed statistid tahavad majanduslikku vabadust, vasakpoolsed aga isikuvabadust
  - Parempoolsed statistid on liberaalsed, vasakpoolsed aga autoritaarsed
explanation: |
  Peatükis selgitatakse, et nii parempoolsetel kui ka vasakpoolsetel statistidel on sama poliitiline eesmärk: võimu vallutamine, et korraldada ühiskonda vastavalt
  oma maailmavaadet ja seda kõigile peale suruda. See ongi statismi definitsioon - seadusandluse kasutamine ühiskonna kontrollimiseks ja kujundamiseks. Erinevus seisneb nende väärtustes: parempoolsed statistid seavad esikohale isikliku moraali ja traditsioonid, samas kui vasakpoolsed statistid keskenduvad sotsiaalsele õiglusele ja ümberjaotamisele. Mõlemad kasutavad siiski riigivõimu oma nägemuste kehtestamiseks, mistõttu on nad oma olemuselt võrdselt statistilised.
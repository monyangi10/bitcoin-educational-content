question: 다이아몬드 모델에 따르면 우익과 좌익 통계학자의 주요 차이점은 무엇인가요?
answer: 국가 권력을 이용해 서로 다른 가치를 강요하지만 둘 다 사회를 통제하려고 합니다
wrong_answers:
  - 우파 통계학자들은 모든 정부 개입에 반대하는 반면 좌파는 이를 지지합니다
  - 우익 통계학자들은 경제적 자유를 원하고 좌익 통계학자들은 개인의 자유를 원합니다
  - 우익 통계학자는 자유주의자, 좌익 통계학자는 권위주의자
explanation: |
  이 장에서는 우익과 좌익 통계학자들이 모두 동일한 정치적 목표를 공유한다고 설명합니다
  사회를 조직하고 모든 사람에게 강요하는 권력을 장악하는 것입니다. 이것이 바로 법률을 사용하여 사회를 통제하고 형성하는 국가주의의 정의입니다. 우파 국가주의자들은 개인의 도덕과 전통을 우선시하는 반면, 좌파 국가주의자들은 사회 정의와 재분배에 중점을 두는 등 가치관에 차이가 있습니다. 그러나 둘 다 국가 권력을 사용하여 각자의 비전을 강요하기 때문에 본질적으로 똑같이 통계주의자입니다.
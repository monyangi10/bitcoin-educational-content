question: В соответствии с алмазной моделью, в чем заключается главное различие между правыми и левыми статистами?
answer: Они используют государственную власть для навязывания разных ценностей, но обе стремятся контролировать общество
wrong_answers:
  - Правые статисты выступают против любого государственного вмешательства, а левые поддерживают его
  - Правые статисты хотят экономической свободы, а левые - свободы личности
  - Правые статисты - либералы, а левые статисты - авторитаристы
explanation: |
  В главе объясняется, что и правые, и левые статисты преследуют одну и ту же политическую цель: завоевать власть, чтобы организовать общество в соответствии со своим мировоззрением и навязать его всем
  и навязать его всем. Это самое определение статизма - использование законодательства для контроля и формирования общества. Разница заключается в их ценностях: правые статисты ставят во главу угла личную мораль и традиции, а левые - социальную справедливость и перераспределение. Однако и те, и другие используют государственную силу для навязывания своих взглядов, что делает их одинаково статичными по своей природе.
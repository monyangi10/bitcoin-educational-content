question: Prema dijamantskom modelu, koja je glavna razlika između desničarskih i levičarskih statista?
answer: Oni koriste državnu moć da nametnu različite vrednosti, ali oba nastoje da kontrolišu društvo.
wrong_answers:
  - Desničarski statisti se protive svakoj intervenciji vlade dok je levičari podržavaju.
  - Desničarski statisti žele ekonomsku slobodu dok levičari žele ličnu slobodu
  - Desničarski statisti su liberalni dok su levičarski statisti autoritarni
explanation: |
  Poglavlje objašnjava da desničarski i levičarski etatisti dele isti politički cilj: osvajanje vlasti kako bi organizovali društvo prema svom svetonazoru i nametnuli ga svima. Ovo je sama definicija etatizma - korišćenje zakonodavstva za kontrolu i oblikovanje društva. Razlika leži u njihovim vrednostima: desničarski etatisti daju prioritet ličnom moralu i tradiciji, dok levičarski etatisti fokusiraju na socijalnu pravdu i preraspodelu. Međutim, oba koriste državnu silu da nametnu svoje vizije, što ih čini podjednako etatističkim po prirodi.
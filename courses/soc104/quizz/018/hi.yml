question: डायमंड मॉडल के अनुसार, दक्षिणपंथी और वामपंथी राज्यवादियों के बीच मुख्य अंतर क्या है?
answer: वे अलग-अलग मूल्यों को थोपने के लिए राज्य शक्ति का उपयोग करते हैं, लेकिन दोनों ही समाज को नियंत्रित करने का प्रयास करते हैं।
wrong_answers:
  - दक्षिणपंथी सत्तावादी हर तरह के सरकारी हस्तक्षेप का विरोध करते हैं, जबकि वामपंथी इसका समर्थन करते हैं।
  - दक्षिणपंथी सत्तावादी आर्थिक स्वतंत्रता चाहते हैं जबकि वामपंथी व्यक्तिगत स्वतंत्रता चाहते हैं।
  - दक्षिणपंथी सत्तावादी उदारवादी होते हैं जबकि वामपंथी सत्तावादी अधिनायकवादी होते हैं।
explanation: |
  इस अध्याय में यह बताया गया है कि दक्षिणपंथी और वामपंथी दोनों ही सत्तावादी विचारधाराओं का एक ही राजनीतिक उद्देश्य है: सत्ता पर कब्ज़ा करके समाज को अपने दृष्टिकोण के अनुसार संगठित करना और उसे सब पर थोपना। यही सत्तावाद की परिभाषा है - कानून का इस्तेमाल करके समाज को नियंत्रित और आकार देना। अंतर उनके मूल्यों में निहित है: दक्षिणपंथी सत्तावादी व्यक्तिगत नैतिकता और परंपरा को प्राथमिकता देते हैं, जबकि वामपंथी सत्तावादी सामाजिक न्याय और धन के पुनर्वितरण पर ध्यान केंद्रित करते हैं। हालांकि, दोनों ही अपनी-अपनी विचारधाराओं को थोपने के लिए सत्ता बल का प्रयोग करते हैं, जिससे वे स्वभाव से समान रूप से सत्तावादी बन जाते हैं।
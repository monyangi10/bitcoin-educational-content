question: Hva er hovedforskjellen mellom høyreorienterte og venstreorienterte statstilhengere, ifølge diamantmodellen?
answer: De bruker statsmakten til å innføre ulike verdier, men begge søker å kontrollere samfunnet
wrong_answers:
  - Høyresiden er imot all statlig inngripen, mens venstresiden støtter den
  - Høyresiden vil ha økonomisk frihet, mens venstresiden vil ha personlig frihet
  - Høyreorienterte statstilhengere er liberale, mens venstreorienterte statstilhengere er autoritære
explanation: |
  Kapitlet forklarer at både høyre- og venstresidens statstilhengere deler det samme politiske målet: å erobre makt for å organisere samfunnet i henhold til
  deres verdensbilde og påtvinge det på alle. Dette er selve definisjonen på statisme - å bruke lovgivning for å kontrollere og forme samfunnet. Forskjellen ligger i verdiene deres: høyreorienterte statstilhengere prioriterer personlig moral og tradisjon, mens venstreorienterte statstilhengere fokuserer på sosial rettferdighet og omfordeling. Begge bruker imidlertid statlig makt for å påtvinge sine respektive visjoner, noe som gjør dem like etatistiske i sin natur.
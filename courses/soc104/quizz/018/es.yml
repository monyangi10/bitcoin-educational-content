question: Según el modelo del diamante, ¿cuál es la principal diferencia entre los estatistas de derechas y los de izquierdas?
answer: Utilizan el poder del Estado para imponer valores diferentes, pero ambos pretenden controlar la sociedad
wrong_answers:
  - Los estatistas de derechas se oponen a toda intervención gubernamental mientras que los de izquierdas la apoyan
  - Los estatistas de derechas quieren libertad económica mientras que los de izquierdas quieren libertad personal
  - Los estatistas de derechas son liberales mientras que los de izquierdas son autoritarios
explanation: |
  En el capítulo se explica que tanto los estatistas de derechas como los de izquierdas comparten el mismo objetivo político: conquistar el poder para organizar la sociedad según su visión del mundo e imponerla a todos
  su visión del mundo e imponerla a todo el mundo. Esta es la definición misma del estatismo: utilizar la legislación para controlar y moldear la sociedad. La diferencia radica en sus valores: los estatistas de derechas dan prioridad a la moral personal y la tradición, mientras que los de izquierdas se centran en la justicia social y la redistribución. Sin embargo, ambos utilizan la fuerza del Estado para imponer sus respectivas visiones, lo que los hace igualmente estatistas por naturaleza.
question: Enligt diamantmodellen, vad är den största skillnaden mellan höger- och vänsterorienterade statister?
answer: De använder statsmakten för att genomdriva olika värderingar, men båda strävar efter att kontrollera samhället
wrong_answers:
  - Högerorienterade statister motsätter sig alla statliga ingripanden medan vänsterorienterade stöder dem
  - Statister på högerkanten vill ha ekonomisk frihet medan vänsterkanten vill ha personlig frihet
  - Statister på högerkanten är liberala medan statister på vänsterkanten är auktoritära
explanation: |
  Kapitlet förklarar att både höger- och vänsterextremister har samma politiska mål: att erövra makten för att organisera samhället i enlighet med
  sin världsbild och påtvinga den på alla. Detta är själva definitionen av statism - att använda lagstiftning för att kontrollera och forma samhället. Skillnaden ligger i deras värderingar: högerextrema statister prioriterar personlig moral och tradition, medan vänsterextrema statister fokuserar på social rättvisa och omfördelning. Båda använder dock statligt våld för att införa sina respektive visioner, vilket gör dem lika statiska till sin natur.
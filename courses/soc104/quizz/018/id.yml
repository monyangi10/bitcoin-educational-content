question: Menurut model berlian, apa perbedaan utama antara statistik sayap kanan dan sayap kiri?
answer: Mereka menggunakan kekuasaan negara untuk memaksakan nilai-nilai yang berbeda, tetapi keduanya berusaha mengendalikan masyarakat
wrong_answers:
  - Politisi sayap kanan menentang semua intervensi pemerintah, sementara sayap kiri mendukungnya
  - Para politisi sayap kanan menginginkan kebebasan ekonomi, sementara sayap kiri menginginkan kebebasan pribadi
  - Negarawan sayap kanan adalah liberal, sementara negarawan sayap kiri adalah otoriter
explanation: |
  Bab ini menjelaskan bahwa baik sayap kanan maupun sayap kiri memiliki tujuan politik yang sama: menaklukkan kekuasaan untuk mengatur masyarakat sesuai dengan
  pandangan dunia mereka dan memaksakannya pada semua orang. Ini adalah definisi statisme - menggunakan undang-undang untuk mengendalikan dan membentuk masyarakat. Perbedaannya terletak pada nilai-nilai yang dianutnya: kaum statis sayap kanan memprioritaskan moralitas pribadi dan tradisi, sementara kaum statis sayap kiri berfokus pada keadilan sosial dan redistribusi. Namun, keduanya menggunakan kekuatan negara untuk memaksakan visi masing-masing, sehingga keduanya sama-sama bersifat statis.
question: Was ist nach dem Diamantenmodell der Hauptunterschied zwischen rechten und linken Statisten?
answer: Sie nutzen die staatliche Macht, um unterschiedliche Werte durchzusetzen, aber beide versuchen, die Gesellschaft zu kontrollieren
wrong_answers:
  - Die Rechten lehnen jegliche staatliche Intervention ab, während die Linken sie unterstützen
  - Die Rechten wollen wirtschaftliche Freiheit, die Linken wollen persönliche Freiheit
  - Rechtsextremisten sind liberal, Linksextremisten autoritär
explanation: |
  In diesem Kapitel wird erläutert, dass sowohl rechte als auch linke Statisten dasselbe politische Ziel verfolgen: die Eroberung der Macht, um die Gesellschaft gemäß ihrer Weltanschauung
  ihrer Weltanschauung zu organisieren und sie allen aufzuzwingen. Dies ist die eigentliche Definition des Etatismus - die Verwendung von Gesetzen zur Kontrolle und Gestaltung der Gesellschaft. Der Unterschied liegt in ihren Werten: Rechtsstaatler legen Wert auf persönliche Moral und Tradition, während Linksstaatler sich auf soziale Gerechtigkeit und Umverteilung konzentrieren. Beide setzen jedoch staatliche Gewalt ein, um ihre jeweiligen Visionen durchzusetzen, was sie von ihrem Wesen her gleichermaßen etatistisch macht.
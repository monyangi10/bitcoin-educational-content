question: Jaka jest główna różnica między prawicowymi i lewicowymi etatystami według modelu diamentowego?
answer: Wykorzystują władzę państwową do narzucania różnych wartości, ale obie dążą do kontrolowania społeczeństwa
wrong_answers:
  - Prawicowi etatyści sprzeciwiają się wszelkim interwencjom rządowym, podczas gdy lewica je popiera
  - Prawicowi etatyści chcą wolności gospodarczej, podczas gdy lewica chce wolności osobistej
  - Prawicowi etatyści są liberalni, podczas gdy lewicowi etatyści są autorytarni
explanation: |
  Rozdział ten wyjaśnia, że zarówno prawicowi, jak i lewicowi etatyści mają ten sam cel polityczny: zdobycie władzy w celu zorganizowania społeczeństwa zgodnie z ich światopoglądem
  ich światopoglądu i narzucenia go wszystkim. To jest właśnie definicja etatyzmu - wykorzystywanie prawodawstwa do kontrolowania i kształtowania społeczeństwa. Różnica polega na wyznawanych przez nich wartościach: prawicowi etatyści priorytetowo traktują osobistą moralność i tradycję, podczas gdy lewicowi etatyści koncentrują się na sprawiedliwości społecznej i redystrybucji. Obaj jednak używają siły państwowej do narzucenia swoich wizji, co czyni ich równie etatystycznymi z natury.
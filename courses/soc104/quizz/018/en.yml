question: According to the diamond model, what is the main difference between right-wing and left-wing statists?
answer: They use state power to impose different values but both seek to control society
wrong_answers:
  - Right-wing statists oppose all government intervention while left-wing supports it
  - Right-wing statists want economic freedom while left-wing wants personal freedom
  - Right-wing statists are liberal while left-wing statists are authoritarian
explanation: |
  The chapter explains that both right-wing and left-wing statists share the same political objective: conquering power to organize society according to 
  their worldview and impose it on everyone. This is the very definition of statism - using legislation to control and shape society. The difference lies in their values: right-wing statists prioritize personal morality and tradition, while left-wing statists focus on social justice and redistribution. However, both use state force to impose their respective visions, making them equally statist in nature.

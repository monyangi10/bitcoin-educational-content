question: Wat is volgens het diamantmodel het belangrijkste verschil tussen rechtse en linkse statisten?
answer: Ze gebruiken de macht van de staat om verschillende waarden op te leggen, maar proberen allebei de samenleving te controleren
wrong_answers:
  - Rechtse statisten zijn tegen alle overheidsbemoeienis, terwijl linkse dit juist steunen
  - Rechtse statisten willen economische vrijheid en linkse willen persoonlijke vrijheid
  - Rechtse statisten zijn liberaal terwijl linkse statisten autoritair zijn
explanation: |
  Het hoofdstuk legt uit dat zowel rechtse als linkse statisten hetzelfde politieke doel hebben: het veroveren van de macht om de samenleving in te richten volgens hun wereldbeeld en dat aan iedereen op te leggen
  hun wereldbeeld en dit aan iedereen op te leggen. Dit is de definitie van statisme - het gebruik van wetgeving om de samenleving te controleren en vorm te geven. Het verschil ligt in hun waarden: rechtse statisten geven de voorkeur aan persoonlijke moraliteit en traditie, terwijl linkse statisten zich richten op sociale rechtvaardigheid en herverdeling. Beiden gebruiken echter staatsmacht om hun respectievelijke visies op te leggen, waardoor ze even statistisch van aard zijn.
question: ダイヤモンド・モデルによると、右翼と左翼の国家主義者の主な違いは何か？
answer: 国家権力を使って異なる価値観を押し付けるが、どちらも社会をコントロールしようとしている。
wrong_answers:
  - 右翼の国家主義者はすべての政府介入に反対し、左翼はそれを支持する。
  - 右翼の国家主義者は経済的自由を求め、左翼は個人の自由を求める
  - 右翼の国家主義者はリベラルであり、左翼の国家主義者は権威主義者である。
explanation: |
  この章では、右翼と左翼の国家主義者が同じ政治目的を共有していることを説明している。
  自分たちの世界観に従って社会を組織し、それをすべての人に押し付けるために権力を征服することである。これはまさに国家主義の定義であり、立法を利用して社会をコントロールし、形成することである。右翼の国家主義者は個人の道徳と伝統を優先し、左翼の国家主義者は社会正義と再分配を重視する。しかし、両者ともそれぞれのビジョンを押し付けるために国家権力を行使しており、本質的には同じ国家主義者である。
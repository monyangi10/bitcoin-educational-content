question: Kulingana na mfumo wa almasi, ni tofauti gani kuu kati ya takwimu za mrengo wa kulia na mrengo wa kushoto?
answer: Wanatumia mamlaka ya serikali kulazimisha maadili tofauti lakini wote wawili wanatafuta kudhibiti jamii
wrong_answers:
  - Wanatakwimu wa mrengo wa kulia wanapinga uingiliaji kati wa serikali huku mrengo wa kushoto ukiunga mkono
  - Wanatakwimu wa mrengo wa kulia wanataka uhuru wa kiuchumi huku wale wa mrengo wa kushoto wakitaka uhuru wa kibinafsi
  - Wanatakwimu wa mrengo wa kulia ni waliberali huku wanatakwimu wa mrengo wa kushoto wakiwa na mamlaka ya kimabavu
explanation: |
  Sura hiyo inaelezea kwamba wanatakwimu wa mrengo wa kulia na mrengo wa kushoto wana lengo moja la kisiasa: kushinda mamlaka ya kupanga jamii kulingana na mtazamo wao wa ulimwengu na kuilazimisha kwa kila mtu. Hii ndiyo ufafanuzi halisi wa takwimu - kutumia sheria kudhibiti na kuunda jamii. Tofauti iko katika maadili yao: wanatakwimu wa mrengo wa kulia hupa kipaumbele maadili na mila za kibinafsi, huku wanatakwimu wa mrengo wa kushoto wakizingatia haki ya kijamii na ugawaji upya. Hata hivyo, wote wawili hutumia nguvu ya serikali kulazimisha maono yao husika, na kuwafanya wawe na asili sawa ya takwimu.
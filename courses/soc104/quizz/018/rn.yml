question: Dushingiye ku citegererezo c’amadayimoni, ni itandukaniro irihe rikomeye riri hagati y’abahinga mu vy’imibare bo mu buryo n’abo mu bubamfu?
answer: Bakoresha ububasha bwa Leta kugira ngo bategeke ivyiyumviro bitandukanye ariko bompi barondera kugenzura ikibano .
wrong_answers:
  - Abahinga mu vy’imibare bo mu buryo barwanya ingingo zose za Leta mu gihe abo mu bubamfu babishigikira
  - Abahinga mu vy'imibare bo mu buryo bashaka umwidegemvyo mu vy'ubutunzi mu gihe ab'ibubamfu bashaka umwidegemvyo w'umuntu ku giti ciwe
  - Abanyapolitike b'iburyo ni abafise umwidegemvyo mu gihe abanyapolitike b'ibubamfu ari abanyagitugu
explanation: |
  Ico gice kirasigura ko abahinga mu vy’imibare bo mu buryo n’abo mu bubamfu bose bafise intumbero imwe ya politike: kwigarurira ububasha bwo gutunganya ikibano hakurikijwe . 
  ivyiyumviro vyabo vy’isi kandi bakabitegeka umuntu wese. Iyi ni yo nsobanuro nyene ya statism - gukoresha amategeko kugira ngo umuntu agenzure kandi ahindure ikibano. Itandukaniro riri mu mico kama yabo: abahinga mu vy’imibare bo mu buryo bashira imbere inyifato runtu n’imigenzo y’umuntu ku giti ciwe, mu gihe abahinga mu vy’imibare bo mu bubamfu bashira imbere ubutungane bw’abantu no gusubira gusangira. Ariko rero, bompi bakoresha inguvu za Leta kugira ngo bategeke ivyo babona, ivyo bikaba bituma baba aba statiste mu kameremere kabo.
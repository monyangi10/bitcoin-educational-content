question: Каква е основната разлика между десните и левите етатисти според диамантения модел?
answer: Те използват държавната власт, за да налагат различни ценности, но и двете се стремят да контролират обществото
wrong_answers:
  - Десните етатисти се противопоставят на всякаква правителствена намеса, докато левите я подкрепят
  - Десните етатисти искат икономическа свобода, а левите - лична свобода
  - Десните етатисти са либерални, а левите етатисти са авторитарни
explanation: |
  В главата се обяснява, че както десните, така и левите етатисти имат една и съща политическа цел: завладяване на властта за организиране на обществото според
  своя мироглед и да го наложат на всички. Това е самото определение на етатизма - използване на законодателството за контрол и формиране на обществото. Разликата се крие в техните ценности: десните етатисти дават приоритет на личния морал и традициите, докато левите етатисти се фокусират върху социалната справедливост и преразпределението. И двете обаче използват държавна сила, за да наложат съответните си виждания, което ги прави еднакво етатистки по своята същност.
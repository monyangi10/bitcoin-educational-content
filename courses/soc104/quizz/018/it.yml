question: Secondo il modello a diamante, qual è la principale differenza tra statalisti di destra e di sinistra?
answer: Usano il potere dello Stato per imporre valori diversi, ma entrambi cercano di controllare la società
wrong_answers:
  - Gli statalisti di destra si oppongono a tutti gli interventi governativi, mentre quelli di sinistra li sostengono
  - Gli statalisti di destra vogliono la libertà economica mentre quelli di sinistra vogliono la libertà personale
  - Gli statalisti di destra sono liberali, mentre quelli di sinistra sono autoritari
explanation: |
  Il capitolo spiega che gli statalisti di destra e di sinistra condividono lo stesso obiettivo politico: conquistare il potere per organizzare la società secondo la loro visione del mondo e imporla a tutti
  la loro visione del mondo e imporla a tutti. Questa è la definizione stessa di statalismo: usare la legislazione per controllare e plasmare la società. La differenza sta nei loro valori: gli statalisti di destra danno priorità alla moralità personale e alla tradizione, mentre gli statalisti di sinistra si concentrano sulla giustizia sociale e sulla ridistribuzione. Tuttavia, entrambi utilizzano la forza dello Stato per imporre le rispettive visioni, il che li rende ugualmente statalisti.
question: Mikä on timanttimallin mukaan tärkein ero oikeisto- ja vasemmistovaltion kannattajien välillä?
answer: Ne käyttävät valtiovaltaa erilaisten arvojen määräämiseen, mutta molemmat pyrkivät hallitsemaan yhteiskuntaa
wrong_answers:
  - Oikeistolaiset vastustavat kaikkea valtion väliintuloa, kun taas vasemmisto tukee sitä
  - Oikeistolaiset valtiomiehet haluavat taloudellista vapautta, kun taas vasemmisto haluaa henkilökohtaista vapautta
  - Oikeistolaiset valtiomiehet ovat liberaaleja, kun taas vasemmistolaiset valtiomiehet ovat autoritaarisia
explanation: |
  Luvussa selitetään, että sekä oikeisto- että vasemmistovaltion kannattajilla on sama poliittinen päämäärä: vallan valtaaminen yhteiskunnan järjestämiseksi
  maailmankatsomuksensa mukaisesti ja pakottaa sen kaikille. Tämä on valtiovallan määritelmä - lainsäädännön käyttäminen yhteiskunnan valvomiseen ja muokkaamiseen. Ero on heidän arvoissaan: oikeistovaltion valtiomiehet asettavat etusijalle henkilökohtaisen moraalin ja perinteet, kun taas vasemmistovaltion valtiomiehet keskittyvät sosiaaliseen oikeudenmukaisuuteen ja uudelleenjakoon. Molemmat käyttävät kuitenkin valtiollista voimaa omien näkemystensä toteuttamiseen, joten ne ovat luonteeltaan yhtä lailla valtiovaltaisia.
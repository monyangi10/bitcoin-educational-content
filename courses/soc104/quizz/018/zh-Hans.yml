question: 根据钻石模型，右翼和左翼国家主义者的主要区别是什么？
answer: 它们利用国家权力强加不同的价值观，但都试图控制社会
wrong_answers:
  - 右翼国家主义者反对一切政府干预，而左翼则支持政府干预
  - 右翼国家主义者想要经济自由，而左翼想要个人自由
  - 右翼国家主义者是自由主义者，而左翼国家主义者是专制主义者
explanation: |
  本章解释了右翼和左翼国家主义者的共同政治目标：征服权力，按照世界观来组织社会，并将其强加于每个人。
  他们的世界观，并将其强加于每个人。这正是国家主义的定义--利用立法来控制和塑造社会。不同之处在于他们的价值观：右翼国家主义者优先考虑个人道德和传统，而左翼国家主义者则注重社会正义和再分配。然而，两者都使用国家力量来强加各自的理念，这使他们在本质上同样是国家主义者。
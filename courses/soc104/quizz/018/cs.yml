question: Jaký je podle diamantového modelu hlavní rozdíl mezi pravicovými a levicovými etatisty?
answer: Obě využívají státní moc k prosazování odlišných hodnot, ale obě se snaží ovládat společnost
wrong_answers:
  - Pravicoví etatisté jsou proti všem státním zásahům, zatímco levice je podporuje
  - Pravicoví etatisté chtějí ekonomickou svobodu, zatímco levice chce osobní svobodu
  - Pravicoví etatisté jsou liberální, zatímco levicoví etatisté jsou autoritářští
explanation: |
  Kapitola vysvětluje, že pravicoví i levicoví etatisté mají stejný politický cíl: získat moc a uspořádat společnost podle svých představ
  a vnutit ji všem. To je samotná definice etatismu - používání legislativy k ovládání a utváření společnosti. Rozdíl spočívá v jejich hodnotách: pravicoví etatisté dávají přednost osobní morálce a tradici, zatímco levicoví etatisté se zaměřují na sociální spravedlnost a přerozdělování. Obě však používají státní sílu k prosazení svých vizí, což je činí stejně etatistickými.
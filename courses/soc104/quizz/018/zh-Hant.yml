question: 根據鑽石模型，右翼和左翼國家主義者之間的主要差異是什麼？
answer: 他們利用國家權力強加不同的價值觀，但都試圖控制社會
wrong_answers:
  - 右翼國家主義者反對所有政府干預，而左翼則支持政府干預
  - 右翼國家主義者想要經濟自由，而左翼想要個人自由
  - 右翼國家主義者是自由主義者，而左翼國家主義者是專制主義者
explanation: |
  本章說明，右翼和左翼國家主義者都有相同的政治目標：奪取權力，按照世界觀組織社會，並將其強加於每個人。
  他們的世界觀，並將之強加於每個人。這是國家主義的定義 - 利用立法來控制和塑造社會。不同之處在於他們的價值觀：右翼國家主義者以個人道德和傳統為優先，而左翼國家主義者則著重於社會正義和再分配。然而，兩者都使用國家力量來強加他們各自的願景，使他們在本質上同樣是國家主義者。
question: ตามโมเดลเพชร ความแตกต่างหลักระหว่างฝ่ายขวาและฝ่ายซ้ายที่สนับสนุนรัฐคืออะไร?
answer: พวกเขาใช้พลังของรัฐในการกำหนดค่านิยมที่แตกต่างกัน แต่ทั้งสองฝ่ายต่างก็พยายามควบคุมสังคม
wrong_answers:
  - ฝ่ายขวาที่สนับสนุนรัฐต่อต้านการแทรกแซงของรัฐบาลทั้งหมด ในขณะที่ฝ่ายซ้ายสนับสนุนการแทรกแซง
  - ฝ่ายขวาที่สนับสนุนรัฐนิยมต้องการเสรีภาพทางเศรษฐกิจ ในขณะที่ฝ่ายซ้ายต้องการเสรีภาพส่วนบุคคล
  - นักรัฐนิยมฝ่ายขวาเป็นเสรีนิยม ในขณะที่นักรัฐนิยมฝ่ายซ้ายเป็นเผด็จการ
explanation: |
  บทนี้อธิบายว่าทั้งนักรัฐนิยมฝ่ายขวาและฝ่ายซ้ายมีวัตถุประสงค์ทางการเมืองเดียวกัน: การยึดอำนาจเพื่อจัดระเบียบสังคมตามมุมมองของตนและบังคับใช้กับทุกคน นี่คือคำจำกัดความของรัฐนิยม - การใช้กฎหมายเพื่อควบคุมและกำหนดรูปแบบสังคม ความแตกต่างอยู่ที่ค่านิยมของพวกเขา: นักรัฐนิยมฝ่ายขวาให้ความสำคัญกับศีลธรรมส่วนบุคคลและประเพณี ในขณะที่นักรัฐนิยมฝ่ายซ้ายมุ่งเน้นที่ความยุติธรรมทางสังคมและการกระจายทรัพยากรใหม่ อย่างไรก็ตาม ทั้งสองฝ่ายใช้กำลังของรัฐในการบังคับใช้วิสัยทัศน์ของตนเอง ทำให้พวกเขาเป็นนักรัฐนิยมในธรรมชาติเท่าเทียมกัน
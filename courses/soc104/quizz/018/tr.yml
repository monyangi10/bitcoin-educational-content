question: Elmas modeline göre, sağcı ve solcu devletçiler arasındaki temel fark nedir?
answer: Devlet gücünü farklı değerleri empoze etmek için kullanırlar ancak her ikisi de toplumu kontrol etmeye çalışır
wrong_answers:
  - Sağcı devletçiler her türlü hükümet müdahalesine karşı çıkarken, solcular bunu destekliyor
  - Sağcı devletçiler ekonomik özgürlük isterken, solcular kişisel özgürlük istiyor
  - Sağcı devletçiler liberal, solcu devletçiler ise otoriterdir
explanation: |
  Bu bölüm, hem sağcı hem de solcu devletçilerin aynı siyasi hedefi paylaştığını açıklamaktadır: toplumu kendi çıkarlarına göre düzenlemek için iktidarı ele geçirmek
  kendi dünya görüşlerini herkese empoze etmektir. Bu devletçiliğin tam tanımıdır - toplumu kontrol etmek ve şekillendirmek için yasaları kullanmak. Aralarındaki fark değerlerinde yatmaktadır: sağ kanat devletçiler kişisel ahlak ve geleneklere öncelik verirken, sol kanat devletçiler sosyal adalet ve yeniden dağıtıma odaklanmaktadır. Ancak her ikisi de kendi vizyonlarını empoze etmek için devlet gücünü kullanmakta, bu da onları doğaları gereği eşit derecede devletçi yapmaktadır.
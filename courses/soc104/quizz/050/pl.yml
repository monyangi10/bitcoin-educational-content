question: Co odróżnia amerykański tradycyjny konserwatyzm od europejskiego XIX-wiecznego konserwatyzmu w podejściu do zmian społecznych?
answer: Amerykański tradycyjny konserwatyzm stara się zrównoważyć indywidualną wolność z odpowiedzialnością poprzez uporządkowaną wolność, podczas gdy europejski konserwatyzm opowiadał się za powrotem do społeczeństwa feudalnego
wrong_answers:
  - Amerykański tradycyjny konserwatyzm promuje całkowitą deregulację gospodarki, podczas gdy europejski konserwatyzm wspiera silną interwencję państwa na rynkach
  - Amerykański tradycyjny konserwatyzm odrzuca wszystkie instytucje rządowe, podczas gdy europejski konserwatyzm przyjął demokratyczne systemy parlamentarne
  - Amerykański tradycyjny konserwatyzm koncentruje się wyłącznie na ekspansji militarnej, podczas gdy europejski konserwatyzm priorytetowo traktuje pokojowe rozwiązania dyplomatyczne
explanation: |
  Tekst wyraźnie rozróżnia te dwie formy konserwatyzmu. Amerykański tradycyjny konserwatyzm opiera się na "uporządkowanej wolności", która stara się pogodzić wspólnotę i indywidualne aspiracje, równoważąc wolność z odpowiedzialnością i ograniczony rząd z wolnością rynku.
  Z kolei europejscy XIX-wieczni konserwatyści byli reakcjonistami, którzy chcieli uciec od nowoczesnego społeczeństwa i powrócić do starego feudalnego, rolniczego i rzemieślniczego społeczeństwa, odrzucając postęp naukowy i technologiczny. Pozostałe opcje błędnie przedstawiają rzeczywiste stanowiska opisane w rozdziale.
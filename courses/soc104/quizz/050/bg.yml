question: С какво американският традиционен консерватизъм се отличава от европейския консерватизъм от XIX в. в подхода си към обществените промени?
answer: Американският традиционен консерватизъм се стреми да балансира индивидуалната свобода с отговорността чрез подредена свобода, докато европейският консерватизъм се застъпва за връщане към феодалното общество
wrong_answers:
  - Американският традиционен консерватизъм насърчава пълното икономическо дерегулиране, докато европейският консерватизъм подкрепя силната държавна намеса на пазарите
  - Американският традиционен консерватизъм отхвърля всички държавни институции, докато европейският консерватизъм приема демократичните парламентарни системи
  - Американският традиционен консерватизъм се фокусира единствено върху военната експанзия, докато европейският консерватизъм дава приоритет на мирните дипломатически решения
explanation: |
  Текстът ясно разграничава тези две форми на консерватизъм. Американският традиционен консерватизъм се основава на "подредената свобода", която се стреми да съчетае стремежите на общността и индивида, като балансира свободата с отговорността и ограниченото правителство със свободата на пазара.
  За разлика от тях европейските консерватори от XIX в. са реакционери, които искат да избягат от модерното общество и да се върнат към старото феодално, земеделско и занаятчийско общество, отхвърляйки научния и техническия прогрес. Другите варианти изопачават действителните позиции, описани в главата.
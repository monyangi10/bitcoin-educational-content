question: 在对待社会变革的态度上，美国传统保守主义与欧洲 19 世纪保守主义有何不同？
answer: 美国的传统保守主义寻求通过有序自由来平衡个人自由与责任，而欧洲的保守主义则主张回归封建社会
wrong_answers:
  - 美国的传统保守主义提倡完全放松经济管制，而欧洲的保守主义则支持国家对市场进行强有力的干预
  - 美国传统保守主义反对所有政府机构，而欧洲保守主义则拥护民主议会制度
  - 美国的传统保守主义只注重军事扩张，而欧洲的保守主义则优先考虑和平的外交解决方案
explanation: |
  文中明确区分了这两种形式的保守主义。美国传统保守主义以 "有序自由 "为基础，寻求协调社区和个人的愿望，平衡自由与责任、有限政府与市场自由。
  相比之下，欧洲 19 世纪的保守主义者则是反动派，他们希望摆脱现代社会，回到旧的封建、农业和手工业社会，拒绝科技进步。其他选项歪曲了本章所述的实际立场。
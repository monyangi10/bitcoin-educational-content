question: Điều gì tạo nên sự khác biệt giữa chủ nghĩa bảo thủ truyền thống của Mỹ và chủ nghĩa bảo thủ châu Âu thế kỷ 19 trong cách tiếp cận sự thay đổi xã hội?
answer: Chủ nghĩa bảo thủ truyền thống của Mỹ tìm cách cân bằng tự do cá nhân với trách nhiệm thông qua nền tự do có trật tự, trong khi chủ nghĩa bảo thủ châu Âu chủ trương quay trở lại xã hội phong kiến.
wrong_answers:
  - Chủ nghĩa bảo thủ truyền thống của Mỹ chủ trương bãi bỏ hoàn toàn các quy định kinh tế, trong khi chủ nghĩa bảo thủ của châu Âu ủng hộ sự can thiệp mạnh mẽ của nhà nước vào thị trường.
  - Chủ nghĩa bảo thủ truyền thống của Mỹ bác bỏ mọi thể chế chính phủ, trong khi chủ nghĩa bảo thủ châu Âu ủng hộ các hệ thống nghị viện dân chủ.
  - Chủ nghĩa bảo thủ truyền thống của Mỹ chỉ tập trung vào việc bành trướng quân sự, trong khi chủ nghĩa bảo thủ châu Âu ưu tiên các giải pháp ngoại giao hòa bình.
explanation: |
  Văn bản này phân biệt rõ ràng hai hình thức bảo thủ này. Chủ nghĩa bảo thủ truyền thống của Mỹ dựa trên "tự do có trật tự", tìm cách dung hòa nguyện vọng của cộng đồng và cá nhân, cân bằng giữa tự do và trách nhiệm, giữa chính phủ hạn chế và tự do thị trường.
  Ngược lại, những người bảo thủ châu Âu thế kỷ 19 là những người phản động, muốn thoát khỏi xã hội hiện đại và quay trở lại xã hội phong kiến, nông nghiệp và thủ công cũ, bác bỏ tiến bộ khoa học và công nghệ. Các lựa chọn khác đã xuyên tạc quan điểm thực tế được mô tả trong chương này.
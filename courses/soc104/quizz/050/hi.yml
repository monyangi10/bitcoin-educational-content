question: सामाजिक परिवर्तन के प्रति अपने दृष्टिकोण में अमेरिकी पारंपरिक रूढ़िवाद और 19वीं सदी के यूरोपीय रूढ़िवाद में क्या अंतर है?
answer: अमेरिकी पारंपरिक रूढ़िवाद व्यवस्थित स्वतंत्रता के माध्यम से व्यक्तिगत स्वतंत्रता और उत्तरदायित्व के बीच संतुलन स्थापित करने का प्रयास करता है, जबकि यूरोपीय रूढ़िवाद सामंती समाज में लौटने की वकालत करता है।
wrong_answers:
  - अमेरिकी पारंपरिक रूढ़िवाद पूर्ण आर्थिक विनियमन मुक्ति का समर्थन करता है, जबकि यूरोपीय रूढ़िवाद बाजारों में मजबूत राज्य हस्तक्षेप का समर्थन करता है।
  - अमेरिकी पारंपरिक रूढ़िवाद सभी सरकारी संस्थानों को अस्वीकार करता है, जबकि यूरोपीय रूढ़िवाद लोकतांत्रिक संसदीय प्रणालियों को अपनाता है।
  - अमेरिकी पारंपरिक रूढ़िवाद पूरी तरह से सैन्य विस्तार पर केंद्रित है, जबकि यूरोपीय रूढ़िवाद शांतिपूर्ण कूटनीतिक समाधानों को प्राथमिकता देता है।
explanation: |
  यह लेख रूढ़िवाद के इन दो रूपों में स्पष्ट अंतर बताता है। अमेरिकी पारंपरिक रूढ़िवाद 'व्यवस्थित स्वतंत्रता' पर आधारित है, जो सामुदायिक और व्यक्तिगत आकांक्षाओं में सामंजस्य स्थापित करने का प्रयास करता है, स्वतंत्रता और उत्तरदायित्व के बीच संतुलन बनाता है, और सीमित सरकार और बाज़ार की स्वतंत्रता के बीच सामंजस्य स्थापित करता है।
  इसके विपरीत, 19वीं सदी के यूरोपीय रूढ़िवादी प्रतिक्रियावादी थे जो आधुनिक समाज से पलायन करके पुराने सामंती, कृषि प्रधान और पारंपरिक कारीगरी वाले समाज में लौटना चाहते थे, और वैज्ञानिक एवं तकनीकी प्रगति को अस्वीकार करते थे। अन्य विकल्प अध्याय में वर्णित वास्तविक स्थितियों को गलत तरीके से प्रस्तुत करते हैं।
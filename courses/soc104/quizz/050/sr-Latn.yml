question: Šta razlikuje američki tradicionalni konzervativizam od evropskog konzervativizma 19. veka u njihovom pristupu društvenim promenama?
answer: Američki tradicionalni konzervativizam nastoji da balansira individualnu slobodu sa odgovornošću kroz uređenu slobodu, dok je evropski konzervativizam zagovarao povratak feudalnom društvu.
wrong_answers:
  - Američki tradicionalni konzervativizam promoviše potpunu ekonomsku deregulaciju, dok evropski konzervativizam podržava snažnu državnu intervenciju na tržištima.
  - Američki tradicionalni konzervativizam odbacuje sve vladine institucije, dok je evropski konzervativizam prihvatio demokratske parlamentarne sisteme.
  - Američki tradicionalni konzervativizam fokusira se isključivo na vojnu ekspanziju, dok je evropski konzervativizam prioritizovao mirna diplomatska rešenja.
explanation: |
  Tekst jasno razlikuje ova dva oblika konzervativizma. Američki tradicionalni konzervativizam zasniva se na 'uređenoj slobodi' koja nastoji pomiriti zajedničke i individualne težnje, balansirajući slobodu s odgovornošću i ograničenu vladu s tržišnom slobodom. 
  Nasuprot tome, evropski konzervativci iz 19. veka bili su reakcionari koji su želeli pobeći od modernog društva i vratiti se starom feudalnom, poljoprivrednom i zanatskom društvu, odbacujući naučni i tehnološki napredak. Ostale opcije pogrešno predstavljaju stvarne pozicije opisane u poglavlju.
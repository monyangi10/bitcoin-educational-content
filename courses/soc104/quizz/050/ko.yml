question: 사회 변화에 대한 접근 방식에서 미국의 전통적 보수주의와 19세기 유럽의 보수주의가 다른 점은 무엇일까요?
answer: 미국의 전통적 보수주의는 질서 있는 자유를 통해 개인의 자유와 책임의 균형을 추구한 반면, 유럽의 보수주의는 봉건 사회로의 회귀를 주장했습니다
wrong_answers:
  - 미국의 전통적 보수주의는 완전한 경제 규제 완화를 지지하는 반면, 유럽의 보수주의는 시장에 대한 국가의 강력한 개입을 지지합니다
  - 미국의 전통적 보수주의는 모든 정부 기관을 거부하는 반면, 유럽의 보수주의는 민주적 의회 제도를 수용했습니다
  - 미국의 전통적 보수주의는 군사력 확장에만 초점을 맞추고, 유럽의 보수주의는 평화적 외교적 해결책을 우선시합니다
explanation: |
  본문은 이 두 가지 형태의 보수주의를 명확하게 구분하고 있습니다. 미국의 전통적인 보수주의는 공동체와 개인의 열망을 조화시키고 자유와 책임, 제한된 정부와 시장 자유의 균형을 추구하는 '질서 있는 자유'에 기반을 두고 있습니다.
  반면 19세기 유럽의 보수주의자들은 근대 사회에서 벗어나 과거의 봉건, 농업, 장인 사회로 돌아가 과학과 기술의 진보를 거부하는 반동 세력이었습니다. 다른 옵션은 이 장에서 설명한 실제 입장을 잘못 표현하고 있습니다.
question: Ni igiki gitandukanya ubuhinga bwo gukingira imigenzo y’Abanyamerika n’ubuhinga bwo gukingira ivy’i Buraya bwo mu kinjana ca 19 mu buryo bafata ibintu mu guhindura ikibano?
answer: Ubuhinga bwa kera bw’Abanyamerika bushaka guhuza umwidegemvyo w’umuntu ku giti ciwe n’inshingano biciye mu mwidegemvyo utegekanijwe, mu gihe ubuhinga bw’Abanyaburaya bwari bushigikira ko umuntu asubira mu kibano c’abanyagihugu .
wrong_answers:
  - Ubuhinga bwa kera bw’Abanyamerika butera imbere ugukuraho amategeko yose y’ubutunzi, mu gihe ubuhinga bw’Abanyaburaya bwashigikiye ko Leta yinjira cane mu masoko .
  - Ubuhinga bwa kera bw’Abanyamerika bwanka inzego zose za Leta, mu gihe ubuhinga bw’Abanyaburaya bwakiriye uburyo bwo gushinga inama nshingamateka bushingiye kuri demokarasi .
  - Ubuhinga bwa kera bw’Abanyamerika bwibanda gusa ku kwagura igisirikare, mu gihe ubuhinga bw’Abanyaburaya bwashize imbere gutorera umuti ibibazo mu mahoro mu buryo bw’ubudiplomate .
explanation: |
  Ico canditswe kiratandukanya neza ubwo buryo bubiri bw’ugukingira ibintu. Ubuhinga bwo gukingira ivy’imigenzo y’Abanyamerika bushingiye ku ‘mwidegemvyo utegekanijwe’ urondera guhuza ivyipfuzo vy’abanyagihugu n’ivy’umuntu ku giti ciwe, ugahuza umwidegemvyo n’inshingano be n’intwaro ifise aho igarukira n’umwidegemvyo w’isoko. 
  Mu buryo butandukanye n’ubwo, Abanyaburaya bo mu kinjana ca 19 bakunda ivy’ubuhinga bwa none bari abantu b’abanyaruyeri bashaka guhunga ikibano ca none bagasubira mu kibano ca kera c’abanyagihugu, c’uburimyi n’ubuhinga, bakanka iterambere ry’ubuhinga n’ubuhinga. Ibindi bihitamwo bigaragaza nabi ivyicaro vy’ukuri vyavuzwe muri ico kigabane.
question: چه چیزی محافظه‌کاری سنتی آمریکایی را از محافظه‌کاری قرن نوزدهم اروپا در رویکردشان به تغییرات اجتماعی متمایز می‌کند؟
answer: محافظه‌کاری سنتی آمریکایی به دنبال ایجاد تعادل بین آزادی فردی و مسئولیت از طریق آزادی منظم است، در حالی که محافظه‌کاری اروپایی بازگشت به جامعه فئودالی را ترویج می‌کرد.
wrong_answers:
  - محافظه‌کاری سنتی آمریکایی ترویج‌دهنده‌ی لغو کامل مقررات اقتصادی است، در حالی که محافظه‌کاری اروپایی از مداخله‌ی قوی دولت در بازارها حمایت می‌کند.
  - محافظه‌کاری سنتی آمریکایی تمام نهادهای دولتی را رد می‌کند، در حالی که محافظه‌کاری اروپایی سیستم‌های پارلمانی دموکراتیک را پذیرفته است.
  - محافظه‌کاری سنتی آمریکایی تنها بر گسترش نظامی تمرکز دارد، در حالی که محافظه‌کاری اروپایی راه‌حل‌های دیپلماتیک صلح‌آمیز را در اولویت قرار می‌دهد.
explanation: |
  متن به وضوح این دو شکل محافظه‌کاری را از هم متمایز می‌کند. محافظه‌کاری سنتی آمریکایی بر اساس 'آزادی منظم' است که به دنبال آشتی دادن جامعه و آرمان‌های فردی، متعادل کردن آزادی با مسئولیت و دولت محدود با آزادی بازار است.  
  در مقابل، محافظه‌کاران اروپایی قرن نوزدهم واکنش‌گرایانی بودند که می‌خواستند از جامعه مدرن فرار کنند و به جامعه فئودالی، کشاورزی و صنعتگری قدیمی بازگردند و پیشرفت علمی و تکنولوژیکی را رد می‌کردند. گزینه‌های دیگر مواضع واقعی توصیف شده در فصل را نادرست نشان می‌دهند.
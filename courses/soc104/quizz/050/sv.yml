question: Vad skiljer den amerikanska traditionella konservatismen från den europeiska 1800-talskonservatismen i synen på samhällsförändringar?
answer: Den amerikanska traditionella konservatismen försöker balansera individuell frihet med ansvar genom ordnad frihet, medan den europeiska konservatismen förespråkade en återgång till feodalsamhället
wrong_answers:
  - Den amerikanska traditionella konservatismen förespråkar fullständig ekonomisk avreglering, medan den europeiska konservatismen stödde ett starkt statligt ingripande på marknaderna
  - Den amerikanska traditionella konservatismen förkastar alla statliga institutioner, medan den europeiska konservatismen omfattar demokratiska parlamentariska system
  - Den amerikanska traditionella konservatismen fokuserar enbart på militär expansion, medan den europeiska konservatismen prioriterar fredliga diplomatiska lösningar
explanation: |
  I texten görs en tydlig åtskillnad mellan dessa två former av konservatism. Den amerikanska traditionella konservatismen bygger på "ordnad frihet" som försöker förena samhällets och individens strävanden genom att balansera frihet med ansvar och begränsad statsmakt med marknadsfrihet.
  Däremot var de europeiska 1800-talskonservativa reaktionära som ville fly det moderna samhället och återvända till det gamla feodala, jordbruks- och hantverkssamhället och förkastade vetenskapliga och tekniska framsteg. De andra alternativen ger en felaktig bild av de faktiska ståndpunkter som beskrivs i kapitlet.
question: Cosa distingue il conservatorismo tradizionale americano dal conservatorismo europeo del XIX secolo nel loro approccio al cambiamento della società?
answer: Il conservatorismo tradizionale americano cerca di bilanciare la libertà individuale con la responsabilità attraverso una libertà ordinata, mentre il conservatorismo europeo sosteneva il ritorno alla società feudale
wrong_answers:
  - Il conservatorismo tradizionale americano promuove la completa deregolamentazione economica, mentre il conservatorismo europeo ha sostenuto un forte intervento dello Stato nei mercati
  - Il conservatorismo tradizionale americano rifiuta tutte le istituzioni governative, mentre il conservatorismo europeo ha abbracciato i sistemi parlamentari democratici
  - Il conservatorismo tradizionale americano si concentra esclusivamente sull'espansione militare, mentre il conservatorismo europeo dà la priorità a soluzioni diplomatiche pacifiche
explanation: |
  Il testo differenzia chiaramente queste due forme di conservatorismo. Il conservatorismo tradizionale americano si basa su una "libertà ordinata" che cerca di conciliare le aspirazioni della comunità e dell'individuo, bilanciando la libertà con la responsabilità e il governo limitato con la libertà di mercato.
  Al contrario, i conservatori europei del XIX secolo erano reazionari che volevano fuggire dalla società moderna e tornare alla vecchia società feudale, agricola e artigianale, rifiutando il progresso scientifico e tecnologico. Le altre opzioni travisano le posizioni reali descritte nel capitolo.
question: ¿Qué distingue al conservadurismo tradicional estadounidense del conservadurismo europeo del siglo XIX en su enfoque del cambio social?
answer: El conservadurismo tradicional estadounidense busca equilibrar la libertad individual con la responsabilidad a través de la libertad ordenada, mientras que el conservadurismo europeo abogaba por volver a la sociedad feudal
wrong_answers:
  - El conservadurismo tradicional estadounidense promueve la desregulación económica total, mientras que el conservadurismo europeo apoyaba una fuerte intervención estatal en los mercados
  - El conservadurismo tradicional estadounidense rechaza todas las instituciones gubernamentales, mientras que el conservadurismo europeo abraza los sistemas parlamentarios democráticos
  - El conservadurismo tradicional estadounidense se centra únicamente en la expansión militar, mientras que el conservadurismo europeo da prioridad a las soluciones diplomáticas pacíficas
explanation: |
  El texto diferencia claramente estas dos formas de conservadurismo. El conservadurismo tradicional estadounidense se basa en la "libertad ordenada", que trata de conciliar las aspiraciones comunitarias e individuales, equilibrando la libertad con la responsabilidad y el gobierno limitado con la libertad de mercado.
  Por el contrario, los conservadores europeos del siglo XIX eran reaccionarios que querían escapar de la sociedad moderna y volver a la antigua sociedad feudal, agrícola y artesanal, rechazando el progreso científico y tecnológico. Las otras opciones tergiversan las posiciones reales descritas en el capítulo.
question: อะไรที่ทำให้อนุรักษนิยมแบบดั้งเดิมของอเมริกาแตกต่างจากอนุรักษนิยมในศตวรรษที่ 19 ของยุโรปในแนวทางการเปลี่ยนแปลงทางสังคม?
answer: อนุรักษนิยมแบบดั้งเดิมของอเมริกามุ่งเน้นการสร้างสมดุลระหว่างเสรีภาพส่วนบุคคลกับความรับผิดชอบผ่านเสรีภาพที่มีระเบียบ ในขณะที่อนุรักษนิยมของยุโรปสนับสนุนการกลับไปสู่สังคมศักดินา
wrong_answers:
  - ลัทธิอนุรักษนิยมแบบดั้งเดิมของอเมริกาส่งเสริมการยกเลิกกฎระเบียบทางเศรษฐกิจอย่างสมบูรณ์ ในขณะที่ลัทธิอนุรักษนิยมของยุโรปสนับสนุนการแทรกแซงของรัฐอย่างเข้มแข็งในตลาด
  - ลัทธิอนุรักษนิยมแบบดั้งเดิมของอเมริกาปฏิเสธสถาบันของรัฐบาลทั้งหมด ในขณะที่ลัทธิอนุรักษนิยมของยุโรปยอมรับระบบรัฐสภาประชาธิปไตย
  - ลัทธิอนุรักษนิยมแบบดั้งเดิมของอเมริกามุ่งเน้นไปที่การขยายกำลังทหารเพียงอย่างเดียว ในขณะที่ลัทธิอนุรักษนิยมของยุโรปให้ความสำคัญกับการแก้ปัญหาทางการทูตอย่างสันติ
explanation: |
  ข้อความนี้แยกแยะความแตกต่างระหว่างสองรูปแบบของลัทธิอนุรักษนิยมอย่างชัดเจน ลัทธิอนุรักษนิยมแบบดั้งเดิมของอเมริกาขึ้นอยู่กับ 'เสรีภาพที่มีระเบียบ' ซึ่งพยายามประสานความปรารถนาของชุมชนและบุคคล โดยสร้างสมดุลระหว่างเสรีภาพกับความรับผิดชอบ และรัฐบาลที่จำกัดกับเสรีภาพทางการตลาด 
  ในทางตรงกันข้าม นักอนุรักษนิยมในยุโรปศตวรรษที่ 19 เป็นพวกปฏิกิริยาที่ต้องการหลีกหนีจากสังคมสมัยใหม่และกลับไปสู่สังคมศักดินา เกษตรกรรม และช่างฝีมือแบบเก่า โดยปฏิเสธความก้าวหน้าทางวิทยาศาสตร์และเทคโนโลยี ตัวเลือกอื่น ๆ บิดเบือนตำแหน่งที่แท้จริงที่อธิบายไว้ในบทนี้
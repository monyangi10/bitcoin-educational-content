question: 美國傳統保守主義與歐洲 19 世紀保守主義在處理社會變革的方式上有何差異？
answer: 美國傳統保守主義尋求透過有秩序的自由來平衡個人自由與責任，而歐洲保守主義則主張回到封建社會。
wrong_answers:
  - 美國的傳統保守主義提倡完全放寬經濟管制，而歐洲的保守主義則支持國家對市場的強力干預
  - 美國傳統保守主義拒絕所有政府機構，而歐洲保守主義則擁抱民主議會制度
  - 美國的傳統保守主義只著重於軍事擴張，而歐洲的保守主義則以和平的外交解決方案為優先
explanation: |
  文中清楚區分了這兩種形式的保守主義。美國傳統保守主義以「有秩序的自由」為基礎，尋求調和社群與個人的願望，平衡自由與責任、有限政府與市場自由。
  相比之下，歐洲 19 世紀的保守主義者是反動派，他們想要擺脫現代社會，回到舊有的封建、農業和工匠社會，拒絕科學和技術的進步。其他選項歪曲了本章所述的實際立場。
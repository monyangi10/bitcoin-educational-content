question: Mis eristab Ameerika traditsioonilist konservatismi Euroopa 19. sajandi konservatiivsusest nende lähenemise poolest ühiskondlikele muutustele?
answer: Ameerika traditsiooniline konservatism püüab tasakaalustada individuaalset vabadust ja vastutust korrastatud vabaduse kaudu, samas kui Euroopa konservatism propageeris tagasipöördumist feodaalsesse ühiskonda
wrong_answers:
  - Ameerika traditsiooniline konservatism toetab majanduse täielikku dereguleerimist, samas kui Euroopa konservatism toetas tugevat riiklikku sekkumist turgudele
  - Ameerika traditsiooniline konservatism lükkab tagasi kõik valitsusinstitutsioonid, samas kui Euroopa konservatism on omaks võtnud demokraatlikud parlamentaarsed süsteemid
  - Ameerika traditsiooniline konservatism keskendub üksnes sõjalisele laienemisele, samas kui Euroopa konservatism seab esikohale rahumeelsed diplomaatilised lahendused
explanation: |
  Tekstis eristatakse selgelt neid kahte konservatiivsuse vormi. Ameerika traditsiooniline konservatism põhineb "korrastatud vabadusel", mis püüab ühildada kogukonna ja üksikisiku püüdlusi, tasakaalustades vabadust ja vastutust ning piiratud valitsemist ja turuvabadust.
  Seevastu Euroopa 19. sajandi konservatiivid olid reaktsioonilised, kes tahtsid põgeneda moodsast ühiskonnast ja pöörduda tagasi vana feodaal-, põllumajandus- ja käsitööühiskonna juurde, lükates tagasi teaduse ja tehnoloogia arengu. Teised valikud moonutavad peatükis kirjeldatud tegelikke seisukohti.
question: O que distingue o conservadorismo tradicional americano do conservadorismo europeu do século XIX na sua abordagem à mudança social?
answer: O conservadorismo tradicional americano procura equilibrar a liberdade individual com a responsabilidade através de uma liberdade ordenada, enquanto o conservadorismo europeu defende o regresso à sociedade feudal
wrong_answers:
  - O conservadorismo tradicional americano promove a desregulamentação económica total, enquanto o conservadorismo europeu apoia uma forte intervenção do Estado nos mercados
  - O conservadorismo tradicional americano rejeita todas as instituições governamentais, enquanto o conservadorismo europeu abraçou os sistemas parlamentares democráticos
  - O conservadorismo tradicional americano centra-se exclusivamente na expansão militar, enquanto o conservadorismo europeu dá prioridade a soluções diplomáticas pacíficas
explanation: |
  O texto diferencia claramente estas duas formas de conservadorismo. O conservadorismo tradicional americano baseia-se numa "liberdade ordenada" que procura conciliar as aspirações comunitárias e individuais, equilibrando a liberdade com a responsabilidade e um governo limitado com a liberdade de mercado.
  Em contrapartida, os conservadores europeus do século XIX eram reacionários que pretendiam escapar à sociedade moderna e regressar à antiga sociedade feudal, agrícola e artesanal, rejeitando o progresso científico e tecnológico. As outras opções deturpam as posições reais descritas no capítulo.
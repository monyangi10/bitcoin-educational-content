question: Čím se liší americký tradiční konzervatismus od evropského konzervatismu 19. století v přístupu ke společenským změnám?
answer: Americký tradiční konzervatismus usiluje o rovnováhu mezi individuální svobodou a odpovědností prostřednictvím uspořádané svobody, zatímco evropský konzervatismus prosazoval návrat k feudální společnosti
wrong_answers:
  - Americký tradiční konzervatismus prosazuje úplnou deregulaci ekonomiky, zatímco evropský konzervatismus podporoval silné státní zásahy do trhů
  - Americký tradiční konzervatismus odmítá všechny vládní instituce, zatímco evropský konzervatismus přijal demokratické parlamentní systémy
  - Americký tradiční konzervatismus se zaměřuje výhradně na vojenskou expanzi, zatímco evropský konzervatismus upřednostňuje mírová diplomatická řešení
explanation: |
  Text tyto dvě formy konzervatismu jasně rozlišuje. Tradiční americký konzervatismus je založen na "uspořádané svobodě", která se snaží sladit aspirace společenství a jednotlivce, vyvažuje svobodu s odpovědností a omezenou vládu se svobodou trhu.
  Naproti tomu evropští konzervativci 19. století byli reakcionáři, kteří chtěli uniknout moderní společnosti a vrátit se ke staré feudální, zemědělské a řemeslnické společnosti a odmítali vědecký a technický pokrok. Ostatní možnosti zkreslují skutečné postoje popsané v kapitole.
question: Hva skiller amerikansk tradisjonell konservatisme fra europeisk 1800-tallskonservatisme i deres tilnærming til samfunnsendringer?
answer: Den amerikanske tradisjonelle konservatismen søker å balansere individuell frihet med ansvar gjennom ordnet frihet, mens den europeiske konservatismen gikk inn for en tilbakevending til føydalsamfunnet
wrong_answers:
  - Amerikansk tradisjonell konservatisme går inn for fullstendig deregulering av økonomien, mens europeisk konservatisme støtter sterk statlig inngripen i markedene
  - Amerikansk tradisjonell konservatisme avviser alle statlige institusjoner, mens europeisk konservatisme omfavner demokratiske parlamentariske systemer
  - Amerikansk tradisjonell konservatisme fokuserer utelukkende på militær ekspansjon, mens europeisk konservatisme prioriterer fredelige diplomatiske løsninger
explanation: |
  Teksten skiller tydelig mellom disse to formene for konservatisme. Den amerikanske tradisjonelle konservatismen er basert på en "ordnet frihet" som søker å forene fellesskapets og individets ambisjoner, og som balanserer frihet med ansvar og begrenset statlig styring med markedsfrihet.
  I kontrast til dette var 1800-tallets europeiske konservative reaksjonære som ønsket å unnslippe det moderne samfunnet og vende tilbake til det gamle føydal-, jordbruks- og håndverkssamfunnet, og som avviste vitenskapelige og teknologiske fremskritt. De andre alternativene gir en feilaktig fremstilling av de faktiske posisjonene som beskrives i kapitlet.
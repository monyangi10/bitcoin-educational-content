question: Что отличает американский традиционный консерватизм от европейского консерватизма XIX века в их подходе к общественным изменениям?
answer: Американский традиционный консерватизм стремится сбалансировать индивидуальную свободу и ответственность посредством упорядоченной свободы, в то время как европейский консерватизм выступает за возвращение к феодальному обществу
wrong_answers:
  - Американский традиционный консерватизм выступает за полное дерегулирование экономики, в то время как европейский консерватизм поддерживает сильное вмешательство государства в работу рынков
  - Американский традиционный консерватизм отвергает все государственные институты, в то время как европейский консерватизм опирается на демократические парламентские системы
  - Американский традиционный консерватизм сосредоточен исключительно на военной экспансии, в то время как европейский консерватизм ставит во главу угла мирные дипломатические решения
explanation: |
  В тексте четко разграничиваются эти две формы консерватизма. Американский традиционный консерватизм основан на "упорядоченной свободе", которая стремится примирить общественные и индивидуальные устремления, уравновесить свободу с ответственностью и ограниченное правительство со свободой рынка.
  В отличие от них, европейские консерваторы XIX века были реакционерами, которые хотели уйти от современного общества и вернуться к старому феодальному, сельскохозяйственному и ремесленному обществу, отвергая научно-технический прогресс. Остальные варианты искажают реальные позиции, описанные в главе.
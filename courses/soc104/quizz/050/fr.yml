question: What distinguishes American traditional conservatism from European 19th-century conservatism in their approach to societal change?
answer: American traditional conservatism seeks to balance individual freedom with responsibility through ordered liberty, while European conservatism advocated returning to feudal society
wrong_answers:
  - American traditional conservatism promotes complete economic deregulation, while European conservatism supported strong state intervention in markets
  - American traditional conservatism rejects all government institutions, while European conservatism embraced democratic parliamentary systems
  - American traditional conservatism focuses solely on military expansion, while European conservatism prioritized peaceful diplomatic solutions
explanation: |
  The text clearly differentiates these two forms of conservatism. American traditional conservatism is based on 'ordered liberty' that seeks to reconcile community and individual aspirations, balancing freedom with responsibility and limited government with market freedom. In contrast, European 19th-century conservatives were reactionaries who wanted to escape modern society and return to the old feudal, agricultural, and artisanal society, rejecting scientific and technological progress. The other options misrepresent the actual positions described in the chapter.

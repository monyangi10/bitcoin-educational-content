question: Wat onderscheidt het Amerikaanse traditionele conservatisme van het Europese 19e-eeuwse conservatisme in hun benadering van maatschappelijke verandering?
answer: Het Amerikaanse traditionele conservatisme streeft naar een evenwicht tussen individuele vrijheid en verantwoordelijkheid door middel van geordende vrijheid, terwijl het Europese conservatisme pleitte voor een terugkeer naar de feodale samenleving
wrong_answers:
  - Het Amerikaanse traditionele conservatisme is voorstander van volledige economische deregulering, terwijl het Europese conservatisme voorstander is van sterke staatsbemoeienis met de markten
  - Het Amerikaanse traditionele conservatisme verwerpt alle overheidsinstellingen, terwijl het Europese conservatisme de democratische parlementaire systemen omarmt
  - Het Amerikaanse traditionele conservatisme richt zich alleen op militaire expansie, terwijl het Europese conservatisme de voorkeur geeft aan vreedzame diplomatieke oplossingen
explanation: |
  De tekst maakt een duidelijk onderscheid tussen deze twee vormen van conservatisme. Het Amerikaanse traditionele conservatisme is gebaseerd op 'geordende vrijheid' die gemeenschap en individuele aspiraties met elkaar in overeenstemming wil brengen, waarbij vrijheid in evenwicht wordt gebracht met verantwoordelijkheid en een beperkte overheid met marktvrijheid.
  Daarentegen waren Europese 19e-eeuwse conservatieven reactionairen die wilden ontsnappen aan de moderne samenleving en terug wilden keren naar de oude feodale, agrarische en ambachtelijke samenleving, waarbij ze wetenschappelijke en technologische vooruitgang afwezen. De andere opties geven een verkeerde voorstelling van de werkelijke standpunten die in het hoofdstuk worden beschreven.
question: Was unterscheidet den traditionellen amerikanischen Konservatismus vom europäischen Konservatismus des 19. Jahrhunderts in Bezug auf den gesellschaftlichen Wandel?
answer: Der traditionelle amerikanische Konservatismus versucht, durch eine geordnete Freiheit ein Gleichgewicht zwischen individueller Freiheit und Verantwortung herzustellen, während der europäische Konservatismus für eine Rückkehr zur feudalen Gesellschaft eintritt
wrong_answers:
  - Der traditionelle amerikanische Konservatismus befürwortet eine vollständige Deregulierung der Wirtschaft, während der europäische Konservatismus eine starke staatliche Intervention in die Märkte befürwortet
  - Der traditionelle amerikanische Konservatismus lehnt alle staatlichen Institutionen ab, während der europäische Konservatismus demokratisch-parlamentarische Systeme befürwortet
  - Der traditionelle amerikanische Konservatismus konzentriert sich ausschließlich auf militärische Expansion, während der europäische Konservatismus friedlichen diplomatischen Lösungen den Vorzug gibt
explanation: |
  Im Text werden diese beiden Formen des Konservatismus klar unterschieden. Der traditionelle amerikanische Konservatismus basiert auf der "geordneten Freiheit", die darauf abzielt, die Bestrebungen der Gemeinschaft und des Einzelnen miteinander in Einklang zu bringen und ein Gleichgewicht zwischen Freiheit und Verantwortung sowie zwischen begrenzter Regierung und Marktfreiheit herzustellen.
  Im Gegensatz dazu waren die europäischen Konservativen des 19. Jahrhunderts Reaktionäre, die der modernen Gesellschaft entkommen und zur alten feudalen, landwirtschaftlichen und handwerklichen Gesellschaft zurückkehren wollten und den wissenschaftlichen und technischen Fortschritt ablehnten. Die anderen Optionen geben die tatsächlichen Positionen, die in diesem Kapitel beschrieben werden, falsch wieder.
question: Mikä erottaa amerikkalaisen perinteisen konservatismin eurooppalaisesta 1800-luvun konservatismista niiden suhtautumisessa yhteiskunnallisiin muutoksiin?
answer: Amerikkalainen perinteinen konservatismi pyrkii tasapainottamaan yksilön vapautta ja vastuuta järjestäytyneen vapauden avulla, kun taas eurooppalainen konservatismi kannatti paluuta feodaaliseen yhteiskuntaan
wrong_answers:
  - Amerikkalainen perinteinen konservatismi kannattaa talouden täydellistä sääntelyn purkamista, kun taas eurooppalainen konservatismi kannatti valtion vahvaa puuttumista markkinoihin
  - Amerikkalainen perinteinen konservatismi hylkää kaikki valtiolliset instituutiot, kun taas eurooppalainen konservatismi hyväksyi demokraattiset parlamentaariset järjestelmät
  - Amerikkalainen perinteinen konservatismi keskittyy yksinomaan sotilaalliseen laajentumiseen, kun taas eurooppalainen konservatismi asettaa etusijalle rauhanomaiset diplomaattiset ratkaisut
explanation: |
  Tekstissä erotetaan nämä kaksi konservatismin muotoa selvästi toisistaan. Amerikkalainen perinteinen konservatismi perustuu "järjestettyyn vapauteen", jossa pyritään sovittamaan yhteen yhteisön ja yksilön pyrkimykset, tasapainottamaan vapaus ja vastuu sekä rajoitettu hallinto ja markkinoiden vapaus.
  Sitä vastoin eurooppalaiset 1800-luvun konservatiivit olivat taantumuksellisia, jotka halusivat paeta modernia yhteiskuntaa ja palata vanhaan feodaaliseen, maatalous- ja käsityöläisyhteiskuntaan ja hylkäsivät tieteellisen ja teknisen kehityksen. Muut vaihtoehdot vääristelevät luvussa kuvattuja todellisia kantoja.
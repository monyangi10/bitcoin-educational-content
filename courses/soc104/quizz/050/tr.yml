question: Amerikan geleneksel muhafazakârlığını toplumsal değişime yaklaşımı bakımından Avrupa'daki 19. yüzyıl muhafazakârlığından ayıran nedir?
answer: Avrupa muhafazakârlığı feodal topluma geri dönmeyi savunurken, Amerikan geleneksel muhafazakârlığı bireysel özgürlüğü sorumlulukla dengelemeyi amaçlamaktadır
wrong_answers:
  - Amerikan geleneksel muhafazakârlığı ekonomide tam bir deregülasyonu savunurken, Avrupa muhafazakârlığı piyasalara güçlü devlet müdahalesini desteklemektedir
  - Amerikan geleneksel muhafazakârlığı tüm devlet kurumlarını reddederken, Avrupa muhafazakârlığı demokratik parlamenter sistemleri benimsemiştir
  - Amerikan geleneksel muhafazakârlığı yalnızca askeri genişlemeye odaklanırken, Avrupa muhafazakârlığı barışçıl diplomatik çözümlere öncelik vermiştir
explanation: |
  Metin bu iki muhafazakârlık biçimini net bir şekilde birbirinden ayırmaktadır. Amerikan geleneksel muhafazakârlığı, toplum ve birey isteklerini uzlaştırmaya çalışan, özgürlüğü sorumlulukla ve sınırlı hükümeti piyasa özgürlüğüyle dengeleyen 'düzenli özgürlüğe' dayanmaktadır.
  Buna karşılık, 19. yüzyıl Avrupa muhafazakârları modern toplumdan kaçmak ve eski feodal, tarımsal ve zanaatkâr topluma geri dönmek isteyen, bilimsel ve teknolojik ilerlemeyi reddeden gericilerdi. Diğer seçenekler, bölümde açıklanan gerçek pozisyonları yanlış yansıtmaktadır.
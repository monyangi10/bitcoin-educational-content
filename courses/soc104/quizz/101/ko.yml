question: 자유주의 철학에 따르면 정치 이념을 구분하는 근본적인 기준은 무엇인가요?
answer: 개인이 스스로 결정을 내리든 다른 사람이 강요하는 결정을 내리든 상관 없습니다
wrong_answers:
  - 경제 정책이 부의 재분배 또는 축적 중 어느 쪽을 선호하는지 여부
  - 사회적 가치가 전통적인 가족 구조를 강조하든 진보적 이상을 강조하든 상관없이
  - 거버넌스 구조가 국가 주권을 우선시하는지, 국제 협력을 우선시하는지 여부
explanation: |
  이 책은 진정한 정치적 구분은 좌파, 우파, 중도가 아니라 자유 대 강압, 자발적 동의 대 강제, 개인 책임 대 집단이라는 근본적인 철학적 원칙에 기반한다고 명시하고 있습니다.
  중요한 질문은 자신의 삶에 대한 중요한 결정을 스스로 내리고 싶은지, 아니면 다른 사람이 대신 내려주기를 원하는지 여부입니다. 이는 경제적 재분배, 사회적 가치 또는 거버넌스 구조에 기반한 전통적인 정치적 분류에서 벗어나 개인의 삶에 영향을 미치는 결정을 내릴 권한이 누구에게 있는지에 대한 근본적인 질문에 초점을 맞추는 것을 의미합니다.
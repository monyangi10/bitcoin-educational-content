question: Milline on libertaarne filosoofia kohaselt poliitiliste ideoloogiate eristamise põhikriteerium?
answer: Kas üksikisikud teevad ise oma otsuseid või lasevad teised neile otsuseid peale suruda
wrong_answers:
  - Kas majanduspoliitika soodustab ümberjaotamist või rikkuse kogumist
  - Olenemata sellest, kas sotsiaalsed väärtused rõhutavad traditsioonilisi perestruktuure või progressiivseid ideaale
  - Kas juhtimisstruktuurid seavad esikohale riikliku suveräänsuse või rahvusvahelise koostöö
explanation: |
  Tekstis märgitakse selgesõnaliselt, et tegelik poliitiline lõhe ei ole vasakpoolsete, parempoolsete või keskerakondlaste vahel, vaid põhineb pigem filosoofilistel aluspõhimõtetel: vabadus versus sund, vabatahtlik nõusolek versus sund ja individuaalne vastutus versus kollektiivsus.
  Võtmeküsimuseks on see, kas te tahate ise teha oma elu puudutavaid olulisi otsuseid või soovite, et keegi teine neid teie eest teeks. See kujutab endast eemaldumist traditsioonilistest poliitilistest kategoriseerimistest, mis põhinevad majanduslikul ümberjaotusel, sotsiaalsetel väärtustel või juhtimisstruktuuridel, keskendudes selle asemel põhiküsimusele, kellel on õigus teha otsuseid, mis mõjutavad üksikisikute elu.
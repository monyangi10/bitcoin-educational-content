question: Mikä on libertaristisen filosofian mukaan poliittisten ideologioiden erottamisen peruskriteeri?
answer: Tekevätkö yksilöt omat päätöksensä vai määräävätkö muut heille päätökset?
wrong_answers:
  - Suositaanko talouspolitiikassa varallisuuden uudelleenjakoa vai kasautumista?
  - Korostetaanko yhteiskunnallisissa arvoissa perinteisiä perherakenteita vai edistyksellisiä ihanteita?
  - Asetetaanko hallintorakenteissa etusijalle kansallinen suvereniteetti vai kansainvälinen yhteistyö?
explanation: |
  Tekstissä todetaan nimenomaisesti, että todellinen poliittinen kahtiajako ei ole vasemmisto, oikeisto tai keskusta, vaan se perustuu pikemminkin filosofisiin perusperiaatteisiin: vapaus vastaan pakko, vapaaehtoinen suostumus vastaan pakko ja yksilön vastuu vastaan kollektiivisuus.
  Keskeinen kysymys on, haluatko tehdä itse elämääsi liittyvät tärkeät päätökset vai haluatko, että joku muu tekee ne puolestasi. Tämä merkitsee irtautumista perinteisistä poliittisista luokitteluista, jotka perustuvat taloudelliseen uudelleenjakoon, yhteiskunnallisiin arvoihin tai hallintorakenteisiin, ja sen sijaan keskitytään perustavanlaatuiseen kysymykseen siitä, kenellä on valta tehdä päätöksiä, jotka vaikuttavat yksilöiden elämään.
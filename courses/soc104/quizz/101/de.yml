question: Welches ist nach der libertären Philosophie das grundlegende Kriterium zur Unterscheidung von politischen Ideologien?
answer: Ob der Einzelne seine eigenen Entscheidungen trifft oder ob ihm Entscheidungen von anderen auferlegt werden
wrong_answers:
  - Ob die Wirtschaftspolitik die Umverteilung oder die Anhäufung von Reichtum begünstigt
  - Ob soziale Werte traditionelle Familienstrukturen oder progressive Ideale betonen
  - Ob Governance-Strukturen der nationalen Souveränität oder der internationalen Zusammenarbeit Vorrang einräumen
explanation: |
  In dem Text wird ausdrücklich darauf hingewiesen, dass die eigentliche politische Kluft nicht zwischen links, rechts oder der Mitte besteht, sondern vielmehr auf grundlegenden philosophischen Prinzipien beruht: Freiheit versus Zwang, freiwillige Zustimmung versus Zwang und individuelle Verantwortung versus Kollektivität.
  Die entscheidende Frage ist, ob Sie wichtige Entscheidungen über Ihr Leben selbst treffen wollen oder ob Sie möchten, dass jemand anderes sie für Sie trifft. Dies stellt eine Abkehr von den traditionellen politischen Kategorisierungen dar, die auf wirtschaftlicher Umverteilung, sozialen Werten oder Regierungsstrukturen basieren, und konzentriert sich stattdessen auf die grundlegende Frage, wer die Autorität hat, Entscheidungen zu treffen, die das Leben des Einzelnen betreffen.
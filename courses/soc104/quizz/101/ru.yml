question: Согласно либертарианской философии, что является основополагающим критерием для различения политических идеологий?
answer: Принимают ли люди собственные решения или им их навязывают другие
wrong_answers:
  - Способствует ли экономическая политика перераспределению или накоплению богатства
  - Какие общественные ценности ставят во главу угла - традиционные семейные структуры или прогрессивные идеалы
  - Какие структуры управления ставят во главу угла национальный суверенитет или международное сотрудничество
explanation: |
  В тексте прямо говорится, что реальное политическое разделение происходит не между левыми, правыми или центрами, а на основе фундаментальных философских принципов: свобода против принуждения, добровольное согласие против ограничений, индивидуальная ответственность против коллективизма.
  Ключевой вопрос заключается в том, хотите ли вы сами принимать важные решения, касающиеся вашей жизни, или же вы хотите, чтобы кто-то другой принимал их за вас. Это отход от традиционной политической классификации, основанной на экономическом перераспределении, социальных ценностях или структурах управления, и фокусировка на фундаментальном вопросе о том, кто имеет право принимать решения, влияющие на жизнь человека.
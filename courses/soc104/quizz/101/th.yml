question: ตามปรัชญาเสรีนิยม สิ่งที่เป็นเกณฑ์พื้นฐานในการแยกแยะอุดมการณ์ทางการเมืองคืออะไร?
answer: ไม่ว่าบุคคลจะตัดสินใจด้วยตนเองหรือมีการตัดสินใจที่ถูกกำหนดโดยผู้อื่น
wrong_answers:
  - นโยบายเศรษฐกิจสนับสนุนการกระจายรายได้หรือการสะสมความมั่งคั่ง
  - ไม่ว่าจะเป็นค่านิยมทางสังคมที่เน้นโครงสร้างครอบครัวแบบดั้งเดิมหรืออุดมคติที่ก้าวหน้า
  - ไม่ว่าจะเป็นโครงสร้างการปกครองที่ให้ความสำคัญกับอธิปไตยของชาติหรือความร่วมมือระหว่างประเทศ
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่าความแตกแยกทางการเมืองที่แท้จริงไม่ได้อยู่ระหว่างซ้าย ขวา หรือกลาง แต่ขึ้นอยู่กับหลักปรัชญาพื้นฐาน: เสรีภาพกับการบังคับ, การยินยอมโดยสมัครใจกับการจำกัด, และความรับผิดชอบส่วนบุคคลกับการรวมกลุ่ม คำถามสำคัญคือคุณต้องการตัดสินใจเรื่องสำคัญเกี่ยวกับชีวิตของคุณเองหรือไม่ หรือคุณต้องการให้คนอื่นตัดสินใจแทนคุณ นี่เป็นการเปลี่ยนแปลงจากการจัดหมวดหมู่ทางการเมืองแบบดั้งเดิมที่อิงตามการกระจายเศรษฐกิจ ค่านิยมทางสังคม หรือโครงสร้างการปกครอง โดยมุ่งเน้นไปที่คำถามพื้นฐานว่าใครมีอำนาจในการตัดสินใจที่ส่งผลกระทบต่อชีวิตของบุคคล
question: Dushingiye kuri filozofiya y’abanyagihugu, ni igiki gihambaye co gutandukanya ivyiyumviro vya politike?
answer: Niba abantu bifatira ingingo canke abandi babategetse gufata ingingo .
wrong_answers:
  - Nimba politike z’ubutunzi zishigikira ugusubira gusangira canke kwirundanira ubutunzi .
  - Nimba ingingo ngenderwako zo mu kibano zishimika ku mibumbe y’umuryango canke ivyiyumviro vy’iterambere .
  - Nimba inzego z’ubutegetsi zishira imbere ubusegaba bw’igihugu canke ubufatanye mpuzamakungu .
explanation: |
  Ico canditswe kivuga neza ko amacakubiri nyayo ya politike atari hagati y’ibubamfu, iburyo canke hagati, ahubwo ko ashingiye ku ngingo ngenderwako z’ishimikiro za filozofiya: umwidegemvyo n’uguhatirwa, ukwemera ku bushake n’uguhatirwa, n’inshingano z’umuntu ku giti ciwe n’ugukorana n’abantu bose. 
  Ikibazo nyamukuru kica kiba nimba ushaka gufata ingingo zihambaye mu buzima bwawe wewe nyene, canke nimba ushaka ko uwundi muntu azifata. Ivyo bigereranya ukuva ku migwi ya politike ya kera ishingiye ku gusubira gusangira ubutunzi, ku mico kama y’imibano canke ku mibumbe y’ubutegetsi, ahubwo bikaba vyibanda ku kibazo nyamukuru c’uwufise ububasha bwo gufata ingingo zigira ico zikoze ku buzima bw’abantu ku giti cabo.
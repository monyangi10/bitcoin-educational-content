question: بر اساس فلسفه لیبرترین، معیار اساسی برای تمایز ایدئولوژی‌های سیاسی چیست؟
answer: اینکه آیا افراد تصمیمات خود را می‌گیرند یا تصمیماتی توسط دیگران بر آن‌ها تحمیل می‌شود
wrong_answers:
  - آیا سیاست‌های اقتصادی به توزیع مجدد یا انباشت ثروت تمایل دارند؟
  - آیا ارزش‌های اجتماعی بر ساختارهای سنتی خانواده تأکید دارند یا ایده‌آل‌های پیشرو؟
  - آیا ساختارهای حکومتی اولویت را به حاکمیت ملی می‌دهند یا همکاری بین‌المللی؟
explanation: |
  متن به‌طور صریح بیان می‌کند که شکاف واقعی سیاسی نه بین چپ، راست یا مرکز، بلکه بر اساس اصول فلسفی بنیادی است: آزادی در مقابل اجبار، رضایت داوطلبانه در مقابل محدودیت، و مسئولیت فردی در مقابل جمع‌گرایی.  
  سؤال کلیدی این است که آیا می‌خواهید تصمیمات مهم زندگی‌تان را خودتان بگیرید، یا می‌خواهید شخص دیگری این تصمیمات را برای شما بگیرد. این نمایانگر انحراف از دسته‌بندی‌های سیاسی سنتی بر اساس توزیع اقتصادی، ارزش‌های اجتماعی یا ساختارهای حکومتی است و به جای آن بر پرسش بنیادی تمرکز دارد که چه کسی اختیار تصمیم‌گیری‌هایی که بر زندگی افراد تأثیر می‌گذارد را دارد.
question: Wat is volgens de libertarische filosofie het fundamentele criterium om politieke ideologieën van elkaar te onderscheiden?
answer: Of individuen hun eigen beslissingen nemen of dat anderen hen beslissingen opleggen
wrong_answers:
  - Of economisch beleid herverdeling of accumulatie van rijkdom bevordert
  - Of sociale waarden nu traditionele gezinsstructuren of progressieve idealen benadrukken
  - Of bestuursstructuren prioriteit geven aan nationale soevereiniteit of internationale samenwerking
explanation: |
  De tekst stelt expliciet dat de echte politieke scheidslijn niet tussen links, rechts of het midden ligt, maar eerder gebaseerd is op fundamentele filosofische principes: vrijheid versus dwang, vrijwillige toestemming versus dwang, en individuele verantwoordelijkheid versus collectiviteit.
  De hamvraag wordt of je belangrijke beslissingen over je leven zelf wilt nemen, of dat je wilt dat iemand anders dat voor je doet. Dit betekent dat we afstappen van traditionele politieke categoriseringen op basis van economische herverdeling, sociale waarden of bestuursstructuren en ons in plaats daarvan richten op de fundamentele vraag wie de autoriteit heeft om beslissingen te nemen die het leven van individuen beïnvloeden.
question: 根据自由主义哲学，区分政治意识形态的基本标准是什么？
answer: 个人是自己做决定，还是由他人强加决定
wrong_answers:
  - 经济政策是有利于财富的再分配还是积累
  - 社会价值观是强调传统家庭结构还是进步理想
  - 治理结构是优先考虑国家主权还是国际合作
explanation: |
  文中明确指出，真正的政治分歧不在于左派、右派或中间派，而是基于基本的哲学原则：自由与强制、自愿同意与约束、个人责任与集体主义。
  问题的关键在于，你是想自己对生活做出重要决定，还是想让别人替你做决定。这代表了一种不同于传统的基于经济再分配、社会价值观或治理结构的政治分类，而是将重点放在谁有权做出影响个人生活的决定这一根本问题上。
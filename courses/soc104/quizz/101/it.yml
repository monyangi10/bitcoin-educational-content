question: Secondo la filosofia libertaria, qual è il criterio fondamentale per distinguere le ideologie politiche?
answer: Se gli individui prendono le proprie decisioni o se le decisioni vengono imposte da altri
wrong_answers:
  - Se le politiche economiche favoriscono la redistribuzione o l'accumulo di ricchezza
  - Se i valori sociali enfatizzano le strutture familiari tradizionali o gli ideali progressisti
  - Se le strutture di governance privilegiano la sovranità nazionale o la cooperazione internazionale
explanation: |
  Il testo afferma esplicitamente che la vera divisione politica non è tra sinistra, destra o centro, ma piuttosto si basa su principi filosofici fondamentali: libertà contro coercizione, consenso volontario contro costrizione, responsabilità individuale contro collettività.
  La domanda chiave diventa se volete prendere voi stessi le decisioni importanti sulla vostra vita o se volete che qualcun altro le prenda per voi. Questo rappresenta un allontanamento dalle tradizionali categorizzazioni politiche basate sulla ridistribuzione economica, sui valori sociali o sulle strutture di governo, concentrandosi invece sulla questione fondamentale di chi ha l'autorità di prendere decisioni che riguardano la vita degli individui.
question: Menurut filosofi libertarian, apa kriteria mendasar untuk membedakan ideologi politik?
answer: Apakah individu membuat keputusan sendiri atau dipaksakan oleh orang lain
wrong_answers:
  - Apakah kebijakan ekonomi mendukung redistribusi atau akumulasi kekayaan
  - Apakah nilai-nilai sosial menekankan struktur keluarga tradisional atau cita-cita progresif
  - Apakah struktur tata kelola memprioritaskan kedaulatan nasional atau kerja sama internasional
explanation: |
  Teks ini secara eksplisit menyatakan bahwa perbedaan politik yang sebenarnya bukanlah antara kiri, kanan, atau tengah, melainkan berdasarkan prinsip-prinsip filosofis yang mendasar: kebebasan versus paksaan, persetujuan sukarela versus paksaan, dan tanggung jawab individu versus kolektivitas.
  Pertanyaan kuncinya adalah apakah Anda ingin membuat keputusan penting tentang hidup Anda sendiri, atau apakah Anda ingin orang lain yang membuat keputusan untuk Anda. Hal ini merupakan perubahan dari kategorisasi politik tradisional yang didasarkan pada redistribusi ekonomi, nilai-nilai sosial, atau struktur pemerintahan, dan berfokus pada pertanyaan mendasar tentang siapa yang memiliki wewenang untuk membuat keputusan yang mempengaruhi kehidupan individu.
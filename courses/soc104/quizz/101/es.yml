question: Según la filosofía libertaria, ¿cuál es el criterio fundamental para distinguir las ideologías políticas?
answer: Si los individuos toman sus propias decisiones o se las imponen otros
wrong_answers:
  - Si las políticas económicas favorecen la redistribución o la acumulación de riqueza
  - Tanto si los valores sociales hacen hincapié en las estructuras familiares tradicionales como en los ideales progresistas
  - Si las estructuras de gobierno dan prioridad a la soberanía nacional o a la cooperación internacional
explanation: |
  El texto afirma explícitamente que la verdadera división política no es entre izquierda, derecha o centro, sino que se basa en principios filosóficos fundamentales: libertad frente a coerción, consentimiento voluntario frente a coacción y responsabilidad individual frente a colectividad.
  La cuestión clave es si quieres tomar tú mismo las decisiones importantes sobre tu vida o si quieres que otro las tome por ti. Esto representa un alejamiento de las categorizaciones políticas tradicionales basadas en la redistribución económica, los valores sociales o las estructuras de gobierno, centrándose en cambio en la cuestión fundamental de quién tiene autoridad para tomar decisiones que afectan a la vida de las personas.
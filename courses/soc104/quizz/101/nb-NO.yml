question: Hva er det grunnleggende kriteriet for å skille mellom politiske ideologier, ifølge libertariansk filosofi?
answer: Hvorvidt individer tar sine egne beslutninger eller blir pålagt beslutninger av andre
wrong_answers:
  - Om økonomisk politikk favoriserer omfordeling eller opphopning av rikdom
  - Enten sosiale verdier vektlegger tradisjonelle familiestrukturer eller progressive idealer
  - Om styringsstrukturer prioriterer nasjonal suverenitet eller internasjonalt samarbeid
explanation: |
  Teksten sier eksplisitt at det virkelige politiske skillet ikke går mellom venstre, høyre eller sentrum, men snarere er basert på grunnleggende filosofiske prinsipper: frihet versus tvang, frivillig samtykke versus tvang, og individuelt ansvar versus kollektivitet.
  Det sentrale spørsmålet blir om du ønsker å ta viktige beslutninger om livet ditt selv, eller om du ønsker at noen andre skal ta dem for deg. Dette representerer et brudd med tradisjonelle politiske kategoriseringer basert på økonomisk omfordeling, sosiale verdier eller styringsstrukturer, og fokuserer i stedet på det grunnleggende spørsmålet om hvem som har myndighet til å ta avgjørelser som påvirker enkeltmenneskers liv.
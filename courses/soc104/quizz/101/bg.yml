question: Какъв е основният критерий за разграничаване на политическите идеологии според либертарианската философия?
answer: Дали хората сами взимат решения, или решенията им се налагат от други
wrong_answers:
  - Дали икономическите политики благоприятстват преразпределението или натрупването на богатство
  - Дали социалните ценности наблягат на традиционните семейни структури или на прогресивните идеали
  - Дали управленските структури дават приоритет на националния суверенитет или на международното сътрудничество
explanation: |
  В текста изрично се посочва, че истинското политическо разделение не е между ляво, дясно или център, а по-скоро се основава на фундаментални философски принципи: свобода срещу принуда, доброволно съгласие срещу принуда и индивидуална отговорност срещу колективност.
  Основният въпрос е дали искате сами да вземате важни решения за живота си, или искате някой друг да ги взема вместо вас. Това представлява отклонение от традиционните политически категоризации, основани на икономическо преразпределение, социални ценности или управленски структури, като вместо това се фокусира върху фундаменталния въпрос кой има право да взема решения, засягащи живота на индивидите.
question: स्वतंत्रतावादी दर्शन के अनुसार, राजनीतिक विचारधाराओं को अलग करने का मूल मानदंड क्या है?
answer: चाहे व्यक्ति अपने निर्णय स्वयं लें या दूसरों द्वारा उन पर निर्णय थोपे जाएं
wrong_answers:
  - चाहे आर्थिक नीतियां धन के पुनर्वितरण या संचय को बढ़ावा देती हों।
  - चाहे सामाजिक मूल्य पारंपरिक पारिवारिक संरचनाओं पर जोर देते हों या प्रगतिशील आदर्शों पर।
  - शासन संरचनाएं राष्ट्रीय संप्रभुता को प्राथमिकता देती हैं या अंतरराष्ट्रीय सहयोग को।
explanation: |
  इस लेख में स्पष्ट रूप से कहा गया है कि वास्तविक राजनीतिक विभाजन वाम, दक्षिण या मध्यमार्गी के बीच नहीं है, बल्कि मूलभूत दार्शनिक सिद्धांतों पर आधारित है: स्वतंत्रता बनाम ज़बरदस्ती, स्वैच्छिक सहमति बनाम बंधन, और व्यक्तिगत ज़िम्मेदारी बनाम सामूहिक ज़िम्मेदारी।
  मुख्य प्रश्न यह है कि क्या आप अपने जीवन के महत्वपूर्ण निर्णय स्वयं लेना चाहते हैं, या आप चाहते हैं कि कोई और आपके लिए ये निर्णय ले। यह आर्थिक पुनर्वितरण, सामाजिक मूल्यों या शासन संरचनाओं पर आधारित पारंपरिक राजनीतिक वर्गीकरणों से हटकर, इस मूलभूत प्रश्न पर केंद्रित है कि व्यक्तियों के जीवन को प्रभावित करने वाले निर्णय लेने का अधिकार किसके पास है।
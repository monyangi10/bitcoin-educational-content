question: De acordo com a filosofia libertária, qual é o critério fundamental para distinguir as ideologias políticas?
answer: Se os indivíduos tomam as suas próprias decisões ou se as decisões lhes são impostas por outros
wrong_answers:
  - Se as políticas económicas favorecem a redistribuição ou a acumulação de riqueza
  - Se os valores sociais privilegiam as estruturas familiares tradicionais ou os ideais progressistas
  - Se as estruturas de governação dão prioridade à soberania nacional ou à cooperação internacional
explanation: |
  O texto afirma explicitamente que a verdadeira divisão política não é entre esquerda, direita ou centro, mas sim baseada em princípios filosóficos fundamentais: liberdade versus coerção, consentimento voluntário versus constrangimento, e responsabilidade individual versus coletividade.
  A questão fundamental é saber se queremos ser nós a tomar as decisões importantes sobre a nossa vida ou se queremos que outra pessoa as tome por nós. Isto representa um afastamento das categorizações políticas tradicionais baseadas na redistribuição económica, nos valores sociais ou nas estruturas de governação, centrando-se antes na questão fundamental de quem tem autoridade para tomar decisões que afectam a vida dos indivíduos.
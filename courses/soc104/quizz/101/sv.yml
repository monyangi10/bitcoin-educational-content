question: Vilket är enligt libertariansk filosofi det grundläggande kriteriet för att särskilja politiska ideologier?
answer: Huruvida individer fattar sina egna beslut eller om de påtvingas beslut av andra
wrong_answers:
  - Huruvida den ekonomiska politiken gynnar omfördelning eller ackumulering av välstånd
  - Huruvida sociala värderingar betonar traditionella familjestrukturer eller progressiva ideal
  - Huruvida styrningsstrukturer prioriterar nationell suveränitet eller internationellt samarbete
explanation: |
  I texten står det uttryckligen att den verkliga politiska skiljelinjen inte går mellan vänster, höger eller mitten, utan snarare baseras på grundläggande filosofiska principer: frihet kontra tvång, frivilligt samtycke kontra tvång och individuellt ansvar kontra kollektivitet.
  Nyckelfrågan blir om man själv vill fatta viktiga beslut om sitt liv eller om man vill att någon annan ska fatta dem åt en. Detta innebär ett avsteg från traditionella politiska kategoriseringar baserade på ekonomisk omfördelning, sociala värderingar eller styrningsstrukturer, och fokuserar istället på den grundläggande frågan om vem som har befogenhet att fatta beslut som påverkar individers liv.
question: Jaké je podle libertariánské filozofie základní kritérium pro rozlišení politických ideologií?
answer: Zda se jednotlivci rozhodují sami, nebo jim rozhodnutí vnucují jiní
wrong_answers:
  - Zda hospodářská politika podporuje přerozdělování nebo hromadění bohatství
  - Ať už společenské hodnoty zdůrazňují tradiční rodinné struktury, nebo pokrokové ideály
  - Zda struktury řízení upřednostňují národní suverenitu nebo mezinárodní spolupráci
explanation: |
  V textu se výslovně uvádí, že skutečné politické dělení není na levici, pravici nebo střed, ale spíše na základě základních filozofických principů: svoboda versus donucení, dobrovolný souhlas versus omezení a individuální odpovědnost versus kolektivita.
  Klíčovou otázkou se stává, zda chcete o důležitých věcech svého života rozhodovat sami, nebo zda chcete, aby je za vás dělal někdo jiný. To představuje odklon od tradičních politických kategorizací založených na ekonomickém přerozdělování, společenských hodnotách nebo vládních strukturách a místo toho se zaměřuje na základní otázku, kdo má pravomoc činit rozhodnutí ovlivňující životy jednotlivců.
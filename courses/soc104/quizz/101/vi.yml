question: Theo triết học tự do, tiêu chí cơ bản để phân biệt các hệ tư tưởng chính trị là gì?
answer: Cho dù cá nhân tự đưa ra quyết định của mình hay bị người khác áp đặt quyết định.
wrong_answers:
  - Liệu các chính sách kinh tế có ưu tiên phân phối lại hay tích lũy của cải?
  - Cho dù các giá trị xã hội nhấn mạnh cấu trúc gia đình truyền thống hay các lý tưởng tiến bộ
  - Liệu các cấu trúc quản trị ưu tiên chủ quyền quốc gia hay hợp tác quốc tế?
explanation: |
  Văn bản này nêu rõ rằng sự chia rẽ chính trị thực sự không nằm giữa cánh tả, cánh hữu hay trung dung, mà dựa trên các nguyên tắc triết học cơ bản: tự do so với cưỡng bức, sự đồng thuận tự nguyện so với sự ràng buộc, và trách nhiệm cá nhân so với trách nhiệm tập thể.
  Câu hỏi then chốt đặt ra là liệu bạn muốn tự mình đưa ra những quyết định quan trọng về cuộc sống của mình hay muốn người khác đưa ra quyết định thay bạn. Điều này thể hiện sự khác biệt so với các phân loại chính trị truyền thống dựa trên sự phân phối lại kinh tế, các giá trị xã hội hoặc cấu trúc quản trị, thay vào đó tập trung vào câu hỏi cơ bản về việc ai có thẩm quyền đưa ra các quyết định ảnh hưởng đến cuộc sống của cá nhân.
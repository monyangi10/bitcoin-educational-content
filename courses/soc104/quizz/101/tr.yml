question: Liberteryen felsefeye göre, siyasi ideolojileri ayırt etmenin temel ölçütü nedir?
answer: Bireylerin kendi kararlarını kendilerinin mi verdiği yoksa başkaları tarafından kendilerine dayatılan kararlara mı sahip oldukları
wrong_answers:
  - Ekonomi politikalarının servetin yeniden dağılımını mı yoksa birikimini mi desteklediği
  - Toplumsal değerlerin geleneksel aile yapılarını mı yoksa ilerici idealleri mi vurguladığı
  - Yönetişim yapılarının ulusal egemenliğe mi yoksa uluslararası işbirliğine mi öncelik verdiği
explanation: |
  Metin, gerçek siyasi bölünmenin sol, sağ veya merkez arasında değil, daha ziyade temel felsefi ilkelere dayandığını açıkça belirtmektedir: zorlamaya karşı özgürlük, kısıtlamaya karşı gönüllü rıza ve kolektiviteye karşı bireysel sorumluluk.
  Kilit soru, hayatınızla ilgili önemli kararları kendiniz mi almak istiyorsunuz yoksa bunları sizin yerinize bir başkasının almasını mı istiyorsunuz sorusudur. Bu, ekonomik yeniden dağıtım, sosyal değerler veya yönetim yapılarına dayalı geleneksel siyasi sınıflandırmalardan bir sapmayı temsil etmekte, bunun yerine bireylerin yaşamlarını etkileyen kararları alma yetkisinin kimde olduğu temel sorusuna odaklanmaktadır.
question: Prema libertarijanskoj filozofiji, osnovni kriterijum za razlikovanje političkih ideologija je stepen do kojeg one poštuju individualnu slobodu i prava.
answer: Da li pojedinci donose sopstvene odluke ili im odluke nameću drugi
wrong_answers:
  - Da li ekonomske politike favorizuju redistribuciju ili akumulaciju bogatstva
  - Da li društvene vrednosti naglašavaju tradicionalne porodične strukture ili progresivne ideale
  - Da li strukture upravljanja daju prioritet nacionalnom suverenitetu ili međunarodnoj saradnji
explanation: |
  Tekst eksplicitno navodi da stvarna politička podela nije između levice, desnice ili centra, već se zasniva na fundamentalnim filozofskim principima: sloboda naspram prinude, dobrovoljni pristanak naspram ograničenja, i individualna odgovornost naspram kolektivnosti. Ključno pitanje postaje da li želite sami donositi važne odluke o svom životu, ili želite da ih neko drugi donosi umesto vas. Ovo predstavlja odstupanje od tradicionalnih političkih kategorizacija zasnovanih na ekonomskoj redistribuciji, društvenim vrednostima ili strukturama upravljanja, fokusirajući se umesto toga na fundamentalno pitanje ko ima autoritet da donosi odluke koje utiču na živote pojedinaca.
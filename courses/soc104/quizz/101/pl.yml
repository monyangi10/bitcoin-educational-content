question: Jakie jest podstawowe kryterium rozróżniania ideologii politycznych według filozofii libertariańskiej?
answer: Czy jednostki podejmują własne decyzje, czy też są one im narzucane przez innych?
wrong_answers:
  - Czy polityka gospodarcza sprzyja redystrybucji czy akumulacji bogactwa?
  - Niezależnie od tego, czy wartości społeczne kładą nacisk na tradycyjne struktury rodzinne, czy na postępowe ideały
  - Czy struktury zarządzania stawiają na pierwszym miejscu suwerenność krajową czy współpracę międzynarodową?
explanation: |
  Tekst wyraźnie stwierdza, że prawdziwy podział polityczny nie przebiega między lewicą, prawicą czy centrum, ale raczej opiera się na podstawowych zasadach filozoficznych: wolność kontra przymus, dobrowolna zgoda kontra przymus i indywidualna odpowiedzialność kontra kolektywność.
  Kluczowym pytaniem staje się to, czy chcesz samodzielnie podejmować ważne decyzje dotyczące swojego życia, czy też chcesz, aby ktoś inny podejmował je za ciebie. Stanowi to odejście od tradycyjnych kategoryzacji politycznych opartych na redystrybucji ekonomicznej, wartościach społecznych lub strukturach zarządzania, skupiając się zamiast tego na fundamentalnym pytaniu, kto ma uprawnienia do podejmowania decyzji wpływających na życie jednostek.
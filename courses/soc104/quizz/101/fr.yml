question: According to libertarian philosophy, what is the fundamental criterion for distinguishing political ideologies?
answer: Whether individuals make their own decisions or have decisions imposed on them by others
wrong_answers:
  - Whether economic policies favor redistribution or accumulation of wealth
  - Whether social values emphasize traditional family structures or progressive ideals
  - Whether governance structures prioritize national sovereignty or international cooperation
explanation: |
  The text explicitly states that the real political divide is not between left, right, or center, but rather based on fundamental philosophical principles: freedom versus coercion, voluntary consent versus constraint, and individual responsibility versus collectivity. The key question becomes whether you want to make important decisions about your life yourself, or whether you want someone else to make them for you. This represents a departure from traditional political categorizations based on economic redistribution, social values, or governance structures, focusing instead on the fundamental question of who has the authority to make decisions affecting individuals' lives.

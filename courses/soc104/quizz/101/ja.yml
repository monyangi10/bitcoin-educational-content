question: リバタリアン哲学によれば、政治イデオロギーを区別する基本的な基準は何か？
answer: 個人が自分で決断するか、他者から押し付けられるか
wrong_answers:
  - 経済政策が富の再分配と蓄積のどちらに有利か
  - 社会的価値観が伝統的な家族構造を重視するか、進歩的な理想を重視するか
  - 国家主権を優先する統治構造か、国際協調を優先する統治構造か
explanation: |
  この文章は、真の政治的分裂は左翼、右翼、中道ではなく、基本的な哲学的原則に基づくものだと明言している。
  重要なのは、自分の人生に関する重要な決断を自分で下したいのか、それとも誰かにしてもらいたいのか、ということである。これは、経済的再分配、社会的価値観、統治構造に基づく従来の政治的分類からの脱却を意味し、その代わりに、個人の生活に影響を与える決定を下す権限を誰が持っているかという根本的な問題に焦点を当てている。
question: Kulingana na falsafa ya uhuru, ni kigezo kipi cha msingi cha kutofautisha itikadi za kisiasa?
answer: Ikiwa watu binafsi hufanya maamuzi yao wenyewe au wamelazimishwa na wengine kufanya maamuzi juu yao
wrong_answers:
  - Kama sera za kiuchumi zinapendelea ugawaji upya au mkusanyiko wa utajiri
  - Kama maadili ya kijamii yanasisitiza miundo ya familia ya kitamaduni au maadili ya kimaendeleo
  - Ikiwa miundo ya utawala inapa kipaumbele uhuru wa kitaifa au ushirikiano wa kimataifa
explanation: |
  Maandishi yanasema wazi kwamba mgawanyiko halisi wa kisiasa si kati ya kushoto, kulia, au katikati, bali unategemea kanuni za msingi za kifalsafa: uhuru dhidi ya kulazimishwa, ridhaa ya hiari dhidi ya vikwazo, na uwajibikaji wa mtu binafsi dhidi ya umoja.
  
  Swali muhimu linakuwa kama unataka kufanya maamuzi muhimu kuhusu maisha yako mwenyewe, au kama unataka mtu mwingine ayafanye kwa ajili yako. Hii inawakilisha kuondoka kutoka kwa uainishaji wa kisiasa wa kitamaduni kulingana na ugawaji upya wa kiuchumi, maadili ya kijamii, au miundo ya utawala, badala yake ikizingatia swali la msingi la nani ana mamlaka ya kufanya maamuzi yanayoathiri maisha ya watu binafsi.

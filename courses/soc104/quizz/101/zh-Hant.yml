question: 根據自由主義哲學，區分政治意識形態的基本標準是什麼？
answer: 個人是自己做決定，還是他人強加給他們的決定
wrong_answers:
  - 經濟政策是傾向於財富再分配還是財富累積
  - 社會價值觀是否強調傳統家庭結構或進步理想
  - 治理結構是以國家主權為優先，還是以國際合作為優先
explanation: |
  文中明確指出，真正的政治分歧不在於左派、右派或中間派，而是基於基本的哲學原則：自由與強迫、自願同意與約束、個人責任與集體性。
  問題的關鍵在於，您是想自己為生活做重要的決定，還是希望別人替您做決定。這代表著與傳統政治分類的不同，傳統政治分類是以經濟再分配、社會價值觀或治理結構為基礎，轉而將重點放在誰有權做出影響個人生活的決定這個基本問題上。
question: Zgodnie z analizą Hayeka, jakie fundamentalne podejście odróżnia ideologię socjalistyczną od liberalnej filozofii gospodarczej?
answer: Konstruktywizm - przekonanie, że państwo powinno aktywnie konstruować i kształtować społeczeństwo zgodnie z racjonalnym planowaniem
wrong_answers:
  - Spontaniczny porządek - przekonanie, że społeczeństwo powinno rozwijać się naturalnie poprzez indywidualne interakcje rynkowe
  - Kolektywizm - przekonanie, że wszelka własność prywatna powinna zostać natychmiast zniesiona za pomocą środków rewolucyjnych
  - Redystrybucjonizm - przekonanie, że bogactwo powinno być przekazywane wyłącznie za pośrednictwem dobrowolnych organizacji charytatywnych
explanation: |
  Hayek zidentyfikował konstruktywizm jako podstawową zasadę socjalistyczną, w której państwo aktywnie projektuje i konstruuje społeczeństwo poprzez planowanie i interwencję,
  w przeciwieństwie do liberalnej koncepcji spontanicznego porządku, gdzie społeczeństwo rozwija się naturalnie poprzez indywidualne działania. To konstruktywistyczne podejście odzwierciedla socjalistyczną wiarę w opartą na rozumowaniu inżynierię społeczną i kierowanie ludzką działalnością przez państwo, w przeciwieństwie do pozwalania siłom rynkowym i indywidualnym wyborom na organiczne kształtowanie wyników społecznych.
question: Según el análisis de Hayek, ¿qué planteamiento fundamental distingue la ideología socialista de la filosofía económica liberal?
answer: "Constructivismo: la creencia de que el Estado debe construir y moldear activamente la sociedad de acuerdo con una planificación racional"
wrong_answers:
  - "Orden espontáneo: la creencia de que la sociedad debe desarrollarse de forma natural a través de las interacciones individuales del mercado"
  - "Colectivismo: la creencia de que toda propiedad privada debe ser abolida inmediatamente por medios revolucionarios"
  - "Redistribucionismo: la creencia de que la riqueza sólo debe transferirse a través de organizaciones benéficas voluntarias"
explanation: |
  Hayek identificó el constructivismo como el principio socialista básico, en el que el Estado diseña y construye activamente la sociedad mediante la planificación y la intervención,
  que contrasta con el concepto liberal de orden espontáneo en el que la sociedad se desarrolla de forma natural a través de las acciones individuales. Este enfoque constructivista refleja la fe socialista en la ingeniería social basada en la razón y en la dirección estatal de la actividad humana, en contraposición a permitir que las fuerzas del mercado y las elecciones individuales configuren los resultados sociales de forma orgánica.
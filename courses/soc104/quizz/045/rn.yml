question: Dukurikije icegeranyo ca Hayek, ni ubuhe buryo bw’ishimikiro butandukanya ingengabitekerezo y’abasosiyalisiti n’ubuhinga bw’ubutunzi bw’ubwigenge?
answer: Constructivism - ukwemera ko Leta ikwiye kwubaka no guhingura ikibano hakurikijwe igenamigambi ry'ubwenge .
wrong_answers:
  - Urutonde rwihuta - ukwemera ko igihugu gikwiye gutera imbere mu buryo busanzwe biciye mu gukorana n'isoko ry'umuntu ku giti ciwe
  - Ugukorana n'abandi - ukwemera ko umutungo wose w'abantu ukwiye gukurwaho ubwo nyene biciye mu buryo bw'ihinduka .
  - Ugusubira gusangira - ukwemera ko ubutunzi bukwiye guhererezwa gusa biciye mu mashirahamwe y'abagiraneza y'ubushake .
explanation: |
  Hayek yerekanye ko ubuhinga bwo kwubaka ari yo ngingo ngenderwako nyamukuru y’ubumwe bw’abanyagihugu, aho Leta itegura kandi yubaka ikibano biciye mu gutegura no gufasha, 
  bitandukanye n’iciyumviro c’ubwigenge c’urutonde rwihuta aho ikibano gitera imbere mu buryo busanzwe biciye mu bikorwa vy’umuntu ku giti ciwe. Ubwo buryo bw’ubwubatsi bugaragaza ukwizera kw’abanyagihugu mu bijanye n’ubuhinga bw’imibano bushingiye ku mvo n’uburongozi bwa Leta bw’ibikorwa vya muntu, bitandukanye n’ukwemera ko inguvu z’isoko n’amahitamwo y’umuntu ku giti ciwe bihindura ingaruka z’imibano mu buryo bubereye.
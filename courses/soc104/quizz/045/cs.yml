question: Jaký základní přístup podle Hayekovy analýzy odlišuje socialistickou ideologii od liberální ekonomické filozofie?
answer: Konstruktivismus - přesvědčení, že stát by měl aktivně budovat a utvářet společnost podle racionálního plánování
wrong_answers:
  - Spontánní řád - přesvědčení, že společnost by se měla přirozeně vyvíjet prostřednictvím individuálních tržních interakcí
  - Kolektivismus - přesvědčení, že veškeré soukromé vlastnictví by mělo být okamžitě zrušeno revolučními prostředky
  - Redistribucionismus - přesvědčení, že bohatství by mělo být předáváno pouze prostřednictvím dobrovolných charitativních organizací
explanation: |
  Hayek označil konstruktivismus za základní socialistický princip, v němž stát aktivně navrhuje a konstruuje společnost prostřednictvím plánování a zásahů,
  v protikladu k liberálnímu pojetí spontánního řádu, kde se společnost vyvíjí přirozeně prostřednictvím individuálního jednání. Tento konstruktivistický přístup odráží socialistickou víru v sociální inženýrství založené na rozumu a ve státní řízení lidské činnosti, na rozdíl od toho, aby tržní síly a individuální volby organicky utvářely společenské výsledky.
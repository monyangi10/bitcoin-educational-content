question: Menurut analisis Hayek, pendekatan fundamental apa yang membedakan ideologi sosialis dengan filosofi ekonomi liberal?
answer: Konstruktivisme - keyakinan bahwa negara harus secara aktif membangun dan membentuk masyarakat sesuai dengan perencanaan yang rasional
wrong_answers:
  - Tatanan spontan - keyakinan bahwa masyarakat harus berkembang secara alami melalui interaksi pasar individu
  - Kolektivisme - keyakinan bahwa semua kepemilikan pribadi harus segera dihapuskan melalui cara-cara revolusioner
  - Redistribusiisme - keyakinan bahwa kekayaan harus ditransfer hanya melalui organisasi amal sukarela
explanation: |
  Hayek mengidentifikasi konstruktivisme sebagai prinsip inti sosialis, di mana negara secara aktif merancang dan membangun masyarakat melalui perencanaan dan intervensi,
  berbeda dengan konsep liberal tentang tatanan spontan di mana masyarakat berkembang secara alami melalui tindakan individu. Pendekatan konstruktivis ini mencerminkan keyakinan sosialis dalam rekayasa sosial berbasis akal dan arahan negara terhadap aktivitas manusia, yang bertentangan dengan membiarkan kekuatan pasar dan pilihan individu membentuk hasil masyarakat secara organik.
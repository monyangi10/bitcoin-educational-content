question: Prema Hajekovoj analizi, koja osnovna pristupna razlika razlikuje socijalističku ideologiju od liberalne ekonomske filozofije?
answer: Konstruktivizam - uverenje da država treba aktivno da konstruiše i oblikuje društvo prema racionalnom planiranju
wrong_answers:
  - Spontani red - verovanje da društvo treba da se razvija prirodno kroz individualne tržišne interakcije
  - Kolektivizam - verovanje da sva privatna svojina treba biti odmah ukinuta revolucionarnim sredstvima
  - Redistribucionizam - verovanje da bogatstvo treba da se prenosi isključivo putem dobrovoljnih dobrotvornih organizacija
explanation: |
  Hayek je identifikovao konstruktivizam kao osnovni socijalistički princip, gde država aktivno dizajnira i konstruira društvo kroz planiranje i intervenciju, 
  suprotstavljajući se liberalnom konceptu spontanog poretka gde se društvo razvija prirodno kroz individualne akcije. Ovaj konstruktivistički pristup odražava socijalističku veru u društveni inženjering zasnovan na razumu i državnom usmeravanju ljudske aktivnosti, za razliku od dopuštanja tržišnim silama i individualnim izborima da organski oblikuju društvene ishode.
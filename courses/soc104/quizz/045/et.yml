question: Milline põhimõtteline lähenemine eristab Hayeki analüüsi kohaselt sotsialistlikku ideoloogiat liberaalsest majandusfilosoofiast?
answer: Konstruktivism - uskumus, et riik peaks aktiivselt ehitama ja kujundama ühiskonda ratsionaalse planeerimise järgi
wrong_answers:
  - Spontaanne kord - uskumus, et ühiskond peaks arenema loomulikul teel individuaalsete turusuhete kaudu
  - Kollektivism - veendumus, et kogu eraomand tuleks kohe revolutsiooniliste vahenditega kaotada
  - Ümberjaotussüsteem - uskumus, et rikkust tuleks edasi anda ainult vabatahtlike heategevusorganisatsioonide kaudu
explanation: |
  Hayek määratles konstruktivismi kui sotsialismi põhiprintsiibi, kus riik kavandab ja konstrueerib aktiivselt ühiskonda planeerimise ja sekkumise kaudu,
  vastandades seda liberaalsele spontaanse korra kontseptsioonile, kus ühiskond areneb loomulikult üksikisiku tegevuse kaudu. See konstruktivistlik lähenemine peegeldab sotsialistide usku mõistuspõhisesse sotsiaalsesse insenerlusse ja inimtegevuse riiklikusse juhtimisse, vastupidiselt sellele, et turujõud ja individuaalsed valikud kujundavad ühiskondlikke tulemusi orgaaniliselt.
question: Согласно анализу Хайека, какой фундаментальный подход отличает социалистическую идеологию от либеральной экономической философии?
answer: Конструктивизм - убеждение в том, что государство должно активно конструировать и формировать общество в соответствии с рациональным планированием
wrong_answers:
  - Спонтанный порядок - вера в то, что общество должно развиваться естественным образом благодаря индивидуальным рыночным взаимодействиям
  - Коллективизм - вера в то, что вся частная собственность должна быть немедленно упразднена революционным путем
  - Редистрибуционизм - убеждение, что богатство должно передаваться только через добровольные благотворительные организации
explanation: |
  Хайек определил конструктивизм как основной принцип социализма, при котором государство активно проектирует и конструирует общество посредством планирования и вмешательства,
  в отличие от либеральной концепции спонтанного порядка, когда общество развивается естественным образом благодаря индивидуальным действиям. Этот конструктивистский подход отражает веру социалистов в основанную на разуме социальную инженерию и государственное управление человеческой деятельностью, в отличие от предоставления рыночным силам и индивидуальному выбору органично формировать общественные результаты.
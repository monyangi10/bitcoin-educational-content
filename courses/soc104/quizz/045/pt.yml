question: De acordo com a análise de Hayek, que abordagem fundamental distingue a ideologia socialista da filosofia económica liberal?
answer: Construtivismo - a crença de que o Estado deve construir e moldar ativamente a sociedade de acordo com um planeamento racional
wrong_answers:
  - Ordem espontânea - a crença de que a sociedade deve desenvolver-se naturalmente através das interações individuais no mercado
  - Coletivismo - a crença de que toda a propriedade privada deve ser imediatamente abolida através de meios revolucionários
  - Redistributivismo - a crença de que a riqueza deve ser transferida apenas através de organizações de caridade voluntárias
explanation: |
  Hayek identificou o construtivismo como o princípio socialista central, em que o Estado projecta e constrói ativamente a sociedade através do planeamento e da intervenção,
  contrastando com o conceito liberal de ordem espontânea, em que a sociedade se desenvolve naturalmente através das acções individuais. Esta abordagem construtivista reflecte a fé socialista na engenharia social baseada na razão e na direção estatal da atividade humana, por oposição a permitir que as forças de mercado e as escolhas individuais moldem organicamente os resultados sociais.
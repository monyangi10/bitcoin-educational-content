question: हेयक के विश्लेषण के अनुसार, कौन सा मौलिक दृष्टिकोण समाजवादी विचारधारा को उदार आर्थिक दर्शन से अलग करता है?
answer: रचनावाद - यह विश्वास कि राज्य को तर्कसंगत योजना के अनुसार समाज का सक्रिय रूप से निर्माण और आकार देना चाहिए।
wrong_answers:
  - सहज व्यवस्था - यह विश्वास कि समाज को व्यक्तिगत बाजार अंतःक्रियाओं के माध्यम से स्वाभाविक रूप से विकसित होना चाहिए।
  - सामूहिकतावाद - यह विश्वास कि क्रांतिकारी तरीकों से सभी निजी संपत्ति को तत्काल समाप्त कर देना चाहिए।
  - पुनर्वितरणवाद - यह मान्यता कि धन का हस्तांतरण केवल स्वैच्छिक धर्मार्थ संगठनों के माध्यम से ही होना चाहिए।
explanation: |
  हेयक ने रचनावाद को मूल समाजवादी सिद्धांत के रूप में पहचाना, जहाँ राज्य योजना और हस्तक्षेप के माध्यम से समाज को सक्रिय रूप से आकार देता है और उसका निर्माण करता है,
  जो उदारवादी अवधारणा के विपरीत है, जिसमें समाज व्यक्तिगत कार्यों के माध्यम से स्वाभाविक रूप से विकसित होता है। यह रचनावादी दृष्टिकोण तर्क-आधारित सामाजिक निर्माण और मानवीय गतिविधियों के राज्य-निर्देशन में समाजवादी विश्वास को दर्शाता है, न कि बाज़ार शक्तियों और व्यक्तिगत विकल्पों को सामाजिक परिणामों को स्वाभाविक रूप से आकार देने की अनुमति देने के।
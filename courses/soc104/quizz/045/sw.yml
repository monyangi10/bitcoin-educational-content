question: Kulingana na uchambuzi wa Hayek, ni mbinu gani ya msingi inayotofautisha itikadi ya ujamaa na falsafa ya kiuchumi huria?
answer: Ujenzi - imani kwamba serikali inapaswa kujenga na kuunda jamii kikamilifu kulingana na mipango ya busara
wrong_answers:
  - Utaratibu wa hiari - imani kwamba jamii inapaswa kukua kiasili kupitia mwingiliano wa soko la mtu binafsi
  - Ushirika - imani kwamba mali yote ya kibinafsi inapaswa kukomeshwa mara moja kupitia njia za mapinduzi
  - Ugawaji Upya - imani kwamba utajiri unapaswa kuhamishwa kupitia mashirika ya hisani ya hiari pekee
explanation: |
  Hayek alitambua ujenzi kama kanuni kuu ya ujamaa, ambapo serikali huunda na kujenga jamii kikamilifu kupitia mipango na uingiliaji kati, kinyume na dhana huria ya mpangilio wa hiari ambapo jamii hukua kiasili kupitia vitendo vya mtu binafsi. Mbinu hii ya ujenzi inaonyesha imani ya ujamaa katika uhandisi wa kijamii unaotegemea sababu na mwelekeo wa shughuli za binadamu, kinyume na kuruhusu nguvu za soko na chaguo za mtu binafsi kuunda matokeo ya kijamii kikaboni.
question: Според анализа на Хайек кой основен подход отличава социалистическата идеология от либералната икономическа философия?
answer: Конструктивизъм - убеждението, че държавата трябва активно да изгражда и оформя обществото в съответствие с рационалното планиране
wrong_answers:
  - Спонтанен ред - убеждението, че обществото трябва да се развива по естествен начин чрез индивидуалните пазарни взаимодействия
  - Колективизъм - убеждението, че всяка частна собственост трябва да бъде незабавно премахната с революционни средства
  - Редистрибуционизъм - убеждението, че богатството трябва да се прехвърля само чрез доброволни благотворителни организации
explanation: |
  Хайек определя конструктивизма като основен социалистически принцип, при който държавата активно проектира и конструира обществото чрез планиране и намеса,
  в контраст с либералната концепция за спонтанния ред, където обществото се развива естествено чрез индивидуалните действия. Този конструктивистки подход отразява социалистическата вяра в основаното на разума социално инженерство и държавното ръководство на човешката дейност, за разлика от оставянето на пазарните сили и индивидуалния избор да оформят обществените резултати по органичен начин.
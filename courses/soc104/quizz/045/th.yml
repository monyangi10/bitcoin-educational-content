question: ตามการวิเคราะห์ของเฮเยค แนวทางพื้นฐานใดที่แยกความแตกต่างระหว่างอุดมการณ์สังคมนิยมกับปรัชญาเศรษฐกิจเสรีนิยม?
answer: คอนสตรัคติวิซึม - ความเชื่อที่ว่ารัฐควรสร้างและกำหนดรูปแบบสังคมอย่างแข็งขันตามการวางแผนอย่างมีเหตุผล
wrong_answers:
  - ระเบียบที่เกิดขึ้นเอง - ความเชื่อที่ว่าสังคมควรพัฒนาอย่างเป็นธรรมชาติผ่านการมีปฏิสัมพันธ์ทางการตลาดของแต่ละบุคคล
  - ลัทธิรวมหมู่ - ความเชื่อที่ว่าทรัพย์สินส่วนตัวทั้งหมดควรถูกยกเลิกทันทีผ่านวิธีการปฏิวัติ
  - Redistributionism - ความเชื่อที่ว่าความมั่งคั่งควรถูกถ่ายโอนผ่านองค์กรการกุศลที่สมัครใจเท่านั้น
explanation: |
  ฮาเย็คระบุว่าคอนสตรัคติวิสม์เป็นหลักการสังคมนิยมหลัก ซึ่งรัฐออกแบบและสร้างสังคมอย่างแข็งขันผ่านการวางแผนและการแทรกแซง ซึ่งตรงข้ามกับแนวคิดเสรีนิยมของระเบียบที่เกิดขึ้นเองตามธรรมชาติที่สังคมพัฒนาขึ้นตามธรรมชาติผ่านการกระทำของแต่ละบุคคล วิธีการคอนสตรัคติวิสต์นี้สะท้อนถึงความเชื่อมั่นของสังคมนิยมในวิศวกรรมสังคมที่อิงเหตุผลและการกำกับดูแลกิจกรรมของมนุษย์โดยรัฐ แทนที่จะปล่อยให้แรงตลาดและการเลือกของแต่ละบุคคลกำหนดผลลัพธ์ของสังคมอย่างเป็นธรรมชาติ
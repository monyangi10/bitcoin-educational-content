question: بر اساس تحلیل هایک، چه رویکرد بنیادی‌ای ایدئولوژی سوسیالیستی را از فلسفه اقتصادی لیبرال متمایز می‌کند؟
answer: ساخت‌گرایی - اعتقاد به اینکه دولت باید به طور فعال جامعه را بر اساس برنامه‌ریزی عقلانی بسازد و شکل دهد
wrong_answers:
  - نظم خودجوش - اعتقاد به اینکه جامعه باید به طور طبیعی از طریق تعاملات فردی بازار توسعه یابد
  - جمع‌گرایی - اعتقاد به اینکه تمام مالکیت خصوصی باید از طریق روش‌های انقلابی فوراً لغو شود
  - توزیع‌گرایی - اعتقاد به اینکه ثروت باید تنها از طریق سازمان‌های خیریه داوطلبانه منتقل شود
explanation: |
  هایک ساخت‌گرایی را به‌عنوان اصل اصلی سوسیالیستی شناسایی کرد، جایی که دولت به‌طور فعال جامعه را از طریق برنامه‌ریزی و مداخله طراحی و می‌سازد، در تضاد با مفهوم لیبرالی نظم خودجوش که در آن جامعه به‌طور طبیعی از طریق اقدامات فردی توسعه می‌یابد. این رویکرد ساخت‌گرایانه ایمان سوسیالیستی به مهندسی اجتماعی مبتنی بر عقل و هدایت دولتی فعالیت‌های انسانی را منعکس می‌کند، در مقابل اجازه دادن به نیروهای بازار و انتخاب‌های فردی برای شکل دادن به نتایج اجتماعی به‌طور ارگانیک.
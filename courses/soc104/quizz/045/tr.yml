question: Hayek'in analizine göre, sosyalist ideolojiyi liberal ekonomi felsefesinden ayıran temel yaklaşım hangisidir?
answer: Konstrüktivizm - devletin toplumu rasyonel planlamaya göre aktif olarak inşa etmesi ve şekillendirmesi gerektiği inancı
wrong_answers:
  - Spontane düzen - toplumun bireysel piyasa etkileşimleri yoluyla doğal olarak gelişmesi gerektiği inancı
  - Kolektivizm - tüm özel mülkiyetin devrimci yollarla derhal ortadan kaldırılması gerektiği inancı
  - Yeniden dağıtımcılık - servetin yalnızca gönüllü hayır kurumları aracılığıyla aktarılması gerektiği inancı
explanation: |
  Hayek yapısalcılığı, devletin planlama ve müdahale yoluyla toplumu aktif olarak tasarladığı ve inşa ettiği temel sosyalist ilke olarak tanımlamıştır,
  toplumun bireysel eylemler yoluyla doğal olarak geliştiği liberal kendiliğinden düzen kavramıyla tezat oluşturmaktadır. Bu yapısalcı yaklaşım, piyasa güçlerinin ve bireysel tercihlerin toplumsal sonuçları organik olarak şekillendirmesine izin vermek yerine, akla dayalı toplum mühendisliğine ve insan faaliyetlerinin devlet tarafından yönlendirilmesine yönelik sosyalist inancı yansıtmaktadır.
question: Theo phân tích của Hayek, phương pháp cơ bản nào phân biệt hệ tư tưởng xã hội chủ nghĩa với triết học kinh tế tự do?
answer: Chủ nghĩa kiến tạo - niềm tin rằng nhà nước nên chủ động xây dựng và định hình xã hội theo kế hoạch hợp lý.
wrong_answers:
  - Trật tự tự phát - niềm tin rằng xã hội nên phát triển một cách tự nhiên thông qua các tương tác thị trường cá nhân.
  - Chủ nghĩa tập thể - niềm tin rằng tất cả tài sản tư nhân nên bị xóa bỏ ngay lập tức thông qua các biện pháp cách mạng.
  - Chủ nghĩa phân phối lại - niềm tin rằng của cải chỉ nên được chuyển giao thông qua các tổ chức từ thiện tự nguyện.
explanation: |
  Hayek xác định chủ nghĩa kiến tạo là nguyên tắc cốt lõi của chủ nghĩa xã hội, trong đó nhà nước chủ động thiết kế và xây dựng xã hội thông qua quy hoạch và can thiệp, trái ngược với quan niệm tự do về trật tự tự phát, nơi xã hội phát triển một cách tự nhiên thông qua hành động của các cá nhân. Cách tiếp cận theo chủ nghĩa kiến tạo này phản ánh niềm tin của chủ nghĩa xã hội vào kỹ thuật xã hội dựa trên lý trí và sự chỉ đạo của nhà nước đối với hoạt động của con người, thay vì cho phép các lực lượng thị trường và sự lựa chọn của cá nhân định hình kết quả xã hội một cách hữu cơ.
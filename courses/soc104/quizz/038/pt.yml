question: De acordo com a perspetiva de Milton Friedman, qual é o principal problema de julgar as políticas sociais com base nos seus objectivos declarados e não nos seus resultados reais?
answer: As políticas bem intencionadas criam frequentemente efeitos perversos, como a dependência económica e as distorções do mercado, que contradizem os seus objectivos originais
wrong_answers:
  - Os políticos deturpam deliberadamente as suas verdadeiras intenções para obterem o apoio do público para políticas que sabem que vão falhar
  - As boas intenções conduzem automaticamente a resultados positivos, mas a medição dos resultados é demasiado difícil e morosa para os decisores políticos
  - As definições estruturais são inerentemente tendenciosas para pontos de vista conservadores, enquanto as definições intencionais promovem valores progressistas
explanation: |
  Friedman argumenta que as políticas motivadas por intenções generosas podem ter consequências negativas não intencionais quando não se baseiam numa análise rigorosa do comportamento e dos incentivos humanos
  comportamento humano e dos incentivos. O texto menciona especificamente a forma como as políticas sociais destinadas a ajudar os pobres criam frequentemente dependência económica e distorções do mercado. As outras opções deturpam o argumento de Friedman - ele não afirma que os políticos são deliberadamente enganadores, nem que as boas intenções funcionam automaticamente, nem que se trata de preconceitos políticos.
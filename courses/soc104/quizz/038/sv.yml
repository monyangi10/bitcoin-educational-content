question: Enligt Milton Friedmans perspektiv, vad är det främsta problemet med att bedöma socialpolitik utifrån dess uttalade mål snarare än dess faktiska resultat?
answer: Välmenande politik skapar ofta perversa effekter som ekonomiskt beroende och marknadsstörningar som strider mot de ursprungliga målen
wrong_answers:
  - Politiker ger medvetet en felaktig bild av sina verkliga avsikter för att få allmänhetens stöd för en politik som de vet kommer att misslyckas
  - Goda avsikter leder automatiskt till positiva resultat, men att mäta resultat är för svårt och tidskrävande för beslutsfattare
  - Strukturella definitioner är av naturen partiska mot konservativa åsikter medan avsiktliga definitioner främjar progressiva värderingar
explanation: |
  Friedman menar att politik som motiveras av generösa avsikter kan få oavsiktliga negativa konsekvenser när den inte baseras på en noggrann analys av mänskligt beteende och
  beteende och incitament. I texten nämns särskilt hur socialpolitik som syftar till att hjälpa de fattiga ofta skapar ekonomiskt beroende och snedvridningar på marknaden. De andra alternativen ger en felaktig bild av Friedmans argument - han hävdar inte att politiker är medvetet vilseledande, inte heller att goda avsikter automatiskt fungerar eller att det handlar om politisk partiskhet.
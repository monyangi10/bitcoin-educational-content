question: Prema perspektivi Miltona Friedmana, glavni problem sa ocenjivanjem socijalnih politika na osnovu njihovih deklarisanih ciljeva, umesto stvarnih ishoda, jeste taj što se time može prevideti stvarna efikasnost i posledice tih politika. Fokusiranje samo na ciljeve može dovesti do zanemarivanja stvarnih rezultata i potencijalnih negativnih efekata koje politika može imati, bez obzira na to koliko su njeni ciljevi plemeniti.
answer: Dobronamerne politike često stvaraju perverzne efekte poput ekonomske zavisnosti i tržišnih distorzija koje su u suprotnosti sa njihovim originalnim ciljevima.
wrong_answers:
  - Političari namerno pogrešno predstavljaju svoje prave namere kako bi pridobili podršku javnosti za politike za koje znaju da će propasti.
  - Dobre namere automatski vode do pozitivnih rezultata, ali merenje ishoda je previše teško i oduzima mnogo vremena za donosioce politika.
  - Strukturne definicije su inherentno pristrasne prema konzervativnim gledištima, dok namerne definicije promovišu progresivne vrednosti.
explanation: |
  Friedman tvrdi da politike motivisane velikodušnim namerama mogu imati nenamerne negativne posledice kada nisu zasnovane na rigoroznoj analizi ljudskog ponašanja i podsticaja. Tekst posebno pominje kako socijalne politike usmerene na pomoć siromašnima često stvaraju ekonomsku zavisnost i tržišne distorzije. Druge opcije pogrešno predstavljaju Friedmanov argument - on ne tvrdi da su političari namerno obmanjujući, niti da dobre namere automatski funkcionišu, niti da se radi o političkoj pristrasnosti.
question: 밀턴 프리드먼의 관점에 따르면, 사회 정책을 실제 결과가 아닌 명시된 목표에 따라 판단할 때 가장 큰 문제점은 무엇일까요?
answer: 선의의 정책은 종종 원래의 목표와 모순되는 경제적 의존성 및 시장 왜곡과 같은 왜곡된 효과를 초래합니다
wrong_answers:
  - 정치인들이 실패할 것을 알고 있는 정책에 대한 대중의 지지를 얻기 위해 고의적으로 진의를 왜곡하는 경우
  - 좋은 의도는 자동적으로 긍정적인 결과로 이어지지만, 정책 입안자에게 결과를 측정하는 것은 너무 어렵고 시간이 많이 소요됩니다
  - 구조적 정의는 본질적으로 보수적 관점에 편향된 반면, 의도적 정의는 진보적 가치를 장려합니다
explanation: |
  프리드먼은 인간의 행동과 인센티브에 대한 엄격한 분석에 기반하지 않을 경우 선의의 의도로 만들어진 정책이 의도치 않은 부정적인 결과를 초래할 수 있다고 주장합니다
  행동과 인센티브. 이 글에서는 특히 가난한 사람들을 돕기 위한 사회 정책이 경제적 의존과 시장 왜곡을 초래하는 경우가 많다고 언급합니다. 다른 옵션은 프리드먼의 주장을 잘못 표현하고 있습니다. 그는 정치인들이 고의적으로 기만적이라고 주장하지 않으며, 선한 의도가 자동으로 작동한다고 주장하지도 않으며, 정치적 편견에 관한 것이라고 주장하지도 않습니다.
question: С точки зрения Милтона Фридмана, в чем заключается основная проблема оценки социальной политики по ее заявленным целям, а не по ее реальным результатам?
answer: Благие намерения часто приводят к обратным последствиям, таким как экономическая зависимость и рыночные перекосы, что противоречит их первоначальным целям
wrong_answers:
  - Политики намеренно искажают свои истинные намерения, чтобы заручиться поддержкой общественности для проведения политики, которая, как они знают, провалится
  - Благие намерения автоматически приводят к положительным результатам, но измерение результатов является слишком сложной и трудоемкой задачей для политиков
  - Структурные определения по своей природе предвзято относятся к консервативным взглядам, в то время как намеренные определения способствуют продвижению прогрессивных ценностей
explanation: |
  Фридман утверждает, что политика, продиктованная благими намерениями, может иметь непредвиденные негативные последствия, если она не основана на тщательном анализе человеческого поведения и стимулов
  поведения и стимулов. В тексте конкретно упоминается, как социальная политика, направленная на помощь бедным, часто порождает экономическую зависимость и рыночные искажения. Другие варианты искажают аргументацию Фридмана - он не утверждает, что политики намеренно обманывают, что благие намерения автоматически срабатывают, и что дело в политической предвзятости.
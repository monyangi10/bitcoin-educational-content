question: Según la perspectiva de Milton Friedman, ¿cuál es el principal problema de juzgar las políticas sociales en función de sus objetivos declarados y no de sus resultados reales?
answer: Las políticas bienintencionadas suelen crear efectos perversos como la dependencia económica y distorsiones del mercado que contradicen sus objetivos originales
wrong_answers:
  - Los políticos tergiversan deliberadamente sus verdaderas intenciones para conseguir el apoyo de la opinión pública a políticas que saben que fracasarán
  - Las buenas intenciones conducen automáticamente a resultados positivos, pero medir los resultados es demasiado difícil y lleva demasiado tiempo a los responsables políticos
  - Las definiciones estructurales están intrínsecamente sesgadas hacia puntos de vista conservadores, mientras que las definiciones intencionales promueven valores progresistas
explanation: |
  Friedman argumenta que las políticas motivadas por intenciones generosas pueden tener consecuencias negativas no deseadas cuando no se basan en un análisis riguroso del comportamiento humano
  comportamiento humano y los incentivos. El texto menciona específicamente cómo las políticas sociales destinadas a ayudar a los pobres a menudo crean dependencia económica y distorsiones del mercado. Las otras opciones tergiversan el argumento de Friedman: no afirma que los políticos sean deliberadamente engañosos, ni que las buenas intenciones funcionen automáticamente, ni que se trate de un sesgo político.
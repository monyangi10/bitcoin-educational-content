question: Menurut perspektif Milton Friedman, apa masalah utama dalam menilai kebijakan sosial berdasarkan tujuan yang dinyatakan dan bukan hasil aktualnya?
answer: Kebijakan yang bermaksud baik sering kali menimbulkan dampak buruk seperti ketergantungan ekonomi dan distorsi pasar yang bertentangan dengan tujuan awal mereka
wrong_answers:
  - Politisi dengan sengaja salah mengartikan niat mereka yang sebenarnya untuk mendapatkan dukungan publik atas kebijakan yang mereka tahu akan gagal
  - Niat baik secara otomatis mengarah pada hasil yang positif, tetapi mengukur hasil terlalu sulit dan memakan waktu bagi para pembuat kebijakan
  - Definisi struktural secara inheren bias terhadap sudut pandang konservatif, sementara definisi yang disengaja mempromosikan nilai-nilai progresif
explanation: |
  Friedman berpendapat bahwa kebijakan yang dimotivasi oleh niat baik dapat menimbulkan konsekuensi negatif yang tidak diharapkan jika tidak didasarkan pada analisis yang cermat terhadap perilaku dan insentif manusia
  perilaku dan insentif manusia. Tulisan ini secara khusus menyebutkan bagaimana kebijakan sosial yang ditujukan untuk membantu masyarakat miskin sering kali menciptakan ketergantungan ekonomi dan distorsi pasar. Pilihan-pilihan lain salah mengartikan argumen Friedman - ia tidak menyatakan bahwa para politisi secara sengaja menipu, atau bahwa niat baik secara otomatis akan berhasil, atau bahwa ini adalah tentang bias politik.
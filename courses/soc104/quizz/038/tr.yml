question: Milton Friedman'ın bakış açısına göre, sosyal politikaları gerçek sonuçlarından ziyade belirtilen hedeflerine göre değerlendirmenin temel sorunu nedir?
answer: İyi niyetli politikalar genellikle ekonomik bağımlılık ve piyasa çarpıklıkları gibi asıl hedefleriyle çelişen ters etkiler yaratır
wrong_answers:
  - Politikacılar, başarısız olacağını bildikleri politikalara kamuoyu desteği sağlamak için gerçek niyetlerini kasıtlı olarak yanlış beyan ederler
  - İyi niyetler otomatik olarak olumlu sonuçlar doğurur, ancak sonuçları ölçmek politika yapıcılar için çok zor ve zaman alıcıdır
  - Yapısal tanımlar doğası gereği muhafazakar bakış açılarına karşı önyargılıyken, kasıtlı tanımlar ilerici değerleri teşvik eder
explanation: |
  Friedman, cömert niyetlerle motive edilen politikaların, insani değerlerin titiz bir analizine dayanmadığında istenmeyen olumsuz sonuçlar doğurabileceğini savunmaktadır
  davranış ve teşvikler. Metin özellikle yoksullara yardım etmeyi amaçlayan sosyal politikaların nasıl ekonomik bağımlılık ve piyasa çarpıklıkları yarattığından bahsetmektedir. Diğer seçenekler Friedman'ın argümanını yanlış yansıtmaktadır - Friedman politikacıların kasıtlı olarak aldatıcı olduğunu, iyi niyetin otomatik olarak işe yaradığını ya da bunun siyasi önyargılarla ilgili olduğunu iddia etmemektedir.
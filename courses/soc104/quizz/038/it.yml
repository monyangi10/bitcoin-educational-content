question: Secondo la prospettiva di Milton Friedman, qual è il problema principale nel giudicare le politiche sociali in base ai loro obiettivi dichiarati piuttosto che ai loro risultati effettivi?
answer: Le politiche ben intenzionate spesso creano effetti perversi, come la dipendenza economica e le distorsioni del mercato, che contraddicono i loro obiettivi originari
wrong_answers:
  - I politici travisano deliberatamente le loro vere intenzioni per ottenere il sostegno dell'opinione pubblica a politiche che sanno essere destinate al fallimento
  - Le buone intenzioni portano automaticamente a risultati positivi, ma misurare i risultati è troppo difficile e richiede molto tempo per i responsabili politici
  - Le definizioni strutturali sono intrinsecamente orientate verso punti di vista conservatori, mentre le definizioni intenzionali promuovono valori progressisti
explanation: |
  Friedman sostiene che le politiche motivate da intenzioni generose possono avere conseguenze negative indesiderate quando non si basano su un'analisi rigorosa del comportamento umano e degli incentivi
  comportamento umano e degli incentivi. Il testo menziona specificamente come le politiche sociali volte ad aiutare i poveri spesso creino dipendenza economica e distorsioni del mercato. Le altre opzioni travisano l'argomentazione di Friedman: egli non sostiene che i politici siano deliberatamente ingannevoli, né che le buone intenzioni funzionino automaticamente, né che si tratti di pregiudizi politici.
question: Mikä on Milton Friedmanin näkökulman mukaan ensisijainen ongelma siinä, että sosiaalipolitiikkaa arvioidaan sen julkilausuttujen tavoitteiden eikä sen todellisten tulosten perusteella?
answer: Hyvää tarkoittavat politiikat aiheuttavat usein kieroutuneita vaikutuksia, kuten taloudellista riippuvuutta ja markkinoiden vääristymiä, jotka ovat ristiriidassa niiden alkuperäisten tavoitteiden kanssa
wrong_answers:
  - Poliitikot vääristelevät tarkoituksellisesti todellisia aikomuksiaan saadakseen yleisön tuen politiikalle, jonka he tietävät epäonnistuvan
  - Hyvät aikomukset johtavat automaattisesti myönteisiin tuloksiin, mutta tulosten mittaaminen on poliittisille päättäjille liian vaikeaa ja aikaa vievää
  - Rakenteelliset määritelmät ovat luonnostaan puolueellisia konservatiivisten näkemysten suuntaan, kun taas tarkoitukselliset määritelmät edistävät edistyksellisiä arvoja
explanation: |
  Friedman väittää, että anteliaiden aikomusten motivoimalla politiikalla voi olla tahattomia kielteisiä seurauksia, jos se ei perustu tiukkaan analyysiin inhimillisestä ja sosiaalisesta kehityksestä
  käyttäytymistä ja kannustimia. Tekstissä mainitaan erityisesti, miten köyhien auttamiseen tähtäävä sosiaalipolitiikka luo usein taloudellista riippuvuutta ja markkinavääristymiä. Muut vaihtoehdot vääristelevät Friedmanin väitettä - hän ei väitä, että poliitikot ovat tarkoituksellisesti harhaanjohtavia, että hyvät aikomukset toimivat automaattisesti tai että kyse olisi poliittisesta puolueellisuudesta.
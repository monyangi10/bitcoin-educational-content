question: Dukurikije ukuntu Milton Friedman abona ibintu, ni ikihe kibazo nyamukuru co gucira urubanza ingingo ngenderwako z’imibano zishingiye ku ntumbero zazo zavuzwe aho gushingira ku ngaruka zazo nyazo?
answer: Amategeko afise intumbero nziza akenshi atera ingaruka mbi nk’ukwihebera ubutunzi n’uguhindura isoko bivuguruza intumbero zayo z’intango .
wrong_answers:
  - Abanyapolitike baravuga nabi n’ibigirankana imigambi yabo nyakuri kugira ngo abantu bose bashigikire politike bazi ko izonanirwa .
  - Intumbero nziza zica zituma umuntu agira ingaruka nziza, ariko gupima ingaruka biragoye cane kandi bitwara umwanya ku bashinga amategeko .
  - Insobanuro z'imibumbe zishingiye ku vyiyumviro vy'abanyagihugu mu gihe insobanuro z'intumbero zitera imbere agaciro k'iterambere .
explanation: |
  Friedman avuga ko amategeko ashingiye ku migambi y’ubugwaneza ashobora kugira ingaruka mbi zitategekanijwe iyo zidashingiye ku gusuzuma bimwe bikomeye ivy’abantu .
  inyifato n’ivyo bitera intege. Ico canditswe kivuga canecane ingene politike z’imibano zigamije gufasha abakene akenshi zituma abantu bavyifatamwo neza mu vy’ubutunzi n’uguhindura amasoko. Ayandi mahitamwo araserukira nabi ivyiyumviro vya Friedman - ntavuga ko abanyapolitike bahenda n’ibigirankana, canke ko imigambi myiza ihita ikora, canke ko ivyo ari ivy’ugushigikira politike.
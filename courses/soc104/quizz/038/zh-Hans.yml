question: 根据米尔顿-弗里德曼的观点，根据既定目标而非实际结果来判断社会政策的主要问题是什么？
answer: 用心良苦的政策往往会造成经济依赖性和市场扭曲等反常效应，与其最初的目标背道而驰
wrong_answers:
  - 政客故意歪曲自己的真实意图，为明知会失败的政策争取公众支持
  - 良好的意愿会自动带来积极的结果，但对决策者而言，衡量结果过于困难且费时费力
  - 结构性定义本质上偏向保守观点，而意向性定义则倡导进步价值观
explanation: |
  弗里德曼认为，如果不是基于对人类行为和动机的严谨分析，出于慷慨意图的政策可能会产生意想不到的负面影响。
  行为和激励机制。文中特别提到，旨在帮助穷人的社会政策往往会造成经济依赖和市场扭曲。其他选项歪曲了弗里德曼的论点--他并没有声称政客们故意欺骗，也没有说好意会自动起作用，更没有说这与政治偏见有关。
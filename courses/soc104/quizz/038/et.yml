question: Milline on Milton Friedmani vaatenurga kohaselt peamine probleem, kui sotsiaalpoliitikat hinnatakse pigem selle väljendatud eesmärkide kui tegelike tulemuste põhjal?
answer: Heade kavatsustega poliitika tekitab sageli perversseid mõjusid, nagu majanduslik sõltuvus ja turumoonutused, mis on vastuolus selle algsete eesmärkidega
wrong_answers:
  - Poliitikud esitavad oma tegelikke kavatsusi teadlikult valesti, et saada avalikkuse toetust poliitikale, mida nad teavad, et see ebaõnnestub
  - Head kavatsused viivad automaatselt positiivsete tulemusteni, kuid tulemuste mõõtmine on poliitikakujundajate jaoks liiga keeruline ja aeganõudev
  - Struktuursed määratlused on loomupäraselt kallutatud konservatiivsete seisukohtade poole, samas kui tahtlikud määratlused edendavad progressiivseid väärtusi
explanation: |
  Friedman väidab, et heldetest kavatsustest ajendatud poliitika võib omada tahtmatuid negatiivseid tagajärgi, kui see ei põhine range analüüsi põhjal, mis käsitleb inimeste
  käitumist ja stiimuleid. Tekstis mainitakse konkreetselt, kuidas vaeste aitamisele suunatud sotsiaalpoliitika tekitab sageli majanduslikku sõltuvust ja turumoonutusi. Teistes valikutes on Friedmani argument valesti esitatud - ta ei väida, et poliitikud on tahtlikult petlikud, ega seda, et head kavatsused automaatselt toimivad, ega seda, et tegu on poliitilise erapoolikusega.
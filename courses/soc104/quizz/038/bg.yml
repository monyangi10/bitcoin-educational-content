question: Според Милтън Фридман какъв е основният проблем при оценяването на социалните политики въз основа на заявените им цели, а не на действителните резултати?
answer: Политиките с добри намерения често водят до обратни ефекти като икономическа зависимост и пазарни изкривявания, които противоречат на първоначалните им цели
wrong_answers:
  - Политиците умишлено представят в невярна светлина истинските си намерения, за да получат обществена подкрепа за политики, за които знаят, че ще се провалят
  - Добрите намерения автоматично водят до положителни резултати, но измерването на резултатите е твърде трудно и отнема много време за създателите на политики
  - Структурните дефиниции по своята същност са пристрастни към консервативните възгледи, докато преднамерените дефиниции насърчават прогресивните ценности
explanation: |
  Фридман твърди, че политиките, мотивирани от благородни намерения, могат да имат непредвидени отрицателни последици, когато не се основават на строг анализ на човешките
  поведение и стимули. В текста се споменава конкретно как социалните политики, насочени към подпомагане на бедните, често създават икономическа зависимост и пазарни изкривявания. Другите варианти представят погрешно аргумента на Фридман - той не твърди, че политиците умишлено мамят, нито че добрите намерения автоматично дават резултат, нито че става въпрос за политически пристрастия.
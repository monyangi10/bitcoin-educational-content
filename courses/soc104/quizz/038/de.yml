question: Was ist nach Milton Friedman das Hauptproblem bei der Beurteilung von Sozialpolitik auf der Grundlage ihrer erklärten Ziele und nicht ihrer tatsächlichen Ergebnisse?
answer: Gut gemeinte politische Maßnahmen führen oft zu perversen Effekten wie wirtschaftlicher Abhängigkeit und Marktverzerrungen, die ihren ursprünglichen Zielen widersprechen
wrong_answers:
  - Politiker stellen ihre wahren Absichten absichtlich falsch dar, um öffentliche Unterstützung für Maßnahmen zu gewinnen, von denen sie wissen, dass sie scheitern werden
  - Gute Absichten führen automatisch zu positiven Ergebnissen, aber die Messung der Ergebnisse ist für die politischen Entscheidungsträger zu schwierig und zeitaufwändig
  - Strukturelle Definitionen sind von Natur aus konservativen Standpunkten zugeneigt, während intentionale Definitionen progressive Werte fördern
explanation: |
  Friedman argumentiert, dass politische Maßnahmen, die durch großzügige Absichten motiviert sind, unbeabsichtigte negative Folgen haben können, wenn sie nicht auf einer strengen Analyse des menschlichen Verhaltens und der Anreize basieren
  verhaltens und der Anreize beruht. Im Text wird ausdrücklich erwähnt, dass sozialpolitische Maßnahmen, die den Armen helfen sollen, oft zu wirtschaftlicher Abhängigkeit und Marktverzerrungen führen. Die anderen Optionen stellen Friedmans Argument falsch dar - er behauptet weder, dass Politiker absichtlich betrügen, noch dass gute Absichten automatisch funktionieren, noch dass es um politische Voreingenommenheit geht.
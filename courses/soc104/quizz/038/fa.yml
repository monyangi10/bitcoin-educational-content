question: بر اساس دیدگاه میلتون فریدمن، مشکل اصلی قضاوت درباره سیاست‌های اجتماعی بر اساس اهداف اعلام‌شده آن‌ها به جای نتایج واقعی‌شان چیست؟
answer: سیاست‌های با نیت خوب اغلب اثرات معکوسی مانند وابستگی اقتصادی و تحریفات بازار ایجاد می‌کنند که با اهداف اصلی آن‌ها در تضاد است.
wrong_answers:
  - سیاستمداران عمداً نیات واقعی خود را نادرست جلوه می‌دهند تا حمایت عمومی را برای سیاست‌هایی که می‌دانند شکست خواهند خورد، به دست آورند.
  - نیت‌های خوب به‌طور خودکار به نتایج مثبت منجر می‌شوند، اما اندازه‌گیری نتایج برای سیاست‌گذاران بسیار دشوار و زمان‌بر است.
  - تعاریف ساختاری ذاتاً به دیدگاه‌های محافظه‌کارانه تمایل دارند، در حالی که تعاریف عمدی ارزش‌های پیشرو را ترویج می‌کنند.
explanation: |
  فریدمن استدلال می‌کند که سیاست‌هایی که با نیت‌های سخاوتمندانه انگیزه می‌گیرند، می‌توانند پیامدهای منفی ناخواسته‌ای داشته باشند وقتی که بر اساس تحلیل دقیق رفتار انسانی و انگیزه‌ها نباشند. متن به طور خاص اشاره می‌کند که چگونه سیاست‌های اجتماعی که با هدف کمک به فقرا طراحی شده‌اند، اغلب وابستگی اقتصادی و تحریفات بازار ایجاد می‌کنند. گزینه‌های دیگر استدلال فریدمن را نادرست نشان می‌دهند - او ادعا نمی‌کند که سیاستمداران عمداً فریبکار هستند، یا اینکه نیت‌های خوب به طور خودکار کار می‌کنند، یا اینکه این موضوع به تعصب سیاسی مربوط است.
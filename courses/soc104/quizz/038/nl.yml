question: Wat is volgens Milton Friedman het grootste probleem bij het beoordelen van sociaal beleid op basis van hun verklaarde doelen in plaats van hun feitelijke resultaten?
answer: Goedbedoeld beleid creëert vaak perverse effecten zoals economische afhankelijkheid en marktverstoringen die in tegenspraak zijn met de oorspronkelijke doelstellingen
wrong_answers:
  - Politici geven opzettelijk een verkeerd beeld van hun ware bedoelingen om publieke steun te krijgen voor beleid waarvan ze weten dat het zal mislukken
  - Goede bedoelingen leiden automatisch tot positieve resultaten, maar het meten van resultaten is te moeilijk en tijdrovend voor beleidsmakers
  - Structurele definities zijn inherent vooringenomen in de richting van conservatieve standpunten, terwijl intentionele definities progressieve waarden bevorderen
explanation: |
  Friedman stelt dat beleid dat wordt ingegeven door genereuze bedoelingen onbedoelde negatieve gevolgen kan hebben als het niet is gebaseerd op een grondige analyse van menselijk
  gedrag en prikkels. De tekst vermeldt specifiek hoe sociaal beleid gericht op het helpen van de armen vaak leidt tot economische afhankelijkheid en marktverstoringen. De andere opties geven het argument van Friedman verkeerd weer - hij beweert niet dat politici opzettelijk misleidend zijn, noch dat goede bedoelingen automatisch werken, noch dat het om politieke vooringenomenheid gaat.
question: Kulingana na mtazamo wa Milton Friedman, tatizo kuu la kuhukumu sera za kijamii kulingana na malengo yao yaliyotajwa badala ya matokeo yao halisi ni lipi?
answer: Sera zenye nia njema mara nyingi husababisha athari potofu kama vile utegemezi wa kiuchumi na upotoshaji wa soko unaopingana na malengo yao ya awali.
wrong_answers:
  - Wanasiasa huwakilisha vibaya makusudi nia zao za kweli ili kupata uungwaji mkono wa umma kwa sera wanazojua zitashindwa
  - Nia njema husababisha matokeo chanya kiotomatiki, lakini kupima matokeo ni vigumu sana na huchukua muda mrefu kwa watunga sera.
  - Fasili za kimuundo kwa asili huegemea mitazamo ya kihafidhina huku fasili za kimakusudi zikikuza maadili endelevu
explanation: |
  Friedman anasema kwamba sera zinazochochewa na nia njema zinaweza kuwa na matokeo mabaya yasiyotarajiwa zisipotegemea uchambuzi mkali wa tabia na motisha za binadamu. Maandishi hayo yanataja haswa jinsi sera za kijamii zinazolenga kuwasaidia maskini mara nyingi huleta utegemezi wa kiuchumi na upotoshaji wa soko. Chaguzi zingine zinapotosha hoja ya Friedman - hadai wanasiasa wanadanganya kimakusudi, wala kwamba nia njema hufanya kazi kiotomatiki, wala kwamba hii inahusu upendeleo wa kisiasa.
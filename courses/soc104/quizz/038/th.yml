question: ตามมุมมองของมิลตัน ฟรีดแมน ปัญหาหลักของการตัดสินนโยบายสังคมโดยอิงจากเป้าหมายที่ระบุไว้แทนที่จะเป็นผลลัพธ์ที่แท้จริงคืออะไร?
answer: นโยบายที่มีเจตนาดีมักสร้างผลกระทบที่ไม่พึงประสงค์ เช่น การพึ่งพาทางเศรษฐกิจและการบิดเบือนตลาด ซึ่งขัดแย้งกับวัตถุประสงค์เดิมของพวกเขา
wrong_answers:
  - นักการเมืองบิดเบือนเจตนาที่แท้จริงของตนเพื่อให้ได้รับการสนับสนุนจากสาธารณชนสำหรับนโยบายที่พวกเขารู้ว่าจะล้มเหลว
  - ความตั้งใจดีนำไปสู่ผลลัพธ์ที่ดีโดยอัตโนมัติ แต่การวัดผลลัพธ์นั้นยากเกินไปและใช้เวลานานสำหรับผู้กำหนดนโยบาย
  - คำจำกัดความเชิงโครงสร้างมีแนวโน้มที่จะเอนเอียงไปทางมุมมองแบบอนุรักษ์นิยม ในขณะที่คำจำกัดความเชิงเจตนาส่งเสริมค่านิยมแบบก้าวหน้า
explanation: |
  ฟรีดแมนโต้แย้งว่านโยบายที่มีแรงจูงใจจากเจตนาที่ดีสามารถมีผลกระทบเชิงลบที่ไม่คาดคิดเมื่อไม่ได้อิงจากการวิเคราะห์พฤติกรรมมนุษย์และแรงจูงใจอย่างเข้มงวด ข้อความนี้กล่าวถึงโดยเฉพาะว่านโยบายสังคมที่มุ่งช่วยเหลือคนยากจนมักสร้างการพึ่งพาทางเศรษฐกิจและการบิดเบือนตลาด ตัวเลือกอื่น ๆ นำเสนอข้อโต้แย้งของฟรีดแมนผิด - เขาไม่ได้อ้างว่านักการเมืองจงใจหลอกลวง หรือว่าเจตนาดีจะได้ผลโดยอัตโนมัติ หรือว่านี่เกี่ยวกับอคติทางการเมือง
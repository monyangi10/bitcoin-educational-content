question: 根據米爾頓佛利民 (Milton Friedman) 的觀點，根據社會政策的既定目標而非實際結果來判斷社會政策，主要的問題在哪裡？
answer: 用意良好的政策往往會造成反效果，例如經濟依賴性和市場扭曲，這些都與政策原本的目標相違背
wrong_answers:
  - 政客故意歪曲他們的真實意圖，以爭取公眾對他們明知會失敗的政策的支持
  - 良好的意願會自動帶來正面的結果，但對決策者而言，衡量成果太困難且耗費時間
  - 結構性定義本質上偏向保守的觀點，而意向性定義則提倡進步的價值觀。
explanation: |
  Friedman 認為，如果不是基於對人類行為和激勵因素的嚴謹分析，由慷慨意願激發的政策可能會產生意想不到的負面後果。
  行為和誘因。文中特別提到旨在幫助窮人的社會政策如何經常造成經濟依賴和市場扭曲。其他選項歪曲了 Friedman 的論點 - 他沒有宣稱政治人物故意欺騙，也沒有說善意會自動奏效，更沒有說這是政治偏見的問題。
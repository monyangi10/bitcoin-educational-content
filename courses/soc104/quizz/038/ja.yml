question: ミルトン・フリードマンの視点によれば、社会政策をその実際の結果ではなく、表明された目標に基づいて判断することの主な問題点は何か？
answer: 良かれと思った政策が、経済依存や市場の歪みといった、本来の目的に反する逆効果を生むことはよくある。
wrong_answers:
  - 政治家は、失敗するとわかっている政策で国民の支持を得るために、意図的に本心を偽っている。
  - 善意は自動的に好結果につながるが、政策立案者にとって成果を測定することはあまりにも困難で時間がかかる。
  - 構造的な定義は本質的に保守的な視点に偏っているが、意図的な定義は進歩的な価値観を促進する。
explanation: |
  フリードマンは、寛大な意図に突き動かされた政策が、人間の行動やインセンティブに関する厳密な分析に基づかない場合には、意図しない否定的な結果をもたらす可能性があると主張している。
  と論じている。本文では特に、貧困層救済を目的とした社会政策が、しばしば経済的依存や市場の歪みを生み出すことに言及している。他の選択肢は、フリードマンの主張を誤って伝えている。彼は、政治家が故意に欺瞞的であると主張しているわけでも、善意が自動的に機能すると主張しているわけでも、政治的バイアスについて述べているわけでもない。
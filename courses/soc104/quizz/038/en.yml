question: According to Milton Friedman's perspective, what is the primary problem with judging social policies based on their stated goals rather than their actual outcomes?
answer: Well-intentioned policies often create perverse effects like economic dependency and market distortions that contradict their original objectives
wrong_answers:
  - Politicians deliberately misrepresent their true intentions to gain public support for policies they know will fail
  - Good intentions automatically lead to positive results, but measuring outcomes is too difficult and time-consuming for policymakers
  - Structural definitions are inherently biased toward conservative viewpoints while intentional definitions promote progressive values
explanation: |
  Friedman argues that policies motivated by generous intentions can have unintended negative consequences when not based on rigorous analysis of human behavior and incentives. The text specifically mentions how social policies aimed at helping the poor often create economic dependency and market distortions. The other options misrepresent Friedman's argument - he doesn't claim politicians are deliberately deceptive, nor that good intentions automatically work, nor that this is about political bias.
question: मिल्टन फ्रीडमैन के दृष्टिकोण के अनुसार, सामाजिक नीतियों का मूल्यांकन उनके वास्तविक परिणामों के बजाय उनके घोषित लक्ष्यों के आधार पर करने में मुख्य समस्या क्या है?
answer: अच्छी मंशा से बनाई गई नीतियां अक्सर आर्थिक निर्भरता और बाजार विकृतियों जैसे विपरीत प्रभाव पैदा करती हैं जो उनके मूल उद्देश्यों के विपरीत होते हैं।
wrong_answers:
  - राजनेता जानबूझकर अपने असली इरादों को गलत तरीके से पेश करते हैं ताकि वे उन नीतियों के लिए जनता का समर्थन हासिल कर सकें जिनके बारे में वे जानते हैं कि वे विफल होंगी।
  - अच्छे इरादों से स्वतः ही सकारात्मक परिणाम मिलते हैं, लेकिन परिणामों का आकलन करना नीति निर्माताओं के लिए बहुत कठिन और समय लेने वाला होता है।
  - संरचनात्मक परिभाषाएँ स्वाभाविक रूप से रूढ़िवादी दृष्टिकोणों की ओर झुकी होती हैं, जबकि उद्देश्यपूर्ण परिभाषाएँ प्रगतिशील मूल्यों को बढ़ावा देती हैं।
explanation: |
  फ्रीडमैन का तर्क है कि उदार इरादों से प्रेरित नीतियां, जब मानव व्यवहार और प्रेरणाओं के गहन विश्लेषण पर आधारित नहीं होतीं, तो अनजाने में नकारात्मक परिणाम दे सकती हैं।
  इस लेख में विशेष रूप से उल्लेख किया गया है कि गरीबों की मदद के उद्देश्य से बनाई गई सामाजिक नीतियां अक्सर आर्थिक निर्भरता और बाजार विकृतियां पैदा करती हैं। अन्य विकल्प फ्रीडमैन के तर्क को गलत तरीके से प्रस्तुत करते हैं - उनका दावा यह नहीं है कि राजनेता जानबूझकर धोखेबाज होते हैं, न ही यह कि अच्छे इरादे स्वतः सफल होते हैं, और न ही यह कि यह राजनीतिक पूर्वाग्रह से संबंधित है।
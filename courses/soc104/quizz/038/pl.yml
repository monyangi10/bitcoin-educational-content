question: Zgodnie z perspektywą Miltona Friedmana, jaki jest główny problem z ocenianiem polityki społecznej na podstawie jej deklarowanych celów, a nie rzeczywistych rezultatów?
answer: Polityka, której przyświecają dobre intencje, często wywołuje niepożądane skutki, takie jak zależność ekonomiczna i zakłócenia rynkowe, które są sprzeczne z jej pierwotnymi celami
wrong_answers:
  - Politycy celowo fałszywie przedstawiają swoje prawdziwe intencje, aby zyskać poparcie opinii publicznej dla polityki, o której wiedzą, że zawiedzie
  - Dobre intencje automatycznie prowadzą do pozytywnych rezultatów, ale mierzenie wyników jest zbyt trudne i czasochłonne dla decydentów
  - Definicje strukturalne są z natury stronnicze w kierunku konserwatywnych punktów widzenia, podczas gdy definicje celowe promują postępowe wartości
explanation: |
  Friedman argumentuje, że polityka motywowana hojnymi intencjami może mieć niezamierzone negatywne konsekwencje, jeśli nie jest oparta na rygorystycznej analizie ludzkich zachowań
  zachowań i zachęt. Tekst wyraźnie wspomina o tym, jak polityka społeczna mająca na celu pomoc ubogim często tworzy zależność gospodarczą i zniekształca rynek. Pozostałe opcje błędnie przedstawiają argumentację Friedmana - nie twierdzi on, że politycy są celowo oszukańczy, ani że dobre intencje automatycznie działają, ani że chodzi o stronniczość polityczną.
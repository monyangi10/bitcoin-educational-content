question: Theo quan điểm của Milton Friedman, vấn đề chính khi đánh giá các chính sách xã hội dựa trên mục tiêu đã nêu thay vì kết quả thực tế của chúng là gì?
answer: Những chính sách có thiện chí thường tạo ra những tác động ngược chiều như sự phụ thuộc kinh tế và sự bóp méo thị trường, trái ngược với mục tiêu ban đầu.
wrong_answers:
  - Các chính trị gia cố tình xuyên tạc ý định thực sự của mình để giành được sự ủng hộ của công chúng cho những chính sách mà họ biết chắc sẽ thất bại.
  - Ý định tốt đương nhiên dẫn đến kết quả tích cực, nhưng việc đo lường kết quả lại quá khó khăn và tốn thời gian đối với các nhà hoạch định chính sách.
  - Các định nghĩa mang tính cấu trúc vốn dĩ thiên về quan điểm bảo thủ, trong khi các định nghĩa mang tính chủ đích thúc đẩy các giá trị tiến bộ.
explanation: |
  Friedman lập luận rằng các chính sách xuất phát từ ý định tốt đẹp có thể dẫn đến những hậu quả tiêu cực không lường trước được nếu không dựa trên phân tích nghiêm túc về hành vi và động cơ của con người. Văn bản này đặc biệt đề cập đến việc các chính sách xã hội nhằm giúp đỡ người nghèo thường tạo ra sự phụ thuộc kinh tế và sự méo mó thị trường. Các lựa chọn khác đã xuyên tạc lập luận của Friedman - ông không cho rằng các chính trị gia cố tình lừa dối, cũng không cho rằng ý định tốt đẹp tự động có hiệu quả, và cũng không cho rằng đây là vấn đề thiên vị chính trị.
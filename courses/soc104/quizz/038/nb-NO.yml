question: Hva er, ifølge Milton Friedman, det største problemet med å bedømme sosialpolitikken ut fra dens uttalte mål snarere enn dens faktiske resultater?
answer: Velmenende politikk skaper ofte perverse effekter som økonomisk avhengighet og markedsvridninger som er i strid med de opprinnelige målene
wrong_answers:
  - Politikere gir bevisst feilaktige opplysninger om sine egentlige intensjoner for å få støtte i befolkningen for en politikk de vet vil mislykkes
  - Gode intensjoner fører automatisk til positive resultater, men det er for vanskelig og tidkrevende for beslutningstakere å måle resultatene
  - Strukturelle definisjoner er iboende partisk mot konservative synspunkter, mens intensjonelle definisjoner fremmer progressive verdier
explanation: |
  Friedman argumenterer for at politikk som er motivert av sjenerøse intensjoner, kan få utilsiktede negative konsekvenser når den ikke er basert på en grundig analyse av menneskelig atferd og
  menneskelig atferd og insentiver. Teksten nevner spesifikt hvordan sosialpolitikk som tar sikte på å hjelpe de fattige, ofte skaper økonomisk avhengighet og markedsvridninger. De andre alternativene gir en feilaktig fremstilling av Friedmans argumentasjon - han hevder ikke at politikere er bevisst villedende, eller at gode intensjoner automatisk virker, eller at dette handler om politisk partiskhet.
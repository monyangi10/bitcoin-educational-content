question: Каква е основната разлика между десните и левите етатисти според диамантения модел?
answer: И двете се стремят да използват държавната власт, но за различни ценности и цели
wrong_answers:
  - Десните етатисти се противопоставят на всякаква правителствена намеса, докато левите я подкрепят
  - Левите етатисти подкрепят икономическата свобода, докато десните се противопоставят напълно на нея
  - Десните етатисти искат минимално правителство, а левите - максимален контрол
explanation: |
  В главата се обяснява, че както десните, така и левите етатисти имат една и съща политическа цел: завладяване на властта за организиране на обществото според
  своя мироглед и да го наложат на всички. Това е самото определение на етатизма - използване на законодателството за контрол и формиране на обществото. Разликата не е в методите им (и двете използват държавна власт), а в ценностите им: десните етатисти дават приоритет на традиционния морал и цивилизацията, докато левите етатисти се фокусират върху социалната справедливост и преразпределението. Диамантеният модел отразява тази сложност, като показва, че истинското различие е в степента на държавния контрол, а не просто в противопоставянето на философиите.
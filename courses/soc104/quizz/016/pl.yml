question: Jaka jest główna różnica między prawicowymi i lewicowymi etatystami według modelu diamentowego?
answer: Oba dążą do wykorzystania władzy państwowej, ale dla różnych wartości i celów
wrong_answers:
  - Prawicowi etatyści sprzeciwiają się wszelkim interwencjom rządowym, podczas gdy lewica je popiera
  - Lewicowi etatyści popierają wolność gospodarczą, podczas gdy prawica całkowicie się jej sprzeciwia
  - Prawicowi etatyści chcą minimalnego rządu, podczas gdy lewica chce maksymalnej kontroli
explanation: |
  Rozdział ten wyjaśnia, że zarówno prawicowi, jak i lewicowi etatyści mają ten sam cel polityczny: zdobycie władzy w celu zorganizowania społeczeństwa zgodnie z ich światopoglądem
  ich światopoglądu i narzucenia go wszystkim. To jest właśnie definicja etatyzmu - wykorzystywanie prawodawstwa do kontrolowania i kształtowania społeczeństwa. Różnica nie leży w ich metodach (obaj używają władzy państwowej), ale w ich wartościach: prawicowi etatyści priorytetowo traktują tradycyjną moralność i cywilizację, podczas gdy lewicowi etatyści koncentrują się na sprawiedliwości społecznej i redystrybucji. Model diamentowy oddaje tę złożoność, pokazując, że prawdziwym rozróżnieniem jest stopień kontroli rządowej, a nie po prostu przeciwstawne filozofie.
question: According to the diamond model, what is the main difference between right-wing and left-wing statists?
answer: They both seek to use state power but for different values and objectives
wrong_answers:
  - Right-wing statists oppose all government intervention while left-wing supports it
  - Left-wing statists favor economic freedom while right-wing opposes it completely
  - Right-wing statists want minimal government while left-wing wants maximum control
explanation: |
  The chapter explains that both right-wing and left-wing statists share the same political objective: conquering power to organize society according to their worldview and impose it on everyone. This is the very definition of statism - using legislation to control and shape society. The difference lies not in their methods (both use state power) but in their values: right-wing statists prioritize traditional morality and civilization, while left-wing statists focus on social justice and redistribution. The diamond model captures this complexity by showing that the real distinction is the degree of governmental control, not simply opposing philosophies.

question: Kulingana na mfumo wa almasi, ni tofauti gani kuu kati ya takwimu za mrengo wa kulia na mrengo wa kushoto?
answer: Wote wawili wanatafuta kutumia nguvu za serikali lakini kwa maadili na malengo tofauti
wrong_answers:
  - Wanatakwimu wa mrengo wa kulia wanapinga uingiliaji kati wa serikali huku mrengo wa kushoto ukiunga mkono
  - Wanatakwimu wa mrengo wa kushoto wanapendelea uhuru wa kiuchumi huku wa mrengo wa kulia wakipinga kabisa
  - Wanatakwimu wa mrengo wa kulia wanataka serikali ndogo huku mrengo wa kushoto wakitaka udhibiti wa juu zaidi
explanation: |
  Sura hiyo inaelezea kwamba wanatakwimu wa mrengo wa kulia na mrengo wa kushoto wana lengo moja la kisiasa: kushinda mamlaka ya kupanga jamii kulingana na mtazamo wao wa ulimwengu na kuyalazimisha kwa kila mtu. Huu ndiyo ufafanuzi halisi wa takwimu - kutumia sheria kudhibiti na kuunda jamii. Tofauti haiko katika mbinu zao (zote hutumia nguvu za serikali) bali katika maadili yao: wanatakwimu wa mrengo wa kulia wanapa kipaumbele maadili ya kitamaduni na ustaarabu, huku wanatakwimu wa mrengo wa kushoto wakizingatia haki ya kijamii na ugawaji upya. Mfano wa almasi unakamata ugumu huu kwa kuonyesha kwamba tofauti halisi ni kiwango cha udhibiti wa serikali, si tu falsafa zinazopingana.

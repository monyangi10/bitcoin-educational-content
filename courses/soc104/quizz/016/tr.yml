question: Elmas modeline göre, sağcı ve solcu devletçiler arasındaki temel fark nedir?
answer: Her ikisi de devlet gücünü kullanmaya çalışır, ancak farklı değerler ve amaçlar için
wrong_answers:
  - Sağcı devletçiler her türlü hükümet müdahalesine karşı çıkarken, solcular bunu destekliyor
  - Sol kanat devletçiler ekonomik özgürlüğü desteklerken, sağ kanat buna tamamen karşı çıkıyor
  - Sağcı devletçiler minimal hükümet isterken, solcular maksimum kontrol istiyor
explanation: |
  Bu bölüm, hem sağcı hem de solcu devletçilerin aynı siyasi hedefi paylaştığını açıklamaktadır: toplumu kendi çıkarlarına göre düzenlemek için iktidarı ele geçirmek
  kendi dünya görüşlerini herkese empoze etmektir. Bu devletçiliğin tam tanımıdır - toplumu kontrol etmek ve şekillendirmek için yasaları kullanmak. Aralarındaki fark yöntemlerinde değil (her ikisi de devlet gücünü kullanır), değerlerinde yatar: sağcı devletçiler geleneksel ahlak ve medeniyete öncelik verirken, solcu devletçiler sosyal adalet ve yeniden dağıtıma odaklanır. Elmas modeli, gerçek ayrımın sadece karşıt felsefeler değil, hükümet kontrolünün derecesi olduğunu göstererek bu karmaşıklığı yakalar.
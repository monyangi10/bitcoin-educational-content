question: Dushingiye ku citegererezo c’amadayimoni, ni itandukaniro irihe rikomeye riri hagati y’abahinga mu vy’imibare bo mu buryo n’abo mu bubamfu?
answer: Bompi barondera gukoresha ububasha bwa Leta ariko kubera agaciro n'intumbero bitandukanye .
wrong_answers:
  - Abahinga mu vy’imibare bo mu buryo barwanya ingingo zose za Leta mu gihe abo mu bubamfu babishigikira
  - Abahinga mu vy’imibare bo mu bumotsi bashigikira umwidegemvyo mu vy’ubutunzi mu gihe abo mu buryo bawurwanya rwose
  - Abahinga mu vy'imibare bo mu buryo bashaka ubutegetsi buke cane mu gihe ab'ibubamfu bashaka ubugenzuzi bwinshi
explanation: |
  Ico gice kirasigura ko abahinga mu vy’imibare bo mu buryo n’abo mu bubamfu basangiye intumbero imwe ya politike: kwigarurira ububasha bwo gutunganya ikibano hakurikijwe . 
  ivyiyumviro vyabo vy’isi kandi bakabitegeka umuntu wese. Iyi ni yo nsobanuro nyene ya statism - gukoresha amategeko kugira ngo umuntu agenzure kandi ahindure ikibano. Itandukaniro ntiri mu buryo bakoresha (bompi bakoresha ububasha bwa Leta) ahubwo riri mu mico kama yabo: abahinga mu vy’ubuhinga bw’iburyo bashira imbere inyifato runtu n’ubutekerezi bwa kera, mu gihe abahinga mu vy’ubuhinga bw’ibubamfu bashira imbere ubutungane bw’abantu no gusubira gusangira. Ico kigereranyo c’amadayimoni kirafata ivyo bintu bigoranye mu kwerekana ko itandukaniro nyaryo ari urugero rw’ubugenzuzi bwa Leta, atari gusa kurwanya filozofiya.
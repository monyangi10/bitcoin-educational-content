question: De acordo com o modelo do diamante, qual é a principal diferença entre os estatistas de direita e os estatistas de esquerda?
answer: Ambos procuram utilizar o poder do Estado, mas para valores e objectivos diferentes
wrong_answers:
  - Os estatistas de direita opõem-se a qualquer intervenção governamental, enquanto os de esquerda a apoiam
  - Os estatistas de esquerda são a favor da liberdade económica e os de direita opõem-se-lhe completamente
  - Os estatistas de direita querem um governo mínimo, enquanto os de esquerda querem o máximo controlo
explanation: |
  O capítulo explica que tanto os estatistas de direita como os de esquerda partilham o mesmo objetivo político: conquistar o poder para organizar a sociedade de acordo com a sua visão do mundo e impô-la a todos
  a sua visão do mundo e impô-la a toda a gente. Esta é a própria definição de estatismo - usar a legislação para controlar e moldar a sociedade. A diferença não está nos seus métodos (ambos usam o poder do Estado) mas nos seus valores: os estatistas de direita dão prioridade à moralidade tradicional e à civilização, enquanto os estatistas de esquerda se concentram na justiça social e na redistribuição. O modelo do diamante capta esta complexidade ao mostrar que a verdadeira distinção é o grau de controlo governamental e não apenas as filosofias opostas.
question: بر اساس مدل الماس، تفاوت اصلی بین دولت‌گرایان راست‌گرا و چپ‌گرا چیست؟
answer: آن‌ها هر دو به دنبال استفاده از قدرت دولتی هستند، اما برای ارزش‌ها و اهداف متفاوت.
wrong_answers:
  - راست‌گرایان دولتی با هرگونه مداخله دولتی مخالفند، در حالی که چپ‌گرایان از آن حمایت می‌کنند.
  - چپ‌گرایان دولتی طرفدار آزادی اقتصادی هستند، در حالی که راست‌گرایان کاملاً با آن مخالفند.
  - آمارگرایان راست‌گرا خواهان دولت حداقلی هستند در حالی که چپ‌گراها خواهان کنترل حداکثری هستند
explanation: |
  فصل توضیح می‌دهد که هم دولت‌گرایان راست‌گرا و هم چپ‌گرا هدف سیاسی مشترکی دارند: تسخیر قدرت برای سازماندهی جامعه بر اساس جهان‌بینی خود و تحمیل آن به همه. این تعریف واقعی دولت‌گرایی است - استفاده از قانون‌گذاری برای کنترل و شکل‌دهی جامعه. تفاوت در روش‌های آن‌ها نیست (هر دو از قدرت دولت استفاده می‌کنند) بلکه در ارزش‌هایشان است: دولت‌گرایان راست‌گرا اولویت را به اخلاق سنتی و تمدن می‌دهند، در حالی که دولت‌گرایان چپ‌گرا بر عدالت اجتماعی و توزیع مجدد تمرکز دارند. مدل الماس این پیچیدگی را با نشان دادن اینکه تمایز واقعی در میزان کنترل دولتی است، نه صرفاً فلسفه‌های مخالف، به تصویر می‌کشد.
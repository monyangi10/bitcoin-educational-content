question: 根据钻石模型，右翼和左翼国家主义者的主要区别是什么？
answer: 它们都试图利用国家权力，但价值观和目标不同
wrong_answers:
  - 右翼国家主义者反对一切政府干预，而左翼则支持政府干预
  - 左翼国家主义者支持经济自由，而右翼则完全反对经济自由
  - 右翼国家主义者希望政府最小化，而左翼则希望控制最大化
explanation: |
  本章解释了右翼和左翼国家主义者的共同政治目标：征服权力，按照世界观来组织社会，并将其强加于每个人。
  他们的世界观，并将其强加于每个人。这正是国家主义的定义--利用立法来控制和塑造社会。区别不在于他们的方法（都使用国家权力），而在于他们的价值观：右翼国家主义者优先考虑传统道德和文明，而左翼国家主义者则注重社会正义和再分配。钻石模型捕捉到了这种复杂性，表明真正的区别在于政府控制的程度，而不仅仅是理念的对立。
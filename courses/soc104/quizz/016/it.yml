question: Secondo il modello a diamante, qual è la principale differenza tra statalisti di destra e di sinistra?
answer: Entrambi cercano di usare il potere dello Stato, ma per valori e obiettivi diversi
wrong_answers:
  - Gli statalisti di destra si oppongono a tutti gli interventi governativi, mentre quelli di sinistra li sostengono
  - Gli statalisti di sinistra sono favorevoli alla libertà economica, mentre quelli di destra vi si oppongono completamente
  - Gli statalisti di destra vogliono un governo minimo mentre quelli di sinistra vogliono il massimo controllo
explanation: |
  Il capitolo spiega che gli statalisti di destra e di sinistra condividono lo stesso obiettivo politico: conquistare il potere per organizzare la società secondo la loro visione del mondo e imporla a tutti
  la loro visione del mondo e imporla a tutti. Questa è la definizione stessa di statalismo: usare la legislazione per controllare e plasmare la società. La differenza non sta nei metodi (entrambi usano il potere dello Stato), ma nei valori: gli statalisti di destra danno priorità alla moralità tradizionale e alla civiltà, mentre quelli di sinistra si concentrano sulla giustizia sociale e sulla ridistribuzione. Il modello a diamante cattura questa complessità mostrando che la vera distinzione è il grado di controllo governativo, non semplicemente le filosofie opposte.
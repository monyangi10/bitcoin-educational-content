question: Hva er hovedforskjellen mellom høyreorienterte og venstreorienterte statstilhengere, ifølge diamantmodellen?
answer: Begge søker å bruke statsmakten, men med ulike verdier og mål for øye
wrong_answers:
  - Høyresiden er imot all statlig inngripen, mens venstresiden støtter den
  - Venstreorienterte statstilhengere er for økonomisk frihet, mens høyresiden er helt imot
  - Høyresiden vil ha minimal stat, mens venstresiden vil ha maksimal kontroll
explanation: |
  Kapitlet forklarer at både høyre- og venstresidens statstilhengere deler det samme politiske målet: å erobre makt for å organisere samfunnet i henhold til
  deres verdensbilde og påtvinge det på alle. Dette er selve definisjonen på statisme - å bruke lovgivning for å kontrollere og forme samfunnet. Forskjellen ligger ikke i metodene (begge bruker statsmakt), men i verdiene: høyreorienterte statstilhengere prioriterer tradisjonell moral og sivilisasjon, mens venstreorienterte statstilhengere fokuserer på sosial rettferdighet og omfordeling. Diamantmodellen fanger opp denne kompleksiteten ved å vise at den virkelige forskjellen er graden av statlig kontroll, ikke bare motstridende filosofier.
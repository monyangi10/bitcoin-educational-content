question: 根據鑽石模型，右翼和左翼國家主義者之間的主要差異是什麼？
answer: 兩者都試圖運用國家權力，但為了不同的價值與目標
wrong_answers:
  - 右翼國家主義者反對所有政府干預，而左翼則支持政府干預
  - 左翼國家主義者支持經濟自由，而右翼則完全反對經濟自由。
  - 右翼國家主義者希望政府最小化，而左翼則希望控制最大化
explanation: |
  本章說明，右翼和左翼國家主義者都有相同的政治目標：奪取權力，依照世界觀組織社會，並將之強加於每個人。
  他們的世界觀，並將之強加於每個人。這就是國家主義的定義 - 利用立法來控制和塑造社會。不同之處不在於他們的方法（兩者都使用國家權力），而在於他們的價值觀：右翼國家主義者以傳統道德和文明為優先，而左翼國家主義者則著重於社會正義和再分配。鑽石模型捕捉到這種複雜性，顯示真正的區別在於政府控制的程度，而不只是對立的哲學。
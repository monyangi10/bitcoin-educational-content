question: Mikä on timanttimallin mukaan tärkein ero oikeisto- ja vasemmistovaltion kannattajien välillä?
answer: Molemmat pyrkivät käyttämään valtiovaltaa, mutta eri arvojen ja tavoitteiden saavuttamiseksi
wrong_answers:
  - Oikeistolaiset vastustavat kaikkea valtion väliintuloa, kun taas vasemmisto tukee sitä
  - Vasemmistolaiset valtiomiehet kannattavat taloudellista vapautta, kun taas oikeisto vastustaa sitä täysin
  - Oikeistovaltion kannattajat haluavat mahdollisimman vähän hallintoa, kun taas vasemmisto haluaa mahdollisimman paljon kontrollia
explanation: |
  Luvussa selitetään, että sekä oikeisto- että vasemmistovaltion kannattajilla on sama poliittinen päämäärä: vallan valtaaminen yhteiskunnan järjestämiseksi
  maailmankatsomuksensa mukaisesti ja pakottaa sen kaikille. Tämä on valtiovallan määritelmä - lainsäädännön käyttäminen yhteiskunnan valvomiseen ja muokkaamiseen. Ero ei ole heidän menetelmissään (molemmat käyttävät valtiovaltaa) vaan heidän arvoissaan: oikeistostatistit asettavat etusijalle perinteisen moraalin ja sivistyksen, kun taas vasemmistostatistit keskittyvät sosiaaliseen oikeudenmukaisuuteen ja uudelleenjakoon. Timanttimalli kuvaa tätä monitahoisuutta osoittamalla, että todellinen ero on valtiollisen valvonnan aste, ei pelkästään vastakkaiset filosofiat.
question: ダイヤモンド・モデルによると、右翼と左翼の国家主義者の主な違いは何か？
answer: どちらも国家権力を利用しようとするものだが、価値観や目的は異なる。
wrong_answers:
  - 右翼の国家主義者はすべての政府介入に反対し、左翼はそれを支持する。
  - 左翼の国家主義者は経済的自由を支持し、右翼はそれに完全に反対している。
  - 右翼の国家主義者は最小限の政府を望み、左翼は最大限の支配を望む
explanation: |
  この章では、右翼と左翼の国家主義者が同じ政治目的を共有していることを説明している。
  自分たちの世界観に従って社会を組織し、それをすべての人に押し付けるために権力を征服することである。これはまさに国家主義の定義そのものであり、立法を使って社会をコントロールし、形成することである。右翼の国家主義者は伝統的な道徳と文明を優先し、左翼の国家主義者は社会正義と再分配を重視する。ダイアモンド・モデルは、この複雑さを、単に対立する哲学ではなく、真の違いは政府による統制の度合いであることを示すことで表現している。
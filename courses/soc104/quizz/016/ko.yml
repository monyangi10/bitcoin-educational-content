question: 다이아몬드 모델에 따르면 우익과 좌익 통계학자의 주요 차이점은 무엇인가요?
answer: 둘 다 국가 권력을 사용하려고 하지만 서로 다른 가치와 목적을 추구합니다
wrong_answers:
  - 우파 통계학자들은 모든 정부 개입에 반대하는 반면 좌파는 이를 지지합니다
  - 좌파 통계학자들은 경제적 자유를 선호하는 반면 우파는 이를 완전히 반대합니다
  - 우익 통계학자들은 최소한의 정부를 원하고 좌익은 최대한의 통제를 원합니다
explanation: |
  이 장에서는 우익과 좌익 통계학자들이 모두 동일한 정치적 목표를 공유한다고 설명합니다
  사회를 조직하고 모든 사람에게 강요하는 권력을 장악하는 것입니다. 이것이 바로 법률을 사용하여 사회를 통제하고 형성하는 국가주의의 정의입니다. 우익 통계학자들은 전통적인 도덕과 문명을 우선시하는 반면 좌익 통계학자들은 사회 정의와 재분배에 중점을 두는 등, 둘 다 국가 권력을 사용하는 방식이 아니라 가치관에 차이가 있습니다. 다이아몬드 모델은 이러한 복잡성을 포착하여 실제 구분은 단순히 반대되는 철학이 아니라 정부의 통제 정도라는 것을 보여줍니다.
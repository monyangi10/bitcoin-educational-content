question: Jaký je podle diamantového modelu hlavní rozdíl mezi pravicovými a levicovými etatisty?
answer: Obě se snaží využívat státní moc, ale pro různé hodnoty a cíle
wrong_answers:
  - Pravicoví etatisté jsou proti všem státním zásahům, zatímco levice je podporuje
  - Levicoví etatisté jsou příznivci ekonomické svobody, zatímco pravicoví jsou zcela proti ní
  - Pravicoví etatisté chtějí minimální vládu, zatímco levice chce maximální kontrolu
explanation: |
  Kapitola vysvětluje, že pravicoví i levicoví etatisté mají stejný politický cíl: získat moc a uspořádat společnost podle svých představ
  a vnutit ji všem. To je samotná definice etatismu - používání legislativy k ovládání a utváření společnosti. Rozdíl nespočívá v jejich metodách (oba používají státní moc), ale v jejich hodnotách: pravicoví etatisté dávají přednost tradiční morálce a civilizaci, zatímco levicoví etatisté se zaměřují na sociální spravedlnost a přerozdělování. Diamantový model zachycuje tuto složitost tím, že ukazuje, že skutečným rozdílem je míra vládní kontroly, nikoliv pouze protichůdné filozofie.
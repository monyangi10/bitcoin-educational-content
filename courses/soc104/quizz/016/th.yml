question: ตามโมเดลเพชร ความแตกต่างหลักระหว่างฝ่ายขวาและฝ่ายซ้ายที่สนับสนุนรัฐคืออะไร?
answer: พวกเขาทั้งสองต่างแสวงหาการใช้พลังของรัฐแต่เพื่อค่านิยมและวัตถุประสงค์ที่แตกต่างกัน
wrong_answers:
  - ฝ่ายขวาที่สนับสนุนรัฐต่อต้านการแทรกแซงของรัฐบาลทั้งหมด ในขณะที่ฝ่ายซ้ายสนับสนุนการแทรกแซง
  - ฝ่ายซ้ายที่สนับสนุนรัฐนิยมชื่นชอบเสรีภาพทางเศรษฐกิจ ในขณะที่ฝ่ายขวาคัดค้านอย่างสิ้นเชิง
  - ฝ่ายขวาที่สนับสนุนรัฐต้องการรัฐบาลที่มีขนาดเล็กที่สุด ในขณะที่ฝ่ายซ้ายต้องการการควบคุมสูงสุด
explanation: |
  บทนี้อธิบายว่าทั้งนักรัฐนิยมฝ่ายขวาและฝ่ายซ้ายมีวัตถุประสงค์ทางการเมืองเดียวกัน: การพิชิตอำนาจเพื่อจัดระเบียบสังคมตามมุมมองของตนและบังคับใช้กับทุกคน นี่คือคำจำกัดความของรัฐนิยม - การใช้กฎหมายเพื่อควบคุมและกำหนดรูปแบบสังคม ความแตกต่างไม่ได้อยู่ที่วิธีการ (ทั้งสองใช้พลังของรัฐ) แต่ในค่านิยม: นักรัฐนิยมฝ่ายขวาให้ความสำคัญกับศีลธรรมและอารยธรรมดั้งเดิม ในขณะที่นักรัฐนิยมฝ่ายซ้ายมุ่งเน้นที่ความยุติธรรมทางสังคมและการกระจายทรัพยากรใหม่ โมเดลเพชรแสดงให้เห็นถึงความซับซ้อนนี้โดยแสดงให้เห็นว่าความแตกต่างที่แท้จริงคือระดับของการควบคุมของรัฐบาล ไม่ใช่เพียงแค่ปรัชญาที่ตรงข้ามกัน
question: Theo mô hình kim cương, sự khác biệt chính giữa những người theo chủ nghĩa nhà nước cánh hữu và cánh tả là gì?
answer: Cả hai đều tìm cách sử dụng quyền lực nhà nước nhưng vì những giá trị và mục tiêu khác nhau.
wrong_answers:
  - Những người theo chủ nghĩa nhà nước cánh hữu phản đối mọi sự can thiệp của chính phủ, trong khi những người theo chủ nghĩa nhà nước cánh tả ủng hộ điều đó.
  - Những người theo chủ nghĩa nhà nước cánh tả ủng hộ tự do kinh tế, trong khi những người cánh hữu hoàn toàn phản đối điều đó.
  - Những người theo chủ nghĩa nhà nước cánh hữu muốn chính phủ tối thiểu trong khi những người theo chủ nghĩa dân túy cánh tả muốn kiểm soát tối đa.
explanation: |
  Chương này giải thích rằng cả những người theo chủ nghĩa nhà nước cánh hữu và cánh tả đều có chung mục tiêu chính trị: giành lấy quyền lực để tổ chức xã hội theo quan điểm của họ và áp đặt nó lên mọi người. Đây chính là định nghĩa của chủ nghĩa nhà nước - sử dụng luật pháp để kiểm soát và định hình xã hội. Sự khác biệt không nằm ở phương pháp (cả hai đều sử dụng quyền lực nhà nước) mà nằm ở giá trị: những người theo chủ nghĩa nhà nước cánh hữu ưu tiên đạo đức và văn minh truyền thống, trong khi những người theo chủ nghĩa nhà nước cánh tả tập trung vào công bằng xã hội và phân phối lại của cải. Mô hình kim cương thể hiện sự phức tạp này bằng cách cho thấy sự khác biệt thực sự nằm ở mức độ kiểm soát của chính phủ, chứ không chỉ đơn thuần là các triết lý đối lập.
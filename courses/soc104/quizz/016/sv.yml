question: Enligt diamantmodellen, vad är den största skillnaden mellan höger- och vänsterorienterade statister?
answer: De försöker båda använda statsmakten, men för olika värden och syften
wrong_answers:
  - Högerorienterade statister motsätter sig alla statliga ingripanden medan vänsterorienterade stöder dem
  - Vänsterorienterade statister förespråkar ekonomisk frihet medan högerorienterade motsätter sig det helt
  - Statister på högerkanten vill ha minimal styrning medan vänsterkanten vill ha maximal kontroll
explanation: |
  Kapitlet förklarar att både höger- och vänsterextremister har samma politiska mål: att erövra makten för att organisera samhället i enlighet med
  sin världsbild och påtvinga den på alla. Detta är själva definitionen av statism - att använda lagstiftning för att kontrollera och forma samhället. Skillnaden ligger inte i deras metoder (båda använder sig av statsmakt) utan i deras värderingar: högerorienterade statister prioriterar traditionell moral och civilisation, medan vänsterorienterade statister fokuserar på social rättvisa och omfördelning. Diamantmodellen fångar denna komplexitet genom att visa att den verkliga skillnaden är graden av statlig kontroll, inte bara motsatta filosofier.
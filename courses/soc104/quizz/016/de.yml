question: Was ist nach dem Diamantenmodell der Hauptunterschied zwischen rechten und linken Statisten?
answer: Beide versuchen, die staatliche Macht zu nutzen, aber für unterschiedliche Werte und Ziele
wrong_answers:
  - Die Rechten lehnen jegliche staatliche Intervention ab, während die Linken sie unterstützen
  - Linke Statisten befürworten die wirtschaftliche Freiheit, während die Rechten sie vollständig ablehnen
  - Rechte Statisten wollen eine minimale Regierung, während Linke eine maximale Kontrolle wollen
explanation: |
  In diesem Kapitel wird erläutert, dass sowohl rechte als auch linke Statisten dasselbe politische Ziel verfolgen: die Eroberung der Macht, um die Gesellschaft gemäß ihrer Weltanschauung
  ihrer Weltanschauung zu organisieren und sie allen aufzuzwingen. Dies ist die eigentliche Definition des Etatismus - der Einsatz von Gesetzen zur Kontrolle und Gestaltung der Gesellschaft. Der Unterschied liegt nicht in ihren Methoden (beide nutzen die Staatsgewalt), sondern in ihren Werten: Rechtsstaatler legen Wert auf traditionelle Moral und Zivilisation, während Linksstaatler sich auf soziale Gerechtigkeit und Umverteilung konzentrieren. Das Rautenmodell erfasst diese Komplexität, indem es zeigt, dass der eigentliche Unterschied im Grad der staatlichen Kontrolle liegt und nicht einfach in den gegensätzlichen Philosophien.
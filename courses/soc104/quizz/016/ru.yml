question: В соответствии с алмазной моделью, в чем заключается главное различие между правыми и левыми статистами?
answer: Они оба стремятся использовать государственную власть, но для достижения разных ценностей и целей
wrong_answers:
  - Правые статисты выступают против любого государственного вмешательства, а левые поддерживают его
  - Левые статисты выступают за экономическую свободу, а правые - против нее
  - Правые статисты хотят минимального правительства, а левые - максимального контроля
explanation: |
  В главе объясняется, что и правые, и левые статисты преследуют одну и ту же политическую цель: завоевать власть, чтобы организовать общество в соответствии со своим мировоззрением и навязать его всем
  и навязать его всем. Это самое определение статизма - использование законодательства для контроля и формирования общества. Разница заключается не в методах (и те, и другие используют государственную власть), а в ценностях: правые статисты ставят во главу угла традиционную мораль и цивилизацию, а левые - социальную справедливость и перераспределение. Алмазная модель отражает эту сложность, показывая, что реальное различие заключается в степени государственного контроля, а не просто в противоположных философиях.
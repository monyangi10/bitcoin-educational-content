question: Según el modelo del diamante, ¿cuál es la principal diferencia entre los estatistas de derechas y los de izquierdas?
answer: Ambos pretenden utilizar el poder del Estado, pero para valores y objetivos diferentes
wrong_answers:
  - Los estatistas de derechas se oponen a toda intervención gubernamental mientras que los de izquierdas la apoyan
  - Los estatistas de izquierdas están a favor de la libertad económica, mientras que la derecha se opone totalmente a ella
  - Los estatistas de derechas quieren un gobierno mínimo, mientras que los de izquierdas quieren el máximo control
explanation: |
  En el capítulo se explica que tanto los estatistas de derechas como los de izquierdas comparten el mismo objetivo político: conquistar el poder para organizar la sociedad según su visión del mundo e imponerla a todos
  su visión del mundo e imponerla a todo el mundo. Esta es la definición misma del estatismo: utilizar la legislación para controlar y moldear la sociedad. La diferencia no radica en sus métodos (ambos utilizan el poder del Estado), sino en sus valores: los estatistas de derechas dan prioridad a la moral tradicional y la civilización, mientras que los de izquierdas se centran en la justicia social y la redistribución. El modelo del diamante capta esta complejidad mostrando que la verdadera distinción es el grado de control gubernamental, no simplemente las filosofías opuestas.
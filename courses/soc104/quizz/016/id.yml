question: Menurut model berlian, apa perbedaan utama antara statistik sayap kanan dan sayap kiri?
answer: Keduanya berusaha menggunakan kekuasaan negara tetapi untuk nilai dan tujuan yang berbeda
wrong_answers:
  - Politisi sayap kanan menentang semua keterlibatan pemerintah, sementara sayap kiri mendukungnya
  - Para statistisi sayap kiri mendukung kebebasan ekonomi, sementara sayap kanan menentangnya sepenuhnya
  - Statistik sayap kanan menginginkan pemerintahan yang minimal, sementara sayap kiri menginginkan kontrol maksimum
explanation: |
  Bab ini menjelaskan bahwa baik sayap kanan maupun sayap kiri memiliki tujuan politik yang sama: menaklukkan kekuasaan untuk mengatur masyarakat sesuai dengan
  pandangan dunia mereka dan memaksakannya pada semua orang. Ini adalah definisi statisme - menggunakan undang-undang untuk mengontrol dan membentuk masyarakat. Perbedaannya tidak terletak pada metode mereka (keduanya menggunakan kekuasaan negara), tetapi pada nilai-nilai mereka: kaum statis kanan memprioritaskan moralitas dan peradaban tradisional, sementara kaum statis kiri berfokus pada keadilan sosial dan redistribusi. Model berlian menangkap kompleksitas ini dengan menunjukkan bahwa perbedaan yang sebenarnya adalah tingkat kontrol pemerintah, bukan sekadar filosofi yang berlawanan.

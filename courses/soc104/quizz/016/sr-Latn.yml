question: Prema dijamantskom modelu, koja je glavna razlika između desničarskih i levičarskih statista?
answer: Oboje žele da koriste državnu moć, ali za različite vrednosti i ciljeve.
wrong_answers:
  - Desničarski statisti se protive svakom vladinom mešanju dok ga levičari podržavaju
  - Levičarski etatisti favorizuju ekonomsku slobodu dok je desničari potpuno osporavaju
  - Desničarski statisti žele minimalnu vladu dok levičari žele maksimalnu kontrolu
explanation: |
  Poglavlje objašnjava da i desničarski i levičarski statisti dele isti politički cilj: osvajanje vlasti kako bi organizovali društvo prema svom svetonazoru i nametnuli ga svima. Ovo je sama definicija statizma - korišćenje zakonodavstva za kontrolu i oblikovanje društva. Razlika nije u njihovim metodama (oboje koriste državnu moć) već u njihovim vrednostima: desničarski statisti daju prioritet tradicionalnom moralu i civilizaciji, dok levičarski statisti fokusiraju na socijalnu pravdu i preraspodelu. Dijamantski model prikazuje ovu složenost pokazujući da je prava razlika stepen državne kontrole, a ne samo suprotstavljene filozofije.
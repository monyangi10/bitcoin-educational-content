question: Wat is volgens het diamantmodel het belangrijkste verschil tussen rechtse en linkse statisten?
answer: Ze proberen allebei staatsmacht te gebruiken, maar voor verschillende waarden en doelstellingen
wrong_answers:
  - Rechtse statisten zijn tegen alle overheidsbemoeienis, terwijl linkse dit juist steunen
  - Linkse statisten zijn voorstander van economische vrijheid, terwijl rechtse statisten er volledig tegen zijn
  - Rechtse statisten willen een minimale overheid terwijl links maximale controle wil
explanation: |
  Het hoofdstuk legt uit dat zowel rechtse als linkse statisten hetzelfde politieke doel hebben: het veroveren van de macht om de samenleving in te richten volgens hun wereldbeeld en dat aan iedereen op te leggen
  hun wereldbeeld en dit aan iedereen op te leggen. Dit is de definitie van statisme - het gebruik van wetgeving om de samenleving te controleren en vorm te geven. Het verschil ligt niet in hun methoden (beiden gebruiken staatsmacht) maar in hun waarden: rechtse statisten geven de voorkeur aan traditionele moraliteit en beschaving, terwijl linkse statisten zich richten op sociale rechtvaardigheid en herverdeling. Het diamantmodel vangt deze complexiteit door te laten zien dat het echte onderscheid de mate van overheidscontrole is, en niet simpelweg de tegengestelde filosofieën.
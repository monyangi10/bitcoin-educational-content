question: Milline on teemantmudeli kohaselt peamine erinevus parempoolsete ja vasakpoolsete riigimeeste vahel?
answer: Mõlemad püüavad kasutada riigivõimu, kuid erinevate väärtuste ja eesmärkide saavutamiseks
wrong_answers:
  - Parempoolsed statistid on igasuguse valitsuse sekkumise vastu, vasakpoolsed aga toetavad seda
  - Vasakpoolsed statistid pooldavad majanduslikku vabadust, samas kui parempoolsed on sellele täielikult vastu
  - Parempoolsed statistid tahavad minimaalset valitsemist, vasakpoolsed aga maksimaalset kontrolli
explanation: |
  Peatükis selgitatakse, et nii parempoolsetel kui ka vasakpoolsetel statistidel on sama poliitiline eesmärk: võimu vallutamine, et korraldada ühiskonda vastavalt
  oma maailmavaadet ja seda kõigile peale suruda. See ongi statismi definitsioon - seadusandluse kasutamine ühiskonna kontrollimiseks ja kujundamiseks. Erinevus ei seisne nende meetodites (mõlemad kasutavad riigivõimu), vaid nende väärtustes: parempoolsed statistid seavad esikohale traditsioonilise moraali ja tsivilisatsiooni, vasakpoolsed aga keskenduvad sotsiaalsele õiglusele ja ümberjaotamisele. Teemantmudel kajastab seda keerukust, näidates, et tegelik erinevus seisneb valitsuse kontrolli tasemes, mitte lihtsalt vastandlikes filosoofiates.
question: ครอบครัวการเมืองใดที่มีแนวโน้มจะสนับสนุนการยกเลิกกฎหมายค่าแรงขั้นต่ำและการแปรรูประบบสุขภาพทั้งหมดในขณะที่คัดค้านกฎระเบียบด้านสิ่งแวดล้อมทั้งหมด?
answer: เสรีนิยม, เนื่องจากพวกเขาคัดค้านการแทรกแซงของรัฐบาลในตลาดทุกภาคส่วนอย่างต่อเนื่อง
wrong_answers:
  - พรรคอนุรักษ์นิยม, เนื่องจากพวกเขาชื่นชอบการแก้ปัญหาผ่านตลาดแต่ยอมรับการควบคุมของรัฐบาลเมื่อจำเป็น
  - พวกสายกลาง, ขณะที่พวกเขาแสวงหาวิธีการที่สมดุลโดยผสมผสานกลไกตลาดกับการแทรกแซงของรัฐบาลที่มีเป้าหมาย
  - สังคมนิยม, เนื่องจากพวกเขาสนับสนุนการแทรกแซงของรัฐบาลอย่างแข็งขันเพื่อปกป้องคนงานและให้บริการสาธารณะทั่วไป
explanation: |
  ลิเบอร์ทาเรียนเป็นกลุ่มการเมืองเดียวที่สนับสนุนการแทรกแซงของรัฐบาลให้น้อยที่สุดในทุกภาคเศรษฐกิจอย่างต่อเนื่อง พวกเขามองว่ากฎหมายค่าแรงขั้นต่ำเป็นการบิดเบือนตลาดที่สร้างการว่างงาน สนับสนุนการแปรรูประบบสุขภาพอย่างสมบูรณ์ว่าเป็นสิ่งที่มีประสิทธิภาพมากกว่าระบบของรัฐบาล และคัดค้านกฎระเบียบด้านสิ่งแวดล้อมว่าเป็นการละเมิดเสรีภาพทางเศรษฐกิจ ฝ่ายอนุรักษ์นิยมอาจสนับสนุนบางตำแหน่งเหล่านี้แต่จะยอมรับการควบคุมที่จำกัดเพื่อวัตถุประสงค์เชิงกลยุทธ์ ฝ่ายกลางแสวงหาความสมดุลที่เป็นไปได้ระหว่างเสรีภาพทางตลาดและการกำกับดูแลของรัฐบาล ฝ่ายสังคมนิยมคัดค้านทั้งสามตำแหน่งโดยพื้นฐาน มองว่าเป็นอันตรายต่อความยุติธรรมทางสังคมและสวัสดิการร่วมกัน
question: Hangi siyasi aile büyük olasılıkla hem asgari ücret yasalarının kaldırılmasını hem de sağlık hizmetlerinin tamamen özelleştirilmesini desteklerken tüm çevre düzenlemelerine karşı çıkar?
answer: Liberteryenler, tüm sektörlerde piyasalara devlet müdahalesine sürekli olarak karşı çıktıkları için
wrong_answers:
  - Muhafazakârlar, piyasa çözümlerini destekledikleri ancak gerektiğinde bazı devlet düzenlemelerini kabul ettikleri için
  - Merkezciler, piyasa mekanizmaları ile hedefe yönelik devlet müdahalesini birleştiren dengeli yaklaşımlar aradıklarından
  - Sosyalistler, çalışanları korumak ve evrensel hizmetler sağlamak için devlet müdahalesini güçlü bir şekilde destekledikleri için
explanation: |
  Liberteryenler, tüm ekonomik sektörlerde minimum devlet müdahalesini tutarlı bir şekilde savunan tek siyasi ailedir.
  Asgari ücret yasalarını işsizlik yaratan piyasa çarpıklıkları olarak görür, sağlık hizmetlerinin tamamen özelleştirilmesini hükümet programlarından daha verimli olduğu için destekler ve çevre düzenlemelerine ekonomik özgürlüğün ihlali olarak karşı çıkarlar. Muhafazakârlar bu pozisyonlardan bazılarını destekleyebilir ancak stratejik amaçlar için sınırlı düzenlemeyi kabul edebilirler. Merkezciler piyasa özgürlüğü ile devlet denetimi arasında pragmatik bir denge arayışındadır. Sosyalistler, sosyal adalet ve kolektif refah için zararlı olarak gördükleri bu üç pozisyona da temelde karşı çıkarlar.
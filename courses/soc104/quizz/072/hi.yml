question: कौन सा राजनीतिक परिवार न्यूनतम मजदूरी कानूनों को समाप्त करने और स्वास्थ्य सेवा के पूर्ण निजीकरण दोनों का समर्थन करने की सबसे अधिक संभावना रखता है, जबकि साथ ही साथ सभी पर्यावरण नियमों का विरोध करता है?
answer: स्वतंत्रतावादी, क्योंकि वे सभी क्षेत्रों में बाजारों में सरकारी हस्तक्षेप का लगातार विरोध करते हैं।
wrong_answers:
  - रूढ़िवादी लोग बाज़ार आधारित समाधानों का समर्थन करते हैं, लेकिन आवश्यकता पड़ने पर कुछ सरकारी नियमों को भी स्वीकार करते हैं।
  - मध्यमार्गी, बाजार तंत्र को लक्षित सरकारी हस्तक्षेप के साथ संयोजित करने वाले संतुलित दृष्टिकोण की तलाश में हैं।
  - समाजवादी, श्रमिकों की सुरक्षा और सार्वभौमिक सेवाओं के प्रावधान के लिए सरकारी हस्तक्षेप का पुरजोर समर्थन करते हैं।
explanation: |
  स्वतंत्रतावादी एकमात्र ऐसा राजनीतिक समूह है जो सभी आर्थिक क्षेत्रों में न्यूनतम सरकारी हस्तक्षेप की वकालत करता है।
  वे न्यूनतम मजदूरी कानूनों को बाजार में विकृति मानते हैं जिससे बेरोजगारी पैदा होती है, स्वास्थ्य सेवाओं के पूर्ण निजीकरण का समर्थन करते हैं क्योंकि यह सरकारी कार्यक्रमों से अधिक कुशल है, और पर्यावरण नियमों का विरोध करते हैं क्योंकि वे आर्थिक स्वतंत्रता का उल्लंघन हैं। रूढ़िवादी इनमें से कुछ विचारों का समर्थन कर सकते हैं लेकिन रणनीतिक उद्देश्यों के लिए सीमित विनियमन स्वीकार कर सकते हैं। मध्यमार्गी बाजार की स्वतंत्रता और सरकारी निगरानी के बीच व्यावहारिक संतुलन चाहते हैं। समाजवादी इन तीनों विचारों का मूल रूप से विरोध करते हैं, क्योंकि वे इन्हें सामाजिक न्याय और सामूहिक कल्याण के लिए हानिकारक मानते हैं।
question: کدام خانواده سیاسی به احتمال زیاد از حذف قوانین حداقل دستمزد و خصوصی‌سازی کامل مراقبت‌های بهداشتی حمایت کرده و با تمام مقررات زیست‌محیطی مخالف است؟
answer: لیبرترین‌ها، همان‌طور که به‌طور مداوم با مداخله دولت در بازارها در تمام بخش‌ها مخالفند
wrong_answers:
  - محافظه‌کاران، همان‌طور که راه‌حل‌های بازار را ترجیح می‌دهند اما در صورت لزوم برخی از مقررات دولتی را می‌پذیرند
  - میانه‌روها، همان‌طور که به دنبال رویکردهای متعادل هستند که مکانیزم‌های بازار را با مداخله هدفمند دولت ترکیب می‌کنند
  - سوسیالیست‌ها، زیرا آن‌ها به شدت از مداخله دولت برای حفاظت از کارگران و ارائه خدمات همگانی حمایت می‌کنند
explanation: |
  لیبرترین‌ها تنها خانواده سیاسی هستند که به طور مداوم از حداقل مداخله دولت در تمام بخش‌های اقتصادی حمایت می‌کنند.  
  آن‌ها قوانین حداقل دستمزد را به عنوان تحریفات بازار که باعث بیکاری می‌شود می‌بینند، از خصوصی‌سازی کامل مراقبت‌های بهداشتی به عنوان کارآمدتر از برنامه‌های دولتی حمایت می‌کنند و با مقررات زیست‌محیطی به عنوان نقض آزادی اقتصادی مخالفند. محافظه‌کاران ممکن است از برخی از این مواضع حمایت کنند اما برای اهداف استراتژیک مقررات محدودی را می‌پذیرند. میانه‌روها به دنبال تعادل عمل‌گرایانه بین آزادی بازار و نظارت دولت هستند. سوسیالیست‌ها به طور اساسی با هر سه موضع مخالفند و آن‌ها را مضر برای عدالت اجتماعی و رفاه جمعی می‌دانند.
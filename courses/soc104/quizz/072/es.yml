question: ¿Qué familia política apoyaría más probablemente tanto la eliminación de las leyes de salario mínimo como la privatización total de la sanidad, al tiempo que se opondría a toda normativa medioambiental?
answer: Libertarios, ya que se oponen sistemáticamente a la intervención gubernamental en los mercados de todos los sectores
wrong_answers:
  - Conservadores, ya que favorecen las soluciones de mercado pero aceptan cierta regulación gubernamental cuando es necesaria
  - Centristas, ya que buscan enfoques equilibrados que combinen mecanismos de mercado con una intervención pública selectiva
  - Socialistas, ya que apoyan firmemente la intervención gubernamental para proteger a los trabajadores y proporcionar servicios universales
explanation: |
  Los libertarios son la única familia política que defiende sistemáticamente una intervención gubernamental mínima en todos los sectores económicos.
  Consideran las leyes de salario mínimo como distorsiones del mercado que crean desempleo, apoyan la privatización total de la sanidad por ser más eficiente que los programas gubernamentales y se oponen a la normativa medioambiental por considerarla una violación de la libertad económica. Los conservadores podrían apoyar algunas de estas posturas, pero aceptarían una regulación limitada con fines estratégicos. Los centristas buscan un equilibrio pragmático entre la libertad de mercado y la supervisión gubernamental. Los socialistas se oponen fundamentalmente a las tres posturas, por considerarlas perjudiciales para la justicia social y el bienestar colectivo.
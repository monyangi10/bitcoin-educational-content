question: Ni familia gani ya kisiasa ambayo inaweza kuunga mkono kuondolewa kwa sheria za mshahara wa chini na ubinafsishaji kamili wa huduma ya afya huku ikipinga kanuni zote za mazingira?
answer: Wanaliberali, kwani wanapinga mara kwa mara uingiliaji kati wa serikali katika masoko katika sekta zote
wrong_answers:
  - Wahafidhina, kwani wanapendelea suluhisho za soko lakini wanakubali kanuni fulani za serikali inapohitajika
  - Watetezi wa kati, wanapotafuta mbinu zenye usawa zinazochanganya mifumo ya soko na uingiliaji kati wa serikali unaolengwa
  - Wasoshalisti, wanapounga mkono kwa dhati uingiliaji kati wa serikali ili kuwalinda wafanyakazi na kutoa huduma kwa wote
explanation: |
  Wanaliberali ndio familia pekee ya kisiasa ambayo hutetea uingiliaji kati mdogo wa serikali katika sekta zote za kiuchumi.
  
  Wanaona sheria za mshahara wa chini kama upotoshaji wa soko unaosababisha ukosefu wa ajira, kuunga mkono ubinafsishaji kamili wa huduma ya afya kama wenye ufanisi zaidi kuliko mipango ya serikali, na kupinga kanuni za mazingira kama ukiukwaji wa uhuru wa kiuchumi. Wahafidhina wanaweza kuunga mkono baadhi ya misimamo hii lakini wangekubali kanuni ndogo kwa madhumuni ya kimkakati. Wakuu wa kati hutafuta usawa wa vitendo kati ya uhuru wa soko na usimamizi wa serikali. Wasoshalisti kimsingi wanapinga misimamo yote mitatu, wakiiona kama hatari kwa haki ya kijamii na ustawi wa pamoja.
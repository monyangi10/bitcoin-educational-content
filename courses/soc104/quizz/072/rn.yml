question: Ni uwuhe muryango wa politike woshobora gushigikira cane ugukuraho amategeko agenga umushahara mutoyi be n’uguhindura ubuvuzi bube ubw’abantu ku giti cabo mu gihe urwanya amategeko yose agenga ibidukikije?
answer: Abaharanira umwidegemvyo, kuko baguma barwanya ko Leta yivanga mu masoko mu nzego zose
wrong_answers:
  - Abanyagihugu b’abanyaruyeri, kuko bakunda inyishu z’isoko ariko bakemera amabwirizwa amwamwe ya leta iyo bikenewe
  - Abanyapolitike bo hagati, uko barondera uburyo buringaniye buhuza uburyo bw’isoko n’ingene Leta igira ico ikoze
  - Abasosiyalisiti, kuko bashigikiye cane ko Leta igira ico ikoze kugira ngo ikingire abakozi no gutanga ibikorwa ku bantu bose .
explanation: |
  Abanyagihugu b’abanyagihugu ni bo bonyene bo mu muryango wa politike uhora usaba ko Leta yogira ico ikoze mu nzego zose z’ubutunzi. 
  Babona ko amategeko agenga umushahara mutoyi ari ugugoranya isoko bituma abantu batagira akazi, bagashigikira uguhindura ubuvuzi mu buryo bushitse mu buryo bubereye kuruta porogarama za Leta, kandi barwanya amategeko agenga ibidukikije nk’aho ari ukurenga ku mwidegemvyo w’ubutunzi. Abanyapolitike b’abanyagihugu boshobora gushigikira bimwe muri ivyo bibanza ariko bakemera amategeko makeyi kubera intumbero z’ingene bovyifatamwo. Abanyapolitike barondera uburinganire hagati y’umwidegemvyo w’isoko n’ubugenzuzi bwa Leta. Abasosiyalisiti bararwanya canecane ivyo bibanza vyose bitatu, babona ko ari bibi ku butungane bw’abantu no ku mibereho myiza y’abantu bose.
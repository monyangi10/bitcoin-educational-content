question: 哪个政治家族最有可能同时支持取消最低工资法和医疗保健完全私有化，同时反对所有环境法规？
answer: 自由主义者，因为他们一贯反对政府干预各行各业的市场
wrong_answers:
  - 保守派，因为他们倾向于市场解决方案，但在必要时也接受一些政府监管
  - 中间派，因为他们寻求市场机制与有针对性的政府干预相结合的平衡方法
  - 社会主义者，因为他们强烈支持政府干预，以保护工人和提供普遍服务
explanation: |
  自由主义者是唯一一个一贯主张在所有经济领域尽量减少政府干预的政治家族。
  他们认为最低工资法是对市场的扭曲，会造成失业；他们支持医疗保健完全私有化，认为这比政府项目更有效率；他们反对环境监管，认为这侵犯了经济自由。保守派可能会支持其中一些立场，但会接受出于战略目的的有限监管。中间派在市场自由和政府监管之间寻求务实的平衡。社会主义者从根本上反对上述三种立场，认为它们有损社会公正和集体福利。
question: Która rodzina polityczna najprawdopodobniej poparłaby zarówno zniesienie przepisów o płacy minimalnej, jak i całkowitą prywatyzację opieki zdrowotnej, jednocześnie sprzeciwiając się wszelkim regulacjom środowiskowym?
answer: Libertarianie, ponieważ konsekwentnie sprzeciwiają się interwencji rządu na rynkach we wszystkich sektorach
wrong_answers:
  - Konserwatyści, ponieważ preferują rozwiązania rynkowe, ale w razie potrzeby akceptują pewne regulacje rządowe
  - Centryści, ponieważ szukają zrównoważonego podejścia łączącego mechanizmy rynkowe z ukierunkowaną interwencją rządu
  - Socjaliści, ponieważ zdecydowanie popierają interwencję rządu w celu ochrony pracowników i zapewnienia powszechnych usług
explanation: |
  Libertarianie są jedyną rodziną polityczną, która konsekwentnie opowiada się za minimalną interwencją rządu we wszystkich sektorach gospodarki.
  Postrzegają oni przepisy dotyczące płacy minimalnej jako zakłócenia rynku, które powodują bezrobocie, wspierają całkowitą prywatyzację opieki zdrowotnej jako bardziej efektywną niż programy rządowe i sprzeciwiają się regulacjom środowiskowym jako naruszeniom wolności gospodarczej. Konserwatyści mogą popierać niektóre z tych stanowisk, ale zaakceptowaliby ograniczone regulacje dla celów strategicznych. Centryści szukają pragmatycznej równowagi między wolnością rynku a nadzorem rządowym. Socjaliści zasadniczo sprzeciwiają się wszystkim trzem stanowiskom, postrzegając je jako szkodliwe dla sprawiedliwości społecznej i zbiorowego dobrobytu.
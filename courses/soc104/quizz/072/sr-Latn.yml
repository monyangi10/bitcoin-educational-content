question: Koja politička porodica bi najverovatnije podržala i ukidanje zakona o minimalnoj zaradi i potpunu privatizaciju zdravstvene zaštite, dok bi se protivila svim ekološkim propisima?
answer: Libertarijanci, jer dosledno se protive intervenciji vlade u tržišta u svim sektorima
wrong_answers:
  - Konzervativci, jer favorizuju tržišna rešenja, ali prihvataju određenu državnu regulaciju kada je to neophodno
  - Centristi, dok traže uravnotežene pristupe koji kombinuju tržišne mehanizme sa ciljanom intervencijom vlade
  - Socijalisti, jer snažno podržavaju intervenciju vlade kako bi zaštitili radnike i obezbedili univerzalne usluge
explanation: |
  Libertarijanci su jedina politička porodica koja dosledno zagovara minimalnu intervenciju vlade u svim ekonomskim sektorima. 
  Oni vide zakone o minimalnoj plati kao tržišne distorzije koje stvaraju nezaposlenost, podržavaju potpunu privatizaciju zdravstvene zaštite kao efikasniju od vladinih programa i protive se ekološkim propisima kao kršenju ekonomske slobode. Konzervativci bi mogli podržati neke od ovih stavova, ali bi prihvatili ograničenu regulaciju u strateške svrhe. Centristi traže pragmatičnu ravnotežu između slobode tržišta i nadzora vlade. Socijalisti se fundamentalno protive svim trima stavovima, smatrajući ih štetnim za socijalnu pravdu i kolektivnu dobrobit.
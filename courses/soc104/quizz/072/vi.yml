question: Gia đình chính trị nào có khả năng ủng hộ việc bãi bỏ luật lương tối thiểu và tư nhân hóa hoàn toàn ngành y tế, đồng thời phản đối mọi quy định về môi trường?
answer: Những người theo chủ nghĩa tự do luôn phản đối sự can thiệp của chính phủ vào thị trường trên mọi lĩnh vực.
wrong_answers:
  - Những người bảo thủ ủng hộ các giải pháp thị trường nhưng chấp nhận một số quy định của chính phủ khi cần thiết.
  - Những người theo chủ nghĩa trung dung tìm kiếm các phương pháp cân bằng, kết hợp cơ chế thị trường với sự can thiệp có mục tiêu của chính phủ.
  - Những người theo chủ nghĩa xã hội, vì họ kiên quyết ủng hộ sự can thiệp của chính phủ để bảo vệ người lao động và cung cấp các dịch vụ phổ cập.
explanation: |
  Những người theo chủ nghĩa tự do là nhóm chính trị duy nhất luôn chủ trương can thiệp tối thiểu của chính phủ vào tất cả các lĩnh vực kinh tế.
  Họ coi luật lương tối thiểu là sự bóp méo thị trường gây ra thất nghiệp, ủng hộ tư nhân hóa hoàn toàn hệ thống chăm sóc sức khỏe vì cho rằng nó hiệu quả hơn các chương trình của chính phủ, và phản đối các quy định về môi trường vì cho rằng chúng vi phạm tự do kinh tế. Những người bảo thủ có thể ủng hộ một số quan điểm này nhưng sẽ chấp nhận sự điều tiết hạn chế vì mục đích chiến lược. Những người theo chủ nghĩa trung dung tìm kiếm sự cân bằng thực dụng giữa tự do thị trường và sự giám sát của chính phủ. Những người theo chủ nghĩa xã hội về cơ bản phản đối cả ba quan điểm này, coi chúng là có hại cho công bằng xã hội và phúc lợi tập thể.
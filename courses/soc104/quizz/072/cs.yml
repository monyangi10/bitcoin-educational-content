question: Která politická rodina by s největší pravděpodobností podpořila jak zrušení zákonů o minimální mzdě, tak úplnou privatizaci zdravotnictví a zároveň by se postavila proti všem regulacím v oblasti životního prostředí?
answer: Libertariáni jsou důsledně proti vládním zásahům do trhů ve všech odvětvích
wrong_answers:
  - Konzervativci, kteří upřednostňují tržní řešení, ale v případě potřeby akceptují určitou státní regulaci
  - Centristé, kteří usilují o vyvážené přístupy kombinující tržní mechanismy s cílenými vládními zásahy
  - Socialisté, protože silně podporují vládní zásahy na ochranu pracovníků a poskytování univerzálních služeb
explanation: |
  Libertariáni jsou jedinou politickou rodinou, která důsledně prosazuje minimální státní zásahy ve všech hospodářských odvětvích.
  Zákony o minimální mzdě považují za tržní deformace, které způsobují nezaměstnanost, podporují úplnou privatizaci zdravotnictví jako efektivnější než státní programy a vystupují proti ekologickým regulacím jako porušení ekonomické svobody. Konzervativci by mohli některé z těchto postojů podporovat, ale akceptovali by omezenou regulaci pro strategické účely. Centristé hledají pragmatickou rovnováhu mezi svobodou trhu a vládním dohledem. Socialisté jsou zásadně proti všem třem postojům a považují je za škodlivé pro sociální spravedlnost a kolektivní blahobyt.
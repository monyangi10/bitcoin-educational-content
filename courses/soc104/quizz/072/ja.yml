question: すべての環境規制に反対する一方で、最低賃金法の撤廃と医療の完全民営化の両方を最も支持しそうな政治家一族は？
answer: リバタリアンは、あらゆる分野の市場への政府の介入に一貫して反対している。
wrong_answers:
  - 保守派：市場による解決策を支持するが、必要な場合には政府による規制も受け入れる。
  - 中道派は、市場メカニズムと的を絞った政府介入を組み合わせたバランスの取れたアプローチを求める。
  - 労働者を保護し、普遍的なサービスを提供するための政府の介入を強く支持する社会主義者。
explanation: |
  リバタリアンは、あらゆる経済分野において一貫して政府の介入を最小限に抑えることを主張する唯一の政治家系である。
  彼らは最低賃金法を失業を生む市場の歪みとみなし、政府プログラムよりも効率的として完全な医療民営化を支持し、経済的自由の侵害として環境規制に反対する。保守派はこれらの立場のいくつかを支持するかもしれないが、戦略的目的のための限定的な規制は受け入れるだろう。中道派は市場の自由と政府の監視の間の現実的なバランスを求める。社会主義者は、社会正義と集団福祉を害するものとして、3つの立場すべてに基本的に反対する。
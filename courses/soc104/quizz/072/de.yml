question: Welche politische Familie würde am ehesten sowohl die Abschaffung von Mindestlohngesetzen als auch die vollständige Privatisierung des Gesundheitswesens unterstützen und gleichzeitig alle Umweltvorschriften ablehnen?
answer: Libertäre, da sie sich konsequent gegen staatliche Eingriffe in die Märkte in allen Bereichen aussprechen
wrong_answers:
  - Konservative, da sie Marktlösungen bevorzugen, aber eine gewisse staatliche Regulierung akzeptieren, wenn dies notwendig ist
  - Zentristen, da sie ausgewogene Ansätze anstreben, die Marktmechanismen mit gezielten staatlichen Eingriffen kombinieren
  - Sozialdemokraten, da sie staatliche Maßnahmen zum Schutz der Arbeitnehmer und zur Bereitstellung von Universaldienstleistungen nachdrücklich unterstützen
explanation: |
  Die Libertären sind die einzige politische Familie, die sich konsequent für minimale staatliche Eingriffe in allen Wirtschaftsbereichen einsetzt.
  Sie betrachten Mindestlohngesetze als Marktverzerrungen, die zu Arbeitslosigkeit führen, unterstützen die vollständige Privatisierung des Gesundheitswesens, da sie effizienter ist als staatliche Programme, und lehnen Umweltvorschriften als Verletzung der wirtschaftlichen Freiheit ab. Konservative könnten einige dieser Positionen unterstützen, würden aber eine begrenzte Regulierung zu strategischen Zwecken akzeptieren. Zentristen suchen ein pragmatisches Gleichgewicht zwischen Marktfreiheit und staatlicher Aufsicht. Sozialisten lehnen alle drei Positionen grundsätzlich ab, da sie sie als schädlich für die soziale Gerechtigkeit und das Gemeinwohl ansehen.
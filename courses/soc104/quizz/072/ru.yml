question: Какая политическая семья, скорее всего, поддержит отмену законов о минимальной заработной плате и полную приватизацию здравоохранения, выступая против всех экологических норм?
answer: Либертарианцы, поскольку они последовательно выступают против вмешательства государства в работу рынков во всех секторах экономики
wrong_answers:
  - Консерваторы, поскольку они предпочитают рыночные решения, но при необходимости принимают некоторые меры государственного регулирования
  - Центристы, поскольку они ищут сбалансированные подходы, сочетающие рыночные механизмы с целенаправленным государственным вмешательством
  - Социалисты, поскольку они решительно поддерживают вмешательство государства для защиты работников и обеспечения всеобщего обслуживания
explanation: |
  Либертарианцы - единственная политическая семья, которая последовательно выступает за минимальное вмешательство государства во всех секторах экономики.
  Они считают, что законы о минимальной зарплате искажают рынок и создают безработицу, поддерживают полную приватизацию здравоохранения как более эффективную, чем государственные программы, и выступают против экологического регулирования как нарушения экономической свободы. Консерваторы могут поддержать некоторые из этих позиций, но согласятся на ограниченное регулирование в стратегических целях. Центристы стремятся к прагматичному балансу между свободой рынка и государственным контролем. Социалисты принципиально выступают против всех трех позиций, считая их вредными для социальной справедливости и коллективного благосостояния.
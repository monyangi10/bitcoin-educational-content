question: Welke politieke familie zou waarschijnlijk de afschaffing van het minimumloon en de volledige privatisering van de gezondheidszorg steunen, terwijl ze tegen alle milieuregels is?
answer: Libertariërs, omdat ze consequent tegen overheidsingrijpen in markten in alle sectoren zijn
wrong_answers:
  - Conservatieven, omdat zij voorstander zijn van marktoplossingen, maar waar nodig enige overheidsregulering accepteren
  - Centristen, omdat zij streven naar een evenwichtige aanpak die marktmechanismen combineert met gerichte overheidsinterventie
  - Socialisten, omdat ze een groot voorstander zijn van overheidsinterventie om werknemers te beschermen en universele diensten te verlenen
explanation: |
  Libertariërs zijn de enige politieke familie die consequent pleit voor minimale overheidsbemoeienis in alle economische sectoren.
  Ze zien minimumloonwetten als marktverstoringen die werkloosheid creëren, steunen volledige privatisering van de gezondheidszorg als efficiënter dan overheidsprogramma's en verzetten zich tegen milieuregelgeving als een schending van de economische vrijheid. Conservatieven zouden sommige van deze standpunten kunnen steunen, maar zouden beperkte regulering voor strategische doeleinden accepteren. Centristen zoeken een pragmatische balans tussen marktvrijheid en overheidstoezicht. Socialisten zijn fundamenteel tegen alle drie de standpunten en zien ze als schadelijk voor sociale rechtvaardigheid en collectief welzijn.
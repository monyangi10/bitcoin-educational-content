question: 哪個政治家族最有可能同時支持取消最低工資法和醫療保健的完全私有化，同時反對所有環境法規？
answer: 自由主義者，因為他們始終反對政府對各行各業市場的干預
wrong_answers:
  - 保守派，因為他們偏好市場解決方案，但必要時也接受一些政府規範
  - 中間派，因為他們尋求結合市場機制與目標政府干預的平衡方法
  - 社會主義者，因為他們強烈支持政府介入，以保護勞工並提供全民服務
explanation: |
  自由主義者是唯一一個在所有經濟領域中始終主張盡量減少政府干預的政治家族。
  他們認為最低工資法是造成失業的市場扭曲，支持醫療照護完全民營化，認為比政府計畫更有效率，反對環境法規，認為違反經濟自由。保守派可能會支持其中一些立場，但會接受為了策略目的而實施的有限規範。中間派在市場自由與政府監督之間尋求務實的平衡。社會主義者從根本上反對這三種立場，認為它們對社會正義和集體福利有害。
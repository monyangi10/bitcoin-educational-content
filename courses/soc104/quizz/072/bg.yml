question: Кое политическо семейство най-вероятно ще подкрепи премахването на законите за минималната работна заплата и пълната приватизация на здравеопазването, като същевременно се противопостави на всички екологични разпоредби?
answer: Либертарианци, тъй като те последователно се противопоставят на държавната намеса на пазарите във всички сектори
wrong_answers:
  - Консерватори, тъй като предпочитат пазарните решения, но приемат известно държавно регулиране, когато е необходимо
  - Центристите търсят балансирани подходи, съчетаващи пазарни механизми с целенасочена държавна намеса
  - Социалисти, тъй като силно подкрепят държавната намеса за защита на работниците и предоставяне на универсални услуги
explanation: |
  Либертарианците са единственото политическо семейство, което последователно се застъпва за минимална държавна намеса във всички икономически сектори.
  Те разглеждат законите за минималната работна заплата като пазарни изкривявания, които създават безработица, подкрепят пълната приватизация на здравеопазването като по-ефективна от държавните програми и се противопоставят на екологичните регулации като нарушение на икономическата свобода. Консерваторите могат да подкрепят някои от тези позиции, но биха приели ограничено регулиране за стратегически цели. Центристите търсят прагматичен баланс между пазарната свобода и държавния надзор. Социалистите се противопоставят принципно и на трите позиции, като ги смятат за вредни за социалната справедливост и колективното благосъстояние.
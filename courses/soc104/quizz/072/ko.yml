question: 모든 환경 규제에 반대하면서 최저임금법 철폐와 의료의 완전한 민영화를 모두 지지할 가능성이 가장 높은 정파는 어디일까요?
answer: 자유주의자들은 모든 부문에 걸쳐 정부의 시장 개입에 일관되게 반대합니다
wrong_answers:
  - 보수주의자들은 시장 해결책을 선호하지만 필요한 경우 정부 규제를 일부 수용합니다
  - 중도주의자들은 시장 메커니즘과 정부의 목표 지향적 개입을 결합한 균형 잡힌 접근법을 추구합니다
  - 사회주의자들은 노동자를 보호하고 보편적 서비스를 제공하기 위한 정부 개입을 강력히 지지합니다
explanation: |
  리버테리언은 모든 경제 분야에 걸쳐 정부의 개입을 최소화해야 한다고 일관되게 주장하는 유일한 정파입니다.
  이들은 최저임금법을 실업자를 양산하는 시장 왜곡으로 보고, 완전한 의료 민영화가 정부 프로그램보다 효율적이라고 지지하며, 환경 규제는 경제적 자유를 침해하는 것으로 반대합니다. 보수주의자는 이러한 입장 중 일부를 지지할 수 있지만 전략적 목적을 위해 제한된 규제를 받아들일 수 있습니다. 중도주의자는 시장의 자유와 정부의 감독 사이에서 실용적인 균형을 추구합니다. 사회주의자는 세 가지 입장 모두 사회 정의와 집단 복지에 해롭다고 보고 근본적으로 반대합니다.
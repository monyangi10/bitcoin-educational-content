question: اصل اساسی پشت مفهوم 'اجماع همپوشان' جان رالز در فلسفه سیاسی میانه‌رو چیست؟
answer: شهروندانی با باورهای بنیادی متفاوت می‌توانند از دیدگاه‌های خود بر اصول سیاسی مشترک عدالت توافق کنند.
wrong_answers:
  - احزاب سیاسی باید دولت‌های ائتلافی تشکیل دهند تا اطمینان حاصل شود که تمامی مواضع ایدئولوژیک به طور مساوی نمایندگی می‌شوند.
  - سیاست‌های اقتصادی باید بین رویکردهای لیبرال و سوسیالیستی متناوب باشند تا تعادل دموکراتیک حفظ شود.
  - باید آموزه‌های دینی و فلسفی در یک جهان‌بینی جامع و واحد برای جامعه یکپارچه شوند.
explanation: |
  اجماع همپوشان راولز نشان می‌دهد که افرادی با دکترین‌های دینی، فلسفی یا اخلاقی ناسازگار همچنان می‌توانند بر اصول مشترک عدالت سیاسی توافق کنند، هر یک از این اصول را از درون نظام‌های اعتقادی خود تأیید می‌کنند.  
  این مفهوم فلسفه میانه‌رو را تجسم می‌بخشد و نشان می‌دهد که چگونه دیدگاه‌های متنوع می‌توانند بدون نیاز به یکنواختی ایدئولوژیک همزیستی کنند. پاسخ‌های نادرست این را به‌عنوان نیاز به ائتلاف‌های دولتی، تناوب سیاست‌ها یا جهان‌بینی‌های متحد نادرست نشان می‌دهند، که با تأکید راولز بر حفظ تنوع دکترین‌ها در حالی که یافتن زمینه سیاسی مشترک است، در تضاد است.
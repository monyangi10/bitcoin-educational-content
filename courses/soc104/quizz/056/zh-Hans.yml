question: 约翰-罗尔斯在中间派政治哲学中提出的 "重叠共识 "概念背后的核心原则是什么？
answer: 具有不同基本信仰的公民可以从各自的角度就共同的政治正义原则达成一致意见
wrong_answers:
  - 各政党必须组建联合政府，以确保所有意识形态立场得到平等代表
  - 经济政策应交替采用自由主义和社会主义方法，以保持民主平衡
  - 必须将宗教和哲学教义统一为社会的单一综合世界观
explanation: |
  罗尔斯的重叠共识表明，持有不相容的宗教、哲学或道德学说的人仍然可以趋同于共同的政治正义原则，每个人都从自己的信仰体系中认可这些原则。
  这一概念体现了中间主义哲学，说明了不同观点如何共存，而不要求意识形态统一。错误答案将此误解为需要政府联盟、政策交替或统一的世界观，这与罗尔斯强调的在寻找共同政治基础的同时保持理论多样性相矛盾。
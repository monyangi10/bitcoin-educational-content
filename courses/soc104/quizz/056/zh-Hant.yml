question: John Rawls 的「重疊共識」概念背後的核心原則是什麼？
answer: 具有不同基本信念的公民可以從各自的觀點就共同的政治正義原則達成協議
wrong_answers:
  - 政黨必須組成聯合政府，以確保所有意識形態的立場都有平等的代表
  - 經濟政策應交替採用自由主義與社會主義方式，以維持民主平衡
  - 宗教和哲學教義必須統一為社會的單一全面世界觀
explanation: |
  羅爾斯的「重疊共識」(overlapping consensus) 說明，持有互不相容的宗教、哲學或道德教義的人，仍然可以在政治正義的共同原則上達成共識，每個人都從自己的信仰體系中認同這些原則。
  這個概念體現了中心主義哲學，顯示出不同的觀點如何可以共存，而不需要意識形態的一致性。錯誤的答案將此誤解為需要政府聯盟、政策交替或統一的世界觀，這與羅爾斯強調在尋找共同政治基礎的同時維持學說的多樣性相矛盾。
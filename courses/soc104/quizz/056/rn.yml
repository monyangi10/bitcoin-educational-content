question: Ni ingingo ngenderwako iyihe iri inyuma y’iciyumviro ca John Rawls c’uko ‘uguhuriza hamwe guhuriye hamwe’ muri filozofiya ya politike y’abanyapolitike bo hagati?
answer: Abanyagihugu bafise imyizere y'ishimikiro itandukanye barashobora kwemeranya ku ngingo ngenderwako za politike zisangiye z'ubutungane bafatiye ku vyo babona .
wrong_answers:
  - Amashirahamwe ya politike ategerezwa gushinga intwaro z'ubumwe kugira ngo ivyicaro vyose vy'ingengabitekerezo biserukire kimwe .
  - Amategeko y'ubutunzi akwiye guhinduranya hagati y'uburyo bwo kwidegemvya n'uburyo bwo gusosiyalisiti kugira ngo demokarasi igumane uburinganire .
  - Inyigisho z'idini n'iza filozofiya zitegerezwa guhurizwa hamwe zibe uburyo bumwe bwo kubona isi bushitse ku kibano .
explanation: |
  Ivyo Rawls yemeranyako bihuye vyerekana yuko abantu bafise inyigisho z’idini, za filozofiya canke z’inyifato runtu zidahuye, bashobora kuguma bahuriza ku ngingo ngenderwako zimwe z’ubutungane bwa politike, umwe wese akashigikira izo ngingo ngenderwako avuye mu vyizerwa vyiwe bwite. 
  Ico ciyumviro gifise filozofiya y’abanyapolitike bo hagati mu kwerekana ingene ivyiyumviro bitandukanye bishobora kubana ataco bisaba ko ivyiyumviro bihuye. Inyishu zitari zo zivuga nabi ivyo nk’aho bisaba amashirahamwe y’intwaro, uguhinduranya politike, canke ukuntu abantu babona isi mu bumwe, ivyo bikaba bivuguruza ivyo Rawls ashimika ku kubungabunga inyigisho zitandukanye mu gihe aronka ishingiro ry’ivya politike rimwe.
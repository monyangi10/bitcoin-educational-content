question: What is the core principle behind John Rawls' concept of 'overlapping consensus' in centrist political philosophy?
answer: Citizens with different fundamental beliefs can agree on shared political principles of justice from their own perspectives
wrong_answers:
  - Political parties must form coalition governments to ensure all ideological positions are represented equally
  - Economic policies should alternate between liberal and socialist approaches to maintain democratic balance
  - Religious and philosophical doctrines must be unified into a single comprehensive worldview for society
explanation: |
  Rawls' overlapping consensus demonstrates that people holding incompatible religious, philosophical, or moral doctrines can still converge on common principles of political justice, each endorsing these principles from within their own belief systems. This concept embodies centrist philosophy by showing how diverse viewpoints can coexist without requiring ideological uniformity. The wrong answers misrepresent this as requiring governmental coalitions, policy alternation, or unified worldviews, which contradicts Rawls' emphasis on maintaining doctrinal diversity while finding shared political ground.
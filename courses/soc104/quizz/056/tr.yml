question: John Rawls'un merkezci siyaset felsefesindeki 'örtüşen mutabakat' kavramının ardındaki temel ilke nedir?
answer: Farklı temel inançlara sahip vatandaşlar, kendi bakış açılarından ortak siyasi adalet ilkeleri üzerinde anlaşabilirler
wrong_answers:
  - Siyasi partiler, tüm ideolojik pozisyonların eşit şekilde temsil edilmesini sağlamak için koalisyon hükümetleri kurmalıdır
  - Demokratik dengeyi korumak için ekonomi politikaları liberal ve sosyalist yaklaşımlar arasında gidip gelmelidir
  - Dini ve felsefi doktrinler toplum için tek ve kapsamlı bir dünya görüşünde birleştirilmelidir
explanation: |
  Rawls'un örtüşen konsensüsü, birbiriyle uyuşmayan dini, felsefi veya ahlaki doktrinlere sahip insanların, her biri kendi inanç sistemleri içinden bu ilkeleri onaylayarak, yine de ortak siyasi adalet ilkeleri üzerinde birleşebileceğini göstermektedir.
  Bu kavram, farklı bakış açılarının ideolojik tekdüzelik gerektirmeden nasıl bir arada var olabileceğini göstererek merkezci felsefeyi somutlaştırmaktadır. Yanlış cevaplar bunu hükümet koalisyonları, politika değişimi veya birleşik dünya görüşleri gerektiriyormuş gibi göstermektedir ki bu Rawls'un ortak siyasi zemin bulurken doktrin çeşitliliğini sürdürme vurgusuyla çelişmektedir.
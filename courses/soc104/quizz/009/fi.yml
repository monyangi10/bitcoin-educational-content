question: Mitkä kaksi akselia muodostavat Nolan-kaavion?
answer: Taloudellinen vapaus ja henkilökohtainen vapaus
wrong_answers:
  - Vasemmisto-oikeisto ja autoritaarinen-demokraattinen
  - Konservatiivis-liberaalinen ja valtio-markkinapolitiikka
  - Yksilöllinen-kollektiivinen ja perinteinen-progressiivinen
explanation: |
  Nolanin kaavio rakentuu kahdelle erilliselle akselille: taloudellinen vapaus (kyky tehdä taloudellisia valintoja ilman hallituksen puuttumista) ja henkilökohtainen vapaus
  (yksilön vapaus henkilökohtaisissa asioissa). Tämä kaksiulotteinen lähestymistapa mahdollistaa poliittisten kantojen vivahteikkaamman esittämisen kuin perinteinen vasen-oikea -akseli. Muut vaihtoehdot edustavat erilaisia poliittisia käsitteitä, mutta ne eivät ole Nolanin suunnittelemassa kaaviossa käytettyjä akseleita.
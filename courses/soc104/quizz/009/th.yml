question: แกนสองแกนที่ประกอบกันเป็นแผนภาพโนแลนคืออะไร?
answer: เสรีภาพทางเศรษฐกิจและเสรีภาพส่วนบุคคล
wrong_answers:
  - ซ้าย-ขวา และเผด็จการ-ประชาธิปไตย
  - อนุรักษ์นิยม-เสรีนิยม และ รัฐ-ตลาด
  - บุคคล-ส่วนรวม และดั้งเดิม-ก้าวหน้า
explanation: |
  แผนภาพโนแลนถูกสร้างขึ้นบนแกนสองแกนที่แตกต่างกัน: เสรีภาพทางเศรษฐกิจ (ความสามารถในการตัดสินใจทางเศรษฐกิจโดยไม่มีการแทรกแซงจากรัฐบาล) และเสรีภาพส่วนบุคคล (เสรีภาพของบุคคลในเรื่องส่วนตัว) วิธีการสองมิตินี้ช่วยให้สามารถแสดงตำแหน่งทางการเมืองได้อย่างละเอียดมากขึ้นกว่าการใช้แกนซ้าย-ขวาแบบดั้งเดิม ตัวเลือกอื่น ๆ แสดงถึงแนวคิดทางการเมืองที่แตกต่างกันแต่ไม่ใช่แกนที่ใช้ในรูปแบบแผนภูมิเฉพาะของโนแลน
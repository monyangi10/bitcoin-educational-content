question: 놀란 다이어그램을 구성하는 두 축은 무엇인가요?
answer: 경제적 자유와 개인의 자유
wrong_answers:
  - 좌파-우파, 권위주의-민주주의
  - 보수적 자유주의 및 국가 시장
  - 개인-집단 및 전통적-진보적 접근 방식
explanation: |
  놀란 다이어그램은 경제적 자유(정부의 간섭 없이 경제적 선택을 할 수 있는 능력)와 개인적 자유
  (개인적인 문제에 대한 개인의 자유)입니다. 이 2차원적 접근 방식은 기존의 좌우 단일 축보다 정치적 입장을 더 미묘하게 표현할 수 있습니다. 다른 옵션은 다른 정치적 개념을 나타내지만 놀란의 특정 차트 디자인에 사용된 축은 아닙니다.
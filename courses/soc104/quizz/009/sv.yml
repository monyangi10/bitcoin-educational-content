question: Vilka är de två axlar som bildar Nolan-diagrammet?
answer: Ekonomisk frihet och personlig frihet
wrong_answers:
  - Vänster-höger och auktoritär-demokratisk
  - Konservativ-liberal och stat-marknad
  - Individuell-kollektiv och traditionell-progressiv
explanation: |
  Nolans diagram bygger på två olika axlar: ekonomisk frihet (möjligheten att göra ekonomiska val utan statlig inblandning) och personlig frihet
  (individuell frihet i personliga angelägenheter). Detta tvådimensionella tillvägagångssätt möjliggör en mer nyanserad representation av politiska ståndpunkter än den traditionella vänster-höger-axeln. De andra alternativen representerar olika politiska koncept men är inte de axlar som används i Nolans specifika diagramdesign.
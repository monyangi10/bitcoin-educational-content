question: Какие две оси образуют диаграмму Нолана?
answer: Экономическая свобода и свобода личности
wrong_answers:
  - Лево-правые и авторитарно-демократические
  - Консервативно-либеральная и государственно-рыночная
  - Индивидуально-коллективные и традиционно-прогрессивные
explanation: |
  Диаграмма Нолана построена на двух различных осях: экономическая свобода (возможность делать экономический выбор без вмешательства государства) и личная свобода
  (свобода личности в личных вопросах). Такой двухмерный подход позволяет более тонко представить политические позиции, чем традиционная ось "левый-правый". Другие варианты представляют различные политические концепции, но не являются осями, использованными в конкретной схеме Нолана.
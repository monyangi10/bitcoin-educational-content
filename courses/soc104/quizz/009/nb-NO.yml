question: Hva er de to aksene som danner Nolan-diagrammet?
answer: Økonomisk frihet og personlig frihet
wrong_answers:
  - Venstre-høyre og autoritær-demokratisk
  - Konservativ-liberal og stat-marked
  - Individuelt-kollektivt og tradisjonelt-progressivt
explanation: |
  Nolan-diagrammet er bygget opp rundt to distinkte akser: økonomisk frihet (muligheten til å ta økonomiske valg uten statlig innblanding) og personlig frihet
  (individuell frihet i personlige anliggender). Denne todimensjonale tilnærmingen gir en mer nyansert fremstilling av politiske standpunkter enn den tradisjonelle venstre-høyre-aksen. De andre alternativene representerer ulike politiske konsepter, men er ikke aksene som er brukt i Nolans spesifikke diagramdesign.
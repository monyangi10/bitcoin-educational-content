question: Apa saja dua poros yang membentuk diagram Nolan?
answer: Kebebasan ekonomi dan kebebasan pribadi
wrong_answers:
  - Kiri-kanan dan otoriter-demokratis
  - Konservatif-liberal dan pasar negara
  - Individu-kolektif dan tradisional-progresif
explanation: |
  Diagram Nolan dibangun di atas dua sumbu yang berbeda: kebebasan ekonomi (kemampuan untuk membuat pilihan ekonomi tanpa campur tangan pemerintah) dan kebebasan pribadi
  (kebebasan individu dalam masalah pribadi). Pendekatan dua dimensi ini memungkinkan representasi posisi politik yang lebih bernuansa dibandingkan dengan sumbu tunggal kiri-kanan tradisional. Opsi-opsi lain mewakili konsep politik yang berbeda tetapi bukan merupakan sumbu yang digunakan dalam desain bagan khusus Nolan.

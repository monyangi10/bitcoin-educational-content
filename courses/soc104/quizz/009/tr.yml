question: Nolan diyagramını oluşturan iki eksen nedir?
answer: Ekonomik özgürlük ve kişisel özgürlük
wrong_answers:
  - Sol-sağ ve otoriter-demokratik
  - Muhafazakar-liberal ve devlet-piyasa
  - Bireysel-kolektif ve geleneksel-ilerlemeci
explanation: |
  Nolan diyagramı iki farklı eksen üzerine inşa edilmiştir: ekonomik özgürlük (devlet müdahalesi olmadan ekonomik tercihler yapabilme yeteneği) ve kişisel özgürlük
  (kişisel konularda bireysel özgürlük). Bu iki boyutlu yaklaşım, siyasi pozisyonların geleneksel tek sol-sağ ekseninden daha incelikli bir şekilde temsil edilmesine olanak tanımaktadır. Diğer seçenekler farklı siyasi kavramları temsil etmektedir ancak Nolan'ın özel grafik tasarımında kullanılan eksenler değildir.
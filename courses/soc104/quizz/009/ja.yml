question: ノーラン線図を形成する2つの軸とは？
answer: 経済的自由と個人の自由
wrong_answers:
  - 左派-右派、権威主義-民主主義
  - 保守・リベラルと国家・市場
  - 個人-集団、伝統的-進歩的
explanation: |
  ノーラン・ダイアグラムは、経済的自由（政府の干渉を受けずに経済的な選択をする能力）と個人的自由（個人的な事柄に関する個人の自由）という2つの異なる軸で構成されている。
  (個人的な事柄における個人の自由）という2つの軸で構成されている。この2次元的なアプローチにより、従来の左右一本の軸よりも、政治的立場をよりニュアンス豊かに表現することができる。他の選択肢は異なる政治的概念を表しているが、ノーランの特定のチャートデザインで使用されている軸ではない。
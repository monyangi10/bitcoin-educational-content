question: Jakie dwie osie tworzą diagram Nolana?
answer: Wolność gospodarcza i wolność osobista
wrong_answers:
  - Lewica-prawica i autorytaryzm-demokracja
  - Konserwatywno-liberalny i państwowo-rynkowy
  - Indywidualno-kolektywny i tradycyjno-progresywny
explanation: |
  Diagram Nolana opiera się na dwóch odrębnych osiach: wolności gospodarczej (zdolność do dokonywania wyborów ekonomicznych bez ingerencji rządu) i wolności osobistej (indywidualna wolność w sprawach osobistych)
  (indywidualna wolność w sprawach osobistych). To dwuwymiarowe podejście pozwala na bardziej zniuansowane przedstawienie stanowisk politycznych niż tradycyjna pojedyncza oś lewica-prawica. Pozostałe opcje reprezentują różne koncepcje polityczne, ale nie są osiami używanymi w konkretnym projekcie wykresu Nolana.
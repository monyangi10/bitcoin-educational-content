question: नोलन आरेख को बनाने वाले दो अक्ष कौन से हैं?
answer: आर्थिक स्वतंत्रता और व्यक्तिगत स्वतंत्रता
wrong_answers:
  - वाम-दक्षिण और सत्तावादी-लोकतांत्रिक
  - रूढ़िवादी-उदारवादी और राज्य-बाजार
  - व्यक्तिगत-सामूहिक और पारंपरिक-प्रगतिशील
explanation: |
  नोलन आरेख दो अलग-अलग अक्षों पर आधारित है: आर्थिक स्वतंत्रता (सरकारी हस्तक्षेप के बिना आर्थिक निर्णय लेने की क्षमता) और व्यक्तिगत स्वतंत्रता
  (निजी मामलों में व्यक्तिगत स्वतंत्रता)। यह द्वि-आयामी दृष्टिकोण पारंपरिक एकल वाम-दक्षिण अक्ष की तुलना में राजनीतिक स्थितियों का अधिक सूक्ष्म प्रतिनिधित्व प्रदान करता है। अन्य विकल्प विभिन्न राजनीतिक अवधारणाओं का प्रतिनिधित्व करते हैं, लेकिन वे नोलन के विशिष्ट चार्ट डिज़ाइन में प्रयुक्त अक्ष नहीं हैं।
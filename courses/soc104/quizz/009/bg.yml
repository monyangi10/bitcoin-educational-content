question: Кои са двете оси, които образуват диаграмата на Нолан?
answer: Икономическа свобода и лична свобода
wrong_answers:
  - Ляво-дясно и авторитарно-демократично
  - Консервативно-либерални и държавно-пазарни
  - Индивидуално-колективно и традиционно-прогресивно
explanation: |
  Диаграмата на Нолан е изградена върху две различни оси: икономическа свобода (възможността да правиш икономически избор без намесата на държавата) и лична свобода
  (индивидуална свобода в личните дела). Този двуизмерен подход дава възможност за по-нюансирано представяне на политическите позиции в сравнение с традиционната единична ос ляво-дясно. Другите опции представят различни политически концепции, но не са осите, използвани в конкретния дизайн на графиката на Нолан.
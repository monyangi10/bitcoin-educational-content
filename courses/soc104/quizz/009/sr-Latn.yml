question: Koje su dve ose koje formiraju Nolanov dijagram?
answer: Ekonomska sloboda i lična sloboda
wrong_answers:
  - Levo-desno i autoritarno-demokratski
  - Konzervativno-liberalno i država-tržište
  - Individualno-kolektivno i tradicionalno-progresivno
explanation: |
  Nolanov dijagram je izgrađen na dve različite ose: ekonomska sloboda (sposobnost donošenja ekonomskih odluka bez mešanja vlade) i lična sloboda (individualna sloboda u ličnim stvarima). Ovaj dvodimenzionalni pristup omogućava nijansiraniju reprezentaciju političkih pozicija nego tradicionalna jedinstvena leva-desna osa. Druge opcije predstavljaju različite političke koncepte, ali nisu ose korišćene u specifičnom dizajnu Nolanovog dijagrama.
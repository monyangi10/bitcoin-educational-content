question: Hai trục nào tạo nên sơ đồ Nolan?
answer: Tự do kinh tế và tự do cá nhân
wrong_answers:
  - Cánh tả-cánh hữu và chế độ độc tài-dân chủ
  - Bảo thủ-tự do và nhà nước-thị trường
  - Cá nhân-tập thể và truyền thống-tiến bộ
explanation: |
  Sơ đồ Nolan được xây dựng trên hai trục riêng biệt: tự do kinh tế (khả năng đưa ra các lựa chọn kinh tế mà không bị chính phủ can thiệp) và tự do cá nhân (tự do cá nhân trong các vấn đề riêng tư). Cách tiếp cận hai chiều này cho phép thể hiện các quan điểm chính trị một cách tinh tế hơn so với trục trái-phải truyền thống. Các lựa chọn khác thể hiện các khái niệm chính trị khác nhau nhưng không phải là các trục được sử dụng trong thiết kế biểu đồ cụ thể của Nolan.
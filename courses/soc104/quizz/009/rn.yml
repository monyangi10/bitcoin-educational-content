question: Ni ibihe bice bibiri bikora igishushanyo ca Nolan?
answer: Umwidegemvyo mu vy'ubutunzi n'umwidegemvyo w'umuntu ku giti ciwe
wrong_answers:
  - Ibubamfu-iburyo n'ubutegetsi bw'agahomerabunwa-demokarasi
  - Abanyagihugu-abanyagihugu n'isoko rya Leta
  - Umuntu ku giti ciwe-rusangi n'imigenzo-itera imbere
explanation: |
  Igishushanyo ca Nolan cubatswe ku nzira zibiri zitandukanye: umwidegemvyo mu vy’ubutunzi (ubushobozi bwo guhitamwo mu vy’ubutunzi ata Leta yivangamwo) n’umwidegemvyo w’umuntu ku giti ciwe . 
  (umwidegemvyo w’umuntu ku giti ciwe mu bibazo vy’umuntu ku giti ciwe). Ubwo buryo bw’ingero zibiri buratuma umuntu ashobora guserukira neza ivyicaro vya politike kuruta uko vyari bimeze nk’uko vyari bisanzwe bigaragazwa n’umurongo umwe w’ibubamfu n’iburyo. Ibindi bihitamwo bigereranya ivyiyumviro bitandukanye vya politike ariko si vyo bikoreshwa mu guhingura urutonde rw’ibintu vyihariye vya Nolan.
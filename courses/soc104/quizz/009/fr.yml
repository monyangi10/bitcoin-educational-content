question: What are the two axes that form the Nolan diagram?
answer: Economic freedom and personal freedom
wrong_answers:
  - Left-right and authoritarian-democratic
  - Conservative-liberal and state-market
  - Individual-collective and traditional-progressive
explanation: |
  The Nolan diagram is built on two distinct axes: economic freedom (the ability to make economic choices without government interference) and personal freedom (individual liberty in personal matters). This two-dimensional approach allows for a more nuanced representation of political positions than the traditional single left-right axis. The other options represent different political concepts but are not the axes used in Nolan's specific chart design.

question: Wat zijn de twee assen die het Nolan-diagram vormen?
answer: Economische vrijheid en persoonlijke vrijheid
wrong_answers:
  - Links-rechts en autoritair-democratisch
  - Conservatief-liberaal en staat-markt
  - Individueel-collectief en traditioneel-progressief
explanation: |
  Het Nolan-diagram is gebaseerd op twee verschillende assen: economische vrijheid (de mogelijkheid om economische keuzes te maken zonder inmenging van de overheid) en persoonlijke vrijheid (individuele vrijheid in persoonlijke zaken)
  (individuele vrijheid in persoonlijke zaken). Deze tweedimensionale benadering maakt een meer genuanceerde weergave van politieke standpunten mogelijk dan de traditionele enkele links-rechts as. De andere opties vertegenwoordigen verschillende politieke concepten, maar zijn niet de assen die gebruikt zijn in Nolan's specifieke grafiekontwerp.
question: Wie lauten die beiden Achsen, die das Nolan-Diagramm bilden?
answer: Wirtschaftliche Freiheit und persönliche Freiheit
wrong_answers:
  - Links-rechts und autoritär-demokratisch
  - Konservativ-liberal und staatlich-marktwirtschaftlich
  - Individuell-kollektiv und traditionell-progressiv
explanation: |
  Das Nolan-Diagramm basiert auf zwei verschiedenen Achsen: wirtschaftliche Freiheit (die Fähigkeit, wirtschaftliche Entscheidungen ohne staatliche Einmischung zu treffen) und persönliche Freiheit
  (individuelle Freiheit in persönlichen Angelegenheiten). Dieser zweidimensionale Ansatz ermöglicht eine nuanciertere Darstellung politischer Positionen als die traditionelle Links-Rechts-Achse. Die anderen Optionen stehen für unterschiedliche politische Konzepte, sind aber nicht die Achsen, die in Nolans speziellem Diagramm verwendet werden.
question: ¿Cuáles son los dos ejes que forman el diagrama de Nolan?
answer: Libertad económica y libertad personal
wrong_answers:
  - Izquierda-derecha y autoritario-democrático
  - Conservador-liberal y Estado-mercado
  - Individual-colectivo y tradicional-progresivo
explanation: |
  El diagrama de Nolan se construye sobre dos ejes distintos: la libertad económica (la capacidad de tomar decisiones económicas sin interferencia del gobierno) y la libertad personal
  (libertad individual en asuntos personales). Este enfoque bidimensional permite una representación más matizada de las posiciones políticas que el tradicional eje único izquierda-derecha. Las otras opciones representan conceptos políticos diferentes, pero no son los ejes utilizados en el diseño específico del gráfico de Nolan.
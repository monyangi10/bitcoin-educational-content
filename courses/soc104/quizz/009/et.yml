question: Millised kaks telge moodustavad Nolani diagrammi?
answer: Majandusvabadus ja isikuvabadus
wrong_answers:
  - Vasak-parempoolne ja autoritaarne-demokraatlik
  - Konservatiiv-liberaalne ja riik-turg
  - Individuaalne-kollektiivne ja traditsioonilis-progressiivne
explanation: |
  Nolani diagramm on üles ehitatud kahele erinevale teljele: majanduslik vabadus (võime teha majanduslikke valikuid ilma valitsuse sekkumiseta) ja isikuvabadus
  (individuaalne vabadus isiklikes küsimustes). Selline kahemõõtmeline lähenemine võimaldab poliitiliste seisukohtade nüansirikkamat esitamist kui traditsiooniline vasak-parem telg. Teised valikud esindavad erinevaid poliitilisi kontseptsioone, kuid need ei ole Nolani konkreetses diagrammi kujunduses kasutatud teljed.
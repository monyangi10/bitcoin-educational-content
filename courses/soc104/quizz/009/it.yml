question: Quali sono i due assi che formano il diagramma di Nolan?
answer: Libertà economica e libertà personale
wrong_answers:
  - Sinistra-destra e autoritario-democratico
  - Conservatore-liberale e Stato-mercato
  - Individuale-collettivo e tradizionale-progressivo
explanation: |
  Il diagramma di Nolan si basa su due assi distinti: la libertà economica (la possibilità di fare scelte economiche senza interferenze governative) e la libertà personale (la libertà individuale nelle questioni personali)
  (libertà individuale nelle questioni personali). Questo approccio bidimensionale consente una rappresentazione più sfumata delle posizioni politiche rispetto al tradizionale asse unico sinistra-destra. Le altre opzioni rappresentano concetti politici diversi, ma non sono gli assi utilizzati nel disegno specifico del grafico di Nolan.
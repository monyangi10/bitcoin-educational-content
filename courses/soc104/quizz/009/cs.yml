question: Jaké dvě osy tvoří Nolanův diagram?
answer: Hospodářská a osobní svoboda
wrong_answers:
  - Levice-pravice a autoritářství-demokracie
  - Konzervativně-liberální a stát-trh
  - Individuálně-kolektivní a tradičně-progresivní
explanation: |
  Nolanův diagram je postaven na dvou různých osách: ekonomické svobodě (možnost činit ekonomická rozhodnutí bez zásahů státu) a osobní svobodě
  (osobní svoboda v osobních záležitostech). Tento dvourozměrný přístup umožňuje diferencovanější zobrazení politických postojů než tradiční jediná osa levice-pravice. Ostatní možnosti představují různé politické koncepty, ale nejsou osami použitými v Nolanově konkrétním návrhu grafu.
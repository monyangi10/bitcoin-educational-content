question: Quais são os dois eixos que formam o diagrama de Nolan?
answer: Liberdade económica e liberdade individual
wrong_answers:
  - Esquerda-direita e autoritário-democrático
  - Conservador-liberal e Estado-mercado
  - Individual-coletivo e tradicional-progressista
explanation: |
  O diagrama de Nolan assenta em dois eixos distintos: liberdade económica (a capacidade de fazer escolhas económicas sem interferência do governo) e liberdade pessoal
  (liberdade individual em questões pessoais). Esta abordagem bidimensional permite uma representação mais matizada das posições políticas do que o tradicional eixo único esquerda-direita. As outras opções representam conceitos políticos diferentes, mas não são os eixos utilizados na conceção específica do gráfico de Nolan.
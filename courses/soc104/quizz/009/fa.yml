question: دو محوری که نمودار نولان را تشکیل می‌دهند کدامند؟
answer: آزادی اقتصادی و آزادی شخصی
wrong_answers:
  - چپ-راست و اقتدارگرا-دموکراتیک
  - محافظه‌کار-لیبرال و دولت-بازار
  - فردی-جمعی و سنتی-پیشرو
explanation: |
  نمودار نولان بر روی دو محور متمایز ساخته شده است: آزادی اقتصادی (توانایی انجام انتخاب‌های اقتصادی بدون دخالت دولت) و آزادی شخصی (آزادی فردی در مسائل شخصی). این رویکرد دو بعدی امکان نمایش دقیق‌تری از مواضع سیاسی را نسبت به محور سنتی چپ-راست فراهم می‌کند. گزینه‌های دیگر نمایانگر مفاهیم سیاسی متفاوتی هستند اما محوری نیستند که در طراحی خاص نمودار نولان استفاده شده‌اند.
question: Ni shoka gani mbili zinazounda mchoro wa Nolan?
answer: Uhuru wa kiuchumi na uhuru wa kibinafsi
wrong_answers:
  - Kushoto-kulia na kimabavu-kidemokrasia
  - Wahafidhina-waliberali na soko la serikali
  - Mtu mmoja mmoja-wa pamoja na wa kitamaduni-wa kimaendeleo
explanation: |
  Mchoro wa Nolan umejengwa juu ya mihimili miwili tofauti: uhuru wa kiuchumi (uwezo wa kufanya maamuzi ya kiuchumi bila kuingiliwa na serikali) na uhuru wa kibinafsi (uhuru wa mtu binafsi katika masuala ya kibinafsi). Mbinu hii ya pande mbili inaruhusu uwakilishi wa misimamo ya kisiasa ulio na muktadha zaidi kuliko mhimili wa jadi wa kushoto-kulia. Chaguzi zingine zinawakilisha dhana tofauti za kisiasa lakini sio mihimili inayotumika katika muundo maalum wa chati wa Nolan.

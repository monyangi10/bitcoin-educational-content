question: Satoshi 나카모토의 철학에 따르면, Bitcoin은 기존 통화의 어떤 근본적인 문제를 해결하려고 하나요?
answer: 중앙 집중식 기관에 대한 과도한 신뢰는 역사적으로 통화 약세를 통해 그 신뢰를 위반했습니다
wrong_answers:
  - 국제 거래 지연을 야기하는 기존 결제 처리 시스템의 기술적 비효율성
  - 실물 화폐 생산이 환경에 미치는 영향과 기존 은행 인프라의 탄소 발자국
  - 현재 통화 정책의 수학적 복잡성으로 인해 시민들이 경제 결정을 이해하기 어렵습니다
explanation: |
  Satoshi 나카모토는 '기존 화폐의 근본적인 문제는 화폐를 작동시키는 데 필요한 모든 신뢰'이며 '법정화폐의 역사는 이러한 신뢰의 위반으로 가득 차 있다'고 명시적으로 언급했습니다.
  이 인용문은 Bitcoin의 핵심 목적, 즉 중앙은행이 화폐 가치를 떨어뜨리지 않도록 신뢰하지 않아도 된다는 점을 잘 드러냅니다. Genesis 블록의 은행 구제금융에 대한 언급은 이러한 제도적 실패에 대한 비판을 강화합니다. 오답은 기술, 환경 또는 복잡성 문제에 초점을 맞추고 있는데, 이는 잠재적으로 타당한 문제이기는 하지만 Bitcoin의 창시자가 명시한 근본적인 철학적 동기는 아닙니다.
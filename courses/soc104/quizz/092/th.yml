question: ตามปรัชญาของ Satoshi นากาโมโตะ ปัญหาพื้นฐานของสกุลเงินแบบดั้งเดิมที่ Bitcoin พยายามแก้ไขคืออะไร?
answer: ความไว้วางใจที่มากเกินไปที่จำเป็นในสถาบันที่รวมศูนย์ซึ่งในประวัติศาสตร์ได้ละเมิดความไว้วางใจนั้นผ่านการลดค่าเงิน
wrong_answers:
  - ความไม่มีประสิทธิภาพทางเทคนิคของระบบการประมวลผลการชำระเงินแบบดั้งเดิมที่ทำให้เกิดความล่าช้าในการทำธุรกรรมระหว่างประเทศ
  - ผลกระทบต่อสิ่งแวดล้อมจากการผลิตเงินสดและรอยเท้าคาร์บอนของโครงสร้างพื้นฐานธนาคารแบบดั้งเดิม
  - ความซับซ้อนทางคณิตศาสตร์ของนโยบายการเงินในปัจจุบันที่ทำให้ประชาชนเข้าใจการตัดสินใจทางเศรษฐกิจได้ยาก
explanation: |
  Satoshi Nakamoto ได้กล่าวไว้อย่างชัดเจนว่า 'ปัญหารากฐานของสกุลเงินแบบดั้งเดิมคือความไว้วางใจทั้งหมดที่จำเป็นในการทำให้มันทำงานได้' และว่า 'ประวัติศาสตร์ของสกุลเงินเฟียตเต็มไปด้วยการละเมิดความไว้วางใจนั้น' คำพูดนี้เผยให้เห็นวัตถุประสงค์หลักของ Bitcoin: การกำจัดความจำเป็นในการไว้วางใจธนาคารกลางไม่ให้ลดค่าเงิน การอ้างอิงถึงการช่วยเหลือธนาคารของ Genesis Block ตอกย้ำการวิจารณ์นี้เกี่ยวกับความล้มเหลวของสถาบัน คำตอบที่ผิดมุ่งเน้นไปที่ปัญหาทางเทคนิค สิ่งแวดล้อม หรือความซับซ้อน ซึ่งแม้จะเป็นข้อกังวลที่อาจถูกต้อง แต่ก็ไม่ใช่แรงจูงใจทางปรัชญาพื้นฐานเบื้องหลังการสร้าง Bitcoin ตามที่ผู้สร้างได้กล่าวไว้
question: Satoshi नाकामोतो के दर्शन के अनुसार, Bitcoin पारंपरिक मुद्राओं की किस मूलभूत समस्या को हल करने का प्रयास करता है?
answer: केंद्रीकृत संस्थानों पर अत्यधिक भरोसा करने की आवश्यकता होती है, जो ऐतिहासिक रूप से मुद्रा अवमूल्यन के माध्यम से उस भरोसे को तोड़ते रहे हैं।
wrong_answers:
  - परंपरागत भुगतान प्रसंस्करण प्रणालियों की तकनीकी अक्षमताएँ अंतर्राष्ट्रीय लेनदेन में देरी का कारण बनती हैं।
  - भौतिक मुद्रा उत्पादन का पर्यावरणीय प्रभाव और पारंपरिक बैंकिंग अवसंरचना का कार्बन फुटप्रिंट
  - वर्तमान मौद्रिक नीति की गणितीय जटिलता नागरिकों के लिए आर्थिक निर्णयों को समझना मुश्किल बना देती है।
explanation: |
  Satoshi के नाकामोतो ने स्पष्ट रूप से कहा था कि 'पारंपरिक मुद्रा की मूल समस्या वह सारा भरोसा है जो इसे कारगर बनाने के लिए आवश्यक है' और 'फिएट मुद्राओं का इतिहास उस भरोसे के उल्लंघन से भरा पड़ा है'।
  यह कथन Bitcoin के मूल उद्देश्य को उजागर करता है: मुद्रा का अवमूल्यन न करने के लिए केंद्रीय बैंकों पर भरोसा करने की आवश्यकता को समाप्त करना। Genesis ब्लॉक द्वारा बैंक बेलआउट का संदर्भ संस्थागत विफलताओं की इस आलोचना को और पुष्ट करता है। गलत उत्तर तकनीकी, पर्यावरणीय या जटिलता संबंधी मुद्दों पर केंद्रित हैं, जो कि संभावित रूप से वैध चिंताएँ होने के बावजूद, Bitcoin के निर्माण के पीछे का मूल दार्शनिक उद्देश्य नहीं थे, जैसा कि इसके निर्माता ने व्यक्त किया था।
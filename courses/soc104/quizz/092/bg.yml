question: Според философията на Satoshi Накамото какъв основен проблем на традиционните валути се опитва да реши Bitcoin?
answer: Прекомерното доверие в централизираните институции, които исторически нарушават това доверие чрез обезценяване на валутата
wrong_answers:
  - Техническата неефективност на традиционните системи за обработка на плащания, която води до забавяне на международните транзакции
  - Екологичното въздействие на производството на физическа валута и въглеродния отпечатък на традиционната банкова инфраструктура
  - Математическата сложност на настоящата парична политика, която затруднява гражданите да разбират икономическите решения
explanation: |
  Satoshi Nakamoto изрично заяви, че "основният проблем на конвенционалната валута е доверието, което се изисква, за да работи" и че "историята на фиатните валути е пълна с нарушения на това доверие".
  Този цитат разкрива основната цел на Bitcoin: премахване на необходимостта да се доверяваме на централните банки да не обезценяват валутата. Споменаването на банковите спасявания в блока Genesis подсилва тази критика на институционалните провали. Неправилните отговори се фокусират върху технически, екологични или сложни въпроси, които, макар и потенциално основателни, не са основната философска мотивация за създаването на Bitcoin, както е формулирана от неговия създател.
question: 根据 Satoshi Nakamoto 的理念，Bitcoin 试图解决传统货币的什么根本问题？
answer: 中央集权机构需要过度信任，而历史上这些机构通过货币贬值违背了这种信任
wrong_answers:
  - 传统支付处理系统技术效率低下，造成国际交易延迟
  - 实物货币生产对环境的影响和传统银行基础设施的碳足迹
  - 当前货币政策的数学复杂性使公民难以理解经济决策
explanation: |
  中本聪 Satoshi 明确指出，"传统货币的根本问题在于使其发挥作用所需的信任"，"法定货币的历史充满了对信任的破坏"。
  这句话揭示了 Bitcoin 的核心目的：消除对中央银行不贬值货币的信任。Genesis Block 提到的银行救助加强了对制度失灵的批判。错误答案集中在技术、环境或复杂性问题上，尽管这些问题可能是合理的，但并不是 Bitcoin 创造者所阐述的 Bitcoin 创造背后的根本哲学动机。
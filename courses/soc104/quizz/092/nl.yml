question: Welk fundamenteel probleem met conventionele valuta probeert Bitcoin op te lossen volgens de filosofie van Satoshi Nakamoto?
answer: Het buitensporige vertrouwen dat vereist is in gecentraliseerde instellingen die dat vertrouwen in het verleden hebben geschonden door devaluatie van de munteenheid
wrong_answers:
  - De technische inefficiëntie van traditionele betalingsverwerkingssystemen die leidt tot vertragingen bij internationale transacties
  - De milieu-impact van de productie van fysieke valuta en de koolstofvoetafdruk van de traditionele bankinfrastructuur
  - De mathematische complexiteit van het huidige monetaire beleid maakt het moeilijk voor burgers om economische beslissingen te begrijpen
explanation: |
  Satoshi Nakamoto verklaarde expliciet dat 'het kernprobleem van conventionele valuta al het vertrouwen is dat nodig is om het te laten werken' en dat 'de geschiedenis van fiatvaluta's vol zit met schendingen van dat vertrouwen'.
  Dit citaat onthult het kerndoel van Bitcoin: het elimineren van de noodzaak om centrale banken te vertrouwen dat ze valuta niet debiteren. De verwijzing in het Genesis blok naar reddingsoperaties voor banken versterkt deze kritiek op institutioneel falen. De foute antwoorden richten zich op technische, milieu- of complexiteitskwesties die, hoewel ze mogelijk terecht zijn, niet de fundamentele filosofische motivatie waren achter de creatie van Bitcoin, zoals verwoord door de maker.
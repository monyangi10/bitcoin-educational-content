question: بر اساس فلسفه Satoshi ناکاموتو، Bitcoin تلاش می‌کند چه مشکل اساسی‌ای را که در ارزهای متعارف وجود دارد، حل کند؟
answer: اعتماد بیش از حد به نهادهای متمرکز که به طور تاریخی با کاهش ارزش ارز آن اعتماد را نقض می‌کنند
wrong_answers:
  - ناکارآمدی فنی سیستم‌های پردازش پرداخت سنتی که باعث ایجاد تأخیر در تراکنش‌های بین‌المللی می‌شوند
  - تأثیرات زیست‌محیطی تولید ارز فیزیکی و ردپای کربنی زیرساخت‌های بانکی سنتی
  - پیچیدگی ریاضی سیاست پولی کنونی که درک تصمیمات اقتصادی را برای شهروندان دشوار می‌سازد
explanation: |
  Satoshi ناکاموتو به‌صراحت بیان کرد که «مشکل اصلی با ارزهای سنتی، تمام اعتمادی است که برای کارکرد آن‌ها لازم است» و اینکه «تاریخ ارزهای فیات پر از نقض آن اعتماد است». این نقل‌قول هدف اصلی Bitcoin را آشکار می‌کند: حذف نیاز به اعتماد به بانک‌های مرکزی برای کاهش ارزش ارز. اشاره به کمک‌های مالی بانک‌ها در بلوک Genesis این انتقاد از شکست‌های نهادی را تقویت می‌کند. پاسخ‌های نادرست بر مسائل فنی، زیست‌محیطی یا پیچیدگی تمرکز دارند که اگرچه ممکن است نگرانی‌های معتبری باشند، اما انگیزه فلسفی اساسی پشت ایجاد Bitcoin نبودند، همان‌طور که توسط خالق آن بیان شده است.
question: 根據 Satoshi Nakamoto 的哲學，Bitcoin 試圖解決傳統貨幣的什麼基本問題？
answer: 中央集权机构需要过度信任，而历史上这些机构通过货币贬值破坏了这种信任
wrong_answers:
  - 傳統付款處理系統技術效率低，造成國際交易延遲
  - 實體貨幣生產對環境的影響以及傳統銀行基礎設施的碳足跡
  - 現行貨幣政策的數學複雜性，使民眾難以理解經濟決策
explanation: |
  Satoshi Nakamoto 明確表示，「傳統貨幣的根本問題在於需要信任才能運作」，而且「法定貨幣的歷史充滿了違反信任的情況」。
  這句話揭示了 Bitcoin 的核心目的：消除信任中央銀行不會使貨幣貶值的必要性。Genesis Block 對銀行救助的引用加強了這種對制度失效的批判。錯誤答案的重點在於技術、環境或複雜性問題，這些問題雖然可能是合理的疑慮，但卻不是 Bitcoin 創造者所闡述的 Bitcoin 創造背後的基本哲學動機。
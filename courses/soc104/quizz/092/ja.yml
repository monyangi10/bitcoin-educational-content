question: Satoshiナカモトの哲学によれば、Bitcoinは従来の通貨のどのような根本的な問題を解決しようとしているのか？
answer: 中央集権的な機関への過度の信頼が必要であり、歴史的に通貨安によってその信頼が損なわれてきた。
wrong_answers:
  - 国際取引に遅延を生じさせる従来の支払処理システムの技術的非効率性
  - 現物通貨生産が環境に与える影響と、伝統的な銀行インフラの二酸化炭素排出量
  - 現在の金融政策の数学的な複雑さが、市民が経済決定を理解することを困難にしている。
explanation: |
  Satoshiナカモトは、「従来の通貨の根本的な問題は、通貨を機能させるために必要なすべての信頼にある」、「不換紙幣の歴史は、その信頼に対する違反でいっぱいだ」と明言している。
  この引用は、Bitcoinの中核的な目的である、中央銀行が通貨を兌換しないように信頼する必要性を排除することを明らかにしている。Genesisブロックの銀行救済への言及は、制度的失敗に対するこの批判を補強している。誤答は、技術的、環境的、あるいは複雑性の問題に焦点を当てているが、それは潜在的には妥当な懸念ではあっても、Bitcoin創設者が明言したBitcoin創設の根本的な哲学的動機ではなかった。
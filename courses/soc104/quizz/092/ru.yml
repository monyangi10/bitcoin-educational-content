question: Согласно философии Satoshi Накамото, какую фундаментальную проблему обычных валют пытается решить Bitcoin?
answer: Чрезмерное доверие к централизованным институтам, которые исторически нарушают это доверие путем обесценивания валюты
wrong_answers:
  - Техническая неэффективность традиционных систем обработки платежей, которая приводит к задержкам при проведении международных транзакций
  - Воздействие на окружающую среду производства физической валюты и углеродный след традиционной банковской инфраструктуры
  - Математическая сложность текущей монетарной политики, которая затрудняет понимание экономических решений гражданами
explanation: |
  Satoshi Накамото прямо заявил, что "корневая проблема обычной валюты заключается в доверии, которое необходимо для того, чтобы она работала", и что "история фиатных валют полна нарушений этого доверия".
  Эта цитата раскрывает основную цель Bitcoin: устранить необходимость доверять центральным банкам в том, что они не будут обесценивать валюту. Ссылка блока Genesis на спасение банков усиливает эту критику институциональных провалов. Неправильные ответы сосредоточены на технических, экологических или сложных вопросах, которые, хотя и являются потенциально обоснованными, не были фундаментальной философской мотивацией создания Bitcoin, сформулированной его создателем.
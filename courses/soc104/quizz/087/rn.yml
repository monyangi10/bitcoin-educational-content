question: Dukurikije ico canditswe, ni ingingo ngenderwako iyihe y’ishimikiro itandukanya iciyumviro ca Karl Popper c’ikibano gifunguye n’ikibano gipfutse?
answer: Imiryango yuguruye ituma umuntu ashobora guca urubanza mu buryo bubereye kandi akagira inshingano ziwe bwite, mu gihe imiryango yugarijwe yanse umwidegemvyo w’umuntu ku giti ciwe wo kunegura no guhanahana amakuru n’abandi .
wrong_answers:
  - Amashirahamwe yuguruye ashira imbere umwidegemvyo w’ubutunzi n’uburyo bwo gutanga isoko, mu gihe amashirahamwe yugarijwe ashimika ku kugenzura kwa Leta ku bijanye n’uguhingura n’ugukwiragiza .
  - Imiryango yuguruye ishingiye ku buryo bwo gutora bwa demokarasi n’ubutegetsi bw’abantu benshi, mu gihe imiryango yugarijwe ishingiye ku burongozi bw’agahomerabunwa n’imiterere y’ubutegetsi bw’ubukuru .
  - Amashirahamwe yuguruye arateza imbere iterambere ry’ubuhinga n’iterambere ry’ubuhinga, mu gihe amashirahamwe yugarijwe aguma akoresha uburyo bwa kera kandi akarwanya ubuhinga bushasha .
explanation: |
  Itandukaniro rya Popper rishingiye ku nyifato nyamukuru yerekeye ivyiyumviro vy’umuntu ku giti ciwe be n’ugufata ingingo. 
  Imiryango yuguruye irangwa n’ubushobozi bw’umuntu ku giti ciwe bwo guca urubanza mu buryo bubereye n’inshingano z’umuntu ku giti ciwe, akakira ihinduka, ubudasa, n’uguhanahana amakuru n’ivyo hanze. Ibihugu vyugarijwe, ku rundi ruhande, biranka umwidegemvyo w’umuntu ku giti ciwe wo guca imanza, biratinya ihinduka, kandi bikaguma bifise ivyiyumviro bihoraho, vy’imiryango bihagarika inshingano z’umuntu ku giti ciwe kugira ngo bishigikire uguhuza n’urutonde rw’imigenzo.
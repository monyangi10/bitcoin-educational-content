question: Jaký základní princip podle textu odlišuje koncept otevřené společnosti Karla Poppera od uzavřené společnosti?
answer: Otevřené společnosti umožňují jednotlivcům kritický úsudek a osobní odpovědnost, zatímco uzavřené společnosti odmítají individuální svobodu kritiky a vnější výměny názorů
wrong_answers:
  - Otevřené společnosti upřednostňují ekonomickou svobodu a tržní mechanismy, zatímco uzavřené společnosti kladou důraz na státní kontrolu nad výrobou a distribucí
  - Otevřené společnosti jsou založeny na demokratických volebních systémech a vládě většiny, zatímco uzavřené společnosti se spoléhají na autoritářské vedení a hierarchické velitelské struktury
  - Otevřené společnosti podporují technologický pokrok a vědecký pokrok, zatímco uzavřené společnosti udržují tradiční metody a brání se inovacím
explanation: |
  Popperovo rozlišení se soustředí na základní postoj k individuálnímu kritickému myšlení a osobnímu rozhodování.
  Otevřené společnosti se vyznačují schopností jednotlivců uplatňovat kritický úsudek a osobní odpovědnost, přijímat změny, rozmanitost a vnější výměnu. Uzavřené společnosti naopak odmítají individuální kritickou svobodu, obávají se změn a udržují statickou, kmenovou mentalitu, která potlačuje individuální odpovědnost ve prospěch kolektivní konformity a tradičního řádu.
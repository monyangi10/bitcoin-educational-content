question: 根据课文内容，卡尔-波普尔的开放社会概念与封闭社会概念的基本原则是什么？
answer: 开放的社会使个人能够作出批判性判断并承担个人责任，而封闭的社会则拒绝个人的批评自由和对外交流
wrong_answers:
  - 开放社会优先考虑经济自由和市场机制，而封闭社会则强调国家对生产和分配的控制
  - 开放型社会以民主投票制度和少数服从多数为基础，而封闭型社会则依靠专制领导和等级指挥结构
  - 开放的社会促进技术进步和科学发展，而封闭的社会则保持传统方法，抵制创新
explanation: |
  波普尔的区别集中体现在对个人批判性思维和个人决策的基本态度上。
  开放社会的特点是个人能够行使批判性判断和承担个人责任，拥抱变化、多样性和外部交流。相反，封闭社会则拒绝个人的批判自由，惧怕变革，并保持静态的部落心态，压制个人责任感，而倾向于集体服从和传统秩序。
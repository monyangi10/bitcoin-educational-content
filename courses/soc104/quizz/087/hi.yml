question: पाठ के अनुसार, कौन सा मूलभूत सिद्धांत कार्ल पॉपर की खुली समाज की अवधारणा को बंद समाज से अलग करता है?
answer: खुले समाज व्यक्तियों को आलोचनात्मक निर्णय लेने और व्यक्तिगत जिम्मेदारी निभाने में सक्षम बनाते हैं, जबकि बंद समाज आलोचना और बाहरी आदान-प्रदान की व्यक्तिगत स्वतंत्रता को अस्वीकार करते हैं।
wrong_answers:
  - खुले समाजों में आर्थिक स्वतंत्रता और बाजार तंत्र को प्राथमिकता दी जाती है, जबकि बंद समाजों में उत्पादन और वितरण पर राज्य के नियंत्रण पर जोर दिया जाता है।
  - खुले समाज लोकतांत्रिक मतदान प्रणाली और बहुमत शासन पर आधारित होते हैं, जबकि बंद समाज सत्तावादी नेतृत्व और पदानुक्रमित कमान संरचनाओं पर निर्भर करते हैं।
  - खुले समाज तकनीकी उन्नति और वैज्ञानिक प्रगति को बढ़ावा देते हैं, जबकि बंद समाज पारंपरिक तरीकों को बनाए रखते हैं और नवाचार का विरोध करते हैं।
explanation: |
  पॉपर का यह भेद व्यक्तिगत आलोचनात्मक चिंतन और व्यक्तिगत निर्णय लेने के प्रति मूलभूत दृष्टिकोण पर केंद्रित है।
  खुले समाजों की विशेषता यह है कि व्यक्ति आलोचनात्मक निर्णय लेने और व्यक्तिगत जिम्मेदारी निभाने में सक्षम होते हैं, और परिवर्तन, विविधता और बाहरी आदान-प्रदान को स्वीकार करते हैं। इसके विपरीत, बंद समाज व्यक्तिगत आलोचनात्मक स्वतंत्रता को अस्वीकार करते हैं, परिवर्तन से डरते हैं, और स्थिर, कबीले जैसी मानसिकता बनाए रखते हैं जो सामूहिक अनुरूपता और पारंपरिक व्यवस्था के पक्ष में व्यक्तिगत जिम्मेदारी को दबा देती है।
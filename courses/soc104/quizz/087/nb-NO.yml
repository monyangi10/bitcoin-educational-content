question: Hvilket grunnleggende prinsipp skiller Karl Poppers begrep om et åpent samfunn fra et lukket samfunn, ifølge teksten?
answer: Åpne samfunn gir den enkelte mulighet til å utøve kritisk dømmekraft og ta personlig ansvar, mens lukkede samfunn avviser individuell frihet til kritikk og utveksling med omverdenen
wrong_answers:
  - Åpne samfunn prioriterer økonomisk frihet og markedsmekanismer, mens lukkede samfunn legger vekt på statlig kontroll over produksjon og distribusjon
  - Åpne samfunn er basert på demokratiske valgsystemer og flertallsstyre, mens lukkede samfunn baserer seg på autoritært lederskap og hierarkiske kommandostrukturer
  - Åpne samfunn fremmer teknologiske fremskritt og vitenskapelig utvikling, mens lukkede samfunn opprettholder tradisjonelle metoder og motarbeider innovasjon
explanation: |
  Poppers distinksjon dreier seg om den grunnleggende holdningen til individuell kritisk tenkning og personlig beslutningstaking.
  Åpne samfunn kjennetegnes av individers evne til å utøve kritisk dømmekraft og personlig ansvar, og de omfavner forandring, mangfold og utveksling med omverdenen. Lukkede samfunn, derimot, avviser individuell kritisk frihet, frykter forandring og opprettholder en statisk stammementalitet som undertrykker individuelt ansvar til fordel for kollektiv konformitet og tradisjonell orden.
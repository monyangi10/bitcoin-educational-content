question: Menurut teks tersebut, prinsip fundamental apa yang membedakan konsep Karl Popper tentang masyarakat terbuka dengan masyarakat tertutup?
answer: Masyarakat terbuka memungkinkan individu untuk melakukan penilaian kritis dan tanggung jawab pribadi, sementara masyarakat tertutup menolak kebebasan individu untuk mengkritik dan melakukan pertukaran eksternal
wrong_answers:
  - Masyarakat terbuka memprioritaskan kebebasan ekonomi dan mekanisme pasar, sementara masyarakat tertutup menekankan kontrol negara atas produksi dan distribusi
  - Masyarakat terbuka didasarkan pada sistem pemungutan suara yang demokratis dan aturan mayoritas, sementara masyarakat tertutup mengandalkan kepemimpinan otoriter dan struktur komando hirarkis
  - Masyarakat terbuka mendorong kemajuan teknologi dan kemajuan ilmiah, sementara masyarakat tertutup mempertahankan metode tradisional dan menolak inovasi
explanation: |
  Perbedaan Popper berpusat pada sikap mendasar terhadap pemikiran kritis individu dan pengambilan keputusan pribadi.
  Masyarakat terbuka dicirikan oleh kemampuan individu untuk melakukan penilaian kritis dan tanggung jawab pribadi, merangkul perubahan, keragaman, dan pertukaran eksternal. Sebaliknya, masyarakat tertutup menolak kebebasan kritis individu, takut akan perubahan, dan mempertahankan mentalitas kesukuan yang statis yang menekan tanggung jawab individu demi kesesuaian kolektif dan tatanan tradisional.
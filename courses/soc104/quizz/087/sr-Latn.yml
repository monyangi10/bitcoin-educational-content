question: Prema tekstu, koji fundamentalni princip razlikuje koncept otvorenog društva Karla Poppera od zatvorenog društva?
answer: Otvorena društva omogućavaju pojedincima da koriste kritičko rasuđivanje i ličnu odgovornost, dok zatvorena društva odbacuju individualnu slobodu kritike i spoljne razmene.
wrong_answers:
  - Otvorena društva daju prioritet ekonomskoj slobodi i tržišnim mehanizmima, dok zatvorena društva naglašavaju državnu kontrolu nad proizvodnjom i distribucijom.
  - Otvorena društva zasnivaju se na demokratskim sistemima glasanja i vladavini većine, dok se zatvorena društva oslanjaju na autoritarno vođstvo i hijerarhijske komandne strukture.
  - Otvorena društva promovišu tehnološki napredak i naučni progres, dok zatvorena društva održavaju tradicionalne metode i opiru se inovacijama.
explanation: |
  Popperova distinkcija se fokusira na osnovni stav prema individualnom kritičkom razmišljanju i ličnom donošenju odluka. Otvorena društva karakteriše sposobnost pojedinaca da primenjuju kritičku prosudbu i ličnu odgovornost, prihvatajući promene, raznolikost i spoljne razmene. Zatvorena društva, nasuprot tome, odbacuju individualnu kritičku slobodu, plaše se promena i održavaju statične, plemenske mentalitete koji potiskuju individualnu odgovornost u korist kolektivnog konformizma i tradicionalnog poretka.
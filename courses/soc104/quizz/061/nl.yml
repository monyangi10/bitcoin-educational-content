question: Wat is volgens de analyse van Hannah Arendt het hoofddoel van totalitaire opvoeding?
answer: Het vernietigen van het vermogen van mensen om onafhankelijke overtuigingen te vormen in plaats van het bijbrengen van specifieke overtuigingen
wrong_answers:
  - De ideologie en politieke kernwaarden van het regime efficiënt overbrengen op de bevolking
  - Een hoogopgeleide beroepsbevolking creëren die de economische doelstellingen van de staat kan ondersteunen
  - Analfabetisme uitroeien en iedereen toegang geven tot basisonderwijs
explanation: |
  Hannah Arendt stelde dat het doel van totalitair onderwijs niet het bijbrengen van overtuigingen was, maar het vernietigen van het vermogen om onafhankelijke overtuigingen te vormen.
  Dit onderscheidt totalitaire systemen van andere autoritaire regimes die simpelweg hun ideologie willen opleggen. Door het vermogen tot kritisch denken te vernietigen, creëren totalitaire regimes bevolkingen die niet in staat zijn tot onafhankelijke politieke actie, wat hun doel van totale controle over de samenleving dient en potentiële oppositie elimineert.
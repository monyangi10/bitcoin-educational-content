question: ตามการวิเคราะห์ของ Hannah Arendt เป้าหมายหลักของการศึกษาภายใต้ระบอบเผด็จการคืออะไร?
answer: เพื่อทำลายความสามารถของผู้คนในการสร้างความเชื่อมั่นอย่างอิสระแทนที่จะปลูกฝังความเชื่อเฉพาะเจาะจง
wrong_answers:
  - เพื่อถ่ายทอดอุดมการณ์และค่านิยมทางการเมืองหลักของระบอบการปกครองไปยังประชากรอย่างมีประสิทธิภาพ
  - เพื่อสร้างแรงงานที่มีการศึกษาสูงซึ่งสามารถสนับสนุนวัตถุประสงค์ทางเศรษฐกิจของรัฐ
  - เพื่อขจัดการไม่รู้หนังสือและสร้างการเข้าถึงโอกาสทางการศึกษาขั้นพื้นฐานอย่างทั่วถึง
explanation: |
  ฮันนาห์ อาเรนดท์ โต้แย้งว่า จุดประสงค์ของการศึกษาภายใต้ระบอบเผด็จการเบ็ดเสร็จไม่ใช่เพื่อปลูกฝังความเชื่อมั่น แต่เพื่อทำลายความสามารถในการสร้างความเชื่อมั่นที่เป็นอิสระใดๆ
  
  สิ่งนี้ทำให้ระบบเผด็จการเบ็ดเสร็จแตกต่างจากระบอบเผด็จการอื่นๆ ที่เพียงต้องการบังคับใช้ลัทธิของตน โดยการทำลายความสามารถในการคิดวิเคราะห์ ระบอบเผด็จการเบ็ดเสร็จสร้างประชากรที่ไม่สามารถดำเนินการทางการเมืองอย่างอิสระ ซึ่งสนับสนุนเป้าหมายของการควบคุมสังคมอย่างสมบูรณ์และกำจัดการต่อต้านที่อาจเกิดขึ้น
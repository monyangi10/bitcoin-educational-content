question: Hannah Arendt'in analizine göre totaliter eğitimin temel amacı nedir?
answer: Belirli inançları aşılamaktan ziyade insanların bağımsız kanaatler oluşturma yeteneğini yok etmek
wrong_answers:
  - Rejimin ideolojisini ve temel siyasi değerlerini halka etkin bir şekilde aktarmak
  - Eyaletin ekonomik hedeflerini destekleyebilecek yüksek eğitimli bir işgücü oluşturmak
  - Okuma yazma bilmeyenlerin sayısının azaltılması ve temel eğitim fırsatlarına evrensel erişimin sağlanması
explanation: |
  Hannah Arendt, totaliter eğitimin amacının inanç aşılamak değil, bağımsız inanç oluşturma yetisini yok etmek olduğunu savunmuştur.
  Bu, totaliter sistemleri, sadece ideolojilerini empoze etmek isteyen diğer otoriter rejimlerden ayırır. Totaliter rejimler, eleştirel düşünme yetilerini yok ederek, bağımsız siyasi eylemde bulunmaktan aciz nüfuslar yaratır, bu da toplum üzerindeki tam kontrol hedeflerine hizmet eder ve potansiyel muhalefeti ortadan kaldırır.
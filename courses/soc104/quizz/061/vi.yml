question: Theo phân tích của Hannah Arendt, mục tiêu chính của nền giáo dục toàn trị là gì?
answer: Mục đích là phá hủy khả năng hình thành niềm tin độc lập của mọi người hơn là gieo rắc những niềm tin cụ thể.
wrong_answers:
  - Nhằm truyền tải hiệu quả hệ tư tưởng và các giá trị chính trị cốt lõi của chế độ đến người dân.
  - Nhằm tạo ra một lực lượng lao động có trình độ học vấn cao, đáp ứng được các mục tiêu kinh tế của tiểu bang.
  - Xóa mù chữ và thiết lập cơ hội tiếp cận giáo dục cơ bản cho tất cả mọi người.
explanation: |
  Hannah Arendt lập luận rằng mục đích của nền giáo dục toàn trị không phải là gieo rắc niềm tin mà là phá hủy khả năng hình thành bất kỳ niềm tin độc lập nào.
  
  Điều này phân biệt các hệ thống toàn trị với các chế độ độc tài khác chỉ đơn thuần muốn áp đặt hệ tư tưởng của chúng. Bằng cách phá hủy khả năng tư duy phản biện, các chế độ toàn trị tạo ra những người dân không có khả năng hành động chính trị độc lập, điều này phục vụ mục tiêu kiểm soát hoàn toàn xã hội và loại bỏ phe đối lập tiềm tàng.
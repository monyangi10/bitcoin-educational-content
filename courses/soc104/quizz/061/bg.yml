question: Каква е основната цел на тоталитарното образование според анализа на Хана Арендт?
answer: Да се унищожи способността на хората да формират независими убеждения, а не да се внушават конкретни вярвания
wrong_answers:
  - Ефективно предаване на идеологията на режима и основните политически ценности на населението
  - Създаване на високообразована работна сила, способна да подкрепя икономическите цели на щата
  - Премахване на неграмотността и осигуряване на универсален достъп до основни образователни възможности
explanation: |
  Хана Аренд твърди, че целта на тоталитарното образование не е да внуши убеждения, а да унищожи способността за формиране на независими убеждения.
  Това отличава тоталитарните системи от другите авторитарни режими, които просто искат да наложат своята идеология. Унищожавайки способността за критично мислене, тоталитарните режими създават население, неспособно на независими политически действия, което служи на целта им за тотален контрол над обществото и елиминира потенциалната опозиция.
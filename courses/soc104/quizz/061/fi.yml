question: Mikä on Hannah Arendtin analyysin mukaan totalitaarisen kasvatuksen ensisijainen tavoite?
answer: Tuhota ihmisten kyky muodostaa itsenäisiä vakaumuksia sen sijaan, että iskostettaisiin tiettyjä uskomuksia
wrong_answers:
  - Hallituksen ideologian ja keskeisten poliittisten arvojen tehokas välittäminen väestölle
  - Luoda korkeasti koulutettua työvoimaa, joka kykenee tukemaan valtion taloudellisia tavoitteita
  - Lukutaidottomuuden poistaminen ja peruskoulutusmahdollisuuksien tarjoaminen kaikille
explanation: |
  Hannah Arendt väitti, että totalitaarisen kasvatuksen tarkoituksena ei ollut opettaa vakaumuksia vaan tuhota kyky muodostaa itsenäisiä vakaumuksia.
  Tämä erottaa totalitaariset järjestelmät muista autoritaarisista järjestelmistä, jotka haluavat vain tyrkyttää ideologiaansa. Tuhoamalla kriittisen ajattelun kyvyt totalitaariset järjestelmät luovat väestöä, joka ei kykene itsenäiseen poliittiseen toimintaan, mikä palvelee niiden tavoitetta yhteiskunnan täydellisestä hallinnasta ja eliminoi mahdollisen opposition.
question: De acordo com a análise de Hannah Arendt, qual é o principal objetivo da educação totalitária?
answer: Destruir a capacidade das pessoas para formarem convicções independentes, em vez de incutir crenças específicas
wrong_answers:
  - Transmitir eficazmente a ideologia e os valores políticos fundamentais do regime à população
  - Criar uma força de trabalho altamente qualificada capaz de apoiar os objectivos económicos do Estado
  - Eliminar o analfabetismo e estabelecer o acesso universal a oportunidades de educação básica
explanation: |
  Hannah Arendt argumentou que o objetivo da educação totalitária não era incutir convicções, mas destruir a faculdade de formar quaisquer convicções independentes.
  Este facto distingue os sistemas totalitários de outros regimes autoritários que apenas pretendem impor a sua ideologia. Ao destruírem as capacidades de pensamento crítico, os regimes totalitários criam populações incapazes de uma ação política independente, o que serve o seu objetivo de controlo total sobre a sociedade e elimina a potencial oposição.
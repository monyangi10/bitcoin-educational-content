question: Según el análisis de Hannah Arendt, ¿cuál es el objetivo principal de la educación totalitaria?
answer: Destruir la capacidad de las personas para formarse convicciones independientes en lugar de inculcar creencias específicas
wrong_answers:
  - Transmitir eficazmente a la población la ideología y los valores políticos fundamentales del régimen
  - Crear una mano de obra altamente cualificada capaz de respaldar los objetivos económicos del Estado
  - Eliminar el analfabetismo y establecer el acceso universal a las oportunidades educativas básicas
explanation: |
  Hannah Arendt sostenía que el propósito de la educación totalitaria no era inculcar convicciones, sino destruir la facultad de formarse otras independientes.
  Esto distingue a los sistemas totalitarios de otros regímenes autoritarios que simplemente quieren imponer su ideología. Al destruir la capacidad de pensamiento crítico, los regímenes totalitarios crean poblaciones incapaces de una acción política independiente, lo que sirve a su objetivo de control total de la sociedad y elimina la oposición potencial.
question: Enligt Hannah Arendts analys, vad är det primära målet med totalitär utbildning?
answer: Att förstöra människors förmåga att bilda självständiga övertygelser snarare än att inpränta specifika trosuppfattningar
wrong_answers:
  - Att på ett effektivt sätt förmedla regimens ideologi och politiska kärnvärden till befolkningen
  - Att skapa en högutbildad arbetskraft som kan stödja delstatens ekonomiska mål
  - Att eliminera analfabetism och skapa allmän tillgång till grundläggande utbildningsmöjligheter
explanation: |
  Hannah Arendt hävdade att syftet med totalitär utbildning inte var att ingjuta övertygelser utan att förstöra förmågan att bilda några självständiga sådana.
  Detta skiljer totalitära system från andra auktoritära regimer som bara vill införa sin ideologi. Genom att förstöra förmågan till kritiskt tänkande skapar totalitära regimer befolkningar som är oförmögna till självständig politisk handling, vilket tjänar deras mål om total kontroll över samhället och eliminerar potentiell opposition.
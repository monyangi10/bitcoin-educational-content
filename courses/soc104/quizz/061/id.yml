question: Menurut analisis Hannah Arendt, apa tujuan utama dari pendidikan totaliter?
answer: Menghancurkan kemampuan orang untuk membentuk keyakinan independen dan bukannya menanamkan keyakinan tertentu
wrong_answers:
  - Untuk mentransmisikan ideologi rezim dan nilai-nilai politik inti secara efisien kepada masyarakat
  - Menciptakan tenaga kerja berpendidikan tinggi yang mampu mendukung tujuan ekonomi negara
  - Memberantas buta huruf dan membangun akses universal terhadap kesempatan pendidikan dasar
explanation: |
  Hannah Arendt berpendapat bahwa tujuan pendidikan totaliter bukanlah untuk menanamkan keyakinan, melainkan untuk menghancurkan kemampuan untuk membentuk keyakinan yang independen.
  Hal ini membedakan sistem totaliter dengan rezim otoriter lainnya yang hanya ingin memaksakan ideologi mereka. Dengan menghancurkan kemampuan berpikir kritis, rezim totaliter menciptakan populasi yang tidak mampu melakukan tindakan politik yang independen, yang melayani tujuan mereka untuk mengontrol masyarakat secara total dan menghilangkan potensi oposisi.
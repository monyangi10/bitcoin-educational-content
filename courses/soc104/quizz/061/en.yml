question: According to Hannah Arendt's analysis, what is the primary goal of totalitarian education?
answer: To destroy people's ability to form independent convictions rather than to instill specific beliefs
wrong_answers:
  - "To efficiently transmit the regime's ideology and core political values to the population"
  - "To create a highly educated workforce capable of supporting the state's economic objectives"
  - To eliminate illiteracy and establish universal access to basic educational opportunities
explanation: |
  Hannah Arendt argued that totalitarian education's purpose was not to inculcate convictions but to destroy the faculty of forming any independent ones. This distinguishes totalitarian systems from other authoritarian regimes that simply want to impose their ideology. By destroying critical thinking abilities, totalitarian regimes create populations incapable of independent political action, which serves their goal of total control over society and eliminates potential opposition.
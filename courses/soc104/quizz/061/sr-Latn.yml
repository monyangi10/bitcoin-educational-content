question: Prema analizi Hannah Arendt, primarni cilj totalitarne edukacije je oblikovanje pojedinaca koji su potpuno lojalni režimu i nesposobni za kritičko razmišljanje.
answer: Da uništi sposobnost ljudi da formiraju nezavisna uverenja, a ne da usade specifična verovanja
wrong_answers:
  - Da efikasno prenese ideologiju režima i osnovne političke vrednosti populaciji
  - Da se stvori visoko obrazovana radna snaga sposobna da podrži ekonomske ciljeve države
  - Da se eliminiše nepismenost i uspostavi univerzalni pristup osnovnim obrazovnim mogućnostima
explanation: |
  Hannah Arendt je tvrdila da svrha totalitarne edukacije nije da usadi uverenja, već da uništi sposobnost formiranja bilo kakvih nezavisnih uverenja. Ovo razlikuje totalitarne sisteme od drugih autoritarnih režima koji jednostavno žele da nametnu svoju ideologiju. Uništavanjem sposobnosti kritičkog razmišljanja, totalitarni režimi stvaraju populacije nesposobne za nezavisno političko delovanje, što služi njihovom cilju potpune kontrole nad društvom i eliminiše potencijalnu opoziciju.
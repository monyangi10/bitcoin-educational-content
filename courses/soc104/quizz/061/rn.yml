question: Dukurikije icegeranyo ca Hannah Arendt, intumbero nyamukuru y’inyigisho y’ubutegetsi bw’agahomerabunwa ni iyihe?
answer: Gusenyura ubushobozi bw’abantu bwo gushinga ivyiyumviro vyigenga aho kwigisha ivyiyumviro vyihariye .
wrong_answers:
  - Kugira ngo ingengabitekerezo y'intwaro n'agaciro ka politike nyamukuru bimenyekane ku banyagihugu
  - Gushinga abakozi bize cane bashobora gushigikira intumbero za Leta mu vy’ubutunzi .
  - Gukuraho ubujuju no gutuma abantu bose bashobora kuronka inyigisho z'ishimikiro
explanation: |
  Hannah Arendt yavuze yuko intumbero y’inyigisho y’ubutegetsi bw’agahomerabunwa atari iyo gutuma abantu bemera ibintu, ahubwo ko ari iyo gusenyura ubushobozi bwo gushinga inyigisho iyo ari yo yose yigenga.
  Ivyo bitandukanya intwaro z’ubutegetsi bw’agahomerabunwa n’izindi ntwaro z’ubutegetsi bw’agahomerabunwa zishaka gusa gutegeka ingengabitekerezo zazo. Mu gusenyura ubushobozi bwo kwiyumvira mu buryo bubereye, intwaro z’ubutegetsi bw’agahomerabunwa zituma abantu badashobora gukora politike yigenga, ivyo bikaba bishitsa intumbero yabo yo kugenzura bimwe bishitse abantu no gukuraho ukurwanywa gushobora kubaho.
question: Kulingana na uchambuzi wa Hannah Arendt, lengo kuu la elimu ya kidikteta ni lipi?
answer: Kuharibu uwezo wa watu kuunda imani huru badala ya kuingiza imani maalum
wrong_answers:
  - Kusambaza kwa ufanisi itikadi ya utawala na maadili ya kisiasa ya msingi kwa idadi ya watu
  - Kuunda nguvu kazi yenye elimu ya juu inayoweza kusaidia malengo ya kiuchumi ya jimbo
  - Kuondoa ujinga na kuanzisha upatikanaji wa fursa za msingi za elimu kwa wote
explanation: |
  Hannah Arendt alisema kwamba lengo la elimu ya kidikteta halikuwa kufundisha imani bali kuharibu kitivo cha kuunda imani zozote huru.
  Hii inatofautisha mifumo ya kidikteta na tawala zingine za kidikteta ambazo zinataka tu kulazimisha itikadi zao. Kwa kuharibu uwezo wa kufikiri kwa kina, tawala za kidikteta huunda idadi ya watu isiyoweza kuchukua hatua za kisiasa, ambazo hutimiza lengo lao la kudhibiti kikamilifu jamii na kuondoa upinzani unaowezekana.
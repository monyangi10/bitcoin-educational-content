question: بر اساس تحلیل هانا آرنت، هدف اصلی آموزش توتالیتر چیست؟
answer: برای از بین بردن توانایی مردم در شکل‌گیری اعتقادات مستقل به جای القای باورهای خاص
wrong_answers:
  - برای انتقال مؤثر ایدئولوژی رژیم و ارزش‌های سیاسی اصلی به جمعیت
  - برای ایجاد نیروی کار بسیار تحصیل‌کرده‌ای که قادر به حمایت از اهداف اقتصادی ایالت باشد
  - برای از بین بردن بی‌سوادی و ایجاد دسترسی همگانی به فرصت‌های آموزشی پایه
explanation: |
  هانا آرنت استدلال کرد که هدف آموزش توتالیتر نه القای عقاید، بلکه نابود کردن توانایی شکل‌گیری هرگونه عقاید مستقل است. این ویژگی، سیستم‌های توتالیتر را از دیگر رژیم‌های استبدادی که صرفاً می‌خواهند ایدئولوژی خود را تحمیل کنند، متمایز می‌کند. با نابود کردن توانایی‌های تفکر انتقادی، رژیم‌های توتالیتر جمعیت‌هایی را ایجاد می‌کنند که قادر به اقدام سیاسی مستقل نیستند، که این امر به هدف آن‌ها برای کنترل کامل بر جامعه خدمت می‌کند و مخالفت‌های احتمالی را از بین می‌برد.
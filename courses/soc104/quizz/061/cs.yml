question: Co je podle analýzy Hannah Arendtové hlavním cílem totalitního vzdělávání?
answer: Ničit schopnost lidí vytvářet si nezávislé přesvědčení, nikoli vštěpovat konkrétní názory
wrong_answers:
  - Účinně předávat obyvatelstvu ideologii režimu a základní politické hodnoty
  - Vytvořit vysoce vzdělanou pracovní sílu schopnou podporovat hospodářské cíle státu
  - Odstranit negramotnost a zajistit všeobecný přístup k základnímu vzdělání
explanation: |
  Hannah Arendtová tvrdila, že cílem totalitní výchovy není vštěpovat přesvědčení, ale zničit schopnost vytvářet si nezávislé přesvědčení.
  Tím se totalitní systémy liší od jiných autoritářských režimů, které chtějí pouze vnutit svou ideologii. Ničením schopnosti kritického myšlení vytvářejí totalitní režimy obyvatelstvo neschopné nezávislého politického jednání, což slouží jejich cíli totální kontroly nad společností a eliminuje potenciální opozici.
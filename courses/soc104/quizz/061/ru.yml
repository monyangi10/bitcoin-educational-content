question: Согласно анализу Ханны Арендт, какова основная цель тоталитарного воспитания?
answer: Разрушать способность людей формировать независимые убеждения, а не прививать конкретные убеждения
wrong_answers:
  - Эффективная трансляция идеологии и основных политических ценностей режима населению
  - Создание высокообразованной рабочей силы, способной поддерживать экономические цели штата
  - Ликвидировать неграмотность и обеспечить всеобщий доступ к базовым образовательным возможностям
explanation: |
  Ханна Арендт утверждала, что цель тоталитарного воспитания - не привить убеждения, а уничтожить способность к формированию независимых убеждений.
  Это отличает тоталитарные системы от других авторитарных режимов, которые просто хотят навязать свою идеологию. Уничтожая способность к критическому мышлению, тоталитарные режимы создают население, неспособное к самостоятельным политическим действиям, что служит их цели тотального контроля над обществом и устраняет потенциальную оппозицию.
question: Jaki jest główny cel edukacji totalitarnej według analizy Hannah Arendt?
answer: Aby zniszczyć zdolność ludzi do kształtowania niezależnych przekonań, a nie wpajać konkretne przekonania
wrong_answers:
  - Skuteczne przekazywanie ludności ideologii reżimu i podstawowych wartości politycznych
  - Stworzenie wysoko wykształconej siły roboczej zdolnej do wspierania celów gospodarczych państwa
  - Wyeliminowanie analfabetyzmu i zapewnienie powszechnego dostępu do podstawowych możliwości edukacyjnych
explanation: |
  Hannah Arendt argumentowała, że celem edukacji totalitarnej nie było wpajanie przekonań, ale niszczenie zdolności do tworzenia jakichkolwiek niezależnych przekonań.
  To odróżnia systemy totalitarne od innych autorytarnych reżimów, które po prostu chcą narzucić swoją ideologię. Niszcząc zdolność krytycznego myślenia, reżimy totalitarne tworzą populacje niezdolne do niezależnego działania politycznego, co służy ich celowi całkowitej kontroli nad społeczeństwem i eliminuje potencjalną opozycję.
question: 根据汉娜-阿伦特的分析，极权主义教育的主要目标是什么？
answer: 摧毁人们形成独立信念的能力，而不是灌输特定的信仰
wrong_answers:
  - 向民众有效传播政权的意识形态和核心政治价值观
  - 培养一支受过高等教育的劳动力队伍，使其能够支持本州的经济目标
  - 消除文盲，普及基础教育机会
explanation: |
  汉娜-阿伦特认为，极权主义教育的目的不是灌输信念，而是摧毁形成任何独立信念的能力。
  这使极权制度有别于其他只想强加意识形态的专制政权。极权主义政权通过摧毁批判性思维能力，制造出无法采取独立政治行动的民众，从而实现其全面控制社会的目标，并消除潜在的反对力量。
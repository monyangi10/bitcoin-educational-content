question: 根據 Hannah Arendt 的分析，極權教育的主要目標是什麼？
answer: 摧毀人們形成獨立信念的能力，而不是灌輸特定的信念
wrong_answers:
  - 有效率地將政權的意識形態和核心政治價值傳達給人民
  - 培養高素質的勞動力，以支持國家的經濟目標
  - 消除文盲，普及基礎教育機會
explanation: |
  Hannah Arendt認為極權教育的目的不是灌輸信念，而是摧毀形成任何獨立信念的能力。
  這讓極權體系有別於其他只想強加其意識形態的專制政體。藉由摧毀批判性思考的能力，極權政體創造出無法獨立採取政治行動的人民，以達到其全面控制社會的目標，並消除潛在的反對力量。
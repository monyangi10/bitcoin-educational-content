question: Mis on Hannah Arendti analüüsi kohaselt totalitaarse kasvatuse peamine eesmärk?
answer: Hävitada inimeste võimet kujundada iseseisvaid veendumusi, mitte sisendada konkreetseid uskumusi
wrong_answers:
  - Tõhusalt edastada elanikkonnale režiimi ideoloogiat ja poliitilisi põhiväärtusi
  - Luua kõrgelt haritud tööjõud, mis on võimeline toetama riigi majanduslikke eesmärke
  - Likvideerida kirjaoskamatus ja luua üldine juurdepääs põhihariduse võimalustele
explanation: |
  Hannah Arendt väitis, et totalitaarse kasvatuse eesmärk ei olnud mitte veendumuste juurutamine, vaid iseseisva veendumuse kujundamise võime hävitamine.
  See eristab totalitaarsed süsteemid teistest autoritaarsetest režiimidest, mis tahavad lihtsalt oma ideoloogiat peale suruda. Kriitilise mõtlemisvõime hävitamisega loovad totalitaarsed režiimid elanikkonna, kes ei ole võimeline iseseisvaks poliitiliseks tegevuseks, mis teenib nende eesmärki saavutada täielik kontroll ühiskonna üle ja likvideerib võimaliku opositsiooni.
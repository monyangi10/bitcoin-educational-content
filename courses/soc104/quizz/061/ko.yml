question: 한나 아렌트의 분석에 따르면 전체주의 교육의 주요 목표는 무엇일까요?
answer: 특정 신념을 주입하기보다 독립적인 신념을 형성하는 사람들의 능력을 파괴하기 위해
wrong_answers:
  - 정권의 이념과 핵심 정치적 가치를 국민에게 효율적으로 전달하기 위해
  - 국가의 경제적 목표를 지원할 수 있는 고도로 교육받은 인력을 양성하기 위해
  - 문맹을 없애고 기본적인 교육 기회에 대한 보편적 접근성을 확립하기 위해
explanation: |
  한나 아렌트는 전체주의 교육의 목적은 신념을 주입하는 것이 아니라 독립적인 신념을 형성할 수 있는 능력을 파괴하는 것이라고 주장했습니다.
  이는 전체주의 체제가 단순히 이데올로기를 강요하려는 다른 권위주의 정권과 구별되는 점입니다. 전체주의 정권은 비판적 사고 능력을 파괴함으로써 독립적인 정치적 행동을 할 수 없는 인구를 만들어 사회에 대한 완전한 통제라는 목표를 달성하고 잠재적인 반대를 제거합니다.
question: ハンナ・アーレントの分析によれば、全体主義教育の第一目標は何か？
answer: 特定の信念を植え付けるのではなく、人々が独自の信念を形成する能力を破壊すること。
wrong_answers:
  - 政権のイデオロギーと核となる政治的価値観を効率的に国民に伝える。
  - 州の経済目標を支えることのできる高度な教育を受けた労働力を創出する。
  - 非識字をなくし、基本的な教育機会への普遍的なアクセスを確立する。
explanation: |
  ハンナ・アーレントは、全体主義教育の目的は信念を植え付けることではなく、独立した信念を形成する能力を破壊することだと主張した。
  このことは、全体主義体制を、単にイデオロギーを押し付けようとする他の権威主義体制と区別するものである。批判的思考能力を破壊することで、全体主義体制は自主的な政治行動ができない集団を作り出し、社会を完全に支配するという目標に貢献し、潜在的な反対勢力を排除する。
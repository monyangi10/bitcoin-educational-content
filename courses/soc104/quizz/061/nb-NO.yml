question: Hva er, ifølge Hannah Arendts analyse, det primære målet med totalitær oppdragelse?
answer: Å ødelegge folks evne til å danne seg selvstendige overbevisninger snarere enn å innprente spesifikke overbevisninger
wrong_answers:
  - Å formidle regimets ideologi og politiske kjerneverdier til befolkningen på en effektiv måte
  - Å skape en høyt utdannet arbeidsstyrke som er i stand til å støtte statens økonomiske mål
  - Å avskaffe analfabetisme og gi alle tilgang til grunnleggende utdanningsmuligheter
explanation: |
  Hannah Arendt hevdet at formålet med totalitær oppdragelse ikke var å innpode overbevisninger, men å ødelegge evnen til å danne seg selvstendige overbevisninger.
  Dette skiller totalitære systemer fra andre autoritære regimer som bare ønsker å påtvinge sin ideologi. Ved å ødelegge evnen til kritisk tenkning skaper totalitære regimer befolkninger som er ute av stand til selvstendig politisk handling, noe som tjener deres mål om total kontroll over samfunnet og eliminerer potensiell opposisjon.
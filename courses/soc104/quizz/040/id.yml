question: Menurut sudut pandang Friedman, apa masalah utama dalam menilai kebijakan sosial berdasarkan niat yang dinyatakan daripada hasil aktualnya?
answer: Kebijakan yang bermaksud baik sering kali menghasilkan konsekuensi yang tidak diinginkan yang bertentangan dengan tujuan awal mereka, seperti menciptakan ketergantungan atau distorsi pasar
wrong_answers:
  - Niat terlalu sulit untuk diukur secara obyektif dibandingkan dengan hasil, sehingga evaluasi kebijakan menjadi tidak mungkin dilakukan oleh para peneliti dan analis
  - Para politisi dengan sengaja menggunakan niat yang salah untuk menyesatkan para pemilih, sehingga perlu untuk fokus hanya pada indikator ekonomi yang terukur
  - Niat terlalu sering berubah selama implementasi kebijakan, sementara hasil tetap konstan dan memberikan panduan jangka panjang yang lebih baik
explanation: |
  Friedman berpendapat bahwa kebijakan yang dimotivasi oleh niat baik dapat menimbulkan konsekuensi yang tidak terduga atau berbahaya jika tidak didasarkan pada analisis yang
  perilaku dan insentif manusia. Secara khusus, ia menyebutkan bahwa program-program yang dilabeli sebagai upaya membantu masyarakat miskin sering kali memiliki dampak yang berlawanan dengan apa yang diinginkan oleh para sponsor yang berniat baik, sehingga menimbulkan dampak yang tidak diinginkan seperti ketergantungan ekonomi. Hal ini mengilustrasikan mengapa definisi struktural yang berfokus pada karakteristik yang dapat diamati dan hasil yang dapat diukur harus lebih diutamakan daripada definisi yang disengaja berdasarkan motivasi yang dinyatakan.
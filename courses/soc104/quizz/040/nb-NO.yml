question: Hva er, ifølge Friedmans perspektiv, hovedproblemet med å bedømme sosialpolitikk basert på dens uttalte intensjoner snarere enn på dens faktiske resultater?
answer: Velmenende politikk får ofte utilsiktede konsekvenser som strider mot de opprinnelige målene, for eksempel ved å skape avhengighet eller markedsvridninger
wrong_answers:
  - Intensjoner er for vanskelige å måle objektivt sammenlignet med resultater, noe som gjør det umulig for forskere og analytikere å evaluere politikken
  - Politikerne bruker bevisst falske intensjoner for å villede velgerne, noe som gjør det nødvendig å kun fokusere på målbare økonomiske indikatorer
  - Intensjonene endres for ofte under implementeringen av politikken, mens resultatene forblir konstante og gir bedre langsiktig veiledning
explanation: |
  Friedman argumenterer for at en politikk som er motivert av sjenerøse intensjoner, kan få uforutsette eller skadelige konsekvenser hvis den ikke er basert på en grundig analyse av menneskelig
  menneskelig atferd og insentiver. I teksten nevnes det spesifikt at programmer som er stemplet som hjelp til de fattige, ofte har motsatt effekt av hva deres velmenende sponsorer ønsker, og skaper perverse effekter som økonomisk avhengighet. Dette illustrerer hvorfor strukturelle definisjoner som fokuserer på observerbare egenskaper og målbare resultater, bør ha forrang fremfor intensjonelle definisjoner basert på erklærte motivasjoner.
question: Theo quan điểm của Friedman, vấn đề chính khi đánh giá các chính sách xã hội dựa trên những ý định đã nêu thay vì kết quả thực tế của chúng là gì?
answer: Những chính sách có thiện chí thường dẫn đến những hậu quả không mong muốn, trái ngược với mục tiêu ban đầu, chẳng hạn như tạo ra sự phụ thuộc hoặc bóp méo thị trường.
wrong_answers:
  - So với kết quả, việc đo lường ý định một cách khách quan quá khó khăn, khiến việc đánh giá chính sách trở nên bất khả thi đối với các nhà nghiên cứu và phân tích.
  - Các chính trị gia cố tình sử dụng những ý đồ sai lệch để đánh lừa cử tri, khiến việc tập trung vào các chỉ số kinh tế có thể đo lường được trở nên cần thiết.
  - Ý định thường xuyên thay đổi trong quá trình thực thi chính sách, trong khi kết quả lại không đổi và mang lại định hướng dài hạn tốt hơn.
explanation: |
  Friedman lập luận rằng các chính sách xuất phát từ ý định tốt đẹp có thể dẫn đến những hậu quả không lường trước hoặc có hại nếu không dựa trên phân tích nghiêm túc về hành vi và động cơ của con người. Văn bản này đặc biệt đề cập đến việc các chương trình được gắn mác là giúp đỡ người nghèo thường có tác dụng ngược lại với mong muốn của những người tài trợ có thiện chí, tạo ra những hiệu ứng tiêu cực như sự phụ thuộc kinh tế. Điều này minh họa lý do tại sao các định nghĩa mang tính cấu trúc tập trung vào các đặc điểm có thể quan sát được và kết quả có thể đo lường được nên được ưu tiên hơn các định nghĩa mang tính chủ ý dựa trên động cơ đã được tuyên bố.
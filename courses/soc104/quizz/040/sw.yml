question: Kulingana na mtazamo wa Friedman, tatizo kuu la kuhukumu sera za kijamii kulingana na nia zao zilizotajwa badala ya matokeo yao halisi ni lipi?
answer: Sera zenye nia njema mara nyingi hutoa matokeo yasiyokusudiwa ambayo yanapingana na malengo yao ya awali, kama vile kuunda utegemezi au upotoshaji wa soko.
wrong_answers:
  - Nia ni ngumu sana kupima kwa uwazi ikilinganishwa na matokeo, na kufanya tathmini ya sera isiwezekane kwa watafiti na wachambuzi
  - Wanasiasa hutumia nia za uongo kimakusudi kuwapotosha wapiga kura, na kufanya iwe muhimu kuzingatia viashiria vya kiuchumi vinavyopimika pekee.
  - Nia hubadilika mara nyingi sana wakati wa utekelezaji wa sera, huku matokeo yakibaki kuwa thabiti na kutoa mwongozo bora wa muda mrefu.
explanation: |
  Friedman anasema kwamba sera zinazochochewa na nia njema zinaweza kuwa na matokeo yasiyotarajiwa au yenye madhara ikiwa hazitegemei uchambuzi mkali wa tabia na motisha za kibinadamu. Maandishi hayo yanataja haswa kwamba programu zinazoitwa kuwasaidia maskini mara nyingi huwa na athari kinyume na kile ambacho wafadhili wao wenye nia njema hutamani, na kusababisha athari potofu kama vile utegemezi wa kiuchumi. Hii inaonyesha ni kwa nini fasili za kimuundo zinazozingatia sifa zinazoonekana na matokeo yanayopimika zinapaswa kuchukua nafasi ya kwanza kuliko fasili za makusudi kulingana na motisha zilizotangazwa.
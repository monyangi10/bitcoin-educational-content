question: 根据弗里德曼的观点，根据既定意图而非实际结果来判断社会政策的主要问题是什么？
answer: 用心良苦的政策往往会产生与其最初目标相悖的意外后果，例如造成依赖性或市场扭曲
wrong_answers:
  - 与结果相比，意图太难客观衡量，使研究人员和分析人员无法进行政策评估
  - 政治家故意利用虚假意图误导选民，因此有必要只关注可衡量的经济指标
  - 在政策实施过程中，意图变化过于频繁，而结果保持不变，能提供更好的长期指导
explanation: |
  弗里德曼认为，如果不是基于对人类行为和激励因素的严格分析，出于慷慨意图的政策可能会产生不可预见或有害的后果。
  行为和激励机制。文中特别提到，被贴上扶贫标签的计划往往会产生与善意的赞助者所希望的相反的效果，造成经济依赖等反常影响。这说明了为什么注重可观察特征和可衡量结果的结构性定义应优先于基于宣称动机的有意定义。
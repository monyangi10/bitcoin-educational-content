question: フリードマンの視点によれば、社会政策をその実際の結果ではなく、表明された意図に基づいて判断することの主な問題点は何か？
answer: 良かれと思った政策が、依存や市場の歪みを生むなど、本来の目的と矛盾する意図せざる結果を生むことはよくある。
wrong_answers:
  - 研究者やアナリストにとって、意図の客観的な測定は結果に比べて難しすぎるため、政策評価は不可能である。
  - 政治家は意図的に偽りの意図を使って有権者を欺き、測定可能な経済指標だけに焦点を当てる必要がある。
  - 政策実施中に意図があまりにも頻繁に変化する一方で、成果は不変であり、より長期的な指針を提供する。
explanation: |
  フリードマンは、寛大な意図に突き動かされた政策が、人間の行動やインセンティブに関する厳密な分析に基づいていなければ、予期せぬ、あるいは有害な結果をもたらす可能性があると主張している。
  と論じている。本文中では特に、貧困層救済と銘打たれたプログラムは、善意のスポンサーが望むものとは逆の効果をもたらすことが多く、経済的依存のような逆効果を生むと述べている。これは、観察可能な特性や測定可能な結果に焦点を当てた構造的定義が、宣言された動機に基づく意図的定義よりも優先されるべき理由を示している。
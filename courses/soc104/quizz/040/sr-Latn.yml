question: Prema Fridmanovoj perspektivi, koji je primarni problem sa ocenjivanjem socijalnih politika na osnovu njihovih izjavljenih namera umesto stvarnih ishoda?
answer: Dobronamerne politike često proizvode nenameravane posledice koje protivreče njihovim originalnim ciljevima, kao što su stvaranje zavisnosti ili tržišne distorzije.
wrong_answers:
  - Namere su previše teške za objektivno merenje u poređenju sa ishodima, što čini evaluaciju politika nemogućom za istraživače i analitičare.
  - Političari namerno koriste lažne namere kako bi obmanuli birače, što čini neophodnim fokusiranje isključivo na merljive ekonomske pokazatelje.
  - Namere se prečesto menjaju tokom sprovođenja politike, dok ishodi ostaju konstantni i pružaju bolju dugoročnu smernicu.
explanation: |
  Friedman tvrdi da politike motivisane velikodušnim namerama mogu imati nepredviđene ili štetne posledice ako nisu zasnovane na rigoroznoj analizi ljudskog ponašanja i podsticaja. Tekst posebno pominje da programi označeni kao pomoć siromašnima često imaju suprotne efekte od onih koje njihovi dobronamerni sponzori žele, stvarajući izopačene efekte poput ekonomske zavisnosti. Ovo ilustruje zašto strukturne definicije koje se fokusiraju na uočljive karakteristike i merljive rezultate treba da imaju prednost nad namernim definicijama zasnovanim na deklarisanim motivacijama.
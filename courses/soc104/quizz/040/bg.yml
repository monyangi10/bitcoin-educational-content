question: Според гледната точка на Фридман какъв е основният проблем при оценяването на социалните политики въз основа на заявените им намерения, а не на действителните резултати?
answer: Политиките с добри намерения често водят до непредвидени последици, които противоречат на първоначалните им цели, като например създаване на зависимост или изкривяване на пазара
wrong_answers:
  - Намеренията са твърде трудни за обективно измерване в сравнение с резултатите, което прави оценката на политиката невъзможна за изследователите и анализаторите
  - Политиците умишлено използват фалшиви намерения, за да заблудят избирателите, което налага да се съсредоточат само върху измерими икономически показатели
  - Намеренията се променят твърде често по време на прилагането на политиката, докато резултатите остават постоянни и осигуряват по-добри дългосрочни насоки
explanation: |
  Фридман твърди, че политиките, мотивирани от благородни намерения, могат да имат непредвидени или вредни последици, ако не се основават на строг анализ на човешките
  поведение и стимули. В текста специално се споменава, че програмите, които са обявени за подпомагане на бедните, често имат обратни на желанията на добронамерените им спонсори ефекти, създавайки обратни ефекти като икономическа зависимост. Това илюстрира защо структурните определения, фокусирани върху наблюдаеми характеристики и измерими резултати, трябва да имат предимство пред преднамерените определения, основани на декларирани мотиви.
question: ตามมุมมองของฟรีดแมน ปัญหาหลักของการตัดสินนโยบายสังคมจากเจตนาที่ระบุไว้แทนที่จะเป็นผลลัพธ์ที่แท้จริงคืออะไร?
answer: นโยบายที่มีเจตนาดีมักก่อให้เกิดผลที่ไม่คาดคิดซึ่งขัดแย้งกับเป้าหมายเดิม เช่น การสร้างการพึ่งพิงหรือการบิดเบือนตลาด
wrong_answers:
  - เจตนานั้นยากเกินกว่าจะวัดได้อย่างเป็นกลางเมื่อเทียบกับผลลัพธ์ ทำให้การประเมินนโยบายเป็นไปไม่ได้สำหรับนักวิจัยและนักวิเคราะห์
  - นักการเมืองใช้เจตนาที่เป็นเท็จเพื่อหลอกลวงผู้มีสิทธิเลือกตั้ง ทำให้จำเป็นต้องมุ่งเน้นไปที่ตัวชี้วัดทางเศรษฐกิจที่สามารถวัดได้เท่านั้น
  - ความตั้งใจเปลี่ยนแปลงบ่อยเกินไปในระหว่างการดำเนินนโยบาย ในขณะที่ผลลัพธ์ยังคงที่และให้คำแนะนำระยะยาวที่ดีกว่า
explanation: |
  ฟรีดแมนโต้แย้งว่านโยบายที่มีแรงจูงใจจากเจตนาที่เอื้อเฟื้อสามารถมีผลที่ไม่คาดคิดหรือเป็นอันตรายได้หากไม่ได้อิงจากการวิเคราะห์พฤติกรรมมนุษย์และแรงจูงใจอย่างเข้มงวด ข้อความระบุโดยเฉพาะว่าโครงการที่ถูกระบุว่าเป็นการช่วยเหลือคนจนมักมีผลตรงกันข้ามกับสิ่งที่ผู้สนับสนุนที่มีเจตนาดีต้องการ สร้างผลกระทบที่บิดเบือนเช่นการพึ่งพาทางเศรษฐกิจ นี่แสดงให้เห็นว่าทำไมคำจำกัดความเชิงโครงสร้างที่เน้นลักษณะที่สังเกตได้และผลลัพธ์ที่วัดได้ควรมีความสำคัญเหนือกว่าคำจำกัดความที่ตั้งใจไว้ซึ่งอิงจากแรงจูงใจที่ประกาศไว้
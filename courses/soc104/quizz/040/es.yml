question: Según la perspectiva de Friedman, ¿cuál es el principal problema de juzgar las políticas sociales basándose en sus intenciones declaradas y no en sus resultados reales?
answer: Las políticas bienintencionadas suelen tener consecuencias no deseadas que contradicen sus objetivos originales, como crear dependencia o distorsiones del mercado
wrong_answers:
  - Las intenciones son demasiado difíciles de medir objetivamente en comparación con los resultados, lo que imposibilita la evaluación de políticas por parte de investigadores y analistas
  - Los políticos utilizan deliberadamente falsas intenciones para engañar a los votantes, por lo que es necesario centrarse sólo en indicadores económicos mensurables
  - Las intenciones cambian con demasiada frecuencia durante la aplicación de las políticas, mientras que los resultados permanecen constantes y proporcionan una mejor orientación a largo plazo
explanation: |
  Friedman sostiene que las políticas motivadas por intenciones generosas pueden tener consecuencias imprevistas o perjudiciales si no se basan en un análisis riguroso del comportamiento humano y los incentivos
  comportamiento y los incentivos humanos. El texto menciona específicamente que los programas etiquetados como de ayuda a los pobres suelen tener efectos opuestos a los que desean sus bienintencionados patrocinadores, creando efectos perversos como la dependencia económica. Esto ilustra por qué las definiciones estructurales centradas en características observables y resultados mensurables deben primar sobre las definiciones intencionales basadas en motivaciones declaradas.
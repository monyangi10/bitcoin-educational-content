question: Mikä on Friedmanin näkökulman mukaan ensisijainen ongelma siinä, että sosiaalipolitiikkaa arvioidaan pikemminkin sen julkilausuttujen aikomusten kuin sen todellisten tulosten perusteella?
answer: Hyvää tarkoittavat politiikat aiheuttavat usein tahattomia seurauksia, jotka ovat ristiriidassa niiden alkuperäisten tavoitteiden kanssa, kuten riippuvuuden syntyminen tai markkinoiden vääristyminen
wrong_answers:
  - Aikomuksia on liian vaikea mitata objektiivisesti verrattuna tuloksiin, mikä tekee politiikan arvioinnista mahdotonta tutkijoille ja analyytikoille
  - Poliitikot käyttävät tarkoituksellisesti vääriä aikomuksia äänestäjien harhaanjohtamiseksi, minkä vuoksi on tarpeen keskittyä vain mitattavissa oleviin talousindikaattoreihin
  - Aikomukset muuttuvat liian usein politiikan täytäntöönpanon aikana, kun taas tulokset pysyvät vakioina ja tarjoavat parempaa pitkän aikavälin ohjausta
explanation: |
  Friedman väittää, että anteliaiden aikomusten motivoimalla politiikalla voi olla odottamattomia tai haitallisia seurauksia, jos se ei perustu tiukkaan analyysiin inhimillisestä ja sosiaalisesta kehityksestä
  käyttäytymistä ja kannustimia. Tekstissä mainitaan erityisesti, että ohjelmilla, jotka leimataan köyhien auttamiseksi, on usein päinvastaisia vaikutuksia kuin mitä niiden hyvää tarkoittavat rahoittajat haluavat, ja ne aiheuttavat kieroutuneita vaikutuksia, kuten taloudellista riippuvuutta. Tämä osoittaa, miksi rakenteellisten määritelmien, joissa keskitytään havaittaviin ominaisuuksiin ja mitattavissa oleviin tuloksiin, pitäisi olla ensisijaisia julkilausuttuihin motiiveihin perustuviin tarkoituksellisiin määritelmiin nähden.
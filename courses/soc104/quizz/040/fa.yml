question: بر اساس دیدگاه فریدمن، مشکل اصلی قضاوت درباره سیاست‌های اجتماعی بر اساس نیت‌های اعلام‌شده آن‌ها به جای نتایج واقعی‌شان چیست؟
answer: سیاست‌های با نیت خوب اغلب پیامدهای ناخواسته‌ای را به وجود می‌آورند که با اهداف اصلی آن‌ها در تضاد هستند، مانند ایجاد وابستگی یا تحریف بازار.
wrong_answers:
  - اندیشه‌ها به‌طور عینی بسیار دشوارتر از نتایج قابل اندازه‌گیری هستند، که ارزیابی سیاست را برای پژوهشگران و تحلیل‌گران غیرممکن می‌سازد.
  - سیاستمداران عمداً از نیت‌های نادرست برای گمراه کردن رأی‌دهندگان استفاده می‌کنند، که این امر تمرکز صرفاً بر شاخص‌های اقتصادی قابل اندازه‌گیری را ضروری می‌سازد.
  - نیات در طول اجرای سیاست به طور مکرر تغییر می‌کنند، در حالی که نتایج ثابت می‌مانند و راهنمایی بهتری برای بلندمدت ارائه می‌دهند.
explanation: |
  فریدمن استدلال می‌کند که سیاست‌هایی که با نیت‌های سخاوتمندانه انگیزه می‌گیرند، می‌توانند پیامدهای پیش‌بینی‌نشده یا مضری داشته باشند اگر بر اساس تحلیل دقیق رفتار انسانی و انگیزه‌ها نباشند. متن به‌طور خاص اشاره می‌کند که برنامه‌هایی که به عنوان کمک به فقرا برچسب‌گذاری شده‌اند، اغلب اثراتی مخالف آنچه حامیان نیک‌خواه آن‌ها می‌خواهند دارند و اثرات معکوسی مانند وابستگی اقتصادی ایجاد می‌کنند. این نشان می‌دهد که چرا تعاریف ساختاری که بر ویژگی‌های قابل مشاهده و نتایج قابل اندازه‌گیری تمرکز دارند باید بر تعاریف مبتنی بر انگیزه‌های اعلام‌شده اولویت داشته باشند.
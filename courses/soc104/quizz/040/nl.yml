question: Wat is volgens Friedmans perspectief het grootste probleem met het beoordelen van sociaal beleid op basis van de verklaarde bedoelingen in plaats van de feitelijke resultaten?
answer: Goedbedoeld beleid heeft vaak onbedoelde gevolgen die in tegenspraak zijn met het oorspronkelijke doel, zoals het creëren van afhankelijkheid of marktverstoringen
wrong_answers:
  - Intenties zijn te moeilijk objectief te meten in vergelijking met uitkomsten, waardoor beleidsevaluatie onmogelijk is voor onderzoekers en analisten
  - Politici gebruiken opzettelijk valse bedoelingen om kiezers te misleiden, waardoor het noodzakelijk is om alleen te focussen op meetbare economische indicatoren
  - Intenties veranderen te vaak tijdens de beleidsimplementatie, terwijl de resultaten constant blijven en een betere leidraad vormen voor de lange termijn
explanation: |
  Friedman stelt dat beleid dat wordt ingegeven door genereuze bedoelingen onvoorziene of schadelijke gevolgen kan hebben als het niet is gebaseerd op een grondige analyse van menselijk
  gedrag en prikkels. De tekst vermeldt specifiek dat programma's die worden gelabeld als hulp voor de armen vaak het tegenovergestelde effect hebben van wat hun goedbedoelde sponsors willen, en perverse effecten creëren zoals economische afhankelijkheid. Dit illustreert waarom structurele definities die zich richten op waarneembare kenmerken en meetbare resultaten voorrang zouden moeten krijgen op opzettelijke definities die gebaseerd zijn op verklaarde motivaties.
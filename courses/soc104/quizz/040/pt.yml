question: De acordo com a perspetiva de Friedman, qual é o principal problema de julgar as políticas sociais com base nas suas intenções declaradas e não nos seus resultados efectivos?
answer: As políticas bem intencionadas produzem frequentemente consequências não intencionais que contradizem os seus objectivos originais, como a criação de dependência ou distorções do mercado
wrong_answers:
  - As intenções são demasiado difíceis de medir objetivamente em comparação com os resultados, tornando a avaliação das políticas impossível para os investigadores e analistas
  - Os políticos usam deliberadamente falsas intenções para enganar os eleitores, tornando necessário concentrar-se apenas em indicadores económicos mensuráveis
  - As intenções mudam com demasiada frequência durante a aplicação das políticas, ao passo que os resultados permanecem constantes e proporcionam uma melhor orientação a longo prazo
explanation: |
  Friedman argumenta que as políticas motivadas por intenções generosas podem ter consequências imprevistas ou prejudiciais se não se basearem numa análise rigorosa do comportamento e dos incentivos humanos
  comportamento e incentivos humanos. O texto menciona especificamente que os programas rotulados como de ajuda aos pobres têm frequentemente efeitos opostos aos desejados pelos seus patrocinadores bem intencionados, criando efeitos perversos como a dependência económica. Isto ilustra a razão pela qual as definições estruturais centradas em caraterísticas observáveis e resultados mensuráveis devem ter precedência sobre as definições intencionais baseadas em motivações declaradas.
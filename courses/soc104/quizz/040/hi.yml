question: फ्रीडमैन के दृष्टिकोण के अनुसार, सामाजिक नीतियों का मूल्यांकन उनके वास्तविक परिणामों के बजाय उनके घोषित इरादों के आधार पर करने में मुख्य समस्या क्या है?
answer: अच्छी मंशा से बनाई गई नीतियां अक्सर अनपेक्षित परिणाम उत्पन्न करती हैं जो उनके मूल लक्ष्यों के विपरीत होते हैं, जैसे कि निर्भरता पैदा करना या बाजार में विकृतियां उत्पन्न करना।
wrong_answers:
  - परिणामों की तुलना में इरादों को वस्तुनिष्ठ रूप से मापना बहुत कठिन है, जिससे शोधकर्ताओं और विश्लेषकों के लिए नीति मूल्यांकन असंभव हो जाता है।
  - राजनेता जानबूझकर मतदाताओं को गुमराह करने के लिए झूठे इरादों का इस्तेमाल करते हैं, इसलिए केवल मापने योग्य आर्थिक संकेतकों पर ध्यान केंद्रित करना आवश्यक हो जाता है।
  - नीति कार्यान्वयन के दौरान इरादे अक्सर बदलते रहते हैं, जबकि परिणाम स्थिर रहते हैं और दीर्घकालिक मार्गदर्शन प्रदान करते हैं।
explanation: |
  फ्रीडमैन का तर्क है कि उदार इरादों से प्रेरित नीतियां, यदि मानवीय व्यवहार और प्रेरणाओं के गहन विश्लेषण पर आधारित न हों, तो अप्रत्याशित या हानिकारक परिणाम दे सकती हैं।
  इस लेख में विशेष रूप से उल्लेख किया गया है कि गरीबों की सहायता के नाम से घोषित कार्यक्रमों के अक्सर वे प्रभाव होते हैं जो उनके नेक इरादों वाले प्रायोजकों की इच्छा के विपरीत होते हैं, जिससे आर्थिक निर्भरता जैसे विकृत प्रभाव उत्पन्न होते हैं। यह दर्शाता है कि अवलोकन योग्य विशेषताओं और मापने योग्य परिणामों पर केंद्रित संरचनात्मक परिभाषाओं को घोषित प्रेरणाओं पर आधारित इरादे संबंधी परिभाषाओं की तुलना में प्राथमिकता क्यों दी जानी चाहिए।
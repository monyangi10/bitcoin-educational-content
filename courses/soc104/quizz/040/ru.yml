question: С точки зрения Фридмана, в чем заключается основная проблема оценки социальной политики на основе заявленных намерений, а не ее реальных результатов?
answer: Благие намерения часто приводят к непредвиденным последствиям, противоречащим их первоначальным целям, таким как создание зависимости или рыночных диспропорций
wrong_answers:
  - Намерения слишком сложно объективно измерить по сравнению с результатами, что делает оценку политики невозможной для исследователей и аналитиков
  - Политики намеренно используют ложные намерения, чтобы ввести избирателей в заблуждение, поэтому необходимо сосредоточиться только на поддающихся измерению экономических показателях
  - Намерения слишком часто меняются в ходе реализации политики, в то время как результаты остаются неизменными и служат лучшим долгосрочным ориентиром
explanation: |
  Фридман утверждает, что политика, продиктованная благими намерениями, может иметь непредвиденные или вредные последствия, если она не основана на тщательном анализе человеческого
  поведения и стимулов. В тексте, в частности, упоминается, что программы, обозначенные как помощь бедным, часто приводят к последствиям, противоположным желаниям их спонсоров, вызывая обратные эффекты, такие как экономическая зависимость. Это иллюстрирует, почему структурные определения, ориентированные на наблюдаемые характеристики и измеряемые результаты, должны превалировать над намеренными определениями, основанными на декларируемых мотивах.
question: Was ist aus Friedmans Sicht das Hauptproblem bei der Beurteilung von Sozialpolitik auf der Grundlage ihrer erklärten Absichten und nicht ihrer tatsächlichen Ergebnisse?
answer: Gut gemeinte politische Maßnahmen haben oft unbeabsichtigte Folgen, die ihren ursprünglichen Zielen widersprechen, z. B. die Schaffung von Abhängigkeiten oder Marktverzerrungen
wrong_answers:
  - Absichten sind im Vergleich zu Ergebnissen zu schwer objektiv zu messen, was eine Bewertung der Politik für Forscher und Analysten unmöglich macht
  - Politiker nutzen absichtlich falsche Absichten, um die Wähler in die Irre zu führen, so dass es notwendig ist, sich nur auf messbare wirtschaftliche Indikatoren zu konzentrieren
  - Die Absichten ändern sich zu häufig während der Umsetzung der Politik, während die Ergebnisse konstant bleiben und eine bessere langfristige Orientierung bieten
explanation: |
  Friedman argumentiert, dass politische Maßnahmen, die durch großzügige Absichten motiviert sind, unvorhergesehene oder schädliche Folgen haben können, wenn sie nicht auf einer strengen Analyse des menschlichen Verhaltens und der Anreize beruhen
  verhaltens und der Anreize beruht. Im Text wird ausdrücklich erwähnt, dass Programme, die als Hilfe für die Armen bezeichnet werden, oft das Gegenteil von dem bewirken, was ihre wohlmeinenden Förderer sich wünschen, und perverse Effekte wie wirtschaftliche Abhängigkeit hervorrufen. Dies verdeutlicht, warum strukturelle Definitionen, die sich auf beobachtbare Merkmale und messbare Ergebnisse konzentrieren, Vorrang vor intentionalen Definitionen haben sollten, die auf erklärten Motivationen beruhen.
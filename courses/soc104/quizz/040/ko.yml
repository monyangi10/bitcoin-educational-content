question: 프리드먼의 관점에 따르면, 사회 정책을 실제 결과가 아닌 명시된 의도에 따라 판단할 때 가장 큰 문제점은 무엇일까요?
answer: 선의의 정책은 종종 의존성이나 시장 왜곡을 야기하는 등 원래의 목표와 모순되는 의도하지 않은 결과를 낳습니다
wrong_answers:
  - 의도는 결과와 비교하여 객관적으로 측정하기가 너무 어려워 연구자와 분석가에게 정책 평가가 불가능합니다
  - 정치인들은 유권자들을 오도하기 위해 의도적으로 잘못된 의도를 사용하여 측정 가능한 경제 지표에만 집중해야 합니다
  - 정책 시행 중에 의도는 너무 자주 바뀌는 반면, 결과는 일정하게 유지되어 장기적으로 더 나은 지침을 제공합니다
explanation: |
  프리드먼은 인간의 행동과 인센티브에 대한 엄격한 분석에 기반하지 않으면 선의의 의도로 만들어진 정책이 예상치 못한 해로운 결과를 초래할 수 있다고 주장합니다
  인센티브에 대한 엄격한 분석에 근거하지 않으면 예상치 못한 해로운 결과를 초래할 수 있다고 주장합니다. 특히 빈곤층을 돕는 것으로 표시된 프로그램이 선의의 후원자가 원하는 것과는 정반대의 효과를 가져와 경제적 의존과 같은 왜곡된 효과를 낳는 경우가 많다고 언급합니다. 이는 관찰 가능한 특성과 측정 가능한 결과에 초점을 맞춘 구조적 정의가 선언적 동기에 기반한 의도적 정의보다 우선시되어야 하는 이유를 설명합니다.
question: Secondo la prospettiva di Friedman, qual è il problema principale nel giudicare le politiche sociali in base alle loro intenzioni dichiarate piuttosto che ai loro risultati effettivi?
answer: Le politiche ben intenzionate spesso producono conseguenze non volute che contraddicono i loro obiettivi originari, come la creazione di dipendenza o di distorsioni del mercato
wrong_answers:
  - Le intenzioni sono troppo difficili da misurare oggettivamente rispetto ai risultati, rendendo impossibile la valutazione delle politiche per ricercatori e analisti
  - I politici usano deliberatamente false intenzioni per ingannare gli elettori, rendendo necessario concentrarsi solo su indicatori economici misurabili
  - Le intenzioni cambiano troppo spesso durante l'attuazione delle politiche, mentre i risultati rimangono costanti e forniscono una migliore guida a lungo termine
explanation: |
  Friedman sostiene che le politiche motivate da intenzioni generose possono avere conseguenze impreviste o dannose se non si basano su un'analisi rigorosa del comportamento umano e degli incentivi
  comportamento umano e degli incentivi. Il testo menziona specificamente che i programmi etichettati come di aiuto ai poveri spesso hanno effetti opposti a quelli desiderati dai loro sponsor ben intenzionati, creando effetti perversi come la dipendenza economica. Questo illustra perché le definizioni strutturali che si concentrano su caratteristiche osservabili e risultati misurabili dovrebbero avere la precedenza sulle definizioni intenzionali basate su motivazioni dichiarate.
question: Friedman'ın bakış açısına göre, sosyal politikaları gerçek sonuçlarından ziyade belirtilen niyetlerine göre değerlendirmenin temel sorunu nedir?
answer: İyi niyetli politikalar genellikle bağımlılık veya piyasa çarpıklıkları yaratmak gibi asıl amaçlarıyla çelişen istenmeyen sonuçlar doğurur
wrong_answers:
  - Niyetlerin sonuçlara kıyasla objektif olarak ölçülmesi çok zordur, bu da araştırmacılar ve analistler için politika değerlendirmesini imkansız hale getirir
  - Politikacılar seçmenleri yanıltmak için kasıtlı olarak yanlış niyetler kullanmakta, bu da sadece ölçülebilir ekonomik göstergelere odaklanmayı gerekli kılmaktadır
  - Politika uygulaması sırasında niyetler çok sık değişirken, sonuçlar sabit kalır ve daha iyi uzun vadeli rehberlik sağlar
explanation: |
  Friedman, cömert niyetlerle motive edilen politikaların, insani değerlerin titiz bir analizine dayanmadığı takdirde öngörülemeyen veya zararlı sonuçlara yol açabileceğini savunmaktadır
  davranış ve teşvikler. Metinde, yoksullara yardım olarak etiketlenen programların genellikle iyi niyetli sponsorlarının arzu ettiğinin tam tersi etkilere sahip olduğu ve ekonomik bağımlılık gibi sapkın etkiler yarattığı özellikle belirtilmektedir. Bu durum, gözlemlenebilir özelliklere ve ölçülebilir sonuçlara odaklanan yapısal tanımların, beyan edilen motivasyonlara dayalı kasıtlı tanımlardan neden öncelikli olması gerektiğini göstermektedir.
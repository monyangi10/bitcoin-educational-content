question: Dushingiye ku mbonerahamwe ya Friedman, ni ikihe kibazo nyamukuru co gucira urubanza politike z’imibano zishingiye ku migambi zazo zavuzwe aho gushingira ku ngaruka zazo nyazo?
answer: Amategeko afise intumbero nziza akenshi azana ingaruka zitari zo zivuguruza intumbero zayo z’intango, nk’ugutuma abantu bavyifatamwo neza canke guhindura isoko .
wrong_answers:
  - Intumbero ziragoye cane gupima mu buryo bubereye ugereranyije n’ivyavuyemwo, bikaba bituma isuzuma ry’ingingo mfatirwako ridashoboka ku bashakashatsi n’abahinga mu vy’ubuhinga .
  - Abanyapolitike barakoresha n’ibigirankana imigambi y’ikinyoma kugira ngo bazimize abatora, ivyo bikaba bituma biba ngombwa ko bibanda gusa ku bimenyetso vy’ubutunzi bishobora gupimwa .
  - Intumbero zirahinduka kenshi cane mu gihe c’ugushirwa mu ngiro kw’ingingo mfatirwako, mu gihe ingaruka ziguma zidahinduka kandi zitanga ubuyobozi bwiza bw’igihe kirekire .
explanation: |
  Friedman avuga yuko amategeko ashingiye ku migambi y’ubugwaneza ashobora kugira ingaruka zitari zitezwe canke mbi iyo zidashingiye ku gusuzuma bimwe bikomeye ivy’abantu .
  inyifato n’ivyo bitera intege. Ico canditswe kivuga mu buryo budasanzwe yuko porogarama zivugwa ko zifasha abakene akenshi zigira ingaruka zitandukanye n’ivyo abazitera inkunga bafise intumbero nziza bipfuza, zigatuma habaho ingaruka mbi nk’ukwihebera ubutunzi. Ivyo vyerekana igituma insobanuro z’imibumbe zishimikiye ku biranga umuntu bishobora kwihweza no ku ngaruka zishobora gupimwa zikwiye gufatwa imbere y’insobanuro zishingiye ku ntumbero zatangajwe.
question: 根據弗里德曼的觀點，根據社會政策所陳述的意圖而非實際結果來判斷社會政策的主要問題是什麼？
answer: 用意良好的政策往往會產生意想不到的後果，與原本的目標背道而馳，例如造成依賴性或市場扭曲。
wrong_answers:
  - 與結果相比，意圖太難客觀測量，使得研究人員和分析師無法進行政策評估
  - 政治人物刻意利用虛假意圖誤導選民，因此必須只著重於可衡量的經濟指標
  - 在政策執行過程中，意圖改變得太頻繁，而結果則保持不變，能提供更好的長期指導
explanation: |
  Friedman 認為，如果不是基於對人類行為和激勵因素的嚴謹分析，由慷慨意圖激發的政策可能會產生不可預見或有害的後果。
  行為和誘因。文中特別提到，被標籤為幫助窮人的計畫，其效果往往與用心良苦的贊助者所希望的相反，造成經濟依賴等反常影響。這說明了為什麼以可觀察的特性和可衡量的結果為重點的結構性定義應優先於以宣稱的動機為基礎的意圖性定義。
question: Jaký je zásadní rozdíl mezi libertariány a libertariány, pokud jde o organizaci ekonomiky?
answer: Libertariáni hájí soukromé vlastnictví a volný trh, zatímco libertariáni jsou proti kapitalismu a podporují kolektivní ekonomické formy
wrong_answers:
  - Libertariáni podporují státní zásahy do trhů, zatímco libertariáni dávají přednost úplné deregulaci a privatizaci ekonomiky
  - Libertariáni prosazují komunistické ekonomické systémy, zatímco libertariáni hájí tradiční kapitalistické tržní struktury
  - Libertariáni jsou proti všem formám vlastnictví, zatímco libertariáni důrazně hájí individuální vlastnická práva
explanation: |
  Z kapitoly jasně vyplývá, že libertariáni považují soukromé vlastnictví za zásadní pro svobodu jednotlivce a podporují smluvní svobodu,
  zatímco libertariáni považují "vlastnictví za krádež" a jsou antikapitalističtí a upřednostňují mutualismus, kolektivismus nebo libertariánský komunismus. To představuje základní ekonomický rozdíl mezi těmito dvěma politickými filosofiemi, a to navzdory jejich podobným názvům a společnému odporu vůči státní moci.
question: ¿Cuál es la diferencia fundamental entre libertarios y libertaires en materia de organización económica?
answer: Los libertarios defienden la propiedad privada y el libre mercado, mientras que los libertaires se oponen al capitalismo y apoyan las formas económicas colectivas
wrong_answers:
  - Los libertarios apoyan la intervención del Estado en los mercados, mientras que los liberales prefieren la desregulación económica y la privatización
  - Los libertarios abogan por sistemas económicos comunistas, mientras que los libertaires defienden las estructuras de mercado capitalistas tradicionales
  - Los libertarios se oponen a toda forma de propiedad, mientras que los liberales defienden firmemente los derechos de propiedad individual
explanation: |
  El capítulo establece claramente que los libertarios consideran que la propiedad privada es esencial para la libertad individual y apoyan la libertad contractual,
  mientras que los libertaires consideran la "propiedad como un robo" y son anticapitalistas, favoreciendo el mutualismo, el colectivismo o el comunismo libertario. Esto representa la división económica central entre estas dos filosofías políticas, a pesar de sus nombres similares y su oposición compartida a la autoridad estatal.
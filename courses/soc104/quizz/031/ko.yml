question: 경제 조직과 관련하여 자유주의자와 자유주의자의 근본적인 차이점은 무엇인가요?
answer: 자유주의자들은 사유 재산과 자유 시장을 옹호하는 반면, 자유주의자들은 자본주의에 반대하고 집단적 경제 형태를 지지합니다
wrong_answers:
  - 자유주의자들은 시장에 대한 국가 개입을 지지하는 반면, 자유주의자들은 완전한 경제 규제 완화와 민영화를 선호합니다
  - 자유주의자들은 공산주의 경제 체제를 옹호하는 반면, 자유주의자들은 전통적인 자본주의 시장 구조를 옹호합니다
  - 자유주의자들은 모든 형태의 재산 소유에 반대하는 반면, 자유주의자들은 개인의 재산권을 강력하게 옹호합니다
explanation: |
  이 장에서는 자유주의자들이 사유 재산을 개인의 자유에 필수적인 것으로 간주하고 계약상의 자유를 지지한다는 점을 분명히 밝히고 있습니다,
  반면 자유주의자들은 '재산을 도둑질'로 간주하고 반자본주의자이며 상호주의, 집단주의 또는 자유주의적 공산주의를 선호합니다. 이는 비슷한 이름과 국가 권위에 대한 공통된 반대에도 불구하고 이 두 정치 철학 사이의 핵심적인 경제적 차이를 나타냅니다.
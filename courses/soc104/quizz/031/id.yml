question: Apa perbedaan mendasar antara libertarian dan libertair dalam hal organisasi ekonomi?
answer: Libertarian membela kepemilikan pribadi dan pasar bebas, sementara libertarian menentang kapitalisme dan mendukung bentuk-bentuk ekonomi kolektif
wrong_answers:
  - Libertarian mendukung intervensi negara di pasar, sementara libertair lebih menyukai deregulasi ekonomi dan privatisasi secara menyeluruh
  - Libertarian menganjurkan sistem ekonomi komunis, sementara libertarian membela struktur pasar kapitalis tradisional
  - Libertarian menentang semua bentuk kepemilikan properti, sementara libertarian sangat membela hak milik individu
explanation: |
  Bab ini dengan jelas menetapkan bahwa kaum libertarian memandang kepemilikan pribadi sebagai hal yang penting bagi kebebasan individu dan mendukung kebebasan kontrak,
  sementara kaum libertair menganggap 'properti sebagai pencurian' dan anti-kapitalis, mendukung mutualisme, kolektivisme, atau komunisme libertarian. Ini merupakan perbedaan ekonomi utama antara kedua filosofi politik ini, meskipun namanya mirip dan sama-sama menentang otoritas negara.

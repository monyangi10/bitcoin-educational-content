question: What is the fundamental difference between libertarians and libertaires regarding economic organization?
answer: Libertarians defend private property and free markets, while libertaires oppose capitalism and support collective economic forms
wrong_answers:
  - Libertarians support state intervention in markets, while libertaires prefer complete economic deregulation and privatization
  - Libertarians advocate for communist economic systems, while libertaires defend traditional capitalist market structures
  - Libertarians oppose all forms of property ownership, while libertaires strongly defend individual property rights
explanation: |
  The chapter clearly establishes that libertarians view private property as essential for individual freedom and support contractual liberty, while libertaires consider 'property as theft' and are anticapitalist, favoring mutualism, collectivism, or libertarian communism. This represents the core economic divide between these two political philosophies, despite their similar names and shared opposition to state authority.

question: 経済組織に関して、リバタリアンとリバテールの根本的な違いは何ですか？
answer: リバタリアンは私有財産と自由市場を擁護し、リバテイアは資本主義に反対し、集団的経済形態を支持する。
wrong_answers:
  - リバタリアンは国家による市場への介入を支持し、リベラリストは完全な経済規制緩和と民営化を好む。
  - リバタリアンは共産主義経済システムを提唱し、リバテールは伝統的な資本主義市場構造を擁護する。
  - リバタリアンはあらゆる形態の財産所有に反対するが、リベラリストは個人の財産権を強く擁護する。
explanation: |
  この章では、リバタリアンは私有財産を個人の自由にとって不可欠なものとみなし、契約上の自由を支持することが明確に立証されている、
  一方、リバタリアンは「財産は窃盗」と考え、反資本主義であり、相互主義、集団主義、あるいはリバタリアン的共産主義を支持する。これは、名称が似ており、国家権力への反対を共有しているにもかかわらず、この2つの政治哲学の間にある経済的分裂の核心を表している。
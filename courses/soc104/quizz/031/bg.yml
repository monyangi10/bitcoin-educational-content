question: Каква е основната разлика между либертарианците и либертарианците по отношение на икономическата организация?
answer: Либертарианците защитават частната собственост и свободните пазари, докато либертарианците се противопоставят на капитализма и подкрепят колективните икономически форми
wrong_answers:
  - Либертарианците подкрепят държавната намеса на пазарите, докато либертарианците предпочитат пълна икономическа дерегулация и приватизация
  - Либертарианците се застъпват за комунистически икономически системи, докато либертарианците защитават традиционните капиталистически пазарни структури
  - Либертарианците се противопоставят на всички форми на собственост, докато либертарианците твърдо защитават индивидуалните права на собственост
explanation: |
  Главата ясно показва, че либертарианците смятат частната собственост за съществена за индивидуалната свобода и подкрепят договорната свобода,
  докато либертарианците смятат, че "собствеността е кражба", и са антикапиталистически настроени, като предпочитат мутуализма, колективизма или либертарианския комунизъм. Това представлява основното икономическо разделение между тези две политически философии, въпреки сходните им наименования и общото противопоставяне на държавната власт.
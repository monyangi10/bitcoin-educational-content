question: Wat is het fundamentele verschil tussen libertariërs en libertairen met betrekking tot economische organisatie?
answer: Libertariërs verdedigen privébezit en vrije markten, terwijl libertairen tegen kapitalisme zijn en collectieve economische vormen steunen
wrong_answers:
  - Libertariërs steunen staatsinterventie in markten, terwijl libertairen de voorkeur geven aan volledige economische deregulering en privatisering
  - Libertariërs pleiten voor communistische economische systemen, terwijl libertairen traditionele kapitalistische marktstructuren verdedigen
  - Libertariërs zijn tegen alle vormen van eigendom, terwijl libertairen sterk opkomen voor individuele eigendomsrechten
explanation: |
  Het hoofdstuk stelt duidelijk vast dat libertariërs privébezit als essentieel voor individuele vrijheid beschouwen en contractuele vrijheid steunen,
  terwijl libertairen "eigendom als diefstal" beschouwen en antikapitalistisch zijn, met een voorkeur voor mutualisme, collectivisme of libertair communisme. Dit vertegenwoordigt de economische kernkloof tussen deze twee politieke filosofieën, ondanks hun vergelijkbare namen en gedeelde verzet tegen staatsgezag.
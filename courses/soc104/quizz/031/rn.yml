question: Ni itandukaniro irihe ry’ishimikiro riri hagati y’abaharanira umwidegemvyo n’abaharanira umwidegemvyo ku bijanye n’imitunganirize y’ubutunzi?
answer: Abaharanira umwidegemvyo barwanira umutungo w’abantu ku giti cabo n’amasoko yidegemvya, mu gihe abaharanira umwidegemvyo barwanya ubu kapitalizimu kandi bagashigikira uburyo bw’ubutunzi rusangi .
wrong_answers:
  - Abaharanira umwidegemvyo bashigikiye ko Leta yinjira mu masoko, mu gihe abaharanira umwidegemvyo bakunda gukuraho amategeko yose y’ubutunzi no guhindura ubutunzi bube ubw’abikorera ku giti cabo .
  - Abaharanira umwidegemvyo bavuganira uburyo bw’ubutunzi bw’abakomunisita, mu gihe abaharanira umwidegemvyo barwanira imiterere y’isoko ry’abanyagihugu
  - Abaharanira umwidegemvyo barwanya uburyo bwose bwo kuba umutungo, mu gihe abaharanira umwidegemvyo barwanira cane uburenganzira bw’umuntu ku giti ciwe .
explanation: |
  Ico gice kirerekana neza ko abaharanira umwidegemvyo babona ko umutungo w’umuntu ku giti ciwe ari ngirakamaro kugira ngo umuntu agire umwidegemvyo kandi bagashigikira umwidegemvyo w’amasezerano, 
  mu gihe aba libertaire babona ko ‘itunga ari ubusuma’ kandi bakaba barwanya ubukapitaliste, bagashigikira ubumwe, ubumwe canke ubukomunisite bw’ubwigenge. Ivyo bigereranya amacakubiri nyamukuru y’ubutunzi hagati y’izo filozofiya zibiri za politike, naho zifise amazina asa kandi zikaba zisangiye ukurwanya ubutegetsi bwa Leta.
question: В чем принципиальное различие между либертарианцами и либертарианцами в вопросах организации экономики?
answer: Либертарианцы защищают частную собственность и свободные рынки, а либертарианцы выступают против капитализма и поддерживают коллективные формы хозяйствования
wrong_answers:
  - Либертарианцы поддерживают вмешательство государства в работу рынков, в то время как либертарианцы предпочитают полное дерегулирование экономики и приватизацию
  - Либертарианцы выступают за коммунистические экономические системы, а либертарианцы защищают традиционные капиталистические рыночные структуры
  - Либертарианцы выступают против всех форм собственности, в то время как либертарианцы решительно защищают индивидуальные права собственности
explanation: |
  В главе ясно показано, что либертарианцы считают частную собственность необходимой для индивидуальной свободы и поддерживают договорную свободу,
  в то время как либертарианцы рассматривают "собственность как кражу" и являются антикапиталистами, предпочитая мутуализм, коллективизм или либертарный коммунизм. В этом заключается основной экономический разрыв между этими двумя политическими философиями, несмотря на схожее название и общую оппозицию к государственной власти.
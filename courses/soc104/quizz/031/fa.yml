question: تفاوت اساسی بین لیبرتارین‌ها و لیبرتر‌ها در سازماندهی اقتصادی چیست؟
answer: لیبرتارین‌ها از مالکیت خصوصی و بازارهای آزاد دفاع می‌کنند، در حالی که لیبرترها با سرمایه‌داری مخالفند و از اشکال اقتصادی جمعی حمایت می‌کنند.
wrong_answers:
  - لیبرتارین‌ها از مداخله دولت در بازارها حمایت می‌کنند، در حالی که لیبرترها ترجیح می‌دهند اقتصاد به طور کامل مقررات‌زدایی و خصوصی‌سازی شود.
  - لیبرتارین‌ها از سیستم‌های اقتصادی کمونیستی حمایت می‌کنند، در حالی که لیبرترها از ساختارهای بازار سرمایه‌داری سنتی دفاع می‌کنند.
  - لیبرتارین‌ها با تمام اشکال مالکیت مخالفند، در حالی که لیبرترها به شدت از حقوق مالکیت فردی دفاع می‌کنند.
explanation: |
  این فصل به وضوح بیان می‌کند که لیبرتارین‌ها مالکیت خصوصی را برای آزادی فردی ضروری می‌دانند و از آزادی قراردادی حمایت می‌کنند، در حالی که لیبرترها 'مالکیت را دزدی' می‌دانند و ضد سرمایه‌داری هستند و از متقابل‌گرایی، جمع‌گرایی یا کمونیسم لیبرتارین حمایت می‌کنند. این تفاوت اقتصادی اصلی بین این دو فلسفه سیاسی را نشان می‌دهد، با وجود نام‌های مشابه و مخالفت مشترک با اقتدار دولت.
question: Sự khác biệt cơ bản giữa những người theo chủ nghĩa tự do và những người theo chủ nghĩa tự do cực đoan về tổ chức kinh tế là gì?
answer: Những người theo chủ nghĩa tự do bảo vệ quyền sở hữu tư nhân và thị trường tự do, trong khi những người theo chủ nghĩa tự do cực đoan phản đối chủ nghĩa tư bản và ủng hộ các hình thức kinh tế tập thể.
wrong_answers:
  - Những người theo chủ nghĩa tự do ủng hộ sự can thiệp của nhà nước vào thị trường, trong khi những người theo chủ nghĩa tự do cực đoan lại ưa thích việc bãi bỏ hoàn toàn các quy định kinh tế và tư nhân hóa.
  - Những người theo chủ nghĩa tự do ủng hộ các hệ thống kinh tế cộng sản, trong khi những người theo chủ nghĩa tự do bảo vệ các cấu trúc thị trường tư bản truyền thống.
  - Những người theo chủ nghĩa tự do phản đối mọi hình thức sở hữu tài sản, trong khi những người theo chủ nghĩa tự do bảo vệ mạnh mẽ quyền sở hữu cá nhân.
explanation: |
  Chương này nêu rõ rằng những người theo chủ nghĩa tự do coi quyền sở hữu tư nhân là thiết yếu cho tự do cá nhân và ủng hộ tự do hợp đồng,
  trong khi những người theo chủ nghĩa tự do cực đoan coi 'tài sản là trộm cắp' và chống chủ nghĩa tư bản, ủng hộ chủ nghĩa tương trợ, chủ nghĩa tập thể hoặc chủ nghĩa cộng sản tự do. Điều này thể hiện sự khác biệt cốt lõi về kinh tế giữa hai triết lý chính trị này, bất chấp tên gọi tương tự và cùng phản đối quyền lực nhà nước.
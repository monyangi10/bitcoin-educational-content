question: Liberteryenler ve liberteryenler arasında ekonomik örgütlenmeye ilişkin temel fark nedir?
answer: Liberteryenler özel mülkiyeti ve serbest piyasayı savunurken, liberteryenler kapitalizme karşı çıkar ve kolektif ekonomik formları destekler
wrong_answers:
  - Liberteryenler devletin piyasalara müdahalesini desteklerken, liberaller ekonominin tamamen serbestleştirilmesini ve özelleştirilmesini tercih etmektedir
  - Liberteryenler komünist ekonomik sistemleri savunurken, liberaller geleneksel kapitalist piyasa yapılarını savunurlar
  - Liberteryenler her türlü mülk sahipliğine karşı çıkarken, liberaller bireysel mülkiyet haklarını güçlü bir şekilde savunurlar
explanation: |
  Bu bölüm, liberteryenlerin özel mülkiyeti bireysel özgürlük için gerekli gördüğünü ve sözleşmeye dayalı özgürlüğü desteklediğini açıkça ortaya koymaktadır,
  libertaires ise 'mülkiyeti hırsızlık' olarak görür ve antikapitalisttir, mutualizm, kolektivizm veya liberter komünizmi tercih eder. Bu durum, benzer isimlere ve devlet otoritesine karşı ortak muhalefete rağmen, bu iki siyasi felsefe arasındaki temel ekonomik ayrımı temsil etmektedir.
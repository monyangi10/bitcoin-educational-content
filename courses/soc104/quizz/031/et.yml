question: Milline on põhimõtteline erinevus libertaarlaste ja libertaarlaste vahel seoses majanduskorraldusega?
answer: Libertaarid kaitsevad eraomandit ja vaba turgu, libertaarid on kapitalismi vastu ja toetavad kollektiivseid majandusvorme
wrong_answers:
  - Libertaarid toetavad riigi sekkumist turgudele, samas kui libertaarid eelistavad majanduse täielikku dereguleerimist ja erastamist
  - Libertaarid pooldavad kommunistlikke majandussüsteeme, samas kui libertaarid kaitsevad traditsioonilisi kapitalistlikke turustruktuure
  - Libertaarid on igasuguse omandiõiguse vastu, samas kui libertaarid kaitsevad tugevalt individuaalset omandiõigust
explanation: |
  Peatükis selgitatakse selgelt, et libertaarid peavad eraomandit üksikisiku vabaduse jaoks oluliseks ja toetavad lepingulist vabadust,
  samas kui libertaarid peavad "omandit varguseks" ja on antikapitalistlikud, pooldades mutualismi, kollektivismi või libertaarset kommunismi. See on nende kahe poliitilise filosoofia peamine majanduslik lõhe, hoolimata nende sarnastest nimedest ja ühisest vastuseisust riigivõimule.
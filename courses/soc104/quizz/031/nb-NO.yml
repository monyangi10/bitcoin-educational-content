question: Hva er den grunnleggende forskjellen mellom libertarianere og liberalister når det gjelder økonomisk organisering?
answer: Libertarianere forsvarer privat eiendom og frie markeder, mens liberalister er motstandere av kapitalisme og støtter kollektive økonomiske former
wrong_answers:
  - Libertarianere støtter statlig inngripen i markeder, mens liberalister foretrekker fullstendig økonomisk deregulering og privatisering
  - Libertarianere tar til orde for kommunistiske økonomiske systemer, mens libertaire forsvarer tradisjonelle kapitalistiske markedsstrukturer
  - Libertarianere er motstandere av alle former for eiendomsrett, mens liberalister forsvarer den individuelle eiendomsretten sterkt
explanation: |
  Kapitlet slår klart fast at libertarianere ser på privat eiendom som avgjørende for individuell frihet og støtter kontraktsfrihet,
  mens libertaire anser "eiendom som tyveri" og er antikapitalistiske, og favoriserer mutualisme, kollektivisme eller libertariansk kommunisme. Dette representerer det viktigste økonomiske skillet mellom disse to politiske filosofiene, til tross for at de har like navn og deler motstanden mot statsmakten.
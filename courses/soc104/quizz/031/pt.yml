question: Qual é a diferença fundamental entre libertários e libertários no que diz respeito à organização económica?
answer: Os libertários defendem a propriedade privada e os mercados livres, enquanto os libertários se opõem ao capitalismo e apoiam as formas económicas colectivas
wrong_answers:
  - Os libertários apoiam a intervenção do Estado nos mercados, enquanto os libertários preferem a desregulamentação económica total e a privatização
  - Os libertários defendem sistemas económicos comunistas, enquanto os libertários defendem estruturas de mercado capitalistas tradicionais
  - Os libertários opõem-se a todas as formas de propriedade, enquanto os libertários defendem firmemente os direitos de propriedade individuais
explanation: |
  O capítulo estabelece claramente que os libertários consideram a propriedade privada como essencial para a liberdade individual e apoiam a liberdade contratual,
  enquanto os libertários consideram a "propriedade como um roubo" e são anticapitalistas, favorecendo o mutualismo, o coletivismo ou o comunismo libertário. Isto representa a principal divisão económica entre estas duas filosofias políticas, apesar dos seus nomes semelhantes e da oposição partilhada à autoridade do Estado.
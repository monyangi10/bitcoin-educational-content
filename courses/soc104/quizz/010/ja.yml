question: ノーラン・チャートによると、経済的自由度は高いが、個人的自由度は低いという特徴を持つ政治的立場はどれか？
answer: 保守派
wrong_answers:
  - 社会主義者
  - リバタリアン
  - 中道派
explanation: |
  ノーラン・チャートでは、保守派は右側に位置し、高い経済的自由を支持するが個人の自由は低いと定義されている。
  これは社会主義者（経済的自由は低いが個人の自由は高い）、リバタリアン（経済的自由と個人の自由の両方を高く支持）、中道主義者（両方の自由を中程度のレベルで支持）と区別される。保守派の立場は、より厳格な社会統制を維持しながら自由市場を支持するという伝統的な右派の姿勢を反映している。
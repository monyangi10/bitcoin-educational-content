question: Hvilken politisk posisjon kjennetegnes av at den støtter høy økonomisk frihet, men lav personlig frihet, ifølge Nolan-diagrammet?
answer: Konservative
wrong_answers:
  - Sosialister
  - Libertarianere
  - Sentrumsorienterte
explanation: |
  I Nolan-diagrammet er de konservative plassert på høyre side og defineres som de som støtter høy økonomisk frihet, men lav personlig frihet.
  Dette skiller dem fra sosialister (som støtter lav økonomisk frihet, men høy personlig frihet), libertarianere (som støtter både høy økonomisk og personlig frihet) og sentrumsorienterte (som støtter moderate nivåer av begge typer frihet). Den konservative posisjonen gjenspeiler den tradisjonelle høyreorienterte holdningen om å favorisere frie markeder og samtidig opprettholde strengere sosial kontroll.
question: Enligt Nolan Chart, vilken politisk ståndpunkt kännetecknas av att den stöder hög ekonomisk frihet men låg personlig frihet?
answer: Konservativa
wrong_answers:
  - Socialister
  - Libertarianer
  - Centrister
explanation: |
  I Nolans diagram är de konservativa placerade på höger sida och definieras som de som stöder hög ekonomisk frihet men låg personlig frihet.
  Detta skiljer dem från socialister (som stöder låg ekonomisk frihet men hög personlig frihet), libertarianer (som stöder både hög ekonomisk och personlig frihet) och centrister (som stöder måttliga nivåer av båda typerna av frihet). Den konservativa ståndpunkten återspeglar den traditionella högerståndpunkten att förespråka fria marknader samtidigt som man upprätthåller strängare sociala kontroller.
question: 놀란 차트에 따르면, 경제적 자유는 높지만 개인의 자유는 낮은 정치적 입장이라고 할 수 있는 것은?
answer: 보수주의자
wrong_answers:
  - 사회주의자
  - 자유주의자
  - 중심주의자
explanation: |
  놀란 차트에서 보수주의자는 오른쪽에 위치하며 높은 경제적 자유를 지지하지만 낮은 개인의 자유를 지지하는 사람들로 정의됩니다.
  이는 사회주의자(경제적 자유는 낮지만 개인의 자유는 높은 지지), 자유주의자(경제적 자유와 개인의 자유를 모두 지지), 중도주의자(두 가지 유형의 자유를 중간 수준으로 지지)와 구별됩니다. 보수주의는 자유 시장을 선호하면서도 엄격한 사회적 통제를 유지하려는 전통적인 우파의 입장을 반영합니다.
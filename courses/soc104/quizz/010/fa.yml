question: بر اساس نمودار نولان، کدام موقعیت سیاسی با حمایت از آزادی اقتصادی بالا اما آزادی شخصی پایین مشخص می‌شود؟
answer: محافظه‌کاران
wrong_answers:
  - سوسیالیست‌ها
  - لیبرتارین‌ها
  - میانه‌روها
explanation: |
  در نمودار نولان، محافظه‌کاران در سمت راست قرار دارند و به عنوان کسانی تعریف می‌شوند که از آزادی اقتصادی بالا اما آزادی شخصی پایین حمایت می‌کنند. این ویژگی آن‌ها را از سوسیالیست‌ها (که از آزادی اقتصادی پایین اما آزادی شخصی بالا حمایت می‌کنند)، لیبرترین‌ها (که از هر دو آزادی اقتصادی و شخصی بالا حمایت می‌کنند)، و میانه‌روها (که از سطح متوسطی از هر دو نوع آزادی حمایت می‌کنند) متمایز می‌کند. موضع محافظه‌کارانه منعکس‌کننده دیدگاه سنتی جناح راست است که طرفدار بازارهای آزاد است در حالی که کنترل‌های اجتماعی سخت‌تری را حفظ می‌کند.
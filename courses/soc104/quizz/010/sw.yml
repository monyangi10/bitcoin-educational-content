question: Kulingana na Chati ya Nolan, ni msimamo gani wa kisiasa unaoonyeshwa kwa kuunga mkono uhuru mkubwa wa kiuchumi lakini uhuru mdogo wa kibinafsi?
answer: Wahafidhina
wrong_answers:
  - Wasoshalisti
  - Wanaliberali
  - Wakuu wa Kati
explanation: |
  Katika Chati ya Nolan, wahafidhina wamewekwa upande wa kulia na hufafanuliwa kama wale wanaounga mkono uhuru mkubwa wa kiuchumi lakini uhuru mdogo wa kibinafsi.
  Hii inawatofautisha na wasoshalisti (wanaounga mkono uhuru mdogo wa kiuchumi lakini uhuru mkubwa wa kibinafsi), waliberali (wanaounga mkono uhuru mkubwa wa kiuchumi na kibinafsi), na wa katikati (wanaounga mkono viwango vya wastani vya aina zote mbili za uhuru). Msimamo wa kihafidhina unaonyesha msimamo wa jadi wa mrengo wa kulia wa kupendelea masoko huria huku ukidumisha udhibiti mkali wa kijamii.
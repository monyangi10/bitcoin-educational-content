question: Mille poliittiselle kannalle on Nolanin kaavion mukaan ominaista korkean taloudellisen vapauden mutta alhaisen henkilökohtaisen vapauden tukeminen?
answer: Konservatiivit
wrong_answers:
  - Sosialistit
  - Libertarians
  - Keskustalaiset
explanation: |
  Nolanin kaaviossa konservatiivit sijoittuvat oikealle puolelle, ja heidät määritellään henkilöiksi, jotka kannattavat suurta taloudellista vapautta mutta pientä henkilökohtaista vapautta.
  Tämä erottaa heidät sosialisteista (jotka kannattavat pientä taloudellista vapautta mutta suurta henkilökohtaista vapautta), libertaristeista (jotka kannattavat sekä suurta taloudellista että henkilökohtaista vapautta) ja keskustalaisista (jotka kannattavat molempia vapauslajeja kohtalaisesti). Konservatiivinen kanta kuvastaa perinteistä oikeistolaista kantaa, jossa kannatetaan vapaita markkinoita ja säilytetään samalla tiukempi sosiaalinen valvonta.
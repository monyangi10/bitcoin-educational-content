question: Dukurikije igicapo ca Nolan, ni ikihe kibanza ca politike kirangwa no gushigikira umwidegemvyo wo mu vy’ubutunzi wo hejuru ariko umwidegemvyo w’umuntu ku giti ciwe ukaba uri hasi?
answer: Abanyagihugu
wrong_answers:
  - Abasosiyalisiti
  - Abaharanira umwidegemvyo
  - Abanyagihugu
explanation: |
  Mu gitabu ca Nolan, abakunda ivy’ubuhinga bwa none bashirwa ku ruhande rw’iburyo kandi basobanurwa nk’abashigikiye umwidegemvyo wo mu vy’ubutunzi wo hejuru ariko umwidegemvyo w’umuntu ku giti ciwe ukaba ari muto. 
  Ivyo bibatandukanya n’abasosiyalisiti (bashigikiye umwidegemvyo mutoyi w’ubutunzi ariko umwidegemvyo w’umuntu ku giti ciwe uri hejuru), abashigikiye umwidegemvyo wo hejuru mu vy’ubutunzi n’uw’umuntu ku giti ciwe), n’abashigikiye umwidegemvyo wo hagati (bashigikiye ingero ziringaniye z’ubwo bwoko bwompi bw’umwidegemvyo). Ico kibanza c’abanyagihugu kigaragaza ivyiyumviro vya kera vy’abanyaburyo vyo gushigikira amasoko yidegemvya mu gihe bagumana ubugenzuzi bukomeye bw’imibano.
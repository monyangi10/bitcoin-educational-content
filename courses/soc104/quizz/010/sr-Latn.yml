question: Prema Nolanovom grafikonu, politička pozicija koja se odlikuje podržavanjem visoke ekonomske slobode, ali niske lične slobode, je konzervativizam.
answer: Konzervativci
wrong_answers:
  - Socijalisti
  - Libertarijanci
  - Centristi
explanation: |
  Na Nolanovom grafikonu, konzervativci su pozicionirani na desnoj strani i definišu se kao oni koji podržavaju visoku ekonomsku slobodu, ali nisku ličnu slobodu. 
  Ovo ih razlikuje od socijalista (koji podržavaju nisku ekonomsku slobodu, ali visoku ličnu slobodu), libertarijanaca (koji podržavaju i visoku ekonomsku i ličnu slobodu) i centrista (koji podržavaju umerene nivoe oba tipa slobode). Konzervativna pozicija odražava tradicionalni desničarski stav favorizovanja slobodnih tržišta uz održavanje strožijih društvenih kontrola.
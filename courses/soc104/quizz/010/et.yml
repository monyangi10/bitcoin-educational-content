question: Millist poliitilist seisukohta iseloomustab Nolani diagrammi kohaselt kõrge majandusliku vabaduse, kuid madala isikliku vabaduse toetamine?
answer: Konservatiivid
wrong_answers:
  - Sotsialistid
  - Libertarians
  - Keskerakondlased
explanation: |
  Nolani graafikus on konservatiivid paigutatud paremale poole ja neid määratletakse kui neid, kes toetavad suurt majanduslikku vabadust, kuid väikest isiklikku vabadust.
  See eristab neid sotsialistidest (kes toetavad madalat majanduslikku vabadust, kuid suurt isiklikku vabadust), libertaarlastest (kes toetavad nii suurt majanduslikku kui ka isiklikku vabadust) ja tsentristidest (kes toetavad mõlemat liiki vabadust mõõdukal tasemel). Konservatiivne positsioon peegeldab traditsioonilist parempoolset seisukohta, mis pooldab vaba turgu, säilitades samal ajal rangema sotsiaalse kontrolli.
question: ตามแผนภูมิ Nolan ตำแหน่งทางการเมืองที่มีลักษณะสนับสนุนเสรีภาพทางเศรษฐกิจสูงแต่เสรีภาพส่วนบุคคลต่ำคืออะไร?
answer: อนุรักษ์นิยม
wrong_answers:
  - สังคมนิยม
  - เสรีนิยม
  - Centrist
explanation: |
  ในแผนภูมิของโนแลน นักอนุรักษนิยมจะอยู่ทางด้านขวาและถูกกำหนดให้เป็นผู้ที่สนับสนุนเสรีภาพทางเศรษฐกิจสูงแต่เสรีภาพส่วนบุคคลต่ำ สิ่งนี้ทำให้พวกเขาแตกต่างจากสังคมนิยม (ที่สนับสนุนเสรีภาพทางเศรษฐกิจต่ำแต่เสรีภาพส่วนบุคคลสูง), เสรีนิยม (ที่สนับสนุนทั้งเสรีภาพทางเศรษฐกิจและส่วนบุคคลสูง), และสายกลาง (ที่สนับสนุนระดับปานกลางของเสรีภาพทั้งสองประเภท) ตำแหน่งของนักอนุรักษนิยมสะท้อนถึงท่าทีดั้งเดิมของฝ่ายขวาที่สนับสนุนตลาดเสรีในขณะที่ยังคงควบคุมสังคมอย่างเข้มงวด
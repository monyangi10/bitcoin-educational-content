question: नोलन चार्ट के अनुसार, कौन सी राजनीतिक स्थिति उच्च आर्थिक स्वतंत्रता का समर्थन करती है लेकिन निम्न व्यक्तिगत स्वतंत्रता का?
answer: परंपरावादी
wrong_answers:
  - समाजवादियों
  - उदारवादी
  - मध्यमार्गी
explanation: |
  नोलन चार्ट में, रूढ़िवादियों को दाईं ओर रखा गया है और उन्हें उन लोगों के रूप में परिभाषित किया गया है जो उच्च आर्थिक स्वतंत्रता का समर्थन करते हैं लेकिन कम व्यक्तिगत स्वतंत्रता का।
  यह उन्हें समाजवादियों (जो कम आर्थिक स्वतंत्रता का समर्थन करते हैं लेकिन उच्च व्यक्तिगत स्वतंत्रता का), स्वतंत्रतावादियों (जो उच्च आर्थिक और व्यक्तिगत स्वतंत्रता दोनों का समर्थन करते हैं) और मध्यमार्गी (जो दोनों प्रकार की स्वतंत्रता के मध्यम स्तर का समर्थन करते हैं) से अलग करता है। रूढ़िवादी स्थिति मुक्त बाजारों का समर्थन करने के साथ-साथ सख्त सामाजिक नियंत्रण बनाए रखने के पारंपरिक दक्षिणपंथी रुख को दर्शाती है।
question: According to the Nolan Chart, which political position is characterized by supporting high economic freedom but low personal freedom?
answer: Conservatives
wrong_answers:
  - Socialists
  - Libertarians
  - Centrists
explanation: |
  In the Nolan Chart, conservatives are positioned on the right side and are defined as those who support high economic freedom but low personal freedom. 
  This distinguishes them from socialists (who support low economic freedom but high personal freedom), libertarians (who support both high economic and personal freedom), and centrists (who support moderate levels of both types of freedom). The conservative position reflects the traditional right-wing stance of favoring free markets while maintaining stricter social controls.

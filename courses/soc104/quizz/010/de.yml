question: Welche politische Position zeichnet sich nach dem Nolan-Diagramm dadurch aus, dass sie eine hohe wirtschaftliche Freiheit, aber eine geringe persönliche Freiheit unterstützt?
answer: Konservative
wrong_answers:
  - Sozialdemokraten
  - Libertäre
  - Zentristen
explanation: |
  Im Nolan-Diagramm befinden sich die Konservativen auf der rechten Seite und werden als diejenigen definiert, die eine hohe wirtschaftliche Freiheit, aber eine geringe persönliche Freiheit befürworten.
  Dies unterscheidet sie von Sozialisten (die eine geringe wirtschaftliche Freiheit, aber eine hohe persönliche Freiheit befürworten), Libertären (die sowohl eine hohe wirtschaftliche als auch persönliche Freiheit befürworten) und Zentristen (die ein moderates Niveau beider Arten von Freiheit befürworten). Die konservative Position spiegelt die traditionelle Haltung der Rechten wider, die freie Märkte befürwortet und gleichzeitig strengere soziale Kontrollen beibehält.
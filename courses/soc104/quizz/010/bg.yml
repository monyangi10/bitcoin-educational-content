question: Според графиката на Нолан коя политическа позиция се характеризира с подкрепа на висока икономическа свобода, но ниска лична свобода?
answer: Консерватори
wrong_answers:
  - Социалисти
  - Либертарианци
  - Центристи
explanation: |
  В диаграмата на Нолан консерваторите са разположени в дясната част и се определят като хора, които подкрепят висока икономическа свобода, но ниска лична свобода.
  Това ги разграничава от социалистите (които подкрепят ниска икономическа свобода, но висока лична свобода), либертарианците (които подкрепят както висока икономическа, така и лична свобода) и центристите (които подкрепят умерени нива на двата вида свобода). Консервативната позиция отразява традиционната позиция на десницата, която подкрепя свободните пазари, като същевременно поддържа по-строг социален контрол.
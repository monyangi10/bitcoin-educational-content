question: Theo biểu đồ Nolan, lập trường chính trị nào được đặc trưng bởi việc ủng hộ tự do kinh tế cao nhưng tự do cá nhân thấp?
answer: Những người bảo thủ
wrong_answers:
  - Những người theo chủ nghĩa xã hội
  - Những người theo chủ nghĩa tự do
  - Những người theo chủ nghĩa trung dung
explanation: |
  Trong biểu đồ Nolan, phe bảo thủ được định vị ở phía bên phải và được xác định là những người ủng hộ tự do kinh tế cao nhưng tự do cá nhân thấp.
  Điều này phân biệt họ với những người theo chủ nghĩa xã hội (ủng hộ tự do kinh tế thấp nhưng tự do cá nhân cao), những người theo chủ nghĩa tự do cá nhân (ủng hộ cả tự do kinh tế và tự do cá nhân cao) và những người theo chủ nghĩa trung dung (ủng hộ mức độ vừa phải của cả hai loại tự do). Quan điểm bảo thủ phản ánh lập trường truyền thống của cánh hữu là ủng hộ thị trường tự do trong khi vẫn duy trì các biện pháp kiểm soát xã hội nghiêm ngặt hơn.
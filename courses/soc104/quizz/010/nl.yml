question: Welke politieke positie wordt volgens de Nolan Chart gekarakteriseerd door het steunen van veel economische vrijheid maar weinig persoonlijke vrijheid?
answer: Conservatieven
wrong_answers:
  - Socialisten
  - Libertariërs
  - Centristen
explanation: |
  In de Nolan Grafiek staan conservatieven aan de rechterkant en worden gedefinieerd als mensen die een hoge mate van economische vrijheid voorstaan, maar een lage mate van persoonlijke vrijheid.
  Dit onderscheidt hen van socialisten (die lage economische vrijheid maar hoge persoonlijke vrijheid steunen), libertariërs (die zowel hoge economische als persoonlijke vrijheid steunen) en centristen (die gematigde niveaus van beide soorten vrijheid steunen). Het conservatieve standpunt weerspiegelt het traditionele rechtse standpunt dat voorstander is van vrije markten en tegelijkertijd een strengere sociale controle handhaaft.
question: De acordo com o gráfico de Nolan, que posição política se caracteriza por apoiar uma elevada liberdade económica mas uma baixa liberdade pessoal?
answer: Conservadores
wrong_answers:
  - Socialistas
  - Libertários
  - Centristas
explanation: |
  No gráfico de Nolan, os conservadores estão posicionados no lado direito e são definidos como aqueles que apoiam uma elevada liberdade económica mas uma baixa liberdade pessoal.
  Isto distingue-os dos socialistas (que apoiam uma liberdade económica reduzida mas uma liberdade pessoal elevada), dos libertários (que apoiam uma liberdade económica e pessoal elevada) e dos centristas (que apoiam níveis moderados de ambos os tipos de liberdade). A posição conservadora reflecte a posição tradicional da direita de favorecer os mercados livres, mantendo simultaneamente controlos sociais mais rigorosos.
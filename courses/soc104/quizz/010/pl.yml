question: Zgodnie z wykresem Nolana, które stanowisko polityczne charakteryzuje się wspieraniem wysokiej wolności gospodarczej, ale niskiej wolności osobistej?
answer: Konserwatyści
wrong_answers:
  - Socjaliści
  - Libertarianie
  - Centryści
explanation: |
  Na wykresie Nolana konserwatyści znajdują się po prawej stronie i są zdefiniowani jako ci, którzy popierają wysoką wolność gospodarczą, ale niską wolność osobistą.
  Odróżnia ich to od socjalistów (którzy popierają niską wolność gospodarczą, ale wysoką wolność osobistą), libertarian (którzy popierają zarówno wysoką wolność gospodarczą, jak i osobistą) oraz centrystów (którzy popierają umiarkowane poziomy obu rodzajów wolności). Konserwatywne stanowisko odzwierciedla tradycyjną prawicową postawę faworyzowania wolnych rynków przy jednoczesnym utrzymaniu ściślejszej kontroli społecznej.
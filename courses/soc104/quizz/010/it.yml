question: Secondo il diagramma di Nolan, quale posizione politica si caratterizza per sostenere un'elevata libertà economica ma una bassa libertà personale?
answer: Conservatori
wrong_answers:
  - Socialisti
  - Libertari
  - Centristi
explanation: |
  Nel diagramma di Nolan, i conservatori sono posizionati sul lato destro e sono definiti come coloro che sostengono un'elevata libertà economica ma una bassa libertà personale.
  Questo li distingue dai socialisti (che sostengono una bassa libertà economica ma un'alta libertà personale), dai libertari (che sostengono sia un'alta libertà economica che personale) e dai centristi (che sostengono livelli moderati di entrambi i tipi di libertà). La posizione conservatrice riflette la tradizionale posizione di destra che favorisce il libero mercato pur mantenendo controlli sociali più severi.
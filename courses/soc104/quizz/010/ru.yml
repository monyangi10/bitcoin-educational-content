question: Согласно диаграмме Нолана, какая политическая позиция характеризуется поддержкой высокой экономической свободы, но низкой личной свободы?
answer: Консерваторы
wrong_answers:
  - Социалисты
  - Либертарианцы
  - Центристы
explanation: |
  На диаграмме Нолана консерваторы располагаются с правой стороны и определяются как сторонники высокой экономической свободы, но низкой личной свободы.
  Это отличает их от социалистов (сторонников низкой экономической свободы, но высокой личной свободы), либертарианцев (сторонников как высокой экономической, так и личной свободы) и центристов (сторонников умеренных уровней обоих видов свободы). Консервативная позиция отражает традиционную позицию правых, выступающих за свободные рынки при сохранении более жесткого социального контроля.
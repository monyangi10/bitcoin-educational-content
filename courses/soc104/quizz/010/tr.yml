question: Nolan Çizelgesine göre, hangi siyasi pozisyon yüksek ekonomik özgürlüğü, ancak düşük kişisel özgürlüğü desteklemekle karakterize edilir?
answer: Muhafazakârlar
wrong_answers:
  - Sosyalistler
  - Liberteryenler
  - Merkezciler
explanation: |
  Nolan Grafiğinde muhafazakarlar sağ tarafta konumlandırılmış ve yüksek ekonomik özgürlüğü ancak düşük kişisel özgürlüğü destekleyenler olarak tanımlanmıştır.
  Bu onları sosyalistlerden (düşük ekonomik özgürlüğü ancak yüksek kişisel özgürlüğü destekleyenler), liberteryenlerden (hem yüksek ekonomik hem de kişisel özgürlüğü destekleyenler) ve merkezcilerden (her iki özgürlük türünü de orta düzeyde destekleyenler) ayırmaktadır. Muhafazakar pozisyon, daha sıkı sosyal kontrolleri sürdürürken serbest piyasaları destekleyen geleneksel sağcı duruşu yansıtmaktadır.
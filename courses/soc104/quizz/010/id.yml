question: Menurut Bagan Nolan, posisi politik manakah yang dicirikan dengan mendukung kebebasan ekonomi yang tinggi tetapi kebebasan pribadi yang rendah?
answer: Konservatif
wrong_answers:
  - Sosialis
  - Libertarian
  - Sentris
explanation: |
  Dalam Bagan Nolan, kaum konservatif diposisikan di sisi kanan dan didefinisikan sebagai mereka yang mendukung kebebasan ekonomi yang tinggi tetapi kebebasan pribadi yang rendah.
  Hal ini membedakan mereka dari kaum sosialis (yang mendukung kebebasan ekonomi yang rendah tetapi kebebasan pribadi yang tinggi), libertarian (yang mendukung kebebasan ekonomi dan kebebasan pribadi yang tinggi), dan sentris (yang mendukung tingkat moderat dari kedua jenis kebebasan tersebut). Posisi konservatif mencerminkan sikap tradisional sayap kanan yang mendukung pasar bebas sambil mempertahankan kontrol sosial yang lebih ketat.
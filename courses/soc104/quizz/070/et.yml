question: Milline on libertaarne vaatenurk ühiskondlikes küsimustes kõige järjekindlam lähenemisviis konfliktide lahendamiseks üksikisiku vabaduse ja valitsuse reguleerimise vahel?
answer: Erastada asutused ja lasta vabatahtlikel ühendustel reguleerida, selle asemel, et lasta riigil kehtestada kõigile ühtsed reeglid
wrong_answers:
  - Luua terviklikud valitsuse eeskirjad, mis tasakaalustavad konkureerivaid huve, kaitstes samal ajal vähemuste õigusi enamuse rõhumise eest
  - Luua demokraatlikud protsessid, kus enamuse hääl määrab sotsiaalpoliitika, säilitades samal ajal põhiõiguste põhiseadusliku kaitse
  - Töötada välja tõenduspõhine poliitika, mis seab avaliku julgeoleku ja sotsiaalse ühtekuuluvuse individuaalsete eelistuste asemel esikohale vastuolulistes valdkondades
explanation: |
  Libertaarne lähenemine pooldab järjekindlalt riigi kontrolli kaotamist ja eraõiguslike institutsioonide reguleerimise lubamist. See ilmneb nende seisukohtades abielu (erastada see ja lasta kirikutel/privaatorganisatsioonidel otsustada), immigratsiooni (destatiseerida ühiskond ja lasta kodanikel otsustada) ja narkootikumide osas (jah, vabadus, kuid ainult siis, kui ühiskond on destatiseeritud).
  Teised valikud esindavad sotsialistlikke, tsentristlikke või konservatiivseid lähenemisviise, mis säilitavad riigi erineva osaluse, mitte aga libertaarset põhimõtet, mille kohaselt valitsuse võimu minimeeritakse erastamise kaudu.
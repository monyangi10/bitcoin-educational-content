question: Според либертарианската гледна точка към обществените въпроси какъв е най-последователният подход за разрешаване на конфликтите между индивидуалната свобода и държавното регулиране?
answer: Приватизиране на институциите и оставяне на доброволните сдружения да се справят с регулирането, вместо държавата да налага еднакви правила за всички
wrong_answers:
  - Създаване на всеобхватни правителствени разпоредби, които балансират конкуриращите се интереси и същевременно защитават правата на малцинствата от потисничество от страна на мнозинството
  - Създаване на демократични процеси, при които мнозинството определя социалните политики, като същевременно се запазва конституционната защита на основните права
  - Разработване на основани на доказателства политики, които дават приоритет на обществената безопасност и социалното сближаване пред индивидуалните предпочитания в спорни области
explanation: |
  Либертарианският подход последователно се застъпва за премахване на държавния контрол и за предоставяне на възможност на частните институции да се справят с регулирането. Това е видно от позицията им по отношение на брака (приватизирайте го и оставете църквите/частните организации да решават), имиграцията (дестабилизирайте обществото и оставете гражданите да решават) и наркотиците (да на свободата, но само ако обществото е дестабилизирано).
  Другите варианти представляват социалистически, центристки или консервативни подходи, които поддържат различна степен на държавно участие, а не либертарианския принцип за минимизиране на държавната власт чрез приватизация.
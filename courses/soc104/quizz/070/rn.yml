question: Dushingiye ku mbonerahamwe y’abanyagihugu ku bibazo vy’imibano, ni ubuhe buryo buhuye cane bwo gutorera umuti amakimbirane ari hagati y’umwidegemvyo w’umuntu ku giti ciwe n’amategeko ya Leta?
answer: Guhindura inzego z'abikorera ku giti cabo no kureka amashirahamwe y'ubushake akora amategeko aho gusaba Leta gutegeka amategeko amwe ku muntu wese .
wrong_answers:
  - Gushinga amategeko yuzuye ya Leta aringaniza inyungu zihiganwa mu gihe akingira uburenganzira bw'abantu bake agahahazo k'abantu benshi .
  - Gushinga inzira za demokarasi aho amatora menshi agena politike z’imibano mu gihe hagumyeho uburinzi bw’itegeko nshinga bw’uburenganzira bw’ishimikiro .
  - Gutegura amategeko ashingiye ku bimenyamenya ashira imbere umutekano wa bose n'ubumwe bw'abantu kuruta ivyo umuntu akunda mu bice bitera impaka
explanation: |
  Uburyo bw’abanyagihugu buhora bushigikira gukuraho ubugenzuzi bwa Leta no kwemera ko inzego z’abikorera ku giti cabo zijejwe ivy’amategeko. Ivyo bigaragara mu vyo bafata ku bijanye n’ubugeni (kubugira ubw’abantu ku giti cabo maze amashengero/imiryango yigenga igafata ingingo), abimukira (gukuraho ubutegetsi bw’igihugu maze abanyagihugu bafate ingingo), n’ibiyayuramutwe (egome ku mwidegemvyo ariko iyo gusa ubutegetsi buhinduwe ubutegetsi). 
  Ayandi mahitamwo agereranya uburyo bw’abanyagihugu, ubw’abanyagihugu, canke ubw’abanyagihugu bugumya ingero zitandukanye z’uruhara rwa Leta aho gushingira ku ngingo ngenderwako y’ubwigenge yo kugabanya ububasha bwa Leta biciye mu guhindura ububasha bwa Leta mu buryo bw’abikorera ku giti cabo.
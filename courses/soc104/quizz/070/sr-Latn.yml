question: Prema libertarijanskoj perspektivi o društvenim pitanjima, najdosledniji pristup rešavanju sukoba između individualne slobode i državne regulative je minimiziranje uloge vlade i maksimiziranje ličnih sloboda, uz poštovanje principa neagresije.
answer: Privatizujte institucije i dozvolite dobrovoljnim udruženjima da se bave regulacijom umesto da država nameće jedinstvena pravila svima.
wrong_answers:
  - Kreirajte sveobuhvatne vladine propise koji balansiraju suprotstavljene interese, dok štite prava manjina od ugnjetavanja većine.
  - Uspostaviti demokratske procese gde većinsko glasanje određuje socijalne politike, uz očuvanje ustavnih zaštita osnovnih prava
  - Razvijte politike zasnovane na dokazima koje daju prioritet javnoj bezbednosti i društvenoj koheziji nad individualnim preferencijama u kontroverznim oblastima.
explanation: |
  Libertarijanski pristup dosledno zagovara uklanjanje državne kontrole i omogućavanje privatnim institucijama da se bave regulacijom. Ovo je evidentno u njihovom stavu prema braku (privatizovati ga i dozvoliti crkvama/privatnim organizacijama da odlučuju), imigraciji (destatizovati društvo i dozvoliti građanima da odlučuju), i drogama (da slobodi, ali samo ako je društvo destatizovano). 
  Druge opcije predstavljaju socijalističke, centrističke ili konzervativne pristupe koji održavaju različite stepene državnog učešća, za razliku od libertarijanskog principa minimiziranja vladine moći kroz privatizaciju.
question: Kulingana na mtazamo wa uhuru kuhusu masuala ya kijamii, ni mbinu gani thabiti zaidi ya kutatua migogoro kati ya uhuru wa mtu binafsi na kanuni za serikali?
answer: Kubinafsisha taasisi na kuruhusu vyama vya hiari kushughulikia kanuni badala ya serikali kuweka sheria zinazofanana kwa kila mtu
wrong_answers:
  - Unda kanuni kamili za serikali zinazosawazisha maslahi shindani huku zikilinda haki za wachache kutokana na ukandamizaji wa walio wengi
  - Kuanzisha michakato ya kidemokrasia ambapo kura nyingi huamua sera za kijamii huku zikidumisha ulinzi wa kikatiba kwa haki za msingi
  - Kuendeleza sera zinazotegemea ushahidi zinazopa kipaumbele usalama wa umma na mshikamano wa kijamii kuliko mapendeleo ya mtu binafsi katika maeneo yenye utata
explanation: |
  Mbinu ya uhuru hutetea mara kwa mara kuondoa udhibiti wa serikali na kuruhusu taasisi za kibinafsi kushughulikia kanuni. Hii inaonekana wazi katika msimamo wao kuhusu ndoa (kuibinafsisha na kuruhusu makanisa/mashirika ya kibinafsi kuamua), uhamiaji (kuharibu jamii na kuruhusu raia kuamua), na dawa za kulevya (ndiyo kwa uhuru lakini tu ikiwa jamii imeharibiwa).
  Chaguzi zingine zinawakilisha mbinu za kijamaa, za kikatiba, au za kihafidhina zinazodumisha viwango tofauti vya ushiriki wa serikali badala ya kanuni ya uhuru ya kupunguza nguvu za serikali kupitia ubinafsishaji.
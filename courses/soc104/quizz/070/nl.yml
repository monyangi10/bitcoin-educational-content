question: Wat is volgens het libertarische perspectief op maatschappelijke kwesties de meest consistente aanpak om conflicten tussen individuele vrijheid en overheidsregulering op te lossen?
answer: Privatiseer instellingen en laat vrijwillige verenigingen de regelgeving afhandelen in plaats van dat de staat iedereen uniforme regels oplegt
wrong_answers:
  - Uitgebreide overheidsregels opstellen die concurrerende belangen in evenwicht brengen en tegelijkertijd de rechten van minderheden beschermen tegen onderdrukking door de meerderheid
  - Democratische processen instellen waarbij de meerderheid van de stemmen het sociale beleid bepaalt, met behoud van grondwettelijke bescherming voor basisrechten
  - Op feiten gebaseerd beleid ontwikkelen dat prioriteit geeft aan openbare veiligheid en sociale cohesie boven individuele voorkeuren op controversiële gebieden
explanation: |
  De libertarische benadering pleit consequent voor het verwijderen van staatscontrole en het toestaan van privé-instellingen om de regulering te regelen. Dit is duidelijk te zien in hun standpunt over het huwelijk (privatiseer het en laat kerken/particuliere organisaties beslissen), immigratie (destatiseer de maatschappij en laat burgers beslissen) en drugs (ja tegen vrijheid, maar alleen als de maatschappij gedestatiseerd wordt).
  De andere opties vertegenwoordigen socialistische, centristische of conservatieve benaderingen die verschillende gradaties van staatsbemoeienis handhaven in plaats van het libertarische principe van het minimaliseren van overheidsmacht door privatisering.
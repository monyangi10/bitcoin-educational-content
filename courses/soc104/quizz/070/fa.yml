question: بر اساس دیدگاه لیبرترین در مورد مسائل اجتماعی، سازگارترین رویکرد برای حل تعارضات بین آزادی فردی و مقررات دولتی چیست؟
answer: خصوصی‌سازی نهادها و اجازه دادن به انجمن‌های داوطلبانه برای مدیریت مقررات به جای اینکه دولت قوانین یکنواختی را بر همه تحمیل کند.
wrong_answers:
  - ایجاد مقررات جامع دولتی که منافع متضاد را متعادل کند و در عین حال از حقوق اقلیت‌ها در برابر ظلم اکثریت محافظت کند.
  - ایجاد فرآیندهای دموکراتیک که در آن رأی اکثریت سیاست‌های اجتماعی را تعیین می‌کند، در حالی که حفاظت‌های قانون اساسی برای حقوق اساسی حفظ می‌شود.
  - توسعه سیاست‌های مبتنی بر شواهد که ایمنی عمومی و انسجام اجتماعی را بر ترجیحات فردی در زمینه‌های بحث‌برانگیز اولویت می‌دهند
explanation: |
  رویکرد لیبرترین به طور مداوم از حذف کنترل دولت و اجازه دادن به نهادهای خصوصی برای مدیریت مقررات حمایت می‌کند. این امر در موضع‌گیری آن‌ها در مورد ازدواج (خصوصی‌سازی آن و اجازه دادن به کلیساها/سازمان‌های خصوصی برای تصمیم‌گیری)، مهاجرت (غیردولتی کردن جامعه و اجازه دادن به شهروندان برای تصمیم‌گیری)، و مواد مخدر (آری به آزادی اما فقط اگر جامعه غیردولتی شود) مشهود است.  
  گزینه‌های دیگر نمایانگر رویکردهای سوسیالیستی، میانه‌رو یا محافظه‌کارانه هستند که درجات مختلفی از دخالت دولت را حفظ می‌کنند، نه اصل لیبرترین که به حداقل رساندن قدرت دولت از طریق خصوصی‌سازی است.
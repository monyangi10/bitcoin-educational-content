question: Согласно либертарианской точке зрения на общественные проблемы, каков наиболее последовательный подход к разрешению конфликтов между индивидуальной свободой и государственным регулированием?
answer: Приватизировать учреждения и позволить добровольным ассоциациям заниматься регулированием, а не навязывать государству единые правила для всех
wrong_answers:
  - Создавать комплексные правительственные правила, которые уравновешивают конкурирующие интересы и защищают права меньшинства от угнетения со стороны большинства
  - Установить демократические процессы, при которых большинство голосов определяет социальную политику, сохраняя при этом конституционную защиту основных прав
  - Разрабатывать научно обоснованную политику, в которой общественная безопасность и социальная сплоченность будут приоритетнее индивидуальных предпочтений в спорных областях
explanation: |
  Либертарианцы последовательно выступают за отказ от государственного контроля и предоставление частным организациям возможности заниматься регулированием. Это видно из их позиции по вопросам брака (приватизировать его и позволить церквям/частным организациям принимать решения), иммиграции (дестабилизировать общество и позволить гражданам принимать решения) и наркотиков (да свободе, но только если общество будет дестабилизировано).
  Остальные варианты представляют собой социалистические, центристские или консервативные подходы, которые поддерживают различную степень участия государства, а не либертарианский принцип минимизации государственной власти путем приватизации.
question: Jaký je podle libertariánského pohledu na společenské otázky nejdůslednější přístup k řešení konfliktů mezi svobodou jednotlivce a vládní regulací?
answer: Privatizovat instituce a nechat regulaci na dobrovolných sdruženích, místo aby stát všem vnucoval jednotná pravidla
wrong_answers:
  - Vytvořit komplexní vládní předpisy, které vyváží protichůdné zájmy a zároveň chrání práva menšin před útlakem většiny
  - Zavedení demokratických procesů, v nichž o sociálních politikách rozhoduje většina hlasů, při zachování ústavní ochrany základních práv
  - Vypracovat politiky založené na důkazech, které upřednostní veřejnou bezpečnost a sociální soudržnost před individuálními preferencemi v kontroverzních oblastech
explanation: |
  Libertariánský přístup důsledně prosazuje odstranění státní kontroly a umožnění regulace soukromým institucím. To je patrné z jejich postoje k manželství (privatizovat ho a nechat rozhodovat církve/soukromé organizace), imigraci (destatizovat společnost a nechat rozhodovat občany) a drogám (ano svobodě, ale pouze pokud bude destatizována společnost).
  Ostatní možnosti představují socialistické, centristické nebo konzervativní přístupy, které zachovávají různou míru zapojení státu spíše než libertariánský princip minimalizace státní moci prostřednictvím privatizace.
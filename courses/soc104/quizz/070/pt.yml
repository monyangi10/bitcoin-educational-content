question: De acordo com a perspetiva libertária das questões sociais, qual é a abordagem mais coerente para resolver os conflitos entre a liberdade individual e a regulamentação governamental?
answer: Privatizar as instituições e deixar que as associações voluntárias tratem da regulamentação, em vez de o Estado impor regras uniformes a todos
wrong_answers:
  - Criar regulamentação governamental abrangente que equilibre interesses concorrentes e proteja os direitos das minorias da opressão da maioria
  - Estabelecer processos democráticos em que o voto maioritário determina as políticas sociais, mantendo simultaneamente a proteção constitucional dos direitos fundamentais
  - Desenvolver políticas baseadas em provas que dêem prioridade à segurança pública e à coesão social em relação às preferências individuais em áreas controversas
explanation: |
  A abordagem libertária defende consistentemente a remoção do controlo estatal e a permissão de instituições privadas para lidarem com a regulamentação. Isto é evidente na sua posição relativamente ao casamento (privatizá-lo e deixar as igrejas/organizações privadas decidir), à imigração (desestatizar a sociedade e deixar os cidadãos decidir) e às drogas (sim à liberdade, mas apenas se a sociedade for desestatizada).
  As outras opções representam abordagens socialistas, centristas ou conservadoras que mantêm vários graus de envolvimento do Estado, em vez do princípio libertário de minimizar o poder do governo através da privatização.
question: 根據自由主義者對社會問題的觀點，解決個人自由與政府管制之間衝突的最一致方法是什麼？
answer: 將機構私有化，讓志願團體處理規範，而不是由國家對每個人強加統一的規則
wrong_answers:
  - 建立全面的政府法規，以平衡相互競爭的利益，同時保護少數人的權利免受多數人的壓迫
  - 建立民主程序，由多數選票決定社會政策，同時維持憲法對基本權利的保護
  - 在有爭議的領域中，制定以證據為基礎的政策，將公眾安全和社會凝聚力優先於個人偏好
explanation: |
  自由主義者一直主張廢除國家控制，讓私人機構處理規範。這在他們對婚姻 (私有化，讓教堂/私人機構決定)、移民 (毀滅社會，讓公民決定) 和毒品 (是的，自由，但只有在社會被毀滅時) 的立場上很明顯。
  其他選項代表社會主義、中間派或保守派的方法，這些方法維持不同程度的國家參與，而非透過私有化將政府權力最小化的自由主義原則。
question: Warum gelingt es nach Hayeks Theorie des verstreuten Wissens in zentralen Planwirtschaften nicht, eine effiziente Ressourcenallokation im Vergleich zu freien Marktsystemen zu erreichen?
answer: Zentrale Planer können nicht auf das fragmentierte, lokalisierte Wissen zugreifen, das nur einzelne Marktteilnehmer über ihre spezifischen Bedürfnisse, Präferenzen und Umstände besitzen
wrong_answers:
  - Den zentralen Planern fehlen die Rechenleistung und die fortschrittlichen Algorithmen, die für die Verarbeitung aller für eine optimale Ressourcenzuweisung erforderlichen Wirtschaftsdaten erforderlich sind
  - Zentralplaner sind von Natur aus korrupt und eigennützig und stellen ihren persönlichen Gewinn über das Wohl der Gesellschaft als Ganzes
  - Zentrale Planer sind ideologisch voreingenommen und weigern sich, marktwirtschaftliche Lösungen umzusetzen, selbst wenn sie deren überlegene Effizienz erkennen
explanation: |
  Hayeks grundlegende Erkenntnis über verstreutes Wissen zeigt, dass Informationen über individuelle Präferenzen, lokale Bedingungen und subjektive Bewertungen nur in fragmentierter Form bei Millionen von Individuen vorhanden sind. Dieses Wissen kann nicht zentral gesammelt oder aggregiert werden, da es implizit ist, sich ständig ändert und oft widersprüchlich ist. Freie Märkte lösen dieses Problem durch den Preismechanismus, der diese verstreuten Informationen durch freiwilligen Tausch spontan koordiniert.
  Die anderen Optionen konzentrieren sich fälschlicherweise auf technische Beschränkungen, moralische Schwächen oder ideologische Voreingenommenheit und nicht auf das erkenntnistheoretische Kernproblem, dass keine zentrale Behörde über das verteilte Wissen verfügen kann, das für eine effiziente Koordinierung erforderlich ist.
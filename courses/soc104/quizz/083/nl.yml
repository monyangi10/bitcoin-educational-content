question: Waarom slagen centraal geplande economieën er volgens Hayeks theorie van verspreide kennis niet in om middelen efficiënt toe te wijzen in vergelijking met vrije marktsystemen?
answer: Centrale planners hebben geen toegang tot de gefragmenteerde, gelokaliseerde kennis die alleen individuele marktdeelnemers bezitten over hun specifieke behoeften, voorkeuren en omstandigheden
wrong_answers:
  - Centrale planners beschikken niet over de rekenkracht en geavanceerde algoritmen die nodig zijn om alle economische gegevens te verwerken die nodig zijn voor een optimale toewijzing van middelen
  - Centrale planners zijn van nature corrupt en egoïstisch, en geven voorrang aan hun persoonlijk gewin boven het welzijn van de maatschappij als geheel
  - Centrale planners zijn ideologisch bevooroordeeld en weigeren marktgebaseerde oplossingen te implementeren, zelfs als ze de superieure efficiëntie ervan erkennen
explanation: |
  Hayeks fundamentele inzicht over verspreide kennis onthult dat informatie over individuele voorkeuren, lokale omstandigheden en subjectieve waarderingen alleen in gefragmenteerde vorm bestaat bij miljoenen individuen. Deze kennis kan niet centraal verzameld of geaggregeerd worden omdat ze stilzwijgend, voortdurend veranderend en vaak tegenstrijdig is. Vrije markten lossen dit op via het prijsmechanisme, dat deze verspreide informatie spontaan coördineert via vrijwillige uitwisselingen.
  De andere opties richten zich ten onrechte op technische beperkingen, morele tekortkomingen of ideologische vooroordelen in plaats van op het centrale epistemologische probleem dat geen enkele centrale autoriteit de gedistribueerde kennis kan bezitten die nodig is voor efficiënte coördinatie.
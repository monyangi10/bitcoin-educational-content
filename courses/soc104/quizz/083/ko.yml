question: 하이에크의 분산 지식 이론에 따르면, 중앙 계획 경제가 자유 시장 시스템에 비해 효율적인 자원 배분을 달성하지 못하는 이유는 무엇일까요?
answer: 중앙 기획자는 개별 시장 참여자만이 가지고 있는 특정 요구, 선호도, 상황에 대한 단편적이고 현지화된 지식에 접근할 수 없습니다
wrong_answers:
  - 중앙 계획가들은 최적의 자원 할당에 필요한 모든 경제 데이터를 처리하는 데 필요한 계산 능력과 고급 알고리즘이 부족합니다
  - 중앙 기획자들은 본질적으로 부패하고 이기적이며, 사회 전체의 복지보다 개인의 이익을 우선시합니다
  - 중앙 기획자들은 이념적으로 편향되어 있으며, 시장 기반 솔루션의 뛰어난 효율성을 인정하면서도 이를 구현하기를 거부합니다
explanation: |
  분산된 지식에 대한 하이에크의 근본적인 통찰은 개인의 선호도, 지역적 조건, 주관적 가치에 대한 정보가 수백만 명의 개인에게 단편적인 형태로만 존재한다는 사실을 보여줍니다. 이러한 지식은 암묵적이고 끊임없이 변화하며 종종 모순되는 경우가 많기 때문에 중앙에서 수집하거나 집계할 수 없습니다. 자유 시장은 자발적인 교환을 통해 분산된 정보를 자발적으로 조정하는 가격 메커니즘을 통해 이 문제를 해결합니다.
  다른 대안들은 효율적인 조정에 필요한 분산된 지식을 중앙 기관이 보유할 수 없다는 인식론적 핵심 문제보다는 기술적 한계, 도덕적 결함 또는 이념적 편향에 초점을 맞추고 있습니다.
question: ตามทฤษฎีความรู้กระจายของ Hayek ทำไมเศรษฐกิจที่วางแผนจากศูนย์กลางถึงล้มเหลวในการจัดสรรทรัพยากรอย่างมีประสิทธิภาพเมื่อเทียบกับระบบตลาดเสรี?
answer: นักวางแผนส่วนกลางไม่สามารถเข้าถึงความรู้ที่กระจัดกระจายและเฉพาะท้องถิ่นที่ผู้เข้าร่วมตลาดแต่ละรายเท่านั้นที่มีเกี่ยวกับความต้องการ ความชอบ และสถานการณ์เฉพาะของพวกเขา
wrong_answers:
  - นักวางแผนส่วนกลางขาดพลังการคำนวณและอัลกอริธึมขั้นสูงที่จำเป็นในการประมวลผลข้อมูลทางเศรษฐกิจทั้งหมดที่จำเป็นสำหรับการจัดสรรทรัพยากรอย่างเหมาะสม
  - นักวางแผนส่วนกลางมีความทุจริตและเห็นแก่ตัวโดยธรรมชาติ โดยให้ความสำคัญกับผลประโยชน์ส่วนตัวมากกว่าสวัสดิการของสังคมโดยรวม
  - นักวางแผนส่วนกลางมีอคติทางอุดมการณ์และปฏิเสธที่จะใช้วิธีแก้ปัญหาที่อิงตามตลาดแม้ว่าพวกเขาจะยอมรับถึงประสิทธิภาพที่เหนือกว่าของมัน
explanation: |
  ข้อมูลเชิงลึกพื้นฐานของ Hayek เกี่ยวกับความรู้ที่กระจายเผยให้เห็นว่าข้อมูลเกี่ยวกับความชอบของแต่ละบุคคล สภาพท้องถิ่น และการประเมินค่าเชิงอัตวิสัยมีอยู่ในรูปแบบที่กระจัดกระจายเฉพาะในหมู่บุคคลนับล้าน ความรู้นี้ไม่สามารถถูกรวบรวมหรือรวมศูนย์ได้เนื่องจากเป็นความรู้ที่ไม่ชัดเจน เปลี่ยนแปลงตลอดเวลา และมักขัดแย้งกัน ตลาดเสรีแก้ปัญหานี้ผ่านกลไกราคา ซึ่งประสานข้อมูลที่กระจายนี้โดยอัตโนมัติผ่านการแลกเปลี่ยนโดยสมัครใจ 
  ตัวเลือกอื่น ๆ มุ่งเน้นไปที่ข้อจำกัดทางเทคนิค ความล้มเหลวทางศีลธรรม หรืออคติทางอุดมการณ์อย่างไม่ถูกต้อง แทนที่จะเป็นปัญหาทางญาณวิทยาหลักที่ไม่มีอำนาจกลางใดสามารถครอบครองความรู้ที่กระจายซึ่งจำเป็นสำหรับการประสานงานอย่างมีประสิทธิภาพ
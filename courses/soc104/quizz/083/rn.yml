question: Dushingiye ku ciyumviro ca Hayek c’ubumenyi bushize ahabona, ni kuki ubutunzi buteguwe hagati butashobora gushika ku gutanga neza ubutunzi ugereranyije n’uburyo bw’isoko ry’uburenganzira?
answer: Abategura imigambi yo hagati ntibashobora kuronka ubumenyi bucitsemwo ibice, bushingiye ku karere, ubwo abaje mw’isoko ku giti cabo gusa bafise ku bijanye n’ivyo bakeneye, ivyo bakunda be n’ivyo barimwo .
wrong_answers:
  - Abategura imigambi yo hagati ntibagira ubushobozi bwo gukoresha ubuhinga bwo guharura n’ubuhinga buteye imbere bukenewe kugira ngo bashobore gukora amakuru yose yerekeye ubutunzi asabwa kugira ngo umutungo ushobore gukoreshwa neza .
  - Abategura imigambi yo hagati ni abanyagitugu kandi bikunda, bashira imbere inyungu zabo bwite kuruta ineza y’abantu bose .
  - Abategura imigambi yo hagati barafise ivyiyumviro bitari vyo kandi banka gushitsa inyishu zishingiye ku masoko mbere n’igihe bemera ko zikora neza kuruta ibindi vyose .
explanation: |
  Ubumenyi nyamukuru bwa Hayek ku bijanye n’ubumenyi bushize ahabona burahishura yuko amakuru yerekeye ivyo umuntu akunda, ivy’aho hantu be n’ivyo umuntu abona, ariho gusa mu buryo butandukanye mu bantu amamiliyoni. Ubwo bumenyi ntibushobora kwegeranywa canke gushirwa hamwe kuko buceceka, buguma buhinduka, kandi kenshi buvuguruzanya. Amasoko y’uburenganzira arabitorera umuti biciye ku buryo bw’igiciro, buhuza ubwabwo ayo makuru anyanyagiye biciye mu guhanahana amakuru ku bushake. 
  Ayandi mahitamwo yibanda mu buryo butari bwo ku mipaka y’ubuhinga, ku kunanirwa kw’inyifato runtu, canke ku gushigikira ingengabitekerezo aho kwibanda ku ngorane nyamukuru y’ubumenyi bw’uko ata butegetsi buhambaye bushobora kugira ubumenyi busanzwe bukenewe kugira ngo habeho uguhuza neza.
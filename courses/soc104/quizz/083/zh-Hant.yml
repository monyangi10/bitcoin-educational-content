question: 根據哈耶克的分散知識理論，與自由市場體系相比，中央計畫經濟體為何無法達到有效率的資源配置？
answer: 中央規劃人員無法取得零散、地方化的知識，只有個別市場參與者才會擁有關於其特定需求、偏好和情況的知識。
wrong_answers:
  - 中央規劃者缺乏必要的計算能力和先進演算法，無法處理最佳資源分配所需的所有經濟資料。
  - 中央計畫者天生腐敗且自私自利，將個人利益凌駕於社會整體福祉之上
  - 中央計畫者在意識形態上有偏見，即使他們承認市場型解決方案的效率優越，也拒絕執行。
explanation: |
  哈耶克對於分散知識的基本見解揭示出，關於個人偏好、當地情況和主觀價值的資訊只以零碎的形式存在於數百萬個人之中。這種知識無法集中收集或聚合，因為它是隱性的、不斷變化的，而且經常自相矛盾。自由市場透過價格機制解決了這個問題，價格機制透過自願交換自發地協調這些分散的資訊。
  其他方案錯誤地將重點放在技術限制、道德缺失或意識形態偏見上，而不是核心的認知學問題，即沒有中央權威可以擁有有效協調所需的分散知識。
question: 根据哈耶克的知识分散理论，与自由市场体系相比，为什么中央计划经济无法实现有效的资源配置？
answer: 中央规划者无法获取零散的本地化知识，而只有市场参与者才掌握有关其具体需求、偏好和情况的知识
wrong_answers:
  - 中央规划人员缺乏必要的计算能力和先进算法来处理优化资源分配所需的所有经济数据
  - 中央计划者本质上是腐败和利己主义者，他们将个人利益置于整个社会福利之上
  - 中央规划者带有意识形态偏见，即使认识到市场解决方案的卓越效率，也拒绝实施这些解决方案
explanation: |
  哈耶克关于分散知识的基本见解揭示出，关于个人偏好、当地条件和主观价值的信息只能以零散的形式存在于千百万个人之中。这些知识无法集中收集或汇总，因为它们是隐性的、不断变化的，而且往往相互矛盾。自由市场通过价格机制解决了这一问题，价格机制通过自愿交换自发地协调这些分散的信息。
  其他方案错误地将重点放在技术限制、道德缺失或意识形态偏见上，而不是核心的认识论问题上，即没有一个中央机构能够掌握高效协调所需的分散知识。
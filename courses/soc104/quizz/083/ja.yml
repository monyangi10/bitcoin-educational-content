question: ハイエクの知識分散理論によれば、なぜ中央計画経済は自由市場システムに比べて効率的な資源配分を達成できないのか？
answer: 中央のプランナーは、個々の市場参加者だけが持つ、それぞれのニーズ、嗜好、状況に関する断片的で地域的な知識にアクセスすることはできない。
wrong_answers:
  - 中央プランナーには、最適な資源配分に必要なすべての経済データを処理するのに必要な計算能力と高度なアルゴリズムがない。
  - 中央計画者は本質的に腐敗し、利己的であり、社会全体の福祉よりも個人的な利益を優先する。
  - 中央計画者はイデオロギーに偏っており、市場ベースの解決策が優れていると認識していても、その実施を拒む。
explanation: |
  分散した知識に関するハイエクの基本的洞察は、個人の嗜好、地域的条件、主観的評価に関する情報は、何百万人もの個人にわたって断片的な形でしか存在しないことを明らかにしている。この知識は暗黙的で、絶えず変化し、しばしば矛盾するため、一元的に収集したり集約したりすることはできない。自由市場は、自発的な交換を通じて分散した情報を自発的に調整する価格メカニズムを通じて、この問題を解決する。
  他の選択肢は、効率的な調整に必要な分散した知識を中央当局が持ち得ないという認識論的な核心問題よりも、技術的な限界、道徳的な欠点、イデオロギー的な偏見に誤って焦点を当てている。
question: Согласно теории рассеянного знания Хайека, почему централизованная плановая экономика не может обеспечить эффективное распределение ресурсов по сравнению со свободными рыночными системами?
answer: Центральные планировщики не могут получить доступ к фрагментарным, локализованным знаниям, которыми обладают только отдельные участники рынка о своих конкретных потребностях, предпочтениях и обстоятельствах
wrong_answers:
  - Центральные планировщики не обладают достаточной вычислительной мощностью и передовыми алгоритмами, необходимыми для обработки всех экономических данных, требуемых для оптимального распределения ресурсов
  - Центральные планировщики по своей природе коррумпированы и преследуют корыстные цели, ставя на первое место личную выгоду, а не благосостояние общества в целом
  - Центральные планировщики идеологически предвзяты и отказываются внедрять рыночные решения, даже если признают их превосходную эффективность
explanation: |
  Фундаментальная идея Хайека о рассредоточенности знаний показывает, что информация об индивидуальных предпочтениях, местных условиях и субъективных оценках существует лишь в разрозненном виде у миллионов людей. Эти знания невозможно централизованно собрать или агрегировать, поскольку они негласные, постоянно меняются и часто противоречат друг другу. Свободные рынки решают эту проблему с помощью ценового механизма, который спонтанно координирует эту разрозненную информацию посредством добровольных обменов.
  Другие варианты неправильно фокусируются на технических ограничениях, моральных недостатках или идеологических предубеждениях, а не на основной эпистемологической проблеме, заключающейся в том, что ни один центральный орган не может обладать распределенными знаниями, необходимыми для эффективной координации.
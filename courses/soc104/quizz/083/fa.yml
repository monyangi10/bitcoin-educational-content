question: بر اساس نظریه دانش پراکنده هایک، چرا اقتصادهای برنامه‌ریزی‌شده مرکزی در مقایسه با سیستم‌های بازار آزاد نمی‌توانند تخصیص منابع کارآمدی را به دست آورند؟
answer: برنامه‌ریزان مرکزی نمی‌توانند به دانش پراکنده و محلی که تنها شرکت‌کنندگان فردی بازار درباره نیازها، ترجیحات و شرایط خاص خود دارند، دسترسی پیدا کنند.
wrong_answers:
  - برنامه‌ریزان مرکزی فاقد قدرت محاسباتی و الگوریتم‌های پیشرفته لازم برای پردازش تمام داده‌های اقتصادی مورد نیاز برای تخصیص بهینه منابع هستند.
  - برنامه‌ریزان مرکزی ذاتاً فاسد و خودخواه هستند و منافع شخصی خود را بر رفاه جامعه به عنوان یک کل ترجیح می‌دهند.
  - برنامه‌ریزان مرکزی به‌طور ایدئولوژیک متعصب هستند و حتی زمانی که به کارایی برتر راه‌حل‌های مبتنی بر بازار اذعان دارند، از اجرای آن‌ها خودداری می‌کنند.
explanation: |
  بینش بنیادی هایک درباره دانش پراکنده نشان می‌دهد که اطلاعات مربوط به ترجیحات فردی، شرایط محلی و ارزیابی‌های ذهنی تنها به صورت پراکنده در میان میلیون‌ها فرد وجود دارد. این دانش نمی‌تواند به صورت مرکزی جمع‌آوری یا تجمیع شود زیرا ضمنی، دائماً در حال تغییر و اغلب متناقض است. بازارهای آزاد این مسئله را از طریق مکانیزم قیمت حل می‌کنند، که به طور خودجوش این اطلاعات پراکنده را از طریق مبادلات داوطلبانه هماهنگ می‌کند.
  گزینه‌های دیگر به اشتباه بر محدودیت‌های فنی، نقص‌های اخلاقی یا تعصب ایدئولوژیک تمرکز می‌کنند، به جای مشکل معرفت‌شناختی اصلی که هیچ مرجع مرکزی نمی‌تواند دانش توزیع‌شده لازم برای هماهنگی کارآمد را داشته باشد.
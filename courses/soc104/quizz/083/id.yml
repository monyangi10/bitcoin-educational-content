question: Menurut teori Hayek tentang pengetahuan yang tersebar, mengapa ekonomi yang direncanakan secara terpusat gagal mencapai alokasi sumber daya yang efisien dibandingkan dengan sistem pasar bebas?
answer: Perencana pusat tidak dapat mengakses pengetahuan yang terfragmentasi dan terlokalisasi yang hanya dimiliki oleh pelaku pasar individu tentang kebutuhan, preferensi, dan keadaan khusus mereka
wrong_answers:
  - Perencana pusat tidak memiliki daya komputasi dan algoritma canggih yang diperlukan untuk memproses semua data ekonomi yang diperlukan untuk alokasi sumber daya yang optimal
  - Para perencana di tingkat pusat pada dasarnya korup dan mementingkan diri sendiri, memprioritaskan keuntungan pribadi mereka di atas kesejahteraan masyarakat secara keseluruhan
  - Para perencana pusat memiliki bias ideologis dan menolak untuk menerapkan solusi berbasis pasar bahkan ketika mereka mengakui keunggulan efisiensinya
explanation: |
  Wawasan mendasar Hayek tentang pengetahuan yang tersebar mengungkapkan bahwa informasi tentang preferensi individu, kondisi lokal, dan penilaian subjektif hanya ada dalam bentuk yang terfragmentasi di antara jutaan individu. Pengetahuan ini tidak dapat dikumpulkan atau dikumpulkan secara terpusat karena bersifat diam-diam, terus berubah, dan sering kali saling bertentangan. Pasar bebas memecahkan masalah ini melalui mekanisme harga, yang secara spontan mengoordinasikan informasi yang tersebar ini melalui pertukaran sukarela.
  Pilihan-pilihan lain secara keliru berfokus pada keterbatasan teknis, kegagalan moral, atau bias ideologis daripada masalah epistemologis inti bahwa tidak ada otoritas pusat yang dapat memiliki pengetahuan yang tersebar yang diperlukan untuk koordinasi yang efisien.
question: Theo lý thuyết tri thức phân tán của Hayek, tại sao các nền kinh tế kế hoạch hóa tập trung lại không đạt được hiệu quả phân bổ nguồn lực so với các hệ thống kinh tế thị trường tự do?
answer: Các nhà hoạch định trung ương không thể tiếp cận được nguồn kiến thức rời rạc, mang tính địa phương mà chỉ từng người tham gia thị trường mới có về nhu cầu, sở thích và hoàn cảnh cụ thể của họ.
wrong_answers:
  - Các nhà hoạch định trung ương thiếu năng lực tính toán và các thuật toán tiên tiến cần thiết để xử lý tất cả dữ liệu kinh tế cần thiết cho việc phân bổ nguồn lực tối ưu.
  - Các nhà hoạch định trung ương vốn dĩ tham nhũng và vị kỷ, ưu tiên lợi ích cá nhân hơn phúc lợi của toàn xã hội.
  - Các nhà hoạch định trung ương có thành kiến về mặt tư tưởng và từ chối áp dụng các giải pháp dựa trên thị trường ngay cả khi họ nhận ra hiệu quả vượt trội của chúng.
explanation: |
  Quan điểm cơ bản của Hayek về tri thức phân tán cho thấy rằng thông tin về sở thích cá nhân, điều kiện địa phương và đánh giá chủ quan chỉ tồn tại dưới dạng rời rạc trong hàng triệu cá nhân. Tri thức này không thể được thu thập hoặc tổng hợp tập trung vì nó mang tính ngầm định, liên tục thay đổi và thường mâu thuẫn. Thị trường tự do giải quyết vấn đề này thông qua cơ chế giá cả, tự động điều phối thông tin phân tán này thông qua các giao dịch tự nguyện.
  Các lựa chọn khác tập trung sai lầm vào những hạn chế kỹ thuật, thiếu sót về mặt đạo đức hoặc thành kiến về mặt ý thức hệ hơn là vấn đề nhận thức luận cốt lõi là không một cơ quan trung ương nào có thể sở hữu tri thức phân tán cần thiết cho sự phối hợp hiệu quả.
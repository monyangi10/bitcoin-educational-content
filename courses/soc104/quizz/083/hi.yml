question: हेयक के विकेंद्रीकृत ज्ञान के सिद्धांत के अनुसार, मुक्त बाजार प्रणालियों की तुलना में केंद्रीय नियोजित अर्थव्यवस्थाएं संसाधनों के कुशल आवंटन को प्राप्त करने में विफल क्यों रहती हैं?
answer: केंद्रीय योजनाकार उस खंडित, स्थानीय ज्ञान तक नहीं पहुंच सकते जो केवल व्यक्तिगत बाजार प्रतिभागियों के पास उनकी विशिष्ट आवश्यकताओं, प्राथमिकताओं और परिस्थितियों के बारे में होता है।
wrong_answers:
  - केंद्रीय योजनाकारों के पास इष्टतम संसाधन आवंटन के लिए आवश्यक सभी आर्थिक आंकड़ों को संसाधित करने के लिए आवश्यक कम्प्यूटेशनल शक्ति और उन्नत एल्गोरिदम की कमी है।
  - केंद्रीय योजनाकार स्वभाव से ही भ्रष्ट और स्वार्थी होते हैं, वे समाज के समग्र कल्याण की अपेक्षा अपने व्यक्तिगत लाभ को प्राथमिकता देते हैं।
  - केंद्रीय योजनाकार वैचारिक रूप से पक्षपाती हैं और बाज़ार-आधारित समाधानों की श्रेष्ठ दक्षता को स्वीकार करने के बावजूद भी उन्हें लागू करने से इनकार करते हैं।
explanation: |
  हेयक की विकेंद्रीकृत ज्ञान संबंधी मूलभूत अंतर्दृष्टि से पता चलता है कि व्यक्तिगत प्राथमिकताओं, स्थानीय परिस्थितियों और व्यक्तिपरक मूल्यांकनों से संबंधित जानकारी लाखों व्यक्तियों में खंडित रूप में ही मौजूद होती है। इस ज्ञान को केंद्रीय रूप से एकत्रित या समेकित नहीं किया जा सकता क्योंकि यह अव्यक्त, निरंतर परिवर्तनशील और अक्सर विरोधाभासी होता है। मुक्त बाजार मूल्य तंत्र के माध्यम से इस समस्या का समाधान करते हैं, जो स्वैच्छिक आदान-प्रदान के माध्यम से इस विकेंद्रीकृत जानकारी का स्वतः समन्वय करता है।
  अन्य विकल्प तकनीकी सीमाओं, नैतिक विफलताओं या वैचारिक पूर्वाग्रहों पर गलत तरीके से ध्यान केंद्रित करते हैं, जबकि मूल ज्ञानमीमांसा संबंधी समस्या यह है कि कोई भी केंद्रीय प्राधिकरण कुशल समन्वय के लिए आवश्यक विकेंद्रीकृत ज्ञान को धारण नहीं कर सकता।
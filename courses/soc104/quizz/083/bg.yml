question: Защо според теорията на Хайек за разпръснатото знание централно планираните икономики не успяват да постигнат ефективно разпределение на ресурсите в сравнение със системите на свободния пазар?
answer: Централното планиране не може да получи достъп до фрагментираните, локални знания, които притежават само отделните участници на пазара за техните специфични нужди, предпочитания и обстоятелства
wrong_answers:
  - Централните проектанти не разполагат с изчислителна мощ и усъвършенствани алгоритми, необходими за обработка на всички икономически данни, необходими за оптимално разпределение на ресурсите
  - Централните плановици са по своята същност корумпирани и егоистични, като поставят личната си изгода над благосъстоянието на обществото като цяло
  - Централните плановици са идеологически пристрастни и отказват да прилагат пазарни решения, дори когато признават по-високата им ефективност
explanation: |
  Фундаменталното прозрение на Хайек за разпръснатото знание разкрива, че информацията за индивидуалните предпочитания, местните условия и субективните оценки съществува само във фрагментирана форма сред милиони хора. Тези знания не могат да бъдат централизирано събрани или обобщени, тъй като те са негласни, постоянно се променят и често са противоречиви. Свободните пазари решават този проблем чрез ценовия механизъм, който спонтанно координира тази разпръсната информация чрез доброволна размяна.
  Другите варианти неправилно се фокусират върху технически ограничения, морални недостатъци или идеологически пристрастия, а не върху основния епистемологичен проблем, че никой централен орган не може да притежава разпределеното знание, необходимо за ефективна координация.
question: Kulingana na nadharia ya Hayek ya maarifa yaliyotawanyika, kwa nini uchumi uliopangwa kati hushindwa kufikia mgawanyo mzuri wa rasilimali ikilinganishwa na mifumo ya soko huria?
answer: Wapangaji wakuu hawawezi kupata maarifa yaliyogawanyika na ya ndani ambayo washiriki binafsi wa soko pekee ndio wanayo kuhusu mahitaji, mapendeleo, na hali zao mahususi.
wrong_answers:
  - Wapangaji wakuu hawana uwezo wa kompyuta na algoriti za hali ya juu zinazohitajika kusindika data zote za kiuchumi zinazohitajika kwa mgao bora wa rasilimali.
  - Wapangaji mipango wakuu kwa asili ni wafisadi na wenye maslahi binafsi, wakipa kipaumbele faida zao binafsi kuliko ustawi wa jamii kwa ujumla.
  - Wapangaji mipango wakuu wana upendeleo wa kiitikadi na wanakataa kutekeleza suluhisho zinazotegemea soko hata wanapotambua ufanisi wao wa hali ya juu.
explanation: |
  Ufahamu wa msingi wa Hayek kuhusu maarifa yaliyotawanyika unaonyesha kwamba taarifa kuhusu mapendeleo ya mtu binafsi, hali za ndani, na tathmini za kibinafsi zipo tu katika umbo lililogawanyika kwa mamilioni ya watu binafsi. Maarifa haya hayawezi kukusanywa au kukusanywa katikati kwa sababu ni ya kimya kimya, yanabadilika kila mara, na mara nyingi yanapingana. Masoko huria hutatua hili kupitia utaratibu wa bei, ambao huratibu taarifa hii iliyotawanyika kwa hiari kupitia ubadilishanaji wa hiari.
  
  Chaguzi zingine huzingatia kimakosa mapungufu ya kiufundi, kushindwa kwa maadili, au upendeleo wa kiitikadi badala ya tatizo kuu la epistemolojia kwamba hakuna mamlaka kuu inayoweza kuwa na maarifa yaliyosambazwa yanayohitajika kwa uratibu mzuri.
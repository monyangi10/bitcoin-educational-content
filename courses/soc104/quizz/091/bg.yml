question: Според фундаменталната критика на Satoshi Nakamoto какъв е основният проблем на конвенционалните фиатни валути, който Bitcoin има за цел да реши?
answer: Прекомерното доверие, изисквано от централизирани институции, които в миналото многократно са нарушавали това доверие чрез обезценяване на валутите
wrong_answers:
  - Липсата на цифрова инфраструктура и бавното време за обработка на транзакциите в сравнение със съвременните платежни системи
  - Невъзможност за извършване на международни транзакции без скъпи посредници и такси за превалутиране
  - Уязвимостта към фалшифициране и физическа кражба поради зависимостта от хартиени пари и физическо съхранение
explanation: |
  Satoshi Nakamoto изрично заяви, че "основният проблем на конвенционалната валута е доверието, което се изисква, за да работи" и че "историята на фиатните валути е пълна с нарушения на това доверие"
  Тази философска основа задвижи дизайна на Bitcoin като система без доверие, която не изисква вяра в централните банки или правителствата за поддържане на паричната стабилност, като директно се справя с историческия модел на обезценяване на валутата чрез прекомерно печатане на пари.
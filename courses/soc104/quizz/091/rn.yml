question: Dushingiye ku vyo Satoshi Nakamoto yaneguye vy’ishimikiro, ni ikihe kibazo nyamukuru kiri mu mafaranga asanzwe y’amahera Bitcoin yagenewe gutorera umuti?
answer: Ukwizigira birenze urugero bisabwa mu nzego zishingiye ku rwego rwo hejuru zahora zihungabanya ico cizigiro mu guca bugufi amafaranga .
wrong_answers:
  - Kubura ibikorwa remezo vy'ubuhinga bwa none n'igihe co gukora amafaranga kigenda buhoro ugereranyije n'uburyo bwo kwishura bugezweho
  - Kudashobora gukora ibikorwa vy’ubudandaji mpuzamakungu ata bahuza bazimvye be n’amahera yo guhindura amafaranga .
  - Uguhungabana kw'amahera y'ibinyoma n'ubusuma bw'umubiri bitewe no kwizigira amahera y'impapuro n'ububiko bw'umubiri .
explanation: |
  Satoshi Nakamoto yavuze neza yuko 'ingorane nyamukuru y'amahera asanzwe ari ukwizigira kwose gukenewe kugira ngo akore' kandi ko 'amateka y'amahera y'ubuhinga yuzuyemwo ukurenga kuri ukwo kwizigira.' 
  Uwo mushinge wa filozofiya niwo watumye Bitcoin igira umugambi nk’uburyo butagira icizigiro budasaba kwizera amabanki nkuru canke intwaro kugira ngo amafaranga akomeze gushikama, bugaca buvuga ata guca ku ruhande uburyo bwa kera bwo gusenyura amafaranga biciye mu gucapura amafaranga birenze urugero.
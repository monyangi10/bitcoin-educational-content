question: 根據 Satoshi Nakamoto 的基本批判，Bitcoin 旨在解決傳統法定貨幣的核心問題是什麼？
answer: 中央集权机构需要过度信任，而历史上这些机构曾多次通过贬低货币来违反这种信任
wrong_answers:
  - 與現代支付系統相比，缺乏數位基礎設施，交易處理時間緩慢
  - 無法在沒有昂貴中介和貨幣兌換費用的情況下進行國際交易
  - 由於依賴紙幣和實體儲存，容易遭受偽造和實體盜竊
explanation: |
  Satoshi Nakamoto 明確表示，「傳統貨幣的根本問題在於需要信任才能運作」，而且「法定貨幣的歷史充滿了違反信任的事件。
  這個哲學基礎驅使 Bitcoin 設計成一個無信任系統，不需要相信中央銀行或政府來維持貨幣穩定，直接解決歷史上透過過度印鈔造成貨幣貶值的模式。
question: Satoshi 나카모토의 근본적인 비판에 따르면, Bitcoin이 해결하고자 했던 기존 법정화폐의 핵심 문제는 무엇일까요?
answer: 중앙 집중식 기관에 대한 과도한 신뢰는 역사적으로 통화를 평가 절하하여 반복적으로 그 신뢰를 위반해 왔습니다
wrong_answers:
  - 최신 결제 시스템에 비해 디지털 인프라가 부족하고 거래 처리 시간이 느립니다
  - 비싼 중개업체와 환전 수수료 없이 국제 거래를 할 수 없음
  - 지폐 및 물리적 보관에 대한 의존으로 인한 위조 및 물리적 도난에 대한 취약성
explanation: |
  Satoshi 나카모토는 '기존 화폐의 근본적인 문제는 화폐가 작동하기 위해 필요한 모든 신뢰'이며 '법정화폐의 역사는 이러한 신뢰의 위반으로 가득 차 있다'고 명시적으로 말했습니다
  이러한 철학적 토대 위에서 Bitcoin는 중앙은행이나 정부를 믿지 않아도 통화 안정성을 유지할 수 있는 신뢰 없는 시스템으로 설계되었으며, 과도한 화폐 발행을 통한 화폐 가치 하락의 역사적 패턴을 직접적으로 해결하고자 했습니다.
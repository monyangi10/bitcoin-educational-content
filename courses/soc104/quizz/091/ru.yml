question: Согласно фундаментальной критике Satoshi Накамото, в чем заключается основная проблема обычных фиатных валют, которую призвана решить Bitcoin?
answer: Чрезмерное доверие к централизованным институтам, которые исторически неоднократно нарушали это доверие, обесценивая валюту
wrong_answers:
  - Отсутствие цифровой инфраструктуры и медленное время обработки транзакций по сравнению с современными платежными системами
  - Невозможность проводить международные транзакции без дорогостоящих посредников и комиссий за конвертацию валюты
  - Уязвимость к подделкам и физическим кражам из-за зависимости от бумажных денег и физического хранения
explanation: |
  Satoshi Накамото прямо заявил, что "корневая проблема обычной валюты заключается в доверии, которое требуется для того, чтобы она работала", и что "история фиатных валют полна нарушений этого доверия"
  Эта философская основа легла в основу дизайна Bitcoin как системы без доверия, которая не требует веры в центральные банки или правительства для поддержания денежной стабильности, напрямую решая историческую проблему обесценивания валюты путем чрезмерного печатания денег.
question: Satoshi नाकामोतो की मौलिक आलोचना के अनुसार, पारंपरिक फिएट मुद्राओं के साथ मूल समस्या क्या है जिसे Bitcoin हल करने के लिए डिज़ाइन किया गया था?
answer: केंद्रीकृत संस्थानों पर अत्यधिक भरोसा करने की आवश्यकता होती है, जिन्होंने ऐतिहासिक रूप से मुद्राओं का अवमूल्यन करके बार-बार उस भरोसे का उल्लंघन किया है।
wrong_answers:
  - आधुनिक भुगतान प्रणालियों की तुलना में डिजिटल बुनियादी ढांचे की कमी और धीमी लेनदेन प्रसंस्करण समय।
  - महंगे मध्यस्थों और मुद्रा विनिमय शुल्क के बिना अंतरराष्ट्रीय लेनदेन करने में असमर्थता
  - कागजी मुद्रा और उसके भौतिक भंडारण पर निर्भरता के कारण नकली मुद्रा बनाने और चोरी होने की आशंका बनी रहती है।
explanation: |
  Satoshi के नाकामोतो ने स्पष्ट रूप से कहा था कि 'पारंपरिक मुद्रा की मूल समस्या इसके संचालन के लिए आवश्यक अत्यधिक विश्वास है' और 'फिएट मुद्राओं का इतिहास इस विश्वास के उल्लंघन से भरा पड़ा है।'
  इस दार्शनिक आधार ने Bitcoin को एक विश्वासहीन प्रणाली के रूप में डिजाइन करने के लिए प्रेरित किया, जिसमें मौद्रिक स्थिरता बनाए रखने के लिए केंद्रीय बैंकों या सरकारों पर विश्वास की आवश्यकता नहीं होती है, और यह सीधे तौर पर अत्यधिक मुद्रा मुद्रण के माध्यम से मुद्रा अवमूल्यन के ऐतिहासिक पैटर्न को संबोधित करती है।
question: Satoshiナカモトの根本的な批判によれば、Bitcoinが解決するために設計された従来の不換紙幣の核心的な問題は何か？
answer: 中央集権的な機関に求められる過度の信頼は、歴史的に通貨の兌換によってその信頼を繰り返し破ってきた。
wrong_answers:
  - 最新の決済システムに比べ、デジタルインフラが不足しており、取引処理に時間がかかる。
  - 高額な仲介業者や為替手数料なしに国際取引を行うことができない。
  - 紙幣と物理的な保管に依存しているため、偽造や物理的な盗難に対する脆弱性がある。
explanation: |
  Satoshiナカモトは、「従来の通貨の根本的な問題は、それを機能させるために必要なすべての信頼にある」「不換紙幣の歴史は、その信頼に対する違反でいっぱいだ」と明言している。
  この哲学的基盤が、中央銀行や政府への信頼を必要としないトラストレス・システムとしてBitcoinの設計を推進し、貨幣の安定性を維持することで、過剰な貨幣印刷による通貨価値の低下の歴史的パターンに直接対処した。
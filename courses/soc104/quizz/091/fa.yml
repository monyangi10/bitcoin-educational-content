question: بر اساس نقد بنیادی Satoshi ناکاموتو، مشکل اصلی ارزهای فیات متعارف که Bitcoin برای حل آن طراحی شده است چیست؟
answer: اعتماد بیش از حد به نهادهای متمرکز که به‌طور تاریخی بارها با کاهش ارزش ارزها آن اعتماد را نقض کرده‌اند
wrong_answers:
  - کمبود زیرساخت‌های دیجیتال و زمان‌های پردازش تراکنش کند در مقایسه با سیستم‌های پرداخت مدرن
  - ناتوانی در انجام تراکنش‌های بین‌المللی بدون واسطه‌های گران‌قیمت و هزینه‌های تبدیل ارز
  - آسیب‌پذیری در برابر جعل و سرقت فیزیکی به دلیل وابستگی به پول کاغذی و ذخیره‌سازی فیزیکی
explanation: |
  Satoshi ناکاموتو به‌صراحت بیان کرد که «مشکل اصلی ارزهای متعارف این است که برای کار کردن به تمام اعتمادی که لازم است نیاز دارند» و اینکه «تاریخ ارزهای فیات پر از نقض آن اعتماد است.»
  این پایه فلسفی طراحی Bitcoin را به‌عنوان یک سیستم بدون نیاز به اعتماد هدایت کرد که نیازی به ایمان به بانک‌های مرکزی یا دولت‌ها برای حفظ ثبات پولی ندارد و به‌طور مستقیم به الگوی تاریخی کاهش ارزش ارز از طریق چاپ بیش از حد پول می‌پردازد.
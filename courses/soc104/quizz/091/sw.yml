question: Kulingana na ukosoaji wa kimsingi wa Satoshi Nakamoto, ni tatizo gani kuu la sarafu za kawaida za fiat ambalo Bitcoin ilibuniwa kutatua?
answer: Uaminifu mwingi unaohitajika katika taasisi kuu ambazo kihistoria zimekiuka uaminifu huo mara kwa mara kwa kudhalilisha sarafu
wrong_answers:
  - Ukosefu wa miundombinu ya kidijitali na muda wa usindikaji wa miamala polepole ikilinganishwa na mifumo ya kisasa ya malipo
  - Kutoweza kufanya miamala ya kimataifa bila wapatanishi wa gharama kubwa na ada za ubadilishaji wa sarafu
  - Udhaifu wa kughushi na wizi wa kimwili kutokana na kutegemea pesa za karatasi na hifadhi halisi
explanation: |
  Satoshi Nakamoto alisema waziwazi kwamba 'tatizo kuu la sarafu ya kawaida ni uaminifu wote unaohitajika ili kuifanya ifanye kazi' na kwamba 'historia ya sarafu za fiat imejaa uvunjaji wa uaminifu huo.'
  Msingi huu wa kifalsafa uliendesha muundo wa Bitcoin kama mfumo usio na uaminifu ambao hauhitaji imani katika benki kuu au serikali kudumisha utulivu wa kifedha, ukishughulikia moja kwa moja muundo wa kihistoria wa kushuka kwa thamani ya sarafu kupitia uchapishaji mwingi wa pesa.
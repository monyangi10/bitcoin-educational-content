question: ตามคำวิจารณ์พื้นฐานของ Satoshi Nakamoto ปัญหาหลักของสกุลเงินเฟียตแบบดั้งเดิมที่ Bitcoin ถูกออกแบบมาเพื่อแก้ไขคืออะไร?
answer: ความไว้วางใจที่มากเกินไปในสถาบันที่รวมศูนย์ซึ่งในประวัติศาสตร์ได้ละเมิดความไว้วางใจนั้นซ้ำแล้วซ้ำเล่าโดยการลดค่าเงิน
wrong_answers:
  - การขาดโครงสร้างพื้นฐานดิจิทัลและเวลาการประมวลผลธุรกรรมที่ช้ากว่าเมื่อเทียบกับระบบการชำระเงินสมัยใหม่
  - การไม่สามารถทำธุรกรรมระหว่างประเทศได้โดยไม่มีตัวกลางที่มีค่าใช้จ่ายสูงและค่าธรรมเนียมการแปลงสกุลเงิน
  - ความเปราะบางต่อการปลอมแปลงและการโจรกรรมทางกายภาพเนื่องจากการพึ่งพาเงินกระดาษและการเก็บรักษาทางกายภาพ
explanation: |
  Satoshi Nakamoto ได้กล่าวไว้อย่างชัดเจนว่า 'ปัญหารากฐานของสกุลเงินแบบดั้งเดิมคือความไว้วางใจทั้งหมดที่จำเป็นในการทำให้มันทำงานได้' และว่า 'ประวัติศาสตร์ของสกุลเงินเฟียตเต็มไปด้วยการละเมิดความไว้วางใจนั้น' 
  รากฐานทางปรัชญานี้เป็นแรงผลักดันให้การออกแบบ Bitcoin เป็นระบบที่ไม่ต้องการความไว้วางใจ ซึ่งไม่จำเป็นต้องมีความเชื่อมั่นในธนาคารกลางหรือรัฐบาลเพื่อรักษาเสถียรภาพทางการเงิน โดยตรงกับรูปแบบประวัติศาสตร์ของการลดค่าเงินผ่านการพิมพ์เงินที่มากเกินไป
question: 根据 Satoshi 中本聪的基本批判，Bitcoin 所要解决的传统法定货币的核心问题是什么？
answer: 中央集权机构需要过度信任，而历史上这些机构曾多次通过贬值货币来践踏这种信任
wrong_answers:
  - 与现代支付系统相比，缺乏数字基础设施，交易处理时间缓慢
  - 无法在没有昂贵中介和货币兑换费的情况下进行国际交易
  - 由于依赖纸币和实物储存，容易出现伪造和实物盗窃的情况
explanation: |
  Satoshi 中本聪明确指出，"传统货币的根本问题在于使其发挥作用所需的所有信任"，"法定货币的历史充满了对信任的破坏"。
  这一哲学基础推动了 Bitcoin 的设计，它是一个无需信任中央银行或政府就能维持货币稳定的无信任系统，直接解决了通过过度印钞使货币贬值的历史模式。
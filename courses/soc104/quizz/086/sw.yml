question: Kulingana na uchambuzi wa Mises, ni sifa gani za msingi ambazo ujumuishaji wa mrengo wa kushoto (ukomunisti/ujamaa) na ujumuishaji wa mrengo wa kulia (unazi/ufashisti) unashiriki licha ya motisha zao tofauti?
answer: Zote mbili zinaonyesha chuki kwa uhuru wa mtu binafsi na uhalalishaji wa vurugu ili kuweka chini maslahi ya kibinafsi kwa vyombo vya pamoja.
wrong_answers:
  - Zote mbili zinaweka kipaumbele usawa wa kiuchumi kuliko uhuru wa kisiasa huku zikidumisha heshima kwa dhamiri ya mtu binafsi na ushirika wa hiari
  - Zote mbili zinalenga kuhifadhi mifumo ya kijamii ya kitamaduni kupitia makubaliano ya kidemokrasia huku zikilinda haki za wachache na utofauti wa kitamaduni.
  - Zote mbili zinasisitiza mjadala wa kimantiki na mawazo muhimu ili kufikia malengo ya pamoja huku zikidumisha mgawanyo wa madaraka na mipaka ya kikatiba.
explanation: |
  Mises anasema kwamba licha ya kuonekana kinyume kisiasa, ujumuishaji wa kushoto na kulia kimsingi unakataa uhuru wa mtu binafsi na hutumia kulazimisha kutumikia sanamu zao za pamoja.
  
  Iwe chombo cha pamoja ni taifa (kulia) au babakabwela (kushoto), mifumo yote miwili inatii utashi wa mtu binafsi ili utambulisho wa kikundi kwa nguvu. Majibu yasiyo sahihi yanaonyesha kimakosa kwamba mifumo hii inahifadhi haki za mtu binafsi, michakato ya kidemokrasia, au mazungumzo ya busara - sifa ambazo Mises anazitambua kuwa haziendani na itikadi ya ujumuishaji, ambayo kwa asili inahitaji kukandamiza hukumu ya mtu binafsi kwa ajili ya mamlaka ya pamoja.

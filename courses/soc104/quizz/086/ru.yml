question: Согласно анализу Мизеса, какую фундаментальную характеристику имеют как левый коллективизм (коммунизм/социализм), так и правый коллективизм (нацизм/фашизм), несмотря на разную мотивацию?
answer: Оба демонстрируют ненависть к индивидуальной свободе и оправдывают насилие, чтобы подчинить частные интересы коллективным
wrong_answers:
  - Обе ставят во главу угла экономическое равенство, а не политическую свободу, сохраняя при этом уважение к индивидуальной совести и добровольным объединениям
  - Оба стремятся сохранить традиционную социальную иерархию путем демократического консенсуса, защищая при этом права меньшинств и культурное разнообразие
  - В обоих случаях особое внимание уделяется рациональным дебатам и критическому мышлению для достижения коллективных целей при сохранении разделения властей и конституционных ограничений
explanation: |
  Мизес утверждает, что, несмотря на кажущуюся политическую противоположность, и левые, и правые коллективизмы в основе своей отвергают индивидуальную автономию и используют принуждение для служения своим коллективным идолам.
  Будь то нация (правые) или пролетариат (левые), обе системы подчиняют индивидуальную волю групповой идентичности с помощью силы. Неправильные ответы неверно предполагают, что эти системы сохраняют индивидуальные права, демократические процессы или рациональный дискурс - характеристики, которые Мизес определяет как несовместимые с коллективистской идеологией, которая по своей сути требует подавления индивидуального суждения в пользу коллективной власти.
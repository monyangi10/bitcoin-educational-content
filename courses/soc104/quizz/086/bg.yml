question: Според анализа на Мизес коя основна характеристика споделят левият колективизъм (комунизъм/социализъм) и десният колективизъм (нацизъм/фашизъм) въпреки различните си мотиви?
answer: И двете проявяват омраза към личната свобода и оправдават насилието, за да подчинят частните интереси на колективните
wrong_answers:
  - И двете дават приоритет на икономическото равенство пред политическата свобода, като запазват уважението към личната съвест и доброволното сдружаване
  - И двете се стремят да запазят традиционните социални йерархии чрез демократичен консенсус, като същевременно защитават правата на малцинствата и културното многообразие
  - И двете наблягат на рационалния дебат и критичното мислене за постигане на колективни цели, като същевременно се запазва разделението на властите и конституционните ограничения
explanation: |
  Мизес твърди, че въпреки че изглеждат политически противоположни, и левият, и десният колективизъм в основата си отхвърлят индивидуалната автономия и използват принуда, за да служат на съответните колективни идоли.
  Независимо дали колективният субект е нацията (дясно) или пролетариатът (ляво), и двете системи подчиняват индивидуалната воля на груповата идентичност чрез сила. Грешните отговори неправилно предполагат, че тези системи запазват индивидуалните права, демократичните процеси или рационалния дискурс - характеристики, които Мизес определя като несъвместими с колективистичната идеология, която по своята същност изисква потискане на индивидуалната преценка в полза на колективната власт.
question: Jaký základní rys mají podle Misesovy analýzy levicový kolektivismus (komunismus/socialismus) a pravicový kolektivismus (nacismus/fašismus) navzdory rozdílným motivacím společný?
answer: Obě projevují nenávist k individuální svobodě a ospravedlňují násilí, aby podřídily soukromé zájmy kolektivním entitám
wrong_answers:
  - Obě upřednostňují ekonomickou rovnost před politickou svobodou a zároveň zachovávají respekt k individuálnímu svědomí a dobrovolnému sdružování
  - Obě se snaží zachovat tradiční společenskou hierarchii prostřednictvím demokratického konsensu a zároveň chránit práva menšin a kulturní rozmanitost
  - Obě zdůrazňují racionální debatu a kritické myšlení k dosažení společných cílů při zachování dělby moci a ústavních omezení
explanation: |
  Mises tvrdí, že navzdory tomu, že levicový i pravicový kolektivismus vypadají politicky protikladně, v zásadě odmítají autonomii jednotlivce a používají donucení, aby sloužily svým kolektivním idolům.
  Ať už je kolektivním subjektem národ (pravice), nebo proletariát (levice), oba systémy podřizují individuální vůli skupinové identitě prostřednictvím síly. Špatné odpovědi nesprávně naznačují, že tyto systémy zachovávají individuální práva, demokratické procesy nebo racionální diskurz - vlastnosti, které Mises označuje za neslučitelné s kolektivistickou ideologií, jež ze své podstaty vyžaduje potlačení individuálního úsudku ve prospěch kolektivní autority.
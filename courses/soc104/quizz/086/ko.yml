question: 미제스의 분석에 따르면, 좌파 집단주의(공산주의/사회주의)와 우파 집단주의(나치즘/파시즘)는 동기는 다르지만 어떤 근본적인 특징을 공유할까요?
answer: 둘 다 개인의 자유에 대한 증오와 사적 이익을 집단적 실체에 종속시키기 위한 폭력의 정당화를 드러냅니다
wrong_answers:
  - 둘 다 정치적 자유보다 경제적 평등을 우선시하는 동시에 개인의 양심과 자발적 결사를 존중합니다
  - 둘 다 민주적 합의를 통해 전통적인 사회 계층을 보존하는 동시에 소수자의 권리와 문화적 다양성을 보호하고자 합니다
  - 둘 다 권력 분립과 헌법적 한계를 유지하면서 공동의 목표를 달성하기 위해 합리적 토론과 비판적 사고를 강조합니다
explanation: |
  미제스는 정치적으로 반대되는 것처럼 보이지만 좌파와 우파 집단주의 모두 근본적으로 개인의 자율성을 거부하고 각자의 집단적 우상을 섬기기 위해 강압을 사용한다고 주장합니다.
  집단 주체가 국가(우파)이든 프롤레타리아트(좌파)이든, 두 체제 모두 강제를 통해 개인의 의지를 집단 정체성에 종속시킵니다. 오답은 이러한 체제가 개인의 권리, 민주적 절차 또는 합리적 담론을 보존한다고 잘못 제시하고 있는데, 이는 미제스가 집단적 권위를 위해 개인의 판단을 억압하는 집단주의 이데올로기와 양립할 수 없는 특징이라고 지적한 것입니다.
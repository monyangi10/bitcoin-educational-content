question: بر اساس تحلیل میزس، چه ویژگی بنیادی‌ای در هر دو نوع جمع‌گرایی چپ‌گرا (کمونیسم/سوسیالیسم) و جمع‌گرایی راست‌گرا (نازیسم/فاشیسم) وجود دارد که با وجود انگیزه‌های متفاوتشان مشترک است؟
answer: هر دو نفرت از آزادی فردی و توجیه خشونت برای تابع کردن منافع خصوصی به نهادهای جمعی را نشان می‌دهند.
wrong_answers:
  - هر دو برابری اقتصادی را بر آزادی سیاسی اولویت می‌دهند، در حالی که احترام به وجدان فردی و انجمن‌های داوطلبانه را حفظ می‌کنند.
  - هر دو به دنبال حفظ سلسله‌مراتب‌های اجتماعی سنتی از طریق اجماع دموکراتیک هستند، در حالی که از حقوق اقلیت‌ها و تنوع فرهنگی محافظت می‌کنند.
  - هر دو بر بحث منطقی و تفکر انتقادی برای دستیابی به اهداف جمعی تأکید دارند و در عین حال بر جدایی قوا و محدودیت‌های قانون اساسی پایبند هستند.
explanation: |
  میسز استدلال می‌کند که با وجود ظاهر سیاسی متضاد، هر دو جمع‌گرایی چپ و راست به طور اساسی خودمختاری فردی را رد می‌کنند و از اجبار برای خدمت به بت‌های جمعی مربوطه خود استفاده می‌کنند. 
  چه موجودیت جمعی ملت (راست) باشد و چه پرولتاریا (چپ)، هر دو سیستم اراده فردی را از طریق هویت گروهی با زور تابع می‌کنند. پاسخ‌های نادرست به اشتباه پیشنهاد می‌دهند که این سیستم‌ها حقوق فردی، فرآیندهای دموکراتیک یا گفتمان عقلانی را حفظ می‌کنند - ویژگی‌هایی که میسز آن‌ها را ناسازگار با ایدئولوژی جمع‌گرایانه می‌داند، که ذاتاً نیازمند سرکوب قضاوت فردی به نفع اقتدار جمعی است.
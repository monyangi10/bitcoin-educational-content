question: Zgodnie z analizą Misesa, jaką fundamentalną cechę łączy zarówno lewicowy kolektywizm (komunizm/socjalizm), jak i prawicowy kolektywizm (nazizm/faszyzm), pomimo ich odmiennych motywacji?
answer: Obaj wykazują nienawiść do indywidualnej wolności i usprawiedliwiają przemoc w celu podporządkowania prywatnych interesów zbiorowym podmiotom
wrong_answers:
  - Obie przedkładają równość ekonomiczną nad wolność polityczną, zachowując szacunek dla indywidualnego sumienia i dobrowolnego zrzeszania się
  - Oba dążą do zachowania tradycyjnych hierarchii społecznych poprzez demokratyczny konsensus, jednocześnie chroniąc prawa mniejszości i różnorodność kulturową
  - Oba kładą nacisk na racjonalną debatę i krytyczne myślenie, aby osiągnąć wspólne cele przy jednoczesnym zachowaniu podziału władzy i ograniczeń konstytucyjnych
explanation: |
  Mises argumentuje, że pomimo politycznego przeciwieństwa, zarówno lewicowe, jak i prawicowe kolektywizmy zasadniczo odrzucają indywidualną autonomię i stosują przymus, aby służyć swoim kolektywnym idolom.
  Niezależnie od tego, czy podmiotem zbiorowym jest naród (prawica), czy proletariat (lewica), oba systemy podporządkowują indywidualną wolę tożsamości grupowej za pomocą siły. Błędne odpowiedzi błędnie sugerują, że systemy te zachowują prawa jednostki, procesy demokratyczne lub racjonalny dyskurs - cechy, które Mises identyfikuje jako niezgodne z ideologią kolektywistyczną, która z natury wymaga tłumienia indywidualnego osądu na rzecz władzy zbiorowej.
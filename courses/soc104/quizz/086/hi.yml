question: मीसेस के विश्लेषण के अनुसार, वामपंथी सामूहिकतावाद (साम्यवाद/समाजवाद) और दक्षिणपंथी सामूहिकतावाद (नाज़ीवाद/फासीवाद) में अलग-अलग प्रेरणाओं के बावजूद कौन सी मूलभूत विशेषता समान है?
answer: दोनों ही व्यक्तिगत स्वतंत्रता के प्रति घृणा और निजी हितों को सामूहिक संस्थाओं के अधीन करने के लिए हिंसा को उचित ठहराने का प्रदर्शन करते हैं।
wrong_answers:
  - दोनों ही व्यक्तिगत विवेक और स्वैच्छिक संगठन के प्रति सम्मान बनाए रखते हुए राजनीतिक स्वतंत्रता की तुलना में आर्थिक समानता को प्राथमिकता देते हैं।
  - दोनों का उद्देश्य लोकतांत्रिक सहमति के माध्यम से पारंपरिक सामाजिक पदानुक्रम को संरक्षित करना है, साथ ही अल्पसंख्यक अधिकारों और सांस्कृतिक विविधता की रक्षा करना है।
  - दोनों ही सामूहिक लक्ष्यों को प्राप्त करने के लिए तर्कसंगत बहस और आलोचनात्मक सोच पर जोर देते हैं, साथ ही शक्तियों के पृथक्करण और संवैधानिक सीमाओं को भी बनाए रखते हैं।
explanation: |
  मीज़ेस का तर्क है कि राजनीतिक रूप से विपरीत प्रतीत होने के बावजूद, वामपंथी और दक्षिणपंथी दोनों ही सामूहिकतावाद मूलतः व्यक्तिगत स्वायत्तता को नकारते हैं और अपने-अपने सामूहिक आदर्शों की पूर्ति के लिए बल प्रयोग करते हैं।
  चाहे सामूहिक इकाई राष्ट्र (दक्षिणपंथी) हो या सर्वहारा वर्ग (वामपंथी), दोनों ही प्रणालियाँ बल के माध्यम से व्यक्तिगत इच्छा को समूह पहचान के अधीन कर देती हैं। गलत उत्तर यह गलत धारणा रखते हैं कि ये प्रणालियाँ व्यक्तिगत अधिकारों, लोकतांत्रिक प्रक्रियाओं या तर्कसंगत संवाद को संरक्षित रखती हैं - ये वे विशेषताएँ हैं जिन्हें मीज़ेस सामूहिकतावादी विचारधारा के साथ असंगत मानते हैं, क्योंकि सामूहिकतावादी विचारधारा में स्वाभाविक रूप से सामूहिक अधिकार के पक्ष में व्यक्तिगत निर्णय को दबाना आवश्यक होता है।
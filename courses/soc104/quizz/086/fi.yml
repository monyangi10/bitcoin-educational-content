question: Misesin analyysin mukaan, mikä peruspiirre on yhteinen vasemmistolaiselle kollektivismille (kommunismi/sosialismi) ja oikeistolaiselle kollektivismille (natsismi/fasismi) niiden erilaisista motiiveista huolimatta?
answer: Molemmat osoittavat vihaa yksilönvapautta kohtaan ja oikeuttavat väkivallan käytön yksityisten etujen alistamiseksi kollektiivisille kokonaisuuksille
wrong_answers:
  - Molemmissa asetetaan taloudellinen tasa-arvo poliittisen vapauden edelle ja kunnioitetaan samalla yksilön omaatuntoa ja vapaaehtoista yhdistymistä
  - Molemmat pyrkivät säilyttämään perinteiset sosiaaliset hierarkiat demokraattisen konsensuksen avulla ja suojelemaan samalla vähemmistöjen oikeuksia ja kulttuurista monimuotoisuutta
  - Molemmissa korostetaan rationaalista keskustelua ja kriittistä ajattelua yhteisten tavoitteiden saavuttamiseksi samalla kun säilytetään vallanjako ja perustuslailliset rajat
explanation: |
  Mises väittää, että vaikka poliittisesti näyttävätkin vastakkaisilta, sekä vasemmisto- että oikeistokollektivismit hylkäävät pohjimmiltaan yksilön autonomian ja käyttävät pakkokeinoja palvellakseen omia kollektiivisia epäjumaliaan.
  Olipa kollektiivinen kokonaisuus sitten kansakunta (oikeisto) tai proletariaatti (vasemmisto), molemmat järjestelmät alistavat yksilön tahdon ryhmäidentiteetille voimakeinoin. Väärät vastaukset viittaavat virheellisesti siihen, että nämä järjestelmät säilyttävät yksilön oikeudet, demokraattiset prosessit tai rationaalisen keskustelun - ominaisuudet, jotka Misesin mukaan ovat ristiriidassa kollektivistisen ideologian kanssa, joka luonnostaan edellyttää yksilöllisen harkinnan tukahduttamista kollektiivisen auktoriteetin hyväksi.
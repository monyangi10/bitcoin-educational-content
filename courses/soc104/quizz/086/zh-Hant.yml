question: 根據米塞斯的分析，左翼集體主義（共產主義/社會主義）和右翼集體主義（納粹主義/法西斯主義）儘管動機不同，但有什麼共同的基本特徵？
answer: 兩者都表現出對個人自由的憎恨，並以暴力為理由，讓私人利益從屬於集體實體。
wrong_answers:
  - 兩者都將經濟平等置於政治自由之上，同時維持對個人良知與自願結社的尊重
  - 兩者都尋求透過民主共識來維護傳統的社會等級制度，同時保護少數族群的權利和文化多樣性。
  - 兩者都強調理性辯論與批判性思考，以達成集體目標，同時維持三權分立與憲法限制
explanation: |
  米塞斯認為，儘管左派和右派的集體主義在政治上看起來是相反的，但兩者都從根本上摒棄了個人自主，並運用強制來服務各自的集體偶像。
  無論集體實體是國家（右）或無產階級（左），這兩種體系都透過武力使個人意志從屬於團體認同。錯誤的答案錯誤地暗示這些體系維護個人權利、民主程序或理性論述 - 米塞斯認為這些特徵與集體主義意識形態不相容，集體主義意識形態本質上需要壓制個人的判斷，以維護集體權威。
question: 根据米塞斯的分析，左翼集体主义（共产主义/社会主义）和右翼集体主义（纳粹主义/法西斯主义）尽管动机不同，但有什么共同的基本特征？
answer: 两者都表现出对个人自由的憎恨，并为暴力辩护，使私人利益屈从于集体实体
wrong_answers:
  - 两者都将经济平等置于政治自由之上，同时保持对个人良知和自愿结社的尊重
  - 两者都寻求通过民主共识维护传统的社会等级制度，同时保护少数人的权利和文化多样性
  - 两者都强调理性辩论和批判性思维，以实现集体目标，同时保持权力分立和宪法限制
explanation: |
  米塞斯认为，尽管左翼和右翼集体主义在政治上看起来截然相反，但从根本上说，它们都拒绝个人自治，并采用强制手段为各自的集体偶像服务。
  无论集体实体是国家（右派）还是无产阶级（左派），这两种制度都通过武力使个人意志服从于群体认同。错误答案错误地暗示这些制度维护了个人权利、民主进程或理性话语--米塞斯认为这些特征与集体主义意识形态不相容，因为集体主义意识形态本质上要求压制个人判断，以支持集体权威。
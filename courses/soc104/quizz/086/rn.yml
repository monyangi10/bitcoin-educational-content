question: Dushingiye ku nseguro ya Mises, ni ikihe kintu nyamukuru kiranga ubumwe bw’abanyabumoso (ubukomunisiti/ubusosiyalisimu) n’ubumwe bw’abanyaburyo (ubunazi/ubufashisi) naho nyene zifise imvo zitandukanye?
answer: Ivyo vyose vyerekana urwanko rw'umwidegemvyo w'umuntu ku giti ciwe no gushingira intahe ubukazi kugira ngo inyungu z'abantu ku giti cabo zishire munsi y'inzego rusangi .
wrong_answers:
  - Bompi bashira imbere uburinganire mu vy’ubutunzi kuruta umwidegemvyo wo mu vya politike mu gihe baguma bubaha ijwi ryo mu mutima ry’umuntu ku giti ciwe be n’ugukorana n’abandi ku bushake .
  - Bompi barondera kuzigama ubukuru bw’imibano bwa kera biciye mu kwumvikana mu buryo bwa demokarasi mu gihe barinda uburenganzira bw’abantu batobato n’ubudasa bw’imico kama .
  - Ivyo vyose bishimika ku mpari zishingiye ku vyiyumviro no ku kwiyumvira neza kugira ngo umuntu ashike ku ntego rusangi mu gihe aguma afise ugutandukanya ububasha n’imipaka y’Itegeko Nshinga .
explanation: |
  Mises avuga ko naho bisa n’ibihushanye mu vya politike, amashengero y’abanyagihugu y’ibubamfu n’ay’iburyo, mu vy’ukuri yanse ubwigenge bw’umuntu ku giti ciwe, agakoresha uguhatira kugira ngo akorere ibigirwamana vyabo vy’abanyagihugu. 
  Yaba ikintu rusangi ari ihanga (iburyo) canke abakozi (ibubamfu), izo nzira zompi zishira munsi y’ubushake bw’umuntu ku giti ciwe bwo gukoranya akaranga biciye ku nguvu. Inyishu zitari zo zivuga mu buryo butari bwo ko izo nzira zizigama uburenganzira bw’umuntu ku giti ciwe, inzira za demokarasi, canke insiguro zishingiye ku vyiyumviro - ibiranga Mises abona ko bidahuye n’ingengabitekerezo y’abanyagihugu, ivyo bikaba bisaba mu buryo busanzwe guhagarika urubanza rw’umuntu ku giti ciwe kugira ngo ashigikire ubutegetsi rusangi.
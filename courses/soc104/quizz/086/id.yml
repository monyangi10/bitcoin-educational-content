question: Menurut analisis Mises, karakteristik fundamental apa yang dimiliki oleh kolektivisme sayap kiri (komunisme/sosialisme) dan kolektivisme sayap kanan (nazisme/fasisme), terlepas dari motivasi mereka yang berbeda?
answer: Keduanya menunjukkan kebencian terhadap kebebasan individu dan pembenaran kekerasan untuk menundukkan kepentingan pribadi kepada entitas kolektif
wrong_answers:
  - Keduanya memprioritaskan kesetaraan ekonomi di atas kebebasan politik dengan tetap menghormati hati nurani individu dan asosiasi sukarela
  - Keduanya berupaya melestarikan hirarki sosial tradisional melalui konsensus demokratis sambil melindungi hak-hak minoritas dan keragaman budaya
  - Keduanya menekankan perdebatan rasional dan pemikiran kritis untuk mencapai tujuan kolektif dengan tetap mempertahankan pemisahan kekuasaan dan batas-batas konstitusional
explanation: |
  Mises berpendapat bahwa meskipun secara politis tampak berlawanan, kolektivisme kiri dan kanan pada dasarnya menolak otonomi individu dan menggunakan paksaan untuk melayani berhala kolektif masing-masing.
  Entah entitas kolektif itu adalah bangsa (kanan) atau proletariat (kiri), kedua sistem ini menundukkan kehendak individu pada identitas kelompok melalui paksaan. Jawaban yang salah secara keliru mengisyaratkan bahwa sistem-sistem ini mempertahankan hak-hak individu, proses demokratis, atau wacana rasional-karakteristik yang diidentifikasi oleh Mises tidak sesuai dengan ideologi kolektivis, yang secara inheren membutuhkan penindasan terhadap penilaian individu demi otoritas kolektif.
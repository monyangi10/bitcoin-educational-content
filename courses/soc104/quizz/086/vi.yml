question: Theo phân tích của Mises, chủ nghĩa tập thể cánh tả (chủ nghĩa cộng sản/chủ nghĩa xã hội) và chủ nghĩa tập thể cánh hữu (chủ nghĩa quốc xã/chủ nghĩa phát xít) có chung đặc điểm cơ bản nào bất chấp động cơ khác nhau của chúng?
answer: Cả hai đều thể hiện sự căm ghét tự do cá nhân và biện minh cho bạo lực nhằm đặt lợi ích cá nhân dưới sự chi phối của các thực thể tập thể.
wrong_answers:
  - Cả hai đều ưu tiên bình đẳng kinh tế hơn tự do chính trị, đồng thời vẫn tôn trọng lương tâm cá nhân và quyền tự do lập hội.
  - Cả hai đều hướng đến việc duy trì các trật tự xã hội truyền thống thông qua sự đồng thuận dân chủ, đồng thời bảo vệ quyền của các nhóm thiểu số và sự đa dạng văn hóa.
  - Cả hai đều nhấn mạnh tranh luận hợp lý và tư duy phản biện để đạt được mục tiêu chung, đồng thời duy trì sự phân chia quyền lực và các giới hạn hiến pháp.
explanation: |
  Mises lập luận rằng, mặc dù có vẻ đối lập về chính trị, cả chủ nghĩa tập thể cánh tả và cánh hữu về cơ bản đều bác bỏ quyền tự chủ cá nhân và sử dụng sự cưỡng chế để phục vụ các thần tượng tập thể tương ứng của họ.
  Cho dù thực thể tập thể là quốc gia (cánh hữu) hay giai cấp vô sản (cánh tả), cả hai hệ thống đều đặt ý chí cá nhân dưới sự chi phối của bản sắc nhóm thông qua vũ lực. Các câu trả lời sai cho rằng các hệ thống này bảo tồn quyền cá nhân, các quy trình dân chủ hoặc tư duy lý tính - những đặc điểm mà Mises xác định là không tương thích với hệ tư tưởng tập thể, vốn đòi hỏi phải đàn áp phán đoán cá nhân để ủng hộ quyền lực tập thể.
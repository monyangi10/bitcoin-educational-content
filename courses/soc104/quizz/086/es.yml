question: Según el análisis de Mises, ¿qué característica fundamental comparten tanto el colectivismo de izquierdas (comunismo/socialismo) como el colectivismo de derechas (nazismo/fascismo) a pesar de sus diferentes motivaciones?
answer: Ambos exhiben odio a la libertad individual y justificación de la violencia para subordinar los intereses privados a entidades colectivas
wrong_answers:
  - Ambos dan prioridad a la igualdad económica frente a la libertad política, al tiempo que mantienen el respeto por la conciencia individual y la asociación voluntaria
  - Ambos pretenden preservar las jerarquías sociales tradicionales mediante el consenso democrático, protegiendo al mismo tiempo los derechos de las minorías y la diversidad cultural
  - Ambos hacen hincapié en el debate racional y el pensamiento crítico para alcanzar objetivos colectivos, manteniendo al mismo tiempo la separación de poderes y los límites constitucionales
explanation: |
  Mises sostiene que, a pesar de parecer políticamente opuestos, tanto los colectivismos de izquierdas como los de derechas rechazan fundamentalmente la autonomía individual y emplean la coerción para servir a sus respectivos ídolos colectivos.
  Tanto si la entidad colectiva es la nación (derecha) o el proletariado (izquierda), ambos sistemas subordinan la voluntad individual a la identidad de grupo mediante la fuerza. Las respuestas erróneas sugieren incorrectamente que estos sistemas preservan los derechos individuales, los procesos democráticos o el discurso racional, características que Mises identifica como incompatibles con la ideología colectivista, que inherentemente requiere suprimir el juicio individual en favor de la autoridad colectiva.
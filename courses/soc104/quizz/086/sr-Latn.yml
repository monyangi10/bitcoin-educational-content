question: Prema Misesovoj analizi, i levičarski kolektivizam (komunizam/socijalizam) i desničarski kolektivizam (nacizam/fašizam) dele fundamentalnu karakteristiku centralizovane kontrole nad ekonomijom, uprkos njihovim različitim motivacijama.
answer: Oboje pokazuju mržnju prema individualnoj slobodi i opravdanje nasilja kako bi se privatni interesi podredili kolektivnim entitetima.
wrong_answers:
  - Oboje daju prioritet ekonomskoj jednakosti nad političkom slobodom, uz očuvanje poštovanja prema individualnoj savesti i dobrovoljnom udruživanju.
  - Oboje nastoje očuvati tradicionalne društvene hijerarhije kroz demokratski konsenzus, istovremeno štiteći prava manjina i kulturnu raznolikost.
  - Oba naglašavaju racionalnu debatu i kritičko razmišljanje kako bi se postigli kolektivni ciljevi uz održavanje podele vlasti i ustavnih ograničenja.
explanation: |
  Mises tvrdi da, iako se čine politički suprotnim, i levi i desni kolektivizmi u osnovi odbacuju individualnu autonomiju i koriste prinudu da služe svojim kolektivnim idolima. 
  Bilo da je kolektivni entitet nacija (desno) ili proletarijat (levo), oba sistema podređuju individualnu volju grupnom identitetu kroz silu. Pogrešni odgovori pogrešno sugerišu da ovi sistemi čuvaju individualna prava, demokratske procese ili racionalnu raspravu - karakteristike koje Mises identifikuje kao nespojive sa kolektivističkom ideologijom, koja inherentno zahteva potiskivanje individualnog rasuđivanja u korist kolektivnog autoriteta.
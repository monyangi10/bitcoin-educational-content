question: Enligt Mises analys, vilken grundläggande egenskap delar både vänsterkollektivism (kommunism/socialism) och högerkollektivism (nazism/fascism) trots deras olika motiv?
answer: Båda visar prov på hat mot individuell frihet och rättfärdigande av våld för att underordna privata intressen under kollektiva enheter
wrong_answers:
  - Båda prioriterar ekonomisk jämlikhet framför politisk frihet samtidigt som de upprätthåller respekten för individens samvete och frivilliga sammanslutningar
  - Båda strävar efter att bevara traditionella sociala hierarkier genom demokratiskt samförstånd och samtidigt skydda minoriteters rättigheter och kulturell mångfald
  - Båda betonar rationell debatt och kritiskt tänkande för att uppnå kollektiva mål samtidigt som maktfördelningen och de konstitutionella begränsningarna upprätthålls
explanation: |
  Mises hävdar att trots att de politiskt sett verkar vara motsatta förkastar både vänster- och högerkollektivismer i grunden individuell autonomi och använder tvång för att tjäna sina respektive kollektiva idoler.
  Oavsett om den kollektiva enheten är nationen (höger) eller proletariatet (vänster), underordnar båda systemen den individuella viljan till gruppidentitet genom våld. De felaktiga svaren antyder felaktigt att dessa system bevarar individuella rättigheter, demokratiska processer eller rationell diskurs - egenskaper som Mises identifierar som oförenliga med kollektivistisk ideologi, som i sig kräver att man undertrycker individuella bedömningar till förmån för kollektiv auktoritet.
question: Welches grundlegende Merkmal haben nach Mises' Analyse der linke Kollektivismus (Kommunismus/Sozialismus) und der rechte Kollektivismus (Nazismus/Faschismus) trotz ihrer unterschiedlichen Motivationen gemeinsam?
answer: Beide sind Ausdruck des Hasses auf die individuelle Freiheit und der Rechtfertigung von Gewalt, um private Interessen kollektiven Einheiten unterzuordnen
wrong_answers:
  - Beide räumen der wirtschaftlichen Gleichheit Vorrang vor der politischen Freiheit ein und wahren gleichzeitig die Achtung des individuellen Gewissens und der freiwilligen Vereinigung
  - Beide versuchen, traditionelle soziale Hierarchien durch demokratischen Konsens zu bewahren und gleichzeitig Minderheitenrechte und kulturelle Vielfalt zu schützen
  - Beide betonen die rationale Debatte und das kritische Denken, um kollektive Ziele zu erreichen und gleichzeitig die Gewaltenteilung und die verfassungsmäßigen Grenzen zu wahren
explanation: |
  Mises argumentiert, dass sowohl linke als auch rechte Kollektivismen, obwohl sie politisch gegensätzlich erscheinen, die individuelle Autonomie grundsätzlich ablehnen und Zwang anwenden, um ihren jeweiligen kollektiven Idolen zu dienen.
  Unabhängig davon, ob die kollektive Einheit die Nation (rechts) oder das Proletariat (links) ist, ordnen beide Systeme den individuellen Willen der Gruppenidentität durch Gewalt unter. Die falschen Antworten suggerieren fälschlicherweise, dass diese Systeme individuelle Rechte, demokratische Prozesse oder einen rationalen Diskurs bewahren - Eigenschaften, die Mises als unvereinbar mit der kollektivistischen Ideologie identifiziert, die von Natur aus die Unterdrückung des individuellen Urteils zugunsten der kollektiven Autorität erfordert.
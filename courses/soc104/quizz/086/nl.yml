question: Welk fundamenteel kenmerk delen volgens Mises' analyse zowel links collectivisme (communisme/socialisme) als rechts collectivisme (nazisme/fascisme) ondanks hun verschillende motivaties?
answer: Beiden geven blijk van haat tegen individuele vrijheid en rechtvaardiging van geweld om privébelangen ondergeschikt te maken aan collectieve entiteiten
wrong_answers:
  - Beide geven voorrang aan economische gelijkheid boven politieke vrijheid, met behoud van respect voor het individuele geweten en vrijwillige vereniging
  - Beide proberen traditionele sociale hiërarchieën te behouden door middel van democratische consensus en tegelijkertijd de rechten van minderheden en culturele diversiteit te beschermen
  - Beide benadrukken rationeel debat en kritisch denken om collectieve doelen te bereiken met behoud van de scheiding der machten en grondwettelijke beperkingen
explanation: |
  Mises stelt dat ondanks het feit dat ze politiek tegengesteld lijken, zowel linkse als rechtse collectivismen fundamenteel individuele autonomie verwerpen en dwang gebruiken om hun respectievelijke collectieve idolen te dienen.
  Of de collectieve entiteit nu de natie (rechts) of het proletariaat (links) is, beide systemen maken de individuele wil ondergeschikt aan de groepsidentiteit door middel van dwang. De foute antwoorden suggereren ten onrechte dat deze systemen individuele rechten, democratische processen of rationeel discours behouden - kenmerken die Mises als onverenigbaar met de collectivistische ideologie identificeert, die inherent vereist dat individueel oordeel onderdrukt wordt ten gunste van collectief gezag.
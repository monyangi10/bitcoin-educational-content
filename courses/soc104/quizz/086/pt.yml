question: De acordo com a análise de Mises, que caraterística fundamental têm em comum o coletivismo de esquerda (comunismo/socialismo) e o coletivismo de direita (nazismo/fascismo), apesar das suas diferentes motivações?
answer: Ambos demonstram ódio à liberdade individual e justificam a violência para subordinar os interesses privados a entidades colectivas
wrong_answers:
  - Ambos dão prioridade à igualdade económica em detrimento da liberdade política, mantendo o respeito pela consciência individual e pela associação voluntária
  - Ambos procuram preservar as hierarquias sociais tradicionais através do consenso democrático, protegendo simultaneamente os direitos das minorias e a diversidade cultural
  - Ambos privilegiam o debate racional e o pensamento crítico para atingir objectivos colectivos, mantendo a separação de poderes e os limites constitucionais
explanation: |
  Mises argumenta que, apesar de parecerem politicamente opostos, tanto os colectivismos de esquerda como os de direita rejeitam fundamentalmente a autonomia individual e empregam a coerção para servir os seus respectivos ídolos colectivos.
  Quer a entidade colectiva seja a nação (direita) ou o proletariado (esquerda), ambos os sistemas subordinam a vontade individual à identidade do grupo através da força. As respostas erradas sugerem incorretamente que esses sistemas preservam os direitos individuais, os processos democráticos ou o discurso racional - caraterísticas que Mises identifica como incompatíveis com a ideologia coletivista, que inerentemente requer a supressão do julgamento individual em favor da autoridade coletiva.
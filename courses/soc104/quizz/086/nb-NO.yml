question: Hvilket grunnleggende kjennetegn deler ifølge Mises' analyse venstrekollektivisme (kommunisme/sosialisme) og høyrekollektivisme (nazisme/fascisme), til tross for at de har ulike motiver?
answer: Begge viser hat mot individuell frihet og rettferdiggjør vold for å underordne private interesser under kollektive enheter
wrong_answers:
  - Begge prioriterer økonomisk likhet fremfor politisk frihet, samtidig som de opprettholder respekten for individuell samvittighet og frivillig organisering
  - Begge søker å bevare tradisjonelle sosiale hierarkier gjennom demokratisk konsensus og samtidig beskytte minoriteters rettigheter og kulturelt mangfold
  - Begge legger vekt på rasjonell debatt og kritisk tenkning for å oppnå kollektive mål, samtidig som maktfordeling og konstitusjonelle begrensninger opprettholdes
explanation: |
  Mises argumenterer for at til tross for at de fremstår som politisk motsatte, avviser både venstre- og høyrekollektivismen i bunn og grunn individuell autonomi og bruker tvang for å tjene sine respektive kollektive idoler.
  Enten den kollektive enheten er nasjonen (høyre) eller proletariatet (venstre), underordner begge systemene den individuelle viljen under gruppeidentiteten ved hjelp av makt. De gale svarene antyder feilaktig at disse systemene bevarer individuelle rettigheter, demokratiske prosesser eller rasjonelle diskurser - egenskaper som Mises identifiserer som uforenlige med kollektivistisk ideologi, som i sin natur krever undertrykkelse av individuell dømmekraft til fordel for kollektiv autoritet.
question: Milline on Misesi analüüsi kohaselt vasakpoolse kollektivismi (kommunism/sotsialism) ja parempoolse kollektivismi (natsism/fasism) ühine põhiline tunnus, vaatamata nende erinevatele motiividele?
answer: Mõlemad näitavad individuaalse vabaduse vihkamist ja vägivalla õigustamist, et allutada erahuvid kollektiivsetele üksustele
wrong_answers:
  - Mõlemad seavad majandusliku võrdsuse prioriteediks poliitilise vabaduse ees, säilitades samas austuse individuaalse südametunnistuse ja vabatahtliku ühinemise vastu
  - Mõlemad püüavad demokraatliku konsensuse kaudu säilitada traditsioonilisi sotsiaalseid hierarhiaid, kaitstes samal ajal vähemuste õigusi ja kultuurilist mitmekesisust
  - Mõlemad rõhutavad ratsionaalset arutelu ja kriitilist mõtlemist, et saavutada ühiseid eesmärke, säilitades samal ajal võimude lahususe ja põhiseaduslikud piirangud
explanation: |
  Mises väidab, et hoolimata sellest, et poliitiliselt näib olevat vastandlik, lükkavad nii vasakpoolsed kui ka parempoolsed kollektivismid põhimõtteliselt tagasi individuaalse autonoomia ja kasutavad sundust, et teenida oma vastavaid kollektiivseid iidoleid.
  Olenemata sellest, kas kollektiivne üksus on rahvas (paremal) või proletariaat (vasakul), mõlemad süsteemid allutavad individuaalse tahte grupiidentiteedile jõuga. Valed vastused viitavad ekslikult sellele, et need süsteemid säilitavad individuaalseid õigusi, demokraatlikke protsesse või ratsionaalset diskursust - omadusi, mida Mises nimetab ühildamatuks kollektivistliku ideoloogiaga, mis nõuab olemuslikult individuaalse otsustusvõime allasurumist kollektiivse autoriteedi kasuks.
question: Mises'in analizine göre, farklı motivasyonlarına rağmen hem sol kanat kolektivizm (komünizm/sosyalizm) hem de sağ kanat kolektivizm (nazizm/faşizm) hangi temel özelliği paylaşmaktadır?
answer: Her ikisi de bireysel özgürlükten nefret etmekte ve özel çıkarları kolektif varlıklara tabi kılmak için şiddeti meşrulaştırmaktadır
wrong_answers:
  - Her ikisi de ekonomik eşitliğe siyasi özgürlükten daha fazla öncelik verirken, bireysel vicdana ve gönüllü birlikteliğe saygıyı sürdürmektedir
  - Her ikisi de azınlık haklarını ve kültürel çeşitliliği korurken demokratik uzlaşı yoluyla geleneksel toplumsal hiyerarşileri korumayı amaçlamaktadır
  - Her ikisi de güçler ayrılığını ve anayasal sınırları korurken kolektif hedeflere ulaşmak için rasyonel tartışma ve eleştirel düşünceyi vurgular
explanation: |
  Mises, siyasi olarak zıt görünmelerine rağmen, hem sol hem de sağ kolektivizmlerin temelde bireysel özerkliği reddettiğini ve kendi kolektif idollerine hizmet etmek için zor kullandığını savunur.
  Kolektif varlık ister ulus (sağ) ister proletarya (sol) olsun, her iki sistem de bireysel iradeyi zor yoluyla grup kimliğine tabi kılar. Yanlış cevaplar yanlış bir şekilde bu sistemlerin bireysel hakları, demokratik süreçleri veya rasyonel söylemi koruduğunu öne sürmektedir - Mises'in kolektivist ideoloji ile uyumsuz olarak tanımladığı özellikler, doğası gereği kolektif otorite lehine bireysel yargıyı bastırmayı gerektirir.
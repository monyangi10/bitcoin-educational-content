question: Secondo l'analisi di Mises, quale caratteristica fondamentale condividono il collettivismo di sinistra (comunismo/socialismo) e quello di destra (nazismo/fascismo), nonostante le loro diverse motivazioni?
answer: Entrambi mostrano l'odio per la libertà individuale e la giustificazione della violenza per subordinare gli interessi privati alle entità collettive
wrong_answers:
  - Entrambi danno priorità all'uguaglianza economica rispetto alla libertà politica, mantenendo il rispetto per la coscienza individuale e l'associazione volontaria
  - Entrambi cercano di preservare le gerarchie sociali tradizionali attraverso il consenso democratico, proteggendo al contempo i diritti delle minoranze e la diversità culturale
  - Entrambi enfatizzano il dibattito razionale e il pensiero critico per raggiungere obiettivi collettivi, mantenendo la separazione dei poteri e i limiti costituzionali
explanation: |
  Mises sostiene che, nonostante sembrino politicamente opposti, i collettivismi di destra e di sinistra rifiutano fondamentalmente l'autonomia individuale e impiegano la coercizione per servire i rispettivi idoli collettivi.
  Che l'entità collettiva sia la nazione (destra) o il proletariato (sinistra), entrambi i sistemi subordinano la volontà individuale all'identità di gruppo attraverso la forza. Le risposte sbagliate suggeriscono erroneamente che questi sistemi preservano i diritti individuali, i processi democratici o il discorso razionale - caratteristiche che Mises identifica come incompatibili con l'ideologia collettivista, che richiede intrinsecamente la soppressione del giudizio individuale a favore dell'autorità collettiva.
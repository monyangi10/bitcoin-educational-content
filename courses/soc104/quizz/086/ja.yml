question: ミーゼスの分析によれば、左翼の集団主義（共産主義／社会主義）と右翼の集団主義（ナチズム／ファシズム）は、その動機が異なるにもかかわらず、どのような基本的特徴を共有しているのだろうか？
answer: どちらも個人の自由を憎み、私的利益を集団に従属させる暴力を正当化している。
wrong_answers:
  - 両者とも、個人の良心と自発的な結社を尊重しつつ、政治的自由よりも経済的平等を優先する
  - どちらもマイノリティの権利と文化の多様性を守りながら、民主的なコンセンサスによって伝統的な社会階層を維持しようとするものである。
  - 両者とも、三権分立と憲法上の制限を維持しつつ、集団的目標を達成するための合理的な議論と批判的思考を重視している。
explanation: |
  ミーゼスは、政治的には正反対に見えるにもかかわらず、左派も右派も集団主義は基本的に個人の自律性を否定し、それぞれの集団的偶像に奉仕するために強制力を用いる、と主張する。
  集団の主体が国家（右派）であろうとプロレタリアート（左派）であろうと、どちらのシステムも力によって個人の意思を集団のアイデンティティに従属させる。間違った答えは、これらの制度が個人の権利、民主的プロセス、合理的な言説を維持すると誤って示唆している。これはミーゼスが集団主義イデオロギーとは相容れない特性であり、集団的権威を優先して個人の判断を抑圧することが本質的に必要であると指摘している。
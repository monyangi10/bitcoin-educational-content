question: ตามการวิเคราะห์ของ Mises ลักษณะพื้นฐานที่ทั้งลัทธิรวมหมู่ฝ่ายซ้าย (คอมมิวนิสต์/สังคมนิยม) และลัทธิรวมหมู่ฝ่ายขวา (นาซี/ฟาสซิสต์) มีร่วมกันแม้จะมีแรงจูงใจที่แตกต่างกันคืออะไร?
answer: ทั้งสองแสดงความเกลียดชังต่อเสรีภาพส่วนบุคคลและการใช้ความรุนแรงเพื่อให้ผลประโยชน์ส่วนตัวอยู่ใต้บังคับบัญชาของหน่วยงานรวม
wrong_answers:
  - ทั้งสองให้ความสำคัญกับความเท่าเทียมทางเศรษฐกิจมากกว่าเสรีภาพทางการเมือง ในขณะที่ยังคงเคารพในมโนธรรมของแต่ละบุคคลและการรวมกลุ่มโดยสมัครใจ
  - ทั้งสองมุ่งหวังที่จะรักษาลำดับชั้นทางสังคมแบบดั้งเดิมผ่านฉันทามติแบบประชาธิปไตยในขณะเดียวกันก็ปกป้องสิทธิของชนกลุ่มน้อยและความหลากหลายทางวัฒนธรรม
  - ทั้งสองเน้นการอภิปรายอย่างมีเหตุผลและการคิดเชิงวิพากษ์เพื่อบรรลุเป้าหมายร่วมกันในขณะที่รักษาการแบ่งแยกอำนาจและข้อจำกัดตามรัฐธรรมนูญ
explanation: |
  Mises โต้แย้งว่าแม้จะดูเหมือนตรงข้ามทางการเมือง แต่ทั้งลัทธิรวมหมู่ฝ่ายซ้ายและฝ่ายขวาต่างก็ปฏิเสธอำนาจอิสระของปัจเจกบุคคลและใช้การบังคับเพื่อรับใช้ไอดอลรวมหมู่ของตนเอง 
  ไม่ว่าจะเป็นเอกลักษณ์รวมหมู่ของชาติ (ขวา) หรือชนชั้นกรรมาชีพ (ซ้าย) ทั้งสองระบบต่างก็ทำให้ความต้องการของปัจเจกบุคคลต้องยอมจำนนต่ออัตลักษณ์กลุ่มผ่านการใช้กำลัง คำตอบที่ผิดพลาดแนะนำอย่างไม่ถูกต้องว่าระบบเหล่านี้รักษาสิทธิของปัจเจกบุคคล กระบวนการประชาธิปไตย หรือการสนทนาอย่างมีเหตุผล - ลักษณะที่ Mises ระบุว่าไม่สอดคล้องกับอุดมการณ์รวมหมู่ ซึ่งโดยเนื้อแท้แล้วต้องการการกดขี่การตัดสินของปัจเจกบุคคลเพื่อสนับสนุนอำนาจรวมหมู่
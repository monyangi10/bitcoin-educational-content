question: Mikä on luvun mukaan perinteisen vasemmisto-oikeistopoliittisen spektrin suurin ongelma?
answer: Se ei jätä tilaa klassiselle liberaalille ajattelulle, joka ei sovi yhteen vasemmistolaisen egalitarismin eikä oikeistolaisen nationalismin kanssa
wrong_answers:
  - Se yksinkertaistaa liikaa politiikkaa, koska siinä on vain kaksi äärimmäistä kantaa ilman maltillisia tai keskustalaisia vaihtoehtoja
  - Se ei ota huomioon sosialististen ja kapitalististen ideologioiden välisiä taloudellisia eroja nykyaikaisissa demokratioissa
  - Siinä ei tehdä kunnolla eroa demokraattisten ja autoritaaristen hallintorakenteiden välillä
explanation: |
  Luvussa todetaan nimenomaan, että vasemmisto-oikeisto -akselille ei mahdu klassinen liberaali ajattelu, joka ei sovi yhteen egalitaristisen ajattelun kanssa
  vasemmiston eikä oikeiston nationalismin kanssa. Tätä havainnollistetaan esimerkkien avulla, joita ovat esimerkiksi Thomas Jefferson, Frédéric Bastiat ja nykyajan
  libertaareista, jotka eivät sovi kumpaankaan kategoriaan. Muut vaihtoehdot, jotka koskevat poliittisten spektrien rajoituksia, eivät kuitenkaan tavoita erityisiä poliittisia näkemyksiä
  luvussa esitettyä kritiikkiä siitä, että klassinen liberalismi on jätetty tämän kehyksen ulkopuolelle.
question: 根據本章所述，傳統左右政治光譜的主要問題是什麼？
answer: 它讓古典自由主義思想無立足之地，既不符合左翼平等主義，也不符合右翼民族主義。
wrong_answers:
  - 只有兩個極端立場，沒有任何溫和或中間的選擇，因此過度簡化了政治
  - 它未能解釋現代民主國家的社會主義和資本主義意識形態之間的經濟差異
  - 它沒有適當區分民主與專制形式的政府結構
explanation: |
  本章特別指出，左右軸心無法容納古典自由主義思想，因為它既不符合左派的平等主義，也不符合右派的民族主義。
  左翼的平等主義或右翼的民族主義。本章舉出托馬斯‧傑佛遜 (Thomas Jefferson)、弗雷德里克‧巴斯蒂亞 (Frédéric Bastiat) 以及當代自由主義者的例子來說明這一點。
  自由主義者的例子來說明這一點。其他選項雖然觸及政治光譜的限制，但沒有捕捉到本章對古典自由主義者的批判。
  本章對古典自由主義被排除在這個框架之外的批判。
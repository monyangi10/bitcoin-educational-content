question: В чем, согласно главе, заключается главная проблема традиционного лево-правого политического спектра?
answer: В нем не остается места для классической либеральной мысли, которая не сочетается ни с левым эгалитаризмом, ни с правым национализмом
wrong_answers:
  - Она чрезмерно упрощает политику, предлагая только две крайние позиции без каких-либо умеренных или центристских вариантов
  - Она не учитывает экономические различия между социалистической и капиталистической идеологиями в современных демократических странах
  - В нем нет правильного разграничения между демократическими и авторитарными формами государственных структур
explanation: |
  В главе особо отмечается, что ось "левые-правые" не может вместить классическую либеральную мысль, которая не согласуется ни с эгалитаризмом левых, ни с национализмом правых
  левых, ни с национализмом правых. Это иллюстрируется на примерах таких фигур, как Томас Джефферсон, Фредерик Бастиа и современные
  либертарианцев, которые не вписываются ни в одну из категорий. Другие варианты, хотя и затрагивают ограничения политического спектра, не отражают специфическую
  критика, высказанная в этой главе по поводу того, что классический либерализм исключен из этой системы.
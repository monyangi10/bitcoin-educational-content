question: 이 장에 따르면 전통적인 좌우 정치 스펙트럼의 주요 문제점은 무엇인가요?
answer: 좌파 평등주의도 우파 민족주의도 맞지 않는 고전적 자유주의 사상이 들어설 자리가 없습니다
wrong_answers:
  - 중도나 중도적 선택지 없이 극단적인 두 가지 입장만 제시하여 정치를 지나치게 단순화합니다
  - 현대 민주주의 국가에서 사회주의와 자본주의 이데올로기 간의 경제적 차이를 설명하지 못합니다
  - 민주적 형태의 정부 구조와 권위주의적 형태의 정부 구조를 제대로 구분하지 못합니다
explanation: |
  이 장에서는 특히 좌파의 평등주의나 우파의 민족주의와 일치하지 않는 고전적 자유주의 사상을 좌-우 축이 수용할 수 없다고 명시하고 있습니다
  또는 우파의 민족주의와 일치하지 않습니다. 이는 토머스 제퍼슨, 프레데릭 바스티앙, 그리고 현대의
  자유주의자들의 사례를 통해 설명합니다. 다른 옵션은 정치적 스펙트럼의 한계를 다루고 있지만, 계급에 대한 장에서 제기된 구체적인
  이 프레임워크에서 배제되는 고전적 자유주의에 대한 비판을 다루지 않습니다.
question: Hva er hovedproblemet med det tradisjonelle politiske venstre-høyre-spekteret, ifølge kapittelet?
answer: Det gir ingen plass til klassisk liberal tenkning, som verken passer med venstresidens egalitarisme eller høyresidens nasjonalisme
wrong_answers:
  - Den overforenkler politikken ved bare å ha to ytterpunkter uten noen moderate eller sentrumsorienterte alternativer
  - Den tar ikke hensyn til de økonomiske forskjellene mellom sosialistiske og kapitalistiske ideologier i moderne demokratier
  - Den skiller ikke ordentlig mellom demokratiske og autoritære styreformer
explanation: |
  Kapitlet slår spesifikt fast at venstre-høyre-aksen ikke kan romme klassisk liberal tenkning, som verken er i tråd med venstresidens egalitarisme
  venstresidens egalitarisme eller høyresidens nasjonalisme. Dette illustreres gjennom eksempler på skikkelser som Thomas Jefferson, Frédéric Bastiat og samtidige
  libertarianere som ikke passer inn i noen av kategoriene. De andre alternativene berører begrensningene i det politiske spekteret, men fanger ikke opp den spesifikke
  kritikken i kapittelet om at den klassiske liberalismen er ekskludert fra dette rammeverket.
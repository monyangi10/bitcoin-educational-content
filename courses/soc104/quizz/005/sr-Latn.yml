question: Prema poglavlju, koji je glavni problem sa tradicionalnim levo-desnim političkim spektrom?
answer: Ne ostavlja mesta za klasičnu liberalnu misao, koja se ne uklapa ni u levi egalitarizam ni u desni nacionalizam.
wrong_answers:
  - Pojednostavljuje politiku tako što ima samo dve ekstremne pozicije bez ikakvih umerenih ili centrističkih opcija.
  - Ne uzima u obzir ekonomske razlike između socijalističkih i kapitalističkih ideologija u modernim demokratijama.
  - Ne pravi pravilno razliku između demokratskih i autoritarnih oblika državnih struktura.
explanation: |
  Poglavlje posebno navodi da osa levo-desno ne može da obuhvati klasičnu liberalnu misao, koja se ne poklapa ni sa egalitarizmom levice ni sa nacionalizmom desnice. Ovo je ilustrovano primerima ličnosti kao što su Tomas Džeferson, Frédéric Bastiat i savremeni libertarijanci koji se ne uklapaju uredno ni u jednu kategoriju. Druge opcije, iako se dotiču ograničenja političkih spektra, ne obuhvataju specifičnu kritiku iznesenu u poglavlju o isključenju klasičnog liberalizma iz ovog okvira.
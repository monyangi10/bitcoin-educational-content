question: Wat is volgens het hoofdstuk het grootste probleem met het traditionele links-rechts politieke spectrum?
answer: Er is geen plaats voor klassiek liberaal denken, dat noch bij links egalitarisme noch bij rechts nationalisme past
wrong_answers:
  - Het oversimplificeert de politiek door slechts twee extreme standpunten te hebben zonder enige gematigde of centristische opties
  - Het houdt geen rekening met economische verschillen tussen socialistische en kapitalistische ideologieën in moderne democratieën
  - Er wordt geen goed onderscheid gemaakt tussen democratische en autoritaire regeringsstructuren
explanation: |
  Het hoofdstuk stelt specifiek dat de links-rechts as geen plaats biedt aan het klassieke liberale gedachtegoed, dat niet past bij het egalitarisme van links of het nationalisme van rechts
  van links of het nationalisme van rechts. Dit wordt geïllustreerd aan de hand van voorbeelden van figuren als Thomas Jefferson, Frédéric Bastiat en hedendaagse libertariërs
  libertariërs die niet netjes in één van beide categorieën passen. De andere opties hebben weliswaar betrekking op de beperkingen van politieke spectrums, maar niet op de specifieke kritiek die in het hoofdstuk wordt geuit op het klassieke nationalisme van rechts
  kritiek in het hoofdstuk over klassiek liberalisme dat buiten dit kader valt.
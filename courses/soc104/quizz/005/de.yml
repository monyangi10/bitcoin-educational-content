question: Was ist laut diesem Kapitel das Hauptproblem des traditionellen politischen Spektrums von links nach rechts?
answer: Sie lässt keinen Platz für das klassische liberale Denken, das weder zum linken Egalitarismus noch zum rechten Nationalismus passt
wrong_answers:
  - Sie vereinfacht die Politik zu sehr, indem sie nur zwei extreme Positionen ohne gemäßigte oder zentristische Optionen vorsieht
  - Sie berücksichtigt nicht die wirtschaftlichen Unterschiede zwischen sozialistischen und kapitalistischen Ideologien in modernen Demokratien
  - Es wird nicht richtig zwischen demokratischen und autoritären Regierungsstrukturen unterschieden
explanation: |
  In dem Kapitel wird ausdrücklich darauf hingewiesen, dass die Links-Rechts-Achse dem klassischen liberalen Gedankengut nicht gerecht werden kann, da dieses weder mit dem Egalitarismus
  der Linken oder dem Nationalismus der Rechten entspricht. Dies wird durch Beispiele von Persönlichkeiten wie Thomas Jefferson, Frédéric Bastiat und zeitgenössischen
  libertäre, die sich weder der einen noch der anderen Kategorie zuordnen lassen. Die anderen Optionen berühren zwar die Grenzen des politischen Spektrums, gehen aber nicht auf die spezifische
  die anderen Optionen berühren zwar die Grenzen des politischen Spektrums, gehen aber nicht auf die im Kapitel geäußerte Kritik ein, dass der klassische Liberalismus von diesem Rahmen ausgeschlossen ist.
question: Според главата какъв е основният проблем на традиционния ляво-дясно политически спектър?
answer: Тя не оставя място за класическата либерална мисъл, която не се вписва нито в левия егалитаризъм, нито в десния национализъм
wrong_answers:
  - Той опростява политиката, като предлага само две крайни позиции без умерени или центристки варианти
  - Той не отчита икономическите различия между социалистическите и капиталистическите идеологии в съвременните демокрации
  - В него не се прави правилно разграничение между демократични и авторитарни форми на управление
explanation: |
  В главата изрично се посочва, че оста ляво-дясно не може да побере класическата либерална мисъл, която не съответства нито на егалитаризма
  на левите, нито на десните национализми. Това е илюстрирано с примери на фигури като Томас Джеферсън, Фредерик Бастиа и съвременните
  либертарианци, които не се вписват точно в нито една от двете категории. Другите варианти, макар и да засягат ограниченията на политическите спектри, не отразяват спецификата на
  критиката, отправена в главата, относно изключването на класическия либерализъм от тази рамка.
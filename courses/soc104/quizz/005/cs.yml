question: Jaký je podle této kapitoly hlavní problém tradičního levo-pravého politického spektra?
answer: Neponechává místo klasickému liberálnímu myšlení, které se nehodí ani k levicovému rovnostářství, ani k pravicovému nacionalismu
wrong_answers:
  - Zjednodušuje politiku tím, že obsahuje pouze dvě krajní pozice bez umírněných nebo středových možností
  - Nezohledňuje ekonomické rozdíly mezi socialistickými a kapitalistickými ideologiemi v moderních demokraciích
  - Nerozlišuje správně mezi demokratickými a autoritářskými formami vládních struktur
explanation: |
  V kapitole se výslovně uvádí, že osa levice-pravice nemůže vyhovovat klasickému liberálnímu myšlení, které se neshoduje ani s rovnostářstvím, ani s rovnostářstvím
  levice, ani s nacionalismem pravice. To je ilustrováno na příkladech osobností, jako jsou Thomas Jefferson, Frédéric Bastiat a současní politici
  libertariáni, kteří se nedají zařadit ani do jedné z těchto kategorií. Ostatní možnosti se sice dotýkají omezení politického spektra, ale nevystihují specifické rysy
  kritiku, která byla vznesena v této kapitole a která se týká vyloučení klasického liberalismu z tohoto rámce.
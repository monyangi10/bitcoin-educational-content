question: Bu bölüme göre, geleneksel sol-sağ siyasi yelpazenin temel sorunu nedir?
answer: Ne solcu eşitlikçiliğe ne de sağcı milliyetçiliğe uyan klasik liberal düşünceye yer bırakmıyor
wrong_answers:
  - Herhangi bir ılımlı veya merkezci seçenek olmaksızın sadece iki aşırı pozisyona sahip olarak siyaseti aşırı basitleştiriyor
  - Modern demokrasilerdeki sosyalist ve kapitalist ideolojiler arasındaki ekonomik farklılıkları açıklamakta başarısız olmaktadır
  - Demokratik ve otoriter hükümet yapıları arasında doğru bir ayrım yapmamaktadır
explanation: |
  Bu bölümde özellikle sol-sağ ekseninin klasik liberal düşünceyi barındıramayacağı, bunun da eşitlikçilikle uyuşmadığı belirtilmektedir
  solun ya da sağın milliyetçiliği. Bu durum Thomas Jefferson, Frédéric Bastiat ve çağdaş milliyetçilik gibi figürler üzerinden örneklendirilmektedir
  her iki kategoriye de tam olarak uymayan liberteryenler. Diğer seçenekler, siyasi spektrumların sınırlamalarına değinmekle birlikte, belirli
  bu bölümde klasik liberalizmin bu çerçevenin dışında tutulmasına yönelik eleştiri yapılmıştır.
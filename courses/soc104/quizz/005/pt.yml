question: De acordo com o capítulo, qual é o principal problema do espetro político tradicional esquerda-direita?
answer: Não deixa lugar para o pensamento liberal clássico, que não se enquadra nem no igualitarismo de esquerda nem no nacionalismo de direita
wrong_answers:
  - Simplifica demasiado a política ao ter apenas duas posições extremas, sem quaisquer opções moderadas ou centristas
  - Não tem em conta as diferenças económicas entre as ideologias socialistas e capitalistas nas democracias modernas
  - Não distingue corretamente entre formas democráticas e autoritárias de estruturas de governo
explanation: |
  O capítulo afirma especificamente que o eixo esquerda-direita não pode acomodar o pensamento liberal clássico, que não se alinha nem com o igualitarismo da esquerda nem com o nacionalismo da direita
  igualitarismo da esquerda nem com o nacionalismo da direita. Este facto é ilustrado através de exemplos de figuras como Thomas Jefferson, Frédéric Bastiat e libertários contemporâneos
  libertários contemporâneos que não se enquadram em nenhuma das categorias. As outras opções, embora abordem as limitações dos espectros políticos, não captam a crítica específica
  a crítica específica feita no capítulo sobre a exclusão do liberalismo clássico deste quadro.
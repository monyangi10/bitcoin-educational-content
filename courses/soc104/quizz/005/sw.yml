question: Kulingana na sura hiyo, tatizo kuu la wigo wa kisiasa wa jadi wa kushoto-kulia ni lipi?
answer: Haiachi nafasi kwa mawazo ya kiliberali ya kitamaduni, ambayo hayaendani na usawa wa mrengo wa kushoto wala utaifa wa mrengo wa kulia
wrong_answers:
  - Inarahisisha siasa kupita kiasi kwa kuwa na misimamo miwili mikali bila chaguzi zozote za wastani au za mrengo wa kati
  - Inashindwa kuelezea tofauti za kiuchumi kati ya itikadi za kijamaa na kibepari katika demokrasia za kisasa
  - Haitofautishi ipasavyo kati ya miundo ya kidemokrasia na ya kimabavu ya serikali
explanation: |
  Sura hiyo inasema haswa kwamba mhimili wa kushoto-kulia hauwezi kukubali mawazo ya kiliberali ya kitamaduni, ambayo hayaendani na usawa wa kushoto au utaifa wa kulia. Hii inaonyeshwa kupitia mifano ya watu kama Thomas Jefferson, Frédéric Bastiat, na wanaliberali wa kisasa ambao hawaendani vizuri katika kategoria yoyote. Chaguzi zingine, huku zikigusia mapungufu ya wigo wa kisiasa, hazionyeshi ukosoaji maalum uliotolewa katika sura hiyo kuhusu uliberali wa kitamaduni kutengwa kutoka kwa mfumo huu.
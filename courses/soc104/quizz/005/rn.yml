question: Dushingiye ku kigabane, ni ikihe kibazo nyamukuru kiri mu bijanye n’imirongo ya politike y’ububamfu n’iburyo?
answer: Nta kibanza bisiga ku vyiyumviro vya kera vy’ubwigenge, ivyo bikaba bidahuye n’uburinganire bw’abanyabumoso canke n’abanyagihugu b’iburyo .
wrong_answers:
  - Birorosha cane politike mu kugira gusa ivyicaro bibiri birengeje urugero ata mahitamwo y’uburinganire canke y’uburinganire .
  - Ntibishobora gusobanura itandukaniro ry'ubutunzi hagati y'ingengabitekerezo y'abanyagihugu n'abanyagihugu mu bihugu vya demokarasi vya none .
  - Ntibitandukanya neza uburyo bwa demokarasi n'ubutegetsi bw'agahomerabunwa .
explanation: |
  Ico gice kivuga canecane ko umurongo w’ibubamfu n’iburyo udashobora kwakira ivyiyumviro vya kera vy’ubwigenge, ivyo bikaba bidahuye n’ivy’uburinganire . 
  y’ibubamfu canke ubunyagihugu bw’iburyo. Ivyo birerekanwa n’ingero z’abantu nka Thomas Jefferson, Frédéric Bastiat be n’abo mu gihe cacu . 
  aba libertarians badashobora kuja neza muri ivyo bibiri. Ibindi bihitamwo, naho bikora ku mupaka w’imirongo ya politike, ntibifata ivyihariye 
  n’ivyo gunegura vyakozwe mu kigabane kivuga ku kwidegemvya kwa kera gukurwa muri iyo nzira.
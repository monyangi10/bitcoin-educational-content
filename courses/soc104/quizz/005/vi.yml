question: Theo chương này, vấn đề chính của phổ chính trị tả-hữu truyền thống là gì?
answer: Nó không dành chỗ cho tư tưởng tự do cổ điển, vốn không phù hợp với chủ nghĩa bình đẳng cánh tả cũng như chủ nghĩa dân tộc cánh hữu.
wrong_answers:
  - Nó đơn giản hóa chính trị quá mức bằng cách chỉ có hai lập trường cực đoan mà không có bất kỳ lựa chọn ôn hòa hay trung dung nào.
  - Nó không tính đến sự khác biệt về kinh tế giữa các hệ tư tưởng xã hội chủ nghĩa và tư bản chủ nghĩa trong các nền dân chủ hiện đại.
  - Nó không phân biệt rõ ràng giữa các hình thức chính phủ dân chủ và chuyên chế.
explanation: |
  Chương này nêu rõ rằng trục tả-hữu không thể bao hàm tư tưởng tự do cổ điển, vốn không phù hợp với chủ nghĩa bình đẳng của cánh tả hay chủ nghĩa dân tộc của cánh hữu. Điều này được minh họa bằng các ví dụ về những nhân vật như Thomas Jefferson, Frédéric Bastiat và những người theo chủ nghĩa tự do đương đại, những người không hoàn toàn phù hợp với một trong hai phạm trù. Các lựa chọn khác, mặc dù đề cập đến những hạn chế của các phổ chính trị, nhưng không thể hiện được sự phê phán cụ thể được đưa ra trong chương về việc chủ nghĩa tự do cổ điển bị loại trừ khỏi khuôn khổ này.
question: Amerikan geleneksel muhafazakârlığını toplumsal değişime yaklaşımı bakımından Avrupa'daki 19. yüzyıl muhafazakârlığından ayıran nedir?
answer: Amerikan geleneksel muhafazakârlığı bireysel özgürlüğü sorumlulukla dengeleyen düzenli bir özgürlük arayışındayken, Avrupa muhafazakârlığı feodal topluma dönüşü savunmuştur
wrong_answers:
  - Amerikan geleneksel muhafazakârlığı sınırsız bireysel özgürlüğü teşvik ederken, Avrupa muhafazakârlığı hayatın her alanında sıkı devlet kontrolünü vurgulamıştır
  - Amerikan geleneksel muhafazakârlığı yeni kurumlar oluşturmak için devrimci değişimi desteklerken, Avrupa muhafazakârlığı mevcut demokratik yapıları korudu
  - Amerikan geleneksel muhafazakârlığı her türlü piyasa ekonomisini reddederken, Avrupa muhafazakârlığı endüstriyel kapitalizmi ve teknolojik ilerlemeyi tamamen benimsemiştir
explanation: |
  Temel fark, zamansal yönelimleri ve felsefi yaklaşımlarında yatmaktadır. Amerikan geleneksel muhafazakarlığı, bireysel istekleri toplumun ihtiyaçlarıyla uzlaştırmak için 'düzenli özgürlük' kavramını geliştirmiş ve gerileme yerine denge arayışına girmiştir. Buna karşılık, 19. yüzyıl Avrupalı muhafazakârlar açıkça gericiydi ve modern toplumdan tamamen kaçıp sanayi öncesi feodal, tarımsal ve zanaatkâr yapılara geri dönmek istiyorlardı.
  Bilimsel ve teknolojik ilerlemeyi temelde zararlı olarak görürken, Amerikan muhafazakârları moderniteye uyum sağlarken değerli gelenekleri korumaya çalışmıştır.
question: What distinguishes American traditional conservatism from European 19th-century conservatism in their approach to societal change?
answer: American traditional conservatism seeks ordered liberty balancing individual freedom with responsibility, while European conservatism advocated returning to feudal society
wrong_answers:
  - American traditional conservatism promotes unlimited individual freedom, while European conservatism emphasized strict government control over all aspects of life
  - American traditional conservatism supports revolutionary change to establish new institutions, while European conservatism maintained existing democratic structures
  - American traditional conservatism rejects all forms of market economy, while European conservatism fully embraced industrial capitalism and technological progress
explanation: |
  The key difference lies in their temporal orientation and philosophical approach. American traditional conservatism developed the concept of 'ordered liberty' to reconcile individual aspirations with community needs, seeking balance rather than regression. In contrast, 19th-century European conservatives were explicitly reactionary, wanting to escape modern society entirely and return to pre-industrial feudal, agricultural, and artisanal structures. They viewed scientific and technological progress as fundamentally harmful, while American conservatives sought to preserve valuable traditions while adapting to modernity.
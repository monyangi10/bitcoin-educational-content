question: Wat onderscheidt het Amerikaanse traditionele conservatisme van het Europese 19e-eeuwse conservatisme in hun benadering van maatschappelijke verandering?
answer: Het Amerikaanse traditionele conservatisme streeft naar een geordende vrijheid die individuele vrijheid in evenwicht brengt met verantwoordelijkheid, terwijl het Europese conservatisme een terugkeer naar de feodale samenleving voorstond
wrong_answers:
  - Het Amerikaanse traditionele conservatisme bevordert onbeperkte individuele vrijheid, terwijl het Europese conservatisme de nadruk legt op strikte overheidscontrole over alle aspecten van het leven
  - Het Amerikaanse traditionele conservatisme steunt revolutionaire veranderingen om nieuwe instellingen op te richten, terwijl het Europese conservatisme de bestaande democratische structuren in stand houdt
  - Het Amerikaanse traditionele conservatisme verwerpt alle vormen van markteconomie, terwijl het Europese conservatisme het industriële kapitalisme en de technologische vooruitgang volledig omarmt
explanation: |
  Het belangrijkste verschil ligt in hun tijdsoriëntatie en filosofische benadering. Het Amerikaanse traditionele conservatisme ontwikkelde het concept van 'geordende vrijheid' om individuele aspiraties in overeenstemming te brengen met de behoeften van de gemeenschap, waarbij gezocht werd naar evenwicht in plaats van achteruitgang. Daarentegen waren 19e-eeuwse Europese conservatieven expliciet reactionair, wilden ze volledig ontsnappen aan de moderne samenleving en terugkeren naar pre-industriële feodale, agrarische en ambachtelijke structuren.
  Zij zagen wetenschappelijke en technologische vooruitgang als fundamenteel schadelijk, terwijl Amerikaanse conservatieven waardevolle tradities wilden behouden en zich tegelijkertijd wilden aanpassen aan de moderniteit.
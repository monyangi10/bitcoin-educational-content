question: چه چیزی محافظه‌کاری سنتی آمریکایی را از محافظه‌کاری قرن نوزدهم اروپا در رویکردشان به تغییرات اجتماعی متمایز می‌کند؟
answer: محافظه‌کاری سنتی آمریکایی به دنبال آزادی منظم است که آزادی فردی را با مسئولیت‌پذیری متعادل می‌کند، در حالی که محافظه‌کاری اروپایی بازگشت به جامعه فئودالی را ترویج می‌کرد.
wrong_answers:
  - محافظه‌کاری سنتی آمریکایی آزادی فردی نامحدود را ترویج می‌کند، در حالی که محافظه‌کاری اروپایی بر کنترل شدید دولت بر همه جنبه‌های زندگی تأکید داشت.
  - محافظه‌کاری سنتی آمریکایی از تغییرات انقلابی برای ایجاد نهادهای جدید حمایت می‌کند، در حالی که محافظه‌کاری اروپایی ساختارهای دموکراتیک موجود را حفظ می‌کرد.
  - محافظه‌کاری سنتی آمریکایی همه اشکال اقتصاد بازار را رد می‌کند، در حالی که محافظه‌کاری اروپایی به طور کامل سرمایه‌داری صنعتی و پیشرفت تکنولوژیکی را پذیرفته است.
explanation: |
  تفاوت اصلی در جهت‌گیری زمانی و رویکرد فلسفی آن‌ها نهفته است. محافظه‌کاری سنتی آمریکایی مفهوم «آزادی منظم» را برای آشتی دادن آرزوهای فردی با نیازهای جامعه توسعه داد و به دنبال تعادل بود نه بازگشت. در مقابل، محافظه‌کاران اروپایی قرن نوزدهم به‌طور صریح واکنشی بودند و می‌خواستند به‌طور کامل از جامعه مدرن فرار کنند و به ساختارهای فئودالی، کشاورزی و صنعتی پیشا‌صنعتی بازگردند. آن‌ها پیشرفت علمی و فناوری را ذاتاً مضر می‌دانستند، در حالی که محافظه‌کاران آمریکایی به دنبال حفظ سنت‌های ارزشمند در عین تطبیق با مدرنیته بودند.
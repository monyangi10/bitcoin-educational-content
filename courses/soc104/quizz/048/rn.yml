question: Ni igiki gitandukanya ubuhinga bwo gukingira imigenzo y’Abanyamerika n’ubuhinga bwo gukingira ivy’i Buraya bwo mu kinjana ca 19 mu buryo bafata ibintu mu guhindura ikibano?
answer: Ubuhinga bwa kera bw’Abanyamerika burondera umwidegemvyo utegekanijwe ugereranije umwidegemvyo w’umuntu ku giti ciwe n’inshingano, mu gihe ubuhinga bw’Abanyaburaya bwari bushigikira ko umuntu asubira mu kibano c’abanyagihugu .
wrong_answers:
  - Ivyiyumviro vy’imigenzo y’Abanyamerika vy’ugukingira ivy’imigenzo biratera imbere umwidegemvyo w’umuntu ku giti ciwe utagira aho ugarukira, mu gihe ivy’ugukingira ivy’imigenzo y’Abanyaburaya vyashimika ku kugenzura bikomeye kwa leta imice yose y’ubuzima .
  - Ubuhinga bwa kera bw’Abanyamerika burashigikira ihinduka ry’impinduka kugira ngo hashingwe inzego nshasha, mu gihe ubuhinga bwa kera bw’Abanyaburaya bwagumye bufise imibumbe ya demokarasi yariho .
  - Ubuhinga bwa kera bw’Abanyamerika buranka ubwoko bwose bw’ubutunzi bw’isoko, mu gihe ubuhinga bw’Abanyaburaya bwakiriye bimwe bishitse ubutunzi bw’inganda n’iterambere ry’ubuhinga .
explanation: |
  Itandukaniro nyamukuru riri mu bijanye n’ingene bafata ibintu mu bijanye n’igihe be n’ingene bafata ibintu mu buryo bwa filozofiya. Ubuhinga bwo gukingira imigenzo y’Abanyamerika bwateye imbere iciyumviro c’‘umwidegemvyo utegekanijwe’ kugira ngo buhuze ivyipfuzo vy’umuntu ku giti ciwe n’ivyo umuryango ukeneye, burondera uburinganire aho gusubira inyuma. Mu buryo butandukanye n’ubwo, Abanyaburaya bo mu kinjana ca 19 bari bafise ivyiyumviro bitari vyo, bashaka guhunga burundu ikibano ca none bagasubira mu mibumbe y’ubufederali, uburimyi n’ubuhinga bwa kera bwariho imbere y’amahinguriro. 
  Babona ko ugutera imbere mu vya siyansi no mu vy’ubuhinga bwa none ari ikintu kibi cane, mu gihe Abanyamerika b’abanyaruyeri barondera kuzigama imigenzo y’agaciro mu gihe bariko barahuza n’ivyo muri iki gihe.
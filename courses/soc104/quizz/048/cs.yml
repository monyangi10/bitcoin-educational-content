question: Čím se liší americký tradiční konzervatismus od evropského konzervatismu 19. století v přístupu ke společenským změnám?
answer: Americký tradiční konzervatismus usiluje o spořádanou svobodu vyvažující individuální svobodu a odpovědnost, zatímco evropský konzervatismus prosazoval návrat k feudální společnosti
wrong_answers:
  - Americký tradiční konzervatismus prosazuje neomezenou svobodu jednotlivce, zatímco evropský konzervatismus klade důraz na přísnou kontrolu vlády nad všemi aspekty života
  - Americký tradiční konzervatismus podporuje revoluční změny s cílem vytvořit nové instituce, zatímco evropský konzervatismus zachovává stávající demokratické struktury
  - Americký tradiční konzervatismus odmítá všechny formy tržního hospodářství, zatímco evropský konzervatismus plně přijal průmyslový kapitalismus a technologický pokrok
explanation: |
  Hlavní rozdíl spočívá v jejich časové orientaci a filozofickém přístupu. Americký tradiční konzervatismus vytvořil koncept "uspořádané svobody", aby sladil individuální aspirace s potřebami společnosti a hledal spíše rovnováhu než regresi. Naproti tomu evropští konzervativci 19. století byli vysloveně reakční a chtěli zcela uniknout moderní společnosti a vrátit se k předindustriálním feudálním, zemědělským a řemeslnickým strukturám.
  Vědecký a technický pokrok považovali za zásadně škodlivý, zatímco američtí konzervativci se snažili zachovat cenné tradice a zároveň se přizpůsobit modernitě.
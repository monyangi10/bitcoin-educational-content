question: Was unterscheidet den traditionellen amerikanischen Konservatismus vom europäischen Konservatismus des 19. Jahrhunderts in Bezug auf seine Einstellung zum gesellschaftlichen Wandel?
answer: Der traditionelle amerikanische Konservatismus strebt eine geordnete Freiheit an, die individuelle Freiheit und Verantwortung in Einklang bringt, während der europäische Konservatismus für eine Rückkehr zur feudalen Gesellschaft eintritt
wrong_answers:
  - Der traditionelle amerikanische Konservatismus fördert die uneingeschränkte Freiheit des Einzelnen, während der europäische Konservatismus eine strenge staatliche Kontrolle über alle Aspekte des Lebens betont
  - Der traditionelle amerikanische Konservatismus unterstützt revolutionäre Veränderungen zur Schaffung neuer Institutionen, während der europäische Konservatismus die bestehenden demokratischen Strukturen beibehält
  - Der traditionelle amerikanische Konservatismus lehnt alle Formen der Marktwirtschaft ab, während der europäische Konservatismus den industriellen Kapitalismus und den technologischen Fortschritt uneingeschränkt begrüßt
explanation: |
  Der Hauptunterschied liegt in ihrer zeitlichen Ausrichtung und ihrem philosophischen Ansatz. Der traditionelle amerikanische Konservatismus entwickelte das Konzept der "geordneten Freiheit", um die individuellen Bestrebungen mit den Bedürfnissen der Gemeinschaft in Einklang zu bringen, und strebte eher ein Gleichgewicht als eine Regression an. Im Gegensatz dazu waren die europäischen Konservativen des 19. Jahrhunderts ausdrücklich reaktionär und wollten der modernen Gesellschaft vollständig entkommen und zu vorindustriellen feudalen, landwirtschaftlichen und handwerklichen Strukturen zurückkehren.
  Sie betrachteten den wissenschaftlichen und technischen Fortschritt als grundsätzlich schädlich, während die amerikanischen Konservativen danach strebten, wertvolle Traditionen zu bewahren und sich gleichzeitig an die Moderne anzupassen.
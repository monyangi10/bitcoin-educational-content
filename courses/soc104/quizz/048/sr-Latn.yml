question: Šta razlikuje američki tradicionalni konzervatizam od evropskog konzervatizma 19. veka u njihovom pristupu društvenim promenama?
answer: Američki tradicionalni konzervativizam teži ka uređenoj slobodi koja balansira individualnu slobodu sa odgovornošću, dok je evropski konzervativizam zagovarao povratak feudalnom društvu.
wrong_answers:
  - Američki tradicionalni konzervativizam promoviše neograničenu individualnu slobodu, dok evropski konzervativizam naglašava strogu kontrolu vlade nad svim aspektima života.
  - Američki tradicionalni konzervativizam podržava revolucionarne promene za uspostavljanje novih institucija, dok je evropski konzervativizam održavao postojeće demokratske strukture.
  - Američki tradicionalni konzervativizam odbacuje sve oblike tržišne ekonomije, dok je evropski konzervativizam u potpunosti prihvatio industrijski kapitalizam i tehnološki napredak.
explanation: |
  Ključna razlika leži u njihovoj vremenskoj orijentaciji i filozofskom pristupu. Američki tradicionalni konzervativizam razvio je koncept 'uređene slobode' kako bi pomirio individualne težnje sa potrebama zajednice, tražeći ravnotežu umesto regresije. Nasuprot tome, evropski konzervativci iz 19. veka bili su eksplicitno reakcionarni, želeći da potpuno pobegnu od modernog društva i vrate se na predindustrijske feudalne, poljoprivredne i zanatske strukture. 
  Oni su naučni i tehnološki napredak smatrali suštinski štetnim, dok su američki konzervativci nastojali da očuvaju vredne tradicije dok se prilagođavaju modernosti.
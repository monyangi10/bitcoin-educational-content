question: Mikä erottaa amerikkalaisen perinteisen konservatismin eurooppalaisesta 1800-luvun konservatismista siinä, miten se suhtautuu yhteiskunnallisiin muutoksiin?
answer: Amerikkalainen perinteinen konservatismi pyrkii järjestäytyneeseen vapauteen, jossa yksilön vapaus ja vastuu ovat tasapainossa, kun taas eurooppalainen konservatismi kannatti paluuta feodaaliseen yhteiskuntaan
wrong_answers:
  - Amerikkalainen perinteinen konservatismi edistää rajoittamatonta yksilönvapautta, kun taas eurooppalainen konservatismi korostaa tiukkaa hallituksen valvontaa kaikilla elämän osa-alueilla
  - Amerikkalainen perinteinen konservatismi tukee vallankumouksellista muutosta uusien instituutioiden luomiseksi, kun taas eurooppalainen konservatismi säilytti olemassa olevat demokraattiset rakenteet
  - Amerikkalainen perinteinen konservatismi torjuu kaikenlaisen markkinatalouden, kun taas eurooppalainen konservatismi hyväksyi täysin teollisen kapitalismin ja teknisen kehityksen
explanation: |
  Keskeinen ero on niiden ajallisessa suuntautumisessa ja filosofisessa lähestymistavassa. Amerikkalainen perinteinen konservatismi kehitti "järjestäytyneen vapauden" käsitteen, jonka tarkoituksena on sovittaa yhteen yksilön pyrkimykset ja yhteisön tarpeet ja pyrkiä tasapainoon taantuman sijaan. Sitä vastoin 1800-luvun eurooppalaiset konservatiivit olivat nimenomaan taantumuksellisia, sillä he halusivat paeta modernia yhteiskuntaa kokonaan ja palata esiteolliseen feodaaliseen, maatalous- ja käsityöläisrakenteeseen.
  He pitivät tieteellistä ja teknistä kehitystä pohjimmiltaan vahingollisena, kun taas amerikkalaiset konservatiivit pyrkivät säilyttämään arvokkaat perinteet ja sopeutumaan samalla nykyaikaan.
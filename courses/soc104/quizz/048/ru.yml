question: Что отличает американский традиционный консерватизм от европейского консерватизма XIX века в их подходе к общественным изменениям?
answer: Американский традиционный консерватизм стремится к упорядоченной свободе, уравновешивающей индивидуальную свободу и ответственность, в то время как европейский консерватизм выступал за возвращение к феодальному обществу
wrong_answers:
  - Американский традиционный консерватизм пропагандирует неограниченную свободу личности, в то время как европейский консерватизм подчеркивает строгий государственный контроль над всеми аспектами жизни
  - Американский традиционный консерватизм поддерживает революционные изменения для создания новых институтов, в то время как европейский консерватизм поддерживает существующие демократические структуры
  - Американский традиционный консерватизм отвергает все формы рыночной экономики, в то время как европейский консерватизм полностью принял промышленный капитализм и технический прогресс
explanation: |
  Ключевое различие заключается в их временной ориентации и философском подходе. Американский традиционный консерватизм разработал концепцию "упорядоченной свободы", чтобы примирить индивидуальные устремления с потребностями общества, стремясь к балансу, а не к регрессу. В отличие от них, европейские консерваторы XIX века были откровенно реакционными, желая полностью избавиться от современного общества и вернуться к доиндустриальным феодальным, сельскохозяйственным и ремесленным структурам.
  Они считали научно-технический прогресс в корне вредным, в то время как американские консерваторы стремились сохранить ценные традиции, приспосабливаясь к современности.
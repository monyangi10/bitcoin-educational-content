question: Cosa distingue il conservatorismo tradizionale americano dal conservatorismo europeo del XIX secolo nel loro approccio al cambiamento della società?
answer: Il conservatorismo tradizionale americano cerca una libertà ordinata che bilanci la libertà individuale con la responsabilità, mentre il conservatorismo europeo auspicava il ritorno alla società feudale
wrong_answers:
  - Il conservatorismo tradizionale americano promuove la libertà individuale illimitata, mentre il conservatorismo europeo enfatizza il rigido controllo del governo su tutti gli aspetti della vita
  - Il conservatorismo tradizionale americano sostiene il cambiamento rivoluzionario per creare nuove istituzioni, mentre il conservatorismo europeo ha mantenuto le strutture democratiche esistenti
  - Il conservatorismo tradizionale americano rifiuta ogni forma di economia di mercato, mentre il conservatorismo europeo ha abbracciato pienamente il capitalismo industriale e il progresso tecnologico
explanation: |
  La differenza fondamentale sta nell'orientamento temporale e nell'approccio filosofico. Il conservatorismo tradizionale americano ha sviluppato il concetto di "libertà ordinata" per conciliare le aspirazioni individuali con le esigenze della comunità, cercando l'equilibrio piuttosto che la regressione. Al contrario, i conservatori europei del XIX secolo erano esplicitamente reazionari e volevano sfuggire completamente alla società moderna per tornare alle strutture feudali, agricole e artigianali preindustriali.
  Consideravano il progresso scientifico e tecnologico come fondamentalmente dannoso, mentre i conservatori americani cercavano di preservare le preziose tradizioni adattandosi alla modernità.
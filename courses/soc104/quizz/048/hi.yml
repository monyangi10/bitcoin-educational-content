question: सामाजिक परिवर्तन के प्रति अपने दृष्टिकोण में अमेरिकी पारंपरिक रूढ़िवाद और 19वीं सदी के यूरोपीय रूढ़िवाद में क्या अंतर है?
answer: अमेरिकी पारंपरिक रूढ़िवाद व्यक्तिगत स्वतंत्रता और उत्तरदायित्व के बीच संतुलन बनाते हुए व्यवस्थित स्वतंत्रता की तलाश करता है, जबकि यूरोपीय रूढ़िवाद सामंती समाज में लौटने की वकालत करता है।
wrong_answers:
  - अमेरिकी पारंपरिक रूढ़िवाद असीमित व्यक्तिगत स्वतंत्रता को बढ़ावा देता है, जबकि यूरोपीय रूढ़िवाद जीवन के सभी पहलुओं पर सरकार के सख्त नियंत्रण पर जोर देता है।
  - अमेरिकी पारंपरिक रूढ़िवाद नए संस्थानों की स्थापना के लिए क्रांतिकारी परिवर्तन का समर्थन करता है, जबकि यूरोपीय रूढ़िवाद मौजूदा लोकतांत्रिक संरचनाओं को बनाए रखता है।
  - अमेरिकी पारंपरिक रूढ़िवाद बाजार अर्थव्यवस्था के सभी रूपों को अस्वीकार करता है, जबकि यूरोपीय रूढ़िवाद ने औद्योगिक पूंजीवाद और तकनीकी प्रगति को पूरी तरह से अपनाया।
explanation: |
  मुख्य अंतर उनके समय संबंधी दृष्टिकोण और दार्शनिक परिप्रेक्ष्य में निहित है। अमेरिकी पारंपरिक रूढ़िवाद ने व्यक्तिगत आकांक्षाओं और सामुदायिक आवश्यकताओं के बीच सामंजस्य स्थापित करने के लिए 'व्यवस्थित स्वतंत्रता' की अवधारणा विकसित की, जिसका उद्देश्य प्रतिगमन की बजाय संतुलन स्थापित करना था। इसके विपरीत, 19वीं सदी के यूरोपीय रूढ़िवादी स्पष्ट रूप से प्रतिक्रियावादी थे, जो आधुनिक समाज से पूरी तरह से छुटकारा पाना चाहते थे और पूर्व-औद्योगिक सामंती, कृषि और पारंपरिक शिल्प संरचनाओं की ओर लौटना चाहते थे।
  वे वैज्ञानिक और तकनीकी प्रगति को मौलिक रूप से हानिकारक मानते थे, जबकि अमेरिकी रूढ़िवादियों ने आधुनिकता के अनुकूल होते हुए मूल्यवान परंपराओं को संरक्षित करने का प्रयास किया।
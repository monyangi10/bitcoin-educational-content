question: Vad skiljer den amerikanska traditionella konservatismen från den europeiska 1800-talskonservatismen i synen på samhällsförändringar?
answer: Amerikansk traditionell konservatism strävar efter ordnad frihet som balanserar individuell frihet med ansvar, medan europeisk konservatism förespråkade en återgång till feodalsamhället
wrong_answers:
  - Amerikansk traditionell konservatism förespråkar obegränsad individuell frihet, medan europeisk konservatism betonar strikt statlig kontroll över alla aspekter av livet
  - Den amerikanska traditionella konservatismen stöder revolutionära förändringar för att etablera nya institutioner, medan den europeiska konservatismen bevarar befintliga demokratiska strukturer
  - Den amerikanska traditionella konservatismen förkastar alla former av marknadsekonomi, medan den europeiska konservatismen fullt ut omfamnade industriell kapitalism och tekniska framsteg
explanation: |
  Den viktigaste skillnaden ligger i deras tidsmässiga inriktning och filosofiska förhållningssätt. Den amerikanska traditionella konservatismen utvecklade begreppet "ordnad frihet" för att förena individuella strävanden med samhällets behov och eftersträvade balans snarare än tillbakagång. Däremot var 1800-talets europeiska konservativa uttryckligen reaktionära och ville helt och hållet undkomma det moderna samhället och återgå till förindustriella feodala, jordbruks- och hantverksmässiga strukturer.
  De betraktade vetenskapliga och tekniska framsteg som i grunden skadliga, medan de amerikanska konservativa försökte bevara värdefulla traditioner och samtidigt anpassa sig till moderniteten.
question: 社会の変化に対するアプローチにおいて、アメリカの伝統的保守主義とヨーロッパの19世紀の保守主義を区別するものは何か？
answer: アメリカの伝統的保守主義は、個人の自由と責任をバランスさせた秩序ある自由を追求し、ヨーロッパの保守主義は封建社会への回帰を主張した。
wrong_answers:
  - アメリカの伝統的な保守主義は個人の無制限の自由を促進し、ヨーロッパの保守主義は生活のあらゆる側面に対する政府の厳格な管理を強調した。
  - アメリカの伝統的保守主義は新しい制度を確立するための革命的変化を支持し、ヨーロッパの保守主義は既存の民主的構造を維持した。
  - アメリカの伝統的保守主義はあらゆる形態の市場経済を否定しているが、ヨーロッパの保守主義は産業資本主義と技術進歩を全面的に受け入れている。
explanation: |
  重要な違いは、その時間的方向性と哲学的アプローチにある。アメリカの伝統的保守主義は、個人の願望と共同体のニーズを調和させるために「秩序ある自由」という概念を発展させ、退行ではなく均衡を求めた。これとは対照的に、19世紀のヨーロッパの保守主義者たちは、近代社会から完全に脱却し、産業革命以前の封建的、農業的、職人的構造に戻ることを望む、露骨な反動主義者であった。
  彼らは科学技術の進歩を根本的に有害なものとみなしたが、アメリカの保守派は近代に適応しながらも価値ある伝統を守ろうとした。
question: 在对待社会变革的态度上，美国传统保守主义与欧洲 19 世纪保守主义有何不同？
answer: 美国传统保守主义追求有序的自由，平衡个人自由与责任，而欧洲保守主义则主张回到封建社会
wrong_answers:
  - 美国的传统保守主义提倡无限的个人自由，而欧洲的保守主义则强调政府对生活各个方面的严格控制
  - 美国的传统保守主义支持革命性变革，以建立新的体制，而欧洲的保守主义则维护现有的民主结构
  - 美国传统保守主义拒绝一切形式的市场经济，而欧洲保守主义则完全接受工业资本主义和技术进步
explanation: |
  关键的区别在于它们的时间取向和哲学方法。美国传统保守主义提出了 "有序自由 "的概念，以调和个人愿望与社会需求，寻求平衡而非倒退。与此相反，19 世纪的欧洲保守派则是明确的反动派，他们希望完全摆脱现代社会，回到工业革命前的封建、农业和手工业结构。
  他们认为科技进步从根本上是有害的，而美国的保守派则寻求在适应现代性的同时保留宝贵的传统。
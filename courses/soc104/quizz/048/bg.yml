question: С какво американският традиционен консерватизъм се отличава от европейския консерватизъм от XIX в. в подхода си към обществените промени?
answer: Американският традиционен консерватизъм се стреми към подредена свобода, балансираща индивидуалната свобода с отговорността, докато европейският консерватизъм се застъпва за връщане към феодалното общество
wrong_answers:
  - Американският традиционен консерватизъм насърчава неограничената индивидуална свобода, докато европейският консерватизъм набляга на строгия държавен контрол върху всички аспекти на живота
  - Американският традиционен консерватизъм подкрепя революционните промени за създаване на нови институции, докато европейският консерватизъм поддържа съществуващите демократични структури
  - Американският традиционен консерватизъм отхвърля всички форми на пазарна икономика, докато европейският консерватизъм изцяло приема индустриалния капитализъм и технологичния прогрес
explanation: |
  Основната разлика е във времевата им ориентация и философския им подход. Американският традиционен консерватизъм разработи концепцията за "подредена свобода", за да съчетае индивидуалните стремежи с нуждите на общността, търсейки баланс, а не регрес. За разлика от тях европейските консерватори от XIX в. са откровено реакционни, като искат да избягат изцяло от модерното общество и да се върнат към доиндустриалните феодални, земеделски и занаятчийски структури.
  Те разглеждат научно-техническия прогрес като фундаментално вреден, докато американските консерватори се стремят да запазят ценните традиции, като същевременно се адаптират към модерността.
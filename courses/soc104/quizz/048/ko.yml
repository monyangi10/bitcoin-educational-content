question: 사회 변화에 대한 접근 방식에서 미국의 전통적 보수주의와 19세기 유럽의 보수주의가 다른 점은 무엇일까요?
answer: 미국의 전통적 보수주의는 개인의 자유와 책임의 균형을 이루는 질서 있는 자유를 추구하는 반면, 유럽의 보수주의는 봉건 사회로의 회귀를 주장했습니다
wrong_answers:
  - 미국의 전통적인 보수주의는 개인의 무한한 자유를 장려하는 반면, 유럽의 보수주의는 삶의 모든 측면에 대한 정부의 엄격한 통제를 강조했습니다
  - 미국의 전통적 보수주의는 새로운 제도를 수립하기 위한 혁명적 변화를 지지하는 반면, 유럽의 보수주의는 기존의 민주적 구조를 유지했습니다
  - 미국의 전통적 보수주의는 모든 형태의 시장 경제를 거부하는 반면, 유럽의 보수주의는 산업 자본주의와 기술 진보를 완전히 수용했습니다
explanation: |
  핵심적인 차이점은 시간적 지향과 철학적 접근 방식에 있습니다. 미국의 전통적 보수주의는 개인의 열망과 공동체의 필요를 조화시키기 위해 '질서 있는 자유'라는 개념을 발전시켜 퇴행이 아닌 균형을 추구했습니다. 반면 19세기 유럽의 보수주의자들은 현대 사회에서 완전히 벗어나 산업화 이전의 봉건적, 농업적, 장인적 구조로 돌아가고자 하는 명백한 반동성을 띠었습니다.
  그들은 과학과 기술의 진보를 근본적으로 해로운 것으로 여긴 반면, 미국의 보수주의자들은 근대성에 적응하면서 소중한 전통을 보존하려고 노력했습니다.
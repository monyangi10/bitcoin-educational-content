question: ¿Qué distingue al conservadurismo tradicional estadounidense del conservadurismo europeo del siglo XIX en su enfoque del cambio social?
answer: El conservadurismo tradicional estadounidense busca una libertad ordenada que equilibre la libertad individual con la responsabilidad, mientras que el conservadurismo europeo abogaba por volver a la sociedad feudal
wrong_answers:
  - El conservadurismo tradicional estadounidense promueve la libertad individual ilimitada, mientras que el conservadurismo europeo hace hincapié en el estricto control gubernamental sobre todos los aspectos de la vida
  - El conservadurismo tradicional estadounidense apoya el cambio revolucionario para establecer nuevas instituciones, mientras que el conservadurismo europeo mantuvo las estructuras democráticas existentes
  - El conservadurismo tradicional estadounidense rechaza toda forma de economía de mercado, mientras que el conservadurismo europeo abrazó plenamente el capitalismo industrial y el progreso tecnológico
explanation: |
  La diferencia clave radica en su orientación temporal y su enfoque filosófico. El conservadurismo tradicional estadounidense desarrolló el concepto de "libertad ordenada" para conciliar las aspiraciones individuales con las necesidades de la comunidad, buscando el equilibrio y no la regresión. En cambio, los conservadores europeos del siglo XIX eran explícitamente reaccionarios, querían escapar por completo de la sociedad moderna y volver a las estructuras feudales, agrícolas y artesanales preindustriales.
  Consideraban que el progreso científico y tecnológico era fundamentalmente perjudicial, mientras que los conservadores estadounidenses pretendían preservar las tradiciones valiosas adaptándose a la modernidad.
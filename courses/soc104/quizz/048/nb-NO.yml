question: Hva skiller amerikansk tradisjonell konservatisme fra europeisk 1800-tallskonservatisme i deres tilnærming til samfunnsendringer?
answer: Den amerikanske tradisjonelle konservatismen søker en ordnet frihet som balanserer individuell frihet med ansvar, mens den europeiske konservatismen gikk inn for en tilbakevending til føydalsamfunnet
wrong_answers:
  - Amerikansk tradisjonell konservatisme fremmer ubegrenset individuell frihet, mens europeisk konservatisme legger vekt på streng statlig kontroll over alle aspekter av livet
  - Amerikansk tradisjonell konservatisme støtter revolusjonære endringer for å etablere nye institusjoner, mens europeisk konservatisme opprettholder eksisterende demokratiske strukturer
  - Den amerikanske tradisjonelle konservatismen avviser alle former for markedsøkonomi, mens den europeiske konservatismen omfavner industrikapitalismen og den teknologiske utviklingen fullt ut
explanation: |
  Hovedforskjellen ligger i deres tidsmessige orientering og filosofiske tilnærming. Den amerikanske tradisjonelle konservatismen utviklet begrepet "ordnet frihet" for å forene individuelle ambisjoner med samfunnets behov, og søkte balanse snarere enn regresjon. I kontrast til dette var 1800-tallets europeiske konservative eksplisitt reaksjonære, som ønsket å unnslippe det moderne samfunnet helt og holdent og vende tilbake til førindustrielle føydale, jordbruks- og håndverksmessige strukturer.
  De så på vitenskapelige og teknologiske fremskritt som grunnleggende skadelige, mens amerikanske konservative forsøkte å bevare verdifulle tradisjoner og samtidig tilpasse seg moderniteten.
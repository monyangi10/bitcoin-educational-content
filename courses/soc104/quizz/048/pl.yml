question: Co odróżnia amerykański tradycyjny konserwatyzm od europejskiego XIX-wiecznego konserwatyzmu w podejściu do zmian społecznych?
answer: Amerykański tradycyjny konserwatyzm dąży do uporządkowanej wolności, równoważąc indywidualną wolność z odpowiedzialnością, podczas gdy europejski konserwatyzm opowiadał się za powrotem do społeczeństwa feudalnego
wrong_answers:
  - Amerykański tradycyjny konserwatyzm promuje nieograniczoną wolność jednostki, podczas gdy europejski konserwatyzm kładzie nacisk na ścisłą kontrolę rządu nad wszystkimi aspektami życia
  - Amerykański tradycyjny konserwatyzm wspiera rewolucyjne zmiany w celu ustanowienia nowych instytucji, podczas gdy europejski konserwatyzm utrzymuje istniejące struktury demokratyczne
  - Amerykański tradycyjny konserwatyzm odrzuca wszelkie formy gospodarki rynkowej, podczas gdy europejski konserwatyzm w pełni zaakceptował kapitalizm przemysłowy i postęp technologiczny
explanation: |
  Kluczowa różnica leży w ich orientacji czasowej i podejściu filozoficznym. Amerykański tradycyjny konserwatyzm rozwinął koncepcję "uporządkowanej wolności", aby pogodzić indywidualne aspiracje z potrzebami społeczności, dążąc raczej do równowagi niż regresji. Z kolei dziewiętnastowieczni europejscy konserwatyści byli wyraźnie reakcyjni, chcąc całkowicie uciec od nowoczesnego społeczeństwa i powrócić do przedindustrialnych struktur feudalnych, rolniczych i rzemieślniczych.
  Postrzegali oni postęp naukowy i technologiczny jako zasadniczo szkodliwy, podczas gdy amerykańscy konserwatyści starali się zachować cenne tradycje, jednocześnie dostosowując się do nowoczesności.
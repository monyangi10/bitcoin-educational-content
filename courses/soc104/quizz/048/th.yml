question: อะไรที่ทำให้อนุรักษนิยมแบบดั้งเดิมของอเมริกาแตกต่างจากอนุรักษนิยมในศตวรรษที่ 19 ของยุโรปในแนวทางการเปลี่ยนแปลงทางสังคม?
answer: อนุรักษนิยมแบบดั้งเดิมของอเมริกามุ่งเน้นเสรีภาพที่มีระเบียบ โดยการสร้างสมดุลระหว่างเสรีภาพส่วนบุคคลกับความรับผิดชอบ ในขณะที่อนุรักษนิยมของยุโรปสนับสนุนการกลับไปสู่สังคมศักดินา
wrong_answers:
  - ลัทธิอนุรักษนิยมแบบดั้งเดิมของอเมริกาส่งเสริมเสรีภาพส่วนบุคคลอย่างไม่จำกัด ในขณะที่ลัทธิอนุรักษนิยมของยุโรปเน้นการควบคุมของรัฐบาลอย่างเข้มงวดในทุกด้านของชีวิต
  - ลัทธิอนุรักษนิยมแบบดั้งเดิมของอเมริกันสนับสนุนการเปลี่ยนแปลงเชิงปฏิวัติเพื่อสร้างสถาบันใหม่ ในขณะที่ลัทธิอนุรักษนิยมของยุโรปรักษาโครงสร้างประชาธิปไตยที่มีอยู่
  - ลัทธิอนุรักษนิยมแบบดั้งเดิมของอเมริกาปฏิเสธรูปแบบเศรษฐกิจตลาดทั้งหมด ในขณะที่ลัทธิอนุรักษนิยมของยุโรปยอมรับทุนนิยมอุตสาหกรรมและความก้าวหน้าทางเทคโนโลยีอย่างเต็มที่
explanation: |
  ความแตกต่างที่สำคัญอยู่ที่การมุ่งเน้นทางเวลาและแนวทางปรัชญาของพวกเขา อนุรักษ์นิยมแบบดั้งเดิมของอเมริกาได้พัฒนาความคิดเรื่อง 'เสรีภาพที่มีระเบียบ' เพื่อประสานความปรารถนาของปัจเจกบุคคลกับความต้องการของชุมชน โดยมุ่งหาความสมดุลแทนที่จะถอยหลัง ในทางตรงกันข้าม อนุรักษ์นิยมยุโรปในศตวรรษที่ 19 มีลักษณะเป็นปฏิกิริยาอย่างชัดเจน ต้องการหลีกหนีจากสังคมสมัยใหม่โดยสิ้นเชิงและกลับไปสู่โครงสร้างศักดินา เกษตรกรรม และช่างฝีมือก่อนยุคอุตสาหกรรม พวกเขามองว่าความก้าวหน้าทางวิทยาศาสตร์และเทคโนโลยีเป็นอันตรายโดยพื้นฐาน ในขณะที่อนุรักษ์นิยมอเมริกันพยายามรักษาประเพณีที่มีคุณค่าไว้ในขณะที่ปรับตัวให้เข้ากับความทันสมัย
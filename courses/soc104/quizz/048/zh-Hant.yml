question: 美國傳統保守主義與歐洲 19 世紀保守主義在處理社會變革的方式上有何差異？
answer: 美國傳統保守主義追求有秩序的自由，平衡個人自由與責任，而歐洲保守主義則主張回到封建社會。
wrong_answers:
  - 美國的傳統保守主義提倡無限制的個人自由，而歐洲的保守主義則強調政府對生活各方面的嚴格控制
  - 美國的傳統保守主義支持革命性的改變，以建立新的制度，而歐洲的保守主義則維持現有的民主結構
  - 美國傳統保守主義拒絕一切形式的市場經濟，而歐洲保守主義則完全擁護工業資本主義和技術進步
explanation: |
  關鍵的差異在於他們的時間取向和哲學方法。美國傳統保守主義發展出「有秩序的自由」概念，以調和個人願望與社會需求，尋求平衡而非倒退。相反地，19 世紀的歐洲保守主義者顯然是反動的，他們想要完全擺脫現代社會，回到前工業時代的封建、農業與工匠結構。
  他們認為科學與技術的進步根本上是有害的，而美國的保守派則尋求在適應現代化的同時保留有價值的傳統。
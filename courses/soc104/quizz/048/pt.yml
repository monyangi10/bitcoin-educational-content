question: O que distingue o conservadorismo tradicional americano do conservadorismo europeu do século XIX na sua abordagem à mudança social?
answer: O conservadorismo tradicional americano procura uma liberdade ordenada que equilibre a liberdade individual com a responsabilidade, enquanto o conservadorismo europeu defende o regresso à sociedade feudal
wrong_answers:
  - O conservadorismo tradicional americano promove a liberdade individual ilimitada, enquanto o conservadorismo europeu enfatiza o controlo rigoroso do governo sobre todos os aspectos da vida
  - O conservadorismo tradicional americano apoia a mudança revolucionária para estabelecer novas instituições, enquanto o conservadorismo europeu mantém as estruturas democráticas existentes
  - O conservadorismo tradicional americano rejeita todas as formas de economia de mercado, enquanto o conservadorismo europeu abraçou plenamente o capitalismo industrial e o progresso tecnológico
explanation: |
  A principal diferença reside na sua orientação temporal e abordagem filosófica. O conservadorismo tradicional americano desenvolveu o conceito de "liberdade ordenada" para conciliar as aspirações individuais com as necessidades da comunidade, procurando o equilíbrio e não a regressão. Em contraste, os conservadores europeus do século XIX eram explicitamente reacionários, querendo escapar completamente à sociedade moderna e regressar às estruturas feudais, agrícolas e artesanais pré-industriais.
  Encaravam o progresso científico e tecnológico como fundamentalmente prejudicial, enquanto os conservadores americanos procuravam preservar tradições valiosas e adaptar-se à modernidade.
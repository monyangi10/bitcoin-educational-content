question: В чем принципиальная разница между либертарианцами и либертарианцами в отношении собственности и экономической организации?
answer: Либертарианцы защищают частную собственность как необходимое условие индивидуальной свободы, в то время как либертарианцы считают собственность кражей и поддерживают коллективные экономические модели
wrong_answers:
  - Обе группы поддерживают частную собственность, но расходятся во мнении о роли государственного регулирования в ее защите
  - Либертарианцы поддерживают частную собственность с государственной защитой, в то время как либертарианцы предпочитают собственность без каких-либо правовых рамок
  - Оба отвергают частную собственность, но либертарианцы предпочитают рыночный социализм, а либертарианцы - государственный социализм
explanation: |
  В главе ясно показано, что либертарианцы рассматривают частную собственность как единственный способ обеспечения индивидуальной свободы, в то время как либертарианцы,
  пришедшие из анархо-социалистической традиции, следуют принципу Прудона, что "собственность - это кража Либертарианцы поддерживают альтернативные экономические модели, такие как мутуализм, коллективизм или либертарный коммунизм, в корне противостоящие капиталистическим структурам. Это представляет собой основной идеологический разрыв между этими двумя политическими философиями, которые часто путают из-за схожей терминологии.
question: Ni itandukaniro irihe ry’ishimikiro riri hagati y’abaharanira umwidegemvyo n’abaharanira umwidegemvyo ku bijanye n’itunga n’imitunganirize y’ubutunzi?
answer: Abaharanira umwidegemvyo barwanira umutungo w’umuntu ku giti ciwe nk’ingenzi ku mwidegemvyo w’umuntu ku giti ciwe, mu gihe abaharanira umwidegemvyo babona ko umutungo ari ubusuma kandi bagashigikira ivyitegererezo vy’ubutunzi rusangi .
wrong_answers:
  - Iyo mitwe yompi irashigikira umutungo w’abantu ku giti cabo ariko iratandukanye ku ruhara rw’amategeko ya Leta mu kuwukingira .
  - Abanyagihugu b’abanyagihugu bashigikiye umutungo w’abantu ku giti cabo ukingiwe na Leta, mu gihe abanyagihugu b’abanyagihugu bakunda umutungo utagira amategeko .
  - Bompi banse umutungo w'abantu ariko abaharanira umwidegemvyo bakunda ubusosiyalisimu bw'isoko mu gihe abaharanira umwidegemvyo bakunda ubusosiyalisimu bwa Leta .
explanation: |
  Ico gice gishingira intahe neza ko abaharanira umwidegemvyo babona ko umutungo w’umuntu ku giti ciwe ari wo buryo bwonyene bwo kuronka umwidegemvyo w’umuntu ku giti ciwe, mu gihe abaharanira umwidegemvyo, 
  biva mu migenzo y’abanyagihugu b’abanyagitugu, bakurikize ingingo ngenderwako y’uko ‘itunga ari ubusuma Abanyagihugu b’abanyagihugu bashigikira ubundi buryo bw’ubutunzi nk’ubumwe, ubumwe, canke ubukomunisimu bw’ubwigenge, mu vy’ukuri barwanya imibumbe y’abanyagihugu. Ivyo bigereranya amacakubiri nyamukuru y’ingengabitekerezo hagati y’izo filozofiya zibiri za politike zikunda gutera urujijo kubera amajambo asa.
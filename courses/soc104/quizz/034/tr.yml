question: Mülkiyet ve ekonomik örgütlenme konusunda liberteryenler ve libertairler arasındaki temel fark nedir?
answer: Liberteryenler özel mülkiyetin bireysel özgürlük için gerekli olduğunu savunurken, liberteryenler mülkiyeti hırsızlık olarak görür ve kolektif ekonomik modelleri destekler
wrong_answers:
  - Her iki grup da özel mülkiyeti desteklemekte ancak bunun korunmasında hükümet düzenlemelerinin rolü konusunda farklılık göstermektedir
  - Liberterler devlet koruması altında özel mülkiyeti desteklerken, liberteryenler herhangi bir yasal çerçeve olmaksızın mülkiyeti tercih ederler
  - Her ikisi de özel mülkiyeti reddeder ancak liberteryenler piyasa sosyalizmini, liberteryenler ise devlet sosyalizmini tercih eder
explanation: |
  Bu bölüm, liberteryenlerin özel mülkiyeti bireysel özgürlüğü sağlamanın tek yolu olarak gördüklerini açıkça ortaya koymaktadır,
  anarşist sosyalist gelenekten gelen Libertaires, Proudhon'un 'mülkiyet hırsızlıktır' ilkesini takip ederek, mutualizm, kolektivizm veya liberter komünizm gibi alternatif ekonomik modelleri destekler ve temelde kapitalist yapılara karşı çıkar. Bu, benzer terminoloji nedeniyle sıklıkla karıştırılan bu iki siyasi felsefe arasındaki temel ideolojik ayrımı temsil eder.
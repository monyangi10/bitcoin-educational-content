question: تفاوت اساسی بین لیبرتارین‌ها و لیبرتر‌ها در مورد مالکیت و سازماندهی اقتصادی چیست؟
answer: لیبرتارین‌ها از مالکیت خصوصی به عنوان امری ضروری برای آزادی فردی دفاع می‌کنند، در حالی که لیبرترها مالکیت را دزدی می‌دانند و از مدل‌های اقتصادی جمعی حمایت می‌کنند.
wrong_answers:
  - هر دو گروه از مالکیت خصوصی حمایت می‌کنند اما در نقش مقررات دولتی در حفاظت از آن تفاوت دارند.
  - لیبرترها از مالکیت خصوصی با حمایت دولت حمایت می‌کنند، در حالی که لیبرتارین‌ها مالکیت بدون هیچ چارچوب قانونی را ترجیح می‌دهند.
  - هر دو مالکیت خصوصی را رد می‌کنند اما لیبرتارین‌ها سوسیالیسم بازار را ترجیح می‌دهند در حالی که لیبرترها سوسیالیسم دولتی را می‌پسندند.
explanation: |
  این فصل به وضوح بیان می‌کند که لیبرترین‌ها مالکیت خصوصی را تنها راه تضمین آزادی فردی می‌دانند، در حالی که لیبرترها، که از سنت سوسیالیست آنارشیست می‌آیند، از اصل پرودون که 'مالکیت دزدی است' پیروی می‌کنند. لیبرترها از مدل‌های اقتصادی جایگزین مانند متقابل‌گرایی، جمع‌گرایی یا کمونیسم لیبرترین حمایت می‌کنند و به طور بنیادی با ساختارهای سرمایه‌داری مخالفند. این نمایانگر شکاف ایدئولوژیک اصلی بین این دو فلسفه سیاسی است که اغلب به دلیل اصطلاحات مشابه با یکدیگر اشتباه گرفته می‌شوند.
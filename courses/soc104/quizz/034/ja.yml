question: 財産と経済組織に関して、リバタリアンとリバテールの根本的な違いは何ですか？
answer: リバタリアンは私有財産を個人の自由にとって不可欠なものとして擁護し、一方リバテイアは財産を窃盗とみなし、集団経済モデルを支持する。
wrong_answers:
  - どちらのグループも私有財産を支持しているが、それを保護するための政府の規制の役割については異なっている
  - リベラリストは国家の保護を伴う私有財産を支持し、リバタリアンは法的枠組みのない財産を好む。
  - どちらも私有財産を否定するが、リバタリアンは市場社会主義を支持し、リベラリストは国家社会主義を好む
explanation: |
  この章では、リバタリアンが私有財産を個人の自由を保証する唯一の方法と見なしているのに対し、リバテールはアナーキスト社会主義の伝統に由来し、「財産は窃盗である」というプルードンの原則に従っていることが明確に示されている、
  自由主義者は、相互主義、集団主義、自由主義的共産主義のような代替的経済モデルを支持し、資本主義構造に根本的に反対する。これは、似たような用語のためにしばしば混同されるこれら2つの政治哲学の間の核心的なイデオロギー的分裂を表している。
question: Jaký je zásadní rozdíl mezi libertariány a libertaires, pokud jde o vlastnictví a ekonomické uspořádání?
answer: Libertariáni hájí soukromé vlastnictví jako nezbytný předpoklad svobody jednotlivce, zatímco libertariáni považují vlastnictví za krádež a podporují kolektivní ekonomické modely
wrong_answers:
  - Obě skupiny podporují soukromé vlastnictví, ale liší se v názoru na roli vládní regulace při jeho ochraně
  - Libertariáni podporují soukromé vlastnictví se státní ochranou, zatímco libertariáni dávají přednost vlastnictví bez jakéhokoli právního rámce
  - Oba odmítají soukromé vlastnictví, ale libertariáni dávají přednost tržnímu socialismu, zatímco libertariáni státnímu socialismu
explanation: |
  Z kapitoly jasně vyplývá, že libertariáni považují soukromé vlastnictví za jediný způsob, jak zajistit svobodu jednotlivce, zatímco libertaires,
  vycházející z anarchistické socialistické tradice, se řídí Proudhonovou zásadou, že "vlastnictví je krádež", libertariáni podporují alternativní ekonomické modely, jako je mutualismus, kolektivismus nebo libertariánský komunismus, a zásadně se staví proti kapitalistickým strukturám. To představuje základní ideologický rozdíl mezi těmito dvěma politickými filosofiemi, které jsou často zaměňovány kvůli podobné terminologii.
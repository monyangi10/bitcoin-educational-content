question: Milline on libertaarlaste ja libertaarlaste põhimõtteline erinevus seoses omandi ja majandusliku korraldusega?
answer: Libertaarid kaitsevad eraomandit kui individuaalse vabaduse olulist osa, samas kui libertaarid peavad omandit varguseks ja toetavad kollektiivseid majandusmudeleid
wrong_answers:
  - Mõlemad rühmad toetavad eraomandit, kuid erinevad valitsuse reguleerimise rolli osas selle kaitsmisel
  - Libertaarid toetavad eraomandit koos riikliku kaitsega, samas kui libertaarid eelistavad omandit ilma igasuguse õigusliku raamistikuta
  - Mõlemad lükkavad eraomandit tagasi, kuid libertaarid eelistavad turusotsialismi, libertaarid aga riigisotsialismi
explanation: |
  Peatükis selgitatakse selgelt, et libertaarid näevad eraomandit ainsa võimalusena tagada individuaalne vabadus, samas kui libertaarid,
  anarhistlikust sotsialistlikust traditsioonist pärit libertairid järgivad Proudhoni põhimõtet, et "omand on vargus". Libertairid toetavad alternatiivseid majandusmudeleid, nagu mutualism, kollektivism või libertaarne kommunism, olles põhimõtteliselt vastu kapitalistlikele struktuuridele. See kujutab endast põhilist ideoloogilist lõhet nende kahe poliitilise filosoofia vahel, mida sageli segi aetakse sarnase terminoloogia tõttu.
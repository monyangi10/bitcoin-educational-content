question: David Nolan đã sử dụng hai trục nào để tạo ra sơ đồ chính trị của mình?
answer: Trục trái-phải và trục tự do-quyền lực
wrong_answers:
  - Trục bảo thủ-tự do và trục kinh tế
  - Trục xã hội và trục kiểm soát của chính phủ
  - Trục chủ nghĩa cá nhân và trục chủ nghĩa tập thể
explanation: |
  Sơ đồ của David Nolan dựa trên hai trục riêng biệt: trục chính trị truyền thống trái-phải và trục thứ hai đo lường tự do so với quyền lực (hay chủ nghĩa nhà nước). Trục tự do-quyền lực này chạy theo chiều dọc từ chủ nghĩa nhà nước ở dưới cùng (điểm 0) đến chủ nghĩa tự do cá nhân ở trên cùng. Cách tiếp cận hai chiều này cho phép thể hiện các quan điểm chính trị một cách tinh tế hơn so với phổ trái-phải đơn giản, vì nó có thể phân biệt giữa tự do kinh tế và tự do cá nhân một cách riêng biệt. Các lựa chọn khác đề cập đến các khái niệm có thể liên quan đến phân tích chính trị nhưng không phải là các trục cụ thể mà Nolan đã sử dụng trong biểu đồ nổi tiếng của mình.
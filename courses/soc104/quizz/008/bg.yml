question: Кои са двете оси, които Дейвид Нолан използва, за да създаде своята политическа диаграма?
answer: Ос ляво-дясно и ос свобода-власт
wrong_answers:
  - Консервативно-либерална ос и икономическа ос
  - Социална ос и ос на правителствен контрол
  - Ос на индивидуализма и ос на колективизма
explanation: |
  Диаграмата на Дейвид Нолан се основава на две различни оси: традиционната политическа ос ляво-дясно и втора ос, която измерва свободата срещу властта
  (или етатизъм). Тази ос "свобода-власт" се простира вертикално от етатизма в долната част (точка нула) до либертарианството в горната част. Този двуизмерен подход позволява по-нюансирано представяне на политическите позиции от простия спектър ляво-дясно, тъй като може да разграничи поотделно икономическите и личните свободи. В другите варианти се споменават понятия, които могат да бъдат свързани с политическия анализ, но не са конкретните оси, които Нолан използва в известната си диаграма.
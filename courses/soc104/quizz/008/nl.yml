question: Wat zijn de twee assen die David Nolan gebruikte om zijn politieke diagram te maken?
answer: Een links-rechts as en een vrijheid-machtsas
wrong_answers:
  - Een conservatief-liberale as en een economische as
  - Een sociale as en een as voor overheidscontrole
  - Een individualisme-as en een collectivisme-as
explanation: |
  Het diagram van David Nolan is gebaseerd op twee verschillende assen: de traditionele links-rechts politieke as en een tweede as die vrijheid versus macht meet
  (of statisme). Deze as van vrijheid en macht loopt verticaal van statisme onderaan (punt nul) tot libertarisme bovenaan. Deze tweedimensionale benadering maakt een meer genuanceerde weergave van politieke standpunten mogelijk dan het eenvoudige links-rechts spectrum, omdat het onderscheid kan maken tussen economische en persoonlijke vrijheden. De andere opties noemen concepten die gerelateerd kunnen zijn aan politieke analyse, maar zijn niet de specifieke assen die Nolan gebruikte in zijn beroemde grafiek.
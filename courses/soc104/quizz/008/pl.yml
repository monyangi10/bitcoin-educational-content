question: Jakich dwóch osi użył David Nolan do stworzenia swojego diagramu politycznego?
answer: Oś lewo-prawo i oś wolność-władza
wrong_answers:
  - Oś konserwatywno-liberalna i oś gospodarcza
  - Oś społeczna i oś kontroli rządowej
  - Oś indywidualizmu i oś kolektywizmu
explanation: |
  Diagram Davida Nolana opiera się na dwóch odrębnych osiach: tradycyjnej osi politycznej lewica-prawica i drugiej osi, która mierzy wolność kontra władzę (lub etatyzm)
  (lub etatyzm). Oś wolność-władza biegnie pionowo od etatyzmu na dole (punkt zero) do libertarianizmu na górze. To dwuwymiarowe podejście pozwala na bardziej zniuansowaną reprezentację stanowisk politycznych niż proste spektrum lewica-prawica, ponieważ może rozróżniać osobno wolności gospodarcze i osobiste. Pozostałe opcje wspominają o koncepcjach, które mogą być związane z analizą polityczną, ale nie są konkretnymi osiami, których Nolan użył w swoim słynnym wykresie.
question: What are the two axes that David Nolan used to create his political diagram?
answer: A left-right axis and a freedom-power axis
wrong_answers:
  - A conservative-liberal axis and an economic axis
  - A social axis and a governmental control axis
  - An individualism axis and a collectivism axis
explanation: |
  David Nolan's diagram is based on two distinct axes: the traditional left-right political axis and a second axis that measures freedom versus power (or statism). This freedom-power axis runs vertically from statism at the bottom (point zero) to libertarianism at the top. This two-dimensional approach allows for a more nuanced representation of political positions than the simple left-right spectrum, as it can distinguish between economic and personal freedoms separately. The other options mention concepts that might be related to political analysis but are not the specific axes that Nolan used in his famous chart.
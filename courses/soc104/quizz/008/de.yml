question: Welches sind die beiden Achsen, die David Nolan für sein politisches Diagramm verwendet hat?
answer: Eine Links-Rechts-Achse und eine Freiheit-Macht-Achse
wrong_answers:
  - Eine konservativ-liberale Achse und eine wirtschaftliche Achse
  - Eine soziale Achse und eine Achse der staatlichen Kontrolle
  - Eine Achse des Individualismus und eine Achse des Kollektivismus
explanation: |
  Das Diagramm von David Nolan basiert auf zwei verschiedenen Achsen: der traditionellen politischen Links-Rechts-Achse und einer zweiten Achse, die Freiheit gegen Macht misst
  (oder Statismus) misst. Diese Freiheit-Macht-Achse verläuft vertikal vom Statismus am unteren Ende (Punkt Null) bis zum Libertarismus am oberen Ende. Dieser zweidimensionale Ansatz ermöglicht eine nuanciertere Darstellung politischer Positionen als das einfache Links-Rechts-Spektrum, da er zwischen wirtschaftlichen und persönlichen Freiheiten unterscheiden kann. Die anderen Optionen erwähnen Konzepte, die mit der politischen Analyse in Verbindung stehen könnten, aber nicht die spezifischen Achsen sind, die Nolan in seinem berühmten Diagramm verwendete.
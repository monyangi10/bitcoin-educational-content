question: Vilka är de två axlar som David Nolan använde för att skapa sitt politiska diagram?
answer: En vänster-höger-axel och en frihet-makt-axel
wrong_answers:
  - En konservativ-liberal axel och en ekonomisk axel
  - En social axel och en axel för statlig kontroll
  - En individualism- och en kollektivism-axel
explanation: |
  David Nolans diagram bygger på två olika axlar: den traditionella politiska vänster-höger-axeln och en andra axel som mäter frihet kontra makt
  (eller statism). Frihet-makt-axeln löper vertikalt från statism längst ned (nollpunkten) till libertarianism högst upp. Detta tvådimensionella tillvägagångssätt möjliggör en mer nyanserad representation av politiska ståndpunkter än det enkla vänster-högerspektrumet, eftersom det kan skilja mellan ekonomiska och personliga friheter separat. De andra alternativen nämner begrepp som kan vara relaterade till politisk analys men som inte är de specifika axlar som Nolan använde i sitt berömda diagram.
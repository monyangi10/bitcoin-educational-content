question: ¿Cuáles son los dos ejes que David Nolan utilizó para crear su diagrama político?
answer: Un eje izquierda-derecha y un eje libertad-poder
wrong_answers:
  - Un eje conservador-liberal y un eje económico
  - Un eje social y un eje de control gubernamental
  - Un eje de individualismo y un eje de colectivismo
explanation: |
  El diagrama de David Nolan se basa en dos ejes distintos: el eje político tradicional izquierda-derecha y un segundo eje que mide la libertad frente al poder
  (o estatismo). Este eje libertad-poder discurre verticalmente desde el estatismo en la parte inferior (punto cero) hasta el libertarismo en la parte superior. Este enfoque bidimensional permite una representación más matizada de las posiciones políticas que el simple espectro izquierda-derecha, ya que puede distinguir entre libertades económicas y personales por separado. Las otras opciones mencionan conceptos que podrían estar relacionados con el análisis político, pero no son los ejes específicos que Nolan utilizó en su famoso gráfico.
question: Koje su dve ose koje je David Nolan koristio za kreiranje svog političkog dijagrama?
answer: Osovina levo-desno i osovina sloboda-moć
wrong_answers:
  - Konzervativno-liberalna osa i ekonomska osa
  - Socijalna osa i osa vladine kontrole
  - Os individualizma i os kolektivizma
explanation: |
  Dijagram Davida Nolana zasnovan je na dve različite ose: tradicionalnoj levo-desno političkoj osi i drugoj osi koja meri slobodu naspram moći (ili statizma). Ova osa sloboda-moć vertikalno se proteže od statizma na dnu (tačka nula) do libertarijanizma na vrhu. Ovaj dvodimenzionalni pristup omogućava nijansiraniju reprezentaciju političkih pozicija od jednostavnog levo-desno spektra, jer može odvojeno razlikovati ekonomske i lične slobode. Druge opcije pominju pojmove koji mogu biti povezani sa političkom analizom, ali nisu specifične ose koje je Nolan koristio u svom poznatom grafikonu.
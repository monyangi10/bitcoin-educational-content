question: Какие две оси использовал Дэвид Нолан для создания своей политической диаграммы?
answer: Ось "левые-правые" и ось "свобода-власть
wrong_answers:
  - Консервативно-либеральная ось и экономическая ось
  - Социальная ось и ось правительственного контроля
  - Ось индивидуализма и ось коллективизма
explanation: |
  Диаграмма Дэвида Нолана основана на двух различных осях: традиционной политической оси "левые-правые" и второй оси, которая измеряет свободу в сравнении с властью
  (или статизм). Эта ось "свобода-власть" проходит вертикально от статизма в нижней части (точка ноль) до либертарианства в верхней части. Этот двухмерный подход позволяет более тонко представить политические позиции, чем простой спектр "левый-правый", поскольку он позволяет отдельно различать экономические и личные свободы. В других вариантах упоминаются понятия, которые могут быть связаны с политическим анализом, но не являются конкретными осями, которые Нолан использовал в своей знаменитой диаграмме.
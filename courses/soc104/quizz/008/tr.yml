question: David Nolan'ın siyasi diyagramını oluşturmak için kullandığı iki eksen nedir?
answer: Bir sol-sağ ekseni ve bir özgürlük-güç ekseni
wrong_answers:
  - Bir muhafazakar-liberal eksen ve bir ekonomik eksen
  - Bir sosyal eksen ve bir hükümet kontrolü ekseni
  - Bir bireycilik ekseni ve bir kolektivizm ekseni
explanation: |
  David Nolan'ın diyagramı iki farklı eksene dayanıyor: geleneksel sol-sağ siyasi eksen ve özgürlüğe karşı gücü ölçen ikinci bir eksen
  (ya da devletçilik). Bu özgürlük-iktidar ekseni en alttaki devletçilikten (sıfır noktası) en üstteki özgürlükçülüğe doğru dikey olarak uzanır. Bu iki boyutlu yaklaşım, ekonomik ve kişisel özgürlükleri ayrı ayrı ayırt edebildiğinden, siyasi pozisyonların basit sol-sağ spektrumundan daha incelikli bir şekilde temsil edilmesini sağlar. Diğer seçenekler siyasi analizle ilgili olabilecek kavramlardan bahseder ancak Nolan'ın ünlü tablosunda kullandığı spesifik eksenler değildir.
question: แกนสองแกนที่เดวิด โนแลนใช้สร้างแผนภาพการเมืองของเขาคืออะไร?
answer: แกนซ้าย-ขวา และแกนอิสรภาพ-อำนาจ
wrong_answers:
  - แกนอนุรักษ์นิยม-เสรีนิยมและแกนเศรษฐกิจ
  - แกนสังคมและแกนการควบคุมของรัฐบาล
  - แกนปัจเจกนิยมและแกนรวมหมู่
explanation: |
  แผนภาพของ David Nolan ขึ้นอยู่กับสองแกนที่แตกต่างกัน: แกนการเมืองซ้าย-ขวาแบบดั้งเดิมและแกนที่สองที่วัดเสรีภาพเทียบกับอำนาจ (หรือรัฐนิยม) แกนเสรีภาพ-อำนาจนี้วิ่งในแนวตั้งจากรัฐนิยมที่ด้านล่าง (จุดศูนย์) ไปจนถึงเสรีนิยมที่ด้านบน วิธีการแบบสองมิตินี้ช่วยให้สามารถแสดงตำแหน่งทางการเมืองได้อย่างละเอียดมากขึ้นกว่าสเปกตรัมซ้าย-ขวาแบบง่าย ๆ เนื่องจากสามารถแยกแยะระหว่างเสรีภาพทางเศรษฐกิจและส่วนบุคคลได้อย่างชัดเจน ตัวเลือกอื่น ๆ กล่าวถึงแนวคิดที่อาจเกี่ยวข้องกับการวิเคราะห์ทางการเมืองแต่ไม่ใช่แกนเฉพาะที่ Nolan ใช้ในแผนภูมิที่มีชื่อเสียงของเขา
question: Quais são os dois eixos que David Nolan utilizou para criar o seu diagrama político?
answer: Um eixo esquerda-direita e um eixo liberdade-poder
wrong_answers:
  - Um eixo conservador-liberal e um eixo económico
  - Um eixo social e um eixo de controlo governamental
  - Um eixo de individualismo e um eixo de coletivismo
explanation: |
  O diagrama de David Nolan baseia-se em dois eixos distintos: o tradicional eixo político esquerda-direita e um segundo eixo que mede a liberdade versus o poder
  (ou estatismo). Este eixo liberdade-poder corre verticalmente desde o estatismo na base (ponto zero) até ao libertarianismo no topo. Esta abordagem bidimensional permite uma representação mais matizada das posições políticas do que o simples espetro esquerda-direita, uma vez que permite distinguir separadamente as liberdades económicas e pessoais. As outras opções mencionam conceitos que podem estar relacionados com a análise política, mas não são os eixos específicos que Nolan utilizou no seu famoso gráfico.
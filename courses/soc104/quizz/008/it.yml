question: Quali sono i due assi utilizzati da David Nolan per creare il suo diagramma politico?
answer: Un asse sinistra-destra e un asse libertà-potere
wrong_answers:
  - Un asse conservatore-liberale e un asse economico
  - Un asse sociale e un asse di controllo governativo
  - Un asse dell'individualismo e un asse del collettivismo
explanation: |
  Il diagramma di David Nolan si basa su due assi distinti: il tradizionale asse politico sinistra-destra e un secondo asse che misura la libertà rispetto al potere (o statalismo)
  (o statalismo). L'asse libertà-potere corre verticalmente dallo statalismo in basso (punto zero) al libertarismo in alto. Questo approccio bidimensionale consente una rappresentazione più sfumata delle posizioni politiche rispetto al semplice spettro sinistra-destra, in quanto può distinguere tra libertà economiche e personali separatamente. Le altre opzioni menzionano concetti che potrebbero essere correlati all'analisi politica, ma non sono gli assi specifici utilizzati da Nolan nel suo famoso grafico.
question: デビッド・ノーランが政治図を作成する際に用いた2つの軸とは？
answer: 左右軸と自由-権力軸
wrong_answers:
  - 保守とリベラルの軸と経済の軸
  - 社会軸と政府管理軸
  - 個人主義軸と集団主義軸
explanation: |
  デビッド・ノーランの図は、伝統的な左右の政治軸と、自由対権力（または国家主義）を測る第二の軸という、2つの異なる軸に基づいている。
  (または国家主義）を測る第二の軸である。この自由と権力の軸は、下は国家主義（ゼロ点）から上はリバタリアニズムまで垂直に走っている。この2次元のアプローチは、経済的自由と個人的自由を別々に区別することができるため、単純な左右のスペクトルよりも政治的立場をよりニュアンス豊かに表現することができる。他の選択肢は、政治分析に関連しそうな概念に言及しているが、ノーランが有名なチャートで使用した特定の軸ではない。
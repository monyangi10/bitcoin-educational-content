question: Jaké dvě osy použil David Nolan při tvorbě svého politického diagramu?
answer: Osa levá-pravá a osa svoboda-moc
wrong_answers:
  - Konzervativně-liberální osa a ekonomická osa
  - Sociální osa a osa vládní kontroly
  - Osa individualismu a osa kolektivismu
explanation: |
  Diagram Davida Nolana je založen na dvou různých osách: tradiční politické ose levice-pravice a druhé ose, která poměřuje svobodu a moc
  (neboli etatismus). Tato osa svoboda-moc vede vertikálně od etatismu dole (bod nula) k libertarianismu nahoře. Tento dvourozměrný přístup umožňuje diferencovanější zobrazení politických postojů než prosté levo-pravé spektrum, neboť dokáže rozlišit ekonomické a osobní svobody zvlášť. Ostatní možnosti zmiňují pojmy, které mohou souviset s politickou analýzou, ale nejsou konkrétními osami, které Nolan použil ve svém slavném grafu.
question: 大卫-诺兰在绘制政治图表时使用了哪两条轴线？
answer: 左右轴和自由-权力轴
wrong_answers:
  - 保守-自由轴心和经济轴心
  - 社会轴和政府控制轴
  - 个人主义轴和集体主义轴
explanation: |
  大卫-诺兰的图表基于两个不同的轴线：传统的左右政治轴线和衡量自由与权力（或国家主义）的第二个轴线。
  (或国家主义）。这条自由-权力轴线从底部的国家主义（零点）垂直延伸到顶部的自由主义。与简单的左右光谱相比，这种二维方法能更细致地反映政治立场，因为它能分别区分经济自由和个人自由。其他选项提到的概念可能与政治分析有关，但并非诺兰在其著名图表中使用的特定坐标轴。
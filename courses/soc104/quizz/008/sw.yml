question: Ni vipi viwili ambavyo David Nolan alitumia kuunda mchoro wake wa kisiasa?
answer: Mhimili wa kushoto-kulia na mhimili wa uhuru-nguvu
wrong_answers:
  - Mhimili wa kihafidhina-uliberali na mhimili wa kiuchumi
  - Mhimili wa kijamii na mhimili wa udhibiti wa serikali
  - Mhimili wa ubinafsi na mhimili wa umoja
explanation: |
  Mchoro wa David Nolan unategemea mihimili miwili tofauti: mhimili wa kisiasa wa jadi wa kushoto-kulia na mhimili wa pili unaopima uhuru dhidi ya mamlaka (au takwimu). Mhimili huu wa uhuru-nguvu unaenda wima kutoka kwa takwimu chini (nukta sifuri) hadi uhuru juu. Mbinu hii ya pande mbili inaruhusu uwakilishi wa kina zaidi wa misimamo ya kisiasa kuliko wigo rahisi wa kushoto-kulia, kwani inaweza kutofautisha kati ya uhuru wa kiuchumi na wa kibinafsi kando. Chaguzi zingine zinataja dhana ambazo zinaweza kuhusishwa na uchambuzi wa kisiasa lakini sio mihimili maalum ambayo Nolan alitumia katika chati yake maarufu.
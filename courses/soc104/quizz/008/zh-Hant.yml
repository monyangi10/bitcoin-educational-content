question: David Nolan 用哪兩個軸來創造他的政治圖表？
answer: 左右軸和自由-權力軸
wrong_answers:
  - 保守自由軸心與經濟軸心
  - 社會軸心與政府控制軸心
  - 個人主義軸心和集體主義軸心
explanation: |
  David Nolan 的圖表基於兩個截然不同的軸線：傳統的左右政治軸線，以及衡量自由與權力（或國家主義）的第二個軸線。
  (或國家主義）。這條自由-權力軸線垂直地從底部的國家主義（零點）到頂部的自由主義。與簡單的左右光譜相比，這種二維方法可以更細緻地表達政治立場，因為它可以分開區分經濟自由和個人自由。其他選項提到的概念可能與政治分析有關，但並非 Nolan 在其著名圖表中使用的特定軸線。
question: 데이빗 놀란 감독이 정치 다이어그램을 만들 때 사용한 두 가지 축은 무엇인가요?
answer: 좌우 축과 자유 동력 축
wrong_answers:
  - 보수-자유주의 축과 경제 축
  - 사회적 축과 정부 통제 축
  - 개인주의 축과 집단주의 축
explanation: |
  데이비드 놀란의 도표는 전통적인 좌우 정치 축과 자유 대 권력을 측정하는 두 번째 축, 즉 자유 대 국가주의
  (또는 국가주의)를 측정하는 두 번째 축입니다. 이 자유-권력 축은 아래쪽의 국가주의(0점)에서 위쪽의 자유주의까지 수직으로 이어집니다. 이 2차원적 접근 방식은 경제적 자유와 개인의 자유를 개별적으로 구분할 수 있으므로 단순한 좌우 스펙트럼보다 정치적 입장을 더 미묘하게 표현할 수 있습니다. 다른 옵션은 정치 분석과 관련이 있을 수 있는 개념을 언급하지만 놀란이 유명한 차트에서 사용한 특정 축은 아닙니다.
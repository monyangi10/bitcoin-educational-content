question: Hvilke to akser brukte David Nolan for å lage sitt politiske diagram?
answer: En venstre-høyre-akse og en frihet-makt-akse
wrong_answers:
  - En konservativ-liberal akse og en økonomisk akse
  - En sosial akse og en statlig kontrollakse
  - En individualismeakse og en kollektivismeakse
explanation: |
  David Nolans diagram er basert på to forskjellige akser: den tradisjonelle politiske venstre-høyre-aksen og en andre akse som måler frihet versus makt
  (eller statisme). Denne frihet-makt-aksen går vertikalt fra statisme nederst (punkt null) til libertarianisme øverst. Denne todimensjonale tilnærmingen gir en mer nyansert fremstilling av politiske posisjoner enn det enkle venstre-høyre-spekteret, ettersom den kan skille mellom økonomisk og personlig frihet hver for seg. De andre alternativene nevner begreper som kan være relatert til politisk analyse, men som ikke er de spesifikke aksene som Nolan brukte i sitt berømte diagram.
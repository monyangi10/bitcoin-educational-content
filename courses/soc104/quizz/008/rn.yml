question: Ni ibihe bikoresho bibiri David Nolan yakoresheje mu guhingura igishushanyo ciwe ca politike?
answer: Umurongo w'ibubamfu-iburyo n'umurongo w'ububasha bw'umwidegemvyo
wrong_answers:
  - Umurongo w'abanyagihugu n'abanyagihugu n'ubutunzi
  - Umurongo w'imibano n'umurongo w'ubugenzuzi bwa Leta
  - Ubuhinga bw'umuntu ku giti ciwe n'ubw'abantu bose
explanation: |
  Igishushanyo ca David Nolan gishingiye ku nzira zibiri zitandukanye: inzira ya politike y’ububamfu n’iburyo n’inzira ya kabiri ipima umwidegemvyo n’ububasha . 
  (canke igiharuro). Uwo murongo w’ububasha bw’umwidegemvyo ugenda uhagaze kuva ku statisme iri hasi (point zero) gushika ku libertarianisme iri hejuru. Ubwo buryo bw’ingero zibiri buratuma umuntu ashobora guserukira neza ivyicaro vya politike kuruta uburyo bworoshe bwo guserukira ibubamfu n’iburyo, kuko bushobora gutandukanya umwidegemvyo w’ubutunzi n’uw’umuntu ku giti ciwe. Ayandi mahitamwo avuga ivyiyumviro bishobora kuba bifitaniye isano n’isesengura rya politike ariko si vyo Nolan yakoresheje mu gicapo ciwe kizwi cane.
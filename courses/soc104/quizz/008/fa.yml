question: دو محوری که دیوید نولان برای ایجاد نمودار سیاسی خود استفاده کرد کدامند؟
answer: یک محور چپ-راست و یک محور آزادی-قدرت
wrong_answers:
  - یک محور محافظه‌کار-لیبرال و یک محور اقتصادی
  - یک محور اجتماعی و یک محور کنترل دولتی
  - یک محور فردگرایی و یک محور جمع‌گرایی
explanation: |
  نمودار دیوید نولان بر اساس دو محور متمایز است: محور سنتی چپ-راست سیاسی و محور دوم که آزادی در مقابل قدرت (یا دولت‌گرایی) را اندازه‌گیری می‌کند. این محور آزادی-قدرت به صورت عمودی از دولت‌گرایی در پایین (نقطه صفر) تا لیبرترینیسم در بالا امتداد دارد. این رویکرد دو بعدی اجازه می‌دهد تا نمایشی دقیق‌تر از مواضع سیاسی نسبت به طیف ساده چپ-راست ارائه شود، زیرا می‌تواند بین آزادی‌های اقتصادی و شخصی به طور جداگانه تمایز قائل شود. گزینه‌های دیگر به مفاهیمی اشاره می‌کنند که ممکن است به تحلیل سیاسی مرتبط باشند اما محورهای خاصی نیستند که نولان در نمودار معروف خود استفاده کرده است.
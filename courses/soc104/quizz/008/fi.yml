question: Mitä kahta akselia David Nolan käytti poliittisen kaavionsa luomisessa?
answer: Vasemmisto-oikeisto -akseli ja vapaus- valta-akseli
wrong_answers:
  - Konservatiivis-liberaalinen akseli ja taloudellinen akseli
  - Sosiaalinen akseli ja hallituksen valvonta-akseli
  - Individualismiakseli ja kollektivismiakseli
explanation: |
  David Nolanin kaavio perustuu kahteen eri akseliin: perinteiseen vasemmisto-oikeistopoliittiseen akseliin ja toiseen akseliin, jolla mitataan vapautta ja valtaa
  (tai valtiovalta). Tämä vapaus-valta-akseli kulkee pystysuoraan statismista alhaalla (nollapiste) libertarismiin huipulla. Tämä kaksiulotteinen lähestymistapa mahdollistaa poliittisten kantojen vivahteikkaamman esittämisen kuin pelkkä vasemmisto-oikeisto -spektri, koska siinä voidaan erottaa erikseen taloudelliset ja henkilökohtaiset vapaudet. Muissa vaihtoehdoissa mainitaan käsitteitä, jotka saattavat liittyä poliittiseen analyysiin, mutta eivät ole niitä erityisiä akseleita, joita Nolan käytti kuuluisassa kaaviossaan.
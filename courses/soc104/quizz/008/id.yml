question: Apa saja dua kelompok yang digunakan David Nolan untuk membuat diagram politiknya?
answer: Sumbu kiri-kanan dan sumbu kebebasan-kekuasaan
wrong_answers:
  - Sumbu konservatif-liberal dan sumbu ekonomi
  - Sumbu sosial dan sumbu kontrol pemerintah
  - Sumbu individualisme dan sumbu kolektivisme
explanation: |
  Diagram David Nolan berdasarkan pada dua sumbu yang berbeda: sumbu politik kiri-kanan tradisional dan sumbu kedua yang mengukur kebebasan versus kekuasaan
  (atau statisme). Sumbu kebebasan-kekuasaan ini berjalan secara vertikal dari statisme di bagian bawah (titik nol) ke libertarianisme di bagian atas. Pendekatan dua dimensi ini memungkinkan representasi posisi politik yang lebih bernuansa daripada spektrum kiri-kanan yang sederhana, karena dapat membedakan antara kebebasan ekonomi dan kebebasan pribadi secara terpisah. Pilihan lainnya menyebutkan konsep-konsep yang mungkin terkait dengan analisis politik namun bukan merupakan sumbu spesifik yang digunakan Nolan dalam bagan terkenalnya.

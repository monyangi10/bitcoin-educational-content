question: Milliseid kahte telge kasutas David Nolan oma poliitilise diagrammi koostamisel?
answer: Vasak-parem-telg ja vabaduse-võimu telg
wrong_answers:
  - Konservatiiv-liberaalne telg ja majandustelg
  - Sotsiaalne telg ja valitsuse kontrolli telg
  - Individualismi telg ja kollektivismi telg
explanation: |
  David Nolani diagrammi aluseks on kaks erinevat telge: traditsiooniline vasak-parem poliitiline telg ja teine telg, mis mõõdab vabadust versus võimu
  (ehk riigimehelikkus). See vabaduse-võimu telg kulgeb vertikaalselt statismist allosas (nullpunkt) kuni libertarismini üleval. Selline kahemõõtmeline lähenemine võimaldab poliitiliste seisukohtade nüansirikkamat esitamist kui lihtne vasak-parem spektriosa, kuna see võimaldab eristada eraldi majanduslikke ja isiklikke vabadusi. Teistes valikutes mainitakse mõisteid, mis võivad olla seotud poliitilise analüüsiga, kuid ei ole konkreetsed teljed, mida Nolan kasutas oma kuulsas graafikus.
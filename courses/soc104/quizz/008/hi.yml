question: डेविड नोलन ने अपने राजनीतिक आरेख को बनाने के लिए किन दो अक्षों का उपयोग किया?
answer: वाम-दक्षिण अक्ष और स्वतंत्रता-शक्ति अक्ष
wrong_answers:
  - एक रूढ़िवादी-उदारवादी धुरी और एक आर्थिक धुरी
  - एक सामाजिक धुरी और एक सरकारी नियंत्रण धुरी
  - व्यक्तिवाद की धुरी और सामूहिकता की धुरी
explanation: |
  डेविड नोलन का आरेख दो अलग-अलग अक्षों पर आधारित है: एक पारंपरिक वाम-दक्षिण राजनीतिक अक्ष और दूसरा अक्ष जो स्वतंत्रता बनाम शक्ति (या राज्यवाद) को मापता है।
  यह स्वतंत्रता-शक्ति अक्ष नीचे (शून्य बिंदु) राज्यवाद से लेकर ऊपर (स्वतंत्रतावाद) तक लंबवत रूप से चलता है। यह द्वि-आयामी दृष्टिकोण सरल वाम-दक्षिण स्पेक्ट्रम की तुलना में राजनीतिक स्थितियों का अधिक सूक्ष्म प्रतिनिधित्व प्रदान करता है, क्योंकि यह आर्थिक और व्यक्तिगत स्वतंत्रताओं के बीच अलग-अलग अंतर कर सकता है। अन्य विकल्पों में ऐसी अवधारणाओं का उल्लेख है जो राजनीतिक विश्लेषण से संबंधित हो सकती हैं, लेकिन वे विशिष्ट अक्ष नहीं हैं जिनका उपयोग नोलन ने अपने प्रसिद्ध चार्ट में किया था।
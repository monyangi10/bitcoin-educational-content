question: Wat stelt de rechterkant van de economische as (richting 100) voor in het tweedimensionale politieke diagram?
answer: Voorkeur voor economische vrijheid met minder staatsinterventie, lagere belastingen en vrije markten
wrong_answers:
  - Voorkeur voor sterke staatsinterventie met hoge belastingen en uitgebreide openbare diensten
  - Steun voor nationalisatie van industrieën en beleid voor herverdeling van rijkdom
  - Nadruk op overheidsregulering en controle van bedrijfsactiviteiten
explanation: |
  De rechterkant van de economische as vertegenwoordigt een voorkeur voor economische vrijheid, gekenmerkt door minimale staatsinterventie in de economie,
  minder regelgeving, lagere belastingen en meer vrijheid voor bedrijven en individuen om te produceren, ruilen en consumeren. Deze positie benadrukt vrije markten, privé-eigendom en concurrentie als drijvende krachten achter welvaart. De foute antwoorden beschrijven posities aan de linkerkant van de economische as, die voorstander zijn van sterke staatsinterventie, hoge belastingen voor openbare diensten, nationalisatie en herverdeling van rijkdom om ongelijkheid te verminderen.
question: 在二維政治圖表中，經濟軸的右側（朝向 100）代表什麼？
answer: 偏好較少國家干預、較低稅率和自由市場的經濟自由
wrong_answers:
  - 偏好強力的國家干預、高稅率和廣泛的公共服務
  - 支持產業國有化和財富再分配政策
  - 強調政府對商業活動的規範與控制
explanation: |
  經濟軸的右邊代表偏好經濟自由，其特點是國家對經濟的干預減到最低、
  減少法規、降低稅率，以及企業和個人在生產、交換和消費方面有更大的自由。這個立場強調自由市場、私有財產和競爭是繁榮的動力。錯誤答案描述的是經濟軸左側的立場，即傾向於強力的國家干預、公共服務的高稅率、國有化，以及財富再分配以減少不平等。
question: Что представляет собой правая часть экономической оси (в направлении 100) на двухмерной политической диаграмме?
answer: Предпочитает экономическую свободу с меньшим вмешательством государства, более низкими налогами и свободными рынками
wrong_answers:
  - Предпочитает сильное государственное вмешательство с высокими налогами и обширными государственными услугами
  - Поддержка национализации промышленности и политики перераспределения богатства
  - Акцент на государственном регулировании и контроле предпринимательской деятельности
explanation: |
  Правая сторона экономической оси представляет собой предпочтение экономической свободы, характеризующейся минимальным вмешательством государства в экономику,
  сокращением регулирования, снижением налогов и большей свободой для предприятий и частных лиц производить, обмениваться и потреблять. Эта позиция подчеркивает, что свободные рынки, частная собственность и конкуренция являются движущими силами процветания. Неправильные ответы описывают позиции, расположенные по левую сторону экономической оси, которые поддерживают сильное государственное вмешательство, высокие налоги на общественные услуги, национализацию и перераспределение богатства для уменьшения неравенства.
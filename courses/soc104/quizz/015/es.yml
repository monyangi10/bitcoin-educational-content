question: ¿Qué representa el lado derecho del eje económico (hacia 100) en el diagrama político bidimensional?
answer: Preferencia por la libertad económica con menos intervención estatal, impuestos más bajos y mercados libres
wrong_answers:
  - Preferencia por una fuerte intervención estatal con impuestos elevados y amplios servicios públicos
  - Apoyo a la nacionalización de las industrias y a las políticas de redistribución de la riqueza
  - Énfasis en la regulación y el control gubernamental de las actividades empresariales
explanation: |
  El lado derecho del eje económico representa una preferencia por la libertad económica, caracterizada por una intervención mínima del Estado en la economía,
  una menor regulación, impuestos más bajos y mayor libertad para que las empresas y los individuos produzcan, intercambien y consuman. Esta postura hace hincapié en el libre mercado, la propiedad privada y la competencia como motores de la prosperidad. Las respuestas erróneas describen posiciones que se encuentran en el lado izquierdo del eje económico, que favorecen una fuerte intervención estatal, impuestos elevados para los servicios públicos, nacionalización y redistribución de la riqueza para reducir las desigualdades.
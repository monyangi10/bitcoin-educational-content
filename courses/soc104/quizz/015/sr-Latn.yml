question: Šta desna strana ekonomske ose (ka 100) predstavlja u dvodimenzionalnom političkom dijagramu?
answer: Preferencija za ekonomsku slobodu uz manje državne intervencije, niže poreze i slobodna tržišta
wrong_answers:
  - Preferencija za snažnu državnu intervenciju sa visokim porezima i obimnim javnim uslugama
  - Podrška nacionalizaciji industrija i politikama preraspodele bogatstva
  - Naglasak na državnoj regulaciji i kontroli poslovnih aktivnosti
explanation: |
  Desna strana ekonomske ose predstavlja preferenciju za ekonomsku slobodu, karakterisanu minimalnom državnom intervencijom u ekonomiji, smanjenim regulacijama, nižim porezima i većom slobodom za preduzeća i pojedince da proizvode, razmenjuju i konzumiraju. Ova pozicija naglašava slobodna tržišta, privatnu svojinu i konkurenciju kao pokretače prosperiteta. Pogrešni odgovori opisuju pozicije koje se nalaze na levoj strani ekonomske ose, koje favorizuju snažnu državnu intervenciju, visoke poreze za javne usluge, nacionalizaciju i preraspodelu bogatstva kako bi se smanjile nejednakosti.
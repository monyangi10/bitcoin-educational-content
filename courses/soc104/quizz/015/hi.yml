question: दो आयामी राजनीतिक आरेख में आर्थिक अक्ष का दाहिना भाग (100 की ओर) क्या दर्शाता है?
answer: कम सरकारी हस्तक्षेप, कम कर और मुक्त बाजारों के साथ आर्थिक स्वतंत्रता को प्राथमिकता देना।
wrong_answers:
  - उच्च करों और व्यापक सार्वजनिक सेवाओं के साथ मजबूत राज्य हस्तक्षेप को प्राथमिकता देना
  - उद्योगों के राष्ट्रीयकरण और धन के पुनर्वितरण की नीतियों का समर्थन
  - व्यापारिक गतिविधियों के सरकारी नियमन और नियंत्रण पर जोर दिया गया है।
explanation: |
  आर्थिक अक्ष का दायाँ भाग आर्थिक स्वतंत्रता के प्रति झुकाव को दर्शाता है, जिसकी विशेषता अर्थव्यवस्था में न्यूनतम सरकारी हस्तक्षेप, कम नियमन, कम कर और व्यवसायों एवं व्यक्तियों को उत्पादन, विनिमय एवं उपभोग की अधिक स्वतंत्रता है। यह दृष्टिकोण मुक्त बाज़ार, निजी संपत्ति और प्रतिस्पर्धा को समृद्धि के चालक के रूप में महत्व देता है। गलत उत्तर आर्थिक अक्ष के बाएँ भाग पर पाए जाने वाले दृष्टिकोणों का वर्णन करते हैं, जो असमानताओं को कम करने के लिए मजबूत सरकारी हस्तक्षेप, सार्वजनिक सेवाओं पर उच्च कर, राष्ट्रीयकरण और धन के पुनर्वितरण का समर्थन करते हैं।
question: Apa yang diwakili oleh sisi kanan sumbu ekonomi (ke arah 100) dalam diagram politik dua dimensi?
answer: Preferensi untuk kebebasan ekonomi dengan intervensi negara yang lebih sedikit, pajak yang lebih rendah, dan pasar bebas
wrong_answers:
  - Preferensi untuk intervensi negara yang kuat dengan pajak yang tinggi dan layanan publik yang luas
  - Dukungan untuk nasionalisasi industri dan kebijakan redistribusi kekayaan
  - Penekanan pada peraturan pemerintah dan kontrol terhadap aktivitas bisnis
explanation: |
  Sisi kanan dari poros ekonomi mewakili preferensi untuk kebebasan ekonomi, yang ditandai dengan intervensi negara yang minimal dalam perekonomian,
  mengurangi peraturan, pajak yang lebih rendah, dan kebebasan yang lebih besar bagi bisnis dan individu untuk memproduksi, bertukar, dan mengkonsumsi. Posisi ini menekankan pasar bebas, kepemilikan pribadi, dan kompetisi sebagai pendorong kemakmuran. Jawaban yang salah menggambarkan posisi yang ditemukan di sisi kiri poros ekonomi, yang mendukung intervensi negara yang kuat, pajak yang tinggi untuk layanan publik, nasionalisasi, dan redistribusi kekayaan untuk mengurangi ketidaksetaraan.

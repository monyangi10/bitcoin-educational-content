question: 2차원 정치 다이어그램에서 경제 축의 오른쪽(100을 향함)은 무엇을 의미하나요?
answer: 국가 개입이 적고, 세금이 낮으며, 자유 시장이 있는 경제적 자유를 선호합니다
wrong_answers:
  - 높은 세금과 광범위한 공공 서비스를 통한 국가의 강력한 개입을 선호합니다
  - 산업 국유화 및 부의 재분배 정책 지원
  - 비즈니스 활동에 대한 정부 규제 및 통제 강조
explanation: |
  경제 축의 오른쪽은 경제에 대한 국가 개입을 최소화하는 것을 특징으로 하는 경제적 자유에 대한 선호를 나타냅니다,
  규제 완화, 세금 인하, 기업과 개인이 생산, 교환, 소비할 수 있는 더 큰 자유를 특징으로 합니다. 이 입장은 번영의 원동력으로서 자유 시장, 사유 재산, 경쟁을 강조합니다. 오답은 경제 축의 왼쪽에 있는 입장으로, 강력한 국가 개입, 공공 서비스에 대한 높은 세금, 국유화, 불평등을 줄이기 위한 부의 재분배를 지지하는 입장을 설명합니다.
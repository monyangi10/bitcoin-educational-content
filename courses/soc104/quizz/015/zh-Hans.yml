question: 在二维政治图表中，经济轴右侧（朝向 100）代表什么？
answer: 倾向于经济自由，减少国家干预、降低税收和自由市场
wrong_answers:
  - 倾向于国家通过高税收和广泛的公共服务进行强有力的干预
  - 支持工业国有化和财富再分配政策
  - 强调政府对商业活动的监管和控制
explanation: |
  经济轴的右侧代表了对经济自由的偏好，其特点是国家对经济的干预最少、
  减少监管、降低税收，以及企业和个人有更大的生产、交换和消费自由。这一立场强调自由市场、私有财产和竞争是繁荣的驱动力。错误答案描述的是经济轴左侧的立场，即支持国家强力干预、对公共服务征收高税、国有化和财富再分配以减少不平等。
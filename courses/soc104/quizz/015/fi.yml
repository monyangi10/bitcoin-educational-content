question: Mitä talousakselin oikea puoli (kohti 100) edustaa kaksiulotteisessa poliittisessa kaaviossa?
answer: Taloudellisen vapauden suosiminen vähemmällä valtion puuttumisella, alhaisemmilla veroilla ja vapailla markkinoilla
wrong_answers:
  - Valtion voimakkaan puuttumisen, korkeiden verojen ja laajojen julkisten palvelujen suosiminen
  - Teollisuuden kansallistamisen ja varallisuuden uudelleenjakopolitiikan tukeminen
  - Yritystoiminnan valtion sääntelyn ja valvonnan korostaminen
explanation: |
  Taloudellisen akselin oikea puoli edustaa taloudellista vapautta, jolle on ominaista valtion vähäinen puuttuminen talouteen,
  vähentynyt sääntely, alhaisemmat verot ja yritysten ja yksilöiden suurempi vapaus tuottaa, vaihtaa ja kuluttaa. Tämä kanta korostaa vapaita markkinoita, yksityisomaisuutta ja kilpailua vaurauden moottorina. Väärät vastaukset kuvaavat taloudellisen akselin vasemmalla puolella olevia kantoja, jotka suosivat voimakasta valtion puuttumista, julkisten palvelujen korkeaa verotusta, kansallistamista ja varallisuuden uudelleenjakoa eriarvoisuuden vähentämiseksi.
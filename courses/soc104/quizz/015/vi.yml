question: Trục kinh tế phía bên phải (hướng về 100) thể hiện điều gì trong sơ đồ chính trị hai chiều?
answer: Ưu tiên tự do kinh tế với sự can thiệp của nhà nước ít hơn, thuế thấp hơn và thị trường tự do.
wrong_answers:
  - Ưu tiên sự can thiệp mạnh mẽ của nhà nước với thuế cao và dịch vụ công cộng rộng khắp.
  - Ủng hộ chính sách quốc hữu hóa các ngành công nghiệp và phân phối lại của cải.
  - Nhấn mạnh vai trò của chính phủ trong việc điều tiết và kiểm soát hoạt động kinh doanh.
explanation: |
  Trục kinh tế phía bên phải thể hiện sự ưu tiên cho tự do kinh tế, đặc trưng bởi sự can thiệp tối thiểu của nhà nước vào nền kinh tế, giảm thiểu quy định, giảm thuế và tăng cường tự do cho doanh nghiệp và cá nhân trong sản xuất, trao đổi và tiêu dùng. Quan điểm này nhấn mạnh thị trường tự do, quyền sở hữu tư nhân và cạnh tranh là động lực của sự thịnh vượng. Các câu trả lời sai mô tả các quan điểm nằm ở phía bên trái của trục kinh tế, ủng hộ sự can thiệp mạnh mẽ của nhà nước, thuế cao cho các dịch vụ công cộng, quốc hữu hóa và phân phối lại của cải để giảm bất bình đẳng.
question: Co reprezentuje prawa strona osi ekonomicznej (w kierunku 100) na dwuwymiarowym diagramie politycznym?
answer: Preferuje wolność gospodarczą z mniejszą interwencją państwa, niższymi podatkami i wolnymi rynkami
wrong_answers:
  - Preferowanie silnej interwencji państwa z wysokimi podatkami i rozbudowanymi usługami publicznymi
  - Wsparcie dla nacjonalizacji przemysłu i polityki redystrybucji bogactwa
  - Nacisk na regulacje rządowe i kontrolę działalności gospodarczej
explanation: |
  Prawa strona osi ekonomicznej reprezentuje preferencje dla wolności gospodarczej, charakteryzującej się minimalną interwencją państwa w gospodarkę,
  ograniczonymi regulacjami, niższymi podatkami i większą swobodą dla firm i osób fizycznych w zakresie produkcji, wymiany i konsumpcji. Stanowisko to kładzie nacisk na wolne rynki, własność prywatną i konkurencję jako czynniki napędzające dobrobyt. Błędne odpowiedzi opisują stanowiska znajdujące się po lewej stronie osi ekonomicznej, które opowiadają się za silną interwencją państwa, wysokimi podatkami na usługi publiczne, nacjonalizacją i redystrybucją bogactwa w celu zmniejszenia nierówności.
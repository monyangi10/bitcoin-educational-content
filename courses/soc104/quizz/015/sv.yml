question: Vad representerar den högra sidan av den ekonomiska axeln (mot 100) i det tvådimensionella politiska diagrammet?
answer: Preferens för ekonomisk frihet med mindre statlig inblandning, lägre skatter och fria marknader
wrong_answers:
  - Preferens för stark statlig inblandning med höga skatter och omfattande offentliga tjänster
  - Stöd för nationalisering av industrier och omfördelning av välstånd
  - Tyngdpunkt på statlig reglering och kontroll av affärsverksamhet
explanation: |
  Den högra sidan av den ekonomiska axeln representerar en preferens för ekonomisk frihet, som kännetecknas av minimal statlig inblandning i ekonomin,
  minskade regleringar, lägre skatter och större frihet för företag och privatpersoner att producera, byta och konsumera. Denna position betonar fria marknader, privat egendom och konkurrens som drivkrafter för välstånd. De felaktiga svaren beskriver ståndpunkter som återfinns på den vänstra sidan av den ekonomiska axeln, som förespråkar ett starkt statligt ingripande, höga skatter för offentliga tjänster, förstatligande och omfördelning av rikedomar för att minska ojämlikheter.
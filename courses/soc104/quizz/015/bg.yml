question: Какво представлява дясната страна на икономическата ос (към 100) в двуизмерната политическа диаграма?
answer: Предпочитание за икономическа свобода с по-малко държавна намеса, по-ниски данъци и свободни пазари
wrong_answers:
  - Предпочитание към силна държавна намеса с високи данъци и широки обществени услуги
  - Подкрепа за национализация на индустриите и политики за преразпределение на богатството
  - Акцент върху държавното регулиране и контрол на бизнес дейностите
explanation: |
  Дясната страна на икономическата ос представлява предпочитание към икономическата свобода, която се характеризира с минимална държавна намеса в икономиката,
  намаляване на регулациите, по-ниски данъци и по-голяма свобода на предприятията и хората да произвеждат, разменят и потребяват. Тази позиция набляга на свободните пазари, частната собственост и конкуренцията като двигатели на просперитета. Неправилните отговори описват позиции, които се срещат в лявата част на икономическата ос, които подкрепят силната държавна намеса, високите данъци за обществени услуги, национализацията и преразпределението на богатството с цел намаляване на неравенството.
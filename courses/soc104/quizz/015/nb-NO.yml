question: Hva representerer den høyre siden av den økonomiske aksen (mot 100) i det todimensjonale politiske diagrammet?
answer: Preferanse for økonomisk frihet med mindre statlig inngripen, lavere skatter og frie markeder
wrong_answers:
  - Preferanse for sterk statlig inngripen med høye skatter og omfattende offentlige tjenester
  - Støtte til nasjonalisering av industrier og omfordelingspolitikk
  - Vektlegging av statlig regulering og kontroll av næringsvirksomhet
explanation: |
  Den høyre siden av den økonomiske aksen representerer en preferanse for økonomisk frihet, kjennetegnet av minimal statlig inngripen i økonomien,
  reduserte reguleringer, lavere skatter og større frihet for bedrifter og enkeltpersoner til å produsere, utveksle og forbruke. Denne posisjonen legger vekt på frie markeder, privat eiendom og konkurranse som drivkrefter for velstand. De gale svarene beskriver posisjoner på venstresiden av den økonomiske aksen, som favoriserer sterk statlig inngripen, høye skatter for offentlige tjenester, nasjonalisering og omfordeling av rikdom for å redusere ulikheter.
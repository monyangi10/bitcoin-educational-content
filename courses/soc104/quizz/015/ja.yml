question: 二次元の政治図において、経済軸の右側（100に向かって）は何を表しているか？
answer: 国家の介入が少なく、税金が低く、自由な市場を持つ経済的自由を好む。
wrong_answers:
  - 高い税金と広範な公共サービスによる強力な国家介入を好む
  - 産業の国有化と富の再分配政策の支持
  - 企業活動に対する政府の規制と統制の重視
explanation: |
  経済軸の右側は経済的自由を好み、経済への国家の介入を最小限に抑えることを特徴とする、
  規制の緩和、税金の引き下げ、企業や個人の生産・交換・消費の自由度の拡大を特徴とする。この立場は、繁栄の原動力として自由市場、私有財産、競争を重視する。誤答は、経済軸の左側に見られる立場を述べたもので、強い国家介入、公共サービスのための高い税金、国有化、不平等を是正するための富の再分配を支持するものである。
question: Was bedeutet die rechte Seite der Wirtschaftsachse (in Richtung 100) in dem zweidimensionalen politischen Diagramm?
answer: Vorliebe für wirtschaftliche Freiheit mit weniger staatlichen Eingriffen, niedrigeren Steuern und freien Märkten
wrong_answers:
  - Vorliebe für starke staatliche Eingriffe mit hohen Steuern und umfangreichen öffentlichen Dienstleistungen
  - Unterstützung der Verstaatlichung von Industrien und der Politik der Umverteilung des Reichtums
  - Schwerpunkt auf staatlicher Regulierung und Kontrolle von Unternehmenstätigkeiten
explanation: |
  Die rechte Seite der Wirtschaftsachse steht für eine Präferenz für wirtschaftliche Freiheit, die durch minimale staatliche Eingriffe in die Wirtschaft gekennzeichnet ist,
  geringere Regulierungen, niedrigere Steuern und eine größere Freiheit für Unternehmen und Einzelpersonen, zu produzieren, zu tauschen und zu konsumieren. Diese Position betont freie Märkte, Privateigentum und Wettbewerb als Triebkräfte des Wohlstands. Die falschen Antworten beschreiben Positionen auf der linken Seite der Wirtschaftsachse, die starke staatliche Eingriffe, hohe Steuern für öffentliche Dienstleistungen, Verstaatlichung und Wohlstandsumverteilung zum Abbau von Ungleichheiten befürworten.
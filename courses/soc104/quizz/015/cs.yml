question: Co představuje pravá strana ekonomické osy (směrem k číslu 100) ve dvourozměrném politickém diagramu?
answer: Preference ekonomické svobody s menšími zásahy státu, nižšími daněmi a volným trhem
wrong_answers:
  - Preference silných státních zásahů s vysokými daněmi a rozsáhlými veřejnými službami
  - Podpora znárodnění průmyslu a politiky přerozdělování bohatství
  - Důraz na vládní regulaci a kontrolu podnikatelských aktivit
explanation: |
  Pravá strana ekonomické osy představuje preferenci ekonomické svobody, která se vyznačuje minimálními zásahy státu do ekonomiky,
  omezením regulací, nižšími daněmi a větší svobodou podniků a jednotlivců při výrobě, směně a spotřebě. Tato pozice zdůrazňuje volný trh, soukromé vlastnictví a konkurenci jako hnací sílu prosperity. Špatné odpovědi popisují postoje vyskytující se na levé straně ekonomické osy, které upřednostňují silné státní zásahy, vysoké daně na veřejné služby, znárodňování a přerozdělování bohatství s cílem snížit nerovnosti.
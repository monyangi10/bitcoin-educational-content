question: Mida kujutab kahemõõtmelisel poliitilisel diagrammil majandustelje parem pool (100 suunas)?
answer: Eelistab majanduslikku vabadust, vähem riigipoolset sekkumist, madalamaid makse ja vabu turge
wrong_answers:
  - Riigi tugeva sekkumise eelistamine koos kõrgete maksude ja ulatuslike avalike teenustega
  - Tööstuste natsionaliseerimise ja jõukuse ümberjaotamise poliitika toetamine
  - Rõhuasetus valitsuse regulatsioonile ja äritegevuse kontrollile
explanation: |
  Majandustelje parempoolne pool esindab majandusvabaduse eelistamist, mida iseloomustab minimaalne riiklik sekkumine majandusse,
  vähem regulatsioone, madalamad maksud ning ettevõtete ja üksikisikute suurem vabadus toota, vahetada ja tarbida. See positsioon rõhutab vabu turge, eraomandit ja konkurentsi kui jõukuse edasiviivaid tegureid. Valed vastused kirjeldavad positsioonid, mis asuvad majandustelje vasakul poolel ja mis pooldavad tugevat riiklikku sekkumist, kõrgeid makse avalike teenuste osutamiseks, riigistamist ja jõukuse ümberjaotamist, et vähendada ebavõrdsust.
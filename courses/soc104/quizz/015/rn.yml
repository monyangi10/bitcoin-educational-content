question: Uruhande rw’iburyo rw’umurongo w’ubutunzi (ruja ku 100) rugereranya iki mu kigereranyo ca politike c’ingero zibiri?
answer: Guhitamwo umwidegemvyo mu vy'ubutunzi ataco Leta yinjiramwo, imisoro igabanutse, n'amasoko yidegemvya
wrong_answers:
  - Guhitamwo gufasha Leta ikomeye n'imisoro myinshi n'ibikorwa vyinshi vya Leta
  - Gushigikira uguhindura inganda zibe iz'igihugu n'ingingo ngenderwako zo gusubira gusangira ubutunzi
  - Gushimika ku mategeko ya Leta no kugenzura ibikorwa vy'ubudandaji
explanation: |
  Uruhande rw’iburyo rw’umurongo w’ubutunzi rugereranya uguhitamwo umwidegemvyo w’ubutunzi, ugaragazwa n’uko Leta igira uruhara rutoyi mu bukungu, 
  amategeko agabanywa, imisoro igabanutse, n’umwidegemvyo mwinshi w’ubudandaji n’abantu ku giti cabo wo guhingura, guhindura no gukoresha. Ico kibanza gishimika ku masoko y’uburenganzira, ku mutungo w’abantu ku giti cabo, no ku mahiganwa nk’ibituma umuntu atera imbere. Inyishu zitari zo zidondora ivyicaro biboneka ku ruhande rw’ibubamfu rw’umurongo w’ubutunzi, bishigikira ko Leta igira ico ikoze bikomeye, imisoro myinshi ku bikorwa vya Leta, guha igihugu, no gusubira gusangira ubutunzi kugira ngo ubusumbane bugabanuke.
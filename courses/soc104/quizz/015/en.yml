question: What does the right side of the economic axis (towards 100) represent in the two-dimensional political diagram?
answer: Preference for economic freedom with less state intervention, lower taxes, and free markets
wrong_answers:
  - Preference for strong state intervention with high taxes and extensive public services
  - Support for nationalization of industries and wealth redistribution policies
  - Emphasis on government regulation and control of business activities
explanation: |
  The right side of the economic axis represents a preference for economic freedom, characterized by minimal state intervention in the economy, 
  reduced regulations, lower taxes, and greater freedom for businesses and individuals to produce, exchange, and consume. This position emphasizes free markets, private property, and competition as drivers of prosperity. The wrong answers describe positions found on the left side of the economic axis, which favor strong state intervention, high taxes for public services, nationalization, and wealth redistribution to reduce inequalities.

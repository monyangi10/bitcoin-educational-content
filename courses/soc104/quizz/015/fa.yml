question: سمت راست محور اقتصادی (به سمت 100) در نمودار سیاسی دو بعدی چه چیزی را نشان می‌دهد؟
answer: ترجیح آزادی اقتصادی با مداخله کمتر دولت، مالیات‌های پایین‌تر و بازارهای آزاد
wrong_answers:
  - ترجیح مداخله قوی دولت با مالیات‌های بالا و خدمات عمومی گسترده
  - حمایت از ملی‌سازی صنایع و سیاست‌های توزیع مجدد ثروت
  - تأکید بر تنظیم و کنترل دولتی فعالیت‌های تجاری
explanation: |
  سمت راست محور اقتصادی نشان‌دهنده ترجیح برای آزادی اقتصادی است که با حداقل مداخله دولت در اقتصاد، کاهش مقررات، مالیات‌های پایین‌تر و آزادی بیشتر برای کسب‌وکارها و افراد برای تولید، مبادله و مصرف مشخص می‌شود. این موضع بر بازارهای آزاد، مالکیت خصوصی و رقابت به عنوان محرک‌های شکوفایی تأکید دارد. پاسخ‌های نادرست مواضعی را توصیف می‌کنند که در سمت چپ محور اقتصادی یافت می‌شوند و طرفدار مداخله قوی دولت، مالیات‌های بالا برای خدمات عمومی، ملی‌سازی و توزیع مجدد ثروت برای کاهش نابرابری‌ها هستند.
question: İki boyutlu siyasi diyagramda ekonomik eksenin sağ tarafı (100'e doğru) neyi temsil ediyor?
answer: Daha az devlet müdahalesi, daha düşük vergiler ve serbest piyasalar ile ekonomik özgürlük tercihi
wrong_answers:
  - Yüksek vergiler ve kapsamlı kamu hizmetleri ile güçlü devlet müdahalesi tercihi
  - Endüstrilerin kamulaştırılması ve servetin yeniden dağıtılması politikalarına destek
  - İş faaliyetlerinin hükümet tarafından düzenlenmesi ve kontrolüne vurgu
explanation: |
  Ekonomik eksenin sağ tarafı, ekonomiye asgari devlet müdahalesi ile karakterize edilen ekonomik özgürlük tercihini temsil etmektedir,
  azaltılmış düzenlemeler, daha düşük vergiler ve işletmelerin ve bireylerin üretim, değişim ve tüketim için daha fazla özgürlük. Bu pozisyon, refahın itici gücü olarak serbest piyasaları, özel mülkiyeti ve rekabeti vurgular. Yanlış cevaplar, güçlü devlet müdahalesini, kamu hizmetleri için yüksek vergileri, kamulaştırmayı ve eşitsizlikleri azaltmak için servetin yeniden dağıtımını destekleyen ekonomik eksenin sol tarafında bulunan pozisyonları tanımlar.
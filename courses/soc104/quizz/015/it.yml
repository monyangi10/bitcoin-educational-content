question: Cosa rappresenta il lato destro dell'asse economico (verso 100) nel diagramma politico bidimensionale?
answer: Preferenza per la libertà economica con meno interventi statali, tasse più basse e mercati liberi
wrong_answers:
  - Preferenza per un forte intervento statale, con tasse elevate e servizi pubblici estesi
  - Sostegno alla nazionalizzazione delle industrie e alle politiche di ridistribuzione della ricchezza
  - Enfasi sulla regolamentazione e sul controllo delle attività commerciali da parte del governo
explanation: |
  Il lato destro dell'asse economico rappresenta una preferenza per la libertà economica, caratterizzata da un intervento minimo dello Stato nell'economia,
  regolamentazione ridotta, tasse più basse e maggiore libertà per le imprese e gli individui di produrre, scambiare e consumare. Questa posizione enfatizza il libero mercato, la proprietà privata e la concorrenza come motori della prosperità. Le risposte sbagliate descrivono le posizioni che si trovano sul lato sinistro dell'asse economico, che favoriscono un forte intervento dello Stato, tasse elevate per i servizi pubblici, nazionalizzazione e redistribuzione della ricchezza per ridurre le disuguaglianze.
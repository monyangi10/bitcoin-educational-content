question: O que é que o lado direito do eixo económico (em direção a 100) representa no diagrama político bidimensional?
answer: Preferência pela liberdade económica com menos intervenção do Estado, impostos mais baixos e mercados livres
wrong_answers:
  - Preferência por uma forte intervenção do Estado, com impostos elevados e serviços públicos alargados
  - Apoio à nacionalização de indústrias e a políticas de redistribuição da riqueza
  - Ênfase na regulamentação governamental e no controlo das actividades empresariais
explanation: |
  O lado direito do eixo económico representa uma preferência pela liberdade económica, caracterizada por uma intervenção mínima do Estado na economia,
  a direita do eixo económico representa uma preferência pela liberdade económica, caracterizada por uma intervenção mínima do Estado na economia, regulamentação reduzida, impostos mais baixos e maior liberdade para as empresas e os indivíduos produzirem, trocarem e consumirem. Esta posição enfatiza os mercados livres, a propriedade privada e a concorrência como factores de prosperidade. As respostas erradas descrevem posições encontradas no lado esquerdo do eixo económico, que favorecem uma forte intervenção do Estado, impostos elevados para os serviços públicos, nacionalização e redistribuição da riqueza para reduzir as desigualdades.
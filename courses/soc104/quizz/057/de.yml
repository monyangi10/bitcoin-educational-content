question: Was ermöglicht es nach John Rawls' Konzept des überlappenden Konsenses, dass sich Bürger mit unterschiedlichen umfassenden Doktrinen auf politische Grundsätze einigen können?
answer: Sie können gemeinsame Gerechtigkeitsgrundsätze aus ihrer jeweiligen philosophischen oder religiösen Perspektive unterstützen
wrong_answers:
  - Sie müssen ihre persönlichen Überzeugungen aufgeben und eine einheitliche säkulare Weltanschauung für politische Entscheidungen annehmen
  - Sie verlassen sich auf technokratischen Sachverstand, um zu entscheiden, welche umfassende Doktrin am rationellsten und wirksamsten ist
  - Sie wechseln zwischen verschiedenen umfassenden Doktrinen, je nach der spezifischen politischen Frage, die behandelt wird
explanation: |
  Rawls' übergreifender Konsens zeigt, dass die Bürger ihre unterschiedlichen religiösen, philosophischen oder moralischen Überzeugungen nicht aufgeben müssen, um sich auf politische Gerechtigkeit zu einigen.
  Stattdessen können die Menschen dieselben politischen Grundsätze aus unterschiedlichen Gründen unterstützen, die in ihren eigenen umfassenden Lehren wurzeln. Dieses Konzept verkörpert die zentristische Philosophie, indem es zeigt, wie grundlegende Meinungsverschiedenheiten mit politischer Zusammenarbeit koexistieren können, ohne dass die Bürger ihre tiefsten Überzeugungen aufgeben oder sich dem technischen Sachverstand beugen müssen.
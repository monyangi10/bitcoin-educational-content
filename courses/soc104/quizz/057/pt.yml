question: De acordo com o conceito de consenso sobreposto de John Rawls, o que permite que cidadãos com doutrinas abrangentes diferentes cheguem a acordo sobre princípios políticos?
answer: Podem subscrever princípios de justiça comuns a partir das suas próprias perspectivas filosóficas ou religiosas
wrong_answers:
  - Devem abandonar as suas crenças pessoais e adotar uma visão secular unificada do mundo para as decisões políticas
  - Confiam nos conhecimentos tecnocráticos para determinar qual a doutrina global mais racional e eficaz
  - Alternam entre diferentes doutrinas abrangentes, dependendo da questão política específica que está a ser abordada
explanation: |
  O consenso sobreposto de Rawls demonstra que os cidadãos não precisam de abandonar as suas diversas crenças religiosas, filosóficas ou morais para chegarem a acordo sobre a justiça política.
  Em vez disso, as pessoas podem apoiar os mesmos princípios políticos por razões diferentes, baseadas nas suas próprias doutrinas abrangentes. Este conceito incorpora a filosofia centrista ao mostrar como os desacordos fundamentais podem coexistir com a cooperação política, sem exigir que os cidadãos comprometam as suas convicções mais profundas ou se submetam a conhecimentos técnicos.
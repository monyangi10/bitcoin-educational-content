question: जॉन रॉल्स की ओवरलैपिंग कंसेंसस की अवधारणा के अनुसार, कौन सी बात नागरिकों को अलग-अलग व्यापक सिद्धांतों के बावजूद राजनीतिक सिद्धांतों पर सहमत होने की अनुमति देती है?
answer: वे अपने-अपने दार्शनिक या धार्मिक दृष्टिकोण से न्याय के साझा सिद्धांतों का समर्थन कर सकते हैं।
wrong_answers:
  - उन्हें अपने व्यक्तिगत विश्वासों को त्यागकर राजनीतिक निर्णयों के लिए एक एकीकृत धर्मनिरपेक्ष विश्वदृष्टि को अपनाना होगा।
  - वे यह निर्धारित करने के लिए तकनीकी विशेषज्ञता पर भरोसा करते हैं कि कौन सा व्यापक सिद्धांत सबसे तर्कसंगत और प्रभावी है।
  - वे विशिष्ट राजनीतिक मुद्दे के आधार पर विभिन्न व्यापक सिद्धांतों को अपनाते रहते हैं।
explanation: |
  रॉल्स का ओवरलैपिंग कंसेंसस यह दर्शाता है कि राजनीतिक न्याय पर सहमत होने के लिए नागरिकों को अपनी विविध धार्मिक, दार्शनिक या नैतिक मान्यताओं को त्यागने की आवश्यकता नहीं है।
  इसके बजाय, लोग अपने व्यापक सिद्धांतों पर आधारित विभिन्न कारणों से समान राजनीतिक सिद्धांतों का समर्थन कर सकते हैं। यह अवधारणा मध्यमार्गी दर्शन को दर्शाती है कि कैसे मौलिक मतभेद राजनीतिक सहयोग के साथ सह-अस्तित्व में रह सकते हैं, बिना नागरिकों को अपनी गहरी मान्यताओं से समझौता करने या तकनीकी विशेषज्ञता के आगे झुकने की आवश्यकता के।
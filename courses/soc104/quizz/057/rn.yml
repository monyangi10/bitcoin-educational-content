question: Dushingiye ku ciyumviro ca John Rawls c’uko abantu bose bashobora kwumvikana, ni igiki gituma abanyagihugu bafise inyigisho zitandukanye zitomoye bemeranya ku ngingo ngenderwako za politike?
answer: Bashobora kwemeza ingingo ngenderwako z’ubutungane basangiye bafatiye ku vyo babona mu vy’ubuhinga bwa filozofiya canke mu vy’idini .
wrong_answers:
  - Bategerezwa guheba ivyo bemera maze bagafata ingingo zijanye n’ivya politike zijanye n’ukuntu babona isi mu buryo bumwe .
  - Bishingiye ku buhinga bw’ubuhinga bwa none kugira ngo bamenye inyigisho yuzuye ibereye kandi ikora neza kuruta izindi .
  - Bihinduranya hagati y’inyigisho zitandukanye zitomoye bivanye n’ikibazo c’ivya politike kidasanzwe kiriko kiravugwa .
explanation: |
  Ivyo Rawls yemeranyako bihuye vyerekana ko abanyagihugu badakeneye guheba imyizere yabo itandukanye y’idini, y’ubuhinga bwa filozofiya canke y’inyifato runtu kugira ngo bemeranye ku butungane bwa politike. 
  Ahubwo abantu barashobora gushigikira ingingo ngenderwako zimwe za politike kubera imvo zitandukanye zishingiye ku nyigisho zabo bwite zitomoye. Ico ciyumviro gifise filozofiya y’abanyapolitike bo hagati mu kwerekana ingene ukutumvikana kw’ishimikiro gushobora kubana n’ugufashanya kwa politike, ataco bisaba abanyagihugu gusenyura ivyo bemera bikomeye canke gusubira inyuma ku buhinga bw’ubuhinga.
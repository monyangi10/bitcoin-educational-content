question: ジョン・ロールズのオーバーラップ・コンセンサスの概念によれば、包括的な教義を異にする市民が政治的原則に合意できるのはなぜか？
answer: それぞれの哲学的、宗教的観点から、共有された正義の原則を支持することができる。
wrong_answers:
  - 個人的な信条を捨て、世俗的な世界観を統一して政治的決断を下さなければならない。
  - どの包括的なドクトリンが最も合理的で効果的かを判断するために、技術的な専門知識に頼る。
  - 具体的な政治課題に応じて、さまざまな包括的な教義を交互に展開している。
explanation: |
  ロールズの重なり合うコンセンサスは、市民が政治的正義について合意するために、多様な宗教的、哲学的、道徳的信念を捨てる必要はないことを示している。
  むしろ、人々はそれぞれの包括的な教義に根ざした異なる理由で、同じ政治原則を支持することができる。このコンセプトは、根本的な意見の相違が政治的協力と共存できることを示すことで、中道主義哲学を体現している。
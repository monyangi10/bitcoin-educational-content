question: Según el concepto de consenso superpuesto de John Rawls, ¿qué permite a ciudadanos con doctrinas integrales diferentes ponerse de acuerdo sobre principios políticos?
answer: Pueden respaldar principios de justicia compartidos desde sus respectivas perspectivas filosóficas o religiosas
wrong_answers:
  - Deben abandonar sus creencias personales y adoptar una cosmovisión laica unificada para las decisiones políticas
  - Confían en los conocimientos tecnocráticos para determinar qué doctrina global es la más racional y eficaz
  - Alternan entre distintas doctrinas globales en función de la cuestión política concreta que se aborde
explanation: |
  El consenso superpuesto de Rawls demuestra que los ciudadanos no necesitan abandonar sus diversas creencias religiosas, filosóficas o morales para ponerse de acuerdo sobre la justicia política.
  Por el contrario, las personas pueden apoyar los mismos principios políticos por diferentes razones arraigadas en sus propias doctrinas integrales. Este concepto encarna la filosofía centrista al mostrar cómo los desacuerdos fundamentales pueden coexistir con la cooperación política, sin exigir a los ciudadanos que comprometan sus convicciones más profundas ni que se sometan a la experiencia técnica.
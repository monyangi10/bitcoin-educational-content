question: 根據約翰‧羅爾斯（John Rawls）的「重疊共識」（overlapping consensus）概念，是什麼讓擁有不同綜合理論的公民能夠在政治原則上達成共識？
answer: 他們可以從各自的哲學或宗教觀點來贊同共同的正義原則
wrong_answers:
  - 他們必須放棄個人信仰，並採用統一的世俗世界觀來做政治決策
  - 他們依賴技術官僚的專業知識來決定哪種全面的原則最合理、最有效
  - 他們會依據所要處理的特定政治議題，交替使用不同的綜合理論
explanation: |
  羅爾斯的重疊共識顯示，公民不需要放棄他們不同的宗教、哲學或道德信仰，就能在政治正義上達成一致。
  相反地，人們可以因為植根於他們自己的全面教義的不同理由而支持相同的政治原則。這一概念體現了中心主義哲學，展示了基本分歧如何與政治合作共存，而無需公民妥協其最深刻的信念或屈服於專業技術。
question: Wat zorgt er volgens John Rawls' concept van overlappende consensus voor dat burgers met verschillende alomvattende doctrines het eens kunnen worden over politieke principes?
answer: Ze kunnen gedeelde principes van rechtvaardigheid onderschrijven vanuit hun eigen respectieve filosofische of religieuze perspectieven
wrong_answers:
  - Ze moeten hun persoonlijke overtuigingen loslaten en een verenigd seculier wereldbeeld aannemen voor politieke beslissingen
  - Ze vertrouwen op technocratische expertise om te bepalen welke allesomvattende doctrine het meest rationeel en effectief is
  - Ze wisselen verschillende alomvattende doctrines af, afhankelijk van de specifieke politieke kwestie die wordt aangepakt
explanation: |
  Rawls' overlappende consensus toont aan dat burgers hun verschillende religieuze, filosofische of morele overtuigingen niet hoeven op te geven om het eens te worden over politieke rechtvaardigheid.
  In plaats daarvan kunnen mensen dezelfde politieke principes steunen om verschillende redenen die geworteld zijn in hun eigen allesomvattende doctrines. Dit concept belichaamt de centristische filosofie door te laten zien hoe fundamentele meningsverschillen kunnen samengaan met politieke samenwerking, zonder dat burgers hun diepste overtuigingen hoeven te compromitteren of zich hoeven over te geven aan technische expertise.
question: Co podle konceptu překrývajícího se konsensu Johna Rawlse umožňuje občanům s různými komplexními doktrínami shodnout se na politických principech?
answer: Mohou podporovat společné zásady spravedlnosti z vlastních filozofických nebo náboženských hledisek
wrong_answers:
  - Musí se vzdát své osobní víry a přijmout jednotný sekulární světonázor pro politická rozhodnutí
  - Spoléhají se na technokratickou expertízu, aby určily, která komplexní doktrína je nejracionálnější a nejúčinnější
  - Střídají různé komplexní doktríny v závislosti na konkrétním politickém problému, který se řeší
explanation: |
  Rawlsův překrývající se konsenzus ukazuje, že občané se nemusí vzdát svých různých náboženských, filozofických nebo morálních přesvědčení, aby se shodli na politické spravedlnosti.
  Naopak, lidé mohou podporovat stejné politické principy z různých důvodů, které mají kořeny v jejich vlastních komplexních doktrínách. Tento koncept ztělesňuje filozofii centrismu tím, že ukazuje, jak mohou zásadní neshody koexistovat s politickou spoluprací, aniž by občané museli slevit ze svých nejhlubších přesvědčení nebo se podřizovat odborným znalostem.
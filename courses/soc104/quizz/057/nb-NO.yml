question: Hva er det som gjør at borgere med ulike omfattende doktriner kan enes om politiske prinsipper, ifølge John Rawls' begrep om overlappende konsensus?
answer: De kan støtte felles rettferdighetsprinsipper ut fra sine egne respektive filosofiske eller religiøse perspektiver
wrong_answers:
  - De må oppgi sin personlige tro og ta i bruk et enhetlig sekulært verdensbilde for politiske beslutninger
  - De baserer seg på teknokratisk ekspertise for å avgjøre hvilken helhetlig doktrine som er mest rasjonell og effektiv
  - De veksler mellom ulike omfattende doktriner avhengig av det spesifikke politiske spørsmålet som behandles
explanation: |
  Rawls' overlappende konsensus viser at innbyggerne ikke trenger å gi avkall på sine ulike religiøse, filosofiske eller moralske overbevisninger for å bli enige om politisk rettferdighet.
  I stedet kan folk støtte de samme politiske prinsippene av ulike grunner som er forankret i deres egne omfattende doktriner. Konseptet er et uttrykk for sentrumsfilosofien ved at det viser hvordan grunnleggende uenigheter kan sameksistere med politisk samarbeid, uten at innbyggerne må gå på akkord med sine dypeste overbevisninger eller underordne seg teknisk ekspertise.
question: Zgodnie z koncepcją nakładającego się konsensusu Johna Rawlsa, co pozwala obywatelom o różnych kompleksowych doktrynach zgodzić się co do zasad politycznych?
answer: Mogą oni popierać wspólne zasady sprawiedliwości z własnej perspektywy filozoficznej lub religijnej
wrong_answers:
  - Muszą porzucić swoje osobiste przekonania i przyjąć jednolity świecki światopogląd dla decyzji politycznych
  - Polegają one na wiedzy technokratycznej w celu określenia, która kompleksowa doktryna jest najbardziej racjonalna i skuteczna
  - Naprzemiennie stosują różne kompleksowe doktryny w zależności od konkretnej kwestii politycznej, którą się zajmują
explanation: |
  Nakładający się konsensus Rawlsa pokazuje, że obywatele nie muszą porzucać swoich różnorodnych przekonań religijnych, filozoficznych czy moralnych, aby zgodzić się na sprawiedliwość polityczną.
  Zamiast tego ludzie mogą wspierać te same zasady polityczne z różnych powodów zakorzenionych w ich własnych doktrynach. Koncepcja ta ucieleśnia filozofię centrystyczną, pokazując, w jaki sposób fundamentalne nieporozumienia mogą współistnieć ze współpracą polityczną, nie wymagając od obywateli pójścia na kompromis ze swoimi najgłębszymi przekonaniami lub polegania na wiedzy technicznej.
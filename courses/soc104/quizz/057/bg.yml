question: Според концепцията на Джон Ролс за припокриващ се консенсус, какво позволява на гражданите с различни цялостни доктрини да постигнат съгласие по политическите принципи?
answer: Те могат да подкрепят общи принципи на справедливост от своите собствени философски или религиозни гледни точки
wrong_answers:
  - Те трябва да се откажат от личните си убеждения и да приемат единен светски мироглед за политическите решения
  - Те разчитат на технократски опит, за да определят коя всеобхватна доктрина е най-рационална и ефективна
  - В зависимост от конкретния политически въпрос, който се разглежда, те се редуват с различни всеобхватни доктрини
explanation: |
  Припокриващият се консенсус на Ролс показва, че не е необходимо гражданите да се отказват от различните си религиозни, философски или морални убеждения, за да постигнат съгласие по отношение на политическата справедливост.
  Напротив, хората могат да подкрепят едни и същи политически принципи по различни причини, които се коренят в собствените им всеобхватни доктрини. Тази концепция въплъщава философията на центризма, като показва как фундаменталните несъгласия могат да съществуват съвместно с политическо сътрудничество, без да се налага гражданите да правят компромиси с най-дълбоките си убеждения или да се съобразяват с техническата експертиза.
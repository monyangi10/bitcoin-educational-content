question: Prema konceptu preklapajućeg konsenzusa Džona Rolsa, građanima sa različitim sveobuhvatnim doktrinama omogućava se da se slože oko političkih principa kroz zajedničko prihvatanje osnovnih pravila pravednosti koja su nezavisna od njihovih ličnih uverenja.
answer: Oni mogu podržati zajedničke principe pravde iz svojih sopstvenih filozofskih ili religijskih perspektiva
wrong_answers:
  - Moraju napustiti svoja lična uverenja i usvojiti jedinstven sekularni pogled na svet za političke odluke.
  - Oni se oslanjaju na tehnokratsku stručnost kako bi utvrdili koja je sveobuhvatna doktrina najracionalnija i najefikasnija.
  - Oni se izmjenjuju između različitih sveobuhvatnih doktrina u zavisnosti od specifičnog političkog pitanja koje se obrađuje.
explanation: |
  Rawlsov preklapajući konsenzus pokazuje da građani ne moraju napustiti svoja raznolika religijska, filozofska ili moralna uverenja da bi se složili oko političke pravde. Umesto toga, ljudi mogu podržavati iste političke principe iz različitih razloga koji su ukorenjeni u njihovim sopstvenim sveobuhvatnim doktrinama. Ovaj koncept oličava centrističku filozofiju pokazujući kako fundamentalne nesuglasice mogu koegzistirati sa političkom saradnjom, bez potrebe da građani kompromituju svoja najdublja uverenja ili se oslanjaju na tehničku stručnost.
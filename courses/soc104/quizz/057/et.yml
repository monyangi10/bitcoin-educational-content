question: John Rawlsi kattuva konsensuse kontseptsiooni kohaselt, mis võimaldab erinevate terviklike doktriinidega kodanikel kokku leppida poliitilistes põhimõtetes?
answer: Nad võivad toetada ühiseid õigluse põhimõtteid oma filosoofilistest või religioossetest vaatenurkadest lähtudes
wrong_answers:
  - Nad peavad loobuma oma isiklikest tõekspidamistest ja võtma poliitiliste otsuste tegemisel vastu ühtse ilmaliku maailmavaate
  - Nad tuginevad tehnokraatlikele ekspertteadmistele, et määrata kindlaks, milline kõikehõlmav doktriin on kõige ratsionaalsem ja tõhusam
  - Nad vahelduvad erinevate terviklike doktriinide vahel, sõltuvalt konkreetsest poliitilisest küsimusest, mida käsitletakse
explanation: |
  Rawlsi kattuv konsensus näitab, et kodanikud ei pea loobuma oma erinevatest religioossetest, filosoofilistest või moraalsetest tõekspidamistest, et leppida kokku poliitilises õigluses.
  Selle asemel võivad inimesed toetada samu poliitilisi põhimõtteid erinevatel põhjustel, mis tulenevad nende enda kõikehõlmavatest doktriinidest. See kontseptsioon kehastab tsentristlikku filosoofiat, näidates, kuidas põhimõttelised erimeelsused võivad eksisteerida koos poliitilise koostööga, ilma et kodanikud peaksid kompromisse tegema oma sügavaimate veendumuste osas või alluma tehnilistele ekspertidele.
question: According to John Rawls' concept of overlapping consensus, what allows citizens with different comprehensive doctrines to agree on political principles?
answer: They can endorse shared principles of justice from their own respective philosophical or religious perspectives
wrong_answers:
  - They must abandon their personal beliefs and adopt a unified secular worldview for political decisions
  - They rely on technocratic expertise to determine which comprehensive doctrine is most rational and effective
  - They alternate between different comprehensive doctrines depending on the specific political issue being addressed
explanation: |
  Rawls' overlapping consensus demonstrates that citizens don't need to abandon their diverse religious, philosophical, or moral beliefs to agree on political justice. Instead, people can support the same political principles for different reasons rooted in their own comprehensive doctrines. This concept embodies centrist philosophy by showing how fundamental disagreements can coexist with political cooperation, without requiring citizens to compromise their deepest convictions or defer to technical expertise.

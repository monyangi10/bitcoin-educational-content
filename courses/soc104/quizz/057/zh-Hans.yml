question: 根据约翰-罗尔斯（John Rawls）的 "重叠共识"（overlapping consensus）概念，是什么让具有不同综合理论的公民在政治原则上达成一致？
answer: 他们可以从各自的哲学或宗教角度认可共同的正义原则
wrong_answers:
  - 他们必须放弃个人信仰，在政治决策中采用统一的世俗世界观
  - 他们依靠技术专家的专业知识来确定哪种综合理论最合理、最有效
  - 他们根据所要解决的具体政治问题，交替使用不同的综合理论
explanation: |
  罗尔斯的重叠共识表明，公民不需要放弃他们不同的宗教、哲学或道德信仰，就能在政治正义上达成一致。
  相反，人们可以基于自己的综合学说，以不同的理由支持相同的政治原则。这一概念体现了中间主义哲学，它展示了根本分歧如何与政治合作共存，而不要求公民妥协于他们最深刻的信念或服从于技术专长。
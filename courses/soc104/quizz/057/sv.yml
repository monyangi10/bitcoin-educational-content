question: Enligt John Rawls begrepp överlappande konsensus, vad gör det möjligt för medborgare med olika omfattande doktriner att komma överens om politiska principer?
answer: De kan stödja gemensamma rättviseprinciper utifrån sina egna filosofiska eller religiösa perspektiv
wrong_answers:
  - De måste överge sina personliga övertygelser och anta en enhetlig sekulär världsbild för politiska beslut
  - De förlitar sig på teknokratisk expertis för att avgöra vilken övergripande doktrin som är mest rationell och effektiv
  - De växlar mellan olika övergripande doktriner beroende på vilken specifik politisk fråga som behandlas
explanation: |
  Rawls överlappande konsensus visar att medborgarna inte behöver överge sina olika religiösa, filosofiska eller moraliska övertygelser för att enas om politisk rättvisa.
  Istället kan människor stödja samma politiska principer av olika skäl som har sina rötter i deras egna omfattande doktriner. Konceptet förkroppsligar den centristiska filosofin genom att visa hur grundläggande meningsskiljaktigheter kan samexistera med politiskt samarbete, utan att medborgarna behöver kompromissa med sina djupaste övertygelser eller ge efter för teknisk expertis.
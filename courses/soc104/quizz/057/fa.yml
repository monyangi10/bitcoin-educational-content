question: بر اساس مفهوم اجماع همپوشان جان رالز، چه چیزی به شهروندانی با دکترین‌های جامع مختلف اجازه می‌دهد تا بر اصول سیاسی توافق کنند؟
answer: آن‌ها می‌توانند اصول مشترک عدالت را از دیدگاه‌های فلسفی یا مذهبی خود تأیید کنند.
wrong_answers:
  - آن‌ها باید باورهای شخصی خود را کنار بگذارند و برای تصمیم‌گیری‌های سیاسی یک دیدگاه سکولار واحد را بپذیرند.
  - آن‌ها به تخصص تکنوکراتیک تکیه می‌کنند تا تعیین کنند کدام دکترین جامع منطقی‌تر و مؤثرتر است.
  - آن‌ها بسته به مسئله سیاسی خاصی که مورد بررسی قرار می‌گیرد، بین آموزه‌های جامع مختلف جابجا می‌شوند.
explanation: |
  اجماع همپوشان راولز نشان می‌دهد که شهروندان نیازی ندارند تا باورهای متنوع دینی، فلسفی یا اخلاقی خود را برای توافق بر سر عدالت سیاسی کنار بگذارند.  
  در عوض، افراد می‌توانند به دلایل مختلفی که در دکترین‌های جامع خود ریشه دارد، از اصول سیاسی یکسانی حمایت کنند. این مفهوم فلسفه میانه‌رو را با نشان دادن اینکه چگونه اختلافات اساسی می‌توانند با همکاری سیاسی همزیستی داشته باشند، بدون اینکه شهروندان مجبور شوند از عمیق‌ترین اعتقادات خود چشم‌پوشی کنند یا به تخصص فنی تکیه کنند، تجسم می‌بخشد.
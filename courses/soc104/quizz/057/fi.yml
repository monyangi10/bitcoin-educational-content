question: John Rawlsin päällekkäisen konsensuksen käsitteen mukaan mikä mahdollistaa sen, että kansalaiset, joilla on erilaisia kokonaisvaltaisia oppeja, voivat sopia poliittisista periaatteista?
answer: Ne voivat tukea yhteisiä oikeudenmukaisuuden periaatteita omasta filosofisesta tai uskonnollisesta näkökulmastaan
wrong_answers:
  - Heidän on luovuttava henkilökohtaisista uskomuksistaan ja omaksuttava yhtenäinen maallinen maailmankuva poliittisia päätöksiä varten
  - Ne luottavat teknokraattiseen asiantuntemukseen määritellessään, mikä kattava doktriini on järkevin ja tehokkain
  - Ne vuorottelevat eri kattavien oppien välillä sen mukaan, mitä poliittista kysymystä käsitellään
explanation: |
  Rawlsin päällekkäinen konsensus osoittaa, että kansalaisten ei tarvitse luopua erilaisista uskonnollisista, filosofisista tai moraalisista vakaumuksistaan päästäkseen yhteisymmärrykseen poliittisesta oikeudenmukaisuudesta.
  Sen sijaan ihmiset voivat tukea samoja poliittisia periaatteita eri syistä, jotka juontavat juurensa heidän omiin kattaviin oppeihinsa. Tämä käsite ilmentää sentrististä filosofiaa osoittamalla, miten perustavanlaatuiset erimielisyydet voivat elää rinnakkain poliittisen yhteistyön kanssa ilman, että kansalaisten on tingittävä syvimmistä vakaumuksistaan tai alistuttava tekniseen asiantuntemukseen.
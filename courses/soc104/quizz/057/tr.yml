question: John Rawls'un örtüşen mutabakat kavramına göre, farklı kapsamlı doktrinlere sahip vatandaşların siyasi ilkeler üzerinde anlaşmalarını sağlayan şey nedir?
answer: Kendi felsefi veya dini perspektiflerinden ortak adalet ilkelerini destekleyebilirler
wrong_answers:
  - Kişisel inançlarını terk etmeli ve siyasi kararlar için birleşik bir seküler dünya görüşünü benimsemelidirler
  - Hangi kapsamlı doktrinin en rasyonel ve etkili olduğunu belirlemek için teknokratik uzmanlığa güvenirler
  - Ele alınan belirli siyasi meseleye bağlı olarak farklı kapsamlı doktrinler arasında gidip gelirler
explanation: |
  Rawls'un örtüşen konsensüsü, vatandaşların siyasi adalet konusunda anlaşmak için farklı dini, felsefi veya ahlaki inançlarını terk etmeleri gerekmediğini göstermektedir.
  Bunun yerine, insanlar kendi kapsamlı doktrinlerinden kaynaklanan farklı nedenlerle aynı siyasi ilkeleri destekleyebilirler. Bu kavram, vatandaşların en derin inançlarından ödün vermelerini veya teknik uzmanlığa boyun eğmelerini gerektirmeden, temel anlaşmazlıkların siyasi işbirliği ile nasıl bir arada var olabileceğini göstererek merkezci felsefeyi somutlaştırmaktadır.
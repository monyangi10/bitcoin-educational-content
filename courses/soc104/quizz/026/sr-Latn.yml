question: Koja istorijska promena objašnjava zašto su pristalice klasičnog liberalizma u Sjedinjenim Državama počele da koriste termin 'libertarijanac' počevši od 1960-ih?
answer: Američki liberali su prihvatili državnu intervencionističku politiku i politiku velike vlade, što je u suprotnosti sa klasičnim liberalnim principima.
wrong_answers:
  - Evropski liberali su prvi počeli koristiti termin 'libertarijanac', prisiljavajući Amerikance da usvoje drugačiju terminologiju.
  - Republikanska stranka je zaštitila termin 'liberal' i sprečila klasične liberale da ga koriste.
  - Klasični liberali želeli su da se distanciraju od evropskih političkih pokreta posle Drugog svetskog rata.
explanation: |
  Tačan odgovor odražava suštinsku istorijsku evoluciju opisanu u poglavlju. Američki 'liberali' su postepeno prešli ka podršci opsežnoj državnoj intervenciji kroz programe poput New Deal i Great Society, što je direktno kontradiktiralo klasičnim liberalnim principima ograničene vlade i laissez-faire ekonomije. Ovo je primoralo istinske klasične liberale da se preimenuju u 'libertarijance' kako bi razlikovali svoju filozofiju od onoga što je američki liberalizam postao. Pogrešni odgovori su verovatni, ali činjenično netačni - nije bilo problema sa zaštitnim znakom, Evropljani nisu pokrenuli promenu terminologije, i promena nije bila povezana sa posleratnim evropskim distanciranjem.
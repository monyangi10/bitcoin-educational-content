question: Milline ajalooline muutus seletab, miks klassikalise liberalismi toetajad Ameerika Ühendriikides võtsid alates 1960. aastatest kasutusele termini "libertaarne"?
answer: Ameerika liberaalid olid omaks võtnud riikliku sekkumise ja suure valitsuse poliitika, mis oli vastuolus klassikaliste liberaalsete põhimõtetega
wrong_answers:
  - Euroopa liberaalid hakkasid esimesena kasutama terminit "liberaal", mis sundis ameeriklasi kasutama teistsugust terminoloogiat
  - Vabariiklik partei kaitses terminit "liberaal" kaubamärgina ja takistas klassikalistel liberaalidel seda kasutada
  - Klassikalised liberaalid tahtsid pärast Teist maailmasõda distantseeruda Euroopa poliitilistest liikumistest
explanation: |
  Õige vastus kajastab peatükis kirjeldatud põhilist ajaloolist arengut. Ameerika "liberaalid" läksid järk-järgult üle ulatusliku riikliku sekkumise toetamisele selliste programmide nagu New Deal ja Great Society kaudu, mis olid otseselt vastuolus klassikaliste liberaalsete piiratud valitsuse ja laissez-faire'i majanduse põhimõtetega. See sundis tõelisi klassikalisi liberaalid end ümber nimetama "liberaalideks", et eristada oma filosoofiat sellest, milleks Ameerika liberalism oli muutunud. Valed vastused on usutavad, kuid faktiliselt ebaõiged - mingit kaubamärgiprobleemi ei olnud, eurooplased ei ajendanud terminoloogia muutmist ja üleminek ei olnud seotud Euroopa sõjajärgse distantseerumisega.
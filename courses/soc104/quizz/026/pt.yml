question: Que mudança histórica explica por que razão os adeptos do liberalismo clássico nos Estados Unidos adoptaram o termo "libertário" a partir dos anos 60?
answer: Os liberais americanos tinham adotado o intervencionismo estatal e políticas de grande governo, contradizendo os princípios liberais clássicos
wrong_answers:
  - Os liberais europeus começaram a usar o termo "libertário" primeiro, obrigando os americanos a adotar uma terminologia diferente
  - O Partido Republicano registou o termo "liberal" e impediu os liberais clássicos de o utilizarem
  - Os liberais clássicos queriam distanciar-se dos movimentos políticos europeus após a Segunda Guerra Mundial
explanation: |
  A resposta correta reflecte a evolução histórica central descrita no capítulo. Os "liberais" americanos passaram gradualmente a apoiar a intervenção extensiva do Estado através de programas como o New Deal e a Great Society, o que contradizia diretamente os princípios liberais clássicos de governo limitado e economia laissez-faire. Este facto obrigou os verdadeiros liberais clássicos a mudarem de nome para "libertários" para distinguirem a sua filosofia daquilo em que o liberalismo americano se tinha tornado. As respostas erradas são plausíveis, mas factualmente incorrectas - não houve qualquer problema de marca registada, os europeus não impulsionaram a mudança de terminologia e a mudança não esteve relacionada com o distanciamento europeu do pós-guerra.
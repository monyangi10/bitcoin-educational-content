question: Hvilket historisk skifte forklarer hvorfor tilhengere av klassisk liberalisme i USA tok i bruk begrepet "libertarian" fra 1960-tallet?
answer: Amerikanske liberale hadde omfavnet statsintervensjonisme og storpolitikk, noe som stred mot klassiske liberale prinsipper
wrong_answers:
  - Europeiske liberale begynte å bruke begrepet "libertarian" først, noe som tvang amerikanerne til å ta i bruk en annen terminologi
  - Det republikanske partiet varemerkebeskyttet begrepet "liberal" og hindret klassiske liberale i å bruke det
  - Klassiske liberale ønsket å distansere seg fra europeiske politiske bevegelser etter andre verdenskrig
explanation: |
  Det riktige svaret gjenspeiler den sentrale historiske utviklingen som er beskrevet i kapittelet. Amerikanske "liberale" gikk gradvis over til å støtte omfattende statlig inngripen gjennom programmer som New Deal og Great Society, noe som var stikk i strid med klassiske liberale prinsipper om begrenset styring og laissez-faire-økonomi. Dette tvang sanne klassiske liberale til å omdøpe seg selv til "libertarianere" for å skille sin egen filosofi fra det den amerikanske liberalismen hadde blitt. De gale svarene er plausible, men faktuelt feil - det var ikke noe varemerkeproblem, det var ikke europeerne som drev frem terminologiendringen, og skiftet var ikke knyttet til europeisk distansering i etterkrigstiden.
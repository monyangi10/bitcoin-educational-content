question: Коя историческа промяна обяснява защо поддръжниците на класическия либерализъм в САЩ възприемат термина "либертариански" от 60-те години на миналия век?
answer: Американските либерали бяха възприели държавния интервенционизъм и политиките на голямото правителство, което противоречеше на класическите либерални принципи
wrong_answers:
  - Европейските либерали първи започват да използват термина "либертарианец", което принуждава американците да възприемат различна терминология
  - Републиканската партия запазва търговската марка на термина "либерален" и не позволява на класическите либерали да го използват
  - Класическите либерали искат да се дистанцират от европейските политически движения след Втората световна война
explanation: |
  Правилният отговор отразява основната историческа еволюция, описана в главата. Американските "либерали" постепенно се насочват към подкрепа на широка държавна намеса чрез програми като "Новия курс" и "Великото общество", които пряко противоречат на класическите либерални принципи за ограничено управление и икономика на принципа laissez-faire. Това принуждава истинските класически либерали да се прекръстят на "либертарианци", за да разграничат своята философия от това, в което се е превърнал американският либерализъм. Грешните отговори са вероятни, но фактически неверни - не е имало проблем с търговската марка, европейците не са предизвикали промяната на терминологията и промяната не е свързана с следвоенното дистанциране на Европа.
question: Vilken historisk förändring förklarar varför anhängare av klassisk liberalism i USA började använda termen "libertarian" från och med 1960-talet?
answer: Amerikanska liberaler hade anammat statlig interventionism och storskalig regeringspolitik, vilket stred mot klassiska liberala principer
wrong_answers:
  - Europeiska liberaler började använda termen "libertarian" först, vilket tvingade amerikanerna att anta en annan terminologi
  - Republikanska partiet varumärkesskyddade termen "liberal" och hindrade klassiska liberaler från att använda den
  - Klassiska liberaler ville distansera sig från europeiska politiska rörelser efter andra världskriget
explanation: |
  Det korrekta svaret återspeglar den centrala historiska utveckling som beskrivs i kapitlet. Amerikanska "liberaler" övergick gradvis till att stödja omfattande statliga ingripanden genom program som New Deal och Great Society, vilket direkt motsade de klassiska liberala principerna om begränsad statsmakt och laissez-faire-ekonomi. Detta tvingade de verkliga klassiska liberalerna att byta namn till "libertarianer" för att skilja sin filosofi från vad den amerikanska liberalismen hade blivit. De felaktiga svaren är rimliga men faktamässigt felaktiga - det fanns ingen varumärkesfråga, européerna drev inte på terminologiändringen och skiftet var inte relaterat till efterkrigstidens europeiska avståndstagande.
question: Ni irihe hinduka ry’amateka risobanura igituma abashigikiye uburenganzira bwa kera muri Leta Zunze Ubumwe za Amerika bafata ijambo ‘libertarian’ guhera mu myaka ya 1960?
answer: Abanyamerika b’abanyagihugu bari bakiriye ubutegetsi bwa Leta n’ingingo za Leta nini, bikaba bivuguruza ingingo ngenderwako za kera z’abanyagihugu .
wrong_answers:
  - Abanyaburaya b’abanyagihugu b’abanyagihugu batanguye gukoresha ijambo ‘libertarian’ mbere, bituma Abanyamerika bafata amajambo atandukanye .
  - Ishirahamwe ry’abarepubulikani ryashizeho ikimenyetso c’ubudandaji ijambo ‘liberal’ kandi ryabujije aba liberals ba kera kurikoresha .
  - Abanyagihugu b’abanyagihugu b’abanyagihugu bashaka kwitandukanya n’imigwi ya politike y’i Buraya inyuma y’Intambara ya Kabiri y’Isi Yose .
explanation: |
  Inyishu ibereye yerekana iterambere ry’ishimikiro ry’amateka rivugwa muri ico kigabane. Abanyamerika b’abanyagihugu b’abanyagihugu barahindukiye buhoro buhoro bashigikira ubufasha bwa Leta biciye mu migambi nka New Deal na Great Society, ivyo bikaba vyari bivuguruza ata guca ku ruhande ingingo ngenderwako za kera z’abanyagihugu b’abanyagihugu z’ubutegetsi bufise aho bugarukira be n’ubutunzi bwo kwidegemvya. Ivyo vyatumye aba liberalisme b’ukuri ba classique basubira kwiyita ‘aba libertariens’ kugira ngo batandukanye filozofiya yabo n’ico liberalisme ya Amerika yari yacitse. Inyishu zitari zo zirashoboka ariko mu vy’ukuri ntizigororotse - nta kibazo c’ikimenyetso c’ubudandaji cariho, Abanyaburaya ntibatumye habaho ihinduka ry’amajambo, kandi iyo mpinduka ntiyari ifitaniye isano n’ugutandukana kw’Abanyaburaya inyuma y’intambara.
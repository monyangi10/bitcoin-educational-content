question: Ni mabadiliko gani ya kihistoria yanayoelezea kwa nini wafuasi wa uliberali wa kitamaduni nchini Marekani walitumia neno 'mliberali' kuanzia miaka ya 1960?
answer: Waliberali wa Marekani walikuwa wamekumbatia uingiliaji kati wa serikali na sera kubwa za serikali, zikipingana na kanuni za kiliberali za kitamaduni
wrong_answers:
  - Watetezi wa haki za binaadamu wa Ulaya walianza kutumia neno 'mliberali' kwanza, na kuwalazimisha Wamarekani kutumia istilahi tofauti
  - Chama cha Republican kilitumia neno 'liliberali' kama alama ya biashara na kuwazuia waliberali wa kitamaduni kulitumia
  - Waliberali wa kitamaduni walitaka kujitenga na harakati za kisiasa za Ulaya baada ya Vita vya Pili vya Dunia
explanation: |
  Jibu sahihi linaonyesha mageuzi ya kihistoria yaliyoelezwa katika sura hiyo. 'Waliberali' wa Marekani walibadilika polepole kuelekea kuunga mkono uingiliaji kati mkubwa wa serikali kupitia programu kama vile Mpango Mpya na Jumuiya Kuu, ambazo zilipingana moja kwa moja na kanuni za kiliberali za kitamaduni za serikali ndogo na uchumi wa laissez-faire. Hii iliwalazimisha waliberali wa kweli wa kitamaduni kujiita 'waliberali' ili kutofautisha falsafa yao na kile ambacho kiliberali cha Marekani kilikuwa. Majibu yasiyo sahihi yanawezekana lakini si sahihi kihalisia - hakukuwa na suala la chapa ya biashara, Wazungu hawakusababisha mabadiliko ya istilahi, na mabadiliko hayo hayakuhusiana na utengamano wa Ulaya baada ya vita.
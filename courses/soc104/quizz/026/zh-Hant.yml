question: 什麼歷史轉變解釋了為什麼美國古典自由主義的支持者從 1960 年代開始採用「自由主義者」一詞？
answer: 美國自由主義者奉行國家干預主義和大政府政策，與古典自由主義原則背道而馳。
wrong_answers:
  - 歐洲自由主義者首先開始使用「自由主義者」一詞，迫使美國人採用不同的術語
  - 共和黨將「自由主義者」一詞註冊為商標，並阻止古典自由主義者使用該詞
  - 第二次世界大戰後，古典自由主義者希望與歐洲政治運動保持距離
explanation: |
  正確答案反映了本章所述的核心歷史演變。美國的「自由主義者」透過「新政」和「偉大社會」等計畫，逐漸轉向支持廣泛的國家干預，這直接違反了古典自由主義的有限政府和自由放任經濟原則。這迫使真正的古典自由主義者將自己重新塑造成「自由主義者」，以區別他們的哲學與美國自由主義的分別。錯誤的答案似是而非，但與事實不符 - 沒有商標的問題，歐洲人沒有推動術語的改變，而且這種轉變與戰後歐洲人的疏離沒有關係。
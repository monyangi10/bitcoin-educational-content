question: 从 20 世纪 60 年代开始，美国古典自由主义的支持者开始使用 "自由主义者 "一词，这是什么历史性转变的原因？
answer: 美国自由主义者奉行国家干预主义和大政府政策，违背了古典自由主义原则
wrong_answers:
  - 欧洲自由主义者首先开始使用 "自由主义者 "一词，迫使美国人采用不同的术语
  - 共和党将 "自由派 "一词注册为商标，并阻止经典自由派使用该词
  - 古典自由主义者希望与二战后的欧洲政治运动保持距离
explanation: |
  正确答案反映了本章所述的核心历史演变。美国的 "自由主义者 "逐渐转向通过 "新政 "和 "伟大社会 "等计划支持广泛的国家干预，这直接违背了古典自由主义的有限政府和自由放任经济原则。这迫使真正的古典自由主义者将自己重新塑造成 "自由主义者"，以区别于美国自由主义的理念。错误答案似是而非，但与事实不符--不存在商标问题，欧洲人没有推动术语的改变，这种转变与战后欧洲人的疏远无关。
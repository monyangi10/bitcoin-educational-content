question: 미국의 고전적 자유주의 지지자들이 1960년대부터 '자유주의자'라는 용어를 채택한 이유는 어떤 역사적 변화를 설명할 수 있을까요?
answer: 미국의 자유주의자들은 국가 개입주의와 큰 정부 정책을 수용하여 고전적 자유주의 원칙과 모순되었습니다
wrong_answers:
  - 유럽의 자유주의자들이 먼저 '자유주의자'라는 용어를 사용하기 시작했고, 미국인들은 다른 용어를 채택하게 되었습니다
  - 공화당은 '자유주의자'라는 용어를 상표로 등록하고 고전적 자유주의자들이 이 용어를 사용하지 못하도록 막았습니다
  - 고전적 자유주의자들은 2차 세계대전 이후 유럽의 정치 운동과 거리를 두고 싶어했습니다
explanation: |
  정답은 이 장에서 설명한 핵심적인 역사적 진화를 반영한 것입니다. 미국의 '자유주의자'들은 점차 뉴딜 정책과 위대한 사회와 같은 프로그램을 통해 광범위한 국가 개입을 지지하는 방향으로 전환했는데, 이는 제한적 정부와 자유방임 경제라는 고전적 자유주의 원칙과 정면으로 모순되는 것이었습니다. 이로 인해 진정한 고전적 자유주의자들은 자신들의 철학을 미국식 자유주의와 구별하기 위해 '자유주의자'로 이름을 바꾸어야 했습니다. 상표권 문제가 없었고, 유럽인들이 용어 변경을 주도하지 않았으며, 전후 유럽의 거리두기와도 관련이 없다는 점에서 오답은 그럴듯하지만 사실과 다릅니다.
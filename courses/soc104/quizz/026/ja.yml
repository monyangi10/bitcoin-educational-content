question: 米国で古典的自由主義の支持者が1960年代から「リバタリアン」という言葉を採用した理由は、どのような歴史的変化にあるのか？
answer: アメリカのリベラル派は国家介入主義と大きな政府政策を受け入れ、古典的なリベラルの原則と矛盾していた。
wrong_answers:
  - ヨーロッパのリベラル派が最初に「リバタリアン」という用語を使い始めたため、アメリカ人は異なる用語を使わざるを得なくなった。
  - 共和党は「リベラル」という言葉を商標登録し、古典的なリベラル派がこの言葉を使うのを阻止した。
  - 古典的リベラル派は、第二次世界大戦後のヨーロッパの政治運動から距離を置きたかった。
explanation: |
  正解は、本章で述べた歴史的変遷の核心を反映している。アメリカの「リベラル派」は、ニューディールやグレート・ソサエティのようなプログラムを通じて、国家による広範な介入を支持する方向に徐々にシフトしていったが、これは限定政府と自由放任経済という古典的リベラルの原則とは真っ向から対立するものだった。このため、真の古典的リベラル派は、自分たちの哲学をアメリカのリベラリズムの姿から区別するために、自らを「リバタリアン」と改名せざるを得なくなった。間違った答えはもっともらしいが、事実としては正しくない。商標の問題はなかったし、ヨーロッパ人が用語の変更を推進したわけでもなく、シフトは戦後のヨーロッパ離れに関連していたわけでもない。
question: ¿Qué cambio histórico explica por qué los partidarios del liberalismo clásico en Estados Unidos adoptaron el término "libertario" a partir de la década de 1960?
answer: Los liberales estadounidenses habían abrazado el intervencionismo estatal y las políticas de gran gobierno, contradiciendo los principios liberales clásicos
wrong_answers:
  - Los liberales europeos fueron los primeros en utilizar el término "libertario", lo que obligó a los estadounidenses a adoptar una terminología diferente
  - El Partido Republicano registró el término "liberal" e impidió que los liberales clásicos lo utilizaran
  - Los liberales clásicos querían distanciarse de los movimientos políticos europeos tras la Segunda Guerra Mundial
explanation: |
  La respuesta correcta refleja la evolución histórica fundamental descrita en el capítulo. Los "liberales" estadounidenses pasaron gradualmente a apoyar una amplia intervención estatal a través de programas como el New Deal y la Great Society, que contradecían directamente los principios liberales clásicos del gobierno limitado y la economía del laissez-faire. Esto obligó a los verdaderos liberales clásicos a rebautizarse como "libertarios" para distinguir su filosofía de aquello en lo que se había convertido el liberalismo estadounidense. Las respuestas erróneas son plausibles pero incorrectas: no hubo un problema de marcas, los europeos no impulsaron el cambio de terminología y el cambio no estuvo relacionado con el distanciamiento europeo de posguerra.
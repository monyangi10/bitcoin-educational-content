question: การเปลี่ยนแปลงทางประวัติศาสตร์ใดที่อธิบายว่าทำไมผู้สนับสนุนลัทธิเสรีนิยมคลาสสิกในสหรัฐอเมริกาจึงเริ่มใช้คำว่า 'ลิเบอร์ทาเรียน' ตั้งแต่ทศวรรษ 1960?
answer: ชาวอเมริกันเสรีนิยมได้ยอมรับการแทรกแซงของรัฐและนโยบายรัฐบาลขนาดใหญ่ ซึ่งขัดแย้งกับหลักการเสรีนิยมคลาสสิก
wrong_answers:
  - พวกเสรีนิยมยุโรปเริ่มใช้คำว่า 'libertarian' ก่อน ทำให้อเมริกันต้องใช้คำศัพท์ที่แตกต่างออกไป
  - พรรครีพับลิกันได้จดทะเบียนเครื่องหมายการค้าในคำว่า 'liberal' และป้องกันไม่ให้กลุ่มเสรีนิยมคลาสสิกใช้คำนี้
  - พวกเสรีนิยมคลาสสิกต้องการแยกตัวออกจากขบวนการทางการเมืองของยุโรปหลังสงครามโลกครั้งที่สอง
explanation: |
  คำตอบที่ถูกต้องสะท้อนถึงวิวัฒนาการทางประวัติศาสตร์หลักที่อธิบายไว้ในบทนี้ 'เสรีนิยม' ของอเมริกาได้เปลี่ยนไปสู่การสนับสนุนการแทรกแซงของรัฐอย่างกว้างขวางผ่านโครงการต่างๆ เช่น ข้อตกลงใหม่และสังคมที่ยิ่งใหญ่ ซึ่งขัดแย้งโดยตรงกับหลักการเสรีนิยมคลาสสิกของรัฐบาลที่จำกัดและเศรษฐกิจแบบปล่อยให้เป็นไปตามกลไกตลาด สิ่งนี้บังคับให้เสรีนิยมคลาสสิกที่แท้จริงต้องเปลี่ยนชื่อเป็น 'ลิเบอร์ทาเรียน' เพื่อแยกแยะปรัชญาของพวกเขาจากสิ่งที่เสรีนิยมอเมริกันได้กลายเป็น คำตอบที่ผิดนั้นดูเหมือนจะเป็นไปได้แต่ไม่ถูกต้องตามข้อเท็จจริง - ไม่มีปัญหาด้านเครื่องหมายการค้า ชาวยุโรปไม่ได้เป็นผู้ขับเคลื่อนการเปลี่ยนแปลงทางคำศัพท์ และการเปลี่ยนแปลงไม่ได้เกี่ยวข้องกับการเว้นระยะห่างของยุโรปหลังสงคราม
question: Pergeseran historis apa yang menjelaskan mengapa para pendukung liberalisme klasik di Amerika Serikat mengadopsi istilah 'libertarian' mulai tahun 1960-an?
answer: Kaum liberal Amerika telah menganut intervensionisme negara dan kebijakan pemerintah yang besar, yang bertentangan dengan prinsip-prinsip liberal klasik
wrong_answers:
  - Kaum liberal Eropa mulai menggunakan istilah 'libertarian' terlebih dahulu, memaksa orang Amerika untuk mengadopsi terminologi yang berbeda
  - Partai Republik menggunakan istilah 'liberal' sebagai merek dagang dan mencegah kaum liberal klasik untuk menggunakannya
  - Kaum liberal klasik ingin menjauhkan diri dari gerakan politik Eropa setelah Perang Dunia II
explanation: |
  Jawaban yang benar mencerminkan evolusi sejarah inti yang dijelaskan dalam bab ini. Kaum 'liberal' Amerika secara bertahap bergeser ke arah mendukung intervensi negara yang luas melalui program-program seperti New Deal dan Great Society, yang secara langsung bertentangan dengan prinsip-prinsip liberal klasik mengenai pemerintahan terbatas dan ekonomi laissez-faire. Hal ini memaksa kaum liberal klasik sejati untuk mengubah nama mereka menjadi 'libertarian' untuk membedakan filosofi mereka dengan liberalisme Amerika. Jawaban yang salah tersebut masuk akal namun secara faktual tidak benar - tidak ada masalah merek dagang, orang Eropa tidak mendorong perubahan terminologi, dan pergeseran tersebut tidak terkait dengan jarak pasca-perang Eropa.
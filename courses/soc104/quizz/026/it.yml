question: Quale cambiamento storico spiega perché i sostenitori del liberalismo classico negli Stati Uniti hanno adottato il termine "libertario" a partire dagli anni '60?
answer: I liberali americani avevano abbracciato l'interventismo statale e le politiche di big government, contraddicendo i principi liberali classici
wrong_answers:
  - I liberali europei hanno iniziato a usare per primi il termine "libertario", costringendo gli americani ad adottare una terminologia diversa
  - Il Partito Repubblicano ha registrato il termine "liberale" e ha impedito ai liberali classici di usarlo
  - I liberali classici volevano prendere le distanze dai movimenti politici europei del secondo dopoguerra
explanation: |
  La risposta corretta riflette la principale evoluzione storica descritta nel capitolo. I "liberali" americani si spostarono gradualmente verso il sostegno di un ampio intervento statale attraverso programmi come il New Deal e la Great Society, che contraddicevano direttamente i principi liberali classici di governo limitato e di economia del laissez-faire. Questo costrinse i veri liberali classici a ribattezzarsi "libertari" per distinguere la loro filosofia da ciò che era diventato il liberalismo americano. Le risposte sbagliate sono plausibili ma di fatto errate: non c'è stata una questione di marchio, gli europei non hanno guidato il cambiamento terminologico e il cambiamento non è stato legato all'allontanamento dall'Europa nel dopoguerra.
question: Jaký historický posun vysvětluje, proč zastánci klasického liberalismu ve Spojených státech od 60. let 20. století přijali termín "libertarián"?
answer: Američtí liberálové přijali státní intervencionismus a politiku velké vlády, což bylo v rozporu s klasickými liberálními zásadami
wrong_answers:
  - Evropští liberálové začali používat termín "libertarián" jako první, což donutilo Američany přijmout odlišnou terminologii
  - Republikánská strana získala ochrannou známku na výraz "liberální" a zabránila klasickým liberálům v jeho používání
  - Klasičtí liberálové se chtěli po druhé světové válce distancovat od evropských politických hnutí
explanation: |
  Správná odpověď odráží základní historický vývoj popsaný v kapitole. Američtí "liberálové" postupně přešli k podpoře rozsáhlých státních zásahů prostřednictvím programů jako New Deal a Great Society, které byly v přímém rozporu s klasickými liberálními principy omezené vlády a laissez-faire ekonomiky. To donutilo skutečné klasické liberály, aby se přejmenovali na "libertariány" a odlišili svou filozofii od toho, čím se stal americký liberalismus. Špatné odpovědi jsou sice pravděpodobné, ale věcně nesprávné - nešlo o žádnou ochrannou známku, Evropané nebyli hnacím motorem změny terminologie a změna nesouvisela s poválečným odklonem Evropy.
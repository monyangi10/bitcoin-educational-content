question: What historical shift explains why supporters of classical liberalism in the United States adopted the term 'libertarian' starting in the 1960s?
answer: American liberals had embraced state interventionism and big government policies, contradicting classical liberal principles
wrong_answers:
  - European liberals began using the term 'libertarian' first, forcing Americans to adopt different terminology
  - The Republican Party trademarked the term 'liberal' and prevented classical liberals from using it
  - Classical liberals wanted to distance themselves from European political movements after World War II
explanation: |
  The correct answer reflects the core historical evolution described in the chapter. American 'liberals' gradually shifted toward supporting extensive state intervention through programs like the New Deal and Great Society, which directly contradicted classical liberal principles of limited government and laissez-faire economics. This forced true classical liberals to rebrand themselves as 'libertarians' to distinguish their philosophy from what American liberalism had become. The wrong answers are plausible but factually incorrect - there was no trademark issue, Europeans didn't drive the terminology change, and the shift wasn't related to post-war European distancing.

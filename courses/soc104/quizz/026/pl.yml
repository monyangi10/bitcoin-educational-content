question: Jaka historyczna zmiana wyjaśnia, dlaczego zwolennicy klasycznego liberalizmu w Stanach Zjednoczonych przyjęli termin "libertariański" począwszy od lat 60. ubiegłego wieku?
answer: Amerykańscy liberałowie przyjęli interwencjonizm państwowy i politykę wielkiego rządu, zaprzeczając klasycznym liberalnym zasadom
wrong_answers:
  - Europejscy liberałowie zaczęli używać terminu "libertariański" jako pierwsi, zmuszając Amerykanów do przyjęcia innej terminologii
  - Partia Republikańska opatrzyła termin "liberał" znakiem towarowym i uniemożliwiła klasycznym liberałom jego używanie
  - Klasyczni liberałowie chcieli zdystansować się od europejskich ruchów politycznych po II wojnie światowej
explanation: |
  Prawidłowa odpowiedź odzwierciedla główną ewolucję historyczną opisaną w rozdziale. Amerykańscy "liberałowie" stopniowo przesuwali się w kierunku wspierania szeroko zakrojonej interwencji państwa poprzez programy takie jak New Deal i Great Society, które bezpośrednio zaprzeczały klasycznym liberalnym zasadom ograniczonego rządu i ekonomii leseferystycznej. Zmusiło to prawdziwych klasycznych liberałów do przemianowania się na "libertarian", aby odróżnić swoją filozofię od tego, czym stał się amerykański liberalizm. Błędne odpowiedzi są prawdopodobne, ale niezgodne z faktami - nie było kwestii znaku towarowego, Europejczycy nie doprowadzili do zmiany terminologii, a zmiana nie była związana z powojennym dystansem Europy.
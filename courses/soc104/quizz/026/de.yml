question: Welcher historische Wandel erklärt, warum die Anhänger des klassischen Liberalismus in den Vereinigten Staaten ab den 1960er Jahren den Begriff "libertär" übernahmen?
answer: Die amerikanischen Liberalen hatten sich den Staatsinterventionismus und die Politik der großen Regierungen zu eigen gemacht, was den klassischen liberalen Grundsätzen widersprach
wrong_answers:
  - Die europäischen Liberalen begannen zuerst, den Begriff "libertär" zu verwenden, was die Amerikaner dazu zwang, eine andere Terminologie zu übernehmen
  - Die Republikanische Partei hat sich den Begriff "liberal" schützen lassen und die klassischen Liberalen daran gehindert, ihn zu verwenden
  - Die klassischen Liberalen wollten sich von den europäischen politischen Bewegungen nach dem Zweiten Weltkrieg distanzieren
explanation: |
  Die richtige Antwort spiegelt die im Kapitel beschriebene zentrale historische Entwicklung wider. Die amerikanischen "Liberalen" gingen allmählich dazu über, durch Programme wie den New Deal und die Great Society umfangreiche staatliche Eingriffe zu unterstützen, was den klassischen liberalen Grundsätzen einer begrenzten Regierung und der Laissez-faire-Wirtschaft direkt widersprach. Dies zwang die echten klassischen Liberalen, sich in "Libertäre" umzubenennen, um ihre Philosophie von dem zu unterscheiden, was der amerikanische Liberalismus geworden war. Die falschen Antworten sind zwar plausibel, aber faktisch falsch - es gab kein Markenzeichenproblem, die Europäer waren nicht die treibende Kraft hinter der Terminologieänderung, und der Wandel stand nicht im Zusammenhang mit der europäischen Distanzierung der Nachkriegszeit.
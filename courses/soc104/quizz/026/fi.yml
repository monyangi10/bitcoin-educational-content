question: Mikä historiallinen muutos selittää, miksi klassisen liberalismin kannattajat Yhdysvalloissa ottivat käyttöön termin "libertarian" 1960-luvulta alkaen?
answer: Amerikkalaiset liberaalit olivat omaksuneet valtion interventionismin ja suuren hallituksen politiikan, mikä oli ristiriidassa klassisten liberaalien periaatteiden kanssa
wrong_answers:
  - Eurooppalaiset liberaalit alkoivat käyttää termiä "libertarian" ensin, mikä pakotti amerikkalaiset omaksumaan toisen terminologian
  - Republikaaninen puolue suojasi termin "liberaali" ja esti klassisia liberaaleja käyttämästä sitä
  - Klassiset liberaalit halusivat ottaa etäisyyttä eurooppalaisiin poliittisiin liikkeisiin toisen maailmansodan jälkeen
explanation: |
  Oikea vastaus kuvastaa luvussa kuvattua historiallista kehitystä. Amerikkalaiset "liberaalit" siirtyivät vähitellen tukemaan laajaa valtiollista puuttumista New Dealin ja Great Societyn kaltaisten ohjelmien avulla, jotka olivat suoraan ristiriidassa rajoitetun hallinnon ja laissez-faire-talouden klassisten liberaalien periaatteiden kanssa. Tämä pakotti todelliset klassiset liberaalit nimeämään itsensä uudelleen "libertaareiksi" erottaakseen filosofiansa siitä, mitä amerikkalaisesta liberalismista oli tullut. Väärät vastaukset ovat uskottavia mutta asiallisesti virheellisiä - tavaramerkkikysymystä ei ollut, eurooppalaiset eivät ajaneet terminologian muutosta, eikä muutos liittynyt sodanjälkeiseen eurooppalaiseen etääntymiseen.
question: वह कौन सा ऐतिहासिक परिवर्तन है जो यह बताता है कि संयुक्त राज्य अमेरिका में शास्त्रीय उदारवाद के समर्थकों ने 1960 के दशक से 'स्वतंत्रतावादी' शब्द को क्यों अपनाया?
answer: अमेरिकी उदारवादियों ने राज्य के हस्तक्षेपवाद और बड़ी सरकारी नीतियों को अपना लिया था, जो शास्त्रीय उदारवादी सिद्धांतों के विपरीत था।
wrong_answers:
  - यूरोपीय उदारवादियों ने सबसे पहले 'स्वतंत्रतावादी' शब्द का प्रयोग शुरू किया, जिसके कारण अमेरिकियों को अलग शब्दावली अपनानी पड़ी।
  - रिपब्लिकन पार्टी ने 'उदारवादी' शब्द को ट्रेडमार्क करा लिया और शास्त्रीय उदारवादियों को इसका इस्तेमाल करने से रोक दिया।
  - द्वितीय विश्व युद्ध के बाद शास्त्रीय उदारवादी यूरोपीय राजनीतिक आंदोलनों से खुद को अलग रखना चाहते थे।
explanation: |
  सही उत्तर अध्याय में वर्णित मूल ऐतिहासिक विकास को दर्शाता है। अमेरिकी 'उदारवादी' धीरे-धीरे न्यू डील और ग्रेट सोसाइटी जैसे कार्यक्रमों के माध्यम से व्यापक राज्य हस्तक्षेप का समर्थन करने लगे, जो सीमित सरकार और मुक्त बाज़ार अर्थव्यवस्था के शास्त्रीय उदारवादी सिद्धांतों के सीधे विपरीत था। इसने सच्चे शास्त्रीय उदारवादियों को अपनी विचारधारा को अमेरिकी उदारवाद से अलग करने के लिए खुद को 'स्वतंत्रतावादी' के रूप में पुनर्परिभाषित करने के लिए मजबूर किया। गलत उत्तर तर्कसंगत तो हैं, लेकिन तथ्यात्मक रूप से गलत हैं - कोई ट्रेडमार्क का मुद्दा नहीं था, यूरोपीय लोगों ने शब्दावली परिवर्तन को प्रेरित नहीं किया, और यह परिवर्तन युद्धोत्तर यूरोपीय अलगाव से संबंधित नहीं था।
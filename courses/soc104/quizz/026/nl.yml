question: Welke historische verschuiving verklaart waarom aanhangers van het klassieke liberalisme in de Verenigde Staten de term 'libertarisch' zijn gaan gebruiken vanaf de jaren 1960?
answer: Amerikaanse liberalen hadden het staatsinterventionisme en het beleid van grote regeringen omarmd, wat in strijd was met de klassieke liberale principes
wrong_answers:
  - Europese liberalen begonnen de term 'libertarisch' als eerste te gebruiken, waardoor Amerikanen gedwongen werden andere terminologie te gebruiken
  - De Republikeinse Partij heeft de term 'liberaal' als handelsmerk en verhindert klassieke liberalen om hem te gebruiken
  - Klassiek-liberalen wilden afstand nemen van Europese politieke bewegingen na de Tweede Wereldoorlog
explanation: |
  Het juiste antwoord weerspiegelt de belangrijkste historische evolutie die in het hoofdstuk wordt beschreven. Amerikaanse 'liberalen' verschoven geleidelijk in de richting van het ondersteunen van uitgebreide staatsinterventie door programma's als de New Deal en de Great Society, die rechtstreeks in tegenspraak waren met de klassiek-liberale principes van beperkte overheid en laissez-faire economie. Dit dwong echte klassiek-liberalen om zich te rebranden als 'libertariërs' om hun filosofie te onderscheiden van wat het Amerikaanse liberalisme was geworden. De foute antwoorden zijn plausibel maar feitelijk onjuist - er was geen sprake van een handelsmerkkwestie, Europeanen waren niet de drijvende kracht achter de verandering van terminologie en de verschuiving was niet gerelateerd aan de naoorlogse Europese distantiëring.
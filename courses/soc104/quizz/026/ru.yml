question: Какой исторический сдвиг объясняет, почему сторонники классического либерализма в США приняли термин "либертарианец", начиная с 1960-х годов?
answer: Американские либералы приняли политику государственного вмешательства и большого правительства, что противоречило классическим либеральным принципам
wrong_answers:
  - Европейские либералы начали использовать термин "либертарианец" первыми, что вынудило американцев принять другую терминологию
  - Республиканская партия закрепила за собой торговую марку "либерал" и не позволяет классическим либералам использовать этот термин
  - Классические либералы стремились дистанцироваться от европейских политических движений после Второй мировой войны
explanation: |
  Правильный ответ отражает основную историческую эволюцию, описанную в главе. Американские "либералы" постепенно перешли к поддержке широкого государственного вмешательства через такие программы, как "Новый курс" и "Великое общество", что прямо противоречило классическим либеральным принципам ограниченного правительства и экономики laissez-faire. Это заставило истинных классических либералов переименовать себя в "либертарианцев", чтобы отличить свою философию от того, во что превратился американский либерализм. Неправильные ответы правдоподобны, но фактически неверны: не было вопроса о торговой марке, европейцы не были инициаторами изменения терминологии, и изменение не было связано с послевоенным отдалением Европы.
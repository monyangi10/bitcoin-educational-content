question: Sự thay đổi lịch sử nào giải thích lý do tại sao những người ủng hộ chủ nghĩa tự do cổ điển ở Hoa Kỳ lại bắt đầu sử dụng thuật ngữ "người theo chủ nghĩa tự do cá nhân" từ những năm 1960?
answer: Những người theo chủ nghĩa tự do Mỹ đã chấp nhận chủ nghĩa can thiệp của nhà nước và các chính sách chính phủ lớn, trái ngược với các nguyên tắc tự do cổ điển.
wrong_answers:
  - Những người theo chủ nghĩa tự do châu Âu là những người đầu tiên sử dụng thuật ngữ "libertarian" (người theo chủ nghĩa tự do cá nhân), buộc người Mỹ phải sử dụng thuật ngữ khác.
  - Đảng Cộng hòa đã đăng ký nhãn hiệu cho thuật ngữ 'tự do' và ngăn cấm những người theo chủ nghĩa tự do truyền thống sử dụng thuật ngữ này.
  - Những người theo chủ nghĩa tự do cổ điển muốn tách mình khỏi các phong trào chính trị châu Âu sau Thế chiến II.
explanation: |
  Câu trả lời đúng phản ánh sự tiến hóa lịch sử cốt lõi được mô tả trong chương. Những người theo chủ nghĩa tự do Mỹ dần chuyển sang ủng hộ sự can thiệp rộng rãi của nhà nước thông qua các chương trình như New Deal và Great Society, điều này mâu thuẫn trực tiếp với các nguyên tắc tự do cổ điển về chính phủ hạn chế và kinh tế tự do cạnh tranh. Điều này buộc những người theo chủ nghĩa tự do cổ điển chân chính phải tự đổi tên thành "những người theo chủ nghĩa tự do cá nhân" để phân biệt triết lý của họ với những gì chủ nghĩa tự do Mỹ đã trở thành. Các câu trả lời sai có vẻ hợp lý nhưng không chính xác về mặt thực tế - không có vấn đề về nhãn hiệu, người châu Âu không phải là động lực thúc đẩy sự thay đổi thuật ngữ, và sự chuyển dịch không liên quan đến sự xa cách của châu Âu sau chiến tranh.
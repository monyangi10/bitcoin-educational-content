question: چه تغییر تاریخی توضیح می‌دهد که چرا حامیان لیبرالیسم کلاسیک در ایالات متحده از دهه ۱۹۶۰ به بعد اصطلاح 'لیبرتارین' را پذیرفتند؟
answer: لیبرال‌های آمریکایی مداخله‌گرایی دولتی و سیاست‌های دولت بزرگ را پذیرفته بودند که با اصول لیبرالیسم کلاسیک در تضاد بود.
wrong_answers:
  - لیبرال‌های اروپایی ابتدا از اصطلاح 'لیبرتارین' استفاده کردند و آمریکایی‌ها را مجبور به پذیرش اصطلاحات متفاوتی کردند.
  - حزب جمهوری‌خواه اصطلاح 'لیبرال' را به عنوان علامت تجاری ثبت کرد و از استفاده لیبرال‌های کلاسیک از آن جلوگیری کرد.
  - لیبرال‌های کلاسیک می‌خواستند پس از جنگ جهانی دوم خود را از جنبش‌های سیاسی اروپایی دور کنند.
explanation: |
  پاسخ صحیح بازتاب‌دهنده تکامل تاریخی اصلی است که در فصل توصیف شده است. 'لیبرال‌های' آمریکایی به تدریج به سمت حمایت از مداخله گسترده دولت از طریق برنامه‌هایی مانند نیو دیل و جامعه بزرگ حرکت کردند، که به طور مستقیم با اصول لیبرالیسم کلاسیک از دولت محدود و اقتصاد لسه‌فر در تضاد بود. این امر لیبرال‌های کلاسیک واقعی را مجبور کرد تا خود را به عنوان 'لیبرتارین' بازتعریف کنند تا فلسفه خود را از آنچه لیبرالیسم آمریکایی شده بود متمایز کنند. پاسخ‌های نادرست قابل قبول هستند اما از نظر واقعی نادرستند - هیچ مسئله علامت تجاری وجود نداشت، اروپایی‌ها تغییر اصطلاح‌شناسی را هدایت نکردند، و این تغییر به فاصله‌گیری اروپای پس از جنگ مربوط نبود.
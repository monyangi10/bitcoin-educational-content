question: एरिक ह्यूजेस के Cypherpunk घोषणापत्र के अनुसार, गोपनीयता और स्वतंत्रता के अपने लक्ष्यों को प्राप्त करने के लिए साइफरपंक को मुख्य रूप से किस विधि का उपयोग करना चाहिए?
answer: ऐसे क्रिप्टोग्राफिक सिस्टम बनाने के लिए कोड लिखना जो राजनीतिक विभाजनों को अप्रासंगिक बना दें
wrong_answers:
  - गोपनीयता संरक्षण कानूनों और विनियमों को और अधिक सशक्त बनाने के लिए सरकारों पर दबाव डालना
  - निगरानी के खिलाफ बड़े पैमाने पर विरोध प्रदर्शन और सविनय अवज्ञा अभियान आयोजित करना।
  - डिजिटल गोपनीयता अधिकारों के बारे में जन जागरूकता बढ़ाने के लिए शैक्षिक कार्यक्रम तैयार करना।
explanation: |
  एरिक ह्यूजेस ने स्पष्ट रूप से कहा कि 'साइफरपंक कोड लिखते हैं' यही उनका मूल दृष्टिकोण है। घोषणापत्र में इस बात पर ज़ोर दिया गया है कि साइफरपंक आशाओं और इच्छाओं में सुकून नहीं पाते, बल्कि क्रिप्टोग्राफी के माध्यम से गुमनाम प्रणालियाँ बनाकर सक्रिय रूप से हस्तक्षेप करते हैं।
  यह स्वतंत्रता के अमूर्त विचारों को ठोस आर्थिक और सामाजिक वास्तविकता में बदल देता है, जिससे राजनीतिक विभाजन मनमाने और अनावश्यक हो जाते हैं। अन्य विकल्प पारंपरिक राजनीतिक सक्रियता का प्रतिनिधित्व करते हैं, जो संस्थागत सुधार के बजाय तकनीकी समाधानों पर आधारित साइफरपंक दर्शन के विपरीत है।
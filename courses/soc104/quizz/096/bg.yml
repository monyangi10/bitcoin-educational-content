question: Според манифеста Cypherpunk на Ерик Хюз кой е основният метод, който шифровъчните пънкари трябва да използват, за да постигнат целите си за неприкосновеност на личния живот и свобода?
answer: Писане на код за изграждане на криптографски системи, които правят политическите разделения без значение
wrong_answers:
  - Лобиране пред правителствата за приемане на по-строги закони и разпоредби за защита на личните данни
  - Организиране на масови протести и кампании за гражданско неподчинение срещу наблюдението
  - Създаване на образователни програми за повишаване на обществената осведоменост относно правата на цифровата неприкосновеност на личния живот
explanation: |
  Ерик Хюз изрично заявява, че "Cypherpunks пишат код" е техният основен подход. В манифеста се подчертава, че шифърпънкърите не намират утеха в надеждите и желанията, а се намесват активно, като изграждат анонимни системи чрез криптография.
  По този начин абстрактните идеи за свобода се превръщат в конкретна икономическа и обществена реалност, като политическите разделения стават произволни и ненужни. Другите варианти представляват традиционен политически активизъм, който е в противоречие с философията на шифърпънка за технологични решения вместо институционални реформи.
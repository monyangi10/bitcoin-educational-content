question: 에릭 휴즈의 Cypherpunk 선언문에 따르면, 사이퍼펑크가 프라이버시와 자유라는 목표를 달성하기 위해 주로 사용해야 하는 방법은 무엇인가요?
answer: 정치적 분열을 무색하게 만드는 암호화 시스템 구축을 위한 코드 작성
wrong_answers:
  - 더 강력한 개인정보 보호법 및 규정 통과를 위한 정부 로비 활동
  - 감시에 반대하는 대규모 시위 및 시민 불복종 캠페인 조직하기
  - 디지털 개인정보 보호 권리에 대한 대중의 인식을 높이기 위한 교육 프로그램 만들기
explanation: |
  에릭 휴즈는 '사이퍼펑크는 코드를 작성한다'고 그들의 근본적인 접근 방식을 명시적으로 밝혔습니다. 이 선언문은 사이퍼펑크가 희망과 소망에서 위안을 찾는 것이 아니라 암호화를 통해 익명의 시스템을 구축함으로써 적극적으로 개입한다는 점을 강조합니다.
  이는 자유에 대한 추상적인 개념을 구체적인 경제적, 사회적 현실로 바꾸어 정치적 구분을 자의적이고 불필요한 것으로 만듭니다. 다른 옵션은 전통적인 정치 활동주의로, 제도 개혁보다 기술적인 해결책을 중시하는 사이퍼펑크의 철학과 모순됩니다.
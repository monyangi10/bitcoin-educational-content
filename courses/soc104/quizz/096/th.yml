question: ตามคำประกาศ Cypherpunk ของ Eric Hughes วิธีหลักที่ cypherpunks ควรใช้เพื่อบรรลุเป้าหมายของความเป็นส่วนตัวและเสรีภาพคืออะไร?
answer: เขียนโค้ดเพื่อสร้างระบบการเข้ารหัสที่ทำให้ความแตกแยกทางการเมืองไม่มีความสำคัญ
wrong_answers:
  - การวิ่งเต้นรัฐบาลเพื่อออกกฎหมายและระเบียบข้อบังคับที่เข้มงวดขึ้นในการคุ้มครองความเป็นส่วนตัว
  - จัดการประท้วงครั้งใหญ่และการรณรงค์ไม่เชื่อฟังพลเมืองต่อต้านการสอดส่อง
  - การสร้างโปรแกรมการศึกษาเพื่อเพิ่มความตระหนักรู้ของสาธารณชนเกี่ยวกับสิทธิความเป็นส่วนตัวทางดิจิทัล
explanation: |
  Eric Hughes ระบุอย่างชัดเจนว่า 'Cypherpunks write code' เป็นแนวทางพื้นฐานของพวกเขา แถลงการณ์เน้นย้ำว่า cypherpunks ไม่ได้หาความสบายใจจากความหวังและความปรารถนา แต่เข้ามาแทรกแซงอย่างแข็งขันโดยการสร้างระบบนิรนามผ่านการเข้ารหัสลับ สิ่งนี้เปลี่ยนแนวคิดนามธรรมของเสรีภาพให้กลายเป็นความจริงทางเศรษฐกิจและสังคมที่เป็นรูปธรรม ทำให้การแบ่งแยกทางการเมืองกลายเป็นสิ่งที่ไม่จำเป็นและไม่มีความหมาย ตัวเลือกอื่น ๆ แสดงถึงการเคลื่อนไหวทางการเมืองแบบดั้งเดิม ซึ่งขัดแย้งกับปรัชญาของ cypherpunk ที่เน้นการแก้ปัญหาทางเทคโนโลยีมากกว่าการปฏิรูปสถาบัน
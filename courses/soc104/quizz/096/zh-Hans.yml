question: 根据埃里克-休斯（Eric Hughes）的《Cypherpunk 宣言》，网络朋克应该使用什么主要方法来实现隐私和自由的目标？
answer: 编写代码，建立密码系统，让政治分歧不再重要
wrong_answers:
  - 游说政府通过更强有力的隐私保护法律法规
  - 组织反对监控的大规模抗议和非暴力反抗运动
  - 制定教育计划，提高公众对数字隐私权的认识
explanation: |
  埃里克-休斯（Eric Hughes）明确提出 "赛弗朋克写代码 "是他们的基本方法。宣言强调，"赛弗朋克 "不会在希望和愿望中寻找慰藉，而是通过密码学建立匿名系统，积极进行干预。
  这将抽象的自由理念转化为具体的经济和社会现实，使政治分歧变得随意和不必要。其他选项则代表了传统的政治行动主义，这与赛弗朋克的技术解决方案重于制度改革的理念相悖。
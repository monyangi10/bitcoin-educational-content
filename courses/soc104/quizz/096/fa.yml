question: بر اساس بیانیه Cypherpunk اریک هیوز، روش اصلی که سایفرپانک‌ها باید برای دستیابی به اهداف خود در زمینه حریم خصوصی و آزادی استفاده کنند، چیست؟
answer: نوشتن کد برای ساخت سیستم‌های رمزنگاری که تقسیمات سیاسی را بی‌اهمیت می‌کند
wrong_answers:
  - لابی کردن با دولت‌ها برای تصویب قوانین و مقررات قوی‌تر حفاظت از حریم خصوصی
  - سازماندهی اعتراضات گسترده و کمپین‌های نافرمانی مدنی علیه نظارت
  - ایجاد برنامه‌های آموزشی برای افزایش آگاهی عمومی درباره حقوق حریم خصوصی دیجیتال
explanation: |
  اریک هیوز به‌طور صریح بیان کرد که «سایفرپانک‌ها کد می‌نویسند» به‌عنوان رویکرد اساسی خود. این بیانیه تأکید می‌کند که سایفرپانک‌ها به امید و آرزو دل‌خوش نمی‌کنند، بلکه با ساخت سیستم‌های ناشناس از طریق رمزنگاری به‌طور فعال مداخله می‌کنند.  
  این امر ایده‌های انتزاعی آزادی را به واقعیت اقتصادی و اجتماعی ملموس تبدیل می‌کند و تقسیمات سیاسی را بی‌معنی و غیرضروری می‌سازد. گزینه‌های دیگر نمایانگر فعالیت سیاسی سنتی هستند که با فلسفه سایفرپانک مبنی بر راه‌حل‌های تکنولوژیکی به‌جای اصلاحات نهادی در تضاد است.
question: Согласно "Манифесту Cypherpunk" Эрика Хьюза, какой основной метод должны использовать шифровальщики для достижения своих целей - приватности и свободы?
answer: Написание кода для создания криптографических систем, которые делают политические разногласия неважными
wrong_answers:
  - Лоббирование правительств с целью принятия более строгих законов и правил по защите частной жизни
  - Организация массовых протестов и кампаний гражданского неповиновения против слежки
  - Создание образовательных программ для повышения осведомленности общественности о правах на неприкосновенность цифровой информации
explanation: |
  Эрик Хьюз прямо заявил, что "киберпанки пишут код" - это их фундаментальный подход. В манифесте подчеркивается, что киберпанки не находят утешения в надеждах и желаниях, а активно вмешиваются, создавая анонимные системы с помощью криптографии.
  Это превращает абстрактные идеи свободы в конкретную экономическую и социальную реальность, делая политические разделения произвольными и ненужными. Остальные варианты представляют собой традиционный политический активизм, что противоречит философии киберпанка - технологические решения вместо институциональных реформ.
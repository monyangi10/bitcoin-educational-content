question: エリック・ヒューズの『Cypherpunk宣言』によれば、プライバシーと自由という目標を達成するために、サイファーパンクが使うべき主要な方法とは何か？
answer: 政治的分裂を無意味にする暗号システムを構築するコードを書く
wrong_answers:
  - プライバシー保護に関する法律や規制を強化するよう各国政府に働きかける。
  - 監視に対する大規模な抗議や市民的不服従運動の組織化
  - デジタル・プライバシーの権利に関する一般市民の意識を高めるための教育プログラムの作成
explanation: |
  エリック・ヒューズは、彼らの基本的なアプローチとして「サイファーパンクはコードを書く」と明言している。マニフェストでは、サイファーパンクスは希望や願望に安らぎを見出すのではなく、暗号技術を通じて匿名システムを構築することで積極的に介入することを強調している。
  これにより、自由という抽象的なアイデアを具体的な経済的・社会的現実に変換し、政治的分断を恣意的で不要なものにする。他の選択肢は伝統的な政治活動主義を表しており、制度改革よりも技術的解決策を求めるサイファーパンクの哲学と矛盾する。
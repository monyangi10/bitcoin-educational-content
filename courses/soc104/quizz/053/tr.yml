question: Özgürlükçü siyaset felsefesini güç kullanımına ilişkin diğer ideolojilerden ayıran temel ilke nedir?
answer: Meşru nefsi müdafaa dışında başkalarına karşı güç kullanılmasını yasaklayan saldırmazlık ilkesi
wrong_answers:
  - Bireysel haklar yerine topluluk çıkarlarını korumak için devlet müdahalesine izin veren kolektif savunma ilkesi
  - Daha büyük toplumsal faydaya hizmet ettiğinde devlet zorlamasına izin veren orantılı güç ilkesi
  - Demokratik kurumlarda çoğunluğun oyuyla onaylandığında gücü meşru kılan demokratik yetki ilkesi
explanation: |
  Saldırmazlık ilkesi liberteryen felsefenin temel taşıdır ve hiç kimsenin başka bir kişiye veya mülküne karşı fiziksel güç kullanma veya tehdit etme hakkına sahip olmadığını belirtir.
  Bu ilke dolandırıcılık, hırsızlık ve zorlamayı ahlaki olarak kınanır hale getirir ve güç sadece meşru müdafaa durumunda haklı görülebilir. Liberteryenler, bireyler tarafından yapılması halinde ahlaka aykırı kabul edilecek eylemlerin gerçekleştirilmesi için devlete özel izinler vermeyi reddeder ve istisnasız herkesin aynı ahlaki kurala uyması konusunda ısrarcı olurlar.
question: ¿Cuál es el principio fundamental que distingue a la filosofía política libertaria de otras ideologías en lo que respecta al uso de la fuerza?
answer: El principio de no agresión, que prohíbe utilizar la fuerza contra otros salvo en legítima defensa
wrong_answers:
  - El principio de defensa colectiva, que permite la intervención del Estado para proteger los intereses de la comunidad frente a los derechos individuales
  - El principio de fuerza proporcional, que permite la coerción gubernamental cuando sirve a un bien social mayor
  - El principio del mandato democrático, que justifica la fuerza cuando se aprueba por mayoría en las instituciones democráticas
explanation: |
  El principio de no agresión es la piedra angular de la filosofía libertaria, ya que establece que nadie tiene derecho a iniciar o amenazar con el uso de la fuerza física contra otra persona o su propiedad.
  Este principio hace que el fraude, el robo y la coacción sean moralmente reprobables, y que la fuerza sólo se justifique en defensa propia. Los libertarios se niegan a conceder al Estado permisos especiales para cometer actos que se considerarían inmorales si los cometieran individuos, insistiendo en que todo el mundo sigue el mismo código moral sin excepciones.
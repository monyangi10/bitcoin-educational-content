question: Nguyên tắc cơ bản nào phân biệt triết học chính trị tự do với các hệ tư tưởng khác về việc sử dụng vũ lực?
answer: Nguyên tắc không gây hấn, cấm sử dụng vũ lực chống lại người khác trừ trường hợp tự vệ chính đáng.
wrong_answers:
  - Nguyên tắc phòng thủ tập thể cho phép nhà nước can thiệp để bảo vệ lợi ích cộng đồng hơn là quyền cá nhân.
  - Nguyên tắc lực lượng tương xứng, cho phép chính phủ sử dụng biện pháp cưỡng chế khi điều đó phục vụ lợi ích chung của xã hội.
  - Nguyên tắc ủy quyền dân chủ, cho phép sử dụng vũ lực khi được đa số phiếu tán thành trong các thể chế dân chủ.
explanation: |
  Nguyên tắc không gây hấn là nền tảng của triết học tự do, khẳng định rằng không ai có quyền khởi xướng hoặc đe dọa sử dụng vũ lực đối với người khác hoặc tài sản của họ.
  
  Nguyên tắc này coi gian lận, trộm cắp và cưỡng bức là những hành vi đáng lên án về mặt đạo đức, chỉ cho phép sử dụng vũ lực để tự vệ. Những người theo chủ nghĩa tự do từ chối trao cho nhà nước quyền đặc biệt để thực hiện những hành vi mà nếu do cá nhân thực hiện sẽ bị coi là vô đạo đức, nhấn mạnh rằng mọi người đều tuân theo cùng một chuẩn mực đạo đức mà không có ngoại lệ.
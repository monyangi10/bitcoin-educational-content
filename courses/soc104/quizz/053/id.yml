question: Apa prinsip dasar yang membedakan filosofi politik libertarian dengan ideologi lain dalam hal penggunaan kekerasan?
answer: Prinsip non-agresi, yang melarang penggunaan kekerasan terhadap orang lain kecuali dalam rangka pembelaan diri yang sah
wrong_answers:
  - Prinsip pertahanan kolektif, yang memungkinkan intervensi negara untuk melindungi kepentingan masyarakat di atas hak-hak individu
  - Prinsip kekuatan proporsional, yang mengizinkan pemaksaan pemerintah ketika hal tersebut melayani kebaikan sosial yang lebih besar
  - Prinsip mandat demokratis, yang membenarkan pemaksaan jika disetujui oleh suara mayoritas di lembaga-lembaga demokratis
explanation: |
  Prinsip non-agresi adalah landasan filosofi libertarian, yang menyatakan bahwa tidak seorang pun memiliki hak untuk memulai atau mengancam dengan kekerasan fisik terhadap orang lain atau properti mereka.
  Prinsip ini membuat penipuan, pencurian, dan pemaksaan secara moral tercela, dengan kekerasan hanya dibenarkan untuk membela diri. Libertarian menolak memberikan izin khusus kepada negara untuk melakukan tindakan yang dianggap tidak bermoral jika dilakukan oleh individu, dan bersikeras bahwa setiap orang harus mengikuti kode moral yang sama tanpa pengecualian.
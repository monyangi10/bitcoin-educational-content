question: Hva er det grunnleggende prinsippet som skiller libertariansk politisk filosofi fra andre ideologier når det gjelder bruk av makt?
answer: Ikke-aggresjonsprinsippet, som forbyr bruk av vold mot andre unntatt i legitimt selvforsvar
wrong_answers:
  - Prinsippet om kollektivt forsvar, som tillater statlig inngripen for å beskytte fellesskapsinteresser fremfor individuelle rettigheter
  - Prinsippet om proporsjonal makt, som tillater statlig tvang når det tjener samfunnets beste
  - Det demokratiske mandatprinsippet, som rettferdiggjør bruk av makt når det er godkjent av et flertall i demokratiske institusjoner
explanation: |
  Ikke-aggresjonsprinsippet er hjørnesteinen i libertariansk filosofi, og sier at ingen har rett til å bruke eller true med fysisk makt mot en annen person eller dennes eiendom.
  Dette prinsippet gjør svindel, tyveri og tvang moralsk forkastelig, og maktbruk kan bare rettferdiggjøres i selvforsvar. Libertarianere nekter å gi staten spesielle tillatelser til å begå handlinger som ville blitt ansett som umoralske hvis de ble utført av enkeltpersoner, og insisterer på at alle følger den samme moralkodeksen uten unntak.
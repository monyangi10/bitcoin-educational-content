question: Mikä on se perusperiaate, joka erottaa libertaristisen poliittisen filosofian muista ideologioista voimankäytön osalta?
answer: Hyökkäämättömyysperiaate, joka kieltää voimakeinojen käytön muita vastaan paitsi oikeutetussa itsepuolustuksessa
wrong_answers:
  - Kollektiivisen puolustuksen periaate, jonka mukaan valtio voi puuttua asiaan suojellakseen yhteisön etuja yksilön oikeuksien sijaan
  - Suhteellisen voiman periaate, joka sallii hallituksen pakkokeinot silloin, kun ne palvelevat suurempaa yhteiskunnallista hyötyä
  - Demokraattisen mandaatin periaate, jonka mukaan voimankäyttö on oikeutettua, kun se hyväksytään enemmistöllä demokraattisissa toimielimissä
explanation: |
  Hyökkäyskiellon periaate on libertaristisen filosofian kulmakivi, jonka mukaan kenelläkään ei ole oikeutta käyttää tai uhata fyysistä voimaa toista henkilöä tai hänen omaisuuttaan vastaan.
  Tämän periaatteen mukaan petos, varkaus ja pakottaminen ovat moraalisesti tuomittavia, ja voimankäyttö on oikeutettua vain itsepuolustuksessa. Libertaristit kieltäytyvät antamasta valtiolle erityislupia tehdä tekoja, joita yksilöiden tekemänä pidettäisiin moraalittomina, ja vaativat, että kaikki noudattavat samaa moraalisäännöstöä ilman poikkeuksia.
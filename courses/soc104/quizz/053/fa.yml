question: اصل اساسی که فلسفه سیاسی لیبرترین را از دیگر ایدئولوژی‌ها در مورد استفاده از زور متمایز می‌کند چیست؟
answer: اصل عدم تجاوز، که ممنوعیت آغاز خشونت علیه دیگران را به جز در دفاع مشروع از خود مقرر می‌کند
wrong_answers:
  - اصل دفاع جمعی، که به دولت اجازه می‌دهد برای حفاظت از منافع جامعه بر حقوق فردی مداخله کند
  - اصل تناسب نیرو، که اجازه می‌دهد دولت از اجبار استفاده کند زمانی که به نفع بزرگتر اجتماعی خدمت می‌کند
  - اصل مأموریت دموکراتیک، که توجیه‌کننده استفاده از زور زمانی است که با رأی اکثریت در نهادهای دموکراتیک تأیید شود.
explanation: |
  اصل عدم تجاوز، سنگ‌بنای فلسفه لیبرترین است که بیان می‌کند هیچ‌کس حق ندارد به‌طور فیزیکی به شخص دیگری یا اموال او تجاوز یا تهدید کند.  
  این اصل، تقلب، دزدی و اجبار را از نظر اخلاقی نکوهیده می‌داند و استفاده از زور را تنها در دفاع از خود توجیه می‌کند. لیبرترین‌ها از اعطای مجوزهای ویژه به دولت برای انجام اعمالی که اگر توسط افراد انجام شود غیراخلاقی تلقی می‌شود، خودداری می‌کنند و اصرار دارند که همه بدون استثنا از یک کد اخلاقی پیروی کنند.
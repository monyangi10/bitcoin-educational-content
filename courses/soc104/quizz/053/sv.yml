question: Vilken är den grundläggande princip som skiljer den libertarianska politiska filosofin från andra ideologier när det gäller användning av våld?
answer: Icke-aggressionsprincipen, som förbjuder våld mot andra utom i legitimt självförsvar
wrong_answers:
  - Principen om kollektivt försvar, som innebär att staten kan ingripa för att skydda samhällsintressen framför individuella rättigheter
  - Principen om proportionellt våld, som tillåter statligt tvång när det tjänar samhällets bästa
  - Principen om demokratiskt mandat, som rättfärdigar våld när det godkänns av majoritetsomröstning i demokratiska institutioner
explanation: |
  Icke-aggressionsprincipen är hörnstenen i den libertarianska filosofin och innebär att ingen har rätt att initiera eller hota med fysiskt våld mot en annan person eller dennes egendom.
  Denna princip gör bedrägeri, stöld och tvång moraliskt förkastligt, och våld är endast berättigat i självförsvar. Libertarianer vägrar att ge staten särskilda tillstånd att begå handlingar som skulle betraktas som omoraliska om de utfördes av individer, och insisterar på att alla följer samma moraliska kod utan undantag.
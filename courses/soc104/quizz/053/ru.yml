question: Какой основополагающий принцип отличает либертарианскую политическую философию от других идеологий в отношении применения силы?
answer: Принцип ненападения, запрещающий применять силу против других, кроме как в случае законной самообороны
wrong_answers:
  - Принцип коллективной защиты, допускающий вмешательство государства для защиты интересов сообщества, а не индивидуальных прав
  - Принцип пропорциональной силы, который допускает государственное принуждение, если оно служит большему социальному благу
  - Принцип демократического мандата, который оправдывает применение силы, если она одобрена большинством голосов в демократических институтах
explanation: |
  Принцип ненападения - краеугольный камень либертарианской философии, утверждающий, что никто не имеет права применять физическую силу или угрожать ею другому человеку или его собственности.
  Этот принцип делает мошенничество, воровство и принуждение морально предосудительными, а применение силы оправдано только в случае самообороны. Либертарианцы отказываются предоставлять государству специальные разрешения на совершение действий, которые считались бы аморальными, если бы совершались отдельными людьми, настаивая на том, что все без исключения следуют одному и тому же моральному кодексу.
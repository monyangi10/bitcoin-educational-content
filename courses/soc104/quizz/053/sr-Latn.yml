question: Koji je temeljni princip koji razlikuje libertarijansku političku filozofiju od drugih ideologija u pogledu upotrebe sile?
answer: Načelo nenapadanja, koje zabranjuje iniciranje sile protiv drugih osim u legitimnoj samoodbrani
wrong_answers:
  - Princip kolektivne odbrane, koji omogućava intervenciju države radi zaštite interesa zajednice nad individualnim pravima
  - Načelo proporcionalne sile, koje dopušta vladinu prisilu kada služi većem društvenom dobru
  - Princip demokratskog mandata, koji opravdava upotrebu sile kada je odobrena većinskim glasanjem u demokratskim institucijama
explanation: |
  Princip nes-agresije je kamen temeljac libertarijanske filozofije, koji kaže da niko nema pravo da inicira ili preti fizičkom silom protiv druge osobe ili njihove imovine. 
  Ovaj princip čini prevaru, krađu i prinudu moralno odvratnim, s tim da je sila opravdana samo u samoodbrani. Libertarijanci odbijaju da državi daju posebna ovlašćenja za činjenje dela koja bi bila smatrana nemoralnim ako ih čine pojedinci, insistirajući da svi slede isti moralni kodeks bez izuzetaka.
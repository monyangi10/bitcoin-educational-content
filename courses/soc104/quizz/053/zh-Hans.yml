question: 在使用武力方面，自由主义政治哲学区别于其他意识形态的基本原则是什么？
answer: 不侵犯原则，即除合法自卫外，禁止对他人使用武力
wrong_answers:
  - 集体防御原则，允许国家干预，以保护社区利益而非个人权利
  - 比例武力原则，允许政府在符合更大社会利益的情况下采取强制措施
  - 民主授权原则，即在民主机构中以多数票通过时，使用武力是合理的
explanation: |
  不侵犯原则是自由主义哲学的基石，它规定任何人都无权对他人或其财产使用或威胁使用武力。
  这一原则使欺诈、盗窃和胁迫在道德上应受到谴责，只有在自卫时才有理由使用武力。自由主义者拒绝给予国家特殊权限来实施如果由个人实施会被视为不道德的行为，他们坚持认为每个人都毫无例外地遵守相同的道德准则。
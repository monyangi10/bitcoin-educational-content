question: Jaka jest podstawowa zasada, która odróżnia libertariańską filozofię polityczną od innych ideologii dotyczących użycia siły?
answer: Zasada nieagresji, która zakazuje inicjowania siły przeciwko innym, z wyjątkiem uzasadnionej samoobrony
wrong_answers:
  - Zasada obrony zbiorowej, która zezwala na interwencję państwa w celu ochrony interesów społeczności przed prawami jednostki
  - Zasada proporcjonalnej siły, która zezwala na przymus rządowy, gdy służy on większemu dobru społecznemu
  - Zasada mandatu demokratycznego, która usprawiedliwia użycie siły, gdy zostanie ona zatwierdzona większością głosów w instytucjach demokratycznych
explanation: |
  Zasada nieagresji jest kamieniem węgielnym filozofii libertariańskiej, stwierdzając, że nikt nie ma prawa inicjować lub grozić użyciem siły fizycznej wobec innej osoby lub jej własności.
  Zasada ta sprawia, że oszustwo, kradzież i przymus są moralnie naganne, a siła jest usprawiedliwiona jedynie w samoobronie. Libertarianie odmawiają przyznawania państwu specjalnych zezwoleń na popełnianie czynów, które zostałyby uznane za niemoralne, gdyby zostały popełnione przez jednostki, nalegając, by wszyscy przestrzegali tego samego kodeksu moralnego bez wyjątków.
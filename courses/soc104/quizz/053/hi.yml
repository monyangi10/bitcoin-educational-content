question: बल प्रयोग के संबंध में स्वतंत्रतावादी राजनीतिक दर्शन को अन्य विचारधाराओं से अलग करने वाला मूलभूत सिद्धांत क्या है?
answer: अहिंसा का सिद्धांत, जो वैध आत्मरक्षा को छोड़कर दूसरों के खिलाफ बल प्रयोग शुरू करने पर रोक लगाता है।
wrong_answers:
  - सामूहिक रक्षा का सिद्धांत, जो व्यक्तिगत अधिकारों के बजाय सामुदायिक हितों की रक्षा के लिए राज्य के हस्तक्षेप की अनुमति देता है।
  - आनुपातिक बल का सिद्धांत, जो व्यापक सामाजिक हित के लिए आवश्यक होने पर सरकारी बल प्रयोग की अनुमति देता है।
  - लोकतांत्रिक जनादेश का सिद्धांत, जो लोकतांत्रिक संस्थाओं में बहुमत से अनुमोदित होने पर बल प्रयोग को उचित ठहराता है।
explanation: |
  अहिंसा का सिद्धांत स्वतंत्रतावादी दर्शन का आधार है, जिसके अनुसार किसी को भी किसी अन्य व्यक्ति या उसकी संपत्ति के विरुद्ध शारीरिक बल का प्रयोग करने या उसकी धमकी देने का अधिकार नहीं है।
  यह सिद्धांत धोखाधड़ी, चोरी और जबरदस्ती को नैतिक रूप से निंदनीय बनाता है, और बल का प्रयोग केवल आत्मरक्षा में ही उचित माना जाता है। स्वतंत्रतावादी राज्य को ऐसे कार्य करने की विशेष अनुमति देने से इनकार करते हैं जिन्हें व्यक्तियों द्वारा किए जाने पर अनैतिक माना जाएगा, और इस बात पर जोर देते हैं कि सभी बिना किसी अपवाद के एक ही नैतिक संहिता का पालन करें।
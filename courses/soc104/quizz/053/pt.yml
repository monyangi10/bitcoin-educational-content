question: Qual é o princípio fundamental que distingue a filosofia política libertária de outras ideologias no que respeita ao uso da força?
answer: O princípio da não agressão, que proíbe o recurso à força contra outros, exceto em legítima autodefesa
wrong_answers:
  - O princípio da defesa colectiva, que permite a intervenção do Estado para proteger os interesses da comunidade em detrimento dos direitos individuais
  - O princípio da força proporcional, que permite a coerção governamental quando esta serve um bem social maior
  - O princípio do mandato democrático, que justifica a força quando aprovada por maioria de votos em instituições democráticas
explanation: |
  O princípio da não-agressão é a pedra angular da filosofia libertária, afirmando que ninguém tem o direito de iniciar ou ameaçar com força física outra pessoa ou a sua propriedade.
  Este princípio torna a fraude, o roubo e a coerção moralmente repreensíveis, sendo a força apenas justificada em auto-defesa. Os libertários recusam-se a conceder ao Estado permissões especiais para cometer actos que seriam considerados imorais se fossem praticados por indivíduos, insistindo que todos seguem o mesmo código moral sem excepções.
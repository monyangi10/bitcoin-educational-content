question: Welches ist das grundlegende Prinzip, das die libertäre politische Philosophie von anderen Ideologien in Bezug auf die Anwendung von Gewalt unterscheidet?
answer: Der Grundsatz des Nichtangriffs, der die Anwendung von Gewalt gegen andere verbietet, es sei denn, es handelt sich um legitime Selbstverteidigung
wrong_answers:
  - Das Prinzip der kollektiven Verteidigung, das staatliche Interventionen zum Schutz von Gemeinschaftsinteressen gegenüber individuellen Rechten erlaubt
  - Der Grundsatz der Verhältnismäßigkeit der Gewalt, der staatlichen Zwang zulässt, wenn er dem größeren sozialen Wohl dient
  - Der Grundsatz des demokratischen Mandats, der Gewalt rechtfertigt, wenn sie in demokratischen Institutionen mehrheitlich beschlossen wird
explanation: |
  Der Grundsatz des Nichtangriffs ist der Eckpfeiler der libertären Philosophie. Er besagt, dass niemand das Recht hat, physische Gewalt gegen eine andere Person oder deren Eigentum anzuwenden oder anzudrohen.
  Nach diesem Grundsatz sind Betrug, Diebstahl und Nötigung moralisch verwerflich, und Gewalt ist nur zur Selbstverteidigung gerechtfertigt. Libertäre lehnen es ab, dem Staat Sondergenehmigungen für Handlungen zu erteilen, die als unmoralisch gelten würden, wenn sie von Einzelpersonen begangen würden, und bestehen darauf, dass jeder ohne Ausnahme demselben Moralkodex folgt.
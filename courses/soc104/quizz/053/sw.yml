question: Ni kanuni gani ya msingi inayotofautisha falsafa ya kisiasa ya uhuru na itikadi zingine kuhusu matumizi ya nguvu?
answer: Kanuni ya kutotumia nguvu, inayokataza kuanzisha nguvu dhidi ya wengine isipokuwa kwa kujilinda halali
wrong_answers:
  - Kanuni ya ulinzi wa pamoja, ambayo inaruhusu serikali kuingilia kati kulinda maslahi ya jamii kuliko haki za mtu binafsi
  - Kanuni ya nguvu sawia, ambayo inaruhusu serikali kulazimisha inapohudumia manufaa makubwa ya kijamii
  - Kanuni ya mamlaka ya kidemokrasia, ambayo inahalalisha nguvu inapoidhinishwa na kura nyingi katika taasisi za kidemokrasia
explanation: |
  Kanuni ya kutotumia nguvu za kijeshi ndiyo msingi wa falsafa ya uhuru, ikisema kwamba hakuna mtu mwenye haki ya kuanzisha au kutishia nguvu za kimwili dhidi ya mtu mwingine au mali yake.
  
  Kanuni hii inafanya ulaghai, wizi, na kulazimisha kuwa na hatia kimaadili, huku nguvu zikihalalishwa tu katika kujilinda. Wanahuru wanakataa kutoa ruhusa maalum kwa serikali kufanya vitendo ambavyo vingechukuliwa kuwa visivyo vya maadili ikiwa vitafanywa na watu binafsi, wakisisitiza kwamba kila mtu afuate kanuni sawa za maadili bila ubaguzi.

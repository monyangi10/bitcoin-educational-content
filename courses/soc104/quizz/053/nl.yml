question: Wat is het fundamentele principe dat de libertarische politieke filosofie onderscheidt van andere ideologieën met betrekking tot het gebruik van geweld?
answer: Het non-agressieprincipe, dat het initiëren van geweld tegen anderen verbiedt, behalve in legitieme zelfverdediging
wrong_answers:
  - Het collectieve verdedigingsprincipe, dat staatsinterventie toestaat om gemeenschapsbelangen te beschermen boven individuele rechten
  - Het principe van proportionele kracht, dat overheidsdwang toestaat als dit het grotere sociale belang dient
  - Het democratisch mandaatprincipe, dat geweld rechtvaardigt als het wordt goedgekeurd door een meerderheid van de stemmen in democratische instellingen
explanation: |
  Het non-agressie principe is de hoeksteen van de libertarische filosofie en stelt dat niemand het recht heeft om fysiek geweld te gebruiken of te dreigen tegen een ander persoon of zijn eigendom.
  Dit principe maakt fraude, diefstal en dwang moreel verwerpelijk en geweld is alleen gerechtvaardigd als zelfverdediging. Libertariërs weigeren de staat speciale toestemmingen te geven om handelingen te verrichten die als immoreel beschouwd zouden worden als ze door individuen gedaan zouden worden, en staan erop dat iedereen dezelfde morele code volgt zonder uitzonderingen.
question: Ni ingingo ngenderwako iyihe y’ishimikiro itandukanya filozofiya ya politike y’ubwigenge n’izindi ngendo ku bijanye n’ugukoresha inguvu?
answer: Ingingo ngenderwako y’ukudatera, ibuza gutangura gukoresha inguvu ku bandi kiretse mu kwikingira mu buryo bubereye .
wrong_answers:
  - Ingingo ngenderwako y’ukwigwanira rusangi, yemerera Leta kwinjira mu vyo kurinda inyungu z’abanyagihugu ku burenganzira bw’umuntu ku giti ciwe .
  - Ingingo ngenderwako y’inguvu zihuye, yemerera Leta guhatira abantu iyo bifasha abantu benshi
  - Ingingo ngenderwako y’uburenganzira bwa demokarasi, ishobora gutuma umuntu akoresha inguvu iyo yemejwe n’amajwi menshi mu nzego za demokarasi
explanation: |
  Ingingo ngenderwako y’ukudatera ni ryo buye ry’imfuruka ry’ubuhinga bwo kwidegemvya, rivuga ko ata n’umwe afise uburenganzira bwo gutanguza canke gutera ubwoba uwundi muntu canke itunga ryiwe. 
  Iryo hame rituma ubuhendanyi, ubusuma be n’uguhatira umuntu gukora ibintu biteye isoni mu vy’inyifato runtu, inguvu zikaba zibereye gusa mu kwikingira. Abaharanira umwidegemvyo banse guha Leta uruhusha rudasanzwe rwo gukora ibikorwa vyobonwa ko ari ubusambanyi iyo bikozwe n’abantu ku giti cabo, bagashimika ko umuntu wese akurikiza ingingo ngenderwako imwe ata n’umwe asigaye.
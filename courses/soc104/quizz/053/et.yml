question: Milline on põhiprintsiip, mis eristab libertaarset poliitilist filosoofiat teistest ideoloogiatest seoses jõu kasutamisega?
answer: Mitteagressiooni põhimõte, mis keelab teiste vastu jõu kasutamise, välja arvatud seaduslikul enesekaitsel
wrong_answers:
  - Kollektiivse kaitse põhimõte, mis võimaldab riigi sekkumist, et kaitsta ühenduse huve individuaalsete õiguste asemel
  - Proportsionaalse jõu põhimõte, mis lubab valitsuse sunnimeetmeid, kui need teenivad suuremat ühiskondlikku hüve
  - Demokraatliku mandaadi põhimõte, mis õigustab jõudu, kui see kiidetakse heaks demokraatlike institutsioonide häälteenamusega
explanation: |
  Mittekallaletungi põhimõte on liberaalse filosoofia nurgakivi, mis ütleb, et kellelgi ei ole õigust kasutada või ähvardada füüsilist jõudu teise inimese või tema vara vastu.
  See põhimõte muudab pettuse, varguse ja sundimise moraalselt taunitavaks, kusjuures jõud on õigustatud ainult enesekaitseks. Libertaarid keelduvad andmast riigile erilubasid tegude sooritamiseks, mida üksikisikute poolt sooritatuna peetaks ebamoraalseks, nõudes, et kõik järgiksid sama moraalikoodeksit ilma eranditeta.
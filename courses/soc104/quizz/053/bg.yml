question: Кой е основният принцип, който отличава либертарианската политическа философия от другите идеологии по отношение на употребата на сила?
answer: Принципът на ненападение, който забранява използването на сила срещу други лица, освен при законна самозащита
wrong_answers:
  - Принцип на колективната защита, който позволява намеса на държавата за защита на интересите на общността пред индивидуалните права
  - Принципът на пропорционалната сила, който позволява държавна принуда, когато тя служи на по-голямото обществено благо
  - Принципът на демократичния мандат, който оправдава прилагането на сила, когато е одобрена с мнозинство в демократичните институции
explanation: |
  Принципът на ненападение е крайъгълен камък на либертарианската философия, според който никой няма право да предприема или да заплашва с физическа сила друго лице или неговата собственост.
  Този принцип прави измамата, кражбата и принудата морално осъдителни, а силата е оправдана само при самозащита. Либертарианците отказват да предоставят на държавата специални разрешения за извършване на действия, които биха се считали за неморални, ако се извършват от отделни лица, като настояват всички да следват един и същ морален кодекс без изключения.
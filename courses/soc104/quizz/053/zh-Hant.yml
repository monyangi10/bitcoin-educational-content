question: 在使用武力方面，自由主義政治哲學有別於其他意識形態的基本原則是什麼？
answer: 除合法自衛外，禁止對他人使用武力的不侵略原則
wrong_answers:
  - 集體防衛原則，允許國家干預以保護社群利益而非個人權利
  - 比例武力原則，允許政府在符合更大社會利益時採取強制措施
  - 民主授權原則，即在民主機構中經大多數票通過時，使用武力是合理的。
explanation: |
  不侵犯原則是自由主義哲學的基石，說明任何人都無權對他人或其財產使用武力或威脅使用武力。
  這項原則使欺詐、盜竊和強迫在道德上應受到譴責，只有在自衛時才有理由使用武力。自由主義者拒絕賦予國家特殊許可權，以實施如果由個人來做會被視為不道德的行為，他們堅持每個人都遵循相同的道德準則，沒有例外。
question: หลักการพื้นฐานที่แยกปรัชญาการเมืองแบบเสรีนิยมออกจากอุดมการณ์อื่น ๆ เกี่ยวกับการใช้กำลังคืออะไร?
answer: หลักการไม่รุกราน ซึ่งห้ามการใช้กำลังกับผู้อื่น ยกเว้นในกรณีป้องกันตัวที่ชอบด้วยกฎหมาย
wrong_answers:
  - หลักการป้องกันร่วมกัน ซึ่งอนุญาตให้มีการแทรกแซงของรัฐเพื่อปกป้องผลประโยชน์ของชุมชนเหนือสิทธิส่วนบุคคล
  - หลักการใช้กำลังอย่างได้สัดส่วน ซึ่งอนุญาตให้รัฐบาลใช้การบังคับเมื่อมันเป็นประโยชน์ต่อสังคมโดยรวม
  - หลักการมอบอำนาจตามระบอบประชาธิปไตย ซึ่งให้เหตุผลในการใช้กำลังเมื่อได้รับการอนุมัติจากการลงคะแนนเสียงข้างมากในสถาบันประชาธิปไตย
explanation: |
  หลักการไม่รุกรานเป็นรากฐานของปรัชญาเสรีนิยม โดยระบุว่าไม่มีใครมีสิทธิ์ที่จะเริ่มต้นหรือข่มขู่การใช้กำลังทางกายภาพต่อบุคคลอื่นหรือทรัพย์สินของพวกเขา หลักการนี้ทำให้การฉ้อโกง การขโมย และการบังคับขู่เข็ญเป็นสิ่งที่น่ารังเกียจทางศีลธรรม โดยการใช้กำลังจะได้รับการยอมรับเฉพาะในกรณีป้องกันตัวเองเท่านั้น เสรีนิยมปฏิเสธที่จะให้สิทธิพิเศษแก่รัฐในการกระทำที่ถือว่าเป็นสิ่งผิดศีลธรรมถ้าทำโดยบุคคล โดยยืนยันว่าทุกคนต้องปฏิบัติตามหลักศีลธรรมเดียวกันโดยไม่มีข้อยกเว้น
question: Qual è il principio fondamentale che distingue la filosofia politica libertaria dalle altre ideologie per quanto riguarda l'uso della forza?
answer: Il principio di non aggressione, che vieta di usare la forza contro gli altri se non per legittima difesa
wrong_answers:
  - Il principio della difesa collettiva, che consente l'intervento dello Stato per proteggere gli interessi della comunità rispetto ai diritti individuali
  - Il principio della forza proporzionale, che consente la coercizione governativa quando serve a un bene sociale superiore
  - Il principio del mandato democratico, che giustifica la forza quando è approvata dalla maggioranza delle istituzioni democratiche
explanation: |
  Il principio di non aggressione è la pietra miliare della filosofia libertaria e afferma che nessuno ha il diritto di iniziare o minacciare la forza fisica contro un'altra persona o la sua proprietà.
  Questo principio rende la frode, il furto e la coercizione moralmente riprovevoli, e la forza è giustificata solo in caso di autodifesa. I libertari rifiutano di concedere allo Stato permessi speciali per commettere atti che sarebbero considerati immorali se compiuti da individui, insistendo sul fatto che tutti seguono lo stesso codice morale senza eccezioni.
question: What is the fundamental principle that distinguishes libertarian political philosophy from other ideologies regarding the use of force?
answer: The non-aggression principle, which prohibits initiating force against others except in legitimate self-defense
wrong_answers:
  - The collective defense principle, which allows state intervention to protect community interests over individual rights
  - The proportional force principle, which permits government coercion when it serves the greater social good
  - The democratic mandate principle, which justifies force when approved by majority vote in democratic institutions
explanation: |
  The non-aggression principle is the cornerstone of libertarian philosophy, stating that no one has the right to initiate or threaten physical force against another person or their property. This principle makes fraud, theft, and coercion morally reprehensible, with force only justified in self-defense. Libertarians refuse to grant the state special permissions to commit acts that would be considered immoral if done by individuals, insisting everyone follows the same moral code without exceptions.

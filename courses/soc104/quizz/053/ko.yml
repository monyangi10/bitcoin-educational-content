question: 무력 사용과 관련하여 자유주의 정치 철학을 다른 이념과 구별하는 기본 원칙은 무엇인가요?
answer: 정당한 정당방위를 제외하고 타인에게 무력을 행사하는 것을 금지하는 비침략 원칙은 다음과 같습니다
wrong_answers:
  - 개인의 권리보다 공동체의 이익을 보호하기 위해 국가 개입을 허용하는 집단 방어 원칙
  - 더 큰 사회적 공익을 위한 경우 정부의 강압을 허용하는 비례의 힘 원칙
  - 민주적 기관에서 다수결로 승인된 경우 무력을 정당화하는 민주적 위임 원칙
explanation: |
  침략 금지 원칙은 자유주의 철학의 초석으로, 누구도 타인이나 타인의 재산에 대해 물리력을 행사하거나 위협할 권리를 갖지 않는다는 원칙입니다.
  이 원칙에 따라 사기, 절도, 강압은 도덕적으로 비난받을 수 있으며, 무력은 정당방위에서만 정당화됩니다. 자유주의자들은 개인이 행할 경우 비도덕적인 행위로 간주될 수 있는 행위를 국가가 특별 허가하는 것을 거부하며, 모든 사람이 예외 없이 동일한 도덕 규범을 따라야 한다고 주장합니다.
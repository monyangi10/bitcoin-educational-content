question: Jaký je základní princip, který libertariánskou politickou filozofii odlišuje od jiných ideologií, pokud jde o použití síly?
answer: Zásada neútočení, která zakazuje použití síly proti jiným osobám s výjimkou legitimní sebeobrany
wrong_answers:
  - Zásada kolektivní obrany, která umožňuje zásah státu na ochranu zájmů společenství před právy jednotlivce
  - Princip přiměřené síly, který povoluje vládní donucení, pokud slouží vyššímu společenskému prospěchu
  - Princip demokratického mandátu, který ospravedlňuje použití síly, pokud je schválena většinou hlasů v demokratických institucích
explanation: |
  Zásada neútočení je základním kamenem libertariánské filozofie a říká, že nikdo nemá právo zahájit nebo vyhrožovat fyzickou silou vůči jiné osobě nebo jejímu majetku.
  Podle této zásady jsou podvod, krádež a nátlak morálně zavrženíhodné a použití síly je ospravedlnitelné pouze v případě sebeobrany. Libertariáni odmítají udělovat státu zvláštní oprávnění k činům, které by byly považovány za nemorální, kdyby je prováděli jednotlivci, a trvají na tom, aby se všichni bez výjimky řídili stejným morálním kodexem.
question: 武力行使に関して、リバタリアンの政治哲学を他のイデオロギーと区別する基本原則は何か？
answer: 正当防衛を除き、他者に対して武力を行使することを禁止する不可侵原則。
wrong_answers:
  - 個人の権利よりも共同体の利益を守るために国家の介入を認める集団的自衛権の原則
  - より大きな社会的利益に資する場合、政府の強制を認める比例的武力原則
  - 民主的機関において多数決で承認された場合に武力を正当化する民主的委任原則
explanation: |
  不可侵原則はリバタリアン哲学の根幹であり、何人も他人やその財産に対して物理的な力を行使したり、脅したりする権利はないとするものである。
  この原則により、詐欺、窃盗、強要は道徳的に非難されるべきものとされ、武力は正当防衛の場合にのみ正当化される。リバタリアンは、個人が行えば不道徳とみなされる行為を国家に特別に許可することを拒否し、例外なく誰もが同じ道徳規範に従うと主張する。
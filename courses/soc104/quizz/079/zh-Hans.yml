question: 根据古斯塔夫-莫里纳利在《圣拉扎尔街的夜晚》（Les Soirées de la rue Saint Lazare）一书中的分析，保守派和社会主义者之间有什么根本的相似之处，使他们有别于自由主义者？
answer: 保守派和社会主义者都试图通过国家干预将自己的社会愿景强加于人，尽管他们有不同的愿景
wrong_answers:
  - 保守派和社会主义者都将自由视为绝对原则，而非实际考虑因素
  - 保守派和社会主义者都反对私有产权，赞成资源集体所有制
  - 保守派和社会主义者都支持最少的政府干预和最大的个人自治
explanation: |
  莫利纳利的主要见解是，尽管保守派和社会主义者在意识形态上存在分歧，但他们有一个共同的方法：他们都想利用国家权力来强加他们对社会组织方式的特定看法。保守派希望迫使人们维持传统结构，而社会主义者则希望迫使人们接受新的社会安排。以 "经济学家 "为代表的自由主义者反对这两种观点，因为他们反对使用国家强制力来强加任何社会愿景，他们更倾向于自愿安排和个人选择。
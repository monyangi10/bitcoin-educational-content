question: Enligt Gustave Molinaris analys i "Les Soirées de la rue Saint Lazare" (eng. Evenings on Saint Lazarus Street), vilken grundläggande likhet finns det mellan konservativa och socialister som skiljer dem från libertarianer?
answer: Både konservativa och socialister försöker införa sin vision av samhället genom statliga ingripanden, trots att de har olika visioner
wrong_answers:
  - Både konservativa och socialister ser frihet som en absolut princip snarare än ett praktiskt övervägande
  - Både konservativa och socialister motsätter sig privat äganderätt och förespråkar kollektivt ägande av resurser
  - Både konservativa och socialister stöder minimal statlig inblandning och maximal individuell autonomi
explanation: |
  Molinaris viktigaste insikt var att konservativa och socialister, trots sina ideologiska skillnader, har en gemensam strategi: de vill båda använda statsmakten för att genomdriva sin speciella vision av hur samhället bör organiseras. Konservativa vill tvinga människor att upprätthålla traditionella strukturer, medan socialister vill tvinga människor in i nya sociala arrangemang. Libertarianer, som representeras av karaktären "ekonom", motsätter sig båda eftersom de inte vill använda statligt tvång för att införa någon samhällsvision, utan föredrar frivilliga arrangemang och individuella val.
question: Ifølge Gustave Molinaris analyse i "Les Soirées de la rue Saint Lazare" (Les Soirées de la rue Saint Lazare), hvilke grunnleggende likhetstrekk er det mellom konservative og sosialister som skiller dem fra liberalister?
answer: Både konservative og sosialister søker å påtvinge sin samfunnsvisjon gjennom statlig inngripen, til tross for at de har ulike visjoner
wrong_answers:
  - Både konservative og sosialister ser på frihet som et absolutt prinsipp snarere enn et praktisk hensyn
  - Både konservative og sosialister er motstandere av privat eiendomsrett og går inn for kollektivt eierskap av ressurser
  - Både konservative og sosialister er tilhengere av minimal statlig inngripen og maksimal individuell autonomi
explanation: |
  Molinaris hovedinnsikt var at konservative og sosialister, til tross for deres ideologiske forskjeller, har en felles tilnærming: De ønsker begge å bruke statsmakten til å påtvinge folk deres spesielle visjon om hvordan samfunnet bør organiseres. Konservative vil tvinge folk til å opprettholde tradisjonelle strukturer, mens sosialister vil tvinge folk inn i nye sosiale ordninger. Libertarianere, representert ved "økonomen", er motstandere av begge deler fordi de avviser å bruke statlig tvang for å påtvinge noen samfunnsvisjon, og foretrekker frivillige ordninger og individuelle valg.
question: Jaká zásadní podobnost, která odlišuje konzervativce a socialisty od libertariánů, existuje podle analýzy Gustava Molinariho v knize "Les Soirées de la rue Saint Lazare" (Večery v ulici sv. Lazara)?
answer: Jak konzervativci, tak socialisté se snaží prosadit svou vizi společnosti prostřednictvím státních zásahů, přestože mají odlišné vize
wrong_answers:
  - Konzervativci i socialisté považují svobodu za absolutní princip, nikoli za praktické hledisko
  - Konzervativci i socialisté jsou proti soukromému vlastnictví a podporují kolektivní vlastnictví zdrojů
  - Konzervativci i socialisté podporují minimální státní zásahy a maximální autonomii jednotlivce
explanation: |
  Molinariho klíčovým poznatkem bylo, že navzdory ideologickým rozdílům mají konzervativci a socialisté společný přístup: oba chtějí využít státní moc k prosazení své konkrétní vize uspořádání společnosti. Konzervativci chtějí donutit lidi, aby zachovali tradiční struktury, zatímco socialisté chtějí lidi přinutit k novému společenskému uspořádání. Libertariáni, reprezentovaní postavou "ekonoma", se staví proti oběma, protože odmítají používání státního donucení k vnucování jakékoli společenské vize a dávají přednost dobrovolnému uspořádání a individuální volbě.
question: 根據 Gustave Molinari 在 'Les Soirées de la rue Saint Lazare' (eng. Evenings on Saint Lazarus Street) 中的分析，保守派和社會主義者之間存在什麼基本的相似性，使他們有別於自由主義者？
answer: 保守派和社會主義者儘管有不同的願景，但都試圖透過國家干預來強加他們對社會的願景。
wrong_answers:
  - 保守派和社會主義者都將自由視為絕對原則，而非實際考慮因素
  - 保守派和社會主義者都反對私有財產權，贊成集體擁有資源
  - 保守派和社會主義者都支持最少的政府干預和最大的個人自治
explanation: |
  莫里納利的主要見解是，儘管保守派和社會主義者在意識形態上有差異，但他們有一個共同的方法：他們都想利用國家權力來強加他們對社會應該如何組織的特定願景。保守派希望強迫人們維持傳統結構，而社會主義者則希望強迫人們加入新的社會安排。以「經濟學家」角色為代表的自由主義者反對兩者，因為他們拒絕使用國家強迫的方式來強加任何社會願景，而偏好自願安排和個人選擇。
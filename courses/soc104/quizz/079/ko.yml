question: "구스타브 몰리나리의 분석에 따르면, 보수주의자와 사회주의자 사이에는 자유주의자와 구별되는 어떤 근본적인 유사성이 존재한다고 하는데요, '레 소아레 드 라 루에 생 라자르'(영문: 생 라자르 거리의 저녁)는 어떤 점에서 자유주의자와 구별될까요?"
answer: "보수주의자와 사회주의자는 서로 다른 비전을 가지고 있음에도 불구하고 국가 개입을 통해 사회에 대한 비전을 강요하려 합니다"
wrong_answers:
  - "보수주의자와 사회주의자 모두 자유를 실용적인 고려사항이 아닌 절대적인 원칙으로 간주합니다"
  - "보수주의자와 사회주의자 모두 사유 재산권에 반대하고 자원의 공동 소유를 선호합니다"
  - "보수주의자와 사회주의자 모두 정부의 개입을 최소화하고 개인의 자율성을 최대한 보장하는 것을 지지합니다"
explanation: |
  몰리나리의 핵심 통찰은 이념적 차이에도 불구하고 보수주의자와 사회주의자 모두 국가 권력을 이용해 사회가 어떻게 조직되어야 하는지에 대한 특정 비전을 강요하고자 한다는 공통점을 가지고 있다는 것입니다. 보수주의자는 사람들에게 전통적인 구조를 유지하도록 강요하는 반면, 사회주의자는 사람들에게 새로운 사회 체제를 강요하고자 합니다. '경제학자' 캐릭터로 대표되는 자유주의자는 국가의 강압으로 사회 비전을 강요하는 것을 거부하고 자발적인 합의와 개인의 선택을 선호하기 때문에 두 가지 모두에 반대합니다.

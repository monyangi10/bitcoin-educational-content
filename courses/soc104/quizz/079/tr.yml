question: Gustave Molinari'nin 'Les Soirées de la rue Saint Lazare' (Aziz Lazar Sokağı Akşamları) adlı eserindeki analizine göre, muhafazakârlar ve sosyalistler arasında onları liberteryenlerden ayıran temel benzerlik nedir?
answer: Hem muhafazakârlar hem de sosyalistler, farklı vizyonlara sahip olmalarına rağmen, kendi toplum vizyonlarını devlet müdahalesi yoluyla dayatmaya çalışmaktadırlar
wrong_answers:
  - Hem muhafazakârlar hem de sosyalistler özgürlüğü pratik bir değerlendirmeden ziyade mutlak bir ilke olarak görürler
  - Hem muhafazakârlar hem de sosyalistler özel mülkiyet haklarına karşı çıkar ve kaynakların kolektif mülkiyetinden yanadır
  - Hem muhafazakârlar hem de sosyalistler asgari devlet müdahalesini ve azami bireysel özerkliği desteklemektedir
explanation: |
  Molinari'nin temel öngörüsü, ideolojik farklılıklarına rağmen muhafazakarlar ve sosyalistlerin ortak bir yaklaşımı paylaştıklarıdır: her ikisi de toplumun nasıl örgütlenmesi gerektiğine dair kendi özel vizyonlarını empoze etmek için devlet gücünü kullanmak istemektedir. Muhafazakarlar insanları geleneksel yapıları sürdürmeye zorlamak isterken, sosyalistler insanları yeni sosyal düzenlemelere zorlamak istemektedir. 'Ekonomist' karakteriyle temsil edilen özgürlükçüler, her ikisine de karşıdır çünkü herhangi bir sosyal vizyonu dayatmak için devlet zoru kullanmayı reddederler, gönüllü düzenlemeleri ve bireysel seçimi tercih ederler.
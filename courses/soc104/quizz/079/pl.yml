question: Według analizy Gustave'a Molinariego w "Les Soirées de la rue Saint Lazare" (ang. "Wieczory na ulicy Świętego Łazarza"), jakie fundamentalne podobieństwo istnieje między konserwatystami a socjalistami, które odróżnia ich od libertarian?
answer: Zarówno konserwatyści, jak i socjaliści dążą do narzucenia swojej wizji społeczeństwa poprzez interwencję państwa, mimo że mają różne wizje
wrong_answers:
  - Zarówno konserwatyści, jak i socjaliści postrzegają wolność jako absolutną zasadę, a nie praktyczny aspekt
  - Zarówno konserwatyści, jak i socjaliści sprzeciwiają się prawom własności prywatnej i opowiadają się za kolektywną własnością zasobów
  - Zarówno konserwatyści, jak i socjaliści popierają minimalną interwencję rządu i maksymalną autonomię jednostki
explanation: |
  Kluczowym spostrzeżeniem Molinariego było to, że pomimo różnic ideologicznych, konserwatyści i socjaliści mają wspólne podejście: obaj chcą wykorzystać władzę państwową do narzucenia swojej konkretnej wizji tego, jak społeczeństwo powinno być zorganizowane. Konserwatyści chcą zmusić ludzi do utrzymania tradycyjnych struktur, podczas gdy socjaliści chcą zmusić ludzi do nowych ustaleń społecznych. Libertarianie, reprezentowani przez postać "ekonomisty", sprzeciwiają się obu, ponieważ odrzucają stosowanie przymusu państwowego w celu narzucenia jakiejkolwiek wizji społecznej, preferując dobrowolne ustalenia i indywidualny wybór.
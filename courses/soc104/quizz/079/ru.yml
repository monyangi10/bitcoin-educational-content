question: Согласно анализу Гюстава Молинари в книге "Вечера на улице Сен-Лазар" (Les Soirées de la rue Saint Lazare), какое фундаментальное сходство существует между консерваторами и социалистами, которое отличает их от либертарианцев?
answer: И консерваторы, и социалисты стремятся навязать свое видение общества с помощью государственного вмешательства, несмотря на то, что видение у них разное
wrong_answers:
  - И консерваторы, и социалисты рассматривают свободу как абсолютный принцип, а не как практическое соображение
  - И консерваторы, и социалисты выступают против прав частной собственности и за коллективное владение ресурсами
  - И консерваторы, и социалисты выступают за минимальное вмешательство государства и максимальную автономию личности
explanation: |
  Главная мысль Молинари заключалась в том, что, несмотря на идеологические различия, консерваторы и социалисты придерживаются общего подхода: они оба хотят использовать государственную власть для навязывания своего особого видения того, как должно быть организовано общество. Консерваторы хотят заставить людей сохранить традиционные структуры, в то время как социалисты хотят принудить людей к новым социальным договоренностям. Либертарианцы, представленные персонажем "экономист", противостоят и тем, и другим, потому что они не приемлют использование государственного принуждения для навязывания какого-либо социального видения, предпочитая добровольные договоренности и индивидуальный выбор.
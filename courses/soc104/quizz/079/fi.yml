question: Gustave Molinarin teoksessa Les Soirées de la rue Saint Lazare esittämän analyysin mukaan konservatiivien ja sosialistien välillä on jokin sellainen perustavanlaatuinen samankaltaisuus, joka erottaa heidät libertaristeista?
answer: Sekä konservatiivit että sosialistit pyrkivät asettamaan yhteiskuntanäkemyksensä voimaan valtion väliintulon avulla, vaikka heillä on erilaiset näkemykset
wrong_answers:
  - Sekä konservatiivit että sosialistit pitävät vapautta pikemminkin ehdottomana periaatteena kuin käytännön näkökohtana
  - Sekä konservatiivit että sosialistit vastustavat yksityisiä omistusoikeuksia ja suosivat resurssien yhteisomistusta
  - Sekä konservatiivit että sosialistit kannattavat mahdollisimman vähäistä valtion väliintuloa ja mahdollisimman suurta yksilön autonomiaa
explanation: |
  Molinarin keskeinen oivallus oli, että ideologisista eroista huolimatta konservatiiveilla ja sosialisteilla on yhteinen lähestymistapa: molemmat haluavat käyttää valtiovaltaa saadakseen läpi oman näkemyksensä siitä, miten yhteiskunta tulisi järjestää. Konservatiivit haluavat pakottaa ihmiset säilyttämään perinteiset rakenteet, kun taas sosialistit haluavat pakottaa ihmiset uusiin yhteiskunnallisiin järjestelyihin. Libertaristit, joita "ekonomistihahmo" edustaa, vastustavat molempia, koska he torjuvat valtion pakkokeinojen käyttämisen minkä tahansa yhteiskunnallisen näkemyksen tyrkyttämiseen ja suosivat vapaaehtoisia järjestelyjä ja yksilön valintoja.
question: Secondo l'analisi di Gustave Molinari in "Les Soirées de la rue Saint Lazare" (le serate di via Saint Lazarus), quale somiglianza fondamentale esiste tra conservatori e socialisti che li distingue dai libertari?
answer: Sia i conservatori che i socialisti cercano di imporre la loro visione della società attraverso l'intervento dello Stato, pur avendo visioni diverse
wrong_answers:
  - Sia i conservatori che i socialisti considerano la libertà come un principio assoluto piuttosto che come una considerazione pratica
  - Sia i conservatori che i socialisti si oppongono ai diritti di proprietà privata e favoriscono la proprietà collettiva delle risorse
  - Sia i conservatori che i socialisti sostengono un intervento minimo del governo e la massima autonomia individuale
explanation: |
  L'intuizione chiave di Molinari è che, nonostante le differenze ideologiche, conservatori e socialisti condividono un approccio comune: entrambi vogliono usare il potere dello Stato per imporre la loro particolare visione di come dovrebbe essere organizzata la società. I conservatori vogliono costringere le persone a mantenere le strutture tradizionali, mentre i socialisti vogliono costringere le persone a nuovi assetti sociali. I libertari, rappresentati dal personaggio "economista", si oppongono a entrambi perché rifiutano l'uso della coercizione statale per imporre qualsiasi visione sociale, preferendo accordi volontari e scelte individuali.
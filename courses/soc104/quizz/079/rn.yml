question: Dukurikije icegeranyo ca Gustave Molinari mu gitabu ciwe citwa ‘Les Soirées de la rue Saint Lazare’ (mu cong. Ijoro ku nzira ya Lazaro mweranda), ni igiki c’ishimikiro gisanzwe kiri hagati y’abanyapolitike b’abanyagihugu n’abanyagihugu b’abanyagihugu, kibatandukanya n’abanyagihugu b’abanyagihugu b’abanyagihugu?
answer: Abanyapolitike b’abanyagihugu n’abanyagihugu bose barondera gutegeka ivyiyumviro vyabo ku kibano biciye mu gufasha Leta, naho bafise ivyiyumviro bitandukanye .
wrong_answers:
  - Abanyapolitike b’abanyagihugu n’abanyagihugu bompi babona ko umwidegemvyo ari ingingo ngenderwako y’ukuri aho kubona ko ari ikintu umuntu akwiye kwiyumvira .
  - Abanyapolitike b'abanyagihugu n'abanyagihugu bompi barwanya uburenganzira bw'abantu ku giti cabo kandi bagashigikira ko abantu bose bagira ubutunzi .
  - Abanyapolitike b'abanyagihugu n'abanyagihugu bompi barashigikiye ko Leta igira ico ikoze n'ukwigenga kw'umuntu ku giti ciwe .
explanation: |
  Iciyumviro nyamukuru Molinari yatahuye ni uko naho aba conservateurs n’aba socialistes batandukanye mu vyiyumviro, basangira uburyo bumwe: bompi bashaka gukoresha ububasha bwa Leta kugira ngo bategeke iciyumviro cabo kidasanzwe c’ingene igihugu gikwiye gutunganirizwa. Abanyagihugu b’abanyagihugu bashaka guhatira abantu kuguma bafise imibumbe ya kera, mu gihe abanyagihugu b’abanyagihugu bashaka guhatira abantu kwinjira mu ntunganyo nshasha z’imibano. Abanyagihugu b’abanyagihugu, baserukirwa n’akaranga k’‘ubutunzi’, bararwanya ivyo vyose kuko banse gukoresha inguvu za Leta kugira ngo bategeke iyerekwa iryo ari ryo ryose ry’imibano, bagahitamwo intunganyo z’ubushake n’uguhitamwo kw’umuntu ku giti ciwe.
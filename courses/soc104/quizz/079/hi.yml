question: "गुस्ताव मोलिनारी के 'लेस सोइरीज़ डे ला रुए सेंट लाज़ारे' (अंग्रेजी में: सेंट लाजरस स्ट्रीट पर शामें) में किए गए विश्लेषण के अनुसार, रूढ़िवादियों और समाजवादियों के बीच कौन सी मूलभूत समानता मौजूद है जो उन्हें स्वतंत्रतावादियों से अलग करती है?"
answer: "रूढ़िवादी और समाजवादी दोनों ही विचारधाराएं भिन्न होने के बावजूद राज्य के हस्तक्षेप के माध्यम से समाज के प्रति अपनी-अपनी दृष्टि थोपने का प्रयास करती हैं।"
wrong_answers:
  - "रूढ़िवादी और समाजवादी दोनों ही स्वतंत्रता को एक व्यावहारिक विचार के बजाय एक निरपेक्ष सिद्धांत के रूप में देखते हैं।"
  - "रूढ़िवादी और समाजवादी दोनों ही निजी संपत्ति के अधिकारों का विरोध करते हैं और संसाधनों के सामूहिक स्वामित्व का समर्थन करते हैं।"
  - "रूढ़िवादी और समाजवादी दोनों ही न्यूनतम सरकारी हस्तक्षेप और अधिकतम व्यक्तिगत स्वायत्तता का समर्थन करते हैं।"
explanation: |
  मोलिनारी की प्रमुख अंतर्दृष्टि यह थी कि वैचारिक मतभेदों के बावजूद, रूढ़िवादी और समाजवादी एक समान दृष्टिकोण साझा करते हैं: वे दोनों ही राज्य शक्ति का उपयोग करके समाज के संगठन के बारे में अपने विशेष दृष्टिकोण को थोपना चाहते हैं। रूढ़िवादी लोगों को पारंपरिक संरचनाओं को बनाए रखने के लिए बाध्य करना चाहते हैं, जबकि समाजवादी लोगों को नई सामाजिक व्यवस्थाओं में ढालना चाहते हैं। 'अर्थशास्त्री' चरित्र द्वारा प्रतिनिधित्व किए जाने वाले स्वतंत्रतावादी इन दोनों का विरोध करते हैं क्योंकि वे किसी भी सामाजिक दृष्टिकोण को थोपने के लिए राज्य के दबाव का उपयोग करने को अस्वीकार करते हैं, और स्वैच्छिक व्यवस्थाओं और व्यक्तिगत पसंद को प्राथमिकता देते हैं।

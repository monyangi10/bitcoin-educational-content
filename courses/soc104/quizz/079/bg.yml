question: Според анализа на Густав Молинари в "Вечерите на улица "Сен Лазар" (Les Soirées de la rue Saint Lazare) каква основна прилика съществува между консерваторите и социалистите, която ги отличава от либертарианците?
answer: И консерваторите, и социалистите се стремят да наложат своята визия за обществото чрез държавна намеса, въпреки че имат различни виждания
wrong_answers:
  - И консерваторите, и социалистите разглеждат свободата като абсолютен принцип, а не като практическо съображение
  - И консерваторите, и социалистите се противопоставят на правото на частна собственост и подкрепят колективната собственост върху ресурсите
  - И консерваторите, и социалистите подкрепят минималната намеса на държавата и максималната индивидуална автономия
explanation: |
  Ключовото прозрение на Молинари е, че въпреки идеологическите си различия консерваторите и социалистите имат общ подход: и двамата искат да използват държавната власт, за да наложат своето конкретно виждане за това как трябва да бъде организирано обществото. Консерваторите искат да принудят хората да запазят традиционните структури, докато социалистите искат да принудят хората да се включат в нови социални договорености. Либертарианците, представени от героя "икономист", се противопоставят и на двете, защото отхвърлят използването на държавна принуда за налагане на каквато и да е социална визия, предпочитайки доброволните договорености и индивидуалния избор.
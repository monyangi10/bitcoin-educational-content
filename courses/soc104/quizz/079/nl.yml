question: Volgens de analyse van Gustave Molinari in 'Les Soirées de la rue Saint Lazare' (Eng. Avonden in de Sint Lazarusstraat), welke fundamentele overeenkomst bestaat er tussen conservatieven en socialisten die hen onderscheidt van libertariërs?
answer: Zowel conservatieven als socialisten proberen hun visie op de samenleving op te leggen door middel van staatsinterventie, ook al hebben ze verschillende visies
wrong_answers:
  - Zowel conservatieven als socialisten zien vrijheid als een absoluut principe in plaats van een praktische overweging
  - Zowel conservatieven als socialisten zijn tegen privé-eigendomsrechten en zijn voor collectief eigendom van hulpbronnen
  - Zowel conservatieven als socialisten steunen minimale overheidsbemoeienis en maximale individuele autonomie
explanation: |
  Molinari's belangrijkste inzicht was dat ondanks hun ideologische verschillen, conservatieven en socialisten een gemeenschappelijke aanpak hebben: ze willen allebei de macht van de staat gebruiken om hun specifieke visie op de organisatie van de samenleving op te leggen. Conservatieven willen mensen dwingen om traditionele structuren te behouden, terwijl socialisten mensen willen dwingen om nieuwe sociale arrangementen aan te gaan. Libertariërs, vertegenwoordigd door de 'econoom', verzetten zich tegen beide omdat ze het gebruik van staatsdwang om een sociale visie op te leggen afwijzen en de voorkeur geven aan vrijwillige regelingen en individuele keuze.
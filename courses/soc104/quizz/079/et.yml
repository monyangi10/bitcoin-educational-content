question: Gustave Molinari analüüsis "Les Soirées de la rue Saint Lazare" (eesti keeles "Õhtud Saint Lazaruse tänaval"), milline põhimõtteline sarnasus on konservatiivide ja sotsialistide vahel, mis eristab neid liberaalidest?
answer: Nii konservatiivid kui ka sotsialistid püüavad oma nägemust ühiskonnast riigi sekkumise kaudu kehtestada, kuigi neil on erinevad nägemused
wrong_answers:
  - Nii konservatiivid kui ka sotsialistid peavad vabadust pigem absoluutseks põhimõtteks kui praktiliseks kaalutluseks
  - Nii konservatiivid kui ka sotsialistid on eraomandiõiguse vastu ja pooldavad ressursside kollektiivset omandit
  - Nii konservatiivid kui ka sotsialistid toetavad minimaalset valitsuse sekkumist ja maksimaalset individuaalset autonoomiat
explanation: |
  Molinari peamine arusaam oli, et hoolimata oma ideoloogilistest erinevustest on konservatiividel ja sotsialistidel ühine lähenemine: nad mõlemad tahavad kasutada riigivõimu, et kehtestada oma nägemus sellest, kuidas ühiskond peaks olema korraldatud. Konservatiivid tahavad sundida inimesi säilitama traditsioonilisi struktuure, samas kui sotsialistid tahavad sundida inimesi uutesse sotsiaalsetesse korraldustesse. Libertaarid, keda esindab "majandusteadlane", on mõlemale vastu, sest nad lükkavad tagasi riikliku sunni kasutamise mis tahes sotsiaalse nägemuse peale surumiseks, eelistades vabatahtlikke kokkuleppeid ja individuaalset valikut.
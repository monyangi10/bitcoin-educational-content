question: Kulingana na uchambuzi wa Gustave Molinari katika 'Les Soirées de la rue Saint Lazare' (Kiingereza. Evenings on Saint Lazarus Street), kuna kufanana gani kwa msingi kati ya wahafidhina na wasoshalisti kunakowatofautisha na watetezi wa uhuru?
answer: Wahafidhina na wasoshalisti wote hutafuta kulazimisha maono yao ya jamii kupitia uingiliaji kati wa serikali, licha ya kuwa na maono tofauti.
wrong_answers:
  - Wahafidhina na wasoshalisti wote wanaona uhuru kama kanuni kamili badala ya kuzingatia kwa vitendo
  - Wahafidhina na wasoshalisti wanapinga haki za mali binafsi na wanapendelea umiliki wa pamoja wa rasilimali
  - Wahafidhina na wasoshalisti wote wanaunga mkono uingiliaji kati mdogo wa serikali na uhuru wa juu wa mtu binafsi
explanation: |
  Ufahamu muhimu wa Molinari ulikuwa kwamba licha ya tofauti zao za kiitikadi, wahafidhina na wasoshalisti wanashiriki mbinu moja: wote wanataka kutumia mamlaka ya serikali kulazimisha maono yao maalum ya jinsi jamii inavyopaswa kupangwa. Wahafidhina wanataka kuwalazimisha watu kudumisha miundo ya kitamaduni, huku wasoshalisti wakitaka kuwalazimisha watu katika mipango mipya ya kijamii. Waliberali, wakiwakilishwa na tabia ya 'mchumi', wanapinga wote wawili kwa sababu wanakataa kutumia kulazimishwa kwa serikali kulazimisha maono yoyote ya kijamii, wakipendelea mipango ya hiari na chaguo la mtu binafsi.
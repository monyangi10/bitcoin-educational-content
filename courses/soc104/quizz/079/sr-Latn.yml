question: Prema analizi Gustava Molinarija u 'Les Soirées de la rue Saint Lazare' (srp. Večeri u ulici Saint Lazare), osnovna sličnost između konzervativaca i socijalista koja ih razlikuje od libertarijanaca je njihova sklonost ka upotrebi državne sile za postizanje svojih ciljeva.
answer: I konzervativci i socijalisti nastoje da nametnu svoju viziju društva kroz intervenciju države, uprkos tome što imaju različite vizije.
wrong_answers:
  - I konzervativci i socijalisti gledaju na slobodu kao na apsolutni princip, a ne kao na praktično razmatranje.
  - I konzervativci i socijalisti se protive pravima privatne svojine i zalažu se za kolektivno vlasništvo nad resursima.
  - I konzervativci i socijalisti podržavaju minimalnu intervenciju vlade i maksimalnu individualnu autonomiju
explanation: |
  Ključni uvid Molinarija bio je da, uprkos njihovim ideološkim razlikama, konzervativci i socijalisti dele zajednički pristup: oboje žele da koriste državnu moć kako bi nametnuli svoju posebnu viziju o tome kako društvo treba da bude organizovano. Konzervativci žele da primoraju ljude da održavaju tradicionalne strukture, dok socijalisti žele da primoraju ljude na nove društvene aranžmane. Libertarijanci, predstavljeni kroz lik 'ekonomiste', protive se oboma jer odbacuju korišćenje državne prinude za nametanje bilo koje društvene vizije, preferirajući dobrovoljne aranžmane i individualni izbor.
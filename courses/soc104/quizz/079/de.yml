question: Welche grundsätzliche Gemeinsamkeit zwischen Konservativen und Sozialisten, die sie von den Libertären unterscheidet, ist der Analyse von Gustave Molinari in "Les Soirées de la rue Saint Lazare" zu entnehmen?
answer: Sowohl die Konservativen als auch die Sozialisten versuchen, ihre Vorstellung von der Gesellschaft durch staatliche Eingriffe durchzusetzen, obwohl sie unterschiedliche Vorstellungen haben
wrong_answers:
  - Sowohl die Konservativen als auch die Sozialisten betrachten die Freiheit als absolutes Prinzip und nicht als praktische Erwägung
  - Sowohl Konservative als auch Sozialisten lehnen private Eigentumsrechte ab und befürworten kollektives Eigentum an Ressourcen
  - Sowohl Konservative als auch Sozialisten befürworten ein Minimum an staatlichen Eingriffen und ein Maximum an individueller Autonomie
explanation: |
  Molinaris Schlüsselerkenntnis war, dass Konservative und Sozialisten trotz ihrer ideologischen Unterschiede einen gemeinsamen Ansatz verfolgen: Beide wollen die Staatsgewalt nutzen, um ihre besondere Vorstellung davon durchzusetzen, wie die Gesellschaft organisiert sein sollte. Die Konservativen wollen die Menschen dazu zwingen, traditionelle Strukturen beizubehalten, während die Sozialisten die Menschen zu neuen sozialen Arrangements zwingen wollen. Die Libertären, die durch die Figur des "Ökonomen" repräsentiert werden, lehnen beides ab, weil sie den Einsatz von staatlichem Zwang zur Durchsetzung einer gesellschaftlichen Vision ablehnen und freiwilligen Vereinbarungen und individuellen Entscheidungen den Vorzug geben.
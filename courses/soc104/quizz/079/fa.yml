question: "بر اساس تحلیل گوستاو مولیناری در 'Les Soirées de la rue Saint Lazare' (به انگلیسی: Evenings on Saint Lazarus Street)، چه شباهت اساسی بین محافظه‌کاران و سوسیالیست‌ها وجود دارد که آن‌ها را از لیبرترین‌ها متمایز می‌کند؟"
answer: هم محافظه‌کاران و هم سوسیالیست‌ها به دنبال تحمیل دیدگاه خود از جامعه از طریق مداخله دولت هستند، اگرچه دیدگاه‌های متفاوتی دارند.
wrong_answers:
  - هم محافظه‌کاران و هم سوسیالیست‌ها آزادی را به‌عنوان یک اصل مطلق می‌بینند نه یک ملاحظه عملی.
  - هم محافظه‌کاران و هم سوسیالیست‌ها با حقوق مالکیت خصوصی مخالفند و مالکیت جمعی منابع را ترجیح می‌دهند.
  - هم محافظه‌کاران و هم سوسیالیست‌ها از حداقل دخالت دولت و حداکثر خودمختاری فردی حمایت می‌کنند.
explanation: |
  بینش کلیدی مولیناری این بود که علی‌رغم تفاوت‌های ایدئولوژیکشان، محافظه‌کاران و سوسیالیست‌ها رویکرد مشترکی دارند: هر دو می‌خواهند از قدرت دولت برای تحمیل دیدگاه خاص خود درباره چگونگی سازماندهی جامعه استفاده کنند. محافظه‌کاران می‌خواهند مردم را وادار به حفظ ساختارهای سنتی کنند، در حالی که سوسیالیست‌ها می‌خواهند مردم را به ترتیبات اجتماعی جدید وادار کنند. لیبرترین‌ها، که توسط شخصیت 'اقتصاددان' نمایندگی می‌شوند، با هر دو مخالفند زیرا استفاده از اجبار دولتی برای تحمیل هرگونه دیدگاه اجتماعی را رد می‌کنند و ترتیبات داوطلبانه و انتخاب فردی را ترجیح می‌دهند.
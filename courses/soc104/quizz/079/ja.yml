question: サン・ラザール通りの夕べ』（Les Soirées de la rue Saint Lazare）におけるギュスターヴ・モリナーリの分析によれば、保守派と社会主義者の間に、彼らをリバタリアンから区別する根本的な類似点が存在するのだろうか？
answer: 保守主義者も社会主義者も、異なるビジョンを持っているにもかかわらず、国家の介入によって社会のビジョンを押し付けようとしている。
wrong_answers:
  - 保守派も社会主義者も、自由を現実的な考慮事項ではなく、絶対的な原理としてとらえている。
  - 保守派も社会主義者も私有財産権に反対し、資源の集団所有に賛成する
  - 保守派も社会主義者も、政府の介入を最小限に抑え、個人の自主性を最大限に尊重する。
explanation: |
  モリナーリの重要な洞察は、イデオロギーの違いにもかかわらず、保守派と社会主義者には共通のアプローチがあるということだった。保守派は人々に伝統的な構造を維持するよう強制し、社会主義者は人々に新しい社会的取り決めを強制したいのである。経済主義者」に代表されるリバタリアンは、国家の強制力を使って社会的ビジョンを押し付けることを否定し、自発的な取り決めと個人の選択を好むため、両者に反対する。
question: Menurut Bagan Nolan, apa saja dua sumbu yang digunakan untuk merepresentasikan ideologi politik?
answer: Kebebasan ekonomi dan kebebasan pribadi
wrong_answers:
  - Politik sayap kiri dan politik sayap kanan
  - Sosialisme dan kapitalisme
  - Demokrasi dan otoritarianisme
explanation: |
  Bagan Nolan menggunakan dua dimensi: kebebasan ekonomi dan kebebasan pribadi, menciptakan spektrum politik yang lebih bernuansa dibandingkan dengan poros kiri-kanan tradisional.
  Pendekatan dua dimensi ini memungkinkan pemosisian yang lebih baik dari berbagai ideologi seperti libertarianisme (kebebasan ekonomi dan kebebasan pribadi yang tinggi), sosialisme (ekonomi rendah, kebebasan pribadi yang tinggi), dan konservatisme (ekonomi rendah, kebebasan pribadi yang tinggi)
  (ekonomi rendah, kebebasan pribadi tinggi), dan konservatisme (ekonomi tinggi, kebebasan pribadi rendah). Sumbu kiri-kanan tradisional dianggap tidak cukup oleh Nolan karena gagal menangkap kompleksitas posisi politik, terutama di mana liberalisme klasik berada dalam lanskap politik.
question: Theo biểu đồ Nolan, hai trục nào được sử dụng để biểu thị các hệ tư tưởng chính trị?
answer: Tự do kinh tế và tự do cá nhân
wrong_answers:
  - Chính trị cánh tả và chính trị cánh hữu
  - Chủ nghĩa xã hội và chủ nghĩa tư bản
  - Dân chủ và chủ nghĩa độc tài
explanation: |
  Biểu đồ Nolan sử dụng hai chiều: tự do kinh tế và tự do cá nhân, tạo ra một phổ chính trị tinh tế hơn so với trục trái-phải truyền thống.
  
  Cách tiếp cận hai chiều này cho phép định vị tốt hơn các hệ tư tưởng khác nhau như chủ nghĩa tự do (tự do kinh tế và cá nhân cao), chủ nghĩa xã hội (tự do kinh tế thấp, tự do cá nhân cao) và chủ nghĩa bảo thủ (tự do kinh tế cao, tự do cá nhân thấp). Trục trái-phải truyền thống được Nolan cho là không đủ vì nó không thể nắm bắt được sự phức tạp của các lập trường chính trị, đặc biệt là vị trí của chủ nghĩa tự do cổ điển trong bối cảnh chính trị.
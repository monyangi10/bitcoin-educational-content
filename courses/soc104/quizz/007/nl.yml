question: Wat zijn volgens de Nolan Chart de twee assen die gebruikt worden om politieke ideologieën weer te geven?
answer: Economische vrijheid en persoonlijke vrijheid
wrong_answers:
  - Linkse politiek en rechtse politiek
  - Socialisme en kapitalisme
  - Democratie en autoritarisme
explanation: |
  De Nolan Chart gebruikt twee dimensies: economische vrijheid en persoonlijke vrijheid, waardoor een genuanceerder politiek spectrum ontstaat dan de traditionele links-rechts as.
  Deze tweedimensionale benadering maakt een betere positionering mogelijk van verschillende ideologieën zoals libertarisme (veel economische en persoonlijke vrijheid), socialisme
  (lage economische, hoge persoonlijke vrijheid) en conservatisme (hoge economische, lage persoonlijke vrijheid). De traditionele links-rechts as wordt door Nolan als ontoereikend beschouwd omdat deze niet de complexiteit van politieke standpunten weergeeft, met name waar het klassieke liberalisme in het politieke landschap past.
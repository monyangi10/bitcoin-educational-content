question: بر اساس نمودار نولان، دو محور مورد استفاده برای نمایش ایدئولوژی‌های سیاسی کدامند؟
answer: آزادی اقتصادی و آزادی شخصی
wrong_answers:
  - سیاست چپ‌گرا و سیاست راست‌گرا
  - سوسیالیسم و سرمایه‌داری
  - دموکراسی و اقتدارگرایی
explanation: |
  نمودار نولان از دو بُعد استفاده می‌کند: آزادی اقتصادی و آزادی شخصی، که طیف سیاسی پیچیده‌تری نسبت به محور سنتی چپ-راست ایجاد می‌کند. این رویکرد دو بعدی امکان موقعیت‌یابی بهتر ایدئولوژی‌های مختلف مانند لیبرترینیسم (آزادی اقتصادی و شخصی بالا)، سوسیالیسم (آزادی اقتصادی پایین، آزادی شخصی بالا) و محافظه‌کاری (آزادی اقتصادی بالا، آزادی شخصی پایین) را فراهم می‌کند. محور سنتی چپ-راست به‌وسیله نولان ناکافی تلقی می‌شود زیرا نمی‌تواند پیچیدگی مواضع سیاسی، به‌ویژه جایی که لیبرالیسم کلاسیک در چشم‌انداز سیاسی قرار می‌گیرد، را به‌درستی به تصویر بکشد.
question: Според диаграмата на Нолан кои са двете оси, използвани за представяне на политическите идеологии?
answer: Икономическа свобода и лична свобода
wrong_answers:
  - Лява и дясна политика
  - Социализъм и капитализъм
  - Демокрация и авторитаризъм
explanation: |
  Графиката на Нолан използва две измерения: икономическа свобода и лична свобода, което създава по-нюансиран политически спектър от традиционната ос ляво-дясно.
  Този двуизмерен подход дава възможност за по-добро позициониране на различни идеологии като либертарианството (висока икономическа и лична свобода), социализма
  (ниска икономическа и висока лична свобода) и консерватизъм (висока икономическа и ниска лична свобода). Традиционната ос "ляво-дясно" се счита от Нолан за недостатъчна, тъй като не успява да обхване сложността на политическите позиции, особено мястото на класическия либерализъм в политическия пейзаж.
question: 놀란 차트에 따르면 정치적 이념을 나타내는 데 사용되는 두 가지 축은 무엇인가요?
answer: 경제적 자유와 개인의 자유
wrong_answers:
  - 좌파 정치와 우파 정치
  - 사회주의와 자본주의
  - 민주주의와 권위주의
explanation: |
  놀란 차트는 경제적 자유와 개인의 자유라는 두 가지 차원을 사용하여 기존의 좌우 축보다 더 미묘한 정치적 스펙트럼을 만들어 냅니다.
  이 두 가지 차원으로 접근하면 자유주의(높은 경제적 자유와 개인의 자유), 사회주의(낮은 경제적 자유와 개인의 자유), 보수주의(낮은 경제적 자유와 개인의 자유)와 같은 다양한 이념을 더 잘 포지셔닝할 수 있습니다
  (낮은 경제적 자유, 높은 개인적 자유), 보수주의(높은 경제적 자유, 낮은 개인적 자유)와 같은 다양한 이념을 더 잘 배치할 수 있습니다. 놀란은 전통적인 좌-우 축은 정치적 입장의 복잡성, 특히 고전적 자유주의가 정치 지형에 적합한 위치를 포착하지 못하기 때문에 불충분한 것으로 간주합니다.
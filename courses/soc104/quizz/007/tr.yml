question: Nolan Grafiğine göre, siyasi ideolojileri temsil etmek için kullanılan iki eksen nedir?
answer: Ekonomik özgürlük ve kişisel özgürlük
wrong_answers:
  - Sol siyaset ve sağ siyaset
  - Sosyalizm ve kapitalizm
  - Demokrasi ve otoriterlik
explanation: |
  Nolan Grafiği iki boyut kullanır: ekonomik özgürlük ve kişisel özgürlük, geleneksel sol-sağ ekseninden daha incelikli bir siyasi spektrum oluşturur.
  Bu iki boyutlu yaklaşım, liberteryenizm (yüksek ekonomik ve kişisel özgürlük), sosyalizm gibi farklı ideolojilerin daha iyi konumlandırılmasını sağlar
  (düşük ekonomik, yüksek kişisel özgürlük) ve muhafazakarlık (yüksek ekonomik, düşük kişisel özgürlük). Geleneksel sol-sağ ekseni Nolan tarafından yetersiz olarak değerlendirilmektedir çünkü siyasi pozisyonların karmaşıklığını, özellikle de klasik liberalizmin siyasi manzarada nereye oturduğunu yakalamakta başarısız olmaktadır.
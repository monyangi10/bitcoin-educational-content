question: Welche beiden Achsen werden im Nolan-Diagramm zur Darstellung politischer Ideologien verwendet?
answer: Wirtschaftliche Freiheit und persönliche Freiheit
wrong_answers:
  - Linke Politik und rechte Politik
  - Sozialismus und Kapitalismus
  - Demokratie und Autoritarismus
explanation: |
  Das Nolan-Diagramm verwendet zwei Dimensionen: wirtschaftliche Freiheit und persönliche Freiheit, wodurch ein nuancierteres politisches Spektrum als die traditionelle Links-Rechts-Achse entsteht.
  Dieser zweidimensionale Ansatz ermöglicht eine bessere Positionierung verschiedener Ideologien wie Libertarismus (hohe wirtschaftliche und persönliche Freiheit), Sozialismus
  (geringe wirtschaftliche, hohe persönliche Freiheit) und Konservatismus (hohe wirtschaftliche, geringe persönliche Freiheit). Die traditionelle Links-Rechts-Achse wird von Nolan als unzureichend angesehen, da sie die Komplexität der politischen Positionen nicht erfasst, insbesondere die Einordnung des klassischen Liberalismus in die politische Landschaft.
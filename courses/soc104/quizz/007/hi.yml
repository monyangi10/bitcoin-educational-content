question: नोलन चार्ट के अनुसार, राजनीतिक विचारधाराओं को दर्शाने के लिए किन दो अक्षों का उपयोग किया जाता है?
answer: आर्थिक स्वतंत्रता और व्यक्तिगत स्वतंत्रता
wrong_answers:
  - वामपंथी राजनीति और दक्षिणपंथी राजनीति
  - समाजवाद और पूंजीवाद
  - लोकतंत्र और अधिनायकवाद
explanation: |
  नोलन चार्ट दो आयामों का उपयोग करता है: आर्थिक स्वतंत्रता और व्यक्तिगत स्वतंत्रता, जिससे पारंपरिक वाम-दक्षिण अक्ष की तुलना में अधिक सूक्ष्म राजनीतिक स्पेक्ट्रम बनता है।
  यह द्वि-आयामी दृष्टिकोण उदारवाद (उच्च आर्थिक और व्यक्तिगत स्वतंत्रता), समाजवाद (निम्न आर्थिक स्वतंत्रता, उच्च व्यक्तिगत स्वतंत्रता)
  और रूढ़िवाद (उच्च आर्थिक स्वतंत्रता, निम्न व्यक्तिगत स्वतंत्रता) जैसी विभिन्न विचारधाराओं की बेहतर स्थिति को समझने में सहायक होता है। नोलन पारंपरिक वाम-दक्षिण अक्ष को अपर्याप्त मानते हैं क्योंकि यह राजनीतिक स्थितियों की जटिलता को पूरी तरह से नहीं समझ पाता, विशेष रूप से यह कि शास्त्रीय उदारवाद राजनीतिक परिदृश्य में कहाँ फिट बैठता है।
question: Hvilke to akser brukes til å representere politiske ideologier, ifølge Nolan-diagrammet?
answer: Økonomisk frihet og personlig frihet
wrong_answers:
  - Venstrepolitikk og høyrepolitikk
  - Sosialisme og kapitalisme
  - Demokrati og autoritarisme
explanation: |
  Nolan Chart bruker to dimensjoner: økonomisk frihet og personlig frihet, noe som skaper et mer nyansert politisk spekter enn den tradisjonelle venstre-høyre-aksen.
  Denne todimensjonale tilnærmingen gjør det mulig å plassere ulike ideologier som libertarianisme (høy økonomisk og personlig frihet), sosialisme (lav økonomisk frihet, høy personlig frihet) og konservatisme (høy økonomisk frihet, lav personlig frihet) bedre
  (lav økonomisk, høy personlig frihet) og konservatisme (høy økonomisk, lav personlig frihet). Den tradisjonelle venstre-høyre-aksen anses av Nolan som utilstrekkelig fordi den ikke klarer å fange opp kompleksiteten i politiske posisjoner, og særlig ikke hvor klassisk liberalisme passer inn i det politiske landskapet.
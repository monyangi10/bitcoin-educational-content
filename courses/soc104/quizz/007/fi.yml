question: Mitä kahta akselia käytetään Nolanin kaavion mukaan kuvaamaan poliittisia ideologioita?
answer: Taloudellinen vapaus ja henkilökohtainen vapaus
wrong_answers:
  - Vasemmistopolitiikka ja oikeistopolitiikka
  - Sosialismi ja kapitalismi
  - Demokratia ja autoritaarisuus
explanation: |
  Nolan Chart käyttää kahta ulottuvuutta: taloudellista vapautta ja henkilökohtaista vapautta, mikä luo perinteistä vasemmisto-oikeisto -akselia vivahteikkaamman poliittisen spektrin.
  Tämä kaksiulotteinen lähestymistapa mahdollistaa erilaisten ideologioiden, kuten libertarismin (suuri taloudellinen ja henkilökohtainen vapaus), sosialismin ja sosialismin, paremman asemoinnin
  (vähäinen taloudellinen, suuri henkilökohtainen vapaus) ja konservatismi (suuri taloudellinen, vähäinen henkilökohtainen vapaus). Nolan pitää perinteistä vasen-oikea -akselia riittämättömänä, koska se ei pysty kuvaamaan poliittisten kantojen monitahoisuutta, erityisesti sitä, miten klassinen liberalismi sijoittuu poliittiseen maisemaan.
question: ตามแผนภูมิ Nolan แกนสองแกนที่ใช้แทนแนวคิดทางการเมืองคืออะไร?
answer: เสรีภาพทางเศรษฐกิจและเสรีภาพส่วนบุคคล
wrong_answers:
  - การเมืองฝ่ายซ้ายและการเมืองฝ่ายขวา
  - สังคมนิยมและทุนนิยม
  - ประชาธิปไตยและเผด็จการ
explanation: |
  แผนภูมิของโนแลนใช้สองมิติ: เสรีภาพทางเศรษฐกิจและเสรีภาพส่วนบุคคล สร้างสเปกตรัมทางการเมืองที่มีความละเอียดมากกว่าการแบ่งซ้าย-ขวาแบบดั้งเดิม
  วิธีการสองมิตินี้ช่วยให้สามารถวางตำแหน่งอุดมการณ์ต่างๆ ได้ดีขึ้น เช่น ลิเบอร์ทาเรียน (เสรีภาพทางเศรษฐกิจและส่วนบุคคลสูง), สังคมนิยม 
  (เสรีภาพทางเศรษฐกิจต่ำ เสรีภาพส่วนบุคคลสูง), และอนุรักษนิยม (เสรีภาพทางเศรษฐกิจสูง เสรีภาพส่วนบุคคลต่ำ) แกนซ้าย-ขวาแบบดั้งเดิมถูกมองว่าไม่เพียงพอโดยโนแลนเพราะมันไม่สามารถจับความซับซ้อนของตำแหน่งทางการเมืองได้ โดยเฉพาะที่ซึ่งลิเบอรัลคลาสสิกเข้ากับภูมิทัศน์ทางการเมือง
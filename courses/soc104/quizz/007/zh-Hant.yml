question: 根據 Nolan Chart，用來代表政治意識形態的兩個軸是什麼？
answer: 經濟自由與個人自由
wrong_answers:
  - 左翼政治與右翼政治
  - 社會主義與資本主義
  - 民主與專制
explanation: |
  Nolan Chart 使用兩個維度：經濟自由和個人自由，創造了一個比傳統左、右軸更細緻的政治光譜。
  這種二維方法可以更好地定位不同的意識形態，如自由主義（高經濟和個人自由）、社會主義（低經濟、高個人自由）和保守主義（高經濟、高個人自由）。
  (低經濟、高個人自由）和保守主義（高經濟、低個人自由）。Nolan 認為傳統的左右軸並不足夠，因為它無法捕捉政治立場的複雜性，尤其是古典自由主義在政治版圖中的定位。
question: Согласно диаграмме Нолана, какие две оси используются для представления политических идеологий?
answer: Экономическая свобода и свобода личности
wrong_answers:
  - Левая политика и правая политика
  - Социализм и капитализм
  - Демократия и авторитаризм
explanation: |
  Диаграмма Нолана использует два измерения: экономическую свободу и личную свободу, создавая более тонкий политический спектр, чем традиционная ось "левый-правый".
  Этот двухмерный подход позволяет лучше позиционировать различные идеологии, такие как либертарианство (высокая экономическая и личная свобода), социализм
  (низкая экономическая и высокая личная свобода), социализм и консерватизм (высокая экономическая и низкая личная свобода). Нолан считает традиционную ось "левый-правый" недостаточной, потому что она не отражает всей сложности политических позиций, в частности того, как классический либерализм вписывается в политический ландшафт.
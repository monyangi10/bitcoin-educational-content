question: Dukurikije igicapo ca Nolan, ni ibihe bice bibiri bikoreshwa mu guserukira ivyiyumviro vya politike?
answer: Umwidegemvyo mu vy'ubutunzi n'umwidegemvyo w'umuntu ku giti ciwe
wrong_answers:
  - Politike y'ibubamfu na politike y'iburyo
  - Ubusosiyalisimu n'ubu kapitalizimu
  - Demokarasi n'ubutegetsi bw'agahomerabunwa
explanation: |
  Igishushanyo ca Nolan gikoresha ibipimo bibiri: umwidegemvyo w’ubutunzi n’umwidegemvyo w’umuntu ku giti ciwe, bikaba bituma habaho urutonde rwa politike rufise utunenge twinshi kuruta umurongo w’ibubamfu n’iburyo.
  Ubwo buryo bufise ivyiyumviro bibiri buratuma habaho ugushirwa ahantu heza kw’ingengabitekerezo zitandukanye nk’ubwidegemvyo (umwidegemvyo wo mu vy’ubutunzi n’uw’umuntu ku giti ciwe wo hejuru), ubumwe bw’abantu . 
  (ubutunzi buke, umwidegemvyo w’umuntu munini), n’ugukingira (ubutunzi buhambaye, umwidegemvyo w’umuntu muto). Igihugu ca kera c’ibubamfu n’iburyo kibonwa ko kidahagije na Nolan kuko kidashobora gufata neza uburemere bw’ibibanza vya politike, cane cane aho uburenganzira bwa kera bujanye n’ivya politike.
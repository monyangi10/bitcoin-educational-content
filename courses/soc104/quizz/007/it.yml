question: Secondo il diagramma di Nolan, quali sono i due assi utilizzati per rappresentare le ideologie politiche?
answer: Libertà economica e libertà personale
wrong_answers:
  - Politica di sinistra e politica di destra
  - Socialismo e capitalismo
  - Democrazia e autoritarismo
explanation: |
  Il diagramma di Nolan utilizza due dimensioni: libertà economica e libertà personale, creando uno spettro politico più sfumato rispetto al tradizionale asse sinistra-destra.
  Questo approccio bidimensionale consente di posizionare meglio le diverse ideologie come il libertarismo (alta libertà economica e personale), il socialismo (bassa libertà economica, alta libertà personale) e il conservatorismo (alta libertà economica, bassa libertà personale)
  (bassa libertà economica e personale), il socialismo (bassa libertà economica e personale) e il conservatorismo (alta libertà economica e personale). L'asse tradizionale sinistra-destra è considerato insufficiente da Nolan perché non riesce a cogliere la complessità delle posizioni politiche, in particolare la collocazione del liberalismo classico nel panorama politico.
question: Kulingana na Chati ya Nolan, ni vipi vielelezo viwili vinavyotumika kuwakilisha itikadi za kisiasa?
answer: Uhuru wa kiuchumi na uhuru wa kibinafsi
wrong_answers:
  - Siasa za mrengo wa kushoto na siasa za mrengo wa kulia
  - Ujamaa na ubepari
  - Demokrasia na utawala wa kimabavu
explanation: |
  Chati ya Nolan hutumia vipimo viwili: uhuru wa kiuchumi na uhuru wa kibinafsi, na kuunda wigo wa kisiasa wenye muktadha mpana zaidi kuliko mhimili wa jadi wa kushoto-kulia.
  Mbinu hii ya pande mbili inaruhusu uwekaji bora wa itikadi tofauti kama vile uhuru wa uhuru (uhuru wa juu wa kiuchumi na kibinafsi), ujamaa (uhuru mdogo wa kiuchumi, uhuru mkubwa wa kibinafsi), na uhafidhina (uhuru wa juu wa kiuchumi, uhuru mdogo wa kibinafsi). Mhimili wa jadi wa kushoto-kulia unachukuliwa kuwa hautoshi na Nolan kwa sababu unashindwa kukamata ugumu wa misimamo ya kisiasa, haswa pale ambapo uhuru wa kitamaduni unafaa katika mazingira ya kisiasa.

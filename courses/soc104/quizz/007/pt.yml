question: De acordo com o gráfico de Nolan, quais são os dois eixos utilizados para representar as ideologias políticas?
answer: Liberdade económica e liberdade individual
wrong_answers:
  - Política de esquerda e política de direita
  - Socialismo e capitalismo
  - Democracia e autoritarismo
explanation: |
  O gráfico de Nolan utiliza duas dimensões: liberdade económica e liberdade pessoal, criando um espetro político mais matizado do que o tradicional eixo esquerda-direita.
  Esta abordagem bidimensional permite um melhor posicionamento de diferentes ideologias, como o libertarianismo (elevada liberdade económica e pessoal), o socialismo
  (baixa liberdade económica, alta liberdade pessoal) e conservadorismo (alta liberdade económica, baixa liberdade pessoal). O eixo tradicional esquerda-direita é considerado insuficiente por Nolan, porque não consegue captar a complexidade das posições políticas, nomeadamente o lugar que o liberalismo clássico ocupa na paisagem política.
question: Prema Nolanovom grafikonu, dve ose koje se koriste za predstavljanje političkih ideologija su ekonomska sloboda i lična sloboda.
answer: Ekonomska sloboda i lična sloboda
wrong_answers:
  - Levičarska politika i desničarska politika
  - Socijalizam i kapitalizam
  - Demokratija i autoritarizam
explanation: |
  Nolanova karta koristi dve dimenzije: ekonomsku slobodu i ličnu slobodu, stvarajući nijansiraniji politički spektar od tradicionalne levo-desno ose. Ovaj dvodimenzionalni pristup omogućava bolje pozicioniranje različitih ideologija kao što su libertarijanizam (visoka ekonomska i lična sloboda), socijalizam (niska ekonomska, visoka lična sloboda) i konzervativizam (visoka ekonomska, niska lična sloboda). Tradicionalna levo-desno osa se smatra nedovoljnom od strane Nolana jer ne uspeva da obuhvati složenost političkih pozicija, posebno gde klasični liberalizam nalazi svoje mesto u političkom pejzažu.
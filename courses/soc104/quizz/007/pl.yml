question: Zgodnie z wykresem Nolana, jakie są dwie osie używane do reprezentowania ideologii politycznych?
answer: Wolność gospodarcza i wolność osobista
wrong_answers:
  - Polityka lewicowa i polityka prawicowa
  - Socjalizm i kapitalizm
  - Demokracja i autorytaryzm
explanation: |
  Wykres Nolana wykorzystuje dwa wymiary: wolność gospodarczą i wolność osobistą, tworząc bardziej zniuansowane spektrum polityczne niż tradycyjna oś lewica-prawica.
  To dwuwymiarowe podejście pozwala na lepsze pozycjonowanie różnych ideologii, takich jak libertarianizm (wysoka wolność gospodarcza i osobista), socjalizm (niska wolność gospodarcza, wysoka wolność osobista) i konserwatyzm (wysoka wolność gospodarcza, wysoka wolność osobista)
  (niska wolność gospodarcza, wysoka wolność osobista) i konserwatyzm (wysoka wolność gospodarcza, niska wolność osobista). Tradycyjna oś lewica-prawica jest uważana przez Nolana za niewystarczającą, ponieważ nie oddaje złożoności stanowisk politycznych, w szczególności tego, gdzie klasyczny liberalizm wpisuje się w krajobraz polityczny.
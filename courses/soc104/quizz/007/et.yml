question: Millised on Nolani diagrammi kohaselt kaks telge, mida kasutatakse poliitiliste ideoloogiate kujutamiseks?
answer: Majandusvabadus ja isikuvabadus
wrong_answers:
  - Vasakpoolne poliitika ja parempoolne poliitika
  - Sotsialism ja kapitalism
  - Demokraatia ja autoritaarsus
explanation: |
  Nolani diagramm kasutab kahte mõõdet: majanduslikku vabadust ja isiklikku vabadust, mis loob nüansirikkama poliitilise spektri kui traditsiooniline vasak-parem telg.
  Selline kahe mõõtmega lähenemine võimaldab paremini positsioneerida erinevaid ideoloogiaid, nagu liberaalsus (kõrge majanduslik ja isiklik vabadus), sotsialism
  (madal majanduslik, kõrge isiklik vabadus) ja konservatiivsus (kõrge majanduslik, madal isiklik vabadus). Nolan peab traditsioonilist vasak-parempoolset telge ebapiisavaks, sest see ei suuda kajastada poliitiliste seisukohtade keerukust, eriti seda, kuhu klassikaline liberalism poliitilisel maastikul paigutub.
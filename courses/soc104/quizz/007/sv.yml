question: Vilka är de två axlar som används för att representera politiska ideologier enligt Nolan-diagrammet?
answer: Ekonomisk frihet och personlig frihet
wrong_answers:
  - Politik på vänster- och högerkanten
  - Socialism och kapitalism
  - Demokrati och auktoritärt styre
explanation: |
  Nolan Chart använder två dimensioner: ekonomisk frihet och personlig frihet, vilket skapar ett mer nyanserat politiskt spektrum än den traditionella vänster-höger-axeln.
  Detta tvådimensionella tillvägagångssätt möjliggör bättre positionering av olika ideologier som libertarianism (hög ekonomisk och personlig frihet), socialism
  (låg ekonomisk frihet, hög personlig frihet) och konservatism (hög ekonomisk frihet, låg personlig frihet). Den traditionella vänster-höger-axeln anses av Nolan vara otillräcklig eftersom den inte lyckas fånga komplexiteten i de politiska ståndpunkterna, särskilt när det gäller hur den klassiska liberalismen passar in i det politiska landskapet.
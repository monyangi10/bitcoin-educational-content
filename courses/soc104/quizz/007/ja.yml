question: ノーラン・チャートによると、政治イデオロギーを表すのに使われる2つの軸は何か？
answer: 経済的自由と個人の自由
wrong_answers:
  - 左翼政治と右翼政治
  - 社会主義と資本主義
  - 民主主義と権威主義
explanation: |
  ノーラン・チャートは、経済的自由と個人的自由の2つの次元を用い、伝統的な左右軸よりもニュアンスのある政治スペクトルを作り出している。
  この2次元的アプローチによって、リバタリアニズム（経済的・個人的自由が高い）、社会主義
  (経済的自由が低く、個人的自由が高い）、保守主義（経済的自由が高く、個人的自由が低い）といった異なるイデオロギーをより適切に位置づけることができる。伝統的な左右軸は、政治的立場の複雑さ、特に古典的自由主義が政治的景観のどこに位置づけられるかを捉えることができないため、ノーランは不十分だと考えている。
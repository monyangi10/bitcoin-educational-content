question: 根据诺兰图，用来表示政治意识形态的两个轴是什么？
answer: 经济自由和个人自由
wrong_answers:
  - 左翼政治和右翼政治
  - 社会主义和资本主义
  - 民主与专制
explanation: |
  诺兰图表》采用了两个维度：经济自由和个人自由，与传统的左右轴相比，形成了一个更加细致入微的政治光谱。
  这种二维方法可以更好地定位不同的意识形态，如自由主义（经济和个人自由度高）、社会主义（经济自由度低、个人自由度高）和保守主义（经济自由度高、个人自由度高）。
  (低经济、高个人自由）和保守主义（高经济、低个人自由）。诺兰认为传统的左右轴线不够充分，因为它无法捕捉到政治立场的复杂性，尤其是古典自由主义在政治格局中的位置。
question: ตามทฤษฎีความรู้กระจายของ Hayek ทำไมการวางแผนแบบรวมศูนย์ถึงมีข้อบกพร่องพื้นฐานในฐานะกลไกการประสานงานทางเศรษฐกิจ?
answer: ความรู้มีอยู่เพียงเป็นชิ้นส่วนกระจัดกระจายระหว่างบุคคล ทำให้เป็นไปไม่ได้ที่ผู้วางแผนส่วนกลางจะเข้าถึงข้อมูลที่สมบูรณ์ที่จำเป็นสำหรับการประสานงานอย่างมีประสิทธิภาพ
wrong_answers:
  - นักวางแผนส่วนกลางขาดอำนาจทางศีลธรรมในการตัดสินใจแทนผู้อื่น แม้ว่าพวกเขาจะมีข้อมูลตลาดครบถ้วนก็ตาม
  - การทุจริตทางการเมืองและผลประโยชน์ส่วนตนขัดขวางไม่ให้ผู้วางแผนส่วนกลางดำเนินการแก้ไขปัญหาที่เหมาะสมทางเศรษฐกิจแม้ว่าจะมีข้อมูลที่จำเป็นทั้งหมด
  - การวางแผนแบบรวมศูนย์ต้องการพลังการคำนวณและเทคโนโลยีมากเกินไปซึ่งไม่สามารถใช้ได้ในยุคของ Hayek แต่สามารถทำงานได้ในปัจจุบัน
explanation: |
  คำวิจารณ์ของ Hayek ต่อการวางแผนแบบรวมศูนย์เป็นเรื่องของญาณวิทยา ไม่ใช่เรื่องศีลธรรมหรือเทคโนโลยี เขาโต้แย้งว่าความรู้ไม่เคยมีอยู่ในรูปแบบที่รวมศูนย์ แต่มีอยู่เพียงในรูปแบบ 'เศษเสี้ยวที่กระจัดกระจายของความรู้ที่ไม่สมบูรณ์และมักขัดแย้งกันซึ่งบุคคลแต่ละคนมี' ปัญหาความรู้ที่กระจัดกระจายนี้หมายความว่าผู้วางแผนแบบรวมศูนย์ไม่สามารถเข้าถึงต้นทุน ผลประโยชน์ และความชอบในท้องถิ่นที่เป็นอัตวิสัยซึ่งมีเพียงบุคคลเท่านั้นที่มี ทำให้การประสานงานทางเศรษฐกิจที่มีประสิทธิภาพเป็นไปไม่ได้ไม่ว่าความตั้งใจหรือความสามารถในการคำนวณของพวกเขาจะเป็นอย่างไรก็ตาม
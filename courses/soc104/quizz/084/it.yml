question: Secondo la teoria della conoscenza dispersa di Hayek, perché la pianificazione centrale è fondamentalmente difettosa come meccanismo di coordinamento economico?
answer: La conoscenza esiste solo come frammenti dispersi tra gli individui, rendendo impossibile per i pianificatori centrali accedere alle informazioni complete necessarie per un coordinamento efficiente
wrong_answers:
  - I pianificatori centrali non hanno l'autorità morale di prendere decisioni per gli altri, anche quando possiedono informazioni complete sul mercato
  - La corruzione politica e gli interessi personali impediscono ai pianificatori centrali di implementare soluzioni economicamente ottimali, nonostante abbiano accesso a tutti i dati necessari
  - La pianificazione centrale richiede un'eccessiva potenza di calcolo e una tecnologia che non era disponibile ai tempi di Hayek ma che potrebbe funzionare oggi
explanation: |
  La critica di Hayek alla pianificazione centrale è epistemologica, non morale o tecnologica. Egli sosteneva che la conoscenza non esiste mai in forma concentrata, ma solo come "frammenti dispersi di conoscenza incompleta e spesso contraddittoria posseduta da tutti gli individui distinti" Questo problema di dispersione della conoscenza significa che i pianificatori centrali non possono accedere ai costi soggettivi, ai benefici e alle preferenze locali che solo gli individui possiedono, rendendo impossibile un coordinamento economico efficiente, indipendentemente dalle loro intenzioni o capacità di calcolo.
question: Warum ist nach Hayeks Theorie des verstreuten Wissens die zentrale Planung als wirtschaftlicher Koordinationsmechanismus grundsätzlich fehlerhaft?
answer: Wissen ist nur in Form von verstreuten Fragmenten bei den einzelnen Personen vorhanden, so dass es für zentrale Planer unmöglich ist, auf die vollständigen Informationen zuzugreifen, die für eine effiziente Koordinierung erforderlich sind
wrong_answers:
  - Den zentralen Planern fehlt die moralische Autorität, Entscheidungen für andere zu treffen, selbst wenn sie über vollständige Marktinformationen verfügen
  - Politische Korruption und Eigeninteressen hindern zentrale Planer daran, wirtschaftlich optimale Lösungen umzusetzen, obwohl sie Zugang zu allen notwendigen Daten haben
  - Zentrale Planung erfordert zu viel Rechenleistung und Technologie, die zu Hayeks Zeiten nicht verfügbar war, heute aber funktionieren könnte
explanation: |
  Hayeks Kritik an der zentralen Planung ist erkenntnistheoretischer, nicht moralischer oder technischer Natur. Er argumentierte, dass Wissen nie in konzentrierter Form existiert, sondern nur als "verstreute Fragmente von unvollständigem und häufig widersprüchlichem Wissen, das alle Individuen besitzen" Dieses Problem des verstreuten Wissens bedeutet, dass zentrale Planer keinen Zugang zu den subjektiven Kosten, Vorteilen und lokalen Präferenzen haben, die nur Individuen besitzen, was eine effiziente wirtschaftliche Koordinierung unmöglich macht, unabhängig von ihren Absichten oder Rechenkapazitäten.
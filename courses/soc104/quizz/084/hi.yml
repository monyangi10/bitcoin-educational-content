question: हेयक के विकेंद्रीकृत ज्ञान के सिद्धांत के अनुसार, आर्थिक समन्वय तंत्र के रूप में केंद्रीय नियोजन मौलिक रूप से त्रुटिपूर्ण क्यों है?
answer: ज्ञान व्यक्तियों के बीच बिखरे हुए टुकड़ों के रूप में ही मौजूद है, जिससे केंद्रीय योजनाकारों के लिए कुशल समन्वय के लिए आवश्यक संपूर्ण जानकारी प्राप्त करना असंभव हो जाता है।
wrong_answers:
  - केंद्रीय योजनाकारों के पास दूसरों के लिए निर्णय लेने का नैतिक अधिकार नहीं होता, भले ही उनके पास बाजार की पूरी जानकारी हो।
  - राजनीतिक भ्रष्टाचार और स्वार्थ केंद्रीय योजनाकारों को सभी आवश्यक आंकड़ों तक पहुंच होने के बावजूद आर्थिक रूप से सर्वोत्तम समाधानों को लागू करने से रोकते हैं।
  - केंद्रीय नियोजन के लिए बहुत अधिक गणना शक्ति और ऐसी तकनीक की आवश्यकता होती है जो हेयक के समय में उपलब्ध नहीं थी, लेकिन आज काम आ सकती है।
explanation: |
  हेयक की केंद्रीय नियोजन की आलोचना ज्ञानमीमांसात्मक है, न कि नैतिक या तकनीकी। उन्होंने तर्क दिया कि ज्ञान कभी भी संकेंद्रित रूप में विद्यमान नहीं होता, बल्कि केवल 'अपूर्ण और अक्सर विरोधाभासी ज्ञान के बिखरे हुए टुकड़ों' के रूप में होता है, जो सभी अलग-अलग व्यक्तियों के पास होता है। इस बिखरे हुए ज्ञान की समस्या का अर्थ है कि केंद्रीय योजनाकार उन व्यक्तिपरक लागतों, लाभों और स्थानीय प्राथमिकताओं तक नहीं पहुंच सकते जो केवल व्यक्तियों के पास होती हैं, जिससे उनके इरादों या गणना क्षमताओं के बावजूद कुशल आर्थिक समन्वय असंभव हो जाता है।
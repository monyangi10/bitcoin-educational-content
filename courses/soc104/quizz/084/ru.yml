question: Согласно теории рассеянного знания Хайека, почему централизованное планирование как механизм экономической координации в корне несовершенно?
answer: Знания существуют только в виде разрозненных фрагментов среди людей, что делает невозможным для централизованного планирования доступ к полной информации, необходимой для эффективной координации
wrong_answers:
  - Центральные планировщики не имеют морального права принимать решения за других, даже если они обладают полной информацией о рынке
  - Политическая коррупция и корысть мешают центральным плановикам реализовывать экономически оптимальные решения, несмотря на доступ ко всем необходимым данным
  - Централизованное планирование требует слишком больших вычислительных мощностей и технологий, которые были недоступны во времена Хайека, но могут работать сегодня
explanation: |
  Критика Хайеком централизованного планирования носит эпистемологический, а не моральный или технологический характер. Он утверждал, что знания никогда не существуют в концентрированном виде, а только в виде "разрозненных фрагментов неполных и часто противоречивых знаний, которыми обладают все отдельные индивиды" Проблема разрозненных знаний означает, что центральные планировщики не могут получить доступ к субъективным затратам, выгодам и локальным предпочтениям, которыми обладают только отдельные люди, что делает эффективную экономическую координацию невозможной, независимо от их намерений или вычислительных возможностей.
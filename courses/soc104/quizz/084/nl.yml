question: Waarom is centrale planning, volgens Hayeks theorie van verspreide kennis, fundamenteel gebrekkig als economisch coördinatiemechanisme?
answer: Kennis bestaat alleen als verspreide fragmenten onder individuen, waardoor het onmogelijk is voor centrale planners om toegang te krijgen tot de volledige informatie die nodig is voor efficiënte coördinatie
wrong_answers:
  - Centrale planners hebben niet het morele gezag om beslissingen voor anderen te nemen, zelfs als ze over volledige marktinformatie beschikken
  - Politieke corruptie en eigenbelang weerhouden centrale planners ervan om economisch optimale oplossingen te implementeren, ondanks het feit dat ze toegang hebben tot alle benodigde gegevens
  - Centrale planning vereist te veel rekenkracht en technologie die in Hayeks tijd niet beschikbaar was, maar vandaag de dag wel zou kunnen werken
explanation: |
  Hayeks kritiek op centrale planning is epistemologisch, niet moreel of technologisch. Hij stelde dat kennis nooit in geconcentreerde vorm bestaat, maar alleen als "verspreide fragmenten van onvolledige en vaak tegenstrijdige kennis die alle verschillende individuen bezitten" Dit probleem van verspreide kennis betekent dat centrale planners geen toegang hebben tot de subjectieve kosten, voordelen en lokale voorkeuren die alleen individuen bezitten, waardoor efficiënte economische coördinatie onmogelijk wordt, ongeacht hun bedoelingen of rekencapaciteiten.
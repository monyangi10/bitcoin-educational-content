question: Theo lý thuyết tri thức phân tán của Hayek, tại sao kế hoạch hóa tập trung lại có những khiếm khuyết cơ bản khi được sử dụng như một cơ chế điều phối kinh tế?
answer: Kiến thức chỉ tồn tại dưới dạng những mảnh vụn phân tán giữa các cá nhân, khiến cho các nhà hoạch định trung ương không thể tiếp cận được toàn bộ thông tin cần thiết cho việc phối hợp hiệu quả.
wrong_answers:
  - Các nhà hoạch định trung ương thiếu thẩm quyền đạo đức để đưa ra quyết định thay cho người khác, ngay cả khi họ nắm giữ đầy đủ thông tin thị trường.
  - Tham nhũng chính trị và lợi ích cá nhân cản trở các nhà hoạch định trung ương thực hiện các giải pháp tối ưu về kinh tế, mặc dù họ có đầy đủ dữ liệu cần thiết.
  - Kế hoạch hóa tập trung đòi hỏi quá nhiều sức mạnh tính toán và công nghệ mà thời của Hayek chưa có nhưng ngày nay hoàn toàn có thể áp dụng được.
explanation: |
  Phê phán của Hayek đối với kế hoạch hóa tập trung mang tính chất nhận thức luận, chứ không phải đạo đức hay công nghệ. Ông lập luận rằng tri thức không bao giờ tồn tại ở dạng tập trung mà chỉ là "những mảnh vụn phân tán của tri thức không đầy đủ và thường mâu thuẫn nhau, thuộc sở hữu của tất cả các cá nhân khác nhau". Vấn đề tri thức phân tán này có nghĩa là các nhà hoạch định chính sách tập trung không thể tiếp cận được chi phí, lợi ích và sở thích địa phương mang tính chủ quan mà chỉ các cá nhân mới có, khiến việc phối hợp kinh tế hiệu quả trở nên bất khả thi bất kể ý định hay khả năng tính toán của họ.
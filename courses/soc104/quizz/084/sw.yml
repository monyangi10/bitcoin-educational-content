question: Kulingana na nadharia ya Hayek ya maarifa yaliyotawanyika, kwa nini upangaji mkuu una kasoro kimsingi kama utaratibu wa uratibu wa kiuchumi?
answer: Maarifa yapo tu kama vipande vilivyotawanyika miongoni mwa watu binafsi, na kufanya iwe vigumu kwa wapangaji wakuu kupata taarifa kamili zinazohitajika kwa uratibu mzuri.
wrong_answers:
  - Wapangaji wakuu hawana mamlaka ya kimaadili ya kufanya maamuzi kwa ajili ya wengine, hata wanapokuwa na taarifa kamili za soko.
  - Rushwa ya kisiasa na maslahi binafsi huzuia wapangaji wakuu kutekeleza suluhisho bora za kiuchumi licha ya kupata data zote muhimu.
  - Kupanga mipango ya kati kunahitaji nguvu nyingi sana ya kompyuta na teknolojia ambayo haikuwapo wakati wa Hayek lakini inaweza kufanya kazi leo
explanation: |
  Ukosoaji wa Hayek kuhusu upangaji mkuu ni wa kiepistemolojia, si wa kimaadili au kiteknolojia. Alidai kwamba maarifa hayapo kamwe katika umbo lililojikita bali ni 'vipande vilivyotawanyika vya maarifa yasiyokamilika na yanayokinzana mara nyingi yanayomilikiwa na watu wote tofauti.' Tatizo hili la maarifa yaliyotawanyika linamaanisha kwamba wapangaji wakuu hawawezi kufikia gharama za kibinafsi, faida, na mapendeleo ya ndani ambayo watu binafsi pekee wanayo, na kufanya uratibu mzuri wa kiuchumi usiwezekane bila kujali nia zao au uwezo wao wa kompyuta.
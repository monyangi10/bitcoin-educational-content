question: 根据哈耶克的知识分散理论，为什么中央计划作为一种经济协调机制存在根本性缺陷？
answer: 知识只作为分散的片段存在于个人之间，使得中央规划者无法获得高效协调所需的完整信息
wrong_answers:
  - 中央计划者缺乏为他人做决定的道德权威，即使他们掌握了完整的市场信息
  - 政治腐败和自身利益阻碍了中央规划者实施经济上最优的解决方案，尽管他们可以获得所有必要的数据
  - 中央计划需要过多的计算能力和技术，而这些在哈耶克时代还不存在，但在今天却可以发挥作用
explanation: |
  哈耶克对中央计划的批判是认识论上的，而不是道德或技术上的。他认为，知识从来都不是以集中的形式存在的，而只能是'所有不同个体所拥有的不完整且经常相互矛盾的知识的分散片段'。这种分散的知识问题意味着中央计划者无法获得只有个人才拥有的主观成本、收益和地方偏好，因此无论其意图或计算能力如何，都不可能实现高效的经济协调。
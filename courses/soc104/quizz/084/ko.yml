question: 하이에크의 분산 지식 이론에 따르면, 중앙 계획이 경제 조정 메커니즘으로서 근본적으로 결함이 있는 이유는 무엇일까요?
answer: 지식은 개인 간에 분산된 단편으로만 존재하기 때문에 중앙 기획자가 효율적인 조정을 위해 필요한 전체 정보에 액세스할 수 없습니다
wrong_answers:
  - 중앙 기획자는 완전한 시장 정보를 가지고 있더라도 다른 사람을 위해 결정을 내릴 도덕적 권한이 부족합니다
  - 정치적 부패와 이기심으로 인해 중앙 계획가들은 필요한 모든 데이터에 액세스할 수 있음에도 불구하고 경제적으로 최적의 솔루션을 구현하지 못합니다
  - 중앙 계획에는 하이에크 시대에는 사용할 수 없었지만 오늘날에는 작동할 수 있는 계산 능력과 기술이 너무 많이 필요합니다
explanation: |
  하이에크의 중앙 계획에 대한 비판은 도덕적이거나 기술적인 것이 아니라 인식론적인 것입니다. 그는 지식은 결코 집중된 형태로 존재하는 것이 아니라 '모든 개별 개인이 소유한 불완전하고 종종 모순되는 지식의 분산된 파편'으로만 존재한다고 주장했습니다 이러한 분산된 지식의 문제는 중앙 계획가들이 개인만이 가지고 있는 주관적인 비용, 편익, 지역 선호도에 접근할 수 없기 때문에 그들의 의도나 계산 능력에 관계없이 효율적인 경제 조정을 불가능하게 만든다는 것을 의미합니다.
question: بر اساس نظریه دانش پراکنده هایک، چرا برنامه‌ریزی مرکزی به‌عنوان یک مکانیزم هماهنگی اقتصادی به‌طور بنیادی معیوب است؟
answer: دانش تنها به صورت قطعات پراکنده در میان افراد وجود دارد، که این امر دسترسی برنامه‌ریزان مرکزی به اطلاعات کامل مورد نیاز برای هماهنگی کارآمد را غیرممکن می‌سازد.
wrong_answers:
  - برنامه‌ریزان مرکزی فاقد اقتدار اخلاقی برای تصمیم‌گیری به‌جای دیگران هستند، حتی زمانی که اطلاعات کامل بازار را در اختیار دارند.
  - فساد سیاسی و منافع شخصی مانع از آن می‌شود که برنامه‌ریزان مرکزی، علیرغم دسترسی به تمامی داده‌های لازم، راه‌حل‌های بهینه اقتصادی را اجرا کنند.
  - برنامه‌ریزی مرکزی به قدرت محاسباتی و فناوری زیادی نیاز دارد که در زمان هایک در دسترس نبود اما امروزه می‌تواند کار کند.
explanation: |
  انتقاد هایک از برنامه‌ریزی مرکزی از نظر معرفت‌شناسی است، نه اخلاقی یا تکنولوژیکی. او استدلال کرد که دانش هرگز به صورت متمرکز وجود ندارد، بلکه تنها به عنوان «قطعات پراکنده‌ای از دانش ناقص و اغلب متناقض که توسط تمام افراد متمایز در اختیار است» وجود دارد. این مشکل دانش پراکنده به این معناست که برنامه‌ریزان مرکزی نمی‌توانند به هزینه‌ها، منافع و ترجیحات محلی که تنها افراد دارند دسترسی پیدا کنند، و این امر هماهنگی اقتصادی کارآمد را غیرممکن می‌سازد، صرف‌نظر از نیت یا قابلیت‌های محاسباتی آن‌ها.
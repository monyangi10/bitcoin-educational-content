question: 根據哈耶克的分散知識理論，中央計劃作為一種經濟協調機制，為什麼會有根本性的缺陷？
answer: 知識只以分散的片段形式存在於個人之間，使得中央規劃者無法取得有效協調所需的完整資訊。
wrong_answers:
  - 中央計畫者即使擁有完整的市場資訊，也缺乏為他人做決策的道德權威
  - 政治貪腐和自身利益驅使中央規劃者儘管能夠獲得所有必要的資料，卻無法實施經濟上的最佳解決方案
  - 中央計畫需要太多的運算能力和技術，這些在哈耶克的時代並不存在，但在今天卻可以運作。
explanation: |
  哈耶克對中央計畫的批判是認知學上的，而非道德或技術上的。他認為，知識從來都不是以集中的形式存在，而只是「所有不同個體所擁有的不完整且經常相互矛盾的分散知識片段」。這種分散的知識問題，意味著中央計畫者無法獲得只有個人才擁有的主觀成本、利益和當地偏好，使得無論他們的意圖或計算能力如何，都無法進行有效率的經濟協調。
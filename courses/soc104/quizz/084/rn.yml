question: Dushingiye ku ciyumviro ca Hayek c’ubumenyi bushize ahabona, ni kuki igenamigambi ry’imbere mu gihugu rifise amakosa mu vy’ukuri nk’uburyo bwo guhuza ubutunzi?
answer: Ubumenyi burabaho gusa nk’ibice binyanyagiye mu bantu, bikaba bituma abategura imigambi hagati badashobora kuronka amakuru yose akenewe kugira ngo habeho uguhuza neza .
wrong_answers:
  - Abategura imigambi yo hagati ntibagira ububasha bwo gufata ingingo ku bw’abandi, mbere n’igihe boba bafise amakuru yuzuye yerekeye isoko .
  - Igiturire ca politike n’inyungu z’umuntu ku giti ciwe bibuza abategura imigambi nkuru gushitsa inyishu nziza mu vy’ubutunzi naho bafise amakuru yose akenewe .
  - Itegeko ryo hagati risaba ububasha bwinshi cane bwo gukoresha ubuhinga bwa none n’ubuhinga butaboneka mu gihe ca Hayek ariko bushobora gukora muri iki gihe .
explanation: |
  Ivyo Hayek anegura ku bijanye n’igenamigambi ry’imbere ni ivy’ubumenyi, si ivy’inyifato runtu canke ivy’ubuhinga. Yavuze yuko ubumenyi butazokwigera bubaho mu buryo bwihariye, ahubwo ko bubaho gusa nk''ibice vy'ubumenyi butatunganye kandi buvuguruzanya kenshi bufise abantu bose batandukanye.' Ico kibazo c’ubumenyi bushize ahabona bisigura ko abategura imigambi hagati badashobora kuronka ibiciro, inyungu, n’ivyo umuntu akunda mu karere ari vyo abantu ku giti cabo gusa bafise, bikaba bituma uguhuza neza ubutunzi kudashoboka ataco bafatiye ku migambi yabo canke ubushobozi bwabo bwo gukoresha ubuhinga bwa none.
question: ハイエクの知識分散理論によれば、なぜ中央計画は経済調整メカニズムとして根本的な欠陥があるのか？
answer: 知識は個人の間に分散した断片としてのみ存在するため、中央のプランナーが効率的な調整に必要な完全な情報にアクセスすることは不可能である。
wrong_answers:
  - 中央計画者は、たとえ完全な市場情報を持っていたとしても、他人のために決定を下す道徳的権限がない。
  - 政治腐敗と私利私欲のために、中央計画者は必要なデータをすべて入手できるにもかかわらず、経済的に最適な解決策を実行できない。
  - 中央計画は、ハイエクの時代には利用できなかったが、今日では機能する可能性のある膨大な計算能力と技術を必要とする。
explanation: |
  中央計画に対するハイエクの批判は、道徳的、技術的なものではなく、認識論的なものである。彼は、知識は決して集中した形では存在せず、「すべての異なる個人が持つ不完全でしばしば矛盾する知識の分散した断片」としてのみ存在すると主張した。この分散された知識の問題は、中央計画者が個人だけが持つ主観的費用、便益、局所的選好にアクセスできないことを意味し、その意図や計算能力にかかわらず、効率的な経済調整を不可能にする。
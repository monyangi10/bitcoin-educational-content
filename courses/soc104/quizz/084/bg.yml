question: Защо според теорията на Хайек за разпръснатото знание централното планиране е фундаментално погрешно като механизъм за икономическа координация?
answer: Знанието съществува само като разпръснати фрагменти между отделните хора, което прави невъзможно централните плановици да имат достъп до пълната информация, необходима за ефективна координация
wrong_answers:
  - Централните плановици нямат моралното право да взимат решения вместо другите, дори когато разполагат с пълна информация за пазара
  - Политическата корупция и личният интерес пречат на централните плановици да прилагат икономически оптимални решения, въпреки че имат достъп до всички необходими данни
  - Централното планиране изисква твърде много изчислителна мощ и технологии, които не са били налични по времето на Хайек, но биха могли да работят днес
explanation: |
  Критиката на Хайек към централното планиране е епистемологична, а не морална или технологична. Той твърди, че знанието никога не съществува в концентрирана форма, а само като "разпръснати фрагменти от непълно и често противоречиво знание, притежавано от всички отделни индивиди" Този проблем с разпръснатото знание означава, че централните плановици не могат да получат достъп до субективните разходи, ползи и местни предпочитания, които притежават само индивидите, което прави невъзможна ефективната икономическа координация, независимо от техните намерения или изчислителни възможности.
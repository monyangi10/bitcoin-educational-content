question: Enligt det libertarianska perspektivet på samhällsfrågor, vilken är den grundläggande princip som bör styra statens inblandning i personliga frågor som äktenskap, invandring och droganvändning?
answer: Regeringen bör dra sig tillbaka från att reglera personliga val och i stället låta privata institutioner och marknadsmekanismer hantera dessa frågor
wrong_answers:
  - Regeringen bör aktivt skydda individuella rättigheter genom att genomdriva lika tillgång till alla institutioner och tjänster för alla medborgare
  - Regeringen bör balansera individuella friheter med kollektiv säkerhet genom noggrant utformade regler som skyddar samhället
  - Regeringen bör bevara traditionella institutioner och samtidigt gradvis anpassa sig till samhällsförändringar genom att skapa demokratiskt samförstånd
explanation: |
  Det libertarianska synsättet förespråkar konsekvent att man ska ta bort statlig inblandning snarare än att reformera den. När det gäller äktenskap föreslår de privatisering genom religiösa och privata organisationer.
  När det gäller invandring stöder de marknadsbaserade lösningar samtidigt som de motsätter sig statligt subventionerad invandring. När det gäller droger förespråkar de legalisering, men endast inom ett avstatligat samhälle. Detta skiljer sig från andra ideologier som försöker använda regeringsmakten för att antingen genomdriva jämlikhet (socialister), bevara ordningen (konservativa) eller hitta balanserade regleringar (centrister).
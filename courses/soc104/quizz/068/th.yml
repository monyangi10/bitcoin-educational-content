question: ตามมุมมองของลิเบอร์ทาเรียนเกี่ยวกับปัญหาสังคม หลักการพื้นฐานที่ควรชี้นำการมีส่วนร่วมของรัฐบาลในเรื่องส่วนบุคคล เช่น การแต่งงาน การย้ายถิ่นฐาน และการใช้ยาเสพติด คืออะไร?
answer: รัฐบาลควรถอนตัวจากการควบคุมการตัดสินใจส่วนบุคคลและอนุญาตให้สถาบันเอกชนและกลไกตลาดจัดการเรื่องเหล่านี้แทน
wrong_answers:
  - รัฐบาลควรปกป้องสิทธิส่วนบุคคลอย่างแข็งขันโดยการบังคับใช้การเข้าถึงสถาบันและบริการทั้งหมดอย่างเท่าเทียมกันสำหรับพลเมืองทุกคน
  - รัฐบาลควรสร้างสมดุลระหว่างเสรีภาพส่วนบุคคลกับความปลอดภัยของสังคมโดยผ่านการออกกฎระเบียบที่รอบคอบเพื่อปกป้องสังคม
  - รัฐบาลควรรักษาสถาบันดั้งเดิมไว้ในขณะที่ค่อยๆ ปรับตัวให้เข้ากับการเปลี่ยนแปลงทางสังคมผ่านการสร้างฉันทามติในระบอบประชาธิปไตย
explanation: |
  แนวทางเสรีนิยมมักสนับสนุนการถอดถอนการมีส่วนร่วมของรัฐบาลมากกว่าการปฏิรูป ในเรื่องการแต่งงาน พวกเขาเสนอการแปรรูปรัฐวิสาหกิจผ่านองค์กรทางศาสนาและเอกชน ในเรื่องการย้ายถิ่นฐาน พวกเขาสนับสนุนวิธีการแก้ปัญหาที่อิงกับตลาดในขณะที่คัดค้านการย้ายถิ่นฐานที่ได้รับเงินอุดหนุนจากรัฐ ในเรื่องยาเสพติด พวกเขาสนับสนุนการทำให้ถูกกฎหมายแต่เฉพาะในสังคมที่ไม่มีรัฐเท่านั้น ซึ่งแตกต่างจากอุดมการณ์อื่น ๆ ที่พยายามใช้พลังของรัฐบาลเพื่อบังคับใช้ความเท่าเทียมกัน (สังคมนิยม) รักษาความสงบเรียบร้อย (อนุรักษ์นิยม) หรือหากฎระเบียบที่สมดุล (สายกลาง)
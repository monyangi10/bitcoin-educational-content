question: Wat is volgens het libertarische perspectief op maatschappelijke kwesties het fundamentele principe dat overheidsbemoeienis met persoonlijke zaken als huwelijk, immigratie en drugsgebruik zou moeten sturen?
answer: De overheid moet zich terugtrekken uit het reguleren van persoonlijke keuzes en in plaats daarvan toestaan dat particuliere instellingen en marktmechanismen deze zaken afhandelen
wrong_answers:
  - De overheid moet individuele rechten actief beschermen door gelijke toegang tot alle instellingen en diensten voor elke burger af te dwingen
  - De overheid moet een evenwicht vinden tussen individuele vrijheden en collectieve veiligheid door middel van zorgvuldig opgestelde regels die de samenleving beschermen
  - De regering moet traditionele instellingen behouden en zich tegelijkertijd geleidelijk aanpassen aan sociale veranderingen door middel van democratische consensusvorming
explanation: |
  De libertarische benadering pleit consequent voor het verwijderen van overheidsbemoeienis in plaats van het hervormen ervan. Op het gebied van het huwelijk stellen ze privatisering voor via religieuze en particuliere organisaties.
  Op het gebied van immigratie steunen ze marktgebaseerde oplossingen terwijl ze tegen door de staat gesubsidieerde immigratie zijn. Op het gebied van drugs zijn ze voorstander van legalisatie, maar alleen binnen een gedestateerde samenleving. Dit verschilt van andere ideologieën die overheidsmacht willen gebruiken om gelijkheid af te dwingen (socialisten), de orde te bewaren (conservatieven) of om evenwichtige regelgeving te vinden (centristen).
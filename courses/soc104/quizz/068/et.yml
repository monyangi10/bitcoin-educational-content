question: Milline on libertaarne vaatenurk ühiskondlikes küsimustes, mis on põhiprintsiip, mis peaks suunama valitsuse sekkumist sellistesse isiklikesse küsimustesse nagu abielu, sisseränne ja uimastitarbimine?
answer: Valitsus peaks loobuma isiklike valikute reguleerimisest ja lubama selle asemel eraõiguslikel institutsioonidel ja turumehhanismidel neid küsimusi lahendada
wrong_answers:
  - Valitsus peaks aktiivselt kaitsma üksikisiku õigusi, tagades kõigile kodanikele võrdse juurdepääsu kõikidele institutsioonidele ja teenustele
  - Valitsus peaks tasakaalustama üksikisiku vabadusi ja kollektiivset julgeolekut hoolikalt väljatöötatud õigusnormide kaudu, mis kaitsevad ühiskonda
  - Valitsus peaks säilitama traditsioonilised institutsioonid, kohandudes samal ajal järk-järgult sotsiaalsete muutustega demokraatliku konsensuse saavutamise kaudu
explanation: |
  Libertaarne lähenemine pooldab järjekindlalt valitsuse sekkumise kaotamist, mitte selle reformimist. Abielu osas teevad nad ettepaneku erastamiseks religioossete ja eraõiguslike organisatsioonide kaudu.
  Sisserände osas toetavad nad turupõhiseid lahendusi, olles samas riigi poolt subsideeritud sisserände vastu. Narkootikumide osas pooldavad nad legaliseerimist, kuid ainult riigi poolt vabastatud ühiskonnas. See erineb teistest ideoloogiatest, mis püüavad kasutada valitsuse võimu kas võrdsuse jõustamiseks (sotsialistid), korra säilitamiseks (konservatiivid) või tasakaalustatud regulatsioonide leidmiseks (tsentristid).
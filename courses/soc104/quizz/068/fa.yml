question: بر اساس دیدگاه لیبرترین در مسائل اجتماعی، اصل اساسی که باید راهنمای دخالت دولت در امور شخصی مانند ازدواج، مهاجرت و مصرف مواد مخدر باشد چیست؟
answer: دولت باید از تنظیم انتخاب‌های شخصی کناره‌گیری کند و اجازه دهد نهادهای خصوصی و مکانیزم‌های بازار به جای آن‌ها به این امور رسیدگی کنند.
wrong_answers:
  - دولت باید با اجرای دسترسی برابر به تمام نهادها و خدمات برای هر شهروند، به طور فعال از حقوق فردی محافظت کند.
  - دولت باید آزادی‌های فردی را با امنیت جمعی از طریق مقرراتی که با دقت طراحی شده‌اند و از جامعه محافظت می‌کنند، متعادل کند.
  - دولت باید نهادهای سنتی را حفظ کند و در عین حال با ایجاد اجماع دموکراتیک به تدریج با تغییرات اجتماعی سازگار شود.
explanation: |
  رویکرد لیبرترین به طور مداوم از حذف دخالت دولت به جای اصلاح آن حمایت می‌کند. در مورد ازدواج، آنها خصوصی‌سازی از طریق سازمان‌های مذهبی و خصوصی را پیشنهاد می‌دهند. 
  در مورد مهاجرت، آنها از راه‌حل‌های مبتنی بر بازار حمایت می‌کنند و با مهاجرت یارانه‌ای دولتی مخالفند. در مورد مواد مخدر، آنها طرفدار قانونی‌سازی هستند اما تنها در یک جامعه بدون دولت. این با دیگر ایدئولوژی‌ها که به دنبال استفاده از قدرت دولت برای اجرای برابری (سوسیالیست‌ها)، حفظ نظم (محافظه‌کاران)، یا یافتن مقررات متعادل (میانه‌روها) هستند، متفاوت است.
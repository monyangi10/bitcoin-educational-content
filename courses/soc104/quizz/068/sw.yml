question: Kulingana na mtazamo wa uhuru kuhusu masuala ya kijamii, ni kanuni gani ya msingi inayopaswa kuongoza ushiriki wa serikali katika masuala ya kibinafsi kama vile ndoa, uhamiaji, na matumizi ya dawa za kulevya?
answer: Serikali inapaswa kujiondoa katika kudhibiti chaguzi za kibinafsi na kuruhusu taasisi binafsi na mifumo ya soko kushughulikia masuala haya badala yake.
wrong_answers:
  - Serikali inapaswa kulinda haki za mtu binafsi kwa kutekeleza usawa katika upatikanaji wa taasisi na huduma zote kwa kila raia
  - Serikali inapaswa kusawazisha uhuru wa mtu binafsi na usalama wa pamoja kupitia kanuni zilizotungwa kwa uangalifu zinazolinda jamii
  - Serikali inapaswa kuhifadhi taasisi za kitamaduni huku ikibadilika polepole kulingana na mabadiliko ya kijamii kupitia ujenzi wa makubaliano ya kidemokrasia
explanation: |
  Mbinu ya uhuru hutetea mara kwa mara kuondoa ushiriki wa serikali badala ya kuirekebisha. Kuhusu ndoa, wanapendekeza ubinafsishaji kupitia mashirika ya kidini na ya kibinafsi.
  
  Kuhusu uhamiaji, wanaunga mkono suluhisho zinazotegemea soko huku wakipinga uhamiaji unaofadhiliwa na serikali. Kuhusu dawa za kulevya, wanapendelea kuhalalishwa lakini ndani ya jamii iliyokataliwa na serikali pekee. Hii inatofautiana na itikadi zingine zinazotafuta kutumia mamlaka ya serikali kutekeleza usawa (wasoshalisti), kuhifadhi utulivu (wahafidhina), au kupata kanuni zenye usawa (watu wa kati).
question: Hva er det grunnleggende prinsippet som bør ligge til grunn for statlig innblanding i personlige forhold som ekteskap, innvandring og narkotikabruk, ifølge det libertarianske perspektivet på samfunnsspørsmål?
answer: Myndighetene bør trekke seg tilbake fra å regulere personlige valg og i stedet la private institusjoner og markedsmekanismer håndtere disse spørsmålene
wrong_answers:
  - Myndighetene bør aktivt beskytte individuelle rettigheter ved å håndheve lik tilgang til alle institusjoner og tjenester for alle borgere
  - Myndighetene bør balansere individuell frihet med kollektiv sikkerhet gjennom nøye utformede reguleringer som beskytter samfunnet
  - Myndighetene bør bevare tradisjonelle institusjoner samtidig som de gradvis tilpasser seg samfunnsendringene gjennom demokratisk konsensusbygging
explanation: |
  Den libertarianske tilnærmingen går konsekvent inn for å fjerne statlig involvering snarere enn å reformere den. Når det gjelder ekteskap, foreslår de privatisering gjennom religiøse og private organisasjoner.
  Når det gjelder innvandring, støtter de markedsbaserte løsninger, mens de motsetter seg statssubsidiert innvandring. Når det gjelder narkotika, går de inn for legalisering, men bare innenfor et avstatliggjort samfunn. Dette skiller seg fra andre ideologier som søker å bruke statlig makt til enten å håndheve likhet (sosialister), bevare orden (konservative) eller finne balanserte reguleringer (sentrumsorienterte).
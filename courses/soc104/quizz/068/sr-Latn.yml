question: Prema libertarijanskoj perspektivi o društvenim pitanjima, koji je temeljni princip koji bi trebao voditi vladino uplitanje u lične stvari poput braka, imigracije i upotrebe droga?
answer: Vlada bi trebalo da se povuče iz regulisanja ličnih izbora i dozvoli privatnim institucijama i tržišnim mehanizmima da umesto toga rešavaju ova pitanja
wrong_answers:
  - Vlada bi trebalo aktivno da štiti individualna prava sprovođenjem jednakog pristupa svim institucijama i uslugama za svakog građanina.
  - Vlada treba da balansira individualne slobode sa kolektivnom sigurnošću kroz pažljivo osmišljene propise koji štite društvo.
  - Vlada bi trebalo da očuva tradicionalne institucije dok se postepeno prilagođava društvenim promenama kroz izgradnju demokratskog konsenzusa.
explanation: |
  Libertarijanski pristup dosledno zagovara uklanjanje vladinog učešća umesto njegovog reformisanja. Po pitanju braka, predlažu privatizaciju kroz verske i privatne organizacije. 
  Po pitanju imigracije, podržavaju rešenja zasnovana na tržištu dok se protive imigraciji subvencionisanoj od strane države. Po pitanju droga, zalažu se za legalizaciju, ali samo unutar društva bez državne kontrole. Ovo se razlikuje od drugih ideologija koje nastoje da koriste moć vlade da ili sprovedu jednakost (socijalisti), očuvaju red (konzervativci), ili pronađu uravnotežene regulative (centristi).
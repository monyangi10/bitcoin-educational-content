question: Jaký je podle libertariánského pohledu na společenské otázky základní princip, jímž by se měla vláda řídit v osobních záležitostech, jako je manželství, imigrace a užívání drog?
answer: Vláda by měla ustoupit od regulace osobních rozhodnutí a nechat tyto záležitosti řešit soukromé instituce a tržní mechanismy
wrong_answers:
  - Vláda by měla aktivně chránit práva jednotlivce tím, že bude prosazovat rovný přístup ke všem institucím a službám pro každého občana
  - Vláda by měla vyvažovat individuální svobody a kolektivní bezpečnost prostřednictvím pečlivě vypracovaných předpisů, které chrání společnost
  - Vláda by měla zachovat tradiční instituce a zároveň se postupně přizpůsobovat společenským změnám prostřednictvím demokratického konsensu
explanation: |
  Libertariánský přístup důsledně prosazuje spíše odstranění vládní angažovanosti než její reformu. V oblasti manželství navrhují privatizaci prostřednictvím náboženských a soukromých organizací.
  V oblasti imigrace podporují tržní řešení a zároveň jsou proti státem dotované imigraci. V oblasti drog jsou pro legalizaci, ale pouze v rámci odstátněné společnosti. Tím se liší od ostatních ideologií, které se snaží využít státní moc buď k prosazení rovnosti (socialisté), zachování pořádku (konzervativci), nebo k nalezení vyvážených regulací (centristé).
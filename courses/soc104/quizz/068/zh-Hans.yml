question: 根据自由主义者对社会问题的看法，政府介入婚姻、移民和吸毒等个人事务的基本原则是什么？
answer: 政府应退出对个人选择的监管，让私人机构和市场机制来处理这些问题
wrong_answers:
  - 政府应积极保护个人权利，确保每个公民都能平等利用所有机构和服务
  - 政府应通过精心制定保护社会的法规，在个人自由与集体安全之间取得平衡
  - 政府应在保留传统体制的同时，通过建立民主共识来逐步适应社会变革
explanation: |
  自由主义者的做法一贯主张取消而不是改革政府的参与。在婚姻问题上，他们建议通过宗教和私人组织实现私有化。
  在移民问题上，他们支持以市场为基础的解决方案，同时反对国家补贴移民。在毒品问题上，他们赞成毒品合法化，但仅限于在一个去国家化的社会中。这与其他意识形态不同，这些意识形态寻求利用政府权力来实现平等（社会主义者）、维护秩序（保守派）或找到平衡的规章制度（中间派）。
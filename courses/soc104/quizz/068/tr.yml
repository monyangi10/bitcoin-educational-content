question: Toplumsal meselelere özgürlükçü bakış açısına göre, evlilik, göçmenlik ve uyuşturucu kullanımı gibi kişisel konularda hükümetin müdahalesine rehberlik etmesi gereken temel ilke nedir?
answer: Hükümet kişisel tercihleri düzenlemekten çekilmeli ve bunun yerine özel kurumların ve piyasa mekanizmalarının bu konuları ele almasına izin vermelidir
wrong_answers:
  - Hükümet, her vatandaşın tüm kurum ve hizmetlere eşit erişimini sağlayarak bireysel hakları aktif bir şekilde korumalıdır
  - Hükümet, toplumu koruyan ve dikkatle hazırlanmış düzenlemeler yoluyla bireysel özgürlükler ile kolektif güvenlik arasında denge kurmalıdır
  - Hükümet geleneksel kurumları korumalı ve demokratik uzlaşı inşası yoluyla toplumsal değişimlere kademeli olarak uyum sağlamalıdır
explanation: |
  Özgürlükçü yaklaşım sürekli olarak devlet müdahalesini reforme etmek yerine ortadan kaldırmayı savunmaktadır. Evlilik konusunda dini ve özel kuruluşlar aracılığıyla özelleştirme önermektedirler.
  Göç konusunda, devlet destekli göçe karşı çıkarken piyasa temelli çözümleri desteklemektedirler. Uyuşturucu konusunda ise yasallaştırmadan yanadırlar, ancak sadece devletleştirilmemiş bir toplumda. Bu, hükümet gücünü eşitliği sağlamak (sosyalistler), düzeni korumak (muhafazakarlar) ya da dengeli düzenlemeler bulmak (merkezciler) için kullanmaya çalışan diğer ideolojilerden farklıdır.
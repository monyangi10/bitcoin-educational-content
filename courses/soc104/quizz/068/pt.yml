question: De acordo com a perspetiva libertária sobre questões sociais, qual é o princípio fundamental que deve orientar o envolvimento do governo em questões pessoais como o casamento, a imigração e o consumo de drogas?
answer: O governo deve deixar de regular as escolhas pessoais e permitir que as instituições privadas e os mecanismos de mercado tratem destas questões
wrong_answers:
  - O governo deve proteger ativamente os direitos individuais, impondo a igualdade de acesso de todos os cidadãos a todas as instituições e serviços
  - O governo deve equilibrar as liberdades individuais com a segurança colectiva através de regulamentos cuidadosamente elaborados que protejam a sociedade
  - O governo deve preservar as instituições tradicionais e adaptar-se gradualmente às mudanças sociais através da construção de consensos democráticos
explanation: |
  A abordagem libertária defende consistentemente a remoção do envolvimento do governo em vez de o reformar. Relativamente ao casamento, propõem a sua privatização através de organizações religiosas e privadas.
  Relativamente à imigração, apoiam soluções baseadas no mercado e opõem-se à imigração subsidiada pelo Estado. Relativamente às drogas, são a favor da legalização, mas apenas numa sociedade desestatizada. Isto difere de outras ideologias que procuram utilizar o poder do governo para impor a igualdade (socialistas), preservar a ordem (conservadores) ou encontrar regulamentos equilibrados (centristas).
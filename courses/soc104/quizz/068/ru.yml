question: Согласно либертарианской точке зрения на общественные проблемы, каким основополагающим принципом должно руководствоваться правительство при решении личных вопросов, таких как брак, иммиграция и употребление наркотиков?
answer: Правительство должно отказаться от регулирования личного выбора и позволить частным институтам и рыночным механизмам решать эти вопросы
wrong_answers:
  - Правительство должно активно защищать права личности, обеспечивая равный доступ ко всем учреждениям и услугам для каждого гражданина
  - Правительство должно уравновешивать индивидуальные свободы и коллективную безопасность с помощью тщательно продуманных правил, которые защищают общество
  - Правительство должно сохранять традиционные институты, постепенно адаптируясь к социальным изменениям путем достижения демократического консенсуса
explanation: |
  Либертарианцы последовательно выступают за отказ от участия государства, а не за его реформирование. В вопросах брака они предлагают приватизацию через религиозные и частные организации.
  В вопросах иммиграции они поддерживают рыночные решения, выступая против субсидируемой государством иммиграции. Что касается наркотиков, то они выступают за их легализацию, но только в условиях дестабилизации общества. Этим они отличаются от других идеологий, которые стремятся использовать государственную власть либо для обеспечения равенства (социалисты), либо для сохранения порядка (консерваторы), либо для поиска сбалансированных правил (центристы).
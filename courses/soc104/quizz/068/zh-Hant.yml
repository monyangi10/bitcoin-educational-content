question: 根據自由主義者對社會問題的觀點，政府介入婚姻、移民和毒品使用等個人問題時，應該遵循的基本原則是什麼？
answer: 政府應該退出規範個人選擇的領域，改由私人機構和市場機制來處理這些事務。
wrong_answers:
  - 政府應積極保護個人權利，強制每個公民都能平等使用所有機構和服務。
  - 政府應透過精心制定的法規，在個人自由與集體安全之間取得平衡，以保護社會
  - 政府應在保留傳統制度的同時，透過民主共識的建立，逐步適應社會變遷
explanation: |
  自由主義者的方法始終主張取消政府的參與，而非改革政府。在婚姻方面，他們建議透過宗教和私人組織實行私有化。
  在移民問題上，他們支持以市場為基礎的解決方案，同時反對國家補貼的移民。在毒品方面，他們贊成合法化，但只限於在非國家化的社會中。這與其他意識形態不同，這些意識形態尋求運用政府權力來強制執行平等（社會主義者）、維護秩序（保守主義者）或尋找平衡的規範（中間主義者）。
question: Според либертарианската гледна точка към обществените въпроси какъв е основният принцип, който трябва да ръководи държавната намеса в лични въпроси като брака, имиграцията и употребата на наркотици?
answer: Правителството трябва да се оттегли от регулирането на личния избор и да позволи на частните институции и пазарните механизми да се справят с тези въпроси
wrong_answers:
  - Правителството трябва активно да защитава индивидуалните права, като налага равен достъп на всеки гражданин до всички институции и услуги
  - Правителството трябва да балансира между индивидуалните свободи и колективната сигурност чрез внимателно разработени разпоредби, които защитават обществото
  - Правителството трябва да запази традиционните институции, като същевременно постепенно се адаптира към социалните промени чрез изграждане на демократичен консенсус
explanation: |
  Либертарианският подход последователно се застъпва за премахване на държавната намеса, а не за нейното реформиране. По отношение на брака те предлагат приватизация чрез религиозни и частни организации.
  По отношение на имиграцията те подкрепят пазарните решения, като се противопоставят на субсидираната от държавата имиграция. По отношение на наркотиците те подкрепят легализацията, но само в рамките на едно дестабилизирано общество. Това ги различава от други идеологии, които се стремят да използват държавната власт или за налагане на равенство (социалисти), или за запазване на реда (консерватори), или за намиране на балансирани регулации (центристи).
question: 사회 문제에 대한 자유주의적 관점에 따르면 결혼, 이민, 마약 사용과 같은 개인적인 문제에 정부가 개입할 때 지켜야 할 기본 원칙은 무엇인가요?
answer: 정부는 개인의 선택에 대한 규제를 철회하고 대신 민간 기관과 시장 메커니즘이 이러한 문제를 처리하도록 허용해야합니다
wrong_answers:
  - 정부는 모든 시민이 모든 기관과 서비스에 동등하게 접근할 수 있도록 하여 개인의 권리를 적극적으로 보호해야 합니다
  - 정부는 사회를 보호하는 세심한 규제를 통해 개인의 자유와 집단적 안전의 균형을 유지해야 합니다
  - 정부는 전통적인 제도를 보존하면서 민주적 합의 형성을 통해 사회 변화에 점진적으로 적응해야 합니다
explanation: |
  자유주의적 접근 방식은 일관되게 정부의 개입을 개혁하기보다는 제거할 것을 주장합니다. 결혼에 대해서는 종교 및 민간 단체를 통한 민영화를 제안합니다.
  이민과 관련해서는 시장 기반 솔루션을 지지하는 반면 국가 보조금을 받는 이민에는 반대합니다. 마약에 대해서는 합법화를 찬성하지만 탈국가화된 사회 내에서만 가능합니다. 이는 평등(사회주의자), 질서 유지(보수주의자), 균형 잡힌 규제(중도주의자)를 위해 정부 권력을 사용하려는 다른 이념과는 다릅니다.
question: Según la perspectiva libertaria de las cuestiones sociales, ¿cuál es el principio fundamental que debe guiar la intervención del gobierno en asuntos personales como el matrimonio, la inmigración y el consumo de drogas?
answer: El gobierno debería dejar de regular las decisiones personales y permitir que las instituciones privadas y los mecanismos de mercado se ocupen de estos asuntos
wrong_answers:
  - El gobierno debe proteger activamente los derechos individuales garantizando la igualdad de acceso de todos los ciudadanos a todas las instituciones y servicios
  - El gobierno debe equilibrar las libertades individuales con la seguridad colectiva mediante normas cuidadosamente elaboradas que protejan a la sociedad
  - El gobierno debe preservar las instituciones tradicionales y adaptarse gradualmente a los cambios sociales mediante la creación de un consenso democrático
explanation: |
  El enfoque libertario aboga sistemáticamente por eliminar la participación del gobierno en lugar de reformarla. En cuanto al matrimonio, proponen la privatización a través de organizaciones religiosas y privadas.
  En cuanto a la inmigración, apoyan soluciones basadas en el mercado y se oponen a la inmigración subvencionada por el Estado. En cuanto a las drogas, están a favor de la legalización, pero sólo dentro de una sociedad desestatizada. Esto difiere de otras ideologías que buscan utilizar el poder del gobierno para imponer la igualdad (socialistas), preservar el orden (conservadores) o encontrar regulaciones equilibradas (centristas).
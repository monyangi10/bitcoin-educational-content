question: According to the libertarian perspective on societal issues, what is the fundamental principle that should guide government involvement in personal matters like marriage, immigration, and drug use?
answer: The government should withdraw from regulating personal choices and allow private institutions and market mechanisms to handle these matters instead
wrong_answers:
  - The government should actively protect individual rights by enforcing equal access to all institutions and services for every citizen
  - The government should balance individual freedoms with collective security through carefully crafted regulations that protect society
  - The government should preserve traditional institutions while gradually adapting to social changes through democratic consensus-building
explanation: |
  The libertarian approach consistently advocates for removing government involvement rather than reforming it. On marriage, they propose privatization through religious and private organizations. On immigration, they support market-based solutions while opposing state-subsidized immigration. On drugs, they favor legalization but only within a de-statized society. This differs from other ideologies that seek to use government power to either enforce equality (socialists), preserve order (conservatives), or find balanced regulations (centrists).

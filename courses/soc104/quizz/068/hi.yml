question: सामाजिक मुद्दों पर उदारवादी दृष्टिकोण के अनुसार, विवाह, आप्रवासन और नशीली दवाओं के उपयोग जैसे व्यक्तिगत मामलों में सरकारी हस्तक्षेप का मार्गदर्शन करने वाला मूलभूत सिद्धांत क्या होना चाहिए?
answer: सरकार को व्यक्तिगत विकल्पों को विनियमित करने से पीछे हट जाना चाहिए और इसके बजाय निजी संस्थानों और बाजार तंत्रों को इन मामलों को संभालने की अनुमति देनी चाहिए।
wrong_answers:
  - सरकार को सभी नागरिकों के लिए सभी संस्थानों और सेवाओं तक समान पहुंच सुनिश्चित करके व्यक्तिगत अधिकारों की सक्रिय रूप से रक्षा करनी चाहिए।
  - सरकार को सावधानीपूर्वक तैयार किए गए नियमों के माध्यम से व्यक्तिगत स्वतंत्रता और सामूहिक सुरक्षा के बीच संतुलन स्थापित करना चाहिए, जो समाज की रक्षा करें।
  - सरकार को लोकतांत्रिक सहमति निर्माण के माध्यम से सामाजिक परिवर्तनों के अनुरूप धीरे-धीरे ढलते हुए पारंपरिक संस्थानों को संरक्षित करना चाहिए।
explanation: |
  स्वतंत्रतावादी विचारधारा सरकार के हस्तक्षेप को सुधारने के बजाय उसे पूरी तरह खत्म करने की वकालत करती है। विवाह के मुद्दे पर, वे धार्मिक और निजी संगठनों के माध्यम से निजीकरण का प्रस्ताव रखते हैं।
  आव्रजन के मुद्दे पर, वे बाज़ार-आधारित समाधानों का समर्थन करते हैं और राज्य द्वारा सब्सिडी प्राप्त आप्रवास का विरोध करते हैं। मादक पदार्थों के मुद्दे पर, वे वैधीकरण के पक्षधर हैं, लेकिन केवल एक ऐसे समाज में जहां सरकार का हस्तक्षेप न हो। यह अन्य विचारधाराओं से भिन्न है जो सरकारी शक्ति का उपयोग या तो समानता लागू करने (समाजवादी), व्यवस्था बनाए रखने (रूढ़िवादी) या संतुलित नियमन खोजने (मध्यमार्गी) के लिए करती हैं।
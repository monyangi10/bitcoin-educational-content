question: Mikä on yhteiskunnallisia kysymyksiä koskevan libertaristisen näkökulman mukaan se perusperiaate, jonka pitäisi ohjata hallituksen puuttumista henkilökohtaisiin asioihin, kuten avioliittoon, maahanmuuttoon ja huumeiden käyttöön?
answer: Hallituksen tulisi vetäytyä henkilökohtaisten valintojen sääntelystä ja antaa yksityisten instituutioiden ja markkinamekanismien hoitaa nämä asiat sen sijaan
wrong_answers:
  - Hallituksen olisi aktiivisesti suojeltava yksilön oikeuksia varmistamalla, että kaikilla kansalaisilla on yhtäläiset mahdollisuudet käyttää kaikkia instituutioita ja palveluja
  - Hallituksen olisi tasapainotettava yksilönvapaudet ja kollektiivinen turvallisuus huolellisesti laadittujen, yhteiskuntaa suojelevien säädösten avulla
  - Hallituksen olisi säilytettävä perinteiset instituutiot ja sopeuduttava vähitellen yhteiskunnallisiin muutoksiin demokraattisen yhteisymmärryksen rakentamisen avulla
explanation: |
  Libertaristinen lähestymistapa puoltaa johdonmukaisesti hallituksen osallistumisen poistamista sen sijaan, että sitä uudistettaisiin. Avioliiton osalta he ehdottavat yksityistämistä uskonnollisten ja yksityisten järjestöjen kautta.
  Maahanmuuton osalta he kannattavat markkinapohjaisia ratkaisuja ja vastustavat valtion tukemaa maahanmuuttoa. Huumeiden osalta he kannattavat laillistamista, mutta vain valtiottomassa yhteiskunnassa. Tämä eroaa muista ideologioista, jotka pyrkivät käyttämään valtion valtaa joko tasa-arvon toteuttamiseen (sosialistit), järjestyksen säilyttämiseen (konservatiivit) tai tasapainoisen sääntelyn löytämiseen (keskustalaiset).
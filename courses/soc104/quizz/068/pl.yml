question: Zgodnie z libertariańską perspektywą na kwestie społeczne, jaka jest podstawowa zasada, która powinna kierować zaangażowaniem rządu w sprawy osobiste, takie jak małżeństwo, imigracja i zażywanie narkotyków?
answer: Rząd powinien wycofać się z regulowania osobistych wyborów i zamiast tego pozwolić prywatnym instytucjom i mechanizmom rynkowym zająć się tymi sprawami
wrong_answers:
  - Rząd powinien aktywnie chronić prawa jednostki poprzez egzekwowanie równego dostępu do wszystkich instytucji i usług dla każdego obywatela
  - Rząd powinien zrównoważyć indywidualne wolności z bezpieczeństwem zbiorowym poprzez starannie opracowane regulacje, które chronią społeczeństwo
  - Rząd powinien zachować tradycyjne instytucje, jednocześnie stopniowo dostosowując się do zmian społecznych poprzez demokratyczne budowanie konsensusu
explanation: |
  Podejście libertariańskie konsekwentnie opowiada się za usunięciem zaangażowania rządu, a nie za jego reformą. W kwestii małżeństwa proponują prywatyzację poprzez organizacje religijne i prywatne.
  W kwestii imigracji popierają rozwiązania rynkowe, jednocześnie sprzeciwiając się imigracji subsydiowanej przez państwo. Jeśli chodzi o narkotyki, opowiadają się za legalizacją, ale tylko w ramach zdelegalizowanego społeczeństwa. Różni się to od innych ideologii, które dążą do wykorzystania władzy rządowej w celu egzekwowania równości (socjaliści), zachowania porządku (konserwatyści) lub znalezienia zrównoważonych regulacji (centryści).
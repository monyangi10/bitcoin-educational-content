question: Welches ist nach der libertären Sichtweise auf gesellschaftliche Fragen das Grundprinzip, das die Einmischung der Regierung in persönliche Angelegenheiten wie Ehe, Einwanderung und Drogenkonsum leiten sollte?
answer: Der Staat sollte sich aus der Regulierung persönlicher Entscheidungen zurückziehen und stattdessen privaten Institutionen und Marktmechanismen die Regelung dieser Angelegenheiten überlassen
wrong_answers:
  - Die Regierung sollte die Rechte des Einzelnen aktiv schützen, indem sie den gleichberechtigten Zugang aller Bürger zu allen Einrichtungen und Dienstleistungen durchsetzt
  - Die Regierung sollte die individuellen Freiheiten mit der kollektiven Sicherheit durch sorgfältig ausgearbeitete Vorschriften zum Schutz der Gesellschaft in Einklang bringen
  - Die Regierung sollte die traditionellen Institutionen bewahren und sich gleichzeitig durch demokratische Konsensbildung schrittweise an den gesellschaftlichen Wandel anpassen
explanation: |
  Der libertäre Ansatz plädiert konsequent für die Abschaffung staatlicher Eingriffe, anstatt sie zu reformieren. Bei der Ehe schlagen sie die Privatisierung durch religiöse und private Organisationen vor.
  Bei der Einwanderung befürworten sie marktwirtschaftliche Lösungen und lehnen staatlich subventionierte Einwanderung ab. In der Drogenfrage befürworten sie die Legalisierung, aber nur innerhalb einer entstaatlichten Gesellschaft. Dies unterscheidet sie von anderen Ideologien, die die Macht des Staates nutzen wollen, um entweder Gleichheit durchzusetzen (Sozialisten), die Ordnung zu erhalten (Konservative) oder ausgewogene Regelungen zu finden (Zentristen).
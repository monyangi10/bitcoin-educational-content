question: Secondo la prospettiva libertaria sulle questioni sociali, qual è il principio fondamentale che dovrebbe guidare il coinvolgimento del governo in questioni personali come il matrimonio, l'immigrazione e l'uso di droghe?
answer: Il governo dovrebbe ritirarsi dalla regolamentazione delle scelte personali e lasciare che siano le istituzioni private e i meccanismi di mercato a occuparsi di queste questioni
wrong_answers:
  - Il governo dovrebbe tutelare attivamente i diritti individuali imponendo a tutti i cittadini la parità di accesso a tutte le istituzioni e a tutti i servizi
  - Il governo dovrebbe bilanciare le libertà individuali con la sicurezza collettiva attraverso regolamenti accuratamente elaborati che proteggano la società
  - Il governo dovrebbe preservare le istituzioni tradizionali, adattandosi gradualmente ai cambiamenti sociali attraverso la costruzione di un consenso democratico
explanation: |
  L'approccio libertario sostiene costantemente l'eliminazione del coinvolgimento del governo piuttosto che la sua riforma. Sul matrimonio, propongono la privatizzazione attraverso organizzazioni religiose e private.
  Sull'immigrazione, sostengono soluzioni basate sul mercato e si oppongono all'immigrazione sovvenzionata dallo Stato. Sulle droghe, sono favorevoli alla legalizzazione, ma solo all'interno di una società de-statalizzata. Questo differisce da altre ideologie che cercano di usare il potere del governo per imporre l'uguaglianza (socialisti), preservare l'ordine (conservatori) o trovare regolamentazioni equilibrate (centristi).
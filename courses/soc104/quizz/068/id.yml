question: Menurut sudut pandang libertarian mengenai isu-isu kemasyarakatan, apa prinsip dasar yang seharusnya memandu keterlibatan pemerintah dalam masalah-masalah pribadi seperti pernikahan, imigrasi, dan penggunaan narkoba?
answer: Pemerintah harus menarik diri dari mengatur pilihan pribadi dan membiarkan institusi swasta dan mekanisme pasar untuk menangani masalah ini
wrong_answers:
  - Pemerintah harus secara aktif melindungi hak-hak individu dengan menegakkan akses yang sama ke semua lembaga dan layanan untuk setiap warga negara
  - Pemerintah harus menyeimbangkan kebebasan individu dengan keamanan kolektif melalui peraturan yang dibuat dengan hati-hati untuk melindungi masyarakat
  - Pemerintah harus melestarikan lembaga-lembaga tradisional sambil secara bertahap beradaptasi dengan perubahan sosial melalui pembangunan konsensus yang demokratis
explanation: |
  Pendekatan libertarian secara konsisten mengadvokasi untuk menghapus keterlibatan pemerintah daripada mereformasi pemerintah. Dalam hal pernikahan, mereka mengusulkan privatisasi melalui organisasi keagamaan dan swasta.
  Dalam hal imigrasi, mereka mendukung solusi berbasis pasar dan menentang imigrasi yang disubsidi negara. Dalam hal narkoba, mereka mendukung legalisasi tetapi hanya dalam masyarakat yang tidak lagi dinegosiasikan. Hal ini berbeda dengan ideologi lain yang berusaha menggunakan kekuasaan pemerintah untuk menegakkan kesetaraan (sosialis), menjaga ketertiban (konservatif), atau menemukan peraturan yang seimbang (sentris).
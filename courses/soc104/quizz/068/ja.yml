question: 社会問題に対するリバタリアンの視点によれば、結婚、移民、薬物使用といった個人的な問題への政府の関与を導くべき基本原則は何か？
answer: 政府は個人の選択を規制することから手を引き、代わりに民間の機関や市場メカニズムにこれらの問題を処理させるべきである。
wrong_answers:
  - 政府は、すべての国民にすべての制度やサービスへの平等なアクセスを強制することによって、個人の権利を積極的に保護すべきである。
  - 政府は、社会を守るために慎重に作られた規制を通じて、個人の自由と集団の安全保障のバランスを取るべきである。
  - 政府は伝統的な制度を維持しつつ、民主的な合意形成を通じて社会の変化に徐々に適応していくべきである。
explanation: |
  リバタリアンのアプローチは一貫して、政府の関与を改革するのではなく、取り除くことを提唱している。結婚については、宗教団体や民間団体を通じた民営化を提案する。
  移民については、国家補助による移民受け入れに反対する一方で、市場原理による解決策を支持する。薬物については合法化を支持するが、それは脱国家社会内でのみである。これは、平等の強制（社会主義者）、秩序の維持（保守主義者）、バランスの取れた規制の発見（中道主義者）のいずれかに政府の力を使おうとする他のイデオロギーとは異なる。
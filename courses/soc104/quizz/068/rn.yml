question: Dushingiye ku mbonerahamwe y’abanyagihugu ku bibazo vyo mu kibano, ni ingingo ngenderwako iyihe y’ishimikiro ikwiye kuyobora Leta mu kwivanga mu bibazo vy’umuntu ku giti ciwe nk’ubugeni, ukwimukira mu gihugu, n’ukunywa ibiyayuramutwe?
answer: Leta ikwiye kuva mu gutegeka amahitamwo y’umuntu ku giti ciwe, ikareka inzego z’abikorera ku giti cabo n’uburyo bw’isoko bikaba ari vyo bikora ivyo bintu aho kubigira .
wrong_answers:
  - Leta ikwiye kurinda n'umwete uburenganzira bw'umuntu ku giti ciwe mu gutuma umunyagihugu wese ashobora kuronka inzego zose n'ibikorwa vyose mu buryo bungana .
  - Leta ikwiye guhuza umwidegemvyo w'umuntu ku giti ciwe n'umutekano rusangi biciye mu mategeko yateguwe neza akingira abantu .
  - Leta ikwiye kuzigama inzego za kera mu gihe buhoro buhoro igenda imenyerera amahinduka mu kibano biciye mu kwubaka amasezerano ya demokarasi .
explanation: |
  Uburyo bw’abanyagihugu buhora buvuga ko Leta yokuraho uruhara rwiwe aho kuyihindura. Ku bijanye n’ubugeni, basaba ko haba uguhindura ibikorwa vy’abantu ku giti cabo biciye mu mashirahamwe y’idini n’ay’abikorera ku giti cabo. 
  Ku bijanye n’abimukira, bashigikira inyishu zishingiye ku masoko mu gihe barwanya abimukira bafashwa na Leta. Ku bijanye n’ibiyayuramutwe, bashima ko bishirwa mu mategeko ariko gusa mu kibano kitagira ubutegetsi. Ivyo bitandukanye n’ibindi vyiyumviro birondera gukoresha ububasha bwa Leta kugira ngo bishikirize uburinganire (abasosiyalisiti), bazigame urutonde (abakonservateri), canke barondere amategeko ari ku rugero (abanyacentriste).
question: Theo quan điểm tự do chủ nghĩa về các vấn đề xã hội, nguyên tắc cơ bản nào nên định hướng sự can thiệp của chính phủ vào các vấn đề cá nhân như hôn nhân, nhập cư và sử dụng ma túy?
answer: Chính phủ nên ngừng can thiệp vào việc điều tiết các lựa chọn cá nhân và cho phép các tổ chức tư nhân và cơ chế thị trường giải quyết những vấn đề này.
wrong_answers:
  - Chính phủ nên chủ động bảo vệ các quyền cá nhân bằng cách đảm bảo quyền tiếp cận bình đẳng đối với tất cả các thể chế và dịch vụ cho mọi công dân.
  - Chính phủ cần cân bằng giữa tự do cá nhân và an ninh tập thể thông qua các quy định được soạn thảo cẩn thận nhằm bảo vệ xã hội.
  - Chính phủ nên bảo tồn các thể chế truyền thống đồng thời từng bước thích ứng với những thay đổi xã hội thông qua việc xây dựng sự đồng thuận dân chủ.
explanation: |
  Quan điểm tự do chủ nghĩa luôn ủng hộ việc loại bỏ sự can thiệp của chính phủ thay vì cải cách nó. Về hôn nhân, họ đề xuất tư nhân hóa thông qua các tổ chức tôn giáo và tư nhân.
  Về vấn đề nhập cư, họ ủng hộ các giải pháp dựa trên thị trường trong khi phản đối nhập cư được nhà nước trợ cấp. Về ma túy, họ ủng hộ hợp pháp hóa nhưng chỉ trong một xã hội phi nhà nước hóa. Điều này khác với các hệ tư tưởng khác tìm cách sử dụng quyền lực của chính phủ để hoặc là thực thi bình đẳng (chủ nghĩa xã hội), hoặc là duy trì trật tự (chủ nghĩa bảo thủ), hoặc là tìm ra các quy định cân bằng (chủ nghĩa trung dung).
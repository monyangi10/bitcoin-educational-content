question: Vilken är den grundläggande princip som utmärker libertariansk politisk filosofi när det gäller användning av våld?
answer: Icke-aggressionsprincipen, som förbjuder våld mot andra utom i legitimt självförsvar
wrong_answers:
  - Principen om proportionerlig respons, som tillåter måttlig styrka för att upprätthålla social ordning och kollektiv säkerhet
  - Principen om demokratiskt mandat, som tillåter våld när det godkänns av majoritetsomröstning eller valda representanter
  - Principen om utilitaristisk kalkyl, som rättfärdigar våld när det leder till största möjliga nytta för samhället
explanation: |
  Icke-aggressionsprincipen är hörnstenen i den libertarianska filosofin och innebär att ingen individ eller grupp (inklusive regeringen) har rätt att initiera eller hota med fysiskt våld mot en annan person eller dennes egendom.
  Detta gör bedrägeri, stöld och tvång moraliskt förkastligt, och våld kan endast rättfärdigas i självförsvar. De andra alternativen representerar statstrogna eller kollektivistiska synsätt som libertarianer förkastar eftersom de ger särskilda tillstånd till regeringar eller majoriteter att begå handlingar som skulle betraktas som omoraliska om de utfördes av individer.
question: What is the fundamental principle that distinguishes libertarian political philosophy regarding the use of force?
answer: The non-aggression principle, which prohibits initiating force against others except in legitimate self-defense
wrong_answers:
  - The principle of proportional response, allowing measured force to maintain social order and collective security
  - The principle of democratic mandate, permitting force when authorized by majority vote or elected representatives
  - The principle of utilitarian calculus, justifying force when it produces the greatest good for society
explanation: |
  The non-aggression principle is the cornerstone of libertarian philosophy, stating that no individual or group (including government) has the right to initiate or threaten physical force against another person or their property. This makes fraud, theft, and coercion morally reprehensible, with force only justified in self-defense. The other options represent statist or collectivist approaches that libertarians reject because they grant special permissions to governments or majorities to commit acts that would be considered immoral if done by individuals.
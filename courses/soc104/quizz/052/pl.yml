question: Jaka jest podstawowa zasada, która wyróżnia libertariańską filozofię polityczną w odniesieniu do użycia siły?
answer: Zasada nieagresji, która zakazuje inicjowania siły przeciwko innym, z wyjątkiem uzasadnionej samoobrony
wrong_answers:
  - Zasada proporcjonalnej reakcji, pozwalająca na odmierzanie siły w celu utrzymania porządku społecznego i bezpieczeństwa zbiorowego
  - Zasada mandatu demokratycznego, zezwalająca na użycie siły, gdy jest to autoryzowane przez większość głosów lub wybranych przedstawicieli
  - Zasada rachunku utylitarnego, usprawiedliwiająca użycie siły, gdy wytwarza ona największe dobro dla społeczeństwa
explanation: |
  Zasada nieagresji jest kamieniem węgielnym filozofii libertariańskiej, stwierdzając, że żadna osoba ani grupa (w tym rząd) nie ma prawa inicjować lub grozić użyciem siły fizycznej wobec innej osoby lub jej własności.
  Sprawia to, że oszustwo, kradzież i przymus są moralnie naganne, a siła jest uzasadniona tylko w samoobronie. Pozostałe opcje reprezentują podejścia etatystyczne lub kolektywistyczne, które libertarianie odrzucają, ponieważ przyznają one rządom lub większościom specjalne uprawnienia do popełniania czynów, które byłyby uznane za niemoralne, gdyby zostały popełnione przez jednostki.
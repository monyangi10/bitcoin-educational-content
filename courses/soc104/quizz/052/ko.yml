question: 무력 사용과 관련하여 자유주의 정치 철학을 구분하는 기본 원칙은 무엇인가요?
answer: 정당한 정당방위를 제외하고 타인에게 무력을 행사하는 것을 금지하는 비침략 원칙은 다음과 같습니다
wrong_answers:
  - 비례적 대응 원칙, 사회 질서와 집단 안보를 유지하기 위한 적절한 무력 행사 허용
  - 민주적 위임의 원칙, 다수결 또는 선출된 대표에 의해 승인된 경우 강제성을 허용하는 원칙
  - 공리주의 미적분 원리, 사회에 가장 큰 이익을 가져올 때 무력을 정당화하는 원리
explanation: |
  침략 금지 원칙은 자유주의 철학의 초석으로, 어떤 개인이나 집단(정부 포함)도 다른 사람이나 그 재산에 대해 물리력을 행사하거나 위협할 권리가 없다는 것을 명시하고 있습니다.
  따라서 사기, 절도, 강압은 도덕적으로 비난받을 수 있으며 무력은 정당방위의 경우에만 정당화됩니다. 다른 옵션은 정부나 다수에게 부도덕한 행위로 간주되는 행위를 할 수 있는 특별한 권한을 부여하기 때문에 자유주의자들이 거부하는 국가주의 또는 집단주의적 접근 방식을 나타냅니다.
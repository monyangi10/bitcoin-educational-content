question: Welches ist das grundlegende Prinzip, das die libertäre politische Philosophie in Bezug auf die Anwendung von Gewalt auszeichnet?
answer: Der Grundsatz des Nichtangriffs, der die Anwendung von Gewalt gegen andere verbietet, es sei denn, es handelt sich um legitime Selbstverteidigung
wrong_answers:
  - Der Grundsatz der Verhältnismäßigkeit, der eine angemessene Gewaltanwendung zur Aufrechterhaltung der sozialen Ordnung und der kollektiven Sicherheit erlaubt
  - Der Grundsatz des demokratischen Mandats, der Gewalt zulässt, wenn sie von der Mehrheit oder von gewählten Vertretern genehmigt wird
  - Das Prinzip des Nützlichkeitskalküls, das Gewalt rechtfertigt, wenn sie das höchste Gut für die Gesellschaft hervorbringt
explanation: |
  Das Nichtangriffsprinzip ist der Eckpfeiler der libertären Philosophie. Es besagt, dass keine Person oder Gruppe (einschließlich der Regierung) das Recht hat, physische Gewalt gegen eine andere Person oder deren Eigentum anzuwenden oder anzudrohen.
  Dies macht Betrug, Diebstahl und Nötigung moralisch verwerflich, wobei Gewalt nur zur Selbstverteidigung gerechtfertigt ist. Die anderen Optionen stellen statistische oder kollektivistische Ansätze dar, die Libertäre ablehnen, weil sie Regierungen oder Mehrheiten Sondergenehmigungen für Handlungen erteilen, die als unmoralisch gelten würden, wenn sie von Einzelpersonen ausgeführt würden.
question: 自由主义政治哲学在使用武力方面的基本原则是什么？
answer: 不侵犯原则，即除合法自卫外，禁止对他人使用武力
wrong_answers:
  - 适度反应原则，允许使用适度的武力来维护社会秩序和集体安全
  - 民主授权原则，在获得多数票或当选代表授权时允许使用武力
  - 功利计算原则，当武力能为社会带来最大利益时，武力才是正当的
explanation: |
  不侵犯原则是自由主义哲学的基石，它规定任何个人或团体（包括政府）都无权对他人或其财产使用或威胁使用武力。
  这使得欺诈、偷窃和胁迫在道德上应受到谴责，只有在自卫时武力才是正当的。其他选项代表了自由主义者所反对的国家主义或集体主义方法，因为这些方法给予政府或多数人特殊权限，使其可以实施如果由个人实施则会被视为不道德的行为。
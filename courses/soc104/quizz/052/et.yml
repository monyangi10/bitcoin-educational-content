question: Milline on põhiprintsiip, mis eristab libertaarset poliitilist filosoofiat seoses jõu kasutamisega?
answer: Mitteagressiooni põhimõte, mis keelab teiste vastu jõu kasutamise, välja arvatud seaduslikul enesekaitsel
wrong_answers:
  - Proportsionaalse reageerimise põhimõte, mis võimaldab mõõdukat jõudu sotsiaalse korra ja kollektiivse julgeoleku säilitamiseks
  - Demokraatliku mandaadi põhimõte, mis lubab jõudu, kui seda lubab häälteenamus või valitud esindajad
  - Utilitaristliku kalkulatsiooni põhimõte, mis õigustab jõudu, kui see toob ühiskonnale kõige suuremat kasu
explanation: |
  Mittekallaletungi põhimõte on liberaalse filosoofia nurgakivi, mis ütleb, et ühelgi üksikisikul või rühmal (sealhulgas valitsusel) ei ole õigust kasutada või ähvardada füüsilist jõudu teise inimese või tema vara vastu.
  See muudab pettuse, varguse ja sundimise moraalselt taunitavaks, kusjuures jõud on õigustatud ainult enesekaitseks. Teised valikud esindavad riiklikke või kollektivistlikke lähenemisviise, mida libertaarid tagasi lükkavad, sest need annavad valitsustele või enamustele erivolitused tegude sooritamiseks, mida üksikisikute poolt sooritatuna peetaks ebamoraalseks.
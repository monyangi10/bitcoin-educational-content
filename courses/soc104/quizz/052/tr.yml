question: Güç kullanımına ilişkin liberteryen siyaset felsefesini ayıran temel ilke nedir?
answer: Meşru nefsi müdafaa dışında başkalarına karşı güç kullanılmasını yasaklayan saldırmazlık ilkesi
wrong_answers:
  - Sosyal düzeni ve kolektif güvenliği korumak için ölçülü güce izin veren orantılı tepki ilkesi
  - Demokratik yetki ilkesi, çoğunluk oyu veya seçilmiş temsilciler tarafından yetkilendirildiğinde kuvvete izin verir
  - Faydacı hesap ilkesi, toplum için en büyük iyiyi ürettiğinde gücü haklı çıkarır
explanation: |
  Saldırmazlık ilkesi liberteryen felsefenin temel taşıdır ve hiçbir bireyin veya grubun (hükümet dahil) başka bir kişiye veya mülküne karşı fiziksel güç kullanma veya tehdit etme hakkına sahip olmadığını belirtir.
  Bu, dolandırıcılık, hırsızlık ve zorlamayı ahlaki açıdan kınanır hale getirir ve güç yalnızca nefsi müdafaa için meşru görülür. Diğer seçenekler özgürlükçülerin reddettiği devletçi veya kolektivist yaklaşımları temsil eder, çünkü bireyler tarafından yapıldığında ahlak dışı kabul edilecek eylemleri gerçekleştirmeleri için hükümetlere veya çoğunluklara özel izinler verirler.
question: Hva er det grunnleggende prinsippet som kjennetegner libertariansk politisk filosofi når det gjelder bruk av makt?
answer: Ikke-aggresjonsprinsippet, som forbyr bruk av vold mot andre unntatt i legitimt selvforsvar
wrong_answers:
  - Prinsippet om proporsjonal respons, som tillater avmålt maktbruk for å opprettholde sosial orden og kollektiv sikkerhet
  - Prinsippet om demokratisk mandat, som tillater bruk av makt når det er godkjent av et flertall eller folkevalgte representanter
  - Nyttekalkulasjonsprinsippet, som rettferdiggjør bruk av makt når det gir størst mulig nytte for samfunnet
explanation: |
  Ikke-aggresjonsprinsippet er hjørnesteinen i libertariansk filosofi, og slår fast at ingen enkeltperson eller gruppe (inkludert myndighetene) har rett til å initiere eller true med fysisk makt mot en annen person eller deres eiendom.
  Dette gjør svindel, tyveri og tvang moralsk forkastelig, og maktbruk kan bare rettferdiggjøres i selvforsvar. De andre alternativene representerer stats- eller kollektivistiske tilnærminger som libertarianere avviser fordi de gir spesielle tillatelser til myndigheter eller majoriteter til å begå handlinger som ville blitt ansett som umoralske hvis de ble utført av enkeltpersoner.
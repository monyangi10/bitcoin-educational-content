question: ¿Cuál es el principio fundamental que distingue a la filosofía política libertaria en lo que respecta al uso de la fuerza?
answer: El principio de no agresión, que prohíbe utilizar la fuerza contra otros salvo en legítima defensa
wrong_answers:
  - El principio de respuesta proporcional, que permite medir la fuerza para mantener el orden social y la seguridad colectiva
  - El principio del mandato democrático, que permite el uso de la fuerza cuando lo autoriza la mayoría de los votos o los representantes elegidos
  - El principio del cálculo utilitario, que justifica la fuerza cuando produce el mayor bien para la sociedad
explanation: |
  El principio de no agresión es la piedra angular de la filosofía libertaria, ya que establece que ningún individuo o grupo (incluido el gobierno) tiene derecho a iniciar o amenazar con el uso de la fuerza física contra otra persona o su propiedad.
  Esto hace que el fraude, el robo y la coacción sean moralmente reprobables, y que la fuerza sólo esté justificada en defensa propia. Las otras opciones representan planteamientos estatistas o colectivistas que los libertarios rechazan porque conceden permisos especiales a los gobiernos o a las mayorías para cometer actos que se considerarían inmorales si los realizaran individuos.
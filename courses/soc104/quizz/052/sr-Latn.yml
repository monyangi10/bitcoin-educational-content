question: Koji je temeljni princip koji razlikuje libertarijansku političku filozofiju u pogledu upotrebe sile?
answer: Princip nes-agresije, koji zabranjuje iniciranje sile protiv drugih osim u legitimnoj samoodbrani
wrong_answers:
  - Princip principijalnog odgovora, omogućavajući merenu silu za održavanje društvenog reda i kolektivne bezbednosti
  - Princip demokratskog mandata, koji dopušta upotrebu sile kada je odobrena većinskim glasanjem ili izabranim predstavnicima
  - Princip utilitarističkog računa, opravdavajući silu kada proizvodi najveće dobro za društvo
explanation: |
  Princip nenapadanja je kamen temeljac libertarijanske filozofije, koji kaže da nijedna osoba ili grupa (uključujući vladu) nema pravo da započne ili preti fizičkom silom protiv druge osobe ili njihove imovine. 
  Ovo čini prevaru, krađu i prinudu moralno odvratnim, a sila je opravdana samo u samoodbrani. Druge opcije predstavljaju etatističke ili kolektivističke pristupe koje libertarijanci odbacuju jer daju posebna ovlašćenja vladama ili većinama da čine dela koja bi bila smatrana nemoralnim ako ih čine pojedinci.
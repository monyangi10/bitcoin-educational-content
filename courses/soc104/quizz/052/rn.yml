question: Ni ingingo ngenderwako iyihe y’ishimikiro itandukanya filozofiya ya politike y’abanyagihugu ku bijanye n’ugukoresha inguvu?
answer: Ingingo ngenderwako y’ukudatera, ibuza gutangura gukoresha inguvu ku bandi kiretse mu kwikingira mu buryo bubereye .
wrong_answers:
  - Ingingo ngenderwako y’inyishu zihuye, zituma inguvu zigereranywa ziguma zifise urutonde rw’imibano n’umutekano rusangi
  - Ingingo ngenderwako y'ububasha bwa demokarasi, yemerera inguvu iyo yemerewe n'amajwi menshi canke abatowe
  - Ingingo ngenderwako y’ubuhinga bwo guharura, gushingira intahe inguvu iyo zizana ivyiza vyinshi ku kibano .
explanation: |
  Ingingo ngenderwako y’ukudatera ni ryo buye ry’imfuruka ry’ubuhinga bwo kwidegemvya, rivuga ko ata muntu canke umugwi (harimwo na Leta) ufise uburenganzira bwo gutanguza canke gutera ubwoba uwundi muntu canke itunga ryiwe. 
  Ivyo bituma ubuhendanyi, ubusuma be n’uguhatira abantu biba ibiteye isoni mu vy’inyifato runtu, inguvu zikaba zibereye gusa mu kwikingira. Ayandi mahitamwo agereranya uburyo bw’abanyagihugu canke bw’abanyagihugu (collectivist) abaharanira umwidegemvyo banka kubera ko baha uruhusha rudasanzwe intwaro canke abantu benshi gukora ibikorwa vyobonwa ko ari ubusambanyi iyo bikorwa n’abantu ku giti cabo.
question: Nguyên tắc cơ bản nào phân biệt triết học chính trị tự do về việc sử dụng vũ lực?
answer: Nguyên tắc không gây hấn, cấm sử dụng vũ lực chống lại người khác trừ trường hợp tự vệ chính đáng.
wrong_answers:
  - Nguyên tắc phản ứng tương xứng, cho phép sử dụng lực lượng có chừng mực để duy trì trật tự xã hội và an ninh tập thể.
  - Nguyên tắc ủy quyền dân chủ, cho phép sử dụng vũ lực khi được đa số phiếu hoặc đại diện dân cử cho phép.
  - Nguyên tắc tính toán vị lợi, biện minh cho việc sử dụng vũ lực khi nó mang lại lợi ích lớn nhất cho xã hội.
explanation: |
  Nguyên tắc không xâm phạm là nền tảng của triết học tự do, khẳng định rằng không cá nhân hay nhóm nào (kể cả chính phủ) có quyền khởi xướng hoặc đe dọa sử dụng vũ lực đối với người khác hoặc tài sản của họ.
  Điều này khiến cho gian lận, trộm cắp và cưỡng bức trở nên đáng lên án về mặt đạo đức, chỉ cho phép sử dụng vũ lực để tự vệ. Các lựa chọn khác đại diện cho các phương pháp theo chủ nghĩa nhà nước hoặc chủ nghĩa tập thể mà những người theo chủ nghĩa tự do bác bỏ vì chúng trao quyền đặc biệt cho chính phủ hoặc đa số thực hiện các hành vi mà nếu do cá nhân thực hiện sẽ bị coi là vô đạo đức.
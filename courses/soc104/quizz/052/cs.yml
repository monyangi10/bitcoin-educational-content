question: Jaký je základní princip, který odlišuje libertariánskou politickou filozofii, pokud jde o použití síly?
answer: Zásada neútočení, která zakazuje použití síly proti jiným osobám s výjimkou legitimní sebeobrany
wrong_answers:
  - Zásada přiměřené reakce, která umožňuje použití přiměřené síly k udržení společenského pořádku a kolektivní bezpečnosti
  - Princip demokratického mandátu, který povoluje použití síly, pokud je schválena většinou hlasů nebo zvolenými zástupci
  - Princip utilitaristického kalkulu, který ospravedlňuje použití síly, pokud přináší největší dobro pro společnost
explanation: |
  Zásada neútočení je základním kamenem libertariánské filozofie a říká, že žádný jednotlivec ani skupina (včetně vlády) nemá právo zahájit nebo vyhrožovat fyzickou silou vůči jiné osobě nebo jejímu majetku.
  Podvody, krádeže a nátlak jsou proto morálně odsouzeníhodné a použití síly je ospravedlnitelné pouze v případě sebeobrany. Ostatní možnosti představují etatistické nebo kolektivistické přístupy, které libertariáni odmítají, protože udělují zvláštní oprávnění vládám nebo většinám páchat činy, které by byly považovány za nemorální, kdyby je páchali jednotlivci.
question: बल प्रयोग के संबंध में स्वतंत्रतावादी राजनीतिक दर्शन को अलग करने वाला मूलभूत सिद्धांत क्या है?
answer: अहिंसा का सिद्धांत, जो वैध आत्मरक्षा को छोड़कर दूसरों के खिलाफ बल प्रयोग शुरू करने पर रोक लगाता है।
wrong_answers:
  - आनुपातिक प्रतिक्रिया का सिद्धांत, जो सामाजिक व्यवस्था और सामूहिक सुरक्षा बनाए रखने के लिए नियंत्रित बल का प्रयोग करने की अनुमति देता है।
  - लोकतांत्रिक जनादेश का सिद्धांत, बहुमत मत या निर्वाचित प्रतिनिधियों द्वारा अधिकृत होने पर बल प्रयोग की अनुमति देता है।
  - उपयोगितावादी गणना का सिद्धांत, बल प्रयोग को तब उचित ठहराता है जब वह समाज के लिए सबसे बड़ा लाभ उत्पन्न करता है।
explanation: |
  अहिंसा का सिद्धांत स्वतंत्रतावादी दर्शन का आधार है, जिसके अनुसार किसी भी व्यक्ति या समूह (सरकार सहित) को किसी अन्य व्यक्ति या उसकी संपत्ति के विरुद्ध शारीरिक बल का प्रयोग करने या उसकी धमकी देने का अधिकार नहीं है।
  इससे धोखाधड़ी, चोरी और जबरदस्ती नैतिक रूप से निंदनीय हो जाते हैं, और बल का प्रयोग केवल आत्मरक्षा में ही उचित है। अन्य विकल्प राज्यवादी या सामूहिकवादी दृष्टिकोण हैं जिन्हें स्वतंत्रतावादी अस्वीकार करते हैं क्योंकि वे सरकारों या बहुमतों को ऐसे कार्य करने की विशेष अनुमति देते हैं जिन्हें व्यक्तियों द्वारा किए जाने पर अनैतिक माना जाएगा।
question: Ni kanuni gani ya msingi inayotofautisha falsafa ya kisiasa ya uhuru kuhusu matumizi ya nguvu?
answer: Kanuni ya kutotumia nguvu, ambayo inakataza kuanzisha nguvu dhidi ya wengine isipokuwa kwa kujilinda halali
wrong_answers:
  - Kanuni ya mwitikio sawia, inayoruhusu matumizi ya nguvu yaliyopimwa kudumisha utulivu wa kijamii na usalama wa pamoja
  - Kanuni ya mamlaka ya kidemokrasia, kuruhusu nguvu inapoidhinishwa na kura ya wengi au wawakilishi waliochaguliwa
  - Kanuni ya hesabu ya matumizi, kuhalalisha nguvu inapozalisha faida kubwa kwa jamii
explanation: |
  Kanuni ya kutofanya uchokozi ndiyo msingi wa falsafa ya uhuru, ikisema kwamba hakuna mtu au kikundi (ikiwa ni pamoja na serikali) chenye haki ya kuanzisha au kutishia nguvu za kimwili dhidi ya mtu mwingine au mali yake.
  
  Hii inafanya ulaghai, wizi, na kulazimisha kuwa na hatia kimaadili, huku nguvu zikihalalishwa tu katika kujilinda. Chaguzi zingine zinawakilisha mbinu za kiserikali au za pamoja ambazo wanahuru wanakataa kwa sababu hutoa ruhusa maalum kwa serikali au walio wengi kufanya vitendo ambavyo vingechukuliwa kuwa visivyo vya maadili ikiwa vitafanywa na watu binafsi.

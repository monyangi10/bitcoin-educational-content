question: Wat is het fundamentele principe dat de libertarische politieke filosofie onderscheidt met betrekking tot het gebruik van geweld?
answer: Het non-agressieprincipe, dat het initiëren van geweld tegen anderen verbiedt, behalve in legitieme zelfverdediging
wrong_answers:
  - Het principe van proportionele respons, waarbij afgemeten geweld wordt gebruikt om de sociale orde en collectieve veiligheid te handhaven
  - Het principe van democratisch mandaat, dat geweld toestaat als het wordt goedgekeurd door een meerderheid van stemmen of gekozen vertegenwoordigers
  - Het principe van utilitaristische calculus, dat geweld rechtvaardigt als het het grootste goed voor de samenleving oplevert
explanation: |
  Het non-agressie principe is de hoeksteen van de libertarische filosofie en stelt dat geen enkel individu of groep (inclusief de overheid) het recht heeft om fysiek geweld te gebruiken of te dreigen tegen een ander persoon of zijn eigendom.
  Dit maakt fraude, diefstal en dwang moreel verwerpelijk, waarbij geweld alleen gerechtvaardigd is als zelfverdediging. De andere opties vertegenwoordigen statistische of collectivistische benaderingen die libertariërs afwijzen omdat ze overheden of meerderheden speciale toestemming geven om handelingen te verrichten die als immoreel beschouwd zouden worden als ze door individuen gedaan zouden worden.
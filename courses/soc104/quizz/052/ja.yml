question: 武力の行使に関して、リバタリアンの政治哲学を区別する基本原則は何か？
answer: 正当防衛以外の武力行使を禁止する不可侵原則
wrong_answers:
  - 社会秩序と集団安全保障を維持するための武力行使を可能にする、比例的対応の原則。
  - 民主的委任の原則、多数決または選挙で選ばれた代表者によって承認された場合、武力行使を許可する。
  - 社会にとって最大の善をもたらす場合に武力を正当化するという功利主義的計算の原則
explanation: |
  不可侵原則はリバタリアン哲学の根幹であり、いかなる個人も集団（政府を含む）も、他人やその財産に対して物理的な力を行使したり、脅したりする権利はないとするものである。
  これにより、詐欺、窃盗、強要は道徳的に非難されるべきものとなり、武力は正当防衛の場合にのみ正当化される。他の選択肢は国家主義や集団主義的なアプローチであり、自由主義者はこれを拒否する。なぜなら、個人で行えば不道徳とみなされる行為を政府や多数派が行うことを特別に許可しているからである。
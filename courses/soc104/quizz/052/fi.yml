question: Mikä on se perusperiaate, joka erottaa libertaristisen poliittisen filosofian voimankäytöstä?
answer: Hyökkäämättömyysperiaate, joka kieltää voimakeinojen käyttämisen muita vastaan paitsi oikeutetussa itsepuolustuksessa
wrong_answers:
  - Suhteellisen reagoinnin periaate, jonka mukaan yhteiskuntajärjestyksen ja kollektiivisen turvallisuuden ylläpitämiseksi voidaan käyttää mitoitettuja voimakeinoja
  - Demokraattisen mandaatin periaate, joka sallii voimankäytön silloin, kun enemmistö tai vaaleilla valitut edustajat antavat siihen luvan
  - Hyödyllisyyslaskennan periaate, jonka mukaan voimankäyttö on oikeutettua silloin, kun se tuottaa yhteiskunnalle suurimman hyödyn
explanation: |
  Hyökkäyskiellon periaate on libertaristisen filosofian kulmakivi, jonka mukaan kenelläkään yksilöllä tai ryhmällä (mukaan lukien hallitus) ei ole oikeutta käyttää tai uhata fyysistä voimaa toista henkilöä tai hänen omaisuuttaan vastaan.
  Tämä tekee petoksesta, varkaudesta ja pakottamisesta moraalisesti tuomittavia, ja voimankäyttö on oikeutettua vain itsepuolustuksessa. Muut vaihtoehdot edustavat valtiollisia tai kollektivistisia lähestymistapoja, jotka libertaristit hylkäävät, koska ne antavat hallituksille tai enemmistöille erityislupia tehdä tekoja, joita pidettäisiin moraalittomina, jos niitä tekisivät yksilöt.
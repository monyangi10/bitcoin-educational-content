question: Какой основополагающий принцип отличает либертарианскую политическую философию в отношении применения силы?
answer: Принцип ненападения, запрещающий применять силу против других, кроме как в случае законной самообороны
wrong_answers:
  - Принцип пропорционального реагирования, позволяющий использовать дозированную силу для поддержания общественного порядка и коллективной безопасности
  - Принцип демократического мандата, разрешающий применение силы при наличии разрешения большинства голосов или избранных представителей
  - Принцип утилитарного расчета, оправдывающий силу, когда она приносит наибольшее благо для общества
explanation: |
  Принцип ненападения - краеугольный камень либертарианской философии, утверждающий, что ни один человек или группа людей (включая правительство) не имеет права применять физическую силу или угрожать ею другому человеку или его собственности.
  Это делает мошенничество, воровство и принуждение морально предосудительными, а применение силы оправдано только в случае самообороны. Остальные варианты представляют собой статистские или коллективистские подходы, которые либертарианцы отвергают, поскольку они дают особые разрешения правительствам или большинству населения на совершение действий, которые считались бы аморальными, если бы совершались отдельными людьми.
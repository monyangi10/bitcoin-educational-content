question: Apa prinsip dasar yang membedakan filosofi politik libertarian terkait penggunaan kekerasan?
answer: Prinsip non-agresi, yang melarang penggunaan kekerasan terhadap orang lain kecuali dalam rangka pembelaan diri yang sah
wrong_answers:
  - Prinsip respons proporsional, yang memungkinkan kekuatan terukur untuk menjaga ketertiban sosial dan keamanan kolektif
  - Prinsip mandat demokratis, mengizinkan kekuatan ketika disahkan oleh suara mayoritas atau perwakilan terpilih
  - Prinsip kalkulus utilitarian, membenarkan kekuatan ketika menghasilkan kebaikan terbesar bagi masyarakat
explanation: |
  Prinsip non-agresi adalah landasan filosofi libertarian, yang menyatakan bahwa tidak ada individu atau kelompok (termasuk pemerintah) yang memiliki hak untuk memulai atau mengancam kekuatan fisik terhadap orang lain atau properti mereka.
  Hal ini membuat penipuan, pencurian, dan pemaksaan secara moral tercela, dengan kekerasan hanya dibenarkan untuk membela diri. Pilihan lainnya mewakili pendekatan statist atau kolektivis yang ditolak oleh para libertarian karena mereka memberikan izin khusus kepada pemerintah atau mayoritas untuk melakukan tindakan yang dianggap tidak bermoral jika dilakukan oleh individu.
question: Qual è il principio fondamentale che contraddistingue la filosofia politica libertaria riguardo all'uso della forza?
answer: Il principio di non aggressione, che vieta di usare la forza contro gli altri se non per legittima difesa
wrong_answers:
  - Il principio della risposta proporzionale, che consente una forza misurata per mantenere l'ordine sociale e la sicurezza collettiva
  - Il principio del mandato democratico, che consente l'uso della forza quando è autorizzato dalla maggioranza dei voti o dai rappresentanti eletti
  - Il principio del calcolo utilitaristico, che giustifica la forza quando produce il massimo bene per la società
explanation: |
  Il principio di non aggressione è la pietra miliare della filosofia libertaria e afferma che nessun individuo o gruppo (compreso il governo) ha il diritto di iniziare o minacciare la forza fisica contro un'altra persona o la sua proprietà.
  Ciò rende la frode, il furto e la coercizione moralmente riprovevoli, e la forza è giustificata solo in caso di autodifesa. Le altre opzioni rappresentano approcci statalisti o collettivisti che i libertari rifiutano perché concedono permessi speciali ai governi o alle maggioranze per commettere atti che sarebbero considerati immorali se compiuti da singoli individui.
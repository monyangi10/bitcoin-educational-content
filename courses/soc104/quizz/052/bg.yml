question: Кой е основният принцип, който отличава либертарианската политическа философия по отношение на употребата на сила?
answer: Принципът на ненападение, който забранява използването на сила срещу други лица, освен при законна самозащита
wrong_answers:
  - Принципът на пропорционалния отговор, който позволява използването на премерена сила за поддържане на социалния ред и колективната сигурност
  - Принципът на демократичния мандат, който позволява прилагането на сила, когато това е разрешено с гласовете на мнозинството или на избрани представители
  - Принципът на утилитарното изчисление, който оправдава силата, когато тя води до най-голямото благо за обществото
explanation: |
  Принципът на ненападение е крайъгълен камък на либертарианската философия, според който никой индивид или група (включително правителството) няма право да предприема или да заплашва с физическа сила срещу друг човек или неговата собственост.
  По този начин измамата, кражбата и принудата са морално осъдителни, а употребата на сила е оправдана само при самозащита. Другите варианти представляват етатистки или колективистични подходи, които либертарианците отхвърлят, тъй като дават специални разрешения на правителства или мнозинства да извършват действия, които биха се считали за неморални, ако се извършват от отделни лица.
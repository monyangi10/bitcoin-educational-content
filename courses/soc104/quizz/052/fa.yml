question: اصل اساسی که فلسفه سیاسی لیبرترین را در مورد استفاده از زور متمایز می‌کند چیست؟
answer: اصل عدم تجاوز، که ممنوعیت آغاز خشونت علیه دیگران را به جز در دفاع مشروع از خود مقرر می‌کند
wrong_answers:
  - اصل پاسخ متناسب، اجازه استفاده از نیروی سنجیده برای حفظ نظم اجتماعی و امنیت جمعی را می‌دهد.
  - اصل تفویض دموکراتیک، اجازه به استفاده از زور زمانی که توسط رأی اکثریت یا نمایندگان منتخب مجاز شده باشد
  - اصل حساب سودگرایانه، توجیه استفاده از زور زمانی که بیشترین خیر را برای جامعه به ارمغان می‌آورد
explanation: |
  اصل عدم تجاوز، سنگ‌بنای فلسفه لیبرترین است که بیان می‌کند هیچ فرد یا گروهی (از جمله دولت) حق ندارد به‌طور فیزیکی به شخص دیگری یا اموال او حمله کند یا تهدید کند.  
  این اصل، تقلب، سرقت و اجبار را از نظر اخلاقی نکوهیده می‌سازد و استفاده از زور را تنها در دفاع از خود موجه می‌داند. گزینه‌های دیگر نمایانگر رویکردهای دولت‌گرا یا جمع‌گرا هستند که لیبرترین‌ها آن‌ها را رد می‌کنند زیرا به دولت‌ها یا اکثریت‌ها اجازه‌های ویژه‌ای می‌دهند تا اعمالی را انجام دهند که اگر توسط افراد انجام شود، غیراخلاقی تلقی می‌شود.
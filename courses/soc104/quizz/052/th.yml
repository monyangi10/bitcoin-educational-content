question: หลักการพื้นฐานที่แยกปรัชญาการเมืองแบบเสรีนิยมออกจากกันเกี่ยวกับการใช้กำลังคืออะไร?
answer: หลักการไม่รุกราน ซึ่งห้ามการใช้กำลังกับผู้อื่น ยกเว้นในกรณีป้องกันตัวที่ชอบด้วยกฎหมาย
wrong_answers:
  - หลักการของการตอบสนองอย่างสัดส่วน อนุญาตให้ใช้กำลังอย่างพอเหมาะเพื่อรักษาความสงบเรียบร้อยของสังคมและความมั่นคงร่วมกัน
  - หลักการของอาณัติประชาธิปไตย อนุญาตให้ใช้กำลังเมื่อได้รับอนุมัติจากการลงคะแนนเสียงข้างมากหรือผู้แทนที่ได้รับการเลือกตั้ง
  - หลักการของการคำนวณแบบอรรถประโยชน์, การใช้กำลังเมื่อมันสร้างประโยชน์สูงสุดให้กับสังคม
explanation: |
  หลักการไม่รุกรานเป็นรากฐานของปรัชญาเสรีนิยม โดยระบุว่าไม่มีบุคคลหรือกลุ่มใด (รวมถึงรัฐบาล) มีสิทธิ์ที่จะเริ่มต้นหรือข่มขู่ใช้กำลังทางกายภาพต่อบุคคลอื่นหรือทรัพย์สินของพวกเขา สิ่งนี้ทำให้การฉ้อโกง การขโมย และการบังคับขู่เข็ญเป็นสิ่งที่น่ารังเกียจทางศีลธรรม โดยการใช้กำลังจะถูกยอมรับได้เฉพาะในกรณีป้องกันตัวเอง ตัวเลือกอื่น ๆ แสดงถึงแนวทางของรัฐหรือกลุ่มนิยมที่เสรีนิยมปฏิเสธเพราะพวกเขาให้สิทธิพิเศษแก่รัฐบาลหรือเสียงข้างมากในการกระทำที่ถือว่าไร้ศีลธรรมถ้าทำโดยบุคคลทั่วไป
question: Qual é o princípio fundamental que distingue a filosofia política libertária no que respeita ao uso da força?
answer: O princípio da não agressão, que proíbe o recurso à força contra outros, exceto em legítima autodefesa
wrong_answers:
  - O princípio da resposta proporcional, que permite que a força seja medida para manter a ordem social e a segurança colectiva
  - O princípio do mandato democrático, que permite o uso da força quando autorizado por maioria de votos ou por representantes eleitos
  - O princípio do cálculo utilitário, que justifica a força quando esta produz o maior bem para a sociedade
explanation: |
  O princípio da não-agressão é a pedra angular da filosofia libertária, afirmando que nenhum indivíduo ou grupo (incluindo o governo) tem o direito de iniciar ou ameaçar com força física outra pessoa ou a sua propriedade.
  Isto torna a fraude, o roubo e a coerção moralmente repreensíveis, sendo a força apenas justificada em auto-defesa. As outras opções representam abordagens estatistas ou colectivistas que os libertários rejeitam porque concedem permissões especiais aos governos ou às maiorias para cometerem actos que seriam considerados imorais se fossem praticados por indivíduos.
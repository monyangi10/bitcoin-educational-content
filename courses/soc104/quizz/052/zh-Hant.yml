question: 自由主義政治哲學在使用武力方面的基本原則是什麼？
answer: 除合法自衛外，禁止對他人使用武力的不侵略原則
wrong_answers:
  - 相稱反應原則，允許有節制的武力來維持社會秩序和集體安全
  - 民主授權原則，經大多數票或當選代表授權時，允許使用武力
  - 功利計算原則，當武力能為社會帶來最大的利益時，武力就是合理的。
explanation: |
  不侵犯原則是自由主義哲學的基石，說明任何個人或團體（包括政府）都無權對他人或其財產使用武力或威脅使用武力。
  這使得欺詐、盜竊和強迫在道德上應受到譴責，武力只有在自衛時才是正當的。其他的選擇代表了自由主義者所拒絕的國家主義或集體主義方法，因為這些方法賦予政府或大多數人特別的權限，讓他們可以做出如果由個人來做就會被視為不道德的行為。
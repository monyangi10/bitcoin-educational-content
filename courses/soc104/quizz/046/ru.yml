question: Что отличает подход американского традиционного консерватизма к балансу между индивидуальной свободой и социальным порядком?
answer: Она стремится объединить общественные и индивидуальные устремления с помощью концепции "упорядоченной свободы"
wrong_answers:
  - Приоритет полной свободы личности над любыми формами социальных ограничений или общественных обязательств
  - Он выступает за сильное вмешательство государства для обеспечения строгой социальной иерархии и традиционных ролей
  - Она пропагандирует неограниченную свободу рынка, отвергая все формы моральных и религиозных ценностей
explanation: |
  Американский традиционный консерватизм характеризуется стремлением к "упорядоченной свободе", которая пытается примирить порой
  противоречивые цели общественных потребностей и индивидуальных устремлений, личной свободы и ответственности, а также ограниченного правительства и свободных рынков. Это отличает ее от чистого либертарианства (неограниченная свобода личности), авторитаризма (сильный государственный социальный контроль) или чистого экономического либерализма (рынки без моральных соображений). Концепция представляет собой сложный баланс, а не крайнюю позицию по отношению к индивидуальной свободе или социальному порядку.
question: С какво се отличава подходът на американския традиционен консерватизъм за балансиране на индивидуалната свобода и социалния ред?
answer: Тя се стреми да обедини общностните и индивидуалните стремежи чрез концепцията за "подредена свобода"
wrong_answers:
  - Тя дава приоритет на пълната индивидуална свобода пред всякаква форма на социални ограничения или общностни задължения
  - Той се застъпва за силна държавна намеса за налагане на строги социални йерархии и традиционни роли
  - Тя насърчава неограничената свобода на пазара, като същевременно отхвърля всички форми на морални и религиозни ценности
explanation: |
  Американският традиционен консерватизъм се характеризира със стремежа си към "подредена свобода", която се опитва да съчетае понякога
  противоречивите цели на нуждите на общността и индивидуалните стремежи, личната свобода и отговорност и ограниченото правителство със свободните пазари. Това го отличава от чистия либертарианство (неограничена индивидуална свобода), авторитаризма (силен държавен социален контрол) или чистия икономически либерализъм (пазари без морални съображения). Концепцията представлява по-скоро изтънчен баланс, отколкото крайна позиция по отношение на индивидуалната свобода или социалния ред.
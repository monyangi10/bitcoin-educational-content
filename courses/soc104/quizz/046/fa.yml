question: چه چیزی رویکرد محافظه‌کاری سنتی آمریکایی را در متعادل‌سازی آزادی فردی و نظم اجتماعی متمایز می‌کند؟
answer: این تلاش می‌کند تا آرزوهای جامعه و فرد را از طریق مفهوم «آزادی منظم» ترکیب کند.
wrong_answers:
  - این بر آزادی کامل فردی بر هر نوع محدودیت اجتماعی یا تعهد جامعه اولویت می‌دهد.
  - این از مداخله قوی دولت برای اجرای سلسله‌مراتب اجتماعی سخت و نقش‌های سنتی حمایت می‌کند.
  - این ترویج آزادی نامحدود بازار است در حالی که تمام اشکال ارزش‌های اخلاقی و دینی را رد می‌کند
explanation: |
  محافظه‌کاری سنتی آمریکایی به‌طور خاص با پیگیری 'آزادی منظم' مشخص می‌شود، که تلاش می‌کند اهداف گاه متناقض نیازهای جامعه و آرزوهای فردی، آزادی شخصی و مسئولیت‌پذیری، و دولت محدود با بازارهای آزاد را آشتی دهد. این ویژگی آن را از لیبرترینیسم خالص (آزادی فردی نامحدود)، اقتدارگرایی (کنترل اجتماعی قوی دولت)، یا لیبرالیسم اقتصادی خالص (بازارها بدون ملاحظات اخلاقی) متمایز می‌کند. این مفهوم نمایانگر تعادلی پیچیده است نه یک موضع افراطی در مورد آزادی فردی یا نظم اجتماعی.
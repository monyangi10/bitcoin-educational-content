question: Apa yang membedakan pendekatan konservatisme tradisional Amerika dalam menyeimbangkan kebebasan individu dan tatanan sosial?
answer: Hal ini bertujuan untuk memadukan aspirasi komunitas dan individu melalui konsep 'kebebasan yang teratur'
wrong_answers:
  - Ini memprioritaskan kebebasan individu sepenuhnya di atas segala bentuk batasan sosial atau kewajiban masyarakat
  - Ini mengadvokasi intervensi pemerintah yang kuat untuk menegakkan hirarki sosial yang ketat dan peran tradisional
  - Mempromosikan kebebasan pasar tanpa batas sambil menolak segala bentuk nilai moral dan agama
explanation: |
  Konservatisme tradisional Amerika secara khusus dicirikan oleh pengejarannya terhadap 'kebebasan yang teratur', yang mencoba untuk mendamaikan
  tujuan yang terkadang bertentangan antara kebutuhan masyarakat dan aspirasi individu, kebebasan dan tanggung jawab pribadi, dan pemerintahan yang terbatas dengan pasar bebas. Hal ini membedakannya dengan libertarianisme murni (kebebasan individu yang tidak terbatas), otoritarianisme (kontrol sosial yang kuat dari pemerintah), atau liberalisme ekonomi murni (pasar tanpa pertimbangan moral). Konsep ini mewakili keseimbangan yang canggih, bukan posisi ekstrem pada kebebasan individu atau tatanan sosial.
question: 美国传统保守主义平衡个人自由与社会秩序的方法有何不同？
answer: 它试图通过 "有序自由 "的概念将社区和个人的愿望融合在一起
wrong_answers:
  - 它将完全的个人自由置于任何形式的社会约束或社区义务之上
  - 它主张政府进行强有力的干预，强制执行严格的社会等级制度和传统角色
  - 它提倡无限的市场自由，同时拒绝一切形式的道德和宗教价值观
explanation: |
  美国传统保守主义的具体特点是追求 "有序的自由"，试图调和社区需求与个人愿望、个人自由与责任、有限政府与自由市场等有时相互矛盾的目标。
  它试图调和社区需求与个人愿望、个人自由与责任、有限政府与自由市场这些有时相互矛盾的目标。这使其有别于纯粹的自由主义（无限的个人自由）、专制主义（强有力的政府社会控制）或纯粹的经济自由主义（不考虑道德因素的市场）。这一概念代表了一种精密的平衡，而不是对个人自由或社会秩序的极端立场。
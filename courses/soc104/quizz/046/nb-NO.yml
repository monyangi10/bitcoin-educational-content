question: Hva kjennetegner den amerikanske tradisjonelle konservatismens tilnærming til balansen mellom individuell frihet og samfunnsorden?
answer: Den søker å forene fellesskapets og individets ambisjoner gjennom begrepet "ordnet frihet
wrong_answers:
  - Den prioriterer fullstendig individuell frihet fremfor enhver form for sosial tvang eller samfunnsplikt
  - Den tar til orde for sterk statlig inngripen for å håndheve strenge sosiale hierarkier og tradisjonelle roller
  - Den fremmer ubegrenset markedsfrihet, samtidig som den avviser alle former for moralske og religiøse verdier
explanation: |
  Den amerikanske tradisjonelle konservatismen kjennetegnes særlig ved at den etterstreber "ordnet frihet", som forsøker å forene de til tider
  motstridende målene om samfunnets behov og individuelle ambisjoner, personlig frihet og ansvar, og begrenset statlig styring med frie markeder. Dette skiller den fra ren libertarianisme (ubegrenset individuell frihet), autoritarisme (sterk statlig sosial kontroll) eller ren økonomisk liberalisme (markeder uten moralske hensyn). Konseptet representerer en sofistikert balanse snarere enn en ytterliggående posisjon i forhold til enten individuell frihet eller sosial orden.
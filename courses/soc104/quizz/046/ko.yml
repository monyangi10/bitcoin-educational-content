question: 개인의 자유와 사회 질서의 균형을 맞추는 미국의 전통적 보수주의의 접근 방식은 무엇이 다른가요?
answer: "'질서 있는 자유'라는 개념을 통해 공동체와 개인의 열망을 융합하고자 합니다"
wrong_answers:
  - 어떤 형태의 사회적 제약이나 공동체의 의무보다 완전한 개인의 자유를 우선시합니다
  - 엄격한 사회적 위계와 전통적인 역할을 강제하기 위해 정부의 강력한 개입을 옹호합니다
  - 모든 형태의 도덕적, 종교적 가치를 거부하면서 무한한 시장 자유를 장려합니다
explanation: |
  미국의 전통적 보수주의는 특히 '질서 있는 자유'를 추구한다는 특징이 있습니다
  공동체의 필요와 개인의 열망, 개인의 자유와 책임, 자유 시장과 제한된 정부라는 모순된 목표를 조화시키려고 합니다. 이는 순수한 자유주의(개인의 무한한 자유), 권위주의(정부의 강력한 사회적 통제) 또는 순수한 경제적 자유주의(도덕적 고려가 없는 시장)와 구별됩니다. 이 개념은 개인의 자유나 사회 질서에 대한 극단적인 입장이 아니라 정교한 균형을 나타냅니다.
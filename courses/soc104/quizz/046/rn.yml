question: Ni igiki gitandukanya uburyo abanyamerika b’abanyagihugu bakunda ivy’ubuhinga bwa kera bakoresha mu gutuma umwidegemvyo w’umuntu ku giti ciwe n’urutonde rw’imibano bihuza?
answer: Irarondera gufatanya ivyipfuzo vy’abanyagihugu n’ivy’umuntu ku giti ciwe biciye mu ciyumviro c’‘umwidegemvyo utegekanijwe’.
wrong_answers:
  - Ishira imbere umwidegemvyo wuzuye w'umuntu ku giti ciwe kuruta uburyo bwose bwo guhatirwa mu kibano canke inshingano z'abanyagihugu .
  - Irasaba ko Leta igira ico ikoze kugira ngo ishire mu ngiro uburongozi bukomeye bw'imibano n'uruhara rwa kera .
  - Itera imbere umwidegemvyo w’isoko utagira aho ugarukira mu gihe yanka ubwoko bwose bw’agaciro k’inyifato runtu n’ak’idini .
explanation: |
  Ubuhinga bwo gukingira imigenzo y’Abanyamerika burangwa canecane n’ugukurikirana ‘umwidegemvyo utegekanijwe,’ ukaba ugerageza gusubiza hamwe rimwe na rimwe . 
  intumbero zivuguruzanya z’ivyo abarundi bakeneye n’ivyipfuzo vy’umuntu ku giti ciwe, umwidegemvyo n’inshingano z’umuntu ku giti ciwe, n’intwaro ifise aho igarukira ifise amasoko yidegemvya. Ivyo birayitandukanya n’ukwidegemvya gusukuye (umwidegemvyo w’umuntu ku giti ciwe udafise aho ugarukira), ubutegetsi bw’agahomerabunwa (ubugenzuzi bukomeye bw’imibano bwa Leta), canke ubwigenge bw’ubutunzi butagira agasembwa (amasoko atagiramwo ivy’inyifato runtu). Ico ciyumviro kigereranya uburinganire buteye igomwe aho gushingira ikibanza kirenze urugero ku mwidegemvyo w’umuntu ku giti ciwe canke ku rutonde rw’imibano.
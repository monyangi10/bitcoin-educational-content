question: O que distingue a abordagem do conservadorismo tradicional americano ao equilíbrio entre a liberdade individual e a ordem social?
answer: Procura fundir as aspirações comunitárias e individuais através do conceito de "liberdade ordenada
wrong_answers:
  - Dá prioridade à liberdade individual completa sobre qualquer forma de constrangimento social ou obrigação comunitária
  - Defende uma forte intervenção governamental para impor hierarquias sociais rígidas e papéis tradicionais
  - Promove a liberdade de mercado ilimitada, rejeitando todas as formas de valores morais e religiosos
explanation: |
  O conservadorismo tradicional americano caracteriza-se especificamente pela sua busca de uma "liberdade ordenada", que tenta conciliar os objectivos, por vezes contraditórios, das necessidades da comunidade e das aspirações individuais, da liberdade e responsabilidade pessoais e de um governo limitado com mercados livres
  objectivos por vezes contraditórios das necessidades da comunidade e das aspirações individuais, da liberdade e responsabilidade pessoais e de um governo limitado com mercados livres. Isto distingue-o do libertarianismo puro (liberdade individual ilimitada), do autoritarismo (forte controlo social por parte do governo) ou do liberalismo económico puro (mercados sem considerações morais). O conceito representa um equilíbrio sofisticado, em vez de uma posição extrema, quer na liberdade individual, quer na ordem social.
question: Vad utmärker den amerikanska traditionella konservatismens sätt att balansera individuell frihet och social ordning?
answer: Den försöker förena samhällets och individens strävanden genom begreppet "ordnad frihet
wrong_answers:
  - Den prioriterar fullständig individuell frihet framför alla former av socialt tvång eller samhälleliga skyldigheter
  - Den förespråkar ett starkt statligt ingripande för att upprätthålla strikta sociala hierarkier och traditionella roller
  - Den främjar obegränsad marknadsfrihet samtidigt som den förkastar alla former av moraliska och religiösa värderingar
explanation: |
  Den amerikanska traditionella konservatismen kännetecknas särskilt av sin strävan efter "ordnad frihet", som försöker förena de ibland
  ibland motsägelsefulla målen om samhällsbehov och individuella strävanden, personlig frihet och ansvar, och begränsad regering med fria marknader. Detta skiljer den från ren libertarianism (obegränsad individuell frihet), auktoritarianism (stark statlig social kontroll) eller ren ekonomisk liberalism (marknader utan moraliska överväganden). Konceptet representerar en sofistikerad balans snarare än en extrem position för antingen individuell frihet eller social ordning.
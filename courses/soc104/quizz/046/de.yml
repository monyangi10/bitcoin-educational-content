question: Wodurch zeichnet sich der Ansatz des traditionellen amerikanischen Konservatismus aus, individuelle Freiheit und soziale Ordnung in Einklang zu bringen?
answer: Mit dem Konzept der "geordneten Freiheit" sollen gemeinschaftliche und individuelle Bestrebungen miteinander verbunden werden
wrong_answers:
  - Sie stellt die vollständige Freiheit des Einzelnen über jede Form von sozialem Zwang oder gemeinschaftlicher Verpflichtung
  - Sie befürwortet ein starkes staatliches Eingreifen zur Durchsetzung strenger sozialer Hierarchien und traditioneller Rollen
  - Sie fördert die uneingeschränkte Freiheit des Marktes und lehnt alle Formen moralischer und religiöser Werte ab
explanation: |
  Der traditionelle amerikanische Konservatismus zeichnet sich insbesondere durch sein Streben nach einer "geordneten Freiheit" aus, die versucht, die manchmal widersprüchlichen Ziele
  er versucht, die manchmal widersprüchlichen Ziele der Bedürfnisse der Gemeinschaft und der individuellen Bestrebungen, der persönlichen Freiheit und Verantwortung sowie der begrenzten Regierung mit freien Märkten in Einklang zu bringen. Dies unterscheidet ihn vom reinen Libertarismus (unbegrenzte individuelle Freiheit), vom Autoritarismus (starke staatliche Sozialkontrolle) oder vom reinen Wirtschaftsliberalismus (Märkte ohne moralische Überlegungen). Das Konzept steht für ein ausgeklügeltes Gleichgewicht und nicht für eine extreme Position in Bezug auf individuelle Freiheit oder soziale Ordnung.
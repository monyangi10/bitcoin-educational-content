question: Mis eristab Ameerika traditsioonilise konservatismi lähenemist individuaalse vabaduse ja sotsiaalse korra tasakaalustamisele?
answer: Selle eesmärk on ühendada kogukonna ja üksikisiku püüdlused "korrastatud vabaduse" kontseptsiooni kaudu
wrong_answers:
  - See seab esikohale täieliku individuaalse vabaduse igasuguste sotsiaalsete piirangute või kogukondlike kohustuste ees
  - See pooldab tugevat valitsuse sekkumist, et kehtestada ranged sotsiaalsed hierarhiad ja traditsioonilised rollid
  - See edendab piiramatut turuvabadust, lükates samal ajal tagasi igasugused moraalsed ja religioossed väärtused
explanation: |
  Ameerika traditsioonilist konservatismi iseloomustab konkreetselt "korrastatud vabaduse" taotlemine, mis püüab ühitada mõnikord
  vastuolulisi eesmärke, nagu ühenduse vajadused ja individuaalsed püüdlused, isikuvabadus ja vastutus ning piiratud valitsus ja vabad turud. See eristab seda puhtast libertarismist (piiramatu individuaalne vabadus), autoritaarsusest (tugev valitsuse sotsiaalne kontroll) või puhtast majandusliberalismist (turud ilma moraalsete kaalutlusteta). Kontseptsioon esindab pigem läbimõeldud tasakaalu kui äärmuslikku seisukohta kas individuaalse vabaduse või sotsiaalse korra suhtes.
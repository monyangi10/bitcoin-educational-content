question: Čím se vyznačuje přístup amerického tradičního konzervatismu k vyvažování svobody jednotlivce a společenského řádu?
answer: Usiluje o spojení komunitních a individuálních aspirací prostřednictvím konceptu "uspořádané svobody"
wrong_answers:
  - Upřednostňuje naprostou svobodu jednotlivce před jakoukoli formou společenského omezení nebo komunitního závazku
  - Obhajuje silné vládní zásahy, které by prosadily přísnou sociální hierarchii a tradiční role
  - Prosazuje neomezenou svobodu trhu a zároveň odmítá všechny formy morálních a náboženských hodnot
explanation: |
  Tradiční americký konzervatismus se vyznačuje zejména snahou o "spořádanou svobodu", která se snaží sladit někdy
  protichůdné cíle potřeb společnosti a individuálních aspirací, osobní svobodu a odpovědnost a omezenou vládu s volným trhem. Tím se odlišuje od čistého libertarianismu (neomezená osobní svoboda), autoritářství (silná vládní sociální kontrola) nebo čistého ekonomického liberalismu (trhy bez morálních ohledů). Tento koncept představuje spíše sofistikovanou rovnováhu než extrémní postoj k individuální svobodě nebo společenskému řádu.
question: Co wyróżnia podejście amerykańskiego tradycyjnego konserwatyzmu do równoważenia wolności jednostki i porządku społecznego?
answer: Dąży do połączenia wspólnoty i indywidualnych aspiracji poprzez koncepcję "uporządkowanej wolności
wrong_answers:
  - Przedkłada całkowitą indywidualną wolność nad jakąkolwiek formę społecznego przymusu lub zobowiązania społeczności
  - Opowiada się za silną interwencją rządu w celu egzekwowania ścisłych hierarchii społecznych i tradycyjnych ról
  - Promuje nieograniczoną wolność rynkową, jednocześnie odrzucając wszelkie formy wartości moralnych i religijnych
explanation: |
  Amerykański tradycyjny konserwatyzm charakteryzuje się w szczególności dążeniem do "uporządkowanej wolności", która próbuje pogodzić czasami sprzeczne cele potrzeb społeczności i indywidualnych aspiracji
  czasami sprzeczne cele potrzeb społeczności i indywidualnych aspiracji, wolności osobistej i odpowiedzialności oraz ograniczonego rządu z wolnymi rynkami. To odróżnia go od czystego libertarianizmu (nieograniczona wolność jednostki), autorytaryzmu (silna kontrola społeczna rządu) lub czystego liberalizmu gospodarczego (rynki bez względów moralnych). Koncepcja ta reprezentuje raczej wyrafinowaną równowagę niż skrajne stanowisko w kwestii indywidualnej wolności lub porządku społecznego.
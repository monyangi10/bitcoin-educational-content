question: ¿Qué distingue al conservadurismo tradicional estadounidense a la hora de equilibrar la libertad individual y el orden social?
answer: Pretende fusionar las aspiraciones comunitarias e individuales a través del concepto de "libertad ordenada"
wrong_answers:
  - Prioriza la plena libertad individual sobre cualquier forma de restricción social u obligación comunitaria
  - Aboga por una fuerte intervención gubernamental para imponer jerarquías sociales estrictas y roles tradicionales
  - Promueve una libertad de mercado ilimitada al tiempo que rechaza toda forma de valores morales y religiosos
explanation: |
  El conservadurismo tradicional estadounidense se caracteriza específicamente por su búsqueda de la "libertad ordenada", que intenta conciliar los objetivos a veces contradictorios de las necesidades de la comunidad y las aspiraciones individuales, la libertad y la responsabilidad personales, y el gobierno limitado con los mercados libres
  contradictorios de las necesidades de la comunidad y las aspiraciones individuales, la libertad personal y la responsabilidad, y un gobierno limitado con mercados libres. Esto lo distingue del libertarismo puro (libertad individual ilimitada), del autoritarismo (fuerte control social gubernamental) o del liberalismo económico puro (mercados sin consideraciones morales). El concepto representa un sofisticado equilibrio más que una posición extrema sobre la libertad individual o el orden social.
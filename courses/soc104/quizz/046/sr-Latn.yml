question: Šta razlikuje pristup američkog tradicionalnog konzervativizma u balansiranju individualne slobode i društvenog poretka?
answer: Nastoji spojiti težnje zajednice i pojedinca kroz koncept 'uređene slobode'
wrong_answers:
  - Ona daje prednost potpunoj individualnoj slobodi nad bilo kojim oblikom društvenog ograničenja ili obaveze prema zajednici.
  - Zalaže se za snažnu intervenciju vlade kako bi se nametnule stroge društvene hijerarhije i tradicionalne uloge
  - Promoviše neograničenu slobodu tržišta, dok odbacuje sve oblike moralnih i religijskih vrednosti.
explanation: |
  Američki tradicionalni konzervativizam je specifično karakterisan svojim težnjama ka 'uređenoj slobodi', koja pokušava da pomiri ponekad kontradiktorne ciljeve potreba zajednice i individualnih aspiracija, lične slobode i odgovornosti, te ograničene vlade sa slobodnim tržištima. Ovo ga razlikuje od čistog libertarijanizma (neograničena individualna sloboda), autoritarizma (snažna društvena kontrola od strane vlade), ili čiste ekonomske liberalizacije (tržišta bez moralnih razmatranja). Koncept predstavlja sofisticiranu ravnotežu, a ne ekstremnu poziciju bilo na polju individualne slobode ili društvenog poretka.
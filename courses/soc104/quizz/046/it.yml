question: Che cosa contraddistingue l'approccio del conservatorismo tradizionale americano all'equilibrio tra libertà individuale e ordine sociale?
answer: Cerca di fondere le aspirazioni comunitarie e individuali attraverso il concetto di "libertà ordinata"
wrong_answers:
  - Privilegia la completa libertà individuale rispetto a qualsiasi forma di vincolo sociale o obbligo comunitario
  - Sostiene un forte intervento del governo per imporre rigide gerarchie sociali e ruoli tradizionali
  - Promuove una libertà di mercato illimitata, rifiutando ogni forma di valore morale e religioso
explanation: |
  Il conservatorismo tradizionale americano si caratterizza in particolare per la ricerca di una "libertà ordinata", che tenta di conciliare gli obiettivi, talvolta contraddittori, delle esigenze della comunità e delle aspirazioni individuali, della libertà personale e della responsabilità, del governo limitato e del libero mercato
  obiettivi, a volte contraddittori, dei bisogni della comunità e delle aspirazioni individuali, della libertà e della responsabilità personali, del governo limitato e del libero mercato. Ciò lo distingue dal libertarismo puro (libertà individuale illimitata), dall'autoritarismo (forte controllo sociale da parte del governo) o dal liberalismo economico puro (mercati senza considerazioni morali). Il concetto rappresenta un sofisticato equilibrio piuttosto che una posizione estrema sulla libertà individuale o sull'ordine sociale.
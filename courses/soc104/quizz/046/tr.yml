question: "Amerikan geleneksel muhafazakârlığının bireysel özgürlük ve toplumsal düzeni dengeleme yaklaşımını ayırt eden nedir?"
answer: "Düzenli özgürlük kavramı aracılığıyla toplum ve birey isteklerini birleştirmeyi amaçlamaktadır"
wrong_answers:
  - "Her türlü sosyal kısıtlama veya topluluk yükümlülüğü yerine tam bireysel özgürlüğe öncelik verir"
  - "Katı sosyal hiyerarşileri ve geleneksel rolleri uygulamak için güçlü devlet müdahalesini savunur"
  - "Her türlü ahlaki ve dini değeri reddederken sınırsız piyasa özgürlüğünü teşvik eder"
explanation: |
  Amerikan geleneksel muhafazakârlığı, özellikle 'düzenli özgürlük' arayışı ile karakterize edilir ve bu arayış, bazen
  toplumun ihtiyaçları ile bireysel isteklerin, kişisel özgürlük ve sorumluluğun ve serbest piyasalar ile sınırlı hükümetin çelişen hedefleri. Bu da onu saf liberteryenizmden (sınırsız bireysel özgürlük), otoriterlikten (güçlü hükümet sosyal kontrolü) veya saf ekonomik liberalizmden (ahlaki kaygıları olmayan piyasalar) ayırır. Bu kavram, bireysel özgürlük ya da sosyal düzen konusunda aşırı bir pozisyondan ziyade sofistike bir dengeyi temsil etmektedir.

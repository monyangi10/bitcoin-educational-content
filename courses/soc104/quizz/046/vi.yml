question: Điều gì làm nên sự khác biệt trong cách tiếp cận của chủ nghĩa bảo thủ truyền thống Mỹ đối với việc cân bằng giữa tự do cá nhân và trật tự xã hội?
answer: Nó hướng đến việc dung hòa khát vọng cộng đồng và cá nhân thông qua khái niệm "tự do có trật tự".
wrong_answers:
  - Nó ưu tiên tự do cá nhân tuyệt đối hơn bất kỳ hình thức ràng buộc xã hội hay nghĩa vụ cộng đồng nào.
  - Nó chủ trương sự can thiệp mạnh mẽ của chính phủ để duy trì các hệ thống phân cấp xã hội nghiêm ngặt và các vai trò truyền thống.
  - Nó đề cao tự do thị trường không giới hạn trong khi bác bỏ mọi hình thức giá trị đạo đức và tôn giáo.
explanation: |
  Chủ nghĩa bảo thủ truyền thống của Mỹ được đặc trưng bởi việc theo đuổi "tự do có trật tự", cố gắng dung hòa những mục tiêu đôi khi mâu thuẫn nhau giữa nhu cầu cộng đồng và khát vọng cá nhân, tự do và trách nhiệm cá nhân, và chính phủ hạn chế với thị trường tự do. Điều này phân biệt nó với chủ nghĩa tự do thuần túy (tự do cá nhân không giới hạn), chủ nghĩa độc tài (kiểm soát xã hội mạnh mẽ của chính phủ) hoặc chủ nghĩa tự do kinh tế thuần túy (thị trường không có cân nhắc về đạo đức). Khái niệm này thể hiện sự cân bằng tinh tế hơn là một lập trường cực đoan về tự do cá nhân hay trật tự xã hội.
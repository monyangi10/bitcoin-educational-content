question: Mikä erottaa amerikkalaisen perinteisen konservatismin lähestymistavan yksilönvapauden ja yhteiskuntajärjestyksen tasapainottamiseen?
answer: Siinä pyritään yhdistämään yhteisön ja yksilön pyrkimykset "järjestäytyneen vapauden" käsitteen avulla
wrong_answers:
  - Se asettaa yksilön täydellisen vapauden kaikenlaisten sosiaalisten rajoitusten tai yhteisön velvoitteiden edelle
  - Se kannattaa hallituksen voimakasta väliintuloa tiukkojen sosiaalisten hierarkioiden ja perinteisten roolien valvomiseksi
  - Se edistää rajoittamatonta markkinoiden vapautta ja hylkää kaikenlaiset moraaliset ja uskonnolliset arvot
explanation: |
  Amerikkalaiselle perinteiselle konservatismille on ominaista erityisesti "järjestäytyneen vapauden" tavoittelu, jossa pyritään sovittamaan yhteen joskus
  ristiriitaiset tavoitteet, jotka liittyvät yhteisön tarpeisiin ja yksilön pyrkimyksiin, henkilökohtaiseen vapauteen ja vastuuseen sekä rajoitettuun hallintoon ja vapaisiin markkinoihin. Tämä erottaa sen puhtaasta libertarismista (rajoittamaton yksilönvapaus), autoritaarisuudesta (vahva hallituksen harjoittama sosiaalinen valvonta) tai puhtaasta talousliberalismista (markkinat ilman moraalisia näkökohtia). Käsite edustaa pikemminkin hienostunutta tasapainoa kuin äärimmäistä kantaa joko yksilönvapauteen tai yhteiskuntajärjestykseen.
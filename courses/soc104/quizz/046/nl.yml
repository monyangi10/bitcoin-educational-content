question: Wat onderscheidt de benadering van het Amerikaanse traditionele conservatisme om een evenwicht te vinden tussen individuele vrijheid en sociale orde?
answer: Het probeert gemeenschaps- en individuele aspiraties samen te laten smelten door het concept van 'geordende vrijheid'
wrong_answers:
  - Het geeft de voorkeur aan volledige individuele vrijheid boven elke vorm van sociale dwang of verplichting van de gemeenschap
  - Het pleit voor sterke overheidsbemoeienis om strikte sociale hiërarchieën en traditionele rollen af te dwingen
  - Het bevordert onbeperkte marktvrijheid terwijl het alle vormen van morele en religieuze waarden verwerpt
explanation: |
  Het Amerikaanse traditionele conservatisme wordt specifiek gekarakteriseerd door het streven naar 'geordende vrijheid', die de soms tegenstrijdige doelen van gemeenschapsbehoeften en individuele aspiraties, persoonlijke vrijheid en verantwoordelijkheid, en beperkte overheid met vrije markten met elkaar probeert te verzoenen
  tegenstrijdige doelen van gemeenschapsbehoeften en individuele aspiraties, persoonlijke vrijheid en verantwoordelijkheid, en beperkte overheid met vrije markten met elkaar probeert te verzoenen. Dit onderscheidt het van puur libertarisme (onbeperkte individuele vrijheid), autoritarisme (sterke sociale controle door de overheid) of puur economisch liberalisme (markten zonder morele overwegingen). Het concept vertegenwoordigt een verfijnde balans in plaats van een extreem standpunt over individuele vrijheid of sociale orde.
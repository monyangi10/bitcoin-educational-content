question: 美國傳統保守主義平衡個人自由與社會秩序的方法有何差異？
answer: 它透過「有秩序的自由」概念，尋求融合社群與個人的願望。
wrong_answers:
  - 它將完全的個人自由放在首位，而非任何形式的社會約束或社區義務。
  - 它主張政府強力介入，強制執行嚴格的社會等級制度和傳統角色。
  - 它提倡無限制的市場自由，同時拒絕一切形式的道德和宗教價值觀
explanation: |
  美國傳統保守主義的具體特點是追求「有秩序的自由」，試圖調和有時自相矛盾的社群需求與個人願望、有限政府與自由市場等目標。
  有秩序的自由」，試圖調和社會需求與個人願望、個人自由與責任、有限政府與自由市場等有時相互矛盾的目標。這使它有別於純粹的自由主義（無限制的個人自由）、專制主義（強大的政府社會控制）或純粹的經濟自由主義（沒有道德考量的市場）。這個概念代表一種精密的平衡，而非個人自由或社會秩序的極端立場。
question: व्यक्तिगत स्वतंत्रता और सामाजिक व्यवस्था के बीच संतुलन बनाने के अमेरिकी पारंपरिक रूढ़िवाद के दृष्टिकोण में क्या विशेषता है?
answer: इसका उद्देश्य 'व्यवस्थित स्वतंत्रता' की अवधारणा के माध्यम से सामुदायिक और व्यक्तिगत आकांक्षाओं को एकीकृत करना है।
wrong_answers:
  - यह किसी भी प्रकार के सामाजिक बंधन या सामुदायिक दायित्व की तुलना में पूर्ण व्यक्तिगत स्वतंत्रता को प्राथमिकता देता है।
  - यह सख्त सामाजिक पदानुक्रम और पारंपरिक भूमिकाओं को लागू करने के लिए मजबूत सरकारी हस्तक्षेप की वकालत करता है।
  - यह सभी प्रकार के नैतिक और धार्मिक मूल्यों को अस्वीकार करते हुए असीमित बाजार स्वतंत्रता को बढ़ावा देता है।
explanation: |
  अमेरिकी पारंपरिक रूढ़िवाद की विशेषता 'व्यवस्थित स्वतंत्रता' की खोज है, जो सामुदायिक आवश्यकताओं और व्यक्तिगत आकांक्षाओं, व्यक्तिगत स्वतंत्रता और उत्तरदायित्व, तथा सीमित सरकार और मुक्त बाज़ारों के कभी-कभी परस्पर विरोधी लक्ष्यों में सामंजस्य स्थापित करने का प्रयास करती है। यह इसे शुद्ध स्वतंत्रतावाद (असीमित व्यक्तिगत स्वतंत्रता), अधिनायकवाद (मजबूत सरकारी सामाजिक नियंत्रण), या शुद्ध आर्थिक उदारवाद (नैतिक विचारों के बिना बाज़ार) से अलग करता है। यह अवधारणा व्यक्तिगत स्वतंत्रता या सामाजिक व्यवस्था पर किसी चरम स्थिति के बजाय एक परिष्कृत संतुलन का प्रतिनिधित्व करती है।
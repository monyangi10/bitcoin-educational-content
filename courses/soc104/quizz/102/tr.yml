question: Özgürlükçü felsefeye göre, bir toplumsal örgütlenme sisteminin meşru olup olmadığını belirleyen temel ölçüt nedir?
answer: Dayatılan zorlamalardan ziyade gönüllü etkileşimlerden ve bireysel rızadan kaynaklanıp kaynaklanmadığı
wrong_answers:
  - Ekonomik verimliliği en üst düzeye çıkarıp çıkarmadığı ve tüm katılımcılar için işlem maliyetlerini azaltıp azaltmadığı
  - Azınlık haklarını korurken çoğunluğun demokratik iradesini temsil edip etmediği
  - Bireysel özgürlükler ile kolektif toplumsal sorumluluklar ve görevler arasında denge kurup kurmadığı
explanation: |
  Metin, temel siyasi ayrımın özgürlük ile zorlama, gönüllü rıza ile kısıtlama arasında olduğunu vurgulamaktadır.
  Liberteryenler toplumsal örgütlenmenin siyasi otoriteler tarafından kasıtlı olarak planlanıp dayatılmak yerine gönüllü etkileşimlerden kendiliğinden ortaya çıkması gerektiğine inanırlar. Zorlayıcı dayatmaya karşı bu gönüllü ortaya çıkış ilkesi, liberteryen felsefeyi, hepsi de bireysel seçimler üzerinde bir dereceye kadar devlet müdahalesi ve kontrolü varsayan geleneksel sol-sağ politikalardan ayıran şeydir.
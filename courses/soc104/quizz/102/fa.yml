question: بر اساس فلسفه لیبرترین، معیار اصلی برای تعیین مشروعیت یک سیستم سازمان اجتماعی چیست؟
answer: آیا از تعاملات داوطلبانه و رضایت فردی به جای اجبار تحمیلی ناشی می‌شود؟
wrong_answers:
  - آیا این امر حداکثر کارایی اقتصادی را به همراه دارد و هزینه‌های تراکنش را برای همه شرکت‌کنندگان کاهش می‌دهد؟
  - آیا این نمایانگر اراده دموکراتیک اکثریت است در حالی که حقوق اقلیت‌ها را محافظت می‌کند؟
  - آیا آزادی‌های فردی را با مسئولیت‌ها و وظایف اجتماعی جمعی متعادل می‌کند؟
explanation: |
  متن تأکید می‌کند که شکاف اساسی سیاسی بین آزادی و اجبار، رضایت داوطلبانه و محدودیت است. 
  لیبرترین‌ها معتقدند که سازماندهی اجتماعی باید به‌طور خودجوش از تعاملات داوطلبانه پدید آید، نه اینکه به‌طور عمدی توسط مقامات سیاسی برنامه‌ریزی و تحمیل شود. این اصل ظهور داوطلبانه در مقابل تحمیل اجباری است که فلسفه لیبرترین را از سیاست‌های سنتی چپ-راست متمایز می‌کند، که همگی فرض می‌کنند تا حدی مداخله و کنترل دولت بر انتخاب‌های فردی وجود دارد.
question: Wat is volgens de libertarische filosofie het belangrijkste criterium om te bepalen of een sociaal organisatiesysteem legitiem is?
answer: Of het voortkomt uit vrijwillige interacties en individuele toestemming in plaats van opgelegde dwang
wrong_answers:
  - Of het de economische efficiëntie maximaliseert en de transactiekosten voor alle deelnemers verlaagt
  - Of het de democratische wil van de meerderheid vertegenwoordigt en tegelijkertijd de rechten van minderheden beschermt
  - Of het individuele vrijheden in evenwicht brengt met collectieve sociale verantwoordelijkheden en plichten
explanation: |
  De tekst benadrukt dat de fundamentele politieke scheidslijn ligt tussen vrijheid en dwang, vrijwillige toestemming en dwang.
  Libertariërs geloven dat sociale organisatie spontaan moet ontstaan uit vrijwillige interacties in plaats van doelbewust gepland en opgelegd te worden door politieke autoriteiten. Dit principe van vrijwillige opkomst versus dwangmatige oplegging is wat de libertarische filosofie onderscheidt van de traditionele links-rechts politiek, die allemaal uitgaan van een zekere mate van staatsinterventie en controle over individuele keuzes.
question: Согласно либертарианской философии, что является главным критерием для определения легитимности той или иной системы социальной организации?
answer: Возникает ли она в результате добровольных взаимодействий и индивидуального согласия, а не навязанного принуждения
wrong_answers:
  - Обеспечивает ли она максимальную экономическую эффективность и снижает ли транзакционные издержки для всех участников
  - Отражает ли он демократическую волю большинства, защищая при этом права меньшинства
  - Уравновешивает ли она индивидуальные свободы с коллективными социальными обязанностями и обязательствами
explanation: |
  В тексте подчеркивается, что фундаментальное политическое разделение проходит между свободой и принуждением, добровольным согласием и ограничениями.
  Либертарианцы считают, что социальная организация должна возникать спонтанно из добровольных взаимодействий, а не намеренно планироваться и навязываться политическими властями. Этот принцип добровольного возникновения в противовес принудительному навязыванию отличает либертарианскую философию от традиционной лево-правой политики, которая в той или иной степени предполагает вмешательство государства и контроль над индивидуальным выбором.
question: Prema libertarijanskoj filozofiji, primarni kriterijum za određivanje da li je sistem društvene organizacije legitiman jeste da li poštuje individualne slobode i prava vlasništva.
answer: Da li proizilazi iz dobrovoljnih interakcija i individualnog pristanka, a ne iz nametnute prinude
wrong_answers:
  - Da li to maksimalizuje ekonomsku efikasnost i smanjuje transakcione troškove za sve učesnike
  - Da li predstavlja demokratsku volju većine uz zaštitu prava manjina
  - Da li balansira individualne slobode sa kolektivnim društvenim odgovornostima i dužnostima
explanation: |
  Tekst naglašava da je osnovna politička podela između slobode i prinude, dobrovoljnog pristanka i ograničenja. 
  Libertarijanci veruju da bi društvena organizacija trebalo da se spontano razvija iz dobrovoljnih interakcija, umesto da bude namerno planirana i nametnuta od strane političkih vlasti. Ovaj princip dobrovoljnog nastanka nasuprot prinudnom nametanju je ono što razlikuje libertarijansku filozofiju od tradicionalne levo-desne politike, koja sve pretpostavlja neki stepen državne intervencije i kontrole nad individualnim izborima.
question: Według filozofii libertariańskiej, jakie jest podstawowe kryterium decydujące o tym, czy system organizacji społecznej jest legalny?
answer: Czy wynika ona z dobrowolnych interakcji i indywidualnej zgody, a nie z narzuconego przymusu?
wrong_answers:
  - Czy maksymalizuje efektywność ekonomiczną i zmniejsza koszty transakcji dla wszystkich uczestników?
  - Czy reprezentuje demokratyczną wolę większości przy jednoczesnej ochronie praw mniejszości?
  - Czy równoważy indywidualne swobody ze zbiorową odpowiedzialnością i obowiązkami społecznymi?
explanation: |
  Tekst podkreśla, że fundamentalny podział polityczny przebiega między wolnością a przymusem, dobrowolną zgodą a przymusem.
  Libertarianie uważają, że organizacja społeczna powinna wyłaniać się spontanicznie z dobrowolnych interakcji, a nie być celowo planowana i narzucana przez władze polityczne. Ta zasada dobrowolnego wyłaniania się i narzucania jest tym, co odróżnia filozofię libertariańską od tradycyjnej polityki lewicowo-prawicowej, która zakłada pewien stopień interwencji państwa i kontroli nad indywidualnymi wyborami.
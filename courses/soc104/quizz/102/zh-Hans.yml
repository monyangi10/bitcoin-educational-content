question: 根据自由主义哲学，判断一个社会组织系统是否合法的首要标准是什么？
answer: 是否源于自愿互动和个人同意，而非强加胁迫
wrong_answers:
  - 是否最大限度地提高了经济效益，降低了所有参与者的交易成本
  - 是否代表了多数人的民主意愿，同时保护少数人的权利
  - 是否平衡了个人自由与集体社会责任和义务
explanation: |
  文中强调，政治的根本分歧在于自由与强制、自愿同意与约束之间。
  自由主义者认为，社会组织应从自愿互动中自发产生，而不是由政治当局刻意规划和强加。这种自愿产生与强制强加的原则是自由主义哲学与传统左右政治的区别所在，传统左右政治都假定国家会对个人选择进行一定程度的干预和控制。
question: Según la filosofía libertaria, ¿cuál es el criterio principal para determinar si un sistema de organización social es legítimo?
answer: Si surge de interacciones voluntarias y del consentimiento individual en lugar de la coacción impuesta
wrong_answers:
  - Si maximiza la eficiencia económica y reduce los costes de transacción para todos los participantes
  - Si representa la voluntad democrática de la mayoría al tiempo que protege los derechos de las minorías
  - Si equilibra las libertades individuales con las responsabilidades y deberes sociales colectivos
explanation: |
  El texto subraya que la división política fundamental es entre libertad y coerción, consentimiento voluntario y coacción.
  Los libertarios creen que la organización social debe surgir espontáneamente de interacciones voluntarias en lugar de ser deliberadamente planificada e impuesta por las autoridades políticas. Este principio de surgimiento voluntario frente a imposición coercitiva es lo que distingue a la filosofía libertaria de la política tradicional de izquierda-derecha, que presupone cierto grado de intervención y control estatal sobre las decisiones individuales.
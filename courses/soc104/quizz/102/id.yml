question: Menurut filosofi libertarian, apa kriteria utama untuk menentukan apakah sebuah sistem organisasi sosial itu sah?
answer: Apakah hal itu muncul dari interaksi sukarela dan persetujuan individu, bukan paksaan yang dipaksakan
wrong_answers:
  - Apakah itu memaksimalkan efisiensi ekonomi dan mengurangi biaya transaksi untuk semua peserta
  - Apakah itu mewakili kehendak demokratis mayoritas sekaligus melindungi hak-hak minoritas
  - Apakah itu menyeimbangkan kebebasan individu dengan tanggung jawab dan tugas sosial kolektif
explanation: |
  Teks ini menekankan bahwa perbedaan politik yang mendasar adalah antara kebebasan dan paksaan, persetujuan sukarela dan batasan.
  Kaum libertarian percaya bahwa organisasi sosial harus muncul secara spontan dari interaksi sukarela, bukannya direncanakan dan dipaksakan oleh otoritas politik. Prinsip kemunculan sukarela versus pemaksaan adalah yang membedakan filosofi libertarian dari politik kiri-kanan tradisional, yang semuanya mengasumsikan adanya campur tangan negara dan kontrol atas pilihan individu.
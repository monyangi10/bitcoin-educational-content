question: De acordo com a filosofia libertária, qual é o principal critério para determinar se um sistema de organização social é legítimo?
answer: Se resulta de interações voluntárias e do consentimento individual e não de coação imposta
wrong_answers:
  - Se maximiza a eficiência económica e reduz os custos de transação para todos os participantes
  - Se representa a vontade democrática da maioria, protegendo simultaneamente os direitos das minorias
  - Se equilibra as liberdades individuais com as responsabilidades e deveres sociais colectivos
explanation: |
  O texto sublinha que a divisão política fundamental é entre liberdade e coação, consentimento voluntário e constrangimento.
  Os libertários acreditam que a organização social deve emergir espontaneamente de interações voluntárias, em vez de ser deliberadamente planeada e imposta pelas autoridades políticas. Este princípio de emergência voluntária versus imposição coerciva é o que distingue a filosofia libertária da política tradicional de esquerda-direita, que pressupõe um certo grau de intervenção estatal e de controlo das escolhas individuais.
question: 根據自由主義哲學，判斷一個社會組織體系是否合法的首要標準是什麼？
answer: 它是否來自自願互動和個人同意，而非強加的強迫？
wrong_answers:
  - 是否能為所有參與者帶來最大的經濟效益並降低交易成本
  - 是否代表多數人的民主意願，同時保護少數人的權利
  - 是否平衡個人自由與集體社會責任與義務
explanation: |
  文中強調政治的根本分野在於自由與強制、自願同意與約束。
  自由主義者相信，社會組織應該從自願互動中自發產生，而不是由政治權威刻意規劃和強加。這個自願產生與強制強加的原則，是自由主義哲學與傳統左右政治的區別所在，因為傳統左右政治都假定國家對個人選擇有某種程度的介入與控制。
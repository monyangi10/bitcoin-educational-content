question: According to libertarian philosophy, what is the primary criterion for determining whether a social organization system is legitimate?
answer: Whether it emerges from voluntary interactions and individual consent rather than imposed coercion
wrong_answers:
  - Whether it maximizes economic efficiency and reduces transaction costs for all participants
  - Whether it represents the democratic will of the majority while protecting minority rights
  - Whether it balances individual freedoms with collective social responsibilities and duties
explanation: |
  The text emphasizes that the fundamental political divide is between freedom and coercion, voluntary consent and constraint. Libertarians believe social organization should emerge spontaneously from voluntary interactions rather than being deliberately planned and imposed by political authorities. This principle of voluntary emergence versus coercive imposition is what distinguishes libertarian philosophy from traditional left-right politics, which all assume some degree of state intervention and control over individual choices.
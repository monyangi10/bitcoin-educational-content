question: Milline on libertaarne filosoofia kohaselt peamine kriteerium, mille alusel määratakse kindlaks, kas ühiskondlik korraldussüsteem on seaduslik?
answer: Kas see tuleneb pigem vabatahtlikust suhtlusest ja individuaalsest nõusolekust kui pealesunnitud sunnist
wrong_answers:
  - Kas see maksimeerib majanduslikku tõhusust ja vähendab kõigi osalejate tehingukulusid
  - Kas see esindab enamuse demokraatlikku tahet, kaitstes samal ajal vähemuste õigusi
  - Kas see tasakaalustab individuaalseid vabadusi kollektiivsete sotsiaalsete kohustuste ja kohustustega?
explanation: |
  Tekstis rõhutatakse, et põhiline poliitiline lõhe on vabaduse ja sunni, vabatahtliku nõusoleku ja sundimise vahel.
  Libertaarid usuvad, et ühiskondlik korraldus peaks tekkima spontaanselt vabatahtlikust suhtlusest, mitte olema teadlikult planeeritud ja poliitiliste võimude poolt peale surutud. See põhimõte vabatahtlikust tekkimisest versus sunniviisilisest kehtestamisest eristab libertaarne filosoofia traditsioonilisest vasak-parempoolsest poliitikast, mis kõik eeldavad teatud määral riigi sekkumist ja kontrolli individuaalsete valikute üle.
question: Secondo la filosofia libertaria, qual è il criterio principale per determinare se un sistema di organizzazione sociale è legittimo?
answer: Se emerge da interazioni volontarie e dal consenso individuale piuttosto che da una coercizione imposta
wrong_answers:
  - Se massimizza l'efficienza economica e riduce i costi di transazione per tutti i partecipanti
  - Se rappresenta la volontà democratica della maggioranza, proteggendo al contempo i diritti delle minoranze
  - Se è in grado di bilanciare le libertà individuali con le responsabilità e i doveri sociali collettivi
explanation: |
  Il testo sottolinea che la divisione politica fondamentale è tra libertà e coercizione, consenso volontario e costrizione.
  I libertari credono che l'organizzazione sociale debba emergere spontaneamente dalle interazioni volontarie, anziché essere deliberatamente pianificata e imposta dalle autorità politiche. Questo principio dell'emergere volontario rispetto all'imposizione coercitiva è ciò che distingue la filosofia libertaria dalle politiche tradizionali di destra e sinistra, che presuppongono tutte un certo grado di intervento e controllo dello Stato sulle scelte individuali.
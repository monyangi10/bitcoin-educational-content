question: Enligt libertariansk filosofi, vilket är det primära kriteriet för att avgöra om ett socialt organisationssystem är legitimt?
answer: Om den uppstår genom frivilliga interaktioner och individuellt samtycke snarare än genom påtvingat tvång
wrong_answers:
  - Om det maximerar den ekonomiska effektiviteten och minskar transaktionskostnaderna för alla deltagare
  - Huruvida den representerar majoritetens demokratiska vilja samtidigt som den skyddar minoritetens rättigheter
  - Huruvida den balanserar individuella friheter med kollektiva sociala ansvarsområden och skyldigheter
explanation: |
  I texten betonas att den grundläggande politiska skiljelinjen går mellan frihet och tvång, frivilligt samtycke och tvång.
  Libertarianer anser att samhällsorganisationen bör växa fram spontant ur frivilliga interaktioner snarare än att medvetet planeras och påtvingas av politiska myndigheter. Denna princip om frivillig uppkomst kontra påtvingat tvång är vad som skiljer libertariansk filosofi från traditionell vänster-högerpolitik, som alla förutsätter någon grad av statligt ingripande och kontroll över individuella val.
question: リバタリアン哲学によれば、ある社会組織システムが正当かどうかを判断する第一の基準は何か？
answer: 押しつけられた強制ではなく、自発的な相互作用や個人の同意から生まれるかどうか。
wrong_answers:
  - すべての参加者にとって経済効率を最大化し、取引コストを削減できるかどうか。
  - 少数派の権利を守りつつ、多数派の民主的意思を代弁しているかどうか。
  - 個人の自由と集団的な社会的責任や義務のバランスが取れているかどうか。
explanation: |
  このテキストでは、政治的な根本的な分かれ目は自由と強制、自発的な同意と束縛の間にあることを強調している。
  リバタリアンは、社会組織は政治的権威によって意図的に計画され、押し付けられるのではなく、自発的な相互作用から自然に生まれるべきだと考える。この自発的な発生対強制的な押し付けという原則が、リバタリアン哲学を従来の左派・右派政治と区別するものであり、それらはすべて、個人の選択に対するある程度の国家の介入と統制を前提としている。
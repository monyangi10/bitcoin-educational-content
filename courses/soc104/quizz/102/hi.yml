question: स्वतंत्रतावादी दर्शन के अनुसार, किसी सामाजिक संगठन प्रणाली की वैधता निर्धारित करने का प्राथमिक मानदंड क्या है?
answer: चाहे यह थोपे गए दबाव के बजाय स्वैच्छिक अंतःक्रियाओं और व्यक्तिगत सहमति से उत्पन्न हो।
wrong_answers:
  - क्या इससे सभी प्रतिभागियों के लिए आर्थिक दक्षता अधिकतम होती है और लेनदेन लागत कम होती है?
  - क्या यह अल्पसंख्यकों के अधिकारों की रक्षा करते हुए बहुमत की लोकतांत्रिक इच्छा का प्रतिनिधित्व करता है?
  - क्या यह व्यक्तिगत स्वतंत्रता और सामूहिक सामाजिक जिम्मेदारियों और कर्तव्यों के बीच संतुलन स्थापित करता है?
explanation: |
  यह लेख इस बात पर ज़ोर देता है कि मूलभूत राजनीतिक विभाजन स्वतंत्रता और ज़बरदस्ती, स्वैच्छिक सहमति और प्रतिबंध के बीच है।
  स्वतंत्रतावादी मानते हैं कि सामाजिक संगठन को राजनीतिक अधिकारियों द्वारा जानबूझकर योजनाबद्ध और थोपे जाने के बजाय स्वैच्छिक अंतःक्रियाओं से स्वतः उत्पन्न होना चाहिए। स्वैच्छिक उद्भव बनाम ज़बरदस्ती थोपने का यही सिद्धांत स्वतंत्रतावादी दर्शन को पारंपरिक वाम-दक्षिण राजनीति से अलग करता है, जो सभी किसी न किसी हद तक राज्य के हस्तक्षेप और व्यक्तिगत विकल्पों पर नियंत्रण को मानती हैं।
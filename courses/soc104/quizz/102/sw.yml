question: Kulingana na falsafa ya uhuru, ni kigezo gani cha msingi cha kubaini kama mfumo wa shirika la kijamii ni halali?
answer: Ikiwa inatokana na mwingiliano wa hiari na ridhaa ya mtu binafsi badala ya kulazimishwa
wrong_answers:
  - Ikiwa inaongeza ufanisi wa kiuchumi na kupunguza gharama za miamala kwa washiriki wote
  - Ikiwa inawakilisha mapenzi ya kidemokrasia ya walio wengi huku ikilinda haki za walio wachache
  - Ikiwa inasawazisha uhuru wa mtu binafsi na majukumu na wajibu wa pamoja wa kijamii
explanation: |
  Maandishi hayo yanasisitiza kwamba mgawanyiko wa kimsingi wa kisiasa ni kati ya uhuru na kulazimishwa, ridhaa ya hiari na vikwazo.
  Waliberali wanaamini kwamba mpangilio wa kijamii unapaswa kutokea ghafla kutokana na mwingiliano wa hiari badala ya kupangwa na kulazimishwa kimakusudi na mamlaka za kisiasa. Kanuni hii ya kuibuka kwa hiari dhidi ya kulazimishwa ndiyo inayotofautisha falsafa ya uhuru na siasa za jadi za kushoto-kulia, ambazo zote huchukua kiwango fulani cha uingiliaji kati wa serikali na udhibiti wa chaguo za mtu binafsi.
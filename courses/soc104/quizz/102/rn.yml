question: Dushingiye kuri filozofiya y’abanyagihugu, ni igiki nyamukuru cotuma umuntu amenya nimba urutonde rw’imibano rubereye?
answer: Nimba biva ku migenderanire y’ubushake no ku kwemera kw’umuntu ku giti ciwe aho guhatirwa .
wrong_answers:
  - Nimba bituma ubutunzi bugenda neza cane kandi bikagabanya amafaranga y’ugucuruza ku bari muri iyo nama bose .
  - Nimba iserukira ubushake bwa demokarasi bw’abantu benshi mu gihe irinda uburenganzira bw’abantu bake .
  - Nimba iringaniza umwidegemvyo w'umuntu ku giti ciwe n'amabanga n'inshingano z'imibano rusangi .
explanation: |
  Ico canditswe gishimika ku vy’uko amacakubiri nyamukuru ya politike ari hagati y’umwidegemvyo n’uguhatirwa, ukwemera ku bushake n’uguhatirwa. 
  Abanyalibertarian bemera ko imitunganirize y’imibano ikwiye kwibonekeza mu migenderanire y’abantu ku bushake aho gutegurwa n’ibigirankana no gutegekwa n’abategetsi ba politike. Iryo hame ry’uguseruka ku bushake n’ugutegekwa ku nguvu ni ryo ritandukanya filozofiya y’ubwigenge n’ivya politike y’ububamfu n’iburyo, ivyo vyose bikaba vyiyumvira ko Leta ishobora kwinjiramwo no kugenzura amahitamwo y’umuntu ku giti ciwe.
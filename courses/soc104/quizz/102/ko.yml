question: 자유주의 철학에 따르면 사회 조직 체계가 합법적인지 여부를 판단하는 주요 기준은 무엇인가요?
answer: 강요가 아닌 자발적인 상호작용과 개인의 동의에서 비롯된 것인지 여부
wrong_answers:
  - 모든 참여자의 경제적 효율성을 극대화하고 거래 비용을 절감하는지 여부
  - 소수의 권리를 보호하면서 다수의 민주적 의사를 대변하는지 여부
  - 개인의 자유와 집단적 사회적 책임 및 의무의 균형 여부
explanation: |
  이 글은 근본적인 정치적 구분은 자유와 강압, 자발적 동의와 제약 사이라는 점을 강조합니다.
  자유주의자들은 사회 조직이 정치 당국에 의해 의도적으로 계획되고 강요되는 것이 아니라 자발적인 상호작용을 통해 자연스럽게 생겨나야 한다고 믿습니다. 이러한 자발적 출현과 강압적 강요의 원칙은 자유주의 철학을 개인의 선택에 대해 어느 정도 국가의 개입과 통제를 전제로 하는 전통적인 좌우 정치와 구별하는 요소입니다.
question: Jaké je podle libertariánské filozofie hlavní kritérium pro určení, zda je systém společenského uspořádání legitimní?
answer: Zda vzniká na základě dobrovolných interakcí a individuálního souhlasu, a nikoli na základě vynuceného nátlaku
wrong_answers:
  - Zda maximalizuje ekonomickou efektivitu a snižuje transakční náklady pro všechny účastníky
  - Zda představuje demokratickou vůli většiny a zároveň chrání práva menšin
  - Zda vyvažuje individuální svobody s kolektivní sociální odpovědností a povinnostmi
explanation: |
  Text zdůrazňuje, že základní politické rozdělení je mezi svobodou a donucením, dobrovolným souhlasem a donucením.
  Libertariáni věří, že společenské uspořádání by mělo vznikat spontánně z dobrovolných interakcí, a ne být záměrně plánováno a vnucováno politickými autoritami. Tento princip dobrovolného vzniku versus donucovacího vnucování je tím, co libertariánskou filozofii odlišuje od tradiční levicové a pravicové politiky, které všechny předpokládají určitou míru státních zásahů a kontroly nad individuálními volbami.
question: Mikä on libertaristisen filosofian mukaan ensisijainen kriteeri, jonka perusteella määritetään, onko yhteiskunnallinen organisaatiojärjestelmä oikeutettu?
answer: Syntyykö se vapaaehtoisesta vuorovaikutuksesta ja yksilön suostumuksesta eikä pakottamisesta?
wrong_answers:
  - Maksimoidaanko taloudellinen tehokkuus ja vähennetäänkö kaikkien osallistujien transaktiokustannuksia?
  - Edustaako se enemmistön demokraattista tahtoa ja suojeleeko se samalla vähemmistöjen oikeuksia?
  - Onko se tasapainossa yksilönvapauksien ja kollektiivisten sosiaalisten vastuiden ja velvollisuuksien välillä?
explanation: |
  Tekstissä korostetaan, että perustavanlaatuinen poliittinen jakolinja on vapauden ja pakon, vapaaehtoisen suostumuksen ja pakon välillä.
  Libertaristit uskovat, että yhteiskunnallisen organisaation pitäisi syntyä spontaanisti vapaaehtoisesta vuorovaikutuksesta sen sijaan, että poliittiset viranomaiset suunnittelisivat ja määräisivät sen tarkoituksellisesti. Tämä vapaaehtoisen syntymisen ja pakottavan määräämisen periaate erottaa libertaarisen filosofian perinteisestä vasemmisto-oikeistopolitiikasta, jossa kaikissa oletetaan jonkinasteista valtion puuttumista ja yksilön valintojen valvontaa.
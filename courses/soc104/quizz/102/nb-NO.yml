question: Hva er ifølge libertariansk filosofi det viktigste kriteriet for å avgjøre om et sosialt organisasjonssystem er legitimt?
answer: Om den er et resultat av frivillig interaksjon og individuelt samtykke snarere enn påtvunget tvang
wrong_answers:
  - Om den maksimerer økonomisk effektivitet og reduserer transaksjonskostnadene for alle deltakerne
  - Om den representerer flertallets demokratiske vilje og samtidig beskytter minoriteters rettigheter
  - Om den balanserer individuell frihet med kollektivt samfunnsansvar og -plikter
explanation: |
  Teksten understreker at det grunnleggende politiske skillet går mellom frihet og tvang, frivillig samtykke og tvang.
  Libertarianere mener at sosial organisering bør vokse frem spontant fra frivillige interaksjoner snarere enn å være bevisst planlagt og pålagt av politiske myndigheter. Dette prinsippet om frivillig fremvekst kontra påtvunget tvang er det som skiller libertariansk filosofi fra tradisjonell venstre-høyre-politikk, som alle forutsetter en viss grad av statlig inngripen og kontroll over individuelle valg.
question: Theo triết lý tự do, tiêu chí chính để xác định tính hợp pháp của một hệ thống tổ chức xã hội là gì?
answer: Liệu nó xuất phát từ sự tương tác tự nguyện và sự đồng thuận cá nhân hơn là sự cưỡng ép hay không.
wrong_answers:
  - Liệu điều đó có tối đa hóa hiệu quả kinh tế và giảm chi phí giao dịch cho tất cả các bên tham gia hay không?
  - Liệu điều đó có thể hiện ý chí dân chủ của đa số đồng thời bảo vệ quyền của thiểu số hay không.
  - Liệu nó có cân bằng giữa tự do cá nhân với trách nhiệm và nghĩa vụ xã hội tập thể hay không?
explanation: |
  Văn bản nhấn mạnh rằng sự phân chia chính trị cơ bản nằm giữa tự do và cưỡng chế, sự đồng thuận tự nguyện và sự ràng buộc.
  Những người theo chủ nghĩa tự do tin rằng tổ chức xã hội nên xuất hiện một cách tự phát từ các tương tác tự nguyện hơn là được lên kế hoạch và áp đặt một cách có chủ đích bởi các nhà chức trách chính trị. Nguyên tắc về sự xuất hiện tự nguyện so với sự áp đặt cưỡng chế là điều phân biệt triết học tự do với chính trị cánh tả-cánh hữu truyền thống, vốn đều giả định một mức độ can thiệp và kiểm soát nào đó của nhà nước đối với các lựa chọn cá nhân.
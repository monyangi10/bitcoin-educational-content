question: Според либертарианската философия какъв е основният критерий за определяне на това дали дадена система на социална организация е легитимна?
answer: Дали тя е резултат от доброволни взаимодействия и индивидуално съгласие, а не от наложена принуда
wrong_answers:
  - Дали тя увеличава максимално икономическата ефективност и намалява разходите по сделките за всички участници
  - Дали тя отразява демократичната воля на мнозинството, като същевременно защитава правата на малцинствата
  - Дали тя балансира индивидуалните свободи с колективните социални отговорности и задължения
explanation: |
  В текста се подчертава, че основното политическо разделение е между свободата и принудата, доброволното съгласие и принудата.
  Либертарианците вярват, че социалната организация трябва да възниква спонтанно от доброволните взаимодействия, а не да бъде съзнателно планирана и налагана от политическите власти. Този принцип на доброволно възникване срещу принудително налагане е това, което отличава либертарианската философия от традиционната лява и дясна политика, които предполагат някаква степен на държавна намеса и контрол върху индивидуалния избор.
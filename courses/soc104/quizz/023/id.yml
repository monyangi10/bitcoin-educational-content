question: Apa yang membedakan seorang konservatif budaya yang juga libertarian dengan konservatif politik dalam hal penegakan nilai-nilai tradisional?
answer: Mereka mempromosikan nilai-nilai tradisional melalui persuasi dan contoh, tetapi menentang penggunaan paksaan hukum untuk memaksakan nilai-nilai tersebut kepada orang lain
wrong_answers:
  - Mereka mendukung intervensi pemerintah untuk melindungi nilai-nilai tradisional sambil mempertahankan kebebasan ekonomi bagi individu
  - Mereka percaya bahwa nilai-nilai tradisional harus ditegakkan melalui undang-undang lokal daripada undang-undang federal
  - Mereka mengadvokasi amandemen konstitusi untuk mengabadikan nilai-nilai tradisional sambil membatasi pemerintah di bidang-bidang lain
explanation: |
  Perbedaan utamanya adalah bahwa kaum libertarian konservatif kultural memisahkan keyakinan moral pribadi mereka dari filosofi politik mereka mengenai kekuasaan negara.
  Meskipun mereka mungkin sangat percaya pada nilai-nilai tradisional seperti keluarga, agama, dan kebajikan, mereka menolak menggunakan kekuatan paksaan hukum untuk memaksakan nilai-nilai ini pada orang lain. Sebaliknya, mereka mempromosikan nilai-nilai mereka melalui cara-cara sukarela seperti pendidikan, persuasi, dan contoh pribadi. Hal ini berbeda dengan kaum konservatif politik yang sering kali mendukung penggunaan kekuatan pemerintah untuk menegakkan tatanan sosial tradisional. Prinsip libertarian tentang non-agresi berarti mereka secara moral tidak menyetujui perilaku tertentu sambil tetap menghormati hak orang lain untuk memilih secara berbeda, selama pilihan tersebut tidak merugikan orang lain.
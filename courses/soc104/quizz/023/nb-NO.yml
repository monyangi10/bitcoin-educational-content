question: Hva skiller en kulturkonservativ som også er libertarianer fra en politisk konservativ når det gjelder håndhevelsen av tradisjonelle verdier?
answer: De fremmer tradisjonelle verdier gjennom overtalelse og eksempel, men er imot å bruke juridisk tvang for å påtvinge andre dem
wrong_answers:
  - De støtter statlig inngripen for å beskytte tradisjonelle verdier og samtidig opprettholde økonomisk frihet for enkeltpersoner
  - De mener at tradisjonelle verdier bør håndheves gjennom lokale lover snarere enn føderal lovgivning
  - De tar til orde for grunnlovsendringer for å sikre tradisjonelle verdier og samtidig begrense myndighetene på andre områder
explanation: |
  Det viktigste skillet er at kulturkonservative libertarianere skiller sin personlige moralske overbevisning fra sin politiske filosofi når det gjelder statsmakt.
  Selv om de har en sterk tro på tradisjonelle verdier som familie, religion og dyd, avviser de å bruke lovens tvangsmakt til å påtvinge andre disse verdiene. I stedet fremmer de sine verdier gjennom frivillige midler som utdanning, overtalelse og personlig eksempel. Dette står i kontrast til politisk konservative som ofte støtter bruk av statlig makt for å håndheve tradisjonelle sosiale ordninger. Det libertarianske ikke-aggresjonsprinsippet betyr at de kan ta moralsk avstand fra visse former for atferd, samtidig som de respekterer andres rett til å velge annerledes, så lenge disse valgene ikke skader andre.
question: O que distingue um conservador cultural que é também libertário de um conservador político no que respeita à aplicação dos valores tradicionais?
answer: Promovem os valores tradicionais através da persuasão e do exemplo, mas opõem-se à utilização da coerção legal para os impor aos outros
wrong_answers:
  - Apoiam a intervenção do governo para proteger os valores tradicionais, mantendo a liberdade económica dos indivíduos
  - Consideram que os valores tradicionais devem ser aplicados através de leis locais e não de legislação federal
  - Defendem alterações constitucionais que consagrem os valores tradicionais e limitem o governo noutras áreas
explanation: |
  A principal distinção é que os libertários conservadores culturais separam as suas crenças morais pessoais da sua filosofia política relativamente ao poder do Estado.
  Embora possam acreditar firmemente em valores tradicionais como a família, a religião e a virtude, rejeitam a utilização da força coerciva da lei para impor esses valores aos outros. Em vez disso, promovem os seus valores através de meios voluntários como a educação, a persuasão e o exemplo pessoal. Isto contrasta com os conservadores políticos que frequentemente apoiam a utilização do poder do governo para impor disposições sociais tradicionais. O princípio libertário da não-agressão significa que podem desaprovar moralmente certos comportamentos, respeitando o direito dos outros de escolherem de forma diferente, desde que essas escolhas não prejudiquem os outros.
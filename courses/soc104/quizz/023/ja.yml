question: 伝統的価値観の強制に関して、リバタリアンでもある文化的保守と政治的保守を区別するものは何か？
answer: 説得と模範によって伝統的価値観を促進するが、法的強制力を使って他者に押し付けることには反対する。
wrong_answers:
  - 個人の経済的自由を維持しつつ、伝統的価値観を守るために政府の介入を支持する。
  - 伝統的な価値観は、連邦法ではなく、地元の法律で強制されるべきだと考えている。
  - 彼らは、伝統的な価値観を明記する一方で、他の分野では政府を制限する憲法改正を提唱している。
explanation: |
  重要な違いは、文化的保守主義のリバタリアンは、個人的な道徳的信条と国家権力に関する政治哲学を切り離して考えている点である。
  家族、宗教、美徳といった伝統的な価値観を強く信じる一方で、こうした価値観を法の強制力を使って他者に押し付けることは拒否する。その代わりに、教育、説得、個人の模範といった自発的な手段を通じて価値観を広める。これは、伝統的な社会的取り決めを強制するために政府権力を行使することを支持する政治的保守主義者と対照的である。自由主義者の非攻撃の原則は、ある種の行動を道徳的に否定しながらも、その選択が他者に害を与えない限り、他者が異なる選択をする権利を尊重できることを意味する。
question: 在执行传统价值观方面，同时也是自由主义者的文化保守主义者与政治保守主义者的区别是什么？
answer: 他们通过说服和以身作则来推广传统价值观，但反对使用法律强制手段将传统价值观强加于人
wrong_answers:
  - 他们支持政府干预，以保护传统价值观，同时维护个人的经济自由
  - 他们认为传统价值观应通过地方法律而非联邦立法来执行
  - 他们主张修改宪法，以体现传统价值观，同时限制政府在其他领域的活动
explanation: |
  关键的区别在于，文化保守主义自由主义者将个人道德信仰与有关国家权力的政治理念区分开来。
  虽然他们可能坚信家庭、宗教和美德等传统价值观，但他们反对使用法律的强制力将这些价值观强加于他人。相反，他们通过教育、说服和个人榜样等自愿方式来推广自己的价值观。这与政治保守派形成了鲜明对比，后者往往支持利用政府权力来强制推行传统的社会安排。自由主义者的 "不侵犯 "原则意味着他们可以在道义上不赞成某些行为，同时也尊重他人做出不同选择的权利，只要这些选择不伤害他人。
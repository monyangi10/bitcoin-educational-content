question: ¿Qué distingue a un conservador cultural que también es libertario de un conservador político en cuanto a la aplicación de los valores tradicionales?
answer: Promueven los valores tradicionales mediante la persuasión y el ejemplo, pero se oponen a utilizar la coacción legal para imponerlos a los demás
wrong_answers:
  - Apoyan la intervención del gobierno para proteger los valores tradicionales, manteniendo al mismo tiempo la libertad económica de los individuos
  - Creen que los valores tradicionales deben imponerse mediante leyes locales y no federales
  - Abogan por enmiendas constitucionales que consagren los valores tradicionales al tiempo que limitan el gobierno en otros ámbitos
explanation: |
  La distinción clave es que los libertarios conservadores culturales separan sus creencias morales personales de su filosofía política respecto al poder del Estado.
  Aunque crean firmemente en valores tradicionales como la familia, la religión y la virtud, rechazan el uso de la fuerza coercitiva de la ley para imponer estos valores a los demás. En su lugar, promueven sus valores a través de medios voluntarios como la educación, la persuasión y el ejemplo personal. Esto contrasta con los conservadores políticos, que a menudo apoyan el uso del poder gubernamental para imponer los acuerdos sociales tradicionales. El principio libertario de no agresión significa que pueden desaprobar moralmente ciertos comportamientos respetando el derecho de los demás a elegir de forma diferente, siempre que esas elecciones no perjudiquen a los demás.
question: Какво отличава културния консерватор, който е и либертарианец, от политическия консерватор по отношение на налагането на традиционните ценности?
answer: Те насърчават традиционните ценности чрез убеждаване и пример, но се противопоставят на използването на правна принуда за налагането им на другите
wrong_answers:
  - Те подкрепят държавната намеса за защита на традиционните ценности, като същевременно запазват икономическата свобода на хората
  - Те смятат, че традиционните ценности трябва да се налагат чрез местни закони, а не чрез федерално законодателство
  - Те се застъпват за конституционни поправки, които да закрепят традиционните ценности, като същевременно ограничават правителството в други области
explanation: |
  Основната разлика е, че културноконсервативните либертарианци отделят личните си морални убеждения от политическата си философия по отношение на държавната власт.
  Макар да вярват силно в традиционни ценности като семейството, религията и добродетелта, те отхвърлят използването на принудителната сила на закона за налагане на тези ценности на другите. Вместо това те насърчават своите ценности чрез доброволни средства като образование, убеждаване и личен пример. Това контрастира с политическите консерватори, които често подкрепят използването на държавната власт за налагане на традиционни социални договорености. Либертарианският принцип за ненападение означава, че те могат морално да не одобряват определени поведения, като същевременно зачитат правото на другите да избират по различен начин, стига този избор да не вреди на другите.
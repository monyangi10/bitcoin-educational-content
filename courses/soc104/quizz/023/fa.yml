question: چه چیزی یک محافظه‌کار فرهنگی که همچنین لیبرترین است را از یک محافظه‌کار سیاسی در مورد اجرای ارزش‌های سنتی متمایز می‌کند؟
answer: آن‌ها ارزش‌های سنتی را از طریق ترغیب و الگو قرار دادن ترویج می‌کنند اما با استفاده از اجبار قانونی برای تحمیل آن‌ها به دیگران مخالفند.
wrong_answers:
  - آن‌ها از مداخله دولت برای حفاظت از ارزش‌های سنتی حمایت می‌کنند در حالی که آزادی اقتصادی برای افراد را حفظ می‌کنند.
  - آن‌ها معتقدند که ارزش‌های سنتی باید از طریق قوانین محلی به جای قوانین فدرال اجرا شوند.
  - آن‌ها از اصلاحات قانون اساسی برای تثبیت ارزش‌های سنتی حمایت می‌کنند و در عین حال دولت را در سایر حوزه‌ها محدود می‌کنند.
explanation: |
  تفاوت اصلی این است که لیبرترین‌های محافظه‌کار فرهنگی باورهای اخلاقی شخصی خود را از فلسفه سیاسی‌شان در مورد قدرت دولت جدا می‌کنند. در حالی که ممکن است به شدت به ارزش‌های سنتی مانند خانواده، دین و فضیلت اعتقاد داشته باشند، اما استفاده از نیروی قهری قانون برای تحمیل این ارزش‌ها به دیگران را رد می‌کنند. در عوض، آن‌ها ارزش‌های خود را از طریق روش‌های داوطلبانه مانند آموزش، ترغیب و الگوی شخصی ترویج می‌کنند. این در تضاد با محافظه‌کاران سیاسی است که اغلب از استفاده از قدرت دولت برای اجرای ترتیبات اجتماعی سنتی حمایت می‌کنند. اصل عدم تجاوز لیبرترین‌ها به این معناست که آن‌ها می‌توانند به لحاظ اخلاقی برخی رفتارها را ناپسند بدانند، در حالی که همچنان به حق انتخاب متفاوت دیگران احترام می‌گذارند، تا زمانی که این انتخاب‌ها به دیگران آسیب نرساند.
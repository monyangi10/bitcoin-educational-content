question: Что отличает культурного консерватора, который также является либертарианцем, от политического консерватора в вопросах защиты традиционных ценностей?
answer: Они пропагандируют традиционные ценности, убеждая и показывая пример, но выступают против использования правового принуждения для навязывания их другим
wrong_answers:
  - Они поддерживают вмешательство государства в защиту традиционных ценностей, сохраняя при этом экономическую свободу для отдельных людей
  - Они считают, что традиционные ценности должны обеспечиваться местными законами, а не федеральным законодательством
  - Они выступают за внесение поправок в конституцию, чтобы закрепить традиционные ценности, ограничив при этом правительство в других сферах
explanation: |
  Ключевое различие заключается в том, что культурные консерваторы-либертарианцы отделяют свои личные моральные убеждения от своей политической философии в отношении государственной власти.
  Хотя они могут твердо верить в традиционные ценности, такие как семья, религия и добродетель, они отвергают использование принудительной силы закона для навязывания этих ценностей другим. Вместо этого они продвигают свои ценности с помощью добровольных средств, таких как образование, убеждение и личный пример. Это контрастирует с политическими консерваторами, которые часто поддерживают использование государственной власти для принуждения к соблюдению традиционных социальных договоренностей. Либертарианский принцип ненападения означает, что они могут морально не одобрять определенные модели поведения, но при этом уважать право других людей на иной выбор, если этот выбор не вредит другим.
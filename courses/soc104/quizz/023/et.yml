question: Mis eristab kultuurikonservatiivi, kes on ühtlasi libertaarne, poliitilisest konservatiivist seoses traditsiooniliste väärtuste jõustamisega?
answer: Nad edendavad traditsioonilisi väärtusi veenmise ja eeskuju kaudu, kuid on vastu seadusliku sunni kasutamisele, et neid teistele peale suruda
wrong_answers:
  - Nad toetavad valitsuse sekkumist, et kaitsta traditsioonilisi väärtusi, säilitades samal ajal üksikisikute majanduslikku vabadust
  - Nad usuvad, et traditsioonilisi väärtusi tuleks jõustada pigem kohalike seaduste kui föderaalsete õigusaktide kaudu
  - Nad pooldavad põhiseaduse muutmist, et kinnitada traditsioonilisi väärtusi, piirates samal ajal valitsust teistes valdkondades
explanation: |
  Peamine erinevus seisneb selles, et kultuurikonservatiivsed libertaarid eraldavad oma isiklikud moraalsed tõekspidamised oma poliitilisest filosoofiast seoses riigivõimu suhtes.
  Kuigi nad võivad kindlalt uskuda sellistesse traditsioonilistesse väärtustesse nagu perekond, religioon ja voorused, lükkavad nad tagasi seaduse sunniviisilise jõu kasutamise nende väärtuste teistele peale surumiseks. Selle asemel edendavad nad oma väärtusi vabatahtlike vahenditega, nagu haridus, veenmine ja isiklik eeskuju. See on vastuolus poliitiliste konservatiividega, kes toetavad sageli valitsuse võimu kasutamist traditsiooniliste sotsiaalsete kokkulepete jõustamiseks. Libertaarne mittekallaletungi põhimõte tähendab, et nad võivad moraalselt taunida teatud käitumisviise, austades samas teiste õigust valida teisiti, kui need valikud ei kahjusta teisi.
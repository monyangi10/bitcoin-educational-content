question: Čím se liší kulturní konzervativec, který je zároveň libertariánem, od politického konzervativce, pokud jde o prosazování tradičních hodnot?
answer: Podporují tradiční hodnoty přesvědčováním a příkladem, ale jsou proti jejich vnucování ostatním pomocí právního nátlaku
wrong_answers:
  - Podporují vládní zásahy na ochranu tradičních hodnot při zachování ekonomické svobody jednotlivců
  - Domnívají se, že tradiční hodnoty by měly být prosazovány spíše prostřednictvím místních zákonů než federální legislativy
  - Prosazují ústavní změny, které by zakotvily tradiční hodnoty a zároveň omezily vládu v jiných oblastech
explanation: |
  Klíčovým rozdílem je, že kulturně konzervativní libertariáni oddělují své osobní morální přesvědčení od politické filozofie týkající se státní moci.
  I když pevně věří v tradiční hodnoty, jako je rodina, náboženství a ctnost, odmítají použití donucovací síly zákona k vnucování těchto hodnot ostatním. Místo toho prosazují své hodnoty dobrovolnými prostředky, jako je vzdělávání, přesvědčování a osobní příklad. To je v kontrastu s politickými konzervativci, kteří často podporují použití státní moci k prosazení tradičních společenských opatření. Libertariánská zásada neútočení znamená, že mohou morálně neschvalovat určité chování a zároveň respektovat právo ostatních na jinou volbu, pokud tato volba neškodí ostatním.
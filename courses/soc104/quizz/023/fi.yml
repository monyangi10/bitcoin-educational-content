question: Mikä erottaa kulttuurikonservatiivin, joka on myös libertaristi, poliittisesta konservatiivista perinteisten arvojen toteuttamisen osalta?
answer: He edistävät perinteisiä arvoja vakuuttamalla ja esimerkillä mutta vastustavat oikeudellisen pakottamisen käyttöä niiden pakottamiseksi muille
wrong_answers:
  - He kannattavat hallituksen väliintuloa perinteisten arvojen suojelemiseksi ja samalla yksilöiden taloudellisen vapauden säilyttämiseksi
  - He uskovat, että perinteisiä arvoja olisi valvottava pikemminkin paikallisilla laeilla kuin liittovaltion lainsäädännöllä
  - He kannattavat perustuslain muuttamista siten, että perinteiset arvot turvataan ja samalla hallitusta rajoitetaan muilla aloilla
explanation: |
  Keskeinen ero on se, että kulttuurikonservatiiviset vapaamieliset erottavat henkilökohtaiset moraaliset vakaumuksensa valtiovaltaa koskevasta poliittisesta filosofiastaan.
  Vaikka he uskovat vahvasti perinteisiin arvoihin, kuten perheeseen, uskontoon ja hyveellisyyteen, he torjuvat lain pakkovoiman käytön näiden arvojen määräämiseksi muille. Sen sijaan he edistävät arvojaan vapaaehtoisin keinoin, kuten koulutuksen, suostuttelun ja henkilökohtaisen esimerkin avulla. Tämä on ristiriidassa poliittisten konservatiivien kanssa, jotka usein kannattavat valtiovallan käyttämistä perinteisten sosiaalisten järjestelyjen toteuttamiseen. Hyökkäyskiellon libertaristinen periaate tarkoittaa sitä, että he voivat moraalisesti paheksua tiettyjä käyttäytymismalleja ja kunnioittaa silti muiden oikeutta valita toisin, kunhan nämä valinnat eivät vahingoita muita.
question: Was unterscheidet einen Kulturkonservativen, der gleichzeitig Libertärer ist, von einem politischen Konservativen, der sich für die Durchsetzung traditioneller Werte einsetzt?
answer: Sie fördern traditionelle Werte durch Überzeugung und Beispiel, lehnen es aber ab, sie anderen mit rechtlichem Zwang aufzuzwingen
wrong_answers:
  - Sie unterstützen staatliche Eingriffe zum Schutz traditioneller Werte bei gleichzeitiger Wahrung der wirtschaftlichen Freiheit des Einzelnen
  - Sie glauben, dass traditionelle Werte durch lokale Gesetze und nicht durch Bundesgesetze durchgesetzt werden sollten
  - Sie setzen sich für Verfassungsänderungen ein, um traditionelle Werte zu verankern und gleichzeitig die Regierung in anderen Bereichen zu beschränken
explanation: |
  Der wichtigste Unterschied besteht darin, dass kulturkonservative Libertäre ihre persönlichen moralischen Überzeugungen von ihrer politischen Philosophie in Bezug auf die Staatsgewalt trennen.
  Sie glauben zwar fest an traditionelle Werte wie Familie, Religion und Tugendhaftigkeit, lehnen es aber ab, diese Werte anderen mit Hilfe von Zwangsmaßnahmen aufzuzwingen. Stattdessen fördern sie ihre Werte durch freiwillige Mittel wie Bildung, Überzeugung und persönliches Beispiel. Dies steht im Gegensatz zu den politischen Konservativen, die häufig den Einsatz staatlicher Macht zur Durchsetzung traditioneller sozialer Regelungen befürworten. Der libertäre Grundsatz der Nicht-Aggression bedeutet, dass sie bestimmte Verhaltensweisen moralisch missbilligen können, aber dennoch das Recht anderer respektieren, sich anders zu entscheiden, solange diese Entscheidungen anderen nicht schaden.
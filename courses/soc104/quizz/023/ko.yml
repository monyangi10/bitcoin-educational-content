question: 자유주의자이면서 문화적 보수주의자인 사람이 전통적인 가치의 집행과 관련하여 정치적 보수주의자와 구별되는 점은 무엇인가요?
answer: 설득과 모범을 통해 전통적인 가치를 장려하지만 다른 사람들에게 이를 강요하는 법적 강압에 반대합니다
wrong_answers:
  - 개인의 경제적 자유를 유지하면서 전통적인 가치를 보호하기 위한 정부의 개입을 지지합니다
  - 이들은 전통적인 가치가 연방법이 아닌 지역 법률을 통해 시행되어야 한다고 생각합니다
  - 이들은 전통적인 가치를 지키고 다른 분야의 정부를 제한하기 위한 헌법 개정을 주장합니다
explanation: |
  핵심적인 차이점은 문화적 보수 자유주의자들은 개인의 도덕적 신념과 국가 권력에 관한 정치 철학을 분리한다는 점입니다.
  이들은 가족, 종교, 미덕과 같은 전통적인 가치를 강하게 믿지만, 이러한 가치를 다른 사람에게 강요하기 위해 법의 강압적인 힘을 사용하는 것을 거부합니다. 대신 교육, 설득, 개인적인 모범과 같은 자발적인 수단을 통해 자신의 가치를 홍보합니다. 이는 전통적인 사회 제도를 강제하기 위해 정부 권력을 사용하는 것을 지지하는 정치적 보수주의자들과는 대조적입니다. 자유주의자들의 비침략 원칙은 다른 사람에게 해를 끼치지 않는 한, 특정 행동을 도덕적으로 반대하면서도 다른 사람의 다른 선택권을 존중할 수 있다는 것을 의미합니다.
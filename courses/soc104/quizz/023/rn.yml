question: Ni igiki gitandukanya umuntu akunda umuco kandi ari umunyagihugu akunda umwidegemvyo n’umuntu akunda politike ku bijanye no gushitsa ingingo ngenderwako z’imigenzo?
answer: Batera imbere ingingo ngenderwako z’imigenzo biciye mu kwemeza no gutanga akarorero ariko bakarwanya gukoresha ububasha bushingiye ku mategeko kugira ngo bazitegeke abandi .
wrong_answers:
  - Bashigikiye ko Leta igira ico ikoze kugira ngo ikingire ingingo ngenderwako z’imigenzo mu gihe umuntu aguma afise umwidegemvyo mu vy’ubutunzi .
  - Bemera ko ingingo ngenderwako z'imigenzo zikwiye gukurikizwa biciye mu mategeko yo mu karere aho gushirwa mu ngiro biciye mu mategeko ya Leta Zunze Ubumwe za Amerika .
  - Basaba ko itegeko nshinga rihindurwa kugira ngo hashirweho ingingo ngenderwako z’imigenzo mu gihe ubutegetsi buzogabanywa mu bindi bice .
explanation: |
  Itandukaniro nyamukuru ni uko abaharanira umwidegemvyo bakunda imico kama batandukanya ivyo bemera mu vy’inyifato runtu n’ubuhinga bwabo bwa politike ku bijanye n’ububasha bwa Leta. 
  Naho boba bemera cane ingingo ngenderwako z’imigenzo nk’umuryango, idini be n’ingeso nziza, baranka gukoresha inguvu z’amategeko zihatira abandi gutegeka izo ngingo ngenderwako. Ahubwo, barateza imbere ingingo ngenderwako zabo biciye ku buryo bw’ubushake nk’inyigisho, kwemeza, n’akarorero k’umuntu ku giti ciwe. Ivyo bitandukanye n’abanyapolitike bakunda ivy’ubuhinga bwa none, akenshi bashigikira gukoresha ububasha bwa Leta kugira ngo umuntu ashitse intunganyo za kera zo mu kibano. Ingingo ngenderwako y’ubwigenge y’ukutagira ubukazi isigura ko bashobora kwanka inyifato zimwe zimwe mu vy’inyifato runtu mu gihe baguma bubaha uburenganzira bw’abandi bwo guhitamwo mu buryo butandukanye, igihe cose ayo mahitamwo atazogira ico akoze ku bandi.
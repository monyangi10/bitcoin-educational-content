question: Wat onderscheidt een cultureel conservatief die ook libertarisch is van een politiek conservatief als het gaat om het handhaven van traditionele waarden?
answer: Ze promoten traditionele waarden door overtuiging en voorbeeld, maar zijn ertegen om deze met wettelijke dwang aan anderen op te leggen
wrong_answers:
  - Ze steunen overheidsingrijpen om traditionele waarden te beschermen en tegelijkertijd economische vrijheid voor individuen te behouden
  - Zij geloven dat traditionele waarden moeten worden afgedwongen door lokale wetten in plaats van federale wetgeving
  - Ze pleiten voor grondwetswijzigingen om traditionele waarden te verankeren en tegelijkertijd de overheid op andere gebieden te beperken
explanation: |
  Het belangrijkste verschil is dat cultureel conservatieve libertariërs hun persoonlijke morele overtuigingen scheiden van hun politieke filosofie over staatsmacht.
  Hoewel ze sterk geloven in traditionele waarden zoals familie, religie en deugd, verwerpen ze het gebruik van de dwingende kracht van de wet om deze waarden aan anderen op te leggen. In plaats daarvan bevorderen ze hun waarden door vrijwillige middelen zoals onderwijs, overreding en persoonlijk voorbeeld. Dit staat in contrast met politiek conservatieven die vaak voorstander zijn van het gebruik van overheidsmacht om traditionele sociale regelingen af te dwingen. Het libertarische principe van non-agressie betekent dat ze bepaald gedrag moreel kunnen afkeuren en toch het recht van anderen respecteren om anders te kiezen, zolang die keuzes anderen niet schaden.
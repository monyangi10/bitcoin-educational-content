question: Šta razlikuje kulturnog konzervativca koji je takođe libertarijanac od političkog konzervativca u pogledu sprovođenja tradicionalnih vrednosti?
answer: Oni promovišu tradicionalne vrednosti kroz ubeđivanje i primer, ali se protive korišćenju pravne prinude da ih nametnu drugima.
wrong_answers:
  - Oni podržavaju intervenciju vlade radi zaštite tradicionalnih vrednosti, uz očuvanje ekonomske slobode za pojedince.
  - Veruju da tradicionalne vrednosti treba sprovoditi kroz lokalne zakone, a ne putem saveznog zakonodavstva.
  - Zalažu se za ustavne amandmane kako bi se utemeljile tradicionalne vrednosti, dok se u drugim oblastima ograničava vlada.
explanation: |
  Ključna razlika je u tome što kulturni konzervativni libertarijanci odvajaju svoja lična moralna uverenja od svoje političke filozofije u vezi sa državnom moći. 
  Iako mogu snažno verovati u tradicionalne vrednosti poput porodice, religije i vrline, odbacuju korišćenje prinudne sile zakona za nametanje tih vrednosti drugima. Umesto toga, promovišu svoje vrednosti putem dobrovoljnih sredstava kao što su obrazovanje, ubeđivanje i lični primer. Ovo je u suprotnosti sa političkim konzervativcima koji često podržavaju korišćenje državne moći za sprovođenje tradicionalnih društvenih aranžmana. Libertarijanski princip nenapadanja znači da mogu moralno ne odobravati određena ponašanja, a ipak poštovati pravo drugih da biraju drugačije, sve dok ti izbori ne štete drugima.
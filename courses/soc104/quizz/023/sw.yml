question: Ni nini kinachomtofautisha mhafidhina wa kitamaduni ambaye pia ni mliberali na mhafidhina wa kisiasa kuhusu utekelezaji wa maadili ya kitamaduni?
answer: Wanakuza maadili ya kitamaduni kupitia ushawishi na mfano lakini wanapinga kutumia nguvu za kisheria kuwalazimisha wengine kuyatumia
wrong_answers:
  - Wanaunga mkono uingiliaji kati wa serikali ili kulinda maadili ya kitamaduni huku wakidumisha uhuru wa kiuchumi kwa watu binafsi
  - Wanaamini maadili ya kitamaduni yanapaswa kutekelezwa kupitia sheria za mitaa badala ya sheria za shirikisho
  - Wanatetea marekebisho ya katiba ili kuenzi maadili ya kitamaduni huku wakiweka mipaka kwa serikali katika maeneo mengine.
explanation: |
  Tofauti kuu ni kwamba wanaharakati wa kitamaduni wa kihafidhina hutenganisha imani zao za kimaadili na falsafa yao ya kisiasa kuhusu mamlaka ya serikali.
  
  Ingawa wanaweza kuamini sana maadili ya kitamaduni kama vile familia, dini, na wema, wanakataa kutumia nguvu ya sheria ya kulazimisha kulazimisha maadili haya kwa wengine. Badala yake, wanakuza maadili yao kupitia njia za hiari kama vile elimu, ushawishi, na mfano wa kibinafsi. Hii inatofautiana na wanaharakati wa kisiasa ambao mara nyingi huunga mkono kutumia mamlaka ya serikali kutekeleza mipango ya kijamii ya kitamaduni. Kanuni ya uhuru ya kutofanya uchokozi ina maana kwamba wanaweza kukataa kimaadili tabia fulani huku bado wakiheshimu haki ya wengine ya kuchagua tofauti, mradi tu chaguzi hizo hazidhuru wengine.
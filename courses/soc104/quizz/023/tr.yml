question: Aynı zamanda özgürlükçü olan kültürel bir muhafazakarı, geleneksel değerlerin uygulanması konusunda siyasi bir muhafazakardan ayıran nedir?
answer: İkna ve örnek olma yoluyla geleneksel değerleri teşvik ederler ancak bunları başkalarına empoze etmek için yasal zorlama kullanılmasına karşı çıkarlar
wrong_answers:
  - Bireyler için ekonomik özgürlüğü korurken geleneksel değerleri korumak için devlet müdahalesini destekliyorlar
  - Geleneksel değerlerin federal yasalar yerine yerel yasalar aracılığıyla uygulanması gerektiğine inanıyorlar
  - Hükümeti diğer alanlarda sınırlandırırken geleneksel değerleri koruyacak anayasa değişikliklerini savunuyorlar
explanation: |
  Temel ayrım, kültürel muhafazakar liberterlerin kişisel ahlaki inançlarını devlet gücüne ilişkin siyasi felsefelerinden ayırmalarıdır.
  Aile, din ve erdem gibi geleneksel değerlere güçlü bir şekilde inanıyor olsalar da, bu değerleri başkalarına empoze etmek için hukukun zorlayıcı gücünü kullanmayı reddederler. Bunun yerine, değerlerini eğitim, ikna ve kişisel örneklik gibi gönüllü yollarla teşvik ederler. Bu durum, geleneksel sosyal düzenlemeleri uygulamak için genellikle devlet gücünü kullanmayı destekleyen siyasi muhafazakarlarla tezat oluşturmaktadır. Özgürlükçü saldırmazlık ilkesi, belirli davranışları ahlaki olarak onaylamazken, bu seçimler başkalarına zarar vermediği sürece başkalarının farklı seçim yapma hakkına saygı duyabilecekleri anlamına gelir.
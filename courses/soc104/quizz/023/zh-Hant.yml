question: 在強制執行傳統價值觀方面，兼具自由主義的文化保守派與政治保守派有何差異？
answer: 他們透過說服和樹立榜樣來推廣傳統價值觀，但反對使用法律強制手段將傳統價值觀強加於他人。
wrong_answers:
  - 他們支持政府干預以保護傳統價值，同時維持個人的經濟自由
  - 他們認為傳統價值應該透過地方法律而非聯邦立法來強制執行
  - 他們主張修改憲法，在其他領域限制政府的同時，保護傳統價值觀。
explanation: |
  關鍵的區別在於，文化保守的自由主義者將個人的道德信念與他們對於國家權力的政治理念分開。
  雖然他們可能堅信家庭、宗教和美德等傳統價值，但他們拒絕使用法律的強制力量將這些價值強加於他人。相反地，他們透過教育、說服和個人示範等自願方式來推廣他們的價值觀。這與政治保守派形成對比，政治保守派通常支持使用政府權力來強制執行傳統的社會安排。自由主義者的不侵犯原則意味著他們可以在道德上不認同某些行為，但同時仍尊重他人選擇不同行為的權利，只要這些選擇不會傷害他人。
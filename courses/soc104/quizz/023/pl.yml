question: Co odróżnia kulturowego konserwatystę, który jest również libertarianinem, od politycznego konserwatysty w kwestii egzekwowania tradycyjnych wartości?
answer: Promują tradycyjne wartości poprzez perswazję i przykład, ale sprzeciwiają się stosowaniu przymusu prawnego w celu narzucenia ich innym
wrong_answers:
  - Popierają interwencję rządu w celu ochrony tradycyjnych wartości przy jednoczesnym zachowaniu wolności gospodarczej dla jednostek
  - Uważają, że tradycyjne wartości powinny być egzekwowane za pomocą lokalnych przepisów, a nie ustawodawstwa federalnego
  - Opowiadają się oni za poprawkami do konstytucji, które chroniłyby tradycyjne wartości, jednocześnie ograniczając rząd w innych obszarach
explanation: |
  Kluczowe rozróżnienie polega na tym, że kulturowi konserwatywni libertarianie oddzielają swoje osobiste przekonania moralne od filozofii politycznej dotyczącej władzy państwowej.
  Choć mogą mocno wierzyć w tradycyjne wartości, takie jak rodzina, religia i cnota, odrzucają stosowanie przymusu prawnego w celu narzucenia tych wartości innym. Zamiast tego promują swoje wartości poprzez dobrowolne środki, takie jak edukacja, perswazja i osobisty przykład. Kontrastuje to z politycznymi konserwatystami, którzy często popierają wykorzystywanie władzy rządowej do egzekwowania tradycyjnych ustaleń społecznych. Libertariańska zasada nieagresji oznacza, że libertarianie mogą moralnie nie aprobować pewnych zachowań, jednocześnie szanując prawo innych do dokonywania odmiennych wyborów, o ile wybory te nie szkodzą innym.
question: Vad skiljer en kulturkonservativ som också är libertarian från en politisk konservativ när det gäller upprätthållandet av traditionella värderingar?
answer: De främjar traditionella värderingar genom övertalning och föredöme men motsätter sig att använda juridiskt tvång för att påtvinga andra dem
wrong_answers:
  - De stöder statliga ingripanden för att skydda traditionella värderingar och samtidigt upprätthålla ekonomisk frihet för individer
  - De anser att traditionella värderingar bör upprätthållas genom lokala lagar snarare än genom federal lagstiftning
  - De förespråkar grundlagsändringar för att befästa traditionella värderingar samtidigt som de begränsar regeringen på andra områden
explanation: |
  Den viktigaste skillnaden är att kulturkonservativa libertarianer skiljer sina personliga moraliska övertygelser från sin politiska filosofi när det gäller statsmakten.
  Även om de tror starkt på traditionella värderingar som familj, religion och dygd, avvisar de att använda lagens tvingande kraft för att påtvinga andra dessa värderingar. Istället främjar de sina värderingar genom frivilliga medel som utbildning, övertalning och personliga exempel. Detta står i kontrast till politiskt konservativa som ofta stöder användandet av statlig makt för att genomdriva traditionella sociala arrangemang. Den libertarianska principen om icke-aggression innebär att de kan ta moraliskt avstånd från vissa beteenden samtidigt som de respekterar andras rätt att välja annorlunda, så länge dessa val inte skadar andra.
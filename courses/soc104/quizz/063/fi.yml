question: Mikä on Hannah Arendtin analyysin mukaan totalitaaristen koulutusjärjestelmien ensisijainen tavoite?
answer: Tuhota ihmisten kyky muodostaa itsenäisiä vakaumuksia sen sijaan, että iskostettaisiin tiettyjä uskomuksia
wrong_answers:
  - Kansalaisia indoktrinoidaan hallinnon keskeisten ideologisten periaatteiden ja arvojen mukaisesti
  - Luoda korkeasti koulutettua työvoimaa, joka kykenee edistämään osavaltion taloudellisia tavoitteita
  - Kansallisen yhtenäisyyden edistäminen opettamalla kansalaisia asettamaan yhteiset edut yksilöllisten toiveiden edelle
explanation: |
  Hannah Arendt väitti, että totalitaarisen kasvatuksen tarkoituksena ei ole koskaan ollut vakaumuksen opettaminen, vaan sen tarkoituksena on tuhota kyky muodostaa itsenäisiä vakaumuksia.
  Tämä erottaa totalitaariset järjestelmät pelkistä autoritaarisista järjestelmistä, jotka vain tyrkyttävät ideologiaansa. Poistamalla ihmisten kyvyn ajatella itsenäisesti totalitaariset järjestelmät tekevät kansalaisista kyvyttömiä itsenäiseen toimintaan, minkä Arendt näki itse politiikan negaationa.
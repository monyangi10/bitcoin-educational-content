question: Kulingana na uchambuzi wa Hannah Arendt, lengo kuu la mifumo ya elimu ya kidikteta ni lipi?
answer: Kuharibu uwezo wa watu kuunda imani huru badala ya kuingiza imani maalum
wrong_answers:
  - Kuwafundisha raia kanuni na maadili ya msingi ya kiitikadi ya utawala
  - Kuunda nguvu kazi yenye elimu ya juu inayoweza kuendeleza malengo ya kiuchumi ya jimbo
  - Kukuza umoja wa kitaifa kwa kuwafundisha raia kutanguliza maslahi ya pamoja kuliko matamanio ya mtu binafsi
explanation: |
  Hannah Arendt alisema kwamba lengo la elimu ya kidikteta halikuwa kamwe kufundisha imani bali kuharibu kitivo cha kuunda imani yoyote huru.
  Hii inatofautisha mifumo ya kidikteta na tawala za kidikteta tu zinazolazimisha itikadi zao. Kwa kuondoa uwezo wa watu wa kufikiri kwa kujitegemea, tawala za kidikteta huwafanya raia washindwe kutenda kwa uhuru, jambo ambalo Arendt aliliona kama kukataa siasa yenyewe.
question: De acordo com a análise de Hannah Arendt, qual é o principal objetivo dos sistemas educativos totalitários?
answer: Destruir a capacidade das pessoas de formarem convicções independentes em vez de lhes incutir crenças específicas
wrong_answers:
  - Doutrinar os cidadãos com os princípios e valores ideológicos fundamentais do regime
  - Criar uma força de trabalho altamente qualificada capaz de fazer avançar os objectivos económicos do Estado
  - Promover a unidade nacional, ensinando os cidadãos a dar prioridade aos interesses colectivos sobre os desejos individuais
explanation: |
  Hannah Arendt argumentou que o objetivo da educação totalitária nunca foi incutir convicções, mas sim destruir a faculdade de formar convicções independentes.
  Este facto distingue os sistemas totalitários dos meros regimes autoritários que se limitam a impor a sua ideologia. Ao eliminarem a capacidade das pessoas para pensarem de forma independente, os regimes totalitários tornam os cidadãos incapazes de agir autonomamente, o que Arendt via como a negação da própria política.
question: Enligt Hannah Arendts analys, vad är det primära målet med totalitära utbildningssystem?
answer: Att förstöra människors förmåga att bilda självständiga övertygelser snarare än att inpränta specifika trosuppfattningar
wrong_answers:
  - Att indoktrinera medborgarna med regimens grundläggande ideologiska principer och värderingar
  - Att skapa en högutbildad arbetskraft som kan främja delstatens ekonomiska mål
  - Att främja nationell enighet genom att lära medborgarna att prioritera kollektiva intressen framför individuella önskningar
explanation: |
  Hannah Arendt hävdade att syftet med totalitär utbildning aldrig var att ingjuta övertygelser utan att förstöra förmågan att bilda några självständiga sådana.
  Detta skiljer totalitära system från enbart auktoritära regimer som bara påtvingar sin ideologi. Genom att eliminera människors förmåga att tänka självständigt gör totalitära regimer medborgarna oförmögna att agera självständigt, vilket Arendt såg som en negation av själva politiken.
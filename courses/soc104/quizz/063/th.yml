question: ตามการวิเคราะห์ของ Hannah Arendt เป้าหมายหลักของระบบการศึกษาแบบเผด็จการคืออะไร?
answer: เพื่อทำลายความสามารถของผู้คนในการสร้างความเชื่อมั่นที่เป็นอิสระแทนที่จะปลูกฝังความเชื่อเฉพาะเจาะจง
wrong_answers:
  - เพื่อปลูกฝังหลักการและค่านิยมทางอุดมการณ์หลักของระบอบการปกครองให้แก่พลเมือง
  - เพื่อสร้างแรงงานที่มีการศึกษาสูงซึ่งสามารถส่งเสริมวัตถุประสงค์ทางเศรษฐกิจของรัฐ
  - เพื่อส่งเสริมความสามัคคีของชาติด้วยการสอนให้ประชาชนให้ความสำคัญกับผลประโยชน์ส่วนรวมเหนือความต้องการส่วนบุคคล
explanation: |
  ฮันนาห์ อาเรนดท์ โต้แย้งว่า จุดประสงค์ของการศึกษาภายใต้ระบอบเผด็จการเบ็ดเสร็จไม่เคยเป็นการปลูกฝังความเชื่อมั่น แต่เป็นการทำลายความสามารถในการสร้างความเชื่อมั่นที่เป็นอิสระใดๆ สิ่งนี้ทำให้ระบบเผด็จการเบ็ดเสร็จแตกต่างจากระบอบเผด็จการทั่วไปที่เพียงแค่บังคับใช้ลัทธิของตน โดยการกำจัดความสามารถในการคิดอย่างอิสระของประชาชน ระบอบเผด็จการเบ็ดเสร็จทำให้พลเมืองไม่สามารถกระทำการอย่างอิสระได้ ซึ่งอาเรนดท์มองว่าเป็นการปฏิเสธการเมืองโดยตัวมันเอง
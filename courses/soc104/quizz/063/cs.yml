question: Co je podle analýzy Hannah Arendtové hlavním cílem totalitních vzdělávacích systémů?
answer: Ničit schopnost lidí vytvářet si nezávislé přesvědčení, a ne jim vštěpovat konkrétní názory
wrong_answers:
  - Indoktrinovat občany základními ideologickými zásadami a hodnotami režimu
  - Vytvořit vysoce vzdělanou pracovní sílu, která bude schopna podporovat ekonomické cíle státu
  - Podporovat národní jednotu tím, že naučíme občany upřednostňovat kolektivní zájmy před individuálními přáními
explanation: |
  Hannah Arendtová tvrdila, že cílem totalitní výchovy nikdy nebylo vštípit přesvědčení, ale zničit schopnost vytvářet si nezávislé přesvědčení.
  Tím se totalitní systémy liší od pouhých autoritářských režimů, které pouze vnucují svou ideologii. Tím, že totalitní režimy eliminují schopnost lidí samostatně myslet, činí občany neschopnými autonomního jednání, což Arendtová považovala za negaci politiky jako takové.
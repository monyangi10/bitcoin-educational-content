question: Jaki jest główny cel totalitarnych systemów edukacyjnych według analizy Hannah Arendt?
answer: Zniszczyć zdolność ludzi do kształtowania niezależnych przekonań, zamiast wpajać im konkretne wierzenia
wrong_answers:
  - Indoktrynowanie obywateli podstawowymi zasadami i wartościami ideologicznymi reżimu
  - Stworzenie wysoko wykształconej siły roboczej zdolnej do realizacji celów gospodarczych państwa
  - Promowanie jedności narodowej poprzez uczenie obywateli przedkładania zbiorowych interesów nad indywidualne pragnienia
explanation: |
  Hannah Arendt argumentowała, że celem edukacji totalitarnej nigdy nie było wpajanie przekonań, ale niszczenie zdolności do tworzenia jakichkolwiek niezależnych przekonań.
  To odróżnia systemy totalitarne od zwykłych reżimów autorytarnych, które po prostu narzucają swoją ideologię. Eliminując zdolność ludzi do niezależnego myślenia, reżimy totalitarne czynią obywateli niezdolnymi do autonomicznego działania, co Arendt postrzegała jako zaprzeczenie samej polityki.
question: Согласно анализу Ханны Арендт, какова основная цель тоталитарных систем образования?
answer: Разрушить способность людей формировать независимые убеждения, а не прививать конкретные верования
wrong_answers:
  - Индоктринация граждан в соответствии с основными идеологическими принципами и ценностями режима
  - Создать высокообразованную рабочую силу, способную продвигать экономические цели штата
  - Содействие национальному единству путем обучения граждан приоритету коллективных интересов над индивидуальными желаниями
explanation: |
  Ханна Арендт утверждала, что цель тоталитарного воспитания - не привить убеждения, а уничтожить способность к формированию независимых убеждений.
  Это отличает тоталитарные системы от простых авторитарных режимов, которые просто навязывают свою идеологию. Лишая людей способности мыслить самостоятельно, тоталитарные режимы делают граждан неспособными к автономным действиям, что Арендт рассматривала как отрицание политики как таковой.
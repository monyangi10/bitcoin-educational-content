question: Was ist nach Hannah Arendts Analyse das Hauptziel totalitärer Bildungssysteme?
answer: Die Fähigkeit der Menschen zu zerstören, sich unabhängige Überzeugungen zu bilden, anstatt ihnen bestimmte Überzeugungen einzuimpfen
wrong_answers:
  - Indoktrinierung der Bürger mit den wichtigsten ideologischen Grundsätzen und Werten des Regimes
  - Schaffung hochqualifizierter Arbeitskräfte, die in der Lage sind, die wirtschaftlichen Ziele des Staates voranzutreiben
  - Förderung der nationalen Einheit, indem den Bürgern beigebracht wird, den kollektiven Interessen Vorrang vor individuellen Wünschen zu geben
explanation: |
  Hannah Arendt vertrat die Ansicht, dass die totalitäre Erziehung niemals darauf abzielt, Überzeugungen zu vermitteln, sondern die Fähigkeit zur Bildung unabhängiger Überzeugungen zu zerstören.
  Dies unterscheidet totalitäre Systeme von einfachen autoritären Regimen, die lediglich ihre Ideologie aufzwingen. Indem totalitäre Regime die Fähigkeit der Menschen, unabhängig zu denken, ausschalten, machen sie die Bürger unfähig zu autonomem Handeln, was Arendt als die Negation der Politik selbst ansah.
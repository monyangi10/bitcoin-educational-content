question: Каква е основната цел на тоталитарните образователни системи според анализа на Хана Арендт?
answer: Да се унищожи способността на хората да формират независими убеждения, вместо да се внушават конкретни вярвания
wrong_answers:
  - Да индоктринира гражданите с основните идеологически принципи и ценности на режима
  - Създаване на високообразована работна сила, способна да постига икономическите цели на щата
  - Насърчаване на националното единство чрез обучение на гражданите да дават приоритет на колективните интереси пред индивидуалните желания
explanation: |
  Хана Аренд твърди, че целта на тоталитарното възпитание никога не е била да внуши убеждения, а да унищожи способността за формиране на независими убеждения.
  Това отличава тоталитарните системи от обикновените авторитарни режими, които просто налагат своята идеология. Премахвайки способността на хората да мислят самостоятелно, тоталитарните режими правят гражданите неспособни на автономни действия, което според Арендт е отрицание на самата политика.
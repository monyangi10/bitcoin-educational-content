question: Wat is volgens de analyse van Hannah Arendt het hoofddoel van totalitaire onderwijssystemen?
answer: Het vermogen van mensen om onafhankelijke overtuigingen te vormen vernietigen in plaats van specifieke overtuigingen bij te brengen
wrong_answers:
  - Burgers indoctrineren met de ideologische kernprincipes en -waarden van het regime
  - Een hoog opgeleide beroepsbevolking creëren die de economische doelstellingen van de staat kan bevorderen
  - Nationale eenheid bevorderen door burgers te leren collectieve belangen boven individuele wensen te stellen
explanation: |
  Hannah Arendt stelde dat het doel van totalitaire opvoeding nooit het bijbrengen van overtuigingen was, maar het vernietigen van het vermogen om onafhankelijke overtuigingen te vormen.
  Dit onderscheidt totalitaire systemen van louter autoritaire regimes die simpelweg hun ideologie opleggen. Door het vermogen van mensen om onafhankelijk te denken uit te schakelen, maken totalitaire regimes burgers onbekwaam tot autonome actie, wat Arendt zag als de ontkenning van de politiek zelf.
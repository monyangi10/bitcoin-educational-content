question: 根据汉娜-阿伦特的分析，极权主义教育制度的主要目标是什么？
answer: 摧毁人们形成独立信念的能力，而不是灌输特定的信仰
wrong_answers:
  - 向公民灌输政权的核心意识形态原则和价值观
  - 培养一支受过良好教育的劳动力队伍，使其有能力推进本州的经济目标
  - 通过教育公民将集体利益置于个人欲望之上，促进民族团结
explanation: |
  汉娜-阿伦特认为，极权主义教育的目的从来不是灌输信念，而是摧毁形成任何独立信念的能力。
  这一点使极权主义制度有别于单纯强加意识形态的独裁政权。通过消除人们独立思考的能力，极权主义政权使公民无法采取自主行动，阿伦特认为这是对政治本身的否定。
question: ハンナ・アーレントの分析によれば、全体主義的教育システムの第一の目標は何か？
answer: 特定の信念を植え付けるのではなく、独立した信念を形成する能力を破壊すること。
wrong_answers:
  - 政権の核となるイデオロギーの原則と価値観を国民に教え込む。
  - 州の経済目標を推進できる高度な教育を受けた労働力を創出する。
  - 個人の欲望よりも集団の利益を優先するよう国民に教え、国民統合を促進する。
explanation: |
  ハンナ・アーレントは、全体主義教育の目的は決して信念を植え付けることではなく、独立した信念を形成する能力を破壊することだと主張した。
  このことが、全体主義体制を、単にイデオロギーを押し付けるだけの権威主義体制とは区別している。人々の主体的な思考能力を排除することで、全体主義体制は市民を自律的な行動不能に陥れる。
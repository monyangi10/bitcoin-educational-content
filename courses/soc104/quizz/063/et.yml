question: Mis on Hannah Arendti analüüsi kohaselt totalitaarsete haridussüsteemide peamine eesmärk?
answer: Hävitada inimeste võimet kujundada iseseisvaid veendumusi, mitte sisendada konkreetseid uskumusi
wrong_answers:
  - Kodanike indoktrineerimine režiimi põhiliste ideoloogiliste põhimõtete ja väärtustega
  - Luua kõrgelt haritud tööjõud, kes on võimeline edendama riigi majanduslikke eesmärke
  - Edendada rahvuslikku ühtsust, õpetades kodanikke seadma kollektiivsed huvid individuaalsete soovide asemel esikohale
explanation: |
  Hannah Arendt väitis, et totalitaarse kasvatuse eesmärk ei olnud kunagi veendumuste juurutamine, vaid iseseisva veendumuse kujundamise võime hävitamine.
  See eristab totalitaarsed süsteemid pelgalt autoritaarsetest režiimidest, mis lihtsalt suruvad oma ideoloogiat peale. Likvideerides inimeste võime iseseisvalt mõelda, muudavad totalitaarsed režiimid kodanikud võimetuks iseseisvaks tegevuseks, mida Arendt nägi poliitika enda eitamisena.
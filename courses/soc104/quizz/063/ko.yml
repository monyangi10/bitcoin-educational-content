question: 한나 아렌트의 분석에 따르면 전체주의 교육 시스템의 주요 목표는 무엇일까요?
answer: 특정 신념을 주입하기보다는 독립적인 신념을 형성할 수 있는 사람들의 능력을 파괴합니다
wrong_answers:
  - 시민들에게 정권의 핵심 이념 원칙과 가치를 세뇌시키기 위해
  - 국가의 경제 목표를 발전시킬 수 있는 고도로 교육받은 인력을 양성하기 위해
  - 시민들에게 개인의 욕구보다 집단의 이익을 우선시하도록 교육하여 국가 통합을 촉진합니다
explanation: |
  한나 아렌트는 전체주의 교육의 목적은 신념을 주입하는 것이 아니라 독립적인 신념을 형성할 수 있는 능력을 파괴하는 데 있다고 주장했습니다.
  이는 전체주의 체제가 단순히 이데올로기를 강요하는 단순한 권위주의 정권과 구별되는 점입니다. 전체주의 체제는 사람들의 독립적인 사고 능력을 제거함으로써 시민들이 자율적인 행동을 할 수 없게 만들며, 아렌트는 이를 정치 자체의 부정으로 간주했습니다.
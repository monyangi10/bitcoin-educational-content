question: हन्ना एरेंड्ट के विश्लेषण के अनुसार, अधिनायकवादी शिक्षा प्रणालियों का प्राथमिक लक्ष्य क्या है?
answer: लोगों में विशिष्ट विश्वास पैदा करने के बजाय, स्वतंत्र रूप से अपनी राय बनाने की उनकी क्षमता को नष्ट करना।
wrong_answers:
  - नागरिकों को शासन के मूल वैचारिक सिद्धांतों और मूल्यों से अवगत कराना।
  - राज्य के आर्थिक उद्देश्यों को आगे बढ़ाने में सक्षम उच्च शिक्षित कार्यबल का निर्माण करना।
  - नागरिकों को व्यक्तिगत इच्छाओं के बजाय सामूहिक हितों को प्राथमिकता देना सिखाकर राष्ट्रीय एकता को बढ़ावा देना।
explanation: |
  हन्ना एरेंड्ट का तर्क था कि अधिनायकवादी शिक्षा का उद्देश्य कभी भी दृढ़ विश्वास पैदा करना नहीं था, बल्कि स्वतंत्र विश्वास बनाने की क्षमता को नष्ट करना था।
  यह अधिनायकवादी प्रणालियों को उन सत्तावादी शासन प्रणालियों से अलग करता है जो केवल अपनी विचारधारा थोपती हैं। लोगों की स्वतंत्र रूप से सोचने की क्षमता को समाप्त करके, अधिनायकवादी शासन प्रणालियाँ नागरिकों को स्वायत्त कार्रवाई करने में असमर्थ बना देती हैं, जिसे एरेंड्ट राजनीति का ही खंडन मानती थीं।
question: Menurut analisis Hannah Arendt, apa tujuan utama dari sistem pendidikan totaliter?
answer: Menghancurkan kapasitas orang untuk membentuk keyakinan independen daripada menanamkan keyakinan tertentu
wrong_answers:
  - Untuk mengindoktrinasi warga negara dengan prinsip-prinsip dan nilai-nilai ideologi inti rezim
  - Menciptakan tenaga kerja berpendidikan tinggi yang mampu memajukan tujuan ekonomi negara
  - Mempromosikan persatuan nasional dengan mengajarkan warga negara untuk memprioritaskan kepentingan bersama di atas keinginan individu
explanation: |
  Hannah Arendt berpendapat bahwa tujuan pendidikan totaliter bukanlah untuk menanamkan keyakinan, melainkan untuk menghancurkan kemampuan untuk membentuk keyakinan yang independen.
  Hal ini membedakan sistem totaliter dengan rezim otoriter yang hanya memaksakan ideologi mereka. Dengan menghilangkan kemampuan orang untuk berpikir secara independen, rezim totaliter membuat warga negara tidak mampu bertindak secara otonom, yang menurut Arendt merupakan negasi dari politik itu sendiri.
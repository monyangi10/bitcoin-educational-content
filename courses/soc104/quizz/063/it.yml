question: Secondo l'analisi di Hannah Arendt, qual è l'obiettivo principale dei sistemi educativi totalitari?
answer: Distruggere la capacità delle persone di formarsi convinzioni indipendenti piuttosto che inculcare credenze specifiche
wrong_answers:
  - Indottrinare i cittadini con i principi e i valori ideologici fondamentali del regime
  - Creare una forza lavoro altamente istruita in grado di promuovere gli obiettivi economici dello Stato
  - Promuovere l'unità nazionale insegnando ai cittadini a dare priorità agli interessi collettivi rispetto ai desideri individuali
explanation: |
  Hannah Arendt sosteneva che lo scopo dell'educazione totalitaria non è mai quello di instillare convinzioni, ma di distruggere la facoltà di formarne di indipendenti.
  Questo distingue i sistemi totalitari dai semplici regimi autoritari che si limitano a imporre la loro ideologia. Eliminando la capacità di pensare in modo indipendente, i regimi totalitari rendono i cittadini incapaci di agire in modo autonomo, cosa che Arendt vedeva come la negazione della politica stessa.
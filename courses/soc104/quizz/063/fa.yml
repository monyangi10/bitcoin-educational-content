question: بر اساس تحلیل هانا آرنت، هدف اصلی سیستم‌های آموزشی توتالیتر چیست؟
answer: برای از بین بردن توانایی مردم در شکل‌گیری اعتقادات مستقل به جای القای باورهای خاص
wrong_answers:
  - برای تلقین اصول و ارزش‌های ایدئولوژیک اصلی رژیم به شهروندان
  - برای ایجاد نیروی کار بسیار تحصیل‌کرده‌ای که قادر به پیشبرد اهداف اقتصادی ایالت باشد
  - برای ترویج وحدت ملی با آموزش به شهروندان برای اولویت دادن به منافع جمعی بر خواسته‌های فردی
explanation: |
  هانا آرنت استدلال کرد که هدف آموزش توتالیتر هرگز القای اعتقادات نبود، بلکه نابودی توانایی شکل‌گیری اعتقادات مستقل بود.  
  این امر سیستم‌های توتالیتر را از رژیم‌های صرفاً استبدادی که به سادگی ایدئولوژی خود را تحمیل می‌کنند، متمایز می‌کند. با از بین بردن توانایی تفکر مستقل مردم، رژیم‌های توتالیتر شهروندان را از اقدام خودمختار ناتوان می‌سازند، که آرنت آن را نفی سیاست به خودی خود می‌دانست.
question: Theo phân tích của Hannah Arendt, mục tiêu chính của các hệ thống giáo dục toàn trị là gì?
answer: Mục đích là phá hủy khả năng hình thành niềm tin độc lập của con người thay vì gieo rắc những niềm tin cụ thể.
wrong_answers:
  - Nhằm truyền bá cho người dân những nguyên tắc và giá trị tư tưởng cốt lõi của chế độ.
  - Nhằm tạo ra một lực lượng lao động có trình độ học vấn cao, có khả năng thúc đẩy các mục tiêu kinh tế của tiểu bang.
  - Thúc đẩy sự đoàn kết dân tộc bằng cách giáo dục công dân ưu tiên lợi ích tập thể hơn nguyện vọng cá nhân.
explanation: |
  Hannah Arendt lập luận rằng mục đích của nền giáo dục toàn trị không bao giờ là gieo rắc niềm tin mà là phá hủy khả năng hình thành bất kỳ niềm tin độc lập nào.
  Điều này phân biệt các hệ thống toàn trị với các chế độ độc tài đơn thuần chỉ áp đặt hệ tư tưởng của chúng. Bằng cách loại bỏ khả năng tư duy độc lập của người dân, các chế độ toàn trị khiến công dân không có khả năng hành động tự chủ, điều mà Arendt coi là sự phủ nhận chính trị.
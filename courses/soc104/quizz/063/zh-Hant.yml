question: 根據 Hannah Arendt 的分析，極權教育制度的主要目標是什麼？
answer: 摧毀人們形成獨立信念的能力，而不是灌輸特定的信念
wrong_answers:
  - 向公民灌輸政權的核心意識形態原則和價值觀
  - 建立一支受過高等教育的勞動力，能夠推動本州的經濟目標
  - 教導公民將集體利益置於個人欲望之上，以促進國家團結
explanation: |
  Hannah Arendt認為極權教育的目的絕非灌輸信念，而是摧毀形成任何獨立信念的能力。
  這讓極權體制有別於只是強加其意識形態的專制政體。透過消除人們獨立思考的能力，極權政體使公民無法自主行動，阿倫特認為這是對政治本身的否定。
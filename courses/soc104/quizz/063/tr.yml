question: Hannah Arendt'in analizine göre, totaliter eğitim sistemlerinin temel amacı nedir?
answer: Belirli inançları aşılamak yerine insanların bağımsız kanaatler oluşturma kapasitesini yok etmek
wrong_answers:
  - Vatandaşlara rejimin temel ideolojik ilke ve değerlerini aşılamak
  - Eyaletin ekonomik hedeflerini ilerletebilecek yüksek eğitimli bir işgücü oluşturmak
  - Vatandaşlara bireysel arzular yerine kolektif çıkarlara öncelik vermeyi öğreterek ulusal birliği teşvik etmek
explanation: |
  Hannah Arendt, totaliter eğitimin amacının asla inanç aşılamak değil, bağımsız inanç oluşturma yetisini yok etmek olduğunu savunmuştur.
  Bu, totaliter sistemleri sadece kendi ideolojilerini dayatan otoriter rejimlerden ayırır. Totaliter rejimler, insanların bağımsız düşünme yetisini ortadan kaldırarak vatandaşları özerk eylemde bulunamaz hale getirir ki Arendt bunu siyasetin kendisinin olumsuzlanması olarak görür.
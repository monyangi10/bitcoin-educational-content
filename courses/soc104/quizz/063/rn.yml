question: Dukurikije icegeranyo ca Hannah Arendt, ni iyihe ntumbero nyamukuru y’uburezi bw’ubutegetsi bw’agahomerabunwa?
answer: Gusenyura ubushobozi bw’abantu bwo gushinga imyizere yigenga aho kwigisha imyizere yihariye
wrong_answers:
  - Kwigisha abanyagihugu ingingo ngenderwako n'agaciro nyamukuru vy'ingengabitekerezo y'intwaro
  - Gushinga abakozi bize cane bashobora guteza imbere intumbero za Leta mu vy’ubutunzi .
  - Guteza imbere ubumwe bw'igihugu mu kwigisha abanyagihugu gushira imbere inyungu rusangi kuruta ivyipfuzo vy'umuntu ku giti ciwe .
explanation: |
  Hannah Arendt yavuze yuko intumbero y’inyigisho y’ubutegetsi bw’agahomerabunwa ata na rimwe yari iyo gutuma abantu bemera ibintu, ahubwo ko ari iyo gusenyura ubushobozi bwo gushinga inyigisho iyo ari yo yose yigenga. 
  Ivyo bitandukanya intwaro z’ubutegetsi bw’agahomerabunwa n’intwaro z’ubutegetsi bw’agahomerabunwa gusa zitegeka gusa ingengabitekerezo zazo. Mu gukuraho ubushobozi bw’abantu bwo kwiyumvira bigenjeje neza, intwaro z’ubutegetsi bw’agahomerabunwa zituma abanyagihugu badashobora kwikorera, ivyo Arendt yabona ko ari uguhakana politike ubwayo.
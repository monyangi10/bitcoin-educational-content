question: Según el análisis de Hannah Arendt, ¿cuál es el principal objetivo de los sistemas educativos totalitarios?
answer: Destruir la capacidad de las personas para formarse convicciones independientes en lugar de inculcarles creencias específicas
wrong_answers:
  - Adoctrinar a los ciudadanos con los principios y valores ideológicos fundamentales del régimen
  - Crear una mano de obra altamente cualificada capaz de impulsar los objetivos económicos del Estado
  - Promover la unidad nacional enseñando a los ciudadanos a dar prioridad a los intereses colectivos sobre los deseos individuales
explanation: |
  Hannah Arendt sostenía que el propósito de la educación totalitaria nunca fue inculcar convicciones, sino destruir la facultad de formarse convicciones independientes.
  Esto distingue a los sistemas totalitarios de los meros regímenes autoritarios que se limitan a imponer su ideología. Al eliminar la capacidad de las personas para pensar de forma independiente, los regímenes totalitarios incapacitan a los ciudadanos para la acción autónoma, lo que Arendt consideraba la negación de la propia política.
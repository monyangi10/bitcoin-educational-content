question: Hva er det primære målet med totalitære utdanningssystemer, ifølge Hannah Arendts analyse?
answer: Å ødelegge folks evne til å danne seg selvstendige overbevisninger i stedet for å innprente spesifikke overbevisninger
wrong_answers:
  - Å indoktrinere innbyggerne med regimets ideologiske kjerneprinsipper og verdier
  - Å skape en høyt utdannet arbeidsstyrke som er i stand til å fremme statens økonomiske mål
  - Å fremme nasjonalt samhold ved å lære innbyggerne å prioritere kollektive interesser fremfor individuelle ønsker
explanation: |
  Hannah Arendt hevdet at formålet med totalitær oppdragelse aldri var å innpode overbevisninger, men å ødelegge evnen til å danne seg selvstendige overbevisninger.
  Dette skiller totalitære systemer fra rene autoritære regimer som bare påtvinges sin ideologi. Ved å eliminere folks evne til å tenke selvstendig, gjør totalitære regimer borgerne ute av stand til å handle selvstendig, noe Arendt så som negasjonen av selve politikken.
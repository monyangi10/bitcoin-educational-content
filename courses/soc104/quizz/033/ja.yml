question: 経済組織に関して、リバタリアンとリバテールの根本的な違いは何ですか？
answer: リバタリアンは私有財産と自由市場を擁護し、リバテイアは資本主義に反対し、集団経済形態を推進する
wrong_answers:
  - リバタリアンは経済への国家介入を支持するが、リベラリストは完全な経済規制緩和を支持する
  - リバタリアンは生産手段の集団所有を主張し、リバテールは個人の財産権を擁護する。
  - 自由主義者はあらゆる形態の商業に反対し、自由主義者は無制限の資本主義市場を支持する
explanation: |
  この文章は、リバタリアンが私有財産は個人の自由にとって不可欠であると考え、契約上の自由を支持する一方で
  リバタリアン（無政府主義者）は「財産は窃盗である」と考え、資本主義に反対し、相互主義、集団主義、リバタリアン的共産主義などの代替経済組織を支持する。これは、似たような用語のためにしばしば混同されるこの2つの政治哲学の間の核心的なイデオロギー的分裂を表している。
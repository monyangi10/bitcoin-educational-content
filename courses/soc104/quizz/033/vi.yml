question: Sự khác biệt cơ bản giữa những người theo chủ nghĩa tự do và những người theo chủ nghĩa tự do cực đoan về tổ chức kinh tế là gì?
answer: Những người theo chủ nghĩa tự do bảo vệ quyền sở hữu tư nhân và thị trường tự do, trong khi những người theo chủ nghĩa tự do cực đoan phản đối chủ nghĩa tư bản và thúc đẩy các hình thức kinh tế tập thể.
wrong_answers:
  - Những người theo chủ nghĩa tự do ủng hộ sự can thiệp của nhà nước vào nền kinh tế, trong khi những người theo chủ nghĩa tự do cực đoan lại ủng hộ việc bãi bỏ hoàn toàn các quy định kinh tế.
  - Những người theo chủ nghĩa tự do ủng hộ quyền sở hữu tập thể các phương tiện sản xuất, trong khi những người theo chủ nghĩa tự do cá nhân bảo vệ quyền sở hữu cá nhân.
  - Những người theo chủ nghĩa tự do phản đối mọi hình thức thương mại, trong khi những người theo chủ nghĩa tự do ủng hộ thị trường tư bản không bị hạn chế.
explanation: |
  Văn bản này nêu rõ rằng những người theo chủ nghĩa tự do tin rằng quyền sở hữu tư nhân là thiết yếu cho tự do cá nhân và ủng hộ tự do hợp đồng, trong khi những người theo chủ nghĩa vô chính phủ (libertaire) coi "tài sản là trộm cắp" và phản đối chủ nghĩa tư bản, ủng hộ các tổ chức kinh tế thay thế như chủ nghĩa tương trợ, chủ nghĩa tập thể hoặc chủ nghĩa cộng sản tự do. Điều này thể hiện sự khác biệt về tư tưởng cốt lõi giữa hai triết lý chính trị này, thường bị nhầm lẫn do thuật ngữ tương tự.
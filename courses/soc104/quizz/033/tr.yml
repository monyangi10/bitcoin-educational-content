question: Liberteryenler ve liberteryenler arasında ekonomik örgütlenmeye ilişkin temel fark nedir?
answer: Liberteryenler özel mülkiyeti ve serbest piyasayı savunurken, liberteryenler kapitalizme karşı çıkar ve kolektif ekonomik formları destekler
wrong_answers:
  - Liberteryenler devletin ekonomiye müdahalesini desteklerken, liberaller ekonominin tamamen serbestleştirilmesinden yanadır
  - Liberteryenler üretim araçlarının kolektif mülkiyetini savunurken, liberaller bireysel mülkiyet haklarını savunurlar
  - Liberteryenler her türlü ticarete karşı çıkarken, liberaller sınırsız kapitalist piyasaları desteklemektedir
explanation: |
  Metin, liberteryenlerin özel mülkiyetin bireysel özgürlük için gerekli olduğuna inandıklarını ve sözleşme özgürlüğünü desteklediklerini açıkça ortaya koyarken
  libertaires (anarşistler) 'mülkiyetin hırsızlık' olduğunu düşünür ve kapitalizme karşı çıkarak mutualizm, kolektivizm veya liberter komünizm gibi alternatif ekonomik örgütlenmeleri tercih ederler. Bu, benzer terminoloji nedeniyle sıklıkla karıştırılan bu iki siyasi felsefe arasındaki temel ideolojik ayrımı temsil eder.
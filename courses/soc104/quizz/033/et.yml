question: Milline on põhimõtteline erinevus libertaarlaste ja libertaarlaste vahel seoses majanduskorraldusega?
answer: Libertaarid kaitsevad eraomandit ja vaba turgu, libertaarid on kapitalismi vastu ja propageerivad kollektiivseid majandusvorme
wrong_answers:
  - Libertaarid toetavad riigi sekkumist majandusse, samas kui libertaarid pooldavad majanduse täielikku dereguleerimist
  - Libertaarid pooldavad tootmisvahendite kollektiivset omandiõigust, libertaarid aga kaitsevad individuaalset omandiõigust
  - Libertaarid on igasuguse kaubanduse vastu, libertaarid aga toetavad piiramatuid kapitalistlikke turge
explanation: |
  Tekstist selgub selgelt, et libertaarid usuvad, et eraomand on üksikisiku vabaduse jaoks oluline ja toetavad lepingulist vabadust, samas kui
  libertaarid (anarhistid) leiavad, et "omand on vargus" ja on kapitalismi vastu, eelistades alternatiivseid majandusorganisatsioone nagu mutualism, kollektivism või libertaarne kommunism. See kujutab endast põhilist ideoloogilist lõhet nende kahe poliitilise filosoofia vahel, mida sageli segi aetakse sarnase terminoloogia tõttu.
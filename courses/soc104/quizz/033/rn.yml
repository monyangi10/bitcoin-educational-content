question: Ni itandukaniro irihe ry’ishimikiro riri hagati y’abaharanira umwidegemvyo n’abaharanira umwidegemvyo ku bijanye n’imitunganirize y’ubutunzi?
answer: Abaharanira umwidegemvyo barwanira umutungo w’abantu ku giti cabo n’amasoko yigenga, mu gihe abaharanira umwidegemvyo barwanya ubu kapitalizimu kandi bagateza imbere uburyo bw’ubutunzi rusangi .
wrong_answers:
  - Abaharanira umwidegemvyo bashigikiye ko Leta yinjira mu bukungu, mu gihe abaharanira umwidegemvyo bashigikiye ko ubutunzi buvaho burundu
  - Abaharanira umwidegemvyo bavuganira ko abantu bose boba abafise uburyo bwo gukora, mu gihe abaharanira umwidegemvyo barwanira uburenganzira bw’umuntu ku giti ciwe
  - Abaharanira umwidegemvyo barwanya ubwoko bwose bw’ubudandaji, mu gihe abaharanira umwidegemvyo bashigikira amasoko y’abanyagihugu ataco abujijwe .
explanation: |
  Ico canditswe gishingira intahe neza ko abaharanira umwidegemvyo bemera ko umutungo w’umuntu ku giti ciwe ari ngirakamaro kugira ngo umuntu agire umwidegemvyo kandi bagashigikira umwidegemvyo w’amasezerano, mu gihe .
  aba libertaires (abanyagitugu) babona ko ‘itunga ari ubusuma’ kandi barwanya ubu kapitalizimu, bagashigikira ubundi buryo bw’imiryango y’ubutunzi nk’ubumwe, ubumwe, canke ubukomunisimu bw’ubwigenge. Ivyo bigereranya amacakubiri nyamukuru y’ingengabitekerezo hagati y’izo filozofiya zibiri za politike zikunda gutera urujijo kubera amajambo asa.
question: Kuna tofauti gani ya msingi kati ya wanaliberali na wanaliberali kuhusu upangaji wa kiuchumi?
answer: Wanaliberali hutetea mali binafsi na masoko huria, huku wanaliberali wakipinga ubepari na kukuza aina za uchumi wa pamoja
wrong_answers:
  - Wanaharakati wa uhuru wanaunga mkono uingiliaji kati wa serikali katika uchumi, huku wanaharakati wa uhuru wakipendelea kuondolewa kabisa kwa udhibiti wa kiuchumi
  - Wanaharakati wa uhuru wanatetea umiliki wa pamoja wa njia za uzalishaji, huku wanaharakati wa uhuru wakitetea haki za mali za mtu binafsi
  - Wanaliberali wanapinga aina zote za biashara, huku wanaliberali wakiunga mkono masoko ya kibepari yasiyo na vikwazo
explanation: |
  Maandishi yanaweka wazi kwamba wanaharakati wanaamini mali binafsi ni muhimu kwa uhuru wa mtu binafsi na wanaunga mkono uhuru wa kimkataba, huku wanaharakati wa uhuru wakichukulia 'mali ni wizi' na wanapinga ubepari, wakipendelea mashirika mbadala ya kiuchumi kama vile kuheshimiana, ujumuishaji, au ukomunisti wa uhuru. Hii inawakilisha mgawanyiko mkuu wa kiitikadi kati ya falsafa hizi mbili za kisiasa ambazo mara nyingi huchanganyikiwa kutokana na istilahi zinazofanana.
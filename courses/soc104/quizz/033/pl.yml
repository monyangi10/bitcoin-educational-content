question: Jaka jest podstawowa różnica między libertarianami a wolnościowcami w kwestii organizacji gospodarki?
answer: Libertarianie bronią własności prywatnej i wolnych rynków, podczas gdy liberałowie sprzeciwiają się kapitalizmowi i promują kolektywne formy gospodarki
wrong_answers:
  - Libertarianie popierają interwencję państwa w gospodarkę, podczas gdy liberałowie opowiadają się za całkowitą deregulacją gospodarki
  - Libertarianie opowiadają się za kolektywną własnością środków produkcji, podczas gdy liberałowie bronią indywidualnych praw własności
  - Libertarianie sprzeciwiają się wszelkim formom handlu, podczas gdy liberałowie wspierają nieograniczone rynki kapitalistyczne
explanation: |
  Tekst jasno stwierdza, że libertarianie wierzą, że własność prywatna jest niezbędna dla wolności jednostki i wspierają wolność kontraktową, podczas gdy
  libertarianie (anarchiści) uważają, że "własność to kradzież" i sprzeciwiają się kapitalizmowi, faworyzując alternatywne organizacje gospodarcze, takie jak mutualizm, kolektywizm czy libertariański komunizm. Stanowi to główną ideologiczną przepaść między tymi dwiema filozofiami politycznymi, które są często mylone ze względu na podobną terminologię.
question: تفاوت اساسی بین لیبرتارین‌ها و لیبرترها در مورد سازماندهی اقتصادی چیست؟
answer: لیبرترین‌ها از مالکیت خصوصی و بازارهای آزاد دفاع می‌کنند، در حالی که لیبرترها با سرمایه‌داری مخالفند و اشکال اقتصادی جمعی را ترویج می‌کنند.
wrong_answers:
  - لیبرتارین‌ها از مداخله دولت در اقتصاد حمایت می‌کنند، در حالی که لیبرترها طرفدار رفع کامل مقررات اقتصادی هستند.
  - لیبرتارین‌ها از مالکیت جمعی وسایل تولید حمایت می‌کنند، در حالی که لیبرترها از حقوق مالکیت فردی دفاع می‌کنند.
  - لیبرتارین‌ها با همه اشکال تجارت مخالفند، در حالی که لیبرترها از بازارهای سرمایه‌داری بدون محدودیت حمایت می‌کنند.
explanation: |
  متن به وضوح بیان می‌کند که لیبرترین‌ها معتقدند مالکیت خصوصی برای آزادی فردی ضروری است و از آزادی قراردادی حمایت می‌کنند، در حالی که لیبرترها (آنارشیست‌ها) معتقدند "مالکیت دزدی است" و با سرمایه‌داری مخالفند و سازمان‌های اقتصادی جایگزین مانند متقابل‌گرایی، جمع‌گرایی یا کمونیسم لیبرترین را ترجیح می‌دهند. این تفاوت ایدئولوژیک اصلی بین این دو فلسفه سیاسی است که اغلب به دلیل اصطلاحات مشابه با هم اشتباه گرفته می‌شوند.
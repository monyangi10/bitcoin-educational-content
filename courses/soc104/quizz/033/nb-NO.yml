question: Hva er den grunnleggende forskjellen mellom libertarianere og liberalister når det gjelder økonomisk organisering?
answer: Libertarianere forsvarer privat eiendom og frie markeder, mens liberalister er motstandere av kapitalisme og fremmer kollektive økonomiske former
wrong_answers:
  - Libertarianere støtter statlig inngripen i økonomien, mens libertaires går inn for fullstendig økonomisk deregulering
  - Libertarianere går inn for kollektivt eierskap til produksjonsmidlene, mens libertaire forsvarer den individuelle eiendomsretten
  - Libertarianere er motstandere av alle former for handel, mens liberalister støtter ubegrensede kapitalistiske markeder
explanation: |
  Teksten slår klart fast at libertarianere mener at privat eiendom er avgjørende for individuell frihet og støtter kontraktsfrihet, mens
  libertaires (anarkister) mener at "eiendom er tyveri" og er motstandere av kapitalisme, og foretrekker alternative økonomiske organisasjoner som mutualisme, kollektivisme eller frihetlig kommunisme. Dette representerer det ideologiske hovedskillet mellom disse to politiske filosofiene, som ofte forveksles på grunn av lik terminologi.
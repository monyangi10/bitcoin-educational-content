question: В чем принципиальное различие между либертарианцами и либертарианцами в вопросах организации экономики?
answer: Либертарианцы защищают частную собственность и свободные рынки, а либертарианцы выступают против капитализма и за коллективные формы хозяйствования
wrong_answers:
  - Либертарианцы выступают за вмешательство государства в экономику, а либертарианцы - за полное дерегулирование экономики
  - Либертарианцы выступают за коллективную собственность на средства производства, в то время как либертарианцы защищают права индивидуальной собственности
  - Либертарианцы выступают против всех форм коммерции, в то время как либертарианцы поддерживают неограниченные капиталистические рынки
explanation: |
  Из текста ясно следует, что либертарианцы считают частную собственность необходимой для индивидуальной свободы и поддерживают договорную свободу, в то время как
  либертарианцы (анархисты) считают, что "собственность - это кража", и выступают против капитализма, отдавая предпочтение альтернативным экономическим организациям, таким как мутуализм, коллективизм или либертарный коммунизм. Это представляет собой основной идеологический разрыв между этими двумя политическими философиями, которые часто путают из-за схожей терминологии.
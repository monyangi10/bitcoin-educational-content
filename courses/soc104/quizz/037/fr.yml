question: According to Friedman's perspective, what is the main problem with judging social policies based on their declared intentions rather than their actual outcomes?
answer: Well-intentioned policies often create unintended consequences like economic dependency and market distortions that contradict their original goals
wrong_answers:
  - Intentions are too difficult to measure objectively compared to the straightforward assessment of policy outcomes and results
  - Politicians deliberately mislead the public about their true intentions, making intention-based evaluation fundamentally unreliable and deceptive
  - Intentions change too frequently during policy implementation, making them an unstable foundation for long-term policy evaluation
explanation: |
  Friedman argues that policies with generous intentions can produce perverse effects opposite to their goals, such as creating dependency among those they aim to help. The issue isn't measurement difficulty, political deception, or changing intentions, but rather that good intentions don't guarantee positive results. This is why structural definitions focusing on observable characteristics and measurable outcomes are preferred over intentional definitions that rely on stated motivations.

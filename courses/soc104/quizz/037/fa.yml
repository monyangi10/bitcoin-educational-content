question: بر اساس دیدگاه فریدمن، مشکل اصلی قضاوت در مورد سیاست‌های اجتماعی بر اساس نیت‌های اعلام‌شده آن‌ها به جای نتایج واقعی‌شان چیست؟
answer: سیاست‌های با نیت خوب اغلب پیامدهای ناخواسته‌ای مانند وابستگی اقتصادی و تحریفات بازار ایجاد می‌کنند که با اهداف اصلی آن‌ها در تضاد است.
wrong_answers:
  - اندیشه‌ها به‌طور عینی اندازه‌گیری‌شان بسیار دشوارتر از ارزیابی مستقیم نتایج و پیامدهای سیاست‌ها است.
  - سیاستمداران عمداً درباره نیات واقعی خود، عموم را گمراه می‌کنند و ارزیابی مبتنی بر نیت را به‌طور اساسی غیرقابل‌اعتماد و فریبنده می‌سازند.
  - نیات در طول اجرای سیاست بسیار مکرر تغییر می‌کنند و آن‌ها را به یک پایه ناپایدار برای ارزیابی سیاست‌های بلندمدت تبدیل می‌کنند.
explanation: |
  فریدمن استدلال می‌کند که سیاست‌هایی با نیت‌های سخاوتمندانه می‌توانند اثرات معکوسی بر خلاف اهداف خود ایجاد کنند، مانند ایجاد وابستگی در میان کسانی که قصد کمک به آن‌ها را دارند. مسئله دشواری اندازه‌گیری، فریب سیاسی یا تغییر نیت‌ها نیست، بلکه این است که نیت‌های خوب تضمین‌کننده نتایج مثبت نیستند. به همین دلیل است که تعاریف ساختاری که بر ویژگی‌های قابل مشاهده و نتایج قابل اندازه‌گیری تمرکز دارند، بر تعاریف نیتی که به انگیزه‌های بیان‌شده متکی هستند، ترجیح داده می‌شوند.
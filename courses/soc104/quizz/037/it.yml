question: Secondo la prospettiva di Friedman, qual è il problema principale nel giudicare le politiche sociali in base alle loro intenzioni dichiarate piuttosto che ai loro risultati effettivi?
answer: Le politiche ben intenzionate spesso creano conseguenze non volute, come la dipendenza economica e le distorsioni del mercato, che contraddicono i loro obiettivi originari
wrong_answers:
  - Le intenzioni sono troppo difficili da misurare in modo oggettivo rispetto alla valutazione diretta degli esiti e dei risultati delle politiche
  - I politici ingannano deliberatamente il pubblico sulle loro vere intenzioni, rendendo la valutazione basata sulle intenzioni fondamentalmente inaffidabile e ingannevole
  - Le intenzioni cambiano troppo frequentemente durante l'implementazione delle politiche, rendendole una base instabile per la valutazione delle politiche a lungo termine
explanation: |
  Friedman sostiene che le politiche con intenzioni generose possono produrre effetti perversi opposti ai loro obiettivi, come la creazione di dipendenza tra coloro che intendono aiutare
  di aiuto. Il problema non è la difficoltà di misurazione, l'inganno politico o il cambiamento delle intenzioni, ma piuttosto il fatto che le buone intenzioni non garantiscono risultati positivi. Per questo motivo, le definizioni strutturali che si concentrano su caratteristiche osservabili e risultati misurabili sono da preferire a quelle intenzionali che si basano sulle motivazioni dichiarate.
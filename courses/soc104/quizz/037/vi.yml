question: Theo quan điểm của Friedman, vấn đề chính khi đánh giá các chính sách xã hội dựa trên những ý định đã được tuyên bố thay vì kết quả thực tế của chúng là gì?
answer: Những chính sách có thiện chí thường tạo ra những hậu quả không mong muốn như sự phụ thuộc kinh tế và sự méo mó thị trường, trái ngược với mục tiêu ban đầu.
wrong_answers:
  - So với việc đánh giá trực tiếp các kết quả và hiệu quả của chính sách, việc đo lường ý định một cách khách quan khó khăn hơn nhiều.
  - Các chính trị gia cố tình đánh lừa công chúng về ý định thực sự của họ, khiến cho việc đánh giá dựa trên ý định trở nên không đáng tin cậy và mang tính lừa dối.
  - Ý định thường xuyên thay đổi trong quá trình thực thi chính sách, khiến chúng trở thành nền tảng không ổn định cho việc đánh giá chính sách dài hạn.
explanation: |
  Friedman lập luận rằng các chính sách với ý định tốt đẹp có thể tạo ra những tác động ngược lại với mục tiêu ban đầu, chẳng hạn như tạo ra sự phụ thuộc ở những người mà chúng muốn giúp đỡ. Vấn đề không phải là khó khăn trong việc đo lường, sự lừa dối chính trị hay thay đổi ý định, mà là ý định tốt không đảm bảo kết quả tích cực. Đó là lý do tại sao các định nghĩa mang tính cấu trúc tập trung vào các đặc điểm có thể quan sát được và kết quả có thể đo lường được lại được ưu tiên hơn các định nghĩa mang tính chủ ý dựa trên động cơ đã nêu.
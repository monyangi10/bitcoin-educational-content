question: De acordo com a perspetiva de Friedman, qual é o principal problema de julgar as políticas sociais com base nas suas intenções declaradas e não nos seus resultados efectivos?
answer: As políticas bem intencionadas criam frequentemente consequências não intencionais, como a dependência económica e as distorções do mercado, que contradizem os seus objectivos originais
wrong_answers:
  - As intenções são demasiado difíceis de medir objetivamente, quando comparadas com a avaliação direta dos resultados e efeitos das políticas
  - Os políticos enganam deliberadamente o público sobre as suas verdadeiras intenções, tornando a avaliação baseada na intenção fundamentalmente pouco fiável e enganadora
  - As intenções mudam com demasiada frequência durante a implementação das políticas, o que as torna uma base instável para a avaliação das políticas a longo prazo
explanation: |
  Friedman argumenta que as políticas com intenções generosas podem produzir efeitos perversos opostos aos seus objectivos, como a criação de dependência entre aqueles que pretendem ajudar
  pretendem ajudar. A questão não é a dificuldade de medição, o engano político ou a mudança de intenções, mas sim o facto de as boas intenções não garantirem resultados positivos. É por isso que as definições estruturais que se centram em caraterísticas observáveis e resultados mensuráveis são preferíveis às definições intencionais que se baseiam em motivações declaradas.
question: Kulingana na mtazamo wa Friedman, ni tatizo gani kuu la kuhukumu sera za kijamii kulingana na nia zao zilizotangazwa badala ya matokeo yao halisi?
answer: Sera zenye nia njema mara nyingi husababisha matokeo yasiyotarajiwa kama vile utegemezi wa kiuchumi na upotoshaji wa soko unaopingana na malengo yao ya awali.
wrong_answers:
  - Nia ni ngumu sana kupima kwa uwazi ikilinganishwa na tathmini ya moja kwa moja ya matokeo na matokeo ya sera
  - Wanasiasa hupotosha umma kimakusudi kuhusu nia zao za kweli, na kufanya tathmini inayotegemea nia isiaminike na kuwa ya udanganyifu.
  - Nia hubadilika mara nyingi sana wakati wa utekelezaji wa sera, na kuzifanya kuwa msingi usio imara wa tathmini ya sera ya muda mrefu.
explanation: |
  Friedman anasema kwamba sera zenye nia njema zinaweza kusababisha athari mbaya kinyume na malengo yao, kama vile kuunda utegemezi miongoni mwa wale wanaolenga kuwasaidia. Suala si ugumu wa vipimo, udanganyifu wa kisiasa, au kubadilisha nia, bali ni kwamba nia njema hazihakikishi matokeo chanya. Hii ndiyo sababu fasili za kimuundo zinazozingatia sifa zinazoonekana na matokeo yanayopimika hupendelewa zaidi ya fasili za makusudi zinazotegemea motisha zilizotajwa.
question: 根據弗里德曼的觀點，根據社會政策宣示的意圖而非實際結果來判斷社會政策的主要問題是什麼？
answer: 用心良苦的政策往往會造成意想不到的後果，例如經濟依賴和市場扭曲，與原本的目標背道而馳
wrong_answers:
  - 與直接評估政策結果和成果相比，客觀衡量意向太困難了
  - 政治人物故意誤導大眾，讓大眾不知道他們的真正意圖，使得以意圖為基礎的評估根本不可靠，而且具有欺騙性
  - 在政策執行過程中，意圖改變得太頻繁，使其成為長期政策評估的不穩定基礎
explanation: |
  Friedman 認為，具有慷慨意圖的政策可能會產生與其目標相反的反常效應，例如在其幫助對象中產生依賴性。
  的依賴性。問題不在於測量困難、政治欺騙或意圖改變，而是良好的意圖並不能保證正面的結果。這就是為什麼結構性定義著重於可觀察的特性和可衡量的結果，而非依賴於明示動機的意圖性定義。
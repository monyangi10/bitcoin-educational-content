question: Dushingiye ku mbonerahamwe ya Friedman, ni ikihe kibazo nyamukuru co gucira urubanza politike z’imibano zishingiye ku migambi zazo zamenyeshejwe aho gushingira ku ngaruka zazo nyazo?
answer: Amategeko afise intumbero nziza akenshi atera ingaruka zitari zo nk’ukwihebera ubutunzi n’uguhindura isoko bivuguruza intumbero zayo z’intango .
wrong_answers:
  - Intumbero ziragoye cane gupima mu buryo bubereye ugereranyije n'isuzuma rigororotse ry'ingaruka n'ivyavuyemwo vya politike .
  - Abanyapolitike barazimiza abantu n’ibigirankana ku bijanye n’imigambi yabo nyakuri, bagatuma isuzuma rishingiye ku migambi mu vy’ukuri ridashobora kwizigirwa kandi ribesha .
  - Intumbero zirahinduka kenshi cane mu gihe c’ugushirwa mu ngiro kwa politike, bikaba bituma ziba umushinge udashikamye wo gusuzuma politike y’igihe kirekire .
explanation: |
  Friedman avuga ko amategeko afise imigambi y’ubugwaneza ashobora gutuma habaho ingaruka mbi zitandukanye n’intumbero zayo, nk’ugutuma abo . 
  n’intumbero yo gufasha. Ikibazo si ingorane zo gupima, ubuhendanyi bwa politike, canke guhindura imigambi, ahubwo ni uko imigambi myiza idatuma umuntu agira ingaruka nziza. Ni co gituma insobanuro z’imibumbe zishimikiye ku biranga umuntu bishobora kwihweza no ku ngaruka zishobora gupimwa n’ibindi zishimwa kuruta insobanuro zishingiye ku ntumbero zivugwa.
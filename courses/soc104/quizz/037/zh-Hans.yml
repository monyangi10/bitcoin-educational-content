question: 根据弗里德曼的观点，根据宣称的意图而非实际结果来判断社会政策的主要问题是什么？
answer: 用心良苦的政策往往会造成意想不到的后果，如经济依赖性和市场扭曲，与其最初的目标背道而驰
wrong_answers:
  - 与直接评估政策结果和成果相比，客观衡量意图过于困难
  - 政治家故意误导公众了解他们的真实意图，使得基于意图的评估从根本上说是不可靠和具有欺骗性的
  - 在政策实施过程中，意图变化过于频繁，使其成为长期政策评估的不稳定基础
explanation: |
  弗里德曼认为，具有慷慨意图的政策可能会产生与其目标相反的不良后果，例如在其旨在帮助的人群中产生依赖性。
  依赖性。问题不在于测量困难、政治欺骗或意图改变，而在于良好的意图并不能保证积极的结果。这就是为什么结构性定义侧重于可观察的特征和可衡量的结果，而不是依赖于所述动机的意向性定义。
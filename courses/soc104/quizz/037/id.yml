question: Menurut sudut pandang Friedman, apa masalah utama dalam menilai kebijakan sosial berdasarkan niat yang dinyatakan dan bukannya hasil aktualnya?
answer: Kebijakan yang bermaksud baik sering kali menimbulkan konsekuensi yang tidak diinginkan seperti ketergantungan ekonomi dan distorsi pasar yang bertentangan dengan tujuan awal mereka
wrong_answers:
  - Niat terlalu sulit untuk diukur secara obyektif dibandingkan dengan penilaian langsung terhadap hasil dan dampak kebijakan
  - Para politisi dengan sengaja menyesatkan publik tentang niat mereka yang sebenarnya, sehingga evaluasi berbasis niat pada dasarnya tidak dapat diandalkan dan menipu
  - Niat terlalu sering berubah selama implementasi kebijakan, sehingga menjadi dasar yang tidak stabil untuk evaluasi kebijakan jangka panjang
explanation: |
  Friedman berpendapat bahwa kebijakan dengan niat baik dapat menghasilkan dampak yang berlawanan dengan tujuannya, seperti menciptakan ketergantungan di antara mereka yang ingin dibantu
  yang ingin mereka bantu. Masalahnya bukan pada kesulitan pengukuran, penipuan politik, atau perubahan niat, tetapi lebih pada niat baik yang tidak menjamin hasil yang positif. Inilah sebabnya mengapa definisi struktural yang berfokus pada karakteristik yang dapat diamati dan hasil yang dapat diukur lebih disukai daripada definisi yang disengaja yang bergantung pada motivasi yang dinyatakan.
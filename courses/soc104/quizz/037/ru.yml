question: С точки зрения Фридмана, в чем заключается основная проблема оценки социальной политики по ее декларируемым намерениям, а не по ее реальным результатам?
answer: Благие намерения часто приводят к непредвиденным последствиям, таким как экономическая зависимость и рыночные диспропорции, которые противоречат их первоначальным целям
wrong_answers:
  - Намерения слишком сложно объективно измерить по сравнению с прямой оценкой итогов и результатов политики
  - Политики намеренно вводят общественность в заблуждение относительно своих истинных намерений, что делает оценку на основе намерений в корне ненадежной и обманчивой
  - Намерения слишком часто меняются в ходе реализации политики, что делает их неустойчивой основой для долгосрочной оценки политики
explanation: |
  Фридман утверждает, что политика с великодушными намерениями может привести к обратным последствиям, противоположным ее целям, например, вызвать зависимость у тех, кому она направлена
  например, создание зависимости у тех, кому они призваны помочь. Проблема заключается не в трудностях измерения, политическом обмане или изменении намерений, а в том, что благие намерения не гарантируют положительных результатов. Именно поэтому структурные определения, фокусирующиеся на наблюдаемых характеристиках и измеряемых результатах, предпочтительнее намеренных определений, которые опираются на заявленные мотивы.
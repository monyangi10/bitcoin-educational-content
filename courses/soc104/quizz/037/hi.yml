question: फ्रीडमैन के दृष्टिकोण के अनुसार, सामाजिक नीतियों का मूल्यांकन उनके घोषित इरादों के आधार पर करने में मुख्य समस्या क्या है, बजाय इसके कि उनके वास्तविक परिणामों के आधार पर किया जाए?
answer: अच्छी मंशा से बनाई गई नीतियां अक्सर अनपेक्षित परिणाम उत्पन्न करती हैं, जैसे कि आर्थिक निर्भरता और बाजार में विकृतियां, जो उनके मूल लक्ष्यों के विपरीत होती हैं।
wrong_answers:
  - नीतिगत परिणामों और नतीजों के सीधे आकलन की तुलना में इरादों को वस्तुनिष्ठ रूप से मापना बहुत कठिन है।
  - राजनेता जानबूझकर जनता को अपने असली इरादों के बारे में गुमराह करते हैं, जिससे इरादों पर आधारित मूल्यांकन मौलिक रूप से अविश्वसनीय और भ्रामक हो जाता है।
  - नीति कार्यान्वयन के दौरान इरादे बार-बार बदलते रहते हैं, जिससे वे दीर्घकालिक नीति मूल्यांकन के लिए एक अस्थिर आधार बन जाते हैं।
explanation: |
  फ्रीडमैन का तर्क है कि उदार इरादों वाली नीतियां अपने लक्ष्यों के विपरीत विकृत प्रभाव उत्पन्न कर सकती हैं, जैसे कि उन लोगों में निर्भरता पैदा करना जिनकी मदद करने का उनका लक्ष्य होता है। समस्या माप की कठिनाई, राजनीतिक छल या बदलते इरादों की नहीं है, बल्कि यह है कि अच्छे इरादे सकारात्मक परिणामों की गारंटी नहीं देते। यही कारण है कि प्रत्यक्ष विशेषताओं और मापने योग्य परिणामों पर केंद्रित संरचनात्मक परिभाषाओं को उन इरादों पर आधारित परिभाषाओं की तुलना में प्राथमिकता दी जाती है जो व्यक्त प्रेरणाओं पर निर्भर करती हैं।
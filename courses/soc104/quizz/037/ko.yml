question: 프리드먼의 관점에 따르면, 사회 정책을 실제 결과가 아닌 선언된 의도에 따라 판단할 때 가장 큰 문제점은 무엇일까요?
answer: 선의의 정책은 종종 원래의 목표와 모순되는 경제적 의존성 및 시장 왜곡과 같은 의도하지 않은 결과를 초래합니다
wrong_answers:
  - 의도는 정책 결과 및 결과에 대한 직접적인 평가에 비해 객관적으로 측정하기 너무 어렵습니다
  - 정치인들은 의도적으로 자신의 진정한 의도에 대해 대중을 오도하여 의도 기반 평가를 근본적으로 신뢰할 수없고 기만적으로 만듭니다
  - 정책 시행 중에 의도가 너무 자주 변경되어 장기적인 정책 평가의 기반이 불안정해집니다
explanation: |
  프리드먼은 선의의 의도를 가진 정책이 목표와 반대되는 왜곡된 효과를 낳을 수 있다고 주장합니다
  돕는 것을 목표로 합니다. 문제는 측정의 어려움, 정치적 속임수, 의도의 변화가 아니라 선한 의도가 긍정적인 결과를 보장하지 않는다는 것입니다. 그렇기 때문에 관찰 가능한 특성과 측정 가능한 결과에 초점을 맞춘 구조적 정의가 명시된 동기에 의존하는 의도적 정의보다 선호됩니다.
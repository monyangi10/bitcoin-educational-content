question: フリードマンの視点によれば、実際の結果ではなく、宣言された意図に基づいて社会政策を判断することの主な問題点は何か？
answer: 良かれと思った政策が、経済的依存や市場の歪みなど、本来の目的と矛盾する意図しない結果を生むことはよくある。
wrong_answers:
  - 政策の成果や結果をストレートに評価するのに比べ、意図を客観的に測定するのは難しすぎる。
  - 政治家は意図的に国民に真意を誤らせ、意図に基づく評価は基本的に信頼できず、欺瞞に満ちている。
  - 政策実施中に意図が頻繁に変化するため、長期的な政策評価の基盤として不安定である。
explanation: |
  フリードマンは、寛大な意図を持った政策が、その目的とは逆の逆効果を生むことがあると主張する。
  と主張する。問題は、測定の難しさや政治的欺瞞、意図の変化ではなく、善意が肯定的な結果を保証するわけではないということである。観察可能な特性や測定可能な結果に焦点を当てた構造的定義が、表明された動機に依存する意図的定義よりも好まれるのはこのためである。
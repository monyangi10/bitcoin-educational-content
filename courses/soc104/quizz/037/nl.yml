question: Wat is volgens Friedmans perspectief het grootste probleem met het beoordelen van sociaal beleid op basis van de verklaarde bedoelingen in plaats van de feitelijke resultaten?
answer: Goedbedoeld beleid heeft vaak onbedoelde gevolgen, zoals economische afhankelijkheid en marktverstoringen die in tegenspraak zijn met de oorspronkelijke doelstellingen
wrong_answers:
  - Intenties zijn te moeilijk om objectief te meten in vergelijking met de eenvoudige beoordeling van beleidsresultaten en -uitkomsten
  - Politici misleiden het publiek opzettelijk over hun ware bedoelingen, waardoor evaluatie op basis van intenties fundamenteel onbetrouwbaar en misleidend is
  - Intenties veranderen te vaak tijdens beleidsimplementatie, waardoor ze een instabiele basis vormen voor beleidsevaluatie op de lange termijn
explanation: |
  Friedman stelt dat beleid met genereuze bedoelingen perverse effecten kan hebben die tegengesteld zijn aan hun doelen, zoals het creëren van afhankelijkheid onder degenen die ze willen helpen
  die ze willen helpen. Het probleem is niet de moeilijkheid om te meten, politieke misleiding of veranderende bedoelingen, maar eerder dat goede bedoelingen geen garantie zijn voor positieve resultaten. Daarom hebben structurele definities die zich richten op waarneembare kenmerken en meetbare resultaten de voorkeur boven intentionele definities die zich baseren op verklaarde motivaties.
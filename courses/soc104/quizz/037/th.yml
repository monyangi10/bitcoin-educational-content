question: ตามมุมมองของฟรีดแมน ปัญหาหลักของการตัดสินนโยบายสังคมโดยอิงจากเจตนาที่ประกาศไว้แทนที่จะเป็นผลลัพธ์ที่แท้จริงคืออะไร?
answer: นโยบายที่มีเจตนาดีมักสร้างผลที่ไม่คาดคิด เช่น การพึ่งพาทางเศรษฐกิจและการบิดเบือนตลาด ซึ่งขัดแย้งกับเป้าหมายเดิมของพวกเขา
wrong_answers:
  - เจตนานั้นยากเกินกว่าจะวัดได้อย่างเป็นกลางเมื่อเทียบกับการประเมินผลลัพธ์และผลลัพธ์ของนโยบายที่ตรงไปตรงมา
  - นักการเมืองจงใจทำให้ประชาชนเข้าใจผิดเกี่ยวกับเจตนาที่แท้จริงของพวกเขา ทำให้การประเมินที่อิงตามเจตนานั้นไม่น่าเชื่อถือและหลอกลวงโดยพื้นฐาน
  - ความตั้งใจเปลี่ยนแปลงบ่อยเกินไปในระหว่างการดำเนินนโยบาย ทำให้เป็นพื้นฐานที่ไม่มั่นคงสำหรับการประเมินนโยบายระยะยาว
explanation: |
  ฟรีดแมนโต้แย้งว่านโยบายที่มีเจตนาดีอาจก่อให้เกิดผลกระทบที่ตรงกันข้ามกับเป้าหมาย เช่น การสร้างการพึ่งพาในหมู่ผู้ที่พวกเขาตั้งใจจะช่วยเหลือ ปัญหาไม่ได้อยู่ที่ความยากลำบากในการวัด การหลอกลวงทางการเมือง หรือการเปลี่ยนแปลงเจตนา แต่เป็นเพราะเจตนาดีไม่ได้รับประกันผลลัพธ์ที่ดี นี่คือเหตุผลที่คำจำกัดความเชิงโครงสร้างที่เน้นลักษณะที่สังเกตได้และผลลัพธ์ที่วัดได้ถูกนำมาใช้แทนคำจำกัดความเชิงเจตนาที่อาศัยแรงจูงใจที่ระบุไว้
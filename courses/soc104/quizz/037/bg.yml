question: Според гледната точка на Фридман какъв е основният проблем при оценяването на социалните политики въз основа на декларираните им намерения, а не на действителните резултати?
answer: Политиките с добри намерения често водят до непредвидени последици като икономическа зависимост и пазарни изкривявания, които противоречат на първоначалните им цели
wrong_answers:
  - Намеренията са твърде трудни за обективно измерване в сравнение с пряката оценка на резултатите от политиките
  - Политиците умишлено заблуждават обществеността относно истинските си намерения, което прави оценката, основана на намеренията, принципно ненадеждна и измамна
  - Намеренията се променят твърде често по време на прилагането на политиката, което ги прави нестабилна основа за дългосрочна оценка на политиката
explanation: |
  Фридман твърди, че политиките с благородни намерения могат да доведат до обратни на целите им ефекти, като например създаване на зависимост сред тези, които
  да помогне. Проблемът не е в трудностите при измерването, политическата измама или промяната на намеренията, а по-скоро в това, че добрите намерения не гарантират положителни резултати. Ето защо структурните определения, които се фокусират върху наблюдаеми характеристики и измерими резултати, са за предпочитане пред определенията за намерения, които разчитат на заявените мотивации.
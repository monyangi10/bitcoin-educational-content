question: Was ist aus Friedmans Sicht das Hauptproblem bei der Beurteilung von Sozialpolitik auf der Grundlage ihrer erklärten Absichten und nicht ihrer tatsächlichen Ergebnisse?
answer: Gut gemeinte politische Maßnahmen haben oft unbeabsichtigte Folgen wie wirtschaftliche Abhängigkeit und Marktverzerrungen, die ihren ursprünglichen Zielen widersprechen
wrong_answers:
  - Absichten sind zu schwer objektiv zu messen im Vergleich zu einer einfachen Bewertung der Ergebnisse und Resultate der Politik
  - Politiker führen die Öffentlichkeit absichtlich über ihre wahren Absichten in die Irre, was eine auf Absichten basierende Bewertung grundlegend unzuverlässig und irreführend macht
  - Absichten ändern sich zu häufig während der Umsetzung der Politik, was sie zu einer instabilen Grundlage für die langfristige Bewertung der Politik macht
explanation: |
  Friedman argumentiert, dass politische Maßnahmen mit großzügigen Absichten perverse Auswirkungen haben können, die ihren Zielen zuwiderlaufen, wie z. B. die Schaffung von Abhängigkeiten bei denjenigen, denen sie helfen sollen
  helfen sollen. Das Problem ist nicht die Schwierigkeit der Messung, die politische Täuschung oder die Änderung der Absichten, sondern vielmehr, dass gute Absichten keine Garantie für positive Ergebnisse sind. Aus diesem Grund werden strukturelle Definitionen, die sich auf beobachtbare Merkmale und messbare Ergebnisse konzentrieren, gegenüber intentionalen Definitionen bevorzugt, die sich auf erklärte Motivationen stützen.
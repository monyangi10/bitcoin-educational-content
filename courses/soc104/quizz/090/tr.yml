question: Mises'in analizine göre, sağ kanat kolektivizmi (faşizm/nazizm) sol kanat kolektivizmden (sosyalizm/komünizm) ayıran temel özellik nedir?
answer: Her ikisi de bireysel özgürlüğe karşı nefreti ve farklı motivasyonlara rağmen şiddeti meşrulaştırmayı paylaşıyor
wrong_answers:
  - Sağcı kolektivizm özel mülkiyeti korurken, solcu kolektivizm onu tamamen ortadan kaldırır
  - Sağ kanat kolektivizm rasyonel planlamaya dayanırken, sol kanat kolektivizm duygusal çağrılara dayanır
  - Sağ kanat kolektivizm sınırlı bireysel özerkliğe izin verirken, sol kanat kolektivizm hiçbirine izin vermez
explanation: |
  Mises, Hitler'in nazizmi ile Stalin'in komünizmi arasında temel nitelikleri bakımından hiçbir fark olmadığını savunur. Belirtilen motivasyonları farklı olsa da, her ikisi de bireysel özgürlükten nefret eden ve şiddeti meşrulaştıran kolektivist ideolojileri temsil etmektedir. Buradaki kilit nokta, karşıt görünmelerine rağmen hem faşizmin hem de komünizmin bireyi kolektif bir varlığa tabi kılması ve hedeflerine ulaşmak için güç kullanmasıdır.
  Bu durum, bu ideolojilerin temelde farklı olduğu yönündeki yaygın varsayıma meydan okumaktadır - Mises bunları aynı bireycilik karşıtı temanın varyasyonları olarak görmektedir.
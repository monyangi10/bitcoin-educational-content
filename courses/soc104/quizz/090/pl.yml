question: Według analizy Misesa, jaka podstawowa cecha odróżnia prawicowy kolektywizm (faszyzm/nazizm) od lewicowego kolektywizmu (socjalizm/komunizm)?
answer: Obaj podzielają nienawiść do wolności jednostki i usprawiedliwianie przemocy pomimo różnych motywacji
wrong_answers:
  - Prawicowy kolektywizm zachowuje własność prywatną, podczas gdy lewicowy kolektywizm całkowicie ją znosi
  - Prawicowy kolektywizm opiera się na racjonalnym planowaniu, podczas gdy lewicowy kolektywizm opiera się na emocjonalnych apelach
  - Prawicowy kolektywizm pozwala na ograniczoną autonomię jednostki, podczas gdy lewicowy kolektywizm nie pozwala na żadną
explanation: |
  Mises argumentuje, że nie ma fundamentalnej różnicy między nazizmem Hitlera a komunizmem Stalina w ich zasadniczej naturze. Obie reprezentują kolektywistyczne ideologie, które nienawidzą indywidualnej wolności i usprawiedliwiają przemoc, nawet jeśli ich deklarowane motywacje się różnią. Kluczowym spostrzeżeniem jest to, że pomimo pozornego przeciwieństwa, zarówno faszyzm, jak i komunizm podporządkowują jednostkę zbiorowemu podmiotowi i używają siły, aby osiągnąć swoje cele.
  Podważa to powszechne założenie, że ideologie te są zasadniczo różne - Mises postrzega je jako odmiany tego samego antyindywidualistycznego motywu.
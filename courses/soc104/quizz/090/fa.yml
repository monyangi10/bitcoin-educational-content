question: بر اساس تحلیل میزس، چه ویژگی بنیادی، جمع‌گرایی راست‌گرا (فاشیسم/نازیسم) را از جمع‌گرایی چپ‌گرا (سوسیالیسم/کمونیسم) متمایز می‌کند؟
answer: هر دو نفرت از آزادی فردی و توجیه خشونت را با وجود انگیزه‌های متفاوت به اشتراک می‌گذارند.
wrong_answers:
  - جمع‌گرایی راست‌گرا مالکیت خصوصی را حفظ می‌کند، در حالی که جمع‌گرایی چپ‌گرا آن را به‌طور کامل لغو می‌کند.
  - جمع‌گرایی راست‌گرا بر برنامه‌ریزی عقلانی استوار است، در حالی که جمع‌گرایی چپ‌گرا بر جاذبه‌های احساسی تکیه دارد.
  - جمع‌گرایی راست‌گرا به فرد اجازه می‌دهد تا حدی خودمختاری داشته باشد، در حالی که جمع‌گرایی چپ‌گرا هیچ‌گونه خودمختاری را مجاز نمی‌داند.
explanation: |
  میزس استدلال می‌کند که در ماهیت اساسی، هیچ تفاوت بنیادی بین نازیسم هیتلر و کمونیسم استالین وجود ندارد. هر دو نمایانگر ایدئولوژی‌های جمع‌گرایانه‌ای هستند که از آزادی فردی نفرت دارند و خشونت را توجیه می‌کنند، حتی اگر انگیزه‌های اعلام‌شده‌شان متفاوت باشد. نکته کلیدی این است که با وجود ظاهر مخالف، هم فاشیسم و هم کمونیسم فرد را به یک موجودیت جمعی تابع می‌کنند و از زور برای دستیابی به اهدافشان استفاده می‌کنند. این دیدگاه، فرض رایج مبنی بر اینکه این ایدئولوژی‌ها اساساً متفاوت هستند را به چالش می‌کشد - میزس آن‌ها را به عنوان واریاسیون‌هایی از یک تم ضد فردگرایانه می‌بیند.
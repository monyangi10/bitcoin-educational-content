question: Menurut analisis Mises, karakteristik fundamental apa yang membedakan kolektivisme sayap kanan (fasisme/nazisme) dengan kolektivisme sayap kiri (sosialisme/komunisme)?
answer: Keduanya sama-sama membenci kebebasan individu dan pembenaran kekerasan meskipun memiliki motivasi yang berbeda
wrong_answers:
  - Kolektivisme sayap kanan mempertahankan kepemilikan pribadi sementara kolektivisme sayap kiri menghapuskannya sama sekali
  - Kolektivisme sayap kanan didasarkan pada perencanaan rasional, sementara kolektivisme sayap kiri bergantung pada daya tarik emosional
  - Kolektivisme sayap kanan mengizinkan otonomi individu yang terbatas, sementara kolektivisme sayap kiri tidak mengizinkannya
explanation: |
  Mises berpendapat bahwa tidak ada perbedaan mendasar antara nazisme Hitler dan komunisme Stalin dalam hal sifat dasarnya. Keduanya mewakili ideologi kolektivis yang membenci kebebasan individu dan membenarkan kekerasan, meskipun motivasi yang mereka nyatakan berbeda. Wawasan kuncinya adalah bahwa meskipun terlihat berlawanan, baik fasisme maupun komunisme menundukkan individu ke dalam entitas kolektif dan menggunakan kekerasan untuk mencapai tujuan mereka.
  Hal ini menantang asumsi umum bahwa ideologi-ideologi ini pada dasarnya berbeda - Mises melihat mereka sebagai variasi dari tema anti-individualis yang sama.
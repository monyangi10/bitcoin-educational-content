question: Jaký základní rys podle Misesovy analýzy odlišuje pravicový kolektivismus (fašismus/nacismus) od levicového kolektivismu (socialismus/komunismus)?
answer: Oběma je společná nenávist ke svobodě jednotlivce a ospravedlnění násilí, přestože motivace jsou odlišné
wrong_answers:
  - Pravicový kolektivismus zachovává soukromé vlastnictví, zatímco levicový kolektivismus ho zcela ruší
  - Pravicový kolektivismus je založen na racionálním plánování, zatímco levicový kolektivismus se opírá o emocionální apely
  - Pravicový kolektivismus umožňuje omezenou autonomii jednotlivce, zatímco levicový kolektivismus ji neumožňuje vůbec
explanation: |
  Mises tvrdí, že mezi Hitlerovým nacismem a Stalinovým komunismem není v jejich podstatě žádný zásadní rozdíl. Obě představují kolektivistické ideologie, které nenávidí svobodu jednotlivce a ospravedlňují násilí, i když se jejich deklarované motivace liší. Klíčovým poznatkem je, že navzdory zdánlivému protikladu fašismus i komunismus podřizují jednotlivce kolektivnímu celku a k dosažení svých cílů používají sílu.
  To zpochybňuje běžný předpoklad, že tyto ideologie jsou zásadně odlišné - Mises je považuje za variace téhož antiindividualistického tématu.
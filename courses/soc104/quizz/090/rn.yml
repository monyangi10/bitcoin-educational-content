question: Dushingiye ku nseguro ya Mises, ni ikihe kintu nyamukuru gitandukanya ubumwe bw’iburyo (ubufashisi/ubunazi) n’ubumwe bw’ibubamfu (ubusosiyalisimu/ubukomunisi)?
answer: Bompi barasangiye urwanko rw'umwidegemvyo w'umuntu ku giti ciwe n'ugushingira intahe ubukazi naho bafise imvo zitandukanye .
wrong_answers:
  - Ubumwe bw'iburyo burazigama umutungo w'abantu ku giti cabo mu gihe ubumwe bw'ibubamfu bubukuraho burundu .
  - Ugukorana n’abandi kw’iburyo gushingiye ku gutegura ibintu mu buryo bubereye mu gihe ubumwe bw’abanyabubamfu bushingiye ku guhamagara abantu mu mutima .
  - Ubumwe bw'iburyo bwemera ubwigenge bw'umuntu ku giti ciwe mu gihe ubumwe bw'ibubamfu butavyemera
explanation: |
  Mises avuga ko ata tandukaniro ry’ishimikiro riri hagati y’ubunazi bwa Hitler n’ubukomunisita bwa Stalin mu kamere kavyo k’ingenzi. Ivyo vyose bigereranya ivyiyumviro vy’abanyagihugu vyanka umwidegemvyo w’umuntu ku giti ciwe kandi bikaba bishingira intahe ubukazi, naho nyene imvo zavyo zivugwa zitandukanye. Iciyumviro nyamukuru ni uko naho ubufashisi n’ubukomunisita bisa n’ibirwanya, vyose bishira umuntu ku giti ciwe munsi y’ikigo kimwe, bikakoresha inguvu kugira ngo bishike ku ntumbero zavyo. 
  Ivyo birarwanya iciyumviro rusangi c’uko izo ngendo zitandukanye cane - Mises abona ko ari uguhinduka kw’insanganyamatsiko imwe irwanya umuntu ku giti ciwe.
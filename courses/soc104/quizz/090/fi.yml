question: Misesin analyysin mukaan mikä peruspiirre erottaa oikeistolaisen kollektivismin (fasismi/natsismi) vasemmistolaisesta kollektivismista (sosialismi/kommunismi)?
answer: Molemmat jakavat yksilönvapauden vihan ja väkivallan oikeutuksen erilaisista motiiveista huolimatta
wrong_answers:
  - Oikeistokollektivismi säilyttää yksityisomaisuuden, kun taas vasemmistokollektivismi poistaa sen kokonaan
  - Oikeistokollektivismi perustuu rationaaliseen suunnitteluun, kun taas vasemmistokollektivismi perustuu tunnepohjaisiin vetoomuksiin
  - Oikeistokollektivismi sallii rajoitetun yksilön autonomian, kun taas vasemmistokollektivismi ei salli sitä lainkaan
explanation: |
  Mises väittää, että Hitlerin natsismin ja Stalinin kommunismin välillä ei ole mitään olennaista eroa niiden olennaisessa luonteessa. Molemmat edustavat kollektivistisia ideologioita, jotka vihaavat yksilönvapautta ja oikeuttavat väkivallan, vaikka niiden julkilausutut motiivit eroavat toisistaan. Keskeinen oivallus on se, että vaikka ne vaikuttavat vastakkaisilta, sekä fasismi että kommunismi alistavat yksilön kollektiiviselle kokonaisuudelle ja käyttävät voimaa tavoitteidensa saavuttamiseksi.
  Tämä kyseenalaistaa yleisen olettamuksen, jonka mukaan nämä ideologiat ovat pohjimmiltaan erilaisia - Mises näkee ne saman yksilönvastaisen teeman variaatioina.
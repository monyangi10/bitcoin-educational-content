question: ตามการวิเคราะห์ของ Mises ลักษณะพื้นฐานที่แยกความแตกต่างระหว่างการรวมกลุ่มฝ่ายขวา (ฟาสซิสต์/นาซี) กับการรวมกลุ่มฝ่ายซ้าย (สังคมนิยม/คอมมิวนิสต์) คืออะไร?
answer: ทั้งสองมีความเกลียดชังต่อเสรีภาพส่วนบุคคลและการใช้ความรุนแรงเป็นสิ่งที่ถูกต้องแม้จะมีแรงจูงใจที่แตกต่างกัน
wrong_answers:
  - ลัทธิรวมหมู่ฝ่ายขวารักษาทรัพย์สินส่วนตัวไว้ ในขณะที่ลัทธิรวมหมู่ฝ่ายซ้ายยกเลิกมันทั้งหมด
  - ลัทธิรวมหมู่ฝ่ายขวาขึ้นอยู่กับการวางแผนอย่างมีเหตุผล ในขณะที่ลัทธิรวมหมู่ฝ่ายซ้ายพึ่งพาการดึงดูดทางอารมณ์
  - ลัทธิรวมหมู่ฝ่ายขวาอนุญาตให้มีอิสระส่วนบุคคลจำกัด ในขณะที่ลัทธิรวมหมู่ฝ่ายซ้ายไม่อนุญาตเลย
explanation: |
  มิเซสโต้แย้งว่าไม่มีความแตกต่างพื้นฐานระหว่างนาซีของฮิตเลอร์และคอมมิวนิสต์ของสตาลินในธรรมชาติที่แท้จริงของพวกเขา ทั้งสองเป็นตัวแทนของอุดมการณ์แบบรวมหมู่ที่เกลียดชังเสรีภาพของปัจเจกบุคคลและใช้ความรุนแรงเป็นข้ออ้าง แม้ว่าจุดประสงค์ที่กล่าวอ้างจะแตกต่างกันก็ตาม ข้อมูลเชิงลึกที่สำคัญคือแม้จะดูเหมือนตรงข้ามกัน แต่ทั้งลัทธิฟาสซิสต์และคอมมิวนิสต์ก็ยอมให้ปัจเจกบุคคลอยู่ใต้บังคับของหน่วยรวมหมู่และใช้กำลังเพื่อบรรลุเป้าหมายของพวกเขา สิ่งนี้ท้าทายสมมติฐานทั่วไปที่ว่าอุดมการณ์เหล่านี้แตกต่างกันโดยพื้นฐาน - มิเซสมองว่าพวกเขาเป็นรูปแบบต่างๆ ของธีมต่อต้านปัจเจกบุคคลเดียวกัน
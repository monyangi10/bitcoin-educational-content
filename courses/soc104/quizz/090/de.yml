question: Welches grundlegende Merkmal unterscheidet nach der Analyse von Mises den rechten Kollektivismus (Faschismus/Nazismus) vom linken Kollektivismus (Sozialismus/Kommunismus)?
answer: Beide teilen den Hass auf die individuelle Freiheit und die Rechtfertigung von Gewalt trotz unterschiedlicher Motive
wrong_answers:
  - Der rechte Kollektivismus bewahrt das Privateigentum, während der linke Kollektivismus es vollständig abschafft
  - Der rechte Kollektivismus basiert auf rationaler Planung, während der linke Kollektivismus sich auf emotionale Appelle stützt
  - Der rechte Kollektivismus erlaubt eine begrenzte individuelle Autonomie, während der linke Kollektivismus keine zulässt
explanation: |
  Mises argumentiert, dass es keinen grundlegenden Unterschied zwischen Hitlers Nationalsozialismus und Stalins Kommunismus in ihrem Wesen gibt. Beide vertreten kollektivistische Ideologien, die die individuelle Freiheit hassen und Gewalt rechtfertigen, auch wenn ihre erklärten Beweggründe unterschiedlich sind. Die wichtigste Erkenntnis ist, dass sowohl der Faschismus als auch der Kommunismus trotz ihrer scheinbaren Gegensätzlichkeit das Individuum einer kollektiven Einheit unterordnen und Gewalt anwenden, um ihre Ziele zu erreichen.
  Dies stellt die gängige Annahme in Frage, dass sich diese Ideologien grundlegend unterscheiden - Mises sieht sie als Variationen desselben antiindividualistischen Themas.
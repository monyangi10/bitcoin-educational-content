question: Milline põhiline tunnus eristab Misesi analüüsi kohaselt parempoolset kollektivismi (fašism/naatsism) vasakpoolsest kollektivismist (sotsialism/kommunism)?
answer: Mõlemad jagavad individuaalse vabaduse vihkamist ja vägivalla õigustamist, hoolimata erinevatest motiividest
wrong_answers:
  - Parempoolne kollektivism säilitab eraomandi, vasakpoolne kollektivism aga kaotab selle täielikult ära
  - Parempoolne kollektivism põhineb ratsionaalsel planeerimisel, samas kui vasakpoolne kollektivism tugineb emotsionaalsetele üleskutsetele
  - Parempoolne kollektivism lubab piiratud individuaalset autonoomiat, vasakpoolne kollektivism aga mitte mingit
explanation: |
  Mises väidab, et Hitleri natsismi ja Stalini kommunismi vahel ei ole nende olemuse poolest põhimõttelist erinevust. Mõlemad esindavad kollektivistlikke ideoloogiaid, mis vihkavad individuaalset vabadust ja õigustavad vägivalda, kuigi nende väljendatud motiivid on erinevad. Peamine äratundmine on, et vaatamata sellele, et näivad olevat vastandlikud, allutavad nii fašism kui ka kommunism üksikisiku kollektiivsele üksusele ja kasutavad oma eesmärkide saavutamiseks jõudu.
  See seab kahtluse alla levinud eelduse, et need ideoloogiad on põhimõtteliselt erinevad - Mises näeb neid ühe ja sama indiviidivastase teema variatsioonidena.
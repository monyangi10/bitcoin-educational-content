question: Según el análisis de Mises, ¿qué característica fundamental distingue al colectivismo de derechas (fascismo/nazismo) del colectivismo de izquierdas (socialismo/comunismo)?
answer: Ambos comparten el odio a la libertad individual y la justificación de la violencia a pesar de las diferentes motivaciones
wrong_answers:
  - El colectivismo de derechas preserva la propiedad privada mientras que el colectivismo de izquierdas la suprime por completo
  - El colectivismo de derechas se basa en la planificación racional, mientras que el colectivismo de izquierdas se basa en apelaciones emocionales
  - El colectivismo de derechas permite una autonomía individual limitada, mientras que el colectivismo de izquierdas no permite ninguna
explanation: |
  Mises sostiene que no hay ninguna diferencia fundamental entre el nazismo de Hitler y el comunismo de Stalin en su naturaleza esencial. Ambos representan ideologías colectivistas que odian la libertad individual y justifican la violencia, aunque sus motivaciones declaradas difieran. La idea clave es que, a pesar de parecer opuestos, tanto el fascismo como el comunismo subordinan al individuo a una entidad colectiva y utilizan la fuerza para alcanzar sus objetivos.
  Esto desafía la suposición común de que estas ideologías son fundamentalmente diferentes - Mises las ve como variaciones del mismo tema anti-individualista.
question: According to Mises' analysis, what fundamental characteristic distinguishes right-wing collectivism (fascism/nazism) from left-wing collectivism (socialism/communism)?
answer: Both share hatred of individual freedom and justification of violence despite different motivations
wrong_answers:
  - Right-wing collectivism preserves private property while left-wing collectivism abolishes it entirely
  - Right-wing collectivism is based on rational planning while left-wing collectivism relies on emotional appeals
  - Right-wing collectivism allows limited individual autonomy while left-wing collectivism permits none
explanation: |
  Mises argues there is no fundamental difference between Hitler's nazism and Stalin's communism in their essential nature. Both represent collectivist ideologies that hate individual freedom and justify violence, even though their stated motivations differ. The key insight is that despite appearing opposed, both fascism and communism subordinate the individual to a collective entity and use force to achieve their goals. This challenges the common assumption that these ideologies are fundamentally different - Mises sees them as variations of the same anti-individualist theme.
question: Согласно анализу Мизеса, какая фундаментальная характеристика отличает правый коллективизм (фашизм/нацизм) от левого коллективизма (социализм/коммунизм)?
answer: Оба разделяют ненависть к свободе личности и оправдание насилия, несмотря на разные мотивы
wrong_answers:
  - Правый коллективизм сохраняет частную собственность, а левый коллективизм полностью ее упраздняет
  - Правый коллективизм основан на рациональном планировании, в то время как левый коллективизм опирается на эмоциональные призывы
  - Правый коллективизм допускает ограниченную автономию личности, в то время как левый коллективизм не допускает никакой
explanation: |
  Мизес утверждает, что между гитлеровским нацизмом и сталинским коммунизмом нет принципиальной разницы в их сущности. Оба представляют собой коллективистские идеологии, ненавидящие свободу личности и оправдывающие насилие, хотя их заявленные мотивы различны. Ключевой момент заключается в том, что, несмотря на кажущуюся противоположность, и фашизм, и коммунизм подчиняют личность коллективу и используют силу для достижения своих целей.
  Это опровергает распространенное мнение о том, что эти идеологии принципиально различны - Мизес рассматривает их как вариации одной и той же антииндивидуалистической темы.
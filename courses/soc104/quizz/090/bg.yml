question: Според анализа на Мизес коя основна характеристика отличава десния колективизъм (фашизъм/нацизъм) от левия колективизъм (социализъм/комунизъм)?
answer: И двамата споделят омразата към личната свобода и оправдават насилието, въпреки различните мотиви
wrong_answers:
  - Десният колективизъм запазва частната собственост, а левият я премахва напълно
  - Десният колективизъм се основава на рационално планиране, докато левият колективизъм разчита на емоционални призиви
  - Десният колективизъм позволява ограничена индивидуална автономия, докато левият колективизъм не позволява такава
explanation: |
  Мизес твърди, че между нацизма на Хитлер и комунизма на Сталин няма съществена разлика в тяхната същност. И двете представляват колективистични идеологии, които ненавиждат индивидуалната свобода и оправдават насилието, въпреки че заявените от тях мотиви се различават. Ключовото прозрение е, че въпреки че изглеждат противоположни, и фашизмът, и комунизмът подчиняват индивида на колективен субект и използват сила, за да постигнат целите си.
  Това оспорва общоприетото предположение, че тези идеологии са коренно различни - Мизес ги разглежда като вариации на една и съща антииндивидуалистична тема.
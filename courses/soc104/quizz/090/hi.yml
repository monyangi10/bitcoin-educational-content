question: मीसेस के विश्लेषण के अनुसार, कौन सी मूलभूत विशेषता दक्षिणपंथी सामूहिकतावाद (फासीवाद/नाज़ीवाद) को वामपंथी सामूहिकतावाद (समाजवाद/साम्यवाद) से अलग करती है?
answer: दोनों के बीच व्यक्तिगत स्वतंत्रता के प्रति घृणा और हिंसा को उचित ठहराने की भावना समान है, भले ही उनके उद्देश्य अलग-अलग हों।
wrong_answers:
  - दक्षिणपंथी सामूहिकतावाद निजी संपत्ति को संरक्षित रखता है जबकि वामपंथी सामूहिकतावाद इसे पूरी तरह से समाप्त कर देता है।
  - दक्षिणपंथी सामूहिकतावाद तर्कसंगत योजना पर आधारित है जबकि वामपंथी सामूहिकतावाद भावनात्मक अपीलों पर निर्भर करता है।
  - दक्षिणपंथी सामूहिकतावाद सीमित व्यक्तिगत स्वायत्तता की अनुमति देता है जबकि वामपंथी सामूहिकतावाद इसकी अनुमति बिल्कुल नहीं देता।
explanation: |
  मीज़ेस का तर्क है कि हिटलर के नाज़ीवाद और स्टालिन के साम्यवाद के मूल स्वरूप में कोई मूलभूत अंतर नहीं है। दोनों ही सामूहिकवादी विचारधाराएँ हैं जो व्यक्तिगत स्वतंत्रता से घृणा करती हैं और हिंसा को उचित ठहराती हैं, भले ही उनके घोषित उद्देश्य भिन्न हों। महत्वपूर्ण बात यह है कि विपरीत प्रतीत होने के बावजूद, फासीवाद और साम्यवाद दोनों ही व्यक्ति को सामूहिक इकाई के अधीन रखते हैं और अपने लक्ष्यों को प्राप्त करने के लिए बल का प्रयोग करते हैं।
  यह इस आम धारणा को चुनौती देता है कि ये विचारधाराएँ मौलिक रूप से भिन्न हैं - मीज़ेस इन्हें एक ही व्यक्ति-विरोधी विषय के विभिन्न रूप मानते हैं।
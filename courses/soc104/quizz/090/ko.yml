question: 미제스의 분석에 따르면, 우익 집단주의(파시즘/나치즘)와 좌익 집단주의(사회주의/공산주의)를 구별하는 근본적인 특징은 무엇인가요?
answer: 둘 다 동기는 다르지만 개인의 자유와 폭력의 정당화에 대한 증오를 공유합니다
wrong_answers:
  - 우익 집단주의는 사유 재산을 보존하는 반면 좌익 집단주의는 사유 재산을 완전히 폐지합니다
  - 우익 집단주의는 이성적 계획에 기반하는 반면 좌익 집단주의는 감정적 호소에 의존합니다
  - 우파 집단주의는 개인의 자율성을 제한적으로 허용하는 반면, 좌파 집단주의는 아무것도 허용하지 않습니다
explanation: |
  미제스는 히틀러의 나치즘과 스탈린의 공산주의가 본질적인 면에서 근본적인 차이가 없다고 주장합니다. 명시된 동기는 다르지만 둘 다 개인의 자유를 혐오하고 폭력을 정당화하는 집단주의 이데올로기를 대표합니다. 핵심적인 통찰은 파시즘과 공산주의 모두 반대되는 것처럼 보이지만 개인을 집단에 종속시키고 목표를 달성하기 위해 무력을 사용한다는 것입니다.
  이는 이 두 이데올로기가 근본적으로 다르다는 일반적인 가정에 도전하는 것으로, 미제스는 이를 동일한 반개인주의적 주제의 변형으로 보고 있습니다.
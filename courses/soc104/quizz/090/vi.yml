question: Theo phân tích của Mises, đặc điểm cơ bản nào phân biệt chủ nghĩa tập thể cánh hữu (chủ nghĩa phát xít/chủ nghĩa Quốc xã) với chủ nghĩa tập thể cánh tả (chủ nghĩa xã hội/chủ nghĩa cộng sản)?
answer: Cả hai đều căm ghét tự do cá nhân và biện minh cho bạo lực bất chấp những động cơ khác nhau.
wrong_answers:
  - Chủ nghĩa tập thể cánh hữu bảo vệ quyền sở hữu tư nhân trong khi chủ nghĩa tập thể cánh tả xóa bỏ hoàn toàn quyền sở hữu tư nhân.
  - Chủ nghĩa tập thể cánh hữu dựa trên kế hoạch hóa hợp lý, trong khi chủ nghĩa tập thể cánh tả dựa vào sự kêu gọi cảm xúc.
  - Chủ nghĩa tập thể cánh hữu cho phép quyền tự chủ cá nhân ở mức độ hạn chế, trong khi chủ nghĩa tập thể cánh tả không cho phép bất kỳ quyền tự chủ nào.
explanation: |
  Mises lập luận rằng không có sự khác biệt cơ bản nào giữa chủ nghĩa Quốc xã của Hitler và chủ nghĩa cộng sản của Stalin về bản chất cốt lõi. Cả hai đều đại diện cho các hệ tư tưởng tập thể ghét tự do cá nhân và biện minh cho bạo lực, mặc dù động cơ được tuyên bố của chúng khác nhau. Điểm mấu chốt là mặc dù có vẻ đối lập, cả chủ nghĩa phát xít và chủ nghĩa cộng sản đều đặt cá nhân dưới sự chi phối của một thực thể tập thể và sử dụng vũ lực để đạt được mục tiêu của mình.
  Điều này thách thức giả định phổ biến rằng các hệ tư tưởng này về cơ bản là khác nhau - Mises coi chúng là những biến thể của cùng một chủ đề chống chủ nghĩa cá nhân.
question: ミーゼスの分析によれば、右翼の集団主義（ファシズム／ナチズム）と左翼の集団主義（社会主義／共産主義）を区別する基本的特徴は何か？
answer: 動機は違えど、どちらも個人の自由を憎み、暴力を正当化する点で共通している。
wrong_answers:
  - 右翼の集団主義は私有財産を維持し、左翼の集団主義は私有財産を完全に廃止する。
  - 右翼の集団主義は合理的な計画に基づいているが、左翼の集団主義は感情的な訴えに依存している。
  - 右翼の集団主義は限られた個人の自主性を認めるが、左翼の集団主義は何も認めない。
explanation: |
  ミーゼスは、ヒトラーのナチズムとスターリンの共産主義には本質的な違いはないと主張する。どちらも個人の自由を憎み、暴力を正当化する集団主義的イデオロギーである。重要な洞察は、対立しているように見えるにもかかわらず、ファシズムも共産主義も個人を集団的存在に従属させ、目的を達成するために武力を行使するということである。
  このことは、これらのイデオロギーが根本的に異なるものであるという一般的な仮定に疑問を投げかけるものであり、ミーゼスはこれらを同じ反個人主義的テーマのバリエーションとして捉えている。
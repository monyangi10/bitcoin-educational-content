question: Enligt Mises analys, vilken grundläggande egenskap skiljer högerkollektivism (fascism/nazism) från vänsterkollektivism (socialism/kommunism)?
answer: Båda delar hatet mot individuell frihet och rättfärdigandet av våld trots olika motiv
wrong_answers:
  - Högerns kollektivism bevarar privat egendom medan vänsterns kollektivism avskaffar den helt och hållet
  - Högerns kollektivism bygger på rationell planering medan vänsterns kollektivism bygger på känslomässiga appeller
  - Högerns kollektivism tillåter begränsad individuell autonomi medan vänsterns kollektivism inte tillåter någon
explanation: |
  Mises hävdar att det inte finns någon fundamental skillnad mellan Hitlers nazism och Stalins kommunism i deras grundläggande natur. Båda representerar kollektivistiska ideologier som hatar individuell frihet och rättfärdigar våld, även om deras uttalade motiv skiljer sig åt. Den viktigaste insikten är att både fascismen och kommunismen, trots att de framstår som motsatta, underordnar individen en kollektiv enhet och använder våld för att uppnå sina mål.
  Detta utmanar det vanliga antagandet att dessa ideologier är fundamentalt olika - Mises ser dem som variationer av samma antiindividualistiska tema.
question: Kulingana na uchambuzi wa Mises, ni sifa gani ya msingi inayotofautisha ujumuishaji wa mrengo wa kulia (ufashisti/unazi) na ujumuishaji wa mrengo wa kushoto (ujamaa/ukomunisti)?
answer: Wote wanashiriki chuki dhidi ya uhuru wa mtu binafsi na uhalalishaji wa vurugu licha ya motisha tofauti
wrong_answers:
  - Ushirika wa mrengo wa kulia huhifadhi mali ya kibinafsi huku ushirika wa mrengo wa kushoto ukiukomesha kabisa
  - Ujumuiya wa mrengo wa kulia unategemea mipango ya busara huku ujumuiya wa mrengo wa kushoto ukitegemea mvuto wa kihisia.
  - Ujumuiya wa mrengo wa kulia huruhusu uhuru mdogo wa mtu binafsi huku ujumuiya wa mrengo wa kushoto ukiruhusu chochote
explanation: |
  Mises anasema hakuna tofauti ya msingi kati ya unazi wa Hitler na ukomunisti wa Stalin katika asili yao muhimu. Zote zinawakilisha itikadi za pamoja zinazochukia uhuru wa mtu binafsi na kuhalalisha vurugu, ingawa nia zao zilizotajwa zinatofautiana. Ufahamu muhimu ni kwamba licha ya kuonekana kupingana, ufashisti na ukomunisti zote mbili humtiisha mtu binafsi chini ya chombo cha pamoja na hutumia nguvu kufikia malengo yao.
  
  Hii inapinga dhana ya kawaida kwamba itikadi hizi ni tofauti kimsingi - Mises anaziona kama tofauti za mada moja ya kupinga ubinafsi.
question: 根據米塞斯的分析，右翼集體主義（法西斯主義/納粹主義）與左翼集體主義（社會主義/共產主義）的基本特徵是什麼？
answer: 儘管動機不同，但兩者都憎恨個人自由，並為暴力辯解。
wrong_answers:
  - 右翼集體主義保留私有財產，而左翼集體主義則完全廢除私有財產。
  - 右翼集體主義基於理性規劃，而左翼集體主義則仰賴感性訴求
  - 右翼集體主義允許有限的個人自主，而左翼集體主義則不允許任何個人自主。
explanation: |
  米塞斯認為希特勒的納粹主義和史達林的共產主義在本質上沒有根本的差異。兩者都代表著仇恨個人自由並為暴力辯護的集體主義意識形態，儘管他們所表達的動機各不相同。關鍵的洞察力在於，儘管表面上看起來是對立的，但法西斯主義和共產主義都讓個人從屬於集體實體，並使用武力來達成目標。
  這就挑戰了一般認為這些意識形態根本不同的假設 - 米塞斯認為它們是相同的反個人主義主題的變奏。
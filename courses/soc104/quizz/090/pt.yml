question: De acordo com a análise de Mises, que caraterística fundamental distingue o coletivismo de direita (fascismo/nazismo) do coletivismo de esquerda (socialismo/comunismo)?
answer: Ambos partilham o ódio à liberdade individual e a justificação da violência, apesar das diferentes motivações
wrong_answers:
  - O coletivismo de direita preserva a propriedade privada, enquanto o coletivismo de esquerda a abole totalmente
  - O coletivismo de direita baseia-se no planeamento racional, enquanto o coletivismo de esquerda se baseia em apelos emocionais
  - O coletivismo de direita permite uma autonomia individual limitada, enquanto o coletivismo de esquerda não permite nenhuma
explanation: |
  Mises argumenta que não há diferença fundamental entre o nazismo de Hitler e o comunismo de Stalin em sua natureza essencial. Ambos representam ideologias colectivistas que odeiam a liberdade individual e justificam a violência, embora as suas motivações declaradas sejam diferentes. A principal conclusão é que, apesar de parecerem opostos, tanto o fascismo como o comunismo subordinam o indivíduo a uma entidade colectiva e usam a força para atingir os seus objectivos.
  Isso desafia a suposição comum de que essas ideologias são fundamentalmente diferentes - Mises as vê como variações do mesmo tema anti-individualista.
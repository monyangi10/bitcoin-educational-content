question: Hvilket grunnleggende kjennetegn skiller ifølge Mises' analyse høyrekollektivisme (fascisme/nazisme) fra venstrekollektivisme (sosialisme/kommunisme)?
answer: Begge deler hat mot individuell frihet og rettferdiggjøring av vold til tross for ulike motivasjoner
wrong_answers:
  - Høyrekollektivismen bevarer den private eiendomsretten, mens venstrekollektivismen opphever den helt
  - Høyrekollektivisme er basert på rasjonell planlegging, mens venstrekollektivisme baserer seg på emosjonelle appeller
  - Høyrekollektivisme tillater begrenset individuell autonomi, mens venstrekollektivisme ikke tillater noen
explanation: |
  Mises hevder at det ikke er noen grunnleggende forskjell mellom Hitlers nazisme og Stalins kommunisme i deres essensielle natur. Begge representerer kollektivistiske ideologier som hater individuell frihet og rettferdiggjør vold, selv om deres uttalte motivasjoner er forskjellige. Den viktigste innsikten er at både fascismen og kommunismen, til tross for at de tilsynelatende står i motsetning til hverandre, underordner individet under en kollektiv enhet og bruker makt for å nå sine mål.
  Dette utfordrer den vanlige antagelsen om at disse ideologiene er fundamentalt forskjellige - Mises ser dem som variasjoner av det samme anti-individualistiske temaet.
question: Secondo l'analisi di Mises, quale caratteristica fondamentale distingue il collettivismo di destra (fascismo/nazismo) dal collettivismo di sinistra (socialismo/comunismo)?
answer: Entrambi condividono l'odio per la libertà individuale e la giustificazione della violenza, nonostante le diverse motivazioni
wrong_answers:
  - Il collettivismo di destra preserva la proprietà privata, mentre quello di sinistra la abolisce completamente
  - Il collettivismo di destra si basa su una pianificazione razionale, mentre quello di sinistra su appelli emotivi
  - Il collettivismo di destra consente una limitata autonomia individuale, mentre quello di sinistra non ne consente alcuna
explanation: |
  Mises sostiene che non vi è alcuna differenza fondamentale tra il nazismo di Hitler e il comunismo di Stalin nella loro natura essenziale. Entrambi rappresentano ideologie collettiviste che odiano la libertà individuale e giustificano la violenza, anche se le loro motivazioni dichiarate differiscono. La chiave di lettura è che, nonostante sembrino opposti, sia il fascismo che il comunismo subordinano l'individuo a un'entità collettiva e usano la forza per raggiungere i loro obiettivi.
  Ciò sfida l'assunto comune che queste ideologie siano fondamentalmente diverse: Mises le vede come variazioni dello stesso tema anti-individualista.
question: 根据米塞斯的分析，右翼集体主义（法西斯主义/纳粹主义）区别于左翼集体主义（社会主义/共产主义）的基本特征是什么？
answer: 尽管动机不同，但两者都憎恨个人自由，都为暴力辩护
wrong_answers:
  - 右翼集体主义维护私有财产，而左翼集体主义则完全废除私有财产
  - 右翼集体主义以理性规划为基础，而左翼集体主义则依靠情感诉求
  - 右翼集体主义允许有限的个人自主，而左翼集体主义则不允许个人自主
explanation: |
  米塞斯认为，希特勒的纳粹主义和斯大林的共产主义在本质上并无根本区别。二者都代表着集体主义意识形态，都憎恨个人自由并为暴力辩护，尽管他们宣称的动机不同。关键之处在于，尽管表面上看似对立，但法西斯主义和共产主义都将个人置于集体实体之下，并使用武力来实现其目标。
  米塞斯认为这两种意识形态是同一反个人主义主题的变体。
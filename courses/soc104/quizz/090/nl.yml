question: Welk fundamenteel kenmerk onderscheidt volgens Mises' analyse rechts collectivisme (fascisme/nazisme) van links collectivisme (socialisme/communisme)?
answer: Beiden delen haat tegen individuele vrijheid en rechtvaardiging van geweld, ondanks verschillende motivaties
wrong_answers:
  - Rechts collectivisme behoudt privébezit, terwijl links collectivisme het volledig afschaft
  - Rechts collectivisme is gebaseerd op rationele planning, terwijl links collectivisme berust op emotionele oproepen
  - Rechts collectivisme staat beperkte individuele autonomie toe, terwijl links collectivisme geen enkele autonomie toestaat
explanation: |
  Mises stelt dat er geen fundamenteel verschil is in hun essentiële aard tussen Hitlers nazisme en Stalins communisme. Beiden vertegenwoordigen collectivistische ideologieën die individuele vrijheid haten en geweld rechtvaardigen, ook al verschillen hun verklaarde motivaties. Het belangrijkste inzicht is dat ondanks dat ze tegengesteld lijken, zowel fascisme als communisme het individu ondergeschikt maken aan een collectieve entiteit en geweld gebruiken om hun doelen te bereiken.
  Dit weerlegt de gangbare aanname dat deze ideologieën fundamenteel verschillend zijn - Mises ziet ze als variaties van hetzelfde anti-individualistische thema.
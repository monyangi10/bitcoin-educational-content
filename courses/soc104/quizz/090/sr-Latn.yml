question: Prema Misesovoj analizi, osnovna karakteristika koja razlikuje desničarski kolektivizam (fašizam/nacizam) od levičarskog kolektivizma (socijalizam/komunizam) je način na koji se vlasništvo i kontrola nad sredstvima za proizvodnju organizuju.
answer: Oboje dele mržnju prema individualnoj slobodi i opravdanje nasilja uprkos različitim motivacijama
wrong_answers:
  - Desničarski kolektivizam čuva privatnu svojinu dok je levičarski kolektivizam u potpunosti ukida.
  - Desničarski kolektivizam zasniva se na racionalnom planiranju, dok levičarski kolektivizam počiva na emocionalnim apelima.
  - Desničarski kolektivizam omogućava ograničenu individualnu autonomiju, dok levičarski kolektivizam ne dopušta nijednu.
explanation: |
  Mises tvrdi da ne postoji suštinska razlika između Hitlerovog nacizma i Staljinovog komunizma u njihovoj osnovnoj prirodi. Obe predstavljaju kolektivističke ideologije koje mrze individualnu slobodu i opravdavaju nasilje, iako se njihove deklarisane motivacije razlikuju. Ključna spoznaja je da, uprkos tome što deluju suprotstavljeno, i fašizam i komunizam podređuju pojedinca kolektivnom entitetu i koriste silu za postizanje svojih ciljeva. 
  Ovo izaziva uobičajenu pretpostavku da su ove ideologije suštinski različite - Mises ih vidi kao varijacije iste anti-individualističke teme.
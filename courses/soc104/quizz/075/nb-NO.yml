question: Hvilken politisk familie vil mest sannsynlig støtte et blandet helsesystem med universell grunndekning som tilbys av staten, samtidig som privat sektor kan delta i tilleggstjenester?
answer: Sentrumsorienterte, som går inn for en balansert tilnærming som kombinerer statsgarantert universell tilgang med innovasjon og valgmuligheter i privat sektor
wrong_answers:
  - Sosialister, som tar til orde for et fullstendig statskontrollert, universelt helsevesen som en grunnleggende rettighet uavhengig av inntekt
  - Libertarianere, som mener at helsevesenet bør privatiseres helt og holdent som en markedstjeneste med individuelle valg og ansvar
  - Konservative, som foretrekker primært private markeder med minimal statlig inngripen bare for de dårligst stilte borgerne
explanation: |
  Sentrumsorienterte tar eksplisitt til orde for blandede systemer som kombinerer det beste fra både offentlige og private tilnærminger. De støtter en statsgarantert universell tilgang (som sikrer solidaritet og grunnleggende dekning), samtidig som de åpner for at privat sektor kan delta i diversifisering og innovasjon.
  Dette står i kontrast til sosialister som ønsker helt offentlige systemer, libertarianere som ønsker helt private markeder, og konservative som foretrekker primært private systemer med minimal statlig rolle.
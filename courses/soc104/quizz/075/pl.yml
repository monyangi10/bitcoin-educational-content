question: Która rodzina polityczna najprawdopodobniej poparłaby mieszany system opieki zdrowotnej z powszechnym podstawowym ubezpieczeniem zapewnianym przez państwo, przy jednoczesnym dopuszczeniu udziału sektora prywatnego w dodatkowych usługach?
answer: Centryści, którzy opowiadają się za zrównoważonym podejściem łączącym powszechny dostęp gwarantowany przez państwo z innowacjami i wyborem w sektorze prywatnym
wrong_answers:
  - Socjaliści, którzy opowiadają się za całkowicie kontrolowaną przez państwo powszechną opieką zdrowotną jako podstawowym prawem niezależnym od dochodów
  - Libertarianie, którzy uważają, że opieka zdrowotna powinna być całkowicie sprywatyzowana jako usługa rynkowa z indywidualnym wyborem i odpowiedzialnością
  - Konserwatyści, którzy preferują przede wszystkim rynki prywatne z minimalną interwencją państwa tylko dla najbardziej pokrzywdzonych obywateli
explanation: |
  Centryści wyraźnie opowiadają się za systemami mieszanymi, które łączą najlepsze cechy podejścia publicznego i prywatnego. Popierają gwarantowany przez państwo powszechny dostęp (zapewniający solidarność i podstawowy zasięg), jednocześnie umożliwiając udział sektora prywatnego w celu dywersyfikacji i innowacji.
  Kontrastuje to z socjalistami, którzy chcą w pełni publicznych systemów, libertarianami, którzy chcą w pełni prywatnych rynków, oraz konserwatystami, którzy preferują przede wszystkim systemy prywatne z minimalną rolą państwa.
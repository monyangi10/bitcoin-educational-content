question: कौन सा राजनीतिक परिवार ऐसी मिश्रित स्वास्थ्य सेवा प्रणाली का समर्थन करने की सबसे अधिक संभावना रखता है जिसमें राज्य द्वारा सार्वभौमिक बुनियादी कवरेज प्रदान किया जाए और साथ ही अतिरिक्त सेवाओं के लिए निजी क्षेत्र की भागीदारी की अनुमति दी जाए?
answer: मध्यमार्गी, जो राज्य द्वारा गारंटीकृत सार्वभौमिक पहुंच को निजी क्षेत्र के नवाचार और विकल्प के साथ संयोजित करने वाले संतुलित दृष्टिकोण का समर्थन करते हैं।
wrong_answers:
  - समाजवादी, जो आय से स्वतंत्र एक मौलिक अधिकार के रूप में पूर्णतः राज्य-नियंत्रित सार्वभौमिक स्वास्थ्य सेवा की वकालत करते हैं।
  - स्वतंत्रतावादी विचारधारा के अनुयायी मानते हैं कि स्वास्थ्य सेवा को पूरी तरह से निजीकृत किया जाना चाहिए और इसे एक बाजार सेवा के रूप में लागू किया जाना चाहिए जिसमें व्यक्तिगत विकल्प और जिम्मेदारी शामिल हो।
  - रूढ़िवादी विचारधारा के लोग निजी बाजारों को प्राथमिकता देते हैं, जिनमें राज्य का हस्तक्षेप न्यूनतम हो और केवल सबसे वंचित नागरिकों के लिए ही हो।
explanation: |
  मध्यमार्गी स्पष्ट रूप से मिश्रित प्रणालियों की वकालत करते हैं जो सार्वजनिक और निजी दोनों दृष्टिकोणों के सर्वोत्तम पहलुओं को जोड़ती हैं। वे राज्य द्वारा गारंटीकृत सार्वभौमिक पहुंच (एकजुटता और बुनियादी कवरेज सुनिश्चित करते हुए) का समर्थन करते हैं, साथ ही विविधीकरण और नवाचार के लिए निजी क्षेत्र की भागीदारी की अनुमति भी देते हैं।
  यह समाजवादियों से भिन्न है जो पूर्णतः सार्वजनिक प्रणालियाँ चाहते हैं, स्वतंत्रतावादी जो पूर्णतः निजी बाज़ार चाहते हैं, और रूढ़िवादी जो न्यूनतम राज्य भूमिका वाली मुख्य रूप से निजी प्रणालियाँ पसंद करते हैं।
question: Welche politische Familie würde am ehesten ein gemischtes Gesundheitssystem unterstützen, in dem der Staat eine universelle Grundversorgung bietet, während der Privatsektor zusätzliche Leistungen erbringen kann?
answer: Zentristen, die einen ausgewogenen Ansatz bevorzugen, der einen staatlich garantierten universellen Zugang mit Innovationen und Wahlmöglichkeiten des privaten Sektors kombiniert
wrong_answers:
  - Socialistes, die für eine vollständig staatlich kontrollierte, universelle Gesundheitsversorgung als ein vom Einkommen unabhängiges Grundrecht eintreten
  - Libertäre, die der Meinung sind, dass die Gesundheitsfürsorge als Marktdienstleistung mit individueller Wahl und Verantwortung vollständig privatisiert werden sollte
  - Konservative, die in erster Linie private Märkte mit minimalen staatlichen Eingriffen nur für die am meisten benachteiligten Bürger bevorzugen
explanation: |
  Die Zentristen befürworten ausdrücklich gemischte Systeme, die das Beste aus öffentlichen und privaten Ansätzen kombinieren. Sie befürworten einen staatlich garantierten universellen Zugang (zur Gewährleistung von Solidarität und Grundversorgung) und lassen gleichzeitig die Beteiligung des privaten Sektors zur Diversifizierung und Innovation zu.
  Dies steht im Gegensatz zu den Sozialdemokraten, die vollständig öffentliche Systeme wollen, zu den Libertären, die vollständig private Märkte wollen, und zu den Konservativen, die hauptsächlich private Systeme mit minimaler staatlicher Rolle bevorzugen.
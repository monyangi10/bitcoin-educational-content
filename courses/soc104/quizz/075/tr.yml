question: Hangi siyasi aile büyük olasılıkla devlet tarafından sağlanan evrensel temel kapsam ve ek hizmetler için özel sektör katılımına izin veren karma bir sağlık sistemini destekler?
answer: Devlet garantili evrensel erişim ile özel sektör inovasyonu ve tercihini birleştiren dengeli bir yaklaşımı destekleyen merkezciler
wrong_answers:
  - Gelirden bağımsız temel bir hak olarak tamamen devlet kontrolünde evrensel sağlık hizmetlerini savunan sosyalistler
  - Sağlık hizmetlerinin bireysel seçim ve sorumlulukla bir piyasa hizmeti olarak tamamen özelleştirilmesi gerektiğine inanan Liberteryenler
  - Sadece en dezavantajlı vatandaşlar için minimum devlet müdahalesi ile öncelikle özel piyasaları tercih eden muhafazakârlar
explanation: |
  Merkezciler, hem kamu hem de özel yaklaşımların en iyilerini bir araya getiren karma sistemleri açıkça savunmaktadır. Devlet garantili evrensel erişimi (dayanışma ve temel kapsamın sağlanması) desteklerken, çeşitlendirme ve yenilik için özel sektör katılımına izin verirler.
  Bu durum, tamamen kamusal sistemler isteyen Sosyalistler, tamamen özel piyasalar isteyen Liberteryenler ve devletin minimum rol oynadığı öncelikli olarak özel sistemleri tercih eden Muhafazakârlar ile tezat oluşturmaktadır.
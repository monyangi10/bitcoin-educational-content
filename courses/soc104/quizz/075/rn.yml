question: Ni uwuhe muryango wa politike woshobora gushigikira cane uburyo bwo kwivuza buvanze bufise ubuvuzi bw’ishimikiro bwose butangwa na Leta mu gihe wemerera abikorera ku giti cabo kugira uruhara mu bikorwa vy’inyongera?
answer: Abanyapolitike bo hagati, bashigikiye uburyo buringaniye buhuza uburenganzira bwo kuronka uburenganzira ku bantu bose bushingiye kuri Leta n’ubuhinga bushasha n’uguhitamwo kw’abikorera ku giti cabo
wrong_answers:
  - Abasosiyalisiti, bavuganira ko ubuvuzi bwose bugenzurwa na Leta nk’uburenganzira bw’ishimikiro butajanye n’amahera umuntu aronka .
  - Abanyagihugu b’abanyagihugu, bemera ko ubuvuzi bukwiye guhindurwa ubw’abantu ku giti cabo nk’ibikorwa vy’isoko bifise amahitamwo n’inshingano z’umuntu ku giti ciwe
  - Abanyagihugu bakunda ivy’ubuhinga bwa none, bakunda canecane amasoko yigenga Leta itagira ico ikora ku benegihugu bakeneye cane
explanation: |
  Abanyapolitike b’abanyagihugu barashigikira mu buryo butomoye uburyo buvanze buhuza uburyo bwiza bwo gukora, uburyo bwa Leta n’ubw’abikorera ku giti cabo. Bashigikira uburenganzira bwo gushika ku bantu bose (gutuma haba ubumwe n’ugushikira abantu bose) mu gihe bemerera urwego rw’abikorera ku giti cabo kugira uruhara mu guhindura ibintu no gukora ibintu bishasha. 
  Ivyo bitandukanye n’abasosiyalisiti bashaka uburyo bwa Leta bushitse, aba Libertarien bashaka amasoko y’abikorera ku giti cabo, n’aba Conservateurs bakunda cane cane uburyo bw’abikorera ku giti cabo bufise uruhara rutoyi rwa Leta.
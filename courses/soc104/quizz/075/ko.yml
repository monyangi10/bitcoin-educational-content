question: 국가가 보편적 기본 보장을 제공하면서 추가 서비스에 대한 민간 부문의 참여를 허용하는 혼합형 의료 시스템을 가장 지지할 가능성이 높은 정치 집단은 어디입니까?
answer: 중도주의자들은 국가가 보장하는 보편적 접근과 민간 부문의 혁신 및 선택권을 결합하는 균형 잡힌 접근 방식을 선호합니다
wrong_answers:
  - 소득과 무관한 기본권으로서 국가가 완전히 통제하는 보편적 의료 서비스를 옹호하는 사회주의자들
  - 의료를 개인의 선택과 책임이 있는 시장 서비스로 완전히 민영화해야 한다고 믿는 자유주의자들은 다음과 같이 말합니다
  - 가장 취약한 시민을 위해서만 국가 개입을 최소화하는 민간 시장을 선호하는 보수주의자
explanation: |
  중도주의자들은 공공과 민간 접근 방식의 장점을 결합한 혼합 시스템을 명시적으로 옹호합니다. 이들은 국가가 보장하는 보편적 접근(연대와 기본 보장 보장)을 지지하는 동시에 다양화와 혁신을 위해 민간 부문의 참여를 허용합니다.
  이는 완전한 공적 시스템을 원하는 사회주의자, 완전한 민간 시장을 원하는 자유주의자, 국가의 역할을 최소화하는 민간 시스템을 선호하는 보수주의자와는 대조적입니다.
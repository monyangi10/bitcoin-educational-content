question: 哪个政治家族最有可能支持由国家提供全民基本保险，同时允许私营部门参与额外服务的混合医疗保健体系？
answer: 中间派，主张采取一种平衡的方法，将国家保障的普及服务与私营部门的创新和选择结合起来
wrong_answers:
  - 社会主义者，主张完全由国家控制的全民医疗保健是一项基本权利，与收入无关
  - 自由主义者，他们认为医疗保健应完全私有化，作为一种市场服务，由个人选择并承担责任
  - 保守派倾向于以私人市场为主，国家只对最弱势的公民进行最低限度的干预
explanation: |
  中间派明确主张采用混合系统，将公共和私营方法的优点结合起来。他们支持由国家保证普及（确保团结和基本覆盖），同时允许私营部门参与多样化和创新。
  这与社会主义者（他们想要完全的公共体系）、自由主义者（他们想要完全的私营市场）和保守主义者（他们更倾向于以私营体系为主，尽量减少国家的作用）形成了鲜明对比。
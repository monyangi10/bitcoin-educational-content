question: کدام خانواده سیاسی به احتمال زیاد از یک سیستم بهداشتی مختلط با پوشش پایه جهانی ارائه شده توسط دولت حمایت می‌کند، در حالی که به بخش خصوصی اجازه مشارکت در خدمات اضافی را می‌دهد؟
answer: میانه‌روها، که طرفدار رویکردی متعادل هستند که دسترسی همگانی تضمین‌شده توسط دولت را با نوآوری و انتخاب بخش خصوصی ترکیب می‌کند
wrong_answers:
  - سوسیالیست‌ها، که از مراقبت‌های بهداشتی جهانی کاملاً تحت کنترل دولت به عنوان یک حق اساسی مستقل از درآمد حمایت می‌کنند
  - لیبرتارین‌ها، که معتقدند مراقبت‌های بهداشتی باید به‌طور کامل به‌عنوان یک خدمت بازار خصوصی‌سازی شود با انتخاب و مسئولیت فردی
  - محافظه‌کاران، که بازارهای عمدتاً خصوصی را با حداقل مداخله دولتی تنها برای محروم‌ترین شهروندان ترجیح می‌دهند
explanation: |
  میانه‌روها به‌طور صریح از سیستم‌های ترکیبی حمایت می‌کنند که بهترین‌های هر دو رویکرد عمومی و خصوصی را ترکیب می‌کنند. آن‌ها از دسترسی جهانی تضمین‌شده توسط دولت (تضمین همبستگی و پوشش پایه) حمایت می‌کنند، در حالی که به مشارکت بخش خصوصی برای تنوع و نوآوری اجازه می‌دهند.  
  این در تضاد با سوسیالیست‌ها است که خواهان سیستم‌های کاملاً عمومی هستند، لیبرترین‌ها که بازارهای کاملاً خصوصی می‌خواهند، و محافظه‌کارانی که سیستم‌های عمدتاً خصوصی با نقش حداقلی دولت را ترجیح می‌دهند.
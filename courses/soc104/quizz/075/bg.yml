question: Кое политическо семейство най-вероятно би подкрепило смесена система на здравеопазване с универсално основно покритие, осигурявано от държавата, като се допуска участието на частния сектор за допълнителни услуги?
answer: Центристи, които подкрепят балансиран подход, съчетаващ гарантиран от държавата универсален достъп с иновации и избор в частния сектор
wrong_answers:
  - Социалистите, които се застъпват за напълно контролирано от държавата универсално здравеопазване като основно право, независимо от доходите
  - Либертарианци, които смятат, че здравеопазването трябва да бъде изцяло приватизирано като пазарна услуга с индивидуален избор и отговорност
  - Консерватори, които предпочитат предимно частни пазари с минимална държавна намеса само за гражданите в най-неблагоприятно положение
explanation: |
  Центристите изрично се застъпват за смесени системи, които съчетават най-доброто от публичния и частния подход. Те подкрепят гарантирания от държавата универсален достъп (осигуряващ солидарност и основно покритие), като същевременно позволяват участието на частния сектор за диверсификация и иновации.
  Това контрастира със социалистите, които искат изцяло публични системи, с либертарианците, които искат изцяло частни пазари, и с консерваторите, които предпочитат предимно частни системи с минимална роля на държавата.
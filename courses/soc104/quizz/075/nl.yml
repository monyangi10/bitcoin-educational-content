question: Welke politieke familie zou waarschijnlijk voorstander zijn van een gemengd gezondheidszorgsysteem met een universele basisdekking door de staat en de mogelijkheid voor deelname van de privésector voor aanvullende diensten?
answer: Centristen, die voorstander zijn van een evenwichtige aanpak die door de staat gegarandeerde universele toegang combineert met innovatie en keuze door de particuliere sector
wrong_answers:
  - Socialistes, die pleiten voor een volledig door de staat gecontroleerde universele gezondheidszorg als een grondrecht onafhankelijk van inkomen
  - Libertariërs, die geloven dat gezondheidszorg volledig geprivatiseerd moet worden als een marktdienst met individuele keuze en verantwoordelijkheid
  - Conservatieven, die de voorkeur geven aan voornamelijk particuliere markten met minimale staatsbemoeienis, alleen voor de meest achtergestelde burgers
explanation: |
  Centristen pleiten expliciet voor gemengde systemen die het beste van zowel publieke als private benaderingen combineren. Ze zijn voorstander van door de staat gegarandeerde universele toegang (waarbij solidariteit en basisdekking worden gewaarborgd) terwijl deelname van de private sector voor diversificatie en innovatie wordt toegestaan.
  Dit in tegenstelling tot socialisten die volledig publieke systemen willen, libertariërs die volledig private markten willen en conservatieven die de voorkeur geven aan voornamelijk private systemen met een minimale rol voor de staat.
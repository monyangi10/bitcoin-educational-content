question: Milline poliitiline perekond toetaks kõige tõenäolisemalt segatervishoiusüsteemi, kus universaalset põhikatet pakub riik, kuid lubab erasektori osalemist lisateenuste osutamisel?
answer: Keskerakondlased, kes pooldavad tasakaalustatud lähenemist, mis ühendab riigi poolt tagatud üldise juurdepääsu erasektori innovatsiooni ja valikuvõimalustega
wrong_answers:
  - Sotsialistid, kes pooldavad täielikult riigi poolt kontrollitud universaalset tervishoiuteenust kui sissetulekust sõltumatut põhiõigust
  - Libertaarid, kes usuvad, et tervishoid peaks olema täielikult erastatud kui turuteenus, mis pakub individuaalset valikut ja vastutust
  - Konservatiivid, kes eelistavad peamiselt eraturge, kus riik sekkub minimaalselt ainult kõige ebasoodsamas olukorras olevate kodanike puhul
explanation: |
  Keskerakondlased pooldavad selgesõnaliselt segasüsteeme, mis ühendavad nii avaliku kui ka erasektori lähenemisviiside parimad küljed. Nad toetavad riiklikult tagatud universaalset juurdepääsu (tagades solidaarsuse ja põhilise katvuse), lubades samal ajal erasektori osalemist mitmekesistamise ja innovatsiooni eesmärgil.
  See vastandub sotsialistidele, kes soovivad täielikult riiklikke süsteeme, liberaalidele, kes soovivad täielikult eraturge, ja konservatiividele, kes eelistavad peamiselt erasektori süsteeme, kus riigi roll on minimaalne.
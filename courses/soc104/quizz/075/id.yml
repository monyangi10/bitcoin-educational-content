question: Kelompok politik mana yang paling mungkin mendukung sistem layanan kesehatan campuran dengan cakupan dasar universal yang disediakan oleh negara dan mengizinkan partisipasi sektor swasta untuk layanan tambahan?
answer: Sentris, yang mendukung pendekatan seimbang yang menggabungkan akses universal yang dijamin negara dengan inovasi dan pilihan sektor swasta
wrong_answers:
  - Sosialis, yang mengadvokasi perawatan kesehatan universal yang sepenuhnya dikendalikan oleh negara sebagai hak fundamental yang tidak tergantung pada pendapatan
  - Libertarian, yang percaya bahwa perawatan kesehatan harus sepenuhnya diprivatisasi sebagai layanan pasar dengan pilihan dan tanggung jawab individu
  - Konservatif, yang lebih memilih pasar swasta dengan intervensi negara yang minimal hanya untuk warga negara yang paling tidak beruntung
explanation: |
  Kaum sentris secara eksplisit mengadvokasi sistem campuran yang menggabungkan yang terbaik dari pendekatan publik dan swasta. Mereka mendukung akses universal yang dijamin oleh negara (memastikan solidaritas dan cakupan dasar) sambil mengizinkan partisipasi sektor swasta untuk diversifikasi dan inovasi.
  Hal ini berbeda dengan kaum Sosialis yang menginginkan sistem publik sepenuhnya, Libertarian yang menginginkan pasar swasta sepenuhnya, dan Konservatif yang lebih memilih sistem swasta dengan peran negara yang minimal.
question: Která politická rodina by s největší pravděpodobností podpořila smíšený systém zdravotní péče s univerzálním základním pokrytím poskytovaným státem a umožněním účasti soukromého sektoru na dalších službách?
answer: Centristé, kteří upřednostňují vyvážený přístup kombinující státem garantovaný univerzální přístup s inovacemi a možností volby v soukromém sektoru
wrong_answers:
  - Socialisté, kteří prosazují zcela státem řízenou všeobecnou zdravotní péči jako základní právo nezávislé na příjmu
  - Libertariáni, kteří věří, že zdravotní péče by měla být zcela privatizována jako tržní služba s individuální volbou a odpovědností
  - Konzervativci, kteří upřednostňují především soukromý trh s minimálními zásahy státu pouze pro nejpostiženější občany
explanation: |
  Centristé výslovně prosazují smíšené systémy, které kombinují to nejlepší z veřejného i soukromého přístupu. Podporují státem garantovaný univerzální přístup (zajištění solidarity a základního pokrytí) a zároveň umožňují účast soukromého sektoru na diverzifikaci a inovacích.
  To kontrastuje se socialisty, kteří chtějí plně veřejné systémy, libertariány, kteří chtějí plně soukromé trhy, a konzervativci, kteří preferují především soukromé systémy s minimální rolí státu.
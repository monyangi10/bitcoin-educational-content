question: Menurut teks tersebut, apa masalah utama dari spektrum politik kiri-kanan tradisional?
answer: Tidak ada tempat bagi pemikiran liberal klasik, yang tidak cocok dengan egalitarianisme sayap kiri maupun nasionalisme sayap kanan
wrong_answers:
  - Terlalu menyederhanakan politik dengan hanya memiliki dua posisi ekstrem tanpa pilihan moderat atau sentris
  - Asumsi yang salah bahwa kiri selalu reformis sementara kanan selalu konservatif di zaman modern
  - Hal ini gagal untuk memperhitungkan fakta bahwa kebanyakan orang sering mengubah posisi politik mereka dari waktu ke waktu
explanation: |
  Teks tersebut secara khusus menyatakan bahwa 'Masalah dengan poros kiri-kanan adalah bahwa poros ini tidak menyisakan ruang bagi pemikiran liberal klasik, yang dapat
  disamakan dengan egalitarianisme kiri maupun nasionalisme kanan Hal ini diilustrasikan melalui contoh-contoh seperti Frédéric Bastiat,
  yang kadang-kadang memilih dengan sayap kiri dan kadang-kadang dengan sayap kanan tergantung pada isu tertentu, dan Bitcoin, yang menarik pendukung dari berbagai latar belakang politik
  latar belakang politik. Tradisi liberal klasik, yang mendukung kebebasan ekonomi dan kebebasan pribadi yang maksimal dengan intervensi negara yang minimal, tidak
  tidak cocok dengan sistem kategorisasi kiri-kanan tradisional.

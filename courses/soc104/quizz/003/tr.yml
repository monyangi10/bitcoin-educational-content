question: Metne göre, geleneksel sol-sağ siyasi yelpazenin temel sorunu nedir?
answer: Ne solcu eşitlikçiliğe ne de sağcı milliyetçiliğe uyan klasik liberal düşünceye yer bırakmıyor
wrong_answers:
  - Herhangi bir ılımlı veya merkezci seçenek olmaksızın sadece iki aşırı pozisyona sahip olarak siyaseti aşırı basitleştiriyor
  - Yanlış bir şekilde, modern zamanlarda solun her zaman reformist, sağın ise her zaman muhafazakâr olduğu varsayılmaktadır
  - Çoğu insanın zaman içinde siyasi pozisyonlarını sık sık değiştirdiği gerçeğini hesaba katmamaktadır
explanation: |
  Metinde özellikle "Sol-sağ eksenindeki sorun, klasik liberal düşünceye yer bırakmamasıdır
  ne solun eşitlikçiliği ne de sağın milliyetçiliği ile bir tutulabilir Bu durum Frédéric Bastiat gibi örneklerle açıklanmaktadır,
  belirli bir konuya bağlı olarak bazen sola bazen de sağa oy veren Bitcoin ve çeşitli kesimlerden destekçi çeken
  siyasi geçmişleri vardır. Minimum devlet müdahalesi ile maksimum ekonomik ve kişisel özgürlükleri destekleyen klasik liberal gelenek, basitçe
  geleneksel sol-sağ kategorizasyon sistemine uymuyor.
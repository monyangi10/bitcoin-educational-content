question: 本文によると、伝統的な左右の政治スペクトルの主な問題点は何か？
answer: 左翼の平等主義にも右翼のナショナリズムにも合わない古典的な自由主義思想の居場所はない。
wrong_answers:
  - 穏健派や中道派の選択肢を排除し、2つの極端な立場だけを取り上げることで、政治を単純化しすぎている。
  - 現代において、左派は常に改革主義者であり、右派は常に保守主義者であるというのは間違った思い込みである。
  - 多くの人が時間の経過とともに政治的立場を頻繁に変えるという事実を考慮していない。
explanation: |
  左翼の平等主義とも右翼のナショナリズムとも一括りにできない。
  左翼の平等主義とも、右翼のナショナリズムとも一括りにできない』。このことは、フレデリック・バスティアのような例で説明できる、

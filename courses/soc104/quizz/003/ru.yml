question: В чем, согласно тексту, заключается главная проблема традиционного лево-правого политического спектра?
answer: В нем не остается места для классической либеральной мысли, которая не сочетается ни с левым эгалитаризмом, ни с правым национализмом
wrong_answers:
  - Она чрезмерно упрощает политику, предлагая только две крайние позиции без каких-либо умеренных или центристских вариантов
  - В ней неверно предполагается, что левые всегда реформисты, а правые всегда консерваторы в современном мире
  - Она не учитывает тот факт, что большинство людей часто меняют свои политические позиции с течением времени
explanation: |
  В тексте, в частности, говорится: "Проблема оси "левые-правые" в том, что она не оставляет места для классической либеральной мысли, которая не может быть
  ни с эгалитаризмом левых, ни с национализмом правых" Это иллюстрируется такими примерами, как Фредерик Бастиа,
  который в зависимости от конкретного вопроса голосовал то за левых, то за правых, и Bitcoin, которая привлекает сторонников из разных
  политического происхождения. Классическая либеральная традиция, выступающая за максимум экономических и личных свобод при минимальном вмешательстве государства, просто
  не вписывается в традиционную систему категоризации "левые-правые".
question: Kulingana na maandishi, tatizo kuu la wigo wa kisiasa wa jadi wa kushoto-kulia ni lipi?
answer: Haiachi nafasi kwa mawazo ya kiliberali ya kitamaduni, ambayo hayaendani na usawa wa mrengo wa kushoto wala utaifa wa mrengo wa kulia
wrong_answers:
  - Inarahisisha siasa kupita kiasi kwa kuwa na misimamo miwili mikali bila chaguzi zozote za wastani au za mrengo wa kati
  - Inadhani kimakosa kwamba upande wa kushoto huwa wa mageuzi wakati upande wa kulia huwa wahafidhina katika nyakati za kisasa.
  - Haielezi ukweli kwamba watu wengi hubadilisha misimamo yao ya kisiasa mara kwa mara baada ya muda.
explanation: |
  Maandishi yanasema haswa kwamba 'Tatizo la mhimili wa kushoto-kulia ni kwamba haliachi nafasi kwa mawazo ya kiliberali ya kitamaduni, ambayo hayawezi kuunganishwa wala na usawa wa kushoto wala na utaifa wa kulia.' Hii inaonyeshwa kupitia mifano kama Frédéric Bastiat, ambaye wakati mwingine alipiga kura na kushoto na wakati mwingine na kulia kulingana na suala maalum, na Bitcoin, ambayo huvutia wafuasi kutoka asili mbalimbali za kisiasa. Mila ya kiliberali ya kitamaduni, ambayo inapendelea uhuru wa juu wa kiuchumi na kibinafsi na uingiliaji kati mdogo wa serikali, kwa urahisi "haiendani na mfumo wa kitamaduni wa uainishaji wa kushoto-kulia.
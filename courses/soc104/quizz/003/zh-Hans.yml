question: 根据课文内容，传统的左右政治光谱的主要问题是什么？
answer: 它没有为古典自由主义思想留下一席之地，而古典自由主义思想既不符合左翼平等主义，也不符合右翼民族主义
wrong_answers:
  - 它将政治过于简单化，只有两种极端立场，没有任何温和或中间派的选择
  - 它错误地认为，在现代社会，左派总是改革派，而右派总是保守派
  - 它没有考虑到大多数人的政治立场会随着时间的推移而经常改变这一事实
explanation: |
  文中特别指出："左右轴心的问题在于，它没有给古典自由主义思想留下任何空间，古典自由主义思想既不能与左翼的平等主义混为一谈，也不能与右翼的民族主义混为一谈。
  既不能与左派的平等主义混为一谈，也不能与右派的民族主义混为一谈。弗雷德里克-巴斯蒂亚（Frédéric Bastiat）就是一个例子、
  巴斯蒂亚（Frédéric Bastiat），他根据具体问题有时投左派票，有时投右派票；Bitcoin 吸引了来自不同政治背景的支持者。
  的支持者。古典自由主义传统主张最大限度的经济和个人自由，国家干预最少，这与传统左翼根本不搭界。
  与传统的左右分类体系格格不入。
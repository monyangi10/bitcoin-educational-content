question: Според текста какъв е основният проблем на традиционния политически спектър ляво-дясно?
answer: Тя не оставя място за класическата либерална мисъл, която не се вписва нито в левия егалитаризъм, нито в десния национализъм
wrong_answers:
  - Той опростява политиката, като предлага само две крайни позиции без умерени или центристки варианти
  - Неправилно се приема, че левицата винаги е реформаторска, а десницата винаги е консервативна в днешно време
  - Той не отчита факта, че повечето хора често променят политическите си позиции с течение на времето
explanation: |
  В текста изрично се посочва, че "проблемът с оста ляво-дясно е, че тя не оставя място за класическата либерална мисъл, която може да бъде
  нито с егалитаризма на левите, нито с национализма на десните Това се илюстрира с примери като Фредерик Бастиа,
  който в зависимост от конкретния въпрос е гласувал ту с левицата, ту с десницата, и Bitcoin, който привлича поддръжници от различни
  политически среди. Класическата либерална традиция, която подкрепя максималните икономически и лични свободи при минимална държавна намеса, просто
  не се вписва в традиционната система за категоризиране на ляво и дясно.
question: بر اساس متن، مشکل اصلی طیف سیاسی سنتی چپ-راست چیست؟
answer: این جایی برای اندیشه لیبرال کلاسیک باقی نمی‌گذارد، که نه با برابری‌خواهی چپ‌گرا و نه با ملی‌گرایی راست‌گرا سازگار است.
wrong_answers:
  - این مسئله سیاست را با داشتن تنها دو موضع افراطی بدون هیچ گزینه معتدل یا میانه‌رو بیش از حد ساده‌سازی می‌کند.
  - این به اشتباه فرض می‌کند که چپ همیشه اصلاح‌طلب است در حالی که راست همیشه محافظه‌کار است در زمان‌های مدرن.
  - این واقعیت را که اکثر مردم به طور مکرر مواضع سیاسی خود را در طول زمان تغییر می‌دهند، در نظر نمی‌گیرد.
explanation: |
  متن به‌طور خاص بیان می‌کند که «مشکل محور چپ-راست این است که جایی برای تفکر لیبرال کلاسیک باقی نمی‌گذارد، که نه می‌توان آن را با برابری‌خواهی چپ و نه با ملی‌گرایی راست یکی دانست.» این موضوع از طریق مثال‌هایی مانند فردریک باستیا، که گاهی با چپ و گاهی با راست بسته به مسئله خاص رأی می‌داد، و Bitcoin، که حامیانی از زمینه‌های سیاسی مختلف را جذب می‌کند، نشان داده شده است. سنت لیبرال کلاسیک، که حداکثر آزادی‌های اقتصادی و شخصی با حداقل مداخله دولت را ترجیح می‌دهد، به سادگی در سیستم دسته‌بندی سنتی چپ-راست جای نمی‌گیرد.
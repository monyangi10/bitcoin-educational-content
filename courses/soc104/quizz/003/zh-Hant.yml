question: 根據文中所述，傳統左右政治光譜的主要問題是什麼？
answer: 它讓古典自由主義思想無立足之地，既不符合左翼平等主義，也不符合右翼民族主義。
wrong_answers:
  - 它將政治過度簡單化，只有兩個極端立場，沒有任何溫和或中間的選擇
  - 它錯誤地假設在現代社會中，左派永遠是改革派，而右派永遠是保守派。
  - 它沒有考慮到大多數人會隨著時間的推移而經常改變他們的政治立場。
explanation: |
  文中特別指出，「左右軸心的問題在於，它沒有為古典自由主義思想留下任何空間，而古典自由主義思想既不能與左派的平等主義混為一談，也不能與右派的民族主義混為一談。
  既不能與左派的平等主義混為一談，也不能與右派的民族主義混為一談。Frédéric Bastiat 等例子說明了這一點、
  巴斯蒂亞（Frédéric Bastiat）的例子說明了這一點，他根據具體問題，有時投左派票，有時投右派票，而 Bitcoin 則吸引了來自不同政治背景的支持者。
  政治背景的支持者。古典自由主義傳統傾向於最大程度的經濟與個人自由，並將國家干預降至最低，這與傳統左派根本不符。
  不適合傳統的左右分類系統。
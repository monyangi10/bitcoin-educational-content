question: Dushingiye ku canditswe, ni ikihe kibazo nyamukuru kiri mu bijanye n’imirongo ya politike y’ububamfu n’iburyo?
answer: Nta kibanza bisiga ku vyiyumviro vya kera vy’ubwigenge, ivyo bikaba bidahuye n’uburinganire bw’abanyabumoso canke n’abanyagihugu b’iburyo .
wrong_answers:
  - Birorosha cane politike mu kugira gusa ivyicaro bibiri birengeje urugero ata mahitamwo y’uburinganire canke y’uburinganire .
  - Rifata mu buryo butari bwo ko ububamfu bwama ari ubw’ivugurura mu gihe iburyo buhora ari ubw’ugukingira ibintu mu bihe vya none .
  - Ntibishobora gusobanura ukuntu abantu benshi bahindura kenshi ivyicaro vyabo vya politike uko igihe kigenda kirarenga .

question: Theo văn bản, vấn đề chính của phổ chính trị truyền thống tả-hữu là gì?
answer: Nó không dành chỗ cho tư tưởng tự do cổ điển, vốn không phù hợp với chủ nghĩa bình đẳng cánh tả cũng như chủ nghĩa dân tộc cánh hữu.
wrong_answers:
  - Nó đơn giản hóa chính trị quá mức bằng cách chỉ có hai lập trường cực đoan mà không có bất kỳ lựa chọn ôn hòa hay trung dung nào.
  - Nó cho rằng sai lầm khi cho rằng phe tả luôn theo chủ nghĩa cải cách trong khi phe hữu luôn bảo thủ trong thời hiện đại.
  - Nó không tính đến thực tế là hầu hết mọi người thường xuyên thay đổi quan điểm chính trị của mình theo thời gian.
explanation: |
  Văn bản nêu rõ rằng: "Vấn đề với trục tả-hữu là nó không chừa chỗ cho tư tưởng tự do cổ điển, vốn không thể gộp chung với chủ nghĩa bình đẳng của cánh tả cũng như chủ nghĩa dân tộc của cánh hữu." Điều này được minh họa qua các ví dụ như Frédéric Bastiat, người đôi khi bỏ phiếu cùng cánh tả và đôi khi cùng cánh hữu tùy thuộc vào vấn đề cụ thể, và Bitcoin, thu hút những người ủng hộ từ nhiều nền tảng chính trị khác nhau. Truyền thống tự do cổ điển, vốn ủng hộ tối đa các quyền tự do kinh tế và cá nhân với sự can thiệp tối thiểu của nhà nước, đơn giản là không phù hợp với hệ thống phân loại tả-hữu truyền thống.
question: Jaký je podle textu hlavní problém tradičního pravolevého politického spektra?
answer: Neponechává místo klasickému liberálnímu myšlení, které se nehodí ani k levicovému rovnostářství, ani k pravicovému nacionalismu
wrong_answers:
  - Zjednodušuje politiku tím, že obsahuje pouze dvě krajní pozice bez umírněných nebo středových možností
  - Nesprávně předpokládá, že levice je v moderní době vždy reformní, zatímco pravice je vždy konzervativní
  - Nebere v úvahu skutečnost, že většina lidí v průběhu času často mění své politické postoje
explanation: |
  V textu se výslovně uvádí, že "problém s osou levice-pravice spočívá v tom, že neponechává žádný prostor pro klasické liberální myšlení, které může být
  ani s rovnostářstvím levice, ani s nacionalismem pravice To je ilustrováno na příkladech, jako je Frédéric Bastiat,
  který v závislosti na konkrétní otázce hlasoval někdy s levicí a někdy s pravicí, a Bitcoin, která přitahuje příznivce z různých stran, jako je např
  politického prostředí. Klasická liberální tradice, která upřednostňuje maximální ekonomické a osobní svobody s minimálními státními zásahy, se jednoduše
  nezapadá do tradičního systému kategorizace levice-pravice.
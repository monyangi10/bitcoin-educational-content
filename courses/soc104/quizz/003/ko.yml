question: 텍스트에 따르면 전통적인 좌우 정치 스펙트럼의 주요 문제점은 무엇인가요?
answer: 좌파 평등주의도 우파 민족주의도 맞지 않는 고전적 자유주의 사상이 들어설 자리가 없습니다
wrong_answers:
  - 중도나 중도적 선택지 없이 극단적인 두 가지 입장만 제시하여 정치를 지나치게 단순화합니다
  - 현대에 좌파는 항상 개혁주의자이고 우파는 항상 보수적이라고 잘못 가정합니다
  - 대부분의 사람들이 시간이 지남에 따라 정치적 입장을 자주 바꾼다는 사실을 고려하지 못합니다
explanation: |
  본문은 구체적으로 '좌-우 축의 문제점은 고전적 자유주의 사상을 위한 여지를 남기지 않는다는 것입니다
  좌파의 평등주의나 우파의 민족주의로 뭉뚱그려질 여지가 없다는 것입니다 이는 프레데릭 바스티앙과 같은 사례를 통해 설명할 수 있습니다,
  특정 이슈에 따라 때로는 좌파, 때로는 우파에 투표한 프레데릭 바스티앙과 다양한 정치적 배경을 가진
  정치적 배경을 가진 지지자들을 끌어모으고 있습니다. 국가의 개입을 최소화하면서 경제적 자유와 개인의 자유를 최대한 보장하는 고전적 자유주의 전통은
  전통적인 좌우 분류 체계에 맞지 않습니다.
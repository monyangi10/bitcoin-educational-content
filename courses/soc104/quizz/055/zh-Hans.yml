question: 关于国家的作用，无政府主义和无政府资本主义自由主义者之间的根本区别是什么？
answer: 无政府主义者支持建立一个仅限于警察、司法和国防的最小国家，而无政府资本主义者则希望将所有国家职能私有化并由市场管理。
wrong_answers:
  - 无政府主义者拒绝一切形式的政府，而无政府资本主义者只接受政府对经济事务的有限干预
  - 无政府主义者支持有一定监管的自由市场，而无政府资本主义者则主张国家完全控制基本服务
  - 无政府主义者认为国家应大力干预社会问题，而无政府资本主义者只注重经济自由，不注重社会自由。
explanation: |
  无政府主义自由主义者和无政府资本主义自由主义者都认同个人主权这一基本原则，但在执行上有所不同。无政府主义者接受
  最低限度的 "守夜人 "国家，只履行警察、司法和领土防卫的基本职能。无政府资本主义者则更进一步，认为即使是这些传统的国家职能也应私有化，通过市场机制来处理。其他选项错误地暗示无政府主义者完全拒绝政府，或任何一个团体都支持广泛的国家干预，从而歪曲了这些立场。
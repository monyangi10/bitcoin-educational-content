question: Apa perbedaan mendasar antara libertarian minarkis dan anarko-kapitalis mengenai peran negara?
answer: Kaum minarkis mendukung negara minimal yang terbatas pada polisi, peradilan, dan pertahanan, sementara kaum anarko-kapitalis menginginkan semua fungsi negara diprivatisasi dan dikelola oleh pasar
wrong_answers:
  - Kaum minarkis menolak semua bentuk pemerintahan, sementara kaum anarko-kapitalis menerima intervensi pemerintah secara terbatas dalam masalah ekonomi saja
  - Kaum minarkis mendukung pasar bebas dengan beberapa peraturan sementara kaum anarko-kapitalis mengadvokasi kontrol penuh negara atas layanan-layanan penting
  - Kaum minarkis percaya pada intervensi negara yang kuat dalam isu-isu sosial, sementara kaum anarko-kapitalis hanya berfokus pada kebebasan ekonomi tanpa kebebasan sosial
explanation: |
  Baik kaum minarkis maupun anarko-kapitalis libertarian memiliki prinsip dasar yang sama tentang kedaulatan individu, tetapi berbeda dalam penerapannya. Kaum minarkis menerima
  negara 'penjaga malam' minimal yang hanya menjalankan fungsi-fungsi penting seperti polisi, peradilan, dan pertahanan teritorial. Anarko-kapitalis melangkah lebih jauh, percaya bahwa fungsi-fungsi negara tradisional ini harus diprivatisasi dan ditangani melalui mekanisme pasar. Pilihan-pilihan lain salah menggambarkan posisi-posisi ini dengan secara keliru menyatakan bahwa kaum minarkis menolak pemerintah secara keseluruhan atau bahwa salah satu dari kedua kelompok ini mendukung intervensi negara yang luas.
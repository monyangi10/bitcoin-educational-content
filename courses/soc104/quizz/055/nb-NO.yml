question: Hva er den grunnleggende forskjellen mellom minarkistiske og anarkokapitalistiske libertarianere når det gjelder statens rolle?
answer: Minarkister går inn for en minimal stat begrenset til politi, rettsvesen og forsvar, mens anarkokapitalister ønsker at alle statlige funksjoner skal privatiseres og styres av markedet
wrong_answers:
  - Minarkister avviser alle former for statlig styring, mens anarkokapitalister kun aksepterer begrenset statlig inngripen i økonomiske spørsmål
  - Minarkister støtter frie markeder med noe regulering, mens anarkokapitalister går inn for fullstendig statlig kontroll av viktige tjenester
  - Minarkister tror på sterk statlig inngripen i sosiale spørsmål, mens anarkokapitalister utelukkende fokuserer på økonomisk frihet uten sosiale friheter
explanation: |
  Både minarkistiske og anarkokapitalistiske libertarianere deler det grunnleggende prinsippet om individuell suverenitet, men er uenige om hvordan det skal gjennomføres. Minarkister aksepterer
  en minimal "nattevaktstat" som kun utfører de essensielle funksjonene som politi, rettsvesen og territorialforsvar. Anarkokapitalistene går lenger, og mener at selv disse tradisjonelle statsfunksjonene bør privatiseres og håndteres gjennom markedsmekanismer. De andre alternativene gir en feilaktig fremstilling av disse posisjonene ved feilaktig å antyde at minarkister avviser staten fullstendig, eller at noen av gruppene støtter omfattende statlig inngripen.
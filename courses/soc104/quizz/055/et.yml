question: Milline on minarhistlike ja anarhokapitalistlike libertaarlaste põhimõtteline erinevus riigi rolli osas?
answer: Minarhistid toetavad minimaalset riiki, mis piirdub politsei, õigusemõistmise ja kaitsega, samas kui anarhokapitalistid tahavad, et kõik riigi funktsioonid erastataks ja et neid juhiks turg
wrong_answers:
  - Minarhistid lükkavad tagasi kõik valitsemisvormid, samas kui anarhokapitalistid aktsepteerivad valitsuse piiratud sekkumist ainult majandusküsimustes
  - Minarhistid toetavad vaba turgu koos mõningase reguleerimisega, samas kui anarhokapitalistid pooldavad täielikku riigikontrolli oluliste teenuste üle
  - Minarhistid usuvad riigi tugevasse sekkumisse sotsiaalsetes küsimustes, samas kui anarhokapitalistid keskenduvad ainult majanduslikule vabadusele ilma sotsiaalsete vabadusteta
explanation: |
  Nii minarhistlikud kui ka anarhokapitalistlikud libertaarid jagavad individuaalse suveräänsuse aluspõhimõtet, kuid erinevad rakendamise osas. Minarhistid aktsepteerivad
  minimaalse "öövalvuri" riigi, mis täidab ainult põhifunktsioone nagu politsei, õigusemõistmine ja territoriaalkaitse. Anarhokapitalistid lähevad veelgi kaugemale, uskudes, et isegi need traditsioonilised riigi funktsioonid tuleks erastada ja turumehhanismide kaudu hallata. Teistes valikutes esitatakse neid seisukohti vääralt, väites ekslikult, et minarhistid lükkavad valitsuse täielikult tagasi või et kumbki rühmitus toetab ulatuslikku riiklikku sekkumist.
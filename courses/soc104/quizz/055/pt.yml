question: Qual é a diferença fundamental entre libertários minarquistas e anarco-capitalistas no que respeita ao papel do Estado?
answer: Os minarquistas apoiam um Estado mínimo limitado à polícia, à justiça e à defesa, enquanto os anarco-capitalistas querem todas as funções do Estado privatizadas e geridas pelo mercado
wrong_answers:
  - Os minarquistas rejeitam todas as formas de governo, enquanto os anarco-capitalistas aceitam uma intervenção limitada do governo apenas em questões económicas
  - Os minarquistas apoiam os mercados livres com alguma regulamentação, enquanto os anarco-capitalistas defendem o controlo total dos serviços essenciais por parte do Estado
  - Os minarquistas acreditam numa forte intervenção do Estado nas questões sociais, enquanto os anarco-capitalistas se concentram exclusivamente na liberdade económica, sem liberdades sociais
explanation: |
  Tanto os libertários minarquistas como os anarco-capitalistas partilham o princípio fundamental da soberania individual, mas diferem na sua aplicação. Os minarquistas aceitam
  um estado mínimo de "guarda-noturno" que desempenha apenas as funções essenciais de polícia, justiça e defesa territorial. Os anarco-capitalistas vão mais longe, acreditando que mesmo estas funções tradicionais do Estado devem ser privatizadas e tratadas através de mecanismos de mercado. As outras opções deturpam estas posições ao sugerir incorretamente que os minarquistas rejeitam totalmente o governo ou que qualquer um destes grupos apoia uma intervenção extensiva do Estado.
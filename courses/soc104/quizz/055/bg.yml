question: Каква е фундаменталната разлика между либертарианците мийнархисти и анархокапиталисти по отношение на ролята на държавата?
answer: Минархистите подкрепят минимална държава, ограничена до полицията, правосъдието и отбраната, докато анархокапиталистите искат всички държавни функции да бъдат приватизирани и управлявани от пазара
wrong_answers:
  - Минархистите отхвърлят всички форми на управление, докато анархокапиталистите приемат ограничена държавна намеса само в икономическата сфера
  - Минархистите подкрепят свободните пазари с известно регулиране, докато анархокапиталистите се застъпват за пълен държавен контрол върху основните услуги
  - Минархистите вярват в силната намеса на държавата в социалните въпроси, докато анархокапиталистите се фокусират изключително върху икономическата свобода без социални свободи
explanation: |
  И мийнархистите, и анархокапиталистите либертарианци споделят основния принцип на индивидуалния суверенитет, но се различават по отношение на прилагането му. Минархистите приемат
  минимална държава "нощен пазач", която изпълнява само основните функции на полицията, правосъдието и териториалната защита. Анархокапиталистите отиват по-далеч, като смятат, че дори тези традиционни държавни функции трябва да бъдат приватизирани и да се изпълняват чрез пазарни механизми. Другите варианти представят неправилно тези позиции, като погрешно предполагат, че минархистите отхвърлят изцяло правителството или че някоя от двете групи подкрепя широката държавна намеса.
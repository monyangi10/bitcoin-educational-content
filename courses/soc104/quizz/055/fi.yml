question: Mikä on minarkististen ja anarkokapitalististen libertaarien välinen perustavanlaatuinen ero valtion roolin suhteen?
answer: Minarkistit kannattavat minimaalista valtiota, joka rajoittuu poliisiin, oikeuteen ja puolustukseen, kun taas anarkokapitalistit haluavat, että kaikki valtion toiminnot yksityistetään ja niitä hallinnoivat markkinat
wrong_answers:
  - Minarkistit hylkäävät kaikki hallituksen muodot, kun taas anarkokapitalistit hyväksyvät hallituksen rajoitetun puuttumisen vain taloudellisiin asioihin
  - Minarkistit kannattavat vapaita markkinoita, joihin liittyy jonkin verran sääntelyä, kun taas anarkokapitalistit kannattavat olennaisten palvelujen täydellistä valtionvalvontaa
  - Minarkistit uskovat valtion voimakkaaseen puuttumiseen sosiaalisiin kysymyksiin, kun taas anarkokapitalistit keskittyvät yksinomaan taloudelliseen vapauteen ilman sosiaalisia vapauksia
explanation: |
  Sekä minarkistiset että anarkokapitalistiset libertaristit jakavat yksilön itsemääräämisoikeuden perusperiaatteen, mutta eroavat toisistaan sen toteuttamisessa. Minarkistit hyväksyvät
  minimaalisen "yövartijavaltion", joka hoitaa vain poliisin, oikeuden ja aluepuolustuksen keskeiset tehtävät. Anarkokapitalistit menevät pidemmälle ja uskovat, että jopa nämä perinteiset valtiolliset tehtävät olisi yksityistettävä ja hoidettava markkinamekanismien avulla. Muissa vaihtoehdoissa nämä kannat esitetään virheellisesti siten, että minarkistit väittävät virheellisesti, että minarkistit hylkäävät hallituksen kokonaan tai että jompikumpi ryhmä tukee laajamittaista valtion väliintuloa.
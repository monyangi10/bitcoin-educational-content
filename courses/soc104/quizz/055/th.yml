question: ความแตกต่างพื้นฐานระหว่างลิเบอร์ทาเรียนแบบมินาร์คิสต์และอนาร์โคแคปิตาลิสต์เกี่ยวกับบทบาทของรัฐคืออะไร?
answer: ผู้สนับสนุนมินาร์คิสม์สนับสนุนรัฐที่มีขนาดเล็กจำกัดเฉพาะตำรวจ ความยุติธรรม และการป้องกัน ในขณะที่อนาธิปไตยทุนนิยมต้องการให้ทุกหน้าที่ของรัฐถูกแปรรูปและจัดการโดยตลาด
wrong_answers:
  - มินาร์คิสต์ปฏิเสธทุกรูปแบบของรัฐบาล ในขณะที่อนาร์โค-แคปิตอลลิสต์ยอมรับการแทรกแซงของรัฐบาลในเรื่องเศรษฐกิจเท่านั้น
  - พวกมินาร์คิสต์สนับสนุนตลาดเสรีที่มีการควบคุมบางส่วน ในขณะที่พวกอนาโค-แคปิตอลลิสต์สนับสนุนการควบคุมบริการที่จำเป็นโดยรัฐอย่างสมบูรณ์
  - พวกมินาร์ชิสต์เชื่อในการแทรกแซงของรัฐอย่างเข้มแข็งในประเด็นทางสังคม ในขณะที่พวกอนาโค-แคปิตาลิสต์มุ่งเน้นเฉพาะเสรีภาพทางเศรษฐกิจโดยไม่มีเสรีภาพทางสังคม
explanation: |
  ทั้งลัทธิมินาร์คิสต์และลัทธิอนาโค-แคปิตาลิสต์ในแนวคิดเสรีนิยมมีหลักการพื้นฐานร่วมกันคืออธิปไตยของปัจเจกบุคคล แต่แตกต่างกันในด้านการนำไปปฏิบัติ ลัทธิมินาร์คิสต์ยอมรับรัฐที่มีขนาดเล็กที่สุดที่ทำหน้าที่เพียงแค่การรักษาความปลอดภัย การยุติธรรม และการป้องกันดินแดนเท่านั้น ส่วนลัทธิอนาโค-แคปิตาลิสต์ก้าวไปไกลกว่านั้น โดยเชื่อว่าหน้าที่ของรัฐแบบดั้งเดิมเหล่านี้ควรถูกแปรรูปและจัดการผ่านกลไกตลาด ตัวเลือกอื่นๆ บิดเบือนตำแหน่งเหล่านี้โดยเสนออย่างไม่ถูกต้องว่าลัทธิมินาร์คิสต์ปฏิเสธรัฐบาลโดยสิ้นเชิงหรือว่ากลุ่มใดกลุ่มหนึ่งสนับสนุนการแทรกแซงของรัฐอย่างกว้างขวาง
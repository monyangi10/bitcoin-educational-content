question: Jaký je zásadní rozdíl mezi minarchistickými a anarchokapitalistickými libertariány, pokud jde o roli státu?
answer: Minarchisté podporují minimální stát omezený na policii, soudnictví a obranu, zatímco anarchokapitalisté chtějí všechny funkce státu privatizovat a řídit trhem
wrong_answers:
  - Minarchisté odmítají všechny formy vlády, zatímco anarchokapitalisté akceptují pouze omezené zásahy vlády do ekonomických záležitostí
  - Minarchisté podporují volný trh s určitou regulací, zatímco anarchokapitalisté prosazují úplnou státní kontrolu základních služeb
  - Minarchisté věří v silné zásahy státu do sociálních otázek, zatímco anarchokapitalisté se zaměřují výhradně na ekonomickou svobodu bez sociálních svobod
explanation: |
  Jak minarchističtí, tak anarchokapitalističtí libertariáni sdílejí základní princip individuální suverenity, ale liší se v jeho uplatňování. Minarchisté přijímají
  minimální "noční hlídač", který vykonává pouze základní funkce policie, justice a obrany území. Anarchokapitalisté jdou ještě dál a domnívají se, že i tyto tradiční funkce státu by měly být privatizovány a řešeny prostřednictvím tržních mechanismů. Ostatní varianty tyto postoje zkreslují tím, že nesprávně naznačují, že minarchisté zcela odmítají vládu nebo že některá ze skupin podporuje rozsáhlé státní zásahy.
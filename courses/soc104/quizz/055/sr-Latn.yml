question: Koja je osnovna razlika između minarhističkih i anarho-kapitalističkih libertarijanaca u pogledu uloge države?
answer: Minarhisti podržavaju minimalnu državu ograničenu na policiju, pravosuđe i odbranu, dok anarho-kapitalisti žele da sve državne funkcije budu privatizovane i upravljane od strane tržišta.
wrong_answers:
  - Minarhisti odbacuju sve oblike vlade, dok anarho-kapitalisti prihvataju ograničenu vladinu intervenciju samo u ekonomskim pitanjima.
  - Minarhisti podržavaju slobodna tržišta uz određenu regulaciju, dok se anarho-kapitalisti zalažu za potpunu državnu kontrolu osnovnih usluga
  - Minarhisti veruju u snažnu intervenciju države u društvenim pitanjima, dok se anarho-kapitalisti fokusiraju isključivo na ekonomsku slobodu bez društvenih sloboda.
explanation: |
  I minarhisti i anarho-kapitalistički libertarijanci dele fundamentalni princip individualnog suvereniteta, ali se razlikuju u pogledu implementacije. Minarhisti prihvataju minimalnu 'noćobdijsku' državu koja obavlja samo osnovne funkcije policije, pravde i teritorijalne odbrane. Anarho-kapitalisti idu dalje, verujući da čak i ove tradicionalne državne funkcije treba privatizovati i rešavati putem tržišnih mehanizama. Druge opcije pogrešno predstavljaju ove pozicije sugerišući da minarhisti u potpunosti odbacuju vladu ili da bilo koja grupa podržava opsežnu državnu intervenciju.
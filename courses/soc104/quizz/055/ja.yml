question: 国家の役割に関して、ミニマリストと無政府資本主義のリバタリアンの根本的な違いは何ですか？
answer: 最小国家主義者は、警察、司法、防衛に限定した最小限の国家を支持し、無政府資本主義者は、すべての国家機能を民営化し、市場によって管理することを望んでいる。
wrong_answers:
  - 無政府主義者はあらゆる形態の政府を否定するが、無政府資本主義者は経済問題についてのみ限定的な政府の介入を受け入れる。
  - 無政府資本主義者が必要不可欠なサービスを国家が完全に管理することを主張する一方で、無政府主義者はある程度の規制を伴う自由市場を支持する。
  - 無政府資本主義者が社会的自由のない経済的自由のみを重視するのに対し、無政府主義者は社会問題への国家の強い介入を信じる。
explanation: |
  無産主義者と無政府資本主義者の両リバタリアンは、個人主権という基本原則を共有しているが、その実施については異なっている。無政府主義者は
  は、警察、司法、領土防衛という必要不可欠な機能のみを果たす最小限の「夜警」国家を容認する。アナルコ資本主義者はさらに進んで、こうした伝統的な国家機能さえも民営化し、市場メカニズムを通じて処理すべきだと考える。他の選択肢は、これらの立場を誤って伝えている。それは、無政府主義者が政府を完全に否定しているとか、どちらかのグループが国家による広範な介入を支持しているといった誤った見方である。
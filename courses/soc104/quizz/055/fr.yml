question: What is the fundamental difference between minarchist and anarcho-capitalist libertarians regarding the role of the state?
answer: Minarchists support a minimal state limited to police, justice, and defense, while anarcho-capitalists want all state functions privatized and managed by the market
wrong_answers:
  - Minarchists reject all forms of government while anarcho-capitalists accept limited government intervention in economic matters only
  - Minarchists support free markets with some regulation while anarcho-capitalists advocate for complete state control of essential services
  - Minarchists believe in strong state intervention in social issues while anarcho-capitalists focus exclusively on economic freedom without social liberties
explanation: |
  Both minarchist and anarcho-capitalist libertarians share the fundamental principle of individual sovereignty, but differ on implementation. Minarchists accept a minimal 'night-watchman' state that performs only the essential functions of police, justice, and territorial defense. Anarcho-capitalists go further, believing even these traditional state functions should be privatized and handled through market mechanisms. The other options misrepresent these positions by incorrectly suggesting minarchists reject government entirely or that either group supports extensive state intervention.

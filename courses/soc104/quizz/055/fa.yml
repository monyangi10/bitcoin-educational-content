question: تفاوت اساسی بین لیبرتارین‌های مینارشیست و آنارکو-کاپیتالیست در مورد نقش دولت چیست؟
answer: مینارشیست‌ها از یک دولت حداقلی که به پلیس، عدالت و دفاع محدود می‌شود حمایت می‌کنند، در حالی که آنارکو-کاپیتالیست‌ها می‌خواهند تمام وظایف دولت خصوصی‌سازی شده و توسط بازار مدیریت شود.
wrong_answers:
  - مینارشیست‌ها همه اشکال حکومت را رد می‌کنند، در حالی که آنارکو-کاپیتالیست‌ها تنها مداخله محدود دولت در امور اقتصادی را می‌پذیرند.
  - مینارشیست‌ها از بازارهای آزاد با مقداری تنظیم‌گری حمایت می‌کنند، در حالی که آنارکو-کاپیتالیست‌ها طرفدار کنترل کامل دولت بر خدمات اساسی هستند.
  - مینارشیست‌ها به مداخله قوی دولت در مسائل اجتماعی اعتقاد دارند، در حالی که آنارکو-کاپیتالیست‌ها به‌طور انحصاری بر آزادی اقتصادی بدون آزادی‌های اجتماعی تمرکز می‌کنند.
explanation: |
  هم لیبرترین‌های مینارشیست و هم آنارکو-کاپیتالیست اصل بنیادی حاکمیت فردی را به اشتراک می‌گذارند، اما در نحوه اجرا تفاوت دارند. مینارشیست‌ها یک دولت حداقلی «نگهبان شب» را می‌پذیرند که تنها وظایف اساسی پلیس، عدالت و دفاع سرزمینی را انجام می‌دهد. آنارکو-کاپیتالیست‌ها فراتر می‌روند و معتقدند حتی این وظایف سنتی دولت باید خصوصی‌سازی شده و از طریق مکانیسم‌های بازار مدیریت شوند. گزینه‌های دیگر این مواضع را نادرست نشان می‌دهند، با این ادعا که مینارشیست‌ها به‌طور کامل دولت را رد می‌کنند یا اینکه هر گروهی از مداخله گسترده دولت حمایت می‌کند.
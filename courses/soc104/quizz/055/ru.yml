question: В чем принципиальное различие между либертарианцами-минархистами и анархо-капиталистами в отношении роли государства?
answer: Минархисты поддерживают минимальное государство, ограничивающееся полицией, правосудием и обороной, в то время как анархо-капиталисты хотят, чтобы все государственные функции были приватизированы и управлялись рынком
wrong_answers:
  - Минархисты отвергают все формы правления, в то время как анархо-капиталисты допускают лишь ограниченное вмешательство государства в экономические вопросы
  - Минархисты поддерживают свободные рынки с некоторым регулированием, в то время как анархо-капиталисты выступают за полный государственный контроль над основными услугами
  - Минархисты верят в сильное вмешательство государства в социальные вопросы, в то время как анархо-капиталисты сосредоточены исключительно на экономической свободе без социальных свобод
explanation: |
  И минархисты, и анархо-капиталистические либертарианцы разделяют основополагающий принцип индивидуального суверенитета, но расходятся в его реализации. Минархисты принимают
  минимальное государство "ночного сторожа", выполняющее только основные функции полиции, правосудия и территориальной обороны. Анархо-капиталисты идут дальше, считая, что даже эти традиционные государственные функции должны быть приватизированы и осуществляться с помощью рыночных механизмов. Другие варианты искажают эти позиции, ошибочно полагая, что минархисты полностью отвергают правительство или что одна из групп поддерживает широкое государственное вмешательство.
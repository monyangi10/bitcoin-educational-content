question: Ni itandukaniro irihe ry’ishimikiro riri hagati y’abanyagihugu b’abanyagitugu n’abanyagihugu b’abanyagihugu ku bijanye n’uruhara rwa Leta?
answer: Abanyagihugu b’abanyagihugu bashigikiye Leta ntoyi cane igarukira ku bapolisi, ubutungane n’uburinzi, mu gihe abanyagihugu b’abanyagihugu bashaka ko ibikorwa vyose vya Leta bihindurwa ivy’abantu ku giti cabo kandi bikarongorwa n’isoko .
wrong_answers:
  - Aba minarchiste banka ubwoko bwose bw’intwaro mu gihe aba anarcho-capitalistes bemera ko Leta yinjira mu bibazo vy’ubutunzi gusa .
  - Aba minarchiste bashigikiye amasoko yidegemvya afise amategeko amwamwe mu gihe aba anarcho-capitaliste bashigikira ko Leta igenzura bimwe bishitse ibikorwa vy’ingenzi .
  - Aba minarchiste bemera ko Leta igira uruhara rukomeye mu bibazo vy’imibano mu gihe aba anarcho-capitalistes bibanda gusa ku mwidegemvyo w’ubutunzi ata mwidegemvyo w’imibano .
explanation: |
  Abanyagihugu b’abanyagitugu n’abanyagitugu b’abanyagihugu bompi barasangiye ingingo ngenderwako y’ishimikiro y’ubusegaba bw’umuntu ku giti ciwe, ariko baratandukanye ku bijanye n’ugushirwa mu ngiro. Abanyagihugu bemera . 
  Leta y’‘umurinzi w’ijoro’ mutoyi cane ikora gusa ibikorwa nyamukuru vy’ubupolisi, ubutungane n’ukwikingira intara. Abanyagihugu b’abanyagitugu baragenda kure, bemera ko mbere n’izo nshingano za Leta za kera zikwiye guhindurwa ivy’abantu ku giti cabo, zigakorwa biciye mu buryo bw’isoko. Ayandi mahitamwo agaragaza nabi ivyo vyiyumviro mu gutanga iciyumviro kitari co c’abanyagihugu b’abanyagitugu banka ubutegetsi burundu canke ko uwo mugwi wose ushigikira ko Leta igira ico ikoze cane.
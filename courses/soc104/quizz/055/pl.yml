question: Jaka jest zasadnicza różnica między libertarianami minarchistycznymi i anarchokapitalistycznymi w kwestii roli państwa?
answer: Minarchiści popierają minimalne państwo ograniczone do policji, wymiaru sprawiedliwości i obrony, podczas gdy anarchokapitaliści chcą, by wszystkie funkcje państwa zostały sprywatyzowane i były zarządzane przez rynek
wrong_answers:
  - Minarchiści odrzucają wszelkie formy rządu, podczas gdy anarchokapitaliści akceptują jedynie ograniczoną interwencję rządu w sprawy gospodarcze
  - Minarchiści popierają wolny rynek z pewnymi regulacjami, podczas gdy anarchokapitaliści opowiadają się za całkowitą kontrolą państwa nad podstawowymi usługami
  - Minarchiści wierzą w silną interwencję państwa w kwestie społeczne, podczas gdy anarchokapitaliści skupiają się wyłącznie na wolności gospodarczej bez swobód społecznych
explanation: |
  Zarówno minarchistyczni, jak i anarchokapitalistyczni libertarianie podzielają fundamentalną zasadę suwerenności jednostki, ale różnią się w kwestii jej implementacji. Minarchiści akceptują
  minimalne państwo "nocnego stróża", które wykonuje jedynie podstawowe funkcje policji, wymiaru sprawiedliwości i obrony terytorialnej. Anarchokapitaliści idą dalej, wierząc, że nawet te tradycyjne funkcje państwa powinny zostać sprywatyzowane i obsługiwane przez mechanizmy rynkowe. Pozostałe opcje błędnie przedstawiają te stanowiska, błędnie sugerując, że minarchiści całkowicie odrzucają rząd lub że którakolwiek z grup popiera rozległą interwencję państwa.
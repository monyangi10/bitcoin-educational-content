question: 關於國家的角色，無政府主義與無政府資本主義自由主義者之間的根本差異是什麼？
answer: 無政府主義者支持最小限度的國家，僅限於警察、司法和國防，而無政府資本主義者則希望所有國家功能都私有化，並由市場管理。
wrong_answers:
  - 無政府主義者拒絕一切形式的政府，而無政府資本主義者只接受政府對經濟事務的有限干預。
  - 無政府主義者支持自由市場，但有一些管制，而無政府資本主義者主張國家完全控制基本服務。
  - 無政府主義者相信國家對社會問題的強力干預，而無政府資本主義者只專注於經濟自由而沒有社會自由。
explanation: |
  無政府主義和無政府資本主義的自由主義者都分享個人主權的基本原則，但在執行上有所不同。無政府主義者接受
  最低限度的「守夜人」國家，只執行警察、司法和領土防衛的基本職能。無政府資本主義者更進一步，認為即使是這些傳統的國家功能也應該私有化，並透過市場機制來處理。其他選項歪曲了這些立場，錯誤地暗示無政府主義者完全拒絕政府，或任何一個團體都支持廣泛的國家干預。
question: Kuna tofauti gani ya msingi kati ya wanaminarchist na wanaanarcho-kibepari kuhusu jukumu la serikali?
answer: Wabunge wa chama cha upinzani wanaunga mkono dola ndogo inayowekewa mipaka ya polisi, haki, na ulinzi, huku wanabepari-mabepari wakitaka shughuli zote za serikali zibinafsishwe na kusimamiwa na soko.
wrong_answers:
  - Watawala wa Kidini wanakataa aina zote za serikali huku wanasiasa-wabepari wakikubali uingiliaji kati mdogo wa serikali katika masuala ya kiuchumi pekee
  - Wabunge wa chama cha Republican wanaunga mkono masoko huria kwa kanuni fulani huku wanasiasa-wabepari wakitetea udhibiti kamili wa serikali wa huduma muhimu
  - Wanachama wa chama cha Republican wanaamini katika uingiliaji kati mkubwa wa serikali katika masuala ya kijamii huku wanachama wa Republican wakizingatia uhuru wa kiuchumi pekee bila uhuru wa kijamii.
explanation: |
  Wana-Liberal wa Ki-Minarchist na Ki-Anarcho-Beparisti wanashiriki kanuni ya msingi ya uhuru wa mtu binafsi, lakini hutofautiana katika utekelezaji. Wana-Minarchist wanakubali dola ndogo ya 'mlinzi wa usiku' ambayo hufanya kazi muhimu tu za polisi, haki, na ulinzi wa eneo. Wana-Anarcho-Beparisti huenda mbali zaidi, wakiamini hata kazi hizi za jadi za serikali zinapaswa kubinafsishwa na kushughulikiwa kupitia mifumo ya soko. Chaguzi zingine zinapotosha misimamo hii kwa kupendekeza kimakosa kwamba wana-Minarchist wanakataa serikali kabisa au kwamba kundi lolote linaunga mkono uingiliaji kati mkubwa wa serikali.

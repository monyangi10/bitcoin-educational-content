question: Wat is het fundamentele verschil tussen minarchistische en anarcho-kapitalistische libertariërs wat betreft de rol van de staat?
answer: Minarchisten steunen een minimale staat die zich beperkt tot politie, justitie en defensie, terwijl anarcho-kapitalisten alle staatsfuncties geprivatiseerd en door de markt beheerd willen zien
wrong_answers:
  - Minarchisten wijzen alle vormen van overheid af, terwijl anarcho-kapitalisten alleen beperkte overheidsbemoeienis met economische zaken accepteren
  - Minarchisten steunen vrije markten met enige regulering, terwijl anarcho-kapitalisten pleiten voor volledige staatscontrole van essentiële diensten
  - Minarchisten geloven in sterke staatsbemoeienis met sociale kwesties, terwijl anarcho-kapitalisten zich uitsluitend richten op economische vrijheid zonder sociale vrijheden
explanation: |
  Zowel minarchistische als anarcho-kapitalistische libertariërs delen het fundamentele principe van individuele soevereiniteit, maar verschillen van mening over de implementatie. Minarchisten accepteren
  een minimale 'nachtwakerstaat' die alleen de essentiële functies van politie, justitie en territoriale verdediging vervult. Anarcho-kapitalisten gaan verder en geloven dat zelfs deze traditionele staatsfuncties geprivatiseerd moeten worden en via marktmechanismen moeten worden afgehandeld. De andere opties geven een verkeerd beeld van deze standpunten door ten onrechte te suggereren dat minarchisten de overheid volledig afwijzen of dat één van beide groepen uitgebreide staatsinterventie ondersteunt.
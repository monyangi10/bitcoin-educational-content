question: ¿Cuál es la diferencia fundamental entre los libertarios minarquistas y anarcocapitalistas en cuanto al papel del Estado?
answer: Los minarquistas apoyan un Estado mínimo limitado a la policía, la justicia y la defensa, mientras que los anarcocapitalistas quieren que todas las funciones del Estado sean privatizadas y gestionadas por el mercado
wrong_answers:
  - Los minarquistas rechazan toda forma de gobierno, mientras que los anarcocapitalistas sólo aceptan una intervención gubernamental limitada en asuntos económicos
  - Los minarquistas apoyan el libre mercado con cierta regulación, mientras que los anarcocapitalistas abogan por el control estatal total de los servicios esenciales
  - Los minarquistas creen en una fuerte intervención del Estado en las cuestiones sociales, mientras que los anarcocapitalistas se centran exclusivamente en la libertad económica sin libertades sociales
explanation: |
  Tanto los libertarios minarquistas como los anarcocapitalistas comparten el principio fundamental de la soberanía individual, pero difieren en su aplicación. Los minarquistas aceptan
  un Estado mínimo de "vigilante nocturno" que sólo desempeñe las funciones esenciales de policía, justicia y defensa territorial. Los anarcocapitalistas van más allá y creen que incluso estas funciones tradicionales del Estado deberían privatizarse y gestionarse a través de mecanismos de mercado. Las otras opciones tergiversan estas posturas al sugerir incorrectamente que los minarquistas rechazan totalmente el gobierno o que cualquiera de los dos grupos apoya una amplia intervención estatal.
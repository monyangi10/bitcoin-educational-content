question: Vilken är den grundläggande skillnaden mellan minarkistiska och anarkokapitalistiska libertarianer när det gäller statens roll?
answer: Minarkister förespråkar en minimal stat som begränsas till polis, rättsväsende och försvar, medan anarkokapitalister vill att alla statliga funktioner privatiseras och sköts av marknaden
wrong_answers:
  - Minarkister förkastar alla former av regeringar medan anarkokapitalister endast accepterar begränsad statlig inblandning i ekonomiska frågor
  - Minarkister stöder fria marknader med viss reglering medan anarkokapitalister förespråkar fullständig statlig kontroll av viktiga tjänster
  - Minarkister tror på en stark statlig inblandning i sociala frågor medan anarkokapitalister enbart fokuserar på ekonomisk frihet utan sociala friheter
explanation: |
  Både minarkistiska och anarkokapitalistiska libertarianer delar den grundläggande principen om individuell suveränitet, men skiljer sig åt när det gäller genomförandet. Minarkisterna accepterar
  en minimal "nattväktarstat" som endast utför de viktigaste funktionerna inom polis, rättsväsende och territoriellt försvar. Anarkokapitalister går längre och anser att även dessa traditionella statliga funktioner bör privatiseras och hanteras genom marknadsmekanismer. De andra alternativen ger en felaktig bild av dessa ståndpunkter genom att felaktigt antyda att minarkister helt förkastar staten eller att någon av grupperna stöder omfattande statliga ingripanden.
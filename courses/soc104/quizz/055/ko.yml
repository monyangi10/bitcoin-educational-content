question: 국가의 역할과 관련하여 군주주의자와 무정부주의적 자본주의 자유주의자 사이의 근본적인 차이점은 무엇인가요?
answer: 민본주의자들은 경찰, 사법, 국방에 국한된 최소한의 국가를 지지하는 반면, 무정부주의자들은 모든 국가 기능을 민영화하고 시장에 의해 관리되기를 원합니다
wrong_answers:
  - 무정부주의자들은 모든 형태의 정부를 거부하는 반면, 무정부주의 자본가들은 경제 문제에 대해서만 제한적인 정부 개입을 받아들입니다
  - 무정부주의자들은 자유 시장과 일부 규제를 지지하는 반면, 무정부주의 자본가들은 필수 서비스에 대한 국가의 완전한 통제를 주장합니다
  - 민본주의자들은 사회 문제에 대한 국가의 강력한 개입을 믿는 반면 무정부주의자들은 사회적 자유 없이 경제적 자유에만 집중합니다
explanation: |
  군주주의자와 무정부주의적 자본주의 자유주의자 모두 개인 주권이라는 기본 원칙은 공유하지만, 실행에 있어서는 차이가 있습니다. 미니아키스트는
  경찰, 사법, 영토 방어의 필수 기능만 수행하는 최소한의 '야간 경비원' 국가를 인정합니다. 아나코 자본주의자들은 여기서 더 나아가 이러한 전통적인 국가 기능마저 민영화하고 시장 메커니즘을 통해 처리해야 한다고 믿습니다. 다른 옵션은 이러한 입장을 잘못 표현하여 민본주의자들이 정부를 완전히 거부하거나 두 그룹 모두 광범위한 국가 개입을 지지한다고 잘못 제시합니다.
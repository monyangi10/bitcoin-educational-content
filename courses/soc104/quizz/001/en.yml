question: According to the text, why is it difficult to classify Bitcoin on the traditional right-left political axis?
answer: Because Bitcoin transcends traditional divides and attracts supporters from diverse political backgrounds
wrong_answers:
  - Because Bitcoin is exclusively supported by right-wing personalities in favour of economic liberalism
  - "Because Bitcoin is mainly championed by the left because of its potential for financial inclusion."
  - "Because Bitcoin is a neutral technology with no political dimension"
explanation: |
  The text explains that Bitcoin is difficult to classify on the right-left axis, as this decentralized technology attracts supporters from diverse political backgrounds, including the right, the left, anarchists and even apolitical individuals. Unlike other options, Bitcoin is not limited to a single political camp, but crosses traditional divides, making the right-left dichotomy inadequate to situate it correctly.
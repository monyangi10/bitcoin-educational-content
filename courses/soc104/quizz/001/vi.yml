question: Theo văn bản, tại sao việc phân loại Bitcoin theo trục chính trị truyền thống cánh hữu-cánh tả lại khó khăn?
answer: Vì Bitcoin vượt qua những ranh giới truyền thống và thu hút những người ủng hộ từ nhiều quan điểm chính trị khác nhau.
wrong_answers:
  - Bởi vì Bitcoin chỉ được ủng hộ bởi các nhân vật cánh hữu theo chủ nghĩa tự do kinh tế.
  - Vì Bitcoin chủ yếu được phe tả ủng hộ do tiềm năng thúc đẩy hòa nhập tài chính.
  - Vì Bitcoin là một công nghệ trung lập, không mang tính chất chính trị.
explanation: |
  Văn bản giải thích rằng Bitcoin rất khó phân loại theo trục chính trị cánh hữu-cánh tả, vì công nghệ phi tập trung này thu hút những người ủng hộ từ nhiều nền tảng chính trị khác nhau, bao gồm cả cánh hữu, cánh tả, những người theo chủ nghĩa vô chính phủ và thậm chí cả những cá nhân không quan tâm đến chính trị. Không giống như các lựa chọn khác, Bitcoin không bị giới hạn trong một phe phái chính trị duy nhất, mà vượt qua các ranh giới truyền thống, khiến cho sự phân đôi cánh hữu-cánh tả không đủ để định vị nó một cách chính xác.
question: Waarom is het volgens de tekst moeilijk om Bitcoin in te delen op de traditionele rechts-links politieke as?
answer: Omdat Bitcoin traditionele scheidslijnen overstijgt en aanhangers met verschillende politieke achtergronden aantrekt
wrong_answers:
  - Omdat Bitcoin uitsluitend wordt gesteund door rechtse persoonlijkheden die voorstander zijn van economisch liberalisme.
  - Omdat Bitcoin vooral door links wordt gepromoot vanwege het potentieel voor financiële inclusie.
  - Omdat Bitcoin een neutrale technologie is zonder politieke dimensie.
explanation: |
  De tekst legt uit dat Bitcoin moeilijk in te delen is op de rechts-links as, omdat deze gedecentraliseerde technologie aanhangers aantrekt met verschillende politieke achtergronden, waaronder rechts, links, anarchisten en zelfs apolitieke individuen
  achtergronden, waaronder rechts, links, anarchisten en zelfs apolitieke individuen. In tegenstelling tot andere opties is Bitcoin niet beperkt tot één politiek kamp,
  maar doorkruist het traditionele scheidslijnen, waardoor de dichotomie rechts-links ontoereikend is om het correct te situeren.
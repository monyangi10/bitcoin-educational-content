question: De acordo com o texto, porque é que é difícil classificar o Bitcoin no eixo político tradicional direita-esquerda?
answer: Porque o Bitcoin transcende as divisões tradicionais e atrai apoiantes de diversos quadrantes políticos
wrong_answers:
  - Porque o Bitcoin é apoiado exclusivamente por personalidades de direita favoráveis ao liberalismo económico.
  - Porque o Bitcoin é defendido principalmente pela esquerda devido ao seu potencial de inclusão financeira.
  - Porque o Bitcoin é uma tecnologia neutra, sem dimensão política.
explanation: |
  O texto explica que o Bitcoin é difícil de classificar no eixo direita-esquerda, uma vez que esta tecnologia descentralizada atrai apoiantes de diversas
  de diversas origens políticas, incluindo a direita, a esquerda, anarquistas e até indivíduos apolíticos. Ao contrário de outras opções, o Bitcoin não se limita a um único campo político,
  mas atravessa as divisões tradicionais, tornando a dicotomia direita-esquerda inadequada para o situar corretamente.
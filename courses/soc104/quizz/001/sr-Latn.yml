question: Prema tekstu, zašto je teško klasifikovati Bitcoin na tradicionalnoj desno-levoj političkoj osi?
answer: Jer Bitcoin prevazilazi tradicionalne podele i privlači pristalice iz različitih političkih pozadina
wrong_answers:
  - Zato što Bitcoin isključivo podržavaju desničarske ličnosti koje su za ekonomski liberalizam.
  - Zato što Bitcoin uglavnom podržava levica zbog njegovog potencijala za finansijsku inkluziju.
  - Jer Bitcoin je neutralna tehnologija bez političke dimenzije.
explanation: |
  Tekst objašnjava da je Bitcoin teško klasifikovati na osi desno-levo, jer ova decentralizovana tehnologija privlači pristalice iz različitih političkih pozadina, uključujući desnicu, levicu, anarhiste, pa čak i apolitične pojedince. Za razliku od drugih opcija, Bitcoin nije ograničen na jedan politički tabor, već prelazi tradicionalne podele, čineći dihotomiju desno-levo neadekvatnom za njegovo pravilno smeštanje.
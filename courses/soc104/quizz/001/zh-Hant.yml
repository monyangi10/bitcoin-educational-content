question: 根據文中所述，為何在傳統的左右政治軸線上很難將 Bitcoin 分類？
answer: 因為 Bitcoin 超越了傳統的分歧，吸引了來自不同政治背景的支持者
wrong_answers:
  - 因為 Bitcoin 只得到支持經濟自由主義的右翼人士的支持。
  - 因為 Bitcoin 主要是由左派所提倡，因為它具有金融包容性的潛力。
  - 因為 Bitcoin 是一種中立的技術，不涉及政治層面。
explanation: |
  文中解釋，Bitcoin 很難用左右軸來分類，因為這項分散式技術吸引了來自不同政治背景的支持者，包括右派、左派、無政府主義者，甚至是非政治人士。
  背景的支持者，包括右派、左派、無政府主義者，甚至是非政治人士。與其他選擇不同，Bitcoin 並不局限於單一政治陣營、
  與其他方案不同的是，Bitcoin 並不局限於單一政治陣營，而是跨越了傳統的分野，使得左右二分法不足以正確定位 Bitcoin。
question: Miksi tekstin mukaan Bitcoin:ta on vaikea luokitella perinteiselle oikeisto-vasemmisto -akselille?
answer: Koska Bitcoin ylittää perinteiset jakolinjat ja houkuttelee kannattajia erilaisista poliittisista taustoista
wrong_answers:
  - Koska Bitcoin:ta kannattavat yksinomaan talousliberalismia kannattavat oikeistopersoonat.
  - Koska Bitcoin:n puolesta puhuvat pääasiassa vasemmisto, koska se voi edistää taloudellista osallisuutta.
  - Koska Bitcoin on neutraali teknologia, jolla ei ole poliittista ulottuvuutta.
explanation: |
  Tekstissä selitetään, että Bitcoin:tä on vaikea luokitella oikeisto-vasemmisto -akselille, koska tämä hajautettu teknologia houkuttelee kannattajia erilaisista poliittisista ryhmistä
  taustoista, mukaan lukien oikeisto, vasemmisto, anarkistit ja jopa epäpoliittiset henkilöt. Toisin kuin muut vaihtoehdot, Bitcoin ei rajoitu yhteen poliittiseen leiriin,
  vaan se ylittää perinteiset jakolinjat, minkä vuoksi oikeisto-vasemmisto ei riitä sen oikeaan sijoittamiseen.
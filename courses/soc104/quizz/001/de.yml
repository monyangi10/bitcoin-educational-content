question: Warum ist es dem Text zufolge schwierig, Bitcoin auf der traditionellen politischen Achse von rechts nach links einzuordnen?
answer: Weil Bitcoin traditionelle Grenzen überwindet und Anhänger mit unterschiedlichem politischen Hintergrund anzieht
wrong_answers:
  - Weil Bitcoin ausschließlich von rechtsgerichteten Persönlichkeiten unterstützt wird, die den Wirtschaftsliberalismus befürworten.
  - Denn Bitcoin wird hauptsächlich von der Linken wegen seines Potenzials für die finanzielle Eingliederung befürwortet.
  - Denn Bitcoin ist eine neutrale Technologie ohne politische Dimension.
explanation: |
  Der Text erklärt, dass Bitcoin schwer auf der Rechts-Links-Achse einzuordnen ist, da diese dezentralisierte Technologie Unterstützer mit unterschiedlichem politischen Hintergrund anzieht
  hintergrund anzieht, darunter Rechte, Linke, Anarchisten und sogar unpolitische Personen. Im Gegensatz zu anderen Optionen ist Bitcoin nicht auf ein einziges politisches Lager beschränkt,
  sondern überschreitet die traditionellen Grenzen, so dass die Dichotomie von rechts und links nicht ausreicht, um es richtig einzuordnen.
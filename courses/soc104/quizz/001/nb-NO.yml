question: Hvorfor er det ifølge teksten vanskelig å plassere Bitcoin på den tradisjonelle politiske høyre-venstre-aksen?
answer: Fordi Bitcoin overskrider tradisjonelle skillelinjer og tiltrekker seg støttespillere fra ulike politiske bakgrunner
wrong_answers:
  - Fordi Bitcoin utelukkende støttes av høyreorienterte personligheter som er tilhengere av økonomisk liberalisme.
  - Bitcoin er nemlig hovedsakelig forfektet av venstresiden på grunn av sitt potensial for økonomisk inkludering.
  - Fordi Bitcoin er en nøytral teknologi uten noen politisk dimensjon.
explanation: |
  Teksten forklarer at Bitcoin er vanskelig å klassifisere på høyre-venstre-aksen, ettersom denne desentraliserte teknologien tiltrekker seg tilhengere fra ulike politiske
  bakgrunn, inkludert høyre- og venstresiden, anarkister og til og med apolitiske individer. I motsetning til andre alternativer er Bitcoin ikke begrenset til én politisk leir,
  men krysser tradisjonelle skillelinjer, noe som gjør høyre-venstre-dikotomien utilstrekkelig for å plassere den riktig.
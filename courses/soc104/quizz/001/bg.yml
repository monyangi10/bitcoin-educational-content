question: Защо според текста е трудно да се класифицира Bitcoin по традиционната дясно-лява политическа ос?
answer: Тъй като Bitcoin преодолява традиционните разделения и привлича поддръжници от различни политически среди
wrong_answers:
  - Защото Bitcoin се подкрепя изключително от десни личности, които подкрепят икономическия либерализъм.
  - Тъй като Bitcoin е подкрепяна главно от левицата заради потенциала ѝ за финансово приобщаване.
  - Защото Bitcoin е неутрална технология без политическо измерение.
explanation: |
  В текста се обяснява, че Bitcoin трудно може да се класифицира по оста дясно-ляво, тъй като тази децентрализирана технология привлича поддръжници от различни политически
  десни, леви, анархисти и дори аполитични лица. За разлика от други варианти Bitcoin не се ограничава до един политически лагер,
  а пресича традиционните разделения, поради което дихотомията дясно-ляво не е подходяща за правилното ѝ позициониране.
question: Według tekstu, dlaczego trudno jest sklasyfikować Bitcoin na tradycyjnej osi politycznej prawica-lewica?
answer: Ponieważ Bitcoin przekracza tradycyjne podziały i przyciąga zwolenników z różnych środowisk politycznych
wrong_answers:
  - Ponieważ Bitcoin jest wspierany wyłącznie przez prawicowe osobistości opowiadające się za liberalizmem gospodarczym.
  - Ponieważ Bitcoin jest popierany głównie przez lewicę ze względu na jego potencjał w zakresie włączenia finansowego.
  - Ponieważ Bitcoin jest neutralną technologią bez wymiaru politycznego.
explanation: |
  W tekście wyjaśniono, że Bitcoin trudno jest sklasyfikować na osi prawica-lewica, ponieważ ta zdecentralizowana technologia przyciąga zwolenników z różnych środowisk politycznych, w tym prawicy, lewicy, anarchistów, a nawet osób apolitycznych
  środowisk politycznych, w tym prawicy, lewicy, anarchistów, a nawet osób apolitycznych. W przeciwieństwie do innych opcji, Bitcoin nie ogranicza się do jednego obozu politycznego,
  ale przekracza tradycyjne podziały, sprawiając, że dychotomia prawica-lewica jest nieadekwatna do jej prawidłowego umiejscowienia.
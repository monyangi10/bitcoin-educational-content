question: Según el texto, ¿por qué es difícil clasificar a Bitcoin en el eje político tradicional derecha-izquierda?
answer: Porque Bitcoin trasciende las divisiones tradicionales y atrae a partidarios de diversos orígenes políticos
wrong_answers:
  - Porque la Bitcoin está apoyada exclusivamente por personalidades de derechas favorables al liberalismo económico.
  - Porque la Bitcoin es defendida principalmente por la izquierda debido a su potencial para la inclusión financiera.
  - Porque Bitcoin es una tecnología neutral sin dimensión política.
explanation: |
  El texto explica que la Bitcoin es difícil de clasificar en el eje derecha-izquierda, ya que esta tecnología descentralizada atrae a partidarios de diversos orígenes políticos, como la derecha, la izquierda, los anarquistas e incluso personas apolíticas
  políticos diversos: de derechas, de izquierdas, anarquistas e incluso apolíticos. A diferencia de otras opciones, la Bitcoin no se limita a un único campo político,
  sino que atraviesa las divisiones tradicionales, por lo que la dicotomía derecha-izquierda resulta inadecuada para situarla correctamente.
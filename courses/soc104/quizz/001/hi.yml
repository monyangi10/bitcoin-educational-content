question: इस लेख के अनुसार, जीडब्ल्यू-0 को पारंपरिक दक्षिणपंथी-वामपंथी राजनीतिक धुरी पर वर्गीकृत करना क्यों मुश्किल है?
answer: क्योंकि प्रथम विश्व युद्ध पारंपरिक विभाजनों से परे है और विविध राजनीतिक पृष्ठभूमियों के समर्थकों को आकर्षित करता है।
wrong_answers:
  - क्योंकि Bitcoin को विशेष रूप से आर्थिक उदारवाद के समर्थक दक्षिणपंथी व्यक्तित्वों का समर्थन प्राप्त है।
  - क्योंकि Bitcoin का मुख्य रूप से वामपंथी समर्थन कर रहे हैं, क्योंकि इसमें वित्तीय समावेशन की क्षमता है।
  - क्योंकि Bitcoin एक तटस्थ तकनीक है जिसका कोई राजनीतिक आयाम नहीं है।
explanation: |
  इस लेख में बताया गया है कि Bitcoin को दक्षिणपंथी-वामपंथी श्रेणी में रखना कठिन है, क्योंकि यह विकेंद्रीकृत तकनीक विभिन्न राजनीतिक पृष्ठभूमियों के समर्थकों को आकर्षित करती है, जिनमें दक्षिणपंथी, वामपंथी, अराजकतावादी और यहां तक ​​कि गैर-राजनीतिक व्यक्ति भी शामिल हैं। अन्य विकल्पों के विपरीत, Bitcoin किसी एक राजनीतिक खेमे तक सीमित नहीं है,
  बल्कि पारंपरिक विभाजनों को पार करती है, जिससे दक्षिणपंथी-वामपंथी विभाजन इसे सही ढंग से परिभाषित करने के लिए अपर्याप्त हो जाता है।
question: Согласно тексту, почему трудно классифицировать Bitcoin по традиционной право-левой политической оси?
answer: Потому что Bitcoin преодолевает традиционные разногласия и привлекает сторонников из разных политических кругов
wrong_answers:
  - Потому что Bitcoin поддерживают исключительно правые деятели, выступающие за экономический либерализм.
  - Потому что за Bitcoin выступают в основном левые из-за его потенциала для финансовой доступности.
  - Потому что Bitcoin - это нейтральная технология, не имеющая политического аспекта.
explanation: |
  В тексте объясняется, что Bitcoin трудно классифицировать по оси "правый-левый", поскольку эта децентрализованная технология привлекает сторонников из разных политических кругов
  правые, левые, анархисты и даже аполитичные люди. В отличие от других вариантов, Bitcoin не ограничивается одним политическим лагерем,
  но преодолевает традиционные разделения, что делает дихотомию "правый-левый" неадекватной для ее правильного определения.
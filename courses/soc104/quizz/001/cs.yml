question: Proč je podle textu obtížné zařadit Bitcoin na tradiční pravolevou politickou osu?
answer: Protože Bitcoin překonává tradiční rozdíly a přitahuje příznivce z různých politických prostředí
wrong_answers:
  - Protože Bitcoin podporují výhradně pravicové osobnosti, které se hlásí k ekonomickému liberalismu.
  - Protože Bitcoin prosazuje především levice, a to kvůli jejímu potenciálu pro finanční začlenění.
  - Protože Bitcoin je neutrální technologie bez politického rozměru.
explanation: |
  Text vysvětluje, že Bitcoin je obtížné zařadit na pravolevou osu, protože tato decentralizovaná technologie přitahuje příznivce z různých politických stran
  včetně pravice, levice, anarchistů a dokonce i apolitických jedinců. Na rozdíl od jiných možností se Bitcoin neomezuje na jeden politický tábor,
  ale překračuje tradiční rozdělení, takže pravolevá dichotomie není pro její správné zařazení vhodná.
question: 根据文本，为什么很难将 Bitcoin 划分到传统的左右政治轴心上？
answer: 因为 Bitcoin 超越了传统分歧，吸引了来自不同政治背景的支持者
wrong_answers:
  - 因为 Bitcoin 只得到支持经济自由主义的右翼人士的支持。
  - 因为 Bitcoin 主要是由左派倡导的，因为它具有金融包容性的潜力。
  - 因为 Bitcoin 是一种中性技术，没有政治色彩。
explanation: |
  文中解释说，Bitcoin 很难在左右轴上进行分类，因为这种去中心化的技术吸引了来自不同政治背景的支持者，包括右派、左派、无政府主义者，甚至是非政治人士。
  支持者来自不同的政治背景，包括右派、左派、无政府主义者甚至非政治人士。与其他方案不同的是，Bitcoin 并不局限于单一政治阵营，而是跨越了传统的鸿沟，使其成为一种新的技术、
  与其他方案不同的是，Bitcoin 并不局限于一个政治阵营，而是跨越了传统的鸿沟，使得左右二分法不足以正确定位它。
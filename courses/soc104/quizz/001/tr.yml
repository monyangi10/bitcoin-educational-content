question: Metne göre, Bitcoin'ı geleneksel sağ-sol siyasi ekseninde sınıflandırmak neden zordur?
answer: Çünkü Bitcoin geleneksel ayrımları aşıyor ve farklı siyasi geçmişlerden gelen destekçileri kendine çekiyor
wrong_answers:
  - Çünkü Bitcoin sadece ekonomik liberalizm yanlısı sağcı şahsiyetler tarafından desteklenmektedir.
  - Çünkü Bitcoin, finansal kapsayıcılık potansiyeli nedeniyle çoğunlukla sol tarafından savunulmaktadır.
  - Çünkü Bitcoin siyasi boyutu olmayan tarafsız bir teknolojidir.
explanation: |
  Metin, Bitcoin'in sağ-sol ekseninde sınıflandırılmasının zor olduğunu, çünkü bu merkezi olmayan teknolojinin farklı siyasi görüşlerden destekçileri cezbettiğini açıklıyor
  sağcılar, solcular, anarşistler ve hatta apolitik bireyler de dahil olmak üzere. Diğer seçeneklerin aksine, Bitcoin tek bir siyasi kampla sınırlı değildir,
  ancak geleneksel ayrımları aşarak sağ-sol ikilemini doğru konumlandırmak için yetersiz kılmaktadır.
question: 本文によれば、なぜBitcoinを従来の右派・左派の政治軸で分類することが難しいのか？
answer: Bitcoinは伝統的な対立軸を超え、多様な政治的背景を持つ支持者を惹きつけるからだ。
wrong_answers:
  - Bitcoinは、経済自由主義を支持する右派の人々によってのみ支持されているからだ。
  - Bitcoinは主に左派によって支持されているが、その理由は金融包摂の可能性があるからだ。
  - Bitcoinは政治的な側面を持たない中立的な技術だからだ。
explanation: |
  この文章では、Bitcoinを右派・左派で分類するのは難しいと説明している。
  右派、左派、無政府主義者、さらには非政治的な個人など、多様な政治的背景を持つ支持者を惹きつけているからだ。他の選択肢とは異なり、Bitcoinは単一の政治陣営に限定されない、
  右派左派の二分法では正しく位置づけることができない。
question: Selon le texte, pourquoi est-il difficile de classer Bitcoin sur l'axe politique traditionnel droite-gauche?
answer: Parce que Bitcoin transcende les clivages traditionnels et attire des partisans de divers horizons politiques
wrong_answers:
  - Parce que Bitcoin est exclusivement soutenu par des personnalités de droite favorables au libéralisme économique
  - "Parce que Bitcoin est principalement défendu par la gauche en raison de son potentiel d'inclusion financière"
  - "Parce que Bitcoin est une technologie neutre qui n'a aucune dimension politique"
explanation: |
  Le texte explique que Bitcoin est difficile à classer sur l'axe droite-gauche car cette technologie décentralisée attire des partisans de divers horizons politiques, incluant la droite, la gauche, les anarchistes et même des individus apolitiques. Contrairement aux autres options, Bitcoin n'est pas limité à un seul camp politique mais traverse les clivages traditionnels, ce qui rend la dichotomie droite-gauche inadéquate pour le situer correctement.

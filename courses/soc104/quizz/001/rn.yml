question: Dushingiye ku canditswe, ni kuki bigoye gushiramwo Bitcoin ku nzira ya politike y’iburyo n’ibubamfu ya kera?
answer: Kuko Bitcoin irenze amacakubiri asanzwe kandi ikwegera abayishigikiye bava mu mice itandukanye ya politike .
wrong_answers:
  - Kuko Bitcoin ishigikiwe gusa n’abantu b’iburyo bashigikiye uburenganzira bwo kwidegemvya mu vy’ubutunzi.
  - Kuko Bitcoin ahanini ishigikirwa n’abanyabumoso kubera ubushobozi ifise bwo gushiramwo amafaranga.
  - Kuko Bitcoin ni ubuhinga butagira aho bugarukira ataco buvuze mu vya politike.
explanation: |
  Ico canditswe kirasigura ko Bitcoin igoye gushirwa mu migwi y’iburyo n’ibubamfu, kuko iyo tekinoloji yegerejwe ikwegera abayishigikiye bava mu bihugu bitandukanye vya politike .
  imico kama, harimwo iburyo, ibubamfu, abanyagitugu mbere n’abantu batagira politike. Mu buryo butandukanye n’izindi nzira, Bitcoin ntiyigarukira ku nkambi imwe ya politike gusa,
  ariko ijabuka amacakubiri y’imigenzo, igatuma amacakubiri y’iburyo n’ibubamfu adakwiriye kugira ngo ayishire ahantu habereye.
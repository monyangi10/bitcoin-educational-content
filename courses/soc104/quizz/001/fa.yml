question: بر اساس متن، چرا طبقه‌بندی Bitcoin در محور سیاسی سنتی راست-چپ دشوار است؟
answer: زیرا Bitcoin از مرزهای سنتی فراتر می‌رود و حامیانی از پیشینه‌های سیاسی متنوع را جذب می‌کند
wrong_answers:
  - زیرا Bitcoin به‌طور انحصاری توسط شخصیت‌های راست‌گرا که طرفدار لیبرالیسم اقتصادی هستند، حمایت می‌شود.
  - زیرا Bitcoin عمدتاً توسط جناح چپ حمایت می‌شود به دلیل پتانسیل آن برای شمول مالی.
  - زیرا Bitcoin یک فناوری بی‌طرف است که هیچ بُعد سیاسی ندارد.
explanation: |
  متن توضیح می‌دهد که Bitcoin طبقه‌بندی در محور راست-چپ را دشوار می‌سازد، زیرا این فناوری غیرمتمرکز حامیانی از پیشینه‌های سیاسی متنوع، از جمله راست، چپ، آنارشیست‌ها و حتی افراد غیرسیاسی را جذب می‌کند. برخلاف گزینه‌های دیگر، Bitcoin به یک اردوگاه سیاسی خاص محدود نمی‌شود، بلکه از تقسیمات سنتی عبور می‌کند و دوگانگی راست-چپ را برای موقعیت‌یابی صحیح آن ناکافی می‌سازد.
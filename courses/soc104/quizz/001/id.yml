question: Menurut teks tersebut, mengapa sulit untuk mengklasifikasikan Bitcoin pada poros politik kanan-kiri tradisional?
answer: Karena Bitcoin melampaui perpecahan tradisional dan menarik pendukung dari berbagai latar belakang politik
wrong_answers:
  - Karena Bitcoin secara eksklusif didukung oleh tokoh-tokoh sayap kanan yang mendukung liberalisme ekonomi.
  - Karena Bitcoin diperjuangkan terutama oleh kaum kiri karena potensinya untuk inklusi keuangan.
  - Karena Bitcoin adalah teknologi netral tanpa dimensi politik.
explanation: |
  Teks tersebut menjelaskan bahwa Bitcoin sulit untuk diklasifikasikan pada sumbu POLITIK kanan-kiri, karena teknologi terdesentralisasi ini menarik pendukung dari berbagai latar belakang politik
  politik yang beragam, termasuk kanan, kiri, anarkis, dan bahkan individu yang tidak berpolitik. Tidak seperti opsi lainnya, Bitcoin tidak terbatas pada satu kelompok politik,
  tetapi melintasi perpecahan tradisional, membuat pembagian kanan-kiri tidak relevan untuk menempatkannya dengan benar.

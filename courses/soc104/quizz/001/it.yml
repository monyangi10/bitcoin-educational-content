question: Secondo il testo, perché è difficile classificare il Bitcoin sul tradizionale asse politico destra-sinistra?
answer: Perché il Bitcoin trascende le divisioni tradizionali e attrae sostenitori da diversi contesti politici
wrong_answers:
  - Perché il Bitcoin è sostenuto esclusivamente da personalità di destra favorevoli al liberismo economico.
  - Perché il Bitcoin è sostenuto principalmente dalla sinistra per il suo potenziale di inclusione finanziaria.
  - Perché il Bitcoin è una tecnologia neutra, senza alcuna dimensione politica.
explanation: |
  Il testo spiega che il Bitcoin è difficile da classificare sull'asse destra-sinistra, poiché questa tecnologia decentralizzata attrae sostenitori da diversi contesti politici, tra cui destra, sinistra, anarchici e persino apolitici
  diversi contesti politici, tra cui la destra, la sinistra, gli anarchici e persino gli individui apolitici. A differenza di altre opzioni, il Bitcoin non è limitato a un singolo schieramento politico,
  ma attraversa le divisioni tradizionali, rendendo la dicotomia destra-sinistra inadeguata a collocarlo correttamente.
question: Nolan diyagramına göre, siyasi felsefeleri birbirinden ayıran temel faktör nedir?
answer: Kişisel ve ekonomik alanlarda insan eylemleri üzerindeki hükümet kontrolünün derecesi
wrong_answers:
  - Sosyalist ve kapitalist ekonomik sistemler arasındaki fark
  - Geleneksel ahlaki değerler ile ilerici sosyal görüşler arasındaki ayrım
  - Servetin yeniden dağıtılması ve sosyal programlara verilen destek düzeyi
explanation: |
  Nolan diyagramının ana fikri, siyasi felsefeler arasındaki temel farkın, insan eylemleri üzerindeki hükümet kontrolünün derecesi olduğudur
  hem kişisel hem de ekonomik alanlar. Bu da basit bir sol-sağ ekseninden ziyade iki boyutlu bir model yaratmaktadır. Diğer seçenekler siyaseti kategorize etmenin geleneksel yollarını temsil etmekle birlikte, hem solun hem de sağın devletçi olabileceği - sadece hükümet gücünü farklı alanlarda kullanmak istedikleri - temel içgörüsünü gözden kaçırmaktadır. Diyagram, gerçek ayrımın kendi değerlerini empoze etmek için güç kullanmak isteyenler (ister sol ister sağ olsun) ile genel olarak daha az hükümet kontrolünü tercih edenler arasında olduğunu ortaya koymaktadır.
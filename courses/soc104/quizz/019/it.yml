question: Secondo il diagramma di Nolan, qual è il fattore chiave che distingue le filosofie politiche?
answer: Il grado di controllo governativo sull'azione umana nella sfera personale ed economica
wrong_answers:
  - La differenza tra sistemi economici socialisti e capitalisti
  - La distinzione tra valori morali tradizionali e visioni sociali progressiste
  - Il livello di sostegno alla redistribuzione della ricchezza e ai programmi sociali
explanation: |
  L'idea centrale del diagramma di Nolan è che la differenza principale tra le filosofie politiche è il grado di controllo governativo sull'azione umana sia nella sfera personale che in quella economica
  sfera personale ed economica. Questo crea un modello bidimensionale piuttosto che un semplice asse sinistra-destra. Le altre opzioni rappresentano modi tradizionali di categorizzare la politica, ma non colgono l'aspetto chiave: sia la destra che la sinistra possono essere stataliste, ma vogliono solo usare il potere del governo in aree diverse. Il diagramma rivela che la vera distinzione è tra coloro che vogliono usare la forza per imporre i propri valori (che siano di destra o di sinistra) e coloro che preferiscono un minore controllo governativo in generale.
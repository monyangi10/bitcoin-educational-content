question: Dukurikije ikigereranyo ca Nolan, ni igiki nyamukuru gitandukanya filozofiya za politike?
answer: Urugero Leta igenzura ibikorwa vya muntu mu vy'umuntu ku giti ciwe no mu vy'ubutunzi
wrong_answers:
  - Itandukaniro hagati y'ubutunzi bw'abanyagihugu n'ubw'abanyagihugu
  - Itandukaniro hagati y'ingingo ngenderwako za kera n'ivyiyumviro vy'imibano bitera imbere
  - Urugero rw'ugushigikira ugusubira gusangira ubutunzi n'imigambi y'imibano
explanation: |
  Iciyumviro nyamukuru c’ikigereranyo ca Nolan ni uko itandukaniro rikomeye hagati ya filozofiya za politike ari urugero Leta igenzura ibikorwa vy’abantu mu 1914. 
  mu vy’umuntu ku giti ciwe no mu vy’ubutunzi. Ivyo bituma habaho ikigereranyo c’ingero zibiri aho kuba gusa umurongo woroshe w’ibubamfu n’iburyo. Ayandi mahitamwo agereranya uburyo bwa kera bwo gushikiriza politike mu migwi ariko akabura ubumenyi nyamukuru bw’uko ibubamfu n’iburyo bishobora kuba ivy’imibare - bishaka gusa gukoresha ububasha bwa Leta mu bice bitandukanye. Ico kigereranyo kirerekana ko itandukaniro nyaryo riri hagati y’abashaka gukoresha inguvu kugira ngo bategeke ingingo ngenderwako zabo (yaba ibubamfu canke iburyo) n’abashaka ko Leta idashobora kubagenzura muri rusangi.
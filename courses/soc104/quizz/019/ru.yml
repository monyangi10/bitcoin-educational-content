question: Согласно диаграмме Нолана, что является ключевым фактором, который отличает политические философии?
answer: Степень государственного контроля над действиями человека в личной и экономической сферах
wrong_answers:
  - Разница между социалистической и капиталистической экономическими системами
  - Различие между традиционными моральными ценностями и прогрессивными социальными взглядами
  - Уровень поддержки перераспределения богатства и социальных программ
explanation: |
  Главная идея диаграммы Нолана заключается в том, что основное различие между политическими философиями заключается в степени правительственного контроля над действиями человека в
  личной и экономической сферах. Это создает двухмерную модель, а не простую ось "левый-правый". Другие варианты представляют собой традиционные способы классификации политики, но упускают из виду ключевой момент: и левые, и правые могут быть статистами - они просто хотят использовать государственную власть в разных областях. Диаграмма показывает, что реальное различие существует между теми, кто хочет использовать силу для навязывания своих ценностей (неважно, левые или правые), и теми, кто предпочитает меньший государственный контроль в целом.
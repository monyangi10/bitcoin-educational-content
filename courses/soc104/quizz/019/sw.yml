question: Kulingana na mchoro wa Nolan, ni jambo gani muhimu linalotofautisha falsafa za kisiasa?
answer: Kiwango cha udhibiti wa serikali juu ya vitendo vya binadamu katika nyanja za kibinafsi na kiuchumi
wrong_answers:
  - Tofauti kati ya mifumo ya kiuchumi ya kijamaa na kibepari
  - Tofauti kati ya maadili ya kitamaduni na mitazamo ya kijamii inayoendelea
  - Kiwango cha usaidizi kwa ajili ya ugawaji wa utajiri na programu za kijamii
explanation: |
  Wazo kuu la mchoro wa Nolan ni kwamba tofauti kubwa kati ya falsafa za kisiasa ni kiwango cha udhibiti wa kiserikali juu ya vitendo vya binadamu katika nyanja za kibinafsi na kiuchumi. Hii huunda mfumo wa pande mbili badala ya mhimili rahisi wa kushoto-kulia. Chaguzi zingine zinawakilisha njia za kitamaduni za kuainisha siasa lakini zinakosa ufahamu muhimu kwamba pande zote mbili za kushoto na kulia zinaweza kuwa za kitakwimu - wanataka tu kutumia nguvu za serikali katika maeneo tofauti. Mchoro unaonyesha kwamba tofauti halisi ni kati ya wale wanaotaka kutumia nguvu kulazimisha maadili yao (iwe ya kushoto au kulia) na wale wanaopendelea udhibiti mdogo wa kiserikali kwa ujumla.

question: Mikä on Nolanin kaavion mukaan keskeinen tekijä, joka erottaa poliittiset filosofiat toisistaan?
answer: Ihmisten toimintaan henkilökohtaisella ja taloudellisella tasolla kohdistuvan valtiollisen valvonnan aste
wrong_answers:
  - Sosialistisen ja kapitalistisen talousjärjestelmän välinen ero
  - Perinteisten moraalisten arvojen ja edistyksellisten yhteiskunnallisten näkemysten välinen ero
  - Varallisuuden uudelleenjaon ja sosiaalisten ohjelmien kannatuksen taso
explanation: |
  Nolanin kaavion keskeinen ajatus on, että suurin ero poliittisten filosofioiden välillä on se, missä määrin hallitus valvoo ihmisten toimintaa
  sekä henkilökohtaisella että taloudellisella tasolla. Tämä luo kaksiulotteisen mallin yksinkertaisen vasen-oikea -akselin sijaan. Muut vaihtoehdot edustavat perinteisiä tapoja luokitella politiikkaa, mutta niistä puuttuu se keskeinen oivallus, että sekä vasemmisto että oikeisto voivat olla valtiovaltaisia - he vain haluavat käyttää hallituksen valtaa eri aloilla. Kaavio paljastaa, että todellinen ero on niiden välillä, jotka haluavat käyttää voimaa arvojensa ajamiseen (olivatpa he sitten vasemmistolaisia tai oikeistolaisia), ja niiden välillä, jotka haluavat yleisesti ottaen vähemmän valtiollista valvontaa.
question: Кой е основният фактор, който разграничава политическите философии, според схемата на Нолан?
answer: Степента на правителствен контрол върху човешките действия в личната и икономическата сфера
wrong_answers:
  - Разликата между социалистическата и капиталистическата икономическа система
  - Разликата между традиционните морални ценности и прогресивните социални възгледи
  - Равнището на подкрепа за преразпределение на богатството и социални програми
explanation: |
  Основната идея на Нолановата диаграма е, че основната разлика между политическите философии е степента на правителствен контрол върху човешките действия в
  както в личната, така и в икономическата сфера. Това създава двуизмерен модел, а не просто проста ос ляво-дясно. Другите варианти представляват традиционни начини за категоризиране на политиката, но пропускат ключовото прозрение, че и левите, и десните могат да бъдат етатисти - те просто искат да използват държавната власт в различни области. Диаграмата разкрива, че истинското разграничение е между тези, които искат да използват сила, за да наложат своите ценности (независимо дали са леви или десни), и тези, които предпочитат по-малък правителствен контрол като цяло.
question: 根据诺兰图，区分政治哲学的关键因素是什么？
answer: 政府在个人和经济领域对人类行动的控制程度
wrong_answers:
  - 社会主义经济制度与资本主义经济制度的区别
  - 传统道德价值观与进步社会观点之间的区别
  - 对财富再分配和社会计划的支持程度
explanation: |
  诺兰图的中心思想是，政治哲学之间的主要区别在于政府对人类在个人和经济领域的行为的控制程度。
  这就形成了一个二维模型，而不仅仅是一个简单的左右轴。这就形成了一个二维模型，而不仅仅是一个简单的左右轴。其他选项代表了传统的政治分类方法，但却忽略了一个关键的观点，即左派和右派都可能是国家主义者--他们只是希望在不同的领域使用政府权力。该图揭示出，真正的区别在于那些希望使用武力强加其价值观的人（无论左派还是右派）和那些总体上倾向于减少政府控制的人。
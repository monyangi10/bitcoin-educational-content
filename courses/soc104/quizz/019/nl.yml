question: Wat is volgens het Nolan-diagram de belangrijkste factor die politieke filosofieën van elkaar onderscheidt?
answer: De mate van overheidscontrole over menselijk handelen op persoonlijk en economisch gebied
wrong_answers:
  - Het verschil tussen socialistische en kapitalistische economische systemen
  - Het onderscheid tussen traditionele morele waarden en progressieve sociale opvattingen
  - De mate van steun voor herverdeling van rijkdom en sociale programma's
explanation: |
  Het centrale idee van het Nolan-diagram is dat het grootste verschil tussen politieke filosofieën de mate van overheidscontrole is over het menselijk handelen op zowel persoonlijk als economisch gebied
  zowel op persoonlijk als op economisch gebied. Dit creëert een tweedimensionaal model in plaats van een eenvoudige links-rechts as. De andere opties vertegenwoordigen traditionele manieren om politiek te categoriseren, maar missen het belangrijke inzicht dat zowel links als rechts statistisch kunnen zijn - ze willen alleen overheidsmacht op verschillende gebieden gebruiken. Het diagram laat zien dat het echte onderscheid ligt tussen degenen die geweld willen gebruiken om hun waarden op te leggen (of ze nu links of rechts zijn) en degenen die de voorkeur geven aan minder overheidscontrole in het algemeen.
question: De acordo com o diagrama de Nolan, qual é o principal fator que distingue as filosofias políticas?
answer: O grau de controlo governamental sobre a ação humana nas esferas pessoal e económica
wrong_answers:
  - A diferença entre os sistemas económicos socialista e capitalista
  - A distinção entre os valores morais tradicionais e as perspectivas sociais progressistas
  - O nível de apoio à redistribuição da riqueza e aos programas sociais
explanation: |
  A ideia central do diagrama de Nolan é que a principal diferença entre as filosofias políticas é o grau de controlo governamental sobre a ação humana nas esferas pessoal e económica
  ação humana, tanto na esfera pessoal como na económica. Isto cria um modelo bidimensional em vez de um simples eixo esquerda-direita. As outras opções representam formas tradicionais de categorizar a política, mas não compreendem a ideia fundamental de que tanto a esquerda como a direita podem ser estatistas - apenas querem utilizar o poder do governo em áreas diferentes. O diagrama revela que a verdadeira distinção é entre aqueles que querem usar a força para impor os seus valores (sejam de esquerda ou de direita) e aqueles que preferem menos controlo governamental em geral.
question: 놀란 다이어그램에 따르면 정치 철학을 구분하는 핵심 요소는 무엇인가요?
answer: 개인 및 경제 영역에서 인간의 행동에 대한 정부의 통제 정도
wrong_answers:
  - 사회주의와 자본주의 경제 시스템의 차이점
  - 전통적인 도덕적 가치와 진보적 사회관 사이의 차이점
  - 부의 재분배 및 사회 프로그램에 대한 지원 수준
explanation: |
  놀란 다이어그램의 핵심 아이디어는 정치 철학의 주요 차이점은 개인과 경제 영역에서 인간의 행동에 대한 정부의 통제 정도라는 것입니다
  정부의 통제 정도라는 것입니다. 이를 통해 단순한 좌우 축이 아닌 2차원 모델이 만들어집니다. 다른 옵션은 정치를 분류하는 전통적인 방법을 나타내지만 좌파와 우파 모두 통계적일 수 있다는 핵심 통찰을 놓치고 있으며, 단지 서로 다른 영역에서 정부 권력을 사용하고자 할 뿐입니다. 이 다이어그램은 좌파든 우파든 자신의 가치를 강요하기 위해 무력을 사용하려는 사람들과 전반적으로 정부의 통제를 덜 선호하는 사람들 사이의 진정한 구분이 있음을 보여줍니다.
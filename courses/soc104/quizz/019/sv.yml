question: Enligt Nolan-diagrammet, vilken är den viktigaste faktorn som skiljer politiska filosofier åt?
answer: Graden av statlig kontroll över människors agerande på det personliga och ekonomiska planet
wrong_answers:
  - Skillnaden mellan socialistiska och kapitalistiska ekonomiska system
  - Skillnaden mellan traditionella moraliska värderingar och progressiva samhällssyn
  - Nivån på stödet för omfördelning av förmögenheter och sociala program
explanation: |
  Nolan-diagrammets centrala idé är att den största skillnaden mellan politiska filosofier är graden av statlig kontroll över mänskligt handlande i
  både personliga och ekonomiska sfärer. Detta skapar en tvådimensionell modell snarare än bara en enkel vänster-höger-axel. De andra alternativen representerar traditionella sätt att kategorisera politik men missar den viktiga insikten att både vänster och höger kan vara statstrogna - de vill bara använda regeringsmakten inom olika områden. Diagrammet visar att den verkliga skillnaden går mellan dem som vill använda våld för att genomdriva sina värderingar (oavsett om det är vänster eller höger) och dem som föredrar mindre statlig kontroll överlag.
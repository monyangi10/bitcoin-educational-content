question: 根據 Nolan 圖表，區別政治哲學的關鍵因素是什麼？
answer: 政府在個人和經濟領域對人類行動的控制程度
wrong_answers:
  - 社會主義與資本主義經濟制度的差異
  - 傳統道德價值與進步社會觀點的區別
  - 支持財富再分配和社會計畫的程度
explanation: |
  Nolan 圖表的中心思想是，政治哲學之間的主要差異在於政府對人類在個人與經濟領域的行為的控制程度。
  在個人和經濟領域。這創造了一個二維模型，而不只是一個簡單的左右軸。其他選項代表了傳統的政治分類方式，但忽略了一個關鍵的洞察，即左派和右派都可能是國家主義者 - 他們只是希望在不同領域使用政府權力。這個圖表揭示了真正的區別在於那些想要使用武力強加其價值觀的人（無論是左派或右派），以及那些整體上喜歡較少政府控制的人。
question: According to the Nolan diagram, what is the key factor that distinguishes political philosophies?
answer: The degree of governmental control over human action in personal and economic spheres
wrong_answers:
  - The difference between socialist and capitalist economic systems
  - The distinction between traditional moral values and progressive social views
  - The level of support for wealth redistribution and social programs
explanation: |
  The Nolan diagram's central idea is that the major difference between political philosophies is the degree of governmental control over human action in both personal and economic spheres. This creates a two-dimensional model rather than just a simple left-right axis. The other options represent traditional ways of categorizing politics but miss the key insight that both left and right can be statist - they just want to use government power in different areas. The diagram reveals that the real distinction is between those who want to use force to impose their values (whether left or right) and those who prefer less governmental control overall.
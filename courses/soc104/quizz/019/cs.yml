question: Jaký je podle Nolanova diagramu klíčový faktor, který odlišuje politické filozofie?
answer: Míra vládní kontroly nad lidským jednáním v osobní a ekonomické sféře
wrong_answers:
  - Rozdíl mezi socialistickým a kapitalistickým ekonomickým systémem
  - Rozdíl mezi tradičními morálními hodnotami a progresivními sociálními názory
  - Míra podpory přerozdělování bohatství a sociálních programů
explanation: |
  Ústřední myšlenkou Nolanova diagramu je, že hlavní rozdíl mezi politickými filozofiemi spočívá v míře vládní kontroly nad lidským jednáním v oblasti politiky
  jak v osobní, tak v ekonomické sféře. To vytváří dvourozměrný model, nikoli pouze jednoduchou osu levice-pravice. Ostatní možnosti představují tradiční způsoby kategorizace politiky, ale postrádají klíčový poznatek, že jak levice, tak pravice mohou být etatistické - chtějí pouze využívat vládní moc v různých oblastech. Diagram odhaluje, že skutečný rozdíl je mezi těmi, kteří chtějí používat sílu k prosazování svých hodnot (ať už jde o levici, nebo pravici), a těmi, kteří celkově preferují menší vládní kontrolu.
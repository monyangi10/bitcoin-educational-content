question: नोलन आरेख के अनुसार, राजनीतिक दर्शनों को अलग करने वाला प्रमुख कारक क्या है?
answer: व्यक्तिगत और आर्थिक क्षेत्रों में मानवीय कार्यों पर सरकारी नियंत्रण की सीमा
wrong_answers:
  - समाजवादी और पूंजीवादी आर्थिक प्रणालियों के बीच अंतर
  - परंपरागत नैतिक मूल्यों और प्रगतिशील सामाजिक विचारों के बीच का अंतर
  - धन के पुनर्वितरण और सामाजिक कार्यक्रमों के लिए समर्थन का स्तर
explanation: |
  नोलन आरेख का मूल विचार यह है कि राजनीतिक दर्शनों के बीच प्रमुख अंतर व्यक्तिगत और आर्थिक दोनों क्षेत्रों में मानवीय क्रियाओं पर सरकारी नियंत्रण की मात्रा में निहित है। इससे एक सरल वाम-दक्षिण अक्ष के बजाय एक द्वि-आयामी मॉडल बनता है। अन्य विकल्प राजनीति को वर्गीकृत करने के पारंपरिक तरीकों को दर्शाते हैं, लेकिन इस महत्वपूर्ण अंतर्दृष्टि को नज़रअंदाज़ कर देते हैं कि वामपंथी और दक्षिणपंथी दोनों ही सत्तावादी हो सकते हैं - वे केवल अलग-अलग क्षेत्रों में सरकारी शक्ति का उपयोग करना चाहते हैं। आरेख से पता चलता है कि वास्तविक अंतर उन लोगों के बीच है जो अपने मूल्यों को थोपने के लिए बल का प्रयोग करना चाहते हैं (चाहे वामपंथी हों या दक्षिणपंथी) और उन लोगों के बीच जो समग्र रूप से कम सरकारी नियंत्रण पसंद करते हैं।
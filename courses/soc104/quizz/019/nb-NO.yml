question: Hva er ifølge Nolan-diagrammet den viktigste faktoren som skiller politiske filosofier fra hverandre?
answer: Graden av statlig kontroll over menneskelige handlinger på det personlige og økonomiske området
wrong_answers:
  - Forskjellen mellom sosialistiske og kapitalistiske økonomiske systemer
  - Skillet mellom tradisjonelle moralske verdier og progressive samfunnssyn
  - Støtten til omfordeling av rikdom og sosiale programmer
explanation: |
  Nolan-diagrammets hovedtanke er at den største forskjellen mellom politiske filosofier er graden av statlig kontroll over menneskelige handlinger i
  både personlige og økonomiske sfærer. Dette skaper en todimensjonal modell i stedet for bare en enkel venstre-høyre-akse. De andre alternativene representerer tradisjonelle måter å kategorisere politikk på, men går glipp av den viktige innsikten at både høyre- og venstresiden kan være etatistiske - de ønsker bare å bruke statsmakten på ulike områder. Diagrammet avslører at det virkelige skillet går mellom dem som ønsker å bruke makt for å påtvinge sine verdier (enten det er venstre- eller høyresiden), og dem som foretrekker mindre statlig kontroll generelt.
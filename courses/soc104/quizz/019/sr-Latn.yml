question: Prema Nolanovom dijagramu, ključni faktor koji razlikuje političke filozofije je odnos prema ličnim i ekonomskim slobodama.
answer: Stepen vladine kontrole nad ljudskim delovanjem u ličnim i ekonomskim sferama
wrong_answers:
  - Razlika između socijalističkih i kapitalističkih ekonomskih sistema
  - Razlika između tradicionalnih moralnih vrednosti i progresivnih društvenih pogleda
  - Nivo podrške za preraspodelu bogatstva i socijalne programe
explanation: |
  Centralna ideja Nolanovog dijagrama je da je glavna razlika između političkih filozofija stepen vladine kontrole nad ljudskim delovanjem u ličnoj i ekonomskoj sferi. Ovo stvara dvodimenzionalni model umesto jednostavne levo-desno ose. Ostale opcije predstavljaju tradicionalne načine kategorizacije politike, ali propuštaju ključni uvid da i levica i desnica mogu biti etatističke - samo žele da koriste moć vlade u različitim oblastima. Dijagram otkriva da je prava razlika između onih koji žele da koriste silu za nametanje svojih vrednosti (bilo levo ili desno) i onih koji preferiraju manju vladinu kontrolu uopšte.
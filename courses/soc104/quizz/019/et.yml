question: Milline on Nolani diagrammi kohaselt peamine tegur, mis eristab poliitilisi filosoofiaid?
answer: Valitsuse kontrolli ulatus inimeste tegevuse üle isiklikul ja majanduslikul tasandil
wrong_answers:
  - Erinevus sotsialistliku ja kapitalistliku majandussüsteemi vahel
  - Traditsiooniliste moraaliväärtuste ja progressiivsete sotsiaalsete vaadete eristamine
  - Toetuse tase rikkuse ümberjaotamisele ja sotsiaalprogrammidele
explanation: |
  Nolani diagrammi keskne mõte on, et peamine erinevus poliitiliste filosoofiate vahel on valitsuse kontrolli ulatus inimeste tegevuse üle, mis on
  nii isiklikus kui ka majanduslikus sfääris. See loob pigem kahemõõtmelise mudeli kui lihtsa vasak-parempoolse telje. Teised variandid esindavad traditsioonilisi viise poliitika liigitamiseks, kuid jätavad tähelepanuta põhilise arusaama, et nii vasak- kui ka parempoolsed võivad olla statistilised - nad lihtsalt tahavad kasutada valitsuse võimu erinevates valdkondades. Diagramm näitab, et tegelik erinevus on nende vahel, kes tahavad kasutada jõudu oma väärtuste kehtestamiseks (kas vasakpoolsed või parempoolsed), ja nende vahel, kes eelistavad üldiselt vähem valitsuslikku kontrolli.
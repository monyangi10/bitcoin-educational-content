question: ตามแผนภาพโนแลน ปัจจัยสำคัญที่แยกแยะปรัชญาทางการเมืองคืออะไร?
answer: ระดับของการควบคุมโดยรัฐบาลต่อการกระทำของมนุษย์ในด้านส่วนบุคคลและเศรษฐกิจ
wrong_answers:
  - ความแตกต่างระหว่างระบบเศรษฐกิจสังคมนิยมและทุนนิยม
  - ความแตกต่างระหว่างค่านิยมทางศีลธรรมแบบดั้งเดิมและมุมมองทางสังคมแบบก้าวหน้า
  - ระดับการสนับสนุนการกระจายความมั่งคั่งและโครงการสังคม
explanation: |
  แนวคิดหลักของแผนภาพโนแลนคือความแตกต่างที่สำคัญระหว่างปรัชญาทางการเมืองคือระดับของการควบคุมโดยรัฐบาลต่อการกระทำของมนุษย์ในทั้งด้านส่วนบุคคลและเศรษฐกิจ สิ่งนี้สร้างแบบจำลองสองมิติแทนที่จะเป็นเพียงแกนซ้าย-ขวาแบบง่ายๆ ตัวเลือกอื่นๆ แสดงถึงวิธีการดั้งเดิมในการจัดหมวดหมู่การเมืองแต่พลาดการเข้าใจที่สำคัญว่าทั้งซ้ายและขวาสามารถเป็นรัฐนิยมได้ - พวกเขาเพียงแค่ต้องการใช้พลังของรัฐบาลในพื้นที่ที่แตกต่างกัน แผนภาพนี้เผยให้เห็นว่าความแตกต่างที่แท้จริงคือระหว่างผู้ที่ต้องการใช้กำลังเพื่อบังคับใช้ค่านิยมของตน (ไม่ว่าจะซ้ายหรือขวา) และผู้ที่ชอบการควบคุมโดยรัฐบาลน้อยลงโดยรวม
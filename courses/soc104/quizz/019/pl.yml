question: Zgodnie z diagramem Nolana, jaki jest kluczowy czynnik, który odróżnia filozofie polityczne?
answer: Stopień rządowej kontroli nad ludzkimi działaniami w sferze osobistej i gospodarczej
wrong_answers:
  - Różnica między socjalistycznym a kapitalistycznym systemem gospodarczym
  - Rozróżnienie między tradycyjnymi wartościami moralnymi a postępowymi poglądami społecznymi
  - Poziom poparcia dla redystrybucji bogactwa i programów socjalnych
explanation: |
  Główną ideą diagramu Nolana jest to, że główną różnicą między filozofiami politycznymi jest stopień rządowej kontroli nad ludzkimi działaniami w sferze osobistej i ekonomicznej
  zarówno w sferze osobistej, jak i ekonomicznej. Tworzy to dwuwymiarowy model, a nie tylko prostą oś lewa-prawa. Pozostałe opcje reprezentują tradycyjne sposoby kategoryzowania polityki, ale brakuje im kluczowego spostrzeżenia, że zarówno lewica, jak i prawica mogą być etatystyczne - po prostu chcą wykorzystywać władzę rządową w różnych obszarach. Diagram ujawnia, że prawdziwe rozróżnienie jest między tymi, którzy chcą użyć siły, aby narzucić swoje wartości (czy to z lewej, czy z prawej strony), a tymi, którzy wolą ogólnie mniejszą kontrolę rządową.
question: Menurut diagram Nolan, apa faktor kunci yang membedakan filosofi politik?
answer: Tingkat kontrol pemerintah atas tindakan manusia dalam bidang pribadi dan ekonomi
wrong_answers:
  - Perbedaan antara sistem ekonomi sosialis dan kapitalis
  - Perbedaan antara nilai-nilai moral tradisional dan pandangan sosial yang progresif
  - Tingkat dukungan untuk redistribusi kekayaan dan program sosial
explanation: |
  Ide utama dari diagram Nolan adalah bahwa perbedaan utama antara filosofi politik adalah tingkat kontrol pemerintah terhadap tindakan manusia dalam
  baik dalam bidang pribadi maupun ekonomi. Hal ini menciptakan model dua dimensi dan bukan hanya sumbu kiri-kanan yang sederhana. Pilihan lainnya mewakili cara-cara tradisional dalam mengkategorikan politik tetapi kehilangan wawasan utama bahwa baik kiri maupun kanan dapat menjadi negarawan - mereka hanya ingin menggunakan kekuasaan pemerintah di bidang yang berbeda. Diagram ini mengungkapkan bahwa perbedaan yang sebenarnya adalah antara mereka yang ingin menggunakan kekuatan untuk memaksakan nilai-nilai mereka (baik kiri maupun kanan) dan mereka yang lebih memilih kontrol pemerintah yang lebih sedikit secara keseluruhan.
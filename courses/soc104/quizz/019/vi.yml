question: Theo sơ đồ Nolan, yếu tố then chốt nào phân biệt các triết lý chính trị?
answer: Mức độ kiểm soát của chính phủ đối với hành động của con người trong các lĩnh vực cá nhân và kinh tế.
wrong_answers:
  - Sự khác biệt giữa hệ thống kinh tế xã hội chủ nghĩa và hệ thống kinh tế tư bản chủ nghĩa
  - Sự khác biệt giữa các giá trị đạo đức truyền thống và quan điểm xã hội tiến bộ
  - Mức độ ủng hộ đối với việc phân phối lại của cải và các chương trình xã hội
explanation: |
  Ý tưởng trung tâm của sơ đồ Nolan là sự khác biệt chính giữa các triết lý chính trị nằm ở mức độ kiểm soát của chính phủ đối với hành động của con người trong cả lĩnh vực cá nhân và kinh tế. Điều này tạo ra một mô hình hai chiều thay vì chỉ là một trục trái-phải đơn giản. Các lựa chọn khác thể hiện cách phân loại chính trị truyền thống nhưng bỏ qua nhận định quan trọng rằng cả cánh tả và cánh hữu đều có thể là những người ủng hộ nhà nước - họ chỉ muốn sử dụng quyền lực của chính phủ trong các lĩnh vực khác nhau. Sơ đồ cho thấy sự khác biệt thực sự nằm giữa những người muốn sử dụng vũ lực để áp đặt giá trị của họ (cho dù là cánh tả hay cánh hữu) và những người thích sự kiểm soát của chính phủ ít hơn nói chung.
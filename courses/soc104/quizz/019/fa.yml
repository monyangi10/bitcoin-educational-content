question: بر اساس نمودار نولان، عامل کلیدی که فلسفه‌های سیاسی را متمایز می‌کند چیست؟
answer: میزان کنترل دولتی بر اقدامات انسانی در حوزه‌های شخصی و اقتصادی
wrong_answers:
  - تفاوت بین سیستم‌های اقتصادی سوسیالیستی و سرمایه‌داری
  - تفاوت بین ارزش‌های اخلاقی سنتی و دیدگاه‌های اجتماعی پیشرو
  - سطح حمایت از توزیع مجدد ثروت و برنامه‌های اجتماعی
explanation: |
  ایده مرکزی نمودار نولان این است که تفاوت اصلی بین فلسفه‌های سیاسی، میزان کنترل دولت بر اقدامات انسانی در هر دو حوزه شخصی و اقتصادی است. این امر یک مدل دو بعدی ایجاد می‌کند، نه فقط یک محور ساده چپ-راست. گزینه‌های دیگر نمایانگر روش‌های سنتی دسته‌بندی سیاست هستند اما نکته کلیدی را از دست می‌دهند که هم چپ و هم راست می‌توانند دولت‌گرا باشند - آنها فقط می‌خواهند از قدرت دولت در حوزه‌های مختلف استفاده کنند. نمودار نشان می‌دهد که تمایز واقعی بین کسانی است که می‌خواهند با زور ارزش‌های خود را تحمیل کنند (چه چپ و چه راست) و کسانی که ترجیح می‌دهند کنترل دولت به طور کلی کمتر باشد.
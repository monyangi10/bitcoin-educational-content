question: ノーラン図によると、政治哲学を区別する重要な要素は何か？
answer: 個人的・経済的領域における人間の行動に対する政府の統制の程度
wrong_answers:
  - 社会主義経済システムと資本主義経済システムの違い
  - 伝統的な道徳観と進歩的な社会観の区別
  - 富の再分配と社会的プログラムに対する支持の度合い
explanation: |
  ノーラン・ダイアグラムの中心的な考え方は、政治哲学間の大きな違いは、個人と経済の両分野における人間の行動に対する政府のコントロールの度合いであるということである。
  個人的な領域と経済的な領域の両方においてこれにより、単純な左右軸ではなく、2次元のモデルが出来上がる。他の選択肢は、政治を分類する伝統的な方法を表しているが、左派も右派も国家主義になりうるという重要な洞察を見逃している。この図は、本当の区別は、（左派であれ右派であれ）自分たちの価値観を押し付けるために力を使いたい人々と、全体として政府の支配が少ないことを好む人々の間にあることを明らかにしている。
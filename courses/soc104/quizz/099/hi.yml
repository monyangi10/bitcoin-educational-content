question: एरिक ह्यूजेस के Cypherpunk घोषणापत्र के अनुसार, कौन सा मौलिक दृष्टिकोण साइफरपंक को उन लोगों से अलग करता है जो केवल गोपनीयता संरक्षण की आशा रखते हैं?
answer: वे गोपनीयता प्रदान करने के लिए संस्थानों की प्रतीक्षा करने के बजाय क्रिप्टोग्राफिक सिस्टम बनाने के लिए सक्रिय रूप से कोड लिखते हैं।
wrong_answers:
  - वे संवैधानिक निजता अधिकारों की स्थापना के लिए राजनीतिक पैरवी और कानूनी सुधारों पर ध्यान केंद्रित करते हैं।
  - वे अकादमिक शोध और प्रकाशनों के माध्यम से जनता को निगरानी के जोखिमों के बारे में शिक्षित करने को प्राथमिकता देते हैं।
  - वे मौजूदा वित्तीय संस्थानों के भीतर काम करते हुए धीरे-धीरे गोपनीयता बनाए रखने वाली तकनीकों को लागू करते हैं।
explanation: |
  एरिक ह्यूजेस ने स्पष्ट रूप से कहा कि 'साइफरपंक कोड लिखते हैं' और यही उनकी मुख्य कार्यप्रणाली है। घोषणापत्र में इस बात पर ज़ोर दिया गया है कि साइफरपंक गोपनीयता सुरक्षा प्रदान करने के लिए सरकारों, निगमों या अन्य संगठनों का इंतज़ार नहीं करते।
  इसके बजाय, वे क्रिप्टोग्राफिक उपकरण और विकेंद्रीकृत प्रणालियाँ बनाकर सीधे कार्रवाई करते हैं। निष्क्रिय आशा या संस्थागत सुधार के बजाय, सक्रिय निर्माण का यह दृष्टिकोण Bitcoin जैसे नवाचारों की नींव बना, जो पारंपरिक सत्ता संरचनाओं से बाहर वैकल्पिक प्रणालियाँ बनाने के उनके दर्शन को दर्शाता है।
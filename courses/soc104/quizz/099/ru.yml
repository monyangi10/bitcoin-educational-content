question: Согласно "Манифесту Cypherpunk" Эрика Хьюза, какой фундаментальный подход отличает шифропанков от тех, кто просто надеется на защиту частной жизни?
answer: Они активно пишут код для создания криптографических систем, а не ждут, пока институты обеспечат конфиденциальность
wrong_answers:
  - Они сосредоточены на политическом лоббировании и правовых реформах, направленных на установление конституционных прав на неприкосновенность частной жизни
  - Они уделяют первостепенное внимание информированию общественности о рисках, связанных с эпиднадзором, посредством научных исследований и публикаций
  - Они работают в рамках существующих финансовых учреждений, постепенно внедряя технологии сохранения конфиденциальности
explanation: |
  Эрик Хьюз прямо заявил, что "киберпанки пишут код" - это их определяющая методология. В манифесте подчеркивается, что киберпанки не ждут, пока правительства, корпорации или другие организации обеспечат защиту конфиденциальности.
  Вместо этого они предпринимают непосредственные действия, создавая криптографические инструменты и децентрализованные системы. Этот активный подход к строительству, а не пассивные надежды или институциональные реформы, стал основой для таких инноваций, как Bitcoin, в которых воплотилась их философия построения альтернативных систем вне традиционных структур власти.
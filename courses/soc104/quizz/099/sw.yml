question: Kulingana na Ilani ya Cypherpunk ya Eric Hughes, ni mbinu gani ya msingi inayowatofautisha watu wasioamini sheria na wale wanaotumaini tu ulinzi wa faragha?
answer: Wanaandika msimbo kikamilifu ili kujenga mifumo ya kriptografia badala ya kusubiri taasisi zitoe faragha
wrong_answers:
  - Wanazingatia ushawishi wa kisiasa na mageuzi ya kisheria ili kuanzisha haki za faragha za kikatiba
  - Wanaweka kipaumbele katika kuelimisha umma kuhusu hatari za ufuatiliaji kupitia utafiti wa kitaaluma na machapisho.
  - Wanafanya kazi ndani ya taasisi za fedha zilizopo ili kutekeleza hatua kwa hatua teknolojia za kuhifadhi faragha
explanation: |
  Eric Hughes alisema wazi 'Wa-Cypherpunks huandika msimbo' kama mbinu yao ya kufafanua. Ilani inasisitiza kwamba Wa-Cypherpunks hawangojei serikali, mashirika, au mashirika mengine kutoa ulinzi wa faragha.
  Badala yake, wanachukua hatua za moja kwa moja kwa kuunda zana za kriptografia na mifumo ya ugatuzi. Mbinu hii ya ujenzi hai, badala ya matumaini tulivu au mageuzi ya kitaasisi, ikawa msingi wa uvumbuzi kama Bitcoin, ambao ulijumuisha falsafa yao ya kujenga mifumo mbadala nje ya miundo ya jadi ya nguvu.

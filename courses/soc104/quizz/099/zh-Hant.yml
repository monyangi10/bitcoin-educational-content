question: 根據 Eric Hughes 的 Cypherpunk Manifesto，cypherpunks 與那些只希望隱私權受到保護的人有什麼基本的區別？
answer: 他們積極編寫程式碼來建立密碼系統，而不是等待機構提供隱私權
wrong_answers:
  - 他們專注於政治游說和法律改革，以建立憲法上的隱私權
  - 他們透過學術研究和出版刊物，優先教育大眾有關監控風險的知識
  - 他們在現有的金融機構內工作，逐步實施隱私保護技術
explanation: |
  Eric Hughes 明確表示「cypherpunks 寫程式碼」是他們的定義方法。宣言強調 Cypherpunks 不會等待政府、企業或其他組織提供隱私權保護。
  相反地，他們直接採取行動，創造密碼工具和分散式系統。這種主動建構的方式，而非被動的希望或制度改革，成為 Bitcoin 等創新的基礎，體現了他們在傳統權力結構之外建構替代系統的理念。
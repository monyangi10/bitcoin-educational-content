question: ตามที่ Eric Hughes' Cypherpunk Manifesto กล่าวถึง วิธีการพื้นฐานที่ทำให้ cypherpunks แตกต่างจากผู้ที่เพียงแค่หวังว่าจะได้รับการปกป้องความเป็นส่วนตัวคืออะไร?
answer: พวกเขาเขียนโค้ดอย่างแข็งขันเพื่อสร้างระบบการเข้ารหัสแทนที่จะรอให้สถาบันต่างๆ จัดหาความเป็นส่วนตัวให้
wrong_answers:
  - พวกเขามุ่งเน้นไปที่การวิ่งเต้นทางการเมืองและการปฏิรูปกฎหมายเพื่อสร้างสิทธิความเป็นส่วนตัวตามรัฐธรรมนูญ
  - พวกเขาให้ความสำคัญกับการให้ความรู้แก่สาธารณชนเกี่ยวกับความเสี่ยงจากการเฝ้าระวังผ่านการวิจัยทางวิชาการและสิ่งพิมพ์
  - พวกเขาทำงานภายในสถาบันการเงินที่มีอยู่เพื่อค่อยๆ นำเทคโนโลยีที่รักษาความเป็นส่วนตัวมาใช้
explanation: |
  Eric Hughes ระบุอย่างชัดเจนว่า 'Cypherpunks write code' เป็นวิธีการที่กำหนดตัวตนของพวกเขา แถลงการณ์เน้นว่า cypherpunks ไม่รอให้รัฐบาล บริษัท หรือองค์กรอื่น ๆ มอบการปกป้องความเป็นส่วนตัวให้ แต่พวกเขาดำเนินการโดยตรงด้วยการสร้างเครื่องมือเข้ารหัสและระบบกระจายอำนาจ วิธีการสร้างเชิงรุกนี้ แทนที่จะเป็นความหวังแบบเฉย ๆ หรือการปฏิรูปสถาบัน กลายเป็นรากฐานสำหรับนวัตกรรมเช่น Bitcoin ซึ่งสะท้อนปรัชญาของพวกเขาในการสร้างระบบทางเลือกนอกโครงสร้างอำนาจแบบดั้งเดิม
question: 根据埃里克-休斯（Eric Hughes）的《Cypherpunk 宣言》，是什么基本方法将网络朋克与那些仅仅希望保护隐私的人区分开来？
answer: 他们积极编写代码，构建密码系统，而不是等待机构提供隐私保护
wrong_answers:
  - 他们侧重于政治游说和法律改革，以确立宪法规定的隐私权
  - 他们优先考虑通过学术研究和出版物对公众进行监控风险教育
  - 他们在现有金融机构内开展工作，逐步实施隐私保护技术
explanation: |
  埃里克-休斯明确指出，"赛弗尔朋克写代码 "是他们的定义方法。宣言强调，赛弗朋克不会等待政府、企业或其他组织提供隐私保护。
  相反，他们直接采取行动，创建加密工具和分散系统。这种主动构建的方法，而不是被动地寄希望于或进行制度改革，成为 Bitcoin 等创新的基础，体现了他们在传统权力结构之外构建替代系统的理念。
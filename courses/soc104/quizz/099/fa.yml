question: بر اساس بیانیه Cypherpunk اریک هیوز، چه رویکرد بنیادی‌ای سایفرپانک‌ها را از کسانی که صرفاً به حفاظت از حریم خصوصی امیدوارند، متمایز می‌کند؟
answer: آن‌ها به‌طور فعال کد می‌نویسند تا سیستم‌های رمزنگاری بسازند، به‌جای این‌که منتظر بمانند تا مؤسسات حریم خصوصی را فراهم کنند.
wrong_answers:
  - آن‌ها بر لابی‌گری سیاسی و اصلاحات قانونی تمرکز می‌کنند تا حقوق حریم خصوصی قانون اساسی را برقرار کنند.
  - آن‌ها با استفاده از تحقیقات آکادمیک و انتشارات، آموزش عمومی درباره خطرات نظارت را در اولویت قرار می‌دهند.
  - آن‌ها در چارچوب نهادهای مالی موجود کار می‌کنند تا به تدریج فناوری‌های حفظ حریم خصوصی را پیاده‌سازی کنند.
explanation: |
  اریک هیوز به‌طور صریح بیان کرد که «سایفرپانک‌ها کد می‌نویسند» به‌عنوان روش‌شناسی تعریف‌کننده‌ی آن‌ها. این بیانیه تأکید می‌کند که سایفرپانک‌ها منتظر دولت‌ها، شرکت‌ها یا سازمان‌های دیگر برای ارائه حفاظت از حریم خصوصی نمی‌مانند.  
  در عوض، آن‌ها با ایجاد ابزارهای رمزنگاری و سیستم‌های غیرمتمرکز اقدام مستقیم می‌کنند. این رویکرد ساخت فعال، به‌جای امید منفعل یا اصلاح نهادی، به پایه‌ای برای نوآوری‌هایی مانند Bitcoin تبدیل شد که فلسفه‌ی آن‌ها در ساخت سیستم‌های جایگزین خارج از ساختارهای قدرت سنتی را تجسم می‌بخشید.
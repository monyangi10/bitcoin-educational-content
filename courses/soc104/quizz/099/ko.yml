question: 에릭 휴즈의 Cypherpunk 선언문에 따르면, 사이퍼펑크는 어떤 근본적인 접근 방식을 통해 단순히 개인 정보 보호를 희망하는 사람들과 구별될 수 있을까요?
answer: 기관에서 개인 정보 보호를 제공하기를 기다리지 않고 적극적으로 코드를 작성하여 암호화 시스템을 구축합니다
wrong_answers:
  - 헌법상 프라이버시 권리를 확립하기 위한 정치 로비 및 법률 개혁에 집중합니다
  - 학술 연구와 출판물을 통해 대중에게 감시 위험에 대한 교육을 우선시합니다
  - 기존 금융 기관과 협력하여 개인 정보 보호 기술을 점진적으로 구현합니다
explanation: |
  에릭 휴즈는 '사이퍼펑크는 코드를 작성한다'는 것을 그들의 정의 방법론으로 명시적으로 언급했습니다. 이 선언문은 사이퍼펑크가 정부, 기업 또는 기타 조직이 개인 정보 보호를 제공하기를 기다리지 않는다고 강조합니다.
  대신 암호화 도구와 탈중앙화 시스템을 만들어 직접 행동에 나섭니다. 수동적인 희망이나 제도 개혁이 아닌 이러한 능동적인 구축 방식은 전통적인 권력 구조 밖에서 대안 시스템을 구축한다는 그들의 철학을 구현한 Bitcoin과 같은 혁신의 토대가 되었습니다.
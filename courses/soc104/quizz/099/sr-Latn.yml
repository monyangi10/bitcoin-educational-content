question: Prema Cypherpunk Manifestu Erika Hjuza, osnovni pristup koji razlikuje sajferpankere od onih koji samo nadaju zaštiti privatnosti je aktivno korišćenje kriptografije za postizanje privatnosti, umesto oslanjanja na obećanja vlada ili korporacija.
answer: Oni aktivno pišu kod za izgradnju kriptografskih sistema umesto da čekaju da institucije obezbede privatnost
wrong_answers:
  - Oni se fokusiraju na političko lobiranje i pravne reforme kako bi uspostavili ustavna prava na privatnost.
  - Oni daju prioritet edukaciji javnosti o rizicima nadzora kroz akademska istraživanja i publikacije.
  - Oni rade unutar postojećih finansijskih institucija kako bi postepeno implementirali tehnologije koje čuvaju privatnost
explanation: |
  Eric Hughes je eksplicitno naveo 'Cypherpunks pišu kod' kao njihovu definisanu metodologiju. Manifest naglašava da cypherpunks ne čekaju da vlade, korporacije ili druge organizacije obezbede zaštitu privatnosti. Umesto toga, oni preduzimaju direktne akcije kreiranjem kriptografskih alata i decentralizovanih sistema. Ovaj pristup aktivne izgradnje, umesto pasivne nade ili institucionalne reforme, postao je osnova za inovacije poput Bitcoin, koji je utelovio njihovu filozofiju izgradnje alternativnih sistema van tradicionalnih struktura moći.
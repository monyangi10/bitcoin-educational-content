question: Според манифеста Cypherpunk на Ерик Хюз какъв фундаментален подход отличава шифровчиците от тези, които просто се надяват на защита на личните данни?
answer: Те активно пишат код за изграждане на криптографски системи, вместо да чакат институциите да осигурят неприкосновеност на личния живот
wrong_answers:
  - Те се фокусират върху политическо лобиране и правни реформи за установяване на конституционни права на неприкосновеност на личния живот
  - Те дават приоритет на информирането на обществеността за рисковете, свързани с наблюдението, чрез академични изследвания и публикации
  - Те работят в рамките на съществуващите финансови институции, за да прилагат постепенно технологии за запазване на неприкосновеността на личния живот
explanation: |
  Ерик Хюз изрично заяви, че "Cypherpunks пишат код" е тяхната определяща методология. В манифеста се подчертава, че шифърпънкърите не чакат правителства, корпорации или други организации да осигурят защита на личните данни.
  Вместо това те предприемат преки действия, като създават криптографски инструменти и децентрализирани системи. Този подход на активно изграждане, а не на пасивна надежда или институционална реформа, се превръща в основа на иновации като Bitcoin, които въплъщават тяхната философия за изграждане на алтернативни системи извън традиционните властови структури.
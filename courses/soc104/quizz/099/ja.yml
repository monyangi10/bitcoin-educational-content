question: エリック・ヒューズの『Cypherpunk宣言』によれば、サイファーパンクと、単にプライバシー保護を望むだけの人々とを区別する基本的なアプローチとは何か？
answer: 制度がプライバシーを提供するのを待つのではなく、積極的にコードを書いて暗号システムを構築する。
wrong_answers:
  - 彼らは、憲法上のプライバシー権を確立するための政治的ロビー活動や法改正に力を入れている。
  - 学術的な研究や出版物を通じて、サーベイランスのリスクについて一般の人々に啓蒙することを優先している。
  - 既存の金融機関の中で、プライバシー保護技術を徐々に導入していく。
explanation: |
  エリック・ヒューズは、「サイファーパンクはコードを書く」と明確に述べている。マニフェストでは、サイファーパンクは政府や企業、その他の組織がプライバシー保護を提供するのを待たないことを強調しています。
  その代わりに、彼らは暗号化ツールや分散型システムを作ることによって直接行動を起こします。受動的な希望や制度改革ではなく、この能動的な構築アプローチが、伝統的な権力構造の外でオルタナティブなシステムを構築するという彼らの哲学を具現化したBitcoinのようなイノベーションの基礎となった。
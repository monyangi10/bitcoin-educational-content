question: Según el diagrama político, ¿qué representa el eje y?
answer: Libertades personales y sociales
wrong_answers:
  - Libertades económicas y comerciales
  - El nivel de intervención pública en la economía
  - Preferencias fiscales y reglamentarias
explanation: |
  El eje y (vertical) representa las libertades personales y sociales, que incluyen la libertad de movimiento, opinión y autodeterminación. Estas libertades se refieren a lo que haces en tus relaciones privadas, con tus opiniones y creencias, así como todo lo que haces con tu propio cuerpo y mente. El eje x (horizontal) representa las libertades económicas. Esta distinción nos permite clasificar la mayoría de las cuestiones políticas en dos categorías fundamentales.
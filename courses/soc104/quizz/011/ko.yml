question: 정치 다이어그램에 따르면 Y축은 무엇을 의미하나요?
answer: 개인 및 사회적 자유
wrong_answers:
  - 경제 및 상업적 자유
  - 정부의 경제 개입 수준
  - 세금 및 규제 선호 사항
explanation: |
  Y축(세로)은 이동, 의견 및 자기 결정의 자유를 포함한 개인 및 사회적 자유를 나타냅니다. 이러한 자유는 사적인 관계에서 자신의 의견과 신념에 따라 행동하는 것뿐만 아니라 자신의 몸과 마음으로 하는 모든 일과 관련이 있습니다. X축(가로)은 경제적 자유를 나타냅니다. 이러한 구분을 통해 대부분의 정치적 이슈를 두 가지 기본 범주로 분류할 수 있습니다.
question: Hva representerer y-aksen ifølge det politiske diagrammet?
answer: Personlig og sosial frihet
wrong_answers:
  - Økonomisk og kommersiell frihet
  - Graden av statlig inngripen i økonomien
  - Skatte- og reguleringsmessige preferanser
explanation: |
  Y-aksen (vertikal) representerer personlige og samfunnsmessige friheter, som inkluderer bevegelsesfrihet, meningsfrihet og selvbestemmelse. Disse frihetene handler om hva du gjør i dine private relasjoner, med dine meninger og overbevisninger, samt alt du gjør med din egen kropp og ditt eget sinn. X-aksen (horisontal) representerer økonomiske friheter. Denne inndelingen gjør det mulig å klassifisere de fleste politiske spørsmål i to grunnleggende kategorier.
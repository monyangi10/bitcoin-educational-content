question: इस राजनीतिक आरेख के अनुसार, y-अक्ष क्या दर्शाता है?
answer: व्यक्तिगत और सामाजिक स्वतंत्रताएँ
wrong_answers:
  - आर्थिक और वाणिज्यिक स्वतंत्रताएँ
  - अर्थव्यवस्था में सरकारी हस्तक्षेप का स्तर
  - कर एवं विनियामक प्राथमिकताएँ
explanation: |
  y-अक्ष (ऊर्ध्वाधर) व्यक्तिगत और सामाजिक स्वतंत्रता का प्रतिनिधित्व करता है, जिसमें आवागमन की स्वतंत्रता, विचारों की स्वतंत्रता और आत्मनिर्णय की स्वतंत्रता शामिल है। ये स्वतंत्रताएँ आपके निजी संबंधों, आपके विचारों और मान्यताओं के साथ-साथ आपके शरीर और मन से संबंधित सभी कार्यों से जुड़ी हैं। x-अक्ष (क्षैतिज) आर्थिक स्वतंत्रता का प्रतिनिधित्व करता है। यह अंतर हमें अधिकांश राजनीतिक मुद्दों को दो मूलभूत श्रेणियों में वर्गीकृत करने में सक्षम बनाता है।
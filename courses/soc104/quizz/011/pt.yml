question: De acordo com o diagrama político, o que é que o eixo y representa?
answer: Liberdades pessoais e sociais
wrong_answers:
  - Liberdades económicas e comerciais
  - O nível de intervenção do Estado na economia
  - Preferências fiscais e regulamentares
explanation: |
  O eixo y (vertical) representa as liberdades pessoais e sociais, que incluem a liberdade de movimento, de opinião e de auto-determinação. Estas liberdades dizem respeito ao que fazemos nas nossas relações privadas, às nossas opiniões e crenças, bem como a tudo o que fazemos com o nosso próprio corpo e mente. O eixo x (horizontal) representa as liberdades económicas. Esta distinção permite-nos classificar a maioria das questões políticas em duas categorias fundamentais.
question: Co reprezentuje oś y na diagramie politycznym?
answer: Wolności osobiste i społeczne
wrong_answers:
  - Swobody gospodarcze i handlowe
  - Poziom interwencji rządu w gospodarkę
  - Preferencje podatkowe i regulacyjne
explanation: |
  Oś y (pionowa) reprezentuje wolności osobiste i społeczne, które obejmują swobodę przemieszczania się, wyrażania opinii i samostanowienia. Wolności te dotyczą prywatnych relacji, opinii i przekonań, a także wszystkiego, co robisz z własnym ciałem i umysłem. Oś x (pozioma) reprezentuje wolności ekonomiczne. To rozróżnienie pozwala nam zaklasyfikować większość kwestii politycznych do dwóch podstawowych kategorii.
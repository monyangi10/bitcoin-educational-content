question: Что изображено на политической диаграмме по оси y?
answer: Личные и социальные свободы
wrong_answers:
  - Экономические и торговые свободы
  - Уровень государственного вмешательства в экономику
  - Налоговые и регуляторные преференции
explanation: |
  Ось y (вертикальная) представляет личные и общественные свободы, которые включают свободу передвижения, мнения и самоопределения. Эти свободы касаются ваших личных отношений, мнений и убеждений, а также всего, что вы делаете со своим телом и разумом. Ось x (горизонтальная) представляет экономические свободы. Это различие позволяет нам разделить большинство политических вопросов на две фундаментальные категории.
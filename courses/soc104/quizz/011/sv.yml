question: Enligt det politiska diagrammet, vad representerar y-axeln?
answer: Personliga och sociala friheter
wrong_answers:
  - Ekonomiska och kommersiella friheter
  - Graden av statlig inblandning i ekonomin
  - Skatte- och regleringsförmåner
explanation: |
  Y-axeln (vertikal) representerar personliga och samhälleliga friheter, som inkluderar rörelsefrihet, åsiktsfrihet och självbestämmande. Dessa friheter handlar om vad du gör i dina privata relationer, med dina åsikter och övertygelser, samt allt du gör med din egen kropp och själ. X-axeln (horisontell) representerar ekonomiska friheter. Denna distinktion gör det möjligt för oss att klassificera de flesta politiska frågor i två grundläggande kategorier.
question: Theo sơ đồ chính trị, trục y biểu thị điều gì?
answer: Tự do cá nhân và xã hội
wrong_answers:
  - Tự do kinh tế và thương mại
  - Mức độ can thiệp của chính phủ vào nền kinh tế
  - Ưu đãi về thuế và quy định
explanation: |
  Trục y (trục dọc) biểu thị các quyền tự do cá nhân và xã hội, bao gồm tự do đi lại, tự do ngôn luận và tự quyết. Những quyền tự do này liên quan đến những gì bạn làm trong các mối quan hệ riêng tư, với các quan điểm và niềm tin của bạn, cũng như mọi thứ bạn làm với cơ thể và tâm trí của mình. Trục x (trục ngang) biểu thị các quyền tự do kinh tế. Sự phân biệt này cho phép chúng ta phân loại phần lớn các vấn đề chính trị thành hai loại cơ bản.
question: Dushingiye ku kigereranyo ca politike, y-axis igereranya iki?
answer: Umwidegemvyo w'umuntu ku giti ciwe n'uw'imibano
wrong_answers:
  - Umwidegemvyo mu vy'ubutunzi n'ubudandaji
  - Urugero rw'ingene Leta igira ico ikoze mu bukungu
  - Imisoro n'amabwirizwa
explanation: |
  Igiharuro y (gihagaze) kigereranya umwidegemvyo w’umuntu ku giti ciwe n’uw’ikibano, ukaba urimwo umwidegemvyo wo kwiyunguruza, ivyiyumviro n’ukwiyemeza. Uwo mwidegemvyo ureba ivyo ukora mu migenderanire yawe bwite, n’ivyiyumviro vyawe n’ivyo wemera, hamwe n’ivyo ukora vyose n’umubiri wawe n’ubwenge bwawe bwite. Igiharuro ca x (kiringaniye) kigereranya umwidegemvyo w’ubutunzi. Ukwo gutandukanya kuradushoboza gushiramwo ibibazo vyinshi vya politike mu mice ibiri y’ishimikiro.
question: Prema političkom dijagramu, šta predstavlja y-osu?
answer: Lične i društvene slobode
wrong_answers:
  - Ekonomske i komercijalne slobode
  - Nivo vladine intervencije u ekonomiji
  - Poreske i regulatorne povlastice
explanation: |
  Y-osovina (vertikalna) predstavlja lične i društvene slobode, koje uključuju slobodu kretanja, mišljenja i samoodređenja. Ove slobode se odnose na ono što radite u svojim privatnim odnosima, sa svojim mišljenjima i uverenjima, kao i na sve što radite sa svojim telom i umom. X-osovina (horizontalna) predstavlja ekonomske slobode. Ova razlika nam omogućava da klasifikujemo većinu političkih pitanja u dve osnovne kategorije.
question: Was stellt die y-Achse laut dem politischen Diagramm dar?
answer: Persönliche und soziale Freiheiten
wrong_answers:
  - Wirtschaftliche und kommerzielle Freiheiten
  - Das Ausmaß der staatlichen Intervention in die Wirtschaft
  - Steuerliche und regulatorische Präferenzen
explanation: |
  Die y-Achse (vertikal) steht für persönliche und gesellschaftliche Freiheiten, zu denen Bewegungsfreiheit, Meinungsfreiheit und Selbstbestimmung gehören. Diese Freiheiten betreffen Ihre privaten Beziehungen, Ihre Meinungen und Überzeugungen sowie alles, was Sie mit Ihrem eigenen Körper und Geist tun. Die x-Achse (horizontal) steht für die wirtschaftlichen Freiheiten. Anhand dieser Unterscheidung können wir die meisten politischen Themen in zwei grundlegende Kategorien einteilen.
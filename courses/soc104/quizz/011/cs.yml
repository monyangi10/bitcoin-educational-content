question: Co podle politického diagramu představuje osa y?
answer: Osobní a společenské svobody
wrong_answers:
  - Hospodářské a obchodní svobody
  - Míra vládních zásahů do ekonomiky
  - Daňové a regulační preference
explanation: |
  Osa y (svislá) představuje osobní a společenské svobody, mezi něž patří svoboda pohybu, názorů a sebeurčení. Tyto svobody se týkají toho, co děláte ve svých soukromých vztazích, se svými názory a přesvědčením, a také všeho, co děláte s vlastním tělem a myslí. Osa x (horizontální) představuje ekonomické svobody. Toto rozlišení nám umožňuje zařadit většinu politických otázek do dvou základních kategorií.
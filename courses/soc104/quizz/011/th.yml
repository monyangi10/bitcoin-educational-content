question: จากแผนภาพทางการเมือง แกน y แทนอะไร?
answer: เสรีภาพส่วนบุคคลและสังคม
wrong_answers:
  - เสรีภาพทางเศรษฐกิจและการค้า
  - ระดับของการแทรกแซงของรัฐบาลในเศรษฐกิจ
  - การจัดเก็บภาษีและข้อบังคับที่พึงประสงค์
explanation: |
  แกน y (แนวตั้ง) แทนเสรีภาพส่วนบุคคลและสังคม ซึ่งรวมถึงเสรีภาพในการเคลื่อนไหว ความคิดเห็น และการกำหนดตนเอง เสรีภาพเหล่านี้เกี่ยวข้องกับสิ่งที่คุณทำในความสัมพันธ์ส่วนตัวของคุณ ด้วยความคิดเห็นและความเชื่อของคุณ รวมถึงทุกสิ่งที่คุณทำกับร่างกายและจิตใจของคุณเอง แกน x (แนวนอน) แทนเสรีภาพทางเศรษฐกิจ การแบ่งแยกนี้ทำให้เราสามารถจัดประเภทประเด็นทางการเมืองส่วนใหญ่เป็นสองหมวดหมู่พื้นฐานได้
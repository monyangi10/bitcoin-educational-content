question: According to the political diagram, what does the y-axis represent?
answer: Personal and social freedoms
wrong_answers:
  - Economic and commercial freedoms
  - The level of government intervention in the economy
  - Tax and regulatory preferences
explanation: |
  The y-axis (vertical) represents personal and societal freedoms, which include freedom of movement, opinion and self-determination. These freedoms concern what you do in your private relationships, with your opinions and beliefs, as well as everything you do with your own body and mind. The x-axis (horizontal) represents economic freedoms. This distinction enables us to classify the majority of political issues into two fundamental categories.

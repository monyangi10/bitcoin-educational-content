question: Siyasi diyagrama göre, y ekseni neyi temsil ediyor?
answer: Kişisel ve sosyal özgürlükler
wrong_answers:
  - Ekonomik ve ticari özgürlükler
  - Devletin ekonomiye müdahale düzeyi
  - Vergi ve mevzuat tercihleri
explanation: |
  Y ekseni (dikey) hareket, fikir ve kendi kaderini tayin özgürlüğünü içeren kişisel ve toplumsal özgürlükleri temsil eder. Bu özgürlükler, özel ilişkilerinizde, fikir ve inançlarınızla ve kendi bedeniniz ve zihninizle yaptığınız her şeyle ilgilidir. X ekseni (yatay) ekonomik özgürlükleri temsil etmektedir. Bu ayrım, siyasi meselelerin çoğunu iki temel kategoride sınıflandırmamızı sağlar.
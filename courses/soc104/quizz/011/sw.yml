question: Kulingana na mchoro wa kisiasa, mhimili wa y unawakilisha nini?
answer: Uhuru wa kibinafsi na kijamii
wrong_answers:
  - Uhuru wa kiuchumi na kibiashara
  - Kiwango cha uingiliaji kati wa serikali katika uchumi
  - Mapendeleo ya kodi na udhibiti
explanation: |
  Mhimili wa y (wima) unawakilisha uhuru wa kibinafsi na kijamii, ambao unajumuisha uhuru wa kutembea, maoni na kujiamulia. Uhuru huu unahusu kile unachofanya katika mahusiano yako ya kibinafsi, maoni na imani zako, pamoja na kila kitu unachofanya kwa mwili na akili yako mwenyewe. Mhimili wa x (mlalo) unawakilisha uhuru wa kiuchumi. Tofauti hii inatuwezesha kuainisha masuala mengi ya kisiasa katika kategoria mbili za msingi.
question: Според политическата диаграма какво представлява оста y?
answer: Лични и социални свободи
wrong_answers:
  - Икономически и търговски свободи
  - Степента на държавна намеса в икономиката
  - Данъчни и регулаторни преференции
explanation: |
  Оста "у" (вертикална) представя личните и обществените свободи, които включват свободата на движение, мнение и самоопределение. Тези свободи се отнасят до това, което правите в личните си взаимоотношения, с мненията и убежденията си, както и до всичко, което правите със собственото си тяло и ум. Оста x (хоризонтална) представлява икономическите свободи. Това разграничение ни позволява да класифицираме по-голямата част от политическите въпроси в две основни категории.
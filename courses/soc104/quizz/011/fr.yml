question: Selon le diagramme politique, que représente l'axe des ordonnées?
answer: Les libertés personnelles et sociétales
wrong_answers:
  - Les libertés économiques et commerciales
  - "Le niveau d'intervention de l'État dans l'économie"
  - Les préférences fiscales et réglementaires
explanation: |
  L'axe des ordonnées (vertical) représente les libertés personnelles et sociétales, qui incluent la liberté de circulation, d'opinion, et la libre disposition de soi. Ces libertés concernent ce que vous faites dans vos relations privées, avec vos opinions et croyances, ainsi que tout ce que vous faites avec votre propre corps et esprit. L'axe des abscisses (horizontal) représente quant à lui les libertés économiques. Cette distinction permet de classer la majorité des questions politiques en deux grandes catégories fondamentales.

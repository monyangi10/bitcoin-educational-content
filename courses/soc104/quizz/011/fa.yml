question: طبق نمودار سیاسی، محور y چه چیزی را نشان می‌دهد؟
answer: آزادی‌های شخصی و اجتماعی
wrong_answers:
  - آزادی‌های اقتصادی و تجاری
  - سطح مداخله دولت در اقتصاد
  - ترجیحات مالیاتی و نظارتی
explanation: |
  محور y (عمودی) نشان‌دهنده آزادی‌های شخصی و اجتماعی است که شامل آزادی حرکت، عقیده و خودمختاری می‌شود. این آزادی‌ها به آنچه در روابط خصوصی خود انجام می‌دهید، با نظرات و باورهایتان، و همچنین هر چیزی که با بدن و ذهن خود انجام می‌دهید، مربوط می‌شود. محور x (افقی) نشان‌دهنده آزادی‌های اقتصادی است. این تمایز به ما امکان می‌دهد تا اکثر مسائل سیاسی را به دو دسته اساسی طبقه‌بندی کنیم.
question: Mida kujutab y-telg poliitilise diagrammi järgi?
answer: Isiklikud ja sotsiaalsed vabadused
wrong_answers:
  - Majandus- ja kaubandusvabadused
  - Valitsuse sekkumise tase majanduses
  - Maksu- ja regulatiivsed soodustused
explanation: |
  Y-telg (vertikaalne) tähistab isiklikke ja ühiskondlikke vabadusi, mis hõlmavad liikumis-, arvamus- ja enesemääramisvabadust. Need vabadused puudutavad seda, mida te teete oma eraelulistes suhetes, oma arvamuste ja tõekspidamistega, samuti kõike, mida te teete oma keha ja vaimuga. X-telg (horisontaalne) tähistab majanduslikke vabadusi. See eristamine võimaldab meil liigitada enamiku poliitilisi küsimusi kahte põhikategooriasse.
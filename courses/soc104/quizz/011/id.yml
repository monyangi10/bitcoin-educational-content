question: Menurut diagram politik, apa yang diwakili oleh sumbu y?
answer: Kebebasan pribadi dan sosial
wrong_answers:
  - Kebebasan ekonomi dan komersial
  - Tingkat intervensi pemerintah dalam perekonomian
  - Preferensi pajak dan peraturan
explanation: |
  Sumbu y (vertikal) mewakili kebebasan pribadi dan masyarakat, yang meliputi kebebasan bergerak, berpendapat, dan menentukan nasib sendiri. Kebebasan-kebebasan ini menyangkut apa yang kita lakukan dalam hubungan pribadi, dengan pendapat dan keyakinan kita, serta semua yang kita lakukan dengan tubuh dan pikiran. Sumbu x (horizontal) mewakili kebebasan ekonomi. Pembedaan ini memungkinkan kita untuk mengklasifikasikan sebagian besar masalah politik ke dalam dua kategori mendasar.

question: Mitä y-akseli edustaa poliittisen kaavion mukaan?
answer: Henkilökohtaiset ja sosiaaliset vapaudet
wrong_answers:
  - Taloudelliset ja kaupalliset vapaudet
  - Hallituksen puuttumisen taso talouteen
  - Verotukselliset ja lainsäädännölliset etuudet
explanation: |
  Y-akseli (pystysuora) edustaa henkilökohtaisia ja yhteiskunnallisia vapauksia, joihin kuuluvat liikkumisvapaus, mielipiteenvapaus ja itsemääräämisoikeus. Nämä vapaudet koskevat sitä, mitä teet yksityisissä suhteissasi, mielipiteilläsi ja uskomuksillasi sekä kaikkea, mitä teet omalla kehollasi ja mielelläsi. X-akseli (vaaka-akseli) edustaa taloudellisia vapauksia. Tämän erottelun avulla voimme luokitella suurimman osan poliittisista kysymyksistä kahteen perusluokkaan.
question: Secondo il diagramma politico, cosa rappresenta l'asse y?
answer: Libertà personali e sociali
wrong_answers:
  - Libertà economiche e commerciali
  - Il livello di intervento del governo nell'economia
  - Preferenze fiscali e normative
explanation: |
  L'asse y (verticale) rappresenta le libertà personali e sociali, che comprendono la libertà di movimento, di opinione e di autodeterminazione. Queste libertà riguardano ciò che si fa nelle relazioni private, le opinioni e le convinzioni, nonché tutto ciò che si fa con il proprio corpo e la propria mente. L'asse x (orizzontale) rappresenta le libertà economiche. Questa distinzione ci permette di classificare la maggior parte delle questioni politiche in due categorie fondamentali.
question: Wat stelt de y-as voor volgens het politieke diagram?
answer: Persoonlijke en sociale vrijheden
wrong_answers:
  - Economische en commerciële vrijheden
  - De mate van overheidsinterventie in de economie
  - Voorkeuren op het gebied van belastingen en regelgeving
explanation: |
  De y-as (verticaal) vertegenwoordigt persoonlijke en maatschappelijke vrijheden, waaronder vrijheid van beweging, mening en zelfbeschikking. Deze vrijheden hebben te maken met wat je doet in je privérelaties, met je meningen en overtuigingen en met alles wat je doet met je eigen lichaam en geest. De x-as (horizontaal) vertegenwoordigt de economische vrijheden. Met dit onderscheid kunnen we de meeste politieke kwesties in twee fundamentele categorieën indelen.
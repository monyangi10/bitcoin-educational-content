question: Kulingana na nadharia ya Hayek ya maarifa yaliyotawanyika, kwa nini uchumi uliopangwa kati hushindwa kutenga rasilimali kwa ufanisi ikilinganishwa na mifumo ya soko huria?
answer: Wapangaji wakuu hawawezi kupata maarifa yaliyogawanyika na ya ndani ambayo watu binafsi wanayo kuhusu mahitaji yao mahususi, mapendeleo, na hali zao, na hivyo kufanya ugawaji wa rasilimali kwa ufanisi uwe mgumu.
wrong_answers:
  - Wapangaji wakuu hawana uwezo wa kompyuta na algoriti za hali ya juu zinazohitajika ili kuchakata data zote za kiuchumi na kufanya maamuzi bora ya mgao kwa jamii.
  - Wapangaji mipango wakuu kwa asili ni wafisadi na wenye maslahi binafsi, wakipa kipaumbele ustawi wao wenyewe kuliko mgawanyo mzuri wa rasilimali kwa idadi kubwa ya watu.
  - Wapangaji wakuu huzingatia sana faida za kisiasa za muda mfupi badala ya ufanisi wa kiuchumi wa muda mrefu, na kusababisha maamuzi duni ya mgawanyo wa rasilimali.
explanation: |
  Dhana ya Hayek ya maarifa yaliyotawanyika inasisitiza kwamba taarifa muhimu za kiuchumi zipo tu kama vipande vilivyotawanyika miongoni mwa watu wanaojua hali zao za ndani, mapendeleo binafsi, na gharama za fursa.
  
  Maarifa haya hayawezi kukusanywa au kukusanywa katikati kwa sababu ni ya muktadha na yanabadilika kila mara. Masoko huria huratibu maarifa haya yaliyotawanyika kupitia mfumo wa bei, ambapo ubadilishanaji wa hiari huonyesha mapendeleo na uhaba wa jamaa. Wapangaji wakuu, bila kujali nia au uwezo wao, hawawezi kuiga mchakato huu wa uratibu wa hiari kwa sababu maarifa muhimu hayapo katika umbo lililojikita.

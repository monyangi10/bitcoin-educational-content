question: ตามทฤษฎีความรู้กระจายของ Hayek, ทำไมเศรษฐกิจที่วางแผนจากศูนย์กลางถึงล้มเหลวในการจัดสรรทรัพยากรอย่างมีประสิทธิภาพเมื่อเทียบกับระบบตลาดเสรี?
answer: นักวางแผนส่วนกลางไม่สามารถเข้าถึงความรู้ที่กระจัดกระจายและเฉพาะเจาะจงที่บุคคลมีเกี่ยวกับความต้องการ ความชอบ และสถานการณ์เฉพาะของตนเอง ทำให้การจัดสรรทรัพยากรอย่างมีประสิทธิภาพเป็นไปไม่ได้
wrong_answers:
  - นักวางแผนส่วนกลางขาดพลังการคำนวณและอัลกอริธึมขั้นสูงที่จำเป็นในการประมวลผลข้อมูลทางเศรษฐกิจทั้งหมดและตัดสินใจจัดสรรทรัพยากรที่เหมาะสมที่สุดสำหรับสังคม
  - นักวางแผนส่วนกลางมีความทุจริตและเห็นแก่ตัวโดยธรรมชาติ โดยให้ความสำคัญกับสวัสดิการของตนเองมากกว่าการจัดสรรทรัพยากรอย่างมีประสิทธิภาพสำหรับประชากรในวงกว้าง
  - นักวางแผนส่วนกลางมุ่งเน้นไปที่ผลประโยชน์ทางการเมืองระยะสั้นมากเกินไปแทนที่จะเป็นประสิทธิภาพทางเศรษฐกิจระยะยาว ซึ่งนำไปสู่การตัดสินใจจัดสรรทรัพยากรที่ไม่เหมาะสม
explanation: |
  แนวคิดของ Hayek เกี่ยวกับความรู้ที่กระจายเน้นว่าข้อมูลทางเศรษฐกิจที่สำคัญมีอยู่เพียงเป็นชิ้นส่วนกระจัดกระจายท่ามกลางบุคคลที่รู้สถานการณ์ท้องถิ่นของตนเอง, ความชอบส่วนบุคคล, และต้นทุนโอกาส ความรู้นี้ไม่สามารถถูกรวบรวมหรือรวมศูนย์ได้เพราะมันเป็นบริบทและเปลี่ยนแปลงตลอดเวลา ตลาดเสรีประสานความรู้ที่กระจายนี้ผ่านระบบราคา ซึ่งการแลกเปลี่ยนโดยสมัครใจเผยให้เห็นความชอบและความขาดแคลนสัมพัทธ์ ผู้วางแผนส่วนกลาง ไม่ว่าจะมีเจตนาหรือความสามารถเพียงใด ก็ไม่สามารถเลียนแบบกระบวนการประสานงานที่เกิดขึ้นเองนี้ได้เพราะความรู้ที่จำเป็นไม่ได้มีอยู่ในรูปแบบที่รวมศูนย์
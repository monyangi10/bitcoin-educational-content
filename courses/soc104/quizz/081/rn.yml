question: Dushingiye ku ciyumviro ca Hayek c’ubumenyi bushize ahabona, ni kuki ubutunzi buteguwe hagati butashobora gutanga neza ubutunzi ugereranyije n’uburyo bw’isoko ry’uburenganzira?
answer: Abategura imigambi yo hagati ntibashobora kuronka ubumenyi bucitsemwo ibice, bushingiye ku karere abantu bafise ku bijanye n’ivyo bakeneye, ivyo bakunda be n’ivyo babayemwo, ivyo bikaba bituma gutanga neza ibikoresho bidashoboka.
wrong_answers:
  - Abategura imigambi yo hagati ntibagira ububasha bwo gukoresha ubuhinga bwo guharura n’ubuhinga buteye imbere bukenewe kugira ngo bashobore gukora amakuru yose y’ubutunzi no gufata ingingo nziza zo gutanga amafaranga ku kibano.
  - Abategura imigambi yo hagati barafise ibiturire kandi bikunda, bashira imbere ineza yabo kuruta gutanga neza ubutunzi ku bantu benshi.
  - Abategura imigambi yo hagati bitaho cane inyungu za politike z’igihe gito aho kwibanda ku ntumbero nziza z’ubutunzi z’igihe kirekire, ivyo bikaba bituma hafatwa ingingo zitari nziza zo gutanga ubutunzi.
explanation: |
  Iciyumviro ca Hayek c’ubumenyi bushize ahabona gishimika ku vy’uko amakuru ahambaye y’ubutunzi abaho gusa nk’ibice bishize mu bantu bazi ivyabaye mu karere kabo, ivyo bakunda, n’ibiciro vy’amahirwe. 
  Ubu bumenyi ntibushobora gukoranirizwa hamwe canke gushirwa hamwe kuko bushingiye ku vyo umuntu akora kandi buguma buhinduka. Amasoko y’uburenganzira arahuza ubwo bumenyi bushize ahabona biciye mu nzira y’ibiciro, aho uguhinduranya kw’ubushake kwerekana ivyo umuntu akunda n’ivyo afise ubukene. Abategura imigambi yo hagati, ataco bafatiye ku migambi yabo canke ubushobozi bwabo, ntibashobora gusubiramwo iyo nzira y’uguhuza ibintu yihuta kuko ubumenyi bukenewe butabaho mu buryo bwibanze.
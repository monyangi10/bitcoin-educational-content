question: بر اساس نظریه دانش پراکنده هایک، چرا اقتصادهای برنامه‌ریزی‌شده مرکزی در مقایسه با سیستم‌های بازار آزاد در تخصیص کارآمد منابع ناکام هستند؟
answer: برنامه‌ریزان مرکزی نمی‌توانند به دانش پراکنده و محلی که افراد درباره نیازها، ترجیحات و شرایط خاص خود دارند دسترسی پیدا کنند، که تخصیص کارآمد منابع را غیرممکن می‌سازد.
wrong_answers:
  - برنامه‌ریزان مرکزی فاقد قدرت محاسباتی و الگوریتم‌های پیشرفته لازم برای پردازش تمام داده‌های اقتصادی و اتخاذ تصمیمات تخصیص بهینه برای جامعه هستند.
  - برنامه‌ریزان مرکزی ذاتاً فاسد و خودخواه هستند و رفاه خود را بر تخصیص کارآمد منابع برای جمعیت گسترده‌تر ترجیح می‌دهند.
  - برنامه‌ریزان مرکزی بیش از حد بر دستاوردهای سیاسی کوتاه‌مدت تمرکز می‌کنند تا بر کارایی اقتصادی بلندمدت، که این امر منجر به تصمیم‌گیری‌های نامطلوب در تخصیص منابع می‌شود.
explanation: |
  مفهوم دانش پراکنده هایک تأکید می‌کند که اطلاعات اقتصادی حیاتی تنها به صورت قطعات پراکنده در میان افرادی که شرایط محلی، ترجیحات ذهنی و هزینه‌های فرصت خود را می‌دانند، وجود دارد. این دانش نمی‌تواند به صورت مرکزی جمع‌آوری یا تجمیع شود زیرا زمینه‌ای و به طور مداوم در حال تغییر است. بازارهای آزاد این دانش پراکنده را از طریق سیستم قیمت هماهنگ می‌کنند، جایی که مبادلات داوطلبانه ترجیحات و کمبودهای نسبی را آشکار می‌سازند. برنامه‌ریزان مرکزی، صرف نظر از نیت یا توانایی‌هایشان، نمی‌توانند این فرآیند هماهنگی خودجوش را تکرار کنند زیرا دانش لازم به صورت متمرکز وجود ندارد.
question: Theo lý thuyết tri thức phân tán của Hayek, tại sao các nền kinh tế kế hoạch hóa tập trung lại thất bại trong việc phân bổ nguồn lực hiệu quả hơn so với các hệ thống kinh tế thị trường tự do?
answer: Các nhà hoạch định trung ương không thể tiếp cận được lượng kiến thức rời rạc, mang tính địa phương mà mỗi cá nhân sở hữu về nhu cầu, sở thích và hoàn cảnh cụ thể của họ, khiến việc phân bổ nguồn lực hiệu quả trở nên bất khả thi.
wrong_answers:
  - Các nhà hoạch định trung ương thiếu năng lực tính toán và các thuật toán tiên tiến cần thiết để xử lý tất cả dữ liệu kinh tế và đưa ra các quyết định phân bổ tối ưu cho xã hội.
  - Các nhà hoạch định trung ương vốn dĩ tham nhũng và vị kỷ, ưu tiên phúc lợi cá nhân hơn việc phân bổ nguồn lực hiệu quả cho toàn dân.
  - Các nhà hoạch định trung ương quá chú trọng vào lợi ích chính trị ngắn hạn thay vì hiệu quả kinh tế dài hạn, dẫn đến các quyết định phân bổ nguồn lực không tối ưu.
explanation: |
  Khái niệm tri thức phân tán của Hayek nhấn mạnh rằng thông tin kinh tế quan trọng chỉ tồn tại dưới dạng các mảnh vụn rải rác giữa các cá nhân, những người hiểu rõ hoàn cảnh địa phương, sở thích chủ quan và chi phí cơ hội của họ.
  Tri thức này không thể được thu thập hoặc tổng hợp tập trung vì nó mang tính ngữ cảnh và liên tục thay đổi. Thị trường tự do điều phối tri thức phân tán này thông qua hệ thống giá cả, nơi các giao dịch tự nguyện bộc lộ sở thích và sự khan hiếm tương đối. Các nhà hoạch định trung ương, bất kể ý định hay khả năng của họ, không thể sao chép quá trình phối hợp tự phát này vì tri thức cần thiết không tồn tại dưới dạng tập trung.
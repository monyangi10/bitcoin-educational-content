question: Waarom slagen centraal geplande economieën er volgens Hayeks theorie van verspreide kennis niet in om middelen efficiënt toe te wijzen in vergelijking met vrije marktsystemen?
answer: Centrale planners hebben geen toegang tot de gefragmenteerde, gelokaliseerde kennis die individuen bezitten over hun specifieke behoeften, voorkeuren en omstandigheden.
wrong_answers:
  - Centrale planners beschikken niet over de rekenkracht en geavanceerde algoritmen die nodig zijn om alle economische gegevens te verwerken en optimale toewijzingsbeslissingen te nemen voor de samenleving.
  - Centrale planners zijn van nature corrupt en hebben eigenbelang. Ze geven voorrang aan hun eigen welzijn boven een efficiënte toewijzing van middelen voor de bredere bevolking.
  - Centrale planners richten zich te veel op politieke voordelen op de korte termijn in plaats van op economische efficiëntie op de lange termijn, wat leidt tot suboptimale beslissingen over de toewijzing van middelen.
explanation: |
  Hayeks concept van verspreide kennis benadrukt dat cruciale economische informatie alleen bestaat als verspreide fragmenten onder individuen die hun lokale omstandigheden, subjectieve voorkeuren en opportuniteitskosten kennen.
  Deze kennis kan niet centraal verzameld of samengevoegd worden omdat het contextgebonden is en voortdurend verandert. Vrije markten coördineren deze verspreide kennis via het prijssysteem, waar vrijwillige uitwisselingen voorkeuren en relatieve schaarste onthullen. Centrale planners, ongeacht hun intenties of capaciteiten, kunnen dit spontane coördinatieproces niet repliceren omdat de noodzakelijke kennis niet in geconcentreerde vorm bestaat.
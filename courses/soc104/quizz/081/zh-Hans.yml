question: 根据哈耶克的知识分散理论，与自由市场体系相比，为什么中央计划经济不能有效地分配资源？
answer: 中央规划人员无法获取个人所拥有的关于其特定需求、偏好和环境的零散、本地化知识，因此无法进行有效的资源分配。
wrong_answers:
  - 中央规划者缺乏必要的计算能力和先进算法来处理所有经济数据，并为社会做出最优分配决策。
  - 中央计划者本质上是腐败和利己的，他们优先考虑自己的福利，而不是为更广泛的人群有效分配资源。
  - 中央计划人员过于注重短期政治利益，而不是长期经济效率，导致资源分配决策不理想。
explanation: |
  哈耶克的 "分散知识 "概念强调，关键的经济信息只能以分散的碎片形式存在于了解当地环境、主观偏好和机会成本的个人之间。
  这种知识无法集中收集或汇总，因为它是因地制宜、不断变化的。自由市场通过价格体系来协调这些分散的知识，自愿的交换揭示了偏好和相对稀缺性。中央计划者，无论其意图或能力如何，都无法复制这种自发的协调过程，因为必要的知识并不以集中的形式存在。
question: Zgodnie z teorią rozproszonej wiedzy Hayeka, dlaczego gospodarki centralnie planowane nie są w stanie efektywnie alokować zasobów w porównaniu z systemami wolnorynkowymi?
answer: Centralni planiści nie mają dostępu do fragmentarycznej, zlokalizowanej wiedzy posiadanej przez jednostki na temat ich konkretnych potrzeb, preferencji i okoliczności, co uniemożliwia efektywną alokację zasobów.
wrong_answers:
  - Centralnym planistom brakuje mocy obliczeniowej i zaawansowanych algorytmów niezbędnych do przetwarzania wszystkich danych ekonomicznych i podejmowania optymalnych decyzji dotyczących alokacji dla społeczeństwa.
  - Centralni planiści są z natury skorumpowani i kierują się własnym interesem, przedkładając własny dobrobyt nad efektywną alokację zasobów dla szerszej populacji.
  - Centralni planiści zbyt mocno koncentrują się na krótkoterminowych korzyściach politycznych, a nie na długoterminowej efektywności gospodarczej, co prowadzi do nieoptymalnych decyzji dotyczących alokacji zasobów.
explanation: |
  Koncepcja rozproszonej wiedzy Hayeka podkreśla, że kluczowe informacje ekonomiczne istnieją tylko jako rozproszone fragmenty wśród jednostek, które znają swoje lokalne uwarunkowania, subiektywne preferencje i koszty alternatywne.
  Wiedza ta nie może być centralnie gromadzona lub agregowana, ponieważ jest kontekstowa i stale się zmienia. Wolne rynki koordynują tę rozproszoną wiedzę poprzez system cenowy, w którym dobrowolne wymiany ujawniają preferencje i względne niedobory. Centralni planiści, niezależnie od ich intencji i możliwości, nie mogą odtworzyć tego spontanicznego procesu koordynacji, ponieważ niezbędna wiedza nie istnieje w skoncentrowanej formie.
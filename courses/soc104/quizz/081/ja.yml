question: ハイエクの知識分散理論によれば、なぜ中央計画経済は自由市場システムに比べて効率的な資源配分に失敗するのか？
answer: 中央のプランナーは、個人のニーズ、嗜好、状況に関する断片的で局所的な知識にアクセスできないため、効率的な資源配分ができない。
wrong_answers:
  - 中央プランナーには、すべての経済データを処理し、社会にとって最適な配分を決定するのに必要な計算能力や高度なアルゴリズムがない。
  - 中央計画者は本質的に腐敗し、利己的であり、より広範な人々のための効率的な資源配分よりも自分たちの福祉を優先する。
  - 中央計画者は長期的な経済効率よりも短期的な政治的利益を重視しすぎるため、資源配分の決定が最適化されない。
explanation: |
  ハイエクの分散知の概念は、重要な経済情報は、その地域の状況、主観的選好、機会費用を知っている個人の間に散在する断片としてのみ存在することを強調している。
  この知識は文脈に左右され、絶えず変化するため、一元的に収集したり集約したりすることはできない。自由市場は、自発的な交換によって嗜好と相対的希少性が明らかになる価格システムを通じて、この分散した知識を調整する。中央計画者は、その意図や能力にかかわらず、必要な知識が集約された形で存在しないため、この自然発生的な調整プロセスを再現することはできない。
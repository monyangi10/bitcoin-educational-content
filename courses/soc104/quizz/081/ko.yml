question: 하이에크의 분산 지식 이론에 따르면, 중앙 계획 경제가 자유 시장 시스템에 비해 자원을 효율적으로 배분하지 못하는 이유는 무엇일까요?
answer: 중앙 기획자는 개인이 가진 특정 요구, 선호도, 상황에 대한 단편적이고 국지적인 지식에 접근할 수 없기 때문에 효율적인 리소스 배분이 불가능합니다.
wrong_answers:
  - 중앙 계획가들은 모든 경제 데이터를 처리하고 사회를 위한 최적의 배분 결정을 내리는 데 필요한 계산 능력과 고급 알고리즘이 부족합니다.
  - 중앙 계획가들은 본질적으로 부패하고 이기적이기 때문에 더 많은 사람들을 위한 효율적인 자원 배분보다 자신의 복지를 우선시합니다.
  - 중앙 계획가들은 장기적인 경제적 효율성보다는 단기적인 정치적 이득에 지나치게 집중하여 최적의 자원 배분 결정을 내리지 못합니다.
explanation: |
  하이에크의 분산 지식 개념은 중요한 경제 정보는 각자의 지역 상황, 주관적 선호도, 기회 비용을 알고 있는 개인들 사이에 흩어져 있는 단편으로만 존재한다는 점을 강조합니다.
  이러한 지식은 상황에 따라 달라지고 끊임없이 변화하기 때문에 중앙에서 수집하거나 집계할 수 없습니다. 자유 시장은 자발적인 교환을 통해 선호도와 상대적 희소성을 드러내는 가격 시스템을 통해 이러한 분산된 지식을 조정합니다. 중앙 기획자들은 그들의 의도나 능력에 관계없이 필요한 지식이 집중된 형태로 존재하지 않기 때문에 이러한 자발적인 조정 과정을 복제할 수 없습니다.
question: 根據哈耶克的分散知識理論，與自由市場體系相比，中央計畫經濟體為何無法有效率地配置資源？
answer: 中央規劃人員無法取得個人對於其特定需求、偏好和環境所擁有的零碎、地方化知識，因此無法有效率地分配資源。
wrong_answers:
  - 中央計畫者缺乏必要的計算能力和先進演算法來處理所有經濟資料，並為社會做出最佳分配決策。
  - 中央計畫者天生腐敗且自私自利，他們會優先考慮自己的福利，而非為廣大民眾有效分配資源。
  - 中央計劃者過度著重短期政治利益，而非長期經濟效率，導致資源分配決策未達最佳。
explanation: |
  哈耶克的分散知識概念強調，關鍵的經濟資訊只以分散的片段形式存在於個人之間，這些個人知道他們當地的環境、主觀偏好和機會成本。
  這些知識無法被集中收集或聚合，因為這些知識與環境有關，而且不斷變化。自由市場透過價格系統協調這些分散的知識，自願的交換揭示了偏好和相對的稀缺性。無論中央計劃者的意圖或能力如何，他們都無法複製這種自發的協調過程，因為必要的知識並不存在於集中的形式中。
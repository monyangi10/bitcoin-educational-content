question: Согласно теории рассеянного знания Хайека, почему централизованная плановая экономика не может эффективно распределять ресурсы по сравнению со свободными рыночными системами?
answer: Центральные планировщики не могут получить доступ к фрагментарным, локализованным знаниям, которыми обладают люди о своих конкретных потребностях, предпочтениях и обстоятельствах, что делает невозможным эффективное распределение ресурсов.
wrong_answers:
  - Центральные планировщики не обладают достаточной вычислительной мощностью и передовыми алгоритмами, необходимыми для обработки всех экономических данных и принятия оптимальных для общества решений о распределении средств.
  - Центральные планировщики по своей природе коррумпированы и корыстны, ставя во главу угла собственное благополучие, а не эффективное распределение ресурсов для широких слоев населения.
  - Центральные планировщики слишком сильно ориентируются на краткосрочные политические выгоды, а не на долгосрочную экономическую эффективность, что приводит к неоптимальным решениям по распределению ресурсов.
explanation: |
  Концепция рассеянного знания Хайека подчеркивает, что важнейшая экономическая информация существует только в виде разрозненных фрагментов среди индивидов, которые знают свои местные обстоятельства, субъективные предпочтения и альтернативные издержки.
  Эти знания невозможно централизованно собрать или агрегировать, поскольку они контекстуальны и постоянно меняются. Свободные рынки координируют эти разрозненные знания через систему цен, где добровольные обмены выявляют предпочтения и относительный дефицит. Центральные планировщики, независимо от их намерений и возможностей, не могут воспроизвести этот спонтанный процесс координации, потому что необходимые знания не существуют в концентрированном виде.
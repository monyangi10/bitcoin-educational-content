question: Menurut teori Hayek tentang pengetahuan yang tersebar, mengapa ekonomi yang direncanakan secara terpusat gagal mengalokasikan sumber daya secara efisien dibandingkan dengan sistem pasar bebas?
answer: Perencana pusat tidak dapat mengakses pengetahuan yang terfragmentasi dan terlokalisasi yang dimiliki oleh setiap orang tentang kebutuhan, preferensi, dan keadaan mereka, sehingga alokasi sumber daya yang efisien menjadi tidak mungkin dilakukan.
wrong_answers:
  - Para perencana pusat tidak memiliki kekuatan komputasi dan algoritma canggih yang diperlukan untuk memproses semua data ekonomi dan membuat keputusan alokasi yang optimal bagi masyarakat.
  - Para perencana di tingkat pusat pada dasarnya korup dan mementingkan diri sendiri, memprioritaskan kesejahteraan mereka sendiri di atas alokasi sumber daya yang efisien untuk masyarakat luas.
  - Para perencana di tingkat pusat terlalu berfokus pada keuntungan politik jangka pendek daripada efisiensi ekonomi jangka panjang, sehingga keputusan alokasi sumber daya menjadi tidak optimal.
explanation: |
  Konsep Hayek tentang pengetahuan yang tersebar menekankan bahwa informasi ekonomi yang penting hanya ada dalam bentuk fragmen-fragmen yang tersebar di antara individu-individu yang mengetahui kondisi lokal, preferensi subjektif, dan biaya peluang mereka.
  Pengetahuan ini tidak dapat dikumpulkan atau dikumpulkan secara terpusat karena bersifat kontekstual dan terus berubah. Pasar bebas mengkoordinasikan pengetahuan yang tersebar ini melalui sistem harga, di mana pertukaran sukarela mengungkapkan preferensi dan kelangkaan relatif. Para perencana pusat, terlepas dari niat atau kemampuan mereka, tidak dapat meniru proses koordinasi spontan ini karena pengetahuan yang diperlukan tidak ada dalam bentuk yang terkonsentrasi.
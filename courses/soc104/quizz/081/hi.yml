question: हेयक के विकेंद्रीकृत ज्ञान के सिद्धांत के अनुसार, मुक्त बाजार प्रणालियों की तुलना में केंद्रीय नियोजित अर्थव्यवस्थाएं संसाधनों का कुशलतापूर्वक आवंटन करने में विफल क्यों होती हैं?
answer: केंद्रीय योजनाकार व्यक्तियों की विशिष्ट आवश्यकताओं, प्राथमिकताओं और परिस्थितियों के बारे में उनके पास मौजूद खंडित, स्थानीय ज्ञान तक पहुंच नहीं सकते हैं, जिससे संसाधनों का कुशल आवंटन असंभव हो जाता है।
wrong_answers:
  - केंद्रीय योजनाकारों के पास सभी आर्थिक आंकड़ों को संसाधित करने और समाज के लिए इष्टतम आवंटन निर्णय लेने के लिए आवश्यक कम्प्यूटेशनल शक्ति और उन्नत एल्गोरिदम की कमी है।
  - केंद्रीय योजनाकार स्वभावतः भ्रष्ट और स्वार्थी होते हैं, जो व्यापक जनसमुदाय के लिए संसाधनों के कुशल आवंटन की तुलना में अपने स्वयं के कल्याण को प्राथमिकता देते हैं।
  - केंद्रीय योजनाकार दीर्घकालिक आर्थिक दक्षता के बजाय अल्पकालिक राजनीतिक लाभों पर बहुत अधिक ध्यान केंद्रित करते हैं, जिससे संसाधनों के आवंटन के अनुचित निर्णय होते हैं।
explanation: |
  हेयक की विरल ज्ञान की अवधारणा इस बात पर बल देती है कि महत्वपूर्ण आर्थिक जानकारी केवल उन व्यक्तियों के बीच बिखरे हुए टुकड़ों के रूप में मौजूद होती है जो अपनी स्थानीय परिस्थितियों, व्यक्तिगत प्राथमिकताओं और अवसर लागतों को जानते हैं।
  यह ज्ञान केंद्रीय रूप से एकत्रित या समेकित नहीं किया जा सकता क्योंकि यह प्रासंगिक है और निरंतर परिवर्तनशील है। मुक्त बाजार मूल्य प्रणाली के माध्यम से इस विरल ज्ञान का समन्वय करते हैं, जहां स्वैच्छिक आदान-प्रदान प्राथमिकताओं और सापेक्षिक कमी को प्रकट करते हैं। केंद्रीय योजनाकार, चाहे उनके इरादे या क्षमताएं कुछ भी हों, इस सहज समन्वय प्रक्रिया को दोहरा नहीं सकते क्योंकि आवश्यक ज्ञान केंद्रित रूप में मौजूद नहीं है।
question: Защо е опасно възстановяването на стар channel.db?
answer: Риск от санкции
wrong_answers:
  - Загуба на seed
  - Сплетни за корупция
  - Блокиране на маршрутизацията
explanation: |
  Неактуалната информация може да се тълкува като опит за измама и да доведе до загуба на средства от канала.

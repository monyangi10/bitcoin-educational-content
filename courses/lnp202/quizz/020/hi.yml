question: किसी पुराने channel.db को पुनर्स्थापित करना खतरनाक क्यों है?
answer: दंड जोखिम
wrong_answers:
  - जीडब्ल्यू-0 का नुकसान
  - गपशप भ्रष्टाचार
  - रूटिंग को अवरुद्ध करना
explanation: |
  पुरानी जानकारी को धोखाधड़ी का प्रयास माना जा सकता है और इसके परिणामस्वरूप चैनल की धनराशि का नुकसान हो सकता है।
reviewed: false
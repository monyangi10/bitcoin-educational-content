question: Какое закрытие канала лучше всего подходит для Lightning?
answer: Кооперативное закрытие
wrong_answers:
  - Принудительное закрытие
  - Закрытие с изменой
  - Закрытие Watchtower
explanation: |
  Кооперативное закрытие происходит быстрее, и вы имеете возможность выбирать комиссионные по цепочке.

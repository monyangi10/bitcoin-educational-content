question: Кое затваряне на канала е най-подходящо за Lightning?
answer: Приключване на сътрудничеството
wrong_answers:
  - Принудително затваряне
  - Приключване с измама
  - Затваряне на Watchtower
explanation: |
  Кооперативното затваряне е по-бързо и ви позволява да избирате такси по веригата.

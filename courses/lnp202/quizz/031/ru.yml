question: Что представляет собой идентификатор узла Lightning?
answer: Открытый ключ и адрес узла
wrong_answers:
  - Узел seed и его адрес
  - Псевдоним узла и открытый ключ
  - Псевдоним узла Hash и seed
explanation: |
  Идентификатор узла объединяет открытый ключ узла с его сетевым адресом и портом.

question: Какво представлява идентификаторът на възел на Lightning?
answer: Публичен ключ и адрес на възела
wrong_answers:
  - Възел seed и адрес
  - Псевдоним на възел и публичен ключ
  - Псевдоним на възел Hash и seed
explanation: |
  Идентификаторът на възела съчетава публичния ключ на възела с неговия мрежов адрес и порт.

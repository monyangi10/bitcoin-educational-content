question: Кое решение ви позволява да стартирате истински възел Lightning на мобилни телефони?
answer: Вграден възел LN
wrong_answers:
  - Попечителска мълния wallet
  - Светкавична атомна размяна
  - Обединени канали
explanation: |
  Решения като Phoenix или Zeus Embedded вграждат истински възел Lightning директно в приложението.
reviewed: false
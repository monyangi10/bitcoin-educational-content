question: Какое решение позволяет запускать реальный узел Lightning на мобильных телефонах?
answer: Встроенный узел LN
wrong_answers:
  - Опекунская молния wallet
  - Молниеносный атомный обмен
  - Федеративные каналы
explanation: |
  Такие решения, как Phoenix или Zeus Embedded, встраивают подлинный узел Lightning непосредственно в приложение.
reviewed: false
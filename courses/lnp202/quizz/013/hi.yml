question: कौन सा समाधान आपको मोबाइल फोन पर वास्तविक लाइटनिंग नोड चलाने में सक्षम बनाता है?
answer: एम्बेडेड LN नोड
wrong_answers:
  - कस्टोडियल लाइटनिंग wallet
  - बिजली की तरह परमाणु अदला-बदली
  - फेडरेटेड चैनल
explanation: |
  Phoenix या Zeus Embedded जैसे समाधान एक वास्तविक लाइटनिंग नोड को सीधे एप्लिकेशन में एम्बेड करते हैं।
reviewed: false
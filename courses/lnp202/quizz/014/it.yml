question: Quali caratteristiche comuni hanno Aqua e BULL Wallet?
answer: Scambi atomici Lightning
wrong_answers:
  - Canali Lightning nativi
  - Custodia centralizzata
  - Nodo Lightning integrato
explanation: |
  Questi wallet utilizzano gli swap atomici per pagare le intece Lightning senza sfruttare un nodo Lightning direttamente sul telefono e rimanendo in autocustodia.

question: คุณสมบัติทั่วไปที่ Aqua และ Bull Bitcoin Wallet มีร่วมกันคืออะไร?
answer: การแลกเปลี่ยนอะตอมแบบสายฟ้าแลบ
wrong_answers:
  - ช่องสายฟ้าพื้นเมือง
  - การดูแลแบบรวมศูนย์
  - โหนดสายฟ้าบูรณาการ
explanation: |
  wallet เหล่านี้ใช้การแลกเปลี่ยนอะตอมเพื่อชำระใบแจ้งหนี้ Lightning โดยไม่ต้องใช้โหนด Lightning โดยตรงบนโทรศัพท์ของคุณและยังคงรักษาการควบคุมตนเอง
reviewed: false
question: ویژگی‌های مشترک Aqua و BULL Wallet چیست؟
answer: مبادله اتمی لایتنینگ
wrong_answers:
  - کانال‌های لایتنینگ بومی
  - نگهداری متمرکز
  - گره رعد و برق یکپارچه
explanation: |
  این walletها از مبادلات اتمی برای پرداخت فاکتورهای Lightning استفاده می‌کنند بدون اینکه به‌طور مستقیم از یک نود Lightning روی تلفن شما بهره‌برداری کنند و در عین حال در حالت خود-نگهداری باقی بمانند.
reviewed: false
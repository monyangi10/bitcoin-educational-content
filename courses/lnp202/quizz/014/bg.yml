question: Какви общи характеристики имат Aqua и Bull Bitcoin Wallet?
answer: Светкавични атомни размени
wrong_answers:
  - Родни канали на Lightning
  - Централизирано попечителство
  - Интегриран възел Lightning
explanation: |
  Тези wallet използват атомарни суапове за плащане на фактури от Lightning, без да използват възел на Lightning директно на телефона ви и като остават в режим на самостоятелно съхранение.
reviewed: false
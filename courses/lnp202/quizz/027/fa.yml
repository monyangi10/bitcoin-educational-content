question: برج مراقبت چه اطلاعاتی برای نظارت بر تقلب دریافت می‌کند؟
answer: TXID جزئی از تراکنش تقلبی
wrong_answers:
  - کلید کانال خصوصی
  - وضعیت کامل کانال
  - TXID تراکنش تقلبی
explanation: |
  برج مراقبت تنها بخشی از TXID تراکنش تقلبی را دریافت می‌کند تا یک تراکنش مشکوک را بدون دانستن کانال شناسایی کند.
reviewed: false
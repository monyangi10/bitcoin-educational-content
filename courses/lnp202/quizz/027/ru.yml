question: Какую информацию получает "Сторожевая башня" для отслеживания мошенничества?
answer: Частичный TXID транзакции обмана
wrong_answers:
  - Ключ частного канала
  - Полный статус канала
  - TXID транзакции обмана
explanation: |
  Сторожевая башня получает только часть TXID обманной транзакции, чтобы определить подозрительную транзакцию, не зная канала.
reviewed: false
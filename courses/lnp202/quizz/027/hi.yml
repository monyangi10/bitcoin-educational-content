question: धोखाधड़ी की निगरानी के लिए वॉचटावर को कौन सी जानकारी प्राप्त होती है?
answer: धोखाधड़ी वाले लेनदेन का आंशिक TXID
wrong_answers:
  - निजी चैनल कुंजी
  - चैनल की संपूर्ण स्थिति
  - धोखाधड़ी वाले लेनदेन का TXID
explanation: |
  वॉचटावर को धोखाधड़ी वाले लेनदेन के TXID का केवल एक हिस्सा ही प्राप्त होता है, जिससे चैनल को जाने बिना ही संदिग्ध लेनदेन की पहचान की जा सके।
reviewed: false
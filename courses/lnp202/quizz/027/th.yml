question: Watchtower ได้รับข้อมูลอะไรบ้างในการตรวจสอบการโกง?
answer: TXID บางส่วนของธุรกรรมการโกง
wrong_answers:
  - คีย์ช่องส่วนตัว
  - สถานะช่องทั้งหมด
  - TXID ของธุรกรรมการโกง
explanation: |
  หอคอยเฝ้าระวังจะได้รับเพียงส่วนหนึ่งของ TXID ของธุรกรรมการโกงเพื่อระบุธุรกรรมที่น่าสงสัยโดยไม่ทราบช่องทาง
reviewed: false
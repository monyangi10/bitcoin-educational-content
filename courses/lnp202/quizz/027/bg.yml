question: Каква информация получава Стражевата кула, за да следи за измами?
answer: Частичен TXID на транзакцията, свързана с измама
wrong_answers:
  - Ключ за частен канал
  - Пълно състояние на канала
  - TXID на транзакцията, с която се извършва измама
explanation: |
  Наблюдателната кула получава само част от TXID на измамната транзакция, за да идентифицира подозрителна транзакция, без да знае канала.
reviewed: false
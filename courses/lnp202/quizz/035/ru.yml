question: Каково основное назначение маршрутизатора на Lightning?
answer: Зарабатывайте на комиссии за маршрутизацию
wrong_answers:
  - Зарабатывайте деньги, показывая дорогу
  - Зарабатывайте деньги, продавая поступающую ликвидность
  - Зарабатывайте деньги, публикуя устаревшие сведения о канале
explanation: |
  Маршрутизатор стремится направлять платежи от других людей, взимая плату за маршрутизацию.

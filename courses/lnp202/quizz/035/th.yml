question: วัตถุประสงค์หลักของเราเตอร์บน Lightning คืออะไร?
answer: รับเงินด้วยค่าธรรมเนียมการกำหนดเส้นทาง
wrong_answers:
  - สร้างรายได้ด้วยการชี้ทาง
  - การทำเงินโดยการขายสภาพคล่องที่เข้ามา
  - สร้างรายได้โดยการเผยแพร่สถานะช่องที่ล้าสมัย
explanation: |
  เราเตอร์พยายามที่จะส่งต่อการชำระเงินจากผู้อื่นโดยการเก็บค่าธรรมเนียมการส่งต่อ.
reviewed: false
question: Какво е основното предназначение на маршрутизатора в Lightning?
answer: Печелете пари с такси за маршрутизиране
wrong_answers:
  - Печелете пари, като показвате пътя
  - Печелене на пари чрез продажба на входяща ликвидност
  - Спечелете пари от публикуването на остарели държави на канала
explanation: |
  Маршрутизаторът се стреми да насочва плащания от други лица, като събира такси за маршрутизиране.

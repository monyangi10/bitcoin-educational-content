question: लाइटनिंग नेटवर्क पर राउटर का मुख्य उद्देश्य क्या है?
answer: रूटिंग शुल्क से पैसे कमाएँ
wrong_answers:
  - रास्ता दिखाकर पैसा कमाएँ
  - आने वाली तरलता को बेचकर पैसा कमाना
  - पुराने चैनल स्टेटस प्रकाशित करके पैसे कमाएँ
explanation: |
  राउटर, रूटिंग शुल्क वसूल करके दूसरों से प्राप्त भुगतानों को रूट करने का प्रयास करता है।
reviewed: false
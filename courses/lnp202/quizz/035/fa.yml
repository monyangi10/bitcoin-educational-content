question: هدف اصلی یک روتر در شبکه لایتنینگ چیست؟
answer: کسب درآمد با کارمزدهای مسیریابی
wrong_answers:
  - با نشان دادن راه پول درآورید
  - کسب درآمد از طریق فروش نقدینگی ورودی
  - با انتشار وضعیت‌های قدیمی کانال پول درآورید
explanation: |
  روتر به دنبال مسیریابی پرداخت‌ها از دیگران با جمع‌آوری هزینه‌های مسیریابی است.
reviewed: false
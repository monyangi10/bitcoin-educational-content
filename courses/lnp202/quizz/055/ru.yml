question: В потоке NWC, когда происходит шифрование на стороне приложения?
answer: Перед публикацией на реле
wrong_answers:
  - После прочтения узла
  - После публикации на эстафете
  - Никогда
explanation: |
  Приложение сериализует запрос, шифрует его, а затем публикует как событие на ретрансляторе Nostr.
reviewed: false
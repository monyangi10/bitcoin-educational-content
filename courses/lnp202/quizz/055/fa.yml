question: در جریان NWC، رمزگذاری در چه زمانی در سمت برنامه انجام می‌شود؟
answer: قبل انتشار در رله
wrong_answers:
  - پس از خواندن گره
  - پس از انتشار در رله
  - هرگز
explanation: |
  برنامه درخواست را سریال‌سازی می‌کند، آن را رمزگذاری می‌کند، سپس به عنوان یک رویداد در یک رله Nostr منتشر می‌کند.
reviewed: false
question: Кога в потока NWC се извършва криптиране от страна на приложението?
answer: Преди публикуване на релето
wrong_answers:
  - След като прочетете възела
  - След публикация в ретранслатора
  - Никога
explanation: |
  Приложението сериализира заявката, криптира я и я публикува като събитие в ретранслатор Nostr.

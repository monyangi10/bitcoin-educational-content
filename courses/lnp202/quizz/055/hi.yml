question: NWC फ्लो में, एप्लिकेशन साइड पर एन्क्रिप्शन कब होता है?
answer: रिले पर प्रकाशन से पहले
wrong_answers:
  - नोड को पढ़ने के बाद
  - रिले पर प्रकाशन के बाद
  - कभी नहीं
explanation: |
  एप्लिकेशन अनुरोध को क्रमबद्ध करता है, उसे एन्क्रिप्ट करता है, और फिर उसे Nostr रिले पर एक इवेंट के रूप में प्रकाशित करता है।
reviewed: false
question: कस्टोडियल लाइटनिंग जीडब्ल्यू-0 के साथ, बिटकॉइन का मालिक कौन है?
answer: कंपनी
wrong_answers:
  - प्रयोगकर्ता
  - लाइटनिंग नेटवर्क
  - जीडब्ल्यू-1 कोर
explanation: |
  एक कस्टोडियल मॉडल में, कंपनी चाबियां रखती है और फंड को नियंत्रित करती है, जबकि उपयोगकर्ता के पास केवल एक अकाउंटिंग बैलेंस होता है।
reviewed: false
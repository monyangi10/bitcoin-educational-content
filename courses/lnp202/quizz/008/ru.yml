question: При использовании хранилища Lightning wallet кому принадлежат биткоины?
answer: Компания
wrong_answers:
  - Пользователь
  - Сеть Lightning
  - Bitcoin Core
explanation: |
  В кастодиальной модели компания владеет ключами и контролирует средства, а пользователь имеет только бухгалтерский баланс.
reviewed: false
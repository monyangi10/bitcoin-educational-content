question: Kwa kutumia Lightning wallet, nani anamiliki bitcoins?
answer: Kampuni
wrong_answers:
  - Mtumiaji
  - Mtandao wa Umeme
  - Kiini cha Bitcoin
explanation: |
  Katika mfumo wa uangalizi, kampuni hushikilia funguo na kudhibiti fedha, huku mtumiaji akiwa na salio la uhasibu pekee.

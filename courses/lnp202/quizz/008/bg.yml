question: При попечителска услуга Lightning wallet кой е собственик на биткойните?
answer: Компанията
wrong_answers:
  - Потребителят
  - Мрежата за светкавици
  - Ядро Bitcoin
explanation: |
  При попечителския модел компанията държи ключовете и контролира средствата, докато потребителят разполага само със счетоводен баланс.
reviewed: false
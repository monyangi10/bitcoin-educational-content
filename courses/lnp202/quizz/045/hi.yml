question: एक मर्चेंट लाइटनिंग नोड ऑपरेटर generate इनबाउंड लिक्विडिटी के लिए अपने स्वयं के भुगतानों पर निर्भर क्यों नहीं रह सकता है?
answer: मुख्यतः आने वाले प्रवाह
wrong_answers:
  - मुख्यतः बहिर्गामी प्रवाह
  - चैनल बहुत छोटे हैं
  - उच्च ऑनचेन शुल्क
explanation: |
  बिना खर्च किए नकदी प्राप्त करके, व्यापारी स्वाभाविक रूप से अपने चैनलों से तरलता को बाहर नहीं निकालता है।
reviewed: false
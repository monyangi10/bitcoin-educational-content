question: ทำไมผู้ดำเนินการโหนด Lightning ของพ่อค้าถึงไม่สามารถพึ่งพาการชำระเงินของตนเองเพื่อสภาพคล่องขาเข้าของ generate ได้?
answer: ส่วนใหญ่เป็นการไหลเข้าขาเข้า
wrong_answers:
  - ส่วนใหญ่เป็นการไหลออก
  - ช่องเล็กเกินไป
  - ค่าธรรมเนียมบนเชนสูง
explanation: |
  โดยการขึ้นเงินโดยไม่ใช้จ่าย พ่อค้าไม่ได้เคลื่อนย้ายสภาพคล่องออกจากช่องทางของเขาโดยธรรมชาติ
reviewed: false
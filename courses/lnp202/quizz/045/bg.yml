question: Защо операторът на търговския възел Lightning не може да разчита на собствените си плащания за входяща ликвидност?
answer: Предимно входящи потоци
wrong_answers:
  - Предимно изходящи потоци
  - Твърде малки канали
  - Високи такси за ползване на веригата
explanation: |
  Като осребрява парите, без да ги харчи, търговецът естествено не прехвърля ликвидност от своите канали.
reviewed: false
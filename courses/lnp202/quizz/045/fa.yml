question: چرا یک اپراتور نود لایتنینگ تاجر نمی‌تواند برای تأمین نقدینگی ورودی generate به پرداخت‌های خود متکی باشد؟
answer: عمدتاً جریان‌های ورودی
wrong_answers:
  - جریان‌های عمدتاً خروجی
  - کانال‌ها خیلی کوچک هستند
  - هزینه‌های بالای زنجیره‌ای
explanation: |
  با نقد کردن بدون خرج کردن، تاجر به طور طبیعی نقدینگی را از کانال‌های خود خارج نمی‌کند.
reviewed: false
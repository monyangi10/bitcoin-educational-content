question: Tại sao người vận hành nút Lightning không thể dựa vào các khoản thanh toán của chính mình cho thanh khoản đến generate?
answer: Chủ yếu là các luồng vào
wrong_answers:
  - Chủ yếu là dòng chảy ra ngoài
  - Kênh quá nhỏ
  - Phí onchain cao
explanation: |
  Bằng cách rút tiền mà không cần chi tiêu, người bán không vô tình làm chuyển dịch thanh khoản ra khỏi hệ thống của mình.
reviewed: false
question: Почему оператор торгового узла Lightning не может полагаться на свои собственные платежи для generate входящей ликвидности?
answer: В основном входящие потоки
wrong_answers:
  - В основном исходящие потоки
  - Слишком маленькие каналы
  - Высокие сборы за работу с цепями
explanation: |
  Обналичивая деньги и не тратя их, торговец не выводит ликвидность из своих каналов естественным образом.

question: कौन सा तंत्र पुराने लाइटनिंग चैनल स्टेट को जारी होने से रोकता है?
answer: निरस्तीकरण कुंजी
wrong_answers:
  - लेनदेन शुल्क
  - पूर्ण समयबद्धता
  - नेटवर्क गपशप
explanation: |
  निरस्तीकरण कुंजियों का उपयोग उस नोड को दंडित करने के लिए किया जाता है जो चैनल की पुरानी स्थिति को प्रकाशित करने का प्रयास करता है।
reviewed: false
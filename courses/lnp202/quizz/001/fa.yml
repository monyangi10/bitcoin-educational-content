question: چه مکانیزمی از انتشار یک وضعیت قدیمی کانال لایتنینگ جلوگیری می‌کند؟
answer: کلید ابطال
wrong_answers:
  - هزینه‌های تراکنش
  - قفل‌های زمانی مطلق
  - شایعات شبکه
explanation: |
  کلیدهای ابطال برای مجازات یک نودی که سعی می‌کند یک وضعیت کانال قدیمی را منتشر کند، استفاده می‌شوند.
reviewed: false
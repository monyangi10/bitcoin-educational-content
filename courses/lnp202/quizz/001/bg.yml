question: Кой механизъм предотвратява освобождаването на старото състояние на канала Lightning?
answer: Ключът за отменяне
wrong_answers:
  - Такси за транзакции
  - Абсолютни часовници
  - Мрежови клюки
explanation: |
  Ключовете за отмяна се използват за наказване на възел, който се опитва да публикува старо състояние на канала.
reviewed: false
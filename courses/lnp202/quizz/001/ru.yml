question: Какой механизм предотвращает освобождение старого состояния канала Lightning?
answer: Ключ отзыва
wrong_answers:
  - Комиссионные за транзакции
  - Абсолютные хронометры
  - Сетевые сплетни
explanation: |
  Ключи отзыва используются для наказания узла, который пытается опубликовать старое состояние канала.
reviewed: false
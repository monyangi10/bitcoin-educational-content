question: Почему стоит избегать очень больших узлов для первого канала?
answer: Ограничительная политика
wrong_answers:
  - Низкая связность
  - Слишком низкие затраты
  - Отсутствие ликвидности
explanation: |
  Очень крупные узлы часто устанавливают высокие минимальные суммы и легко закрывают небольшие каналы.

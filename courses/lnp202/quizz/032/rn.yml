question: Ni kuki wokwirinda ama node manini cane ku bijanye n’umurongo wa mbere?
answer: Amategeko agenga
wrong_answers:
  - Uguhuzwa guke
  - Ibiciro biri hasi cane
  - Kubura amafaranga
explanation: |
  Ivyuma binini cane akenshi bitegeka amafaranga menshi cane kandi bikafunga bitagoranye imirongo mitoyi.

question: Защо да се избягват много големи възли за първия канал?
answer: Рестриктивни политики
wrong_answers:
  - Ниска степен на свързаност
  - Твърде ниски разходи
  - Липса на ликвидност
explanation: |
  Много големите възли често налагат високи минимални суми и лесно затварят малки канали.

question: पहले चैनल के लिए बहुत बड़े नोड्स से क्यों बचना चाहिए?
answer: प्रतिबंधात्मक नीतियां
wrong_answers:
  - कम कनेक्टिविटी
  - लागत बहुत कम है
  - तरलता की कमी
explanation: |
  बहुत बड़े नोड्स अक्सर उच्च न्यूनतम राशि निर्धारित करते हैं और छोटे चैनलों को आसानी से बंद कर देते हैं।
reviewed: false
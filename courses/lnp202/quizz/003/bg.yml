question: Коя от тези операции на Lightning изисква публикуването на транзакция във веригата?
answer: Отваряне на канала
wrong_answers:
  - Светкавично плащане
  - Маршрутизиране с няколко преки
  - Връзка с мобилен клиент
explanation: |
  Отварянето на канал съответства на транзакция Bitcoin, публикувана в блокчейна.
reviewed: false
question: Какая из этих операций Lightning требует публикации транзакции в сети?
answer: Открытие канала
wrong_answers:
  - Молниеносная оплата
  - Многоходовая маршрутизация
  - Подключение мобильного клиента
explanation: |
  Открытие канала соответствует транзакции Bitcoin, опубликованной в блокчейне.
reviewed: false
question: کدام یک از این عملیات‌های Lightning نیاز به انتشار یک تراکنش در زنجیره دارد؟
answer: افتتاح کانال
wrong_answers:
  - پرداخت لایتنینگ
  - مسیر یابی چند مرحله‌ای
  - اتصال مشتری موبایل
explanation: |
  باز شدن یک کانال با یک تراکنش Bitcoin که در بلاکچین منتشر شده است، مطابقت دارد.
reviewed: false
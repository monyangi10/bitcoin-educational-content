question: Какова пропускная способность канала Lightning?
answer: Общая сумма блокировки
wrong_answers:
  - Общая доступная ликвидность в одном направлении
  - Максимальные сборы
  - Максимальное количество возможных платежей
explanation: |
  Пропускная способность соответствует общей сумме sats, заблокированных в мультисигмальном выходе канала.

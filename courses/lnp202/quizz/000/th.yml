question: ความจุของช่องสัญญาณ Lightning คือเท่าใด?
answer: ยอดรวมที่ถูกล็อค
wrong_answers:
  - สภาพคล่องที่มีอยู่ทั้งหมดในทิศทางเดียว
  - ค่าธรรมเนียมสูงสุด
  - จำนวนการชำระเงินสูงสุดที่เป็นไปได้
explanation: |
  ความจุสอดคล้องกับผลรวมทั้งหมดของ sats ที่ถูกบล็อกในเอาต์พุต multisig ของช่องทาง

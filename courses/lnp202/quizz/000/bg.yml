question: Какъв е капацитетът на канала Lightning?
answer: Обща блокирана сума
wrong_answers:
  - Обща налична ликвидност в една посока
  - Максимални такси
  - Максимален брой възможни плащания
explanation: |
  Капацитетът съответства на общата сума на sats, блокирани в многосигналния изход на канала.
reviewed: false
question: کدام راه‌حل بیشترین حاکمیت را برای کاربران لایتنینگ ارائه می‌دهد؟
answer: گره کلاسیک لایتنینگ
wrong_answers:
  - Wallet با مبادله اتمی
  - روی گره LN
  - نگهداری لایتنینگ wallet
explanation: |
  گره کلاسیک کنترل کامل بر کانال‌ها، نقدینگی و سیاست‌های کارمزد را فراهم می‌کند. این تنها گزینه‌ای است که به شما اجازه می‌دهد واقعاً مستقل باشید.
reviewed: false
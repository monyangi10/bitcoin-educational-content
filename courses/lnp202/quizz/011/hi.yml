question: कौन सा समाधान लाइटनिंग उपयोगकर्ताओं के लिए सबसे अधिक संप्रभुता प्रदान करता है?
answer: क्लासिक लाइटनिंग नोड
wrong_answers:
  - परमाणु अदला-बदली के साथ Wallet
  - LN नोड पर
  - कस्टोडियल लाइटनिंग wallet
explanation: |
  क्लासिक नोड चैनलों, तरलता और शुल्क नीतियों पर पूर्ण नियंत्रण प्रदान करता है। यह एकमात्र ऐसा नोड है जो आपको वास्तव में स्वतंत्र होने की अनुमति देता है।
reviewed: false
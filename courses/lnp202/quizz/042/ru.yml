question: В чем главный недостаток принудительного закрытия?
answer: Средства заблокированы временной блокировкой
wrong_answers:
  - Частичная потеря средств
  - Устаревание узла Lightning
  - Десинхронизация узла молнии
explanation: |
  Средства блокируются временным замком, а комиссии часто бывают высокими.

question: Какъв е основният недостатък на принудителното затваряне?
answer: Средства, блокирани от таймлока
wrong_answers:
  - Частична загуба на средства
  - Остаряване на възела Lightning
  - Десинхронизация на възел Lightning
explanation: |
  Средствата се блокират с времеви блокаж, а таксите често са високи.

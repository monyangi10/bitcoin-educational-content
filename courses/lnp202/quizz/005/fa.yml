question: یک اپراتور wallet لایتنینگ حضانتی چه داده‌هایی را می‌تواند درباره کاربران خود مشاهده کند؟
answer: تمام جریان‌های آن‌ها
wrong_answers:
  - هویت‌های آن‌ها
  - فراداده پرداخت‌های آن‌ها، اما بدون مبالغ
  - هزینه‌های پرداخت‌های آن‌ها، اما بدون مبالغ
explanation: |
  اپراتور به مبالغ، فرکانس‌ها، گیرندگان و عادات پرداخت کاربر دسترسی دارد - به طور خلاصه، او می‌تواند همه چیز را مشاهده کند، حتی اگر این خدمات اغلب بدون KYC باشند.
reviewed: false
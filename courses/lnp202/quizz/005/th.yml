question: ผู้ดำเนินการ Lightning wallet แบบมีผู้ดูแลสามารถสังเกตข้อมูลใดเกี่ยวกับผู้ใช้ได้บ้าง?
answer: ทั้งหมดของการไหลของพวกเขา
wrong_answers:
  - ตัวตนของพวกเขา
  - เมตาดาทาของการชำระเงินของพวกเขา แต่ไม่มีจำนวนเงิน
  - ค่าใช้จ่ายในการชำระเงินของพวกเขา แต่ไม่มีจำนวนเงิน
explanation: |
  ผู้ดำเนินการสามารถเข้าถึงจำนวนเงิน ความถี่ ผู้รับ และพฤติกรรมการชำระเงินของผู้ใช้ - กล่าวโดยย่อ เขาสามารถสังเกตทุกอย่างได้ แม้ว่าบริการเหล่านี้มักจะไม่มีการยืนยันตัวตน (KYC) ก็ตาม
reviewed: false
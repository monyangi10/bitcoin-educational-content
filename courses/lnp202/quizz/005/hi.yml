question: लाइटनिंग जीडब्ल्यू-0 का संरक्षक संचालक अपने उपयोगकर्ताओं के बारे में कौन-कौन सा डेटा देख सकता है?
answer: उनके सभी प्रवाह
wrong_answers:
  - उनकी पहचान
  - उनके भुगतानों का मेटाडेटा, लेकिन राशि के बिना
  - उनके भुगतान की लागत, लेकिन राशि के बिना
explanation: |
  ऑपरेटर के पास उपयोगकर्ता की राशि, आवृत्ति, प्राप्तकर्ता और भुगतान की आदतों तक पहुंच होती है - संक्षेप में, वह सब कुछ देख सकता है, भले ही ये सेवाएं अक्सर केवाईसी-मुक्त हों।
reviewed: false
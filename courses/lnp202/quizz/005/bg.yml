question: Какви данни може да наблюдава операторът на Lightning wallet за своите потребители?
answer: Всички техни потоци
wrong_answers:
  - Тяхната идентичност
  - Метаданните за техните плащания, но без сумите
  - Разходите за техните плащания, но без сумите
explanation: |
  Операторът има достъп до сумите, честотата, получателите и навиците за плащане на потребителя - накратко, той може да наблюдава всичко, въпреки че тези услуги често са свободни от KYC.
reviewed: false
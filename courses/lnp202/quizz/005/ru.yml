question: Какие данные оператор Lightning wallet может получить о своих пользователях?
answer: Все их потоки
wrong_answers:
  - Их личности
  - Метаданные об их платежах, но без сумм
  - Расходы на их оплату, но без сумм
explanation: |
  Оператор имеет доступ к данным о суммах, частоте, получателях и привычках пользователя по платежам - словом, он может наблюдать за всем, несмотря на то, что эти сервисы часто не содержат KYC.
reviewed: false
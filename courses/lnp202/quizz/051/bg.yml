question: Кой порт трябва да бъде зададен в Zeus за описаната в тази глава връзка LND (REST)?
answer: 8080
wrong_answers:
  - 8333
  - 8332
  - 50001
explanation: |
  За да получите достъп до API от вашия възел LND на Umbrel, трябва да използвате порт 8080 при конфигурирането на Zeus.

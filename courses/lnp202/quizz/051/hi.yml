question: इस अध्याय में वर्णित LND (REST) ​​कनेक्शन के लिए Zeus में कौन सा पोर्ट सेट करना होगा?
answer: 8080
wrong_answers:
  - 8333
  - 8332
  - 50001
explanation: |
  Umbrel पर स्थित अपने LND नोड से API तक पहुँचने के लिए, Zeus को कॉन्फ़िगर करते समय आपको पोर्ट 8080 का उपयोग करना होगा।
reviewed: false
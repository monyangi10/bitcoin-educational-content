question: Какие критерии определяют ваш выбор решения Lightning?
answer: Частота использования и готовность управлять
wrong_answers:
  - Суммы обмена и скорость протокола
  - Геолокация и образование
  - Толерантность к риску и разработка программного обеспечения
explanation: |
  Выбор в основном зависит от того, как часто используется Lightning и насколько вам нравится техническое управление.

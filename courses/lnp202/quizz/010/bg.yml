question: Какви критерии определят избора ви на решение за Lightning?
answer: Честота на използване и готовност за управление
wrong_answers:
  - Обменени суми и скорост на протокола
  - Геолокация и образование
  - Толерантност към риска и проектиране на софтуер
explanation: |
  Изборът зависи главно от това колко често се използва Lightning и колко ви харесва техническото управление.

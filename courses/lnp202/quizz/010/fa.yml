question: چه معیارهایی انتخاب راه‌حل Lightning شما را تعیین می‌کنند؟
answer: تکرار استفاده و تمایل به مدیریت
wrong_answers:
  - مقادیر مبادله شده و سرعت پروتکل
  - موقع جغرافیایی و آموزش
  - تحمل ریسک و طراحی نرم‌افزار
explanation: |
  انتخاب عمدتاً به این بستگی دارد که چقدر از Lightning استفاده می‌شود و چقدر به مدیریت فنی علاقه دارید.
reviewed: false
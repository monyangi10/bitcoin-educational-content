question: आप लाइटनिंग सॉल्यूशन का चयन किन मानदंडों के आधार पर करते हैं?
answer: उपयोग की आवृत्ति और प्रबंधन करने की तत्परता
wrong_answers:
  - विनिमय की गई राशि और प्रोटोकॉल की गति
  - भौगोलिक स्थान निर्धारण और शिक्षा
  - जोखिम सहनशीलता और सॉफ्टवेयर डिजाइन
explanation: |
  यह चुनाव मुख्य रूप से इस बात पर निर्भर करता है कि लाइटनिंग का उपयोग कितनी बार किया जाता है और आपको तकनीकी प्रबंधन कितना पसंद है।
reviewed: false
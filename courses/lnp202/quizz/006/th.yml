question: ความเสี่ยงทางการเงินกับการดูแล Lightning wallet คืออะไร?
answer: Fractional reserve
wrong_answers:
  - การเพิ่มค่าธรรมเนียม mining โดยพลการ
  - การโจมตี 51%
  - การหยุดตลาดหมีอย่างเด็ดขาด
explanation: |
  ผู้ใช้ไม่สามารถยืนยันได้ว่ายอดคงเหลือที่แสดงนั้นสอดคล้องกับบิตคอยน์ที่ถืออยู่จริงหรือไม่ ดังนั้นจึงมีความเสี่ยงของการสำรองแบบเศษส่วน

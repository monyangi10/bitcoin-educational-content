question: Какъв е финансовият риск при попечителската услуга Lightning wallet?
answer: Фракционен резерв
wrong_answers:
  - Произволно увеличение на таксите mining
  - 51% атака
  - Окончателно спиране на мечия пазар
explanation: |
  Потребителят не може да провери дали показаните салда действително съответстват на притежаваните биткойни. Следователно съществува риск от частичен резерв.
reviewed: false
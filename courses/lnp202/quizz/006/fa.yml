question: ریسک مالی با یک Lightning wallet حضانتی چیست؟
answer: ذخیره کسری
wrong_answers:
  - افزایش خودسرانه در هزینه‌های mining
  - حمله ۵۱٪
  - توقف قطعی بازار نزولی
explanation: |
  کاربر نمی‌تواند تأیید کند که موجودی‌های نمایش داده شده واقعاً با بیت‌کوین‌های نگهداری شده مطابقت دارند. بنابراین، یک ریسک ذخیره کسری وجود دارد.
reviewed: false
question: Ni igiki gishobora gutera ingorane mu vy’amahera umuntu afise Lightning wallet?
answer: Ububiko bw'imice
wrong_answers:
  - Ukwongerekana kw'amahera ya mining ataco bimaze
  - 51% igitero
  - Isoko ry'idubu rihagarara ata gukeka
explanation: |
  Uwukoresha ntashobora kugenzura ko amafaranga yerekanwa ahuye vy’ukuri n’ama bitcoins afise. Hari rero ingorane y’ububiko bw’imice.
reviewed: false
question: कस्टोडियल लाइटनिंग wallet के साथ वित्तीय जोखिम क्या है?
answer: आंशिक आरक्षित
wrong_answers:
  - mining शुल्क में मनमानी वृद्धि
  - 51% हमला
  - मंदी के दौर पर निर्णायक विराम
explanation: |
  उपयोगकर्ता यह सत्यापित नहीं कर सकता कि प्रदर्शित शेष राशि वास्तव में उसके पास मौजूद बिटकॉइन की संख्या के अनुरूप है। इसलिए, आंशिक आरक्षित राशि का जोखिम बना रहता है।
reviewed: false
question: Каков финансовый риск при использовании хранилища Lightning wallet?
answer: Дробный резерв
wrong_answers:
  - Произвольное увеличение платы за ГВ-1
  - 51% атаки
  - Окончательное прекращение медвежьего рынка
explanation: |
  Пользователь не может проверить, что отображаемые остатки действительно соответствуют хранящимся биткоинам. Поэтому существует риск дробного резервирования.
reviewed: false
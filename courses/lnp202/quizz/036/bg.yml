question: Защо е трудно маршрутизацията в Lightning да стане печеливша?
answer: Разходи и конкуренция
wrong_answers:
  - Ограничение на канала
  - Без заявка
  - Липса на глобална ликвидност
explanation: |
  Разходите по веригата, конкуренцията и оперативните изисквания правят рентабилността на маршрутизацията несигурна.
reviewed: false
question: Kwa nini ni vigumu kupata faida kwa kutumia Lightning?
answer: Gharama na ushindani
wrong_answers:
  - Kikomo cha kituo
  - Hakuna ombi
  - Ukosefu wa ukwasi wa kimataifa
explanation: |
  Gharama za mnyororo, ushindani na mahitaji ya uendeshaji hufanya faida ya biashara ya uelekezaji kutokuwa na uhakika.
reviewed: false
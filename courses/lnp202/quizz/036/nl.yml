question: Waarom is routeren op Lightning moeilijk om winstgevend te maken?
answer: Kosten en concurrentie
wrong_answers:
  - Kanaallimiet
  - Geen verzoek
  - Gebrek aan wereldwijde liquiditeit
explanation: |
  Kettingkosten, concurrentie en operationele vereisten maken de winstgevendheid van de routeringsactiviteit onzeker.

question: Ni kuki routing kuri Lightning igoye gutuma umuntu agira inyungu?
answer: Ibiciro n'amarushanwa
wrong_answers:
  - Igitigiri c'imirongo
  - Ntaco usavye
  - Kubura amafaranga kw'isi yose
explanation: |
  Ibiciro vy’uruzitiro, uguhiganwa n’ibisabwa mu bikorwa bituma inyungu y’ubudandaji bw’inzira idatomoye.

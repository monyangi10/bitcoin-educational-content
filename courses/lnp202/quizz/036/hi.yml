question: लाइटनिंग पर राउटिंग को लाभदायक बनाना मुश्किल क्यों है?
answer: लागत और प्रतिस्पर्धा
wrong_answers:
  - चैनल सीमा
  - कोई अनुरोध नहीं
  - वैश्विक तरलता का अभाव
explanation: |
  ऑनचेन लागत, प्रतिस्पर्धा और परिचालन संबंधी आवश्यकताओं के कारण रूटिंग व्यवसाय की लाभप्रदता अनिश्चित हो जाती है।
reviewed: false
question: Почему маршрутизацию на Lightning сложно сделать прибыльной?
answer: Затраты и конкуренция
wrong_answers:
  - Ограничение канала
  - Нет запроса
  - Отсутствие глобальной ликвидности
explanation: |
  Постоянно растущие расходы, конкуренция и операционные требования делают рентабельность бизнеса по маршрутизации неопределенной.

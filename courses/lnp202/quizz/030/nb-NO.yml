question: Hva er den opprinnelige fordelingen av likviditet etter at noden har åpnet en kanal, sett fra nodens ståsted?
answer: 100 % utgående
wrong_answers:
  - 50 % inngående 50 % utgående
  - 100 % inngående
  - 90 % utgående 10 % inngående
explanation: |
  Når en kanal åpnes, er all likviditeten i utgangspunktet på initiativtakers side.
reviewed: false
question: आपके नोड के दृष्टिकोण से, चैनल खोलने के बाद तरलता का प्रारंभिक वितरण क्या होता है?
answer: 100% आउटबाउंड
wrong_answers:
  - 50% इनबाउंड 50% आउटबाउंड
  - 100% इनबाउंड
  - 90% आउटबाउंड, 10% इनबाउंड
explanation: |
  जब कोई चैनल खोला जाता है, तो प्रारंभ में सारी तरलता आरंभकर्ता के पक्ष में होती है।
reviewed: false
question: Que peut déduire une watchtower en fonctionnement normal sur un canal qu'elle protège ?
answer: La fréquence de mise à jour de son état
wrong_answers:
  - La répartition de ses liquidités
  - Sa capacité
  - Sa politique de frais
explanation: |
  Elle reçoit des paquets chiffrés à chaque nouvel état, ce qui révèle uniquement le rythme d’activité en temps normal.
reviewed: false

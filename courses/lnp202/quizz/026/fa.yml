question: یک برج دیده‌بانی در عملیات عادی چه چیزی می‌تواند درباره کانالی که از آن محافظت می‌کند استنباط کند؟
answer: چند وقت یک‌بار وضعیت آن به‌روزرسانی می‌شود؟
wrong_answers:
  - Liquidity تخصیص
  - ظرفیت آن
  - سیاست هزینه‌ها
explanation: |
  این بسته‌های رمزگذاری‌شده را برای هر وضعیت جدید دریافت می‌کند و تنها نرخ عادی فعالیت را نشان می‌دهد.
reviewed: false
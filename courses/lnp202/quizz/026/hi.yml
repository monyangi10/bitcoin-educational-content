question: सामान्य परिचालन में एक निगरानी मीनार उस चैनल के बारे में क्या अनुमान लगा सकती है जिसकी वह सुरक्षा कर रही है?
answer: इसकी स्थिति कितनी बार अपडेट होती है
wrong_answers:
  - Liquidity आवंटन
  - इसकी क्षमता
  - व्यय नीति
explanation: |
  यह प्रत्येक नई स्थिति के लिए एन्क्रिप्टेड पैकेट प्राप्त करता है, जिससे केवल गतिविधि की सामान्य दर का पता चलता है।
reviewed: false
question: Ni igiki umunara w’inderetsi uriko urakora mu buryo busanzwe woshobora gushika ku ciyumviro ku bijanye n’umuhora uriko urakingira?
answer: Ni kangahe ikibanza caco gihindurwa
wrong_answers:
  - Uguhabwa Liquidity
  - Ubushobozi bwayo
  - Itegeko ry'amafaranga
explanation: |
  Ironka amapakete yashizwemwo amakuru y’intara yose nshasha, igahishura gusa igipimo gisanzwe c’ibikorwa.

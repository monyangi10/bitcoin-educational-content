question: หอคอยเฝ้าระวังในขณะปฏิบัติงานปกติสามารถสรุปอะไรเกี่ยวกับช่องทางที่มันกำลังปกป้องได้บ้าง?
answer: สถานะของมันได้รับการอัปเดตบ่อยแค่ไหน
wrong_answers:
  - การจัดสรร Liquidity
  - ความจุของมัน
  - นโยบายค่าใช้จ่าย
explanation: |
  มันได้รับแพ็กเก็ตที่เข้ารหัสสำหรับแต่ละสถานะใหม่ โดยเปิดเผยเพียงอัตราการทำงานปกติเท่านั้น
reviewed: false
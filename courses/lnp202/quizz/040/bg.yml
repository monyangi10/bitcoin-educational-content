question: Защо да използвате мениджър на възли Lightning?
answer: Лесен достъп до разширени функции
wrong_answers:
  - Замяна на изпълнението на LND
  - Премахване на зависимостта от Umbrel
  - Модифициране на протокола Lightning
explanation: |
  Усъвършенстваните мениджъри предлагат функционалности, които не са налични в основния интерфейс, като същевременно остават прости интерфейси.
reviewed: false
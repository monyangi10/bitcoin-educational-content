question: लाइटनिंग नोड मैनेजर का उपयोग क्यों करें?
answer: उन्नत कार्यों तक आसान पहुंच
wrong_answers:
  - LND कार्यान्वयन को बदलें
  - Umbrel पर निर्भरता समाप्त करें
  - लाइटनिंग प्रोटोकॉल में संशोधन करना
explanation: |
  एडवांस्ड मैनेजर बेसिक इंटरफेस में उपलब्ध न होने वाली कार्यक्षमताएं प्रदान करते हैं, जबकि उनका इंटरफेस सरल बना रहता है।

question: ทำไมต้องใช้ตัวจัดการโหนด Lightning?
answer: การเข้าถึงฟังก์ชันขั้นสูงได้ง่าย
wrong_answers:
  - แทนที่การใช้งาน LND
  - กำจัดการพึ่งพา Umbrel
  - การปรับเปลี่ยนโปรโตคอล Lightning
explanation: |
  ผู้จัดการขั้นสูงมีฟังก์ชันการทำงานที่ไม่สามารถใช้ได้ในอินเทอร์เฟซพื้นฐาน ในขณะที่ยังคงเป็นอินเทอร์เฟซที่เรียบง่าย
reviewed: false
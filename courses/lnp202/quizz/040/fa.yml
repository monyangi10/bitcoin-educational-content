question: چرا از مدیر نود لایتنینگ استفاده کنیم؟
answer: دسترسی آسان به عملکردهای پیشرفته
wrong_answers:
  - جایگزینی پیاده‌سازی LND
  - حذف وابستگی به Umbrel
  - اصلاح پروتکل لایتنینگ
explanation: |
  مدیران پیشرفته قابلیت‌هایی را ارائه می‌دهند که در رابط کاربری پایه موجود نیستند، در حالی که همچنان رابط‌های ساده‌ای باقی می‌مانند.
reviewed: false
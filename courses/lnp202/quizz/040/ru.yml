question: Зачем использовать менеджер узлов Lightning?
answer: Легкий доступ к расширенным функциям
wrong_answers:
  - Заменить реализацию LND
  - Устранить зависимость от Umbrel
  - Изменение протокола Lightning
explanation: |
  Продвинутые менеджеры предлагают функциональные возможности, недоступные в базовом интерфейсе, оставаясь при этом простыми интерфейсами.
reviewed: false
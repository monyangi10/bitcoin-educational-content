question: ทำไมการสำรองข้อมูลโหนด Lightning ถึงซับซ้อนกว่าการสำรองข้อมูล Bitcoin บนเชน wallet?
answer: สถานะของช่องทางกำลังพัฒนา
wrong_answers:
  - สภาพคล่องของช่องทางขึ้นอยู่กับ mempool
  - บันทึกข่าวลือเครือข่าย Lightning
  - คีย์เพิกถอนจะหมดอายุเมื่อเวลาผ่านไป
explanation: |
  ช่องทางสายฟ้าจะเปลี่ยนสถานะกับการชำระเงินแต่ละครั้ง ทำให้การสำรองข้อมูลแบบคงที่หรือแบบเป็นระยะ ๆ เป็นอันตราย
reviewed: false
question: چرا پشتیبان‌گیری از یک نود لایتنینگ پیچیده‌تر از یک Bitcoin آنچین wallet است؟
answer: وضعیت کانال‌ها در حال تحول است
wrong_answers:
  - نقدینگی کانال به ممپول بستگی دارد
  - ضبط شایعات شبکه لایتنینگ
  - کلیدهای ابطال به مرور زمان منقضی می‌شوند
explanation: |
  کانال‌های لایتنینگ با هر پرداخت وضعیت خود را تغییر می‌دهند، که این امر باعث می‌شود یک پشتیبان‌گیری ساده ثابت یا دوره‌ای خطرناک باشد.
reviewed: false
question: Почему резервное копирование узла Lightning сложнее, чем Bitcoin onchain wallet?
answer: Состояние каналов развивается
wrong_answers:
  - Ликвидность канала зависит от mempool
  - Запишите сплетни о сети Lightning
  - Срок действия ключей отзыва истекает с течением времени
explanation: |
  Каналы Lightning меняют состояние при каждом платеже, что делает простое фиксированное или периодическое резервное копирование опасным.
reviewed: false
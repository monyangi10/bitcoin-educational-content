question: Защо архивирането на възел Lightning е по-сложно от архивирането на Bitcoin във веригата на wallet?
answer: Състоянието на каналите се променя
wrong_answers:
  - Ликвидността на канала зависи от mempool
  - Записване на клюките в мрежата Lightning
  - Ключовете за отзоваване изтичат с течение на времето
explanation: |
  Светкавичните канали променят състоянието си при всяко плащане, което прави простото фиксирано или периодично архивиране опасно.
reviewed: false
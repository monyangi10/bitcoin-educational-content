question: लाइटनिंग नोड का बैकअप लेना, ऑनचेन wallet Bitcoin की तुलना में अधिक जटिल क्यों है?
answer: चैनलों की स्थिति में बदलाव आ रहा है।
wrong_answers:
  - चैनल की तरलता मेमपूल पर निर्भर करती है
  - लाइटनिंग नेटवर्क की गपशप रिकॉर्ड करें
  - निरस्तीकरण कुंजी समय के साथ समाप्त हो जाती है
explanation: |
  प्रत्येक भुगतान के साथ लाइटनिंग चैनल की स्थिति बदल जाती है, जिससे एक साधारण निश्चित या आवधिक बैकअप खतरनाक हो जाता है।
reviewed: false
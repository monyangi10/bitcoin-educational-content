question: Кой е основният приоритет на търговеца на светкавици?
answer: Придобиване на входяща ликвидност
wrong_answers:
  - Придобиване на изходяща ликвидност
  - Спестяване на разходи за маршрутизация
  - Придобиване на добри отзиви за LN+
explanation: |
  Търговецът трябва да е в състояние да реализира печалба без провал, което изисква достатъчна входяща ликвидност.

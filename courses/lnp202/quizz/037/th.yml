question: ลำดับความสำคัญสูงสุดของพ่อค้า Lightning คืออะไร?
answer: การได้มาซึ่งสภาพคล่องขาเข้า
wrong_answers:
  - การจัดหาสภาพคล่องขาออก
  - ประหยัดค่าใช้จ่ายในการกำหนดเส้นทาง
  - การได้รับรีวิว LN+ ที่ดี
explanation: |
  พ่อค้าต้องสามารถแลกเงินสดได้โดยไม่ล้มเหลว ซึ่งต้องการสภาพคล่องที่เข้ามาเพียงพอ
reviewed: false
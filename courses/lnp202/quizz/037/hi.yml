question: लाइटनिंग मर्चेंट की सबसे बड़ी प्राथमिकता क्या होती है?
answer: आवक तरलता का अधिग्रहण
wrong_answers:
  - बहिर्गामी तरलता प्राप्त करना
  - रूटिंग लागत में बचत
  - अच्छी LN+ समीक्षाएँ प्राप्त करना
explanation: |
  एक व्यापारी को बिना किसी रुकावट के लाभ प्राप्त करने में सक्षम होना चाहिए, जिसके लिए पर्याप्त तरलता की आवश्यकता होती है।
reviewed: false
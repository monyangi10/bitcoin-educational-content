question: Что является главным приоритетом продавца Lightning?
answer: Приобретение входящей ликвидности
wrong_answers:
  - Приобретение исходящей ликвидности
  - Экономия на расходах по маршрутизации
  - Приобретение хороших отзывов о LN+
explanation: |
  Торговец должен быть в состоянии без потерь обналичить деньги, что требует достаточной входящей ликвидности.
reviewed: false
question: สามารถปรับแต่งอะไรได้บ้างในการตั้งค่าขั้นสูงของโหนด Lightning?
answer: ชื่อสาธารณะของโหนด
wrong_answers:
  - กฎฉันทามติของโหนด
  - คีย์ส่วนตัวของโหนด
  - เส้นทางที่เลือกโดยโหนด
explanation: |
  การตั้งค่าขั้นสูงช่วยให้คุณปรับแต่งองค์ประกอบการระบุโหนดได้ โดยไม่ส่งผลกระทบต่อการทำงานของฉันทามติหรือเครือข่าย Lightning
reviewed: false
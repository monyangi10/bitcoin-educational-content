question: Что можно настроить в расширенных параметрах узла Lightning?
answer: Публичное имя узла
wrong_answers:
  - Правила консенсуса узлов
  - Закрытые ключи узла
  - Маршруты, выбранные узлом
explanation: |
  Расширенные настройки позволяют настраивать элементы идентификации узлов, не влияя на консенсус или работу сети Lightning.
reviewed: false
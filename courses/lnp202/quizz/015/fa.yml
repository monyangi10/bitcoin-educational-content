question: چه مواردی را می‌توان در تنظیمات پیشرفته نود لایتنینگ سفارشی کرد؟
answer: نام عمومی گره
wrong_answers:
  - قوانین اجماع نود
  - کلیدهای خصوصی نود
  - مسیرهای انتخاب شده توسط گره
explanation: |
  تنظیمات پیشرفته به شما اجازه می‌دهد عناصر شناسایی نود را سفارشی کنید، بدون اینکه بر عملکرد اجماع یا شبکه لایتنینگ تأثیر بگذارد.
reviewed: false
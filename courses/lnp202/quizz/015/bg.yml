question: Какво може да се персонализира в разширените настройки на възела Lightning?
answer: Публичното име на възела
wrong_answers:
  - Правила за консенсус на възлите
  - Частните ключове на възела
  - Маршрутите, избрани от възела
explanation: |
  Разширените настройки ви позволяват да персонализирате елементите за идентификация на възлите, без това да се отрази на консенсуса или работата на мрежата Lightning.
reviewed: false
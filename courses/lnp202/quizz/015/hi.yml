question: लाइटनिंग नोड की उन्नत सेटिंग्स में क्या-क्या अनुकूलित किया जा सकता है?
answer: नोड का सार्वजनिक नाम
wrong_answers:
  - नोड सर्वसम्मति नियम
  - नोड की निजी कुंजियाँ
  - नोड द्वारा चुने गए मार्ग
explanation: |
  उन्नत सेटिंग्स आपको सहमति या लाइटनिंग नेटवर्क संचालन को प्रभावित किए बिना, नोड पहचान तत्वों को अनुकूलित करने की अनुमति देती हैं।
reviewed: false
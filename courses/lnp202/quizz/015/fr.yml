question: Que peut-on personnaliser dans les paramètres avancés du nœud Lightning ?
answer: Le nom public du nœud
wrong_answers:
  - Les règles de consensus du nœud
  - Les clés privées du nœud
  - Les routes choisies par le nœud
explanation: |
  Les paramètres avancés permettent de personnaliser des éléments d’identification du nœud, sans impact sur le consensus ou le fonctionnement du réseau Lightning.

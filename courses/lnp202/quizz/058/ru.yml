question: В протоколе NWC какой механизм используется для передачи запроса между приложением и узлом?
answer: События на реле Nostr
wrong_answers:
  - Прямые REST-вызовы к LND
  - VPN-соединение "точка-точка
  - Зашифрованные запросы DNS
explanation: |
  Запрос шифруется и затем публикуется как событие на ретрансляторе Nostr, которое узел считывает для выполнения действия.
reviewed: false
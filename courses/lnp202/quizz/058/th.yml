question: ในโปรโตคอล NWC ใช้กลไกอะไรในการขนส่งคำขอระหว่างแอปพลิเคชันและโหนด?
answer: เหตุการณ์บน Nostr รีเลย์
wrong_answers:
  - เรียก REST โดยตรงไปยัง LND
  - การเชื่อมต่อ VPN แบบจุดต่อจุด
  - คำขอ DNS ที่เข้ารหัส
explanation: |
  คำขอถูกเข้ารหัสแล้วเผยแพร่เป็นเหตุการณ์บนรีเลย์ Nostr ซึ่งโหนดจะอ่านเพื่อดำเนินการตามคำสั่งนั้น
reviewed: false
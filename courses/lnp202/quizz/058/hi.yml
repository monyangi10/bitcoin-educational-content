question: एनडब्ल्यूसी प्रोटोकॉल में, एप्लिकेशन और नोड के बीच अनुरोध को स्थानांतरित करने के लिए किस तंत्र का उपयोग किया जाता है?
answer: Nostr रिले पर होने वाली घटनाएं
wrong_answers:
  - LND को सीधे REST कॉल करें
  - पॉइंट-टू-पॉइंट वीपीएन कनेक्शन
  - एन्क्रिप्टेड DNS अनुरोध
explanation: |
  अनुरोध को एन्क्रिप्ट किया जाता है और फिर Nostr रिले पर एक इवेंट के रूप में प्रकाशित किया जाता है, जिसे नोड कार्रवाई को निष्पादित करने के लिए पढ़ता है।
reviewed: false
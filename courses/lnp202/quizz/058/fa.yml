question: در پروتکل NWC، از چه مکانیزمی برای انتقال درخواست بین برنامه و نود استفاده می‌شود؟
answer: رویدادها در Nostr رله‌ها
wrong_answers:
  - تماس‌های مستقیم REST به LND
  - اتصال VPN نقطه به نقطه
  - درخواست‌های DNS رمزگذاری‌شده
explanation: |
  درخواست رمزگذاری شده و سپس به عنوان یک رویداد بر روی یک رله Nostr منتشر می‌شود، که گره آن را برای اجرای عمل می‌خواند.
reviewed: false
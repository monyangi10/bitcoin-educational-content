question: Какъв механизъм се използва в протокола NWC за пренасяне на заявката между приложението и възела?
answer: Събития на релета Nostr
wrong_answers:
  - Директни REST повиквания към LND
  - VPN връзка от точка до точка
  - Криптирани DNS заявки
explanation: |
  Заявката се криптира и след това се публикува като събитие в ретранслатор Nostr, което възелът прочита, за да изпълни действието.
reviewed: false
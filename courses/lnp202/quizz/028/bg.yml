question: Каква е ролята на наблюдателната кула, когато открие опит за измама?
answer: Публикуване на наказателната операция
wrong_answers:
  - Затваряне на канала в сътрудничество
  - Замразяване на средства
  - Докладване на партньор на Bitcoin Core
explanation: |
  Наблюдателната кула автоматично излъчва наказателната операция от името на потребителя.
reviewed: false
question: धोखाधड़ी के प्रयास का पता चलने पर वॉचटावर की क्या भूमिका होती है?
answer: जुर्माने के लेन-देन को प्रकाशित करें
wrong_answers:
  - सहयोगपूर्वक चैनल बंद करें
  - निधि को फ्रीज करें
  - Bitcoin कोर को रिपोर्ट करें
explanation: |
  वॉचटावर उपयोगकर्ता की ओर से जुर्माने से संबंधित लेनदेन को स्वचालित रूप से प्रसारित करता है।
reviewed: false
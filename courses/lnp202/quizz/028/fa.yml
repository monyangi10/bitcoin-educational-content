question: نقش واچ‌تاور زمانی که تلاش برای تقلب را شناسایی می‌کند چیست؟
answer: انتشار تراکنش جریمه
wrong_answers:
  - کانال را به صورت تعاونی ببندید
  - مسدود کردن وجوه
  - گزارش همتا به Bitcoin Core
explanation: |
  برج دیده‌بانی به‌طور خودکار تراکنش جریمه را از طرف کاربر پخش می‌کند.
reviewed: false
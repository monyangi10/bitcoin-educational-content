question: Какова роль Сторожевой башни, когда она обнаруживает попытку мошенничества?
answer: Опубликовать транзакцию штрафа
wrong_answers:
  - Закройте канал совместными усилиями
  - Заморозить средства
  - Сообщите об аналоге в ядро Bitcoin
explanation: |
  Сторожевая башня автоматически транслирует штрафную транзакцию от имени пользователя.

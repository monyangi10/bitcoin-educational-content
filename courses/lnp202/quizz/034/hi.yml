question: सहकर्मी संपर्क के लिए इनमें से कौन सा मानदंड सबसे महत्वपूर्ण है?
answer: ग्राफ में केंद्रीय स्थिति
wrong_answers:
  - ग्राफ में नोड का नाम
  - ग्राफ में नोड का रंग
  - ग्राफ़ में संदेशों की संख्या
explanation: |
  लाइटनिंग ग्राफ में अच्छी स्थिति में स्थित नोड कई गंतव्यों तक रूटिंग को आसान बनाता है।
reviewed: false
question: Какой из этих критериев наиболее важен для одноранговой связи?
answer: Центральное положение в графике
wrong_answers:
  - Имя узла в графе
  - Цвет узла в графике
  - Количество сообщений в графике
explanation: |
  Хорошо расположенный узел в графе Lightning облегчает маршрутизацию ко многим пунктам назначения.

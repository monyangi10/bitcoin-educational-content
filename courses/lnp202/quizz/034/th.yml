question: เกณฑ์ใดในเหล่านี้ที่สำคัญที่สุดสำหรับการเชื่อมต่อแบบเพียร์?
answer: ตำแหน่งตรงกลางในกราฟ
wrong_answers:
  - ชื่อโหนดในกราฟ
  - สีของโหนดในกราฟ
  - จำนวนข้อความในกราฟ
explanation: |
  โหนดที่อยู่ในตำแหน่งที่ดีในกราฟ Lightning ช่วยให้การกำหนดเส้นทางไปยังปลายทางหลายแห่งเป็นไปได้อย่างราบรื่น
reviewed: false
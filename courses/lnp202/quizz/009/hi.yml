question: एक कस्टोडियल ऑपरेटर के पास अपने उपयोगकर्ताओं के भुगतानों पर क्या अधिकार होते हैं?
answer: सेंसरशिप की शक्ति
wrong_answers:
  - Mining शक्ति
  - आम सहमति की शक्ति
  - जीडब्ल्यू-1 शक्ति
explanation: |
  फंड और चैनलों को नियंत्रित करने वाला ऑपरेटर भुगतान को ब्लॉक, विलंबित या फ़िल्टर कर सकता है।
reviewed: false
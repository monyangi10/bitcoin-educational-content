question: Какви правомощия има операторът на попечителски услуги по отношение на плащанията на своите потребители?
answer: Силата на цензурата
wrong_answers:
  - Мощност Mining
  - Силата на консенсуса
  - Мощност Halving
explanation: |
  Операторът, който контролира средствата и каналите, може да блокира, забавя или филтрира плащанията.

question: Quel pouter un opérateur custodial détient-il sur les paiements de ses utilisateurs ?
answer: Pouter de censure
wrong_answers:
  - Pouter de minage
  - Pouter de consensus
  - Pouter de halving
explanation: |
  Un opérateur qui contrôle les fonds et les canaux peut bloquer, retarder ou filtrer les paiements.

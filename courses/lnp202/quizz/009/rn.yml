question: Ni ububasha ubuhe umukozi w’ububiko afise ku bijanye n’amahera abakoresha biwe bariha?
answer: Ububasha bwo gucengera
wrong_answers:
  - Mining ubushobozi
  - Ububasha bwo kwumvikana
  - Halving ubushobozi
explanation: |
  Umukoresha agenzura amafaranga n’imirongo arashobora guhagarika, gutevya canke gucungera amahera yishurwa.
reviewed: false
question: Umbrel में, NWC कनेक्शन स्थापित करने के लिए कौन सा एप्लिकेशन इंस्टॉल करना आवश्यक है?
answer: जीडब्ल्यू-1
wrong_answers:
  - एनडब्ल्यूसी कनेक्टर
  - जीडब्ल्यू-2
  - ज़्यूस सर्वर
explanation: |
  चूंकि एनडब्ल्यूसी के लिए विशेष रूप से समर्पित जीडब्ल्यू-4 एप्लिकेशन अब उपलब्ध नहीं है, इसलिए अब आपको इस प्रकार के कनेक्शन के लिए जीडब्ल्यू-3 का उपयोग करना होगा।
reviewed: false
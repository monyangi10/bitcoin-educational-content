question: Кое конкретно ограничение за Android е споменато по отношение на използването на Tailscale?
answer: Една VPN услуга в даден момент
wrong_answers:
  - Bluetooth е задължителен за VPN
  - Несъвместимост на DNS-over-HTTPS
  - Изисква корен на телефона
explanation: |
  Android не ви позволява да използвате две VPN услуги едновременно, така че трябва да деактивирате всяка друга активна VPN услуга, преди да използвате Tailscale.
reviewed: false
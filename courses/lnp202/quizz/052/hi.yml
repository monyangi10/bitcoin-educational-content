question: Tailscale के उपयोग के संबंध में Android पर कौन सी विशिष्ट पाबंदी का उल्लेख किया गया है?
answer: एक बार में एक वीपीएन
wrong_answers:
  - वीपीएन के लिए ब्लूटूथ अनिवार्य है
  - DNS-ओवर-HTTPS असंगत
  - फ़ोन रूट करना आवश्यक है
explanation: |
  एंड्रॉइड आपको एक साथ दो वीपीएन का उपयोग करने की अनुमति नहीं देता है, इसलिए Tailscale का उपयोग करने से पहले आपको किसी भी अन्य सक्रिय वीपीएन को निष्क्रिय करना होगा।
reviewed: false
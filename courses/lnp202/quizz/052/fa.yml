question: چه محدودیت خاصی در اندروید در مورد استفاده از Tailscale ذکر شده است؟
answer: یک VPN در یک زمان
wrong_answers:
  - بلوتوث اجباری برای VPN
  - DNS-over-HTTPS ناسازگار
  - نیاز به روت کردن گوشی دارد
explanation: |
  اندروید به شما اجازه نمی‌دهد که به طور همزمان از دو VPN استفاده کنید، بنابراین قبل از استفاده از Tailscale باید هر VPN فعال دیگری را غیرفعال کنید.
reviewed: false
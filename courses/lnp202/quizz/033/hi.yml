question: इनमें से कौन सा टूल लाइटनिंग पर प्रासंगिक पीयर्स की पहचान नहीं करता है?
answer: जीडब्ल्यू-0
wrong_answers:
  - लाइटनिंग टर्मिनल
  - जीडब्ल्यू-1
  - जीडब्ल्यू-2
explanation: |
  Electrum नेटवर्क नोड्स के बारे में जानकारी प्राप्त करने के लिए लाइटनिंग एक्सप्लोरर नहीं है। दूसरी ओर, अन्य तीन उपकरण यह कार्य बखूबी करते हैं।
reviewed: false
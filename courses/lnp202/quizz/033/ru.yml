question: Какой из этих инструментов не определяет релевантных сверстников на Lightning?
answer: Electrum
wrong_answers:
  - Терминал молнии
  - Amboss
  - 1ML
explanation: |
  Electrum не является проводником Lightning для получения информации об узлах сети. Остальные три инструмента, напротив, хорошо выполняют эту функцию.
reviewed: false
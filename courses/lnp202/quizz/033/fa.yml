question: کدام یک از این ابزارها همتایان مرتبط در لایتنینگ را شناسایی نمی‌کند؟
answer: Electrum
wrong_answers:
  - ترمینال لایتنینگ
  - Amboss
  - 1ML
explanation: |
  Electrum یک کاوشگر Lightning برای به‌دست‌آوردن اطلاعات در مورد گره‌های شبکه نیست. از طرف دیگر، سه ابزار دیگر این عملکرد را به‌خوبی انجام می‌دهند.
reviewed: false
question: เครื่องมือใดต่อไปนี้ที่ไม่สามารถระบุเพื่อนที่เกี่ยวข้องบน Lightning ได้?
answer: Electrum
wrong_answers:
  - เทอร์มินัลสายฟ้า
  - Amboss
  - 1ML
explanation: |
  Electrum ไม่ใช่เครื่องมือสำรวจ Lightning สำหรับการรับข้อมูลเกี่ยวกับโหนดเครือข่าย ในขณะที่เครื่องมืออีกสามตัวทำหน้าที่นี้ได้ดี
reviewed: false
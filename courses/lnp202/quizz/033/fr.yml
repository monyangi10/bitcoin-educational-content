question: Lequel de ces outils ne permet pas d'identifier des pairs pertinents sur Lightning ?
answer: Electrum
wrong_answers:
  - Lightning Terminal
  - Amboss
  - 1ML
explanation: |
  Electrum n’est pas un explorateur Lightning permettant d’obtenir des informations sur les nœuds du réseau. Les trois autres outils, en revanche, remplissent bien cette fonction.
reviewed: true 

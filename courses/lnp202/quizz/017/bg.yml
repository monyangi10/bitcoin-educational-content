question: Какво представлява балансът на wallet Lightning, показан в интерфейса на приложението LND?
answer: Сумата на изходящата ликвидност
wrong_answers:
  - Сумата на веригите onchains
  - Сумата на входящата ликвидност
  - Сумата от капацитетите на каналите
explanation: |
  Балансът "Светкавица" съответства на наличния sats, който може да бъде изразходван чрез каналите, т.е. сумата на изходящата ликвидност от всички канали на възела.
reviewed: false
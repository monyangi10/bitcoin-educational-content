question: Что представляет собой баланс Lightning wallet, отображаемый в интерфейсе приложения LND?
answer: Сумма исходящей ликвидности
wrong_answers:
  - Сумма цепочек
  - Сумма входящей ликвидности
  - Сумма мощностей каналов
explanation: |
  Баланс Lightning соответствует sats, доступному для расходования через каналы, т.е. сумме исходящей ликвидности из всех каналов узла.
reviewed: false
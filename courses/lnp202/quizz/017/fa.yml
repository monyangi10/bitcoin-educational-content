question: موجودی Lightning wallet که در رابط کاربری برنامه LND نمایش داده می‌شود، چه چیزی را نشان می‌دهد؟
answer: مجموع نقدینگی خروجی
wrong_answers:
  - مجموع زنجیره‌ها
  - مجموع نقدینگی ورودی
  - مجموع ظرفیت‌های کانال
explanation: |
  موجودی Lightning با sats که از طریق کانال‌ها قابل خرج کردن است مطابقت دارد، یعنی مجموع نقدینگی خروجی از تمام کانال‌های نود.
reviewed: false
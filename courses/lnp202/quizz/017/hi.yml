question: LND एप्लिकेशन इंटरफेस पर प्रदर्शित लाइटनिंग wallet बैलेंस क्या दर्शाता है?
answer: बहिर्गामी तरलता का योग
wrong_answers:
  - ऑनचेन का योग
  - आवक तरलता का योग
  - चैनल क्षमताओं का योग
explanation: |
  लाइटनिंग बैलेंस, चैनलों के माध्यम से खर्च करने के लिए उपलब्ध sats के बराबर होता है, यानी नोड के सभी चैनलों से निकलने वाली तरलता का योग।
reviewed: false
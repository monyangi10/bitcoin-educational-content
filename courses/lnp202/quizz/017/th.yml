question: ยอดคงเหลือ Lightning wallet ที่แสดงบนอินเทอร์เฟซแอปพลิเคชัน LND หมายถึงอะไร?
answer: ผลรวมของสภาพคล่องขาออก
wrong_answers:
  - ผลรวมของออนเชนส์
  - ผลรวมของสภาพคล่องขาเข้า
  - ผลรวมของความจุช่องสัญญาณ
explanation: |
  ยอดคงเหลือของ Lightning สอดคล้องกับ sats ที่สามารถใช้จ่ายผ่านช่องทางต่างๆ ได้ กล่าวคือ ผลรวมของสภาพคล่องขาออกจากช่องทางทั้งหมดของโหนด
reviewed: false
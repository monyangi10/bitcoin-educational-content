question: Ni kuki amahera asohoka ahita azana amahera yinjira?
answer: Guhindura amafaranga
wrong_answers:
  - Gukora imirongo mishasha
  - Ukwongerekana kw'ubushobozi
  - Ibiciro bito vy'inzira
explanation: |
  Ivyishyurwa bisohoka bijana sats ku rugero rumwe, bikazana amahera yinjira kuri uru ruhande rw’umuhora.

question: आउटगोइंग पेमेंट से स्वतः ही इनकमिंग लिक्विडिटी क्यों उत्पन्न होती है?
answer: तरलता का स्थानांतरण
wrong_answers:
  - नए चैनल बनाना
  - क्षमता में वृद्धि
  - रूटिंग लागत कम करें
explanation: |
  एक आउटगोइंग भुगतान sats को सममूल्य पर ले जाता है, जिससे चैनल के इस तरफ इनकमिंग लिक्विडिटी उत्पन्न होती है।
reviewed: false
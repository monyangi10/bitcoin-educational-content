question: Почему исходящий платеж автоматически создает входящую ликвидность?
answer: Изменение ликвидности
wrong_answers:
  - Создание новых каналов
  - Увеличение мощности
  - Снижение затрат на маршрутизацию
explanation: |
  Исходящий платеж перемещает sats к номиналу, создавая входящую ликвидность на этой стороне канала.

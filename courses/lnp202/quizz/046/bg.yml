question: Защо изходящо плащане автоматично създава входяща ликвидност?
answer: Променяща се ликвидност
wrong_answers:
  - Създаване на нови канали
  - Увеличаване на капацитета
  - По-ниски разходи за маршрутизиране
explanation: |
  Изходящото плащане придвижва sats до номинала, създавайки входяща ликвидност от тази страна на канала.

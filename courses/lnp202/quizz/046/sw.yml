question: Kwa nini malipo yanayotoka hutengeneza kiotomatiki ukwasi unaoingia?
answer: Ugavi wa maji unaobadilika
wrong_answers:
  - Kuunda vituo vipya
  - Kuongezeka kwa uwezo
  - Gharama za chini za uelekezaji
explanation: |
  Malipo yanayotoka husogeza sats hadi kiwango cha juu, na hivyo kusababisha ukwasi unaoingia upande huu wa chaneli.

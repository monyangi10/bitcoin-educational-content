question: چرا یک پرداخت خروجی به طور خودکار نقدینگی ورودی ایجاد می‌کند؟
answer: تغییر نقدینگی
wrong_answers:
  - ایجاد کانال‌های جدید
  - افزایش ظرفیت
  - کاهش هزینه‌های مسیریابی
explanation: |
  یک پرداخت خروجی sats را به حالت تعادل می‌رساند و نقدینگی ورودی را در این سمت کانال ایجاد می‌کند.
reviewed: false
question: Каква е изходящата ликвидност на възел Lightning?
answer: Възможност за плащане
wrong_answers:
  - Възможност за свързване
  - Капацитет за получаване
  - Възможност за затваряне на канали
explanation: |
  Изходящата ликвидност представлява наличните sats от страна на оператора за извършване на плащания.
reviewed: false
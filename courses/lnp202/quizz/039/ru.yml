question: Что такое исходящая ликвидность узла Lightning?
answer: Способность платить
wrong_answers:
  - Возможность подключения
  - Способность принимать
  - Способность закрывать каналы
explanation: |
  Исходящая ликвидность представляет собой sats, доступные на стороне оператора для осуществления платежей.

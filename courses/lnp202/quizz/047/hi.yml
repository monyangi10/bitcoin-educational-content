question: LN+ व्यापारियों के लिए अनुपयुक्त क्यों है?
answer: पर्याप्त पूंजी निवेश
wrong_answers:
  - शामिल नोड्स की विश्वसनीयता का अभाव
  - कोई प्रतिष्ठा प्रणाली नहीं
  - चैनल बहुत छोटे हैं
explanation: |
  प्रत्येक प्राप्त होने वाले इनबाउंड सैटेलाइट सिग्नल के लिए एक आउटबाउंड सैटेलाइट सिग्नल को ब्लॉक करना आवश्यक होता है, जो किसी व्यवसाय की स्केलेबिलिटी को सीमित करता है।

  - کانال‌ها خیلی کوچک هستند
explanation: |
  هر ماهواره ورودی که به دست می‌آید نیاز به مسدود کردن یک ماهواره خروجی دارد، که این امر مقیاس‌پذیری برای یک کسب‌وکار را محدود می‌کند.

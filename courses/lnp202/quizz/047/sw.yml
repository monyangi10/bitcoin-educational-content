question: Kwa nini LN+ haifai kwa wafanyabiashara?
answer: Uwekezaji mkubwa wa mtaji
wrong_answers:
  - Ukosefu wa uaminifu wa nodi zinazohusika
  - Hakuna mfumo wa sifa
  - Vituo vidogo sana
explanation: |
  Kila sati inayoingia inayopatikana inahitaji sati inayotoka izuiwe, jambo ambalo hupunguza uwezo wa biashara kupanuka.

question: Ni kuki LN+ idakwiriye abacuruzi?
answer: Ishoramari rikomeye
wrong_answers:
  - Kubura ukwizigirwa kw'ibihimba birimwo
  - Nta buryo bwo kumenyekana
  - Imirongo mito cane
explanation: |
  Buri sat yinjira ironswa isaba ko sat isohoka ibuzwa, ivyo bikaba bigabanya ubushobozi bwo gutera imbere ku bucuruzi.

question: Tại sao LN+ không phù hợp với thương nhân?
answer: Đầu tư vốn đáng kể
wrong_answers:
  - Thiếu độ tin cậy của các nút liên quan
  - Không có hệ thống đánh giá danh tiếng
  - Kênh quá nhỏ
explanation: |
  Mỗi lượt SAT đến cần phải chặn một lượt SAT đi, điều này hạn chế khả năng mở rộng quy mô kinh doanh.

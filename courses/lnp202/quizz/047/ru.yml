question: Почему LN+ не подходит для торговцев?
answer: Значительные капиталовложения
wrong_answers:
  - Недостаточная надежность задействованных узлов
  - Отсутствие системы репутации
  - Слишком маленькие каналы
explanation: |
  Каждый полученный входящий сат требует блокировки исходящего сата, что ограничивает масштабируемость бизнеса.

question: ทำไม LN+ ถึงไม่เหมาะสำหรับพ่อค้า?
answer: การลงทุนเงินทุนจำนวนมาก
wrong_answers:
  - ขาดความน่าเชื่อถือของโหนดที่เกี่ยวข้อง
  - ไม่มีระบบชื่อเสียง
  - ช่องเล็กเกินไป
explanation: |
  แต่ละ sat ขาเข้าที่ได้รับต้องการ sat ขาออกที่จะถูกบล็อก ซึ่งจำกัดความสามารถในการขยายตัวสำหรับธุรกิจ

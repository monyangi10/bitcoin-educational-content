question: एक निगरानी मीनार का मुख्य उद्देश्य किस जोखिम को रोकना है?
answer: पुराने राज्य के साथ धोखाधड़ी
wrong_answers:
  - 51% हमला
  - बीज चोरी
  - नई स्थिति के साथ धोखा करें
explanation: |
  एक निगरानी मीनार धन की हेराफेरी के उद्देश्य से किए जाने वाले पुराने सरकारी गुप्त संदेशों के प्रकाशन से सुरक्षा प्रदान करती है।

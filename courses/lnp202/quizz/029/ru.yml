question: Какой основной риск призвана предотвратить сторожевая башня?
answer: Измена с прежним государством
wrong_answers:
  - 51% атаки
  - Кража семян
  - Обман с новым государством
explanation: |
  Сторожевая башня защищает от публикации старого канала государства, направленного на хищение средств.
reviewed: false
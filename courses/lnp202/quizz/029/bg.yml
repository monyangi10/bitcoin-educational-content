question: Какъв е основният риск, който една наблюдателна кула цели да предотврати?
answer: Изневяра със старата държава
wrong_answers:
  - 51% атака
  - Кражба на семена
  - Измама с ново състояние
explanation: |
  Стражева кула предпазва от публикуването на стар държавен канал, насочен към присвояване на средства.

question: Która z wymienionych metod połączenia między węzłem Lightning a klientem mobilnym nie jest wyraźnie zalecana do tego zastosowania?
answer: Tor
wrong_answers:
  - Tailscale
  - Nostr Wallet Connect
  - Brak
explanation: |
  Tor działa bardzo słabo w praktyce w tym celu, z awariami i opóźnieniami, które powodują słabe wrażenia użytkownika.
reviewed: false
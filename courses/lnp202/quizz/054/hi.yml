question: लाइटनिंग नोड और मोबाइल क्लाइंट के बीच कनेक्शन के लिए उल्लिखित विधियों में से कौन सी विधि इस उपयोग के लिए स्पष्ट रूप से अनुशंसित नहीं है?
answer: टो
wrong_answers:
  - जीडब्ल्यू-0
  - Nostr Wallet कनेक्ट
  - कोई नहीं
explanation: |
  व्यवहार में इस उद्देश्य के लिए टोर बहुत खराब प्रदर्शन करता है, विफलताओं और विलंबता के कारण उपयोगकर्ता अनुभव खराब हो जाता है।
reviewed: false
question: วิธีการเชื่อมต่อใดระหว่างโหนด Lightning และไคลเอนต์มือถือที่กล่าวถึงซึ่งไม่แนะนำอย่างชัดเจนสำหรับการใช้งานนี้?
answer: ทอร์
wrong_answers:
  - Tailscale
  - Nostr Wallet เชื่อมต่อ
  - ไม่มี
explanation: |
  Tor ทำงานได้ไม่ดีนักในทางปฏิบัติสำหรับวัตถุประสงค์นี้ โดยมีความล้มเหลวและความล่าช้าที่ทำให้ประสบการณ์ของผู้ใช้ไม่ดี

question: Кой от посочените методи за връзка между възел Lightning и мобилен клиент не се препоръчва за тази употреба?
answer: Tor
wrong_answers:
  - Tailscale
  - Nostr Wallet Свързване
  - Няма
explanation: |
  На практика Tor работи много зле за тази цел, като неуспехите и закъсненията водят до лошо потребителско преживяване.

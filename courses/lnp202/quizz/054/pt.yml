question: Qual dos métodos de ligação mencionados entre um nó Lightning e um cliente móvel não é explicitamente recomendado para esta utilização?
answer: Tor
wrong_answers:
  - Tailscale
  - Nostr Wallet Ligação
  - Nenhum
explanation: |
  Na prática, o Tor funciona muito mal para este fim, com falhas e latência que tornam a experiência do utilizador pobre.

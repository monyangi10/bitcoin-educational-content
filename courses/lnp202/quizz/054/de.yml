question: Welche der genannten Verbindungsmethoden zwischen einem Lightning-Knoten und einem mobilen Client wird für diese Anwendung ausdrücklich nicht empfohlen?
answer: Tor
wrong_answers:
  - Tailscale
  - Nostr Wallet Verbinden
  - Keine
explanation: |
  Tor funktioniert in der Praxis sehr schlecht für diesen Zweck, da Ausfälle und Latenzzeiten für eine schlechte Benutzererfahrung sorgen.
reviewed: false
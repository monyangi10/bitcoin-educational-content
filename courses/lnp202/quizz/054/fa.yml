question: کدام یک از روش‌های اتصال ذکر شده بین یک نود لایتنینگ و یک کلاینت موبایل به‌طور صریح برای این استفاده توصیه نمی‌شود؟
answer: تور
wrong_answers:
  - Tailscale
  - Nostr Wallet متصل شوید
  - هیچکدام
explanation: |
  تور در عمل برای این منظور بسیار ضعیف عمل می‌کند، با شکست‌ها و تأخیرهایی که تجربه کاربری ضعیفی را ایجاد می‌کند.
reviewed: false
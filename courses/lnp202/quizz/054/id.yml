question: Manakah dari metode koneksi yang disebutkan antara node Lightning dan klien seluler yang secara eksplisit tidak direkomendasikan untuk penggunaan ini?
answer: Tor
wrong_answers:
  - Tailscale
  - Nostr Wallet Hubungkan
  - Tidak ada
explanation: |
  Tor bekerja sangat buruk dalam praktiknya untuk tujuan ini, dengan kegagalan dan latensi yang membuat pengalaman pengguna menjadi buruk.

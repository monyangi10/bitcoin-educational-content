question: Какой из упомянутых методов соединения между узлом Lightning и мобильным клиентом явно не рекомендуется для данного использования?
answer: Тор
wrong_answers:
  - Tailscale
  - Nostr Wallet Подключение
  - Нет
explanation: |
  На практике Tor очень плохо работает для этой цели: сбои и задержки приводят к плохому пользовательскому опыту.

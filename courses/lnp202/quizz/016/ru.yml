question: Какая информация указывает на приемную способность узла Lightning?
answer: Входящая ликвидность
wrong_answers:
  - Активные соединения
  - Исходящая ликвидность
  - Количество блоков
explanation: |
  Входящая ликвидность представляет собой sats, которые узел может получить через Lightning.
reviewed: false
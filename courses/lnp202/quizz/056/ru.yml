question: Какой шаг следует сразу за публикацией запроса NWC мобильным приложением на реле?
answer: Узел расшифровывает и проверяет авторизацию
wrong_answers:
  - Ретранслятор подписывает запрос для узла
  - Реле осуществляет платеж на LND
  - Узел автоматически открывает канал
explanation: |
  Узел считывает событие, расшифровывает его, а затем проверяет, авторизован ли автор, прежде чем выполнить действие.
reviewed: false
question: کدام مرحله بلافاصله پس از انتشار درخواست NWC توسط برنامه موبایل بر روی یک رله انجام می‌شود؟
answer: گره رمزگشایی و تأیید مجوز را انجام می‌دهد
wrong_answers:
  - رله درخواست را برای نود امضا می‌کند
  - رله پرداخت را در LND اجرا می‌کند
  - گره به‌طور خودکار یک کانال باز می‌کند
explanation: |
  گره رویداد را می‌خواند، آن را رمزگشایی می‌کند، سپس بررسی می‌کند که آیا نویسنده مجاز است قبل از اجرای عمل.
reviewed: false
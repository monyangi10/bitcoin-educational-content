question: ขั้นตอนใดที่ตามมาทันทีหลังจากการเผยแพร่คำขอ NWC โดยแอปพลิเคชันมือถือบนรีเลย์?
answer: โหนดถอดรหัสและยืนยันการอนุญาต
wrong_answers:
  - รีเลย์ลงนามคำขอสำหรับโหนด
  - รีเลย์ดำเนินการชำระเงินบน LND
  - โหนดเปิดช่องทางโดยอัตโนมัติ
explanation: |
  โหนดอ่านเหตุการณ์ ถอดรหัส จากนั้นตรวจสอบว่าผู้เขียนได้รับอนุญาตก่อนดำเนินการ
reviewed: false
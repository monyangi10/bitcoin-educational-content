question: Коя стъпка следва непосредствено след публикуването на заявка за NWC от мобилното приложение на релето?
answer: Възел декриптира и проверява оторизацията
wrong_answers:
  - Релето подписва заявката за възела
  - Релето извършва плащане по LND
  - Възелът отваря канал автоматично
explanation: |
  Възелът прочита събитието, декриптира го, след което проверява дали авторът е оторизиран, преди да изпълни действието.
reviewed: false
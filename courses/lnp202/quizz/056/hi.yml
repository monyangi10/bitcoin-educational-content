question: किसी रिले पर मोबाइल एप्लिकेशन द्वारा एनडब्ल्यूसी अनुरोध के प्रकाशन के तुरंत बाद कौन सा चरण आता है?
answer: नोड प्रमाणीकरण को डिक्रिप्ट और सत्यापित करता है।
wrong_answers:
  - रिले नोड के लिए अनुरोध पर हस्ताक्षर करता है।
  - रिले LND पर भुगतान निष्पादित करता है
  - नोड स्वचालित रूप से एक चैनल खोलता है
explanation: |
  नोड इवेंट को पढ़ता है, उसे डिक्रिप्ट करता है, और फिर कार्रवाई को निष्पादित करने से पहले यह जांचता है कि लेखक अधिकृत है या नहीं।
reviewed: false
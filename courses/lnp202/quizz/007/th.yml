question: คุณสมบัติพื้นฐานอะไรของ Bitcoin ที่สูญเสียไปใน custodial?
answer: อธิปไตยทางการเงิน
wrong_answers:
  - ความสามารถในการขยายตัวทางการเงิน
  - การชำระเงินที่รวดเร็ว
  - การทำงานร่วมกันทางการเงิน
explanation: |
  หากไม่มีการควบคุมกุญแจ ผู้ใช้จะสละอำนาจอธิปไตยทางการเงิน ซึ่งเป็นเสาหลักสำคัญของ Bitcoin
reviewed: false
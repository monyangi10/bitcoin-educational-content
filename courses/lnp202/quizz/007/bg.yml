question: Кое основно свойство на Bitcoin се губи при задържане?
answer: Паричен суверенитет
wrong_answers:
  - Парична скалируемост
  - Бързо плащане
  - Парична оперативна съвместимост
explanation: |
  Без контрол върху ключовете потребителят се отказва от паричния суверенитет, който е основният стълб на Bitcoin.
reviewed: false
question: Bitcoin की कौन सी मूलभूत विशेषता अभिरक्षित रहने के दौरान नष्ट हो जाती है?
answer: मौद्रिक संप्रभुता
wrong_answers:
  - मौद्रिक मापनीयता
  - त्वरित भुगतान
  - मौद्रिक अंतरसंचालनीयता
explanation: |
  कुंजी नियंत्रण के बिना, उपयोगकर्ता मौद्रिक संप्रभुता का त्याग कर देता है, जो Bitcoin का केंद्रीय स्तंभ है।
reviewed: false
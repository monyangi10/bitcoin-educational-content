question: Какое фундаментальное свойство Bitcoin теряется при хранении?
answer: Денежный суверенитет
wrong_answers:
  - Возможность масштабирования денежных средств
  - Быстрая оплата
  - Денежная совместимость
explanation: |
  Без контроля ключей пользователь отказывается от денежного суверенитета - главного столпа Bitcoin.
reviewed: false
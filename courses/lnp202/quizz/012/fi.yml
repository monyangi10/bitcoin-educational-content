  - Ei omahuoltajuutta
  - Onchain-maksut pakollisia kaikissa Lightning-tapahtumissa
explanation: |
  Käyttäjä on vahvasti riippuvainen pääoperaattorista yhteyksien ja kanavien hallinnan osalta.

question: Какъв е основният компромис с бордовите възли LN?
answer: Зависимост на оператора
wrong_answers:
  - Загуба на частни ключове
  - Без самостоятелно попечителство
  - Onchain плащанията са задължителни за всички транзакции с Lightning
explanation: |
  Потребителят е силно зависим от главния оператор по отношение на свързаността и управлението на каналите.
reviewed: false
question: ข้อประนีประนอมหลักกับโหนดบนบอร์ด LN คืออะไร?
answer: การพึ่งพาผู้ปฏิบัติงาน
wrong_answers:
  - การสูญเสียกุญแจส่วนตัว
  - ไม่มีการดูแลตนเอง
  - การชำระเงินบนเชนเป็นข้อบังคับสำหรับธุรกรรม Lightning ทั้งหมด
explanation: |
  ผู้ใช้พึ่งพาผู้ให้บริการหลักอย่างมากสำหรับการเชื่อมต่อและการจัดการช่องทาง
reviewed: false
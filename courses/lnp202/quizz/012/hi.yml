question: LN के ऑन-बोर्ड नोड्स के साथ मुख्य समझौता क्या है?
answer: ऑपरेटर निर्भरता
wrong_answers:
  - निजी कुंजियों का खो जाना
  - कोई स्व-हिरासत नहीं
  - सभी लाइटनिंग लेनदेन के लिए ऑनचेन भुगतान अनिवार्य है।
explanation: |
  उपयोगकर्ता कनेक्टिविटी और चैनल प्रबंधन के लिए मुख्य ऑपरेटर पर काफी हद तक निर्भर है।
reviewed: false
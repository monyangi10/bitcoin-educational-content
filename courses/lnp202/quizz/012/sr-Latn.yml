question: Koji je glavni kompromis sa LN čvorovima na brodu?
answer: Zavisnost od operatera
wrong_answers:
  - Gubitak privatnih ključeva
  - Bez samostalnog čuvanja
  - Onchain plaćanja obavezna za sve Lightning transakcije
explanation: |

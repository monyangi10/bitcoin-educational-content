question: مصالحه اصلی با گره‌های داخلی LN چیست؟
answer: وابستگی به اپراتور
wrong_answers:
  - از دست دادن کلیدهای خصوصی
  - بدون نگهداری شخصی
  - پرداخت‌های آنچین برای تمامی تراکنش‌های لایتنینگ اجباری است.
explanation: |
  کاربر به شدت به اپراتور اصلی برای اتصال و مدیریت کانال وابسته است.
reviewed: false
question: В чем основной компромисс с бортовыми узлами LN?
answer: Зависимость от оператора
wrong_answers:
  - Потеря закрытых ключей
  - Никакой самоопеки
  - Onchain-платежи обязательны для всех транзакций Lightning
explanation: |
  Пользователь в значительной степени зависит от главного оператора в вопросах подключения и управления каналами.

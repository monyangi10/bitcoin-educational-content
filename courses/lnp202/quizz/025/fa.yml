question: چه شرایطی باعث می‌شود که جریمه‌ی Lightning مؤثر باشد؟
answer: شناسایی قبل از پایان قفل زمانی
wrong_answers:
  - تشخیص قبل از شروع قفل زمانی
  - تشخیص پیش از انتشار تقلب TX
  - تشخیص پس از پایان قفل زمانی
explanation: |
  تراکنش عدالت باید قبل از انقضای قفل زمانی منتشر شود تا تقلب را تحریم کند. نمی‌توان آن را قبل از شروع قفل زمانی یا انتشار تراکنش (TX) منتشر کرد، زیرا این به معنای این است که تقلب به سادگی رخ نداده است.
reviewed: false
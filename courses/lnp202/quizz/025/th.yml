question: เงื่อนไขใดบ้างที่ทำให้การลงโทษ Lightning มีประสิทธิภาพ?
answer: การตรวจจับก่อนสิ้นสุดการล็อกเวลา
wrong_answers:
  - การตรวจจับก่อนที่การล็อกเวลาจะเริ่มขึ้น
  - การตรวจจับการโกง TX ก่อนการเปิดตัว
  - การตรวจจับหลังจากสิ้นสุดการล็อกเวลา
explanation: |
  ธุรกรรมความยุติธรรมต้องถูกปล่อยออกมาก่อนที่การล็อกเวลาจะหมดอายุเพื่อเป็นการลงโทษการโกง ไม่สามารถปล่อยออกมาก่อนได้ก่อนที่การล็อกเวลาจะเริ่มต้นหรือ TX ถูกเผยแพร่ เพราะนั่นจะหมายความว่าการโกงไม่ได้เกิดขึ้นจริง
reviewed: false
question: Кои условия правят наказанието "мълния" ефективно?
answer: Откриване преди края на таймлока
wrong_answers:
  - Откриване преди началото на таймлока
  - Предварително откриване на измама TX
  - Откриване след края на таймлока
explanation: |
  За да се санкционира измамата, операцията на правосъдието трябва да бъде освободена преди изтичането на срока на блокиране. Тя не може да бъде освободена преди началото на таймлока или публикуването на TX, тъй като това би означавало, че измамата просто не се е състояла.
reviewed: false
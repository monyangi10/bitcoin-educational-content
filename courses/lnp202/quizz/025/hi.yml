question: किन परिस्थितियों में लाइटनिंग पेनल्टी प्रभावी होती है?
answer: टाइमलॉक समाप्त होने से पहले पता लगाना
wrong_answers:
  - टाइमलॉक शुरू होने से पहले पता लगाना
  - टेक्सास में रिहाई से पहले धोखाधड़ी का पता लगाना
  - टाइमलॉक समाप्त होने के बाद पता लगाना
explanation: |
  धोखाधड़ी को दंडित करने के लिए समयसीमा समाप्त होने से पहले न्याय प्रक्रिया जारी करना आवश्यक है। समयसीमा शुरू होने या प्रक्रिया जारी होने से पहले इसे जारी नहीं किया जा सकता, क्योंकि इसका अर्थ होगा कि धोखाधड़ी हुई ही नहीं।

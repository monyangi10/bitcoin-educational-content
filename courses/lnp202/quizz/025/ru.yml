question: При каких условиях наказание молнией становится эффективным?
answer: Обнаружение до окончания таймера
wrong_answers:
  - Обнаружение до начала блокировки по времени
  - Предварительное обнаружение обмана TX
  - Обнаружение после окончания таймера
explanation: |
  Транзакция правосудия должна быть выпущена до истечения таймлока, чтобы санкционировать обман. Она не может быть выпущена до того, как начнется отсчет времени или будет опубликован TX, поскольку это будет означать, что обман просто не имел места.
reviewed: false
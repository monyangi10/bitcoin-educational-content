question: از دیدگاه زنجیره‌ای Bitcoin، یک کانال لایتنینگ چیست؟
answer: Multisignature خروجی 2/2
wrong_answers:
  - اسکریپت P2MS 2/2
  - UTXO مجرد
  - قرارداد فدرال
explanation: |
  در زنجیره، یک کانال لایتنینگ با یک خروجی چند امضایی که نیاز به امضاهای هر دو شرکت‌کننده دارد، نمایش داده می‌شود.
reviewed: false
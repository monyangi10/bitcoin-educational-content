question: Bitcoin ऑनचेन के दृष्टिकोण से, लाइटनिंग चैनल क्या है?
answer: Multisig प्रकृति आउटपुट 2/2
wrong_answers:
  - स्क्रिप्ट P2MS 2/2
  - जीडब्ल्यू-2 एकल
  - संघबद्ध अनुबंध
explanation: |
  ऑनचेन पर, एक लाइटनिंग चैनल को एक मल्टीसिग्नेचर आउटपुट द्वारा दर्शाया जाता है जिसके लिए दोनों प्रतिभागियों के हस्ताक्षर की आवश्यकता होती है।
reviewed: false
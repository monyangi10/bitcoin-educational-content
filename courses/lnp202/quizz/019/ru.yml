question: Каковы предварительные условия для установки LND на Umbrel?
answer: Синхронизированный узел Bitcoin
wrong_answers:
  - Премиум-аккаунт Umbrel
  - Существующий канал "Молния
  - Адрес молнии активен
explanation: |
  LND опирается на 100% синхронизированный узел Bitcoin, что является необходимым условием для его работы.

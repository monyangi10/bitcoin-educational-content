question: Umbrel पर LND स्थापित करने के लिए क्या पूर्वापेक्षाएँ हैं?
answer: सिंक्रोनाइज़्ड Bitcoin नोड
wrong_answers:
  - Umbrel प्रीमियम खाता
  - मौजूदा लाइटनिंग चैनल
  - लाइटनिंग एड्रेस सक्रिय
explanation: |
  LND का संचालन 100% सिंक्रनाइज़्ड Bitcoin नोड पर निर्भर करता है, जो इसके संचालन के लिए एक पूर्व शर्त है।
reviewed: false
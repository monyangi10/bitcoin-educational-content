question: Защо потребителският профил е лесен за управление?
answer: Малка нужда от входяща ликвидност
wrong_answers:
  - Не е необходим канал
  - Малка нужда от изходяща ликвидност
  - Няма нужда от резервно копие
explanation: |
  Потребителите не се нуждаят от много входяща ликвидност, а изходящите плащания естествено създават известна входяща ликвидност без сложна стратегия.

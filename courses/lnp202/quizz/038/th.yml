question: ทำไมโปรไฟล์ผู้บริโภคถึงจัดการได้ง่าย?
answer: ความจำเป็นในการรับสภาพคล่องมีน้อย
wrong_answers:
  - ไม่ต้องใช้ช่องทาง
  - ความจำเป็นในการใช้สภาพคล่องขาออกน้อย
  - ไม่จำเป็นต้องสำรองข้อมูล
explanation: |
  ผู้บริโภคไม่จำเป็นต้องมีสภาพคล่องเข้ามามากนัก และการชำระเงินออกจะสร้างสภาพคล่องเข้ามาโดยธรรมชาติโดยไม่ต้องใช้กลยุทธ์ที่ซับซ้อน
reviewed: false
question: چرا پروفایل مصرف‌کننده به راحتی قابل مدیریت است؟
answer: نیاز کم به نقدینگی ورودی
wrong_answers:
  - نیازی به کانال نیست
  - نیاز کم به نقدینگی خروجی
  - نیازی به پشتیبان‌گیری نیست
explanation: |
  مصرف‌کنندگان به مقدار زیادی نقدینگی ورودی نیاز ندارند و پرداخت‌های خروجی به‌طور طبیعی مقداری نقدینگی ورودی ایجاد می‌کنند بدون نیاز به یک استراتژی پیچیده.
reviewed: false
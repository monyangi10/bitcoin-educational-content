question: Почему потребительским профилем легко управлять?
answer: Небольшая потребность во входящей ликвидности
wrong_answers:
  - Канал не требуется
  - Небольшая потребность в исходящей ликвидности
  - Нет необходимости в резервном копировании
explanation: |
  Потребителям не нужно много входящей ликвидности, а исходящие платежи естественным образом создают некоторую входящую ликвидность без сложной стратегии.

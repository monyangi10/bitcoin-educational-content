question: उपभोक्ता प्रोफाइल को प्रबंधित करना आसान क्यों है?
answer: आवक तरलता की बहुत कम आवश्यकता है
wrong_answers:
  - किसी चैनल की आवश्यकता नहीं है
  - बहिर्वाही तरलता की बहुत कम आवश्यकता है
  - बैकअप की कोई आवश्यकता नहीं है
explanation: |
  उपभोक्ताओं को बहुत अधिक आवक तरलता की आवश्यकता नहीं होती है, और जावक भुगतान स्वाभाविक रूप से एक जटिल रणनीति के बिना कुछ आवक तरलता उत्पन्न करते हैं।
reviewed: false
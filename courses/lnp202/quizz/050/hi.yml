question: LND + Tailscale + Zeus संयोजन का मुख्य उद्देश्य क्या है?
answer: अपने लाइटनिंग नोड पर मोबाइल wallet का उपयोग करना
wrong_answers:
  - लाइटनिंग नोड के बिना कस्टोडियल wallet का उपयोग करना
  - कई LND नोड्स का मल्टीप्लेक्सिंग
  - Mining sats Umbrel का उपयोग करते हुए
explanation: |
  इसका उद्देश्य एक मोबाइल लाइटनिंग wallet एप्लिकेशन का उपयोग करना है जो आपके अपने नोड पर पृष्ठभूमि में चलता है।

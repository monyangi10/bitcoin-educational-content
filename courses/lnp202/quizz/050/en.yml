question: What is the main purpose of the LND + Tailscale + Zeus configuration?
answer: Using a mobile wallet on your Lightning node
wrong_answers:
  - Using a custodial wallet without a Lightning node
  - Multiplexing multiple LND nodes
  - Mining sats using Umbrel
explanation: |
  The aim is to use a mobile Lightning wallet application that runs in the background on your own node.
reviewed: false
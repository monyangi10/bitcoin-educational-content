question: بر اساس نظریه اقتصادی، دلیل اصلی اینکه شهروندانی که کوپن‌های جیره‌بندی دریافت می‌کنند نمی‌توانند به طور مؤثر در قانون عرضه و تقاضا شرکت کنند چیست؟
answer: آن‌ها آزادی تنظیم مصرف خود بر اساس ترجیحات شخصی و شرایط متغیر را ندارند.
wrong_answers:
  - آن‌ها نمی‌فهمند که چگونه قیمت‌های بازار ارزش واقعی کالاها و خدمات را منعکس می‌کنند.
  - آن‌ها به دلیل محدودیت‌های درآمدی نمی‌توانند کالاها را به قیمت‌های بازار خریداری کنند.
  - آن‌ها نمی‌توانند به اطلاعات مربوط به محصولات موجود و کیفیت آن‌ها دسترسی پیدا کنند.
explanation: |
  قانون عرضه و تقاضا برای عملکرد صحیح به آزادی به عنوان یک پیش‌نیاز اساسی نیاز دارد. شهروندانی که کوپن‌های جیره‌بندی دارند نمی‌توانند تقاضای خود را بر اساس ترجیحاتشان افزایش یا کاهش دهند زیرا مصرف آن‌ها توسط تخصیص دولتی از پیش تعیین شده است. این امر از عملکرد مکانیزم طبیعی سیگنال‌دهی قیمت جلوگیری می‌کند، زیرا انتخاب‌های مصرف‌کننده نمی‌توانند به‌طور آزادانه بر تقاضای بازار تأثیر بگذارند. گزینه‌های دیگر بر درک، توانایی پرداخت یا دسترسی به اطلاعات تمرکز دارند، اما مسئله اصلی نبود انتخاب است، نه توانایی انجام انتخاب‌های آگاهانه یا مقرون‌به‌صرفه.
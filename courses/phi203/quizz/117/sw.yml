question: Kulingana na nadharia ya kiuchumi, ni sababu gani kuu kwa nini raia wanaopokea kuponi za mgao hawawezi kushiriki kikamilifu katika sheria ya ugavi na mahitaji?
answer: Hawana uhuru wa kurekebisha matumizi yao kulingana na mapendeleo yao binafsi na hali zinazobadilika.
wrong_answers:
  - Hawaelewi jinsi bei za soko zinavyoakisi thamani halisi ya bidhaa na huduma
  - Hawawezi kumudu kununua bidhaa kwa bei ya soko kutokana na vikwazo vya mapato
  - Hawawezi kupata taarifa kuhusu bidhaa zinazopatikana na ubora wake
explanation: |
  Sheria ya ugavi na mahitaji inahitaji uhuru kama sharti la msingi ili kufanya kazi vizuri. Raia walio na kuponi za mgao hawawezi kuongeza au kupunguza mahitaji yao kulingana na mapendeleo yao kwa sababu matumizi yao yamepangwa na mgao wa serikali. Hii inazuia utaratibu wa asili wa kuashiria bei kufanya kazi, kwani chaguo za watumiaji haziwezi kushawishi mahitaji ya soko kwa uhuru. Chaguo zingine zinazingatia uelewa, uwezo wa kumudu, au ufikiaji wa habari, lakini suala kuu ni ukosefu wa chaguo lenyewe, sio uwezo wa kufanya chaguzi zenye taarifa au nafuu.
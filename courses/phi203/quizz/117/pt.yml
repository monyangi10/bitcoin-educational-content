question: De acordo com a teoria económica, qual é a principal razão pela qual os cidadãos que recebem cupões de racionamento não podem participar efetivamente na lei da oferta e da procura?
answer: Não têm liberdade para ajustar o seu consumo em função das preferências pessoais e da evolução das circunstâncias
wrong_answers:
  - Não compreendem como os preços de mercado reflectem o verdadeiro valor dos bens e serviços
  - Não podem comprar bens a preços de mercado devido a limitações de rendimento
  - Não têm acesso a informações sobre os produtos disponíveis e a sua qualidade
explanation: |
  A lei da oferta e da procura exige a liberdade como condição prévia fundamental para funcionar corretamente. Os cidadãos com cupões de racionamento não podem aumentar ou diminuir a sua procura de acordo com as suas preferências porque o seu consumo é pré-determinado pela atribuição governamental. Este facto impede o funcionamento do mecanismo natural de sinalização dos preços, uma vez que as escolhas dos consumidores não podem influenciar livremente a procura no mercado. As outras opções centram-se na compreensão, na acessibilidade económica ou no acesso à informação, mas a questão central é a ausência de escolha em si, e não a capacidade de fazer escolhas informadas ou acessíveis.
question: Zgodnie z teorią ekonomii, jaki jest główny powód, dla którego obywatele otrzymujący kupony racjonujące nie mogą skutecznie uczestniczyć w prawie podaży i popytu?
answer: Brakuje im swobody w dostosowywaniu konsumpcji do osobistych preferencji i zmieniających się okoliczności
wrong_answers:
  - Nie rozumieją, w jaki sposób ceny rynkowe odzwierciedlają prawdziwą wartość towarów i usług
  - Nie mogą sobie pozwolić na zakup towarów po cenach rynkowych z powodu ograniczeń dochodowych
  - Nie mają dostępu do informacji o dostępnych produktach i ich jakości
explanation: |
  Prawo popytu i podaży wymaga wolności jako podstawowego warunku wstępnego prawidłowego funkcjonowania. Obywatele z kuponami racjonującymi nie mogą zwiększać lub zmniejszać swojego popytu zgodnie z własnymi preferencjami, ponieważ ich konsumpcja jest z góry określona przez alokację rządową. Uniemożliwia to działanie naturalnego mechanizmu sygnalizowania cen, ponieważ wybory konsumentów nie mogą swobodnie wpływać na popyt rynkowy. Inne opcje koncentrują się na zrozumieniu, przystępności cenowej lub dostępie do informacji, ale głównym problemem jest brak wyboru, a nie zdolność do dokonywania świadomych lub przystępnych cenowo wyborów.
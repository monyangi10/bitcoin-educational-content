question: 자유주의 경제 분석에 따르면, 자본주의 하에서 빈곤이 증가한다는 전통적인 마르크스주의의 예측이 역사적 증거와 모순되는 주된 이유는 무엇인가요?
answer: 지속적인 생산성 향상과 자발적 교환 메커니즘으로 인해 소비재에 대한 접근성을 높이고 노동 조건을 개선하는 동시에 더 낮은 가격으로 소비재에 접근할 수 있게 되었습니다
wrong_answers:
  - 정부의 개입과 복지 프로그램은 자본가로부터 노동자에게 성공적으로 부를 재분배하여 근본적인 착취의 역학을 가리고 있습니다
  - 기술 실업은 전통적인 제조업 고용보다 더 나은 임금을 제공하는 새로운 서비스 부문 일자리의 창출로 상쇄되었습니다
  - 국제 무역과 식민지 착취를 통해 자본주의 국가들은 개발도상국에 빈곤을 수출하는 동시에 국내 노동자들을 부유하게 만들었습니다
explanation: |
  폴 르로이-보리외의 분석에 따르면 자발적 계약과 교환에 기반한 자유 시장 사회는 자연스럽게 대중의 조건이 개선되는 경향이 있습니다. 핵심 메커니즘은 생산성 향상으로 더 저렴한 가격에 상품을 이용할 수 있게 되고, 노동이 더욱 지능화되고 기계화됨에 따라 노동 조건이 개선된다는 것입니다. 이는 마르크스주의자들이 예측한 이머징의 증가와 모순됩니다. 오답은 자유주의 경제학자들이 대중 번영의 핵심 동인으로 꼽는 자발적 교환과 생산성 증가의 근본적인 역학 관계보다는 정부의 재분배, 일자리 창출 패턴 또는 국제 착취로 인해 개선된 것으로 잘못 보고 있습니다.
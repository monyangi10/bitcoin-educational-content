question: بر اساس تحلیل اقتصادی لیبرال، دلیل اصلی اینکه چرا پیش‌بینی‌های سنتی مارکسیستی درباره افزایش فقر تحت سرمایه‌داری توسط شواهد تاریخی نقض شده‌اند چیست؟
answer: بهبود مستمر در بهره‌وری و مکانیزم‌های مبادله داوطلبانه باعث می‌شود کالاهای مصرفی با قیمت‌های پایین‌تر به طور فزاینده‌ای در دسترس قرار گیرند و در عین حال شرایط کاری بهبود یابد.
wrong_answers:
  - مداخله دولت و برنامه‌های رفاهی با موفقیت ثروت را از سرمایه‌داران به کارگران بازتوزیع کرده‌اند و پویایی‌های استثمار زیرین را پنهان می‌کنند.
  - بیکاری ناشی از فناوری با ایجاد مشاغل جدید در بخش خدمات که دستمزدهای بهتری نسبت به اشتغال در تولیدات سنتی ارائه می‌دهند، جبران شده است.
  - تجارت بین‌المللی و بهره‌کشی استعماری به کشورهای سرمایه‌داری این امکان را داده است که فقر خود را به کشورهای در حال توسعه صادر کنند و در عین حال کارگران داخلی را ثروتمند سازند.
explanation: |
  تحلیل پل لروی-بولو نشان می‌دهد که جوامع بازار آزاد مبتنی بر قراردادها و مبادلات داوطلبانه به طور طبیعی به سمت بهبود شرایط برای توده‌ها گرایش دارند. مکانیزم کلیدی این است که بهبودهای بهره‌وری باعث می‌شود کالاها با قیمت‌های پایین‌تر در دسترس قرار گیرند، در حالی که شرایط کاری بهبود می‌یابد زیرا کار به سمت فعالیت‌های فکری‌تر و مکانیزه‌تر حرکت می‌کند. این با پیش‌بینی‌های مارکسیستی مبنی بر افزایش فقر در تضاد است. پاسخ‌های نادرست به اشتباه بهبودها را به توزیع مجدد دولتی، الگوهای ایجاد شغل، یا بهره‌برداری بین‌المللی نسبت می‌دهند، نه به پویایی‌های اساسی مبادله داوطلبانه و رشد بهره‌وری که اقتصاددانان لیبرال به عنوان محرک‌های اصلی رفاه عمومی شناسایی می‌کنند.
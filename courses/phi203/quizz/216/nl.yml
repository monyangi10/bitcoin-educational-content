question: Wat is volgens de liberale economische analyse de belangrijkste reden waarom de traditionele marxistische voorspellingen over toenemende armoede onder het kapitalisme zijn tegengesproken door historisch bewijs?
answer: De voortdurende verbetering van de productiviteit en vrijwillige uitwisselingsmechanismen maken consumptiegoederen steeds toegankelijker tegen lagere prijzen, terwijl de arbeidsomstandigheden verbeteren
wrong_answers:
  - Overheidsinterventie en welvaartsprogramma's hebben met succes rijkdom herverdeeld van kapitalisten naar arbeiders, waardoor de onderliggende uitbuitingsdynamiek werd verhuld
  - Technologische werkloosheid is gecompenseerd door de creatie van nieuwe banen in de dienstensector die betere lonen bieden dan traditionele banen in de verwerkende industrie
  - Internationale handel en koloniale uitbuiting hebben kapitalistische landen in staat gesteld om hun armoede te exporteren naar ontwikkelingslanden en tegelijkertijd de binnenlandse arbeiders te verrijken
explanation: |
  De analyse van Paul Leroy-Beaulieu toont aan dat vrijemarktsamenlevingen gebaseerd op vrijwillige contracten en uitwisseling van nature neigen naar betere omstandigheden voor de massa. Het belangrijkste mechanisme is dat productiviteitsverbeteringen goederen toegankelijk maken tegen lagere prijzen terwijl de arbeidsomstandigheden verbeteren naarmate arbeid intellectueler en gemechaniseerder wordt. Dit is in tegenspraak met Marxistische voorspellingen van toenemende immiseratie. De foute antwoorden schrijven verbeteringen ten onrechte toe aan herverdeling door de overheid, patronen in het creëren van banen of internationale uitbuiting in plaats van de fundamentele dynamiek van vrijwillige uitwisseling en productiviteitsgroei die liberale economen aanwijzen als de belangrijkste drijvende krachten achter massale welvaart.
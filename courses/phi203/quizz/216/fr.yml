question: Selon l'analyse économique libérale, quelle est la principale raison pour laquelle les prédictions marxistes traditionnelles concernant l'augmentation de la pauvreté sous le capitalisme ont été contredites par les preuves historiques ?
answer: L'amélioration continue de la productivité et les mécanismes d'échange volontaire rendent les biens de consommation de plus en plus accessibles à des prix plus bas tout en améliorant les conditions de travail
wrong_answers:
  - L'intervention du gouvernement et les programmes d'aide sociale ont réussi à redistribuer les richesses des capitalistes vers les travailleurs, masquant ainsi la dynamique d'exploitation sous-jacente
  - Le chômage technologique a été compensé par la création de nouveaux emplois dans le secteur des services qui offrent de meilleurs salaires que les emplois traditionnels dans l'industrie manufacturière
  - Le commerce international et l'exploitation coloniale ont permis aux nations capitalistes d'exporter leur pauvreté vers les pays en développement tout en enrichissant les travailleurs nationaux
explanation: |
  L'analyse de Paul Leroy-Beaulieu démontre que les sociétés de libre marché basées sur des contrats et des échanges volontaires tendent naturellement vers l'amélioration des conditions de vie des masses. Le mécanisme clé est que les améliorations de la productivité rendent les biens accessibles à des prix plus bas, tandis que les conditions de travail s'améliorent à mesure que le travail devient plus intellectuel et mécanisé. Cela contredit les prédictions marxistes d'une augmentation de l'appauvrissement. Les mauvaises réponses attribuent à tort les améliorations à la redistribution gouvernementale, aux modèles de création d'emplois ou à l'exploitation internationale plutôt qu'à la dynamique fondamentale de l'échange volontaire et de la croissance de la productivité que les économistes libéraux identifient comme les principaux moteurs de la prospérité de masse.
question: Dushingiye ku nseguro y’ubutunzi y’ubwigenge, ni imvo nyamukuru iyihe yatumye ubuhanuzi bwa kera bw’aba Marx ku bijanye n’ukwiyongera kw’ubukene mu gihe c’ubu kapitalizimu buvuguruzwa n’ibimenyamenya vy’akahise?
answer: Ugukomeza gutera imbere mu bijanye n’umwimbu be n’uburyo bwo guhindura ibintu ku bushake bituma ibintu bikoreshwa birushiriza kuronka ku bici- ro bito mu gihe nyene bitera imbere mu bijanye n’akazi .
wrong_answers:
  - Porogarama za Leta zo gufasha no gufasha abantu zarashoboye gusubira gusangira ubutunzi kuva ku ba kapitalista gushika ku bakozi, bipfuka inguvu z’ugukoresha nabi .
  - Ubushomeri bushingiye ku buhinga bwa none bwarakuweho n’ugushiraho akazi gashasha mu rwego rw’ibikorwa bitanga umushahara mwiza kuruta akazi ka kera k’ubuhinga .
  - Ubudandaji mpuzamakungu n’ugukoresha nabi abakoloni vyatumye ibihugu vy’abanyagihugu birungika ubukene bwavyo mu bihugu biri mu nzira y’amajambere mu gihe bitunga abakozi bo mu rugo .
explanation: |
  Isesengura rya Paul Leroy-Beaulieu ryerekana ko amashirahamwe y’isoko ry’uburenganzira ashingiye ku masezerano y’ubushake no ku guhinduranya, mu bisanzwe akunda gutuma abantu benshi babaho neza. Uburyo nyamukuru ni uko ugutera imbere kw’umwimbu bituma ibicuruzwa bishikira ku bici- ro bito mu gihe ivy’akazi bigenda biratera imbere uko abakozi barushiriza kugira ubwenge no gukoresha imashini. Ivyo bivuguruza ivyo aba Marxiste bavuze ko abantu bokwiyongera mu bindi bihugu. Inyishu zitari zo zivuga mu buryo butari bwo ko iterambere riterwa n’ugusubira gusangira kwa Leta, uburyo bwo kurema akazi, canke ugukoresha nabi kw’isi yose aho gushingira intahe inguvu z’ishimikiro z’uguhinduranya ubushake n’iterambere ry’umwimbu abahinga mu vy’ubutunzi b’abanyagihugu bavuga ko ari vyo bituma abantu benshi batera imbere.
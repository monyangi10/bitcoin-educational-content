question: Hva er ifølge liberal økonomisk analyse den viktigste grunnen til at tradisjonelle marxistiske spådommer om økende fattigdom under kapitalismen har blitt motbevist av historiske bevis?
answer: Den kontinuerlige produktivitetsforbedringen og frivillige byttemekanismer gjør forbruksvarer stadig mer tilgjengelige til lavere priser, samtidig som arbeidsforholdene forbedres
wrong_answers:
  - Offentlige inngrep og velferdsprogrammer har med hell omfordelt rikdom fra kapitalister til arbeidere, og maskert den underliggende utbyttingsdynamikken
  - Teknologisk arbeidsledighet har blitt oppveid av nye jobber i tjenestesektoren, som gir bedre lønn enn tradisjonelle industriarbeidsplasser
  - Internasjonal handel og kolonial utbytting har gjort det mulig for kapitalistiske nasjoner å eksportere sin fattigdom til utviklingsland, samtidig som de har beriket de innenlandske arbeiderne
explanation: |
  Paul Leroy-Beaulieus analyse viser at frie markedssamfunn basert på frivillige kontrakter og utveksling naturlig tenderer mot å forbedre forholdene for massene. Den viktigste mekanismen er at produktivitetsforbedringer gjør varer tilgjengelige til lavere priser, samtidig som arbeidsforholdene forbedres når arbeidet blir mer intellektuelt og mekanisert. Dette står i motsetning til marxistiske spådommer om økende elendighet. De gale svarene tilskriver feilaktig forbedringer til statlig omfordeling, jobbskapingsmønstre eller internasjonal utbytting snarere enn den grunnleggende dynamikken i frivillig bytte og produktivitetsvekst som liberale økonomer identifiserer som de viktigste drivkreftene bak massevelstand.
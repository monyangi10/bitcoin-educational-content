question: 自由主義経済分析によれば、資本主義下で貧困が増大するという従来のマルクス主義者の予測が歴史的証拠によって否定された主な理由は何か？
answer: 生産性の継続的な向上と自発的な交換メカニズムにより、労働条件が改善される一方で、消費財はより低価格でますます入手しやすくなっている。
wrong_answers:
  - 政府の介入と福祉プログラムは、資本家から労働者への富の再分配に成功し、根本的な搾取力学を覆い隠してきた。
  - 技術的失業は、従来の製造業雇用よりも賃金の高い新しいサービス業雇用の創出によって相殺された。
  - 国際貿易と植民地搾取によって、資本主義諸国は貧困を発展途上国に輸出する一方で、国内の労働者を豊かにしてきた。
explanation: |
  ポール・ルロワ＝ボリューの分析は、自発的な契約と交換に基づく自由市場社会は、大衆の条件を自然に改善する傾向にあることを示している。重要なメカニズムは、生産性の向上により、より低価格で商品を入手できるようになる一方で、労働条件が改善され、労働がより知的で機械化されるようになることである。これはマルクス主義者が予測した、労働者の没民化の進行と矛盾する。誤答は、自由主義経済学者が大衆の繁栄の核心的原動力としている自発的な交換と生産性の向上という基本的な原動力ではなく、政府の再配分、雇用創出パターン、国際的搾取による改善だと誤っている。
question: Enligt liberal ekonomisk analys, vad är det främsta skälet till att traditionella marxistiska förutsägelser om ökad fattigdom under kapitalismen har motsagts av historiska bevis?
answer: Den kontinuerliga produktivitetsförbättringen och mekanismerna för frivilligt utbyte gör konsumtionsvaror alltmer tillgängliga till lägre priser samtidigt som arbetsvillkoren förbättras
wrong_answers:
  - Statliga ingripanden och välfärdsprogram har framgångsrikt omfördelat välstånd från kapitalister till arbetare, vilket har maskerat den underliggande exploateringsdynamiken
  - Den teknologiska arbetslösheten har kompenserats genom att nya jobb har skapats inom tjänstesektorn, där lönerna är högre än inom traditionell tillverkningsindustri
  - Internationell handel och kolonial exploatering har gjort det möjligt för kapitalistiska länder att exportera sin fattigdom till utvecklingsländer och samtidigt berika inhemska arbetare
explanation: |
  Paul Leroy-Beaulieu visar i sin analys att samhällen med fri marknad som bygger på frivilliga avtal och utbyte naturligt tenderar att förbättra villkoren för massorna. Den viktigaste mekanismen är att produktivitetsförbättringar gör varor tillgängliga till lägre priser samtidigt som arbetsvillkoren förbättras i takt med att arbetet blir mer intellektuellt och mekaniserat. Detta motsäger marxistiska förutsägelser om ökande misär. I de felaktiga svaren tillskrivs förbättringar felaktigt statlig omfördelning, mönster för jobbskapande eller internationell exploatering snarare än den grundläggande dynamiken i frivilligt utbyte och produktivitetstillväxt som liberala ekonomer identifierar som de viktigaste drivkrafterna bakom massornas välstånd.
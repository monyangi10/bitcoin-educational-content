question: De acordo com a análise económica liberal, qual é a principal razão pela qual as previsões marxistas tradicionais sobre o aumento da pobreza no capitalismo foram contrariadas pelas provas históricas?
answer: A melhoria contínua da produtividade e os mecanismos de troca voluntária tornam os bens de consumo cada vez mais acessíveis a preços mais baixos, melhorando simultaneamente as condições de trabalho
wrong_answers:
  - A intervenção governamental e os programas de bem-estar social conseguiram redistribuir a riqueza dos capitalistas para os trabalhadores, mascarando a dinâmica de exploração subjacente
  - O desemprego tecnológico foi compensado pela criação de novos empregos no sector dos serviços que proporcionam melhores salários do que o emprego tradicional na indústria transformadora
  - O comércio internacional e a exploração colonial permitiram às nações capitalistas exportar a sua pobreza para os países em desenvolvimento, enriquecendo simultaneamente os trabalhadores domésticos
explanation: |
  A análise de Paul Leroy-Beaulieu demonstra que as sociedades de mercado livre baseadas em contratos e trocas voluntárias tendem naturalmente a melhorar as condições das massas. O mecanismo-chave é que os aumentos de produtividade tornam os bens acessíveis a preços mais baixos, enquanto as condições de trabalho melhoram à medida que o trabalho se torna mais intelectualizado e mecanizado. Isto contradiz as previsões marxistas de imiseração crescente. As respostas erradas atribuem incorretamente as melhorias à redistribuição governamental, aos padrões de criação de emprego ou à exploração internacional, em vez da dinâmica fundamental da troca voluntária e do crescimento da produtividade que os economistas liberais identificam como os principais motores da prosperidade das massas.
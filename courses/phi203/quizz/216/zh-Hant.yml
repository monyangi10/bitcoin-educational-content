question: 根據自由經濟學的分析，傳統馬克思主義關於資本主義下貧窮問題日益嚴重的預言與歷史證據相矛盾的主要原因是什麼？
answer: 生產力的持續提升與自願交換機制，使得消費品的價格越來越低，同時改善了工作條件
wrong_answers:
  - 政府干預和福利計畫成功地將財富從資本主義者手中重新分配給工人，掩蓋了潛在的剝削動力
  - 技術性失業已被新服務業職位的創造所抵銷，這些職位提供比傳統製造業更高的工資。
  - 國際貿易和殖民剝削讓資本主義國家向發展中國家輸出貧窮，同時讓國內工人致富
explanation: |
  Paul Leroy-Beaulieu 的分析顯示，以自願契約和交換為基礎的自由市場社會，自然會傾向於改善大眾的生活條件。關鍵的機制是生產力的提升使得商品的價格降低，同時工作條件也隨著勞動的智慧化與機械化而改善。這與馬克思主義所預言的日益不穩定相矛盾。錯誤的答案錯誤地將改善歸因於政府的再分配、就業創造模式或國際剝削，而非自由經濟學家認為是大眾繁榮核心動力的自願交換與生產力成長的基本動力。
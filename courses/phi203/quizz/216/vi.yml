question: Theo phân tích kinh tế tự do, lý do chính khiến những dự đoán truyền thống của chủ nghĩa Mác về tình trạng nghèo đói gia tăng dưới chủ nghĩa tư bản bị bác bỏ bởi bằng chứng lịch sử là gì?
answer: Việc liên tục nâng cao năng suất và các cơ chế trao đổi tự nguyện giúp hàng tiêu dùng ngày càng dễ tiếp cận hơn với giá cả thấp hơn, đồng thời cải thiện điều kiện làm việc.
wrong_answers:
  - Sự can thiệp của chính phủ và các chương trình phúc lợi đã thành công trong việc phân phối lại của cải từ giới tư bản sang người lao động, che giấu động lực bóc lột tiềm ẩn.
  - Tình trạng thất nghiệp do công nghệ đã được bù đắp bằng việc tạo ra các công việc mới trong lĩnh vực dịch vụ, mang lại mức lương cao hơn so với việc làm trong ngành sản xuất truyền thống.
  - Thương mại quốc tế và sự bóc lột thuộc địa đã cho phép các quốc gia tư bản xuất khẩu sự nghèo đói của họ sang các nước đang phát triển trong khi làm giàu cho người lao động trong nước.
explanation: |
  Phân tích của Paul Leroy-Beaulieu chứng minh rằng các xã hội thị trường tự do dựa trên hợp đồng tự nguyện và trao đổi có xu hướng tự nhiên hướng tới việc cải thiện điều kiện sống cho đại chúng. Cơ chế then chốt là việc cải thiện năng suất giúp hàng hóa trở nên dễ tiếp cận hơn với giá cả thấp hơn, đồng thời điều kiện làm việc được cải thiện khi lao động trở nên trí tuệ hơn và được cơ giới hóa. Điều này mâu thuẫn với dự đoán của chủ nghĩa Mác về sự gia tăng nghèo đói. Các câu trả lời sai lầm quy kết sự cải thiện cho việc phân phối lại của chính phủ, mô hình tạo việc làm hoặc bóc lột quốc tế, thay vì động lực cơ bản của trao đổi tự nguyện và tăng trưởng năng suất mà các nhà kinh tế tự do xác định là động lực cốt lõi của sự thịnh vượng đại chúng.
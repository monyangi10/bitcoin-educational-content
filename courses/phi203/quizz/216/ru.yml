question: Какова, согласно либеральному экономическому анализу, основная причина того, что традиционные марксистские предсказания о росте бедности при капитализме были опровергнуты историческими фактами?
answer: Постоянное повышение производительности труда и механизмы добровольного обмена делают потребительские товары все более доступными по низким ценам, улучшая при этом условия труда
wrong_answers:
  - Государственное вмешательство и программы социального обеспечения успешно перераспределили богатство от капиталистов к рабочим, замаскировав основную динамику эксплуатации
  - Технологическая безработица компенсируется созданием новых рабочих мест в сфере услуг, которые обеспечивают более высокую заработную плату, чем традиционные рабочие места в обрабатывающей промышленности
  - Международная торговля и колониальная эксплуатация позволили капиталистическим странам экспортировать свою бедность в развивающиеся страны, обогащая при этом отечественных рабочих
explanation: |
  Анализ Поля Леруа-Болье показывает, что свободные рыночные общества, основанные на добровольных контрактах и обмене, естественным образом стремятся к улучшению условий жизни масс. Ключевой механизм заключается в том, что повышение производительности труда делает товары доступными по более низким ценам, а условия труда улучшаются по мере того, как труд становится более интеллектуальным и механизированным. Это противоречит марксистским предсказаниям об усилении неравенства. Неправильные ответы ошибочно приписывают улучшения правительственному перераспределению, моделям создания рабочих мест или международной эксплуатации, а не фундаментальной динамике добровольного обмена и роста производительности, которые либеральные экономисты считают основными движущими силами массового процветания.
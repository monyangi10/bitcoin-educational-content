question: Mis on liberaalse majandusanalüüsi kohaselt peamine põhjus, miks traditsioonilised marksistlikud ennustused vaesuse suurenemisest kapitalismi tingimustes on ajaloolise tõendusmaterjaliga ümber lükatud?
answer: Tootlikkuse pidev paranemine ja vabatahtlikud vahetusmehhanismid muudavad tarbekaubad üha kättesaadavamaks madalamate hindadega, parandades samal ajal töötingimusi
wrong_answers:
  - Valitsuse sekkumine ja heaoluprogrammid on edukalt ümber jaotanud jõukust kapitalistidelt töötajatele, varjates ekspluateerimise aluseks olevat dünaamikat
  - Tehnoloogiline tööpuudus on kompenseeritud uute töökohtade loomisega teenindussektoris, mis pakuvad paremat palka kui traditsioonilised töökohad tootmises
  - Rahvusvaheline kaubandus ja koloniaalne ekspluateerimine on võimaldanud kapitalistlikel riikidel eksportida oma vaesust arengumaadesse, rikastades samal ajal kodumaiseid töölisi
explanation: |
  Paul Leroy-Beaulieu analüüs näitab, et vabaturuühiskonnad, mis põhinevad vabatahtlikel lepingutel ja vahetusel, kalduvad loomulikult parandama masside tingimusi. Peamine mehhanism on see, et tootlikkuse paranemine muudab kaubad odavamalt kättesaadavaks, samal ajal kui töötingimused paranevad, kuna töö muutub intellektuaalsemaks ja mehhaniseeritumaks. See on vastuolus marksistlike ennustustega kasvavast ebavõrdsusest. Valed vastused omistavad parandusi ebaõigesti valitsuse ümberjaotamisele, töökohtade loomise mudelitele või rahvusvahelisele ekspluateerimisele, mitte aga vabatahtliku vahetuse ja tootlikkuse kasvu põhilisele dünaamikale, mida liberaalsed majandusteadlased määratlevad kui massilise heaolu põhitegureid.
question: How does the positive conception of liberty specifically justify state intervention in practice?
answer: By framing the state as a liberator that provides people with material goods or services they lack, presenting redistribution as an act of freedom rather than coercion
wrong_answers:
  - By arguing that negative liberty is logically incoherent and can only be stabilised through constitutional courts enforcing rights
  - By showing that free markets inevitably produce monopolies that destroy the conditions under which negative liberty is possible
  - By claiming that individual property rights, once established, automatically require state enforcement that generates further interventions
explanation: |
  Once freedom is redefined as the capacity to obtain desired outcomes, the state can present every act of redistribution or provision as an act of liberation. If a citizen "cannot afford" healthcare, housing, or education, the state claims it is making him freer by supplying them — even though this requires coercing others through taxation or regulation. This policy implication is what distinguishes the positive-liberty debate from a merely definitional dispute: it opens the door to unlimited state expansion under the banner of freedom itself.

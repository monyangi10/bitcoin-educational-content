question: According to the text, what does the example of a homeowner forbidden to paint his house the colour he wishes reveal about the nature of regulated "ownership"?
answer: That his supposed ownership is merely usufruct — he has use of the property but not genuine ownership, since the state retains effective control over what he may do with it
wrong_answers:
  - That property rights in a democracy are always conditional on the preferences of the majority, which is a legitimate constraint on individual autonomy
  - That aesthetic regulations are a justified form of zoning law and have no bearing on the deeper question of property ownership
  - That the homeowner retains full ownership because the restriction applies only to surface appearance and not to the underlying asset
explanation: |
  The text uses the homeowner forbidden to paint his house as a vivid illustration of how regulation constitutes a form of dispossession. When the state dictates what an owner may or may not do with his property, he discovers that his supposed ownership is merely usufruct: he enjoys use of the thing but does not truly own it. This example extends the broader argument that taxes exceeding the legitimate contribution of service for service, and regulations that restrict innocent use, both represent forms of territorial aggression against individual property — stripping individuals of ownership of themselves, of things, and of land.

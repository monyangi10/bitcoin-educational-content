question: According to Charles Comte's analysis in the Traité de législation, what methodological approach did he use to study the condition of women across different societies?
answer: He examined the condition of various population categories in ancient societies and in those recently discovered in Australia and New Zealand, using a historical and anthropological method
wrong_answers:
  - He compared legal codes from different European nations to identify which legislative frameworks best protected women's rights and social status
  - He surveyed contemporary economic data to measure women's wages and employment rates across industrialising and non-industrialising societies
  - He analysed philosophical texts from Antiquity to trace how theoretical conceptions of women's nature evolved across Western intellectual history
explanation: |
  The text specifies that the liberal analysis of feminism rests on a historical and anthropological study. Charles Comte, in his Traité de législation, examined the condition of various population categories in ancient societies and in those recently discovered in Australia and New Zealand. His analysis revealed that in primitive societies the lot of women was far from enviable — they were truly the slaves of their time. This empirical, cross-cultural method grounded the liberal argument for women's emancipation in observable facts rather than abstract principles or legal comparison.

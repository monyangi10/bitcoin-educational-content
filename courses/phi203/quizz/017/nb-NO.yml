question: Hvilket historisk eksempel viser hvordan fraværet av en tilgjengelig presse hindret en opplyst opinion i å støtte nødvendige reformer?
answer: Turgots reformer mislyktes i Frankrike til tross for opplysningstidens innflytelse på grunn av mangel på tilgjengelige aviser
wrong_answers:
  - "Den katolske kirkens undertrykkelse av Galileos vitenskapelige skrifter i renessansen"
  - Sensuren av politiske pamfletter under den engelske borgerkrigen under kong Karl I
  - Forbudet mot trykkpresser i Det osmanske riket frem til 1700-tallet
explanation: |
  Kapitlet nevner spesielt at til tross for opplysningstidens innflytelse i Frankrike, forhindret fraværet av aviser som var tilgjengelige for folket, dannelsen av en informert offentlig opinion som kunne støtte Turgots reformer. Mangelen på pressefrihet førte til at nødvendige endringer bare kunne gjennomføres gjennom revolusjon, ikke gjennom fredelige reformer. De andre alternativene er historisk korrekte eksempler på presserestriksjoner, men de nevnes ikke i dette kapittelet og illustrerer ikke det spesifikke forholdet mellom pressefrihet og demokratiske reformer som teksten legger vekt på.
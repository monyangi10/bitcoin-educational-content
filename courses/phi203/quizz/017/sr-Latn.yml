question: Koji istorijski primer pokazuje kako je odsustvo dostupne štampe sprečilo informisano javno mnjenje da podrži neophodne reforme?
answer: Neuspeh Turgotovih reformi u Francuskoj uprkos uticaju prosvetiteljstva zbog nedostatka dostupnih novina
wrong_answers:
  - "Potiskivanje Galilejevih naučnih spisa od strane Katoličke crkve tokom renesanse"
  - Cenzura političkih pamfleta tokom Engleskog građanskog rata pod kraljem Čarlsom I
  - Zabrana štamparskih presa u Osmanskom carstvu do 18. veka
explanation: |
  Poglavlje posebno pominje da uprkos uticaju prosvetiteljstva u Francuskoj, odsustvo novina dostupnih narodu sprečilo je formiranje informisanog javnog mnjenja sposobnog da podrži Turgotove reforme. Ovaj nedostatak slobode štampe značio je da su neophodne transformacije mogle biti ostvarene samo kroz revoluciju, a ne mirnim reformama. Ostale opcije, iako istorijski tačni primeri ograničenja štampe, nisu pomenute u ovom poglavlju i ne ilustruju specifičan odnos između slobode štampe i demokratske reforme na koji tekst naglašava.
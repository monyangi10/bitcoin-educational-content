question: Welk historisch voorbeeld toont aan hoe het ontbreken van een toegankelijke pers verhinderde dat een geïnformeerde publieke opinie noodzakelijke hervormingen steunde?
answer: Het mislukken van de hervormingen van Turgot in Frankrijk ondanks de invloed van de Verlichting door een gebrek aan toegankelijke kranten
wrong_answers:
  - "De onderdrukking van Galileo's wetenschappelijke geschriften door de katholieke kerk tijdens de Renaissance"
  - De censuur van politieke pamfletten tijdens de Engelse Burgeroorlog onder koning Charles I
  - Het verbod op drukpersen in het Ottomaanse Rijk tot de 18e eeuw
explanation: |
  Het hoofdstuk vermeldt specifiek dat ondanks de invloed van de Verlichting in Frankrijk, de afwezigheid van kranten die toegankelijk waren voor het volk, de vorming van een geïnformeerde publieke opinie die de hervormingen van Turgot kon steunen in de weg stond. Dit gebrek aan persvrijheid betekende dat noodzakelijke transformaties alleen konden worden bereikt door middel van revolutie in plaats van vreedzame hervorming. De andere opties, hoewel historisch accurate voorbeelden van persbeperkingen, worden niet genoemd in dit hoofdstuk en illustreren niet de specifieke relatie tussen persvrijheid en democratische hervorming die de tekst benadrukt.
question: 哪一个历史事例可以说明新闻媒体的缺失如何阻碍了知情舆论支持必要的改革？
answer: 尽管受到启蒙运动的影响，杜尔哥的改革在法国还是失败了，原因是缺乏可读的报纸
wrong_answers:
  - "文艺复兴时期天主教会对伽利略科学著作的压制"
  - 查理一世统治下的英国内战期间对政治小册子的审查
  - 直到 18 世纪，奥斯曼帝国一直禁止印刷机的使用
explanation: |
  本章特别提到，尽管启蒙运动在法国产生了影响，但由于没有报纸供人们阅读，因此无法形成能够支持杜尔哥改革的知情舆论。缺乏新闻自由意味着必要的变革只能通过革命而非和平改革来实现。其他选项虽然在历史上是新闻限制的准确例子，但在本章中并未提及，也不能说明文本所强调的新闻自由与民主改革之间的具体关系。
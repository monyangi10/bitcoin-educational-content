question: Ni mfano gani wa kihistoria unaoonyesha jinsi ukosefu wa vyombo vya habari vinavyoweza kufikiwa kwa urahisi ulivyozuia maoni ya umma yaliyo na taarifa kuunga mkono mageuzi muhimu?
answer: Kushindwa kwa mageuzi ya Turgot nchini Ufaransa licha ya ushawishi wa Mwangaza kutokana na ukosefu wa magazeti yanayoweza kufikiwa kwa urahisi
wrong_answers:
  - "Kukandamizwa kwa maandishi ya kisayansi ya Galileo na Kanisa Katoliki wakati wa Renaissance"
  - Udhibiti wa vipeperushi vya kisiasa wakati wa Vita vya wenyewe kwa wenyewe vya Uingereza chini ya Mfalme Charles I
  - Marufuku ya mashine za uchapishaji katika Milki ya Ottoman hadi karne ya 18
explanation: |
  Sura hiyo inataja haswa kwamba licha ya ushawishi wa Mwangaza nchini Ufaransa, kutokuwepo kwa magazeti yanayoweza kufikiwa na watu kulizuia uundaji wa maoni ya umma yenye ujuzi yanayoweza kuunga mkono mageuzi ya Turgot. Ukosefu huu wa uhuru wa vyombo vya habari ulimaanisha kwamba mabadiliko muhimu yangeweza tu kufanywa kupitia mapinduzi badala ya mageuzi ya amani. Chaguzi zingine, ingawa ni mifano sahihi ya kihistoria ya vikwazo vya vyombo vya habari, hazijatajwa katika sura hii na hazionyeshi uhusiano maalum kati ya uhuru wa vyombo vya habari na mageuzi ya kidemokrasia ambayo maandishi yanasisitiza.
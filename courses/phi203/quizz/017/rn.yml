question: Ni akarorero akahe k’akahise kerekana ingene ukubura ibinyamakuru bishobora gushikirwa vyabujije ivyiyumviro vya bose bifise amakuru gushigikira ivugurura rikenewe?
answer: Kunanirwa kw’ivugurura rya Turgot mu Bufaransa naho hariho akosho k’Umuco kubera ukubura ibinyamakuru vy’abantu bose .
wrong_answers:
  - "Uguhagarika inyandiko za siyansi za Galilée na Ekleziya Gatolika mu gihe c'Ivugurura"
  - Gucengera udutabu tw’ivya politike mu gihe c’intambara y’abanyagihugu y’Abongereza ku ngoma y’Umwami Charles wa mbere .
  - Ububisha bw’amashini acapura mu bwami bwa Ottoman gushika mu kinjana ca 18 .
explanation: |
  Ico gice kivuga canecane yuko naho mu Bufaransa hariho akosho k’Umuco, ukubura ibinyamakuru abantu bashobora gushikira vyatumye habaho iciyumviro ca bose gifise amakuru gishobora gushigikira ivugurura rya Turgot. Ukwo kubura umwidegemvyo w’itangazamakuru kwasobanura ko amahinduka akenewe yoshobora gushikwako gusa biciye mu mpinduka aho guhindura ibintu mu mahoro. Ayandi mahitamwo, naho ari ingero zitagira amateka z’uburenganzira bw’itangazamakuru, ntizivugwa muri iki kigabane kandi ntizigaragaza isano ryihariye riri hagati y’umwidegemvyo w’itangazamakuru n’ivugurura rya demokarasi ico canditswe gishimikirako.
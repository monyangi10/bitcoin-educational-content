question: کدام مثال تاریخی نشان می‌دهد که چگونه عدم دسترسی به مطبوعات مانع از حمایت افکار عمومی آگاه از اصلاحات ضروری شد؟
answer: شکست اصلاحات تورگو در فرانسه علیرغم تأثیر روشنگری به دلیل عدم دسترسی به روزنامه‌های قابل دسترس
wrong_answers:
  - "سرکوب نوشته‌های علمی گالیله توسط کلیسای کاتولیک در دوران رنسانس"
  - سانسور جزوات سیاسی در طول جنگ داخلی انگلستان تحت حکومت شاه چارلز اول
  - ممنوعیت چاپخانه‌ها در امپراتوری عثمانی تا قرن هجدهم
explanation: |
  این فصل به طور خاص اشاره می‌کند که علی‌رغم تأثیر روشنگری در فرانسه، عدم وجود روزنامه‌های در دسترس مردم مانع از شکل‌گیری افکار عمومی آگاه شد که قادر به حمایت از اصلاحات تورگو باشد. این فقدان آزادی مطبوعات به این معنا بود که تحولات ضروری تنها از طریق انقلاب و نه اصلاحات مسالمت‌آمیز قابل انجام بود. گزینه‌های دیگر، اگرچه نمونه‌های تاریخی دقیقی از محدودیت‌های مطبوعاتی هستند، اما در این فصل ذکر نشده‌اند و رابطه خاص بین آزادی مطبوعات و اصلاحات دموکراتیک که متن بر آن تأکید دارد را نشان نمی‌دهند.
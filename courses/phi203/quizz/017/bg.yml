question: Кой исторически пример показва как липсата на достъпна преса е попречила на информираното обществено мнение да подкрепи необходимите реформи?
answer: Неуспехът на реформите на Турго във Франция въпреки влиянието на Просвещението поради липсата на достъпни вестници
wrong_answers:
  - "Потискането на научните трудове на Галилео от страна на Католическата църква през Ренесанса"
  - Цензурата на политическите памфлети по време на Английската гражданска война при крал Чарлз I
  - Забрана на печатарските преси в Османската империя до XVIII в
explanation: |
  В главата се споменава по-специално, че въпреки влиянието на Просвещението във Франция, липсата на достъпни за хората вестници е попречила на формирането на информирано обществено мнение, способно да подкрепи реформите на Турго. Липсата на свобода на печата означава, че необходимите промени могат да бъдат осъществени само чрез революция, а не чрез мирни реформи. Другите варианти, макар и да са исторически точни примери за ограничения на печата, не са споменати в тази глава и не илюстрират специфичната връзка между свободата на печата и демократичните реформи, върху която се акцентира в текста.
question: Какой исторический пример демонстрирует, как отсутствие доступной прессы мешало информированному общественному мнению поддержать необходимые реформы?
answer: Провал реформ Тюрго во Франции, несмотря на влияние Просвещения, из-за отсутствия доступных газет
wrong_answers:
  - "Подавление научных трудов Галилея католической церковью в эпоху Возрождения"
  - Цензура политических памфлетов во время гражданской войны в Англии при короле Карле I
  - Запрет печатных станков в Османской империи до XVIII века
explanation: |
  В главе особо отмечается, что, несмотря на влияние Просвещения во Франции, отсутствие доступных для населения газет препятствовало формированию информированного общественного мнения, способного поддержать реформы Тюрго. Отсутствие свободы печати означало, что необходимые преобразования могли быть осуществлены только путем революции, а не мирных реформ. Другие варианты, хотя и являются исторически достоверными примерами ограничения свободы прессы, не упоминаются в этой главе и не иллюстрируют конкретную связь между свободой прессы и демократическими реформами, на которой акцентируется внимание в тексте.
question: Jaký historický příklad ukazuje, jak absence dostupného tisku zabránila informovanému veřejnému mínění podpořit potřebné reformy?
answer: Neúspěch Turgotových reforem ve Francii navzdory vlivu osvícenství kvůli nedostatku dostupných novin
wrong_answers:
  - "Potlačení Galileových vědeckých spisů katolickou církví v období renesance"
  - Cenzura politických pamfletů během anglické občanské války za krále Karla I
  - Zákaz tisku v Osmanské říši až do 18. století
explanation: |
  Kapitola konkrétně zmiňuje, že navzdory vlivu osvícenství ve Francii bránila neexistence novin dostupných lidem ve vytvoření informovaného veřejného mínění, které by bylo schopno podpořit Turgotovy reformy. Tento nedostatek svobody tisku znamenal, že nezbytných změn bylo možné dosáhnout pouze revolucí, nikoliv mírovými reformami. Ostatní možnosti, ačkoli jsou historicky přesnými příklady omezení tisku, nejsou v této kapitole zmíněny a neilustrují specifický vztah mezi svobodou tisku a demokratickými reformami, který text zdůrazňuje.
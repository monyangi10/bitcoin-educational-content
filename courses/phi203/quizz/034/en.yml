question: In the example of a baker whose competitor opens a shop across the street, what distinction does the text draw?
answer: The competitor causes a real economic nuisance but commits no aggression, because he has violated no one's person or property
wrong_answers:
  - The competitor commits an aggression because his actions directly harm the baker's livelihood and must be regulated by law
  - The competitor is free to open his shop, but the law should compensate the first baker for the losses he suffers
  - The nuisance is only acceptable if the new shop offers genuinely better products; otherwise it constitutes unfair competition
explanation: |
  The text uses the example of a baker whose competitor opens a shop across the street to illustrate a crucial distinction: not all nuisances are aggressions that the law should punish. The first baker suffers a real economic nuisance, but the competitor has not violated anyone's person or property. He has merely exercised his own freedom. Historical developments reveal a gradual expansion of the nuisances that societies no longer consider punishable: in the Middle Ages, competition itself was often condemned because its effects were felt acutely in small, closed markets. The progressive recognition that competition and innovation, though they cause discomfort, are not crimes, has accompanied the development of freer and more prosperous societies.

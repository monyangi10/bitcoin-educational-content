question: Ni igiki uburyo bwa Benjamin Constant bwo kwidegemvya busaba nk’inzira nyamukuru yo kubuza ubutegetsi bwa demokarasi guhinduka ubutegetsi bw’agahomerabunwa?
answer: Amategeko agenga Itegeko Nshinga n’ivyiyumviro vya bose bimurikiwe bitegerezwa guhagarika demokarasi kuko ari uburyo, atari intumbero ubwayo .
wrong_answers:
  - Kugira uruhara rw'abanyagihugu mu ngingo zose za Leta kugira ngo demokarasi ibe yemewe no gukingira abantu b'abanyacubahiro gufatwa
  - Kwagura amatora ya demokarasi kugira ngo ashiremwo ingingo zose z'ubutegetsi aho kuzigarukira ku matora y'abaserukira igihugu .
  - Gukomeza ingingo ngenderwako z'ubutegetsi bw'abantu benshi kugira ngo ubushake bwa bose bube buhambaye kuruta ivyo umuntu wese akunda
explanation: |
  Filozofiya ya Constant y’ubwigenge yemera ko demokarasi ari igikoresho c’agaciro ariko giteye akaga gisaba itegeko nshinga n’abanyagihugu bafise amakuru kugira ngo ntiyigere ihungabanya umwidegemvyo w’umuntu ku giti ciwe. Inyishu zitari zo zirerekana ivyiyumviro bitari vyo: demokarasi itaziguye mu vy’ukuri yongera ingorane z’ububisha bw’abantu benshi, kwagura ingingo za demokarasi ku ngingo zose vyotuma habaho uguhuzagurika kw’uburezi, kandi gukomeza ubutegetsi bw’abantu benshi ntivyitaho ivyerekeye uburenganzira bw’umuntu ku giti ciwe ku bijanye no kurinda agahahazo rusangi.
question: Co navrhuje liberální přístup Benjamina Constanta jako základní rámec pro to, aby se demokratické systémy nestaly despotickými?
answer: Ústavní pravidla a osvícené veřejné mínění musí demokracii omezovat, protože je prostředkem, nikoliv cílem samým o sobě
wrong_answers:
  - Přímá účast občanů na všech vládních rozhodnutích, která zajistí demokratickou legitimitu a zabrání ovládnutí elitami
  - Rozšíření demokratického hlasování na všechna politická rozhodnutí a neomezování se pouze na volby do zastupitelských orgánů
  - Posílení zásad většinového systému, aby kolektivní vůle vždy převažovala nad individuálními preferencemi
explanation: |
  Constantova liberální filozofie uznává demokracii jako cenný, ale nebezpečný nástroj, který vyžaduje ústavní omezení a informované občany, aby se zabránilo podkopávání svobody jednotlivce. Špatné odpovědi odrážejí běžné mylné představy: více přímé demokracie ve skutečnosti zvyšuje riziko tyranie většiny, rozšíření demokratického rozhodování na všechny politiky by posílilo paradox poručnictví a posílení vlády většiny ignoruje základní liberální zájem o ochranu individuálních práv před kolektivním útlakem.
question: Apa yang diusulkan oleh pendekatan liberal Benjamin Constant sebagai kerangka kerja penting untuk mencegah sistem demokrasi menjadi lalim?
answer: Aturan-aturan konstitusional dan opini publik yang tercerahkan harus membatasi demokrasi karena demokrasi adalah sarana, bukan tujuan itu sendiri
wrong_answers:
  - Partisipasi warga negara secara langsung dalam semua keputusan pemerintah untuk memastikan legitimasi demokratis dan mencegah penangkapan elit
  - Perluasan pemungutan suara yang demokratis untuk mencakup semua keputusan kebijakan dan tidak membatasinya pada pemilihan perwakilan
  - Memperkuat prinsip-prinsip aturan mayoritas untuk memastikan kehendak kolektif selalu menang di atas preferensi individu
explanation: |
  Filosofi liberal Constant mengakui bahwa demokrasi adalah alat yang berharga namun berbahaya, yang membutuhkan batasan konstitusional dan warga negara yang terinformasi untuk mencegahnya merongrong kebebasan individu. Jawaban yang salah mencerminkan kesalahpahaman umum: demokrasi yang lebih langsung justru meningkatkan risiko tirani mayoritas, memperluas pengambilan keputusan demokratis ke semua kebijakan akan memperkuat paradoks pengawasan, dan memperkuat kekuasaan mayoritas mengabaikan keprihatinan liberal yang mendasar tentang melindungi hak-hak individu dari penindasan kolektif.
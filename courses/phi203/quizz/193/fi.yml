question: Mitä Benjamin Constantin liberaalissa lähestymistavassa ehdotetaan keskeiseksi kehykseksi, jolla estetään demokraattisten järjestelmien muuttuminen despoottisiksi?
answer: Perustuslaillisilla säännöillä ja valistuneella julkisella mielipiteellä on rajoitettava demokratiaa, sillä se on keino, ei päämäärä sinänsä
wrong_answers:
  - Kansalaisten suora osallistuminen kaikkiin hallituksen päätöksiin demokraattisen legitiimiyden varmistamiseksi ja eliitin kaappaamisen estämiseksi
  - Demokraattisen äänestyksen laajentaminen koskemaan kaikkia poliittisia päätöksiä sen sijaan, että se rajoitettaisiin edustajistovaaleihin
  - Vahvistetaan enemmistöperiaatteita sen varmistamiseksi, että kollektiivinen tahto voittaa aina yksilölliset mieltymykset
explanation: |
  Constantin liberaalissa filosofiassa demokratia tunnustetaan arvokkaaksi mutta vaaralliseksi välineeksi, joka vaatii perustuslaillisia rajoituksia ja valveutuneita kansalaisia estääkseen sitä heikentämästä yksilönvapautta. Väärät vastaukset heijastavat yleisiä väärinkäsityksiä: suoremman demokratian lisääminen itse asiassa lisää enemmistön tyrannian riskiä, demokraattisen päätöksenteon laajentaminen koskemaan kaikkia politiikkoja vahvistaisi holhousparadoksia, ja enemmistösäännön vahvistaminen jättää huomiotta liberaalin perushuolen yksilön oikeuksien suojelemisesta kollektiiviselta sorrolta.
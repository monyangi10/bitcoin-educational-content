question: Šta liberalni pristup Benžamina Konstana predlaže kao suštinski okvir za sprečavanje da demokratski sistemi postanu despotski?
answer: Ustavna pravila i prosvetljeno javno mnjenje moraju ograničiti demokratiju, jer je ona sredstvo, a ne cilj sama po sebi.
wrong_answers:
  - Direktno učešće građana u svim vladinim odlukama kako bi se osigurala demokratska legitimnost i sprečilo preuzimanje od strane elite
  - Proširenje demokratskog glasanja na sve političke odluke umesto da se ograniči samo na predstavničke izbore
  - Jačanje principa vladavine većine kako bi se osiguralo da kolektivna volja uvek prevlada nad individualnim preferencijama
explanation: |
  Konstantova liberalna filozofija prepoznaje demokratiju kao vredan, ali opasan alat koji zahteva ustavna ograničenja i informisano građanstvo kako bi se sprečilo da podriva individualnu slobodu. Pogrešni odgovori odražavaju uobičajene zablude: više direktne demokratije zapravo povećava rizik od tiranije većine, proširenje demokratskog odlučivanja na sve politike bi pojačalo paradoks tutorstva, a jačanje vladavine većine ignoriše fundamentalnu liberalnu zabrinutost za zaštitu individualnih prava od kolektivne opresije.
question: رویکرد لیبرال بنجامین کنستانت چه چارچوب اساسی را برای جلوگیری از تبدیل سیستم‌های دموکراتیک به استبدادی پیشنهاد می‌کند؟
answer: قوانین قانون اساسی و افکار عمومی روشنفکر باید دموکراسی را محدود کنند زیرا دموکراسی وسیله‌ای است، نه هدفی در خود.
wrong_answers:
  - مشارکت مستقیم شهروندان در تمامی تصمیمات دولتی برای تضمین مشروعیت دموکراتیک و جلوگیری از تسلط نخبگان
  - گسترش رأی‌گیری دموکراتیک به‌منظور شامل کردن تمام تصمیمات سیاستی به‌جای محدود کردن آن به انتخابات نمایندگی
  - تقویت اصول حاکمیت اکثریت برای اطمینان از اینکه اراده جمعی همیشه بر ترجیحات فردی غالب است
explanation: |
  فلسفه لیبرال کنستانت دموکراسی را به عنوان ابزاری ارزشمند اما خطرناک می‌شناسد که نیازمند محدودیت‌های قانون اساسی و شهروندانی آگاه است تا از تضعیف آزادی فردی جلوگیری کند. پاسخ‌های نادرست بازتاب‌دهنده تصورات غلط رایج هستند: دموکراسی مستقیم‌تر در واقع خطر استبداد اکثریت را افزایش می‌دهد، گسترش تصمیم‌گیری دموکراتیک به همه سیاست‌ها پارادوکس قیمومیت را تشدید می‌کند، و تقویت حکومت اکثریت نگرانی اساسی لیبرال درباره حفاظت از حقوق فردی در برابر ستم جمعی را نادیده می‌گیرد.
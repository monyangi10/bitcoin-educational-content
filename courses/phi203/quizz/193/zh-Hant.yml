question: 本傑明‧康斯坦特（Benjamin Constant）的自由主義方法提出什麼是防止民主制度變得專制的基本架構？
answer: 憲法規則和開明的公眾輿論必須限制民主，因為民主本身只是一種手段，而非目的。
wrong_answers:
  - 公民直接參與所有政府決策，以確保民主正當性，防止菁英壟斷
  - 擴大民主投票，以涵蓋所有政策決策，而非僅限於代表選舉
  - 強化多數服從原則，確保集體意願永遠優於個人偏好
explanation: |
  康斯坦丁的自由哲學承認民主是一種有價值但危險的工具，需要憲法的約束和知情的公民來防止它損害個人自由。錯誤的答案反映了常見的錯誤觀念：更直接的民主實際上增加了多數暴政的風險，將民主決策擴大到所有政策會放大監護悖論，而強化多數統治則忽略了自由主義對保護個人權利免受集體壓迫的基本關切。
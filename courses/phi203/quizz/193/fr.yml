question: Que propose l'approche libérale de Benjamin Constant comme cadre essentiel pour empêcher les systèmes démocratiques de devenir despotiques ?
answer: Les règles constitutionnelles et l'opinion publique éclairée doivent limiter la démocratie, car elle est un moyen et non une fin en soi
wrong_answers:
  - Participation directe des citoyens à toutes les décisions gouvernementales afin de garantir la légitimité démocratique et d'empêcher l'accaparement par les élites
  - L'élargissement du vote démocratique à toutes les décisions politiques plutôt que de le limiter aux élections représentatives
  - Renforcer les principes de la règle de la majorité pour garantir que la volonté collective l'emporte toujours sur les préférences individuelles
explanation: |
  La philosophie libérale de Constant reconnaît la démocratie comme un outil précieux, mais dangereux qui nécessite des contraintes constitutionnelles et des citoyens informés pour l'empêcher de saper la liberté individuelle. Les mauvaises réponses reflètent les idées fausses les plus répandues : une démocratie plus directe augmente en fait le risque de tyrannie de la majorité, l'extension de la prise de décision démocratique à toutes les politiques amplifierait le paradoxe de la tutelle, et le renforcement de la règle de la majorité ignore le souci libéral fondamental de protéger les droits individuels contre l'oppression collective.

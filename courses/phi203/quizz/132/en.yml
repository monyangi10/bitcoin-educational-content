question: What was Frédéric Bastiat's specific contribution to the liberal programme for international peace?
answer: Free trade itself is the surest foundation for peace — the more nations exchange, the more their interests converge and the more costly war becomes for all
wrong_answers:
  - Nations should establish a permanent international congress to resolve territorial disputes through negotiation rather than armed conflict
  - Disarmament treaties are the most effective peace mechanism because they remove the material means by which wars are fought
  - Cultural exchange and mutual understanding between peoples are more reliable foundations for peace than economic relationships alone
explanation: |
  Frédéric Bastiat's contribution to the liberal programme for peace was the most direct: free trade itself is the surest foundation for peace. As nations exchange more goods and services, their economic interests align more closely, and the material costs of going to war against a trading partner become prohibitive for all sides. This argument connects the harmony of interests directly to international relations: voluntary commercial exchange not only enriches both parties but also builds the interdependence that makes conflict increasingly irrational. Bastiat's approach complements Saint-Pierre's institutional proposals, Passy's appeal to public opinion, and Molinari's international justice framework.

question: Ni ukuri nyabaki kw’ishimikiro kw’abantu gukora nk’umushinge wo kuba uwufise ivy’umubiri n’itunga mu buryo bubereye hakurikijwe isesengura ry’ishimikiro ry’ukuri ry’umwidegemvyo?
answer: Ukwitunga (propriété de soi) - ukuntu abantu bitunga .
wrong_answers:
  - Ubukene bw'ibidukikije n'uguhiganwa ku butunzi mw'isi y'umubiri
  - Uguhinduka kw'umuntu ku giti ciwe n'ubudasa bw'abantu butagabanywa mu bantu
  - Amateka y'iterambere kuva ku bugizi bwa nabi rusangi gushika ku ntunganyo z'amasezerano
explanation: |
  Ico canditswe kivuga neza ko ukwigira (propriété de soi) gufata ikibanza nyamukuru mu bintu vy’ishimikiro vy’abantu, kuko ni ukubera nyene abantu bitunga, ni co gituma bashobora kugira ibintu, ivy’umubiri n’amatongo mu buryo bubereye. Naho ubukene bw’ibinyabuzima, ubudasa bw’abantu, n’ugutera imbere kw’amateka bivugwa ko ari ibintu bihambaye mu mushinge w’umwidegemvyo, ntibimenyekana ko ari vyo vyihariye bishingiyeko umuntu afise umutungo wemewe. Ukwitunga birashikirizwa nk’ikintu gikenewe gihuye n’ubwenge gituma ubundi bwoko bwose bwo kugira ibintu bibereye bushoboka.
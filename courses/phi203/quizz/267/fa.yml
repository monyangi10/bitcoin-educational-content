question: واقعیت اساسی انسانی که به عنوان پایه‌ای برای مالکیت مشروع کالاها و اموال مادی بر اساس تحلیل مبنای واقعی آزادی عمل می‌کند چیست؟
answer: مالکیت خود (propriété de soi) - این واقعیت که انسان‌ها مالک خود هستند
wrong_answers:
  - کمیابی طبیعی و رقابت برای منابع در دنیای فیزیکی
  - تنوع فردی و گوناگونی غیرقابل کاهش انسانی در میان افراد
  - پیشرفت تاریخی از خشونت جمعی به ترتیبات قراردادی
explanation: |
  متن به‌طور صریح بیان می‌کند که مالکیت بر خود (propriété de soi) جایگاه مرکزی در میان حقایق اساسی انسانی دارد، زیرا دقیقاً به این دلیل که انسان‌ها مالک خود هستند، می‌توانند به‌طور مشروع مالک چیزها، کالاهای مادی و زمین‌ها باشند. در حالی که کمبود طبیعی، تنوع انسانی و پیشرفت تاریخی به عنوان عوامل مهم در بنیان آزادی ذکر شده‌اند، اما به عنوان مبنای خاص مالکیت مشروع شناسایی نشده‌اند. مالکیت بر خود به عنوان پیش‌نیاز منطقی که تمامی اشکال دیگر مالکیت مشروع را ممکن می‌سازد، ارائه شده است.
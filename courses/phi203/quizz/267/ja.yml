question: 自由の事実的基盤の分析によれば、物質的財物や財産の合法的所有の基盤となる人間の根本的現実とは何か？
answer: 自己所有権（propriété de soi）-人間が自分自身を所有しているという事実
wrong_answers:
  - 物理的世界における自然の希少性と資源獲得競争
  - 個体差と人間の多様性
  - 集団的暴力から契約取り決めへの歴史的経過
explanation: |
  というのも、人間は自分自身を所有するからこそ、物、物質、土地を合法的に所有することができるからである。自然の希少性、人間の多様性、歴史的な進歩は、自由の基礎における重要な要素として言及されているが、合法的な所有権の具体的な根拠としては特定されていない。自己所有は、他のあらゆる形態の合法的所有を可能にする論理的前提条件として提示されている。
question: 根据所介绍的自由主义政治理论，历史上大多数建国和领土扩张尝试的根本错误是什么？
answer: 它们的基础是政治客户的扩张，而不是真正的语言、文化或自然亲缘关系
wrong_answers:
  - 他们在试图巩固领土之前没有建立适当的民主体制
  - 他们将经济利益置于建立安全边界和防御能力之上
  - 他们忽视了建立适当的法律框架来保护个人财产权
explanation: |
  文中明确指出，战争扩张领土并不像通常所说的那样基于语言或文化上的亲缘关系，而是基于统治者进行政治客户扩张的机会。殖民化运动就是这种不考虑语言或文化统一性的客户扩张的例证。这揭示了民族团结的历史理由（语言、文化、历史）经不起公正的分析，因为领土扩张服务于政治权力，而不是自然社群的形成。
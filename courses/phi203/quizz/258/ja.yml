question: 提示されたリベラルな政治理論によれば、国家建設や領土拡張の歴史的試みの根底にある根本的な誤りは何か？
answer: 言語的、文化的、自然的な親近感よりも、政治的な顧客の拡大に基づいていた。
wrong_answers:
  - 彼らは領土の強化を試みる前に、適切な民主主義制度を確立することができなかった。
  - 安全な国境や防衛力の確立よりも、経済的利益を優先した。
  - 個人の財産権を保護するための適切な法的枠組みの構築を怠った。
explanation: |
  この文章は、戦争によって領土が拡大したのは、一般に主張されているような言語的、文化的な親和性に基づくものではなく、支配勢力による政治的な顧客拡大の機会に基づくものであったと明言している。植民地化運動は、言語や文化の統一を無視したこの顧客層の拡大を例証している。このことは、領土拡大が自然な共同体形成よりもむしろ政治権力に貢献したため、国民統合の歴史的正当化（言語、文化、歴史）が公平な分析に耐えられないことを明らかにしている。
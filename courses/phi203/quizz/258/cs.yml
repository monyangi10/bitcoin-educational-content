question: Jaká základní chyba je podle předložené liberální politické teorie základem většiny historických pokusů o budování státu a územní expanzi?
answer: Byly založeny spíše na rozšíření politické klientely než na skutečné jazykové, kulturní nebo přírodní spřízněnosti
wrong_answers:
  - Před pokusem o územní konsolidaci nezavedli řádné demokratické instituce
  - Upřednostnili ekonomické zájmy před vytvořením bezpečných hranic a obranyschopnosti
  - Zanedbaly vytvoření odpovídajícího právního rámce pro ochranu individuálních vlastnických práv
explanation: |
  V textu se výslovně uvádí, že války rozšiřující území nebyly založeny na jazykové nebo kulturní příbuznosti, jak se běžně tvrdí, ale spíše na možnostech rozšíření politické klientely vládnoucích mocností. Kolonizační hnutí je příkladem této klientelistické expanze bez ohledu na jazykovou nebo kulturní jednotu. To ukazuje, že historická zdůvodnění národní jednoty (jazyk, kultura, historie) neobstojí před nestrannou analýzou, protože územní expanze sloužila spíše politické moci než přirozenému vytváření společenství.
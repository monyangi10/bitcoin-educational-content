question: Welke fundamentele fout ligt volgens de gepresenteerde liberale politieke theorie ten grondslag aan de meeste historische pogingen tot natievorming en territoriale expansie?
answer: Ze waren eerder gebaseerd op politieke klantenbinding dan op echte linguïstische, culturele of natuurlijke affiniteiten
wrong_answers:
  - Ze slaagden er niet in om goede democratische instellingen op te zetten voordat ze territoriale consolidatie probeerden
  - Ze gaven voorrang aan economische belangen boven het instellen van veilige grenzen en defensieve capaciteiten
  - Ze verzuimden adequate wettelijke kaders te creëren om individuele eigendomsrechten te beschermen
explanation: |
  De tekst stelt expliciet dat oorlogen uitbreidende gebieden niet gebaseerd waren op taalkundige of culturele affiniteiten zoals algemeen wordt beweerd, maar eerder op mogelijkheden voor politieke clientele expansie door heersende machten. De kolonisatiebeweging is een voorbeeld van deze cliëntele expansie zonder rekening te houden met de eenheid van taal of cultuur. Dit laat zien dat historische rechtvaardigingen voor nationale eenheid (taal, cultuur, geschiedenis) geen onpartijdige analyse kunnen doorstaan, omdat territoriale expansie meer ten dienste stond van politieke macht dan van natuurlijke gemeenschapsvorming.
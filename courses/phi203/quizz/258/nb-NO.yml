question: Hvilken grunnleggende feil ligger til grunn for de fleste historiske forsøk på nasjonsbygging og territoriell ekspansjon, ifølge den liberale politiske teorien som presenteres?
answer: De var basert på politisk klientellutvidelse snarere enn ekte språklig, kulturell eller naturlig tilhørighet
wrong_answers:
  - De klarte ikke å etablere skikkelige demokratiske institusjoner før de forsøkte å konsolidere territoriet
  - De prioriterte økonomiske interesser fremfor å etablere sikre grenser og forsvarskapasiteter
  - De unnlot å skape tilstrekkelige juridiske rammer for å beskytte individuelle eiendomsrettigheter
explanation: |
  Teksten sier eksplisitt at krigenes ekspanderende territorier ikke var basert på språklig eller kulturell tilhørighet, slik det ofte hevdes, men snarere på makthavernes muligheter til å utvide sitt politiske klientell. Koloniseringsbevegelsen er et eksempel på denne ekspansjonen uten hensyn til språklig eller kulturell enhet. Dette viser at historiske begrunnelser for nasjonal enhet (språk, kultur, historie) ikke tåler en upartisk analyse, ettersom territoriell ekspansjon tjente politisk makt snarere enn naturlig samfunnsdannelse.
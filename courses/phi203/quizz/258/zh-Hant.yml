question: 根據所提出的自由主義政治理論，歷史上大多數的國家建設與領土擴張嘗試都是基於什麼基本錯誤？
answer: 他們是基於政治客戶的擴張，而非真正的語言、文化或自然親緣關係。
wrong_answers:
  - 他們在嘗試鞏固領土之前，沒有建立適當的民主體制。
  - 他們將經濟利益置於建立安全邊界和防禦能力之上
  - 他們忽略了建立適當的法律架構來保護個人財產權
explanation: |
  文中明確指出，擴張領土的戰爭並非如一般所說是基於語言或文化的親緣關係，而是基於統治者擴張政治客戶的機會。殖民化運動就是這種不顧語言或文化統一的客戶擴張的例子。這揭示了民族統一的歷史理由（語言、文化、歷史）經不起公正的分析，因為領土擴張是為了政治權力而非自然社群的形成。
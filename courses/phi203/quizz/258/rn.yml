question: Dushingiye ku ciyumviro ca politike c’ubwigenge cashikirijwe, ni irihe kosa ry’ishimikiro rishingiye ku ngendo nyinshi zo mu mateka zo kwubaka igihugu no kwagura intara?
answer: Vyari bishingiye ku kwagura abaguzi ba politike aho gushingira ku bijanye n’ururimi, umuco canke ubucuti nyakuri bw’ibidukikije .
wrong_answers:
  - Bananiwe gushinga inzego za demokarasi zibereye imbere y’uko bagerageza gushiramwo intara .
  - Bashize imbere inyungu z’ubutunzi kuruta gushinga imipaka itekanye n’ubushobozi bwo kwikingira .
  - Baciye birengagiza gushinga amategeko akwiriye yo kurinda uburenganzira bw'umuntu ku giti ciwe .
explanation: |
  Ico canditswe kivuga neza ko intambara zo kwagura intara zitashingiye ku rurimi canke ku mico kama nk’uko abantu benshi babivuga, ahubwo ko zari zishingiye ku mahirwe yo kwagura abaguzi ba politike n’ubutegetsi butwara. Umuhari w’abakoloni ni akarorero k’ukwo kwaguka kw’abaguzi ataco kwitwararika ku bumwe bw’ururimi canke umuco. Ivyo birerekana ko imvo z’amateka zituma haba ubumwe bw’igihugu (ururimi, umuco, amateka) zidashobora guhangana n’isesengura ritagira aho rigarukira, kuko ukwagura intara kwakoreshwa ububasha bwa politike aho gushinga umuryango w’abantu.
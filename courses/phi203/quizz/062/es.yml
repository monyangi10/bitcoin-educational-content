question: ¿Qué función principal cumplía la esclavitud más allá de la producción económica en las sociedades antiguas según el texto?
answer: Proporcionaba seguridad social a los trabajadores en un mundo peligroso
wrong_answers:
  - Estableció jerarquías religiosas y orden espiritual en las comunidades
  - Creó sistemas educativos para transmitir conocimientos a las generaciones futuras
  - Desarrolló estrategias militares y fortificaciones defensivas contra los enemigos
explanation: |
  Según el texto, la esclavitud servía de seguro social en sociedades antiguas marcadas por la inseguridad permanente. Para determinados trabajadores, este estatus les permitía contribuir a la producción sin arriesgar diariamente su vida en actividades peligrosas. Las demás opciones son incorrectas, ya que describen funciones que no se mencionan en el capítulo: la esclavitud no tenía como objetivo principal la religión, la educación o la estrategia militar, sino proporcionar seguridad y reducir el riesgo individual en un entorno intrínsecamente peligroso en el que la supervivencia era incierta.
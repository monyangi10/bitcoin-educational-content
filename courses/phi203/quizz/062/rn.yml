question: Ni igikorwa nyamukuru ikihe ubuja bwakora kirenze ivy’ubutunzi mu mibano ya kera nk’uko icanditswe kivyerekana?
answer: Yaratanga ubwishingizi bw’ubuzima n’umutekano ku bakozi bo mw’isi y’akaga .
wrong_answers:
  - Yashizeho ubukuru bw’idini n’urutonde rw’impwemu mu mibano .
  - Yaremye uburyo bwo kwigisha bwo gutanga ubumenyi ku bihe bizoza .
  - Yarateguye ingamba z’igisirikare be n’ibihome vyo kwikingira abansi .
explanation: |
  Dukurikije ico canditswe, ubuja bwari uburyo bwo kwishingira abantu mu mibano ya kera yari irangwa n’ukudatekana guhoraho. Ku bakozi bamwebamwe, iyo nzira yatuma bashobora gutanga umusanzu mu bijanye n’uguhingura ata co bashira mu kaga ku musi ku musi mu bikorwa biteye akaga. Ayandi mahitamwo ntabwo ari meza kuko adondora ibikorwa bitavuzwe mu kigabane - ubuja ntibwari bushingiye ahanini ku vyerekeye idini, uburezi, canke ingamba za gisirikare, ahubwo bwari bushingiye ku gutanga umutekano no kugabanya ingorane z’umuntu ku giti ciwe mu bidukikije vy’akaga bisanzwe aho ubuzima bwari butamenyekana.
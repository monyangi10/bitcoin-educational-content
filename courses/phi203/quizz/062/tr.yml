question: Metne göre kölelik, antik toplumlarda ekonomik üretimin ötesinde hangi temel işleve hizmet ediyordu?
answer: Tehlikeli bir dünyada çalışanlar için sosyal sigorta ve güvenlik sağladı
wrong_answers:
  - Topluluklarda dini hiyerarşiler ve ruhani düzen kurdu
  - Bilginin gelecek nesillere aktarılması için eğitim sistemleri oluşturdu
  - Düşmanlara karşı askeri stratejiler ve savunma tahkimatları geliştirdi
explanation: |
  Metne göre kölelik, sürekli güvensizliğin hüküm sürdüğü eski toplumlarda bir tür sosyal sigorta işlevi görüyordu. Bazı işçiler için bu statü, tehlikeli faaliyetlerde hayatlarını günlük olarak riske atmadan üretime katkıda bulunmalarını sağlıyordu. Diğer seçenekler, bölümde bahsedilmeyen işlevleri tanımladıkları için yanlıştır - kölelik öncelikle din, eğitim veya askeri strateji ile ilgili değil, daha ziyade hayatta kalmanın belirsiz olduğu, doğası gereği tehlikeli bir ortamda güvenlik sağlamak ve bireysel riski azaltmakla ilgiliydi.
question: Apa fungsi utama perbudakan selain produksi ekonomi dalam masyarakat kuno menurut teks?
answer: Ini memberikan asuransi sosial dan keamanan bagi para pekerja di dunia yang berbahaya
wrong_answers:
  - Hal ini membentuk hirarki agama dan tatanan spiritual dalam masyarakat
  - Menciptakan sistem pendidikan untuk mentransmisikan pengetahuan kepada generasi mendatang
  - Ini mengembangkan strategi militer dan benteng pertahanan melawan musuh
explanation: |
  Menurut teks tersebut, perbudakan berfungsi sebagai bentuk asuransi sosial dalam masyarakat kuno yang ditandai dengan ketidakamanan permanen. Bagi pekerja tertentu, status ini memungkinkan mereka untuk berkontribusi pada produksi tanpa harus mempertaruhkan nyawa mereka dalam kegiatan berbahaya. Pilihan lain tidak benar karena menggambarkan fungsi yang tidak disebutkan dalam bab ini - perbudakan tidak terutama tentang agama, pendidikan, atau strategi militer, tetapi lebih pada memberikan keamanan dan mengurangi risiko individu di lingkungan yang secara inheren berbahaya di mana kelangsungan hidup tidak pasti.
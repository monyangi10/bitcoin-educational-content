question: Millist peamist funktsiooni teenis orjapidamine lisaks majanduslikule tootmisele antiikühiskondades teksti kohaselt?
answer: See pakkus töötajatele sotsiaalkindlustust ja turvalisust ohtlikus maailmas
wrong_answers:
  - See kehtestas religioossed hierarhiad ja vaimse korra kogukondades
  - See lõi haridussüsteemid teadmiste edasiandmiseks tulevastele põlvkondadele
  - Ta töötas välja sõjalised strateegiad ja kaitsekindlustused vaenlaste vastu
explanation: |
  Teksti kohaselt oli orjapidamine sotsiaalse kindlustuse vormiks antiikühiskondades, mida iseloomustas pidev ebakindlus. Teatud töölistele võimaldas see staatus anda oma panuse tootmisse, ilma et nad igapäevaselt riskiksid oma eluga ohtlikus tegevuses. Teised valikud on valed, sest need kirjeldavad funktsioone, mida peatükis ei mainita - orjapidamine ei olnud eelkõige seotud religiooni, hariduse või sõjalise strateegiaga, vaid pigem turvalisuse tagamisega ja individuaalse riski vähendamisega olemuslikult ohtlikus keskkonnas, kus ellujäämine oli ebakindel.
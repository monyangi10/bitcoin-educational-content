question: 本文によれば、奴隷制度は古代社会において、経済生産以外にどのような主要な機能を果たしていたのか？
answer: 危険な世界で働く労働者に社会保険と保障を提供した。
wrong_answers:
  - 宗教的ヒエラルキーと精神的秩序を共同体に確立した。
  - 後世に知識を伝えるための教育システムを構築した。
  - 敵に対する軍事戦略や防衛要塞を開発した。
explanation: |
  本文によれば、奴隷制度は、恒常的な不安のある古代社会における社会保険の一形態として機能していた。特定の労働者にとっては、この身分によって、日常的に危険な活動で命を危険にさらすことなく、生産に貢献することができた。奴隷制度は宗教、教育、軍事戦略が主な目的ではなく、生存が不確かな本質的に危険な環境において、安全を提供し、個人のリスクを軽減することが目的だった。
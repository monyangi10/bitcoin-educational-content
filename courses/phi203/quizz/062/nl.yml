question: Welke primaire functie had slavernij volgens de tekst naast economische productie in samenlevingen in de oudheid?
answer: Het bood sociale verzekering en zekerheid voor arbeiders in een gevaarlijke wereld
wrong_answers:
  - Het vestigde religieuze hiërarchieën en spirituele orde in gemeenschappen
  - Het creëerde onderwijssystemen om kennis over te dragen aan toekomstige generaties
  - Het ontwikkelde militaire strategieën en verdedigingswerken tegen vijanden
explanation: |
  Volgens de tekst diende slavernij als een vorm van sociale verzekering in oude samenlevingen die gekenmerkt werden door permanente onzekerheid. Voor bepaalde arbeiders stelde deze status hen in staat om bij te dragen aan de productie zonder dagelijks hun leven te riskeren in gevaarlijke activiteiten. De andere opties zijn onjuist omdat ze functies beschrijven die niet in het hoofdstuk worden genoemd - slavernij had niet in de eerste plaats te maken met religie, onderwijs of militaire strategie, maar eerder met het bieden van veiligheid en het verminderen van individuele risico's in een inherent gevaarlijke omgeving waar overleven onzeker was.
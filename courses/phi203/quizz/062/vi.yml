question: Theo văn bản, chế độ nô lệ phục vụ chức năng chính nào khác ngoài sản xuất kinh tế trong các xã hội cổ đại?
answer: Nó cung cấp bảo hiểm xã hội và an ninh cho người lao động trong một thế giới đầy nguy hiểm.
wrong_answers:
  - Nó thiết lập hệ thống cấp bậc tôn giáo và trật tự tinh thần trong cộng đồng.
  - Nó đã tạo ra các hệ thống giáo dục để truyền đạt kiến thức cho các thế hệ tương lai.
  - Nó đã phát triển các chiến lược quân sự và công sự phòng thủ chống lại kẻ thù.
explanation: |
  Theo văn bản, chế độ nô lệ đóng vai trò như một hình thức bảo hiểm xã hội trong các xã hội cổ đại vốn đặc trưng bởi sự bất ổn thường trực. Đối với một số người lao động, địa vị này cho phép họ đóng góp vào sản xuất mà không phải mạo hiểm tính mạng hàng ngày trong các hoạt động nguy hiểm. Các lựa chọn khác không chính xác vì chúng mô tả các chức năng không được đề cập trong chương - chế độ nô lệ không chủ yếu liên quan đến tôn giáo, giáo dục hay chiến lược quân sự, mà là nhằm cung cấp sự an toàn và giảm thiểu rủi ro cá nhân trong một môi trường vốn dĩ nguy hiểm, nơi sự sống còn không chắc chắn.
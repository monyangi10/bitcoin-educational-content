question: ฟังก์ชันหลักที่การเป็นทาสให้บริการนอกเหนือจากการผลิตทางเศรษฐกิจในสังคมโบราณตามข้อความคืออะไร?
answer: มันให้การประกันสังคมและความปลอดภัยสำหรับคนงานในโลกที่เต็มไปด้วยอันตราย
wrong_answers:
  - มันได้สถาปนาลำดับชั้นทางศาสนาและระเบียบทางจิตวิญญาณในชุมชน
  - มันสร้างระบบการศึกษาเพื่อถ่ายทอดความรู้ให้กับคนรุ่นต่อไป
  - มันพัฒนากลยุทธ์ทางทหารและป้อมปราการป้องกันศัตรู
explanation: |
  ตามข้อความ การมีทาสทำหน้าที่เป็นรูปแบบหนึ่งของการประกันสังคมในสังคมโบราณที่มีความไม่มั่นคงถาวร สำหรับคนงานบางคน สถานะนี้ทำให้พวกเขาสามารถมีส่วนร่วมในการผลิตโดยไม่ต้องเสี่ยงชีวิตในกิจกรรมที่อันตรายทุกวัน ตัวเลือกอื่นๆ ไม่ถูกต้องเนื่องจากอธิบายถึงหน้าที่ที่ไม่ได้กล่าวถึงในบทนี้ - การมีทาสไม่ได้เกี่ยวกับศาสนา การศึกษา หรือกลยุทธ์ทางทหารเป็นหลัก แต่เป็นเรื่องของการให้ความปลอดภัยและลดความเสี่ยงส่วนบุคคลในสภาพแวดล้อมที่อันตรายโดยเนื้อแท้ซึ่งการอยู่รอดไม่แน่นอน
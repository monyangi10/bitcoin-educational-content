question: Jaką podstawową funkcję, poza produkcją ekonomiczną, pełniło niewolnictwo w starożytnych społeczeństwach?
answer: Zapewniał ubezpieczenie społeczne i bezpieczeństwo pracownikom w niebezpiecznym świecie
wrong_answers:
  - Ustanowił hierarchie religijne i duchowy porządek w społecznościach
  - Stworzyła systemy edukacyjne do przekazywania wiedzy przyszłym pokoleniom
  - Opracowała strategie wojskowe i fortyfikacje obronne przeciwko wrogom
explanation: |
  Zgodnie z tekstem, niewolnictwo służyło jako forma ubezpieczenia społecznego w starożytnych społeczeństwach charakteryzujących się stałą niepewnością. W przypadku niektórych pracowników status ten pozwalał im przyczyniać się do produkcji bez codziennego ryzykowania życia w niebezpiecznych czynnościach. Pozostałe opcje są nieprawidłowe, ponieważ opisują funkcje niewymienione w rozdziale - niewolnictwo nie dotyczyło przede wszystkim religii, edukacji czy strategii wojskowej, ale raczej zapewnienia bezpieczeństwa i zmniejszenia indywidualnego ryzyka w z natury niebezpiecznym środowisku, w którym przetrwanie było niepewne.
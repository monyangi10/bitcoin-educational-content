question: Que evolução histórica descreve o texto relativamente à atividade económica humana desde as sociedades primitivas até à produção moderna?
answer: As sociedades evoluíram da recolha passiva através da caça, pesca e recolha para a criação ativa de novas utilidades e serviços
wrong_answers:
  - As sociedades evoluíram da agricultura individual de subsistência para a manufatura industrial em grande escala e para a produção em massa
  - A atividade humana evoluiu dos sistemas de troca direta para a troca monetária e, eventualmente, para mercados financeiros complexos
  - O desenvolvimento económico passou da propriedade comunal para a propriedade privada e depois para as estruturas empresariais
explanation: |
  O texto descreve especificamente a produção como uma conquista histórica, explicando que as sociedades humanas primitivas se limitavam a recolher os recursos existentes através da caça, da pesca e da recolha, com uma atividade produtiva mínima. A transição fundamental foi passar desta recolha passiva para a produção ativa, que o texto define como a criação de novas utilidades e a prestação de serviços aos outros ou a si próprio. Isto representa uma mudança fundamental da simples recolha do que a natureza fornecia para a criação ativa de valor e utilidade que não existiam anteriormente.
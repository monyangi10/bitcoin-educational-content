question: Quelle progression historique le texte décrit-il en ce qui concerne l'activité économique humaine, depuis les premières sociétés jusqu'à la production moderne ?
answer: Les sociétés sont passées de la collecte passive par la chasse, la pêche et la cueillette à la création active de nouveaux services
wrong_answers:
  - Les sociétés sont passées de l'agriculture de subsistance individuelle à la fabrication industrielle à grande échelle et à la production de masse
  - L'activité humaine est passée des systèmes de troc à l'échange monétaire, puis à des marchés financiers complexes
  - Le développement économique est passé de la propriété communale à la propriété privée, puis aux structures d'entreprise
explanation: |
  Le texte décrit spécifiquement la production comme une conquête historique, expliquant que les premières sociétés humaines étaient limitées à la collecte des ressources existantes par la chasse, la pêche et la cueillette, avec une activité productive minimale. La transition essentielle a consisté à passer de cette collecte passive à une production active, que le texte définit comme la création d'une nouvelle utilité et la fourniture de services aux autres ou à soi-même. Il s'agit d'un changement fondamental qui consiste à passer de la simple récolte des ressources naturelles à la création active d'une valeur et d'une utilité qui n'existaient pas auparavant.
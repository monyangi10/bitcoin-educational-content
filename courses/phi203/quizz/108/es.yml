question: ¿Qué progresión histórica describe el texto en relación con la actividad económica humana desde las sociedades primitivas hasta la producción moderna?
answer: Las sociedades evolucionaron de la recolección pasiva mediante la caza, la pesca y la recolección a la creación activa de nuevas utilidades y servicios
wrong_answers:
  - Las sociedades pasaron de la agricultura de subsistencia individual a la fabricación industrial a gran escala y la producción en masa
  - La actividad humana pasó de los sistemas de trueque al intercambio monetario y, finalmente, a los complejos mercados financieros
  - El desarrollo económico pasó de la propiedad comunal a la propiedad privada y luego a las estructuras empresariales
explanation: |
  El texto describe específicamente la producción como una conquista histórica, explicando que las primeras sociedades humanas se limitaban a recolectar los recursos existentes mediante la caza, la pesca y la recolección, con una actividad productiva mínima. La transición clave fue pasar de esta recolección pasiva a la producción activa, que el texto define como la creación de nuevas utilidades y la prestación de servicios a otros o a uno mismo. Esto representa un cambio fundamental: de limitarse a recolectar lo que la naturaleza proporcionaba se pasó a crear activamente un valor y una utilidad que antes no existían.
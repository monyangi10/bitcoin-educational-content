question: According to the text, how did Turgot's fight for freedom of labour and Bastiat's fight for free trade function as explicitly pro-poor liberal policies?
answer: Turgot aimed to let everyone earn a living from their work, including women excluded from male guilds; Bastiat argued free trade maximises the worker's satisfaction while protectionism raises the price of every commodity he needs
wrong_answers:
  - Both argued that poverty was a temporary phase of industrialisation that would disappear automatically once markets were fully deregulated
  - Both focused on the interests of the middle class as the engine of growth that would eventually lift the poor through trickle-down effects
  - Both prioritised the rights of property owners, reasoning that secure property rights would attract the investment needed to create jobs for the poor
explanation: |
  Liberal writers did not ignore poverty — they addressed it directly through liberal solutions. Turgot's fight for freedom of labour aimed precisely at enabling everyone to make a living from their work, including the women excluded from male guilds. Bastiat, in the nineteenth century, led his fight for free trade explicitly for the poor, since free trade allows the worker to derive maximum satisfaction from his daily labour, while protectionism raises the price of every commodity he needs. These thinkers proposed solutions founded on freedom, contract, human sympathy, and voluntary association.

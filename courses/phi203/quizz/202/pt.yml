question: De acordo com a análise de Bastiat em "Les Harmonies économiques", o que distingue a natureza dos interesses numa sociedade liberal da natureza dos interesses nas sociedades primitivas?
answer: Nas sociedades liberais, os interesses são harmoniosos através de trocas voluntárias em que ambas as partes beneficiam, ao contrário das sociedades primitivas em que os interesses eram genuinamente antagónicos devido à competição de soma zero por recursos limitados
wrong_answers:
  - As sociedades liberais criam antagonismos mais complexos entre classes, enquanto as sociedades primitivas tinham conflitos mais simples mas mais diretos sobre as necessidades imediatas de sobrevivência
  - As sociedades liberais suprimem os instintos competitivos naturais através da regulamentação, enquanto as sociedades primitivas permitem a livre expressão de interesses contraditórios através do confronto direto
  - As sociedades liberais transformam interesses antagónicos em interesses cooperativos através da intervenção do governo, enquanto as sociedades primitivas não dispunham de mecanismos institucionais para resolver conflitos
explanation: |
  Bastiat argumenta que a troca voluntária nas sociedades liberais cria benefícios mútuos, tornando os interesses harmoniosos em vez de conflituosos. Contrasta esta situação com a das sociedades primitivas, onde a escassez genuína (como duas tribos que competem pelo mesmo terreno de caça) criava verdadeiros antagonismos. As respostas erradas deturpam a sua teoria, sugerindo o conflito de classes, a supressão regulamentar ou a intervenção governamental como factores-chave, quando Bastiat sublinha que a harmonia emerge naturalmente das relações voluntárias de mercado sem coerção.
question: Menurut analisis Bastiat dalam 'Les Harmonies économiques', apa yang membedakan sifat kepentingan dalam masyarakat liberal dengan masyarakat primitif?
answer: Dalam masyarakat liberal, kepentingan-kepentingan dapat diselaraskan melalui pertukaran sukarela di mana kedua belah pihak diuntungkan, tidak seperti masyarakat primitif di mana kepentingan-kepentingan yang ada benar-benar bertentangan karena persaingan zero-sum untuk sumber daya yang terbatas
wrong_answers:
  - Masyarakat liberal menciptakan antagonisme yang lebih kompleks antara kelas-kelas, sementara masyarakat primitif memiliki konflik yang lebih sederhana tetapi lebih langsung atas kebutuhan untuk bertahan hidup
  - Masyarakat liberal menekan naluri kompetitif alami melalui regulasi, sementara masyarakat primitif mengizinkan ekspresi bebas dari kepentingan yang saling bertentangan melalui konfrontasi langsung
  - Masyarakat liberal mengubah kepentingan antagonis menjadi kepentingan kooperatif melalui intervensi pemerintah, sementara masyarakat primitif tidak memiliki mekanisme institusional untuk menyelesaikan konflik
explanation: |
  Bastiat berpendapat bahwa pertukaran sukarela dalam masyarakat liberal menciptakan keuntungan bersama, membuat kepentingan-kepentingan menjadi harmonis dan bukannya saling bertentangan. Ia membandingkan hal ini dengan masyarakat primitif di mana kelangkaan yang nyata (seperti dua suku yang bersaing untuk mendapatkan tempat berburu yang sama) menciptakan antagonisme yang nyata. Jawaban yang salah menggambarkan teorinya dengan menyatakan konflik kelas, penindasan peraturan, atau intervensi pemerintah sebagai faktor kunci, padahal Bastiat menekankan bahwa keharmonisan muncul secara alami dari hubungan pasar yang bersifat sukarela tanpa paksaan.
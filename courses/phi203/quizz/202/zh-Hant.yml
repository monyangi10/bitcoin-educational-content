question: 根據 Bastiat 在「Les Harmonies économiques」中的分析，自由社會與原始社會的利益本質有何差異？
answer: 在自由社會中，利益是透過自願交換而達到和諧，雙方都能受惠，不像原始社會，由於對有限資源的零和競爭，利益是真正對立的。
wrong_answers:
  - 自由社會造成階級間更複雜的對立，而原始社會則有更簡單但更直接的衝突，以滿足眼前的生存需求。
  - 自由社會透過規範來壓制自然的競爭本能，而原始社會則允許透過直接對抗自由表達相互衝突的利益
  - 自由社會透過政府干預將對立的利益轉化為合作的利益，而原始社會則缺乏解決衝突的制度機制。
explanation: |
  巴斯蒂亞認為，自由社會中的自願交換創造了互惠互利，使利益和諧而非衝突。他將此與原始社會做了對比，在原始社會中，真正的稀缺性（如兩個部落競爭同一個狩獵場）造成了真正的對立。錯誤的答案歪曲了他的理論，認為階級衝突、管制壓制或政府干預是關鍵因素，而巴斯蒂亞強調和諧會在自願的市場關係中自然產生，不需要強制。
question: بر اساس تحلیل بَستیا در 'Les Harmonies économiques'، چه چیزی ماهیت منافع در یک جامعه لیبرال را از جوامع ابتدایی متمایز می‌کند؟
answer: در جوامع لیبرال، منافع از طریق مبادله داوطلبانه که هر دو طرف از آن سود می‌برند، هماهنگ است، برخلاف جوامع ابتدایی که منافع به دلیل رقابت صفر-جمع برای منابع محدود واقعاً متضاد بودند.
wrong_answers:
  - جوامع لیبرال تضادهای پیچیده‌تری بین طبقات ایجاد می‌کنند، در حالی که جوامع ابتدایی‌تر دارای درگیری‌های ساده‌تر اما مستقیم‌تری بر سر نیازهای فوری بقا بودند.
  - جوامع لیبرال با استفاده از مقررات، غرایز رقابتی طبیعی را سرکوب می‌کنند، در حالی که جوامع ابتدایی اجازه می‌دادند تا منافع متضاد از طریق رویارویی مستقیم به طور آزادانه ابراز شوند.
  - جوامع لیبرال منافع متضاد را از طریق مداخله دولت به منافع تعاونی تبدیل می‌کنند، در حالی که جوامع ابتدایی فاقد مکانیسم‌های نهادی برای حل و فصل اختلافات بودند.
explanation: |
  باستیا استدلال می‌کند که مبادله داوطلبانه در جوامع لیبرال باعث ایجاد منفعت متقابل می‌شود و منافع را هماهنگ می‌کند نه متضاد. او این را با جوامع ابتدایی مقایسه می‌کند که در آن کمبود واقعی (مانند دو قبیله که برای همان زمین شکار رقابت می‌کنند) باعث ایجاد تضادهای واقعی می‌شد. پاسخ‌های نادرست نظریه او را با پیشنهاد تضاد طبقاتی، سرکوب نظارتی یا مداخله دولت به عنوان عوامل کلیدی نادرست نشان می‌دهند، در حالی که باستیا تأکید می‌کند که هماهنگی به طور طبیعی از روابط بازار داوطلبانه بدون اجبار پدید می‌آید.
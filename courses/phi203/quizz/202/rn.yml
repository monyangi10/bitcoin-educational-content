question: Dushingiye ku nseguro ya Bastiat mu gitabu ciwe ‘Les Harmonies économiques’, ni igiki gitandukanya kamere y’inyungu mu kibano c’ubwigenge n’izo mu bibano vya kera?
answer: Mu mibano y’ubwigenge, inyungu zirahuye biciye mu guhanahana ku bushake aho impande zompi zironka inyungu, bitandukanye n’imibano ya kera aho inyungu zari zirwanya vy’ukuri kubera uguhiganwa kw’amahera ataco amaze kubera ubutunzi buke .
wrong_answers:
  - Imiryango y’ubwigenge irema ububisha bukomeye hagati y’imigwi mu gihe imiryango ya kera yari ifise amakimbirane yoroshe ariko ataziguye ku bijanye n’ivyo umuntu akeneye kugira ngo ashobore kurokoka vuba .
  - Imiryango y'ubwigenge irahagarika kamere z'uguhiganwa biciye mu mategeko mu gihe imiryango ya kera yemerera guserura inyungu zitandukanye biciye mu guhangana ata guca ku ruhande .
  - Imiryango y'ubwigenge ihindura inyungu z'abansi zikaba iz'ubufatanye biciye mu gufasha kwa Leta mu gihe imiryango ya kera yari ibuze uburyo bwo gutorera umuti amakimbirane .
explanation: |
  Bastiat avuga ko uguhanahana amakuru ku bushake mu bihugu vy’ubwigenge bituma haba inyungu ku bantu bose, bikaba bituma inyungu zihuza aho guhushanya. Ivyo abigereranya n’imibano ya kera aho ubukene nyakuri (nk’imiryango ibiri ihiganwa ku kibanza kimwe co guhigira) vyatuma haba ububisha nyakuri. Inyishu zitari zo ziserura nabi inyigisho yiwe mu gutanga iciyumviro c’uko amakimbirane yo mu migwi, uguhagarika amategeko, canke ukuntu Leta igira ico ikoze ari vyo bituma umuntu agira ico akora, igihe Bastiat ashimika ku vy’uko uguhuza biva mu buryo busanzwe mu migenderanire y’isoko y’ubushake ata guhatirwa.
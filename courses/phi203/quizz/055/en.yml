question: According to Aristotle's observation mentioned in the text, what was the primary reason slavery existed in ancient societies?
answer: There were no machines available to replace human labor
wrong_answers:
  - There were too many prisoners of war to manage
  - Religious beliefs required the practice of slavery
  - Economic inequality was considered natural and permanent
explanation: |
  Aristotle specifically observed that slavery existed because there were no machines to perform the work that slaves did. He noted that if production could have been mechanized, society could have dispensed with slaves. This insight highlights how technological limitations in ancient times made human labor, even forced labor, essential for basic production needs. The other options, while potentially factors in some historical contexts, do not represent Aristotle's specific reasoning about the fundamental economic necessity that drove the institution of slavery in ancient societies.

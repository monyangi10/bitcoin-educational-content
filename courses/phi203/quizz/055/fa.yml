question: طبقاً به مشاهده ارسطو که در متن ذکر شده است، دلیل اصلی وجود برده‌داری در جوامع باستانی چه بود؟
answer: هیچ ماشینی برای جایگزینی نیروی کار انسانی در دسترس نبود
wrong_answers:
  - زندانیان جنگی زیادی برای مدیریت وجود داشتند
  - اعتقادات مذهبی نیازمند به کارگیری برده‌داری بود
  - نابرابری اقتصادی طبیعی و دائمی تلقی می‌شد
explanation: |
  ارسطو به‌طور خاص مشاهده کرد که برده‌داری وجود داشت زیرا هیچ ماشینی برای انجام کارهایی که بردگان انجام می‌دادند وجود نداشت. او اشاره کرد که اگر تولید می‌توانست مکانیزه شود، جامعه می‌توانست از بردگان صرف‌نظر کند. این بینش نشان می‌دهد که چگونه محدودیت‌های فناوری در زمان‌های باستان، کار انسانی، حتی کار اجباری، را برای نیازهای اساسی تولید ضروری می‌کرد. گزینه‌های دیگر، اگرچه ممکن است در برخی زمینه‌های تاریخی عوامل مؤثری باشند، اما نمایانگر استدلال خاص ارسطو درباره ضرورت اقتصادی بنیادی که نهاد برده‌داری را در جوامع باستانی به حرکت درآورد، نیستند.
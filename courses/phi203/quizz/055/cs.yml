question: Co bylo podle Aristotelova pozorování uvedeného v textu hlavním důvodem existence otroctví ve starověkých společnostech?
answer: Nebyly k dispozici stroje, které by nahradily lidskou práci
wrong_answers:
  - Válečných zajatců bylo příliš mnoho na to, aby je bylo možné zvládnout
  - Náboženské přesvědčení vyžadovalo praktikování otroctví
  - Ekonomická nerovnost byla považována za přirozenou a trvalou
explanation: |
  Aristoteles konkrétně poznamenal, že otroctví existovalo, protože neexistovaly stroje, které by vykonávaly práci, kterou vykonávali otroci. Poznamenal, že kdyby bylo možné výrobu mechanizovat, společnost by se mohla zbavit otroků. Tento postřeh zdůrazňuje, jak technologická omezení ve starověku způsobila, že lidská práce, dokonce i nucená práce, byla nezbytná pro základní výrobní potřeby. Ostatní možnosti, ačkoli jsou v některých historických souvislostech potenciálními faktory, nepředstavují Aristotelovu specifickou úvahu o základní ekonomické nutnosti, která vedla k instituci otroctví ve starověkých společnostech.
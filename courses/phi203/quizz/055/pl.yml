question: Zgodnie z obserwacją Arystotelesa wspomnianą w tekście, jaki był główny powód istnienia niewolnictwa w starożytnych społeczeństwach?
answer: Nie było dostępnych maszyn, które mogłyby zastąpić ludzką pracę
wrong_answers:
  - Było zbyt wielu jeńców wojennych do zarządzania
  - Przekonania religijne wymagały praktyki niewolnictwa
  - Nierówność ekonomiczna była uważana za naturalną i trwałą
explanation: |
  Arystoteles zauważył, że niewolnictwo istniało, ponieważ nie było maszyn do wykonywania pracy, którą wykonywali niewolnicy. Zauważył, że gdyby produkcja mogła zostać zmechanizowana, społeczeństwo mogłoby zrezygnować z niewolników. To spostrzeżenie podkreśla, w jaki sposób ograniczenia technologiczne w czasach starożytnych sprawiły, że praca ludzka, nawet praca przymusowa, była niezbędna do zaspokojenia podstawowych potrzeb produkcyjnych. Inne opcje, choć potencjalnie istotne w niektórych kontekstach historycznych, nie reprezentują konkretnego rozumowania Arystotelesa na temat fundamentalnej konieczności ekonomicznej, która napędzała instytucję niewolnictwa w starożytnych społeczeństwach.
question: 本文中で言及されたアリストテレスの観察によれば、古代社会に奴隷制が存在した主な理由は何だったのか？
answer: 人間の労働力を代替する機械がなかった
wrong_answers:
  - 捕虜が多すぎて管理しきれなかった
  - 宗教的信念が奴隷制の実践を求めた
  - 経済的不平等は自然で永久的なものと考えられていた
explanation: |
  アリストテレスは、奴隷制度が存在したのは、奴隷が行う仕事をこなす機械がなかったからだと指摘した。もし生産が機械化されていれば、社会は奴隷を必要としなかっただろう、と。この洞察は、古代における技術的な限界が、基本的な生産の必要性にとって、強制労働であっても人間による労働を不可欠なものにしていたことを浮き彫りにしている。他の選択肢は、歴史的文脈によっては要因になりうるものの、古代社会における奴隷制度の原動力となった基本的な経済的必要性に関するアリストテレスの具体的な推論を示すものではない。
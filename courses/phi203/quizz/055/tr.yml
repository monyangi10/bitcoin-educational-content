question: Aristoteles'in metinde bahsedilen gözlemine göre, eski toplumlarda köleliğin var olmasının temel nedeni neydi?
answer: İnsan emeğinin yerini alabilecek makineler yoktu
wrong_answers:
  - İdare edilemeyecek kadar çok savaş esiri vardı
  - Dini inançlar köleliğin uygulanmasını gerektiriyordu
  - Ekonomik eşitsizlik doğal ve kalıcı olarak kabul edildi
explanation: |
  Aristoteles köleliğin, kölelerin yaptığı işi yapacak makineler olmadığı için var olduğunu özellikle gözlemlemiştir. Üretim makineleştirilebilseydi, toplumun kölelerden vazgeçebileceğini belirtmiştir. Bu içgörü, antik çağlardaki teknolojik sınırlamaların insan emeğini, hatta zorla çalıştırmayı temel üretim ihtiyaçları için nasıl gerekli kıldığını vurgulamaktadır. Diğer seçenekler, bazı tarihsel bağlamlarda potansiyel faktörler olsa da, Aristoteles'in eski toplumlarda kölelik kurumunu yönlendiren temel ekonomik gereklilik hakkındaki özel muhakemesini temsil etmemektedir.
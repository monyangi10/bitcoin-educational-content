question: 根據文中提到的亞里斯多德的觀察，古代社會中奴隸制存在的主要原因是什麼？
answer: 當時沒有機器可以取代人力
wrong_answers:
  - 有太多戰俘需要管理
  - 宗教信仰要求實行奴隸制
  - 經濟不平等被認為是自然和永恆的
explanation: |
  亞里斯多德特別指出，奴隸制之所以存在，是因為當時沒有機器來完成奴隸所做的工作。他指出，如果生產可以機械化，社會就可以免除奴隸。這一見解強調了古代的技術限制如何使人類勞動，甚至是強迫勞動，成為基本生產需求的必要條件。其他選擇儘管在某些歷史背景下可能是因素，但並不代表亞里斯多德對古代社會驅使奴隸制度的基本經濟必要性的具體推理。
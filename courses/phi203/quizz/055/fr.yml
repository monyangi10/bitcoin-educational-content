question: Selon l'observation d'Aristote mentionnée dans le texte, quelle était la principale raison de l'existence de l'esclavage dans les sociétés anciennes ?
answer: Il n'y avait pas de machines disponibles pour remplacer le travail humain
wrong_answers:
  - Les prisonniers de guerre étaient trop nombreux pour être gérés
  - Les croyances religieuses imposaient la pratique de l'esclavage
  - L'inégalité économique était considérée comme naturelle et permanente
explanation: |
  Aristote a spécifiquement observé que l'esclavage existait parce qu'il n'y avait pas de machines pour effectuer le travail des esclaves. Il a fait remarquer que si la production avait pu être mécanisée, la société aurait pu se passer d'esclaves. Cette constatation met en évidence le fait que les limitations technologiques de l'Antiquité ont rendu le travail humain, même le travail forcé, essentiel pour répondre aux besoins de production de base. Les autres options, bien qu'elles puissent être des facteurs potentiels dans certains contextes historiques, ne représentent pas le raisonnement spécifique d'Aristote sur la nécessité économique fondamentale qui a conduit à l'institution de l'esclavage dans les sociétés anciennes.
question: Kulingana na uchunguzi wa Aristotle uliotajwa katika maandishi, ni sababu gani kuu ya utumwa kuwepo katika jamii za kale?
answer: Hakukuwa na mashine zozote za kuchukua nafasi ya kazi ya binadamu
wrong_answers:
  - Kulikuwa na wafungwa wengi sana wa vita kuwadhibiti
  - Imani za kidini zilihitaji utumwa
  - Ukosefu wa usawa wa kiuchumi ulizingatiwa kuwa wa asili na wa kudumu
explanation: |
  Aristotle aliona haswa kwamba utumwa ulikuwepo kwa sababu hakukuwa na mashine za kufanya kazi ambayo watumwa walifanya. Alibainisha kuwa kama uzalishaji ungeweza kuendeshwa kwa mashine, jamii ingeweza kuwaondoa watumwa. Ufahamu huu unaangazia jinsi mapungufu ya kiteknolojia katika nyakati za kale yalivyofanya kazi ya binadamu, hata kazi ya kulazimishwa, kuwa muhimu kwa mahitaji ya msingi ya uzalishaji. Chaguzi zingine, ingawa zinaweza kuwa sababu katika baadhi ya miktadha ya kihistoria, haziwakilishi hoja maalum ya Aristotle kuhusu umuhimu wa msingi wa kiuchumi uliosababisha utumwa katika jamii za kale.
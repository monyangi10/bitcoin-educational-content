question: Ifølge Aristoteles' observasjon som er nevnt i teksten, hva var den viktigste grunnen til at slaveri eksisterte i antikkens samfunn?
answer: Det fantes ingen maskiner som kunne erstatte menneskelig arbeidskraft
wrong_answers:
  - Det var for mange krigsfanger å håndtere
  - Religiøs tro krevde praktisering av slaveri
  - Økonomisk ulikhet ble ansett som naturlig og permanent
explanation: |
  Aristoteles observerte spesifikt at slaveriet eksisterte fordi det ikke fantes maskiner til å utføre det arbeidet som slavene gjorde. Han bemerket at hvis produksjonen kunne ha blitt mekanisert, kunne samfunnet ha sluppet slaver. Denne innsikten understreker hvordan teknologiske begrensninger i antikken gjorde menneskelig arbeidskraft, til og med tvangsarbeid, nødvendig for å dekke grunnleggende produksjonsbehov. De andre alternativene, selv om de potensielt kan være faktorer i noen historiske sammenhenger, representerer ikke Aristoteles' spesifikke resonnementer om den grunnleggende økonomiske nødvendigheten som lå til grunn for slaveriet i antikkens samfunn.
question: Согласно наблюдениям Аристотеля, упомянутым в тексте, какова была основная причина существования рабства в древних обществах?
answer: Не было машин, способных заменить человеческий труд
wrong_answers:
  - Военнопленных было слишком много, чтобы управлять ими
  - Религиозные убеждения требовали рабства
  - Экономическое неравенство считалось естественным и постоянным
explanation: |
  Аристотель заметил, что рабство существовало потому, что не было машин для выполнения работы, которую выполняли рабы. Он отметил, что если бы производство можно было механизировать, то общество могло бы обойтись без рабов. Эта мысль подчеркивает, что технологические ограничения в древности делали человеческий труд, даже принудительный, необходимым для удовлетворения основных производственных потребностей. Другие варианты, хотя и являются потенциальными факторами в некоторых исторических контекстах, не отражают конкретных рассуждений Аристотеля о фундаментальной экономической необходимости, которая определяла институт рабства в древних обществах.
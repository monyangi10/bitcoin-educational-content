question: Koju je fundamentalnu promenu uvelo rađanje poljoprivrede koja je stvorila uslove za individualnu slobodu?
answer: Uvelo je mirnodopsku proizvodnju i omogućilo akumulaciju viška
wrong_answers:
  - Eliminisalo je potrebu za kolektivnom organizacijom u društvima
  - Stvorilo je velike teritorije pogodne za privatno vlasništvo nad imovinom
  - Smanjilo je nesigurnost proizvodnje kroz tehnike lova
explanation: |
  Rođenje poljoprivrede bilo je značajna prekretnica jer je uvelo mirne metode proizvodnje i omogućilo akumulaciju viška dobara. Ovo stvaranje viška bilo je ključno jer je pružilo osnovu za komercijalne razmene i ugovorne odnose zasnovane na međusobnom dogovoru, a ne na sili. Pogrešni odgovori pogrešno predstavljaju uticaj poljoprivredne revolucije: kolektivna organizacija je ostala neophodna, poljoprivreda je zapravo učinila manje teritorije pogodnim za privatno vlasništvo (ne veće), i poljoprivreda je zamenila lov umesto da poboljša tehnike lova.
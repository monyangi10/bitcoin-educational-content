question: Minkä perustavanlaatuisen muutoksen maanviljelyksen synty toi mukanaan, joka loi edellytykset yksilön vapaudelle?
answer: Se otti käyttöön rauhanomaisen tuotannon ja mahdollisti ylijäämän kertymisen
wrong_answers:
  - Se poisti tarpeen kollektiiviselle järjestäytymiselle yhteiskunnissa
  - Se loi laajoja alueita, jotka soveltuivat yksityisomistukseen
  - Se vähensi tuotannon epävarmuutta metsästystekniikoiden avulla
explanation: |
  Maatalouden synty oli merkittävä käännekohta, koska se toi mukanaan rauhanomaiset tuotantomenetelmät ja mahdollisti ylijäämähyödykkeiden kertymisen. Tämä ylijäämän luominen oli ratkaisevan tärkeää, sillä se loi perustan kaupalliselle vaihdolle ja sopimussuhteille, jotka perustuivat pikemminkin keskinäiseen sopimukseen kuin voimankäyttöön. Väärät vastaukset vääristelevät maatalouden vallankumouksen vaikutusta: kollektiivinen järjestäytyminen pysyi tarpeellisena, maatalous itse asiassa teki pienemmistä alueista yksityisomistuksen kannalta elinkelpoisia (ei suuremmista) ja maatalous korvasi metsästyksen sen sijaan, että se olisi parantanut metsästystekniikoita.
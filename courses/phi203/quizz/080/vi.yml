question: Sự ra đời của nông nghiệp đã mang lại sự thay đổi cơ bản nào, tạo điều kiện cho tự do cá nhân?
answer: Nó tạo điều kiện cho sản xuất hòa bình và cho phép tích lũy thặng dư.
wrong_answers:
  - Nó đã loại bỏ nhu cầu tổ chức tập thể trong xã hội.
  - Nó tạo ra những vùng lãnh thổ rộng lớn phù hợp cho việc sở hữu tư nhân.
  - Nó đã giảm bớt sự bấp bênh trong sản xuất thông qua các kỹ thuật săn bắn.
explanation: |
  Sự ra đời của nông nghiệp là một bước ngoặt lớn vì nó đã giới thiệu các phương pháp sản xuất hòa bình và cho phép tích lũy hàng hóa dư thừa. Việc tạo ra hàng hóa dư thừa này rất quan trọng vì nó tạo nền tảng cho các hoạt động trao đổi thương mại và các mối quan hệ hợp đồng dựa trên sự thỏa thuận lẫn nhau chứ không phải bằng vũ lực. Những câu trả lời sai đã xuyên tạc tác động của cuộc cách mạng nông nghiệp: tổ chức tập thể vẫn cần thiết, nông nghiệp thực sự giúp cho các vùng lãnh thổ nhỏ hơn có thể được sở hữu tư nhân (chứ không phải các vùng lãnh thổ lớn hơn), và nông nghiệp thay thế săn bắn chứ không phải cải thiện kỹ thuật săn bắn.
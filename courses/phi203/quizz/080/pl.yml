question: Jaką fundamentalną zmianę wprowadziły narodziny rolnictwa, które stworzyły warunki dla indywidualnej wolności?
answer: Wprowadził pokojową produkcję i pozwolił na akumulację nadwyżek
wrong_answers:
  - Wyeliminowało to potrzebę kolektywnej organizacji w społeczeństwach
  - Stworzyło to duże terytoria nadające się do prywatnej własności
  - Zmniejszyło to niepewność produkcji dzięki technikom łowieckim
explanation: |
  Narodziny rolnictwa były ważnym punktem zwrotnym, ponieważ wprowadziły pokojowe metody produkcji i umożliwiły gromadzenie nadwyżek towarów. Ta nadwyżka była kluczowa, ponieważ stanowiła podstawę wymiany handlowej i relacji umownych opartych na wzajemnym porozumieniu, a nie na sile. Błędne odpowiedzi błędnie przedstawiają wpływ rewolucji rolniczej: kolektywna organizacja pozostała niezbędna, rolnictwo w rzeczywistości sprawiło, że mniejsze terytoria stały się opłacalne dla własności prywatnej (a nie większe), a rolnictwo zastąpiło polowanie zamiast ulepszać techniki polowania.
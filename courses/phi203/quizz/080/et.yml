question: Millise põhimõttelise muutuse tõi kaasa põllumajanduse sünd, mis lõi tingimused individuaalseks vabaduseks?
answer: See kehtestas rahumeelse tootmise ja võimaldas ülejäägi kogumist
wrong_answers:
  - See kõrvaldas vajaduse kollektiivse organiseerimise järele ühiskondades
  - See lõi suured territooriumid, mis sobisid eraomandiks
  - See vähendas tootmise ebakindlust jahitehnika abil
explanation: |
  Põllumajanduse tekkimine oli oluline pöördepunkt, sest see tõi kaasa rahumeelsed tootmismeetodid ja võimaldas ülejäägi kogumist. See ülejäägi loomine oli otsustava tähtsusega, sest see pani aluse kaubavahetusele ja lepingulistele suhetele, mis põhinesid pigem vastastikusel kokkuleppel kui jõul. Väärad vastused moonutavad põllumajandusliku revolutsiooni mõju: kollektiivne organiseerimine jäi vajalikuks, põllumajandus muutis tegelikult väiksemad territooriumid eraomandi jaoks elujõuliseks (mitte suuremad) ja põllumajandus asendas pigem jahipidamise kui parandas jahipidamistehnikaid.
question: Welke fundamentele verandering bracht het ontstaan van de landbouw teweeg die de voorwaarden voor individuele vrijheid creëerde?
answer: Het introduceerde vreedzame productie en maakte accumulatie van overschotten mogelijk
wrong_answers:
  - Het elimineerde de noodzaak voor collectieve organisatie in samenlevingen
  - Het creëerde grote gebieden die geschikt waren voor privé-eigendom
  - Het verminderde de onzekerheid van de productie door jachttechnieken
explanation: |
  Het ontstaan van de landbouw was een belangrijk keerpunt omdat het vreedzame productiemethoden introduceerde en de accumulatie van surplusgoederen mogelijk maakte. Dit creëren van overschotten was cruciaal omdat het de basis legde voor commerciële uitwisselingen en contractuele relaties gebaseerd op wederzijdse overeenkomst in plaats van geweld. De verkeerde antwoorden geven een verkeerd beeld van de impact van de landbouwrevolutie: collectieve organisatie bleef nodig, landbouw maakte kleinere gebieden levensvatbaar voor privébezit (niet grotere), en landbouw verving de jacht in plaats van de jachttechnieken te verbeteren.
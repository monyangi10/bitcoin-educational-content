question: Какое фундаментальное изменение, вызванное рождением сельского хозяйства, создало условия для индивидуальной свободы?
answer: Она ввела мирное производство и позволила накапливать излишки
wrong_answers:
  - Она устранила необходимость в коллективной организации общества
  - Она создавала большие территории, пригодные для владения частной собственностью
  - Он снизил неустойчивость производства благодаря охотничьим методам
explanation: |
  Зарождение сельского хозяйства стало важным поворотным моментом, поскольку оно внедрило мирные методы производства и позволило накапливать излишки товаров. Создание излишков имело решающее значение, поскольку заложило основу для коммерческих обменов и договорных отношений, основанных на взаимном согласии, а не на силе. Неправильные ответы искажают влияние сельскохозяйственной революции: коллективная организация по-прежнему была необходима, сельское хозяйство фактически сделало меньшие территории пригодными для частной собственности (а не большие), и сельское хозяйство заменило охоту, а не улучшило методы охоты.
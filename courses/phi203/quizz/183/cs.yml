question: Jaký základní princip podle diskutované francouzské liberální tradice odlišuje negativní svobodu od pozitivní svobody z hlediska jejich vztahu k vlastnickým právům?
answer: Negativní svoboda je zakotvena ve vlastnických právech jako svoboda nevinně užívat svůj majetek, tělo a schopnosti bez vnějších překážek
wrong_answers:
  - Pozitivní svoboda je zakotvena ve vlastnických právech jako možnost získávat a hromadit hmotné statky nezbytné pro skutečnou svobodu
  - Negativní svoboda se rozchází s pojetím vlastnictví tím, že se zaměřuje spíše na absenci právních omezení než na vlastnictví hmotných statků
  - Pozitivní svoboda zachovává vlastnická práva, zatímco negativní svoboda je opouští ve prospěch kolektivního vlastnictví a sdílených zdrojů
explanation: |
  Text jasně stanoví, že negativní svoboda je hluboce zakořeněna v pojetí vlastnictví, které je definováno jako svoboda neškodně užívat svůj majetek, tělo a schopnosti bez překážek. Naproti tomu pozitivní svoboda se rozchází s vlastnickými pojmy tím, že se zaměřuje na schopnost získat žádoucí věci, což otevírá dveře socialistickému ospravedlnění státních zásahů. Toto rozlišení je zásadní, protože odklon pozitivní svobody od vlastnických práv zásadně mění pojetí svobody od sebevlastnictví ke státem garantovaným výsledkům.
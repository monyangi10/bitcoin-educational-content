question: Zgodnie z omawianą francuską tradycją liberalną, jaka podstawowa zasada odróżnia wolność negatywną od wolności pozytywnej pod względem ich relacji do praw własności?
answer: Wolność negatywna jest zakorzeniona w prawach własności jako wolność do niewinnego korzystania z własnej własności, ciała i zdolności bez zewnętrznych przeszkód
wrong_answers:
  - Wolność pozytywna jest zakotwiczona w prawach własności jako zdolność do zdobywania i gromadzenia dóbr materialnych niezbędnych do prawdziwej wolności
  - Wolność negatywna zrywa z pojęciem własności, koncentrując się na braku ograniczeń prawnych, a nie na własności dóbr materialnych
  - Wolność pozytywna utrzymuje prawa własności, podczas gdy wolność negatywna porzuca je na rzecz kolektywnej własności i wspólnych zasobów
explanation: |
  Tekst jasno stwierdza, że wolność negatywna jest głęboko zakorzeniona w koncepcjach własności, definiowanych jako wolność do nieszkodliwego korzystania z własnej własności, ciała i zdolności bez przeszkód. W przeciwieństwie do niej, wolność pozytywna zrywa z pojęciami własności, koncentrując się na zdolności do uzyskiwania pożądanych rzeczy, co otwiera drzwi do socjalistycznych uzasadnień dla interwencji państwa. Rozróżnienie to ma kluczowe znaczenie, ponieważ odejście wolności pozytywnej od praw własności zasadniczo zmienia koncepcję wolności z własności własnej na wyniki gwarantowane przez państwo.
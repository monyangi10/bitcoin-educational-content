question: Dushingiye ku migenzo y’ubwigenge bw’Abafaransa twavuganye, ni ingingo ngenderwako iyihe y’ishimikiro itandukanya umwidegemvyo mubi n’umwidegemvyo mwiza mu bijanye n’isano rifitaniye n’uburenganzira bw’itunga?
answer: Umwidegemvyo mubi ushingiye ku burenganzira bw’umutungo nk’umwidegemvyo wo gukoresha ata caha umutungo wiwe, umubiri wiwe n’ubushobozi bwiwe ata nzitizi zo hanze .
wrong_answers:
  - Umwidegemvyo mwiza ushingiye ku burenganzira bw’umutungo nk’ubushobozi bwo kuronka no kwirundanira ivy’umubiri bikenewe kugira ngo umuntu agire umwidegemvyo nyawo .
  - Umwidegemvyo mubi uca n’ivyiyumviro vy’itunga mu kwibanda ku kutagira inzitizi zitegekanijwe n’amategeko aho kwibanda ku kuba nyir’ibintu vy’umubiri .
  - Umwidegemvyo mwiza urabungabunga uburenganzira bw'umutungo mu gihe umwidegemvyo mubi ubuheba ukawushigikira ubutunzi rusangi n'ubutunzi busangiye .
explanation: |
  Ico canditswe kirerekana neza yuko umwidegemvyo mubi ushinze imizi cane mu vyiyumviro vyerekeye umutungo, ukaba usobanurwa nk’umwidegemvyo wo gukoresha umutungo w’umuntu, umubiri wiwe n’ubushobozi bwiwe ata co bimaze. Mu buryo bunyuranye, umwidegemvyo mwiza uca n’ivyiyumviro vy’itunga mu kwibanda ku bushobozi bwo kuronka ibintu vyipfuzwa, ivyo bikaba bifungura urugi rw’imvo z’abasosiyalisiti zo gufasha Leta. Iryo tandukaniro ni ngirakamaro cane kuko ukuva kw’umwidegemvyo mwiza ku burenganzira bw’umutungo bihindura cane iciyumviro c’umwidegemvyo wo kuva ku kwitunga ukaja ku ngaruka zishingiye kuri Leta.
question: Theo lý thuyết kinh tế thị trường tự do, điều gì sẽ xảy ra khi các doanh nhân dự đoán quá sớm nhu cầu của người tiêu dùng đối với một sản phẩm đổi mới chưa hề tồn tại?
answer: Việc không thu được lợi nhuận đương nhiên khiến họ nản lòng và không muốn tiếp tục, đồng thời ngăn cản người khác noi theo tấm gương của họ.
wrong_answers:
  - Sự can thiệp của chính phủ hướng các nỗ lực của họ sang các dự án có lợi cho xã hội hơn thông qua trợ cấp.
  - Họ tiếp tục đầu tư cho đến khi sở thích của người tiêu dùng cuối cùng phù hợp với dự đoán ban đầu của họ.
  - Các quy định thị trường buộc họ phải từ bỏ các dự án để tránh lãng phí kinh tế.
explanation: |
  Trong một hệ thống thị trường tự do, lợi nhuận đóng vai trò là tín hiệu quan trọng cho thấy nhu cầu thực sự của người tiêu dùng. Khi các doanh nhân đánh giá sai thời điểm thị trường và dự đoán nhu cầu không tồn tại, họ sẽ không tạo ra lợi nhuận (generate), điều này đương nhiên sẽ làm giảm động lực đầu tư theo hướng đó. Cơ chế tự điều chỉnh này ngăn chặn việc lãng phí nguồn lực vào những đổi mới chưa chín muồi. Các lựa chọn khác lại đề xuất sai lầm sự can thiệp từ bên ngoài hoặc đầu tư liên tục bất chấp tín hiệu thị trường, điều này mâu thuẫn với sự nhấn mạnh của chương này về cách tín hiệu lợi nhuận hướng dẫn việc ra quyết định kinh tế hợp lý.
question: Selon la théorie économique du marché libre, que se passe-t-il lorsque des entrepreneurs anticipent prématurément la demande des consommateurs pour une innovation qui n'existe pas encore ?
answer: L'absence de bénéfices les dissuade naturellement de continuer et empêche les autres de suivre leur exemple
wrong_answers:
  - L'intervention du gouvernement réoriente leurs efforts vers des projets plus bénéfiques pour la société grâce à des subventions
  - Ils continuent d'investir jusqu'à ce que les préférences des consommateurs s'alignent sur leurs prévisions initiales
  - Les règles du marché les obligent à abandonner leurs projets pour éviter le gaspillage économique
explanation: |
  Dans un système de marché libre, les bénéfices servent de signaux cruciaux indiquant la demande réelle des consommateurs. Lorsque les entrepreneurs se trompent de marché et anticipent une demande qui n'existe pas, ils ne parviennent pas à réaliser des bénéfices, ce qui décourage naturellement tout nouvel investissement dans cette direction. Ce mécanisme d'autocorrection évite de gaspiller des ressources dans des innovations prématurées. Les autres options suggèrent à tort une intervention extérieure ou un investissement persistant en dépit des signaux du marché, ce qui contredit l'accent mis dans le chapitre sur la manière dont les signaux de profit guident la prise de décision économique rationnelle.
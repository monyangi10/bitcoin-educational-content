question: Какво се случва според икономическата теория на свободния пазар, когато предприемачите предвиждат преждевременно потребителското търсене на иновация, която все още не съществува?
answer: Липсата на печалба естествено ги възпира да продължат и пречи на другите да последват примера им
wrong_answers:
  - Държавната намеса пренасочва усилията им към по-социално полезни проекти чрез субсидии
  - Те продължават да инвестират, докато предпочитанията на потребителите не се съобразят с първоначалните им прогнози
  - Пазарните правила ги принуждават да се откажат от проектите си, за да предотвратят икономически загуби
explanation: |
  В системата на свободния пазар печалбите служат като важен сигнал, показващ реалното потребителско търсене. Когато предприемачите грешно преценят пазарния момент и очакват несъществуващо търсене, те не успяват да реализират печалби, което естествено обезкуражава по-нататъшните инвестиции в тази посока. Този самокоригиращ се механизъм предотвратява разхищението на ресурси за преждевременни иновации. Другите варианти неправилно предполагат външна намеса или постоянни инвестиции въпреки пазарните сигнали, което противоречи на акцента в главата върху това как сигналите за печалба направляват рационалното вземане на икономически решения.
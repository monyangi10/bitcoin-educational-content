question: How does the loss of economic freedom in a collectivist system affect other individual freedoms according to the liberal analysis?
answer: It creates a cascade effect where all other freedoms are systematically eliminated due to state control over production and distribution
wrong_answers:
  - It primarily affects economic choices but allows other freedoms like speech and movement to remain largely intact
  - It strengthens political freedoms by giving citizens more collective decision-making power over economic matters
  - It only restricts workplace freedoms while preserving personal freedoms like residence choice and family relationships
explanation: |
  The liberal analysis demonstrates that economic freedom is foundational to all other freedoms. When the state controls production and distribution, it necessarily controls where people work, and therefore where they live. State ownership of printing presses eliminates press freedom, while regulated exchanges restrict even personal relationships. This interconnectedness shows that economic liberty cannot be separated from other individual freedoms - losing one leads to losing all others in a systematic cascade effect.

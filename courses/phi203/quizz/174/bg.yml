question: Как загубата на икономическа свобода в една колективистична система се отразява на другите индивидуални свободи според либералния анализ?
answer: Той създава каскаден ефект, при който всички други свободи са систематично елиминирани поради държавния контрол върху производството и разпространението
wrong_answers:
  - Тя засяга предимно икономическия избор, но позволява други свободи като свободата на словото и движението да останат до голяма степен непокътнати
  - Тя укрепва политическите свободи, като предоставя на гражданите повече колективни правомощия за вземане на решения по икономически въпроси
  - Тя ограничава само свободите на работното място, като запазва личните свободи като избор на местоживеене и семейни отношения
explanation: |
  Либералният анализ показва, че икономическата свобода е в основата на всички останали свободи. Когато държавата контролира производството и разпределението, тя задължително контролира и мястото, където хората работят, а следователно и мястото, където живеят. Държавната собственост върху печатарските машини елиминира свободата на печата, а регулираният обмен ограничава дори личните отношения. Тази взаимосвързаност показва, че икономическата свобода не може да бъде отделена от другите индивидуални свободи - загубата на една от тях води до загуба на всички останали в систематичен каскаден ефект.
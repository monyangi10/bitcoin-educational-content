question: Kupotea kwa uhuru wa kiuchumi katika mfumo wa jumuiya kunaathiri vipi uhuru mwingine wa mtu binafsi kulingana na uchambuzi wa kiliberali?
answer: Inaunda athari ya msururu ambapo uhuru mwingine wote huondolewa kimfumo kutokana na udhibiti wa serikali juu ya uzalishaji na usambazaji.
wrong_answers:
  - Inaathiri kimsingi chaguzi za kiuchumi lakini inaruhusu uhuru mwingine kama vile kujieleza na harakati kubaki bila kubadilika.
  - Inaimarisha uhuru wa kisiasa kwa kuwapa raia mamlaka zaidi ya kufanya maamuzi ya pamoja kuhusu masuala ya kiuchumi
  - Inazuia tu uhuru wa mahali pa kazi huku ikihifadhi uhuru wa kibinafsi kama vile uchaguzi wa makazi na mahusiano ya kifamilia.
explanation: |
  Uchambuzi wa kiliberali unaonyesha kwamba uhuru wa kiuchumi ni msingi wa uhuru mwingine wote. Serikali inapodhibiti uzalishaji na usambazaji, inadhibiti mahali ambapo watu hufanya kazi, na kwa hivyo wanaishi. Umiliki wa serikali wa mashine za uchapishaji huondoa uhuru wa vyombo vya habari, huku ubadilishanaji unaodhibitiwa ukizuia hata mahusiano ya kibinafsi. Muunganiko huu unaonyesha kwamba uhuru wa kiuchumi hauwezi kutenganishwa na uhuru mwingine wa mtu binafsi - kupoteza moja husababisha kupoteza mingine yote katika athari ya utaratibu.
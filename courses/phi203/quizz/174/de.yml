question: Wie wirkt sich der Verlust der wirtschaftlichen Freiheit in einem kollektivistischen System nach der liberalen Analyse auf andere individuelle Freiheiten aus?
answer: Sie führt zu einem Kaskadeneffekt, bei dem alle anderen Freiheiten aufgrund der staatlichen Kontrolle über Produktion und Vertrieb systematisch beseitigt werden
wrong_answers:
  - Sie wirkt sich in erster Linie auf wirtschaftliche Entscheidungen aus, ermöglicht aber, dass andere Freiheiten wie Redefreiheit und Freizügigkeit weitgehend unangetastet bleiben
  - Sie stärkt die politischen Freiheiten, indem sie den Bürgern mehr kollektive Entscheidungsbefugnis in wirtschaftlichen Angelegenheiten gibt
  - Sie schränkt lediglich die Freiheiten am Arbeitsplatz ein, während persönliche Freiheiten wie die Wahl des Wohnsitzes und familiäre Beziehungen erhalten bleiben
explanation: |
  Die liberale Analyse zeigt, dass die wirtschaftliche Freiheit die Grundlage für alle anderen Freiheiten ist. Wenn der Staat die Produktion und den Vertrieb kontrolliert, kontrolliert er zwangsläufig, wo die Menschen arbeiten und damit auch, wo sie leben. Staatliches Eigentum an Druckmaschinen schaltet die Pressefreiheit aus, während regulierte Börsen sogar persönliche Beziehungen einschränken. Diese Verflechtung zeigt, dass die wirtschaftliche Freiheit nicht von anderen individuellen Freiheiten getrennt werden kann - der Verlust einer Freiheit führt zum Verlust aller anderen in einem systematischen Kaskadeneffekt.
question: Hoe beïnvloedt het verlies van economische vrijheid in een collectivistisch systeem andere individuele vrijheden volgens de liberale analyse?
answer: Het creëert een cascade-effect waarbij alle andere vrijheden systematisch worden geëlimineerd door de staatscontrole over productie en distributie
wrong_answers:
  - Het beïnvloedt vooral economische keuzes, maar zorgt ervoor dat andere vrijheden zoals vrijheid van meningsuiting en bewegingsvrijheid grotendeels intact blijven
  - Het versterkt de politieke vrijheden door burgers meer collectieve beslissingsbevoegdheid te geven over economische zaken
  - Het beperkt alleen de vrijheden op het werk, terwijl persoonlijke vrijheden zoals de keuze van een woning en familierelaties behouden blijven
explanation: |
  De liberale analyse laat zien dat economische vrijheid de basis vormt voor alle andere vrijheden. Wanneer de staat de productie en distributie controleert, controleert hij noodzakelijkerwijs waar mensen werken en dus waar ze wonen. Staatseigendom van drukpersen elimineert persvrijheid, terwijl gereguleerde uitwisselingen zelfs persoonlijke relaties beperken. Deze onderlinge verbondenheid laat zien dat economische vrijheid niet los gezien kan worden van andere individuele vrijheden - het verliezen van één vrijheid leidt tot het verliezen van alle andere vrijheden in een systematisch cascade-effect.
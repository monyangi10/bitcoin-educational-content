question: According to the liberals who defended free education, why does state monopoly on education contradict the facts of human nature?
answer: It ignores both the natural fact of parental love and the natural diversity of children, imposing uniform guardianship where none is warranted by default
wrong_answers:
  - It creates excessive public spending that crowds out private investment in more efficient teaching methods
  - It concentrates political power in the hands of educators, who then use schools to undermine government authority
  - It reduces the social prestige of teachers by making education a bureaucratic function rather than a respected vocation
explanation: |
  The liberal case against state monopoly in education rests on two factual arguments. First, parents are the natural tutors of their children: mothers and fathers possess intimate knowledge of their child's personality and have a deep emotional investment in that child's development. The state, a succession of political parties elected on broad programs, is an artificial substitute for this natural guardianship. Second, children are not identical: they differ from birth in physical capacities, temperaments, aptitudes, and inclinations. To teach the same things in the same way to children made differently by nature is to postulate a uniformity that does not exist. Only educational freedom, with its competition of schools, methods, and programs, can accommodate this irreducible diversity.

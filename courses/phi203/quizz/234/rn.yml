question: Ni ubuhe buryo bw’ubutunzi umwidegemvyo w’amasezerano wizigira canecane kugira ngo abo bompi bungukire ku guhanahana amakuru ku bushake?
answer: Igiciro c’umuntu ku giti ciwe gituma uguhinduranya biba vyiza kuruta kuvyirinda
wrong_answers:
  - Itegeko rya Leta rituma inyungu zigabanywa ku rugero rungana hagati y'abagiranye amasezerano
  - Igenzura ry'ibiciro vy'isoko ryemeza indishi ibereye ku bantu bose bari muri iyo nzira
  - Ingero y'agaciro y'intumbero irema inyungu zingana mu mibare ku mpande zompi
explanation: |
  Amasezerano y’ubushake atuma haba ugutunganirizwa kuko umuntu wese ahitamwo kugira uruhara iyo gusa aha agaciro ivyo aronka kuruta ivyo ahevye. Ukwo guhitamwo kw’umuntu, aho guhitamwo itegeko ryose ryo hanze canke ingero y’agaciro k’intumbero, ni vyo bituma habaho kamere y’umubare mwiza w’uguhinduranya ku bushake. Amategeko ya Leta canke ukugenzura ibiciro vyoshobora mu vy’ukuri gutuma ubwo buryo bwo gukora ubushake buhungabana, mu gihe ingero y’agaciro y’intumbero yirengagiza ivyo umuntu akunda bituma umuntu agira amasezerano mu kibanza ca mbere.
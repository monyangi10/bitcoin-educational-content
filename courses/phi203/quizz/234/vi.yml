question: Cơ chế kinh tế nào là nền tảng chính của tự do hợp đồng nhằm đảm bảo cả hai bên đều được hưởng lợi từ các giao dịch tự nguyện?
answer: Mỗi bên có một đánh giá chủ quan riêng về việc liệu việc trao đổi có hấp dẫn hơn so với việc không tham gia trao đổi hay không.
wrong_answers:
  - Quy định của chính phủ nhằm đảm bảo phân bổ lợi ích công bằng giữa các bên ký kết hợp đồng.
  - Kiểm soát giá thị trường nhằm đảm bảo mức bồi thường công bằng cho tất cả những người tham gia giao dịch.
  - Đo lường khách quan giá trị tạo ra lợi ích tương đương về mặt toán học cho cả hai bên.
explanation: |
  Các hợp đồng tự nguyện tạo ra sự làm giàu lẫn nhau bởi vì mỗi cá nhân chỉ lựa chọn tham gia khi họ đánh giá chủ quan rằng những gì họ nhận được có giá trị hơn những gì họ phải từ bỏ. Sở thích chủ quan này, chứ không phải bất kỳ quy định bên ngoài hay phép đo giá trị khách quan nào, thúc đẩy bản chất có lợi cho cả hai bên của trao đổi tự nguyện. Sự điều tiết của chính phủ hoặc kiểm soát giá cả thực chất sẽ làm suy yếu cơ chế tự nguyện này, trong khi phép đo giá trị khách quan lại bỏ qua những sở thích cá nhân thúc đẩy các cá nhân ký kết hợp đồng ngay từ đầu.
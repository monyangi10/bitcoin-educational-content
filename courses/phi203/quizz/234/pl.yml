question: Na jakim mechanizmie ekonomicznym opiera się przede wszystkim swoboda zawierania umów, aby zapewnić obu stronom korzyści z dobrowolnej wymiany?
answer: Subiektywna ocena każdej ze stron, która sprawia, że wymiana jest korzystniejsza niż powstrzymanie się od niej
wrong_answers:
  - Regulacje rządowe zapewniające równy podział korzyści między umawiającymi się stronami
  - Kontrola cen rynkowych gwarantująca sprawiedliwe wynagrodzenie dla wszystkich uczestników giełdy
  - Obiektywny pomiar wartości, który tworzy matematycznie równoważne zyski dla obu stron
explanation: |
  Dobrowolne umowy tworzą wzajemne wzbogacenie, ponieważ każda osoba decyduje się na uczestnictwo tylko wtedy, gdy subiektywnie ceni to, co otrzymuje, bardziej niż to, z czego rezygnuje. Ta subiektywna preferencja, a nie jakakolwiek zewnętrzna regulacja lub obiektywny pomiar wartości, napędza pozytywny charakter dobrowolnej wymiany. Rządowe regulacje lub kontrole cen w rzeczywistości podważyłyby ten dobrowolny mechanizm, podczas gdy obiektywny pomiar wartości ignoruje osobiste preferencje, które motywują jednostki do zawierania umów.
question: 계약의 자유는 주로 어떤 경제적 메커니즘에 의존하여 양 당사자가 자발적인 교환을 통해 이익을 얻도록 보장하나요?
answer: 교환을 기권하는 것보다 선호하는 각 당사자의 주관적 가치 평가
wrong_answers:
  - 계약 당사자 간의 공평한 이익 분배를 보장하는 정부 규제
  - 거래소의 모든 참여자에게 공정한 보상을 보장하는 시장 가격 통제
  - 양측에 수학적으로 동등한 이득을 창출하는 객관적인 가치 측정
explanation: |
  자발적 계약은 각 개인이 포기하는 것보다 받는 것을 주관적으로 더 가치 있게 여길 때만 참여를 선택하기 때문에 상호 풍요로움을 창출합니다. 외부 규제나 객관적인 가치 측정이 아닌 이러한 주관적인 선호가 자발적 교환의 양수 특성을 주도합니다. 정부 규제나 가격 통제는 실제로 이러한 자발적 메커니즘을 약화시킬 수 있으며, 객관적인 가치 측정은 애초에 개인이 계약을 하도록 동기를 부여하는 개인적 선호를 무시합니다.
question: 契约自由主要依靠什么经济机制来确保双方从自愿交换中获益？
answer: 每一方的主观评价使交换比放弃交换更可取
wrong_answers:
  - 确保合同双方平等分配利益的政府法规
  - 保证交易所所有参与者获得公平补偿的市场价格控制
  - 客观衡量价值，为双方创造数学上等价的收益
explanation: |
  自愿契约之所以能创造互惠互利，是因为每个人只有在主观上看重所得多于放弃时，才会选择参与。这种主观偏好，而不是任何外部监管或客观价值衡量，推动了自愿交换的正和性质。政府的监管或价格控制实际上会破坏这种自愿机制，而客观的价值衡量则忽视了促使个人首先签订合同的个人偏好。
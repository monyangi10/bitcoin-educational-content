question: На какъв икономически механизъм разчита договорната свобода, за да гарантира, че и двете страни имат полза от доброволния обмен?
answer: Субективната оценка на всяка от страните, която прави размяната за предпочитане пред въздържането от нея
wrong_answers:
  - Правителствено регулиране, което гарантира равномерно разпределение на ползите между договарящите се страни
  - Контрол на пазарните цени, който гарантира справедлива компенсация за всички участници в обмена
  - Обективно измерване на стойността, което създава математически еквивалентни печалби за двете страни
explanation: |
  Доброволните договори водят до взаимно обогатяване, тъй като всяко лице избира да участва само когато субективно оценява полученото повече от това, от което се отказва. Това субективно предпочитание, а не някаква външна регулация или обективно измерване на стойността, определя положителния характер на доброволната размяна. Държавното регулиране или контролът върху цените всъщност биха подкопали този доброволен механизъм, докато обективното измерване на стойността игнорира личните предпочитания, които мотивират индивидите да сключват договори.
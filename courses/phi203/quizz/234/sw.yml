question: Uhuru wa kimkataba unategemea utaratibu gani wa kiuchumi ili kuhakikisha kwamba pande zote mbili zinanufaika kutokana na mabadilishano ya hiari?
answer: Tathmini ya kibinafsi ya kila upande ambayo inafanya ubadilishaji huo kuwa bora kuliko kujiepusha nao
wrong_answers:
  - Kanuni za serikali zinazohakikisha usambazaji sawa wa faida kati ya pande zinazohusika katika mkataba
  - Udhibiti wa bei za soko unaohakikisha fidia ya haki kwa washiriki wote katika soko la hisa
  - Upimaji wa thamani unaolenga kuleta faida sawa kihisabati kwa pande zote mbili
explanation: |
  Mikataba ya hiari huunda utajiri wa pande zote kwa sababu kila mtu huchagua kushiriki tu wakati anapothamini kile anachopokea zaidi ya kile anachoacha. Upendeleo huu wa kibinafsi, badala ya kanuni yoyote ya nje au kipimo cha thamani isiyo na upendeleo, huendesha hali chanya ya jumla ya ubadilishanaji wa hiari. Udhibiti wa serikali au udhibiti wa bei ungedhoofisha utaratibu huu wa hiari, huku kipimo cha thamani isiyo na upendeleo kikipuuza mapendeleo ya kibinafsi yanayowahamasisha watu binafsi kuingia mkataba hapo awali.
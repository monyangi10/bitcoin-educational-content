question: 契約の自由は、両当事者が自発的な交換から利益を得るために、主にどのような経済的メカニズムに依存しているのだろうか？
answer: 各当事者の主観的な評価によって、交換を断念するよりも交換を行う方が望ましいと判断した場合。
wrong_answers:
  - 契約当事者間の平等な利益配分を保証する政府の規制
  - 取引所のすべての参加者に公正な対価を保証する市場価格の管理
  - 双方に数学的に等価な利益をもたらす価値の客観的測定
explanation: |
  自発的な契約は、各個人が主観的に放棄するものよりも受け取るものに価値を見出す場合にのみ参加を選択するため、相互の豊かさを生み出す。外部からの規制や客観的な価値測定ではなく、この主観的な選好が、自発的な交換のポジティブ・サム的性質を推進する。政府による規制や価格統制は、この自発的なメカニズムを実際に弱体化させるだろう。一方、客観的な価値測定は、そもそも個人が契約を結ぶ動機となる個人的選好を無視する。
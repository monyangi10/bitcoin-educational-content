question: 폴 르로이-보리외의 분석에 따르면, 공산주의 노예제도가 전통적인 노예제보다 더 나쁜 이유는 무엇일까요?
answer: 공산주의 체제에서 개인은 돈을 벌거나 자유를 살 가능성이 없으므로 피할 수없는 속박을 만듭니다
wrong_answers:
  - 공산주의 노예제는 전통적인 노예제보다 더 많은 신체적 처벌과 가혹한 노동 조건을 수반합니다
  - 전통적인 노예들은 교육을 받을 수 있었던 반면, 공산주의 노동자들은 국가에 의해 의도적으로 무지한 상태로 유지되었습니다
  - 공산주의 노예 제도는 전통적인 노예 제도의 일시적인 성격에 비해 지속 기간이 더 길다
explanation: |
  르로이-보리유는 공산주의 노예제는 자유를 얻을 수 있는 경로를 없애기 때문에 전통적인 노예제보다 더 나쁘다고 주장했습니다. 전통적인 노예는 때때로 돈을 모아(페쿨레) 자유를 구매할 수 있었지만, 공산주의 체제에서는 그러한 탈출구가 없었습니다. 개인은 자기 소유권, 개인의 자율성, 자신의 개념에 따라 행동할 자유를 얻을 수 있는 가능성이 전혀 없이 자유를 영구적으로 박탈당했습니다. 다른 옵션은 신체적 조건, 교육 또는 기간에 초점을 맞추지만, 이는 해방의 근본적인 불가능성에 대한 르로이-볼리외의 주장의 핵심이 아니었습니다.
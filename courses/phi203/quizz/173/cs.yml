question: V čem je podle analýzy Paula Leroy-Beaulieua komunistické otroctví horší než tradiční otroctví?
answer: V komunistických systémech nemají jednotlivci možnost vydělat si peníze nebo si koupit svobodu, což vytváří nevyhnutelné otroctví
wrong_answers:
  - Komunistické otroctví zahrnuje více fyzických trestů a tvrdší pracovní podmínky než tradiční otroctví
  - Tradiční otroci měli přístup ke vzdělání, zatímco komunističtí pracovníci jsou státem záměrně udržováni v nevědomosti
  - Komunistické otroctví trvá déle ve srovnání s dočasností tradičních otrokářských systémů
explanation: |
  Leroy-Beaulieu tvrdil, že komunistické otroctví je horší než tradiční otroctví, protože eliminuje jakoukoli cestu ke svobodě. Zatímco tradiční otroci mohli někdy nashromáždit peníze (pécule) a případně si koupit svobodu, komunistické systémy takovou únikovou cestu neposkytovaly. Jednotlivci byli trvale zbaveni svobody bez možnosti dosáhnout sebevlastnictví, individuální autonomie nebo svobody jednat podle vlastních představ. Ostatní možnosti se zaměřují na fyzické podmínky, vzdělání nebo délku trvání, které nebyly jádrem Leroy-Beaulieuova argumentu o zásadní nemožnosti osvobození.
question: Что, согласно анализу Поля Леруа-Болье, делает коммунистическое рабство хуже традиционного?
answer: В коммунистических системах люди не имеют возможности зарабатывать деньги или покупать свою свободу, что приводит к неизбежному рабству
wrong_answers:
  - Коммунистическое рабство предполагает больше физических наказаний и более суровые условия труда, чем традиционное рабство
  - Традиционные рабы имели доступ к образованию, в то время как коммунистических рабочих государство намеренно держит в невежестве
  - Коммунистическое рабство длится дольше по сравнению с временным характером традиционных систем рабства
explanation: |
  Леруа-Болье утверждал, что коммунистическое рабство хуже традиционного, потому что оно исключает любой путь к свободе. В то время как традиционные рабы иногда могли накопить деньги (pécule) и потенциально купить свою свободу, коммунистические системы не предоставляли такого пути к спасению. Люди навсегда лишались свободы, не имея возможности обрести право собственности, индивидуальную автономию или свободу действовать в соответствии со своими собственными представлениями. Другие варианты сосредоточены на физических условиях, образовании или продолжительности жизни, которые не были сутью аргумента Леруа-Болье о принципиальной невозможности освобождения.
question: Paul Leroy-Beaulieu'nun analizine göre, komünist köleliği geleneksel kölelikten daha kötü yapan nedir?
answer: Komünist sistemlerde bireylerin para kazanma veya özgürlüklerini satın alma imkanı yoktur, bu da kaçınılmaz bir esaret yaratır
wrong_answers:
  - Komünist kölelik, geleneksel köleliğe göre daha fazla fiziksel ceza ve daha ağır çalışma koşulları içerir
  - Geleneksel köleler eğitime erişebilirken, komünist işçiler devlet tarafından kasıtlı olarak cahil bırakılmaktadır
  - Komünist kölelik, geleneksel kölelik sistemlerinin geçici doğasına kıyasla daha uzun sürelidir
explanation: |
  Leroy-Beaulieu, komünist köleliğin geleneksel kölelikten daha kötü olduğunu çünkü özgürlüğe giden her türlü yolu ortadan kaldırdığını savunmuştur. Geleneksel köleler bazen para (pécule) biriktirip potansiyel olarak özgürlüklerini satın alabilirken, komünist sistemler böyle bir kaçış yolu sağlamıyordu. Bireyler, kendi mülkiyetlerini, bireysel özerkliklerini veya kendi anlayışlarına göre hareket etme özgürlüğünü elde etme olasılığı olmaksızın özgürlükten kalıcı olarak mahrum bırakıldılar. Diğer seçenekler, Leroy-Beaulieu'nün özgürleşmenin temelden imkansız olduğuna dair argümanının özünü oluşturmayan fiziksel koşullar, eğitim veya süreye odaklanmaktadır.
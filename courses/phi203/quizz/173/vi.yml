question: Theo phân tích của Paul Leroy-Beaulieu, điều gì khiến chế độ nô lệ cộng sản tồi tệ hơn chế độ nô lệ truyền thống?
answer: Trong các chế độ cộng sản, cá nhân không có khả năng kiếm tiền hoặc mua tự do, tạo ra sự nô lệ không thể thoát khỏi.
wrong_answers:
  - Chế độ nô lệ cộng sản bao gồm nhiều hình phạt thể xác và điều kiện lao động khắc nghiệt hơn so với chế độ nô lệ truyền thống.
  - Những người nô lệ thời xưa được tiếp cận với giáo dục, trong khi công nhân cộng sản lại bị nhà nước cố tình giữ cho ngu dốt.
  - Chế độ nô lệ cộng sản kéo dài hơn so với tính chất tạm thời của các hệ thống nô lệ truyền thống.
explanation: |
  Leroy-Beaulieu lập luận rằng chế độ nô lệ cộng sản còn tồi tệ hơn chế độ nô lệ truyền thống vì nó loại bỏ mọi con đường dẫn đến tự do. Trong khi nô lệ truyền thống đôi khi có thể tích lũy tiền (pécule) và có khả năng mua được tự do, thì hệ thống cộng sản không cung cấp bất kỳ con đường thoát hiểm nào như vậy. Cá nhân bị tước đoạt tự do vĩnh viễn mà không có khả năng đạt được quyền tự chủ, tự quyết cá nhân hoặc tự do hành động theo quan niệm của riêng mình. Các lựa chọn khác tập trung vào điều kiện thể chất, giáo dục hoặc thời gian giam giữ, những điều không phải là trọng tâm trong lập luận của Leroy-Beaulieu về sự bất khả thi cơ bản của việc giải phóng.
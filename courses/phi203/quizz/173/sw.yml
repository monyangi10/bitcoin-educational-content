question: Kulingana na uchambuzi wa Paul Leroy-Beaulieu, ni nini kinachofanya utumwa wa kikomunisti kuwa mbaya zaidi kuliko utumwa wa kitamaduni?
answer: Katika mifumo ya kikomunisti, watu binafsi hawana uwezekano wa kupata pesa au kununua uhuru wao, na hivyo kusababisha utumwa usioepukika.
wrong_answers:
  - Utumwa wa Kikomunisti unahusisha adhabu zaidi ya kimwili na mazingira magumu ya kazi kuliko utumwa wa kitamaduni
  - Watumwa wa kitamaduni walikuwa na fursa ya kupata elimu huku wafanyakazi wa kikomunisti wakiwekwa bila kujua kwa makusudi na serikali.
  - Utumwa wa kikomunisti hudumu kwa muda mrefu zaidi ikilinganishwa na asili ya muda ya mifumo ya utumwa wa jadi
explanation: |
  Leroy-Beaulieu alisema kwamba utumwa wa kikomunisti ulikuwa mbaya zaidi kuliko utumwa wa kitamaduni kwa sababu uliondoa njia yoyote ya kuelekea uhuru. Ingawa watumwa wa kitamaduni wakati mwingine wangeweza kukusanya pesa (pekee) na pengine kununua uhuru wao, mifumo ya kikomunisti haikutoa njia kama hiyo ya kutoroka. Watu binafsi walinyimwa uhuru kabisa bila uwezekano wa kufikia umiliki wao wenyewe, uhuru wa mtu binafsi, au uhuru wa kutenda kulingana na dhana zao wenyewe. Chaguzi zingine zinazingatia hali za kimwili, elimu, au muda, ambazo hazikuwa msingi wa hoja ya Leroy-Beaulieu kuhusu kutowezekana kwa msingi kwa ukombozi.
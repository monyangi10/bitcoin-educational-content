question: Wat maakt volgens de analyse van Paul Leroy-Beaulieu de communistische slavernij erger dan de traditionele slavernij?
answer: In communistische systemen hebben individuen geen mogelijkheid om geld te verdienen of hun vrijheid te kopen, waardoor ze onontkoombaar gebonden zijn
wrong_answers:
  - Communistische slavernij gaat gepaard met meer fysieke straffen en zwaardere arbeidsomstandigheden dan traditionele slavernij
  - Traditionele slaven hadden toegang tot onderwijs, terwijl communistische arbeiders opzettelijk onwetend worden gehouden door de staat
  - Communistische slavernij duurt langer in vergelijking met de tijdelijke aard van traditionele slavernijsystemen
explanation: |
  Leroy-Beaulieu stelde dat communistische slavernij erger was dan traditionele slavernij omdat het elke weg naar vrijheid elimineerde. Terwijl traditionele slaven soms geld (pécule) konden vergaren en zo mogelijk hun vrijheid konden kopen, boden communistische systemen een dergelijke ontsnappingsroute niet. Individuen werden permanent van hun vrijheid beroofd zonder de mogelijkheid om zelfeigenaarschap, individuele autonomie of vrijheid om volgens hun eigen opvattingen te handelen te bereiken. De andere opties richten zich op fysieke omstandigheden, onderwijs of duur, die niet de kern vormden van Leroy-Beaulieu's argument over de fundamentele onmogelijkheid van bevrijding.
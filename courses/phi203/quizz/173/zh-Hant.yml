question: 根據 Paul Leroy-Beaulieu 的分析，是什麼讓共產奴隸制比傳統奴隸制更糟糕？
answer: 在共產主義制度下，個人無法賺錢或購買自由，造成無法逃避的束縛。
wrong_answers:
  - 共產奴隸制度比傳統奴隸制度涉及更多的體罰和更嚴苛的工作條件
  - 傳統的奴隸有機會接受教育，而共產主義工人卻被國家刻意保持無知
  - 與傳統奴隸制度的臨時性質相比，共產奴隸制度持續的時間較長。
explanation: |
  Leroy-Beaulieu 認為共產奴隸制比傳統奴隸制更糟糕，因為它消除了任何獲得自由的途徑。傳統奴隸有時可以累積金錢（pécule），並有可能購買自由，但共產主義制度卻沒有提供這樣的逃生途徑。個人被永久剝奪了自由，沒有可能實現自我擁有、個人自主，或按照自己的概念自由行事。其他選擇的重點在於物質條件、教育或期限，這些都不是 Leroy-Beaulieu 關於解放根本不可能的核心論點。
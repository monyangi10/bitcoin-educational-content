question: Според анализа на Пол Леруа-Бьоло какво прави комунистическото робство по-лошо от традиционното робство?
answer: В комунистическите системи хората нямат възможност да печелят пари или да купуват свободата си, което създава неизбежно робство
wrong_answers:
  - Комунистическото робство включва повече физически наказания и по-тежки условия на труд в сравнение с традиционното робство
  - Традиционните роби са имали достъп до образование, докато комунистическите работници са умишлено държани в неведение от държавата
  - Комунистическото робство е по-продължително в сравнение с временния характер на традиционните системи на робство
explanation: |
  Леруа-Бьоло твърди, че комунистическото робство е по-лошо от традиционното, тъй като елиминира всякакъв път към свободата. Докато при традиционните роби понякога е имало възможност да се натрупат пари (pécule) и евентуално да си купят свобода, комунистическите системи не са предоставяли такъв път за бягство. Индивидите са били постоянно лишени от свобода, без възможност да постигнат самособственост, индивидуална автономия или свобода да действат според собствените си схващания. Другите възможности се фокусират върху физическите условия, образованието или продължителността, които не са били в основата на аргумента на Леруа-Божо за фундаменталната невъзможност за освобождение.
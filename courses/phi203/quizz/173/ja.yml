question: ポール・ルロワ＝ボリューの分析によれば、共産主義的奴隷制が伝統的奴隷制より悪いのはなぜか？
answer: 共産主義体制では、個人はお金を稼ぐことも、自由を買うこともできない。
wrong_answers:
  - 共産主義の奴隷制は、伝統的な奴隷制よりも体罰が多く、過酷な労働条件を伴う
  - 伝統的な奴隷は教育を受けることができたが、共産主義者の労働者は国家によって意図的に無知にされている。
  - 共産主義の奴隷制度は、伝統的な奴隷制度の一時的な性質に比べ、より長く続く
explanation: |
  ルロワ＝ボリューは、共産主義の奴隷制度は自由への道を排除しているため、従来の奴隷制度よりも悪いと主張した。伝統的な奴隷制度では、お金（ペキュール）を貯めて自由を買うことができたが、共産主義制度ではそのような逃げ道はなかった。個人は永久に自由を奪われ、自己所有、個人の自律性、自分の観念に従って行動する自由を達成する可能性はない。他の選択肢は、身体的条件、教育、期間に焦点を当てたものであり、解放の根本的不可能性についてのルロワ＝ボリューの主張の核心ではなかった。
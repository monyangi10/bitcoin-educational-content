question: Selon l'analyse de Paul Leroy-Beaulieu, qu'est-ce qui rend l'esclavage communiste pire que l'esclavage traditionnel ?
answer: Dans les systèmes communistes, les individus n'ont pas la possibilité de gagner de l'argent ou d'acheter leur liberté, ce qui crée une servitude inéluctable
wrong_answers:
  - L'esclavage communiste implique davantage de châtiments physiques et des conditions de travail plus dures que l'esclavage traditionnel
  - Les esclaves traditionnels avaient accès à l'éducation, tandis que les travailleurs communistes sont délibérément maintenus dans l'ignorance par l'État
  - L'esclavage communiste dure plus longtemps que la nature temporaire des systèmes d'esclavage traditionnels
explanation: |
  Leroy-Beaulieu affirme que l'esclavage communiste est pire que l'esclavage traditionnel parce qu'il élimine toute possibilité de liberté. Alors que les esclaves traditionnels pouvaient parfois accumuler de l'argent (pécule) et éventuellement acheter leur liberté, les systèmes communistes n'offraient aucune échappatoire de ce type. Les individus étaient privés de liberté de manière permanente, sans possibilité d'accéder à la propriété, à l'autonomie individuelle ou à la liberté d'agir selon leurs propres conceptions. Les autres options portent sur les conditions physiques, l'éducation ou la durée, qui ne sont pas au cœur de l'argumentation de Leroy-Beaulieu sur l'impossibilité fondamentale de la libération.
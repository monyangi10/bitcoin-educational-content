question: Why does the text describe freedom of work as having a "propulsive character"?
answer: Because it enables individuals to adapt their labor to diverse and changing circumstances, breaking from established patterns to advance toward new creations
wrong_answers:
  - Because it forces employers to compete for workers, driving wages upward and improving living standards across the economy
  - Because it allows the state to redirect workers toward sectors where production needs to expand most rapidly
  - Because it removes barriers to entry in regulated professions, increasing the supply of services and lowering their cost to consumers
explanation: |
  The text states that "freedom of work has a propulsive character that makes progress possible." Human perfectibility is achieved through this freedom because centralised management merely reproduces already-known patterns of production. The freedom to work breaks from well-trodden paths and advances toward new creations, driven by the fundamental diversity of individual strengths, aptitudes, and the changing demands of the environment at different life stages. The other options substitute competitive pressure, state direction, or deregulation effects for this essential idea of creative, forward-moving progress rooted in individual freedom.

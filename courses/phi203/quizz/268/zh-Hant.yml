question: 文中指出什麼是讓非自由制度在一再失敗的情況下仍能維持大眾支持的主要弱點？
answer: 他們依賴理論上的詭辯，製造對現實的虛假表現，以維護大眾的信心。
wrong_answers:
  - 他們透過集中規劃和集體所有權展示了卓越的經濟成果
  - 它們消除了市場競爭的不確定性，提供了更大的安全性和穩定性。
  - 它們透過民主決策程序提供更公平的資源分配
explanation: |
  文中明確指出，非自由體系透過「理論上錯誤的形式，可以被定性為詭辯」來維持自身，這些形式創造了「現實的虛假表象」，讓大眾對失敗的體系保持信心。這些錯誤的答案代表了干預主義制度的常見理由，但卻與本章的分析相矛盾，即這些制度破壞了人類的基本機制，以監督取代個人選擇，最終在認真檢視時失敗。
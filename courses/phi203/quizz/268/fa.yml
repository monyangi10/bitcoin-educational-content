question: متن چه چیزی را به عنوان ضعف اصلی شناسایی می‌کند که به سیستم‌های غیرآزادی اجازه می‌دهد علیرغم شکست‌های مکررشان، حمایت عمومی را حفظ کنند؟
answer: آن‌ها به سفسطه‌های نظری تکیه می‌کنند که تصورات نادرستی از واقعیت ایجاد می‌کنند تا اعتماد عمومی را حفظ کنند.
wrong_answers:
  - آن‌ها نتایج اقتصادی برتری را از طریق برنامه‌ریزی متمرکز و مالکیت جمعی نشان می‌دهند.
  - آنها با از بین بردن عدم قطعیت‌های رقابت بازار، امنیت و ثبات بیشتری را فراهم می‌کنند.
  - آنها توزیع عادلانه‌تری از منابع را از طریق فرآیندهای تصمیم‌گیری دموکراتیک ارائه می‌دهند.
explanation: |
  متن به‌طور صریح بیان می‌کند که سیستم‌های غیرآزادی از طریق 'اشکال نظری نادرست که می‌توان آن‌ها را به عنوان سفسطه‌ها توصیف کرد' خود را حفظ می‌کنند، که 'نمایش‌های نادرست از واقعیت' ایجاد می‌کنند و به عموم اجازه می‌دهند به سیستم‌های شکست‌خورده اعتماد کنند. پاسخ‌های نادرست نمایانگر توجیهات رایج برای سیستم‌های مداخله‌گر هستند اما با تحلیل فصل که بیان می‌کند این سیستم‌ها مکانیزم‌های بنیادی انسانی را می‌شکنند و قیمومیت را جایگزین انتخاب شخصی می‌کنند، در تضاد هستند و در نهایت زمانی که به‌طور جدی بررسی شوند، شکست می‌خورند.
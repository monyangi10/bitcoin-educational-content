question: Hva er det som ifølge teksten er den viktigste svakheten som gjør at ikke-liberale systemer kan opprettholde offentlig støtte til tross for gjentatte fiaskoer?
answer: De er avhengige av teoretiske spissfindigheter som skaper falske fremstillinger av virkeligheten for å bevare publikums tillit
wrong_answers:
  - De viser overlegne økonomiske resultater gjennom sentralisert planlegging og kollektivt eierskap
  - De gir større sikkerhet og stabilitet ved å eliminere usikkerheten som følger av markedskonkurransen
  - De tilbyr en mer rettferdig fordeling av ressurser gjennom demokratiske beslutningsprosesser
explanation: |
  Teksten sier eksplisitt at ikke-frihetlige systemer opprettholder seg selv gjennom "teoretisk feilaktige former som kan betegnes som sofismer", og som skaper "falske representasjoner av virkeligheten" som gjør det mulig for offentligheten å opprettholde tilliten til mislykkede systemer. De gale svarene representerer vanlige begrunnelser for intervensjonistiske systemer, men står i motsetning til kapitlets analyse av at disse systemene bryter med grunnleggende menneskelige mekanismer og erstatter personlige valg med formynderi, og at de til syvende og sist mislykkes når de blir seriøst undersøkt.
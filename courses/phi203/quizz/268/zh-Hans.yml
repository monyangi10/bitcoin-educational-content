question: 文中指出，非自由制度之所以能够在屡遭失败的情况下仍能得到公众支持，其主要弱点是什么？
answer: 他们依靠理论上的诡辩，制造虚假的现实表象，以维护公众的信心
wrong_answers:
  - 它们通过集中规划和集体所有制展示了卓越的经济成果
  - 它们消除了市场竞争的不确定性，提供了更大的安全性和稳定性
  - 它们通过民主决策过程提供更公平的资源分配
explanation: |
  文中明确指出，非自由制度通过 "理论上错误的、可被定性为诡辩的形式 "来维持自身，这些形式创造了 "对现实的虚假表述"，让公众对失败的制度保持信心。错误的答案代表了干预主义制度的常见理由，但却与本章的分析相矛盾，即这些制度打破了人类的基本机制，用监护代替了个人选择，最终在认真审视后会失败。
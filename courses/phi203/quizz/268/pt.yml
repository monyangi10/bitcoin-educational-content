question: O que é que o texto identifica como a principal fraqueza que permite que os sistemas sem liberdade mantenham o apoio público apesar dos seus repetidos fracassos?
answer: Apoiam-se em sofismas teóricos que criam falsas representações da realidade para preservar a confiança do público
wrong_answers:
  - Demonstram resultados económicos superiores através do planeamento centralizado e da propriedade colectiva
  - Proporcionam maior segurança e estabilidade ao eliminarem as incertezas da concorrência no mercado
  - Oferecem uma distribuição mais equitativa dos recursos através de processos de decisão democráticos
explanation: |
  O texto afirma explicitamente que os sistemas de não-liberdade se mantêm através de "formas teoricamente erróneas que podem ser qualificadas como sofismas" que criam "falsas representações da realidade" que permitem ao público manter a confiança em sistemas falhados. As respostas erradas representam justificações comuns para os sistemas intervencionistas, mas contradizem a análise do capítulo, segundo a qual estes sistemas quebram mecanismos humanos fundamentais e substituem a escolha pessoal pela tutela, acabando por falhar quando seriamente examinados.
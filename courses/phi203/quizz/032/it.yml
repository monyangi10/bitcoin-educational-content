question: Secondo il capitolo, perché la sicurezza è considerata un bisogno umano universale?
answer: Perché nessun individuo ha una forza sufficiente a garantire la propria protezione per tutta la vita
wrong_answers:
  - Perché gli esseri umani sono naturalmente aggressivi e hanno bisogno di essere protetti dai loro istinti violenti
  - Perché la società moderna ha creato pericoli artificiali che non esistevano nei tempi primitivi
  - Perché i governi hanno deliberatamente reso le persone dipendenti dalla protezione dello Stato per il controllo politico
explanation: |
  Il capitolo spiega che la sicurezza è un bisogno universale perché anche la persona più forte sperimenta periodi di vulnerabilità nel corso della vita. Non erano forti durante l'infanzia, non lo saranno in età avanzata e, anche quando sono al massimo della forza, devono affrontare momenti di debolezza durante il sonno, la malattia o la stanchezza. Questa intrinseca vulnerabilità umana crea un bisogno universale di sicurezza collettiva e di creazione di uno Stato di diritto. Le altre opzioni suggeriscono erroneamente che il bisogno di sicurezza derivi dalla natura umana, dalla creazione di pericoli da parte della società moderna o dalla manipolazione del governo, piuttosto che dalla fondamentale realtà biologica della vulnerabilità umana lungo tutto l'arco della vita.
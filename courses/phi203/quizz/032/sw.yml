question: Kulingana na sura hiyo, kwa nini usalama unachukuliwa kuwa hitaji la wanadamu wote?
answer: Kwa sababu hakuna mtu aliye na nguvu ya kutosha kuhakikisha ulinzi wake katika maisha yake yote
wrong_answers:
  - Kwa sababu wanadamu kwa kawaida ni wakali na wanahitaji ulinzi dhidi ya silika zao za vurugu
  - Kwa sababu jamii ya kisasa imeunda hatari bandia ambazo hazikuwepo katika nyakati za kale
  - Kwa sababu serikali zimewafanya watu kimakusudi kutegemea ulinzi wa serikali kwa udhibiti wa kisiasa
explanation: |
  Sura hiyo inaelezea kwamba usalama ni hitaji la wote kwa sababu hata mtu mwenye nguvu zaidi hupata vipindi vya udhaifu katika maisha yake yote. Hawakuwa na nguvu katika utoto, hawatakuwa na nguvu katika uzee, na hata katika kilele cha nguvu hukabiliwa na nyakati za udhaifu wakati wa usingizi, ugonjwa, au uchovu. Udhaifu huu wa asili wa binadamu huunda hitaji la wote la usalama wa pamoja na uanzishwaji wa utawala wa sheria. Chaguzi zingine zinaonyesha kimakosa kwamba hitaji la usalama linatokana na asili ya mwanadamu, uundaji wa hatari wa jamii ya kisasa, au udanganyifu wa serikali, badala ya ukweli wa msingi wa kibiolojia wa udhaifu wa binadamu katika maisha yote.
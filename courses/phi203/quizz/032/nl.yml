question: Waarom wordt veiligheid volgens het hoofdstuk beschouwd als een universele menselijke behoefte?
answer: Omdat geen enkel individu voldoende kracht heeft om zijn eigen bescherming gedurende zijn hele leven te garanderen
wrong_answers:
  - Omdat mensen van nature agressief zijn en bescherming nodig hebben tegen hun eigen gewelddadige instincten
  - Omdat de moderne samenleving kunstmatige gevaren heeft gecreëerd die in primitieve tijden niet bestonden
  - Omdat regeringen mensen opzettelijk afhankelijk hebben gemaakt van staatsbescherming voor politieke controle
explanation: |
  Het hoofdstuk legt uit dat veiligheid een universele behoefte is omdat zelfs de sterkste persoon in zijn leven periodes van kwetsbaarheid ervaart. Ze waren niet sterk in hun kindertijd, zullen niet sterk zijn op hun oude dag, en zelfs op het hoogtepunt van hun kracht krijgen ze te maken met momenten van zwakte tijdens de slaap, ziekte of vermoeidheid. Deze inherente menselijke kwetsbaarheid creëert een universele behoefte aan collectieve veiligheid en het vestigen van een rechtsstaat. De andere opties suggereren ten onrechte dat de behoefte aan veiligheid voortkomt uit de menselijke natuur, het creëren van gevaren door de moderne samenleving of manipulatie door de overheid, in plaats van de fundamentele biologische realiteit van menselijke kwetsbaarheid gedurende het hele leven.
question: 根据本章内容，为什么安全被视为人类的普遍需求？
answer: 因为任何个人都没有足够的力量来确保自己终生受到保护
wrong_answers:
  - 因为人类天生具有攻击性，需要保护自己免受暴力本能的伤害
  - 因为现代社会人为制造了原始时代不存在的危险
  - 因为政府故意让人们依赖国家保护来进行政治控制
explanation: |
  这一章解释说，安全感是一种普遍需求，因为即使是最强壮的人在一生中也会经历脆弱的时期。他们在童年时并不强壮，在老年时也不会强壮，即使在最强壮的时候，也会在睡眠、生病或疲劳时面临虚弱的时刻。人类与生俱来的这种脆弱性造就了对集体安全和建立法治的普遍需求。其他选项错误地认为，对安全的需求源于人性、现代社会制造的危险或政府的操纵，而不是人的一生都处于弱势这一基本的生理现实。
question: Hvorfor anses trygghet som et universelt menneskelig behov, ifølge kapittelet?
answer: Fordi ingen enkeltperson har tilstrekkelig styrke til å sikre sin egen beskyttelse gjennom hele livet
wrong_answers:
  - Fordi mennesker er naturlig aggressive og trenger beskyttelse mot sine egne voldelige instinkter
  - Fordi det moderne samfunnet har skapt kunstige farer som ikke eksisterte i primitive tider
  - Fordi myndighetene bevisst har gjort folk avhengige av statlig beskyttelse for politisk kontroll
explanation: |
  Kapittelet forklarer at trygghet er et universelt behov fordi selv den sterkeste person opplever perioder med sårbarhet gjennom livet. De var ikke sterke i barndommen, de vil ikke være sterke i alderdommen, og selv når de er på topp, vil de oppleve perioder med svakhet under søvn, sykdom eller utmattelse. Denne iboende menneskelige sårbarheten skaper et universelt behov for kollektiv sikkerhet og etablering av en rettsstat. De andre alternativene antyder feilaktig at behovet for sikkerhet stammer fra menneskets natur, det moderne samfunnets skapelse av farer eller myndighetenes manipulasjon, snarere enn den grunnleggende biologiske realiteten at mennesket er sårbart gjennom hele livet.
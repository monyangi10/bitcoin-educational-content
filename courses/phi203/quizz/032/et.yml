question: Miks peetakse peatüki kohaselt turvalisust universaalseks inimvajaduseks?
answer: Kuna ühelgi inimesel ei ole piisavalt jõudu, et tagada oma kaitse kogu elu jooksul
wrong_answers:
  - Kuna inimesed on loomupäraselt agressiivsed ja vajavad kaitset oma vägivaldsete instinktide eest
  - Sest tänapäeva ühiskond on loonud kunstlikud ohud, mida algusaegadel ei olnud
  - Kuna valitsused on tahtlikult muutnud inimesed sõltuvaks riigikaitsest, et saavutada poliitiline kontroll
explanation: |
  Peatükis selgitatakse, et turvalisus on universaalne vajadus, sest isegi kõige tugevam inimene kogeb elu jooksul haavatavuse perioode. Nad ei olnud tugevad lapsepõlves, ei ole tugevad ka vanaduspõlves ja isegi tugevuse tipphetkedel seisavad nad silmitsi nõrkushetkedega une, haiguse või väsimuse ajal. See inimese loomupärane haavatavus tekitab universaalse vajaduse kollektiivse julgeoleku ja õigusriigi kehtestamise järele. Teised valikud viitavad ekslikult sellele, et vajadus turvalisuse järele tuleneb pigem inimloomusest, kaasaegse ühiskonna poolt loodud ohtudest või valitsuse manipuleerimisest kui inimese bioloogilisest haavatavusest kogu eluea jooksul.
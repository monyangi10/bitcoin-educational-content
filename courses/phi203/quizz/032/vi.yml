question: Theo chương này, tại sao an ninh được coi là một nhu cầu thiết yếu của con người?
answer: Bởi vì không một cá nhân nào có đủ sức mạnh để tự bảo vệ mình suốt cả cuộc đời.
wrong_answers:
  - Vì con người vốn dĩ hung hăng và cần được bảo vệ khỏi bản năng bạo lực của chính mình.
  - Bởi vì xã hội hiện đại đã tạo ra những mối nguy hiểm nhân tạo mà không hề tồn tại trong thời kỳ nguyên thủy.
  - Bởi vì các chính phủ đã cố tình khiến người dân phụ thuộc vào sự bảo hộ của nhà nước để kiểm soát chính trị.
explanation: |
  Chương này giải thích rằng an ninh là một nhu cầu phổ quát bởi vì ngay cả người mạnh mẽ nhất cũng trải qua những giai đoạn dễ bị tổn thương trong suốt cuộc đời. Họ không mạnh mẽ khi còn nhỏ, sẽ không mạnh mẽ khi về già, và ngay cả khi ở đỉnh cao sức mạnh cũng phải đối mặt với những khoảnh khắc yếu đuối trong khi ngủ, khi ốm đau hoặc khi mệt mỏi. Sự dễ bị tổn thương vốn có của con người tạo ra nhu cầu phổ quát về an ninh tập thể và việc thiết lập pháp quyền. Các lựa chọn khác cho rằng nhu cầu an ninh xuất phát từ bản chất con người, do xã hội hiện đại tạo ra các mối nguy hiểm, hoặc do sự thao túng của chính phủ, chứ không phải từ thực tế sinh học cơ bản về sự dễ bị tổn thương của con người trong suốt cuộc đời.
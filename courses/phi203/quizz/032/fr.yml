question: Selon le chapitre, pourquoi la sécurité est-elle considérée comme un besoin humain universel ?
answer: Parce qu'aucun individu ne dispose d'une force suffisante pour assurer sa propre protection tout au long de sa vie
wrong_answers:
  - Parce que les êtres humains sont naturellement agressifs et ont besoin d'être protégés contre leurs propres instincts violents
  - La société moderne a créé des dangers artificiels qui n'existaient pas à l'époque primitive
  - Parce que les gouvernements ont délibérément rendu les gens dépendants de la protection de l'État pour le contrôle politique
explanation: |
  Le chapitre explique que la sécurité est un besoin universel, car même les personnes les plus fortes connaissent des périodes de vulnérabilité tout au long de leur vie. Elle n'était pas forte dans son enfance, ne le sera pas dans sa vieillesse et, même au sommet de sa forme, elle connaîtra des moments de faiblesse pendant le sommeil, la maladie ou la fatigue. Cette vulnérabilité humaine inhérente crée un besoin universel de sécurité collective et d'établissement de l'État de droit. Les autres options suggèrent à tort que le besoin de sécurité découle de la nature humaine, de la création de dangers par la société moderne ou de la manipulation par le gouvernement, plutôt que de la réalité biologique fondamentale de la vulnérabilité humaine tout au long de la vie.

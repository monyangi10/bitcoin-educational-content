question: Menurut bab ini, mengapa keamanan dianggap sebagai kebutuhan universal manusia?
answer: Karena tidak ada individu yang memiliki kekuatan yang cukup untuk memastikan perlindungan mereka sendiri sepanjang hidup mereka
wrong_answers:
  - Karena manusia secara alami agresif dan membutuhkan perlindungan dari naluri kekerasan mereka sendiri
  - Karena masyarakat modern telah menciptakan bahaya buatan yang tidak ada di zaman primitif
  - Karena pemerintah sengaja membuat masyarakat bergantung pada perlindungan negara untuk kontrol politik
explanation: |
  Bab ini menjelaskan bahwa rasa aman adalah kebutuhan universal karena orang yang paling kuat sekalipun akan mengalami masa-masa kerentanan sepanjang hidupnya. Mereka tidak kuat di masa kanak-kanak, tidak akan kuat di masa tua, dan bahkan pada saat puncak kekuatannya pun akan mengalami masa-masa lemah saat tidur, sakit, atau kelelahan. Kerentanan yang melekat pada manusia ini menciptakan kebutuhan universal akan keamanan kolektif dan penegakan supremasi hukum. Pilihan-pilihan lain secara keliru menyatakan bahwa kebutuhan akan keamanan berasal dari sifat alamiah manusia, penciptaan bahaya oleh masyarakat modern, atau manipulasi pemerintah, dan bukan dari realitas biologis mendasar dari kerentanan manusia sepanjang masa.
question: Согласно главе, почему безопасность считается универсальной потребностью человека?
answer: Потому что ни один человек не обладает достаточной силой, чтобы обеспечить себе защиту на протяжении всей жизни
wrong_answers:
  - Потому что люди от природы агрессивны и нуждаются в защите от своих собственных инстинктов насилия
  - Потому что современное общество создало искусственные опасности, которых не существовало в первобытные времена
  - Потому что правительства намеренно сделали людей зависимыми от государственной защиты и политического контроля
explanation: |
  В главе объясняется, что безопасность - это универсальная потребность, потому что даже самый сильный человек испытывает периоды уязвимости на протяжении всей своей жизни. Они не были сильными в детстве, не будут сильными в старости, и даже на пике силы сталкиваются с моментами слабости во время сна, болезни или усталости. Эта врожденная уязвимость человека порождает универсальную потребность в коллективной безопасности и установлении верховенства закона. Другие варианты неверно предполагают, что потребность в безопасности обусловлена человеческой природой, созданием опасностей современным обществом или манипуляциями правительства, а не фундаментальной биологической реальностью уязвимости человека на протяжении всей жизни.
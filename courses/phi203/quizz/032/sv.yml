question: Enligt kapitlet, varför anses säkerhet vara ett universellt mänskligt behov?
answer: Eftersom ingen individ har tillräcklig styrka för att garantera sitt eget skydd under hela sitt liv
wrong_answers:
  - Eftersom människor är naturligt aggressiva och behöver skyddas från sina egna våldsamma instinkter
  - Eftersom det moderna samhället har skapat artificiella faror som inte existerade under primitiva tider
  - Eftersom regeringar medvetet har gjort människor beroende av statligt skydd för politisk kontroll
explanation: |
  I kapitlet förklaras att trygghet är ett universellt behov eftersom även den starkaste person upplever perioder av sårbarhet under hela livet. De var inte starka i barndomen, kommer inte att vara starka på ålderns höst och även när de är som starkast kommer de att uppleva perioder av svaghet under sömn, sjukdom eller trötthet. Denna inneboende mänskliga sårbarhet skapar ett universellt behov av kollektiv säkerhet och upprättande av rättsstatliga principer. De andra alternativen antyder felaktigt att behovet av säkerhet härrör från den mänskliga naturen, det moderna samhällets skapande av faror eller regeringens manipulation, snarare än den grundläggande biologiska verkligheten med mänsklig sårbarhet under hela livet.
question: Hvorfor klarer ikke marxistiske klassekategorier å beskrive moderne kapitalistiske samfunn på en presis måte, ifølge Paul Leroy-Beaulieus analyse?
answer: Fordi velstående kunstnere, idrettsutøvere og intellektuelle ville bli klassifisert som proletarer til tross for sine høye inntekter, noe som avslører det absurde i eierskapsbaserte klassedefinisjoner
wrong_answers:
  - Fordi moderne samfunn har eliminert alle former for økonomisk ulikhet og klasseskiller gjennom progressiv beskatning og sosiale velferdsprogrammer
  - Fordi borgerskapet har lykkes med å skjule sitt eierskap til produksjonsmidlene gjennom komplekse selskapsstrukturer og finansielle instrumenter
  - Fordi den teknologiske utviklingen har gjort fysisk arbeid overflødig, noe som gjør skillet mellom arbeider og eier meningsløst i postindustrielle økonomier
explanation: |
  Leroy-Beaulieu demonstrerer det meningsløse i marxistiske klassekategorier ved å vise at de er logisk inkonsekvente når de anvendes på virkelige situasjoner. Rike kunstnere, berømte fotballspillere, journalister og advokater ville alle blitt klassifisert som proletarer i henhold til marxistisk teori, siden de ikke eier produksjonsmidlene sine, til tross for deres rikdom og status. Dette viser hvordan eierskapsbaserte klassedefinisjoner ikke klarer å fange opp kompleksiteten i moderne samfunn, der verdiskapningen i økende grad avhenger av intellektuelt arbeid og individuelt talent snarere enn av kapitaleierskap.
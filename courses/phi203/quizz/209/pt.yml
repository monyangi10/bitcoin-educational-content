question: De acordo com a análise de Paul Leroy-Beaulieu, porque é que as categorias de classe marxistas não descrevem corretamente as sociedades capitalistas modernas?
answer: Porque os artistas, atletas e intelectuais ricos seriam classificados como proletários apesar dos seus rendimentos elevados, revelando o absurdo das definições de classe baseadas na propriedade
wrong_answers:
  - Porque as sociedades modernas eliminaram todas as formas de desigualdade económica e distinções de classe através de impostos progressivos e programas de bem-estar social
  - Porque a burguesia conseguiu esconder a sua propriedade dos meios de produção através de estruturas empresariais e instrumentos financeiros complexos
  - Porque o avanço tecnológico tornou o trabalho físico obsoleto, tornando a distinção entre trabalhador e proprietário sem sentido nas economias pós-industriais
explanation: |
  Leroy-Beaulieu demonstra a futilidade das categorias de classe marxistas, mostrando as suas inconsistências lógicas quando aplicadas a situações reais. Artistas ricos, futebolistas famosos, jornalistas e advogados seriam todos classificados como proletários de acordo com a teoria marxista, uma vez que não são proprietários dos seus meios de produção, apesar da sua riqueza e estatuto. Isto revela como as definições de classe baseadas na propriedade não conseguem captar a complexidade das sociedades modernas, onde a criação de valor depende cada vez mais do trabalho intelectual e do talento individual e não da propriedade do capital.
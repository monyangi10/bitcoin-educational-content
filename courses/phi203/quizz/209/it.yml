question: Secondo l'analisi di Paul Leroy-Beaulieu, perché le categorie di classe marxiste non riescono a descrivere accuratamente le moderne società capitalistiche?
answer: Perché gli artisti, gli atleti e gli intellettuali ricchi sarebbero classificati come proletari nonostante i loro alti redditi, rivelando l'assurdità delle definizioni di classe basate sulla proprietà
wrong_answers:
  - Perché le società moderne hanno eliminato tutte le forme di disuguaglianza economica e le distinzioni di classe attraverso la tassazione progressiva e i programmi di assistenza sociale
  - Perché la borghesia è riuscita a nascondere la proprietà dei mezzi di produzione attraverso complesse strutture societarie e strumenti finanziari
  - Perché il progresso tecnologico ha reso il lavoro fisico obsoleto, rendendo la distinzione tra lavoratore e proprietario priva di significato nelle economie post-industriali
explanation: |
  Leroy-Beaulieu dimostra l'inutilità delle categorie di classe marxiste mostrandone le incongruenze logiche quando vengono applicate a situazioni reali. Artisti ricchi, calciatori famosi, giornalisti e avvocati sarebbero tutti classificati come proletari secondo la teoria marxista, poiché non possiedono i mezzi di produzione, nonostante la loro ricchezza e il loro status. Questo rivela come le definizioni di classe basate sulla proprietà non riescano a cogliere la complessità delle società moderne, dove la creazione di valore dipende sempre più dal lavoro intellettuale e dal talento individuale piuttosto che dalla proprietà del capitale.
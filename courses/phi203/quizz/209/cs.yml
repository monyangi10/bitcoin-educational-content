question: Proč podle analýzy Paula Leroy-Beaulieua marxistické třídní kategorie nedokážou přesně popsat moderní kapitalistické společnosti?
answer: Protože bohatí umělci, sportovci a intelektuálové by byli navzdory svým vysokým příjmům klasifikováni jako proletáři, což odhaluje absurditu třídních definic založených na vlastnictví
wrong_answers:
  - Protože moderní společnosti odstranily všechny formy ekonomické nerovnosti a třídních rozdílů díky progresivnímu zdanění a programům sociálního zabezpečení
  - Protože buržoazie úspěšně skrývá své vlastnictví výrobních prostředků prostřednictvím složitých korporátních struktur a finančních nástrojů
  - Protože technologický pokrok učinil fyzickou práci zastaralou, čímž v postindustriálních ekonomikách ztratil smysl rozdíl mezi dělníkem a vlastníkem
explanation: |
  Leroy-Beaulieu demonstruje nesmyslnost marxistických třídních kategorií tím, že ukazuje jejich logické rozpory při aplikaci na reálné situace. Bohatí umělci, slavní fotbalisté, novináři a právníci by podle marxistické teorie byli klasifikováni jako proletáři, protože navzdory svému bohatství a postavení nevlastní výrobní prostředky. To ukazuje, jak třídní definice založené na vlastnictví nedokážou postihnout složitost moderních společností, kde tvorba hodnot stále více závisí na intelektuální práci a individuálním talentu, nikoli na vlastnictví kapitálu.
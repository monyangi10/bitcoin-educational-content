question: Waarom slagen marxistische klassencategorieën er volgens de analyse van Paul Leroy-Beaulieu niet in om moderne kapitalistische samenlevingen accuraat te beschrijven?
answer: Omdat rijke artiesten, atleten en intellectuelen ondanks hun hoge inkomen als proletariërs zouden worden geclassificeerd, wat de absurditeit van op eigendom gebaseerde klassedefinities onthult
wrong_answers:
  - Omdat moderne samenlevingen alle vormen van economische ongelijkheid en klassenonderscheid hebben uitgebannen door progressieve belastingen en sociale welvaartsprogramma's
  - Omdat de bourgeoisie met succes haar eigendom van productiemiddelen verborgen heeft gehouden via complexe bedrijfsstructuren en financiële instrumenten
  - Omdat technologische vooruitgang fysieke arbeid overbodig heeft gemaakt, waardoor het onderscheid arbeider-eigenaar zinloos is geworden in postindustriële economieën
explanation: |
  Leroy-Beaulieu toont de nutteloosheid van marxistische klassencategorieën door hun logische inconsistenties aan te tonen wanneer ze worden toegepast op echte situaties. Rijke artiesten, beroemde voetballers, journalisten en advocaten zouden volgens de marxistische theorie allemaal als proletariërs worden geclassificeerd omdat ze hun productiemiddelen niet bezitten, ondanks hun rijkdom en status. Dit laat zien hoe op eigendom gebaseerde klassedefinities de complexiteit van moderne samenlevingen niet vatten waar waardecreatie steeds meer afhangt van intellectueel werk en individueel talent in plaats van kapitaalbezit.
question: According to Paul Leroy-Beaulieu's analysis, why do Marxist class categories fail to accurately describe modern capitalist societies?
answer: Because wealthy artists, athletes, and intellectuals would be classified as proletarians despite their high incomes, revealing the absurdity of ownership-based class definitions
wrong_answers:
  - Because modern societies have eliminated all forms of economic inequality and class distinctions through progressive taxation and social welfare programs
  - Because the bourgeoisie has successfully hidden their ownership of production means through complex corporate structures and financial instruments
  - Because technological advancement has made physical labor obsolete, rendering the worker-owner distinction meaningless in post-industrial economies
explanation: |
  Leroy-Beaulieu demonstrates the futility of Marxist class categories by showing their logical inconsistencies when applied to real situations. Rich artists, famous footballers, journalists, and lawyers would all be classified as proletarians under Marxist theory since they don't own their means of production, despite their wealth and status. This reveals how ownership-based class definitions fail to capture the complexity of modern societies where value creation increasingly depends on intellectual work and individual talent rather than capital ownership.

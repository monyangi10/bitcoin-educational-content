question: Согласно анализу Поля Леруа-Болье, почему марксистские классовые категории не могут точно описать современные капиталистические общества?
answer: Потому что богатые художники, спортсмены и интеллектуалы, несмотря на высокие доходы, были бы причислены к пролетариям, что показывает абсурдность классовых определений, основанных на собственности
wrong_answers:
  - Потому что современные общества устранили все формы экономического неравенства и классовых различий благодаря прогрессивному налогообложению и программам социального обеспечения
  - Потому что буржуазия успешно скрывает свою собственность на средства производства с помощью сложных корпоративных структур и финансовых инструментов
  - Потому что технический прогресс сделал физический труд устаревшим, что делает различие между рабочим и владельцем бессмысленным в постиндустриальных экономиках
explanation: |
  Леруа-Болье демонстрирует бесполезность марксистских классовых категорий, показывая их логическую несостоятельность в применении к реальным ситуациям. Богатые художники, знаменитые футболисты, журналисты и адвокаты, согласно марксистской теории, классифицировались бы как пролетарии, поскольку, несмотря на свое богатство и статус, они не владеют средствами производства. Это показывает, как классовые определения, основанные на собственности, не отражают сложности современных обществ, где создание стоимости все больше зависит от интеллектуального труда и индивидуальных талантов, а не от владения капиталом.
question: Kulingana na uchambuzi wa Paul Leroy-Beaulieu, kwa nini kategoria za matabaka ya Marx zinashindwa kuelezea kwa usahihi jamii za kisasa za kibepari?
answer: Kwa sababu wasanii matajiri, wanariadha, na wasomi wangeainishwa kama wafanya kazi licha ya mapato yao ya juu, na kufichua upuuzi wa ufafanuzi wa kitabaka unaotegemea umiliki.
wrong_answers:
  - Kwa sababu jamii za kisasa zimeondoa aina zote za ukosefu wa usawa wa kiuchumi na tofauti za kitabaka kupitia programu za kodi zinazoendelea na ustawi wa jamii.
  - Kwa sababu mabepari wamefanikiwa kuficha umiliki wao wa njia za uzalishaji kupitia miundo tata ya makampuni na vyombo vya kifedha
  - Kwa sababu maendeleo ya kiteknolojia yamefanya kazi ya kimwili kuwa ya kizamani, na kufanya tofauti ya mfanyakazi na mmiliki kutokuwa na maana katika uchumi wa baada ya viwanda
explanation: |
  Leroy-Beaulieu anaonyesha ubatili wa kategoria za tabaka za Marx kwa kuonyesha kutofautiana kwao kimantiki kunapotumika katika hali halisi. Wasanii matajiri, wanasoka maarufu, waandishi wa habari, na wanasheria wote wangeainishwa kama wafanya kazi chini ya nadharia ya Marx kwa kuwa hawamiliki njia zao za uzalishaji, licha ya utajiri na hadhi yao. Hii inaonyesha jinsi fasili za tabaka zinazotegemea umiliki zinavyoshindwa kukamata ugumu wa jamii za kisasa ambapo uundaji wa thamani unategemea zaidi kazi ya kiakili na kipaji cha mtu binafsi badala ya umiliki wa mtaji.
question: Theo phân tích của Paul Leroy-Beaulieu, tại sao các phạm trù giai cấp của chủ nghĩa Mác lại không thể mô tả chính xác các xã hội tư bản hiện đại?
answer: Bởi vì những nghệ sĩ, vận động viên và trí thức giàu có sẽ bị xếp vào tầng lớp vô sản bất chấp thu nhập cao của họ, điều này cho thấy sự phi lý của các định nghĩa giai cấp dựa trên quyền sở hữu.
wrong_answers:
  - Bởi vì các xã hội hiện đại đã xóa bỏ mọi hình thức bất bình đẳng kinh tế và phân biệt giai cấp thông qua thuế lũy tiến và các chương trình phúc lợi xã hội.
  - Bởi vì giai cấp tư sản đã che giấu thành công quyền sở hữu các phương tiện sản xuất thông qua các cấu trúc doanh nghiệp phức tạp và các công cụ tài chính.
  - Do sự tiến bộ công nghệ đã khiến lao động chân tay trở nên lỗi thời, làm cho sự phân biệt giữa người lao động và chủ sở hữu trở nên vô nghĩa trong các nền kinh tế hậu công nghiệp.
explanation: |
  Leroy-Beaulieu chứng minh sự vô ích của các phạm trù giai cấp Mác-xít bằng cách chỉ ra những mâu thuẫn logic của chúng khi áp dụng vào các tình huống thực tế. Các nghệ sĩ giàu có, cầu thủ bóng đá nổi tiếng, nhà báo và luật sư đều được xếp vào tầng lớp vô sản theo lý thuyết Mác-xít vì họ không sở hữu tư liệu sản xuất, bất chấp sự giàu có và địa vị của họ. Điều này cho thấy các định nghĩa giai cấp dựa trên quyền sở hữu đã không thể nắm bắt được sự phức tạp của xã hội hiện đại, nơi việc tạo ra giá trị ngày càng phụ thuộc vào lao động trí tuệ và tài năng cá nhân hơn là quyền sở hữu vốn.
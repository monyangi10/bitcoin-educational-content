question: Prema analizi Paula Leroy-Beaulieua, zašto marksističke klasne kategorije ne uspevaju da precizno opišu moderna kapitalistička društva?
answer: Zato što bi bogati umetnici, sportisti i intelektualci bili klasifikovani kao proletarijat uprkos svojim visokim prihodima, što otkriva apsurdnost definicija klasa zasnovanih na vlasništvu
wrong_answers:
  - Zato što su moderna društva eliminisala sve oblike ekonomske nejednakosti i klasnih razlika kroz progresivno oporezivanje i programe socijalne zaštite
  - Zato što je buržoazija uspešno sakrila svoje vlasništvo nad sredstvima za proizvodnju kroz složene korporativne strukture i finansijske instrumente
  - Zbog toga što je tehnološki napredak učinio fizički rad zastarelim, čineći razliku između radnika i vlasnika besmislenom u postindustrijskim ekonomijama
explanation: |
  Leroy-Beaulieu pokazuje uzaludnost marksističkih klasnih kategorija prikazujući njihove logičke nedoslednosti kada se primene na stvarne situacije. Bogati umetnici, poznati fudbaleri, novinari i advokati bi svi bili klasifikovani kao proletarijat prema marksističkoj teoriji, jer ne poseduju sredstva za proizvodnju, uprkos njihovom bogatstvu i statusu. Ovo otkriva kako definicije klasa zasnovane na vlasništvu ne uspevaju da obuhvate složenost modernih društava gde stvaranje vrednosti sve više zavisi od intelektualnog rada i individualnog talenta, a ne od vlasništva nad kapitalom.
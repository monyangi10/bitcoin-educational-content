question: Enligt Paul Leroy-Beaulieus analys, varför lyckas inte marxistiska klasskategorier beskriva moderna kapitalistiska samhällen på ett korrekt sätt?
answer: Eftersom rika konstnärer, idrottare och intellektuella skulle klassificeras som proletärer trots sina höga inkomster, vilket avslöjar absurditeten i ägandebaserade klassdefinitioner
wrong_answers:
  - Eftersom moderna samhällen har eliminerat alla former av ekonomisk ojämlikhet och klasskillnader genom progressiv beskattning och sociala välfärdsprogram
  - Eftersom borgarklassen framgångsrikt har dolt sitt ägande av produktionsmedlen genom komplexa företagsstrukturer och finansiella instrument
  - Eftersom tekniska framsteg har gjort fysiskt arbete föråldrat, vilket gör skillnaden mellan arbetare och ägare meningslös i postindustriella ekonomier
explanation: |
  Leroy-Beaulieu visar hur meningslösa de marxistiska klasskategorierna är genom att påvisa deras logiska inkonsekvenser när de tillämpas på verkliga situationer. Rika konstnärer, kända fotbollsspelare, journalister och advokater skulle alla klassificeras som proletärer enligt marxistisk teori eftersom de inte äger sina produktionsmedel, trots sin rikedom och status. Detta visar hur ägandebaserade klassdefinitioner misslyckas med att fånga komplexiteten i moderna samhällen där värdeskapande i allt högre grad beror på intellektuellt arbete och individuell talang snarare än kapitalägande.
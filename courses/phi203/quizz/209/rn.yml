question: Dukurikije icegeranyo ca Paul Leroy-Beaulieu, ni kuki imigwi y’abantu b’abanyamarxiste idashobora kudondora neza imibano y’abanyagihugu bo muri iki gihe?
answer: Kubera ko abahinga mu vy’ubuhinga bw’amasanamu, abakinnyi n’abanyabwenge batunze boshirwa mu rutonde rw’abanyagihugu naho boba bafise amahera menshi, ivyo bikaba bihishura ubupfu bw’insobanuro z’imigwi ishingiye ku butunzi .
wrong_answers:
  - Kubera ko imibano yo muri iki gihe yakuyeho ubwoko bwose bw’ubusumbasumbane mu vy’ubutunzi be n’itandukaniro ry’imigwi biciye ku misoro itera imbere be n’imigambi yo gufasha abantu .
  - Kubera ko abatunzi bashoboye guhisha uburenganzira bwabo bwo guhingura ibintu biciye mu mibumbe y’amashirahamwe n’ibikoresho vy’amahera bikomeye .
  - Kubera ko uguterimbere kw’ubuhinga bwa none kwatumye igikorwa c’umubiri kidakoreshwa, ivyo bikaba vyatumye itandukaniro hagati y’umukozi n’umunyabubasha ritagira ico rivuze mu bihugu vy’ubutunzi bwakurikiye amahinguriro .
explanation: |
  Leroy-Beaulieu yerekana ubusa bw’ibice vy’imigwi y’abanyamarxiste mu kwerekana ukuntu bidahuye mu buryo bubereye iyo bikoreshejwe mu bihe vy’ukuri. Abanyabugenegene b’abatunzi, abakinyi b’umupira w’amaguru bazwi cane, abanyamakuru, n’abavoka bose boshirwa mu rutonde rw’abanyagihugu b’abanyagihugu (proletariats) mu vyiyumviro vya Marx kuko batagira uburyo bwo gukora, naho bafise ubutunzi n’icubahiro. Ivyo birerekana ingene insobanuro z’imigwi zishingiye ku butunzi zidashobora gufata uburemere bw’imibano ya none aho uguhingura agaciro bigenda birushiriza kuva ku bikorwa vy’ubwenge n’ubuhinga bw’umuntu ku giti ciwe aho gushingira ku butunzi bw’umutungo kamere.
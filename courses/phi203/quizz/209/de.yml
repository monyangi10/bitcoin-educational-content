question: Warum, so die Analyse von Paul Leroy-Beaulieu, sind die marxistischen Klassenkategorien nicht in der Lage, moderne kapitalistische Gesellschaften genau zu beschreiben?
answer: Denn reiche Künstler, Sportler und Intellektuelle würden trotz ihres hohen Einkommens als Proletarier eingestuft werden, was die Absurdität von besitzbasierten Klassendefinitionen offenbart
wrong_answers:
  - Weil moderne Gesellschaften alle Formen von wirtschaftlicher Ungleichheit und Klassenunterschieden durch progressive Besteuerung und Sozialhilfeprogramme beseitigt haben
  - Weil die Bourgeoisie ihr Eigentum an den Produktionsmitteln durch komplexe Unternehmensstrukturen und Finanzinstrumente erfolgreich versteckt hat
  - Weil der technologische Fortschritt körperliche Arbeit überflüssig gemacht hat und die Unterscheidung zwischen Arbeitnehmern und Eigentümern in postindustriellen Volkswirtschaften bedeutungslos geworden ist
explanation: |
  Leroy-Beaulieu demonstriert die Sinnlosigkeit der marxistischen Klassenkategorien, indem er ihre logischen Widersprüche aufzeigt, wenn sie auf reale Situationen angewendet werden. Reiche Künstler, berühmte Fußballer, Journalisten und Anwälte würden nach der marxistischen Theorie alle als Proletarier eingestuft, da sie trotz ihres Reichtums und ihres Status nicht Eigentümer ihrer Produktionsmittel sind. Dies zeigt, wie eigentumsbasierte Klassendefinitionen der Komplexität moderner Gesellschaften nicht gerecht werden, in denen die Wertschöpfung zunehmend von intellektueller Arbeit und individuellem Talent abhängt und nicht vom Kapitalbesitz.
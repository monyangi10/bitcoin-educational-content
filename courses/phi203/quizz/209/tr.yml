question: Paul Leroy-Beaulieu'nun analizine göre, Marksist sınıf kategorileri modern kapitalist toplumları doğru bir şekilde tanımlamakta neden başarısız olmaktadır?
answer: Çünkü zengin sanatçılar, sporcular ve entelektüeller yüksek gelirlerine rağmen proleter olarak sınıflandırılacak ve mülkiyete dayalı sınıf tanımlarının saçmalığı ortaya çıkacaktır
wrong_answers:
  - Çünkü modern toplumlar, artan oranlı vergilendirme ve sosyal refah programları yoluyla her türlü ekonomik eşitsizliği ve sınıf ayrımını ortadan kaldırmıştır
  - Çünkü burjuvazi, karmaşık kurumsal yapılar ve finansal araçlar aracılığıyla üretim araçlarının mülkiyetini başarılı bir şekilde gizlemiştir
  - Çünkü teknolojik ilerleme fiziksel emeği geçersiz kılmış ve sanayi-sonrası ekonomilerde işçi-sahip ayrımını anlamsız hale getirmiştir
explanation: |
  Leroy-Beaulieu, gerçek durumlara uygulandığında mantıksal tutarsızlıklarını göstererek Marksist sınıf kategorilerinin yararsızlığını ortaya koymaktadır. Zengin sanatçılar, ünlü futbolcular, gazeteciler ve avukatlar, zenginliklerine ve statülerine rağmen üretim araçlarına sahip olmadıkları için Marksist teoriye göre proleter olarak sınıflandırılacaklardır. Bu durum, mülkiyete dayalı sınıf tanımlarının, değer yaratmanın giderek sermaye sahipliğinden ziyade entelektüel çalışma ve bireysel yeteneğe bağlı olduğu modern toplumların karmaşıklığını yakalamakta nasıl başarısız olduğunu ortaya koymaktadır.
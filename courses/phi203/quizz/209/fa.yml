question: بر اساس تحلیل پل لروی-بولو، چرا دسته‌بندی‌های طبقاتی مارکسیستی نمی‌توانند به‌طور دقیق جوامع سرمایه‌داری مدرن را توصیف کنند؟
answer: زیرا هنرمندان، ورزشکاران و روشنفکران ثروتمند به عنوان پرولتاریا طبقه‌بندی می‌شوند، علیرغم درآمدهای بالای خود، که پوچی تعاریف طبقاتی مبتنی بر مالکیت را آشکار می‌کند.
wrong_answers:
  - زیرا جوامع مدرن با استفاده از مالیات‌گیری تصاعدی و برنامه‌های رفاه اجتماعی، تمامی اشکال نابرابری اقتصادی و تمایزات طبقاتی را از بین برده‌اند.
  - زیرا بورژوازی با موفقیت مالکیت خود بر وسایل تولید را از طریق ساختارهای پیچیده شرکتی و ابزارهای مالی پنهان کرده است
  - زیرا پیشرفت فناوری کار فیزیکی را منسوخ کرده و تمایز کارگر-مالک را در اقتصادهای پساصنعتی بی‌معنی کرده است
explanation: |
  لروی-بولو بیهودگی دسته‌بندی‌های طبقاتی مارکسیستی را با نشان دادن ناسازگاری‌های منطقی آن‌ها در موقعیت‌های واقعی به نمایش می‌گذارد. هنرمندان ثروتمند، فوتبالیست‌های مشهور، روزنامه‌نگاران و وکلا همگی تحت نظریه مارکسیستی به عنوان پرولتاریا طبقه‌بندی می‌شوند زیرا مالک وسایل تولید خود نیستند، علیرغم ثروت و جایگاهشان. این نشان می‌دهد که تعاریف طبقاتی مبتنی بر مالکیت نمی‌توانند پیچیدگی جوامع مدرن را که در آن خلق ارزش به طور فزاینده‌ای به کار فکری و استعداد فردی بستگی دارد نه مالکیت سرمایه، به درستی درک کنند.
question: 根據 Paul Leroy-Beaulieu 的分析，為什麼馬克思主義的階級分類無法準確描述現代資本主義社會？
answer: 因為富有的藝術家、運動員和知識分子儘管收入很高，卻會被歸類為無產階級，這揭示了以所有權為基礎的階級定義的荒謬性。
wrong_answers:
  - 因為現代社會已經透過累進稅和社會福利計畫，消除了所有形式的經濟不平等和階級差別
  - 因為資產階級透過複雜的企業結構和金融工具，成功地隱藏了他們對生產手段的所有權
  - 因為科技進步已使體力勞動變得過時，在後工業經濟體中，工人與擁有者的區別變得毫無意義。
explanation: |
  Leroy-Beaulieu 展示了馬克思主義階級分類在應用於現實情況時的邏輯不一致，從而證明這些分類是徒勞無功的。根據馬克思主義理論，富有的藝術家、著名足球運動員、新聞記者和律師都會被歸類為無產階級，因為儘管他們富有且有地位，但他們並不擁有自己的生產手段。這揭示了以所有權為基礎的階級定義如何無法捕捉到現代社會的複雜性，在現代社會中，價值的創造越來越依賴於智力勞動和個人才能，而非資本所有權。
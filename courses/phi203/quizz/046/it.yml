question: Secondo i pensatori liberali del XIX secolo, qual è la natura della libertà nel corso della storia?
answer: La libertà è una costruzione storica progressiva che si sviluppa gradualmente nel corso dei secoli
wrong_answers:
  - La libertà è uno stato naturale immutabile che l'uomo possedeva già nell'antichità
  - La libertà era massima nelle società primitive ed è diminuita con la civilizzazione
  - La libertà esiste allo stesso modo in tutti i periodi storici, indipendentemente dalle condizioni materiali
explanation: |
  I pensatori liberali del XIX secolo sostenevano che la libertà non è uno stato naturale di cui l'umanità ha goduto un tempo e che ha perso, ma piuttosto una costruzione storica progressiva che si sviluppa nel tempo. Questa visione si opponeva direttamente ai miti di un'età dell'oro in cui gli esseri umani avrebbero goduto della libertà originaria. Il capitolo spiega che ogni secolo porta miglioramenti tecnici ed economici che rendono la libertà più praticabile. Questa prospettiva aiuta a spiegare perché la libertà è più realizzabile oggi che nell'antichità, contraddicendo le nozioni romantiche di libertà primitiva o l'idea che la libertà sia rimasta costante nel corso della storia.
question: Jaka jest natura wolności na przestrzeni dziejów według liberalnych myślicieli XIX wieku?
answer: Wolność jest progresywną konstrukcją historyczną, która rozwija się stopniowo na przestrzeni wieków
wrong_answers:
  - Wolność jest naturalnym, niezmiennym stanem, który ludzie posiadali w czasach starożytnych
  - Wolność była największa w prymitywnych społeczeństwach i zmniejszyła się wraz z rozwojem cywilizacji
  - Wolność istnieje w równym stopniu we wszystkich okresach historycznych, niezależnie od warunków materialnych
explanation: |
  Liberalni myśliciele XIX wieku argumentowali, że wolność nie jest naturalnym stanem, którym ludzkość kiedyś się cieszyła i który utraciła, ale raczej postępującą historyczną konstrukcją, która rozwija się z czasem. Pogląd ten bezpośrednio sprzeciwiał się mitom o złotym wieku, w którym ludzie rzekomo cieszyli się pierwotną wolnością. Rozdział ten wyjaśnia, że każde stulecie przynosi techniczne i ekonomiczne ulepszenia, które czynią wolność bardziej praktyczną. Ta perspektywa pomaga wyjaśnić, dlaczego wolność jest dziś bardziej osiągalna niż w starożytności, zaprzeczając romantycznym wyobrażeniom o prymitywnej wolności lub idei, że wolność pozostała niezmienna przez całą historię.
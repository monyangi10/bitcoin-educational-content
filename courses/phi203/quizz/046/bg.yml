question: Според либералните мислители от XIX в. какъв е характерът на свободата в историята?
answer: Свободата е прогресивна историческа конструкция, която се развива постепенно през вековете
wrong_answers:
  - Свободата е естествено неизменно състояние, което хората са притежавали в древността
  - Свободата е била най-голяма в първобитните общества и е намаляла с цивилизацията
  - Свободата съществува еднакво във всички исторически периоди, независимо от материалните условия
explanation: |
  Либералните мислители от XIX в. твърдят, че свободата не е естествено състояние, на което човечеството някога се е наслаждавало и което е изгубило, а по-скоро прогресивна историческа конструкция, която се развива с течение на времето. Този възглед пряко се противопоставя на мита за златния век, когато хората уж се радвали на изначална свобода. В главата се обяснява, че всеки век носи технически и икономически подобрения, които правят свободата по-приложима на практика. Тази перспектива помага да се обясни защо днес свободата е по-постижима, отколкото в древността, като противоречи на романтичните представи за първобитна свобода или на идеята, че свободата е останала постоянна през цялата история.
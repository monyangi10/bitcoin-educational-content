question: 19세기 자유주의 사상가들에 따르면 역사상 자유의 본질은 무엇이었을까요?
answer: 자유는 수세기에 걸쳐 점진적으로 발전하는 점진적인 역사적 구성입니다
wrong_answers:
  - 자유는 고대로부터 인간이 가지고 있던 불변의 자연 상태입니다
  - 자유는 원시 사회에서 가장 컸고 문명과 함께 감소했습니다
  - 자유는 물질적 조건에 관계없이 모든 역사적 시대에 동등하게 존재합니다
explanation: |
  19세기 자유주의 사상가들은 자유란 인류가 한때 누렸다가 잃어버린 자연스러운 상태가 아니라 시간이 지남에 따라 발전하는 점진적인 역사적 구성물이라고 주장했습니다. 이러한 관점은 인간이 원초적 자유를 누렸다고 여겨지는 황금시대에 대한 신화에 정면으로 반박했습니다. 이 장에서는 각 세기마다 기술 및 경제적 발전으로 자유가 더욱 실현 가능해졌다고 설명합니다. 이러한 관점은 원시적 자유에 대한 낭만적 관념이나 자유가 역사적으로 변하지 않았다는 생각과 모순되는 오늘날의 자유가 고대보다 더 달성 가능한 이유를 설명하는 데 도움이 됩니다.
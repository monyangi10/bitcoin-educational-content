question: Milline on 19. sajandi liberaalsete mõtlejate arvates vabaduse olemus läbi ajaloo?
answer: Vabadus on progressiivne ajalooline konstruktsioon, mis areneb järk-järgult sajandite jooksul
wrong_answers:
  - Vabadus on loomulik muutumatu seisund, mida inimesed omasid iidsetel aegadel
  - Vabadus oli suurim primitiivsetes ühiskondades ja on tsivilisatsiooniga vähenenud
  - Vabadus eksisteerib võrdselt kõigil ajaloolistel perioodidel, sõltumata materiaalsetest tingimustest
explanation: |
  19. sajandi liberaalsed mõtlejad väitsid, et vabadus ei ole loomulik seisund, mida inimkond kunagi nautis ja mille ta siis kaotas, vaid pigem aja jooksul arenev ajalooline konstruktsioon. See seisukoht oli otseses vastuolus müütidega kuldsest ajastust, mil inimesed väidetavalt nautisid algset vabadust. Peatükis selgitatakse, et iga sajand toob kaasa tehnilisi ja majanduslikke täiustusi, mis muudavad vabaduse praktilisemaks. See vaatenurk aitab selgitada, miks vabadus on tänapäeval paremini saavutatav kui antiikajal, mis on vastuolus romantiliste arusaamadega primitiivsest vabadusest või ideega, et vabadus on läbi ajaloo püsinud muutumatuna.
question: Какова, по мнению либеральных мыслителей XIX века, природа свободы на протяжении всей истории человечества?
answer: Свобода - это прогрессивная историческая конструкция, которая постепенно развивается на протяжении веков
wrong_answers:
  - Свобода - это естественное неизменное состояние, которым люди обладали еще в древние времена
  - Свобода была наибольшей в первобытных обществах и уменьшилась с развитием цивилизации
  - Свобода существует одинаково во все исторические периоды, независимо от материальных условий
explanation: |
  Либеральные мыслители XIX века утверждали, что свобода - это не естественное состояние, которым человечество однажды насладилось и утратило, а скорее прогрессивная историческая конструкция, которая развивается с течением времени. Эта точка зрения напрямую противоречит мифам о золотом веке, когда люди якобы наслаждались первозданной свободой. В главе объясняется, что каждое столетие приносит технические и экономические усовершенствования, которые делают свободу более осуществимой. Эта точка зрения помогает объяснить, почему сегодня свобода более достижима, чем в древности, что противоречит романтическим представлениям о первобытной свободе или идее о том, что свобода остается неизменной на протяжении всей истории.
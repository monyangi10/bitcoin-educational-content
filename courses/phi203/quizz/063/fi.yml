question: Minkä historiallisen kehityssuuntauksen teksti tunnistaa teknisen kehityksen ja ihmisen vapauden välisestä suhteesta?
answer: Tekniset muutokset loivat vähitellen olosuhteet, jotka tekivät vapauden sekä mahdolliseksi että välttämättömäksi
wrong_answers:
  - Tekninen kehitys vahvisti johdonmukaisesti olemassa olevia valta- ja kontrollijärjestelmiä
  - Teknologisella kehityksellä ei ollut merkittävää vaikutusta yhteiskuntarakenteisiin tai ihmisten vapauteen
  - Tekninen kehitys hyödytti ensisijaisesti hallitsijoita vahvistamalla heidän valtaansa alamaisiin nähden
explanation: |
  Tekstissä todetaan selvästi, että tekniset muutokset muuttivat asteittain elinoloja, jolloin vapaus ei ollut ainoastaan mahdollista vaan myös välttämätöntä. Kun tuotanto muuttui älyllisemmäksi ja vaati luovuutta, vanhat vallankäyttöjärjestelmät, kuten orjuus, kävivät tarpeettomiksi. Tekstissä korostetaan, että vapaus ilmenee konkreettisena todellisuutena, joka on riippuvainen aineellisista ja yhteiskunnallisista olosuhteista, ei vain abstraktina ihanteena. Tekninen kehitys loi uusia mahdollisuuksia itsenäisyyteen ja teki aiemmin vapautta rajoittaneet instituutiot tarpeettomiksi, mikä osoittaa perustavanlaatuisen historiallisen suuntauksen kohti suurempaa inhimillistä vapautta.
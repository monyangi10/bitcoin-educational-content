question: De acordo com o texto, qual é a principal razão pela qual o alcoolismo serve como exemplo de uso auto-destrutivo da liberdade?
answer: Diminui progressivamente a capacidade de liberdade do indivíduo, criando dependência e reduzindo as suas faculdades mentais
wrong_answers:
  - Elimina imediatamente qualquer escolha pessoal e elimina o livre arbítrio a partir do momento do primeiro consumo
  - Prejudica principalmente a sociedade, aumentando as taxas de criminalidade e reduzindo a produtividade económica das comunidades
  - Viola os contratos sociais ao obrigar os outros a suportar os encargos financeiros dos cuidados de saúde e de reabilitação
explanation: |
  O texto explica especificamente que o alcoolismo começa como um ato livre, mas diminui progressivamente a liberdade do indivíduo, criando dependência e reduzindo as suas faculdades, a sua vontade e as suas capacidades mentais. Isto torna-o menos capaz de utilizar as suas capacidades de uma forma esclarecida. As respostas erradas centram-se na eliminação imediata da escolha, nos danos sociais ou nos encargos financeiros, que não são o foco principal da análise do texto sobre como o alcoolismo exemplifica a liberdade auto-destrutiva.
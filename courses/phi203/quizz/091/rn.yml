question: Dukurikije ico canditswe, ni imvo nyamukuru iyihe ituma ubusinzi buba akarorero k’ugukoresha umwidegemvyo mu buryo bwo kwihonya?
answer: Bigenda biragabanya ubushobozi bw’umuntu bwo kwidegemvya mu gutuma umuntu yisunga no kugabanya ubushobozi bwo mu mutwe .
wrong_answers:
  - Ubwo nyene bica bikuraho amahitamwo yose y’umuntu ku giti ciwe kandi bikakuraho umwidegemvyo wo kwihitiramwo kuva igihe umuntu abanza gufungura .
  - Bitera ingorane ahanini abantu mu kwongerera ubugizi bwa nabi no kugabanya umusaruro w’ubutunzi mu mibano .
  - Bica ku masezerano y’imibano mu guhatira abandi kwikorera umuzigo w’amahera y’ubuvuzi n’amahera yo gusubiza mu buryo .
explanation: |
  Ico canditswe kirasigura mu buryo budasanzwe yuko inzoga zitangura nk’igikorwa c’ubuntu ariko zigaca zigabanya buhorobuhoro umwidegemvyo w’umuntu mu gutuma umuntu yisunga abandi no kugabanya ubushobozi bwiwe, ubushake bwiwe n’ubushobozi bwo mu mutwe. Ivyo bituma badashobora gukoresha ubushobozi bwabo mu buryo bumurikiwe. Inyishu zitari zo zishimika ku gukuraho ubwo nyene amahitamwo, akaga mu kibano canke imitwaro y’amahera, ivyo bikaba atari vyo vyibandako cane mu gusesangura kw’ico canditswe ku kuntu inzoga zitanga akarorero k’umwidegemvyo wo kwihonya.
question: Согласно тексту, какова основная причина, по которой алкоголизм служит примером саморазрушительного использования свободы?
answer: Она постепенно уменьшает способность человека к свободе, создавая зависимость и снижая умственные способности
wrong_answers:
  - Он сразу же лишает человека выбора и уничтожает свободу воли с момента первого употребления
  - Он наносит вред обществу, в первую очередь повышая уровень преступности и снижая экономическую продуктивность сообществ
  - Она нарушает социальные договоры, заставляя других нести финансовое бремя расходов на здравоохранение и реабилитацию
explanation: |
  В тексте специально объясняется, что алкоголизм начинается как свободный поступок, но постепенно уменьшает свободу человека, вызывая зависимость и снижая его способности, силу воли и умственные возможности. Это делает их менее способными использовать свои способности просвещенным образом. Неправильные ответы сосредоточены на немедленном избавлении от выбора, вреде для общества или финансовом бремени, которые не являются основным предметом анализа в тексте о том, как алкоголизм служит примером саморазрушительной свободы.
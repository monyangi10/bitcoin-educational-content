question: Jaký je podle textu hlavní důvod, proč alkoholismus slouží jako příklad sebedestruktivního využívání svobody?
answer: Postupně snižuje schopnost svobody jedince tím, že vytváří závislost a omezuje duševní schopnosti
wrong_answers:
  - Okamžitě odstraňuje veškerou osobní volbu a eliminuje svobodnou vůli od okamžiku první konzumace
  - Škodí společnosti především tím, že zvyšuje kriminalitu a snižuje ekonomickou produktivitu komunit
  - Porušuje společenské smlouvy tím, že nutí ostatní nést finanční břemeno nákladů na zdravotní péči a rehabilitaci
explanation: |
  Text konkrétně vysvětluje, že alkoholismus začíná jako svobodný čin, ale postupně snižuje svobodu jedince tím, že vytváří závislost a snižuje jeho schopnosti, vůli a duševní schopnosti. Tím se snižuje schopnost používat své schopnosti osvíceným způsobem. Špatné odpovědi se zaměřují na okamžitou eliminaci volby, společenskou újmu nebo finanční zátěž, které nejsou hlavním předmětem analýzy textu, jak je alkoholismus příkladem sebedestruktivní svobody.
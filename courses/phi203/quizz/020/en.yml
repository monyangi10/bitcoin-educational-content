question: According to the text, what is the primary foundation of all economic freedom?
answer: Self-ownership
wrong_answers:
  - Property rights over land and resources
  - Freedom of trade and exchange
  - Individual need and personal interest
explanation: |
  Self-ownership is the first link in an unbroken chain: from sensation to judgment, from judgment to action, from action to production. Jules Simon demonstrated that the most complex economic notions, such as capital or freedom of labor, rest ultimately on simple human facts: free reflection and the ownership of one's own thought. Without recognizing the individual as owner of himself, it is impossible to legitimately conceive the ownership of material goods. Property rights over land, freedom of trade, and individual need are all important concepts, but they are presented as flowing from this more fundamental principle rather than being the primary foundation themselves.

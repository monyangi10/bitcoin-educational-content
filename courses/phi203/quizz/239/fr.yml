question: Selon la théorie politique libérale, qu'est-ce qui remplace le plus efficacement l'intervention de l'État dans les activités économiques et sociales ?
answer: Libre association, coopération volontaire et coordination fondée sur le marché par le biais de contrats et d'échanges
wrong_answers:
  - L'entrepreneuriat individuel agissant de manière indépendante sans aucune forme d'organisation ou de coordination collective
  - Structures gouvernementales décentralisées qui transfèrent les pouvoirs de l'État du niveau central au niveau administratif local
  - Guildes professionnelles et associations industrielles réglementées opérant sous la supervision et le contrôle de l'État
explanation: |
  La pensée libérale souligne que l'alternative à l'intervention de l'État n'est pas l'individualisme isolé, mais plutôt la coopération volontaire par le biais de la libre association, de l'entreprise privée et de la coordination du marché basée sur les contrats et l'échange. Le texte affirme explicitement que "ce n'est pas l'individu seul qui se substitue à l'État, mais la libre association et la coordination des forces individuelles fondées sur l'échange et le contrat". Cela distingue la théorie libérale du simple individualisme, de la décentralisation rejetée (qui ne fait que transférer le pouvoir de l'État) et des associations réglementées qui maintiennent le contrôle de l'État.

question: Dushingiye ku ciyumviro ca politike c’ubwigenge, ni igiki giserukira neza kuruta ibindi vyose gusubirira Leta mu bikorwa vy’ubutunzi n’imibano?
answer: Ishirahamwe ry'ubuntu, ubufatanye bw'ubushake, n'uguhuza ibikorwa bishingiye ku masoko biciye mu masezerano no guhanahana
wrong_answers:
  - Ubucuruzi bw'umuntu ku giti ciwe bukora bwigenga ata buryo na bumwe bwo gutegura canke guhuza ibikorwa
  - Inzego za Leta zitandukanye zijana ububasha bwa Leta kuva ku nzego za Leta zija ku rwego rw'ubutegetsi bw'intara
  - Amashirahamwe y'abahinga n'amashirahamwe y'inganda agenzurwa n'ubugenzuzi bwa Leta
explanation: |
  Iciyumviro c’ubwigenge gishimika ku vy’uko ubundi buryo bwo gufasha Leta atari ugushiramwo umuntu ku giti ciwe, ahubwo ni ugukorana n’abandi ku bushake biciye mu kwifatanya n’abandi, mu bikorwa vy’abikorera ku giti cabo, no mu guhuza isoko bishingiye ku masezerano no ku guhanahana amakuru. Ico canditswe kivuga neza yuko 'atari umuntu wenyene asubirira Leta, ariko ni ugushira hamwe n'uguhuza inguvu z'umuntu ku giti ciwe bishingiye ku guhanahana n'amasezerano.' Ivyo bitandukanya inyigisho y’ubwigenge n’ukwigira umuntu ku giti ciwe gusa, kwanka kwegereza ubutegetsi abaturage (bitanga gusa ububasha bwa Leta), n’amashirahamwe atunganijwe agumya ububasha bwa Leta.
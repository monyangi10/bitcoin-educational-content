question: Quelle analogie le texte établit-il entre l'acquisition historique de territoires par les tribus et l'acquisition de propriétés individuelles pour démontrer la légitimité de la propriété privée ?
answer: Tous deux impliquent la découverte, l'amélioration par le travail et la défense contre les menaces, ce qui rend les processus fondamentalement identiques dans leur justification
wrong_answers:
  - Dans les deux cas, un consensus collectif et l'approbation démocratique des habitants existants sont nécessaires pour établir des droits de propriété légitimes
  - Tous deux dépendent d'une reconnaissance juridique par les autorités établies et d'une documentation formelle pour créer des droits de propriété valables
  - Dans les deux cas, il est nécessaire de négocier pacifiquement et de dédommager les utilisateurs précédents plutôt que de recourir à une quelconque forme d'acquisition forcée
explanation: |
  Le texte établit un parallèle direct entre l'acquisition de territoires tribaux et les droits de propriété individuels, en soulignant que les deux impliquent la découverte de ressources inutilisées, l'amélioration par le travail (agriculture, infrastructure pour les tribus ; culture, développement pour les individus) et la défense contre les menaces extérieures. Cette analogie soutient l'argument libéral selon lequel si l'acquisition collective de la propriété par ces moyens est légitime, l'acquisition individuelle de la propriété par des processus identiques devrait l'être également. Les mauvaises réponses déforment la réalité historique décrite dans le texte, qui reconnaît que l'acquisition de territoires s'est souvent faite par la violence ou simplement par la première découverte, et non par un consensus démocratique, des formalités juridiques ou des négociations pacifiques.
question: ข้อความเปรียบเทียบการได้มาซึ่งดินแดนทางประวัติศาสตร์โดยชนเผ่ากับการได้มาซึ่งทรัพย์สินส่วนบุคคลเพื่อแสดงให้เห็นถึงความชอบธรรมของทรัพย์สินส่วนบุคคลอย่างไร?
answer: ทั้งสองเกี่ยวข้องกับการค้นพบ การปรับปรุงผ่านแรงงาน และการป้องกันภัยคุกคาม ทำให้กระบวนการมีความเหมือนกันโดยพื้นฐานในด้านการให้เหตุผล
wrong_answers:
  - ทั้งสองต้องการฉันทามติร่วมกันและการอนุมัติแบบประชาธิปไตยจากผู้อยู่อาศัยที่มีอยู่เพื่อสร้างข้อเรียกร้องความเป็นเจ้าของที่ถูกต้องตามกฎหมาย
  - ทั้งสองขึ้นอยู่กับการรับรองทางกฎหมายโดยหน่วยงานที่จัดตั้งขึ้นและเอกสารอย่างเป็นทางการเพื่อสร้างสิทธิในทรัพย์สินที่ถูกต้อง
  - ทั้งสองจำเป็นต้องมีการเจรจาอย่างสันติและการชดเชยให้กับผู้ใช้ก่อนหน้าแทนที่จะเป็นการได้มาซึ่งด้วยวิธีการบังคับใด ๆ
explanation: |
  ข้อความนี้สร้างความเชื่อมโยงโดยตรงระหว่างการได้มาซึ่งดินแดนของชนเผ่าและสิทธิในทรัพย์สินส่วนบุคคล โดยเน้นว่าทั้งสองเกี่ยวข้องกับการค้นพบทรัพยากรที่ไม่ได้ใช้ การปรับปรุงผ่านแรงงาน (การเกษตร โครงสร้างพื้นฐานสำหรับชนเผ่า; การเพาะปลูก การพัฒนาสำหรับบุคคล) และการป้องกันภัยคุกคามจากภายนอก อุปมาอุปไมยนี้สนับสนุนข้อโต้แย้งแบบเสรีนิยมว่าหากการได้มาซึ่งทรัพย์สินร่วมกันผ่านวิธีการเหล่านี้เป็นสิ่งที่ถูกต้องตามกฎหมาย การได้มาซึ่งทรัพย์สินส่วนบุคคลผ่านกระบวนการที่เหมือนกันก็ควรจะถูกต้องตามกฎหมายเช่นกัน คำตอบที่ผิดแสดงให้เห็นถึงความเป็นจริงทางประวัติศาสตร์ที่อธิบายไว้ในข้อความอย่างไม่ถูกต้อง ซึ่งยอมรับว่าการได้มาซึ่งดินแดนมักเกี่ยวข้องกับความรุนแรงหรือเพียงแค่การค้นพบครั้งแรก ไม่ใช่ฉันทามติทางประชาธิปไตย พิธีการทางกฎหมาย หรือการเจรจาอย่างสันติ
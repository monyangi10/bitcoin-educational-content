question: Welche Analogie zieht der Text zwischen dem historischen Erwerb von Territorium durch Stämme und dem individuellen Eigentumserwerb, um die Legitimität von Privateigentum zu demonstrieren?
answer: In beiden Fällen geht es um die Entdeckung, die Verbesserung durch Arbeit und die Abwehr von Bedrohungen, so dass die Prozesse in ihrer Begründung grundsätzlich identisch sind
wrong_answers:
  - Beide erfordern einen kollektiven Konsens und die demokratische Zustimmung der bestehenden Bewohner, um legitime Eigentumsansprüche zu begründen
  - Beide hängen von der rechtlichen Anerkennung durch etablierte Behörden und einer formellen Dokumentation ab, um gültige Eigentumsrechte zu schaffen
  - In beiden Fällen sind friedliche Verhandlungen und Entschädigungen für die bisherigen Nutzer erforderlich, nicht aber irgendeine Form der gewaltsamen Aneignung
explanation: |
  Der Text stellt eine direkte Parallele zwischen dem Erwerb von Stammesgebieten und individuellen Eigentumsrechten her und betont, dass beide die Entdeckung ungenutzter Ressourcen, die Verbesserung durch Arbeit (Landwirtschaft, Infrastruktur für Stämme; Anbau, Entwicklung für Einzelpersonen) und die Verteidigung gegen äußere Bedrohungen beinhalten. Diese Analogie stützt das liberale Argument, dass, wenn kollektiver Eigentumserwerb durch diese Mittel legitim ist, dann sollte individueller Eigentumserwerb durch identische Prozesse ebenfalls legitim sein. Die falschen Antworten geben die im Text beschriebene historische Realität falsch wieder, in der anerkannt wird, dass der Erwerb von Territorien oft mit Gewalt oder einfach mit der ersten Entdeckung einherging und nicht mit demokratischem Konsens, rechtlichen Formalitäten oder friedlichen Verhandlungen.
question: ¿Qué analogía establece el texto entre la adquisición histórica de territorio por parte de las tribus y la adquisición de propiedad individual para demostrar la legitimidad de la propiedad privada?
answer: Ambos implican el descubrimiento, la mejora mediante el trabajo y la defensa contra las amenazas, lo que hace que los procesos sean fundamentalmente idénticos en su justificación
wrong_answers:
  - Ambos requieren el consenso colectivo y la aprobación democrática de los habitantes existentes para establecer reivindicaciones legítimas de propiedad
  - Ambos dependen del reconocimiento legal por parte de las autoridades establecidas y de la documentación formal para crear derechos de propiedad válidos
  - Ambos requieren negociaciones pacíficas y compensaciones a los usuarios anteriores en lugar de cualquier forma de adquisición por la fuerza
explanation: |
  El texto establece un paralelismo directo entre la adquisición de territorio tribal y los derechos de propiedad individual, haciendo hincapié en que ambos implican el descubrimiento de recursos no utilizados, la mejora mediante el trabajo (agricultura, infraestructura para las tribus; cultivo, desarrollo para los individuos) y la defensa frente a amenazas externas. Esta analogía apoya el argumento liberal de que si la adquisición de propiedad colectiva por estos medios es legítima, entonces la adquisición de propiedad individual por procesos idénticos también debería ser legítima. Las respuestas erróneas tergiversan la realidad histórica descrita en el texto, que reconoce que la adquisición territorial a menudo implicaba violencia o simplemente el primer descubrimiento, no consenso democrático, formalidades legales o negociación pacífica.
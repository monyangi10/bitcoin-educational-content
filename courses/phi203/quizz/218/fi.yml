question: Millaisen analogian teksti vetää heimojen historiallisen aluepalautuksen ja yksilön omaisuuden hankinnan välille osoittaakseen yksityisomistuksen oikeutuksen?
answer: Molempiin liittyy löytäminen, työn kautta tapahtuva parantaminen ja uhkien torjuminen, joten prosessit ovat perusteluiltaan pohjimmiltaan samanlaisia
wrong_answers:
  - Molemmat edellyttävät kollektiivista yhteisymmärrystä ja asukkaiden demokraattista hyväksyntää, jotta oikeutetut omistusoikeudet voidaan vahvistaa
  - Molemmat ovat riippuvaisia vakiintuneiden viranomaisten oikeudellisesta tunnustamisesta ja virallisista asiakirjoista, jotta voidaan luoda päteviä omistusoikeuksia
  - Molemmat edellyttävät rauhanomaisia neuvotteluja ja korvauksia aiemmille käyttäjille pikemminkin kuin minkäänlaista voimakeinojen käyttöä
explanation: |
  Tekstissä luodaan suora rinnakkaisuus heimojen alueen hankkimisen ja yksilöiden omistusoikeuksien välille ja korostetaan, että molempiin liittyy käyttämättömien resurssien löytäminen, parantaminen työn avulla (heimoilla maatalous ja infrastruktuuri, yksilöillä viljely ja kehittäminen) ja puolustautuminen ulkoisia uhkia vastaan. Tämä analogia tukee liberaalia väitettä, jonka mukaan jos kollektiivinen omaisuuden hankkiminen näillä keinoilla on oikeutettua, myös yksilön omaisuuden hankkimisen samanlaisten prosessien kautta pitäisi olla oikeutettua. Väärät vastaukset vääristelevät tekstissä kuvattua historiallista todellisuutta, jossa tunnustetaan, että alueiden hankkiminen tapahtui usein väkivalloin tai yksinkertaisesti vain ensimmäisenä löytämällä, ei demokraattisen konsensuksen, oikeudellisten muodollisuuksien tai rauhanomaisten neuvottelujen avulla.
question: Metin, özel mülkiyetin meşruiyetini göstermek için kabilelerin tarihsel toprak edinimi ile bireysel mülk edinimi arasında nasıl bir analoji kuruyor?
answer: Her ikisi de keşif, emek yoluyla iyileştirme ve tehditlere karşı savunmayı içerdiğinden, süreçler gerekçelendirilmeleri bakımından temelde aynıdır
wrong_answers:
  - Her ikisi de meşru mülkiyet taleplerinin oluşturulması için mevcut sakinlerin toplu mutabakatını ve demokratik onayını gerektirir
  - Her ikisi de geçerli mülkiyet hakları oluşturmak için yerleşik makamlar tarafından yasal olarak tanınmaya ve resmi belgelere bağlıdır
  - Her ikisi de, herhangi bir şekilde zorla ele geçirme yerine barışçıl müzakere ve önceki kullanıcılara tazminat ödenmesini gerektirir
explanation: |
  Metin, her ikisinin de kullanılmayan kaynakların keşfini, emek yoluyla iyileştirmeyi (kabileler için tarım, altyapı; bireyler için yetiştirme, geliştirme) ve dış tehditlere karşı savunmayı içerdiğini vurgulayarak, kabile topraklarının edinimi ile bireysel mülkiyet hakları arasında doğrudan bir paralellik kurmaktadır. Bu analoji, eğer bu yollarla kolektif mülkiyet edinimi meşru ise, o zaman aynı süreçlerle bireysel mülkiyet ediniminin de meşru olması gerektiği yönündeki liberal argümanı desteklemektedir. Yanlış cevaplar, toprak ediniminin demokratik uzlaşı, yasal formaliteler veya barışçıl müzakereleri değil, genellikle şiddeti veya basitçe ilk keşfi içerdiğini kabul eden metinde açıklanan tarihsel gerçekliği yanlış yansıtmaktadır.
question: Que analogia estabelece o texto entre a aquisição histórica de território por tribos e a aquisição de propriedade individual para demonstrar a legitimidade da propriedade privada?
answer: Ambos envolvem a descoberta, a melhoria através do trabalho e a defesa contra ameaças, tornando os processos fundamentalmente idênticos na sua justificação
wrong_answers:
  - Ambos requerem um consenso coletivo e a aprovação democrática dos habitantes existentes para estabelecer reivindicações de propriedade legítimas
  - Ambos dependem do reconhecimento legal pelas autoridades estabelecidas e da documentação formal para criar direitos de propriedade válidos
  - Ambas requerem negociações pacíficas e compensações aos utilizadores anteriores, em vez de qualquer forma de aquisição forçada
explanation: |
  O texto estabelece um paralelo direto entre a aquisição de território tribal e os direitos de propriedade individuais, salientando que ambos envolvem a descoberta de recursos não utilizados, o melhoramento através do trabalho (agricultura, infra-estruturas para as tribos; cultivo, desenvolvimento para os indivíduos) e a defesa contra ameaças externas. Esta analogia apoia o argumento liberal de que, se a aquisição de propriedade colectiva através destes meios é legítima, então a aquisição de propriedade individual através de processos idênticos também deve ser legítima. As respostas erradas deturpam a realidade histórica descrita no texto, que reconhece que a aquisição territorial envolveu frequentemente violência ou simplesmente a primeira descoberta, e não consenso democrático, formalidades legais ou negociação pacífica.
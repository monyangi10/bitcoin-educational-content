question: 본문은 사유 재산의 정당성을 입증하기 위해 부족의 역사적 영토 취득과 개인의 재산 취득 사이에 어떤 비유를 제시하고 있습니까?
answer: 둘 다 발견, 노동을 통한 개선, 위협에 대한 방어를 포함하므로 프로세스의 정당성 측면에서 근본적으로 동일합니다
wrong_answers:
  - 둘 다 합법적인 소유권 주장을 확립하려면 기존 거주자의 집단적 합의와 민주적 승인이 필요합니다
  - 둘 다 유효한 재산권을 창출하기 위해 기존 기관의 법적 인정과 공식 문서에 의존합니다
  - 두 가지 모두 강압적인 인수 방식이 아닌 평화적인 협상과 이전 사용자에 대한 보상이 필요합니다
explanation: |
  이 문서는 부족의 영토 취득과 개인의 재산권을 직접적으로 비교하며, 둘 다 미사용 자원의 발견, 노동을 통한 개선(부족의 경우 농업, 인프라, 개인의 경우 경작, 개발), 외부 위협에 대한 방어가 포함된다는 점을 강조합니다. 이 비유는 이러한 수단을 통한 집단적 재산 취득이 합법적이라면 동일한 과정을 통한 개인의 재산 취득도 합법적이어야 한다는 자유주의적 주장을 뒷받침합니다. 오답은 영토 획득이 민주적 합의, 법적 절차 또는 평화적 협상이 아닌 폭력이나 단순한 최초 발견을 수반하는 경우가 많았음을 인정하는 본문에 기술된 역사적 현실을 잘못 표현하고 있습니다.
question: 為了證明私有財產的合法性，文中對歷史上部落取得領土與個人取得財產做了什麼類比？
answer: 兩者都涉及到發現、透過勞動改進，以及防禦威脅，使得過程的理由根本上是相同的
wrong_answers:
  - 兩者都需要現有居民的集體共識與民主認可，才能建立合法的所有權要求
  - 兩者都有賴於既定機關的法律承認和正式文件來建立有效的財產權
  - 兩者都需要和平談判，並賠償先前的使用者，而非任何形式的強行取得。
explanation: |
  文中在部落領土取得與個人財產權之間建立了直接的平行關係，強調兩者都涉及未使用資源的發現、透過勞動改善（對部落而言是農業、基礎建設；對個人而言是耕作、開發），以及抵禦外來威脅。這個類比支持自由主義者的論點：如果透過這些方式取得集體財產是合法的，那麼透過相同程序取得個人財產也應該是合法的。錯誤的答案歪曲了文中所描述的歷史現實，文中承認領土的取得往往涉及暴力或僅是首先發現，而非民主共識、法律手續或和平談判。
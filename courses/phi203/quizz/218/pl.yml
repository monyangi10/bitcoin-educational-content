question: Jaką analogię rysuje tekst między historycznym nabywaniem terytorium przez plemiona a indywidualnym nabywaniem własności, aby wykazać zasadność własności prywatnej?
answer: Oba obejmują odkrywanie, ulepszanie poprzez pracę i obronę przed zagrożeniami, dzięki czemu procesy te są zasadniczo identyczne w swoim uzasadnieniu
wrong_answers:
  - Oba wymagają zbiorowego konsensusu i demokratycznego zatwierdzenia przez istniejących mieszkańców w celu ustanowienia uzasadnionych roszczeń własnościowych
  - Oba zależą od prawnego uznania przez ustanowione organy i formalnej dokumentacji w celu stworzenia ważnych praw własności
  - W obu przypadkach konieczne są pokojowe negocjacje i rekompensata dla poprzednich użytkowników, a nie jakakolwiek forma przymusowego przejęcia
explanation: |
  Tekst ustanawia bezpośrednią paralelę między nabywaniem terytorium plemiennego a indywidualnymi prawami własności, podkreślając, że oba obejmują odkrywanie niewykorzystanych zasobów, ulepszanie poprzez pracę (rolnictwo, infrastruktura dla plemion; uprawa, rozwój dla jednostek) oraz obronę przed zagrożeniami zewnętrznymi. Analogia ta wspiera liberalny argument, że jeśli zbiorowe nabywanie własności za pomocą tych środków jest legalne, to indywidualne nabywanie własności za pomocą identycznych procesów również powinno być legalne. Błędne odpowiedzi błędnie przedstawiają rzeczywistość historyczną opisaną w tekście, który przyznaje, że nabywanie terytoriów często wiązało się z przemocą lub po prostu pierwszym odkryciem, a nie demokratycznym konsensusem, formalnościami prawnymi lub pokojowymi negocjacjami.
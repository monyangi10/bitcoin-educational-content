question: Ni igiki ico canditswe gishushanya hagati y’ugufata intara mu mateka n’imiryango n’ugufata umutungo w’umuntu ku giti ciwe kugira ngo yerekane ko umutungo w’abantu ku giti cabo wemewe?
answer: Ivyo vyose birimwo ukuvumbura, gutera imbere biciye mu bikorwa, no kwikingira iterabwoba, bikaba bituma inzira zisa mu vy’ukuri mu gushingira intahe .
wrong_answers:
  - Ivyo vyose bisaba ko abantu bose bahurizako no kwemezwa na demokarasi ku baturage bariho kugira ngo bashobore gushinga intahe y’uko ari bo bafise ubutunzi .
  - Ivyo vyose bivana n’ukwemererwa n’ubutegetsi bushingiye ku mategeko be n’inyandiko zitegekanijwe kugira ngo haboneke uburenganzira bw’umutungo bubereye .
  - Ivyo vyose bisaba ibiganiro vy’amahoro n’indishi ku bahora babikoresha aho gukoresha uburyo ubwo ari bwo bwose bwo kuronka ku nguvu .
explanation: |
  Ico canditswe gishiraho isano ry’ukuri hagati y’ugutunga itongo ry’imiryango n’uburenganzira bw’umuntu ku giti ciwe, kigashimika ku vy’uko ivyo vyose birimwo ukuvumbura ubutunzi butakoreshwa, gutera imbere biciye mu bikorwa (uburimyi, ibikorwa remezo vy’imiryango; uburimyi, iterambere ry’abantu ku giti cabo), no kwikingira ingeramizi zivuye hanze. Iryo sano rishigikira iciyumviro c’abanyagihugu c’uko nimba ukuronka umutungo rusangi biciye muri ubwo buryo ari ivy’ukuri, rero ukuronka umutungo w’umuntu ku giti ciwe biciye mu nzira zisa n’ivyo na vyo nyene bikwiye kuba vyemewe. Inyishu zitari zo zigaragaza nabi ukuri kw’amateka kuvugwa muri ico canditswe, kikaba cemera ko gufata intara kenshi vyari birimwo ubukazi canke gusa ukuvumbura ubwa mbere, atari uguhuza abantu mu buryo bwa demokarasi, ugushinga amategeko canke uguhanahana amakuru mu mahoro.
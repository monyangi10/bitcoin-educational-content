question: Quale analogia viene tracciata nel testo tra l'acquisizione storica del territorio da parte delle tribù e l'acquisizione di proprietà individuali per dimostrare la legittimità della proprietà privata?
answer: Entrambi comportano la scoperta, il miglioramento attraverso il lavoro e la difesa dalle minacce, rendendo i processi fondamentalmente identici nella loro giustificazione
wrong_answers:
  - Entrambi richiedono il consenso collettivo e l'approvazione democratica degli abitanti esistenti per stabilire legittime rivendicazioni di proprietà
  - Entrambi dipendono dal riconoscimento legale da parte delle autorità competenti e da una documentazione formale per creare diritti di proprietà validi
  - Entrambi richiedono una negoziazione pacifica e un risarcimento agli utenti precedenti piuttosto che una forma di acquisizione forzata
explanation: |
  Il testo stabilisce un parallelo diretto tra l'acquisizione del territorio tribale e i diritti di proprietà individuali, sottolineando che entrambi implicano la scoperta di risorse inutilizzate, il miglioramento attraverso il lavoro (agricoltura, infrastrutture per le tribù; coltivazione, sviluppo per gli individui) e la difesa da minacce esterne. Questa analogia sostiene l'argomentazione liberale secondo cui se l'acquisizione di proprietà collettive attraverso questi mezzi è legittima, anche l'acquisizione di proprietà individuali attraverso processi identici dovrebbe essere legittima. Le risposte sbagliate travisano la realtà storica descritta nel testo, che riconosce che l'acquisizione territoriale spesso comportava la violenza o semplicemente la prima scoperta, non il consenso democratico, le formalità legali o la negoziazione pacifica.
question: متن چه قیاسی بین تصاحب تاریخی قلمرو توسط قبایل و تصاحب فردی ملک برای نشان دادن مشروعیت مالکیت خصوصی برقرار می‌کند؟
answer: هر دو شامل کشف، بهبود از طریق کار، و دفاع در برابر تهدیدات هستند، که این فرآیندها را از نظر توجیه به طور اساسی یکسان می‌سازد.
wrong_answers:
  - هر دو نیاز به اجماع جمعی و تأیید دموکراتیک از ساکنان موجود دارند تا ادعاهای مالکیت قانونی را برقرار کنند.
  - هر دو به شناسایی قانونی توسط مقامات معتبر و مستندات رسمی برای ایجاد حقوق مالکیت معتبر وابسته هستند.
  - هر دو نیازمند مذاکره صلح‌آمیز و جبران خسارت به کاربران قبلی هستند تا هر گونه شکل از تصاحب اجباری.
explanation: |
  متن یک شباهت مستقیم بین کسب قلمرو قبیله‌ای و حقوق مالکیت فردی برقرار می‌کند و تأکید می‌کند که هر دو شامل کشف منابع استفاده‌نشده، بهبود از طریق کار (کشاورزی، زیرساخت‌ها برای قبایل؛ کشت، توسعه برای افراد) و دفاع در برابر تهدیدات خارجی هستند. این قیاس از استدلال لیبرال حمایت می‌کند که اگر کسب مالکیت جمعی از طریق این روش‌ها مشروع باشد، پس کسب مالکیت فردی از طریق فرآیندهای مشابه نیز باید مشروع باشد. پاسخ‌های نادرست واقعیت تاریخی توصیف‌شده در متن را نادرست نشان می‌دهند، که اذعان می‌کند کسب قلمرو اغلب شامل خشونت یا صرفاً کشف اولیه بوده است، نه اجماع دموکراتیک، تشریفات قانونی یا مذاکره مسالمت‌آمیز.
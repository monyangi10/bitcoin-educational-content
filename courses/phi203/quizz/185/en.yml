question: According to Bastiat, who or what is the true adversary of liberalism — the sophist, or the sophism?
answer: The sophism itself, because socialists and interventionists are mistaken with good intentions, and it is the reasoning error that must be corrected by economic science
wrong_answers:
  - The sophist, because only deliberate bad faith can sustain systems of unfreedom against the evidence of history
  - Neither — the real adversary is the state, whose appetite for power generates both sophists and sophisms
  - Both equally, since a dangerous argument cannot spread without a malicious actor choosing to propagate it
explanation: |
  Bastiat held that the socialists and interventionists of his day were mistaken but well-intentioned — as the saying goes, the road to hell is paved with good intentions. For Bastiat, the adversary of liberalism is therefore not the sophist himself but the sophism: a reasoning error or a factual error that economic science must identify and correct. This framing shapes the entire liberal programme of intellectual refutation rather than personal attack.

question: Menurut teks tersebut, kontradiksi mendasar apa yang ada ketika sistem batasan berusaha mengendalikan pemikiran manusia?
answer: Pemikiran adalah milik setiap individu dan tidak dapat dikontrol secara eksternal tanpa menghancurkan kapasitas berpikir kreatif dan kritis
wrong_answers:
  - Kontrol pikiran efektif tetapi menciptakan inefisiensi ekonomi yang merusak sistem politik dari waktu ke waktu
  - Kontrol eksternal atas pemikiran bekerja dengan baik tetapi bertentangan dengan kebutuhan akan pengetahuan teknis khusus dalam masyarakat modern
  - Mengontrol pemikiran memang mungkin, tetapi membutuhkan terlalu banyak sumber daya yang dapat digunakan dengan lebih baik untuk pembangunan ekonomi
explanation: |
  Teks tersebut menjelaskan bahwa pemikiran terbentuk di dalam diri setiap orang dan merupakan ekspresi paling murni dari kepemilikan diri. Sistem yang berusaha mengendalikan pemikiran melalui pers yang disubsidi, sistem pendidikan yang monopolistik, atau demokrasi yang diatur pada dasarnya salah memahami bagaimana ide terbentuk dan menyebar. Kontrol semacam itu menghancurkan kapasitas alami untuk berpikir kreatif dan kritis, yang pada akhirnya menghambat inovasi dan kemajuan intelektual yang penting bagi perkembangan manusia. Pilihan lain secara keliru menyatakan bahwa kontrol pemikiran secara teknis dapat dilakukan tetapi tidak praktis.
question: Milline põhimõtteline vastuolu eksisteerib teksti kohaselt, kui piirangusüsteemid püüavad kontrollida inimese mõtlemist?
answer: Mõtlemine on iga inimese enda pärusmaa ja seda ei saa kontrollida väljastpoolt, ilma et see hävitaks loomingulist ja kriitilist mõtlemisvõimet
wrong_answers:
  - Mõttekontroll on tõhus, kuid tekitab majanduslikku ebaefektiivsust, mis aja jooksul õõnestab poliitilist süsteemi
  - Mõtte väline kontroll toimib hästi, kuid on vastuolus tänapäeva ühiskonna vajadusega tehniliste eriteadmiste järele
  - Mõtlemise kontrollimine on võimalik, kuid nõuab liiga palju ressursse, mida võiks paremini kasutada majandusarenguks
explanation: |
  Tekstis selgitatakse, et mõte kujuneb iga inimese sees ja kujutab endast eneseomandi kõige puhtamat väljendust. Süsteemid, mis püüavad kontrollida mõtlemist subsideeritud ajakirjanduse, monopoolse haridussüsteemi või reguleeritud demokraatia kaudu, mõistavad põhimõtteliselt valesti, kuidas ideed kujunevad ja levivad. Selline kontroll hävitab loomuliku võime loovaks ja kriitiliseks mõtlemiseks, lämmatades lõppkokkuvõttes innovatsiooni ja intellektuaalset arengut, mis on inimarengu jaoks hädavajalik. Teised valikud viitavad ekslikult sellele, et mõtte kontroll on tehniliselt teostatav, kuid lihtsalt ebapraktiline.
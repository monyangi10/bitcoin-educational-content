question: Согласно тексту, какое фундаментальное противоречие существует, когда системы ограничений пытаются контролировать человеческую мысль?
answer: Мысль принадлежит каждому человеку и не может контролироваться извне, не разрушая творческий и критический потенциал мышления
wrong_answers:
  - Контроль мыслей эффективен, но создает экономическую неэффективность, которая со временем подрывает политическую систему
  - Внешний контроль мышления работает хорошо, но противоречит потребности современного общества в специализированных технических знаниях
  - Контролировать мысли возможно, но для этого требуется слишком много ресурсов, которые можно было бы лучше использовать для экономического развития
explanation: |
  Текст объясняет, что мысль формируется внутри каждого человека и представляет собой чистейшее выражение права собственности на себя. Системы, пытающиеся контролировать мысль с помощью субсидируемой прессы, монополистической системы образования или регулируемой демократии, в корне не понимают, как формируются и распространяются идеи. Такой контроль разрушает естественную способность к творческому и критическому мышлению, в конечном итоге подавляя инновации и интеллектуальный прогресс, необходимые для развития человечества. Другие варианты неверно предполагают, что контроль над мыслями технически возможен, но просто непрактичен.
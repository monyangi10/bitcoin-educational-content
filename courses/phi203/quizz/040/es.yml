question: Según el texto, ¿qué contradicción fundamental existe cuando los sistemas de coacción intentan controlar el pensamiento humano?
answer: El pensamiento pertenece íntimamente a cada individuo y no puede controlarse externamente sin destruir la capacidad creativa y crítica
wrong_answers:
  - El control del pensamiento es eficaz pero crea ineficiencias económicas que socavan el sistema político con el tiempo
  - El control externo del pensamiento funciona bien pero entra en conflicto con la necesidad de conocimientos técnicos especializados en la sociedad moderna
  - Controlar el pensamiento es posible, pero requiere demasiados recursos que podrían utilizarse mejor para el desarrollo económico
explanation: |
  El texto explica que el pensamiento se forma dentro de cada persona y constituye la expresión más pura de la propiedad de uno mismo. Los sistemas que intentan controlar el pensamiento a través de una prensa subvencionada, un sistema educativo monopolístico o una democracia regulada malinterpretan fundamentalmente cómo se forman y difunden las ideas. Tal control destruye la capacidad natural de pensamiento creativo y crítico, sofocando en última instancia la innovación y el progreso intelectual esenciales para el desarrollo humano. Las otras opciones sugieren incorrectamente que el control del pensamiento es técnicamente factible, pero simplemente impracticable.
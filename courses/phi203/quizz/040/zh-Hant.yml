question: 根據文中所述，當約束系統試圖控制人類思想時，存在什麼基本矛盾？
answer: 思想是屬於每個人的，不能由外部控制，否則會破壞創造性和批判性思考能力
wrong_answers:
  - 思想控制是有效的，但會造成經濟上的低效率，久而久之會破壞政治體制
  - 思想的外部控制效果很好，但與現代社會對專業技術知識的需求相衝突
  - 控制思想是可能的，但需要太多資源，而這些資源可以更好地用於經濟發展
explanation: |
  文中解釋思想在每個人的內心形成，並構成最純粹的自我所有權表達。試圖透過資助新聞、壟斷性教育體系或受管制的民主來控制思想的制度，從根本上誤解了思想是如何形成與傳播的。這種控制摧毀了創造性和批判性思考的自然能力，最終窒息了人類發展所必需的創新和智慧進步。其他方案錯誤地認為思想控制在技術上是可行的，只是不切實際而已。
question: Welke fundamentele tegenstrijdigheid bestaat er volgens de tekst wanneer systemen van dwang het menselijk denken proberen te controleren?
answer: Het denken is intiem voor elk individu en kan niet van buitenaf worden gecontroleerd zonder het creatieve en kritische denkvermogen te vernietigen
wrong_answers:
  - Gedachtecontrole is effectief, maar creëert economische inefficiënties die het politieke systeem na verloop van tijd ondermijnen
  - Externe controle van het denken werkt goed, maar botst met de behoefte aan gespecialiseerde technische kennis in de moderne samenleving
  - Beheersing van het denken is mogelijk, maar vereist te veel middelen die beter kunnen worden gebruikt voor economische ontwikkeling
explanation: |
  De tekst legt uit dat gedachten zich in ieder mens vormen en de zuiverste uitdrukking zijn van zelfeigenaarschap. Systemen die het denken proberen te controleren door middel van gesubsidieerde pers, een monopolistisch onderwijssysteem of gereguleerde democratie begrijpen fundamenteel niet hoe ideeën zich vormen en verspreiden. Dergelijke controle vernietigt het natuurlijke vermogen tot creatief en kritisch denken, waardoor uiteindelijk innovatie en intellectuele vooruitgang, die essentieel zijn voor de ontwikkeling van de mens, in de kiem worden gesmoord. De andere opties suggereren ten onrechte dat controle over het denken technisch haalbaar is, maar slechts onpraktisch.
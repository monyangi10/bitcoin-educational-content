question: Dushingiye ku ciyumviro c’ubwigenge, ni ubucuti ubuhe bw’ishimikiro buri hagati y’ingingo ngenderwako y’ukwemera n’uguhuza uburenganzira bw’abagore n’uburenganzira?
answer: Ukwemera ni kwo gushingira intahe amasezerano y’ubuntu n’ukwigenga kw’umuntu ku giti ciwe, bikaba bituma ari yo ngingo ngenderwako nyamukuru ihuza intumbero z’abagore n’ubuhinga bwo kwidegemvya .
wrong_answers:
  - Ukwemera guserukira ugusenyera ku mugozi umwe hagati y’ugufata ingingo rusangi n’uburenganzira bw’umuntu ku giti ciwe, bikaba vyemerera iyo migwi yompi kubana ata ntambara .
  - Ukwemera gukora nk'uburyo bwo gutegeka bugabanya umwidegemvyo wo mw'isoko n'uburinganire bw'igitsina kugira ngo hatagira uguhungabana kw'imibano .
  - Ukwemera gukora nk’igikoresho ca demokarasi gishoboza abantu benshi gutwara mu gihe barinda inyungu z’abantu bake mu vy’ubutunzi no mu vy’imibano .
explanation: |
  Ico canditswe kivuga neza ko kwemera ari co kintu nyamukuru gihuza uburenganzira bw’abagore n’uburenganzira bwo kwidegemvya, kuko amasezerano y’ubuntu n’uguhanahana amakuru vyose bishingiye kuri iyo ngingo ngenderwako. Ivyiyumviro vy’ubwigenge bishimika ku vy’uko uburyo bwo kurera n’uburenganzira bukora biciye mu kutavyemera canke mu kwemera kw’abantu benshi birenga amasezerano y’umuntu ku giti ciwe ku musi ku musi. Ivyo bituma ukwemera kuba ibuye ry’imfuruka rishoboza umwidegemvyo w’ubutunzi biciye mu guhanahana ubushake n’uburinganire bw’igitsina biciye mu kwigenga kw’umuntu ku giti ciwe, kwanka uburyo bwose bw’imigenderanire itegekanijwe canke ingingo zitegekanijwe n’abantu benshi zirengagiza amahitamwo y’umuntu ku giti ciwe.
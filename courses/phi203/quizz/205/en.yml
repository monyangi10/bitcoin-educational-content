question: According to the text, how does Bastiat characterise protectionism and socialism in relation to the history of economic ideas?
answer: As backward steps toward outdated economic conceptions that had to be combated by rigorous demonstration of their logical inconsistencies
wrong_answers:
  - As novel ideologies with no historical precedent that required entirely new theoretical tools to refute
  - As natural responses to the disruptions of industrialisation that would fade once living standards improved
  - As legitimate alternatives to liberalism that simply prioritised different values such as solidarity and security
explanation: |
  Bastiat viewed both protectionism and socialism not as modern innovations but as regressions to outdated ways of thinking. He insisted that these sophisms recur across centuries: the argument about not "enriching our enemies" runs from the nineteenth century through to the twenty-first, reappearing with every wave of protectionist politics. For Bastiat, eradicating such fallacious reasoning required rigorous economic education and the dissemination of liberal economic thought — not because the arguments were new, but because the same errors keep returning in new disguises.

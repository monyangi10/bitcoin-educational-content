question: 根據文中對社會主義思想的批判，當社會主義者在捍衛國家主權的同時反對繼承時，會出現什麼基本矛盾？
answer: 他們接受公民集體繼承國家領土，但拒絕私人財產的個人繼承。
wrong_answers:
  - 他們支持國際間的財富再分配，卻反對國內世代間的財產轉移
  - 他們在理論上捍衛個人財產權，但實際上卻支持集體所有權
  - 他們提倡平等分配資源，同時堅持各國應保持不平等的領土優勢
explanation: |
  文中指出了社會主義思想中的一個關鍵矛盾：社會主義者反對私人繼承，認為這是不公正的財富傳承，但同時又維護國家邊界和主權，這基本上意味著接受法國公民集體「繼承」上一代的法國領土。這揭示了財產原則不一致的應用 - 在個人層面上拒絕繼承，但在集體/國家層面上卻接受繼承。其他選項歪曲了文中強調的特定矛盾。
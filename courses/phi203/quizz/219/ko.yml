question: 이 텍스트의 사회주의 사상 비판에 따르면, 사회주의자들이 국가 주권을 옹호하면서 세습을 반대할 때 나타나는 근본적인 모순은 무엇인가?
answer: 국민에 의한 국가 영토의 집단적 상속은 인정하지만 사유 재산의 개인적 상속은 거부합니다
wrong_answers:
  - 그들은 국제적인 부의 재분배를 지지하는 동시에 세대 간 국내 재산 이전에는 반대합니다
  - 이론적으로는 개인의 재산권을 보호하는 동시에 실제로는 공동 소유권을 지원합니다
  - 국가가 불평등한 영토적 이점을 유지해야 한다고 주장하면서 자원의 평등한 분배를 촉진합니다
explanation: |
  이 글은 사회주의 사고의 핵심 모순을 지적합니다. 사회주의자들은 사적 상속을 부당한 부의 대물림으로 반대하면서도 동시에 국경과 주권을 옹호하는데, 이는 본질적으로 프랑스 국민이 이전 세대로부터 프랑스 영토를 집단적으로 '상속'받는 것을 인정하는 것을 의미합니다. 이는 개인 차원에서는 상속을 거부하면서 집단적/국가적 차원에서는 상속을 받아들이는 일관성 없는 재산 원칙 적용을 드러냅니다. 다른 옵션은 본문에서 강조된 특정 모순을 잘못 표현하고 있습니다.
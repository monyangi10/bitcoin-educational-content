question: Welke fundamentele tegenstrijdigheid ontstaat er volgens de kritiek van de tekst op het socialistische gedachtegoed als socialisten zich verzetten tegen erfenis en tegelijkertijd de nationale soevereiniteit verdedigen?
answer: Ze accepteren collectief erven van nationaal grondgebied door burgers terwijl ze individueel erven van privébezit afwijzen
wrong_answers:
  - Ze steunen internationale herverdeling van rijkdom terwijl ze tegen binnenlandse eigendomsoverdrachten tussen generaties zijn
  - Ze verdedigen individuele eigendomsrechten in theorie terwijl ze in de praktijk collectief eigendom ondersteunen
  - Ze promoten een gelijke verdeling van middelen terwijl ze beweren dat naties ongelijke territoriale voordelen moeten behouden
explanation: |
  De tekst identificeert een belangrijke tegenstrijdigheid in het socialistische denken: terwijl ze zich verzetten tegen particuliere erfenissen als onrechtvaardige overdracht van rijkdom, verdedigen socialisten tegelijkertijd nationale grenzen en soevereiniteit, wat in wezen betekent dat ze aanvaarden dat Franse burgers collectief Frans grondgebied 'erven' van vorige generaties. Dit onthult een inconsistente toepassing van eigendomsprincipes - het verwerpen van erfenis op individueel niveau terwijl het wordt aanvaard op collectief/nationaal niveau. De andere opties geven een verkeerd beeld van de specifieke tegenstrijdigheid die in de tekst wordt benadrukt.
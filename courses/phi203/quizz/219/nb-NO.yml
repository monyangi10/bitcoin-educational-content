question: Hvilken grunnleggende selvmotsigelse oppstår, ifølge tekstens kritikk av sosialistisk tenkning, når sosialister motsetter seg arv og samtidig forsvarer nasjonal suverenitet?
answer: De aksepterer kollektiv arv av nasjonalt territorium, mens de avviser individuell arv av privat eiendom
wrong_answers:
  - De støtter internasjonal omfordeling av rikdom, mens de motsetter seg nasjonale eiendomsoverføringer mellom generasjoner
  - De forsvarer individuell eiendomsrett i teorien, samtidig som de støtter kollektivt eierskap i praksis
  - De går inn for lik fordeling av ressurser, samtidig som de mener at nasjoner bør beholde ulike territorielle fortrinn
explanation: |
  Teksten identifiserer en sentral selvmotsigelse i sosialistisk tenkning: Samtidig som sosialister motsetter seg privat arv som urettferdig overføring av rikdom, forsvarer de samtidig nasjonale grenser og suverenitet, noe som i bunn og grunn betyr at de aksepterer at franske borgere kollektivt "arver" fransk territorium fra tidligere generasjoner. Dette avslører en inkonsekvent anvendelse av eiendomsprinsipper - å avvise arv på individuelt nivå, samtidig som man aksepterer den på kollektivt/nasjonalt nivå. De andre alternativene gir en feilaktig fremstilling av den spesifikke selvmotsigelsen som fremheves i teksten.
question: D'après la critique de la pensée socialiste formulée dans le texte, quelle contradiction fondamentale apparaît lorsque les socialistes s'opposent à l'héritage tout en défendant la souveraineté nationale ?
answer: Ils acceptent l'héritage collectif du territoire national par les citoyens tout en rejetant l'héritage individuel de la propriété privée
wrong_answers:
  - Ils soutiennent la redistribution internationale des richesses tout en s'opposant aux transferts de propriété entre générations au niveau national
  - Ils défendent les droits de propriété individuels en théorie tout en soutenant la propriété collective en pratique
  - Ils promeuvent une répartition égale des ressources tout en affirmant que les nations doivent conserver des avantages territoriaux inégaux
explanation: |
  Le texte identifie une contradiction clé dans la pensée socialiste : tout en s'opposant à l'héritage privé en tant que transmission injuste de la richesse, les socialistes défendent simultanément les frontières et la souveraineté nationales, ce qui signifie essentiellement qu'ils acceptent que les citoyens français "héritent" collectivement du territoire français des générations précédentes. Cela révèle une application incohérente des principes de la propriété - rejeter l'héritage au niveau individuel tout en l'acceptant au niveau collectif/national. Les autres options présentent mal la contradiction spécifique mise en évidence dans le texte.
question: 社会主義思想に対する本文の批判によれば、社会主義者が国民主権を擁護しながら相続に反対する場合、どのような根本的矛盾が生じるのか？
answer: 国民による国土の集団的相続を容認する一方で、私有財産の個人的相続を否定する。
wrong_answers:
  - 国際的な富の再分配を支持する一方で、国内の世代間の財産移転には反対する。
  - 理論的には個人の財産権を擁護する一方で、実際には集団所有を支持する。
  - 資源の平等な分配を推進する一方で、国家は不平等な領土的優位性を維持すべきだと主張する。
explanation: |
  この文章は、社会主義者の思考における重要な矛盾を明らかにしている。社会主義者は、不当な富の移転として私的相続に反対しながら、同時に国境と主権を擁護している。これは、財産原則の矛盾した適用を明らかにする。つまり、個人レベルでの相続を拒否しながら、集団／国家レベルではそれを受け入れるということである。他の選択肢は、本文で強調されている具体的な矛盾を誤って表現している。
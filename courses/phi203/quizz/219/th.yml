question: ตามบทวิจารณ์ของแนวคิดสังคมนิยมในข้อความ ความขัดแย้งพื้นฐานที่เกิดขึ้นเมื่อสังคมนิยมคัดค้านการรับมรดกในขณะที่ปกป้องอธิปไตยของชาติคืออะไร?
answer: พวกเขายอมรับการสืบทอดดินแดนของชาติร่วมกันโดยพลเมือง ในขณะที่ปฏิเสธการสืบทอดทรัพย์สินส่วนบุคคล
wrong_answers:
  - พวกเขาสนับสนุนการกระจายความมั่งคั่งระหว่างประเทศในขณะที่คัดค้านการโอนทรัพย์สินภายในประเทศระหว่างรุ่น
  - พวกเขาปกป้องสิทธิในทรัพย์สินส่วนบุคคลในทางทฤษฎีในขณะที่สนับสนุนการเป็นเจ้าของร่วมในทางปฏิบัติ
  - พวกเขาส่งเสริมการกระจายทรัพยากรอย่างเท่าเทียมกัน ในขณะที่ยืนยันว่าประเทศต่างๆ ควรรักษาความได้เปรียบทางดินแดนที่ไม่เท่าเทียมกัน
explanation: |
  ข้อความนี้ระบุถึงความขัดแย้งสำคัญในแนวคิดสังคมนิยม: ในขณะที่ต่อต้านการสืบทอดทรัพย์สินส่วนตัวว่าเป็นการถ่ายทอดความมั่งคั่งที่ไม่ยุติธรรม สังคมนิยมกลับปกป้องพรมแดนและอธิปไตยของชาติ ซึ่งโดยพื้นฐานแล้วหมายถึงการยอมรับว่าพลเมืองฝรั่งเศส 'สืบทอด' ดินแดนฝรั่งเศสจากรุ่นก่อน ๆ โดยรวม นี่แสดงให้เห็นถึงการใช้หลักการทรัพย์สินที่ไม่สอดคล้องกัน - ปฏิเสธการสืบทอดในระดับบุคคลในขณะที่ยอมรับในระดับรวม/ระดับชาติ ตัวเลือกอื่น ๆ บิดเบือนความขัดแย้งเฉพาะที่เน้นในข้อความ
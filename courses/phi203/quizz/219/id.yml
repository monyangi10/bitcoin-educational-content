question: Menurut kritik teks ini terhadap pemikiran sosialis, kontradiksi mendasar apa yang muncul ketika kaum sosialis menentang warisan sambil mempertahankan kedaulatan nasional?
answer: Mereka menerima pewarisan kolektif wilayah nasional oleh warga negara sambil menolak pewarisan individu atas properti pribadi
wrong_answers:
  - Mereka mendukung redistribusi kekayaan internasional sambil menentang transfer properti domestik antar generasi
  - Mereka membela hak milik individu secara teori sambil mendukung kepemilikan kolektif dalam praktiknya
  - Mereka mempromosikan distribusi sumber daya yang merata sambil mempertahankan bahwa negara-negara harus mempertahankan keunggulan teritorial yang tidak merata
explanation: |
  Teks tersebut mengidentifikasi kontradiksi utama dalam pemikiran sosialis: sementara menentang warisan pribadi sebagai transmisi kekayaan yang tidak adil, kaum sosialis secara bersamaan mempertahankan perbatasan dan kedaulatan nasional, yang pada dasarnya berarti menerima bahwa warga negara Prancis secara kolektif 'mewarisi' wilayah Prancis dari generasi sebelumnya. Hal ini menunjukkan penerapan prinsip-prinsip kepemilikan yang tidak konsisten - menolak warisan di tingkat individu dan menerimanya di tingkat kolektif/nasional. Opsi-opsi lain salah menggambarkan kontradiksi spesifik yang disoroti dalam teks.
question: Dushingiye ku vyo ico canditswe kivuga ku vyiyumviro vy’abasosiyalisiti, ni ukuvuguruzanya gute kw’ishimikiro kugaragara iyo abasosiyalisiti barwanya iragi mu gihe barwanira ubusegaba bw’igihugu?
answer: Bemera iragi rusangi ry’ubutaka bw’igihugu n’abanyagihugu mu gihe banka iragi ry’umuntu ku giti ciwe ry’itunga ry’umuntu ku giti ciwe .
wrong_answers:
  - Bashigikiye ugusubira gusangira ubutunzi kw’isi yose mu gihe barwanya ugutanga umutungo wo mu gihugu hagati y’ibihe .
  - Baburanira uburenganzira bw'umuntu ku giti ciwe mu vyiyumviro mu gihe bashigikira ubutunzi rusangi mu bikorwa .
  - Batera imbere mu gusangira ubutunzi mu buryo bungana mu gihe baguma bavuga ko amahanga akwiye kuguma afise inyungu zitangana z’intara .
explanation: |
  Ico canditswe kirerekana ikintu nyamukuru kivuguruzanya mu vyiyumviro vy’abasosiyalisiti: naho barwanya iragi ry’abantu ku giti cabo nk’ugutanga ubutunzi mu buryo butabereye, abasosiyalisiti baragwanira icarimwe imipaka y’igihugu n’ubusegaba, ivyo bikaba bisobanura mu vy’ukuri kwemera ko abanyagihugu b’Ubufaransa bose hamwe ‘baragwa’ ubutaka bw’Ubufaransa kuva ku mayaruka ya kera. Ivyo birerekana ukuntu ingingo ngenderwako z’itunga zikoreshwa mu buryo butahuye - kwanka iragi ku rugero rw’umuntu ku giti ciwe mu gihe ryemera ku rugero rw’abantu bose/rw’igihugu. Ibindi bihitamwo biraserura nabi ukuvuguruzanya kwihariye gushirwa ahabona muri ico canditswe.
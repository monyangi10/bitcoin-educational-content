question: Secondo la critica del testo al pensiero socialista, quale contraddizione fondamentale emerge quando i socialisti si oppongono all'ereditarietà pur difendendo la sovranità nazionale?
answer: Accettano l'eredità collettiva del territorio nazionale da parte dei cittadini e rifiutano l'eredità individuale della proprietà privata
wrong_answers:
  - Sostengono la redistribuzione internazionale della ricchezza, mentre si oppongono ai trasferimenti di proprietà tra generazioni a livello nazionale
  - Difendono i diritti di proprietà individuali in teoria e sostengono la proprietà collettiva in pratica
  - Promuovono un'equa distribuzione delle risorse, pur sostenendo che le nazioni dovrebbero mantenere vantaggi territoriali diseguali
explanation: |
  Il testo identifica una contraddizione chiave nel pensiero socialista: mentre si oppongono all'eredità privata come ingiusta trasmissione di ricchezza, i socialisti difendono contemporaneamente i confini nazionali e la sovranità, il che significa essenzialmente accettare che i cittadini francesi "ereditino" collettivamente il territorio francese dalle generazioni precedenti. Ciò rivela un'applicazione incoerente dei principi di proprietà: rifiutare l'eredità a livello individuale e accettarla a livello collettivo/nazionale. Le altre opzioni travisano la contraddizione specifica evidenziata nel testo.
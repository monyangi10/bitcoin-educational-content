question: Prema kritici socijalističke misli u tekstu, koja fundamentalna kontradikcija se javlja kada socijalisti istovremeno protive nasleđivanju i brane nacionalni suverenitet?
answer: Prihvataju kolektivno nasleđivanje nacionalne teritorije od strane građana, dok odbacuju individualno nasleđivanje privatne svojine.
wrong_answers:
  - Podržavaju međunarodnu preraspodelu bogatstva, dok se protive domaćim prenosima imovine između generacija.
  - Oni brane individualna vlasnička prava u teoriji dok podržavaju kolektivno vlasništvo u praksi
  - Oni promovišu jednaku raspodelu resursa dok tvrde da nacije treba da zadrže nejednake teritorijalne prednosti
explanation: |
  Tekst identifikuje ključnu kontradikciju u socijalističkom razmišljanju: dok se protive privatnom nasleđivanju kao nepravednom prenosu bogatstva, socijalisti istovremeno brane nacionalne granice i suverenitet, što u suštini znači prihvatanje da francuski građani kolektivno 'nasleđuju' francusku teritoriju od prethodnih generacija. Ovo otkriva nedoslednu primenu principa vlasništva - odbacivanje nasleđivanja na individualnom nivou dok se prihvata na kolektivnom/nacionalnom nivou. Druge opcije pogrešno predstavljaju specifičnu kontradikciju istaknutu u tekstu.
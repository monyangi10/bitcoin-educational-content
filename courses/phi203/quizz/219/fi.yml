question: Tekstissä esitetyn sosialistisen ajattelun kritiikin mukaan mikä perustavanlaatuinen ristiriita syntyy, kun sosialistit vastustavat perintöä ja puolustavat samalla kansallista suvereniteettia?
answer: Ne hyväksyvät kansalaisten kollektiivisen perinnön kansallisesta alueesta ja torjuvat yksityisomaisuuden yksilöllisen perinnön
wrong_answers:
  - He kannattavat varallisuuden kansainvälistä uudelleenjakoa mutta vastustavat kotimaisia sukupolvien välisiä omaisuudensiirtoja
  - Ne puolustavat yksilön omistusoikeuksia teoriassa ja tukevat kollektiivista omistajuutta käytännössä
  - Ne edistävät resurssien tasapuolista jakamista ja pitävät samalla kiinni siitä, että kansakuntien tulisi säilyttää eriarvoiset alueelliset edut
explanation: |
  Tekstissä tuodaan esiin sosialistisen ajattelun keskeinen ristiriita: vaikka sosialistit vastustavat yksityistä perintöä epäoikeudenmukaisena varallisuuden siirtona, he puolustavat samanaikaisesti kansallisia rajoja ja suvereniteettia, mikä tarkoittaa pohjimmiltaan sitä, että he hyväksyvät Ranskan kansalaisten kollektiivisesti "perivän" Ranskan alueen edellisiltä sukupolvilta. Tämä osoittaa, että omistusoikeuden periaatteita sovelletaan epäjohdonmukaisesti: perintö hylätään yksilötasolla ja hyväksytään kollektiivisella/kansallisella tasolla. Muut vaihtoehdot vääristelevät tekstissä korostettua ristiriitaa.
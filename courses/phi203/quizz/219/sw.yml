question: Kulingana na ukosoaji wa maandishi kuhusu mawazo ya kijamaa, ni utata gani wa msingi unaojitokeza wakati wajamaa wanapopinga urithi huku wakitetea uhuru wa kitaifa?
answer: Wanakubali urithi wa pamoja wa eneo la kitaifa na raia huku wakikataa urithi wa kibinafsi wa mali binafsi
wrong_answers:
  - Wanaunga mkono ugawaji upya wa utajiri kimataifa huku wakipinga uhamishaji wa mali za ndani kati ya vizazi
  - Wanatetea haki za mali za mtu binafsi kwa nadharia huku wakiunga mkono umiliki wa pamoja kivitendo
  - Wanakuza usambazaji sawa wa rasilimali huku wakisisitiza kwamba mataifa yanapaswa kudumisha usawa wa maeneo
explanation: |
  Maandishi yanabainisha utata muhimu katika fikra za kijamaa: huku yakipinga urithi wa kibinafsi kama upitishaji wa utajiri usio wa haki, wasoshalisti wanatetea mipaka ya kitaifa na uhuru kwa wakati mmoja, ambayo kimsingi ina maana ya kukubali kwamba raia wa Ufaransa kwa pamoja 'wanarithi' eneo la Ufaransa kutoka kwa vizazi vilivyopita. Hii inaonyesha matumizi yasiyolingana ya kanuni za mali - kukataa urithi katika ngazi ya mtu binafsi huku wakikubali katika ngazi ya pamoja/kitaifa. Chaguzi zingine zinapotosha utata maalum ulioangaziwa katika maandishi.
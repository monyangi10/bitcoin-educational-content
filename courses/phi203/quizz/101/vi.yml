question: Theo lý thuyết kinh tế tự do, ba điều kiện thiết yếu nào cần thiết để sản xuất kinh tế diễn ra?
answer: Tự do lựa chọn phương tiện và mục đích, quyền sở hữu đối với tài nguyên và công cụ, và sự an toàn khỏi bạo lực hoặc trộm cắp.
wrong_answers:
  - Chính phủ điều tiết thị trường, nhà nước sở hữu phương tiện sản xuất và kế hoạch kinh tế tập trung.
  - Tiếp cận nguồn tài nguyên thiên nhiên, sự sẵn có của lực lượng lao động lành nghề và sự tiến bộ công nghệ trong sản xuất.
  - Nhu cầu tiêu dùng hàng hóa, khả năng đầu tư vốn và cấu trúc thị trường cạnh tranh.
explanation: |
  Chương này nêu rõ ba điều kiện cơ bản cho sản xuất: thứ nhất, tự do lựa chọn phương tiện và mục tiêu phù hợp (đòi hỏi quyền sở hữu cá nhân và ra quyết định hợp lý); thứ hai, quyền sở hữu đối với đồ vật, công cụ và chính thân thể mình (vì nếu không có quyền sở hữu thì sản xuất là không thể); và thứ ba, an ninh khỏi bạo lực, đe dọa và trộm cắp (nếu thiếu những điều này thì không thể thiết lập bất kỳ dự án sản xuất khả thi nào). Các lựa chọn khác mô tả các hệ thống do nhà nước kiểm soát trái ngược với lý thuyết tự do, hoặc các yếu tố kinh tế quan trọng nhưng không phải là điều kiện nền tảng được thảo luận trong khuôn khổ này.
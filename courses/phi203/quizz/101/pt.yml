question: Quais são as três condições essenciais necessárias para que a produção económica ocorra, de acordo com a teoria económica liberal?
answer: Liberdade de escolha de meios e fins, direitos de propriedade sobre recursos e ferramentas e segurança contra violência ou roubo
wrong_answers:
  - Regulação governamental dos mercados, propriedade estatal dos meios de produção e planeamento económico centralizado
  - Acesso a recursos naturais, disponibilidade de mão de obra qualificada e avanço tecnológico na indústria transformadora
  - Procura de bens por parte dos consumidores, disponibilidade de investimento de capital e estruturas de mercado competitivas
explanation: |
  O capítulo descreve claramente três condições fundamentais para a produção: em primeiro lugar, a liberdade de fazer escolhas adequadas sobre os meios e os fins (o que exige a autopropriedade e a tomada de decisões racionais); em segundo lugar, os direitos de propriedade sobre as coisas, os utensílios e o próprio corpo (uma vez que, sem propriedade, a produção é impossível); e, em terceiro lugar, a segurança contra a violência, as ameaças e o roubo (sem a qual não é possível estabelecer um projeto de produção viável). As outras opções descrevem sistemas controlados pelo Estado que contradizem a teoria liberal, ou factores económicos que são importantes mas não são as condições fundamentais discutidas neste quadro.
question: 根據自由經濟理論，經濟生產所需的三個基本條件是什麼？
answer: 選擇手段和目的的自由、對資源和工具的財產權，以及免於暴力或盜竊的安全性
wrong_answers:
  - 政府管制市場、國家擁有生產手段，以及中央集权的經濟規劃
  - 自然資源的取得、熟練勞動力的提供，以及製造業的技術進步
  - 消費者對商品的需求、資本投資的可用性，以及競爭性的市場結構
explanation: |
  本章清楚地勾勒出生產的三個基本條件：第一，對手段和目的做出適當選擇的自由（需要自我所有權和理性決策）；第二，對事物、工具和自己身體的財產權（因為沒有所有權，生產就無法進行）；第三，免受暴力、威脅和盜竊的安全（沒有安全，就無法建立可行的生產專案）。其他選項所描述的，不是與自由主義理論相違背的國家控制體系，就是重要但不是本架構所討論的基礎條件的經濟因素。
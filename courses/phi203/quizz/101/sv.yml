question: Vilka är de tre grundläggande förutsättningar som krävs för att ekonomisk produktion ska kunna ske enligt liberal ekonomisk teori?
answer: Frihet att välja medel och mål, äganderätt till resurser och verktyg samt skydd mot våld och stöld
wrong_answers:
  - Statlig reglering av marknader, statligt ägande av produktionsmedel och centraliserad ekonomisk planering
  - Tillgång till naturresurser, tillgång till kvalificerad arbetskraft och tekniska framsteg inom tillverkningsindustrin
  - Konsumenternas efterfrågan på varor, tillgång till kapitalinvesteringar och konkurrenskraftiga marknadsstrukturer
explanation: |
  I kapitlet beskrivs tydligt tre grundläggande förutsättningar för produktion: för det första friheten att göra lämpliga val av medel och mål (vilket kräver självägande och rationellt beslutsfattande); för det andra äganderätt till saker, verktyg och den egna kroppen (eftersom produktion är omöjlig utan äganderätt); och för det tredje säkerhet från våld, hot och stöld (utan vilken inget livskraftigt produktionsprojekt kan etableras). De andra alternativen beskriver antingen statligt kontrollerade system som strider mot liberal teori eller ekonomiska faktorer som är viktiga men inte de grundläggande villkor som diskuteras i detta ramverk.
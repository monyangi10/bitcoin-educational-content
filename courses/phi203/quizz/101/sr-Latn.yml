question: Koji su tri osnovna uslova potrebna za ekonomsku proizvodnju prema liberalnoj ekonomskoj teoriji?
answer: Sloboda izbora sredstava i ciljeva, vlasnička prava nad resursima i alatima, i sigurnost od nasilja ili krađe
wrong_answers:
  - Vladina regulacija tržišta, državno vlasništvo nad sredstvima proizvodnje i centralizovano ekonomsko planiranje
  - Pristup prirodnim resursima, dostupnost kvalifikovane radne snage i tehnološki napredak u proizvodnji
  - Potražnja potrošača za robom, dostupnost kapitalnih investicija i konkurentne tržišne strukture
explanation: |
  Poglavlje jasno opisuje tri osnovna uslova za proizvodnju: prvo, slobodu da se donose odgovarajući izbori o sredstvima i ciljevima (što zahteva samovlasništvo i racionalno donošenje odluka); drugo, vlasnička prava nad stvarima, alatima i sopstvenim telom (jer bez vlasništva, proizvodnja je nemoguća); i treće, sigurnost od nasilja, pretnji i krađe (bez čega se ne može uspostaviti održiv proizvodni projekat). Ostale opcije opisuju ili sisteme pod kontrolom države koji su u suprotnosti sa liberalnom teorijom, ili ekonomske faktore koji su važni, ali nisu osnovni uslovi o kojima se raspravlja u ovom okviru.
question: Кои са трите основни условия, необходими за осъществяване на икономическото производство според либералната икономическа теория?
answer: Свобода на избора на средства и цели, право на собственост върху ресурсите и инструментите и сигурност срещу насилие или кражба
wrong_answers:
  - Държавно регулиране на пазарите, държавна собственост върху средствата за производство и централизирано икономическо планиране
  - Достъп до природни ресурси, наличие на квалифицирана работна ръка и технологичен напредък в производството
  - Потребителско търсене на стоки, наличие на капиталови инвестиции и конкурентни пазарни структури
explanation: |
  Главата ясно очертава три основни условия за производството: първо, свободата да се прави подходящ избор на средства и цели (което изисква самособственост и рационално вземане на решения); второ, правото на собственост върху вещи, инструменти и собственото тяло (тъй като без собственост производството е невъзможно); и трето, сигурността от насилие, заплахи и кражби (без която не може да се създаде жизнеспособен производствен проект). Другите варианти описват или държавно контролирани системи, които противоречат на либералната теория, или икономически фактори, които са важни, но не са основните условия, разгледани в тази рамка.
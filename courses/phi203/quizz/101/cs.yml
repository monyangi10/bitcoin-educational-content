question: Jaké tři základní podmínky jsou podle liberální ekonomické teorie nutné pro vznik ekonomické produkce?
answer: Svoboda volby prostředků a cílů, vlastnická práva ke zdrojům a nástrojům a ochrana před násilím nebo krádeží
wrong_answers:
  - Vládní regulace trhů, státní vlastnictví výrobních prostředků a centralizované hospodářské plánování
  - Přístup k přírodním zdrojům, dostupnost kvalifikované pracovní síly a technologický pokrok ve výrobě
  - Spotřebitelská poptávka po zboží, dostupnost kapitálových investic a konkurenční tržní struktury
explanation: |
  Kapitola jasně vymezuje tři základní podmínky výroby: za prvé svobodu rozhodovat se o prostředcích a cílech (což vyžaduje vlastní vlastnictví a racionální rozhodování); za druhé vlastnická práva k věcem, nástrojům a vlastnímu tělu (protože bez vlastnictví není výroba možná); a za třetí bezpečnost před násilím, hrozbami a krádežemi (bez níž nelze vytvořit životaschopný výrobní projekt). Ostatní možnosti popisují buď státem řízené systémy, které jsou v rozporu s liberální teorií, nebo ekonomické faktory, které jsou sice důležité, ale nejsou základními podmínkami, o nichž pojednává tento rámec.
question: Каковы три основных условия, необходимых для экономического производства, согласно либеральной экономической теории?
answer: Свобода выбора средств и целей, право собственности на ресурсы и инструменты, а также безопасность от насилия или кражи
wrong_answers:
  - Государственное регулирование рынков, государственная собственность на средства производства и централизованное экономическое планирование
  - Доступ к природным ресурсам, наличие квалифицированной рабочей силы и технологический прогресс в производстве
  - Потребительский спрос на товары, наличие капиталовложений и конкурентные рыночные структуры
explanation: |
  В главе четко обозначены три фундаментальных условия производства: во-первых, свобода выбора средств и целей (что требует права собственности и рационального принятия решений); во-вторых, права собственности на вещи, инструменты и собственное тело (поскольку без собственности производство невозможно); в-третьих, безопасность от насилия, угроз и воровства (без чего невозможно создание жизнеспособного производственного проекта). Остальные варианты описывают либо государственные системы, противоречащие либеральной теории, либо экономические факторы, которые важны, но не являются основополагающими условиями, рассматриваемыми в данной концепции.
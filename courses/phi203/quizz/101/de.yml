question: Welches sind die drei wesentlichen Bedingungen, die nach der liberalen Wirtschaftstheorie für das Zustandekommen einer wirtschaftlichen Produktion erforderlich sind?
answer: Freie Wahl der Mittel und Ziele, Eigentumsrechte an Ressourcen und Werkzeugen sowie Sicherheit vor Gewalt und Diebstahl
wrong_answers:
  - Staatliche Regulierung der Märkte, staatliches Eigentum an den Produktionsmitteln und zentralisierte Wirtschaftsplanung
  - Zugang zu natürlichen Ressourcen, Verfügbarkeit von qualifizierten Arbeitskräften und technologischer Fortschritt in der Fertigung
  - Verbrauchernachfrage nach Gütern, Verfügbarkeit von Kapitalinvestitionen und wettbewerbsfähige Marktstrukturen
explanation: |
  In dem Kapitel werden drei grundlegende Bedingungen für die Produktion klar umrissen: erstens die Freiheit, angemessene Entscheidungen über Mittel und Ziele zu treffen (was Selbsteigentum und rationale Entscheidungen voraussetzt); zweitens Eigentumsrechte an Dingen, Werkzeugen und dem eigenen Körper (da ohne Eigentum keine Produktion möglich ist); und drittens Sicherheit vor Gewalt, Bedrohung und Diebstahl (ohne die kein tragfähiges Produktionsprojekt aufgebaut werden kann). Die anderen Optionen beschreiben entweder staatlich kontrollierte Systeme, die der liberalen Theorie widersprechen, oder wirtschaftliche Faktoren, die zwar wichtig sind, aber nicht die in diesem Rahmen erörterten Grundvoraussetzungen darstellen.
question: Jaký je podle liberální ekonomické teorie hlavní důvod, proč je progresivní zdanění považováno za problematické ve srovnání s poměrným zdaněním?
answer: Zachází s jednotlivci jako s majetkem skupiny, místo aby uznával rovnou ochranu před zákonem
wrong_answers:
  - Vytváří administrativní složitost, která činí výběr daní neefektivním a nákladným
  - Snižuje vládní příjmy tím, že odrazuje od ekonomické aktivity na vyšších příjmových úrovních
  - Porušuje zásadu vlády většiny tím, že upřednostňuje menšinové zájmy před kolektivními potřebami
explanation: |
  Liberální ekonomové tvrdili, že progresivní zdanění představuje návrat k antickým představám, podle nichž jednotlivci patří ke kolektivu. Jelikož se všem občanům dostává stejné právní ochrany, měli by přispívat spíše proporcionálně než progresivně. Progresivní zdanění znamená, že někteří jednotlivci dluží společnosti více jen proto, že jsou úspěšní, a je s nimi zacházeno spíše jako s majetkem skupiny než jako s rovnoprávnými občany se stejnými právy a povinnostmi.
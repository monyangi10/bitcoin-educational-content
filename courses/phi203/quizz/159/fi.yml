question: Mikä on liberaalin talousteorian mukaan tärkein syy siihen, miksi progressiivista verotusta pidetään ongelmallisena verrattuna suhteelliseen verotukseen?
answer: Se kohtelee yksilöitä ryhmän omaisuutena sen sijaan, että se tunnustaisi yhtäläisen suojelun lain nojalla
wrong_answers:
  - Se aiheuttaa hallinnollista monimutkaisuutta, joka tekee veronkannosta tehotonta ja kallista
  - Se vähentää valtion tuloja vähentämällä taloudellista toimintaa korkeammilla tulotasoilla
  - Se loukkaa enemmistöperiaatetta suosimalla vähemmistön etuja kollektiivisten tarpeiden sijaan
explanation: |
  Liberaalien taloustieteilijöiden mukaan progressiivinen verotus merkitsee paluuta muinaisiin käsityksiin, joissa yksilöt kuuluvat kollektiiviin. Koska kaikki kansalaiset saavat oikeudellisen kehyksen nojalla yhtäläisen suojan, heidän olisi maksettava veronsa suhteellisesti eikä progressiivisesti. Progressiivinen verotus merkitsee, että jotkut yksilöt ovat yhteiskunnalle enemmän velkaa pelkästään menestyksensä vuoksi, jolloin heitä kohdellaan pikemminkin ryhmän omaisuutena kuin tasavertaisina kansalaisina, joilla on yhtäläiset oikeudet ja velvollisuudet.
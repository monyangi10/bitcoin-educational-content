question: De acordo com a teoria económica liberal, qual é a principal razão pela qual a tributação progressiva é considerada problemática em comparação com a tributação proporcional?
answer: Trata os indivíduos como propriedade do grupo em vez de reconhecer a igualdade de proteção perante a lei
wrong_answers:
  - Cria uma complexidade administrativa que torna a cobrança de impostos ineficaz e onerosa
  - Reduz as receitas públicas ao desencorajar a atividade económica nos níveis de rendimento mais elevados
  - Viola o princípio da regra da maioria ao favorecer os interesses das minorias em detrimento das necessidades colectivas
explanation: |
  Os economistas liberais defendem que a tributação progressiva representa um regresso a concepções antigas em que os indivíduos pertencem ao coletivo. Uma vez que todos os cidadãos beneficiam de igual proteção ao abrigo do quadro jurídico, devem contribuir proporcionalmente e não progressivamente. A tributação progressiva implica que alguns indivíduos devem mais à sociedade simplesmente devido ao seu sucesso, tratando-os como propriedade do grupo e não como cidadãos iguais com direitos e responsabilidades iguais.
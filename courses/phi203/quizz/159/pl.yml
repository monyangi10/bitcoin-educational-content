question: Zgodnie z liberalną teorią ekonomiczną, jaki jest główny powód, dla którego opodatkowanie progresywne jest uważane za problematyczne w porównaniu z opodatkowaniem proporcjonalnym?
answer: Traktuje jednostki jako własność grupy, zamiast uznawać równą ochronę na mocy prawa
wrong_answers:
  - Powoduje to złożoność administracyjną, która sprawia, że pobór podatków jest nieefektywny i kosztowny
  - Zmniejsza dochody rządowe poprzez zniechęcanie do działalności gospodarczej na wyższych poziomach dochodów
  - Narusza zasadę rządów większości, faworyzując interesy mniejszości w stosunku do potrzeb zbiorowych
explanation: |
  Liberalni ekonomiści argumentowali, że progresywne opodatkowanie stanowi powrót do starożytnych koncepcji, w których jednostki należą do kolektywu. Ponieważ wszyscy obywatele otrzymują równą ochronę w ramach prawnych, powinni oni wnosić wkład proporcjonalnie, a nie progresywnie. Progresywne opodatkowanie sugeruje, że niektóre jednostki są winne społeczeństwu więcej tylko ze względu na swój sukces, traktując je jako własność grupy, a nie jako równych obywateli z równymi prawami i obowiązkami.
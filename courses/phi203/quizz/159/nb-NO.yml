question: Hva er ifølge liberal økonomisk teori den viktigste grunnen til at progressiv beskatning anses som problematisk sammenlignet med proporsjonal beskatning?
answer: Den behandler individer som gruppens eiendom i stedet for å anerkjenne lik beskyttelse under loven
wrong_answers:
  - Det skaper administrativ kompleksitet som gjør skatteinnkrevingen ineffektiv og kostbar
  - Det reduserer statens inntekter ved å motvirke økonomisk aktivitet på høyere inntektsnivåer
  - Det bryter med prinsippet om flertallsstyre ved å favorisere minoritetsinteresser fremfor kollektive behov
explanation: |
  Liberale økonomer hevdet at progressiv beskatning representerer en tilbakevending til gamle forestillinger om at individet tilhører kollektivet. Siden alle borgere får lik beskyttelse i henhold til lovverket, bør de bidra proporsjonalt snarere enn progressivt. Progressiv beskatning innebærer at noen individer skylder samfunnet mer bare på grunn av sin suksess, og behandler dem som gruppens eiendom snarere enn som likeverdige borgere med like rettigheter og plikter.
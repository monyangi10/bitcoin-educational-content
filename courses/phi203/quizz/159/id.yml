question: Menurut teori ekonomi liberal, apa alasan utama mengapa pajak progresif dianggap bermasalah dibandingkan dengan pajak proporsional?
answer: Memperlakukan individu sebagai milik kelompok dan bukannya mengakui perlindungan yang sama di bawah hukum
wrong_answers:
  - Hal ini menciptakan kerumitan administrasi yang membuat pemungutan pajak menjadi tidak efisien dan mahal
  - Ini mengurangi pendapatan pemerintah dengan menghambat kegiatan ekonomi pada tingkat pendapatan yang lebih tinggi
  - Hal ini melanggar prinsip aturan mayoritas dengan mengutamakan kepentingan minoritas di atas kebutuhan kolektif
explanation: |
  Para ekonom liberal berpendapat bahwa pajak progresif merupakan kembalinya konsepsi kuno di mana individu adalah bagian dari kolektif. Karena semua warga negara menerima perlindungan yang sama di bawah kerangka hukum, mereka harus berkontribusi secara proporsional, bukan progresif. Pajak progresif menyiratkan bahwa beberapa individu berhutang lebih banyak kepada masyarakat hanya karena kesuksesan mereka, memperlakukan mereka sebagai milik kelompok dan bukan sebagai warga negara yang setara dengan hak dan tanggung jawab yang sama.
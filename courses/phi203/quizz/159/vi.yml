question: Theo lý thuyết kinh tế tự do, lý do chính khiến thuế lũy tiến được coi là có vấn đề hơn so với thuế tỷ lệ là gì?
answer: Nó coi các cá nhân như tài sản của tập thể thay vì công nhận sự bảo vệ bình đẳng theo pháp luật.
wrong_answers:
  - Điều này tạo ra sự phức tạp trong quản lý hành chính, khiến việc thu thuế trở nên kém hiệu quả và tốn kém.
  - Nó làm giảm doanh thu của chính phủ bằng cách kìm hãm hoạt động kinh tế ở các tầng lớp thu nhập cao hơn.
  - Nó vi phạm nguyên tắc đa số bằng cách ưu tiên lợi ích thiểu số hơn nhu cầu tập thể.
explanation: |
  Các nhà kinh tế học tự do lập luận rằng thuế lũy tiến thể hiện sự trở lại với những quan niệm cổ xưa, nơi các cá nhân thuộc về tập thể. Vì tất cả công dân đều được bảo vệ bình đẳng theo khuôn khổ pháp luật, họ nên đóng góp theo tỷ lệ chứ không phải theo lũy tiến. Thuế lũy tiến ngụ ý rằng một số cá nhân có trách nhiệm đóng góp nhiều hơn cho xã hội chỉ đơn giản vì sự thành công của họ, đối xử với họ như tài sản của tập thể chứ không phải là những công dân bình đẳng với quyền và trách nhiệm như nhau.
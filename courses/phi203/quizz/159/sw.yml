question: Kulingana na nadharia ya uchumi huria, ni sababu gani kuu kwa nini kodi ya kimaendeleo inachukuliwa kuwa tatizo ikilinganishwa na kodi sawia?
answer: Inawachukulia watu binafsi kama mali ya kundi badala ya kutambua ulinzi sawa chini ya sheria
wrong_answers:
  - Inaleta ugumu wa kiutawala unaofanya ukusanyaji wa kodi kutokuwa na ufanisi na gharama kubwa
  - Inapunguza mapato ya serikali kwa kukataza shughuli za kiuchumi katika viwango vya juu vya mapato
  - Inakiuka kanuni ya utawala wa wengi kwa kupendelea maslahi ya wachache kuliko mahitaji ya pamoja
explanation: |
  Wanauchumi wa kiliberali walisema kwamba kodi ya kimaendeleo inawakilisha kurudi kwa dhana za kale ambapo watu binafsi ni wa pamoja. Kwa kuwa raia wote hupokea ulinzi sawa chini ya mfumo wa kisheria, wanapaswa kuchangia kwa uwiano badala ya kuendelea. Kodi ya kimaendeleo ina maana kwamba baadhi ya watu wana deni kubwa zaidi kwa jamii kwa sababu tu ya mafanikio yao, wakiwachukulia kama mali ya kundi badala ya kama raia sawa wenye haki na majukumu sawa.
question: Liberal ekonomi teorisine göre, artan oranlı vergilendirmenin nispi vergilendirmeye kıyasla sorunlu kabul edilmesinin temel nedeni nedir?
answer: Bireylere kanun önünde eşit koruma tanımak yerine grubun malı muamelesi yapar
wrong_answers:
  - Vergi tahsilatını verimsiz ve maliyetli hale getiren idari karmaşıklık yaratır
  - Yüksek gelir seviyelerinde ekonomik faaliyeti caydırarak devlet gelirlerini azaltır
  - Azınlık çıkarlarını kolektif ihtiyaçlara tercih ederek çoğunluğun yönetimi ilkesini ihlal eder
explanation: |
  Liberal ekonomistler artan oranlı vergilendirmenin, bireylerin kolektife ait olduğu eski anlayışlara dönüşü temsil ettiğini savunmuşlardır. Tüm vatandaşlar yasal çerçeve altında eşit korumaya sahip olduklarından, artan oranlı değil orantılı olarak katkıda bulunmalıdırlar. Artan oranlı vergilendirme, bazı bireylerin sırf başarılarından dolayı topluma daha fazla borçlu olduğunu ima etmekte, onlara eşit hak ve sorumluluklara sahip eşit vatandaşlar olarak değil, grubun malı olarak muamele etmektedir.
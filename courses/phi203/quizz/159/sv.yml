question: Enligt liberal ekonomisk teori, vad är det främsta skälet till att progressiv beskattning anses vara problematisk jämfört med proportionell beskattning?
answer: Den behandlar individer som gruppens egendom i stället för att erkänna lika skydd enligt lag
wrong_answers:
  - Det skapar en administrativ komplexitet som gör skatteuppbörden ineffektiv och kostsam
  - Det minskar statens intäkter genom att avskräcka från ekonomisk aktivitet på högre inkomstnivåer
  - Den bryter mot principen om majoritetsstyre genom att gynna minoritetsintressen framför kollektiva behov
explanation: |
  Liberala ekonomer hävdade att progressiv beskattning innebär en återgång till gamla föreställningar där individen tillhörde kollektivet. Eftersom alla medborgare åtnjuter samma skydd enligt lagstiftningen bör de bidra proportionellt snarare än progressivt. Progressiv beskattning innebär att vissa individer är mer skyldiga samhället bara på grund av sin framgång och att de behandlas som gruppens egendom snarare än som jämlika medborgare med lika rättigheter och skyldigheter.
question: 根據自由經濟理論，與比例稅相比，累進稅被認為有問題的主要原因是什麼？
answer: 它將個人視為團體的財產，而非承認法律上的平等保護
wrong_answers:
  - 它造成行政上的複雜性，使稅收效率低且成本高昂
  - 它會抑制較高收入層級的經濟活動，從而減少政府收入
  - 它違反了多數人統治的原則，讓少數人的利益凌駕於集體需求之上
explanation: |
  自由經濟學家認為，累進稅制代表回到個人屬於集體的古老觀念。由於所有公民在法律框架下都受到平等保護，因此他們應該按比例而非累進方式繳稅。累進稅制意味著某些個人僅因其成功而欠社會更多，將他們視為集體的財產，而非擁有平等權利與責任的平等公民。
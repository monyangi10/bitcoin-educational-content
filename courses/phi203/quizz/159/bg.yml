question: Според либералната икономическа теория коя е основната причина, поради която прогресивното данъчно облагане се смята за проблематично в сравнение с пропорционалното?
answer: Тя третира хората като собственост на групата, вместо да признава равната защита от закона
wrong_answers:
  - Създава административна сложност, която прави събирането на данъци неефективно и скъпо
  - Намалява държавните приходи, тъй като обезкуражава икономическата активност на по-високите нива на доходи
  - Нарушава принципа на управление на мнозинството, като дава предимство на интересите на малцинството пред колективните нужди
explanation: |
  Либералните икономисти твърдяха, че прогресивното данъчно облагане представлява връщане към древните схващания, според които индивидите принадлежат на колектива. Тъй като всички граждани се ползват с еднаква защита по силата на правната рамка, те трябва да внасят пропорционално, а не прогресивно. Прогресивното данъчно облагане предполага, че някои лица дължат повече на обществото само поради успеха си, като ги третира като собственост на групата, а не като равноправни граждани с равни права и отговорности.
question: Secondo la teoria economica liberale, qual è la ragione principale per cui la tassazione progressiva è considerata problematica rispetto a quella proporzionale?
answer: Tratta gli individui come proprietà del gruppo, invece di riconoscere l'eguale protezione da parte della legge
wrong_answers:
  - Crea una complessità amministrativa che rende la riscossione delle imposte inefficiente e costosa
  - Riduce le entrate statali scoraggiando l'attività economica ai livelli di reddito più elevati
  - Viola il principio della regola della maggioranza, favorendo gli interessi delle minoranze rispetto ai bisogni collettivi
explanation: |
  Gli economisti liberali hanno sostenuto che la tassazione progressiva rappresenta un ritorno a concezioni antiche in cui gli individui appartengono alla collettività. Dal momento che tutti i cittadini ricevono uguale protezione dal punto di vista legale, dovrebbero contribuire in modo proporzionale piuttosto che progressivo. La tassazione progressiva implica che alcuni individui debbano di più alla società semplicemente per il loro successo, trattandoli come proprietà del gruppo piuttosto che come cittadini con pari diritti e responsabilità.
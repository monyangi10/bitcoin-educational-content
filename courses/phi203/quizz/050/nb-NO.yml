question: Hva var hovedgrunnen til at tankefriheten ikke kunne utvikle seg i forhistoriske samfunn?
answer: Produksjonen var hovedsakelig avhengig av fysisk kraft snarere enn intellektuelle aktiviteter
wrong_answers:
  - Religiøse ledere forbød selvstendig tenkning og innførte strenge åndelige regler
  - Stammerådene tok alle beslutninger kollektivt uten individuelle innspill eller diskusjoner
  - Skriftspråket var ikke utviklet, så ideer kunne ikke nedtegnes
explanation: |
  Ifølge kapittelet kunne ikke tankefriheten utvikle seg fordi forhistoriske produksjonsaktiviteter først og fremst baserte seg på rå fysisk kraft for å skaffe seg de nødvendige ressursene for å overleve. Teksten forklarer at intelligensen utvikles gjennom daglig utdannelse og observasjoner, men når overlevelse avhenger av fysisk styrke snarere enn mentale evner, er det liten mulighet for intellektuell utvikling. Sammenligningen mellom en portner og en lokomotivfører illustrerer hvordan tekniske nyvinninger senere gjorde det mulig å tenke fritt og effektivt, ettersom ulike typer arbeid begynte å kreve og utvikle andre menneskelige evner enn bare fysisk styrke.
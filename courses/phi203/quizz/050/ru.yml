question: Какова основная причина, по которой свобода мысли не могла развиться в доисторических обществах?
answer: Производство зависело в основном от физической силы, а не от интеллектуальной деятельности
wrong_answers:
  - Религиозные лидеры запрещали независимое мышление и навязывали строгие духовные правила
  - Советы племен принимали все решения коллективно, без индивидуального участия или обсуждения
  - Письменность не была развита, поэтому идеи не могли быть записаны
explanation: |
  Согласно главе, свобода мышления не могла развиться, потому что доисторическая производственная деятельность опиралась в основном на грубую физическую силу для получения необходимых для выживания ресурсов. В тексте объясняется, что интеллект развивается благодаря ежедневному обучению и наблюдениям, но когда выживание зависит от физической силы, а не от умственных способностей, возможности для интеллектуального развития ограничены. Сравнение между носильщиком и проводником локомотива иллюстрирует, как технические инновации впоследствии обеспечили свободу мышления, поскольку различные виды работ стали требовать и развивать различные человеческие способности, помимо простой физической силы.
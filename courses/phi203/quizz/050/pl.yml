question: Jaki był główny powód, dla którego wolność myśli nie mogła rozwinąć się w prehistorycznych społeczeństwach?
answer: Produkcja zależała głównie od siły fizycznej, a nie od działań intelektualnych
wrong_answers:
  - Przywódcy religijni zabronili niezależnego myślenia i narzucili surowe zasady duchowe
  - Rady plemienne podejmowały wszystkie decyzje zbiorowo, bez indywidualnego wkładu czy dyskusji
  - Język pisany nie był rozwinięty, więc pomysły nie mogły być rejestrowane
explanation: |
  Według tego rozdziału, wolność myśli nie mogła się rozwinąć, ponieważ prehistoryczne działania produkcyjne opierały się głównie na brutalnej sile fizycznej w celu uzyskania niezbędnych zasobów do przetrwania. Tekst wyjaśnia, że inteligencja rozwija się poprzez codzienną edukację i obserwacje, ale kiedy przetrwanie zależy od siły fizycznej, a nie zdolności umysłowych, istnieje niewielka szansa na rozwój intelektualny. Porównanie tragarza i konduktora lokomotywy ilustruje, w jaki sposób innowacje techniczne umożliwiły później swobodę myślenia, ponieważ różne rodzaje pracy zaczęły wymagać i rozwijać różne ludzkie zdolności wykraczające poza zwykłą siłę fizyczną.
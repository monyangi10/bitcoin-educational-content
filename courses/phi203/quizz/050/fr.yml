question: Quelle est la principale raison pour laquelle la liberté de pensée n'a pas pu se développer dans les sociétés préhistoriques ?
answer: La production dépendait principalement de la force physique plutôt que des activités intellectuelles
wrong_answers:
  - Les chefs religieux ont interdit toute pensée indépendante et imposée des règles spirituelles strictes
  - Les conseils tribaux prenaient toutes les décisions collectivement, sans participation ni discussion individuelle
  - Le langage écrit n'étant pas encore développé, les idées ne pouvaient pas être consignées
explanation: |
  Selon le chapitre, la liberté de pensée n'a pas pu se développer parce que les activités de production préhistoriques reposaient principalement sur la force physique brute pour obtenir les ressources nécessaires à la survie. Le texte explique que l'intelligence se développe grâce à l'éducation et aux observations quotidiennes, mais lorsque la survie dépend de la force physique plutôt que des capacités mentales, il y a peu de possibilités de développement intellectuel. La comparaison entre un porteur et un conducteur de locomotive illustre comment les innovations techniques ont ensuite permis à la liberté de penser de devenir effective, alors que différents types de travail ont commencé à exiger et à développer différentes capacités humaines au-delà de la simple force physique.

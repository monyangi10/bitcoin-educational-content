question: ¿Cuál fue la razón principal por la que la libertad de pensamiento no pudo desarrollarse en las sociedades prehistóricas?
answer: La producción dependía principalmente de la fuerza física más que de las actividades intelectuales
wrong_answers:
  - Los líderes religiosos prohibieron el pensamiento independiente e impusieron estrictas normas espirituales
  - Los consejos tribales tomaban todas las decisiones colectivamente, sin aportaciones ni debates individuales
  - No se había desarrollado el lenguaje escrito, por lo que no se podían registrar las ideas
explanation: |
  Según el capítulo, la libertad de pensamiento no pudo desarrollarse porque las actividades productivas prehistóricas dependían principalmente de la fuerza física bruta para obtener los recursos necesarios para la supervivencia. El texto explica que la inteligencia se desarrolla mediante la educación y las observaciones cotidianas, pero cuando la supervivencia depende de la fuerza física y no de las capacidades mentales, hay pocas oportunidades para el desarrollo intelectual. La comparación entre un mozo y un conductor de locomotora ilustra cómo las innovaciones técnicas permitieron más tarde hacer efectiva la libertad de pensamiento, ya que los distintos tipos de trabajo empezaron a requerir y desarrollar capacidades humanas diferentes, más allá de la mera fuerza física.
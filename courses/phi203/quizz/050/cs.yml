question: Jaký byl hlavní důvod, proč se v pravěkých společnostech nemohla rozvinout svoboda myšlení?
answer: Výroba závisela především na fyzické síle, nikoli na intelektuálních činnostech
wrong_answers:
  - Náboženští vůdci zakázali nezávislé myšlení a zavedli přísná duchovní pravidla
  - Kmenové rady přijímaly veškerá rozhodnutí kolektivně bez individuálních vstupů a diskusí
  - Písemný jazyk nebyl vyvinut, takže myšlenky nebylo možné zaznamenat
explanation: |
  Podle této kapitoly se svoboda myšlení nemohla rozvinout, protože pravěké výrobní činnosti se spoléhaly především na hrubou fyzickou sílu, aby získaly zdroje nezbytné k přežití. Text vysvětluje, že inteligence se rozvíjí díky každodennímu vzdělávání a pozorování, ale když přežití závisí spíše na fyzické síle než na duševních schopnostech, je příležitost k intelektuálnímu rozvoji malá. Srovnání nosiče a průvodčího lokomotivy ilustruje, jak technické inovace později umožnily zefektivnit svobodu myšlení, protože různé druhy práce začaly vyžadovat a rozvíjet jiné lidské schopnosti než jen fyzickou sílu.
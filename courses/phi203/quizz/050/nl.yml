question: Wat was de belangrijkste reden waarom vrijheid van denken zich niet kon ontwikkelen in prehistorische samenlevingen?
answer: Productie was vooral afhankelijk van fysieke kracht in plaats van intellectuele activiteiten
wrong_answers:
  - Religieuze leiders verboden onafhankelijk denken en legden strikte spirituele regels op
  - Stammenraden namen alle beslissingen collectief zonder individuele inbreng of discussie
  - Geschreven taal was nog niet ontwikkeld, dus ideeën konden niet worden vastgelegd
explanation: |
  Volgens het hoofdstuk kon de vrijheid van denken zich niet ontwikkelen omdat de productieactiviteiten in de prehistorie voornamelijk afhankelijk waren van brute fysieke kracht om de noodzakelijke middelen te verkrijgen om te overleven. De tekst legt uit dat intelligentie zich ontwikkelt door dagelijks onderwijs en observaties, maar als overleven afhankelijk is van fysieke kracht in plaats van mentale capaciteiten, is er weinig gelegenheid voor intellectuele ontwikkeling. De vergelijking tussen een kruier en een locomotiefconducteur illustreert hoe technische innovaties later de vrijheid van denken mogelijk maakten, toen verschillende soorten werk verschillende menselijke capaciteiten begonnen te vereisen en te ontwikkelen die verder gingen dan alleen fysieke kracht.
question: เหตุผลหลักที่ทำให้เสรีภาพทางความคิดไม่สามารถพัฒนาในสังคมก่อนประวัติศาสตร์ได้คืออะไร?
answer: การผลิตขึ้นอยู่กับแรงกายมากกว่ากิจกรรมทางปัญญา
wrong_answers:
  - ผู้นำทางศาสนาห้ามการคิดอย่างอิสระและกำหนดกฎเกณฑ์ทางจิตวิญญาณที่เข้มงวด
  - สภาชนเผ่าตัดสินใจทุกเรื่องร่วมกันโดยไม่มีการแสดงความคิดเห็นหรือการอภิปรายส่วนบุคคล
  - ภาษาเขียนยังไม่ได้รับการพัฒนาจึงไม่สามารถบันทึกแนวคิดได้
explanation: |
  ตามบทนี้ เสรีภาพทางความคิดไม่สามารถพัฒนาได้เพราะกิจกรรมการผลิตในยุคก่อนประวัติศาสตร์พึ่งพากำลังทางกายภาพอย่างมากในการหาทรัพยากรที่จำเป็นสำหรับการอยู่รอด ข้อความอธิบายว่าความฉลาดพัฒนาผ่านการศึกษาและการสังเกตในชีวิตประจำวัน แต่เมื่อการอยู่รอดขึ้นอยู่กับความแข็งแรงทางกายภาพมากกว่าความสามารถทางจิตใจ โอกาสในการพัฒนาทางปัญญาจึงมีน้อย การเปรียบเทียบระหว่างคนแบกของกับพนักงานขับรถไฟแสดงให้เห็นว่านวัตกรรมทางเทคนิคในภายหลังทำให้เสรีภาพทางความคิดมีประสิทธิภาพ เนื่องจากงานประเภทต่าง ๆ เริ่มต้องการและพัฒนาความสามารถของมนุษย์ที่แตกต่างกันนอกเหนือจากความแข็งแรงทางกายภาพเพียงอย่างเดียว
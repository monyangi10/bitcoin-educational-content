question: Qual era la ragione principale per cui la libertà di pensiero non poteva svilupparsi nelle società preistoriche?
answer: La produzione dipendeva principalmente dalla forza fisica piuttosto che dalle attività intellettuali
wrong_answers:
  - I leader religiosi proibivano il pensiero indipendente e imponevano rigide regole spirituali
  - I consigli tribali prendevano tutte le decisioni collettivamente, senza alcun contributo o discussione individuale
  - Il linguaggio scritto non era ancora stato sviluppato e quindi le idee non potevano essere registrate
explanation: |
  Secondo il capitolo, la libertà di pensiero non poteva svilupparsi perché le attività produttive preistoriche si basavano principalmente sulla forza fisica bruta per ottenere le risorse necessarie alla sopravvivenza. Il testo spiega che l'intelligenza si sviluppa attraverso l'educazione e l'osservazione quotidiana, ma quando la sopravvivenza dipende dalla forza fisica piuttosto che dalle capacità mentali, le opportunità di sviluppo intellettuale sono scarse. Il confronto tra un facchino e un conduttore di locomotiva illustra come le innovazioni tecniche abbiano permesso in seguito di rendere effettiva la libertà di pensiero, poiché i diversi tipi di lavoro hanno iniziato a richiedere e a sviluppare diverse capacità umane al di là della semplice forza fisica.
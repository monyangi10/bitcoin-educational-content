question: 史前社会无法发展思想自由的主要原因是什么？
answer: 生产主要依靠体力，而不是智力活动
wrong_answers:
  - 宗教领袖禁止独立思考，并强加了严格的精神规则
  - 部落理事会集体做出所有决定，无需个人投入或讨论
  - 书面语言尚未发展，因此无法记录想法
explanation: |
  根据这一章，思想自由无法发展，因为史前的生产活动主要依靠野蛮的体力来获取必要的生存资源。文中解释说，智力是通过日常教育和观察发展起来的，但当生存依赖于体力而非心智能力时，智力发展的机会就很少了。搬运工和火车头售票员之间的比较说明了后来的技术革新是如何让思维自由变得有效的，因为不同类型的工作开始要求和发展人的不同能力，而不仅仅是体力。
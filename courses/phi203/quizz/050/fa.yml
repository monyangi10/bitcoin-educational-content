question: دلیل اصلی اینکه چرا آزادی اندیشه نمی‌توانست در جوامع پیشاتاریخی توسعه یابد چه بود؟
answer: تولید بیشتر به نیروی فیزیکی وابسته بود تا فعالیت‌های فکری
wrong_answers:
  - رهبران مذهبی تفکر مستقل را ممنوع کرده و قوانین معنوی سختگیرانه‌ای را تحمیل کردند
  - شوراهای قبیله‌ای تمام تصمیمات را به صورت جمعی و بدون ورودی یا بحث فردی اتخاذ می‌کردند.
  - زبان نوشتاری توسعه نیافته بود بنابراین ایده‌ها نمی‌توانستند ثبت شوند
explanation: |
  بر اساس این فصل، آزادی اندیشه نمی‌توانست توسعه یابد زیرا فعالیت‌های تولیدی پیش از تاریخ عمدتاً به نیروی فیزیکی خام برای به دست آوردن منابع ضروری برای بقا متکی بودند. متن توضیح می‌دهد که هوش از طریق آموزش و مشاهدات روزانه توسعه می‌یابد، اما زمانی که بقا به جای توانایی‌های ذهنی به قدرت فیزیکی وابسته است، فرصت کمی برای توسعه فکری وجود دارد. مقایسه بین یک باربر و یک راهبر لوکوموتیو نشان می‌دهد که چگونه نوآوری‌های فنی بعداً به آزادی اندیشه اجازه دادند تا مؤثر شود، زیرا انواع مختلف کار شروع به نیاز و توسعه ظرفیت‌های انسانی مختلفی فراتر از قدرت فیزیکی صرف کردند.
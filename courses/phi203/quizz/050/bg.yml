question: Коя е била основната причина свободата на мисълта да не се развие в праисторическите общества?
answer: Производството е зависело главно от физическа сила, а не от интелектуални дейности
wrong_answers:
  - Религиозните лидери забраняват независимото мислене и налагат строги духовни правила
  - Племенните съвети вземаха всички решения колективно, без индивидуален принос или обсъждане
  - Писменият език не е бил развит, така че идеите не са могли да бъдат записани
explanation: |
  Според тази глава свободата на мисълта не е могла да се развие, защото праисторическите производствени дейности са разчитали предимно на грубата физическа сила, за да се набавят необходимите за оцеляването ресурси. В текста се обяснява, че интелектът се развива чрез ежедневно обучение и наблюдения, но когато оцеляването зависи от физическата сила, а не от умствените способности, възможностите за интелектуално развитие са малки. Сравнението между носача и локомотивния кондуктор илюстрира как техническите нововъведения по-късно позволяват свободата на мислене да стане ефективна, тъй като различните видове работа започват да изискват и развиват различни човешки способности, надхвърлящи обикновената физическа сила.
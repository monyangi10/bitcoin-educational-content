question: Apa alasan utama mengapa kebebasan berpikir tidak dapat berkembang dalam masyarakat prasejarah?
answer: Produksi terutama bergantung pada kekuatan fisik daripada kegiatan intelektual
wrong_answers:
  - Para pemimpin agama melarang pemikiran independen dan memberlakukan aturan spiritual yang ketat
  - Dewan suku membuat semua keputusan secara kolektif tanpa masukan atau diskusi perorangan
  - Bahasa tertulis belum berkembang sehingga ide-ide tidak dapat dicatat
explanation: |
  Menurut bab ini, kebebasan berpikir tidak dapat berkembang karena aktivitas produksi prasejarah mengandalkan kekuatan fisik untuk mendapatkan sumber daya yang diperlukan untuk bertahan hidup. Teks ini menjelaskan bahwa kecerdasan berkembang melalui pendidikan dan pengamatan sehari-hari, tetapi ketika kelangsungan hidup bergantung pada kekuatan fisik dan bukan kemampuan mental, hanya ada sedikit kesempatan untuk perkembangan intelektual. Perbandingan antara kuli angkut dan kondektur lokomotif menggambarkan bagaimana inovasi teknis kemudian memungkinkan kebebasan berpikir menjadi efektif, karena berbagai jenis pekerjaan mulai membutuhkan dan mengembangkan kapasitas manusia yang berbeda di luar kekuatan fisik.
question: Mikä oli tärkein syy siihen, että ajatuksenvapaus ei voinut kehittyä esihistoriallisissa yhteiskunnissa?
answer: Tuotanto riippui pääasiassa fyysisestä voimasta eikä niinkään älyllisestä toiminnasta
wrong_answers:
  - Uskonnolliset johtajat kielsivät itsenäisen ajattelun ja asettivat tiukat hengelliset säännöt
  - Heimoneuvostot tekivät kaikki päätökset kollektiivisesti ilman yksilöllistä panosta tai keskustelua
  - Kirjakieli ei ollut kehittynyt, joten ajatuksia ei voitu kirjata ylös
explanation: |
  Luvun mukaan ajattelun vapaus ei voinut kehittyä, koska esihistoriallinen tuotantotoiminta perustui ensisijaisesti raakaan fyysiseen voimaan selviytymiseen tarvittavien resurssien hankkimiseksi. Tekstissä selitetään, että älykkyys kehittyy päivittäisen koulutuksen ja havaintojen kautta, mutta kun selviytyminen riippuu pikemminkin fyysisestä voimasta kuin henkisistä kyvyistä, älylliseen kehitykseen on vain vähän mahdollisuuksia. Vertailu kantajan ja veturinkuljettajan välillä havainnollistaa, miten tekniset innovaatiot mahdollistivat myöhemmin ajattelun vapauden toteutumisen, kun erityyppiset työt alkoivat vaatia ja kehittää erilaisia inhimillisiä kykyjä pelkän fyysisen voiman lisäksi.
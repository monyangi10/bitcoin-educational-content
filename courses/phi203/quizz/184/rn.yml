question: Dukurikije isesengura rya Frédéric Bastiat ry’ubuhinga bwa sophisme, ni intambamyi iyihe y’ubwenge nyamukuru ituma ukutagira umwidegemvyo gukomeza mu mibano naho hari ibimenyamenya vy’akahise bishigikira umwidegemvyo?
answer: Ivyiyumviro vy’ubuhinga bikomeye bitanga imishinge y’ubwenge ku bijanye n’imirongo y’ukutagira umwidegemvyo, akenshi biterwa imbere n’uguzirikana kw’abantu bafise intumbero nziza ariko bitari vyo .
wrong_answers:
  - Intumbero mbi zitaziguye z’abarongozi ba politike barondera guhahaza abantu kugira ngo bironke inyungu zabo bwite
  - Kubura ibimenyamenya vy’akahise vyerekana inyungu z’umwidegemvyo ku bijanye n’ubutegetsi bw’agahomerabunwa .
  - Ubukene bw’ubutunzi butuma bidashoboka kwagura umwidegemvyo nyawo ku bantu bose bo mu kibano icarimwe .
explanation: |
  Bastiat yerekanye ko ugushikama kw’ukutagira umwidegemvyo kuva ku buhinga bwa sophisme - amakosa mu gutekereza ku bintu canke amakosa y’ukuri - aho kuva ku ntumbero mbi. Yarizera ko abasosiyalisiti n’abanyagihugu bo mu gihe ciwe bari bafise imigambi myiza ariko bariko barihenda mu bwenge. Ivyo vyiyumviro vy’ubupfumu biratuma habaho imvo z’ubwenge zo kubuza umwidegemvyo, bikaba bituma bitera akaga kuruta ububisha butomoye kubera ko bisa n’ibibereye kandi bifise inyifato runtu. Ayandi mahitamwo araserukira nabi isesengura rya Bastiat: ntiyashize ukutagira umwidegemvyo ku ntumbero mbi, yemeye ko amateka yariko aratera imbere mu kwidegemvya, kandi ntiyabona ko ubukene bw’ubutunzi ari intambamyi nyamukuru y’umwidegemvyo.
question: Why does the text argue that a consumer can judge a market purchase far more reliably than a citizen can judge a grand state reform?
answer: Market purchases generate immediate, personal feedback on whether they satisfied one's needs, while state reforms affect something so vast that individual experience cannot measure their effects
wrong_answers:
  - Market purchases involve smaller sums, so mistakes are less costly and more easily corrected than errors in large government programs
  - Consumers have access to more information about products than citizens have about policies, because producers are required to disclose specifications
  - Market outcomes are determined by individual choice alone, while state reforms involve collective action problems that dilute individual accountability
explanation: |
  The text presents a concrete illustration of the superiority of contract over political choice. As a consumer, one can judge immediately whether a particular purchase satisfied a need — the feedback is direct, personal, and felt through the immediate pain or pleasure of one's own experience. But judging whether grand reforms to national education or the postal service have given satisfaction is another matter entirely: the individual is not a consumer of everything, and the effects vastly exceed any single person's experience. Political choice is therefore structurally inferior to market choice because the individual cannot directly observe or measure what he has received in return.

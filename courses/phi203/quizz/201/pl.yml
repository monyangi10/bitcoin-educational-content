question: Co Bastiat identyfikuje jako podstawowy błąd logiczny, który umożliwia zarówno komunizmowi, jak i nadmiernej regulacji utrzymanie intelektualnej legitymizacji pomimo ich sprzeciwu wobec wolności gospodarczej?
answer: Opierają się na sofizmatach ekonomicznych - błędnym rozumowaniu, które odwraca środki i cele, tworzy fałszywe związki przyczynowe i przedstawia fikcyjne przeciwieństwa między interesami
wrong_answers:
  - Wykorzystują oni prawdziwe matematyczne sprzeczności w teorii wolnego rynku, które pokazują niemożność trwałego wzrostu gospodarczego bez interwencji państwa
  - Wykorzystują one nieodłączną niestabilność dobrowolnych systemów wymiany, które w naturalny sposób dążą do monopolizacji i wymagają korekty regulacyjnej
  - Wykorzystują one sprawdzony historyczny wzorzec, że nieograniczone rynki nieuchronnie prowadzą do wojny klasowej i upadku społecznego bez nadzoru rządu
explanation: |
  Podstawowym spostrzeżeniem Bastiata jest to, że systemy sprzeciwiające się wolności gospodarczej utrzymują się dzięki sofizmatom - w szczególności błędnym schematom rozumowania, w tym traktowaniu pracy jako celu, a nie środka, ustanawianiu fałszywych powiązań przyczynowych i tworzeniu sztucznej opozycji między interesami ogólnymi i partykularnymi. Nieprawidłowe odpowiedzi błędnie sugerują, że systemy te mają uzasadnione podstawy logiczne, podczas gdy Bastiatowi chodzi właśnie o to, że przetrwały one jedynie dzięki błędom logicznym i przeinaczeniom, a nie prawdziwym sprzecznościom w teorii liberalnej.
question: Ni igiki Bastiat abona ko ari co kintu nyamukuru gishobora gutuma ubukomunisita n’amategeko arenze urugero biguma bifise uburenganzira bwo gukora mu vy’ubwenge naho nyene birwanya umwidegemvyo w’ubutunzi?
answer: Bishingiye ku buhinga bw’ubutunzi - ivyiyumviro bitari vyo bihindura uburyo n’intumbero, bikarema imigenderanire y’ibinyoma y’inkomoko, kandi bikagaragaza ukurwanya kw’ibinyoma hagati y’inyungu .
wrong_answers:
  - Bakoresha ibivuguruzanya vy’ukuri vy’imibare mu vyiyumviro vy’isoko ry’uburenganzira vyerekana ko bidashoboka ko ubutunzi buramba butera imbere ata Leta igira ico ikoze .
  - Bakoresha ukudashikama kw’imirongo y’uguhana amafaranga y’ubushake, ivyo bikaba bikunda gukoreshwa n’abantu bamwebamwe kandi bisaba gukosorwa n’amategeko .
  - Bakoresha uburyo bwa kahise bwagaragaye bw’uko amasoko atagira amategeko ashobora gutuma haba intambara y’imigwi n’ugusenyuka kw’imibano ata n’umwe abigenzura .
explanation: |
  Iciyumviro nyamukuru ca Bastiat ni uko uburyo burwanya umwidegemvyo w’ubutunzi bwigumya biciye mu buhinga bwa sophisme - cane cane uburyo bwo kwiyumvira butari bwo harimwo gufata akazi nk’intumbero aho gufata uburyo, gushinga amasano y’ibinyoma y’inkomoko, no kurema ukurwanya kw’ibinyoma hagati y’inyungu rusangi n’iz’umwihariko. Inyishu zitari zo zivuga mu buryo butari bwo ko izo nzira zifise imishinge ibereye, mu gihe iciyumviro ca Bastiat ari co nyene ko zirokoka gusa biciye ku makosa yumvikana no ku gusobanura nabi, atari ukuvuguruzanya nyakuri mu vyiyumviro vy’uburenganzira.
question: باستیا چه مغالطه منطقی اصلی را شناسایی می‌کند که به کمونیسم و مقررات‌گذاری بیش از حد اجازه می‌دهد تا علی‌رغم مخالفتشان با آزادی اقتصادی، مشروعیت فکری خود را حفظ کنند؟
answer: آن‌ها به سفسطه‌های اقتصادی تکیه می‌کنند - استدلال‌های نادرستی که وسایل و اهداف را وارونه می‌کنند، روابط علّی کاذب ایجاد می‌کنند و تضادهای ساختگی بین منافع ارائه می‌دهند.
wrong_answers:
  - آن‌ها از تناقضات واقعی ریاضی در نظریه بازار آزاد بهره‌برداری می‌کنند که نشان‌دهنده عدم امکان رشد اقتصادی پایدار بدون مداخله دولت است.
  - آن‌ها از ناپایداری ذاتی سیستم‌های مبادله داوطلبانه که به طور طبیعی به سمت انحصارگرایی تمایل دارند و نیاز به اصلاحات نظارتی دارند، بهره‌برداری می‌کنند.
  - آن‌ها از الگوی تاریخی اثبات‌شده‌ای استفاده می‌کنند که بازارهای بدون محدودیت به‌طور اجتناب‌ناپذیر به جنگ طبقاتی و فروپاشی اجتماعی بدون نظارت دولت منجر می‌شوند.
explanation: |
  بینش بنیادی بَستیَت این است که سیستم‌هایی که با آزادی اقتصادی مخالفند، از طریق سفسطه‌ها خود را حفظ می‌کنند - به‌ویژه الگوهای استدلالی غلط که شامل تلقی کار به‌عنوان هدف به‌جای وسیله، ایجاد پیوندهای علّی نادرست، و ایجاد تقابل مصنوعی بین منافع عمومی و خاص می‌شود. پاسخ‌های نادرست به‌اشتباه پیشنهاد می‌کنند که این سیستم‌ها دارای پایه‌های منطقی مشروع هستند، در حالی که نکته بَستیَت دقیقاً این است که آن‌ها تنها از طریق خطاهای منطقی و تحریف‌ها زنده می‌مانند، نه تناقضات واقعی در نظریه لیبرال.
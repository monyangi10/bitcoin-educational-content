question: 바스티아트는 공산주의와 과도한 규제가 경제적 자유에 반대함에도 불구하고 지적 정당성을 유지할 수 있는 핵심 논리적 오류로 무엇을 꼽았나요?
answer: 경제적 궤변, 즉 수단과 목적을 뒤집고, 잘못된 인과 관계를 만들고, 이해관계 간의 허구적인 대립을 제시하는 잘못된 추론에 의존합니다
wrong_answers:
  - 그들은 국가 개입 없이는 지속적인 경제 성장이 불가능하다는 것을 보여주는 자유 시장 이론의 진정한 수학적 모순을 악용합니다
  - 이들은 자연적으로 독점화 경향이 있고 규제가 필요한 자발적 교환 시스템의 내재적 불안정성을 이용합니다
  - 제한 없는 시장은 필연적으로 정부의 감독 없이 계급 전쟁과 사회 붕괴로 이어진다는 입증된 역사적 패턴을 활용합니다
explanation: |
  바스티아트의 근본적인 통찰은 경제적 자유에 반대하는 체제는 궤변, 특히 일을 수단이 아닌 목적으로 취급하고, 잘못된 인과 관계를 설정하고, 일반 이익과 특정 이익 사이에 인위적인 대립을 만드는 등의 잘못된 추론 패턴을 통해 스스로를 유지한다는 것입니다. 오답은 이러한 체제가 정당한 논리적 토대를 가지고 있음을 잘못 암시하지만, 바스티아의 요점은 자유주의 이론의 진정한 모순이 아니라 논리적 오류와 허위 진술을 통해서만 생존한다는 것입니다.
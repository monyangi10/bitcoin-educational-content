question: Koju osnovnu logičku grešku Bastiat identifikuje kao onu koja omogućava i komunizmu i prekomernoj regulaciji da zadrže intelektualni legitimitet uprkos njihovom protivljenju ekonomskoj slobodi?
answer: Oni se oslanjaju na ekonomske sofizme - pogrešno rasuđivanje koje obrće sredstva i ciljeve, stvara lažne uzročno-posledične veze i predstavlja fiktivne suprotnosti između interesa
wrong_answers:
  - Oni iskorišćavaju stvarne matematičke kontradikcije u teoriji slobodnog tržišta koje pokazuju nemogućnost održivog ekonomskog rasta bez intervencije države.
  - Oni kapitalizuju na inherentnoj nestabilnosti sistema dobrovoljne razmene koje prirodno teže ka monopolizaciji i zahtevaju regulatornu korekciju.
  - Oni koriste dokazani istorijski obrazac da neograničena tržišta neminovno vode ka klasnom ratu i društvenom kolapsu bez nadzora vlade.
explanation: |
  Bastiatova fundamentalna spoznaja je da se sistemi koji se protive ekonomskoj slobodi održavaju kroz sofizme - konkretno pogrešne obrasce rasuđivanja uključujući tretiranje rada kao cilja umesto sredstva, uspostavljanje lažnih uzročnih veza i stvaranje veštačke opozicije između opštih i posebnih interesa. Pogrešni odgovori pogrešno sugerišu da ti sistemi imaju legitimne logičke osnove, dok je Bastiatova poenta upravo da oni opstaju samo kroz logičke greške i pogrešna predstavljanja, a ne kroz stvarne kontradikcije u liberalnoj teoriji.
question: Co Bastiat označuje za hlavní logický omyl, který umožňuje komunismu i nadměrné regulaci udržet si intelektuální legitimitu navzdory jejich odporu k ekonomické svobodě?
answer: Opírají se o ekonomické sofismy - chybné úvahy, které převracejí prostředky a cíle, vytvářejí falešné příčinné vztahy a předkládají fiktivní protiklady mezi zájmy
wrong_answers:
  - Využívají skutečných matematických rozporů v teorii volného trhu, které ukazují nemožnost udržitelného hospodářského růstu bez státních zásahů
  - Využívají přirozené nestability systémů dobrovolné směny, které přirozeně směřují k monopolizaci a vyžadují regulační korekci
  - Využívají historicky ověřený vzorec, že neomezený trh bez státního dohledu nevyhnutelně vede k třídnímu boji a sociálnímu kolapsu
explanation: |
  Bastiatův základní poznatek spočívá v tom, že systémy, které se staví proti ekonomické svobodě, se udržují pomocí sofismů - konkrétně chybných vzorců uvažování, mezi něž patří považování práce za cíl, nikoli za prostředek, vytváření falešných příčinných souvislostí a umělých protikladů mezi obecnými a partikulárními zájmy. Chybné odpovědi nesprávně naznačují, že tyto systémy mají legitimní logické základy, zatímco Bastiatova pointa spočívá právě v tom, že přežívají pouze díky logickým chybám a zkreslením, nikoli skutečným rozporům v liberální teorii.
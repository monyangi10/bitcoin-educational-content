question: Che cosa individua Bastiat come la fallacia logica centrale che permette sia al comunismo che all'eccessiva regolamentazione di mantenere una legittimità intellettuale nonostante la loro opposizione alla libertà economica?
answer: Si basano su sofismi economici - ragionamenti fallaci che invertono mezzi e fini, creano false relazioni causali e presentano opposizioni fittizie tra gli interessi
wrong_answers:
  - Sfruttano vere e proprie contraddizioni matematiche della teoria del libero mercato che dimostrano l'impossibilità di una crescita economica sostenuta senza l'intervento dello Stato
  - Sfruttano l'instabilità intrinseca dei sistemi di scambio volontario che tendono naturalmente alla monopolizzazione e richiedono una correzione normativa
  - Fanno leva sul comprovato modello storico secondo cui i mercati senza restrizioni portano inevitabilmente alla guerra di classe e al collasso sociale senza la supervisione del governo
explanation: |
  L'intuizione fondamentale di Bastiat è che i sistemi che si oppongono alla libertà economica si mantengono attraverso sofismi - in particolare modelli di ragionamento fallaci, tra cui trattare il lavoro come un fine piuttosto che come un mezzo, stabilire falsi legami causali e creare un'opposizione artificiale tra interessi generali e particolari. Le risposte sbagliate suggeriscono erroneamente che questi sistemi hanno basi logiche legittime, mentre il punto di Bastiat è proprio che sopravvivono solo grazie a errori logici e travisamenti, non a vere e proprie contraddizioni della teoria liberale.
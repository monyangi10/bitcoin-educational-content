question: Wat beschouwt Bastiat als de belangrijkste logische denkfout waardoor zowel communisme als buitensporige regulering intellectuele legitimiteit behouden ondanks hun verzet tegen economische vrijheid?
answer: Ze vertrouwen op economische drogredenen - misleidende redeneringen die middelen en doelen omkeren, valse oorzakelijke verbanden leggen en fictieve tegenstellingen tussen belangen presenteren
wrong_answers:
  - Ze maken gebruik van echte wiskundige tegenstrijdigheden in de theorie van de vrije markt die aantonen dat duurzame economische groei onmogelijk is zonder staatsinterventie
  - Ze maken gebruik van de inherente instabiliteit van vrijwillige uitwisselingssystemen die van nature neigen naar monopolisering en regulering vereisen
  - Ze maken gebruik van het bewezen historische patroon dat onbeperkte markten onvermijdelijk leiden tot klassenstrijd en sociale ineenstorting zonder overheidstoezicht
explanation: |
  Bastiat's fundamentele inzicht is dat systemen die zich verzetten tegen economische vrijheid zichzelf in stand houden door middel van drogredenen - met name misleidende redeneerpatronen zoals het behandelen van werk als doel in plaats van als middel, het leggen van valse causale verbanden en het creëren van een kunstmatige tegenstelling tussen algemene en bijzondere belangen. De foute antwoorden suggereren ten onrechte dat deze systemen legitieme logische grondslagen hebben, terwijl Bastiat's punt juist is dat ze alleen overleven door logische fouten en verkeerde voorstellingen, niet door echte tegenstrijdigheden in de liberale theorie.
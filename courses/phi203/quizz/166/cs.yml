question: Jaký byl podle liberálních ekonomů 19. století hlavní důsledek systému "soutěžních zvyklostí" (douane des concours) na profesní rozvoj?
answer: Formátovala jednotlivce k rigidnímu fungování a bránila vzniku inovátorů a vynálezců
wrong_answers:
  - Podpořil podnikatelské inovace vytvořením strukturovaných vzdělávacích cest pro odborníky
  - Snížila náklady na odborné vzdělávání standardizací učebních plánů navržených vládou
  - Zvýšila konkurenci tím, že zpřístupnila profesní kvalifikace všem
explanation: |
  Systém "douane des concours" vytvořil regulované vzdělávací kanály, které povrchně prospívaly některým profesím, ale v konečném důsledku škodily inovacím. Tím, že tento systém nahrazoval státem navržené programy podnikatelského rozvoje, formoval jednotlivce k rigidnímu, rutinnímu fungování, které bránilo vzniku géniů, inovátorů a vynálezců, kteří by mohli rozvíjet své obory. Namísto podpory konkurence nebo inovací omezoval profesní rozvoj na memorování předem stanovených osnov, čímž potlačoval tvůrčí pokrok, který by přirozeně nastal v systému volného trhu.
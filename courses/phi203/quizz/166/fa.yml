question: طبق نظر اقتصاددانان لیبرال قرن نوزدهم، پیامد اصلی سیستم 'آداب رقابت' (douane des concours) بر توسعه حرفه‌ای چه بود؟
answer: این افراد را به عملکرد سختگیرانه‌ای قالب‌بندی کرد و از ظهور نوآوران و مخترعان جلوگیری کرد.
wrong_answers:
  - این امر با ایجاد مسیرهای یادگیری ساختاریافته برای حرفه‌ای‌ها، نوآوری کارآفرینانه را تشویق کرد.
  - هزینه آموزش حرفه‌ای را با استانداردسازی برنامه‌های درسی طراحی‌شده توسط دولت کاهش داد.
  - با در دسترس‌تر کردن مدارک حرفه‌ای برای همه، رقابت را افزایش داد.
explanation: |
  سیستم 'douane des concours' کانال‌های یادگیری تنظیم‌شده‌ای ایجاد کرد که به‌طور سطحی به نفع برخی حرفه‌ها بود اما در نهایت به نوآوری آسیب رساند. با جایگزینی برنامه‌های طراحی‌شده توسط دولت به‌جای پیشرفت کارآفرینی، این سیستم افراد را به عملکردی سخت و روتین قالب‌بندی کرد که مانع ظهور نوابغ، نوآوران و مخترعانی شد که می‌توانستند زمینه‌های خود را پیش ببرند. به‌جای ترویج رقابت یا نوآوری، توسعه حرفه‌ای را به حفظ برنامه‌های درسی از پیش تعیین‌شده محدود کرد و پیشرفت خلاقانه‌ای را که به‌طور طبیعی در یک سیستم بازار آزاد رخ می‌داد، خفه کرد.
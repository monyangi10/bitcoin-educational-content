question: 19세기 자유주의 경제학자들에 따르면, '경쟁의 관습'(두안 데 콩쿠르) 제도가 직업 개발에 미친 주요 결과는 무엇이었을까요?
answer: 개인을 경직된 기능에 묶어두고 혁신가와 발명가의 출현을 막았습니다
wrong_answers:
  - 전문가를 위한 체계적인 학습 경로를 만들어 기업가적 혁신을 장려했습니다
  - 정부가 설계한 커리큘럼을 표준화하여 전문 교육 비용을 절감했습니다
  - 모든 사람이 전문 자격에 더 쉽게 접근할 수 있게 함으로써 경쟁이 치열해졌습니다
explanation: |
  '두안 데 콩쿠르' 제도는 표면적으로는 특정 직업군에 혜택을 주었지만 궁극적으로는 혁신을 저해하는 규제된 학습 채널을 만들었습니다. 이 시스템은 기업가적 발전을 위해 국가가 설계한 프로그램을 대체함으로써 개인을 경직되고 일상적인 기능에 길들여 해당 분야를 발전시킬 수 있는 천재, 혁신가, 발명가의 출현을 막았습니다. 경쟁이나 혁신을 촉진하기보다는 미리 정해진 커리큘럼을 암기하는 것으로 전문성 개발을 제한하여 자유 시장 시스템에서 자연스럽게 일어날 수 있는 창의적 발전을 억압했습니다.
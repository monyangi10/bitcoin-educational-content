question: Secondo gli economisti liberali del XIX secolo, qual era la principale conseguenza del sistema della "dogana dei concorsi" (douane des concours) sullo sviluppo professionale?
answer: Ha imposto agli individui un funzionamento rigido e ha impedito l'emergere di innovatori e inventori
wrong_answers:
  - Ha incoraggiato l'innovazione imprenditoriale creando percorsi di apprendimento strutturati per i professionisti
  - Ha ridotto il costo dell'istruzione professionale standardizzando i programmi di studio definiti dal governo
  - Ha aumentato la concorrenza rendendo le qualifiche professionali più accessibili a tutti
explanation: |
  Il sistema della "douane des concours" ha creato canali di apprendimento regolamentati che hanno avvantaggiato superficialmente alcune professioni, ma che in ultima analisi hanno danneggiato l'innovazione. Sostituendo i programmi stabiliti dallo Stato all'avanzamento imprenditoriale, questo sistema formattava gli individui a un funzionamento rigido e routinario che impediva l'emergere di geni, innovatori e inventori in grado di far progredire i loro campi. Piuttosto che promuovere la concorrenza o l'innovazione, limitava lo sviluppo professionale alla memorizzazione di programmi predeterminati, soffocando il progresso creativo che si sarebbe naturalmente verificato in un sistema di libero mercato.
question: Prema liberalnim ekonomistima iz 19. veka, koji je bio primarni rezultat sistema 'carina konkursa' (douane des concours) na profesionalni razvoj?
answer: Formatiralo je pojedince za rigidno funkcionisanje i sprečavalo pojavu inovatora i pronalazača.
wrong_answers:
  - Podsticao je preduzetničke inovacije stvaranjem strukturiranih puteva učenja za profesionalce
  - Smanjilo je troškove profesionalnog obrazovanja standardizacijom kurikuluma koje je dizajnirala vlada.
  - Povećala je konkurenciju time što je profesionalne kvalifikacije učinila dostupnijim svima.
explanation: |
  Sistem 'douane des concours' kreirao je regulisane kanale učenja koji su površno koristili određenim profesijama, ali su na kraju štetili inovacijama. Zamenom programa koje je dizajnirala država za preduzetnički napredak, ovaj sistem je formatirao pojedince za kruto, rutinsko funkcionisanje koje je sprečavalo pojavu genija, inovatora i pronalazača koji bi mogli unaprediti svoje oblasti. Umesto da promoviše konkurenciju ili inovacije, ograničavao je profesionalni razvoj na memorisanje unapred određenih nastavnih planova, gušeći kreativni napredak koji bi se prirodno desio u sistemu slobodnog tržišta.
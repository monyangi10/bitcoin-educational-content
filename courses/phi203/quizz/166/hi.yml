question: According to 19th-century liberal economists, what was the primary consequence of the 'customs of competitions' (douane des concours) system on professional development?
answer: It formatted individuals to rigid functioning and prevented the emergence of innovators and inventors
wrong_answers:
  - It encouraged entrepreneurial innovation by creating structured learning pathways for professionals
  - It reduced the cost of professional education by standardizing government-designed curricula
  - It increased competition by making professional qualifications more accessible to everyone
explanation: |
  The 'douane des concours' system created regulated learning channels that benefited certain professions superficially but ultimately harmed innovation. By substituting state-designed programs for entrepreneurial advancement, this system formatted individuals to rigid, routine functioning that prevented the emergence of geniuses, innovators, and inventors who could advance their fields. Rather than promoting competition or innovation, it limited professional development to memorizing predetermined curricula, stifling the creative progress that would naturally occur in a free market system.
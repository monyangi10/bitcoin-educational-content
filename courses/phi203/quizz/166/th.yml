question: ตามที่นักเศรษฐศาสตร์เสรีนิยมในศตวรรษที่ 19 กล่าวไว้ ผลที่ตามมาหลักของระบบ 'customs of competitions' (douane des concours) ต่อการพัฒนาวิชาชีพคืออะไร?
answer: มันทำให้บุคคลมีรูปแบบการทำงานที่เข้มงวดและป้องกันการเกิดขึ้นของนักนวัตกรรมและนักประดิษฐ์
wrong_answers:
  - มันส่งเสริมการสร้างสรรค์นวัตกรรมทางธุรกิจโดยการสร้างเส้นทางการเรียนรู้ที่มีโครงสร้างสำหรับมืออาชีพ
  - มันลดค่าใช้จ่ายในการศึกษาวิชาชีพโดยการทำให้หลักสูตรที่ออกแบบโดยรัฐบาลเป็นมาตรฐาน
  - มันเพิ่มการแข่งขันโดยทำให้คุณวุฒิวิชาชีพเข้าถึงได้ง่ายขึ้นสำหรับทุกคน
explanation: |
  ระบบ 'douane des concours' ที่สร้างช่องทางการเรียนรู้ที่มีการควบคุมซึ่งเป็นประโยชน์ต่อบางอาชีพในระดับผิวเผิน แต่ในที่สุดกลับทำลายนวัตกรรม ด้วยการแทนที่โปรแกรมที่ออกแบบโดยรัฐสำหรับการพัฒนาผู้ประกอบการ ระบบนี้ได้จัดรูปแบบบุคคลให้ทำงานในลักษณะที่เข้มงวดและเป็นกิจวัตร ซึ่งป้องกันการเกิดขึ้นของอัจฉริยะ นักนวัตกรรม และนักประดิษฐ์ที่สามารถพัฒนาสาขาของตนได้ แทนที่จะส่งเสริมการแข่งขันหรือนวัตกรรม มันจำกัดการพัฒนาวิชาชีพให้เหลือเพียงการท่องจำหลักสูตรที่กำหนดไว้ล่วงหน้า ขัดขวางความก้าวหน้าทางความคิดสร้างสรรค์ที่ควรจะเกิดขึ้นตามธรรมชาติในระบบตลาดเสรี
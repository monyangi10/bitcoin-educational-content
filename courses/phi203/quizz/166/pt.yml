question: De acordo com os economistas liberais do século XIX, qual era a principal consequência do sistema de "costumes dos concursos" (douane des concours) para o desenvolvimento profissional?
answer: Formatou os indivíduos para um funcionamento rígido e impediu o aparecimento de inovadores e inventores
wrong_answers:
  - Incentivou a inovação empresarial através da criação de percursos de aprendizagem estruturados para os profissionais
  - Reduziu o custo da formação profissional através da normalização dos currículos concebidos pelo governo
  - Aumentou a concorrência ao tornar as qualificações profissionais mais acessíveis a todos
explanation: |
  O sistema de "douane des concours" criou canais de aprendizagem regulamentados que beneficiaram superficialmente certas profissões, mas que acabaram por prejudicar a inovação. Ao substituir o avanço empresarial por programas concebidos pelo Estado, este sistema formatava os indivíduos para um funcionamento rígido e rotineiro que impedia o aparecimento de génios, inovadores e inventores que pudessem fazer avançar as suas áreas. Em vez de promover a concorrência ou a inovação, limitou o desenvolvimento profissional à memorização de currículos pré-determinados, sufocando o progresso criativo que ocorreria naturalmente num sistema de mercado livre.
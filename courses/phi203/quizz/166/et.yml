question: Milline oli 19. sajandi liberaalsete majandusteadlaste arvates "võistluste tavade" (douane des concours) süsteemi peamine tagajärg kutsealasele arengule?
answer: See vormindas üksikisikuid jäigaks toimimiseks ja takistas uuendajate ja leiutajate tekkimist
wrong_answers:
  - See julgustas ettevõtlusalast innovatsiooni, luues spetsialistidele struktureeritud õppimisvõimalusi
  - See vähendas kutsehariduse kulusid, standardiseerides valitsuse poolt koostatud õppekavasid
  - See suurendas konkurentsi, muutes kutsekvalifikatsioonid kõigile kättesaadavamaks
explanation: |
  Douane des concours'i süsteem lõi reguleeritud õppimiskanalid, mis tõid pealiskaudselt kasu teatavatele kutsealadele, kuid lõppkokkuvõttes kahjustasid innovatsiooni. Asendades riiklikult kavandatud programmid ettevõtluse edendamisele, vormistas see süsteem üksikisikud jäigale, rutiinsele toimimisele, mis takistas geeniuste, uuendajate ja leiutajate tekkimist, kes võiksid oma valdkonda edasi arendada. Selle asemel, et edendada konkurentsi või innovatsiooni, piiras see kutsealast arengut etteantud õppekavade meeldejätmisega, lämmatades loomingulist arengut, mis vabaturusüsteemis loomulikult toimuks.
question: What does the text mean by describing the preservation and increase of capital as a form of "negative work"?
answer: It requires resisting the constant temptation of immediate consumption and directing investments wisely to avoid losing value
wrong_answers:
  - It refers to work that destroys existing resources rather than creating new ones, as in hunting and fishing
  - It describes the work done by laborers who are paid below the value they produce, generating profit for owners
  - It means that capital automatically generates returns without any active effort from its owner
explanation: |
  The text extends the principle that property requires labor beyond the cultivation of land to include the ownership of capital. To preserve and increase one's capital is described as a form of negative work: it demands resistance to the constant temptation of immediate consumption and the ability to direct investments wisely. Many lose their capital, either through dissipation in consumption or through misguided ventures that fail to reproduce in value what they cost. Far from being effortless, holding and growing capital is itself a demanding activity, which reinforces the liberal argument that property is grounded in sustained human effort rather than passive inheritance.

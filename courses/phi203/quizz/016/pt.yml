question: Que comparação utilizou o Abade de Saint-Pierre para descrever as instituições políticas e a sua necessidade de manutenção regular?
answer: Comparou-os a relógios que precisam de ser regularmente acertados
wrong_answers:
  - Comparou-os a jardins que precisam de ser regados e podados constantemente
  - Comparou-os a máquinas que necessitam de mudanças de óleo e reparações periódicas
  - Comparou-os a edifícios que necessitam de inspecções estruturais regulares
explanation: |
  O Abade de Saint-Pierre comparou especificamente as instituições políticas a relógios (horloges) que necessitam de corda regular para continuarem a funcionar corretamente. Esta metáfora ilustra que as instituições precisam de atenção, debate e reforma contínuos para se manterem eficazes e responderem às necessidades da sociedade. As outras comparações, embora concetualmente semelhantes ao sugerirem necessidades de manutenção, não são a comparação real feita pelo Abade de Saint-Pierre no texto e representariam diferentes perspectivas filosóficas sobre a manutenção institucional.
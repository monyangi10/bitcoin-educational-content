question: Quale paragone usò l'Abbé de Saint-Pierre per descrivere le istituzioni politiche e la loro necessità di una regolare manutenzione?
answer: Li ha paragonati a orologi che devono essere caricati regolarmente
wrong_answers:
  - Li ha paragonati a giardini che necessitano di annaffiature e potature costanti
  - Li ha paragonati a macchine che necessitano di cambi d'olio e riparazioni periodiche
  - Li ha paragonati a edifici che necessitano di regolari ispezioni strutturali
explanation: |
  L'Abbé de Saint-Pierre ha paragonato le istituzioni politiche a orologi (horloges) che necessitano di una carica regolare per continuare a funzionare correttamente. Questa metafora illustra che le istituzioni hanno bisogno di attenzione, dibattito e riforme continue per rimanere efficaci e rispondere alle esigenze della società. Gli altri paragoni, pur essendo concettualmente simili nel suggerire la necessità di manutenzione, non sono il paragone effettivo fatto dall'Abbé de Saint-Pierre nel testo e rappresenterebbero prospettive filosofiche diverse sulla manutenzione delle istituzioni.
question: Millä vertauksella Abbé de Saint-Pierre kuvasi poliittisia instituutioita ja niiden säännöllistä huoltoa?
answer: Hän vertasi niitä kelloihin, joita on vedettävä säännöllisesti
wrong_answers:
  - Hän vertasi niitä puutarhoihin, jotka vaativat jatkuvaa kastelua ja karsimista
  - Hän vertasi niitä koneisiin, jotka tarvitsevat säännöllisiä öljynvaihtoja ja korjauksia
  - Hän vertasi niitä rakennuksiin, jotka tarvitsevat säännöllisiä rakennetarkastuksia
explanation: |
  Abbé de Saint-Pierre vertasi poliittisia instituutioita kelloihin, jotka vaativat säännöllistä vedonlyöntiä toimiakseen kunnolla. Tämä vertauskuva osoittaa, että instituutiot tarvitsevat jatkuvaa huomiota, keskustelua ja uudistuksia pysyäkseen tehokkaina ja vastatakseen yhteiskunnan tarpeisiin. Vaikka muut vertailut ovat käsitteellisesti samankaltaisia ja viittaavat ylläpitotarpeisiin, ne eivät ole Abbé de Saint-Pierren tekstissä esittämä varsinainen vertailu, ja ne edustavat erilaisia filosofisia näkökulmia instituutioiden ylläpitoon.
question: Jakiego porównania użył Abbé de Saint-Pierre, aby opisać instytucje polityczne i ich potrzebę regularnej konserwacji?
answer: Porównał je do zegarów, które muszą być regularnie nakręcane
wrong_answers:
  - Porównał je do ogrodów, które wymagają ciągłego podlewania i przycinania
  - Porównał je do maszyn, które wymagają okresowych wymian oleju i napraw
  - Porównał je do budynków, które wymagają regularnych inspekcji strukturalnych
explanation: |
  Abbé de Saint-Pierre w szczególności porównał instytucje polityczne do zegarów (horloges), które wymagają regularnego nakręcania, aby nadal działały prawidłowo. Metafora ta ilustruje, że instytucje wymagają ciągłej uwagi, debaty i reform, aby pozostać skutecznymi i reagować na potrzeby społeczeństwa. Pozostałe porównania, choć koncepcyjnie podobne w sugerowaniu potrzeb konserwacyjnych, nie są faktycznym porównaniem dokonanym przez Abbé de Saint-Pierre'a w tekście i reprezentowałyby różne filozoficzne perspektywy utrzymania instytucji.
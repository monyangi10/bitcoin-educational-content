question: Perbandingan apa yang digunakan Abbé de Saint-Pierre untuk menggambarkan lembaga-lembaga politik dan kebutuhan mereka akan pemeliharaan rutin?
answer: Dia membandingkannya dengan jam yang perlu diputar secara teratur
wrong_answers:
  - Dia membandingkannya dengan taman yang membutuhkan penyiraman dan pemangkasan yang konstan
  - Dia membandingkannya dengan mesin yang membutuhkan penggantian dan perbaikan oli secara berkala
  - Dia membandingkannya dengan bangunan yang membutuhkan inspeksi struktural secara teratur
explanation: |
  Abbé de Saint-Pierre secara khusus membandingkan lembaga-lembaga politik dengan jam (horlog) yang membutuhkan pemutaran secara teratur agar dapat terus berfungsi dengan baik. Metafora ini menggambarkan bahwa lembaga-lembaga membutuhkan perhatian, perdebatan, dan reformasi yang terus menerus agar tetap efektif dan responsif terhadap kebutuhan masyarakat. Perbandingan lainnya, meskipun secara konseptual serupa dalam hal kebutuhan pemeliharaan, bukanlah perbandingan yang sebenarnya dibuat oleh Abbé de Saint-Pierre dalam teks dan akan mewakili perspektif filosofis yang berbeda dalam pemeliharaan institusi.
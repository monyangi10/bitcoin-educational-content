question: Welchen Vergleich zog der Abbé de Saint-Pierre, um die politischen Institutionen und deren Notwendigkeit einer regelmäßigen Wartung zu beschreiben?
answer: Er verglich sie mit Uhren, die regelmäßig aufgezogen werden müssen
wrong_answers:
  - Er verglich sie mit Gärten, die ständig bewässert und beschnitten werden müssen
  - Er verglich sie mit Maschinen, die regelmäßig Ölwechsel und Reparaturen benötigen
  - Er verglich sie mit Gebäuden, die regelmäßig baulich überprüft werden müssen
explanation: |
  Abbé de Saint-Pierre verglich die politischen Institutionen mit Uhren, die regelmäßig aufgezogen werden müssen, um ordnungsgemäß zu funktionieren. Diese Metapher veranschaulicht, dass Institutionen ständiger Aufmerksamkeit, Diskussionen und Reformen bedürfen, um effektiv zu bleiben und den Bedürfnissen der Gesellschaft gerecht zu werden. Die anderen Vergleiche sind zwar konzeptionell ähnlich und deuten auf einen Wartungsbedarf hin, sind aber nicht der eigentliche Vergleich, den Abbé de Saint-Pierre in seinem Text anstellt, sondern stellen unterschiedliche philosophische Perspektiven auf die Wartung von Institutionen dar.
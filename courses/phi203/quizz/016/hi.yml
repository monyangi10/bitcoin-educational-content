question: एब्बे डी सेंट-पियरे ने राजनीतिक संस्थाओं और उनके नियमित रखरखाव की आवश्यकता का वर्णन करने के लिए किस तुलना का प्रयोग किया?
answer: उन्होंने इनकी तुलना उन घड़ियों से की जिन्हें नियमित रूप से चाबी भरनी पड़ती है।
wrong_answers:
  - उन्होंने इनकी तुलना उन बगीचों से की जिन्हें लगातार पानी देने और छंटाई करने की आवश्यकता होती है।
  - उन्होंने इनकी तुलना उन मशीनों से की जिन्हें समय-समय पर तेल बदलने और मरम्मत की आवश्यकता होती है।
  - उन्होंने इनकी तुलना उन इमारतों से की जिन्हें नियमित संरचनात्मक निरीक्षण की आवश्यकता होती है।
explanation: |
  एब्बे डी सेंट-पियरे ने विशेष रूप से राजनीतिक संस्थाओं की तुलना घड़ियों (होरलॉज) से की, जिन्हें ठीक से काम करते रहने के लिए नियमित रूप से चाबी भरनी पड़ती है। यह उपमा दर्शाती है कि संस्थाओं को प्रभावी और समाज की आवश्यकताओं के प्रति उत्तरदायी बने रहने के लिए निरंतर ध्यान, विमर्श और सुधार की आवश्यकता होती है। अन्य तुलनाएँ, यद्यपि रखरखाव की आवश्यकताओं को दर्शाने में वैचारिक रूप से समान हैं, एब्बे डी सेंट-पियरे द्वारा पाठ में की गई वास्तविक तुलना नहीं हैं और संस्थागत रखरखाव पर विभिन्न दार्शनिक दृष्टिकोणों का प्रतिनिधित्व करती हैं।
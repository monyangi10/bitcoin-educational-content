question: ¿Qué comparación utilizó el abate de Saint-Pierre para describir las instituciones políticas y su necesidad de mantenimiento regular?
answer: Los comparó con relojes a los que hay que dar cuerda con regularidad
wrong_answers:
  - Los comparó con jardines que necesitan riego y poda constantes
  - Los comparó con máquinas que necesitan cambios periódicos de aceite y reparaciones
  - Los comparó con edificios que necesitan inspecciones estructurales periódicas
explanation: |
  En concreto, el Abbé de Saint-Pierre comparó las instituciones políticas con relojes a los que hay que dar cuerda regularmente para que sigan funcionando correctamente. Esta metáfora ilustra que las instituciones necesitan atención, debate y reforma continuos para seguir siendo eficaces y responder a las necesidades de la sociedad. Las otras comparaciones, aunque conceptualmente similares al sugerir necesidades de mantenimiento, no son la comparación real realizada por el Abbé de Saint-Pierre en el texto y representarían diferentes perspectivas filosóficas sobre el mantenimiento institucional.
question: Welke vergelijking gebruikte Abbé de Saint-Pierre om politieke instellingen en hun behoefte aan regelmatig onderhoud te beschrijven?
answer: Hij vergeleek ze met klokken die regelmatig opgewonden moeten worden
wrong_answers:
  - Hij vergeleek ze met tuinen die constant besproeid en gesnoeid moeten worden
  - Hij vergeleek ze met machines die regelmatig olie moeten verversen en gerepareerd moeten worden
  - Hij vergeleek ze met gebouwen die regelmatig moeten worden geïnspecteerd
explanation: |
  Abbé de Saint-Pierre vergeleek politieke instellingen specifiek met klokken (horloges) die regelmatig moeten worden opgewonden om goed te blijven functioneren. Deze metafoor illustreert dat instellingen voortdurende aandacht, debat en hervorming nodig hebben om effectief te blijven en te blijven voldoen aan de behoeften van de samenleving. De andere vergelijkingen, hoewel conceptueel vergelijkbaar in het suggereren van onderhoudsbehoeften, zijn niet de eigenlijke vergelijking die Abbé de Saint-Pierre in de tekst maakt en zouden verschillende filosofische perspectieven op institutioneel onderhoud vertegenwoordigen.
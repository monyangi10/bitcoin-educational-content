question: Jaké přirovnání použil abbé de Saint-Pierre k popisu politických institucí a potřeby jejich pravidelné údržby?
answer: Přirovnal je k hodinám, které je třeba pravidelně natahovat
wrong_answers:
  - Přirovnal je k zahradám, které je třeba neustále zalévat a prořezávat
  - Přirovnal je ke strojům, které potřebují pravidelnou výměnu oleje a opravy
  - Přirovnal je k budovám, které potřebují pravidelné stavební prohlídky
explanation: |
  Abbé de Saint-Pierre přirovnal politické instituce k hodinám, které vyžadují pravidelné natahování, aby správně fungovaly. Tato metafora ilustruje, že instituce potřebují neustálou pozornost, diskusi a reformu, aby zůstaly efektivní a reagovaly na potřeby společnosti. Ostatní přirovnání jsou sice koncepčně podobná, neboť naznačují potřeby údržby, ale nejsou skutečným přirovnáním, které abbé de Saint-Pierre v textu uvedl, a představovaly by odlišné filozofické pohledy na údržbu institucí.
question: Какво сравнение използва абат дьо Сен-Пиер, за да опише политическите институции и нуждата им от редовна поддръжка?
answer: Той ги сравни с часовници, които трябва да се навиват редовно
wrong_answers:
  - Той ги сравни с градини, които се нуждаят от постоянно поливане и подрязване
  - Той ги сравни с машини, които се нуждаят от периодична смяна на маслото и ремонт
  - Той ги сравни със сгради, които се нуждаят от редовни структурни инспекции
explanation: |
  Абат дьо Сен-Пиер сравнява политическите институции с часовници (horloges), които се нуждаят от редовно навиване, за да функционират правилно. Тази метафора илюстрира, че институциите се нуждаят от постоянно внимание, дебати и реформи, за да останат ефективни и да отговарят на нуждите на обществото. Другите сравнения, макар и концептуално сходни, тъй като предполагат нуждата от поддръжка, не са действителното сравнение, направено от абат дьо Сен-Пиер в текста, и биха представлявали различни философски перспективи за поддръжката на институциите.
question: Hvilken sammenligning brukte Abbé de Saint-Pierre for å beskrive politiske institusjoner og deres behov for regelmessig vedlikehold?
answer: Han sammenlignet dem med klokker som må trekkes opp regelmessig
wrong_answers:
  - Han sammenlignet dem med hager som trenger konstant vanning og beskjæring
  - Han sammenlignet dem med maskiner som trenger regelmessige oljeskift og reparasjoner
  - Han sammenlignet dem med bygninger som trenger regelmessige inspeksjoner
explanation: |
  Abbé de Saint-Pierre sammenlignet politiske institusjoner med klokker (horloges) som må trekkes opp med jevne mellomrom for å fortsette å fungere som de skal. Denne metaforen illustrerer at institusjoner trenger kontinuerlig oppmerksomhet, debatt og reformer for å forbli effektive og lydhøre overfor samfunnets behov. De andre sammenligningene, selv om de konseptuelt sett er like når det gjelder vedlikeholdsbehov, er ikke den faktiske sammenligningen som Abbé de Saint-Pierre gjør i teksten, og representerer ulike filosofiske perspektiver på institusjonelt vedlikehold.
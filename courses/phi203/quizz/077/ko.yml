question: 변화된 물질적 조건으로 인해 실용적인 적용이 가능해진 자유에 대한 새로운 사상의 출현을 대표하는 역사적 운동은 무엇인가요?
answer: 계몽주의 운동
wrong_answers:
  - 산업 혁명
  - 농업 혁명
  - 상업 혁명
explanation: |
  계몽주의 운동은 물질적 조건이 발전하면서 실질적으로 적용될 수 있는 자유에 대한 새로운 아이디어가 꽃을 피운 시기였습니다. 투르고와 같은 생리학자와 콘도르셋과 같은 철학자들은 인간의 완전성과 보다 광범위한 자유에 대한 개념을 발전시켰고, 이는 세계 상업과 같은 경제적 변화로 인해 실현 가능해졌습니다. 산업, 농업, 상업 혁명이 중요한 물질적 변화였다면 계몽주의는 18세기의 변화하는 상황에 맞는 자유에 대한 새로운 정치적, 경제적 사상을 만들어낸 지적 운동을 구체적으로 일컫는 말입니다.
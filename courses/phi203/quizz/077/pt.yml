question: Que movimento histórico representou o aparecimento de novas ideias sobre a liberdade que encontraram aplicação prática devido à alteração das condições materiais?
answer: O movimento iluminista
wrong_answers:
  - A Revolução Industrial
  - A revolução agrícola
  - A revolução comercial
explanation: |
  O movimento do Iluminismo representou o florescimento de novas ideias sobre a liberdade que podiam ser aplicadas na prática porque as condições materiais tinham evoluído. Fisiocratas como Turgot e filósofos como Condorcet desenvolveram conceitos de perfetibilidade humana e de liberdade mais ampla que se tornaram viáveis devido a mudanças económicas como o comércio global. Embora as Revoluções Industrial, Agrícola e Comercial tenham sido transformações materiais importantes, o Iluminismo refere-se especificamente ao movimento intelectual que produziu novas ideias políticas e económicas sobre a liberdade que se adequavam às circunstâncias em mudança do século XVIII.
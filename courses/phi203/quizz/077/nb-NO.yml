question: Hvilken historisk bevegelse representerte fremveksten av nye ideer om frihet som fant praktisk anvendelse på grunn av endrede materielle forhold?
answer: Opplysningsbevegelsen
wrong_answers:
  - Den industrielle revolusjon
  - Jordbruksrevolusjonen
  - Den kommersielle revolusjonen
explanation: |
  Opplysningstiden representerte en oppblomstring av nye ideer om frihet som kunne anvendes i praksis fordi de materielle forutsetningene hadde utviklet seg. Fysiokrater som Turgot og filosofer som Condorcet utviklet konsepter om menneskets perfeksjoneringsevne og mer omfattende frihet som ble levedyktige på grunn av økonomiske endringer som global handel. Mens den industrielle revolusjonen, jordbruksrevolusjonen og den kommersielle revolusjonen var viktige materielle omveltninger, refererer opplysningstiden spesifikt til den intellektuelle bevegelsen som produserte nye politiske og økonomiske ideer om frihet som passet til de skiftende omstendighetene på 1700-tallet.
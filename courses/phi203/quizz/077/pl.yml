question: Jaki ruch historyczny reprezentował pojawienie się nowych idei wolności, które znalazły praktyczne zastosowanie ze względu na zmienione warunki materialne?
answer: Ruch oświeceniowy
wrong_answers:
  - Rewolucja przemysłowa
  - Rewolucja rolnicza
  - Rewolucja handlowa
explanation: |
  Ruch oświeceniowy reprezentował rozkwit nowych idei wolności, które mogły być praktycznie zastosowane, ponieważ warunki materialne ewoluowały. Fizjokraci tacy jak Turgot i filozofowie tacy jak Condorcet opracowali koncepcje ludzkiej doskonałości i szerszej wolności, które stały się realne dzięki zmianom gospodarczym, takim jak globalny handel. Podczas gdy rewolucje przemysłowa, rolnicza i handlowa były ważnymi przemianami materialnymi, Oświecenie odnosi się konkretnie do ruchu intelektualnego, który stworzył nowe polityczne i gospodarcze idee wolności, które pasowały do zmieniających się okoliczności XVIII wieku.
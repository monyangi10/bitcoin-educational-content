question: Какое историческое движение представляло собой зарождение новых идей о свободе, которые нашли практическое применение благодаря изменившимся материальным условиям?
answer: Движение Просвещения
wrong_answers:
  - Промышленная революция
  - Сельскохозяйственная революция
  - Коммерческая революция
explanation: |
  Движение Просвещения представляло собой расцвет новых идей о свободе, которые можно было применить на практике, поскольку развивались материальные условия. Физиократы, такие как Тюрго, и философы, такие как Кондорсе, разработали концепции совершенства человека и более широкой свободы, которые стали жизнеспособными благодаря экономическим изменениям, таким как глобальная торговля. Хотя промышленная, сельскохозяйственная и торговая революции были важными материальными преобразованиями, Просвещение относится именно к интеллектуальному движению, породившему новые политические и экономические идеи о свободе, которые соответствовали меняющимся условиям XVIII века.
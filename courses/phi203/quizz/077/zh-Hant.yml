question: 哪一種歷史運動代表了因物質條件改變而實際應用的新自由觀念？
answer: 啟蒙運動
wrong_answers:
  - 工業革命
  - 農業革命
  - 商業革命
explanation: |
  啟蒙運動代表著新的自由思想的綻放，由於物質條件的進化，這些思想可以被實際應用。像杜爾哥（Turgot）這樣的生理學家和孔多塞（Condorcet）這樣的哲學家發展出了人類完美性和更廣泛自由的概念，這些概念因全球商業等經濟變化而變得可行。工業革命、農業革命和商業革命都是重要的物質轉變，而啟蒙運動是指思想運動，它產生了與18世紀不斷變化的環境相匹配的關於自由的新的政治和經濟思想。
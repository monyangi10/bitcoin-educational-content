question: Phong trào lịch sử nào đại diện cho sự xuất hiện của những ý tưởng mới về tự do, được ứng dụng thực tiễn nhờ những thay đổi về điều kiện vật chất?
answer: Phong trào Khai sáng
wrong_answers:
  - Cuộc Cách mạng Công nghiệp
  - Cuộc cách mạng nông nghiệp
  - Cuộc cách mạng thương mại
explanation: |
  Phong trào Khai sáng đại diện cho sự nở rộ của những ý tưởng mới về tự do có thể được áp dụng thực tiễn vì điều kiện vật chất đã phát triển. Các nhà kinh tế học theo trường phái Physiocrat như Turgot và các nhà triết học như Condorcet đã phát triển các khái niệm về sự hoàn thiện của con người và tự do rộng lớn hơn, trở nên khả thi nhờ những thay đổi kinh tế như thương mại toàn cầu. Trong khi các cuộc Cách mạng Công nghiệp, Nông nghiệp và Thương mại là những biến đổi vật chất quan trọng, thì Khai sáng đặc biệt đề cập đến phong trào trí thức đã sản sinh ra những ý tưởng chính trị và kinh tế mới về tự do phù hợp với hoàn cảnh thay đổi của thế kỷ 18.
question: Gerakan historis apa yang merepresentasikan kemunculan ide-ide baru tentang kebebasan yang menemukan aplikasi praktis karena perubahan kondisi material?
answer: Gerakan Pencerahan
wrong_answers:
  - Revolusi Industri
  - Revolusi Pertanian
  - Revolusi Komersial
explanation: |
  Gerakan Pencerahan mewakili mekarnya ide-ide baru tentang kebebasan yang dapat diterapkan secara praktis karena kondisi material telah berevolusi. Fisiokrat seperti Turgot dan filsuf seperti Condorcet mengembangkan konsep kesempurnaan manusia dan kebebasan yang lebih luas yang menjadi layak karena perubahan ekonomi seperti perdagangan global. Sementara Revolusi Industri, Pertanian, dan Perdagangan merupakan transformasi material yang penting, Pencerahan secara khusus mengacu pada gerakan intelektual yang menghasilkan ide-ide politik dan ekonomi baru tentang kebebasan yang sesuai dengan keadaan yang berubah pada abad ke-18.
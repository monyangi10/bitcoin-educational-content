question: Welche historische Bewegung steht für das Aufkommen neuer Ideen über Freiheit, die aufgrund veränderter materieller Bedingungen praktische Anwendung fanden?
answer: Die Aufklärungsbewegung
wrong_answers:
  - Die industrielle Revolution
  - Die landwirtschaftliche Revolution
  - Die kommerzielle Revolution
explanation: |
  Die Aufklärungsbewegung stand für die Entfaltung neuer Freiheitsvorstellungen, die sich aufgrund der veränderten materiellen Bedingungen praktisch umsetzen ließen. Physiokraten wie Turgot und Philosophen wie Condorcet entwickelten Konzepte der menschlichen Vervollkommnung und einer umfassenderen Freiheit, die durch wirtschaftliche Veränderungen wie den globalen Handel realisierbar wurden. Während die industrielle, die landwirtschaftliche und die kommerzielle Revolution wichtige materielle Veränderungen darstellten, bezieht sich die Aufklärung insbesondere auf die intellektuelle Bewegung, die neue politische und wirtschaftliche Ideen über die Freiheit hervorbrachte, die den veränderten Umständen des 18.
question: 物質的条件の変化によって、自由についての新しい考え方が生まれ、それが実用化された歴史的な運動とは？
answer: 啓蒙運動
wrong_answers:
  - 産業革命
  - 農業革命
  - 商業革命
explanation: |
  啓蒙運動は、物質的条件が進化したため、実践的に適用できる自由についての新しい考え方の開花を象徴していた。テュルゴーのようなフィジオクラートやコンドルセのような哲学者たちは、人間の完全性やより広範な自由についての概念を発展させたが、それは世界的な商業のような経済的変化によって実現可能なものとなった。産業革命、農業革命、商業革命は重要な物質的変革であったが、啓蒙主義とは特に、18世紀の状況の変化にマッチした自由に関する新しい政治的・経済的思想を生み出した知的運動を指す。
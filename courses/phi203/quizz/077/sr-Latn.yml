question: Koji istorijski pokret predstavlja pojavu novih ideja o slobodi koje su našle praktičnu primenu zbog promenjenih materijalnih uslova?
answer: Pokret prosvetiteljstva
wrong_answers:
  - Industrijska revolucija
  - Poljoprivredna revolucija
  - Komercijalna revolucija
explanation: |
  Pokret prosvetiteljstva predstavljao je procvat novih ideja o slobodi koje su mogle biti praktično primenjene jer su se materijalni uslovi razvili. Fiziokrati poput Turgota i filozofi poput Kondorsea razvili su koncepte ljudske savršenosti i šire slobode koji su postali izvodljivi zbog ekonomskih promena poput globalne trgovine. Dok su industrijska, poljoprivredna i komercijalna revolucija bile važne materijalne transformacije, prosvetiteljstvo se posebno odnosi na intelektualni pokret koji je proizveo nove političke i ekonomske ideje o slobodi koje su odgovarale promenljivim okolnostima 18. veka.
question: Vilken historisk rörelse representerade framväxten av nya idéer om frihet som fann praktisk tillämpning på grund av förändrade materiella förhållanden?
answer: Upplysningens rörelse
wrong_answers:
  - Den industriella revolutionen
  - Jordbruksrevolutionen
  - Den kommersiella revolutionen
explanation: |
  Upplysningsrörelsen innebar en uppblomstring av nya idéer om frihet som kunde tillämpas i praktiken eftersom de materiella förutsättningarna hade förändrats. Fysiokrater som Turgot och filosofer som Condorcet utvecklade idéer om människans perfektibilitet och mer omfattande frihet som blev praktiskt genomförbara på grund av ekonomiska förändringar som global handel. Medan industri-, jordbruks- och handelsrevolutionerna var viktiga materiella omvandlingar, syftar upplysningen specifikt på den intellektuella rörelse som producerade nya politiska och ekonomiska idéer om frihet som matchade de förändrade omständigheterna under 1700-talet.
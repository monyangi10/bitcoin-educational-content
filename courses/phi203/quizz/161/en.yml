question: What did liberal economists, including Bastiat, argue about the difference between proportional and progressive taxation?
answer: Proportional taxation reflects equal contribution to common burdens by equally protected citizens, while progressive taxation represents a return to ancient conceptions in which the individual belongs to the group
wrong_answers:
  - Progressive taxation is justified because it corrects the natural inequality of market outcomes, aligning with liberal principles of equal opportunity for all
  - Proportional taxation unfairly burdens the poor by ignoring differences in ability to pay, which is why liberals eventually moved toward graduated rate structures
  - Both forms of taxation are acceptable under liberalism provided they fund only genuine collective services such as courts, police, and national defense
explanation: |
  Liberal economists of the eighteenth and nineteenth centuries argued that a legitimate tax should be proportional rather than progressive: each individual, equally protected by the common legal framework, should contribute equally to society's burdens. Progressive taxation represents a return to ancient conceptions in which the individual is the property of the group, and his forces are used as others see fit. Bastiat specifically developed the idea of an exchange of service for service, insisting that taxes must be legible so that every taxpayer knows precisely what he receives in return for his contribution — a transparency that progressive systems tend to obscure.

question: Hoe keken liberale theoretici aan tegen de relatie tussen technologische vooruitgang en vrouwenemancipatie in kapitalistische samenlevingen?
answer: Technologie en machines egaliseerden de productiecapaciteit tussen mannen en vrouwen en verschoven de waarde van fysieke kracht naar morele en intellectuele deugden
wrong_answers:
  - Technologie kwam voornamelijk ten goede aan mannen door het creëren van industriële banen die vrouwen volledig uitsloten van de beroepsbevolking
  - "Technologische vooruitgang had een minimale invloed op de relaties tussen mannen en vrouwen, waarbij sociale gewoonten de belangrijkste drijfveer waren voor de status van vrouwen"
  - Machines versterkten traditionele genderrollen door huishoudelijk werk efficiënter te maken en vrouwen thuis te houden
explanation: |
  Volgens de gepresenteerde liberale analyse was technologische vooruitgang onder het kapitalisme cruciaal voor de emancipatie van vrouwen. Gereedschappen en machines gaven vrouwen een productiecapaciteit die gelijk was aan of superieur aan die van mannen, waardoor het belang van fysieke kracht, dat primitieve samenlevingen had gedomineerd, afnam. Door deze verschuiving konden samenlevingen meer waarde hechten aan doorzettingsvermogen en morele/intellectuele kwaliteiten. De andere opties geven deze relatie verkeerd weer: technologie sloot vrouwen niet uit maar versterkte hun positie, sociale gewoonten alleen waren niet voldoende zonder economische veranderingen en in plaats van de huiselijke rollen te versterken, bevrijdde technologie vrouwen ervan door alternatieve productiemogelijkheden te bieden.
question: ¿Cómo veían los teóricos liberales la relación entre el avance tecnológico y la emancipación de la mujer en las sociedades capitalistas?
answer: La tecnología y la maquinaria igualaron la capacidad productiva entre géneros, desplazando el valor de la fuerza física a las virtudes morales e intelectuales
wrong_answers:
  - La tecnología benefició principalmente a los hombres al crear empleos industriales que excluían por completo a las mujeres de la población activa
  - "El progreso tecnológico tuvo un impacto mínimo en las relaciones de género, siendo las costumbres sociales el principal motor de la situación de la mujer"
  - La maquinaria reforzó los roles tradicionales de género al hacer más eficiente el trabajo doméstico y mantener a las mujeres en casa
explanation: |
  Según el análisis liberal presentado, el avance tecnológico bajo el capitalismo fue crucial para la emancipación de la mujer. Las herramientas y las máquinas dieron a las mujeres una capacidad productiva igual o superior a la de los hombres, reduciendo la importancia de la fuerza física que había dominado en las sociedades primitivas. Este cambio permitió a las sociedades valorar más la perseverancia y las cualidades morales e intelectuales. Las otras opciones tergiversan esta relación: la tecnología no excluyó a las mujeres sino que las potenció, las costumbres sociales por sí solas no fueron suficientes sin cambios económicos y, en lugar de reforzar los roles domésticos, la tecnología liberó a las mujeres de ellos al proporcionarles oportunidades productivas alternativas.
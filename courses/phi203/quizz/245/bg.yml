question: Как либералните теоретици разглеждат връзката между технологичния напредък и еманципацията на жените в капиталистическите общества?
answer: Технологиите и машините изравняват производствените възможности на двата пола, като изместват значението на физическата сила към моралните и интелектуалните добродетели
wrong_answers:
  - Технологиите са били от полза предимно за мъжете, тъй като са създавали индустриални работни места, които са изключвали изцяло жените от работната сила
  - "Технологичният напредък има минимално въздействие върху отношенията между половете, като социалните обичаи са основният фактор за статута на жените"
  - Машините затвърждават традиционните роли на половете, като правят домашната работа по-ефективна и задържат жените вкъщи
explanation: |
  Според представения либерален анализ технологичният напредък в условията на капитализма е бил от решаващо значение за еманципацията на жените. Инструментите и машините са дали на жените производствени възможности, равни или по-големи от тези на мъжете, като са намалили значението на физическата сила, която е доминирала в примитивните общества. Тази промяна е позволила на обществата да ценят по-високо упоритостта и моралните/интелектуалните качества. Другите варианти представят погрешно тази връзка: технологията не е изключила жените, а ги е овластила, социалните обичаи сами по себе си не са били достатъчни без икономически промени и вместо да засили домашните роли, технологията е освободила жените от тях, като е предоставила алтернативни производствени възможности.
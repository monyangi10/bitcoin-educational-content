question: Как либеральные теоретики рассматривали взаимосвязь между техническим прогрессом и эмансипацией женщин в капиталистических обществах?
answer: Технологии и машины уравняли производственные возможности полов, сместив ценность с физической силы на моральные и интеллектуальные достоинства
wrong_answers:
  - Технологии приносили пользу в первую очередь мужчинам, создавая промышленные рабочие места, которые полностью исключали женщин из числа работников
  - "Технологический прогресс оказал минимальное влияние на гендерные отношения, а основными факторами, определяющими положение женщин, были социальные обычаи"
  - Машины укрепляли традиционные гендерные роли, делая домашний труд более эффективным и удерживая женщин дома
explanation: |
  Согласно представленному либеральному анализу, технологический прогресс при капитализме сыграл решающую роль в эмансипации женщин. Инструменты и машины дали женщинам производственные возможности, равные или превосходящие мужские, уменьшив значение физической силы, которая доминировала в первобытных обществах. Этот сдвиг позволил обществам более высоко ценить упорство и моральные/интеллектуальные качества. Другие варианты искажают эту взаимосвязь: технологии не исключали женщин, а расширяли их возможности, одних социальных обычаев было недостаточно без экономических изменений, а технологии не столько усиливали домашние роли, сколько освобождали женщин от них, предоставляя альтернативные возможности для производства.
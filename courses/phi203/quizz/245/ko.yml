question: 자유주의 이론가들은 자본주의 사회에서 기술 발전과 여성 해방 사이의 관계를 어떻게 보았나요?
answer: 기술과 기계가 성별 간 생산 능력을 평등하게 만들고, 가치를 체력에서 도덕적, 지적 덕목으로 이동시켰습니다
wrong_answers:
  - 기술은 주로 여성을 노동력에서 완전히 배제하는 산업 일자리를 창출함으로써 남성에게 혜택을 주었습니다
  - "기술 발전이 성별 관계에 미치는 영향은 미미하며, 사회적 관습이 여성의 지위를 결정하는 주요 요인"
  - 기계는 가사 노동을 더 효율적으로 만들고 여성을 가정에 머물게 함으로써 전통적인 성 역할을 강화했습니다
explanation: |
  자유주의적 분석에 따르면 자본주의 하에서의 기술 발전은 여성 해방에 결정적인 역할을 했습니다. 도구와 기계는 여성에게 남성과 동등하거나 더 뛰어난 생산 능력을 부여하여 원시 사회를 지배했던 체력의 중요성을 감소시켰습니다. 이러한 변화로 인해 사회는 인내와 도덕적/지적 자질을 더 높이 평가할 수 있게 되었습니다. 기술이 여성을 배제하지 않고 오히려 여성의 역량을 강화했으며, 경제적 변화 없이는 사회적 관습만으로는 충분하지 않았고, 기술이 가사 역할을 강화하기보다는 다른 생산적 기회를 제공함으로써 여성을 해방시켰다는 다른 견해는 이 관계를 잘못 표현하고 있습니다.
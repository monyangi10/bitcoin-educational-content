question: 自由主義理論家たちは、資本主義社会における技術の進歩と女性の解放の関係をどう見ていたのか？
answer: テクノロジーと機械が男女間の生産能力を均等化し、価値を体力から道徳的・知的美徳に移した。
wrong_answers:
  - テクノロジーは、女性を労働力から完全に排除する工業的な仕事を創出することによって、主に男性に恩恵をもたらした。
  - "技術の進歩は男女関係にほとんど影響を与えず、社会的慣習が女性の地位の主な原動力であった"
  - 機械は家事労働を効率化し、女性を家庭に閉じ込めて、伝統的な性別役割分担を強化した。
explanation: |
  提示された自由主義的分析によれば、資本主義の下での技術進歩は女性の解放にとって極めて重要であった。道具や機械は女性に男性と同等かそれ以上の生産能力を与え、原始社会を支配していた体力の重要性を低下させた。この変化によって、社会は忍耐力や道徳的・知的資質をより高く評価するようになった。他の選択肢は、この関係を誤って表現している。テクノロジーは女性を排除したのではなく、女性を力づけたのであり、経済的な変化がなければ社会的慣習だけでは不十分であり、テクノロジーは家庭内の役割を強化するのではなく、代替的な生産機会を提供することによって、女性を家庭内の役割から解放したのである。
question: 自由主義理論者如何看待資本主義社會中技術進步與婦女解放之間的關係？
answer: 科技和機械使兩性的生產力變得平等，價值觀從體力轉移到道德和智力上。
wrong_answers:
  - 科技主要造福男性，因為它創造了工業工作，將女性完全排除在勞動力之外。
  - 「科技進步對兩性關係的影響微乎其微，社會習俗是婦女地位的主要動力」
  - 機械提高了家務工作的效率，並使婦女留在家中，從而強化了傳統的性別角色。
explanation: |
  根據自由主義的分析，資本主義下的技術進步對婦女解放至關重要。工具和機器賦予了婦女等同或優於男性的生產能力，降低了體力的重要性，而體力在原始社會中佔有主導地位。這種轉變使得社會更加重視毅力和道德/智力素質。其他選項歪曲了這種關係：技術並沒有排斥婦女，反而賦予她們權力；如果沒有經濟上的改變，光靠社會習俗是不夠的，而且技術不但沒有強化家庭角色，反而透過提供其他生產機會，將婦女從家庭角色中解放出來。
question: นักทฤษฎีเสรีนิยมมองความสัมพันธ์ระหว่างความก้าวหน้าทางเทคโนโลยีกับการปลดปล่อยสตรีในสังคมทุนนิยมอย่างไร?
answer: เทคโนโลยีและเครื่องจักรทำให้ความสามารถในการผลิตระหว่างเพศเท่าเทียมกัน โดยเปลี่ยนคุณค่าจากความแข็งแรงทางกายภาพไปสู่คุณธรรมและปัญญา
wrong_answers:
  - เทคโนโลยีเป็นประโยชน์ต่อผู้ชายเป็นหลักโดยการสร้างงานอุตสาหกรรมที่กีดกันผู้หญิงออกจากแรงงานอย่างสิ้นเชิง
  - "ความก้าวหน้าทางเทคโนโลยีมีผลกระทบเพียงเล็กน้อยต่อความสัมพันธ์ทางเพศ โดยที่ขนบธรรมเนียมทางสังคมเป็นปัจจัยหลักที่กำหนดสถานะของผู้หญิง"
  - เครื่องจักรเสริมสร้างบทบาททางเพศแบบดั้งเดิมโดยทำให้งานบ้านมีประสิทธิภาพมากขึ้นและทำให้ผู้หญิงอยู่ในบ้าน
explanation: |
  ตามการวิเคราะห์แบบเสรีนิยมที่นำเสนอ ความก้าวหน้าทางเทคโนโลยีภายใต้ระบบทุนนิยมมีความสำคัญอย่างยิ่งต่อการปลดปล่อยผู้หญิง เครื่องมือและเครื่องจักรทำให้ผู้หญิงมีความสามารถในการผลิตเทียบเท่าหรือเหนือกว่าผู้ชาย ลดความสำคัญของพละกำลังที่เคยครอบงำสังคมดั้งเดิม การเปลี่ยนแปลงนี้ทำให้สังคมให้คุณค่ากับความพากเพียรและคุณธรรม/สติปัญญามากขึ้น ตัวเลือกอื่น ๆ นำเสนอความสัมพันธ์นี้อย่างผิดพลาด: เทคโนโลยีไม่ได้กีดกันผู้หญิงแต่กลับเสริมพลังให้พวกเธอ ขนบธรรมเนียมทางสังคมเพียงอย่างเดียวไม่เพียงพอหากไม่มีการเปลี่ยนแปลงทางเศรษฐกิจ และแทนที่จะเสริมสร้างบทบาทในครัวเรือน เทคโนโลยีกลับปลดปล่อยผู้หญิงจากบทบาทเหล่านั้นโดยการมอบโอกาสในการผลิตทางเลือกใหม่ ๆ ให้แก่พวกเธอ
question: Jak teoretycy liberalizmu postrzegali związek między postępem technologicznym a emancypacją kobiet w społeczeństwach kapitalistycznych?
answer: Technologia i maszyny wyrównały zdolności produkcyjne między płciami, przenosząc wartość z siły fizycznej na cnoty moralne i intelektualne
wrong_answers:
  - Technologia przyniosła korzyści przede wszystkim mężczyznom, tworząc miejsca pracy w przemyśle, które całkowicie wykluczyły kobiety z siły roboczej
  - "Postęp technologiczny miał minimalny wpływ na relacje między płciami, a zwyczaje społeczne były głównym czynnikiem wpływającym na status kobiet"
  - Maszyny wzmocniły tradycyjne role płciowe, czyniąc pracę domową bardziej wydajną i utrzymując kobiety w domu
explanation: |
  Zgodnie z przedstawioną liberalną analizą, postęp technologiczny w kapitalizmie był kluczowy dla emancypacji kobiet. Narzędzia i maszyny dały kobietom zdolność produkcyjną równą lub wyższą niż mężczyznom, zmniejszając znaczenie siły fizycznej, która dominowała w prymitywnych społeczeństwach. Zmiana ta pozwoliła społeczeństwom wyżej cenić wytrwałość i cechy moralne/intelektualne. Pozostałe opcje błędnie przedstawiają ten związek: technologia nie wykluczyła kobiet, ale je wzmocniła, same zwyczaje społeczne nie były wystarczające bez zmian gospodarczych, a zamiast wzmacniać role domowe, technologia uwolniła kobiety od nich, zapewniając alternatywne możliwości produkcyjne.
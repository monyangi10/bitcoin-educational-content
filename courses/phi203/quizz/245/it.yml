question: Come vedevano i teorici liberali il rapporto tra progresso tecnologico ed emancipazione femminile nelle società capitalistiche?
answer: La tecnologia e i macchinari hanno parificato la capacità produttiva tra i generi, spostando il valore dalla forza fisica alle virtù morali e intellettuali
wrong_answers:
  - La tecnologia ha avvantaggiato soprattutto gli uomini, creando posti di lavoro industriali che hanno escluso completamente le donne dalla forza lavoro
  - "Il progresso tecnologico ha avuto un impatto minimo sulle relazioni tra i sessi e le consuetudini sociali sono state il motore principale della condizione femminile"
  - Le macchine hanno rafforzato i ruoli tradizionali di genere rendendo più efficiente il lavoro domestico e mantenendo le donne in casa
explanation: |
  Secondo l'analisi liberale presentata, il progresso tecnologico del capitalismo è stato cruciale per l'emancipazione delle donne. Gli strumenti e le macchine hanno dato alle donne una capacità produttiva pari o superiore a quella degli uomini, riducendo l'importanza della forza fisica che aveva dominato le società primitive. Questo cambiamento ha permesso alle società di dare maggior valore alla perseveranza e alle qualità morali e intellettuali. Le altre opzioni travisano questo rapporto: la tecnologia non escludeva le donne ma le potenziava, i costumi sociali da soli non erano sufficienti senza cambiamenti economici e, invece di rafforzare i ruoli domestici, la tecnologia ne liberava le donne fornendo opportunità produttive alternative.
question: What did Charles Coquelin argue about the relationship between the law of supply and demand and economic freedom?
answer: The law of supply and demand is nothing other than the functioning of economic freedom itself — without freedom, this law simply cannot operate
wrong_answers:
  - The law of supply and demand is an objective natural law that functions independently of political arrangements or levels of individual freedom
  - The law of supply and demand must be corrected by regulation because free markets systematically distort prices in favor of large producers
  - The law of supply and demand describes how freedom should be constrained to prevent monopolies from forming in unregulated markets
explanation: |
  Charles Coquelin, writing in the Dictionnaire de l'économie politique, stated that the law of supply and demand is nothing other than the functioning of economic freedom itself. He illustrated this with the ration coupon: a citizen holding coupons has no ability to vary his demand according to his preferences, and a company subject to political production quotas cannot adjust its supply to circumstances. The law of supply and demand therefore presupposes freedom as its indispensable precondition. Remove freedom, and the law ceases to operate entirely.

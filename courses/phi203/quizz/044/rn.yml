question: Dukurikije ico canditswe, ni ikibazo ikihe c’ishimikiro kivyuka iyo amategeko amwe be n’uburongozi bushingiye ku rwego rwo hejuru bikoreshejwe ku kibano c’abantu?
answer: Bivuguruza ubudasa bw’abantu mu gutegeka uburyo bumwe bwo gukora no kunezerererwa itunga .
wrong_answers:
  - Bituma habaho ubugoyagoye bwinshi cane butera intege uburyo Leta ifata ingingo .
  - Bituma ubutunzi butagira akamaro mu kubuza ubuhinga bwihariye no gucapura ibikorwa mu masoko .
  - Bituma haba imisoro myinshi be n’amahera Leta ikoresha cane, ivyo bikaba biremerera abanyagihugu bafise akamaro .
explanation: |
  Ico canditswe kivuga mu buryo butomoye yuko amategeko amwe be n'ubutegetsi bushizwe ahantu hamwe 'bivuguruzanya ata guca ku ruhande n'ubudasa bw'abantu.' Izo nzira zitegeka uburyo bumwe bwo gukora no kunezerererwa itunga, mu gihe itunga rikwiye guha umuntu umwidegemvyo wo gukora ivyo yipfuza ku bintu vyiwe. Ivyo bivuguruza kamere y’umuntu kuko umuntu wese avuka afise kamere yihariye yigaragaza mu buzima bwiwe bwose, asaba ukunyurwa gutandukanye bivanye n’umurongo w’umuntu ku giti ciwe n’ivyo akeneye vyihariye, atari inyishu zihuye zitegekanijwe zivuye hejuru.
question: Prema tekstu, koji osnovni problem nastaje kada se uniformni zakoni i centralizovana administracija primenjuju na ljudsko društvo?
answer: Protivreče prirodnoj raznolikosti čovečanstva namećući standardizovane načine rada i uživanja u imovini.
wrong_answers:
  - Oni stvaraju previše birokratske složenosti koja usporava procese donošenja odluka u vladi.
  - Oni dovode do ekonomske neefikasnosti sprečavanjem specijalizacije i podele rada na tržištima
  - Oni rezultiraju višim porezima i povećanom potrošnjom vlade koja opterećuje produktivne građane
explanation: |
  Tekst eksplicitno navodi da uniformni zakoni i centralizovana administracija 'ulaze u direktnu kontradikciju sa prirodnom raznolikošću čovečanstva.' Ovi sistemi nameću uniformne načine rada i uživanja u imovini, kada bi imovina trebalo da pruži slobodu da se radi šta se želi sa sopstvenim dobrima. Ovo je u suprotnosti sa ljudskom prirodom jer se svaka osoba rađa sa jedinstvenom ličnošću koja se manifestuje tokom života, zahtevajući različita zadovoljenja prema individualnom ritmu i posebnim potrebama, a ne standardizovana rešenja nametnuta odozgo.
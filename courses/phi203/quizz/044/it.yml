question: Secondo il testo, quale problema fondamentale sorge quando leggi uniformi e amministrazione centralizzata vengono applicate alla società umana?
answer: Contraddicono la naturale diversità dell'umanità imponendo modalità standardizzate di lavoro e di fruizione della proprietà
wrong_answers:
  - Creano un'eccessiva complessità burocratica che rallenta i processi decisionali del governo
  - Portano all'inefficienza economica impedendo la specializzazione e la divisione del lavoro nei mercati
  - Si traducono in un aumento delle tasse e della spesa pubblica che grava sui cittadini produttivi
explanation: |
  Il testo afferma esplicitamente che le leggi uniformi e l'amministrazione centralizzata "entrano in diretta contraddizione con la naturale diversità dell'umanità" Questi sistemi impongono modi uniformi di lavorare e di godere della proprietà, quando la proprietà dovrebbe conferire la libertà di fare ciò che si desidera con i propri beni. Questo è in contraddizione con la natura umana, perché ogni persona nasce con una personalità distinta che si manifesta nel corso della vita, richiedendo soddisfazioni diverse in base al ritmo individuale e ai bisogni particolari, non soluzioni standardizzate imposte dall'alto.
question: Kulingana na maandishi, ni suala gani la msingi linalotokea wakati sheria zinazofanana na utawala mkuu zinapotumika katika jamii ya wanadamu?
answer: Zinapingana na utofauti wa asili wa ubinadamu kwa kuweka njia sanifu za kufanya kazi na kufurahia mali.
wrong_answers:
  - Zinaunda ugumu mwingi wa urasimu unaopunguza kasi ya michakato ya kufanya maamuzi ya serikali
  - Husababisha ukosefu wa ufanisi wa kiuchumi kwa kuzuia utaalamu na mgawanyo wa kazi katika masoko
  - Husababisha kodi kubwa na ongezeko la matumizi ya serikali ambayo huwalemea raia wenye tija
explanation: |
  Maandishi yanasema waziwazi kwamba sheria zinazofanana na utawala mkuu 'hupingana moja kwa moja na utofauti wa asili wa ubinadamu.' Mifumo hii inaweka njia zinazofanana za kufanya kazi na kufurahia mali, wakati mali inapaswa kutoa uhuru wa kufanya kile mtu anachotaka na mali yake. Hii inapingana na asili ya mwanadamu kwa sababu kila mtu huzaliwa na utu tofauti unaojitokeza katika maisha yote, unaohitaji kuridhika tofauti kulingana na mdundo wa mtu binafsi na mahitaji maalum, si suluhisho sanifu zilizowekwa kutoka juu.
question: طبق متن، چه مسئله اساسی زمانی به وجود می‌آید که قوانین یکنواخت و مدیریت متمرکز بر جامعه انسانی اعمال می‌شود؟
answer: آن‌ها با تحمیل روش‌های استاندارد کار و لذت بردن از مالکیت، تنوع طبیعی بشریت را نقض می‌کنند.
wrong_answers:
  - آنها پیچیدگی بوروکراتیک زیادی ایجاد می‌کنند که فرآیندهای تصمیم‌گیری دولت را کند می‌کند.
  - آنها با جلوگیری از تخصص و تقسیم کار در بازارها منجر به ناکارآمدی اقتصادی می‌شوند.
  - آن‌ها منجر به مالیات‌های بالاتر و افزایش هزینه‌های دولتی می‌شوند که بار سنگینی بر دوش شهروندان مولد می‌گذارند.
explanation: |
  متن به‌صراحت بیان می‌کند که قوانین یکنواخت و مدیریت متمرکز «به‌طور مستقیم با تنوع طبیعی بشریت در تضاد هستند.» این سیستم‌ها روش‌های یکنواختی برای کار و لذت بردن از مالکیت تحمیل می‌کنند، در حالی که مالکیت باید آزادی انجام آنچه که فرد با اموال خود می‌خواهد را اعطا کند. این با طبیعت انسانی در تضاد است زیرا هر فرد با شخصیتی متمایز متولد می‌شود که در طول زندگی ظاهر می‌شود و نیازمند رضایت‌های متفاوتی بر اساس ریتم فردی و نیازهای خاص است، نه راه‌حل‌های استانداردی که از بالا تحمیل می‌شوند.
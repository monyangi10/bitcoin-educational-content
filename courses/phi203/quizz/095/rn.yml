question: Dushingiye ku nseguro y’ico canditswe ku bijanye no gutuma umwidegemvyo ugira akamaro, ni igiki gituma umuntu ashobora kuronka ingaruka nziza cane zivuye mu gukoresha umwidegemvyo?
answer: Iterambere ry'ubuhinga n'ubuhinga rivuye mu gutera imbere mu mateka
wrong_answers:
  - Kamere y'umuntu n'ubushobozi bwo kwigenza runtu umuntu avukana bubaho kuva avutse
  - Inzego za politike n'ubutungane butunganya inyifato y'umuntu ku giti ciwe
  - Inyigisho z’idini be n’ubuyobozi bwo mu vy’impwemu buyobora amahitamwo yo mu vy’inyifato runtu .
explanation: |
  Ico canditswe kivuga neza ko ugutuma umwidegemvyo ugira ingaruka nziza cane bishoboka kubera iterambere ry’ubuhinga n’ubuhinga ari ivyamwa vy’urugendo rurerure rw’amateka. Ivyo vyerekana ko ukuntu umwidegemvyo ushobora gukora neza bivana n’iterambere ry’ubutekerezi aho kuva ku vyo umuntu atanga, ku kugenzura inzego canke ku kuyoborwa n’idini. Umwanditsi ashimika ku vy’uko umwidegemvyo ari uburyo bwo kwubaka no kwiga buvana n’uguhindura umuntu mu vy’inyifato runtu no mu vy’inganda, atari ikintu gihabwa mu buryo busanzwe canke gitegekwa hanze biciye mu mabwirizwa canke mu nyigisho z’impwemu.
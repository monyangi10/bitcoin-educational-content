question: Co podle analýzy optimalizace svobody v textu umožňuje dosáhnout maximálního užitečného efektu z výkonu svobody?
answer: Technologický a technický vývoj vyplývající z historického pokroku
wrong_answers:
  - Přirozené lidské instinkty a vrozené morální schopnosti, které existují od narození
  - Politické instituce a soudní systémy, které regulují chování jednotlivců
  - Náboženské učení a duchovní vedení, které usměrňuje morální volby
explanation: |
  V textu se výslovně uvádí, že optimalizace svobody k dosažení maximálního užitečného účinku je umožněna technologickým a technickým vývojem, který je výsledkem dlouhé historické cesty. To dokazuje, že účinnost svobody závisí spíše na civilizačním pokroku než na přírodních danostech, institucionální kontrole nebo náboženském vedení. Autor zdůrazňuje, že svoboda je proces konstrukce a učení závislý na moralizaci a industrializaci lidstva, nikoli něco přirozeně daného nebo vnuceného zvenčí prostřednictvím předpisů či duchovních doktrín.
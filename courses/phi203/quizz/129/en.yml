question: What was Gustave de Molinari's central argument in his late-career work on international peace?
answer: Rising global economic interdependence had made armed conflict not merely immoral but economically suicidal for all participants, making war a form of self-destruction
wrong_answers:
  - Nations should sign binding international disarmament treaties to reduce the material capacity for war and thereby guarantee lasting peace
  - Democratic governments are inherently more peaceful than monarchies because their citizens bear the direct costs of war through taxation and conscription
  - International peace requires a world government with a monopoly on military force to prevent individual nations from resorting to violence
explanation: |
  Gustave de Molinari, the Belgian-born French economist who directed the Journal des économistes for decades, devoted his late career to what he called a "war on war." His argument was grounded in economic interdependence: in the 15th or 16th century, a conflict in Africa or Asia would barely affect European populations because exchange spheres were narrow and societies lived in relative self-sufficiency. As the chain of exchange expanded globally, any break in it became increasingly devastating for all participants. This made armed conflict economically suicidal — a powerful argument for peace rooted in material self-interest rather than moral idealism.

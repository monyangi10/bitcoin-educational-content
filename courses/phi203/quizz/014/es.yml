question: Según la teoría de la perfectibilidad humana de Condorcet, ¿qué es necesario para que la humanidad siga progresando?
answer: Las ideas nuevas y revolucionarias deben comunicarse libremente para transmitir los descubrimientos a las generaciones futuras
wrong_answers:
  - Las instituciones gubernamentales deben regular cuidadosamente qué ideas pueden compartirse públicamente
  - Sólo los académicos consagrados deben poder debatir y desarrollar nuevos conceptos
  - Los conocimientos tradicionales deben conservarse inalterados para mantener la estabilidad social
explanation: |
  La "Esquisse d'un tableau historique des progrès de l'esprit humain" de Condorcet sostiene que la perfectibilidad humana requiere unas condiciones activas en las que puedan comunicarse libremente ideas nuevas, audaces y revolucionarias. Esta transmisión de los descubrimientos a las generaciones futuras es esencial para un progreso continuo. Las respuestas erróneas contradicen este principio al sugerir restricciones al intercambio de ideas, limitar el debate a las élites o dar prioridad a la tradición sobre la innovación, todo lo cual obstaculizaría el proceso de perfectibilidad descrito por Condorcet.
question: Secondo la teoria della perfettibilità umana di Condorcet, cosa è necessario all'umanità per continuare a progredire?
answer: Le idee nuove e rivoluzionarie devono essere comunicate liberamente per trasmettere le scoperte alle generazioni future
wrong_answers:
  - Le istituzioni governative devono regolare attentamente quali idee possono essere condivise pubblicamente
  - Solo agli studiosi affermati dovrebbe essere permesso di discutere e sviluppare nuovi concetti
  - Le conoscenze tradizionali devono essere conservate inalterate per mantenere la stabilità sociale
explanation: |
  L'"Esquisse d'un tableau historique des progrès de l'esprit humain" di Condorcet sostiene che la perfettibilità umana richiede condizioni attive in cui le idee nuove, audaci e rivoluzionarie possano essere comunicate liberamente. Questa trasmissione delle scoperte alle generazioni future è essenziale per un progresso continuo. Le risposte sbagliate contraddicono questo principio proponendo restrizioni alla condivisione delle idee, limitando il dibattito alle élite o privilegiando la tradizione rispetto all'innovazione - tutte cose che ostacolerebbero il processo di perfettibilità descritto da Condorcet.
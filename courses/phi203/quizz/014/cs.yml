question: Co je podle Condorcetovy teorie lidské zdokonalitelnosti nezbytné pro další pokrok lidstva?
answer: Nové a převratné myšlenky musí být volně sdělovány, aby se objevy předávaly dalším generacím
wrong_answers:
  - Vládní instituce musí pečlivě regulovat, které myšlenky mohou být veřejně sdíleny
  - Diskutovat a rozvíjet nové koncepty by mělo být umožněno pouze uznávaným vědcům
  - Tradiční znalosti musí být zachovány v nezměněné podobě, aby byla zachována sociální stabilita
explanation: |
  Condorcetův "Esquisse d'un tableau historique des progrès de l'esprit humain" tvrdí, že lidská dokonalost vyžaduje aktivní podmínky, v nichž lze svobodně sdělovat nové, odvážné a revoluční myšlenky. Toto předávání objevů budoucím generacím je nezbytné pro neustálý pokrok. Špatné odpovědi jsou v rozporu s touto zásadou, protože navrhují omezení sdílení myšlenek, omezení diskuse na elity nebo upřednostnění tradice před inovacemi - to vše by bránilo procesu zdokonalování, který Condorcet popsal.
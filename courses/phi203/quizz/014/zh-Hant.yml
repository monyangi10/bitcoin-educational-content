question: 根據孔多塞的人類完美性理論，人類要繼續進步，需要什麼？
answer: 新的、革命性的想法必須自由傳播，以便將發現傳給後代
wrong_answers:
  - 政府機構必須小心規範哪些想法可以公開分享
  - 只有已建立的學者才應被允許辯論和發展新的概念
  - 傳統知識必須保持不變，以維持社會穩定
explanation: |
  孔多塞的《Esquisse d'un tableau historique des progrès de l'esprit humain》認為，人類的完美需要積極的條件，讓新的、大膽的、革命性的想法可以自由傳播。將發現傳達給後代是持續進步的必要條件。錯誤的答案與此原則相違背，它們建議限制思想分享、將辯論局限於精英人士、或將傳統凌駕於創新之上 - 所有這些都會妨礙孔多塞所描述的完美性過程。
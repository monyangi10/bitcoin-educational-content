question: 콘도르셋의 인간 완전성 이론에 따르면 인류가 계속 발전하기 위해 필요한 것은 무엇일까요?
answer: 새롭고 혁신적인 아이디어를 자유롭게 소통하여 발견을 미래 세대에 전수해야 합니다
wrong_answers:
  - 정부 기관은 어떤 아이디어를 공개적으로 공유할 수 있는지 신중하게 규제해야 합니다
  - 기존 학자들만 새로운 개념에 대해 토론하고 개발할 수 있어야 합니다
  - 전통 지식은 사회 안정을 유지하기 위해 변함없이 보존되어야 합니다
explanation: |
  콘도르셋의 '인류 정신의 역사에 관한 연구'는 인간의 완전성을 위해서는 새롭고 대담하며 혁명적인 아이디어가 자유롭게 소통될 수 있는 적극적인 여건이 필요하다고 주장합니다. 이러한 발견을 미래 세대에 전달하는 것은 지속적인 발전을 위해 필수적입니다. 오답은 아이디어 공유에 대한 제한, 토론을 엘리트로 제한하는 것, 혁신보다 전통을 우선시하는 것 등을 제시함으로써 콘도르셋이 말한 완전성의 과정을 방해하는 것으로 이 원칙과 모순됩니다.
question: Dukurikije umugenzo w’ubwigenge bw’Abafaransa wo mu kinjana ca 19, ni irihe kosa ry’ishimikiro ubusosiyalisiti bukora iyo bugerageza gusubira gusobanura umwidegemvyo mu bijanye n’umwidegemvyo mwiza?
answer: Bitera urujijo ubushobozi bwo kuronka ivyo umuntu yipfuza n’umwidegemvyo nyawo, bikajana ku rutonde rusenya umwidegemvyo mubi kandi rukananirwa gutanga ingaruka nziza zasezeranywe .
wrong_answers:
  - Rishimika cane ku burenganzira bw’umuntu ku giti ciwe mu gihe ryirengagiza ivyiza rusangi n’ubumwe bw’abantu bikenewe kugira ngo umuntu agire umwidegemvyo nyakuri .
  - Igumya iciyumviro ca kera c’umwidegemvyo mubi kibuza Leta gutanga amahirwe angana ku benegihugu bose yo gukoresha uburenganzira bwabo .
  - Bituma haba ubusumbasumbane burengeje urugero mu vy’ubutunzi mu kureka inguvu z’isoko zitagira aho zigarukira zigafata ingingo y’ugusangira ubutunzi n’inyungu z’imibano .
explanation: |
  Isesengura rya Paul Leroy-Beaulieu ryerekana ko ugusubira gusobanura umwidegemvyo kw’abanyagihugu nk’umwidegemvyo mwiza (ubushobozi bwo kuronka ivyo umuntu yipfuza) bituma haba ikosa ry’ishimikiro ry’ivyiyumviro. Ubwo buryo buraheba umushinge ukomeye w’umwidegemvyo mubi (ukutagira intambamyi ku bikorwa vy’umuntu ataco yakoze) ushingiye ku burenganzira bw’itunga. Iciyumviro gihambaye ni uko ubusosiyalisiti ‘bunanirwa incuro zibiri’ - busenya umwidegemvyo nyawo utahurwa n’abanyagihugu b’abanyagihugu mu gihe nyene bunanirwa gutanga ingaruka nziza zasezeranywe buvuga ko buzotanga biciye mu gufasha Leta.
question: 19세기 프랑스 자유주의 전통에 따르면, 사회주의가 적극적 자유의 관점에서 자유를 재정의하려고 할 때 어떤 근본적인 오류를 범하는가?
answer: 이는 원하는 결과를 얻을 수 있는 능력과 진정한 자유를 혼동하여 부정적인 자유를 파괴하고 약속된 긍정적인 결과를 제공하지 못하는 시스템으로 이어집니다
wrong_answers:
  - 진정한 자유에 필요한 집단적 선과 사회적 조화를 소홀히 하면서 개인의 재산권에 지나치게 집중하고 있습니다
  - 국가가 모든 시민의 권리 행사를 위한 동등한 기회를 보장하지 못하게 하는 낡은 개념의 소극적 자유를 유지합니다
  - 무제한적인 시장의 힘에 의해 자원과 사회적 혜택의 분배가 결정되도록 허용함으로써 과도한 경제적 불평등을 야기합니다
explanation: |
  폴 르로이-보리외의 분석은 사회주의가 자유를 긍정적 자유(원하는 것을 얻을 수 있는 능력)로 재정의하는 것이 근본적인 개념적 오류를 낳는다는 것을 보여줍니다. 이러한 접근 방식은 재산권에 뿌리를 둔 소극적 자유(무고한 행동에 대한 장애물의 부재)의 견고한 토대를 포기합니다. 사회주의는 자유주의자들이 이해하는 진정한 자유를 파괴하는 동시에 국가 개입을 통해 제공하겠다고 약속한 긍정적인 결과를 제공하지 못하는 '이중 실패'를 한다는 것이 중요한 통찰입니다.
question: Zgodnie z francuską tradycją liberalną XIX wieku, jaki podstawowy błąd popełnia socjalizm, próbując przedefiniować wolność w kategoriach wolności pozytywnej?
answer: Mylą zdolność do osiągania pożądanych rezultatów z prawdziwą wolnością, prowadząc do systemu, który niszczy zarówno negatywną wolność, jak i nie zapewnia obiecanych pozytywnych rezultatów
wrong_answers:
  - Zbyt mocno koncentruje się na indywidualnych prawach własności, zaniedbując jednocześnie dobro zbiorowe i harmonię społeczną niezbędne dla prawdziwej wolności
  - Utrzymuje przestarzałą koncepcję wolności negatywnej, która uniemożliwia państwu zapewnienie równych szans wszystkim obywatelom na korzystanie z ich praw
  - Powoduje nadmierną nierówność ekonomiczną, pozwalając nieograniczonym siłom rynkowym określać dystrybucję zasobów i korzyści społecznych
explanation: |
  Analiza Paula Leroy-Beaulieu pokazuje, że redefinicja wolności w socjalizmie jako wolności pozytywnej (zdolność do uzyskania tego, czego się pragnie) tworzy fundamentalny błąd pojęciowy. Podejście to porzuca solidne podstawy wolności negatywnej (brak przeszkód dla niewinnego działania) zakorzenionej w prawach własności. Krytycznym spostrzeżeniem jest to, że socjalizm "zawodzi podwójnie" - niszczy prawdziwą wolność rozumianą przez liberałów, jednocześnie nie dostarczając obiecanych pozytywnych rezultatów, które rzekomo zapewnia poprzez interwencję państwa.
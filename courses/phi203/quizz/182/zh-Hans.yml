question: 根据 19 世纪法国自由主义传统，社会主义试图用积极自由来重新定义自由，它犯了什么根本性错误？
answer: 它将获得理想结果的能力与真正的自由混为一谈，从而导致一种既破坏消极自由又无法实现所承诺的积极结果的制度
wrong_answers:
  - 它过于注重个人财产权，却忽视了真正自由所需的集体利益与社会和谐
  - 它保留了过时的消极自由概念，使国家无法确保所有公民享有行使权利的平等机会
  - 它允许不受限制的市场力量决定资源和社会福利的分配，从而造成过度的经济不平等
explanation: |
  保罗-勒鲁瓦-博略（Paul Leroy-Beaulieu）的分析表明，社会主义将自由重新定义为积极自由（获得所欲的能力），造成了根本性的概念错误。这种方法放弃了植根于财产权的消极自由的坚实基础（没有对无辜行动的障碍）。重要的启示在于，社会主义 "双重失败"--它破坏了自由主义者所理解的真正自由，同时又无法通过国家干预实现其所承诺的积极成果。
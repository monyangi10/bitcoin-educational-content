question: Selon la tradition libérale française du XIXᵉ siècle, quelle erreur fondamentale le socialisme commet-il lorsqu'il tente de redéfinir la liberté en termes de liberté positive ?
answer: Il confond la capacité d'obtenir les résultats souhaités avec une véritable liberté, ce qui conduit à un système qui détruit à la fois la liberté négative et ne produit pas les résultats positifs promis
wrong_answers:
  - Elle met trop l'accent sur les droits de propriété individuels tout en négligeant le bien collectif et l'harmonie sociale nécessaires à une véritable liberté
  - Elle maintient une conception dépassée de la liberté négative qui empêche l'État de garantir l'égalité des chances pour tous les citoyens dans l'exercice de leurs droits
  - Elle crée des inégalités économiques excessives en permettant aux forces du marché de déterminer sans restriction la répartition des ressources et des avantages sociaux
explanation: |
  L'analyse de Paul Leroy-Beaulieu démontre que la redéfinition de la liberté par le socialisme comme liberté positive (la capacité d'obtenir ce que l'on désire) crée une erreur conceptuelle fondamentale. Cette approche abandonne le fondement solide de la liberté négative (absence d'obstacles à une action innocente) enracinée dans les droits de propriété. L'idée essentielle est que le socialisme "échoue doublement" — il détruit la liberté authentique comprise par les libéraux tout en échouant à fournir les résultats positifs promis qu'il prétend fournir par l'intervention de l'État.

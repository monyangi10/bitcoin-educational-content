question: 根據托克維爾的觀察，在美國社會中，真正的利己主義與狹隘的利己主義有什麼區別？
answer: 自我利益自然延伸至個人以外，包括家庭和更廣泛的社會圈子。
wrong_answers:
  - 自我利益嚴格限制於個人物質利益和個人進步
  - 自我利益透過政府的規範來運作，將個人欲望導向集體目標
  - 只有當個人為了社會利益而完全放棄個人慾望時，自利才會發揮作用。
explanation: |
  Tocqueville 觀察到，真正的利己主義並非幾何上狹隘的利己主義，而是包含家庭和社會聯繫等更廣泛的圈子。文中強調人類有能力實現「大我主義」，從家庭延伸到更廣泛的聯結。這與將經濟自由主義諷刺為純粹自私自利的觀點相矛盾，反而顯示出自我利益自然包含社會層面，而不能淪為嚴格的個人主義。
question: D'après les observations de Tocqueville, qu'est-ce qui distingue le véritable intérêt personnel de l'égoïsme étroit dans la société américaine ?
answer: L'intérêt personnel s'étend naturellement au-delà de l'individu pour englober la famille et des cercles sociaux plus larges
wrong_answers:
  - L'intérêt personnel est strictement limité au gain matériel personnel et à l'avancement individuel
  - L'intérêt personnel fonctionne grâce à la réglementation gouvernementale qui canalise les désirs individuels vers des objectifs collectifs
  - L'intérêt personnel ne fonctionne que lorsque les individus abandonnent complètement leurs désirs personnels au profit de la société
explanation: |
  Tocqueville a observé que le véritable intérêt personnel n'est pas un égoïsme géométriquement étroit, mais qu'il englobe un cercle plus large comprenant la famille et les relations sociales. Le texte souligne que les êtres humains sont capables d'un "grand égoïsme" qui s'étend de la famille à des associations plus larges. Cela contredit la caricature du libéralisme économique comme étant purement égoïste, montrant au contraire que l'intérêt personnel incorpore naturellement des dimensions sociales et ne peut être réduit à un strict individualisme.
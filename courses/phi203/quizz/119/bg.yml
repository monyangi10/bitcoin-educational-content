question: Според наблюденията на Токвил, какво отличава истинския личен интерес от тесния егоизъм в американското общество?
answer: Собственият интерес естествено се простира отвъд индивида и обхваща семейството и по-широките социални кръгове
wrong_answers:
  - Личният интерес е строго ограничен до личната материална изгода и индивидуалния напредък
  - Самостоятелният интерес действа чрез държавно регулиране, което насочва индивидуалните желания към колективни цели
  - Личният интерес функционира само когато хората напълно се откажат от личните си желания в името на обществената полза
explanation: |
  Токвил отбелязва, че истинският личен интерес не е геометрично ограничен егоизъм, а обхваща по-широк кръг, включително семейни и социални връзки. В текста се подчертава, че хората са способни на "голям егоизъм", който се простира от семейството до по-широки асоциации. Това противоречи на карикатурата на икономическия либерализъм като чисто егоистичен, като вместо това показва, че личният интерес естествено включва социални измерения и не може да бъде сведен до строг индивидуализъм.
question: Čím se podle Tocquevillových pozorování v americké společnosti liší skutečný vlastní zájem od omezeného egoismu?
answer: Vlastní zájem přirozeně přesahuje rámec jednotlivce a zahrnuje i rodinu a širší společenské kruhy
wrong_answers:
  - Vlastní zájem je striktně omezen na osobní materiální zisk a individuální pokrok
  - Vlastní zájem funguje prostřednictvím vládní regulace, která směřuje individuální touhy ke kolektivním cílům
  - Vlastní zájem funguje pouze tehdy, když se jedinec zcela vzdá osobních přání ve prospěch společnosti
explanation: |
  Tocqueville si všiml, že skutečný vlastní zájem není geometricky omezený egoismus, ale zahrnuje širší okruh včetně rodinných a společenských vazeb. V textu zdůrazňuje, že lidé jsou schopni "velkého egoismu", který sahá od rodiny až po širší sdružení. To je v rozporu s karikaturou ekonomického liberalismu jako čistě sobeckého, a naopak ukazuje, že vlastní zájem přirozeně zahrnuje sociální rozměr a nelze jej redukovat na přísný individualismus.
question: Prema zapažanjima Tokvila, šta razlikuje istinski lični interes od uskog egoizma u američkom društvu?
answer: Sopstveni interes se prirodno širi izvan pojedinca kako bi obuhvatio porodicu i šire društvene krugove.
wrong_answers:
  - Lični interes je strogo ograničen na ličnu materijalnu dobit i individualni napredak.
  - Sopstveni interes deluje kroz vladinu regulativu koja usmerava individualne želje ka kolektivnim ciljevima
  - Sopstveni interes funkcioniše samo kada pojedinci potpuno napuste lične želje za dobrobit društva
explanation: |
  Tocqueville je primetio da pravi lični interes nije geometrijski uski egoizam, već obuhvata širi krug uključujući porodicu i društvene veze. Tekst naglašava da su ljudi sposobni za 'veliki egoizam' koji se proteže od porodice do šireg društva. Ovo je u suprotnosti sa karikaturom ekonomskog liberalizma kao isključivo sebičnog, pokazujući umesto toga da lični interes prirodno uključuje društvene dimenzije i ne može se svesti na strogi individualizam.
question: Kulingana na uchunguzi wa Tocqueville, ni nini kinachotofautisha ubinafsi wa kweli na ubinafsi finyu katika jamii ya Marekani?
answer: Maslahi ya kibinafsi kwa kawaida huenea zaidi ya mtu binafsi na kujumuisha duru za familia na kijamii kwa upana zaidi.
wrong_answers:
  - Ubinafsi umewekewa kikomo tu kwa faida ya kibinafsi ya kimwili na maendeleo ya mtu binafsi
  - Maslahi binafsi hufanya kazi kupitia kanuni za serikali zinazoelekeza matamanio ya mtu binafsi kuelekea malengo ya pamoja
  - Maslahi binafsi hufanya kazi pale tu watu wanapoacha kabisa matamanio yao binafsi kwa manufaa ya kijamii.
explanation: |
  Tocqueville aliona kwamba ubinafsi wa kweli si ubinafsi finyu kijiometri bali unajumuisha duara pana ikijumuisha uhusiano wa kifamilia na kijamii. Maandishi yanasisitiza kwamba wanadamu wana uwezo wa 'ubinafsi mkubwa' unaoenea kutoka familia hadi vyama vipana. Hii inapingana na katuni ya uhuru wa kiuchumi kama ubinafsi tu, ikionyesha badala yake kwamba ubinafsi kiasili hujumuisha vipimo vya kijamii na hauwezi kupunguzwa hadi ubinafsi mkali.
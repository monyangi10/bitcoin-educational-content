question: Dukurikije ivyo Tocqueville yabonye, ​​ni igiki gitandukanya inyungu nyakuri y’ukwikunda n’ukwikunda gukeyi mu kibano c’Abanyamerika?
answer: Inyungu z’umuntu ku giti ciwe zirarenga umuntu ku giti ciwe kugira ngo zishiremwo umuryango n’abantu benshi
wrong_answers:
  - Inyungu z’umuntu ku giti ciwe zigarukira cane ku nyungu z’umubiri z’umuntu ku giti ciwe no ku gutera imbere kw’umuntu ku giti ciwe .
  - Inyungu z'umuntu ku giti ciwe zikora biciye mu mategeko ya Leta ayobora ivyipfuzo vy'umuntu ku giti ciwe ku ntego rusangi
  - Inyungu z’umuntu bwite zikora gusa iyo abantu bahevye burundu ivyipfuzo vyiwe bwite kugira ngo baronke inyungu mu kibano .
explanation: |
  Tocqueville yabonye ko inyungu nyakuri y’ukwikunda atari ubwikunzi bukeyi ariko ko ihurikiyemwo uruziga rwagutse harimwo n’imigenderanire yo mu muryango n’iyo mu kibano. Ico canditswe gishimika ku vy’uko abantu bashobora ‘kwikunda cane’ kuva ku muryango gushika ku miryango yagutse. Ivyo bivuguruza igishushanyo c’ukwidegemvya kw’ubutunzi nk’ubwikunzi gusa, vyerekana ko inyungu z’umuntu bwite zishiramwo mu buryo busanzwe ivyerekeye imibano kandi ko zidashobora kugabanywa ngo zibe ubwikunzi bukomeye.
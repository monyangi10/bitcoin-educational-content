question: Milline põhimõtteline erinevus on peatüki kohaselt lepingute kaudu toimuva konkurentsi ja vägivalla või poliitika kaudu toimuva konkurentsi vahel?
answer: Contract-põhine konkurents suurendab kogutoodangut, jagades samal ajal jõukust õiglaselt ümber, samas kui vägivald ja poliitika jagavad ainult olemasolevaid ressursse ümber, ilma uut jõukust loomata
wrong_answers:
  - Contract-põhine konkurents kõrvaldab kõik ressursside nappuse vormid, samas kui vägivald ja poliitika loovad valitsuse sekkumise kaudu kunstlikku nappust
  - Contract-põhine konkurents nõuab nõuetekohaseks toimimiseks valitsuse reguleerimist, samas kui vägivald ja poliitika toimivad sõltumatult mis tahes institutsionaalsest raamistikust
  - Contract-põhine konkurents keskendub üksikisikute lühiajalisele kasule, samas kui vägivald ja poliitika seavad esikohale pikaajalise kollektiivse kasu ühiskonnale
explanation: |
  Peatükis eristatakse neid konkurentsivorme selgelt nende tootlike tulemuste järgi. Contract-põhine konkurents, mis põhineb vahetavate osapoolte vahelisel vastastikusel eelisel, mitte ainult ei jaga rikkust õiglaselt panustajate vahel ümber, vaid suurendab ka üldist tootmist isiklike huvide motiveerimise kaudu. Seevastu nii vägivaldne konkurents kui ka poliitiline ümberjagamine lihtsalt liigutavad olemasolevaid ressursse, ilma et nad looksid lisarikkust. Seetõttu tähistab lepinguline vahetus tõelist tsivilisatsioonilist progressi, samas kui interventsionism ja sotsialism kujutavad endast pigem tagasilööki sundimise kui vabatahtliku vastastikuse kasu omandamise suunas.
question: According to the chapter, what fundamental difference exists between competition through contracts versus competition through violence or politics?
answer: Contract-based competition increases total production while redistributing wealth fairly, whereas violence and politics only redistribute existing resources without creating new wealth
wrong_answers:
  - Contract-based competition eliminates all forms of resource scarcity, while violence and politics create artificial shortages through government intervention
  - Contract-based competition requires government regulation to function properly, while violence and politics operate independently of any institutional framework
  - Contract-based competition focuses on short-term gains for individuals, while violence and politics prioritize long-term collective benefits for society
explanation: |
  The chapter clearly distinguishes between these forms of competition by their productive outcomes. Contract-based competition, founded on mutual advantage between exchanging parties, not only redistributes wealth justly among contributors but also increases overall production through personal interest motivation. In contrast, both violent competition and political redistribution merely move existing resources around without creating additional wealth. This represents why contractual exchange marks genuine civilizational progress, while interventionism and socialism represent a backward step toward appropriation through coercion rather than voluntary mutual benefit.
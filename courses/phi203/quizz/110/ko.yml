question: 이 장에 따르면, 계약을 통한 경쟁과 폭력이나 정치를 통한 경쟁 사이에는 어떤 근본적인 차이가 존재하나요?
answer: Contract 기반 경쟁은 부를 공정하게 재분배하면서 총생산을 증가시키는 반면, 폭력과 정치는 새로운 부를 창출하지 않고 기존 자원을 재분배할 뿐입니다
wrong_answers:
  - Contract 기반 경쟁은 모든 형태의 자원 부족을 제거하는 반면, 폭력과 정치는 정부 개입을 통해 인위적인 부족을 야기합니다
  - Contract 기반 경쟁이 제대로 작동하려면 정부 규제가 필요하지만, 폭력과 정치는 제도적 틀과 무관하게 작동합니다
  - Contract 기반 경쟁은 개인의 단기적 이익에 초점을 맞추는 반면, 폭력과 정치는 사회의 장기적 집단 이익을 우선시합니다
explanation: |
  이 장에서는 이러한 형태의 경쟁을 생산적 결과에 따라 명확하게 구분합니다. 교환 당사자 간의 상호 이익에 기반한 Contract 기반 경쟁은 기여자 간에 부를 공정하게 재분배할 뿐만 아니라 개인의 이익 동기를 통해 전체 생산량을 증가시킵니다. 반면, 폭력적 경쟁과 정치적 재분배는 추가적인 부를 창출하지 않고 기존 자원을 이동시킬 뿐입니다. 이것이 바로 계약적 교환이 진정한 문명적 진보를 의미하는 반면, 개입주의와 사회주의는 자발적인 상호 이익이 아닌 강압을 통한 전유라는 후퇴를 의미하는 이유입니다.
question: Jaký je podle kapitoly zásadní rozdíl mezi konkurencí prostřednictvím smluv a konkurencí prostřednictvím násilí nebo politiky?
answer: Konkurence založená na Contract zvyšuje celkovou produkci a zároveň spravedlivě přerozděluje bohatství, zatímco násilí a politika pouze přerozdělují stávající zdroje, aniž by vytvářely nové bohatství
wrong_answers:
  - Konkurence založená na Contract eliminuje všechny formy nedostatku zdrojů, zatímco násilí a politika vytvářejí umělý nedostatek prostřednictvím vládních zásahů
  - Hospodářská soutěž založená na Contract vyžaduje ke svému řádnému fungování vládní regulaci, zatímco násilí a politika fungují nezávisle na jakémkoli institucionálním rámci
  - Soutěž založená na Contract se zaměřuje na krátkodobé zisky jednotlivců, zatímco násilí a politika upřednostňují dlouhodobé kolektivní přínosy pro společnost
explanation: |
  Kapitola jasně rozlišuje mezi těmito formami konkurence podle jejich produktivních výsledků. Konkurence založená na Contract, která je založena na vzájemné výhodnosti mezi směňujícími stranami, nejen spravedlivě přerozděluje bohatství mezi přispěvatele, ale také zvyšuje celkovou produkci díky motivaci osobního zájmu. Naproti tomu násilná konkurence i politické přerozdělování pouze přesouvají existující zdroje, aniž by vytvářely další bohatství. To představuje důvod, proč smluvní směna znamená skutečný civilizační pokrok, zatímco intervencionismus a socialismus představují krok zpět směrem k přivlastňování z donucení, nikoli k dobrovolnému vzájemnému prospěchu.
question: Dushingiye ku kigabane, ni itandukaniro irihe ry’ishimikiro riri hagati y’uguhiganwa biciye mu masezerano n’uguhiganwa biciye mu bukazi canke muri politike?
answer: Amahiganwa ashingiye kuri Contract yongera umusaruro wose mu gihe yongera gusangira ubutunzi mu buryo bubereye, mu gihe ubukazi na politike bisubira gusangira gusa ubutunzi busanzwe butagira ubutunzi bushasha .
wrong_answers:
  - Amahiganwa ashingiye kuri Contract akuraho ubwoko bwose bw’ubukene bw’ubutunzi, mu gihe ubukazi na politike bituma haba ubukene bw’ubuhinga biciye mu gufasha kwa Leta .
  - Amarushanwa ashingiye kuri Contract asaba amategeko ya Leta kugira ngo akore neza, mu gihe ubukazi na politike bikora bitandukanye n’inzego iyo ari yo yose .
  - Amarushanwa ashingiye kuri Contract yibanda ku nyungu z’igihe gito ku muntu ku giti ciwe, mu gihe ubukazi na politike bishira imbere inyungu z’igihe kirekire rusangi ku kibano .
explanation: |
  Ico kigabane kiratandukanya neza ubwo buryo bwo guhiganwa biciye ku ngaruka zitanga. Amarushanwa ashingiye kuri Contract, ashingiye ku nyungu hagati y’abahuza, ntasubira gusangira ubutunzi mu buryo bubereye gusa mu batanga, ariko kandi yongera umusaruro muri rusangi biciye mu gutuma umuntu agira inyungu z’umuntu ku giti ciwe. Mu buryo butandukanye n’ubwo, uguhiganwa kw’ubukazi be n’ugusubira gusangira ivy’ubutegetsi, vyose bituma gusa ubutunzi buriho bugendagenda ata butunzi bwongereweko. Ivyo bigereranya igituma uguhanahana amasezerano bigaragaza iterambere nyakuri ry’iterambere, mu gihe ubufasha n’ubusosiyalisimu bigereranya intambwe yo gusubira inyuma mu kwifatanya n’abandi biciye mu guhatira aho gufashanya ku bushake.
question: Enligt teorin om harmoni mellan intressen, vilken roll spelar tekniska framsteg inom transport för att skapa fredliga internationella relationer?
answer: Det möjliggör mer regelbundna och omfattande utbyten som skapar ett ömsesidigt ekonomiskt beroende mellan länder
wrong_answers:
  - Det gör att militära styrkor kan sättas in snabbare för att förhindra konflikter innan de eskalerar
  - "Det underlättar kulturellt utbyte som hjälper nationer att förstå varandras värderingar och traditioner"
  - Det minskar kostnaden för naturresurser genom att göra dem tillgängliga från flera globala källor
explanation: |
  I texten identifieras specifikt transportteknik som en av de nyckelfaktorer som möjliggjorde uppkomsten av en "kedja av harmoni" mellan ekonomiska aktörer. Genom att möjliggöra mer regelbundna och omfattande utbyten skapade dessa tekniker ett ekonomiskt ömsesidigt beroende där störningar var som helst påverkar alla. Detta ömsesidiga beroende gör krig kostsamt för alla parter, vilket skapar incitament för fred. De andra alternativen fokuserar på militära, kulturella eller resursmässiga faktorer som inte betonas i det ramverk för harmoni mellan intressen som presenteras.
question: Mikä on etujen harmoniaa koskevan teorian mukaan liikenteen teknisen kehityksen rooli rauhanomaisten kansainvälisten suhteiden luomisessa?
answer: Se mahdollistaa säännöllisemmän ja laajemman vaihdon, joka luo kansojen välille keskinäisen taloudellisen riippuvuuden
wrong_answers:
  - Sen ansiosta sotilasjoukot voivat olla nopeammin liikkeellä konfliktien ehkäisemiseksi ennen niiden kärjistymistä
  - "Se helpottaa kulttuurivaihtoa, joka auttaa kansakuntia ymmärtämään toistensa arvoja ja perinteitä."
  - Se vähentää luonnonvarojen kustannuksia, koska ne ovat saatavilla useista maailmanlaajuisista lähteistä
explanation: |
  Tekstissä mainitaan erityisesti kuljetusteknologia yhtenä avaintekijänä, joka mahdollisti taloudellisten toimijoiden välisen "sopusointuketjun" syntymisen. Teknologiat mahdollistivat säännöllisemmän ja laajemman vaihdon ja loivat siten taloudellisen keskinäisen riippuvuuden, jossa häiriöt vaikuttavat kaikkiin. Tämä keskinäinen riippuvuus tekee sodasta kalliin kaikille osapuolille, mikä luo kannustimia rauhaan. Muissa vaihtoehdoissa keskitytään sotilaallisiin, kulttuurisiin tai resursseihin liittyviin tekijöihin, joita ei korosteta esitetyssä etujen harmoniaa koskevassa kehyksessä.
question: Menurut teori harmoni kepentingan, apa peran kemajuan teknologi transportasi dalam menciptakan hubungan internasional yang damai?
answer: Hal ini memungkinkan pertukaran yang lebih teratur dan ekstensif yang menciptakan ketergantungan ekonomi timbal balik antar negara
wrong_answers:
  - Hal ini memungkinkan pasukan militer untuk dikerahkan lebih cepat untuk mencegah konflik sebelum konflik meningkat
  - "Ini memfasilitasi pertukaran budaya yang membantu bangsa-bangsa memahami nilai-nilai dan tradisi satu sama lain"
  - Mengurangi biaya sumber daya alam dengan membuatnya dapat diakses dari berbagai sumber global
explanation: |
  Teks tersebut secara khusus mengidentifikasi teknologi transportasi sebagai salah satu faktor kunci yang memungkinkan munculnya 'rantai keselarasan' di antara para pelaku ekonomi. Dengan memungkinkan pertukaran yang lebih teratur dan ekstensif, teknologi ini menciptakan saling ketergantungan ekonomi di mana gangguan di mana pun akan memengaruhi semua orang. Saling ketergantungan ini membuat perang menjadi mahal bagi semua pihak, sehingga menciptakan insentif untuk perdamaian. Pilihan lainnya berfokus pada faktor militer, budaya, atau sumber daya yang tidak ditekankan dalam kerangka kerja keselarasan kepentingan yang disajikan.
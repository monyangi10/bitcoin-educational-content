question: 이익의 조화 이론에 따르면, 교통 분야의 기술 발전이 평화로운 국제 관계를 만드는 데 어떤 역할을 하나요?
answer: 국가 간 상호 경제적 의존도를 높이는 보다 정기적이고 광범위한 교류를 가능하게 합니다
wrong_answers:
  - 분쟁이 확대되기 전에 군대를 보다 신속하게 배치하여 분쟁을 예방할 수 있습니다
  - "국가가 서로의 가치와 전통을 이해하는 데 도움이 되는 문화 교류를 촉진합니다."
  - 여러 글로벌 소스에서 액세스할 수 있도록 하여 천연 자원에 대한 비용을 절감합니다
explanation: |
  이 책은 특히 경제 주체 간의 '조화의 사슬'이 출현할 수 있었던 핵심 요인 중 하나로 교통 기술을 꼽습니다. 이러한 기술은 보다 정기적이고 광범위한 교류를 가능하게 함으로써 어느 한 곳의 중단이 모든 사람에게 영향을 미치는 경제적 상호의존성을 만들어냈습니다. 이러한 상호 의존성은 모든 당사자에게 전쟁의 대가를 치르게 하여 평화를 위한 인센티브를 창출합니다. 다른 옵션은 제시된 이해관계의 조화 프레임워크에서 강조되지 않은 군사, 문화 또는 자원 요소에 중점을 둡니다.
question: Secondo la teoria dell'armonia degli interessi, che ruolo ha il progresso tecnologico dei trasporti nel creare relazioni internazionali pacifiche?
answer: Permette scambi più regolari ed estesi che creano una dipendenza economica reciproca tra le nazioni
wrong_answers:
  - Consente alle forze militari di dispiegarsi più rapidamente per prevenire i conflitti prima che si aggravino
  - "Facilita lo scambio culturale che aiuta le nazioni a comprendere i valori e le tradizioni dell'altra"
  - Riduce il costo delle risorse naturali rendendole accessibili da più fonti globali
explanation: |
  Il testo identifica specificamente le tecnologie di trasporto come uno dei fattori chiave che hanno permesso l'emergere della "catena di armonia" tra gli agenti economici. Consentendo scambi più regolari ed estesi, queste tecnologie hanno creato un'interdipendenza economica in cui le interruzioni si ripercuotono su tutti. Questa dipendenza reciproca rende la guerra costosa per tutte le parti, creando incentivi per la pace. Le altre opzioni si concentrano su fattori militari, culturali o di risorse che non sono enfatizzati nel quadro dell'armonia degli interessi presentato.
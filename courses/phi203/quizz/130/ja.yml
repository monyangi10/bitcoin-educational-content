question: 利害の調和理論によれば、平和的な国際関係を築く上で、交通機関の技術進歩はどのような役割を果たすのか？
answer: 国家間の相互経済依存を生み出す、より定期的で広範な交流を可能にする。
wrong_answers:
  - 紛争がエスカレートする前に、軍事力をより迅速に展開し、紛争を未然に防ぐことができる。
  - 「互いの価値観や伝統を理解するための文化交流を促進する。
  - 天然資源を複数のグローバルなソースからアクセスできるようにすることで、天然資源のコストを削減する。
explanation: |
  本文では、経済主体間の「調和の連鎖」の出現を可能にした重要な要因のひとつとして、輸送技術を挙げている。より定期的で広範な交換を可能にすることで、これらの技術は経済的相互依存を生み出し、どこであろうと混乱がすべての人に影響を及ぼすようになった。この相互依存によって、戦争はすべての当事者にとってコストのかかるものとなり、平和へのインセンティブが生まれる。その他の選択肢は、軍事的、文化的、あるいは資源的要因に焦点を当てたもので、提示された利害の調和の枠組みでは強調されていない。
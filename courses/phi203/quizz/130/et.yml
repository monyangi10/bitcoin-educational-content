question: Milline roll on huvide harmoonia teooria kohaselt tehnoloogilisel arengul transpordisektoris rahumeelsete rahvusvaheliste suhete loomisel?
answer: See võimaldab korrapärasemat ja ulatuslikumat kaubavahetust, mis loob rahvaste vahel vastastikust majanduslikku sõltuvust
wrong_answers:
  - See võimaldab sõjalisi jõude kiiremini rakendada, et ennetada konflikte enne nende eskaleerumist
  - "See hõlbustab kultuurivahetust, mis aitab rahvastel mõista üksteise väärtusi ja traditsioone"
  - See vähendab loodusvarade maksumust, kuna teeb need kättesaadavaks mitmest ülemaailmsest allikast
explanation: |
  Tekstis nimetatakse transporditehnoloogiat kui üht võtmetegurit, mis võimaldas majandussubjektide vahelise "harmooniaahela" tekkimist. Kuna need tehnoloogiad võimaldasid korrapärasemat ja ulatuslikumat kaubavahetust, tekitasid need majanduslikku vastastikust sõltuvust, kus häired mõjutavad kõiki. Selline vastastikune sõltuvus muudab sõja kõigi osapoolte jaoks kulukaks, luues stiimulid rahu saavutamiseks. Teised võimalused keskenduvad sõjalistele, kultuurilistele või ressursiteguritele, mida esitatud huvide harmoonia raamistikus ei rõhutata.
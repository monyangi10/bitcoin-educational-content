question: Zgodnie z teorią harmonii interesów, jaką rolę odgrywa postęp technologiczny w transporcie w tworzeniu pokojowych stosunków międzynarodowych?
answer: Umożliwia bardziej regularną i rozległą wymianę, która tworzy wzajemną zależność gospodarczą między narodami
wrong_answers:
  - Umożliwia to szybsze rozmieszczanie sił wojskowych w celu zapobiegania konfliktom przed ich eskalacją
  - "Ułatwia wymianę kulturową, która pomaga narodom zrozumieć wzajemne wartości i tradycje"
  - Zmniejsza koszty zasobów naturalnych, udostępniając je z wielu globalnych źródeł
explanation: |
  Tekst wskazuje technologie transportowe jako jeden z kluczowych czynników, które umożliwiły powstanie "łańcucha harmonii" między podmiotami gospodarczymi. Umożliwiając bardziej regularną i rozległą wymianę, technologie te stworzyły współzależność gospodarczą, w której zakłócenia w dowolnym miejscu wpływają na wszystkich. Ta wzajemna zależność sprawia, że wojna jest kosztowna dla wszystkich stron, tworząc zachęty do pokoju. Pozostałe opcje koncentrują się na czynnikach wojskowych, kulturowych lub zasobowych, które nie są podkreślane w przedstawionych ramach harmonii interesów.
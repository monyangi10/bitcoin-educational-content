question: Според теорията за хармонията на интересите каква роля играе технологичният напредък в транспорта за създаването на мирни международни отношения?
answer: Тя дава възможност за по-редовен и широк обмен, който създава взаимна икономическа зависимост между държавите
wrong_answers:
  - Тя позволява на военните сили да се разгръщат по-бързо, за да се предотвратят конфликти, преди да са ескалирали
  - "Тя улеснява културния обмен, който помага на народите да разберат ценностите и традициите на другия."
  - Намалява разходите за природни ресурси, като ги прави достъпни от множество световни източници
explanation: |
  В текста транспортните технологии се посочват като един от ключовите фактори, позволили появата на "веригата на хармонията" между икономическите агенти. Позволявайки по-редовен и широк обмен, тези технологии създават икономическа взаимозависимост, при която смущенията навсякъде засягат всички. Тази взаимна зависимост прави войната скъпа за всички страни, като създава стимули за мир. Другите варианти се фокусират върху военни, културни или ресурсни фактори, които не са подчертани в представената рамка за хармония на интересите.
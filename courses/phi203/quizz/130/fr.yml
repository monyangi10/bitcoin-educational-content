question: Selon la théorie de l'harmonie des intérêts, quel rôle les progrès technologiques dans le domaine des transports jouent-ils dans l'établissement de relations internationales pacifiques ?
answer: Il permet des échanges plus réguliers et plus importants qui créent une dépendance économique mutuelle entre les nations
wrong_answers:
  - Elle permet aux forces militaires de se déployer plus rapidement pour prévenir les conflits avant qu'ils ne dégénèrent
  - Il facilite les échanges culturels qui aident les nations à comprendre les valeurs et les traditions de chacune d'entre elles
  - Il réduit le coût des ressources naturelles en les rendant accessibles à partir de multiples sources mondiales
explanation: |
  Le texte identifie spécifiquement les technologies de transport comme l'un des facteurs clés ayant permis l'émergence de la "chaîne d'harmonie" entre les agents économiques. En permettant des échanges plus réguliers et plus étendus, ces technologies ont créé une interdépendance économique où les perturbations, où qu'elles soient, affectent tout le monde. Cette dépendance mutuelle rend la guerre coûteuse pour toutes les parties, ce qui incite à la paix. Les autres options se concentrent sur des facteurs militaires, culturels ou de ressources qui ne sont pas mis en avant dans le cadre de l'harmonie des intérêts présenté.

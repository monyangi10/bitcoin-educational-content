question: Welke rol speelt technologische vooruitgang in transport volgens de harmonie van belangen theorie bij het creëren van vreedzame internationale relaties?
answer: Het maakt regelmatigere en uitgebreidere uitwisselingen mogelijk die wederzijdse economische afhankelijkheid tussen naties creëren
wrong_answers:
  - Militaire troepen kunnen sneller worden ingezet om conflicten te voorkomen voordat ze escaleren
  - "Het vergemakkelijkt culturele uitwisseling die naties helpt elkaars waarden en tradities te begrijpen"
  - Het verlaagt de kosten van natuurlijke hulpbronnen door ze toegankelijk te maken vanuit meerdere mondiale bronnen
explanation: |
  In de tekst worden transporttechnologieën specifiek genoemd als een van de sleutelfactoren die het ontstaan van de 'harmonieketen' tussen economische actoren mogelijk maakten. Door regelmatigere en uitgebreidere uitwisselingen mogelijk te maken, creëerden deze technologieën economische onderlinge afhankelijkheid waarbij verstoringen overal iedereen raakten. Deze wederzijdse afhankelijkheid maakt oorlog duur voor alle partijen, waardoor er stimulansen voor vrede ontstaan. De andere opties richten zich op militaire, culturele of hulpbronfactoren die niet benadrukt worden in het gepresenteerde raamwerk van harmonie van belangen.
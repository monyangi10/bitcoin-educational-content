question: Metne göre, arazilerin zorla elden çıkarıldığını iddia eden sistemlerdeki iki büyük olgusal hata nedir?
answer: Otomatik zenginleşmeyi varsayarlar ve mevcut zenginliğin meşru çalışma ve gönüllü değişimden kaynaklandığını görmezden gelirler
wrong_answers:
  - Devlet düzenlemelerinin rolünü küçümsemekte ve özel piyasa etkinliğini abartmaktadırlar
  - Çevresel faktörleri göz ardı ederler ve sınırsız doğal kaynakların her zaman mevcut olduğunu varsayarlar
  - Tarım arazilerine aşırı değer biçmekte ve endüstriyel gelişimin önemini küçümsemektedirler
explanation: |
  Metin, orijinal arazinin elden çıkarıldığını iddia eden sistemlerdeki iki spesifik olgusal hatayı tanımlamaktadır. Birincisi, bu sistemler yanlış bir şekilde zenginleşmenin otomatik olarak kolay olduğunu varsaymakta, girişimcilerin karşılaştığı sürekli riskleri, yorucu çalışmaları ve zorlukları göz ardı etmektedir. İkincisi, eğer orijinal yağma doğru olsaydı, bu toprak gaspçılarının torunlarını günümüzün en zengin aileleri arasında görmemiz gerekirdi, ancak gerçekler, mevcut mülklerin tarihsel hırsızlıktan değil, meşru çalışma ve gönüllü değer karşılığı değişimlerden kaynaklandığını göstermektedir.
question: Millised on teksti kohaselt kaks peamist faktilist viga süsteemides, mis väidavad, et maa on algselt võõrandatud jõuga?
answer: Nad eeldavad automaatset rikastumist ja ignoreerivad, et praegune rikkus tuleneb seaduslikust tööst ja vabatahtlikust vahetusest
wrong_answers:
  - Nad alahindavad riikliku reguleerimise rolli ja ülehindavad eraturu tõhusust
  - Nad ignoreerivad keskkonnategureid ja eeldavad, et loodusvarad on alati piiramatult kättesaadavad
  - Nad hindavad põllumajandusmaad üle ja alahindavad tööstusliku arengu tähtsust
explanation: |
  Tekstis tuuakse välja kaks konkreetset faktilist viga süsteemides, milles väidetakse, et maa on algselt võõrandatud. Esiteks eeldavad need süsteemid ekslikult, et rikastumine on automaatselt lihtne, jättes tähelepanuta pidevad riskid, kurnava töö ja raskused, millega ettevõtjad silmitsi seisavad. Teiseks, kui algne rüüstamine oleks tõsi, peaksime nägema nende maade röövijate järeltulijaid tänapäeva kõige rikkamate perekondade seas, kuid tegelikkus näitab, et praegune vara on õiguspärase töö ja vabatahtliku väärtuse vastu vahetamise, mitte ajaloolise varguse tulemus.
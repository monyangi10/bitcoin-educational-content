question: Dushingiye ku canditswe, ni ayahe makosa abiri akomeye y’ukuri ari mu mice ivuga ko ubutaka bwa mbere bwanyazwe ku nguvu?
answer: Bafata ko ubutunzi buva ku gutunga kandi ntibitaho yuko ubutunzi buriho ubu buva ku gikorwa gitegekanijwe n’uguhanahana amakuru ku bushake .
wrong_answers:
  - Basuzugura uruhara rw'amategeko ya Leta kandi bagasuzugura cane ubushobozi bw'isoko ry'abikorera ku giti cabo .
  - Birengagiza ibidukikije maze bakiyumvira ko ubutunzi butagira aho bugarukira buhora buriho .
  - Baha agaciro karenze urugero ubutaka bw'uburimyi kandi bagasuzugura akamaro ko guteza imbere inganda .
explanation: |
  Ico canditswe kirerekana amakosa abiri yihariye y’ukuri mu mice ivuga ko ubutaka bwari bwanyazwe mu ntango. Ica mbere, izo nzira zifata nabi ko hariho ukworoha mu gutunga, zikirengagiza ingorane zihoraho, igikorwa kiruhije, n’ingorane abacuruzi bahura na zo. Ubwa kabiri, iyo ubusazi bw’intango buba ari ukuri, twobona abakomotse kuri abo banyavyaha mu miryango itunze cane muri iki gihe, ariko ukuri kwerekana ko imitungo iriho ubu ikomoka ku bikorwa vyemewe n’uguhinduranya agaciro ku bushake, atari ubusuma bwa kera.
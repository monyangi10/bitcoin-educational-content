question: Według tekstu, jakie są dwa główne błędy faktyczne w systemach, które twierdzą, że pierwotna ziemia została spolszczona siłą?
answer: Zakładają automatyczne bogacenie się i ignorują fakt, że obecne bogactwo wynika z legalnej pracy i dobrowolnej wymiany
wrong_answers:
  - Nie doceniają roli regulacji rządowych i przeceniają efektywność rynku prywatnego
  - Ignorują czynniki środowiskowe i zakładają, że nieograniczone zasoby naturalne są zawsze dostępne
  - Przeceniają wartość gruntów rolnych i nie doceniają znaczenia rozwoju przemysłowego
explanation: |
  Tekst identyfikuje dwa konkretne błędy faktyczne w systemach twierdzących, że pierwotna spolaryzacja gruntów. Po pierwsze, systemy te błędnie zakładają automatyczną łatwość wzbogacenia się, ignorując ciągłe ryzyko, wyczerpującą pracę i trudności, z jakimi borykają się przedsiębiorcy. Po drugie, gdyby pierwotne spolszczenie było prawdą, powinniśmy widzieć potomków tych grabieżców ziemi wśród dzisiejszych najbogatszych rodzin, ale rzeczywistość pokazuje, że obecne nieruchomości są wynikiem legalnej pracy i dobrowolnej wymiany wartości za wartość, a nie historycznej kradzieży.
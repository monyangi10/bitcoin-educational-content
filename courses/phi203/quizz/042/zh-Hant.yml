question: 根據文中所述，在聲稱以武力奪取原始土地的系統中，有哪兩個主要的事實錯誤？
answer: 他們假設財富會自動增加，卻忽略了目前的財富是來自合法的工作和自願的交換。
wrong_answers:
  - 他們低估了政府監管的作用，高估了私人市場的效率
  - 他們忽略環境因素，並假設無限的天然資源永遠存在
  - 他們高估了農業用地的價值，低估了工業發展的重要性
explanation: |
  文中指出了聲稱原始土地剝奪制度中的兩個具體事實錯誤。首先，這些制度錯誤地假設了致富的自動便利性，而忽視了企業家所面臨的持續風險、疲累的工作和困難。第二，如果原始掠奪是真的，我們應該看到這些土地掠奪者的後代成為今日最富有的家庭，但現實顯示，目前的財產來自合法的工作和自願的價值交換，而非歷史上的盜竊。
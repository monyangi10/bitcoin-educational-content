question: According to the text, what are the two major factual errors in systems that claim original land spoliation by force?
answer: They assume automatic enrichment and ignore that current wealth results from legitimate work and voluntary exchange
wrong_answers:
  - They underestimate the role of government regulation and overestimate private market efficiency
  - They ignore environmental factors and assume unlimited natural resources are always available
  - They overvalue agricultural land and underestimate the importance of industrial development
explanation: |
  The text identifies two specific factual errors in systems claiming original land spoliation. First, these systems wrongly assume there's automatic ease in enrichment, ignoring the constant risks, exhausting work, and difficulties entrepreneurs face. Second, if original spoliation were true, we should see descendants of these land-grabbers among today's richest families, but reality shows that current properties result from legitimate work and voluntary value-for-value exchanges, not historical theft.

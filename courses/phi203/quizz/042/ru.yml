question: Согласно тексту, каковы две основные фактические ошибки в системах, утверждающих, что первоначальная земля была захвачена силой?
answer: Они предполагают автоматическое обогащение и игнорируют тот факт, что нынешнее богатство является результатом законного труда и добровольного обмена
wrong_answers:
  - Они недооценивают роль государственного регулирования и переоценивают эффективность частного рынка
  - Они игнорируют экологические факторы и предполагают, что неограниченные природные ресурсы всегда доступны
  - Они переоценивают сельскохозяйственные земли и недооценивают значение промышленного развития
explanation: |
  В тексте выявлены две конкретные фактические ошибки в системах, утверждающих о растрате первоначальной земли. Во-первых, эти системы ошибочно предполагают автоматическую легкость обогащения, игнорируя постоянные риски, изнурительную работу и трудности, с которыми сталкиваются предприниматели. Во-вторых, если бы изначальное разграбление было правдой, мы должны были бы видеть потомков этих захватчиков земли среди самых богатых семей современности, но реальность показывает, что нынешняя собственность является результатом законного труда и добровольного обмена стоимости на стоимость, а не исторического воровства.
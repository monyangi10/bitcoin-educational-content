question: بر اساس متن، دو خطای عمده واقعی در سیستم‌هایی که ادعای غارت اولیه زمین با زور را دارند چیست؟
answer: آن‌ها فرض می‌کنند که ثروت به‌طور خودکار افزایش می‌یابد و نادیده می‌گیرند که ثروت کنونی نتیجه کار مشروع و تبادل داوطلبانه است.
wrong_answers:
  - آن‌ها نقش مقررات دولتی را دست‌کم می‌گیرند و کارایی بازار خصوصی را بیش از حد ارزیابی می‌کنند.
  - آن‌ها عوامل محیطی را نادیده می‌گیرند و فرض می‌کنند که منابع طبیعی نامحدود همیشه در دسترس هستند.
  - آن‌ها ارزش زمین‌های کشاورزی را بیش از حد ارزیابی می‌کنند و اهمیت توسعه صنعتی را دست کم می‌گیرند.
explanation: |
  متن دو خطای واقعی خاص را در سیستم‌هایی که ادعای غصب اولیه زمین را دارند، شناسایی می‌کند. اول، این سیستم‌ها به اشتباه فرض می‌کنند که غنی‌سازی به‌طور خودکار آسان است و خطرات مداوم، کار خسته‌کننده و مشکلاتی که کارآفرینان با آن مواجه هستند را نادیده می‌گیرند. دوم، اگر غصب اولیه درست بود، باید نوادگان این زمین‌خواران را در میان ثروتمندترین خانواده‌های امروز می‌دیدیم، اما واقعیت نشان می‌دهد که املاک فعلی نتیجه کار مشروع و مبادلات داوطلبانه ارزش به ارزش است، نه سرقت تاریخی.
question: Según el texto, ¿cuáles son los dos principales errores de hecho de los sistemas que reivindican el expolio de tierras originales por la fuerza?
answer: Suponen un enriquecimiento automático e ignoran que la riqueza actual es fruto del trabajo legítimo y del intercambio voluntario
wrong_answers:
  - Subestiman el papel de la regulación gubernamental y sobrestiman la eficiencia del mercado privado
  - Ignoran los factores medioambientales y asumen que siempre hay disponibles recursos naturales ilimitados
  - Sobrevaloran el suelo agrícola e infravaloran la importancia del desarrollo industrial
explanation: |
  El texto identifica dos errores fácticos específicos en los sistemas que reclaman el expolio de tierras originales. En primer lugar, estos sistemas asumen erróneamente que hay una facilidad automática en el enriquecimiento, ignorando los riesgos constantes, el trabajo agotador y las dificultades a las que se enfrentan los empresarios. En segundo lugar, si el expolio original fuera cierto, deberíamos ver descendientes de estos acaparadores de tierras entre las familias más ricas de la actualidad, pero la realidad demuestra que las propiedades actuales son el resultado de un trabajo legítimo y de intercambios voluntarios de valor por valor, no de un robo histórico.
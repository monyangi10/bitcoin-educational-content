question: Menurut teks tersebut, apa saja dua kesalahan faktual utama dalam sistem yang mengklaim spoliasi tanah asli secara paksa?
answer: Mereka berasumsi bahwa kekayaan otomatis akan bertambah dan mengabaikan bahwa kekayaan saat ini merupakan hasil dari pekerjaan yang sah dan pertukaran sukarela
wrong_answers:
  - Mereka meremehkan peran regulasi pemerintah dan menilai efisiensi pasar swasta secara berlebihan
  - Mereka mengabaikan faktor lingkungan dan menganggap sumber daya alam yang tidak terbatas selalu tersedia
  - Mereka menilai terlalu tinggi lahan pertanian dan meremehkan pentingnya pembangunan industri
explanation: |
  Teks ini mengidentifikasi dua kesalahan faktual yang spesifik dalam sistem yang mengklaim spoliasi tanah asli. Pertama, sistem-sistem ini secara keliru mengasumsikan adanya kemudahan otomatis dalam memperkaya diri, mengabaikan risiko yang terus menerus ada, pekerjaan yang melelahkan, dan kesulitan yang dihadapi para pengusaha. Kedua, jika spoliasi asli itu benar, kita seharusnya melihat keturunan para perampas tanah ini di antara keluarga-keluarga terkaya saat ini, tetapi kenyataan menunjukkan bahwa properti yang ada saat ini merupakan hasil dari pekerjaan yang sah dan pertukaran nilai-untuk-nilai secara sukarela, bukan pencurian historis.
question: Welches sind dem Text zufolge die beiden größten sachlichen Fehler in Systemen, die eine ursprüngliche Landenteignung durch Gewalt behaupten?
answer: Sie gehen von einer automatischen Bereicherung aus und ignorieren, dass der gegenwärtige Wohlstand das Ergebnis von legitimer Arbeit und freiwilligem Austausch ist
wrong_answers:
  - Sie unterschätzen die Rolle der staatlichen Regulierung und überschätzen die Effizienz des privaten Marktes
  - Sie ignorieren Umweltfaktoren und gehen davon aus, dass die natürlichen Ressourcen immer unbegrenzt zur Verfügung stehen
  - Sie überbewerten landwirtschaftliche Flächen und unterschätzen die Bedeutung der industriellen Entwicklung
explanation: |
  Der Text zeigt zwei spezifische sachliche Fehler in Systemen auf, die eine Enteignung von Grund und Boden behaupten. Erstens gehen diese Systeme fälschlicherweise davon aus, dass die Bereicherung automatisch leicht ist, und ignorieren dabei die ständigen Risiken, die anstrengende Arbeit und die Schwierigkeiten, denen sich die Unternehmer gegenübersehen. Zweitens: Wäre die ursprüngliche Enteignung wahr, müssten die Nachfahren dieser Landräuber zu den reichsten Familien von heute gehören. Die Realität zeigt jedoch, dass der heutige Besitz das Ergebnis legitimer Arbeit und eines freiwilligen Tauschs von Wert gegen Wert ist, nicht von historischem Diebstahl.
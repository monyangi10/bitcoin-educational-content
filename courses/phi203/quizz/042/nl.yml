question: Wat zijn volgens de tekst de twee grootste feitelijke fouten in systemen die beweren dat het land oorspronkelijk met geweld is onteigend?
answer: Ze gaan uit van automatische verrijking en negeren dat huidige rijkdom het resultaat is van legitiem werk en vrijwillige ruil
wrong_answers:
  - Ze onderschatten de rol van overheidsregulering en overschatten de efficiëntie van de particuliere markt
  - Ze negeren milieufactoren en gaan ervan uit dat er altijd onbeperkte natuurlijke bronnen beschikbaar zijn
  - Ze overwaarderen landbouwgrond en onderschatten het belang van industriële ontwikkeling
explanation: |
  De tekst identificeert twee specifieke feitelijke fouten in systemen die oorspronkelijke landonteigening claimen. Ten eerste gaan deze systemen er ten onrechte van uit dat verrijking automatisch gemakkelijk is en gaan ze voorbij aan de constante risico's, het uitputtende werk en de moeilijkheden waarmee ondernemers te maken hebben. Ten tweede, als oorspronkelijke landroof waar zou zijn, zouden we afstammelingen van deze landrovers moeten zien onder de rijkste families van vandaag, maar de realiteit toont aan dat de huidige eigendommen het resultaat zijn van legitiem werk en vrijwillige ruil van waarde voor waarde, geen historische diefstal.
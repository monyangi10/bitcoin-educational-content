question: Enligt texten, vilka är de två största faktafel i system som hävdar att ursprunglig mark skövlades med våld?
answer: De förutsätter automatisk berikning och bortser från att nuvarande välstånd är resultatet av lagligt arbete och frivilligt utbyte
wrong_answers:
  - De underskattar den statliga regleringens roll och överskattar den privata marknadens effektivitet
  - De bortser från miljöfaktorer och antar att det alltid finns obegränsade naturresurser
  - De övervärderar jordbruksmark och underskattar betydelsen av industriell utveckling
explanation: |
  Texten identifierar två specifika faktafel i system som hävdar att ursprunglig mark förstörs. För det första antar dessa system felaktigt att det finns en automatisk lätthet i berikning, och ignorerar de ständiga risker, utmattande arbete och svårigheter som entreprenörer står inför. För det andra, om ursprunglig spoliation var sann, borde vi se ättlingar till dessa landgrabbers bland dagens rikaste familjer, men verkligheten visar att nuvarande egendomar är resultatet av legitimt arbete och frivilliga värde-för-värde-utbyten, inte historisk stöld.
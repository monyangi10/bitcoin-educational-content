question: D'après le texte, quelles sont les deux principales erreurs factuelles des systèmes qui revendiquent la spoliation des terres originelles par la force ?
answer: Ils supposent un enrichissement automatique et ignorent que la richesse actuelle provient d'un travail et d'un échange légitimes
wrong_answers:
  - Ils sous-estiment le rôle de la réglementation gouvernementale et surestiment l'efficacité du marché privé
  - Ils ignorent les facteurs environnementaux et supposent que des ressources naturelles illimitées sont toujours disponibles
  - Ils surévaluent les terres agricoles et sous-estiment l'importance du développement industriel
explanation: |
  Le texte identifie deux erreurs factuelles spécifiques dans les systèmes qui prétendent à la spoliation des terres d'origine. Premièrement, ces systèmes supposent à tort que l'enrichissement est automatiquement facile, ignorant les risques constants, le travail épuisant et les difficultés auxquels les entrepreneurs sont confrontés. Deuxièmement, si la spoliation originelle était vraie, nous devrions voir des descendants de ces accapareurs de terres parmi les familles les plus riches d'aujourd'hui, mais la réalité montre que les propriétés actuelles résultent d'un travail légitime et d'échanges volontaires de valeur, et non d'un vol historique.
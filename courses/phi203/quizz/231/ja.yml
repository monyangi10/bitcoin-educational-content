question: 人間のニーズ、能力、状況の多様性は、自由主義経済理論に従った中央集権的な経済計画にどのような根本的な課題をもたらすのか？
answer: 中央集権的な方向性は、既知の生産パターンを再現することしかできず、個々の能力や市場の要求の多様で変化する性質に適応することはできない。
wrong_answers:
  - 中央集権的な計画は、能力の異なる個人間の過度の競争を生み、社会的対立と経済的非効率をもたらす。
  - 多様な人間の能力には、標準化されたトレーニング・プログラムが必要であり、異なる経済部門にまたがって効果的に提供できるのは、中央集権的な当局だけである。
  - 中央プランナーには、すべての個人の嗜好をモニターする十分なデータ収集能力がないため、代わりに市場調査に頼らざるを得ない。
explanation: |
  この文章では、人間の完全性と進歩には仕事の自由が必要であり、中央集権的な指揮は本質的に既存のパターンを超えて革新することができないからだと論じている。人間のニーズ、能力、状況の変化の多様性は、個人の自由だけが提供できる柔軟性を要求する。中央集権的なプランニングが失敗するのは、競争の問題やトレーニングの必要性、データの問題ではなく、根本的に既知の生産方式を超越して新しい解決策を生み出すことができないからである。
question: Millise põhimõttelise väljakutse esitab inimeste vajaduste, võimete ja asjaolude mitmekesisus liberaalse majandusteooria kohaselt tsentraliseeritud majandusplaneerimisele?
answer: Tsentraliseeritud juhtimine suudab ainult teadaolevaid tootmismudeleid reprodutseerida ega suuda kohaneda individuaalsete võimete ja turunõudluse mitmekesise ja muutuva iseloomuga
wrong_answers:
  - Tsentraliseeritud planeerimine tekitab liiga suurt konkurentsi erinevate oskustega inimeste vahel, mis viib sotsiaalsete konfliktide ja majandusliku ebaefektiivsuse tekkimiseni
  - Erinevad inimvõimekused nõuavad standardiseeritud koolitusprogramme, mida ainult tsentraliseeritud asutused suudavad tõhusalt pakkuda erinevates majandussektorites
  - Keskplaneerijatel puuduvad piisavad andmekogumisvõimalused, et jälgida kõiki individuaalseid eelistusi, ja nad peavad selle asemel toetuma turu-uuringutele
explanation: |
  Tekstis väidetakse, et inimese täiuslikkus ja progress nõuavad töövabadust, sest tsentraliseeritud juhtimine ei suuda olemuslikult olemasolevatest mustritest kaugemale uuendusi teha. Inimeste vajaduste, võimete ja muutuvate asjaolude mitmekesisus nõuab paindlikkust, mida saab pakkuda ainult individuaalne vabadus. Tsentraliseeritud planeerimine ei ebaõnnestu mitte konkurentsiprobleemide, koolitusnõuete või andmeprobleemide tõttu, vaid seetõttu, et see ei suuda põhimõtteliselt ületada teadaolevaid tootmisskeeme, et luua uusi lahendusi.
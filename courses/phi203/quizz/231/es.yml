question: ¿Qué reto fundamental plantea la diversidad de necesidades, capacidades y circunstancias humanas a la planificación económica centralizada según la teoría económica liberal?
answer: La dirección centralizada sólo puede reproducir patrones de producción conocidos y no puede adaptarse a la naturaleza diversa y cambiante de las capacidades individuales y las demandas del mercado
wrong_answers:
  - La planificación centralizada crea demasiada competencia entre individuos con distintas capacidades, lo que provoca conflictos sociales e ineficacia económica
  - La diversidad de capacidades humanas requiere programas de formación estandarizados que sólo las autoridades centralizadas pueden impartir eficazmente en los distintos sectores económicos
  - Los planificadores centrales carecen de capacidad de recopilación de datos suficiente para controlar todas las preferencias individuales, por lo que deben recurrir a estudios de mercado
explanation: |
  El texto argumenta que la perfectibilidad y el progreso humanos exigen libertad de trabajo porque la dirección centralizada no puede intrínsecamente innovar más allá de los patrones existentes. La diversidad de necesidades humanas, capacidades y circunstancias cambiantes exige la flexibilidad que sólo la libertad individual puede proporcionar. La planificación centralizada fracasa no por cuestiones de competencia, requisitos de formación o problemas de datos, sino porque fundamentalmente no puede trascender los esquemas de producción conocidos para crear nuevas soluciones.
question: Tantangan mendasar apa yang ditimbulkan oleh keragaman kebutuhan, kemampuan, dan keadaan manusia terhadap perencanaan ekonomi terpusat menurut teori ekonomi liberal?
answer: Arahan terpusat hanya dapat mereproduksi pola produksi yang sudah diketahui dan tidak dapat beradaptasi dengan sifat kemampuan individu dan permintaan pasar yang beragam dan terus berubah
wrong_answers:
  - Perencanaan yang terpusat menciptakan terlalu banyak persaingan antara individu dengan keterampilan yang berbeda, yang mengarah pada konflik sosial dan inefisiensi ekonomi
  - Kemampuan manusia yang beragam membutuhkan program pelatihan standar yang hanya dapat disediakan oleh otoritas terpusat secara efektif di berbagai sektor ekonomi
  - Perencana pusat tidak memiliki kemampuan pengumpulan data yang memadai untuk memantau semua preferensi individu dan harus bergantung pada survei pasar sebagai gantinya
explanation: |
  Teks ini berargumen bahwa kesempurnaan dan kemajuan manusia membutuhkan kebebasan untuk bekerja karena pengarahan yang terpusat pada dasarnya tidak dapat berinovasi di luar pola yang sudah ada. Keragaman kebutuhan manusia, kemampuan, dan keadaan yang terus berubah menuntut fleksibilitas yang hanya dapat diberikan oleh kebebasan individu. Perencanaan terpusat gagal bukan karena masalah persaingan, persyaratan pelatihan, atau masalah data, tetapi karena pada dasarnya tidak dapat melampaui skema produksi yang telah diketahui untuk menciptakan solusi baru.
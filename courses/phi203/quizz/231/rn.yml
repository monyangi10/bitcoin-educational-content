question: Ni ingorane iyihe y’ishimikiro ubudasa bw’ivyo umuntu akeneye, ubushobozi afise n’ivyo abayemwo bitera ku bijanye n’igenamigambi ry’ubutunzi ry’abantu bose hakurikijwe inyigisho y’ubutunzi bw’ubwigenge?
answer: Uburongozi bushingiye hagati bushobora gusa gusubiramwo uburyo buzwi bwo guhingura kandi ntibushobora guhura n'uburyo butandukanye kandi buhinduka bw'ubushobozi bw'umuntu ku giti ciwe n'ivyo isoko risaba .
wrong_answers:
  - Igenamigambi ry’ibintu bimwe bimwe rituma haba uguhiganwa kwinshi cane hagati y’abantu bafise ubuhinga butandukanye, bikaba bituma haba amakimbirane mu kibano no kutagira akamaro mu vy’ubutunzi .
  - Ubushobozi butandukanye bw'abantu busaba porogarama zihuye z'amahugurwa zishobora gutangwa n'ubutegetsi bushingiye ku rwego rwo hejuru gusa mu nzego zitandukanye z'ubutunzi .
  - Abategura imigambi yo hagati ntibagira ubushobozi buhagije bwo gukusanya amakuru kugira ngo bakurikirane ivyo umuntu wese akunda vyose kandi bategerezwa kwizigira ubushakashatsi bw’isoko aho kwizigira .
explanation: |
  Ico canditswe kivuga ko ugutungana kw’umuntu n’ugutera imbere bisaba umwidegemvyo wo gukora kubera ko uburongozi bushizwe hamwe mu buryo busanzwe butashobora guhindura ibintu birenze ivyitegererezo biriho. Ubutandukane bw’ivyo umuntu akeneye, ubushobozi afise be n’ibintu bihinduka bisaba ko umuntu ashobora guhindura uko abona ibintu, ivyo bikaba ari vyo umwidegemvyo w’umuntu ku giti ciwe gusa ushobora gutanga. Itegeko ry’ubuhinga ry’imbere mu gihugu ntirishobora kubera ibibazo vy’amarushanwa, ibisabwa mu mahugurwa, canke ingorane z’amakuru, ahubwo ni kubera ko mu vy’ukuri ridashobora kurenga imigambi y’ubuhinga izwi kugira ngo ribone inyishu nshasha.
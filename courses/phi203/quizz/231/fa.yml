question: طبق نظریه اقتصادی لیبرال، تنوع نیازها، توانایی‌ها و شرایط انسانی چالش اساسی‌ای را برای برنامه‌ریزی اقتصادی متمرکز ایجاد می‌کند.
answer: جهت‌گیری متمرکز تنها می‌تواند الگوهای تولید شناخته‌شده را بازتولید کند و نمی‌تواند با ماهیت متنوع و در حال تغییر قابلیت‌های فردی و تقاضاهای بازار سازگار شود.
wrong_answers:
  - برنامه‌ریزی متمرکز رقابت زیادی بین افراد با مهارت‌های مختلف ایجاد می‌کند که منجر به تضاد اجتماعی و ناکارآمدی اقتصادی می‌شود.
  - توانایی‌های متنوع انسانی نیازمند برنامه‌های آموزشی استانداردی هستند که تنها مقامات مرکزی می‌توانند به طور مؤثر در بخش‌های مختلف اقتصادی ارائه دهند.
  - برنامه‌ریزان مرکزی فاقد توانایی‌های کافی برای جمع‌آوری داده‌ها به منظور نظارت بر تمامی ترجیحات فردی هستند و باید به جای آن به نظرسنجی‌های بازار تکیه کنند.
explanation: |
  متن استدلال می‌کند که کمال‌پذیری و پیشرفت انسانی نیازمند آزادی کار است زیرا هدایت متمرکز ذاتاً نمی‌تواند فراتر از الگوهای موجود نوآوری کند. تنوع نیازها، توانایی‌ها و شرایط متغیر انسانی، انعطاف‌پذیری‌ای را می‌طلبد که تنها آزادی فردی می‌تواند فراهم کند. برنامه‌ریزی متمرکز به دلیل مسائل رقابتی، نیازهای آموزشی یا مشکلات داده‌ای شکست نمی‌خورد، بلکه به این دلیل که اساساً نمی‌تواند از طرح‌های تولید شناخته شده فراتر رود تا راه‌حل‌های جدید ایجاد کند.
question: 인간의 욕구, 능력, 환경의 다양성이 자유주의 경제 이론에 따른 중앙집권적 경제 계획에 어떤 근본적인 도전을 제기하는가?
answer: 중앙 집중식 방향은 알려진 생산 패턴을 재현할 뿐이며 개별 역량과 시장 수요의 다양하고 변화하는 특성에 적응할 수 없습니다
wrong_answers:
  - 중앙 집중식 계획은 서로 다른 기술을 가진 개인 간에 지나친 경쟁을 유발하여 사회적 갈등과 경제적 비효율을 초래합니다
  - 다양한 인적 능력에는 다양한 경제 부문에서 효과적으로 제공할 수 있는 표준화된 교육 프로그램이 필요하며, 이는 중앙 집중화된 당국만이 제공할 수 있습니다
  - 중앙 기획자는 모든 개인 선호도를 모니터링할 수 있는 충분한 데이터 수집 기능이 부족하여 시장 조사에 의존해야 합니다
explanation: |
  이 책은 인간의 완전성과 발전을 위해서는 중앙집권적인 지시로는 기존의 패턴을 뛰어넘는 혁신이 불가능하기 때문에 업무의 자유가 필요하다고 주장합니다. 인간의 욕구, 능력, 변화하는 환경의 다양성은 개인의 자유만이 제공할 수 있는 유연성을 요구합니다. 중앙집중식 계획이 실패하는 이유는 경쟁 문제, 교육 요건, 데이터 문제 때문이 아니라 근본적으로 알려진 생산 방식을 초월하여 새로운 솔루션을 창출할 수 없기 때문입니다.
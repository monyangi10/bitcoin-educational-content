question: Jakou zásadní výzvu představuje rozmanitost lidských potřeb, schopností a okolností pro centralizované ekonomické plánování podle liberální ekonomické teorie?
answer: Centralizované řízení může pouze reprodukovat známé vzorce výroby a nemůže se přizpůsobit různorodé a měnící se povaze individuálních schopností a požadavků trhu
wrong_answers:
  - Centralizované plánování vytváří příliš velkou konkurenci mezi jednotlivci s různými schopnostmi, což vede k sociálním konfliktům a ekonomické neefektivitě
  - Různorodé lidské schopnosti vyžadují standardizované vzdělávací programy, které mohou účinně poskytovat pouze centralizované orgány v různých hospodářských odvětvích
  - Centrální plánovači nemají dostatečné možnosti sběru dat pro sledování všech individuálních preferencí a musí se spoléhat na průzkumy trhu
explanation: |
  Text tvrdí, že lidská dokonalost a pokrok vyžadují svobodu práce, protože centralizované řízení ze své podstaty nemůže inovovat nad rámec existujících vzorů. Rozmanitost lidských potřeb, schopností a měnících se okolností vyžaduje flexibilitu, kterou může poskytnout pouze individuální svoboda. Centralizované plánování selhává nikoliv kvůli problémům s konkurencí, požadavkům na školení nebo problémům s daty, ale proto, že ze své podstaty nedokáže překročit známá výrobní schémata a vytvořit nová řešení.
question: Jakie fundamentalne wyzwanie stanowi różnorodność ludzkich potrzeb, zdolności i okoliczności dla scentralizowanego planowania gospodarczego zgodnie z liberalną teorią ekonomiczną?
answer: Scentralizowane kierowanie może jedynie powielać znane wzorce produkcji i nie może dostosować się do zróżnicowanego i zmieniającego się charakteru indywidualnych możliwości i wymagań rynku
wrong_answers:
  - Scentralizowane planowanie tworzy zbyt dużą konkurencję między osobami o różnych umiejętnościach, prowadząc do konfliktów społecznych i nieefektywności ekonomicznej
  - Zróżnicowane umiejętności ludzkie wymagają standardowych programów szkoleniowych, które tylko scentralizowane władze mogą skutecznie zapewnić w różnych sektorach gospodarki
  - Centralni planiści nie mają wystarczających możliwości gromadzenia danych, aby monitorować wszystkie indywidualne preferencje i zamiast tego muszą polegać na badaniach rynkowych
explanation: |
  Tekst argumentuje, że ludzka doskonałość i postęp wymagają wolności pracy, ponieważ scentralizowane kierownictwo z natury nie może wprowadzać innowacji wykraczających poza istniejące wzorce. Różnorodność ludzkich potrzeb, zdolności i zmieniających się okoliczności wymaga elastyczności, którą może zapewnić jedynie wolność jednostki. Scentralizowane planowanie zawodzi nie ze względu na kwestie konkurencji, wymagania szkoleniowe czy problemy z danymi, ale dlatego, że zasadniczo nie jest w stanie wykraczać poza znane schematy produkcji w celu tworzenia nowych rozwiązań.
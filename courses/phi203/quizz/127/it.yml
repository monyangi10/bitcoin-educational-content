question: Secondo il pensiero liberale, quale cambiamento fondamentale ha trasformato le relazioni umane da competizione violenta a cooperazione pacifica?
answer: Il passaggio dall'appropriazione delle risorse naturali esistenti alla produzione di nuovi beni e servizi
wrong_answers:
  - L'istituzione di forti forze militari in grado di imporre la pace tra gruppi in competizione tra loro
  - Lo sviluppo di sistemi religiosi e morali che scoraggiano la violenza e promuovono la cooperazione
  - La creazione di istituzioni governative in grado di ridistribuire equamente le risorse tra tutti i cittadini
explanation: |
  Il testo spiega che all'inizio della storia dell'umanità, le persone competevano violentemente per le limitate risorse naturali che nessuno produceva: frutta, pesce e altri beni naturali. La trasformazione fondamentale è avvenuta quando gli uomini hanno iniziato a produrre nuove ricchezze attraverso attività come l'agricoltura, creando campi di grano come fonti di nuove ricchezze. Questa produzione di nuove utilità ha permesso scambi volontari che hanno arricchito entrambe le parti, sostituendo la competizione a somma zero per le risorse esistenti con una cooperazione a somma positiva. Le altre opzioni si concentrano sui meccanismi di applicazione esterni piuttosto che sulla trasformazione economica sottostante che ha reso la cooperazione naturalmente vantaggiosa per tutte le parti coinvolte.
question: Enligt liberalt tänkande, vilken grundläggande förändring omvandlade mänskliga relationer från våldsam konkurrens till fredligt samarbete?
answer: Övergången från att tillägna sig befintliga naturresurser till att producera nya varor och tjänster
wrong_answers:
  - Upprättandet av starka militära styrkor som kunde genomdriva fred mellan konkurrerande grupper
  - Utvecklingen av religiösa och moraliska system som avskräckte från våld och främjade samarbete
  - Skapandet av statliga institutioner som kunde omfördela resurser rättvist mellan alla medborgare
explanation: |
  Texten förklarar att i människans tidiga historia tävlade människor våldsamt om begränsade naturresurser som ingen hade producerat - frukt, fisk och andra naturtillgångar. Den grundläggande förändringen skedde när människorna började producera nya tillgångar genom aktiviteter som jordbruk, vilket skapade vetefält som källor till nya rikedomar. Denna produktion av nya nyttigheter möjliggjorde frivilliga utbyten som berikade båda parter och ersatte nollsummespelet om befintliga resurser med ett positivt samarbete. De andra alternativen fokuserar på externa verkställighetsmekanismer snarare än på den underliggande ekonomiska omvandling som gjorde att samarbete blev naturligt fördelaktigt för alla inblandade parter.
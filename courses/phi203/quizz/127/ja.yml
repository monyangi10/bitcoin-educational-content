question: 自由主義思想によれば、人間関係を暴力的な競争から平和的な協力へと変えた根本的な変化とは何か？
answer: 既存の天然資源の流用から、新しい商品や公益事業の生産へのシフト
wrong_answers:
  - 競合するグループ間の平和を強制できる強力な軍事力の確立
  - 暴力を抑制し、協力を促進する宗教的・道徳的システムの発展。
  - すべての国民に公平に資源を再配分できる政府機関の創設
explanation: |
  本文では、人類史の初期において、人々は果実や魚などの限られた天然資源を激しく奪い合い、誰も生産しなかったと説明されている。根本的な変化が起こったのは、人類が農業などの活動を通じて新たな富を生産するようになり、新たな富の源泉となる麦畑を作り出したときである。このような新しいユーティリティの生産によって、既存の資源をめぐるゼロサム競争からポジティブサム協力へと、双方が豊かになる自発的な交換が可能になったのである。他の選択肢は、協力がすべての当事者にとって自然に有益なものとなった根本的な経済的変革ではなく、外部からの強制メカニズムに焦点を当てている。
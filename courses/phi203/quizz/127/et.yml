question: Milline fundamentaalne muutus muutis liberaalse mõtteviisi kohaselt inimsuhteid vägivaldsest konkurentsist rahumeelseks koostööks?
answer: Üleminek olemasolevate loodusvarade omastamiselt uute kaupade ja kommunaalteenuste tootmisele
wrong_answers:
  - Tugevate sõjaliste jõudude loomine, mis suudaks tagada rahu konkureerivate rühmade vahel
  - Religioossete ja moraalisüsteemide areng, mis heidutasid vägivalda ja edendasid koostööd
  - Selliste valitsusasutuste loomine, mis suudaksid ressursse õiglaselt kõigi kodanike vahel ümber jaotada
explanation: |
  Tekstis selgitatakse, et inimkonna varases ajaloos konkureerisid inimesed vägivaldselt piiratud loodusressursside pärast, mida keegi ei tootnud - puuviljade, kala ja muude looduslike kaupade pärast. Põhimõtteline muutus toimus siis, kui inimesed hakkasid tootma uut rikkust selliste tegevuste kaudu nagu põllumajandus, luues nisupõllud kui uue rikkuse allikad. See uute hüvede tootmine võimaldas vabatahtlikku vahetust, mis rikastas mõlemat osapoolt, asendades nullsummalise konkurentsi olemasolevate ressursside pärast positiivsummalise koostööga. Teised võimalused keskenduvad pigem välistele jõustamismehhanismidele kui aluseks olevale majanduslikule ümberkujundamisele, mis muutis koostöö kõigile asjaosalistele loomulikult kasulikuks.
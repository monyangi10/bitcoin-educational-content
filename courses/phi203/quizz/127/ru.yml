question: Согласно либеральной мысли, какое фундаментальное изменение превратило человеческие отношения из жестокой конкуренции в мирное сотрудничество?
answer: Переход от присвоения существующих природных ресурсов к производству новых товаров и услуг
wrong_answers:
  - Создание сильных вооруженных сил, способных обеспечить мир между соперничающими группами
  - Развитие религиозных и моральных систем, которые препятствовали насилию и способствовали сотрудничеству
  - Создание государственных институтов, которые могли бы справедливо перераспределять ресурсы между всеми гражданами
explanation: |
  В тексте объясняется, что на заре человеческой истории люди жестоко конкурировали за ограниченные природные ресурсы, которые никто не производил, - фрукты, рыбу и другие природные блага. Фундаментальная трансформация произошла, когда люди начали производить новые блага с помощью таких видов деятельности, как сельское хозяйство, создавая пшеничные поля как источники новых богатств. Это производство новых благ позволило осуществлять добровольный обмен, который обогатил обе стороны, заменив конкуренцию за существующие ресурсы с нулевой суммой на сотрудничество с положительной суммой. Другие варианты сосредоточены на внешних механизмах принуждения, а не на основополагающих экономических преобразованиях, которые сделали сотрудничество естественно выгодным для всех участвующих сторон.
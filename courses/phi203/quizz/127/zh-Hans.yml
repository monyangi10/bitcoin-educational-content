question: 根据自由主义思想，是什么根本性变革将人类关系从暴力竞争转变为和平合作？
answer: 从占有现有自然资源到生产新的商品和公用事业的转变
wrong_answers:
  - 建立强大的军事力量，在相互竞争的群体之间实现和平
  - 发展宗教和道德体系，阻止暴力，促进合作
  - 建立政府机构，在全体公民中公平地重新分配资源
explanation: |
  课文解释说，在人类早期的历史中，人们为了争夺有限的自然资源（水果、鱼类和其他天然物品）而展开激烈的竞争。当人类开始通过农业等活动生产新财富，创造出麦田作为新财富的来源时，发生了根本性的转变。生产出的新产品使得自愿交换成为可能，双方都从中获益，以正和合作取代了对现有资源的零和竞争。其他方案的重点在于外部执行机制，而不是使合作自然而然地惠及所有相关方的基本经济转型。
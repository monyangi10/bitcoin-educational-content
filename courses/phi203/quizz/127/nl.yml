question: Welke fundamentele verandering veranderde volgens het liberale gedachtegoed de menselijke relaties van gewelddadige concurrentie naar vreedzame samenwerking?
answer: De verschuiving van het toe-eigenen van bestaande natuurlijke hulpbronnen naar het produceren van nieuwe goederen en voorzieningen
wrong_answers:
  - De oprichting van sterke militaire strijdkrachten die vrede konden afdwingen tussen rivaliserende groepen
  - De ontwikkeling van religieuze en morele systemen die geweld ontmoedigen en samenwerking bevorderen
  - De oprichting van overheidsinstellingen die middelen eerlijk kunnen verdelen onder alle burgers
explanation: |
  De tekst legt uit dat in de vroege menselijke geschiedenis mensen gewelddadig concurreerden om beperkte natuurlijke hulpbronnen die niemand had geproduceerd - fruit, vis en andere natuurlijke goederen. De fundamentele verandering vond plaats toen mensen nieuwe rijkdommen begonnen te produceren door activiteiten zoals landbouw, waarbij graanvelden werden gecreëerd als bronnen van nieuwe rijkdommen. Deze productie van nieuwe rijkdommen maakte vrijwillige uitwisselingen mogelijk die beide partijen verrijkten, waardoor de nulsomconcurrentie voor bestaande rijkdommen werd vervangen door samenwerking met een positieve som. De andere opties richten zich op externe handhavingsmechanismen in plaats van op de onderliggende economische transformatie die samenwerking van nature gunstig maakte voor alle betrokken partijen.
question: Według myśli liberalnej, jaka fundamentalna zmiana przekształciła relacje międzyludzkie z brutalnej rywalizacji w pokojową współpracę?
answer: Przejście od wykorzystywania istniejących zasobów naturalnych do produkcji nowych dóbr i usług użyteczności publicznej
wrong_answers:
  - Ustanowienie silnych sił wojskowych, które mogłyby wymusić pokój między rywalizującymi grupami
  - Rozwój systemów religijnych i moralnych, które zniechęcały do przemocy i promowały współpracę
  - Stworzenie instytucji rządowych, które mogłyby sprawiedliwie redystrybuować zasoby wśród wszystkich obywateli
explanation: |
  Tekst wyjaśnia, że we wczesnej historii ludzkości ludzie brutalnie rywalizowali o ograniczone zasoby naturalne, których nikt nie produkował - owoce, ryby i inne dobra naturalne. Zasadnicza transformacja nastąpiła, gdy ludzie zaczęli wytwarzać nowe bogactwa poprzez działania takie jak rolnictwo, tworząc pola pszenicy jako źródła nowych bogactw. Produkcja nowych dóbr umożliwiła dobrowolną wymianę, która wzbogaciła obie strony, zastępując konkurencję o sumie zerowej o istniejące zasoby współpracą o sumie dodatniej. Pozostałe opcje koncentrują się na zewnętrznych mechanizmach egzekwowania prawa, a nie na podstawowej transformacji gospodarczej, która sprawiła, że współpraca stała się naturalnie korzystna dla wszystkich zaangażowanych stron.
question: Liberaalin ajattelun mukaan mikä perustavanlaatuinen muutos muutti ihmissuhteet väkivaltaisesta kilpailusta rauhanomaiseksi yhteistyöksi?
answer: Siirtyminen olemassa olevien luonnonvarojen käyttämisestä uusien tavaroiden ja hyödykkeiden tuottamiseen
wrong_answers:
  - Vahvojen sotilaallisten voimien perustaminen, jotka pystyivät valvomaan rauhaa kilpailevien ryhmien välillä
  - Sellaisten uskonnollisten ja moraalisten järjestelmien kehittäminen, jotka estävät väkivallan ja edistävät yhteistyötä
  - Sellaisten hallintoelinten luominen, jotka voisivat jakaa resurssit oikeudenmukaisesti uudelleen kaikkien kansalaisten kesken
explanation: |
  Tekstissä kerrotaan, että ihmiskunnan varhaishistoriassa ihmiset kilpailivat väkivaltaisesti rajallisista luonnonvaroista, joita kukaan ei ollut tuottanut - hedelmistä, kaloista ja muista luonnonvaroista. Perustavanlaatuinen muutos tapahtui, kun ihmiset alkoivat tuottaa uutta vaurautta maatalouden kaltaisten toimintojen avulla ja loivat vehnäpeltoja uusien rikkauksien lähteiksi. Tämä uusien hyödykkeiden tuottaminen mahdollisti vapaaehtoisen vaihdon, joka rikastutti molempia osapuolia ja korvasi nollasummakilpailun olemassa olevista resursseista positiivisen summan yhteistyöllä. Muissa vaihtoehdoissa keskitytään ulkoisiin täytäntöönpanomekanismeihin eikä niinkään taustalla olevaan taloudelliseen muutokseen, joka teki yhteistyöstä luonnostaan hyödyllistä kaikille osapuolille.
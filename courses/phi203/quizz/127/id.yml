question: Menurut pemikiran liberal, perubahan mendasar apa yang mengubah hubungan manusia dari persaingan yang penuh kekerasan menjadi kerja sama yang damai?
answer: Pergeseran dari pemanfaatan sumber daya alam yang ada menjadi produksi barang dan utilitas baru
wrong_answers:
  - Pembentukan kekuatan militer yang kuat yang dapat menegakkan perdamaian di antara kelompok-kelompok yang bersaing
  - Perkembangan sistem agama dan moral yang mencegah kekerasan dan mendorong kerja sama
  - Pembentukan lembaga-lembaga pemerintah yang dapat mendistribusikan sumber daya secara adil kepada semua warga negara
explanation: |
  Teks tersebut menjelaskan bahwa pada awal sejarah manusia, manusia bersaing dengan keras untuk memperebutkan sumber daya alam yang terbatas dan belum pernah diproduksi oleh siapa pun, seperti buah-buahan, ikan, dan kekayaan alam lainnya. Transformasi mendasar terjadi ketika manusia mulai memproduksi kekayaan baru melalui kegiatan seperti pertanian, menciptakan ladang gandum sebagai sumber kekayaan baru. Produksi utilitas baru ini memungkinkan pertukaran sukarela yang memperkaya kedua belah pihak, menggantikan kompetisi zero-sum untuk sumber daya yang ada dengan kerja sama positive-sum. Pilihan lainnya berfokus pada mekanisme penegakan hukum eksternal daripada transformasi ekonomi yang mendasari yang membuat kerja sama secara alami bermanfaat bagi semua pihak yang terlibat.
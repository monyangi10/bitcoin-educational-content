question: Theo tư tưởng tự do, sự thay đổi cơ bản nào đã biến đổi các mối quan hệ giữa con người từ cạnh tranh bạo lực sang hợp tác hòa bình?
answer: Sự chuyển đổi từ việc khai thác các nguồn tài nguyên thiên nhiên hiện có sang sản xuất hàng hóa và tiện ích mới.
wrong_answers:
  - Việc thành lập các lực lượng quân sự hùng mạnh có thể duy trì hòa bình giữa các nhóm đối địch.
  - Sự phát triển của các hệ thống tôn giáo và đạo đức nhằm ngăn chặn bạo lực và thúc đẩy sự hợp tác.
  - Việc thành lập các thể chế chính phủ có thể phân phối lại nguồn lực một cách công bằng cho tất cả công dân.
explanation: |
  Văn bản giải thích rằng trong lịch sử sơ khai của loài người, con người đã cạnh tranh khốc liệt để giành giật các nguồn tài nguyên thiên nhiên hạn chế mà không ai sản xuất ra - trái cây, cá và các sản vật tự nhiên khác. Sự chuyển đổi cơ bản xảy ra khi con người bắt đầu tạo ra của cải mới thông qua các hoạt động như nông nghiệp, tạo ra những cánh đồng lúa mì như nguồn gốc của sự giàu có mới. Việc sản xuất ra các tiện ích mới này đã tạo điều kiện cho các cuộc trao đổi tự nguyện làm giàu cho cả hai bên, thay thế sự cạnh tranh "được ăn cả, mất tất cả" để giành giật các nguồn tài nguyên hiện có bằng sự hợp tác "được ăn cả, mất tất cả". Các lựa chọn khác tập trung vào các cơ chế cưỡng chế bên ngoài hơn là sự chuyển đổi kinh tế cơ bản đã khiến sự hợp tác trở nên có lợi một cách tự nhiên cho tất cả các bên liên quan.
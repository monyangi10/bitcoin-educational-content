question: Según el pensamiento liberal, ¿qué cambio fundamental transformó las relaciones humanas de la competencia violenta a la cooperación pacífica?
answer: El paso de la apropiación de los recursos naturales existentes a la producción de nuevos bienes y servicios
wrong_answers:
  - La creación de fuerzas militares fuertes que pudieran imponer la paz entre grupos enfrentados
  - El desarrollo de sistemas religiosos y morales que desalientan la violencia y promueven la cooperación
  - La creación de instituciones gubernamentales capaces de redistribuir los recursos de forma equitativa entre todos los ciudadanos
explanation: |
  El texto explica que en los primeros tiempos de la historia de la humanidad, las personas competían violentamente por unos recursos naturales limitados que nadie había producido: frutas, pescado y otros bienes naturales. La transformación fundamental se produjo cuando los humanos empezaron a producir nuevas riquezas mediante actividades como la agricultura, creando campos de trigo como fuentes de nuevas riquezas. Esta producción de nuevas utilidades permitió intercambios voluntarios que enriquecieron a ambas partes, sustituyendo la competencia de suma cero por los recursos existentes por una cooperación de suma positiva. Las otras opciones se centran en mecanismos externos de imposición en lugar de en la transformación económica subyacente que hizo que la cooperación fuera naturalmente beneficiosa para todas las partes implicadas.
question: ¿Cuál es, según el texto, la principal justificación para establecer profesiones reguladas y monopolios profesionales?
answer: Principio de precaución que trata de evitar posibles abusos estableciendo una supervisión preventiva en lugar de castigar las infracciones reales
wrong_answers:
  - Necesidad de garantizar los niveles de calidad y competencia profesional mediante requisitos rigurosos de formación y certificación
  - Aumento de la eficiencia económica gracias a la eliminación de la competencia inútil y a la coordinación de la producción mediante una planificación centralizada
  - Protección del bienestar de los consumidores garantizando servicios normalizados y evitando fallos del mercado en sectores esenciales
explanation: |
  El texto afirma explícitamente que las regulaciones y monopolios profesionales se establecen "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (en nombre de un principio de precaución, de un sistema preventivo más que represivo). Esto crea un "régimen de tutela" sobre profesiones enteras con el pretexto de que algunos individuos podrían cometer abusos. Las otras opciones, aunque superficialmente son justificaciones plausibles para la regulación, no se mencionan en el texto como el verdadero razonamiento que subyace a estas restricciones de la libertad de trabajo.
question: Co je v textu označeno jako hlavní důvod pro zřízení regulovaných povolání a profesních monopolů?
answer: Zásada předběžné opatrnosti, jejímž cílem je předcházet potenciálnímu zneužití zavedením preventivního dohledu spíše než trestáním skutečných porušení
wrong_answers:
  - Potřeba zajistit standardy kvality a odbornou způsobilost prostřednictvím přísných požadavků na školení a certifikaci
  - Zvýšení ekonomické efektivity dosažené odstraněním neekonomické konkurence a koordinací výroby prostřednictvím centralizovaného plánování
  - Ochrana blahobytu spotřebitelů zaručením standardizovaných služeb a předcházením selhání trhu v základních odvětvích
explanation: |
  V textu se výslovně uvádí, že profesní předpisy a monopoly se zavádějí "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (ve jménu zásady předběžné opatrnosti, spíše preventivního než represivního systému). Vytváří se tak "régime de tutelle" (opatrovnický režim) nad celými profesemi pod záminkou, že by se někteří jedinci mohli dopustit zneužití. Ostatní možnosti, ačkoli jsou na první pohled věrohodným odůvodněním regulace, nejsou v textu zmíněny jako skutečné důvody těchto omezení svobody práce.
question: What does the text identify as the primary justification for establishing regulated professions and professional monopolies?
answer: A precautionary principle that seeks to prevent potential abuses by establishing preventive oversight rather than punishing actual violations
wrong_answers:
  - The need to ensure quality standards and professional competence through rigorous training and certification requirements
  - Economic efficiency gains achieved by eliminating wasteful competition and coordinating production through centralized planning
  - The protection of consumer welfare by guaranteeing standardized services and preventing market failures in essential sectors
explanation: |
  The text explicitly states that professional regulations and monopolies are established 'au nom d'un principe de précaution, d'un système préventif plutôt que répressif' (in the name of a precautionary principle, of a preventive rather than repressive system). This creates a 'régime de tutelle' (guardianship regime) over entire professions under the pretext that some individuals might commit abuses. The other options, while superficially plausible justifications for regulation, are not mentioned in the text as the actual reasoning behind these restrictions on freedom of work.
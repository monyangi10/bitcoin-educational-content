question: Vad identifierar texten som det främsta skälet till att inrätta reglerade yrken och yrkesmonopol?
answer: En försiktighetsprincip som syftar till att förhindra potentiella övergrepp genom att upprätta förebyggande tillsyn snarare än att bestraffa faktiska överträdelser
wrong_answers:
  - Behovet av att säkerställa kvalitetsstandarder och yrkeskompetens genom rigorösa utbildnings- och certifieringskrav
  - Ekonomiska effektivitetsvinster uppnås genom att eliminera slösaktig konkurrens och samordna produktionen genom centraliserad planering
  - Skydd av konsumenternas välfärd genom att garantera standardiserade tjänster och förhindra marknadsmisslyckanden inom viktiga sektorer
explanation: |
  I texten anges uttryckligen att yrkesregleringar och monopol inrättas "i namn av en försiktighetsprincip, av ett förebyggande snarare än ett repressivt system". Detta skapar en "régime de tutelle" (förmyndarordning) över hela yrken under förevändning att vissa individer skulle kunna begå övergrepp. De andra alternativen, även om de på ytan är rimliga motiveringar för reglering, nämns inte i texten som det faktiska skälet bakom dessa begränsningar av arbetsfriheten.
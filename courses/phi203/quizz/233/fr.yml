question: Quelle est, selon le texte, la principale justification de l'établissement de professions réglementées et de monopoles professionnels ?
answer: Principe de précaution qui vise à prévenir les abus potentiels en établissant un contrôle préventif plutôt qu'en punissant les violations effectives
wrong_answers:
  - La nécessité de garantir des normes de qualité et des compétences professionnelles par le biais d'exigences rigoureuses en matière de formation et de certification
  - Gains d'efficacité économique obtenus en éliminant la concurrence inutile et en coordonnant la production par le biais d'une planification centralisée
  - La protection du bien-être des consommateurs en garantissant des services standardisés et en prévenant les défaillances du marché dans des secteurs essentiels
explanation: |
  Le texte indique explicitement que les réglementations et les monopoles professionnels sont établis "au nom d'un principe de précaution, d'un système préventif plutôt que répressif". Cela crée un "régime de tutelle" sur des professions entières sous prétexte que certains individus pourraient commettre des abus. Les autres options, bien que superficiellement plausibles pour justifier la réglementation, ne sont pas mentionnées dans le texte comme étant la véritable raison de ces restrictions à la liberté de travail.
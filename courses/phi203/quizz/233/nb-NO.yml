question: Hva er ifølge teksten den viktigste begrunnelsen for å etablere lovregulerte yrker og yrkesmonopoler?
answer: Et føre-var-prinsipp som søker å forhindre potensielle overgrep ved å etablere forebyggende tilsyn i stedet for å straffe faktiske brudd
wrong_answers:
  - Behovet for å sikre kvalitetsstandarder og faglig kompetanse gjennom strenge krav til opplæring og sertifisering
  - Økonomisk effektivitetsgevinst ved å eliminere konkurranse som sløseri og koordinere produksjonen gjennom sentralisert planlegging
  - Beskyttelse av forbrukernes velferd ved å garantere standardiserte tjenester og forhindre markedssvikt i viktige sektorer
explanation: |
  Teksten sier eksplisitt at yrkesreguleringer og monopoler etableres "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (i navnet til et føre-var-prinsipp, et forebyggende snarere enn et repressivt system). Dette skaper et "régime de tutelle" (formynderregime) over hele yrkesgrupper under påskudd av at noen enkeltpersoner kan begå overgrep. De andre alternativene, selv om de på overflaten kan være plausible begrunnelser for regulering, nevnes ikke i teksten som den faktiske begrunnelsen for disse begrensningene i arbeidsfriheten.
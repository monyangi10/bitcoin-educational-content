question: 文中指出建立受管制专业和专业垄断的主要理由是什么？
answer: 预防原则，旨在通过建立预防性监督而非惩罚实际违规行为来防止潜在的滥用权力行为
wrong_answers:
  - 需要通过严格的培训和认证要求来确保质量标准和专业能力
  - 通过集中规划消除浪费性竞争和协调生产，提高经济效率
  - 通过保障标准化服务和防止重要部门的市场失灵来保护消费者福利
explanation: |
  该文本明确指出，专业法规和垄断是 "以预防原则、预防制度而非压制制度的名义 "制定的。这种做法以某些人可能会滥用职权为借口，对整个行业实行 "监护制度"（régime de tutelle）。其他方案虽然表面上看似合理，但文中并未提及这些限制工作自由的实际理由。
question: ข้อความระบุว่าอะไรเป็นเหตุผลหลักในการจัดตั้งวิชาชีพที่มีการควบคุมและการผูกขาดทางวิชาชีพ?
answer: หลักการป้องกันที่มุ่งป้องกันการละเมิดที่อาจเกิดขึ้นโดยการจัดตั้งการกำกับดูแลเชิงป้องกันแทนที่จะลงโทษการละเมิดที่เกิดขึ้นจริง
wrong_answers:
  - ความจำเป็นในการรับรองมาตรฐานคุณภาพและความสามารถทางวิชาชีพผ่านการฝึกอบรมและข้อกำหนดการรับรองที่เข้มงวด
  - ประสิทธิภาพทางเศรษฐกิจที่ได้รับจากการกำจัดการแข่งขันที่สิ้นเปลืองและการประสานงานการผลิตผ่านการวางแผนแบบรวมศูนย์
  - การคุ้มครองสวัสดิการผู้บริโภคโดยการรับประกันบริการที่ได้มาตรฐานและป้องกันความล้มเหลวของตลาดในภาคส่วนที่จำเป็น
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่ากฎระเบียบวิชาชีพและการผูกขาดถูกจัดตั้งขึ้น 'au nom d'un principe de précaution, d'un système préventif plutôt que répressif' (ในนามของหลักการป้องกัน, ระบบป้องกันมากกว่าการปราบปราม) สิ่งนี้สร้าง 'régime de tutelle' (ระบอบการปกครองแบบผู้ปกครอง) เหนือวิชาชีพทั้งหมดภายใต้ข้ออ้างว่าบุคคลบางคนอาจกระทำการละเมิด ตัวเลือกอื่น ๆ แม้ว่าจะดูเหมือนเป็นเหตุผลที่สมเหตุสมผลสำหรับการควบคุม แต่ไม่ได้ถูกกล่าวถึงในข้อความว่าเป็นเหตุผลที่แท้จริงเบื้องหลังข้อจำกัดเหล่านี้ในเสรีภาพในการทำงาน
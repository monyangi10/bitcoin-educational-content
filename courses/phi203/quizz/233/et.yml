question: Mida nimetab tekst reguleeritud kutsealade ja kutsemonopolide loomise peamiseks põhjenduseks?
answer: Ettevaatuspõhimõte, mille eesmärk on ennetada võimalikke kuritarvitusi, kehtestades pigem ennetava järelevalve kui karistades tegelikke rikkumisi
wrong_answers:
  - Vajadus tagada kvaliteedistandardid ja kutsealane pädevus rangete koolitus- ja sertifitseerimisnõuete kaudu
  - Majandusliku tõhususe kasv, mis saavutatakse raiskava konkurentsi kõrvaldamise ja tootmise koordineerimise teel tsentraliseeritud planeerimise kaudu
  - Tarbijate heaolu kaitse standardiseeritud teenuste tagamise ja turutõrgete vältimise kaudu olulistes sektorites
explanation: |
  Tekstis märgitakse selgesõnaliselt, et kutsealased eeskirjad ja monopolid kehtestatakse "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (ettevaatuspõhimõtte, pigem ennetava kui repressiivse süsteemi nimel). Sellega luuakse "régime de tutelle" (eestkoste režiim) tervete kutsealade üle ettekäändel, et mõned isikud võivad toime panna kuritarvitusi. Teised võimalused on küll pealiskaudselt usutavad põhjendused, kuid neid ei ole tekstis mainitud kui töövabaduse piirangute tegelikku põhjendust.
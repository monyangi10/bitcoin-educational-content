question: Was wird in dem Text als Hauptbegründung für die Einführung von reglementierten Berufen und Berufsmonopolen genannt?
answer: Ein Vorsorgeprinzip, das darauf abzielt, potenziellen Missbrauch zu verhindern, indem es eine präventive Aufsicht einrichtet, anstatt tatsächliche Verstöße zu bestrafen
wrong_answers:
  - Die Notwendigkeit, Qualitätsstandards und fachliche Kompetenz durch strenge Ausbildungs- und Zertifizierungsanforderungen zu gewährleisten
  - Wirtschaftliche Effizienzgewinne durch Beseitigung von verschwenderischem Wettbewerb und Koordinierung der Produktion durch zentrale Planung
  - Schutz des Verbraucherwohls durch Gewährleistung standardisierter Dienstleistungen und Verhinderung von Marktversagen in wichtigen Sektoren
explanation: |
  In dem Text heißt es ausdrücklich, dass Berufsordnungen und -monopole "im Namen eines Vorsorgeprinzips, eines präventiven und nicht repressiven Systems" eingeführt werden. Damit wird ein "Vormundschaftsregime" über ganze Berufsgruppen geschaffen, unter dem Vorwand, dass einige Personen Missbrauch begehen könnten. Die anderen Optionen sind zwar oberflächlich betrachtet plausible Rechtfertigungen für die Regulierung, werden aber im Text nicht als tatsächliche Begründung für diese Einschränkungen der Arbeitsfreiheit genannt.
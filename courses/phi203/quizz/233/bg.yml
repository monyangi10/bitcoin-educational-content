question: Кое е основното основание за създаването на регулирани професии и професионални монополи, посочено в текста?
answer: Принцип на предпазливост, който има за цел да предотврати потенциални злоупотреби чрез въвеждане на превантивен надзор, а не чрез наказване на действителни нарушения
wrong_answers:
  - Необходимостта да се гарантират стандарти за качество и професионална компетентност чрез строги изисквания за обучение и сертифициране
  - Икономическа ефективност, постигната чрез премахване на разточителната конкуренция и координиране на производството чрез централизирано планиране
  - Защита на благосъстоянието на потребителите чрез гарантиране на стандартизирани услуги и предотвратяване на пазарните недостатъци в основни сектори
explanation: |
  В текста изрично се посочва, че професионалните разпоредби и монополите се установяват "au nom d'un principe de précaution, d'un système préventif plutôt que répressif" (в името на принципа на предпазливостта, на превантивна, а не на репресивна система). Така се създава "режим на попечителство" (régime de tutelle) над цели професии под претекст, че някои лица могат да извършат злоупотреби. Другите варианти, макар и да изглеждат правдоподобни основания за регулиране, не се споменават в текста като действителна причина за тези ограничения на свободата на труда.
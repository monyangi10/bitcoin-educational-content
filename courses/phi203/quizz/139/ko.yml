question: 역사적 분석에 따르면, 공산주의가 대체로 실패한 반면 현대에 사회주의가 지속된 이유는 무엇일까요?
answer: 사회주의는 부분적인 개인 자율성을 허용하는 온건한 접근 방식인 반면, 공산주의의 전면적 통제는 고대 사회로 돌아가는 너무 갑작스러운 접근 방식입니다
wrong_answers:
  - 사회주의는 시장 메커니즘을 통해 더 나은 경제적 결과를 제공하는 반면, 공산주의는 모든 형태의 경제적 효율성을 완전히 제거합니다
  - 사회주의는 민주적 제도와 시민의 자유를 유지하는 반면, 공산주의는 모든 형태의 정치 참여와 대표를 폐지합니다
  - 사회주의는 기술 진보와 혁신에 적응하는 반면, 공산주의는 모든 형태의 과학 및 산업 발전을 거부합니다
explanation: |
  이 텍스트는 사회주의가 '반공주의적'으로 기능하는 '온건한 형태의 비자유'로서 개인의 선택권을 일부 유지하면서 국가의 통제를 확대하기 때문에 지속되고 있다고 설명합니다. 공산주의는 '과거 사회로의 너무 갑작스러운 회귀'로서 지적 노동과 자유의 실천을 통해 발전해온 현대 개인의 자치 능력을 완전히 파괴했기 때문에 실패했습니다. 다른 옵션은 분석에서 제시된 주요 이유가 아닌 경제적 효율성, 민주적 제도 또는 기술적 요인에 잘못 초점을 맞추고 있습니다.
question: According to the text's historical analysis, what is the fundamental tendency that history reveals about the evolution of authority and social organisation?
answer: A gradual replacement of authority by contract, which makes socialist and interventionist solutions backward-looking rather than progressive
wrong_answers:
  - A steady expansion of democratic governance that progressively transfers authority from individuals to collective institutions
  - A recurring cycle between centralised power and decentralised freedom, with no clear directional trend over time
  - A continuous growth of state capacity driven by technological progress that makes collective organisation ever more efficient
explanation: |
  The text states that history shows a "remarkable tendency for authority to be replaced by contract," and draws the explicit consequence that socialist and interventionist solutions are in fact backward-looking. Ancient societies operated under extreme hazards and constant danger, using modes of production based on violence and collective appropriation rather than value creation. Communism appears as the most regressive form of this tendency, taking human organisation back to the time of tribes on a national and international scale. Progress, on this reading, means more contract and less authority — not the reverse.

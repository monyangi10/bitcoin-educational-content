question: Iciyumviro c’uguhingura giserukira iki mu vy’ukuri hakurikijwe inyigisho y’ubutunzi bw’ubwigenge?
answer: Guhingura ubuhinga bushasha canke igikorwa kigirira akamaro abandi canke umuntu ubwiwe .
wrong_answers:
  - Guhindura ibikoresho bitagira agaciro bikaba ibicuruzwa bimaze
  - Ukwirundanira ubutunzi biciye mu kuba nyir'itunga ry'umwimbu
  - Gutunganya abakozi kugira ngo umusaruro ukore neza
explanation: |
  Uguhingura mu vyiyumviro vy’ubutunzi bw’ubwigenge ni ahanini uguhingura ubuhinga bushasha canke gutanga ibikorwa, atari uguhindura gusa ivy’umubiri. Ico canditswe gishimika ku vy’uko abantu badashobora kurema canke gusenyura ibintu (ingingo ngenderwako ya Lavoisier), rero guhingura bisobanura kwongera agaciro biciye mu gikorwa. Nk’akarorero, umucuruzi ararema akamaro mu gutuma ibintu bishikira abaguzi mu buryo butunganijwe. Iyi nsobanuro yagutse irimwo ivy’ubwenge n’ivy’ubuhinga, nk’inyigisho canke ibikorwa vy’ubuvuzi, bituma habaho akamaro karamba naho ‘igicuruzwa’ cavyo kitaboneka ku mubiri. Ayandi mahitamwo yibanda ku migenderanire y’umubiri, ukwirundanira ubutunzi, canke ubushobozi bwo gutunganya ibintu, akabura iciyumviro nyamukuru co kurema inyungu.
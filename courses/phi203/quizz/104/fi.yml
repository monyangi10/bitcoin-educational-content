question: Mitä tuotannon käsite pohjimmiltaan edustaa liberaalin talousteorian mukaan?
answer: Uuden hyödyn tai palvelun luominen, josta on hyötyä muille tai itselle
wrong_answers:
  - Raaka-aineiden fyysinen muuntaminen valmiiksi tuotteiksi
  - Varallisuuden kartuttaminen tuotantovälineiden omistuksen kautta
  - Työn organisointi tuotannon tehokkuuden maksimoimiseksi
explanation: |
  Liberaalin talousteorian mukaan tuotannossa on pohjimmiltaan kyse uuden hyödyn luomisesta tai palvelun tarjoamisesta, ei pelkästään fyysisestä muuntamisesta. Tekstissä korostetaan, että ihminen ei voi luoda tai tuhota ainetta (Lavoisierin periaate), joten tuotanto on lisäarvon tuottamista palvelun avulla. Esimerkiksi kauppias luo hyötyjä saattamalla tavarat kuluttajien saataville järjestäytyneellä tavalla. Tähän laajempaan määritelmään sisältyy henkinen ja aineeton tuotanto, kuten opetus- tai lääkäripalvelut, jotka luovat pysyvää hyötyä, vaikka niiden "tuote" ei ole fyysisesti konkreettinen. Muissa vaihtoehdoissa keskitytään fyysisiin prosesseihin, varallisuuden kartuttamiseen tai organisatoriseen tehokkuuteen, jolloin hyötyjen luomisen ydinkäsite puuttuu.
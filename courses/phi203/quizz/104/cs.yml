question: Co podle liberální ekonomické teorie v zásadě představuje pojem produkce?
answer: Vytvoření nového užitku nebo služby, která přináší užitek ostatním nebo vám samotným
wrong_answers:
  - Fyzická přeměna surovin na hotové výrobky
  - Akumulace bohatství prostřednictvím vlastnictví výrobních aktiv
  - Organizace práce s cílem maximalizovat efektivitu výroby
explanation: |
  Výroba v liberální ekonomické teorii je v zásadě o vytváření nového užitku nebo poskytování služeb, nikoli pouze o fyzické přeměně. Text zdůrazňuje, že lidé nemohou vytvářet ani ničit hmotu (Lavoisierův princip), takže výroba znamená přidávání hodnoty prostřednictvím služeb. Například obchodník vytváří užitek tím, že organizovaně zpřístupňuje zboží spotřebitelům. Tato širší definice zahrnuje i intelektuální a nehmotnou produkci, jako je výuka nebo lékařské služby, které vytvářejí trvalý užitek, i když jejich "produkt" není fyzicky hmatatelný. Ostatní možnosti se zaměřují na fyzické procesy, akumulaci bohatství nebo organizační efektivitu a postrádají základní koncept tvorby užitku.
question: According to the text, why did Enlightenment thinkers like Turgot and Condorcet conceive of far more ambitious institutions of liberty than any previous era?
answer: Because new material conditions had changed, making freedom increasingly imposed by circumstances and its practical utility increasingly visible
wrong_answers:
  - Because the spread of literacy and classical education had given the population direct access to ancient philosophical arguments for liberty
  - Because strong monarchies had weakened sufficiently to allow philosophers to express ideas that had always existed but could not previously be stated
  - Because the discovery of new continents had shown that alternative social arrangements were possible, inspiring European intellectuals to rethink their institutions
explanation: |
  The text describes the Enlightenment as the emergence of new ideas that found their application precisely because material conditions had changed. The Physiocrats, Turgot, and Condorcet anticipated ever-increasing human progress not as an abstract philosophical exercise but because freedom was increasingly imposed by new circumstances: the birth of world trade, the observation that free competition in agricultural commodities was now practical, and the growing sense that the human species was perfectible. Their ambitions were grounded in the new facts of their world, not merely in classical learning, weakened monarchies, or the discovery of other peoples.

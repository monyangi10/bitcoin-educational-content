question: Selon la théorie économique libérale, quelle est la principale raison pour laquelle les femmes et les enfants bénéficient particulièrement du développement capitaliste par rapport aux sociétés anciennes ?
answer: Le travail devient de plus en plus mécanisé et intellectuel, ce qui réduit l'avantage de la force physique et exige une éducation plutôt qu'un travail immédiat
wrong_answers:
  - Les sociétés capitalistes créent des protections juridiques spécifiques pour les femmes et les enfants que les sociétés anciennes n'avaient pas
  - L'accumulation de capital permet aux riches propriétaires d'offrir de meilleures conditions de travail par obligation morale
  - La concurrence du marché oblige les employeurs à offrir des salaires plus élevés aux femmes et aux enfants pour attirer une main-d'œuvre rare
explanation: |
  Paul Leroy-Beaulieu a soutenu que l'évolution vers le travail mécanisé et intellectuel a fondamentalement changé la valeur économique des différents types de travail. Dans les sociétés anciennes, la force physique était primordiale, ce qui désavantageait les femmes et valorisait immédiatement le travail des enfants. Avec le développement du capitalisme, le travail est devenu moins dépendant de la force physique et davantage des compétences et de l'intellect, ce qui a permis aux femmes d'être plus compétitives et a donné plus de valeur à l'éducation qu'au travail immédiat des enfants. C'est ce changement structurel, plutôt que des protections juridiques ou des obligations morales, qui a créé les conditions économiques qui ont amélioré leur statut.
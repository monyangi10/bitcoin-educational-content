question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni imvo nyamukuru iyihe ituma canecane abagore n’abana bungukirwa n’iterambere ry’abanyagihugu ugereranyije n’imibano ya kera?
answer: Akazi kararushiriza kuba ak’ubuhinga n’ubwenge, bikagabanya akamaro k’inkomezi z’umubiri kandi bisaba inyigisho kuruta gukora vuba .
wrong_answers:
  - Ibihugu vy'abanyagihugu birarema uburinzi bwihariye bw'amategeko ku bagore n'abana ivyo amashirahamwe ya kera yabura .
  - Ukwirundanira umutungo bituma ba nyen’ubutunzi bashobora gutanga uburyo bwiza bwo gukora kubera ko bafise inshingano yo mu vy’inyifato runtu .
  - Amahiganwa yo mw’isoko atuma abakoresha baha abagore n’abana umushahara munini kugira ngo bakwegere abakozi bake .
explanation: |
  Paul Leroy-Beaulieu yavuze yuko ugutera imbere kw’ibikorwa vy’amashini n’ivy’ubwenge vyahinduye cane agaciro k’ubutunzi k’ubwoko butandukanye bw’ibikorwa. Mu mibano ya kera, inkomezi z’umubiri ni zo zari zihambaye cane, zikaba zatuma abagore bagira ingorane kandi zigatuma abana bakora ibikorwa vy’ubuhinga bica bigira agaciro ubwo nyene. Uko ubu kapitalizimu bwagenda buratera imbere, akazi karacitse akagabanywa cane n’inguvu z’umubiri, ahubwo karabandanya cane ubuhinga n’ubwenge, ivyo bikaba vyatumye abagore bashobora guhiganwa neza kandi bituma uburezi bugira agaciro kuruta gukoresha abana vuba. Iryo hinduka ry’imiterere, aho kubakingira n’amategeko canke inshingano zo mu vy’inyifato runtu, ni ryo ryatumye haba ivy’ubutunzi vyatumye bagira ikibanza ciza.
question: Was ist nach der liberalen Wirtschaftstheorie der Hauptgrund dafür, dass Frauen und Kinder im Vergleich zu alten Gesellschaften besonders von der kapitalistischen Entwicklung profitieren?
answer: Die Arbeit wird zunehmend mechanisiert und intellektuell, was den Vorteil der körperlichen Kraft verringert und eine Ausbildung anstelle von unmittelbarer Arbeit erfordert
wrong_answers:
  - In kapitalistischen Gesellschaften gibt es einen besonderen rechtlichen Schutz für Frauen und Kinder, den es in alten Gesellschaften nicht gab
  - Die Anhäufung von Kapital ermöglicht es wohlhabenden Eigentümern, aus moralischer Verpflichtung heraus bessere Arbeitsbedingungen zu schaffen
  - Der Wettbewerb auf dem Markt zwingt die Arbeitgeber, Frauen und Kindern höhere Löhne anzubieten, um knappe Arbeitskräfte anzuziehen
explanation: |
  Paul Leroy-Beaulieu argumentierte, dass die Entwicklung hin zu mechanisierter und intellektueller Arbeit den wirtschaftlichen Wert der verschiedenen Arten von Arbeit grundlegend verändert hat. In den alten Gesellschaften stand die körperliche Kraft im Vordergrund, was Frauen benachteiligte und Kinderarbeit sofort wertvoll machte. Mit der Entwicklung des Kapitalismus wurde die Arbeit weniger von körperlicher Kraft und mehr von Fähigkeiten und Intellekt abhängig, wodurch Frauen effektiver konkurrieren konnten und Bildung wertvoller wurde als unmittelbare Kinderarbeit. Dieser Strukturwandel und nicht etwa gesetzliche Schutzmaßnahmen oder moralische Verpflichtungen schufen die wirtschaftlichen Bedingungen, die ihren Status verbesserten.
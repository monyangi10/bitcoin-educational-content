question: According to liberal economic theory, what is the primary reason why women and children particularly benefit from capitalist development compared to ancient societies?
answer: Work becomes increasingly mechanized and intellectual, reducing the advantage of physical strength and requiring education over immediate labor
wrong_answers:
  - Capitalist societies create specific legal protections for women and children that ancient societies lacked
  - The accumulation of capital allows wealthy owners to provide better working conditions out of moral obligation
  - Market competition forces employers to offer higher wages to women and children to attract scarce labor
explanation: |
  Paul Leroy-Beaulieu argued that the evolution toward mechanized and intellectual work fundamentally changed the economic value of different types of labor. In ancient societies, physical strength was paramount, disadvantaging women and making child labor immediately valuable. As capitalism developed, work became less dependent on physical force and more on skills and intellect, allowing women to compete more effectively and making education more valuable than immediate child labor. This structural change, rather than legal protections or moral obligations, created the economic conditions that improved their status.
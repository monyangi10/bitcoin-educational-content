question: Согласно либеральной экономической теории, какова основная причина того, что женщины и дети особенно выигрывают от капиталистического развития по сравнению с древними обществами?
answer: Работа становится все более механизированной и интеллектуальной, уменьшая преимущество физической силы и требуя образования вместо непосредственного труда
wrong_answers:
  - В капиталистических обществах для женщин и детей предусмотрены особые меры правовой защиты, которых не было в древних обществах
  - Накопление капитала позволяет богатым владельцам обеспечивать лучшие условия труда из моральных соображений
  - Рыночная конкуренция заставляет работодателей предлагать более высокую зарплату женщинам и детям, чтобы привлечь дефицитную рабочую силу
explanation: |
  Поль Леруа-Болье утверждал, что эволюция к механизированному и интеллектуальному труду коренным образом изменила экономическую ценность различных видов труда. В древних обществах физическая сила имела первостепенное значение, что ставило женщин в невыгодное положение и делало детский труд сразу же ценным. С развитием капитализма труд стал меньше зависеть от физической силы и больше от навыков и интеллекта, что позволило женщинам более эффективно конкурировать и сделало образование более ценным, чем немедленный детский труд. Именно эти структурные изменения, а не юридическая защита или моральные обязательства, создали экономические условия, которые улучшили их положение.
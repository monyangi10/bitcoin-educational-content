question: Jaký je podle liberální ekonomické teorie hlavní důvod, proč z kapitalistického rozvoje ve srovnání se starověkými společnostmi těží zejména ženy a děti?
answer: Práce se stále více mechanizuje a intelektualizuje, což snižuje výhodu fyzické síly a vyžaduje vzdělání nad okamžitou prací
wrong_answers:
  - Kapitalistické společnosti vytvářejí specifickou právní ochranu žen a dětí, která ve starověkých společnostech chyběla
  - Akumulace kapitálu umožňuje bohatým vlastníkům zajistit lepší pracovní podmínky z morální povinnosti
  - Konkurence na trhu nutí zaměstnavatele nabízet vyšší mzdy ženám a dětem, aby přilákali nedostatkovou pracovní sílu
explanation: |
  Paul Leroy-Beaulieu tvrdil, že vývoj směrem k mechanizované a duševní práci zásadně změnil ekonomickou hodnotu různých druhů práce. Ve starověkých společnostech byla prvořadá fyzická síla, což znevýhodňovalo ženy a bezprostředně zhodnocovalo dětskou práci. S rozvojem kapitalismu se práce stala méně závislou na fyzické síle a více na dovednostech a intelektu, což umožnilo ženám účinněji konkurovat a vzdělání se stalo cennější než okamžitá dětská práce. Tato strukturální změna spíše než právní ochrana nebo morální závazky vytvořila ekonomické podmínky, které zlepšily jejich postavení.
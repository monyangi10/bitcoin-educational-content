question: Theo lý thuyết kinh tế tự do, lý do chính khiến phụ nữ và trẻ em đặc biệt được hưởng lợi từ sự phát triển của chủ nghĩa tư bản so với các xã hội cổ đại là gì?
answer: Công việc ngày càng được cơ giới hóa và đòi hỏi trí tuệ cao hơn, làm giảm lợi thế của sức mạnh thể chất và thay vào đó là lao động chân tay.
wrong_answers:
  - Các xã hội tư bản tạo ra những sự bảo vệ pháp lý cụ thể cho phụ nữ và trẻ em mà các xã hội cổ đại không có.
  - Việc tích lũy vốn cho phép các chủ sở hữu giàu có cung cấp điều kiện làm việc tốt hơn xuất phát từ nghĩa vụ đạo đức.
  - Cạnh tranh thị trường buộc các nhà tuyển dụng phải trả lương cao hơn cho phụ nữ và trẻ em để thu hút nguồn lao động khan hiếm.
explanation: |
  Paul Leroy-Beaulieu lập luận rằng sự tiến hóa hướng tới lao động cơ giới hóa và trí tuệ đã làm thay đổi căn bản giá trị kinh tế của các loại lao động khác nhau. Trong các xã hội cổ đại, sức mạnh thể chất là tối quan trọng, gây bất lợi cho phụ nữ và khiến lao động trẻ em có giá trị ngay lập tức. Khi chủ nghĩa tư bản phát triển, công việc ít phụ thuộc vào sức mạnh thể chất hơn và phụ thuộc nhiều hơn vào kỹ năng và trí tuệ, cho phép phụ nữ cạnh tranh hiệu quả hơn và khiến giáo dục có giá trị hơn so với lao động trẻ em ngay lập tức. Sự thay đổi cấu trúc này, chứ không phải các biện pháp bảo vệ pháp lý hay nghĩa vụ đạo đức, đã tạo ra các điều kiện kinh tế giúp cải thiện địa vị của họ.
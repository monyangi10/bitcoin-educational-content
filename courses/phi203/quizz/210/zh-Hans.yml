question: 根据自由主义经济理论，与古代社会相比，妇女和儿童尤其受益于资本主义发展的主要原因是什么？
answer: 工作日益机械化和智能化，削弱了体力的优势，需要教育而非直接劳动
wrong_answers:
  - 资本主义社会为妇女和儿童提供了古代社会所缺乏的特殊法律保护
  - 资本的积累使富裕的业主能够出于道德义务提供更好的工作条件
  - 市场竞争迫使雇主为妇女和儿童提供更高的工资，以吸引稀缺的劳动力
explanation: |
  保罗-勒鲁瓦-博略（Paul Leroy-Beaulieu）认为，机械化和脑力劳动的发展从根本上改变了不同类型劳动的经济价值。在古代社会，体力是最重要的，这使妇女处于不利地位，并使童工立即变得有价值。随着资本主义的发展，工作变得不再依赖体力，而更多地依赖技能和智力，这使得妇女能够更有效地参与竞争，也使得教育比直接的童工更有价值。这种结构性变化，而不是法律保护或道德义务，创造了提高妇女地位的经济条件。
question: 자유주의 경제 이론에 따르면, 고대 사회에 비해 여성과 어린이가 자본주의 발전의 혜택을 특히 많이 받는 주된 이유는 무엇인가요?
answer: 노동은 점점 더 기계화되고 지능화되어 체력의 이점이 줄어들고 즉각적인 노동보다 교육이 필요합니다
wrong_answers:
  - 자본주의 사회는 고대 사회에는 없던 여성과 아동을 위한 구체적인 법적 보호 장치를 마련합니다
  - 자본의 축적은 부유한 소유주들이 도덕적 의무감으로 더 나은 노동 조건을 제공할 수 있게 해줍니다
  - 시장 경쟁으로 인해 고용주는 부족한 노동력을 유치하기 위해 여성과 아동에게 더 높은 임금을 제공해야 합니다
explanation: |
  폴 르로이-보리유는 기계화되고 지적인 노동으로의 진화가 다양한 유형의 노동의 경제적 가치를 근본적으로 변화시켰다고 주장했습니다. 고대 사회에서는 체력이 가장 중요했기 때문에 여성에게 불이익을 주었고 아동 노동의 가치가 즉시 높아졌습니다. 자본주의가 발전하면서 노동은 육체적 힘에 덜 의존하고 기술과 지성에 더 의존하게 되었고, 여성은 더 효과적으로 경쟁할 수 있게 되었으며 즉각적인 아동 노동보다 교육이 더 가치가 있게 되었습니다. 법적 보호나 도덕적 의무보다는 이러한 구조적 변화가 여성들의 지위를 향상시키는 경제적 여건을 조성했습니다.
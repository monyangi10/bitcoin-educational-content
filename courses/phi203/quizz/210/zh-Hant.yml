question: 根據自由經濟理論，與古代社會相比，婦女和兒童特別受益於資本主義發展的主要原因是什麼？
answer: 工作變得越來越機械化和知識化，減少了體力的優勢，需要教育而非直接的勞動
wrong_answers:
  - 資本主義社會為婦女和兒童創造了古代社會所缺乏的特定法律保護
  - 資本的累積讓富有的業主基於道德義務提供更好的工作條件
  - 市場競爭迫使雇主為婦女和兒童提供較高的工資，以吸引稀缺的勞動力
explanation: |
  Paul Leroy-Beaulieu認為，朝向機械化和智慧型工作的演進，從根本上改變了不同類型勞動的經濟價值。在古代社會，體力是最重要的，這使得女性處於不利地位，也讓童工立即變得有價值。隨著資本主義的發展，工作變得不那麼依賴體力，而更依賴技能和智力，讓婦女能更有效地競爭，也讓教育比直接的童工更有價值。這種結構性的改變，而非法律保護或道德義務，創造了改善婦女地位的經濟條件。
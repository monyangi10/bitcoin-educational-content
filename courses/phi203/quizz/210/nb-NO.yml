question: Hva er ifølge liberal økonomisk teori den viktigste grunnen til at kvinner og barn i særlig grad drar nytte av den kapitalistiske utviklingen sammenlignet med gamle samfunn?
answer: Arbeidet blir stadig mer mekanisert og intellektuelt, noe som reduserer fordelen med fysisk styrke og krever utdanning fremfor umiddelbar arbeidskraft
wrong_answers:
  - Kapitalistiske samfunn skaper en spesifikk juridisk beskyttelse for kvinner og barn som antikkens samfunn manglet
  - Akkumulering av kapital gjør det mulig for velstående eiere å tilby bedre arbeidsforhold av moralsk forpliktelse
  - Konkurransen i markedet tvinger arbeidsgivere til å tilby høyere lønn til kvinner og barn for å tiltrekke seg den knappe arbeidskraften
explanation: |
  Paul Leroy-Beaulieu hevdet at utviklingen mot mekanisert og intellektuelt arbeid fundamentalt endret den økonomiske verdien av ulike typer arbeid. I antikkens samfunn var fysisk styrke viktigst, noe som var til ulempe for kvinner og gjorde barnearbeid umiddelbart verdifullt. Etter hvert som kapitalismen utviklet seg, ble arbeidet mindre avhengig av fysisk styrke og mer av ferdigheter og intellekt, noe som gjorde det mulig for kvinner å konkurrere mer effektivt og gjorde utdanning mer verdifullt enn umiddelbart barnearbeid. Det var denne strukturelle endringen, snarere enn juridisk beskyttelse eller moralske forpliktelser, som skapte de økonomiske forholdene som forbedret kvinners status.
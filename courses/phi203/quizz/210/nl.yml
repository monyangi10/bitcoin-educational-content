question: Wat is volgens de liberale economische theorie de belangrijkste reden waarom vooral vrouwen en kinderen profiteren van de kapitalistische ontwikkeling in vergelijking met oude samenlevingen?
answer: Werk wordt steeds gemechaniseerder en intellectueler, waardoor het voordeel van fysieke kracht afneemt en opleiding belangrijker wordt dan directe arbeid
wrong_answers:
  - Kapitalistische samenlevingen creëren specifieke wettelijke bescherming voor vrouwen en kinderen die oude samenlevingen niet hadden
  - De accumulatie van kapitaal stelt rijke eigenaren in staat om betere arbeidsomstandigheden te bieden uit morele verplichting
  - Concurrentie op de markt dwingt werkgevers hogere lonen te bieden aan vrouwen en kinderen om schaarse arbeidskrachten aan te trekken
explanation: |
  Paul Leroy-Beaulieu stelde dat de evolutie naar gemechaniseerd en intellectueel werk de economische waarde van verschillende soorten arbeid fundamenteel veranderde. In oude samenlevingen was fysieke kracht het belangrijkst, wat vrouwen benadeelde en kinderarbeid meteen waardevol maakte. Toen het kapitalisme zich ontwikkelde, werd werk minder afhankelijk van fysieke kracht en meer van vaardigheden en intellect, waardoor vrouwen effectiever konden concurreren en onderwijs waardevoller werd dan directe kinderarbeid. Deze structurele verandering, in plaats van wettelijke bescherming of morele verplichtingen, creëerde de economische omstandigheden die hun status verbeterden.
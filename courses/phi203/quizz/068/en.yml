question: According to the chapter, how did the rise of sophisticated tools and machines specifically improve the situation of women in economic life?
answer: Machines required less brute force and more intellectual direction, enabling women to increase their productivity and participate on more equal terms
wrong_answers:
  - Legal emancipation movements secured formal property rights for women, which machines then helped them exercise
  - Women's economic status improved because machines transferred dangerous physical labor entirely to men
  - The rise of factories created new domestic roles for women as managers of household consumption
explanation: |
  The text explains that in hunting and warring societies, women's productive contribution was considered secondary because it depended on physical strength in which they were disadvantaged. The arrival of sophisticated machines and tools, which required less brute force and more spirit, direction, and intellectual vigor, allowed women to contribute more equally to economic life. This was a material transformation, not a legal or political one. Self-ownership, that foundational principle of individual liberty, grew with capitalism and its technical advances, and women's gains were part of this broader emancipatory process.

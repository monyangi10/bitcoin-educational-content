question: Quel rôle jouent les prix et les profits dans l'orientation de la production selon la théorie économique libérale ?
answer: Ils servent de signaux naturels qui guident les producteurs vers la satisfaction des besoins des consommateurs sans nécessiter d'intervention de la part des pouvoirs publics
wrong_answers:
  - Ils représentent des barrières artificielles qui empêchent une allocation efficace des ressources sur le marché
  - Ils fonctionnent comme des outils gouvernementaux conçus pour contrôler et réguler l'orientation de l'activité économique
  - Elles créent des distorsions du marché qui empêchent les producteurs de satisfaire les véritables demandes des consommateurs
explanation: |
  Selon le texte, les prix et les profits constituent des signaux naturels qui orientent la production sans nécessiter d'organisation gouvernementale ou réglementaire. Lorsque les consommateurs sont prêts à payer pour certains biens et services, cela crée des profits dans ces secteurs, signalant aux producteurs que ces activités facilitent la vie des consommateurs et répondent à leurs besoins. Cette loi naturelle de la production permet à l'activité économique de s'organiser de la manière la plus utile grâce à la poursuite d'un intérêt personnel éclairé, plutôt que de nécessiter une direction ou un contrôle externe.
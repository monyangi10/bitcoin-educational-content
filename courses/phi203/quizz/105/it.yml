question: Che ruolo hanno i prezzi e i profitti nell'orientare la produzione secondo la teoria economica liberale?
answer: Servono come segnali naturali che guidano i produttori verso il soddisfacimento dei bisogni dei consumatori senza richiedere l'intervento del governo
wrong_answers:
  - Rappresentano barriere artificiali che impediscono un'allocazione efficiente delle risorse sul mercato
  - Funzionano come strumenti di governo per controllare e regolare la direzione dell'attività economica
  - Creano distorsioni del mercato che allontanano i produttori dal soddisfare la vera domanda dei consumatori
explanation: |
  Secondo il testo, i prezzi e i profitti costituiscono segnali naturali che orientano la produzione senza richiedere un'organizzazione governativa o normativa. Quando i consumatori sono disposti a pagare per determinati beni e servizi, questo crea profitti in quei settori, segnalando ai produttori che queste attività facilitano la vita dei consumatori e soddisfano i loro bisogni. Questa legge naturale della produzione permette all'attività economica di organizzarsi nel modo più utile attraverso il perseguimento di un interesse personale illuminato, piuttosto che richiedere una direzione o un controllo esterno.
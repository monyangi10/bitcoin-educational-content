question: Bei na faida zina jukumu gani katika kuelekeza uzalishaji kulingana na nadharia ya uchumi huria?
answer: Hutumika kama ishara za asili zinazowaongoza wazalishaji kufikia mahitaji ya watumiaji bila kuhitaji kuingilia kati kwa serikali
wrong_answers:
  - Zinawakilisha vikwazo bandia vinavyozuia ugawaji mzuri wa rasilimali sokoni
  - Hufanya kazi kama zana za serikali zilizoundwa kudhibiti na kudhibiti mwelekeo wa shughuli za kiuchumi
  - Husababisha upotoshaji wa soko unaowaongoza wazalishaji mbali na kukidhi mahitaji halisi ya watumiaji
explanation: |
  Kulingana na maandishi, bei na faida huunda ishara za asili zinazoelekeza uzalishaji bila kuhitaji shirika la kiserikali au la udhibiti. Watumiaji wanapokuwa tayari kulipa bidhaa na huduma fulani, hii inaleta faida katika sekta hizo, ikiashiria kwa wazalishaji kwamba shughuli hizi hurahisisha maisha ya watumiaji na kukidhi mahitaji yao. Sheria hii ya asili ya uzalishaji inaruhusu shughuli za kiuchumi kujipanga kwa njia inayofaa zaidi kupitia kutafuta maslahi binafsi yaliyoelimika, badala ya kuhitaji mwelekeo au udhibiti wa nje.
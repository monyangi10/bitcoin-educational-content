question: What must occur before consumption of any good according to the principles of property?
answer: Appropriation must precede consumption
wrong_answers:
  - Production must precede consumption
  - Exchange must precede consumption
  - Distribution must precede consumption
explanation: |
  The text clearly states that appropriation necessarily precedes consumption, using the example that to consume an apple, one must first appropriate it. This appropriation has an individual character, and it is precisely because we appropriate goods individually that we experience their effects personally. While production, exchange, and distribution are important economic processes, the fundamental principle established is that appropriation - taking ownership - must happen before any consumption can occur.

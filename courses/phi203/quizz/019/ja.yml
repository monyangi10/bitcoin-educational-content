question: 財産の原則に従って、財が消費される前に何が起こるのか？
answer: 収用は消費に先行しなければならない
wrong_answers:
  - 生産は消費に先行しなければならない
  - Exchangeは消費に先行しなければならない
  - 流通は消費に先行しなければならない
explanation: |
  この文章では、リンゴを消費するには、まずリンゴを適切に扱わなければならない、という例を用いて、消費に先立つ充当が必然的であることを明確に述べている。この充当には個人的な性格があり、個人的に商品を充当するからこそ、その影響を個人的に経験することができるのである。生産、交換、流通は重要な経済的プロセスであるが、基本的な原則は、消費が起こる前に、所有権を得るという充当が起こらなければならないということである。
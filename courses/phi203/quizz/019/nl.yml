question: Wat moet er gebeuren vóór consumptie van een goed volgens de principes van eigendom?
answer: Toeëigening moet voorafgaan aan consumptie
wrong_answers:
  - Productie moet voorafgaan aan consumptie
  - Exchange moet voorafgaan aan consumptie
  - Distributie moet voorafgaan aan consumptie
explanation: |
  De tekst stelt duidelijk dat toe-eigening noodzakelijkerwijs voorafgaat aan consumptie, met het voorbeeld dat je een appel eerst moet toe-eigenen om hem te kunnen consumeren. Deze toe-eigening heeft een individueel karakter en juist omdat we ons goederen individueel toe-eigenen, ervaren we hun effecten persoonlijk. Hoewel productie, uitwisseling en distributie belangrijke economische processen zijn, is het fundamentele principe dat is vastgelegd dat toe-eigening - het in bezit nemen van goederen - moet plaatsvinden voordat er sprake kan zijn van consumptie.
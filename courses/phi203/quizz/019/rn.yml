question: Ni igiki gitegerezwa kuba imbere y’uko umuntu afungura ikintu ico ari co cose hakurikijwe ingingo ngenderwako z’itunga?
answer: Ukwifata bitegerezwa kuba imbere y'ugukoresha
wrong_answers:
  - Uguhingura bitegerezwa kuba imbere y'ugukoresha
  - Exchange itegerezwa kuba imbere y'ugukoresha
  - Gutanga bitegerezwa kuba imbere y'ugukoresha
explanation: |
  Ico canditswe kivuga neza yuko kwifatanya n’abandi bibanza gufungura, hakoreshejwe akarorero k’uko kugira ngo umuntu arye pome, ategerezwa kubanza kuyifata. Ukwo kwifatanya n’abandi kurafise akaranga k’umuntu ku giti ciwe, kandi ni kubera nyene twifatanya n’abandi ibintu ku giti cabo, ni co gituma twibonera ingaruka zavyo ubwacu. Naho uguhingura, uguhindura, n’ugukwiragiza ari inzira zihambaye z’ubutunzi, ingingo ngenderwako y’ishimikiro ishizweho ni uko kwigarurira - gufata uburenganzira - bitegerezwa kubaho imbere y’uko ugukoresha kwose gushobora kubaho.
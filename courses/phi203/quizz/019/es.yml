question: ¿Qué debe ocurrir antes del consumo de cualquier bien según los principios de la propiedad?
answer: La apropiación debe preceder al consumo
wrong_answers:
  - La producción debe preceder al consumo
  - Exchange debe preceder al consumo
  - La distribución debe preceder al consumo
explanation: |
  El texto afirma claramente que la apropiación precede necesariamente al consumo, utilizando el ejemplo de que para consumir una manzana primero hay que apropiársela. Esta apropiación tiene un carácter individual, y es precisamente porque nos apropiamos de los bienes individualmente por lo que experimentamos sus efectos personalmente. Si bien la producción, el intercambio y la distribución son procesos económicos importantes, el principio fundamental que se establece es que la apropiación -asumir la propiedad- debe producirse antes de que pueda tener lugar cualquier consumo.
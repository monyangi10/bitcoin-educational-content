question: طبق اصول مالکیت، قبل از مصرف هر کالایی چه باید رخ دهد؟
answer: تخصیص باید قبل از مصرف انجام شود
wrong_answers:
  - تولید باید بر مصرف مقدم باشد
  - Exchange باید قبل از مصرف استفاده شود
  - توزیع باید قبل از مصرف انجام شود
explanation: |
  متن به وضوح بیان می‌کند که تخصیص لزوماً بر مصرف مقدم است، با استفاده از مثالی که برای مصرف یک سیب، ابتدا باید آن را تخصیص داد. این تخصیص دارای ماهیت فردی است و دقیقاً به این دلیل که ما کالاها را به صورت فردی تخصیص می‌دهیم، اثرات آن‌ها را به صورت شخصی تجربه می‌کنیم. در حالی که تولید، مبادله و توزیع فرآیندهای اقتصادی مهمی هستند، اصل اساسی که برقرار شده این است که تخصیص - به مالکیت درآوردن - باید قبل از هرگونه مصرف رخ دهد.
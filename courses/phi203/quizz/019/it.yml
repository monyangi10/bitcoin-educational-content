question: Cosa deve avvenire prima del consumo di un bene secondo i principi della proprietà?
answer: L'appropriazione deve precedere il consumo
wrong_answers:
  - La produzione deve precedere il consumo
  - Il Exchange deve precedere il consumo
  - La distribuzione deve precedere il consumo
explanation: |
  Il testo afferma chiaramente che l'appropriazione precede necessariamente il consumo, utilizzando l'esempio che per consumare una mela bisogna prima appropriarsene. Questa appropriazione ha un carattere individuale ed è proprio perché ci appropriamo dei beni individualmente che ne sperimentiamo personalmente gli effetti. Sebbene la produzione, lo scambio e la distribuzione siano processi economici importanti, il principio fondamentale stabilito è che l'appropriazione - la presa di possesso - deve avvenire prima di qualsiasi consumo.
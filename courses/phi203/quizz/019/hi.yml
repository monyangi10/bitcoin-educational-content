question: संपत्ति के सिद्धांतों के अनुसार किसी भी वस्तु के उपभोग से पहले क्या होना आवश्यक है?
answer: उपभोग से पहले विनियोग आवश्यक है
wrong_answers:
  - उत्पादन उपभोग से पहले होना चाहिए
  - उपभोग से पहले Exchange आवश्यक है
  - वितरण उपभोग से पहले होना चाहिए।
explanation: |
  पाठ में स्पष्ट रूप से कहा गया है कि उपभोग से पहले स्वामित्व ग्रहण करना आवश्यक है, उदाहरण के तौर पर सेब का उपभोग करने के लिए, पहले उसका स्वामित्व ग्रहण करना आवश्यक है। यह स्वामित्व ग्रहण व्यक्तिगत होता है, और वस्तुओं का स्वामित्व ग्रहण करने के कारण ही हम उनके प्रभावों को व्यक्तिगत रूप से अनुभव करते हैं। यद्यपि उत्पादन, विनिमय और वितरण महत्वपूर्ण आर्थिक प्रक्रियाएं हैं, फिर भी स्थापित मूल सिद्धांत यह है कि उपभोग होने से पहले स्वामित्व ग्रहण करना आवश्यक है।
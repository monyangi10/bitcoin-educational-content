question: Co musi nastąpić przed konsumpcją jakiegokolwiek dobra zgodnie z zasadami własności?
answer: Przywłaszczenie musi poprzedzać konsumpcję
wrong_answers:
  - Produkcja musi poprzedzać konsumpcję
  - Exchange musi poprzedzać konsumpcję
  - Dystrybucja musi poprzedzać konsumpcję
explanation: |
  Tekst wyraźnie stwierdza, że przywłaszczenie koniecznie poprzedza konsumpcję, używając przykładu, że aby skonsumować jabłko, trzeba je najpierw przywłaszczyć. To przywłaszczenie ma indywidualny charakter i właśnie dlatego, że przywłaszczamy dobra indywidualnie, doświadczamy ich skutków osobiście. Podczas gdy produkcja, wymiana i dystrybucja są ważnymi procesami gospodarczymi, podstawową zasadą jest to, że przywłaszczenie - przejęcie własności - musi nastąpić przed jakąkolwiek konsumpcją.
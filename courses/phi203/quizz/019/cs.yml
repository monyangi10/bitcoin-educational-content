question: Co musí nastat před spotřebou jakéhokoli zboží podle zásad vlastnictví?
answer: Přivlastnění musí předcházet spotřebě
wrong_answers:
  - Výroba musí předcházet spotřebě
  - Exchange musí předcházet spotřebě
  - Distribuce musí předcházet spotřebě
explanation: |
  V textu se jasně uvádí, že přivlastnění nutně předchází spotřebě, a to na příkladu, že abychom mohli jablko spotřebovat, musíme si ho nejprve přivlastnit. Toto přivlastnění má individuální charakter a právě proto, že si zboží přivlastňujeme individuálně, zažíváme jeho účinky osobně. Výroba, směna a distribuce jsou sice důležité ekonomické procesy, ale základním stanoveným principem je, že k přivlastnění - převzetí vlastnictví - musí dojít dříve, než může dojít ke spotřebě.
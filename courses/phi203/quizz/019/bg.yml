question: Какво трябва да се случи преди потреблението на всяка стока според принципите на собствеността?
answer: Присвояването трябва да предхожда потреблението
wrong_answers:
  - Производството трябва да предхожда потреблението
  - Exchange трябва да предшества консумацията
  - Разпределението трябва да предхожда потреблението
explanation: |
  В текста ясно се посочва, че присвояването задължително предхожда потреблението, като се използва примерът, че за да се консумира ябълка, човек първо трябва да я присвои. Това присвояване има индивидуален характер и именно защото присвояваме стоките индивидуално, ние лично преживяваме техните ефекти. Въпреки че производството, размяната и разпределението са важни икономически процеси, основният установен принцип е, че присвояването - придобиването на собственост - трябва да се случи преди да се осъществи каквото и да е потребление.
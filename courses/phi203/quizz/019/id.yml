question: Apa yang harus terjadi sebelum konsumsi barang apa pun sesuai dengan prinsip-prinsip properti?
answer: Peruntukan harus mendahului konsumsi
wrong_answers:
  - Produksi harus mendahului konsumsi
  - Exchange harus mendahului konsumsi
  - Distribusi harus mendahului konsumsi
explanation: |
  Teks ini dengan jelas menyatakan bahwa perampasan harus mendahului konsumsi, dengan menggunakan contoh bahwa untuk mengonsumsi apel, seseorang harus terlebih dahulu merampasnya. Apropriasi ini bersifat individual, dan justru karena kita mengambil barang secara individual, kita mengalami dampaknya secara pribadi. Meskipun produksi, pertukaran, dan distribusi merupakan proses ekonomi yang penting, prinsip dasar yang dibangun adalah bahwa apropriasi - pengambilan kepemilikan - harus terjadi sebelum konsumsi dapat terjadi.
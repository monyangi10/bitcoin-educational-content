question: Šta se mora desiti pre konzumacije bilo kog dobra prema principima svojine?
answer: Aproprijacija mora prethoditi konzumaciji
wrong_answers:
  - Proizvodnja mora prethoditi potrošnji
  - Exchange mora prethoditi konzumaciji
  - Distribucija mora prethoditi potrošnji
explanation: |
  Tekst jasno navodi da prisvajanje nužno prethodi potrošnji, koristeći primer da, da bi se jabuka konzumirala, prvo mora biti prisvojena. Ovo prisvajanje ima individualni karakter, i upravo zato što dobra prisvajamo pojedinačno, njihovo dejstvo osećamo lično. Iako su proizvodnja, razmena i distribucija važni ekonomski procesi, osnovni princip koji se uspostavlja je da prisvajanje - preuzimanje vlasništva - mora da se desi pre nego što bilo kakva potrošnja može da se dogodi.
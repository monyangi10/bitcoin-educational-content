question: Ni nini kinachopaswa kutokea kabla ya matumizi ya bidhaa yoyote kulingana na kanuni za mali?
answer: Matumizi lazima yatanguliwe na matumizi
wrong_answers:
  - Uzalishaji lazima utangulie matumizi
  - Exchange lazima ianze matumizi
  - Usambazaji lazima utangulie matumizi
explanation: |
  Maandishi yanasema wazi kwamba umiliki lazima utokee kabla ya matumizi, kwa kutumia mfano kwamba ili kula tufaha, mtu lazima kwanza alichukue. Umiliki huu una tabia ya mtu binafsi, na ni kwa sababu tunachukua bidhaa kibinafsi ndipo tunapopata athari zake kibinafsi. Ingawa uzalishaji, ubadilishanaji, na usambazaji ni michakato muhimu ya kiuchumi, kanuni ya msingi iliyoanzishwa ni kwamba umiliki - kuchukua umiliki - lazima utokee kabla ya matumizi yoyote kutokea.
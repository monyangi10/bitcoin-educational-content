question: Кой основен принцип трябва да ръководи създаването на международна сигурност според представената либерална доктрина?
answer: Признаване на свободата на действие, като същевременно се санкционират нарушенията на тази свобода чрез международна правова държава
wrong_answers:
  - Създаване на силни суверенни държави, способни да наложат териториална цялост и културно единство
  - Създаване на споразумения за колективна сигурност въз основа на споделени езикови и културни сходства между народите
  - Създаване на йерархични международни организации, които при необходимост могат да отменят суверенитета на отделните държави
explanation: |
  В текста се подчертава, че международната сигурност трябва да се основава на признаването на индивидуалната свобода и на санкционирането на посегателствата срещу нея, подобно на функционирането на вътрешното право. Това отразява основния либерален принцип, че сигурността съществува, за да защитава доброволните човешки отношения и невинната свобода. Грешните отговори представляват колективистични подходи, които дават приоритет на държавната власт, културното единство или йерархичния контрол пред индивидуалната свобода - всички те противоречат на фундаменталната либерална доктрина, че индивидите, а не колективите, са в основата на легитимната политическа организация.
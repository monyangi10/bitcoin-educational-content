question: Ni ingingo ngenderwako iyihe y’ishimikiro ikwiye kuyobora mu kurema umutekano mpuzamakungu hakurikijwe inyigisho y’ubwigenge yashikirijwe?
answer: Kwemera umwidegemvyo wo gukora mu gihe umuntu ahana ukurenga kuri uwo mwidegemvyo biciye mu mategeko mpuzamakungu .
wrong_answers:
  - Gushinga ibihugu bikomeye vyigenga bishobora gushitsa ubumwe bw'intara n'ubumwe bw'imico kama .
  - Gushinga intunganyo z'umutekano rusangi zishingiye ku rurimi n'imico kama bihurikiyeko hagati y'ibihugu .
  - Gushinga amashirahamwe mpuzamakungu afise ubukuru ashobora gusumba ubusegaba bwa Leta ku giti ciwe iyo bikenewe
explanation: |
  Ico canditswe gishimika ku vy’uko umutekano mpuzamakungu utegerezwa gushingira ku kwemera umwidegemvyo w’umuntu ku giti ciwe mu gihe utanga ibihano ku bitero kuri uwo mwidegemvyo, nk’uko nyene amategeko yo mu gihugu akwiye gukora. Ivyo vyerekana ingingo ngenderwako nyamukuru y’ubwigenge y’uko umutekano uriho kugira ngo umuntu akingire imigenderanire y’abantu ku bushake be n’umwidegemvyo w’inzirakarengane. Inyishu zitari zo zigereranya uburyo bwo gukorana n’abandi bushira imbere ububasha bwa Leta, ubumwe bw’imico kama, canke ubugenzuzi bw’ubukuru ku mwidegemvyo w’umuntu ku giti ciwe - ivyo vyose bikaba bivuguruza inyigisho y’ishimikiro y’ubwigenge bw’uko abantu ku giti cabo, atari abantu bose, ari bo shingiro ry’imitunganirize ya politike yemewe.
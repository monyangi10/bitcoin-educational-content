question: 제시된 자유주의 원칙에 따라 국제 안보를 구축하는 데 있어 어떤 기본 원칙이 적용되어야 하나요?
answer: 행동의 자유를 인정하는 동시에 국제 법치를 통해 그 자유를 침해하는 행위를 제재합니다
wrong_answers:
  - 영토 보전과 문화적 통합을 시행할 수 있는 강력한 주권 국가의 수립
  - 국가 간 언어적, 문화적 유사성을 기반으로 한 집단적 보안 협약 구축
  - 필요한 경우 개별 국가의 주권을 무시할 수 있는 계층적 국제기구의 형성
explanation: |
  본문은 국제 안보는 국내법의 기능과 마찬가지로 개인의 자유를 인정하는 동시에 그 자유에 대한 공격을 제재하는 것을 기반으로 해야 한다는 점을 강조합니다. 이는 안보는 자발적인 인간 관계와 무고한 자유를 보호하기 위해 존재한다는 자유주의의 핵심 원칙을 반영합니다. 오답은 개인의 자유보다 국가 권력, 문화적 통일성 또는 위계적 통제를 우선시하는 집단주의적 접근 방식을 나타내며, 이는 모두 집단이 아닌 개인이 합법적인 정치 조직의 기초라는 자유주의의 기본 교리와 모순됩니다.
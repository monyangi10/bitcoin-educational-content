question: Jakým základním principem by se mělo řídit vytváření mezinárodní bezpečnosti podle předložené liberální doktríny?
answer: Uznání svobody jednání a zároveň sankcionování porušování této svobody prostřednictvím mezinárodního právního státu
wrong_answers:
  - Vytvoření silných suverénních států schopných prosazovat územní celistvost a kulturní jednotu
  - Vytvoření kolektivních bezpečnostních opatření založených na společné jazykové a kulturní příbuznosti mezi národy
  - Vytvoření hierarchických mezinárodních organizací, které mohou v případě potřeby převážit nad suverenitou jednotlivých států
explanation: |
  Text zdůrazňuje, že mezinárodní bezpečnost musí být založena na uznání svobody jednotlivce a zároveň na sankcionování útoků na tuto svobodu, podobně jako by mělo fungovat vnitrostátní právo. To odráží základní liberální zásadu, že bezpečnost existuje proto, aby chránila dobrovolné lidské vztahy a nevinnou svobodu. Špatné odpovědi představují kolektivistické přístupy, které upřednostňují státní moc, kulturní jednotu nebo hierarchickou kontrolu před individuální svobodou - to vše je v rozporu se základní liberální doktrínou, že základem legitimní politické organizace jsou jednotlivci, nikoli kolektivy.
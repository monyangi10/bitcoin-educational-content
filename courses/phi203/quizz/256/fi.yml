question: Minkä perusperiaatteen pitäisi ohjata kansainvälisen turvallisuuden luomista esitetyn liberaalin opin mukaisesti?
answer: Toimintavapauden tunnustaminen, mutta samalla tämän vapauden loukkausten rankaiseminen kansainvälisen oikeussäännön avulla
wrong_answers:
  - Sellaisten voimakkaiden suvereenien valtioiden perustaminen, jotka kykenevät puolustamaan alueellista koskemattomuutta ja kulttuurista yhtenäisyyttä
  - Kansakuntien yhteisiin kielellisiin ja kulttuurisiin yhteyksiin perustuvien kollektiivisten turvallisuusjärjestelyjen luominen
  - Sellaisten hierarkkisten kansainvälisten järjestöjen muodostaminen, jotka voivat tarvittaessa ohittaa yksittäisten valtioiden suvereniteetin
explanation: |
  Tekstissä korostetaan, että kansainvälisen turvallisuuden on perustuttava yksilönvapauden tunnustamiseen ja samalla siihen kohdistuvien hyökkäysten rankaisemiseen, samalla tavoin kuin kansallisen lainsäädännön pitäisi toimia. Tämä heijastaa liberaalin perusperiaatetta, jonka mukaan turvallisuus on olemassa vapaaehtoisten ihmissuhteiden ja viattoman vapauden suojelemiseksi. Väärät vastaukset edustavat kollektivistisia lähestymistapoja, joissa valtiovalta, kulttuurinen yhtenäisyys tai hierarkkinen valvonta asetetaan yksilönvapauden edelle - kaikki nämä ovat ristiriidassa liberaalin perusopin kanssa, jonka mukaan yksilöt, eivät kollektiivit, ovat legitiimin poliittisen organisaation perusta.
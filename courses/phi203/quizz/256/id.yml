question: Prinsip dasar apa yang harus memandu penciptaan keamanan internasional menurut doktrin liberal yang disajikan?
answer: Pengakuan atas kebebasan untuk bertindak sekaligus memberikan sanksi atas pelanggaran kebebasan tersebut melalui aturan hukum internasional
wrong_answers:
  - Pembentukan negara berdaulat yang kuat yang mampu menegakkan integritas teritorial dan kesatuan budaya
  - Penciptaan pengaturan keamanan kolektif berdasarkan kesamaan bahasa dan budaya antar bangsa
  - Pembentukan organisasi internasional hirarkis yang dapat mengesampingkan kedaulatan negara individu bila diperlukan
explanation: |
  Teks tersebut menekankan bahwa keamanan internasional harus didasarkan pada pengakuan kebebasan individu dan memberikan sanksi terhadap serangan terhadap kebebasan tersebut, sama seperti bagaimana hukum domestik harus berfungsi. Hal ini mencerminkan prinsip liberal inti bahwa keamanan ada untuk melindungi hubungan antarmanusia yang bersifat sukarela dan kebebasan yang tidak berdosa. Jawaban yang salah menunjukkan pendekatan kolektivis yang memprioritaskan kekuasaan negara, kesatuan budaya, atau kontrol hirarkis terhadap kebebasan individu - yang semuanya bertentangan dengan doktrin liberal fundamental bahwa individu, bukan kolektif, adalah dasar organisasi politik yang sah.
question: Sunulan liberal doktrine göre uluslararası güvenliğin oluşturulmasında hangi temel ilke rehberlik etmelidir?
answer: Eylem özgürlüğünün tanınması ve bu özgürlüğün ihlalinin uluslararası bir hukuk kuralı aracılığıyla yaptırıma tabi tutulması
wrong_answers:
  - Toprak bütünlüğünü ve kültürel birliği sağlayabilecek güçlü egemen devletlerin kurulması
  - Uluslar arasında ortak dilsel ve kültürel yakınlıklara dayalı kolektif güvenlik düzenlemelerinin oluşturulması
  - Gerektiğinde bireysel devlet egemenliğini geçersiz kılabilecek hiyerarşik uluslararası örgütlerin oluşturulması
explanation: |
  Metin, uluslararası güvenliğin, iç hukukun işleyişine benzer şekilde, bireysel özgürlüğün tanınması ve bu özgürlüğe yönelik saldırıların yaptırıma tabi tutulması esasına dayanması gerektiğini vurgulamaktadır. Bu, güvenliğin gönüllü insan ilişkilerini ve masum özgürlüğü korumak için var olduğuna dair temel liberal ilkeyi yansıtmaktadır. Yanlış cevaplar, bireysel özgürlük yerine devlet gücüne, kültürel birliğe veya hiyerarşik kontrole öncelik veren kolektivist yaklaşımları temsil etmektedir - ki bunların hepsi de meşru siyasi örgütlenmenin temelinin kolektifler değil bireyler olduğu şeklindeki temel liberal doktrinle çelişmektedir.
question: Theo học thuyết tự do được trình bày, nguyên tắc cơ bản nào nên định hướng việc xây dựng an ninh quốc tế?
answer: Công nhận quyền tự do hành động đồng thời xử phạt các hành vi vi phạm quyền tự do đó thông qua luật pháp quốc tế.
wrong_answers:
  - Thiết lập các quốc gia có chủ quyền hùng mạnh, có khả năng bảo vệ toàn vẹn lãnh thổ và thống nhất văn hóa.
  - Thiết lập các thỏa thuận an ninh tập thể dựa trên sự tương đồng về ngôn ngữ và văn hóa giữa các quốc gia.
  - Thành lập các tổ chức quốc tế có cấu trúc phân cấp, có khả năng vượt quyền chủ quyền của từng quốc gia khi cần thiết.
explanation: |
  Văn bản nhấn mạnh rằng an ninh quốc tế phải dựa trên việc công nhận tự do cá nhân đồng thời trừng phạt các hành vi xâm phạm tự do đó, tương tự như cách luật pháp trong nước nên hoạt động. Điều này phản ánh nguyên tắc cốt lõi của chủ nghĩa tự do rằng an ninh tồn tại để bảo vệ các mối quan hệ tự nguyện giữa con người và tự do vô tội. Các câu trả lời sai thể hiện cách tiếp cận theo chủ nghĩa tập thể, ưu tiên quyền lực nhà nước, sự thống nhất văn hóa hoặc kiểm soát theo thứ bậc hơn là tự do cá nhân - tất cả đều mâu thuẫn với học thuyết tự do cơ bản rằng cá nhân, chứ không phải tập thể, là nền tảng của tổ chức chính trị hợp pháp.
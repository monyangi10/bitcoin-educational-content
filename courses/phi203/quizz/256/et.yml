question: Milline aluspõhimõte peaks esitatud liberaalse doktriini kohaselt juhinduma rahvusvahelise julgeoleku loomisest?
answer: Tegutsemisvabaduse tunnustamine, kuid selle vabaduse rikkumise karistamine rahvusvahelise õigusriigi kaudu
wrong_answers:
  - Võimsate suveräänsete riikide loomine, mis suudavad tagada territoriaalse terviklikkuse ja kultuurilise ühtsuse
  - Kollektiivse julgeolekukorralduse loomine, mis põhineb rahvaste ühistel keelelistel ja kultuurilistel sugulussuhetel
  - Hierarhiliste rahvusvaheliste organisatsioonide moodustamine, mis võivad vajaduse korral üksikute riikide suveräänsuse üle sõita
explanation: |
  Tekstis rõhutatakse, et rahvusvaheline julgeolek peab põhinema üksikisiku vabaduse tunnustamisel, kuid samas peab selle vabaduse vastu suunatud rünnakuid karistama, sarnaselt sellega, kuidas peaks toimima siseriiklik õigus. See peegeldab liberaalset põhiprintsiipi, et julgeolek on olemas selleks, et kaitsta vabatahtlikke inimsuhteid ja süütut vabadust. Valed vastused esindavad kollektivistlikke lähenemisviise, mis seavad riigi võimu, kultuurilise ühtsuse või hierarhilise kontrolli individuaalse vabaduse asemel esikohale - kõik need on vastuolus liberaalse põhidoktriiniga, mille kohaselt on legitiimse poliitilise korralduse aluseks üksikisikud, mitte kollektiivid.
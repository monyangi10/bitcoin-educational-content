question: 提示されたリベラル・ドクトリンによれば、国際安全保障の構築の指針となるべき基本原則は何か。
answer: 行動の自由を認める一方で、その自由の侵害に対しては国際的な法の支配を通じて制裁を加える。
wrong_answers:
  - 領土保全と文化的統一を実施できる強力な主権国家の樹立
  - 国家間で共有される言語的・文化的親和性に基づく集団安全保障体制の構築
  - 必要に応じて、個々の国家の主権を覆すことができる階層的な国際組織の形成。
explanation: |
  この文章は、国際安全保障は個人の自由を認めつつ、その自由に対する攻撃を制裁することに基づいていなければならないことを強調している。これは、安全保障は自発的な人間関係と無垢な自由を守るために存在するというリベラルの基本原則を反映している。誤答は、個人の自由よりも国家権力や文化的一体性、階層的統制を優先する集団主義的アプローチを表しており、これらはすべて、集団ではなく個人が正当な政治組織の基盤であるという基本的なリベラルの教義に反するものである。
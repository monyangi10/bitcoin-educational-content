question: Vilken grundläggande princip bör vägleda skapandet av internationell säkerhet enligt den liberala doktrin som presenteras?
answer: Erkännande av handlingsfrihet samtidigt som kränkningar av denna frihet sanktioneras genom en internationell rättsregel
wrong_answers:
  - Upprättande av mäktiga suveräna stater som kan upprätthålla territoriell integritet och kulturell enhet
  - Skapande av kollektiva säkerhetsarrangemang baserade på delade språkliga och kulturella affiniteter mellan nationer
  - Bildande av hierarkiska internationella organisationer som vid behov kan åsidosätta enskilda staters suveränitet
explanation: |
  Texten betonar att internationell säkerhet måste bygga på ett erkännande av individuell frihet samtidigt som angrepp på denna frihet sanktioneras, i likhet med hur nationell rätt bör fungera. Detta återspeglar den liberala grundprincipen att säkerhet finns till för att skydda frivilliga mänskliga relationer och oskyldig frihet. De felaktiga svaren representerar kollektivistiska synsätt som prioriterar statsmakt, kulturell enhet eller hierarkisk kontroll framför individuell frihet - vilket alla strider mot den grundläggande liberala doktrinen att individer, inte kollektiv, är grunden för legitim politisk organisation.
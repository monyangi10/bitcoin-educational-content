question: ¿Qué principio fundamental debe guiar la creación de la seguridad internacional según la doctrina liberal presentada?
answer: Reconocimiento de la libertad de acción y sanción de las violaciones de esa libertad mediante un Estado de Derecho internacional
wrong_answers:
  - Creación de Estados soberanos poderosos capaces de imponer la integridad territorial y la unidad cultural
  - Creación de acuerdos de seguridad colectiva basados en afinidades lingüísticas y culturales compartidas entre las naciones
  - Formación de organizaciones internacionales jerarquizadas que puedan anular la soberanía de cada Estado cuando sea necesario
explanation: |
  El texto subraya que la seguridad internacional debe basarse en el reconocimiento de la libertad individual al tiempo que se sancionan los ataques a esa libertad, de forma similar a como debe funcionar el derecho interno. Esto refleja el principio liberal básico de que la seguridad existe para proteger las relaciones humanas voluntarias y la libertad inocente. Las respuestas erróneas representan planteamientos colectivistas que dan prioridad al poder estatal, la unidad cultural o el control jerárquico sobre la libertad individual, todo lo cual contradice la doctrina liberal fundamental de que los individuos, y no los colectivos, son la base de la organización política legítima.
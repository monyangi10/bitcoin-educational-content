question: According to the text, what reductio ad absurdum does the argument for national wealth imply when taken to its logical conclusion on a global scale?
answer: If national wealth belongs collectively to the nation, then by the same logic the world's wealth should be redistributed globally to all humanity — yet socialists refuse this conclusion because they recognise national ownership
wrong_answers:
  - If national wealth belongs to the nation, it must follow that only citizens present at the moment of founding have any legitimate claim to it
  - If national wealth is a collective good, then any citizen who emigrates should forfeit their share, since they are no longer contributing to its production
  - If national wealth can be redistributed within a nation, the same redistributive bodies must also have the authority to redistribute between nations
explanation: |
  The text turns the socialist argument about national property against its authors: if the wealth of France belongs collectively to the French nation, then why should the world's dispossessed — those who live in deserts or unfavourable climates — not also inherit? Why not redistribute wealth worldwide? Socialists will not admit this conclusion because they fully recognise the ownership of borders at the national level while refusing to recognise it at the individual level. This reveals that their objection to inheritance and property is not a principled universal argument but a selective one that stops conveniently at the frontier.

question: Warum, so die liberale Analyse, führt die Unterdrückung der wirtschaftlichen Freiheit in einem kollektivistischen System unweigerlich zum Verlust der Aufenthalts- und Wohnsitzfreiheit?
answer: Denn ohne die freie Wahl des Arbeitsplatzes müssen die Menschen in der Nähe des ihnen zugewiesenen Arbeitsplatzes wohnen und können sich ihren Wohnort nicht aussuchen
wrong_answers:
  - Weil der Staat die Bürgerinnen und Bürger genau überwachen muss und sie in ausgewiesenen Wohngebieten konzentrieren muss
  - Weil kollektives Eigentum bedeutet, dass der Einzelne kein eigenes Haus besitzen kann und staatlich zugewiesenen Wohnraum akzeptieren muss
  - Weil die wirtschaftliche Planung eine Verteilung der Bevölkerung entsprechend der Verfügbarkeit von Ressourcen in verschiedenen Regionen erfordert
explanation: |
  Die liberale Analyse zeigt eine direkte Kausalkette auf: In einem kollektivistischen System weist der Staat den Menschen bestimmte Arbeitsplätze und Produktionszweige zu, ohne dass sie sich dafür entscheiden. Da die Menschen aus praktischen Gründen in der Regel in der Nähe ihres Arbeitsplatzes wohnen und sich ihre Arbeit nicht aussuchen können, können sie sich auch nicht aussuchen, wo sie wohnen wollen. Dies zeigt, wie wirtschaftliche Unfreiheit einen Dominoeffekt auslöst und systematisch andere persönliche Freiheiten beseitigt, die scheinbar nichts mit der Wirtschaft zu tun haben.
question: 根據自由主義的分析，為什麼在集體主義制度下，經濟自由的壓制必然會導致居住和住所自由的喪失？
answer: 因為如果沒有選擇工作的自由，人們就必須住在指定的工作地點附近，無法選擇住處
wrong_answers:
  - 因為國家需要密切監控公民，而且必須將他們集中在指定的住宅區內
  - 因為集體擁有財產意味著個人無法擁有房屋，必須接受國家分配的住房
  - 因為經濟規劃需要人口分佈來配合不同區域的資源可用性
explanation: |
  自由主義的分析展示了一個直接的因果鏈：在集體主義體系中，國家在個人沒有選擇的情況下，將個人分配到特定的工作和生產分支。由於人們通常會基於實際理由住在工作地點附近，而他們無法選擇工作，因此也就無法選擇住在哪裡。這說明了經濟上的不自由如何產生骨牌效應，有系統地消除其他看似與經濟無關的個人自由。
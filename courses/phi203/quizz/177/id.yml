question: Menurut analisis liberal, mengapa penindasan kebebasan ekonomi dalam sistem kolektivis pasti mengarah pada hilangnya kebebasan tempat tinggal dan domisili?
answer: Karena tanpa kebebasan untuk memilih pekerjaan, orang harus tinggal di dekat tempat kerja yang ditugaskan dan tidak dapat memilih tempat tinggal mereka
wrong_answers:
  - Karena negara perlu memantau warga secara ketat dan harus memusatkan mereka di daerah pemukiman yang ditentukan
  - Karena kepemilikan kolektif atas properti berarti individu tidak dapat memiliki rumah dan harus menerima perumahan yang diberikan negara
  - Karena perencanaan ekonomi membutuhkan distribusi populasi yang sesuai dengan ketersediaan sumber daya di berbagai wilayah
explanation: |
  Analisis liberal menunjukkan rantai sebab akibat langsung: dalam sistem kolektivis, negara menugaskan individu pada pekerjaan dan cabang produksi tertentu tanpa pilihan. Karena orang biasanya tinggal di dekat tempat kerja mereka karena alasan praktis, dan mereka tidak dapat memilih pekerjaan mereka, akibatnya mereka tidak dapat memilih tempat tinggal. Hal ini menunjukkan bagaimana ketidakbebasan ekonomi menciptakan efek domino, yang secara sistematis menghilangkan kebebasan pribadi lainnya yang mungkin tampak tidak terkait dengan ekonomi.
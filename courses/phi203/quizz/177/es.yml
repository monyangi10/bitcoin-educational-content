question: Según el análisis liberal, ¿por qué la supresión de la libertad económica en un sistema colectivista conduce inevitablemente a la pérdida de la libertad de residencia y domicilio?
answer: Porque sin libertad de elección de trabajo, las personas deben vivir cerca del lugar de trabajo asignado y no pueden elegir su residencia
wrong_answers:
  - Porque el Estado necesita vigilar de cerca a los ciudadanos y debe concentrarlos en zonas residenciales designadas
  - Porque la propiedad colectiva de bienes significa que los individuos no pueden ser propietarios de viviendas y deben aceptar las viviendas asignadas por el Estado
  - Porque la planificación económica requiere que la distribución de la población se ajuste a la disponibilidad de recursos en las distintas regiones
explanation: |
  El análisis liberal demuestra una cadena causal directa: en un sistema colectivista, el Estado asigna a los individuos puestos de trabajo y ramas de producción específicos sin que ellos lo elijan. Dado que las personas suelen vivir cerca de su lugar de trabajo por razones prácticas, y no pueden elegir su trabajo, en consecuencia no pueden elegir dónde vivir. Esto demuestra cómo la falta de libertad económica crea un efecto dominó, eliminando sistemáticamente otras libertades personales que podrían parecer no relacionadas con la economía.
question: According to liberal analysis, why does the suppression of economic freedom in a collectivist system inevitably lead to the loss of freedom of residence and domicile?
answer: Because without freedom to choose one's work, people must live near their assigned workplace and cannot select their residence
wrong_answers:
  - Because the state needs to monitor citizens closely and must concentrate them in designated residential areas
  - Because collective ownership of property means individuals cannot own homes and must accept state-assigned housing
  - Because economic planning requires population distribution to match resource availability in different regions
explanation: |
  The liberal analysis demonstrates a direct causal chain: in a collectivist system, the state assigns individuals to specific jobs and production branches without their choice. Since people typically live near their workplace for practical reasons, and they cannot choose their work, they consequently cannot choose where to live. This shows how economic unfreedom creates a domino effect, systematically eliminating other personal freedoms that might seem unrelated to economics.

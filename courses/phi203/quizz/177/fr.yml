question: Selon l'analyse libérale, pourquoi la suppression de la liberté économique dans un système collectiviste conduit-elle inévitablement à la perte de la liberté de résidence et de domicile ?
answer: En effet, en l'absence de liberté de choisir son travail, les personnes doivent vivre à proximité du lieu de travail qui leur a été attribué et ne peuvent pas choisir leur résidence
wrong_answers:
  - Parce que l'État doit surveiller étroitement les citoyens et les concentrer dans des zones résidentielles désignées
  - Parce que la propriété collective signifie que les individus ne peuvent pas être propriétaires de leur logement et qu'ils doivent accepter les logements attribués par l'État
  - La planification économique nécessite une répartition de la population en fonction des ressources disponibles dans les différentes régions
explanation: |
  L'analyse libérale démontre une chaîne de causalité directe : dans un système collectiviste, l'État affecte les individus à des emplois et à des branches de production spécifiques sans qu'ils aient le choix. Comme les gens vivent généralement près de leur lieu de travail pour des raisons pratiques, et qu'ils ne peuvent pas choisir leur travail, ils ne peuvent par conséquent pas choisir leur lieu de vie. Cela montre comment la non-liberté économique crée un effet domino, éliminant systématiquement d'autres libertés personnelles qui pourraient sembler sans rapport avec l'économie.
question: Защо според либералния анализ потискането на икономическата свобода в една колективистична система неизбежно води до загуба на свободата на пребиваване и местоживеене?
answer: Защото без свобода на избор на работа хората трябва да живеят в близост до определеното им работно място и не могат да избират местоживеенето си
wrong_answers:
  - Тъй като държавата трябва да следи гражданите отблизо и да ги концентрира в определени жилищни зони
  - Тъй като колективната собственост означава, че хората не могат да притежават жилища и трябва да приемат предоставените им от държавата жилища
  - Тъй като икономическото планиране изисква разпределението на населението да съответства на наличните ресурси в различните региони
explanation: |
  Либералният анализ показва пряка причинно-следствена верига: в колективистичната система държавата разпределя хората на определени работни места и производствени отрасли без техен избор. Тъй като по практически причини хората обикновено живеят в близост до работното си място и не могат да избират работата си, те съответно не могат да избират и къде да живеят. Това показва как икономическата несвобода създава ефекта на доминото, като систематично премахва други лични свободи, които може да изглеждат несвързани с икономиката.
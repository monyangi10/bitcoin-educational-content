question: بر اساس تحلیل لیبرال، چرا سرکوب آزادی اقتصادی در یک سیستم جمع‌گرایانه به طور اجتناب‌ناپذیری به از دست دادن آزادی اقامت و مسکن منجر می‌شود؟
answer: زیرا بدون آزادی در انتخاب شغل، افراد مجبورند نزدیک به محل کار تعیین‌شده خود زندگی کنند و نمی‌توانند محل اقامت خود را انتخاب کنند.
wrong_answers:
  - زیرا دولت نیاز دارد که شهروندان را به دقت نظارت کند و باید آنها را در مناطق مسکونی تعیین‌شده متمرکز کند.
  - زیرا مالکیت جمعی اموال به این معناست که افراد نمی‌توانند خانه‌های خود را داشته باشند و باید مسکن اختصاص داده شده توسط دولت را بپذیرند.
  - زیرا برنامه‌ریزی اقتصادی نیاز دارد که توزیع جمعیت با دسترسی به منابع در مناطق مختلف مطابقت داشته باشد
explanation: |
  تحلیل لیبرال یک زنجیره علّی مستقیم را نشان می‌دهد: در یک سیستم جمع‌گرایانه، دولت افراد را بدون انتخاب آن‌ها به مشاغل و شاخه‌های تولید خاص اختصاص می‌دهد. از آنجا که افراد معمولاً به دلایل عملی نزدیک به محل کار خود زندگی می‌کنند و نمی‌توانند کار خود را انتخاب کنند، در نتیجه نمی‌توانند محل زندگی خود را نیز انتخاب کنند. این نشان می‌دهد که چگونه عدم آزادی اقتصادی یک اثر دومینو ایجاد می‌کند که به طور سیستماتیک سایر آزادی‌های شخصی که ممکن است به نظر برسد با اقتصاد مرتبط نیستند را از بین می‌برد.
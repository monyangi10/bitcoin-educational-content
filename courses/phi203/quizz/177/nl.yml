question: Waarom leidt de onderdrukking van de economische vrijheid in een collectivistisch systeem volgens de liberale analyse onvermijdelijk tot het verlies van de vrijheid van woon- en verblijfplaats?
answer: Omdat mensen zonder vrije beroepskeuze in de buurt van hun toegewezen werkplek moeten wonen en hun woonplaats niet kunnen kiezen
wrong_answers:
  - Omdat de staat burgers nauwlettend in de gaten moet houden en ze moet concentreren in aangewezen woongebieden
  - Omdat collectief eigendom van onroerend goed betekent dat individuen geen eigen huis kunnen bezitten en door de staat toegewezen huisvesting moeten accepteren
  - Omdat voor economische planning de bevolkingsspreiding moet worden afgestemd op de beschikbaarheid van hulpbronnen in verschillende regio's
explanation: |
  De liberale analyse toont een directe causale keten aan: in een collectivistisch systeem wijst de staat mensen zonder hun keuze toe aan specifieke banen en productietakken. Omdat mensen om praktische redenen meestal in de buurt van hun werk wonen en hun werk niet kunnen kiezen, kunnen ze bijgevolg ook niet kiezen waar ze willen wonen. Dit laat zien hoe economische onvrijheid een domino-effect creëert, waarbij andere persoonlijke vrijheden die geen verband lijken te houden met economie, systematisch worden geëlimineerd.
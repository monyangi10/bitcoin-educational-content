question: Milline põhimõtteline vastuolu esineb liberaalse filosoofia kohaselt sotsialistlikus mõtlemises seoses omandiõigustega eri organisatsioonilistel tasanditel?
answer: Sotsiaaldemokraadid kaitsevad kollektiivseid omandiõigusi riiklikul tasandil, lükates samas tagasi individuaalsed omandiõigused, hoolimata sellest, et mõlemad tulenevad samadest omandi- ja paranduspõhimõtetest
wrong_answers:
  - Sotsiaaldemokraadid toetavad üksikisikute eraomandit, kuid on vastu rühmade kollektiivsele omandiõigusele, mis tekitab nende majandusteoorias vastuolu
  - Sotsiaaldemokraadid lükkavad tagasi kõik omandiõiguse vormid võrdselt, olgu need siis individuaalsed või kollektiivsed, mis muudab nende seisukoha sisemiselt järjekindlaks, kuid praktiliselt võimatuks
  - Sotsiaaldemokraadid aktsepteerivad omandiõigust ainult põllumajandusmaa puhul, kuid lükkavad selle tagasi tööstuslike varade puhul, tehes meelevaldset vahet omandiliikide vahel
explanation: |
  Peatükist selgub, et sotsialistid kaitsevad paradoksaalselt riigipiire ja kollektiivset omandiõigust, rünnates samal ajal individuaalset omandiõigust. Nii riiklikud territooriumid kui ka eraomand tekivad sarnaste avastamis-, täiustamis- ja kaitsmisprotsesside kaudu. Rahvused omandasid territooriumid uurimise teel ja arendasid neid põllumajanduse ja infrastruktuuri kaudu, nagu üksikisikud omandavad ja parandavad eraomandit. Vastuolu seisneb selles, et tunnustatakse kollektiivide omandiõigust, kuid eitatakse samasuguseid põhiõigusi üksikisikutele, kuigi mõlemad põhinevad identsetel omandi-, töö- ja paranduspõhimõtetel.
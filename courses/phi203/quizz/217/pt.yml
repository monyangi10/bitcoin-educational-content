question: De acordo com a filosofia liberal, que inconsistência fundamental existe no pensamento socialista relativamente aos direitos de propriedade em diferentes escalas de organização?
answer: Os socialistas defendem o direito de propriedade colectiva a nível nacional e rejeitam o direito de propriedade individual, apesar de ambos terem origem nos mesmos princípios de posse e melhoramento
wrong_answers:
  - Os socialistas apoiam a propriedade privada para os indivíduos mas opõem-se à propriedade colectiva para os grupos, criando uma contradição na sua teoria económica
  - Os socialistas rejeitam igualmente todas as formas de direitos de propriedade, sejam eles individuais ou colectivos, o que torna a sua posição internamente coerente mas praticamente impossível
  - Os socialistas aceitam o direito de propriedade apenas para as terras agrícolas e rejeitam-no para os bens industriais, criando uma distinção arbitrária entre tipos de propriedade
explanation: |
  O capítulo revela que os socialistas defendem paradoxalmente as fronteiras nacionais e os direitos de propriedade colectiva, ao mesmo tempo que atacam os direitos de propriedade individual. Tanto os territórios nacionais como a propriedade privada têm origem em processos semelhantes de descoberta, melhoramento e defesa. As nações adquiriram territórios através da exploração e desenvolveram-nos através da agricultura e das infra-estruturas, tal como os indivíduos adquirem e melhoram a propriedade privada. A incoerência reside no reconhecimento de direitos de propriedade às colectividades e na negação dos mesmos direitos fundamentais aos indivíduos, apesar de ambos se basearem em princípios idênticos de posse, trabalho e melhoramento.
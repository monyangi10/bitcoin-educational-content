question: 自由主義哲学によれば、異なる組織規模における財産権に関して、社会主義的思考にはどのような根本的矛盾が存在するのか？
answer: 社会主義者は、国レベルの集団的財産権を擁護する一方で、個人の財産権を否定している。どちらも所有と改良という同じ原則に由来しているにもかかわらず。
wrong_answers:
  - 社会主義者は、個人の私有財産は支持するが、集団による集団所有には反対する。
  - 社会主義者は、個人的なものであれ集団的なものであれ、あらゆる形態の財産権を等しく否定するため、彼らの立場は内部的には一貫しているが、現実的には不可能である。
  - 社会主義者は所有権を農地だけに認め、工業用資産には認めない。
explanation: |
  この章では、社会主義者が個人の財産権を攻撃する一方で、逆説的に国境と集団的財産権を擁護していることを明らかにする。国家領土も私有財産も、発見、改良、防衛という同様のプロセスを経て生まれたものである。国家は探検を通じて領土を獲得し、農業やインフラを通じて領土を発展させてきた。どちらも所有、労働、改良という同一の原則に基づいているにもかかわらず、集団に財産権を認めながら、個人には同じ基本的権利を否定するという矛盾がある。
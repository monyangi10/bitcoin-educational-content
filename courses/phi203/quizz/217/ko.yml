question: 자유주의 철학에 따르면, 다양한 규모의 조직에서 재산권에 관한 사회주의적 사고에는 어떤 근본적인 모순이 존재하나요?
answer: 사회주의자들은 소유와 개선이라는 동일한 원칙에서 비롯되었음에도 불구하고 개인의 재산권을 거부하면서 국가 차원의 집단적 재산권을 옹호합니다
wrong_answers:
  - 사회주의자들은 개인의 사유 재산은 지지하지만 집단의 집단 소유는 반대하여 경제 이론에 모순을 일으킵니다
  - 사회주의자들은 개인이든 집단이든 모든 형태의 재산권을 동등하게 거부하기 때문에 내부적으로 일관된 입장을 취하지만 실질적으로는 불가능합니다
  - 사회주의자들은 농지에 대해서만 재산권을 인정하고 산업 자산에 대해서는 거부하여 재산 유형을 자의적으로 구분합니다
explanation: |
  이 장에서는 사회주의자들이 개인의 재산권을 공격하면서 역설적으로 국경과 집단적 재산권을 옹호한다는 사실을 밝힙니다. 국가 영토와 사유 재산은 모두 발견, 개선, 방어라는 유사한 과정을 통해 생겨났습니다. 국가는 탐험을 통해 영토를 획득하고 농업과 인프라를 통해 영토를 개발했으며, 개인은 사유 재산을 획득하고 개량하는 것과 마찬가지로 영토를 개발했습니다. 소유, 노동, 개량이라는 동일한 원칙에 기반하고 있음에도 불구하고 집단에게는 재산권을 인정하는 반면 개인에게는 동일한 기본권을 부정하는 것은 모순입니다.
question: Mikä on liberaalin filosofian mukaan sosialistisessa ajattelussa vallitseva perustavanlaatuinen epäjohdonmukaisuus, joka koskee omistusoikeuksia eri organisaatiotasoilla?
answer: Sosialistit puolustavat kollektiivisia omistusoikeuksia kansallisella tasolla ja hylkäävät yksilölliset omistusoikeudet, vaikka molemmat perustuvat samoihin omistamisen ja parantamisen periaatteisiin
wrong_answers:
  - Sosialistit kannattavat yksilöiden yksityisomistusta mutta vastustavat ryhmien yhteisomistusta, mikä aiheuttaa ristiriidan heidän talousteoriaansa
  - Sosialistit hylkäävät kaikki omistusoikeuden muodot yhtä lailla, olivatpa ne sitten yksilöllisiä tai kollektiivisia, mikä tekee heidän kannastaan sisäisesti johdonmukaisen mutta käytännössä mahdottoman
  - Sosialistit hyväksyvät omistusoikeudet vain maatalousmaalle mutta hylkäävät ne teollisuusomaisuuden osalta, mikä tekee mielivaltaisen eron omaisuustyyppien välille
explanation: |
  Luvussa paljastetaan, että sosialistit puolustavat paradoksaalisesti kansallisia rajoja ja kollektiivisia omistusoikeuksia ja hyökkäävät samalla yksilön omistusoikeuksia vastaan. Sekä kansalliset alueet että yksityisomistus syntyvät samankaltaisten löytämisen, parantamisen ja puolustamisen prosessien kautta. Kansakunnat hankkivat alueita löytöretkien kautta ja kehittivät niitä maatalouden ja infrastruktuurin avulla, aivan kuten yksilöt hankkivat ja parantavat yksityisomaisuutta. Epäjohdonmukaisuus on siinä, että tunnustetaan kollektiivien omistusoikeudet ja kielletään samat perusoikeudet yksilöiltä, vaikka molemmat perustuvat samanlaisiin omistamisen, työnteon ja parantamisen periaatteisiin.
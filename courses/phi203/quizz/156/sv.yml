question: Vilken är enligt liberal ekonomisk teori den främsta konsekvensen av att politiska myndigheter manipulerar penningmängden på kommersiella marknader?
answer: Det skapar prisinstabilitet och osäkerhet eftersom den monetära signalen blir otillförlitlig när myndigheterna godtyckligt kan ändra valutainnehållet
wrong_answers:
  - Den stärker den nationella suveräniteten genom att etablera en tydlig territoriell kontroll över ekonomiska transaktioner inom statens gränser
  - Det förbättrar den ekonomiska effektiviteten genom att möjliggöra centraliserad samordning av växelkurser och standardiserade prissättningsmekanismer på olika marknader
  - Den minskar transaktionskostnaderna genom att eliminera behovet av flera konkurrerande valutor och förenkla kommersiella beräkningar
explanation: |
  I kapitlet förklaras att penningpolitisk manipulation leder till inflation och destabiliserar priserna eftersom den monetära signalen blir osäker när myndigheterna godtyckligt kan ändra valutans innehåll. Nicolas Oresmes medeltida analys visade hur valutaförsvagning stör kommersiella utbyten. De felaktiga svaren återspeglar vanliga motiveringar för statlig monetär kontroll, men den liberala kritiken betonar att sådan manipulation tjänar politisk finansiering snarare än ekonomisk effektivitet, vilket gör att frivilliga utbytesmekanismer som remburser är att föredra framför påtvingade valutor.
question: Según la teoría económica liberal, ¿cuál es la principal consecuencia de la manipulación monetaria por parte de las autoridades políticas en los intercambios comerciales?
answer: Crea inestabilidad de precios e incertidumbre porque la señal monetaria deja de ser fiable cuando las autoridades pueden modificar arbitrariamente el contenido de la moneda
wrong_answers:
  - Refuerza la soberanía nacional al establecer un claro control territorial sobre las transacciones económicas dentro de las fronteras estatales
  - Mejora la eficiencia económica al permitir la coordinación centralizada de los tipos de cambio y la estandarización de los mecanismos de fijación de precios en todos los mercados
  - Reduce los costes de las transacciones al eliminar la necesidad de múltiples monedas competidoras y simplificar los cálculos comerciales
explanation: |
  El capítulo explica que la manipulación monetaria produce inflación y desestabiliza los precios porque la señal monetaria se vuelve incierta cuando las autoridades pueden modificar arbitrariamente el contenido de la moneda. El análisis medieval de Nicolas Oresme muestra cómo el envilecimiento de la moneda perturba los intercambios comerciales. Las respuestas erróneas reflejan las justificaciones comunes del control monetario estatal, pero la crítica liberal subraya que dicha manipulación sirve a la financiación política más que a la eficiencia económica, lo que hace que los mecanismos de intercambio voluntario como las cartas de crédito sean preferibles a las monedas impuestas.
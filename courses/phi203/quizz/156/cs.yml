question: Jaký je podle liberální ekonomické teorie hlavní důsledek měnové manipulace ze strany politických orgánů na obchodní burzy?
answer: Vytváří cenovou nestabilitu a nejistotu, protože měnový signál se stává nespolehlivým, když úřady mohou libovolně měnit obsah měny
wrong_answers:
  - Posiluje národní suverenitu tím, že zavádí jasnou územní kontrolu nad hospodářskými transakcemi uvnitř státních hranic
  - Zlepšuje ekonomickou efektivnost tím, že umožňuje centralizovanou koordinaci směnných kurzů a standardizované mechanismy tvorby cen na všech trzích
  - Snižuje transakční náklady tím, že eliminuje potřebu používat více konkurenčních měn a zjednodušuje obchodní výpočty
explanation: |
  Kapitola vysvětluje, že měnová manipulace vyvolává inflaci a destabilizuje ceny, protože měnový signál se stává nejistým, když mohou autority libovolně měnit obsah měny. Středověká analýza Nicolase Oresmeho ukázala, jak znehodnocování měny narušuje obchodní směny. Špatné odpovědi odrážejí běžná ospravedlnění státní měnové kontroly, ale liberální kritika zdůrazňuje, že taková manipulace slouží spíše politickému financování než ekonomické efektivitě, takže dobrovolné směnné mechanismy, jako jsou akreditivy, jsou vhodnější než vnucené měny.
question: ตามทฤษฎีเศรษฐศาสตร์เสรี ผลที่ตามมาหลักของการจัดการทางการเงินโดยเจ้าหน้าที่ทางการเมืองต่อการแลกเปลี่ยนทางการค้าคืออะไร?
answer: มันสร้างความไม่มั่นคงของราคาและความไม่แน่นอนเนื่องจากสัญญาณทางการเงินกลายเป็นไม่น่าเชื่อถือเมื่อเจ้าหน้าที่สามารถปรับเปลี่ยนเนื้อหาของสกุลเงินได้ตามอำเภอใจ
wrong_answers:
  - มันเสริมสร้างอธิปไตยของชาติด้วยการกำหนดการควบคุมดินแดนที่ชัดเจนเหนือธุรกรรมทางเศรษฐกิจภายในขอบเขตของรัฐ
  - มันช่วยเพิ่มประสิทธิภาพทางเศรษฐกิจโดยการอนุญาตให้มีการประสานงานแบบรวมศูนย์ของอัตราแลกเปลี่ยนและกลไกราคามาตรฐานในตลาดต่างๆ
  - มันลดต้นทุนการทำธุรกรรมโดยการกำจัดความจำเป็นในการใช้สกุลเงินที่แข่งขันกันหลายสกุลและทำให้การคำนวณทางการค้ากลายเป็นเรื่องง่าย
explanation: |
  บทนี้อธิบายว่าการจัดการทางการเงินทำให้เกิดเงินเฟ้อและทำให้ราคาผันผวนเนื่องจากสัญญาณทางการเงินกลายเป็นไม่แน่นอนเมื่อเจ้าหน้าที่สามารถปรับเปลี่ยนเนื้อหาของสกุลเงินได้ตามอำเภอใจ การวิเคราะห์ในยุคกลางของ Nicolas Oresme แสดงให้เห็นว่าการลดค่าเงินทำให้การแลกเปลี่ยนทางการค้าถูกขัดขวางอย่างไร คำตอบที่ผิดสะท้อนถึงการให้เหตุผลทั่วไปสำหรับการควบคุมเงินของรัฐ แต่การวิจารณ์แบบเสรีนิยมเน้นว่าการจัดการดังกล่าวให้บริการทางการเมืองมากกว่าประสิทธิภาพทางเศรษฐกิจ ทำให้กลไกการแลกเปลี่ยนโดยสมัครใจเช่นหนังสือเครดิตเป็นที่ต้องการมากกว่าสกุลเงินที่ถูกบังคับใช้
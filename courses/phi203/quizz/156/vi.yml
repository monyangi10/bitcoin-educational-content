question: Theo lý thuyết kinh tế tự do, hậu quả chính của việc thao túng tiền tệ bởi các nhà chức trách chính trị đối với hoạt động thương mại là gì?
answer: Điều này tạo ra sự bất ổn và không chắc chắn về giá cả vì tín hiệu tiền tệ trở nên không đáng tin cậy khi các nhà chức trách có thể tùy ý thay đổi nội dung tiền tệ.
wrong_answers:
  - Nó củng cố chủ quyền quốc gia bằng cách thiết lập quyền kiểm soát lãnh thổ rõ ràng đối với các giao dịch kinh tế trong phạm vi biên giới quốc gia.
  - Nó cải thiện hiệu quả kinh tế bằng cách cho phép điều phối tập trung tỷ giá hối đoái và các cơ chế định giá tiêu chuẩn hóa trên toàn thị trường.
  - Nó giúp giảm chi phí giao dịch bằng cách loại bỏ nhu cầu sử dụng nhiều loại tiền tệ cạnh tranh và đơn giản hóa các tính toán thương mại.
explanation: |
  Chương này giải thích rằng việc thao túng tiền tệ gây ra lạm phát và làm bất ổn giá cả vì tín hiệu tiền tệ trở nên không chắc chắn khi chính quyền có thể tùy ý thay đổi hàm lượng tiền tệ. Phân tích thời trung cổ của Nicolas Oresme đã chỉ ra cách việc phá giá tiền tệ làm gián đoạn các hoạt động trao đổi thương mại. Những câu trả lời sai phản ánh những lý lẽ biện minh phổ biến cho việc kiểm soát tiền tệ của nhà nước, nhưng phê bình theo quan điểm tự do nhấn mạnh rằng việc thao túng như vậy phục vụ cho việc tài trợ chính trị hơn là hiệu quả kinh tế, khiến các cơ chế trao đổi tự nguyện như thư tín dụng được ưa chuộng hơn so với tiền tệ áp đặt.
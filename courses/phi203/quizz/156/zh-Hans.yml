question: 根据自由主义经济理论，政治当局操纵货币对商业交换的主要后果是什么？
answer: 它造成了价格的不稳定和不确定性，因为当当局可以任意改变货币含量时，货币信号就变得不可靠了。
wrong_answers:
  - 它通过对国家边界内的经济交易建立明确的领土控制来加强国家主权
  - 通过集中协调汇率和标准化的市场定价机制，提高了经济效率
  - 它无需使用多种竞争货币，简化了商业计算，从而降低了交易成本
explanation: |
  本章解释了货币操纵会产生通货膨胀并破坏价格稳定，因为当当局可以任意修改货币含量时，货币信号就会变得不确定。尼古拉-奥雷斯姆（Nicolas Oresme）的中世纪分析展示了货币贬值是如何扰乱商业交换的。错误答案反映了国家货币控制的常见理由，但自由主义批评强调，这种操纵是为了政治融资而非经济效益，因此信用证等自愿交换机制比强加的货币更可取。
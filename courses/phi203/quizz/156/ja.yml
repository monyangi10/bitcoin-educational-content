question: 自由主義経済理論によれば、政治権力による通貨操作が商業取引にもたらす主な結果とは何か？
answer: 当局が恣意的に通貨内容を変更できるようになると、金融シグナルが信頼できなくなるため、物価の不安定性と不確実性が生じる。
wrong_answers:
  - 国家境界内の経済取引に対する明確な領土管理を確立することで、国家主権を強化する。
  - 為替レートの一元的な調整と市場間の標準化された価格設定メカニズムを可能にすることで、経済効率を向上させる。
  - 競合する複数の通貨が不要になり、商業計算が簡素化されるため、取引コストが削減される。
explanation: |
  この章では、当局が通貨の内容を恣意的に変更できるようになると、通貨シグナルが不確実なものになるため、金融操作がインフレを生み、物価を不安定化させると説明している。ニコラ・オレズメの中世の分析は、通貨安がいかに商業交流を混乱させるかを示した。間違った答えは、国家による通貨管理を正当化する一般的な理由を反映しているが、リベラル派の批評は、このような操作は経済的効率よりも政治的資金調達に役立つことを強調し、信用状のような自発的な交換メカニズムが、押し付けられた通貨よりも望ましいとしている。
question: Secondo la teoria economica liberale, qual è la principale conseguenza della manipolazione monetaria da parte delle autorità politiche sugli scambi commerciali?
answer: Crea instabilità dei prezzi e incertezza perché il segnale monetario diventa inaffidabile quando le autorità possono modificare arbitrariamente il contenuto della valuta
wrong_answers:
  - Rafforza la sovranità nazionale stabilendo un chiaro controllo territoriale sulle transazioni economiche all'interno dei confini statali
  - Migliora l'efficienza economica consentendo un coordinamento centralizzato dei tassi di cambio e meccanismi di determinazione dei prezzi standardizzati tra i mercati
  - Riduce i costi delle transazioni eliminando la necessità di utilizzare più valute concorrenti e semplificando i calcoli commerciali
explanation: |
  Il capitolo spiega che la manipolazione monetaria produce inflazione e destabilizza i prezzi perché il segnale monetario diventa incerto quando le autorità possono modificare arbitrariamente il contenuto della moneta. L'analisi medievale di Nicolas Oresme ha mostrato come lo svilimento della moneta perturbi gli scambi commerciali. Le risposte sbagliate riflettono le giustificazioni comuni per il controllo monetario statale, ma la critica liberale sottolinea che tale manipolazione serve al finanziamento politico piuttosto che all'efficienza economica, rendendo i meccanismi di scambio volontari come le lettere di credito preferibili alle valute imposte.
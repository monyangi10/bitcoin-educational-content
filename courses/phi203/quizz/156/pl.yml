question: Jaka jest, według liberalnej teorii ekonomii, główna konsekwencja manipulacji monetarnych dokonywanych przez władze polityczne na giełdach handlowych?
answer: Powoduje to niestabilność cen i niepewność, ponieważ sygnał monetarny staje się niewiarygodny, gdy władze mogą arbitralnie zmieniać zawartość waluty
wrong_answers:
  - Wzmacnia suwerenność narodową poprzez ustanowienie wyraźnej kontroli terytorialnej nad transakcjami gospodarczymi w granicach państwa
  - Poprawia efektywność ekonomiczną, umożliwiając scentralizowaną koordynację kursów wymiany i znormalizowanych mechanizmów cenowych na różnych rynkach
  - Zmniejsza koszty transakcji, eliminując potrzebę stosowania wielu konkurencyjnych walut i upraszczając obliczenia handlowe
explanation: |
  Rozdział ten wyjaśnia, że manipulacje monetarne powodują inflację i destabilizują ceny, ponieważ sygnał monetarny staje się niepewny, gdy władze mogą arbitralnie modyfikować zawartość waluty. Średniowieczna analiza Nicolasa Oresme pokazała, w jaki sposób osłabienie waluty zakłóca wymianę handlową. Błędne odpowiedzi odzwierciedlają powszechne uzasadnienia dla państwowej kontroli monetarnej, ale liberalna krytyka podkreśla, że taka manipulacja służy raczej finansowaniu politycznemu niż efektywności ekonomicznej, co sprawia, że dobrowolne mechanizmy wymiany, takie jak akredytywy, są lepsze niż narzucone waluty.
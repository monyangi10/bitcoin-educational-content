question: Milline on liberaalse majandusteooria kohaselt poliitiliste võimude poolse rahapoliitilise manipuleerimise peamine tagajärg kaubavahetusele?
answer: See tekitab hindade ebastabiilsust ja ebakindlust, sest rahasignaal muutub ebausaldusväärseks, kui ametiasutused võivad omavoliliselt muuta valuuta sisu
wrong_answers:
  - See tugevdab riigi suveräänsust, kehtestades selge territoriaalse kontrolli majandustehingute üle riigi piirides
  - See parandab majanduslikku tõhusust, võimaldades vahetuskursside tsentraliseeritud kooskõlastamist ja standardiseeritud hinnakujundusmehhanisme kogu turul
  - See vähendab tehingukulusid, kuna ei ole vaja kasutada mitut konkureerivat valuutat ja lihtsustab kaubandusarvutusi
explanation: |
  Peatükis selgitatakse, et rahapoliitika manipuleerimine tekitab inflatsiooni ja destabiliseerib hindu, sest rahasignaal muutub ebakindlaks, kui ametiasutused saavad omavoliliselt muuta valuuta sisu. Nicolas Oresme'i keskaegne analüüs näitas, kuidas valuuta devalveerimine häirib kaubavahetust. Väärad vastused kajastavad riigi rahakontrolli tavalisi põhjendusi, kuid liberaalne kriitika rõhutab, et selline manipuleerimine teenib pigem poliitilist rahastamist kui majanduslikku tõhusust, mistõttu vabatahtlikud vahetusmehhanismid, nagu akreditiivid, on eelistatavamad peale surutud valuutadele.
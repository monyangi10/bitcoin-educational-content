question: بر اساس نظریه اقتصادی لیبرال، پیامد اصلی دستکاری پولی توسط مقامات سیاسی بر مبادلات تجاری چیست؟
answer: این باعث بی‌ثباتی و عدم قطعیت قیمت می‌شود زیرا سیگنال پولی غیرقابل اعتماد می‌شود وقتی که مقامات می‌توانند به‌طور دلخواه محتوای ارز را تغییر دهند.
wrong_answers:
  - این امر با ایجاد کنترل سرزمینی واضح بر معاملات اقتصادی در مرزهای دولتی، حاکمیت ملی را تقویت می‌کند.
  - این امر با امکان هماهنگی متمرکز نرخ‌های ارز و مکانیزم‌های قیمت‌گذاری استاندارد در بازارها، کارایی اقتصادی را بهبود می‌بخشد.
  - این امر با حذف نیاز به ارزهای متعدد رقابتی و ساده‌سازی محاسبات تجاری، هزینه‌های تراکنش را کاهش می‌دهد.
explanation: |
  این فصل توضیح می‌دهد که دستکاری پولی باعث تورم و بی‌ثباتی قیمت‌ها می‌شود زیرا سیگنال پولی زمانی نامشخص می‌شود که مقامات بتوانند محتوای ارز را به‌طور دلخواه تغییر دهند. تحلیل قرون وسطایی نیکلاس اورسم نشان داد که چگونه کاهش ارزش ارز مبادلات تجاری را مختل می‌کند. پاسخ‌های نادرست توجیهات رایج برای کنترل پولی دولت را منعکس می‌کنند، اما نقد لیبرال تأکید می‌کند که چنین دستکاری‌هایی به جای کارایی اقتصادی، به تأمین مالی سیاسی خدمت می‌کنند و مکانیسم‌های مبادله داوطلبانه مانند اعتبارنامه‌ها را به ارزهای تحمیلی ترجیح می‌دهد.
question: De acordo com a teoria económica liberal, qual é a principal consequência da manipulação monetária pelas autoridades políticas nas trocas comerciais?
answer: Cria instabilidade de preços e incerteza porque o sinal monetário se torna pouco fiável quando as autoridades podem modificar arbitrariamente o conteúdo da moeda
wrong_answers:
  - Reforça a soberania nacional ao estabelecer um controlo territorial claro sobre as transacções económicas dentro das fronteiras do Estado
  - Melhora a eficiência económica ao permitir uma coordenação centralizada das taxas de câmbio e mecanismos de fixação de preços normalizados nos mercados
  - Reduz os custos de transação, eliminando a necessidade de múltiplas moedas concorrentes e simplificando os cálculos comerciais
explanation: |
  O capítulo explica que a manipulação monetária produz inflação e desestabiliza os preços porque o sinal monetário se torna incerto quando as autoridades podem modificar arbitrariamente o conteúdo da moeda. A análise medieval de Nicolas Oresme mostrou como a desvalorização da moeda perturba as trocas comerciais. As respostas erradas reflectem justificações comuns para o controlo monetário estatal, mas a crítica liberal sublinha que essa manipulação serve mais o financiamento político do que a eficiência económica, tornando os mecanismos de troca voluntários, como as cartas de crédito, preferíveis às moedas impostas.
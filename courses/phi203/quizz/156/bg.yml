question: Според либералната икономическа теория коя е основната последица от паричните манипулации на политическите власти върху търговските борси?
answer: Това води до ценова нестабилност и несигурност, тъй като паричният сигнал става ненадежден, когато властите могат произволно да променят съдържанието на валутата
wrong_answers:
  - Той укрепва националния суверенитет, като установява ясен териториален контрол върху икономическите транзакции в рамките на държавните граници
  - Той подобрява икономическата ефективност, като позволява централизирано координиране на обменните курсове и стандартизирани механизми за ценообразуване на различните пазари
  - Той намалява разходите по транзакциите, като премахва необходимостта от множество конкурентни валути и опростява търговските изчисления
explanation: |
  В главата се обяснява, че паричните манипулации водят до инфлация и дестабилизиране на цените, тъй като паричният сигнал става несигурен, когато властите могат произволно да променят съдържанието на валутата. Средновековният анализ на Никола Оресме показва как обезценяването на валутата нарушава търговския обмен. Грешните отговори отразяват обичайните оправдания за държавния паричен контрол, но либералната критика подчертава, че подобни манипулации служат по-скоро на политическото финансиране, отколкото на икономическата ефективност, което прави доброволните механизми за размяна като акредитивите за предпочитане пред наложените валути.
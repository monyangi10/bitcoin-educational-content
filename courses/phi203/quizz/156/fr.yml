question: Selon la théorie économique libérale, quelle est la principale conséquence de la manipulation monétaire par les autorités politiques sur les échanges commerciaux ?
answer: Elle crée de l'instabilité et de l'incertitude dans les prix, car le signal monétaire n'est plus fiable lorsque les autorités peuvent modifier arbitrairement le contenu de la monnaie
wrong_answers:
  - Elle renforce la souveraineté nationale en établissant un contrôle territorial clair sur les transactions économiques à l'intérieur des frontières de l'État
  - Elle améliore l'efficacité économique en permettant une coordination centralisée des taux de change et des mécanismes de tarification normalisés sur les marchés
  - Il réduit les coûts de transaction en éliminant la nécessité de recourir à plusieurs monnaies concurrentes et en simplifiant les calculs commerciaux
explanation: |
  Le chapitre explique que les manipulations monétaires produisent de l'inflation et déstabilisent les prix, car le signal monétaire devient incertain lorsque les autorités peuvent modifier arbitrairement le contenu de la monnaie. L'analyse médiévale de Nicolas Oresme a montré comment l'avilissement de la monnaie perturbe les échanges commerciaux. Les mauvaises réponses reflètent les justifications courantes du contrôle monétaire de l'État, mais la critique libérale souligne qu'une telle manipulation sert le financement politique plutôt que l'efficacité économique, ce qui rend les mécanismes d'échange volontaire comme les lettres de crédit préférables aux monnaies imposées.

question: Prema liberalnoj ekonomskoj teoriji, koja je primarna posledica monetarne manipulacije od strane političkih vlasti na komercijalne razmene?
answer: Stvara nestabilnost cena i neizvesnost jer monetarni signal postaje nepouzdan kada vlasti mogu proizvoljno menjati sadržaj valute
wrong_answers:
  - Ojačava nacionalni suverenitet uspostavljanjem jasne teritorijalne kontrole nad ekonomskim transakcijama unutar državnih granica.
  - Poboljšava ekonomsku efikasnost omogućavajući centralizovanu koordinaciju deviznih kurseva i standardizovane mehanizme određivanja cena na tržištima
  - Smanjuje troškove transakcija eliminisanjem potrebe za više konkurentnih valuta i pojednostavljivanjem komercijalnih kalkulacija.
explanation: |
  Poglavlje objašnjava da monetarna manipulacija proizvodi inflaciju i destabilizuje cene jer monetarni signal postaje neizvestan kada vlasti mogu proizvoljno menjati sadržaj valute. Srednjovekovna analiza Nikolasa Oresmea pokazala je kako degradacija valute remeti komercijalne razmene. Pogrešni odgovori odražavaju uobičajena opravdanja za državnu monetarnu kontrolu, ali liberalna kritika naglašava da takva manipulacija služi političkom finansiranju, a ne ekonomskoj efikasnosti, čineći mehanizme dobrovoljne razmene poput akreditiva poželjnijim od nametnutih valuta.
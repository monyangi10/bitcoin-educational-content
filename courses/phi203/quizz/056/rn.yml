question: Ni igiki catumye ubuja buba ubushaje kandi butabereye uko ibikorwa vy’ubutunzi vyagenda biratera imbere?
answer: Ibikorwa vy’ubutunzi vyaciye birushiriza kuba ivy’ubwenge, bisaba ubuhinga bwo kurema n’ubuhinga bushasha abaja batashobora gutanga .
wrong_answers:
  - Igiciro co kubungabunga abaja carabaye ikintu gizimvye cane ugereranije n'ugukoresha abakozi b'ubuntu .
  - Imigwi y’amadini yaremeje abantu yuko ubuja ari ububi mu vy’inyifato runtu be n’uko bukwiye gukurwaho .
  - Amasezerano mpuzamakungu y’ubudandaji yatumye bitemewe n’amategeko gukoresha ubuja mu guhingura ibintu .
explanation: |
  Dukurikije ico canditswe, ubuja bwacitse ubusa igihe ibikorwa vy’ubutunzi vyahinduka biva ku bikorwa vy’umubiri gusa bikaja ku bikorwa vy’ubwenge vyinshi bisaba ubuhinga bwo kurema n’uguhingura ibintu bishasha. Naho abaja bashobora gukora ibikorwa vy’umubiri bacitse intege, ntibashobora gukoresha neza ubushobozi bwabo bwo mu mutwe kugira ngo bashobore guhingura ibintu bishasha canke gutorera umuti ingorane mu buryo bubereye. Uwo mupaka w’ishimikiro watumye urutonde rw’abaja rudahuye n’ivyo ubutunzi bwari bukeneye vyariko birahinduka. Ayandi mahitamwo ntabwo ari meza kubera ko ico canditswe kigaragaza mu buryo budasanzwe ivyo umuntu asaba mu bwenge ari vyo bihambaye, atari ibiciro vy’ubutunzi, imigwi y’idini canke amasezerano y’ubudandaji.
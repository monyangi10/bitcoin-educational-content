question: Кое е причината робството да се превърне в отживелица и неадекватност с развитието на икономическите дейности?
answer: Икономическите дейности стават все по-интелектуални и изискват творчество и иновации, които робите не могат да осигурят
wrong_answers:
  - Разходите за издръжка на роби стават твърде високи в сравнение с наемането на свободни работници
  - Религиозните движения убеждават обществото, че робството е морално грешно и трябва да бъде премахнато
  - Международните търговски споразумения направиха незаконно използването на робски труд в производството
explanation: |
  Според текста робството става излишно, когато икономическите дейности се трансформират от чисто физически задачи към по-интелектуален труд, изискващ творчество и иновации. Макар че робите са можели да изпълняват физически задачи под натиск, те не са можели ефективно да използват умствените си способности за продуктивно изобретяване или творческо решаване на проблеми. Това основно ограничение прави робската система несъвместима с развиващите се икономически нужди. Другите варианти са неправилни, тъй като текстът изрично посочва интелектуалните изисквания като ключов фактор, а не икономическите разходи, религиозните движения или търговските споразумения.
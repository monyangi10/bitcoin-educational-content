question: Что привело к тому, что рабство стало устаревшим и неадекватным по мере развития экономической деятельности?
answer: Экономическая деятельность стала более интеллектуальной, требующей творческого подхода и инноваций, которые рабы не могли обеспечить
wrong_answers:
  - Содержание рабов стало обходиться слишком дорого по сравнению с наймом свободных работников
  - Религиозные движения убеждали общество в том, что рабство морально неправильно и должно быть отменено
  - Международные торговые соглашения сделали незаконным использование рабского труда в производстве
explanation: |
  Согласно тексту, рабство стало немодным, когда экономическая деятельность перешла от чисто физических задач к более интеллектуальному труду, требующему творчества и инноваций. Хотя рабы могли выполнять физические задачи в условиях ограничений, они не могли эффективно задействовать свои умственные способности для продуктивного изобретательства или творческого решения проблем. Это фундаментальное ограничение делало рабовладельческую систему несовместимой с развивающимися экономическими потребностями. Другие варианты неверны, поскольку в тексте ключевым фактором названы именно интеллектуальные потребности, а не экономические издержки, религиозные течения или торговые соглашения.
question: Šta je učinilo da ropstvo postane zastarelo i neadekvatno kako su se ekonomske aktivnosti razvijale?
answer: Ekonomske aktivnosti postale su više intelektualne, zahtevajući kreativnost i inovacije koje robovi nisu mogli pružiti
wrong_answers:
  - Troškovi održavanja robova postali su preskupi u poređenju sa zapošljavanjem slobodnih radnika.
  - Verski pokreti su ubedili društvo da je ropstvo moralno pogrešno i da ga treba ukinuti.
  - Međunarodni trgovinski sporazumi učinili su ilegalnim korišćenje robovske radne snage u proizvodnji
explanation: |
  Prema tekstu, ropstvo je postalo zastarelo kada su se ekonomske aktivnosti transformisale iz čisto fizičkih zadataka u intelektualni rad koji zahteva kreativnost i inovacije. Dok su robovi mogli obavljati fizičke zadatke pod prisilom, nisu mogli efikasno koristiti svoje mentalne sposobnosti za produktivno izmišljanje ili kreativno rešavanje problema. Ovo fundamentalno ograničenje učinilo je sistem ropstva nekompatibilnim sa evoluirajućim ekonomskim potrebama. Ostale opcije su netačne jer tekst specifično identifikuje intelektualne zahteve kao ključni faktor, a ne ekonomske troškove, verske pokrete ili trgovinske sporazume.
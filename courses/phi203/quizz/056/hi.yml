question: What made slavery become obsolete and inadequate as economic activities evolved?
answer: Economic activities became more intellectual, requiring creativity and innovation that slaves could not provide
wrong_answers:
  - The cost of maintaining slaves became too expensive compared to hiring free workers
  - Religious movements convinced society that slavery was morally wrong and should be abolished
  - International trade agreements made it illegal to use slave labor in production
explanation: |
  According to the text, slavery became obsolete when economic activities transformed from purely physical tasks to more intellectual work requiring creativity and innovation. While slaves could perform physical tasks under constraint, they could not effectively engage their mental capacities for productive invention or creative problem-solving. This fundamental limitation made the slave system incompatible with evolving economic needs. The other options are incorrect because the text specifically identifies intellectual demands as the key factor, not economic costs, religious movements, or trade agreements.
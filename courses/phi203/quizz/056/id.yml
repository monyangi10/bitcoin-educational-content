question: Apa yang membuat perbudakan menjadi usang dan tidak memadai seiring dengan berkembangnya kegiatan ekonomi?
answer: Kegiatan ekonomi menjadi lebih intelektual, membutuhkan kreativitas dan inovasi yang tidak dapat disediakan oleh para budak
wrong_answers:
  - Biaya pemeliharaan budak menjadi terlalu mahal dibandingkan dengan mempekerjakan pekerja bebas
  - Gerakan-gerakan keagamaan meyakinkan masyarakat bahwa perbudakan secara moral salah dan harus dihapuskan
  - Perjanjian perdagangan internasional membuat penggunaan tenaga kerja budak dalam produksi menjadi ilegal
explanation: |
  Menurut teks tersebut, perbudakan menjadi usang ketika kegiatan ekonomi berubah dari tugas-tugas fisik semata menjadi pekerjaan yang lebih intelektual yang membutuhkan kreativitas dan inovasi. Meskipun para budak dapat melakukan tugas-tugas fisik di bawah keterbatasan, mereka tidak dapat secara efektif menggunakan kapasitas mental mereka untuk penemuan produktif atau pemecahan masalah secara kreatif. Keterbatasan mendasar ini membuat sistem perbudakan tidak sesuai dengan kebutuhan ekonomi yang terus berkembang. Pilihan-pilihan lain tidak tepat karena teks ini secara khusus mengidentifikasi tuntutan intelektual sebagai faktor kunci, bukan biaya ekonomi, gerakan keagamaan, atau perjanjian perdagangan.
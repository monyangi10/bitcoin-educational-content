question: อะไรทำให้การเป็นทาสกลายเป็นสิ่งล้าสมัยและไม่เพียงพอเมื่อกิจกรรมทางเศรษฐกิจพัฒนาไป?
answer: กิจกรรมทางเศรษฐกิจกลายเป็นเรื่องทางปัญญามากขึ้น ต้องการความคิดสร้างสรรค์และนวัตกรรมที่ทาสไม่สามารถให้ได้
wrong_answers:
  - ต้นทุนในการดูแลทาสกลายเป็นเรื่องที่มีค่าใช้จ่ายสูงเกินไปเมื่อเทียบกับการจ้างแรงงานอิสระ
  - ขบวนการทางศาสนาได้โน้มน้าวสังคมว่าการเป็นทาสนั้นผิดศีลธรรมและควรถูกยกเลิก
  - ข้อตกลงการค้าระหว่างประเทศทำให้การใช้แรงงานทาสในการผลิตเป็นสิ่งผิดกฎหมาย
explanation: |
  ตามข้อความ การเป็นทาสกลายเป็นสิ่งล้าสมัยเมื่อกิจกรรมทางเศรษฐกิจเปลี่ยนจากงานที่ใช้แรงกายล้วนๆ ไปสู่งานที่ใช้สติปัญญามากขึ้นซึ่งต้องการความคิดสร้างสรรค์และนวัตกรรม ในขณะที่ทาสสามารถทำงานที่ใช้แรงกายภายใต้ข้อจำกัดได้ แต่พวกเขาไม่สามารถใช้ความสามารถทางจิตใจในการประดิษฐ์ที่มีประสิทธิผลหรือการแก้ปัญหาอย่างสร้างสรรค์ได้อย่างมีประสิทธิภาพ ข้อจำกัดพื้นฐานนี้ทำให้ระบบทาสไม่สอดคล้องกับความต้องการทางเศรษฐกิจที่พัฒนาไป ตัวเลือกอื่นๆ ไม่ถูกต้องเพราะข้อความระบุชัดเจนว่าความต้องการทางสติปัญญาเป็นปัจจัยสำคัญ ไม่ใช่ต้นทุนทางเศรษฐกิจ ขบวนการทางศาสนา หรือข้อตกลงทางการค้า
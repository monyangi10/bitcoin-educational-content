question: Cosa ha reso la schiavitù obsoleta e inadeguata con l'evoluzione delle attività economiche?
answer: Le attività economiche divennero più intellettuali, richiedendo creatività e innovazione che gli schiavi non erano in grado di fornire
wrong_answers:
  - Il costo del mantenimento degli schiavi divenne troppo oneroso rispetto all'assunzione di lavoratori liberi
  - I movimenti religiosi hanno convinto la società che la schiavitù era moralmente sbagliata e doveva essere abolita
  - Gli accordi commerciali internazionali hanno reso illegale l'uso di manodopera schiavizzata nella produzione
explanation: |
  Secondo il testo, la schiavitù è diventata obsoleta quando le attività economiche si sono trasformate da compiti puramente fisici a lavori più intellettuali che richiedono creatività e innovazione. Mentre gli schiavi potevano svolgere compiti fisici sotto costrizione, non potevano impegnare efficacemente le loro capacità mentali per l'invenzione produttiva o la risoluzione di problemi creativi. Questa limitazione fondamentale rendeva il sistema schiavista incompatibile con l'evoluzione delle esigenze economiche. Le altre opzioni non sono corrette perché il testo identifica specificamente le esigenze intellettuali come il fattore chiave, non i costi economici, i movimenti religiosi o gli accordi commerciali.
question: 경제 활동이 발전함에 따라 노예제도가 쓸모없고 부적절하게 된 이유는 무엇일까요?
answer: 경제 활동이 더욱 지적으로 변하면서 노예가 제공할 수 없었던 창의성과 혁신이 필요해졌습니다
wrong_answers:
  - 노예를 유지하는 데 드는 비용이 무료 노동자를 고용하는 것에 비해 너무 비쌌습니다
  - 종교 운동은 노예제도가 도덕적으로 잘못되었으며 폐지되어야 한다고 사회에 확신시켰습니다
  - 국제 무역 협정에 따라 생산에 노예 노동을 사용하는 것은 불법입니다
explanation: |
  본문에 따르면, 경제 활동이 순전히 육체적인 작업에서 창의성과 혁신이 필요한 지적 작업으로 변화하면서 노예제도는 더 이상 필요하지 않게 되었습니다. 노예는 제약 속에서 육체적 노동은 수행할 수 있었지만, 생산적인 발명이나 창의적인 문제 해결을 위한 정신적 역량을 효과적으로 발휘할 수 없었습니다. 이러한 근본적인 한계로 인해 노예제는 진화하는 경제적 요구와 양립할 수 없었습니다. 본문에서는 경제적 비용, 종교적 운동, 무역 협정이 아닌 지적 요구를 핵심 요소로 명시하고 있기 때문에 다른 옵션은 올바르지 않습니다.
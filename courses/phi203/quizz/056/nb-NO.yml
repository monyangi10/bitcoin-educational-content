question: Hva var det som gjorde at slaveriet ble foreldet og utilstrekkelig etter hvert som de økonomiske aktivitetene utviklet seg?
answer: De økonomiske aktivitetene ble mer intellektuelle og krevde kreativitet og innovasjon som slaver ikke kunne bidra med
wrong_answers:
  - Det ble for dyrt å holde slaver sammenlignet med å ansette frie arbeidere
  - Religiøse bevegelser overbeviste samfunnet om at slaveriet var moralsk galt og burde avskaffes
  - Internasjonale handelsavtaler gjorde det ulovlig å bruke slavearbeid i produksjonen
explanation: |
  Ifølge teksten ble slaveriet avleggs da de økonomiske aktivitetene gikk fra rent fysiske oppgaver til mer intellektuelt arbeid som krevde kreativitet og innovasjon. Selv om slaver kunne utføre fysiske oppgaver under tvang, kunne de ikke bruke sine mentale evner til produktiv oppfinnsomhet eller kreativ problemløsning på en effektiv måte. Denne grunnleggende begrensningen gjorde slavesystemet uforenlig med skiftende økonomiske behov. De andre alternativene er feil fordi teksten spesifikt identifiserer intellektuelle krav som nøkkelfaktoren, ikke økonomiske kostnader, religiøse bevegelser eller handelsavtaler.
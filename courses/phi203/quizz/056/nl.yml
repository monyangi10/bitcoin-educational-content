question: Waardoor werd slavernij overbodig en ontoereikend naarmate de economische activiteiten zich ontwikkelden?
answer: Economische activiteiten werden intellectueler en vereisten creativiteit en innovatie die slaven niet konden bieden
wrong_answers:
  - De kosten voor het onderhouden van slaven werden te duur in vergelijking met het inhuren van vrije arbeiders
  - Religieuze bewegingen overtuigden de samenleving ervan dat slavernij moreel verkeerd was en moest worden afgeschaft
  - Internationale handelsovereenkomsten maakten het gebruik van slavenarbeid in de productie illegaal
explanation: |
  Volgens de tekst werd slavernij overbodig toen economische activiteiten veranderden van puur fysieke taken naar meer intellectueel werk dat creativiteit en innovatie vereiste. Terwijl slaven fysieke taken onder dwang konden uitvoeren, konden ze hun mentale capaciteiten niet effectief inzetten voor productieve uitvindingen of creatieve probleemoplossing. Deze fundamentele beperking maakte het slavensysteem onverenigbaar met de veranderende economische behoeften. De andere opties zijn onjuist omdat de tekst specifiek intellectuele eisen als de sleutelfactor aanwijst, niet economische kosten, religieuze bewegingen of handelsovereenkomsten.
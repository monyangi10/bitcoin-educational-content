question: 是什么原因导致奴隶制随着经济活动的发展而变得过时和不足？
answer: 经济活动变得更加智力化，需要奴隶无法提供的创造力和创新力
wrong_answers:
  - 与雇佣自由工人相比，抚养奴隶的成本变得过于昂贵
  - 宗教运动使社会相信奴隶制在道德上是错误的，应当废除
  - 国际贸易协定规定在生产中使用奴隶劳动是非法的
explanation: |
  根据该文本，当经济活动从纯粹的体力劳动转变为更需要创造力和创新力的脑力劳动时，奴隶制就过时了。虽然奴隶可以在受约束的情况下从事体力劳动，但他们无法有效地利用脑力进行生产性发明或创造性地解决问题。这一根本性的限制使得奴隶制与不断发展的经济需求不相适应。其他选项都不正确，因为文中明确指出智力需求是关键因素，而不是经济成本、宗教运动或贸易协定。
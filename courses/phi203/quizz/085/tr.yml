question: Tarihsel analize göre, devrimler ilerici reformlara kıyasla neden büyük dezavantajlara sahip olma eğilimindedir?
answer: Şiddeti generate yaparlar ve toplumların hazır olduğundan daha fazla değişiklik dayatarak sık sık geri dönüşlere yol açarlar
wrong_answers:
  - Aydınlanma felsefesi ve ekonomi teorisi tarafından sağlanan entelektüel temelden yoksundurlar
  - Acil sosyal ve ekonomik sorunları etkili bir şekilde ele almak için çok yavaş gerçekleşirler
  - Sürdürülebilir ekonomik kalkınma için gerekli maddi koşulları oluşturmakta başarısız olurlar
explanation: |
  Metinde açıkça devrimlerin büyük dezavantajları olduğu, zira çok fazla şiddet içerdikleri ve halkın hazır olduğundan daha fazla değişiklik dayatma eğiliminde oldukları belirtilmekte, bu da devrimleri takip eden sayısız geri dönüşü açıklamaktadır. Bilgilendirilmiş kamuoyu tarafından yönlendirilen ilerici reformlar, koşullar gerçekten izin verdiğinde özgürlüğün benimsenmesine izin verdiği için tercih edilir olarak sunulmaktadır. Diğer seçenekler içeriği yanlış yansıtmaktadır - devrimler yavaş oldukları ya da entelektüel temelden yoksun oldukları için değil, çok güçlü ve erken oldukları için eleştirilmektedir.
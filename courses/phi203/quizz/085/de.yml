question: Warum haben Revolutionen nach der historischen Analyse im Vergleich zu progressiven Reformen in der Regel große Nachteile?
answer: Sie generate Gewalt und erzwingen mehr Veränderungen, als die Bevölkerungen bereit sind, was zu häufigen Rückschlägen führt
wrong_answers:
  - Ihnen fehlt das intellektuelle Fundament, das die Philosophie der Aufklärung und die Wirtschaftstheorie bieten
  - Sie erfolgen zu langsam, um dringende soziale und wirtschaftliche Probleme wirksam anzugehen
  - Sie schaffen nicht die notwendigen materiellen Voraussetzungen für eine nachhaltige wirtschaftliche Entwicklung
explanation: |
  In dem Text wird ausdrücklich darauf hingewiesen, dass Revolutionen große Nachteile haben, weil sie mit viel Gewalt verbunden sind und in der Regel mehr Veränderungen bewirken, als die Bevölkerung bereit ist, woraus sich die zahlreichen Rückschläge erklären, die auf sie folgen. Progressive Reformen, die von einer informierten öffentlichen Meinung geleitet werden, werden als vorteilhaft dargestellt, weil sie es ermöglichen, die Freiheit zu ergreifen, wenn die Bedingungen es wirklich erlauben. Die anderen Optionen stellen den Inhalt falsch dar - Revolutionen werden nicht kritisiert, weil sie langsam sind oder ihnen die intellektuelle Grundlage fehlt, sondern weil sie zu gewaltsam und verfrüht sind.
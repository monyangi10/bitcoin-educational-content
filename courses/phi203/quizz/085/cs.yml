question: Proč mají podle historické analýzy revoluce ve srovnání s progresivními reformami většinou velké nevýhody?
answer: generate násilí a zavádějí více změn, než na kolik je obyvatelstvo připraveno, což vede k častým zvratům
wrong_answers:
  - Chybí jim intelektuální základ, který poskytuje osvícenská filozofie a ekonomická teorie
  - Probíhají příliš pomalu na to, aby mohly účinně řešit naléhavé sociální a ekonomické problémy
  - Nevytvářejí materiální podmínky nezbytné pro udržitelný hospodářský rozvoj
explanation: |
  V textu se výslovně uvádí, že revoluce mají velké nevýhody, protože přinášejí mnoho násilí a mají tendenci přinášet více změn, než na kolik je obyvatelstvo připraveno, což vysvětluje četné zvraty, které po nich následují. Progresivní reformy vedené informovaným veřejným míněním jsou prezentovány jako výhodnější, protože umožňují přijmout svobodu, když to podmínky skutečně dovolí. Ostatní možnosti zkreslují obsah - revoluce nejsou kritizovány za to, že jsou pomalé nebo nemají intelektuální základ, ale za to, že jsou příliš násilné a předčasné.
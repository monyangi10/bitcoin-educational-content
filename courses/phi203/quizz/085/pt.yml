question: De acordo com a análise histórica, porque é que as revoluções tendem a ter grandes desvantagens em relação às reformas progressivas?
answer: Eles generate violência e impõem mais mudanças do que as populações estão preparadas, levando a frequentes reviravoltas
wrong_answers:
  - Falta-lhes a base intelectual fornecida pela filosofia iluminista e pela teoria económica
  - Ocorrem com demasiada lentidão para resolver eficazmente problemas sociais e económicos urgentes
  - Não estabelecem as condições materiais necessárias para um desenvolvimento económico sustentável
explanation: |
  O texto afirma explicitamente que as revoluções têm grandes desvantagens porque são muito violentas e tendem a impor mais mudanças do que a população está preparada, o que explica as numerosas reviravoltas que se lhes seguem. As reformas progressivas, guiadas por uma opinião pública informada, são apresentadas como preferíveis porque permitem adotar a liberdade quando as condições o permitem verdadeiramente. As outras opções deturpam o conteúdo - as revoluções não são criticadas por serem lentas ou carecerem de fundamento intelectual, mas sim por serem demasiado vigorosas e prematuras.
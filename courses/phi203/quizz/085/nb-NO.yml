question: Hvorfor har revolusjoner en tendens til å ha store ulemper sammenlignet med progressive reformer, ifølge den historiske analysen?
answer: De generate vold og gjennomfører flere endringer enn befolkningen er klar for, noe som fører til hyppige tilbakeslag
wrong_answers:
  - De mangler det intellektuelle fundamentet som opplysningstidens filosofi og økonomiske teori gir
  - De skjer for sakte til å løse presserende sosiale og økonomiske problemer på en effektiv måte
  - De klarer ikke å etablere de materielle forutsetningene som er nødvendige for en bærekraftig økonomisk utvikling
explanation: |
  Teksten sier eksplisitt at revolusjoner har store ulemper fordi de er preget av mye vold og har en tendens til å innføre flere endringer enn befolkningen er forberedt på, noe som forklarer de mange tilbakeslagene som følger etter dem. Progressive reformer styrt av en informert opinion presenteres som å foretrekke, fordi de gjør det mulig å innføre frihet når forholdene virkelig tillater det. De andre alternativene gir en feilaktig fremstilling av innholdet - revolusjoner kritiseres ikke for å være langsomme eller mangle intellektuelt grunnlag, men for å være for kraftfulle og premature.
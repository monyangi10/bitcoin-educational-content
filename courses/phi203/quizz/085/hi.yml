question: According to the historical analysis, why do revolutions tend to have major disadvantages compared to progressive reforms?
answer: They generate violence and impose more changes than populations are ready for, leading to frequent reversals
wrong_answers:
  - They lack the intellectual foundation provided by Enlightenment philosophy and economic theory
  - They occur too slowly to address urgent social and economic problems effectively
  - They fail to establish the material conditions necessary for sustainable economic development
explanation: |
  The text explicitly states that revolutions have major disadvantages because they generate much violence and tend to impose more changes than the population is prepared for, which explains the numerous reversals that follow them. Progressive reforms guided by informed public opinion are presented as preferable because they allow freedom to be adopted when conditions truly permit it. The other options misrepresent the content - revolutions aren't criticized for being slow or lacking intellectual foundation, but for being too forceful and premature.
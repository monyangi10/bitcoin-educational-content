question: Secondo l'analisi storica, perché le rivoluzioni tendono ad avere grandi svantaggi rispetto alle riforme progressive?
answer: generate violenza e impongono più cambiamenti di quanti le popolazioni siano pronte ad affrontare, portando a frequenti rovesciamenti
wrong_answers:
  - Mancano le basi intellettuali fornite dalla filosofia e dalla teoria economica illuminista
  - Si verificano troppo lentamente per affrontare efficacemente i problemi sociali ed economici urgenti
  - Non riescono a stabilire le condizioni materiali necessarie per uno sviluppo economico sostenibile
explanation: |
  Il testo afferma esplicitamente che le rivoluzioni presentano gravi svantaggi, perché sono molto violente e tendono a imporre più cambiamenti di quelli a cui la popolazione è preparata, il che spiega i numerosi rovesci che le seguono. Le riforme progressive guidate da un'opinione pubblica informata sono presentate come preferibili, perché consentono di adottare la libertà quando le condizioni lo permettono veramente. Le altre opzioni travisano il contenuto: le rivoluzioni non sono criticate per la lentezza o la mancanza di basi intellettuali, ma per l'eccessiva forza e la prematurità.
question: Menurut analisis historis, mengapa revolusi cenderung memiliki kerugian besar dibandingkan dengan reformasi progresif?
answer: Mereka generate kekerasan dan memaksakan lebih banyak perubahan daripada yang siap dilakukan oleh populasi, yang menyebabkan seringnya terjadi pembalikan arah
wrong_answers:
  - Mereka tidak memiliki landasan intelektual yang disediakan oleh filosofi Pencerahan dan teori ekonomi
  - Mereka terjadi terlalu lambat untuk mengatasi masalah sosial dan ekonomi yang mendesak secara efektif
  - Mereka gagal membangun kondisi material yang diperlukan untuk pembangunan ekonomi yang berkelanjutan
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa revolusi memiliki kelemahan utama karena banyak menggunakan kekerasan dan cenderung memaksakan perubahan yang lebih besar daripada yang dipersiapkan oleh masyarakat, yang menjelaskan banyaknya pembalikan yang mengikutinya. Reformasi progresif yang dipandu oleh opini publik yang terinformasi disajikan sebagai pilihan yang lebih baik karena memungkinkan kebebasan untuk diadopsi ketika kondisi benar-benar memungkinkan. Pilihan-pilihan lain salah menggambarkan isinya - revolusi tidak dikritik karena lambat atau tidak memiliki dasar intelektual, tetapi karena terlalu memaksa dan prematur.
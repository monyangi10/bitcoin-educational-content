question: 根據歷史分析，為何革命與進步改革相比，往往有很大的缺點？
answer: 他們使用 generate 暴力手段，強加更多的變革，使民眾無法適應，導致逆轉頻生。
wrong_answers:
  - 他們缺乏啟蒙哲學和經濟理論提供的知識基礎
  - 它們發生的速度太慢，無法有效解決迫切的社會和經濟問題
  - 它們未能建立可持續經濟發展所需的物質條件
explanation: |
  文中明確指出，革命有很大的缺點，因為革命會使用許多暴力，而且往往會強加超過人民所能接受的改變，這也解釋了為何革命之後會發生許多逆轉。在知情的民意引導下進行的進步改革則較為可取，因為它們允許在條件真正允許的情況下實行自由。其他的選擇則歪曲了內容--革命並不是因為緩慢或缺乏知識基礎而受到批評，而是因為太強硬和太不成熟。
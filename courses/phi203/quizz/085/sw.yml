question: Kulingana na uchambuzi wa kihistoria, kwa nini mapinduzi huwa na hasara kubwa ikilinganishwa na mageuzi yanayoendelea?
answer: Wanasababisha vurugu za generate na kulazimisha mabadiliko zaidi kuliko idadi ya watu ilivyo tayari, na kusababisha mabadiliko ya mara kwa mara
wrong_answers:
  - Hawana msingi wa kiakili unaotolewa na falsafa ya Mwangaza na nadharia ya kiuchumi.
  - Hutokea polepole sana kushughulikia matatizo ya kijamii na kiuchumi kwa ufanisi
  - Wanashindwa kuweka masharti ya nyenzo yanayohitajika kwa maendeleo endelevu ya kiuchumi
explanation: |
  Maandishi yanasema waziwazi kwamba mapinduzi yana hasara kubwa kwa sababu yanasababisha vurugu nyingi za generate na huwa yanalazimisha mabadiliko zaidi ya idadi ya watu walivyojiandaa, jambo linaloelezea mabadiliko mengi yanayofuata. Mageuzi ya kimaendeleo yanayoongozwa na maoni ya umma yaliyoelimika yanawasilishwa kama yanayopendekezwa kwa sababu yanaruhusu uhuru kupitishwa wakati hali zinaruhusu. Chaguzi zingine zinapotosha maudhui - mapinduzi hayakosolewi kwa kuwa polepole au kukosa msingi wa kiakili, bali kwa kuwa na nguvu nyingi na mapema.
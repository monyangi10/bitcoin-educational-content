question: Защо според историческия анализ революциите обикновено имат големи недостатъци в сравнение с прогресивните реформи?
answer: Те използват насилие и налагат повече промени, отколкото населението е готово да приеме, което води до чести обрати
wrong_answers:
  - Те нямат интелектуалната основа, осигурена от философията на Просвещението и икономическата теория
  - Те се появяват твърде бавно, за да се решат ефективно неотложни социални и икономически проблеми
  - Те не създават материалните условия, необходими за устойчиво икономическо развитие
explanation: |
  В текста изрично се посочва, че революциите имат големи недостатъци, тъй като са свързани с много насилие и обикновено налагат повече промени, отколкото населението е подготвено, което обяснява многобройните обрати, които ги следват. Прогресивните реформи, ръководени от информирано обществено мнение, са представени като предпочитани, защото позволяват свободата да бъде приета, когато условията наистина я позволяват. Другите варианти изопачават съдържанието - революциите не се критикуват за това, че са бавни или нямат интелектуална основа, а за това, че са твърде силни и преждевременни.
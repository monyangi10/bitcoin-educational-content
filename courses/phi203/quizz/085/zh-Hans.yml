question: 根据历史分析，与渐进式改革相比，为什么革命往往具有重大弊端？
answer: 它们采用 generate 暴力手段，强加的变革超出了民众的承受能力，导致逆转频频发生
wrong_answers:
  - 它们缺乏启蒙哲学和经济理论提供的思想基础
  - 它们发生的速度太慢，无法有效解决紧迫的社会和经济问题
  - 它们未能为可持续经济发展创造必要的物质条件
explanation: |
  文中明确指出，革命有很大的弊端，因为革命会产生大量暴力，而且往往会在民众没有做好准备的情况下强加更多的变革，这也是为什么革命之后会出现无数逆转的原因。在知情民意指导下的渐进式改革被认为是可取的，因为它们允许在条件真正允许的情况下实行自由。其他选项则歪曲了内容--革命并不是因为进展缓慢或缺乏知识基础而受到批评，而是因为过于强势和不成熟。
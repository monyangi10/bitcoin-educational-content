question: Theo phân tích lịch sử, tại sao các cuộc cách mạng thường có những nhược điểm lớn so với các cuộc cải cách tiến bộ?
answer: Họ gây ra bạo lực generate và áp đặt nhiều thay đổi hơn mức mà người dân có thể chấp nhận, dẫn đến những sự đảo ngược thường xuyên.
wrong_answers:
  - Họ thiếu nền tảng trí tuệ được cung cấp bởi triết học Khai sáng và lý thuyết kinh tế.
  - Chúng diễn ra quá chậm để giải quyết hiệu quả các vấn đề kinh tế và xã hội cấp bách.
  - Họ không thiết lập được các điều kiện vật chất cần thiết cho sự phát triển kinh tế bền vững.
explanation: |
  Văn bản nêu rõ rằng các cuộc cách mạng có những nhược điểm lớn vì chúng gây ra nhiều bạo lực và có xu hướng áp đặt nhiều thay đổi hơn mức mà người dân có thể chấp nhận, điều này giải thích cho vô số lần đảo ngược sau đó. Các cải cách tiến bộ được dẫn dắt bởi dư luận có hiểu biết được coi là ưu việt hơn vì chúng cho phép tự do được áp dụng khi điều kiện thực sự cho phép. Các lựa chọn khác xuyên tạc nội dung - các cuộc cách mạng không bị chỉ trích vì chậm chạp hay thiếu nền tảng trí tuệ, mà vì quá mạnh mẽ và vội vàng.
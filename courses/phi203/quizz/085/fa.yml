question: بر اساس تحلیل تاریخی، چرا انقلاب‌ها در مقایسه با اصلاحات پیشرو تمایل به داشتن معایب عمده دارند؟
answer: آن‌ها خشونت generate را اعمال می‌کنند و تغییرات بیشتری نسبت به آنچه جمعیت‌ها آماده‌اش هستند تحمیل می‌کنند، که منجر به بازگشت‌های مکرر می‌شود.
wrong_answers:
  - آن‌ها فاقد پایه‌های فکری ارائه‌شده توسط فلسفه روشنگری و نظریه اقتصادی هستند.
  - آن‌ها به قدری کند رخ می‌دهند که نمی‌توانند به طور مؤثر به مشکلات فوری اجتماعی و اقتصادی رسیدگی کنند.
  - آن‌ها در ایجاد شرایط مادی لازم برای توسعه اقتصادی پایدار ناکام هستند.
explanation: |
  متن به‌طور صریح بیان می‌کند که انقلاب‌ها معایب عمده‌ای دارند زیرا generate خشونت زیادی به همراه دارند و تمایل دارند تغییرات بیشتری را نسبت به آنچه جمعیت آماده است، تحمیل کنند، که این امر توضیح‌دهنده بازگشت‌های متعدد پس از آن‌ها است. اصلاحات تدریجی که با افکار عمومی آگاه هدایت می‌شوند، به‌عنوان گزینه‌های ترجیحی ارائه می‌شوند زیرا اجازه می‌دهند آزادی زمانی که شرایط واقعاً اجازه می‌دهد، پذیرفته شود. گزینه‌های دیگر محتوای متن را نادرست نشان می‌دهند - انقلاب‌ها به‌خاطر کند بودن یا نداشتن پایه فکری مورد انتقاد قرار نمی‌گیرند، بلکه به‌خاطر بیش از حد قوی و زودرس بودن مورد انتقاد قرار می‌گیرند.
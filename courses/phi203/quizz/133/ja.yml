question: 南北戦争がリヨンの繊維産業に与えた影響の例は、経済的相互依存について何を示しているのだろうか？
answer: 遠方の紛争は、貿易関係の途絶を通じて、非参加地域に直接的な経済的損害をもたらす可能性がある。
wrong_answers:
  - 軍事衝突は主に、戦争に直接巻き込まれた国だけに影響する。
  - 南北戦争期、アメリカの競争力低下から恩恵を受けたヨーロッパの産業
  - 米国市場の混乱を補うため、欧州で繊維製品の生産が増加
explanation: |
  アメリカ南北戦争の例は、経済的相互依存がいかに大陸をまたいだ連鎖的な結果を生み出すかを示している。戦争によって綿花の供給と貿易関係が途絶えると、フランスは紛争に関与していなかったにもかかわらず、フランスのリヨンの繊維産業はたちまち経済的破綻をきたした。このことは、相互に結びついた世界経済において、局地的な紛争が遠大な影響を及ぼし、貿易の連鎖が断ち切られると誰もが貧しくなることを示している。他の選択肢は、影響や経済的利益の分離を誤って示唆しており、相互依存と損失の共有を強調する利益調和の原則に反している。
question: Mida näitab Ameerika kodusõja mõju Lyoni tekstiilitööstusele näide majandusliku vastastikuse sõltuvuse kohta?
answer: Kaugemal toimuvad konfliktid võivad kaubandussuhete katkemise tõttu põhjustada otsest majanduslikku kahju mitteosalevatele piirkondadele
wrong_answers:
  - Sõjalised konfliktid mõjutavad peamiselt ainult otseselt sõjategevuses osalevaid riike
  - Euroopa tööstusharud said kasu Ameerika vähenenud konkurentsist kodusõja ajal
  - Tekstiilitootmine kasvas Euroopas, et kompenseerida Ameerika turuhäireid
explanation: |
  Ameerika kodusõja näide illustreerib, kuidas majanduslik vastastikune sõltuvus tekitab tagajärgede ahela üle mandrite. Kui sõda häiris puuvillavarusid ja kaubandussuhteid, põhjustas see kohe majandusliku hävingu Prantsusmaa tekstiilitööstusele Lyonis, hoolimata sellest, et Prantsusmaa ei olnud konfliktis osalenud. See näitab, et omavahel seotud maailmamajanduses on kohalikel konfliktidel kaugeleulatuv mõju, mis muudab kaubandusahelate katkemisel kõik vaesemaks. Teised valikud viitavad ekslikult mõjude või majandusliku kasu isoleerimisele, mis on vastuolus huvide harmoonia põhimõttega, mis rõhutab vastastikust sõltuvust ja jagatud kahjusid.
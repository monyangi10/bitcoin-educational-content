question: Какво показва примерът с влиянието на Гражданската война в САЩ върху текстилната промишленост на Лион за икономическата взаимозависимост?
answer: Отдалечените конфликти могат да причинят незабавни икономически щети на неучастващите региони чрез нарушаване на търговските отношения
wrong_answers:
  - Военните конфликти засягат предимно само страните, които участват пряко във военните действия
  - Европейските индустрии се възползват от намалената американска конкуренция по време на Гражданската война
  - Увеличаване на производството на текстил в Европа, за да се компенсират смущенията на американския пазар
explanation: |
  Примерът с Американската гражданска война илюстрира как икономическата взаимозависимост създава верига от последици на различни континенти. Когато войната нарушава доставките на памук и търговските взаимоотношения, това незабавно води до икономическа разруха за текстилната промишленост в Лион, Франция, въпреки че Франция не участва в конфликта. Това показва, че в условията на взаимосвързана глобална икономика местните конфликти имат далечни последици и правят всички по-бедни, когато търговските вериги са прекъснати. Другите варианти неправилно предполагат изолиране на ефектите или икономическите ползи, което противоречи на принципа на хармонията на интересите, който подчертава взаимната зависимост и общите загуби.
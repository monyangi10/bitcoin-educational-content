question: O que é que o exemplo do impacto da Guerra Civil Americana nas indústrias têxteis de Lyon demonstra sobre a interdependência económica?
answer: Os conflitos à distância podem causar prejuízos económicos imediatos às regiões não participantes através da rutura das relações comerciais
wrong_answers:
  - Os conflitos militares afectam essencialmente apenas os países diretamente envolvidos na guerra
  - As indústrias europeias beneficiaram da redução da concorrência americana durante o período da Guerra Civil
  - A produção têxtil aumentou na Europa para compensar as perturbações do mercado americano
explanation: |
  O exemplo da Guerra Civil Americana ilustra como a interdependência económica cria uma cadeia de consequências entre continentes. Quando a guerra perturbou o abastecimento de algodão e as relações comerciais, causou imediatamente a ruína económica das indústrias têxteis em Lyon, França, apesar de a França não estar envolvida no conflito. Isto demonstra que, numa economia global interligada, os conflitos locais têm efeitos de grande alcance, tornando todos mais pobres quando as cadeias comerciais são quebradas. As outras opções sugerem incorretamente o isolamento dos efeitos ou dos benefícios económicos, contrariando o princípio da harmonia de interesses que enfatiza a dependência mútua e a partilha de perdas.
question: 美國內戰對里昂紡織業的影響這個例子說明了什麼關於經濟相互依賴的關係？
answer: 遙遠的衝突可透過中斷的貿易關係，對非參與地區造成直接的經濟損害
wrong_answers:
  - 軍事衝突主要只影響直接捲入戰爭的國家
  - 南北戰爭期間，歐洲工業因美國競爭減少而受益
  - 歐洲的紡織品產量增加，以彌補美國市場的中斷情況
explanation: |
  美國內戰的例子說明了經濟上的相互依賴是如何造成跨大陸的連鎖後果。當戰爭擾亂棉花供應和貿易關係時，立即造成法國里昂紡織業的經濟毀滅，儘管法國並未參與衝突。這說明了在相互聯繫的全球經濟中，當地的衝突會產生深遠的影響，當貿易鏈斷裂時，每個人都會變得更窮。其他選項不正確地暗示了影響或經濟利益的隔離，與強調相互依賴和共同損失的利益和諧原則相矛盾。
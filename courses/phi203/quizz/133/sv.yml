question: Vad visar exemplet med det amerikanska inbördeskrigets inverkan på Lyons textilindustrier om ekonomiskt ömsesidigt beroende?
answer: Fjärran konflikter kan orsaka omedelbar ekonomisk skada för icke-deltagande regioner genom störda handelsförbindelser
wrong_answers:
  - Militära konflikter påverkar i första hand endast de länder som är direkt inblandade i krigföringen
  - Europeiska industrier gynnades av minskad amerikansk konkurrens under inbördeskriget
  - Textilproduktionen ökade i Europa för att kompensera för störningar på den amerikanska marknaden
explanation: |
  Exemplet med det amerikanska inbördeskriget illustrerar hur ekonomiskt ömsesidigt beroende skapar en kedja av konsekvenser över kontinenter. När kriget störde bomullsleveranserna och handelsrelationerna ledde det omedelbart till ekonomisk ruin för textilindustrin i Lyon i Frankrike, trots att Frankrike inte var inblandat i konflikten. Detta visar att i en sammanlänkad global ekonomi får lokala konflikter långtgående effekter och gör alla fattigare när handelskedjorna bryts. De andra alternativen föreslår felaktigt isolering av effekter eller ekonomiska fördelar, vilket strider mot principen om harmoni mellan intressen som betonar ömsesidigt beroende och delade förluster.
question: 미국 남북전쟁이 리옹의 섬유 산업에 미친 영향의 예는 경제적 상호 의존성에 대해 무엇을 보여줍니까?
answer: 원거리 분쟁은 무역 관계 중단을 통해 비참전 지역에 즉각적인 경제적 피해를 입힐 수 있습니다
wrong_answers:
  - 군사 분쟁은 주로 전쟁에 직접적으로 관련된 국가에만 영향을 미칩니다
  - 남북전쟁 기간 동안 유럽 산업은 미국과의 경쟁 감소로 혜택을 받았습니다
  - 미국 시장의 혼란을 보완하기 위해 유럽에서 섬유 생산이 증가했습니다
explanation: |
  미국 남북전쟁의 사례는 경제적 상호의존이 대륙을 가로지르는 연쇄적인 결과를 낳는다는 것을 잘 보여줍니다. 전쟁으로 인해 면화 공급과 무역 관계가 중단되자 프랑스 리옹의 섬유 산업은 즉각적으로 경제적 파탄을 맞았지만, 프랑스는 분쟁에 관여하지 않았습니다. 이는 상호 연결된 글로벌 경제에서 지역 분쟁은 광범위한 영향을 미치며 무역 사슬이 끊어지면 모두를 가난하게 만든다는 것을 보여줍니다. 다른 옵션은 상호 의존과 손실 분담을 강조하는 이익의 조화 원칙에 반하는 효과 또는 경제적 이익의 고립을 잘못 제시합니다.
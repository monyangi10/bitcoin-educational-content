question: Wat laat het voorbeeld van de impact van de Amerikaanse Burgeroorlog op de textielindustrie in Lyon zien over economische onderlinge afhankelijkheid?
answer: Verafgelegen conflicten kunnen onmiddellijke economische schade toebrengen aan niet-deelnemende regio's door verstoorde handelsrelaties
wrong_answers:
  - Militaire conflicten hebben voornamelijk alleen gevolgen voor de landen die direct betrokken zijn bij de oorlogsvoering
  - Europese industrieën profiteerden van de verminderde Amerikaanse concurrentie tijdens de Burgeroorlog
  - Textielproductie verhoogd in Europa om verstoringen van de Amerikaanse markt te compenseren
explanation: |
  Het voorbeeld van de Amerikaanse Burgeroorlog illustreert hoe economische onderlinge afhankelijkheid een keten van gevolgen creëert over de continenten heen. Toen de oorlog de katoenvoorraden en handelsrelaties verstoorde, veroorzaakte dat onmiddellijk de economische ondergang van de textielindustrie in Lyon, Frankrijk, ondanks het feit dat Frankrijk niet betrokken was bij het conflict. Dit toont aan dat in een onderling verbonden wereldeconomie lokale conflicten verstrekkende gevolgen hebben, waardoor iedereen armer wordt als handelsketens verbroken worden. De andere opties suggereren ten onrechte isolatie van effecten of economische voordelen, wat in tegenspraak is met het principe van belangenharmonie dat wederzijdse afhankelijkheid en gedeelde verliezen benadrukt.
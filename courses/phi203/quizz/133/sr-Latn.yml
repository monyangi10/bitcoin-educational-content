question: Kakav primer uticaja Američkog građanskog rata na tekstilnu industriju u Lionu pokazuje o ekonomskoj međuzavisnosti?
answer: Udaljeni sukobi mogu izazvati trenutnu ekonomsku štetu u regionima koji ne učestvuju kroz poremećene trgovinske odnose
wrong_answers:
  - Vojni sukobi prvenstveno pogađaju samo zemlje direktno uključene u ratovanje
  - Evropske industrije su imale koristi od smanjene američke konkurencije tokom perioda Građanskog rata.
  - Proizvodnja tekstila u Evropi povećana je kako bi se nadoknadili poremećaji na američkom tržištu.
explanation: |
  Primer američkog građanskog rata ilustruje kako ekonomska međuzavisnost stvara lanac posledica širom kontinenata. Kada je rat poremetio snabdevanje pamukom i trgovinske odnose, to je odmah izazvalo ekonomsku propast tekstilne industrije u Lionu, Francuska, uprkos tome što Francuska nije bila uključena u sukob. Ovo pokazuje da u međusobno povezanom globalnom ekonomskom sistemu, lokalni sukobi imaju dalekosežne efekte, čineći sve siromašnijima kada se lanci trgovine prekidaju. Druge opcije pogrešno sugerišu izolaciju efekata ili ekonomske koristi, što je u suprotnosti sa principom harmonije interesa koji naglašava međusobnu zavisnost i zajedničke gubitke.
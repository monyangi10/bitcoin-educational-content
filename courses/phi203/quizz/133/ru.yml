question: Как пример влияния Гражданской войны в США на текстильную промышленность Лиона демонстрирует экономическую взаимозависимость?
answer: Отдаленные конфликты могут нанести непосредственный экономический ущерб регионам, не участвующим в них, из-за нарушения торговых отношений
wrong_answers:
  - Военные конфликты затрагивают в первую очередь только страны, непосредственно участвующие в военных действиях
  - Европейская промышленность выиграла от снижения американской конкуренции в период Гражданской войны
  - Рост производства текстиля в Европе компенсировал перебои на американском рынке
explanation: |
  Пример Гражданской войны в Америке показывает, как экономическая взаимозависимость создает цепочку последствий на разных континентах. Когда война нарушила поставки хлопка и торговые отношения, это немедленно привело к экономическому краху текстильной промышленности в Лионе (Франция), несмотря на то, что Франция не участвовала в конфликте. Это показывает, что в условиях взаимосвязанной глобальной экономики локальные конфликты имеют далеко идущие последствия, делая всех беднее, когда нарушаются торговые цепочки. Другие варианты неверно предполагают изоляцию последствий или экономических выгод, что противоречит принципу гармонии интересов, который подчеркивает взаимную зависимость и общие потери.
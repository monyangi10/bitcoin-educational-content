question: Che cosa dimostra l'esempio dell'impatto della guerra civile americana sulle industrie tessili lionesi sull'interdipendenza economica?
answer: I conflitti a distanza possono causare danni economici immediati alle regioni non partecipanti attraverso l'interruzione delle relazioni commerciali
wrong_answers:
  - I conflitti militari interessano principalmente solo i paesi direttamente coinvolti nella guerra
  - Le industrie europee beneficiarono della riduzione della concorrenza americana durante il periodo della Guerra Civile
  - La produzione tessile è aumentata in Europa per compensare le perturbazioni del mercato americano
explanation: |
  L'esempio della guerra civile americana illustra come l'interdipendenza economica crei una catena di conseguenze attraverso i continenti. Quando la guerra interruppe le forniture di cotone e le relazioni commerciali, causò immediatamente la rovina economica delle industrie tessili di Lione, in Francia, nonostante la Francia non fosse coinvolta nel conflitto. Questo dimostra che, in un'economia globale interconnessa, i conflitti locali hanno effetti di vasta portata, rendendo tutti più poveri quando le catene commerciali vengono interrotte. Le altre opzioni suggeriscono erroneamente l'isolamento degli effetti o dei benefici economici, contraddicendo il principio dell'armonia degli interessi che enfatizza la dipendenza reciproca e le perdite condivise.
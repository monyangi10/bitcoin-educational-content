question: Was zeigt das Beispiel der Auswirkungen des amerikanischen Bürgerkriegs auf die Lyoner Textilindustrie über die wirtschaftliche Verflechtung?
answer: Fernkonflikte können durch gestörte Handelsbeziehungen unmittelbare wirtschaftliche Schäden für nicht beteiligte Regionen verursachen
wrong_answers:
  - Militärische Konflikte betreffen in erster Linie nur die direkt am Krieg beteiligten Länder
  - Die europäische Industrie profitierte von der geringeren amerikanischen Konkurrenz während des Bürgerkriegs
  - Steigerung der Textilproduktion in Europa als Ausgleich für die Störungen auf dem amerikanischen Markt
explanation: |
  Das Beispiel des Amerikanischen Bürgerkriegs veranschaulicht, wie wirtschaftliche Interdependenz eine Kette von Folgen über Kontinente hinweg schafft. Als der Krieg die Baumwollversorgung und die Handelsbeziehungen unterbrach, führte dies unmittelbar zum wirtschaftlichen Ruin der Textilindustrie in Lyon, Frankreich, obwohl Frankreich nicht in den Konflikt verwickelt war. Dies zeigt, dass in einer vernetzten Weltwirtschaft lokale Konflikte weitreichende Auswirkungen haben und alle ärmer machen, wenn Handelsketten unterbrochen werden. Die anderen Optionen suggerieren fälschlicherweise eine Isolierung der Auswirkungen oder der wirtschaftlichen Vorteile, was dem Grundsatz der Interessenharmonie widerspricht, der die gegenseitige Abhängigkeit und die gemeinsamen Verluste betont.
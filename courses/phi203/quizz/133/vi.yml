question: Ví dụ về tác động của Nội chiến Hoa Kỳ đối với ngành công nghiệp dệt may của Lyon cho thấy điều gì về sự phụ thuộc kinh tế lẫn nhau?
answer: Các cuộc xung đột ở xa có thể gây thiệt hại kinh tế ngay lập tức cho các khu vực không tham gia thông qua việc gián đoạn các mối quan hệ thương mại.
wrong_answers:
  - Các cuộc xung đột quân sự chủ yếu chỉ ảnh hưởng đến các quốc gia trực tiếp tham gia chiến tranh.
  - Các ngành công nghiệp châu Âu được hưởng lợi từ việc giảm bớt sự cạnh tranh từ Mỹ trong thời kỳ Nội chiến.
  - Sản xuất dệt may ở châu Âu tăng lên để bù đắp cho sự gián đoạn thị trường ở Mỹ.
explanation: |
  Ví dụ về Nội chiến Hoa Kỳ minh họa cách sự phụ thuộc kinh tế lẫn nhau tạo ra một chuỗi hậu quả trải rộng khắp các châu lục. Khi chiến tranh làm gián đoạn nguồn cung bông và các mối quan hệ thương mại, nó ngay lập tức gây ra sự tàn phá kinh tế cho ngành công nghiệp dệt may ở Lyon, Pháp, mặc dù Pháp không tham gia vào cuộc xung đột. Điều này chứng tỏ rằng trong một nền kinh tế toàn cầu liên kết chặt chẽ, các xung đột địa phương có tác động sâu rộng, khiến mọi người đều nghèo hơn khi các chuỗi thương mại bị phá vỡ. Các lựa chọn khác đưa ra nhận định sai lầm về sự cô lập các tác động hoặc lợi ích kinh tế, trái ngược với nguyên tắc hài hòa lợi ích nhấn mạnh sự phụ thuộc lẫn nhau và tổn thất chung.
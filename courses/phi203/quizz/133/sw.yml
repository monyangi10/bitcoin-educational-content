question: Mfano wa athari za Vita vya wenyewe kwa wenyewe vya Marekani kwenye viwanda vya nguo vya Lyon unaonyesha nini kuhusu kutegemeana kiuchumi?
answer: Migogoro ya mbali inaweza kusababisha uharibifu wa kiuchumi wa haraka kwa maeneo yasiyoshiriki kupitia mahusiano ya kibiashara yaliyovurugika
wrong_answers:
  - Migogoro ya kijeshi huathiri hasa nchi zinazohusika moja kwa moja katika vita
  - Viwanda vya Ulaya vilinufaika kutokana na ushindani mdogo wa Marekani wakati wa Vita vya wenyewe kwa wenyewe
  - Uzalishaji wa nguo umeongezeka barani Ulaya ili kufidia usumbufu wa soko la Marekani
explanation: |
  Mfano wa Vita vya wenyewe kwa wenyewe vya Marekani unaonyesha jinsi utegemezi wa kiuchumi unavyosababisha mlolongo wa matokeo katika mabara yote. Vita vilipovuruga usambazaji wa pamba na uhusiano wa kibiashara, mara moja vilisababisha uharibifu wa kiuchumi kwa viwanda vya nguo huko Lyon, Ufaransa, licha ya Ufaransa kutohusika katika mzozo huo. Hii inaonyesha kwamba katika uchumi wa dunia uliounganishwa, migogoro ya ndani ina athari kubwa, na kumfanya kila mtu kuwa maskini zaidi wakati minyororo ya biashara inapovunjika. Chaguzi zingine zinaonyesha kimakosa kutenganisha athari au faida za kiuchumi, ikipingana na kanuni ya maelewano ya maslahi inayosisitiza utegemezi wa pande zote mbili na hasara za pamoja.
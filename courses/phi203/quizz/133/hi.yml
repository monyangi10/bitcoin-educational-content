question: What does the example of the American Civil War's impact on Lyon's textile industries demonstrate about economic interdependence?
answer: Distant conflicts can cause immediate economic damage to non-participating regions through disrupted trade relationships
wrong_answers:
  - Military conflicts primarily affect only the countries directly involved in warfare
  - European industries benefited from reduced American competition during the Civil War period
  - Textile production increased in Europe to compensate for American market disruptions
explanation: |
  The American Civil War example illustrates how economic interdependence creates a chain of consequences across continents. When the war disrupted cotton supplies and trade relationships, it immediately caused economic ruin for textile industries in Lyon, France, despite France not being involved in the conflict. This demonstrates that in an interconnected global economy, local conflicts have far-reaching effects, making everyone poorer when trade chains are broken. The other options incorrectly suggest isolation of effects or economic benefits, contradicting the harmony of interests principle that emphasizes mutual dependence and shared losses.
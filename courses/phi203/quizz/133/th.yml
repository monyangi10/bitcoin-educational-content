question: ตัวอย่างของผลกระทบจากสงครามกลางเมืองอเมริกันต่ออุตสาหกรรมสิ่งทอของลียงแสดงให้เห็นถึงอะไรเกี่ยวกับการพึ่งพาทางเศรษฐกิจ?
answer: ความขัดแย้งที่อยู่ห่างไกลสามารถก่อให้เกิดความเสียหายทางเศรษฐกิจทันทีต่อภูมิภาคที่ไม่ได้มีส่วนร่วมผ่านความสัมพันธ์ทางการค้าที่ถูกขัดขวาง
wrong_answers:
  - ความขัดแย้งทางทหารส่งผลกระทบหลักเฉพาะประเทศที่มีส่วนร่วมโดยตรงในสงครามเท่านั้น
  - อุตสาหกรรมยุโรปได้รับประโยชน์จากการแข่งขันที่ลดลงของอเมริกาในช่วงสงครามกลางเมือง
  - การผลิตสิ่งทอเพิ่มขึ้นในยุโรปเพื่อชดเชยการหยุดชะงักของตลาดอเมริกา
explanation: |
  ตัวอย่างสงครามกลางเมืองอเมริกาแสดงให้เห็นว่าความพึ่งพาทางเศรษฐกิจสร้างห่วงโซ่ของผลกระทบข้ามทวีปอย่างไร เมื่อสงครามทำให้การจัดหาฝ้ายและความสัมพันธ์ทางการค้าถูกขัดจังหวะ มันทำให้เกิดความล่มสลายทางเศรษฐกิจทันทีสำหรับอุตสาหกรรมสิ่งทอในเมืองลียง ประเทศฝรั่งเศส แม้ว่าฝรั่งเศสจะไม่ได้มีส่วนเกี่ยวข้องในความขัดแย้งก็ตาม สิ่งนี้แสดงให้เห็นว่าในเศรษฐกิจโลกที่เชื่อมโยงถึงกัน ความขัดแย้งในท้องถิ่นมีผลกระทบที่กว้างไกล ทำให้ทุกคนยากจนลงเมื่อห่วงโซ่การค้าถูกทำลาย ตัวเลือกอื่น ๆ ที่ไม่ถูกต้องแนะนำถึงการแยกตัวของผลกระทบหรือผลประโยชน์ทางเศรษฐกิจ ซึ่งขัดแย้งกับหลักการของความกลมกลืนของผลประโยชน์ที่เน้นการพึ่งพาซึ่งกันและกันและการสูญเสียร่วมกัน
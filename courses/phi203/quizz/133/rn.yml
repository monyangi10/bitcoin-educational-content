question: Akarorero k’ingaruka z’intambara y’abanyagihugu muri Amerika ku nganda z’impuzu zo muri Lyon kerekana iki ku bijanye n’ugufatanya mu vy’ubutunzi?
answer: Intambara zo kure zishobora gutuma uturere tutagira uruhara mu butunzi buhungabana biciye mu guhungabana kw’imigenderanire y’ubudandaji .
wrong_answers:
  - Intambara z’igisirikare ahanini zitera gusa ibihugu bifise uruhara mu ntambara ata guca ku ruhande .
  - Inganda zo mu Buraya zarahungukiye ku kugabanya uguhiganwa kw’Abanyamerika mu kiringo c’intambara y’abanyagihugu .
  - Uguhingura imyenda kwarongerekanye mu Buraya kugira ngo bisubize inyuma isoko rya Amerika ryahungabanijwe
explanation: |
  Akarorero k’intambara y’abanyagihugu muri Amerika karerekana ingene ugufatanya mu vy’ubutunzi gutuma habaho uruhererekane rw’ingaruka ku migabane yose. Igihe iyo ntambara yahungabanya ugutanga ipampa be n’imigenderanire y’ubudandaji, yaciye ubwo nyene itera ugusenyuka kw’ubutunzi ku nganda zikora imyenda zo mu gisagara ca Lyon mu Bufaransa, naho Ubufaransa butagira uruhara muri iyo ntambara. Ivyo vyerekana ko mu bukungu bw’isi yose bufitaniye isano, intambara zo mu karere zigira ingaruka zikomeye cane, zigatuma umuntu wese arushiriza kuba umukene iyo iminyororo y’ubudandaji ivunitse. Ayandi mahitamwo atari yo atanga iciyumviro co kwitandukanya n’ingaruka canke inyungu z’ubutunzi, bikaba bivuguruza ingingo ngenderwako y’uguhuza inyungu ishimika ku kwisungana n’uguhomba gusangira.
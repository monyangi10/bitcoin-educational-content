question: Hva viser eksemplet med den amerikanske borgerkrigens innvirkning på Lyons tekstilindustri om gjensidig økonomisk avhengighet?
answer: Fjerntliggende konflikter kan forårsake umiddelbar økonomisk skade på ikke-deltakende regioner gjennom forstyrrede handelsforbindelser
wrong_answers:
  - Militære konflikter påvirker først og fremst bare de landene som er direkte involvert i krigføringen
  - Europeisk industri nøt godt av redusert amerikansk konkurranse under borgerkrigen
  - Tekstilproduksjonen økte i Europa for å kompensere for forstyrrelser på det amerikanske markedet
explanation: |
  Eksemplet med den amerikanske borgerkrigen illustrerer hvordan gjensidig økonomisk avhengighet skaper en kjede av konsekvenser på tvers av kontinenter. Da krigen forstyrret bomullsforsyninger og handelsforbindelser, førte det umiddelbart til økonomisk ruin for tekstilindustrien i Lyon i Frankrike, til tross for at Frankrike ikke var involvert i konflikten. Dette viser at i en sammenvevd global økonomi får lokale konflikter vidtrekkende konsekvenser, og at alle blir fattigere når handelskjedene brytes. De andre alternativene antyder feilaktig isolasjon av effekter eller økonomiske fordeler, noe som strider mot prinsippet om harmoniske interesser, som legger vekt på gjensidig avhengighet og felles tap.
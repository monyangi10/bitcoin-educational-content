question: "Nach der Theorie des Wirtschaftsliberalismus: Welche Formen der Entschädigung ermöglichen es Gesellschaften, Innovation und Fortschritt zu belohnen?"
answer: "Industrielle und kommerzielle Gewinne, soziales Prestige und Ruhm sowie geistige Eigentumsrechte wie Patente"
wrong_answers:
  - "Staatliche Subventionen, staatliche Anerkennungspreise und zentralisierte Mittelvergabesysteme"
  - "Feste Gehälter, bürokratische Beförderungen und standardisierte Leistungsprämien von öffentlichen Einrichtungen"
  - "Vorteile des kollektiven Eigentums, Maßnahmen zur sozialen Gleichstellung und gemeinschaftliche Nutzung von Ressourcen"
explanation: |
  Der Wirtschaftsliberalismus nennt drei Hauptformen der Entschädigung für Innovation: vorübergehende Gewinne, wenn man als Erster mit besseren Lösungen auf den Markt kommt, soziales Prestige, ähnlich dem von Künstlern und Dichtern, und Schutz des geistigen Eigentums durch Patente. Die falschen Antworten stellen Ausgleichsmechanismen dar, die typisch für staatlich kontrollierte oder kollektivistische Systeme sind, die, so wird in diesem Kapitel argumentiert, Innovationen nicht wirksam belohnen können, weil ihnen marktbasierte Anreize und individuelle Anerkennung für bahnbrechende Leistungen fehlen.

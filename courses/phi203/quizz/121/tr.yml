question: Ekonomik liberalizm teorisine göre, hangi tazminat biçimleri toplumların yenilik ve ilerlemeyi ödüllendirmesini sağlar?
answer: Endüstriyel ve ticari kârlar, sosyal prestij ve şan, patent gibi fikri mülkiyet hakları
wrong_answers:
  - Devlet sübvansiyonları, devlet takdir ödülleri ve merkezi kaynak tahsis sistemleri
  - Kamu kurumlarından sabit maaşlar, bürokratik terfiler ve standartlaştırılmış performans primleri
  - Kolektif mülkiyet faydaları, sosyal eşitlik önlemleri ve toplum temelli kaynak paylaşımı
explanation: |
  Ekonomik liberalizm inovasyon için üç ana telafi biçimi tanımlamaktadır: daha iyi çözümlerle pazara ilk giren olmaktan kaynaklanan geçici karlar, sanatçı ve şairlerinkine benzer sosyal prestij ve patentler yoluyla fikri mülkiyet koruması. Yanlış cevaplar, devlet kontrolündeki veya kolektivist sistemlere özgü telafi mekanizmalarını temsil etmektedir; bu bölüm, piyasa temelli teşviklerden ve çığır açan başarıların bireysel olarak tanınmasından yoksun oldukları için inovasyonu etkili bir şekilde ödüllendiremeyeceklerini savunmaktadır.
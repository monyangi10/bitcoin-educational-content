question: 根據經濟自由主義理論，哪些補償形式能讓社會獎勵創新與進步？
answer: 工商業利潤、社會聲譽與榮耀，以及專利等智慧財產權
wrong_answers:
  - 政府補貼、國家表彰獎、中央資源分配系統
  - 來自公營機構的固定薪資、官僚升遷和標準化績效獎金
  - 集體所有權利益、社會平等措施及社區資源分享
explanation: |
  經濟自由主義指出創新的三種主要補償形式：因為率先推出更好的解決方案而獲得暫時的利潤、類似藝術家與詩人所享有的社會聲望，以及透過專利保護智慧財產權。錯誤答案代表國家控制或集體主義制度的典型補償機制，本章認為這些制度無法有效獎勵創新，因為它們缺乏以市場為基礎的獎勵機制，以及對突破性成就的個人肯定。
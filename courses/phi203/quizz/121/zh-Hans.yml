question: 根据经济自由主义理论，哪些补偿形式能够使社会奖励创新和进步？
answer: 工商业利润、社会声望和荣誉，以及专利等知识产权
wrong_answers:
  - 政府补贴、国家表彰奖励和中央资源分配制度
  - 公共机构的固定工资、官僚晋升和标准化绩效奖金
  - 集体所有权收益、社会平等措施和基于社区的资源共享
explanation: |
  经济自由主义提出了创新的三种主要补偿形式：率先推出更好解决方案而获得的暂时性利润、类似于艺术家和诗人享有的社会声望以及通过专利保护知识产权。错误答案代表了典型的国家控制或集体主义制度的补偿机制，本章认为这些制度无法有效地奖励创新，因为它们缺乏基于市场的激励机制和对突破性成就的个人认可。
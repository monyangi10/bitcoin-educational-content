question: Zgodnie z teorią liberalizmu gospodarczego, jakie formy rekompensaty umożliwiają społeczeństwom nagradzanie innowacji i postępu?
answer: Zyski przemysłowe i handlowe, prestiż i chwała społeczna oraz prawa własności intelektualnej, takie jak patenty
wrong_answers:
  - Dotacje rządowe, nagrody państwowe i scentralizowane systemy alokacji zasobów
  - Stałe pensje, biurokratyczne awanse i standardowe premie za wyniki w instytucjach publicznych
  - Korzyści wynikające z własności zbiorowej, środki równości społecznej i dzielenie się zasobami przez społeczność
explanation: |
  Liberalizm gospodarczy identyfikuje trzy główne formy rekompensaty za innowacje: tymczasowe zyski z bycia pierwszym na rynku z lepszymi rozwiązaniami, prestiż społeczny podobny do tego, jakim cieszą się artyści i poeci oraz ochrona własności intelektualnej poprzez patenty. Błędne odpowiedzi reprezentują mechanizmy kompensacyjne typowe dla systemów kontrolowanych przez państwo lub kolektywistycznych, które nie mogą skutecznie nagradzać innowacji, ponieważ brakuje im zachęt rynkowych i indywidualnego uznania dla przełomowych osiągnięć.
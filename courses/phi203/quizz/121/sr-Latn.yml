question: Prema teoriji ekonomskog liberalizma, koje forme kompenzacije omogućavaju društvima da nagrade inovacije i napredak?
answer: Industrijske i komercijalne dobiti, društveni prestiž i slava, i prava intelektualne svojine kao što su patenti
wrong_answers:
  - Vladine subvencije, državne nagrade za priznanje i centralizovani sistemi raspodele resursa
  - Fiksne plate, birokratska unapređenja i standardizovani bonusi za učinak iz javnih institucija
  - Kolektivno vlasništvo koristi, mere socijalne jednakosti i deljenje resursa zasnovano na zajednici
explanation: |
  Ekonomski liberalizam identifikuje tri glavna oblika kompenzacije za inovacije: privremeni profiti od toga što su prvi na tržištu sa boljim rešenjima, društveni prestiž sličan onom koji uživaju umetnici i pesnici, i zaštita intelektualne svojine putem patenata. Pogrešni odgovori predstavljaju mehanizme kompenzacije tipične za sisteme pod državnom kontrolom ili kolektivističke sisteme, za koje se u poglavlju tvrdi da ne mogu efikasno nagraditi inovacije jer im nedostaju tržišni podsticaji i individualno priznanje za revolucionarna dostignuća.
question: Theo lý thuyết chủ nghĩa tự do kinh tế, những hình thức bồi thường nào cho phép xã hội tưởng thưởng cho sự đổi mới và tiến bộ?
answer: Lợi nhuận công nghiệp và thương mại, uy tín và danh vọng xã hội, và quyền sở hữu trí tuệ như bằng sáng chế.
wrong_answers:
  - Các khoản trợ cấp của chính phủ, các giải thưởng công nhận của nhà nước và các hệ thống phân bổ nguồn lực tập trung.
  - Lương cố định, thăng tiến theo thủ tục hành chính và tiền thưởng hiệu suất tiêu chuẩn từ các tổ chức nhà nước.
  - Lợi ích của quyền sở hữu tập thể, các biện pháp bình đẳng xã hội và chia sẻ nguồn lực dựa trên cộng đồng.
explanation: |
  Chủ nghĩa tự do kinh tế xác định ba hình thức bồi thường chính cho sự đổi mới: lợi nhuận tạm thời từ việc là người đầu tiên đưa ra thị trường các giải pháp tốt hơn, uy tín xã hội tương tự như nghệ sĩ và nhà thơ, và bảo vệ quyền sở hữu trí tuệ thông qua bằng sáng chế. Các câu trả lời sai đại diện cho các cơ chế bồi thường điển hình của các hệ thống do nhà nước kiểm soát hoặc theo chủ nghĩa tập thể, mà chương này lập luận rằng không thể thưởng cho sự đổi mới một cách hiệu quả vì chúng thiếu các động lực dựa trên thị trường và sự công nhận cá nhân đối với những thành tựu đột phá.
question: ตามทฤษฎีเสรีนิยมทางเศรษฐกิจ รูปแบบของการชดเชยใดที่ช่วยให้สังคมสามารถให้รางวัลแก่การนวัตกรรมและความก้าวหน้าได้?
answer: กำไรทางอุตสาหกรรมและการค้า, เกียรติยศและชื่อเสียงทางสังคม, และสิทธิในทรัพย์สินทางปัญญาเช่นสิทธิบัตร
wrong_answers:
  - เงินอุดหนุนจากรัฐบาล, รางวัลการยอมรับจากรัฐ, และระบบการจัดสรรทรัพยากรแบบรวมศูนย์
  - เงินเดือนคงที่, การเลื่อนตำแหน่งแบบราชการ, และโบนัสผลงานมาตรฐานจากสถาบันสาธารณะ
  - ประโยชน์ของการเป็นเจ้าของร่วมกัน มาตรการความเท่าเทียมทางสังคม และการแบ่งปันทรัพยากรในชุมชน
explanation: |
  ลัทธิเสรีนิยมทางเศรษฐกิจระบุรูปแบบการชดเชยสำหรับนวัตกรรมสามรูปแบบหลัก: กำไรชั่วคราวจากการเป็นผู้นำตลาดด้วยโซลูชันที่ดีกว่า, เกียรติยศทางสังคมที่คล้ายกับที่ศิลปินและกวีได้รับ, และการคุ้มครองทรัพย์สินทางปัญญาผ่านสิทธิบัตร คำตอบที่ผิดแสดงถึงกลไกการชดเชยที่เป็นแบบฉบับของระบบที่ควบคุมโดยรัฐหรือระบบรวมหมู่ ซึ่งบทนี้โต้แย้งว่าไม่สามารถให้รางวัลแก่นวัตกรรมได้อย่างมีประสิทธิภาพเพราะขาดแรงจูงใจที่อิงตลาดและการยอมรับส่วนบุคคลสำหรับความสำเร็จที่ก้าวล้ำ
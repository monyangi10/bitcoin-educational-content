question: Selon la théorie du libéralisme économique, quelles formes de rémunération permettent aux sociétés de récompenser l'innovation et le progrès ?
answer: Les profits industriels et commerciaux, le prestige social et la gloire, les droits de propriété intellectuelle comme les brevets
wrong_answers:
  - Subventions publiques, prix de reconnaissance de l'État et systèmes centralisés d'allocation des ressources
  - Salaires fixes, promotions bureaucratiques et primes de performance standardisées des institutions publiques
  - Avantages de la propriété collective, mesures d'égalité sociale et partage des ressources au niveau communautaire
explanation: |
  Le libéralisme économique identifie trois formes principales de compensation pour l'innovation : les bénéfices temporaires liés au fait d'être le premier à commercialiser de meilleures solutions, le prestige social similaire à celui dont jouissent les artistes et les poètes, et la protection de la propriété intellectuelle par le biais des brevets. Les mauvaises réponses représentent des mécanismes de compensation typiques des systèmes contrôlés par l'État ou collectivistes, qui, selon le chapitre, ne peuvent pas récompenser efficacement l'innovation parce qu'ils manquent d'incitations basées sur le marché et de reconnaissance individuelle pour les percées.
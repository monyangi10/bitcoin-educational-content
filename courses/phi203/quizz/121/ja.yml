question: 経済的自由主義の理論によれば、社会が革新と進歩に報いることを可能にする報酬の形態とは何か？
answer: 工業的・商業的利益、社会的名声と栄光、特許などの知的財産権
wrong_answers:
  - 政府補助金、国家表彰、集中資源配分システム
  - 公的機関の固定給、官僚的昇進、画一的な業績賞与
  - 集団所有の利益、社会的平等措置、地域ベースの資源共有
explanation: |
  経済的自由主義は、イノベーションに対する補償の主な形態として、より優れた解決策をいち早く市場に投入することによる一時的な利益、芸術家や詩人が享受するような社会的名声、特許による知的財産の保護の3つを挙げている。間違った答えは、国家統制や集団主義に典型的な補償メカニズムであり、市場ベースのインセンティブや画期的な業績に対する個人の評価が欠如しているため、イノベーションに効果的に報いることができないと本章では論じている。
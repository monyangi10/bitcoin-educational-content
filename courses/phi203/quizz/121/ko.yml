question: 경제적 자유주의 이론에 따르면, 사회가 혁신과 진보에 보상할 수 있는 보상의 형태는 어떤 것이 있을까요?
answer: 산업 및 상업적 이익, 사회적 명성 및 명예, 특허와 같은 지적 재산권
wrong_answers:
  - 정부 보조금, 주정부 표창 및 중앙 집중식 리소스 할당 시스템
  - 공공기관의 고정 급여, 관료적 승진 및 표준화된 성과 보너스
  - 공동 소유권 혜택, 사회적 평등 조치, 커뮤니티 기반 리소스 공유
explanation: |
  경제적 자유주의는 혁신에 대한 보상의 세 가지 주요 형태로 더 나은 솔루션을 시장에 먼저 출시함으로써 얻는 일시적인 이익, 예술가나 시인이 누리는 것과 유사한 사회적 명성, 특허를 통한 지적 재산권 보호를 꼽습니다. 오답은 국가 통제 또는 집단주의 체제의 전형적인 보상 메커니즘을 나타내는데, 이 장에서는 시장 기반 인센티브와 획기적인 성과에 대한 개인의 인정이 부족하기 때문에 혁신을 효과적으로 보상할 수 없다고 주장합니다.
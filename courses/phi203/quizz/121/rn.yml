question: Dushingiye ku ciyumviro c’uburenganzira bwo kwidegemvya mu vy’ubutunzi, ni uburyo ubuhe bwo gutanga indishi bushobora gutuma imiryango ishobora guhemba ubuhinga bushasha n’iterambere?
answer: Inyungu z'inganda n'ubudandaji, icubahiro n'ubuninahazwa mu kibano, n'uburenganzira bw'umutungo w'ubwenge nk'uburenganzira bwo gukoresha
wrong_answers:
  - Infashanyo za Leta, ibihembo vyemewe na Leta, n'uburyo bwo gutanga umutungo
  - Umushahara udahinduka, kuduzwa mu ntebe, n'agashimwe k'ibikorwa bihuye n'inzego za Leta
  - Inyungu z'ubutunzi rusangi, ingero z'uburinganire mu kibano, no gusangira ubutunzi bushingiye ku kibano
explanation: |
  Ukwidegemvya kw’ubutunzi kuragaragaza uburyo butatu nyamukuru bwo gusubiza inyuma ubuhinga bushasha: inyungu z’igihe gito zivuye mu kuba uwa mbere mu gutanga inyishu nziza kuruta, icubahiro co mu kibano gisa n’ico abahinga mu vy’ubuhinga bw’amasanamu n’abanyamivugo bafise, no kurinda umutungo w’ubwenge biciye ku mpapuro z’uburenganzira. Inyishu zitari zo zigereranya uburyo bwo gutanga indishi busanzwe mu mice igenzurwa na Leta canke mu buryo bw’abanyagihugu, ivyo ikigabane kivuga ko bidashobora guhemba neza ubuhinga bushasha kubera ko butagira inkurikizi zishingiye ku masoko no kwemerwa ku muntu ku giti ciwe kubera ivyo ashitseko.
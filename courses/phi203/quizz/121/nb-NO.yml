question: Hvilke former for kompensasjon gjør det mulig for et samfunn å belønne innovasjon og fremskritt, ifølge økonomisk liberalistisk teori?
answer: Industriell og kommersiell fortjeneste, sosial prestisje og ære, og immaterielle rettigheter som patenter
wrong_answers:
  - Statlige subsidier, statlige anerkjennelsespriser og sentraliserte ressursfordelingssystemer
  - Faste lønninger, byråkratiske forfremmelser og standardiserte resultatbonuser fra offentlige institusjoner
  - Kollektive eierskapsfordeler, tiltak for sosial utjevning og samfunnsbasert ressursdeling
explanation: |
  Den økonomiske liberalismen identifiserer tre hovedformer for kompensasjon for innovasjon: midlertidig fortjeneste ved å være først ute med bedre løsninger, sosial prestisje på linje med den kunstnere og poeter nyter godt av, og beskyttelse av immaterielle rettigheter gjennom patenter. De gale svarene representerer kompensasjonsmekanismer som er typiske for statskontrollerte eller kollektivistiske systemer, som ifølge kapittelet ikke kan belønne innovasjon på en effektiv måte fordi de mangler markedsbaserte insentiver og individuell anerkjennelse for banebrytende prestasjoner.
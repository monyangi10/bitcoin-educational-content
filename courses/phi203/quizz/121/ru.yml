question: Согласно теории экономического либерализма, какие формы вознаграждения позволяют обществу поощрять инновации и прогресс?
answer: Промышленная и коммерческая прибыль, социальный престиж и слава, а также права на интеллектуальную собственность, например патенты
wrong_answers:
  - Государственные субсидии, государственные премии и централизованные системы распределения ресурсов
  - Фиксированные зарплаты, бюрократические повышения и стандартные бонусы за работу в государственных учреждениях
  - Выгоды от коллективной собственности, меры социального равенства и совместное использование ресурсов на уровне общин
explanation: |
  Экономический либерализм выделяет три основные формы вознаграждения за инновации: временная прибыль от того, что человек первым выходит на рынок с лучшими решениями, социальный престиж, подобный тому, которым пользуются художники и поэты, и защита интеллектуальной собственности с помощью патентов. Неправильные ответы представляют собой механизмы компенсации, характерные для государственных или коллективистских систем, которые, как утверждается в главе, не могут эффективно вознаграждать инновации, поскольку в них отсутствуют рыночные стимулы и индивидуальное признание прорывных достижений.
question: Majandusliberalismi teooria kohaselt, millised hüvitise vormid võimaldavad ühiskonnal premeerida innovatsiooni ja progressi?
answer: Tööstus- ja ärikasum, sotsiaalne prestiiž ja au ning intellektuaalomandi õigused, näiteks patendid
wrong_answers:
  - Valitsuse toetused, riiklikud tunnustused ja tsentraliseeritud ressursside jaotamise süsteemid
  - Fikseeritud palgad, bürokraatlikud edutamised ja avalike asutuste standardiseeritud tulemustasud
  - Kollektiivse omandiõiguse eelised, sotsiaalse võrdõiguslikkuse meetmed ja kogukonnapõhine ressursside jagamine
explanation: |
  Majandusliberalism määratleb kolm peamist innovatsiooni hüvitamise vormi: ajutine kasum, mis saadakse sellest, et ollakse esimesena turul paremate lahendustega, sotsiaalne prestiiž, mis sarnaneb kunstnike ja luuletajate omaga, ning intellektuaalse omandi kaitse patentide kaudu. Valed vastused esindavad riigi poolt kontrollitud või kollektivistlikele süsteemidele iseloomulikke hüvitusmehhanisme, mis peatüki kohaselt ei suuda innovatsiooni tõhusalt premeerida, sest neil puuduvad turupõhised stiimulid ja individuaalne tunnustus läbimurdeliste saavutuste eest.
question: Taloudellisen liberalismin teorian mukaan millaiset korvausmuodot mahdollistavat sen, että yhteiskunnat voivat palkita innovaatiota ja edistystä?
answer: Teolliset ja kaupalliset voitot, sosiaalinen arvostus ja kunnia sekä immateriaalioikeudet, kuten patentit
wrong_answers:
  - Valtion tuet, valtion tunnustuspalkinnot ja keskitetyt resurssien jakojärjestelmät
  - Julkisten laitosten kiinteät palkat, byrokraattiset ylennykset ja vakiomuotoiset tulospalkkiot
  - Kollektiiviset omistusetuudet, sosiaaliset tasa-arvotoimenpiteet ja resurssien jakaminen yhteisöllisesti
explanation: |
  Taloudellisessa liberalismissa innovaatiosta maksetaan korvausta kolmella eri tavalla: tilapäiset voitot, joita saadaan siitä, että markkinoille tuodaan ensimmäisinä parempia ratkaisuja, taiteilijoiden ja runoilijoiden nauttimaa sosiaalista arvostusta sekä patenttien avulla tarjottava teollis- ja tekijänoikeuksien suoja. Väärät vastaukset edustavat korvausmekanismeja, jotka ovat tyypillisiä valtiojohtoisille tai kollektivistisille järjestelmille, joiden ei luvun mukaan voida tehokkaasti palkita innovaatiotoimintaa, koska niistä puuttuvat markkinapohjaiset kannustimet ja yksilöllinen tunnustus läpimurtosuorituksista.
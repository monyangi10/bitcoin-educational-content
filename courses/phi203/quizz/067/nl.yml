question: Welke paradox bestaat er volgens de tekst tussen veiligheid en economische vooruitgang?
answer: Veiligheid is zowel een voorwaarde voor ontwikkeling als een gevolg ervan
wrong_answers:
  - Veiligheid komt altijd nadat economische ontwikkeling is bereikt
  - Economische vooruitgang maakt veiligheidsmaatregelen vanzelf overbodig
  - Veiligheid en economische vooruitgang zijn volledig onafhankelijk van elkaar
explanation: |
  Het hoofdstuk legt uit dat veiligheid en economische vooruitgang een paradoxale relatie creëren: veiligheid is nodig voordat ontwikkeling kan plaatsvinden (je kunt niet innoveren of investeren op lange termijn zonder veiligheid), maar je hebt ook een economisch overschot van de productie nodig om de instellingen te financieren die voor veiligheid zorgen. Dit creëert een cyclus die moeilijk op gang te brengen is, maar als hij eenmaal begonnen is, wordt hij zelfversterkend. De andere antwoorden zijn fout omdat ze een simpele eenrichtingsrelatie of onafhankelijkheid suggereren, in plaats van deze complexe onderlinge afhankelijkheid.
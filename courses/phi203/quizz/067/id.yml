question: Menurut teks tersebut, paradoks apa yang ada antara keamanan dan kemajuan ekonomi?
answer: Keamanan merupakan prasyarat untuk pengembangan dan konsekuensi dari pengembangan tersebut
wrong_answers:
  - Keamanan selalu datang setelah pembangunan ekonomi tercapai
  - Kemajuan ekonomi secara alamiah menghilangkan kebutuhan akan langkah-langkah keamanan
  - Keamanan dan kemajuan ekonomi sepenuhnya tidak bergantung satu sama lain
explanation: |
  Bab ini menjelaskan bahwa keamanan dan kemajuan ekonomi menciptakan hubungan yang paradoksal: keamanan diperlukan sebelum pembangunan dapat terjadi (Anda tidak dapat berinovasi atau berinvestasi jangka panjang tanpanya), tetapi Anda juga memerlukan surplus ekonomi dari produksi untuk mendanai lembaga-lembaga yang menyediakan keamanan. Hal ini menciptakan siklus yang sulit untuk dimulai, namun begitu dimulai, siklus ini akan menjadi penguat. Jawaban-jawaban lain salah karena mereka menyarankan hubungan satu arah yang sederhana atau independensi, bukan saling ketergantungan yang kompleks ini.
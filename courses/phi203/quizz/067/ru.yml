question: Согласно тексту, какой парадокс существует между безопасностью и экономическим прогрессом?
answer: Безопасность является как необходимым условием развития, так и его следствием
wrong_answers:
  - Безопасность всегда приходит после достижения экономического развития
  - Экономический прогресс естественным образом устраняет необходимость в мерах безопасности
  - Безопасность и экономический прогресс совершенно не зависят друг от друга
explanation: |
  В главе объясняется, что безопасность и экономический прогресс создают парадоксальную взаимосвязь: безопасность необходима для развития (без нее невозможно внедрять инновации или осуществлять долгосрочные инвестиции), но также необходим экономический излишек от производства для финансирования институтов, обеспечивающих безопасность. Это создает сложный цикл, который трудно запустить, но, начавшись, он становится самоподдерживающимся. Другие ответы неверны, поскольку предполагают простые односторонние отношения или независимость, а не сложную взаимозависимость.
question: Według tekstu, jaki paradoks istnieje między bezpieczeństwem a postępem gospodarczym?
answer: Bezpieczeństwo jest zarówno warunkiem wstępnym rozwoju, jak i jego konsekwencją
wrong_answers:
  - Bezpieczeństwo zawsze pojawia się po osiągnięciu rozwoju gospodarczego
  - Postęp gospodarczy naturalnie eliminuje potrzebę stosowania środków bezpieczeństwa
  - Bezpieczeństwo i postęp gospodarczy są od siebie całkowicie niezależne
explanation: |
  W rozdziale tym wyjaśniono, że bezpieczeństwo i postęp gospodarczy tworzą paradoksalny związek: bezpieczeństwo jest potrzebne, aby mógł nastąpić rozwój (bez niego nie można wprowadzać innowacji ani inwestować długoterminowo), ale potrzebna jest również nadwyżka ekonomiczna z produkcji, aby sfinansować instytucje zapewniające bezpieczeństwo. Tworzy to trudny do rozpoczęcia cykl, ale raz rozpoczęty staje się samonapędzający. Pozostałe odpowiedzi są błędne, ponieważ sugerują prostą jednokierunkową relację lub niezależność, a nie tę złożoną współzależność.
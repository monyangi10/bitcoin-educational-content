question: What intellectual tradition did Paul Leroy-Beaulieu identify as responsible for the mythologization of the modern state as a superior, almost divine being?
answer: Nineteenth-century German writers who presented the state as an intangible earthly deity with a capacity for foresight and direction that no individual could possess
wrong_answers:
  - The French revolutionary tradition, which elevated the nation-state to the status of the general will embodying the sovereignty of all citizens
  - English utilitarians who argued that a strong central state was the most efficient instrument for maximizing the happiness of the greatest number
  - Medieval Catholic theology, which transferred the authority previously attributed to the Church onto the secular state in the early modern period
explanation: |
  The text identifies a specific intellectual tradition behind the mythologization of the state: nineteen-century German writers who presented it as a kind of earthly deity — an intangible, superior being devoid of human defects and endowed with a capacity for foresight and direction no individual could match. The state was compared to the brain of the social body, justifying ever-broader responsibilities for it. Paul Leroy-Beaulieu, who had studied in Germany and knew this literature intimately, opposed this idealized vision with a down-to-earth analysis of what the modern democratic state actually is: men organized into parties competing for temporary possession of political power.

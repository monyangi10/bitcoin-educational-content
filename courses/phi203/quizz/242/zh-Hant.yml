question: 根據自由主義理論，當國家壟斷它認為重要的產業時，會出現什麼矛盾的情況？
answer: 國家貶低並犧牲了提供這些基本服務的專業人員，使他們無法獲得應有的社會地位
wrong_answers:
  - 國家製造過度競爭，降低基本服務的品質，同時維持人為的稀缺性
  - 國家為消費者帶來更高的成本，同時減少一般民眾獲得這些服務的機會
  - 在私人利益操控公共政策以消除真正市場競爭的情況下，國家創造了監管俘虜。
explanation: |
  自由主義理論指出了國家壟斷的一個基本悖論：正因為國家認為某些行業非常重要，所以必須加以控制，結果卻損害了在這些行業工作的人的價值。文中以教育和醫療保健來說明這一點，在這兩個領域中，本應受到社會高度重視的專業人員，反而被貶低其工作的公共服務體系「犧牲」了。這與自由主義者的預言背道而馳，自由主義者預言在自由體系中，那些保護生命、豐富生命的人會得到適當的重視。
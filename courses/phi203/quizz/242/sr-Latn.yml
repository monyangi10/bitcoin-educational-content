question: Prema liberalnoj teoriji, koja paradoksalna situacija nastaje kada država monopolizuje sektore koje smatra esencijalnim?
answer: Država devalvira i žrtvuje same profesionalce koji pružaju ove esencijalne usluge, sprečavajući ih da postignu svoj zasluženi društveni status.
wrong_answers:
  - Država stvara prekomernu konkurenciju koja snižava kvalitet osnovnih usluga, dok održava veštačku oskudicu.
  - Država generiše veće troškove za potrošače, istovremeno smanjujući pristup ovim uslugama za opštu populaciju.
  - Država stvara regulatorno zarobljavanje gde privatni interesi manipulišu javnom politikom kako bi eliminisali pravu tržišnu konkurenciju.
explanation: |
  Liberalna teorija identifikuje fundamentalni paradoks u državnoj monopolizaciji: upravo zato što država smatra da su određeni sektori toliko esencijalni da moraju biti kontrolisani, ona na kraju potkopava samu vrednost onih koji u njima rade. Tekst to ilustruje sa obrazovanjem i zdravstvom, gde profesionalci koji bi trebalo da budu visoko cenjeni u društvu bivaju 'žrtvovani' od strane javnog servisnog sistema koji obezvređuje njihov rad. Ovo je u suprotnosti sa liberalnim predviđanjem da bi u slobodnom sistemu, oni koji štite i obogaćuju život bili adekvatno vrednovani.
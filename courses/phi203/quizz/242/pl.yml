question: Według teorii liberalnej, jaka paradoksalna sytuacja pojawia się, gdy państwo monopolizuje sektory, które uważa za kluczowe?
answer: Państwo dewaluuje i poświęca samych profesjonalistów, którzy świadczą te podstawowe usługi, uniemożliwiając im osiągnięcie należnego im statusu społecznego
wrong_answers:
  - Państwo tworzy nadmierną konkurencję, która obniża jakość podstawowych usług, jednocześnie utrzymując sztuczny niedobór
  - Państwo generuje wyższe koszty dla konsumentów, jednocześnie ograniczając dostęp do tych usług dla ogółu populacji
  - Państwo tworzy zawłaszczenie regulacyjne, w którym prywatne interesy manipulują polityką publiczną w celu wyeliminowania prawdziwej konkurencji rynkowej
explanation: |
  Teoria liberalna identyfikuje fundamentalny paradoks w monopolizacji państwowej: właśnie dlatego, że państwo postrzega pewne sektory jako tak istotne, że muszą być kontrolowane, kończy się to podważaniem samej wartości tych, którzy w nich pracują. Tekst ilustruje to na przykładzie edukacji i opieki zdrowotnej, gdzie specjaliści, którzy powinni być wysoko cenieni w społeczeństwie, są zamiast tego "poświęcani" przez system usług publicznych, który deprecjonuje ich pracę. Jest to sprzeczne z liberalną prognozą, że w wolnym systemie ci, którzy chronią i wzbogacają życie, będą odpowiednio cenieni.
question: 自由主義理論によれば、国家が必要不可欠と考える分野を独占する場合、どのような逆説的状況が生じるのか？
answer: 国家は、このような必要不可欠なサービスを提供する専門家そのものを切り捨て、犠牲にしている。
wrong_answers:
  - 国家は過剰な競争を引き起こし、人為的な希少性を維持しながら、必要不可欠なサービスの質を低下させる。
  - 州は、消費者により高いコストをかけると同時に、一般消費者がこれらのサービスを利用する機会を減らしている。
  - 国家は、私利私欲のために公共政策を操作し、真の市場競争を排除する規制の虜囚を生み出す。
explanation: |
  リベラルの理論では、国家による独占には根本的なパラドックスがあると指摘する。国家が特定の部門を必要不可欠なものと見なし、管理しなければならないがゆえに、そこで働く人々の価値そのものを損なってしまうのだ。社会的に高く評価されるべき専門家が、公共サービス制度によって「犠牲」にされ、その働きが軽んじられる。これは、自由なシステムでは、生命を守り、豊かにする者が正しく評価されるという自由主義者の予測に反する。
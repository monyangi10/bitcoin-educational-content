question: Enligt liberal teori, vilken paradoxal situation uppstår när staten monopoliserar sektorer som den anser vara viktiga?
answer: Staten nedvärderar och offrar just de yrkesverksamma som tillhandahåller dessa viktiga tjänster och hindrar dem från att uppnå sin rättmätiga sociala status
wrong_answers:
  - Staten skapar överdriven konkurrens som sänker kvaliteten på viktiga tjänster samtidigt som den upprätthåller artificiell knapphet
  - Staten genererar högre kostnader för konsumenterna samtidigt som den minskar tillgången till dessa tjänster för den allmänna befolkningen
  - Staten skapar "regulatory capture" där privata intressen manipulerar den offentliga politiken för att eliminera verklig marknadskonkurrens
explanation: |
  Liberal teori identifierar en grundläggande paradox i statlig monopolisering: just för att staten ser vissa sektorer som så viktiga att de måste kontrolleras, underminerar den till slut själva värdet av dem som arbetar inom dem. Texten illustrerar detta med utbildning och sjukvård, där yrkesverksamma som borde vara högt värderade i samhället i stället "offras" av public service-systemet som nedvärderar deras arbete. Detta strider mot den liberala förutsägelsen att i ett fritt system skulle de som skyddar och berikar livet värderas på rätt sätt.
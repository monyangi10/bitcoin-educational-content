question: Welke paradoxale situatie ontstaat er volgens de liberale theorie wanneer de staat sectoren monopoliseert die hij als essentieel beschouwt?
answer: De staat devalueert en offert juist de professionals op die deze essentiële diensten leveren, waardoor ze niet hun rechtmatige sociale status kunnen bereiken
wrong_answers:
  - De staat creëert buitensporige concurrentie die de kwaliteit van essentiële diensten omlaag drijft terwijl kunstmatige schaarste in stand wordt gehouden
  - De staat genereert hogere kosten voor consumenten en vermindert tegelijkertijd de toegang tot deze diensten voor de algemene bevolking
  - De staat creëert "regulatory capture" waarbij particuliere belangen het overheidsbeleid manipuleren om echte concurrentie op de markt uit te schakelen
explanation: |
  De liberale theorie identificeert een fundamentele paradox in staatsmonopolisering: juist omdat de staat bepaalde sectoren zo essentieel vindt dat ze gecontroleerd moeten worden, ondermijnt hij uiteindelijk de waarde van degenen die er werken. De tekst illustreert dit aan de hand van onderwijs en gezondheidszorg, waar professionals die hoog gewaardeerd zouden moeten worden in de maatschappij in plaats daarvan 'opgeofferd' worden door het openbare dienstsysteem dat hun werk devalueert. Dit is in tegenspraak met de liberale voorspelling dat in een vrij systeem degenen die het leven beschermen en verrijken op de juiste waarde geschat zouden worden.
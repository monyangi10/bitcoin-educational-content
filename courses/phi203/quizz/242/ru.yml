question: Согласно либеральной теории, какая парадоксальная ситуация возникает, когда государство монополизирует отрасли, которые оно считает важными?
answer: Государство обесценивает и приносит в жертву тех самых профессионалов, которые предоставляют эти важнейшие услуги, не позволяя им достичь своего законного социального статуса
wrong_answers:
  - Государство создает чрезмерную конкуренцию, которая снижает качество основных услуг, поддерживая искусственный дефицит
  - Государство увеличивает расходы для потребителей, одновременно сокращая доступ к этим услугам для населения
  - Государство создает регуляторный захват, когда частные интересы манипулируют государственной политикой, чтобы устранить настоящую рыночную конкуренцию
explanation: |
  Либеральная теория выявляет фундаментальный парадокс государственной монополизации: именно потому, что государство рассматривает определенные отрасли как настолько важные, что их необходимо контролировать, оно в итоге подрывает саму ценность тех, кто в них работает. Текст иллюстрирует это на примере образования и здравоохранения, где профессионалы, которые должны высоко цениться в обществе, вместо этого "приносятся в жертву" системой государственных услуг, обесценивающей их труд. Это противоречит либеральному прогнозу о том, что в свободной системе те, кто защищает и обогащает жизнь, будут цениться должным образом.
question: イヴ・ギヨの経済自由主義の分析によれば、発明家が新しい組み合わせや解決策を追求する動機は主に何なのだろうか？
answer: 有益な行動を通じて、身体と精神の両面で個人的な満足を追求すること。
wrong_answers:
  - 政府当局によって定義された集団的な社会的利益に貢献したいという願望
  - 決められた規則や確立されたプロの伝統に従う義務
  - 既存の生産方式を維持し、社会の安定を維持する必要性
explanation: |
  イヴ・ギヨは、発明家たちは身体と精神の両方における個人的な満足を追求することによって突き動かされ、その結果、彼らは自然に自分の活動を違った形で組織化し、新しい組み合わせを見出すようになる、と強調した。個人的な充足感を求めるこの利己的な動機は、有用なイノベーションを生み出すことによって、逆説的に社会に貢献する。間違った答えは、実際にイノベーションを阻害する国家統制システムの特徴を反映している。あらかじめ決められたルールに従うこと、集団的に定義された利益に奉仕すること、既存の方法を維持すること、これらはすべて、自由な社会における進歩の原動力となる創造的な問題解決を妨げる、ある種の硬直した構造を表している。
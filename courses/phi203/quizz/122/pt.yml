question: De acordo com a análise do liberalismo económico de Yves Guyot, o que motiva principalmente os inventores a procurar novas combinações e soluções?
answer: A procura de satisfações pessoais, tanto para o corpo como para o espírito, através de acções úteis
wrong_answers:
  - O desejo de servir interesses sociais colectivos definidos pelas autoridades governamentais
  - A obrigação de seguir regulamentos pré-determinados e tradições profissionais estabelecidas
  - A necessidade de manter os métodos de produção existentes e de preservar a estabilidade social
explanation: |
  Yves Guyot sublinhou que os inventores são movidos pela procura de satisfações pessoais, tanto para o corpo como para o espírito, o que os leva naturalmente a organizar as suas actividades de forma diferente e a encontrar novas combinações. Esta motivação interesseira de realização pessoal serve, paradoxalmente, a sociedade, criando inovações úteis. As respostas erradas reflectem caraterísticas dos sistemas controlados pelo Estado que, na realidade, inibem a inovação - seguir regras pré-determinadas, servir interesses definidos coletivamente ou manter os métodos existentes representam o tipo de estruturas rígidas que impedem a resolução criativa de problemas que impulsiona o progresso nas sociedades livres.
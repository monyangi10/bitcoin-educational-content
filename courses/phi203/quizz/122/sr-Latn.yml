question: Prema analizi Yvesa Guyota o ekonomskom liberalizmu, primarni motivatori koji podstiču pronalazače da traže nove kombinacije i rešenja su lični interes i želja za profitom.
answer: Potraga za ličnim zadovoljstvima za telo i duh kroz korisnu akciju
wrong_answers:
  - Želja za služenjem kolektivnim društvenim interesima definisanim od strane vladinih vlasti
  - Obaveza pridržavanja unapred određenih propisa i uspostavljenih profesionalnih tradicija
  - Potrebа dа se očuvаju postojeće metode proizvodnje i očuvа društvenа stаbilnost
explanation: |
  Yves Guyot je naglasio da su pronalazači vođeni potragom za ličnim zadovoljstvima kako tela tako i duha, što ih prirodno vodi ka organizovanju svojih aktivnosti na drugačiji način i pronalaženju novih kombinacija. Ova sebična motivacija za lično ispunjenje paradoksalno služi društvu stvaranjem korisnih inovacija. Pogrešni odgovori odražavaju karakteristike sistema pod državnom kontrolom koji zapravo sprečavaju inovacije - praćenje unapred određenih pravila, služenje kolektivno definisanim interesima ili održavanje postojećih metoda predstavljaju vrstu rigidnih struktura koje sprečavaju kreativno rešavanje problema koje pokreće napredak u slobodnim društvima.
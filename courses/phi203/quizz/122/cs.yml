question: Co podle analýzy ekonomického liberalismu Yvese Guyota motivuje vynálezce především k hledání nových kombinací a řešení?
answer: Snaha o osobní uspokojení těla i ducha prostřednictvím užitečné činnosti
wrong_answers:
  - Touha sloužit kolektivním společenským zájmům definovaným vládními orgány
  - Povinnost dodržovat předem stanovené předpisy a zavedené profesní tradice
  - Potřeba zachovat stávající výrobní metody a zachovat sociální stabilitu
explanation: |
  Yves Guyot zdůraznil, že vynálezci jsou vedeni snahou o osobní uspokojení těla i ducha, což je přirozeně vede k odlišné organizaci činností a hledání nových kombinací. Tato vlastní motivace k osobnímu uspokojení paradoxně slouží společnosti tím, že vytváří užitečné inovace. Špatné odpovědi odrážejí charakteristiky státem řízených systémů, které ve skutečnosti brání inovacím - dodržování předem daných pravidel, služba kolektivně definovaným zájmům nebo udržování stávajících metod, to vše představuje druh rigidních struktur, které brání kreativnímu řešení problémů, jež je hnací silou pokroku ve svobodných společnostech.
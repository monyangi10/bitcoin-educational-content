question: 경제 자유주의에 대한 이브 기요의 분석에 따르면, 발명가들이 새로운 조합과 솔루션을 추구하게 되는 주된 동기는 무엇일까요?
answer: 유용한 행동을 통해 몸과 정신 모두에 대한 개인적인 만족을 추구합니다
wrong_answers:
  - 정부 당국에 의해 정의된 집단적 사회적 이익에 봉사하려는 욕구
  - 미리 정해진 규정과 확립된 직업적 전통을 따라야 할 의무
  - 기존 생산 방식을 유지하고 사회적 안정성을 유지해야 할 필요성
explanation: |
  이브 기요는 발명가들은 육체와 정신 모두에 대한 개인적인 만족을 추구하기 때문에 자연스럽게 활동을 다르게 조직하고 새로운 조합을 찾게 된다고 강조했습니다. 개인의 성취를 위한 이러한 이기적인 동기는 역설적으로 유용한 혁신을 창출함으로써 사회에 도움이 됩니다. 오답은 혁신을 실제로 저해하는 국가 통제 시스템의 특성을 반영합니다. 미리 정해진 규칙을 따르거나 집단적으로 정의된 이익을 위해 봉사하거나 기존 방식을 유지하는 것은 모두 자유 사회에서 발전을 이끄는 창의적인 문제 해결을 막는 경직된 구조를 나타냅니다.
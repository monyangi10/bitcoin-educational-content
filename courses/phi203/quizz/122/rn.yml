question: Dukurikije icegeranyo ca Yves Guyot ku bijanye n’uburenganzira bwo kwidegemvya mu vy’ubutunzi, ni igiki ahanini kivyurira abahinguzi gukurikirana imigwi mishasha n’imiti mishasha?
answer: Gukurikirana ivyiza vy’umuntu ku giti ciwe ku mubiri no ku mpwemu biciye mu bikorwa vy’ingirakamaro .
wrong_answers:
  - Icipfuzo co gukorera inyungu rusangi z'imibano zisobanurwa n'ubutegetsi bwa Leta
  - Inshingano yo gukurikiza amabwirizwa yashinzwe mbere y'igihe n'imigenzo y'umwuga yashinzwe
  - Ivyerekeye ugukomeza uburyo bwo guhingura busanzweho no kubungabunga ugutekana kw'imibano
explanation: |
  Yves Guyot yashimikiye ko abahinguzi b’ibintu bishasha bavyurirwa umutima wo gukurikirana ivyo umuntu yipfuza ku mubiri no ku mpwemu, ivyo bikaba bituma mu bisanzwe batunganya ibikorwa vyabo mu buryo butandukanye kandi bakaronka ibintu bishasha vyo gukorana. Ico ciyumviro c’ukwikunda co gushitsa ivyo umuntu yipfuza gifasha abantu mu buryo buteye ubwoba mu kurema ibintu bishasha vy’ingirakamaro. Inyishu zitari zo zigaragaza ibiranga uburyo bugenzurwa na Leta mu vy’ukuri bubuza gukora ibintu bishasha - gukurikiza amategeko yashinzwe imbere y’igihe, gukorera inyungu rusangi, canke kubungabunga uburyo busanzweho, vyose bigereranya ubwoko bw’imibumbe ikomeye ibuza gutorera umuti ingorane mu buryo bw’ubuhinga butera imbere mu mibano yidegemvya.
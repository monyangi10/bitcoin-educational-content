question: Prema liberalnoj teoriji, koji fundamentalni princip razlikuje dobrovoljna društva uzajamne pomoći od sistema socijalne pomoći koje pruža država?
answer: Društva uzajamne pomoći su delovala kroz konkurenciju i dobrovoljno udruživanje, omogućavajući kontinuirano unapređenje i individualni izbor.
wrong_answers:
  - Društva uzajamne pomoći pružala su sveobuhvatniju pokrivenost kroz centralizovano planiranje i jedinstvene metode distribucije.
  - Društva uzajamne pomoći eliminisala su potrebu za individualnom odgovornošću stvaranjem kolektivnog vlasništva nad svim resursima.
  - Društva uzajamne pomoći su delovala kroz vladinu regulativu kako bi osigurala jednak pristup i standardizovane beneficije za sve članove.
explanation: |
  Tekst jasno utvrđuje da su društva uzajamne pomoći iz 19. veka bila preci modernih sistema socijalne zaštite, ali su funkcionisala na osnovu konkurencije, a ne državnog monopola. Ova konkurencija je omogućavala kontinuirano unapređenje praksi, pri čemu su uspešne metode napredovale, a neefikasne bile napuštene. Dobrovoljna priroda poštovala je individualni izbor i dostojanstvo, u kontrastu sa birokratskom javnom pomoći za koju tekst tvrdi da degradira pojedince i održava ih u stanju zavisnosti. Pogrešni odgovori netačno sugerišu centralizaciju, kolektivno vlasništvo ili državnu regulaciju - sve suprotno liberalnim principima opisanim u tekstu.
question: Según la teoría liberal, ¿qué principio fundamental distingue a las sociedades de ayuda mutua voluntaria de los sistemas de bienestar proporcionados por el Estado?
answer: Las sociedades de ayuda mutua funcionaban mediante la competencia y la asociación voluntaria, lo que permitía la mejora continua y la elección individual
wrong_answers:
  - Las sociedades de socorro mutuo ofrecían una cobertura más amplia gracias a una planificación centralizada y a métodos de distribución uniformes
  - Las sociedades de ayuda mutua eliminaron la necesidad de responsabilidad individual al crear la propiedad colectiva de todos los recursos
  - Sociedades de ayuda mutua reguladas por el Estado para garantizar la igualdad de acceso y las mismas prestaciones a todos sus miembros
explanation: |
  El texto establece claramente que las sociedades de ayuda mutua del siglo XIX fueron los antepasados de los modernos sistemas de bienestar, pero funcionaban sobre la base de la competencia y no del monopolio estatal. Esta competencia permitía la mejora continua de las prácticas, con la prosperidad de los métodos exitosos y el abandono de los ineficaces. La naturaleza voluntaria respetaba la elección individual y la dignidad, en contraste con la asistencia pública burocrática que, según el texto, degrada a los individuos y los mantiene en un estado de dependencia. Las respuestas incorrectas sugieren centralización, propiedad colectiva o regulación gubernamental, todo ello contrario a los principios liberales descritos.
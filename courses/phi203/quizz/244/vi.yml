question: Theo lý thuyết tự do, nguyên tắc cơ bản nào phân biệt các hội tương trợ tự nguyện với các hệ thống phúc lợi do nhà nước cung cấp?
answer: Các hội tương trợ hoạt động dựa trên sự cạnh tranh và liên kết tự nguyện, cho phép cải tiến liên tục và sự lựa chọn cá nhân.
wrong_answers:
  - Các hội tương trợ cung cấp phạm vi bảo hiểm toàn diện hơn thông qua kế hoạch tập trung và phương pháp phân phối đồng đều.
  - Các hội tương trợ đã loại bỏ nhu cầu về trách nhiệm cá nhân bằng cách tạo ra quyền sở hữu tập thể đối với tất cả các nguồn lực.
  - Các hội tương trợ hoạt động theo quy định của chính phủ nhằm đảm bảo quyền tiếp cận bình đẳng và các quyền lợi tiêu chuẩn cho tất cả thành viên.
explanation: |
  Văn bản này nêu rõ rằng các hội tương trợ thế kỷ 19 là tiền thân của các hệ thống phúc lợi hiện đại nhưng hoạt động dựa trên cạnh tranh chứ không phải độc quyền nhà nước. Sự cạnh tranh này cho phép cải tiến liên tục các phương pháp, với những phương pháp thành công phát triển mạnh và những phương pháp kém hiệu quả bị loại bỏ. Bản chất tự nguyện tôn trọng sự lựa chọn và phẩm giá cá nhân, trái ngược với hệ thống trợ cấp công cộng quan liêu mà văn bản cho rằng làm suy thoái cá nhân và duy trì họ trong tình trạng phụ thuộc. Các câu trả lời sai đề cập đến sự tập trung hóa, sở hữu tập thể hoặc quy định của chính phủ - tất cả đều trái ngược với các nguyên tắc tự do được mô tả.
question: Zgodnie z teorią liberalną, jaka podstawowa zasada odróżnia dobrowolne towarzystwa wzajemnej pomocy od państwowych systemów opieki społecznej?
answer: Towarzystwa wzajemnej pomocy działały w oparciu o konkurencję i dobrowolne stowarzyszenia, umożliwiając ciągłe doskonalenie i indywidualny wybór
wrong_answers:
  - Towarzystwa wzajemnej pomocy zapewniały bardziej kompleksowy zasięg dzięki scentralizowanemu planowaniu i jednolitym metodom dystrybucji
  - Stowarzyszenia wzajemnej pomocy wyeliminowały potrzebę indywidualnej odpowiedzialności, tworząc zbiorową własność wszystkich zasobów
  - Towarzystwa wzajemnej pomocy działały w oparciu o regulacje rządowe, aby zapewnić równy dostęp i standardowe korzyści dla wszystkich członków
explanation: |
  Tekst jasno pokazuje, że dziewiętnastowieczne towarzystwa wzajemnej pomocy były przodkami nowoczesnych systemów opieki społecznej, ale funkcjonowały w oparciu o konkurencję, a nie monopol państwa. Konkurencja ta pozwalała na ciągłe doskonalenie praktyk, przy czym skuteczne metody rozwijały się, a nieskuteczne były porzucane. Dobrowolny charakter szanował indywidualny wybór i godność, kontrastując z biurokratyczną pomocą publiczną, która według tekstu degraduje jednostki i utrzymuje je w stanie zależności. Błędne odpowiedzi błędnie sugerują centralizację, kolektywną własność lub regulację rządową - wszystkie są sprzeczne z opisanymi liberalnymi zasadami.
question: Jaký základní princip podle liberální teorie odlišuje dobrovolné společnosti vzájemné pomoci od státem poskytovaných systémů sociální péče?
answer: Společnosti vzájemné pomoci fungovaly na základě konkurence a dobrovolného sdružování, což umožňovalo neustálé zlepšování a individuální volbu
wrong_answers:
  - Společnosti vzájemné pomoci poskytovaly komplexnější pokrytí díky centralizovanému plánování a jednotným metodám distribuce
  - Společnosti vzájemné pomoci odstranily potřebu individuální odpovědnosti tím, že vytvořily kolektivní vlastnictví všech zdrojů
  - Vzájemné společnosti fungovaly na základě vládní regulace, aby byl zajištěn rovný přístup a standardizované výhody pro všechny členy
explanation: |
  Text jasně ukazuje, že vzájemné společnosti 19. století byly předchůdci moderních systémů sociální péče, ale fungovaly spíše na základě konkurence než státního monopolu. Tato konkurence umožňovala neustálé zlepšování postupů, přičemž úspěšné metody se rozvíjely a neúčinné byly opouštěny. Dobrovolnost respektovala individuální volbu a důstojnost, což kontrastovalo s byrokratickou veřejnou pomocí, která podle textu degraduje jednotlivce a udržuje ho ve stavu závislosti. Nesprávné odpovědi nesprávně naznačují centralizaci, kolektivní vlastnictví nebo státní regulaci - to vše odporuje popsaným liberálním principům.
question: What foundation for lasting international peace did Frédéric Passy, the first Nobel Peace Prize laureate, place his confidence in?
answer: >
  Public opinion: if peoples understood that their own prosperity depended on the prosperity of their trading partners, the demand for peace would become irresistible
wrong_answers:
  - Military deterrence: only the credible threat of overwhelming retaliation could prevent nations from pursuing aggressive wars against their neighbors
  - International courts: binding arbitration between nations by impartial judges would resolve conflicts before they could escalate into armed confrontation
  - Economic sanctions: coordinated refusal to trade with aggressive nations would impose sufficient costs to deter military adventurism
explanation: |
  Frédéric Passy (1822-1912), who received the first Nobel Peace Prize in 1901, placed his confidence in public opinion as the foundation for international peace. His reasoning was rooted in the harmony of interests: if peoples came to understand that their own prosperity depended on the prosperity of their trading partners, popular demand for peace would become irresistible. This approach complements the liberal programme for peace alongside Saint-Pierre's institutional proposals, Molinari's international justice framework, and Bastiat's argument that free trade itself is the surest foundation for peace.

question: 根據自由主義理論，移民政策應該遵循什麼基本原則才能符合自由主義的核心價值？
answer: 在自願交流、合法取得財產和平等契約的基礎上，應該允許移民。
wrong_answers:
  - 應限制移民，以保護家庭傭工免於不公平的工資競爭，並維護國家身分認同
  - 移民應透過民主多數投票來管制，以確保社會凝聚力和文化相容性
  - 應根據經濟需求和國家安全考量，透過國家配額來管理移民
explanation: |
  以 Gustave de Molinari 為代表的自由主義理論支持以自願交換和合法財產權為基礎的移民自由。自由主義者將移民限制視為一種工人保護主義，類似於工業保護主義。其他選擇與自由主義原則相悖，它們或是對個人自由施加集體限制、將多數人的統治凌駕於個人同意之上，或是擴大國家對人類自願行動和結社的控制。
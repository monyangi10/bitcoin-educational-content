question: 자유주의 이론에 따르면, 핵심 자유주의 가치에 부합하기 위해 이민 정책을 지배해야 하는 기본 원칙은 무엇인가요?
answer: 자발적인 교류, 합법적인 재산 취득, 동등한 계약에 근거한 경우 이민을 허용해야 합니다
wrong_answers:
  - 불공정한 임금 경쟁으로부터 국내 근로자를 보호하고 국가 정체성을 지키기 위해 이민을 제한해야 합니다
  - 이민은 사회 통합과 문화적 호환성을 보장하기 위해 민주적 다수결에 의해 규제되어야 합니다
  - 이민은 경제적 필요와 국가 안보를 고려한 국가별 쿼터를 통해 관리되어야 합니다
explanation: |
  구스타브 드 몰리나리가 예로 든 자유주의 이론은 자발적인 교류와 정당한 재산권에 근거할 때 이민의 자유를 지지합니다. 자유주의자들은 이민 제한을 산업 보호주의와 유사한 근로자 보호주의의 한 형태로 간주했습니다. 다른 옵션은 개인의 자유에 집단적 제한을 가하거나, 개인의 동의보다 다수결 원칙을 우선시하거나, 자발적인 인간의 이동과 결사에 대한 국가 통제를 확대함으로써 자유주의 원칙과 모순됩니다.
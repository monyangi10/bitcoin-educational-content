question: Selon la théorie libérale, quel principe fondamental devrait régir la politique d'immigration pour s'aligner sur les valeurs libérales fondamentales ?
answer: L'immigration doit être autorisée lorsqu'elle est fondée sur des échanges volontaires, l'acquisition légitime de biens et l'égalité des contrats
wrong_answers:
  - L'immigration doit être limitée pour protéger les travailleurs domestiques de la concurrence salariale déloyale et préserver l'identité nationale
  - L'immigration devrait être réglementée par un vote démocratique à la majorité afin de garantir la cohésion sociale et la compatibilité culturelle
  - L'immigration devrait être gérée par le biais de quotas nationaux basés sur les besoins économiques et les considérations de sécurité nationale
explanation: |
  La théorie libérale, telle qu'illustrée par Gustave de Molinari, soutient la liberté d'immigration lorsqu'elle est fondée sur l'échange volontaire et les droits de propriété légitimes. Les libéraux considèrent les restrictions à l'immigration comme une forme de protectionnisme des travailleurs, similaire au protectionnisme industriel. Les autres options contredisent les principes libéraux en imposant des restrictions collectives à la liberté individuelle, en donnant la priorité à la règle de la majorité sur le consentement individuel ou en étendant le contrôle de l'État sur les mouvements et les associations volontaires de personnes.
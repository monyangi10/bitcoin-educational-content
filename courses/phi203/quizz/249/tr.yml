question: Liberal teoriye göre, temel liberal değerlerle uyum sağlamak için göç politikasını hangi temel ilke yönetmelidir?
answer: Gönüllü mübadelelere, meşru mülk edinimine ve eşit sözleşmelere dayandığında göçe izin verilmelidir
wrong_answers:
  - Ev işçilerini haksız ücret rekabetinden korumak ve ulusal kimliği muhafaza etmek için göç kısıtlanmalıdır
  - Göç, sosyal uyum ve kültürel uyumluluğun sağlanması için demokratik çoğunluk oyuyla düzenlenmelidir
  - Göç, ekonomik ihtiyaçlar ve ulusal güvenlik hususları temelinde devlet kotaları aracılığıyla yönetilmelidir
explanation: |
  Gustave de Molinari tarafından örneklendirilen liberal teori, gönüllü mübadele ve meşru mülkiyet haklarına dayandığında göç özgürlüğünü desteklemektedir. Liberaller göç kısıtlamalarını endüstriyel korumacılığa benzer şekilde bir tür işçi korumacılığı olarak görmektedir. Diğer seçenekler, bireysel özgürlüğe kolektif kısıtlamalar getirerek, bireysel rıza yerine çoğunluk yönetimine öncelik vererek ya da gönüllü insan hareketi ve örgütlenmesi üzerinde devlet kontrolünü genişleterek liberal ilkelerle çelişmektedir.
question: De acordo com a teoria liberal, que princípio fundamental deve reger a política de imigração para se alinhar com os valores liberais fundamentais?
answer: A imigração deve ser permitida quando baseada em trocas voluntárias, aquisição legítima de propriedade e contratos iguais
wrong_answers:
  - A imigração deve ser restringida para proteger os trabalhadores domésticos da concorrência salarial desleal e preservar a identidade nacional
  - A imigração deve ser regulada por maioria democrática para garantir a coesão social e a compatibilidade cultural
  - A imigração deve ser gerida através de quotas estatais baseadas nas necessidades económicas e em considerações de segurança nacional
explanation: |
  A teoria liberal, tal como exemplificada por Gustave de Molinari, apoia a liberdade de imigração quando assente em trocas voluntárias e direitos de propriedade legítimos. Os liberais consideravam as restrições à imigração como uma forma de protecionismo dos trabalhadores, semelhante ao protecionismo industrial. As outras opções contradizem os princípios liberais ao imporem restrições colectivas à liberdade individual, ao darem prioridade à regra da maioria em detrimento do consentimento individual ou ao expandirem o controlo estatal sobre o movimento e a associação humana voluntária.
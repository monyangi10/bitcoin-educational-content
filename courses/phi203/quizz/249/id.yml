question: Menurut teori liberal, prinsip dasar apa yang seharusnya mengatur kebijakan imigrasi agar selaras dengan nilai-nilai inti liberal?
answer: Imigrasi harus diizinkan jika didasarkan pada pertukaran sukarela, akuisisi properti yang sah, dan kontrak yang setara
wrong_answers:
  - Imigrasi harus dibatasi untuk melindungi pekerja rumah tangga dari persaingan upah yang tidak adil dan melestarikan identitas nasional
  - Imigrasi harus diatur oleh suara mayoritas yang demokratis untuk memastikan kohesi sosial dan kecocokan budaya
  - Imigrasi harus dikelola melalui kuota negara berdasarkan kebutuhan ekonomi dan pertimbangan keamanan nasional
explanation: |
  Teori liberal, seperti yang dicontohkan oleh Gustave de Molinari, mendukung kebebasan imigrasi jika didasarkan pada pertukaran sukarela dan hak milik yang sah. Kaum liberal memandang pembatasan imigrasi sebagai bentuk proteksionisme pekerja, mirip dengan proteksionisme industri. Pilihan lainnya bertentangan dengan prinsip-prinsip liberal dengan memberlakukan pembatasan kolektif terhadap kebebasan individu, memprioritaskan aturan mayoritas di atas persetujuan individu, atau memperluas kontrol negara terhadap pergerakan dan perkumpulan manusia secara sukarela.
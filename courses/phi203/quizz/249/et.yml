question: Milline aluspõhimõte peaks liberaalse teooria kohaselt reguleerima sisserändepoliitikat, et see oleks kooskõlas liberaalsete põhiväärtustega?
answer: Sisseränne peaks olema lubatud, kui see põhineb vabatahtlikul vahetusel, õiguspärasel omandamisel ja võrdsetel lepingutel
wrong_answers:
  - Sisseränne peaks olema piiratud, et kaitsta kodutöötajaid ebaausa palgakonkurentsi eest ja säilitada rahvuslik identiteet
  - Sisseränne peaks olema reguleeritud demokraatliku häälteenamusega, et tagada sotsiaalne ühtekuuluvus ja kultuuriline kokkusobivus
  - Immigratsiooni tuleks juhtida riiklike kvootide kaudu, mis põhinevad majanduslikel vajadustel ja riigi julgeolekuga seotud kaalutlustel
explanation: |
  Gustave de Molinari eeskujul toetab liberaalne teooria sisserände vabadust, kui see põhineb vabatahtlikul vahetusel ja seaduslikel omandiõigustel. Liberaalid pidasid sisserände piiranguid töötajate protektsionismi vormiks, mis sarnaneb tööstuslikule protektsionismile. Teised valikud on vastuolus liberaalsete põhimõtetega, kuna nad kas kehtestavad kollektiivseid piiranguid üksikisiku vabadusele, seavad enamuse valitsemise individuaalse nõusoleku asemel esikohale või laiendavad riigi kontrolli inimeste vabatahtliku liikumise ja ühinemise üle.
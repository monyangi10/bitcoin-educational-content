question: Según la teoría liberal, ¿qué principio fundamental debería regir la política de inmigración para alinearse con los valores liberales básicos?
answer: La inmigración debe permitirse cuando se basa en intercambios voluntarios, adquisición legítima de propiedades y contratos igualitarios
wrong_answers:
  - La inmigración debe restringirse para proteger a los trabajadores domésticos de la competencia salarial desleal y preservar la identidad nacional
  - La inmigración debe regularse por mayoría democrática para garantizar la cohesión social y la compatibilidad cultural
  - La inmigración debe gestionarse mediante cuotas estatales basadas en necesidades económicas y consideraciones de seguridad nacional
explanation: |
  La teoría liberal, ejemplificada por Gustave de Molinari, apoya la libertad de inmigración cuando se basa en el intercambio voluntario y los derechos de propiedad legítimos. Los liberales consideraban las restricciones a la inmigración como una forma de proteccionismo de los trabajadores, similar al proteccionismo industrial. Las otras opciones contradicen los principios liberales al imponer restricciones colectivas a la libertad individual, dar prioridad al gobierno de la mayoría sobre el consentimiento individual o ampliar el control estatal sobre los movimientos y asociaciones humanas voluntarias.
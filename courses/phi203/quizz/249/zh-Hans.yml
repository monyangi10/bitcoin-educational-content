question: 根据自由主义理论，移民政策应遵循什么基本原则才能符合自由主义的核心价值观？
answer: 在自愿交换、合法获取财产和平等契约的基础上，应允许移民
wrong_answers:
  - 应限制移民，以保护家庭佣工免受不公平的工资竞争，并维护民族特性
  - 应通过民主多数票对移民进行管理，以确保社会凝聚力和文化兼容性
  - 应根据经济需求和国家安全考虑，通过国家配额对移民进行管理
explanation: |
  以古斯塔夫-德-莫里纳利（Gustave de Molinari）为代表的自由主义理论支持以自愿交换和合法产权为基础的移民自由。自由主义者将移民限制视为一种工人保护主义，类似于工业保护主义。其他选择与自由主义原则相悖，要么对个人自由施加集体限制，要么优先考虑多数统治而非个人同意，要么扩大国家对人类自愿流动和结社的控制。
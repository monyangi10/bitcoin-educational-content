question: According to the text, how does globalization make the consequences of harmful regulations and heavy taxation more visible than in the past?
answer: International competition directly compares the performance of liberal nations with those burdened by excessive debt, interventionism, and heavy taxation, making the costs of unfreedom impossible to hide
wrong_answers:
  - Globalization creates international bodies that monitor national regulations and impose standardized rules, making abuses publicly detectable
  - Global media coverage means that citizens in any country can observe and report on regulatory failures in real time, creating political pressure for reform
  - Globalization reduces the cost of migration, so populations automatically flee oppressive regulations by moving to more liberal countries
explanation: |
  The text explains that in closed societies of the past, political domination could be total because there was no external alternative against which to measure performance. Globalization changes this by placing nations in direct competition: the most liberal nations draw the greatest profit from commerce precisely because they compete with nations burdened by excessive debt, interventionism, oppressive regulations, and heavy taxation — and consequently less productive. The consequences of unfreedom are no longer hidden; they are exposed by the relentless comparison of international trade, creating a structural pressure toward greater freedom even without deliberate political reform.

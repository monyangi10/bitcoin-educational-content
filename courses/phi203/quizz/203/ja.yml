question: バスティアの分析によれば、経済的詭弁に対抗するリベラルエコノミストのアプローチは、こうした誤った議論を見分ける一般大衆の能力とは何が違うのだろうか？
answer: リベラルエコノミストは、論理的矛盾を積極的に指摘し、実証しなければならない。なぜなら、訓練された観察者にとっては明白な性質であるにもかかわらず、一般の人々はこうした詭弁を自然に見抜くことができないからである。
wrong_answers:
  - リベラルな経済学者は数学的モデルに頼るが、一般大衆は直感的な推論で同じ経済的誤謬を見分ける。
  - リベラルな経済学者は理論的な抽象論に焦点を当てるが、一般の人々は日々の経済取引における実践的な経験を通じて、自然に詭弁を見分ける。
  - リベラルエコノミストと一般大衆は同じ方法を用いているが、これらの経済的誤りを暴くか隠すかという政治的動機が異なるだけである。
explanation: |
  バスティアは、訓練された経済学者は経済的詭弁を容易に見分けることができるが、一般大衆はこうした誤った議論を自発的に見分けることはできないと強調している。このことが、社会、交換、生産に関する推論における事実誤認や論理的欠陥を積極的に指摘する自由主義経済学者の重要な役割を生み出している。バスティアの指摘は、経済的自由に反対するシステムを支える、洗練されてはいるが欺瞞に満ちた議論に対して教育する専門家の介入の必要性について具体的に述べているのである。
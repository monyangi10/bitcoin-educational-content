question: Според анализа на Бастиа какво отличава подхода на либералния икономист в борбата с икономическите софизми от способността на населението да разпознава тези погрешни аргументи?
answer: Либералните икономисти трябва активно да сигнализират и да демонстрират логическите несъответствия, тъй като широката общественост не може спонтанно да разпознае тези софизми въпреки очевидния им характер за обучените наблюдатели
wrong_answers:
  - Либералните икономисти разчитат на математически модели, докато обикновените хора използват интуитивни разсъждения, за да идентифицират същите икономически заблуди с еднаква ефективност
  - Либералните икономисти се фокусират върху теоретични абстракции, докато населението естествено разпознава софизмите чрез практическия опит в ежедневните икономически транзакции
  - Либералните икономисти и населението използват идентични методи, но се различават само по политическите си мотиви за разкриване или прикриване на тези икономически заблуди
explanation: |
  Бастиа подчертава, че докато обучените икономисти могат лесно да разпознаят икономическите софизми, широката общественост не разпознава спонтанно тези погрешни аргументи. Това създава ключова роля на либералните икономисти да посочват активно фактическите грешки и логическите недостатъци в разсъжденията за обществото, размяната и производството. Другите варианти неправилно предполагат или равни възможности между групите, или различни методологически подходи, докато смисълът на Бастиа е именно необходимостта от експертна намеса за обучение срещу сложни, но измамни аргументи, които поддържат системи, противопоставящи се на икономическата свобода.
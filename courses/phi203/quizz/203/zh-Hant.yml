question: 根據 Bastiat 的分析，自由經濟學家對抗經濟詭辯的方法與一般人辨識這些謬誤論點的能力有何不同？
answer: 自由經濟學家必須主動示意並展示邏輯上的矛盾，因為一般人無法自發地辨識這些詭辯，儘管對受過訓練的觀察者而言，這些詭辯的本質是顯而易見的。
wrong_answers:
  - 自由派經濟學家依賴數學模型，而一般人則運用直覺推理，同樣有效地找出相同的經濟謬誤
  - 自由經濟學家專注於理論上的抽象概念，而一般民眾則透過日常經濟交易的實際經驗，自然而然地識別出歪理邪说。
  - 自由經濟學家和一般人使用相同的方法，不同的只是他們揭露或隱藏這些經濟謬誤的政治動機
explanation: |
  巴斯蒂亞強調，雖然訓練有素的經濟學家可以輕易識別出經濟學上的詭辯，但一般人卻無法自發地識別出這些謬誤的論點。因此，自由經濟學家必須積極指出社會、交換與生產推理中的事實錯誤與邏輯缺陷。其他選項錯誤地暗示不同族群之間的能力相同，或是採用不同的方法，而 Bastiat 的觀點是特別需要專家介入，以教育反對經濟自由的體系所維持的複雜但具欺騙性的論點。
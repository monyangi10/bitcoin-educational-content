question: Čím se podle Bastiatovy analýzy liší přístup liberálního ekonoma k boji proti ekonomickým sofismům od schopnosti běžné populace rozpoznat tyto chybné argumenty?
answer: Liberální ekonomové musí aktivně signalizovat a demonstrovat logické nesrovnalosti, protože běžná populace nedokáže tyto sofismy spontánně rozpoznat, přestože jsou zjevné i pro zkušené pozorovatele
wrong_answers:
  - Liberální ekonomové se spoléhají na matematické modely, zatímco běžná populace používá intuitivní uvažování, aby se stejnou účinností rozpoznala stejné ekonomické omyly
  - Liberální ekonomové se zaměřují na teoretické abstrakce, zatímco běžná populace přirozeně identifikuje sofismy na základě praktických zkušeností z každodenních ekonomických transakcí
  - Liberální ekonomové a běžná populace používají totožné metody, ale liší se pouze politickými motivacemi, které je vedou k odhalování nebo zamlčování těchto ekonomických omylů
explanation: |
  Bastiat zdůrazňuje, že zatímco školení ekonomové snadno rozpoznají ekonomické sofismy, běžná populace tyto chybné argumenty spontánně neidentifikuje. Z toho vyplývá zásadní úloha liberálních ekonomů aktivně poukazovat na věcné chyby a logické nedostatky v úvahách o společnosti, směně a výrobě. Ostatní možnosti nesprávně naznačují buď stejné schopnosti mezi skupinami, nebo různé metodologické přístupy, zatímco Bastiatova pointa se týká právě potřeby odborného zásahu, který by vychovával proti sofistikovaným, ale klamným argumentům, jež udržují systémy odporující ekonomické svobodě.
question: Ni gute itegeko ry’ibidukikije ry’uguhingura rigena aho n’ingene ibicuruzwa bihingura mu bukungu bw’isoko ry’uburenganzira?
answer: Abakozi b’ubutunzi bakurikirana inyungu zabo bwite zimurikiwe mu gukurikira ibimenyetso vy’inyungu vyerekana ivyo abaguzi basaba n’umutima ukunze wo kwishura .
wrong_answers:
  - Amabwirizwa ya Leta na komite nkuru z’igenamigambi ziyobora ibikorwa mu bibanza n’uburyo bifise akamaro kuruta ibindi vyose ku kibano .
  - Imigenzo n’imigenzo y’akahise bica biyobora abahinguzi kugira ngo bagumane uburyo bwo guhingura n’aho babikorera .
  - Inkomezi z'isoko ry'imburakimazi n'ibintu bishika ku mpanuka bigena aho ibikorwa bikorerwa ata mpamvu canke igenamigambi ry'ubutunzi rishingiye ku vyiyumviro
explanation: |
  Dukurikije ico canditswe, itegeko kamere ry’uguhingura rikora biciye ku bakozi b’ubutunzi barondera inyungu zabo bwite zimurikiwe, atari ubwikunzi buke. Bavyurirwa umutima n’inyungu n’umutekano, bakiyobora ku mashami y’uguhingura ibintu atanga inyungu. Inyungu zikora nk’ibimenyetso vyerekana umutima ukunze w’abaguzi wo kwishura ibintu bituma ubuzima bwabo butera imbere kandi bikaba bishitsa ivyo bakeneye. Ibiciro n’inyungu rero bica biyobora umusaruro ataco bisaba ko Leta itunganya canke itegeka, kuko ivyo bimenyetso vy’isoko bimenyesha neza aho umusaruro ukenewe cane kandi uhabwa agaciro.
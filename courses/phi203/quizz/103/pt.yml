question: Como é que a lei natural da produção determina onde e como os bens são produzidos numa economia de mercado livre?
answer: Os agentes económicos prosseguem o seu interesse próprio esclarecido seguindo os sinais de lucro que indicam a procura dos consumidores e a sua disponibilidade para pagar
wrong_answers:
  - Os regulamentos governamentais e os comités de planeamento central dirigem a produção para os locais e métodos mais benéficos para a sociedade
  - Os costumes tradicionais e as práticas históricas orientam automaticamente os produtores para manterem padrões e locais de produção estabelecidos
  - As forças aleatórias do mercado e os acontecimentos fortuitos determinam os locais de produção sem qualquer raciocínio económico ou planeamento racional
explanation: |
  De acordo com o texto, a lei natural da produção funciona através de agentes económicos que procuram o seu próprio interesse esclarecido, e não um egoísmo mesquinho. São motivados pelo lucro e pela segurança, orientando-se para ramos de produção rentáveis. Os lucros servem como sinais que indicam a vontade dos consumidores de pagar por bens que melhoram as suas vidas e satisfazem as suas necessidades. Assim, os preços e os lucros orientam naturalmente a produção sem necessidade de organização ou regulamentação governamental, uma vez que estes sinais de mercado comunicam eficazmente onde a produção é mais necessária e valorizada.
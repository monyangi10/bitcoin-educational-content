question: Jak přirozený zákon výroby určuje, kde a jak se zboží ve volném tržním hospodářství vyrábí?
answer: Ekonomické subjekty sledují svůj osvícený vlastní zájem tím, že se řídí ziskovými signály, které naznačují poptávku spotřebitelů a jejich ochotu platit
wrong_answers:
  - Vládní nařízení a centrální plánovací komise směřují výrobu do společensky nejvýhodnějších míst a metod
  - Tradiční zvyky a historické postupy automaticky vedou výrobce k zachování zavedených výrobních vzorců a míst
  - Náhodné tržní síly a náhodné události určují místa výroby bez jakéhokoli racionálního ekonomického uvažování nebo plánování
explanation: |
  Podle tohoto textu funguje přirozený zákon výroby tak, že ekonomické subjekty usilují o svůj vlastní osvícený zájem, nikoli o úzký sobecký zájem. Jsou motivováni ziskem a bezpečností a směřují k výnosným výrobním odvětvím. Zisky slouží jako signály označující ochotu spotřebitelů platit za statky, které zlepšují jejich život a uspokojují jejich potřeby. Ceny a zisky tak přirozeně orientují výrobu, aniž by vyžadovaly státní organizaci nebo regulaci, neboť tyto tržní signály účinně sdělují, kde je výroba nejpotřebnější a nejcennější.
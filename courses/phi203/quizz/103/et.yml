question: Kuidas määrab tootmise loodusseadus, kus ja kuidas kaupu vabaturumajanduses toodetakse?
answer: Majandustegelased järgivad oma valgustatud omakasu, järgides tarbijate nõudlust ja maksevalmidust näitavaid kasumimärguandeid
wrong_answers:
  - Valitsuse määrused ja kesksed planeerimiskomiteed suunavad tootmise sotsiaalselt kõige kasulikumatesse kohtadesse ja meetoditele
  - Traditsioonilised kombed ja ajaloolised tavad suunavad tootjaid automaatselt säilitama väljakujunenud tootmisviise ja -kohti
  - Juhuslikud turujõud ja juhuslikud sündmused määravad tootmiskohad ilma igasuguse ratsionaalse majandusliku põhjenduse või planeerimiseta
explanation: |
  Teksti kohaselt toimib tootmise loodusseadus majandusagentide kaudu, kes otsivad oma valgustatud omakasu, mitte kitsast isekust. Neid motiveerivad kasum ja turvalisus, suunates end kasumlikele tootmisharudele. Kasum toimib signaalina, mis näitab tarbijate valmisolekut maksta kaupade eest, mis parandavad nende elu ja rahuldavad nende vajadusi. Hinnad ja kasumid suunavad seega tootmist loomulikult, ilma et see nõuaks valitsuse korraldust või reguleerimist, sest need turusignaalid annavad tõhusalt teada, kus tootmine on kõige vajalikum ja hinnatum.
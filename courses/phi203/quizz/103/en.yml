question: How does the natural law of production determine where and how goods are produced in a free market economy?
answer: Economic agents pursue their enlightened self-interest by following profit signals that indicate consumer demand and willingness to pay
wrong_answers:
  - Government regulations and central planning committees direct production to the most socially beneficial locations and methods
  - Traditional customs and historical practices automatically guide producers to maintain established production patterns and locations
  - Random market forces and chance events determine production locations without any rational economic reasoning or planning
explanation: |
  According to the text, the natural law of production works through economic agents seeking their own enlightened self-interest, not narrow selfishness. They are motivated by profit and security, directing themselves toward profitable production branches. Profits serve as signals indicating consumer willingness to pay for goods that improve their lives and meet their needs. Prices and profits thus naturally orient production without requiring government organization or regulation, as these market signals efficiently communicate where production is most needed and valued.

question: Hoe bepaalt de natuurlijke productiewet waar en hoe goederen worden geproduceerd in een vrije markteconomie?
answer: Economische agenten streven hun verlichte eigenbelang na door winstsignalen te volgen die de vraag en betalingsbereidheid van consumenten aangeven
wrong_answers:
  - Overheidsvoorschriften en centrale planningscomités leiden de productie naar de sociaal meest gunstige locaties en methoden
  - Traditionele gebruiken en historische praktijken leiden producenten automatisch naar het behoud van gevestigde productiepatronen en -locaties
  - Willekeurige marktkrachten en toevallige gebeurtenissen bepalen de productielocaties zonder rationele economische redenering of planning
explanation: |
  Volgens de tekst werkt de natuurlijke wet van de productie doordat economische agenten hun eigen verlichte eigenbelang nastreven, geen bekrompen egoïsme. Ze worden gemotiveerd door winst en zekerheid en richten zich op winstgevende productietakken. Winsten dienen als signalen die de bereidheid van consumenten aangeven om te betalen voor goederen die hun leven verbeteren en aan hun behoeften voldoen. Prijzen en winsten oriënteren de productie dus op natuurlijke wijze zonder dat overheidsorganisatie of -regulering nodig is, omdat deze marktsignalen efficiënt communiceren waar productie het meest nodig is en het meest gewaardeerd wordt.
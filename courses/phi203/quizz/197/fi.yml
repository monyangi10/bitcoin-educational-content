question: Miksi palautteen ajoitus ja luonne eroaa olennaisesti markkinapäätösten ja poliittisten päätösten välillä demokraattisissa järjestelmissä?
answer: Markkinapäätökset antavat välitöntä, suoraa palautetta, jonka avulla yksilöt voivat mukauttaa käyttäytymistään henkilökohtaisten kokemustensa perusteella, kun taas poliittiset päätökset tuottavat viivästyneitä, kollektiivisia seurauksia, joita yksilöiden on vaikea jäljittää omiin valintoihinsa
wrong_answers:
  - Markkinapäätökset edellyttävät monimutkaista pitkän aikavälin suunnittelua, kun taas poliittiset päätökset perustuvat välittömiin tunnereaktioihin, jotka voidaan arvioida nopeasti
  - Markkinapäätökset edellyttävät kollektiivista yhteisymmärrystä, kun taas poliittiset päätökset mahdollistavat yksilöllisen autonomian ja suoran henkilökohtaisen kontrollin tuloksiin
  - Markkinapäätökset tehdään harvoin ja niillä on pysyviä seurauksia, kun taas poliittiset päätökset tehdään päivittäin ja niiden vaikutukset ovat helposti palautuvia
explanation: |
  Luvussa korostetaan, että markkinavalinnat tarjoavat välittömiä, jäljitettävissä olevia tuloksia, joiden avulla yksilöt voivat suoraan vertailla tyytyväisyyttä ja mukauttaa käyttäytymistään kokemusten perusteella. Sitä vastoin poliittiset päätökset ovat "ajallisesti hajautettuja" ja niillä on kollektiivisia seurauksia, joiden vuoksi kansalaisten on mahdotonta ymmärtää ääniensä täydellistä vaikutusta. Poliittiset toimenpiteet voivat vahingoittaa ihmisiä, joita äänestäjä ei koskaan näe suoraan, ja vaaleissa on kyse monimutkaisista ohjelmista eikä niinkään yksinkertaisista, suorista valinnoista. Tämä ajallinen ja palaute-ero on ratkaisevan tärkeä, kun halutaan ymmärtää, miksi demokraattinen holhousparadoksi on olemassa - kansalaisten odotetaan tekevän monimutkaisempia päätöksiä (poliittisia), joiden palautemekanismit ovat epäluotettavampia, kuin yksinkertaisempia päätöksiä (taloudellisia), joiden tulokset ovat välittömiä ja selkeitä.
question: Šta čini vreme i prirodu povratnih informacija fundamentalno različitim između tržišnih odluka i političkih odluka u demokratskim sistemima?
answer: Odluke na tržištu pružaju trenutne, direktne povratne informacije koje omogućavaju pojedincima da prilagode ponašanje na osnovu ličnog iskustva, dok političke odluke proizvode odložene, kolektivne posledice koje je teško pojedincima povezati sa njihovim specifičnim izborima.
wrong_answers:
  - Odluke na tržištu uključuju složeno dugoročno planiranje, dok se političke odluke zasnivaju na trenutnim emocionalnim reakcijama koje se mogu brzo proceniti.
  - Odluke na tržištu zahtevaju kolektivno postizanje konsenzusa, dok političke odluke omogućavaju individualnu autonomiju i direktnu ličnu kontrolu nad ishodima.
  - Odluke na tržištu donose se retko sa trajnim posledicama, dok se političke odluke donose svakodnevno sa lako reverzibilnim efektima.
explanation: |
  Poglavlje naglašava da tržišni izbori nude trenutne, sledive rezultate gde pojedinci mogu direktno uporediti zadovoljstva i prilagoditi ponašanje na osnovu iskustva. Nasuprot tome, političke odluke su 'raspoređene u vremenu' sa kolektivnim posledicama koje onemogućavaju građanima da razumeju potpuni uticaj svojih glasova. Političke mere mogu naštetiti ljudima koje glasač nikada ne vidi direktno, a izbori uključuju složene programe umesto jednostavnih, direktnih izbora. Ova vremenska i povratna razlika je ključna za razumevanje zašto paradoks demokratskog tutorstva postoji - od građana se očekuje da donose složenije odluke (političke) sa manje pouzdanim mehanizmima povratne informacije nego jednostavnije odluke (ekonomske) sa trenutnim, jasnim rezultatima.
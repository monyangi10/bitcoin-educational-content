question: Какво прави времето и естеството на обратната връзка коренно различни между пазарните решения и политическите решения в демократичните системи?
answer: Пазарните решения осигуряват незабавна, пряка обратна връзка, която позволява на хората да коригират поведението си въз основа на личния си опит, докато политическите решения водят до забавени, колективни последици, които са трудни за проследяване от страна на хората до техния конкретен избор
wrong_answers:
  - Пазарните решения включват сложно дългосрочно планиране, докато политическите решения се основават на незабавни емоционални реакции, които могат да бъдат бързо оценени
  - Пазарните решения изискват колективно постигане на консенсус, докато политическите решения позволяват индивидуална автономия и пряк личен контрол върху резултатите
  - Пазарните решения се вземат рядко и имат трайни последици, докато политическите решения се вземат ежедневно и имат лесно обратими последици
explanation: |
  В главата се подчертава, че пазарният избор предлага незабавни, проследими резултати, при които хората могат директно да сравняват удовлетворението и да коригират поведението си въз основа на опита. За разлика от тях политическите решения са "отдалечени във времето" с колективни последици, които не позволяват на гражданите да разберат пълното въздействие на своя глас. Политическите мерки могат да навредят на хора, които гласоподавателят никога не вижда пряко, а изборите включват по-скоро сложни програми, отколкото прости, преки избори. Тази разлика във времето и обратната връзка е от решаващо значение за разбирането на причините за съществуването на парадокса на демократичната опека - от гражданите се очаква да вземат по-сложни решения (политически) с по-малко надеждни механизми за обратна връзка, отколкото по-прости решения (икономически) с незабавни и ясни резултати.
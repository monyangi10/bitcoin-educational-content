question: Điều gì khiến thời điểm và bản chất của phản hồi khác biệt về cơ bản giữa các quyết định thị trường và các quyết định chính trị trong các hệ thống dân chủ?
answer: Các quyết định thị trường cung cấp phản hồi trực tiếp, tức thì cho phép các cá nhân điều chỉnh hành vi dựa trên kinh nghiệm cá nhân, trong khi các quyết định chính trị tạo ra những hậu quả tập thể, chậm trễ mà các cá nhân khó có thể truy ngược lại nguồn gốc từ những lựa chọn cụ thể của mình.
wrong_answers:
  - Các quyết định thị trường liên quan đến việc lập kế hoạch dài hạn phức tạp, trong khi các quyết định chính trị dựa trên những phản ứng cảm xúc tức thời có thể được đánh giá nhanh chóng.
  - Các quyết định thị trường đòi hỏi sự đồng thuận tập thể, trong khi các quyết định chính trị cho phép quyền tự chủ cá nhân và sự kiểm soát trực tiếp của cá nhân đối với kết quả.
  - Các quyết định thị trường được đưa ra không thường xuyên và có hậu quả lâu dài, trong khi các quyết định chính trị được đưa ra hàng ngày và có tác động dễ dàng đảo ngược.
explanation: |
  Chương này nhấn mạnh rằng các lựa chọn thị trường mang lại kết quả tức thời, có thể theo dõi được, nơi các cá nhân có thể trực tiếp so sánh mức độ hài lòng và điều chỉnh hành vi dựa trên kinh nghiệm. Ngược lại, các quyết định chính trị "diễn ra rải rác theo thời gian" với những hậu quả tập thể khiến công dân không thể hiểu được toàn bộ tác động của lá phiếu của mình. Các biện pháp chính trị có thể gây hại cho những người mà cử tri không bao giờ gặp trực tiếp, và các cuộc bầu cử liên quan đến các chương trình phức tạp hơn là những lựa chọn đơn giản, trực tiếp. Sự khác biệt về thời gian và phản hồi này rất quan trọng để hiểu tại sao nghịch lý hướng dẫn dân chủ tồn tại - công dân được kỳ vọng đưa ra các quyết định phức tạp hơn (chính trị) với các cơ chế phản hồi kém tin cậy hơn so với các quyết định đơn giản hơn (kinh tế) với kết quả tức thời, rõ ràng.
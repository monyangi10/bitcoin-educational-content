question: Чем принципиально отличается время и характер обратной связи между рыночными и политическими решениями в демократических системах?
answer: Рыночные решения обеспечивают немедленную, прямую обратную связь, которая позволяет людям корректировать поведение на основе личного опыта, в то время как политические решения приводят к отсроченным, коллективным последствиям, которые людям трудно отследить до их конкретного выбора
wrong_answers:
  - Рыночные решения предполагают сложное долгосрочное планирование, в то время как политические решения основаны на немедленной эмоциональной реакции, которую можно быстро оценить
  - Рыночные решения требуют коллективного консенсуса, в то время как политические решения допускают индивидуальную автономию и прямой личный контроль над результатами
  - Рыночные решения принимаются редко и имеют необратимые последствия, в то время как политические решения принимаются ежедневно и имеют легко обратимые последствия
explanation: |
  В главе подчеркивается, что рыночный выбор дает немедленные, отслеживаемые результаты, когда люди могут напрямую сравнивать удовлетворение и корректировать поведение на основе опыта. В отличие от этого, политические решения "разнесены во времени" и имеют коллективные последствия, которые не позволяют гражданам понять все последствия их голосования. Политические меры могут навредить людям, которых избиратель никогда не увидит непосредственно, а выборы предполагают сложные программы, а не простой, прямой выбор. Это различие во времени и обратной связи имеет решающее значение для понимания причин существования парадокса демократической опеки - от граждан ожидается принятие более сложных решений (политических) с менее надежными механизмами обратной связи, чем более простых решений (экономических) с немедленными и ясными результатами.
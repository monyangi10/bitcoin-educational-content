question: How does the text apply Lavoisier's principle to the concept of economic production?
answer: Since humans can neither create nor destroy matter, production means transforming existing materials into new utility or services — not conjuring something from nothing
wrong_answers:
  - Since matter is conserved, production is ultimately impossible and all apparent wealth is simply redistributed from pre-existing resources
  - Since humans cannot create matter, only manual labor on physical materials counts as genuine production, excluding services and intellectual work
  - Since matter is indestructible, the wealth produced by one person necessarily comes at the expense of another, making exchange a zero-sum game
explanation: |
  The text draws on Lavoisier's principle that man can neither create nor destroy an atom to clarify what production truly means: the creation of new utility, not the creation of new matter. A retailer who moves foodstuffs from one place to another renders a genuine service and thus produces real value. This understanding broadens the concept of production beyond physical transformation to include services, intellectual work, and any activity that renders something useful to others. The wrong answers either misread the principle as negating production entirely or confuse it with zero-sum thinking that the chapter explicitly rejects.

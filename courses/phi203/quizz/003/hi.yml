question: फ्रांसीसी उदारवादी परंपरा के अनुसार, प्रतिस्पर्धा मानव अस्तित्व का एक अपरिहार्य पहलू क्यों है?
answer: क्योंकि दुनिया में संसाधन सीमित हैं और उन्हें व्यक्तियों के बीच आवंटित किया जाना चाहिए।
wrong_answers:
  - क्योंकि मनुष्य स्वभाव से ही आक्रामक होते हैं और दूसरों पर प्रभुत्व स्थापित करना चाहते हैं।
  - क्योंकि राजनीतिक व्यवस्थाएं जानबूझकर नियंत्रण बनाए रखने के लिए प्रतिस्पर्धा पैदा करती हैं।
  - क्योंकि सामाजिक परंपराओं ने कृत्रिम रूप से प्रतिस्पर्धी संबंध स्थापित किए हैं
explanation: |
  इस लेख में बताया गया है कि प्रतिस्पर्धा संसाधनों की सीमितता से उत्पन्न होती है, न कि मानवीय स्वभाव या सामाजिक संरचनाओं से। चूंकि सेब अनंत संख्या में नहीं होते, इसलिए उन्हें व्यक्तियों द्वारा ही प्राप्त किया जाना चाहिए। विचारधारावादियों ने यह माना कि सामूहिक व्यवस्थाएं भी प्रतिस्पर्धा को समाप्त नहीं कर सकतीं - वे केवल इसे राजनीतिक संबंधों, प्रतीक्षा पंक्तियों या प्रशासनिक विशेषाधिकारों की ओर मोड़ देती हैं। इस प्रकार प्रतिस्पर्धा भौतिक जगत में कमी का एक मूलभूत परिणाम है, जिससे प्रश्न यह नहीं उठता कि प्रतिस्पर्धा होगी या नहीं, बल्कि यह उठता है कि इसे नियंत्रित करने वाले नियम क्या होंगे।
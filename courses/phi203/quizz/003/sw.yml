question: Kulingana na utamaduni wa kiliberali wa Ufaransa, kwa nini ushindani ni kipengele kisichoepukika cha kuwepo kwa mwanadamu?
answer: Kwa sababu rasilimali duniani zina kikomo na lazima zigawanywe miongoni mwa watu binafsi
wrong_answers:
  - Kwa sababu wanadamu ni wakali kiasili na hutafuta kuwatawala wengine
  - Kwa sababu mifumo ya kisiasa huunda ushindani kimakusudi ili kudumisha udhibiti
  - Kwa sababu mikataba ya kijamii imeanzisha mahusiano ya ushindani bandia
explanation: |
  Maandishi yanaelezea kwamba ushindani hutokana na ukomo wa rasilimali, si kutokana na asili ya mwanadamu au miundo ya kijamii. Kwa kuwa tufaha hazipo kwa idadi isiyo na kikomo, lazima zichukuliwe na watu binafsi. Wanataaluma wa Idéologues walitambua kwamba hata mifumo ya ujumuishaji haiwezi kuondoa ushindani - wanauelekeza tu kwenye mahusiano ya kisiasa, mistari ya kusubiri, au marupurupu ya kiutawala. Kwa hivyo, ushindani ni matokeo ya msingi ya uhaba katika ulimwengu wa kimwili, na kufanya swali si kama ushindani utakuwepo, bali ni sheria gani zitakazoutawala.
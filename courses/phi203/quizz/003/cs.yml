question: Proč je podle francouzské liberální tradice konkurence nevyhnutelným aspektem lidské existence?
answer: Protože zdroje na světě jsou omezené a musí být rozděleny mezi jednotlivce
wrong_answers:
  - Protože lidé jsou od přírody agresivní a snaží se ovládat ostatní
  - Protože politické systémy záměrně vytvářejí konkurenci, aby si udržely kontrolu
  - Protože společenské konvence uměle vytvořily konkurenční vztahy
explanation: |
  Text vysvětluje, že konkurence nutně vyplývá z omezenosti zdrojů, nikoli z lidské přirozenosti nebo sociálních konstruktů. Protože jablek není nekonečné množství, musí si je jednotlivci přivlastnit. Idéologové si uvědomovali, že ani kolektivistické systémy nemohou konkurenci odstranit - pouze ji přesměrují na politické vztahy, fronty nebo administrativní privilegia. Konkurence je tedy základním důsledkem nedostatku ve fyzickém světě, a proto není otázkou, zda bude konkurence existovat, ale jakými pravidly se bude řídit.
question: Según la tradición liberal francesa, ¿por qué la competencia es un aspecto inevitable de la existencia humana?
answer: Porque los recursos del mundo son finitos y deben repartirse entre los individuos
wrong_answers:
  - Porque los humanos son agresivos por naturaleza y buscan dominar a los demás
  - Porque los sistemas políticos crean deliberadamente competencia para mantener el control
  - Porque las convenciones sociales han establecido artificialmente relaciones competitivas
explanation: |
  El texto explica que la competencia surge necesariamente de la finitud de los recursos, no de la naturaleza humana ni de las construcciones sociales. Como las manzanas no existen en número infinito, los individuos deben apropiárselas. Los idéologues reconocen que incluso los sistemas colectivistas no pueden eliminar la competencia, simplemente la reorientan hacia las relaciones políticas, las colas de espera o los privilegios administrativos. Así pues, la competencia es una consecuencia fundamental de la escasez en el mundo físico, por lo que la cuestión no es si existirá la competencia, sino qué normas la regirán.
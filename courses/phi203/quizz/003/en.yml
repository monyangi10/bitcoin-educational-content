question: According to the French liberal tradition, why is competition an inevitable aspect of human existence?
answer: Because resources in the world are finite and must be allocated among individuals
wrong_answers:
  - Because humans are naturally aggressive and seek to dominate others
  - Because political systems deliberately create competition to maintain control
  - Because social conventions have artificially established competitive relationships
explanation: |
  The text explains that competition emerges necessarily from the finitude of resources, not from human nature or social constructs. Since apples don't exist in infinite numbers, they must be appropriated by individuals. The Idéologues recognized that even collectivist systems cannot eliminate competition - they merely redirect it toward political relationships, waiting lines, or administrative privileges. Competition is thus a fundamental consequence of scarcity in the physical world, making the question not whether competition will exist, but what rules will govern it.

question: Dukurikije umugenzo w’Ubufaransa w’ubwigenge, ni kuki uguhiganwa ari ikintu kitazobura kubaho mu buzima bw’umuntu?
answer: Kuko ubutunzi bwo kw’isi burafise aho bugarukira kandi butegerezwa guhabwa abantu ku giti cabo .
wrong_answers:
  - Kubera yuko abantu mu kameremere kabo ari abanyarugomo kandi barondera kuganza abandi .
  - Kubera ko ubutegetsi bwa politike butera n’ibigirankana uguhiganwa kugira ngo umuntu agume afise ububasha .
  - Kubera ko amasezerano y’imibano yashizeho mu buryo bw’ubuhinga ubucuti bwo guhiganwa .
explanation: |
  Ico canditswe kirasigura ko uguhiganwa kuva ata kabuza ku bijanye n’ukuntu ubutunzi bufise aho bugarukira, atari ku kamere k’umuntu canke ku nyubakwa z’imibano. Kubera ko amapome atabaho mu mibare itagira uko ingana, ategerezwa gufatwa n’abantu ku giti cabo. Aba Idéologues bemeye ko mbere n’ubutegetsi bw’abanyagihugu butashobora gukuraho uguhiganwa - bugahindura gusa buja mu migenderanire ya politike, mu mirongo y’ugutegerezwa, canke mu vy’uburenganzira bw’ubutegetsi. Guhiganwa rero ni ingaruka nyamukuru y’ubukene mw’isi y’umubiri, ivyo bikaba bituma ikibazo kitari co c’uko uguhiganwa kuzobaho, ahubwo ni amategeko azobigenga.
question: Prema francuskoj liberalnoj tradiciji, zašto je konkurencija neizbežan aspekt ljudskog postojanja?
answer: Zato što su resursi u svetu ograničeni i moraju biti raspodeljeni među pojedincima
wrong_answers:
  - Zato što su ljudi prirodno agresivni i teže da dominiraju nad drugima
  - Zato što politički sistemi namerno stvaraju konkurenciju kako bi održali kontrolu
  - Zbog toga što su društvene konvencije veštački uspostavile takmičarske odnose
explanation: |
  Tekst objašnjava da konkurencija nužno proizlazi iz ograničenosti resursa, a ne iz ljudske prirode ili društvenih konstrukata. Pošto jabuke ne postoje u beskonačnim količinama, pojedinci ih moraju prisvojiti. Idéologues su prepoznali da čak ni kolektivistički sistemi ne mogu eliminisati konkurenciju - oni je samo preusmeravaju ka političkim odnosima, čekanju u redovima ili administrativnim privilegijama. Konkurencija je stoga fundamentalna posledica oskudice u fizičkom svetu, čineći pitanje ne da li će konkurencija postojati, već koja pravila će je regulisati.
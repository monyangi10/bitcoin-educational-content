question: Hvorfor er konkurranse et uunngåelig aspekt ved den menneskelige eksistens, ifølge den franske liberale tradisjonen?
answer: Fordi ressursene i verden er begrensede og må fordeles mellom individer
wrong_answers:
  - Fordi mennesker er naturlig aggressive og ønsker å dominere andre
  - Fordi politiske systemer bevisst skaper konkurranse for å opprettholde kontroll
  - Fordi sosiale konvensjoner har etablert kunstige konkurranseforhold
explanation: |
  Teksten forklarer at konkurranse nødvendigvis oppstår på grunn av ressursenes begrensning, ikke på grunn av menneskets natur eller sosiale konstruksjoner. Siden epler ikke finnes i uendelig antall, må de tilegnes av individer. Idéologene innså at selv kollektivistiske systemer ikke kan eliminere konkurransen - de kan bare omdirigere den til politiske relasjoner, ventekøer eller administrative privilegier. Konkurranse er altså en grunnleggende konsekvens av knapphet i den fysiske verden, og spørsmålet er derfor ikke om konkurransen vil eksistere, men hvilke regler som skal styre den.
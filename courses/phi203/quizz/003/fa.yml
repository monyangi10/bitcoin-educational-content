question: طبق سنت لیبرال فرانسوی، چرا رقابت جنبه‌ای اجتناب‌ناپذیر از وجود انسانی است؟
answer: زیرا منابع در جهان محدود هستند و باید بین افراد تخصیص یابند
wrong_answers:
  - زیرا انسان‌ها به طور طبیعی تهاجمی هستند و به دنبال تسلط بر دیگران می‌باشند
  - زیرا سیستم‌های سیاسی عمداً رقابت ایجاد می‌کنند تا کنترل را حفظ کنند
  - زیرا قراردادهای اجتماعی به طور مصنوعی روابط رقابتی را ایجاد کرده‌اند
explanation: |
  متن توضیح می‌دهد که رقابت لزوماً از محدودیت منابع ناشی می‌شود، نه از طبیعت انسانی یا ساختارهای اجتماعی. از آنجا که سیب‌ها به تعداد بی‌نهایت وجود ندارند، باید توسط افراد تصاحب شوند. ایدئولوگ‌ها تشخیص دادند که حتی سیستم‌های جمع‌گرایانه نمی‌توانند رقابت را حذف کنند - آنها فقط آن را به سمت روابط سیاسی، صف‌های انتظار یا امتیازات اداری هدایت می‌کنند. بنابراین رقابت نتیجه‌ای اساسی از کمبود در دنیای فیزیکی است، و مسئله این نیست که آیا رقابت وجود خواهد داشت یا نه، بلکه این است که چه قوانینی بر آن حاکم خواهند بود.
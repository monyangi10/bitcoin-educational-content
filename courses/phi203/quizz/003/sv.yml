question: Enligt den franska liberala traditionen, varför är konkurrens en oundviklig aspekt av den mänskliga existensen?
answer: Eftersom resurserna i världen är ändliga och måste fördelas mellan individer
wrong_answers:
  - Eftersom människan är naturligt aggressiv och vill dominera andra
  - Eftersom politiska system medvetet skapar konkurrens för att behålla kontrollen
  - Eftersom sociala konventioner på ett artificiellt sätt har skapat konkurrensförhållanden
explanation: |
  I texten förklaras att konkurrens är en nödvändig följd av att resurserna är begränsade, inte av människans natur eller sociala konstruktioner. Eftersom äpplen inte finns i oändligt antal måste de tillägnas av individer. Idéologerna insåg att inte ens kollektivistiska system kan eliminera konkurrensen - de kan bara omdirigera den till politiska relationer, köer eller administrativa privilegier. Konkurrens är således en grundläggande konsekvens av knapphet i den fysiska världen, vilket gör att frågan inte är om konkurrens kommer att existera, utan vilka regler som ska styra den.
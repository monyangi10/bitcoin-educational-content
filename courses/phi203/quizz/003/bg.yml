question: Защо според френската либерална традиция конкуренцията е неизбежен аспект на човешкото съществуване?
answer: Тъй като ресурсите в света са ограничени и трябва да се разпределят между хората
wrong_answers:
  - Защото хората по природа са агресивни и се стремят да доминират над другите
  - Тъй като политическите системи умишлено създават конкуренция, за да поддържат контрол
  - Тъй като социалните конвенции изкуствено са установили конкурентни отношения
explanation: |
  В текста се обяснява, че конкуренцията се поражда по необходимост от ограничеността на ресурсите, а не от човешката природа или социалните конструкции. Тъй като ябълките не съществуват в безкрайно количество, те трябва да бъдат присвоени от отделни хора. Идеолозите признават, че дори колективистичните системи не могат да премахнат конкуренцията - те само я пренасочват към политически отношения, опашки за чакане или административни привилегии. По този начин конкуренцията е основно следствие от оскъдицата във физическия свят, което прави въпроса не дали ще съществува конкуренция, а какви правила ще я управляват.
question: フランス自由主義の伝統によれば、なぜ競争が人間存在の避けられない側面なのか？
answer: 世界の資源は有限であり、個人の間で配分されなければならないからである。
wrong_answers:
  - 人間は生来攻撃的で、他者を支配しようとする。
  - 政治体制は、支配を維持するために意図的に競争を作り出しているからだ。
  - 社会通念が人為的に競争関係を構築しているからだ。
explanation: |
  この文章では、競争は人間の本性や社会的構造からではなく、資源の有限性から必然的に生まれると説明されている。リンゴは無限に存在するわけではないので、個人によって占有されなければならない。イデオローグたちは、集団主義的なシステムであっても、競争を排除することはできない。したがって、競争は物理的世界における希少性の根本的な帰結であり、問題は競争が存在するかどうかではなく、どのようなルールがそれを支配するかということになる。
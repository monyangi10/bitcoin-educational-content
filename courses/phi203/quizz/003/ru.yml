question: Согласно французской либеральной традиции, почему конкуренция является неизбежным аспектом человеческого существования?
answer: Поскольку ресурсы в мире ограничены и должны быть распределены между людьми
wrong_answers:
  - Потому что люди от природы агрессивны и стремятся доминировать над другими
  - Потому что политические системы намеренно создают конкуренцию, чтобы сохранить контроль
  - Поскольку социальные условности искусственно устанавливают конкурентные отношения
explanation: |
  В тексте объясняется, что конкуренция неизбежно возникает из-за ограниченности ресурсов, а не из-за человеческой природы или социальных установок. Поскольку яблоки не существуют в бесконечном количестве, их должны присваивать отдельные люди. Идеологи признавали, что даже коллективистские системы не могут устранить конкуренцию - они лишь перенаправляют ее на политические отношения, очереди или административные привилегии. Таким образом, конкуренция - это фундаментальное следствие дефицита в физическом мире, поэтому вопрос не в том, будет ли существовать конкуренция, а в том, какие правила будут ее регулировать.
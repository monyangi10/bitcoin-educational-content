question: Dukurikije ico canditswe, ni igiki caranga ubuhinga bwo guhingura ibintu mu mibano ya kera catuma umuntu adashobora gushinga umwidegemvyo?
answer: Ugutinya cane n'ibisubizo bidahagije bishingiye ku bintu vyinshi bidatomoye
wrong_answers:
  - Umusaruro mwinshi w'amasaranganya watumye haba ubusumbasumbane hagati y'imigwi y'abantu
  - Ibikorwa vy'ubuhinga vyihariye cane vyasaba inzira z'ubudandaji zikomeye
  - Uburyo bwo kurima bukomeye bwatumye ubutunzi bw'ibidukikije buhera vuba
explanation: |
  Ico canditswe kivuga mu buryo butomoye yuko ubuhinga bwo guhingura ibintu mu mibano ya kera bwari burangwa n''ukudatekana gukomeye, n'ivyavuyemwo bidahagije kandi bikaba vyari bifise ibintu vyinshi bidatomoye.' Ubwo buryo butari bwiza bwo guhingura, hamwe n’ibikorwa nk’uguhiga vyasaba uturere twinshi tudahuye n’ibintu bitobito vy’abantu ku giti cabo, vyatumye habaho ibintu vy’umubiri vyategeka uburyo bwo gutunganya ibintu hamwe aho umwidegemvyo w’umuntu ku giti ciwe waguma ari icipfuzo kuruta kuba ukuri nyakuri. Ayandi mahitamwo ntabwo ari meza kuko adondora imibereho y’umusesekara, ubuhinga bwihariye canke uburyo bukomeye butaranga ivyo bihugu vya kera.
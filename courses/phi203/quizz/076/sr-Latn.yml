question: Prema tekstu, proizvodnju u drevnim društvima karakterisala je zavisnost od kolektivnog rada i resursa, što je ometalo uspostavljanje individualne slobode.
answer: Ekstremna nesigurnost sa nedovoljnim rezultatima podložnim mnogim neizvesnostima
wrong_answers:
  - Obilna višak proizvodnja koja je stvorila nejednakost među društvenim klasama
  - Visoko specijalizovana proizvodnja koja je zahtevala složene trgovinske mreže
  - Intenzivne poljoprivredne metode koje su brzo iscrpile prirodne resurse
explanation: |
  Tekst eksplicitno navodi da je proizvodnja u drevnim društvima bila karakterizovana 'ekstremnom nesigurnošću, sa nedovoljnim rezultatima i podložna mnogim neizvesnostima.' Ova nesigurna priroda proizvodnje, u kombinaciji sa aktivnostima poput lova koje su zahtevale ogromne teritorije nespojive sa malim privatnim vlasništvom, stvorila je materijalne uslove koji su nametnuli kolektivne oblike organizacije gde je individualna sloboda ostala više kao težnja nego kao konkretna stvarnost. Druge opcije su netačne jer opisuju uslove obilja, specijalizacije ili intenzivne metode koje nisu bile karakteristične za ova rana društva.
question: Според текста кои са двете форми, които конкуренцията може да приеме в икономическите системи?
answer: Насилствена конкуренция и мирна конкуренция чрез обмен
wrong_answers:
  - Частна конкуренция и публична конкуренция чрез регулиране
  - Индивидуална конкуренция и колективна конкуренция чрез сътрудничество
  - Пазарна конкуренция и конкуренция на държавата чрез планиране
explanation: |
  В текста се обяснява, че конкуренцията е основна реалност, която се налага поради недостига на ресурси, и не може да бъде премахната, а само трансформирана. Тя съществува в две форми: насилствена конкуренция (когато ресурсите се придобиват чрез сила или правна принуда, както е при политическата конкуренция) и мирна конкуренция чрез доброволна размяна. Системите на несвобода погрешно се опитват да потиснат изцяло конкуренцията, но в крайна сметка заменят мирната пазарна конкуренция с насилствена политическа конкуренция, създавайки несправедливи отношения. Другите варианти неправилно предполагат, че конкуренцията може да бъде категоризирана по структура на собствеността, нива на сътрудничество или методи на икономическо планиране, при което се пропуска ключовото разграничение между доброволните и принудителните средства за придобиване на ресурси.
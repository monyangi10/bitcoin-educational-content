question: Prema tekstu, koje dva oblika konkurencija može imati u ekonomskim sistemima?
answer: Nasilno takmičenje i mirno takmičenje kroz razmenu
wrong_answers:
  - Privatna konkurencija i javna konkurencija putem regulative
  - Individualno takmičenje i kolektivno takmičenje kroz saradnju
  - Tržišna konkurencija i državna konkurencija kroz planiranje
explanation: |
  Tekst objašnjava da je konkurencija fundamentalna stvarnost koju čini neophodnom oskudica resursa, i ne može se eliminisati, već samo transformisati. Postoji u dva oblika: nasilna konkurencija (gde se resursi stiču silom ili pravnom prinudom, kao u političkoj konkurenciji) i mirna konkurencija kroz dobrovoljnu razmenu. Sistemi neslobode pogrešno pokušavaju potpuno suzbiti konkurenciju, ali na kraju zamenjuju mirnu tržišnu konkurenciju nasilnom političkom konkurencijom, stvarajući nepravedne odnose. Druge opcije pogrešno sugerišu da se konkurencija može kategorizovati prema strukturi vlasništva, nivoima saradnje ili metodama ekonomskog planiranja, što propušta ključnu razliku između dobrovoljnih i prinudnih sredstava sticanja resursa.
question: Menurut teks tersebut, apa saja dua bentuk persaingan yang dapat terjadi dalam sistem ekonomi?
answer: Kompetisi kekerasan dan kompetisi damai melalui pertukaran
wrong_answers:
  - Persaingan swasta dan persaingan publik melalui regulasi
  - Kompetisi individu dan kompetisi kolektif melalui kerja sama
  - Persaingan pasar dan persaingan negara melalui perencanaan
explanation: |
  Teks tersebut menjelaskan bahwa persaingan adalah realitas mendasar yang diperlukan oleh kelangkaan sumber daya, dan tidak dapat dihilangkan, hanya dapat diubah. Kompetisi ada dalam dua bentuk: kompetisi dengan kekerasan (di mana sumber daya diperoleh melalui kekerasan atau paksaan hukum, seperti dalam kompetisi politik) dan kompetisi damai melalui pertukaran sukarela. Sistem tanpa kebebasan secara keliru mencoba untuk menekan persaingan secara keseluruhan, tetapi akhirnya menggantikan persaingan pasar yang damai dengan persaingan politik yang penuh kekerasan, menciptakan hubungan yang tidak adil. Pilihan lain secara keliru menyatakan bahwa persaingan dapat dikategorikan berdasarkan struktur kepemilikan, tingkat kerja sama, atau metode perencanaan ekonomi, yang melewatkan perbedaan utama antara cara-cara sukarela dan paksaan untuk memperoleh sumber daya.
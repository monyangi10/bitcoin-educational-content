question: Dushingiye ku canditswe, ni uburyo bubiri ubuhe uguhiganwa gushobora gufata mu mice y’ubutunzi?
answer: Guhiganwa kw'ubukazi n'uguhiganwa kw'amahoro biciye mu guhanahana
wrong_answers:
  - Amarushanwa y'abikorera ku giti cabo n'ay'abantu bose biciye mu mategeko
  - Amarushanwa y'umuntu ku giti ciwe n'amarushanwa y'abantu bose biciye mu gufashanya
  - Amarushanwa y'isoko n'amarushanwa ya Leta biciye mu gutegura
explanation: |
  Ico canditswe gisigura ko uguhiganwa ari ikintu nyakuri c’ishimikiro gikenewe kubera ubukene bw’ubutunzi, kandi ko kidashobora gukurwaho, gihinduka gusa. Biri mu buryo bubiri: uguhiganwa kw’ubukazi (aho ubutunzi buronswa biciye ku nguvu canke ku nguvu zitegekanijwe n’amategeko, nk’uko biri mu guhiganwa mu vya politike) n’uguhiganwa kw’amahoro biciye mu guhanahana ku bushake. Uburyo bwo kutagira umwidegemvyo buragerageza mu makosa guhagarika uguhiganwa burundu, ariko bugaheza bugasubirira uguhiganwa kw’isoko kw’amahoro n’uguhiganwa kwa politike kw’ubukazi, bigatuma haba imigenderanire idatunganye. Ayandi mahitamwo avuga mu buryo butari bwo ko uguhiganwa gushobora gushirwa mu migwi hakurikijwe imiterere y’ubutunzi, ingero z’ubufatanye, canke uburyo bwo gutegura ubutunzi, ivyo bikaba bibura itandukaniro nyamukuru hagati y’uburyo bwo kuronka ubutunzi ku bushake n’uburyo bwo kugobera.
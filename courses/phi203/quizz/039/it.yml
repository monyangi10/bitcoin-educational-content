question: Secondo il testo, quali sono le due forme che la concorrenza può assumere nei sistemi economici?
answer: Competizione violenta e competizione pacifica attraverso lo scambio
wrong_answers:
  - Concorrenza privata e concorrenza pubblica attraverso la regolamentazione
  - Competizione individuale e competizione collettiva attraverso la cooperazione
  - Concorrenza di mercato e concorrenza statale attraverso la pianificazione
explanation: |
  Il testo spiega che la concorrenza è una realtà fondamentale resa necessaria dalla scarsità di risorse e non può essere eliminata, ma solo trasformata. Esiste in due forme: la concorrenza violenta (in cui le risorse vengono acquisite con la forza o la coercizione legale, come nella concorrenza politica) e la concorrenza pacifica attraverso lo scambio volontario. I sistemi di non libertà cercano erroneamente di sopprimere del tutto la concorrenza, ma finiscono per sostituire la pacifica concorrenza di mercato con una violenta concorrenza politica, creando relazioni ingiuste. Le altre opzioni suggeriscono erroneamente che la concorrenza può essere classificata in base alla struttura della proprietà, ai livelli di cooperazione o ai metodi di pianificazione economica, senza tener conto della distinzione fondamentale tra mezzi volontari e coercitivi di acquisizione delle risorse.
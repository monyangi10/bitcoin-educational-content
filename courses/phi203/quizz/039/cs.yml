question: Jaké jsou podle textu dvě formy, které může mít konkurence v ekonomických systémech?
answer: Násilná konkurence a mírová konkurence prostřednictvím výměny
wrong_answers:
  - Soukromá a veřejná soutěž prostřednictvím regulace
  - Individuální soutěž a kolektivní soutěž prostřednictvím spolupráce
  - Tržní soutěž a státní soutěž prostřednictvím plánování
explanation: |
  V textu se vysvětluje, že konkurence je základní skutečností, která je nutná kvůli nedostatku zdrojů, a nelze ji odstranit, pouze změnit. Existuje ve dvou formách: násilná konkurence (kdy jsou zdroje získávány silou nebo právním nátlakem, jako je tomu v politické konkurenci) a mírová konkurence prostřednictvím dobrovolné směny. Systémy nesvobody se mylně snaží konkurenci zcela potlačit, ale nakonec nahrazují mírovou tržní soutěž násilnou politickou soutěží, čímž vytvářejí nespravedlivé vztahy. Ostatní možnosti nesprávně naznačují, že konkurenci lze rozdělit podle vlastnické struktury, úrovně spolupráce nebo metod ekonomického plánování, což opomíjí klíčový rozdíl mezi dobrovolnými a donucovacími způsoby získávání zdrojů.
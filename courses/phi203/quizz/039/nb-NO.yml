question: Hvilke to former for konkurranse kan forekomme i økonomiske systemer, ifølge teksten?
answer: Voldelig konkurranse og fredelig konkurranse gjennom utveksling
wrong_answers:
  - Privat konkurranse og offentlig konkurranse gjennom regulering
  - Individuell konkurranse og kollektiv konkurranse gjennom samarbeid
  - Markedskonkurranse og statlig konkurranse gjennom planlegging
explanation: |
  Teksten forklarer at konkurranse er en grunnleggende realitet som er nødvendig på grunn av knapphet på ressurser, og at den ikke kan elimineres, bare transformeres. Den finnes i to former: voldelig konkurranse (der ressursene erverves med makt eller juridisk tvang, som i politisk konkurranse) og fredelig konkurranse gjennom frivillig utveksling. Ufrihetssystemer forsøker feilaktig å undertrykke konkurransen helt, men ender opp med å erstatte fredelig markedskonkurranse med voldelig politisk konkurranse, noe som skaper urettferdige forhold. De andre alternativene antyder feilaktig at konkurranse kan kategoriseres etter eierskapsstruktur, samarbeidsnivåer eller økonomiske planleggingsmetoder, noe som går glipp av det viktige skillet mellom frivillige og tvungne måter å tilegne seg ressurser på.
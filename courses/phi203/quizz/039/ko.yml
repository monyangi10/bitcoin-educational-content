question: 본문에 따르면, 경제 시스템에서 경쟁이 취할 수 있는 두 가지 형태는 무엇인가요?
answer: 폭력적 경쟁과 교류를 통한 평화적 경쟁
wrong_answers:
  - 규제를 통한 민간 경쟁과 공공 경쟁
  - 개인 경쟁과 협력을 통한 집단 경쟁
  - 계획을 통한 시장 경쟁과 국가 경쟁
explanation: |
  본문에서는 경쟁은 자원의 희소성으로 인해 불가피하게 발생하는 근본적인 현실이며, 경쟁은 제거할 수 없고 변화시킬 수 있을 뿐이라고 설명합니다. 경쟁은 폭력적 경쟁(정치적 경쟁에서처럼 무력이나 법적 강압을 통해 자원을 획득하는 경우)과 자발적 교환을 통한 평화적 경쟁의 두 가지 형태로 존재합니다. 자유가 없는 시스템은 경쟁을 완전히 억압하려고 하지만 결국 평화로운 시장 경쟁을 폭력적인 정치적 경쟁으로 대체하여 불공정한 관계를 만들어냅니다. 다른 옵션은 소유 구조, 협력 수준 또는 경제 계획 방식에 따라 경쟁을 분류할 수 있다고 잘못 제안하여 자원 획득의 자발적 수단과 강압적 수단 사이의 중요한 구분을 놓칩니다.
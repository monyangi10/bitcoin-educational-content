question: 本文によれば、経済システムにおいて競争が取り得る2つの形態とは何か？
answer: 暴力的な競争と交換による平和的競争
wrong_answers:
  - 規制による民間競争と公的競争
  - 協力による個人的競争と集団的競争
  - 計画による市場競争と国家競争
explanation: |
  本文では、競争は資源の希少性によって必要とされる基本的な現実であり、それを排除することはできないが、変容させることだけはできる、と説明されている。競争には2つの形態がある。暴力的競争（政治的競争のように、武力や法的強制力によって資源を獲得する）と、自発的交換による平和的競争である。非自由主義のシステムは、競争を完全に抑制しようとするが、結局は平和的な市場競争を暴力的な政治的競争に置き換えてしまい、不公正な関係を作り出してしまう。他の選択肢は、競争を所有構造や協力のレベル、経済計画の方法によって分類できると誤って示唆しているが、これは資源を獲得するための自発的手段と強制的手段の重要な区別を見逃している。
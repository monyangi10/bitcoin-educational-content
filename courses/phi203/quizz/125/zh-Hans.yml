question: 根据保罗-勒鲁瓦-博略（Paul Leroy-Beaulieu）1883 年的分析，集体主义制度通常是如何获得技术和程序创新的？
answer: 它们复制自由市场社会从外部开发的创新，因为它们无法实现 generate 内部创新
wrong_answers:
  - 他们通过协调科学进步的中央研究委员会开发创新成果
  - 它们通过汇集集体知识和消除合作中的竞争障碍来创造创新
  - 它们通过国家资助的机构进行 generate 创新，将资源集中用于系统性改进
explanation: |
  保罗-勒鲁瓦-博略（Paul Leroy-Beaulieu）曾预言，集体主义制度由于其官僚性质和缺乏个人激励，在结构上无法进行内部创新。他正确地预见到，共产主义社会将依赖于复制自由社会的创新，而不是创造自己的创新，因为缺乏个人奖励机制和僵化的监管框架阻碍了真正创新所需的冒险精神和创造性。
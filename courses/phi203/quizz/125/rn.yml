question: Dushingiye ku nseguro ya Paul Leroy-Beaulieu yo mu 1883, ni gute mu bisanzwe uburyo bwo gukorana n’abandi buronka ubuhinga bushasha n’imirongo ngenderwako?
answer: Bakopa ubuhinga bushasha bwateguwe hanze n’amashirahamwe y’isoko ry’uburenganzira kuko badashobora generate ubuhinga bushasha bwo mu mutima .
wrong_answers:
  - Bategura ibintu bishasha biciye ku makomite y’ubushakashatsi ahurikiye hamwe ahuza iterambere ry’ubuhinga .
  - Barema ibintu bishasha mu gukoranya ubumenyi rusangi no gukuraho intambamyi z'uguhiganwa mu gukorana .
  - Ba generate ubuhinga bushasha biciye mu bigo biterwa inkunga na Leta vyibanda ku butunzi ku gutegura neza .
explanation: |
  Paul Leroy-Beaulieu yaravuze ko uburyo bwo gukorana n’abandi buzoba butashobora gukora ibintu bishasha imbere mu mutima kubera ubuhinga bwabwo bwo gukorana n’abandi no kubura ivyo butera intege umuntu ku giti ciwe. Yari yiteze neza yuko imiryango y’abakomunisita yokwizigira kwigana ibintu bishasha biva mu miryango yidegemvya aho kwizigira ivyabo bwite, kubera ko ukubura uburyo bwo guhemba umuntu ku giti ciwe be n’ingingo ngenderwako zikomeye zibuza gufata ingorane no gukora ibintu bishasha bikenewe kugira ngo umuntu ashobore gukora ibintu bishasha vy’ukuri.
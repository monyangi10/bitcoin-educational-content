question: Selon l'analyse de Paul Leroy-Beaulieu (1883), comment les systèmes collectivistes acquièrent-ils généralement des innovations technologiques et procédurales ?
answer: Ils copient les innovations développées à l'extérieur par les sociétés de marché libre car ils ne peuvent pas générer d'innovations en interne.
wrong_answers:
  - Ils développent des innovations par le biais de comités de recherche centralisés qui coordonnent les progrès scientifiques
  - Ils créent des innovations en mettant en commun les connaissances collectives et en éliminant les obstacles concurrentiels à la collaboration
  - Ils génèrent des innovations par le biais d'institutions financées par l'État qui concentrent leurs ressources sur l'amélioration systématique
explanation: |
  Paul Leroy-Beaulieu avait prédit que les systèmes collectivistes seraient structurellement incapables d'innovation interne en raison de leur nature bureaucratique et de l'absence d'incitations individuelles. Il prévoyait à juste titre que les sociétés communistes se contenteraient de copier les innovations des sociétés libres plutôt que d'en créer les leurs, car l'absence de mécanismes de récompense personnelle et la rigidité des cadres réglementaires empêchent la prise de risque et l'initiative créative nécessaires à une véritable innovation.

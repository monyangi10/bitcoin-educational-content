question: بر اساس تحلیل پل لروی-بولو در سال 1883، سیستم‌های جمع‌گرایانه معمولاً چگونه نوآوری‌های تکنولوژیکی و رویه‌ای را به دست می‌آورند؟
answer: آن‌ها نوآوری‌هایی را که توسط جوامع بازار آزاد در خارج توسعه یافته‌اند، کپی می‌کنند زیرا نمی‌توانند نوآوری داخلی ایجاد کنند.
wrong_answers:
  - آن‌ها نوآوری‌ها را از طریق کمیته‌های تحقیقاتی متمرکز که پیشرفت علمی را هماهنگ می‌کنند، توسعه می‌دهند.
  - آن‌ها با جمع‌آوری دانش جمعی و حذف موانع رقابتی برای همکاری، نوآوری‌هایی ایجاد می‌کنند.
  - آن‌ها نوآوری‌های generate را از طریق مؤسسات دولتی که منابع را بر بهبود سیستماتیک متمرکز می‌کنند، انجام می‌دهند.
explanation: |
  پل لروی-بالیو پیش‌بینی کرد که سیستم‌های جمع‌گرایانه به دلیل ماهیت بوروکراتیک و فقدان انگیزه‌های فردی، به‌طور ساختاری قادر به نوآوری داخلی نخواهند بود. او به‌درستی پیش‌بینی کرد که جوامع کمونیستی به جای تولید نوآوری‌های خود، به کپی‌برداری از نوآوری‌های جوامع آزاد متکی خواهند بود، زیرا نبود مکانیزم‌های پاداش شخصی و چارچوب‌های نظارتی سخت‌گیرانه مانع از ریسک‌پذیری و ابتکار خلاقانه لازم برای نوآوری واقعی می‌شود.
question: Theo phân tích của Paul Leroy-Beaulieu năm 1883, các hệ thống tập thể thường tiếp thu những đổi mới về công nghệ và quy trình như thế nào?
answer: Họ sao chép những đổi mới được phát triển từ bên ngoài bởi các xã hội thị trường tự do vì họ không thể tạo ra sự đổi mới nội bộ.
wrong_answers:
  - Họ phát triển các đổi mới thông qua các ủy ban nghiên cứu tập trung, điều phối sự tiến bộ khoa học.
  - Họ tạo ra những đổi mới bằng cách tập hợp kiến thức chung và loại bỏ các rào cản cạnh tranh để hợp tác.
  - Họ triển khai các đổi mới generate thông qua các tổ chức do nhà nước tài trợ, tập trung nguồn lực vào việc cải thiện hệ thống.
explanation: |
  Paul Leroy-Beaulieu dự đoán rằng các hệ thống tập thể sẽ không có khả năng đổi mới nội bộ do bản chất quan liêu và thiếu động lực cá nhân. Ông đã dự đoán chính xác rằng các xã hội cộng sản sẽ dựa vào việc sao chép những đổi mới từ các xã hội tự do hơn là tự tạo ra những đổi mới của riêng mình, vì sự thiếu vắng các cơ chế khen thưởng cá nhân và khung pháp lý cứng nhắc ngăn cản việc chấp nhận rủi ro và sáng kiến sáng tạo cần thiết cho sự đổi mới thực sự.
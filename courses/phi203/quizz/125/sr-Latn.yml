question: Prema analizi Paula Leroy-Beaulieua iz 1883. godine, kolektivistički sistemi obično stiču tehnološke i proceduralne inovacije putem imitacije ili prilagođavanja postojećih metoda i tehnologija razvijenih u kapitalističkim ili individualističkim društvima.
answer: Oni kopiraju inovacije razvijene eksterno od strane slobodnih tržišnih društava jer ne mogu generate internu inovaciju.
wrong_answers:
  - Oni razvijaju inovacije putem centralizovanih istraživačkih komiteta koji koordiniraju naučni napredak
  - Oni stvaraju inovacije okupljanjem kolektivnog znanja i eliminisanjem konkurentskih barijera za saradnju.
  - Oni generate inovacije kroz državne institucije koje usmeravaju resurse na sistematsko unapređenje
explanation: |
  Paul Leroy-Beaulieu je predvideo da će kolektivistički sistemi biti strukturno nesposobni za unutrašnju inovaciju zbog svoje birokratske prirode i nedostatka individualnih podsticaja. On je tačno predvideo da će komunistička društva zavisiti od kopiranja inovacija iz slobodnih društava umesto da generišu sopstvene, jer odsustvo mehanizama za lične nagrade i rigidni regulatorni okviri sprečavaju preuzimanje rizika i kreativnu inicijativu neophodnu za pravu inovaciju.
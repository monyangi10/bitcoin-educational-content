question: ตามการวิเคราะห์ของ Paul Leroy-Beaulieu ในปี 1883 ระบบแบบรวมหมู่มักจะได้รับนวัตกรรมทางเทคโนโลยีและกระบวนการอย่างไร?
answer: พวกเขาคัดลอกนวัตกรรมที่พัฒนาขึ้นภายนอกโดยสังคมตลาดเสรีเนื่องจากพวกเขาไม่สามารถ generate นวัตกรรมภายใน
wrong_answers:
  - พวกเขาพัฒนานวัตกรรมผ่านคณะกรรมการวิจัยที่รวมศูนย์ซึ่งประสานความก้าวหน้าทางวิทยาศาสตร์
  - พวกเขาสร้างนวัตกรรมโดยการรวมความรู้ร่วมกันและขจัดอุปสรรคทางการแข่งขันในการทำงานร่วมกัน
  - พวกเขา generate นวัตกรรมผ่านสถาบันที่ได้รับทุนจากรัฐที่มุ่งเน้นทรัพยากรในการปรับปรุงอย่างเป็นระบบ
explanation: |
  ปอล เลอรัว-โบลิเออ ทำนายว่าระบบแบบรวมหมู่จะไม่สามารถสร้างนวัตกรรมภายในได้เนื่องจากลักษณะของระบบราชการและการขาดแรงจูงใจส่วนบุคคล เขาคาดการณ์อย่างถูกต้องว่าสังคมคอมมิวนิสต์จะพึ่งพาการลอกเลียนนวัตกรรมจากสังคมเสรีแทนที่จะสร้างสรรค์ของตนเอง เนื่องจากการขาดกลไกการให้รางวัลส่วนบุคคลและกรอบการกำกับดูแลที่เข้มงวดทำให้การเสี่ยงและความคิดริเริ่มสร้างสรรค์ที่จำเป็นสำหรับนวัตกรรมที่แท้จริงไม่เกิดขึ้น
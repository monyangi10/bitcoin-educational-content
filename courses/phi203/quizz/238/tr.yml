question: Liberal düşünce, aşırı devlet müdahalesine karşı yeterli bir çözüm olarak adem-i merkeziyetçiliği neden reddetmektedir?
answer: Çünkü devlet işlevlerinin yerel yönetimlere devredilmesi, gayrimeşru devlet müdahalesini ortadan kaldırmak yerine sorunun yerini değiştirmektedir
wrong_answers:
  - Çünkü adem-i merkeziyetçilik, etkili bir yönetişim için çok fazla idari karmaşıklık ve bürokratik verimsizlik yaratır
  - Yerel yönetimlerin karmaşık kamu hizmetlerini etkin bir şekilde yönetmek için gerekli teknik uzmanlığa ve kaynaklara sahip olmaması
  - Çünkü adem-i merkeziyetçilik ulusal birliği zayıflatır ve siyasi otoritede tehlikeli bir parçalanma yaratır
explanation: |
  Liberal düşünürler adem-i merkeziyetçiliğin devletin gayrimeşru müdahalesi gibi temel bir sorunu ele almakta başarısız olduğunu savunurlar. İşlevleri basitçe merkezi yönetimden yerel yönetime (belediyeler, bölgeler) aktarmak sorunu çözmez çünkü yerel yönetimler özel faaliyetlere ait olması gereken alanlara müdahale etmek için merkezi yönetimden daha fazla meşruiyete sahip değildir. Amaç devlet gücünü yeniden konumlandırmak değil, bu işlevleri tamamen özel alana - bireylere, özgür derneklere ve işletmelere - devretmektir. Gerçek liberal reform, uygunsuz devlet rollerini tamamen ortadan kaldırmayı gerektirir, sadece hangi devlet kademesinin bunları yerine getirdiğini değiştirmeyi değil.
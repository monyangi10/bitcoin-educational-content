question: Mengapa pemikiran liberal menolak desentralisasi sebagai solusi yang memadai untuk intervensi negara yang berlebihan?
answer: Karena mengalihkan fungsi negara ke otoritas lokal hanya memindahkan masalah dan bukannya menghilangkan intervensi pemerintah yang tidak sah
wrong_answers:
  - Karena desentralisasi menciptakan terlalu banyak kerumitan administratif dan inefisiensi birokrasi untuk tata kelola pemerintahan yang efektif
  - Karena pemerintah daerah tidak memiliki keahlian teknis dan sumber daya yang diperlukan untuk mengelola layanan publik yang kompleks secara efektif
  - Karena desentralisasi merusak persatuan nasional dan menciptakan fragmentasi otoritas politik yang berbahaya
explanation: |
  Para pemikir liberal berpendapat bahwa desentralisasi gagal untuk mengatasi masalah mendasar dari intervensi negara yang tidak sah. Hanya dengan memindahkan fungsi-fungsi dari pemerintah pusat ke pemerintah lokal (kotamadya, daerah) tidak akan menyelesaikan masalah karena pemerintah lokal tidak memiliki legitimasi yang lebih besar daripada pemerintah pusat untuk mengintervensi wilayah-wilayah yang seharusnya menjadi wilayah aktivitas swasta. Tujuannya bukan untuk memindahkan kekuasaan negara, melainkan untuk mengalihkan fungsi-fungsi ini sepenuhnya ke ranah swasta - kepada individu, asosiasi bebas, dan perusahaan. Reformasi liberal yang sesungguhnya membutuhkan penghapusan peran pemerintah yang tidak tepat, bukan hanya mengubah tingkat pemerintahan yang menjalankannya.
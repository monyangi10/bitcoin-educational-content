question: 为什么自由主义思想拒绝将权力下放作为解决国家过度干预的适当办法？
answer: 因为将国家职能移交给地方当局只是将问题转移，而不是消除政府的非法干预
wrong_answers:
  - 因为权力下放造成了过多的行政复杂性和官僚机构的低效率，不利于有效治理
  - 因为地方当局缺乏有效管理复杂公共服务所需的技术专长和资源
  - 因为权力下放会破坏民族团结，造成政治权力分散的危险局面
explanation: |
  自由主义思想家认为，权力下放未能从根本上解决国家非法干预的问题。仅仅将职能从中央政府转移到地方政府（市、区）并不能解决问题，因为地方政府并不比中央政府更有合法性来干预本应属于私人活动的领域。我们的目标不是转移国家权力，而是将这些职能完全转移到私人领域--个人、自由协会和企业。真正的自由主义改革需要彻底消除不适当的政府职能，而不仅仅是改变哪一级政府履行这些职能。
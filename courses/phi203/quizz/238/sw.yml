question: Kwa nini mawazo huria yanakataa ugatuzi kama suluhisho tosha la uingiliaji kati wa serikali kupita kiasi?
answer: Kwa sababu kuhamisha kazi za serikali kwa mamlaka za mitaa huhamisha tu tatizo badala ya kuondoa uingiliaji kati wa serikali kinyume cha sheria.
wrong_answers:
  - Kwa sababu ugatuzi wa madaraka unaleta ugumu mwingi wa kiutawala na ukosefu wa ufanisi wa urasimu kwa utawala bora
  - Kwa sababu mamlaka za mitaa hazina utaalamu wa kiufundi na rasilimali zinazohitajika ili kusimamia huduma tata za umma kwa ufanisi
  - Kwa sababu ugatuzi wa madaraka hudhoofisha umoja wa kitaifa na husababisha mgawanyiko hatari wa mamlaka ya kisiasa
explanation: |
  Wanafikra huru wanasema kwamba ugatuzi wa madaraka haushughulikii suala la msingi la uingiliaji kati wa serikali haramu. Kuhamisha tu majukumu kutoka serikali kuu hadi serikali za mitaa (manispaa, mikoa) hakutatui tatizo kwa sababu mamlaka za mitaa hazina uhalali mkubwa kuliko serikali kuu kuingilia kati katika maeneo ambayo yanapaswa kuwa ya shughuli za kibinafsi. Lengo si kuhamisha mamlaka ya serikali bali kuhamisha majukumu haya kabisa hadi kwenye uwanja wa kibinafsi - kwa watu binafsi, vyama huru, na makampuni. Mageuzi ya kweli ya huria yanahitaji kuondoa kabisa majukumu yasiyofaa ya serikali, si kubadilisha tu kiwango cha serikali kinachoyatekeleza.
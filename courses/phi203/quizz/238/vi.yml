question: Tại sao tư tưởng tự do lại bác bỏ phi tập trung hóa như một giải pháp thích hợp cho sự can thiệp quá mức của nhà nước?
answer: Bởi vì việc chuyển giao các chức năng của nhà nước cho chính quyền địa phương chỉ đơn thuần là chuyển vấn đề sang nơi khác chứ không loại bỏ được sự can thiệp bất hợp pháp của chính phủ.
wrong_answers:
  - Bởi vì việc phân quyền tạo ra quá nhiều sự phức tạp về mặt hành chính và sự kém hiệu quả về mặt quan liêu, cản trở việc quản trị hiệu quả.
  - Do chính quyền địa phương thiếu chuyên môn kỹ thuật và nguồn lực cần thiết để quản lý hiệu quả các dịch vụ công phức tạp.
  - Bởi vì việc phân quyền làm suy yếu sự thống nhất quốc gia và tạo ra sự phân mảnh nguy hiểm về quyền lực chính trị.
explanation: |
  Các nhà tư tưởng tự do lập luận rằng phân quyền không giải quyết được vấn đề cơ bản về sự can thiệp bất hợp pháp của nhà nước. Việc đơn giản chuyển giao chức năng từ chính phủ trung ương sang chính quyền địa phương (thành phố, khu vực) không giải quyết được vấn đề vì chính quyền địa phương không có tính hợp pháp cao hơn chính phủ trung ương trong việc can thiệp vào các lĩnh vực thuộc về hoạt động tư nhân. Mục tiêu không phải là chuyển giao quyền lực nhà nước mà là chuyển giao hoàn toàn các chức năng này cho khu vực tư nhân - cho các cá nhân, các hiệp hội tự do và các doanh nghiệp. Cải cách tự do thực sự đòi hỏi phải loại bỏ hoàn toàn các vai trò không phù hợp của chính phủ, chứ không chỉ thay đổi cấp chính phủ nào thực hiện chúng.
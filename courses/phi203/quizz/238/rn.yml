question: Ni kuki iciyumviro c’ubwigenge canka kwegereza ubutegetsi abaturage nk’umuti ubereye wo gutorera umuti Leta kwivanga mu bindi bihugu birenze urugero?
answer: Kubera ko kwimurira ibikorwa vya Leta ku butegetsi bwo mu karere bituma gusa ingorane ihinduka aho gukuraho ukuntu Leta igira ico ikoze mu buryo butemewe n’amategeko .
wrong_answers:
  - Kuko kwegereza ubutegetsi abaturage bitera ubutegetsi bugoranye cane n’ubukene bw’ubutegetsi kugira ngo ubutegetsi bube bwiza .
  - Kubera ko ubutegetsi bw’intara butagira ubuhinga n’ubuhinga bikenewe kugira ngo bushobore gucunga neza ibikorwa vya Leta bikomeye .
  - Kubera ko kwegereza ubutegetsi abaturage bihungabanya ubumwe bw’igihugu kandi bikaba bituma ubutegetsi bwa politike buca ibice biteye akaga .
explanation: |
  Abanyabwenge b’abanyagihugu bavuga ko kwegereza ubutegetsi abaturage bidashobora gutorera umuti ikibazo nyamukuru c’uko Leta yinjira mu buryo butemewe n’amategeko. Gukura gusa ibikorwa mu butegetsi bwa Leta nkuru bikaja mu butegetsi bw’intara (amakomine, uturere) ntibitorera umuti ingorane kuko ubutegetsi bw’intara nta burenganzira bufise bwo kwivanga mu bikorwa bikwiye kuba ivy’abikorera ku giti cabo kuruta ubutegetsi bw’intara. Intumbero si iyo kwimurira ububasha bwa Leta ahubwo ni iyo kwimurira izo nshingano zose mu rwego rw’abantu ku giti cabo - ku bantu ku giti cabo, ku mashirahamwe yigenga, no ku bigo. Ivugurura ry’ukuri ry’ubwigenge risaba gukuraho burundu uruhara rwa Leta rudakwiye, atari uguhindura gusa urugero rwa Leta ruzikora.
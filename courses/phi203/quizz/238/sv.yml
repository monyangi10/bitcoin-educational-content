question: Varför förkastar liberala tankar decentralisering som en lämplig lösning på överdrivet statligt ingripande?
answer: Eftersom överföring av statliga funktioner till lokala myndigheter bara flyttar problemet snarare än eliminerar olaglig statlig inblandning
wrong_answers:
  - Eftersom decentralisering skapar för mycket administrativ komplexitet och byråkratisk ineffektivitet för en effektiv styrning
  - Eftersom lokala myndigheter saknar den tekniska expertis och de resurser som krävs för att hantera komplexa offentliga tjänster på ett effektivt sätt
  - Eftersom decentralisering undergräver den nationella enigheten och skapar en farlig fragmentering av den politiska makten
explanation: |
  Liberala tänkare hävdar att decentralisering inte tar itu med den grundläggande frågan om illegitima statliga ingripanden. Att helt enkelt överföra funktioner från central till lokal förvaltning (kommuner, regioner) löser inte problemet eftersom lokala myndigheter inte har större legitimitet än central förvaltning att ingripa i områden som borde tillhöra privat verksamhet. Målet är inte att flytta statsmakten utan att helt överföra dessa funktioner till den privata domänen - till individer, fria sammanslutningar och företag. En sann liberal reform kräver att man helt och hållet eliminerar olämpliga statliga roller, inte bara att man ändrar vilken nivå av staten som utför dem.
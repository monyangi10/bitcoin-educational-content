question: 為什麼自由主義思想拒絕將權力下放作為國家過度干預的適當解決方案？
answer: 因為將國家職能轉移給地方政府，只是將問題轉移，而非消除不合法的政府干預
wrong_answers:
  - 因為權力下放會造成過多的行政複雜性和官僚低效率，無法有效治理
  - 因為地方政府缺乏有效管理複雜的公共服務所需的技術專業知識和資源
  - 因為權力下放會破壞國家統一，並造成政治權力分散的危險。
explanation: |
  自由主義思想家認為，權力下放未能解決國家非法干預的根本問題。單單將中央政府的職能轉移給地方政府（市、區）並不能解決問題，因為地方政府並沒有比中央政府更大的合法性來干預應該屬於私人活動的領域。我們的目標不是將國家權力遷移，而是將這些功能完全轉移到私人領域 - 個人、自由協會和企業。真正的自由改革需要完全消除不適當的政府角色，而不只是改變哪個層級的政府執行這些角色。
question: چرا تفکر لیبرال تمرکززدایی را به عنوان یک راه‌حل مناسب برای مداخله بیش از حد دولت رد می‌کند؟
answer: زیرا انتقال وظایف دولتی به مقامات محلی صرفاً مشکل را جابجا می‌کند و به جای حذف مداخله غیرقانونی دولت، آن را منتقل می‌کند.
wrong_answers:
  - زیرا تمرکززدایی پیچیدگی اداری و ناکارآمدی بوروکراتیک زیادی برای حکمرانی مؤثر ایجاد می‌کند
  - زیرا مقامات محلی فاقد تخصص فنی و منابع لازم برای مدیریت مؤثر خدمات عمومی پیچیده هستند
  - زیرا تمرکززدایی وحدت ملی را تضعیف می‌کند و باعث ایجاد تفرقه خطرناک در قدرت سیاسی می‌شود
explanation: |
  اندیشمندان لیبرال استدلال می‌کنند که تمرکززدایی نمی‌تواند به مسئله اساسی مداخله نامشروع دولت پاسخ دهد. انتقال صرف وظایف از دولت مرکزی به دولت محلی (شهرداری‌ها، مناطق) مشکل را حل نمی‌کند زیرا مقامات محلی مشروعیت بیشتری نسبت به دولت مرکزی برای مداخله در حوزه‌هایی که باید به فعالیت خصوصی تعلق داشته باشد، ندارند. هدف این نیست که قدرت دولت جابجا شود بلکه این وظایف به طور کامل به حوزه خصوصی - به افراد، انجمن‌های آزاد و شرکت‌ها - منتقل شود. اصلاحات واقعی لیبرال مستلزم حذف کامل نقش‌های نامناسب دولت است، نه فقط تغییر سطح دولتی که آنها را انجام می‌دهد.
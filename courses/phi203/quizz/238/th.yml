question: ทำไมแนวคิดเสรีนิยมถึงปฏิเสธการกระจายอำนาจว่าเป็นวิธีแก้ปัญหาที่เพียงพอต่อการแทรกแซงของรัฐที่มากเกินไป?
answer: เนื่องจากการถ่ายโอนหน้าที่ของรัฐไปยังหน่วยงานท้องถิ่นเป็นเพียงการย้ายปัญหาแทนที่จะกำจัดการแทรกแซงของรัฐบาลที่ไม่ชอบด้วยกฎหมาย
wrong_answers:
  - เพราะการกระจายอำนาจสร้างความซับซ้อนทางการบริหารและความไม่มีประสิทธิภาพทางระบบราชการมากเกินไปสำหรับการปกครองที่มีประสิทธิผล
  - เนื่องจากหน่วยงานท้องถิ่นขาดความเชี่ยวชาญทางเทคนิคและทรัพยากรที่จำเป็นในการจัดการบริการสาธารณะที่ซับซ้อนได้อย่างมีประสิทธิภาพ
  - เนื่องจากการกระจายอำนาจบ่อนทำลายความเป็นเอกภาพของชาติและสร้างการกระจายตัวที่เป็นอันตรายต่ออำนาจทางการเมือง
explanation: |
  นักคิดเสรีนิยมโต้แย้งว่าการกระจายอำนาจล้มเหลวในการแก้ไขปัญหาพื้นฐานของการแทรกแซงของรัฐที่ไม่ชอบธรรม การถ่ายโอนหน้าที่จากรัฐบาลกลางไปยังรัฐบาลท้องถิ่น (เทศบาล, ภูมิภาค) ไม่ได้แก้ปัญหาเพราะเจ้าหน้าที่ท้องถิ่นไม่มีความชอบธรรมมากกว่ารัฐบาลกลางในการแทรกแซงในพื้นที่ที่ควรเป็นของกิจกรรมส่วนตัว เป้าหมายไม่ใช่การย้ายอำนาจของรัฐแต่เป็นการถ่ายโอนหน้าที่เหล่านี้ไปยังโดเมนส่วนตัวอย่างสมบูรณ์ - ไปยังบุคคล, สมาคมเสรี, และองค์กร การปฏิรูปเสรีนิยมที่แท้จริงต้องการการกำจัดบทบาทของรัฐบาลที่ไม่เหมาะสมออกไปทั้งหมด ไม่ใช่แค่การเปลี่ยนระดับของรัฐบาลที่ปฏิบัติหน้าที่เหล่านั้น
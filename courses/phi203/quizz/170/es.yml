question: Según la teoría económica liberal, ¿cuál es el principal mecanismo mediante el cual la libre competencia distribuye equitativamente los recursos en la sociedad?
answer: Recompensa los esfuerzos productivos de los individuos en función de sus contribuciones económicas
wrong_answers:
  - Garantiza una distribución equitativa de la riqueza entre todos los miembros de la sociedad, independientemente de su esfuerzo
  - Redistribuye los recursos de los ricos a los pobres mediante mecanismos democráticos de votación
  - Asigna recursos basándose en la planificación gubernamental y la supervisión reguladora de los mercados
explanation: |
  El capítulo explica que la libre competencia distribuye los recursos con justicia porque recompensa los esfuerzos productivos de los individuos, creando un sistema basado en el mérito en el que el éxito económico se correlaciona con la contribución productiva. Las respuestas erróneas tergiversan la teoría liberal: la distribución equitativa ignora el mérito y el esfuerzo, la redistribución democrática representa el método político en lugar del intercambio contractual, y la planificación gubernamental contradice el principio del libre mercado de que la competencia asigna naturalmente los recursos de forma eficiente.
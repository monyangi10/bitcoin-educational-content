question: 自由主義経済理論によれば、自由競争が社会の資源を公正に分配する主なメカニズムは何か？
answer: 経済的貢献に基づいて、個人の生産的な努力に報いる。
wrong_answers:
  - 努力の有無にかかわらず、社会のすべての構成員に富が平等に分配されるようにする。
  - 民主的な投票メカニズムを通じて、富裕層から貧困層へと資源を再配分する。
  - 政府の計画と市場の規制監督に基づいて資源を配分する。
explanation: |
  この章では、自由競争は個人の生産的な努力に報いるため、資源を公正に分配し、経済的成功と生産的貢献が相関する実力主義のシステムを生み出すと説明している。平等な分配はメリットと努力を無視し、民主的な再分配は契約上の交換ではなく政治的な方法を表し、政府の計画は競争が自然に資源を効率的に配分するという自由市場の原則と矛盾する。
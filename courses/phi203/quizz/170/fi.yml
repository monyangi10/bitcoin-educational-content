question: Mikä on liberaalin talousteorian mukaan ensisijainen mekanismi, jonka avulla vapaa kilpailu jakaa oikeudenmukaisesti resurssit yhteiskunnassa?
answer: Se palkitsee yksilöiden tuotantoponnistelut heidän taloudellisen panoksensa perusteella
wrong_answers:
  - Se takaa vaurauden tasapuolisen jakautumisen kaikkien yhteiskunnan jäsenten kesken ponnisteluista riippumatta
  - Se jakaa resursseja uudelleen rikkailta köyhille demokraattisten äänestysmekanismien avulla
  - Se kohdentaa resursseja hallituksen suunnittelun ja markkinoiden sääntelyn valvonnan perusteella
explanation: |
  Luvussa selitetään, että vapaa kilpailu jakaa resurssit oikeudenmukaisesti, koska se palkitsee yksilöiden tuottavia ponnisteluja ja luo ansioihin perustuvan järjestelmän, jossa taloudellinen menestys korreloi tuottavan panoksen kanssa. Väärät vastaukset antavat väärän kuvan liberaalista teoriasta: tasa-arvoinen jako jättää huomiotta ansiot ja ponnistelut, demokraattinen uudelleenjako edustaa pikemminkin poliittista menetelmää kuin sopimusperusteista vaihtoa, ja hallituksen suunnittelu on ristiriidassa vapaan markkinatalouden periaatteen kanssa, jonka mukaan kilpailu jakaa resurssit luonnollisesti tehokkaasti.
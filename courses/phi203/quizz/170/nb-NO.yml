question: Hva er ifølge liberal økonomisk teori den viktigste mekanismen for rettferdig fordeling av ressurser i samfunnet gjennom fri konkurranse?
answer: Den belønner individers produktive innsats basert på deres økonomiske bidrag
wrong_answers:
  - Den sikrer lik fordeling av velstand blant alle samfunnsmedlemmer uavhengig av innsats
  - Den omfordeler ressurser fra de rike til de fattige gjennom demokratiske avstemningsmekanismer
  - Den allokerer ressurser basert på statlig planlegging og regulatorisk overvåking av markeder
explanation: |
  Kapitlet forklarer at fri konkurranse fordeler ressurser rettferdig fordi den belønner individers produktive innsats, og skaper et merittbasert system der økonomisk suksess korrelerer med produktivt bidrag. De gale svarene gir en feilaktig fremstilling av liberal teori: Lik fordeling tar ikke hensyn til fortjeneste og innsats, demokratisk omfordeling representerer den politiske metoden snarere enn kontraktsbasert utveksling, og statlig planlegging strider mot det frie markedets prinsipp om at konkurranse naturlig fordeler ressursene effektivt.
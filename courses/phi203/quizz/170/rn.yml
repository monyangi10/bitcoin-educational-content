question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni ubuhe buryo nyamukuru uguhiganwa kw’ubwigenge bukoresha mu kugabanya ubutunzi mu kibano mu buryo bubereye?
answer: Rihemba utwigoro twiza tw'abantu ku giti cabo bishingiye ku ntererano zabo mu vy'ubutunzi .
wrong_answers:
  - Bituma ubutunzi bugabanywa ku rugero rungana mu bantu bose bo mu kibano ataco bakoze .
  - Isubira gusangira ubutunzi buva ku batunzi buja ku bakene biciye mu buryo bwo gutora mu buryo bwa demokarasi .
  - Itanga amafaranga ashingiye ku migambi ya Leta no kugenzura amasoko .
explanation: |
  Iki gice kirasigura ko uguhiganwa ku buntu gutanga ubutunzi mu buryo bubereye kubera ko guhemba utwigoro tw’abantu ku giti cabo, bikaba bituma habaho uburyo bushingiye ku bushobozi aho uguterimbere mu vy’ubutunzi gufitaniye isano n’ugutanga inyungu. Inyishu zitari zo ziserura nabi inyigisho y’ubwigenge: ugusangira kungana kwirengagiza akamaro n’inguvu, ugusubira gusangira mu buryo bwa demokarasi guserukira uburyo bwa politike aho guhanahana amasezerano, kandi igenamigambi rya Leta rivuguruza ingingo ngenderwako y’isoko ry’uburenganzira ry’uko uguhiganwa mu buryo busanzwe gutanga neza ubutunzi.
question: Selon la théorie économique libérale, quel est le principal mécanisme par lequel la libre concurrence distribue équitablement les ressources dans la société ?
answer: Il récompense les efforts productifs des individus en fonction de leurs contributions économiques
wrong_answers:
  - Il garantit une répartition égale des richesses entre tous les membres de la société, indépendamment de leurs efforts
  - Elle redistribue les ressources des riches vers les pauvres par le biais de mécanismes de vote démocratiques
  - Il alloue les ressources sur la base de la planification gouvernementale et de la surveillance réglementaire des marchés
explanation: |
  Le chapitre explique que la libre concurrence distribue les ressources de manière équitable parce qu'elle récompense les efforts productifs des individus, créant ainsi un système basé sur le mérite où le succès économique est corrélé à la contribution productive. Les mauvaises réponses représentent mal la théorie libérale : la distribution égale ignore le mérite et l'effort, la redistribution démocratique représente la méthode politique plutôt que l'échange contractuel, et la planification gouvernementale contredit le principe du marché libre selon lequel la concurrence alloue naturellement les ressources de manière efficace.
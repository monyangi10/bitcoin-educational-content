question: 根據自由經濟理論，自由競爭公正分配社會資源的主要機制是什麼？
answer: 它根據個人的經濟貢獻來獎勵個人的生產努力
wrong_answers:
  - 它確保財富在社會所有成員間平等分配，不論其努力程度如何
  - 它透過民主投票機制，將資源從富人手中重新分配給窮人
  - 它根據政府對市場的規劃和法規監督來分配資源
explanation: |
  本章說明自由競爭能公正地分配資源，因為它能獎勵個人的生產努力，創造一個以優點為基礎的制度，讓經濟成功與生產貢獻相關聯。錯誤的答案歪曲了自由主義理論：平均分配忽略了優點和努力，民主再分配代表了政治方法而非合約交換，而政府規劃則違反了自由市場原則，即競爭自然會有效率地分配資源。
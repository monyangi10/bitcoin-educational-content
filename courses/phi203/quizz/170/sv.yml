question: Vilken är enligt liberal ekonomisk teori den primära mekanismen genom vilken fri konkurrens fördelar resurserna i samhället på ett rättvist sätt?
answer: Den belönar individers produktiva ansträngningar baserat på deras ekonomiska bidrag
wrong_answers:
  - Den säkerställer lika fördelning av välstånd mellan alla samhällsmedlemmar oavsett ansträngning
  - Det omfördelar resurser från de rika till de fattiga genom demokratiska röstningsmekanismer
  - Resurserna fördelas baserat på myndigheternas planering och tillsyn av marknaderna
explanation: |
  I kapitlet förklaras att fri konkurrens fördelar resurser rättvist eftersom den belönar individers produktiva ansträngningar och skapar ett meritbaserat system där ekonomisk framgång korrelerar med produktivt bidrag. De felaktiga svaren ger en felaktig bild av liberal teori: lika fördelning bortser från förtjänst och ansträngning, demokratisk omfördelning representerar den politiska metoden snarare än avtalsbaserat utbyte, och statlig planering strider mot principen om fri marknad där konkurrens naturligt fördelar resurser effektivt.
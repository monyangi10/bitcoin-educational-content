question: Secondo la teoria economica liberale, qual è il meccanismo principale attraverso il quale la libera concorrenza distribuisce giustamente le risorse nella società?
answer: Premia gli sforzi produttivi degli individui in base ai loro contributi economici
wrong_answers:
  - Garantisce un'equa distribuzione della ricchezza tra tutti i membri della società, indipendentemente dallo sforzo
  - Ridistribuisce le risorse dai ricchi ai poveri attraverso meccanismi di voto democratici
  - Alloca le risorse sulla base della pianificazione governativa e della supervisione normativa dei mercati
explanation: |
  Il capitolo spiega che la libera concorrenza distribuisce le risorse in modo equo perché premia gli sforzi produttivi degli individui, creando un sistema basato sul merito in cui il successo economico è correlato al contributo produttivo. Le risposte sbagliate travisano la teoria liberale: la distribuzione equa ignora il merito e lo sforzo, la redistribuzione democratica rappresenta il metodo politico piuttosto che lo scambio contrattuale, e la pianificazione governativa contraddice il principio del libero mercato secondo cui la concorrenza alloca naturalmente le risorse in modo efficiente.
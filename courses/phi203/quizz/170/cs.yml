question: Jaký je podle liberální ekonomické teorie hlavní mechanismus, kterým volná soutěž spravedlivě rozděluje zdroje ve společnosti?
answer: Odměňuje produktivní úsilí jednotlivců na základě jejich ekonomického přínosu
wrong_answers:
  - Zajišťuje rovnoměrné rozdělení bohatství mezi všechny členy společnosti bez ohledu na jejich úsilí
  - Přerozděluje zdroje od bohatých k chudým prostřednictvím demokratických hlasovacích mechanismů
  - Rozděluje zdroje na základě vládního plánování a regulačního dohledu nad trhy
explanation: |
  Kapitola vysvětluje, že volná soutěž spravedlivě rozděluje zdroje, protože odměňuje produktivní úsilí jednotlivců a vytváří systém založený na zásluhách, v němž ekonomický úspěch koreluje s produktivním přínosem. Špatné odpovědi zkreslují liberální teorii: rovné rozdělování ignoruje zásluhy a úsilí, demokratické přerozdělování představuje spíše politickou metodu než smluvní směnu a vládní plánování je v rozporu s principem volného trhu, podle něhož konkurence přirozeně alokuje zdroje efektivně.
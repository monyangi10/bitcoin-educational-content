question: Prema liberalnoj ekonomskoj teoriji, koji je primarni mehanizam kroz koji slobodna konkurencija pravedno raspodeljuje resurse u društvu?
answer: Nagrađuje produktivne napore pojedinaca na osnovu njihovih ekonomskih doprinosa
wrong_answers:
  - Osigurava jednaku raspodelu bogatstva među svim članovima društva bez obzira na trud
  - Preusmerava resurse od bogatih ka siromašnima putem demokratskih mehanizama glasanja
  - Ona dodeljuje resurse na osnovu vladinog planiranja i regulatornog nadzora tržišta.
explanation: |
  Poglavlje objašnjava da slobodna konkurencija pravedno raspoređuje resurse jer nagrađuje produktivne napore pojedinaca, stvarajući sistem zasnovan na zaslugama gde ekonomski uspeh korelira sa produktivnim doprinosom. Pogrešni odgovori pogrešno predstavljaju liberalnu teoriju: jednaka raspodela ignoriše zasluge i trud, demokratska preraspodela predstavlja političku metodu umesto ugovorne razmene, a planiranje vlade je u suprotnosti sa principom slobodnog tržišta da konkurencija prirodno efikasno raspoređuje resurse.
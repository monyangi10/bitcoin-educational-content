question: Zgodnie z liberalną teorią ekonomiczną, jaki jest podstawowy mechanizm, dzięki któremu wolna konkurencja sprawiedliwie rozdziela zasoby w społeczeństwie?
answer: Nagradza produktywne wysiłki jednostek w oparciu o ich wkład ekonomiczny
wrong_answers:
  - Zapewnia równy podział bogactwa między wszystkich członków społeczeństwa, niezależnie od wysiłku
  - Redystrybuuje zasoby od bogatych do biednych poprzez demokratyczne mechanizmy głosowania
  - Przydziela zasoby w oparciu o planowanie rządowe i nadzór regulacyjny nad rynkami
explanation: |
  Rozdział wyjaśnia, że wolna konkurencja sprawiedliwie rozdziela zasoby, ponieważ nagradza produktywne wysiłki jednostek, tworząc system oparty na zasługach, w którym sukces gospodarczy koreluje z produktywnym wkładem. Błędne odpowiedzi błędnie przedstawiają teorię liberalną: równa dystrybucja ignoruje zasługi i wysiłek, demokratyczna redystrybucja reprezentuje metodę polityczną, a nie wymianę kontraktową, a planowanie rządowe jest sprzeczne z zasadą wolnego rynku, zgodnie z którą konkurencja naturalnie przydziela zasoby w sposób efektywny.
question: Według analizy Gustave'a de Molinariego, jaka główna motywacja skłania rządy do angażowania się w działania wojenne w XIX wieku?
answer: Pragnienie rozszerzenia monopolu dominacji terytorialnej, podobnie jak przemysłowiec stara się poszerzyć swoją klientelę
wrong_answers:
  - Potrzeba ochrony krajowych interesów gospodarczych i zabezpieczenia dostępu do podstawowych zasobów naturalnych dla ich ludności
  - Obowiązek obrony wartości demokratycznych i szerzenia zasad konstytucyjnych wśród uciskanych narodów na sąsiednich terytoriach
  - Wymóg utrzymania gotowości wojskowej i honorowania istniejących zobowiązań sojuszniczych z innymi suwerennymi państwami
explanation: |
  Molinari stwierdził, że wojna reprezentuje opozycję interesów rządowych dążących do rozszerzenia swojego monopolu terytorialnego, a nie prawdziwych potrzeb narodowych. Odzwierciedla to feudalną koncepcję, w której państwa postrzegają siebie jako właścicieli narodów. Pozostałe opcje reprezentują konwencjonalne uzasadnienia wojny, które maskują leżące u podstaw rządów pragnienie rozszerzenia dominacji nad większymi terytoriami i populacjami.
question: 根據 Gustave de Molinari 的分析，在 19 世紀驅使政府參與戰爭的主要動機是什麼？
answer: 擴大其壟斷領土的慾望，與工業家尋求擴大客戶群的方式類似
wrong_answers:
  - 需要保護國家經濟利益，並確保國民能取得基本的天然資源
  - 有義務捍衛民主價值，並將憲法原則傳播給鄰近領土的被壓迫人民
  - 需要維持軍事準備狀態，並履行與其他主權國的現有結盟承諾
explanation: |
  Molinari 認為，戰爭代表了政府利益的對立，它們試圖擴大其領土壟斷，而非真正的國家需求。這反映了封建的觀念，即國家將自己視為國家的所有者。其他選項代表了傳統的戰爭理由，掩蓋了政府想要擴大對更多領土和人口的統治的根本願望。
question: Jaká hlavní motivace podle analýzy Gustava de Molinariho vedla vlády v 19. století k vedení války?
answer: Touha rozšířit svůj monopol na územní nadvládu, podobně jako se průmyslník snaží rozšířit svou klientelu
wrong_answers:
  - Potřeba chránit národní ekonomické zájmy a zajistit přístup k základním přírodním zdrojům pro své obyvatele
  - Povinnost bránit demokratické hodnoty a šířit ústavní principy mezi utlačovanými národy na sousedních územích
  - Požadavek udržovat vojenskou připravenost a dodržovat stávající alianční závazky s ostatními suverénními státy
explanation: |
  Molinari zjistil, že válka představuje opozici vládních zájmů, které se snaží rozšířit svůj územní monopol, nikoli skutečné národní potřeby. To odráží feudální pojetí, kdy se státy považují za vlastníky národů. Ostatní možnosti představují konvenční ospravedlnění války, která zakrývají základní vládní touhu po rozšíření nadvlády nad větším územím a populací.
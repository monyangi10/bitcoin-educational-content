question: 구스타브 드 몰리나리의 분석에 따르면 19세기에 정부가 전쟁에 참여하게 된 주요 동기는 무엇일까요?
answer: 산업가가 고객을 확대하려는 것과 유사하게 영토 지배의 독점권을 확장하려는 욕구입니다
wrong_answers:
  - 국가의 경제적 이익을 보호하고 자국민을 위한 필수 천연 자원에 대한 접근성을 확보해야 할 필요성
  - 민주주의 가치를 수호하고 이웃 영토의 억압받는 사람들에게 헌법 원칙을 전파할 의무
  - 군사적 준비태세를 유지하고 다른 주권 국가와의 기존 동맹 약속을 존중해야 한다는 요구 사항
explanation: |
  몰리나리는 전쟁은 진정한 국가적 필요가 아니라 영토 독점을 확대하려는 정부의 이해관계에 대한 반대를 의미한다고 밝혔습니다. 이는 국가가 스스로를 국가의 주인으로 여기는 봉건적 개념을 반영합니다. 다른 옵션은 더 넓은 영토와 인구에 대한 지배권을 확대하려는 정부의 근본적인 욕구를 가리는 전쟁에 대한 전통적인 정당성을 나타냅니다.
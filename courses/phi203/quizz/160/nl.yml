question: Wat is volgens Gustave de Molinari's analyse de belangrijkste drijfveer van regeringen om oorlog te voeren in de 19e eeuw?
answer: Het verlangen om hun monopolie van territoriale overheersing uit te breiden, vergelijkbaar met hoe een industrieel zijn klantenkring probeert uit te breiden
wrong_answers:
  - De noodzaak om nationale economische belangen te beschermen en de toegang tot essentiële natuurlijke hulpbronnen voor hun bevolking veilig te stellen
  - De verplichting om democratische waarden te verdedigen en grondwettelijke beginselen te verspreiden onder onderdrukte volkeren in naburige gebieden
  - De eis om militaire paraatheid te handhaven en bestaande alliantieverplichtingen met andere soevereine naties na te komen
explanation: |
  Molinari stelde vast dat oorlog staat voor de oppositie van overheidsbelangen die hun territoriale monopolie willen uitbreiden, en niet voor echte nationale behoeften. Dit weerspiegelt een feodale opvatting waarin staten zichzelf zien als eigenaars van naties. De andere opties vertegenwoordigen conventionele rechtvaardigingen voor oorlog die het onderliggende verlangen van regeringen maskeren om hun overheersing over grotere gebieden en bevolkingen uit te breiden.
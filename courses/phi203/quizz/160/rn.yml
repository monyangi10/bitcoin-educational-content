question: Dukurikije ivyo Gustave de Molinari yasuzumye, ni igiki nyamukuru catuma intwaro zigira uruhara mu ntambara mu kinjana ca 19?
answer: Icipfuzo co kwagura ububasha bwabo bwo kuganza intara, nk’uko umunyabuhinga arondera kwagura abaguzi biwe .
wrong_answers:
  - Ivyerekeye gukingira inyungu z'ubutunzi bw'igihugu no gutuma abanyagihugu bashobora kuronka ubutunzi bw'ingenzi
  - Inshingano yo kurwanira ingingo ngenderwako za demokarasi no gukwiragiza ingingo ngenderwako z'itegeko nshinga ku bihugu bihahazwa mu bihugu bihegereye .
  - Igisabwa kugira ngo umuntu agume yiteguriye igisirikare no kwubahiriza amasezerano yariho n’ibindi bihugu vyigenga .
explanation: |
  Molinari yerekanye ko intambara igereranya ukurwanya inyungu za Leta zirondera kwagura ububasha bwazo bwo gufata intara, atari ivya nkenerwa vy’ukuri vy’igihugu. Ivyo vyerekana iciyumviro c’ubufeodalisme aho ibihugu vyibona ko ari vyo bifise amahanga. Ayandi mahitamwo agereranya imvo zisanzwe z’intambara zipfuka icipfuzo ca Leta co kwagura ubukuru ku turere tunini n’abantu.
question: Gustave de Molinari analüüsi kohaselt, milline peamine motivatsioon ajendas valitsusi 19. sajandil sõdima?
answer: Soov laiendada oma territoriaalset monopoli, sarnaselt sellega, kuidas tööstur püüab laiendada oma kliendibaasi
wrong_answers:
  - Vajadus kaitsta riiklikke majandushuve ja kindlustada oma elanikkonna juurdepääs olulistele loodusvaradele
  - Kohustus kaitsta demokraatlikke väärtusi ja levitada põhiseaduslikke põhimõtteid naaberpiirkondade rõhutud rahvastele
  - Nõue säilitada sõjaline valmisolek ja täita olemasolevaid liitlaskohustusi teiste suveräänsete riikide ees
explanation: |
  Molinari tuvastas, et sõda esindab valitsuse huvide vastandumist, mis püüab laiendada oma territoriaalset monopoli, mitte tõelisi riiklikke vajadusi. See peegeldab feodaalset kontseptsiooni, kus riigid näevad end rahvaste omanikena. Teised valikud esindavad sõja tavapäraseid õigustusi, mis varjavad valitsuste taga olevat soovi laiendada oma valitsemist ulatuslikumate territooriumide ja elanikkonna üle.
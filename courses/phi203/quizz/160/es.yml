question: Según el análisis de Gustave de Molinari, ¿qué motivación principal lleva a los gobiernos a participar en guerras durante el siglo XIX?
answer: El deseo de ampliar su monopolio de dominio territorial, de forma similar a como un industrial busca ampliar su clientela
wrong_answers:
  - La necesidad de proteger los intereses económicos nacionales y garantizar el acceso de sus poblaciones a los recursos naturales esenciales
  - La obligación de defender los valores democráticos y difundir los principios constitucionales entre los pueblos oprimidos de los territorios vecinos
  - El requisito de mantener la preparación militar y cumplir los compromisos de alianza existentes con otras naciones soberanas
explanation: |
  Molinari identificó que la guerra representa la oposición de intereses gubernamentales que buscan expandir su monopolio territorial, no las genuinas necesidades nacionales. Esto refleja una concepción feudal en la que los Estados se ven a sí mismos como propietarios de naciones. Las otras opciones representan justificaciones convencionales de la guerra que enmascaran el deseo gubernamental subyacente de ampliar el dominio sobre territorios y poblaciones más grandes.
question: Enligt kapitlet, vilken roll spelade tekniska framsteg och maskiner för att förändra sociala relationer?
answer: De ersatte råstyrka som det centrala elementet i produktionen och gjorde slut på dominans baserad på fysisk styrka
wrong_answers:
  - De ökade betydelsen av fysisk styrka och militär makt i ekonomiska aktiviteter
  - De förstärkte traditionella hierarkier genom att göra manuellt arbete mer värdefullt än intellektuella färdigheter
  - De skapade nya former av dominans baserade på tillgång till naturresurser och markägande
explanation: |
  Kapitlet förklarar att kapitalismen representerar tekniska framsteg som ersatte maskiner med råstyrka som det centrala elementet i produktionen. Denna omvandling gjorde slut på dominans baserad på fysisk makt och gynnade fredliga utbytesrelationer. När produktiviteten var mer beroende av intelligens än muskelstyrka förlorade de traditionella maktförhållandena sitt berättigande. Detta förbättrade särskilt kvinnornas villkor, eftersom sofistikerade maskiner krävde mindre kraft och mer intellekt, vilket möjliggjorde självägande för alla oavsett fysisk styrka.
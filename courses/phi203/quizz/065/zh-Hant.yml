question: 根據本章所述，技術進步和機器在改變社會關係方面扮演了什麼角色？
answer: 它們取代了蠻力成為生產的核心要素，結束了以體力為基礎的統治。
wrong_answers:
  - 他們增加了體力和軍事力量在經濟活動中的重要性
  - 它們使體力勞動比智力技能更有價值，從而強化了傳統的等級制度。
  - 他們在取得天然資源和土地所有權的基礎上，創造了新的統治形式。
explanation: |
  本章說明資本主義代表技術進步，以機器取代野蠻力量成為生產的核心要素。這種轉變結束了以體力為基礎的統治，而傾向於和平的交換關係。當生產力更多地依賴智慧而非肌肉力量時，傳統的權力關係就失去了存在的理由。這尤其改善了婦女的處境，因為精密的機器需要更少的力量和更多的智慧，使所有人不論體力如何都能擁有自己的財產。
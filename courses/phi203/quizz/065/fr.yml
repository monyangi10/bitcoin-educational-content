question: Selon le chapitre, quel rôle le progrès technique et les machines ont-ils joué dans la transformation des relations sociales ?
answer: Ils ont remplacé la force brute comme élément central de la production, mettant fin à la domination basée sur la force physique
wrong_answers:
  - Ils ont accru l'importance de la force physique et de la puissance militaire dans les activités économiques
  - Ils ont renforcé les hiérarchies traditionnelles en valorisant le travail manuel par rapport aux compétences intellectuelles
  - Ils ont créé de nouvelles formes de domination fondées sur l'accès aux ressources naturelles et la propriété foncière
explanation: |
  Le chapitre explique que le capitalisme représente le progrès technique qui a substitué les machines à la force brute comme élément central de la production. Cette transformation a mis fin à la domination fondée sur la puissance physique et a favorisé des relations d'échange pacifiques. Lorsque la productivité dépend davantage de l'intelligence que de la force musculaire, les rapports de force traditionnels perdent leur justification. La condition des femmes s'en est trouvée particulièrement améliorée, car les machines sophistiquées nécessitaient moins de force et plus d'intelligence, ce qui permettait à chacun d'accéder à la propriété, quelle que soit sa force physique.
question: Según el capítulo, ¿qué papel desempeñaron el progreso técnico y las máquinas en la transformación de las relaciones sociales?
answer: Sustituyeron la fuerza bruta como elemento central de la producción, acabando con la dominación basada en la fuerza física
wrong_answers:
  - Aumentaron la importancia de la fuerza física y el poder militar en las actividades económicas
  - Reforzaron las jerarquías tradicionales al dar más valor al trabajo manual que a las aptitudes intelectuales
  - Crearon nuevas formas de dominación basadas en el acceso a los recursos naturales y la propiedad de la tierra
explanation: |
  El capítulo explica que el capitalismo representa el progreso técnico que sustituyó la fuerza bruta por máquinas como elemento central de la producción. Esta transformación puso fin a la dominación basada en el poder físico y favoreció las relaciones pacíficas de intercambio. Cuando la productividad dependió más de la inteligencia que de la fuerza muscular, las relaciones de poder tradicionales perdieron su justificación. Esto mejoró especialmente las condiciones de las mujeres, ya que las máquinas sofisticadas requerían menos fuerza y más intelecto, permitiendo la autopropiedad para todos independientemente de la fuerza física.
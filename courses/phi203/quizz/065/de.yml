question: Welche Rolle spielten dem Kapitel zufolge der technische Fortschritt und die Maschinen bei der Veränderung der sozialen Beziehungen?
answer: Sie ersetzten die rohe Gewalt als zentrales Element der Produktion und beendeten die auf physischer Stärke beruhende Herrschaft
wrong_answers:
  - Sie erhöhten die Bedeutung von physischer Stärke und militärischer Macht für die Wirtschaftstätigkeit
  - Sie verstärkten die traditionellen Hierarchien, indem sie die manuelle Arbeit gegenüber den intellektuellen Fähigkeiten aufwerteten
  - Sie schufen neue Formen der Herrschaft, die auf dem Zugang zu natürlichen Ressourcen und Landbesitz beruhten
explanation: |
  In diesem Kapitel wird erläutert, dass der Kapitalismus für den technischen Fortschritt steht, der Maschinen an die Stelle der rohen Gewalt als zentrales Element der Produktion setzte. Dieser Wandel beendete die auf physischer Kraft beruhende Herrschaft und begünstigte friedliche Austauschbeziehungen. Als die Produktivität mehr von Intelligenz als von Muskelkraft abhing, verloren die traditionellen Machtverhältnisse ihre Berechtigung. Dadurch verbesserten sich vor allem die Bedingungen für Frauen, da hochentwickelte Maschinen weniger Kraft und mehr Intellekt erforderten, was allen Menschen unabhängig von ihrer körperlichen Stärke die Möglichkeit zum Selbsteigentum gab.
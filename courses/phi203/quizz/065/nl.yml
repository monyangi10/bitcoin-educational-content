question: Welke rol speelden technische vooruitgang en machines volgens het hoofdstuk in het veranderen van sociale relaties?
answer: Ze vervingen brute kracht als het centrale element van productie en maakten een einde aan overheersing op basis van fysieke kracht
wrong_answers:
  - Ze vergrootten het belang van fysieke kracht en militaire macht in economische activiteiten
  - Ze versterkten traditionele hiërarchieën door handenarbeid waardevoller te maken dan intellectuele vaardigheden
  - Ze creëerden nieuwe vormen van overheersing gebaseerd op toegang tot natuurlijke hulpbronnen en landeigendom
explanation: |
  Het hoofdstuk legt uit dat kapitalisme staat voor technische vooruitgang die machines in de plaats stelde van brute kracht als het centrale element van productie. Deze transformatie maakte een einde aan overheersing op basis van fysieke kracht en gaf de voorkeur aan vreedzame uitwisselingsrelaties. Toen productiviteit meer afhing van intelligentie dan van spierkracht, verloren traditionele machtsverhoudingen hun rechtvaardiging. Dit verbeterde vooral de omstandigheden van vrouwen, omdat geavanceerde machines minder kracht en meer intellect vereisten, waardoor iedereen eigenaar kon worden, ongeacht fysieke kracht.
question: 根据这一章，技术进步和机器在改变社会关系方面发挥了什么作用？
answer: 它们取代蛮力成为生产的核心要素，结束了基于体力的统治
wrong_answers:
  - 他们提高了体力和军事力量在经济活动中的重要性
  - 它们强化了传统的等级制度，使体力劳动比智力技能更有价值
  - 他们在获取自然资源和土地所有权的基础上创造了新的统治形式
explanation: |
  该章解释说，资本主义代表着技术进步，它以机器取代蛮力成为生产的核心要素。这种转变结束了基于体力的统治，有利于建立和平的交换关系。当生产力更多地依赖智力而非肌肉力量时，传统的权力关系就失去了存在的理由。这尤其改善了妇女的状况，因为先进的机器对力量的要求更低，而对智力的要求更高，从而使所有人，无论体力如何，都能拥有自己的所有权。
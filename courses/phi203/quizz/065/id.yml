question: Menurut bab ini, peran apa yang dimainkan oleh kemajuan teknis dan mesin dalam mengubah hubungan sosial?
answer: Mereka menggantikan kekerasan sebagai elemen utama produksi, mengakhiri dominasi berdasarkan kekuatan fisik
wrong_answers:
  - Mereka meningkatkan pentingnya kekuatan fisik dan kekuatan militer dalam kegiatan ekonomi
  - Mereka memperkuat hierarki tradisional dengan membuat pekerjaan manual lebih berharga daripada keterampilan intelektual
  - Mereka menciptakan bentuk-bentuk dominasi baru berdasarkan akses terhadap sumber daya alam dan kepemilikan lahan
explanation: |
  Bab ini menjelaskan bahwa kapitalisme merepresentasikan kemajuan teknis yang menggantikan mesin dengan tenaga kasar sebagai elemen utama produksi. Transformasi ini mengakhiri dominasi yang didasarkan pada kekuatan fisik dan mengutamakan hubungan pertukaran yang damai. Ketika produktivitas lebih bergantung pada kecerdasan daripada kekuatan otot, hubungan kekuasaan tradisional kehilangan pembenarannya. Hal ini secara khusus memperbaiki kondisi perempuan, karena mesin-mesin canggih membutuhkan lebih sedikit tenaga dan lebih banyak kecerdasan, sehingga memungkinkan kepemilikan diri bagi semua orang tanpa memandang kekuatan fisik.
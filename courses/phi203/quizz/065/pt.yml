question: De acordo com o capítulo, que papel desempenharam o progresso técnico e as máquinas na transformação das relações sociais?
answer: Substituíram a força bruta como elemento central da produção, pondo fim à dominação baseada na força física
wrong_answers:
  - Aumentaram a importância da força física e do poder militar nas actividades económicas
  - Reforçaram as hierarquias tradicionais, tornando o trabalho manual mais valioso do que as competências intelectuais
  - Criaram novas formas de dominação baseadas no acesso aos recursos naturais e à propriedade da terra
explanation: |
  O capítulo explica que o capitalismo representa o progresso técnico que substituiu a força bruta pela máquina como elemento central da produção. Esta transformação pôs fim à dominação baseada na força física e favoreceu as relações de troca pacíficas. Quando a produtividade passou a depender mais da inteligência do que da força muscular, as relações de poder tradicionais perderam a sua justificação. Isto melhorou particularmente as condições das mulheres, uma vez que as máquinas sofisticadas exigiam menos força e mais intelecto, permitindo a auto-propriedade a todos, independentemente da força física.
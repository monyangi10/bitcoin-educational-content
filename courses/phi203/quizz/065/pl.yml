question: Jaką rolę odegrał postęp techniczny i maszyny w transformacji stosunków społecznych?
answer: Zastąpiły brutalną siłę jako centralny element produkcji, kończąc dominację opartą na sile fizycznej
wrong_answers:
  - Zwiększyły one znaczenie siły fizycznej i potęgi militarnej w działalności gospodarczej
  - Wzmacniały one tradycyjne hierarchie, czyniąc pracę fizyczną bardziej wartościową niż umiejętności intelektualne
  - Stworzyli nowe formy dominacji oparte na dostępie do zasobów naturalnych i własności ziemi
explanation: |
  Rozdział ten wyjaśnia, że kapitalizm reprezentuje postęp techniczny, który zastąpił brutalną siłę maszynami jako centralnym elementem produkcji. Transformacja ta zakończyła dominację opartą na sile fizycznej i sprzyjała pokojowym relacjom wymiany. Kiedy produktywność zależała bardziej od inteligencji niż siły mięśni, tradycyjne relacje władzy straciły swoje uzasadnienie. Szczególnie poprawiło to warunki kobiet, ponieważ wyrafinowane maszyny wymagały mniej siły, a więcej intelektu, umożliwiając wszystkim posiadanie własności bez względu na siłę fizyczną.
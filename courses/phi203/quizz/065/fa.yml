question: طبق فصل، پیشرفت‌های فنی و ماشین‌ها چه نقشی در تحول روابط اجتماعی ایفا کردند؟
answer: آن‌ها نیروی فیزیکی را به عنوان عنصر مرکزی تولید جایگزین کردند و به سلطه مبتنی بر قدرت جسمانی پایان دادند.
wrong_answers:
  - آنها اهمیت قدرت بدنی و قدرت نظامی را در فعالیت‌های اقتصادی افزایش دادند.
  - آن‌ها با ارزش‌گذاری بیشتر بر کار یدی نسبت به مهارت‌های فکری، سلسله‌مراتب سنتی را تقویت کردند.
  - آن‌ها اشکال جدیدی از سلطه را بر اساس دسترسی به منابع طبیعی و مالکیت زمین ایجاد کردند.
explanation: |
  این فصل توضیح می‌دهد که سرمایه‌داری نمایانگر پیشرفت فنی است که ماشین‌ها را به جای نیروی خام به عنوان عنصر مرکزی تولید جایگزین کرد. این تحول به سلطه مبتنی بر قدرت فیزیکی پایان داد و روابط مبادله‌ای صلح‌آمیز را ترجیح داد. زمانی که بهره‌وری بیشتر به هوش وابسته شد تا قدرت عضلانی، روابط قدرت سنتی توجیه خود را از دست دادند. این به ویژه شرایط زنان را بهبود بخشید، زیرا ماشین‌های پیشرفته به نیروی کمتری و هوش بیشتری نیاز داشتند و مالکیت خود را برای همه، بدون توجه به قدرت فیزیکی، ممکن ساختند.
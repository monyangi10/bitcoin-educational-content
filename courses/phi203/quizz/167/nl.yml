question: Hoe verandert protectionisme fundamenteel het natuurlijke proces van de verdeling van hulpbronnen in een vrije markteconomie?
answer: Het vervangt op verdienste gebaseerde verdeling door productieve inspanning met politieke herverdeling die minder productieve individuen bevoordeelt
wrong_answers:
  - Het elimineert grondstoffenschaarste door het creëren van overheidsreserves die gelijk verdeeld kunnen worden onder alle burgers
  - Het versterkt de natuurlijke concurrentie door alle marktdeelnemers gelijke startkansen te bieden via subsidies
  - Het zorgt voor een efficiëntere toewijzing van middelen doordat overheidsexperts optimale distributiepatronen kunnen bepalen
explanation: |
  Volgens het hoofdstuk verdeelt natuurlijke concurrentie in vrije markten middelen op een rechtvaardige manier door productieve inspanningen en goede economische beslissingen te belonen. Protectionisme verstoort dit op verdienste gebaseerde systeem door politieke mechanismen te gebruiken om rijkdom te herverdelen van ondernemende, productieve individuen naar diegenen die minder productief zijn of slechte economische beslissingen nemen. Dit creëert een kunstmatig systeem waarin succes wordt bepaald door politieke voorkeur in plaats van economische bijdrage, waardoor de manier waarop middelen door de samenleving stromen fundamenteel verandert.
question: Bagaimana proteksionisme secara fundamental mengubah proses alamiah distribusi sumber daya dalam ekonomi pasar bebas?
answer: Hal ini menggantikan distribusi berbasis prestasi melalui upaya produktif dengan redistribusi politik yang berpihak pada individu yang kurang produktif
wrong_answers:
  - Menghilangkan kelangkaan sumber daya dengan menciptakan cadangan pemerintah yang dapat didistribusikan secara merata di antara semua warga negara
  - Ini meningkatkan persaingan alami dengan memberikan peluang awal yang sama bagi semua peserta pasar melalui subsidi
  - Menciptakan alokasi sumber daya yang lebih efisien dengan memungkinkan para ahli pemerintah untuk menentukan pola distribusi yang optimal
explanation: |
  Menurut bab ini, persaingan alamiah di pasar bebas mendistribusikan sumber daya secara adil dengan memberikan penghargaan atas upaya-upaya produktif dan keputusan-keputusan ekonomi yang baik. Proteksionisme mengganggu sistem berbasis prestasi ini dengan menggunakan mekanisme politik untuk mendistribusikan kembali kekayaan dari individu-individu yang berjiwa wirausaha dan produktif kepada mereka yang kurang produktif atau membuat keputusan ekonomi yang buruk. Hal ini menciptakan sistem artifisial di mana keberhasilan ditentukan oleh dukungan politik daripada kontribusi ekonomi, yang pada dasarnya mengubah bagaimana sumber daya mengalir di dalam masyarakat.
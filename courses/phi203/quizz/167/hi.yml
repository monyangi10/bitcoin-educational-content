question: How does protectionism fundamentally alter the natural process of resource distribution in a free market economy?
answer: It replaces merit-based distribution through productive effort with political redistribution that favors less productive individuals
wrong_answers:
  - It eliminates resource scarcity by creating government reserves that can be distributed equally among all citizens
  - It enhances natural competition by providing equal starting opportunities for all market participants through subsidies
  - It creates more efficient resource allocation by allowing government experts to determine optimal distribution patterns
explanation: |
  According to the chapter, natural competition in free markets distributes resources justly by rewarding productive efforts and good economic decisions. Protectionism disrupts this merit-based system by using political mechanisms to redistribute wealth from entrepreneurial, productive individuals to those who are less productive or make poor economic decisions. This creates an artificial system where success is determined by political favor rather than economic contribution, fundamentally altering how resources flow through society.
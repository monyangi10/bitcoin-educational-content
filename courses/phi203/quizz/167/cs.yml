question: Jak protekcionismus zásadně mění přirozený proces rozdělování zdrojů ve volném tržním hospodářství?
answer: Nahrazuje rozdělování na základě zásluh a produktivního úsilí politickým přerozdělováním, které zvýhodňuje méně produktivní jedince
wrong_answers:
  - Odstraňuje nedostatek zdrojů tím, že vytváří vládní rezervy, které lze rovnoměrně rozdělit mezi všechny občany
  - Posiluje přirozenou hospodářskou soutěž tím, že prostřednictvím dotací poskytuje všem účastníkům trhu rovné startovní příležitosti
  - Vytváří efektivnější alokaci zdrojů tím, že umožňuje vládním expertům určit optimální distribuční modely
explanation: |
  Podle této kapitoly přirozená konkurence na volných trzích spravedlivě rozděluje zdroje tím, že odměňuje produktivní úsilí a správná ekonomická rozhodnutí. Protekcionismus narušuje tento systém založený na zásluhách tím, že využívá politických mechanismů k přerozdělování bohatství od podnikavých a produktivních jednotlivců k těm, kteří jsou méně produktivní nebo činí špatná ekonomická rozhodnutí. Vytváří se tak umělý systém, v němž o úspěchu rozhoduje politická přízeň, a nikoli ekonomický přínos, což zásadně mění způsob, jakým zdroje proudí společností.
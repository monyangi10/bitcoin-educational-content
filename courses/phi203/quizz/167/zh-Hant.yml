question: 保護主義如何從根本上改變自由市場經濟中資源分配的自然過程？
answer: 它以有利於生產力較低的個人的政治再分配，取代以生產力為基礎的績效分配。
wrong_answers:
  - 透過建立政府儲備，可平均分配給所有公民，從而消除資源稀缺的問題。
  - 它透過補貼為所有市場參與者提供平等的起步機會，從而增強自然競爭。
  - 它允許政府專家決定最佳的分配模式，從而提高資源分配的效率。
explanation: |
  本章指出，自由市場中的自然競爭透過獎勵生產力和良好的經濟決策來公正地分配資源。保護主義利用政治機制，將財富從企業家、有生產力的個人，重新分配給生產力較低或經濟決策不佳的人，破壞了這個以優點為基礎的制度。保護主義製造了一個人為的體系，在這個體系中，成功與否取決於政治優勢而非經濟貢獻，從根本上改變了資源在社會中的流動方式。
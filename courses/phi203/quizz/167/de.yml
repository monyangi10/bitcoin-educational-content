question: Wie verändert der Protektionismus den natürlichen Prozess der Ressourcenverteilung in einer freien Marktwirtschaft grundlegend?
answer: Sie ersetzt die leistungsbezogene Verteilung durch produktive Anstrengungen durch eine politische Umverteilung, die weniger produktive Personen begünstigt
wrong_answers:
  - Sie beseitigt Ressourcenknappheit durch die Schaffung staatlicher Reserven, die gleichmäßig unter allen Bürgern verteilt werden können
  - Sie stärkt den natürlichen Wettbewerb, indem sie allen Marktteilnehmern durch Subventionen gleiche Startchancen bietet
  - Es schafft eine effizientere Ressourcenzuweisung, indem es Regierungsexperten ermöglicht, optimale Verteilungsmuster zu bestimmen
explanation: |
  Dem Kapitel zufolge sorgt der natürliche Wettbewerb auf freien Märkten für eine gerechte Verteilung der Ressourcen, indem produktive Anstrengungen und gute wirtschaftliche Entscheidungen belohnt werden. Protektionismus stört dieses auf Leistung basierende System, indem er politische Mechanismen einsetzt, um den Wohlstand von unternehmerisch denkenden, produktiven Personen auf diejenigen umzuverteilen, die weniger produktiv sind oder schlechte wirtschaftliche Entscheidungen treffen. Auf diese Weise wird ein künstliches System geschaffen, in dem der Erfolg durch politische Gunst und nicht durch den wirtschaftlichen Beitrag bestimmt wird, wodurch der Ressourcenfluss in der Gesellschaft grundlegend verändert wird.
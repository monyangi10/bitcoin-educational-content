question: ¿Cómo altera fundamentalmente el proteccionismo el proceso natural de distribución de recursos en una economía de libre mercado?
answer: Sustituye la distribución basada en el mérito a través del esfuerzo productivo por una redistribución política que favorece a las personas menos productivas
wrong_answers:
  - Elimina la escasez de recursos creando reservas públicas que pueden distribuirse equitativamente entre todos los ciudadanos
  - Fomenta la competencia natural al ofrecer igualdad de oportunidades de partida a todos los participantes en el mercado mediante subvenciones
  - Crea una asignación de recursos más eficiente al permitir a los expertos gubernamentales determinar las pautas óptimas de distribución
explanation: |
  Según el capítulo, la competencia natural en los mercados libres distribuye los recursos con justicia recompensando los esfuerzos productivos y las buenas decisiones económicas. El proteccionismo altera este sistema basado en el mérito utilizando mecanismos políticos para redistribuir la riqueza de los individuos emprendedores y productivos a los que son menos productivos o toman malas decisiones económicas. Esto crea un sistema artificial en el que el éxito viene determinado por el favor político más que por la contribución económica, alterando fundamentalmente la forma en que los recursos fluyen a través de la sociedad.
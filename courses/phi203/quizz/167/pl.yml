question: W jaki sposób protekcjonizm zasadniczo zmienia naturalny proces dystrybucji zasobów w gospodarce wolnorynkowej?
answer: Zastępuje dystrybucję opartą na zasługach poprzez produktywny wysiłek polityczną redystrybucją, która faworyzuje mniej produktywne jednostki
wrong_answers:
  - Eliminuje niedobór zasobów poprzez tworzenie rezerw rządowych, które mogą być równo rozdzielane między wszystkich obywateli
  - Wzmacnia naturalną konkurencję, zapewniając równe szanse startu wszystkim uczestnikom rynku poprzez subsydia
  - Zapewnia bardziej wydajną alokację zasobów, umożliwiając ekspertom rządowym określenie optymalnych wzorców dystrybucji
explanation: |
  Zgodnie z tym rozdziałem, naturalna konkurencja na wolnych rynkach sprawiedliwie rozdziela zasoby, nagradzając produktywne wysiłki i dobre decyzje gospodarcze. Protekcjonizm zakłóca ten oparty na zasługach system, wykorzystując mechanizmy polityczne do redystrybucji bogactwa od przedsiębiorczych, produktywnych jednostek do tych, którzy są mniej produktywni lub podejmują złe decyzje gospodarcze. Tworzy to sztuczny system, w którym sukces jest określany raczej przez przychylność polityczną niż wkład ekonomiczny, zasadniczo zmieniając sposób przepływu zasobów w społeczeństwie.
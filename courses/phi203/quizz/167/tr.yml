question: Korumacılık, serbest piyasa ekonomisinde kaynak dağılımının doğal sürecini nasıl temelden değiştirir?
answer: Üretken çaba yoluyla liyakate dayalı dağıtımın yerini, daha az üretken bireyleri kayıran siyasi yeniden dağıtım alır
wrong_answers:
  - Tüm vatandaşlar arasında eşit olarak dağıtılabilecek devlet rezervleri yaratarak kaynak kıtlığını ortadan kaldırır
  - Sübvansiyonlar yoluyla tüm piyasa katılımcıları için eşit başlangıç fırsatları sağlayarak doğal rekabeti geliştirir
  - Hükümet uzmanlarının en uygun dağıtım modellerini belirlemesine izin vererek daha verimli kaynak tahsisi yaratır
explanation: |
  Bu bölüme göre, serbest piyasalardaki doğal rekabet, üretken çabaları ve iyi ekonomik kararları ödüllendirerek kaynakları adil bir şekilde dağıtır. Korumacılık, zenginliği girişimci, üretken bireylerden daha az üretken olanlara veya kötü ekonomik kararlar alanlara yeniden dağıtmak için siyasi mekanizmaları kullanarak bu liyakate dayalı sistemi bozar. Bu da başarının ekonomik katkıdan ziyade siyasi kayırmaya göre belirlendiği yapay bir sistem yaratarak kaynakların toplumda nasıl aktığını temelden değiştirir.
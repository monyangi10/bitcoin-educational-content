question: Hur förändrar protektionism i grunden den naturliga processen för resursfördelning i en fri marknadsekonomi?
answer: Den meritbaserade fördelningen genom produktiva ansträngningar ersätts med en politisk omfördelning som gynnar mindre produktiva individer
wrong_answers:
  - Det eliminerar resursknapphet genom att skapa statliga reserver som kan fördelas lika mellan alla medborgare
  - Den naturliga konkurrensen främjas genom att alla marknadsaktörer ges samma möjligheter att starta genom subventioner
  - Det skapar en mer effektiv resursfördelning genom att låta statliga experter fastställa optimala fördelningsmönster
explanation: |
  Enligt kapitlet fördelar den naturliga konkurrensen på fria marknader resurser rättvist genom att belöna produktiva ansträngningar och goda ekonomiska beslut. Protektionism stör detta meritbaserade system genom att använda politiska mekanismer för att omfördela rikedom från entreprenöriella, produktiva individer till dem som är mindre produktiva eller fattar dåliga ekonomiska beslut. Detta skapar ett artificiellt system där framgång avgörs av politisk gunst snarare än av ekonomiskt bidrag, vilket i grunden förändrar hur resurser flödar genom samhället.
question: 보호주의는 자유 시장 경제에서 자원 분배의 자연스러운 과정을 어떻게 근본적으로 변화시킬까요?
answer: 생산적 노력을 통한 성과 기반 분배를 생산성이 낮은 개인에게 유리한 정치적 재분배로 대체합니다
wrong_answers:
  - 모든 시민에게 균등하게 분배할 수 있는 정부 비축량을 생성하여 자원 부족을 해소합니다
  - 보조금을 통해 모든 시장 참여자에게 동등한 출발 기회를 제공함으로써 자연스러운 경쟁을 강화합니다
  - 정부 전문가가 최적의 배포 패턴을 결정할 수 있도록 하여 보다 효율적인 리소스 배분을 생성합니다
explanation: |
  이 장에 따르면 자유 시장의 자연스러운 경쟁은 생산적인 노력과 올바른 경제적 결정에 대한 보상을 통해 자원을 공정하게 분배합니다. 보호주의는 정치적 메커니즘을 사용하여 기업가적이고 생산적인 개인으로부터 생산성이 낮거나 잘못된 경제적 결정을 내린 사람들에게 부를 재분배함으로써 이러한 능력에 기반한 시스템을 방해합니다. 이는 경제적 기여보다는 정치적 호의에 의해 성공이 결정되는 인위적인 시스템을 만들어 자원이 사회에 흐르는 방식을 근본적으로 변화시킵니다.
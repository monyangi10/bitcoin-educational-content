question: Как протекционизмът променя из основи естествения процес на разпределение на ресурсите в една свободна пазарна икономика?
answer: Той заменя разпределението, основано на заслугите чрез производителни усилия, с политическо преразпределение, което облагодетелства по-малко производителните лица
wrong_answers:
  - Премахва недостига на ресурси, като създава държавни резерви, които могат да се разпределят поравно между всички граждани
  - Тя засилва естествената конкуренция, като осигурява равни възможности за стартиране на всички участници на пазара чрез субсидии
  - Тя създава по-ефективно разпределение на ресурсите, като позволява на правителствените експерти да определят оптималните модели на разпределение
explanation: |
  Според тази глава естествената конкуренция на свободните пазари разпределя ресурсите справедливо, като възнаграждава продуктивните усилия и добрите икономически решения. Протекционизмът нарушава тази система, основана на заслугите, като използва политически механизми за преразпределяне на богатството от предприемчиви и продуктивни хора към тези, които са по-малко продуктивни или вземат лоши икономически решения. Така се създава изкуствена система, в която успехът се определя от политическата благосклонност, а не от икономическия принос, което променя из основи начина, по който ресурсите преминават през обществото.
question: Как протекционизм в корне меняет естественный процесс распределения ресурсов в условиях свободной рыночной экономики?
answer: Он заменяет распределение по заслугам, основанное на продуктивных усилиях, политическим перераспределением, которое благоприятствует менее продуктивным людям
wrong_answers:
  - Она устраняет дефицит ресурсов, создавая государственные резервы, которые могут быть распределены поровну между всеми гражданами
  - Усиливает естественную конкуренцию, предоставляя равные стартовые возможности всем участникам рынка за счет субсидий
  - Она позволяет более эффективно распределять ресурсы, позволяя правительственным экспертам определять оптимальные схемы распределения
explanation: |
  Согласно этой главе, естественная конкуренция на свободных рынках справедливо распределяет ресурсы, вознаграждая продуктивные усилия и правильные экономические решения. Протекционизм нарушает эту систему, основанную на заслугах, используя политические механизмы для перераспределения богатства от предприимчивых и продуктивных людей к тем, кто менее продуктивен или принимает плохие экономические решения. Это создает искусственную систему, в которой успех определяется политической благосклонностью, а не экономическим вкладом, что в корне меняет порядок движения ресурсов в обществе.
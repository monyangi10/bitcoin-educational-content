question: Waarom wordt Montesquieu's definitie van vrijheid als 'het recht om alles te doen wat de wet toestaat' volgens de gepresenteerde liberale kritiek als fundamenteel gevaarlijk beschouwd?
answer: Het staat elke schending van individuele onschuldige vrijheden toe zolang een wet dergelijke schendingen toestaat
wrong_answers:
  - Er wordt geen onderscheid gemaakt tussen verschillende soorten wetten en hun verschillende mate van legitimiteit
  - Het creëert een te restrictief kader dat noodzakelijk overheidsingrijpen in markten verhindert
  - Het creëert een te breed terrein voor individuele actie die de sociale cohesie en het collectieve welzijn ondermijnt
explanation: |
  Montesquieu's definitie wordt bekritiseerd omdat het vrijheid volledig afhankelijk maakt van wettelijke toestemming, wat betekent dat elke wet - hoe onderdrukkend ook - de individuele vrijheid legitiem kan beperken. Deze opvatting erkent niet dat er een gebied van onschuldige individuele actie zou moeten zijn dat vrij blijft ongeacht wat de wet zegt. Liberale denkers als Destutt de Tracy en Benjamin Constant stelden dat echte vrijheid vereist dat er onderscheid wordt gemaakt tussen legitieme overheidsmacht en de onschendbare sfeer van individuele rechten, in plaats van vrijheid afhankelijk te maken van wettelijke toestemming.
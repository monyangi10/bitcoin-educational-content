question: Secondo la critica liberale presentata, perché la definizione di Montesquieu di libertà come "diritto di fare tutto ciò che le leggi permettono" è considerata fondamentalmente pericolosa?
answer: Permette qualsiasi violazione delle libertà individuali innocenti, purché una legge autorizzi tali violazioni
wrong_answers:
  - Non riesce a distinguere tra i diversi tipi di leggi e i loro diversi gradi di legittimità
  - Crea un quadro eccessivamente restrittivo che impedisce il necessario intervento del governo nei mercati
  - Stabilisce un campo d'azione individuale troppo ampio che mina la coesione sociale e il benessere collettivo
explanation: |
  La definizione di Montesquieu è criticata perché fa dipendere la libertà interamente dal permesso legale, il che significa che qualsiasi legge - per quanto oppressiva - può legittimamente limitare la libertà individuale. Questa concezione non riconosce che dovrebbe esistere una sfera di azione individuale innocente che rimane libera indipendentemente da ciò che le leggi potrebbero dire. Pensatori liberali come Destutt de Tracy e Benjamin Constant sostenevano che la vera libertà richiede la distinzione tra il potere legittimo del governo e la sfera inviolabile dei diritti individuali, piuttosto che far dipendere la libertà dall'autorizzazione legale.
question: Dukurikije ukunegura kw’abanyagihugu kwashikirijwe, ni kuki insobanuro ya Montesquieu y’umwidegemvyo ko ari ‘uburenganzira bwo gukora ikintu cose amategeko yemerera’ ibonwa ko ari akaga mu vy’ukuri?
answer: Iremeza ukurenga kw'umwidegemvyo w'umuntu ku giti ciwe igihe cose itegeko ryemerera ivyo kurenga .
wrong_answers:
  - Rirananirwa gutandukanya ubwoko butandukanye bw’amategeko n’ingero zitandukanye z’uko yemewe .
  - Bituma habaho uburyo burengeje urugero bwo kubuza Leta kwivanga mu masoko .
  - Bishiraho urugero rwagutse cane rw’ibikorwa vy’umuntu ku giti ciwe bihungabanya ubumwe bw’abantu n’imibereho myiza rusangi .
explanation: |
  Insobanuro ya Montesquieu iranegurwa kubera ko ituma umwidegemvyo wose uvana n’uruhusha rw’amategeko, bisobanura ko itegeko iryo ari ryo ryose - naho ryoba ryahahaza gute - rishobora guhagarika umwidegemvyo w’umuntu ku giti ciwe mu buryo bubereye. Ico ciyumviro kirananirwa kwemera ko hakwiye kubaho urugero rw’ibikorwa vy’umuntu ku giti ciwe ataco yakoze biguma vyidegemvya ataco amategeko yovuga. Abanyabwenge b’abanyagihugu nka Destutt de Tracy na Benjamin Constant bavuga ko umwidegemvyo nyawo usaba gutandukanya ububasha bwa Leta bubereye n’uburenganzira bw’umuntu ku giti ciwe butagira aho bugarukira, aho gutuma umwidegemvyo ushingiye ku kwemererwa n’amategeko.
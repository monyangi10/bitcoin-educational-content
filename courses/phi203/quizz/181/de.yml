question: Warum wird Montesquieus Definition von Freiheit als "das Recht, alles zu tun, was die Gesetze erlauben", nach der vorgestellten liberalen Kritik als grundsätzlich gefährlich angesehen?
answer: Sie erlaubt jede Verletzung der individuellen, unschuldigen Freiheitsrechte, solange ein Gesetz solche Verletzungen zulässt
wrong_answers:
  - Es wird nicht zwischen den verschiedenen Arten von Gesetzen und ihren unterschiedlichen Legitimitätsgraden unterschieden
  - Sie schafft einen übermäßig restriktiven Rahmen, der notwendige staatliche Eingriffe in die Märkte verhindert
  - Sie schafft einen zu großen Spielraum für individuelle Maßnahmen, der den sozialen Zusammenhalt und das kollektive Wohlergehen untergräbt
explanation: |
  Montesquieus Definition wird kritisiert, weil sie die Freiheit vollständig von der gesetzlichen Erlaubnis abhängig macht, was bedeutet, dass jedes Gesetz - egal wie repressiv es ist - die individuelle Freiheit rechtmäßig einschränken kann. Diese Auffassung verkennt, dass es eine Sphäre unschuldigen individuellen Handelns geben sollte, die unabhängig von Gesetzen frei bleibt. Liberale Denker wie Destutt de Tracy und Benjamin Constant vertraten die Auffassung, dass wahre Freiheit die Unterscheidung zwischen legitimer staatlicher Macht und der unantastbaren Sphäre individueller Rechte erfordert, anstatt die Freiheit von einer gesetzlichen Erlaubnis abhängig zu machen.
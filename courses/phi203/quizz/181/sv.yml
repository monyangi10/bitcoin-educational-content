question: Varför anses Montesquieus definition av frihet som "rätten att göra allt som lagarna tillåter" vara fundamentalt farlig, enligt den liberala kritik som presenteras?
answer: Det tillåter alla kränkningar av individuella oskyldiga friheter så länge som en lag tillåter sådana kränkningar
wrong_answers:
  - Den gör ingen åtskillnad mellan olika typer av lagar och deras varierande grad av legitimitet
  - Det skapar ett alltför restriktivt ramverk som förhindrar nödvändiga statliga ingripanden på marknaderna
  - Det skapar ett alltför brett utrymme för individuella åtgärder som undergräver den sociala sammanhållningen och den kollektiva välfärden
explanation: |
  Montesquieus definition kritiseras för att den gör friheten helt beroende av lagligt tillstånd, vilket innebär att varje lag - oavsett hur förtryckande den är - legitimt kan begränsa individens frihet. Denna uppfattning missar att det bör finnas en sfär av oskyldiga individuella handlingar som förblir fria oavsett vad lagar säger. Liberala tänkare som Destutt de Tracy och Benjamin Constant hävdade att sann frihet kräver att man skiljer mellan legitim regeringsmakt och den okränkbara sfären av individuella rättigheter, snarare än att göra frihet beroende av lagligt bemyndigande.
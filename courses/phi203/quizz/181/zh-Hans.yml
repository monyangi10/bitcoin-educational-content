question: 根据所提出的自由主义批评，为什么孟德斯鸠将自由定义为 "做法律所允许的一切事情的权利 "会被认为具有根本危险性？
answer: 只要法律授权，它就允许任何侵犯个人天真自由的行为
wrong_answers:
  - 它没有区分不同类型的法律及其不同程度的合法性
  - 它建立了一个限制性过强的框架，阻止政府对市场进行必要的干预
  - 它确立了过于宽泛的个人行动范围，破坏了社会凝聚力和集体福利
explanation: |
  孟德斯鸠的定义之所以受到批评，是因为它使自由完全依赖于法律许可，这意味着任何法律--无论多么压制性--都可以合法地限制个人自由。这一概念没有认识到，无论法律如何规定，都应该有一个保持自由的无辜的个人行为领域。德斯特拉特-德-特雷西和本杰明-康斯坦茨等自由主义思想家认为，真正的自由需要区分合法的政府权力和不可侵犯的个人权利领域，而不是让自由取决于法律授权。
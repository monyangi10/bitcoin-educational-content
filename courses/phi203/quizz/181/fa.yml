question: بر اساس نقد لیبرالی ارائه‌شده، چرا تعریف آزادی توسط منتسکیو به عنوان «حق انجام هر کاری که قوانین اجازه می‌دهند» به‌طور اساسی خطرناک تلقی می‌شود؟
answer: این اجازه را می‌دهد که هرگونه نقض آزادی‌های فردی بی‌گناه صورت گیرد، به شرطی که قانونی چنین نقض‌هایی را مجاز بداند.
wrong_answers:
  - نمی‌تواند بین انواع مختلف قوانین و درجات مختلف مشروعیت آن‌ها تمایز قائل شود.
  - این یک چارچوب بیش از حد محدودکننده ایجاد می‌کند که مانع از مداخله ضروری دولت در بازارها می‌شود.
  - این یک دامنه بسیار گسترده‌ای از اقدام فردی را ایجاد می‌کند که انسجام اجتماعی و رفاه جمعی را تضعیف می‌کند.
explanation: |
  تعریف منتسکیو مورد انتقاد قرار می‌گیرد زیرا آزادی را کاملاً وابسته به اجازه قانونی می‌داند، به این معنا که هر قانونی - بدون توجه به اینکه چقدر سرکوبگر باشد - می‌تواند به‌طور مشروع آزادی فردی را محدود کند. این مفهوم نمی‌تواند تشخیص دهد که باید حوزه‌ای از اقدامات بی‌گناه فردی وجود داشته باشد که صرف‌نظر از آنچه قوانین ممکن است بگویند، آزاد باقی بماند. متفکران لیبرال مانند دستوت دو تراسی و بنجامین کنستانت استدلال کردند که آزادی واقعی نیازمند تمایز بین قدرت مشروع دولت و حوزه غیرقابل‌تخطی حقوق فردی است، نه اینکه آزادی را وابسته به مجوز قانونی کند.
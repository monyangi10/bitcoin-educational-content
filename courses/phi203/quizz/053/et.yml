question: Mida näitas Charles Dunoyer vabaduse arengu kohta erinevatel ajaloolistel perioodidel?
answer: See vabadus on progressiivne konstruktsioon ja me oleme tööstusühiskonnas vabamad kui varasematel ajastutel
wrong_answers:
  - See vabadus oli suurim antiikajal ja on tänapäeva tsivilisatsiooniga vähenenud
  - See vabadus on läbi ajaloo püsinud muutumatuna, sõltumata tehnoloogia arengust
  - See vabadus eksisteerib ainult primitiivsetes ühiskondades enne kaasaegsete institutsioonide korruptsiooni
explanation: |
  Charles Dunoyer näitas, et vabadus kujutab endast progressiivset konstruktsiooni läbi ajaloo. Ta näitas, et me oleme vabamad tööstusühiskondades kui feodaalühiskondades, vabamad feodalismi ajal kui iidse orjuse ajal ja vabamad orjuse ajal kui eelajaloolisel ajal. See on otseses vastuolus romantiliste arusaamadega kadunud kuldajastutest või primitiivsest vabadusest. Teised vastused peegeldavad müüte, mida liberaalsed mõtlejad süstemaatiliselt ümber lükkasid, näiteks Rousseau'i väärika metslase kontseptsiooni või ideed, et vabadus on aegade lõikes staatiline.
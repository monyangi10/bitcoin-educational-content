question: O que é que Charles Dunoyer demonstrou sobre o desenvolvimento da liberdade em diferentes períodos históricos?
answer: Que a liberdade é uma construção progressiva e que somos mais livres nas sociedades industriais do que em épocas anteriores
wrong_answers:
  - Essa liberdade era maior nos tempos antigos e diminuiu com a civilização moderna
  - Essa liberdade manteve-se constante ao longo da história, independentemente do progresso tecnológico
  - Que a liberdade só existe nas sociedades primitivas antes da corrupção das instituições modernas
explanation: |
  Charles Dunoyer demonstrou que a liberdade constitui uma construção progressiva ao longo da história. Demonstrou que somos mais livres nas sociedades industriais do que nas sociedades feudais, mais livres no feudalismo do que na escravatura antiga e mais livres na escravatura do que na pré-história. Isto contradiz diretamente as noções românticas de idades de ouro perdidas ou de liberdade primitiva. As outras respostas reflectem mitos que os pensadores liberais refutaram sistematicamente, como o conceito de nobre selvagem de Rousseau ou a ideia de que a liberdade é estática ao longo dos tempos.
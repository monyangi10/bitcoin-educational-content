question: Mitä Charles Dunoyer osoitti vapauden kehityksestä eri historiallisina aikoina?
answer: Vapaus on progressiivinen rakennelma, ja teollisuusyhteiskunnissa olemme vapaampia kuin aiempina aikakausina
wrong_answers:
  - Tämä vapaus oli suurinta antiikin aikana, ja se on vähentynyt modernin sivilisaation myötä
  - Tämä vapaus on pysynyt vakiona kautta historian teknologisesta kehityksestä riippumatta
  - Vapaus on olemassa vain alkukantaisissa yhteiskunnissa ennen nykyaikaisten instituutioiden turmeltumista
explanation: |
  Charles Dunoyer osoitti, että vapaus on historian kuluessa kehittynyt rakennelma. Hän osoitti, että olemme vapaampia teollisuusyhteiskunnissa kuin feodaalisissa yhteiskunnissa, vapaampia feodalismin aikana kuin muinaisessa orjuudessa ja vapaampia orjuuden aikana kuin esihistoriallisina aikoina. Tämä on suoraan ristiriidassa romanttisten käsitysten kanssa kadonneista kultaisista aikakausista tai primitiivisestä vapaudesta. Muut vastaukset heijastavat myyttejä, jotka liberaalit ajattelijat ovat systemaattisesti kumonneet, kuten Rousseaun jalon villin käsite tai ajatus siitä, että vapaus on staattinen eri aikakausina.
question: Co Charles Dunoyer pokazał na temat rozwoju wolności w różnych okresach historycznych?
answer: Wolność jest konstrukcją progresywną i w społeczeństwach przemysłowych jesteśmy bardziej wolni niż w poprzednich epokach
wrong_answers:
  - Ta wolność była największa w czasach starożytnych i zmniejszyła się wraz z nowoczesną cywilizacją
  - Ta wolność pozostała niezmienna przez całą historię, niezależnie od postępu technologicznego
  - Wolność istnieje tylko w prymitywnych społeczeństwach przed zepsuciem nowoczesnych instytucji
explanation: |
  Charles Dunoyer wykazał, że wolność stanowi postępującą konstrukcję na przestrzeni dziejów. Pokazał, że jesteśmy bardziej wolni w społeczeństwach przemysłowych niż w społeczeństwach feudalnych, bardziej wolni w feudalizmie niż w starożytnym niewolnictwie i bardziej wolni w niewolnictwie niż w czasach prehistorycznych. To bezpośrednio zaprzecza romantycznym wyobrażeniom o utraconych złotych wiekach lub prymitywnej wolności. Pozostałe odpowiedzi odzwierciedlają mity, które liberalni myśliciele systematycznie obalali, takie jak koncepcja szlachetnego dzikusa Rousseau lub idea, że wolność jest statyczna w różnych okresach czasu.
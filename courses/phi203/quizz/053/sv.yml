question: Vad visade Charles Dunoyer om frihetens utveckling under olika historiska perioder?
answer: Att frihet är en progressiv konstruktion och att vi är mer fria i industrisamhällen än under tidigare epoker
wrong_answers:
  - Friheten var som störst under antiken och har minskat i takt med den moderna civilisationen
  - Denna frihet har förblivit konstant genom historien oavsett tekniska framsteg
  - Att frihet endast existerar i primitiva samhällen innan moderna institutioner fördärvats
explanation: |
  Charles Dunoyer visade att frihet utgör en progressiv konstruktion genom historien. Han visade att vi är mer fria i industrisamhällen än i feodalsamhällen, mer fria under feodalismen än under det antika slaveriet och mer fria under slaveriet än under förhistorisk tid. Detta motsäger direkt romantiska föreställningar om förlorade guldåldrar eller primitiv frihet. De övriga svaren speglar myter som liberala tänkare systematiskt motbevisat, såsom Rousseaus idé om den ädle vilden eller idén att frihet är statisk över tidsperioder.
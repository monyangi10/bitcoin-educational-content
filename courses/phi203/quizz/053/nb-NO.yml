question: Hva viste Charles Dunoyer om frihetens utvikling i ulike historiske perioder?
answer: At frihet er en progressiv konstruksjon, og at vi er mer frie i industrisamfunnene enn i tidligere epoker
wrong_answers:
  - At friheten var størst i antikken og har avtatt med den moderne sivilisasjonen
  - Denne friheten har vært konstant gjennom historien, uavhengig av teknologiske fremskritt
  - At frihet bare eksisterer i primitive samfunn før moderne institusjoner forderves
explanation: |
  Charles Dunoyer påviste at frihet er en progressiv konstruksjon gjennom historien. Han viste at vi er mer frie i industrisamfunn enn i føydalsamfunn, mer frie under føydalismen enn under antikkens slaveri, og mer frie under slaveriet enn i forhistorisk tid. Dette står i direkte motsetning til romantiske forestillinger om tapte gullaldre eller primitiv frihet. De andre svarene gjenspeiler myter som liberale tenkere systematisk har tilbakevist, som Rousseaus begrep om den edle villmann eller ideen om at frihet er statisk på tvers av tidsperioder.
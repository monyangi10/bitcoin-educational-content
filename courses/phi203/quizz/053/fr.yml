question: Qu'a démontré Charles Dunoyer sur l'évolution de la liberté à travers les différentes périodes de l'histoire ?
answer: La liberté est une construction progressive et nous sommes plus libres dans les sociétés industrielles qu'aux époques précédentes
wrong_answers:
  - Cette liberté, qui était la plus grande dans l'Antiquité, a diminué avec la civilisation moderne
  - Cette liberté est restée constante tout au long de l'histoire, indépendamment des progrès technologiques
  - La liberté n'existe que dans les sociétés primitives avant la corruption des institutions modernes
explanation: |
  Charles Dunoyer a démontré que la liberté constitue une construction progressive à travers l'histoire. Il a montré que nous sommes plus libres dans les sociétés industrielles que dans les sociétés féodales, plus libres sous le féodalisme que sous l'esclavage ancien, et plus libres sous l'esclavage que dans la préhistoire. Cela contredit directement les notions romantiques d'âges d'or perdus ou de liberté primitive. Les autres réponses reflètent des mythes que les penseurs libéraux ont systématiquement réfutés, tels que le concept de noble sauvage de Rousseau ou l'idée que la liberté est statique à travers les époques.
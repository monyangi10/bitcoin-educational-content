question: Co Charles Dunoyer ukázal o vývoji svobody v různých historických obdobích?
answer: Že svoboda je progresivní konstrukce a že v průmyslových společnostech jsme svobodnější než v předchozích obdobích
wrong_answers:
  - Tato svoboda byla největší ve starověku a s moderní civilizací se zmenšila
  - Tato svoboda zůstala v historii neměnná bez ohledu na technologický pokrok
  - Svoboda existuje pouze v primitivních společnostech před zkažením moderními institucemi
explanation: |
  Charles Dunoyer ukázal, že svoboda představuje v dějinách progresivní konstrukci. Ukázal, že v průmyslových společnostech jsme svobodnější než ve společnostech feudálních, ve feudalismu svobodnější než ve starověkém otroctví a v otroctví svobodnější než v pravěku. To je v přímém rozporu s romantickými představami o ztraceném zlatém věku nebo primitivní svobodě. Ostatní odpovědi odrážejí mýty, které liberální myslitelé systematicky vyvraceli, jako je Rousseauova koncepce ušlechtilého divocha nebo představa, že svoboda je napříč časovými obdobími statická.
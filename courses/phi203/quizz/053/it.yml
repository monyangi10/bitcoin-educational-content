question: Che cosa ha dimostrato Charles Dunoyer sullo sviluppo della libertà nei diversi periodi storici?
answer: Che la libertà è una costruzione progressiva e che siamo più liberi nelle società industriali che nelle epoche precedenti
wrong_answers:
  - La libertà era massima nell'antichità ed è diminuita con la civiltà moderna
  - La libertà è rimasta costante nel corso della storia, indipendentemente dal progresso tecnologico
  - La libertà esiste solo nelle società primitive prima della corruzione delle istituzioni moderne
explanation: |
  Charles Dunoyer ha dimostrato che la libertà costituisce una costruzione progressiva nel corso della storia. Ha dimostrato che siamo più liberi nelle società industriali che in quelle feudali, più liberi sotto il feudalesimo che sotto l'antica schiavitù e più liberi sotto la schiavitù che nella preistoria. Questo contraddice direttamente le nozioni romantiche di età dell'oro perdute o di libertà primitiva. Le altre risposte riflettono miti che i pensatori liberali hanno sistematicamente confutato, come il concetto di nobile selvaggio di Rousseau o l'idea che la libertà sia statica attraverso i periodi di tempo.
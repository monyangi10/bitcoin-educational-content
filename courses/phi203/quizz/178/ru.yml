question: Согласно представленному либеральному анализу, почему свободу прессы невозможно сохранить в условиях коллективистской экономической системы?
answer: Государство контролирует все средства производства, включая печатные станки, и решает, что будет опубликовано
wrong_answers:
  - У отдельных журналистов не будет экономических стимулов для создания качественного контента
  - Частные газеты были бы слишком дороги для граждан, чтобы покупать их по государственным ценам
  - Политические партии будут слишком интенсивно конкурировать за контроль над СМИ, что приведет к цензуре
explanation: |
  Либеральный анализ выявляет структурную невозможность: поскольку в коллективистской системе все средства производства принадлежат государству, оно обязательно контролирует типографии и издательскую инфраструктуру. Это дает государству абсолютную власть определять, что будет печататься и распространяться, делая независимую свободу прессы невозможной независимо от политических намерений. Другие варианты упускают этот фундаментальный момент, когда экономический контроль определяет политические возможности.
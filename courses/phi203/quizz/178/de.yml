question: Warum sollte nach der vorgestellten liberalen Analyse die Pressefreiheit in einem kollektivistischen Wirtschaftssystem nicht aufrechterhalten werden können?
answer: Der Staat kontrolliert alle Produktionsmittel einschließlich der Druckmaschinen und entscheidet, was veröffentlicht wird
wrong_answers:
  - Einzelne Journalisten hätten keine wirtschaftlichen Anreize, hochwertige Inhalte zu produzieren
  - Private Zeitungen wären bei staatlich kontrollierter Preisgestaltung für die Bürger zu teuer
  - Die politischen Parteien würden zu sehr um die Kontrolle der Medien konkurrieren, was zu Zensur führen würde
explanation: |
  Die liberale Analyse zeigt eine strukturelle Unmöglichkeit auf: Da der Staat in einem kollektivistischen System alle Produktionsmittel besitzt, kontrolliert er zwangsläufig die Druckmaschinen und die Verlagsinfrastruktur. Dies verleiht dem Staat die absolute Macht, zu bestimmen, was gedruckt und verbreitet wird, und macht unabhängige Pressefreiheit unabhängig von politischen Absichten unmöglich. Die anderen Optionen lassen diesen grundlegenden Punkt der wirtschaftlichen Kontrolle, die die politischen Möglichkeiten bestimmt, außer Acht.
question: Защо според представения либерален анализ свободата на печата е невъзможно да се поддържа в условията на колективистична икономическа система?
answer: Държавата контролира всички средства за производство, включително печатниците, и решава какво да се публикува
wrong_answers:
  - Отделните журналисти няма да имат икономически стимули да създават качествено съдържание
  - Частните вестници биха били твърде скъпи за закупуване от гражданите при контролирано от държавата ценообразуване
  - Политическите партии ще се конкурират твърде интензивно за контрол над медиите, което ще доведе до цензура
explanation: |
  Либералният анализ установява структурна невъзможност: тъй като в една колективистична система държавата притежава всички средства за производство, тя задължително контролира печатниците и издателската инфраструктура. Това дава на държавата абсолютна власт да определя какво да се печата и разпространява, което прави независимата свобода на печата невъзможна, независимо от политическите намерения. Другите варианти пропускат този фундаментален момент за икономическия контрол, определящ политическите възможности.
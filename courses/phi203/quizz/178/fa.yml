question: بر اساس تحلیل لیبرال ارائه شده، چرا حفظ آزادی مطبوعات در یک سیستم اقتصادی جمع‌گرایانه غیرممکن خواهد بود؟
answer: دولت تمام وسایل تولید از جمله دستگاه‌های چاپ را کنترل می‌کند و تصمیم می‌گیرد چه چیزی منتشر شود.
wrong_answers:
  - روزنامه‌نگاران فردی از انگیزه‌های اقتصادی برای تولید محتوای باکیفیت برخوردار نخواهند بود.
  - روزنامه‌های خصوصی تحت قیمت‌گذاری دولتی برای شهروندان بیش از حد گران خواهند بود.
  - احزاب سیاسی برای کنترل رسانه‌ها به شدت رقابت می‌کنند که منجر به سانسور می‌شود.
explanation: |
  تحلیل لیبرال یک عدم امکان ساختاری را شناسایی می‌کند: از آنجا که دولت در یک سیستم جمع‌گرایانه مالک تمام وسایل تولید است، به‌طور ضروری کنترل ماشین‌های چاپ و زیرساخت‌های نشر را در دست دارد. این امر به دولت قدرت مطلق می‌دهد تا تعیین کند چه چیزی چاپ و توزیع شود، و آزادی مطبوعات مستقل را بدون توجه به نیت‌های سیاسی غیرممکن می‌سازد. گزینه‌های دیگر این نکته اساسی درباره کنترل اقتصادی که امکانات سیاسی را تعیین می‌کند، نادیده می‌گیرند.
question: 根據所提出的自由主義分析，為何新聞自由在集體主義經濟體系下無法維持？
answer: 國家控制包括印刷機在內的所有生產手段，並決定出版什麼。
wrong_answers:
  - 個別記者將缺乏製作優質內容的經濟誘因
  - 在國家控制定價的情況下，民眾購買私人報紙的成本過高
  - 政黨會過度激烈地爭奪媒體控制權，導致審查制度
explanation: |
  自由主義的分析指出了一個結構性的不可能：由於在集體主義體系中，國家擁有所有的生產手段，它必然控制印刷機和出版基礎設施。這賦予了國家決定印刷和發行什麼的絕對權力，使得無論政治意圖如何，獨立的新聞自由都是不可能的。其他方案都忽略了經濟控制決定政治可能性這一基本觀點。
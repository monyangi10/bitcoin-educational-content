question: Menurut analisis liberal yang dipaparkan, mengapa kebebasan pers tidak mungkin dipertahankan di bawah sistem ekonomi kolektivis?
answer: Negara mengontrol semua alat produksi termasuk mesin cetak dan memutuskan apa yang akan diterbitkan
wrong_answers:
  - Jurnalis perorangan akan kekurangan insentif ekonomi untuk menghasilkan konten yang berkualitas
  - Koran swasta akan terlalu mahal untuk dibeli oleh masyarakat jika harganya dikendalikan oleh negara
  - Partai politik akan bersaing secara ketat untuk mengontrol media yang mengarah pada penyensoran
explanation: |
  Analisis liberal mengidentifikasi ketidakmungkinan struktural: karena negara memiliki semua alat produksi dalam sistem kolektivis, maka negara harus mengontrol mesin cetak dan infrastruktur penerbitan. Hal ini memberikan negara kekuasaan mutlak untuk menentukan apa yang akan dicetak dan didistribusikan, sehingga kebebasan pers yang independen menjadi mustahil, terlepas dari niat politiknya. Pilihan-pilihan lain melewatkan poin mendasar tentang kontrol ekonomi yang menentukan kemungkinan politik.
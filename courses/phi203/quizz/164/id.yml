question: Apa perbedaan mendasar yang membedakan sistem preventif dengan sistem represif dalam teori ekonomi liberal?
answer: Sistem preventif mengatur terlebih dahulu untuk mencegah potensi bahaya, sedangkan sistem represif hanya bertindak setelah bahaya yang sebenarnya terjadi
wrong_answers:
  - Sistem preventif berfokus pada penegakan hukum pidana, sedangkan sistem represif menangani sengketa perdata dan kontrak
  - Sistem preventif memungkinkan persaingan pasar bebas, sementara sistem represif membatasi perdagangan melalui intervensi pemerintah
  - Sistem preventif melindungi hak milik individu, sementara sistem represif mendistribusikan kembali kekayaan melalui pajak
explanation: |
  Sistem preventif membuat peraturan terlebih dahulu untuk mencegah potensi pelanggaran hak, tetapi sebenarnya dimulai dengan melanggar hak itu sendiri dengan membatasi penggunaan kebebasan yang tidak berbahaya. Sistem represif, yang disukai oleh kaum liberal, didasarkan pada tanggung jawab individu di mana orang hanya dimintai pertanggungjawaban setelah mereka benar-benar merugikan hak-hak orang lain. Perbedaan ini sangat penting karena pendekatan preventif membatasi kebebasan secara preemptif, sementara pendekatan represif mempertahankan kebebasan maksimum sampai kerusakan yang sebenarnya terjadi.
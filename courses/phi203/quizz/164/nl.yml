question: Welk fundamenteel verschil onderscheidt het preventieve systeem van het repressieve systeem in de liberale economische theorie?
answer: Het preventieve systeem reguleert vooraf om potentiële schade te voorkomen, terwijl het repressieve systeem pas optreedt nadat er daadwerkelijk schade is opgetreden
wrong_answers:
  - Het preventieve systeem richt zich op strafrechtelijke handhaving, terwijl het repressieve systeem zich bezighoudt met civiele geschillen en contracten
  - Het preventieve systeem laat vrije marktconcurrentie toe, terwijl het repressieve systeem de handel beperkt door overheidsingrijpen
  - Het preventieve systeem beschermt individuele eigendomsrechten, terwijl het repressieve systeem rijkdom herverdeelt via belastingen
explanation: |
  Het preventieve systeem creëert van tevoren regels om zogenaamd potentiële schendingen van rechten te voorkomen, maar begint eigenlijk zelf met het schenden van rechten door onschadelijk gebruik van vrijheid te beperken. Het repressieve systeem, waar liberalen de voorkeur aan geven, is gebaseerd op individuele verantwoordelijkheid waarbij mensen pas verantwoordelijk worden gehouden nadat ze daadwerkelijk andermans rechten hebben geschonden. Dit onderscheid is cruciaal omdat de preventieve aanpak vrijheid preventief beperkt, terwijl de repressieve aanpak maximale vrijheid behoudt totdat er daadwerkelijk schade optreedt.
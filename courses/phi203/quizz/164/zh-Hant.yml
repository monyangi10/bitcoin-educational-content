question: 在自由經濟理論中，預防性制度與壓制性制度有何根本差異？
answer: 預防性系統事先進行規範以防止潛在傷害，而鎮壓性系統只在實際傷害發生後才採取行動。
wrong_answers:
  - 預防系統專注於刑事執法，而壓制系統處理民事糾紛和契約
  - 預防性制度允許自由市場競爭，而壓制性制度則透過政府干預來限制貿易。
  - 預防性制度保護個人財產權，而壓制性制度則透過稅收重新分配財富
explanation: |
  預防性制度事先制定法規，據說是為了預防潛在的侵犯權利行為，但實際上卻是透過限制無害的自由使用來侵犯權利本身。自由主義者偏好的壓制性制度，則是以個人責任為基礎，人們只有在實際傷害他人權利之後，才會被追究責任。這一區別至關重要，因為預防性方法是先發制人地限制自由，而壓制性方法則是在實際損害發生之前最大限度地保留自由。
question: Koja osnovna razlika razlikuje preventivni sistem od represivnog sistema u liberalnoj ekonomskoj teoriji?
answer: Preventivni sistem reguliše unapred kako bi sprečio potencijalnu štetu, dok represivni sistem deluje tek nakon što se stvarna šteta dogodi.
wrong_answers:
  - Preventivni sistem se fokusira na sprovođenje krivičnog prava, dok se represivni sistem bavi građanskim sporovima i ugovorima.
  - Preventivni sistem omogućava slobodnu tržišnu konkurenciju, dok represivni sistem ograničava trgovinu putem državne intervencije.
  - Preventivni sistem štiti individualna vlasnička prava, dok represivni sistem preraspodeljuje bogatstvo putem oporezivanja.
explanation: |
  Preventivni sistem unapred stvara propise kako bi navodno sprečio potencijalna kršenja prava, ali zapravo počinje kršenjem prava samim ograničavanjem bezopasnih upotreba slobode. Represivni sistem, koji favorizuju liberali, zasniva se na individualnoj odgovornosti gde se ljudi smatraju odgovornima tek nakon što stvarno povrede prava drugih. Ova razlika je ključna jer preventivni pristup unapred ograničava slobodu, dok represivni pristup čuva maksimalnu slobodu sve dok ne dođe do stvarne štete.
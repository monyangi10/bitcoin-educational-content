question: Ni itandukaniro irihe ry’ishimikiro ritandukanya uburyo bwo kwirinda n’uburyo bwo gukandamiza mu vyiyumviro vy’ubutunzi vy’ubwigenge?
answer: Uburyo bwo kwirinda buratunganya imbere y’igihe kugira ngo ntihagire ikintu gishobora gutuma umuntu agira ingorane, mu gihe uburyo bwo gukandamiza bukora gusa inyuma y’aho ikintu nyaco kibaye .
wrong_answers:
  - Uburyo bwo kwirinda bwibanda ku gukurikiza amategeko agenga ivy’ubugizi bwa nabi, mu gihe uburyo bwo gukandamiza bujejwe amatati y’abanyagihugu n’amasezerano .
  - Uburyo bwo kwirinda buremesha uguhiganwa kw’isoko ry’ubuntu, mu gihe uburyo bwo gukandamiza bubuza ubudandaji biciye mu gufasha kwa Leta .
  - Uburyo bwo kwirinda burakingira uburenganzira bw’umuntu ku giti ciwe, mu gihe uburyo bwo gukandamiza busubira gusangira ubutunzi biciye mu gutanga imisoro .
explanation: |
  Uburyo bwo kwirinda burashiraho amategeko imbere y’igihe kugira ngo bivugwe ko bukingire ukurenga kw’uburenganzira, ariko mu vy’ukuri butangura no kurenga uburenganzira ubwabwo mu kubuza gukoresha umwidegemvyo ataco bimaze. Uburyo bwo gukandamiza, bushimwa n’abanyagihugu, bushingiye ku nshingano z’umuntu ku giti ciwe aho abantu babazwa gusa iyo bamaze gukomeretsa vy’ukuri uburenganzira bw’abandi. Ukwo gutandukanya ni ngirakamaro cane kuko uburyo bwo kwirinda buzibira umwidegemvyo imbere y’igihe, mu gihe uburyo bwo gukandamiza buzigama umwidegemvyo mwinshi gushika aho ivyago vy’ukuri bishitse.
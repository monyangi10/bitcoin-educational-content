question: ¿Qué diferencia fundamental distingue al sistema preventivo del sistema represivo en la teoría económica liberal?
answer: El sistema preventivo regula de antemano para evitar daños potenciales, mientras que el sistema represivo sólo actúa después de que se produzcan daños reales
wrong_answers:
  - El sistema preventivo se centra en la aplicación de la ley penal, mientras que el sistema represivo se ocupa de los litigios y contratos civiles
  - El sistema preventivo permite la libre competencia en el mercado, mientras que el sistema represivo restringe el comercio mediante la intervención gubernamental
  - El sistema preventivo protege los derechos de propiedad individual, mientras que el sistema represivo redistribuye la riqueza a través de los impuestos
explanation: |
  El sistema preventivo crea regulaciones de antemano para supuestamente prevenir posibles violaciones de los derechos, pero en realidad empieza violando los propios derechos al restringir usos inofensivos de la libertad. El sistema represivo, favorecido por los liberales, se basa en la responsabilidad individual, por la que las personas sólo rinden cuentas después de haber lesionado los derechos de los demás. Esta distinción es crucial porque el enfoque preventivo restringe la libertad de forma preventiva, mientras que el enfoque represivo preserva la máxima libertad hasta que se produce el daño real.
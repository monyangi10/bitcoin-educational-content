question: Que diferença fundamental distingue o sistema preventivo do sistema repressivo na teoria económica liberal?
answer: O sistema preventivo regula antecipadamente para evitar danos potenciais, enquanto o sistema repressivo só actua após a ocorrência de danos reais
wrong_answers:
  - O sistema preventivo centra-se na aplicação do direito penal, enquanto o sistema repressivo se ocupa dos litígios civis e dos contratos
  - O sistema preventivo permite a livre concorrência no mercado, enquanto o sistema repressivo restringe o comércio através da intervenção do governo
  - O sistema preventivo protege os direitos de propriedade individuais, enquanto o sistema repressivo redistribui a riqueza através da tributação
explanation: |
  O sistema preventivo cria regulamentos de antemão para supostamente evitar potenciais violações dos direitos, mas na realidade começa por violar os próprios direitos ao restringir os usos inofensivos da liberdade. O sistema repressivo, preferido pelos liberais, baseia-se na responsabilidade individual, em que as pessoas só são responsabilizadas depois de prejudicarem efetivamente os direitos dos outros. Esta distinção é crucial porque a abordagem preventiva restringe a liberdade preventivamente, ao passo que a abordagem repressiva preserva o máximo de liberdade até que ocorram danos efectivos.
question: Welcher grundlegende Unterschied besteht zwischen dem präventiven und dem repressiven System der liberalen Wirtschaftstheorie?
answer: Das präventive System regelt im Voraus, um potenziellen Schaden zu verhindern, während das repressive System erst nach dem Eintritt eines tatsächlichen Schadens tätig wird
wrong_answers:
  - Das präventive System konzentriert sich auf die Strafverfolgung, während sich das repressive System mit zivilrechtlichen Streitigkeiten und Verträgen befasst
  - Das präventive System ermöglicht den freien Marktwettbewerb, während das repressive System den Handel durch staatliche Eingriffe einschränkt
  - Das präventive System schützt die individuellen Eigentumsrechte, während das repressive System den Reichtum durch Besteuerung umverteilt
explanation: |
  Das präventive System schafft im Vorfeld Vorschriften, um angeblich potenzielle Rechtsverletzungen zu verhindern, beginnt aber in Wirklichkeit damit, selbst Rechte zu verletzen, indem es harmlose Formen der Freiheit einschränkt. Das von den Liberalen favorisierte repressive System basiert auf der individuellen Verantwortung, wobei die Menschen erst dann zur Rechenschaft gezogen werden, wenn sie die Rechte anderer tatsächlich verletzen. Diese Unterscheidung ist von entscheidender Bedeutung, da der präventive Ansatz die Freiheit präventiv einschränkt, während der repressive Ansatz ein Höchstmaß an Freiheit bewahrt, bis der tatsächliche Schaden eintritt.
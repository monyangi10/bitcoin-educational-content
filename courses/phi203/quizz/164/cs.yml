question: Jaký zásadní rozdíl odlišuje preventivní systém od represivního systému v liberální ekonomické teorii?
answer: Preventivní systém reguluje předem, aby zabránil potenciálním škodám, zatímco represivní systém působí až poté, co ke skutečné škodě dojde
wrong_answers:
  - Preventivní systém se zaměřuje na vymáhání trestního práva, zatímco represivní systém se zabývá občanskoprávními spory a smlouvami
  - Preventivní systém umožňuje volnou tržní soutěž, zatímco represivní systém omezuje obchod prostřednictvím státních zásahů
  - Preventivní systém chrání individuální vlastnická práva, zatímco represivní systém přerozděluje bohatství prostřednictvím daní
explanation: |
  Preventivní systém předem vytváří předpisy, které mají údajně zabránit potenciálnímu porušování práv, ale ve skutečnosti sám začíná porušovat práva tím, že omezuje neškodné užívání svobody. Represivní systém, který upřednostňují liberálové, je založen na individuální odpovědnosti, kdy jsou lidé hnáni k odpovědnosti až poté, co skutečně poškodí práva ostatních. Toto rozlišení je zásadní, protože preventivní přístup omezuje svobodu preventivně, zatímco represivní přístup zachovává maximální svobodu, dokud nedojde ke skutečnému poškození.
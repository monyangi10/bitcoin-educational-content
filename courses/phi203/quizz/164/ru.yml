question: Какое фундаментальное отличие отличает превентивную систему от репрессивной в либеральной экономической теории?
answer: Превентивная система регулирует заранее, чтобы предотвратить потенциальный вред, в то время как репрессивная система действует только после фактического нанесения вреда
wrong_answers:
  - Превентивная система сосредоточена на соблюдении уголовного законодательства, в то время как репрессивная система занимается гражданскими спорами и договорами
  - Превентивная система позволяет свободно конкурировать на рынке, в то время как репрессивная система ограничивает торговлю посредством государственного вмешательства
  - Превентивная система защищает индивидуальные права собственности, в то время как репрессивная система перераспределяет богатство через налогообложение
explanation: |
  Превентивная система создает правила заранее, чтобы якобы предотвратить потенциальные нарушения прав, но на самом деле сама начинает нарушать права, ограничивая безвредное использование свободы. Репрессивная система, которой отдают предпочтение либералы, основана на индивидуальной ответственности, когда люди привлекаются к ответственности только после того, как они действительно нанесли ущерб правам других людей. Это различие крайне важно, поскольку превентивный подход ограничивает свободу заранее, в то время как репрессивный подход сохраняет максимальную свободу до тех пор, пока не будет нанесен реальный ущерб.
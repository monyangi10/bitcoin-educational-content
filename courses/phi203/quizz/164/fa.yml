question: تفاوت اساسی که سیستم پیشگیرانه را از سیستم سرکوبگر در نظریه اقتصادی لیبرال متمایز می‌کند چیست؟
answer: سیستم پیشگیرانه از قبل تنظیم می‌شود تا از آسیب‌های احتمالی جلوگیری کند، در حالی که سیستم سرکوبگر تنها پس از وقوع آسیب واقعی عمل می‌کند.
wrong_answers:
  - سیستم پیشگیرانه بر اجرای قانون کیفری تمرکز دارد، در حالی که سیستم سرکوبگر به اختلافات مدنی و قراردادها می‌پردازد.
  - سیستم پیشگیرانه رقابت بازار آزاد را امکان‌پذیر می‌سازد، در حالی که سیستم سرکوبگر از طریق مداخله دولت تجارت را محدود می‌کند.
  - سیستم پیشگیرانه از حقوق مالکیت فردی محافظت می‌کند، در حالی که سیستم سرکوبگر از طریق مالیات ثروت را بازتوزیع می‌کند.
explanation: |
  سیستم پیشگیرانه مقرراتی را از پیش ایجاد می‌کند تا به‌طور فرضی از نقض احتمالی حقوق جلوگیری کند، اما در واقع با محدود کردن استفاده‌های بی‌ضرر از آزادی، خود آغاز به نقض حقوق می‌کند. سیستم سرکوبگر، که مورد علاقه لیبرال‌هاست، بر اساس مسئولیت فردی است که در آن افراد تنها پس از اینکه واقعاً به حقوق دیگران آسیب رساندند، پاسخگو هستند. این تمایز بسیار مهم است زیرا رویکرد پیشگیرانه آزادی را به‌طور پیش‌دستانه محدود می‌کند، در حالی که رویکرد سرکوبگر حداکثر آزادی را تا زمانی که آسیب واقعی رخ دهد، حفظ می‌کند.
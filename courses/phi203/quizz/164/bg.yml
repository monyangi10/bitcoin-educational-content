question: Коя е основната разлика, която отличава превантивната от репресивната система в либералната икономическа теория?
answer: Превантивната система регулира предварително, за да предотврати потенциална вреда, докато репресивната система действа едва след като настъпи действителна вреда
wrong_answers:
  - Превантивната система се фокусира върху наказателното правоприлагане, докато репресивната система се занимава с граждански спорове и договори
  - Превантивната система позволява свободна пазарна конкуренция, докато репресивната система ограничава търговията чрез държавна намеса
  - Превантивната система защитава индивидуалните права на собственост, докато репресивната система преразпределя богатството чрез данъчно облагане
explanation: |
  Превантивната система създава предварителни разпоредби, за да предотврати потенциални нарушения на правата, но всъщност започва да нарушава самите права, като ограничава безобидните употреби на свободата. Репресивната система, предпочитана от либералите, се основава на индивидуалната отговорност, при която хората са подведени под отговорност едва след като действително накърнят правата на другите. Това разграничение е от решаващо значение, тъй като превантивният подход ограничава свободата превантивно, докато репресивният подход запазва максимална свобода, докато не настъпи действителна вреда.
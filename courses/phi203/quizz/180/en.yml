question: How does the text illustrate the loss of freedom of consumption under collectivism, and what does this reveal about the chain of lost freedoms?
answer: If the collectivist state decides strawberry production is not worth the labor, strawberries simply disappear — no contract between a willing buyer and a willing producer can override the central decision
wrong_answers:
  - The loss of freedom of consumption is illustrated by price controls that prevent luxury goods from reaching ordinary citizens, reserving them for the political class
  - Consumers lose freedom by being forced to purchase only domestically produced goods, even when foreign alternatives are cheaper or of better quality
  - The collectivist state restricts consumption freedom only for goods deemed harmful to public health, leaving all other consumer choices undisturbed
explanation: |
  The text traces a chain of lost freedoms under collectivism. There is no freedom of domicile because there is no freedom of work. There is no freedom of the press because the state owns the means of production and printing. And there is no freedom of consumption because the state decides what will be produced and in what quantities. The strawberry example makes this concrete: if the collectivist state determines that strawberry production is not worth the labor, there will simply be no strawberries to consume. In a liberal system, by contrast, a contract between a willing buyer and a willing producer — freely formed and mutually beneficial — would satisfy this demand without any need for central direction.

question: Как отношението на демократичната държава към интересите на малцинствата и бъдещите поколения противоречи на основните демократични принципи?
answer: Мнозинството систематично жертва правата на малцинствата, като същевременно налага дългове на бъдещите поколения, които не са били представени в тези решения
wrong_answers:
  - Държавата не осигурява адекватна конституционна защита, но спазва принципа на данъчно облагане с представителство
  - Интересите на малцинствата са защитени чрез съдебен контрол, но бъдещите поколения се възползват от наследените публични инвестиции
  - Избирателната система осигурява пропорционално представителство, но създава неустойчиви фискални политики за бъдещите граждани
explanation: |
  Правилният отговор идентифицира основното противоречие на демокрацията: управлението на мнозинството естествено потъпква правата на малцинствата без достатъчно конституционни ограничения и, което е изключително важно, бъдещите поколения наследяват дългове и задължения, с които никога не са се съгласявали. Това нарушава основния принцип от времето на Американската революция, че не трябва да има данъчно облагане без представителство. Неправилните отговори или изопачават защитата, с която разполагат малцинствата, или невярно внушават, че бъдещите поколения се възползват от настоящите решения, или неправилно описват как демократичните системи всъщност функционират на практика.
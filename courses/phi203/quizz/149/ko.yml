question: 민주주의 국가가 소수의 이익과 미래 세대를 어떻게 대하는 것이 민주주의의 기본 원칙과 모순되는가?
answer: 다수는 소수의 권리를 체계적으로 희생하면서 그 결정에 대표성이 없는 미래 세대에게 빚을 부과합니다
wrong_answers:
  - 국가가 적절한 헌법적 보호를 제공하지 못하지만 대표성을 가진 과세 원칙을 존중합니다
  - 소수의 이익은 사법적 검토를 통해 보호되지만 미래 세대는 공공 투자 상속을 통해 혜택을 받습니다
  - 선거 제도는 비례 대표성을 보장하지만 미래 시민을 위한 지속 불가능한 재정 정책을 만듭니다
explanation: |
  정답은 다수결이 충분한 헌법적 제약 없이 소수의 권리를 자연스럽게 짓밟고, 결정적으로 미래 세대가 동의하지 않은 부채와 의무를 상속한다는 민주주의의 핵심 모순을 지적하고 있습니다. 이는 대리인 없는 과세는 있을 수 없다는 미국 혁명의 기본 원칙을 위반하는 것입니다. 오답은 소수자에게 제공되는 보호를 잘못 표현하거나, 현재의 결정으로 미래 세대가 혜택을 받는다고 잘못 제시하거나, 민주주의 시스템이 실제로 어떻게 작동하는지를 잘못 설명합니다.
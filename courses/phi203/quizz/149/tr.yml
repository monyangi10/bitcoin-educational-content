question: Demokratik devletin azınlık çıkarlarına ve gelecek nesillere yönelik muamelesi temel demokratik ilkelerle nasıl çelişir?
answer: Çoğunluk, azınlık haklarını sistematik olarak feda ederken, bu kararlarda temsil edilmeyen gelecek nesillere borç yüklüyor
wrong_answers:
  - Devlet yeterli anayasal korumayı sağlayamamakta ancak temsil yoluyla vergilendirme ilkesine saygı göstermektedir
  - Azınlık çıkarları yargı denetimi yoluyla korunur ancak gelecek nesiller miras kalan kamu yatırımlarından yararlanır
  - Seçim sistemi nispi temsili sağlamakta ancak gelecekteki vatandaşlar için sürdürülemez mali politikalar yaratmaktadır
explanation: |
  Doğru cevap, temel demokratik çelişkiyi tanımlamaktadır: çoğunluk yönetimi, yeterli anayasal kısıtlamalar olmaksızın azınlık haklarını doğal olarak çiğnemekte ve daha da önemlisi, gelecek nesiller asla rıza göstermedikleri borç ve yükümlülükleri miras almaktadır. Bu durum, Amerikan Devrimi'nin temel ilkesi olan temsilsiz vergilendirme olmaması gerektiği ilkesini ihlal etmektedir. Yanlış cevaplar ya azınlıklara sağlanan korumaları yanlış ifade etmekte, ya gelecek nesillerin mevcut kararlardan fayda sağlayacağını yanlış bir şekilde öne sürmekte ya da demokratik sistemlerin pratikte nasıl işlediğini yanlış bir şekilde tanımlamaktadır.
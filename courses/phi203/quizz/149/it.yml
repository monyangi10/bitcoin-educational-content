question: In che modo il trattamento riservato dallo Stato democratico agli interessi delle minoranze e delle generazioni future contraddice i principi democratici fondamentali?
answer: La maggioranza sacrifica sistematicamente i diritti delle minoranze, imponendo debiti alle generazioni future che non hanno avuto alcuna rappresentanza in quelle decisioni
wrong_answers:
  - Lo Stato non fornisce adeguate protezioni costituzionali, ma rispetta il principio della tassazione con rappresentanza
  - Gli interessi delle minoranze sono protetti dal controllo giurisdizionale, ma le generazioni future beneficiano degli investimenti pubblici ereditati
  - Il sistema elettorale garantisce una rappresentanza proporzionale, ma crea politiche fiscali insostenibili per i cittadini futuri
explanation: |
  La risposta corretta identifica la principale contraddizione democratica: la regola della maggioranza calpesta naturalmente i diritti delle minoranze senza sufficienti vincoli costituzionali e, cosa fondamentale, le generazioni future ereditano debiti e obblighi a cui non hanno mai acconsentito. Ciò viola il principio fondamentale della Rivoluzione americana, secondo cui non ci dovrebbe essere tassazione senza rappresentanza. Le risposte sbagliate travisano le tutele disponibili per le minoranze, suggeriscono falsamente che le generazioni future beneficiano delle decisioni attuali o descrivono in modo errato il funzionamento pratico dei sistemi democratici.
question: Como é que o tratamento dado pelo Estado democrático aos interesses das minorias e às gerações futuras contradiz os princípios democráticos fundamentais?
answer: A maioria sacrifica sistematicamente os direitos das minorias, impondo dívidas às gerações futuras que não tiveram representação nessas decisões
wrong_answers:
  - O Estado não assegura as protecções constitucionais adequadas, mas respeita o princípio da tributação com representação
  - Os interesses das minorias são protegidos através do controlo judicial, mas as gerações futuras beneficiam dos investimentos públicos herdados
  - O sistema eleitoral garante uma representação proporcional, mas cria políticas orçamentais insustentáveis para os futuros cidadãos
explanation: |
  A resposta correta identifica a contradição democrática central: a regra da maioria espezinha naturalmente os direitos das minorias sem restrições constitucionais suficientes e, crucialmente, as gerações futuras herdam dívidas e obrigações que nunca consentiram. Este facto viola o princípio fundamental da Revolução Americana de que não deve haver tributação sem representação. As respostas erradas ou deturpam as protecções disponíveis para as minorias, sugerem falsamente que as gerações futuras beneficiam das decisões actuais ou descrevem incorretamente o modo como os sistemas democráticos funcionam na prática.
question: Как отношение демократического государства к интересам меньшинств и будущих поколений противоречит фундаментальным демократическим принципам?
answer: Большинство систематически жертвует правами меньшинства, возлагая долги на будущие поколения, которые не были представлены в этих решениях
wrong_answers:
  - Государство не обеспечивает адекватной конституционной защиты, но соблюдает принцип налогообложения по принципу представительства
  - Интересы меньшинства защищаются путем судебного пересмотра, но будущие поколения получают выгоду от унаследованных государственных инвестиций
  - Избирательная система обеспечивает пропорциональное представительство, но создает неустойчивую финансовую политику для будущих граждан
explanation: |
  Правильный ответ определяет основное противоречие демократии: правление большинства естественным образом попирает права меньшинства без достаточных конституционных ограничений, и, что особенно важно, будущие поколения наследуют долги и обязательства, на которые они никогда не давали согласия. Это нарушает основополагающий принцип Американской революции, согласно которому не должно быть налогообложения без представительства. Неправильные ответы либо неверно представляют защиту, доступную меньшинствам, либо ошибочно предполагают, что будущие поколения получают выгоду от текущих решений, либо неверно описывают, как на самом деле функционируют демократические системы на практике.
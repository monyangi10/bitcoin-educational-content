question: ¿En qué medida el trato que el Estado democrático dispensa a los intereses de las minorías y a las generaciones futuras contradice los principios democráticos fundamentales?
answer: La mayoría sacrifica sistemáticamente los derechos de las minorías mientras impone deudas a las generaciones futuras que no tuvieron representación en esas decisiones
wrong_answers:
  - El Estado no proporciona las protecciones constitucionales adecuadas pero respeta el principio de tributación con representación
  - Los intereses minoritarios se protegen mediante la revisión judicial, pero las generaciones futuras se benefician de las inversiones públicas heredadas
  - El sistema electoral garantiza la representación proporcional pero crea políticas fiscales insostenibles para los futuros ciudadanos
explanation: |
  La respuesta correcta identifica la contradicción democrática central: el gobierno de la mayoría pisotea naturalmente los derechos de las minorías sin suficientes restricciones constitucionales y, lo que es más importante, las generaciones futuras heredan deudas y obligaciones que nunca consintieron. Esto viola el principio fundamental de la Revolución Americana de que no debe haber impuestos sin representación. Las respuestas erróneas o bien tergiversan las protecciones disponibles para las minorías, o bien sugieren falsamente que las generaciones futuras se benefician de las decisiones actuales, o bien describen incorrectamente cómo funcionan en la práctica los sistemas democráticos.
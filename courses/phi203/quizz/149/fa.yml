question: چگونه رفتار دولت دموکراتیک با منافع اقلیت‌ها و نسل‌های آینده با اصول اساسی دموکراتیک در تضاد است؟
answer: اکثریت به طور سیستماتیک حقوق اقلیت‌ها را قربانی می‌کند و در عین حال بدهی‌هایی را بر نسل‌های آینده تحمیل می‌کند که در آن تصمیم‌گیری‌ها نمایندگی نداشتند.
wrong_answers:
  - دولت در ارائه حمایت‌های کافی قانون اساسی ناکام است اما به اصل مالیات با نمایندگی احترام می‌گذارد.
  - اقلیت‌ها از طریق بازبینی قضایی محافظت می‌شوند اما نسل‌های آینده از سرمایه‌گذاری‌های عمومی به ارث رسیده بهره‌مند می‌شوند.
  - سیستم انتخاباتی نمایندگی نسبی را تضمین می‌کند اما سیاست‌های مالی غیرقابل‌دوام برای شهروندان آینده ایجاد می‌کند.
explanation: |
  پاسخ صحیح تناقض اصلی دموکراتیک را شناسایی می‌کند: حکومت اکثریت به طور طبیعی حقوق اقلیت‌ها را بدون محدودیت‌های کافی قانون اساسی پایمال می‌کند و مهم‌تر از آن، نسل‌های آینده بدهی‌ها و تعهداتی را به ارث می‌برند که هرگز به آن‌ها رضایت نداده‌اند. این امر اصل اساسی انقلاب آمریکا را نقض می‌کند که نباید بدون نمایندگی مالیات وضع شود. پاسخ‌های نادرست یا از حمایت‌های موجود برای اقلیت‌ها سوء تعبیر می‌کنند، به اشتباه پیشنهاد می‌دهند که نسل‌های آینده از تصمیمات کنونی بهره‌مند می‌شوند، یا به طور نادرست توصیف می‌کنند که سیستم‌های دموکراتیک در عمل چگونه کار می‌کنند.
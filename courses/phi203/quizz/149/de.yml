question: Inwiefern widerspricht die Behandlung von Minderheiteninteressen und zukünftigen Generationen durch den demokratischen Staat den demokratischen Grundprinzipien?
answer: Die Mehrheit opfert systematisch die Rechte von Minderheiten und bürdet den zukünftigen Generationen, die bei diesen Entscheidungen nicht vertreten waren, Schulden auf
wrong_answers:
  - Der Staat bietet keinen angemessenen verfassungsmäßigen Schutz, respektiert aber den Grundsatz der Besteuerung mit Repräsentation
  - Minderheiteninteressen werden durch gerichtliche Überprüfung geschützt, aber künftige Generationen profitieren von geerbten öffentlichen Investitionen
  - Das Wahlsystem gewährleistet eine proportionale Vertretung, schafft aber eine unhaltbare Steuerpolitik für die zukünftigen Bürger
explanation: |
  Die richtige Antwort zeigt den Kernwiderspruch der Demokratie auf: Die Mehrheitsherrschaft zertrampelt naturgemäß die Rechte von Minderheiten ohne ausreichende verfassungsmäßige Beschränkungen, und - was besonders wichtig ist - künftige Generationen erben Schulden und Verpflichtungen, denen sie nie zugestimmt haben. Dies verstößt gegen das Grundprinzip der amerikanischen Revolution, dass es keine Besteuerung ohne Vertretung geben sollte. Die falschen Antworten stellen entweder den Schutz von Minderheiten falsch dar, suggerieren fälschlicherweise, dass künftige Generationen von aktuellen Entscheidungen profitieren, oder beschreiben nicht korrekt, wie demokratische Systeme in der Praxis tatsächlich funktionieren.
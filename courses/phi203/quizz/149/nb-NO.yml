question: Hvordan strider den demokratiske statens behandling av minoritetsinteresser og fremtidige generasjoner mot grunnleggende demokratiske prinsipper?
answer: Flertallet ofrer systematisk minoriteters rettigheter og påfører fremtidige generasjoner gjeld som ikke var representert i disse beslutningene
wrong_answers:
  - Staten gir ikke tilstrekkelig grunnlovsbeskyttelse, men respekterer prinsippet om beskatning med representasjon
  - Minoritetsinteresser beskyttes gjennom rettslig overprøving, men fremtidige generasjoner nyter godt av nedarvede offentlige investeringer
  - Valgsystemet sikrer proporsjonal representasjon, men skaper en uholdbar finanspolitikk for fremtidige borgere
explanation: |
  Det riktige svaret identifiserer den grunnleggende demokratiske selvmotsigelsen: Flertallsstyre overkjører naturlig nok mindretallets rettigheter uten tilstrekkelige konstitusjonelle begrensninger, og ikke minst arver fremtidige generasjoner gjeld og forpliktelser som de aldri har samtykket til. Dette bryter med det grunnleggende prinsippet fra den amerikanske revolusjonen om at det ikke skal være noen beskatning uten representasjon. De gale svarene gir enten en feilaktig fremstilling av beskyttelsen av minoriteter, antyder feilaktig at fremtidige generasjoner drar nytte av dagens beslutninger, eller beskriver feilaktig hvordan demokratiske systemer faktisk fungerer i praksis.
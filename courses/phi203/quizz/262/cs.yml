question: Jaká zásadní proměna charakterizuje podle analýzy historického vývoje v textu vývoj od starověkých společností k moderním svobodným společnostem?
answer: Postupné nahrazování systémů založených na autoritách vztahy založenými na smlouvách
wrong_answers:
  - Postupný přechod od individuálních vlastnických práv ke kolektivnímu vlastnictví zdrojů
  - Vývoj od decentralizované kmenové správy k centralizované státní kontrole
  - Přechod od mírových mechanismů výměny k soutěžním systémům založeným na násilí
explanation: |
  V textu se výslovně uvádí, že dějiny ukazují "pozoruhodnou tendenci k nahrazení autority smlouvou", což nám umožňuje pochopit, že socialistická a intervencionistická řešení jsou ve skutečnosti zpětně orientovaná. Tato transformace představuje jádro vývoje od donucovacích systémů k dobrovolným ujednáním. Špatné odpovědi tento historický vývoj obracejí nebo nesprávně charakterizují směr vývoje popsaný v kapitole.
question: Secondo l'analisi dello sviluppo storico del testo, quale trasformazione fondamentale caratterizza l'evoluzione dalle società antiche alle moderne società libere?
answer: La progressiva sostituzione dei sistemi basati sull'autorità con relazioni basate sul contratto
wrong_answers:
  - Il graduale passaggio dai diritti di proprietà individuali alla proprietà collettiva delle risorse
  - L'evoluzione dalla governance tribale decentralizzata al controllo statale centralizzato
  - La transizione da meccanismi di scambio pacifici a sistemi competitivi basati sulla violenza
explanation: |
  Il testo afferma esplicitamente che la storia dimostra "una notevole tendenza alla sostituzione dell'autorità con il contratto", il che ci permette di capire che le soluzioni socialiste e interventiste sono in realtà retrograde. Questa trasformazione rappresenta l'evoluzione fondamentale dai sistemi coercitivi agli accordi volontari. Le risposte sbagliate invertono questa progressione storica o descrivono in modo errato la direzione di sviluppo descritta nel capitolo.
question: Welcher grundlegende Wandel kennzeichnet nach der Analyse der historischen Entwicklung im Text die Entwicklung von antiken Gesellschaften zu modernen freien Gesellschaften?
answer: Die allmähliche Ersetzung von Autoritätssystemen durch vertragsgestützte Beziehungen
wrong_answers:
  - Der allmähliche Übergang von individuellen Eigentumsrechten zu kollektivem Eigentum an Ressourcen
  - Die Entwicklung von dezentraler Stammesführung zu zentraler staatlicher Kontrolle
  - Der Übergang von friedlichen Austauschmechanismen zu wettbewerbsorientierten, auf Gewalt basierenden Systemen
explanation: |
  Der Text stellt ausdrücklich fest, dass die Geschichte "eine bemerkenswerte Tendenz zur Ersetzung von Autorität durch Verträge" zeigt, was uns zu verstehen gibt, dass sozialistische und interventionistische Lösungen eigentlich rückwärtsgewandt sind. Dieser Wandel stellt die zentrale Entwicklung von Zwangssystemen zu freiwilligen Vereinbarungen dar. Die falschen Antworten kehren diese historische Entwicklung um oder stellen die im Kapitel beschriebene Entwicklungsrichtung falsch dar.
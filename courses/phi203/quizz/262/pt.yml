question: De acordo com a análise que o texto faz do desenvolvimento histórico, que transformação fundamental caracteriza a evolução das sociedades antigas para as sociedades livres modernas?
answer: A substituição progressiva dos sistemas baseados na autoridade por relações baseadas em contratos
wrong_answers:
  - A passagem gradual dos direitos de propriedade individuais para a propriedade colectiva dos recursos
  - A evolução da governação tribal descentralizada para o controlo estatal centralizado
  - A transição de mecanismos de intercâmbio pacíficos para sistemas competitivos baseados na violência
explanation: |
  O texto afirma explicitamente que a história demonstra "uma tendência notável para a substituição da autoridade pelo contrato", o que nos permite compreender que as soluções socialistas e intervencionistas são, de facto, retrógradas. Esta transformação representa a evolução central dos sistemas coercivos para os acordos voluntários. As respostas erradas invertem esta progressão histórica ou descaracterizam a direção do desenvolvimento descrito no capítulo.
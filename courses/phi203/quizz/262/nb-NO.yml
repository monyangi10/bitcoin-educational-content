question: Hvilken grunnleggende transformasjon kjennetegner utviklingen fra antikkens samfunn til moderne frie samfunn, ifølge tekstens analyse av den historiske utviklingen?
answer: Gradvis erstatning av autoritetsbaserte systemer med kontraktsbaserte relasjoner
wrong_answers:
  - Det gradvise skiftet fra individuell eiendomsrett til kollektivt eierskap av ressurser
  - Utviklingen fra desentralisert stammestyre til sentralisert statlig kontroll
  - Overgangen fra fredelige utvekslingsmekanismer til voldsbaserte konkurransesystemer
explanation: |
  Teksten sier eksplisitt at historien viser "en bemerkelsesverdig tendens til å erstatte autoritet med kontrakt", noe som gjør det mulig for oss å forstå at sosialistiske og intervensjonistiske løsninger faktisk er tilbakeskuende. Denne transformasjonen representerer den sentrale utviklingen fra tvangssystemer til frivillige ordninger. De gale svarene reverserer denne historiske utviklingen eller feilkarakteriserer utviklingsretningen som er beskrevet i kapittelet.
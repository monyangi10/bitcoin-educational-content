question: Tekstissä esitetyn historiallisen kehityksen analyysin mukaan mikä perustavanlaatuinen muutos leimaa kehitystä antiikin yhteiskunnista nykyaikaisiin vapaisiin yhteiskuntiin?
answer: Auktoriteettipohjaisten järjestelmien asteittainen korvaaminen sopimuksiin perustuvilla suhteilla
wrong_answers:
  - Asteittainen siirtyminen yksilön omistusoikeuksista resurssien yhteisomistukseen
  - Kehitys hajautetusta heimohallinnosta keskitettyyn valtionvalvontaan
  - Siirtyminen rauhanomaisista vaihtomekanismeista kilpailuun ja väkivaltaan perustuviin järjestelmiin
explanation: |
  Tekstissä todetaan nimenomaisesti, että historia osoittaa "huomattavaa taipumusta auktoriteetin korvaamiseen sopimuksella", minkä ansiosta voimme ymmärtää, että sosialistiset ja interventionistiset ratkaisut ovat itse asiassa taaksepäin suuntautuneita. Tämä muutos edustaa keskeistä kehitystä pakkojärjestelmistä vapaaehtoisiin järjestelyihin. Väärät vastaukset kääntävät tämän historiallisen kehityksen päinvastaiseksi tai luonnehtivat luvussa kuvattua kehityksen suuntaa väärin.
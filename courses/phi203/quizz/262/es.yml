question: Según el análisis del desarrollo histórico que se hace en el texto, ¿qué transformación fundamental caracteriza la evolución de las sociedades antiguas a las sociedades libres modernas?
answer: Sustitución progresiva de los sistemas basados en la autoridad por relaciones basadas en contratos
wrong_answers:
  - El paso gradual de los derechos de propiedad individual a la propiedad colectiva de los recursos
  - La evolución de la gobernanza tribal descentralizada al control estatal centralizado
  - La transición de mecanismos de intercambio pacíficos a sistemas competitivos basados en la violencia
explanation: |
  El texto afirma explícitamente que la historia demuestra "una notable tendencia hacia la sustitución de la autoridad por el contrato", lo que nos permite comprender que las soluciones socialistas e intervencionistas son en realidad retrógradas. Esta transformación representa el núcleo de la evolución de los sistemas coercitivos a los acuerdos voluntarios. Las respuestas erróneas invierten esta progresión histórica o caracterizan erróneamente la dirección de la evolución descrita en el capítulo.
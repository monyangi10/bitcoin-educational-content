question: Menurut analisis teks tentang perkembangan sejarah, transformasi mendasar apa yang mencirikan evolusi dari masyarakat kuno ke masyarakat modern yang bebas?
answer: Penggantian progresif sistem berbasis otoritas dengan hubungan berbasis kontrak
wrong_answers:
  - Pergeseran bertahap dari hak milik individu menjadi kepemilikan kolektif atas sumber daya
  - Evolusi dari tata kelola suku yang terdesentralisasi ke kontrol negara yang terpusat
  - Transisi dari mekanisme pertukaran damai ke sistem berbasis kekerasan yang kompetitif
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa sejarah menunjukkan 'kecenderungan yang luar biasa terhadap penggantian otoritas dengan kontrak,' yang memungkinkan kita untuk memahami bahwa solusi sosialis dan intervensionis sebenarnya melihat ke belakang. Transformasi ini mewakili evolusi inti dari sistem pemaksaan ke pengaturan sukarela. Jawaban yang salah akan membalikkan perkembangan sejarah ini atau salah menggambarkan arah perkembangan yang dijelaskan dalam bab ini.
question: ตามการวิเคราะห์ของข้อความเกี่ยวกับการพัฒนาทางประวัติศาสตร์ การเปลี่ยนแปลงพื้นฐานที่เป็นลักษณะของวิวัฒนาการจากสังคมโบราณไปสู่สังคมเสรีสมัยใหม่คืออะไร?
answer: การแทนที่ระบบที่อิงอำนาจด้วยความสัมพันธ์ที่อิงสัญญาอย่างต่อเนื่อง
wrong_answers:
  - การเปลี่ยนแปลงอย่างค่อยเป็นค่อยไปจากสิทธิในทรัพย์สินส่วนบุคคลไปสู่การเป็นเจ้าของทรัพยากรร่วมกัน
  - วิวัฒนาการจากการปกครองแบบชนเผ่าที่กระจายอำนาจไปสู่การควบคุมของรัฐที่รวมศูนย์
  - การเปลี่ยนผ่านจากกลไกการแลกเปลี่ยนอย่างสันติไปสู่ระบบที่ใช้ความรุนแรงในการแข่งขัน
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่าประวัติศาสตร์แสดงให้เห็นถึง 'แนวโน้มที่น่าทึ่งในการแทนที่อำนาจด้วยสัญญา' ซึ่งช่วยให้เราเข้าใจได้ว่าแนวทางสังคมนิยมและการแทรกแซงนั้นแท้จริงแล้วเป็นการมองย้อนกลับไป การเปลี่ยนแปลงนี้แสดงถึงการพัฒนาหลักจากระบบบังคับไปสู่การจัดการโดยสมัครใจ คำตอบที่ผิดจะย้อนกลับความก้าวหน้าทางประวัติศาสตร์นี้หรือบิดเบือนทิศทางของการพัฒนาที่อธิบายไว้ในบทนี้
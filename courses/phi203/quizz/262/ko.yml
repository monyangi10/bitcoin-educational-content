question: 이 텍스트의 역사 발전 분석에 따르면, 고대 사회에서 현대 자유 사회로의 진화를 특징짓는 근본적인 변화는 무엇입니까?
answer: 권한 기반 시스템을 계약 기반 관계로 점진적 대체
wrong_answers:
  - 개인 재산권에서 자원의 공동 소유권으로의 점진적인 전환
  - 분산된 부족 거버넌스에서 중앙 집중식 국가 통제로의 진화
  - 평화적 교환 메커니즘에서 경쟁적 폭력 기반 시스템으로의 전환
explanation: |
  이 글은 역사가 '계약에 의한 권위 대체의 놀라운 경향'을 보여준다고 명시하고 있으며, 이를 통해 사회주의와 개입주의적 해결책이 실제로는 후진적이라는 것을 이해할 수 있습니다. 이러한 변화는 강압적 시스템에서 자발적 협약으로의 핵심적인 진화를 나타냅니다. 오답은 이러한 역사적 진전을 뒤집거나 이 장에서 설명한 발전 방향을 잘못 설명한 것입니다.
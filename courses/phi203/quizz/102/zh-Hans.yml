question: 根据课文内容，亚当-斯密为什么错误地将律师、艺术家和医生归类为 "非生产性工人"？
answer: 他认为他们的产品在交付后立即消失了
wrong_answers:
  - 他认为他们对国内生产总值没有贡献
  - 他认为他们的工作纯粹是推测和理论性的
  - 他认为他们只是重新分配财富，而不是创造财富
explanation: |
  亚当-斯密的错误源于他将生产狭隘地理解为仅仅是物质的转化。他把律师、艺术家和医生归类为非生产性的，因为他认为他们的产出在交付后立即消失。然而，这种观点存在根本性的缺陷，因为它忽视了智力和非物质生产的持久价值。教师的课程不会消失，它创造的是持久的知识价值。同样，医生的治疗会带来持久的健康益处，艺术家的作品会创造文化价值。真正的生产意味着为他人创造效用和提供服务，而不论其产出是物质的还是非物质的。这种更广泛的理解承认，所有服务于人类需求的工作都是真正的生产活动。
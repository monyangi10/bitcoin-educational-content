question: Защо според текста Адам Смит неправилно е класифицирал адвокатите, художниците и лекарите като "непроизводителни работници"?
answer: Той смята, че продуктите им са изчезнали веднага след доставката им
wrong_answers:
  - Той смята, че те не допринасят за брутния вътрешен продукт
  - Той смята, че работата им е чисто спекулативна и теоретична
  - Смята, че те само преразпределят богатството, а не го създават
explanation: |
  Грешката на Адам Смит се дължи на тясното му схващане за производството като единствено материално преобразуване. Той класифицира адвокатите, художниците и лекарите като непроизводителни, защото смята, че тяхната продукция изчезва веднага след доставката. Този възглед обаче е фундаментално погрешен, защото пренебрегва трайната стойност на интелектуалното и нематериалното производство. Урокът на един учител не изчезва - той създава трайна интелектуална стойност. По подобен начин лечението на лекаря осигурява трайни ползи за здравето, а творбата на художника създава културна стойност. Истинското производство означава създаване на полезност и предоставяне на услуги на другите, независимо дали продукцията е материална или нематериална. Това по-широко разбиране признава, че всяка работа, която служи на човешките нужди, представлява истинска производствена дейност.
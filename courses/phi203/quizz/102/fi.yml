question: Miksi Adam Smith luokitteli tekstin mukaan asianajajat, taiteilijat ja lääkärit virheellisesti "tuottamattomiksi työntekijöiksi"?
answer: Hän uskoi, että heidän tuotteensa katosivat heti toimituksen jälkeen
wrong_answers:
  - Hänen mielestään ne eivät edistäneet bruttokansantuotteen kasvua
  - Hän piti heidän työtään puhtaasti spekulatiivisena ja teoreettisena
  - Hän uskoi, että ne vain jakavat vaurautta uudelleen sen sijaan, että ne loisivat sitä
explanation: |
  Adam Smithin virhe johtui hänen kapeasta käsityksestään, jonka mukaan tuotanto on vain aineellista muutosta. Hän luokitteli lakimiehet, taiteilijat ja lääkärit tuottamattomiksi, koska hän ajatteli, että heidän tuotantonsa katoaa heti toimituksen jälkeen. Tämä näkemys on kuitenkin pohjimmiltaan virheellinen, koska siinä jätetään huomiotta henkisen ja aineettoman tuotannon pysyvä arvo. Opettajan oppitunti ei katoa - se luo pysyvää henkistä arvoa. Samoin lääkärin antama hoito tuottaa pysyvää terveyshyötyä, ja taiteilijan työ luo kulttuurista arvoa. Todellinen tuotanto tarkoittaa hyötyjen luomista ja palvelujen tarjoamista muille riippumatta siitä, onko tuotos aineellinen vai aineeton. Tässä laajemmassa ymmärryksessä tunnustetaan, että kaikki ihmisen tarpeita palveleva työ on aitoa tuotannollista toimintaa.
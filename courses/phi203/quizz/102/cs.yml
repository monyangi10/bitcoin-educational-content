question: Proč Adam Smith podle textu nesprávně zařadil právníky, umělce a lékaře mezi "neproduktivní pracovníky"?
answer: Domníval se, že jejich výrobky zmizely ihned po dodání
wrong_answers:
  - Domníval se, že nepřispívají k hrubému domácímu produktu
  - Jejich práci považoval za čistě spekulativní a teoretickou
  - Domníval se, že pouze přerozdělují bohatství, místo aby ho vytvářeli
explanation: |
  Omyl Adama Smithe pramenil z jeho úzkého pojetí výroby jako pouhé materiální transformace. Právníky, umělce a lékaře označil za neproduktivní, protože se domníval, že jejich produkce mizí ihned po dodání. Tento pohled je však zásadně chybný, protože ignoruje trvalou hodnotu intelektuální a nemateriální produkce. Učitelova lekce nezmizí - vytváří trvalou intelektuální hodnotu. Podobně lékařova léčba přináší trvalý zdravotní prospěch a umělcovo dílo vytváří kulturní hodnotu. Skutečná produkce znamená vytváření užitku a poskytování služeb ostatním bez ohledu na to, zda je výstup materiální nebo nemateriální. Toto širší chápání uznává, že veškerá práce, která slouží lidským potřebám, představuje skutečnou výrobní činnost.
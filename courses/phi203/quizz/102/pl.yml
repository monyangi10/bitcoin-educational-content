question: Dlaczego Adam Smith błędnie zaklasyfikował prawników, artystów i lekarzy jako "nieproduktywnych pracowników"?
answer: Uważał, że ich produkty zniknęły natychmiast po ich dostarczeniu
wrong_answers:
  - Uważał, że nie przyczyniają się one do wzrostu produktu krajowego brutto
  - Uważał ich pracę za czysto spekulacyjną i teoretyczną
  - Uważał, że tylko redystrybuują bogactwo, zamiast je tworzyć
explanation: |
  Błąd Adama Smitha wynikał z jego wąskiej koncepcji produkcji jako jedynie materialnej transformacji. Sklasyfikował prawników, artystów i lekarzy jako nieproduktywnych, ponieważ uważał, że ich produkcja znika natychmiast po dostarczeniu. Pogląd ten jest jednak zasadniczo błędny, ponieważ ignoruje trwałą wartość produkcji intelektualnej i niematerialnej. Lekcja nauczyciela nie znika - tworzy trwałą wartość intelektualną. Podobnie, leczenie prowadzone przez lekarza zapewnia trwałe korzyści zdrowotne, a praca artysty tworzy wartość kulturową. Prawdziwa produkcja oznacza tworzenie użyteczności i świadczenie usług na rzecz innych, niezależnie od tego, czy produkt jest materialny czy niematerialny. To szersze rozumienie uznaje, że każda praca, która służy ludzkim potrzebom, stanowi prawdziwą działalność produkcyjną.
question: Согласно тексту, почему Адам Смит ошибочно отнес юристов, художников и врачей к категории "непроизводительных работников"?
answer: Он считал, что их продукция исчезает сразу после доставки
wrong_answers:
  - Он считал, что они не вносят вклад в валовой внутренний продукт
  - Он считал их работу чисто умозрительной и теоретической
  - Он считал, что они лишь перераспределяют богатство, а не создают его
explanation: |
  Ошибка Адама Смита проистекает из его узкого представления о производстве как только о материальном преобразовании. Он относил юристов, художников и врачей к категории непроизводительных, поскольку считал, что их продукция исчезает сразу после изготовления. Однако такая точка зрения в корне ошибочна, поскольку игнорирует непреходящую ценность интеллектуального и нематериального производства. Урок учителя не исчезает - он создает непреходящую интеллектуальную ценность. Точно так же лечение врача приносит долговременную пользу здоровью, а работа художника создает культурную ценность. Настоящее производство означает создание полезности и предоставление услуг другим, независимо от того, является ли результат материальным или нематериальным. Это более широкое понимание признает, что вся работа, которая служит удовлетворению человеческих потребностей, представляет собой настоящую производственную деятельность.
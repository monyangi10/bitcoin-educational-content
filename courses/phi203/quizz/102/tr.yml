question: Metne göre, Adam Smith avukatları, sanatçıları ve doktorları neden yanlış bir şekilde 'üretken olmayan işçiler' olarak sınıflandırmıştır?
answer: Ürünlerinin teslim edildikten hemen sonra ortadan kaybolduğuna inanıyordu
wrong_answers:
  - Gayri safi yurtiçi hasılaya katkıda bulunmadıklarını düşünüyordu
  - Çalışmalarının tamamen spekülatif ve teorik olduğunu düşünüyordu
  - Zenginliği yaratmak yerine sadece yeniden dağıttıklarına inanıyordu
explanation: |
  Adam Smith'in hatası, üretimi yalnızca maddi dönüşüm olarak dar bir şekilde kavramasından kaynaklanıyordu. Avukatları, sanatçıları ve doktorları üretken olmayan kişiler olarak sınıflandırmıştır çünkü bunların üretimlerinin teslimattan hemen sonra yok olduğunu düşünmüştür. Ancak bu görüş, entelektüel ve maddi olmayan üretimin kalıcı değerini göz ardı ettiği için temelden kusurludur. Bir öğretmenin dersi yok olmaz - kalıcı entelektüel değer yaratır. Benzer şekilde, bir doktorun tedavisi kalıcı sağlık faydaları sağlar ve bir sanatçının eseri kültürel değer yaratır. Gerçek üretim, çıktının maddi ya da gayri maddi olmasına bakılmaksızın, fayda yaratmak ve başkalarına hizmet sunmak anlamına gelir. Bu daha geniş anlayış, insan ihtiyaçlarına hizmet eden tüm çalışmaların gerçek üretken faaliyet teşkil ettiğini kabul eder.
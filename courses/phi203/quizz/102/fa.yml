question: بر اساس متن، چرا آدام اسمیت وکلا، هنرمندان و پزشکان را به اشتباه به عنوان 'کارگران غیرمولد' طبقه‌بندی کرد؟
answer: او معتقد بود که محصولاتشان بلافاصله پس از تحویل ناپدید می‌شوند.
wrong_answers:
  - او فکر می‌کرد که آنها به تولید ناخالص داخلی کمک نمی‌کنند
  - او کار آنها را کاملاً نظری و تئوریک می‌دانست.
  - او معتقد بود که آنها فقط ثروت را بازتوزیع می‌کنند و نه ایجاد.
explanation: |
  اشتباه آدام اسمیت ناشی از تصور محدود او از تولید به عنوان تنها دگرگونی مادی بود. او وکلا، هنرمندان و پزشکان را به عنوان غیرمولد طبقه‌بندی کرد زیرا فکر می‌کرد خروجی آن‌ها بلافاصله پس از ارائه ناپدید می‌شود. با این حال، این دیدگاه به‌طور اساسی معیوب است زیرا ارزش پایدار تولید فکری و غیرمادی را نادیده می‌گیرد. درس یک معلم ناپدید نمی‌شود - بلکه ارزش فکری پایدار ایجاد می‌کند. به‌طور مشابه، درمان یک پزشک مزایای سلامتی ماندگاری فراهم می‌کند و کار یک هنرمند ارزش فرهنگی ایجاد می‌کند. تولید واقعی به معنای ایجاد سودمندی و ارائه خدمات به دیگران است، صرف‌نظر از اینکه خروجی مادی یا غیرمادی باشد. این درک گسترده‌تر اذعان می‌کند که تمام کارهایی که نیازهای انسانی را برآورده می‌کنند، فعالیت تولیدی واقعی محسوب می‌شوند.
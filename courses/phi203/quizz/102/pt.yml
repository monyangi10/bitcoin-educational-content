question: De acordo com o texto, por que razão Adam Smith classificou incorretamente os advogados, os artistas e os médicos como "trabalhadores improdutivos"?
answer: Ele acreditava que os seus produtos desapareciam imediatamente após a entrega
wrong_answers:
  - Considerava que não contribuíam para o produto interno bruto
  - Considerava os seus trabalhos puramente especulativos e teóricos
  - Na sua opinião, estes apenas redistribuíram a riqueza em vez de a criarem
explanation: |
  O erro de Adam Smith resultava da sua conceção restrita da produção como sendo apenas a transformação material. Classificou os advogados, os artistas e os médicos como improdutivos porque pensava que a sua produção desaparecia imediatamente após a entrega. No entanto, esta visão é fundamentalmente incorrecta porque ignora o valor duradouro da produção intelectual e imaterial. A lição de um professor não desaparece - cria um valor intelectual duradouro. Do mesmo modo, o tratamento de um médico proporciona benefícios de saúde duradouros e o trabalho de um artista cria valor cultural. A verdadeira produção significa criar utilidade e prestar serviços a outros, independentemente do facto de o resultado ser material ou imaterial. Este entendimento mais amplo reconhece que todo o trabalho que serve as necessidades humanas constitui uma atividade produtiva genuína.
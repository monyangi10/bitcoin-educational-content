question: Prema tekstu, Adam Smit je pogrešno klasifikovao advokate, umetnike i lekare kao 'neproduktivne radnike' jer je verovao da oni ne stvaraju opipljive proizvode ili materijalna dobra koja bi se mogla akumulirati kao kapital. Njegova definicija produktivnosti bila je usko povezana sa fizičkom proizvodnjom i ekonomskim doprinosom kroz stvaranje robe.
answer: Verovao je da su njihovi proizvodi nestali odmah nakon isporuke.
wrong_answers:
  - Mislio je da oni ne doprinose bruto domaćem proizvodu
  - Smatrao je njihov rad isključivo spekulativnim i teorijskim.
  - Verovao je da oni samo preraspodeljuju bogatstvo umesto da ga stvaraju.
explanation: |
  Greška Adama Smitha proizašla je iz njegovog uskog shvatanja proizvodnje kao isključivo materijalne transformacije. On je advokate, umetnike i lekare klasifikovao kao neproduktivne jer je mislio da njihov učinak nestaje odmah nakon isporuke. Međutim, ovaj pogled je suštinski pogrešan jer zanemaruje trajnu vrednost intelektualne i nematerijalne proizvodnje. Lekcija učitelja ne nestaje - ona stvara trajnu intelektualnu vrednost. Slično tome, lečenje lekara pruža trajne zdravstvene koristi, a umetničko delo stvara kulturnu vrednost. Prava proizvodnja znači stvaranje korisnosti i pružanje usluga drugima, bez obzira na to da li je učinak materijalan ili nematerijalan. Ovo šire razumevanje prepoznaje da sav rad koji služi ljudskim potrebama predstavlja istinsku produktivnu aktivnost.
question: Miks liigitas Adam Smith teksti kohaselt advokaadid, kunstnikud ja arstid ebaõigesti "ebaproduktiivseteks töötajateks"?
answer: Ta uskus, et nende tooted kadusid kohe pärast tarnimist
wrong_answers:
  - Ta arvas, et nad ei panusta sisemajanduse koguprodukti
  - Ta pidas nende tööd puhtalt spekulatiivseks ja teoreetiliseks
  - Ta uskus, et nad ainult jagavad rikkust ümber, mitte ei loo seda
explanation: |
  Adam Smithi viga tulenes tema kitsast arusaamast tootmisest kui ainult materiaalsest muundamisest. Ta liigitas advokaadid, kunstnikud ja arstid ebaproduktiivseteks, sest tema arvates kadus nende toodang kohe pärast sünnitust. See seisukoht on aga põhimõtteliselt vigane, sest see jätab tähelepanuta intellektuaalse ja mittemateriaalse tootmise püsiva väärtuse. Õpetaja õppetund ei kao - see loob püsivat intellektuaalset väärtust. Samamoodi annab arsti ravi püsivat kasu tervisele ja kunstniku töö loob kultuurilist väärtust. Tõeline tootmine tähendab kasulikkuse loomist ja teenuste osutamist teistele, sõltumata sellest, kas toodang on materiaalne või immateriaalne. See laiem arusaam tunnistab, et igasugune töö, mis teenib inimvajadusi, on tõeline tootmistegevus.
question: Mitä fysiokraatit osoittivat 1700-luvun maailmanlaajuisen kaupankäynnin uusista olosuhteista?
answer: Nämä olosuhteet edellyttävät kaupallista vapautta tasapainottaa hintoja ja hankkia tavaroita edullisimmin kustannuksin
wrong_answers:
  - Nämä olosuhteet edellyttivät valtion sääntelyä paikallisten tuottajien suojelemiseksi ulkomaiselta kilpailulta
  - Nämä olosuhteet edellyttivät keskiaikaisten kiltajärjestelmien ylläpitämistä laadunvalvonnan varmistamiseksi
  - Nämä olosuhteet edellyttivät kaupan rajoittamista kansallisten voimavarojen ja vaurauden säilyttämiseksi
explanation: |
  Fysiokraatit seurasivat maailmanlaajuisen kaupankäynnin syntyä 1700-luvulla ja osoittivat, että uudet taloudelliset olosuhteet edellyttivät kaupallista vapautta. Tämä poikkesi keskiaikaisista käytännöistä, joissa paikallisilla tuottajilla (kuten pienten kaupunkien leipureilla) oli varatut markkinat ja he hallitsivat kuluttajia. Fysiokraatit osoittivat, että vapaan kaupan ansiosta markkinavoimat voisivat tasapainottaa hintoja ja antaa kuluttajille mahdollisuuden hankkia tavaroita mahdollisimman alhaisin kustannuksin, minkä vuoksi kaupallinen vapaus ei ollut vain ideologisesti toivottavaa vaan käytännössä välttämätöntä uudessa globaalissa taloudessa.
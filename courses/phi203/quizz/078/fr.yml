question: Qu'est-ce que les physiocrates ont démontré sur les nouvelles circonstances du commerce mondial du 18ᵉ siècle ?
answer: Que ces circonstances nécessitaient une liberté commerciale pour équilibrer les prix et obtenir des biens au coût le plus bas
wrong_answers:
  - Ces circonstances ont nécessité une réglementation gouvernementale pour protéger les producteurs locaux de la concurrence étrangère
  - Ces circonstances ont nécessité le maintien de systèmes de guildes médiévales pour assurer le contrôle de la qualité
  - Ces circonstances ont nécessité une restriction des échanges pour préserver les ressources et les richesses nationales
explanation: |
  Les physiocrates ont observé la naissance du commerce mondial au 18ᵉ siècle et ont démontré que ces nouvelles conditions économiques nécessitaient une liberté commerciale. Il s'agissait d'une rupture avec les pratiques médiévales où les producteurs locaux (comme les boulangers dans les petites villes) se réservaient les marchés et dominaient les consommateurs. Les physiocrates ont montré que le libre-échange permettrait aux forces du marché d'équilibrer les prix et aux consommateurs d'obtenir des biens au coût le plus bas possible, rendant la liberté commerciale non seulement idéologiquement souhaitable, mais aussi pratiquement nécessaire dans la nouvelle économie mondiale.

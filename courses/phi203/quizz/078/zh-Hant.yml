question: 對於 18 世紀全球商業的新環境，physocrates 展示了什麼？
answer: 這些情況需要商業自由來平衡價格，以最低成本取得貨品
wrong_answers:
  - 在這些情況下，政府需要制定法規來保護當地生產商免受外來競爭的影響
  - 這些情況需要維持中世紀的行會制度，以確保品質控制
  - 這些情況需要限制貿易以維護國家資源和財富
explanation: |
  理論家觀察到 18 世紀全球商業的誕生，並證明這些新的經濟條件需要商業自由。這與中世紀的做法不同，在中世紀，地方生產者（如小城鎮的麵包師）保留市場並支配消費者。理論家指出，自由貿易可以讓市場力量平衡價格，讓消費者以最低的成本取得商品，因此在新的全球經濟中，商業自由不僅是意識形態上的可取，也是實際上的必要。
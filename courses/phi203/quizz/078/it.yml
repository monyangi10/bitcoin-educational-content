question: Cosa dimostrarono i fisiocratici sulle nuove circostanze del commercio globale del XVIII secolo?
answer: Che queste circostanze richiedevano la libertà commerciale per bilanciare i prezzi e ottenere i beni al costo più basso
wrong_answers:
  - Che queste circostanze hanno richiesto una regolamentazione governativa per proteggere i produttori locali dalla concorrenza straniera
  - Queste circostanze richiedevano il mantenimento di sistemi di corporazioni medievali per garantire il controllo della qualità
  - Che queste circostanze richiedevano una restrizione del commercio per preservare le risorse e le ricchezze nazionali
explanation: |
  I fisiocratici osservarono la nascita del commercio globale nel XVIII secolo e dimostrarono che queste nuove condizioni economiche richiedevano la libertà commerciale. Si trattava di una svolta rispetto alle pratiche medievali, in cui i produttori locali (come i fornai delle piccole città) si erano riservati i mercati e dominavano i consumatori. I fisiocratici dimostrarono che il libero scambio avrebbe permesso alle forze di mercato di bilanciare i prezzi e ai consumatori di ottenere i beni al costo più basso possibile, rendendo la libertà commerciale non solo ideologicamente desiderabile ma praticamente necessaria nella nuova economia globale.
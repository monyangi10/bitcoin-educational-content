question: นักสรีรศาสตร์แสดงให้เห็นถึงสถานการณ์ใหม่ของการค้าระหว่างประเทศในศตวรรษที่ 18 อย่างไร?
answer: สถานการณ์เหล่านี้ต้องการเสรีภาพทางการค้าเพื่อปรับสมดุลราคาและจัดหาสินค้าในราคาต่ำที่สุด
wrong_answers:
  - ว่าด้วยสถานการณ์เหล่านี้จำเป็นต้องมีการควบคุมของรัฐบาลเพื่อปกป้องผู้ผลิตในท้องถิ่นจากการแข่งขันจากต่างประเทศ
  - สถานการณ์เหล่านี้จำเป็นต้องรักษาระบบกิลด์ยุคกลางเพื่อให้มั่นใจในการควบคุมคุณภาพ
  - ว่าด้วยสถานการณ์เหล่านี้จำเป็นต้องจำกัดการค้าเพื่อรักษาทรัพยากรและความมั่งคั่งของชาติ
explanation: |
  นักสรีรศาสตร์ได้สังเกตเห็นการเกิดขึ้นของการค้าระหว่างประเทศในศตวรรษที่ 18 และแสดงให้เห็นว่าสภาพเศรษฐกิจใหม่เหล่านี้จำเป็นต้องมีเสรีภาพทางการค้า นี่เป็นการเปลี่ยนแปลงจากวิธีปฏิบัติในยุคกลางที่ผู้ผลิตท้องถิ่น (เช่น คนทำขนมปังในเมืองเล็ก ๆ) มีตลาดที่สงวนไว้และครอบงำผู้บริโภค นักสรีรศาสตร์แสดงให้เห็นว่าการค้าเสรีจะทำให้แรงตลาดสามารถปรับสมดุลราคาและทำให้ผู้บริโภคสามารถซื้อสินค้าได้ในราคาต่ำที่สุดเท่าที่จะเป็นไปได้ ทำให้เสรีภาพทางการค้าไม่เพียงแต่เป็นที่ต้องการในเชิงอุดมการณ์แต่ยังเป็นสิ่งจำเป็นในทางปฏิบัติในเศรษฐกิจโลกใหม่
question: ¿Qué demostraron los fisiócratas sobre las nuevas circunstancias del comercio mundial del siglo XVIII?
answer: Que estas circunstancias exigían libertad comercial para equilibrar los precios y obtener mercancías al menor coste
wrong_answers:
  - Que estas circunstancias exigían una regulación gubernamental para proteger a los productores locales de la competencia extranjera
  - Que estas circunstancias exigían mantener sistemas gremiales medievales para garantizar el control de calidad
  - Que estas circunstancias exigían restringir el comercio para preservar los recursos y la riqueza nacionales
explanation: |
  Los fisiócratas observaron el nacimiento del comercio mundial en el siglo XVIII y demostraron que estas nuevas condiciones económicas exigían libertad comercial. Se trataba de un cambio con respecto a las prácticas medievales, en las que los productores locales (como los panaderos de las pequeñas ciudades) se reservaban los mercados y dominaban a los consumidores. Los fisiócratas demostraron que el libre comercio permitiría a las fuerzas del mercado equilibrar los precios y permitir a los consumidores obtener bienes al menor coste posible, haciendo que la libertad comercial no sólo fuera ideológicamente deseable, sino prácticamente necesaria en la nueva economía global.
question: Hva viste fysiokratene om de nye omstendighetene i 1700-tallets globale handel?
answer: At disse omstendighetene krevde kommersiell frihet til å balansere prisene og skaffe varer til lavest mulig kostnad
wrong_answers:
  - At disse omstendighetene krevde statlig regulering for å beskytte lokale produsenter mot utenlandsk konkurranse
  - At disse omstendighetene krevde opprettholdelse av middelalderske laugssystemer for å sikre kvalitetskontroll
  - At disse omstendighetene gjorde det nødvendig å begrense handelen for å bevare nasjonale ressurser og rikdom
explanation: |
  Fysiokratene observerte den globale handelens fødsel på 1700-tallet og påviste at disse nye økonomiske forholdene nødvendiggjorde kommersiell frihet. Dette var et brudd med middelalderens praksis, der lokale produsenter (som bakere i småbyer) hadde reservert markeder og dominert forbrukerne. Fysiokratene viste at frihandel ville gjøre det mulig for markedskreftene å balansere prisene og gjøre det mulig for forbrukerne å skaffe seg varer til lavest mulig kostnad, noe som gjorde handelsfrihet ikke bare ideologisk ønskelig, men praktisk nødvendig i den nye globale økonomien.
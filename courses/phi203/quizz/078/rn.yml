question: Ni igiki abo ba fiziyokarate berekanye ku bijanye n’ibintu bishasha vyari vyifashe mu kinjana ca 18 mu bijanye n’ubudandaji bwo kw’isi yose?
answer: Ko ivyo bintu vyasaba umwidegemvyo w’ubudandaji kugira ngo umuntu ashobore guhuza ibiciro no kuronka ibintu ku giciro gitoyi kuruta ibindi vyose .
wrong_answers:
  - Ko ivyo bintu vyasaba ko Leta igira amategeko yo gukingira abahinguzi bo mu gihugu amahiganwa y’amahanga .
  - Ko ivyo bintu vyasaba ko habaho uburyo bwo kubungabunga uburyo bwo gukorana n’abandi kugira ngo haboneke uburyo bwo kugenzura .
  - Ko ivyo bintu vyasaba ko ubudandaji bugabanywa kugira ngo ubutunzi n’ubutunzi bw’igihugu bizigame .
explanation: |
  Abanyabwenge b’ivy’ubutunzi barabonye ukuntu ubudandaji bwo kw’isi yose bwavutse mu kinjana ca 18, maze berekana yuko ivyo bintu bishasha vy’ubutunzi vyasaba ko umuntu agira umwidegemvyo mu vy’ubudandaji. Ivyo vyari ukuva ku migenzo yo mu kinjana ca mbere aho abahinguzi bo mu karere (nk’abakora imikate mu bisagara bitobito) bari bafise amasoko yihariye kandi bakaba ari bo baganzwa n’abaguzi. Aba physiocrates berekanye ko ubudandaji bwigenga bwotuma inguvu z’isoko zishobora guhuza ibiciro no gutuma abaguzi bashobora kuronka ibintu ku giciro gitoyi kuruta ibindi vyose, ivyo bikaba bituma umwidegemvyo w’ubudandaji udashobora gusa kwipfuzwa mu vy’ingengabitekerezo ariko ukaba ari ngombwa mu vy’ukuri mu butunzi bushasha bw’isi yose.
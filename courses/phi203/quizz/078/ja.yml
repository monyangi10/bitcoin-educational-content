question: フィジオクラテスは、18世紀の世界商業の新しい状況について何を示したのか？
answer: このような状況下では、価格のバランスをとり、最も低いコストで商品を入手するために、商業的自由が必要であった。
wrong_answers:
  - このような状況では、外国の競争から地元の生産者を守るために政府の規制が必要であった。
  - このような状況では、品質管理を確実にするために、中世のギルドシステムを維持する必要があった。
  - このような状況では、国の資源と富を守るために貿易を制限する必要があった。
explanation: |
  フィジオクラテスは、18世紀の世界的な商業の誕生を観察し、こうした新しい経済状況には商業の自由が必要であることを示した。これは、地方の生産者（小さな町のパン屋など）が市場を確保し、消費者を支配していた中世の慣習からの脱却であった。フィジオクラテスは、自由貿易によって市場原理が価格の均衡を保ち、消費者が可能な限り低いコストで商品を入手できるようになることを示した。
question: Apa yang ditunjukkan oleh para fisiokrates tentang keadaan baru perdagangan global abad ke-18?
answer: Bahwa keadaan ini membutuhkan kebebasan komersial untuk menyeimbangkan harga dan mendapatkan barang dengan biaya terendah
wrong_answers:
  - Bahwa keadaan ini membutuhkan peraturan pemerintah untuk melindungi produsen lokal dari persaingan asing
  - Bahwa keadaan ini mengharuskan mempertahankan sistem serikat abad pertengahan untuk memastikan kontrol kualitas
  - Bahwa keadaan ini mengharuskan pembatasan perdagangan untuk melestarikan sumber daya dan kekayaan nasional
explanation: |
  Para ahli fisiokrasi mengamati kelahiran perdagangan global pada abad ke-18 dan menunjukkan bahwa kondisi ekonomi yang baru ini membutuhkan kebebasan komersial. Hal ini berbeda dengan praktik abad pertengahan di mana produsen lokal (seperti pembuat roti di kota-kota kecil) memiliki pasar khusus dan mendominasi konsumen. Fisiokrates menunjukkan bahwa perdagangan bebas akan memungkinkan kekuatan pasar untuk menyeimbangkan harga dan memungkinkan konsumen untuk mendapatkan barang dengan biaya serendah mungkin, sehingga kebebasan komersial tidak hanya diinginkan secara ideologis, tetapi juga diperlukan dalam ekonomi global yang baru.
question: Co fizjokraci pokazali na temat nowych okoliczności XVIII-wiecznego globalnego handlu?
answer: Okoliczności te wymagały swobody handlowej w celu zrównoważenia cen i uzyskania towarów po najniższych kosztach
wrong_answers:
  - Okoliczności te wymagały regulacji rządowych w celu ochrony lokalnych producentów przed zagraniczną konkurencją
  - Okoliczności te wymagały utrzymania średniowiecznych systemów gildii w celu zapewnienia kontroli jakości
  - Okoliczności te wymagały ograniczenia handlu w celu zachowania krajowych zasobów i bogactwa
explanation: |
  Fizjokraci obserwowali narodziny globalnego handlu w XVIII wieku i wykazali, że te nowe warunki ekonomiczne wymagały wolności handlowej. Było to odejście od średniowiecznych praktyk, w których lokalni producenci (tacy jak piekarze w małych miastach) mieli zarezerwowane rynki i dominowali nad konsumentami. Fizjokraci wykazali, że wolny handel pozwoli siłom rynkowym zrównoważyć ceny i umożliwi konsumentom uzyskanie towarów po najniższych możliwych kosztach, czyniąc wolność handlową nie tylko ideologicznie pożądaną, ale praktycznie niezbędną w nowej globalnej gospodarce.
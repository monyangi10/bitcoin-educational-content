question: Fizyokratlar 18. yüzyıl küresel ticaretinin yeni koşulları hakkında ne gösterdiler?
answer: Bu koşulların, fiyatları dengelemek ve malları en düşük maliyetle elde etmek için ticari özgürlük gerektirmesi
wrong_answers:
  - Bu koşulların, yerel üreticileri yabancı rekabetten korumak için hükümet düzenlemelerini gerektirmesi
  - Bu koşullar, kalite kontrolünü sağlamak için ortaçağ lonca sistemlerinin sürdürülmesini gerektiriyordu
  - Bu koşulların ulusal kaynakları ve zenginliği korumak için ticaretin kısıtlanmasını gerektirmesi
explanation: |
  Fizyokratlar 18. yüzyılda küresel ticaretin doğuşunu gözlemlemiş ve bu yeni ekonomik koşulların ticari özgürlüğü gerektirdiğini ortaya koymuşlardır. Bu, yerel üreticilerin (küçük kasabalardaki fırıncılar gibi) pazarları ellerinde tuttuğu ve tüketicilere hükmettiği ortaçağ uygulamalarından bir sapmaydı. Fizyokratlar, serbest ticaretin piyasa güçlerinin fiyatları dengelemesine ve tüketicilerin malları mümkün olan en düşük maliyetle elde etmesine olanak sağlayacağını göstererek ticari özgürlüğü sadece ideolojik olarak arzu edilir değil, aynı zamanda yeni küresel ekonomide pratik olarak gerekli hale getirdi.
question: 在 18 世纪全球商业的新形势下，重农主义者展示了什么？
answer: 这些情况需要商业自由来平衡价格，以最低成本获得商品
wrong_answers:
  - 在这些情况下，政府需要制定法规，保护当地生产商免受外国竞争的影响
  - 这些情况要求维持中世纪的行会制度，以确保质量控制
  - 这些情况要求限制贸易以保护国家资源和财富
explanation: |
  理智派观察到 18 世纪全球商业的诞生，并证明这些新的经济条件要求商业自由。这有别于中世纪的做法，即地方生产者（如小城镇的面包师）保留市场并支配消费者。重农主义者表明，自由贸易将使市场力量平衡价格，使消费者能够以尽可能低的成本获得商品，这使得商业自由在新的全球经济中不仅在意识形态上是可取的，而且在实践中是必要的。
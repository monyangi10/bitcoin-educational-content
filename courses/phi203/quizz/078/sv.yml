question: Vad visade fysiokraterna om de nya förhållandena i 1700-talets globala handel?
answer: Att dessa omständigheter krävde kommersiell frihet för att balansera priser och erhålla varor till lägsta möjliga kostnad
wrong_answers:
  - Att dessa omständigheter krävde statlig reglering för att skydda lokala producenter från utländsk konkurrens
  - Att dessa omständigheter krävde att medeltida skråsystem upprätthölls för att säkerställa kvalitetskontroll
  - Att dessa omständigheter krävde att handeln begränsades för att bevara nationella resurser och rikedomar
explanation: |
  Fysiokraterna observerade den globala handelns framväxt på 1700-talet och visade att de nya ekonomiska förutsättningarna krävde kommersiell frihet. Detta var ett avsteg från medeltida praxis där lokala producenter (som bagare i småstäder) hade reserverat marknader och dominerat konsumenterna. Fysiokraterna visade att frihandel skulle göra det möjligt för marknadskrafterna att balansera priserna och göra det möjligt för konsumenterna att få varor till lägsta möjliga kostnad, vilket gjorde kommersiell frihet inte bara ideologiskt önskvärd utan praktiskt nödvändig i den nya globala ekonomin.
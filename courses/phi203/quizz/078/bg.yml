question: Какво показват физиократите за новите условия на световната търговия през XVIII в.?
answer: Че тези обстоятелства изискват търговска свобода за балансиране на цените и получаване на стоки на най-ниска цена
wrong_answers:
  - Че тези обстоятелства изискват правителствено регулиране, за да се защитят местните производители от чуждестранната конкуренция
  - Тези обстоятелства изискват поддържането на средновековни гилдийни системи за осигуряване на контрол на качеството
  - Че тези обстоятелства изискват ограничаване на търговията с цел запазване на националните ресурси и богатство
explanation: |
  Физиократите наблюдават зараждането на световната търговия през XVIII в. и доказват, че новите икономически условия налагат търговска свобода. Това е отклонение от средновековните практики, при които местните производители (като хлебарите в малките градове) са имали запазени пазари и са доминирали над потребителите. Физиократите показват, че свободната търговия ще позволи на пазарните сили да балансират цените и да дадат възможност на потребителите да получават стоки на възможно най-ниска цена, което прави търговската свобода не само идеологически желана, но и практически необходима в новата глобална икономика.
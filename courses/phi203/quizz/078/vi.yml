question: Các nhà kinh tế học theo trường phái trọng nông đã chứng minh điều gì về những hoàn cảnh mới của thương mại toàn cầu thế kỷ 18?
answer: Những hoàn cảnh đó đòi hỏi sự tự do thương mại để cân bằng giá cả và mua hàng hóa với chi phí thấp nhất.
wrong_answers:
  - Những hoàn cảnh này đòi hỏi chính phủ phải ban hành quy định để bảo vệ các nhà sản xuất trong nước khỏi sự cạnh tranh nước ngoài.
  - Những hoàn cảnh đó đòi hỏi phải duy trì hệ thống phường hội thời trung cổ để đảm bảo kiểm soát chất lượng.
  - Những hoàn cảnh đó đòi hỏi phải hạn chế thương mại để bảo vệ tài nguyên và của cải quốc gia.
explanation: |
  Trường phái kinh tế trọng nông đã quan sát sự ra đời của thương mại toàn cầu vào thế kỷ 18 và chứng minh rằng những điều kiện kinh tế mới này đòi hỏi tự do thương mại. Điều này khác biệt so với các thông lệ thời trung cổ, nơi các nhà sản xuất địa phương (như thợ làm bánh ở các thị trấn nhỏ) độc quyền thị trường và chi phối người tiêu dùng. Trường phái kinh tế trọng nông cho thấy rằng thương mại tự do sẽ cho phép các lực lượng thị trường cân bằng giá cả và giúp người tiêu dùng mua được hàng hóa với chi phí thấp nhất có thể, khiến tự do thương mại không chỉ là điều đáng mong muốn về mặt tư tưởng mà còn là điều cần thiết trên thực tế trong nền kinh tế toàn cầu mới.
question: Согласно либеральной экономической теории, какова основная причина, по которой экологические проблемы и промышленное загрязнение не отменяют принцип свободного рыночного капитализма?
answer: Либеральная теория признает существование загрязнения, но утверждает, что свобода действий не может включать нанесение вреда другим, устанавливая четкие границы для законной экономической деятельности
wrong_answers:
  - В капиталистических обществах ущерб, наносимый окружающей среде, считается приемлемым компромиссом для экономического прогресса и повышения производительности труда
  - Рыночные силы естественным образом устраняют загрязнения благодаря предпочтениям потребителей, не требуя внешнего регулирования или моральных ограничений
  - От промышленного загрязнения в первую очередь страдают богатые слои населения, владеющие средствами производства, что делает его самокорректирующейся проблемой
explanation: |
  Либеральная экономическая теория не игнорирует экологические проблемы, а интегрирует их в свои рамки благодаря принципу, согласно которому законные свободные действия не могут быть связаны с нанесением вреда другим. Это устанавливает естественные границы для экономической деятельности - свобода человека заканчивается там, где он начинает наносить ущерб другим людям или их собственности. Неправильные ответы искажают либеральную теорию: она не принимает загрязнение окружающей среды как неизбежность, не полагается исключительно на рыночные силы без моральных ограничений и не считает, что загрязнение окружающей среды затрагивает только богатых.
question: Jaký je podle liberální ekonomické teorie hlavní důvod, proč obavy o životní prostředí a průmyslové znečištění nezpochybňují princip kapitalismu volného trhu?
answer: Liberální teorie uznává existenci znečištění, ale tvrdí, že svobodné jednání nemůže zahrnovat poškozování ostatních, a stanovuje jasné hranice pro legitimní ekonomickou činnost
wrong_answers:
  - Poškozování životního prostředí je v kapitalistických společnostech považováno za přijatelný kompromis za hospodářský pokrok a vyšší produktivitu
  - Tržní síly přirozeně eliminují znečištění prostřednictvím spotřebitelských preferencí, aniž by vyžadovaly jakoukoli vnější regulaci nebo morální omezení
  - Průmyslové znečištění postihuje především bohaté vrstvy, které vlastní výrobní prostředky, takže se jedná o samospasitelný problém
explanation: |
  Liberální ekonomická teorie neignoruje environmentální problémy, ale začleňuje je do svého rámce prostřednictvím zásady, že legitimní svobodné jednání nemůže zahrnovat poškozování druhých. Tím jsou stanoveny přirozené hranice ekonomické činnosti - svoboda končí tam, kde začíná poškozovat ostatní nebo jejich majetek. Špatné odpovědi zkreslují liberální teorii: nepřijímá znečištění jako nevyhnutelné, nespoléhá se pouze na tržní síly bez morálních omezení a nepředpokládá, že znečištění se týká pouze bohatých.
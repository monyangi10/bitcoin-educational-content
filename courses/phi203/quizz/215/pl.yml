question: Zgodnie z liberalną teorią ekonomiczną, jaki jest główny powód, dla którego obawy o środowisko i zanieczyszczenie przemysłowe nie unieważniają zasady kapitalizmu wolnorynkowego?
answer: Teoria liberalna przyznaje, że zanieczyszczenie istnieje, ale utrzymuje, że wolne działanie nie może obejmować krzywdzenia innych, ustanawiając wyraźne granice dla legalnej działalności gospodarczej
wrong_answers:
  - Szkody środowiskowe są uważane za akceptowalny kompromis dla postępu gospodarczego i zwiększonej produktywności w społeczeństwach kapitalistycznych
  - Siły rynkowe naturalnie eliminują zanieczyszczenia poprzez preferencje konsumentów, nie wymagając żadnych zewnętrznych regulacji ani ograniczeń moralnych
  - Zanieczyszczenia przemysłowe dotykają przede wszystkim klasę zamożną, która posiada środki produkcji, co czyni je problemem samonaprawiającym się
explanation: |
  Liberalna teoria ekonomiczna nie ignoruje kwestii środowiskowych, ale włącza je w swoje ramy poprzez zasadę, że uzasadnione wolne działanie nie może wiązać się z krzywdzeniem innych. Ustanawia to naturalne granice dla działalności gospodarczej - czyjaś wolność kończy się tam, gdzie zaczyna szkodzić innym lub ich własności. Błędne odpowiedzi błędnie przedstawiają teorię liberalną: nie akceptuje ona zanieczyszczenia jako nieuniknionego, nie polega wyłącznie na siłach rynkowych bez ograniczeń moralnych i nie zakłada, że zanieczyszczenie dotyka tylko bogatych.
question: Dushingiye ku ciyumviro c’ubutunzi bw’ubwigenge, ni imvo nyamukuru iyihe ituma ivyerekeye ibidukikije n’uguhumana kw’inganda bidakuraho ingingo ngenderwako y’ubutunzi bw’isoko ry’ubwigenge?
answer: Ivyiyumviro vy’ubwigenge vyemeza ko ubuhumane buriho ariko bivuga ko igikorwa c’ubwigenge kidashobora kubamwo ugugirira nabi abandi, gushinga imbibe zitomoye z’ibikorwa vy’ubutunzi vyemewe .
wrong_answers:
  - Ukwonona ibidukikije bifatwa nk’ikintu cemewe co guhindura ubutunzi no kwongerekana kw’umwimbu mu bihugu vy’abanyagihugu .
  - Inkomezi z’isoko zirakuraho ubuhumane biciye ku vyo abaguzi bakunda ata mategeko yo hanze canke inzitizi zo mu vy’inyifato runtu bisaba .
  - Uguhumana kw’inganda gutera ahanini abatunzi bafise uburyo bwo gukora, bikaba bituma kiba ingorane yikosora .
explanation: |
  Ivyiyumviro vy’ubutunzi vy’ubwigenge ntivyirengagiza ivyerekeye ibidukikije ahubwo birabishira mu rwego rwavyo biciye ku ngingo ngenderwako y’uko igikorwa c’ubwigenge gitegekanijwe kidashobora kubamwo ugugirira nabi abandi. Ivyo bishinga imipaka kamere y’ibikorwa vy’ubutunzi - umwidegemvyo w’umuntu uhera aho utangura kwonona abandi canke itunga ryabo. Inyishu zitari zo zigaragaza nabi inyigisho y’ubwigenge: ntiyemera ko uguhumana kw’ikirere ari ikintu kitazobura kubaho, ntiyizigira gusa inguvu z’isoko ata n’imwe ibujijwe mu vy’inyifato runtu, kandi ntiyiyumvira ko uguhumana kw’ibidukikije gutera abatunzi gusa.
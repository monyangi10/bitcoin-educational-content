question: According to liberal economic theory, what is the primary reason why environmental concerns and industrial pollution do not invalidate the principle of free market capitalism?
answer: Liberal theory acknowledges pollution exists but maintains that free action cannot include harming others, establishing clear boundaries for legitimate economic activity
wrong_answers:
  - Environmental damage is considered an acceptable trade-off for economic progress and increased productivity in capitalist societies
  - Market forces naturally eliminate pollution through consumer preferences without requiring any external regulation or moral constraints
  - Industrial pollution primarily affects the wealthy class who own the means of production, making it a self-correcting problem
explanation: |
  Liberal economic theory does not ignore environmental concerns but integrates them into its framework through the principle that legitimate free action cannot involve harming others. This establishes natural boundaries for economic activity - one's freedom ends where it begins to damage others or their property. The wrong answers misrepresent liberal theory: it doesn't accept pollution as inevitable, doesn't rely solely on market forces without moral constraints, and doesn't assume pollution only affects the wealthy.

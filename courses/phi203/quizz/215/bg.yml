question: Според либералната икономическа теория коя е основната причина, поради която екологичните проблеми и промишленото замърсяване не отменят принципа на свободния пазарен капитализъм?
answer: Либералната теория признава съществуването на замърсяване, но твърди, че свободното действие не може да включва нанасяне на вреда на другите, като установява ясни граници за законната икономическа дейност
wrong_answers:
  - Увреждането на околната среда се счита за приемлив компромис за икономическия напредък и увеличената производителност в капиталистическите общества
  - Пазарните сили естествено елиминират замърсяването чрез предпочитанията на потребителите, без да се налагат външни регулации или морални ограничения
  - Индустриалното замърсяване засяга предимно богатата класа, която притежава средствата за производство, което го прави самокоригиращ се проблем
explanation: |
  Либералната икономическа теория не пренебрегва проблемите на околната среда, а ги включва в своята рамка чрез принципа, че легитимното свободно действие не може да включва нанасяне на вреда на другите. Това определя естествените граници на икономическата дейност - свободата на човека свършва там, където той започва да вреди на другите или на тяхната собственост. Грешните отговори представят погрешно либералната теория: тя не приема замърсяването като неизбежно, не разчита единствено на пазарните сили без морални ограничения и не приема, че замърсяването засяга само богатите.
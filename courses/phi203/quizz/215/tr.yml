question: Liberal ekonomi teorisine göre, çevresel kaygıların ve endüstriyel kirliliğin serbest piyasa kapitalizmi ilkesini geçersiz kılmamasının temel nedeni nedir?
answer: Liberal teori kirliliğin varlığını kabul eder, ancak özgür eylemin başkalarına zarar vermeyi içeremeyeceğini savunur ve meşru ekonomik faaliyet için net sınırlar belirler
wrong_answers:
  - Kapitalist toplumlarda çevreye verilen zarar, ekonomik ilerleme ve verimlilik artışı için kabul edilebilir bir değiş tokuş olarak görülmektedir
  - Piyasa güçleri, herhangi bir dış düzenleme veya ahlaki kısıtlama gerektirmeden tüketici tercihleri yoluyla kirliliği doğal olarak ortadan kaldırır
  - Endüstriyel kirlilik öncelikle üretim araçlarına sahip olan zengin sınıfı etkilemekte, bu da onu kendi kendini düzelten bir sorun haline getirmektedir
explanation: |
  Liberal ekonomi teorisi çevresel kaygıları görmezden gelmez, ancak meşru özgür eylemin başkalarına zarar vermeyi içermemesi ilkesi aracılığıyla bunları çerçevesine entegre eder. Bu, ekonomik faaliyet için doğal sınırlar oluşturur - kişinin özgürlüğü, başkalarına veya mülklerine zarar vermeye başladığı yerde sona erer. Yanlış cevaplar liberal teoriyi yanlış temsil etmektedir: liberal teori kirliliği kaçınılmaz olarak kabul etmez, ahlaki kısıtlamalar olmaksızın sadece piyasa güçlerine güvenmez ve kirliliğin sadece zenginleri etkilediğini varsaymaz.
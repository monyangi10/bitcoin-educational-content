question: Wat is volgens de liberale economische theorie de belangrijkste reden waarom zorgen over het milieu en industriële vervuiling het principe van vrijemarktkapitalisme niet ontkrachten?
answer: De liberale theorie erkent dat vervuiling bestaat, maar stelt dat vrije actie geen schade aan anderen kan inhouden en duidelijke grenzen stelt aan legitieme economische activiteit
wrong_answers:
  - In kapitalistische samenlevingen wordt milieuschade beschouwd als een aanvaardbare ruil voor economische vooruitgang en verhoogde productiviteit
  - Marktkrachten elimineren vervuiling op natuurlijke wijze via consumentenvoorkeuren zonder dat externe regelgeving of morele beperkingen nodig zijn
  - Industriële vervuiling treft vooral de rijke klasse die de productiemiddelen bezit, waardoor het een zelfcorrigerend probleem is
explanation: |
  De liberale economische theorie negeert de zorg voor het milieu niet, maar integreert deze in haar kader door het principe dat legitieme vrije actie geen schade aan anderen met zich mee kan brengen. Dit stelt natuurlijke grenzen aan economische activiteit - iemands vrijheid eindigt waar het anderen of hun eigendom begint te schaden. De verkeerde antwoorden geven een verkeerd beeld van de liberale theorie: het accepteert vervuiling niet als onvermijdelijk, vertrouwt niet alleen op marktwerking zonder morele beperkingen en gaat er niet van uit dat vervuiling alleen de rijken treft.
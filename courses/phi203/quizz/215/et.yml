question: Mis on liberaalse majandusteooria kohaselt peamine põhjus, miks keskkonnaprobleemid ja tööstussaaste ei muuda vaba turukapitalismi põhimõtet kehtetuks?
answer: Liberaalne teooria tunnistab reostuse olemasolu, kuid väidab, et vaba tegutsemine ei saa hõlmata teiste kahjustamist, kehtestades selged piirid õiguspärasele majandustegevusele
wrong_answers:
  - Keskkonnakahjustusi peetakse kapitalistlikes ühiskondades vastuvõetavaks kompromissiks majandusliku arengu ja tootlikkuse suurendamise vastu
  - Turujõud kõrvaldavad reostuse loomulikult tarbijate eelistuste kaudu, ilma et see nõuaks välist reguleerimist või moraalseid piiranguid
  - Tööstusreostus mõjutab eelkõige jõukat klassi, kes omab tootmisvahendeid, mistõttu on see isekorrigeeriv probleem
explanation: |
  Liberaalne majandusteooria ei eirata keskkonnaprobleeme, vaid integreerib need oma raamistikku põhimõtte kaudu, et õiguspärane vaba tegevus ei saa hõlmata teiste kahjustamist. See seab majandustegevusele loomulikud piirid - kellegi vabadus lõpeb seal, kus ta hakkab kahjustama teisi või nende vara. Valed vastused moonutavad liberaalset teooriat: see ei aktsepteeri reostust kui paratamatut, ei toetu ainult turujõududele ilma moraalsete piiranguteta ja ei eelda, et reostus mõjutab ainult jõukaid.
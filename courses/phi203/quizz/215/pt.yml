question: De acordo com a teoria económica liberal, qual é a principal razão pela qual as preocupações ambientais e a poluição industrial não invalidam o princípio do capitalismo de mercado livre?
answer: A teoria liberal reconhece que a poluição existe, mas defende que a ação livre não pode incluir prejudicar os outros, estabelecendo limites claros para a atividade económica legítima
wrong_answers:
  - Os danos ambientais são considerados um compromisso aceitável para o progresso económico e o aumento da produtividade nas sociedades capitalistas
  - As forças de mercado eliminam naturalmente a poluição através das preferências dos consumidores, sem necessidade de qualquer regulamentação externa ou restrições morais
  - A poluição industrial afecta principalmente a classe rica que detém os meios de produção, o que a torna um problema auto-corrigível
explanation: |
  A teoria económica liberal não ignora as preocupações ambientais, mas integra-as no seu quadro através do princípio de que a ação livre legítima não pode implicar prejudicar os outros. Isto estabelece limites naturais para a atividade económica - a liberdade de uma pessoa termina quando começa a prejudicar os outros ou a sua propriedade. As respostas erradas deturpam a teoria liberal: não aceita a poluição como inevitável, não se baseia apenas nas forças de mercado sem restrições morais e não assume que a poluição afecta apenas os ricos.
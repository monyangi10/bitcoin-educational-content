question: Mikä on liberaalin talousteorian mukaan ensisijainen syy siihen, että ympäristöhuolet ja teollisuuden saastuminen eivät kumoa vapaan markkinakapitalismin periaatetta?
answer: Liberalistinen teoria tunnustaa saastumisen olemassaolon, mutta väittää, että vapaaseen toimintaan ei voi sisältyä toisten vahingoittaminen, ja asettaa lailliselle taloudelliselle toiminnalle selkeät rajat
wrong_answers:
  - Ympäristöhaittoja pidetään hyväksyttävänä vastineena taloudelliselle edistykselle ja tuottavuuden kasvulle kapitalistisissa yhteiskunnissa
  - Markkinavoimat poistavat luonnollisesti saastumisen kuluttajien mieltymysten kautta ilman ulkoista sääntelyä tai moraalisia rajoituksia
  - Teollisuuden aiheuttama saastuminen vaikuttaa ensisijaisesti tuotantovälineet omistavaan varakkaaseen luokkaan, joten se on itsestään korjautuva ongelma
explanation: |
  Liberalistinen talousteoria ei jätä ympäristönäkökohtia huomiotta, vaan sisällyttää ne kehykseensa periaatteella, jonka mukaan oikeutettu vapaa toiminta ei voi edellyttää muiden vahingoittamista. Tämä asettaa luonnolliset rajat taloudelliselle toiminnalle - ihmisen vapaus loppuu, kun se alkaa vahingoittaa muita tai heidän omaisuuttaan. Väärät vastaukset antavat väärän kuvan liberaalista teoriasta: siinä ei hyväksytä saastumista väistämättömänä, ei luoteta pelkästään markkinavoimiin ilman moraalisia rajoituksia eikä oleteta, että saastuminen koskee vain varakkaita.
question: 根據自由經濟理論，環境問題和工業污染不會使自由市場資本主義原則失效的主要原因是什麼？
answer: 自由理論承認污染的存在，但堅持自由行動不能包括傷害他人，為合法的經濟活動建立明確的界限。
wrong_answers:
  - 在資本主義社會中，環境破壞被認為是經濟進步和生產力提高的一種可接受的交易。
  - 市場力量透過消費者的偏好自然消除污染，不需要任何外部規範或道德約束
  - 工業污染主要影響擁有生產工具的富裕階層，使其成為一個自我矯正的問題
explanation: |
  自由經濟理論並未忽略環境問題，而是透過合法的自由行動不能涉及傷害他人的原則，將環境問題整合到其架構中。這為經濟活動建立了自然的界限 - 一個人的自由在開始損害他人或其財產時就結束了。錯誤的答案歪曲了自由主義理論：自由主義理論不認為污染是不可避免的，也不完全依賴市場力量而沒有道德約束，也不認為污染只會影響富人。
question: Según la teoría económica liberal, ¿cuál es la razón principal por la que las preocupaciones medioambientales y la contaminación industrial no invalidan el principio del capitalismo de libre mercado?
answer: La teoría liberal reconoce la existencia de la contaminación, pero sostiene que la acción libre no puede incluir el daño a los demás, estableciendo límites claros para la actividad económica legítima
wrong_answers:
  - En las sociedades capitalistas, los daños medioambientales se consideran una contrapartida aceptable del progreso económico y el aumento de la productividad
  - Las fuerzas del mercado eliminan de forma natural la contaminación a través de las preferencias de los consumidores, sin necesidad de ninguna regulación externa ni restricción moral
  - La contaminación industrial afecta principalmente a la clase adinerada propietaria de los medios de producción, lo que la convierte en un problema autocorrectivo
explanation: |
  La teoría económica liberal no ignora las preocupaciones medioambientales, sino que las integra en su marco a través del principio de que la acción libre legítima no puede implicar dañar a otros. Esto establece límites naturales para la actividad económica: la libertad de uno termina cuando empieza a perjudicar a otros o a su propiedad. Las respuestas erróneas tergiversan la teoría liberal: no acepta la contaminación como algo inevitable, no confía únicamente en las fuerzas del mercado sin restricciones morales y no asume que la contaminación sólo afecta a los ricos.
question: بر اساس نظریه اقتصادی لیبرال، دلیل اصلی اینکه نگرانی‌های زیست‌محیطی و آلودگی صنعتی اصل سرمایه‌داری بازار آزاد را بی‌اعتبار نمی‌کنند چیست؟
answer: تئوری لیبرال اذعان دارد که آلودگی وجود دارد اما معتقد است که عمل آزاد نمی‌تواند شامل آسیب رساندن به دیگران باشد و مرزهای روشنی برای فعالیت اقتصادی مشروع تعیین می‌کند.
wrong_answers:
  - در جوامع سرمایه‌داری، آسیب‌های زیست‌محیطی به عنوان یک مبادله قابل قبول برای پیشرفت اقتصادی و افزایش بهره‌وری در نظر گرفته می‌شود.
  - نیروهای بازار به طور طبیعی آلودگی را از طریق ترجیحات مصرف‌کننده حذف می‌کنند، بدون نیاز به هرگونه مقررات خارجی یا محدودیت‌های اخلاقی
  - آلودگی صنعتی عمدتاً بر طبقه ثروتمند که مالک وسایل تولید هستند تأثیر می‌گذارد و آن را به یک مشکل خوداصلاح‌کننده تبدیل می‌کند.
explanation: |
  نظریه اقتصادی لیبرال نگرانی‌های زیست‌محیطی را نادیده نمی‌گیرد بلکه آن‌ها را از طریق اصلی که می‌گوید اقدام آزاد مشروع نمی‌تواند شامل آسیب رساندن به دیگران باشد، در چارچوب خود ادغام می‌کند. این امر مرزهای طبیعی برای فعالیت اقتصادی را تعیین می‌کند - آزادی فرد در جایی پایان می‌یابد که شروع به آسیب رساندن به دیگران یا اموال آن‌ها می‌کند. پاسخ‌های نادرست نظریه لیبرال را نادرست نشان می‌دهند: این نظریه آلودگی را به عنوان امری اجتناب‌ناپذیر نمی‌پذیرد، به نیروهای بازار بدون محدودیت‌های اخلاقی تکیه نمی‌کند و فرض نمی‌کند که آلودگی تنها بر ثروتمندان تأثیر می‌گذارد.
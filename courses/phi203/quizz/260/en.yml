question: How does the text describe the historical progression of security, and what does this imply for the future?
answer: Security was established first between tribes, then on a national scale with the end of serfdom, and must now be extended to the international level as human relations increasingly cross borders
wrong_answers:
  - Security evolved from individual self-defence to communal militias, and must now return to decentralised local forms as nation-states lose their legitimacy
  - Security developed from monarchical control to democratic state monopoly, and must now be privatised as voluntary insurance replaces public defence
  - Security progressed from religious authority to secular law, and must now be entrusted to supranational democratic institutions with binding enforcement powers
explanation: |
  The text, drawing on the Abbé de Saint-Pierre's insight from as early as 1713, traces a historical arc: security was first established between tribes, then on a national scale with the end of serfdom and the creation of vast states. Today, the proportion of human relations conducted on an international basis has grown considerably, making it ever more imperative to establish security on very broad boundaries. A state of international law that recognises freedom of action while punishing infringements does not yet exist globally, and history is moving toward an increasingly liberal organisation of societies at this level.

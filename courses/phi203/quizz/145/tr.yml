question: Sunulan eleştiriye göre, bireysel karar alma ile siyasi karar alma süreçleri arasındaki temel fark nedir?
answer: Bireysel kararlar, sonuçlarına ilişkin kişisel sorumlulukla birlikte yavaş ve barışçıl bir müzakereyi içerirken, siyasi kararlar seçim ajitasyonundan ve kısa vadeli düşünceden ortaya çıkar
wrong_answers:
  - Bireysel kararlar duygusal dürtülere dayanırken, siyasi kararlar rasyonel kolektif analiz ve uzun vadeli planlama yoluyla alınır
  - Bireysel kararlar kişisel kazanca odaklanırken, siyasi kararlar demokratik uzlaşı ve çoğunluk aklı yoluyla ortak yarara öncelik verir
  - Bireysel kararlar uzmanlıktan yoksunken, siyasi kararlar seçilmiş temsilcilerin uzmanlık bilgisi ve mesleki yeterliliğinden yararlanır
explanation: |
  Metin, harekete geçmeden önce dikkatli bir gözlem ve huzurlu bir şekilde düşünmeyi içeren bireysel karar alma ile seçim ateşi ve ajitasyondan kaynaklanan siyasi karar almayı açıkça karşılaştırmaktadır. Bireysel kararlar insanların seçimlerinin sonuçlarını hissetmelerini ve davranışlarını buna göre değiştirmelerini sağlarken, siyasi kararlar gerekli karmaşık yargılar için uygun olmayan bir kısa vadecilik ortamında alınmaktadır. Yanlış cevaplar, bölümün açıkça reddettiği siyasi süreçlere ilişkin yaygın savunmaları yansıtmaktadır.
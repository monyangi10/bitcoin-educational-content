question: 제시된 비평에 따르면, 개인의 의사 결정과 정치적 의사 결정 과정의 근본적인 차이점은 무엇인가요?
answer: 개인의 결정은 결과에 대한 개인적인 책임과 함께 느리고 평화로운 숙고를 필요로 하는 반면, 정치적 결정은 선거 운동의 선동과 단기적 사고에서 비롯됩니다
wrong_answers:
  - 개인적 결정은 감정적 충동에 기반하지만 정치적 결정은 이성적 집단 분석과 장기적 계획을 통해 이루어집니다
  - 개인의 결정은 개인의 이익에 초점을 맞추고, 정치적 결정은 민주적 합의와 다수의 지혜를 통해 공동선을 우선시합니다
  - 개인의 결정은 전문성이 부족한 반면, 정치적 결정은 선출된 대표의 전문 지식과 전문적 역량을 활용합니다
explanation: |
  이 글은 행동하기 전에 신중하게 관찰하고 평화롭게 성찰하는 개인적 의사 결정과 선거 열기와 선동에서 비롯되는 정치적 의사 결정을 명확하게 대조합니다. 개인적 의사 결정은 사람들이 선택의 결과를 느끼고 그에 따라 행동을 수정할 수 있는 반면, 정치적 의사 결정은 복잡한 판단이 요구되는 단기주의 분위기에서 이루어지기 때문에 부적합합니다. 오답은 이 장에서 명시적으로 거부하는 정치 과정에 대한 일반적인 방어를 반영합니다.
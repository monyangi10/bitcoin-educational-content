question: 根據所提出的批判，個人決策與政治決策過程的根本差異何在？
answer: 個人決策涉及緩慢、和平的討論，以及個人對後果的責任，而政治決策則來自選舉的激動和短期思考
wrong_answers:
  - 個人決策是基於感性的衝動，而政治決策則是透過理性的集體分析和長期規劃而做出的。
  - 個人決策著重於個人利益，而政治決策則透過民主共識和大多數人的智慧來優先處理共同利益。
  - 個人決策缺乏專業知識，而政治決策則受惠於民選代表的專門知識與專業能力
explanation: |
  文中將個人決策與政治決策作了明確的對比，個人決策需要在行動之前進行仔細觀察與平靜思考，而政治決策則來自於選舉熱潮與激動。個人決策讓人們感受到自己選擇的後果，並據此修改自己的行為，而政治決策則是在短期主義的氣氛下做出的，不適合所需的複雜判斷。錯誤的答案反映了本章明確摒棄的對政治過程的常見辯護。
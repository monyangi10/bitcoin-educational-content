question: Dushingiye ku vyo banegura vyashikirijwe, ni irihe tandukaniro ry’ishimikiro riri hagati y’ingene umuntu afata ingingo n’ingene politike ifata ingingo?
answer: Ingingo z’umuntu ku giti ciwe zijanye n’uguca irya n’ino buhoro buhoro, mu mahoro, umuntu afise inshingano ku ngaruka, mu gihe ingingo za politike ziva mu gutera umuvurungano w’amatora no mu kwiyumvira kw’igihe gito .
wrong_answers:
  - Ivyemezo vy’umuntu ku giti ciwe bishingiye ku vyiyumviro vyiwe mu gihe ingingo za politike zifatwa biciye mu gusuzuma rusangi bishingiye ku vyiyumviro no gutegura igihe kirekire .
  - Ivyemezo vy'umuntu ku giti ciwe vyibanda ku nyungu z'umuntu ku giti ciwe mu gihe ingingo za politike zishira imbere ivyiza rusangi biciye mu kwumvikana kwa demokarasi n'ubwenge bwa benshi .
  - Ivyemezo vy'umuntu ku giti ciwe ntibigira ubuhinga mu gihe ivyemezo vya politike vyungukira ku bumenyi bwihariye n'ubushobozi bw'umwuga bw'abatowe .
explanation: |
  Ico canditswe kiratandukanya neza ingingo umuntu afata, ivyo bikaba birimwo kwihweza neza no kwiyumvira mu mahoro imbere y’uko akora ikintu, n’ingingo za politike ziva ku muriro w’amatora n’uguhagarika umutima. Ingingo z’umuntu ku giti ciwe zituma abantu bumva ingaruka z’ivyo bahisemwo kandi bagahindura inyifato yabo bivanye n’ivyo, mu gihe ingingo za politike zifatwa mu gihe c’igihe gito zidakwiriye imanza zigoye zisabwa. Inyishu zitari zo zirerekana uburinzi rusangi bw’imigenderanire ya politike iki gice canka mu buryo butomoye.
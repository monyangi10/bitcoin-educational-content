question: Milline on esitatud kriitika kohaselt individuaalse otsustusprotsessi ja poliitilise otsustusprotsessi põhimõtteline erinevus?
answer: Individuaalsed otsused hõlmavad aeglast, rahulikku kaalumist koos isikliku vastutusega tagajärgede eest, samas kui poliitilised otsused tulenevad valimisagitatsioonist ja lühiajalisest mõtlemisest
wrong_answers:
  - Individuaalsed otsused põhinevad emotsionaalsetel impulssidel, samas kui poliitilised otsused tehakse ratsionaalse kollektiivse analüüsi ja pikaajalise planeerimise kaudu
  - Individuaalsed otsused keskenduvad isiklikule kasule, samas kui poliitilised otsused seavad demokraatliku konsensuse ja enamuse tarkuse kaudu esikohale ühise heaolu
  - Individuaalsete otsuste tegemisel puudub asjatundlikkus, samas kui poliitiliste otsuste tegemisel tulevad kasuks valitud esindajate eriteadmised ja erialane pädevus
explanation: |
  Tekstis vastandatakse selgelt individuaalset otsustamist, mis hõlmab hoolikat vaatlemist ja rahulikku järelemõtlemist enne tegutsemist, poliitilisele otsustamisele, mis tuleneb valimiskirest ja agitatsioonist. Individuaalsed otsused võimaldavad inimestel tunnetada oma valikute tagajärgi ja muuta oma käitumist vastavalt, samas kui poliitilised otsused tehakse lühiajalises kliimas, mis ei sobi vajalike keeruliste otsuste tegemiseks. Väärad vastused peegeldavad poliitiliste protsesside tavalisi kaitsevõimalusi, mida peatükk selgesõnaliselt tagasi lükkab.
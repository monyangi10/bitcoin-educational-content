question: 根据所提出的批评，个人决策与政治决策过程之间的根本区别是什么？
answer: 个人决策涉及缓慢、平和的审议，个人对后果负责，而政治决策则产生于选举骚动和短期思维
wrong_answers:
  - 个人决策基于情感冲动，而政治决策则通过理性的集体分析和长期规划做出
  - 个人决策注重个人利益，而政治决策则通过民主共识和多数人的智慧优先考虑共同利益
  - 个人决策缺乏专业知识，而政治决策则得益于当选代表的专业知识和专业能力
explanation: |
  文中明确地将个人决策与政治决策进行了对比，个人决策需要在行动之前进行仔细观察和冷静思考，而政治决策则源于选举热潮和躁动。个人决策可以让人们感受到自己选择的后果，并据此修正自己的行为，而政治决策则是在短期主义的氛围下做出的，不适合所需的复杂判断。错误答案反映了本章明确反对的对政治进程的常见辩护。
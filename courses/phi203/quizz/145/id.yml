question: Berdasarkan kritik yang disampaikan, apa perbedaan mendasar antara pengambilan keputusan individu dan proses pengambilan keputusan politik?
answer: Keputusan individu melibatkan musyawarah yang lambat dan damai dengan tanggung jawab pribadi atas konsekuensinya, sementara keputusan politik muncul dari agitasi pemilu dan pemikiran jangka pendek
wrong_answers:
  - Keputusan individu didasarkan pada dorongan emosional, sementara keputusan politik dibuat melalui analisis kolektif yang rasional dan perencanaan jangka panjang
  - Keputusan individu berfokus pada keuntungan pribadi, sementara keputusan politik memprioritaskan kebaikan bersama melalui konsensus demokratis dan kebijaksanaan mayoritas
  - Keputusan individu kurang memiliki keahlian, sementara keputusan politik mendapat manfaat dari pengetahuan khusus dan kompetensi profesional dari perwakilan yang terpilih
explanation: |
  Teks tersebut dengan jelas membedakan pengambilan keputusan individu, yang melibatkan pengamatan yang cermat dan refleksi yang tenang sebelum bertindak, dengan pengambilan keputusan politik yang muncul dari demam pemilu dan agitasi. Keputusan individu memungkinkan orang untuk merasakan konsekuensi dari pilihan mereka dan memodifikasi perilaku mereka sesuai dengan itu, sementara keputusan politik dibuat dalam iklim jangka pendek yang tidak cocok untuk penilaian kompleks yang diperlukan. Jawaban yang salah mencerminkan pembelaan umum terhadap proses politik yang secara eksplisit ditolak oleh bab ini.
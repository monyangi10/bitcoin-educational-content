question: What does the text's illustration of national education reveal about how state bureaucracy treats innovation?
answer: The original mind must ask superiors for permission before acting, and the first response he receives is "What use is it?" — reflecting a system designed to distribute fixed knowledge, not improve it
wrong_answers:
  - National education encourages innovation by identifying talented individuals early and providing them with resources to develop their ideas freely
  - The state's oversight of education ensures innovations are rigorously tested before adoption, producing more reliable progress than unregulated private experimentation
  - National education fails only because of insufficient funding, and additional public investment would unlock the same innovation capacity found in private institutions
explanation: |
  The text presents national education as a perfect illustration of why the state cannot innovate. It is not designed to improve knowledge but simply to distribute a body of knowledge conceived as a fixed asset. The genius or original mind within such a system must first seek the opinion of superiors before acting, and the first question he encounters is "What use is it?" — the same dismissive response that ancient societies gave to any novelty. This structural hostility to innovation is not a funding problem but an inherent feature of bureaucratic systems that rely on regulations and offer no personal incentive for individuals to take creative risks.

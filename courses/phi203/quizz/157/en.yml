question: According to the analysis of secession principles, what contradiction exists in modern democratic states regarding territorial sovereignty?
answer: They prohibit regions from leaving while simultaneously seeking to expand their territorial control over new populations
wrong_answers:
  - They allow unlimited secession while restricting immigration and border control mechanisms
  - They grant complete autonomy to regions while maintaining centralized taxation and monetary policy
  - They encourage voluntary association while preventing any form of collective political organization
explanation: |
  The text reveals a fundamental contradiction in modern states: while constitutions proclaim republics as 'one and indivisible' and forbid regions from seceding or joining other countries, these same states actively seek to conquer new territories and expand their political clientele. This exposes the hypocrisy of systems that deny the principle of voluntary association (preventing people from leaving) while practicing territorial expansion (forcing others to join). The other options misrepresent the actual contradictions described, as states neither allow unlimited secession nor grant complete autonomy, and they don't encourage voluntary association but rather enforce mandatory membership.

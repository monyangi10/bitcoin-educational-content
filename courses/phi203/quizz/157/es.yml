question: Según el análisis de los principios de secesión, ¿qué contradicción existe en los Estados democráticos modernos respecto a la soberanía territorial?
answer: Prohíben la salida de las regiones al tiempo que intentan ampliar su control territorial sobre nuevas poblaciones
wrong_answers:
  - Permiten la secesión ilimitada al tiempo que restringen la inmigración y los mecanismos de control fronterizo
  - Conceden plena autonomía a las regiones, al tiempo que mantienen la fiscalidad y la política monetaria centralizadas
  - Fomentan la asociación voluntaria al tiempo que impiden cualquier forma de organización política colectiva
explanation: |
  El texto revela una contradicción fundamental de los Estados modernos: mientras las constituciones proclaman que las repúblicas son "una e indivisible" y prohíben a las regiones separarse o unirse a otros países, esos mismos Estados buscan activamente conquistar nuevos territorios y ampliar su clientela política. Esto expone la hipocresía de los sistemas que niegan el principio de asociación voluntaria (impidiendo que la gente se vaya) mientras practican la expansión territorial (obligando a otros a unirse). Las otras opciones tergiversan las contradicciones reales descritas, ya que los Estados ni permiten la secesión ilimitada ni conceden una autonomía completa, y no fomentan la asociación voluntaria sino que imponen la afiliación obligatoria.
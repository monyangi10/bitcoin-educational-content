question: Согласно анализу принципов сецессии, какое противоречие существует в современных демократических государствах в отношении территориального суверенитета?
answer: Они запрещают регионам покидать их, одновременно стремясь расширить свой территориальный контроль над новым населением
wrong_answers:
  - Они допускают неограниченную сецессию, ограничивая при этом иммиграцию и механизмы пограничного контроля
  - Они предоставляют полную автономию регионам, сохраняя при этом централизованное налогообложение и денежно-кредитную политику
  - Они поощряют добровольное объединение, не допуская при этом никаких форм коллективной политической организации
explanation: |
  Текст раскрывает фундаментальное противоречие современных государств: в то время как конституции провозглашают республики "едиными и неделимыми" и запрещают регионам отделяться или присоединяться к другим странам, те же самые государства активно стремятся к завоеванию новых территорий и расширению своей политической клиентуры. Это обнажает лицемерие систем, которые отрицают принцип добровольного объединения (не позволяя людям выходить) и в то же время практикуют территориальную экспансию (заставляя других присоединяться). Другие варианты искажают реальные противоречия, поскольку государства не допускают ни неограниченного отделения, ни полной автономии, и не поощряют добровольное объединение, а скорее принуждают к обязательному членству.
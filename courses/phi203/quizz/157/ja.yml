question: 分離独立の原則の分析によれば、領土主権に関して、現代の民主主義国家にはどのような矛盾が存在するのか？
answer: 彼らは地域の離脱を禁止すると同時に、新たな人口に対する領土支配を拡大しようとしている。
wrong_answers:
  - 無制限の分離独立を認める一方で、移民や国境管理の仕組みを制限する。
  - 中央集権的な税制と金融政策を維持しながら、地方に完全な自治を認めている。
  - 自発的な結社を奨励する一方で、いかなる形態の集団的政治組織も阻止する。
explanation: |
  この文章は、近代国家における根本的な矛盾を明らかにしている。憲法が共和国を「一つであり、不可分である」と宣言し、地域の分離独立や他国への加盟を禁じている一方で、同じ国家が積極的に新たな領土を征服し、政治的顧客を拡大しようとしているのだ。このことは、自主的な結社の原則を否定しながら（離脱を阻止しながら）、領土拡張を実践する（他国への加入を強制する）制度の偽善性を露呈している。他の選択肢は、無制限の離脱も完全な自治も認めず、自発的な結社を奨励せず、むしろ強制的な加入を強いるため、説明された実際の矛盾を誤って伝えている。
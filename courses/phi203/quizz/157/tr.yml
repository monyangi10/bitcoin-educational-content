question: Ayrılma ilkelerinin analizine göre, modern demokratik devletlerde toprak egemenliği konusunda hangi çelişki vardır?
answer: Bölgelerin ayrılmasını yasaklarken aynı zamanda yeni nüfuslar üzerindeki bölgesel kontrollerini genişletmeye çalışıyorlar
wrong_answers:
  - Göç ve sınır kontrol mekanizmalarını kısıtlarken sınırsız ayrılmaya izin veriyorlar
  - Merkezi vergilendirme ve para politikasını sürdürürken bölgelere tam özerklik verirler
  - Her türlü kolektif siyasi örgütlenmeyi engellerken gönüllü birlikteliği teşvik ederler
explanation: |
  Metin, modern devletlerdeki temel bir çelişkiyi ortaya koymaktadır: anayasalar cumhuriyetleri 'bir ve bölünmez' olarak ilan ederken ve bölgelerin ayrılmasını veya başka ülkelere katılmasını yasaklarken, aynı devletler aktif olarak yeni topraklar fethetmeye ve siyasi müşterilerini genişletmeye çalışmaktadır. Bu durum, gönüllü birliktelik ilkesini reddeden (insanların ayrılmasını engelleyen) ve aynı zamanda bölgesel genişleme (başkalarını katılmaya zorlayan) uygulayan sistemlerin ikiyüzlülüğünü ortaya koymaktadır. Diğer seçenekler, devletler ne sınırsız ayrılmaya izin verdiği ne de tam özerklik tanıdığı ve gönüllü birlikteliği teşvik etmediği, aksine zorunlu üyeliği dayattığı için, tanımlanan gerçek çelişkileri yanlış yansıtmaktadır.
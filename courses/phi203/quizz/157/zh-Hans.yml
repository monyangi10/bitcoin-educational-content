question: 根据对分离原则的分析，现代民主国家在领土主权方面存在什么矛盾？
answer: 它们禁止各地区离开，同时又试图扩大对新人口的领土控制
wrong_answers:
  - 他们允许无限制的分离，同时限制移民和边境控制机制
  - 它们给予各地区完全的自治权，同时维持中央税收和货币政策
  - 它们鼓励自愿结社，同时阻止任何形式的集体政治组织
explanation: |
  这篇文章揭示了现代国家的一个根本矛盾：虽然宪法宣称共和国是 "一个不可分割的"，禁止地区分离或加入其他国家，但这些国家却积极寻求征服新的领土，扩大其政治客户。这就暴露了那些否认自愿联合原则（阻止人们离开），同时又实行领土扩张（强迫他人加入）的制度的虚伪性。其他选项歪曲了所描述的实际矛盾，因为国家既不允许无限制的分离，也不给予完全的自治，它们不鼓励自愿结社，而是强制加入。
question: ตามการวิเคราะห์หลักการแยกตัวออกจากกัน ความขัดแย้งใดที่มีอยู่ในรัฐประชาธิปไตยสมัยใหม่เกี่ยวกับอธิปไตยเหนือดินแดน?
answer: พวกเขาห้ามไม่ให้ภูมิภาคต่างๆ แยกตัวออกไป ในขณะเดียวกันก็พยายามขยายการควบคุมดินแดนเหนือประชากรใหม่ๆ
wrong_answers:
  - พวกเขาอนุญาตให้มีการแยกตัวออกอย่างไม่จำกัดขณะที่จำกัดการอพยพเข้าและกลไกการควบคุมชายแดน
  - พวกเขามอบอำนาจอิสระอย่างสมบูรณ์ให้กับภูมิภาคต่างๆ ในขณะที่ยังคงรักษานโยบายการจัดเก็บภาษีและการเงินแบบรวมศูนย์
  - พวกเขาส่งเสริมการรวมกลุ่มโดยสมัครใจในขณะที่ป้องกันรูปแบบใด ๆ ของการจัดตั้งทางการเมืองร่วมกัน
explanation: |
  ข้อความนี้เผยให้เห็นถึงความขัดแย้งพื้นฐานในรัฐสมัยใหม่: ในขณะที่รัฐธรรมนูญประกาศให้สาธารณรัฐเป็น 'หนึ่งเดียวและแบ่งแยกไม่ได้' และห้ามภูมิภาคต่างๆ แยกตัวหรือเข้าร่วมกับประเทศอื่น รัฐเหล่านี้กลับพยายามที่จะพิชิตดินแดนใหม่และขยายฐานลูกค้าทางการเมืองของตนอย่างแข็งขัน สิ่งนี้เผยให้เห็นถึงความหน้าซื่อใจคดของระบบที่ปฏิเสธหลักการของการรวมตัวโดยสมัครใจ (ป้องกันไม่ให้ผู้คนออกไป) ในขณะที่ปฏิบัติการขยายดินแดน (บังคับให้ผู้อื่นเข้าร่วม) ตัวเลือกอื่นๆ บิดเบือนความขัดแย้งที่แท้จริงที่อธิบายไว้ เนื่องจากรัฐไม่ได้อนุญาตให้มีการแยกตัวอย่างไม่จำกัดหรือให้เอกราชอย่างสมบูรณ์ และพวกเขาไม่ได้สนับสนุนการรวมตัวโดยสมัครใจ แต่กลับบังคับให้เป็นสมาชิกแทน
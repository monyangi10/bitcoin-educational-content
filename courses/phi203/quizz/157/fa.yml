question: بر اساس تحلیل اصول جدایی‌طلبی، چه تناقضی در دولت‌های دموکراتیک مدرن در مورد حاکمیت ارضی وجود دارد؟
answer: آن‌ها مناطق را از خروج منع می‌کنند در حالی که به طور همزمان به دنبال گسترش کنترل سرزمینی خود بر جمعیت‌های جدید هستند.
wrong_answers:
  - آن‌ها جدایی‌طلبی نامحدود را مجاز می‌دانند در حالی که مهاجرت و مکانیسم‌های کنترل مرزی را محدود می‌کنند.
  - آن‌ها به مناطق خودمختاری کامل اعطا می‌کنند در حالی که سیاست‌های مالیاتی و پولی متمرکز را حفظ می‌کنند.
  - آن‌ها تشویق به انجمن‌های داوطلبانه می‌کنند در حالی که از هر گونه شکل‌گیری سازمان سیاسی جمعی جلوگیری می‌کنند.
explanation: |
  متن یک تناقض اساسی در دولت‌های مدرن را آشکار می‌کند: در حالی که قانون اساسی جمهوری‌ها را به عنوان 'یک و غیرقابل تقسیم' اعلام می‌کند و از جدایی یا پیوستن مناطق به کشورهای دیگر جلوگیری می‌کند، همین دولت‌ها به طور فعال به دنبال فتح سرزمین‌های جدید و گسترش مشتریان سیاسی خود هستند. این امر ریاکاری سیستم‌هایی را نشان می‌دهد که اصل انجمن داوطلبانه را انکار می‌کنند (جلوگیری از خروج مردم) در حالی که به گسترش سرزمینی می‌پردازند (مجبور کردن دیگران به پیوستن). گزینه‌های دیگر تناقضات واقعی توصیف شده را نادرست نشان می‌دهند، زیرا دولت‌ها نه اجازه جدایی نامحدود می‌دهند و نه خودمختاری کامل اعطا می‌کنند، و آنها انجمن داوطلبانه را تشویق نمی‌کنند بلکه عضویت اجباری را اعمال می‌کنند.
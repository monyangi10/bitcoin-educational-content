question: Jaký rozpor existuje podle analýzy principů secese v moderních demokratických státech, pokud jde o územní suverenitu?
answer: Zakazují odchod z regionů a zároveň se snaží rozšířit svou územní kontrolu nad novými populacemi
wrong_answers:
  - Umožňují neomezenou secesi a zároveň omezují přistěhovalectví a mechanismy kontroly hranic
  - Poskytují regionům úplnou autonomii a zároveň zachovávají centralizovanou daňovou a měnovou politiku
  - Podporují dobrovolné sdružování a zároveň brání jakékoli formě kolektivní politické organizace
explanation: |
  Text odhaluje zásadní rozpor moderních států: zatímco ústavy prohlašují republiky za "jednotné a nedělitelné" a zakazují regionům oddělit se nebo se připojit k jiným zemím, tytéž státy aktivně usilují o dobytí nových území a rozšíření své politické klientely. To odhaluje pokrytectví systémů, které popírají princip dobrovolného sdružování (brání lidem v odchodu) a zároveň praktikují územní expanzi (nutí ostatní, aby se připojili). Ostatní možnosti zkreslují popsané skutečné rozpory, neboť státy neumožňují neomezené oddělování ani neposkytují úplnou autonomii a nepodporují dobrovolné sdružování, ale spíše vynucují povinné členství.
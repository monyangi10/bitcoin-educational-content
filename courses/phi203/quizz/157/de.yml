question: Welcher Widerspruch besteht nach der Analyse der Sezessionsprinzipien in modernen demokratischen Staaten hinsichtlich der territorialen Souveränität?
answer: Sie verbieten die Abwanderung von Regionen und versuchen gleichzeitig, ihre territoriale Kontrolle über neue Bevölkerungsgruppen auszuweiten
wrong_answers:
  - Sie erlauben unbegrenzte Sezession und beschränken gleichzeitig die Einwanderung und die Grenzkontrollmechanismen
  - Sie gewähren den Regionen vollständige Autonomie, während die Steuer- und Währungspolitik zentralisiert bleibt
  - Sie fördern den freiwilligen Zusammenschluss und verhindern jede Form der kollektiven politischen Organisation
explanation: |
  Der Text offenbart einen grundlegenden Widerspruch in modernen Staaten: Während Verfassungen Republiken als "eins und unteilbar" proklamieren und Regionen verbieten, sich abzuspalten oder anderen Ländern anzuschließen, versuchen dieselben Staaten aktiv, neue Gebiete zu erobern und ihre politische Klientel zu erweitern. Dies entlarvt die Heuchelei von Systemen, die das Prinzip der freiwilligen Vereinigung leugnen (indem sie den Austritt von Menschen verhindern) und gleichzeitig territoriale Expansion betreiben (indem sie andere zum Beitritt zwingen). Die anderen Optionen stellen die beschriebenen Widersprüche falsch dar, da die Staaten weder unbegrenzte Sezession zulassen noch völlige Autonomie gewähren, und sie fördern nicht den freiwilligen Zusammenschluss, sondern erzwingen vielmehr die Zwangsmitgliedschaft.
question: Prema analizi principa secesije, koja kontradikcija postoji u modernim demokratskim državama u vezi sa teritorijalnim suverenitetom?
answer: Oni zabranjuju regionima da se odvoje, dok istovremeno nastoje da prošire svoju teritorijalnu kontrolu nad novim populacijama.
wrong_answers:
  - Dozvoljavaju neograničeno otcepljenje dok ograničavaju imigraciju i mehanizme kontrole granica
  - Oni daju potpunu autonomiju regionima dok održavaju centralizovanu poresku i monetarnu politiku.
  - Oni podstiču dobrovoljno udruživanje dok sprečavaju bilo kakav oblik kolektivne političke organizacije.
explanation: |
  Tekst otkriva fundamentalnu kontradikciju u modernim državama: dok ustavi proglašavaju republike kao 'jedne i nedeljive' i zabranjuju regionima da se otcepe ili pridruže drugim zemljama, te iste države aktivno nastoje da osvoje nove teritorije i prošire svoju političku klijentelu. Ovo razotkriva licemerje sistema koji negiraju princip dobrovoljnog udruživanja (sprečavajući ljude da odu) dok praktikuju teritorijalnu ekspanziju (primoravajući druge da se pridruže). Druge opcije pogrešno predstavljaju stvarne kontradikcije opisane, jer države ni ne dozvoljavaju neograničeno otcepljenje niti daju potpunu autonomiju, i ne podstiču dobrovoljno udruživanje već nameću obavezno članstvo.
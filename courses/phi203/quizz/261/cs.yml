question: V čem liberální doktrína spatřuje základní chybu v tom, že národy jsou považovány za entity, které vlastní nebo ovládají jednotlivce?
answer: Je v rozporu s faktickým zjištěním, že primární skutečností je individuální vůle a požitek, nikoli kolektivní vůle nebo vlastnictví
wrong_answers:
  - Brání národům účinně organizovat soudnictví a policejní správu v rámci svých územních hranic
  - Podkopává historickou legitimitu, kterou národy získaly díky kulturní a jazykové jednotě v průběhu času
  - Oslabuje smluvní základ tím, že jednotlivci jsou příliš nezávislí na tom, aby mohli uzavírat stabilní kolektivní smlouvy
explanation: |
  Předložená liberální doktrína zdůrazňuje, že individuální vůle a požitek jsou faktickou skutečností, zatímco kolektivní vůle je odvozená a vzniká pouze prostřednictvím směny a smlouvy. V textu se výslovně uvádí, že "věci neužíváme kolektivně, nemáme vrozenou kolektivní vůli, ale spíše individuální vůli, která je nám vlastní" Pokud se na národy pohlíží jako na nadřazené entity, které vlastní jednotlivce, obrací se tím správný vztah a popírá se základní role autonomie jednotlivce v politické organizaci.
question: Je, fundisho la kiliberali linatambua nini kama dosari ya msingi katika kuyaona mataifa kama vyombo vinavyomiliki au kutawala watu binafsi?
answer: Inapingana na uchunguzi wa kweli kwamba mapenzi na starehe ya mtu binafsi ndio ukweli mkuu, si mapenzi au umiliki wa pamoja
wrong_answers:
  - Inazuia mataifa kupanga haki na utawala wa polisi kwa ufanisi ndani ya mipaka yao ya eneo
  - Inadhoofisha uhalali wa kihistoria ambao mataifa yamepata kupitia umoja wa kitamaduni na lugha kwa muda mrefu
  - Inadhoofisha msingi wa kimkataba kwa kuwafanya watu binafsi wawe huru sana kuunda makubaliano thabiti ya pamoja
explanation: |
  Mafundisho ya kiliberali yanayowasilishwa yanasisitiza kwamba utashi na starehe ya mtu binafsi ni ukweli halisi, huku utashi wa pamoja ukitokana na hujitokeza tu kupitia kubadilishana na mkataba. Maandishi yanasema waziwazi kwamba 'hatufurahii mambo kwa pamoja, hatuna utashi wa pamoja wa asili, bali utashi wa mtu binafsi ambao ni wetu wenyewe.' Mataifa yanapoonekana kama vyombo bora vinavyomiliki watu binafsi, hii hubadilisha uhusiano unaofaa na kukataa jukumu la msingi la uhuru wa mtu binafsi katika shirika la kisiasa.
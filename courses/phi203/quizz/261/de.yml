question: Worin sieht die liberale Doktrin den grundlegenden Fehler, Nationen als Einheiten zu betrachten, die Individuen besitzen oder beherrschen?
answer: Sie widerspricht der Tatsache, dass der individuelle Wille und das individuelle Vergnügen die primäre Realität sind, nicht der kollektive Wille oder Besitz
wrong_answers:
  - Sie hindert die Staaten daran, die Justiz- und Polizeiverwaltung innerhalb ihrer territorialen Grenzen wirksam zu organisieren
  - Sie untergräbt die historische Legitimität, die Nationen im Laufe der Zeit durch kulturelle und sprachliche Einheit erworben haben
  - Sie schwächt die vertragliche Grundlage, da sie den Einzelnen zu unabhängig macht, um stabile Tarifverträge abzuschließen
explanation: |
  Die vorgestellte liberale Doktrin betont, dass individueller Wille und Genuss faktische Realitäten sind, während der kollektive Wille derivativ ist und nur durch Austausch und Vertrag entsteht. Im Text heißt es ausdrücklich: "Wir genießen die Dinge nicht kollektiv, wir haben keinen angeborenen kollektiven Willen, sondern einen individuellen Willen, der unser eigener ist" Wenn Nationen als übergeordnete Gebilde betrachtet werden, die über Individuen verfügen, kehrt dies das richtige Verhältnis um und leugnet die grundlegende Rolle der individuellen Autonomie in der politischen Organisation.
question: Според анализа на социалистическата непоследователност в текста, защо социалистите приемат териториалните граници между нациите, като същевременно отхвърлят индивидуалните права на собственост?
answer: Те остават в капана на древните племенни схващания, според които колективната собственост е била изключителна за другите племена, без да признават логичното продължение на индивидуалните права
wrong_answers:
  - Те вярват, че националните граници са естествени образувания, докато индивидуалната собственост е изкуствена социална конструкция, която създава неравенство
  - Те твърдят, че колективната собственост служи на общото благо, докато индивидуалната собственост води до експлоатация на работническата класа
  - Те твърдят, че териториалният суверенитет е необходим за опазването на културата, докато частната собственост подкопава социалната солидарност
explanation: |
  В текста се твърди, че социалистите все още са в плен на древните племенни схващания, според които колективната собственост върху ловните полета е била изключителна за другите племена. Това разкрива непоследователното им прилагане на правото на собственост - те защитават колективната собственост на национално ниво (граници и предели), докато отхвърлят същия логически принцип на индивидуално ниво. Авторът демонстрира това противоречие, като поставя въпроса защо правата на собственост трябва да се зачитат за групите, но не и за индивидите, предполагайки, че ако следваме логиката на колективната собственост до по-малките единици (микродържави, семейства), неизбежно стигаме до индивидуални права на собственост. Другите отговори представят общи социалистически аргументи, но пропускат специфичната критика на племенната концепция, представена в текста.
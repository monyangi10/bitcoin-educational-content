question: 根據文中對社會主義不一致的分析，為什麼社會主義者一方面接受國家間的領土界限，另一方面卻拒絕個人產權？
answer: 他們仍然受困於古代部落的觀念，在這種觀念中，集體財產對其他部落是專屬的，而沒有承認個人權利的邏輯延伸。
wrong_answers:
  - 他們相信國界是自然形成的，而個人財產是人為的社會建構，造成不平等。
  - 他們認為，集體所有制為共同利益服務，而個人財產則會導致工人階級受到剝削。
  - 他們認為，領土主權是文化保存的必要條件，而私有財產則會破壞社會團結。
explanation: |
  文中指出，社會主義者仍然是古代部落觀念的俘虜，在古代部落觀念中，狩獵場的集體財產是其他部落專有的。這揭示了他們對財產權不一致的應用 - 他們在國家層面上（邊界和疆界）捍衛集體財產，卻在個人層面上拒絕相同的邏輯原則。作者藉由質疑為何應該尊重群體的財產權，卻不尊重個人的財產權來證明這個矛盾，並提出如果我們依照集體財產的邏輯往下延伸到更小的單位 (微觀國家、家庭)，就必然會得出個人的財產權。其他答案代表了社會主義常見的論點，但錯過了文中提出的特定部落觀念批判。
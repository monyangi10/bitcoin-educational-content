question: بر اساس تحلیل متن از ناسازگاری سوسیالیستی، چرا سوسیالیست‌ها مرزهای سرزمینی بین کشورها را می‌پذیرند در حالی که حقوق مالکیت فردی را رد می‌کنند؟
answer: آن‌ها در تصورات قبیله‌ای باستانی گرفتار مانده‌اند، جایی که مالکیت جمعی به طور انحصاری به قبایل دیگر تعلق داشت بدون اینکه به گسترش منطقی حقوق فردی توجه کنند.
wrong_answers:
  - آن‌ها معتقدند که مرزهای ملی تشکیل‌های طبیعی هستند، در حالی که مالکیت فردی یک ساختار اجتماعی مصنوعی است که نابرابری ایجاد می‌کند.
  - آن‌ها استدلال می‌کنند که مالکیت جمعی به نفع عمومی خدمت می‌کند در حالی که مالکیت فردی به استثمار طبقه کارگر منجر می‌شود.
  - آن‌ها معتقدند که حاکمیت ارضی برای حفظ فرهنگی ضروری است در حالی که مالکیت خصوصی همبستگی اجتماعی را تضعیف می‌کند.
explanation: |
  متن استدلال می‌کند که سوسیالیست‌ها همچنان اسیر تصورات قبیله‌ای باستانی هستند که در آن مالکیت جمعی زمین‌های شکار به‌طور انحصاری به قبایل دیگر تعلق داشت. این نشان‌دهنده کاربرد ناهماهنگ حقوق مالکیت توسط آن‌هاست - آن‌ها از مالکیت جمعی در سطح ملی (مرزها و حدود) دفاع می‌کنند در حالی که همان اصل منطقی را در سطح فردی رد می‌کنند. نویسنده این تناقض را با پرسش از اینکه چرا حقوق مالکیت باید برای گروه‌ها محترم شمرده شود اما برای افراد نه، نشان می‌دهد و پیشنهاد می‌کند که اگر منطق مالکیت جمعی را به واحدهای کوچکتر (ریزکشورها، خانواده‌ها) دنبال کنیم، ناگزیر به حقوق مالکیت فردی می‌رسیم. پاسخ‌های دیگر نمایانگر استدلال‌های رایج سوسیالیستی هستند اما نقد خاص تصورات قبیله‌ای ارائه شده در متن را از دست می‌دهند.
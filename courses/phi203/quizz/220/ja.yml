question: 社会主義者の矛盾に関する本文の分析によれば、なぜ社会主義者は国家間の領土境界線を受け入れる一方で、個人の所有権を否定するのか？
answer: 彼らは、個人の権利への論理的な拡張を認識することなく、集団的財産が他の部族に排他的であった古代の部族的概念に囚われたままである。
wrong_answers:
  - 彼らは、国境は自然形成物であり、個人の所有権は不平等を生み出す人工的な社会構成物であると考えている。
  - 彼らは、集団所有は公益に役立つが、個人所有は労働者階級の搾取につながると主張する。
  - 彼らは、私有財産が社会的連帯を損なう一方で、領土主権は文化保護のために必要だと主張する。
explanation: |
  この文章は、社会主義者はいまだに、狩猟地の集団的所有権が他の部族に排他的であった古代の部族的観念の囚人であると論じている。彼らは国家レベル（国境と境界）では集団財産を擁護する一方で、個人レベルでは同じ論理原則を否定する。著者は、集団の財産権は尊重されるべきなのに、個人の財産権は尊重されないのはなぜか、という疑問によってこの矛盾を示し、集団の財産の論理をより小さな単位（ミクロ国家、家族）までたどれば、必然的に個人の財産権に行き着くことを示唆している。他の解答は、一般的な社会主義者の主張を代弁しているが、本文で提示されている具体的な部族概念の批判を見逃している。
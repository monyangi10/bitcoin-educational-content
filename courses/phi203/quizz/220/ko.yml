question: 본문의 사회주의 모순 분석에 따르면, 사회주의자들은 왜 개인의 재산권을 거부하면서 국가 간의 영토 경계를 인정하는가?
answer: 집단 재산이 개인의 권리로 논리적으로 확장되는 것을 인정하지 않고 다른 부족에게 배타적이었던 고대 부족의 개념에 갇혀 있습니다
wrong_answers:
  - 이들은 국가 경계는 자연적으로 형성된 것이고 개인의 재산은 불평등을 야기하는 인위적인 사회적 구조라고 생각합니다
  - 그들은 집단적 소유가 공동선에 기여하는 반면 개인 재산은 노동자 계급의 착취로 이어진다고 주장합니다
  - 그들은 영토 주권은 문화 보존을 위해 필요하지만 사유 재산은 사회적 연대를 약화시킨다고 주장합니다
explanation: |
  이 글은 사회주의자들이 여전히 사냥터의 집단적 재산이 다른 부족에게 배타적이었던 고대 부족 개념의 포로라고 주장합니다. 이는 국가적 차원(국경과 경계)에서는 집단적 재산을 옹호하면서 개인 차원에서는 동일한 논리적 원칙을 거부하는 그들의 일관성 없는 재산권 적용을 드러냅니다. 저자는 왜 집단에게는 재산권이 존중되어야 하지만 개인에게는 존중되지 않는지에 대한 의문을 제기함으로써 이러한 모순을 설명하며, 집단 재산의 논리를 더 작은 단위(소국가, 가족)로 내려가면 필연적으로 개인의 재산권에 도달할 수 있다고 제안합니다. 다른 답안들은 일반적인 사회주의자들의 주장을 대변하지만 본문에 제시된 구체적인 부족 개념에 대한 비판을 놓치고 있습니다.
question: Proč socialisté podle analýzy socialistické nekonzistence akceptují územní hranice mezi národy a zároveň odmítají individuální vlastnická práva?
answer: Zůstávají uvězněni v dávných kmenových představách, kdy kolektivní vlastnictví bylo výlučné pro ostatní kmeny, aniž by uznávali logické rozšíření na individuální práva
wrong_answers:
  - Domnívají se, že státní hranice jsou přirozené útvary, zatímco individuální vlastnictví je umělý sociální konstrukt, který vytváří nerovnost
  - Tvrdí, že kolektivní vlastnictví slouží společnému dobru, zatímco individuální vlastnictví vede k vykořisťování dělnické třídy
  - Tvrdí, že územní suverenita je nezbytná pro zachování kultury, zatímco soukromé vlastnictví podkopává sociální solidaritu
explanation: |
  Text tvrdí, že socialisté jsou stále zajatci dávných kmenových představ, kdy kolektivní vlastnictví lovišť bylo výlučné pro ostatní kmeny. To odhaluje jejich nedůsledné uplatňování vlastnických práv - hájí kolektivní vlastnictví na národní úrovni (hranice a pomezí), zatímco na úrovni jednotlivce stejný logický princip odmítají. Autor tento rozpor demonstruje otázkou, proč by měla být vlastnická práva respektována u skupin, ale ne u jednotlivců, a naznačuje, že pokud sledujeme logiku kolektivního vlastnictví až k menším celkům (mikrostáty, rodiny), nevyhnutelně dojdeme k individuálním vlastnickým právům. Ostatní odpovědi představují běžné socialistické argumenty, ale postrádají specifickou kritiku kmenového pojetí představenou v textu.
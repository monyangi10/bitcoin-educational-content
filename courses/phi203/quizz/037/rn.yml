question: Dushingiye ku nseguro ya Bastiat, ni ikihe kibazo gihuye n’ubwenge kiri mu majambo ya Proudhon ngo ‘itunga ni ubusuma’?
answer: Iyo umutungo ari ubusuma, rero ubusuma burahinduka umutungo, bikazana ukuvuguruzanya guhuye n’ubwenge .
wrong_answers:
  - Umutungo ntushobora kubaho ata mabwirizwa ya Leta n'inzego z'amategeko .
  - Ubusuma ni ububi mu vy'inyifato runtu mu gihe umutungo ari mwiza mu vy'inyifato runtu mu bihe vyose .
  - Itunga risaba kugira umubiri mu gihe ubusuma bujanye n'ukuronka mu gihe gito .
explanation: |
  Bastiat yerekanye ukuvuguruzanya kw’imbere guhuye n’ubwenge mu majambo azwi cane ya Proudhon mu kwerekana ko nitwemera ko umutungo ungana n’ubusuma, rero mu kwagura guhuye n’ubwenge ubusuma butegerezwa kuba bungana n’umutungo. Ivyo bituma habaho ivyiyumviro vy’uruziga bidashoboka aho ikintu cemewe kiba icarimwe kitari co. Ahubwo Bastiat yavuze ko umutungo ukomoka ku kazi, ku kwitunga no ku bushobozi bw’umuntu, ivyo bikaba bituma uba iciyumviro nyamukuru kandi gihuye n’ubwenge aho kuba uburyo bwo kwiba.
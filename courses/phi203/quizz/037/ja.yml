question: バスティアの分析によれば、プルードンの「財産は窃盗である」という発言の論理的な問題点は何か？
answer: 財産が窃盗であるならば、窃盗は財産になる。
wrong_answers:
  - 政府の規制や法的枠組みなしに財産は存在し得ない
  - 窃盗は道徳的に間違っているが、財産はあらゆる状況において道徳的に正しい
  - 財産は物理的な所有が必要だが、窃盗は一時的な取得を伴う
explanation: |
  バスティアは、財産イコール窃盗であることを認めれば、論理的延長として窃盗イコール財産でなければならないことを示すことで、プルードンの有名なフレーズの内部論理矛盾を実証した。これは、合法的なものが同時に非合法であるという不可能な循環的推論を生み出す。バスティアはその代わりに、財産は労働、自己所有、人間の能力から自然に派生するものであり、窃盗の一形態ではなく、基本的かつ論理的な概念であると主張した。
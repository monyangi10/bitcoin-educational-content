question: Според анализа на Бастиа, какъв е логическият проблем на твърдението на Прудон "собствеността е кражба"?
answer: Ако собствеността е кражба, тогава кражбата става собственост, което създава логическо противоречие
wrong_answers:
  - Собствеността не може да съществува без държавна регулация и правна рамка
  - Кражбата е морално погрешна, докато собствеността е морално право при всички обстоятелства
  - Собствеността изисква физическо притежание, докато кражбата включва временно придобиване
explanation: |
  Бастиа демонстрира вътрешното логическо противоречие в прочутата фраза на Прудон, като показва, че ако приемем, че собствеността е равна на кражба, то по логически път кражбата трябва да е равна на собствеността. Това създава невъзможна кръгова логика, при която нещо легитимно е едновременно нелегитимно. Вместо това Бастиа твърди, че собствеността естествено произтича от труда, собствеността и човешките способности, което я прави фундаментално и логично понятие, а не форма на кражба.
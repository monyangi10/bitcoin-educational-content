question: بر اساس تحلیل بَستیَت، مشکل منطقی با بیان پرودون 'مالکیت دزدی است' چیست؟
answer: اگر مالکیت دزدی است، پس دزدی تبدیل به مالکیت می‌شود و یک تناقض منطقی ایجاد می‌کند.
wrong_answers:
  - اموال نمی‌تواند بدون مقررات دولتی و چارچوب‌های قانونی وجود داشته باشد
  - دزدی از نظر اخلاقی نادرست است در حالی که مالکیت در همه شرایط از نظر اخلاقی درست است.
  - مالکیت نیاز به تصرف فیزیکی دارد در حالی که سرقت شامل تصاحب موقت است
explanation: |
  بستیا تناقض منطقی داخلی در عبارت معروف پرودون را با نشان دادن این که اگر بپذیریم مالکیت برابر با دزدی است، پس به طور منطقی دزدی باید برابر با مالکیت باشد، نشان داد. این منجر به یک استدلال دایره‌ای غیرممکن می‌شود که در آن چیزی مشروع به طور همزمان نامشروع است. بستیا به جای آن استدلال کرد که مالکیت به طور طبیعی از کار، مالکیت بر خود و توانایی‌های انسانی ناشی می‌شود و آن را به یک مفهوم اساسی و منطقی تبدیل می‌کند نه شکلی از دزدی.
question: Wat is volgens de analyse van Bastiat het logische probleem met de uitspraak van Proudhon 'eigendom is diefstal'?
answer: Als eigendom diefstal is, dan wordt diefstal eigendom, waardoor een logische tegenstrijdigheid ontstaat
wrong_answers:
  - Eigendom kan niet bestaan zonder overheidsregulering en wettelijke kaders
  - Diefstal is moreel verkeerd terwijl eigendom onder alle omstandigheden moreel juist is
  - Eigendom vereist fysiek bezit, terwijl diefstal tijdelijke verwerving inhoudt
explanation: |
  Bastiat toonde de interne logische tegenstrijdigheid in Proudhons beroemde zin aan door te laten zien dat als we accepteren dat eigendom gelijk staat aan diefstal, diefstal logischerwijs gelijk moet staan aan eigendom. Dit creëert een onmogelijke cirkelredenering waarbij iets legitiems tegelijkertijd illegitiem is. Bastiat stelde in plaats daarvan dat eigendom van nature voortkomt uit werk, zelfeigenaarschap en menselijke vermogens, waardoor het een fundamenteel en logisch concept is in plaats van een vorm van diefstal.
question: Quelles sont les trois principales formes de protectionnisme identifiées par les économistes libéraux du XIXᵉ  siècle comme des manifestations de non-liberté ?
answer: Protectionnisme tarifaire dans le commerce, barrières à l'obtention de licences professionnelles et lois anti-immigration
wrong_answers:
  - Monopoles industriels, subventions agricoles et réglementations bancaires
  - Contrôle des prix, restrictions salariales et manipulation des devises
  - Protection des brevets, fiscalité des entreprises et des privilèges des syndicats
explanation: |
  Le chapitre identifie spécifiquement trois formes de protectionnisme qui remplacent le libre-échange : le protectionnisme tarifaire (barrières douanières contre les marchandises étrangères), les "coutumes de la concurrence" (licences professionnelles qui limitent l'accès aux professions) et le protectionnisme des travailleurs par le biais de lois anti-immigration. Chacune de ces options représente un aspect différent de la restriction de la liberté —  dans le commerce, dans le travail et dans la circulation. Les autres options, bien que potentiellement des mesures protectionnistes, ne sont pas les trois formes spécifiques systématiquement analysées dans ce cadre économique libéral comme les principales manifestations de la non-liberté remplaçant la concurrence naturelle.

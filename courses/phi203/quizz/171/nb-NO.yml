question: Hvilke tre hovedformer for proteksjonisme identifiserte 1800-tallets liberale økonomer som uttrykk for ufrihet?
answer: Tariffproteksjonisme i handel, yrkesmessige lisensbarrierer og anti-immigrasjonslover
wrong_answers:
  - Industrimonopoler, landbrukssubsidier og bankreguleringer
  - Priskontroll, lønnsrestriksjoner og valutamanipulasjon
  - Patentbeskyttelse, bedriftsbeskatning og fagforeningsprivilegier
explanation: |
  Kapitlet identifiserer spesifikt tre former for proteksjonisme som erstatter fri utveksling: tollproteksjonisme (tollbarrierer mot utenlandske varer), "konkurranseskikker" (lisensiering som begrenser adgangen til yrker) og arbeidstakerproteksjonisme gjennom anti-immigrasjonslover. Hver av disse representerer ulike aspekter ved å begrense friheten - i handel, arbeid og bevegelse. Selv om de andre alternativene kan være proteksjonistiske tiltak, er de ikke de tre spesifikke formene som systematisk analyseres i dette liberale økonomiske rammeverket som de primære manifestasjonene av ufrihet som erstatter naturlig konkurranse.
question: รูปแบบการปกป้องสามประการหลักที่นักเศรษฐศาสตร์เสรีนิยมในศตวรรษที่ 19 ระบุว่าเป็นการแสดงออกของการไม่เสรีคืออะไร?
answer: การปกป้องทางภาษีในด้านการค้า, อุปสรรคในการออกใบอนุญาตวิชาชีพ, และกฎหมายต่อต้านการย้ายถิ่นฐาน
wrong_answers:
  - การผูกขาดทางอุตสาหกรรม, เงินอุดหนุนทางการเกษตร, และกฎระเบียบทางการธนาคาร
  - การควบคุมราคา, การจำกัดค่าจ้าง, และการแทรกแซงค่าเงิน
  - การคุ้มครองสิทธิบัตร, การเก็บภาษีของบริษัท, และสิทธิพิเศษของสหภาพแรงงาน
explanation: |
  บทนี้ระบุรูปแบบของการปกป้องสามรูปแบบที่แทนที่การแลกเปลี่ยนเสรี: การปกป้องด้วยภาษี (อุปสรรคทางศุลกากรต่อสินค้าต่างประเทศ), 'ธรรมเนียมของการแข่งขัน' (การออกใบอนุญาตวิชาชีพที่จำกัดการเข้าสู่วิชาชีพ), และการปกป้องแรงงานผ่านกฎหมายต่อต้านการย้ายถิ่นฐาน แต่ละรูปแบบแสดงถึงแง่มุมที่แตกต่างกันของการจำกัดเสรีภาพ - ในการค้า, ในการทำงาน, และในการเคลื่อนไหว ตัวเลือกอื่น ๆ แม้จะเป็นมาตรการปกป้องที่เป็นไปได้ แต่ไม่ใช่สามรูปแบบเฉพาะที่วิเคราะห์อย่างเป็นระบบในกรอบเศรษฐกิจเสรีนี้ว่าเป็นการแสดงออกหลักของการไม่เสรีที่แทนที่การแข่งขันตามธรรมชาติ
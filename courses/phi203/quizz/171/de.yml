question: Welches sind die drei Hauptformen des Protektionismus, die von den liberalen Ökonomen des 19. Jahrhunderts als Ausdruck der Unfreiheit identifiziert wurden?
answer: Zollprotektionismus im Handel, Berufszulassungsschranken und einwanderungsfeindliche Gesetze
wrong_answers:
  - Industriemonopole, Agrarsubventionen und Bankenregulierung
  - Preiskontrollen, Lohnbeschränkungen und Währungsmanipulation
  - Patentschutz, Unternehmensbesteuerung und Gewerkschaftsprivilegien
explanation: |
  In diesem Kapitel werden insbesondere drei Formen des Protektionismus genannt, die den freien Austausch ersetzen: Zollprotektionismus (Zollschranken gegen ausländische Waren), "Wettbewerbszölle" (Berufszulassungen, die den Zugang zu Berufen beschränken) und Arbeitnehmerprotektionismus durch einwanderungsfeindliche Gesetze. Jede dieser Optionen stellt einen anderen Aspekt der Einschränkung der Freiheit dar - im Handel, bei der Arbeit und bei der Freizügigkeit. Bei den anderen Optionen handelt es sich zwar um potenziell protektionistische Maßnahmen, aber nicht um die drei spezifischen Formen, die in diesem wirtschaftsliberalen Rahmen systematisch als die primären Manifestationen der Unfreiheit anstelle des natürlichen Wettbewerbs analysiert werden.
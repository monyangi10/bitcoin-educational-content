question: Mitkä ovat kolme protektionismin päämuotoa, jotka 1800-luvun liberaalit taloustieteilijät määrittelivät vapaudenvastaisuuden ilmentymiksi?
answer: Tariffiprotektionismi kaupassa, ammattipätevyyden esteet ja maahanmuuttovastaiset lait
wrong_answers:
  - Teollisuusmonopolit, maataloustuet ja pankkisäännökset
  - Hintakontrollit, palkkarajoitukset ja valuutan manipulointi
  - Patenttisuoja, yritysverotus ja ammattiliittojen etuoikeudet
explanation: |
  Luvussa yksilöidään erityisesti kolme protektionismin muotoa, jotka korvaavat vapaan vaihdon: tulliprotektionismi (tulliesteet ulkomaisia tavaroita vastaan), "kilpailutavat" (ammattilupien myöntäminen, joka rajoittaa ammatteihin pääsyä) ja työntekijöiden protektionismi maahanmuuttovastaisilla laeilla. Kukin niistä edustaa eri näkökohtaa vapauden rajoittamisessa - kaupassa, työssä ja liikkumisessa. Vaikka muut vaihtoehdot ovatkin potentiaalisesti protektionistisia toimenpiteitä, ne eivät ole niitä kolmea erityistä muotoa, joita analysoidaan järjestelmällisesti tässä liberaalissa talouskehyksessä luonnollisen kilpailun korvaavan vapauden puuttumisen ensisijaisina ilmenemismuotoina.
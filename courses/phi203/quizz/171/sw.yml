question: Ni aina gani tatu kuu za ulinzi zilizotambuliwa na wanauchumi huria wa karne ya 19 kama dhihirisho la kutokuwa na uhuru?
answer: Ulinzi wa ushuru katika biashara, vikwazo vya leseni za kitaalamu, na sheria za kupambana na uhamiaji
wrong_answers:
  - Ukiritimba wa viwanda, ruzuku za kilimo, na kanuni za benki
  - Udhibiti wa bei, vikwazo vya mishahara, na ubadilishaji wa sarafu
  - Ulinzi wa hati miliki, kodi ya makampuni, na marupurupu ya vyama vya wafanyakazi
explanation: |
  Sura hii inabainisha haswa aina tatu za ulinzi zinazochukua nafasi ya ubadilishaji huria: ulinzi wa ushuru (vizuizi vya forodha dhidi ya bidhaa za kigeni), 'mila za mashindano' (leseni za kitaalamu zinazopunguza kuingia katika taaluma), na ulinzi wa wafanyakazi kupitia sheria za kupambana na uhamiaji. Kila moja inawakilisha kipengele tofauti cha kuzuia uhuru - katika biashara, kazini, na katika harakati. Chaguzi zingine, ingawa zinaweza kuwa hatua za ulinzi, sio aina tatu maalum zilizochambuliwa kimfumo katika mfumo huu wa uchumi huria kama dhihirisho kuu la kutokuwa na uhuru kuchukua nafasi ya ushindani wa asili.
question: Apa saja tiga bentuk proteksionisme utama yang diidentifikasi oleh para ekonom liberal abad ke-19 sebagai manifestasi dari ketidakbebasan?
answer: Proteksionisme tarif dalam perdagangan, hambatan perizinan profesional, dan undang-undang anti-imigrasi
wrong_answers:
  - Monopoli industri, subsidi pertanian, dan peraturan perbankan
  - Kontrol harga, pembatasan upah, dan manipulasi mata uang
  - Perlindungan paten, perpajakan perusahaan, dan hak istimewa serikat pekerja
explanation: |
  Bab ini secara khusus mengidentifikasi tiga bentuk proteksionisme yang menggantikan pertukaran bebas: proteksionisme tarif (hambatan bea cukai terhadap barang-barang asing), 'bea cukai kompetisi' (perizinan profesional yang membatasi masuknya profesi), dan proteksionisme pekerja melalui undang-undang anti-imigrasi. Masing-masing mewakili aspek yang berbeda dalam membatasi kebebasan - dalam perdagangan, pekerjaan, dan pergerakan. Opsi-opsi lain, meskipun berpotensi menjadi tindakan proteksionis, bukanlah tiga bentuk spesifik yang dianalisis secara sistematis dalam kerangka kerja ekonomi liberal ini sebagai manifestasi utama dari non-kebebasan yang menggantikan persaingan alamiah.
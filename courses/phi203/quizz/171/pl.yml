question: Jakie są trzy główne formy protekcjonizmu zidentyfikowane przez XIX-wiecznych liberalnych ekonomistów jako przejawy braku wolności?
answer: Protekcjonizm taryfowy w handlu, bariery licencjonowania zawodowego i przepisy antyimigracyjne
wrong_answers:
  - Monopole przemysłowe, subsydia rolne i regulacje bankowe
  - Kontrola cen, ograniczenia płac i manipulacje walutowe
  - Ochrona patentowa, opodatkowanie przedsiębiorstw i przywileje związków zawodowych
explanation: |
  W rozdziale tym zidentyfikowano trzy formy protekcjonizmu, które zastępują swobodną wymianę: protekcjonizm taryfowy (bariery celne dla zagranicznych towarów), "zwyczaje zawodów" (licencjonowanie zawodowe, które ogranicza dostęp do zawodów) oraz protekcjonizm pracowniczy poprzez przepisy antyimigracyjne. Każda z nich reprezentuje inny aspekt ograniczania wolności - w handlu, w pracy i w przemieszczaniu się. Inne opcje, choć potencjalnie protekcjonistyczne, nie są trzema konkretnymi formami systematycznie analizowanymi w tych liberalnych ramach gospodarczych jako główne przejawy braku wolności zastępujące naturalną konkurencję.
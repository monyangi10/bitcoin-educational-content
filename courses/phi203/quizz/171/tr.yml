question: 19'uncu yüzyıl liberal ekonomistleri tarafından özgürlüksüzlüğün tezahürleri olarak tanımlanan üç ana korumacılık biçimi nelerdir?
answer: Ticarette tarife korumacılığı, mesleki lisans engelleri ve göçmenlik karşıtı yasalar
wrong_answers:
  - Endüstriyel tekeller, tarımsal sübvansiyonlar ve bankacılık düzenlemeleri
  - Fiyat kontrolleri, ücret kısıtlamaları ve döviz manipülasyonu
  - Patent koruması, kurumsal vergilendirme ve sendikal ayrıcalıklar
explanation: |
  Bu bölüm özellikle serbest mübadelenin yerini alan üç korumacılık biçimini tanımlamaktadır: tarife korumacılığı (yabancı mallara karşı gümrük engelleri), 'rekabet gümrükleri' (mesleklere girişi sınırlayan mesleki lisanslama) ve göçmenlik karşıtı yasalar yoluyla işçi korumacılığı. Her biri özgürlüğü kısıtlamanın farklı bir yönünü temsil ediyor - ticarette, işte ve harekette. Diğer seçenekler, potansiyel olarak korumacı önlemler olmakla birlikte, bu liberal ekonomik çerçevede doğal rekabetin yerini alan özgürlüksüzlüğün birincil tezahürleri olarak sistematik olarak analiz edilen üç özel biçim değildir.
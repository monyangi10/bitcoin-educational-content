question: 19世紀の自由主義経済学者が、非自由の現れとして指摘した保護主義の3つの主な形態とは？
answer: 貿易における関税保護主義、職業免許の障壁、移民排斥法
wrong_answers:
  - 産業独占、農業補助金、銀行規制
  - 価格統制、賃金制限、通貨操作
  - 特許保護、法人税、労働組合の特権
explanation: |
  この章では、自由な交換に取って代わる保護主義の3つの形態を具体的に挙げている。関税保護主義（外国製品に対する関税障壁）、「競争の慣習」（職業への参入を制限する職業免許）、そして移民排斥法を通じた労働者保護主義である。それぞれ、貿易、労働、移動の自由を制限する異なる側面を表している。他の選択肢は、潜在的に保護主義的な措置ではあるが、自然競争に代わる不自由の主要な現れとして、この自由主義経済の枠組みで体系的に分析された3つの具体的な形態ではない。
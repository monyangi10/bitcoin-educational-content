question: 根據文中所述，當國家取代父母參與教育時，會產生什麼基本問題？
answer: 國家缺乏父母對子女獨特個性的情感投入和深入瞭解
wrong_answers:
  - 國家提供比個別家長更標準、更有效率的教育方法
  - 不論父母的經濟地位或社會背景如何，國家確保平等的教育機會
  - 國家消除父母對自己子女自然流露的偏見和偏袒
explanation: |
  文中解釋，國家控制的教育代表著嚴重的矛盾，因為它以行政監督取代了自然的父母之愛。家長擁有對孩子無可取代的親切瞭解，以及對孩子成長的情感投資，而國家因為缺乏情感，無法欣賞每個孩子的獨特個性。這在國家教育的標準化方法和父母自然提供的個性化理解之間造成了根本性的不匹配。
question: Dukurikije ico canditswe, ni ingorane iyihe y’ishimikiro ivyuka iyo Leta isubiriye uruhara rw’abavyeyi mu burezi?
answer: Leta irabura ishoramari ry’inyiyumvo n’ubumenyi bwimbitse abavyeyi bafise ku bijanye n’imico yihariye y’abana babo .
wrong_answers:
  - Leta itanga uburyo bwo kwigisha bushingiye ku rugero kandi bukora neza kuruta uko abavyeyi ku giti cabo bashobora gutanga .
  - Leta iratuma abantu bose baronka uburezi mu buryo bungana ataco bafatiye ku vyerekeye ubutunzi bw'abavyeyi canke imibereho y'abavyeyi .
  - Leta irakuraho ukurobanura abavyeyi mu bisanzwe bagaragaza abana babo bwite .
explanation: |
  Ico canditswe kirasigura yuko inyigisho zigenzurwa na Leta zigereranya ukuvuguruzanya gukomeye kubera ko zisubirira urukundo rw’abavyeyi rusanzwe n’ubugenzuzi bw’ubutegetsi. Abavyeyi barafise ubumenyi bwimbitse butagira uko bungana bw’abana babo be n’ugushiramwo inyiyumvo mu gukura kwabo, mu gihe Leta, kubera ko idafise inyiyumvo, idashobora gushima ubuntu bwihariye bw’umwana wese. Ivyo bituma habaho ukudahuza kw’ishimikiro hagati y’uburyo busanzwe bwo kwigisha Leta n’ugutahura kw’umuntu ku giti ciwe abavyeyi batanga mu buryo busanzwe.
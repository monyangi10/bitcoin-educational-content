question: Secondo il testo, quale problema fondamentale sorge quando lo Stato sostituisce il coinvolgimento dei genitori nell'educazione?
answer: Lo Stato non ha l'investimento emotivo e la conoscenza intima che i genitori hanno della personalità unica dei loro figli
wrong_answers:
  - Lo Stato fornisce metodi educativi più standardizzati ed efficienti di quelli che possono offrire i singoli genitori
  - Lo Stato garantisce la parità di accesso all'istruzione a prescindere dallo status economico o dall'estrazione sociale dei genitori
  - Lo Stato elimina i pregiudizi e i favoritismi che i genitori mostrano naturalmente verso i propri figli
explanation: |
  Il testo spiega che l'educazione controllata dallo Stato rappresenta una grave contraddizione perché sostituisce l'amore naturale dei genitori con la supervisione amministrativa. I genitori possiedono un'insostituibile conoscenza intima dei loro figli e un investimento emotivo nel loro sviluppo, mentre lo Stato, essendo privo di sentimenti, non può apprezzare la personalità unica di ogni bambino. Questo crea una discrepanza fondamentale tra l'approccio standardizzato dell'istruzione statale e la comprensione individuale che i genitori forniscono naturalmente.
question: Kulingana na maandishi, ni tatizo gani la msingi linalotokea wakati serikali inapochukua nafasi ya ushiriki wa wazazi katika elimu?
answer: Jimbo halina uwekezaji wa kihisia na maarifa ya ndani ambayo wazazi wanayo kuhusu haiba za kipekee za watoto wao.
wrong_answers:
  - Jimbo hutoa mbinu za kielimu zenye viwango na ufanisi zaidi kuliko wazazi binafsi wanavyoweza kutoa
  - Serikali inahakikisha upatikanaji sawa wa elimu bila kujali hali ya kiuchumi ya wazazi au malezi ya kijamii
  - Serikali huondoa upendeleo na upendeleo ambao wazazi huonyesha kwa kawaida kwa watoto wao wenyewe
explanation: |
  Maandishi yanaelezea kwamba elimu inayodhibitiwa na serikali inawakilisha utata mkubwa kwa sababu inachukua nafasi ya upendo wa asili wa wazazi na usimamizi wa utawala. Wazazi wana ujuzi wa ndani usioweza kubadilishwa wa watoto wao na uwekezaji wa kihisia katika ukuaji wao, huku serikali, kwa kuwa haina hisia, haiwezi kuthamini utu wa kipekee wa kila mtoto. Hii inaunda tofauti kubwa kati ya mbinu sanifu ya elimu ya serikali na uelewa wa kibinafsi ambao wazazi hutoa kiasili.
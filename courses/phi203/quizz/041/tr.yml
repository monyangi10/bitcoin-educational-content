question: Metne göre, eğitimde ebeveyn katılımının yerini devlet aldığında hangi temel sorun ortaya çıkmaktadır?
answer: Devlet, ebeveynlerin çocuklarının benzersiz kişilikleri hakkında sahip oldukları duygusal yatırım ve yakın bilgiden yoksundur
wrong_answers:
  - Devlet, bireysel ebeveynlerin sunabileceğinden daha standart ve etkili eğitim yöntemleri sağlar
  - Devlet, ebeveynlerin ekonomik durumu veya sosyal geçmişinden bağımsız olarak eğitime eşit erişim sağlar
  - Devlet, ebeveynlerin kendi çocuklarına karşı doğal olarak gösterdikleri önyargı ve kayırmacılığı ortadan kaldırır
explanation: |
  Metin, devlet kontrolündeki eğitimin, doğal ebeveyn sevgisinin yerine idari gözetimi koyduğu için ciddi bir çelişki teşkil ettiğini açıklamaktadır. Ebeveynler çocukları hakkında yeri doldurulamaz mahrem bilgilere ve gelişimlerine yönelik duygusal yatırımlara sahipken, duygulardan yoksun olan devlet her çocuğun kendine özgü kişiliğini takdir edemez. Bu durum, devlet eğitiminin standartlaştırılmış yaklaşımı ile ebeveynlerin doğal olarak sağladığı bireyselleştirilmiş anlayış arasında temel bir uyumsuzluk yaratmaktadır.
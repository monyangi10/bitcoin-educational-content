question: Milline põhiprobleem tekib teksti kohaselt siis, kui riik asendab vanemate kaasamise hariduses?
answer: Riigil puuduvad emotsionaalsed investeeringud ja intiimsed teadmised, mis vanematel on oma laste ainulaadsete isiksuste kohta
wrong_answers:
  - Riik pakub standardsemaid ja tõhusamaid haridusmeetodeid, kui üksikud lapsevanemad suudavad pakkuda
  - Riik tagab võrdse juurdepääsu haridusele sõltumata vanemate majanduslikust seisundist või sotsiaalsest taustast
  - Riik kaotab eelarvamused ja eelistused, mida vanemad loomulikult oma laste suhtes üles näitavad
explanation: |
  Tekstis selgitatakse, et riiklikult kontrollitud haridus kujutab endast tõsist vastuolu, sest see asendab loomuliku vanemliku armastuse administratiivse järelevalvega. Vanematel on asendamatud intiimsed teadmised oma lastest ja emotsionaalne investeering nende arengusse, samas kui riik, kellel puuduvad tunded, ei suuda hinnata iga lapse ainulaadset isiksust. See tekitab põhimõttelise ebakõla riikliku hariduse standardiseeritud lähenemise ja vanemate poolt loomulikult pakutava individuaalse mõistmise vahel.
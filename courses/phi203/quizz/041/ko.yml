question: 본문에 따르면 국가가 부모의 교육 참여를 대체 할 때 어떤 근본적인 문제가 발생합니까?
answer: 국가는 부모가 자녀의 독특한 개성에 대해 가지고 있는 정서적 투자와 친밀한 지식이 부족합니다
wrong_answers:
  - 주정부는 개별 학부모가 제공할 수 있는 것보다 더 표준화되고 효율적인 교육 방법을 제공합니다
  - 국가는 부모의 경제적 지위나 사회적 배경에 관계없이 평등하게 교육받을 수 있도록 보장합니다
  - 국가는 부모가 자녀에게 자연스럽게 보이는 편견과 편애를 제거합니다
explanation: |
  이 글은 국가가 통제하는 교육이 자연스러운 부모의 사랑을 행정적 감독으로 대체하기 때문에 심각한 모순을 나타낸다고 설명합니다. 부모는 자녀에 대한 대체 불가능한 친밀한 지식과 자녀의 발달에 대한 정서적 투자를 가지고 있는 반면, 국가는 감정이 없기 때문에 각 어린이의 고유한 개성을 인정할 수 없습니다. 이로 인해 국가 교육의 표준화된 접근 방식과 부모가 자연스럽게 제공하는 개별화된 이해 사이에 근본적인 불일치가 발생합니다.
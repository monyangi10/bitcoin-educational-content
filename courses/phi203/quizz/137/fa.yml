question: مثال یک مالک ملک که می‌خواهد خانه‌اش را دوباره رنگ‌آمیزی کند، چه چیزی را درباره حقوق مالکیت مدرن تحت مقررات گسترده نشان می‌دهد؟
answer: مالک صرف به یک بهره‌بردار تبدیل شده است در حالی که جمع به طور مؤثر مالکیت ملک را در اختیار دارد.
wrong_answers:
  - مالک حقوق کامل مالکیت را حفظ می‌کند اما باید از دستورالعمل‌های زیبایی‌شناسی معقول پیروی کند.
  - دولت راهنمایی‌های مفیدی ارائه می‌دهد تا اطمینان حاصل شود که ارزش‌های املاک در جامعه پایدار باقی می‌مانند.
  - حقوق مالکیت فردی از طریق نظارت جمعی و فرآیندهای دموکراتیک تقویت می‌شوند.
explanation: |
  بر اساس تحلیل گوستاو دو مولیناری که در متن ارائه شده است، مالک ملکی که متوجه می‌شود نمی‌تواند آزادانه خانه‌اش را رنگ‌آمیزی کند، نشان می‌دهد که او دیگر واقعاً مالک نیست بلکه صرفاً یک بهره‌بردار است - کسی که حقوق استفاده موقت دارد. مالکیت واقعی به طور مؤثر به دولت یا جمع منتقل شده است که اکنون تعیین می‌کند که چگونه می‌توان از ملک استفاده کرد. این نشان می‌دهد که چگونه مقررات گسترده شکلی از سلب مالکیت را تشکیل می‌دهند که در آن افراد فکر می‌کنند مالک ملک هستند اما در واقع فقط حقوق استفاده محدودی تحت کنترل دولت دارند.
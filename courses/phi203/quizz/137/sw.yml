question: Mfano wa mmiliki wa mali anayetaka kupaka rangi upya nyumba yake unaonyesha nini kuhusu haki za kisasa za mali chini ya kanuni pana?
answer: Mmiliki amekuwa mdaiwa tu huku kundi likimiliki mali hiyo kikamilifu.
wrong_answers:
  - Mmiliki ana haki kamili za umiliki lakini lazima afuate miongozo inayofaa ya urembo
  - Jimbo linatoa mwongozo unaofaa ili kuhakikisha thamani za mali zinabaki thabiti katika jamii
  - Haki za mali za mtu binafsi huimarishwa kupitia usimamizi wa pamoja na michakato ya kidemokrasia
explanation: |
  Kulingana na uchambuzi wa Gustave de Molinari uliowasilishwa katika maandishi, mmiliki wa mali anayegundua kuwa hawezi kuchagua kwa uhuru kupaka rangi nyumba yake anaonyesha kwamba yeye si mmiliki tena wa kweli lakini amekuwa mtu wa kutumia mali yake kwa muda tu - mtu mwenye haki za matumizi ya muda. Umiliki halisi umehamishiwa kwa serikali au kwa pamoja, ambayo sasa inaamuru jinsi mali hiyo inavyoweza kutumika. Hii inaonyesha jinsi kanuni pana zinavyounda aina ya unyang'anyi ambapo watu wanaamini wanamiliki mali lakini kwa kweli wana haki ndogo za matumizi chini ya udhibiti wa serikali.
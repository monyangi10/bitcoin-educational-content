question: Mida illustreerib näide kinnisvaraomanikust, kes soovib oma maja ümber värvida, kaasaegse omandiõiguse kohta ulatusliku regulatsiooni raames?
answer: Omanik on muutunud üksnes kasutusvaldajaks, samas kui kollektiivile kuulub tegelikult vara
wrong_answers:
  - Omanikule jääb täielik omandiõigus, kuid ta peab järgima mõistlikke esteetilisi suuniseid
  - Riik annab kasulikke juhiseid, et tagada kinnisvara väärtuse püsivus kogukonnas
  - Individuaalsed omandiõigused on tugevdatud kollektiivse järelevalve ja demokraatlike protsesside kaudu
explanation: |
  Gustave de Molinari tekstis esitatud analüüsi kohaselt näitab kinnisvaraomanik, kes avastab, et ta ei saa vabalt valida oma maja ümbervärvimist, et ta ei ole enam tõeline omanik, vaid on muutunud lihtsalt kasutusvaldajaks - kellekski, kellel on ajutine kasutusõigus. Tegelik omandiõigus on tegelikult üle läinud riigile või kollektiivile, kes nüüd dikteerib, kuidas vara saab kasutada. See näitab, kuidas ulatuslikud eeskirjad kujutavad endast võõrandamise vormi, kus üksikisikud usuvad, et nad omavad vara, kuid tegelikult on neil ainult piiratud kasutusõigused riigi kontrolli all.
question: 広範な規制の下での現代の財産権について、家を塗り替えたいという所有者の例は何を示しているのだろうか？
answer: 所有者は単なる用益権者となり、集団は実質的に不動産を所有する。
wrong_answers:
  - 所有者は完全な所有権を保持するが、合理的な美的ガイドラインに従わなければならない。
  - 州は、地域の資産価値を安定させるために有益な指針を提供している。
  - 個人の財産権は、集団的監督と民主的プロセスを通じて強化される。
explanation: |
  本文で紹介されているギュスターヴ・ド・モリナーリの分析によれば、自分の家を自由に塗り替えることができないと知った所有者は、もはや真の所有者ではなく、一時的な使用権を持つ者、つまり使用権者に過ぎないことが明らかになる。実質的な所有権は事実上、国家や集団に移ったのであり、国家や集団は今や、その財産をどのように使用できるかを指示しているのである。このことは、広範な規制が、個人が財産を所有していると信じているが、実際には国家の管理下で限定的な使用権しか所有していないという、所有権剥奪の一形態であることを示している。
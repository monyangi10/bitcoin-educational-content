question: O que é que o exemplo de um proprietário que pretende pintar de novo a sua casa ilustra sobre os direitos de propriedade modernos sob regulamentos extensivos?
answer: O proprietário tornou-se um mero usufrutuário, enquanto o coletivo detém efetivamente a propriedade
wrong_answers:
  - O proprietário mantém todos os direitos de propriedade, mas deve seguir diretrizes estéticas razoáveis
  - O Estado fornece orientações úteis para garantir que os valores imobiliários permaneçam estáveis na comunidade
  - Os direitos de propriedade individuais são reforçados através de uma supervisão colectiva e de processos democráticos
explanation: |
  De acordo com a análise de Gustave de Molinari apresentada no texto, o proprietário que descobre que não pode escolher livremente repintar a sua casa revela que já não é verdadeiramente um proprietário, mas tornou-se apenas um usufrutuário - alguém com direitos de utilização temporários. A propriedade real foi efetivamente transferida para o Estado ou para a coletividade, que agora dita como a propriedade pode ser utilizada. Isto ilustra como a regulamentação extensiva constitui uma forma de desapropriação em que os indivíduos acreditam ser proprietários, mas na realidade apenas possuem direitos de utilização limitados sob o controlo do Estado.
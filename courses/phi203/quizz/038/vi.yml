question: Theo văn bản, điều gì xảy ra khi tài sản được sở hữu chung thay vì sở hữu tư nhân?
answer: Người dân không cảm thấy mình có quyền sở hữu thực sự và các nguồn lực bị bỏ bê nếu không có "con mắt của người lãnh đạo".
wrong_answers:
  - Người dân ngày càng quan tâm hơn đến việc duy trì và cải thiện các nguồn lực chung.
  - Chính phủ quản lý nguồn lực một cách hiệu quả thông qua các nhà quản trị chuyên nghiệp.
  - Nguồn lực được phân bổ đồng đều hơn giữa tất cả các thành viên trong xã hội.
explanation: |
  Phân tích của Paul Leroy-Beaulieu cho thấy quyền sở hữu tập thể tạo ra một vấn đề cơ bản: khi về mặt lý thuyết, mọi người chỉ sở hữu một phần nhỏ của một thứ gì đó (như một khu rừng công cộng), không ai cảm thấy mình là chủ sở hữu thực sự. Điều này dẫn đến việc mất đi "con mắt của người chủ" - sự quan tâm và chăm sóc đặc biệt mà chỉ một chủ sở hữu thực sự mới có thể cung cấp. Nếu thiếu đi sự đầu tư cá nhân này, các nguồn lực sẽ bị bỏ bê và sử dụng không hiệu quả. Quyền sở hữu tư nhân tạo ra những động lực mạnh mẽ cho việc bảo trì và cải thiện mà quyền sở hữu tập thể không thể sao chép, vì các cá nhân có lợi ích trực tiếp trong việc bảo tồn và nâng cao giá trị tài sản của họ.
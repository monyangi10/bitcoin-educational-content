question: According to the text, what happens when property is held collectively rather than privately?
answer: Citizens feel no real ownership and resources are neglected without 'the master's eye'
wrong_answers:
  - Citizens become more invested in maintaining and improving the shared resources
  - The government efficiently manages resources through professional administrators
  - Resources are distributed more equally among all members of society
explanation: |
  Paul Leroy-Beaulieu's analysis shows that collective ownership creates a fundamental problem: when everyone theoretically owns a tiny fraction of something (like a public forest), no one feels like a real owner. This leads to the loss of 'the master's eye' - the special attention and care that only a true owner provides. Without this personal investment, resources become neglected and underutilized. Private ownership creates strong incentives for maintenance and improvement that collective ownership cannot replicate, as individuals have direct stakes in preserving and enhancing their property's value.
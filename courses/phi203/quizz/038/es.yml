question: Según el texto, ¿qué ocurre cuando la propiedad es colectiva y no privada?
answer: Los ciudadanos no se sienten realmente propietarios y los recursos se descuidan sin "el ojo del amo
wrong_answers:
  - Los ciudadanos se implican más en el mantenimiento y la mejora de los recursos compartidos
  - El Gobierno gestiona eficazmente los recursos a través de administradores profesionales
  - Los recursos se distribuyen de forma más equitativa entre todos los miembros de la sociedad
explanation: |
  El análisis de Paul Leroy-Beaulieu demuestra que la propiedad colectiva crea un problema fundamental: cuando todo el mundo posee teóricamente una pequeña fracción de algo (como un bosque público), nadie se siente propietario real. Esto lleva a la pérdida de la "mirada del amo", la atención y el cuidado especiales que sólo proporciona un verdadero propietario. Sin esta inversión personal, los recursos se descuidan y se infrautilizan. La propiedad privada crea fuertes incentivos para el mantenimiento y la mejora que la propiedad colectiva no puede reproducir, ya que los individuos tienen intereses directos en preservar y aumentar el valor de su propiedad.
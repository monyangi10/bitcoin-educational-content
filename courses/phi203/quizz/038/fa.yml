question: بر اساس متن، وقتی که مالکیت به صورت جمعی نگه داشته می‌شود به جای خصوصی، چه اتفاقی می‌افتد؟
answer: شهروندان احساس مالکیت واقعی نمی‌کنند و منابع بدون «چشم ارباب» نادیده گرفته می‌شوند.
wrong_answers:
  - شهروندان بیشتر به حفظ و بهبود منابع مشترک علاقه‌مند می‌شوند
  - دولت منابع را از طریق مدیران حرفه‌ای به‌طور کارآمد مدیریت می‌کند
  - منابع به طور مساوی‌تری در میان همه اعضای جامعه توزیع می‌شوند.
explanation: |
  تحلیل پل لروی-بالیو نشان می‌دهد که مالکیت جمعی یک مشکل اساسی ایجاد می‌کند: وقتی همه به‌طور نظری مالک بخش کوچکی از چیزی هستند (مانند یک جنگل عمومی)، هیچ‌کس احساس مالکیت واقعی نمی‌کند. این منجر به از دست رفتن 'چشم صاحب' می‌شود - توجه و مراقبتی ویژه که تنها یک مالک واقعی ارائه می‌دهد. بدون این سرمایه‌گذاری شخصی، منابع نادیده گرفته شده و کمتر مورد استفاده قرار می‌گیرند. مالکیت خصوصی انگیزه‌های قوی برای نگهداری و بهبود ایجاد می‌کند که مالکیت جمعی نمی‌تواند تکرار کند، زیرا افراد به‌طور مستقیم در حفظ و افزایش ارزش ملک خود سهیم هستند.
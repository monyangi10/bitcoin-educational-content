question: 根据课文内容，当财产由集体而非私人持有时，会发生什么情况？
answer: 公民没有真正的主人翁感，资源在没有 "主人的眼睛 "的情况下被忽视
wrong_answers:
  - 公民更多地参与维护和改善共享资源
  - 政府通过专业管理人员有效管理资源
  - 资源在社会所有成员之间的分配更加平等
explanation: |
  保罗-勒鲁瓦-博略（Paul Leroy-Beaulieu）的分析表明，集体所有权产生了一个根本问题：当每个人理论上都拥有某样东西（如公共森林）的一小部分时，没有人会觉得自己是真正的主人。这就导致了 "主人之眼 "的缺失--只有真正的主人才会给予特别的关注和照顾。没有这种个人投资，资源就会被忽视和利用不足。私人所有权为维护和改善创造了强大的激励机制，这是集体所有权所无法复制的，因为个人在维护和提升其财产价值方面有着直接的利害关系。
question: Co se podle textu stane, když je majetek držen kolektivně, a ne soukromě?
answer: Občané nemají pocit skutečného vlastnictví a zdroje jsou zanedbávány bez "dohledu pána"
wrong_answers:
  - Občané se více zapojí do udržování a zlepšování sdílených zdrojů
  - Vláda efektivně spravuje zdroje prostřednictvím profesionálních správců
  - Zdroje jsou rovnoměrněji rozděleny mezi všechny členy společnosti
explanation: |
  Analýza Paula Leroy-Beaulieua ukazuje, že kolektivní vlastnictví vytváří zásadní problém: když každý teoreticky vlastní jen malou část něčeho (například veřejného lesa), nikdo se necítí jako skutečný vlastník. To vede ke ztrátě "pánova oka" - zvláštní pozornosti a péče, kterou poskytuje pouze skutečný vlastník. Bez této osobní investice se zdroje stávají zanedbanými a nedostatečně využívanými. Soukromé vlastnictví vytváří silné pobídky k údržbě a zlepšování, které kolektivní vlastnictví nemůže zopakovat, protože jednotlivci mají přímý zájem na zachování a zvýšení hodnoty svého majetku.
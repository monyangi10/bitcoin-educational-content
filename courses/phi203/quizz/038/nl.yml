question: Wat gebeurt er volgens de tekst als eigendom collectief wordt gehouden in plaats van privé?
answer: Burgers voelen zich niet echt eigenaar en hulpbronnen worden verwaarloosd zonder 'het oog van de meester'
wrong_answers:
  - Burgers raken meer betrokken bij het onderhouden en verbeteren van de gedeelde bronnen
  - De overheid beheert de middelen efficiënt via professionele bestuurders
  - Hulpbronnen worden gelijker verdeeld over alle leden van de samenleving
explanation: |
  Paul Leroy-Beaulieu's analyse toont aan dat collectief eigendom een fundamenteel probleem creëert: wanneer iedereen theoretisch eigenaar is van een klein deel van iets (zoals een openbaar bos), voelt niemand zich een echte eigenaar. Dit leidt tot het verlies van 'het oog van de meester' - de speciale aandacht en zorg die alleen een echte eigenaar geeft. Zonder deze persoonlijke investering worden hulpbronnen verwaarloosd en onderbenut. Privé-eigendom creëert sterke stimulansen voor onderhoud en verbetering die collectief eigendom niet kan evenaren, aangezien individuen een direct belang hebben bij het behoud en de waardevermeerdering van hun eigendom.
question: Mitä tapahtuu tekstin mukaan, kun omaisuutta pidetään kollektiivisesti eikä yksityisesti?
answer: Kansalaiset eivät tunne todellista omistajuutta, ja resursseja laiminlyödään ilman "isännän silmää"
wrong_answers:
  - Kansalaiset sitoutuvat entistä enemmän yhteisten resurssien ylläpitoon ja parantamiseen
  - Hallitus hallinnoi resursseja tehokkaasti ammattitaitoisten hallintovirkamiesten avulla
  - Resurssit jakautuvat tasaisemmin kaikkien yhteiskunnan jäsenten kesken
explanation: |
  Paul Leroy-Beaulieun analyysi osoittaa, että yhteisomistus aiheuttaa perustavanlaatuisen ongelman: kun kaikki teoreettisesti omistavat pienen osan jostakin (kuten julkisesta metsästä), kukaan ei tunne itseään todelliseksi omistajaksi. Tämä johtaa siihen, että "isännän silmä" - erityinen huomio ja huolenpito, jota vain todellinen omistaja tarjoaa - katoaa. Ilman tätä henkilökohtaista panostusta resurssit jäävät huomiotta ja vajaakäyttöisiksi. Yksityisomistus luo voimakkaita kannustimia kunnossapitoon ja parantamiseen, joita kollektiivinen omistus ei pysty toistamaan, koska yksilöillä on suora intressi säilyttää ja nostaa omaisuutensa arvoa.
question: Was passiert laut Text, wenn Eigentum nicht privat, sondern kollektiv gehalten wird?
answer: Die Bürger fühlen sich nicht wirklich verantwortlich und die Ressourcen werden ohne das "Auge des Meisters" vernachlässigt
wrong_answers:
  - Die Bürger engagieren sich stärker für die Erhaltung und Verbesserung der gemeinsamen Ressourcen
  - Die Regierung verwaltet die Ressourcen effizient mit Hilfe professioneller Verwalter
  - Die Ressourcen werden gleichmäßiger auf alle Mitglieder der Gesellschaft verteilt
explanation: |
  Paul Leroy-Beaulieus Analyse zeigt, dass kollektives Eigentum ein grundlegendes Problem mit sich bringt: Wenn jeder theoretisch einen winzigen Bruchteil von etwas besitzt (wie einen öffentlichen Wald), fühlt sich niemand als echter Eigentümer. Dies führt zum Verlust des "Blicks des Eigentümers" - der besonderen Aufmerksamkeit und Pflege, die nur ein echter Eigentümer bietet. Ohne diese persönliche Investition werden die Ressourcen vernachlässigt und nicht ausreichend genutzt. Privateigentum schafft starke Anreize für Instandhaltung und Verbesserung, die kollektives Eigentum nicht bieten kann, da der Einzelne ein direktes Interesse daran hat, den Wert seines Eigentums zu erhalten und zu steigern.
question: 根據文中所述，當財產為集體持有而非私人持有時，會發生什麼情況？
answer: 民眾覺得沒有真正的擁有權，沒有「主人的眼睛」，資源就會被忽視。
wrong_answers:
  - 公民更加投入於維護和改善共用資源
  - 政府透過專業的管理人員有效率地管理資源
  - 資源更平均地分配給社會所有成員
explanation: |
  Paul Leroy-Beaulieu 的分析顯示，集體所有權產生了一個根本性的問題：當理論上每個人都擁有一個極小部分的東西（例如公共森林）時，沒有人會覺得自己是真正的所有者。這會導致失去「主人的眼光」，也就是只有真正的所有者才會提供的特別關注與照顧。如果沒有這種個人投資，資源就會被忽視和利用不足。私人所有權為維護和改善創造了強大的誘因，這是集體所有權無法複製的，因為個人在維護和提升其物業價值上有直接的利害關係。
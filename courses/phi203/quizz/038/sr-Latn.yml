question: Prema tekstu, šta se dešava kada se imovina drži kolektivno, a ne privatno?
answer: Građani ne osećaju pravo vlasništvo i resursi se zanemaruju bez 'gospodarevog oka'
wrong_answers:
  - Građani postaju više zainteresovani za održavanje i unapređenje zajedničkih resursa
  - Vlada efikasno upravlja resursima putem profesionalnih administratora.
  - Resursi su raspodeljeni ravnomernije među svim članovima društva
explanation: |
  Analiza Paula Leroy-Beaulieua pokazuje da kolektivno vlasništvo stvara fundamentalni problem: kada svako teoretski poseduje mali deo nečega (poput javne šume), niko se ne oseća kao pravi vlasnik. To dovodi do gubitka 'gospodarevog oka' - posebne pažnje i brige koju pruža samo pravi vlasnik. Bez ove lične investicije, resursi postaju zapostavljeni i nedovoljno iskorišćeni. Privatno vlasništvo stvara snažne podsticaje za održavanje i unapređenje koje kolektivno vlasništvo ne može da replicira, jer pojedinci imaju direktan interes u očuvanju i povećanju vrednosti svoje imovine.
question: De acordo com o texto, o que acontece quando a propriedade é detida coletivamente e não de forma privada?
answer: Os cidadãos não se sentem verdadeiramente proprietários e os recursos são negligenciados sem o "olho do dono
wrong_answers:
  - Os cidadãos investem mais na manutenção e melhoria dos recursos partilhados
  - O governo gere eficazmente os recursos através de administradores profissionais
  - Os recursos são distribuídos de forma mais equitativa entre todos os membros da sociedade
explanation: |
  A análise de Paul Leroy-Beaulieu mostra que a propriedade colectiva cria um problema fundamental: quando todos possuem teoricamente uma pequena fração de algo (como uma floresta pública), ninguém se sente verdadeiramente proprietário. Isto leva à perda do "olhar do mestre" - a atenção e os cuidados especiais que só um verdadeiro proprietário proporciona. Sem este investimento pessoal, os recursos tornam-se negligenciados e subutilizados. A propriedade privada cria fortes incentivos à manutenção e ao melhoramento que a propriedade colectiva não consegue reproduzir, uma vez que os indivíduos têm interesses diretos na preservação e no aumento do valor da sua propriedade.
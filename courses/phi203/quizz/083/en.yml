question: According to Paul Leroy-Beaulieu, what consequence does the increasingly intellectual character of work have for the situation of women in modern economies?
answer: Women's value and productive contribution rise dramatically, making it impossible to confine them to the household without cutting society off from the intelligence of half of humanity
wrong_answers:
  - Women's situation improves because intellectual work creates more leisure time, allowing society to gradually recognize their rights through democratic debate
  - The intellectual economy benefits women primarily by making domestic management more complex, raising the status of household work to professional levels
  - Women gain economic equality mainly through access to higher education, which intellectual economies are forced to provide once literacy becomes widespread
explanation: |
  Paul Leroy-Beaulieu analyzed in his work on the distribution of wealth how the increasingly intellectual character of work enriches new layers of society, especially women. As intelligence and creative capacity become the central productive inputs, the old rationale for excluding women from economic life — that their contribution was limited by inferior physical strength — collapses entirely. The text states that one can no longer confine women to the household without cutting society off from the intelligence of half of humanity, an intelligence needed for innovation, technical improvement, and general productive advancement.

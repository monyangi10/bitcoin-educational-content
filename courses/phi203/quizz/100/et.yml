question: Milline põhiline omadus teeb majandusteooria kohaselt vabatahtliku vahetuse ühiskonnale kasulikuks?
answer: Exchange on positiivse summaga mäng, kus mõlemad pooled saavad vastastikust kasu
wrong_answers:
  - Exchange loob materiaalset jõukust, muutes tooraineid valmistoodanguks
  - Exchange jaotab ressursid jõukatelt osalejatelt võrdselt ümber vaestele osalejatele
  - Exchange kõrvaldab nappuse, maksimeerides kättesaadavate kaupade üldkoguse
explanation: |
  Vabatahtlik vahetus on põhimõtteliselt positiivse summaga mäng, sest mõlemad osapooled astuvad tehingusse, eeldades, et nad saavad kasu, sest vastasel juhul otsustaksid nad lihtsalt mitte osaleda. Nagu näitas Abbé de Saint-Pierre'i analüüs, saavad kaupmeeste vahelise müügi korral kasu nii müüja kui ka ostja - müüja ei müüks selle hinnaga ja ostja ei ostaks, kui mõlemad ei leiaks, et see on kasulik. See vastastikuse kasu põhimõte selgitab, miks kaubavahetuse mitmekordistamine rikastab ühiskonda, samas kui kaubanduse vähendamine vähendab heaolu. Teised valikud on valed, sest vahetus ei loo materiaalset rikkust (see loob kasu), ei jaga rikkust võrdselt ümber ja ei kõrvalda puudust, vaid optimeerib ressursside jaotust vabatahtliku koostöö kaudu.
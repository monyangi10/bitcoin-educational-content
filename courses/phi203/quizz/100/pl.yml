question: Zgodnie z teorią ekonomii, jaka podstawowa cecha sprawia, że dobrowolna wymiana jest korzystna dla społeczeństwa?
answer: Exchange to gra o sumie dodatniej, w której obie strony odnoszą obopólne korzyści
wrong_answers:
  - Exchange tworzy bogactwo materialne poprzez przekształcanie surowców w gotowe produkty
  - Exchange redystrybuuje zasoby od bogatych do biednych uczestników w równym stopniu
  - Exchange eliminuje niedobór poprzez maksymalizację całkowitej ilości dostępnych dóbr
explanation: |
  Dobrowolna wymiana jest zasadniczo grą o sumie dodatniej, ponieważ obie strony wchodzą w transakcję oczekując korzyści, w przeciwnym razie po prostu zdecydowałyby się nie angażować. Jak pokazuje analiza Abbé de Saint-Pierre'a, gdy dochodzi do sprzedaży między kupcami, zyskują zarówno sprzedający, jak i kupujący - sprzedający nie sprzedałby po tej cenie, a kupujący nie kupiłby, gdyby obaj nie uznali tego za korzystne. Ta zasada wzajemnych korzyści wyjaśnia, dlaczego mnożenie wymiany wzbogaca społeczeństwa, podczas gdy ograniczanie handlu zmniejsza dobrobyt. Pozostałe opcje są błędne, ponieważ wymiana nie tworzy bogactwa materialnego (tworzy użyteczność), nie redystrybuuje bogactwa w równym stopniu i nie eliminuje niedoboru, ale raczej optymalizuje alokację zasobów poprzez dobrowolną współpracę.
question: Según la teoría económica, ¿qué característica fundamental hace que el intercambio voluntario sea beneficioso para la sociedad?
answer: Exchange es un juego de suma positiva en el que ambas partes obtienen beneficios mutuos
wrong_answers:
  - Exchange crea riqueza material transformando las materias primas en productos acabados
  - Exchange redistribuye equitativamente los recursos de los participantes ricos a los pobres
  - Exchange elimina la escasez maximizando la cantidad total de bienes disponibles
explanation: |
  El intercambio voluntario es fundamentalmente un juego de suma positiva porque ambas partes entran en la transacción esperando beneficiarse, de lo contrario simplemente optarían por no participar. Como demuestra el análisis del Abate de Saint-Pierre, cuando se produce una venta entre comerciantes, tanto el vendedor como el comprador salen ganando: el vendedor no vendería a ese precio y el comprador no compraría a menos que ambos lo considerasen ventajoso. Este principio de beneficio mutuo explica por qué la multiplicación de los intercambios enriquece a las sociedades, mientras que la reducción del comercio disminuye la prosperidad. Las otras opciones son incorrectas porque el intercambio no crea riqueza material (crea utilidad), no redistribuye la riqueza equitativamente y no elimina la escasez, sino que optimiza la asignación de recursos mediante la cooperación voluntaria.
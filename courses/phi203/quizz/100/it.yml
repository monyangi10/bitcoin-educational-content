question: Secondo la teoria economica, quale caratteristica fondamentale rende lo scambio volontario vantaggioso per la società?
answer: Il Exchange è un gioco a somma positiva in cui entrambe le parti ottengono vantaggi reciproci
wrong_answers:
  - Il Exchange crea ricchezza materiale trasformando le materie prime in prodotti finiti
  - Exchange ridistribuisce equamente le risorse dai partecipanti ricchi a quelli poveri
  - Il Exchange elimina la scarsità massimizzando la quantità totale di beni disponibili
explanation: |
  Lo scambio volontario è fondamentalmente un gioco a somma positiva perché entrambe le parti entrano nella transazione aspettandosi di trarne beneficio, altrimenti sceglierebbero semplicemente di non impegnarsi. Come dimostra l'analisi dell'Abbé de Saint-Pierre, quando si verifica una vendita tra mercanti, sia il venditore che l'acquirente ci guadagnano: il venditore non venderebbe a quel prezzo e l'acquirente non acquisterebbe se entrambi non lo trovassero vantaggioso. Questo principio di mutuo vantaggio spiega perché la moltiplicazione degli scambi arricchisce le società, mentre la riduzione del commercio diminuisce la prosperità. Le altre opzioni non sono corrette perché lo scambio non crea ricchezza materiale (crea utilità), non ridistribuisce equamente la ricchezza e non elimina la scarsità, ma ottimizza l'allocazione delle risorse attraverso la cooperazione volontaria.
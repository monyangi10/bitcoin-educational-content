question: 根据经济学理论，自愿交换对社会有益的基本特征是什么？
answer: Exchange 是一种正和博弈，双方互惠互利
wrong_answers:
  - Exchange 将原材料转化为制成品，创造物质财富
  - Exchange 将富裕参与者的资源平等地重新分配给贫穷参与者
  - Exchange 通过最大化可用商品的总量来消除稀缺性
explanation: |
  自愿交换从根本上说是一种正和游戏，因为交易双方都期望从中获益，否则他们就会选择不参与。正如 Abbé de Saint-Pierre 的分析所示，当商人之间发生交易时，卖方和买方都会受益--除非双方都觉得有利，否则卖方不会以这个价格出售，买方也不会购买。这一互利原则解释了为什么交换的增加会使社会更加富裕，而商业的减少会使社会更加不繁荣。其他选项都不正确，因为交换并不创造物质财富（而是创造效用），并不平等地重新分配财富，也不消除稀缺性，而是通过自愿合作优化资源配置。
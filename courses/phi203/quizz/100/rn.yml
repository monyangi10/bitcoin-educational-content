question: Dushingiye ku ciyumviro c’ubutunzi, ni ikihe kintu nyamukuru gituma uguhinduranya ibintu ku bushake bigira akamaro ku kibano?
answer: Exchange ni umukino w'amahera meza aho abo bompi baronkera inyungu
wrong_answers:
  - Exchange irema ubutunzi bw'ibintu mu guhindura ibikoresho vya mbere bikaba ibintu bimaze
  - Exchange isubira gusangira ubutunzi buva ku batunzi buja ku bakene mu buryo bungana
  - Exchange irakuraho ubukene mu kwongerera umubare wose w'ibicuruzwa biriho
explanation: |
  Guhinduranya ubushake ni urukino rw’amahera meza kubera ko abo bompi binjira muri iyo nzira biteze ko bazoronka inyungu, ahandi ho bohitamwo gusa kutagira ico bakora. Nk’uko vyerekanwa n’isesengura rya Abbé de Saint-Pierre, iyo habaye ugurisha hagati y’abadandaza, uwugurisha n’uwuguze bompi bararonka inyungu - uwugurisha ntiyogurisha kuri ico gici- ro kandi uwuguze ntiyogura kiretse bompi basanze ari vyiza. Iryo hame ry’ugusangira inyungu rirasigura igituma kugwiza ubucuruzi bitunganya imibano mu gihe kugabanya ubudandaji bigabanya uguterimbere. Ayandi mahitamwo ntaco amaze kuko uguhinduranya ntibituma haba ubutunzi bw’ibintu (bituma umuntu agira akamaro), ntibisubira gusangira ubutunzi mu buryo bungana, kandi ntibikuraho ubukene ahubwo bituma ubutunzi bugenda neza biciye mu gukorana n’abandi ku bushake.
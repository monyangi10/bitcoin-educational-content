question: Theo lý thuyết kinh tế, đặc điểm cơ bản nào khiến cho việc trao đổi tự nguyện có lợi cho xã hội?
answer: Exchange là một trò chơi có tổng bằng có, trong đó cả hai bên đều thu được lợi ích chung.
wrong_answers:
  - Exchange tạo ra của cải vật chất bằng cách chuyển đổi nguyên liệu thô thành hàng hóa hoàn chỉnh.
  - Exchange phân phối lại nguồn lực từ người giàu sang người nghèo một cách công bằng.
  - Exchange loại bỏ tình trạng khan hiếm bằng cách tối đa hóa tổng lượng hàng hóa có sẵn.
explanation: |
  Trao đổi tự nguyện về bản chất là một trò chơi có tổng lợi ích dương vì cả hai bên tham gia giao dịch đều kỳ vọng thu được lợi ích, nếu không họ sẽ đơn giản là không tham gia. Như phân tích của Abbé de Saint-Pierre đã chứng minh, khi một giao dịch mua bán diễn ra giữa các thương nhân, cả người bán và người mua đều có lợi - người bán sẽ không bán với giá đó và người mua sẽ không mua trừ khi cả hai đều thấy có lợi. Nguyên tắc cùng có lợi này giải thích tại sao việc gia tăng trao đổi làm giàu cho xã hội trong khi việc giảm thương mại làm giảm sự thịnh vượng. Các lựa chọn khác là không chính xác vì trao đổi không tạo ra của cải vật chất (nó tạo ra tiện ích), không phân phối lại của cải một cách bình đẳng và không loại bỏ sự khan hiếm mà chỉ tối ưu hóa việc phân bổ nguồn lực thông qua sự hợp tác tự nguyện.
question: Ekonomi teorisine göre, gönüllü mübadeleyi toplum için faydalı kılan temel özellik nedir?
answer: Exchange, her iki tarafın da karşılıklı fayda sağladığı pozitif toplamlı bir oyundur
wrong_answers:
  - Exchange hammaddeleri mamul mallara dönüştürerek maddi zenginlik yaratır
  - Exchange kaynakları zengin katılımcılardan yoksul katılımcılara eşit olarak yeniden dağıtır
  - Exchange mevcut malların toplam miktarını maksimize ederek kıtlığı ortadan kaldırır
explanation: |
  Gönüllü mübadele temelde pozitif toplamlı bir oyundur çünkü her iki taraf da fayda elde etmeyi umarak işleme girer, aksi takdirde basitçe katılmamayı seçerler. Abbé de Saint-Pierre'in analizinin de gösterdiği gibi, tüccarlar arasında bir satış gerçekleştiğinde, hem satıcı hem de alıcı kazançlı çıkar - satıcı o fiyata satmaz ve alıcı da her ikisi de avantajlı bulmasaydı satın almazdı. Bu karşılıklı fayda ilkesi, mübadeleleri çoğaltmanın toplumları zenginleştirirken ticareti azaltmanın refahı neden azalttığını açıklar. Diğer seçenekler yanlıştır çünkü mübadele maddi zenginlik yaratmaz (fayda yaratır), zenginliği eşit olarak yeniden dağıtmaz ve kıtlığı ortadan kaldırmaz, bunun yerine gönüllü işbirliği yoluyla kaynak tahsisini optimize eder.
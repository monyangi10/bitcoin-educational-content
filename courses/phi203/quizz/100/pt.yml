question: De acordo com a teoria económica, que caraterística fundamental torna a troca voluntária benéfica para a sociedade?
answer: O Exchange é um jogo de soma positiva em que ambas as partes obtêm benefícios mútuos
wrong_answers:
  - O Exchange cria riqueza material ao transformar matérias-primas em produtos acabados
  - O Exchange redistribui igualmente os recursos dos participantes ricos para os pobres
  - O Exchange elimina a escassez ao maximizar a quantidade total de bens disponíveis
explanation: |
  A troca voluntária é fundamentalmente um jogo de soma positiva porque ambas as partes entram na transação na expetativa de beneficiar, caso contrário, optariam simplesmente por não participar. Como demonstra a análise do Abade de Saint-Pierre, quando se efectua uma venda entre comerciantes, tanto o vendedor como o comprador saem a ganhar - o vendedor não venderia a esse preço e o comprador não compraria se ambos não achassem vantajoso. Este princípio do benefício mútuo explica por que razão a multiplicação das trocas enriquece as sociedades, enquanto a redução do comércio diminui a prosperidade. As outras opções estão incorrectas porque as trocas não criam riqueza material (criam utilidade), não redistribuem a riqueza de forma igual e não eliminam a escassez, mas optimizam a afetação de recursos através da cooperação voluntária.
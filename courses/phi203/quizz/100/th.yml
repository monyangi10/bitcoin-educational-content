question: ตามทฤษฎีเศรษฐศาสตร์ ลักษณะพื้นฐานที่ทำให้การแลกเปลี่ยนโดยสมัครใจเป็นประโยชน์ต่อสังคมคืออะไร?
answer: Exchange เป็นเกมที่ได้ประโยชน์ร่วมกันซึ่งทั้งสองฝ่ายได้รับประโยชน์ร่วมกัน
wrong_answers:
  - Exchange สร้างความมั่งคั่งทางวัตถุโดยการแปรรูปวัตถุดิบให้เป็นสินค้าสำเร็จรูป
  - Exchange แจกจ่ายทรัพยากรจากผู้เข้าร่วมที่มั่งคั่งไปยังผู้เข้าร่วมที่ยากจนอย่างเท่าเทียมกัน
  - Exchange ขจัดความขาดแคลนโดยการเพิ่มปริมาณรวมของสินค้าที่มีอยู่ให้สูงสุด
explanation: |
  การแลกเปลี่ยนโดยสมัครใจเป็นเกมที่มีผลรวมเป็นบวกโดยพื้นฐาน เพราะทั้งสองฝ่ายเข้าร่วมการทำธุรกรรมโดยคาดหวังว่าจะได้รับประโยชน์ มิฉะนั้นพวกเขาจะเลือกที่จะไม่เข้าร่วม ดังที่แสดงโดยการวิเคราะห์ของ Abbé de Saint-Pierre เมื่อการขายเกิดขึ้นระหว่างพ่อค้า ทั้งผู้ขายและผู้ซื้อจะได้รับประโยชน์ - ผู้ขายจะไม่ขายในราคานั้นและผู้ซื้อจะไม่ซื้อเว้นแต่ทั้งสองฝ่ายจะพบว่ามันได้เปรียบ หลักการของประโยชน์ร่วมกันนี้อธิบายว่าทำไมการเพิ่มการแลกเปลี่ยนจึงทำให้สังคมมั่งคั่งขึ้น ในขณะที่การลดการค้าทำให้ความเจริญลดลง ตัวเลือกอื่น ๆ นั้นไม่ถูกต้องเพราะการแลกเปลี่ยนไม่ได้สร้างความมั่งคั่งทางวัตถุ (มันสร้างประโยชน์ใช้สอย) ไม่ได้กระจายความมั่งคั่งอย่างเท่าเทียมกัน และไม่ได้กำจัดความขาดแคลน แต่จะเพิ่มประสิทธิภาพการจัดสรรทรัพยากรผ่านความร่วมมือโดยสมัครใจ
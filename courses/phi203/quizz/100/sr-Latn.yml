question: Prema ekonomskoj teoriji, koja fundamentalna karakteristika čini dobrovoljnu razmenu korisnom za društvo?
answer: Exchange je igra sa pozitivnom sumom gde obe strane ostvaruju međusobnu korist
wrong_answers:
  - Exchange stvara materijalno bogatstvo transformacijom sirovina u gotove proizvode
  - Exchange preraspodeljuje resurse od bogatih ka siromašnim učesnicima jednako
  - Exchange eliminiše oskudicu maksimiziranjem ukupne količine dostupne robe
explanation: |
  Dobrovoljna razmena je suštinski igra sa pozitivnim ishodom jer obe strane ulaze u transakciju očekujući korist, inače bi jednostavno odlučile da ne učestvuju. Kao što je pokazala analiza Abbé de Saint-Pierre-a, kada se dogodi prodaja između trgovaca, i prodavac i kupac dobijaju - prodavac ne bi prodao po toj ceni, a kupac ne bi kupio osim ako oboje ne smatraju da je to povoljno. Ovaj princip uzajamne koristi objašnjava zašto umnožavanje razmena obogaćuje društva dok smanjenje trgovine umanjuje prosperitet. Ostale opcije su netačne jer razmena ne stvara materijalno bogatstvo (stvara korisnost), ne preraspodeljuje bogatstvo jednako i ne eliminiše oskudicu već optimizuje raspodelu resursa kroz dobrovoljnu saradnju.
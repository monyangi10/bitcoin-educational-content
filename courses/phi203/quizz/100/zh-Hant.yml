question: 根據經濟理論，自願交換有益於社會的基本特徵是什麼？
answer: Exchange 是雙方互惠互利的正和遊戲
wrong_answers:
  - Exchange 將原料轉換成製成品，創造物質財富
  - Exchange 將資源從富裕的參加者平均分配給貧窮的參加者
  - Exchange 透過最大化可用物品的總量來消除稀缺性
explanation: |
  自願交換基本上是一種正和遊戲，因為交易雙方都期望從中獲利，否則他們只會選擇不參與交易。正如 Abbé de Saint-Pierre 的分析所示，當商人之間進行交易時，賣方和買方都會獲利 - 除非雙方都覺得有利，否則賣方不會以這個價格出售，買方也不會購買。這個互利原則解釋了為什麼增加交換會使社會更富裕，而減少商業會使社會更不繁榮。其他選項都不對，因為交換不會創造物質財富（它會創造效用），不會平等地重新分配財富，也不會消除稀缺性，而是透過自願合作來優化資源配置。
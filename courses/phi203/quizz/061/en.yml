question: According to the text, what drove the gradual transformation of slavery into serfdom and then into less restrictive forms of social organization?
answer: As circumstances became less dangerous, individuals found within themselves the capacity to govern their own conduct and assume the risks of autonomous existence
wrong_answers:
  - Legal reforms enacted by enlightened monarchs gradually replaced coerced labor with contractual employment
  - Religious institutions campaigned successfully for the recognition of the spiritual equality of all persons
  - The expansion of long-distance trade made slave labor economically unviable compared to wage labor
explanation: |
  The text describes two converging forces behind the transformation of slavery: the shift toward more intellectual economic activity, which made slavery inadequate, and the fact that as circumstances became less dangerous, individuals developed the inner capacity to govern themselves and bear the responsibilities of autonomous life. This was not driven by legal reform, religious advocacy, or trade economics, but by the changing material conditions of human existence that made both the necessity and the justification for extreme coercion progressively weaker. Serfdom represented an intermediate stage in this long evolution toward greater individual liberty.

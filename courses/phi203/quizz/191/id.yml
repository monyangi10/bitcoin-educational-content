question: Menurut analisis Tocqueville tentang despotisme demokrasi, apa yang menjadi bahaya utama ketika demokrasi berubah menjadi bertentangan dengan tujuannya sendiri?
answer: Negara menjadi pengarah masyarakat dan massa demokratis itu sendiri menekan kebebasan individu
wrong_answers:
  - Elit politik memanipulasi proses pemilihan umum untuk mempertahankan kekuasaan sambil mengabaikan kehendak mayoritas
  - Ketimpangan ekonomi tumbuh begitu ekstrem sehingga lembaga-lembaga demokrasi menjadi dikuasai oleh kepentingan-kepentingan khusus yang kaya
  - Pengaruh dan propaganda asing merusak proses demokrasi dengan menyebarkan informasi yang salah kepada para pemilih
explanation: |
  Tocqueville mengidentifikasi despotisme demokratis sebagai fenomena di mana demokrasi berbalik arah dari tujuan dasarnya untuk melindungi hak-hak individu. Alih-alih mengorganisir penindasan yang efektif terhadap serangan terhadap kebebasan manusia, negara demokratis itu sendiri justru menjadi alat untuk menyerang hak-hak dan kebebasan yang sama. Bahayanya datang dari dalam - massa demokratis itu sendiri yang menekan kebebasan melalui pengarahan masyarakat oleh negara. Opsi-opsi lain menggambarkan ancaman eksternal atau penangkapan elit, tetapi konsep Tocqueville secara khusus membahas bagaimana demokrasi secara internal dapat merusak dirinya sendiri ketika negara menjadi pengarah masyarakat dan bukannya pelindung kebebasan.
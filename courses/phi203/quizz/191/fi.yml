question: Mikä on Tocquevillen demokraattista despotismia koskevan analyysin mukaan ensisijainen vaara, kun demokratia muuttuu vastoin omaa tarkoitustaan?
answer: Valtiosta tulee yhteiskunnan johtaja, ja demokraattinen massa itsessään rajoittaa yksilönvapauksia
wrong_answers:
  - Poliittinen eliitti manipuloi vaaliprosesseja säilyttääkseen vallan ja sivuuttaakseen enemmistön tahdon
  - Taloudellinen eriarvoisuus kasvaa niin suureksi, että demokraattiset instituutiot joutuvat varakkaiden erityisintressien valtaan
  - Ulkomaiset vaikutteet ja propaganda heikentävät demokraattista prosessia levittämällä väärää tietoa äänestäjille
explanation: |
  Tocqueville määritteli demokraattisen despotismin ilmiöksi, jossa demokratia kääntyy vastoin sen perustarkoitusta eli yksilön oikeuksien suojelua. Sen sijaan, että demokraattinen valtio järjestäisi tehokkaan torjunnan ihmisten vapauksiin kohdistuville hyökkäyksille, siitä tulee itse väline, jolla hyökätään samoja oikeuksia ja vapauksia vastaan. Vaara tulee sisältäpäin - demokraattinen massa itsessään puristaa vapauksia yhteiskunnan valtiollisen ohjauksen kautta. Muut vaihtoehdot kuvaavat ulkoisia uhkia tai eliitin kaappausta, mutta Tocquevillen käsite käsittelee nimenomaan sitä, miten demokratia voi korruptoitua sisäisesti, kun valtiosta tulee yhteiskunnan johtaja eikä vapauksien suojelija.
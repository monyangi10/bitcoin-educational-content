question: De acordo com a análise de Tocqueville sobre o despotismo democrático, qual é o principal perigo quando a democracia se transforma contra o seu próprio objetivo?
answer: O Estado torna-se o diretor da sociedade e a própria massa democrática comprime as liberdades individuais
wrong_answers:
  - As elites políticas manipulam os processos eleitorais para manter o poder, ignorando a vontade da maioria
  - A desigualdade económica torna-se tão extrema que as instituições democráticas são capturadas por interesses especiais dos ricos
  - As influências e a propaganda estrangeiras prejudicam o processo democrático ao difundirem informações incorrectas aos eleitores
explanation: |
  Tocqueville identificou o despotismo democrático como o fenómeno em que a democracia se volta contra o seu objetivo fundamental de proteger os direitos individuais. Em vez de organizar uma repressão efectiva dos ataques às liberdades humanas, o próprio Estado democrático torna-se um instrumento de ataque a esses mesmos direitos e liberdades. O perigo vem de dentro - a própria massa democrática que comprime as liberdades através da direção estatal da sociedade. As outras opções descrevem ameaças externas ou a captura da elite, mas o conceito de Tocqueville aborda especificamente a forma como a democracia se pode corromper internamente quando o Estado se torna o diretor da sociedade e não o protetor da liberdade.
question: Dushingiye ku nseguro ya Tocqueville ku butegetsi bw’agahomerabunwa bwa demokarasi, ni igiki giserukira akaga ka mbere iyo demokarasi ihindutse iteye kubiri n’intumbero yayo bwite?
answer: Leta iba umuyobozi w'ikibano kandi abantu benshi ba demokarasi ubwabo bagafata umwidegemvyo w'umuntu ku giti ciwe .
wrong_answers:
  - Abanyapolitike b'abanyacubahiro barakoresha nabi inzira z'amatora kugira ngo bagumane ubutegetsi mu gihe birengagiza ubugombe bwa benshi
  - Ubusumbasumbane mu vy’ubutunzi burakura cane ku buryo inzego za demokarasi zifatwa n’inyungu zidasanzwe z’abatunzi .
  - Inkurikizi z’amahanga n’ivy’iterabwoba birahungabanya inzira ya demokarasi mu gukwiragiza amakuru atari yo ku batora .
explanation: |
  Tocqueville yerekanye ko ubutegetsi bw’agahomerabunwa bwa demokarasi ari ikintu aho demokarasi ihindukira ikarwanya intumbero yayo nyamukuru yo kurinda uburenganzira bw’umuntu ku giti ciwe. Aho gutegura uguhagarika neza ibitero ku mwidegemvyo wa muntu, Leta ya demokarasi ubwayo iba igikoresho co gutera ubwo burenganzira n’ubwo bwidegemvyo nyene. Ico kibazo kiva imbere - abantu benshi ba demokarasi ubwabo bafatanya umwidegemvyo biciye mu kuyobora Leta mu kibano. Ayandi mahitamwo adondora iterabwoba ryo hanze canke gufata abantu b’abanyacubahiro, ariko iciyumviro ca Tocqueville kivuga canecane ingene demokarasi ishobora kwonona imbere mu gihugu iyo Leta iba umuyobozi w’ikibano aho kuba uwukingira umwidegemvyo.
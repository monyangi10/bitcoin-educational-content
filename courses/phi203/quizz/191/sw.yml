question: Kulingana na uchambuzi wa Tocqueville kuhusu udikteta wa kidemokrasia, ni nini kinachowakilisha hatari kuu wakati demokrasia inabadilika kinyume na madhumuni yake yenyewe?
answer: Dola inakuwa mkurugenzi wa jamii na umati wa kidemokrasia wenyewe hukandamiza uhuru wa mtu binafsi
wrong_answers:
  - Wasomi wa kisiasa hubadilisha michakato ya uchaguzi ili kudumisha madaraka huku wakipuuza matakwa ya walio wengi
  - Ukosefu wa usawa wa kiuchumi unazidi kuwa mbaya kiasi kwamba taasisi za kidemokrasia zinatekwa na maslahi maalum ya matajiri
  - Ushawishi na propaganda za kigeni hudhoofisha mchakato wa kidemokrasia kwa kusambaza taarifa potofu kwa wapiga kura
explanation: |
  Tocqueville ilitambua udikteta wa kidemokrasia kama jambo ambalo demokrasia inageuka dhidi ya kusudi lake la msingi la kulinda haki za mtu binafsi. Badala ya kupanga ukandamizaji mzuri wa mashambulizi dhidi ya uhuru wa binadamu, dola ya kidemokrasia yenyewe inakuwa chombo cha kushambulia haki na uhuru huo huo. Hatari hutoka ndani - umati wa kidemokrasia wenyewe unakandamiza uhuru kupitia mwelekeo wa serikali kwa jamii. Chaguzi zingine zinaelezea vitisho vya nje au utekaji nyara wa wasomi, lakini dhana ya Tocqueville inashughulikia haswa jinsi demokrasia inavyoweza kujiharibu ndani wakati dola inakuwa mkurugenzi wa jamii badala ya mlinzi wa uhuru.
question: According to Tocqueville's analysis of democratic despotism, what represents the primary danger when democracy transforms against its own purpose?
answer: The state becomes the director of society and the democratic mass itself compresses individual liberties
wrong_answers:
  - Political elites manipulate electoral processes to maintain power while ignoring the will of the majority
  - Economic inequality grows so extreme that democratic institutions become captured by wealthy special interests
  - Foreign influences and propaganda undermine the democratic process by spreading misinformation to voters
explanation: |
  Tocqueville identified democratic despotism as the phenomenon where democracy turns against its fundamental purpose of protecting individual rights. Instead of organizing effective repression of attacks on human freedoms, the democratic state itself becomes an instrument of attacking those same rights and liberties. The danger comes from within - the democratic mass itself compressing freedoms through state direction of society. The other options describe external threats or elite capture, but Tocqueville's concept specifically addresses how democracy can internally corrupt itself when the state becomes society's director rather than liberty's protector.
question: Hva er, ifølge Tocquevilles analyse av demokratisk despoti, den største faren når demokratiet utvikler seg mot sin egen hensikt?
answer: Staten blir samfunnets regissør, og den demokratiske massen selv innskrenker den individuelle friheten
wrong_answers:
  - Politiske eliter manipulerer valgprosesser for å beholde makten, samtidig som de ignorerer flertallets vilje
  - Den økonomiske ulikheten blir så ekstrem at de demokratiske institusjonene blir overtatt av rike særinteresser
  - Utenlandsk påvirkning og propaganda undergraver den demokratiske prosessen ved å spre feilinformasjon til velgerne
explanation: |
  Tocqueville identifiserte demokratisk despotisme som et fenomen der demokratiet vender seg mot sitt grunnleggende formål om å beskytte individuelle rettigheter. I stedet for å organisere en effektiv undertrykkelse av angrep på menneskers friheter, blir den demokratiske staten selv et instrument for å angripe de samme rettighetene og frihetene. Faren kommer innenfra - den demokratiske massen selv innskrenker frihetene gjennom statlig styring av samfunnet. De andre alternativene beskriver trusler utenfra eller elitenes maktovertakelse, men Tocquevilles konsept tar spesifikt for seg hvordan demokratiet kan korrumpere seg selv internt når staten blir samfunnets regissør snarere enn frihetens beskytter.
question: Según el análisis de Tocqueville sobre el despotismo democrático, ¿qué representa el principal peligro cuando la democracia se transforma en contra de su propio propósito?
answer: El Estado se convierte en el director de la sociedad y la propia masa democrática comprime las libertades individuales
wrong_answers:
  - Las élites políticas manipulan los procesos electorales para mantener el poder ignorando la voluntad de la mayoría
  - La desigualdad económica es tan extrema que las instituciones democráticas se ven dominadas por los intereses de los ricos
  - Las influencias y la propaganda extranjeras socavan el proceso democrático al difundir información errónea entre los votantes
explanation: |
  Tocqueville identificó el despotismo democrático como el fenómeno en el que la democracia se vuelve contra su propósito fundamental de proteger los derechos individuales. En lugar de organizar una represión eficaz de los ataques a las libertades humanas, el propio Estado democrático se convierte en un instrumento de ataque a esos mismos derechos y libertades. El peligro viene de dentro: la propia masa democrática que comprime las libertades a través de la dirección estatal de la sociedad. Las otras opciones describen amenazas externas o la captura de las élites, pero el concepto de Tocqueville aborda específicamente cómo la democracia puede corromperse internamente cuando el Estado se convierte en director de la sociedad en lugar de protector de la libertad.
question: Wat is volgens Tocqueville's analyse van democratisch despotisme het grootste gevaar wanneer de democratie tegen haar eigen doel in verandert?
answer: De staat wordt de regisseur van de samenleving en de democratische massa zelf comprimeert individuele vrijheden
wrong_answers:
  - Politieke elites manipuleren verkiezingsprocessen om aan de macht te blijven en negeren de wil van de meerderheid
  - Economische ongelijkheid groeit zo extreem dat democratische instellingen in de greep komen van rijke speciale belangen
  - Buitenlandse invloeden en propaganda ondermijnen het democratische proces door verkeerde informatie te verspreiden onder kiezers
explanation: |
  Tocqueville identificeerde democratisch despotisme als het fenomeen waarbij de democratie zich keert tegen haar fundamentele doel om individuele rechten te beschermen. In plaats van het organiseren van effectieve onderdrukking van aanvallen op menselijke vrijheden, wordt de democratische staat zelf een instrument om diezelfde rechten en vrijheden aan te vallen. Het gevaar komt van binnenuit - de democratische massa zelf die vrijheden comprimeert door de staat die de samenleving stuurt. De andere opties beschrijven bedreigingen van buitenaf of verovering door de elite, maar Tocqueville's concept richt zich specifiek op hoe democratie zichzelf van binnenuit kan corrumperen wanneer de staat de regisseur van de samenleving wordt in plaats van de beschermer van de vrijheid.
question: 根據托克維爾對民主專制主義的分析，當民主轉型違反其本身的目的時，什麼代表了主要的危險？
answer: 國家成為社會的主管，而民主大眾本身則壓縮個人自由。
wrong_answers:
  - 政治菁英操縱選舉程序以維持權力，卻忽略多數人的意願
  - 經濟不平等發展到極端，民主體制被富裕的特殊利益所控制
  - 外國影響和宣傳透過向選民散播錯誤資訊來破壞民主進程
explanation: |
  托克维尔认为民主专制主义是民主违背其保护个人权利的根本目的的现象。民主國家不但沒有組織有效的鎮壓對人類自由的攻擊，反而成為攻擊這些相同權利與自由的工具。危險來自內部--民主大眾本身透過國家對社會的指導來壓縮自由。其他選項描述的是外部威脅或菁英勢力的俘虜，但托克維爾的概念特別針對當國家成為社會的指導者而非自由的保護者時，民主如何在內部腐敗。
question: بر اساس تحلیل توکویل از استبداد دموکراتیک، خطر اصلی زمانی که دموکراسی بر خلاف هدف خود تغییر می‌کند، چیست؟
answer: دولت به کارگردان جامعه تبدیل می‌شود و توده دموکراتیک خود آزادی‌های فردی را محدود می‌کند
wrong_answers:
  - نخبگان سیاسی فرآیندهای انتخاباتی را برای حفظ قدرت دستکاری می‌کنند و اراده اکثریت را نادیده می‌گیرند.
  - نابرابری اقتصادی به قدری شدید می‌شود که نهادهای دموکراتیک توسط منافع خاص ثروتمند تسخیر می‌شوند.
  - تأثیرات خارجی و تبلیغات با انتشار اطلاعات نادرست به رأی‌دهندگان، فرآیند دموکراتیک را تضعیف می‌کنند.
explanation: |
  توكویل دسپوتیسم دموکراتیک را به‌عنوان پدیده‌ای شناسایی کرد که در آن دموکراسی بر خلاف هدف اساسی خود که حفاظت از حقوق فردی است، عمل می‌کند. به‌جای سازماندهی سرکوب مؤثر حملات به آزادی‌های انسانی، دولت دموکراتیک خود به ابزاری برای حمله به همان حقوق و آزادی‌ها تبدیل می‌شود. خطر از درون می‌آید - توده دموکراتیک خود آزادی‌ها را از طریق هدایت دولتی جامعه فشرده می‌کند. گزینه‌های دیگر تهدیدات خارجی یا تسخیر نخبگان را توصیف می‌کنند، اما مفهوم توكویل به‌طور خاص به این موضوع می‌پردازد که چگونه دموکراسی می‌تواند به‌طور داخلی خود را فاسد کند وقتی که دولت به‌جای محافظ آزادی، به کارگردان جامعه تبدیل می‌شود.
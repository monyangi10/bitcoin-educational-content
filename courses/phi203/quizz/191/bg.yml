question: Според анализа на демократичния деспотизъм, направен от Токвил, коя е основната опасност, когато демокрацията се трансформира против собствената си цел?
answer: Държавата се превръща в директор на обществото, а самата демократична маса ограничава индивидуалните свободи
wrong_answers:
  - Политическите елити манипулират изборните процеси, за да запазят властта си, като пренебрегват волята на мнозинството
  - Икономическото неравенство нараства дотолкова, че демократичните институции се оказват в плен на богатите специални интереси
  - Чужди влияния и пропаганда подкопават демократичния процес, като разпространяват дезинформация сред избирателите
explanation: |
  Токвил определя демократичния деспотизъм като явление, при което демокрацията се обръща срещу основната си цел да защитава индивидуалните права. Вместо да организира ефективно потискане на посегателствата срещу човешките свободи, самата демократична държава се превръща в инструмент за посегателство срещу същите тези права и свободи. Опасността идва отвътре - самата демократична маса, която ограничава свободите чрез държавно управление на обществото. Другите варианти описват външни заплахи или завладяване на елита, но концепцията на Токвил е насочена конкретно към това как демокрацията може да се корумпира вътрешно, когато държавата се превърне в директор на обществото, а не в защитник на свободата.
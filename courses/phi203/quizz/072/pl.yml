question: Jaki fundamentalny związek istnieje między warunkami materialnymi a wolnością jednostki zgodnie z analizą rozwoju historycznego?
answer: Wolność zależy zasadniczo od warunków materialnych, które pozwalają ludziom przezwyciężyć naglące potrzeby
wrong_answers:
  - Wolność jest czysto filozoficzną aspiracją niezależną od okoliczności ekonomicznych i materialnych
  - Indywidualna wolność pojawia się naturalnie, niezależnie od poziomu rozwoju technologicznego czy gospodarczego
  - Autonomia osobista maleje wraz z rozwojem lepszych warunków materialnych i możliwości technicznych społeczeństw
explanation: |
  Tekst wyraźnie stwierdza, że wolność nie jest jedynie abstrakcyjną aspiracją filozoficzną, ale zasadniczo zależy od warunków materialnych, które umożliwiają ludziom uwolnienie się od najpilniejszych potrzeb. Starożytne społeczeństwa o niskiej produkcji i ekstremalnej wrażliwości na zagrożenia naturalne oferowały ograniczoną przestrzeń dla osobistej autonomii. W miarę jak społeczeństwa rozwijały możliwości techniczne i tworzyły nadwyżki, stawały się coraz bardziej niezależne od naturalnych ograniczeń, rozszerzając tym samym możliwości indywidualnej wolności. Pokazuje to bezpośrednią korelację między postępem materialnym a ekspansją wolności osobistej.
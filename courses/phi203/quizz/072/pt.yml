question: Que relação fundamental existe entre as condições materiais e a liberdade individual, de acordo com a análise do desenvolvimento histórico?
answer: A liberdade depende fundamentalmente das condições materiais que permitem ao ser humano superar as necessidades prementes
wrong_answers:
  - A liberdade é uma aspiração puramente filosófica, independente das circunstâncias económicas e materiais
  - A liberdade individual emerge naturalmente, independentemente do nível de desenvolvimento tecnológico ou económico
  - A autonomia pessoal diminui à medida que as sociedades desenvolvem melhores condições materiais e capacidades técnicas
explanation: |
  O texto afirma explicitamente que a liberdade não é apenas uma aspiração filosófica abstrata, mas depende fundamentalmente das condições materiais que permitem ao homem libertar-se das necessidades mais prementes. As sociedades antigas, com baixa produção e extrema sensibilidade aos riscos naturais, ofereciam um espaço limitado para a autonomia pessoal. À medida que as sociedades desenvolveram capacidades técnicas e criaram excedentes, tornaram-se mais independentes dos condicionalismos naturais, alargando assim as possibilidades de liberdade individual. Isto demonstra uma correlação direta entre o progresso material e a expansão da liberdade pessoal.
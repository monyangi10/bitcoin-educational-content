question: Theo phân tích về sự phát triển lịch sử, mối quan hệ cơ bản nào tồn tại giữa điều kiện vật chất và tự do cá nhân?
answer: Tự do về cơ bản phụ thuộc vào các điều kiện vật chất cho phép con người vượt qua những nhu cầu cấp thiết.
wrong_answers:
  - Tự do hoàn toàn là một khát vọng triết học, độc lập với các hoàn cảnh kinh tế và vật chất.
  - Tự do cá nhân nảy sinh một cách tự nhiên bất kể trình độ phát triển công nghệ hay kinh tế.
  - Quyền tự chủ cá nhân giảm đi khi xã hội phát triển các điều kiện vật chất và năng lực kỹ thuật tốt hơn.
explanation: |
  Văn bản này nêu rõ rằng tự do không chỉ là một khát vọng triết học trừu tượng mà về cơ bản phụ thuộc vào các điều kiện vật chất cho phép con người tự giải thoát khỏi những nhu cầu cấp thiết nhất. Các xã hội cổ đại với sản lượng thấp và cực kỳ nhạy cảm với thiên tai đã hạn chế không gian cho quyền tự chủ cá nhân. Khi các xã hội phát triển khả năng kỹ thuật và tạo ra thặng dư, họ trở nên độc lập hơn khỏi những ràng buộc của tự nhiên, từ đó mở rộng khả năng tự do cá nhân. Điều này chứng tỏ mối tương quan trực tiếp giữa tiến bộ vật chất và sự mở rộng tự do cá nhân.
question: Vilket grundläggande samband finns det mellan materiella förutsättningar och individuell frihet enligt analysen av den historiska utvecklingen?
answer: Frihet är i grunden beroende av materiella förutsättningar som gör det möjligt för människor att övervinna tvingande nödvändigheter
wrong_answers:
  - Frihet är en rent filosofisk strävan som är oberoende av ekonomiska och materiella omständigheter
  - Individuell frihet uppstår naturligt oberoende av nivån på den tekniska eller ekonomiska utvecklingen
  - Den personliga autonomin minskar i takt med att samhällen utvecklar bättre materiella förutsättningar och tekniska möjligheter
explanation: |
  I texten står det uttryckligen att frihet inte bara är en abstrakt filosofisk strävan utan i grunden beror på materiella förhållanden som gör det möjligt för människor att frigöra sig från de mest akuta behoven. Forntida samhällen med låg produktion och extrem känslighet för naturkatastrofer gav begränsat utrymme för personlig autonomi. I takt med att samhällen utvecklade tekniska förmågor och skapade överskott blev de mer oberoende av naturliga begränsningar och därmed ökade möjligheterna till individuell frihet. Detta visar på en direkt korrelation mellan materiella framsteg och ökad personlig frihet.
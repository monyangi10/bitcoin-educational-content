question: Quelle relation fondamentale existe-t-il entre les conditions matérielles et la liberté individuelle selon l'analyse du développement historique ?
answer: La liberté dépend fondamentalement des conditions matérielles qui permettent à l'homme de surmonter les nécessités pressantes
wrong_answers:
  - La liberté est une aspiration purement philosophique, indépendante des circonstances économiques et matérielles
  - La liberté individuelle émerge naturellement quel que soit le niveau de développement technologique ou économique
  - L'autonomie personnelle diminue à mesure que les sociétés développent de meilleures conditions matérielles et capacités techniques
explanation: |
  Le texte indique explicitement que la liberté n'est pas une simple aspiration philosophique abstraite, mais qu'elle dépend fondamentalement des conditions matérielles qui permettent à l'homme de s'affranchir des nécessités les plus pressantes. Les sociétés anciennes, peu productives et extrêmement sensibles aux risques naturels, n'offraient qu'un espace limité pour l'autonomie personnelle. Au fur et à mesure que les sociétés développaient leurs capacités techniques et créaient des excédents, elles devenaient plus indépendantes des contraintes naturelles, élargissant ainsi les possibilités de liberté individuelle. Il existe donc une corrélation directe entre le progrès matériel et l'expansion de la liberté individuelle.
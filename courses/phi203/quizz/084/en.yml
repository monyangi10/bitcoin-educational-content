question: According to the text, what new possibility does the abundance of resources generated by greater productivity offer to individuals in the 21st century?
answer: The ability to sustain themselves independently, finance their own security, and mitigate hazards that once made them entirely dependent on collective or political protection
wrong_answers:
  - The ability to accumulate unlimited personal wealth and therefore to disengage entirely from any form of community or social obligation
  - The ability to replace state institutions entirely with private companies, since all public functions can now be performed more efficiently by markets
  - The ability to consume more than previous generations, raising living standards without fundamentally changing the balance between individuals and political authority
explanation: |
  The text describes how greater productivity generates new resources that flow in several directions: individual savings and self-sufficiency, collective security through more effective and proportionally cheaper police and justice systems, and the capacity to mitigate the hazards — diseases, natural disasters, and the countless uncertainties — that once dominated human existence and made individuals entirely dependent on collective protection. The result is that the individual becomes increasingly capable of activating individual liberty by assuming its responsibilities, rather than trading freedom for the security of servitude.

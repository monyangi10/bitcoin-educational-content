question: Kulingana na uchambuzi wa Gustave de Molinari, ni athari gani ya kisaikolojia hutokea wakati wengine wanapotishia haki zetu?
answer: Hofu inayotulazimisha kuchunguza upya na kurekebisha miradi yetu
wrong_answers:
  - Hasira inayotuchochea kulipiza kisasi dhidi ya wavamizi
  - Mkanganyiko unaotuzuia kufanya maamuzi ya busara
  - Kutojali kunakotusaidia kupuuza vitisho vya nje
explanation: |
  Molinari alitambua hofu kama jibu muhimu la kisaikolojia kwa vitisho dhidi ya haki zetu. Hofu hii hufanya kazi kama kizuizi cha hatua, na kutulazimisha kufikiria upya na kurekebisha mipango yetu ya awali. Kizuizi hiki cha kisaikolojia hupunguza uhuru wetu mzuri kwa sababu hatuwezi kutenda kama tungefanya bila tishio. Chaguzi zingine si sahihi: hasira inaweza kutokea lakini si jibu la kimfumo ambalo Molinari alielezea; mkanganyiko sio athari kuu aliyochambua; na kutojali kungekuwa kinyume na kujilinda na hakuendani na nadharia yake kuhusu jinsi vitisho vinavyozuia tabia zetu kisaikolojia.
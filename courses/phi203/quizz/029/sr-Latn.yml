question: Prema analizi Gustava de Molinarija, kada drugi prete našim pravima, dolazi do psihološkog efekta osećaja ugroženosti i potrebe za odbranom.
answer: Strah koji nas primorava da preispitamo i modifikujemo naše projekte
wrong_answers:
  - Bes koji nas motiviše da uzvratimo agresorima
  - Zbunjenost koja nas sprečava da donosimo racionalne odluke
  - Ravnodušnost koja nam pomaže da ignorišemo spoljne pretnje
explanation: |
  Molinari je identifikovao strah kao ključni psihološki odgovor na pretnje našim pravima. Ovaj strah deluje kao kočnica na akciju, primoravajući nas da preispitamo i modifikujemo naše originalne planove. Ovo psihološko ograničenje smanjuje našu efektivnu slobodu jer ne možemo delovati kako bismo delovali u odsustvu pretnje. Ostale opcije su netačne: bes se može javiti, ali nije sistematski odgovor koji je Molinari opisao; konfuzija nije primarni efekat koji je analizirao; a ravnodušnost bi bila kontraproduktivna za samoočuvanje i ne uklapa se u njegovu teoriju o tome kako pretnje psihološki ograničavaju naše ponašanje.
question: تفاوت اصلی بین نحوه تجربه افراد از پیامدهای انتخاب‌هایشان در روابط قراردادی در مقابل تصمیمات سیاسی چیست؟
answer: در قراردادها، افراد به طور مستقیم اثرات را از طریق درد یا لذت شخصی احساس می‌کنند و می‌توانند رفتار خود را تغییر دهند، در حالی که انتخاب‌های سیاسی بسیار پیچیده و فراگیر هستند تا افراد بتوانند اثرات شخصی خود را اندازه‌گیری کنند.
wrong_answers:
  - در قراردادها، افراد بر اساس رأی اکثریت تصمیم‌گیری می‌کنند، در حالی که تصمیمات سیاسی از طریق مشورت فردی و مسئولیت شخصی اتخاذ می‌شوند.
  - در قراردادها، پیامدها توسط مقامات خارجی تحمیل می‌شوند، در حالی که تصمیمات سیاسی به افراد اجازه می‌دهد تا بر اساس نتایج، رفتار خود را آزادانه انتخاب و تغییر دهند.
  - در قراردادها، افراد نمی‌توانند پس از تعهد، برنامه‌های خود را تغییر دهند، در حالی که تصمیمات سیاسی انعطاف‌پذیری مداوم و امکان خروج از ترتیبات نامطلوب را ارائه می‌دهند.
explanation: |
  متن تأکید می‌کند که روابط قراردادی به افراد اجازه می‌دهد تا واقعیت خود را به‌طور مستقیم مشاهده کنند و اثرات انتخاب‌های خود را از طریق درد یا لذت احساس کنند، که این امر به آن‌ها امکان می‌دهد رفتار خود را آزادانه تغییر دهند. در مقابل، انتخاب‌های سیاسی به‌عنوان بسیار پیچیده و فراگیر توصیف می‌شوند که افراد نمی‌توانند اثرات شخصی خود را اندازه‌گیری کنند، و این باعث می‌شود مکانیزم بازخورد بسیار کمتر مستقیم و مؤثر از ترتیبات قراردادی داوطلبانه باشد.
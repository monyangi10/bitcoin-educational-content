question: Bireylerin sözleşmeye dayalı ilişkilerdeki tercihlerinin sonuçlarını nasıl deneyimledikleri ile siyasi kararlar arasındaki temel fark nedir?
answer: Sözleşmelerde, bireyler kişisel acı veya zevk yoluyla etkileri doğrudan hisseder ve davranışlarını değiştirebilirken, siyasi seçimler bireylerin kişisel etkilerini ölçemeyecekleri kadar karmaşık ve kapsayıcıdır
wrong_answers:
  - Sözleşmelerde bireyler oy çokluğuna dayanarak karar verirken, siyasi kararlar bireysel müzakere ve kişisel sorumluluk yoluyla alınır
  - Sözleşmelerde sonuçlar dış otoriteler tarafından empoze edilirken, siyasi kararlar bireylerin özgürce seçim yapmalarına ve sonuçlara göre davranışlarını değiştirmelerine olanak tanır
  - Sözleşmelerde bireyler bir kez taahhütte bulunduktan sonra planlarını değiştiremezken, siyasi kararlar sürekli esneklik ve elverişsiz düzenlemelerden çekilme olanağı sunar
explanation: |
  Metinde, sözleşmeye dayalı ilişkilerin bireylerin kendi gerçekliklerini doğrudan gözlemlemelerine ve seçimlerinin etkilerini acı veya zevk yoluyla hissetmelerine olanak tanıdığı, böylece davranışlarını özgürce değiştirebildikleri vurgulanmaktadır. Buna karşın, siyasi tercihler bireylerin kişisel etkilerini ölçemeyecekleri kadar karmaşık ve kapsayıcı olarak tanımlanmakta, bu da geri bildirim mekanizmasını gönüllü sözleşme düzenlemelerine kıyasla çok daha az doğrudan ve etkili hale getirmektedir.
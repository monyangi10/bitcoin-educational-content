question: 個人如何體驗其在契約關係中所做選擇的後果，與政治決策之間的主要差異是什麼？
answer: 在契約中，個人透過個人的痛苦或快樂直接感受到影響，並且可以修正自己的行為，而政治選擇則太複雜、太廣泛，個人無法衡量其個人影響。
wrong_answers:
  - 在契約中，個人根據多數票做出決策，而政治決策則是透過個人商議和個人責任做出的。
  - 在契約中，後果是由外部機關強加的，而政治決策則允許個人自由選擇，並根據結果修改自己的行為
  - 在合約中，個人一旦承諾就無法改變計劃，而政治決策則提供持續的彈性，並能夠退出不利的安排。
explanation: |
  文中強調，契約關係允許個人直接觀察其現實，並透過痛苦或快樂來感受其選擇的效果，使他們能夠自由地修正其行為。相比之下，政治選擇被描述得過於複雜和包羅萬象，個人無法衡量其個人效果，使得回饋機制遠遠不如自願契約安排來得直接和有效。
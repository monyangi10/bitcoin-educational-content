question: Qual è la differenza fondamentale tra il modo in cui gli individui vivono le conseguenze delle loro scelte nei rapporti contrattuali e le decisioni politiche?
answer: Nei contratti, gli individui percepiscono direttamente gli effetti attraverso il dolore o il piacere personale e possono modificare la loro condotta, mentre le scelte politiche sono troppo complesse e comprensive perché gli individui possano misurarne gli effetti personali
wrong_answers:
  - Nei contratti, gli individui prendono decisioni a maggioranza, mentre le decisioni politiche sono prese attraverso la deliberazione individuale e la responsabilità personale
  - Nei contratti, le conseguenze sono imposte da autorità esterne, mentre le decisioni politiche consentono agli individui di scegliere liberamente e modificare il proprio comportamento in base ai risultati
  - Nei contratti, gli individui non possono cambiare i loro piani una volta impegnati, mentre le decisioni politiche offrono una continua flessibilità e la possibilità di ritirarsi da accordi sfavorevoli
explanation: |
  Il testo sottolinea che le relazioni contrattuali permettono agli individui di osservare direttamente la loro realtà e di percepire gli effetti delle loro scelte attraverso il dolore o il piacere, consentendo loro di modificare liberamente la propria condotta. Al contrario, le scelte politiche sono descritte come troppo complesse e complesse perché gli individui possano misurare i loro effetti personali, rendendo il meccanismo di feedback molto meno diretto ed efficace rispetto agli accordi contrattuali volontari.
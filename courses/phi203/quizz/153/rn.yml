question: Ni itandukaniro irihe rikomeye riri hagati y’ingene abantu babona ingaruka z’amahitamwo yabo mu migenderanire y’amasezerano n’ingingo za politike?
answer: Mu masezerano, abantu ku giti cabo bumva ata guca ku ruhande ingaruka biciye ku kubabara canke ku munezero wabo bwite kandi barashobora guhindura inyifato yabo, mu gihe amahitamwo ya politike ari agoye cane kandi afata abantu bose ku buryo abantu badashobora gupima ingaruka zabo bwite .
wrong_answers:
  - Mu masezerano, abantu bafata ingingo zishingiye ku matora menshi, mu gihe ingingo za politike zifatwa biciye mu kwiyumvira kw’umuntu ku giti ciwe no mu nshingano z’umuntu ku giti ciwe .
  - Mu masezerano, ingaruka zishirwaho n’ubutegetsi bwo hanze, mu gihe ingingo za politike zituma abantu bashobora guhitamwo no guhindura inyifato yiwe bivanye n’ivyavuyemwo .
  - Mu masezerano, abantu ntibashobora guhindura imigambi yabo iyo bamaze kuyifata, mu gihe ingingo za politike zitanga uburenganzira bwo gukomeza guhindura ibintu be n’ubushobozi bwo kuva mu ntunganyo zitari nziza .
explanation: |
  Ico canditswe gishimika ku vy’uko imigenderanire y’amasezerano ituma abantu bashobora kwihweza ata guca ku ruhande ukuri kwabo no kwumva ingaruka z’ivyo bahisemwo biciye ku kubabara canke ku munezero, bikaba bituma bashobora guhindura inyifato yabo ata co bibangamiye. Mu buryo butandukanye n’ubwo, amahitamwo ya politike adondorwa ko ari agoranye cane kandi afise vyinshi ku buryo abantu badashobora gupima ingaruka zabo bwite, ivyo bikaba bituma uburyo bwo gutanga inyishu butaziguye cane kandi bukora neza nk’uko biri mu ntunganyo z’amasezerano y’ubushake.
question: ¿Cuál es la diferencia clave entre cómo experimentan los individuos las consecuencias de sus elecciones en las relaciones contractuales frente a las decisiones políticas?
answer: En los contratos, los individuos sienten directamente los efectos a través del dolor o el placer personal y pueden modificar su conducta, mientras que las opciones políticas son demasiado complejas y abarcadoras para que los individuos puedan medir sus efectos personales
wrong_answers:
  - En los contratos, los individuos toman decisiones basadas en el voto mayoritario, mientras que las decisiones políticas se toman mediante la deliberación individual y la responsabilidad personal
  - En los contratos, las consecuencias vienen impuestas por autoridades externas, mientras que las decisiones políticas permiten a los individuos elegir libremente y modificar su comportamiento en función de los resultados
  - En los contratos, los individuos no pueden cambiar sus planes una vez comprometidos, mientras que las decisiones políticas ofrecen una flexibilidad continua y la posibilidad de retirarse de acuerdos desfavorables
explanation: |
  El texto destaca que las relaciones contractuales permiten a los individuos observar directamente su realidad y sentir los efectos de sus elecciones a través del dolor o el placer, lo que les permite modificar su conducta libremente. En cambio, las opciones políticas se describen como demasiado complejas y abarcadoras para que los individuos puedan medir sus efectos personales, lo que hace que el mecanismo de retroalimentación sea mucho menos directo y eficaz que en los acuerdos contractuales voluntarios.
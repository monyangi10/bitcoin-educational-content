question: Ni tofauti gani kuu kati ya jinsi watu binafsi wanavyopata matokeo ya uchaguzi wao katika mahusiano ya kimkataba dhidi ya maamuzi ya kisiasa?
answer: Katika mikataba, watu huhisi moja kwa moja athari kupitia maumivu au raha ya kibinafsi na wanaweza kurekebisha mwenendo wao, huku chaguzi za kisiasa zikiwa ngumu sana na zenye kujumuisha mambo mengi kwa watu binafsi kupima athari zao binafsi.
wrong_answers:
  - Katika mikataba, watu binafsi hufanya maamuzi kulingana na kura nyingi, huku maamuzi ya kisiasa yakifanywa kupitia majadiliano ya mtu binafsi na uwajibikaji binafsi.
  - Katika mikataba, matokeo huwekwa na mamlaka za nje, huku maamuzi ya kisiasa yakiwaruhusu watu kuchagua na kurekebisha tabia zao kwa uhuru kulingana na matokeo.
  - Katika mikataba, watu binafsi hawawezi kubadilisha mipango yao mara tu wanapoifanya, huku maamuzi ya kisiasa yakitoa unyumbufu unaoendelea na uwezo wa kujiondoa katika mipango isiyofaa.
explanation: |
  Maandishi yanasisitiza kwamba mahusiano ya kimkataba huruhusu watu binafsi kuchunguza moja kwa moja uhalisia wao na kuhisi athari za chaguo zao kupitia maumivu au raha, na kuwawezesha kurekebisha mwenendo wao kwa uhuru. Kwa upande mwingine, chaguzi za kisiasa zinaelezewa kuwa ngumu sana na zenye kujumuisha watu binafsi kupima athari zao binafsi, na kufanya utaratibu wa maoni kuwa mdogo sana na usio wa moja kwa moja na wenye ufanisi kuliko katika mipango ya kimkataba ya hiari.
question: Apa perbedaan utama antara bagaimana individu mengalami konsekuensi dari pilihan mereka dalam hubungan kontraktual dengan keputusan politik?
answer: Dalam kontrak, individu secara langsung merasakan dampaknya melalui rasa sakit atau kesenangan pribadi dan dapat memodifikasi perilaku mereka, sementara pilihan politik terlalu kompleks dan mencakup banyak hal bagi individu untuk mengukur dampak pribadi mereka
wrong_answers:
  - Dalam kontrak, individu membuat keputusan berdasarkan suara terbanyak, sementara keputusan politik dibuat melalui musyawarah individu dan tanggung jawab pribadi
  - Dalam kontrak, konsekuensi diberlakukan oleh otoritas eksternal, sementara keputusan politik memungkinkan individu untuk secara bebas memilih dan memodifikasi perilaku mereka berdasarkan hasil
  - Dalam kontrak, individu tidak dapat mengubah rencana mereka setelah berkomitmen, sementara keputusan politik menawarkan fleksibilitas yang berkelanjutan dan kemampuan untuk menarik diri dari kesepakatan yang tidak menguntungkan
explanation: |
  Teks ini menekankan bahwa hubungan kontraktual memungkinkan individu untuk secara langsung mengamati realitas mereka dan merasakan dampak dari pilihan mereka melalui rasa sakit atau kesenangan, sehingga mereka dapat memodifikasi perilaku mereka secara bebas. Sebaliknya, pilihan politik digambarkan terlalu rumit dan mencakup banyak hal bagi individu untuk mengukur dampak pribadi mereka, sehingga mekanisme umpan balik menjadi kurang langsung dan efektif dibandingkan dengan pengaturan kontrak sukarela.
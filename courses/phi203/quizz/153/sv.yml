question: Vad är den avgörande skillnaden mellan hur individer upplever konsekvenserna av sina val i avtalsförhållanden respektive politiska beslut?
answer: I kontrakt känner individerna direkt av effekterna genom personlig smärta eller njutning och kan ändra sitt beteende, medan politiska val är för komplexa och omfattande för att individerna ska kunna mäta sina personliga effekter
wrong_answers:
  - I kontrakt fattar individer beslut baserat på majoritetsbeslut, medan politiska beslut fattas genom individuella överväganden och personligt ansvar
  - I kontrakt åläggs konsekvenserna av externa myndigheter, medan politiska beslut gör det möjligt för individer att fritt välja och ändra sitt beteende baserat på resultat
  - I kontrakt kan individer inte ändra sina planer när de väl har åtagit sig dem, medan politiska beslut erbjuder kontinuerlig flexibilitet och möjlighet att dra sig ur ogynnsamma arrangemang
explanation: |
  I texten betonas att avtalsförhållanden gör det möjligt för individer att direkt observera sin verklighet och känna effekterna av sina val genom smärta eller njutning, vilket gör det möjligt för dem att fritt ändra sitt beteende. Politiska val beskrivs däremot som alltför komplexa och omfattande för att individerna ska kunna mäta sina personliga effekter, vilket gör återkopplingsmekanismen mycket mindre direkt och effektiv än i frivilliga avtalsarrangemang.
question: Co slouží podle principu neútočení jako přirozený mechanismus, kterým je vnímáno narušení naší fyzické integrity?
answer: Bolest přenášená nervovým systémem
wrong_answers:
  - Strach a psychologické omezení jednání
  - Ekonomická konkurence ze strany jiných osob
  - Sociální tlak ze strany členů komunity
explanation: |
  Bolest přenášená nervovým systémem je správná odpověď, protože kapitola vysvětluje, že bolest představuje mechanismus, kterým se útoky na naši svobodu a tělesné vlastnictví projevují v našem vědomí. Bez tohoto jevu přenášeného nervovým systémem by nebylo možné vnímat narušení naší tělesné integrity. Tato fyziologická skutečnost zakládá přirozenou hranici svobody každého člověka. Strach je sice zmiňován jako sekundární faktor, který vytváří psychická omezení, a o ekonomické konkurenci se hovoří jako o druhu obtěžování, ale ani jeden z nich neslouží jako primární biologický mechanismus pro detekci porušování fyzické svobody. Sociální tlak není v této souvislosti vůbec zmíněn.
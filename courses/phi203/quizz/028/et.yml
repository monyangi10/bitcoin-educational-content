question: Mis on vastavalt mitteagressiivsuse põhimõttele see loomulik mehhanism, mille abil tajutakse meie füüsilise puutumatuse rikkumisi?
answer: Närvisüsteemi kaudu edastatav valu
wrong_answers:
  - Hirm ja psühholoogilised piirangud tegevusele
  - Majanduslik konkurents teiste isikute poolt
  - Kogukonna liikmete sotsiaalne surve
explanation: |
  Närvisüsteemi kaudu edastatav valu on õige vastus, sest peatükis selgitatakse, et valu on mehhanism, mille kaudu meie vabadust ja kehalist omandit kahjustavad rünnakud ilmnevad meie teadvuses. Ilma selle närvisüsteemi kaudu edastatava nähtuseta oleks võimatu tajuda meie kehalise puutumatuse rikkumisi. See füsioloogiline reaalsus seab igaühe vabadusele loomuliku piiri. Kuigi hirmu mainitakse kui sekundaarset tegurit, mis loob psühholoogilisi piiranguid, ja majanduslikku konkurentsi arutatakse kui ühte tüüpi häiringut, ei ole kumbki neist esmane bioloogiline mehhanism füüsiliste rikkumiste tuvastamiseks. Sotsiaalset survet ei mainita selles kontekstis üldse.
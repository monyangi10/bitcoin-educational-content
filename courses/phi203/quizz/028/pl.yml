question: Zgodnie z zasadą nieagresji, co służy jako naturalny mechanizm postrzegania naruszeń naszej integralności fizycznej?
answer: Ból przenoszony przez układ nerwowy
wrong_answers:
  - Strach i psychologiczne ograniczenia działania
  - Konkurencja ekonomiczna ze strony innych osób
  - Presja społeczna ze strony członków społeczności
explanation: |
  Ból przekazywany przez układ nerwowy jest poprawną odpowiedzią, ponieważ rozdział wyjaśnia, że ból stanowi mechanizm, za pomocą którego ataki na naszą wolność i własność cielesną manifestują się naszej świadomości. Bez tego zjawiska przenoszonego przez układ nerwowy niemożliwe byłoby postrzeganie naruszeń naszej integralności fizycznej. Ta fizjologiczna rzeczywistość ustanawia naturalną granicę wolności każdego człowieka. Chociaż strach jest wymieniany jako drugorzędny czynnik, który tworzy psychologiczne ograniczenia, a konkurencja ekonomiczna jest omawiana jako rodzaj uciążliwości, żaden z nich nie służy jako podstawowy biologiczny mechanizm wykrywania fizycznych naruszeń. Presja społeczna nie jest w ogóle wspominana w tym kontekście.
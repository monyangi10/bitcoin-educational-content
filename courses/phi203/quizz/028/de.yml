question: Was ist nach dem Prinzip der Nicht-Aggression der natürliche Mechanismus, mit dem Verletzungen unserer körperlichen Unversehrtheit wahrgenommen werden?
answer: Schmerz, der über das Nervensystem übertragen wird
wrong_answers:
  - Ängste und psychologische Handlungszwänge
  - Wirtschaftlicher Wettbewerb durch andere Personen
  - Sozialer Druck von Mitgliedern der Gemeinschaft
explanation: |
  Schmerz, der durch das Nervensystem übertragen wird, ist die richtige Antwort, denn in dem Kapitel wird erläutert, dass Schmerz der Mechanismus ist, durch den sich Angriffe auf unsere Freiheit und unser körperliches Eigentum in unserem Bewusstsein manifestieren. Ohne dieses vom Nervensystem übertragene Phänomen wäre es unmöglich, Verletzungen unserer körperlichen Integrität wahrzunehmen. Diese physiologische Realität stellt eine natürliche Grenze für die Freiheit eines jeden Menschen dar. Zwar wird die Angst als sekundärer Faktor genannt, der psychologische Zwänge schafft, und der wirtschaftliche Wettbewerb wird als eine Art von Belästigung diskutiert, doch beides dient nicht als primärer biologischer Mechanismus zur Erkennung körperlicher Verletzungen. Der soziale Druck wird in diesem Zusammenhang überhaupt nicht erwähnt.
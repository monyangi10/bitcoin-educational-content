question: De acordo com o princípio da não agressão, qual é o mecanismo natural através do qual as violações da nossa integridade física são percepcionadas?
answer: Dor transmitida pelo sistema nervoso
wrong_answers:
  - O medo e os constrangimentos psicológicos à ação
  - Concorrência económica de outros indivíduos
  - Pressão social dos membros da comunidade
explanation: |
  A dor transmitida pelo sistema nervoso é a resposta correta porque o capítulo explica que a dor constitui o mecanismo pelo qual os atentados à nossa liberdade e aos nossos bens corporais se manifestam à nossa consciência. Sem este fenómeno transmitido pelo sistema nervoso, seria impossível perceber as violações da nossa integridade física. Esta realidade fisiológica estabelece um limite natural à liberdade de cada um. Embora o medo seja mencionado como um fator secundário que cria constrangimentos psicológicos, e a concorrência económica seja discutida como um tipo de incómodo, nenhum deles serve como mecanismo biológico primário para detetar violações físicas. A pressão social não é mencionada neste contexto.
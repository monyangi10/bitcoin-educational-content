question: Согласно принципу ненападения, что служит естественным механизмом, с помощью которого воспринимаются нарушения нашей физической целостности?
answer: Боль передается через нервную систему
wrong_answers:
  - Страх и психологические ограничения на действия
  - Экономическая конкуренция со стороны других лиц
  - Социальное давление со стороны членов сообщества
explanation: |
  Боль, передаваемая через нервную систему, - правильный ответ, поскольку в главе объясняется, что боль представляет собой механизм, с помощью которого посягательства на нашу свободу и телесную собственность проявляются в нашем сознании. Без этого феномена, передаваемого нервной системой, было бы невозможно воспринимать нарушения нашей физической целостности. Эта физиологическая реальность устанавливает естественный предел свободы каждого человека. Хотя страх упоминается как вторичный фактор, создающий психологические ограничения, а экономическая конкуренция рассматривается как один из видов неприятных ощущений, ни то, ни другое не служит первичным биологическим механизмом для обнаружения физических нарушений. Социальное давление вообще не упоминается в данном контексте.
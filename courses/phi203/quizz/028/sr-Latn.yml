question: Prema principu nenapadanja, šta služi kao prirodni mehanizam putem kojeg se kršenja našeg fizičkog integriteta percipiraju?
answer: Bol prenosi kroz nervni sistem
wrong_answers:
  - Strah i psihološka ograničenja na delovanje
  - Ekonomska konkurencija od strane drugih pojedinaca
  - Društveni pritisak članova zajednice
explanation: |
  Bol prenet kroz nervni sistem je tačan odgovor jer poglavlje objašnjava da bol predstavlja mehanizam putem kojeg napadi na našu slobodu i telesnu svojinu dolaze do naše svesti. Bez ovog fenomena prenetog nervnim sistemom, bilo bi nemoguće percipirati povrede naše fizičke celovitosti. Ova fiziološka stvarnost postavlja prirodnu granicu slobode svakog pojedinca. Dok se strah pominje kao sekundarni faktor koji stvara psihološka ograničenja, a ekonomska konkurencija se razmatra kao vrsta smetnje, nijedno od njih ne služi kao primarni biološki mehanizam za otkrivanje fizičkih povreda. Društveni pritisak se u ovom kontekstu uopšte ne pominje.
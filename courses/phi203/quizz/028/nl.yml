question: Wat is volgens het non-agressie principe het natuurlijke mechanisme waarmee schendingen van onze fysieke integriteit worden waargenomen?
answer: Pijn die wordt doorgegeven via het zenuwstelsel
wrong_answers:
  - Angst en psychologische beperkingen op actie
  - Economische concurrentie van andere individuen
  - Sociale druk van leden van de gemeenschap
explanation: |
  Pijn die door het zenuwstelsel wordt doorgegeven is het juiste antwoord omdat het hoofdstuk uitlegt dat pijn het mechanisme is waarmee aanvallen op onze vrijheid en lichamelijke bezittingen zich aan ons bewustzijn manifesteren. Zonder dit fenomeen dat door het zenuwstelsel wordt doorgegeven, zou het onmogelijk zijn om schendingen van onze lichamelijke integriteit waar te nemen. Deze fysiologische realiteit stelt een natuurlijke grens aan ieders vrijheid. Hoewel angst wordt genoemd als een secundaire factor die psychologische beperkingen creëert en economische concurrentie wordt besproken als een soort overlast, dient geen van beide als het primaire biologische mechanisme voor het detecteren van fysieke schendingen. Sociale druk wordt in deze context helemaal niet genoemd.
question: Theo nguyên tắc không gây hấn, cơ chế tự nhiên nào giúp chúng ta nhận biết được những hành vi xâm phạm đến sự toàn vẹn về thể chất?
answer: Cảm giác đau được truyền qua hệ thần kinh.
wrong_answers:
  - Nỗi sợ hãi và những hạn chế tâm lý đối với hành động
  - Cạnh tranh kinh tế từ các cá nhân khác
  - Áp lực xã hội từ các thành viên cộng đồng
explanation: |
  Đau đớn được truyền qua hệ thần kinh là câu trả lời chính xác vì chương này giải thích rằng đau đớn là cơ chế mà qua đó các cuộc tấn công vào tự do và tài sản thân thể của chúng ta được biểu hiện đến ý thức. Nếu không có hiện tượng được truyền qua hệ thần kinh này, sẽ không thể nhận thức được sự vi phạm toàn vẹn về thể chất của chúng ta. Thực tế sinh lý này thiết lập một giới hạn tự nhiên cho tự do của mỗi người. Mặc dù nỗi sợ hãi được đề cập như một yếu tố thứ cấp tạo ra những ràng buộc về tâm lý, và cạnh tranh kinh tế được thảo luận như một loại phiền toái, nhưng cả hai đều không phải là cơ chế sinh học chính để phát hiện các vi phạm về thể chất. Áp lực xã hội hoàn toàn không được đề cập trong ngữ cảnh này.
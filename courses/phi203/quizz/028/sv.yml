question: Enligt icke-aggressionsprincipen, vad är den naturliga mekanism genom vilken kränkningar av vår fysiska integritet uppfattas?
answer: Smärta som överförs via nervsystemet
wrong_answers:
  - Rädsla och psykologiska hinder för handling
  - Ekonomisk konkurrens från andra individer
  - Sociala påtryckningar från samhällsmedlemmar
explanation: |
  Smärta som överförs via nervsystemet är rätt svar eftersom kapitlet förklarar att smärta utgör den mekanism genom vilken angrepp på vår frihet och kroppsliga egendom manifesteras för vårt medvetande. Utan detta fenomen som överförs via nervsystemet skulle det vara omöjligt att uppfatta kränkningar av vår fysiska integritet. Denna fysiologiska realitet sätter en naturlig gräns för allas vår frihet. Även om rädsla nämns som en sekundär faktor som skapar psykologiska begränsningar och ekonomisk konkurrens diskuteras som en typ av olägenhet, fungerar ingen av dem som den primära biologiska mekanismen för att upptäcka fysiska kränkningar. Sociala påtryckningar nämns överhuvudtaget inte i detta sammanhang.
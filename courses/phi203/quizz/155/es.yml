question: ¿Qué principio fundamental distingue una contribución legítima de una imposición arbitraria según la teoría económica liberal?
answer: La contribución representa un intercambio voluntario en el que los ciudadanos reciben servicios específicos a cambio de su pago
wrong_answers:
  - La contribución se recauda sólo de los ciudadanos ricos, mientras que los impuestos se aplican a todas las clases sociales por igual
  - La contribución se determina por votación democrática mientras que los impuestos los imponen burócratas no elegidos
  - La contribución se paga en bienes y servicios, mientras que los impuestos deben pagarse exclusivamente en forma monetaria
explanation: |
  El capítulo establece que la contribución legítima funciona como un intercambio voluntario en el que los ciudadanos pagan por servicios colectivos específicos, como los tribunales y la policía, que garantizan la seguridad de las transacciones y una vida social pacífica. Esto se asemeja a una compra colectiva con una lógica clara de servicio por pago. La fiscalidad arbitraria, por el contrario, se deriva de una concepción en la que el soberano es dueño de todas las tierras y súbditos, imponiendo cargas en función de la voluntad política y no de la prestación de servicios. Las otras opciones tergiversan la distinción fundamental, que se centra en el intercambio voluntario frente a la dominación impuesta.
question: Hvilket grunnleggende prinsipp skiller et legitimt bidrag fra vilkårlig beskatning ifølge liberal økonomisk teori?
answer: Bidrag representerer et frivillig bytte der innbyggerne mottar spesifikke tjenester i bytte mot betaling
wrong_answers:
  - Kontingenten innkreves kun fra velstående borgere, mens beskatningen gjelder likt for alle sosiale klasser
  - Bidraget fastsettes ved demokratisk avstemning, mens beskatningen pålegges av ikke-valgte byråkrater
  - Bidrag betales i form av varer og tjenester, mens skatt utelukkende må betales i form av penger
explanation: |
  Kapitlet slår fast at det legitime bidraget fungerer som et frivillig bytte der borgerne betaler for spesifikke kollektive tjenester som domstoler og politi, som sikrer transaksjonssikkerhet og et fredelig samfunnsliv. Dette ligner et kollektivt kjøp med en klar tjeneste-for-betaling-logikk. Vilkårlig beskatning, derimot, springer ut av en forestilling om at suverenen eier alle landområder og undersåtter, og pålegger avgifter i henhold til politisk vilje snarere enn tjenestetilbud. De andre alternativene gir en feilaktig fremstilling av det grunnleggende skillet, som dreier seg om frivillig bytte versus påtvunget dominans.
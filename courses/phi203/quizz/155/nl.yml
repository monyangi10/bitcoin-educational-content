question: Welk basisprincipe onderscheidt volgens de liberale economische theorie een legitieme bijdrage van een willekeurige belasting?
answer: Bijdrage is een vrijwillige ruil waarbij burgers specifieke diensten ontvangen in ruil voor hun betaling
wrong_answers:
  - Bijdrage wordt alleen geïnd van rijke burgers, terwijl belastingen gelijkelijk van toepassing zijn op alle sociale klassen
  - Bijdrage wordt bepaald door democratische stemming terwijl belasting wordt opgelegd door ongekozen bureaucraten
  - Bijdrage wordt betaald in goederen en diensten, terwijl belasting uitsluitend in geld moet worden betaald
explanation: |
  Het hoofdstuk stelt vast dat legitieme bijdrage werkt als een vrijwillige ruil waarbij burgers betalen voor specifieke collectieve diensten zoals rechtbanken en politie die transactiezekerheid en een vreedzaam sociaal leven garanderen. Dit lijkt op een collectieve aankoop met een duidelijke dienst-voor-betaling logica. Arbitraire belastingheffing daarentegen komt voort uit een opvatting waarbij de soeverein eigenaar is van alle land en onderdanen en heffingen oplegt op basis van politieke wil in plaats van dienstverlening. De andere opties geven een verkeerd beeld van het fundamentele onderscheid, dat draait om vrijwillige ruil versus opgelegde overheersing.
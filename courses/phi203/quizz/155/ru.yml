question: Какой основополагающий принцип отличает законный взнос от произвольного налогообложения, согласно либеральной экономической теории?
answer: Взнос представляет собой добровольный обмен, при котором граждане получают определенные услуги в обмен на их оплату
wrong_answers:
  - Взносы взимаются только с состоятельных граждан, в то время как налогообложение в равной степени распространяется на все социальные слои
  - Взносы определяются демократическим голосованием, в то время как налоги устанавливаются неизбираемыми бюрократами
  - Взносы выплачиваются товарами и услугами, в то время как налоги должны выплачиваться исключительно в денежной форме
explanation: |
  В главе показано, что легитимный вклад действует как добровольный обмен, когда граждане платят за конкретные коллективные услуги, такие как суды и полиция, которые обеспечивают безопасность сделок и спокойную социальную жизнь. Это напоминает коллективную покупку с четкой логикой "услуга в обмен на оплату". Произвольное налогообложение, напротив, вытекает из концепции, в которой суверен владеет всеми землями и подданными, устанавливая сборы в соответствии с политической волей, а не предоставлением услуг. Другие варианты искажают фундаментальное различие, которое заключается в добровольном обмене против навязанного господства.
question: 自由主義経済理論によれば、正当な寄付と恣意的な課税を区別する基本原則は何か？
answer: 拠出とは、市民が対価として特定のサービスを受ける自発的な交換のことである。
wrong_answers:
  - 寄付金は富裕層からのみ徴収され、税金はすべての社会階層に平等に適用される。
  - 拠出金は民主的な投票によって決定されるが、課税は選挙で選ばれたわけでもない官僚によって押し付けられる。
  - 拠出金は商品やサービスで支払われるのに対し、税金は金銭のみで支払わなければならない。
explanation: |
  この章では、合法的な寄付は自発的な交換のように行われ、市民は裁判所や警察など、取引の安全や平穏な社会生活を保証する特定の集団的サービスに対して対価を支払うことを立証している。これは、明確なサービス対支払いの論理を持つ集団的購入に似ている。逆に、恣意的な課税は、主権者がすべての土地と臣民を所有し、サービスの提供よりもむしろ政治的意思に従って料金を課すという概念に由来する。他の選択肢は、自発的な交換対押しつけられた支配という基本的な違いを誤って伝えている。
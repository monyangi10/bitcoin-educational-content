question: 자유주의 경제 이론에 따르면 정당한 기부금과 자의적 과세를 구분하는 기본 원칙은 무엇인가요?
answer: 기부금은 시민들이 지불한 대가로 특정 서비스를 받는 자발적인 교환을 의미합니다
wrong_answers:
  - 기부금은 부유한 시민에게만 징수하고 세금은 모든 사회 계층에 동등하게 적용됩니다
  - 기부금은 민주적 투표에 의해 결정되는 반면, 세금은 선출되지 않은 관료들에 의해 부과됩니다
  - 기부금은 상품과 서비스로 납부하는 반면, 세금은 금전적 형태로만 납부해야 합니다
explanation: |
  이 장에서는 합법적 기부금이 거래 안전과 평화로운 사회 생활을 보장하는 법원, 경찰과 같은 특정 집단 서비스에 대해 시민들이 자발적으로 비용을 지불하는 교환처럼 운영된다고 규정하고 있습니다. 이는 명확한 서비스 대 지불 논리를 가진 공동 구매와 유사합니다. 반대로 임의 과세는 주권자가 모든 토지와 주체를 소유하고, 서비스 제공이 아닌 정치적 의지에 따라 요금을 부과하는 개념에서 비롯됩니다. 다른 옵션은 자발적 교환과 부과된 지배를 중심으로 하는 근본적인 구분을 잘못 표현하고 있습니다.
question: Welches Grundprinzip unterscheidet nach der liberalen Wirtschaftstheorie eine legitime Abgabe von einer willkürlichen Besteuerung?
answer: Der Beitrag stellt einen freiwilligen Tausch dar, bei dem die Bürgerinnen und Bürger bestimmte Dienstleistungen als Gegenleistung für ihre Zahlung erhalten
wrong_answers:
  - Beiträge werden nur von wohlhabenden Bürgern erhoben, während die Besteuerung für alle sozialen Schichten gleichermaßen gilt
  - Der Beitrag wird durch eine demokratische Abstimmung festgelegt, während die Steuern von nicht gewählten Bürokraten auferlegt werden
  - Der Beitrag wird in Form von Waren und Dienstleistungen gezahlt, während die Steuern ausschließlich in Form von Geld gezahlt werden müssen
explanation: |
  In diesem Kapitel wird festgestellt, dass der legitime Beitrag wie ein freiwilliger Tausch funktioniert, bei dem die Bürger für bestimmte kollektive Dienstleistungen wie Gerichte und Polizei zahlen, die die Transaktionssicherheit und das friedliche soziale Leben gewährleisten. Dies ähnelt einem kollektiven Kauf mit einer klaren Logik von Leistung gegen Gegenleistung. Die willkürliche Besteuerung hingegen geht von einer Vorstellung aus, bei der der Souverän Eigentümer aller Ländereien und Untertanen ist, und erhebt Gebühren nach politischem Willen und nicht nach der Erbringung von Dienstleistungen. Die anderen Optionen verfälschen die grundlegende Unterscheidung, die sich auf den freiwilligen Austausch und die aufgezwungene Herrschaft konzentriert.
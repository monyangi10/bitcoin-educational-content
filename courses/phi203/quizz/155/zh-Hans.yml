question: 根据自由主义经济理论，什么基本原则将合法会费与任意征税区分开来？
answer: 捐助是一种自愿交换，公民通过支付费用获得特定的服务
wrong_answers:
  - 只向富裕公民征收会费，而税收则平等地适用于所有社会阶层
  - 会费由民主投票决定，而税收则由非民选官僚强制征收
  - 会费以商品和服务形式缴纳，而税收必须完全以货币形式缴纳
explanation: |
  本章认为，合法缴款的运作类似于自愿交换，公民为特定的集体服务付费，如法院和警察，以确保交易安全与和平的社会生活。这类似于集体购买，具有明确的服务换付款逻辑。反之，任意征税则源于主权者拥有所有土地和臣民的概念，根据政治意愿而非提供服务来征收费用。其他选项歪曲了基本区别，其核心是自愿交换与强加的统治。
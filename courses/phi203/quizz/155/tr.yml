question: Liberal ekonomi teorisine göre meşru bir katkıyı keyfi vergilendirmeden ayıran temel ilke nedir?
answer: Katkı, vatandaşların yaptıkları ödeme karşılığında belirli hizmetler aldıkları gönüllü bir alışverişi temsil eder
wrong_answers:
  - Vergilendirme tüm sosyal sınıflara eşit olarak uygulanırken, katkı payı sadece varlıklı vatandaşlardan toplanır
  - Katkı payı demokratik oylama ile belirlenirken, vergilendirme seçilmemiş bürokratlar tarafından dayatılmaktadır
  - Katkı payı mal ve hizmet olarak ödenirken, vergi yalnızca parasal olarak ödenmelidir
explanation: |
  Bu bölüm, meşru katkının, vatandaşların işlem güvenliği ve huzurlu bir sosyal yaşam sağlayan mahkemeler ve polis gibi belirli kolektif hizmetler için ödeme yaptığı gönüllü bir alışveriş gibi işlediğini ortaya koymaktadır. Bu, net bir ödeme karşılığı hizmet mantığına sahip kolektif bir satın almaya benzemektedir. Keyfi vergilendirme ise tam tersine, egemenin tüm toprakların ve tebaanın sahibi olduğu bir anlayıştan kaynaklanır ve hizmet sunumundan ziyade siyasi iradeye göre ücretlendirme yapar. Diğer seçenekler, dayatılan tahakküme karşı gönüllü mübadeleyi merkeze alan temel ayrımı yanlış yansıtmaktadır.
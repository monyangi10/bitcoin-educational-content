question: Koji fundamentalni princip razlikuje legitimni doprinos od proizvoljnog oporezivanja prema liberalnoj ekonomskoj teoriji?
answer: Doprinos predstavlja dobrovoljnu razmenu gde građani dobijaju određene usluge u zamenu za njihovo plaćanje
wrong_answers:
  - Doprinos se prikuplja samo od bogatih građana, dok se oporezivanje primenjuje jednako na sve društvene klase.
  - Doprinos se određuje demokratskim glasanjem dok poreze nameću neizabrani birokrati
  - Doprinos se plaća u robi i uslugama, dok se porez mora platiti isključivo u novčanom obliku.
explanation: |
  Poglavlje utvrđuje da legitimni doprinos funkcioniše kao dobrovoljna razmena gde građani plaćaju za specifične kolektivne usluge kao što su sudovi i policija koje obezbeđuju sigurnost transakcija i miran društveni život. Ovo podseća na kolektivnu kupovinu sa jasnom logikom usluga-za-plaćanje. Proizvoljno oporezivanje, nasuprot tome, proizlazi iz koncepcije gde suveren poseduje sve zemlje i podanike, namećući dažbine prema političkoj volji, a ne prema pružanju usluga. Druge opcije pogrešno predstavljaju osnovnu razliku, koja se fokusira na dobrovoljnu razmenu naspram nametnute dominacije.
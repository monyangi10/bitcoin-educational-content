question: 根據自由經濟理論，合法捐獻與任意徵稅的區別在於什麼基本原則？
answer: 貢獻代表一種自願性的交換，公民以支付費用的方式獲得特定的服務。
wrong_answers:
  - 只向富裕的公民徵收捐獻，而稅收對所有社會階層一視同仁。
  - 捐獻由民主投票決定，而課稅則由非選舉產生的官僚強加
  - 捐獻是以貨物和服務支付，而課稅則必須完全以貨幣形式支付。
explanation: |
  本章指出，合法貢獻的運作方式類似自願交換，公民支付特定的集體服務，例如法院和警察，以確保交易安全與和平的社會生活。這類似於集體購買，具有明確的服務換付款邏輯。反之，任意徵稅源於主權擁有所有土地和臣民的概念，依據政治意願徵收費用，而非提供服務。其他選項歪曲了基本的區別，其核心在於自願交換與強加的支配。
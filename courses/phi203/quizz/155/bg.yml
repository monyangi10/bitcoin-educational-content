question: Кой основен принцип разграничава законната вноска от произволното облагане според либералната икономическа теория?
answer: Приносът представлява доброволен обмен, при който гражданите получават конкретни услуги срещу заплащане
wrong_answers:
  - Вноските се събират само от богатите граждани, докато данъчното облагане се прилага еднакво за всички социални слоеве
  - Вноските се определят чрез демократично гласуване, докато данъчното облагане се налага от неизбрани бюрократи
  - Вноските се плащат под формата на стоки и услуги, докато данъците трябва да се плащат изключително в парична форма
explanation: |
  В тази глава се установява, че законната вноска функционира като доброволна размяна, при която гражданите плащат за специфични колективни услуги като съдилища и полиция, които осигуряват сигурността на сделките и спокойния социален живот. Това прилича на колективна покупка с ясна логика на услугата срещу заплащане. Произволното облагане, обратно, произтича от концепция, при която суверенът притежава всички земи и поданици, като налага такси според политическата воля, а не според предоставянето на услуги. Другите варианти изопачават основното разграничение, което се съсредоточава върху доброволната размяна срещу наложеното господство.
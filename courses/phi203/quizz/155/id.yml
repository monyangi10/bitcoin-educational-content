question: Prinsip dasar apa yang membedakan kontribusi yang sah dengan pajak yang sewenang-wenang menurut teori ekonomi liberal?
answer: Kontribusi merupakan pertukaran sukarela di mana warga negara menerima layanan tertentu sebagai imbalan atas pembayaran mereka
wrong_answers:
  - Kontribusi dikumpulkan hanya dari warga negara yang kaya, sementara pajak berlaku untuk semua kelas sosial secara merata
  - Kontribusi ditentukan oleh pemungutan suara yang demokratis, sementara pajak dikenakan oleh birokrat yang tidak terpilih
  - Kontribusi dibayarkan dalam bentuk barang dan jasa, sedangkan pajak harus dibayar secara eksklusif dalam bentuk uang
explanation: |
  Bab ini menetapkan bahwa kontribusi yang sah beroperasi seperti pertukaran sukarela di mana warga negara membayar layanan kolektif tertentu seperti pengadilan dan polisi yang menjamin keamanan transaksi dan kehidupan sosial yang damai. Hal ini menyerupai pembelian kolektif dengan logika layanan-untuk-pembayaran yang jelas. Sebaliknya, pajak sewenang-wenang berasal dari konsepsi di mana penguasa memiliki semua tanah dan subjek, mengenakan biaya sesuai dengan kehendak politik dan bukan penyediaan layanan. Opsi-opsi lain salah menggambarkan perbedaan mendasar, yang berpusat pada pertukaran sukarela versus dominasi yang dipaksakan.
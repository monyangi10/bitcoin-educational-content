question: Какъв е бил основният проблем на свободната конкуренция през Средновековието, поради който тя е изглеждала непрактична?
answer: Местните производители, като например хлебопроизводителите, са имали запазени пазари, което е довело до господство над потребителите
wrong_answers:
  - Разходите за транспорт са били твърде високи, за да бъде конкуренцията рентабилна
  - Религиозните власти забраняват търговската конкуренция между търговците
  - Селскостопанската технология е била недостатъчна, за да поддържа множество конкуриращи се производители
explanation: |
  Според текста през Средновековието свободната конкуренция е изглеждала непрактична, тъй като производителите са работили на изолирани местни пазари. Даденият пример е за хлебар в малък град, който имал запазен пазар, което създало ситуация, в която производителите доминирали над потребителите, вместо да се конкурират, за да ги обслужват по-добре. Това се променя през XVIII в., когато се развива световната търговия, която прави свободната търговия практична, като разрушава тези местни монополи и създава реална конкуренция, която е от полза за потребителите чрез по-добри цени и качество.
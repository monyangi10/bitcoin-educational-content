question: What was the main problem with free competition in medieval times that made it seem impractical?
answer: Local producers like bakers had reserved markets creating domination over consumers
wrong_answers:
  - Transportation costs were too high to make competition profitable
  - Religious authorities prohibited commercial competition between merchants
  - Agricultural technology was insufficient to support multiple competing producers
explanation: |
  According to the text, in medieval times free competition seemed impractical because producers operated in isolated local markets. The example given is of a baker in a small town who had a reserved market, which created a situation where producers dominated consumers rather than competing to serve them better. This changed in the 18th century when global commerce developed, making free trade practical by breaking down these local monopolies and creating real competition that benefited consumers through better prices and quality.
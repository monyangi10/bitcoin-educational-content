question: Mikä oli keskiajan vapaan kilpailun suurin ongelma, joka sai sen vaikuttamaan epäkäytännölliseltä?
answer: Paikallisilla tuottajilla, kuten leipureilla, oli varatut markkinat, jotka loivat määräävän aseman kuluttajiin nähden
wrong_answers:
  - Kuljetuskustannukset olivat liian korkeat, jotta kilpailu olisi ollut kannattavaa
  - Uskonnolliset viranomaiset kielsivät kauppiaiden välisen kaupallisen kilpailun
  - Maatalousteknologia oli riittämätön tukemaan useita kilpailevia tuottajia
explanation: |
  Tekstin mukaan vapaa kilpailu vaikutti keskiajalla epäkäytännölliseltä, koska tuottajat toimivat eristyksissä olevilla paikallisilla markkinoilla. Esimerkkinä mainitaan pienen kaupungin leipuri, jolla oli varatut markkinat, mikä johti tilanteeseen, jossa tuottajat hallitsivat kuluttajia sen sijaan, että olisivat kilpailleet palvellakseen heitä paremmin. Tilanne muuttui 1700-luvulla, kun maailmanlaajuinen kaupankäynti kehittyi ja teki vapaakaupasta käytännöllistä, kun paikalliset monopolit murtuivat ja syntyi todellista kilpailua, joka hyödytti kuluttajia parempien hintojen ja laadun kautta.
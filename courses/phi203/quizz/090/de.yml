question: Was war das Hauptproblem des freien Wettbewerbs im Mittelalter, das ihn unpraktisch erscheinen ließ?
answer: Lokale Hersteller wie Bäcker hatten reservierte Märkte, die eine Vormachtstellung gegenüber den Verbrauchern begründeten
wrong_answers:
  - Die Transportkosten waren zu hoch, um den Wettbewerb rentabel zu machen
  - Religiöse Autoritäten verboten den kommerziellen Wettbewerb zwischen Kaufleuten
  - Die landwirtschaftliche Technologie reichte nicht aus, um mehrere konkurrierende Erzeuger zu unterstützen
explanation: |
  Dem Text zufolge schien der freie Wettbewerb im Mittelalter nicht praktikabel zu sein, da die Hersteller auf isolierten lokalen Märkten tätig waren. Als Beispiel wird ein Bäcker in einer Kleinstadt angeführt, der einen reservierten Markt hatte, was zu einer Situation führte, in der die Hersteller die Verbraucher beherrschten, anstatt mit ihnen zu konkurrieren, um sie besser zu bedienen. Dies änderte sich im 18. Jahrhundert, als sich der globale Handel entwickelte, der den freien Handel praktisch machte, indem er diese lokalen Monopole aufbrach und einen echten Wettbewerb schuf, der den Verbrauchern durch bessere Preise und Qualität zugute kam.
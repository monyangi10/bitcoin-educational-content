question: 중세 시대의 자유 경쟁이 비현실적으로 보이게 만든 주요 문제점은 무엇이었을까요?
answer: 제빵사와 같은 지역 생산자들은 시장을 독점하여 소비자에 대한 지배력을 확보했습니다
wrong_answers:
  - 운송 비용이 너무 높아 경쟁에서 수익성을 확보할 수 없었습니다
  - 종교 당국은 판매자 간의 상업적 경쟁을 금지했습니다
  - 여러 경쟁 생산자를 지원하기에는 농업 기술이 충분하지 않았습니다
explanation: |
  텍스트에 따르면 중세 시대에는 생산자들이 고립된 지역 시장에서 활동했기 때문에 자유 경쟁이 비현실적으로 보였습니다. 예를 들어 한 작은 마을의 제빵사가 독점 시장을 가지고 있었기 때문에 생산자가 소비자에게 더 나은 서비스를 제공하기 위해 경쟁하기보다는 소비자를 지배하는 상황이 발생했습니다. 18세기에 세계 상업이 발전하면서 이러한 지역 독점을 무너뜨리고 더 나은 가격과 품질을 통해 소비자에게 혜택을 주는 진정한 경쟁을 만들어 자유무역이 실용화되었습니다.
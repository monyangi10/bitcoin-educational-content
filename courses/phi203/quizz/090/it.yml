question: Qual era il problema principale della libera concorrenza nel Medioevo, che la faceva sembrare impraticabile?
answer: I produttori locali, come i panettieri, avevano mercati riservati che creavano un dominio sui consumatori
wrong_answers:
  - I costi di trasporto erano troppo elevati per rendere redditizia la concorrenza
  - Le autorità religiose proibivano la concorrenza commerciale tra i mercanti
  - La tecnologia agricola era insufficiente a sostenere più produttori in concorrenza tra loro
explanation: |
  Secondo il testo, nel Medioevo la libera concorrenza sembrava impraticabile perché i produttori operavano in mercati locali isolati. L'esempio fornito è quello di un fornaio di una piccola città che aveva un mercato riservato, il che creava una situazione in cui i produttori dominavano i consumatori piuttosto che competere per servirli meglio. La situazione è cambiata nel XVIII secolo, quando si è sviluppato il commercio globale, che ha reso pratico il libero scambio, abbattendo questi monopoli locali e creando una vera e propria concorrenza a vantaggio dei consumatori, grazie a prezzi e qualità migliori.
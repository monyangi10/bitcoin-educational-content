question: ¿Cuál era el principal problema de la libre competencia en la época medieval que la hacía parecer poco práctica?
answer: Los productores locales, como los panaderos, tenían mercados reservados que creaban dominio sobre los consumidores
wrong_answers:
  - Los costes de transporte eran demasiado elevados para que la competencia fuera rentable
  - Las autoridades religiosas prohibieron la competencia comercial entre mercaderes
  - La tecnología agrícola era insuficiente para apoyar a múltiples productores en competencia
explanation: |
  Según el texto, en la época medieval la libre competencia parecía poco práctica porque los productores operaban en mercados locales aislados. El ejemplo que se da es el de un panadero de una pequeña ciudad que tenía un mercado reservado, lo que creaba una situación en la que los productores dominaban a los consumidores en lugar de competir para servirles mejor. Esto cambió en el siglo XVIII, cuando se desarrolló el comercio mundial, lo que hizo que el libre comercio fuera práctico al acabar con estos monopolios locales y crear una competencia real que beneficiaba a los consumidores gracias a unos precios y una calidad mejores.
question: 中世における自由競争が非現実的と思われた主な問題は何だったのか？
answer: パン屋のような地元の生産者が市場を確保し、消費者に対する支配を生み出していた。
wrong_answers:
  - 輸送コストが高すぎて競争は採算に合わなかった
  - 宗教当局は商人間の商業競争を禁止した。
  - 農業技術は、競合する複数の生産者を支えるには不十分だった。
explanation: |
  本文によれば、中世の時代には自由競争は現実的でなかったようだ。例として挙げられているのは、小さな町のパン屋が市場を独占していたため、生産者が消費者により良いサービスを提供するために競争するのではなく、消費者を支配する状況を作り出していた。この状況は、18世紀に世界的な商業が発展し、自由貿易が現実的なものとなり、こうした地域的独占を打破し、より良い価格と品質を通じて消費者に利益をもたらす真の競争が生まれたことで変化した。
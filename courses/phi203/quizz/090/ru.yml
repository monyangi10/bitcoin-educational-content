question: В чем заключалась главная проблема свободной конкуренции в средневековые времена, из-за которой она казалась непрактичной?
answer: Местные производители, такие как пекари, имели зарезервированные рынки, что создавало доминирование над потребителями
wrong_answers:
  - Транспортные расходы были слишком высоки, чтобы сделать конкуренцию выгодной
  - Религиозные власти запрещали торговую конкуренцию между купцами
  - Сельскохозяйственные технологии были недостаточны для поддержки многочисленных конкурирующих производителей
explanation: |
  Согласно тексту, в средневековые времена свободная конкуренция казалась непрактичной, поскольку производители действовали на изолированных местных рынках. В качестве примера приводится пекарь в маленьком городке, у которого был свой рынок, что создавало ситуацию, когда производители доминировали над потребителями, а не конкурировали, чтобы лучше их обслуживать. Ситуация изменилась в XVIII веке, когда развилась глобальная торговля, сделав свободную торговлю практичной, разрушив местные монополии и создав реальную конкуренцию, которая принесла выгоду потребителям благодаря более высоким ценам и качеству.
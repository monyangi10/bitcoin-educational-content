question: Co bylo hlavním problémem volné soutěže ve středověku, kvůli kterému se zdála nepraktická?
answer: Místní výrobci, jako jsou pekaři, měli vyhrazené trhy, což vytvářelo nadvládu nad spotřebiteli
wrong_answers:
  - Náklady na dopravu byly příliš vysoké na to, aby se konkurence vyplatila
  - Náboženské autority zakázaly obchodní soutěž mezi obchodníky
  - Zemědělská technika nebyla dostatečná pro podporu více konkurenčních výrobců
explanation: |
  Podle textu se ve středověku zdála volná soutěž nepraktická, protože výrobci působili na izolovaných místních trzích. Uvádí se příklad pekaře v malém městě, který měl vyhrazený trh, což vytvářelo situaci, kdy výrobci ovládali spotřebitele, místo aby si konkurovali a lépe jim sloužili. To se změnilo v 18. století, kdy se rozvinul celosvětový obchod, díky němuž se volný obchod stal praktickým, protože rozbil tyto místní monopoly a vytvořil skutečnou konkurenci, která spotřebitelům přinášela prospěch díky lepším cenám a kvalitě.
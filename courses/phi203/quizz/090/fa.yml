question: مشکل اصلی رقابت آزاد در قرون وسطی که آن را غیرعملی جلوه می‌داد چه بود؟
answer: تولیدکنندگان محلی مانند نانوایان بازارهای محفوظی داشتند که بر مصرف‌کنندگان تسلط ایجاد می‌کرد.
wrong_answers:
  - هزینه‌های حمل و نقل بیش از حد بالا بود تا رقابت را سودآور کند
  - مقامات مذهبی رقابت تجاری بین بازرگانان را ممنوع کردند
  - فناوری کشاورزی برای حمایت از چندین تولیدکننده رقیب ناکافی بود
explanation: |
  بر اساس متن، در دوران قرون وسطی رقابت آزاد غیرعملی به نظر می‌رسید زیرا تولیدکنندگان در بازارهای محلی منزوی فعالیت می‌کردند. مثالی که ارائه شده، نانوایی در یک شهر کوچک است که بازاری محفوظ داشت و این وضعیت باعث می‌شد تولیدکنندگان بر مصرف‌کنندگان تسلط داشته باشند، به جای اینکه برای خدمت بهتر به آن‌ها رقابت کنند. این وضعیت در قرن ۱۸ تغییر کرد، زمانی که تجارت جهانی توسعه یافت و با از بین بردن این انحصارهای محلی، تجارت آزاد را عملی کرد و رقابت واقعی ایجاد کرد که به نفع مصرف‌کنندگان از طریق قیمت‌ها و کیفیت بهتر بود.
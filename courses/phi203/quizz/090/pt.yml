question: Qual era o principal problema da livre concorrência na época medieval que a tornava impraticável?
answer: Os produtores locais, como os padeiros, tinham mercados reservados, criando um domínio sobre os consumidores
wrong_answers:
  - Os custos de transporte eram demasiado elevados para tornar a concorrência rentável
  - As autoridades religiosas proibiam a concorrência comercial entre comerciantes
  - A tecnologia agrícola era insuficiente para apoiar múltiplos produtores concorrentes
explanation: |
  De acordo com o texto, na época medieval, a livre concorrência parecia impraticável porque os produtores operavam em mercados locais isolados. O exemplo dado é o de um padeiro de uma pequena cidade que tinha um mercado reservado, o que criava uma situação em que os produtores dominavam os consumidores em vez de competirem para os servir melhor. Esta situação alterou-se no século XVIII, quando o comércio global se desenvolveu, tornando o comércio livre prático ao quebrar estes monopólios locais e ao criar uma verdadeira concorrência que beneficiava os consumidores através de melhores preços e qualidade.
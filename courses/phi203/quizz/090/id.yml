question: Apa masalah utama dengan persaingan bebas pada abad pertengahan yang membuatnya tampak tidak praktis?
answer: Produsen lokal seperti pembuat roti memiliki pasar khusus yang menciptakan dominasi atas konsumen
wrong_answers:
  - Biaya transportasi terlalu tinggi untuk membuat persaingan menjadi menguntungkan
  - Otoritas agama melarang persaingan komersial antar pedagang
  - Teknologi pertanian tidak cukup untuk mendukung banyak produsen yang bersaing
explanation: |
  Menurut teks tersebut, pada abad pertengahan, persaingan bebas tampaknya tidak praktis karena produsen beroperasi di pasar lokal yang terisolasi. Contoh yang diberikan adalah seorang pembuat roti di sebuah kota kecil yang memiliki pasar tersendiri, yang menciptakan situasi di mana produsen mendominasi konsumen dan bukannya bersaing untuk melayani mereka dengan lebih baik. Hal ini berubah pada abad ke-18 ketika perdagangan global berkembang, membuat perdagangan bebas menjadi praktis dengan memecah monopoli lokal dan menciptakan persaingan nyata yang menguntungkan konsumen melalui harga dan kualitas yang lebih baik.
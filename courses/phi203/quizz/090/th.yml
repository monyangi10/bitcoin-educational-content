question: ปัญหาหลักของการแข่งขันเสรีในยุคกลางที่ทำให้ดูเหมือนไม่สามารถปฏิบัติได้คืออะไร?
answer: ผู้ผลิตในท้องถิ่นเช่นคนทำขนมปังมีตลาดที่สงวนไว้สร้างการครอบงำเหนือผู้บริโภค
wrong_answers:
  - ค่าขนส่งสูงเกินไปที่จะทำให้การแข่งขันมีกำไร
  - เจ้าหน้าที่ทางศาสนาห้ามการแข่งขันทางการค้าระหว่างพ่อค้า
  - เทคโนโลยีการเกษตรไม่เพียงพอที่จะสนับสนุนผู้ผลิตหลายรายที่แข่งขันกัน
explanation: |
  ตามข้อความ ในยุคกลางการแข่งขันเสรีดูเหมือนจะไม่สามารถปฏิบัติได้จริงเพราะผู้ผลิตดำเนินการในตลาดท้องถิ่นที่แยกตัวอย่างโดดเดี่ยว ตัวอย่างที่ให้คือคนทำขนมปังในเมืองเล็ก ๆ ที่มีตลาดที่สงวนไว้ ซึ่งสร้างสถานการณ์ที่ผู้ผลิตครอบงำผู้บริโภคแทนที่จะแข่งขันเพื่อให้บริการที่ดีกว่าแก่พวกเขา สิ่งนี้เปลี่ยนไปในศตวรรษที่ 18 เมื่อการค้าทั่วโลกพัฒนา ทำให้การค้าเสรีเป็นไปได้โดยการทำลายการผูกขาดท้องถิ่นเหล่านี้และสร้างการแข่งขันที่แท้จริงซึ่งเป็นประโยชน์ต่อผู้บริโภคผ่านราคาที่ดีกว่าและคุณภาพที่ดีขึ้น
question: Quel était le principal problème de la libre concurrence à l'époque médiévale, qui la rendait impraticable ?
answer: Les producteurs locaux, comme les boulangers, avaient des marchés réservés, ce qui leur permettait de dominer les consommateurs
wrong_answers:
  - Les coûts de transport étaient trop élevés pour que la concurrence soit rentable
  - Les autorités religieuses interdisent la concurrence commerciale entre les marchands
  - La technologie agricole était insuffisante pour soutenir de multiples producteurs concurrents
explanation: |
  Selon le texte, à l'époque médiévale, la libre concurrence semblait irréalisable parce que les producteurs opéraient sur des marchés locaux isolés. L'exemple donné est celui d'un boulanger dans une petite ville qui avait un marché réservé, ce qui créait une situation où les producteurs dominaient les consommateurs plutôt que de se faire concurrence pour mieux les servir. Cette situation a changé au XVIIIᵉ siècle, lorsque le commerce mondial s'est développé, rendant le libre-échange pratique en brisant ces monopoles locaux et en créant une véritable concurrence qui profitait aux consommateurs grâce à l'amélioration des prix et de la qualité.

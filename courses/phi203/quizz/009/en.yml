question: According to Destutt de Tracy, how did the concepts of "mine" and "thine" originate?
answer: >
  They were recognized, not invented: the moment a sentient being experienced willing and met resistance, the distinction between self and other was born
wrong_answers:
  - They were invented by legislators to regulate competing claims over scarce resources in early societies
  - They arose from collective agreements between social groups who decided to formalize ownership conventions
  - They emerged from religious traditions that established moral rules distinguishing what belongs to each person
explanation: |
  In his Éléments d'idéologie (1815), Destutt de Tracy argued that "mine" and "thine" were never invented by anyone. They were recognized the moment a sentient being could say "you" and "I." The idea of "me" and "other than me" was born when, as a consequence of sensory impressions, a being experienced the feeling of willing, the possibility of acting that followed from it, and a resistance to that feeling and that act. Property and liberty are therefore not creations of legislators but recognitions of facts as old as human consciousness itself.

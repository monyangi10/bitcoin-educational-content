question: Milline oluline infrastruktuuri areng aitas ajaloolise analüüsi kohaselt murda kohalike turgude isoleeritust ja ergutada konkurentsi?
answer: Transpordi infrastruktuuri ja rahvusvahelise kaubanduse arendamine
wrong_answers:
  - Kohalike pangandussüsteemide ja valuutavahetuse loomine
  - Valitsuse reguleerivate asutuste ja kaubandusseaduste loomine
  - Trükipresside ja sidevõrkude leiutamine
explanation: |
  Tekstis mainitakse konkreetselt, et transpordi infrastruktuuri ja rahvusvahelise kaubanduse areng murdis kohalike turgude isoleerituse, stimuleeris konkurentsi ja aitas tasakaalustada piirkondade vahelist põllumajanduslikku ebakindlust. See infrastruktuuri areng oli otsustava tähtsusega tingimuste loomisel, kus vabadus ja vabakaubandus võisid areneda, sest see ühendas varem isoleeritud turud ja lõi laiemaid majandusvõrgustikke, mis muutsid konkurentsi elujõuliseks.
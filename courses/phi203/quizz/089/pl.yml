question: Jaki kluczowy rozwój infrastruktury pomógł przełamać izolację lokalnych rynków i stymulować konkurencję zgodnie z analizą historyczną?
answer: Rozwój infrastruktury transportowej i handlu międzynarodowego
wrong_answers:
  - Ustanowienie lokalnych systemów bankowych i wymiany walut
  - Utworzenie rządowych agencji regulacyjnych i przepisów handlowych
  - Wynalezienie prasy drukarskiej i sieci komunikacyjnych
explanation: |
  W tekście wyraźnie wspomniano, że rozwój infrastruktury transportowej i handlu międzynarodowego przełamał izolację lokalnych rynków, pobudził konkurencję i pomógł zrównoważyć niepewność rolną między regionami. Ten rozwój infrastruktury miał kluczowe znaczenie dla stworzenia warunków, w których wolność i wolny handel mogły się rozwijać, ponieważ połączył wcześniej odizolowane rynki i stworzył szersze sieci gospodarcze, które umożliwiły konkurencję.
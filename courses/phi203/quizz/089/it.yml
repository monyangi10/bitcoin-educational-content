question: Quale sviluppo infrastrutturale chiave ha contribuito a rompere l'isolamento dei mercati locali e a stimolare la concorrenza secondo l'analisi storica?
answer: Lo sviluppo delle infrastrutture di trasporto e del commercio internazionale
wrong_answers:
  - L'istituzione di sistemi bancari locali e il cambio di valuta
  - La creazione di agenzie governative di regolamentazione e di leggi commerciali
  - L'invenzione delle macchine da stampa e delle reti di comunicazione
explanation: |
  Il testo menziona specificamente che lo sviluppo delle infrastrutture di trasporto e del commercio internazionale ha rotto l'isolamento dei mercati locali, ha stimolato la concorrenza e ha contribuito a bilanciare le incertezze agricole tra le regioni. Lo sviluppo delle infrastrutture è stato cruciale per creare le condizioni per la libertà e il libero scambio, in quanto ha collegato mercati precedentemente isolati e ha creato reti economiche più ampie che hanno reso possibile la concorrenza.
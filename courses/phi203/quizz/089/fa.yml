question: کدام توسعه زیرساختی کلیدی به شکستن انزوای بازارهای محلی و تحریک رقابت بر اساس تحلیل تاریخی کمک کرد؟
answer: توسعه زیرساخت‌های حمل‌ونقل و تجارت بین‌المللی
wrong_answers:
  - ایجاد سیستم‌های بانکی محلی و تبادل ارز
  - ایجاد آژانس‌های نظارتی دولتی و قوانین تجاری
  - اختراع دستگاه‌های چاپ و شبکه‌های ارتباطی
explanation: |
  متن به‌طور خاص اشاره می‌کند که توسعه زیرساخت‌های حمل‌ونقل و تجارت بین‌المللی، انزوای بازارهای محلی را شکست، رقابت را تحریک کرد و به تعادل عدم قطعیت‌های کشاورزی بین مناطق کمک کرد. این توسعه زیرساختی در ایجاد شرایطی که آزادی و تجارت آزاد می‌توانستند شکوفا شوند، حیاتی بود، زیرا بازارهای قبلاً منزوی را متصل کرد و شبکه‌های اقتصادی گسترده‌تری ایجاد کرد که رقابت را ممکن ساخت.
question: Ni maendeleo gani muhimu ya miundombinu yaliyosaidia kuvunja utengano wa masoko ya ndani na kuchochea ushindani kulingana na uchambuzi wa kihistoria?
answer: Maendeleo ya miundombinu ya usafiri na biashara ya kimataifa
wrong_answers:
  - Kuanzishwa kwa mifumo ya benki za ndani na ubadilishanaji wa sarafu
  - Uundaji wa mashirika ya udhibiti wa serikali na sheria za biashara
  - Uvumbuzi wa mitambo ya uchapishaji na mitandao ya mawasiliano
explanation: |
  Maandishi hayo yanataja haswa kwamba maendeleo ya miundombinu ya usafiri na biashara ya kimataifa yalivunja utengano wa masoko ya ndani, yalichochea ushindani, na kusaidia kusawazisha kutokuwa na uhakika wa kilimo kati ya maeneo. Maendeleo haya ya miundombinu yalikuwa muhimu katika kuunda mazingira ambapo uhuru na biashara huria vingeweza kustawi, kwani yaliunganisha masoko yaliyotengwa hapo awali na kuunda mitandao mipana ya kiuchumi ambayo ilifanya ushindani uwezekane.
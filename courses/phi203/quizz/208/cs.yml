question: Jaká základní charakteristika podle liberální ekonomické teorie odlišuje moderní kapitalistické společnosti od starověkých společností, jako byl Egypt, Řecko a Řím, pokud jde o sociální mobilitu?
answer: Moderní společnosti se vyznačují individuální autonomií, rovností před zákonem a rovným přístupem ke všem profesím, což umožňuje sociální mobilitu díky zásluhám a úsilí
wrong_answers:
  - Moderní společnosti si zachovávají stejně pevnou třídní strukturu jako společnosti starověké, ale s odlišnými ekonomickými mechanismy rozdělování bohatství
  - Moderní společnosti nahradily dědičné třídy novými pevnými kategoriemi založenými na vlastnictví kapitálu a práce, které jsou stejně neměnné
  - Moderní společnosti odstranily všechny formy sociálního rozvrstvení tím, že zajistily úplnou ekonomickou rovnost všech občanů bez ohledu na jejich přínos
explanation: |
  Kapitola zdůrazňuje, že moderní společnosti, zejména od dob Francouzské revoluce, se zásadně vyznačují individuální autonomií, právní rovností a rovným přístupem k profesi. Na rozdíl od starověkých společností, kde byly společenské třídy pevné a dědičné (řemesla se dědila z otce na syna), moderní kapitalistické společnosti umožňují jednotlivcům měnit své společenské postavení vlastním úsilím a volbou. Chybné odpovědi nesprávně naznačují, že třídní rigidita přetrvává ve stejné podobě, že existují nové, ale stejně fixní kategorie, nebo že bylo dosaženo úplné rovnosti, přičemž nic z toho neodráží předloženou liberální analýzu.
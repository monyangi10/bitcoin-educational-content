question: 自由主義経済理論によれば、現代の資本主義社会とエジプト、ギリシャ、ローマのような古代社会とを社会的流動性の面で区別する基本的特徴は何か？
answer: 近代社会は、個人の自律性、法の下の平等、あらゆる職業への平等なアクセスを特徴とし、功績と努力による社会的流動性を認めている。
wrong_answers:
  - 現代社会は、古代社会と同じ厳格な階級構造を維持しているが、富の分配の経済メカニズムは異なっている。
  - 近代社会は、世襲階級に代わって、資本と労働の所有権に基づく新しい固定的なカテゴリーを導入した。
  - 現代社会は、貢献の有無にかかわらず、すべての国民の間に完全な経済的平等を保証することによって、あらゆる形態の社会階層を排除してきた。
explanation: |
  この章では、特にフランス革命以降の近代社会は、基本的に個人の自律性、法的平等、平等な職業アクセスによって区別されていることを強調している。社会階級が固定され、世襲制（商売は父から子へ受け継がれる）であった古代社会とは異なり、現代の資本主義社会では、個人が自らの努力と選択によって社会的地位を変えることができる。誤答は、階級の硬直性が同じ形で存続していること、新しいが同様に固定されたカテゴリーが存在すること、あるいは完全な平等が達成されたことを示唆しており、いずれも提示されたリベラルな分析を反映していない。
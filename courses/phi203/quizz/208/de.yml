question: Welches grundlegende Merkmal unterscheidet nach der liberalen Wirtschaftstheorie moderne kapitalistische Gesellschaften von antiken Gesellschaften wie Ägypten, Griechenland und Rom in Bezug auf die soziale Mobilität?
answer: Moderne Gesellschaften zeichnen sich durch individuelle Autonomie, Gleichheit vor dem Gesetz und gleichen Zugang zu allen Berufen aus und ermöglichen soziale Mobilität durch Leistung und Anstrengung
wrong_answers:
  - Moderne Gesellschaften haben dieselben starren Klassenstrukturen wie antike Gesellschaften, jedoch mit anderen wirtschaftlichen Mechanismen der Vermögensverteilung
  - Moderne Gesellschaften haben die vererbten Klassen durch neue feste Kategorien ersetzt, die auf dem Besitz von Kapital und Arbeit basieren und gleichermaßen unveränderlich sind
  - Moderne Gesellschaften haben alle Formen der sozialen Schichtung beseitigt, indem sie allen Bürgern unabhängig von ihren Beiträgen vollständige wirtschaftliche Gleichheit garantieren
explanation: |
  In diesem Kapitel wird hervorgehoben, dass sich moderne Gesellschaften, insbesondere seit der Französischen Revolution, grundsätzlich durch individuelle Autonomie, rechtliche Gleichheit und gleichen beruflichen Zugang auszeichnen. Im Gegensatz zu den antiken Gesellschaften, in denen die sozialen Klassen feststanden und vererbt wurden (der Beruf wurde vom Vater an den Sohn weitergegeben), können die Menschen in den modernen kapitalistischen Gesellschaften ihre soziale Stellung durch eigene Anstrengungen und Entscheidungen verändern. Die falschen Antworten suggerieren fälschlicherweise entweder, dass die Klassenstarrheit in der gleichen Form fortbesteht, dass neue, aber ebenso feste Kategorien existieren oder dass vollständige Gleichheit erreicht wurde, was in keinem Fall der vorgestellten liberalen Analyse entspricht.
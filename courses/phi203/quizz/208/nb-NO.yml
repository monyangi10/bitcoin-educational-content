question: Ifølge liberal økonomisk teori, hvilket grunnleggende kjennetegn skiller moderne kapitalistiske samfunn fra antikke samfunn som Egypt, Hellas og Roma når det gjelder sosial mobilitet?
answer: Moderne samfunn kjennetegnes av individuell autonomi, likhet for loven og lik tilgang til alle yrker, noe som muliggjør sosial mobilitet gjennom fortjeneste og innsats
wrong_answers:
  - Moderne samfunn har de samme rigide klassestrukturene som antikkens samfunn, men med andre økonomiske mekanismer for fordeling av rikdom
  - Moderne samfunn har erstattet arvelige klasser med nye faste kategorier basert på eierskap til kapital versus arbeid, som er like uforanderlige
  - Moderne samfunn har eliminert alle former for sosial lagdeling ved å sikre fullstendig økonomisk likhet mellom alle borgere, uavhengig av deres bidrag
explanation: |
  Kapitlet legger vekt på at moderne samfunn, særlig etter den franske revolusjonen, kjennetegnes av individuell autonomi, juridisk likhet og lik tilgang til yrkeslivet. I motsetning til antikkens samfunn, der de sosiale klassene var faste og arvelige (med yrker som gikk i arv fra far til sønn), gjør moderne kapitalistiske samfunn det mulig for den enkelte å endre sin sosiale posisjon gjennom egen innsats og egne valg. De gale svarene antyder feilaktig enten at klassestivheten vedvarer i samme form, at det finnes nye, men like fastlåste kategorier, eller at fullstendig likhet er oppnådd, noe som ikke gjenspeiler den liberale analysen som presenteres.
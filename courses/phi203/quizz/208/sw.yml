question: Kulingana na nadharia ya uchumi huria, ni sifa gani ya msingi inayotofautisha jamii za kisasa za kibepari na jamii za kale kama Misri, Ugiriki, na Roma katika suala la uhamaji wa kijamii?
answer: Jamii za kisasa zina sifa ya uhuru wa mtu binafsi, usawa mbele ya sheria, na ufikiaji sawa wa taaluma zote, kuruhusu uhamaji wa kijamii kupitia sifa na juhudi.
wrong_answers:
  - Jamii za kisasa hudumisha miundo thabiti ya kitabaka kama jamii za kale lakini zenye mifumo tofauti ya kiuchumi ya usambazaji wa utajiri
  - Jamii za kisasa zimebadilisha matabaka ya kurithi na kategoria mpya zisizobadilika kulingana na umiliki wa mtaji dhidi ya kazi ambazo hazibadiliki sawasawa.
  - Jamii za kisasa zimeondoa aina zote za matabaka ya kijamii kwa kuhakikisha usawa kamili wa kiuchumi miongoni mwa raia wote bila kujali michango yao.
explanation: |
  Sura hiyo inasisitiza kwamba jamii za kisasa, hasa tangu Mapinduzi ya Ufaransa, kimsingi zinajulikana kwa uhuru wa mtu binafsi, usawa wa kisheria, na ufikiaji sawa wa kitaaluma. Tofauti na jamii za kale ambapo matabaka ya kijamii yalikuwa ya kudumu na ya kurithiwa (kwa biashara zilizopitishwa kutoka kwa baba hadi mwana), jamii za kisasa za kibepari huruhusu watu binafsi kubadilisha msimamo wao wa kijamii kupitia juhudi na chaguo zao wenyewe. Majibu yasiyo sahihi yanaonyesha kimakosa kwamba ugumu wa tabaka unaendelea katika umbo lile lile, kwamba kuna kategoria mpya lakini zilizodumu kwa usawa, au kwamba usawa kamili umepatikana, ambao hakuna hata moja inayoakisi uchambuzi huria uliowasilishwa.
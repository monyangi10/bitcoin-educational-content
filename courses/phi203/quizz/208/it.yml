question: Secondo la teoria economica liberale, quale caratteristica fondamentale distingue le società capitalistiche moderne da quelle antiche come Egitto, Grecia e Roma in termini di mobilità sociale?
answer: Le società moderne sono caratterizzate dall'autonomia individuale, dall'uguaglianza di fronte alla legge e dalla parità di accesso a tutte le professioni, consentendo la mobilità sociale attraverso il merito e lo sforzo
wrong_answers:
  - Le società moderne mantengono le stesse rigide strutture di classe delle società antiche, ma con meccanismi economici di distribuzione della ricchezza diversi
  - Le società moderne hanno sostituito le classi ereditarie con nuove categorie fisse basate sulla proprietà del capitale o del lavoro, ugualmente immutabili
  - Le società moderne hanno eliminato ogni forma di stratificazione sociale, garantendo una completa uguaglianza economica tra tutti i cittadini, indipendentemente dal loro contributo
explanation: |
  Il capitolo sottolinea che le società moderne, in particolare dopo la Rivoluzione francese, si distinguono fondamentalmente per l'autonomia individuale, l'uguaglianza giuridica e la parità di accesso professionale. A differenza delle società antiche, in cui le classi sociali erano fisse ed ereditarie (con i mestieri che passavano di padre in figlio), le moderne società capitalistiche permettono agli individui di cambiare la propria posizione sociale attraverso i propri sforzi e le proprie scelte. Le risposte sbagliate suggeriscono erroneamente che la rigidità delle classi persiste nella stessa forma, che esistono categorie nuove ma ugualmente fisse, o che è stata raggiunta una completa uguaglianza, il che non riflette l'analisi liberale presentata.
question: Согласно либеральной экономической теории, какая фундаментальная характеристика отличает современные капиталистические общества от древних обществ, таких как Египет, Греция и Рим, с точки зрения социальной мобильности?
answer: Современное общество характеризуется автономией личности, равенством перед законом и равным доступом ко всем профессиям, обеспечивающим социальную мобильность благодаря заслугам и усилиям
wrong_answers:
  - В современных обществах сохраняются те же жесткие классовые структуры, что и в древних обществах, но с другими экономическими механизмами распределения богатства
  - Современные общества заменили наследственные классы новыми фиксированными категориями, основанными на владении капиталом и трудом, которые в равной степени неизменны
  - Современные общества устранили все формы социального расслоения, обеспечив полное экономическое равенство всех граждан независимо от их вклада
explanation: |
  В главе подчеркивается, что современные общества, особенно после Французской революции, в основе своей отличаются автономией личности, юридическим равенством и равным профессиональным доступом. В отличие от древних обществ, где социальные классы были фиксированными и наследственными (ремесла передавались от отца к сыну), современные капиталистические общества позволяют людям менять свое социальное положение благодаря собственным усилиям и выбору. Неправильные ответы предполагают либо сохранение классовой жесткости в прежней форме, либо существование новых, но столь же фиксированных категорий, либо достижение полного равенства, что не отражает представленный либеральный анализ.
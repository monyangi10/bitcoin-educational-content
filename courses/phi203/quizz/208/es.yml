question: Según la teoría económica liberal, ¿qué característica fundamental distingue a las sociedades capitalistas modernas de sociedades antiguas como Egipto, Grecia y Roma en términos de movilidad social?
answer: Las sociedades modernas se caracterizan por la autonomía individual, la igualdad ante la ley y la igualdad de acceso a todas las profesiones, lo que permite la movilidad social a través del mérito y el esfuerzo
wrong_answers:
  - Las sociedades modernas mantienen las mismas estructuras de clases rígidas que las sociedades antiguas, pero con mecanismos económicos de distribución de la riqueza diferentes
  - Las sociedades modernas han sustituido las clases hereditarias por nuevas categorías fijas basadas en la propiedad del capital frente al trabajo que son igualmente inmutables
  - Las sociedades modernas han eliminado todas las formas de estratificación social garantizando la plena igualdad económica entre todos los ciudadanos, independientemente de su contribución
explanation: |
  El capítulo subraya que las sociedades modernas, sobre todo desde la Revolución Francesa, se distinguen fundamentalmente por la autonomía individual, la igualdad jurídica y la igualdad de acceso profesional. A diferencia de las sociedades antiguas, en las que las clases sociales eran fijas y hereditarias (los oficios se transmitían de padres a hijos), las sociedades capitalistas modernas permiten a los individuos cambiar su posición social mediante sus propios esfuerzos y elecciones. Las respuestas erróneas sugieren incorrectamente que la rigidez de clase persiste en la misma forma, que existen categorías nuevas pero igualmente fijas, o que se ha alcanzado la igualdad completa, ninguna de las cuales refleja el análisis liberal presentado.
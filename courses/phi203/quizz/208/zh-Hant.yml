question: 根據自由經濟理論，就社會流動性而言，現代資本主義社會與埃及、希臘和羅馬等古代社會不同的基本特徵是什麼？
answer: 現代社會的特點是個人自主、法律面前人人平等，以及平等進入所有專業，允許透過優點和努力進行社會流動
wrong_answers:
  - 現代社會與古代社會一樣，維持著僵化的階級結構，但卻有不同的財富分配經濟機制
  - 現代社會以新的固定階級取代世襲階級，這些階級是以資本所有權與勞動所有權為基礎，同樣不可改變。
  - 現代社會已消除所有形式的社會分層，確保所有公民不論其貢獻如何，在經濟上完全平等。
explanation: |
  本章強調，現代社會，尤其是法國大革命以來的現代社會，其根本特點在於個人自主、法律平等和平等的專業機會。古代社會的社會階級是固定且世襲的（行業由父傳子），而現代資本主義社會不同，它允許個人透過自己的努力和選擇來改變自己的社會地位。錯誤的答案不正確地暗示階級僵化以相同的形式持續存在、存在新的但同樣固定的類別，或是已經達到完全平等，這些都無法反映所提出的自由主義分析。
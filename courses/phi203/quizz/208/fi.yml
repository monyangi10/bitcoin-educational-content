question: Mikä liberaalin talousteorian mukaan erottaa modernit kapitalistiset yhteiskunnat sosiaalisessa liikkuvuudessa antiikin yhteiskunnista, kuten Egyptistä, Kreikasta ja Roomasta?
answer: Nykyaikaisille yhteiskunnille on ominaista yksilön itsemääräämisoikeus, tasa-arvo lain edessä ja yhtäläinen pääsy kaikkiin ammatteihin, mikä mahdollistaa sosiaalisen liikkuvuuden ansioiden ja ponnistelujen kautta
wrong_answers:
  - Nykyaikaisissa yhteiskunnissa on samat jäykät luokkarakenteet kuin muinaisissa yhteiskunnissa, mutta varallisuuden jakamisen taloudelliset mekanismit ovat erilaiset
  - Nykyaikaiset yhteiskunnat ovat korvanneet perinnölliset luokat uusilla kiinteillä luokilla, jotka perustuvat pääoman ja työvoiman omistukseen ja jotka ovat yhtä muuttumattomia
  - Nykyaikaiset yhteiskunnat ovat poistaneet kaikenlaisen sosiaalisen kerrostuneisuuden varmistamalla kaikkien kansalaisten täydellisen taloudellisen tasa-arvon heidän panoksestaan riippumatta
explanation: |
  Luvussa korostetaan, että erityisesti Ranskan vallankumouksen jälkeen modernit yhteiskunnat eroavat pohjimmiltaan yksilön autonomiasta, oikeudellisesta tasa-arvosta ja yhtäläisistä ammatillisista mahdollisuuksista. Toisin kuin muinaisissa yhteiskunnissa, joissa yhteiskuntaluokat olivat kiinteitä ja perinnöllisiä (ammatit siirtyivät isältä pojalle), nykyaikaisissa kapitalistisissa yhteiskunnissa yksilöt voivat muuttaa sosiaalista asemaansa omilla ponnisteluillaan ja valinnoillaan. Väärät vastaukset viittaavat virheellisesti joko siihen, että luokkien jäykkyys säilyy samassa muodossa, että on olemassa uusia, mutta yhtä kiinteitä luokkia tai että täydellinen tasa-arvo on saavutettu, mikä ei vastaa esitettyä liberaalia analyysia.
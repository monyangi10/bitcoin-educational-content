question: Theo văn bản, các xã hội loài người thời kỳ đầu đã thu được tài nguyên bằng cách nào trước khi nông nghiệp phát triển?
answer: Thông qua săn bắn, đánh bắt cá và hái lượm từ môi trường tự nhiên của họ.
wrong_answers:
  - Thông qua hoạt động thương mại và trao đổi với các cộng đồng nông nghiệp lân cận.
  - Thông qua các kỹ thuật canh tác thô sơ và thuần hóa động vật cơ bản
  - Thông qua các hoạt động mining và khai thác tài nguyên dưới lòng đất.
explanation: |
  Chương này nêu rõ rằng các xã hội loài người đầu tiên không tạo ra của cải mới mà thay vào đó lấy tài nguyên từ môi trường thông qua săn bắn, đánh bắt cá và hái lượm. "Nền kinh tế hủy diệt" này khiến họ hoàn toàn phụ thuộc vào sự tái tạo tự nhiên của tài nguyên, điều này hạn chế quy mô nhóm và ngăn cản sự hình thành các xã hội phức tạp. Các lựa chọn khác đều không chính xác vì thương mại với các cộng đồng nông nghiệp, kỹ thuật canh tác và Chiến tranh thế giới thứ nhất đều đại diện cho những phát triển sau này, diễn ra sau quá trình chuyển đổi từ nền kinh tế khai thác ban đầu sang nông nghiệp sản xuất.
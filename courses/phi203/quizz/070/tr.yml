question: Metne göre, tarımın gelişmesinden önce ilk insan toplumları kaynaklarını nasıl elde ediyorlardı?
answer: Avlanma, balık tutma ve doğal çevrelerinden toplama yoluyla
wrong_answers:
  - Komşu tarım topluluklarıyla ticaret ve alışveriş yoluyla
  - İlkel tarım teknikleri ve temel hayvan evcilleştirmesi sayesinde
  - mining operasyonları ve yeraltı kaynaklarının çıkarılması yoluyla
explanation: |
  Bu bölümde, ilk insan topluluklarının yeni zenginlik üretmedikleri, bunun yerine avcılık, balıkçılık ve toplayıcılık yoluyla çevrelerinden kaynak aldıkları açıkça belirtilmektedir. Bu 'yıkım ekonomisi' onları tamamen kaynakların doğal yenilenmesine bağımlı kılmış, bu da grup büyüklüklerini sınırlamış ve karmaşık toplumların ortaya çıkmasını engellemiştir. Diğer seçenekler yanlıştır çünkü tarım topluluklarıyla ticaret, çiftçilik teknikleri ve mining, bu erken çıkarım ekonomisinden üretken tarıma geçişten sonra ortaya çıkan gelişmeleri temsil etmektedir.
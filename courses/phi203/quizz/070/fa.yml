question: بر اساس متن، جوامع اولیه انسانی چگونه منابع خود را قبل از توسعه کشاورزی به دست می‌آوردند؟
answer: از طریق شکار، ماهیگیری و جمع‌آوری از محیط طبیعی خود
wrong_answers:
  - از طریق تجارت و تبادل با جوامع کشاورزی همسایه
  - از طریق تکنیک‌های کشاورزی ابتدایی و اهلی‌سازی حیوانات پایه
  - از طریق عملیات mining و استخراج منابع زیرزمینی
explanation: |
  این فصل به وضوح بیان می‌کند که اولین جوامع انسانی ثروت جدیدی تولید نکردند بلکه به جای آن از طریق شکار، ماهیگیری و جمع‌آوری منابع از محیط خود بهره‌برداری کردند. این 'اقتصاد تخریبی' آنها را کاملاً به تجدید طبیعی منابع وابسته می‌کرد که اندازه گروه‌ها را محدود کرده و مانع از ظهور جوامع پیچیده می‌شد. گزینه‌های دیگر نادرست هستند زیرا تجارت با جوامع کشاورزی، تکنیک‌های کشاورزی و mining همگی نمایانگر توسعه‌های بعدی هستند که پس از گذار از این اقتصاد استخراجی اولیه به کشاورزی تولیدی به وجود آمدند.
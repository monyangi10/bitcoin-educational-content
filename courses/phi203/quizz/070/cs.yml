question: Jak podle textu získávala raná lidská společenství své zdroje před rozvojem zemědělství?
answer: Lovem, rybolovem a sběrem z jejich přirozeného prostředí
wrong_answers:
  - Prostřednictvím obchodu a výměny se sousedními zemědělskými komunitami
  - Primitivní zemědělské techniky a základní domestikace zvířat
  - Prostřednictvím operací mining a těžby podzemních zdrojů
explanation: |
  V kapitole se jasně uvádí, že první lidské společnosti nevytvářely nové bohatství, ale získávaly zdroje ze svého okolí lovem, rybolovem a sběrem. Tato "ekonomika ničení" je učinila zcela závislými na přirozené obnově zdrojů, což omezilo velikost skupin a zabránilo vzniku komplexních společností. Ostatní možnosti jsou nesprávné, protože obchod se zemědělskými společenstvími, zemědělské techniky a mining představují pozdější vývoj, který přišel po přechodu od této rané těžební ekonomiky k produktivnímu zemědělství.
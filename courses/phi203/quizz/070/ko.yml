question: 본문에 따르면 초기 인류 사회는 농업이 발달하기 전에 어떻게 자원을 얻었나요?
answer: 자연 환경에서 사냥, 낚시, 채집을 통해
wrong_answers:
  - 이웃 농업 공동체와의 무역 및 교류를 통해
  - 원시 농업 기술과 기본적인 동물 사육을 통해
  - mining 운영 및 지하 자원 추출을 통해
explanation: |
  이 장에서는 최초의 인류 사회가 새로운 부를 생산하지 않고 사냥, 낚시, 채집을 통해 환경으로부터 자원을 취했다는 사실을 분명히 밝히고 있습니다. 이러한 '파괴의 경제'는 자원의 자연적 재생에 전적으로 의존하게 만들었고, 이로 인해 집단 규모가 제한되고 복잡한 사회의 출현을 막았습니다. 농업 공동체와의 무역, 농업 기술, mining은 모두 초기 채취 경제에서 생산적인 농업으로 전환한 이후에 발전한 것이기 때문에 다른 옵션은 올바르지 않습니다.
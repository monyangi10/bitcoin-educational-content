question: 根据课文内容，在农业发展之前，早期人类社会是如何获取资源的？
answer: 通过在自然环境中狩猎、捕鱼和采集
wrong_answers:
  - 通过与周边农业社区的贸易和交流
  - 通过原始的耕作技术和基本的动物驯化
  - 通过 mining 作业和开采地下资源
explanation: |
  该章明确指出，最初的人类社会并不生产新的财富，而是通过狩猎、捕鱼和采集从环境中获取资源。这种 "破坏经济 "使他们完全依赖于资源的自然再生，这限制了群体的规模，阻碍了复杂社会的出现。其他选项都不正确，因为与农业社区的贸易、耕作技术和 mining 都代表了从早期采掘经济过渡到生产性农业之后的发展。
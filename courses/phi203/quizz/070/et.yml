question: Kuidas said varased inimühiskonnad teksti kohaselt oma ressursse enne põllumajanduse arengut?
answer: Küttimise, kalapüügi ja looduskeskkonnast kogumise kaudu
wrong_answers:
  - Kaubanduse ja vahetuse kaudu naabermaakondadega
  - Primitiivsete põllumajandustehnikate ja loomakasvatuse algeliste meetodite abil
  - mining tegevuse ja maa-aluste ressursside kaevandamise kaudu
explanation: |
  Peatükis on selgelt öeldud, et esimesed inimühiskonnad ei tootnud uut rikkust, vaid võtsid oma keskkonnast ressursse jahipidamise, kalapüügi ja kogumise teel. Selline "hävitamismajandus" muutis nad täielikult sõltuvaks loodusliku taastumise ressurssidest, mis piiras rühmade suurust ja takistas keeruliste ühiskondade tekkimist. Teised valikud on valed, sest põllumajanduslike kogukondadega kauplemine, põllumajandustehnikad ja mining on kõik hilisemad arengud, mis tulid pärast üleminekut sellelt varajaselt kaevandamismajanduselt tootlikule põllumajandusele.
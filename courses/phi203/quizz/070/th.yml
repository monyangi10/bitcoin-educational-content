question: ตามข้อความ สังคมมนุษย์ยุคแรกได้รับทรัพยากรของพวกเขาอย่างไร ก่อนการพัฒนาการเกษตร?
answer: ผ่านการล่าสัตว์ การตกปลา และการเก็บรวบรวมจากสิ่งแวดล้อมธรรมชาติของพวกเขา
wrong_answers:
  - ผ่านการค้าและแลกเปลี่ยนกับชุมชนเกษตรกรรมใกล้เคียง
  - ผ่านเทคนิคการเกษตรแบบดั้งเดิมและการเลี้ยงสัตว์พื้นฐาน
  - ผ่านการดำเนินงาน mining และการสกัดทรัพยากรใต้ดิน
explanation: |
  บทนี้ระบุไว้อย่างชัดเจนว่าสังคมมนุษย์ยุคแรกไม่ได้สร้างความมั่งคั่งใหม่ แต่กลับนำทรัพยากรจากสิ่งแวดล้อมผ่านการล่าสัตว์ การตกปลา และการเก็บของป่า 'เศรษฐกิจแห่งการทำลายล้าง' นี้ทำให้พวกเขาพึ่งพาการฟื้นฟูทรัพยากรตามธรรมชาติอย่างสมบูรณ์ ซึ่งจำกัดขนาดของกลุ่มและป้องกันการเกิดขึ้นของสังคมที่ซับซ้อน ตัวเลือกอื่น ๆ นั้นไม่ถูกต้องเพราะการค้ากับชุมชนเกษตรกรรม เทคนิคการทำฟาร์ม และ mining ล้วนเป็นการพัฒนาที่เกิดขึ้นในภายหลังหลังจากการเปลี่ยนแปลงจากเศรษฐกิจการสกัดในยุคแรกนี้ไปสู่การเกษตรที่ก่อให้เกิดผลผลิต
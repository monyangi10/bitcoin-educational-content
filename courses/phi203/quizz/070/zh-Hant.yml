question: 根據文中所述，在農業發展之前，早期人類社會是如何獲得資源的？
answer: 透過狩獵、捕魚和從自然環境中採集
wrong_answers:
  - 透過與鄰近農業社區的貿易與交流
  - 透過原始的農耕技術和基本的動物馴化
  - 透過 mining 作業和開採地下資源
explanation: |
  本章明確指出，最早的人類社會並未製造新的財富，而是透過狩獵、捕魚和採集，從環境中攫取資源。這種「破壞性經濟」使他們完全依賴資源的自然更新，這限制了族群的規模，也阻止了複雜社會的出現。其他選項都是錯誤的，因為與農業社群的貿易、耕作技術和 mining 都是從早期的採掘型經濟過渡到生產型農業之後的發展。
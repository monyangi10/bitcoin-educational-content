question: Hvordan skaffet de tidlige menneskelige samfunnene seg ressurser før jordbruket ble utviklet, ifølge teksten?
answer: Gjennom jakt, fiske og sanking fra deres naturlige omgivelser
wrong_answers:
  - Gjennom handel og utveksling med jordbrukssamfunn i nabolandene
  - Gjennom primitive jordbruksteknikker og grunnleggende domestisering av dyr
  - Gjennom mining-operasjoner og utvinning av ressurser i undergrunnen
explanation: |
  Kapitlet slår tydelig fast at de første menneskelige samfunnene ikke produserte ny rikdom, men i stedet tok ressurser fra omgivelsene gjennom jakt, fiske og sanking. Denne "ødeleggelsesøkonomien" gjorde dem helt avhengige av den naturlige fornyelsen av ressurser, noe som begrenset gruppestørrelsene og forhindret fremveksten av komplekse samfunn. De andre alternativene er feil fordi handel med jordbrukssamfunn, jordbruksteknikker og mining alle representerer senere utviklinger som kom etter overgangen fra denne tidlige utvinningsøkonomien til produktivt jordbruk.
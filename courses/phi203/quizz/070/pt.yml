question: De acordo com o texto, como é que as sociedades humanas primitivas obtinham os seus recursos antes do desenvolvimento da agricultura?
answer: Através da caça, pesca e recolha no seu ambiente natural
wrong_answers:
  - Através do comércio e do intercâmbio com as comunidades agrícolas vizinhas
  - Através de técnicas agrícolas primitivas e da domesticação básica de animais
  - Através das operações mining e da extração de recursos subterrâneos
explanation: |
  O capítulo afirma claramente que as primeiras sociedades humanas não produziam novas riquezas, mas retiravam recursos do seu ambiente através da caça, da pesca e da coleta. Esta "economia de destruição" tornava-as completamente dependentes da renovação natural dos recursos, o que limitava a dimensão dos grupos e impedia o aparecimento de sociedades complexas. As outras opções estão incorrectas porque o comércio com as comunidades agrícolas, as técnicas agrícolas e a mining representam desenvolvimentos posteriores que surgiram após a transição desta economia extractiva inicial para a agricultura produtiva.
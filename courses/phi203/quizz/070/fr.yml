question: D'après le texte, comment les premières sociétés humaines se procuraient-elles leurs ressources avant le développement de l'agriculture ?
answer: Par la chasse, la pêche et la cueillette dans leur environnement naturel
wrong_answers:
  - Grâce au commerce et aux échanges avec les communautés agricoles voisines
  - Grâce à des techniques agricoles primitives et à la domestication de base des animaux
  - Grâce aux opérations de mining et à l'extraction des ressources souterraines
explanation: |
  Le chapitre indique clairement que les premières sociétés humaines ne produisaient pas de nouvelles richesses, mais prélevaient les ressources de leur environnement par la chasse, la pêche et la cueillette. Cette "économie de la destruction" les rendait totalement dépendantes du renouvellement naturel des ressources, ce qui limitait la taille des groupes et empêchait l'émergence de sociétés complexes. Les autres options sont incorrectes, car le commerce avec les communautés agricoles, les techniques agricoles et le mining représentent tous des développements ultérieurs qui ont eu lieu après la transition de cette première économie d'extraction vers l'agriculture productive.

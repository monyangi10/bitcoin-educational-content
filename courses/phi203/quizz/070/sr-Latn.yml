question: Prema tekstu, kako su rane ljudske zajednice nabavljale svoje resurse pre razvoja poljoprivrede?
answer: Kroz lov, ribolov i sakupljanje iz njihove prirodne okoline
wrong_answers:
  - Kroz trgovinu i razmenu sa susednim poljoprivrednim zajednicama
  - Kroz primitivne poljoprivredne tehnike i osnovno pripitomljavanje životinja
  - Kroz mining operacije i ekstrakciju podzemnih resursa
explanation: |
  Poglavlje jasno navodi da prve ljudske zajednice nisu proizvodile novo bogatstvo, već su uzimale resurse iz svoje okoline kroz lov, ribolov i sakupljanje. Ova 'ekonomija uništenja' ih je činila potpuno zavisnim od prirodne obnove resursa, što je ograničavalo veličinu grupa i sprečavalo pojavu složenih društava. Ostale opcije su netačne jer trgovina sa poljoprivrednim zajednicama, poljoprivredne tehnike i mining predstavljaju kasniji razvoj koji je usledio nakon prelaska sa ove rane ekstraktivne ekonomije na produktivnu poljoprivredu.
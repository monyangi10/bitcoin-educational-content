question: Wie haben die frühen menschlichen Gesellschaften vor der Entwicklung des Ackerbaus ihre Ressourcen beschafft, heißt es im Text?
answer: Durch Jagen, Fischen und Sammeln in ihrer natürlichen Umgebung
wrong_answers:
  - Durch Handel und Austausch mit benachbarten landwirtschaftlichen Gemeinschaften
  - Durch primitive landwirtschaftliche Techniken und einfache Tierdomestikation
  - Durch den mining-Betrieb und die Gewinnung von Bodenschätzen
explanation: |
  Das Kapitel macht deutlich, dass die ersten menschlichen Gesellschaften keinen neuen Reichtum produzierten, sondern stattdessen durch Jagen, Fischen und Sammeln Ressourcen aus ihrer Umwelt entnahmen. Diese "Wirtschaft der Zerstörung" machte sie völlig abhängig von der natürlichen Erneuerung der Ressourcen, was die Gruppengröße begrenzte und die Entstehung komplexer Gesellschaften verhinderte. Die anderen Optionen sind falsch, da der Handel mit landwirtschaftlichen Gemeinschaften, die Anbautechniken und mining allesamt spätere Entwicklungen darstellen, die nach dem Übergang von dieser frühen extraktiven Wirtschaft zur produktiven Landwirtschaft stattfanden.
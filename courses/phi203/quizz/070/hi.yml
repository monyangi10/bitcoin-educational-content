question: According to the text, how did early human societies obtain their resources before the development of agriculture?
answer: Through hunting, fishing, and gathering from their natural environment
wrong_answers:
  - Through trade and exchange with neighboring agricultural communities
  - Through primitive farming techniques and basic animal domestication
  - Through mining operations and extraction of underground resources
explanation: |
  The chapter clearly states that the first human societies did not produce new wealth but instead took resources from their environment through hunting, fishing, and gathering. This 'economy of destruction' made them completely dependent on the natural renewal of resources, which limited group sizes and prevented the emergence of complex societies. The other options are incorrect because trade with agricultural communities, farming techniques, and mining all represent later developments that came after the transition from this early extractive economy to productive agriculture.
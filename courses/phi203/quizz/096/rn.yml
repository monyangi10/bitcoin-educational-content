question: Dushingiye ku nseguro y’umwidegemvyo n’umutekano, bigenda gute iyo umuntu agiriye nabi abandi biciye mu kubatera ubwoba canke mu kurenga uburenganzira bwabo?
answer: Bishira mu ntambara n'abantu kandi bakishira mu kaga ko gutakaza umwidegemvyo wabo bwite .
wrong_answers:
  - Bakomeza umwidegemvyo wabo bwite mu kwerekana ko baganza abandi .
  - Bituma haba ukudahukana kw’igihe gito kwikosora mu buryo busanzwe ata ngaruka .
  - Bashinga ubwigenge bwabo ku ngorane zo mu kibano kandi bongera umwidegemvyo wabo .
explanation: |
  Ico canditswe kivuga neza yuko iyo umuntu agiriye nabi abandi biciye mu kubatera ubwoba canke mu kubarengagiza uburenganzira bwabo, ‘aba yishize mu ntambara n’abantu.’ Iyo nyifato y’ubukazi ntigabanya gusa umwidegemvyo w’abandi, ariko kandi ituma uwuyitera atakaza umwidegemvyo wiwe bwite biciye mu kwivanga mu nzego z’ubutungane n’iza polisi mu mibano itunganijwe. Ayandi mahitamwo avuga mu buryo butari bwo yuko gukomeretsa abandi bishobora kugirira akamaro uwubateye canke ko ata ngaruka bigira, ivyo bikaba bivuguruza ingingo ngenderwako y’ishimikiro y’uko gutera umwidegemvyo w’abandi amaherezo bigabanya umwidegemvyo w’umuntu ubwiwe.
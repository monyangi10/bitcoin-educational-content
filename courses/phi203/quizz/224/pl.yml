question: Zgodnie z filozofią liberalną, co sprawia, że nadmierne opodatkowanie wykraczające poza uzasadnione składki na usługi jest równoznaczne z formą agresji terytorialnej?
answer: Stanowi to naruszenie indywidualnych praw własności podobne do tego, w jaki sposób jeden naród narusza suwerenność terytorialną innego narodu
wrong_answers:
  - Uniemożliwia państwu wypełnianie jego podstawowych funkcji ochronnych i utrzymywanie podstawowych usług publicznych
  - Powoduje to nieefektywność ekonomiczną, która z czasem zmniejsza ogólne bogactwo narodowe i zdolności produkcyjne
  - Narusza zasady demokracji, nakładając obciążenia finansowe bez odpowiedniej reprezentacji w decyzjach rządowych
explanation: |
  Tekst stwierdza, że nadmierne opodatkowanie stanowi formę agresji terytorialnej przeciwko indywidualnej własności, podobnie jak inwazja wojskowa narusza suwerenność terytorialną kraju. Ta paralela pokazuje liberalny argument, że prawa własności powinny być konsekwentnie przestrzegane na wszystkich poziomach - od indywidualnego do krajowego. Pozostałe opcje koncentrują się na kwestiach praktycznych lub demokratycznych, a nie na fundamentalnym naruszeniu praw własności, na które kładzie nacisk filozofia liberalna.
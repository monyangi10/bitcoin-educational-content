question: 자유주의 철학에 따르면, 정당한 서비스 기여를 넘어서는 과도한 과세가 일종의 영토 침략에 해당하는 이유는 무엇일까요?
answer: 이는 한 국가가 다른 국가의 영토 주권을 침해하는 것과 유사한 개인 재산권 침해에 해당합니다
wrong_answers:
  - 국가가 기본적인 보호 기능을 수행하고 필수 공공 서비스를 유지하는 데 방해가 됩니다
  - 이는 시간이 지남에 따라 전반적인 국부와 생산 능력을 감소시키는 경제적 비효율을 초래합니다
  - 정부 결정에 적절한 대표성 없이 재정적 부담을 부과하여 민주주의 원칙에 위배됩니다
explanation: |
  본문은 군사적 침략이 국가의 영토 주권을 침해하는 것과 마찬가지로 과도한 과세가 개인 재산에 대한 일종의 영토 침략이라고 규정합니다. 이 비유는 재산권은 개인에서 국가에 이르기까지 모든 규모에서 일관되게 존중되어야 한다는 자유주의적 주장을 보여줍니다. 다른 옵션은 자유주의 철학이 강조하는 근본적인 재산권 침해보다는 실용적 또는 민주적 문제에 초점을 맞추고 있습니다.
question: Co podle liberální filozofie činí nadměrné zdanění nad rámec legitimních příspěvků na služby rovnocenným formě územní agrese?
answer: Jedná se o zásah do vlastnických práv jednotlivce, podobně jako když jeden stát porušuje územní svrchovanost jiného státu
wrong_answers:
  - Brání státu plnit jeho základní ochranné funkce a udržovat základní veřejné služby
  - Vytváří ekonomickou neefektivitu, která v průběhu času snižuje celkové národní bohatství a výrobní kapacitu
  - Porušuje demokratické zásady tím, že ukládá finanční zátěž bez řádného zastoupení při rozhodování vlády
explanation: |
  Text stanoví, že nadměrné zdanění představuje formu územní agrese proti majetku jednotlivce, stejně jako vojenská invaze porušuje územní suverenitu státu. Tato paralela dokládá liberální argument, že vlastnická práva by měla být důsledně respektována na všech úrovních - od individuální po národní. Ostatní možnosti se zaměřují spíše na praktické nebo demokratické problémy než na zásadní porušení vlastnických práv, které zdůrazňuje liberální filozofie.
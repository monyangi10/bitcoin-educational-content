question: Liberaalin filosofian mukaan mikä tekee laillisia palvelumaksuja suuremmasta liiallisesta verotuksesta alueellisen hyökkäyksen muotoa?
answer: Se on loukkaus yksilön omistusoikeuksiin samalla tavalla kuin yksi valtio loukkaa toisen valtion alueellista suvereniteettia
wrong_answers:
  - Se estää valtiota täyttämästä perusluonteisia suojelutehtäviään ja ylläpitämästä keskeisiä julkisia palveluja
  - Se aiheuttaa taloudellista tehottomuutta, joka vähentää kansantalouden kokonaisvarallisuutta ja tuotantokapasiteettia ajan mittaan
  - Se rikkoo demokraattisia periaatteita, koska se aiheuttaa taloudellisia rasitteita ilman asianmukaista edustusta hallituksen päätöksenteossa
explanation: |
  Tekstissä todetaan, että liiallinen verotus on alueellisen hyökkäyksen muoto yksilön omaisuutta vastaan, aivan kuten sotilaallinen hyökkäys loukkaa kansallista alueellista suvereniteettia. Tämä rinnastus osoittaa liberaalin väitteen, jonka mukaan omistusoikeuksia olisi kunnioitettava johdonmukaisesti kaikilla tasoilla - yksilötasolta kansalliselle tasolle. Muissa vaihtoehdoissa keskitytään pikemminkin käytännöllisiin tai demokraattisiin huolenaiheisiin kuin liberaalin filosofian korostamaan perustavanlaatuiseen omistusoikeuksien loukkaamiseen.
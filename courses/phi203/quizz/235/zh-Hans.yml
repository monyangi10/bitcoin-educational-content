question: 根据自由主义思想，哪些基本区别决定了哪些国家职能应该保留，哪些应该取消？
answer: 建立法治、保护个人权利和执行合同所需的职能与可由私人倡议和市场机制处理的职能的比较
wrong_answers:
  - 有利于富裕精英的职能与服务于工人阶级和弱势群体的职能的对比
  - 在国家一级履行的职能与应下放给地区和地方政府的职能的对比
  - 为国家创造 generate 收入的职能与需要公共开支和税收的职能的比较
explanation: |
  自由主义理论对必要的国家职能（法治、司法、合同执行、个人权利保护）和可以通过私营企业、自愿联合和市场协调来处理的附属职能进行了重要区分。其他选项歪曲了自由主义的优先事项：这不是阶级特权的问题，而是制度效率的问题；不是中央集权与地方分权的问题，而是国家行为与私人行为的问题；也不是创收的问题，而是合法的国家角色与非法的国家角色的问题。
question: Hvilket grunnleggende skille er det ifølge liberal tenkning som avgjør hvilke statlige funksjoner som bør opprettholdes og hvilke som bør avskaffes?
answer: Funksjoner som er nødvendige for å etablere en rettsstat, beskytte individuelle rettigheter og håndheve kontrakter, kontra funksjoner som kan ivaretas av private initiativ og markedsmekanismer
wrong_answers:
  - Funksjoner som kommer den velstående eliten til gode, kontra funksjoner som tjener arbeiderklassen og vanskeligstilte befolkningsgrupper
  - Funksjoner som utføres på nasjonalt nivå versus funksjoner som bør desentraliseres til regionale og lokale myndigheter
  - Funksjoner som gir staten inntekter (generate) versus funksjoner som krever offentlige utgifter og beskatning
explanation: |
  Liberal teori skiller på avgjørende vis mellom nødvendige statlige funksjoner (rettsstat, rettsvesen, kontraktshåndhevelse, beskyttelse av individuelle rettigheter) og accessoriske funksjoner som kan ivaretas gjennom privat virksomhet, frivillig organisering og markedskoordinering. De andre alternativene gir en feilaktig fremstilling av liberale prioriteringer: Det handler ikke om klasseprivilegier, men om institusjonell effektivitet; ikke om sentralisering versus desentralisering, men om statlig versus privat handling; og ikke om inntektsgenerering, men om legitime versus illegitime statlige roller.
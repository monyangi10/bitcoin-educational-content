question: Milline põhimõtteline erinevus määrab liberaalse mõtteviisi kohaselt, millised riigi funktsioonid tuleks säilitada ja millised kaotada?
answer: Õigusriigi kehtestamiseks, üksikisiku õiguste kaitsmiseks ja lepingute jõustamiseks vajalikud funktsioonid võrreldes funktsioonidega, mida saab täita eraalgatuse ja turumehhanismide abil
wrong_answers:
  - Funktsioonid, mis toovad kasu jõukale eliidile, versus funktsioonid, mis teenivad töölisklassi ja ebasoodsas olukorras olevaid elanikke
  - Riiklikul tasandil täidetavad funktsioonid võrreldes funktsioonidega, mis tuleks detsentraliseerida piirkondlikele ja kohalikele omavalitsustele
  - Funktsioonid, mis annavad riigile generate tulusid, võrreldes funktsioonidega, mis nõuavad riiklikke kulutusi ja maksustamist
explanation: |
  Liberaalne teooria eristab olulisel määral vajalikke riigifunktsioone (õigusriik, õigusemõistmine, lepingute jõustamine, üksikisiku õiguste kaitse) ja lisafunktsioone, mida saab täita eraettevõtluse, vabatahtlike ühenduste ja turu koordineerimise kaudu. Teised valikud moonutavad liberaalseid prioriteete: küsimus ei ole mitte klassi privileegis, vaid institutsionaalses tõhususes; mitte tsentraliseerimises versus detsentraliseerimises, vaid riigi versus erasektori tegevuses; ja mitte tulude teenimises, vaid legitiimsetes versus illegaalsetes riigi rollides.
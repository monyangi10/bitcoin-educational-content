question: Според либералната мисъл кое основно разграничение определя кои функции на държавата трябва да се запазят и кои да се премахнат?
answer: Функции, необходими за установяване на върховенство на закона, защита на индивидуалните права и прилагане на договорите, срещу функции, които могат да бъдат изпълнени от частната инициатива и пазарните механизми
wrong_answers:
  - Функции, от които се възползва богатият елит, срещу функции, които служат на работническата класа и на населението в неравностойно положение
  - Функции, изпълнявани на национално равнище, в сравнение с функции, които следва да бъдат децентрализирани към регионалните и местните власти
  - Функции, които носят приходи за държавата, срещу функции, които изискват публични разходи и данъци
explanation: |
  Либералната теория прави важно разграничение между необходимите функции на държавата (върховенство на закона, правосъдие, прилагане на договорите, защита на правата на личността) и допълнителните функции, които могат да бъдат изпълнени чрез частното предприемачество, доброволното сдружаване и пазарната координация. Другите варианти представят погрешно либералните приоритети: не става въпрос за класови привилегии, а за институционална ефективност; не за централизация срещу децентрализация, а за държавни срещу частни действия; и не за генериране на приходи, а за легитимни срещу нелегитимни държавни роли.
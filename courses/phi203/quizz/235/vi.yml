question: Theo tư tưởng tự do, sự khác biệt cơ bản nào quyết định chức năng nào của nhà nước nên được duy trì và chức năng nào nên bị loại bỏ?
answer: Các chức năng cần thiết để thiết lập pháp quyền, bảo vệ quyền cá nhân và thực thi hợp đồng so với các chức năng có thể được xử lý bởi sáng kiến tư nhân và cơ chế thị trường.
wrong_answers:
  - Các chức năng mang lại lợi ích cho giới thượng lưu giàu có so với các chức năng phục vụ tầng lớp lao động và các nhóm dân cư thiệt thòi.
  - Các chức năng được thực hiện ở cấp quốc gia so với các chức năng cần được phân cấp cho chính quyền khu vực và địa phương.
  - Các chức năng không tạo ra doanh thu cho tiểu bang so với các chức năng đòi hỏi chi tiêu công và thuế.
explanation: |
  Lý thuyết tự do phân biệt rõ ràng giữa các chức năng thiết yếu của nhà nước (pháp quyền, công lý, thực thi hợp đồng, bảo vệ quyền cá nhân) và các chức năng phụ trợ có thể được thực hiện thông qua doanh nghiệp tư nhân, hiệp hội tự nguyện và điều phối thị trường. Các lựa chọn khác xuyên tạc các ưu tiên của chủ nghĩa tự do: vấn đề không phải là đặc quyền giai cấp mà là hiệu quả thể chế; không phải là tập trung hóa so với phân quyền mà là hành động của nhà nước so với hành động tư nhân; và không phải là tạo ra doanh thu mà là vai trò hợp pháp so với bất hợp pháp của nhà nước.
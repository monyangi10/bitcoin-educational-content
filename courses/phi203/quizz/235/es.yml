question: Según el pensamiento liberal, ¿qué distinción fundamental determina qué funciones del Estado deben mantenerse frente a cuáles deben eliminarse?
answer: Funciones necesarias para establecer el Estado de Derecho, proteger los derechos individuales y hacer cumplir los contratos frente a funciones de las que pueden ocuparse la iniciativa privada y los mecanismos de mercado
wrong_answers:
  - Funciones que benefician a la élite adinerada frente a funciones que sirven a la clase trabajadora y a las poblaciones desfavorecidas
  - Funciones desempeñadas a nivel nacional frente a funciones que deberían descentralizarse a los gobiernos regionales y locales
  - Funciones que generan ingresos para el Estado frente a funciones que requieren gasto público e impuestos
explanation: |
  La teoría liberal establece una distinción crucial entre las funciones necesarias del Estado (Estado de Derecho, justicia, cumplimiento de los contratos, protección de los derechos individuales) y las funciones accesorias que pueden llevarse a cabo a través de la empresa privada, la asociación voluntaria y la coordinación del mercado. Las otras opciones tergiversan las prioridades liberales: no se trata de privilegio de clase sino de eficiencia institucional; no se trata de centralización frente a descentralización sino de acción estatal frente a acción privada; y no se trata de generación de ingresos sino de funciones estatales legítimas frente a ilegítimas.
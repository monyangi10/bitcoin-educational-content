question: Prema liberalnoj misli, koja fundamentalna razlika određuje koje funkcije države treba zadržati, a koje eliminisati?
answer: Funkcije neophodne za uspostavljanje vladavine prava, zaštitu individualnih prava i sprovođenje ugovora naspram funkcija koje mogu biti rešene privatnom inicijativom i tržišnim mehanizmima
wrong_answers:
  - Funkcije koje koriste bogatoj eliti naspram funkcija koje služe radničkoj klasi i ugroženim populacijama
  - Funkcije koje se obavljaju na nacionalnom nivou naspram funkcija koje bi trebalo decentralizovati na regionalne i lokalne vlasti
  - Funkcije koje generate prihod za državu naspram funkcija koje zahtevaju javnu potrošnju i oporezivanje
explanation: |
  Liberalna teorija pravi ključnu razliku između neophodnih funkcija države (vladavina prava, pravda, sprovođenje ugovora, zaštita individualnih prava) i pomoćnih funkcija koje se mogu obavljati putem privatnog preduzetništva, dobrovoljnih udruženja i tržišne koordinacije. Druge opcije pogrešno predstavljaju liberalne prioritete: nije reč o klasnim privilegijama već o institucionalnoj efikasnosti; nije reč o centralizaciji naspram decentralizacije već o državnoj naspram privatnoj akciji; i nije reč o generisanju prihoda već o legitimnim naspram nelegitimnim ulogama države.
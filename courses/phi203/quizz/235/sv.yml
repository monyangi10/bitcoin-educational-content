question: Enligt liberalt tänkande, vilken grundläggande distinktion avgör vilka statliga funktioner som ska upprätthållas respektive elimineras?
answer: Funktioner som är nödvändiga för att etablera rättsstatsprincipen, skydda individuella rättigheter och upprätthålla avtal jämfört med funktioner som kan hanteras av privata initiativ och marknadsmekanismer
wrong_answers:
  - Funktioner som gynnar den rika eliten kontra funktioner som tjänar arbetarklassen och missgynnade befolkningsgrupper
  - Funktioner som utförs på nationell nivå kontra funktioner som bör decentraliseras till regionala och lokala myndigheter
  - Funktioner som ger generate-intäkter till staten jämfört med funktioner som kräver offentliga utgifter och beskattning
explanation: |
  Liberal teori gör en avgörande distinktion mellan nödvändiga statliga funktioner (rättsstat, rättvisa, avtalsupprätthållande, skydd av individuella rättigheter) och accessoriska funktioner som kan hanteras genom privat företagande, frivilliga sammanslutningar och marknadskoordinering. De andra alternativen ger en felaktig bild av liberala prioriteringar: det handlar inte om klassprivilegier utan om institutionell effektivitet; inte om centralisering kontra decentralisering utan om statliga kontra privata åtgärder; och inte om intäktsgenerering utan om legitima kontra illegitima statliga roller.
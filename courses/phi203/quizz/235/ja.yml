question: 自由主義思想によれば、国家機能の維持と廃止を決定する根本的な違いは何か？
answer: 法の支配を確立し、個人の権利を保護し、契約を執行するために必要な機能と、民間主導や市場メカニズムで処理可能な機能とを比較する。
wrong_answers:
  - 裕福なエリートに利益をもたらす機能と、労働者階級や恵まれない人々に奉仕する機能。
  - 国レベルで行われる機能と、地方や地方自治体に分権されるべき機能
  - 国家の歳入を生み出す機能と、公的支出と税金を必要とする機能
explanation: |
  リベラルの理論では、必要な国家機能（法の支配、正義、契約の執行、個人の権利保護）と、民間企業、自発的な結社、市場の調整によって処理できる付属的な機能とを決定的に区別している。他の選択肢は、リベラルの優先順位を誤って表現している。階級的特権ではなく制度的効率性、中央集権か地方分権かではなく国家か私的行為か、歳入創出ではなく国家の合法的役割か非合法的役割か。
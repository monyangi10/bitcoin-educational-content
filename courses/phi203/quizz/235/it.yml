question: Secondo il pensiero liberale, quale distinzione fondamentale determina quali funzioni statali debbano essere mantenute o eliminate?
answer: Funzioni necessarie per stabilire uno stato di diritto, proteggere i diritti individuali e far rispettare i contratti contro funzioni che possono essere gestite dall'iniziativa privata e dai meccanismi di mercato
wrong_answers:
  - Funzioni che avvantaggiano l'élite dei ricchi contro funzioni che servono la classe operaia e le popolazioni svantaggiate
  - Funzioni svolte a livello nazionale e funzioni che dovrebbero essere decentrate ai governi regionali e locali
  - Funzioni che generano entrate per lo Stato e funzioni che richiedono spese pubbliche e imposte
explanation: |
  La teoria liberale fa una distinzione cruciale tra le funzioni statali necessarie (stato di diritto, giustizia, applicazione dei contratti, protezione dei diritti individuali) e le funzioni accessorie che possono essere gestite attraverso l'impresa privata, l'associazione volontaria e il coordinamento del mercato. Le altre opzioni travisano le priorità liberali: non si tratta di privilegio di classe ma di efficienza istituzionale; non si tratta di centralizzazione contro decentralizzazione ma di azione statale contro azione privata; non si tratta di generazione di reddito ma di ruoli statali legittimi contro illegittimi.
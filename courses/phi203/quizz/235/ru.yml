question: Согласно либеральной мысли, какое фундаментальное различие определяет, какие государственные функции должны быть сохранены, а какие упразднены?
answer: Функции, необходимые для установления верховенства закона, защиты прав личности и обеспечения исполнения контрактов, в сравнении с функциями, которые могут выполняться частной инициативой и рыночными механизмами
wrong_answers:
  - Функции, выгодные богатой элите, в противовес функциям, служащим рабочему классу и обездоленным слоям населения
  - Функции, выполняемые на национальном уровне, в сравнении с функциями, которые должны быть децентрализованы для региональных и местных органов власти
  - Функции, приносящие доход государству, в сравнении с функциями, требующими государственных расходов и налогообложения
explanation: |
  Либеральная теория проводит принципиальное различие между необходимыми государственными функциями (верховенство закона, правосудие, обеспечение исполнения контрактов, защита прав личности) и вспомогательными функциями, которые могут быть реализованы с помощью частного предпринимательства, добровольных ассоциаций и рыночной координации. Другие варианты искажают либеральные приоритеты: речь идет не о классовых привилегиях, а об институциональной эффективности; не о централизации и децентрализации, а о соотношении государственных и частных действий; не о получении доходов, а о легитимной и нелегитимной роли государства.
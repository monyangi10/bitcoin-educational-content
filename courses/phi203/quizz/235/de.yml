question: Welcher grundlegende Unterschied bestimmt nach liberalem Denken, welche staatlichen Funktionen beibehalten bzw. abgeschafft werden sollten?
answer: Funktionen, die für die Schaffung von Rechtsstaatlichkeit, den Schutz individueller Rechte und die Durchsetzung von Verträgen erforderlich sind, gegenüber Funktionen, die durch Privatinitiative und Marktmechanismen erfüllt werden können
wrong_answers:
  - Funktionen, die der wohlhabenden Elite zugute kommen, gegenüber Funktionen, die der Arbeiterklasse und benachteiligten Bevölkerungsgruppen dienen
  - Funktionen, die auf nationaler Ebene wahrgenommen werden, und Funktionen, die auf die regionalen und lokalen Regierungen übertragen werden sollten
  - Funktionen, die generate-Einnahmen für den Staat bedeuten, gegenüber Funktionen, die öffentliche Ausgaben und Steuern erfordern
explanation: |
  Die liberale Theorie macht einen entscheidenden Unterschied zwischen notwendigen staatlichen Funktionen (Rechtsstaatlichkeit, Gerechtigkeit, Vertragsdurchsetzung, Schutz der individuellen Rechte) und zusätzlichen Funktionen, die durch privates Unternehmertum, freiwillige Zusammenschlüsse und Marktkoordination erledigt werden können. Die anderen Optionen stellen die liberalen Prioritäten falsch dar: Es geht nicht um Klassenprivilegien, sondern um institutionelle Effizienz; nicht um Zentralisierung oder Dezentralisierung, sondern um staatliches oder privates Handeln; und nicht um die Erzielung von Einnahmen, sondern um legitime oder illegitime staatliche Aufgaben.
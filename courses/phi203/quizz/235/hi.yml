question: According to liberal thought, what fundamental distinction determines which state functions should be maintained versus eliminated?
answer: Functions necessary for establishing rule of law, protecting individual rights, and enforcing contracts versus functions that can be handled by private initiative and market mechanisms
wrong_answers:
  - Functions that benefit the wealthy elite versus functions that serve the working class and disadvantaged populations
  - Functions performed at the national level versus functions that should be decentralized to regional and local governments
  - Functions that generate revenue for the state versus functions that require public expenditure and taxation
explanation: |
  Liberal theory makes a crucial distinction between necessary state functions (rule of law, justice, contract enforcement, individual rights protection) and accessory functions that can be handled through private enterprise, voluntary association, and market coordination. The other options misrepresent liberal priorities: it's not about class privilege but institutional efficiency; not about centralization versus decentralization but about state versus private action; and not about revenue generation but about legitimate versus illegitimate state roles.
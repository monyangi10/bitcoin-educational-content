question: Maandishi yanaelezeaje uhusiano kati ya uhuru wa kifedha na benki na kanuni pana ya uhuru wa kufanya kazi?
answer: Uhuru wa kifedha na benki unawakilisha matumizi maalum ya uhuru wa kufanya kazi kwani pesa ni huduma na bidhaa inayobadilishwa sokoni.
wrong_answers:
  - Uhuru wa kifedha ni tofauti kimsingi na uhuru wa kufanya kazi kwa sababu unahusisha uhuru wa serikali badala ya chaguo la mtu binafsi la wafanyakazi
  - Uhuru wa benki hufanya kazi bila kujali kanuni za uhuru wa kufanya kazi kwani huduma za kifedha zinahitaji mifumo maalum ya udhibiti kwa ajili ya ulinzi wa umma.
  - Sera ya fedha inawakilisha mkataba wa pamoja wa kijamii unaozidi uhuru wa kufanya kazi wa mtu binafsi na unahitaji mifumo ya uratibu wa kati.
explanation: |
  Maandishi yanasema waziwazi kwamba uhuru wa benki na fedha ni 'matumizi maalum ya uhuru wa kufanya kazi, kwa kuwa pesa inawakilisha tu huduma inayotolewa na bidhaa inayobadilishwa sokoni.' Hii inaonyesha jinsi kanuni huria zinavyoenea kila mara katika sekta tofauti za kiuchumi. Majibu yasiyo sahihi yanaonyesha sera ya fedha inafanya kazi chini ya kanuni tofauti, wakati maandishi yanasema pesa inapaswa kutendewa kama huduma nyingine yoyote ya soko inayozingatia kanuni sawa za uhuru.
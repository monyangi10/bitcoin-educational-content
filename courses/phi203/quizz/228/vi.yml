question: Văn bản này giải thích mối quan hệ giữa tự do tiền tệ và ngân hàng với nguyên tắc rộng hơn về tự do lao động như thế nào?
answer: Tự do tiền tệ và ngân hàng là một ứng dụng cụ thể của tự do lao động, vì tiền chỉ đơn giản là một dịch vụ và sản phẩm được trao đổi trên thị trường.
wrong_answers:
  - Tự do tiền tệ về cơ bản khác với tự do lao động vì nó liên quan đến chủ quyền nhà nước chứ không phải sự lựa chọn lao động cá nhân.
  - Tự do ngân hàng hoạt động độc lập với các nguyên tắc tự do lao động vì các dịch vụ tài chính đòi hỏi các khuôn khổ pháp lý chuyên biệt để bảo vệ công chúng.
  - Chính sách tiền tệ đại diện cho một khế ước xã hội tập thể vượt lên trên quyền tự do lao động cá nhân và đòi hỏi các cơ chế phối hợp tập trung.
explanation: |
  Văn bản nêu rõ rằng tự do ngân hàng và tiền tệ cấu thành "một ứng dụng cụ thể của tự do lao động, vì tiền chỉ đơn giản là một dịch vụ được cung cấp và một sản phẩm được trao đổi trên thị trường". Điều này chứng minh các nguyên tắc tự do được áp dụng nhất quán trên các lĩnh vực kinh tế khác nhau. Các câu trả lời sai cho rằng chính sách tiền tệ hoạt động theo các nguyên tắc khác, trong khi văn bản lập luận rằng tiền nên được đối xử như bất kỳ dịch vụ thị trường nào khác và tuân theo các nguyên tắc tự do tương tự.
question: W jaki sposób tekst wyjaśnia związek między wolnością monetarną i bankową a szerszą zasadą wolności pracy?
answer: Wolność pieniężna i bankowa stanowi szczególne zastosowanie wolności pracy, ponieważ pieniądz jest po prostu usługą i produktem wymienianym na rynku
wrong_answers:
  - Wolność monetarna różni się zasadniczo od wolności pracy, ponieważ wiąże się z suwerennością państwa, a nie z indywidualnymi wyborami dotyczącymi pracy
  - Wolność bankowa działa niezależnie od zasad wolności pracy, ponieważ usługi finansowe wymagają wyspecjalizowanych ram regulacyjnych w celu ochrony społeczeństwa
  - Polityka pieniężna stanowi zbiorową umowę społeczną, która wykracza poza indywidualną swobodę pracy i wymaga scentralizowanych mechanizmów koordynacji
explanation: |
  Tekst wyraźnie stwierdza, że wolność bankowa i monetarna stanowi "szczególne zastosowanie wolności pracy, ponieważ pieniądze reprezentują po prostu świadczoną usługę i produkt wymieniany na rynku" Pokazuje to, jak liberalne zasady rozciągają się konsekwentnie na różne sektory gospodarki. Nieprawidłowe odpowiedzi błędnie sugerują, że polityka pieniężna działa na innych zasadach, podczas gdy tekst twierdzi, że pieniądze powinny być traktowane jak każda inna usługa rynkowa podlegająca tym samym zasadom wolności.
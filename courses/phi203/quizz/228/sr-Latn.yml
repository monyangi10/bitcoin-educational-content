question: Kako tekst objašnjava odnos između monetarne i bankarske slobode i šireg principa slobode rada?
answer: Monetarna i bankarska sloboda predstavlja specifičnu primenu slobode rada, budući da je novac jednostavno usluga i proizvod koji se razmenjuje na tržištu.
wrong_answers:
  - Monetarna sloboda je suštinski različita od slobode rada jer uključuje suverenitet države, a ne individualne izbore rada.
  - Bankarska sloboda funkcioniše nezavisno od principa slobode rada jer finansijske usluge zahtevaju specijalizovane regulatorne okvire za zaštitu javnosti
  - Monetarna politika predstavlja kolektivni društveni ugovor koji prevazilazi slobodu individualnog rada i zahteva centralizovane mehanizme koordinacije
explanation: |
  Tekst eksplicitno navodi da bankarska i monetarna sloboda predstavljaju 'posebnu primenu slobode rada, jer novac jednostavno predstavlja uslugu pruženu i proizvod razmenjen na tržištu.' Ovo pokazuje kako se liberalni principi dosledno primenjuju u različitim ekonomskim sektorima. Pogrešni odgovori netačno sugerišu da monetarna politika funkcioniše pod različitim principima, dok tekst tvrdi da novac treba tretirati kao bilo koju drugu tržišnu uslugu podložnu istim principima slobode.
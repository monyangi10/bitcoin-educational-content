question: ¿Cómo explica el texto la relación entre la libertad monetaria y bancaria y el principio más amplio de la libertad de trabajo?
answer: La libertad monetaria y bancaria representa una aplicación específica de la libertad de trabajo, ya que el dinero no es más que un servicio y un producto que se intercambian en el mercado
wrong_answers:
  - La libertad monetaria es fundamentalmente diferente de la libertad de trabajo porque implica la soberanía del Estado y no las opciones laborales individuales
  - La libertad bancaria funciona independientemente de los principios de libertad laboral, ya que los servicios financieros requieren marcos reguladores especializados para la protección del público
  - La política monetaria representa un contrato social colectivo que trasciende la libertad de trabajo individual y requiere mecanismos de coordinación centralizados
explanation: |
  El texto afirma explícitamente que la libertad bancaria y monetaria constituye "una aplicación particular de la libertad de trabajo, ya que el dinero representa simplemente un servicio prestado y un producto intercambiado en el mercado" Esto demuestra cómo los principios liberales se extienden de forma coherente a distintos sectores económicos. Las respuestas incorrectas sugieren erróneamente que la política monetaria opera bajo principios diferentes, cuando el texto argumenta que el dinero debe tratarse como cualquier otro servicio de mercado sujeto a los mismos principios de libertad.
question: متن چگونه رابطه بین آزادی پولی و بانکی و اصل گسترده‌تر آزادی کار را توضیح می‌دهد؟
answer: آزادی پولی و بانکی نمایانگر کاربرد خاصی از آزادی کار است زیرا پول صرفاً یک خدمت و محصولی است که در بازار مبادله می‌شود.
wrong_answers:
  - آزادی پولی اساساً با آزادی کار متفاوت است زیرا شامل حاکمیت دولت می‌شود نه انتخاب‌های فردی در کار.
  - آزادی بانکی به طور مستقل از اصول آزادی کار عمل می‌کند زیرا خدمات مالی به چارچوب‌های نظارتی تخصصی برای حفاظت عمومی نیاز دارند.
  - سیاست پولی نمایانگر یک قرارداد اجتماعی جمعی است که از آزادی کار فردی فراتر می‌رود و نیازمند مکانیزم‌های هماهنگی متمرکز است.
explanation: |
  متن به‌طور صریح بیان می‌کند که آزادی بانکی و پولی به‌عنوان 'یک کاربرد خاص از آزادی کار، زیرا پول به‌سادگی نمایانگر یک خدمت ارائه‌شده و یک محصول مبادله‌شده در بازار است' محسوب می‌شود. این نشان می‌دهد که چگونه اصول لیبرال به‌طور مداوم در بخش‌های مختلف اقتصادی گسترش می‌یابند. پاسخ‌های نادرست به‌اشتباه پیشنهاد می‌کنند که سیاست پولی تحت اصول متفاوتی عمل می‌کند، در حالی که متن استدلال می‌کند پول باید مانند هر خدمت بازار دیگری که تحت اصول آزادی مشابه قرار دارد، تلقی شود.
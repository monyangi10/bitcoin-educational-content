question: Hvordan forklarer teksten forholdet mellom penge- og bankfrihet og det bredere prinsippet om arbeidsfrihet?
answer: Penge- og bankfrihet representerer en spesifikk anvendelse av arbeidsfriheten, siden penger rett og slett er en tjeneste og et produkt som utveksles i markedet
wrong_answers:
  - Pengefriheten er fundamentalt forskjellig fra arbeidsfriheten, fordi den innebærer statlig suverenitet snarere enn individuelle arbeidsvalg
  - Bankfriheten fungerer uavhengig av prinsippene for arbeidsfrihet, siden finansielle tjenester krever spesialiserte regelverk for å beskytte allmennheten
  - Pengepolitikken representerer en kollektiv samfunnskontrakt som overskrider den individuelle arbeidsfriheten og krever sentraliserte koordineringsmekanismer
explanation: |
  Teksten sier eksplisitt at bank- og pengefrihet utgjør "en spesiell anvendelse av arbeidsfriheten, siden penger ganske enkelt representerer en tjeneste som ytes og et produkt som utveksles på markedet" Dette viser hvordan liberale prinsipper gjelder på tvers av ulike økonomiske sektorer. De gale svarene antyder feilaktig at pengepolitikken opererer under andre prinsipper, mens teksten argumenterer for at penger bør behandles som enhver annen markedstjeneste underlagt de samme frihetsprinsippene.
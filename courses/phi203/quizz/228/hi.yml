question: How does the text explain the relationship between monetary and banking freedom and the broader principle of freedom of work?
answer: Monetary and banking freedom represents a specific application of freedom of work since money is simply a service and product exchanged in the market
wrong_answers:
  - Monetary freedom is fundamentally different from freedom of work because it involves state sovereignty rather than individual labor choices
  - Banking freedom operates independently of work freedom principles since financial services require specialized regulatory frameworks for public protection
  - Monetary policy represents a collective social contract that transcends individual work freedom and requires centralized coordination mechanisms
explanation: |
  The text explicitly states that banking and monetary freedom constitutes 'a particular application of freedom of work, since money simply represents a service rendered and a product exchanged on the market.' This demonstrates how liberal principles extend consistently across different economic sectors. The wrong answers incorrectly suggest monetary policy operates under different principles, when the text argues money should be treated like any other market service subject to the same freedom principles.
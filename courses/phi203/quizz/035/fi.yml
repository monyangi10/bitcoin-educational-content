question: Luvun mukaan mikä oikeuttaa siihen, että demokraattisessa prosessissa olisi kysyttävä kaikkien mielipiteitä?
answer: Jokainen ihminen kokee suoraan lakien vaikutukset omien yksilöllisten nautintojensa ja kipujensa kautta
wrong_answers:
  - Kaikilla kansalaisilla on yhtäläinen älykkyysosamäärä ja siten yhtäläinen kyky tehdä poliittisia päätöksiä
  - Demokraattinen osallistuminen takaa, että enemmistö tekee aina oikean valinnan
  - Jokainen ihminen osallistuu yhteiskunnan toimintaan tasapuolisesti ja ansaitsee siksi yhtäläisen poliittisen edustuksen
explanation: |
  Luvussa selitetään, että yleinen äänioikeus on perusteltu, koska ilot ja tuskat ovat yksilöllisiä kokemuksia - jokainen ihminen tuntee suoraan lakien vaikutukset omaan elämäänsä. Eri yksilöt voivat kokea samat tilanteet eri tavoin ja muodostaa tuomioita henkilökohtaisten kokemustensa perusteella. Tämä yksilöllisen kokemuksen todellisuus, eikä niinkään oletukset yhtäläisestä älykkyydestä, enemmistön oikeellisuudesta tai yhtäläisestä yhteiskunnallisesta panoksesta, muodostaa perustan sille, että demokraattisiin prosesseihin pyritään saamaan kaikkien panos.
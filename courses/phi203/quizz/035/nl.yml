question: Wat rechtvaardigt volgens het hoofdstuk dat ieders mening moet worden gevraagd in het democratische proces?
answer: Elke persoon ervaart direct de effecten van wetten door zijn eigen individuele pleziertjes en pijntjes
wrong_answers:
  - Alle burgers zijn even intelligent en daarom even goed in staat om politieke beslissingen te nemen
  - Democratische participatie zorgt ervoor dat de meerderheid altijd de juiste keuze maakt
  - Iedereen draagt in gelijke mate bij aan de samenleving en verdient daarom gelijke politieke vertegenwoordiging
explanation: |
  Het hoofdstuk legt uit dat algemeen kiesrecht gerechtvaardigd is omdat plezier en pijn individuele ervaringen zijn - iedereen voelt direct de effecten van wetten op zijn eigen leven. Verschillende individuen kunnen dezelfde situaties verschillend waarnemen en oordelen vormen op basis van hun persoonlijke ervaring. Deze realiteit van individuele ervaring, in plaats van veronderstellingen over gelijke intelligentie, correctheid van de meerderheid of gelijke sociale bijdrage, vormt de basis voor het zoeken naar ieders inbreng in democratische processen.
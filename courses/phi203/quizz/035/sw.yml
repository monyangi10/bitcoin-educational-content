question: Kulingana na sura hiyo, ni nini kinachohalalisha kwamba maoni ya kila mtu yanapaswa kutafutwa katika mchakato wa kidemokrasia?
answer: Kila mtu hupata moja kwa moja athari za sheria kupitia raha na maumivu yake binafsi
wrong_answers:
  - Raia wote wana akili sawa na hivyo uwezo sawa wa kufanya maamuzi ya kisiasa
  - Ushiriki wa Kidemokrasia unahakikisha kwamba wengi watafanya chaguo sahihi kila wakati
  - Kila mtu huchangia kwa usawa katika jamii na kwa hivyo anastahili uwakilishi sawa wa kisiasa
explanation: |
  Sura hiyo inaelezea kwamba haki ya kupiga kura kwa wote inahesabiwa haki kwa sababu raha na maumivu ni uzoefu wa mtu binafsi - kila mtu anahisi moja kwa moja athari za sheria kwenye maisha yake mwenyewe. Watu tofauti wanaweza kuona hali zile zile tofauti na kutoa hukumu kulingana na uzoefu wao binafsi. Ukweli huu wa uzoefu wa mtu binafsi, badala ya mawazo kuhusu akili sawa, usahihi wa wengi, au mchango sawa wa kijamii, huunda msingi wa kutafuta mchango wa kila mtu katika michakato ya kidemokrasia.
question: Selon le chapitre, qu'est-ce qui justifie que l'opinion de chacun soit recherchée dans le processus démocratique ?
answer: Chaque personne ressent directement les effets des lois à travers ses plaisirs et ses peines
wrong_answers:
  - Tous les citoyens ont la même intelligence et donc la même capacité à prendre des décisions politiques
  - La participation démocratique garantit que la majorité fera toujours le bon choix
  - Chaque personne contribue de manière égale à la société et mérite donc une représentation politique égale
explanation: |
  Le chapitre explique que le suffrage universel est justifié parce que les plaisirs et les douleurs sont des expériences individuelles - chaque personne ressent directement les effets des lois sur sa propre vie. Des individus différents peuvent percevoir différemment les mêmes situations et former des jugements basés sur leur expérience personnelle. Cette réalité de l'expérience individuelle, plutôt que des hypothèses sur l'égalité de l'intelligence, la justesse de la majorité ou l'égalité de la contribution sociale, constitue le fondement de la recherche de l'apport de chacun dans les processus démocratiques.
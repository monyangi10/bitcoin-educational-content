question: Menurut bab ini, apa yang membenarkan bahwa pendapat setiap orang harus dicari dalam proses demokrasi?
answer: Setiap orang secara langsung mengalami dampak dari hukum melalui kesenangan dan rasa sakit mereka masing-masing
wrong_answers:
  - Semua warga negara memiliki kecerdasan yang sama dan oleh karena itu memiliki kapasitas yang sama untuk membuat keputusan politik
  - Partisipasi demokratis memastikan bahwa mayoritas akan selalu membuat pilihan yang benar
  - Setiap orang memberikan kontribusi yang sama kepada masyarakat dan oleh karena itu berhak mendapatkan perwakilan politik yang sama
explanation: |
  Bab ini menjelaskan bahwa hak pilih universal dapat dibenarkan karena kesenangan dan penderitaan merupakan pengalaman individu - setiap orang secara langsung merasakan dampak dari undang-undang terhadap kehidupan mereka sendiri. Individu yang berbeda dapat melihat situasi yang sama secara berbeda dan membentuk penilaian berdasarkan pengalaman pribadi mereka. Realitas pengalaman individu ini, bukan asumsi tentang kecerdasan yang sama, kebenaran mayoritas, atau kontribusi sosial yang sama, menjadi dasar untuk mencari masukan dari setiap orang dalam proses demokrasi.
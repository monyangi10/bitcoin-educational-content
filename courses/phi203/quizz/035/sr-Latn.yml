question: Prema poglavlju, šta opravdava da se mišljenje svakoga treba tražiti u demokratskom procesu?
answer: Svaka osoba direktno doživljava efekte zakona kroz sopstvena individualna zadovoljstva i bolove.
wrong_answers:
  - Svi građani imaju jednaku inteligenciju i stoga jednaku sposobnost donošenja političkih odluka.
  - Demokratsko učešće osigurava da će većina uvek doneti ispravan izbor
  - Svaka osoba jednako doprinosi društvu i stoga zaslužuje jednaku političku zastupljenost.
explanation: |
  Poglavlje objašnjava da je opšte pravo glasa opravdano jer su zadovoljstva i bolovi individualna iskustva - svaka osoba direktno oseća efekte zakona na svoj život. Različiti pojedinci mogu različito percipirati iste situacije i formirati sudove na osnovu ličnog iskustva. Ova stvarnost individualnog iskustva, a ne pretpostavke o jednakoj inteligenciji, ispravnosti većine ili jednakom društvenom doprinosu, čini osnovu za traženje mišljenja svih u demokratskim procesima.
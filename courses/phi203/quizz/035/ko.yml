question: 이 장에 따르면, 민주적 절차에서 모든 사람의 의견을 구해야 한다는 것을 정당화하는 근거는 무엇인가요?
answer: 각 개인은 각자의 쾌락과 고통을 통해 법의 효과를 직접 경험합니다
wrong_answers:
  - 모든 시민은 동등한 지능을 가지고 있으므로 정치적 결정을 내릴 수 있는 동등한 능력을 가지고 있습니다
  - 민주적 참여는 다수가 항상 올바른 선택을 하도록 보장합니다
  - 모든 사람은 동등하게 사회에 기여하므로 동등한 정치적 대표성을 가질 자격이 있습니다
explanation: |
  이 장에서는 쾌락과 고통은 개인의 경험이며 각 개인은 자신의 삶에 미치는 법의 영향을 직접적으로 느끼기 때문에 보편적 참정권이 정당화된다고 설명합니다. 개인마다 같은 상황을 다르게 인식하고 개인적인 경험에 따라 판단을 내릴 수 있습니다. 평등한 지능, 다수의 정확성 또는 평등한 사회적 기여에 대한 가정이 아닌 이러한 개인적 경험의 현실은 민주적 절차에서 모든 사람의 의견을 구하는 토대를 형성합니다.
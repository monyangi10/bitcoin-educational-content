question: 根据本章内容，在民主进程中征求每个人的意见的理由是什么？
answer: 每个人都通过自己的快乐和痛苦直接体验法律的影响
wrong_answers:
  - 所有公民具有同等智慧，因此也具有同等的政治决策能力
  - 民主参与确保大多数人总是做出正确的选择
  - 每个人对社会的贡献是平等的，因此理应享有平等的政治代表权
explanation: |
  该章解释说，普选是合理的，因为快乐和痛苦都是个人体验--每个人都直接感受到法律对自己生活的影响。不同的人会对相同的情况有不同的感知，并根据个人经验做出判断。这种个人经历的现实，而不是关于同等智力、多数人正确或同等社会贡献的假设，构成了在民主进程中寻求每个人意见的基础。
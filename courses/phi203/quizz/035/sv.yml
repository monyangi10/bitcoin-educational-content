question: Vad motiverar enligt kapitlet att allas åsikter ska eftersträvas i den demokratiska processen?
answer: Varje person upplever direkt effekterna av lagar genom sina egna individuella nöjen och smärtor
wrong_answers:
  - Alla medborgare har samma intelligens och därmed samma förmåga att fatta politiska beslut
  - Demokratiskt deltagande säkerställer att majoriteten alltid kommer att göra rätt val
  - Alla människor bidrar lika mycket till samhället och förtjänar därför lika stor politisk representation
explanation: |
  I kapitlet förklaras att allmän rösträtt är motiverad eftersom glädje och smärta är individuella upplevelser - varje person känner direkt av lagarnas effekter på sitt eget liv. Olika individer kan uppfatta samma situationer på olika sätt och göra bedömningar utifrån sina personliga erfarenheter. Det är denna individuella erfarenhet, snarare än antaganden om lika intelligens, majoritetens korrekthet eller lika sociala bidrag, som utgör grunden för att alla ska få komma till tals i demokratiska processer.
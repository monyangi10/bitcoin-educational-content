question: بر اساس فصل، چه چیزی توجیه می‌کند که نظر همه در فرآیند دموکراتیک باید جستجو شود؟
answer: هر فرد به طور مستقیم اثرات قوانین را از طریق لذت‌ها و دردهای شخصی خود تجربه می‌کند.
wrong_answers:
  - همه شهروندان دارای هوش برابر و بنابراین ظرفیت برابر برای اتخاذ تصمیمات سیاسی هستند.
  - مشارکت دموکراتیک تضمین می‌کند که اکثریت همیشه انتخاب درستی خواهند داشت
  - هر فرد به طور مساوی به جامعه کمک می‌کند و بنابراین شایسته نمایندگی سیاسی برابر است.
explanation: |
  این فصل توضیح می‌دهد که حق رأی همگانی توجیه‌پذیر است زیرا لذت‌ها و دردها تجربیات فردی هستند - هر فرد به طور مستقیم اثرات قوانین را بر زندگی خود احساس می‌کند. افراد مختلف ممکن است موقعیت‌های مشابه را به طور متفاوتی درک کنند و بر اساس تجربیات شخصی خود قضاوت کنند. این واقعیت تجربه فردی، به جای فرضیات درباره هوش برابر، درستی اکثریت، یا مشارکت اجتماعی برابر، پایه‌ای برای جستجوی نظر همه در فرآیندهای دموکراتیک است.
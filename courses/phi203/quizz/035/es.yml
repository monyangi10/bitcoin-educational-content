question: Según el capítulo, ¿qué justifica que se busque la opinión de todos en el proceso democrático?
answer: Cada persona experimenta directamente los efectos de las leyes a través de sus propios placeres y dolores individuales
wrong_answers:
  - Todos los ciudadanos tienen la misma inteligencia y, por tanto, la misma capacidad para tomar decisiones políticas
  - La participación democrática garantiza que la mayoría tomará siempre la decisión correcta
  - Todas las personas contribuyen por igual a la sociedad y, por tanto, merecen la misma representación política
explanation: |
  El capítulo explica que el sufragio universal está justificado porque los placeres y las penas son experiencias individuales: cada persona siente directamente los efectos de las leyes en su propia vida. Diferentes individuos pueden percibir las mismas situaciones de forma diferente y formarse juicios basados en su experiencia personal. Esta realidad de la experiencia individual, más que las suposiciones sobre la igualdad de inteligencia, la corrección de la mayoría o la igualdad de contribución social, constituye la base para buscar la aportación de todos en los procesos democráticos.
question: Co text označuje za hlavní metodu, kterou by mělo být dosaženo reforem svobody, a jaký historický příklad tento přístup demonstruje?
answer: Mobilizací veřejného mínění a debatou o myšlenkách, jak to dokázal Cobden a Liga proti kukuřičnému zákonu v Anglii
wrong_answers:
  - "prostřednictvím revolučních převratů a úplné výměny systému, jak ukázala proměna společnosti ve Francouzské revoluci."
  - "Postupnými státními zásahy a regulačními reformami, jak ukázala politika fyziokratů v oblasti obchodu s obilím ve Francii."
  - Prostřednictvím mezinárodní spolupráce a vyjednávání smluv, jak ukázala evropská hnutí za svobodný obchod v 18. století
explanation: |
  Text se výslovně vyslovuje pro reformy namísto revoluce a cituje Tocquevillovu analýzu, podle níž jsou revoluce nákladné a často upevňují centralizovanou moc. Jako modelový přístup představuje Cobdena a Ligu proti obilním zákonům, která dosáhla zrušení obilních zákonů prostřednictvím organizovaných setkání a veřejné debaty v celé Británii. Tato metoda odpovídá liberálním hodnotám konkurence, svobody a zdokonalitelnosti spíše prostřednictvím přesvědčování než síly.
question: Quali sono i due fattori principali che, secondo il testo, hanno fatto sì che la schiavitù si sviluppasse universalmente nelle società antiche?
answer: La produzione dipendeva quasi esclusivamente dalla forza fisica e i rendimenti economici rimanevano bassi e incerti
wrong_answers:
  - Le credenze religiose richiedevano sacrifici umani e le tradizioni culturali promuovevano le gerarchie sociali
  - La crescita della popolazione superava le terre disponibili e la conquista militare era l'attività economica principale
  - I sistemi educativi non erano sviluppati e le tecnologie di comunicazione erano completamente assenti
explanation: |
  Il testo afferma chiaramente che la schiavitù si sviluppò universalmente nelle società antiche perché la produzione dipendeva quasi esclusivamente dalla forza fisica (per la caccia, i combattimenti, le conquiste) e perché i rendimenti produttivi rimanevano bassi e incerti. Questi vincoli economici, uniti alla limitatezza dei trasporti e del commercio, hanno reso la schiavitù un'istituzione coerente per le società in cui la forza era il principale mezzo di acquisizione delle risorse. Le altre opzioni menzionano fattori non specificamente identificati nel testo come ragioni primarie dello sviluppo universale della schiavitù nell'antichità.
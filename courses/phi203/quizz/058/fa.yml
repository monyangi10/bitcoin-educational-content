question: دو عامل اصلی که باعث شد برده‌داری به طور جهانی در جوامع باستانی توسعه یابد، طبق متن چه بودند؟
answer: تولید تقریباً به‌طور انحصاری به نیروی فیزیکی وابسته بود و بازده اقتصادی همچنان پایین و نامطمئن باقی می‌ماند.
wrong_answers:
  - باورهای مذهبی قربانی انسانی را الزامی می‌کردند و سنت‌های فرهنگی سلسله‌مراتب اجتماعی را ترویج می‌دادند.
  - رشد جمعیت از زمین‌های موجود فراتر رفت و فتح نظامی فعالیت اقتصادی اصلی بود.
  - سیستم‌های آموزشی توسعه نیافته بودند و فناوری‌های ارتباطی کاملاً غایب بودند
explanation: |
  متن به وضوح بیان می‌کند که برده‌داری به‌طور جهانی در جوامع باستانی توسعه یافت زیرا تولید تقریباً به‌طور انحصاری به نیروی فیزیکی (برای شکار، جنگ، فتوحات) وابسته بود و به این دلیل که بازده تولیدی پایین و نامطمئن باقی می‌ماند. این محدودیت‌های اقتصادی، همراه با حمل و نقل و تجارت محدود، برده‌داری را به نهادی منسجم برای جوامعی تبدیل کرد که در آن‌ها زور وسیله اصلی کسب منابع بود. گزینه‌های دیگر به عواملی اشاره می‌کنند که به‌طور خاص در متن به‌عنوان دلایل اصلی توسعه جهانی برده‌داری در زمان‌های باستان شناسایی نشده‌اند.
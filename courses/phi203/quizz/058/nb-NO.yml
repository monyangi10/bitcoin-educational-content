question: Hvilke to hovedfaktorer gjorde ifølge teksten at slaveriet utviklet seg universelt i antikkens samfunn?
answer: Produksjonen var nesten utelukkende avhengig av fysisk makt, og det økonomiske utbyttet forble lavt og usikkert
wrong_answers:
  - Religiøse forestillinger krevde menneskeofringer, og kulturelle tradisjoner fremmet sosiale hierarkier
  - Befolkningsveksten oversteg tilgjengelig land, og militære erobringer var den viktigste økonomiske aktiviteten
  - Utdanningssystemene var uutviklet, og kommunikasjonsteknologi var helt fraværende
explanation: |
  Teksten sier tydelig at slaveriet utviklet seg universelt i antikkens samfunn fordi produksjonen nesten utelukkende var avhengig av fysisk makt (til jakt, kamp, erobringer) og fordi produksjonsutbyttet var lavt og usikkert. Disse økonomiske begrensningene, kombinert med begrenset transport og handel, gjorde slaveriet til en naturlig institusjon i samfunn der makt var det viktigste middelet for å skaffe seg ressurser. De andre alternativene nevner faktorer som ikke er spesifikt identifisert i teksten som primære årsaker til slaveriets universelle utvikling i antikken.
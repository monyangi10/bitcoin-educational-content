question: Ni ibihe bintu bibiri nyamukuru vyatumye ubuja butera imbere kw’isi yose mu mibano ya kera nk’uko icanditswe kivyerekana?
answer: Umwimbu wari ushingiye hafi ku nguvu z’umubiri gusa kandi umwimbu w’ubutunzi waguma ari muto kandi udatomoye .
wrong_answers:
  - Ivyizerwa vy'idini vyasaba ko umuntu atanga ikimazi kandi imigenzo y'imico kama yarateza imbere ubukuru bw'abantu
  - Ukwiyongera kw'abantu kwarengeye ubutaka bwariho kandi kwigarurira abasirikare ni co gikorwa nyamukuru c'ubutunzi .
  - Uburyo bwo kwigisha ntibwari bwateyimbere kandi ubuhinga bwo guhanahana amakuru ntibwariho rwose .
explanation: |
  Ico canditswe kivuga neza yuko ubuja bwateye imbere kw’isi yose mu mibano ya kera kubera ko umwimbu wari ushingiye hafi ku nguvu z’umubiri gusa (zo guhigira, kurwana, kwigarurira) be n’uko umwimbu w’umwimbu waguma ari muto kandi udatomoye. Ivyo bibazo vy’ubutunzi, hamwe n’ugutwara abantu n’ibintu n’ubudandaji bike, vyatumye ubuja buba ikintu gihuye mu mibano aho inguvu zari uburyo nyamukuru bwo kuronka ubutunzi. Ayandi mahitamwo avuga ibintu bitavuzwe mu buryo budasanzwe muri ico canditswe ko ari vyo vyatumye ubuja butera imbere kw’isi yose mu bihe vya kera.
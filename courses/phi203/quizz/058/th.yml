question: ปัจจัยหลักสองประการที่ทำให้การเป็นทาสพัฒนาขึ้นอย่างแพร่หลายในสังคมโบราณตามข้อความคืออะไร?
answer: การผลิตขึ้นอยู่กับแรงกายเกือบทั้งหมด และผลตอบแทนทางเศรษฐกิจยังคงต่ำและไม่แน่นอน
wrong_answers:
  - ความเชื่อทางศาสนาต้องการการบูชายัญมนุษย์และประเพณีทางวัฒนธรรมส่งเสริมลำดับชั้นทางสังคม
  - การเติบโตของประชากรเกินกว่าที่ดินที่มีอยู่และการพิชิตทางทหารเป็นกิจกรรมทางเศรษฐกิจหลัก
  - ระบบการศึกษายังไม่ได้รับการพัฒนาและเทคโนโลยีการสื่อสารยังไม่มีอยู่เลย
explanation: |
  ข้อความระบุไว้อย่างชัดเจนว่าการเป็นทาสพัฒนาขึ้นอย่างแพร่หลายในสังคมโบราณเพราะการผลิตขึ้นอยู่กับแรงกายเกือบทั้งหมด (สำหรับการล่าสัตว์ การต่อสู้ การพิชิต) และเพราะผลผลิตยังคงต่ำและไม่แน่นอน ข้อจำกัดทางเศรษฐกิจเหล่านี้ รวมกับการขนส่งและการค้าขายที่จำกัด ทำให้การเป็นทาสเป็นสถาบันที่สอดคล้องกันสำหรับสังคมที่ใช้กำลังเป็นวิธีหลักในการได้มาซึ่งทรัพยากร ตัวเลือกอื่น ๆ กล่าวถึงปัจจัยที่ไม่ได้ระบุในข้อความว่าเป็นเหตุผลหลักสำหรับการพัฒนาการเป็นทาสอย่างแพร่หลายในสมัยโบราณ
question: Metne göre köleliğin eski toplumlarda evrensel olarak gelişmesini sağlayan iki ana faktör nedir?
answer: Üretim neredeyse tamamen fiziksel güce bağlıydı ve ekonomik getiriler düşük ve belirsizdi
wrong_answers:
  - Dini inançlar insan kurban etmeyi gerektiriyordu ve kültürel gelenekler sosyal hiyerarşileri destekliyordu
  - Nüfus artışı mevcut araziyi aştı ve askeri fetih birincil ekonomik faaliyet oldu
  - Eğitim sistemleri gelişmemişti ve iletişim teknolojileri tamamen yoktu
explanation: |
  Metin, köleliğin antik toplumlarda evrensel olarak geliştiğini, çünkü üretimin neredeyse tamamen fiziksel güce (avlanma, savaşma, fetihler için) bağlı olduğunu ve üretken verimlerin düşük ve belirsiz kaldığını açıkça belirtmektedir. Bu ekonomik kısıtlamalar, sınırlı ulaşım ve ticaretle birleşince kölelik, kaynak edinmenin ana yolunun güç olduğu toplumlar için tutarlı bir kurum haline gelmiştir. Diğer seçenekler, köleliğin antik çağlardaki evrensel gelişiminin birincil nedenleri olarak metinde özel olarak tanımlanmayan faktörlerden bahsetmektedir.
question: 본문에 따르면 고대 사회에서 노예 제도가 보편적으로 발전하게 된 두 가지 주요 요인은 무엇입니까?
answer: 생산은 거의 전적으로 물리적 힘에 의존했고 경제적 수익률은 낮고 불확실했습니다
wrong_answers:
  - 종교적 신념은 인간 희생을 요구했고 문화적 전통은 사회적 위계를 조장했습니다
  - 인구 증가는 가용 토지를 초과했고 군사적 정복이 주요 경제 활동이었습니다
  - 교육 시스템이 발달하지 않았고 통신 기술이 완전히 부재했습니다
explanation: |
  본문은 고대 사회에서 노예제도가 보편적으로 발달한 이유는 생산이 거의 전적으로 물리적 힘(사냥, 전투, 정복)에 의존했고 생산량이 낮고 불확실했기 때문이라고 분명히 밝히고 있습니다. 이러한 경제적 제약은 제한된 교통 및 상업과 결합되어 무력이 자원을 획득하는 주요 수단인 사회에서 노예제를 일관된 제도로 만들었습니다. 다른 옵션은 고대에 노예 제도가 보편적으로 발전한 주요 원인으로 본문에서 구체적으로 언급되지 않은 요인을 언급합니다.
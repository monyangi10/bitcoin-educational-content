question: Koja su dva glavna faktora prema tekstu koja su dovela do univerzalnog razvoja ropstva u drevnim društvima?
answer: Proizvodnja je zavisila gotovo isključivo od fizičke sile, a ekonomski prinosi su ostajali niski i neizvesni.
wrong_answers:
  - Religijska uverenja zahtevala su ljudske žrtve, a kulturne tradicije promovisale društvene hijerarhije.
  - Rast stanovništva premašio je dostupnu zemlju, a vojno osvajanje bilo je primarna ekonomska aktivnost.
  - Obrazovni sistemi su bili nerazvijeni, a komunikacione tehnologije potpuno odsutne.
explanation: |
  Tekst jasno navodi da se ropstvo univerzalno razvilo u drevnim društvima jer je proizvodnja zavisila gotovo isključivo od fizičke sile (za lov, borbu, osvajanja) i zato što su produktivni prinosi ostajali niski i neizvesni. Ova ekonomska ograničenja, u kombinaciji sa ograničenim transportom i trgovinom, učinila su ropstvo koherentnom institucijom za društva gde je sila bila glavno sredstvo za sticanje resursa. Druge opcije pominju faktore koji nisu specifično identifikovani u tekstu kao primarni razlozi za univerzalni razvoj ropstva u drevnim vremenima.
question: What two main factors made slavery universally develop in ancient societies according to the text?
answer: Production depended almost exclusively on physical force and economic yields remained low and uncertain
wrong_answers:
  - Religious beliefs required human sacrifice and cultural traditions promoted social hierarchies
  - Population growth exceeded available land and military conquest was the primary economic activity
  - Educational systems were undeveloped and communication technologies were completely absent
explanation: |
  The text clearly states that slavery developed universally in ancient societies because production depended almost exclusively on physical force (for hunting, fighting, conquests) and because productive yields remained low and uncertain. These economic constraints, combined with limited transport and commerce, made slavery a coherent institution for societies where force was the main means of acquiring resources. The other options mention factors not specifically identified in the text as primary reasons for slavery's universal development in ancient times.

question: Кои са двата основни фактора, довели до всеобщо развитие на робството в древните общества според текста?
answer: Производството зависеше почти изцяло от физическата сила, а икономическите резултати оставаха ниски и несигурни
wrong_answers:
  - Религиозните вярвания изискват човешки жертвоприношения, а културните традиции насърчават социалните йерархии
  - Нарастването на населението надхвърля наличната земя и военните завоевания са основната икономическа дейност
  - Образователните системи не бяха развити, а комуникационните технологии напълно липсваха
explanation: |
  В текста ясно се посочва, че робството се е развило повсеместно в древните общества, тъй като производството е зависело почти изцяло от физическата сила (за лов, борба, завоевания) и тъй като производствените добиви са останали ниски и несигурни. Тези икономически ограничения, съчетани с ограничените транспорт и търговия, превръщат робството в кохерентна институция за общества, в които силата е била основното средство за придобиване на ресурси. В другите варианти се споменават фактори, които не са изрично посочени в текста като основни причини за всеобщото развитие на робството в древността.
question: Jaké dva hlavní faktory podle textu způsobily, že se otroctví ve starověkých společnostech všeobecně rozvinulo?
answer: Výroba závisela téměř výhradně na fyzické síle a ekonomické výnosy zůstávaly nízké a nejisté
wrong_answers:
  - Náboženská víra vyžadovala lidské oběti a kulturní tradice podporovaly společenskou hierarchii
  - Růst populace převyšoval dostupnou půdu a hlavní ekonomickou aktivitou bylo vojenské dobývání
  - Vzdělávací systémy byly nerozvinuté a komunikační technologie zcela chyběly
explanation: |
  V textu se jasně uvádí, že otroctví se ve starověkých společnostech vyvinulo všeobecně, protože výroba závisela téměř výhradně na fyzické síle (při lovu, boji, dobývání) a protože produktivní výnosy zůstávaly nízké a nejisté. Tato ekonomická omezení v kombinaci s omezenou dopravou a obchodem učinila z otroctví koherentní instituci pro společnosti, kde byla síla hlavním prostředkem získávání zdrojů. Ostatní možnosti zmiňují faktory, které nejsou v textu výslovně uvedeny jako hlavní příčiny všeobecného rozvoje otroctví ve starověku.
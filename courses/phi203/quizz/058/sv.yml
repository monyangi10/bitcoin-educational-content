question: Vilka två huvudfaktorer gjorde att slaveri utvecklades universellt i antika samhällen enligt texten?
answer: Produktionen var nästan uteslutande beroende av fysisk styrka och den ekonomiska avkastningen förblev låg och osäker
wrong_answers:
  - Religiösa trosföreställningar krävde människooffer och kulturella traditioner främjade sociala hierarkier
  - Befolkningstillväxten översteg tillgänglig mark och militär erövring var den primära ekonomiska aktiviteten
  - Utbildningssystemen var outvecklade och kommunikationsteknik saknades helt
explanation: |
  I texten framgår det tydligt att slaveriet utvecklades universellt i forntida samhällen eftersom produktionen nästan uteslutande var beroende av fysiskt våld (för jakt, strid, erövringar) och eftersom produktionsavkastningen förblev låg och osäker. Dessa ekonomiska begränsningar, i kombination med begränsade transport- och handelsmöjligheter, gjorde slaveriet till en naturlig institution i samhällen där våld var det främsta sättet att skaffa sig resurser. De andra alternativen nämner faktorer som inte specifikt identifieras i texten som primära orsaker till slaveriets universella utveckling under antiken.
question: De acordo com o texto, que dois factores principais fizeram com que a escravatura se desenvolvesse universalmente nas sociedades antigas?
answer: A produção dependia quase exclusivamente da força física e os rendimentos económicos permaneciam baixos e incertos
wrong_answers:
  - As crenças religiosas exigiam sacrifícios humanos e as tradições culturais promoviam hierarquias sociais
  - O crescimento da população excedeu as terras disponíveis e a conquista militar foi a principal atividade económica
  - Os sistemas educativos não estavam desenvolvidos e as tecnologias de comunicação eram completamente inexistentes
explanation: |
  O texto afirma claramente que a escravatura se desenvolveu universalmente nas sociedades antigas, porque a produção dependia quase exclusivamente da força física (para a caça, a luta, as conquistas) e porque os rendimentos produtivos eram baixos e incertos. Estes condicionalismos económicos, associados a transportes e comércio limitados, tornaram a escravatura uma instituição coerente para as sociedades em que a força era o principal meio de aquisição de recursos. As outras opções mencionam factores não especificamente identificados no texto como razões principais para o desenvolvimento universal da escravatura na Antiguidade.
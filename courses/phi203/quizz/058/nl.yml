question: Welke twee belangrijke factoren zorgden ervoor dat slavernij zich volgens de tekst universeel ontwikkelde in samenlevingen in de oudheid?
answer: De productie was bijna uitsluitend afhankelijk van fysieke kracht en de economische opbrengsten bleven laag en onzeker
wrong_answers:
  - Religieuze overtuigingen vereisten mensenoffers en culturele tradities bevorderden sociale hiërarchieën
  - De bevolkingsgroei overtrof het beschikbare land en militaire verovering was de voornaamste economische activiteit
  - Onderwijssystemen waren onontwikkeld en communicatietechnologieën ontbraken volledig
explanation: |
  De tekst stelt duidelijk dat slavernij zich universeel ontwikkelde in oude samenlevingen omdat de productie bijna uitsluitend afhankelijk was van fysieke kracht (voor de jacht, gevechten, veroveringen) en omdat de productieve opbrengsten laag en onzeker bleven. Deze economische beperkingen, in combinatie met beperkt transport en handel, maakten slavernij tot een coherente instelling voor samenlevingen waar geweld het belangrijkste middel was om grondstoffen te verwerven. De andere opties noemen factoren die niet specifiek in de tekst worden genoemd als primaire redenen voor de universele ontwikkeling van slavernij in de oudheid.
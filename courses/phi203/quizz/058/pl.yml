question: Jakie dwa główne czynniki sprawiły, że niewolnictwo powszechnie rozwinęło się w starożytnych społeczeństwach?
answer: Produkcja zależała niemal wyłącznie od siły fizycznej, a zyski ekonomiczne pozostawały niskie i niepewne
wrong_answers:
  - Wierzenia religijne wymagały składania ofiar z ludzi, a tradycje kulturowe promowały hierarchie społeczne
  - Wzrost populacji przekroczył dostępną ziemię, a podbój wojskowy był główną działalnością gospodarczą
  - Systemy edukacyjne nie były rozwinięte, a technologie komunikacyjne były całkowicie nieobecne
explanation: |
  Tekst wyraźnie stwierdza, że niewolnictwo rozwinęło się powszechnie w starożytnych społeczeństwach, ponieważ produkcja zależała prawie wyłącznie od siły fizycznej (do polowania, walki, podbojów), a produktywne plony pozostawały niskie i niepewne. Te ograniczenia ekonomiczne, w połączeniu z ograniczonym transportem i handlem, sprawiły, że niewolnictwo stało się spójną instytucją dla społeczeństw, w których siła była głównym sposobem pozyskiwania zasobów. Pozostałe opcje wymieniają czynniki, które nie zostały wyraźnie wskazane w tekście jako główne przyczyny powszechnego rozwoju niewolnictwa w czasach starożytnych.
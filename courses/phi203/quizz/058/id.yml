question: Menurut teks, dua faktor utama apa yang membuat perbudakan berkembang secara universal di masyarakat kuno?
answer: Produksi hampir secara eksklusif bergantung pada kekuatan fisik dan hasil ekonomi tetap rendah dan tidak pasti
wrong_answers:
  - Kepercayaan agama mengharuskan pengorbanan manusia dan tradisi budaya mempromosikan hierarki sosial
  - Pertumbuhan penduduk melebihi lahan yang tersedia dan penaklukan militer adalah kegiatan ekonomi utama
  - Sistem pendidikan tidak berkembang dan teknologi komunikasi sama sekali tidak ada
explanation: |
  Teks tersebut dengan jelas menyatakan bahwa perbudakan berkembang secara universal di masyarakat kuno karena produksi bergantung hampir secara eksklusif pada kekuatan fisik (untuk berburu, berperang, menaklukkan) dan karena hasil produktif tetap rendah dan tidak pasti. Kendala ekonomi ini, dikombinasikan dengan transportasi dan perdagangan yang terbatas, membuat perbudakan menjadi lembaga yang koheren bagi masyarakat di mana kekerasan adalah cara utama untuk memperoleh sumber daya. Pilihan lain menyebutkan faktor-faktor yang tidak secara khusus diidentifikasi dalam teks sebagai alasan utama untuk perkembangan universal perbudakan di zaman kuno.
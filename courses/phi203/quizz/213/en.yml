question: According to Charles Comte's analysis of social stratification, what fundamental principle distinguished societies of freedom from societies of non-freedom throughout history?
answer: The ability of individuals to choose for themselves versus having choices imposed by others
wrong_answers:
  - The presence or absence of private property ownership among different social classes
  - The degree of economic inequality and wealth distribution within the population
  - The level of technological advancement and industrial development achieved by society
explanation: |
  Charles Comte's Traité de législation identifies the fundamental distinction between free and non-free societies as the capacity for individuals to choose for themselves versus having choices imposed by others — expressed most concretely in ownership of one's body, labour, and property. In unfree historical societies (Egypt, India, Greece, Rome, the Middle Ages), certain groups were deprived of the freedom to make choices about their own lives, with social reproduction keeping trades fixed from father to son. Modern society, characterised by individual autonomy and equality before the law, is defined by its break from this imposed stratification.

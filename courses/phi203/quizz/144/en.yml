question: What specific methodological criticism did Paul Leroy-Beaulieu level at communist doctrine in Le Collectivisme (1883)?
answer: Communist theorists spoke abundantly about ending capitalist exploitation and future abundance, but left the actual functioning of the system — its administration, factories, and distribution — very poorly explained
wrong_answers:
  - Communist theorists based their analysis on historical data that Leroy-Beaulieu showed was systematically falsified to support predetermined ideological conclusions
  - Communist theorists correctly identified the flaws of capitalism but proposed remedies borrowed from liberal economics without acknowledging the source
  - Communist theorists overestimated the role of violent revolution and underestimated the possibility of achieving their goals through democratic electoral politics
explanation: |
  Leroy-Beaulieu's critique of communist doctrine was precisely methodological: the theorists of communism, Karl Marx foremost among them, were remarkably sparing with concrete details about the society that was to replace capitalism. They spoke abundantly about ending capitalist exploitation and future abundance, but the actual functioning of the great administration that would own all land, all machines, and manage all factories was very poorly explained. This deliberate vagueness allowed Leroy-Beaulieu to fill in the blanks through logical analysis, leading him to predict with extraordinary accuracy the practical failures and tyrannies that communist experiments would later produce.

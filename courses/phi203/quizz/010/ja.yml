question: 自然法哲学によれば、人間の思考とその表現を根本的に不可侵なものにしているものは何か？
answer: 思考は個人の意志と自由な良心の直接的な延長であり、外部の権威によってコントロールされることのない個人の財産である。
wrong_answers:
  - 思想は、基本的人権を保障する民主的制度と憲法の枠組みによって守られている。
  - 市民と政府との間に相互尊重を確立する社会契約によって、思想は不可侵となる。
  - 思想は、人間の推論能力の神的起源を認める宗教的原則によって守られている。
explanation: |
  正解は、内容に示された自然法の基礎を反映している。人間の思考は、個人の意志と自由な良心から直接湧き出るものであり、外部のいかなる権威も真に支配することのできない個人の財産であるため、侵すことのできないものと考えられている。権威は思想の物理的な表現を抑圧することはできても、思考行為そのものを統制することはできない。間違った答えは、思想の保護は個人の意志の延長や個人の所有物としての本質的な性質からではなく、制度的、社会的、宗教的な源からもたらされるものだと誤って示唆している。
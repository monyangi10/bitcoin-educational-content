question: Что, согласно философии естественного права, делает человеческую мысль и ее выражение принципиально неприкосновенными?
answer: Мысль - это прямое продолжение индивидуальной воли и свободной совести, что делает ее личной собственностью, не поддающейся контролю со стороны внешних авторитетов
wrong_answers:
  - Мысль защищена демократическими институтами и конституционными рамками, гарантирующими основные права человека
  - Мысль становится неприкосновенной благодаря общественным договорам, устанавливающим взаимное уважение между гражданами и их правительствами
  - Мысль защищена религиозными принципами, признающими божественное происхождение способностей человека к рассуждению
explanation: |
  Правильный ответ отражает основы естественного права, представленные в содержании. Человеческая мысль считается неприкосновенной, поскольку она непосредственно вытекает из индивидуальной воли и свободной совести, что делает ее личной собственностью, которую не может контролировать никакая внешняя власть. Хотя власти могут подавлять физическое выражение идей, они не могут контролировать сам акт мышления. Неправильные ответы неверно предполагают, что защита мысли исходит из институциональных, социальных или религиозных источников, а не из ее неотъемлемой природы как продолжения индивидуальной воли и личной собственности.
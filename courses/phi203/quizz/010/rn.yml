question: Dukurikije filozofiya y’itegeko ry’ibidukikije, ni igiki gituma iciyumviro c’umuntu n’ukuntu kivyerekana bidashobora guhungabanywa mu vy’ukuri?
answer: Iciyumviro ni ukwagura ata guca ku ruhande kw’ubushake bw’umuntu ku giti ciwe n’ijwi ryo mu mutima ryiwe ryidegemvya, bikagihindura umutungo w’umuntu ku giti ciwe udashobora kugenzurwa n’ubukuru bwo hanze .
wrong_answers:
  - Iciyumviro kirindwa n'inzego za demokarasi be n'ingingo ngenderwako z'itegeko nshinga zitanga uburenganzira bwa muntu bw'ishimikiro .
  - Iciyumviro kiraba ikintu kidashobora guhungabanywa biciye mu masezerano y'imibano ashiraho icubahiro hagati y'abanyagihugu n'intwaro zabo .
  - Iciyumviro kirindwa n’ingingo ngenderwako z’idini zemera inkomoko y’Imana y’ubushobozi bwo gutekereza ku bantu .
explanation: |
  Inyishu ibereye yerekana umushinge w’itegeko kamere yerekanwa mu birimwo. Iciyumviro c’umuntu kibonwa ko kidashobora guhungabanywa kubera ko kiva ata guca ku ruhande ku bushake bw’umuntu ku giti ciwe no ku mutimanama wiwe widegemvya, kigatuma kiba umutungo w’umuntu ku giti ciwe ata butegetsi bwo hanze bushobora kugenzura vy’ukuri. Naho abategetsi boshobora guhagarika ukuntu ivyiyumviro bigaragara mu buryo bw’umubiri, ntibashobora kugenzura igikorwa co kwiyumvira ubwaco. Inyishu zitari zo zivuga mu buryo butari bwo yuko uburinzi bw’ivyiyumviro buva ku nzego, ku mibano canke ku madini aho kuva ku kamere kavyo k’akameremere nk’ukwaguka kw’ubushake bw’umuntu ku giti ciwe n’itunga ryiwe bwite.
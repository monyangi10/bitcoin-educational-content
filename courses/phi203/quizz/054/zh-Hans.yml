question: 我们今天所理解的私人生活领域在史前社会并不存在，其主要原因是什么？
answer: 个人完全受制于部落规则，这些规则约束着他们的一切行为，包括最私人的行为
wrong_answers:
  - 人们选择集体生活，因为他们相信集体决策在道德上是优越的
  - 由于缺乏书面语言和正规教育，隐私的概念尚未被发明出来
  - 宗教信仰要求将生活的方方面面与社区公开分享，以达到精神上的目的
explanation: |
  根据文中所述，史前的个人完全受制于部落，他们的所有行为，包括最私人的行为，都受到一整套规则的约束。我们今天定义为自由空间的私人领域根本不存在。这不是选择、宗教信仰或缺乏概念发展的问题，而是部落控制延伸到个人行为方方面面的结构性现实，使得个人自主成为不可能。
question: What was the main reason why the sphere of private life, as we understand it today, did not exist in prehistoric societies?
answer: Individuals were completely subject to tribal rules that governed all their actions, including the most personal ones
wrong_answers:
  - People chose to live communally because they believed collective decision-making was morally superior
  - The concept of privacy had not yet been invented due to lack of written language and formal education
  - Religious beliefs required all aspects of life to be shared openly with the community for spiritual purposes
explanation: |
  According to the text, prehistoric individuals were entirely subjected to the tribe through a comprehensive set of rules that regulated all their actions, including the most personal ones. The private sphere that we define today as a space of freedom simply did not exist. This was not a matter of choice, religious belief, or lack of conceptual development, but rather a structural reality where tribal control extended to every aspect of individual behavior, making personal autonomy impossible.
question: 오늘날 우리가 이해하는 사생활의 영역이 선사시대 사회에는 존재하지 않았던 주된 이유는 무엇이었을까요?
answer: 개인은 가장 개인적인 행동을 포함하여 모든 행동을 지배하는 부족의 규칙에 전적으로 복종해야 했습니다
wrong_answers:
  - 사람들은 집단적 의사 결정이 도덕적으로 우월하다고 믿었기 때문에 공동체 생활을 선택했습니다
  - 서면 언어와 공식적인 교육이 부족하여 프라이버시 개념은 아직 발명되지 않았습니다
  - 종교적 신념은 영적인 목적을 위해 삶의 모든 측면을 커뮤니티와 공개적으로 공유할 것을 요구했습니다
explanation: |
  본문에 따르면 선사 시대 개인은 가장 개인적인 행동을 포함하여 모든 행동을 규제하는 포괄적인 규칙을 통해 부족에 전적으로 복종했습니다. 오늘날 우리가 자유의 공간으로 정의하는 사적 영역은 존재하지 않았습니다. 이는 선택의 문제, 종교적 신념, 개념 발달의 부족이 아니라 부족의 통제가 개인 행동의 모든 측면으로 확대되어 개인의 자율성이 불가능했던 구조적 현실이었습니다.
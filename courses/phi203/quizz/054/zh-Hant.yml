question: 我們今天所理解的私人生活領域在史前社會並不存在的主要原因是什麼？
answer: 個人完全受部落規則的約束，這些規則規範他們所有的行為，包括最個人的行為。
wrong_answers:
  - 人們選擇共同生活，因為他們相信集體決策在道德上是優越的
  - 由於缺乏書面語言和正規教育，隱私權的概念尚未發明
  - 宗教信仰要求與社區公開分享生活的各個層面，以達到精神上的目的
explanation: |
  根據文中所述，史前的個人完全受制於部落，部落有一套完整的規則來規範他們所有的行為，包括最個人的行為。我們今天定義為自由空間的私人領域根本不存在。這不是選擇、宗教信仰或缺乏概念發展的問題，而是部落控制延伸到個人行為的每個層面，使得個人自主成為不可能的結構性現實。
question: Koji je bio glavni razlog zašto sfera privatnog života, kako je danas razumemo, nije postojala u praistorijskim društvima?
answer: Pojedinci su bili potpuno podložni plemenskim pravilima koja su upravljala svim njihovim postupcima, uključujući i one najličnije.
wrong_answers:
  - Ljudi su odlučili da žive zajednički jer su verovali da je kolektivno donošenje odluka moralno superiornije.
  - Koncept privatnosti još nije bio izmišljen zbog nedostatka pisanog jezika i formalnog obrazovanja.
  - Verska uverenja su zahtevala da svi aspekti života budu otvoreno deljeni sa zajednicom u duhovne svrhe.
explanation: |
  Prema tekstu, praistorijski pojedinci su bili potpuno podređeni plemenu kroz sveobuhvatan skup pravila koja su regulisala sve njihove postupke, uključujući i one najličnije. Privatna sfera koju danas definišemo kao prostor slobode jednostavno nije postojala. Ovo nije bilo pitanje izbora, verskog uverenja ili nedostatka konceptualnog razvoja, već strukturna stvarnost gde se plemenska kontrola protezala na svaki aspekt ponašanja pojedinca, čineći ličnu autonomiju nemogućom.
question: Lý do chính khiến phạm vi đời sống riêng tư, như chúng ta hiểu ngày nay, không tồn tại trong các xã hội tiền sử là gì?
answer: Mọi cá nhân đều hoàn toàn tuân theo các quy tắc của bộ lạc, chi phối mọi hành động của họ, kể cả những hành vi riêng tư nhất.
wrong_answers:
  - Con người chọn sống cộng đồng vì họ tin rằng việc đưa ra quyết định tập thể là ưu việt hơn về mặt đạo đức.
  - Khái niệm về quyền riêng tư chưa được hình thành do thiếu chữ viết và giáo dục chính quy.
  - Các tín ngưỡng tôn giáo yêu cầu mọi khía cạnh của cuộc sống phải được chia sẻ cởi mở với cộng đồng vì mục đích tâm linh.
explanation: |
  Theo văn bản này, các cá nhân thời tiền sử hoàn toàn phải tuân phục bộ lạc thông qua một hệ thống quy tắc toàn diện điều chỉnh mọi hành động của họ, kể cả những hành vi cá nhân nhất. Không gian riêng tư mà chúng ta định nghĩa ngày nay là không gian tự do đơn giản là không tồn tại. Đây không phải là vấn đề lựa chọn, tín ngưỡng tôn giáo hay thiếu phát triển nhận thức, mà là một thực tế cấu trúc nơi sự kiểm soát của bộ lạc mở rộng đến mọi khía cạnh hành vi cá nhân, khiến quyền tự chủ cá nhân trở nên bất khả thi.
question: 先史時代の社会に、今日の私たちが理解するような私生活の領域が存在しなかった主な理由は何だったのだろうか？
answer: 個人は、最も個人的な行動も含め、すべての行動を支配する部族のルールに完全に従った
wrong_answers:
  - 人々が共同生活を選んだのは、集団的な意思決定が道徳的に優れていると考えたからだ
  - 文字や正式な教育がなかったため、プライバシーという概念はまだ生まれていなかった
  - 宗教的信念は、精神的な目的のために、生活のあらゆる面を地域社会とオープンに共有することを求めていた。
explanation: |
  この文章によれば、先史時代の個人は、最も個人的な行動も含め、すべての行動を規制する包括的なルールを通して、完全に部族に服従していた。今日、私たちが自由の空間として定義している私的領域は、単に存在しなかったのである。これは選択の問題でも、宗教的信念の問題でも、概念の発達の欠如の問題でもなく、むしろ部族の支配が個人の行動のあらゆる側面に及んでいた構造的な現実であり、個人の自律を不可能にしていたのである。
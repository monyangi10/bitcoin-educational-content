question: Hva var hovedgrunnen til at privatlivet, slik vi forstår det i dag, ikke eksisterte i forhistoriske samfunn?
answer: Enkeltpersoner var fullstendig underlagt stammens regler som styrte alle deres handlinger, også de mest personlige
wrong_answers:
  - Folk valgte å leve i fellesskap fordi de mente at kollektiv beslutningstaking var moralsk overlegen
  - Begrepet privatliv var ennå ikke oppfunnet på grunn av mangel på skriftspråk og formell utdanning
  - Religiøs tro krevde at alle aspekter av livet skulle deles åpent med samfunnet for åndelige formål
explanation: |
  Ifølge teksten var de forhistoriske individene helt og holdent underlagt stammen gjennom et omfattende sett med regler som regulerte alle handlinger, også de mest personlige. Den private sfæren som vi i dag definerer som et frihetsrom, eksisterte rett og slett ikke. Dette var ikke et spørsmål om valg, religiøs tro eller manglende begrepsutvikling, men snarere en strukturell realitet der stammekontrollen strakte seg til alle aspekter av den enkeltes atferd og umuliggjorde personlig autonomi.
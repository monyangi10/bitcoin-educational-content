question: دلیل اصلی اینکه حوزه زندگی خصوصی، همانطور که امروز آن را درک می‌کنیم، در جوامع پیشاتاریخی وجود نداشت، چه بود؟
answer: افراد کاملاً تابع قوانین قبیله‌ای بودند که تمام اعمال آن‌ها، از جمله شخصی‌ترین آن‌ها را تحت کنترل داشت.
wrong_answers:
  - مردم زندگی اشتراکی را انتخاب کردند زیرا معتقد بودند تصمیم‌گیری جمعی از نظر اخلاقی برتر است.
  - مفهوم حریم خصوصی هنوز به دلیل نبود زبان نوشتاری و آموزش رسمی اختراع نشده بود.
  - اعتقادات مذهبی ایجاب می‌کرد که تمام جنبه‌های زندگی به‌طور آشکار با جامعه برای اهداف معنوی به اشتراک گذاشته شود.
explanation: |
  بر اساس متن، افراد ماقبل تاریخ به طور کامل تحت سلطه قبیله بودند از طریق مجموعه‌ای جامع از قوانین که تمام اعمال آن‌ها، از جمله شخصی‌ترین آن‌ها را تنظیم می‌کرد. حوزه خصوصی که ما امروز به عنوان فضایی از آزادی تعریف می‌کنیم، به سادگی وجود نداشت. این مسئله انتخاب، باور دینی یا فقدان توسعه مفهومی نبود، بلکه یک واقعیت ساختاری بود که در آن کنترل قبیله‌ای به هر جنبه‌ای از رفتار فردی گسترش می‌یافت و خودمختاری شخصی را غیرممکن می‌کرد.
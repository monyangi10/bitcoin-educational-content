question: Ni igiki nyamukuru catumye urugero rw’ubuzima bwite, nk’uko tubitahura muri iki gihe, rutabaho mu mibano y’imbere y’amateka?
answer: Abantu ku giti cabo bari bayobowe bimwe bishitse n’amategeko y’imiryango yagenga ibikorwa vyabo vyose, harimwo n’ivyo bakora cane .
wrong_answers:
  - Abantu bahisemwo kubaho hamwe kubera ko bemera ko gufata ingingo hamwe ari vyo vyiza kuruta ibindi vyose mu vy'inyifato runtu .
  - Iciyumviro c’ubuzima bwite cari kitaravumburwa kubera ukubura ururimi rwanditswe n’inyigisho zisanzwe .
  - Ivyizerwa vy’idini vyasaba ko imice yose y’ubuzima isangirwa n’abantu ku mugaragaro ku bw’intumbero z’impwemu .
explanation: |
  Dukurikije ico canditswe, abantu bo mu gihe c’imbere y’amateka bari bayobowe n’uwo muryango wose biciye ku mategeko menshi yatunganya ibikorwa vyabo vyose, harimwo n’ivyo bakora cane. Ico kibanza c’ibanga dusobanura uno musi nk’ikibanza c’umwidegemvyo ntaco cariho gusa. Ivyo ntivyari ikibazo c’uguhitamwo, ukwizera kw’idini canke ukubura iterambere ry’ivyiyumviro, ahubwo vyari ukuri kw’imiterere aho ubugenzuzi bw’imiryango bwashika no ku mice yose y’inyifato y’umuntu ku giti ciwe, bigatuma ubwigenge bw’umuntu budashoboka.
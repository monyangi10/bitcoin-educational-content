question: Wat was de belangrijkste reden dat de privésfeer, zoals wij die nu kennen, niet bestond in prehistorische samenlevingen?
answer: Individuen waren volledig onderworpen aan stamregels die al hun handelingen beheersten, inclusief de meest persoonlijke
wrong_answers:
  - Mensen kozen voor een gemeenschappelijk leven omdat ze geloofden dat collectieve besluitvorming moreel superieur was
  - Het concept van privacy was nog niet uitgevonden door gebrek aan geschreven taal en formeel onderwijs
  - Religieuze overtuigingen vereisten dat alle aspecten van het leven openlijk werden gedeeld met de gemeenschap voor spirituele doeleinden
explanation: |
  Volgens de tekst waren prehistorische individuen volledig onderworpen aan de stam door middel van een uitgebreide reeks regels die al hun handelingen regelden, inclusief de meest persoonlijke. De privésfeer die we tegenwoordig definiëren als een ruimte van vrijheid bestond gewoon niet. Dit was geen kwestie van keuze, religieus geloof of gebrek aan conceptuele ontwikkeling, maar eerder een structurele realiteit waarin de controle van de stam zich uitstrekte over elk aspect van het individuele gedrag, waardoor persoonlijke autonomie onmogelijk werd.
question: Hvilken grunnleggende feil gjør proteksjonister, ifølge Bastiats analyse av økonomiske sofismer, når det gjelder arbeidets natur og formål?
answer: De ser på arbeidet som et mål i seg selv, og ikke som et middel til å oppnå maksimal tilfredshet for arbeidstakerne
wrong_answers:
  - De fokuserer for mye på resultatene av arbeidet i stedet for på innsatsen og energien som arbeidstakerne legger ned
  - De prioriterer individuell medarbeidertilfredshet fremfor det kollektive behovet for å maksimere det totale sysselsettingsnivået
  - De anerkjenner ikke at arbeidet bør fordeles likt mellom alle medlemmer av samfunnet
explanation: |
  Bastiat identifiserte en avgjørende sofisme der proteksjonister snur om på forholdet mellom mål og midler. De hyller arbeidet som et mål i seg selv, og verdsetter bruken av kraft og energi uten å ta hensyn til hva denne aktiviteten faktisk fører til. Liberale som Bastiat hevder at arbeid bare er et middel - det egentlige målet er å maksimere arbeidernes tilfredshet med den samme mengden arbeid. Denne inversjonen kommer også til syne på andre områder, for eksempel ved at politisk frihet behandles som et endelig mål snarere enn som et middel til å oppnå borgerlige og økonomiske friheter.
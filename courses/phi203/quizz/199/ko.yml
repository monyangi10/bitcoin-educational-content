question: 경제적 궤변에 대한 바스티아의 분석에 따르면, 보호주의자들은 일의 본질과 목적에 대해 어떤 근본적인 오류를 범하고 있을까요?
answer: 근로자의 만족도를 극대화하기 위한 수단이 아니라 일을 그 자체로 목적으로 취급합니다
wrong_answers:
  - 근로자의 노력과 에너지 소비보다는 업무의 결과에 지나치게 집중합니다
  - 총 고용 수준을 극대화하려는 집단적 욕구보다 개별 근로자의 만족도를 우선시합니다
  - 그들은 일이 모든 사회 구성원에게 공평하게 분배되어야 한다는 사실을 인식하지 못합니다
explanation: |
  바스티아트는 보호주의자들이 수단과 목적의 관계를 뒤바꾸는 중요한 궤변을 발견했습니다. 그들은 일을 목표 그 자체로 찬양하며, 이 활동이 실제로 무엇을 성취하는지 고려하지 않고 힘과 에너지의 소비를 중요하게 여깁니다. 바스티아트와 같은 자유주의자들은 노동은 수단에 불과하며, 진정한 목적은 같은 양의 노동에 대해 근로자의 만족도를 극대화하는 것이라고 주장합니다. 이러한 역설은 정치적 자유를 시민적, 경제적 자유를 달성하기 위한 수단이 아닌 궁극적인 목표로 취급하는 등 다른 영역에서도 나타납니다.
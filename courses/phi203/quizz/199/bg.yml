question: Според анализа на икономическите софизми на Бастиа каква основна грешка допускат протекционистите по отношение на естеството на труда и неговата цел?
answer: Те разглеждат работата като самоцел, а не като средство за постигане на максимална удовлетвореност на работниците
wrong_answers:
  - Те се фокусират твърде много върху резултатите от работата, а не върху усилията и енергията, изразходвани от работниците
  - Те дават приоритет на индивидуалното удовлетворение на работниците пред колективната нужда от максимизиране на общите нива на заетост
  - Те не признават, че работата трябва да се разпределя равномерно между всички членове на обществото
explanation: |
  Бастиа идентифицира един важен софизъм, при който протекционистите обръщат връзката между средствата и целите. Те възхваляват работата като самоцел, оценявайки изразходването на сила и енергия, без да се съобразяват с това какво всъщност се постига с тази дейност. Либерали като Бастиа твърдят, че трудът е само средство - истинската цел е да се постигне максимално удовлетворение на работника при същото количество труд. Тази инверсия се проявява и в други области, като например разглеждането на политическата свобода като крайна цел, а не като средство за постигане на граждански и икономически свободи.
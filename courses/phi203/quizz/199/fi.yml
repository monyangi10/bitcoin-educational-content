question: Minkä perustavanlaatuisen virheen protektionistit tekevät Bastiat'n taloudellisen sofismin analyysin mukaan työn luonteesta ja sen tarkoituksesta?
answer: Niissä työtä pidetään pikemminkin päämääränä sinänsä kuin keinona, jonka avulla työntekijät saavat mahdollisimman suuren tyydytyksen
wrong_answers:
  - Niissä keskitytään liikaa työn tuloksiin eikä niinkään työntekijöiden ponnisteluihin ja energiaan
  - Ne asettavat yksilöllisen työntekijätyytyväisyyden etusijalle kollektiivisen kokonaistyöllisyyden maksimointitarpeen edelle
  - Ne eivät tunnusta, että työ pitäisi jakaa tasaisesti kaikkien yhteiskunnan jäsenten kesken
explanation: |
  Bastiat tunnisti ratkaisevan sofismin, jossa protektionistit kääntävät keinojen ja päämäärien välisen suhteen. He juhlivat työtä päämääränä itsessään ja arvostavat voiman ja energian käyttöä ottamatta huomioon sitä, mitä tällä toiminnalla todellisuudessa saavutetaan. Bastiatin kaltaiset liberaalit väittävät, että työ on vain keino - todellinen tavoite on maksimoida työntekijän tyytyväisyys samalla työmäärällä. Tämä käänteinen lähestymistapa näkyy myös muilla aloilla, kuten esimerkiksi poliittisen vapauden pitämisessä perimmäisenä päämääränä sen sijaan, että sitä pidettäisiin keinona saavuttaa kansalais- ja taloudelliset vapaudet.
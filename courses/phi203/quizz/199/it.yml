question: Secondo l'analisi di Bastiat dei sofismi economici, quale errore fondamentale commettono i protezionisti riguardo alla natura del lavoro e al suo scopo?
answer: Trattano il lavoro come un fine in sé piuttosto che come un mezzo per ottenere la massima soddisfazione dei lavoratori
wrong_answers:
  - Si concentrano troppo sui risultati del lavoro piuttosto che sullo sforzo e l'energia spesi dai lavoratori
  - Danno priorità alla soddisfazione dei singoli lavoratori rispetto alla necessità collettiva di massimizzare i livelli di occupazione totale
  - Non riconoscono che il lavoro dovrebbe essere distribuito equamente tra tutti i membri della società
explanation: |
  Bastiat ha individuato un sofisma cruciale in cui i protezionisti invertono il rapporto tra mezzi e fini. Celebrano il lavoro come un fine in sé, valorizzando il dispendio di forza ed energia senza considerare ciò che questa attività effettivamente raggiunge. I liberali come Bastiat sostengono che il lavoro è solo un mezzo: il vero obiettivo è massimizzare la soddisfazione del lavoratore a parità di lavoro. Questa inversione appare anche in altri ambiti, come ad esempio il trattamento della libertà politica come obiettivo finale piuttosto che come mezzo per raggiungere le libertà civili ed economiche.
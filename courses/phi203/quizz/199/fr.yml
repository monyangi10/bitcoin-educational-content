question: Selon l'analyse des sophismes économiques de Bastiat, quelle erreur fondamentale les protectionnistes commettent-ils sur la nature et la finalité du travail ?
answer: Ils considèrent le travail comme une fin en soi plutôt que comme un moyen d'obtenir une satisfaction maximale pour les travailleurs
wrong_answers:
  - Ils se concentrent trop sur les résultats du travail plutôt que sur les efforts et l'énergie déployés par les travailleurs
  - Ils privilégient la satisfaction individuelle des travailleurs par rapport à la nécessité collective de maximiser les niveaux d'emploi totaux
  - Ils ne reconnaissent pas que le travail devrait être réparti équitablement entre tous les membres de la société
explanation: |
  Bastiat a identifié un sophisme crucial dans lequel les protectionnistes inversent la relation entre les moyens et les fins. Ils célèbrent le travail comme un but en soi, valorisant la dépense de force et d'énergie sans tenir compte de ce que cette activité permet réellement d'atteindre. Les libéraux comme Bastiat affirment que le travail n'est qu'un moyen - le véritable objectif est de maximiser la satisfaction du travailleur pour la même quantité de travail. Cette inversion apparaît également dans d'autres domaines, comme le fait de considérer la liberté politique comme un but ultime plutôt que comme un moyen d'atteindre les libertés civiles et économiques.
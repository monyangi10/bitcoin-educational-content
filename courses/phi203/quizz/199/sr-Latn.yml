question: Prema Bastiatovoj analizi ekonomskih sofizama, koju osnovnu grešku prave protekcionisti u vezi sa prirodom rada i njegovom svrhom?
answer: Oni tretiraju rad kao cilj sam po sebi, a ne kao sredstvo za postizanje maksimalnog zadovoljstva za radnike.
wrong_answers:
  - Previše se fokusiraju na rezultate rada, a ne na trud i energiju koju radnici ulažu.
  - Oni daju prioritet zadovoljstvu pojedinačnih radnika nad kolektivnom potrebom za maksimizacijom ukupnih nivoa zaposlenosti.
  - Ne prepoznaju da bi rad trebalo ravnomerno raspodeliti među svim članovima društva.
explanation: |
  Bastiat je identifikovao ključni sofizam gde protekcionisti obrću odnos između sredstava i ciljeva. Oni slave rad kao cilj sam po sebi, veličajući trošenje sile i energije bez razmatranja šta ta aktivnost zapravo postiže. Liberali poput Bastijata tvrde da je rad samo sredstvo - pravi cilj je maksimizacija zadovoljstva radnika za isti iznos rada. Ovo obrtanje se pojavljuje i u drugim oblastima, kao što je tretiranje političke slobode kao krajnjeg cilja umesto kao sredstva za postizanje građanskih i ekonomskih sloboda.
question: Согласно анализу экономических софизмов Бастиана, какую фундаментальную ошибку допускают протекционисты в отношении природы труда и его цели?
answer: Они относятся к работе как к самоцели, а не как к средству достижения максимального удовлетворения работников
wrong_answers:
  - Они слишком много внимания уделяют результатам труда, а не усилиям и энергии, затрачиваемым работниками
  - Они ставят во главу угла удовлетворение индивидуальных потребностей работников, а не коллективную потребность в максимизации общего уровня занятости
  - Они не признают, что труд должен быть распределен поровну между всеми членами общества
explanation: |
  Бастиат выявил важнейший софизм, в котором протекционисты инвертируют отношения между средствами и целями. Они превозносят труд как самоцель, высоко оценивая затраты сил и энергии, не задумываясь о том, чего на самом деле достигает эта деятельность. Либералы, такие как Бастиат, утверждают, что труд - это всего лишь средство, а истинная цель - максимальное удовлетворение работника при том же количестве труда. Эта инверсия проявляется и в других областях, например, в отношении к политической свободе как к конечной цели, а не как к средству достижения гражданских и экономических свобод.
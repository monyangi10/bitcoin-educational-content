question: 根據 Bastiat 對經濟詭辯的分析，保護主義者對於工作的本質及其目的犯了什麼基本錯誤？
answer: 他們把工作本身視為目的，而不是讓工人獲得最大滿足感的手段
wrong_answers:
  - 他們過度專注於工作的結果，而不是工人所付出的努力和精力。
  - 他們將個別員工的滿意度放在首位，而非將總就業人數最大化的集體需求。
  - 他們沒有認識到工作應該平均分配給社會上的所有成員
explanation: |
  Bastiat 指出了一個關鍵的詭辯，保護主義者顛倒了手段與目的之間的關係。他們把工作當作目標本身來讚頌，只重視勞力和精力的消耗，而不考慮這種活動實際上達到了什麼目的。自由主義者如 Bastiat 則認為，工作只是一種手段，真正的目標是在付出相同勞動量的情況下，最大化工人的滿足感。這種顛倒也出現在其他領域，例如將政治自由視為終極目標，而非達成公民與經濟自由的手段。
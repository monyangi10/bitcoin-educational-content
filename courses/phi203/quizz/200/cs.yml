question: Jaká základní logická chyba je v Bastiatově kritice ekonomických sofismů základem protekcionistického argumentu, že by se Francie měla vyhnout obohacování Anglie prostřednictvím obchodu?
answer: Falešný předpoklad, že ekonomické zájmy jsou v dobrovolných směnách spíše antagonistické než harmonické
wrong_answers:
  - Nesprávné přesvědčení, že Francie nemá dostatek přírodních zdrojů, aby mohla konkurovat Anglii
  - "Mylná představa, že průmyslová kapacita Anglie jí dává nespravedlivou technologickou výhodu."
  - Mylný předpoklad, že obchodní deficity automaticky vedou k poklesu národního hospodářství
explanation: |
  Bastiat zjistil, že protekcionisté nesprávně nahlížejí na ekonomické vztahy archaickou optikou protichůdných zájmů, podobně jako starověké kmeny bojující o loviště. Ve skutečnosti je dobrovolná výměna výhodná pro obě strany - když zákazníci a dodavatelé volně obchodují, obě strany získávají hodnotu. Protekcionistický strach z "obohacování nepřátel" prostřednictvím obchodu odráží zásadní nepochopení toho, jak fungují tržní vztahy, kde je pro skutečné ekonomické interakce charakteristický vzájemný prospěch, a nikoli konkurence s nulovým součtem.
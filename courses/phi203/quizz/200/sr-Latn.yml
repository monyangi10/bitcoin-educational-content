question: U Bastiatovoj kritici ekonomskih sofizama, osnovna logička greška koja leži u osnovi protekcionističkog argumenta da Francuska treba da izbegava obogaćivanje Engleske kroz trgovinu je zabluda da je trgovina igra nulte sume. Protekcionisti veruju da ako jedna zemlja profitira, druga mora izgubiti, dok Bastiat tvrdi da trgovina zapravo donosi obostranu korist, jer omogućava zemljama da se specijalizuju i razmenjuju dobra koja proizvode efikasnije.
answer: Lažna pretpostavka da su ekonomski interesi antagonistički, a ne harmonični u dobrovoljnim razmenama
wrong_answers:
  - Netačno verovanje da Francuska nema dovoljno prirodnih resursa da se takmiči sa Engleskom
  - "Pogrešna ideja da industrijski kapacitet Engleske daje nepravednu tehnološku prednost"
  - Pogrešna pretpostavka da trgovinski deficiti automatski vode ka nacionalnom ekonomskom padu
explanation: |
  Bastiat je identifikovao da protekcionisti pogrešno posmatraju ekonomske odnose kroz arhaičnu prizmu sukobljenih interesa, slično drevnim plemenima koja se bore oko lovišta. U stvarnosti, dobrovoljne razmene donose korist obe strane - kada kupci i dobavljači slobodno trguju, obe strane dobijaju vrednost. Protekcionistički strah od 'obogaćivanja neprijatelja' kroz trgovinu odražava fundamentalno nerazumevanje načina na koji tržišni odnosi funkcionišu, gde uzajamna korist, a ne takmičenje sa nultim zbirom, karakteriše istinske ekonomske interakcije.
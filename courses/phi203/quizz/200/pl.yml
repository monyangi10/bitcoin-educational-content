question: W krytyce sofizmatów ekonomicznych Bastiata, jaki fundamentalny błąd logiczny leży u podstaw protekcjonistycznego argumentu, że Francja powinna unikać wzbogacania Anglii poprzez handel?
answer: Fałszywe założenie, że interesy gospodarcze są raczej antagonistyczne niż harmonijne w dobrowolnych wymianach
wrong_answers:
  - Błędne przekonanie, że Francja nie posiada wystarczających zasobów naturalnych, by konkurować z Anglią
  - "Błędne przekonanie, że potencjał przemysłowy Anglii daje jej nieuczciwą przewagę technologiczną"
  - Błędne założenie, że deficyty handlowe automatycznie prowadzą do upadku gospodarczego kraju
explanation: |
  Bastiat stwierdził, że protekcjoniści błędnie postrzegają relacje gospodarcze przez archaiczny pryzmat sprzecznych interesów, podobnie jak starożytne plemiona walczące o tereny łowieckie. W rzeczywistości dobrowolna wymiana przynosi korzyści obu stronom - gdy klienci i dostawcy swobodnie handlują, obaj zyskują na wartości. Protekcjonistyczny strach przed "wzbogacaniem wrogów" poprzez handel odzwierciedla fundamentalne niezrozumienie tego, jak działają relacje rynkowe, w których wzajemne korzyści, a nie konkurencja o sumie zerowej, charakteryzują prawdziwe interakcje gospodarcze.
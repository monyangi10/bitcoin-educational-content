question: 在 Bastiat 對經濟詭辯的批判中，保護主義者認為法國應避免透過貿易使英國致富的論點是基於什麼基本邏輯錯誤？
answer: 在自願交換中，經濟利益是對立而非和諧的錯誤假設
wrong_answers:
  - 錯誤地認為法國缺乏足夠的天然資源與英國競爭
  - 「錯誤地認為英國的工業能力使其擁有不公平的技術優勢」
  - 貿易赤字會自動導致國家經濟衰退的錯誤假設
explanation: |
  Bastiat 指出，保護主義者錯誤地從利益衝突的古老角度來看待經濟關係，就像古代部落為了狩獵場而爭鬥一樣。在現實中，自願的交流對雙方都有利 - 當顧客和供應商自由交易時，雙方都能獲得價值。保護主義者害怕透過貿易「致富敵人」，這反映出他們對市場關係運作方式的根本誤解，真正的經濟互動是互惠互利，而非零和競爭。
question: Quais foram os dois efeitos nocivos que os pensadores liberais franceses identificaram no sistema de escravatura moderna da América dos séculos XVIII e XIX?
answer: A degradação intelectual dos escravos e a corrupção moral dos proprietários de escravos
wrong_answers:
  - A ineficácia económica das plantações e o declínio do comércio internacional
  - Os conflitos religiosos entre comunidades e a desagregação das estruturas familiares
  - A estagnação tecnológica da sociedade e o enfraquecimento das defesas militares
explanation: |
  Pensadores liberais franceses como Gustave de Beaumont identificaram dois efeitos perversos específicos da escravatura moderna. Em primeiro lugar, os próprios escravos eram intelectualmente degradados porque o sistema os impedia de utilizar as suas capacidades mentais, privando-os de oportunidades de desenvolvimento pessoal. Em segundo lugar, os proprietários de escravos sofriam de corrupção moral, uma vez que desenvolviam atitudes negativas em relação ao trabalho e confiavam exclusivamente na força, criando mentalidades anti-liberais incompatíveis com os princípios de igualdade que deveriam reger as sociedades modernas.
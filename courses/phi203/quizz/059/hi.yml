question: What were the two harmful effects that French liberal thinkers identified in the modern slavery system of 18th-19th century America?
answer: The intellectual degradation of slaves and the moral corruption of slave owners
wrong_answers:
  - The economic inefficiency of plantations and the decline of international trade
  - The religious conflicts between communities and the breakdown of family structures
  - The technological stagnation of society and the weakening of military defenses
explanation: |
  French liberal thinkers like Gustave de Beaumont identified two specific perverse effects of modern slavery. First, slaves themselves were intellectually degraded because the system prevented them from using their mental capacities, depriving them of personal development opportunities. Second, slave owners experienced moral corruption as they developed negative attitudes toward work and relied solely on force, creating anti-liberal mindsets incompatible with equality principles that should govern modern societies.
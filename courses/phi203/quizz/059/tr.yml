question: Fransız liberal düşünürlerin 18.-19. yüzyıl Amerika'sındaki modern kölelik sisteminde tespit ettikleri iki zararlı etki neydi?
answer: Kölelerin entelektüel çöküşü ve köle sahiplerinin ahlaki yozlaşması
wrong_answers:
  - Plantasyonların ekonomik verimsizliği ve uluslararası ticaretin azalması
  - Topluluklar arasındaki dini çatışmalar ve aile yapılarının bozulması
  - Toplumun teknolojik durgunluğu ve askeri savunmanın zayıflaması
explanation: |
  Gustave de Beaumont gibi Fransız liberal düşünürler modern köleliğin iki spesifik sapkın etkisini tespit etmiştir. Birincisi, sistem kölelerin zihinsel kapasitelerini kullanmalarını engellediği ve onları kişisel gelişim fırsatlarından mahrum bıraktığı için kölelerin kendileri entelektüel olarak aşağılanmıştır. İkincisi, köle sahipleri çalışmaya karşı olumsuz tutumlar geliştirdikleri ve yalnızca güce dayandıkları için ahlaki yozlaşma yaşadılar ve modern toplumları yönetmesi gereken eşitlik ilkeleriyle bağdaşmayan anti-liberal zihniyetler yarattılar.
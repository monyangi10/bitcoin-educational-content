question: Wat waren de twee schadelijke effecten die Franse liberale denkers identificeerden in het moderne slavernijsysteem van het 18e-19e eeuwse Amerika?
answer: De intellectuele degradatie van slaven en de morele corruptie van slaveneigenaren
wrong_answers:
  - De economische inefficiëntie van plantages en de achteruitgang van de internationale handel
  - De religieuze conflicten tussen gemeenschappen en de afbraak van familiestructuren
  - De technologische stagnatie van de samenleving en de verzwakking van de militaire verdediging
explanation: |
  Franse liberale denkers als Gustave de Beaumont identificeerden twee specifieke perverse effecten van de moderne slavernij. Ten eerste werden de slaven zelf intellectueel gedegradeerd omdat het systeem hen verhinderde hun mentale capaciteiten te gebruiken, waardoor ze verstoken bleven van mogelijkheden voor persoonlijke ontwikkeling. Ten tweede ervoeren slaveneigenaren morele corruptie omdat ze een negatieve houding ontwikkelden ten opzichte van werk en alleen vertrouwden op geweld, waardoor ze een anti-liberale mentaliteit creëerden die onverenigbaar was met de gelijkheidsbeginselen die moderne samenlevingen zouden moeten beheersen.
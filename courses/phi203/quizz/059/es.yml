question: ¿Cuáles fueron los dos efectos nocivos que los pensadores liberales franceses identificaron en el sistema de esclavitud moderna de la América de los siglos XVIII-XIX?
answer: La degradación intelectual de los esclavos y la corrupción moral de sus dueños
wrong_answers:
  - La ineficacia económica de las plantaciones y el declive del comercio internacional
  - Los conflictos religiosos entre comunidades y la ruptura de las estructuras familiares
  - El estancamiento tecnológico de la sociedad y el debilitamiento de las defensas militares
explanation: |
  Pensadores liberales franceses como Gustave de Beaumont identificaron dos efectos perversos específicos de la esclavitud moderna. En primer lugar, los propios esclavos se degradaban intelectualmente porque el sistema les impedía utilizar sus capacidades mentales, privándoles de oportunidades de desarrollo personal. En segundo lugar, los propietarios de esclavos experimentaban una corrupción moral al desarrollar actitudes negativas hacia el trabajo y confiar únicamente en la fuerza, creando mentalidades antiliberales incompatibles con los principios de igualdad que deberían regir las sociedades modernas.
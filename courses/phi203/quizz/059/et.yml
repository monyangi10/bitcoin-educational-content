question: Millised olid kaks kahjulikku mõju, mida prantsuse liberaalsed mõtlejad tuvastasid 18.-19. sajandi Ameerika kaasaegses orjandussüsteemis?
answer: Orjade intellektuaalne degradeerumine ja orjapidajate moraalne korruptsioon
wrong_answers:
  - Istanduste majanduslik ebaefektiivsus ja rahvusvahelise kaubanduse vähenemine
  - Kogukondade vahelised religioossed konfliktid ja perestruktuuride lagunemine
  - Ühiskonna tehnoloogiline stagnatsioon ja sõjalise kaitse nõrgenemine
explanation: |
  Prantsuse liberaalsed mõtlejad, nagu Gustave de Beaumont, tegid kindlaks kaks konkreetset kaasaegse orjuse perversset mõju. Esiteks, orjad ise olid intellektuaalselt degradeeritud, sest süsteem takistas neil kasutada oma vaimseid võimeid, jättes nad ilma isiklikest arenguvõimalustest. Teiseks, orjapidajad kogesid moraalset korruptsiooni, kuna neil kujunesid välja negatiivsed hoiakud töö suhtes ja nad tuginesid üksnes jõule, tekitades liberaalivastaseid mõtteviise, mis ei sobi kokku võrdsuse põhimõtetega, mis peaksid juhtima kaasaegseid ühiskondi.
question: Vilka var de två skadliga effekter som franska liberala tänkare identifierade i det moderna slaverisystemet i 1700-1900-talets Amerika?
answer: Slavarnas intellektuella förnedring och slavägarnas moraliska fördärv
wrong_answers:
  - Plantagernas ekonomiska ineffektivitet och den internationella handelns tillbakagång
  - De religiösa konflikterna mellan samhällen och upplösningen av familjestrukturer
  - Den tekniska stagnationen i samhället och försvagningen av det militära försvaret
explanation: |
  Franska liberala tänkare som Gustave de Beaumont identifierade två specifika perversa effekter av det moderna slaveriet. För det första blev slavarna själva intellektuellt förnedrade eftersom systemet hindrade dem från att använda sina mentala förmågor och berövade dem möjligheter till personlig utveckling. För det andra upplevde slavägarna moralisk korruption eftersom de utvecklade negativa attityder till arbete och förlitade sig enbart på våld, vilket skapade antiliberala tankesätt som var oförenliga med de jämlikhetsprinciper som borde styra moderna samhällen.
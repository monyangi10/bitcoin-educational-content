question: 法國自由主義思想家在 18-19 世紀美國的現代奴隸制度中發現的兩種有害影響是什麼？
answer: 奴隸的智力退化和奴隸主的道德腐化
wrong_answers:
  - 種植園的經濟低效率與國際貿易的衰退
  - 族群間的宗教衝突與家庭結構的瓦解
  - 社會科技停滯不前，軍事防禦能力減弱
explanation: |
  Gustave de Beaumont等法國自由主義思想家指出了現代奴隸制的兩個具體惡果。首先，奴隸本身的智力退化，因為奴隸制度妨礙他們運用智力，剝奪了他們個人發展的機會。第二，奴隸主的道德淪喪，因為他們對工作產生負面的態度，並完全依賴武力，造成反自由的心態，與現代社會應有的平等原則格格不入。
question: Koja su bila dva štetna efekta koja su francuski liberalni mislioci identifikovali u sistemu modernog ropstva u Americi 18.-19. veka?
answer: Intelektualna degradacija robova i moralna korupcija robovlasnika
wrong_answers:
  - Ekonomska neefikasnost plantaža i pad međunarodne trgovine
  - Verski sukobi između zajednica i raspad porodičnih struktura
  - Tehnološko stagniranje društva i slabljenje vojnih odbrana
explanation: |
  Francuski liberalni mislioci poput Gustava de Beaumonta identifikovali su dva specifična perverzna efekta modernog ropstva. Prvo, sami robovi su bili intelektualno degradirani jer im je sistem onemogućavao korišćenje mentalnih sposobnosti, lišavajući ih prilika za lični razvoj. Drugo, vlasnici robova su doživljavali moralnu korupciju jer su razvijali negativne stavove prema radu i oslanjali se isključivo na silu, stvarajući antiliberalne načine razmišljanja nespojive sa principima jednakosti koji bi trebalo da upravljaju modernim društvima.
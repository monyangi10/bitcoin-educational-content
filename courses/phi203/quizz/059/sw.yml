question: Ni madhara gani mawili ambayo wanafikra huru wa Ufaransa waliyatambua katika mfumo wa kisasa wa utumwa wa karne ya 18-19 wa Amerika?
answer: Uharibifu wa kiakili wa watumwa na ufisadi wa maadili wa wamiliki wa watumwa
wrong_answers:
  - Udhaifu wa kiuchumi wa mashamba makubwa na kupungua kwa biashara ya kimataifa
  - Migogoro ya kidini kati ya jamii na kuvunjika kwa miundo ya familia
  - Kudumaa kwa teknolojia katika jamii na kudhoofika kwa ulinzi wa kijeshi
explanation: |
  Wanafikra huru wa Ufaransa kama Gustave de Beaumont walibainisha athari mbili potofu za utumwa wa kisasa. Kwanza, watumwa wenyewe walidhoofika kiakili kwa sababu mfumo huo uliwazuia kutumia uwezo wao wa kiakili, na kuwanyima fursa za maendeleo binafsi. Pili, wamiliki wa watumwa walipitia ufisadi wa maadili walipokuza mitazamo hasi kuelekea kazi na kutegemea nguvu pekee, na kuunda mawazo ya kupinga uhuru yasiyokubaliana na kanuni za usawa ambazo zinapaswa kutawala jamii za kisasa.
question: Hvilke to skadevirkninger identifiserte franske liberale tenkere i det moderne slaveriet i Amerika på 1700- og 1800-tallet?
answer: Slavenes intellektuelle degradering og slaveeiernes moralske fordervelse
wrong_answers:
  - Plantasjenes økonomiske ineffektivitet og nedgangen i internasjonal handel
  - De religiøse konfliktene mellom samfunnene og sammenbruddet av familiestrukturene
  - Den teknologiske stagnasjonen i samfunnet og svekkelsen av det militære forsvaret
explanation: |
  Franske liberale tenkere som Gustave de Beaumont identifiserte to spesifikke perverse effekter av det moderne slaveriet. For det første ble slavene selv intellektuelt degradert fordi systemet hindret dem i å bruke sine mentale evner og fratok dem muligheten til personlig utvikling. For det andre ble slaveeierne moralsk korrumperte fordi de utviklet negative holdninger til arbeid og utelukkende baserte seg på makt, noe som skapte et antiliberalt tankesett som var uforenlig med likhetsprinsippene som skulle styre moderne samfunn.
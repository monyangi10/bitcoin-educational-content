question: Apa saja dua efek berbahaya yang diidentifikasi oleh para pemikir liberal Prancis dalam sistem perbudakan modern di Amerika pada abad ke-18 dan 19?
answer: Degradasi intelektual para budak dan korupsi moral para pemilik budak
wrong_answers:
  - Inefisiensi ekonomi perkebunan dan menurunnya perdagangan internasional
  - Konflik agama antara masyarakat dan hancurnya struktur keluarga
  - Stagnasi teknologi masyarakat dan melemahnya pertahanan militer
explanation: |
  Pemikir liberal Prancis seperti Gustave de Beaumont mengidentifikasi dua dampak buruk dari perbudakan modern. Pertama, para budak itu sendiri mengalami degradasi intelektual karena sistem mencegah mereka menggunakan kapasitas mental mereka, merampas kesempatan pengembangan diri mereka. Kedua, pemilik budak mengalami kerusakan moral karena mereka mengembangkan sikap negatif terhadap pekerjaan dan hanya mengandalkan kekuatan, menciptakan pola pikir anti-liberal yang tidak sesuai dengan prinsip-prinsip kesetaraan yang seharusnya mengatur masyarakat modern.
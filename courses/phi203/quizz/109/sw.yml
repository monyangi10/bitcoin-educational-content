question: Je, kazi kuu ya bei katika uchumi wa soko huria ni ipi kulingana na nadharia ya kiuchumi?
answer: Zinatumika kama ishara muhimu zinazowaongoza wazalishaji kuhusu nini, lini, wapi, na jinsi ya kuzalisha bidhaa na huduma.
wrong_answers:
  - Kimsingi hufanya kazi ya kuongeza mapato ya kodi ya serikali na kufadhili huduma za umma kwa ufanisi.
  - Zinatumika hasa kuhakikisha usambazaji sawa wa utajiri miongoni mwa wanajamii wote
  - Hufanya kazi hasa kuzuia uzalishaji kupita kiasi na kudumisha viwango thabiti vya ajira katika tasnia zote
explanation: |
  Bei hufanya kazi kama ishara muhimu za taarifa katika masoko huria, zikiwasilisha mapendeleo ya watumiaji na uhaba wa rasilimali kwa wazalishaji. Bei zinapopanda, zinaashiria ongezeko la mahitaji au upungufu wa usambazaji, zikiwaongoza wajasiriamali kuelekea fursa zenye faida. Utaratibu huu wa kuashiria unaratibu shughuli za kiuchumi bila mipango ya kati, na kuruhusu masoko kujibu kwa ufanisi hali zinazobadilika. Chaguzi zingine zinaonyesha kimakosa kwamba bei hutumikia kazi za ugawaji upya, fedha, au utulivu wa ajira, ambazo sio jukumu lao kuu la soko.
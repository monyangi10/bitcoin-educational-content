question: What is the primary function of prices in a free market economy according to economic theory?
answer: They serve as essential signals that guide producers on what, when, where, and how to produce goods and services
wrong_answers:
  - They primarily function to maximize government tax revenue and fund public services efficiently
  - They serve mainly to ensure equal distribution of wealth among all members of society
  - They function primarily to prevent overproduction and maintain stable employment levels across industries
explanation: |
  Prices act as crucial information signals in free markets, communicating consumer preferences and resource scarcity to producers. When prices rise, they signal increased demand or reduced supply, guiding entrepreneurs toward profitable opportunities. This signaling mechanism coordinates economic activity without central planning, allowing markets to respond efficiently to changing conditions. The other options incorrectly suggest prices serve redistributive, fiscal, or employment stabilization functions, which are not their primary market role.
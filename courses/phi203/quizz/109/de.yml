question: Was ist die Hauptfunktion der Preise in einer freien Marktwirtschaft nach der Wirtschaftstheorie?
answer: Sie dienen als wichtige Signale, die den Produzenten Hinweise geben, was, wann, wo und wie sie Waren und Dienstleistungen produzieren sollen
wrong_answers:
  - Sie dienen in erster Linie dazu, die Steuereinnahmen des Staates zu maximieren und öffentliche Dienstleistungen effizient zu finanzieren
  - Sie dienen vor allem dazu, eine gleichmäßige Verteilung des Wohlstands unter allen Mitgliedern der Gesellschaft zu gewährleisten
  - Sie dienen in erster Linie dazu, Überproduktion zu verhindern und das Beschäftigungsniveau in den verschiedenen Branchen stabil zu halten
explanation: |
  Preise fungieren auf freien Märkten als wichtige Informationssignale, die den Produzenten die Präferenzen der Verbraucher und die Knappheit der Ressourcen mitteilen. Wenn die Preise steigen, signalisieren sie eine erhöhte Nachfrage oder ein verringertes Angebot und lenken die Unternehmer auf profitable Möglichkeiten. Dieser Signalmechanismus koordiniert die Wirtschaftstätigkeit ohne zentrale Planung und ermöglicht es den Märkten, effizient auf veränderte Bedingungen zu reagieren. Die anderen Optionen suggerieren fälschlicherweise, dass die Preise Umverteilungs-, Steuer- oder Beschäftigungsstabilisierungsfunktionen erfüllen, was nicht ihre primäre Marktfunktion ist.
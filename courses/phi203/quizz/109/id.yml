question: Apa fungsi utama harga dalam ekonomi pasar bebas menurut teori ekonomi?
answer: Mereka berfungsi sebagai sinyal penting yang memandu produsen tentang apa, kapan, di mana, dan bagaimana memproduksi barang dan jasa
wrong_answers:
  - Mereka terutama berfungsi untuk memaksimalkan pendapatan pajak pemerintah dan mendanai layanan publik secara efisien
  - Mereka berfungsi terutama untuk memastikan distribusi kekayaan yang merata di antara semua anggota masyarakat
  - Mereka berfungsi terutama untuk mencegah produksi berlebih dan menjaga tingkat pekerjaan yang stabil di seluruh industri
explanation: |
  Harga bertindak sebagai sinyal informasi penting di pasar bebas, mengkomunikasikan preferensi konsumen dan kelangkaan sumber daya kepada produsen. Ketika harga naik, harga menandakan meningkatnya permintaan atau berkurangnya pasokan, memandu para pengusaha menuju peluang yang menguntungkan. Mekanisme sinyal ini mengkoordinasikan aktivitas ekonomi tanpa perencanaan pusat, sehingga memungkinkan pasar merespons secara efisien terhadap perubahan kondisi. Pilihan lain secara keliru menyatakan bahwa harga memiliki fungsi redistributif, fiskal, atau stabilisasi lapangan kerja, yang bukan merupakan peran utama pasar.
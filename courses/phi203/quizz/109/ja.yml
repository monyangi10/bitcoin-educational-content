question: 経済理論によれば、自由市場経済における価格の主な機能とは何か？
answer: 何を、いつ、どこで、どのように商品やサービスを生産するのか、生産者を導く重要なシグナルとして機能する。
wrong_answers:
  - 主に政府の税収を最大化し、公共サービスに効率的に資金を供給するために機能している。
  - それは主に、社会の全構成員間の富の平等な分配を確保するためのものである。
  - 主に過剰生産を防ぎ、産業間の雇用水準を安定させるために機能している。
explanation: |
  自由市場において、価格は重要な情報シグナルとして機能し、消費者の嗜好や資源の希少性を生産者に伝える。価格が上昇すれば、需要の増加や供給の減少を示し、企業家を収益性の高い機会へと導く。このシグナル伝達メカニズムは、中央計画なしに経済活動を調整し、変化する状況に市場が効率的に対応することを可能にする。他の選択肢は、物価が再分配、財政、雇用の安定といった機能を果たしていると誤って示唆しているが、これは本来の市場の役割ではない。
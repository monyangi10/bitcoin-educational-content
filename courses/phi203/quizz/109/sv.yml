question: Vilken är den primära funktionen för priser i en fri marknadsekonomi enligt ekonomisk teori?
answer: De fungerar som viktiga signaler som vägleder producenterna om vad, när, var och hur de ska producera varor och tjänster
wrong_answers:
  - Deras främsta uppgift är att maximera statens skatteintäkter och finansiera offentliga tjänster på ett effektivt sätt
  - De syftar främst till att säkerställa en jämn fördelning av rikedomarna mellan alla samhällsmedlemmar
  - De fungerar främst för att förhindra överproduktion och upprätthålla stabila sysselsättningsnivåer i olika branscher
explanation: |
  Priserna fungerar som viktiga informationssignaler på fria marknader och förmedlar konsumenternas preferenser och resursbrist till producenterna. När priserna stiger signalerar de ökad efterfrågan eller minskat utbud och vägleder entreprenörer mot lönsamma möjligheter. Denna signalmekanism samordnar den ekonomiska aktiviteten utan central planering och gör det möjligt för marknaderna att reagera effektivt på förändrade förhållanden. De andra alternativen antyder felaktigt att priser har omfördelande, finanspolitiska eller sysselsättningsstabiliserande funktioner, vilket inte är deras primära marknadsroll.
question: Ni igikorwa nyamukuru ikihe c’ibiciro mu bukungu bw’isoko ry’uburenganzira hakurikijwe inyigisho y’ubutunzi?
answer: Bikora nk’ibimenyetso bihambaye biyobora abahingura ibintu ku bijanye n’ico bahingura ibintu n’ibikorwa, ryari, aho babihingura be n’ingene bobihingura .
wrong_answers:
  - Ahanini zikora kugira ngo Leta ironke amafaranga menshi mu misoro no gufasha neza ibikorwa vya Leta .
  - Bifasha cane cane gutuma ubutunzi bugabanywa ku rugero rungana mu bantu bose bo mu kibano .
  - Bikora cane cane mu gukingira umusaruro urenze urugero no kubungabunga ingero z'akazi zidahinduka mu nganda zose .
explanation: |
  Ibiciro bikora nk’ibimenyetso vy’amakuru bihambaye mu masoko y’uburenganzira, bikamenyesha abaguzi ivyo abaguzi bakunda n’ubukene bw’ibikoresho ku bahinga. Iyo ibiciro vyiyongereye, bigaragaza ko hariho ugushaka kwiyongera canke ko ugutanga kugabanutse, ivyo bikaba biyobora abashoramare mu bijanye n’uturyo two kuronka inyungu. Ubwo buryo bwo gutanga ikimenyetso burahuza ibikorwa vy’ubutunzi ata n’itegurwa ry’imbere, bikaba bituma amasoko ashobora kwishura neza ku bintu bihinduka. Ibindi bihitamwo bivuga nabi ko ibiciro bikora ibikorwa vyo gusubira gusangira, ivy’ubutunzi canke uguhagarika akazi, ivyo bikaba atari uruhara rwavyo rwa mbere mw’isoko.
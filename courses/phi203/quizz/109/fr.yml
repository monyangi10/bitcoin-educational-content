question: Quelle est la fonction principale des prix dans une économie de marché selon la théorie économique ?
answer: Ils constituent des signaux essentiels qui guident les producteurs sur ce qu'ils doivent produire, quand, où et comment ils doivent produire des biens et des services
wrong_answers:
  - Leur fonction principale est de maximiser les recettes fiscales de l'État et de financer efficacement les services publics
  - Ils servent principalement à assurer une répartition égale des richesses entre tous les membres de la société
  - Leur fonction principale est d'empêcher la surproduction et de maintenir des niveaux d'emploi stables dans l'ensemble des secteurs d'activité
explanation: |
  Les prix constituent des signaux d'information cruciaux sur les marchés libres, car ils communiquent aux producteurs les préférences des consommateurs et la rareté des ressources. Lorsque les prix augmentent, ils signalent une augmentation de la demande ou une réduction de l'offre, guidant les entrepreneurs vers des opportunités rentables. Ce mécanisme de signalisation coordonne l'activité économique sans planification centrale, ce qui permet aux marchés de réagir efficacement à l'évolution des conditions. Les autres options suggèrent à tort que les prix remplissent des fonctions de redistribution, de fiscalité ou de stabilisation de l'emploi, ce qui n'est pas leur rôle premier sur le marché.
question: Milline on majandusteooria kohaselt hindade esmane funktsioon vabaturumajanduses?
answer: Need on olulised signaalid, mis suunavad tootjaid selles osas, mida, millal, kus ja kuidas toota kaupu ja teenuseid
wrong_answers:
  - Nende peamine ülesanne on maksimeerida valitsuse maksutulu ja rahastada tõhusalt avalikke teenuseid
  - Nende peamine eesmärk on tagada jõukuse võrdne jaotumine kõigi ühiskonnaliikmete vahel
  - Nende ülesanne on eelkõige vältida ületootmist ja säilitada stabiilne tööhõive tase kõikides tööstusharudes
explanation: |
  Hinnad on vabadel turgudel olulised teabesignaalid, mis annavad tootjatele teada tarbijate eelistustest ja ressursside nappusest. Kui hinnad tõusevad, annavad nad märku suurenenud nõudlusest või vähenenud pakkumisest, suunates ettevõtjaid kasumlike võimaluste poole. See signaalimehhanism koordineerib majandustegevust ilma tsentraalse planeerimiseta, võimaldades turgudel tõhusalt reageerida muutuvatele tingimustele. Teiste valikute puhul eeldatakse ekslikult, et hinnad täidavad ümberjaotamise, eelarve või tööhõive stabiliseerimise funktsioone, mis ei ole nende esmane roll turul.
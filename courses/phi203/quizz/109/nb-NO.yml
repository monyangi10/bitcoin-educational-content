question: Hva er prisers primære funksjon i en fri markedsøkonomi ifølge økonomisk teori?
answer: De fungerer som viktige signaler som veileder produsenter om hva, når, hvor og hvordan de skal produsere varer og tjenester
wrong_answers:
  - De har først og fremst som oppgave å maksimere statens skatteinntekter og finansiere offentlige tjenester på en effektiv måte
  - De tjener først og fremst til å sikre lik fordeling av velstand blant alle samfunnets medlemmer
  - De fungerer først og fremst for å hindre overproduksjon og opprettholde et stabilt sysselsettingsnivå på tvers av bransjer
explanation: |
  Prisene fungerer som viktige informasjonssignaler i frie markeder, og kommuniserer forbrukernes preferanser og ressursknapphet til produsentene. Når prisene stiger, signaliserer de økt etterspørsel eller redusert tilbud, og leder entreprenører mot lønnsomme muligheter. Denne signalmekanismen koordinerer økonomisk aktivitet uten sentral planlegging, slik at markedene kan reagere effektivt på skiftende forhold. De andre alternativene antyder feilaktig at priser tjener omfordelende, fiskale eller sysselsettingsstabiliserende funksjoner, som ikke er deres primære markedsrolle.
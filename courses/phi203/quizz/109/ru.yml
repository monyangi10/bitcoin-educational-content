question: Какова основная функция цен в свободной рыночной экономике, согласно экономической теории?
answer: Они служат важнейшими сигналами, которые подсказывают производителям, что, когда, где и как производить товары и услуги
wrong_answers:
  - Их основная задача - максимизировать налоговые поступления и эффективно финансировать государственные услуги
  - Они служат главным образом для того, чтобы обеспечить равное распределение богатства между всеми членами общества
  - Их основная функция - предотвращение перепроизводства и поддержание стабильного уровня занятости в различных отраслях промышленности
explanation: |
  На свободных рынках цены выступают в качестве важнейших информационных сигналов, сообщая производителям о предпочтениях потребителей и нехватке ресурсов. Когда цены растут, они сигнализируют об увеличении спроса или сокращении предложения, направляя предпринимателей к выгодным возможностям. Этот сигнальный механизм координирует экономическую деятельность без централизованного планирования, позволяя рынкам эффективно реагировать на изменяющиеся условия. В других вариантах неверно предполагается, что цены выполняют перераспределительные, фискальные функции или функции стабилизации занятости, которые не являются их основной рыночной ролью.
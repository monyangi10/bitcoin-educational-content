question: Mikä on talousteorian mukaan hintojen ensisijainen tehtävä vapaassa markkinataloudessa?
answer: Ne toimivat keskeisinä signaaleina, jotka ohjaavat tuottajia siitä, mitä, milloin, missä ja miten tavaroita ja palveluja tuotetaan
wrong_answers:
  - Niiden ensisijaisena tehtävänä on maksimoida valtion verotulot ja rahoittaa julkiset palvelut tehokkaasti
  - Niiden pääasiallisena tarkoituksena on varmistaa varallisuuden tasainen jakautuminen kaikkien yhteiskunnan jäsenten kesken
  - Niiden tehtävänä on ensisijaisesti estää ylituotantoa ja ylläpitää vakaata työllisyystasoa eri toimialoilla
explanation: |
  Hinnat toimivat vapailla markkinoilla keskeisinä informaatiosignaaleina, jotka välittävät tuottajille kuluttajien mieltymykset ja resurssien niukkuuden. Kun hinnat nousevat, ne viestivät lisääntyneestä kysynnästä tai vähentyneestä tarjonnasta ja ohjaavat yrittäjiä kohti kannattavia mahdollisuuksia. Tämä signaalimekanismi koordinoi taloudellista toimintaa ilman keskussuunnittelua, jolloin markkinat voivat reagoida tehokkaasti muuttuviin olosuhteisiin. Muissa vaihtoehdoissa annetaan virheellisesti ymmärtää, että hinnoilla on uudelleenjako-, verotus- tai työllisyyden vakauttamistehtäviä, jotka eivät ole niiden ensisijainen tehtävä markkinoilla.
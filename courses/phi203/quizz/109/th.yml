question: หน้าที่หลักของราคาภายใต้เศรษฐกิจตลาดเสรีตามทฤษฎีเศรษฐศาสตร์คืออะไร?
answer: พวกเขาทำหน้าที่เป็นสัญญาณสำคัญที่ชี้นำผู้ผลิตเกี่ยวกับสิ่งที่ควรผลิต เมื่อใด ที่ไหน และอย่างไรในการผลิตสินค้าและบริการ
wrong_answers:
  - พวกเขาทำหน้าที่หลักในการเพิ่มรายได้ภาษีของรัฐบาลให้สูงสุดและจัดหาบริการสาธารณะอย่างมีประสิทธิภาพ
  - พวกเขาทำหน้าที่หลักเพื่อให้แน่ใจว่ามีการกระจายความมั่งคั่งอย่างเท่าเทียมกันในหมู่สมาชิกทุกคนของสังคม
  - พวกเขาทำหน้าที่หลักในการป้องกันการผลิตเกินและรักษาระดับการจ้างงานที่มั่นคงในทุกอุตสาหกรรม
explanation: |
  ราคาทำหน้าที่เป็นสัญญาณข้อมูลที่สำคัญในตลาดเสรี โดยสื่อสารถึงความต้องการของผู้บริโภคและความขาดแคลนของทรัพยากรไปยังผู้ผลิต เมื่อราคาสูงขึ้น มันจะส่งสัญญาณถึงความต้องการที่เพิ่มขึ้นหรือการลดลงของอุปทาน ชี้นำผู้ประกอบการไปสู่โอกาสที่มีกำไร กลไกการส่งสัญญาณนี้ประสานกิจกรรมทางเศรษฐกิจโดยไม่ต้องมีการวางแผนจากส่วนกลาง ทำให้ตลาดสามารถตอบสนองต่อสภาพที่เปลี่ยนแปลงได้อย่างมีประสิทธิภาพ ตัวเลือกอื่น ๆ ที่กล่าวว่าราคาทำหน้าที่เป็นการกระจายรายได้ การคลัง หรือการรักษาเสถียรภาพการจ้างงานนั้นไม่ถูกต้อง เนื่องจากไม่ใช่บทบาทหลักของราคาตลาด
question: طبق نظریه اقتصادی، عملکرد اصلی قیمت‌ها در یک اقتصاد بازار آزاد تخصیص منابع است.
answer: آن‌ها به عنوان سیگنال‌های اساسی عمل می‌کنند که به تولیدکنندگان راهنمایی می‌کنند که چه چیزی، چه زمانی، کجا و چگونه کالاها و خدمات را تولید کنند.
wrong_answers:
  - آن‌ها عمدتاً برای به حداکثر رساندن درآمد مالیاتی دولت و تأمین مالی خدمات عمومی به‌طور کارآمد عمل می‌کنند.
  - آن‌ها عمدتاً برای اطمینان از توزیع عادلانه ثروت در میان همه اعضای جامعه خدمت می‌کنند.
  - آن‌ها عمدتاً برای جلوگیری از تولید بیش از حد و حفظ سطح اشتغال پایدار در صنایع مختلف عمل می‌کنند.
explanation: |
  قیمت‌ها به عنوان سیگنال‌های اطلاعاتی حیاتی در بازارهای آزاد عمل می‌کنند و ترجیحات مصرف‌کننده و کمبود منابع را به تولیدکنندگان منتقل می‌کنند. هنگامی که قیمت‌ها افزایش می‌یابند، نشان‌دهنده افزایش تقاضا یا کاهش عرضه هستند و کارآفرینان را به سمت فرصت‌های سودآور هدایت می‌کنند. این مکانیزم سیگنال‌دهی فعالیت اقتصادی را بدون برنامه‌ریزی مرکزی هماهنگ می‌کند و به بازارها اجازه می‌دهد به شرایط متغیر به طور کارآمد پاسخ دهند. گزینه‌های دیگر به اشتباه پیشنهاد می‌کنند که قیمت‌ها نقش‌های توزیعی، مالیاتی یا تثبیت اشتغال دارند، که این‌ها نقش اصلی آن‌ها در بازار نیستند.
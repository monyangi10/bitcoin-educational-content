question: Qual é a principal função dos preços numa economia de mercado livre, de acordo com a teoria económica?
answer: Servem como sinais essenciais que orientam os produtores sobre o quê, quando, onde e como produzir bens e serviços
wrong_answers:
  - O seu principal objetivo é maximizar as receitas fiscais do Estado e financiar os serviços públicos de forma eficiente
  - Servem principalmente para assegurar uma distribuição equitativa da riqueza entre todos os membros da sociedade
  - Funcionam principalmente para evitar a sobreprodução e manter níveis de emprego estáveis em todos os sectores
explanation: |
  Os preços actuam como sinais de informação cruciais nos mercados livres, comunicando aos produtores as preferências dos consumidores e a escassez de recursos. Quando os preços sobem, assinalam o aumento da procura ou a redução da oferta, orientando os empresários para oportunidades lucrativas. Este mecanismo de sinalização coordena a atividade económica sem planeamento central, permitindo que os mercados respondam eficazmente às condições em mudança. As outras opções sugerem incorretamente que os preços servem funções redistributivas, fiscais ou de estabilização do emprego, que não são o seu principal papel no mercado.
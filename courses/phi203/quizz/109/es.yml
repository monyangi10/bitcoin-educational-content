question: ¿Cuál es la función principal de los precios en una economía de libre mercado según la teoría económica?
answer: Sirven como señales esenciales que orientan a los productores sobre qué, cuándo, dónde y cómo producir bienes y servicios
wrong_answers:
  - Su función principal es maximizar los ingresos fiscales del Estado y financiar los servicios públicos de manera eficiente
  - Sirven principalmente para garantizar una distribución equitativa de la riqueza entre todos los miembros de la sociedad
  - Su función principal es evitar la sobreproducción y mantener niveles de empleo estables en todos los sectores
explanation: |
  Los precios actúan como señales informativas cruciales en los mercados libres, comunicando a los productores las preferencias de los consumidores y la escasez de recursos. Cuando los precios suben, señalan un aumento de la demanda o una reducción de la oferta, orientando a los empresarios hacia oportunidades rentables. Este mecanismo de señalización coordina la actividad económica sin planificación central, permitiendo a los mercados responder eficientemente a las condiciones cambiantes. Las otras opciones sugieren incorrectamente que los precios cumplen funciones redistributivas, fiscales o de estabilización del empleo, que no son su principal función en el mercado.
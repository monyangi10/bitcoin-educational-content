question: Qual è la funzione principale dei prezzi in un'economia di libero mercato secondo la teoria economica?
answer: Servono come segnali essenziali che guidano i produttori su cosa, quando, dove e come produrre beni e servizi
wrong_answers:
  - La loro funzione principale è quella di massimizzare le entrate fiscali del governo e di finanziare in modo efficiente i servizi pubblici
  - Servono principalmente a garantire un'equa distribuzione della ricchezza tra tutti i membri della società
  - Funzionano principalmente per prevenire la sovrapproduzione e mantenere stabili i livelli di occupazione nei vari settori industriali
explanation: |
  I prezzi agiscono come segnali informativi cruciali nei mercati liberi, comunicando ai produttori le preferenze dei consumatori e la scarsità delle risorse. Quando i prezzi aumentano, segnalano un aumento della domanda o una riduzione dell'offerta, guidando gli imprenditori verso opportunità redditizie. Questo meccanismo di segnalazione coordina l'attività economica senza una pianificazione centrale, consentendo ai mercati di rispondere in modo efficiente ai cambiamenti delle condizioni. Le altre opzioni suggeriscono erroneamente che i prezzi svolgano funzioni redistributive, fiscali o di stabilizzazione dell'occupazione, che non sono il loro ruolo primario di mercato.
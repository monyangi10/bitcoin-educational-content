question: Jaká je podle ekonomické teorie hlavní funkce cen ve volném tržním hospodářství?
answer: Slouží jako základní signály, které výrobcům určují, co, kdy, kde a jak vyrábět
wrong_answers:
  - Jejich hlavním úkolem je maximalizovat daňové příjmy státu a efektivně financovat veřejné služby
  - Slouží především k zajištění rovnoměrného rozdělení bohatství mezi všechny členy společnosti
  - Fungují především proto, aby zabránily nadprodukci a udržely stabilní úroveň zaměstnanosti v jednotlivých odvětvích
explanation: |
  Ceny fungují na volných trzích jako klíčové informační signály, které výrobcům sdělují preference spotřebitelů a nedostatek zdrojů. Když ceny rostou, signalizují zvýšenou poptávku nebo sníženou nabídku, což podnikatele vede k ziskovým příležitostem. Tento signalizační mechanismus koordinuje hospodářskou činnost bez centrálního plánování a umožňuje trhům účinně reagovat na měnící se podmínky. Ostatní možnosti nesprávně naznačují, že ceny plní přerozdělovací, fiskální nebo stabilizační funkci v oblasti zaměstnanosti, což není jejich primární tržní úloha.
question: Mikä oli luvun mukaan tyypillinen kohtalo naisille, jotka yrittivät lähteä heimoyhteisöistään esihistoriallisissa yhteiskunnissa?
answer: Heitä uhkasi varma kuolema, koska heillä ei ollut itsenäistä tuotantokapasiteettia
wrong_answers:
  - Naapuriheimot toivottivat heidät tervetulleiksi arvokkaina jäseninä -
  - He perustivat menestyksekkäästi itsenäisiä siirtokuntia erämaahan -
  - Heitä rangaistiin, mutta he saivat palata maanpakolaisuuden jälkeen
explanation: |
  Luvussa todetaan nimenomaan, että naista, joka halusi "maistaa vapautta" pakenemalla leiristä, odotti varma kuolema, koska hän ei kyennyt selviytymään itsenäisesti. Tekstissä selitetään, että ilman aikuisen miehen tukea selviytyminen oli mahdotonta, koska naisilta puuttui metsästykseen, kalastukseen ja keräilyyn tarvittava tuotantokyky ankarassa esihistoriallisessa ympäristössä. Tämä havainnollistaa, miten aineelliset rajoitteet, eivät ideologiset mieltymykset, määrittivät sosiaaliset järjestelyt. Muut vaihtoehdot ovat virheellisiä, koska ne viittaavat siihen, että naisilla olisi ollut toteuttamiskelpoisia vaihtoehtoja tai että he olisivat voineet selviytyä itsenäisesti, mikä on ristiriidassa sen kanssa, että luvussa korostetaan äärimmäisiä aineellisia rajoitteita, jotka tekivät yksilöllisen itsenäisyyden käytännössä mahdottomaksi esihistoriallisissa yhteiskunnissa.
question: Jaký byl podle této kapitoly typický osud žen, které se pokusily opustit svá kmenová společenství v pravěkých společnostech?
answer: Hrozila jim jistá smrt kvůli nedostatku nezávislé výrobní kapacity
wrong_answers:
  - Sousední kmeny je vítaly jako cenné členy
  - Úspěšně zakládali nezávislé osady v divočině
  - Byli potrestáni, ale po určité době vyhnanství se mohli vrátit
explanation: |
  V kapitole se výslovně uvádí, že žena, která by chtěla "ochutnat svobodu" útěkem z tábora, by se kvůli neschopnosti samostatně přežít setkala s jistou smrtí. Text vysvětluje, že bez podpory dospělého muže bylo přežití nemožné, protože ženám chyběla produktivní schopnost potřebná pro lov, rybolov a sběr v drsném pravěkém prostředí. To ilustruje, jak materiální omezení, nikoli ideologické preference, určovaly společenské uspořádání. Ostatní možnosti jsou nesprávné, protože naznačují, že ženy měly životaschopné alternativy nebo mohly přežít samostatně, což je v rozporu s důrazem kapitoly na extrémní materiální omezení, která v pravěkých společnostech prakticky znemožňovala individuální autonomii.
question: De acordo com o capítulo, qual era o destino típico das mulheres que tentavam abandonar as suas comunidades tribais nas sociedades pré-históricas?
answer: Enfrentavam a morte certa devido à falta de capacidade produtiva autónoma
wrong_answers:
  - Foram acolhidos pelas tribos vizinhas como membros valiosos
  - Estabeleceram com sucesso povoações independentes no deserto
  - Foram castigados, mas foram autorizados a regressar após um período de exílio
explanation: |
  O capítulo refere especificamente que uma mulher que quisesse "saborear a liberdade" fugindo do seu acampamento enfrentaria a morte certa devido à sua incapacidade de sobreviver de forma autónoma. O texto explica que, sem o apoio de um adulto do sexo masculino, a sobrevivência era impossível, porque as mulheres não tinham a capacidade produtiva necessária para caçar, pescar e recolher no ambiente agreste da pré-história. Este facto ilustra como as restrições materiais, e não as preferências ideológicas, determinavam as disposições sociais. As outras opções são incorrectas porque sugerem que as mulheres tinham alternativas viáveis ou podiam sobreviver de forma independente, o que contradiz a ênfase do capítulo nas limitações materiais extremas que tornavam a autonomia individual praticamente impossível nas sociedades pré-históricas.
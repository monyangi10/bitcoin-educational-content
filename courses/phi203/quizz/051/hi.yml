question: According to the chapter, what was the typical fate of women who attempted to leave their tribal communities in prehistoric societies?
answer: They faced certain death due to lack of independent productive capacity
wrong_answers:
  - They were welcomed by neighboring tribes as valuable members
  - They successfully established independent settlements in the wilderness
  - They were punished but allowed to return after a period of exile
explanation: |
  The chapter specifically states that a woman who wanted to 'taste freedom' by fleeing her camp would face certain death due to her inability to survive independently. The text explains that without male adult support, survival was impossible because women lacked the productive capacity necessary for hunting, fishing, and gathering in the harsh prehistoric environment. This illustrates how material constraints, not ideological preferences, determined social arrangements. The other options are incorrect because they suggest women had viable alternatives or could survive independently, which contradicts the chapter's emphasis on the extreme material limitations that made individual autonomy practically impossible in prehistoric societies.
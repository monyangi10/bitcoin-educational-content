question: Secondo il capitolo, qual era il destino tipico delle donne che cercavano di lasciare le loro comunità tribali nelle società preistoriche?
answer: Hanno affrontato una morte certa a causa della mancanza di una capacità produttiva indipendente
wrong_answers:
  - Furono accolti dalle tribù vicine come membri di valore
  - Hanno stabilito con successo insediamenti indipendenti nelle terre selvagge
  - Furono puniti ma fu loro permesso di tornare dopo un periodo di esilio
explanation: |
  Il capitolo afferma specificamente che una donna che volesse "assaggiare la libertà" fuggendo dal suo accampamento andrebbe incontro a morte certa a causa della sua incapacità di sopravvivere in modo indipendente. Il testo spiega che senza il sostegno di un adulto maschio, la sopravvivenza era impossibile perché le donne non avevano la capacità produttiva necessaria per la caccia, la pesca e la raccolta nel duro ambiente preistorico. Questo illustra come i vincoli materiali, e non le preferenze ideologiche, abbiano determinato gli assetti sociali. Le altre opzioni non sono corrette perché suggeriscono che le donne avevano alternative valide o potevano sopravvivere in modo indipendente, il che contraddice l'enfasi posta dal capitolo sulle estreme limitazioni materiali che rendevano praticamente impossibile l'autonomia individuale nelle società preistoriche.
question: Według rozdziału, jaki był typowy los kobiet, które próbowały opuścić swoje społeczności plemienne w społeczeństwach prehistorycznych?
answer: Stanęli w obliczu pewnej śmierci z powodu braku niezależnej zdolności produkcyjnej
wrong_answers:
  - Zostali powitani przez sąsiednie plemiona jako wartościowi członkowie
  - Z powodzeniem założyli niezależne osady na pustkowiach
  - Zostali ukarani, ale pozwolono im wrócić po okresie wygnania
explanation: |
  Rozdział ten wyraźnie stwierdza, że kobieta, która chciała "zasmakować wolności", uciekając ze swojego obozu, spotkałaby się z pewną śmiercią z powodu niezdolności do samodzielnego przetrwania. Tekst wyjaśnia, że bez wsparcia dorosłego mężczyzny przetrwanie było niemożliwe, ponieważ kobietom brakowało zdolności produkcyjnych niezbędnych do polowania, łowienia ryb i zbieractwa w surowym prehistorycznym środowisku. Ilustruje to, w jaki sposób ograniczenia materialne, a nie preferencje ideologiczne, determinowały ustalenia społeczne. Pozostałe opcje są nieprawidłowe, ponieważ sugerują, że kobiety miały realne alternatywy lub mogły przetrwać niezależnie, co jest sprzeczne z naciskiem położonym w rozdziale na ekstremalne ograniczenia materialne, które praktycznie uniemożliwiały indywidualną autonomię w społeczeństwach prehistorycznych.
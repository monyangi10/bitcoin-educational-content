question: Was war dem Kapitel zufolge das typische Schicksal von Frauen, die in prähistorischen Gesellschaften versuchten, ihre Stammesgemeinschaften zu verlassen?
answer: Sie waren vom sicheren Tod bedroht, weil sie keine unabhängigen Produktionskapazitäten hatten
wrong_answers:
  - Sie wurden von den benachbarten Stämmen als wertvolle Mitglieder aufgenommen
  - Sie gründeten erfolgreich unabhängige Siedlungen in der Wildnis
  - Sie wurden bestraft, durften aber nach einer Zeit der Verbannung zurückkehren
explanation: |
  In dem Kapitel heißt es ausdrücklich, dass eine Frau, die durch die Flucht aus ihrem Lager "die Freiheit schmecken" wollte, aufgrund ihrer Unfähigkeit, unabhängig zu überleben, mit dem sicheren Tod rechnen musste. Der Text erklärt, dass ein Überleben ohne die Unterstützung eines erwachsenen Mannes unmöglich war, da Frauen in der rauen prähistorischen Umgebung nicht über die für das Jagen, Fischen und Sammeln erforderlichen produktiven Fähigkeiten verfügten. Dies veranschaulicht, wie materielle Zwänge und nicht ideologische Präferenzen die sozialen Arrangements bestimmten. Die anderen Optionen sind falsch, weil sie suggerieren, dass Frauen lebensfähige Alternativen hatten oder unabhängig überleben konnten, was der Betonung des Kapitels auf die extremen materiellen Beschränkungen widerspricht, die individuelle Autonomie in prähistorischen Gesellschaften praktisch unmöglich machten.
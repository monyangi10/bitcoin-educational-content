question: Menurut bab ini, bagaimana nasib khas perempuan yang berusaha meninggalkan komunitas suku mereka dalam masyarakat prasejarah?
answer: Mereka menghadapi kematian karena kurangnya kapasitas produktif yang mandiri
wrong_answers:
  - Mereka disambut oleh suku-suku tetangga sebagai anggota yang berharga
  - Mereka berhasil membangun pemukiman mandiri di hutan belantara
  - Mereka dihukum tetapi diizinkan untuk kembali setelah periode pengasingan
explanation: |
  Bab ini secara khusus menyatakan bahwa seorang wanita yang ingin 'merasakan kebebasan' dengan melarikan diri dari kampnya akan menghadapi kematian karena ketidakmampuannya untuk bertahan hidup secara mandiri. Teks ini menjelaskan bahwa tanpa dukungan laki-laki dewasa, mustahil bagi perempuan untuk bertahan hidup karena perempuan tidak memiliki kapasitas produktif yang diperlukan untuk berburu, menangkap ikan, dan meramu di lingkungan prasejarah yang keras. Hal ini menggambarkan bagaimana kendala material, bukan preferensi ideologis, yang menentukan tatanan sosial. Pilihan-pilihan lain tidak benar karena mereka menyarankan perempuan memiliki alternatif yang layak atau dapat bertahan hidup secara mandiri, yang bertentangan dengan penekanan bab ini pada keterbatasan material yang ekstrem yang membuat otonomi individu secara praktis tidak mungkin terjadi pada masyarakat prasejarah.
question: Wat was volgens het hoofdstuk het typische lot van vrouwen die probeerden hun stammengemeenschap te verlaten in prehistorische samenlevingen?
answer: Ze gingen een zekere dood tegemoet door een gebrek aan onafhankelijke productiecapaciteit
wrong_answers:
  - Ze werden verwelkomd door naburige stammen als waardevolle leden
  - Ze vestigden met succes onafhankelijke nederzettingen in de wildernis
  - Ze werden gestraft, maar mochten na een periode van ballingschap terugkeren
explanation: |
  Het hoofdstuk stelt specifiek dat een vrouw die 'van de vrijheid wilde proeven' door haar kamp te ontvluchten, een zekere dood tegemoet zou gaan vanwege haar onvermogen om zelfstandig te overleven. De tekst legt uit dat overleven onmogelijk was zonder de steun van een volwassen man, omdat vrouwen niet over de productiecapaciteit beschikten die nodig was voor jagen, vissen en verzamelen in de barre prehistorische omgeving. Dit illustreert hoe materiële beperkingen, en niet ideologische voorkeuren, sociale regelingen bepaalden. De andere opties zijn onjuist omdat ze suggereren dat vrouwen levensvatbare alternatieven hadden of zelfstandig konden overleven, wat in tegenspraak is met de nadruk die in het hoofdstuk wordt gelegd op de extreme materiële beperkingen die individuele autonomie praktisch onmogelijk maakten in prehistorische samenlevingen.
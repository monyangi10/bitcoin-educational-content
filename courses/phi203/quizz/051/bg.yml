question: Според главата каква е била типичната съдба на жените, които са се опитвали да напуснат племенните си общности в праисторическите общества?
answer: Те са изправени пред сигурна смърт поради липса на независим производствен капацитет
wrong_answers:
  - Съседните племена ги посрещат като ценни членове
  - Те успешно създават независими селища в пустинята
  - Те са наказани, но им е позволено да се завърнат след период на изгнание
explanation: |
  В главата се посочва, че жена, която иска да "вкуси свободата", като избяга от лагера, ще бъде изправена пред сигурна смърт поради неспособността си да оцелее самостоятелно. В текста се обяснява, че без подкрепата на възрастен мъж оцеляването е било невъзможно, тъй като жените не са имали производствените способности, необходими за лов, риболов и събиране в суровата праисторическа среда. Това илюстрира как материалните ограничения, а не идеологическите предпочитания, са определяли социалното устройство. Другите варианти са неправилни, защото предполагат, че жените са имали реални алтернативи или са можели да оцелеят самостоятелно, което противоречи на акцента в главата върху крайните материални ограничения, които са направили индивидуалната автономия практически невъзможна в праисторическите общества.
question: Prema poglavlju, kakva je bila tipična sudbina žena koje su pokušavale napustiti svoje plemenske zajednice u praistorijskim društvima?
answer: Suočili su se sa sigurnom smrću zbog nedostatka nezavisne proizvodne sposobnosti
wrong_answers:
  - Bili su dočekani od strane susednih plemena kao dragoceni članovi
  - Oni su uspešno uspostavili nezavisna naselja u divljini.
  - Bili su kažnjeni, ali im je bilo dozvoljeno da se vrate nakon perioda izgnanstva.
explanation: |
  Poglavlje posebno navodi da bi žena koja je želela da 'okusi slobodu' bežeći iz svog kampa suočila sa sigurnom smrću zbog svoje nesposobnosti da preživi samostalno. Tekst objašnjava da bez podrške odraslog muškarca, preživljavanje je bilo nemoguće jer ženama je nedostajao produktivni kapacitet neophodan za lov, ribolov i sakupljanje u surovom praistorijskom okruženju. Ovo ilustruje kako su materijalna ograničenja, a ne ideološke preferencije, određivala društvene aranžmane. Ostale opcije su netačne jer sugerišu da su žene imale održive alternative ili da su mogle preživeti samostalno, što je u suprotnosti sa naglaskom poglavlja na ekstremna materijalna ograničenja koja su činila individualnu autonomiju praktično nemogućom u praistorijskim društvima.
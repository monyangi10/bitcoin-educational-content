question: Enligt kapitlet, vad var det typiska ödet för kvinnor som försökte lämna sina stamgemenskaper i förhistoriska samhällen?
answer: De stod inför en säker död på grund av avsaknad av oberoende produktionskapacitet
wrong_answers:
  - De välkomnades av grannstammarna som värdefulla medlemmar
  - De lyckades etablera självständiga bosättningar i vildmarken
  - De straffades men tilläts återvända efter en period i exil
explanation: |
  I kapitlet anges särskilt att en kvinna som ville "smaka på friheten" genom att fly från sitt läger skulle gå en säker död till mötes på grund av sin oförmåga att överleva på egen hand. Texten förklarar att utan stöd från en vuxen man var det omöjligt att överleva eftersom kvinnor saknade den produktiva kapacitet som krävdes för att jaga, fiska och samla i den hårda förhistoriska miljön. Detta illustrerar hur det var materiella begränsningar, inte ideologiska preferenser, som bestämde de sociala arrangemangen. De andra alternativen är felaktiga eftersom de antyder att kvinnor hade gångbara alternativ eller kunde överleva på egen hand, vilket motsäger kapitlets betoning av de extrema materiella begränsningar som gjorde individuell autonomi praktiskt taget omöjlig i förhistoriska samhällen.
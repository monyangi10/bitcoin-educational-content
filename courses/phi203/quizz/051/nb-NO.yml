question: Hva var, ifølge kapittelet, den typiske skjebnen til kvinner som forsøkte å forlate stammesamfunnene sine i forhistoriske samfunn?
answer: De gikk en sikker død i møte på grunn av manglende selvstendig produksjonsevne
wrong_answers:
  - De ble ønsket velkommen av nabostammene som verdifulle medlemmer
  - De etablerte selvstendige bosetninger i villmarken
  - De ble straffet, men fikk vende tilbake etter en periode i eksil
explanation: |
  I kapittelet står det spesifikt at en kvinne som ville "smake på friheten" ved å flykte fra leiren sin, ville gå en sikker død i møte på grunn av sin manglende evne til å overleve på egen hånd. Teksten forklarer at uten støtte fra voksne menn var det umulig å overleve fordi kvinner manglet den produktive kapasiteten som var nødvendig for å jakte, fiske og sanke i det harde forhistoriske miljøet. Dette illustrerer hvordan materielle begrensninger, og ikke ideologiske preferanser, var bestemmende for sosiale ordninger. De andre alternativene er feil fordi de antyder at kvinner hadde levedyktige alternativer eller kunne overleve på egen hånd, noe som er i strid med kapitlets vektlegging av de ekstreme materielle begrensningene som gjorde individuell autonomi praktisk talt umulig i forhistoriske samfunn.
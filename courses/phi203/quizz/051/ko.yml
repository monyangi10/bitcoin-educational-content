question: 이 장에 따르면, 선사 시대 사회에서 부족 공동체를 떠나려고 했던 여성들의 전형적인 운명은 무엇이었나요?
answer: 독립적인 생산 능력 부족으로 죽음에 직면했습니다
wrong_answers:
  - 그들은 이웃 부족들로부터 소중한 일원으로 환영받았습니다
  - 그들은 광야에 독립적인 정착촌을 성공적으로 세웠습니다
  - 그들은 처벌을 받았지만 유배 기간이 지나면 돌아올 수 있었습니다
explanation: |
  이 장에서는 특히 캠프를 탈출하여 '자유를 맛보고자' 했던 여성은 독립적으로 생존할 수 없었기 때문에 죽음에 직면하게 될 것이라고 명시하고 있습니다. 본문은 선사 시대의 혹독한 환경에서 여성은 사냥, 낚시, 채집에 필요한 생산력이 부족했기 때문에 남성 성인의 지원 없이는 생존이 불가능했다고 설명합니다. 이는 이데올로기적 선호가 아닌 물질적 제약이 사회 제도를 결정했음을 보여줍니다. 다른 선택지는 여성에게 실행 가능한 대안이 있었거나 독립적으로 생존할 수 있었다고 제안하므로 선사 시대 사회에서 개인의 자율성을 사실상 불가능하게 만든 극심한 물질적 제약에 대한 이 장의 강조와 모순되므로 올바르지 않습니다.
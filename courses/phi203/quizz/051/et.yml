question: Milline oli peatüki kohaselt eelajaloolistes ühiskondades tüüpiline naiste saatus, kes püüdsid oma hõimukogukonnast lahkuda?
answer: Nad seisid silmitsi kindla surmaga, sest neil puudus iseseisev tootmisvõime
wrong_answers:
  - Naaberhõimud võtsid nad vastu kui väärtuslikud liikmed
  - Nad rajasid edukalt iseseisvad asulad kõrbes
  - Neid karistati, kuid neil lubati pärast paguluse perioodi tagasi pöörduda
explanation: |
  Selles peatükis on konkreetselt öeldud, et naist, kes sooviks "maitsta vabadust", põgenedes oma laagrist, ootab kindel surm, sest ta ei suuda iseseisvalt ellu jääda. Tekstis selgitatakse, et ilma täiskasvanud mehe toetuseta oli ellujäämine võimatu, sest naistel puudus tootmisvõime, mis oli vajalik jahipidamiseks, kalapüügiks ja kogumiseks karmis eelajaloolises keskkonnas. See näitab, kuidas materiaalsed piirangud, mitte ideoloogilised eelistused, määrasid sotsiaalsed kokkulepped. Teised valikud on valed, sest need viitavad sellele, et naistel olid elujõulised alternatiivid või nad võisid iseseisvalt ellu jääda, mis on vastuolus peatükis rõhutatud äärmuslikele materiaalsetele piirangutele, mis tegid individuaalse autonoomia eelajaloolistes ühiskondades praktiliselt võimatuks.
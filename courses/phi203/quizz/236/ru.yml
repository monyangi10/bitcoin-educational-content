question: По мнению либеральных мыслителей, таких как Поль Леруа-Болье, почему образование и здравоохранение страдают от монополизации государства, несмотря на то что предоставляют важнейшие услуги?
answer: Государственная монополия лишает этих профессионалов рыночного признания и справедливой компенсации, которую их ценные услуги естественно получили бы в свободной системе
wrong_answers:
  - Государственная монополизация обеспечивает этим специалистам стабильную работу, но ограничивает их возможности по внедрению инноваций в своих областях
  - Государство считает эти услуги слишком важными, чтобы отдавать их на откуп рыночным силам, что приводит к чрезмерному регулированию, тормозящему профессиональное развитие
  - Государственные монополии создают чрезмерную бюрократию, которая мешает профессионалам сосредоточиться на своей основной компетенции и качестве услуг
explanation: |
  Либеральная теория утверждает, что государственная монополизация создает парадокс: именно потому, что образование и здравоохранение так ценны, они высоко вознаграждались бы на свободном рынке. Однако государственный контроль обесценивает эти услуги и не позволяет профессионалам достичь заслуженного социального и экономического статуса. Монополизация государства не защищает эти важнейшие услуги, а скорее недооценивает их, что противоречит логике, согласно которой важные услуги нуждаются в государственном контроле.
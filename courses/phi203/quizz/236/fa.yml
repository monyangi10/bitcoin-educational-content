question: طبق نظر متفکران لیبرال مانند پل لروی-بولو، چرا حرفه‌ای‌های آموزش و بهداشت تحت انحصار دولتی رنج می‌برند با وجود اینکه خدمات اساسی ارائه می‌دهند؟
answer: انحصار دولتی این حرفه‌ای‌ها را از شناسایی بازار و جبران منصفانه‌ای که خدمات ارزشمندشان به طور طبیعی در یک سیستم آزاد دریافت می‌کرد، محروم می‌کند.
wrong_answers:
  - انحصار دولتی تضمین می‌کند که این حرفه‌ای‌ها اشتغال پایدار داشته باشند اما توانایی آن‌ها برای نوآوری در زمینه‌های مربوطه‌شان را محدود می‌کند.
  - ایالت این خدمات را بیش از حد مهم می‌داند که به نیروهای بازار واگذار شود، که منجر به مقررات‌گذاری بیش از حد می‌شود که توسعه حرفه‌ای را خفه می‌کند.
  - انحصارات عمومی بوروکراسی بیش از حدی ایجاد می‌کنند که مانع از تمرکز این حرفه‌ای‌ها بر روی شایستگی‌های اصلی و کیفیت خدماتشان می‌شود.
explanation: |
  نظریه لیبرال استدلال می‌کند که انحصار دولتی یک پارادوکس ایجاد می‌کند: دقیقاً به این دلیل که آموزش و بهداشت بسیار ارزشمند هستند، در یک بازار آزاد به شدت پاداش داده می‌شوند. با این حال، کنترل دولتی این خدمات را کاهش می‌دهد و مانع از دستیابی حرفه‌ای‌ها به جایگاه اجتماعی و اقتصادی شایسته‌شان می‌شود. انحصار دولت از این خدمات اساسی محافظت نمی‌کند بلکه آن‌ها را کم‌ارزش می‌کند، که با منطق نیاز به کنترل دولتی برای خدمات مهم در تضاد است.
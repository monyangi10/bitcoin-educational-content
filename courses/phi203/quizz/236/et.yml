question: Miks kannatavad liberaalsete mõtlejate, nagu Paul Leroy-Beaulieu, sõnul haridus- ja tervishoiutöötajad riikliku monopoli all, hoolimata sellest, et nad osutavad olulisi teenuseid?
answer: Riigimonopol jätab need spetsialistid ilma turutunnustusest ja õiglasest hüvitisest, mida nende väärtuslikud teenused vabas süsteemis loomulikult saaksid
wrong_answers:
  - Riiklik monopoliseerimine tagab nendele spetsialistidele stabiilse töö, kuid piirab nende võimet oma valdkonnas uuendusi teha
  - Riik peab neid teenuseid liiga oluliseks, et neid turujõududele jätta, mis viib ülereguleerimiseni, mis lämmatab professionaalset arengut
  - Riiklikud monopolid tekitavad liigset bürokraatiat, mis takistab neil spetsialistidel keskenduda oma põhipädevusele ja teenuse kvaliteedile
explanation: |
  Liberaalne teooria väidab, et riigimonopoliseerimine tekitab paradoksi: just seetõttu, et haridus ja tervishoid on nii väärtuslikud, oleksid need vabal turul väga tasustatud. Riigi kontroll aga devalveerib neid teenuseid ja takistab spetsialistidel saavutada väärilist sotsiaalset ja majanduslikku staatust. Riigi monopoliseerimine ei kaitse neid olulisi teenuseid, vaid pigem alahindab neid, mis on vastuolus loogikaga, et olulised teenused vajavad riigi kontrolli.
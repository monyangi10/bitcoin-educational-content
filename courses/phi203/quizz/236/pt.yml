question: Segundo pensadores liberais como Paul Leroy-Beaulieu, porque é que os profissionais da educação e da saúde sofrem com a monopolização do Estado, apesar de prestarem serviços essenciais?
answer: O monopólio estatal priva estes profissionais do reconhecimento do mercado e da justa compensação que os seus valiosos serviços receberiam naturalmente num sistema livre
wrong_answers:
  - A monopolização do Estado garante a estes profissionais um emprego estável, mas limita a sua capacidade de inovar nos seus respectivos domínios
  - O Estado considera que estes serviços são demasiado importantes para serem deixados ao sabor das forças do mercado, o que conduz a uma regulamentação excessiva que asfixia o desenvolvimento profissional
  - Os monopólios públicos criam uma burocracia excessiva que impede estes profissionais de se concentrarem nas suas competências essenciais e na qualidade dos serviços
explanation: |
  A teoria liberal argumenta que a monopolização estatal cria um paradoxo: precisamente porque a educação e os cuidados de saúde são tão valiosos, seriam altamente recompensados num mercado livre. No entanto, o controlo estatal deprecia estes serviços e impede os profissionais de alcançarem o seu merecido estatuto social e económico. A monopolização do Estado não protege estes serviços essenciais, mas antes os desvaloriza, contradizendo a lógica de que os serviços importantes precisam do controlo do Estado.
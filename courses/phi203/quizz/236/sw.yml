question: Kulingana na wanafikra huria kama Paul Leroy-Beaulieu, kwa nini wataalamu wa elimu na huduma za afya wanateseka chini ya ukiritimba wa serikali licha ya kutoa huduma muhimu?
answer: Ukiritimba wa serikali unawanyima wataalamu hawa utambuzi wa soko na fidia ya haki ambayo huduma zao muhimu zingepokea kwa kawaida katika mfumo huru.
wrong_answers:
  - Ukiritimba wa serikali huhakikisha wataalamu hawa wanapata ajira thabiti lakini hupunguza uwezo wao wa kuvumbua katika nyanja zao husika.
  - Serikali inaona huduma hizi kuwa muhimu sana kuziacha kwa nguvu za soko, na kusababisha udhibiti kupita kiasi unaozuia maendeleo ya kitaaluma.
  - Ukiritimba wa umma huunda urasimu mwingi unaowazuia wataalamu hawa kuzingatia uwezo wao wa msingi na ubora wa huduma.
explanation: |
  Nadharia ya kiliberali inasema kwamba ukiritimba wa serikali huunda kitendawili: haswa kwa sababu elimu na huduma za afya ni muhimu sana, zingelipwa sana katika soko huria. Hata hivyo, udhibiti wa serikali unapunguza thamani ya huduma hizi na kuwazuia wataalamu kufikia hadhi yao inayostahili kijamii na kiuchumi. Ukiritimba wa serikali haulindi huduma hizi muhimu bali huzipunguza thamani, ikipingana na mantiki kwamba huduma muhimu zinahitaji udhibiti wa serikali.
question: Какова, согласно рассмотренной французской либеральной традиции, основная причина появления собственности в человеческом обществе?
answer: Собственность возникает как прямое следствие физического существования людей как тел, занимающих пространство
wrong_answers:
  - Собственность возникает на основе социальных договоров, устанавливаемых политическими властями и правовыми системами
  - Собственность возникает в результате экономической конкуренции и стремления к накоплению материальных благ
  - Собственность возникает на основе культурных традиций, передающихся из поколения в поколение, и социальных обычаев
explanation: |
  Французские либеральные мыслители, в частности "Идеологи", считали, что собственность не является произвольным социальным конструктом, а вытекает из того основного факта, что люди - физические существа, которые обязательно занимают пространство. Когда кто-то спит в кровати, он занимает исключительно ее - это свидетельствует о том, что собственность естественным образом вытекает из нашего телесного существования. Даже такие базовые биологические функции, как съесть яблоко или вдохнуть воздух, подразумевают присвоение. Это делает собственность фундаментальной реальностью, укорененной в человеческой природе, а не просто социальной конвенцией, правовой основой, экономической системой или культурной традицией.
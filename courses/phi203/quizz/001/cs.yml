question: Jaký je podle diskutované francouzské liberální tradice základní důvod vzniku vlastnictví v lidské společnosti?
answer: Vlastnictví vzniká jako přímý důsledek fyzické existence člověka jako těla obývajícího prostor
wrong_answers:
  - Vlastnictví vzniká na základě společenských smluv uzavřených politickými orgány a právními systémy
  - Vlastnictví vzniká z ekonomické konkurence a touhy hromadit hmotné bohatství
  - Vlastnictví vzniká na základě kulturních tradic předávaných z generace na generaci a společenských zvyklostí
explanation: |
  Francouzští liberální myslitelé, zejména ideologové, zjistili, že vlastnictví není svévolnou sociální konstrukcí, ale vychází ze základní skutečnosti, že lidé jsou fyzické bytosti, které nutně obývají prostor. Když někdo spí v posteli, zabírá ji výhradně - to dokazuje, že vlastnictví přirozeně vyplývá z naší tělesné existence. Dokonce i základní biologické funkce, jako je konzumace jablka nebo dýchání vzduchu, zahrnují přivlastňování. Díky tomu je vlastnictví základní skutečností zakořeněnou v lidské přirozenosti, nikoli pouhou společenskou konvencí, právním rámcem, ekonomickým systémem nebo kulturní tradicí.
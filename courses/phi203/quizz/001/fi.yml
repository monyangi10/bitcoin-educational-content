question: Mikä on käsitellyn ranskalaisen liberaalin perinteen mukaan perimmäinen syy siihen, miksi omaisuus syntyy ihmisyhteiskunnassa?
answer: Omistus syntyy suorana seurauksena ihmisten fyysisestä olemassaolosta ruumiina, jotka käyttävät tilaa
wrong_answers:
  - Omaisuus syntyy poliittisten viranomaisten ja oikeusjärjestelmien laatimista yhteiskuntasopimuksista
  - Omaisuus syntyy taloudellisesta kilpailusta ja halusta kerätä aineellista vaurautta
  - Omaisuus syntyy sukupolvelta toiselle siirtyneistä kulttuuriperinteistä ja sosiaalisista tavoista
explanation: |
  Ranskalaiset liberaalit ajattelijat, erityisesti ideologit, totesivat, että omaisuus ei ole mielivaltainen sosiaalinen konstruktio, vaan se juontaa juurensa siitä, että ihmiset ovat fyysisiä olentoja, jotka välttämättä käyttävät tilaa. Kun joku nukkuu sängyssä, hän käyttää sitä yksinomaan - tämä osoittaa, että omaisuus syntyy luonnollisesti ruumiillisesta olemassaolostamme. Jopa biologisiin perustoimintoihin, kuten omenan syömiseen tai ilman hengittämiseen, liittyy omistusoikeus. Tämä tekee omaisuudesta pikemminkin ihmisluontoon juurtuneen perustavanlaatuisen todellisuuden kuin pelkän sosiaalisen sopimuksen, oikeudellisen kehyksen, talousjärjestelmän tai kulttuuriperinteen.
question: Mis on käsitletud prantsuse liberaalse traditsiooni kohaselt põhiline põhjus, miks omand tekib inimühiskonnas?
answer: Omand tekib otsese tagajärjena inimeste kui ruumi hõivavate kehade füüsilisest eksistentsist
wrong_answers:
  - Omand tuleneb poliitiliste võimude ja õigussüsteemide poolt kehtestatud ühiskondlikest lepingutest
  - Omand tuleneb majanduslikust konkurentsist ja soovist koguda materiaalset rikkust
  - Omand tuleneb kultuuritraditsioonidest, mis on põlvest põlve edasi antud, ja sotsiaalsetest tavadest
explanation: |
  Prantsuse liberaalsed mõtlejad, eriti ideoloogid, leidsid, et omand ei ole meelevaldne sotsiaalne konstruktsioon, vaid tuleneb põhitõest, et inimesed on füüsilised olendid, kes paratamatult hõivavad ruumi. Kui keegi magab voodis, siis hõivab ta seda ainuüksi - see näitab, et omand tuleneb loomulikult meie kehalisest eksistentsist. Isegi põhilised bioloogilised funktsioonid, nagu õuna söömine või õhu sissehingamine, hõlmavad omastamist. See muudab omandi pigem inimloomuses juurdunud põhireaalsuseks kui pelgalt sotsiaalseks konventsiooniks, õiguslikuks raamistikuks, majandussüsteemiks või kultuuritraditsiooniks.
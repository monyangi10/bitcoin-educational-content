question: Tartışılan Fransız liberal geleneğine göre, mülkiyetin insan toplumunda ortaya çıkmasının temel nedeni nedir?
answer: Mülkiyet, mekânı işgal eden bedenler olarak insanların fiziksel varlığının doğrudan bir sonucu olarak ortaya çıkar
wrong_answers:
  - Mülkiyet, siyasi otoriteler ve hukuk sistemleri tarafından oluşturulan sosyal sözleşmelerden doğar
  - Mülkiyet, ekonomik rekabet ve maddi zenginlik biriktirme arzusundan ortaya çıkar
  - Mülkiyet, nesiller boyunca aktarılan kültürel geleneklerden ve sosyal adetlerden ortaya çıkar
explanation: |
  Fransız liberal düşünürler, özellikle de İdeologlar, mülkiyetin keyfi bir sosyal yapı olmadığını, insanların zorunlu olarak mekânı işgal eden fiziksel varlıklar olduğu temel gerçeğinden kaynaklandığını tespit etmişlerdir. Birisi bir yatakta uyuduğunda, sadece o yatağı işgal etmiş olur - bu da mülkiyetin doğal olarak bedensel varlığımızdan kaynaklandığını gösterir. Bir elma yemek ya da hava solumak gibi temel biyolojik işlevler bile mülk edinmeyi içerir. Bu da mülkiyeti salt bir sosyal gelenek, yasal çerçeve, ekonomik sistem ya da kültürel gelenek olmaktan ziyade insan doğasında kök salmış temel bir gerçeklik haline getirmektedir.
question: ตามประเพณีเสรีนิยมของฝรั่งเศสที่กล่าวถึง เหตุผลพื้นฐานที่ทำให้ทรัพย์สินเกิดขึ้นในสังคมมนุษย์คืออะไร?
answer: ทรัพย์สินเกิดขึ้นโดยตรงจากการมีอยู่ทางกายภาพของมนุษย์ในฐานะร่างกายที่ครอบครองพื้นที่
wrong_answers:
  - ทรัพย์สินเกิดจากสัญญาทางสังคมที่จัดตั้งขึ้นโดยเจ้าหน้าที่ทางการเมืองและระบบกฎหมาย
  - ทรัพย์สินเกิดขึ้นจากการแข่งขันทางเศรษฐกิจและความต้องการสะสมความมั่งคั่งทางวัตถุ
  - ทรัพย์สินเกิดจากประเพณีวัฒนธรรมที่สืบทอดกันมาหลายชั่วอายุคนและขนบธรรมเนียมทางสังคม
explanation: |
  นักคิดเสรีนิยมชาวฝรั่งเศส โดยเฉพาะกลุ่ม Ideologues ได้ระบุว่าทรัพย์สินไม่ใช่การสร้างสรรค์ทางสังคมที่เกิดขึ้นโดยพลการ แต่เกิดจากข้อเท็จจริงพื้นฐานที่ว่ามนุษย์เป็นสิ่งมีชีวิตที่มีร่างกายซึ่งจำเป็นต้องครอบครองพื้นที่ เมื่อมีคนหนึ่งนอนบนเตียง พวกเขาครอบครองเตียงนั้นโดยเฉพาะ - สิ่งนี้แสดงให้เห็นว่าทรัพย์สินเกิดขึ้นตามธรรมชาติจากการมีอยู่ของร่างกายของเรา แม้แต่การทำงานทางชีววิทยาขั้นพื้นฐานเช่นการกินแอปเปิ้ลหรือการหายใจเอาอากาศเข้าไปก็เกี่ยวข้องกับการครอบครอง สิ่งนี้ทำให้ทรัพย์สินเป็นความจริงพื้นฐานที่หยั่งรากลึกในธรรมชาติของมนุษย์มากกว่าที่จะเป็นเพียงขนบธรรมเนียมทางสังคม กรอบกฎหมาย ระบบเศรษฐกิจ หรือประเพณีทางวัฒนธรรม
question: طبقاً به سنت لیبرال فرانسوی مورد بحث، دلیل اساسی ظهور مالکیت در جامعه انسانی چیست؟
answer: ملکیت به عنوان نتیجه مستقیم وجود فیزیکی انسان‌ها به عنوان بدن‌هایی که فضا را اشغال می‌کنند، پدیدار می‌شود.
wrong_answers:
  - ملکیت از قراردادهای اجتماعی که توسط مقامات سیاسی و سیستم‌های قانونی برقرار شده‌اند، پدید می‌آید.
  - اموال از رقابت اقتصادی و تمایل به انباشت ثروت مادی پدید می‌آید.
  - اموال از سنت‌های فرهنگی که از نسلی به نسل دیگر منتقل می‌شوند و آداب اجتماعی ناشی می‌شود.
explanation: |
  اندیشمندان لیبرال فرانسوی، به‌ویژه ایدئولوگ‌ها، تشخیص دادند که مالکیت یک ساختار اجتماعی دل‌بخواهی نیست بلکه از این واقعیت اساسی ناشی می‌شود که انسان‌ها موجودات فیزیکی هستند که به‌طور ضروری فضایی را اشغال می‌کنند. وقتی کسی در تختی می‌خوابد، آن را به‌طور انحصاری اشغال می‌کند - این نشان می‌دهد که مالکیت به‌طور طبیعی از وجود جسمانی ما پدید می‌آید. حتی عملکردهای زیستی پایه مانند خوردن یک سیب یا تنفس هوا شامل تصاحب می‌شود. این امر مالکیت را به یک واقعیت بنیادی ریشه‌دار در طبیعت انسانی تبدیل می‌کند، نه صرفاً یک قرارداد اجتماعی، چارچوب قانونی، سیستم اقتصادی یا سنت فرهنگی.
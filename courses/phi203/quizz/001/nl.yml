question: Wat is volgens de besproken Franse liberale traditie de fundamentele reden waarom eigendom ontstaat in de menselijke samenleving?
answer: Eigendom ontstaat als een direct gevolg van het fysieke bestaan van mensen als lichamen die ruimte innemen
wrong_answers:
  - Eigendom komt voort uit sociale contracten die zijn opgesteld door politieke autoriteiten en rechtssystemen
  - Eigendom komt voort uit economische concurrentie en het verlangen om materiële rijkdom te vergaren
  - Eigendom komt voort uit culturele tradities die generaties lang zijn doorgegeven en uit sociale gewoonten
explanation: |
  De Franse liberale denkers, met name de Ideologen, stelden vast dat eigendom geen arbitraire sociale constructie is, maar voortkomt uit het basisgegeven dat mensen fysieke wezens zijn die noodzakelijkerwijs ruimte innemen. Als iemand in een bed slaapt, neemt hij dat bed exclusief in gebruik - dit toont aan dat eigendom van nature voortkomt uit ons lichamelijke bestaan. Zelfs biologische basisfuncties zoals het eten van een appel of het inademen van lucht gaan gepaard met toe-eigening. Dit maakt eigendom tot een fundamentele realiteit die geworteld is in de menselijke natuur in plaats van louter een sociale conventie, juridisch kader, economisch systeem of culturele traditie.
question: Wat vormt volgens de besproken principes de basis voor legitiem eigendom van land?
answer: Werk en arbeid geïnvesteerd in het productief maken van het land
wrong_answers:
  - Toestemming van de overheid en wettelijke documentatie
  - Historische erfenis van vorige generaties
  - Natuurlijk recht alleen gebaseerd op fysieke bezetting
explanation: |
  De tekst benadrukt dat eigendom van land fundamenteel gebaseerd is op het werk dat erin geïnvesteerd is. Het voorbeeld van het zweetland illustreert dit principe - maagdelijk land kan niet voldoen aan menselijke behoeften totdat het is ontgonnen, bewerkt en onderhouden door arbeid. Dit werk verandert onproductief land in iets bruikbaars en legt de legitieme basis voor eigendom. Toestemming van de overheid is eerder een juridische formaliteit dan een fundamentele rechtvaardiging, vererving draagt bestaande eigendomsrechten over in plaats van ze te creëren, en louter fysieke bezetting zonder productieve arbeid legt niet dezelfde legitieme claim als investeringen in arbeid.
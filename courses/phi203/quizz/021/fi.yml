question: Mikä on käsiteltyjen periaatteiden mukaan maan laillisen omistusoikeuden perusta?
answer: Työ ja työvoima, joka on sijoitettu maan tuottavuuden parantamiseen
wrong_answers:
  - Hallituksen lupa ja oikeudelliset asiakirjat
  - Historiallinen perintö edellisiltä sukupolvilta
  - Luonnollinen oikeus, joka perustuu pelkästään fyysiseen asumiseen
explanation: |
  Tekstissä korostetaan, että maan omistusoikeus perustuu pohjimmiltaan siihen sijoitettuun työhön. Esimerkki hikoilevasta maasta havainnollistaa tätä periaatetta - neitseellinen maa ei voi tyydyttää ihmisen tarpeita ennen kuin se on raivattu, viljelty ja ylläpidetty työn avulla. Tämä työ muuttaa tuottamattoman maan joksikin hyödylliseksi, mikä luo laillisen perustan omistusoikeudelle. Valtion lupa edustaa pikemminkin oikeudellista muodollisuutta kuin perustavaa laatua olevaa oikeutusta, perintö siirtää olemassa olevia omistusoikeuksia pikemminkin kuin luo niitä, eikä pelkkä fyysinen asuttaminen ilman tuottavaa työtä luo samanlaista oikeutettua vaatimusta kuin työpanos.
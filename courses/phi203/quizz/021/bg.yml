question: Според разгледаните принципи, какво служи за основа на законната собственост върху земята?
answer: Работа и труд, вложени в превръщането на земята в продуктивна
wrong_answers:
  - Правителствено разрешение и правна документация
  - Историческо наследство от предишните поколения
  - Естествено право, основано само на физическо обитаване
explanation: |
  В текста се подчертава, че собствеността върху земята се основава основно на вложения в нея труд. Примерът с потната земя ясно илюстрира този принцип - девствената земя не може да задоволи човешките нужди, докато не бъде разчистена, обработена и поддържана чрез труд. Този труд превръща непродуктивната земя в нещо полезно, създавайки законното основание за собственост. Правителственото разрешение представлява по-скоро правна формалност, отколкото фундаментална обосновка, наследяването прехвърля съществуващи права на собственост, вместо да ги създава, а простото физическо обитаване без продуктивна работа не установява същата легитимна претенция, каквато установява инвестицията в труд.
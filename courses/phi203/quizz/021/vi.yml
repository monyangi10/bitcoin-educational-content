question: Theo các nguyên tắc đã thảo luận, điều gì đóng vai trò là nền tảng cho quyền sở hữu đất đai hợp pháp?
answer: Công sức và lao động đầu tư vào việc làm cho đất đai trở nên màu mỡ.
wrong_answers:
  - Giấy phép của chính phủ và tài liệu pháp lý
  - Di sản lịch sử từ các thế hệ trước
  - Quyền tự nhiên chỉ dựa trên sự chiếm hữu vật chất.
explanation: |
  Văn bản nhấn mạnh rằng quyền sở hữu đất đai về cơ bản dựa trên công sức lao động bỏ ra. Ví dụ về người khai hoang đất minh họa nguyên tắc này - đất hoang không thể đáp ứng nhu cầu của con người cho đến khi được khai hoang, canh tác và duy trì bằng lao động. Công việc này biến đất đai không hiệu quả thành thứ hữu ích, thiết lập cơ sở pháp lý cho quyền sở hữu. Sự cho phép của chính phủ chỉ mang tính hình thức pháp lý chứ không phải là sự biện minh cơ bản, thừa kế chuyển giao các quyền sở hữu hiện có chứ không tạo ra chúng, và việc chiếm hữu đơn thuần mà không có lao động sản xuất không tạo ra quyền sở hữu hợp pháp như đầu tư lao động.
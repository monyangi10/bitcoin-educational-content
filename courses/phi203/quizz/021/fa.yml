question: بر اساس اصول مورد بحث، چه چیزی به عنوان پایه‌ای برای مالکیت قانونی زمین عمل می‌کند؟
answer: کار و زحمتی که برای بهره‌وری زمین صرف شده است
wrong_answers:
  - مجوز دولتی و مستندات قانونی
  - ارث تاریخی از نسل‌های گذشته
  - حق طبیعی مبتنی بر اشغال فیزیکی تنها
explanation: |
  متن تأکید می‌کند که مالکیت زمین اساساً بر اساس کاری است که در آن سرمایه‌گذاری شده است. مثال پاک‌کننده زمین عرق‌ریز این اصل را نشان می‌دهد - زمین بکر نمی‌تواند نیازهای انسانی را برآورده کند تا زمانی که از طریق کار پاک، کشت و نگهداری شود. این کار زمین غیرمولد را به چیزی مفید تبدیل می‌کند و پایه مشروعی برای مالکیت ایجاد می‌کند. مجوز دولتی نمایانگر رسمیت قانونی است نه توجیه اساسی، ارث حقوق مالکیت موجود را منتقل می‌کند نه اینکه آنها را ایجاد کند، و اشغال فیزیکی صرف بدون کار مولد همان ادعای مشروعی را که سرمایه‌گذاری کار دارد، ایجاد نمی‌کند.
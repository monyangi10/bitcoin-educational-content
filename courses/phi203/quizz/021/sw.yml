question: Kulingana na kanuni zilizojadiliwa, ni nini kinachotumika kama msingi wa umiliki halali wa mali ya ardhi?
answer: Kazi na nguvu kazi zilizowekezwa katika kuifanya ardhi iwe na tija
wrong_answers:
  - Idhini ya serikali na nyaraka za kisheria
  - Urithi wa kihistoria kutoka kwa vizazi vilivyopita
  - Haki ya asili kulingana na kazi ya kimwili pekee
explanation: |
  Maandishi yanasisitiza kwamba umiliki wa mali wa ardhi kimsingi unategemea kazi iliyowekezwa ndani yake. Mfano wa ardhi inayovuja jasho unaonyesha wazi kanuni hii - ardhi isiyo na rutuba haiwezi kukidhi mahitaji ya binadamu hadi itakaposafishwa, kupandwa, na kudumishwa kupitia kazi. Kazi hii inabadilisha ardhi isiyozalisha kuwa kitu muhimu, ikiweka msingi halali wa umiliki. Idhini ya serikali inawakilisha utaratibu wa kisheria badala ya uhalalishaji wa msingi, urithi huhamisha haki zilizopo za mali badala ya kuziunda, na kazi ya kimwili tu bila kazi ya uzalishaji haileti madai sawa halali kama uwekezaji wa kazi unavyofanya.
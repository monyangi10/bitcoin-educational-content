question: Zgodnie z omówionymi zasadami, co stanowi podstawę legalnej własności ziemi?
answer: Praca i robocizna zainwestowane w uczynienie ziemi produktywną
wrong_answers:
  - Autoryzacja rządowa i dokumentacja prawna
  - Historyczne dziedzictwo po poprzednich pokoleniach
  - Prawo naturalne oparte wyłącznie na fizycznym zajęciu
explanation: |
  Tekst podkreśla, że własność ziemi jest zasadniczo oparta na zainwestowanej w nią pracy. Przykład pocącej się ziemi lepiej ilustruje tę zasadę - dziewicza ziemia nie może zaspokoić ludzkich potrzeb, dopóki nie zostanie oczyszczona, uprawiana i utrzymywana dzięki pracy. Praca ta przekształca nieproduktywną ziemię w coś użytecznego, ustanawiając uzasadnioną podstawę własności. Autoryzacja rządowa stanowi raczej formalność prawną niż fundamentalne uzasadnienie, dziedziczenie przenosi istniejące prawa własności, a nie je tworzy, a zwykłe fizyczne zajęcie bez produktywnej pracy nie ustanawia takiego samego uzasadnionego roszczenia, jak inwestycja pracy.
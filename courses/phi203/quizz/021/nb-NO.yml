question: Hva er grunnlaget for legitim eiendomsrett til jord, ifølge de prinsippene vi har diskutert?
answer: Arbeid og arbeidskraft investert i å gjøre jorden produktiv
wrong_answers:
  - Myndighetsgodkjenning og juridisk dokumentasjon
  - Historisk arv fra tidligere generasjoner
  - Naturlig rettighet basert på fysisk okkupasjon alene
explanation: |
  Teksten understreker at eiendomsretten til jord i bunn og grunn er basert på det arbeidet som er investert i den. Eksemplet med den svette jorda illustrerer dette prinsippet tydeligere - jomfruelig jord kan ikke tilfredsstille menneskelige behov før den er ryddet, dyrket og vedlikeholdt gjennom arbeid. Dette arbeidet forvandler uproduktiv jord til noe nyttig, og etablerer det legitime grunnlaget for eierskap. Myndighetsgodkjenning representerer en juridisk formalitet snarere enn en grunnleggende begrunnelse, arv overfører eksisterende eiendomsrettigheter snarere enn å skape dem, og ren fysisk okkupasjon uten produktivt arbeid etablerer ikke det samme legitime kravet som investering i arbeid gjør.
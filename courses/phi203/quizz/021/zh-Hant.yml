question: 根據所討論的原則，什麼是土地合法財產所有權的基礎？
answer: 為使土地具生產力而投入的工作與勞力
wrong_answers:
  - 政府授權和法律文件
  - 上一代的歷史遺產
  - 僅基於實際佔有的自然權利
explanation: |
  文中強調土地的財產所有權根本上是基於投入在土地上的勞動。汗流浹背的例子更能說明這個原則--原始的土地必須透過勞動來清理、耕作和維護，才能滿足人類的需求。這種勞動將非生產性的土地轉變為有用的東西，建立了所有權的合法基礎。政府授權代表的是法律上的形式，而非根本上的理由；繼承轉移現有的財產權，而非創造財產權；僅有實際佔用而無生產性工作，也無法建立與勞動投資相同的合法主張。
question: 논의된 원칙에 따르면 토지에 대한 합법적인 재산 소유권의 기초가 되는 것은 무엇인가요?
answer: 토지의 생산성을 높이기 위해 투자된 노동력과 노동력
wrong_answers:
  - 정부 승인 및 법적 문서
  - 이전 세대로부터의 역사적 상속
  - 물리적 직업만을 기반으로 한 자연권
explanation: |
  본문은 토지에 대한 재산 소유권은 근본적으로 토지에 투자된 노동에 기초한다는 점을 강조합니다. 땀 흘려 개간한 땅의 예는 이 원칙을 잘 보여줍니다. 원시 토지는 노동을 통해 개간, 경작, 유지 관리되기 전까지는 인간의 필요를 충족시킬 수 없습니다. 이 작업은 비생산적인 토지를 유용한 것으로 바꾸어 소유권에 대한 합법적인 근거를 마련합니다. 정부 승인은 근본적인 정당성보다는 법적 형식을, 상속은 재산권을 창출하기보다는 기존의 재산권을 이전하는 것이며, 생산적인 노동 없이 단순히 물리적으로 점유하는 것은 노동 투자와 같은 정당한 권리를 확립하지 못합니다.
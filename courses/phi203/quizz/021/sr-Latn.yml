question: Prema principima o kojima se raspravljalo, šta služi kao osnova za legitimno vlasništvo nad zemljištem?
answer: Rad i trud uložen u činjenje zemlje produktivnom
wrong_answers:
  - Vladino ovlašćenje i pravna dokumentacija
  - Istorijsko nasleđe od prethodnih generacija
  - Prirodno pravo zasnovano samo na fizičkoj okupaciji
explanation: |
  Tekst naglašava da se vlasništvo nad zemljom suštinski zasniva na radu uloženom u nju. Primer znojnog čistača zemlje ilustruje ovaj princip - netaknuta zemlja ne može zadovoljiti ljudske potrebe dok se ne očisti, obrađuje i održava kroz rad. Ovaj rad pretvara neproduktivnu zemlju u nešto korisno, uspostavljajući legitimnu osnovu za vlasništvo. Vladina ovlašćenja predstavljaju pravnu formalnost, a ne suštinsko opravdanje, nasleđivanje prenosi postojeća vlasnička prava umesto da ih stvara, a puka fizička okupacija bez produktivnog rada ne uspostavlja isti legitimni zahtev kao ulaganje rada.
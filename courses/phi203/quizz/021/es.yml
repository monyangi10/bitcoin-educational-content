question: Según los principios debatidos, ¿cuál es el fundamento de la propiedad legítima de la tierra?
answer: Trabajo y mano de obra invertidos en hacer que la tierra sea productiva
wrong_answers:
  - Autorización gubernamental y documentación legal
  - Herencia histórica de generaciones anteriores
  - Derecho natural basado únicamente en la ocupación física
explanation: |
  El texto subraya que la propiedad de la tierra se basa fundamentalmente en el trabajo invertido en ella. El ejemplo de la tierra que suda más claro ilustra este principio: la tierra virgen no puede satisfacer las necesidades humanas hasta que se desbroza, cultiva y mantiene mediante el trabajo. Este trabajo transforma la tierra improductiva en algo útil, estableciendo la base legítima de la propiedad. La autorización del gobierno representa una formalidad legal más que una justificación fundamental, la herencia transfiere derechos de propiedad existentes más que crearlos, y la mera ocupación física sin trabajo productivo no establece el mismo derecho legítimo que la inversión de trabajo.
question: Was ist nach den erörterten Grundsätzen die Grundlage für rechtmäßiges Eigentum an Grund und Boden?
answer: Arbeit und Mühe, die investiert werden, um das Land produktiv zu machen
wrong_answers:
  - Behördliche Genehmigung und rechtliche Dokumentation
  - Historisches Erbe von früheren Generationen
  - Natürliches Recht, das allein auf physischer Besetzung beruht
explanation: |
  Der Text unterstreicht, dass das Eigentum an Grund und Boden im Wesentlichen auf der Arbeit beruht, die in ihn investiert wurde. Das Beispiel des schwitzenden Landaufräumers veranschaulicht diesen Grundsatz - jungfräuliches Land kann die menschlichen Bedürfnisse erst dann befriedigen, wenn es durch Arbeit gerodet, kultiviert und gepflegt wird. Diese Arbeit verwandelt unproduktives Land in etwas Nützliches und schafft die legitime Grundlage für Eigentum. Die staatliche Genehmigung ist eher eine juristische Formalität als eine grundsätzliche Rechtfertigung, die Vererbung überträgt bestehende Eigentumsrechte, anstatt sie zu schaffen, und die bloße physische Inbesitznahme ohne produktive Arbeit begründet nicht denselben legitimen Anspruch wie die Arbeitsinvestition.
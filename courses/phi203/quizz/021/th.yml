question: ตามหลักการที่ได้กล่าวถึง อะไรคือพื้นฐานสำหรับการเป็นเจ้าของที่ดินอย่างถูกต้องตามกฎหมาย?
answer: การทำงานและแรงงานที่ลงทุนเพื่อทำให้ที่ดินเกิดผลผลิต
wrong_answers:
  - การอนุญาตจากรัฐบาลและเอกสารทางกฎหมาย
  - มรดกทางประวัติศาสตร์จากรุ่นก่อนหน้า
  - สิทธิตามธรรมชาติที่อิงจากการครอบครองทางกายภาพเพียงอย่างเดียว
explanation: |
  ข้อความนี้เน้นย้ำว่าการเป็นเจ้าของที่ดินนั้นมีพื้นฐานมาจากการทำงานที่ลงทุนในที่ดินนั้น ตัวอย่างของผู้ที่ทำงานหนักในการถางที่ดินแสดงให้เห็นถึงหลักการนี้ - ที่ดินบริสุทธิ์ไม่สามารถตอบสนองความต้องการของมนุษย์ได้จนกว่าจะถูกถาง ปลูกพืช และดูแลรักษาผ่านการทำงาน การทำงานนี้เปลี่ยนที่ดินที่ไม่ก่อให้เกิดประโยชน์ให้กลายเป็นสิ่งที่มีประโยชน์ สร้างพื้นฐานที่ชอบธรรมสำหรับการเป็นเจ้าของ การอนุญาตจากรัฐบาลเป็นเพียงพิธีการทางกฎหมายมากกว่าการให้เหตุผลพื้นฐาน การสืบทอดเป็นการโอนสิทธิ์ในทรัพย์สินที่มีอยู่แล้วมากกว่าการสร้างสิทธิ์ใหม่ และการครอบครองทางกายภาพโดยไม่มีการทำงานที่ก่อให้เกิดประโยชน์ไม่สามารถสร้างสิทธิ์ที่ชอบธรรมเช่นเดียวกับการลงทุนแรงงานได้
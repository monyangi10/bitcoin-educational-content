question: Tartışılan ilkelere göre, arazinin meşru mülkiyeti için temel teşkil eden şey nedir?
answer: Araziyi verimli hale getirmek için harcanan iş ve emek
wrong_answers:
  - Hükümet izni ve yasal belgeler
  - Önceki nesillerden gelen tarihsel miras
  - Yalnızca fiziksel işgale dayalı doğal hak
explanation: |
  Metin, toprak üzerindeki mülkiyetin temelde ona harcanan emeğe dayandığını vurgulamaktadır. Terleyen toprak örneği bu ilkeyi daha açık bir şekilde ortaya koymaktadır: bakir toprak, emek yoluyla temizlenmedikçe, işlenmedikçe ve bakımı yapılmadıkça insan ihtiyaçlarını karşılayamaz. Bu çalışma, verimsiz araziyi faydalı bir şeye dönüştürerek mülkiyet için meşru bir temel oluşturur. Hükümet izni, temel gerekçelendirmeden ziyade yasal formaliteyi temsil eder; miras, mevcut mülkiyet haklarını oluşturmaktan ziyade aktarır ve üretken çalışma olmaksızın salt fiziksel işgal, emek yatırımıyla aynı meşru iddiayı oluşturmaz.
question: Enligt de principer som diskuterats, vad utgör grunden för legitim äganderätt till mark?
answer: Arbete och arbetskraft som investerats i att göra marken produktiv
wrong_answers:
  - Myndighetsgodkännande och juridisk dokumentation
  - Historiskt arv från tidigare generationer
  - Naturlig rättighet baserad enbart på fysisk ockupation
explanation: |
  I texten betonas att äganderätten till mark i grunden baseras på det arbete som investerats i den. Exemplet med den svettande markrensaren illustrerar denna princip - jungfrulig mark kan inte tillfredsställa mänskliga behov förrän den röjs, odlas och underhålls genom arbete. Detta arbete förvandlar improduktiv mark till något användbart, vilket utgör den legitima grunden för ägande. Statliga tillstånd utgör en juridisk formalitet snarare än ett grundläggande rättfärdigande, arv överför befintliga äganderätter snarare än skapar dem, och enbart fysisk ockupation utan produktivt arbete etablerar inte samma legitima anspråk som investeringar i arbete gör.
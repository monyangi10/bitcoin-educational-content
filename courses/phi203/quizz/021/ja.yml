question: 議論されている原則によれば、土地の合法的な所有権の基礎となるものは何か？
answer: 土地を生産的にするために投資された仕事と労働力
wrong_answers:
  - 政府認可および法的文書
  - 前世代からの歴史的継承
  - 物理的占有のみに基づく自然権
explanation: |
  この文章は、土地の所有権は基本的にそこに投入された労働に基づいていることを強調している。未開の土地は、労働によって開墾され、耕作され、維持されない限り、人間の欲求を満たすことはできない。この労働は、生産性のない土地を有用なものに変え、所有権の正当な根拠を確立する。政府の認可は、根本的な正当化ではなく法的な形式を表すものであり、相続は財産権を創出するのではなく、既存の財産権を移転するものであり、生産的労働を伴わない単なる物理的占有は、労働投資と同じ正当な権利を確立するものではない。
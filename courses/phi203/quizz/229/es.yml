question: Según la teoría económica liberal, ¿qué hace que las relaciones contractuales sean fundamentalmente diferentes de la dirección centralizada a la hora de promover el progreso humano y la innovación?
answer: Los contratos permiten a los individuos liberarse de los patrones establecidos y crear soluciones novedosas a través de aptitudes diversas y circunstancias cambiantes
wrong_answers:
  - Los contratos ofrecen mejores mecanismos de supervisión y control de calidad que los sistemas centralizados
  - Los contratos garantizan la distribución equitativa de recursos y oportunidades entre todas las clases sociales y sectores económicos
  - Los contratos crean procedimientos estandarizados que eliminan el riesgo y la incertidumbre de las transacciones económicas
explanation: |
  El texto subraya que la libertad contractual permite la perfectibilidad humana porque la dirección centralizada sólo reproduce patrones de producción conocidos, mientras que la libertad de trabajo permite a las personas ir más allá de los caminos establecidos hacia nuevas creaciones. Esto ocurre porque los individuos tienen fuerzas, aptitudes y objetivos diversos que evolucionan con las circunstancias cambiantes. Las respuestas erróneas contradicen los principios liberales básicos: los contratos no persiguen principalmente el control normativo, la distribución equitativa o la eliminación de riesgos, sino el beneficio mutuo voluntario y la innovación a través de la libertad individual.
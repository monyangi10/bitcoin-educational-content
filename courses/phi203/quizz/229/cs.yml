question: Čím se podle liberální ekonomické teorie smluvní vztahy zásadně liší od centralizovaného řízení při podpoře lidského pokroku a inovací?
answer: Smlouvy umožňují jednotlivcům vymanit se ze zavedených vzorců a vytvářet nová řešení díky různým schopnostem a měnícím se okolnostem
wrong_answers:
  - Smlouvy poskytují lepší regulační dohled a mechanismy kontroly kvality, než mohou nabídnout centralizované systémy
  - Smlouvy zajišťují rovné rozdělení zdrojů a příležitostí mezi všechny sociální vrstvy a ekonomické sektory
  - Smlouvy vytvářejí standardizované postupy, které eliminují riziko a nejistotu z hospodářských transakcí
explanation: |
  Text zdůrazňuje, že smluvní svoboda umožňuje lidskou dokonalost, protože centralizované řízení pouze reprodukuje známé vzorce výroby, zatímco svoboda práce umožňuje lidem překračovat zavedené cesty a vytvářet nové. K tomu dochází proto, že jednotlivci mají různé síly, schopnosti a cíle, které se vyvíjejí s měnícími se okolnostmi. Špatné odpovědi jsou v rozporu se základními liberálními principy: smlouvy primárně nesměřují k regulační kontrole, rovnoměrnému rozdělování nebo eliminaci rizik, ale spíše k dobrovolné vzájemné výhodnosti a inovaci prostřednictvím individuální svobody.
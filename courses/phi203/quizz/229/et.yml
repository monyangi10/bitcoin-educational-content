question: Mis eristab liberaalse majandusteooria kohaselt lepingulisi suhteid põhiliselt tsentraliseeritud juhtimisest, et edendada inimkonna arengut ja innovatsiooni?
answer: Lepingud võimaldavad inimestel vabaneda väljakujunenud mustritest ja luua uudseid lahendusi erinevate võimete ja muutuvate asjaolude kaudu
wrong_answers:
  - Lepingud pakuvad paremat regulatiivset järelevalvet ja kvaliteedikontrollimehhanisme kui tsentraliseeritud süsteemid suudavad pakkuda
  - Lepingud tagavad ressursside ja võimaluste võrdse jaotuse kõigis ühiskonnaklassides ja majandussektorites
  - Lepingud loovad standardiseeritud menetlused, mis kõrvaldavad majandustehingutest riski ja ebakindluse
explanation: |
  Tekstis rõhutatakse, et lepinguvabadus võimaldab inimese täiustatavust, sest tsentraliseeritud juhtimine taastoodab ainult teadaolevaid tootmismustreid, samas kui töövabadus võimaldab inimestel liikuda väljakujunenud teedest kaugemale, uute loomingu suunas. See toimub seetõttu, et inimestel on erinevad jõud, kalduvused ja eesmärgid, mis arenevad koos muutuvate oludega. Valed vastused on vastuolus peamiste liberaalsete põhimõtetega: lepingute eesmärk ei ole eelkõige regulatiivne kontroll, võrdne jaotamine või riskide kõrvaldamine, vaid pigem vabatahtlik vastastikune kasu ja innovatsioon individuaalse vabaduse kaudu.
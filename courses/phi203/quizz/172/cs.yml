question: Proč podle analýzy fyziokratů státní plánování ekonomické činnosti zásadně selhává?
answer: Stát postrádá "oko mistra" - detailní místní znalost, kterou mají pouze jednotlivé ekonomické subjekty při své každodenní činnosti
wrong_answers:
  - Stát nemá dostatek finančních prostředků, aby mohl účinně koordinovat všechna hospodářská odvětví na rozsáhlých územích
  - Političtí představitelé jsou ze své podstaty zkorumpovaní a upřednostňují osobní prospěch před efektivním řízením ekonomiky
  - Demokratické hlasovací procesy jsou příliš pomalé na to, aby rychle reagovaly na rychle se měnící podmínky na trhu
explanation: |
  Fyziokraté identifikovali základní epistemologický problém státního plánování: nemožnost centrálně shromažďovat a zpracovávat rozsáhlé, komplexní a neustále se měnící informace, které jsou hnacím motorem ekonomické činnosti. Tvrdili, že pouze jednotlivé ekonomické subjekty, které působí ve svém specifickém prostředí, disponují podrobnými znalostmi ("l'œil du maître") nezbytnými k přijímání vhodných ekonomických rozhodnutí. Tento poznatek předcházel a předjímal argumenty moderní rakouské školy o problému znalostí v socialistické kalkulaci a ukazoval, že neúspěch centrálního plánování nevyplývá z omezených zdrojů nebo korupce, ale z vnitřní nemožnosti nahradit rozptýlené individuální znalosti centralizovaným byrokratickým rozhodováním.
question: De acordo com a análise dos fisiocratas, porque é que o planeamento estatal da atividade económica falha fundamentalmente?
answer: O Estado não tem o "olho do mestre" - o conhecimento local detalhado que só os agentes económicos individuais possuem nas suas actividades diárias
wrong_answers:
  - O Estado não dispõe de recursos financeiros suficientes para coordenar eficazmente todos os sectores económicos em vastos territórios
  - Os líderes políticos são inerentemente corruptos e dão prioridade ao ganho pessoal em detrimento de uma gestão económica eficiente
  - Os processos democráticos de votação são demasiado lentos para responder rapidamente a condições de mercado em rápida mutação
explanation: |
  Os fisiocratas identificaram um problema epistemológico fundamental com o planeamento estatal: a impossibilidade de recolher e processar centralmente a informação vasta, complexa e em constante mudança que impulsiona a atividade económica. Defendiam que só os agentes económicos individuais, operando nos seus contextos específicos, possuem o conhecimento detalhado ("l'œil du maître") necessário para tomar decisões económicas adequadas. Esta visão antecedeu e antecipou os argumentos da escola austríaca moderna sobre o problema do conhecimento no cálculo socialista, demonstrando que o fracasso do planeamento central não resulta de restrições de recursos ou de corrupção, mas da impossibilidade inerente de substituir o conhecimento individual disperso por uma tomada de decisão burocrática centralizada.
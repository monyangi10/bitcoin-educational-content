question: Prema analizi fiziokrata, zašto državno planiranje ekonomske aktivnosti fundamentalno ne uspeva?
answer: Državi nedostaje 'majstorsko oko' - detaljno lokalno znanje koje samo pojedinačni ekonomski agenti poseduju u svojim svakodnevnim aktivnostima.
wrong_answers:
  - Država ima nedovoljno finansijskih resursa za efikasno koordinisanje svih ekonomskih sektora širom velikih teritorija.
  - Politički lideri su inherentno korumpirani i prioritizuju ličnu korist nad efikasnim ekonomskim upravljanjem.
  - Demokratski procesi glasanja su previše spori da bi brzo odgovorili na brzo promenljive tržišne uslove
explanation: |
  Fiziokrati su identifikovali fundamentalni epistemološki problem sa državnim planiranjem: nemogućnost centralnog prikupljanja i obrade ogromnih, složenih i stalno promenljivih informacija koje pokreću ekonomsku aktivnost. Tvrdili su da samo individualni ekonomski agenti, koji deluju u svojim specifičnim kontekstima, poseduju detaljno znanje ('l'œil du maître') neophodno za donošenje odgovarajućih ekonomskih odluka. Ovo saznanje je prethodilo i predviđalo moderne argumente Austrijske škole o problemu znanja u socijalističkom obračunu, pokazujući da neuspeh centralnog planiranja ne proizlazi iz ograničenja resursa ili korupcije, već iz inherentne nemogućnosti zamene disperzovanog individualnog znanja centralizovanim birokratskim odlučivanjem.
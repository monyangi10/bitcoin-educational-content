question: ตามการวิเคราะห์ของนักเศรษฐศาสตร์ฟิสิโอแครต ทำไมการวางแผนเศรษฐกิจของรัฐจึงล้มเหลวโดยพื้นฐาน?
answer: รัฐขาด 'สายตาของนาย' - ความรู้ในท้องถิ่นที่ละเอียดซึ่งมีเพียงตัวแทนทางเศรษฐกิจแต่ละรายเท่านั้นที่มีในกิจกรรมประจำวันของพวกเขา
wrong_answers:
  - รัฐมีทรัพยากรทางการเงินไม่เพียงพอที่จะประสานงานภาคเศรษฐกิจทั้งหมดอย่างมีประสิทธิภาพในพื้นที่ขนาดใหญ่
  - ผู้นำทางการเมืองมีความทุจริตโดยเนื้อแท้และให้ความสำคัญกับผลประโยชน์ส่วนตัวมากกว่าการจัดการเศรษฐกิจอย่างมีประสิทธิภาพ
  - กระบวนการลงคะแนนเสียงแบบประชาธิปไตยช้าเกินไปที่จะตอบสนองต่อสภาวะตลาดที่เปลี่ยนแปลงอย่างรวดเร็ว
explanation: |
  นักสรีรศาสตร์ได้ระบุปัญหาพื้นฐานทางญาณวิทยากับการวางแผนของรัฐ: ความเป็นไปไม่ได้ในการรวบรวมและประมวลผลข้อมูลที่กว้างขวาง ซับซ้อน และเปลี่ยนแปลงตลอดเวลาซึ่งขับเคลื่อนกิจกรรมทางเศรษฐกิจ พวกเขาโต้แย้งว่าเฉพาะตัวแทนเศรษฐกิจแต่ละรายที่ดำเนินการในบริบทเฉพาะของตนเท่านั้นที่มีความรู้โดยละเอียด ('l'œil du maître') ที่จำเป็นในการตัดสินใจทางเศรษฐกิจที่เหมาะสม ข้อมูลเชิงลึกนี้เกิดขึ้นก่อนและคาดการณ์ข้อโต้แย้งของโรงเรียนออสเตรียสมัยใหม่เกี่ยวกับปัญหาความรู้ในการคำนวณแบบสังคมนิยม แสดงให้เห็นว่าความล้มเหลวของการวางแผนส่วนกลางไม่ได้เกิดจากข้อจำกัดด้านทรัพยากรหรือการทุจริต แต่เกิดจากความเป็นไปไม่ได้โดยเนื้อแท้ในการแทนที่ความรู้ของแต่ละบุคคลที่กระจายอยู่ด้วยการตัดสินใจของระบบราชการแบบรวมศูนย์
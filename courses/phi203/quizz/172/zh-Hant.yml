question: 根據生理學家的分析，國家對經濟活動的規劃為何會根本失敗？
answer: 國家缺乏「主人的眼光」--只有個別經濟代理人在其日常活動中才具備的詳細當地知識
wrong_answers:
  - 國家沒有足夠的財政資源來有效協調幅員廣大的所有經濟部門
  - 政治領導人天生腐敗，將個人利益凌駕於有效的經濟管理之上
  - 民主投票程序過於緩慢，無法對快速變化的市場環境做出快速回應
explanation: |
  理論派發現了國家計劃的一個基本認識論問題：不可能集中收集和處理驅動經濟活動的大量、複雜和不斷變化的資訊。他們認為，只有在特定環境中運作的個別經濟代理人，才擁有做出適當經濟決策所需的詳細知識（'l'œil du maître'）。這種洞察力早於並預見了現代奧地利學派關於社會主義計算中的知識問題的論點，證明了中央計劃的失敗並非源於資源限制或腐敗，而是源於以中央官僚決策取代分散的個人知識的固有不可能性。
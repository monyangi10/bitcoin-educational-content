question: Selon l'analyse des physiocrates, pourquoi la planification étatique de l'activité économique échoue-t-elle fondamentalement ?
answer: L'État n'a pas le "regard du maître", c'est-à-dire les connaissances locales détaillées que seuls les agents économiques individuels possèdent dans le cadre de leurs activités quotidiennes
wrong_answers:
  - L'État ne dispose pas de ressources financières suffisantes pour coordonner efficacement tous les secteurs économiques sur de vastes territoires
  - Les dirigeants politiques sont intrinsèquement corrompus et privilégient le gain personnel à une gestion économique efficace
  - Les processus de vote démocratiques sont trop lents pour répondre rapidement à l'évolution rapide des conditions du marché
explanation: |
  Les physiocrates ont identifié un problème épistémologique fondamental dans la planification de l'État : l'impossibilité de collecter et de traiter de manière centralisée les informations vastes, complexes et en constante évolution qui sont le moteur de l'activité économique. Ils soutenaient que seuls les agents économiques individuels, opérant dans leurs contextes spécifiques, possédaient l'œil du maître nécessaire pour prendre les décisions économiques appropriées. Cette idée a précédé et anticipé les arguments de l'école autrichienne moderne sur le problème de la connaissance dans le calcul socialiste, démontrant que l'échec de la planification centrale ne provient pas de contraintes de ressources ou de la corruption, mais de l'impossibilité inhérente de remplacer la connaissance individuelle dispersée par une prise de décision bureaucratique centralisée.
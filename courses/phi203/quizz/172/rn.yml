question: Dushingiye ku nseguro y’abanyabwenge b’ivy’ubutunzi, ni kuki igenamigambi rya Leta ry’ibikorwa vy’ubutunzi ridashobora gukora neza?
answer: Leta irabura 'ijisho rya shebuja' - ubumenyi burambuye bwo mu karere abakozi b'ubutunzi ku giti cabo gusa bafise mu bikorwa vyabo vya misi yose .
wrong_answers:
  - Leta nta mahera ifise kugira ngo ishobore guhuza neza inzego zose z’ubutunzi mu turere tunini .
  - Abarongozi ba politike barafise ibiturire kandi bashira imbere inyungu zabo bwite kuruta gucunga neza ubutunzi
  - Uburyo bwo gutora mu buryo bwa demokarasi burateba cane ku buryo butashobora kwishura ningoga ku bihinduka vyihuta vy'isoko .
explanation: |
  Abanyabwenge b’ivy’ubuzima (physiocrates) barabonye ingorane y’ishimikiro y’ubumenyi mu bijanye n’igenamigambi rya Leta: ukudashoboka gukoranya no gutunganya amakuru menshi, asobanutse kandi aguma ahinduka atuma ibikorwa vy’ubutunzi bigenda neza. Bavuga ko abakozi b’ubutunzi ku giti cabo, bakora mu bihe vyabo vyihariye, ari bo bonyene bafise ubumenyi burambuye (‘l’œil du maître’) bukenewe kugira ngo bafate ingingo zibereye z’ubutunzi. Ubwo bumenyi bwabanjirije kandi bwari bwiteze imvo z’amashure yo muri Otirishiya yo muri iki gihe ku bijanye n’ingorane y’ubumenyi mu biharuro vy’abasosiyalisiti, vyerekana ko ukunanirwa kw’igenamigambi ry’imbere mu gihugu kutava ku kubura ubutunzi canke ku ruswa, ahubwo ko ku kuntu bidashoboka gusubirira ubumenyi bw’umuntu ku giti ciwe bwashize ahabona n’ugufata ingingo kw’ubutegetsi bwa mbere.
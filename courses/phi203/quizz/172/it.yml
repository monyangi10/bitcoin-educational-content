question: Secondo l'analisi dei fisiocratici, perché la pianificazione statale dell'attività economica fallisce fondamentalmente?
answer: Allo Stato manca l'"occhio del padrone", la conoscenza locale dettagliata che solo i singoli agenti economici possiedono nelle loro attività quotidiane
wrong_answers:
  - Lo Stato non dispone di risorse finanziarie sufficienti per coordinare efficacemente tutti i settori economici in ampi territori
  - I leader politici sono intrinsecamente corrotti e privilegiano il guadagno personale rispetto a una gestione economica efficiente
  - I processi di voto democratici sono troppo lenti per rispondere rapidamente a condizioni di mercato in rapido cambiamento
explanation: |
  I fisiocratici individuarono un problema epistemologico fondamentale nella pianificazione statale: l'impossibilità di raccogliere ed elaborare a livello centrale le informazioni vaste, complesse e in continuo cambiamento che guidano l'attività economica. Essi sostenevano che solo i singoli agenti economici, operando nei loro specifici contesti, possiedono la conoscenza dettagliata ("l'œil du maître") necessaria per prendere decisioni economiche appropriate. Questa intuizione ha preceduto e anticipato le moderne argomentazioni della scuola austriaca sul problema della conoscenza nel calcolo socialista, dimostrando che il fallimento della pianificazione centrale non deriva dalla scarsità di risorse o dalla corruzione, ma dall'impossibilità intrinseca di sostituire la conoscenza individuale dispersa con un processo decisionale burocratico centralizzato.
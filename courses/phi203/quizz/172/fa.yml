question: طبق تحلیل فیزیوکرات‌ها، چرا برنامه‌ریزی دولتی فعالیت‌های اقتصادی به‌طور اساسی شکست می‌خورد؟
answer: دولت فاقد 'چشم استاد' است - دانش محلی دقیقی که تنها عوامل اقتصادی فردی در فعالیت‌های روزانه خود دارند.
wrong_answers:
  - ایالت منابع مالی کافی برای هماهنگی مؤثر تمامی بخش‌های اقتصادی در سراسر مناطق وسیع ندارد.
  - رهبران سیاسی ذاتاً فاسد هستند و منافع شخصی را بر مدیریت اقتصادی کارآمد ترجیح می‌دهند.
  - فرآیندهای رأی‌گیری دموکراتیک برای پاسخ سریع به شرایط بازار که به سرعت تغییر می‌کنند، بسیار کند هستند.
explanation: |
  فیزیوکرات‌ها یک مشکل اساسی معرفت‌شناختی را با برنامه‌ریزی دولتی شناسایی کردند: عدم امکان جمع‌آوری و پردازش مرکزی اطلاعات وسیع، پیچیده و دائماً در حال تغییر که فعالیت اقتصادی را هدایت می‌کند. آن‌ها استدلال کردند که تنها عوامل اقتصادی فردی که در زمینه‌های خاص خود عمل می‌کنند، دارای دانش دقیق ('l'œil du maître') لازم برای اتخاذ تصمیمات اقتصادی مناسب هستند. این بینش پیش از استدلال‌های مکتب اتریشی مدرن درباره مشکل دانش در محاسبه سوسیالیستی بود و نشان می‌داد که شکست برنامه‌ریزی مرکزی نه از محدودیت‌های منابع یا فساد، بلکه از عدم امکان ذاتی جایگزینی دانش پراکنده فردی با تصمیم‌گیری بوروکراتیک متمرکز ناشی می‌شود.
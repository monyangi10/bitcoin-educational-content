question: Warum, so die Analyse der Physiokraten, versagt die staatliche Planung der Wirtschaftstätigkeit grundsätzlich?
answer: Dem Staat fehlt der "Blick des Meisters" - das detaillierte lokale Wissen, das nur einzelne Wirtschaftsakteure in ihrer täglichen Arbeit besitzen
wrong_answers:
  - Der Staat verfügt über unzureichende finanzielle Mittel, um alle Wirtschaftssektoren über große Gebiete hinweg wirksam zu koordinieren
  - Politische Führer sind von Natur aus korrupt und stellen persönliche Vorteile über eine effiziente Wirtschaftsführung
  - Demokratische Abstimmungsprozesse sind zu langsam, um schnell auf sich ändernde Marktbedingungen zu reagieren
explanation: |
  Die Physiokraten erkannten ein grundlegendes erkenntnistheoretisches Problem der staatlichen Planung: die Unmöglichkeit, die umfangreichen, komplexen und sich ständig verändernden Informationen, die die Wirtschaftstätigkeit bestimmen, zentral zu erfassen und zu verarbeiten. Sie argumentierten, dass nur die einzelnen Wirtschaftsakteure, die in ihrem jeweiligen Umfeld tätig sind, über das Detailwissen ("l'œil du maître") verfügen, das erforderlich ist, um angemessene wirtschaftliche Entscheidungen zu treffen. Diese Einsicht nahm die Argumente der modernen österreichischen Schule über das Wissensproblem im sozialistischen Kalkül vorweg und zeigte, dass das Scheitern der zentralen Planung nicht auf Ressourcenknappheit oder Korruption zurückzuführen ist, sondern auf die inhärente Unmöglichkeit, verstreutes individuelles Wissen durch zentralisierte bürokratische Entscheidungen zu ersetzen.
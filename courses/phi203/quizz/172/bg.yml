question: Защо според анализа на физиократите държавното планиране на икономическата дейност се проваля в основата си?
answer: Държавата не разполага с "майсторското око" - подробното познаване на местните условия, което притежават само отделните икономически агенти в ежедневната си дейност
wrong_answers:
  - Държавата не разполага с достатъчно финансови ресурси, за да координира ефективно всички икономически сектори на големи територии
  - Политическите лидери са изначално корумпирани и дават приоритет на личната изгода пред ефективното управление на икономиката
  - Демократичните процеси на гласуване са твърде бавни, за да реагират бързо на бързо променящите се пазарни условия
explanation: |
  Физиократите идентифицират основен епистемологичен проблем на държавното планиране: невъзможността за централизирано събиране и обработване на огромната, сложна и постоянно променяща се информация, която движи икономическата дейност. Те твърдяха, че само отделните икономически агенти, действащи в специфичния си контекст, притежават подробните знания ("l'œil du maître"), необходими за вземането на подходящи икономически решения. Това схващане предшества и изпреварва аргументите на съвременната австрийска школа относно проблема със знанието в социалистическите изчисления, като показва, че неуспехът на централното планиране се дължи не на ограничени ресурси или корупция, а на присъщата невъзможност за заместване на разпръснатото индивидуално знание с централизирано бюрократично вземане на решения.
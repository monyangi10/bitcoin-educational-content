question: Hvilket grunnleggende forhold mellom lov og individuelle rettigheter skiller Benjamin Constants teori fra Montesquieus frihetsbegrep?
answer: Constant skiller sfæren for uskyldig individuell handling fra maktens sfære, der myndighetene garanterer rettigheter uten å bestemme individets vilje eller handlinger
wrong_answers:
  - Constant argumenterer for at lovverket bør utvides til å omfatte alle aspekter ved individuell atferd, mens Montesquieu begrenser lovens inngripen til økonomiske forhold
  - Constant mener at individets frihet er avhengig av flere lover, mens Montesquieu tar til orde for en reduksjon av det juridiske rammeverket
  - Constant foreslår at myndighetene aktivt skal forme individets ønsker og valg, mens Montesquieu overlater dette helt og holdent til sosiale skikker
explanation: |
  Benjamin Constant utviklet sin teori nettopp i motsetning til Montesquieus farlige definisjon av frihet som "retten til å gjøre alt som lovene tillater" Constants hovedinnsikt var å skille klart mellom sfæren for uskyldige individuelle handlinger (som skal forbli frie) og sfæren for statlig makt (som bare skal garantere utøvelsen av rettigheter). Dette forhindrer staten fra å bestemme over individets vilje eller handlinger, i motsetning til Montesquieus oppfatning som tillater enhver begrensning så lenge den er lovlig autorisert.
question: 本杰明-康斯坦茨的理论与孟德斯鸠的自由概念有何根本区别？
answer: 康斯坦丁将个人无辜行动领域与权力领域区分开来，在权力领域，政府保障权利，但不决定个人意愿或行动
wrong_answers:
  - 康斯坦茨认为，法律应扩大其范围，以涵盖个人行为的各个方面，而孟德斯鸠则将法律干预限制在经济事务上
  - 康斯坦茨认为个人自由取决于法律的增多，而孟德斯鸠则主张减少法律框架
  - 康斯坦茨提出，政府应积极塑造个人的欲望和选择，而孟德斯鸠则将其完全交由社会习俗来决定
explanation: |
  孟德斯鸠将自由定义为 "做法律所允许的一切事情的权利"，本杰明-康斯坦特正是针对这一危险定义提出了自己的理论。康斯坦丁的关键见解是将个人的纯真行为（应保持自由）与政府权力（只应保障权利的行使）明确区分开来。这就防止了国家决定个人的意愿或行动，而不像孟德斯鸠的概念那样，允许任何限制，只要是法律授权的。
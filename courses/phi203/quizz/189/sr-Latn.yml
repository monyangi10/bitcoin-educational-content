question: Koji fundamentalni odnos između zakona i individualnih prava razlikuje teoriju Benžamina Konstana od Montesquieuove koncepcije slobode?
answer: Konstant razlikuje sferu nevine individualne akcije od sfere moći, gde vlada garantuje prava bez određivanja individualne volje ili akcija.
wrong_answers:
  - Constant tvrdi da zakoni treba da prošire svoj opseg kako bi pokrili sve aspekte individualnog ponašanja, dok Montesquieu ograničava pravnu intervenciju na ekonomska pitanja.
  - Constant veruje da individualna sloboda zavisi od umnožavanja zakona dok Montesquieu zagovara smanjenje pravnih okvira
  - Constant predlaže da vlada treba aktivno oblikovati individualne želje i izbore, dok Montesquieu to u potpunosti prepušta društvenim običajima.
explanation: |
  Benjamin Constant je razvio svoju teoriju posebno u suprotnosti sa Montesquieuovom opasnom definicijom slobode kao 'prava da se čini sve što zakoni dopuštaju.' Constantova ključna spoznaja bila je jasno razdvajanje sfere nevine individualne akcije (koja treba ostati slobodna) od sfere vladine moći (koja treba samo da garantuje ostvarivanje prava). Ovo sprečava državu da određuje individualnu volju ili akcije, za razliku od Montesquieuove koncepcije koja dopušta bilo kakvo ograničenje sve dok je pravno ovlašćeno.
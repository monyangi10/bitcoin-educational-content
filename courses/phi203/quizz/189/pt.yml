question: Que relação fundamental entre a lei e os direitos individuais distingue a teoria de Benjamin Constant da conceção de liberdade de Montesquieu?
answer: Constant distingue a esfera da ação individual inocente da esfera do poder, onde o governo garante direitos sem determinar a vontade ou as acções individuais
wrong_answers:
  - Constant defende que as leis devem alargar o seu âmbito de aplicação a todos os aspectos do comportamento individual, enquanto Montesquieu limita a intervenção jurídica às questões económicas
  - Constant considera que a liberdade individual depende da multiplicação das leis, enquanto Montesquieu defende a redução dos quadros jurídicos
  - Constant propõe que o governo deve moldar ativamente os desejos e as escolhas individuais, enquanto Montesquieu deixa isso inteiramente a cargo dos costumes sociais
explanation: |
  Benjamin Constant desenvolveu a sua teoria especificamente em contradição com a perigosa definição de liberdade de Montesquieu como "o direito de fazer tudo o que as leis permitem" A principal ideia de Constant foi separar claramente a esfera da ação individual inocente (que deve permanecer livre) da esfera do poder governamental (que deve apenas garantir o exercício dos direitos). Isto impede o Estado de determinar a vontade ou as acções individuais, ao contrário da conceção de Montesquieu que permite qualquer restrição desde que legalmente autorizada.
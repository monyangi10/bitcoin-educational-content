question: Maandishi yanapendekeza nini kingetokea ikiwa serikali ya udhibiti itaingilia kati uchaguzi wa kazi za mtu binafsi?
answer: Inavunja mnyororo wa asili kwa kuweka mipango ya utekelezaji sawa bila kuzingatia maamuzi ya mtu binafsi
wrong_answers:
  - Inaongeza uhuru wa mtu binafsi kwa kutoa miongozo iliyo wazi kwa utendaji bora wa kazi
  - Inaleta matokeo bora ya kiuchumi kwa kuratibu juhudi mbalimbali za mtu binafsi kwa ufanisi
  - Inawalinda wafanyakazi dhidi ya unyonyaji kwa kuhakikisha usambazaji wa rasilimali na fursa kwa usawa
explanation: |
  Kulingana na maandishi, wakati serikali ya udhibiti inapoingilia kati, huvuruga mchakato wa asili ambapo watu huitikia mahitaji yao binafsi kulingana na tabia zao, ladha, na uwezo wao. Serikali huweka suluhisho sare zinazopuuza ukweli wa msingi kwamba watu hupata mahitaji tofauti na wana uwezo tofauti wa kuyashughulikia. Uingiliaji kati huu unapingana na kanuni kwamba kwa kuwa mahitaji ni ya kibinafsi na ya kibinafsi, watu wanapaswa kuwa huru kuyajibu kwa njia wanazoamua zinazofaa zaidi kwa hali zao maalum.
question: Ico canditswe kivuga ko vyogenda gute iyo Leta igenzura ivy’amategeko yinjira mu mahitamwo y’akazi k’umuntu ku giti ciwe?
answer: Bica uruzitiro rw’ibinyabuzima mu gushinga imigambi y’ibikorwa imwe ataco twihweza ku mico y’umuntu ku giti ciwe .
wrong_answers:
  - Bituma umuntu agira umwidegemvyo mu gutanga amabwirizwa atomoye ku bijanye n’ugukora neza akazi .
  - Bituma habaho ingaruka nziza mu vy'ubutunzi mu guhuza neza utwigoro dutandukanye tw'umuntu ku giti ciwe .
  - Irinda abakozi gukoreshwa nabi mu gutuma ubutunzi n'amahirwe bigabanywa mu buryo bubereye .
explanation: |
  Dukurikije ico canditswe, iyo Leta igenzura ibintu yinjiyemwo, bihungabanya inzira kamere aho abantu bishura ivyo bakeneye bivanye n’ingeso zabo bwite, ivyo bakunda be n’ubushobozi bwabo bwite. Leta ishiraho inyishu zimwe zirengagiza ukuri kw’ishimikiro abantu bashikirwa n’ivyo bakeneye mu buryo butandukanye kandi zifise ubushobozi butandukanye bwo kuzitorera umuti. Ukwo gufasha bivuguruza ingingo ngenderwako y’uko kubera ko ivyo umuntu akeneye ari ivy’umuntu ku giti ciwe kandi ari ivy’umuntu ku giti ciwe, abantu bakwiye kwidegemvya mu kubisubiza mu buryo babona ko bubereye cane ku mibereho yabo yihariye.
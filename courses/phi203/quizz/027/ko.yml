question: 이 텍스트는 규제 국가가 개인의 업무 선택에 개입하면 어떤 일이 일어날 것이라고 제안하나요?
answer: 개인의 성향을 고려하지 않고 획일적인 행동 계획을 강요함으로써 자연스러운 사슬을 끊습니다
wrong_answers:
  - 최적의 업무 수행을 위한 명확한 가이드라인을 제공하여 개인의 자유를 향상시킵니다
  - 다양한 개인의 노력을 효과적으로 조정하여 더 나은 경제적 성과를 창출합니다
  - 자원과 기회의 공정한 분배를 보장하여 근로자를 착취로부터 보호합니다
explanation: |
  텍스트에 따르면, 규제 국가가 개입하면 개인이 자신의 성향, 취향, 능력에 따라 개인의 필요에 대응하는 자연스러운 과정을 방해합니다. 국가는 사람들이 각기 다른 욕구를 경험하고 이를 해결할 수 있는 능력이 다르다는 근본적인 현실을 무시한 채 획일적인 해결책을 강요합니다. 이러한 개입은 욕구는 개인적이고 개별적인 것이므로 사람들은 자신의 특정 상황에 가장 적합하다고 판단하는 방식으로 자유롭게 대응할 수 있어야 한다는 원칙과 모순됩니다.
question: Какво се предполага в текста, че ще се случи, ако регулаторната държава се намеси в индивидуалния избор на работа?
answer: Тя прекъсва естествената верига, като налага единни планове за действие, без да отчита индивидуалните нагласи
wrong_answers:
  - Тя увеличава индивидуалната свобода, като предоставя ясни насоки за оптимално изпълнение на работата
  - Създава по-добри икономически резултати чрез ефективно координиране на различните индивидуални усилия
  - Тя защитава работниците от експлоатация, като осигурява справедливо разпределение на ресурсите и възможностите
explanation: |
  Според текста, когато държавата се намесва, тя нарушава естествения процес, при който хората задоволяват личните си нужди в съответствие със собствените си нагласи, вкусове и способности. Държавата налага унифицирани решения, които пренебрегват фундаменталната реалност, че хората изпитват различни потребности и имат различни възможности да ги удовлетворят. Тази намеса противоречи на принципа, че тъй като потребностите са лични и индивидуални, хората трябва да бъдат свободни да реагират на тях по начин, който преценяват като най-подходящ за конкретните обстоятелства.
question: Mikä on talousliberalismin teorian mukaan ensisijainen syy siihen, miksi valtion instituutiot eivät rakenteellisesti voi edistää innovointia?
answer: Valtion työntekijöiltä puuttuu henkilökohtainen aloitteellisuus ja suhteellinen korvaus, joka on sidottu innovaatiotuloksiin
wrong_answers:
  - Valtion laitoksilla ei ole riittävästi rahoitusta laajamittaisten tutkimus- ja kehityshankkeiden tukemiseen
  - Hallituksen byrokratia etenee liian hitaasti pysyäkseen nopeasti muuttuvien markkinaolosuhteiden tahdissa
  - Valtion monopoleihin ei kohdistu ulkoisia kilpailupaineita, jotka motivoivat jatkuvaan parantamiseen
explanation: |
  Luvussa selitetään, että valtion laitokset eivät voi innovoida, koska niiden perusrakenne perustuu virkamiestyöhön. Valtion virkamiehet toimivat ennalta määrättyjen säännösten puitteissa ilman henkilökohtaista aloitteellisuutta tai innovointiin sidottua korvausta. Kaikkea ohjataan säännöillä, mikä ei luo kannustimia eikä kiinnostusta innovointiin. Järjestelmää itsessään ei ole suunniteltu innovointia varten, mistä ovat osoituksena kansalliset koulutusjärjestelmät, jotka pikemminkin jakavat olemassa olevaa tietoa kuin parantavat sitä. Tämä rakenteellinen rajoitus tarkoittaa, että valtioiden on luotettava vapaiden alojen innovaatioiden kopiointiin sen sijaan, että ne loisivat omia innovaatioita.
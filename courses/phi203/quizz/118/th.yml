question: ตามทฤษฎีเสรีนิยมทางเศรษฐกิจ เหตุผลหลักที่ทำให้สถาบันของรัฐไม่สามารถขับเคลื่อนนวัตกรรมได้อย่างมีโครงสร้างคืออะไร?
answer: พนักงานของรัฐขาดความริเริ่มส่วนบุคคลและการชดเชยที่เป็นสัดส่วนที่เชื่อมโยงกับผลลัพธ์ของนวัตกรรม
wrong_answers:
  - สถาบันของรัฐมีเงินทุนไม่เพียงพอที่จะสนับสนุนโครงการวิจัยและพัฒนาขนาดใหญ่
  - ระบบราชการของรัฐบาลเคลื่อนไหวช้าเกินไปที่จะทันกับสภาพตลาดที่เปลี่ยนแปลงอย่างรวดเร็ว
  - รัฐวิสาหกิจผูกขาดไม่มีแรงกดดันจากการแข่งขันภายนอกที่จะกระตุ้นความพยายามในการปรับปรุงอย่างต่อเนื่อง
explanation: |
  บทนี้อธิบายว่าสถาบันของรัฐไม่สามารถสร้างนวัตกรรมได้เนื่องจากโครงสร้างพื้นฐานของพวกเขาที่อิงตามการจ้างงานในราชการ พนักงานของรัฐทำงานภายใต้กฎระเบียบที่กำหนดไว้ล่วงหน้าโดยไม่มีความคิดริเริ่มส่วนตัวหรือค่าตอบแทนที่ผูกกับนวัตกรรม ทุกอย่างถูกควบคุมโดยกฎ ซึ่งไม่ได้สร้างแรงจูงใจหรือความสนใจในนวัตกรรม ระบบเองไม่ได้ถูกออกแบบมาเพื่อการสร้างนวัตกรรม ดังที่แสดงโดยระบบการศึกษาของชาติที่แจกจ่ายความรู้ที่มีอยู่แทนที่จะปรับปรุงมัน ข้อจำกัดเชิงโครงสร้างนี้หมายความว่ารัฐต้องพึ่งพาการคัดลอกนวัตกรรมจากภาคเสรีแทนที่จะสร้างนวัตกรรมของตนเอง
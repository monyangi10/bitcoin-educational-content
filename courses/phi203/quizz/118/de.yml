question: Was ist nach der Theorie des Wirtschaftsliberalismus der Hauptgrund dafür, dass staatliche Institutionen strukturell keine Innovationen fördern können?
answer: Staatsbediensteten fehlt es an Eigeninitiative und an einer proportionalen Vergütung, die an Innovationsergebnisse gebunden ist
wrong_answers:
  - Staatliche Einrichtungen verfügen über unzureichende Mittel zur Unterstützung groß angelegter Forschungs- und Entwicklungsprojekte
  - Die Regierungsbürokratie bewegt sich zu langsam, um mit den sich schnell ändernden Marktbedingungen Schritt zu halten
  - Staatsmonopole sind keinem externen Wettbewerbsdruck ausgesetzt, der sie zu kontinuierlichen Verbesserungsmaßnahmen motivieren könnte
explanation: |
  In diesem Kapitel wird erläutert, dass staatliche Einrichtungen aufgrund ihrer grundlegenden Struktur, die auf dem öffentlichen Dienst beruht, nicht innovativ sein können. Staatsbedienstete arbeiten im Rahmen festgelegter Vorschriften, ohne persönliche Initiative oder eine an Innovation gebundene Vergütung. Alles wird durch Regeln geregelt, die weder einen Anreiz noch ein Interesse an Innovation schaffen. Das System selbst ist nicht auf Innovation ausgelegt, wie die nationalen Bildungssysteme zeigen, die vorhandenes Wissen weitergeben, anstatt es zu verbessern. Diese strukturelle Einschränkung bedeutet, dass Staaten darauf angewiesen sind, Innovationen aus freien Sektoren zu kopieren, anstatt eigene zu entwickeln.
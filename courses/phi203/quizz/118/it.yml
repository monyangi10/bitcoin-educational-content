question: Secondo la teoria del liberalismo economico, qual è la ragione principale per cui le istituzioni statali non possono strutturalmente guidare l'innovazione?
answer: I dipendenti statali non hanno iniziativa personale e la retribuzione proporzionale è legata ai risultati dell'innovazione
wrong_answers:
  - Le istituzioni statali non dispongono di fondi sufficienti per sostenere progetti di ricerca e sviluppo su larga scala
  - La burocrazia governativa si muove troppo lentamente per tenere il passo con la rapida evoluzione delle condizioni di mercato
  - I monopoli di Stato non devono affrontare alcuna pressione concorrenziale esterna per motivare gli sforzi di miglioramento continuo
explanation: |
  Il capitolo spiega che le istituzioni statali non possono innovare a causa della loro struttura fondamentale basata sul pubblico impiego. I dipendenti statali operano all'interno di regolamenti predeterminati, senza iniziativa personale o compensi legati all'innovazione. Tutto è regolato da norme che non creano né incentivi né interesse per l'innovazione. Il sistema stesso non è progettato per l'innovazione, come dimostrano i sistemi educativi nazionali che distribuiscono le conoscenze esistenti piuttosto che migliorarle. Questa limitazione strutturale fa sì che gli Stati debbano fare affidamento sulla copia delle innovazioni dei settori liberi piuttosto che sulla generazione delle proprie.
question: بر اساس نظریه لیبرالیسم اقتصادی، دلیل اصلی اینکه چرا نهادهای دولتی به صورت ساختاری نمی‌توانند نوآوری را هدایت کنند چیست؟
answer: کارمندان دولتی فاقد ابتکار شخصی و جبران متناسب با نتایج نوآوری هستند.
wrong_answers:
  - نهادهای دولتی بودجه کافی برای حمایت از پروژه‌های بزرگ تحقیق و توسعه ندارند.
  - بوروکراسی دولتی به‌قدری کند حرکت می‌کند که نمی‌تواند با شرایط بازار که به‌سرعت در حال تغییر است، همگام شود.
  - انحصارات دولتی با فشار رقابت خارجی مواجه نیستند تا تلاش‌های بهبود مستمر را تحریک کنند.
explanation: |
  فصل توضیح می‌دهد که نهادهای دولتی به دلیل ساختار بنیادی خود که بر اساس استخدام خدمات مدنی است، نمی‌توانند نوآوری کنند. کارمندان دولتی در چارچوب مقررات از پیش تعیین‌شده عمل می‌کنند بدون ابتکار شخصی یا جبران خسارت مرتبط با نوآوری. همه چیز توسط قوانین اداره می‌شود و هیچ انگیزه یا علاقه‌ای به نوآوری ایجاد نمی‌کند. خود سیستم برای نوآوری طراحی نشده است، همان‌طور که توسط سیستم‌های آموزشی ملی که دانش موجود را توزیع می‌کنند به جای بهبود آن، نشان داده شده است. این محدودیت ساختاری به این معناست که دولت‌ها باید به جای تولید نوآوری‌های خود، به کپی‌برداری از نوآوری‌های بخش‌های آزاد متکی باشند.
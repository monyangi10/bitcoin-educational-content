question: 根据经济自由主义理论，国家机构在结构上无法推动创新的主要原因是什么？
answer: 州政府雇员缺乏个人主动性，薪酬与创新成果不成正比
wrong_answers:
  - 国家机构没有足够的资金支持大型研发项目
  - 政府官僚机构行动缓慢，无法跟上瞬息万变的市场环境
  - 国家垄断企业没有外部竞争压力，无法激励其不断改进工作
explanation: |
  该章解释说，国家机构由于其基于公务员聘用制的基本结构而无法创新。政府雇员在预先确定的规章制度内工作，没有个人主动性，也没有与创新挂钩的报酬。一切都有章可循，既没有创新的动力，也没有创新的兴趣。这种制度本身也不是为创新而设计的，国家教育制度就是一个例子，它只是传播现有知识，而不是改进知识。这种结构性限制意味着国家必须依靠复制自由部门的创新，而不是创造自己的创新。
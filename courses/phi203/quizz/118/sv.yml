question: Vad är enligt ekonomisk liberalism det främsta skälet till att statliga institutioner strukturellt sett inte kan driva på innovation?
answer: Statsanställda saknar personliga initiativ och proportionerlig ersättning kopplad till innovationsresultat
wrong_answers:
  - Statliga institutioner har otillräcklig finansiering för att stödja storskaliga forsknings- och utvecklingsprojekt
  - Den statliga byråkratin rör sig för långsamt för att hålla jämna steg med snabbt föränderliga marknadsförhållanden
  - Statliga monopol möter ingen extern konkurrens press att motivera till ständiga förbättringar
explanation: |
  I kapitlet förklaras att statliga institutioner inte kan vara innovativa på grund av sin grundläggande struktur som bygger på offentlig anställning. Statligt anställda arbetar inom förutbestämda regelverk utan personliga initiativ eller ersättning kopplad till innovation. Allt styrs av regler, vilket varken skapar incitament eller intresse för innovation. Systemet i sig är inte utformat för innovation, vilket illustreras av nationella utbildningssystem som sprider befintlig kunskap snarare än att förbättra den. Denna strukturella begränsning innebär att stater måste förlita sig på att kopiera innovationer från fria sektorer snarare än att skapa sina egna.
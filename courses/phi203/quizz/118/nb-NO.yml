question: Hva er den viktigste grunnen til at statlige institusjoner strukturelt sett ikke kan drive frem innovasjon, ifølge teorien om økonomisk liberalisme?
answer: Statsansatte mangler personlig initiativ og proporsjonal kompensasjon knyttet til innovasjonsresultater
wrong_answers:
  - Statlige institusjoner har ikke tilstrekkelig finansiering til å støtte store forsknings- og utviklingsprosjekter
  - Myndighetsbyråkratiet beveger seg for sakte til å holde tritt med raskt skiftende markedsforhold
  - Statlige monopoler står ikke overfor noe eksternt konkurransepress som motiverer til kontinuerlig forbedringsarbeid
explanation: |
  Kapitlet forklarer at statlige institusjoner ikke kan innovere på grunn av sin grunnleggende struktur basert på tjenestemannsansettelser. Statsansatte opererer innenfor et forhåndsbestemt regelverk uten personlig initiativ eller kompensasjon knyttet til innovasjon. Alt er regelstyrt, noe som verken skaper insentiver eller interesse for innovasjon. Systemet i seg selv er ikke designet for innovasjon, noe som illustreres av nasjonale utdanningssystemer som distribuerer eksisterende kunnskap i stedet for å forbedre den. Denne strukturelle begrensningen gjør at stater må basere seg på å kopiere innovasjoner fra frie sektorer i stedet for å skape sine egne.
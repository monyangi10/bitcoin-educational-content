question: Theo lý thuyết chủ nghĩa tự do kinh tế, lý do chính khiến các thể chế nhà nước về mặt cấu trúc không thể thúc đẩy đổi mới là gì?
answer: Cán bộ nhà nước thiếu sáng kiến cá nhân và mức lương thưởng không tương xứng với kết quả đổi mới.
wrong_answers:
  - Các tổ chức nhà nước không có đủ kinh phí để hỗ trợ các dự án nghiên cứu và phát triển quy mô lớn.
  - Bộ máy hành chính nhà nước hoạt động quá chậm chạp, không theo kịp với điều kiện thị trường thay đổi nhanh chóng.
  - Các doanh nghiệp độc quyền nhà nước không phải chịu áp lực cạnh tranh từ bên ngoài để thúc đẩy nỗ lực cải tiến liên tục.
explanation: |
  Chương này giải thích rằng các thể chế nhà nước không thể đổi mới do cấu trúc cơ bản của chúng dựa trên việc làm công chức. Nhân viên chính phủ hoạt động trong khuôn khổ các quy định đã được định sẵn mà không có sáng kiến cá nhân hoặc thù lao gắn liền với sự đổi mới. Mọi thứ đều được điều chỉnh bởi các quy tắc, không tạo ra động lực hay sự quan tâm đến đổi mới. Bản thân hệ thống không được thiết kế cho sự đổi mới, như được minh họa bởi các hệ thống giáo dục quốc gia phân phối kiến thức hiện có thay vì cải tiến nó. Hạn chế về cấu trúc này có nghĩa là các quốc gia phải dựa vào việc sao chép các đổi mới từ các khu vực tư nhân thay vì tự tạo ra những đổi mới của riêng mình.
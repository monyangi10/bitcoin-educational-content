question: Kulingana na nadharia ya uliberali wa kiuchumi, ni sababu gani kuu kwa nini taasisi za serikali haziwezi kuendesha uvumbuzi kimuundo?
answer: Wafanyakazi wa serikali hawana mpango binafsi na fidia sawia inayohusiana na matokeo ya uvumbuzi
wrong_answers:
  - Taasisi za serikali hazina ufadhili wa kutosha kusaidia miradi mikubwa ya utafiti na maendeleo
  - Urasimu wa serikali unasonga polepole sana kuendana na hali ya soko inayobadilika haraka
  - Ukiritimba wa serikali haukabiliwi na shinikizo la ushindani wa nje ili kuhamasisha juhudi za uboreshaji endelevu
explanation: |
  Sura hiyo inaelezea kwamba taasisi za serikali haziwezi kubuni kutokana na muundo wao wa msingi unaotegemea ajira ya utumishi wa umma. Wafanyakazi wa serikali hufanya kazi ndani ya kanuni zilizopangwa mapema bila mpango wa kibinafsi au fidia inayohusiana na uvumbuzi. Kila kitu kinaongozwa na sheria, bila kuunda motisha wala nia ya uvumbuzi. Mfumo wenyewe haujaundwa kwa ajili ya uvumbuzi, kama inavyoonyeshwa na mifumo ya kitaifa ya elimu inayosambaza maarifa yaliyopo badala ya kuyaboresha. Kikwazo hiki cha kimuundo kinamaanisha kwamba mataifa lazima yategemee kunakili uvumbuzi kutoka sekta huru badala ya kuzalisha wao wenyewe.
question: De acordo com a teoria do liberalismo económico, qual é a principal razão pela qual as instituições estatais não podem, estruturalmente, impulsionar a inovação?
answer: Os funcionários públicos carecem de iniciativa pessoal e de uma remuneração proporcional ligada aos resultados da inovação
wrong_answers:
  - As instituições estatais não dispõem de financiamento suficiente para apoiar projectos de investigação e desenvolvimento em grande escala
  - A burocracia governamental é demasiado lenta para acompanhar a rápida evolução das condições de mercado
  - Os monopólios estatais não enfrentam qualquer pressão da concorrência externa para motivar os esforços de melhoria contínua
explanation: |
  O capítulo explica que as instituições do Estado não podem inovar devido à sua estrutura fundamental baseada no emprego da função pública. Os funcionários públicos trabalham com regulamentos pré-determinados, sem iniciativa pessoal ou compensação ligada à inovação. Tudo é regido por regras, o que não cria incentivos nem interesse na inovação. O próprio sistema não foi concebido para a inovação, como ilustram os sistemas de ensino nacionais que distribuem o conhecimento existente em vez de o melhorarem. Esta limitação estrutural significa que os Estados têm de confiar na cópia de inovações de sectores livres em vez de criarem as suas próprias inovações.
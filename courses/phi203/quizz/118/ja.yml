question: 経済自由主義理論によれば、国家制度が構造的にイノベーションを推進できない主な理由は何か？
answer: 国家公務員には自発性がなく、報酬はイノベーションの成果に比例しない
wrong_answers:
  - 国家機関は、大規模な研究開発プロジェクトを支援するための資金が不足している。
  - 政府の官僚機構は、急速に変化する市場環境に対応するには遅すぎる。
  - 国営独占企業は、継続的な改善努力を動機付ける外部からの競争圧力に直面しない。
explanation: |
  この章では、国家機関がイノベーションを起こせないのは、公務員雇用に基づくその基本的な構造によるものだと説明している。公務員はあらかじめ決められた規制の中で活動し、個人の自発性やイノベーションに結びつく報酬はない。すべてが規則によって管理され、イノベーションを起こすインセンティブも関心も生まれない。制度そのものがイノベーションのために設計されていないことは、知識を向上させるのではなく、既存の知識を分配する国の教育制度が物語っている。この構造的な限界は、国家が独自のイノベーションを生み出すのではなく、自由なセクターからのイノベーションのコピーに頼らざるを得ないことを意味する。
question: Mis on majandusliberalismi teooria kohaselt peamine põhjus, miks riiklikud institutsioonid ei saa struktuuriliselt innovatsiooni edendada?
answer: Riigitöötajatel puudub isiklik algatus ja proportsionaalne hüvitis, mis on seotud innovatsioonitulemustega
wrong_answers:
  - Riigiasutustel ei ole piisavalt vahendeid suuremahuliste teadus- ja arendusprojektide toetamiseks
  - Valitsuse bürokraatia liigub liiga aeglaselt, et pidada sammu kiiresti muutuvate turutingimustega
  - Riigimonopolidel puudub väline konkurentsisurve, mis motiveeriks pidevaid parendamispüüdlusi
explanation: |
  Peatükis selgitatakse, et riiklikud institutsioonid ei saa uuendusi teha oma põhistruktuuri tõttu, mis põhineb avaliku teenistuse töölevõtmisel. Riigitöötajad tegutsevad etteantud regulatsioonide raames, ilma isikliku algatuse või innovatsiooniga seotud hüvitisteta. Kõik on reguleeritud eeskirjadega, mis ei loo stiimuleid ega huvi uuendustegevuse vastu. Süsteem ise ei ole mõeldud innovatsiooniks, nagu näitavad riiklikud haridussüsteemid, mis pigem levitavad olemasolevaid teadmisi kui parandavad neid. See struktuuriline piirang tähendab, et riigid peavad toetuma pigem vabade sektorite uuenduste kopeerimisele kui omaenda uuenduste loomisele.
question: Според теорията на икономическия либерализъм коя е основната причина, поради която държавните институции структурно не могат да стимулират иновациите?
answer: Държавните служители нямат лична инициатива и пропорционално възнаграждение, обвързано с резултатите от иновациите
wrong_answers:
  - Държавните институции не разполагат с достатъчно средства, за да подкрепят мащабни проекти за научни изследвания и развойна дейност
  - Държавната бюрокрация се движи твърде бавно, за да е в крак с бързо променящите се пазарни условия
  - Държавните монополи не са изправени пред външен конкурентен натиск, който да мотивира усилията за непрекъснато усъвършенстване
explanation: |
  В главата се обяснява, че държавните институции не могат да въвеждат иновации поради фундаменталната си структура, основана на заетостта на държавна служба. Държавните служители работят в рамките на предварително определени правила, без лична инициатива или възнаграждение, свързано с иновации. Всичко се регулира от правила, което не създава нито стимули, нито интерес към иновации. Самата система не е проектирана за иновации, както се вижда от националните образователни системи, които по-скоро разпространяват съществуващите знания, отколкото да ги подобряват. Това структурно ограничение означава, че държавите трябва да разчитат на копиране на иновации от свободните сектори, вместо да създават свои собствени.
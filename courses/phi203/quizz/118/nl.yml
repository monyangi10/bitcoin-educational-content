question: Wat is volgens de theorie van het economisch liberalisme de belangrijkste reden waarom staatsinstellingen innovatie structureel niet kunnen stimuleren?
answer: Overheidsmedewerkers missen persoonlijk initiatief en evenredige compensatie gekoppeld aan innovatieresultaten
wrong_answers:
  - Staatsinstellingen hebben onvoldoende financiële middelen om grootschalige onderzoeks- en ontwikkelingsprojecten te ondersteunen
  - Overheidsbureaucratie beweegt te langzaam om gelijke tred te houden met snel veranderende marktomstandigheden
  - Staatsmonopolies hebben geen externe concurrentiedruk om inspanningen voor voortdurende verbetering te motiveren
explanation: |
  Het hoofdstuk legt uit dat staatsinstellingen niet kunnen innoveren vanwege hun fundamentele structuur die gebaseerd is op ambtenarenwerk. Overheidsmedewerkers werken binnen vooraf bepaalde regels zonder eigen initiatief of compensatie voor innovatie. Alles is aan regels gebonden, waardoor er geen stimulans of interesse voor innovatie is. Het systeem zelf is niet ontworpen voor innovatie, zoals wordt geïllustreerd door nationale onderwijssystemen die bestaande kennis verspreiden in plaats van verbeteren. Deze structurele beperking betekent dat staten moeten vertrouwen op het kopiëren van innovaties uit vrije sectoren in plaats van hun eigen innovaties te genereren.
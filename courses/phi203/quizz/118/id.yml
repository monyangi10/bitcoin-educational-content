question: Menurut teori liberalisme ekonomi, apa alasan utama mengapa lembaga-lembaga negara secara struktural tidak dapat mendorong inovasi?
answer: Pegawai negeri kurang memiliki inisiatif pribadi dan kompensasi proporsional yang terkait dengan hasil inovasi
wrong_answers:
  - Lembaga-lembaga negara tidak memiliki dana yang cukup untuk mendukung proyek-proyek penelitian dan pengembangan berskala besar
  - Birokrasi pemerintah bergerak terlalu lambat untuk mengimbangi kondisi pasar yang berubah dengan cepat
  - Monopoli negara tidak menghadapi tekanan persaingan eksternal untuk memotivasi upaya perbaikan yang berkelanjutan
explanation: |
  Bab ini menjelaskan bahwa lembaga-lembaga negara tidak dapat berinovasi karena struktur fundamental mereka yang didasarkan pada pekerjaan pegawai negeri. Pegawai pemerintah bekerja sesuai dengan peraturan yang telah ditetapkan tanpa inisiatif pribadi atau kompensasi yang terkait dengan inovasi. Semuanya diatur oleh peraturan, sehingga tidak menciptakan insentif maupun minat dalam inovasi. Sistem itu sendiri tidak dirancang untuk inovasi, seperti yang diilustrasikan oleh sistem pendidikan nasional yang mendistribusikan pengetahuan yang sudah ada dan bukan meningkatkannya. Keterbatasan struktural ini berarti negara harus bergantung pada peniruan inovasi dari sektor-sektor bebas daripada menghasilkan inovasi sendiri.
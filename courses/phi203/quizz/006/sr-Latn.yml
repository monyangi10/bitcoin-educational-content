question: Prema francuskim liberalnim misliocima, koji je glavni problem fragmentacije slobode u različite kategorije (politička naspram ekonomske slobode)?
answer: Stvara logičku nedoslednost selektivnom primenom principa individualnog izbora.
wrong_answers:
  - Čini ekonomsku slobodu važnijom od političke slobode
  - Sprečava vlade da efikasno regulišu tržišta
  - U potpunosti eliminiše mogućnost kolektivnog donošenja odluka
explanation: |
  Francuska liberalna tradicija tvrdi da razdvajanje slobode na 'dobre' kategorije (poput političke slobode) i 'loše' kategorije (poput ekonomske slobode) stvara fundamentalnu logičku nedoslednost. Isti principi koji opravdavaju versku toleranciju i univerzalno pravo glasa - naime, sposobnost pojedinca za izbor - trebalo bi logično da se prošire i na ekonomske odluke. Ova fragmentacija svodi slobodu na puko periodično biranje političkih lidera, dok ignoriše da su principi koji leže u osnovi individualnog izbora univerzalni i da bi trebalo dosledno da se primenjuju u svim sferama ljudskog delovanja.
question: Fransız liberal düşünürlere göre, özgürlüğü farklı kategorilere (siyasi ve ekonomik özgürlük) ayırmanın temel sorunu nedir?
answer: Bireysel seçim ilkelerini seçici bir şekilde uygulayarak mantıksal tutarsızlık yaratır
wrong_answers:
  - Ekonomik özgürlüğü siyasi özgürlükten daha önemli hale getirir
  - Hükümetlerin piyasaları etkin bir şekilde düzenlemesini engeller
  - Kolektif karar alma olasılığını tamamen ortadan kaldırır
explanation: |
  Fransız liberal geleneği, özgürlüğü 'iyi' (siyasi özgürlük gibi) ve 'kötü' (ekonomik özgürlük gibi) kategorilere ayırmanın temel mantıksal tutarsızlık yarattığını savunur. Dini hoşgörü ve genel oy hakkını haklı çıkaran aynı ilkeler - yani bireyin seçim yapma kapasitesi - mantıksal olarak ekonomik kararları da kapsamalıdır. Bu parçalanma, bireysel seçimin altında yatan ilkelerin evrensel olduğunu ve insan eyleminin tüm alanlarında tutarlı bir şekilde uygulanması gerektiğini göz ardı ederken, özgürlüğü yalnızca periyodik olarak siyasi liderleri seçmeye indirgemektedir.
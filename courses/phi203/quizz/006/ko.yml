question: 프랑스 자유주의 사상가들에 따르면, 자유를 여러 범주(정치적 자유와 경제적 자유)로 세분화할 때 가장 큰 문제는 무엇일까요?
answer: 개별 선택의 원칙을 선택적으로 적용하여 논리적 모순을 만듭니다
wrong_answers:
  - 정치적 자유보다 경제적 자유가 더 중요해집니다
  - 정부가 시장을 효과적으로 규제하지 못하게 합니다
  - 집단적 의사 결정의 가능성을 완전히 제거합니다
explanation: |
  프랑스 자유주의 전통은 자유를 정치적 자유와 같은 '좋은' 범주와 경제적 자유와 같은 '나쁜' 범주로 구분하는 것은 근본적인 논리적 모순을 낳는다고 주장합니다. 종교적 관용과 보편적 참정권, 즉 개인의 선택권을 정당화하는 동일한 원칙이 논리적으로 경제적 결정에도 적용되어야 한다는 것입니다. 이러한 파편화는 자유를 단순히 정치 지도자를 주기적으로 선택하는 것으로 축소하는 한편, 개인 선택의 기본이 되는 원칙이 보편적이며 인간 행동의 모든 영역에 일관되게 적용되어야 한다는 점을 무시합니다.
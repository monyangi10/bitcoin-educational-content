question: به گفته متفکران لیبرال فرانسوی، مشکل اصلی با تقسیم آزادی به دسته‌های مختلف (آزادی سیاسی در مقابل آزادی اقتصادی) چیست؟
answer: این با اعمال گزینشی اصول انتخاب فردی، ناسازگاری منطقی ایجاد می‌کند.
wrong_answers:
  - این امر آزادی اقتصادی را مهم‌تر از آزادی سیاسی می‌کند.
  - این امر مانع از آن می‌شود که دولت‌ها بازارها را به‌طور مؤثر تنظیم کنند.
  - این امکان تصمیم‌گیری جمعی را به‌طور کامل از بین می‌برد
explanation: |
  سنت لیبرال فرانسوی استدلال می‌کند که تقسیم آزادی به دسته‌های 'خوب' (مانند آزادی سیاسی) و دسته‌های 'بد' (مانند آزادی اقتصادی) باعث ایجاد ناسازگاری منطقی اساسی می‌شود. همان اصولی که تحمل مذهبی و حق رأی همگانی را توجیه می‌کنند - یعنی، ظرفیت فرد برای انتخاب - باید به طور منطقی به تصمیمات اقتصادی نیز گسترش یابد. این تکه‌تکه کردن آزادی را به صرفاً انتخاب دوره‌ای رهبران سیاسی کاهش می‌دهد، در حالی که نادیده می‌گیرد که اصول زیربنایی انتخاب فردی جهانی هستند و باید به طور مداوم در تمام حوزه‌های عمل انسانی اعمال شوند.
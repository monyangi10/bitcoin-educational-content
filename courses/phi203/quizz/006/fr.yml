question: Selon les penseurs libéraux français, quel est le principal problème posé par la fragmentation de la liberté en différentes catégories (liberté politique vs liberté économique) ?
answer: Elle crée une incohérence logique en appliquant de manière sélective les principes du choix individuel
wrong_answers:
  - Elle rend la liberté économique plus importante que la liberté politique
  - Elle empêche les gouvernements de réguler efficacement les marchés
  - Elle élimine totalement la possibilité d'une prise de décision collective
explanation: |
  La tradition libérale française soutient que la séparation de la liberté en "bonnes" catégories (comme la liberté politique) et en "mauvaises" catégories (comme la liberté économique) crée une incohérence logique fondamentale. Les mêmes principes qui justifient la tolérance religieuse et le suffrage universel — à savoir la capacité de choix de l'individu - devraient logiquement s'étendre aux décisions économiques. Cette fragmentation réduit la liberté à un simple choix périodique des dirigeants politiques, tout en ignorant que les principes qui sous-tendent le choix individuel sont universels et devraient s'appliquer de manière cohérente à toutes les sphères de l'action humaine.

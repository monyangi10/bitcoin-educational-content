question: Според френските либерални мислители какъв е основният проблем при разделянето на свободата на различни категории (политическа и икономическа свобода)?
answer: Създава логическа непоследователност, като прилага избирателно принципите на индивидуалния избор
wrong_answers:
  - Икономическата свобода е по-важна от политическата
  - Тя пречи на правителствата да регулират ефективно пазарите
  - Той напълно премахва възможността за колективно вземане на решения
explanation: |
  Френската либерална традиция твърди, че разделянето на свободата на "добри" категории (като политическата свобода) и "лоши" категории (като икономическата свобода) създава фундаментална логическа непоследователност. Същите принципи, които оправдават религиозната толерантност и всеобщото избирателно право - а именно способността на индивида за избор - логично трябва да се разпространят и върху икономическите решения. Това раздробяване свежда свободата само до периодичен избор на политически лидери, като се пренебрегва фактът, че принципите, на които се основава индивидуалният избор, са универсални и следва да се прилагат последователно във всички сфери на човешката дейност.
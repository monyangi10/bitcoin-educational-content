question: Kulingana na wanafikra huria wa Ufaransa, tatizo kuu la kugawanya uhuru katika makundi tofauti (uhuru wa kisiasa dhidi ya uhuru wa kiuchumi) ni lipi?
answer: Huleta kutofautiana kimantiki kwa kutumia kanuni za uchaguzi wa mtu binafsi kwa kuchagua
wrong_answers:
  - Inafanya uhuru wa kiuchumi kuwa muhimu zaidi kuliko uhuru wa kisiasa
  - Inazuia serikali kudhibiti masoko kwa ufanisi
  - Inaondoa kabisa uwezekano wa kufanya maamuzi ya pamoja
explanation: |
  Mila ya kiliberali ya Ufaransa inasema kwamba kutenganisha uhuru katika kategoria za 'nzuri' (kama vile uhuru wa kisiasa) na kategoria za 'mbaya' (kama vile uhuru wa kiuchumi) hujenga kutolingana kwa msingi wa kimantiki. Kanuni zile zile zinazohalalisha uvumilivu wa kidini na haki ya kupiga kura kwa wote - yaani, uwezo wa mtu binafsi wa kuchagua - zinapaswa pia kupanuka kimantiki hadi maamuzi ya kiuchumi. Kugawanyika huku kunapunguza uhuru hadi kuchagua tu viongozi wa kisiasa mara kwa mara, huku kupuuza kwamba kanuni zinazosimamia uchaguzi wa mtu binafsi ni za ulimwengu wote na zinapaswa kutumika kila mara katika nyanja zote za vitendo vya binadamu.
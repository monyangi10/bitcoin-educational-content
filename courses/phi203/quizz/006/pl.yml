question: Jaki jest według francuskich myślicieli liberalnych główny problem z dzieleniem wolności na różne kategorie (wolność polityczna vs. wolność gospodarcza)?
answer: Tworzy logiczną niespójność poprzez wybiórcze stosowanie zasad indywidualnego wyboru
wrong_answers:
  - Sprawia, że wolność gospodarcza jest ważniejsza niż wolność polityczna
  - Uniemożliwia rządom skuteczne regulowanie rynków
  - Eliminuje to całkowicie możliwość zbiorowego podejmowania decyzji
explanation: |
  Francuska tradycja liberalna argumentuje, że podział wolności na kategorie "dobre" (takie jak wolność polityczna) i "złe" (takie jak wolność gospodarcza) tworzy fundamentalną niespójność logiczną. Te same zasady, które uzasadniają tolerancję religijną i powszechne prawo wyborcze - a mianowicie zdolność jednostki do wyboru - powinny logicznie rozciągać się również na decyzje gospodarcze. Takie rozdrobnienie redukuje wolność jedynie do okresowego wyboru przywódców politycznych, ignorując jednocześnie fakt, że zasady leżące u podstaw indywidualnego wyboru są uniwersalne i powinny być konsekwentnie stosowane we wszystkich sferach ludzkiego działania.
question: В чем, по мнению французских либеральных мыслителей, заключается основная проблема разделения свободы на разные категории (политическая и экономическая свобода)?
answer: Он создает логическую непоследовательность, избирательно применяя принципы индивидуального выбора
wrong_answers:
  - Экономическая свобода становится важнее политической
  - Она не позволяет правительствам эффективно регулировать рынки
  - Это полностью исключает возможность коллективного принятия решений
explanation: |
  Французская либеральная традиция утверждает, что разделение свободы на "хорошие" категории (например, политическая свобода) и "плохие" (например, экономическая свобода) создает фундаментальную логическую непоследовательность. Те же принципы, которые оправдывают религиозную терпимость и всеобщее избирательное право - а именно, способность человека к выбору - должны логически распространяться и на экономические решения. Такое дробление сводит свободу к простому периодическому выбору политических лидеров, игнорируя при этом, что принципы, лежащие в основе индивидуального выбора, универсальны и должны последовательно применяться во всех сферах человеческой деятельности.
question: Jaký je podle francouzských liberálních myslitelů hlavní problém s rozdělením svobody do různých kategorií (politická a ekonomická svoboda)?
answer: Vytváří logickou nekonzistenci tím, že selektivně uplatňuje principy individuální volby
wrong_answers:
  - Ekonomická svoboda je díky tomu důležitější než svoboda politická
  - Brání vládám účinně regulovat trhy
  - Zcela vylučuje možnost kolektivního rozhodování
explanation: |
  Francouzská liberální tradice tvrdí, že rozdělování svobody na "dobré" kategorie (jako je politická svoboda) a "špatné" kategorie (jako je ekonomická svoboda) vytváří zásadní logickou nekonzistenci. Stejné principy, které ospravedlňují náboženskou toleranci a všeobecné volební právo - totiž možnost volby jednotlivce - by se logicky měly vztahovat i na ekonomická rozhodnutí. Tato fragmentace redukuje svobodu na pouhou periodickou volbu politických vůdců, přičemž ignoruje, že principy, na nichž je založena individuální volba, jsou univerzální a měly by se důsledně uplatňovat ve všech oblastech lidského konání.
question: フランスの自由主義思想家によれば、自由を異なるカテゴリー（政治的自由と経済的自由）に細分化することの主な問題点は何か？
answer: 個人の選択の原則を選択的に適用することで、論理的矛盾を生む
wrong_answers:
  - 政治的自由よりも経済的自由をより重要視している
  - 政府が効果的に市場を規制することを妨げる
  - 集団的意思決定の可能性を完全に排除してしまう
explanation: |
  フランス自由主義の伝統は、自由を（政治的自由のような）「良い」カテゴリーと（経済的自由のような）「悪い」カテゴリーに分けることは、根本的な論理矛盾を生むと主張している。宗教的寛容と普通選挙を正当化する同じ原則、すなわち個人の選択能力は、論理的には経済的決定にも及ぶはずである。この細分化は、自由を単に政治指導者を定期的に選ぶことだけに縮小し、個人の選択の根底にある原則は普遍的なものであり、人間のあらゆる行動領域に一貫して適用されるべきものであることを無視している。
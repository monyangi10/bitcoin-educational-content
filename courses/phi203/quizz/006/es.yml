question: Según los pensadores liberales franceses, ¿cuál es el principal problema de fragmentar la libertad en diferentes categorías (libertad política frente a libertad económica)?
answer: Crea una incoherencia lógica al aplicar selectivamente los principios de elección individual
wrong_answers:
  - Hace que la libertad económica sea más importante que la libertad política
  - Impide a los gobiernos regular eficazmente los mercados
  - Elimina por completo la posibilidad de tomar decisiones colectivas
explanation: |
  La tradición liberal francesa sostiene que separar la libertad en categorías "buenas" (como la libertad política) y "malas" (como la libertad económica) crea una incoherencia lógica fundamental. Los mismos principios que justifican la tolerancia religiosa y el sufragio universal -a saber, la capacidad de elección del individuo- deberían lógicamente extenderse también a las decisiones económicas. Esta fragmentación reduce la libertad a la mera elección periódica de líderes políticos, ignorando que los principios que subyacen a la elección individual son universales y deberían aplicarse de forma coherente en todas las esferas de la acción humana.
question: Co tekst określa jako powód, dla którego wolność pracy jest konieczna i uzasadniona?
answer: Ponieważ potrzeby są osobiste i indywidualne, każda osoba musi mieć swobodę reagowania na nie na swój własny sposób
wrong_answers:
  - Ponieważ państwo nie może skutecznie zorganizować wszystkich działań gospodarczych w celu uzyskania maksymalnej produktywności
  - Ponieważ konkurencja między pracownikami prowadzi do lepszej jakości produktów i niższych cen dla konsumentów
  - Ponieważ doświadczenie historyczne pokazuje, że regulowane gospodarki zawsze nie zaspokajają podstawowych ludzkich potrzeb
explanation: |
  Tekst stanowi, że wolność pracy wywodzi się z osobistej i indywidualnej natury ludzkich potrzeb. Ponieważ każda osoba doświadcza własnego głodu i cierpienia w wyjątkowy sposób, musi mieć swobodę zaspokajania tych potrzeb w sposób, jaki uzna za stosowny. Tekst podkreśla, że ta indywidualistyczna podstawa uzasadnia wolność pracy, a nie argumenty dotyczące efektywności ekonomicznej, korzyści z konkurencyjnego rynku lub historyczne precedensy dotyczące regulowanych gospodarek.
question: Ni nini kinachobainisha maandishi haya kama sababu ya uhuru wa kufanya kazi kuwa muhimu na unaohalalishwa?
answer: Kwa sababu mahitaji ni ya kibinafsi na ya kibinafsi, kila mtu lazima awe huru kuyajibu kwa njia yake mwenyewe
wrong_answers:
  - Kwa sababu serikali haiwezi kupanga shughuli zote za kiuchumi kwa ufanisi kwa ajili ya uzalishaji wa juu zaidi
  - Kwa sababu ushindani kati ya wafanyakazi husababisha bidhaa bora na bei za chini kwa watumiaji
  - Kwa sababu uzoefu wa kihistoria unaonyesha kwamba uchumi unaodhibitiwa kila mara hushindwa kukidhi mahitaji ya msingi ya binadamu
explanation: |
  Maandishi yanathibitisha kwamba uhuru wa kufanya kazi unatokana na asili ya kibinafsi na ya kibinafsi ya mahitaji ya mwanadamu. Kwa kuwa kila mtu hupata njaa na mateso yake kwa njia ya kipekee, lazima awe huru kushughulikia mahitaji haya anavyoona inafaa. Maandishi yanasisitiza kwamba msingi huu wa kibinafsi unahalalisha uhuru wa kufanya kazi, badala ya hoja za ufanisi wa kiuchumi, faida za soko la ushindani, au mifano ya kihistoria kuhusu uchumi unaodhibitiwa.
question: Quelle est, selon le texte, la raison pour laquelle la liberté du travail est nécessaire et justifiée ?
answer: Parce que les besoins sont personnels et individuels, chaque personne doit être libre d'y répondre à sa manière
wrong_answers:
  - Parce que l'État ne peut pas organiser efficacement toutes les activités économiques en vue d'une productivité maximale
  - Parce que la concurrence entre les travailleurs permet d'obtenir des produits de meilleure qualité et des prix plus bas pour les consommateurs
  - Parce que l'expérience historique montre que les économies réglementées échouent toujours à satisfaire les besoins humains fondamentaux
explanation: |
  Le texte établit que la liberté de travail trouve son origine dans la nature personnelle et individuelle des besoins humains. Chaque personne ressentant sa faim et sa souffrance de manière unique, elle doit être libre de répondre à ces besoins comme elle l'entend. Le texte souligne que c'est ce fondement individualiste qui justifie la liberté du travail, plutôt que les arguments d'efficacité économique, les avantages du marché concurrentiel ou les précédents historiques des économies réglementées.
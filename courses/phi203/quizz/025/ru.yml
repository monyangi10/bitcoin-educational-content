question: Что в тексте называется причиной, по которой свобода труда необходима и оправдана?
answer: Поскольку потребности носят личный и индивидуальный характер, каждый человек должен иметь возможность удовлетворять их по-своему
wrong_answers:
  - Поскольку государство не может эффективно организовать всю экономическую деятельность для достижения максимальной производительности
  - Потому что конкуренция между работниками приводит к повышению качества продукции и снижению цен для потребителей
  - Потому что исторический опыт показывает, что регулируемая экономика всегда не способна удовлетворить основные потребности человека
explanation: |
  В тексте говорится, что свобода труда проистекает из личного и индивидуального характера человеческих потребностей. Поскольку каждый человек испытывает свой голод и страдания уникальным образом, он должен быть свободен в удовлетворении этих потребностей по своему усмотрению. В тексте подчеркивается, что именно эта индивидуалистическая основа оправдывает свободу труда, а не аргументы экономической эффективности, преимущества конкурентного рынка или исторические прецеденты, связанные с регулируемой экономикой.
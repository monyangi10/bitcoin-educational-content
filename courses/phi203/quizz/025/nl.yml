question: Wat is volgens de tekst de reden waarom vrijheid van werk noodzakelijk en gerechtvaardigd is?
answer: Omdat behoeften persoonlijk en individueel zijn, moet iedereen vrij zijn om er op zijn eigen manier op in te spelen
wrong_answers:
  - Omdat de staat niet alle economische activiteiten efficiënt kan organiseren voor maximale productiviteit
  - Omdat concurrentie tussen werknemers leidt tot producten van betere kwaliteit en lagere prijzen voor consumenten
  - Omdat de historische ervaring leert dat gereguleerde economieën er altijd niet in slagen te voorzien in de menselijke basisbehoeften
explanation: |
  De tekst stelt vast dat vrijheid van werk voortkomt uit de persoonlijke en individuele aard van menselijke behoeften. Omdat ieder mens zijn eigen honger en lijden op een unieke manier ervaart, moet hij vrij zijn om naar eigen inzicht in deze behoeften te voorzien. De tekst benadrukt dat deze individualistische basis de vrijheid van werk rechtvaardigt, in plaats van economische efficiëntie, concurrerende marktvoordelen of historische precedenten over gereguleerde economieën.
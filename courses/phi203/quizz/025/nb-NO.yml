question: Hva er det teksten peker på som grunnen til at arbeidsfrihet er nødvendig og berettiget?
answer: Fordi behovene er personlige og individuelle, må hver enkelt person ha frihet til å reagere på dem på sin egen måte
wrong_answers:
  - Fordi staten ikke kan organisere alle økonomiske aktiviteter effektivt for å oppnå maksimal produktivitet
  - Fordi konkurranse mellom arbeidstakere fører til bedre kvalitet på produktene og lavere priser for forbrukerne
  - Fordi historisk erfaring viser at regulerte økonomier alltid mislykkes i å dekke grunnleggende menneskelige behov
explanation: |
  Teksten slår fast at arbeidets frihet har sitt utspring i de menneskelige behovenes personlige og individuelle karakter. Siden hvert enkelt menneske opplever sult og lidelse på en unik måte, må det ha frihet til å dekke disse behovene på den måten det selv ønsker. Teksten understreker at dette individualistiske grunnlaget rettferdiggjør arbeidsfrihet, snarere enn økonomiske effektivitetsargumenter, konkurransedyktige markedsfordeler eller historisk presedens om regulerte økonomier.
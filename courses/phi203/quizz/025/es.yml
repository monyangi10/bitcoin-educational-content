question: ¿Qué señala el texto como razón por la que la libertad de trabajo es necesaria y está justificada?
answer: Dado que las necesidades son personales e individuales, cada persona debe ser libre de responder a ellas a su manera
wrong_answers:
  - Porque el Estado no puede organizar eficazmente todas las actividades económicas para lograr la máxima productividad
  - Porque la competencia entre trabajadores da lugar a productos de mejor calidad y precios más bajos para los consumidores
  - Porque la experiencia histórica demuestra que las economías reguladas siempre fracasan a la hora de satisfacer las necesidades humanas básicas
explanation: |
  El texto establece que la libertad de trabajo tiene su origen en la naturaleza personal e individual de las necesidades humanas. Puesto que cada persona experimenta su propia hambre y sufrimiento de forma única, debe ser libre de abordar estas necesidades como mejor le parezca. El texto subraya que este fundamento individualista justifica la libertad de trabajo, más que los argumentos de eficiencia económica, los beneficios del mercado competitivo o los precedentes históricos sobre economías reguladas.
question: Selon la théorie libérale, quelle est la caractéristique fondamentale qui distingue l'aide privée de l'aide publique en termes d'impact sur le développement humain ?
answer: L'assistance privée élève les individus en respectant leur individualité et en favorisant le progrès, tandis que l'assistance publique les dégrade en les rendant dépendants comme des serfs
wrong_answers:
  - L'aide privée fournit davantage de ressources financières par bénéficiaire, tandis que l'aide publique répartit des fonds limités sur des populations plus importantes
  - L'aide privée se concentre sur l'aide d'urgence temporaire, tandis que l'aide publique crée des filets de sécurité permanents pour une stabilité à long terme
  - L'aide privée passe par des institutions religieuses qui promeuvent des valeurs morales, tandis que l'aide publique reste strictement laïque dans son approche
explanation: |
  Selon la théorie libérale, l'assistance privée diffère fondamentalement de l'assistance publique dans son approche de la dignité humaine et du développement. L'assistance privée respecte l'autonomie individuelle et encourage le développement personnel, alors que l'assistance publique bureaucratique crée des relations de dépendance semblables à la servitude féodale. Cette distinction reflète l'accent mis par les libéraux sur l'association volontaire par rapport à la coercition de l'État, où l'aide volontaire maintient l'action humaine alors que l'aide sociale institutionnelle crée une dépendance dégradante qui empêche le progrès individuel et l'autodétermination.
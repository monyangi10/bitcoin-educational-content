question: Enligt liberal teori, vilken grundläggande egenskap skiljer privat bistånd från offentligt bistånd när det gäller dess inverkan på mänsklig utveckling?
answer: Privat hjälp lyfter individer genom att respektera deras individualitet och främja framsteg, medan offentlig hjälp förnedrar dem till ett livegenskapsliknande beroende
wrong_answers:
  - Privat bistånd ger mer ekonomiska resurser per mottagare, medan offentligt bistånd sprider begränsade medel över större befolkningsgrupper
  - Privat bistånd fokuserar på tillfällig nödhjälp, medan offentligt bistånd skapar permanenta skyddsnät för långsiktig stabilitet
  - Privat bistånd verkar genom religiösa institutioner som främjar moraliska värderingar, medan det offentliga biståndet är strikt sekulärt i sitt synsätt
explanation: |
  Liberal teori hävdar att privat assistans skiljer sig fundamentalt från offentlig assistans i sin syn på mänsklig värdighet och utveckling. Privat assistans respekterar individens autonomi och uppmuntrar till personlig utveckling, medan byråkratisk offentlig assistans skapar beroendeförhållanden som liknar feodal träldom. Denna distinktion återspeglar den liberala betoningen på frivillig samverkan kontra statligt tvång, där frivillig hjälp upprätthåller mänsklig handlingskraft medan institutionell välfärd skapar ett förnedrande beroende som hämmar individens utveckling och självbestämmande.
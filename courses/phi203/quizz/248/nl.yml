question: Welk fundamenteel kenmerk onderscheidt volgens de liberale theorie particuliere hulp van openbare hulp als het gaat om de invloed ervan op de menselijke ontwikkeling?
answer: Particuliere bijstand verheft individuen door hun individualiteit te respecteren en vooruitgang te bevorderen, terwijl openbare bijstand hen degradeert tot slaafse afhankelijkheid
wrong_answers:
  - Particuliere bijstand biedt meer financiële middelen per ontvanger, terwijl overheidsbijstand beperkte middelen over grotere populaties verdeelt
  - Particuliere bijstand richt zich op tijdelijke noodhulp, terwijl openbare bijstand permanente vangnetten creëert voor stabiliteit op de lange termijn
  - Particuliere hulpverlening werkt via religieuze instellingen die morele waarden promoten, terwijl openbare hulpverlening een strikt seculiere aanpak heeft
explanation: |
  De liberale theorie stelt dat particuliere hulp fundamenteel verschilt van openbare hulp door de benadering van menselijke waardigheid en ontwikkeling. Particuliere hulp respecteert individuele autonomie en moedigt persoonlijke groei aan, terwijl bureaucratische publieke hulp afhankelijkheidsrelaties creëert die lijken op feodale slavernij. Dit onderscheid weerspiegelt de liberale nadruk op vrijwillige associatie versus staatsdwang, waarbij vrijwillige hulp de menselijke agency in stand houdt terwijl institutionele bijstand een vernederende afhankelijkheid creëert die individuele vooruitgang en zelfbeschikking belemmert.
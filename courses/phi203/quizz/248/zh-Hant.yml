question: 根據自由主義理論，就對人類發展的影響而言，私人援助有別於公共援助的基本特徵是什麼？
answer: 私人援助透過尊重個性和促進進步來提升個人，而公共援助則使他們淪為農奴式的依賴。
wrong_answers:
  - 私人援助可為每位受助人提供更多的財務資源，而公共援助則可將有限的資金分散到更多人身上
  - 私人援助著重於臨時緊急救助，而公共援助則為長期穩定建立永久安全網
  - 私人援助透過宣揚道德價值的宗教機構運作，而公共援助則採用嚴格的世俗方法
explanation: |
  自由理論認為，私人援助與公共援助在對待人類尊嚴和發展的方式上有根本的不同。私人援助尊重個人自主並鼓勵個人成長，而官僚式的公共援助則造成類似封建奴役的依賴關係。這種區別反映出自由主義強調自願結社相對於國家強迫，自願性的幫助維持人的能動性，而制度性的福利則製造有辱人格的依賴，抑制個人的進步與自決。
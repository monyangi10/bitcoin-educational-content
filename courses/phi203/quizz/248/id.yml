question: Menurut teori liberal, karakteristik mendasar apa yang membedakan bantuan swasta dengan bantuan publik dalam hal dampaknya terhadap pembangunan manusia?
answer: Bantuan pribadi mengangkat individu dengan menghormati individualitas mereka dan mendorong kemajuan, sementara bantuan publik merendahkan mereka menjadi ketergantungan seperti budak
wrong_answers:
  - Bantuan swasta menyediakan lebih banyak sumber daya keuangan per penerima, sementara bantuan publik menyebarkan dana yang terbatas ke populasi yang lebih besar
  - Bantuan swasta berfokus pada bantuan darurat sementara, sementara bantuan publik menciptakan jaring pengaman permanen untuk stabilitas jangka panjang
  - Bantuan swasta beroperasi melalui lembaga-lembaga keagamaan yang mempromosikan nilai-nilai moral, sementara bantuan publik tetap menggunakan pendekatan sekuler
explanation: |
  Teori liberal berpendapat bahwa bantuan swasta pada dasarnya berbeda dengan bantuan publik dalam hal pendekatannya terhadap martabat manusia dan pembangunan. Bantuan swasta menghormati otonomi individu dan mendorong pertumbuhan pribadi, sementara bantuan publik yang birokratis menciptakan hubungan ketergantungan yang mirip dengan perbudakan feodal. Perbedaan ini mencerminkan penekanan liberal pada asosiasi sukarela versus paksaan negara, di mana bantuan sukarela mempertahankan kebebasan manusia sementara kesejahteraan institusional menciptakan ketergantungan yang merendahkan yang menghambat kemajuan dan penentuan nasib sendiri.
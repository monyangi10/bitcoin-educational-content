question: Liberal teoriye göre, insani gelişim üzerindeki etkisi açısından özel yardımları kamu yardımlarından ayıran temel özellik nedir?
answer: Özel yardım, bireyselliklerine saygı göstererek ve ilerlemeyi teşvik ederek bireyleri yüceltirken, kamu yardımı onları köle benzeri bir bağımlılığa indirger
wrong_answers:
  - Özel yardımlar alıcı başına daha fazla mali kaynak sağlarken, kamu yardımları sınırlı fonları daha geniş kitlelere yaymaktadır
  - Özel yardımlar geçici acil yardımlara odaklanırken, kamu yardımları uzun vadeli istikrar için kalıcı güvenlik ağları oluşturur
  - Özel yardımlar, ahlaki değerleri teşvik eden dini kurumlar aracılığıyla yürütülürken, kamu yardımları kesinlikle seküler bir yaklaşıma sahiptir
explanation: |
  Liberal teori, özel yardımın insan onuru ve gelişimine yaklaşımı bakımından kamu yardımından temelde farklı olduğunu savunur. Özel yardım bireysel özerkliğe saygı gösterir ve kişisel gelişimi teşvik ederken, bürokratik kamu yardımı feodal köleliğe benzer bağımlılık ilişkileri yaratır. Bu ayrım, gönüllü yardımın insan failliğini koruduğu, kurumsal refahın ise bireysel ilerlemeyi ve kendi kaderini tayin etmeyi engelleyen aşağılayıcı bağımlılık yarattığı devlet zorlamasına karşı gönüllü birlikteliğe yapılan liberal vurguyu yansıtmaktadır.
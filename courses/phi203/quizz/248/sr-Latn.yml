question: Prema liberalnoj teoriji, koja fundamentalna karakteristika razlikuje privatnu pomoć od javne pomoći u smislu njenog uticaja na ljudski razvoj?
answer: Privatna pomoć uzdiže pojedince poštujući njihovu individualnost i promovišući napredak, dok ih javna pomoć degradira u zavisnost nalik kmetstvu.
wrong_answers:
  - Privatna pomoć pruža više finansijskih sredstava po primaocu, dok javna pomoć raspodeljuje ograničena sredstva na veće populacije.
  - Privatna pomoć se fokusira na privremenu hitnu pomoć, dok javna pomoć stvara trajne sigurnosne mreže za dugoročnu stabilnost.
  - Privatna pomoć deluje kroz verske institucije koje promovišu moralne vrednosti, dok javna pomoć ostaje strogo sekularna u pristupu.
explanation: |
  Liberalna teorija tvrdi da se privatna pomoć suštinski razlikuje od javne pomoći u svom pristupu ljudskom dostojanstvu i razvoju. Privatna pomoć poštuje individualnu autonomiju i podstiče lični rast, dok birokratska javna pomoć stvara zavisničke odnose slične feudalnom ropstvu. Ova razlika odražava liberalni naglasak na dobrovoljnom udruživanju naspram državne prinude, gde dobrovoljna pomoć održava ljudsku agenciju, dok institucionalna socijalna pomoć stvara ponižavajuću zavisnost koja sprečava individualni napredak i samoodređenje.
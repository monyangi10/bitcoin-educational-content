question: Dushingiye ku ciyumviro c’ubwigenge, ni ikihe kintu nyamukuru gitandukanya imfashanyo y’abikorera ku giti cabo n’iya Leta mu bijanye n’ingaruka zigira ku guteza imbere umuntu?
answer: Imfashanyo y’abantu ku giti cabo iraduza abantu ku giti cabo mu kwubahiriza ubuntu bwabo no guteza imbere iterambere, mu gihe imfashanyo ya Leta ibacisha bugufi bakaba abaja nk’abaja .
wrong_answers:
  - Imfashanyo y’abikorera ku giti cabo itanga amafaranga menshi ku muntu wese ayironka, mu gihe imfashanyo ya Leta ikwiragiza amafaranga make mu bantu benshi .
  - Imfashanyo y’abikorera ku giti cabo yibanda ku gufasha abantu mu gihe gitoyi, mu gihe imfashanyo ya Leta irema insenga z’umutekano zihoraho kugira ngo umuntu ashobore gushikama igihe kirekire .
  - Imfashanyo y’abantu ku giti cabo ikora biciye ku nzego z’idini zitera imbere mu vy’inyifato runtu, mu gihe imfashanyo ya Leta iguma ari iyo kw’isi gusa .
explanation: |
  Ivyiyumviro vy’ubwigenge bivuga ko imfashanyo y’abikorera ku giti cabo itandukanye cane n’imfashanyo ya Leta mu buryo ifata mu bijanye n’uburenganzira n’iterambere ry’umuntu. Imfashanyo y’abikorera ku giti cabo yubaha ubwigenge bw’umuntu ku giti ciwe kandi iremesha iterambere ry’umuntu ku giti ciwe, mu gihe imfashanyo ya Leta y’uburongozi irema imigenderanire y’ukwisunga isa n’ubuja bw’abanyagihugu. Iryo tandukaniro ryerekana ugushimika kw’ubwigenge ku kwifatanya n’abandi ku bushake n’uguhatirwa na Leta, aho imfashanyo y’ubushake ibungabunga uburenganzira bwa muntu mu gihe imibereho myiza y’inzego irema ukuvyifatamwo nabi bibuza umuntu gutera imbere no kwiyemeza.
question: Jaká základní charakteristika podle liberální teorie odlišuje soukromou pomoc od veřejné pomoci z hlediska jejího dopadu na lidský rozvoj?
answer: Soukromá pomoc povznáší jednotlivce tím, že respektuje jeho individualitu a podporuje pokrok, zatímco veřejná pomoc ho degraduje do závislosti podobající se nevolnictví
wrong_answers:
  - Soukromá pomoc poskytuje více finančních prostředků na příjemce, zatímco veřejná pomoc rozděluje omezené prostředky mezi větší skupiny obyvatel
  - Soukromá pomoc se zaměřuje na dočasnou pomoc v nouzi, zatímco veřejná pomoc vytváří trvalé záchranné sítě pro dlouhodobou stabilitu
  - Soukromá pomoc je poskytována prostřednictvím náboženských institucí, které podporují morální hodnoty, zatímco veřejná pomoc zůstává přísně sekulární
explanation: |
  Liberální teorie tvrdí, že soukromá pomoc se zásadně liší od veřejné pomoci svým přístupem k lidské důstojnosti a rozvoji. Soukromá pomoc respektuje autonomii jednotlivce a podporuje jeho osobní rozvoj, zatímco byrokratická veřejná pomoc vytváří vztahy závislosti podobné feudálnímu nevolnictví. Tento rozdíl odráží liberální důraz na dobrovolné sdružování oproti státnímu donucení, kdy dobrovolná pomoc udržuje lidskou aktivitu, zatímco institucionální sociální péče vytváří ponižující závislost, která brání individuálnímu pokroku a sebeurčení.
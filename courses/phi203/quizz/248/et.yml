question: Milline põhiline omadus eristab liberaalse teooria kohaselt eraviisilist abi riiklikust abist selle mõju poolest inimarengule?
answer: Eraabi tõstab üksikisikuid, austades nende individuaalsust ja edendades arengut, samas kui riiklik abi alandab neid orjapõlvesarnaseks sõltuvuseks
wrong_answers:
  - Eratoetus annab rohkem rahalisi vahendeid ühe abisaaja kohta, samas kui riiklik toetus jaotab piiratud vahendid suuremale elanikkonnale
  - Eraabi keskendub ajutisele hädaabile, samas kui riiklik abi loob püsiva turvavõrgu pikaajalise stabiilsuse tagamiseks
  - Erakorraline abi tegutseb moraalset väärtust edendavate religioossete institutsioonide kaudu, samas kui riiklik abi jääb rangelt ilmalikuks lähenemisviisiks
explanation: |
  Liberaalne teooria väidab, et eraviisiline abi erineb põhimõtteliselt riiklikust abist selle poolest, kuidas see läheneb inimväärikusele ja arengule. Eraabi austab individuaalset autonoomiat ja soodustab isiklikku arengut, samas kui bürokraatlik riiklik abi tekitab feodaalse orjusega sarnaseid sõltuvussuhteid. See erinevus peegeldab liberaalset rõhuasetust vabatahtlikule ühinemisele ja riiklikule sunnile, kus vabatahtlik abi säilitab inimtegevust, samas kui institutsionaalne hoolekanne loob alandavat sõltuvust, mis takistab individuaalset arengut ja enesemääratlust.
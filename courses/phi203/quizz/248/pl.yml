question: Zgodnie z teorią liberalną, jaka podstawowa cecha odróżnia pomoc prywatną od pomocy publicznej pod względem jej wpływu na rozwój człowieka?
answer: Pomoc prywatna wywyższa jednostki, szanując ich indywidualność i promując postęp, podczas gdy pomoc publiczna degraduje je do roli poddanych
wrong_answers:
  - Pomoc prywatna zapewnia więcej środków finansowych na odbiorcę, podczas gdy pomoc publiczna rozkłada ograniczone fundusze na większe populacje
  - Pomoc prywatna koncentruje się na tymczasowej pomocy w nagłych wypadkach, podczas gdy pomoc publiczna tworzy trwałe sieci bezpieczeństwa zapewniające długoterminową stabilność
  - Pomoc prywatna działa za pośrednictwem instytucji religijnych promujących wartości moralne, podczas gdy pomoc publiczna pozostaje ściśle świecka w podejściu
explanation: |
  Teoria liberalna argumentuje, że pomoc prywatna zasadniczo różni się od pomocy publicznej podejściem do ludzkiej godności i rozwoju. Pomoc prywatna szanuje indywidualną autonomię i zachęca do rozwoju osobistego, podczas gdy biurokratyczna pomoc publiczna tworzy relacje zależności podobne do feudalnej niewoli. To rozróżnienie odzwierciedla liberalny nacisk na dobrowolne zrzeszanie się w porównaniu z przymusem państwowym, gdzie dobrowolna pomoc utrzymuje ludzką sprawczość, podczas gdy instytucjonalna opieka społeczna tworzy poniżającą zależność, która hamuje indywidualny postęp i samostanowienie.
question: Según la teoría liberal, ¿qué característica fundamental distingue la asistencia privada de la pública en cuanto a su impacto en el desarrollo humano?
answer: La asistencia privada eleva a los individuos respetando su individualidad y promoviendo el progreso, mientras que la asistencia pública los degrada a la dependencia de los siervos
wrong_answers:
  - La ayuda privada proporciona más recursos económicos por beneficiario, mientras que la pública reparte los limitados fondos entre poblaciones más amplias
  - La asistencia privada se centra en la ayuda de emergencia temporal, mientras que la pública crea redes de seguridad permanentes para la estabilidad a largo plazo
  - La ayuda privada se canaliza a través de instituciones religiosas que promueven valores morales, mientras que la ayuda pública sigue teniendo un enfoque estrictamente laico
explanation: |
  La teoría liberal sostiene que la asistencia privada difiere fundamentalmente de la pública en su enfoque de la dignidad humana y el desarrollo. La asistencia privada respeta la autonomía individual y fomenta el crecimiento personal, mientras que la asistencia pública burocrática crea relaciones de dependencia similares a la servidumbre feudal. Esta distinción refleja el énfasis liberal en la asociación voluntaria frente a la coerción estatal, donde la ayuda voluntaria mantiene la agencia humana mientras que la asistencia social institucional crea una dependencia degradante que inhibe el progreso individual y la autodeterminación.
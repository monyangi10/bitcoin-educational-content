question: Hvilken grunnleggende egenskap er det ifølge liberal teori som skiller privat bistand fra offentlig bistand når det gjelder dens innvirkning på menneskelig utvikling?
answer: Privat assistanse løfter individet ved å respektere dets individualitet og fremme fremgang, mens offentlig assistanse degraderer det til livegen avhengighet
wrong_answers:
  - Privat bistand gir mer økonomiske ressurser per mottaker, mens offentlig bistand sprer begrensede midler over større befolkningsgrupper
  - Privat bistand fokuserer på midlertidig nødhjelp, mens offentlig bistand skaper permanente sikkerhetsnett for langsiktig stabilitet
  - Privat bistand drives gjennom religiøse institusjoner som fremmer moralske verdier, mens offentlig bistand forblir strengt sekulær i sin tilnærming
explanation: |
  Liberal teori hevder at privat bistand skiller seg fundamentalt fra offentlig bistand i sin tilnærming til menneskeverd og utvikling. Privat hjelp respekterer individets autonomi og oppmuntrer til personlig vekst, mens byråkratisk offentlig hjelp skaper avhengighetsforhold som ligner på føydal trelldom. Dette skillet gjenspeiler den liberale vektleggingen av frivillig samarbeid kontra statlig tvang, der frivillig hjelp opprettholder menneskelig handlekraft, mens institusjonell velferd skaper nedverdigende avhengighet som hemmer individuell fremgang og selvbestemmelse.
question: Vilken är enligt texten den största fördelen med progressiva reformer jämfört med våldsamma revolutioner när det gäller att utöka friheten?
answer: De gör det möjligt för samhället att anta frihet när förhållandena verkligen tillåter det utan att generera överdrivet våld
wrong_answers:
  - De eliminerar behovet av förändringar av befintliga politiska och ekonomiska strukturer
  - De garanterar att alla samhällsklasser omedelbart kommer att acceptera nya idéer om frihet
  - De förhindrar att oppositionsgrupper bildas under perioder av samhällsomvandling
explanation: |
  I texten förklaras att progressiva reformer är att föredra eftersom de gör det möjligt för samhällen att anta mer frihet vid rätt tidpunkt när förhållandena verkligen tillåter det, vägledda av en välinformerad allmän opinion. Till skillnad från våldsamma revolutioner undviker reformer överdrivet våld och förhindrar att fler förändringar införs än vad allmänheten är redo för. Revolutioner tenderar att leda till betydande våld och leder ofta till bakslag eftersom de går utöver vad samhället kan absorbera, medan progressiva reformer skapar hållbar förändring som är anpassad till faktiska omständigheter.
question: Jaká je podle textu hlavní výhoda progresivních reforem oproti násilným revolucím při rozšiřování svobody?
answer: Umožňují společnosti přijmout svobodu, pokud to podmínky skutečně umožňují, aniž by docházelo k nadměrnému násilí
wrong_answers:
  - Vylučují nutnost změny stávajících politických a ekonomických struktur
  - Zaručují, že všechny společenské vrstvy okamžitě přijmou nové myšlenky o svobodě
  - Zabraňují vzniku opozičních skupin v období společenské transformace
explanation: |
  Text vysvětluje, že progresivní reformy jsou vhodnější, protože umožňují společnostem přijmout více svobody ve správný okamžik, kdy to podmínky skutečně umožňují, a to na základě informovaného veřejného mínění. Na rozdíl od násilných revolucí se reformy vyhýbají nadměrnému násilí a zabraňují zavádění více změn, než na kolik je veřejnost připravena. Revoluce mají tendenci ke značnému násilí a často vedou k nezdarům, protože překračují rámec toho, co je společnost schopna absorbovat, zatímco progresivní reformy vytvářejí trvalé změny odpovídající skutečným podmínkám.
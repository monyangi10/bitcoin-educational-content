question: D'après le texte, quel est le principal avantage des réformes progressives par rapport aux révolutions violentes pour étendre la liberté ?
answer: Ils permettent à la société d'adopter la liberté lorsque les conditions le permettent réellement sans générer de violence excessive
wrong_answers:
  - Ils éliminent la nécessité de modifier les structures politiques et économiques existantes
  - Ils garantissent que toutes les classes sociales accepteront immédiatement les nouvelles idées sur la liberté
  - Ils empêchent la formation de groupes d'opposition pendant les périodes de transformation sociale
explanation: |
  Le texte explique que les réformes progressives sont préférables parce qu'elles permettent aux sociétés d'adopter plus de liberté au moment opportun, lorsque les conditions le permettent vraiment, guidées par une opinion publique informée. Contrairement aux révolutions violentes, les réformes évitent la violence excessive et empêchent d'imposer plus de changements que l'opinion publique n'est prête à accepter. Les révolutions tendent à provoquer une violence importante et conduisent souvent à des échecs parce qu'elles vont au-delà de ce que la société peut absorber, tandis que les réformes progressives créent un changement durable aligné sur les circonstances réelles.
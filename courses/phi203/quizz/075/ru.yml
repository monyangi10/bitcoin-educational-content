question: Согласно тексту, в чем главное преимущество прогрессивных реформ перед насильственными революциями в деле расширения свободы?
answer: Они позволяют обществу принять свободу, когда условия действительно позволяют это сделать, не порождая чрезмерного насилия
wrong_answers:
  - Они исключают необходимость внесения изменений в существующие политические и экономические структуры
  - Они гарантируют, что все социальные слои немедленно примут новые идеи о свободе
  - Они препятствуют формированию оппозиционных групп в периоды социальных преобразований
explanation: |
  В тексте объясняется, что прогрессивные реформы предпочтительнее, потому что они позволяют обществу принять больше свободы в нужный момент, когда условия действительно позволяют это сделать, руководствуясь информированным общественным мнением. В отличие от насильственных революций, реформы избегают чрезмерного насилия и предотвращают навязывание больших изменений, чем те, к которым готово общество. Революции, как правило, сопровождаются значительным насилием и часто приводят к неудачам, поскольку выходят за рамки того, что может воспринять общество, в то время как прогрессивные реформы создают устойчивые изменения, соответствующие реальным обстоятельствам.
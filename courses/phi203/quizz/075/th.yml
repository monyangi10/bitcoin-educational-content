question: ตามข้อความ ข้อได้เปรียบหลักของการปฏิรูปแบบก้าวหน้ามากกว่าการปฏิวัติที่ใช้ความรุนแรงในการขยายเสรีภาพคืออะไร?
answer: พวกเขาอนุญาตให้สังคมยอมรับเสรีภาพเมื่อเงื่อนไขเอื้ออำนวยจริง ๆ โดยไม่ก่อให้เกิดความรุนแรงมากเกินไป
wrong_answers:
  - พวกเขากำจัดความจำเป็นในการเปลี่ยนแปลงโครงสร้างทางการเมืองและเศรษฐกิจที่มีอยู่
  - พวกเขารับประกันว่าชนชั้นทางสังคมทั้งหมดจะยอมรับแนวคิดใหม่เกี่ยวกับเสรีภาพในทันที
  - พวกเขาป้องกันไม่ให้กลุ่มต่อต้านใด ๆ ก่อตัวขึ้นในช่วงเวลาของการเปลี่ยนแปลงทางสังคม
explanation: |
  ข้อความอธิบายว่าการปฏิรูปแบบก้าวหน้าเป็นที่น่าพึงพอใจมากกว่าเพราะพวกเขาอนุญาตให้สังคมยอมรับเสรีภาพมากขึ้นในช่วงเวลาที่เหมาะสมเมื่อเงื่อนไขเอื้ออำนวยจริง ๆ โดยมีความเห็นสาธารณะที่มีข้อมูลเป็นแนวทาง ต่างจากการปฏิวัติที่ใช้ความรุนแรง การปฏิรูปหลีกเลี่ยงความรุนแรงที่มากเกินไปและป้องกันการบังคับใช้การเปลี่ยนแปลงมากกว่าที่สาธารณะพร้อมจะรับ การปฏิวัติมักจะ generate ความรุนแรงอย่างมีนัยสำคัญและมักนำไปสู่ความล้มเหลวเพราะพวกเขาผลักดันเกินกว่าที่สังคมจะรับได้ ในขณะที่การปฏิรูปแบบก้าวหน้าสร้างการเปลี่ยนแปลงที่ยั่งยืนสอดคล้องกับสถานการณ์จริง
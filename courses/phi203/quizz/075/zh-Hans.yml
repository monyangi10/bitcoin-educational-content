question: 根据课文内容，与暴力革命相比，渐进式改革在扩大自由方面的主要优势是什么？
answer: 它们允许社会在条件真正允许的情况下采用自由，而不会产生过度的暴力
wrong_answers:
  - 无需改变现有的政治和经济结构
  - 它们保证所有社会阶层都能立即接受关于自由的新思想
  - 在社会转型时期，他们阻止任何反对派团体的形成
explanation: |
  文中解释说，渐进式改革是可取的，因为它允许社会在条件真正允许时，在知情民意的指导下，在适当的时机采用更多的自由。与暴力革命不同，改革可以避免过度暴力，防止强加的变革超过公众的准备程度。革命往往会引发严重的暴力，而且往往会导致挫折，因为革命超出了社会所能承受的范围，而渐进式改革则能创造符合实际情况的可持续变革。
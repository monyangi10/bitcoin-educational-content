question: Metne göre, ilerici reformların özgürlüğün genişletilmesinde şiddetli devrimlere göre temel avantajı nedir?
answer: Toplumun, koşullar gerçekten izin verdiğinde, aşırı şiddete yol açmadan özgürlüğü benimsemesine izin verirler
wrong_answers:
  - Mevcut siyasi ve ekonomik yapılarda herhangi bir değişiklik yapılması ihtiyacını ortadan kaldırırlar
  - Tüm sosyal sınıfların özgürlükle ilgili yeni fikirleri hemen kabul edeceğini garanti ederler
  - Toplumsal dönüşüm dönemlerinde muhalif grupların oluşmasını engellerler
explanation: |
  Metin, ilerici reformların tercih edilebilir olduğunu, çünkü toplumların doğru zamanda, koşullar gerçekten izin verdiğinde, bilgilendirilmiş kamuoyu tarafından yönlendirilerek daha fazla özgürlük benimsemelerine olanak tanıdığını açıklamaktadır. Şiddet içeren devrimlerin aksine reformlar aşırı şiddetten kaçınır ve halkın hazır olduğundan daha fazla değişikliğin dayatılmasını önler. Devrimler toplumun kaldırabileceğinin ötesini zorladıkları için ciddi şiddet olaylarına yol açma ve genellikle gerilemeye neden olma eğilimindeyken, ilerici reformlar gerçek koşullarla uyumlu sürdürülebilir değişim yaratır.
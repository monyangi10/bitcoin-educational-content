question: Mis on teksti kohaselt progressiivsete reformide peamine eelis vägivaldsete revolutsioonide ees vabaduse laiendamisel?
answer: Nad võimaldavad ühiskonnal võtta vastu vabadust, kui tingimused seda tõesti võimaldavad, ilma et see tekitaks liigset vägivalda
wrong_answers:
  - Nad kõrvaldavad vajaduse muuta olemasolevaid poliitilisi ja majanduslikke struktuure
  - Nad tagavad, et kõik ühiskonnaklassid võtavad kohe vastu uued ideed vabadusest
  - Nad takistavad igasuguste opositsiooniliste rühmituste moodustamist sotsiaalsete muutuste ajal
explanation: |
  Tekstis selgitatakse, et progressiivsed reformid on eelistatavad, sest need võimaldavad ühiskonnal võtta suurema vabaduse vastu õigel hetkel, kui tingimused seda tõesti võimaldavad, juhindudes teadlikust avalikust arvamusest. Erinevalt vägivaldsetest revolutsioonidest väldivad reformid liigset vägivalda ja hoiavad ära suurema hulga muudatuste kehtestamise, kui rahvas on selleks valmis. Revolutsioonid kalduvad generate märkimisväärse vägivallaga ja toovad sageli kaasa tagasilööke, sest need ületavad ühiskonna võimekuse, samas kui progressiivsed reformid loovad püsivaid muutusi, mis on kooskõlas tegelike oludega.
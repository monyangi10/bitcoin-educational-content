question: 本文によれば、自由を拡大する上で、暴力的な革命に対する進歩的な改革の主な利点は何か？
answer: 過剰な暴力を発生させることなく、社会が真に自由を許す状況であれば、自由を採用することができる。
wrong_answers:
  - 既存の政治・経済構造を変える必要がない。
  - すべての社会階層が、自由についての新しい考えを即座に受け入れることを保証する。
  - 社会の変革期に反対派が結成されるのを防ぐ。
explanation: |
  漸進的な改革が望ましいのは、社会が、情報に基づいた世論に導かれながら、状況が真に許す適切なタイミングで、より多くの自由を採用することを可能にするからだと、このテキストは説明する。暴力的な革命とは異なり、改革は過度な暴力を避け、国民が準備できる以上の変化を押し付けることを防ぐ。革命は、社会が吸収できる限度を超えて押し進めるため、generateに大きな暴力を伴う傾向があり、しばしば挫折につながるが、進歩的改革は、実際の状況に沿った持続可能な変化を生み出す。
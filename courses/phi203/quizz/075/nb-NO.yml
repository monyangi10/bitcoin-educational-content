question: Hva er, ifølge teksten, den største fordelen med progressive reformer fremfor voldelige revolusjoner når det gjelder å utvide friheten?
answer: De gjør det mulig for samfunnet å ta i bruk frihet når forholdene virkelig tillater det, uten at det genererer overdreven vold
wrong_answers:
  - De eliminerer behovet for endringer i eksisterende politiske og økonomiske strukturer
  - De garanterer at alle samfunnsklasser umiddelbart vil akseptere nye ideer om frihet
  - De forhindrer at det dannes opposisjonsgrupper i perioder med sosial endring
explanation: |
  Teksten forklarer at progressive reformer er å foretrekke fordi de gjør det mulig for samfunn å innføre mer frihet på det rette tidspunktet, når forholdene virkelig tillater det, styrt av en informert opinion. I motsetning til voldelige revolusjoner unngår reformer overdreven vold og forhindrer at det innføres flere endringer enn befolkningen er klar for. Revolusjoner har en tendens til å føre til betydelig vold og fører ofte til tilbakeslag fordi de går utover det samfunnet kan absorbere, mens progressive reformer skaper bærekraftige endringer som er tilpasset de faktiske omstendighetene.
question: Theo văn bản, ưu điểm chính của cải cách tiến bộ so với các cuộc cách mạng bạo lực trong việc mở rộng tự do là gì?
answer: Chúng cho phép xã hội áp dụng tự do khi điều kiện thực sự cho phép mà không gây ra bạo lực quá mức.
wrong_answers:
  - Chúng loại bỏ sự cần thiết phải thay đổi bất kỳ cấu trúc chính trị và kinh tế hiện có nào.
  - Họ đảm bảo rằng tất cả các tầng lớp xã hội sẽ ngay lập tức chấp nhận những ý tưởng mới về tự do.
  - Chúng ngăn cản sự hình thành bất kỳ nhóm đối lập nào trong thời kỳ chuyển đổi xã hội.
explanation: |
  Văn bản giải thích rằng các cuộc cải cách tiến bộ được ưu tiên hơn vì chúng cho phép xã hội áp dụng nhiều tự do hơn vào đúng thời điểm khi điều kiện thực sự cho phép, được dẫn dắt bởi dư luận có hiểu biết. Không giống như các cuộc cách mạng bạo lực, cải cách tránh bạo lực quá mức và ngăn chặn việc áp đặt nhiều thay đổi hơn mức mà công chúng sẵn sàng chấp nhận. Các cuộc cách mạng thường gây ra bạo lực đáng kể và thường dẫn đến những bước thụt lùi vì chúng vượt quá khả năng thích ứng của xã hội, trong khi các cuộc cải cách tiến bộ tạo ra sự thay đổi bền vững phù hợp với hoàn cảnh thực tế.
question: Kulingana na nadharia ya uchumi huria, ni utaratibu gani mkuu ambao utajiri lazima udumishwe kila mara katika jamii za kisasa za kibepari?
answer: Kazi ya kila siku ya uchambuzi wa soko na uwekezaji ili kudumisha thamani ya mtaji
wrong_answers:
  - Haki za urithi wa mali ambazo generate hupata kiotomatiki bila juhudi
  - Sera za ugawaji upya wa serikali zinazohakikisha mkusanyiko wa utajiri unabaki thabiti
  - Mifumo ya kijamii isiyobadilika inayohakikisha usambazaji wa utajiri kwa vizazi vyote
explanation: |
  Nadharia ya uchumi huria, kama ilivyowasilishwa na Paul Leroy-Beaulieu, inasema kwamba jamii za kisasa zimepangwa kutegemea kazi, ambapo utajiri lazima 'ununuliwe tena' kila mara kupitia kazi. Kuthamini mtaji wenyewe ni kazi ya kila siku ya uchambuzi wa soko na uwekezaji. Hii inapingana na uchambuzi wa tabaka la Marx kwa kuonyesha kwamba hata wamiliki wa mtaji lazima waendelee kufanya kazi ili kudumisha nafasi zao. Majibu yasiyo sahihi yanaonyesha sifa za jamii za kale au mifumo ya ujamaa ambayo nadharia huria inakataa waziwazi kuwa haiendani na jamii huru za kisasa.
question: Secondo la teoria economica liberale, qual è il meccanismo principale con cui la ricchezza deve essere continuamente mantenuta nelle moderne società capitalistiche?
answer: Costante lavoro quotidiano di analisi del mercato e di investimento per mantenere il valore del capitale
wrong_answers:
  - Diritti di proprietà ereditati, che consentono di ottenere automaticamente un reddito generate senza alcuno sforzo
  - Politiche governative di ridistribuzione che assicurano la stabilità della concentrazione della ricchezza
  - Gerarchie sociali fisse che garantiscono la trasmissione della ricchezza attraverso le generazioni
explanation: |
  La teoria economica liberale, presentata da Paul Leroy-Beaulieu, sostiene che le società moderne sono organizzate intorno al lavoro, dove la ricchezza deve essere costantemente "riacquistata" attraverso il lavoro. La valorizzazione del capitale stesso costituisce un lavoro quotidiano di analisi del mercato e di investimento. Questo contraddice l'analisi di classe marxista, dimostrando che anche i proprietari di capitale devono lavorare continuamente per mantenere la loro posizione. Le risposte sbagliate riflettono caratteristiche di società antiche o di sistemi socialisti che la teoria liberale rifiuta esplicitamente in quanto incompatibili con le moderne società libere.
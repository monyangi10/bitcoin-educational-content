question: Menurut teori ekonomi liberal, apa mekanisme utama yang digunakan untuk mempertahankan kekayaan dalam masyarakat kapitalis modern?
answer: Pekerjaan analisis pasar dan investasi harian yang konstan untuk mempertahankan nilai modal
wrong_answers:
  - Hak milik yang diwariskan yang secara otomatis menghasilkan pendapatan generate tanpa usaha
  - Kebijakan redistribusi pemerintah yang memastikan konsentrasi kekayaan tetap stabil
  - Hirarki sosial tetap yang menjamin transmisi kekayaan lintas generasi
explanation: |
  Teori ekonomi liberal, seperti yang dipresentasikan oleh Paul Leroy-Beaulieu, berpendapat bahwa masyarakat modern diorganisir di sekitar pekerjaan, di mana kekayaan harus terus-menerus 'dibeli kembali' melalui tenaga kerja. Valorisasi kapital itu sendiri merupakan pekerjaan sehari-hari dari analisis pasar dan investasi. Hal ini bertentangan dengan analisis kelas Marxis yang menunjukkan bahwa pemilik modal pun harus terus bekerja untuk mempertahankan posisinya. Jawaban yang salah mencerminkan karakteristik masyarakat kuno atau sistem sosialis yang secara eksplisit ditolak oleh teori liberal karena tidak sesuai dengan masyarakat modern yang bebas.
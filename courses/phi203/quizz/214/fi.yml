question: Mikä on liberaalin talousteorian mukaan ensisijainen mekanismi, jonka avulla vaurautta on jatkuvasti ylläpidettävä nykyaikaisissa kapitalistisissa yhteiskunnissa?
answer: Jatkuva päivittäinen markkina-analyysi ja investoinnit pääoman arvon säilyttämiseksi
wrong_answers:
  - Perityt omistusoikeudet, jotka automaattisesti generate-tulot ilman ponnistuksia
  - Hallituksen uudelleenjakopolitiikka, jolla varmistetaan, että varallisuuden keskittyminen pysyy vakaana
  - Kiinteät sosiaaliset hierarkiat, jotka takaavat varallisuuden siirtymisen sukupolvelta toiselle
explanation: |
  Paul Leroy-Beaulieun esittämän liberaalin talousteorian mukaan nyky-yhteiskunnat ovat järjestäytyneet työn ympärille, jossa vaurautta on jatkuvasti "ostettava takaisin" työn avulla. Pääoman arvottaminen itsessään on päivittäistä työtä, joka liittyy markkina-analyysiin ja investointeihin. Tämä on ristiriidassa marxilaisen luokka-analyysin kanssa osoittamalla, että myös pääoman omistajien on jatkuvasti tehtävä työtä säilyttääkseen asemansa. Väärät vastaukset heijastavat antiikin yhteiskuntien tai sosialististen järjestelmien piirteitä, jotka liberaali teoria nimenomaisesti hylkää yhteensopimattomina nykyaikaisten vapaiden yhteiskuntien kanssa.
question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม กลไกหลักที่ทำให้ความมั่งคั่งต้องได้รับการรักษาอย่างต่อเนื่องในสังคมทุนนิยมสมัยใหม่คืออะไร?
answer: การวิเคราะห์ตลาดและการลงทุนอย่างต่อเนื่องทุกวันเพื่อรักษามูลค่าทุน
wrong_answers:
  - สิทธิในทรัพย์สินที่ได้รับมรดกที่สร้างรายได้ generate โดยอัตโนมัติโดยไม่ต้องใช้ความพยายาม
  - นโยบายการกระจายรายได้ของรัฐบาลที่รับประกันว่าการกระจุกตัวของความมั่งคั่งยังคงมีเสถียรภาพ
  - ลำดับชั้นทางสังคมที่แน่นอนซึ่งรับประกันการส่งต่อความมั่งคั่งข้ามรุ่น
explanation: |
  ทฤษฎีเศรษฐศาสตร์เสรีนิยม ตามที่นำเสนอโดย Paul Leroy-Beaulieu โต้แย้งว่าสังคมสมัยใหม่ถูกจัดระเบียบรอบการทำงาน ซึ่งความมั่งคั่งต้องถูก 'ซื้อคืน' อย่างต่อเนื่องผ่านแรงงาน การเพิ่มมูลค่าของทุนเองถือเป็นงานประจำวันของการวิเคราะห์ตลาดและการลงทุน สิ่งนี้ขัดแย้งกับการวิเคราะห์ชนชั้นของมาร์กซ์โดยแสดงให้เห็นว่าแม้แต่เจ้าของทุนก็ต้องทำงานอย่างต่อเนื่องเพื่อรักษาตำแหน่งของตน คำตอบที่ผิดสะท้อนถึงลักษณะของสังคมโบราณหรือระบบสังคมนิยมที่ทฤษฎีเสรีนิยมปฏิเสธอย่างชัดเจนว่าไม่สอดคล้องกับสังคมเสรีสมัยใหม่
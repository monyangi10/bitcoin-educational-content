question: Согласно либеральной экономической теории, что является основным механизмом, с помощью которого богатство должно постоянно поддерживаться в современных капиталистических обществах?
answer: Постоянная ежедневная работа по анализу рынка и инвестированию для поддержания стоимости капитала
wrong_answers:
  - Унаследованные права собственности, которые автоматически приносят доход generate без усилий
  - Государственная политика перераспределения, обеспечивающая стабильную концентрацию богатства
  - Фиксированная социальная иерархия, гарантирующая передачу богатства от поколения к поколению
explanation: |
  Либеральная экономическая теория, представленная Полем Леруа-Болье, утверждает, что современные общества организованы вокруг труда, где богатство должно постоянно "выкупаться" через труд. Сама валоризация капитала представляет собой ежедневную работу по анализу рынка и инвестированию. Это противоречит марксистскому классовому анализу, показывая, что даже владельцы капитала должны постоянно работать, чтобы сохранить свое положение. Неправильные ответы отражают характеристики древних обществ или социалистических систем, которые либеральная теория однозначно отвергает как несовместимые с современными свободными обществами.
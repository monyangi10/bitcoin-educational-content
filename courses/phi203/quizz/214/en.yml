question: According to liberal economic theory, what is the primary mechanism by which wealth must be continuously maintained in modern capitalist societies?
answer: Constant daily work of market analysis and investment to maintain capital value
wrong_answers:
  - Inherited property rights that automatically generate income without effort
  - Government redistribution policies that ensure wealth concentration remains stable
  - Fixed social hierarchies that guarantee wealth transmission across generations
explanation: |
  Liberal economic theory, as presented by Paul Leroy-Beaulieu, argues that modern societies are organized around work, where wealth must constantly be 'repurchased' through labor. The valorization of capital itself constitutes daily work of market analysis and investment. This contradicts Marxist class analysis by showing that even capital owners must continuously work to maintain their position. The wrong answers reflect characteristics of ancient societies or socialist systems that liberal theory explicitly rejects as incompatible with modern free societies.

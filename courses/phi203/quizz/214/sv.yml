question: Enligt liberal ekonomisk teori, vilken är den primära mekanismen genom vilken välstånd kontinuerligt måste upprätthållas i moderna kapitalistiska samhällen?
answer: Ständigt dagligt arbete med marknadsanalys och investeringar för att upprätthålla kapitalvärdet
wrong_answers:
  - Ärvda äganderätter som automatiskt ger generate-inkomst utan ansträngning
  - Statlig omfördelningspolitik som säkerställer att förmögenhetskoncentrationen förblir stabil
  - Fasta sociala hierarkier som garanterar överföring av rikedomar mellan generationer
explanation: |
  Liberal ekonomisk teori, såsom den presenterades av Paul Leroy-Beaulieu, hävdar att moderna samhällen är organiserade kring arbete, där rikedom ständigt måste "återköpas" genom arbete. Värderingen av kapitalet i sig utgör det dagliga arbetet med marknadsanalys och investeringar. Detta motsäger den marxistiska klassanalysen genom att visa att även kapitalägare måste arbeta kontinuerligt för att behålla sin position. De felaktiga svaren återspeglar egenskaper hos antika samhällen eller socialistiska system som den liberala teorin uttryckligen förkastar som oförenliga med moderna fria samhällen.
question: Jaký je podle liberální ekonomické teorie hlavní mechanismus, kterým se v moderních kapitalistických společnostech musí neustále udržovat bohatství?
answer: Neustálá každodenní práce na analýze trhu a investicích s cílem udržet hodnotu kapitálu
wrong_answers:
  - Zděděná majetková práva, která automaticky a bez námahy přinášejí příjem generate
  - Vládní politiky přerozdělování, které zajišťují stabilní koncentraci bohatství
  - Pevné sociální hierarchie, které zaručují přenos bohatství mezi generacemi
explanation: |
  Liberální ekonomická teorie, jak ji představil Paul Leroy-Beaulieu, tvrdí, že moderní společnosti jsou organizovány kolem práce, kde je třeba neustále "vykupovat" bohatství prostřednictvím práce. Samotné zhodnocování kapitálu představuje každodenní práci v oblasti analýzy trhu a investic. To je v rozporu s marxistickou třídní analýzou, neboť ukazuje, že i vlastníci kapitálu musí neustále pracovat, aby si udrželi své postavení. Špatné odpovědi odrážejí charakteristiky starověkých společností nebo socialistických systémů, které liberální teorie výslovně odmítá jako neslučitelné s moderními svobodnými společnostmi.
question: Milline on liberaalse majandusteooria kohaselt peamine mehhanism, mille abil tuleb tänapäeva kapitalistlikus ühiskonnas rikkust pidevalt säilitada?
answer: Pidev igapäevane töö turuanalüüsi ja investeeringutega kapitali väärtuse säilitamiseks
wrong_answers:
  - Päritud omandiõigused, mis automaatselt generate tulu ilma pingutusteta
  - Valitsuse ümberjagamispoliitika, mis tagab jõukuse kontsentreerumise stabiilsuse
  - Fikseeritud sotsiaalsed hierarhiad, mis tagavad jõukuse ülekandumise põlvkondade vahel
explanation: |
  Paul Leroy-Beaulieu esitatud liberaalne majandusteooria väidab, et tänapäeva ühiskonnad on korraldatud töö ümber, kus rikkust tuleb pidevalt tööga "tagasi osta". Kapitali väärtustamine ise kujutab endast turuanalüüsi ja investeerimise igapäevast tööd. See on vastuolus marksistliku klassianalüüsiga, näidates, et isegi kapitaliomanikud peavad oma positsiooni säilitamiseks pidevalt töötama. Väärad vastused peegeldavad iidsete ühiskondade või sotsialistlike süsteemide omadusi, mida liberaalne teooria selgesõnaliselt tagasi lükkab kui tänapäeva vabade ühiskondadega kokkusobimatuid.
question: Theo lý thuyết kinh tế tự do, cơ chế chính yếu nào cần thiết để duy trì sự giàu có liên tục trong các xã hội tư bản hiện đại?
answer: Công việc phân tích thị trường và đầu tư thường xuyên hàng ngày nhằm duy trì giá trị vốn.
wrong_answers:
  - Quyền sở hữu tài sản thừa kế tự động tạo ra thu nhập generate mà không cần nỗ lực.
  - Các chính sách phân phối lại của chính phủ nhằm đảm bảo sự tập trung của cải vẫn ổn định.
  - Các cấu trúc xã hội cố định đảm bảo việc truyền thừa của cải qua các thế hệ.
explanation: |
  Lý thuyết kinh tế tự do, như được trình bày bởi Paul Leroy-Beaulieu, cho rằng các xã hội hiện đại được tổ chức xoay quanh lao động, nơi của cải phải liên tục được "mua lại" thông qua lao động. Việc gia tăng giá trị của tư bản tự nó cấu thành công việc hàng ngày của phân tích thị trường và đầu tư. Điều này mâu thuẫn với phân tích giai cấp của chủ nghĩa Mác khi cho thấy ngay cả những người sở hữu tư bản cũng phải liên tục làm việc để duy trì vị thế của mình. Những câu trả lời sai phản ánh đặc điểm của các xã hội cổ đại hoặc các hệ thống xã hội chủ nghĩa mà lý thuyết tự do bác bỏ một cách rõ ràng vì không tương thích với các xã hội tự do hiện đại.
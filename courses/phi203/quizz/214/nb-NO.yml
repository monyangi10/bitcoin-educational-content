question: Hva er ifølge liberal økonomisk teori den viktigste mekanismen for å opprettholde velstand i moderne kapitalistiske samfunn?
answer: Kontinuerlig daglig arbeid med markedsanalyse og investeringer for å opprettholde kapitalverdien
wrong_answers:
  - Arvede eiendomsrettigheter som automatisk gir generate-inntekt uten innsats
  - Statlig omfordelingspolitikk som sikrer at formueskonsentrasjonen forblir stabil
  - Faste sosiale hierarkier som garanterer overføring av rikdom mellom generasjoner
explanation: |
  Liberal økonomisk teori, slik den ble presentert av Paul Leroy-Beaulieu, hevder at moderne samfunn er organisert rundt arbeid, der rikdom hele tiden må "gjenkjøpes" gjennom arbeid. Selve verdsettingen av kapital utgjør det daglige arbeidet med markedsanalyse og investeringer. Dette står i motsetning til den marxistiske klasseanalysen ved å vise at selv kapitaleiere kontinuerlig må arbeide for å opprettholde sin posisjon. De gale svarene gjenspeiler trekk ved antikke samfunn eller sosialistiske systemer som liberal teori eksplisitt avviser som uforenlige med moderne frie samfunn.
question: 根据自由主义经济理论，现代资本主义社会必须持续保持财富的主要机制是什么？
answer: 日常工作中不断进行市场分析和投资，以保持资本价值
wrong_answers:
  - 不费吹灰之力就能自动获得 generate 收入的继承财产权
  - 确保财富集中度保持稳定的政府再分配政策
  - 固定的社会等级制度保证财富代代相传
explanation: |
  保罗-勒鲁瓦-博略（Paul Leroy-Beaulieu）提出的自由主义经济理论认为，现代社会是围绕工作组织起来的，财富必须通过劳动不断 "回购"。资本估值本身就是市场分析和投资的日常工作。这与马克思主义的阶级分析相矛盾，表明即使是资本所有者也必须不断工作以维持其地位。错误答案反映了古代社会或社会主义制度的特征，而自由主义理论明确反对这些特征，认为它们与现代自由社会不相容。
question: Was ist nach der liberalen Wirtschaftstheorie der wichtigste Mechanismus, durch den der Wohlstand in modernen kapitalistischen Gesellschaften kontinuierlich erhalten werden muss?
answer: Ständige tägliche Arbeit mit Marktanalysen und Investitionen zur Erhaltung des Kapitalwerts
wrong_answers:
  - Vererbte Eigentumsrechte, die automatisch generate-Einkommen ohne Anstrengung
  - Staatliche Umverteilungsmaßnahmen, die sicherstellen, dass die Vermögenskonzentration stabil bleibt
  - Feste soziale Hierarchien, die die Übertragung von Wohlstand über Generationen hinweg garantieren
explanation: |
  Die liberale Wirtschaftstheorie, wie sie von Paul Leroy-Beaulieu vertreten wird, geht davon aus, dass moderne Gesellschaften um die Arbeit herum organisiert sind, wobei der Reichtum ständig durch Arbeit "zurückgekauft" werden muss. Die Verwertung des Kapitals selbst ist die tägliche Arbeit der Marktanalyse und der Investition. Dies steht im Widerspruch zur marxistischen Klassenanalyse, da es zeigt, dass selbst Kapitalbesitzer ständig arbeiten müssen, um ihre Position zu halten. Die falschen Antworten spiegeln Merkmale antiker Gesellschaften oder sozialistischer Systeme wider, die die liberale Theorie ausdrücklich als unvereinbar mit modernen freien Gesellschaften ablehnt.
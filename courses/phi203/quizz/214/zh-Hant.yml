question: 根據自由經濟理論，在現代資本主義社會中，財富必須持續維持的主要機制是什麼？
answer: 持續進行市場分析與投資的日常工作，以維持資本價值
wrong_answers:
  - 不需努力即可自動 generate 收入的財產繼承權
  - 確保財富集中度穩定的政府再分配政策
  - 固定的社會階級，保證財富世代相傳
explanation: |
  由 Paul Leroy-Beaulieu 提出的自由經濟理論認為，現代社會是圍繞著工作而組織的，財富必須不斷地透過勞動來「回購」。資本的價值化本身就構成了市場分析與投資的日常工作。這與馬克思主義的階級分析相矛盾，顯示即使是資本所有者也必須持續工作以維持其地位。錯誤的答案反映了古代社會或社會主義制度的特徵，而自由主義理論明確拒絕這些特徵，認為它們與現代自由社會不相容。
question: Frédéric Bastiat'n analyysin mukaan miksi vapaus, omaisuus ja tasa-arvo ovat pohjimmiltaan erottamattomia käsitteitä?
answer: Koska todellinen vapaus tarkoittaa omaisuuden vapaata käyttöä, ja tasa-arvo edellyttää, että kaikki yksilöt nauttivat omistusoikeuksistaan yhtä paljon ilman, että muut hemmottelevat heitä
wrong_answers:
  - Koska omaisuuden uudelleenjako on välttämätöntä tasa-arvon saavuttamiseksi, mikä luo edellytykset yksilönvapauden kukoistukselle yhteiskunnassa
  - Koska tulosten tasa-arvo on toteutettava kollektiivisen omistusoikeuden avulla, joka takaa yhtäläisen vapauden kaikille yhteiskuntaluokille
  - Koska vapaus edellyttää valtion väliintuloa omaisuuden jakautumisen tasaamiseksi, on varmistettava, että vapaus ei keskity varakkaiden omistajien keskuuteen
explanation: |
  Bastiat'n käsitteestä käy ilmi, että vapaus on pohjimmiltaan omaisuutta - vapaana oleminen tarkoittaa sitä, että ihminen käyttää laillista omaisuuttaan haluamallaan tavalla. Todellinen tasa-arvo vallitsee silloin, kun kaikkien omistusoikeuksia kunnioitetaan tasapuolisesti, ei silloin, kun tuloksia tasataan keinotekoisesti. Ei-vapausjärjestelmät luovat eriarvoisuutta sallimalla joidenkin nauttia omaisuudestaan, kun taas toisia hemmotellaan. Väärissä vastauksissa vääristellään tätä väittämällä, että uudelleenjako tai valtion väliintulo luo vapautta, vaikka Bastiat väittää, että nämä itse asiassa tuhoavat omaisuuden ja vapauden yhteyden.
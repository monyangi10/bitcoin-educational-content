question: Hvorfor er frihet, eiendom og likhet grunnleggende sett uatskillelige begreper, ifølge Frédéric Bastiats analyse?
answer: Fordi ekte frihet betyr å bruke sin eiendom fritt, og likhet krever at alle individer nyter eiendomsretten sin på lik linje uten å bli spolert av andre
wrong_answers:
  - Fordi omfordeling av eiendom er nødvendig for å oppnå likhet, som igjen skaper forutsetninger for at den individuelle friheten skal kunne blomstre i samfunnet
  - Fordi resultatlikhet må håndheves gjennom kollektiv eiendomsrett, noe som garanterer lik frihet for alle samfunnsklasser
  - Fordi frihet krever at staten griper inn for å utjevne fordelingen av eiendom, slik at friheten ikke konsentreres blant rike eiendomsbesittere
explanation: |
  Bastiats konsept viser at frihet i bunn og grunn er eiendom - å være fri betyr å bruke sine legitime eiendeler etter eget ønske. Sann likhet eksisterer når alles eiendomsrett respekteres i like stor grad, ikke når utfallet utjevnes på kunstig vis. Ikke-frihetssystemer skaper ulikhet ved å la noen nyte godt av sin eiendom, mens andre blir bortskjemt. De gale svarene gir en feilaktig fremstilling av dette ved å antyde at omfordeling eller statlig inngripen skaper frihet, mens Bastiat hevder at dette faktisk ødelegger sammenhengen mellom eiendom og frihet.
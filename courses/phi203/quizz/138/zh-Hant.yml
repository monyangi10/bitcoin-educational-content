question: 根據 Frédéric Bastiat 的分析，為何自由、財產和平等在根本上是不可分割的概念？
answer: 因為真正的自由是指自由使用自己的財產，而平等則要求所有個人都能平等地享有財產權，不受他人剝奪
wrong_answers:
  - 因為財產再分配是達成平等的必要條件，進而為個人自由在社會中的蓬勃發展創造條件
  - 因為結果平等必須透過集體財產所有權來強制執行，這樣才能保證所有社會階級享有平等的自由。
  - 因為自由需要國家干預來均衡財產分配，確保自由不會集中在富有的財產所有者身上
explanation: |
  Bastiat 的概念表明，自由的本質是財產 - 自由意味著隨心所欲地使用自己的合法財產。真正的平等存在於每個人的財產權受到同等尊重的時候，而不是結果被人為地平均化的時候。非自由的制度允許一些人享受他們的財產，而另一些人則被寵壞，這就造成了不平等。錯誤的答案歪曲了這一點，認為重新分配或國家干預會創造自由，而巴斯蒂亞認為這些實際上破壞了財產與自由的關係。
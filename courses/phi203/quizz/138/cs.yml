question: Proč jsou podle analýzy Frédérica Bastiata svoboda, vlastnictví a rovnost v zásadě neoddělitelné pojmy?
answer: Protože skutečná svoboda znamená svobodně užívat svůj majetek a rovnost vyžaduje, aby všichni jedinci užívali svá majetková práva stejně, aniž by je ostatní rušili
wrong_answers:
  - Protože přerozdělení majetku je nezbytné k dosažení rovnosti, která pak vytváří podmínky pro rozkvět individuální svobody ve společnosti
  - Protože rovnost výsledků musí být zajištěna kolektivním vlastnictvím, které pak zaručuje stejnou svobodu pro všechny společenské vrstvy
  - Protože svoboda vyžaduje státní zásahy, které vyrovnávají rozdělení majetku a zajišťují, aby se svoboda nekoncentrovala mezi bohatými vlastníky
explanation: |
  Bastiatova koncepce ukazuje, že svoboda je v podstatě vlastnictvím - být svobodný znamená užívat svůj legitimní majetek podle svých představ. Skutečná rovnost existuje tehdy, když jsou vlastnická práva všech stejně respektována, nikoli když jsou výsledky uměle vyrovnávány. Nesvobodné systémy vytvářejí nerovnost tím, že umožňují jedněm užívat jejich majetek, zatímco ostatní jsou rozmazlováni. Špatné odpovědi to zkreslují tím, že naznačují, že přerozdělování nebo státní zásahy vytvářejí svobodu, zatímco Bastiat tvrdí, že ve skutečnosti ničí spojení vlastnictví a svobody.
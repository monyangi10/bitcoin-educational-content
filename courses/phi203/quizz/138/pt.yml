question: De acordo com a análise de Frédéric Bastiat, por que razão a liberdade, a propriedade e a igualdade são conceitos fundamentalmente inseparáveis?
answer: Porque a verdadeira liberdade significa usar livremente a propriedade de alguém e a igualdade exige que todos os indivíduos usufruam igualmente dos seus direitos de propriedade sem serem prejudicados por outros
wrong_answers:
  - Porque a redistribuição da propriedade é necessária para alcançar a igualdade, que cria então as condições para que a liberdade individual floresça na sociedade
  - Porque a igualdade de resultados deve ser assegurada através da propriedade colectiva, que garante uma liberdade igual para todas as classes sociais
  - Porque a liberdade exige a intervenção do Estado para igualar a distribuição da propriedade, assegurando que a liberdade não se concentre entre os proprietários ricos
explanation: |
  O conceito de Bastiat mostra que a liberdade é essencialmente propriedade - ser livre significa usar as suas posses legítimas como se deseja. A verdadeira igualdade existe quando os direitos de propriedade de todos são igualmente respeitados, não quando os resultados são artificialmente igualados. Os sistemas sem liberdade criam desigualdade ao permitir que alguns usufruam da sua propriedade enquanto outros são prejudicados. As respostas erradas deturpam este facto, sugerindo que a redistribuição ou a intervenção do Estado criam liberdade, quando Bastiat argumenta que, na verdade, destroem a ligação entre propriedade e liberdade.
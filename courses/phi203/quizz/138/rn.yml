question: Dukurikije icegeranyo ca Frédéric Bastiat, ni kuki umwidegemvyo, itunga n’uburinganire ari ivyiyumviro vy’ishimikiro bidashobora gutandukanywa?
answer: Kuko umwidegemvyo nyawo usobanura gukoresha ivy’umuntu ataco yishisha, kandi ukungana bisaba ko abantu bose baronka uburenganzira bwabo bwo kuronka uburenganzira bwabo mu buryo bungana ata co bononekaye n’abandi .
wrong_answers:
  - Kuko gusubira gusangira umutungo ari ngombwa kugira ngo umuntu ashike ku buringanire, ivyo bikaba ari vyo bituma habaho ivyiza vyo gutuma umwidegemvyo w’umuntu ku giti ciwe utera imbere mu kibano .
  - Kubera ko uburinganire bw’ingaruka butegerezwa gushirwa mu ngiro biciye mu gutunganya umutungo rusangi, ivyo bikaba ari vyo bituma abantu bose bo mu mice yose bagira umwidegemvyo ungana .
  - Kubera ko umwidegemvyo usaba ko Leta igira ico ikoze kugira ngo umutungo ugabanuke ku rugero rungana, kugira ngo umwidegemvyo ntube mwibanda ku batunzi bafise umutungo .
explanation: |
  Iciyumviro ca Bastiat kirerekana ko umwidegemvyo ari umutungo mu vy’ukuri - kuba umwidegemvyo bisigura gukoresha ivyo umuntu afise bibereye nk’uko yipfuza. Uburinganire nyakuri burabaho iyo uburenganzira bw’umuntu wese bwubahirijwe kimwe, atari iyo ingaruka zingana mu buryo bw’ubuhinga. Ubutegetsi butagira umwidegemvyo buratuma haba ubusumbasumbane mu kureka bamwe bakanezererwa ivy’itunga ryabo mu gihe abandi bononekaye. Inyishu zitari zo zivuga nabi ivyo mu gutanga iciyumviro co gusubira gusangira canke gufasha Leta bituma haba umwidegemvyo, mu gihe Bastiat avuga ko ivyo mu vy’ukuri bisenyura isano hagati y’umutungo n’umwidegemvyo.
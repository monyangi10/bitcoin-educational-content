question: Miks on vabadus, omand ja võrdsus Frédéric Bastiat' analüüsi kohaselt põhimõtteliselt lahutamatud mõisted?
answer: Sest tõeline vabadus tähendab oma vara vaba kasutamist, ja võrdsus nõuab, et kõik inimesed saaksid võrdselt kasutada oma omandiõigust, ilma et teised seda rikuksid
wrong_answers:
  - Sest omandi ümberjaotamine on vajalik võrdsuse saavutamiseks, mis loob seejärel tingimused individuaalse vabaduse õitsenguks ühiskonnas
  - Sest võrdsed tulemused tuleb tagada kollektiivse omandiõiguse kaudu, mis tagab siis kõigile ühiskonnaklassidele võrdse vabaduse
  - Kuna vabadus eeldab riigi sekkumist, et tasandada vara jaotust, tagades, et vabadus ei koonduks jõukate varaomanike hulka
explanation: |
  Bastiat' kontseptsioon näitab, et vabadus on sisuliselt omand - vabaks olemine tähendab, et inimene kasutab oma seaduslikku omandit nii, nagu ta soovib. Tõeline võrdsus eksisteerib siis, kui igaühe omandiõigust austatakse võrdselt, mitte siis, kui tulemusi kunstlikult võrdsustatakse. Mittevabaduse süsteemid tekitavad ebavõrdsust, võimaldades mõnedel nautida oma omandit, samal ajal kui teised on rikutud. Valed vastused esitavad seda vääralt, väites, et ümberjagamine või riigi sekkumine loob vabadust, kuigi Bastiat väidab, et need tegelikult hävitavad omandi ja vabaduse vahelise seose.
question: Согласно анализу Фредерика Бастиа, почему свобода, собственность и равенство являются неразделимыми понятиями?
answer: Потому что истинная свобода означает свободное использование собственности, а равенство требует, чтобы все люди в равной степени пользовались своими правами на собственность, не подвергаясь посягательствам со стороны других
wrong_answers:
  - Потому что перераспределение собственности необходимо для достижения равенства, которое затем создает условия для процветания индивидуальной свободы в обществе
  - Потому что равенство результатов должно обеспечиваться коллективной собственностью, которая гарантирует равную свободу для всех социальных слоев
  - Поскольку свобода требует вмешательства государства, чтобы выровнять распределение собственности, обеспечить, чтобы свобода не концентрировалась среди богатых собственников
explanation: |
  Концепция Бастиата показывает, что свобода по сути своей является собственностью - быть свободным означает использовать свое законное имущество по своему усмотрению. Истинное равенство существует тогда, когда права собственности каждого человека соблюдаются в равной степени, а не когда результаты искусственно уравниваются. Системы несвободы создают неравенство, позволяя одним наслаждаться своей собственностью, а других портить. Неправильные ответы искажают это, полагая, что перераспределение или государственное вмешательство создают свободу, в то время как Бастиат утверждает, что они фактически разрушают связь между собственностью и свободой.
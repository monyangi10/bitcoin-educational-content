question: 根据弗雷德里克-巴斯蒂亚的分析，为什么自由、财产和平等从根本上说是不可分割的概念？
answer: 因为真正的自由意味着自由地使用自己的财产，而平等则要求所有人平等地享有自己的财产权，不受他人的蹂躏
wrong_answers:
  - 因为财产再分配是实现平等的必要条件，而平等又为个人自由在社会中的蓬勃发展创造了条件
  - 因为结果平等必须通过集体财产所有权来实现，这样才能保证所有社会阶层享有平等的自由
  - 因为自由需要国家干预，以均衡财产分配，确保自由不会集中在富有的财产所有者手中
explanation: |
  巴斯蒂亚的概念表明，自由的本质是财产--自由意味着随心所欲地使用自己的合法财产。真正的平等存在于每个人的财产权得到平等尊重的时候，而不是人为地使结果平等的时候。非自由制度允许一些人享受财产，而另一些人则被宠坏，从而造成了不平等。错误的答案曲解了这一点，认为再分配或国家干预创造了自由，而巴斯蒂亚认为这些实际上破坏了财产与自由之间的联系。
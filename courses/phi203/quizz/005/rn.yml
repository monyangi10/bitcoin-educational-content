question: Dushingiye ku migenzo y’abafaransa y’ubwigenge, ni ikihe kibazo nyamukuru kiri mu kurwanya kw’ubuhinga hagati y’abahinga mu vy’inyigisho n’abakora mu mpari za bose?
answer: Abahinga mu vy’inyigisho n’ababikora bose bizigira inzego z’inyigisho, rero ikibazo nyaco ni ugutandukanya inyigisho nziza n’imbi .
wrong_answers:
  - Abanyavyiyumviro vy’ukuri baratandukanye n’ukuri mu gihe ababikora bafise ubumenyi nyabwo burengeye ubw’abandi .
  - Ivyo birwanya birafise akamaro kubera ko ababikora ntibakoresha inzego z’ivyiyumviro mu bikorwa vyabo .
  - Abahinga mu vy'inyigisho bakwiye kwibanda gusa ku vyiyumviro bitaboneka mu gihe ababikora bakwiye kwirinda ivyiyumviro vyose vy'inyigisho .
explanation: |
  Ico kigabane kirasigura ko ukurwanywa hagati y’ivyiyumviro n’ibikorwa ari ivy’ubuhinga kubera ko ibikorwa vyose vy’umuntu, mbere n’ivyoroheje nk’ukuduga ingazi, bishingiye ku vyiyumviro bitaboneka nk’uburemere bw’isi. Abahinga mu vy’ubuhinga bwa none bama bashira mu ngiro inzego z’ivyiyumviro, kenshi batabizi. Ingorane nyayo si uguhitamwo hagati y’ivyiyumviro n’ibikorwa, ahubwo ni ugutandukanya ivyiyumviro vyiza bishingiye ku bintu bishobora kwihwezwa n’ivyiyumviro bibi vyubatswe ku bitari vyo. Ivyo vyerekana ko iyo nzira y’ugucapura ari ikinyoma kuko iyo migwi yompi ikoresha ata kabuza imishinge y’ivyiyumviro.
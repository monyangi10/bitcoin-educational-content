question: طبق سنت لیبرال فرانسوی، مشکل اصلی با تقابل مصنوعی بین نظریه‌پردازان و عمل‌گرایان در بحث‌های عمومی چیست؟
answer: هم نظریه‌پردازان و هم عمل‌گرایان به چارچوب‌های نظری تکیه می‌کنند، بنابراین مسئله واقعی تمایز بین نظریه‌های خوب و بد است.
wrong_answers:
  - نظریه‌پردازان واقعاً از واقعیت جدا هستند، در حالی که عمل‌گرایان دارای دانش عینی برتری هستند.
  - مخالفت معتبر است زیرا پزشکان هرگز از چارچوب‌های نظری در کار خود استفاده نمی‌کنند
  - نظریه‌پردازان باید فقط بر مفاهیم انتزاعی تمرکز کنند در حالی که عمل‌گرایان باید از هرگونه تفکر نظری اجتناب کنند.
explanation: |
  این فصل توضیح می‌دهد که تقابل بین نظریه و عمل مصنوعی است زیرا تمام اعمال انسانی، حتی اعمال ساده‌ای مانند بالا رفتن از پله‌ها، بر اساس نظریه‌های ضمنی مانند جاذبه استوار هستند. عمل‌گرایان به طور مداوم چارچوب‌های نظری را، اغلب به صورت ناخودآگاه، به کار می‌گیرند. چالش واقعی انتخاب بین نظریه و عمل نیست، بلکه تمایز بین نظریه‌های خوب بر اساس حقایق قابل مشاهده و نظریه‌های بد بر اساس مغالطات است. این نشان می‌دهد که این دوگانگی نادرست است زیرا هر دو گروه ناگزیر از مبانی نظری استفاده می‌کنند.
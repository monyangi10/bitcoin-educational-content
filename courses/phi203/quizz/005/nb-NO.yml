question: Hva er hovedproblemet med den kunstige motsetningen mellom teoretikere og praktikere i den offentlige debatten, ifølge den franske liberale tradisjonen?
answer: Både teoretikere og praktikere er avhengige av teoretiske rammeverk, så det virkelige problemet er å skille mellom gode og dårlige teorier
wrong_answers:
  - Teoretikere er faktisk frakoblet virkeligheten, mens praktikere har overlegen konkret kunnskap
  - Opposisjonen er gyldig fordi praktikere aldri bruker teoretiske rammeverk i arbeidet sitt
  - Teoretikere bør kun fokusere på abstrakte begreper, mens praktikere bør unngå all teoretisk tenkning
explanation: |
  Kapitlet forklarer at motsetningen mellom teori og praksis er kunstig fordi alle menneskelige handlinger, selv enkle handlinger som å gå i trapper, er basert på implisitte teorier, for eksempel om tyngdekraften. Utøverne anvender hele tiden teoretiske rammeverk, ofte ubevisst. Den virkelige utfordringen er ikke å velge mellom teori og praksis, men snarere å skille mellom gode teorier basert på observerbare fakta og dårlige teorier som bygger på feilslutninger. Dette viser at dikotomien er falsk, siden begge grupper uunngåelig bruker teoretiske grunnlag.
question: De acordo com a tradição liberal francesa, qual é o principal problema da oposição artificial entre teóricos e práticos no debate público?
answer: Tanto os teóricos como os profissionais baseiam-se em quadros teóricos, pelo que a verdadeira questão é distinguir as boas teorias das más
wrong_answers:
  - Os teóricos estão de facto desligados da realidade, enquanto os profissionais têm um conhecimento concreto superior
  - A oposição é válida porque os profissionais nunca utilizam quadros teóricos no seu trabalho
  - Os teóricos devem concentrar-se apenas em conceitos abstractos, enquanto os profissionais devem evitar todo o pensamento teórico
explanation: |
  O capítulo explica que a oposição entre teoria e prática é artificial porque todas as acções humanas, mesmo as mais simples como subir escadas, se baseiam em teorias implícitas como a da gravidade. Os profissionais aplicam constantemente quadros teóricos, muitas vezes de forma inconsciente. O verdadeiro desafio não é escolher entre teoria e prática, mas sim distinguir as boas teorias baseadas em factos observáveis das más teorias baseadas em falácias. Isto demonstra que a dicotomia é falsa, uma vez que ambos os grupos utilizam inevitavelmente fundamentos teóricos.
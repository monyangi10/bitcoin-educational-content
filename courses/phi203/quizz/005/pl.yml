question: Jaki jest, zgodnie z francuską tradycją liberalną, główny problem ze sztuczną opozycją między teoretykami a praktykami w debacie publicznej?
answer: Zarówno teoretycy, jak i praktycy opierają się na ramach teoretycznych, więc prawdziwą kwestią jest odróżnienie dobrych teorii od złych
wrong_answers:
  - Teoretycy są rzeczywiście oderwani od rzeczywistości, podczas gdy praktycy mają doskonałą, konkretną wiedzę
  - Sprzeciw jest uzasadniony, ponieważ praktycy nigdy nie używają ram teoretycznych w swojej pracy
  - Teoretycy powinni skupiać się wyłącznie na abstrakcyjnych koncepcjach, podczas gdy praktycy powinni unikać wszelkiego teoretycznego myślenia
explanation: |
  Rozdział ten wyjaśnia, że opozycja między teorią a praktyką jest sztuczna, ponieważ wszystkie ludzkie działania, nawet te proste, takie jak wchodzenie po schodach, opierają się na ukrytych teoriach, takich jak grawitacja. Praktycy nieustannie stosują ramy teoretyczne, często nieświadomie. Prawdziwym wyzwaniem nie jest wybór między teorią a praktyką, ale raczej odróżnienie dobrych teorii opartych na obserwowalnych faktach od złych teorii zbudowanych na błędach. To pokazuje, że dychotomia jest fałszywa, ponieważ obie grupy nieuchronnie wykorzystują podstawy teoretyczne.
question: ตามประเพณีเสรีนิยมของฝรั่งเศส ปัญหาหลักของการต่อต้านเทียมระหว่างนักทฤษฎีและผู้ปฏิบัติในการอภิปรายสาธารณะคืออะไร?
answer: ทั้งนักทฤษฎีและผู้ปฏิบัติต่างพึ่งพากรอบแนวคิดทางทฤษฎี ดังนั้นประเด็นที่แท้จริงคือการแยกแยะทฤษฎีที่ดีออกจากทฤษฎีที่ไม่ดี
wrong_answers:
  - นักทฤษฎีมักจะไม่เชื่อมโยงกับความเป็นจริง ในขณะที่ผู้ปฏิบัติงานมีความรู้ที่เป็นรูปธรรมที่เหนือกว่า
  - ฝ่ายค้านมีความถูกต้องเพราะผู้ปฏิบัติงานไม่เคยใช้กรอบทฤษฎีในการทำงานของพวกเขา
  - นักทฤษฎีควรมุ่งเน้นเฉพาะแนวคิดเชิงนามธรรม ในขณะที่ผู้ปฏิบัติงานควรหลีกเลี่ยงการคิดเชิงทฤษฎีทั้งหมด
explanation: |
  บทนี้อธิบายว่าความขัดแย้งระหว่างทฤษฎีกับการปฏิบัตินั้นเป็นสิ่งที่สร้างขึ้น เพราะการกระทำของมนุษย์ทุกอย่าง แม้แต่สิ่งที่ง่าย ๆ อย่างการขึ้นบันได ก็มีพื้นฐานมาจากทฤษฎีที่เป็นนัย เช่น แรงโน้มถ่วง ผู้ปฏิบัติงานมักจะใช้กรอบทฤษฎีอยู่เสมอ บ่อยครั้งโดยไม่รู้ตัว ความท้าทายที่แท้จริงไม่ใช่การเลือกว่าจะใช้ทฤษฎีหรือการปฏิบัติ แต่เป็นการแยกแยะทฤษฎีที่ดีซึ่งมีพื้นฐานจากข้อเท็จจริงที่สังเกตได้ออกจากทฤษฎีที่ไม่ดีซึ่งสร้างขึ้นจากความเข้าใจผิด สิ่งนี้แสดงให้เห็นว่าความแตกต่างนั้นเป็นเท็จ เพราะทั้งสองกลุ่มต่างก็ใช้พื้นฐานทางทฤษฎีอย่างหลีกเลี่ยงไม่ได้
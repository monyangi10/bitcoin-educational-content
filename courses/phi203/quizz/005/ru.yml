question: В чем, согласно французской либеральной традиции, заключается основная проблема искусственного противопоставления теоретиков и практиков в общественных дискуссиях?
answer: И теоретики, и практики опираются на теоретические основы, поэтому реальная проблема заключается в том, чтобы отличить хорошие теории от плохих
wrong_answers:
  - Теоретики действительно оторваны от реальности, в то время как практики обладают превосходными конкретными знаниями
  - Противопоставление справедливо, потому что практики никогда не используют теоретические основы в своей работе
  - Теоретики должны сосредоточиться только на абстрактных понятиях, в то время как практики должны избегать любых теоретических размышлений
explanation: |
  В главе объясняется, что противопоставление теории и практики искусственно, поскольку все действия человека, даже такие простые, как подъем по лестнице, основаны на неявных теориях, таких как гравитация. Практики постоянно применяют теоретические основы, часто неосознанно. Настоящая проблема заключается не в выборе между теорией и практикой, а в том, чтобы отличить хорошие теории, основанные на наблюдаемых фактах, от плохих теорий, построенных на заблуждениях. Это показывает, что дихотомия ложна, поскольку обе группы неизбежно используют теоретические основы.
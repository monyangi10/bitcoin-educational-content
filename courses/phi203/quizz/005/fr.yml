question: Selon la tradition libérale française, quel est le principal problème de l'opposition artificielle entre théoriciens et praticiens dans le débat public ?
answer: Les théoriciens et les praticiens s'appuient sur des cadres théoriques, de sorte que la véritable question est de distinguer les bonnes théories des mauvaises
wrong_answers:
  - Les théoriciens sont en effet déconnectés de la réalité alors que les praticiens ont une connaissance concrète supérieure
  - L'opposition est valable parce que les praticiens n'utilisent jamais de cadres théoriques dans leur travail
  - Les théoriciens ne devraient se concentrer que sur les concepts abstraits, tandis que les praticiens devraient éviter toute réflexion théorique
explanation: |
  Le chapitre explique que l'opposition entre théorie et pratique est artificielle car toutes les actions humaines, même les plus simples comme monter un escalier, sont basées sur des théories implicites telles que la gravité. Les praticiens appliquent constamment des cadres théoriques, souvent de manière inconsciente. Le véritable défi n'est pas de choisir entre la théorie et la pratique, mais plutôt de distinguer les bonnes théories basées sur des faits observables des mauvaises théories construites sur des sophismes. Cela démontre que la dichotomie est fausse puisque les deux groupes utilisent inévitablement des fondements théoriques.
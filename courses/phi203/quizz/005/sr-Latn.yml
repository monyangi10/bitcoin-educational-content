question: Prema francuskoj liberalnoj tradiciji, koji je glavni problem sa veštačkom opozicijom između teoretičara i praktičara u javnoj debati?
answer: I teoretičari i praktičari oslanjaju se na teorijske okvire, tako da je pravi problem razlikovati dobre teorije od loših.
wrong_answers:
  - Teoretičari su zaista odvojeni od stvarnosti dok praktičari imaju superiorno konkretno znanje
  - Opozicija je validna jer praktičari nikada ne koriste teorijske okvire u svom radu.
  - Teoretičari bi trebalo da se fokusiraju samo na apstraktne pojmove, dok bi praktičari trebalo da izbegavaju svako teoretsko razmišljanje.
explanation: |
  Poglavlje objašnjava da je suprotnost između teorije i prakse veštačka jer su sve ljudske akcije, čak i jednostavne poput penjanja uz stepenice, zasnovane na implicitnim teorijama kao što je gravitacija. Praktikanti stalno primenjuju teorijske okvire, često nesvesno. Pravi izazov nije biranje između teorije i prakse, već razlikovanje dobrih teorija zasnovanih na posmatranim činjenicama od loših teorija izgrađenih na zabludama. Ovo pokazuje da je dihotomija lažna jer obe grupe neizbežno koriste teorijske osnove.
question: Kulingana na utamaduni wa kiliberali wa Ufaransa, tatizo kuu la upinzani bandia kati ya wananadharia na watendaji katika mjadala wa umma ni lipi?
answer: Wananadharia na watendaji wote hutegemea mifumo ya kinadharia, kwa hivyo suala halisi ni kutofautisha nadharia nzuri na mbaya
wrong_answers:
  - Wananadharia wametenganishwa na ukweli ilhali watendaji wana ujuzi wa hali ya juu wa kinadharia.
  - Upinzani huo ni halali kwa sababu watendaji hawatumii mifumo ya kinadharia katika kazi zao
  - Wananadharia wanapaswa kuzingatia dhana dhahania pekee huku watendaji wakiepuka mawazo yote ya kinadharia
explanation: |
  Sura hiyo inaelezea kwamba upinzani kati ya nadharia na vitendo ni bandia kwa sababu vitendo vyote vya binadamu, hata vile rahisi kama vile kupanda ngazi, vinategemea nadharia zisizo wazi kama vile uvutano. Wataalamu hutumia mifumo ya kinadharia kila mara, mara nyingi bila kujua. Changamoto halisi si kuchagua kati ya nadharia na vitendo, bali ni kutofautisha nadharia nzuri kulingana na ukweli unaoonekana kutoka kwa nadharia mbaya zilizojengwa juu ya makosa. Hii inaonyesha kwamba mgawanyiko huo ni wa uwongo kwani vikundi vyote viwili hutumia misingi ya kinadharia bila shaka.
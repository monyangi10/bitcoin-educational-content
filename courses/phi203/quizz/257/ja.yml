question: ベンジャミン・コンスタントの「法の沈黙」の原則は、自由主義社会では基本的に何を要求するのか？
answer: 個人が自由と財産権を行使するとき、法律は他人の同様の権利を害することなく、沈黙を守らなければならない。
wrong_answers:
  - 法律は、すべての国民が法解釈なしに理解できる簡単な言葉で書かれていなければならない。
  - 政府関係者は中立性を維持するため、物議を醸すような政治問題について公の場でコメントすることを控えなければならない。
  - 立法機関は、変革を求める圧倒的な民衆のコンセンサスがない限り、新たな法律の制定を避けるべきである。
explanation: |
  ベンジャミン・コンスタンツの「法の沈黙」の原則とは、個人が自由と財産を正当かつ合法的に利用する場合、法は干渉すべきではないということである。個人の自由に対する唯一の許容可能な制限は、他者の同様の自由を保護することであるため、この沈黙は不可欠である。間違った解答は、これを言語的な明確さ、政府の中立性、あるいは立法の抑制と誤解していますが、コンスタントの原則は、法律が他人の権利を害さない個人の行動を規制すべきではない場合を具体的に取り上げています。
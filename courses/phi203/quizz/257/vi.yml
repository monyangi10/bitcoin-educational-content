question: Nguyên tắc "sự im lặng của pháp luật" của Benjamin Constant về cơ bản đòi hỏi điều gì trong một xã hội tự do?
answer: Luật pháp phải giữ im lặng khi các cá nhân thực hiện quyền tự do và quyền sở hữu của mình mà không gây tổn hại đến các quyền tương tự của người khác.
wrong_answers:
  - Luật phải được soạn thảo bằng ngôn ngữ đơn giản để tất cả công dân đều có thể hiểu mà không cần đến sự giải thích pháp lý.
  - Các quan chức chính phủ phải kiềm chế không bình luận công khai về các vấn đề chính trị gây tranh cãi để duy trì tính trung lập.
  - Các cơ quan lập pháp nên tránh ban hành luật mới trừ khi có sự đồng thuận rộng rãi của người dân về sự thay đổi.
explanation: |
  Nguyên tắc "sự im lặng của pháp luật" của Benjamin Constant có nghĩa là pháp luật không nên can thiệp khi các cá nhân sử dụng tự do và tài sản của mình một cách chính đáng và hợp pháp. Sự im lặng này rất cần thiết bởi vì giới hạn duy nhất có thể chấp nhận được đối với tự do cá nhân là bảo vệ các quyền tự do tương tự của người khác. Các câu trả lời sai thường hiểu nhầm điều này là sự rõ ràng về ngôn ngữ, tính trung lập của chính phủ hoặc sự kiềm chế của lập pháp, nhưng nguyên tắc của Constant đặc biệt đề cập đến việc khi nào pháp luật không nên điều chỉnh các hành động cá nhân không gây hại đến quyền của người khác.
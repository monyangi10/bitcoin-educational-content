question: O que é que o princípio do "silêncio da lei" de Benjamin Constant exige fundamentalmente numa sociedade liberal?
answer: As leis devem manter-se em silêncio quando os indivíduos exercem os seus direitos de liberdade e de propriedade sem prejudicar os direitos semelhantes dos outros
wrong_answers:
  - As leis devem ser redigidas numa linguagem simples que todos os cidadãos possam compreender sem necessidade de interpretação jurídica
  - Os funcionários públicos devem abster-se de fazer comentários públicos sobre questões políticas controversas para manter a neutralidade
  - Os órgãos legislativos devem evitar criar novas leis, a menos que exista um consenso popular esmagador a favor da mudança
explanation: |
  O princípio de Benjamin Constant do "silêncio da lei" significa que as leis não devem interferir quando os indivíduos fazem um uso justo e legítimo da sua liberdade e propriedade. Este silêncio é essencial porque a única limitação aceitável à liberdade individual é a proteção das liberdades semelhantes dos outros. As respostas erradas interpretam erradamente este princípio como clareza linguística, neutralidade governamental ou contenção legislativa, mas o princípio de Constant aborda especificamente quando as leis não devem regular acções individuais que não prejudiquem os direitos dos outros.
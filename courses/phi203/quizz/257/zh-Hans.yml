question: 本杰明-康斯坦茨的 "法律沉默 "原则对自由社会的根本要求是什么？
answer: 当个人行使其自由和财产权而不损害他人的类似权利时，法律必须保持沉默
wrong_answers:
  - 法律必须以所有公民都能理解的简单语言编写，无需法律解释
  - 政府官员必须避免公开评论有争议的政治问题，以保持中立
  - 立法机构应避免制定新的法律，除非绝大多数民众一致同意进行修改
explanation: |
  本杰明-康斯坦特的 "法律沉默 "原则是指，当个人公正合法地使用其自由和财产时，法律不应干涉。这种沉默至关重要，因为对个人自由的唯一可接受的限制是保护他人的类似自由。错误的答案将其误解为语言清晰、政府中立或立法克制，但康斯坦茨的原则具体针对的是法律何时不应管制不损害他人权利的个人行为。
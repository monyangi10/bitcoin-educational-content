question: Apa yang pada dasarnya dibutuhkan oleh prinsip Benjamin Constant tentang 'diamnya hukum' dalam masyarakat liberal?
answer: Hukum harus tetap diam ketika individu menggunakan kebebasan dan hak milik mereka tanpa merugikan hak-hak serupa yang dimiliki orang lain
wrong_answers:
  - Hukum harus ditulis dalam bahasa yang sederhana yang dapat dimengerti oleh semua warga negara tanpa penafsiran hukum
  - Pejabat pemerintah harus menahan diri untuk tidak berkomentar di depan umum mengenai isu-isu politik yang kontroversial untuk menjaga netralitas
  - Badan legislatif harus menghindari membuat undang-undang baru kecuali ada konsensus rakyat yang besar untuk perubahan
explanation: |
  Prinsip Benjamin Constant tentang 'diamnya hukum' berarti bahwa hukum tidak boleh ikut campur ketika individu menggunakan kebebasan dan properti mereka secara adil dan sah. Keheningan ini sangat penting karena satu-satunya batasan yang dapat diterima atas kebebasan individu adalah melindungi kebebasan orang lain yang serupa. Jawaban yang salah menafsirkan hal ini sebagai kejelasan bahasa, netralitas pemerintah, atau pengekangan legislatif, tetapi prinsip Constant secara khusus membahas ketika hukum tidak boleh mengatur tindakan individu yang tidak merugikan hak-hak orang lain.
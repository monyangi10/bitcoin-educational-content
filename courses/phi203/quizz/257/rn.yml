question: Ni igiki ingingo ngenderwako ya Benjamin Constant y’‘uguceceka kw’itegeko’ isaba mu vy’ukuri mu kibano c’abantu bafise umwidegemvyo?
answer: Amategeko ategerezwa guceceka iyo abantu bakoresheje umwidegemvyo wabo n’uburenganzira bwabo bw’itunga ataco bakoze ku burenganzira nk’ubwo bw’abandi .
wrong_answers:
  - Amategeko ategerezwa kwandikwa mu rurimi rworoshe abanyagihugu bose bashobora gutahura ata nsobanuro y'amategeko .
  - Abategetsi ba Leta bategerezwa kwirinda kuvuga ibintu mu ruhame ku bibazo vya politike bitera impaka kugira ngo bagume ata ho bogamiye .
  - Inzego zishinga amategeko zikwiye kwirinda gushinga amategeko mashasha kiretse iyo hariho ukwiyumvira gukomeye kw'abantu kugira ngo hahindurwe .
explanation: |
  Ingingo ya Benjamin Constant y’uko ‘itegeko riceceka’ risobanura ko amategeko adakwiye kwivanga mu gihe abantu bakoresha umwidegemvyo wabo n’itunga ryabo mu buryo bubereye kandi bubereye. Ukwo guceceka ni ngombwa kuko ikintu conyene cemewe co guhagarika umwidegemvyo w’umuntu ku giti ciwe ari ukurinda umwidegemvyo nk’uwo w’abandi. Inyishu zitari zo zisobanura nabi ivyo nk’ugutomora ururimi, ukutagira aho bahengamiye kwa Leta, canke ukuzibira amategeko, ariko ingingo ngenderwako ya Constant ivuga canecane igihe amategeko adakwiye gutunganya ibikorwa vy’umuntu ku giti ciwe bitagira ico bikoze ku burenganzira bw’abandi.
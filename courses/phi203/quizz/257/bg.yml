question: Какво основно изисква принципът на Бенджамин Констант за "мълчанието на закона" в едно либерално общество?
answer: Законите трябва да запазят мълчание, когато хората упражняват своята свобода и право на собственост, без да накърняват подобни права на другите
wrong_answers:
  - Законите трябва да бъдат написани на прост език, който всички граждани могат да разберат без правно тълкуване
  - Държавните служители трябва да се въздържат от публични коментари по спорни политически въпроси, за да запазят неутралитет
  - Законодателните органи следва да избягват създаването на нови закони, освен ако не е налице преобладаващ обществен консенсус за промяна
explanation: |
  Принципът на Бенджамин Констант за "мълчанието на закона" означава, че законите не трябва да се намесват, когато хората използват справедливо и законно своята свобода и собственост. Това мълчание е от съществено значение, тъй като единственото приемливо ограничение на индивидуалната свобода е защитата на подобни свободи на другите. Неправилните отговори погрешно тълкуват това като езикова яснота, правителствена неутралност или законодателна сдържаност, но принципът на Констант конкретно се отнася до това кога законите не трябва да регулират индивидуални действия, които не накърняват правата на другите.
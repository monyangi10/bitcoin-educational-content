question: Според анализа на Гражданската война в САЩ, направен от Густав дьо Молинари, какъв фундаментален принцип представлява концепцията за отделяне в либералната политическа теория?
answer: Свободата на управление, която позволява на групите доброволно да избират своето политическо обединение и да излизат от съществуващите споразумения
wrong_answers:
  - Принцип на териториалната цялост, който предотвратява политическото раздробяване и поддържа стабилни географски граници
  - Доктрината за културно единство, която запазва езиковите и историческите връзки между сродни популации
  - Принципът на колективния суверенитет, който подчинява индивидуалния избор на волята на националното мнозинство
explanation: |
  Молинари разглеждаше отделянето като израз на "свободата на управление" - логичното продължение на договорната свобода към политическите споразумения. Истинската договорна свобода изисква не само участие в споразумения, но и свободата да се влиза или излиза от тях доброволно. Това оспорва схващането, че индивидите са постоянно "притежавани" от нациите. Грешните отговори представляват противоположни принципи: териториалната цялост отрича правото на излизане, културното единство разчита на колективната идентичност вместо на индивидуалния избор, а колективният суверенитет подчинява индивидуалната автономия на груповата воля - всички те противоречат на либералните договорни основи.
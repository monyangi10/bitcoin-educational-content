question: Prema analizi Gustava de Molinarija o Američkom građanskom ratu, koji fundamentalni princip predstavlja koncept secesije u liberalnoj političkoj teoriji?
answer: Sloboda vlade, omogućavajući grupama da dobrovoljno biraju svoje političko udruženje i napuste postojeće aranžmane
wrong_answers:
  - Princip principa teritorijalnog integriteta koji sprečava političku fragmentaciju i održava stabilne geografske granice
  - Doktrina kulturnog jedinstva koja čuva jezičke i istorijske veze između srodnih populacija
  - Princip princip kolektivnog suvereniteta koji podređuje individualni izbor volji nacionalne većine
explanation: |
  Molinari je posmatrao secesiju kao izraz 'slobode vlade' - logičko proširenje ugovorne slobode na političke aranžmane. Prava ugovorna sloboda zahteva ne samo učešće u sporazumima već i slobodu da se u njih ulazi ili iz njih izlazi dobrovoljno. Ovo izaziva ideju da su pojedinci trajno 'posedovani' od strane nacija. Pogrešni odgovori predstavljaju suprotne principe: teritorijalni integritet negira prava na izlazak, kulturno jedinstvo se oslanja na kolektivni identitet umesto na individualni izbor, a kolektivni suverenitet podređuje individualnu autonomiju volji grupe - sve to je u suprotnosti sa liberalnim ugovornim osnovama.
question: Welk fundamenteel principe vertegenwoordigt volgens Gustave de Molinari's analyse van de Amerikaanse Burgeroorlog het concept van afscheiding in de liberale politieke theorie?
answer: De vrijheid van bestuur, waardoor groepen vrijwillig hun politieke associatie kunnen kiezen en uit bestaande regelingen kunnen stappen
wrong_answers:
  - Het principe van territoriale integriteit dat politieke fragmentatie voorkomt en stabiele geografische grenzen handhaaft
  - De doctrine van culturele eenheid die de linguïstische en historische banden tussen verwante bevolkingsgroepen in stand houdt
  - Het collectieve soevereiniteitsprincipe dat individuele keuze ondergeschikt maakt aan de wil van de nationale meerderheid
explanation: |
  Molinari zag afscheiding als een uitdrukking van 'vrijheid van regering' - de logische uitbreiding van contractuele vrijheid naar politieke afspraken. Echte contractuele vrijheid vereist niet alleen deelname aan overeenkomsten, maar ook de vrijheid om er vrijwillig aan deel te nemen of uit te stappen. Dit is een uitdaging voor het idee dat individuen permanent 'bezeten' zijn door naties. De foute antwoorden vertegenwoordigen tegengestelde principes: territoriale integriteit ontkent uittredingsrechten, culturele eenheid vertrouwt op collectieve identiteit boven individuele keuze, en collectieve soevereiniteit onderwerpt individuele autonomie aan groepswil - allemaal in tegenspraak met liberale contractuele grondslagen.
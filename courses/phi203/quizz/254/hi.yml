question: According to Gustave de Molinari's analysis of the American Civil War, what fundamental principle does the concept of secession represent in liberal political theory?
answer: The freedom of government, allowing groups to voluntarily choose their political association and exit existing arrangements
wrong_answers:
  - The territorial integrity principle that prevents political fragmentation and maintains stable geographic boundaries
  - The cultural unity doctrine that preserves linguistic and historical bonds between related populations
  - The collective sovereignty principle that subordinates individual choice to the will of the national majority
explanation: |
  Molinari viewed secession as expressing 'freedom of government' - the logical extension of contractual freedom to political arrangements. True contractual liberty requires not just participation in agreements but the freedom to enter or exit them voluntarily. This challenges the notion that individuals are permanently 'possessed' by nations. The wrong answers represent opposing principles: territorial integrity denies exit rights, cultural unity relies on collective identity over individual choice, and collective sovereignty subordinates individual autonomy to group will - all contradicting liberal contractual foundations.
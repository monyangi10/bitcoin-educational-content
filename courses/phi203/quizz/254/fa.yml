question: بر اساس تحلیل گوستاو دو مولیناری از جنگ داخلی آمریکا، مفهوم جدایی‌طلبی چه اصل بنیادی را در نظریه سیاسی لیبرال نمایندگی می‌کند؟
answer: آزادی دولت، که به گروه‌ها اجازه می‌دهد به‌طور داوطلبانه انجمن سیاسی خود را انتخاب کنند و از ترتیبات موجود خارج شوند
wrong_answers:
  - اصل تمامیت ارضی که از تجزیه سیاسی جلوگیری می‌کند و مرزهای جغرافیایی پایدار را حفظ می‌کند
  - دکترین وحدت فرهنگی که پیوندهای زبانی و تاریخی بین جمعیت‌های مرتبط را حفظ می‌کند
  - اصل حاکمیت جمعی که انتخاب فردی را تابع اراده اکثریت ملی می‌کند
explanation: |
  مولیناری جدایی‌طلبی را به‌عنوان بیان «آزادی حکومت» می‌دید - گسترش منطقی آزادی قراردادی به ترتیبات سیاسی. آزادی واقعی قراردادی نه تنها نیازمند مشارکت در توافقات است بلکه نیازمند آزادی ورود یا خروج داوطلبانه از آن‌ها نیز می‌باشد. این دیدگاه چالش‌برانگیز این ایده است که افراد به‌طور دائمی توسط ملت‌ها «تملک» می‌شوند. پاسخ‌های نادرست اصول مخالف را نشان می‌دهند: تمامیت ارضی حقوق خروج را انکار می‌کند، وحدت فرهنگی بر هویت جمعی به‌جای انتخاب فردی تکیه دارد، و حاکمیت جمعی خودمختاری فردی را به اراده گروهی تابع می‌کند - که همگی با مبانی قراردادی لیبرال در تضاد هستند.
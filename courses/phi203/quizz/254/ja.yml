question: アメリカ南北戦争に関するギュスターヴ・ド・モリナーリの分析によれば、分離独立の概念は自由主義政治理論においてどのような基本原則を表しているか？
answer: グループが自発的に政治団体を選択し、既存の取り決めから抜けることを可能にする、政府の自由。
wrong_answers:
  - 政治的分断を防ぎ、安定した地理的境界を維持する領土保全の原則
  - 関連する集団間の言語的・歴史的な結びつきを維持する文化的統一の原則
  - 個人の選択を国民多数の意思に従属させる集団主権主義
explanation: |
  モリナーリは、分離独立を「政府の自由」、つまり契約の自由を政治的取り決めに論理的に拡張したものだと考えた。真の契約上の自由とは、単に協定に参加するだけでなく、自発的に協定に参加したり、協定から脱退したりする自由を必要とする。これは、個人が国家によって永久に「所有」されるという概念に挑戦するものである。間違った答えは、対立する原則を表している。領土保全は退出権を否定し、文化的統一は個人の選択よりも集団のアイデンティティに依存し、集団主権は個人の自主性を集団の意思に従属させる。
question: Jaký základní princip představuje podle analýzy americké občanské války Gustava de Molinariho koncept secese v liberální politické teorii?
answer: Svoboda vlády, která umožňuje skupinám dobrovolně si zvolit politické sdružení a opustit stávající uspořádání
wrong_answers:
  - Zásada územní celistvosti, která zabraňuje politickému roztříštění a udržuje stabilní geografické hranice
  - Doktrína kulturní jednoty, která zachovává jazykové a historické vazby mezi příbuznými populacemi
  - Princip kolektivní suverenity, který podřizuje individuální volbu vůli národní většiny
explanation: |
  Molinari považoval secesi za výraz "svobody vlády" - logického rozšíření smluvní svobody na politické uspořádání. Skutečná smluvní svoboda vyžaduje nejen účast na dohodách, ale i svobodu dobrovolně do nich vstoupit nebo z nich vystoupit. To zpochybňuje představu, že jednotlivci jsou trvale "vlastněni" národy. Špatné odpovědi představují protichůdné principy: územní celistvost popírá právo na vystoupení, kulturní jednota se spoléhá na kolektivní identitu nad individuální volbou a kolektivní suverenita podřizuje autonomii jednotlivce skupinové vůli - to vše je v rozporu s liberálními smluvními základy.
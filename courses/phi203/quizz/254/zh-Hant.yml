question: 根據 Gustave de Molinari 對美國內戰的分析，分裂的概念在自由主義政治理論中代表什麼基本原則？
answer: 政府的自由，允許團體自願選擇政治聯盟，並退出現有的安排
wrong_answers:
  - 防止政治分裂和維持穩定地理邊界的領土完整原則
  - 文化統一理論保留了相關人口之間的語言和歷史聯繫
  - 集體主權原則使個人選擇從屬於國家大多數的意志
explanation: |
  莫里納利將分裂視為表達「政府的自由」--契約自由對政治安排的邏輯延伸。真正的契約自由不僅需要參與協議，還需要自願加入或退出協議的自由。這就挑戰了個人被國家永久「佔有」的觀念。錯誤的答案代表對立的原則：領土完整剝奪退出的權利，文化統一依賴於集體認同而非個人選擇，集體主權讓個人自主從屬於團體意志，這些都與自由契約基礎相矛盾。
question: Theo phân tích của Gustave de Molinari về Nội chiến Hoa Kỳ, khái niệm ly khai đại diện cho nguyên tắc cơ bản nào trong lý thuyết chính trị tự do?
answer: Quyền tự do quản lý nhà nước, cho phép các nhóm tự nguyện lựa chọn liên kết chính trị của mình và rút khỏi các thỏa thuận hiện có.
wrong_answers:
  - Nguyên tắc toàn vẹn lãnh thổ ngăn ngừa sự chia cắt chính trị và duy trì ranh giới địa lý ổn định.
  - Học thuyết về sự thống nhất văn hóa nhằm bảo tồn các mối liên kết về ngôn ngữ và lịch sử giữa các cộng đồng dân cư có quan hệ huyết thống.
  - Nguyên tắc chủ quyền tập thể đặt sự lựa chọn cá nhân dưới sự chi phối của ý chí đa số quốc gia.
explanation: |
  Molinari coi ly khai là biểu hiện của 'tự do chính phủ' - sự mở rộng hợp lý của tự do hợp đồng sang các thỏa thuận chính trị. Tự do hợp đồng thực sự không chỉ đòi hỏi sự tham gia vào các thỏa thuận mà còn là tự do tham gia hoặc rút khỏi chúng một cách tự nguyện. Điều này thách thức quan niệm rằng các cá nhân bị các quốc gia 'sở hữu' vĩnh viễn. Các câu trả lời sai thể hiện các nguyên tắc đối lập: toàn vẹn lãnh thổ phủ nhận quyền rút lui, sự thống nhất văn hóa dựa trên bản sắc tập thể hơn là sự lựa chọn cá nhân, và chủ quyền tập thể đặt quyền tự chủ cá nhân dưới sự chi phối của ý chí tập thể - tất cả đều mâu thuẫn với nền tảng hợp đồng tự do.
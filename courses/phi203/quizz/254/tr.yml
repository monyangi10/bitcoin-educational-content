question: Gustave de Molinari'nin Amerikan İç Savaşı analizine göre, ayrılma kavramı liberal siyaset teorisinde hangi temel ilkeyi temsil etmektedir?
answer: Grupların gönüllü olarak siyasi birliklerini seçmelerine ve mevcut düzenlemelerden çıkmalarına izin veren yönetim özgürlüğü
wrong_answers:
  - Siyasi parçalanmayı önleyen ve istikrarlı coğrafi sınırları koruyan toprak bütünlüğü ilkesi
  - Akraba halklar arasındaki dilsel ve tarihsel bağları koruyan kültürel birlik doktrini
  - Bireysel tercihleri ulusal çoğunluğun iradesine tabi kılan kolektif egemenlik ilkesi
explanation: |
  Molinari ayrılmayı 'hükümet özgürlüğünü' ifade etmek olarak görmüştür - sözleşme özgürlüğünün siyasi düzenlemelere mantıksal uzantısı. Gerçek sözleşme özgürlüğü sadece anlaşmalara katılmayı değil, anlaşmalara gönüllü olarak girme veya çıkma özgürlüğünü de gerektirir. Bu da bireylerin uluslar tarafından sürekli olarak 'sahiplenildiği' düşüncesine meydan okumaktadır. Yanlış cevaplar karşıt ilkeleri temsil eder: toprak bütünlüğü çıkış haklarını reddeder, kültürel birlik bireysel seçim yerine kolektif kimliğe dayanır ve kolektif egemenlik bireysel özerkliği grup iradesine tabi kılar - bunların hepsi liberal sözleşme temelleriyle çelişir.
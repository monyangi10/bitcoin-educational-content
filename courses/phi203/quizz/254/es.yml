question: Según el análisis de Gustave de Molinari sobre la Guerra Civil estadounidense, ¿qué principio fundamental representa el concepto de secesión en la teoría política liberal?
answer: La libertad de gobierno, que permite a los grupos elegir voluntariamente su asociación política y salir de los acuerdos existentes
wrong_answers:
  - El principio de integridad territorial, que evita la fragmentación política y mantiene estables las fronteras geográficas
  - La doctrina de la unidad cultural que preserva los lazos lingüísticos e históricos entre poblaciones emparentadas
  - El principio de soberanía colectiva que subordina la elección individual a la voluntad de la mayoría nacional
explanation: |
  Molinari consideraba que la secesión expresaba la "libertad de gobierno", la extensión lógica de la libertad contractual a los acuerdos políticos. La verdadera libertad contractual requiere no sólo la participación en acuerdos, sino la libertad de entrar o salir de ellos voluntariamente. Esto cuestiona la noción de que los individuos están permanentemente "poseídos" por las naciones. Las respuestas erróneas representan principios opuestos: la integridad territorial niega los derechos de salida, la unidad cultural se basa en la identidad colectiva por encima de la elección individual y la soberanía colectiva subordina la autonomía individual a la voluntad del grupo, todo lo cual contradice los fundamentos contractuales liberales.
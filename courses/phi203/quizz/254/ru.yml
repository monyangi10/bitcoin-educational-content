question: Согласно анализу американской гражданской войны, проведенному Гюставом де Молинари, какой фундаментальный принцип представляет собой концепция сецессии в либеральной политической теории?
answer: Свобода управления, позволяющая группам добровольно выбирать политическую ассоциацию и выходить из существующих договоренностей
wrong_answers:
  - Принцип территориальной целостности, предотвращающий политическую фрагментацию и поддерживающий стабильные географические границы
  - Доктрина культурного единства, сохраняющая языковые и исторические связи между родственными народами
  - Принцип коллективного суверенитета, подчиняющий индивидуальный выбор воле национального большинства
explanation: |
  Молинари рассматривал отделение как выражение "свободы управления" - логическое продолжение договорной свободы на политические соглашения. Истинная договорная свобода требует не просто участия в соглашениях, а свободы добровольно вступать в них или выходить из них. Это ставит под сомнение представление о том, что люди постоянно "принадлежат" нациям. Неправильные ответы представляют собой противоположные принципы: территориальная целостность отрицает право выхода, культурное единство опирается на коллективную идентичность, а не на индивидуальный выбор, а коллективный суверенитет подчиняет индивидуальную автономию групповой воле - все это противоречит либеральным договорным основам.
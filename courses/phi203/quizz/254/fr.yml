question: D'après l'analyse de la guerre civile américaine de Gustave de Molinari, quel principe fondamental le concept de sécession représente-t-il dans la théorie politique libérale ?
answer: La liberté de gouvernement, qui permet aux groupes de choisir volontairement leur association politique et de sortir des arrangements existants
wrong_answers:
  - Le principe de l'intégrité territoriale qui empêche la fragmentation politique et maintient des frontières géographiques stables
  - La doctrine de l'unité culturelle qui préserve les liens linguistiques et historiques entre des populations apparentées
  - Le principe de souveraineté collective qui subordonne le choix individuel à la volonté de la majorité nationale
explanation: |
  Molinari considérait la sécession comme l'expression de la "liberté de gouvernement" — l'extension logique de la liberté contractuelle aux accords politiques. La véritable liberté contractuelle exige non seulement la participation à des accords, mais aussi la liberté d'y entrer ou d'en sortir volontairement. Cela remet en question l'idée selon laquelle les individus sont "possédés" en permanence par les nations. Les mauvaises réponses représentent des principes opposés : l'intégrité territoriale nie les droits de sortie, l'unité culturelle repose sur l'identité collective plutôt que sur le choix individuel et la souveraineté collective subordonne l'autonomie individuelle à la volonté du groupe — autant de principes qui contredisent les fondements contractuels libéraux.

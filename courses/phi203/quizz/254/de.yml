question: Welches Grundprinzip stellt nach Gustave de Molinaris Analyse des amerikanischen Bürgerkriegs das Konzept der Sezession in der liberalen politischen Theorie dar?
answer: Die Freiheit der Regierung, die es den Gruppen ermöglicht, sich freiwillig politisch zusammenzuschließen und aus bestehenden Vereinbarungen auszusteigen
wrong_answers:
  - Der Grundsatz der territorialen Integrität, der eine politische Fragmentierung verhindert und stabile geografische Grenzen aufrechterhält
  - Die Doktrin der kulturellen Einheit, die die sprachlichen und historischen Bindungen zwischen verwandten Bevölkerungsgruppen bewahrt
  - Der Grundsatz der kollektiven Souveränität, der die individuelle Entscheidung dem Willen der nationalen Mehrheit unterordnet
explanation: |
  Molinari betrachtete die Sezession als Ausdruck der "Freiheit der Regierung" - die logische Erweiterung der Vertragsfreiheit auf politische Vereinbarungen. Echte Vertragsfreiheit erfordert nicht nur die Teilnahme an Vereinbarungen, sondern auch die Freiheit, ihnen freiwillig beizutreten oder sie zu verlassen. Dies stellt die Vorstellung in Frage, dass Individuen dauerhaft von Nationen "besessen" sind. Die falschen Antworten stehen für gegensätzliche Prinzipien: Die territoriale Integrität verweigert das Recht auf Austritt, die kulturelle Einheit beruht auf der kollektiven Identität und nicht auf individuellen Entscheidungen, und die kollektive Souveränität ordnet die individuelle Autonomie dem Gruppenwillen unter - all dies widerspricht den liberalen vertraglichen Grundlagen.
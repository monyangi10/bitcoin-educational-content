question: Enligt Gustave de Molinaris analys av det amerikanska inbördeskriget, vilken grundläggande princip representerar begreppet secession i liberal politisk teori?
answer: Regeringsfrihet, som gör det möjligt för grupper att frivilligt välja politisk organisation och lämna befintliga arrangemang
wrong_answers:
  - Principen om territoriell integritet som förhindrar politisk splittring och upprätthåller stabila geografiska gränser
  - Doktrinen om kulturell enhet som bevarar språkliga och historiska band mellan besläktade folkgrupper
  - Principen om kollektiv suveränitet som underordnar individuella val under den nationella majoritetens vilja
explanation: |
  Molinari såg utbrytning som ett uttryck för "regeringsfrihet" - den logiska utvidgningen av avtalsfrihet till politiska arrangemang. Sann avtalsfrihet kräver inte bara deltagande i avtal utan också frihet att frivilligt träda in i eller ut ur dem. Detta utmanar uppfattningen att individer permanent är "besatta" av nationer. De felaktiga svaren representerar motsatta principer: territoriell integritet förvägrar utträdesrätt, kulturell enhet förlitar sig på kollektiv identitet framför individuella val och kollektiv suveränitet underordnar individuell autonomi under gruppens vilja - allt detta strider mot liberala avtalsgrunder.
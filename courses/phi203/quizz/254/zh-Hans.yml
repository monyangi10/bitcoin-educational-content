question: 根据古斯塔夫-德-莫里纳利对美国内战的分析，分离的概念在自由主义政治理论中代表了什么基本原则？
answer: 政府的自由，允许各团体自愿选择其政治联盟并退出现有安排
wrong_answers:
  - 领土完整原则，防止政治分裂，维护稳定的地理边界
  - 文化统一论维护了相关民族之间的语言和历史纽带
  - 集体主权原则使个人选择服从国家多数人的意愿
explanation: |
  莫利纳利认为分离表达了 "政府自由"--契约自由对政治安排的逻辑延伸。真正的契约自由不仅要求参与协议，还要求有自愿加入或退出协议的自由。这就对个人被国家永久 "占有 "的观念提出了挑战。错误的答案代表了对立的原则：领土完整剥夺了退出的权利，文化统一依赖于集体认同而非个人选择，集体主权使个人自主服从于群体意志--所有这些都与自由契约基础相矛盾。
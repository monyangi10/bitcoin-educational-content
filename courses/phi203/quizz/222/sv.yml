question: Enligt textens analys av territoriellt förvärv, vilken process gjorde tidiga mänskliga gruppers anspråk på territorium legitima och jämförbara med individuell äganderätt?
answer: Kombinationen av upptäckt, överlevnad mot naturens faror och efterföljande förbättringar genom jordbruk och infrastrukturutveckling
wrong_answers:
  - Upprättande av formella juridiska dokument och fördrag med angränsande stammar för att erkänna territoriella gränser
  - Erövringen av territorium genom organiserade militära kampanjer och besegrandet av tidigare ockupanter
  - Demokratiskt samförstånd mellan alla gruppmedlemmar följt av officiellt tillkännagivande av territoriella anspråk
explanation: |
  Texten betonar att territoriell legitimitet uppstod genom en process i flera steg: den första upptäckten av nya landområden, det farliga arbetet med att överleva under okända förhållanden (bekämpa klimat, rovdjur etc.) och, vilket är avgörande, den efterföljande förbättringen av territoriet genom jordbruk, kanalbygge och vägbygge. Detta speglar hur individer legitimt förvärvar egendom genom arbete och förbättring. I texten noteras särskilt att detta inte i första hand handlade om våld eller formella avtal, utan om ansträngningen att upptäcka, överleva och öka markens värde.
question: Menurut analisis teks tentang akuisisi wilayah, proses apa yang membuat klaim kelompok manusia purba atas wilayah menjadi sah dan sebanding dengan hak milik individu?
answer: Kombinasi antara penemuan, upaya bertahan hidup dari bahaya alam, dan perbaikan selanjutnya melalui pertanian dan pembangunan infrastruktur
wrong_answers:
  - Pembentukan dokumen hukum formal dan perjanjian dengan suku-suku tetangga untuk mengakui batas-batas wilayah
  - Penaklukan wilayah melalui kampanye militer terorganisir dan kekalahan para penghuni sebelumnya
  - Konsensus demokratis di antara semua anggota kelompok yang diikuti dengan proklamasi resmi klaim teritorial
explanation: |
  Teks ini menekankan bahwa legitimasi teritorial muncul melalui proses multi-tahap: penemuan awal lahan baru, pekerjaan berbahaya untuk bertahan hidup dalam kondisi yang tidak diketahui (melawan iklim, pemangsa, dll.), dan yang terpenting, peningkatan wilayah selanjutnya melalui pertanian, pembangunan kanal, dan pembangunan jalan. Hal ini mencerminkan bagaimana individu secara sah memperoleh properti melalui kerja keras dan perbaikan. Teks ini secara khusus mencatat bahwa hal ini tidak terutama mengenai kekerasan atau perjanjian formal, tetapi mengenai upaya penemuan, kelangsungan hidup, dan peningkatan nilai tanah.
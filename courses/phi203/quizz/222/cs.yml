question: Jaký proces podle analýzy získávání území v textu učinil nároky raných lidských skupin na území legitimními a srovnatelnými s individuálními vlastnickými právy?
answer: Kombinace objevů, snahy o přežití před přírodními nebezpečími a následného zlepšení díky rozvoji zemědělství a infrastruktury
wrong_answers:
  - Uzavření formálních právních dokumentů a smluv se sousedními kmeny o uznání územních hranic
  - Dobývání území prostřednictvím organizovaných vojenských tažení a porážky předchozích okupantů
  - Demokratický konsenzus všech členů skupiny s následným oficiálním vyhlášením územních nároků
explanation: |
  Text zdůrazňuje, že územní legitimita vznikala v několika fázích: počáteční objevování nových území, nebezpečná práce na přežití v neznámých podmínkách (boj s klimatem, predátory atd.) a především následné zvelebování území prostřednictvím zemědělství, výstavby kanálů a cest. To odráží způsob, jakým jednotlivci legitimně získávají majetek prací a zlepšováním. Text výslovně uvádí, že nešlo primárně o násilí nebo formální dohody, ale o úsilí o objevení, přežití a zvýšení hodnoty půdy.
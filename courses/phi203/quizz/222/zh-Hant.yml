question: 根據文中對領土取得的分析，是什麼過程讓早期人類族群對領土的主張變得合法，並與個人財產權相提並論？
answer: 結合發現、抵抗自然危險的生存努力，以及隨後透過農業和基礎建設發展的改善
wrong_answers:
  - 與鄰近部落建立正式的法律文件和條約，以承認領土邊界
  - 透過有組織的軍事行動征服領土，並擊敗先前的佔領者
  - 所有群體成員達成民主共識，然後正式宣布領土要求
explanation: |
  文中強調，領土的合法性是透過多階段的過程產生的：最初發現新土地、在未知條件下生存的危險工作 (與氣候、掠食者等作鬥爭)，以及最重要的是，隨後透過農業、運河建設和道路建設來改善領土。這反映了個人如何透過工作和改善來合法取得財產。文中特別指出這主要不是暴力或正式協議，而是發現、生存和提升土地價值的努力。
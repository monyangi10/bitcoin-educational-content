question: Dushingiye ku nseguro y’ico canditswe ku bijanye no kuronka intara, ni inzira iyihe yatumye ivyo imigwi y’abantu ya kera yipfuza kuronka intara biba ivyemewe kandi bigereranywa n’uburenganzira bw’umuntu ku giti ciwe bwo kuronka intara?
answer: Ivyo bivumbuwe bihurikiye hamwe, utwigoro two kurokoka ingorane ziterwa n’ibidukikije, be n’ivyo gutera imbere biciye mu buhinzi no mu guteza imbere ibikorwa remezo .
wrong_answers:
  - Gushinga inyandiko zitegekanijwe n'amategeko n'amasezerano n'imiryango ibanyi kugira ngo yemere imbibe z'intara .
  - Kwigarurira intara biciye mu bikorwa vy’ingabo vyatunganijwe no gutsinda abayihagaze mbere .
  - Uguhurizako demokarasi hagati y'abagize iryo tsinda bose hakurikijwe itangazo ku mugaragaro ry'ivyifuzo vy'intara .
explanation: |
  Ico canditswe gishimika ku vy’uko uburenganzira bw’intara bwavutse biciye mu nzira y’inzira nyinshi: ukuvumbura amatongo mashasha mu ntango, igikorwa giteye akaga co kurokoka mu bihe bitazwi (kurwanya ikirere, ibikoko bifata abantu, n’ibindi), n’igihambaye cane, ni ugutera imbere kw’intara kwakurikiyeho biciye mu kwubaka, kwubaka amabarabara n’imigende. Ivyo vyerekana ingene abantu ku giti cabo baronka itunga mu buryo bubereye biciye ku gikorwa no ku gutera imbere. Ico canditswe kivuga canecane ko ivyo bitajanye n’ubukazi canke amasezerano ategekanijwe, ahubwo ko vyari vyerekeye utwigoro two kuvumbura, kurokoka no kwongerera agaciro igihugu.
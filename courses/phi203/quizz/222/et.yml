question: Milline protsess muutis tekstis esitatud territoriaalse omandamise analüüsi kohaselt varaste inimrühmade nõuded territooriumile legitiimseks ja võrreldavaks individuaalsete omandiõigustega?
answer: Avastamise, looduslike ohtude vastu võitlemise ja hilisemate paranduste kombinatsioon põllumajanduse ja infrastruktuuri arendamise kaudu
wrong_answers:
  - Ametlike juriidiliste dokumentide ja lepingute sõlmimine naaberhõimudega territoriaalsete piiride tunnustamiseks
  - Territooriumi vallutamine organiseeritud sõjaliste kampaaniate ja eelmiste okupantide lüüasaamise kaudu
  - Demokraatlik konsensus kõigi rühma liikmete vahel, millele järgneb territoriaalsete nõuete ametlik väljakuulutamine
explanation: |
  Tekstis rõhutatakse, et territoriaalne legitiimsus tekkis mitmeastmelise protsessi käigus: uute maade esialgne avastamine, ohtlik ellujäämistöö tundmatutes tingimustes (võitlus kliima, kiskjate jne. vastu) ja, mis on väga oluline, territooriumi hilisem parandamine põllumajanduse, kanalite ja teede ehitamise kaudu. See peegeldab seda, kuidas üksikisikud omandavad seaduslikult vara töö ja parandamise kaudu. Tekstis märgitakse konkreetselt, et tegemist ei olnud eelkõige vägivalla või ametlike kokkulepetega, vaid maa avastamiseks, ellujäämiseks ja selle väärtuse suurendamiseks tehtava tööga.
question: According to the text's analysis of territorial acquisition, what process made early human groups' claims to territory legitimate and comparable to individual property rights?
answer: The combination of discovery, survival efforts against natural dangers, and subsequent improvements through agriculture and infrastructure development
wrong_answers:
  - The establishment of formal legal documents and treaties with neighboring tribes to recognize territorial boundaries
  - The conquest of territory through organized military campaigns and the defeat of previous occupants
  - The democratic consensus among all group members followed by official proclamation of territorial claims
explanation: |
  The text emphasizes that territorial legitimacy arose through a multi-stage process: initial discovery of new lands, the dangerous work of survival in unknown conditions (fighting climate, predators, etc.), and crucially, the subsequent improvement of the territory through agriculture, canal construction, and road building. This mirrors how individuals legitimately acquire property through work and improvement. The text specifically notes this wasn't primarily about violence or formal agreements, but about the effort of discovery, survival, and enhancement of the land's value.
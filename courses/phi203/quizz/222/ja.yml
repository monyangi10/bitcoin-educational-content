question: 領土獲得に関する本文の分析によれば、初期の人類の集団が領土に対する主張を正当化し、個人の財産権に匹敵するものにしたのはどのような過程だったのだろうか？
answer: 発見、自然の危険に対する生存努力、農業とインフラ整備によるその後の改善。
wrong_answers:
  - 近隣部族との正式な法的文書や条約を制定し、領土の境界を認めること。
  - 組織的な軍事作戦と以前の占領者の敗北による領土の征服
  - グループメンバー全員の民主的なコンセンサスと、それに続く領有権の公式宣言
explanation: |
  つまり、新しい土地の発見、未知の環境下での危険なサバイバル作業（気候や捕食者との戦いなど）、そして重要なのは、農業、運河建設、道路建設などによる領土の改良である。これは、個人が労働と改良を通じて合法的に財産を取得する方法を反映している。これは暴力や正式な契約ではなく、発見、生存、そして土地の価値を向上させるための努力であったと、本文は特に指摘している。
question: Theo phân tích về việc chiếm hữu lãnh thổ trong văn bản này, quá trình nào đã khiến cho các nhóm người thời kỳ đầu có quyền sở hữu lãnh thổ một cách hợp pháp và tương đương với quyền sở hữu cá nhân?
answer: Sự kết hợp giữa khám phá, nỗ lực sinh tồn trước các hiểm họa tự nhiên và những cải tiến tiếp theo thông qua nông nghiệp và phát triển cơ sở hạ tầng.
wrong_answers:
  - Việc lập các văn bản pháp lý chính thức và các hiệp ước với các bộ lạc lân cận để công nhận ranh giới lãnh thổ.
  - Việc chinh phục lãnh thổ thông qua các chiến dịch quân sự có tổ chức và đánh bại những kẻ chiếm đóng trước đó.
  - Sự đồng thuận dân chủ giữa tất cả các thành viên trong nhóm, tiếp theo là tuyên bố chính thức về các yêu sách lãnh thổ, đã đạt được.
explanation: |
  Văn bản nhấn mạnh rằng tính hợp pháp của lãnh thổ được hình thành thông qua một quá trình nhiều giai đoạn: khám phá ban đầu những vùng đất mới, công việc sinh tồn đầy nguy hiểm trong điều kiện chưa biết (chống chọi với khí hậu, thú dữ, v.v.), và quan trọng hơn cả, việc cải thiện lãnh thổ sau đó thông qua nông nghiệp, xây dựng kênh đào và đường sá. Điều này phản ánh cách thức các cá nhân có được tài sản một cách hợp pháp thông qua lao động và cải tiến. Văn bản đặc biệt lưu ý rằng điều này không chủ yếu liên quan đến bạo lực hay các thỏa thuận chính thức, mà là về nỗ lực khám phá, sinh tồn và nâng cao giá trị của đất đai.
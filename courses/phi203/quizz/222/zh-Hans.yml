question: 根据课文对领土获取的分析，是什么过程使早期人类群体对领土的要求合法化，并可与个人财产权相媲美？
answer: 发现、抵御自然危险的生存努力，以及随后通过农业和基础设施发展实现的改善，这些因素结合在一起
wrong_answers:
  - 与邻近部落签订正式法律文件和条约，承认领土边界
  - 通过有组织的军事行动征服领土，打败以前的占领者
  - 所有集团成员达成民主共识，然后正式宣布领土要求
explanation: |
  文中强调，领土的合法性是通过一个多阶段的过程产生的：最初发现新的土地，在未知条件下进行危险的生存工作（与气候、掠食动物等作战），以及随后通过农业、运河建设和道路建设改善领土。这反映了个人如何通过劳动和改良合法地获得财产。文中特别指出，这主要不是暴力或正式协议，而是发现、生存和提高土地价值的努力。
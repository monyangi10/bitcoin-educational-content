question: Dlaczego zgodnie z teorią wolnego rynku wolność gospodarcza umożliwia produkcję w czasie, który jest lepszy niż interwencja polityczna?
answer: Sygnały zysku skłaniają przedsiębiorców do produkowania wtedy, gdy popyt konsumencki faktycznie istnieje, tworząc naturalną koordynację czasową
wrong_answers:
  - Planowanie rządowe pozwala na lepsze długoterminowe prognozowanie potrzeb społecznych niż indywidualni uczestnicy rynku
  - Polityczny proces decyzyjny obejmuje szersze względy społeczne, których indywidualne dążenie do zysku nie jest w stanie uwzględnić
  - Interwencja państwa może skuteczniej przewidywać przyszłe potrzeby poprzez systematyczną analizę trendów demograficznych i gospodarczych
explanation: |
  Rozdział ten wyjaśnia, że wolność gospodarcza tworzy lepsze wyczucie czasu poprzez sygnały zysku, które wskazują na rzeczywisty popyt konsumencki. Gdy zyski są dostępne, przedsiębiorcy reagują szybko; gdy ich nie ma, przedwczesna produkcja jest zniechęcana. Tworzy to koordynację opartą na rzeczywistych preferencjach konsumentów, a nie na założeniach politycznych. Interwencja polityczna działa w oparciu o cykle wyborcze i wyidealizowane satysfakcje, które mogą nie odzwierciedlać rzeczywistych potrzeb rynku, prowadząc do błędnych decyzji produkcyjnych.
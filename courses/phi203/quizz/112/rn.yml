question: Ni kuki umwidegemvyo mu vy’ubutunzi ushoboza igihe co gukora ikintu kiruta ingene politike igira ico ikoze hakurikijwe inyigisho y’isoko ry’umwidegemvyo?
answer: Ibimenyetso vy’inyungu biyobora abashoramare kugira ngo bashobore gutanga igihe ivyo abaguzi basaba vy’ukuri biriho, bikaba bituma habaho uguhuza igihe
wrong_answers:
  - Itegeko rya Leta rituma habaho gutegekanya neza ivy'igihe kirekire ivyo abantu bakeneye kuruta abaje mw'isoko ku giti cabo .
  - Gufata ingingo za politike birimwo ivyiyumviro vyagutse vy’imibano ivyo umuntu ku giti ciwe arondera inyungu adashobora gutanga .
  - Ingingo za Leta zishobora kwitega imbere y'igihe ivyo bikenewe muri kazoza mu gusuzuma mu buryo butunganye imigenderanire y'abantu n'ubutunzi .
explanation: |
  Ico kigabane kirasigura ko umwidegemvyo w’ubutunzi urema igihe ciza kuruta ibindi biciye ku bimenyetso vy’inyungu vyerekana ivyo abaguzi basaba vy’ukuri. Iyo inyungu zihari, abacuruzi baravyishura ningoga; iyo zitariho, gukora imbere y’igihe biracika intege. Ivyo bituma habaho uguhuza ibikorwa bishingiye ku vyo abaguzi bakunda vy’ukuri aho gushingira ku vyiyumviro vya politike. Ingingo za politike zikora ku nzira z’amatora no ku kunyurwa kw’ivyiyumviro bishobora kutagaragaza ivyo isoko rikeneye vy’ukuri, bikaba bituma hafatwa ingingo z’uguhingura zitabereye.
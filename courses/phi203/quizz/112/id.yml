question: Mengapa kebebasan ekonomi memungkinkan waktu produksi yang lebih unggul daripada intervensi politik menurut teori pasar bebas?
answer: Sinyal keuntungan memandu pengusaha untuk memproduksi ketika permintaan konsumen benar-benar ada, menciptakan koordinasi waktu yang alami
wrong_answers:
  - Perencanaan pemerintah memungkinkan peramalan jangka panjang yang lebih baik atas kebutuhan masyarakat daripada pelaku pasar individu
  - Pengambilan keputusan politik menggabungkan pertimbangan sosial yang lebih luas yang tidak dapat diperhitungkan oleh pencarian keuntungan individu
  - Intervensi negara dapat mengantisipasi kebutuhan di masa depan secara lebih efektif dengan menganalisis tren demografi dan ekonomi secara sistematis
explanation: |
  Bab ini menjelaskan bahwa kebebasan ekonomi menciptakan waktu yang tepat melalui sinyal keuntungan yang mengindikasikan permintaan konsumen yang sesungguhnya. Ketika keuntungan tersedia, para pengusaha merespons dengan cepat; ketika tidak ada, produksi dini tidak dianjurkan. Hal ini menciptakan koordinasi berdasarkan preferensi konsumen yang sebenarnya, bukan berdasarkan asumsi politik. Intervensi politik beroperasi berdasarkan siklus pemilihan umum dan kepuasan ideal yang mungkin tidak mencerminkan kebutuhan pasar yang sebenarnya, yang mengarah pada keputusan produksi yang salah.
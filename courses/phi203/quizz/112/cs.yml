question: Proč podle teorie volného trhu umožňuje ekonomická svoboda načasování výroby, které je lepší než politické zásahy?
answer: Ziskové signály vedou podnikatele k tomu, aby vyráběli v době, kdy skutečně existuje spotřebitelská poptávka, a vytvářejí tak přirozenou koordinaci načasování
wrong_answers:
  - Vládní plánování umožňuje lépe předvídat dlouhodobé společenské potřeby než jednotliví účastníci trhu
  - Politické rozhodování zahrnuje širší společenské aspekty, které individuální snaha o zisk nemůže zohlednit
  - Státní zásahy mohou účinněji předvídat budoucí potřeby díky systematické analýze demografických a ekonomických trendů
explanation: |
  Kapitola vysvětluje, že ekonomická svoboda vytváří lepší načasování prostřednictvím signálů o zisku, které ukazují na skutečnou poptávku spotřebitelů. Když jsou zisky k dispozici, podnikatelé reagují rychle; když chybí, odrazují od předčasné výroby. To vytváří koordinaci založenou na skutečných preferencích spotřebitelů, nikoli na politických předpokladech. Politické zásahy fungují na základě volebních cyklů a idealizovaných uspokojení, která nemusí odrážet skutečné potřeby trhu, což vede k chybným výrobním rozhodnutím.
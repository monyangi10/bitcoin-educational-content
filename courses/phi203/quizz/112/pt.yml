question: Por que razão, segundo a teoria do mercado livre, a liberdade económica permite uma calendarização da produção superior à intervenção política?
answer: Os sinais de lucro orientam os empresários para produzirem quando existe efetivamente procura por parte dos consumidores, criando uma coordenação natural do calendário
wrong_answers:
  - O planeamento governamental permite uma melhor previsão a longo prazo das necessidades da sociedade do que os participantes individuais no mercado
  - A tomada de decisões políticas incorpora considerações sociais mais vastas que a procura de lucros individuais não pode ter em conta
  - A intervenção do Estado pode antecipar mais eficazmente as necessidades futuras, analisando sistematicamente as tendências demográficas e económicas
explanation: |
  O capítulo explica que a liberdade económica cria um timing superior através de sinais de lucro que indicam a procura real dos consumidores. Quando os lucros estão disponíveis, os empresários respondem rapidamente; quando estão ausentes, a produção prematura é desencorajada. Isto cria uma coordenação baseada nas preferências reais dos consumidores e não em pressupostos políticos. A intervenção política funciona com base em ciclos eleitorais e em satisfações idealizadas que podem não refletir as necessidades reais do mercado, levando a decisões de produção desajustadas.
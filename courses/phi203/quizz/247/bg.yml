question: Според либералния анализ на расизма в икономическите общества през XIX в. коя е основната причина либералите да подкрепят смесването на различни човешки групи?
answer: Конкуренцията между различните културни и интелектуални елементи стимулира възможно най-доброто развитие на цивилизацията чрез доброволно сътрудничество
wrong_answers:
  - Моралното задължение за премахване на расовите предразсъдъци изисква намесата на държавата, която да наложи интеграция на всички социални групи
  - Икономическата ефективност изисква стандартизиране на културните практики, за да се намалят транзакционните разходи при пазарния обмен
  - Политическата стабилност налага хомогенизиране на населението, за да се предотвратят етнически конфликти и да се поддържа социалният ред
explanation: |
  Либералните теоретици от Обществото за политическа икономия през XIX в. смятат, че конкуренцията между различните групи е движеща сила и че съчетаването на различни културни и интелектуални елементи чрез доброволно сътрудничество води до оптимално развитие на цивилизацията. Този възглед противоречи на грешните отговори: либералите се противопоставят на държавната намеса в социалните отношения, не се стремят към културна стандартизация (вместо това ценят разнообразието) и отхвърлят хомогенизацията като противоречаща на индивидуалистичните принципи, които се фокусират върху индивидите, а не върху колективните расови или национални групи.
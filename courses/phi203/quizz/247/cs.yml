question: Jaký byl podle liberální analýzy rasismu v ekonomických společnostech 19. století hlavní důvod, proč liberálové podporovali míšení různých lidských skupin?
answer: Konkurence mezi různými kulturními a intelektuálními prvky je hnací silou nejlepšího možného rozvoje civilizace prostřednictvím dobrovolné spolupráce
wrong_answers:
  - Morální povinnost odstranit rasové předsudky vyžadovala státní zásah k prosazení integrace všech sociálních skupin
  - Ekonomická efektivita si vyžádala standardizaci kulturních postupů, aby se snížily transakční náklady při tržní výměně
  - Politická stabilita vyžadovala homogenizaci obyvatelstva, aby se předešlo etnickým konfliktům a udržel se společenský řád
explanation: |
  Liberální teoretici Společnosti politické ekonomie 19. století věřili, že konkurence mezi různými skupinami je hnací silou a že spojení různých kulturních a intelektuálních prvků prostřednictvím dobrovolné spolupráce vede k optimálnímu rozvoji civilizace. Tento názor je v rozporu s nesprávnými odpověďmi: liberálové se stavěli proti státním zásahům do společenských vztahů, neusilovali o kulturní standardizaci (oceňovali naopak rozmanitost) a odmítali homogenizaci jako odporující individualistickým principům, které se zaměřují na jednotlivce, nikoli na kolektivní rasové nebo národní skupiny.
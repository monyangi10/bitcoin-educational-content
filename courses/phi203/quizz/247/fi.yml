question: Liberaalien analyysin mukaan rasismi 1800-luvun talousyhteiskunnissa, mikä oli liberaalien ensisijainen syy tukea eri ihmisryhmien sekoittumista?
answer: Erilaisten kulttuuristen ja älyllisten tekijöiden välinen kilpailu edistää sivilisaation parasta mahdollista kehitystä vapaaehtoisen yhteistyön kautta
wrong_answers:
  - Moraalinen velvollisuus poistaa rotuun liittyvät ennakkoluulot edellytti valtion väliintuloa kaikkien yhteiskuntaryhmien integraation toteuttamiseksi
  - Taloudellinen tehokkuus vaati kulttuurikäytäntöjen standardointia markkinavaihdon transaktiokustannusten vähentämiseksi
  - Poliittinen vakaus edellytti väestön homogenisointia etnisten konfliktien estämiseksi ja yhteiskuntajärjestyksen ylläpitämiseksi
explanation: |
  1800-luvun poliittisen taloustieteen seuran liberaaliteoreetikot uskoivat, että kilpailu erilaisten ryhmien välillä oli eteenpäin vievää ja että erilaisten kulttuuristen ja älyllisten elementtien yhdistäminen vapaaehtoisen yhteistyön avulla johti sivilisaation optimaaliseen kehitykseen. Tämä näkemys on ristiriidassa väärien vastausten kanssa: liberaalit vastustivat valtion puuttumista sosiaalisiin suhteisiin, eivät pyrkineet kulttuuriseen standardisointiin (sen sijaan he arvostivat monimuotoisuutta) ja torjuivat homogenisoinnin vastaisena individualistisille periaatteille, joissa keskitytään yksilöihin kollektiivisten rodullisten tai kansallisten ryhmien sijasta.
question: Prema zapažanju Pierrea de Boisguilberta o ljudskoj motivaciji, šta prvenstveno upravlja celokupnom trgovinom?
answer: Lični interes preduzetnika koji nastoje da zadovolje sopstvene potrebe
wrong_answers:
  - Želja preduzetnika da pruže javnu uslugu i pomognu drugima
  - Vladine regulative koje osiguravaju pravednu raspodelu resursa
  - Verski principi koji promovišu dobrotvornost i kolektivnu dobrobit
explanation: |
  Pierre de Boisguilbert je identifikovao da je trgovina u suštini pokretana ličnim interesom preduzetnika koji nikada ne razmišljaju o pružanju usluga, već se fokusiraju na zadovoljenje sopstvenih potreba. Ovo ponašanje vođeno sopstvenim interesom stvara uzajamnu korisnost koja formira harmoniju sveta. Druge opcije pogrešno sugerišu altruističke motive, kontrolu vlade ili verske principe kao primarne pokretače, dok je Boisguilbert posebno napomenuo da preduzetnici ne razmišljaju o služenju drugima, već o ispunjavanju svojih ličnih zahteva.
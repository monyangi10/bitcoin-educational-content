question: طبق مشاهده پیر دو بواگیلبر درباره انگیزه‌های انسانی، چه چیزی به طور عمده بر تمام تجارت‌ها حاکم است؟
answer: علاقه شخصی کارآفرینانی که به دنبال رفع نیازهای خود هستند
wrong_answers:
  - تمایل کارآفرینان به ارائه خدمات عمومی و کمک به دیگران
  - مقررات دولتی که توزیع عادلانه منابع را تضمین می‌کنند
  - اصول دینی که خیریه و رفاه جمعی را ترویج می‌کنند
explanation: |
  پیر دو بواگیلبر شناسایی کرد که تجارت اساساً توسط منافع شخصی کارآفرینان هدایت می‌شود که هرگز به ارائه خدمات فکر نمی‌کنند بلکه بر ارضای نیازهای خود تمرکز دارند. این رفتار خودخواهانه سود متقابلی ایجاد می‌کند که هماهنگی جهان را شکل می‌دهد. گزینه‌های دیگر به اشتباه انگیزه‌های نوع‌دوستانه، کنترل دولت، یا اصول مذهبی را به عنوان محرک‌های اصلی پیشنهاد می‌دهند، در حالی که بواگیلبر به‌طور خاص اشاره کرد که کارآفرینان به فکر خدمت به دیگران نیستند بلکه به دنبال برآورده کردن نیازهای شخصی خود هستند.
question: Čím se podle postřehu Pierra de Boisguilberta o lidské motivaci řídí především veškerý obchod?
answer: Osobní zájem podnikatelů, kteří se snaží uspokojit své vlastní potřeby
wrong_answers:
  - Touha podnikatelů poskytovat veřejné služby a pomáhat ostatním
  - Vládní předpisy, které zajišťují spravedlivé rozdělování zdrojů
  - Náboženské zásady, které podporují dobročinnost a kolektivní blaho
explanation: |
  Pierre de Boisguilbert zjistil, že obchod je v podstatě řízen osobním zájmem podnikatelů, kteří nikdy nepřemýšlejí o poskytování služeb, ale soustředí se na uspokojování vlastních potřeb. Toto chování založené na vlastním zájmu vytváří vzájemný užitek, který tvoří harmonii světa. Ostatní možnosti nesprávně naznačují altruistické motivace, vládní kontrolu nebo náboženské principy jako primární hnací síly, zatímco Boisguilbert výslovně poznamenal, že podnikatelé nemyslí na službu druhým, ale na uspokojení svých osobních požadavků.
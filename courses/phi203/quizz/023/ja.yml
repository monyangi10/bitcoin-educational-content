question: 人間のモチベーションに関するピエール・ド・ボワジルベールの観察によれば、すべての商業を支配するものは何か？
answer: 自分の欲求を満たそうとする起業家の個人的利益
wrong_answers:
  - 公共サービスを提供し、他人を助けたいという起業家の願望
  - 資源の公正な配分を保証する政府の規制
  - 慈善と集団福祉を促進する宗教的原則
explanation: |
  ピエール・ド・ボワスギルベールは、商業は基本的に企業家の個人的利益によって動いており、彼らはサービスを提供することなど考えず、自分たちの欲求を満たすことに集中していると指摘した。この利己的な行動は、世界の調和を形成する相互効用を生み出す。他の選択肢は、利他的な動機、政府の管理、宗教的な原理を第一の原動力としている。
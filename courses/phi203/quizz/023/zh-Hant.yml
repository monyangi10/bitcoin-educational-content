question: 根據 Pierre de Boisguilbert 對人類動機的觀察，支配所有商業的主要因素是什麼？
answer: 企業家追求滿足自身需求的個人利益
wrong_answers:
  - 企業家提供公共服務和幫助他人的願望
  - 確保公平分配資源的政府法規
  - 促進慈善和集體福利的宗教原則
explanation: |
  Pierre de Boisguilbert 認為商業根本上是由企業家的個人利益所驅使，他們從不考慮提供服務，只專注於滿足自己的需求。這種利己的行為創造了互惠的效用，形成了世界的和諧。其他選項錯誤地認為利他主義動機、政府控制或宗教原則是主要驅動力，而 Boisguilbert 特別指出，企業家不會想到要為他人服務，而是要滿足個人需求。
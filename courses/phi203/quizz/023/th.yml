question: ตามการสังเกตของ Pierre de Boisguilbert เกี่ยวกับแรงจูงใจของมนุษย์ สิ่งใดที่เป็นตัวกำหนดหลักของการค้าทั้งหมด?
answer: ความสนใจส่วนตัวของผู้ประกอบการที่มุ่งหวังจะตอบสนองความต้องการของตนเอง
wrong_answers:
  - ความปรารถนาของผู้ประกอบการในการให้บริการสาธารณะและช่วยเหลือผู้อื่น
  - กฎระเบียบของรัฐบาลที่รับประกันการกระจายทรัพยากรอย่างเป็นธรรม
  - หลักศาสนาที่ส่งเสริมการกุศลและสวัสดิการส่วนรวม
explanation: |
  Pierre de Boisguilbert ระบุว่าการค้าขายถูกขับเคลื่อนโดยพื้นฐานจากความสนใจส่วนตัวของผู้ประกอบการที่ไม่เคยคิดถึงการให้บริการ แต่เน้นที่การตอบสนองความต้องการของตนเอง พฤติกรรมที่สนใจตนเองนี้สร้างประโยชน์ซึ่งกันและกันที่ก่อให้เกิดความกลมกลืนของโลก ตัวเลือกอื่น ๆ ที่กล่าวถึงแรงจูงใจที่ไม่เห็นแก่ตัว การควบคุมของรัฐบาล หรือหลักการทางศาสนาเป็นตัวขับเคลื่อนหลักนั้นไม่ถูกต้อง เมื่อ Boisguilbert ระบุโดยเฉพาะว่าผู้ประกอบการไม่ได้คิดถึงการให้บริการผู้อื่น แต่เกี่ยวกับการตอบสนองความต้องการส่วนตัวของพวกเขา
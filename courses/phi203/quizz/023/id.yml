question: Menurut pengamatan Pierre de Boisguilbert tentang motivasi manusia, apa yang terutama mengatur semua perdagangan?
answer: Kepentingan pribadi pengusaha yang berusaha memenuhi kebutuhan mereka sendiri
wrong_answers:
  - Keinginan pengusaha untuk menyediakan layanan publik dan membantu orang lain
  - Peraturan pemerintah yang memastikan distribusi sumber daya yang adil
  - Prinsip-prinsip agama yang mempromosikan amal dan kesejahteraan bersama
explanation: |
  Pierre de Boisguilbert mengidentifikasi bahwa perdagangan pada dasarnya didorong oleh kepentingan pribadi para pengusaha yang tidak pernah berpikir untuk menyediakan layanan tetapi fokus pada pemenuhan kebutuhan mereka sendiri. Perilaku mementingkan diri sendiri ini menciptakan utilitas timbal balik yang membentuk keharmonisan dunia. Pilihan lain secara keliru menyarankan motivasi altruistik, kontrol pemerintah, atau prinsip-prinsip agama sebagai pendorong utama, ketika Boisguilbert secara khusus mencatat bahwa para pengusaha tidak berpikir untuk melayani orang lain, melainkan untuk memenuhi kebutuhan pribadi mereka.
question: Enligt Pierre de Boisguilberts observation om mänsklig motivation, vad styr i första hand all handel?
answer: Det personliga intresset hos entreprenörer som försöker tillfredsställa sina egna behov
wrong_answers:
  - Entreprenörernas önskan att tillhandahålla offentliga tjänster och hjälpa andra
  - Statliga regler som säkerställer rättvis fördelning av resurser
  - Religiösa principer som främjar välgörenhet och kollektiv välfärd
explanation: |
  Pierre de Boisguilbert konstaterade att handeln i grunden drivs av det personliga intresset hos entreprenörer som aldrig tänker på att tillhandahålla tjänster utan fokuserar på att tillfredsställa sina egna behov. Detta egennyttiga beteende skapar ömsesidig nytta som utgör harmonin i världen. De andra alternativen antyder felaktigt altruistiska motiv, statlig kontroll eller religiösa principer som primära drivkrafter, när Boisguilbert specifikt noterade att entreprenörer inte tänker på att tjäna andra utan på att uppfylla sina personliga krav.
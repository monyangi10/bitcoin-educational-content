question: 인간의 동기에 대한 피에르 드 부아길베르의 관찰에 따르면, 모든 상거래를 지배하는 것은 무엇일까요?
answer: 자신의 필요를 충족시키려는 기업가들의 개인적인 관심사
wrong_answers:
  - 공공 서비스를 제공하고 다른 사람들을 돕고자 하는 기업가들의 열망
  - 자원의 공정한 분배를 보장하는 정부 규제
  - 자선 및 집단 복지를 증진하는 종교적 원칙
explanation: |
  피에르 드 부아길베르는 상거래가 근본적으로 서비스를 제공한다는 생각은 하지 않고 자신의 욕구를 충족시키는 데만 집중하는 기업가들의 개인적인 이해관계에 의해 주도된다는 사실을 밝혀냈습니다. 이러한 이기적인 행동은 세상의 조화를 이루는 호혜적 효용을 창출합니다. 다른 옵션은 이타적 동기, 정부의 통제 또는 종교적 원칙을 주요 동인으로 잘못 제시하고 있는데, 보이스길버트는 특히 기업가들이 다른 사람에게 봉사하는 것이 아니라 자신의 개인적인 요구 사항을 충족하는 것에만 집중한다고 지적했습니다.
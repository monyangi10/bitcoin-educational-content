question: Pierre de Boisguilbertin ihmisen motivaatiota koskevan havainnon mukaan mikä ohjaa ensisijaisesti kaikkea kaupankäyntiä?
answer: Omia tarpeitaan tyydyttämään pyrkivien yrittäjien henkilökohtainen etu
wrong_answers:
  - Yrittäjien halu tarjota julkista palvelua ja auttaa muita
  - Hallituksen säädökset, joilla varmistetaan resurssien oikeudenmukainen jakautuminen
  - Uskonnolliset periaatteet, jotka edistävät hyväntekeväisyyttä ja kollektiivista hyvinvointia
explanation: |
  Pierre de Boisguilbert totesi, että kaupankäyntiä ohjaavat pohjimmiltaan yrittäjien henkilökohtaiset intressit, jotka eivät koskaan ajattele palvelun tarjoamista vaan keskittyvät omien tarpeidensa tyydyttämiseen. Tämä oman edun tavoitteleva käyttäytyminen luo vastavuoroista hyötyä, joka muodostaa maailman harmonian. Muissa vaihtoehdoissa esitetään virheellisesti altruistisia motiiveja, valtion valvontaa tai uskonnollisia periaatteita ensisijaisiksi ajureiksi, vaikka Boisguilbert nimenomaan totesi, että yrittäjät eivät ajattele muiden palvelemista vaan omien tarpeidensa tyydyttämistä.
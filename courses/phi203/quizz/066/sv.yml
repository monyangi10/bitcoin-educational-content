question: Vilken var den huvudsakliga konsekvensen av jordbrukets överskottsproduktion enligt kapitlet?
answer: Det möjliggjorde finansiering av kollektiva skyddsfunktioner och sociala institutioner
wrong_answers:
  - Den ledde till omedelbar jämlikhet mellan alla samhällsmedlemmar
  - Den orsakade en fullständig eliminering av konflikter mellan mänskliga grupper
  - Det ledde till att alla former av äganderätt avskaffades
explanation: |
  Enligt kapitlet var jordbruksöverskottet avgörande eftersom det genererade mer resurser än vad som förbrukades, vilket gjorde det möjligt för samhällen att finansiera kollektiva skyddsfunktioner och institutioner som garanterade social ordning. Detta överskott skapade en positiv spiral där trygghet möjliggjorde fortsatt utveckling. De felaktiga svaren är felaktiga eftersom: överskottet inte skapade omedelbar jämlikhet (sociala hierarkier existerade fortfarande), konflikter mellan grupper fortsatte att existera och äganderätten faktiskt blev viktigare snarare än övergavs.
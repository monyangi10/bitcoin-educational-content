question: Bölüme göre tarımsal üretim fazlasının temel sonucu neydi?
answer: Kolektif koruma işlevlerinin ve sosyal kurumların finanse edilmesini sağladı
wrong_answers:
  - Toplumun tüm üyeleri arasında anında eşitliğe yol açtı
  - İnsan grupları arasındaki çatışmaların tamamen ortadan kalkmasına neden oldu
  - Her türlü mülk sahipliğinin terk edilmesiyle sonuçlandı
explanation: |
  Bu bölüme göre, tarımsal üretim fazlası çok önemliydi çünkü tüketilenden daha fazla kaynak yaratarak toplumların kolektif koruma işlevlerini ve sosyal düzeni garanti altına alan kurumları finanse etmesini sağlıyordu. Bu fazlalık, güvenliğin daha fazla gelişmeyi mümkün kıldığı erdemli bir döngü yaratmıştır. Yanlış cevaplar yanlıştır çünkü: tarımsal üretim fazlası anında eşitlik yaratmamıştır (sosyal hiyerarşiler hala mevcuttur), gruplar arasındaki çatışmalar devam etmiştir ve mülkiyet sahipliği terk edilmek yerine daha önemli hale gelmiştir.
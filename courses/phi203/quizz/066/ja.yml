question: この章によれば、農業余剰生産の主な結果は何だったのか？
answer: 集団保護機能と社会制度の資金調達が可能になった。
wrong_answers:
  - それは社会のすべての構成員の間の即時の平等をもたらした。
  - それは、人間集団間の争いを完全になくすことを引き起こした。
  - その結果、あらゆる形態の所有権が放棄された。
explanation: |
  この章によれば、農業の余剰は、消費される以上の資源を生み出し、社会秩序を保証する集団的保護機能や制度を社会が賄うことを可能にしたため、極めて重要であった。この余剰は、安全がさらなる発展を可能にするという好循環を生み出した。なぜなら、余剰は直ちに平等を生み出さず（社会階層は依然として存在していた）、集団間の対立は存在し続け、財産所有は放棄されるどころか、むしろ重要性を増したからである。
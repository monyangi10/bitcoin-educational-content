question: Koja je bila glavna posledica viška poljoprivredne proizvodnje prema poglavlju?
answer: Omogućilo je finansiranje funkcija kolektivne zaštite i socijalnih institucija
wrong_answers:
  - To je dovelo do trenutne jednakosti između svih članova društva
  - To je izazvalo potpuno eliminisanje sukoba između ljudskih grupa
  - To je rezultiralo napuštanjem svih oblika vlasništva nad imovinom
explanation: |
  Prema poglavlju, poljoprivredni višak bio je ključan jer je generisao više resursa nego što je bilo potrošeno, što je omogućilo društvima da finansiraju kolektivne zaštitne funkcije i institucije koje su garantovale društveni poredak. Ovaj višak je stvorio vrlinski ciklus gde je sigurnost omogućila dalji razvoj. Pogrešni odgovori su netačni jer: višak nije stvorio trenutnu jednakost (društvene hijerarhije su i dalje postojale), sukobi između grupa su nastavili da postoje, a vlasništvo nad imovinom je zapravo postalo važnije umesto da bude napušteno.
question: Quelle est la principale conséquence de la production agricole excédentaire selon le chapitre ?
answer: Il a permis de financer des fonctions de protection collective et des institutions sociales
wrong_answers:
  - Elle a conduit à une égalité immédiate entre tous les membres de la société
  - Elle a provoqué l'élimination complète des conflits entre les groupes humains
  - Elle a entraîné l'abandon de toute forme de propriété
explanation: |
  Selon le chapitre, le surplus agricole est crucial car il génère plus de ressources qu'il n'en consomme, ce qui permet aux sociétés de financer les fonctions de protection collective et les institutions qui garantissent l'ordre social. Ce surplus a créé un cercle vertueux où la sécurité a permis de poursuivre le développement. Les mauvaises réponses sont incorrectes car : le surplus n'a pas créé une égalité immédiate (des hiérarchies sociales existaient toujours), les conflits entre groupes ont continué à exister, et la propriété est devenue plus importante au lieu d'être abandonnée.
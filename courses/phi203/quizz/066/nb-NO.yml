question: Hva var den viktigste konsekvensen av jordbrukets overskuddsproduksjon ifølge kapitlet?
answer: Det muliggjorde finansiering av kollektive beskyttelsesfunksjoner og sosiale institusjoner
wrong_answers:
  - Den førte til umiddelbar likestilling mellom alle medlemmer av samfunnet
  - Den førte til fullstendig eliminering av konflikter mellom menneskegrupper
  - Det resulterte i at alle former for eiendomsrett ble opphevet
explanation: |
  Ifølge kapittelet var jordbruksoverskuddet avgjørende fordi det genererte mer ressurser enn det som ble forbrukt, noe som gjorde det mulig for samfunnene å finansiere kollektive beskyttelsesfunksjoner og institusjoner som garanterte sosial orden. Dette overskuddet skapte en god sirkel der trygghet muliggjorde videre utvikling. De gale svarene er feil fordi: Overskuddet skapte ikke umiddelbar likhet (sosiale hierarkier eksisterte fortsatt), konflikter mellom grupper fortsatte å eksistere, og eiendomsretten ble faktisk viktigere i stedet for å bli avskaffet.
question: 이 장에 따르면 농업 과잉 생산의 주요 결과는 무엇인가요?
answer: 집단 보호 기능 및 사회 기관의 자금 조달을 가능하게 했습니다
wrong_answers:
  - 이는 모든 사회 구성원 간의 즉각적인 평등으로 이어졌습니다
  - 인간 집단 간의 갈등을 완전히 제거했습니다
  - 그 결과 모든 형태의 재산 소유권을 포기하게 되었습니다
explanation: |
  이 장에 따르면 농업 잉여는 소비되는 것보다 더 많은 자원을 생산하여 사회가 집단 보호 기능과 사회 질서를 보장하는 기관에 자금을 조달할 수 있게 해주었기 때문에 매우 중요했습니다. 이러한 잉여는 안보를 통해 더 많은 발전을 가능하게 하는 선순환 구조를 만들었습니다. 정답이 틀린 이유는 잉여가 즉각적인 평등을 창출하지 않았고(사회적 계급이 여전히 존재함), 집단 간의 갈등이 계속 존재했으며, 재산 소유권이 포기되기보다는 오히려 더 중요해졌기 때문입니다.
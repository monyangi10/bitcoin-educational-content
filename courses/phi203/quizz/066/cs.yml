question: Jaký byl podle kapitoly hlavní důsledek zemědělské nadprodukce?
answer: Umožnil financování funkcí kolektivní ochrany a sociálních institucí
wrong_answers:
  - Vedla k okamžitému zrovnoprávnění všech členů společnosti
  - Způsobila úplné odstranění konfliktů mezi lidskými skupinami
  - Vedla k opuštění všech forem vlastnictví
explanation: |
  Podle této kapitoly měl zemědělský přebytek zásadní význam, protože vytvářel více zdrojů, než se spotřebovalo, což umožnilo společnostem financovat funkce kolektivní ochrany a instituce, které zaručovaly společenský řád. Tento přebytek vytvářel příznivý cyklus, v němž bezpečnost umožňovala další rozvoj. Špatné odpovědi jsou nesprávné, protože: přebytek nevytvořil okamžitou rovnost (sociální hierarchie stále existovala), konflikty mezi skupinami nadále existovaly a vlastnictví se ve skutečnosti stalo důležitějším, než aby bylo opuštěno.
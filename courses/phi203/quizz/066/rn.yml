question: Ni ingaruka nyamukuru iyihe y’umwimbu w’amasaranganya y’uburimyi hakurikijwe ikigabane?
answer: Yatumye habaho ugufasha mu vy'amahera ibikorwa vy'uburinzi rusangi n'inzego z'imibano .
wrong_answers:
  - Vyatumye haba uburinganire ubwo nyene hagati y'abantu bose bo mu kibano .
  - Yatumye amakimbirane hagati y’imigwi y’abantu akurwaho burundu .
  - Vyatumye habaho uguheba uburyo bwose bwo kuba umutungo .
explanation: |
  Dushingiye ku kigabane, amasaranganya y’uburimyi yari ngirakamaro cane kuko yatuma habaho ubutunzi bwinshi kuruta ubwo bwakoreshwa, ivyo bikaba vyatuma amashirahamwe ashobora gufasha mu gutanga amahera y’ibikorwa vyo kurinda rusangi n’inzego zituma haba urutonde rw’imibano. Ivyo birengeye vyatumye haba uruziga rw’ingeso nziza aho umutekano watuma habaho iterambere ryinshi. Inyishu zitari zo ntizibereye kuko: ukurenga ntikwatumye haba uburinganire ubwo nyene (uburongozi bw’imibano bwari bukiriho), amakimbirane hagati y’imigwi yarabandanije kubaho, kandi mu vy’ukuri ubutunzi bwaciye buba ikintu gihambaye kuruta guheba.
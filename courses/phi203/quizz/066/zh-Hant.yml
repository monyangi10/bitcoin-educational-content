question: 根據本章所述，農業生產過剩的主要後果是什麼？
answer: 它能為集體保護功能和社會機構提供資金
wrong_answers:
  - 它導致社會所有成員間的立即平等
  - 它使人類族群間的衝突完全消失
  - 它導致所有形式的財產所有權被拋棄
explanation: |
  本章指出，農業盈餘非常重要，因為它所產生的資源多於所消耗的資源，讓社會得以資助集體保護功能和保證社會秩序的機構。這種盈餘創造了一個良性循環，安全使社會得以進一步發展。錯誤答案的原因是：盈餘並沒有立即創造平等（社會階級仍然存在），群體間的衝突仍然存在，而且財產所有權實際上變得更加重要，而不是被放棄。
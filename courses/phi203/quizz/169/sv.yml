question: Vad var den historiska kontrasten mellan 1700-talets attityder till utländska arbetare och modern protektionistisk politik?
answer: På 1700-talet var det vanligt att utlänningar accepterades i offentliga funktioner och i militärtjänst, medan moderna samhällen i allt högre grad begränsar sådana positioner till landets egna medborgare
wrong_answers:
  - På 1700-talet hindrades alla utländska arbetstagare från att arbeta i offentlig tjänst, medan moderna samhällen har antagit en politik med helt öppna gränser
  - På 1700-talet tilläts utländsk arbetskraft endast inom den privata sektorn, medan moderna samhällen föredrar utländsk arbetskraft på statliga befattningar
  - På 1700-talet förbjöds utländsk militärtjänst helt och hållet, medan moderna samhällen i hög grad förlitar sig på utländska legosoldater i sina arméer
explanation: |
  Kapitlet kontrasterar uttryckligen 1700-talets öppenhet, med exempel som minister Necker och schweiziska vakter i tjänst hos utländska regeringar, med moderna protektionistiska restriktioner för offentliga funktioner. Denna historiska förändring visar hur demokratiska krafter har främjat arbetarprotektionism och gått från en tid av relativ öppenhet till en tid där nationalitet blir ett hinder för anställning i offentlig tjänst, vilket återspeglar bredare protektionistiska tendenser i moderna demokratiska samhällen.
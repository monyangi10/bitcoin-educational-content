question: Mikä oli historiallinen kontrasti 1700-luvun asenteiden välillä ulkomaalaisia työntekijöitä kohtaan ja nykyaikaisen protektionistisen politiikan välillä?
answer: 1700-luvulla ulkomaalaiset hyväksyttiin yleisesti julkisiin tehtäviin ja asepalvelukseen, kun taas nyky-yhteiskunnat rajoittavat tällaiset tehtävät yhä useammin kansalaisiin
wrong_answers:
  - 1700-luvulla rajoitettiin kaikkien ulkomaalaisten työntekijöiden pääsy julkiseen palvelukseen, kun taas nyky-yhteiskunnat ovat ottaneet käyttöön täysin avoimia rajoja koskevan politiikan
  - 1700-luvulla ulkomaalaiset työntekijät sallittiin vain yksityisessä teollisuudessa, kun taas nyky-yhteiskunnat suosivat ulkomaalaisia työntekijöitä valtionhallinnon tehtävissä
  - 1700-luvulla ulkomainen asepalvelus kiellettiin kokonaan, kun taas nyky-yhteiskunnat turvautuvat armeijoissaan voimakkaasti ulkomaisiin palkkasotureihin
explanation: |
  Luvussa vastakkain asetetaan nimenomaisesti 1700-luvun avoimuus, josta esimerkkeinä mainitaan ministeri Necker ja ulkomaisia hallituksia palvelevat sveitsiläiset vartijat, ja nykyaikaiset protektionistiset rajoitukset julkisille toiminnoille. Tämä historiallinen muutos osoittaa, miten demokraattiset voimat ovat edistäneet työntekijöiden protektionismia siirtymällä suhteellisen avoimuuden aikakaudesta aikakauteen, jolloin kansalaisuudesta tulee este julkisessa palveluksessa työskentelylle, mikä heijastaa laajempia protektionistisia suuntauksia nykyaikaisissa demokraattisissa yhteiskunnissa.
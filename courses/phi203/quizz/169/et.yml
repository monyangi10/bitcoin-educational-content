question: Milline oli ajalooline kontrast 18. sajandi suhtumise vahel võõrtöölistesse ja tänapäeva protektsionistliku poliitika vahel?
answer: 18. sajandil aktsepteeriti välismaalasi üldjuhul avalikel ametikohtadel ja sõjaväeteenistuses, samas kui tänapäeva ühiskonnas on sellised ametikohad üha enam piiratud ainult kodanikele
wrong_answers:
  - 18. sajandil piirati kõigi võõrtööliste osalemist avalikus teenistuses, samas kui tänapäeva ühiskonnas on vastu võetud täielikult avatud piiride poliitika
  - 18. sajandil lubati võõrtööjõudu ainult eratööstuses, samas kui tänapäeva ühiskonnas eelistatakse võõrtööjõudu valitsemisaladel
  - 18. sajandil keelustati täielikult välisriigi sõjaväeteenistus, samas kui tänapäeva ühiskonnad toetuvad oma armees suuresti välisriigi palgasõduritele
explanation: |
  Peatükis vastandatakse selgesõnaliselt 18. sajandi avatust, tuues näiteid nagu minister Necker ja välisriikide valitsusi teenindavad Šveitsi valvurid, tänapäeva protektsionistlikele piirangutele avalike funktsioonide suhtes. See ajalooline nihe näitab, kuidas demokraatlikud jõud on soodustanud töötajate protektsionismi, liikudes suhtelise avatuse ajastust ajastusse, kus kodakondsus muutub takistuseks avalikus teenistuses töötamisel, mis peegeldab laiemaid protektsionistlikke suundumusi tänapäeva demokraatlikes ühiskondades.
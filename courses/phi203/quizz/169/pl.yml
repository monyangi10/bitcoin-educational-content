question: Jaki był historyczny kontrast między XVIII-wiecznym podejściem do zagranicznych pracowników a współczesną polityką protekcjonistyczną?
answer: W XVIII wieku powszechnie akceptowano obcokrajowców na stanowiskach publicznych i w służbie wojskowej, podczas gdy współczesne społeczeństwa coraz częściej ograniczają takie stanowiska do obywateli danego kraju
wrong_answers:
  - W XVIII wieku ograniczono dostęp do służby publicznej wszystkim zagranicznym pracownikom, podczas gdy współczesne społeczeństwa przyjęły politykę całkowicie otwartych granic
  - XVIII wiek zezwalał jedynie na zatrudnianie zagranicznych pracowników w przemyśle prywatnym, podczas gdy współczesne społeczeństwa preferują zagranicznych pracowników na stanowiskach rządowych
  - W XVIII wieku całkowicie zakazano zagranicznej służby wojskowej, podczas gdy współczesne społeczeństwa w dużej mierze polegają na zagranicznych najemnikach w swoich armiach
explanation: |
  Rozdział wyraźnie kontrastuje XVIII-wieczną otwartość, przytaczając przykłady takie jak minister Necker i szwajcarscy strażnicy służący obcym rządom, z nowoczesnymi protekcjonistycznymi ograniczeniami funkcji publicznych. Ta historyczna zmiana pokazuje, w jaki sposób siły demokratyczne promowały protekcjonizm pracowników, przechodząc od epoki względnej otwartości do epoki, w której narodowość staje się barierą dla zatrudnienia w służbie publicznej, odzwierciedlając szersze tendencje protekcjonistyczne we współczesnych społeczeństwach demokratycznych.
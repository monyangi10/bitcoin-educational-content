question: Sự khác biệt về mặt lịch sử giữa thái độ đối với người lao động nước ngoài trong thế kỷ 18 và các chính sách bảo hộ hiện đại là gì?
answer: Vào thế kỷ 18, người nước ngoài thường được chấp nhận đảm nhiệm các chức vụ công và phục vụ trong quân đội, trong khi các xã hội hiện đại ngày càng hạn chế những vị trí này chỉ dành cho công dân trong nước.
wrong_answers:
  - Thế kỷ 18 hạn chế tất cả lao động nước ngoài tham gia vào các dịch vụ công, trong khi các xã hội hiện đại đã áp dụng chính sách biên giới mở hoàn toàn.
  - Vào thế kỷ 18, người lao động nước ngoài chỉ được phép làm việc trong khu vực tư nhân, trong khi các xã hội hiện đại lại ưu tiên người lao động nước ngoài làm việc trong các vị trí thuộc chính phủ.
  - Thế kỷ 18 đã cấm hoàn toàn việc phục vụ quân sự ở nước ngoài, trong khi các xã hội hiện đại lại phụ thuộc rất nhiều vào lính đánh thuê nước ngoài trong quân đội của họ.
explanation: |
  Chương này so sánh rõ ràng sự cởi mở của thế kỷ 18, dẫn chứng các ví dụ như Bộ trưởng Necker và đội cận vệ Thụy Sĩ phục vụ các chính phủ nước ngoài, với những hạn chế bảo hộ hiện đại đối với các chức năng công. Sự chuyển dịch lịch sử này cho thấy các lực lượng dân chủ đã thúc đẩy chủ nghĩa bảo hộ người lao động như thế nào, chuyển từ một kỷ nguyên tương đối cởi mở sang một kỷ nguyên mà quốc tịch trở thành rào cản đối với việc làm trong khu vực công, phản ánh xu hướng bảo hộ rộng rãi hơn trong các xã hội dân chủ hiện đại.
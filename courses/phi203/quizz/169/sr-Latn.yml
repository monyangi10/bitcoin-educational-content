question: Kakva je bila istorijska razlika između stavova prema stranim radnicima u 18. veku i savremenih protekcionističkih politika?
answer: U 18. veku stranci su bili opšteprihvaćeni u javnim funkcijama i vojnoj službi, dok moderna društva sve više ograničavaju takve pozicije na državljane.
wrong_answers:
  - U 18. veku svi strani radnici bili su isključeni iz javne službe, dok su moderne društva usvojila politiku potpuno otvorenih granica.
  - U 18. veku su bili dozvoljeni samo strani radnici u privatnoj industriji, dok moderna društva preferiraju strane radnike na državnim pozicijama.
  - 18. vek je potpuno zabranio stranu vojnu službu, dok se moderna društva u velikoj meri oslanjaju na strane plaćenike u svojim vojskama.
explanation: |
  Poglavlje eksplicitno kontrastira otvorenost 18. veka, navodeći primere kao što su ministar Necker i švajcarski gardisti koji služe stranim vladama, sa modernim protekcionističkim ograničenjima na javne funkcije. Ova istorijska promena pokazuje kako su demokratske snage promovisale protekcionizam radnika, prelazeći iz ere relativne otvorenosti u onu gde nacionalnost postaje prepreka za zapošljavanje u javnoj službi, odražavajući šire protekcionističke tendencije u modernim demokratskim društvima.
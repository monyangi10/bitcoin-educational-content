question: Was war der historische Kontrast zwischen der Haltung gegenüber ausländischen Arbeitskräften im 18. Jahrhundert und der modernen protektionistischen Politik?
answer: Im 18. Jahrhundert war es üblich, Ausländer in öffentlichen Funktionen und im Militärdienst zu akzeptieren, während moderne Gesellschaften diese Positionen zunehmend auf Staatsangehörige beschränken
wrong_answers:
  - Im 18. Jahrhundert waren alle ausländischen Arbeitnehmer vom öffentlichen Dienst ausgeschlossen, während moderne Gesellschaften eine Politik der offenen Grenzen verfolgen
  - Im 18. Jahrhundert waren ausländische Arbeitnehmer nur in der Privatwirtschaft zugelassen, während moderne Gesellschaften ausländische Arbeitnehmer in staatlichen Positionen bevorzugen
  - Im 18. Jahrhundert war der ausländische Militärdienst gänzlich verboten, während moderne Gesellschaften in ihren Armeen in hohem Maße auf ausländische Söldner angewiesen sind
explanation: |
  Das Kapitel stellt ausdrücklich die Offenheit des 18. Jahrhunderts, mit Beispielen wie Minister Necker und Schweizer Gardisten im Dienste ausländischer Regierungen, den modernen protektionistischen Beschränkungen öffentlicher Funktionen gegenüber. Dieser historische Wandel zeigt, wie demokratische Kräfte den Arbeitnehmerprotektionismus gefördert haben, indem sie von einer Ära der relativen Offenheit zu einer Ära übergingen, in der die Nationalität zu einem Hindernis für die Beschäftigung im öffentlichen Dienst wurde, was allgemeinere protektionistische Tendenzen in modernen demokratischen Gesellschaften widerspiegelt.
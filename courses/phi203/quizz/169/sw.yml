question: Tofauti ya kihistoria kati ya mitazamo ya karne ya 18 kuhusu wafanyakazi wa kigeni na sera za kisasa za ulinzi ilikuwa ipi?
answer: Karne ya 18 kwa kawaida iliwakubali wageni katika shughuli za umma na huduma za kijeshi, huku jamii za kisasa zikizidi kuwawekea mipaka nafasi hizo raia
wrong_answers:
  - Karne ya 18 iliwazuia wafanyakazi wote wa kigeni kutoka kwa huduma ya umma, huku jamii za kisasa zikipitisha sera kamili za mipaka iliyo wazi
  - Karne ya 18 iliruhusu wafanyakazi wa kigeni katika sekta binafsi pekee, huku jamii za kisasa zikipendelea wafanyakazi wa kigeni katika nafasi za serikali.
  - Karne ya 18 ilipiga marufuku kabisa huduma ya kijeshi ya kigeni, huku jamii za kisasa zikiwategemea sana mamluki wa kigeni katika majeshi yao.
explanation: |
  Sura hiyo inatofautisha waziwazi uwazi wa karne ya 18, ikitoa mifano kama vile Waziri Necker na walinzi wa Uswisi wanaohudumia serikali za kigeni, na vikwazo vya kisasa vya ulinzi dhidi ya kazi za umma. Mabadiliko haya ya kihistoria yanaonyesha jinsi vikosi vya kidemokrasia vimekuza ulinzi wa wafanyakazi, vikihama kutoka enzi ya uwazi wa jamaa hadi enzi ambapo utaifa unakuwa kikwazo kwa ajira katika utumishi wa umma, ikionyesha mielekeo mipana ya ulinzi katika jamii za kidemokrasia za kisasa.
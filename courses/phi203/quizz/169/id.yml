question: Apa perbedaan historis antara sikap abad ke-18 terhadap pekerja asing dan kebijakan proteksionis modern?
answer: Abad ke-18 umumnya menerima orang asing dalam jabatan publik dan dinas militer, sementara masyarakat modern semakin membatasi posisi tersebut untuk warga negara
wrong_answers:
  - Abad ke-18 membatasi semua pekerja asing dari layanan publik, sementara masyarakat modern telah mengadopsi kebijakan perbatasan terbuka sepenuhnya
  - Abad ke-18 hanya mengizinkan pekerja asing di industri swasta, sementara masyarakat modern lebih memilih pekerja asing di posisi pemerintahan
  - Abad ke-18 melarang dinas militer asing sepenuhnya, sementara masyarakat modern sangat bergantung pada tentara bayaran asing dalam pasukan mereka
explanation: |
  Bab ini secara eksplisit membandingkan keterbukaan abad ke-18, dengan mengutip contoh-contoh seperti Menteri Necker dan pengawal Swiss yang melayani pemerintah asing, dengan pembatasan proteksionisme modern terhadap fungsi-fungsi publik. Pergeseran sejarah ini menunjukkan bagaimana kekuatan-kekuatan demokratis telah mendorong proteksionisme pekerja, beralih dari era keterbukaan relatif ke era di mana kewarganegaraan menjadi penghalang untuk bekerja di layanan publik, yang mencerminkan kecenderungan proteksionisme yang lebih luas dalam masyarakat demokratis modern.
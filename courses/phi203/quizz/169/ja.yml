question: 18世紀の外国人労働者に対する態度と、現代の保護主義政策との歴史的対比とは？
answer: 18世紀には、外国人を公職や軍務に就かせることが一般的であったが、現代社会では、そのような地位はますます国民に限定されるようになっている。
wrong_answers:
  - 18世紀には、すべての外国人労働者が公務に就くことを制限していたが、現代社会は完全な国境開放政策を採用している。
  - 18世紀は民間企業でしか外国人労働者を認めなかったが、現代社会では政府職で外国人労働者が好まれる。
  - 18世紀には外国人傭兵を全面的に禁止したが、現代社会は外国人傭兵に大きく依存している。
explanation: |
  この章では、ネッケル大臣や外国政府に仕えるスイス人衛兵のような例を挙げながら、18世紀の開放性と現代の保護主義的な公的職務の制限とを明確に対比させている。この歴史的変遷は、民主主義の力がいかに労働者保護主義を促進し、相対的な開放性の時代から、近代民主主義社会におけるより広範な保護主義的傾向を反映し、国籍が公共サービスにおける雇用の障壁となる時代へと移行したかを示している。
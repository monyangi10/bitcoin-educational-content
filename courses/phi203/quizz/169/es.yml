question: ¿Cuál fue el contraste histórico entre las actitudes del siglo XVIII hacia los trabajadores extranjeros y las políticas proteccionistas modernas?
answer: En el siglo XVIII se aceptaba a los extranjeros en funciones públicas y en el servicio militar, mientras que las sociedades modernas restringen cada vez más esos puestos a los nacionales
wrong_answers:
  - En el siglo XVIII se restringía el acceso de todos los trabajadores extranjeros a la función pública, mientras que las sociedades modernas han adoptado políticas de fronteras completamente abiertas
  - En el siglo XVIII sólo se admitían trabajadores extranjeros en la industria privada, mientras que las sociedades modernas prefieren trabajadores extranjeros en puestos gubernamentales
  - En el siglo XVIII se prohibió totalmente el servicio militar extranjero, mientras que las sociedades modernas recurren en gran medida a mercenarios extranjeros en sus ejércitos
explanation: |
  El capítulo contrasta explícitamente la apertura del siglo XVIII, citando ejemplos como el ministro Necker y los guardias suizos al servicio de gobiernos extranjeros, con las modernas restricciones proteccionistas de las funciones públicas. Este cambio histórico demuestra cómo las fuerzas democráticas han fomentado el proteccionismo de los trabajadores, pasando de una época de relativa apertura a otra en la que la nacionalidad se convierte en una barrera para el empleo en la función pública, reflejando tendencias proteccionistas más amplias en las sociedades democráticas modernas.
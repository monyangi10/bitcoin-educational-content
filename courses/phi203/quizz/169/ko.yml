question: 외국인 노동자에 대한 18세기의 태도와 현대의 보호주의 정책 사이에는 어떤 역사적 대조가 있었나요?
answer: 18세기에는 일반적으로 외국인을 공직과 군 복무에 받아들였지만, 현대 사회는 점점 더 이러한 직책을 내국인으로 제한하고 있습니다
wrong_answers:
  - 18세기에는 모든 외국인 노동자의 공직 진출을 제한했지만, 현대 사회는 완전한 국경 개방 정책을 채택했습니다
  - 18세기에는 민간 산업에서만 외국인 노동자를 허용했지만, 현대 사회는 정부 직책에서 외국인 노동자를 선호합니다
  - 18세기에는 외국인 병역이 전면 금지되었지만, 현대 사회는 군대에서 외국 용병에 크게 의존하고 있습니다
explanation: |
  이 장에서는 네커 장관과 외국 정부에 복무하는 스위스 경비병과 같은 사례를 들며 18세기의 개방성과 공공 기능에 대한 현대의 보호주의적 제한을 명시적으로 대조합니다. 이러한 역사적 변화는 민주주의 세력이 어떻게 노동자 보호주의를 장려해 왔는지, 상대적 개방의 시대에서 국적이 공직 고용의 장벽이 되는 시대로 이동하면서 현대 민주주의 사회의 광범위한 보호주의 경향을 반영하고 있습니다.
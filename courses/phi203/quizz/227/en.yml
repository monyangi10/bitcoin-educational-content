question: Why does the text argue that a repressive system is superior to a preventive system when implementing freedom of work?
answer: A repressive system sanctions actual abuses and real violations of others' rights rather than restricting everyone's activity in advance
wrong_answers:
  - A preventive system generates more efficient compliance by screening candidates before they enter the market, reducing the overall need for sanctions
  - A repressive system allows for better coordination between different professional sectors through centralized oversight and control mechanisms
  - A repressive system generates more tax revenue for public services by imposing fines and penalties on those who violate regulations
explanation: |
  The text explicitly states that recognizing freedom of work means admitting the superiority of the repressive system, which sanctions real abuses and effective violations of others' rights, over the preventive system that hinders everyone's activity a priori. The preventive system establishes guardianship over all people in a profession under the pretext that some individuals might commit abuses, while the repressive system only acts when actual harm occurs. This approach respects individual liberty by not restricting everyone based on hypothetical future violations, instead addressing only concrete wrongdoing when it actually happens.

question: Koja je osnovna promena razlikovala rane poljoprivredne zajednice od lovačko-sakupljačkih društava?
answer: Oni su stvorili višak proizvodnje umesto da samo izvlače resurse iz svoje okoline.
wrong_answers:
  - Razvili su pisani jezik i formalne obrazovne sisteme za svoje stanovništvo.
  - Oni su uspostavili demokratske vlade sa izabranim liderima i predstavničkim skupštinama.
  - Izgradili su trajne kamene strukture i razvili napredne tehnike metalurgije.
explanation: |
  Tačan odgovor identifikuje ključnu ekonomsku transformaciju sa ekstrakcije na proizvodnju. Rane poljoprivredne zajednice su revolucionisale ljudski razvoj generisanjem viška kroz poljoprivredu i stočarstvo, stvarajući više resursa nego što su trošile. Ovo je u kontrastu sa lovačko-sakupljačkim društvima koja su se oslanjala na ekonomije destrukcije - uzimajući postojeće resurse kroz lov, ribolov i sakupljanje bez stvaranja novog bogatstva. Pogrešni odgovori opisuju razvoj koji je došao mnogo kasnije u ljudskoj istoriji i nisu bili osnovni faktor razlikovanja između ovih ranih tipova društava.
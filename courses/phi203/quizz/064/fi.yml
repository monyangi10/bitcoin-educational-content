question: Mikä perustavanlaatuinen muutos erotti varhaiset maatalousyhteiskunnat metsästäjä-keräilijä-yhteiskunnista?
answer: Ne loivat ylijäämätuotantoa sen sijaan, että ne vain louhisivat resursseja ympäristöstään
wrong_answers:
  - Ne kehittivät kirjakielen ja viralliset koulutusjärjestelmät väestöjään varten
  - He perustivat demokraattisia hallituksia, joissa oli vaaleilla valitut johtajat ja edustukselliset edustajakokoukset
  - He rakensivat pysyviä kivirakenteita ja kehittivät kehittyneitä metallurgisia tekniikoita
explanation: |
  Oikea vastaus yksilöi keskeisen taloudellisen muutoksen louhinnasta tuotantoon. Varhaiset maatalousyhteiskunnat mullistivat ihmiskunnan kehityksen tuottamalla ylijäämää maanviljelyn ja karjankasvatuksen avulla ja luomalla enemmän resursseja kuin ne kuluttivat. Tämä on vastakohta metsästäjä-keräilijä-yhteiskunnille, jotka nojasivat tuhoutumistalouteen - ottivat olemassa olevia resursseja metsästyksen, kalastuksen ja keräilyn avulla luomatta uutta vaurautta. Väärät vastaukset kuvaavat kehitystä, joka tapahtui paljon myöhemmin ihmiskunnan historiassa ja joka ei ollut perustavanlaatuinen erottava tekijä näiden varhaisten yhteiskuntatyyppien välillä.
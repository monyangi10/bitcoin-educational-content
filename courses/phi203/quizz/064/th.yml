question: การเปลี่ยนแปลงพื้นฐานอะไรที่ทำให้สังคมเกษตรกรรมยุคแรกแตกต่างจากสังคมนักล่า-รวบรวมอาหาร?
answer: พวกเขาสร้างการผลิตส่วนเกินแทนที่จะเพียงแค่สกัดทรัพยากรจากสิ่งแวดล้อมของพวกเขา
wrong_answers:
  - พวกเขาได้พัฒนาภาษาเขียนและระบบการศึกษาอย่างเป็นทางการสำหรับประชากรของพวกเขา
  - พวกเขาได้จัดตั้งรัฐบาลประชาธิปไตยที่มีผู้นำที่ได้รับการเลือกตั้งและสภาผู้แทนราษฎร
  - พวกเขาสร้างโครงสร้างหินถาวรและพัฒนาเทคนิคการโลหะวิทยาขั้นสูง
explanation: |
  คำตอบที่ถูกต้องระบุถึงการเปลี่ยนแปลงทางเศรษฐกิจที่สำคัญจากการสกัดไปสู่การผลิต สังคมเกษตรกรรมยุคแรกปฏิวัติการพัฒนามนุษย์โดยการสร้างส่วนเกินผ่านการทำฟาร์มและปศุสัตว์ สร้างทรัพยากรมากกว่าที่พวกเขาบริโภค ซึ่งแตกต่างจากสังคมนักล่า-รวบรวมที่พึ่งพาเศรษฐกิจการทำลายล้าง - การนำทรัพยากรที่มีอยู่ผ่านการล่าสัตว์ การตกปลา และการรวบรวมโดยไม่สร้างความมั่งคั่งใหม่ คำตอบที่ผิดอธิบายถึงการพัฒนาที่เกิดขึ้นในภายหลังในประวัติศาสตร์มนุษย์และไม่ใช่ปัจจัยที่แตกต่างพื้นฐานระหว่างประเภทสังคมยุคแรกเหล่านี้
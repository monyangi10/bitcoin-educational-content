question: What fundamental change distinguished early agricultural societies from hunter-gatherer societies?
answer: They created surplus production rather than just extracting resources from their environment
wrong_answers:
  - They developed written language and formal education systems for their populations
  - They established democratic governments with elected leaders and representative assemblies
  - They built permanent stone structures and developed advanced metallurgy techniques
explanation: |
  The correct answer identifies the key economic transformation from extraction to production. Early agricultural societies revolutionized human development by generating surplus through farming and livestock, creating more resources than they consumed. This contrasts with hunter-gatherer societies that relied on destruction economies - taking existing resources through hunting, fishing, and gathering without creating new wealth. The wrong answers describe developments that came much later in human history and were not the fundamental distinguishing factor between these early societal types.
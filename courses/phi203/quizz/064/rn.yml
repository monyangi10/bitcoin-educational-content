question: Ni ihinduka irihe ry’ishimikiro ryatandukanije imibano ya kera y’abarimyi n’imibano y’abahigi n’abakoranirizi?
answer: Bararemye umusaruro w'inyongera aho gukura gusa ubutunzi mu bidukikije vyabo .
wrong_answers:
  - Bateguye ururimi rwanditswe n'uburyo bwo kwigisha abantu babo .
  - Bashinze intwaro za demokarasi zifise abarongozi batowe n’inama ziserukira abandi .
  - Barubatse ibibanza vy’amabuye bihoraho bongera barategura ubuhinga buteye imbere bwo gukora ivyuma .
explanation: |
  Inyishu ibereye yerekana ihinduka ry’ubutunzi ry’ingenzi kuva ku gukura gushika ku guhingura. Imiryango ya kera y’uburimyi yarahinduye cane iterambere ry’abantu mu gutuma habaho amasaranganya biciye mu kurima no mu matungo, bituma habaho ubutunzi bwinshi kuruta ubwo bakoresha. Ivyo bitandukanye n’imiryango y’abahigi n’abanyaruyeri yizigiye ubutunzi bwo gusenyura - gufata ubutunzi bwariho biciye mu guhigira, kuroba, no kwegeranya ata butunzi bushasha bushizeho. Inyishu zitari zo zidondora ibintu vyabaye mu nyuma cane mu mateka y’abantu kandi ntivyari ikintu nyamukuru catandukanya abo bantu bo mu ntango.
question: Jaka fundamentalna zmiana odróżniała wczesne społeczeństwa rolnicze od społeczeństw łowiecko-zbierackich?
answer: Tworzyli nadwyżki produkcyjne, zamiast po prostu wydobywać zasoby ze swojego środowiska
wrong_answers:
  - Rozwinęły one język pisany i formalne systemy edukacji dla swoich populacji
  - Ustanowili demokratyczne rządy z wybranymi przywódcami i zgromadzeniami przedstawicielskimi
  - Zbudowali trwałe kamienne struktury i opracowali zaawansowane techniki metalurgiczne
explanation: |
  Prawidłowa odpowiedź identyfikuje kluczową transformację gospodarczą od wydobycia do produkcji. Wczesne społeczeństwa rolnicze zrewolucjonizowały rozwój ludzkości, generując nadwyżki dzięki rolnictwu i hodowli, tworząc więcej zasobów niż konsumowały. Kontrastuje to ze społeczeństwami łowiecko-zbierackimi, które opierały się na gospodarce destrukcji - wykorzystując istniejące zasoby poprzez polowanie, rybołówstwo i zbieractwo bez tworzenia nowego bogactwa. Błędne odpowiedzi opisują rozwój, który nastąpił znacznie później w historii ludzkości i nie był podstawowym czynnikiem wyróżniającym te wczesne typy społeczeństw.
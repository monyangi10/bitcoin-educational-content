question: 초기 농경 사회가 수렵 채집 사회와 구별되는 근본적인 변화는 무엇일까요?
answer: 환경으로부터 자원을 추출하는 데 그치지 않고 잉여 생산을 창출했습니다
wrong_answers:
  - 그들은 인구를 위한 문자 언어와 공식 교육 시스템을 개발했습니다
  - 그들은 선출된 지도자와 대표 의회가 있는 민주 정부를 세웠습니다
  - 그들은 영구적인 석조 구조물을 건설하고 첨단 야금 기술을 개발했습니다
explanation: |
  정답은 채취에서 생산으로의 주요 경제 변화를 나타냅니다. 초기 농업 사회는 농경과 가축 사육을 통해 잉여 자원을 창출하여 소비보다 더 많은 자원을 생산함으로써 인류 발전에 혁명을 일으켰습니다. 이는 새로운 부를 창출하지 않고 사냥, 낚시, 채집을 통해 기존 자원을 취하는 파괴 경제에 의존했던 수렵 채집 사회와 대조됩니다. 오답은 인류 역사에서 훨씬 나중에 발생한 발전을 설명하는 것으로, 이러한 초기 사회 유형을 근본적으로 구분하는 요소는 아닙니다.
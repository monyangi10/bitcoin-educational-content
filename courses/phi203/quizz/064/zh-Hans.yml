question: 早期农业社会区别于狩猎采集社会的根本变化是什么？
answer: 他们创造了剩余生产，而不仅仅是从环境中攫取资源
wrong_answers:
  - 他们为本国人民发展了书面语言和正规教育系统
  - 他们建立了由选举产生的领导人和代议制议会组成的民主政府
  - 他们建造了永久性的石头建筑，发展了先进的冶金技术
explanation: |
  正确答案指出了从开采到生产的关键经济转型。早期的农业社会通过耕作和畜牧产生剩余，创造的资源多于消耗的资源，从而彻底改变了人类的发展。这与狩猎采集社会形成了鲜明对比，后者依靠破坏经济--通过狩猎、捕鱼和采集获取现有资源，而不创造新的财富。错误答案描述的是人类历史上更晚时期的发展，并不是区分这些早期社会类型的根本因素。
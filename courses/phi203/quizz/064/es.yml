question: ¿Qué cambio fundamental distinguió a las primeras sociedades agrícolas de las cazadoras-recolectoras?
answer: Crearon excedentes de producción en lugar de limitarse a extraer recursos de su entorno
wrong_answers:
  - Desarrollaron la lengua escrita y sistemas de educación formal para sus poblaciones
  - Establecieron gobiernos democráticos con dirigentes elegidos y asambleas representativas
  - Construyeron estructuras permanentes de piedra y desarrollaron técnicas avanzadas de metalurgia
explanation: |
  La respuesta correcta identifica la transformación económica clave de la extracción a la producción. Las primeras sociedades agrícolas revolucionaron el desarrollo humano al generar excedentes mediante la agricultura y la ganadería, creando más recursos de los que consumían. Esto contrasta con las sociedades cazadoras-recolectoras, que se basaban en economías de destrucción, es decir, en el aprovechamiento de los recursos existentes mediante la caza, la pesca y la recolección sin crear nueva riqueza. Las respuestas incorrectas describen desarrollos que se produjeron mucho más tarde en la historia de la humanidad y que no fueron el factor distintivo fundamental entre estos primeros tipos de sociedad.
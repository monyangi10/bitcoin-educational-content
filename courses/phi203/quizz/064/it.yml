question: Quale cambiamento fondamentale ha distinto le prime società agricole da quelle di cacciatori-raccoglitori?
answer: Hanno creato un surplus di produzione piuttosto che limitarsi a estrarre risorse dall'ambiente circostante
wrong_answers:
  - Hanno sviluppato una lingua scritta e sistemi di istruzione formale per le loro popolazioni
  - Hanno istituito governi democratici con leader eletti e assemblee rappresentative
  - Costruirono strutture permanenti in pietra e svilupparono tecniche avanzate di metallurgia
explanation: |
  La risposta corretta identifica la trasformazione economica chiave dall'estrazione alla produzione. Le prime società agricole hanno rivoluzionato lo sviluppo umano generando un surplus attraverso l'agricoltura e l'allevamento, creando più risorse di quante ne consumassero. Questo contrasta con le società di cacciatori-raccoglitori, che si basavano su economie di distruzione, ovvero sull'utilizzo delle risorse esistenti attraverso la caccia, la pesca e la raccolta, senza creare nuova ricchezza. Le risposte sbagliate descrivono sviluppi che si sono verificati molto più tardi nella storia dell'umanità e che non sono stati il fattore distintivo fondamentale tra questi primi tipi di società.
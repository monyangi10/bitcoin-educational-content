question: نظریه اقتصادی لیبرال به عنوان دلیل اصلی اینکه چرا درگیری‌ها در قرون ۱۵ و ۱۶ کمتر به جوامع دوردست آسیب اقتصادی می‌زدند در مقایسه با زمان‌های مدرن، به وابستگی کمتر اقتصادی بین کشورها اشاره می‌کند. در آن زمان، اقتصادها بیشتر خودکفا بودند و تجارت بین‌المللی به اندازه امروز گسترده و پیچیده نبود، بنابراین تأثیر درگیری‌ها بر اقتصاد جهانی محدودتر بود.
answer: جوامع در خودکفایی نسبی با حوزه‌های تبادل محدود زندگی می‌کردند، که آن‌ها را کمتر در معرض اختلالات دوردست قرار می‌داد.
wrong_answers:
  - فناوری نظامی کمتر مخرب بود، بنابراین درگیری‌ها باعث اختلال اقتصادی کمتری در شبکه‌های تجاری می‌شدند.
  - قوانین بین‌المللی در قرون گذشته حفاظت بهتری برای شرکای تجاری بی‌طرف در طول درگیری‌ها فراهم می‌کرد.
  - هزینه‌های حمل و نقل در دوره‌های قبلی پایین‌تر بود و این امر یافتن شرکای تجاری جایگزین در زمان جنگ را آسان‌تر می‌کرد.
explanation: |
  بر اساس نظریه هماهنگی منافع، درگیری‌های قرون ۱۵ و ۱۶ تأثیر کمی بر جوامع دوردست داشتند زیرا وابستگی اقتصادی محدود بود. جوامع عمدتاً خودکفا بودند و شبکه‌های مبادله به لحاظ جغرافیایی محدود بودند. وابستگی متقابل جهانی مدرن به این معناست که هرگونه اختلال در هر نقطه‌ای بر زنجیره مبادله جهانی تأثیر می‌گذارد و درگیری‌ها را برای همه شرکت‌کنندگان در اقتصاد جهانی، حتی کشورهای غیرمتخاصم، به طور فزاینده‌ای پرهزینه می‌کند.
question: 자유주의 경제 이론은 15~16세기 원거리 사회에서 분쟁이 현대에 비해 경제적 피해가 적었던 주요 원인으로 무엇을 꼽고 있나요?
answer: 교류 영역이 제한적인 상대적 자급자족 사회는 먼 곳의 혼란에 덜 취약했습니다
wrong_answers:
  - 군사 기술은 덜 파괴적이었기 때문에 분쟁으로 인한 무역 네트워크의 경제적 혼란은 최소화되었습니다
  - 국제법은 초기 세기의 분쟁에서 중립적인 무역 파트너를 더 잘 보호했습니다
  - 초기에는 운송 비용이 낮았기 때문에 전쟁 중 대체 거래 파트너를 찾기가 더 쉬웠습니다
explanation: |
  이해관계의 조화 이론에 따르면 15~16세기의 분쟁은 경제적 상호의존이 제한적이었기 때문에 먼 거리에 있는 사회에 미치는 영향이 미미했습니다. 사회는 대체로 자급자족했고 교류 네트워크는 지리적으로 제한되어 있었습니다. 현대의 글로벌 상호의존성은 어느 한 곳의 혼란이 전 세계 교류망에 영향을 미치기 때문에 분쟁은 교전국이 아닌 국가를 포함한 세계 경제의 모든 참여자에게 점점 더 큰 비용을 초래하고 있습니다.
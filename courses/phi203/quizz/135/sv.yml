question: Vilken är enligt liberal ekonomisk teori den främsta orsaken till att konflikter var mindre ekonomiskt skadliga för avlägsna samhällen på 15-1600-talet jämfört med i modern tid?
answer: Samhällena levde i relativ självförsörjning med begränsade utbytesområden, vilket gjorde dem mindre sårbara för störningar långt borta
wrong_answers:
  - Militärtekniken var mindre destruktiv, så konflikterna orsakade minimal ekonomisk störning i handelsnätverken
  - Internationell rätt gav bättre skydd för neutrala handelspartner under konflikter under tidigare århundraden
  - Transportkostnaderna var lägre under tidigare perioder, vilket gjorde det lättare att hitta alternativa handelspartner under krig
explanation: |
  Enligt teorin om harmoni mellan intressen hade konflikter under 15-1600-talen minimal inverkan på avlägsna samhällen eftersom det ekonomiska ömsesidiga beroendet var begränsat. Samhällena var i stort sett självförsörjande och utbytesnätverken var geografiskt begränsade. Det moderna globala ömsesidiga beroendet innebär att varje störning någonstans påverkar den världsomspännande utbyteskedjan, vilket gör konflikter alltmer kostsamma för alla deltagare i den globala ekonomin, även icke krigförande nationer.
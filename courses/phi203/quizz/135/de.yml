question: Was ist nach der liberalen Wirtschaftstheorie der Hauptgrund dafür, dass Konflikte im 15. und 16. Jahrhundert für weit entfernte Gesellschaften wirtschaftlich weniger schädlich waren als in der Neuzeit?
answer: Gesellschaften lebten in relativer Autarkie mit begrenzten Tauschräumen, was sie weniger anfällig für Störungen aus der Ferne machte
wrong_answers:
  - Die Militärtechnologie war weniger zerstörerisch, so dass die Konflikte nur minimale wirtschaftliche Störungen der Handelsnetze verursachten
  - Das internationale Recht hat in früheren Jahrhunderten neutrale Handelspartner bei Konflikten besser geschützt
  - Die Transportkosten waren in früheren Zeiten niedriger, so dass es einfacher war, in Kriegszeiten alternative Handelspartner zu finden
explanation: |
  Nach der Theorie der Interessenharmonie hatten Konflikte im 15. und 16. Jahrhundert nur geringe Auswirkungen auf weit entfernte Gesellschaften, da die wirtschaftliche Verflechtung begrenzt war. Die Gesellschaften waren weitgehend autark, und die Austauschnetze waren geografisch begrenzt. Die moderne globale Interdependenz bedeutet, dass sich jede Störung irgendwo auf die weltweite Austauschkette auswirkt, so dass Konflikte für alle Teilnehmer an der Weltwirtschaft, auch für nicht kriegführende Nationen, immer kostspieliger werden.
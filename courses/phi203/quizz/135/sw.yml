question: Nadharia ya uchumi huria inabainisha nini kama sababu kuu kwa nini migogoro haikuwa na madhara makubwa kiuchumi kwa jamii za mbali katika karne ya 15-16 ikilinganishwa na nyakati za kisasa?
answer: Jamii ziliishi kwa kujitosheleza kwa kiasi fulani na nyanja chache za ubadilishanaji, na kuzifanya zisiweze kuathiriwa na usumbufu wa mbali.
wrong_answers:
  - Teknolojia ya kijeshi haikuwa na uharibifu mwingi, kwa hivyo migogoro ilisababisha usumbufu mdogo wa kiuchumi kwa mitandao ya biashara
  - Sheria za kimataifa zilitoa ulinzi bora kwa washirika wa biashara wasioegemea upande wowote wakati wa migogoro katika karne za awali
  - Gharama za usafiri zilikuwa chini katika vipindi vya awali, na hivyo kurahisisha kupata washirika mbadala wa biashara wakati wa vita
explanation: |
  Kulingana na nadharia ya maelewano ya maslahi, migogoro katika karne ya 15-16 ilikuwa na athari ndogo kwa jamii za mbali kwa sababu utegemezi wa kiuchumi ulikuwa mdogo. Jamii zilikuwa zikijitegemea kwa kiasi kikubwa na mitandao ya kubadilishana ilikuwa imewekewa mipaka kijiografia. Utegemezi wa kimataifa wa kisasa unamaanisha usumbufu wowote mahali popote unaathiri mnyororo wa kubadilishana duniani kote, na kufanya migogoro kuwa ghali zaidi kwa washiriki wote katika uchumi wa dunia, hata mataifa yasiyopigana.
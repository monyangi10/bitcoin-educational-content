question: Что либеральная экономическая теория называет главной причиной того, что в XV-XVI веках конфликты наносили меньший экономический ущерб отдаленным обществам по сравнению с современностью?
answer: Общества жили в условиях относительной самодостаточности с ограниченными сферами обмена, что делало их менее уязвимыми перед удаленными потрясениями
wrong_answers:
  - Военные технологии были менее разрушительными, поэтому конфликты приводили к минимальным экономическим нарушениям в торговых сетях
  - Международное право обеспечивало более надежную защиту нейтральных торговых партнеров во время конфликтов в предыдущие века
  - В более ранние периоды транспортные расходы были ниже, что облегчало поиск альтернативных торговых партнеров во время войн
explanation: |
  Согласно теории гармонии интересов, конфликты в XV-XVI веках оказывали минимальное влияние на отдаленные общества, поскольку экономическая взаимозависимость была ограниченной. Общества были в значительной степени самодостаточны, а сети обмена были географически ограничены. Современная глобальная взаимозависимость означает, что любой сбой в любой точке мира влияет на всемирную цепь обмена, делая конфликты все более дорогостоящими для всех участников глобальной экономики, даже для невоюющих стран.
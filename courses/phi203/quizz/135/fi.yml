question: Mikä on liberaalin talousteorian mukaan tärkein syy siihen, että konfliktit olivat 1500-1600-luvuilla taloudellisesti vähemmän vahingollisia kaukaisille yhteiskunnille kuin nykyaikana?
answer: Yhteiskunnat elivät suhteellisen omavaraisesti, ja niiden vaihdanta-alueet olivat rajalliset, mikä teki niistä vähemmän alttiita kaukaisille häiriöille
wrong_answers:
  - Sotateknologia oli vähemmän tuhoisaa, joten konfliktit aiheuttivat vain vähän taloudellisia häiriöitä kauppaverkostoille
  - Kansainvälinen oikeus tarjosi puolueettomille kauppakumppaneille paremman suojan aiempien vuosisatojen konfliktien aikana
  - Kuljetuskustannukset olivat alhaisemmat aikaisempina aikoina, mikä helpotti vaihtoehtoisten kauppakumppaneiden löytämistä sotien aikana
explanation: |
  Etujen harmoniaa koskevan teorian mukaan 1500-1600-luvun konflikteilla oli vain vähän vaikutusta kaukaisiin yhteiskuntiin, koska taloudellinen keskinäinen riippuvuus oli vähäistä. Yhteiskunnat olivat pitkälti omavaraisia, ja vaihtoverkostot olivat maantieteellisesti rajoitettuja. Nykyaikainen maailmanlaajuinen keskinäisriippuvuus tarkoittaa, että mikä tahansa häiriö missä tahansa vaikuttaa maailmanlaajuiseen vaihtoketjuun, mikä tekee konflikteista yhä kalliimpia kaikille maailmantalouden osallistujille, myös valtioille, jotka eivät ole sotaa käyviä.
question: Ni igiki inyigisho y’ubutunzi bw’ubwigenge yerekana ko ari yo mpamvu nyamukuru yatumye intambara zidashobora kwonona cane ubutunzi bw’imibano ya kure mu kinjana ca 15-16 ugereranyije n’ibihe vya none?
answer: Ibisata vyabayeho mu kwitunga bifise uturere dukeyi two guhanahana amakuru, ivyo bikaba vyatuma bidashobora gushikirwa n’ibintu biva kure .
wrong_answers:
  - Ubuhinga bwa gisirikare ntibwari bushobora gusenyura cane, ni co gituma intambara zatuma ubutunzi buhungabana cane ku bijanye n’ubudandaji .
  - Amategeko mpuzamakungu yarakingiye neza abafatanyabikorwa mu bucuruzi batagira aho bahengamiye mu gihe c’intambara zo mu binjana vya mbere .
  - Ibiciro vy’ugutwara abantu vyari bike mu bihe vya kera, ivyo bikaba vyatuma vyoroha kuronka abandi bo mu bucuruzi mu gihe c’intambara .
explanation: |
  Dushingiye ku ciyumviro c’uguhuza inyungu, intambara zo mu kinjana ca 15-16 ntizagira ingaruka nyinshi ku mibano ya kure kubera ko ugufatanya mu vy’ubutunzi kwari guke. Amashirahamwe yari ahanini yitunga kandi imihora y’uguhanahana amakuru yari ifise aho igarukira. Ugufatanya kw’isi yose muri iki gihe bisigura ko uguhungabana kwose aho hose kwogira ico gukoze ku ruhererekane rw’ubudandaji kw’isi yose, bigatuma intambara zirushiriza gutwara amahera menshi ku bantu bose bari mu bukungu bw’isi yose, mbere n’ibihugu bitagira intambara.
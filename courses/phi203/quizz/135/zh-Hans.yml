question: 与现代相比，15-16 世纪的冲突对遥远社会造成的经济损失较小，自由主义经济理论认为其主要原因是什么？
answer: 社会生活相对自给自足，交流范围有限，不易受到远方干扰的影响
wrong_answers:
  - 军事技术的破坏性较小，因此冲突对贸易网络造成的经济破坏最小
  - 在早几个世纪的冲突中，国际法为中立的贸易伙伴提供了更好的保护
  - 早期运输成本较低，因此在战争期间更容易找到其他贸易伙伴
explanation: |
  根据利益和谐理论，15-16 世纪的冲突对遥远社会的影响微乎其微，因为经济上的相互依存是有限的。当时的社会在很大程度上自给自足，交流网络受到地理位置的限制。现代的全球相互依存意味着任何地方的任何破坏都会影响到全球范围内的交换链，使得全球经济的所有参与者，甚至是非交战国，都要为冲突付出越来越高的代价。
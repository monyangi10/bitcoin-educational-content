question: Co liberalna teoria ekonomii określa jako główny powód, dla którego konflikty były mniej szkodliwe ekonomicznie dla odległych społeczeństw w XV-XVI wieku w porównaniu do czasów współczesnych?
answer: Społeczeństwa żyły we względnej samowystarczalności z ograniczonymi sferami wymiany, co czyniło je mniej podatnymi na odległe zakłócenia
wrong_answers:
  - Technologia wojskowa była mniej niszczycielska, więc konflikty powodowały minimalne zakłócenia gospodarcze w sieciach handlowych
  - Prawo międzynarodowe zapewniało lepszą ochronę neutralnym partnerom handlowym podczas konfliktów we wcześniejszych stuleciach
  - Koszty transportu były niższe we wcześniejszych okresach, co ułatwiało znalezienie alternatywnych partnerów handlowych podczas wojen
explanation: |
  Zgodnie z teorią harmonii interesów, konflikty w XV-XVI wieku miały minimalny wpływ na odległe społeczeństwa, ponieważ współzależność gospodarcza była ograniczona. Społeczeństwa były w dużej mierze samowystarczalne, a sieci wymiany były ograniczone geograficznie. Współczesna globalna współzależność oznacza, że każde zakłócenie w dowolnym miejscu wpływa na ogólnoświatowy łańcuch wymiany, sprawiając, że konflikty stają się coraz bardziej kosztowne dla wszystkich uczestników globalnej gospodarki, nawet dla państw niebędących stronami konfliktu.
question: O que é que a teoria económica liberal identifica como a principal razão pela qual os conflitos eram menos prejudiciais do ponto de vista económico para as sociedades distantes nos séculos XV e XVI do que nos tempos modernos?
answer: As sociedades viviam em relativa autossuficiência com esferas de intercâmbio limitadas, o que as tornava menos vulneráveis a perturbações distantes
wrong_answers:
  - A tecnologia militar era menos destrutiva, pelo que os conflitos causavam uma perturbação económica mínima nas redes comerciais
  - O direito internacional proporcionava uma melhor proteção aos parceiros comerciais neutros durante os conflitos dos séculos anteriores
  - Os custos de transporte eram mais baixos em períodos anteriores, o que facilitava a procura de parceiros comerciais alternativos durante as guerras
explanation: |
  De acordo com a teoria da harmonia de interesses, os conflitos dos séculos XV e XVI tiveram um impacto mínimo nas sociedades distantes, porque a interdependência económica era limitada. As sociedades eram em grande parte auto-suficientes e as redes de intercâmbio eram geograficamente restritas. A interdependência global moderna significa que qualquer perturbação em qualquer lugar afecta a cadeia mundial de trocas, tornando os conflitos cada vez mais onerosos para todos os participantes na economia global, mesmo para as nações não beligerantes.
question: Lý thuyết kinh tế tự do xác định nguyên nhân chính khiến các cuộc xung đột ít gây thiệt hại kinh tế cho các xã hội xa xôi trong thế kỷ 15-16 so với thời hiện đại là gì?
answer: Các xã hội sống trong tình trạng tự cung tự cấp tương đối với phạm vi trao đổi hạn chế, khiến họ ít bị tổn thương hơn trước những biến động từ xa.
wrong_answers:
  - Công nghệ quân sự ít gây thiệt hại hơn, do đó các cuộc xung đột gây ra sự gián đoạn kinh tế tối thiểu đối với mạng lưới thương mại.
  - Luật quốc tế đã cung cấp sự bảo vệ tốt hơn cho các đối tác thương mại trung lập trong các cuộc xung đột ở những thế kỷ trước.
  - Chi phí vận chuyển thấp hơn trong các thời kỳ trước đó, giúp việc tìm kiếm các đối tác thương mại thay thế trong thời chiến trở nên dễ dàng hơn.
explanation: |
  Theo lý thuyết hài hòa lợi ích, các cuộc xung đột trong thế kỷ 15-16 có tác động tối thiểu đến các xã hội xa xôi vì sự phụ thuộc kinh tế lẫn nhau còn hạn chế. Các xã hội phần lớn tự cung tự cấp và mạng lưới trao đổi bị giới hạn về mặt địa lý. Sự phụ thuộc toàn cầu hiện đại có nghĩa là bất kỳ sự gián đoạn nào ở bất cứ đâu cũng ảnh hưởng đến chuỗi trao đổi toàn cầu, khiến các cuộc xung đột ngày càng tốn kém đối với tất cả các bên tham gia vào nền kinh tế toàn cầu, ngay cả các quốc gia không tham chiến.
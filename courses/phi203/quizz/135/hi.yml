question: What does liberal economic theory identify as the primary reason why conflicts were less economically damaging to distant societies in the 15th-16th centuries compared to modern times?
answer: Societies lived in relative self-sufficiency with limited exchange spheres, making them less vulnerable to distant disruptions
wrong_answers:
  - Military technology was less destructive, so conflicts caused minimal economic disruption to trading networks
  - International law provided better protection for neutral trading partners during conflicts in earlier centuries
  - Transportation costs were lower in earlier periods, making it easier to find alternative trading partners during wars
explanation: |
  According to the harmony of interests theory, conflicts in the 15th-16th centuries had minimal impact on distant societies because economic interdependence was limited. Societies were largely self-sufficient and exchange networks were geographically restricted. Modern global interdependence means any disruption anywhere affects the worldwide chain of exchange, making conflicts increasingly costly for all participants in the global economy, even non-belligerent nations.
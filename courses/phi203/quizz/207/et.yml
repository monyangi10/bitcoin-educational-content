question: Milline põhimõtteline väärarusaam on Bastiat' analüüsi kohaselt nii protektsionistide kui ka sotsialistide ühine, kui nad tuginevad "üldise huvi" mõistele, et õigustada üksikisiku vabaduste piiramist?
answer: Nad käsitlevad üldist huvi kui kõrgemat üksust, mis automaatselt õigustab individuaalsete õiguste ja vabaduste rikkumist
wrong_answers:
  - Nad eeldavad, et üldist huvi saab saavutada ainult demokraatlike hääletusmehhanismide, mitte aga turuprotsesside kaudu
  - Nad usuvad, et üldine huvi nõuab jõukuse võrdset jaotamist kõigi ühiskonnaliikmete vahel
  - Nad ajavad üldised huvid segamini enamuse huvidega, eirates vähemuse õigusi majandusotsustes
explanation: |
  Bastiat nimetab "üldhuvile" viitamist sagedaseks ettekäändeks üksikisiku õiguste ja vabaduste ründamisel. Protektsionistid ja sotsialistid esitavad seda üldist huvi kui kõrgemat üksust, mis automaatselt lubab rikkuda seda, mida nad peavad madalamaks individuaalsete vabaduste rikkumiseks. See kujutab endast fundamentaalset sofismi, sest see loob vale hierarhia, kus kollektiivseid abstraktsioone kasutatakse selleks, et õigustada konkreetset kahju individuaalsele vabadusele. Teised võimalused on küll potentsiaalselt problemaatilised, kuid ei taba Bastiat' konkreetset kriitikat selle kohta, kuidas "üldist huvi" kasutatakse relvana kontseptuaalse vahendina, et seadustada autoritaarseid meetmeid majandusliku vabaduse vastu.
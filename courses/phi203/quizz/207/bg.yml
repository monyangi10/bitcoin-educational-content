question: Според анализа на Бастиа коя основна грешка споделят както протекционистите, така и социалистите, когато се позовават на понятието "общ интерес", за да оправдаят ограничаването на индивидуалните свободи?
answer: Те разглеждат общия интерес като по-висш субект, който автоматично оправдава нарушаването на индивидуалните права и свободи
wrong_answers:
  - Те приемат, че общият интерес може да бъде постигнат само чрез демократични механизми за гласуване, а не чрез пазарни процеси
  - Те вярват, че общият интерес изисква равномерно разпределение на богатството между всички членове на обществото
  - Те смесват общия интерес с интересите на мнозинството, като пренебрегват правата на малцинствата при вземането на икономически решения
explanation: |
  Бастиа определя позоваването на "общия интерес" като често срещан претекст за посегателство върху индивидуалните права и свободи. Протекционистите и социалистите представят този общ интерес като по-висш субект, който автоматично разрешава нарушаването на считаните от тях за по-нисши индивидуални свободи. Това представлява фундаментален софизъм, тъй като създава фалшива йерархия, в която колективни абстракции се използват за оправдаване на конкретни вреди на индивидуалната свобода. Другите варианти, макар и потенциално проблематични, не улавят специфичната критика на Бастиа по отношение на това как "общият интерес" се превръща в оръжие като концептуален инструмент за легитимиране на авторитарни мерки срещу икономическата свобода.
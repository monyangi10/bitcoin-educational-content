question: Prema Bastiatovoj analizi, i protekcionisti i socijalisti dele fundamentalnu zabludu kada pozivaju na koncept 'opšteg interesa' kako bi opravdali ograničenja individualnih sloboda.
answer: Oni tretiraju opšti interes kao superiorni entitet koji automatski opravdava kršenje individualnih prava i sloboda
wrong_answers:
  - Pretpostavljaju da se opšti interes može postići samo putem demokratskih mehanizama glasanja, a ne tržišnim procesima.
  - Veruju da opšti interes zahteva jednaku raspodelu bogatstva među svim članovima društva.
  - Oni mešaju opšti interes sa interesima većine, ignorišući prava manjina u ekonomskim odlukama.
explanation: |
  Bastiat identifikuje pozivanje na 'opšti interes' kao čest izgovor za napad na individualna prava i slobode. Protekcionisti i socijalisti predstavljaju ovaj opšti interes kao superiorni entitet koji automatski ovlašćuje kršenja onoga što smatraju inferiornim individualnim slobodama. Ovo predstavlja fundamentalni sofizam jer stvara lažnu hijerarhiju gde se kolektivne apstrakcije koriste da opravdaju konkretne štete po individualnu slobodu. Druge opcije, iako potencijalno problematične, ne obuhvataju Bastiatovu specifičnu kritiku kako se 'opšti interes' koristi kao konceptualno oruđe za legitimizaciju autoritarnih mera protiv ekonomske slobode.
question: Kulingana na uchambuzi wa Bastiat, ni dhana gani potofu ya msingi ambayo watetezi na wasoshalisti wanashiriki wanapotumia dhana ya 'maslahi ya jumla' ili kuhalalisha vikwazo vya uhuru wa mtu binafsi?
answer: Wanachukulia maslahi ya jumla kama kitu bora kinachohalalisha moja kwa moja ukiukaji wa haki na uhuru wa mtu binafsi
wrong_answers:
  - Wanadhani maslahi ya jumla yanaweza kupatikana tu kupitia mifumo ya upigaji kura ya kidemokrasia badala ya michakato ya soko
  - Wanaamini maslahi ya jumla yanahitaji mgawanyo sawa wa utajiri miongoni mwa wanajamii wote
  - Wanachanganya maslahi ya jumla na maslahi ya walio wengi, wakipuuza haki za wachache katika maamuzi ya kiuchumi.
explanation: |
  Bastiat anatambua kuomba 'maslahi ya jumla' kama kisingizio cha mara kwa mara cha kushambulia haki na uhuru wa mtu binafsi. Watetezi na wasoshalisti wanawasilisha maslahi haya ya jumla kama chombo bora kinachoruhusu moja kwa moja ukiukwaji wa kile wanachokiona kuwa uhuru duni wa mtu binafsi. Hii inawakilisha ujinga wa msingi kwa sababu inaunda uongozi wa uwongo ambapo ufupisho wa pamoja hutumiwa kuhalalisha madhara halisi kwa uhuru wa mtu binafsi. Chaguzi zingine, ingawa zinaweza kuwa na matatizo, hazishiki ukosoaji maalum wa Bastiat wa jinsi 'maslahi ya jumla' yanavyotumiwa kama zana ya dhana ya kuhalalisha hatua za kimabavu dhidi ya uhuru wa kiuchumi.
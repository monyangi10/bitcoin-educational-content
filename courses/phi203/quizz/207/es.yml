question: Según el análisis de Bastiat, ¿qué error fundamental comparten tanto los proteccionistas como los socialistas cuando invocan el concepto de "interés general" para justificar las restricciones a las libertades individuales?
answer: Tratan el interés general como un ente superior que justifica automáticamente la violación de los derechos y libertades individuales
wrong_answers:
  - Suponen que el interés general sólo puede alcanzarse mediante mecanismos democráticos de votación y no mediante procesos de mercado
  - Creen que el interés general exige una distribución equitativa de la riqueza entre todos los miembros de la sociedad
  - Confunden el interés general con los intereses de la mayoría, ignorando los derechos de las minorías en las decisiones económicas
explanation: |
  Bastiat identifica la invocación del "interés general" como un pretexto frecuente para atacar los derechos y libertades individuales. Los proteccionistas y los socialistas presentan este interés general como una entidad superior que autoriza automáticamente las violaciones de lo que consideran libertades individuales inferiores. Esto representa un sofisma fundamental porque crea una falsa jerarquía en la que se utilizan abstracciones colectivas para justificar daños concretos a la libertad individual. Las otras opciones, aunque potencialmente problemáticas, no captan la crítica específica de Bastiat sobre cómo el "interés general" se convierte en un arma conceptual para legitimar medidas autoritarias contra la libertad económica.
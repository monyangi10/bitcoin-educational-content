question: Zgodnie z analizą Bastiata, jakie fundamentalne błędne przekonanie podzielają zarówno protekcjoniści, jak i socjaliści, gdy powołują się na koncepcję "interesu ogólnego" w celu uzasadnienia ograniczeń wolności jednostki?
answer: Traktują interes ogólny jako nadrzędny, który automatycznie usprawiedliwia naruszanie indywidualnych praw i wolności
wrong_answers:
  - Zakładają one, że interes ogólny można osiągnąć jedynie poprzez demokratyczne mechanizmy głosowania, a nie procesy rynkowe
  - Uważają, że interes ogólny wymaga równego podziału bogactwa między wszystkich członków społeczeństwa
  - Mylą interes ogólny z interesem większości, ignorując prawa mniejszości w decyzjach gospodarczych
explanation: |
  Bastiat identyfikuje powoływanie się na "interes ogólny" jako częsty pretekst do atakowania indywidualnych praw i wolności. Protekcjoniści i socjaliści przedstawiają ten ogólny interes jako nadrzędną jednostkę, która automatycznie zezwala na naruszanie tego, co uważają za podrzędne wolności indywidualne. Stanowi to fundamentalny sofizmat, ponieważ tworzy fałszywą hierarchię, w której zbiorowe abstrakcje są wykorzystywane do usprawiedliwiania konkretnych szkód dla wolności jednostki. Inne opcje, choć potencjalnie problematyczne, nie oddają specyficznej krytyki Bastiata dotyczącej tego, w jaki sposób "interes ogólny" jest wykorzystywany jako konceptualne narzędzie legitymizujące autorytarne środki przeciwko wolności gospodarczej.
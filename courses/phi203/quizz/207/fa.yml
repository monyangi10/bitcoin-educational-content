question: بر اساس تحلیل باستیا، چه سوءتفاهم بنیادی‌ای میان حمایت‌گرایان و سوسیالیست‌ها مشترک است زمانی که آنها برای توجیه محدودیت‌های آزادی‌های فردی به مفهوم 'منافع عمومی' استناد می‌کنند؟
answer: آن‌ها منافع عمومی را به‌عنوان یک موجودیت برتر تلقی می‌کنند که به‌طور خودکار نقض حقوق و آزادی‌های فردی را توجیه می‌کند.
wrong_answers:
  - آن‌ها فرض می‌کنند که منافع عمومی تنها از طریق مکانیزم‌های رأی‌گیری دموکراتیک قابل دستیابی است و نه از طریق فرآیندهای بازار.
  - آن‌ها معتقدند که منافع عمومی نیازمند توزیع برابر ثروت در میان همه اعضای جامعه است.
  - آن‌ها منافع عمومی را با منافع اکثریت اشتباه می‌گیرند و حقوق اقلیت‌ها را در تصمیمات اقتصادی نادیده می‌گیرند.
explanation: |
  باستیا شناسایی می‌کند که استناد به 'منافع عمومی' به عنوان بهانه‌ای مکرر برای حمله به حقوق و آزادی‌های فردی استفاده می‌شود. حمایت‌گرایان و سوسیالیست‌ها این منافع عمومی را به عنوان یک موجودیت برتر معرفی می‌کنند که به طور خودکار نقض آنچه را که آنها آزادی‌های فردی پایین‌تر می‌دانند، مجاز می‌سازد. این یک سفسطه اساسی است زیرا یک سلسله مراتب کاذب ایجاد می‌کند که در آن انتزاعات جمعی برای توجیه آسیب‌های ملموس به آزادی فردی استفاده می‌شود. گزینه‌های دیگر، در حالی که ممکن است مشکل‌ساز باشند، نقد خاص باستیا را در مورد چگونگی استفاده از 'منافع عمومی' به عنوان ابزاری مفهومی برای مشروعیت‌بخشی به اقدامات استبدادی علیه آزادی اقتصادی، به تصویر نمی‌کشند.
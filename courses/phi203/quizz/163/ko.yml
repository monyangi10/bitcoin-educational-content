question: 19세기 자유주의 경제학자들은 관세 보호가 국내 생산자에게 어떤 영향을 미치는지 설명하기 위해 어떤 비유를 사용했나요?
answer: 기업가 정신이 부족한 생산자들이 성과에 안주하지 않도록 하는 관세 보호의 완충 장치
wrong_answers:
  - 불공정한 해외 경쟁으로부터 국가 산업을 보호하는 경제 방어막
  - 국내 기업이 국제 경쟁력을 갖출 수 있도록 돕는 발전 사다리
  - 현지 시장과 글로벌 무역 기회를 연결하는 상업적 전환의 다리
explanation: |
  이 장에서는 특히 해리엇 마르티노, 프레데릭 바스티앙 등 19세기 작가들이 관세 보호를 '두아니에르 보호의 쿠션'(관세 보호의 쿠션)이라고 불렀다는 사실을 언급하고 있습니다. 이 비유는 관세로 인해 외국과의 경쟁이 막혀 기업가 정신이 부족한 생산자들이 기존의 성과에 안주하는 모습을 잘 보여줍니다. 외국 생산자가 혁신적인 방법이나 더 나은 제품을 개발하면 국내 생산자는 혁신 대신 이러한 보호 쿠션 위에서 '평화롭게 잠들 수 있습니다'. 다른 옵션은 보호무역주의를 긍정적인 시각에서 바라보는 것으로, 이러한 정책에 대한 자유주의 경제학자들의 비판적 견해와 모순됩니다.
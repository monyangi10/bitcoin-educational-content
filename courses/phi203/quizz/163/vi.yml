question: Theo các nhà kinh tế học tự do thế kỷ 19, họ đã sử dụng phép ẩn dụ nào để mô tả tác động của chính sách bảo hộ thuế quan đối với các nhà sản xuất trong nước?
answer: Lớp đệm bảo hộ thuế quan cho phép các nhà sản xuất ít năng động hơn được hưởng lợi từ thành tựu của mình.
wrong_answers:
  - Lá chắn phòng thủ kinh tế bảo vệ các ngành công nghiệp quốc gia khỏi sự cạnh tranh không lành mạnh từ nước ngoài.
  - Con đường phát triển tiến bộ giúp các công ty trong nước vươn lên tầm cạnh tranh quốc tế.
  - Cầu nối chuyển đổi thương mại kết nối thị trường địa phương với các cơ hội thương mại toàn cầu.
explanation: |
  Chương này đặc biệt đề cập đến việc các tác giả thế kỷ 19 như Harriet Martineau, Frédéric Bastiat và những người khác gọi chủ nghĩa bảo hộ thuế quan là 'l'oreiller de la protection douanière' (cái đệm của chủ nghĩa bảo hộ thuế quan). Hình ảnh ẩn dụ này minh họa cách các nhà sản xuất ít năng động hơn chỉ dựa vào những thành tựu hiện có của họ vì cạnh tranh nước ngoài bị cản trở bởi thuế quan. Khi các nhà sản xuất nước ngoài phát triển các phương pháp đổi mới hoặc sản phẩm tốt hơn, các nhà sản xuất trong nước có thể 'ngủ yên' trên cái đệm bảo hộ này thay vì đổi mới. Các lựa chọn khác trình bày chủ nghĩa bảo hộ theo hướng tích cực, điều này trái ngược với quan điểm phê phán của các nhà kinh tế tự do đối với các chính sách như vậy.
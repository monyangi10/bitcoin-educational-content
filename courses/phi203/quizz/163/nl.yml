question: Welke metafoor gebruikten 19e-eeuwse liberale economen om te beschrijven hoe tariefbescherming binnenlandse producenten beïnvloedt?
answer: Het kussen van tariefbescherming dat minder ondernemende producenten in staat stelt op hun prestaties te rusten
wrong_answers:
  - Het schild van economische verdediging dat nationale industrieën beschermt tegen oneerlijke buitenlandse concurrentie
  - De ladder van progressieve ontwikkeling die binnenlandse bedrijven helpt op te klimmen naar internationaal concurrentievermogen
  - De brug van commerciële transitie die lokale markten verbindt met wereldwijde handelsmogelijkheden
explanation: |
  Het hoofdstuk vermeldt specifiek dat 19e-eeuwse auteurs zoals Harriet Martineau, Frédéric Bastiat en anderen tariefbescherming 'l'oreiller de la protection douanière' (het kussen van tariefbescherming) noemden. Deze metafoor illustreert hoe minder ondernemende producenten eenvoudigweg rusten op hun bestaande verwezenlijkingen omdat buitenlandse concurrentie geblokkeerd wordt door tarieven. Wanneer buitenlandse producenten innovatieve methoden of betere producten ontwikkelen, kunnen binnenlandse producenten 'rustig slapen' op dit beschermende kussen in plaats van te innoveren. De andere opties stellen protectionisme in een positief daglicht, wat in tegenspraak is met de kritische kijk van liberale economen op dergelijk beleid.
question: Prema liberalnim ekonomistima iz 19. veka, kakvu su metaforu koristili da opišu kako tarifna zaštita utiče na domaće proizvođače?
answer: Jastuk tarifne zaštite koji omogućava manje preduzetnim proizvođačima da se oslone na svoja dostignuća
wrong_answers:
  - Štit ekonomske odbrane koji štiti nacionalne industrije od nepoštene strane konkurencije
  - Lestvica progresivnog razvoja koja pomaže domaćim kompanijama da se popnu do međunarodne konkurentnosti
  - Most komercijalne tranzicije koji povezuje lokalna tržišta sa globalnim trgovinskim prilikama
explanation: |
  Poglavlje posebno pominje da su autori iz 19. veka poput Harriet Martineau, Frédéric Bastiat i drugi nazivali tarifnu zaštitu 'l'oreiller de la protection douanière' (jastuk tarifne zaštite). Ova metafora ilustruje kako manje preduzimljivi proizvođači jednostavno počivaju na svojim postojećim dostignućima jer je strana konkurencija blokirana tarifama. Kada strani proizvođači razviju inovativne metode ili bolje proizvode, domaći proizvođači mogu 'mirno spavati' na ovom zaštitnom jastuku umesto da inoviraju. Druge opcije predstavljaju protekcionizam u pozitivnom svetlu, što je u suprotnosti sa kritičkim stavom liberalnih ekonomista prema takvim politikama.
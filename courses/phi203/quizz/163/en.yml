question: According to 19th-century liberal economists, what metaphor did they use to describe how tariff protection affects domestic producers?
answer: The cushion of tariff protection that allows less entrepreneurial producers to rest on their achievements
wrong_answers:
  - The shield of economic defense that protects national industries from unfair foreign competition
  - The ladder of progressive development that helps domestic companies climb to international competitiveness
  - The bridge of commercial transition that connects local markets to global trade opportunities
explanation: |
  The chapter specifically mentions that 19th-century authors like Harriet Martineau, Frédéric Bastiat, and others called tariff protection 'l'oreiller de la protection douanière' (the cushion of tariff protection). This metaphor illustrates how less entrepreneurial producers simply rest on their existing achievements because foreign competition is blocked by tariffs. When foreign producers develop innovative methods or better products, domestic producers can 'sleep peacefully' on this protective cushion instead of innovating. The other options present protectionism in a positive light, which contradicts the liberal economists' critical view of such policies.

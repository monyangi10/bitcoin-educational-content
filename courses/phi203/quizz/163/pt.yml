question: De acordo com os economistas liberais do século XIX, que metáfora utilizavam para descrever o modo como a proteção pautal afectava os produtores nacionais?
answer: A almofada de proteção pautal que permite que os produtores menos empreendedores descansem sobre as suas conquistas
wrong_answers:
  - O escudo de defesa económica que protege as indústrias nacionais da concorrência estrangeira desleal
  - A escada do desenvolvimento progressivo que ajuda as empresas nacionais a ascenderem à competitividade internacional
  - A ponte de transição comercial que liga os mercados locais às oportunidades de comércio global
explanation: |
  O capítulo menciona especificamente que autores do século XIX, como Harriet Martineau, Frédéric Bastiat e outros, chamavam à proteção pautal "l'oreiller de la protection douanière" (a almofada da proteção pautal). Esta metáfora ilustra a forma como os produtores menos empreendedores se limitam a descansar sobre as suas realizações actuais, porque a concorrência estrangeira é bloqueada pelas tarifas. Quando os produtores estrangeiros desenvolvem métodos inovadores ou produtos melhores, os produtores nacionais podem "dormir tranquilamente" nesta almofada protetora em vez de inovarem. As outras opções apresentam o protecionismo de uma forma positiva, o que contradiz a visão crítica dos economistas liberais em relação a estas políticas.
question: Какую метафору использовали либеральные экономисты XIX века, чтобы описать, как тарифная защита влияет на отечественных производителей?
answer: Подушка тарифной защиты, которая позволяет менее предприимчивым производителям почивать на лаврах
wrong_answers:
  - Щит экономической обороны, защищающий национальные отрасли от недобросовестной иностранной конкуренции
  - Лестница прогрессивного развития, которая помогает отечественным компаниям подняться до международной конкурентоспособности
  - Мост коммерческого перехода, соединяющий местные рынки с глобальными торговыми возможностями
explanation: |
  В главе особо отмечается, что такие авторы XIX века, как Гарриет Мартино, Фредерик Бастиат и другие, называли тарифную защиту "подушкой тарифной защиты" (l'oreiller de la protection douanière). Эта метафора иллюстрирует, как менее предприимчивые производители просто останавливаются на достигнутом, потому что иностранная конкуренция блокируется тарифами. Когда иностранные производители разрабатывают инновационные методы или лучшие продукты, отечественные производители могут "мирно спать" на этой защитной подушке вместо того, чтобы внедрять инновации. Другие варианты представляют протекционизм в положительном свете, что противоречит критическому взгляду либеральных экономистов на такую политику.
question: Jakiej metafory używali XIX-wieczni liberalni ekonomiści, by opisać wpływ ochrony taryfowej na krajowych producentów?
answer: Ochrona taryfowa, która pozwala mniej przedsiębiorczym producentom polegać na swoich osiągnięciach
wrong_answers:
  - Tarcza obrony gospodarczej, która chroni przemysł krajowy przed nieuczciwą konkurencją zagraniczną
  - Drabina progresywnego rozwoju, która pomaga krajowym firmom wspiąć się na międzynarodową konkurencyjność
  - Most transformacji handlowej, który łączy lokalne rynki z globalnymi możliwościami handlowymi
explanation: |
  W rozdziale tym wspomniano, że XIX-wieczni autorzy, tacy jak Harriet Martineau, Frédéric Bastiat i inni, nazywali ochronę taryfową "l'oreiller de la protection douanière" (poduszką ochrony taryfowej). Metafora ta ilustruje, w jaki sposób mniej przedsiębiorczy producenci po prostu opierają się na swoich dotychczasowych osiągnięciach, ponieważ zagraniczna konkurencja jest blokowana przez cła. Kiedy zagraniczni producenci opracowują innowacyjne metody lub lepsze produkty, producenci krajowi mogą "spać spokojnie" na tej poduszce ochronnej, zamiast wprowadzać innowacje. Pozostałe opcje przedstawiają protekcjonizm w pozytywnym świetle, co jest sprzeczne z krytycznym spojrzeniem liberalnych ekonomistów na taką politykę.
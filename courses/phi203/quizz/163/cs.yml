question: Jakou metaforu používali liberální ekonomové 19. století k popisu toho, jak celní ochrana ovlivňuje domácí výrobce?
answer: Polštář celní ochrany, který umožňuje méně podnikavým výrobcům spoléhat na své úspěchy
wrong_answers:
  - Štít ekonomické obrany, který chrání národní průmysl před nekalou zahraniční konkurencí
  - Žebřík progresivního vývoje, který pomáhá domácím podnikům stoupat k mezinárodní konkurenceschopnosti
  - Most obchodní transformace, který spojuje místní trhy s globálními obchodními příležitostmi
explanation: |
  Kapitola konkrétně zmiňuje, že autoři 19. století jako Harriet Martineau, Frédéric Bastiat a další nazývali celní ochranu "l'oreiller de la protection douanière" (polštář celní ochrany). Tato metafora ilustruje, jak méně podnikaví výrobci jednoduše spoléhají na své stávající úspěchy, protože zahraniční konkurence je blokována cly. Když zahraniční výrobci vyvinou inovativní metody nebo lepší výrobky, mohou domácí výrobci "klidně spát" na tomto ochranném polštáři, místo aby inovovali. Ostatní možnosti představují protekcionismus v pozitivním světle, což je v rozporu s kritickým pohledem liberálních ekonomů na takovou politiku.
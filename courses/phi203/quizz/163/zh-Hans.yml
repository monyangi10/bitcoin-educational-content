question: 19 世纪的自由主义经济学家用什么比喻来描述关税保护如何影响国内生产者？
answer: 关税保护的缓冲，使创业能力较弱的生产商得以安于现状
wrong_answers:
  - 保护民族工业免受外国不公平竞争的经济防卫盾牌
  - 帮助国内企业攀升国际竞争力的渐进式发展阶梯
  - 连接当地市场与全球贸易机会的商业过渡桥梁
explanation: |
  本章特别提到，哈丽雅特-马丁诺、弗雷德里克-巴斯蒂亚特等 19 世纪作家将关税保护称为 "关税保护的垫子"（l'oreiller de la protection douanière）。这个比喻说明，由于关税阻挡了外国竞争，创业能力较弱的生产商只能停留在已有的成就上。当外国生产商开发出创新方法或更好的产品时，国内生产商就可以在这个保护垫上 "安然入睡"，而不用进行创新。其他选项从正面阐述了保护主义，这与自由派经济学家对此类政策的批判性观点相矛盾。
question: Itsehallintokyvyn analyysin mukaan mikä perusominaisuus erottaa modernit yhteiskunnat primitiivisistä yhteiskunnista yksilönvapauden osalta?
answer: Nykyaikaiset yksilöt ovat hankkineet moraaliset ja älylliset valmiudet, joita tarvitaan vapauden valistuneeseen käyttöön
wrong_answers:
  - Nykyaikaiset yhteiskunnat ovat poistaneet kaikenlaisen sääntelyn ja oikeudelliset rajoitukset yksilön käyttäytymisestä
  - Alkukantaisilla yhteiskunnilla oli luonnollinen vapaus, kun taas nykyaikaiset yhteiskunnat asettavat keinotekoisia rajoituksia instituutioiden avulla
  - Nykyaikainen teknologia on poistanut yksilöiden tarpeen oppia käyttämään vapauttaan vastuullisesti
explanation: |
  Tekstissä korostetaan, että vapaus ei ole luonnollinen tila vaan sivilisaatioprosessin tulos. Charles Dunoyerin analyysi osoittaa, että vaikka alkukantaiset yhteiskunnat vaikuttavat "luonnostaan vapailta", niissä esiintyy itse asiassa käyttäytymistä (ahneutta, epäsäännöllisyyttä, varattomuutta), joka tekee yksilöistä vähemmän vapaita kuin mitä modernit yhteiskunnat voivat tarjota. Keskeinen ero on se, että modernit yksilöt ovat kehittäneet moralisoitumisen ja teollistumisen myötä valistuneeseen vapauden käyttöön tarvittavat valmiudet, mikä on ristiriidassa Rousseaun romantisoidun näkemyksen kanssa primitiivisestä vapaudesta.
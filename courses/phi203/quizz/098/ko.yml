question: 자치 역량 분석에 따르면, 개인의 자유 측면에서 현대 사회가 원시 사회와 구별되는 근본적인 특징은 무엇인가요?
answer: 현대인은 자유를 현명하게 사용하는 데 필요한 도덕적, 지적 역량을 갖추었습니다
wrong_answers:
  - 현대 사회는 개인의 행동에 대한 모든 형태의 규제와 법적 제약을 없앴습니다
  - 원시 사회는 자연스러운 자유를 누렸지만 현대 사회는 제도를 통해 인위적인 제한을 가합니다
  - 현대 기술로 인해 개인이 자유를 책임감 있게 행사하는 방법을 배울 필요가 없어졌습니다
explanation: |
  이 글은 자유가 자연스러운 상태가 아니라 문명화 과정의 결과라는 점을 강조합니다. 찰스 두노이어의 분석에 따르면 원시 사회는 '자연적으로 자유로운' 것처럼 보이지만 실제로는 현대 사회보다 개인을 덜 자유롭게 만드는 행동(탐욕, 요실금, 즉흥성)을 보인다고 합니다. 중요한 차이점은 현대인은 도덕화와 산업화를 통해 계몽된 자유를 사용하는 데 필요한 능력을 발전시켜 원시적 자유에 대한 루소의 낭만적인 견해와 모순된다는 것입니다.
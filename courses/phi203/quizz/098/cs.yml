question: Jaká základní charakteristika podle analýzy samosprávné schopnosti odlišuje moderní společnosti od primitivních z hlediska svobody jednotlivce?
answer: Moderní lidé získali morální a intelektuální schopnosti nezbytné pro osvícené využívání svobody
wrong_answers:
  - Moderní společnosti odstranily všechny formy regulace a právních omezení chování jednotlivců
  - Primitivní společnosti měly přirozenou svobodu, zatímco moderní společnosti zavádějí umělá omezení prostřednictvím institucí
  - Moderní technologie odstranily nutnost, aby se jednotlivci učili, jak odpovědně využívat svou svobodu
explanation: |
  Text zdůrazňuje, že svoboda není přirozený stav, ale výsledek civilizačního procesu. Analýza Charlese Dunoyera ukazuje, že primitivní společnosti, přestože se zdají být "přirozeně svobodné", ve skutečnosti vykazují chování (žravost, inkontinence, improvizace), které činí jedince méně svobodnými, než co mohou nabídnout moderní společnosti. Klíčový rozdíl spočívá v tom, že moderní jedinci si díky moralizaci a industrializaci vyvinuli schopnosti potřebné k osvícenému užívání svobody, což je v rozporu s Rousseauovým romantizujícím pohledem na primitivní svobodu.
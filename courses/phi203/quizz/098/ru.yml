question: Какая фундаментальная характеристика, согласно анализу способности к самоуправлению, отличает современные общества от примитивных в плане свободы личности?
answer: Современные люди приобрели моральные и интеллектуальные способности, необходимые для просвещенного использования свободы
wrong_answers:
  - Современные общества устранили все формы регулирования и правовые ограничения индивидуального поведения
  - Примитивные общества обладали естественной свободой, в то время как современные накладывают искусственные ограничения с помощью институтов
  - Современные технологии избавили людей от необходимости учиться ответственно пользоваться своей свободой
explanation: |
  В тексте подчеркивается, что свобода - это не естественное состояние, а результат цивилизационного процесса. Анализ Шарля Дюнуайе показывает, что примитивные общества, несмотря на кажущуюся "естественную свободу", на самом деле демонстрируют поведение (прожорливость, недержание, импровизация), которое делает человека менее свободным, чем то, что может предложить современное общество. Ключевое различие заключается в том, что современные люди развили в процессе морализации и индустриализации способности, необходимые для просвещенного использования свободы, что противоречит романтизированному представлению Руссо о первобытной свободе.
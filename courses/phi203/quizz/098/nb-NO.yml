question: Hvilket grunnleggende kjennetegn skiller moderne samfunn fra primitive samfunn når det gjelder individuell frihet, ifølge analysen av selvstyringskapasitet?
answer: Det moderne mennesket har tilegnet seg de moralske og intellektuelle egenskapene som er nødvendige for en opplyst bruk av friheten
wrong_answers:
  - Moderne samfunn har eliminert alle former for regulering og juridiske begrensninger på individuell atferd
  - Primitive samfunn hadde naturlig frihet, mens moderne samfunn pålegger kunstige begrensninger gjennom institusjoner
  - Moderne teknologi har fjernet behovet for at enkeltpersoner må lære seg å utøve friheten sin på en ansvarlig måte
explanation: |
  Teksten understreker at frihet ikke er en naturlig tilstand, men et resultat av en sivilisatorisk prosess. Charles Dunoyers analyse viser at primitive samfunn, til tross for at de fremstår som "naturlig frie", faktisk utviser en atferd (glupskhet, inkontinens, sløsing) som gjør individene mindre frie enn det moderne samfunn kan tilby. Den viktigste forskjellen er at moderne individer gjennom moralisering og industrialisering har utviklet de egenskapene som trengs for opplyst bruk av frihet, noe som står i motsetning til Rousseaus romantiserte syn på primitiv frihet.
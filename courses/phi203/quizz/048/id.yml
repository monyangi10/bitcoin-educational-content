question: Apa faktor utama yang mencegah perkembangan kebebasan individu dalam masyarakat prasejarah?
answer: Kelemahan ekstrem dari kapasitas produktif yang terbatas pada berburu, menangkap ikan, dan meramu
wrong_answers:
  - Kurangnya hukum tertulis dan struktur pemerintah formal untuk melindungi hak-hak individu
  - Keyakinan agama yang menekankan ibadah kolektif di atas kebebasan spiritual pribadi
  - Isolasi geografis yang mencegah kontak dengan peradaban yang lebih maju
explanation: |
  Jawaban yang benar mengidentifikasi kendala material mendasar yang membuat kebebasan individu menjadi tidak mungkin pada masa prasejarah. Kapasitas produktif yang sangat terbatas berarti bahwa kelangsungan hidup sepenuhnya bergantung pada upaya kolektif dan ketaatan pada aturan kelompok. Tanpa kemampuan untuk berproduksi secara mandiri, individu tidak dapat menjalankan kepemilikan pribadi atau otonomi pribadi. Jawaban yang salah berfokus pada faktor politik, agama, atau geografis, tetapi jawaban-jawaban tersebut melewatkan realitas ekonomi inti yang ditekankan oleh para pemikir liberal: kondisi material harus mendukung kebebasan sebelum kebebasan itu bisa dilaksanakan secara praktis.
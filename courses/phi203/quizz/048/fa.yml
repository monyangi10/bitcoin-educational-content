question: عامل اصلی که مانع توسعه آزادی فردی در جوامع پیش از تاریخ شد چه بود؟
answer: ضعف شدید ظرفیت تولید محدود به شکار، ماهیگیری و جمع‌آوری
wrong_answers:
  - فقدان قوانین مکتوب و ساختارهای رسمی دولتی برای حفاظت از حقوق فردی
  - باورهای مذهبی که بر عبادت جمعی به جای آزادی معنوی شخصی تأکید داشتند
  - انزوای جغرافیایی که مانع از تماس با تمدن‌های پیشرفته‌تر شد
explanation: |
  پاسخ صحیح محدودیت اساسی مواد را شناسایی می‌کند که آزادی فردی را در زمان‌های پیشاتاریخی غیرممکن می‌ساخت. ظرفیت تولیدی بسیار محدود به این معنا بود که بقا به‌طور کامل به تلاش جمعی و تبعیت از قوانین گروهی وابسته بود. بدون توانایی تولید مستقل، افراد نمی‌توانستند مالکیت خود یا خودمختاری شخصی را اعمال کنند. پاسخ‌های نادرست بر عوامل سیاسی، مذهبی یا جغرافیایی تمرکز دارند، اما این‌ها واقعیت اقتصادی اصلی را که متفکران لیبرال بر آن تأکید داشتند، نادیده می‌گیرند: شرایط مادی باید از آزادی حمایت کنند تا بتوان آن را به‌طور عملی اعمال کرد.
question: 선사 시대 사회에서 개인의 자유가 발전하지 못한 주요 요인은 무엇이었나요?
answer: 사냥, 낚시, 채집으로 제한된 생산력의 극심한 약화
wrong_answers:
  - 개인의 권리를 보호하기 위한 서면 법률과 공식적인 정부 구조의 부재
  - 개인의 영적 자유보다 집단적 예배를 강조하는 종교적 신념
  - 지리적 고립으로 인해 선진 문명과의 접촉이 차단된 상황
explanation: |
  정답은 선사 시대에 개인의 자유를 불가능하게 만든 근본적인 물질적 제약을 나타냅니다. 극도로 제한된 생산 능력은 생존이 전적으로 집단적 노력과 집단 규칙에 대한 복종에 달려 있음을 의미했습니다. 독립적으로 생산할 능력이 없던 개인은 자기 소유권이나 개인적 자율성을 행사할 수 없었습니다. 오답은 정치적, 종교적 또는 지리적 요인에 초점을 맞추고 있지만, 자유주의 사상가들이 강조한 핵심적인 경제적 현실, 즉 자유가 실질적으로 행사되기 위해서는 물질적 조건이 뒷받침되어야 한다는 점을 놓치고 있습니다.
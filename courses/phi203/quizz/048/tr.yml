question: Tarih öncesi toplumlarda bireysel özgürlüğün gelişmesini engelleyen temel faktör neydi?
answer: Avcılık, balıkçılık ve toplayıcılıkla sınırlı üretken kapasitenin aşırı zayıflığı
wrong_answers:
  - Bireysel hakları korumak için yazılı yasaların ve resmi hükümet yapılarının olmaması
  - Kişisel ruhani özgürlük yerine toplu ibadeti vurgulayan dini inançlar
  - Daha gelişmiş uygarlıklarla teması engelleyen coğrafi izolasyon
explanation: |
  Doğru cevap, tarih öncesi çağlarda bireysel özgürlüğü imkansız kılan temel maddi kısıtlamayı tanımlamaktadır. Son derece sınırlı üretim kapasitesi, hayatta kalmanın tamamen kolektif çabaya ve grup kurallarına boyun eğmeye bağlı olduğu anlamına geliyordu. Bağımsız üretim yeteneği olmadan, bireyler kendi mülkiyetlerini veya kişisel özerkliklerini kullanamazlardı. Yanlış cevaplar siyasi, dini ya da coğrafi faktörlere odaklanır, ancak bunlar liberal düşünürlerin vurguladığı temel ekonomik gerçekliği gözden kaçırır: pratikte uygulanabilmesi için maddi koşulların özgürlüğü desteklemesi gerekir.
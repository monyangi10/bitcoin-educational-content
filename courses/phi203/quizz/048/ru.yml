question: Какой основной фактор препятствовал развитию индивидуальной свободы в доисторических обществах?
answer: Крайняя слабость производственного потенциала, ограничивающегося охотой, рыбалкой и собирательством
wrong_answers:
  - Отсутствие писаных законов и официальных государственных структур для защиты прав личности
  - Религиозные убеждения, в которых коллективное поклонение ставится выше личной духовной свободы
  - Географическая изоляция, препятствовавшая контактам с более развитыми цивилизациями
explanation: |
  В правильном ответе названо основное материальное ограничение, которое делало индивидуальную свободу невозможной в доисторические времена. Крайне ограниченный производственный потенциал означал, что выживание полностью зависело от коллективных усилий и подчинения групповым правилам. Не имея возможности производить самостоятельно, люди не могли реализовать право собственности или личную автономию. Неправильные ответы сосредоточены на политических, религиозных или географических факторах, но они упускают основную экономическую реальность, которую подчеркивали либеральные мыслители: материальные условия должны поддерживать свободу, прежде чем она может быть практически реализована.
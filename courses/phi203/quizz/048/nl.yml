question: Wat was de belangrijkste factor die de ontwikkeling van individuele vrijheid in prehistorische samenlevingen in de weg stond?
answer: Extreem zwakke productiecapaciteit beperkt tot jagen, vissen en verzamelen
wrong_answers:
  - Gebrek aan geschreven wetten en formele overheidsstructuren om individuele rechten te beschermen
  - Religieuze overtuigingen die de nadruk legden op collectieve aanbidding boven persoonlijke spirituele vrijheid
  - Geografische isolatie die contact met meer geavanceerde beschavingen verhinderde
explanation: |
  Het juiste antwoord geeft de fundamentele materiële beperking aan die individuele vrijheid in de prehistorie onmogelijk maakte. De extreem beperkte productiecapaciteit betekende dat overleven volledig afhankelijk was van collectieve inspanning en onderwerping aan groepsregels. Zonder de mogelijkheid om zelfstandig te produceren, konden individuen geen zelf-eigenaarschap of persoonlijke autonomie uitoefenen. De verkeerde antwoorden richten zich op politieke, religieuze of geografische factoren, maar deze missen de economische kernrealiteit die liberale denkers benadrukten: materiële omstandigheden moeten vrijheid ondersteunen voordat het praktisch kan worden uitgeoefend.
question: Qual foi o principal fator que impediu o desenvolvimento da liberdade individual nas sociedades pré-históricas?
answer: Extrema debilidade da capacidade produtiva limitada à caça, pesca e recolha
wrong_answers:
  - Falta de leis escritas e de estruturas governamentais formais para proteger os direitos individuais
  - Crenças religiosas que privilegiam o culto coletivo em detrimento da liberdade espiritual pessoal
  - Isolamento geográfico que impedia o contacto com civilizações mais avançadas
explanation: |
  A resposta correta identifica o constrangimento material fundamental que impossibilitava a liberdade individual na pré-história. A capacidade de produção extremamente limitada significava que a sobrevivência dependia inteiramente do esforço coletivo e da submissão às regras do grupo. Sem a capacidade de produzir de forma autónoma, os indivíduos não podiam exercer a auto-propriedade ou a autonomia pessoal. As respostas erradas centram-se em factores políticos, religiosos ou geográficos, mas estes não têm em conta a realidade económica fundamental que os pensadores liberais enfatizaram: as condições materiais devem apoiar a liberdade antes de esta poder ser exercida na prática.
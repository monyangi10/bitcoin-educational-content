question: Qual è stato il fattore principale che ha impedito lo sviluppo della libertà individuale nelle società preistoriche?
answer: Estrema debolezza della capacità produttiva, limitata alla caccia, alla pesca e alla raccolta
wrong_answers:
  - Mancanza di leggi scritte e di strutture governative formali per proteggere i diritti individuali
  - Credenze religiose che enfatizzavano il culto collettivo rispetto alla libertà spirituale personale
  - Isolamento geografico che impediva il contatto con civiltà più avanzate
explanation: |
  La risposta corretta identifica il vincolo materiale fondamentale che rendeva impossibile la libertà individuale nella preistoria. La capacità produttiva estremamente limitata faceva sì che la sopravvivenza dipendesse interamente dallo sforzo collettivo e dalla sottomissione alle regole del gruppo. Senza la capacità di produrre autonomamente, gli individui non potevano esercitare la proprietà o l'autonomia personale. Le risposte sbagliate si concentrano su fattori politici, religiosi o geografici, ma non tengono conto della realtà economica fondamentale che i pensatori liberali hanno sottolineato: le condizioni materiali devono sostenere la libertà prima che possa essere esercitata in pratica.
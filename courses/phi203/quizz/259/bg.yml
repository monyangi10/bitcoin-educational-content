question: Коя основна характеристика трябва да отличава истинската договорна свобода в политическата организация от обикновеното участие в съществуващите социални договори?
answer: Свободата на избор за доброволно влизане или излизане от политически сдружения, включително правото на отделяне
wrong_answers:
  - Възможност за гласуване по закони и политики в рамките на съществуващата рамка на националното управление
  - Възможност за договаряне на условията за гражданство в рамките на установените граници
  - Правото да се създават политически партии и да се влияе върху процесите на вземане на решения чрез демократично участие
explanation: |
  Истинската договорна свобода изисква не само участие в съществуващите договорености, но и основната свобода да се избира дали изобщо да се участва в тези договорености. В текста се подчертава, че истинската договорна свобода означава да имаш възможност да подписваш или да не подписваш, да влизаш или да излизаш от политически сдружения. Това включва и колективното отделяне като логично продължение на индивидуалната автономия. Неправилните отговори описват формите на участие в рамките на съществуващите системи, но не разглеждат основния въпрос за доброволното сдружаване срещу задължителното членство в политически субекти.
question: Ni ikihe kintu nyamukuru kigomba gutandukanya umwidegemvyo nyawo w’amasezerano mu mitunganirize ya politike n’ukugira uruhara gusa mu masezerano y’imibano asanzweho?
answer: Umwidegemvyo wo guhitamwo kwinjira canke kuva mu mashirahamwe ya politike ku bushake, harimwo n’uburenganzira bwo kwitandukanya .
wrong_answers:
  - Ubushobozi bwo gutora amategeko n'ingingo ngenderwako ziri mu rwego rw'ubutegetsi bw'igihugu ruriho .
  - Ubushobozi bwo kuganira ku mategeko n'ingingo z'ubwenegihugu mu gihe uguma mu mipaka yashinzwe
  - Uburenganzira bwo gushinga imigambwe no kugira ico ikoze ku ngingo zifatwa biciye mu kwifatanya na demokarasi
explanation: |
  Umwidegemvyo nyawo w’amasezerano ntusaba gusa kugira uruhara mu ntunganyo zisanzweho, ariko usaba umwidegemvyo w’ishimikiro wo guhitamwo nimba woba uri muri izo ntunganyo na gato. Ico canditswe gishimika ku vy’uko umwidegemvyo nyawo w’amasezerano bisobanura kugira uburenganzira bwo gusinya canke kutasinya, kwinjira canke gusohoka mu mashirahamwe ya politike. Ivyo birimwo n’ukwikukira kw’abantu bose nk’ukwagura kw’ubwigenge bw’umuntu ku giti ciwe mu buryo bubereye. Inyishu zitari zo zidondora uburyo bwo kugira uruhara mu mice iriho ariko ntizivuga ku kibazo nyamukuru c’ukwifatanya n’abandi ku bushake no kuba umunyamuryango w’inzego za politike ku nguvu.
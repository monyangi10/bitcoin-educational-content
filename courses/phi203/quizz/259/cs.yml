question: Jaká základní vlastnost musí odlišovat skutečnou smluvní svobodu v politické organizaci od pouhé účasti na existujících společenských smlouvách?
answer: Svoboda rozhodnout se, zda dobrovolně vstoupit do politického sdružení nebo z něj vystoupit, včetně práva na vystoupení
wrong_answers:
  - Možnost hlasovat o zákonech a politikách v rámci stávajícího vnitrostátního systému správy věcí veřejných
  - Schopnost vyjednávat o podmínkách občanství a zároveň zůstat v rámci stanovených hranic
  - Právo zakládat politické strany a ovlivňovat rozhodovací procesy prostřednictvím demokratické účasti
explanation: |
  Skutečná smluvní svoboda vyžaduje nejen účast na existujících ujednáních, ale i základní svobodu rozhodnout se, zda se těchto ujednání vůbec zúčastnit. Text zdůrazňuje, že skutečná smluvní svoboda znamená mít možnost podepsat či nepodepsat, vstoupit či vystoupit z politických sdružení. To zahrnuje i kolektivní secesi jako logické pokračování individuální autonomie. Špatné odpovědi popisují formy účasti v rámci existujících systémů, ale nezabývají se základní otázkou dobrovolného sdružování versus povinného členství v politických subjektech.
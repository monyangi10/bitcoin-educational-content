question: Ni sifa gani ya msingi ambayo lazima itofautishe uhuru wa kweli wa kimkataba katika shirika la kisiasa na ushiriki tu katika mikataba ya kijamii iliyopo?
answer: Uhuru wa kuchagua kama kuingia au kutoka katika vyama vya siasa kwa hiari, ikiwa ni pamoja na haki ya kujitenga
wrong_answers:
  - Uwezo wa kupiga kura kuhusu sheria na sera ndani ya mfumo uliopo wa utawala wa kitaifa
  - Uwezo wa kujadili masharti na masharti ya uraia huku ukibaki ndani ya mipaka iliyowekwa
  - Haki ya kuunda vyama vya siasa na kushawishi michakato ya kufanya maamuzi kupitia ushiriki wa kidemokrasia
explanation: |
  Uhuru wa kweli wa kimkataba hauhitaji tu ushiriki katika mipango iliyopo, bali uhuru wa msingi wa kuchagua kama kuwa sehemu ya mipango hiyo kabisa. Maandishi yanasisitiza kwamba uhuru halisi wa kimkataba unamaanisha kuwa na chaguo la kusaini au kutosaini, kuingia au kutoka katika vyama vya kisiasa. Hii inajumuisha kujitenga kwa pamoja kama upanuzi wa kimantiki wa uhuru wa mtu binafsi. Majibu yasiyo sahihi yanaelezea aina za ushiriki ndani ya mifumo iliyopo lakini hayashughulikii suala kuu la muungano wa hiari dhidi ya uanachama wa lazima katika vyombo vya kisiasa.
question: Welk fundamenteel kenmerk moet echte contractuele vrijheid in politieke organisatie onderscheiden van louter deelname aan bestaande sociale contracten?
answer: De vrijheid om vrijwillig toe te treden tot of uit te treden uit politieke verenigingen, met inbegrip van het recht om zich af te scheiden
wrong_answers:
  - De mogelijkheid om te stemmen over wetten en beleid binnen het bestaande kader van nationaal bestuur
  - De capaciteit om te onderhandelen over de voorwaarden van burgerschap terwijl men binnen de gevestigde grenzen blijft
  - Het recht om politieke partijen op te richten en invloed uit te oefenen op besluitvormingsprocessen via democratische participatie
explanation: |
  Echte contractuele vrijheid vereist niet alleen deelname aan bestaande regelingen, maar de fundamentele vrijheid om te kiezen of je überhaupt deel wilt uitmaken van die regelingen. De tekst benadrukt dat echte contractuele vrijheid betekent dat je de keuze hebt om te tekenen of niet te tekenen, om toe te treden tot politieke verenigingen of er uit te stappen. Dit omvat collectieve afscheiding als de logische uitbreiding van individuele autonomie. De foute antwoorden beschrijven vormen van participatie binnen bestaande systemen, maar gaan niet in op de kernkwestie van vrijwillige associatie versus verplicht lidmaatschap van politieke entiteiten.
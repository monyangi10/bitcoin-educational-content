question: 政治組織における真の契約上の自由を、既存の社会契約への単なる参加と区別する基本的特徴は何か？
answer: 脱退の権利も含め、政治団体に入るか抜けるかを自主的に選択する自由
wrong_answers:
  - 既存の国家統治の枠組みの中で、法律や政策について投票する能力
  - 確立された国境内にとどまりながら、市民権の条件について交渉する能力
  - 政党を結成し、民主的参加を通じて意思決定プロセスに影響を与える権利
explanation: |
  真の契約上の自由とは、既存の取り決めに参加するだけでなく、その取り決めに参加するか否かを選択する基本的な自由を必要とする。この文章は、真の契約上の自由とは、署名するかしないか、政治的団体に入るか抜けるかの選択肢を持つことを意味すると強調している。これには、個人の自治の論理的延長としての集団的離脱も含まれる。誤答は、既存の制度における参加の形態について述べているが、政治団体における自発的な結社か強制的なメンバーシップかという核心的な問題には触れていない。
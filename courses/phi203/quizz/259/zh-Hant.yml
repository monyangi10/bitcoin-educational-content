question: 政治組織中真正的契約自由必須區別於純粹參與現存社會契約的基本特徵是什麼？
answer: 選擇自願加入或退出政治團體的自由，包括脫離政治團體的權利
wrong_answers:
  - 在現有的國家治理框架內對法律和政策進行投票的能力
  - 有能力在不超出既定邊界的情況下就公民身份的條款和條件進行談判
  - 組織政黨和透過民主參與影響決策過程的權利
explanation: |
  真正的契約自由不僅需要參與現有的安排，還需要有選擇是否參與這些安排的基本自由。文中強調，真正的契約自由意味著可以選擇簽署或不簽署、加入或退出政治聯盟。這包括集體脫離，作為個人自治的邏輯延伸。錯誤的答案描述了現有體制內的參與形式，但沒有處理自願結社相對於強制加入政治實體的核心問題。
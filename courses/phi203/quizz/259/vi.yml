question: Đặc điểm cơ bản nào phải là yếu tố phân biệt tự do lập hợp đồng thực sự trong tổ chức chính trị với việc chỉ đơn thuần tham gia vào các hợp đồng xã hội hiện có?
answer: Quyền tự do lựa chọn tham gia hay rời khỏi các hiệp hội chính trị một cách tự nguyện, bao gồm cả quyền ly khai.
wrong_answers:
  - Khả năng bỏ phiếu về luật và chính sách trong khuôn khổ quản trị quốc gia hiện hành.
  - Khả năng đàm phán các điều khoản và điều kiện về quyền công dân trong khi vẫn ở trong phạm vi biên giới đã được thiết lập.
  - Quyền thành lập các đảng phái chính trị và ảnh hưởng đến các quá trình ra quyết định thông qua sự tham gia dân chủ.
explanation: |
  Tự do hợp đồng thực sự không chỉ đòi hỏi sự tham gia vào các thỏa thuận hiện có, mà còn là quyền tự do cơ bản để lựa chọn có tham gia vào các thỏa thuận đó hay không. Văn bản nhấn mạnh rằng tự do hợp đồng đích thực có nghĩa là có quyền lựa chọn ký hoặc không ký, tham gia hoặc rời khỏi các hiệp hội chính trị. Điều này bao gồm cả ly khai tập thể như là sự mở rộng hợp lý của quyền tự chủ cá nhân. Các câu trả lời sai mô tả các hình thức tham gia trong các hệ thống hiện có nhưng không giải quyết được vấn đề cốt lõi về sự liên kết tự nguyện so với tư cách thành viên bắt buộc trong các thực thể chính trị.
question: Welches grundlegende Merkmal muss echte Vertragsfreiheit in der politischen Organisation von der bloßen Teilnahme an bestehenden sozialen Verträgen unterscheiden?
answer: Die Freiheit, politischen Vereinigungen freiwillig beizutreten oder sie zu verlassen, einschließlich des Rechts, sich abzuspalten
wrong_answers:
  - Die Möglichkeit, über Gesetze und politische Maßnahmen innerhalb des bestehenden Rahmens der nationalen Regierungsführung abzustimmen
  - Die Fähigkeit, die Bedingungen der Staatsbürgerschaft auszuhandeln und dabei innerhalb der bestehenden Grenzen zu bleiben
  - Das Recht, politische Parteien zu gründen und Entscheidungsprozesse durch demokratische Beteiligung zu beeinflussen
explanation: |
  Echte Vertragsfreiheit setzt nicht nur die Teilnahme an bestehenden Vereinbarungen voraus, sondern auch die grundsätzliche Freiheit zu wählen, ob man überhaupt Teil dieser Vereinbarungen sein möchte. Im Text wird betont, dass echte Vertragsfreiheit bedeutet, die Möglichkeit zu haben, zu unterschreiben oder nicht zu unterschreiben, politischen Vereinigungen beizutreten oder sie zu verlassen. Dies schließt die kollektive Sezession als logische Erweiterung der individuellen Autonomie ein. Die falschen Antworten beschreiben Formen der Beteiligung innerhalb bestehender Systeme, gehen aber nicht auf die Kernfrage der freiwilligen Assoziation gegenüber der Zwangsmitgliedschaft in politischen Einheiten ein.
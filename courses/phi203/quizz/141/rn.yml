question: Ni igiki iyo nseguro yerekana ko ari co catumye ubukomunisita bwa kera bugereranya imipaka y’ishimikiro y’umuntu ku giti ciwe naho bwari buhuye n’ivya kera vyiwe?
answer: Yari ishingiye ku vyiyumviro vya kera vyarazwe n’imibano ya kera cane y’abantu yabuza umuntu kwigenga .
wrong_answers:
  - Yananiwe gutanga umutekano bihagije n'ubushobozi bwo gukora ibikorwa ku mibano yariyemeye .
  - Vyari bikomeye cane kandi vyasaba iterambere ry’ubwenge riteye imbere, ivyo imibano ya kera yari itarashikako .
  - Yatumye haba ubusumbane burengeje urugero hagati y'abantu batandukanye bo mu kibano mu bijanye n'ugusangira ubutunzi .
explanation: |
  Ico canditswe kirasigura yuko uburyo bwose butagira umwidegemvyo, harimwo n’ubukomunisita bwa kera, busangiye akaranga ko bushingiye ku vyiyumviro vya kera cane vyarazwe n’imibano y’abantu ya kera cane. Naho ubukomunisita bwa kera bwari inyishu y’ibintu vy’ubuhinga n’umutekano vy’ico gihe, bwari busanzwe bugereranya imipaka y’ishimikiro y’umuntu ku giti ciwe. Ayandi mahitamwo ntabwo ari yo kubera ko ico canditswe kigaragaza ko ubukomunisita bwa kera mu vy’ukuri bwari bufise intumbero zabwo z’ingirakamaro mu gihe caco, bwari bworoshe aho kuba bugoye, kandi bwari bujanye n’ugusangira aho kurema ubusumbasumbane.
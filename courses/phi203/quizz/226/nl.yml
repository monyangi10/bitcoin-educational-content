question: Welk fundamenteel kenmerk, volgens de principes van contractuele vrijheid, onderscheidt vrijwillige contracten van andere vormen van sociale organisatie?
answer: Het zijn positieve-somspellen waarbij elke partij wederzijds voordeel behaalt via vrij onderhandelde relaties
wrong_answers:
  - Ze vestigen hiërarchische machtsstructuren die de sociale orde waarborgen door middel van gecentraliseerde besluitvorming
  - "Ze creëren nulsomcompetities waarbij de winst van de ene partij noodzakelijkerwijs resulteert in een gelijkwaardig verlies voor de andere partij."
  - Ze fungeren als preventieve reguleringsmechanismen die de samenleving beschermen tegen individueel misbruik voordat dit plaatsvindt
explanation: |
  Het hoofdstuk benadrukt dat vrijwillige contracten een spel zijn waarbij beide partijen zich verrijken omdat elk individu voldoening vindt in deelname in plaats van onthouding. Dit staat in contrast met hiërarchische structuren, zero-sum denken of preventieve systemen die in de tekst expliciet worden bekritiseerd als obstakels voor vrijheid.
question: 계약 자유의 원칙에 따르면, 자발적 계약이 다른 형태의 사회 조직과 구별되는 근본적인 특징은 무엇인가요?
answer: 이는 각 당사자가 자유롭게 협상하는 관계를 통해 상호 이익을 얻는 포지티브섬 게임을 나타냅니다
wrong_answers:
  - 중앙 집중식 의사 결정을 통해 사회 질서를 보장하는 계층적 권력 구조를 확립합니다
  - "한 쪽의 이득이 반드시 다른 쪽의 동등한 손실을 초래하는 제로섬 경쟁을 만듭니다."
  - 이는 개인의 학대가 발생하기 전에 사회를 보호하는 예방적 규제 메커니즘으로 기능합니다
explanation: |
  이 장에서는 자발적 계약이 각 개인이 기권하지 않고 참여함으로써 만족감을 느끼기 때문에 상호 풍요로움이 발생하는 포지티브섬 게임을 구성한다는 점을 강조합니다. 이는 본문에서 자유의 장애물로 명시적으로 비판하는 위계 구조, 제로섬 사고 또는 예방적 시스템과 대조됩니다.
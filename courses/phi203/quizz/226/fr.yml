question: Selon les principes de la liberté contractuelle, quelle est la caractéristique fondamentale qui distingue les contrats volontaires des autres formes d'organisation sociale ?
answer: Il s'agit de jeux à somme positive où chaque partie tire un avantage mutuel grâce à des relations librement négociées
wrong_answers:
  - Ils établissent des structures de pouvoir hiérarchiques qui garantissent l'ordre social par le biais d'une prise de décision centralisée
  - Ils créent des compétitions à somme nulle où le gain d'une partie se traduit nécessairement par une perte équivalente pour l'autre partie
  - Ils fonctionnent comme des mécanismes réglementaires préventifs qui protègent la société des abus individuels avant qu'ils ne se produisent
explanation: |
  Le chapitre souligne que les contrats volontaires constituent des jeux à somme positive où l'enrichissement mutuel se produit parce que chaque individu trouve satisfaction à participer plutôt qu'à s'abstenir. Cela contraste avec les structures hiérarchiques, la pensée à somme nulle ou les systèmes préventifs que le texte critique explicitement comme des obstacles à la liberté.

question: Secondo i principi della libertà contrattuale, quale caratteristica fondamentale distingue i contratti volontari da altre forme di organizzazione sociale?
answer: Rappresentano giochi a somma positiva in cui ogni parte ottiene un vantaggio reciproco attraverso relazioni liberamente negoziate
wrong_answers:
  - Stabiliscono strutture di potere gerarchiche che assicurano l'ordine sociale attraverso un processo decisionale centralizzato
  - "Creano competizioni a somma zero in cui il guadagno di una parte si traduce necessariamente in una perdita equivalente di un'altra parte"
  - Funzionano come meccanismi di regolamentazione preventiva che proteggono la società dagli abusi individuali prima che si verifichino
explanation: |
  Il capitolo sottolinea che i contratti volontari sono giochi a somma positiva in cui si verifica un arricchimento reciproco perché ogni individuo trova soddisfazione nel partecipare piuttosto che nell'astenersi. Questo contrasta con le strutture gerarchiche, il pensiero a somma zero o i sistemi preventivi, che il testo critica esplicitamente come ostacoli alla libertà.
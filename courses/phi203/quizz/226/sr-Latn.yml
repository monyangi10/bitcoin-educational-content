question: Prema principima ugovorne slobode, koja osnovna karakteristika razlikuje dobrovoljne ugovore od drugih oblika društvene organizacije?
answer: Oni predstavljaju igre sa pozitivnim zbirom gde svaka strana stiče uzajamnu prednost kroz slobodno pregovarane odnose
wrong_answers:
  - Oni uspostavljaju hijerarhijske strukture moći koje osiguravaju društveni poredak kroz centralizovano donošenje odluka.
  - "Stvaraju igre sa nultim zbirom gde dobitak jedne strane nužno rezultira ekvivalentnim gubitkom druge strane"
  - Oni funkcionišu kao preventivni regulatorni mehanizmi koji štite društvo od individualnih zloupotreba pre nego što se dese.
explanation: |
  Poglavlje naglašava da dobrovoljni ugovori predstavljaju igre sa pozitivnim zbirom gde dolazi do međusobnog obogaćivanja jer svaka osoba pronalazi zadovoljstvo u učestvovanju, a ne u uzdržavanju. Ovo je u suprotnosti sa hijerarhijskim strukturama, razmišljanjem o nultom zbiru ili preventivnim sistemima koje tekst eksplicitno kritikuje kao prepreke slobodi.
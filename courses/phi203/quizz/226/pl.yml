question: Zgodnie z zasadami swobody umów, jaka podstawowa cecha odróżnia dobrowolne umowy od innych form organizacji społecznej?
answer: Reprezentują one gry o sumie dodatniej, w których każda ze stron zyskuje obopólne korzyści dzięki swobodnie negocjowanym relacjom
wrong_answers:
  - Ustanawiają hierarchiczne struktury władzy, które zapewniają porządek społeczny poprzez scentralizowane podejmowanie decyzji
  - "Tworzą one zawody o sumie zerowej, w których zysk jednej strony koniecznie skutkuje równoważną stratą drugiej strony"
  - Funkcjonują one jako prewencyjne mechanizmy regulacyjne, które chronią społeczeństwo przed indywidualnymi nadużyciami, zanim do nich dojdzie
explanation: |
  Rozdział ten podkreśla, że dobrowolne umowy stanowią gry o sumie dodatniej, w których dochodzi do wzajemnego wzbogacenia, ponieważ każda jednostka znajduje satysfakcję w uczestnictwie, a nie w powstrzymywaniu się od działania. Kontrastuje to z hierarchicznymi strukturami, myśleniem o sumie zerowej lub systemami prewencyjnymi, które tekst wyraźnie krytykuje jako przeszkody dla wolności.
question: Milline põhiline omadus eristab lepinguvabaduse põhimõtete kohaselt vabatahtlikke lepinguid teistest ühiskondliku korralduse vormidest?
answer: Need kujutavad endast positiivse summaga mänge, kus kumbki pool saab vabalt kokkulepitud suhete kaudu vastastikust kasu
wrong_answers:
  - Nad kehtestavad hierarhilised võimustruktuurid, mis tagavad sotsiaalse korra tsentraliseeritud otsuste tegemise kaudu
  - "Nad loovad nullsummalisi võistlusi, kus ühe osapoole võit toob tingimata kaasa teise osapoole samaväärse kaotuse"
  - Nad toimivad ennetavate regulatiivsete mehhanismidena, mis kaitsevad ühiskonda üksikute kuritarvituste eest enne nende toimumist
explanation: |
  Peatükis rõhutatakse, et vabatahtlikud lepingud kujutavad endast positiivse summaga mänge, kus toimub vastastikune rikastumine, sest iga üksikisik leiab rahulolu pigem osalemisest kui loobumisest. See vastandub hierarhilistele struktuuridele, nullsummalisele mõtlemisele või ennetavatele süsteemidele, mida tekstis sõnaselgelt kritiseeritakse kui vabaduse takistusi.
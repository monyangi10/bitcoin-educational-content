question: Menurut prinsip-prinsip kebebasan berkontrak, karakteristik fundamental apa yang membedakan kontrak sukarela dari bentuk-bentuk organisasi sosial lainnya?
answer: Mereka mewakili permainan jumlah positif di mana masing-masing pihak mendapatkan keuntungan bersama melalui hubungan yang dinegosiasikan secara bebas
wrong_answers:
  - Mereka membangun struktur kekuasaan hirarkis yang memastikan ketertiban sosial melalui pengambilan keputusan terpusat
  - "Mereka menciptakan kompetisi zero-sum di mana keuntungan satu pihak harus menghasilkan kerugian yang setara bagi pihak lain"
  - Mereka berfungsi sebagai mekanisme pengaturan preventif yang melindungi masyarakat dari pelanggaran individu sebelum hal itu terjadi
explanation: |
  Bab ini menekankan bahwa kontrak sukarela merupakan permainan positive-sum di mana saling memperkaya terjadi karena setiap individu menemukan kepuasan dalam berpartisipasi daripada tidak berpartisipasi. Hal ini berbeda dengan struktur hirarkis, pemikiran zero-sum, atau sistem pencegahan yang secara eksplisit dikritik oleh teks sebagai penghalang kebebasan.
question: بر اساس اصول آزادی قراردادی، چه ویژگی اساسی قراردادهای داوطلبانه را از سایر اشکال سازمان اجتماعی متمایز می‌کند؟
answer: آن‌ها بازی‌های با مجموع مثبت را نشان می‌دهند که در آن هر طرف از طریق روابطی که به‌طور آزادانه مذاکره شده‌اند، مزیت متقابل کسب می‌کند.
wrong_answers:
  - آن‌ها ساختارهای قدرت سلسله‌مراتبی را ایجاد می‌کنند که از طریق تصمیم‌گیری متمرکز، نظم اجتماعی را تضمین می‌کنند.
  - "آن‌ها رقابت‌های صفر-جمع ایجاد می‌کنند که در آن سود یک طرف لزوماً منجر به زیان معادل طرف دیگر می‌شود"
  - آن‌ها به عنوان مکانیسم‌های نظارتی پیشگیرانه عمل می‌کنند که جامعه را از سوءاستفاده‌های فردی قبل از وقوع محافظت می‌کنند.
explanation: |
  این فصل تأکید می‌کند که قراردادهای داوطلبانه بازی‌های با مجموع مثبت را تشکیل می‌دهند که در آن غنای متقابل رخ می‌دهد زیرا هر فرد رضایت را در شرکت کردن می‌یابد نه در خودداری کردن. این در تضاد با ساختارهای سلسله‌مراتبی، تفکر با مجموع صفر، یا سیستم‌های پیشگیرانه است که متن به‌طور صریح به‌عنوان موانع آزادی از آن‌ها انتقاد می‌کند.
question: Според принципите на договорната свобода коя е основната характеристика, която отличава доброволните договори от другите форми на социална организация?
answer: Те представляват игри с положителна сума, при които всяка от страните печели взаимна изгода чрез свободно договорени отношения
wrong_answers:
  - Те създават йерархични властови структури, които осигуряват социален ред чрез централизирано вземане на решения
  - "Те създават състезания с нулева сума, при които печалбата на една страна задължително води до равностойна загуба на друга."
  - Те функционират като превантивни регулаторни механизми, които защитават обществото от индивидуални злоупотреби, преди те да са се случили
explanation: |
  В тази глава се подчертава, че доброволните договори представляват игри с положителна сума, при които се постига взаимно обогатяване, тъй като всеки индивид намира удовлетворение от участието си, а не от въздържането си. Това контрастира с йерархичните структури, мисленето с нулева сума или превантивните системи, които текстът изрично критикува като пречки пред свободата.
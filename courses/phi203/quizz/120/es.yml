question: ¿Cómo explica el liberalismo económico la relación entre el interés propio y la innovación a la hora de impulsar el progreso de la sociedad?
answer: El interés propio motiva a los individuos a crear innovaciones útiles que satisfagan tanto las necesidades personales como las demandas del mercado, lo que conduce al progreso natural a través del intercambio voluntario
wrong_answers:
  - El interés propio crea una competencia que obliga a las instituciones gubernamentales a innovar de forma más eficiente para mantener sus posiciones monopolísticas en sectores clave
  - "El interés propio impulsa a los individuos a acumular riqueza a costa de otros, lo que requiere una regulación estatal para canalizar esta energía hacia innovaciones socialmente beneficiosas"
  - El interés propio conduce a un pensamiento a corto plazo que inhibe la innovación, por lo que las sociedades deben confiar en la planificación colectiva para lograr el progreso tecnológico a largo plazo
explanation: |
  Según la teoría liberal presentada, el interés propio impulsa naturalmente la innovación porque los individuos que buscan enriquecerse y satisfacer sus necesidades deben actuar de forma útil para los demás. Se crea así un ciclo en el que la satisfacción personal exige aportar valor a la sociedad a través de nuevas soluciones y mejoras. El texto subraya que este interés propio va más allá del egoísmo estrecho e incluye a la familia y los círculos sociales, lo que hace de la innovación una respuesta natural a las circunstancias cambiantes. Las respuestas erróneas tergiversan esta relación sugiriendo que el gobierno puede innovar eficazmente, que la regulación es necesaria para canalizar positivamente el interés propio o que la planificación colectiva supera la iniciativa individual.
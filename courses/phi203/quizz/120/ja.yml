question: 経済的自由主義は、社会の進歩を促す利己心とイノベーションの関係をどのように説明するのか？
answer: 利己心は、個人のニーズと市場の需要の両方を満たす有用なイノベーションを生み出す動機となり、自発的な交換を通じて自然な進歩をもたらす。
wrong_answers:
  - 私利私欲が競争を生み、政府機関は主要部門での独占的地位を維持するために、より効率的な技術革新を余儀なくされる。
  - 「私利私欲のために、個人は他人の犠牲の上に富を蓄積しようとする。
  - 私利私欲は短期的な思考につながり、イノベーションを阻害する。したがって、社会は長期的な技術進歩を達成するために集団的な計画に頼らなければならない
explanation: |
  提示された自由主義理論によれば、利己心がイノベーションを自然に促進する。なぜなら、自分を豊かにし、自分の欲求を満たそうとする個人は、他者にとって有益な行動をとらなければならないからだ。これにより、個人的な満足を得るためには、新たな解決策や改善を通じて社会に価値を提供する必要があるという循環が生まれる。本文では、この利己心が狭いエゴイズムを超えて家族や社会的サークルにまで広がり、イノベーションを状況の変化に対する自然な反応にしていることが強調されている。誤答は、政府が効果的にイノベーションを起こせると示唆したり、自己利益を積極的に導くには規制が必要だと示唆したり、集団的な計画が個人の自発性を凌駕すると示唆したりして、この関係を誤って表現している。
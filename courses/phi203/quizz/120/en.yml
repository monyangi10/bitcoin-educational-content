question: How does economic liberalism explain the relationship between self-interest and innovation in driving societal progress?
answer: Self-interest motivates individuals to create useful innovations that satisfy both personal needs and market demands, leading to natural progress through voluntary exchange
wrong_answers:
  - Self-interest creates competition that forces government institutions to innovate more efficiently to maintain their monopolistic positions in key sectors
  - "Self-interest drives individuals to accumulate wealth at others' expense, requiring state regulation to channel this energy toward socially beneficial innovations"
  - Self-interest leads to short-term thinking that inhibits innovation, so societies must rely on collective planning to achieve long-term technological progress
explanation: |
  According to the liberal theory presented, self-interest naturally drives innovation because individuals seeking to enrich themselves and satisfy their needs must act usefully to others. This creates a cycle where personal satisfaction requires providing value to society through new solutions and improvements. The text emphasizes that this self-interest extends beyond narrow egoism to include family and social circles, making innovation a natural response to changing circumstances. The wrong answers misrepresent this relationship by either suggesting government can innovate effectively, that regulation is needed to channel self-interest positively, or that collective planning surpasses individual initiative.

question: Dushingiye ku ciyumviro c’ubutunzi bw’uburenganzira, ni igiki kiba ku bidukikije vy’ubutunzi iyo ubuhinga bushasha bushizwe mu ngiro neza mu kibano?
answer: Iterambere ryose rihindura ibidukikije vy’ubutunzi, bikaba bisaba ko umuntu aguma avumbura uburyo bushasha bwo gukorana n’ivyo gutorera umuti .
wrong_answers:
  - Ivyiza bishasha biratuma ubutunzi buguma buhamye bigabanya ivyipfuzo vyo gutera imbere mu vy'ubuhinga .
  - Ivyiza bishasha bitera imbere bituma haba uburinganire buhoraho mw'isoko bukuraho imikazo y'uguhiganwa .
  - Iterambere ry'ubutunzi rituma habaho imibumbe idahinduka y'imibano izigama ugutanga neza ubutunzi
explanation: |
  Ico gice kirasigura ko ubuhinga bushasha butera uruziga rw’inguvu aho ugutera imbere kwose guhindura cane ubutunzi abantu bakoreramwo. Iryo hinduka risaba kurondera imigwi mishasha n’imiti yo gutorera umuti ingorane ziriko ziraza. Aho gutuma habaho ugushikama, uguhingura ibintu bishasha biratuma habaho ihinduka ridahera risaba ko umuntu aguma amenyerera. Iciyumviro c’abanyagihugu kivuga ko imibano idashobora kuguma ahantu hamwe ahubwo ko itegerezwa gukora ibintu bishasha ubudasiba kuko iterambere ryose rituma haba ibintu bishasha bisaba inyishu nshasha. Iyi nzira y’inguvu ituma haba ugutera imbere gukomeza n’ugutungana, itandukanye n’inyishu zitari zo zivuga ko uguhingura ibintu bishasha bishikana ku gushikama canke ku bintu bihoraho.
question: Kulingana na 'Kanuni za Siasa' za Benjamin Constant (1815), ni nini kinachochukuliwa kuwa mali takatifu zaidi ya mwanadamu?
answer: Mawazo yake, iwe ni makosa au ukweli
wrong_answers:
  - Mwili wake wa kimwili na mali zake za kimwili
  - Kazi zake zilizoandikwa na ubunifu wa kiakili
  - Haki zake za uhuru wa kujieleza na kujieleza
explanation: |
  Benjamin Constant alisema waziwazi kwamba 'Kosa au ukweli, la pensée de l'homme est sa propriété la plus sacrée' (Kosa au ukweli, mawazo ya mwanadamu ndiyo mali yake takatifu zaidi). Hii inasisitiza kwamba maudhui au usahihi wa mawazo hayana uhusiano na asili yake takatifu kama mali. Chaguzi zingine, ingawa zinahusiana na haki za mtu binafsi, zinakosa mwelekeo maalum wa Constant kwenye mawazo yenyewe kama aina ya msingi zaidi ya mali. Mali ya kimwili ni mali ya kimwili, kazi zilizoandikwa ni misemo ya mawazo badala ya mawazo yenyewe, na haki za usemi ni njia za kuelezea mawazo, lakini hakuna inayokamata madai ya Constant kuhusu ukuu wa mawazo kama mali takatifu zaidi bila kujali thamani yake ya ukweli.
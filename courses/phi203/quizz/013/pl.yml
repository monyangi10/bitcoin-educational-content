question: Według "Zasad polityki" Benjamina Constanta (1815), co jest uważane za najświętszą własność człowieka?
answer: Jego myśl, czy to błąd, czy prawda
wrong_answers:
  - Jego ciało fizyczne i dobra materialne
  - Jego prace pisemne i dzieła intelektualne
  - Jego prawa do wolności słowa i wyrażania opinii
explanation: |
  Benjamin Constant wyraźnie stwierdził, że "Error or vérité, la pensée de l'homme est sa propriété la plus sacrée" (Błąd czy prawda, myśl człowieka jest jego najświętszą własnością). Podkreśla to, że treść lub dokładność myśli nie ma znaczenia dla jej świętej natury jako własności. Inne opcje, choć związane z prawami jednostki, pomijają szczególny nacisk Constanta na samą myśl jako najbardziej fundamentalną formę własności. Własność fizyczna jest własnością materialną, dzieła pisane są raczej wyrazem myśli niż samą myślą, a prawa do wypowiedzi są mechanizmami wyrażania myśli, ale żadna z nich nie oddaje twierdzenia Constanta o prymacie myśli jako najświętszej własności, niezależnie od jej wartości prawdy.
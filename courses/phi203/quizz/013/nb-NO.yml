question: Hva regnes som menneskets helligste eiendom, ifølge Benjamin Constants "Principles of Politics" (1815)?
answer: Hans tanke, enten det er feil eller sannhet
wrong_answers:
  - Hans fysiske kropp og materielle eiendeler
  - Hans skrevne verker og intellektuelle frembringelser
  - Hans ytringsfrihet og rett til å ytre seg
explanation: |
  Benjamin Constant uttalte eksplisitt at "Error or vérité, la pensée de l'homme est sa propriété la plus sacrée" (Feil eller sannhet, menneskets tanke er hans mest hellige eiendom). Dette understreker at tankens innhold eller nøyaktighet er irrelevant for dens hellige karakter som eiendom. De andre alternativene, som er relatert til individuelle rettigheter, går glipp av Constants spesifikke fokus på selve tanken som den mest fundamentale formen for eiendom. Fysiske eiendeler er materiell eiendom, skrevne verker er uttrykk for tanken snarere enn tanken selv, og talerettigheter er mekanismer for å uttrykke tanken, men ingen av dem fanger opp Constants påstand om tankens forrang som den helligste eiendommen, uavhengig av dens sannhetsverdi.
question: Co je podle knihy Benjamina Constanta "Principy politiky" (1815) považováno za nejsvětější majetek člověka?
answer: Jeho myšlenka, ať už je to omyl, nebo pravda
wrong_answers:
  - Jeho fyzické tělo a hmotný majetek
  - Jeho písemná díla a intelektuální výtvory
  - Jeho právo na svobodu slova a projevu
explanation: |
  Benjamin Constant výslovně prohlásil, že "Error or vérité, la pensée de l'homme est sa propriété la plus sacrée" (Omyl nebo pravda, myšlení člověka je jeho nejposvátnějším vlastnictvím). Tím zdůrazňuje, že obsah či správnost myšlenky je pro její posvátnou povahu jakožto vlastnictví irelevantní. Ostatní možnosti, ačkoli se týkají individuálních práv, postrádají Constantovo specifické zaměření na samotné myšlení jako nejzákladnější formu vlastnictví. Fyzický majetek je hmotným vlastnictvím, psaná díla jsou spíše vyjádřením myšlenky než myšlenkou samotnou a práva na řeč jsou mechanismy pro vyjádření myšlenky, ale žádné z nich nevystihuje Constantovo tvrzení o primátu myšlenky jako nejposvátnějšího vlastnictví bez ohledu na její pravdivostní hodnotu.
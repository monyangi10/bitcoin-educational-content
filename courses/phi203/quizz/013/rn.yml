question: Dukurikije igitabu ca Benjamin Constant citwa ‘Ingingo ngenderwako za politike’ (1815), ni igiki kibonwa ko ari co kintu ceranda kuruta ibindi vyose umuntu afise?
answer: Iciyumviro ciwe, caba ari amakosa canke ukuri .
wrong_answers:
  - Umubiri wiwe w’umubiri be n’ibintu vyiwe vy’umubiri .
  - Ibikorwa vyiwe vyanditswe n'ivyo yaremye mu bwenge .
  - Umwidegemvyo wiwe wo kuvuga no kuvuga ivyiyumviro vyiwe .
explanation: |
  Benjamin Constant yavuze mu buryo butomoye ati: ‘Ikosa canke ukuri, iciyumviro c’umuntu ni co gifise uburenganzira bwo gukorana n’ibintu vyeranda’ (Ikosa canke ukuri, iciyumviro c’umuntu ni co kintu ciwe ceranda kuruta ibindi vyose). Ivyo bishimika ku vy’uko ibirimwo canke ukuri kw’iciyumviro ataco bihuriyeko n’akameremere kaco k’ukwera nk’umutungo. Ibindi bihitamwo, naho bifitaniye isano n’uburenganzira bw’umuntu ku giti ciwe, birabura ivyiyumviro vyihariye vya Constant ku ciyumviro ubwaco nk’uburyo bw’ishimikiro kuruta ubundi bwose bw’itunga. Ivy’umubiri ni umutungo w’umubiri, ibikorwa vyanditswe ni imvugo z’ivyiyumviro aho kuba iciyumviro ubwaco, kandi uburenganzira bwo kuvuga ni uburyo bwo guserura iciyumviro, ariko nta na kimwe gifata ivyo Constant yemeza ku bijanye n’ubukuru bw’ivyiyumviro nk’umutungo mweranda kuruta iyindi yose ata kuraba agaciro kavyo k’ukuri.
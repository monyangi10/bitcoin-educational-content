question: Hva var den viktigste grunnen til at forhistoriske samfunn praktiserte kollektivt eierskap i stedet for privat eiendom?
answer: Materielle begrensninger krevde nomadisk livsstil og store områder for jakt og sanking
wrong_answers:
  - Religiøs tro tilsa at all eiendom skulle deles likt mellom stammens medlemmer
  - Politiske ledere innførte kollektivt eierskap for å opprettholde kontrollen over befolkningen
  - Moralske prinsipper vektla fellesskapets solidaritet fremfor individuell materiell akkumulering
explanation: |
  Ifølge kapitlet var kollektivt eierskap i forhistoriske samfunn ikke drevet av ideologi eller preferanser, men av praktisk nødvendighet. Aktiviteter som bisonjakt krevde nomadisk forflytning over store territorier, noe som gjorde det umulig å etablere privat eiendomsrett på små, avgrensede områder. De materielle begrensningene for å overleve - behovet for store områder for jakt, fiske og sanking - gjorde kollektiv eiendom til en rasjonell tilpasning til miljøforholdene, ikke et bevisst ideologisk valg.
question: Vilken var den främsta anledningen till att förhistoriska samhällen praktiserade kollektivt ägande snarare än privat egendom?
answer: Materiella begränsningar krävde nomadliv och vidsträckta områden för jakt- och samlaraktiviteter
wrong_answers:
  - Religiösa övertygelser föreskrev att all egendom skulle delas lika mellan stammens medlemmar
  - Politiska ledare införde kollektivt ägande för att behålla kontrollen över befolkningen
  - Moraliska principer betonade samhällssolidaritet framför individuell materiell ackumulering
explanation: |
  Enligt kapitlet drevs kollektivt ägande i förhistoriska samhällen inte av ideologi eller preferenser, utan av praktisk nödvändighet. Aktiviteter som bisonjakt krävde nomadiska förflyttningar över stora territorier, vilket gjorde det omöjligt att etablera privat markägande på små slutna områden. De materiella begränsningarna för överlevnad - behovet av stora områden för jakt, fiske och insamling - gjorde kollektiv egendom till en rationell anpassning till miljöförhållandena, inte ett medvetet ideologiskt val.
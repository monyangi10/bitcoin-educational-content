question: ¿Cuál era la razón principal por la que las sociedades prehistóricas practicaban la propiedad colectiva en lugar de la propiedad privada?
answer: Las limitaciones materiales exigían un estilo de vida nómada y vastos territorios para las actividades de caza y recolección
wrong_answers:
  - Las creencias religiosas ordenaban que todos los bienes se repartieran equitativamente entre los miembros de la tribu
  - Los dirigentes políticos impusieron la propiedad colectiva para mantener el control sobre la población
  - Los principios morales primaban la solidaridad comunitaria sobre la acumulación material individual
explanation: |
  Según el capítulo, la propiedad colectiva en las sociedades prehistóricas no estaba impulsada por ideologías o preferencias, sino por necesidades prácticas. Actividades como la caza del bisonte exigían desplazamientos nómadas a través de vastos territorios, por lo que resultaba imposible establecer la propiedad privada de la tierra en pequeñas áreas cerradas. Las limitaciones materiales de la supervivencia -necesidad de grandes espacios para cazar, pescar y recolectar- hacían de la propiedad colectiva una adaptación racional a las condiciones ambientales, no una elección ideológica consciente.
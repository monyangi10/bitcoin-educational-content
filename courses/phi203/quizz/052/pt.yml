question: Qual era a principal razão pela qual as sociedades pré-históricas praticavam a propriedade colectiva em vez da propriedade privada?
answer: As limitações materiais exigiam um estilo de vida nómada e vastos territórios para actividades de caça e recolha
wrong_answers:
  - As crenças religiosas obrigavam a que todos os bens fossem partilhados igualmente entre os membros da tribo
  - Os líderes políticos impuseram a propriedade colectiva para manter o controlo sobre a população
  - Os princípios morais privilegiavam a solidariedade comunitária em detrimento da acumulação material individual
explanation: |
  De acordo com o capítulo, a propriedade colectiva nas sociedades pré-históricas não era motivada por ideologias ou preferências, mas por necessidades práticas. Actividades como a caça ao bisonte exigiam movimentos nómadas através de vastos territórios, tornando impossível estabelecer a propriedade privada da terra em pequenas áreas fechadas. Os constrangimentos materiais da sobrevivência - necessidade de grandes espaços para caçar, pescar e recolher - fizeram da propriedade colectiva uma adaptação racional às condições ambientais e não uma escolha ideológica consciente.
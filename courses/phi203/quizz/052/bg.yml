question: Коя е основната причина праисторическите общества да практикуват колективна, а не частна собственост?
answer: Материалните ограничения са изисквали номадски начин на живот и обширни територии за лов и събирателство
wrong_answers:
  - Религиозните вярвания налагат цялата собственост да се разпределя поравно между членовете на племето
  - Политическите лидери наложиха колективна собственост, за да запазят контрола над населението
  - Моралните принципи наблягат на солидарността в общността, а не на индивидуалното материално натрупване
explanation: |
  Според тази глава колективната собственост в праисторическите общества не се е определяла от идеология или предпочитания, а от практическа необходимост. Дейности като лова на бизони са изисквали номадско придвижване из обширни територии, което е правело невъзможно установяването на частна собственост върху малки затворени територии. Материалните ограничения на оцеляването - нуждата от големи пространства за лов, риболов и събиране - са превърнали колективната собственост в рационална адаптация към условията на средата, а не в съзнателен идеологически избор.
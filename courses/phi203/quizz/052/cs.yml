question: Jaký byl hlavní důvod, proč pravěké společnosti praktikovaly kolektivní vlastnictví namísto soukromého?
answer: Materiální omezení vyžadovala kočovný způsob života a rozsáhlá území pro lov a sběr
wrong_answers:
  - Náboženská víra nařizovala, aby se veškerý majetek dělil rovným dílem mezi členy kmene
  - Političtí vůdci zavedli kolektivní vlastnictví, aby si udrželi kontrolu nad obyvatelstvem
  - Morální principy kladly důraz na komunitní solidaritu před individuálním hromaděním materiálu
explanation: |
  Podle této kapitoly nebylo kolektivní vlastnictví v pravěkých společnostech vedeno ideologií nebo preferencemi, ale praktickou nutností. Činnosti jako lov bizonů vyžadovaly kočovný pohyb po rozsáhlých územích, což znemožňovalo vytvořit soukromé vlastnictví půdy na malých uzavřených územích. Materiální omezení pro přežití - potřeba velkých prostor pro lov, rybolov a sběr - způsobila, že kolektivní vlastnictví bylo racionální adaptací na podmínky prostředí, nikoli vědomou ideologickou volbou.
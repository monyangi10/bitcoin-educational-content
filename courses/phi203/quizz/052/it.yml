question: Qual era la ragione principale per cui le società preistoriche praticavano la proprietà collettiva piuttosto che quella privata?
answer: I vincoli materiali richiedevano uno stile di vita nomade e vasti territori per le attività di caccia e raccolta
wrong_answers:
  - Le credenze religiose impongono che tutte le proprietà siano condivise equamente tra i membri della tribù
  - I leader politici imposero la proprietà collettiva per mantenere il controllo sulla popolazione
  - I principi morali enfatizzavano la solidarietà comunitaria rispetto all'accumulo materiale individuale
explanation: |
  Secondo il capitolo, la proprietà collettiva nelle società preistoriche non era guidata da ideologia o preferenze, ma da necessità pratiche. Attività come la caccia al bisonte richiedevano spostamenti nomadi su vasti territori, rendendo impossibile stabilire la proprietà privata della terra su piccole aree recintate. I vincoli materiali della sopravvivenza - la necessità di ampi spazi per la caccia, la pesca e la raccolta - rendevano la proprietà collettiva un adattamento razionale alle condizioni ambientali, non una scelta ideologica consapevole.
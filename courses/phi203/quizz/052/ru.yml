question: Какова была основная причина, по которой в доисторических обществах практиковалась коллективная, а не частная собственность?
answer: Материальные трудности требовали кочевого образа жизни и обширных территорий для охоты и собирательства
wrong_answers:
  - Религиозные убеждения требовали, чтобы все имущество делилось поровну между членами племени
  - Политические лидеры ввели коллективную собственность, чтобы сохранить контроль над населением
  - Моральные принципы ставили во главу угла общественную солидарность, а не индивидуальное материальное накопление
explanation: |
  Согласно этой главе, коллективная собственность в доисторических обществах была обусловлена не идеологией или предпочтениями, а практической необходимостью. Такие виды деятельности, как охота на бизонов, требовали кочевого передвижения по обширным территориям, что делало невозможным создание частной собственности на небольшие огороженные участки. Материальные ограничения выживания - необходимость больших пространств для охоты, рыбалки и собирательства - делали коллективную собственность рациональной адаптацией к условиям окружающей среды, а не сознательным идеологическим выбором.
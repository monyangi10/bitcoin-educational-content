question: Wat was de belangrijkste reden waarom prehistorische samenlevingen collectief eigendom gebruikten in plaats van privébezit?
answer: Materiële beperkingen vereisten een nomadische levensstijl en uitgestrekte gebieden voor jagen en verzamelen
wrong_answers:
  - Religieuze overtuigingen bepaalden dat alle bezittingen gelijk verdeeld moesten worden onder de stamleden
  - Politieke leiders legden collectief eigendom op om controle over de bevolking te houden
  - Morele principes benadrukten solidariteit binnen de gemeenschap boven individuele materiële accumulatie
explanation: |
  Volgens het hoofdstuk werd collectief eigendom in prehistorische samenlevingen niet gedreven door ideologie of voorkeur, maar door praktische noodzaak. Voor activiteiten als de jacht op bizons was nomadische verplaatsing over uitgestrekte gebieden nodig, waardoor het onmogelijk was om privébezit van land te vestigen op kleine omsloten gebieden. De materiële beperkingen om te overleven - grote ruimten nodig voor jagen, vissen en verzamelen - maakten collectief eigendom een rationele aanpassing aan de omgevingsomstandigheden, geen bewuste ideologische keuze.
question: Lý do chính khiến các xã hội tiền sử thực hành chế độ sở hữu tập thể thay vì sở hữu tư nhân là gì?
answer: Những hạn chế về vật chất đã buộc lối sống du mục và những vùng lãnh thổ rộng lớn phải phục vụ cho hoạt động săn bắn và hái lượ
wrong_answers:
  - Tín ngưỡng tôn giáo quy định rằng tất cả tài sản phải được chia đều cho các thành viên bộ lạc.
  - Các nhà lãnh đạo chính trị áp đặt chế độ sở hữu tập thể để duy trì quyền kiểm soát đối với dân chúng.
  - Các nguyên tắc đạo đức nhấn mạnh tinh thần đoàn kết cộng đồng hơn là sự tích lũy vật chất cá nhân.
explanation: |
  Theo chương này, quyền sở hữu tập thể trong các xã hội tiền sử không phải do hệ tư tưởng hay sở thích thúc đẩy, mà là do nhu cầu thực tiễn. Các hoạt động như săn bắn bò rừng đòi hỏi sự di chuyển du mục trên những vùng lãnh thổ rộng lớn, khiến việc thiết lập quyền sở hữu đất tư nhân trên những khu vực nhỏ hẹp là điều không thể. Những hạn chế về vật chất để sinh tồn - cần không gian rộng lớn để săn bắn, đánh bắt cá và hái lượm - đã biến quyền sở hữu tập thể thành một sự thích nghi hợp lý với điều kiện môi trường, chứ không phải là một lựa chọn hệ tư tưởng có ý thức.
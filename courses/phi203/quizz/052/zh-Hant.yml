question: 史前社會實行集體所有而非私有財產的主要原因是什麼？
answer: 物質的限制需要游牧的生活方式和廣闊的領土來進行狩獵和採集活動
wrong_answers:
  - 宗教信仰規定所有財產應由部落成員平等分享
  - 政治領袖強制實施集體所有制，以維持對人口的控制
  - 道德原則強調社區團結，而非個人的物質累積
explanation: |
  本章指出，史前社會的集體所有權並非受意識形態或偏好所驅使，而是基於實際需要。狩獵野牛等活動需要在廣闊的領土上遊牧，因此不可能在小範圍的封閉土地上建立私人土地所有權。生存的物質限制--需要狩獵、捕魚和採集的廣闊空間--使得集體財產成為對環境條件的理性適應，而不是有意識的意識形態選擇。
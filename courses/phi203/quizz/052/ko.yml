question: 선사 시대 사회가 사유 재산이 아닌 공동 소유를 실천한 주된 이유는 무엇이었나요?
answer: 물질적 제약으로 인해 유목 생활 방식과 사냥 및 채집 활동을 위한 광활한 영토가 필요했습니다
wrong_answers:
  - 종교적 신념에 따라 모든 재산은 부족원들이 평등하게 공유해야 합니다
  - 정치 지도자들은 인구에 대한 통제력을 유지하기 위해 집단적 소유권을 부과했습니다
  - 도덕적 원칙은 개인의 물질적 축적보다 공동체 연대를 강조했습니다
explanation: |
  이 장에 따르면 선사 시대 사회의 공동 소유는 이념이나 선호에 의한 것이 아니라 실질적인 필요에 의해 이루어졌습니다. 들소 사냥과 같은 활동은 광활한 영토를 가로지르는 유목 이동이 필요했기 때문에 좁은 밀폐된 지역에서 사유지 소유권을 확립하는 것은 불가능했습니다. 사냥, 낚시, 채집을 위한 넓은 공간이 필요하다는 생존의 물질적 제약으로 인해 공동 재산은 의식적인 이념적 선택이 아니라 환경 조건에 대한 합리적 적응이 되었습니다.
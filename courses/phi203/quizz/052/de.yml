question: Was war der Hauptgrund, warum prähistorische Gesellschaften kollektives Eigentum anstelle von Privateigentum praktizierten?
answer: Materielle Zwänge erforderten eine nomadische Lebensweise und weite Gebiete für Jagd- und Sammeltätigkeiten
wrong_answers:
  - Religiöse Überzeugungen verlangten, dass alles Eigentum gleichmäßig unter den Stammesmitgliedern aufgeteilt werden sollte
  - Die politischen Führer führten kollektives Eigentum ein, um die Kontrolle über die Bevölkerung zu behalten
  - Moralische Grundsätze betonten die gemeinschaftliche Solidarität gegenüber der individuellen materiellen Akkumulation
explanation: |
  Dem Kapitel zufolge wurde der kollektive Besitz in prähistorischen Gesellschaften nicht durch Ideologie oder Vorlieben, sondern durch praktische Notwendigkeiten bestimmt. Aktivitäten wie die Bisonjagd erforderten eine nomadische Bewegung über weite Gebiete, was es unmöglich machte, privaten Landbesitz auf kleinen umschlossenen Flächen zu begründen. Die materiellen Zwänge des Überlebens - man brauchte große Flächen zum Jagen, Fischen und Sammeln - machten kollektiven Besitz zu einer rationalen Anpassung an die Umweltbedingungen, nicht zu einer bewussten ideologischen Entscheidung.
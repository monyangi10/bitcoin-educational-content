question: เหตุผลหลักที่ทำให้สังคมยุคก่อนประวัติศาสตร์ปฏิบัติการเป็นเจ้าของร่วมกันแทนที่จะเป็นทรัพย์สินส่วนตัวคืออะไร?
answer: ข้อจำกัดของวัสดุทำให้ต้องมีวิถีชีวิตแบบเร่ร่อนและดินแดนอันกว้างใหญ่สำหรับกิจกรรมล่าสัตว์และเก็บของป่า
wrong_answers:
  - ความเชื่อทางศาสนากำหนดว่าทรัพย์สินทั้งหมดควรแบ่งปันอย่างเท่าเทียมกันในหมู่สมาชิกของเผ่า
  - ผู้นำทางการเมืองกำหนดความเป็นเจ้าของร่วมกันเพื่อรักษาการควบคุมประชากร
  - หลักศีลธรรมเน้นความเป็นน้ำหนึ่งใจเดียวกันของชุมชนมากกว่าการสะสมวัตถุส่วนบุคคล
explanation: |
  ตามบทนี้ การเป็นเจ้าของร่วมกันในสังคมก่อนประวัติศาสตร์ไม่ได้ขับเคลื่อนด้วยอุดมการณ์หรือความชอบ แต่เกิดจากความจำเป็นในทางปฏิบัติ กิจกรรมเช่นการล่าบัฟฟาโลต้องการการเคลื่อนที่แบบเร่ร่อนข้ามดินแดนอันกว้างใหญ่ ทำให้ไม่สามารถสร้างกรรมสิทธิ์ที่ดินส่วนตัวในพื้นที่เล็ก ๆ ที่ถูกล้อมได้ ข้อจำกัดทางวัตถุของการอยู่รอด - การต้องการพื้นที่ขนาดใหญ่สำหรับการล่า การตกปลา และการเก็บเกี่ยว - ทำให้ทรัพย์สินร่วมกันเป็นการปรับตัวที่มีเหตุผลต่อสภาพแวดล้อม ไม่ใช่การเลือกทางอุดมการณ์ที่มีสติ
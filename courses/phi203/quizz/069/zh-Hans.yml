question: 资本主义的发展如何影响社会对创新者的待遇？
answer: 创新者从受迫害到成为现代社会的英雄
wrong_answers:
  - 在所有历史时期，创新者始终受到迫害
  - 无论经济制度如何，创新者总是备受赞誉
  - 随着资本主义的进一步发展，创新者日益被边缘化
explanation: |
  本章阐述了资本主义和物质条件的改善从根本上改变了社会与创新的关系。在中世纪，创新者受到迫害，因为他们给日复一日、几乎没有盈余的社会带来了不确定性。然而，随着资本主义的发展并创造了更好的物质条件和盈余，社会对不确定性和变革变得更加宽容。这种转变使创新者成为现代社会的英雄，而不是社会稳定的威胁。
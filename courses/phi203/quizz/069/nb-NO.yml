question: Hvordan påvirket kapitalismens utvikling behandlingen av innovatører i samfunnet?
answer: Innovatører gikk fra å bli forfulgt til å bli helter i moderne samfunn
wrong_answers:
  - Innovatører ble konsekvent forfulgt gjennom alle historiske perioder
  - Innovatører ble alltid hyllet, uavhengig av hvilket økonomisk system som var på plass
  - Innovatørene ble stadig mer marginaliserte etter hvert som kapitalismen utviklet seg videre
explanation: |
  Kapitalismen og de forbedrede materielle betingelsene endret samfunnets forhold til innovasjon på en grunnleggende måte. I middelalderen ble innovatører forfulgt fordi de skapte usikkerhet i samfunn som levde fra dag til dag med lite overskudd. Men etter hvert som kapitalismen utviklet seg og skapte bedre materielle forhold med overskudd, ble samfunnene mer tolerante overfor usikkerhet og endring. Denne forvandlingen gjorde innovatørene til helter i moderne samfunn snarere enn til trusler mot den sosiale stabiliteten.
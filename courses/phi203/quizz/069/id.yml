question: Bagaimana perkembangan kapitalisme memengaruhi perlakuan terhadap para inovator di masyarakat?
answer: Para inovator bertransformasi dari dianiaya menjadi pahlawan masyarakat modern
wrong_answers:
  - Para inovator tetap secara konsisten dianiaya sepanjang periode sejarah
  - Para inovator selalu dirayakan terlepas dari sistem ekonomi yang berlaku
  - Inovator menjadi semakin terpinggirkan ketika kapitalisme berkembang lebih jauh
explanation: |
  Bab ini menjelaskan bahwa kapitalisme dan kondisi material yang membaik secara fundamental mengubah hubungan masyarakat dengan inovasi. Pada abad pertengahan, para inovator dianiaya karena mereka menciptakan ketidakpastian dalam masyarakat yang hidup sehari-hari dengan sedikit surplus. Namun, ketika kapitalisme berkembang dan menciptakan kondisi material yang lebih baik dengan surplus, masyarakat menjadi lebih toleran terhadap ketidakpastian dan perubahan. Transformasi ini membuat para inovator menjadi pahlawan bagi masyarakat modern dan bukannya ancaman bagi stabilitas sosial.
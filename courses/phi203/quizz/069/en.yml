question: How did the development of capitalism affect the treatment of innovators in society?
answer: Innovators transformed from being persecuted to becoming heroes of modern societies
wrong_answers:
  - Innovators remained consistently persecuted throughout all historical periods
  - Innovators were always celebrated regardless of the economic system in place
  - Innovators became increasingly marginalized as capitalism developed further
explanation: |
  The chapter explains that capitalism and improved material conditions fundamentally changed society's relationship with innovation. In medieval times, innovators were persecuted because they created uncertainty in societies that lived day-to-day with little surplus. However, as capitalism developed and created better material conditions with surpluses, societies became more tolerant of uncertainty and change. This transformation made innovators into heroes of modern societies rather than threats to social stability.

question: Kako je razvoj kapitalizma uticao na tretman inovatora u društvu?
answer: Inovatori su se transformisali od progonjenih do heroja modernih društava
wrong_answers:
  - Inovatori su ostali dosledno progonjeni kroz sve istorijske periode
  - Inovatori su uvek bili slavljeni bez obzira na ekonomski sistem koji je bio na snazi
  - Inovatori su postajali sve više marginalizovani kako se kapitalizam dalje razvijao
explanation: |
  Poglavlje objašnjava da su kapitalizam i poboljšani materijalni uslovi fundamentalno promenili odnos društva prema inovacijama. U srednjem veku, inovatori su bili progonjeni jer su stvarali nesigurnost u društvima koja su živela iz dana u dan sa malo viška. Međutim, kako se kapitalizam razvijao i stvarao bolje materijalne uslove sa viškovima, društva su postala tolerantnija prema nesigurnosti i promenama. Ova transformacija je učinila inovatore herojima modernih društava, umesto pretnjama društvenoj stabilnosti.
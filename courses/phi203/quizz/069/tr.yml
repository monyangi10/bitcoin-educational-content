question: Kapitalizmin gelişimi toplumda yenilikçilere yapılan muameleyi nasıl etkiledi?
answer: Yenilikçiler zulüm görmekten modern toplumların kahramanlarına dönüştüler
wrong_answers:
  - Yenilikçiler tüm tarihsel dönemler boyunca sürekli olarak zulüm görmüştür
  - Yenilikçiler, yürürlükteki ekonomik sistemden bağımsız olarak her zaman kutlanmıştır
  - Kapitalizm daha da geliştikçe yenilikçiler giderek marjinalleşti
explanation: |
  Bu bölüm, kapitalizmin ve gelişen maddi koşulların toplumun inovasyonla olan ilişkisini temelden değiştirdiğini açıklamaktadır. Ortaçağda, yenilikçiler zulüm görüyordu çünkü çok az fazlalıkla günü gününe yaşayan toplumlarda belirsizlik yaratıyorlardı. Ancak kapitalizm geliştikçe ve fazlalıklarla daha iyi maddi koşullar yarattıkça, toplumlar belirsizliğe ve değişime daha toleranslı hale geldi. Bu dönüşüm, yenilikçileri toplumsal istikrara yönelik tehditler olmaktan ziyade modern toplumların kahramanları haline getirmiştir.
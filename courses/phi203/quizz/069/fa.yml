question: توسعه سرمایه‌داری چگونه بر رفتار با نوآوران در جامعه تأثیر گذاشت؟
answer: نوآوران از تحت تعقیب بودن به قهرمانان جوامع مدرن تبدیل شدند
wrong_answers:
  - نوآوران در تمام دوره‌های تاریخی به طور مداوم تحت آزار و اذیت قرار گرفته‌اند.
  - نوآوران همیشه مورد تقدیر قرار می‌گرفتند، صرف‌نظر از سیستم اقتصادی موجود.
  - نوآوران با توسعه بیشتر سرمایه‌داری به طور فزاینده‌ای به حاشیه رانده شدند
explanation: |
  این فصل توضیح می‌دهد که سرمایه‌داری و بهبود شرایط مادی به طور اساسی رابطه جامعه با نوآوری را تغییر دادند. در زمان‌های قرون وسطی، نوآوران تحت تعقیب قرار می‌گرفتند زیرا آن‌ها عدم قطعیت را در جوامعی که روز به روز با کمبود مازاد زندگی می‌کردند، ایجاد می‌کردند. اما با توسعه سرمایه‌داری و ایجاد شرایط مادی بهتر با مازاد، جوامع نسبت به عدم قطعیت و تغییر تحمل بیشتری پیدا کردند. این تحول باعث شد که نوآوران به جای تهدیدی برای ثبات اجتماعی، به قهرمانان جوامع مدرن تبدیل شوند.
question: Miten kapitalismin kehitys vaikutti innovaattoreiden kohteluun yhteiskunnassa?
answer: Innovaattorit muuttuivat vainotuista nyky-yhteiskuntien sankareiksi
wrong_answers:
  - Innovaattoreita vainottiin johdonmukaisesti kaikkina historiallisina aikoina
  - Innovaattoreita on aina juhlittu vallitsevasta talousjärjestelmästä riippumatta
  - Innovaattorit syrjäytyivät yhä enemmän kapitalismin kehittyessä edelleen
explanation: |
  Luvussa selitetään, että kapitalismi ja parantuneet aineelliset olosuhteet muuttivat perusteellisesti yhteiskunnan suhdetta innovaatioihin. Keskiajalla innovaattoreita vainottiin, koska he loivat epävarmuutta yhteiskuntiin, jotka elivät päivästä toiseen vähäisellä ylijäämällä. Kun kapitalismi kuitenkin kehittyi ja loi paremmat aineelliset olosuhteet ylijäämien myötä, yhteiskunnista tuli suvaitsevaisempia epävarmuutta ja muutosta kohtaan. Tämä muutos teki innovaattoreista pikemminkin nykyaikaisten yhteiskuntien sankareita kuin uhkia yhteiskunnalliselle vakaudelle.
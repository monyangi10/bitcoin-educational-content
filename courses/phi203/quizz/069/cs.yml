question: Jak ovlivnil rozvoj kapitalismu zacházení s inovátory ve společnosti?
answer: Inovátoři se z pronásledovaných stali hrdiny moderních společností
wrong_answers:
  - Inovátoři zůstávali důsledně pronásledováni ve všech historických obdobích
  - Inovátoři byli vždy oslavováni bez ohledu na existující ekonomický systém
  - S dalším rozvojem kapitalismu byli inovátoři stále více marginalizováni
explanation: |
  Kapitola vysvětluje, že kapitalismus a lepší materiální podmínky zásadně změnily vztah společnosti k inovacím. Ve středověku byli inovátoři pronásledováni, protože vytvářeli nejistotu ve společnostech, které žily ze dne na den s malým přebytkem. S rozvojem kapitalismu a vytvářením lepších materiálních podmínek s přebytky se však společnosti staly tolerantnějšími k nejistotě a změnám. Díky této proměně se inovátoři stali hrdiny moderních společností, nikoliv hrozbou pro společenskou stabilitu.
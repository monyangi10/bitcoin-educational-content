question: Wie hat sich die Entwicklung des Kapitalismus auf die Behandlung von Innovatoren in der Gesellschaft ausgewirkt?
answer: Innovatoren werden von Verfolgten zu Helden der modernen Gesellschaft
wrong_answers:
  - Innovatoren wurden in allen historischen Epochen konsequent verfolgt
  - Innovatoren wurden immer gefeiert, unabhängig vom jeweiligen Wirtschaftssystem
  - Mit der Weiterentwicklung des Kapitalismus wurden die Innovatoren zunehmend an den Rand gedrängt
explanation: |
  Das Kapitel erklärt, dass der Kapitalismus und die verbesserten materiellen Bedingungen das Verhältnis der Gesellschaft zur Innovation grundlegend verändert haben. Im Mittelalter wurden Innovatoren verfolgt, weil sie in Gesellschaften, die tagtäglich mit wenig Überschuss lebten, für Unsicherheit sorgten. Als sich jedoch der Kapitalismus entwickelte und bessere materielle Bedingungen mit Überschüssen schuf, wurden die Gesellschaften toleranter gegenüber Unsicherheit und Wandel. Dieser Wandel machte die Innovatoren zu Helden der modernen Gesellschaft und nicht zu einer Bedrohung für die soziale Stabilität.
question: Maendeleo ya ubepari yaliathiri vipi jinsi wavumbuzi wanavyotendewa katika jamii?
answer: Wavumbuzi walibadilika kutoka kuteswa hadi kuwa mashujaa wa jamii za kisasa
wrong_answers:
  - Wavumbuzi waliendelea kuteswa kila mara katika vipindi vyote vya kihistoria
  - Wavumbuzi walisherehekewa kila mara bila kujali mfumo wa kiuchumi uliopo
  - Wavumbuzi walizidi kutengwa kadri ubepari ulivyoendelea kukua
explanation: |
  Sura hiyo inaelezea kwamba ubepari na hali bora ya nyenzo zilibadilisha kimsingi uhusiano wa jamii na uvumbuzi. Katika nyakati za enzi za kati, wavumbuzi waliteswa kwa sababu waliunda kutokuwa na uhakika katika jamii zilizoishi kila siku na ziada kidogo. Hata hivyo, kadri ubepari ulivyoendelea na kuunda hali bora ya nyenzo zenye ziada, jamii zilizidi kuvumilia kutokuwa na uhakika na mabadiliko. Mabadiliko haya yaliwafanya wavumbuzi kuwa mashujaa wa jamii za kisasa badala ya vitisho kwa utulivu wa kijamii.
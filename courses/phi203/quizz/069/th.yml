question: การพัฒนาของระบบทุนนิยมส่งผลต่อการปฏิบัติต่อผู้สร้างสรรค์ในสังคมอย่างไร?
answer: นักนวัตกรรมเปลี่ยนจากการถูกข่มเหงกลายเป็นฮีโร่ของสังคมสมัยใหม่
wrong_answers:
  - นักนวัตกรรมถูกข่มเหงอย่างต่อเนื่องตลอดทุกยุคสมัยในประวัติศาสตร์
  - นักนวัตกรรมได้รับการเฉลิมฉลองเสมอไม่ว่าจะอยู่ในระบบเศรษฐกิจแบบใด
  - นักนวัตกรรมถูกกีดกันมากขึ้นเมื่อระบบทุนนิยมพัฒนาต่อไป
explanation: |
  บทนี้อธิบายว่าทุนนิยมและสภาพวัตถุที่ดีขึ้นได้เปลี่ยนแปลงความสัมพันธ์ของสังคมกับนวัตกรรมอย่างพื้นฐาน ในยุคกลาง ผู้สร้างนวัตกรรมถูกข่มเหงเพราะพวกเขาสร้างความไม่แน่นอนในสังคมที่ดำรงชีวิตแบบวันต่อวันโดยมีส่วนเกินน้อย อย่างไรก็ตาม เมื่อทุนนิยมพัฒนาและสร้างสภาพวัตถุที่ดีขึ้นพร้อมกับส่วนเกิน สังคมก็เริ่มอดทนต่อความไม่แน่นอนและการเปลี่ยนแปลงมากขึ้น การเปลี่ยนแปลงนี้ทำให้ผู้สร้างนวัตกรรมกลายเป็นวีรบุรุษของสังคมสมัยใหม่แทนที่จะเป็นภัยคุกคามต่อเสถียรภาพทางสังคม
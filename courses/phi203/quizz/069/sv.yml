question: Hur påverkade kapitalismens utveckling behandlingen av innovatörer i samhället?
answer: Innovatörer gick från att vara förföljda till att bli hjältar i moderna samhällen
wrong_answers:
  - Innovatörer har varit konsekvent förföljda under alla historiska perioder
  - Innovatörer hyllades alltid, oavsett vilket ekonomiskt system som rådde
  - Innovatörerna blev alltmer marginaliserade i takt med att kapitalismen utvecklades ytterligare
explanation: |
  Kapitlet förklarar att kapitalismen och förbättrade materiella förutsättningar i grunden förändrade samhällets förhållande till innovation. Under medeltiden förföljdes innovatörer eftersom de skapade osäkerhet i samhällen som levde från dag till dag med litet överskott. Men i takt med att kapitalismen utvecklades och skapade bättre materiella förutsättningar med överskott, blev samhällena mer toleranta mot osäkerhet och förändring. Denna omvandling gjorde innovatörerna till hjältar i moderna samhällen snarare än till hot mot den sociala stabiliteten.
question: Jak rozwój kapitalizmu wpłynął na traktowanie innowatorów w społeczeństwie?
answer: Innowatorzy przekształcili się z prześladowanych w bohaterów nowoczesnych społeczeństw
wrong_answers:
  - Innowatorzy byli konsekwentnie prześladowani we wszystkich okresach historycznych
  - Innowatorzy zawsze byli doceniani, niezależnie od obowiązującego systemu gospodarczego
  - W miarę rozwoju kapitalizmu innowatorzy byli coraz bardziej marginalizowani
explanation: |
  Rozdział ten wyjaśnia, że kapitalizm i lepsze warunki materialne zasadniczo zmieniły stosunek społeczeństwa do innowacji. W średniowieczu innowatorzy byli prześladowani, ponieważ powodowali niepewność w społeczeństwach, które żyły z dnia na dzień z niewielkimi nadwyżkami. Jednak wraz z rozwojem kapitalizmu i stworzeniem lepszych warunków materialnych z nadwyżkami, społeczeństwa stały się bardziej tolerancyjne dla niepewności i zmian. Ta transformacja sprawiła, że innowatorzy stali się bohaterami nowoczesnych społeczeństw, a nie zagrożeniem dla stabilności społecznej.
question: Hoe beïnvloedde de ontwikkeling van het kapitalisme de behandeling van vernieuwers in de samenleving?
answer: Innovators transformeerden van vervolgden tot helden van moderne samenlevingen
wrong_answers:
  - Vernieuwers werden in alle historische perioden consequent vervolgd
  - Innovators werden altijd gevierd, ongeacht het bestaande economische systeem
  - Vernieuwers werden steeds meer gemarginaliseerd naarmate het kapitalisme zich verder ontwikkelde
explanation: |
  Het hoofdstuk legt uit dat kapitalisme en verbeterde materiële omstandigheden de relatie van de samenleving met innovatie fundamenteel veranderden. In de middeleeuwen werden vernieuwers vervolgd omdat ze onzekerheid creëerden in samenlevingen die van dag tot dag leefden met weinig overschotten. Maar toen het kapitalisme zich ontwikkelde en betere materiële omstandigheden met overschotten creëerde, werden samenlevingen toleranter tegenover onzekerheid en verandering. Deze transformatie maakte van vernieuwers helden van moderne samenlevingen in plaats van bedreigingen voor de sociale stabiliteit.
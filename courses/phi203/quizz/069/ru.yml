question: Как развитие капитализма повлияло на отношение к новаторам в обществе?
answer: Новаторы превратились из гонимых в героев современных обществ
wrong_answers:
  - Новаторы неизменно подвергались гонениям во все исторические периоды
  - Новаторы всегда были в почете, независимо от того, какая экономическая система существовала
  - По мере дальнейшего развития капитализма новаторы становились все более маргинальными
explanation: |
  В главе объясняется, что капитализм и улучшение материальных условий коренным образом изменили отношение общества к инновациям. В средневековые времена новаторов преследовали, потому что они создавали неопределенность в обществе, которое жило каждый день с небольшим избытком. Однако по мере развития капитализма и создания лучших материальных условий с излишками общество стало более терпимым к неопределенности и переменам. Эта трансформация превратила новаторов в героев современных обществ, а не в угрозу социальной стабильности.
question: ¿Cómo afectó el desarrollo del capitalismo al tratamiento de los innovadores en la sociedad?
answer: Los innovadores pasaron de ser perseguidos a convertirse en héroes de las sociedades modernas
wrong_answers:
  - Los innovadores han sido perseguidos en todos los periodos históricos
  - Siempre se ha celebrado a los innovadores, independientemente del sistema económico vigente
  - Los innovadores fueron quedando cada vez más marginados a medida que se desarrollaba el capitalismo
explanation: |
  El capítulo explica que el capitalismo y la mejora de las condiciones materiales cambiaron fundamentalmente la relación de la sociedad con la innovación. En la época medieval, los innovadores eran perseguidos porque creaban incertidumbre en sociedades que vivían al día con pocos excedentes. Sin embargo, a medida que el capitalismo se desarrolló y creó mejores condiciones materiales con excedentes, las sociedades se volvieron más tolerantes con la incertidumbre y el cambio. Esta transformación convirtió a los innovadores en héroes de las sociedades modernas en lugar de amenazas para la estabilidad social.
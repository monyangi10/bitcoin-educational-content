question: Vilka är enligt texten de två grundläggande principer som vägleder ett korrekt lärande och utövande av frihet?
answer: Att inte skada sig själv och att inte skada andra
wrong_answers:
  - Maximering av individuell njutning och minimering av sociala begränsningar
  - Följa traditionella seder och respektera etablerade myndigheter
  - Sträva efter ekonomiskt välstånd och upprätthålla politisk stabilitet
explanation: |
  I texten anges uttryckligen att två grundläggande principer styr inlärningen av korrekt frihetsanvändning: att inte skada sig själv och att inte skada andra. Dessa principer är grundläggande, eftersom när människor missbrukar sin frihet genom att skada sig själva (t.ex. genom alkoholism eller onykterhet), förstör de successivt sin egen förmåga till frihet. När människor skadar andra genom hot eller angrepp på deras rättigheter förklarar de på samma sätt krig mot mänskligheten och samhället, vilket oundvikligen leder till en begränsning av deras egen frihet genom rättsliga och polisiära ingripanden. De andra alternativen är visserligen potentiellt värdefulla sociala mål, men identifieras inte i texten som de grundläggande principerna för att lära sig att utöva frihet på rätt sätt.
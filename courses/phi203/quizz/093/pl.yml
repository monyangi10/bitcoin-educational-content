question: Według tekstu, jakie są dwie podstawowe zasady, które kierują właściwym uczeniem się i korzystaniem z wolności?
answer: Nie szkodzić sobie i nie szkodzić innym
wrong_answers:
  - Maksymalizacja indywidualnej przyjemności i minimalizacja ograniczeń społecznych
  - Przestrzeganie tradycyjnych zwyczajów i poszanowanie ustalonych autorytetów
  - Dążenie do dobrobytu gospodarczego i utrzymanie stabilności politycznej
explanation: |
  Tekst wyraźnie stwierdza, że dwie podstawowe zasady kierują nauką właściwego korzystania z wolności: nie szkodzić sobie i nie szkodzić innym. Zasady te są fundamentalne, ponieważ gdy jednostki nadużywają swojej wolności poprzez krzywdzenie samych siebie (np. poprzez alkoholizm lub nieumiarkowanie), stopniowo niszczą swoją własną zdolność do wolności. Podobnie, gdy ludzie krzywdzą innych poprzez groźby lub ataki na ich prawa, wypowiadają wojnę ludzkości i społeczeństwu, co nieuchronnie prowadzi do ograniczenia ich własnej wolności poprzez interwencję sądową i policyjną. Pozostałe opcje, choć potencjalnie cenne z punktu widzenia celów społecznych, nie zostały w tekście wskazane jako fundamentalne zasady nauki właściwego korzystania z wolności.
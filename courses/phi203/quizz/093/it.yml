question: Secondo il testo, quali sono i due principi essenziali che guidano il corretto apprendimento ed esercizio della libertà?
answer: Non danneggiare se stessi e non danneggiare gli altri
wrong_answers:
  - Massimizzare il piacere individuale e minimizzare i vincoli sociali
  - Seguire le usanze tradizionali e rispettare le autorità competenti
  - Perseguire la prosperità economica e mantenere la stabilità politica
explanation: |
  Il testo afferma esplicitamente che due principi essenziali guidano l'apprendimento dell'uso corretto della libertà: non danneggiare se stessi e non danneggiare gli altri. Questi principi sono fondamentali perché quando gli individui abusano della loro libertà danneggiando se stessi (come attraverso l'alcolismo o l'intemperanza), distruggono progressivamente la loro stessa capacità di libertà. Allo stesso modo, quando le persone danneggiano gli altri attraverso minacce o attacchi ai loro diritti, dichiarano guerra all'umanità e alla società, il che porta inevitabilmente a una riduzione della loro stessa libertà attraverso interventi giudiziari e di polizia. Le altre opzioni, pur essendo obiettivi sociali potenzialmente validi, non sono identificate nel testo come principi fondamentali per imparare a esercitare correttamente la libertà.
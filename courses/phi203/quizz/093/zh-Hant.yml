question: 根據文中所述，指導正確學習和行使自由的兩個基本原則是什麼？
answer: 不傷害自己，也不傷害他人
wrong_answers:
  - 個人樂趣最大化，社會限制最小化
  - 遵循傳統習俗，尊重既定權威
  - 追求經濟繁榮，維持政治穩定
explanation: |
  文中明確指出，學習正確使用自由有兩個基本原則：不傷害自己和不傷害他人。這些原則之所以重要，是因為當個人濫用自由，傷害自己（例如酗酒或放縱）時，他們會逐漸摧毀自己的自由能力。同樣地，當人們透過威脅或攻擊他人的權利來傷害他人時，他們就是在向人類和社會宣戰，這必然會導致他們透過司法和警察的介入來降低自己的自由。其他的選擇雖然可能是有價值的社會目標，但在文中並沒有被確定為學習正確行使自由的基礎原則。
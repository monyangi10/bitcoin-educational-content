question: Mitkä ovat tekstin mukaan kaksi keskeistä periaatetta, jotka ohjaavat vapauden asianmukaista oppimista ja käyttämistä?
answer: Itsensä vahingoittamatta jättäminen ja muiden vahingoittamatta jättäminen
wrong_answers:
  - Yksilön mielihyvän maksimointi ja sosiaalisten rajoitteiden minimointi
  - Perinteisten tapojen noudattaminen ja vakiintuneiden viranomaisten kunnioittaminen
  - Taloudellisen vaurauden tavoittelu ja poliittisen vakauden ylläpitäminen
explanation: |
  Tekstissä todetaan nimenomaisesti, että kaksi keskeistä periaatetta ohjaavat oikean vapauden käytön oppimista: ei vahingoita itseään eikä vahingoita muita. Nämä periaatteet ovat perustavanlaatuisia, koska kun yksilöt käyttävät vapauttaan väärin vahingoittamalla itseään (esimerkiksi alkoholismin tai kohtuuttomuuden kautta), he vähitellen tuhoavat oman vapauden kapasiteettinsa. Vastaavasti kun ihmiset vahingoittavat muita uhkaamalla tai hyökkäämällä heidän oikeuksiaan vastaan, he julistavat sodan ihmiskuntaa ja yhteiskuntaa vastaan, mikä johtaa väistämättä heidän oman vapautensa kaventumiseen oikeudellisten ja poliisitoimien avulla. Vaikka muut vaihtoehdot ovatkin potentiaalisesti arvokkaita yhteiskunnallisia tavoitteita, niitä ei mainita tekstissä perusperiaatteiksi, joiden avulla oppii käyttämään vapautta asianmukaisesti.
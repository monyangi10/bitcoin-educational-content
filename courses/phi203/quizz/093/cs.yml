question: Jaké jsou podle textu dva základní principy, kterými se řídí správné učení a uplatňování svobody?
answer: Nepoškozování sebe sama a nepoškozování druhých
wrong_answers:
  - Maximalizace individuálního potěšení a minimalizace sociálních omezení
  - Dodržování tradičních zvyků a respektování zavedených autorit
  - Snaha o hospodářskou prosperitu a udržení politické stability
explanation: |
  V textu se výslovně uvádí, že učení se správnému používání svobody se řídí dvěma základními zásadami: neubližovat sobě a neubližovat druhým. Tyto zásady jsou zásadní, protože pokud jedinec zneužívá svobodu a škodí sám sobě (například alkoholismem nebo nestřídmostí), postupně ničí svou vlastní schopnost svobody. Stejně tak když lidé poškozují druhé prostřednictvím výhrůžek nebo útoků na jejich práva, vyhlašují válku lidstvu a společnosti, což nevyhnutelně vede k omezení jejich vlastní svobody prostřednictvím soudních a policejních zásahů. Ostatní možnosti, ačkoli jsou potenciálně cennými společenskými cíli, nejsou v textu označeny jako základní principy pro učení se správnému uplatňování svobody.
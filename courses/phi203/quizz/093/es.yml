question: Según el texto, ¿cuáles son los dos principios esenciales que guían el correcto aprendizaje y ejercicio de la libertad?
answer: No hacerse daño a uno mismo y no hacer daño a los demás
wrong_answers:
  - Maximizar el placer individual y minimizar las limitaciones sociales
  - Seguir las costumbres tradicionales y respetar a las autoridades establecidas
  - Perseguir la prosperidad económica y mantener la estabilidad política
explanation: |
  El texto afirma explícitamente que dos principios esenciales guían el aprendizaje del uso adecuado de la libertad: no hacerse daño a uno mismo y no hacer daño a los demás. Estos principios son fundamentales porque cuando los individuos hacen un mal uso de su libertad haciéndose daño a sí mismos (como a través del alcoholismo o la intemperancia), destruyen progresivamente su propia capacidad de libertad. Del mismo modo, cuando las personas dañan a otras mediante amenazas o ataques a sus derechos, declaran la guerra a la humanidad y a la sociedad, lo que inevitablemente conduce a una reducción de su propia libertad mediante la intervención judicial y policial. Las otras opciones, aunque son objetivos sociales potencialmente valiosos, no se identifican en el texto como los principios fundamentales para aprender a ejercer la libertad adecuadamente.
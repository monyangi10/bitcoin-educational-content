question: 本文によれば、自由の適切な学習と行使を導く2つの基本原則とは何か？
answer: 自害しない、他害しない
wrong_answers:
  - 個人の喜びを最大化し、社会的制約を最小化する
  - 伝統的な慣習に従い、確立された権威を尊重する
  - 経済的繁栄の追求と政治的安定の維持
explanation: |
  このテキストでは、適切な自由の使い方を学ぶための指針として、「自らを傷つけない」「他者を傷つけない」という2つの基本原則を明記している。これらの原則は基本的なものである。というのも、（アルコール依存症や不摂生によって）自分自身を傷つけることによって自由を悪用する場合、自由に対する自らの能力を徐々に破壊していくからである。同様に、脅迫や権利への攻撃によって他者に危害を加える場合、彼らは人道と社会に対して宣戦布告することになり、必然的に司法や警察の介入によって彼ら自身の自由が縮小されることになる。他の選択肢は、潜在的に価値ある社会的目標ではあるが、本文中では、自由を適切に行使することを学ぶための基礎的原則とはされていない。
question: Kulingana na maandishi, ni kanuni gani mbili muhimu zinazoongoza kujifunza na kutumia uhuru ipasavyo?
answer: Kutojidhuru mwenyewe na kutowadhuru wengine
wrong_answers:
  - Kuongeza raha ya mtu binafsi na kupunguza vikwazo vya kijamii
  - Kufuata desturi za kitamaduni na kuheshimu mamlaka zilizowekwa
  - Kutafuta ustawi wa kiuchumi na kudumisha utulivu wa kisiasa
explanation: |
  Maandishi yanasema waziwazi kwamba kanuni mbili muhimu zinaongoza kujifunza matumizi sahihi ya uhuru: kutojidhuru na kutowadhuru wengine. Kanuni hizi ni za msingi kwa sababu watu wanapotumia vibaya uhuru wao kwa kujidhuru (kama vile ulevi au kutojizuia), huharibu hatua kwa hatua uwezo wao wa uhuru. Vile vile, watu wanapowadhuru wengine kupitia vitisho au mashambulizi dhidi ya haki zao, wanatangaza vita dhidi ya ubinadamu na jamii, jambo ambalo bila shaka husababisha kupunguzwa kwa uhuru wao kupitia uingiliaji kati wa mahakama na polisi. Chaguzi zingine, ingawa zinaweza kuwa na malengo muhimu ya kijamii, hazijatambuliwa katika maandishi kama kanuni za msingi za kujifunza kutumia uhuru ipasavyo.
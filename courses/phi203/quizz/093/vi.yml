question: Theo văn bản, hai nguyên tắc thiết yếu nào hướng dẫn việc học tập và thực hành tự do một cách đúng đắn?
answer: Không làm hại bản thân và không làm hại người khác
wrong_answers:
  - Tối đa hóa niềm vui cá nhân và giảm thiểu các ràng buộc xã hội.
  - Tuân thủ các phong tục truyền thống và tôn trọng chính quyền hiện hành.
  - Theo đuổi sự thịnh vượng kinh tế và duy trì ổn định chính trị
explanation: |
  Văn bản nêu rõ hai nguyên tắc thiết yếu hướng dẫn việc học cách sử dụng tự do đúng đắn: không gây hại cho bản thân và không gây hại cho người khác. Những nguyên tắc này rất quan trọng vì khi cá nhân lạm dụng tự do bằng cách gây hại cho chính mình (như nghiện rượu hoặc say xỉn), họ dần dần phá hủy khả năng tự do của chính mình. Tương tự, khi người ta gây hại cho người khác thông qua các mối đe dọa hoặc tấn công vào quyền của họ, họ tuyên chiến với nhân loại và xã hội, điều này chắc chắn dẫn đến việc giảm tự do của chính họ thông qua sự can thiệp của tư pháp và cảnh sát. Các lựa chọn khác, mặc dù có thể là những mục tiêu xã hội có giá trị, nhưng không được xác định trong văn bản là những nguyên tắc nền tảng để học cách thực hiện tự do đúng đắn.
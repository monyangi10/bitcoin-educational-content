question: Menurut teks tersebut, apa dua prinsip penting yang memandu pembelajaran dan pelaksanaan kebebasan yang tepat?
answer: Tidak merugikan diri sendiri dan tidak merugikan orang lain
wrong_answers:
  - Memaksimalkan kesenangan individu dan meminimalkan kendala sosial
  - Mengikuti adat istiadat tradisional dan menghormati otoritas yang ada
  - Mengejar kemakmuran ekonomi dan menjaga stabilitas politik
explanation: |
  Teks ini secara eksplisit menyatakan bahwa ada dua prinsip penting yang memandu pembelajaran tentang penggunaan kebebasan yang benar: tidak merugikan diri sendiri dan tidak merugikan orang lain. Prinsip-prinsip ini sangat penting karena ketika seseorang menyalahgunakan kebebasannya dengan merugikan diri sendiri (seperti melalui kecanduan alkohol atau tidak bertarak), mereka secara progresif menghancurkan kapasitas kebebasan mereka sendiri. Demikian pula, ketika orang menyakiti orang lain melalui ancaman atau serangan terhadap hak-hak mereka, mereka menyatakan perang terhadap kemanusiaan dan masyarakat, yang pasti mengarah pada pengurangan kebebasan mereka sendiri melalui intervensi peradilan dan polisi. Pilihan-pilihan lain, meskipun memiliki tujuan sosial yang berharga, tidak diidentifikasi dalam teks sebagai prinsip-prinsip dasar untuk belajar menggunakan kebebasan dengan benar.
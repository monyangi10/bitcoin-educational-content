question: Prema tekstu, koja su dva osnovna principa koja vode pravilnom učenju i vežbanju slobode?
answer: Ne nanositi štetu sebi i ne nanositi štetu drugima
wrong_answers:
  - Maksimiziranje individualnog zadovoljstva i minimiziranje društvenih ograničenja
  - Prateći tradicionalne običaje i poštujući uspostavljene autoritete
  - Težnja ka ekonomskom prosperitetu i očuvanju političke stabilnosti
explanation: |
  Tekst eksplicitno navodi da dva suštinska principa vode učenju pravilne upotrebe slobode: ne nanošenje štete sebi i ne nanošenje štete drugima. Ovi principi su fundamentalni jer kada pojedinci zloupotrebljavaju svoju slobodu nanošenjem štete sebi (kao što je alkoholizam ili neumerenost), oni postepeno uništavaju sopstvenu sposobnost za slobodu. Slično tome, kada ljudi nanose štetu drugima kroz pretnje ili napade na njihova prava, oni objavljuju rat čovečanstvu i društvu, što neizbežno vodi smanjenju njihove sopstvene slobode kroz sudsku i policijsku intervenciju. Druge opcije, iako potencijalno vredni društveni ciljevi, nisu identifikovane u tekstu kao osnovni principi za učenje pravilnog ostvarivanja slobode.
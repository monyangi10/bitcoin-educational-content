question: Cosa distingue le funzioni legittime dello Stato da quelle parassitarie secondo l'analisi presentata?
answer: Le funzioni legittime tutelano i diritti individuali senza intervenire, mentre le funzioni parassitarie sostituiscono i contratti volontari con regolamenti amministrativi
wrong_answers:
  - Le funzioni legittime comportano un intervento economico diretto, mentre le funzioni parassitarie si concentrano solo sul mantenimento dell'ordine pubblico e della sicurezza
  - Le funzioni legittime richiedono l'approvazione della maggioranza attraverso processi democratici, mentre le funzioni parassitarie sono imposte da burocrati non eletti
  - Le funzioni legittime generano entrate per lo Stato, mentre le funzioni parassitarie prosciugano le risorse pubbliche senza fornire benefici misurabili
explanation: |
  Il testo distingue chiaramente tra quelle che chiama "attribuzioni negative" dello Stato (funzioni legittime) che proteggono la proprietà, la libertà e la sicurezza senza intervenire negli scambi volontari, e le "attribuzioni positive" (funzioni parassitarie) che ostacolano, impediscono e regolano l'attività individuale attraverso norme amministrative che sostituiscono i contratti e gli scambi liberamente consentiti. Le funzioni legittime stabiliscono il quadro di riferimento per le relazioni volontarie, mentre le funzioni parassitarie sostituiscono le decisioni politiche alle scelte individuali e alla libertà contrattuale.
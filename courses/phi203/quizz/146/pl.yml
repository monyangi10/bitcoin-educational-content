question: Co zgodnie z przedstawioną analizą odróżnia legalne funkcje państwa od jego funkcji pasożytniczych?
answer: Funkcje legalne chronią indywidualne prawa bez ingerencji, podczas gdy funkcje pasożytnicze zastępują dobrowolne umowy regulacjami administracyjnymi
wrong_answers:
  - Legalne funkcje obejmują bezpośrednią interwencję gospodarczą, podczas gdy funkcje pasożytnicze koncentrują się wyłącznie na utrzymaniu porządku publicznego i bezpieczeństwa
  - Legalne funkcje wymagają zgody większości w ramach procesów demokratycznych, podczas gdy funkcje pasożytnicze są narzucane przez niewybieralnych biurokratów
  - Legalne funkcje generate przynoszą państwu dochody, podczas gdy funkcje pasożytnicze drenują zasoby publiczne, nie przynosząc wymiernych korzyści
explanation: |
  Tekst wyraźnie rozróżnia to, co nazywa "negatywnymi atrybutami" państwa (funkcje prawowite), które chronią własność, wolność i bezpieczeństwo bez ingerowania w dobrowolne wymiany, od "pozytywnych atrybutów" (funkcje pasożytnicze), które utrudniają, zapobiegają i regulują indywidualną aktywność poprzez zasady administracyjne, które zastępują swobodnie uzgodnione umowy i wymiany. Legalne funkcje ustanawiają ramy dla dobrowolnych relacji, podczas gdy funkcje pasożytnicze zastępują decyzje polityczne indywidualnym wyborem i wolnością kontraktową.
question: Что отличает легитимные функции государства от его паразитических функций в соответствии с представленным анализом?
answer: Легитимные функции защищают индивидуальные права без вмешательства, в то время как паразитические функции заменяют добровольные контракты административными правилами
wrong_answers:
  - Легитимные функции предполагают прямое экономическое вмешательство, в то время как паразитические функции направлены только на поддержание общественного порядка и безопасности
  - Легитимные функции требуют одобрения большинства в рамках демократических процессов, в то время как паразитические функции навязываются неизбираемыми бюрократами
  - Законные функции приносят государству доход, в то время как паразитические функции истощают государственные ресурсы, не принося ощутимой пользы
explanation: |
  В тексте четко проводится различие между так называемыми "негативными атрибуциями" государства (легитимными функциями), которые защищают собственность, свободу и безопасность, не вмешиваясь в добровольные обмены, и "позитивными атрибуциями" (паразитическими функциями), которые препятствуют, предотвращают и регулируют индивидуальную деятельность с помощью административных правил, заменяющих свободно согласованные контракты и обмены. Легитимные функции создают основу для добровольных отношений, в то время как паразитические функции подменяют политические решения индивидуальным выбором и контрактной свободой.
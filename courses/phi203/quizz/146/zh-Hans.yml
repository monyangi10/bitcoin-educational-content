question: 根据上述分析，国家的合法职能与寄生职能有何区别？
answer: 合法职能不加干预地保护个人权利，而寄生职能则以行政法规取代自愿契约
wrong_answers:
  - 合法职能涉及直接经济干预，而寄生职能仅侧重于维护公共秩序和安全
  - 合法职能需要通过民主程序获得多数人的批准，而寄生职能则由非民选官僚强加于人
  - 合法职能为国家创造 generate 收入，而寄生职能则耗费公共资源，却不提供可衡量的收益
explanation: |
  文中明确区分了国家的 "消极归属"（合法职能）与 "积极归属"（寄生职能），前者保护财产、自由和安全，不干预自愿交换，后者通过行政规则阻碍、阻止和规范个人活动，取代自由同意的契约和交换。合法职能为自愿关系建立框架，而寄生职能则以政治决定取代个人选择和契约自由。
question: Vad skiljer statens legitima funktioner från dess parasitära funktioner enligt den analys som presenteras?
answer: Legitima funktioner skyddar individuella rättigheter utan att ingripa, medan parasitära funktioner ersätter frivilliga avtal med administrativa regleringar
wrong_answers:
  - Legitima funktioner innebär direkta ekonomiska ingripanden, medan parasitära funktioner endast fokuserar på att upprätthålla allmän ordning och säkerhet
  - Legitima funktioner kräver majoritetsgodkännande genom demokratiska processer, medan parasitära funktioner införs av icke folkvalda byråkrater
  - Legitima funktioner generate intäkter för staten, medan parasitära funktioner dränerar offentliga resurser utan att ge mätbara fördelar
explanation: |
  Texten skiljer tydligt mellan vad den kallar "negativa attribut" av staten (legitima funktioner) som skyddar egendom, frihet och säkerhet utan att ingripa i frivilliga utbyten, och "positiva attribut" (parasitiska funktioner) som hindrar, förhindrar och reglerar individuell aktivitet genom administrativa regler som ersätter fritt samtyckta kontrakt och utbyten. De legitima funktionerna skapar förutsättningar för frivilliga relationer, medan de parasitära funktionerna ersätter individuella val och avtalsfrihet med politiska beslut.
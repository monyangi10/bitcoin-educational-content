question: Qu'est-ce qui distingue les fonctions légitimes de l'État de ses fonctions parasitaires selon l'analyse présentée ?
answer: Les fonctions légitimes protègent les droits individuels sans intervenir, tandis que les fonctions parasitaires remplacent les contrats volontaires par des réglementations administratives
wrong_answers:
  - Les fonctions légitimes impliquent une intervention économique directe, tandis que les fonctions parasitaires se concentrent uniquement sur le maintien de l'ordre public et de la sécurité
  - Les fonctions légitimes requièrent l'approbation de la majorité par le biais de processus démocratiques, tandis que les fonctions parasitaires sont imposées par des bureaucrates non élus
  - Les fonctions légitimes génèrent des recettes pour l'État, tandis que les fonctions parasitaires drainent les ressources publiques sans apporter de bénéfices mesurables
explanation: |
  Le texte distingue clairement ce qu'il appelle les "attributions négatives" de l'État (fonctions légitimes) qui protègent la propriété, la liberté et la sécurité sans intervenir dans les échanges volontaires, des "attributions positives" (fonctions parasitaires) qui entravent, empêchent et réglementent l'activité individuelle par le biais de règles administratives qui remplacent les contrats et les échanges librement consentis. Les fonctions légitimes établissent le cadre des relations volontaires, tandis que les fonctions parasitaires substituent les décisions politiques aux choix individuels et à la liberté contractuelle.

question: Čím se podle předložené analýzy liší legitimní funkce státu od jeho parazitních funkcí?
answer: Legitimní funkce chrání individuální práva bez zásahů, zatímco parazitní funkce nahrazují dobrovolné smlouvy administrativními předpisy
wrong_answers:
  - Legitimní funkce zahrnují přímé ekonomické zásahy, zatímco parazitní funkce se zaměřují pouze na udržování veřejného pořádku a bezpečnosti
  - Legitimní funkce vyžadují schválení většinou v demokratických procesech, zatímco parazitické funkce jsou vnucovány nevolenými byrokraty
  - Legitimní funkce přinášejí státu příjmy, zatímco parazitické funkce odčerpávají veřejné zdroje, aniž by přinášely měřitelné přínosy
explanation: |
  Text jasně rozlišuje mezi tím, co nazývá "negativními atributy" státu (legitimními funkcemi), které chrání vlastnictví, svobodu a bezpečnost, aniž by zasahovaly do dobrovolných směn, a "pozitivními atributy" (parazitickými funkcemi), které brání, zabraňují a regulují individuální aktivity prostřednictvím administrativních pravidel, která nahrazují svobodně uzavřené smlouvy a směny. Legitimní funkce vytvářejí rámec pro dobrovolné vztahy, zatímco parazitní funkce nahrazují politická rozhodnutí individuální volbu a smluvní svobodu.
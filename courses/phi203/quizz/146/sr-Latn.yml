question: Šta razlikuje legitimne funkcije države od njenih parazitskih funkcija prema predstavljenoj analizi?
answer: Legitimne funkcije štite individualna prava bez intervencije, dok parazitske funkcije zamenjuju dobrovoljne ugovore administrativnim propisima.
wrong_answers:
  - Legitimne funkcije uključuju direktnu ekonomsku intervenciju, dok se parazitske funkcije fokusiraju samo na održavanje javnog reda i bezbednosti.
  - Legitimne funkcije zahtevaju odobrenje većine kroz demokratske procese, dok parazitske funkcije nameću neizabrani birokrati.
  - Legitimne funkcije generate prihod za državu, dok parazitske funkcije iscrpljuju javne resurse bez pružanja merljivih koristi
explanation: |
  Tekst jasno razlikuje ono što naziva 'negativnim atribucijama' države (legitimne funkcije) koje štite imovinu, slobodu i sigurnost bez intervencije u dobrovoljne razmene, naspram 'pozitivnih atribucija' (parazitske funkcije) koje ometaju, sprečavaju i regulišu individualnu aktivnost putem administrativnih pravila koja zamenjuju slobodno prihvaćene ugovore i razmene. Legitimne funkcije uspostavljaju okvir za dobrovoljne odnose, dok parazitske funkcije zamenjuju političke odluke za individualni izbor i ugovornu slobodu.
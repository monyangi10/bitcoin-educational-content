question: Hva skiller statens legitime funksjoner fra dens parasittiske funksjoner ifølge analysen som presenteres?
answer: Legitime funksjoner beskytter individuelle rettigheter uten å gripe inn, mens parasittiske funksjoner erstatter frivillige avtaler med administrative reguleringer
wrong_answers:
  - Legitime funksjoner innebærer direkte økonomisk intervensjon, mens parasittiske funksjoner kun fokuserer på å opprettholde offentlig orden og sikkerhet
  - Legitime funksjoner krever flertallsgodkjenning gjennom demokratiske prosesser, mens parasittiske funksjoner pålegges av ikke-valgte byråkrater
  - Legitime funksjoner gir staten inntekter, mens parasittiske funksjoner tapper det offentlige for ressurser uten å gi målbare fordeler
explanation: |
  Teksten skiller klart mellom det den kaller statens "negative attribusjoner" (legitime funksjoner), som beskytter eiendom, frihet og sikkerhet uten å gripe inn i frivillige utvekslinger, og "positive attribusjoner" (parasittiske funksjoner), som hindrer, forhindrer og regulerer individuell aktivitet gjennom administrative regler som erstatter fritt inngåtte kontrakter og utvekslinger. De legitime funksjonene setter rammene for frivillige relasjoner, mens de parasittiske funksjonene erstatter individuelle valg og avtalefrihet med politiske beslutninger.
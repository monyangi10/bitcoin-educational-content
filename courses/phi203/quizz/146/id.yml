question: Apa yang membedakan fungsi sah negara dengan fungsi parasitnya menurut analisis yang disajikan?
answer: Fungsi legal melindungi hak-hak individu tanpa campur tangan, sementara fungsi parasit menggantikan kontrak sukarela dengan peraturan administratif
wrong_answers:
  - Fungsi yang sah melibatkan intervensi ekonomi secara langsung, sementara fungsi parasit hanya berfokus pada menjaga ketertiban dan keamanan publik
  - Fungsi-fungsi yang sah memerlukan persetujuan mayoritas melalui proses demokrasi, sementara fungsi-fungsi parasit dipaksakan oleh birokrat yang tidak terpilih
  - Fungsi yang sah menghasilkan pendapatan generate bagi negara, sementara fungsi parasit menguras sumber daya publik tanpa memberikan manfaat yang terukur
explanation: |
  Teks tersebut dengan jelas membedakan antara apa yang disebutnya sebagai 'atribusi negatif' negara (fungsi sah) yang melindungi properti, kebebasan, dan keamanan tanpa mengintervensi pertukaran sukarela, dengan 'atribusi positif' (fungsi parasit) yang menghalangi, mencegah, dan mengatur aktivitas individu melalui peraturan administratif yang menggantikan kontrak dan pertukaran yang disetujui secara bebas. Fungsi-fungsi yang sah membentuk kerangka kerja untuk hubungan sukarela, sementara fungsi-fungsi parasit menggantikan keputusan politik dengan pilihan individu dan kebebasan berkontrak.
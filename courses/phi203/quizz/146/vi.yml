question: Theo phân tích đã trình bày, điều gì phân biệt các chức năng hợp pháp của nhà nước với các chức năng ký sinh của nó?
answer: Các chức năng hợp pháp bảo vệ quyền cá nhân mà không can thiệp, trong khi các chức năng ký sinh thay thế các hợp đồng tự nguyện bằng các quy định hành chính.
wrong_answers:
  - Các chức năng hợp pháp bao gồm can thiệp kinh tế trực tiếp, trong khi các chức năng ký sinh chỉ tập trung vào việc duy trì trật tự và an ninh công cộng.
  - Các chức năng hợp pháp đòi hỏi sự chấp thuận của đa số thông qua các quy trình dân chủ, trong khi các chức năng ký sinh được áp đặt bởi các quan chức không được bầu cử.
  - Các chức năng hợp pháp tạo ra doanh thu generate cho nhà nước, trong khi các chức năng ký sinh làm hao phí nguồn lực công mà không mang lại lợi ích có thể đo lường được.
explanation: |
  Văn bản này phân biệt rõ ràng giữa cái gọi là "các chức năng tiêu cực" của nhà nước (các chức năng hợp pháp) bảo vệ tài sản, tự do và an ninh mà không can thiệp vào các giao dịch tự nguyện, với "các chức năng tích cực" (các chức năng ký sinh) cản trở, ngăn chặn và điều tiết hoạt động của cá nhân thông qua các quy tắc hành chính thay thế các hợp đồng và giao dịch được tự nguyện đồng ý. Các chức năng hợp pháp thiết lập khuôn khổ cho các mối quan hệ tự nguyện, trong khi các chức năng ký sinh thay thế các quyết định chính trị cho sự lựa chọn cá nhân và tự do hợp đồng.
question: 根據所提出的分析，國家的合法職能與寄生職能有何不同？
answer: 合法職能保護個人權利而不介入，而寄生職能則以行政規範取代自願契約
wrong_answers:
  - 合法功能涉及直接的經濟干預，而寄生功能則只著重於維護公共秩序與安全
  - 合法的功能需要透過民主程序獲得大多數人的同意，而寄生性的功能則由非選舉產生的官僚強加。
  - 合法功能為國家帶來 generate 收入，而寄生功能則耗用公共資源，卻無法提供可衡量的效益。
explanation: |
  文中清楚區分了所謂國家的「消極歸屬」（合法職能）與「積極歸屬」（寄生職能），前者保護財產、自由與安全，不介入自願交換；後者則透過行政規則，取代自由同意的契約與交換，妨礙、阻止並規範個人活動。合法功能為自願關係建立框架，而寄生功能則以政治決定取代個人選擇與契約自由。
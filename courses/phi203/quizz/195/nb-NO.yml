question: Hva er det som gjør konsekvensene av politiske beslutninger spesielt vanskelige å vurdere for den enkelte borger, sammenlignet med personlige økonomiske valg?
answer: Politiske konsekvenser er kollektive og spredte i tid, noe som gjør det umulig for enkeltpersoner å observere alle konsekvenser for usynlige berørte parter direkte
wrong_answers:
  - Politiske beslutninger krever spesialisert kunnskap som bare utdannede økonomer og politiske eksperter kan forstå og evaluere på en adekvat måte
  - Politiske valg innebærer moralske overveielser som overskrider rasjonell kalkulasjon, i motsetning til økonomiske beslutninger som er rent utilitaristiske
  - Politiske systemer skjuler bevisst informasjon for å opprettholde makt, mens markeder gir transparente prissignaler til alle aktører
explanation: |
  Teksten forklarer spesifikt at politiske beslutninger har kollektive konsekvenser som er "vanskelige å undersøke for hver enkelt", og at "et politisk tiltak kan skade mennesker som borgeren ikke ser direkte" Denne tidsmessige og romlige avstanden fra konsekvensene, kombinert med deres kollektive natur, gjør politiske valg vanskeligere å evaluere enn umiddelbare, personlige økonomiske beslutninger, der resultatene er direkte observerbare og justerbare.
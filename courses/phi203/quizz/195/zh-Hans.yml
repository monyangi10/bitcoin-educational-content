question: 与个人经济选择相比，是什么让公民个人特别难以评估政治决策的后果？
answer: 政治后果具有集体性和时间分散性，个人无法直接观察其对看不见的受影响方的全部影响
wrong_answers:
  - 政治决策需要专业知识，只有训练有素的经济学家和政策专家才能充分理解和评估这些知识
  - 政治选择涉及超越理性计算的道德考量，与纯粹功利的经济决策不同
  - 政治体制会故意掩盖信息以维持权力，而市场则为所有参与者提供透明的定价信号
explanation: |
  文中特别解释说，政治决策具有集体后果，"很难对每个人进行审查"，"一项政治措施完全可以伤害到公民无法直接看到的人。'这种与后果的时空分离，再加上其集体性质，使得政治选择在本质上比直接的、个人的经济决策更难评估，因为后者的结果是可以直接观察和调整的。
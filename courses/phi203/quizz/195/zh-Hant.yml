question: 與個人的經濟選擇相比，是什麼讓公民個人特別難以評估政治決策的後果？
answer: 政治後果是集體性的，在時間上也是分散的，因此個人無法直接觀察其對不見的受影響方的完整影響
wrong_answers:
  - 政治決策需要專業知識，只有訓練有素的經濟學家和政策專家才能充分理解和評估
  - 政治選擇涉及超越理性計算的道德考量，與純粹功利的經濟決策不同。
  - 政治體系為了維持權力而刻意模糊資訊，而市場則為所有參與者提供透明的定價信號
explanation: |
  文中特別解釋，政治決策具有集體後果，「對每個人來說都很難檢視」，而且「一項政治措施完全可以傷害到公民無法直接看到的人。這種與後果在時間和空間上的分離，加上其集體性質，使得政治選擇在本質上比直接、個人的經濟決策更難評估，因為後者的結果是可以直接觀察和調整的。
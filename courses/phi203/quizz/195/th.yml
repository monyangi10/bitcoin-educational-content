question: อะไรที่ทำให้ผลกระทบจากการตัดสินใจทางการเมืองยากเป็นพิเศษสำหรับพลเมืองแต่ละคนในการประเมินเมื่อเทียบกับการเลือกทางเศรษฐกิจส่วนบุคคล?
answer: ผลทางการเมืองเป็นผลรวมและกระจายออกไปตามเวลา ทำให้บุคคลไม่สามารถสังเกตเห็นผลกระทบทั้งหมดที่มีต่อฝ่ายที่ได้รับผลกระทบที่มองไม่เห็นได้โดยตรง
wrong_answers:
  - การตัดสินใจทางการเมืองต้องการความรู้เฉพาะทางที่มีเพียงนักเศรษฐศาสตร์และผู้เชี่ยวชาญด้านนโยบายที่ได้รับการฝึกฝนเท่านั้นที่สามารถเข้าใจและประเมินได้อย่างเหมาะสม
  - ทางเลือกทางการเมืองเกี่ยวข้องกับการพิจารณาทางศีลธรรมที่เกินกว่าการคำนวณอย่างมีเหตุผล ซึ่งแตกต่างจากการตัดสินใจทางเศรษฐกิจที่เป็นประโยชน์นิยมล้วนๆ
  - ระบบการเมืองจงใจปกปิดข้อมูลเพื่อรักษาอำนาจ ในขณะที่ตลาดให้สัญญาณราคาที่โปร่งใสสำหรับผู้เข้าร่วมทุกคน
explanation: |
  ข้อความนี้อธิบายอย่างเฉพาะเจาะจงว่าการตัดสินใจทางการเมืองมีผลกระทบร่วมกันที่ 'ยากที่จะตรวจสอบสำหรับแต่ละบุคคล' และว่า 'มาตรการทางการเมืองสามารถทำร้ายคนที่พลเมืองไม่เห็นโดยตรงได้อย่างสมบูรณ์' การแยกตัวออกจากผลกระทบทั้งในเชิงเวลาและเชิงพื้นที่นี้ รวมกับธรรมชาติของการรวมกลุ่ม ทำให้การเลือกทางการเมืองยากที่จะประเมินโดยเนื้อแท้มากกว่าการตัดสินใจทางเศรษฐกิจส่วนบุคคลที่ผลลัพธ์สามารถสังเกตและปรับได้โดยตรง
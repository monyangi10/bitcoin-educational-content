question: Ni nini kinachofanya matokeo ya maamuzi ya kisiasa kuwa magumu zaidi kwa raia mmoja mmoja kuyatathmini ikilinganishwa na chaguzi za kibinafsi za kiuchumi?
answer: Matokeo ya kisiasa yanatawanyika kwa pamoja na kwa muda, na hivyo kufanya iwe vigumu kwa watu binafsi kuona moja kwa moja athari zao kamili kwa pande zilizoathiriwa ambazo hazionekani.
wrong_answers:
  - Maamuzi ya kisiasa yanahitaji maarifa maalum ambayo ni wachumi na wataalamu wa sera waliofunzwa pekee ndio wanaweza kuelewa na kutathmini vya kutosha
  - Chaguo za kisiasa zinahusisha mambo ya kimaadili yanayozidi hesabu za kimantiki, tofauti na maamuzi ya kiuchumi ambayo ni ya manufaa tu
  - Mifumo ya kisiasa huficha taarifa kimakusudi ili kudumisha mamlaka, huku masoko yakitoa ishara za bei zilizo wazi kwa washiriki wote
explanation: |
  Maandishi yanaelezea haswa kwamba maamuzi ya kisiasa yana matokeo ya pamoja ambayo ni 'magumu kuyachunguza kwa kila mtu' na kwamba 'kipimo cha kisiasa kinaweza kuwadhuru watu kikamilifu ambao raia haoni moja kwa moja.' Mgawanyiko huu wa muda na wa anga kutoka kwa matokeo, pamoja na asili yao ya pamoja, hufanya uchaguzi wa kisiasa kuwa mgumu zaidi kutathmini kuliko maamuzi ya haraka ya kiuchumi ya kibinafsi ambapo matokeo yanaweza kuonekana moja kwa moja na kurekebishwa.
question: Dushingiye ku nseguro y’imisoro y’ugufata n’amabwirizwa y’ugutera imbere, ni igiki gitandukanya imisoro yemewe n’uburyo bwo kutagira umwidegemvyo?
answer: Imisoro yemewe itanga amahera y’ubutungane n’ibikorwa vya polisi bitanga umwidegemvyo n’umutekano, mu gihe imisoro y’ugufata ibintu ikora nk’ugufata ibintu vy’ukuri .
wrong_answers:
  - Imisoro yemewe yegeranywa biciye mu nzira za demokarasi, mu gihe imisoro y’ugufata ibintu iterwa n’abanyabiro batatowe .
  - Imisoro yemewe ikoreshwa kimwe ku benegihugu bose, mu gihe imisoro y’ugufata ibintu ikoreshwa ku migwi yihariye y’imibano canke y’ubutunzi .
  - Imisoro yemewe ifasha mu bikorwa vya Leta nk’uburezi n’ubuvuzi, mu gihe imisoro y’ugufata ibintu ifasha mu kwagura igisirikare
explanation: |
  Ico canditswe kiratandukanya cane cane imisoro ikoreshwa mu gufasha ubutungane n’ibikorwa vya polisi - mu vy’ukuri birinda umwidegemvyo n’umutekano - n’iyo ikora nk’ugufata ibintu vy’ukuri. Iciyumviro nyamukuru si inzira ya demokarasi, ugukoresha mu buryo bungana, canke ibikorwa vyihariye biterwa inkunga, ahubwo ni nimba iyo misoro ishigikira inzego z’ishimikiro zishoboza umwidegemvyo (ubutungane n’umutekano) canke nimba ifata umutungo kandi igahagarika amahitamwo y’umuntu ku giti ciwe. Imisoro y’ugufata ibintu igereranya uburyo butandukanye bwo kutagira umwidegemvyo buhungabanya uburenganzira bw’itunga n’ukwigenga kw’umuntu ku giti ciwe.
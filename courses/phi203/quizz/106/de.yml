question: Welches Grundprinzip erklärt nach der Analyse des Abbé de Saint-Pierre über den Handelsaustausch, warum der Handel zwischen Kaufleuten freiwillig erfolgt?
answer: Sowohl der Käufer als auch der Verkäufer ziehen einen gegenseitigen Nutzen aus der Transaktion, sonst würde keiner von beiden dem Handel zustimmen
wrong_answers:
  - Eine Partei gewinnt immer mehr als die andere, was zu einem Wettbewerbsvorteil bei künftigen Verhandlungen führt
  - Die Regierung reguliert die Preise, um eine gerechte Verteilung der Gewinne zwischen den Handelspartnern zu gewährleisten
  - Die Marktkräfte gleichen die Gewinne automatisch aus, so dass das Gesamtvermögen über alle Transaktionen hinweg konstant bleibt
explanation: |
  Abbé de Saint-Pierre erkannte, dass ein freiwilliger Austausch ein Positivsummenspiel ist, bei dem beide Parteien profitieren. Er wies darauf hin, dass bei einem Verkauf zwischen Kaufleuten sowohl der Verkäufer als auch der Käufer profitieren, denn ohne gegenseitigen Nutzen würde keiner von beiden dem Geschäft zu diesem Preis zustimmen. Dieser Grundsatz zeigt, dass der freiwillige Handel für beide Parteien einen Wert schafft und nicht einfach nur Reichtum von einem zum anderen transferiert, weshalb sich die Menschen für den Handel und Verträge entscheiden.
question: Theo phân tích của Abbé de Saint-Pierre về trao đổi thương mại, nguyên tắc cơ bản nào giải thích tại sao thương mại tự nguyện lại diễn ra giữa các thương nhân?
answer: Cả người mua và người bán đều thu được lợi ích chung từ giao dịch, nếu không thì sẽ không ai đồng ý giao dịch.
wrong_answers:
  - Một bên luôn được lợi nhiều hơn bên kia, tạo ra lợi thế cạnh tranh trong các cuộc đàm phán tương lai.
  - Chính phủ điều tiết giá cả để đảm bảo phân phối lợi nhuận công bằng giữa các bên tham gia thương mại.
  - Các quy luật thị trường tự động cân bằng lợi nhuận sao cho tổng tài sản luôn ổn định trong tất cả các giao dịch.
explanation: |
  Abbé de Saint-Pierre nhận ra rằng trao đổi tự nguyện là một trò chơi có lợi cho cả hai bên. Ông lưu ý rằng khi một giao dịch mua bán diễn ra giữa các thương nhân, cả người bán và người mua đều có lợi vì nếu không có lợi ích chung, sẽ không ai đồng ý giao dịch ở mức giá đó. Nguyên tắc này chứng minh rằng thương mại tự nguyện tạo ra giá trị cho cả hai bên chứ không chỉ đơn thuần là chuyển giao của cải từ người này sang người khác, đó là lý do tại sao mọi người lựa chọn tham gia vào thương mại và các hợp đồng.
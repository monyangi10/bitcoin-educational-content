question: Secondo l'analisi dell'Abbé de Saint-Pierre sullo scambio commerciale, quale principio fondamentale spiega perché gli scambi volontari avvengono tra mercanti?
answer: Sia l'acquirente che il venditore traggono un vantaggio reciproco dalla transazione, altrimenti nessuno dei due accetterebbe di commerciare
wrong_answers:
  - Una parte guadagna sempre più dell'altra, creando un vantaggio competitivo nelle trattative future
  - Il governo regola i prezzi per garantire un'equa distribuzione dei profitti tra le parti commerciali
  - Le forze di mercato bilanciano automaticamente i guadagni in modo che la ricchezza totale rimanga costante in tutte le transazioni
explanation: |
  L'Abbé de Saint-Pierre riconosceva che lo scambio volontario è un gioco a somma positiva in cui entrambe le parti traggono vantaggio. Egli osservò che quando si verifica una vendita tra mercanti, sia il venditore che l'acquirente ci guadagnano perché, senza un vantaggio reciproco, nessuno dei due accetterebbe la transazione a quel prezzo. Questo principio dimostra che lo scambio volontario crea valore per entrambe le parti piuttosto che trasferire semplicemente ricchezza da una all'altra, ed è per questo che le persone scelgono di impegnarsi nel commercio e nei contratti.
question: 根据 Abbé de Saint-Pierre 对商业交换的分析，什么基本原则可以解释商人之间为什么会进行自愿贸易？
answer: 买卖双方都能从交易中获益，否则双方都不会同意交易
wrong_answers:
  - 一方总是比另一方获益更多，从而在未来的谈判中创造竞争优势
  - 政府监管价格，确保贸易各方公平分配利润
  - 市场力量自动平衡收益，使所有交易的总财富保持不变
explanation: |
  Abbé de Saint-Pierre 认识到，自愿交换是一种正和博弈，双方都会受益。他指出，当商人之间进行交易时，卖方和买方都会受益，因为如果没有互利，双方都不会同意以该价格进行交易。这一原则表明，自愿交易为双方创造价值，而不是简单地将财富从一方转移到另一方，这也是人们选择从事商业和签订合同的原因。
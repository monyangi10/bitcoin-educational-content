question: Според анализа на търговския обмен, направен от абат дьо Сен-Пиер, кой основен принцип обяснява защо между търговците се осъществява доброволна търговия?
answer: И купувачът, и продавачът получават взаимна изгода от сделката, защото в противен случай никой от тях не би се съгласил да търгува
wrong_answers:
  - Едната страна винаги печели повече от другата, което създава конкурентно предимство при бъдещи преговори
  - Правителството регулира цените, за да осигури справедливо разпределение на печалбите между търговските страни
  - Пазарните сили автоматично балансират печалбите, така че общото богатство да остане постоянно при всички транзакции
explanation: |
  Абат дьо Сен-Пиер признава, че доброволната размяна е игра с положителен резултат, от която печелят и двете страни. Той отбелязва, че когато се извършва продажба между търговци, и продавачът, и купувачът печелят, тъй като без взаимна изгода никой от тях не би се съгласил да извърши сделката на тази цена. Този принцип показва, че доброволната размяна създава стойност и за двете страни, а не просто прехвърля богатство от едната към другата, поради което хората избират да се занимават с търговия и да сключват договори.
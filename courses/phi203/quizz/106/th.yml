question: ตามการวิเคราะห์ของ Abbé de Saint-Pierre เกี่ยวกับการแลกเปลี่ยนทางการค้า หลักการพื้นฐานใดที่อธิบายว่าทำไมการค้าขายโดยสมัครใจจึงเกิดขึ้นระหว่างพ่อค้า?
answer: ทั้งผู้ซื้อและผู้ขายได้รับประโยชน์ร่วมกันจากการทำธุรกรรม มิฉะนั้นจะไม่มีฝ่ายใดยอมตกลงที่จะทำการค้า
wrong_answers:
  - ฝ่ายหนึ่งมักจะได้เปรียบมากกว่าอีกฝ่ายหนึ่งเสมอ สร้างความได้เปรียบในการแข่งขันในการเจรจาในอนาคต
  - รัฐบาลควบคุมราคาเพื่อให้แน่ใจว่ามีการกระจายผลกำไรอย่างเป็นธรรมระหว่างคู่ค้าทั้งสองฝ่าย
  - แรงตลาดปรับสมดุลกำไรโดยอัตโนมัติเพื่อให้ความมั่งคั่งรวมคงที่ในทุกธุรกรรม
explanation: |
  Abbé de Saint-Pierre ตระหนักว่าการแลกเปลี่ยนโดยสมัครใจเป็นเกมผลรวมบวกที่ทั้งสองฝ่ายได้รับประโยชน์ เขาสังเกตว่าเมื่อการขายเกิดขึ้นระหว่างพ่อค้า ทั้งผู้ขายและผู้ซื้อจะได้รับผลประโยชน์ เพราะหากไม่มีประโยชน์ร่วมกัน ทั้งสองฝ่ายจะไม่ยอมรับการทำธุรกรรมในราคานั้น หลักการนี้แสดงให้เห็นว่าการค้าขายโดยสมัครใจสร้างมูลค่าให้กับทั้งสองฝ่ายแทนที่จะเป็นเพียงการโอนความมั่งคั่งจากฝ่ายหนึ่งไปยังอีกฝ่ายหนึ่ง ซึ่งเป็นเหตุผลที่ผู้คนเลือกที่จะมีส่วนร่วมในการค้าและสัญญา
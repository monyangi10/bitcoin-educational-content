question: アベ・ド・サン＝ピエールの商業交換の分析によれば、商人の間で自発的な取引が行われる理由を説明する基本原則は何か？
answer: 買い手と売り手の双方が取引から相互利益を得なければ、どちらも取引に応じることはない。
wrong_answers:
  - 一方の当事者は常に他方より多くの利益を得ており、将来の交渉において競争上の優位性を生み出している。
  - 政府は、取引当事者間の公正な利益配分を確保するために価格を規制する。
  - 市場の力が自動的に利益のバランスをとるため、すべての取引において富の総額は一定に保たれる。
explanation: |
  アベ・ド・サン＝ピエールは、自発的な交換は双方が利益を得るポジティブ・サム・ゲームであると認識していた。彼は、商人の間で売買が行われる場合、売り手と買い手の双方が利益を得ることを指摘した。この原則は、自発的な取引は単に一方から他方へ富を移転するのではなく、双方に価値を生み出すことを示している。
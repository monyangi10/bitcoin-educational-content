question: Согласно анализу коммерческого обмена, проведенному аббатом де Сен-Пьером, какой фундаментальный принцип объясняет, почему между купцами происходит добровольная торговля?
answer: И покупатель, и продавец получают взаимную выгоду от сделки, иначе ни один из них не согласился бы торговать
wrong_answers:
  - Одна из сторон всегда выигрывает больше, чем другая, что создает конкурентное преимущество в будущих переговорах
  - Государство регулирует цены, чтобы обеспечить справедливое распределение прибыли между участниками торговли
  - Рыночные силы автоматически уравновешивают прибыль так, что общее богатство остается неизменным во всех сделках
explanation: |
  Аббат де Сен-Пьер признавал, что добровольный обмен - это игра с положительной суммой, в которой выигрывают обе стороны. Он отметил, что при продаже между купцами выигрывают и продавец, и покупатель, поскольку без взаимной выгоды ни один из них не согласился бы на сделку по такой цене. Этот принцип демонстрирует, что добровольная торговля создает выгоду для обеих сторон, а не просто передает богатство от одного к другому, поэтому люди предпочитают участвовать в коммерции и заключать контракты.
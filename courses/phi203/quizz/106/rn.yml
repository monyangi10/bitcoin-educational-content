question: Dukurikije icegeranyo ca Abbé de Saint-Pierre ku bijanye n’uguhinduranya ubudandaji, ni ingingo ngenderwako iyihe y’ishimikiro isigura igituma ubudandaji bw’ubushake buba hagati y’abadandaza?
answer: Uwuguze n’uwugurisha bompi bararonka inyungu ku bijanye n’ugucuruza, ahandi ho nta n’umwe muri bo yokwemera gucuruza .
wrong_answers:
  - Umuhari umwe wama uronka inyungu nyinshi kuruta uwundi, ivyo bikaba bituma haba inyungu mu biganiro vyo muri kazoza .
  - Leta iratunganya ibiciro kugira ngo inyungu zigabanuke neza hagati y'abacuruzi .
  - Inkomezi z'isoko zihita ziringaniza inyungu kugira ngo ubutunzi bwose bugume ari bumwe mu bikorwa vyose
explanation: |
  Abbé de Saint-Pierre yaremeye ko uguhanahana amakuru ku bushake ari urukino rw’amahera meza aho abo bompi buvyungukirako. Yavuze yuko iyo habaye ugurisha hagati y’abadandaza, uwugurisha n’uwugura bose baronka inyungu kubera ko ata nyungu bahuriyeko, nta n’umwe muri bo yokwemera ko bagurisha kuri ico gici- ro. Iryo hame ryerekana ko ubudandaji bw’ubushake butera agaciro ku mpande zompi aho gusa gukura ubutunzi ku wundi, ni co gituma abantu bahitamwo gukora ubudandaji n’amasezerano.
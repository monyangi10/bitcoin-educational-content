question: Hvilket grunnleggende prinsipp forklarer, ifølge Abbé de Saint-Pierres analyse av handelsutveksling, hvorfor frivillig handel oppstår mellom kjøpmenn?
answer: Både kjøper og selger får gjensidig nytte av transaksjonen, ellers ville ingen av dem gått med på å handle
wrong_answers:
  - Den ene parten vinner alltid mer enn den andre, noe som skaper et konkurransefortrinn i fremtidige forhandlinger
  - Myndighetene regulerer prisene for å sikre en rettferdig fordeling av fortjenesten mellom handelspartene
  - Markedskreftene balanserer automatisk gevinstene slik at den totale formuen forblir konstant på tvers av alle transaksjoner
explanation: |
  Abbé de Saint-Pierre innså at frivillig bytte er et pluss-sum-spill der begge parter tjener på det. Han bemerket at når et salg skjer mellom kjøpmenn, tjener både selger og kjøper på det, for uten gjensidig nytte ville ingen av dem gått med på transaksjonen til den prisen. Dette prinsippet viser at frivillig handel skaper verdi for begge parter, og ikke bare overfører verdier fra den ene til den andre, noe som er grunnen til at folk velger å engasjere seg i handel og kontrakter.
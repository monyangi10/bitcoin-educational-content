question: Menurut analisis Abbé de Saint-Pierre tentang pertukaran komersial, prinsip fundamental apa yang menjelaskan mengapa perdagangan sukarela terjadi di antara para pedagang?
answer: Baik pembeli maupun penjual mendapatkan keuntungan bersama dari transaksi ini, jika tidak, keduanya tidak akan setuju untuk berdagang
wrong_answers:
  - Satu pihak selalu mendapatkan keuntungan lebih banyak dari pihak lain, menciptakan keunggulan kompetitif dalam negosiasi di masa depan
  - Pemerintah mengatur harga untuk memastikan distribusi keuntungan yang adil di antara para pihak yang berdagang
  - Kekuatan pasar secara otomatis menyeimbangkan keuntungan sehingga total kekayaan tetap konstan di semua transaksi
explanation: |
  Abbé de Saint-Pierre mengakui bahwa pertukaran sukarela adalah permainan jumlah positif di mana kedua belah pihak mendapatkan keuntungan. Dia mencatat bahwa ketika penjualan terjadi di antara para pedagang, baik penjual maupun pembeli sama-sama diuntungkan karena tanpa adanya rasa saling menguntungkan, keduanya tidak akan menyetujui transaksi pada harga tersebut. Prinsip ini menunjukkan bahwa perdagangan sukarela menciptakan nilai bagi kedua belah pihak, bukan sekadar memindahkan kekayaan dari satu pihak ke pihak lain, dan itulah mengapa orang memilih untuk terlibat dalam perdagangan dan kontrak.
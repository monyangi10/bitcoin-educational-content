question: What was the distinctive methodological achievement of Paul Leroy-Beaulieu's Le Collectivisme (1883) regarding communist society?
answer: He analyzed in advance how a communist society would actually function, filling in the concrete details that communist theorists themselves had deliberately left vague
wrong_answers:
  - He conducted comparative fieldwork in early socialist communes across Europe and America to document empirically what collectivist organization produced in practice
  - He translated and critiqued the complete works of Marx and Engels, identifying internal contradictions in their economic theory before those contradictions became historical fact
  - He reconstructed from historical archives how pre-capitalist communal societies in ancient Rome and medieval Europe had organized production and distribution
explanation: |
  Leroy-Beaulieu set out to analyze in advance how a communist society would actually function, since the theorists of communism — Karl Marx foremost among them — had been remarkably sparing with details about the society that was to replace capitalism. Socialism was returning in force around the time of the Commune, and with democracy and universal suffrage it was becoming increasingly threatening. By reasoning from first principles about what a society organized on collectivist lines would necessarily look like, Leroy-Beaulieu reached conclusions of devastating accuracy — conclusions that the actual communist experiments of the 20th century would confirm decades later.

question: 선사시대 사회에서 토지의 사유재산이 성립할 수 없었던 주된 이유는 무엇이었나요?
answer: 사냥과 채집과 같은 생산적인 활동에는 광활한 공용 공간을 유목민처럼 사용해야 합니다
wrong_answers:
  - 종교적 신념은 개인 소유를 금지하고 토지에 대한 집단적 영적 연결을 의무화했습니다
  - 정치 지도자들은 자원에 대한 절대적인 통제력을 유지하기 위해 의도적으로 사적 소유를 막았습니다
  - 서면 언어가 부족하여 소유권을 설정하는 법적 문서를 작성할 수 없었습니다
explanation: |
  이 장에 따르면, 선사 시대 사회에서는 현실적인 물질적 제약으로 인해 토지의 사유 재산화가 불가능했습니다. 들소 사냥, 낚시, 채집과 같은 활동은 매우 넓은 영토를 가로지르는 유목 이동이 필요했기 때문에 좁은 땅에서는 효과적으로 사냥을 할 수 없었습니다. 공동 재산은 이념적인 선택이 아니라 사람들이 생존을 위해 생활하고 일해야 하는 현실에 대한 합리적인 적응이었습니다. 다른 옵션은 이러한 근본적인 경제적 필요성보다는 종교적, 정치적 또는 법적 이유를 잘못 제시하고 있습니다.
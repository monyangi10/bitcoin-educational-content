question: Коя е основната причина за невъзможността да се установи частна собственост върху земята в праисторическите общества?
answer: Продуктивни дейности като лов и събирателство изискват номадско използване на обширни общи пространства
wrong_answers:
  - Религиозните вярвания забраняват индивидуалната собственост и налагат колективна духовна връзка със земята
  - Политическите лидери умишлено възпрепятстват частната собственост, за да запазят абсолютния си контрол върху ресурсите
  - Липсата на писмен език не позволяваше да се създадат правни документи, установяващи правата на собственост
explanation: |
  Според тази глава частната собственост върху земята е била невъзможна в праисторическите общества поради практически материални ограничения. Дейности като лов на бизони, риболов и събирателство са изисквали номадско придвижване из много големи територии - не е било възможно да се ловува ефективно на малък ограден парцел. Колективната собственост не е била идеологически избор, а рационално приспособяване към реалностите, в които хората е трябвало да живеят и работят, за да оцелеят. Другите варианти некоректно предполагат религиозни, политически или правни причини, а не тези фундаментални икономически необходимости.
question: По какой основной причине в доисторических обществах невозможно было установить частную собственность на землю?
answer: Продуктивные занятия, такие как охота и собирательство, требовали от кочевников использования обширных общих пространств
wrong_answers:
  - Религиозные верования запрещали индивидуальное владение и обязывали к коллективной духовной связи с землей
  - Политические лидеры намеренно препятствовали частной собственности, чтобы сохранить абсолютный контроль над ресурсами
  - Отсутствие письменности делало невозможным создание юридических документов, устанавливающих права собственности
explanation: |
  Согласно этой главе, частная собственность на землю была невозможна в доисторических обществах из-за практических материальных ограничений. Такие виды деятельности, как охота на бизонов, рыболовство и собирательство, требовали кочевого перемещения по очень большим территориям - вы не могли эффективно охотиться на небольшом огороженном участке земли. Коллективная собственность была не идеологическим выбором, а рациональной адаптацией к реалиям того, как люди должны были жить и работать, чтобы выжить. Другие варианты неверно указывают на религиозные, политические или юридические причины, а не на фундаментальную экономическую необходимость.
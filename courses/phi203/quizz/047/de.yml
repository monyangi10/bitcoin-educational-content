question: Was war der Hauptgrund dafür, dass sich in prähistorischen Gesellschaften kein Privateigentum an Grund und Boden etablieren konnte?
answer: Produktive Tätigkeiten wie Jagen und Sammeln erforderten die nomadische Nutzung großer Gemeinschaftsräume
wrong_answers:
  - Religiöse Überzeugungen verboten individuellen Besitz und verlangten eine kollektive spirituelle Verbindung zum Land
  - Die politischen Führer verhinderten absichtlich Privateigentum, um ihre absolute Kontrolle über die Ressourcen zu behalten
  - Die fehlende Schriftsprache machte es unmöglich, rechtliche Dokumente zu erstellen, die Eigentumsrechte begründen
explanation: |
  Dem Kapitel zufolge war Privateigentum an Land in prähistorischen Gesellschaften aufgrund praktischer materieller Zwänge unmöglich. Aktivitäten wie die Bisonjagd, das Fischen und Sammeln erforderten eine nomadische Bewegung über sehr große Territorien - auf einem kleinen, umschlossenen Stück Land konnte man nicht effektiv jagen. Kollektives Eigentum war keine ideologische Entscheidung, sondern eine rationale Anpassung an die Realität, in der die Menschen leben und arbeiten mussten, um zu überleben. Die anderen Optionen lassen fälschlicherweise eher auf religiöse, politische oder rechtliche Gründe schließen als auf diese grundlegenden wirtschaftlichen Notwendigkeiten.
question: 史前社会无法建立土地私有财产的主要原因是什么？
answer: 狩猎和采集等生产活动需要游牧民族使用广阔的公共空间
wrong_answers:
  - 宗教信仰禁止个人拥有土地，而要求集体与土地建立精神联系
  - 政治领导人故意阻止私人所有权，以保持对资源的绝对控制
  - 由于缺乏书面语言，无法制定确立所有权的法律文件
explanation: |
  该章指出，由于实际物质条件的限制，史前社会不可能拥有土地私有财产。狩猎野牛、捕鱼和采集等活动需要在广袤的土地上游牧--你不可能在一小块封闭的土地上有效地狩猎。集体财产并不是一种意识形态的选择，而是人们为生存而必须生活和工作的现实情况下的一种理性适应。其他选项错误地暗示了宗教、政治或法律原因，而不是这些基本的经济需要。
question: Apa alasan utama mengapa kepemilikan pribadi atas tanah tidak mungkin dilakukan dalam masyarakat prasejarah?
answer: Kegiatan produktif seperti berburu dan meramu membutuhkan penggunaan ruang umum yang luas secara nomaden
wrong_answers:
  - Keyakinan agama melarang kepemilikan individu dan mewajibkan hubungan spiritual kolektif dengan tanah
  - Para pemimpin politik dengan sengaja mencegah kepemilikan swasta untuk mempertahankan kontrol mutlak mereka atas sumber daya
  - Kurangnya bahasa tertulis membuat tidak mungkin untuk membuat dokumen hukum yang menetapkan hak kepemilikan
explanation: |
  Menurut bab ini, kepemilikan tanah secara pribadi tidak mungkin terjadi pada masyarakat prasejarah karena kendala material praktis. Kegiatan seperti berburu bison, memancing, dan meramu membutuhkan pergerakan nomaden melintasi wilayah yang sangat luas - Anda tidak bisa berburu secara efektif di sebidang tanah kecil yang tertutup. Kepemilikan kolektif bukanlah pilihan ideologis, melainkan adaptasi rasional terhadap realitas tentang bagaimana orang harus hidup dan bekerja untuk bertahan hidup. Pilihan-pilihan lain secara keliru menunjukkan alasan-alasan agama, politik, atau hukum, bukan karena kebutuhan ekonomi yang mendasar.
question: Qual foi a principal razão pela qual a propriedade privada da terra foi impossível de estabelecer nas sociedades pré-históricas?
answer: As actividades produtivas, como a caça e a recolha, exigiam a utilização nómada de vastos espaços comuns
wrong_answers:
  - As crenças religiosas proibiam a propriedade individual e obrigavam a uma ligação espiritual colectiva à terra
  - Os líderes políticos impediram deliberadamente a propriedade privada para manterem o seu controlo absoluto sobre os recursos
  - A falta de linguagem escrita impossibilitou a criação de documentos legais que estabelecessem os direitos de propriedade
explanation: |
  De acordo com o capítulo, a propriedade privada da terra era impossível nas sociedades pré-históricas devido a restrições materiais práticas. Actividades como a caça ao bisonte, a pesca e a recolha exigiam movimentos nómadas através de territórios muito vastos - não era possível caçar eficazmente numa pequena parcela de terra fechada. A propriedade colectiva não foi uma escolha ideológica, mas uma adaptação racional às realidades de como as pessoas tinham de viver e trabalhar para sobreviver. As outras opções sugerem incorretamente razões religiosas, políticas ou legais e não estas necessidades económicas fundamentais.
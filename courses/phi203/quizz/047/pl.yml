question: Jaki był główny powód, dla którego prywatna własność ziemi była niemożliwa do ustanowienia w prehistorycznych społeczeństwach?
answer: Produktywne działania, takie jak polowanie i zbieractwo, wymagały koczowniczego wykorzystania rozległych wspólnych przestrzeni
wrong_answers:
  - Przekonania religijne zabraniały indywidualnej własności i nakazywały zbiorowe duchowe połączenie z ziemią
  - Przywódcy polityczni celowo uniemożliwiali prywatną własność, aby utrzymać absolutną kontrolę nad zasobami
  - Brak języka pisanego uniemożliwiał tworzenie dokumentów prawnych ustanawiających prawa własności
explanation: |
  Według rozdziału, prywatna własność ziemi była niemożliwa w prehistorycznych społeczeństwach ze względu na praktyczne ograniczenia materialne. Zajęcia takie jak polowanie na żubry, łowienie ryb i zbieractwo wymagały koczowniczego przemieszczania się po bardzo dużych terytoriach - nie można było skutecznie polować na małej, zamkniętej działce. Własność zbiorowa nie była wyborem ideologicznym, ale racjonalną adaptacją do realiów tego, jak ludzie musieli żyć i pracować, aby przetrwać. Inne opcje błędnie sugerują powody religijne, polityczne lub prawne, a nie te fundamentalne potrzeby gospodarcze.
question: Ni imvo nyamukuru iyihe yatumye ubutaka bw’abantu ku giti cabo budashoboka mu mibano y’imbere y’amateka?
answer: Ibikorwa vy'umwimbu nk'uguhiga no kwegeranya vyasaba ko abantu bimukira gukoresha ibibanza vyinshi rusangi
wrong_answers:
  - Ivyizerwa vy'idini vyabujije umuntu ku giti ciwe kugira ubutaka kandi vyategetse ko abantu bose bagira ubucuti bw'impwemu n'ubutaka
  - Abarongozi ba politike barabujije n'ibigirankana ubutunzi bw'abantu ku giti cabo kugira ngo bagume bafise ububasha bwose ku butunzi .
  - Kubura ururimi rwanditswe vyatumye bidashoboka guhingura inyandiko zishingiye ku mategeko zishinga uburenganzira bwo kuba uwufise .
explanation: |
  Dushingiye ku kigabane, ubutunzi bw’umuntu ku giti ciwe ntibwari bushoboka mu mibano y’imbere y’amateka kubera ingorane z’ibintu zikora. Ibikorwa nk’uguhigira ibikoko vy’ibisiga, kuroba, no gukorakoranya vyasaba ko umuntu agendagenda mu turere tunini cane - ntushobora guhigira neza ku butaka butoyi buzitiye. Itunga ry’abantu bose ntiryari uguhitamwo kw’ingengabitekerezo ahubwo ryari uguhuza n’ukuri kw’ingene abantu bategerezwa kubaho no gukora kugira ngo bashobore kubaho. Ayandi mahitamwo avuga mu buryo butari bwo imvo z’idini, za politike canke z’amategeko aho gutanga izo mpamvu z’ishimikiro z’ubutunzi.
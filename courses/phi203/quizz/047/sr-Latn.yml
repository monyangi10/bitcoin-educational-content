question: Koji je bio primarni razlog zašto je bilo nemoguće uspostaviti privatno vlasništvo nad zemljom u praistorijskim društvima?
answer: Produktivne aktivnosti poput lova i sakupljanja zahtevale su nomadsko korišćenje velikih zajedničkih prostora
wrong_answers:
  - Verska uverenja su zabranjivala individualno vlasništvo i nalagala kolektivnu duhovnu povezanost sa zemljom.
  - Politički lideri su namerno sprečili privatno vlasništvo kako bi zadržali apsolutnu kontrolu nad resursima.
  - Nedostatak pisanog jezika onemogućio je stvaranje pravnih dokumenata koji uspostavljaju prava vlasništva
explanation: |
  Prema poglavlju, privatno vlasništvo nad zemljom bilo je nemoguće u praistorijskim društvima zbog praktičnih materijalnih ograničenja. Aktivnosti poput lova na bizone, ribolova i sakupljanja zahtevale su nomadsko kretanje preko veoma velikih teritorija - nije bilo moguće efikasno loviti na malom ograđenom komadu zemlje. Kolektivno vlasništvo nije bilo ideološki izbor već racionalna adaptacija na realnosti načina na koji su ljudi morali živeti i raditi da bi preživeli. Druge opcije pogrešno sugerišu verske, političke ili pravne razloge umesto ovih osnovnih ekonomskih potreba.
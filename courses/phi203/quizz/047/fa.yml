question: دلیل اصلی که چرا مالکیت خصوصی زمین در جوامع پیشاتاریخی غیرممکن بود چیست؟
answer: فعالیت‌های مولدی مانند شکار و جمع‌آوری نیازمند استفاده‌ی کوچ‌نشینی از فضاهای وسیع مشترک بود.
wrong_answers:
  - باورهای مذهبی مالکیت فردی را ممنوع کرده و ارتباط معنوی جمعی با زمین را الزامی می‌کردند.
  - رهبران سیاسی عمداً مالکیت خصوصی را برای حفظ کنترل مطلق خود بر منابع جلوگیری کردند.
  - نبود زبان نوشتاری ایجاد اسناد قانونی برای تعیین حقوق مالکیت را غیرممکن ساخت.
explanation: |
  بر اساس فصل، مالکیت خصوصی زمین در جوامع پیشاتاریخی به دلیل محدودیت‌های مادی عملی غیرممکن بود. فعالیت‌هایی مانند شکار بوفالو، ماهیگیری و جمع‌آوری نیاز به حرکت‌های کوچ‌نشینی در سراسر قلمروهای بسیار وسیع داشتند - شما نمی‌توانستید به طور مؤثر در یک قطعه زمین کوچک و محصور شکار کنید. مالکیت جمعی یک انتخاب ایدئولوژیک نبود بلکه یک تطبیق منطقی با واقعیت‌هایی بود که مردم برای بقا مجبور به زندگی و کار بر اساس آن‌ها بودند. گزینه‌های دیگر به اشتباه دلایل مذهبی، سیاسی یا قانونی را پیشنهاد می‌دهند به جای این ضرورت‌های اساسی اقتصادی.
question: Nguyên nhân chính khiến việc thiết lập quyền sở hữu tư nhân đối với đất đai trong các xã hội tiền sử là gì?
answer: Các hoạt động sản xuất như săn bắn và hái lượm đòi hỏi lối sống du mục phải sử dụng những không gian chung rộng lớn.
wrong_answers:
  - Các tín ngưỡng tôn giáo cấm sở hữu cá nhân và quy định sự gắn kết tâm linh tập thể với đất đai.
  - Các nhà lãnh đạo chính trị cố tình ngăn cản quyền sở hữu tư nhân để duy trì quyền kiểm soát tuyệt đối của họ đối với các nguồn tài nguyên
  - Việc thiếu chữ viết đã khiến việc lập ra các văn bản pháp lý xác lập quyền sở hữu trở nên bất khả thi.
explanation: |
  Theo chương này, quyền sở hữu tư nhân đối với đất đai là điều không thể trong các xã hội tiền sử do những hạn chế vật chất thực tế. Các hoạt động như săn bắn bò rừng, đánh bắt cá và hái lượm đòi hỏi sự di chuyển du mục trên những vùng lãnh thổ rất rộng lớn - bạn không thể săn bắn hiệu quả trên một mảnh đất nhỏ khép kín. Chế độ sở hữu tập thể không phải là một lựa chọn mang tính ý thức hệ mà là một sự thích nghi hợp lý với thực tế về cách con người phải sống và làm việc để sinh tồn. Các lựa chọn khác đưa ra những lý do không chính xác, mang tính tôn giáo, chính trị hoặc pháp lý hơn là những nhu cầu kinh tế cơ bản này.
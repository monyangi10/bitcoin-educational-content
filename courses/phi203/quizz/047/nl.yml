question: Wat was de belangrijkste reden waarom privébezit van land onmogelijk was in prehistorische samenlevingen?
answer: Productieve activiteiten zoals jagen en verzamelen vereisten nomadisch gebruik van uitgestrekte gemeenschappelijke ruimten
wrong_answers:
  - Religieuze overtuigingen verboden individueel eigendom en verplichtten tot een collectieve spirituele band met het land
  - Politieke leiders verhinderden opzettelijk privébezit om hun absolute controle over hulpbronnen te behouden
  - Gebrek aan geschreven taal maakte het onmogelijk om juridische documenten op te stellen die eigendomsrechten vastleggen
explanation: |
  Volgens het hoofdstuk was privébezit van land onmogelijk in prehistorische samenlevingen vanwege praktische materiële beperkingen. Voor activiteiten als bizonjacht, vissen en verzamelen was nomadische verplaatsing over zeer grote gebieden nodig - je kon niet effectief jagen op een klein omsloten stuk land. Collectief eigendom was geen ideologische keuze maar een rationele aanpassing aan de realiteit van hoe mensen moesten leven en werken om te overleven. De andere opties suggereren ten onrechte religieuze, politieke of wettelijke redenen in plaats van deze fundamentele economische noodzakelijkheden.
question: Evolusi historis apa yang terjadi terkait gangguan dan pembatasan hukum yang menyertai perkembangan masyarakat yang lebih bebas?
answer: Pengecualian progresif terhadap lebih banyak jenis gangguan dari kerangka hukum
wrong_answers:
  - Perluasan pembatasan hukum untuk mencakup semua bentuk persaingan usaha
  - Penetapan peraturan yang lebih ketat terhadap kemajuan teknologi
  - Kembali ke standar perlindungan masyarakat abad pertengahan dari perubahan
explanation: |
  Bab ini menjelaskan bahwa evolusi sejarah menunjukkan adanya perluasan progresif dari gangguan yang dikecualikan dari kerangka hukum ketika masyarakat menjadi lebih bebas. Pada abad pertengahan, persaingan dan kemajuan teknologi sering kali dikutuk secara hukum karena dampaknya terkonsentrasi pada komunitas kecil. Ketika masyarakat berkembang menuju kebebasan yang lebih besar, pembatasan ini secara bertahap dicabut, sehingga memungkinkan persaingan ekonomi dan inovasi berkembang tanpa kecaman hukum. Hal ini merupakan sebuah evolusi untuk membedakan antara keluhan hukum yang sah dan ketidaknyamanan ekonomi yang seharusnya tidak perlu mendapat intervensi hukum.
question: Ni uguhinduka ukuhe kwabaye mu mateka ku bijanye n’ibintu bitera umubabaro be n’uburenganzira bushingiye ku mategeko vyaherekejwe n’iterambere ry’ikibano c’abantu bafise umwidegemvyo kuruta?
answer: Gukuraho ubwoko bwinshi bw'ibitera ingorane mu nzego z'amategeko
wrong_answers:
  - Ukwagura amategeko agenga ivy'uguhiganwa mu vy'ubutunzi
  - Gushinga amabwirizwa akomeye cane arwanya iterambere ry'ubuhinga
  - Gusubira ku ngingo mfatirwako zo mu kinjana ca mbere zo gukingira abarundi amahinduka
explanation: |
  Ico kigabane kirasigura ko ugutera imbere kw’amateka kwerekana ugutera imbere kw’ibintu bibabaza bikuwe mu rwego rw’amategeko uko abantu barushiriza kwidegemvya. Mu bihe vya kera, uguhiganwa n’ugutera imbere mu vy’ubuhinga bwa none akenshi vyacirirwa urubanza n’amategeko kubera ko ingaruka zavyo zari zishingiye ku mibano mitomito. Uko abantu bagenda baratera imbere kugira ngo baronke umwidegemvyo mwinshi, ivyo bibujijwe vyarakurwaho buhorobuhoro, bituma uguhiganwa mu vy’ubutunzi n’uguhingura ibintu bishasha bitera imbere ata n’umwe acirirwa urubanza n’amategeko. Ivyo bigereranya iterambere ry’ugutandukanya ibirego vyemewe n’amategeko n’ingorane gusa z’ubutunzi zidakwiye gufatwa n’amategeko.
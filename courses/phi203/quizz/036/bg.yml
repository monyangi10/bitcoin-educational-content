question: Каква историческа еволюция по отношение на неудобствата и правните ограничения е съпътствала развитието на по-свободно общество?
answer: Постепенно изключване на повече видове неудобства от правната рамка
wrong_answers:
  - Разширяване на правните ограничения, така че да обхванат всички форми на икономическа конкуренция
  - Въвеждане на по-строги правила срещу технологичния прогрес
  - Връщане към средновековните стандарти за защита на общността от промени
explanation: |
  В главата се обяснява, че историческото развитие показва постепенно разширяване на неудобствата, които са изключени от правната рамка, тъй като обществото става по-свободно. През Средновековието конкуренцията и технологичният напредък често са били осъждани от закона, тъй като последиците от тях са били концентрирани върху малки общности. С развитието на обществото към по-голяма свобода тези ограничения постепенно се премахват, което позволява на икономическата конкуренция и иновациите да процъфтяват без правно осъждане. Това представлява еволюция към разграничаване на законните правни оплаквания от обикновените икономически неудобства, които не следва да бъдат обект на правна намеса.
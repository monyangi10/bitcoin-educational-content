question: 더 자유로운 사회의 발전과 함께 성가신 일과 법적 제한에 관한 역사적 진화는 어떤 것이 있었나요?
answer: 법적 프레임워크에서 더 많은 유형의 성가신 문제를 점진적으로 배제합니다
wrong_answers:
  - 모든 형태의 경제 경쟁을 포괄하는 법적 제한의 확대
  - 기술 발전에 대한 더 엄격한 규제 마련
  - 변화로부터 커뮤니티를 보호하는 중세 표준으로 돌아가기
explanation: |
  이 장에서는 역사적으로 사회가 자유로워짐에 따라 법의 테두리에서 제외되는 불쾌감이 점진적으로 확대되었음을 설명합니다. 중세 시대에는 경쟁과 기술 발전이 소규모 공동체에 집중적으로 영향을 미치기 때문에 법적으로 비난을 받는 경우가 많았습니다. 사회가 더 큰 자유를 향해 발전함에 따라 이러한 제한은 점차 해제되어 법적 비난 없이도 경제적 경쟁과 혁신이 번성할 수 있게 되었습니다. 이는 합법적인 법적 불만과 법적 개입의 대상이 되어서는 안 되는 단순한 경제적 불편을 구분하는 방향으로의 진화를 의미합니다.
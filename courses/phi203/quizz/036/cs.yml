question: Jaký historický vývoj v oblasti nepříjemností a právních omezení provázel vývoj svobodnější společnosti?
answer: Postupné vylučování více druhů obtěžování z právního rámce
wrong_answers:
  - Rozšíření právních omezení na všechny formy hospodářské soutěže
  - Zavedení přísnějších předpisů proti technologickému pokroku
  - Návrat ke středověkým standardům ochrany komunity před změnami
explanation: |
  Kapitola vysvětluje, že historický vývoj ukazuje postupné rozšiřování nepříjemností vyloučených z právního rámce, jak se společnost stávala svobodnější. Ve středověku byly konkurence a technický pokrok často právně odsuzovány, protože jejich účinky se soustředily na malé komunity. Jak se společnost vyvíjela směrem k větší svobodě, tato omezení byla postupně rušena, což umožnilo hospodářské soutěži a inovacím vzkvétat bez právního odsouzení. To představuje vývoj směrem k rozlišování mezi legitimními právními stížnostmi a pouhými ekonomickými nepříjemnostmi, které by neměly být předmětem právního zásahu.
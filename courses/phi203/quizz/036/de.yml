question: Welche historische Entwicklung in Bezug auf Belästigungen und rechtliche Beschränkungen ging mit der Entwicklung einer freieren Gesellschaft einher?
answer: Ein schrittweiser Ausschluss von mehr Arten von Belästigungen aus dem Rechtsrahmen
wrong_answers:
  - Ausweitung der rechtlichen Beschränkungen auf alle Formen des wirtschaftlichen Wettbewerbs
  - Die Einführung strengerer Vorschriften gegen den technischen Fortschritt
  - Rückkehr zu mittelalterlichen Standards für den Schutz der Gemeinschaft vor Veränderungen
explanation: |
  In diesem Kapitel wird erläutert, dass die geschichtliche Entwicklung zeigt, dass die vom Rechtsrahmen ausgeschlossenen Belästigungen mit zunehmender Freiheit der Gesellschaft immer mehr zunehmen. Im Mittelalter wurden Wettbewerb und technologischer Fortschritt oft rechtlich verurteilt, weil ihre Auswirkungen auf kleine Gemeinschaften konzentriert waren. Mit der Entwicklung der Gesellschaft hin zu mehr Freiheit wurden diese Beschränkungen schrittweise aufgehoben, so dass wirtschaftlicher Wettbewerb und Innovation ohne rechtliche Verurteilung gedeihen konnten. Dies stellt eine Entwicklung hin zur Unterscheidung zwischen legitimen rechtlichen Beschwerden und bloßen wirtschaftlichen Unannehmlichkeiten dar, die nicht Gegenstand rechtlicher Intervention sein sollten.
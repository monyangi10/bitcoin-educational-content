question: Quale evoluzione storica in materia di fastidi e restrizioni legali ha accompagnato lo sviluppo di una società più libera?
answer: Esclusione progressiva di un maggior numero di tipi di disturbo dal quadro giuridico
wrong_answers:
  - Un'espansione delle restrizioni legali per coprire tutte le forme di concorrenza economica
  - L'istituzione di norme più severe contro il progresso tecnologico
  - Un ritorno agli standard medievali di protezione della comunità dal cambiamento
explanation: |
  Il capitolo spiega che l'evoluzione storica mostra un progressivo ampliamento dei disturbi esclusi dal quadro giuridico, man mano che la società diventava più libera. Nel Medioevo, la concorrenza e il progresso tecnologico erano spesso condannati legalmente perché i loro effetti erano concentrati su piccole comunità. Man mano che la società si è sviluppata verso una maggiore libertà, queste restrizioni sono state gradualmente eliminate, consentendo alla concorrenza economica e all'innovazione di prosperare senza condanne legali. Ciò rappresenta un'evoluzione verso la distinzione tra legittime lamentele legali e semplici inconvenienti economici che non dovrebbero essere oggetto di intervento legale.
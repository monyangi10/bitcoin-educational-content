question: Secondo il testo, qual era la ragione principale per cui si sviluppò l'assoggettamento politico nelle società antiche?
answer: L'urgente necessità di sicurezza e di leadership in attività vitali come la caccia e il combattimento
wrong_answers:
  - Il desiderio dei governanti di accumulare ricchezze personali e di espandere i propri territori
  - Credenze religiose secondo cui alcuni individui sono stati scelti divinamente per governare gli altri
  - La necessità di organizzare reti commerciali e relazioni commerciali complesse
explanation: |
  La sottomissione politica è emersa dalle stesse circostanze della schiavitù: il bisogno imperativo di sicurezza in ambienti ostili. Senza una guida nelle attività essenziali per la sopravvivenza, come la caccia o il combattimento, interi gruppi potevano rischiare la fame o la morte. Questa necessità di direzione ha creato ampi poteri politici che coprono tutti gli aspetti della vita sociale. Le altre opzioni non sono corrette perché rappresentano sviluppi successivi o motivazioni che non erano le ragioni fondamentali dell'autorità politica nelle società primitive, che riguardava fondamentalmente la sopravvivenza e la sicurezza collettiva.
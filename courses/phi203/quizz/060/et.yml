question: Mis oli teksti kohaselt peamine põhjus, miks antiikühiskondades kujunes välja poliitiline alluvus?
answer: Kiire vajadus turvalisuse ja juhtimise järele sellistes elutähtsates tegevustes nagu jahipidamine ja võitlus
wrong_answers:
  - Valitsejate soov koguda isiklikku jõukust ja laiendada oma territooriumi
  - Usulised uskumused, et teatud isikud on jumalikult valitud teisi valitsema
  - Vajadus korraldada keerulisi kaubandusvõrgustikke ja kaubandussuhteid
explanation: |
  Poliitiline allutamine tekkis samadest asjaoludest kui orjapidamine - hädavajalik vajadus turvalisuse järele vaenulikus keskkonnas. Ilma juhtimiseta sellistes elutähtsates tegevustes nagu jahipidamine või võitlus, võisid terved rühmad nälga või surma saada. See vajadus juhtimise järele lõi ulatuslikud poliitilised volitused, mis hõlmasid kõiki ühiskondliku elu aspekte. Teised valikud on valed, sest need esindavad hilisemaid arenguid või motiive, mis ei olnud ürgsetes ühiskondades poliitilise võimu aluseks, mis oli põhimõtteliselt seotud kollektiivse ellujäämise ja turvalisusega.
question: Vilken var enligt texten den främsta orsaken till att politisk underkastelse utvecklades i antika samhällen?
answer: Det akuta behovet av säkerhet och ledarskap i vitala aktiviteter som jakt och strid
wrong_answers:
  - Härskarnas önskan att samla personlig rikedom och utöka sina territorier
  - Religiös övertygelse om att vissa individer var gudomligt utvalda att styra andra
  - Behovet av att organisera komplexa handelsnätverk och kommersiella relationer
explanation: |
  Politisk underkastelse uppstod ur samma omständigheter som slaveriet - det tvingande behovet av säkerhet i fientliga miljöer. Utan ledarskap i viktiga överlevnadsaktiviteter som jakt eller strid kunde hela grupper drabbas av svält eller död. Detta behov av ledning skapade omfattande politiska maktbefogenheter som omfattade alla aspekter av samhällslivet. De andra alternativen är felaktiga eftersom de representerar senare utveckling eller motiv som inte var de grundläggande skälen till politisk auktoritet i primitiva samhällen, som i grunden handlade om kollektiv överlevnad och säkerhet.
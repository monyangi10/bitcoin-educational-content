question: Según el texto, ¿cuál fue la razón principal por la que se desarrolló el sometimiento político en las sociedades antiguas?
answer: La urgente necesidad de seguridad y liderazgo en actividades vitales como la caza y el combate
wrong_answers:
  - El deseo de los gobernantes de acumular riqueza personal y expandir sus territorios
  - Creencias religiosas de que ciertos individuos fueron elegidos divinamente para gobernar a otros
  - La necesidad de organizar redes comerciales y relaciones comerciales complejas
explanation: |
  El sometimiento político surgió de las mismas circunstancias que la esclavitud: la necesidad imperiosa de seguridad en entornos hostiles. Sin liderazgo en actividades esenciales para la supervivencia, como la caza o el combate, grupos enteros podían enfrentarse al hambre o la muerte. Esta necesidad de dirección creó amplios poderes políticos que abarcaban todos los aspectos de la vida social. Las otras opciones son incorrectas porque representan desarrollos o motivaciones posteriores que no eran las razones fundacionales de la autoridad política en las sociedades primitivas, que tenía que ver fundamentalmente con la supervivencia y la seguridad colectivas.
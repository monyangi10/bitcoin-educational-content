question: Ni imvo nyamukuru iyihe yatumye abantu bagira ukuyoboka mu vy’ubutegetsi mu mibano ya kera nk’uko ico canditswe kibivuga?
answer: Ivyihutirwa vy'umutekano n'uburongozi mu bikorwa bihambaye nk'uguhiga n'intambara .
wrong_answers:
  - Icipfuzo abategetsi bafise co kwirundanira ubutunzi bwabo bwite no kwagura intara zabo .
  - Ivyiyumviro vy’idini vy’uko abantu bamwebamwe batowe n’Imana kugira ngo batware abandi .
  - Ivyerekeye gutunganya imirongo y'ubudandaji igoye n'imigenderanire y'ubudandaji
explanation: |
  Ukwiyorosha kwa politike kwavuye mu bihe nk’ivyo ubuja bwari bumeze - ivy’uko umuntu akeneye umutekano mu bidukikije vy’urwanko. Hatari uburongozi mu bikorwa bihambaye vyo kurokoka nk’uguhiga canke kurwana, imigwi yose yoshobora gushikirwa n’inzara canke urupfu. Ukwo gukenera ubuyobozi kwatumye haba ububasha bwinshi bwa politike bujanye n’imice yose y’ubuzima bwo mu kibano. Ayandi mahitamwo ntabwo ari meza kuko aserukira ivyabaye mu nyuma canke imvo zitari izo mpamvu z’ishimikiro z’ubukuru bwa politike mu mibano ya kera, ivyo bikaba vyari vyerekeye ukurokoka n’umutekano rusangi.
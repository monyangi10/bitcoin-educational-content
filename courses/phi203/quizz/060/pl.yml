question: Jaki był główny powód rozwoju politycznej podległości w starożytnych społeczeństwach?
answer: Pilna potrzeba bezpieczeństwa i przywództwa w kluczowych działaniach, takich jak polowanie i walka
wrong_answers:
  - Pragnienie władców do gromadzenia osobistego bogactwa i rozszerzania swoich terytoriów
  - Religijne przekonania, że pewne osoby zostały wybrane przez Boga, by rządzić innymi
  - Potrzeba organizowania złożonych sieci handlowych i relacji handlowych
explanation: |
  Polityczna podległość wyłoniła się z tych samych okoliczności, co niewolnictwo - imperatywnej potrzeby bezpieczeństwa we wrogim otoczeniu. Bez przywództwa w podstawowych czynnościach związanych z przetrwaniem, takich jak polowanie czy walka, całe grupy mogły stanąć w obliczu głodu lub śmierci. Konieczność kierowania stworzyła rozległe uprawnienia polityczne obejmujące wszystkie aspekty życia społecznego. Pozostałe opcje są niepoprawne, ponieważ reprezentują późniejsze zmiany lub motywacje, które nie były podstawowymi przyczynami władzy politycznej w prymitywnych społeczeństwach, która zasadniczo dotyczyła zbiorowego przetrwania i bezpieczeństwa.
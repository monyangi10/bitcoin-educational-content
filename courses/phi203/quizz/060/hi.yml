question: What was the primary reason political subjection developed in ancient societies according to the text?
answer: The urgent need for security and leadership in vital activities like hunting and combat
wrong_answers:
  - The desire of rulers to accumulate personal wealth and expand their territories
  - Religious beliefs that certain individuals were divinely chosen to govern others
  - The need to organize complex trade networks and commercial relationships
explanation: |
  Political subjection emerged from the same circumstances as slavery - the imperative need for security in hostile environments. Without leadership in essential survival activities like hunting or combat, entire groups could face starvation or death. This necessity for direction created extensive political powers covering all aspects of social life. The other options are incorrect because they represent later developments or motivations that weren't the foundational reasons for political authority in primitive societies, which was fundamentally about collective survival and security.
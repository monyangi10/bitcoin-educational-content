question: 本文によれば、古代社会で政治的従属が発展した主な理由は何だったのか？
answer: 狩猟や戦闘のような重要な活動においては、安全確保とリーダーシップが急務である。
wrong_answers:
  - 支配者が個人的な富を蓄積し、領土を拡大したいという願望
  - 特定の個人が他者を統治するために神に選ばれたという宗教的信念
  - 複雑な貿易ネットワークと商業関係を整理する必要性
explanation: |
  政治的服従は、奴隷制度と同じような状況、つまり敵対的な環境において安全を確保する必要性から生まれた。狩猟や戦闘のような生存に不可欠な活動においてリーダーシップがなければ、集団全体が飢餓や死に直面する可能性があった。この指示の必要性が、社会生活のあらゆる側面をカバーする広範な政治的権力を生み出した。他の選択肢は、集団の生存と安全保障が基本であった原始社会における政治的権威の基礎的理由とは異なる、後世の発展や動機を表しているため、正しくない。
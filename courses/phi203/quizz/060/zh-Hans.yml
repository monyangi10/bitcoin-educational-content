question: 根据课文内容，古代社会形成政治臣服的主要原因是什么？
answer: 在狩猎和战斗等重要活动中迫切需要安全和领导力
wrong_answers:
  - 统治者渴望积累个人财富和扩张领土
  - 宗教信仰，认为某些人被神选中来管理其他人
  - 需要组织复杂的贸易网络和商业关系
explanation: |
  政治服从产生于与奴隶制相同的环境--在敌对环境中对安全的迫切需求。如果在狩猎或战斗等基本生存活动中没有领导，整个群体都可能面临饥饿或死亡。这种对领导的需求产生了广泛的政治权力，涵盖了社会生活的方方面面。其他选项都不正确，因为它们代表的是后来的发展或动机，而不是原始社会政治权力的根本原因，原始社会的根本原因是集体生存和安全。
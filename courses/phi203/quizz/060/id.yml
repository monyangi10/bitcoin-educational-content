question: Apa alasan utama penundukan politik berkembang dalam masyarakat kuno menurut teks?
answer: Kebutuhan mendesak akan keamanan dan kepemimpinan dalam aktivitas vital seperti berburu dan bertempur
wrong_answers:
  - Keinginan para penguasa untuk mengumpulkan kekayaan pribadi dan memperluas wilayah mereka
  - Keyakinan agama bahwa individu tertentu dipilih secara ilahi untuk memerintah orang lain
  - Kebutuhan untuk mengatur jaringan perdagangan dan hubungan komersial yang kompleks
explanation: |
  Penaklukan politik muncul dari situasi yang sama dengan perbudakan - kebutuhan mendesak akan keamanan di lingkungan yang tidak bersahabat. Tanpa kepemimpinan dalam kegiatan bertahan hidup yang penting seperti berburu atau bertempur, seluruh kelompok bisa menghadapi kelaparan atau kematian. Kebutuhan akan arahan ini menciptakan kekuatan politik yang luas yang mencakup semua aspek kehidupan sosial. Pilihan-pilihan lain tidak benar karena mewakili perkembangan atau motivasi yang muncul belakangan yang bukan merupakan alasan mendasar bagi otoritas politik dalam masyarakat primitif, yang pada dasarnya adalah tentang kelangsungan hidup dan keamanan kolektif.
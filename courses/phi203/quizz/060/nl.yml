question: Wat was volgens de tekst de belangrijkste reden dat politieke onderwerping zich ontwikkelde in samenlevingen in de oudheid?
answer: De dringende behoefte aan veiligheid en leiderschap bij vitale activiteiten zoals jagen en vechten
wrong_answers:
  - Het verlangen van heersers om persoonlijke rijkdom te vergaren en hun gebieden uit te breiden
  - Religieuze overtuigingen dat bepaalde individuen goddelijk gekozen waren om anderen te regeren
  - De noodzaak om complexe handelsnetwerken en commerciële relaties te organiseren
explanation: |
  Politieke onderwerping kwam voort uit dezelfde omstandigheden als slavernij - de dwingende behoefte aan veiligheid in een vijandige omgeving. Zonder leiderschap in essentiële overlevingsactiviteiten zoals jagen of vechten, konden hele groepen verhongeren of sterven. Deze behoefte aan leiding creëerde uitgebreide politieke machten die alle aspecten van het sociale leven omvatten. De andere opties zijn onjuist omdat ze latere ontwikkelingen of motivaties vertegenwoordigen die niet de fundamentele redenen waren voor politieke autoriteit in primitieve samenlevingen, die fundamenteel ging over collectieve overleving en veiligheid.
question: Theo văn bản này, nguyên nhân chính dẫn đến sự lệ thuộc chính trị trong các xã hội cổ đại là gì?
answer: Nhu cầu cấp thiết về an ninh và sự lãnh đạo trong các hoạt động thiết yếu như săn bắn và chiến đấu.
wrong_answers:
  - Khát vọng của những người cai trị là tích lũy của cải cá nhân và mở rộng lãnh thổ.
  - Các tín ngưỡng tôn giáo cho rằng một số cá nhân được thần thánh lựa chọn để cai trị những người khác.
  - Nhu cầu tổ chức các mạng lưới thương mại phức tạp và các mối quan hệ thương mại.
explanation: |
  Sự lệ thuộc chính trị xuất hiện từ cùng hoàn cảnh với chế độ nô lệ - nhu cầu cấp thiết về an ninh trong môi trường thù địch. Nếu thiếu sự lãnh đạo trong các hoạt động sinh tồn thiết yếu như săn bắn hoặc chiến đấu, toàn bộ nhóm người có thể đối mặt với nạn đói hoặc cái chết. Nhu cầu về sự chỉ đạo này đã tạo ra quyền lực chính trị rộng lớn bao trùm mọi khía cạnh của đời sống xã hội. Các lựa chọn khác không chính xác vì chúng thể hiện những sự phát triển hoặc động cơ sau này, không phải là lý do nền tảng cho quyền lực chính trị trong các xã hội nguyên thủy, vốn chủ yếu xoay quanh sự sống còn và an ninh tập thể.
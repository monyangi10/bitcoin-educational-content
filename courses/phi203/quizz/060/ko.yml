question: 본문에 따르면 고대 사회에서 정치적 주체가 발달한 주된 이유는 무엇인가요?
answer: 사냥과 전투와 같은 중요한 활동에서 보안과 리더십의 긴급한 필요성
wrong_answers:
  - 개인 부를 축적하고 영토를 확장하려는 통치자의 욕망
  - 특정 개인이 다른 사람을 다스리도록 신적으로 선택되었다는 종교적 믿음
  - 복잡한 무역 네트워크와 상업적 관계를 정리해야 할 필요성
explanation: |
  정치적 종속은 노예제도와 같은 상황, 즉 적대적인 환경에서의 안보가 절실히 요구되는 상황에서 생겨났습니다. 사냥이나 전투와 같은 필수 생존 활동에서 리더십이 없으면 집단 전체가 굶주림이나 죽음에 직면할 수 있었습니다. 이러한 지도력의 필요성은 사회 생활의 모든 측면을 포괄하는 광범위한 정치 권력을 창출했습니다. 다른 옵션은 근본적으로 집단 생존과 안전에 관한 원시 사회에서 정치 권력의 근본적인 이유가 아니었던 후대의 발전이나 동기를 나타내므로 올바르지 않습니다.
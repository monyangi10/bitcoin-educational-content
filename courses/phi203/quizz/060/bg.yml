question: Коя е основната причина за развитието на политическото подчинение в древните общества според текста?
answer: Спешната нужда от сигурност и лидерство в жизненоважни дейности като лов и борба
wrong_answers:
  - Желанието на владетелите да трупат лично богатство и да разширяват териториите си
  - Религиозни вярвания, че определени хора са божествено избрани да управляват другите
  - Необходимост от организиране на сложни търговски мрежи и търговски взаимоотношения
explanation: |
  Политическото подчинение възниква при същите обстоятелства като робството - наложителната нужда от сигурност във враждебна среда. Без лидерство в основни дейности за оцеляване като лов или бой, цели групи можеха да бъдат изправени пред глад или смърт. Тази необходимост от ръководство създава широки политически правомощия, обхващащи всички аспекти на обществения живот. Другите варианти са неправилни, защото представляват по-късни развития или мотиви, които не са били основополагащите причини за политическата власт в примитивните общества, която в основата си е била свързана с колективното оцеляване и сигурност.
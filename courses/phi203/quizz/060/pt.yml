question: Segundo o texto, qual foi a principal razão pela qual a sujeição política se desenvolveu nas sociedades antigas?
answer: A necessidade urgente de segurança e liderança em actividades vitais como a caça e o combate
wrong_answers:
  - O desejo dos governantes de acumular riqueza pessoal e expandir os seus territórios
  - Crenças religiosas de que certos indivíduos foram divinamente escolhidos para governar outros
  - A necessidade de organizar redes de comércio e relações comerciais complexas
explanation: |
  A sujeição política surgiu das mesmas circunstâncias que a escravatura - a necessidade imperativa de segurança em ambientes hostis. Sem liderança em actividades essenciais à sobrevivência, como a caça ou o combate, grupos inteiros poderiam enfrentar a fome ou a morte. Esta necessidade de direção criou poderes políticos alargados que abrangiam todos os aspectos da vida social. As outras opções estão incorrectas porque representam desenvolvimentos ou motivações posteriores que não eram as razões fundamentais para a autoridade política nas sociedades primitivas, que tinha fundamentalmente a ver com a sobrevivência e a segurança colectivas.
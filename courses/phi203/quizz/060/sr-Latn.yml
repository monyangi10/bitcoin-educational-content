question: Koji je bio primarni razlog razvoja političke potčinjenosti u drevnim društvima prema tekstu?
answer: Hitna potreba za bezbednošću i vođstvom u vitalnim aktivnostima kao što su lov i borba
wrong_answers:
  - Želja vladara da akumuliraju lično bogatstvo i prošire svoje teritorije
  - Religijska uverenja da su određeni pojedinci božanski izabrani da vladaju drugima
  - Potreba za organizovanjem složenih trgovinskih mreža i komercijalnih odnosa
explanation: |
  Politička potčinjenost je proizašla iz istih okolnosti kao i ropstvo - imperativne potrebe za sigurnošću u neprijateljskim okruženjima. Bez vođstva u ključnim aktivnostima za preživljavanje kao što su lov ili borba, čitave grupe bi se mogle suočiti sa glađu ili smrću. Ova potreba za usmeravanjem stvorila je opsežne političke moći koje su pokrivale sve aspekte društvenog života. Ostale opcije su netačne jer predstavljaju kasniji razvoj ili motive koji nisu bili osnovni razlozi za politički autoritet u primitivnim društvima, koji je suštinski bio vezan za kolektivni opstanak i sigurnost.
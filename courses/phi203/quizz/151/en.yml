question: According to the text's comparison of contract-based and state-directed societies, what is the defining position of the individual in a society founded on contract?
answer: The individual is responsible for his fate and master of his faculties — he decides, observes his own reality, feels the effects of his choices, and can freely modify his course of action at any time
wrong_answers:
  - The individual is free in personal matters but subordinate to collective decisions in economic affairs, since markets require coordination rules that no single person can set
  - The individual is master of his faculties but shares responsibility for outcomes with the other contracting parties, since all exchanges involve mutual obligation
  - The individual is responsible for his fate only within the options that democratic majorities have pre-approved, since unbounded individual choice threatens social cohesion
explanation: |
  The text draws a sharp contrast between the two systems. In a society founded on contract, the individual is responsible for his fate and master of his faculties. He decides freely how to satisfy his needs, engages in discovery and deliberation that is part of his own individuality, observes his own reality, and feels the effects of his choices through pain or pleasure. He can modify his course of action minute by minute, day by day. If available contractual options do not satisfy him, he can create his own solution. This stands in direct opposition to political society, where electoral agitation replaces calm deliberation and the citizen is forced to acquiesce to an entire programme imposed by majority rule.

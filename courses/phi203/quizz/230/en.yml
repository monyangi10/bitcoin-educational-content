question: How does the text characterize monetary and banking freedom in relation to the broader principle of freedom of work?
answer: Banking and monetary freedom is a particular application of the freedom of work, since money represents a service rendered and a product exchanged on the market
wrong_answers:
  - Monetary freedom is a separate and prior right derived from property ownership, independent of labor or professional activity
  - Banking freedom is a privilege granted by the state to licensed institutions that agree to operate within regulated frameworks
  - Monetary freedom is an economic policy tool unrelated to individual freedoms, aimed at stabilizing markets and preventing financial crises
explanation: |
  The text explicitly states that "banking and monetary freedom is a particular application of the freedom of work, since money simply represents a service rendered and a product exchanged on the market." Thinkers like Courcelle-Seneuil argued that there was no more reason to justify a public monopoly of money than of any other profession. Free banking, like freedom in any other trade, would extend services to those previously excluded and drive innovation through competition and self-interest, just as freedom of work does in other sectors.

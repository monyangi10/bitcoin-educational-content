question: Volgens de kritiek van Pierre de Boisguilbert op het Ancien Régime, welke fundamentele opvatting lag ten grondslag aan het willekeurige belastingsysteem van de late 17e eeuw?
answer: De soeverein werd beschouwd als de eigenaar van alle land en onderdanen, waardoor individuen eigendom van de natie werden
wrong_answers:
  - Belastingheffing was gebaseerd op vrijwillige contracten tussen burgers en de staat voor specifieke diensten
  - Het belastingstelsel was zo ontworpen dat alle sociale klassen een evenredige bijdrage zouden leveren
  - Burgers werden gezien als onafhankelijke contractanten die vrij konden onderhandelen over hun belastingverplichtingen
explanation: |
  Boisguilberts kritiek stelde vast dat de willekeurige belastingheffing van het Ancien Régime (zoals de taille) geworteld was in een opvatting waarin de soeverein alles en iedereen bezat. Dit maakte individuen in wezen eigendom van de natie, onderworpen aan de wil van de heerser met betrekking tot hun middelen. De andere opties suggereren ten onrechte vrijwillige, proportionele of contractuele relaties die in tegenspraak zijn met de feitelijke feodale opvatting van absoluut eigendom van de vorst over onderdanen en grondgebied.
question: Według krytyki Ancien Régime'u Pierre'a de Boisguilberta, jaka fundamentalna koncepcja leżała u podstaw arbitralnego systemu podatkowego z końca XVII wieku?
answer: Suweren był uważany za właściciela wszystkich ziem i poddanych, czyniąc jednostki własnością narodu
wrong_answers:
  - Opodatkowanie opierało się na dobrowolnych umowach między obywatelami a państwem na określone usługi
  - System podatkowy został zaprojektowany tak, aby zapewnić proporcjonalny wkład wszystkich klas społecznych w równym stopniu
  - Obywatele byli postrzegani jako niezależni kontrahenci, którzy mogli swobodnie negocjować swoje zobowiązania podatkowe
explanation: |
  Krytyka Boisguilberta wykazała, że arbitralne opodatkowanie Ancien Régime'u (takie jak taille) było zakorzenione w koncepcji, w której suweren był właścicielem wszystkiego i wszystkich. Czyniło to jednostki zasadniczo własnością narodu, podlegającą woli władcy w odniesieniu do ich zasobów. Pozostałe opcje błędnie sugerują dobrowolne, proporcjonalne lub umowne relacje, które zaprzeczały faktycznej feudalnej koncepcji absolutnej własności suwerena nad poddanymi i terytorium.
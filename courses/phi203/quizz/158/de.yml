question: Welches Grundkonzept lag nach Pierre de Boisguilberts Kritik am Ancien Régime dem willkürlichen Steuersystem des späten 17. Jahrhunderts zugrunde?
answer: Der Souverän wurde als Eigentümer aller Ländereien und Untertanen betrachtet, was den Einzelnen zum Eigentum der Nation machte
wrong_answers:
  - Die Besteuerung beruhte auf freiwilligen Verträgen zwischen den Bürgern und dem Staat für bestimmte Dienstleistungen
  - Das Steuersystem wurde so konzipiert, dass alle sozialen Schichten gleichermaßen einen proportionalen Beitrag leisten
  - Die Bürger wurden als unabhängige Unternehmer betrachtet, die ihre Steuerpflichten frei aushandeln konnten
explanation: |
  Boisguilbert kritisierte, dass die willkürliche Besteuerung des Ancien Régime (wie die taille) auf einer Vorstellung beruhte, nach der der Souverän alles und jeden besaß. Dadurch wurde der Einzelne im Wesentlichen zum Eigentum der Nation und war dem Willen des Herrschers in Bezug auf seine Ressourcen unterworfen. Die anderen Optionen suggerieren fälschlicherweise freiwillige, verhältnismäßige oder vertragliche Beziehungen, die dem eigentlichen feudalen Konzept des absoluten Eigentums des Herrschers an Untertanen und Territorium widersprechen.
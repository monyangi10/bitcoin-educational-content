question: Hvilken grunnleggende oppfatning lå til grunn for det vilkårlige skattesystemet på slutten av 1600-tallet, ifølge Pierre de Boisguilberts kritikk av Ancien Régime?
answer: Suverenen ble ansett som eier av alle landområder og undersåtter, noe som gjorde individene til nasjonens eiendom
wrong_answers:
  - Beskatningen var basert på frivillige avtaler mellom borgerne og staten om bestemte tjenester
  - Skattesystemet ble utformet for å sikre et proporsjonalt bidrag fra alle sosiale klasser
  - Borgerne ble sett på som uavhengige entreprenører som fritt kunne forhandle om sine skatteforpliktelser
explanation: |
  Boisguilberts kritikk identifiserte at Ancien Régimes vilkårlige beskatning (som taille) var forankret i en forestilling om at suverenen eide alt og alle. Dette gjorde individene til nasjonens eiendom, underlagt herskerens vilje når det gjaldt deres ressurser. De andre alternativene antyder feilaktig frivillige, proporsjonale eller kontraktsfestede forhold som var i strid med den faktiske føydale oppfatningen om eneherskerens absolutte eierskap over undersåtter og territorium.
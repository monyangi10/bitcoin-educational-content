question: Secondo la critica di Pierre de Boisguilbert all'Ancien Régime, quale concezione fondamentale era alla base del sistema di tassazione arbitraria della fine del XVII secolo?
answer: Il sovrano era considerato il proprietario di tutte le terre e di tutti i sudditi, rendendo gli individui proprietà della nazione
wrong_answers:
  - La tassazione si basava su contratti volontari tra i cittadini e lo Stato per servizi specifici
  - Il sistema fiscale è stato concepito per garantire un contributo proporzionale da parte di tutte le classi sociali
  - I cittadini erano visti come contraenti indipendenti che potevano negoziare liberamente i loro obblighi fiscali
explanation: |
  La critica di Boisguilbert individua che la tassazione arbitraria dell'Ancien Régime (come la taille) era radicata in una concezione in cui il sovrano possedeva tutto e tutti. Questo rendeva gli individui essenzialmente proprietà della nazione, soggetti alla volontà del sovrano riguardo alle loro risorse. Le altre opzioni suggeriscono erroneamente relazioni volontarie, proporzionali o contrattuali che contraddicono l'effettiva concezione feudale di proprietà assoluta del sovrano sui sudditi e sul territorio.
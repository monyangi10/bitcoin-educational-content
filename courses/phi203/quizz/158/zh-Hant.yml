question: 根據 Pierre de Boisguilbert 對舊政權的批判，17 世紀末的任意課稅制度是基於什麼基本概念？
answer: 君主被視為所有土地和臣民的所有者，使個人成為國家的財產。
wrong_answers:
  - 稅收是基於公民與國家之間就特定服務所簽訂的自願契約
  - 稅制的設計是為了確保所有社會階層都能平等地按比例繳稅。
  - 公民被視為可自由協商其納稅義務的獨立承包商
explanation: |
  Boisguilbert 的批判指出，舊政權的任意徵稅（如 taille）是根植於君主擁有一切和所有人的概念。這使得個人基本上成為國家的財產，在資源方面受制於統治者的意志。其他選項錯誤地暗示了自願、比例或契約關係，與君主對臣民和領土的絕對所有權的封建概念相矛盾。
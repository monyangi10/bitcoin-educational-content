question: Според критиката на Пиер дьо Боагилбер на Ancien Régime, коя основна концепция е залегнала в основата на произволната данъчна система от края на XVII в.?
answer: Суверенът се счита за собственик на всички земи и поданици, което прави хората собственост на нацията
wrong_answers:
  - Данъчното облагане се основава на доброволни договори между гражданите и държавата за конкретни услуги
  - Данъчната система е разработена така, че да осигурява пропорционален принос от всички социални слоеве по равно
  - На гражданите се гледаше като на независими изпълнители, които могат свободно да договарят данъчните си задължения
explanation: |
  Критиката на Боагилбер установява, че произволното данъчно облагане на Ancien Régime (като taille) се корени в схващането, че суверенът притежава всичко и всички. Това превръща индивидите в собственост на нацията, подчинена на волята на владетеля по отношение на техните ресурси. Другите варианти неправилно предполагат доброволни, пропорционални или договорни отношения, които противоречат на действителната феодална концепция за абсолютна собственост на суверена върху поданиците и територията.
question: Prema kritici Pierrea de Boisguilberta na račun Ancien Régimea, koja je fundamentalna koncepcija bila osnova za arbitrarni poreski sistem krajem 17. veka?
answer: Suveren je smatran vlasnikom svih zemalja i podanika, čineći pojedince vlasništvom nacije.
wrong_answers:
  - Oporezivanje je bilo zasnovano na dobrovoljnim ugovorima između građana i države za određene usluge.
  - Poreski sistem je dizajniran da obezbedi proporcionalan doprinos svih društvenih klasa jednako.
  - Građani su smatrani nezavisnim ugovaračima koji su mogli slobodno pregovarati o svojim poreskim obavezama
explanation: |
  Boisguilbertova kritika identifikovala da je proizvoljno oporezivanje Ancien Régimea (poput taille) bilo ukorenjeno u shvatanju gde je suveren posedovao sve i svakoga. Ovo je činilo pojedince suštinski vlasništvom nacije, podložnim volji vladara u vezi sa njihovim resursima. Druge opcije pogrešno sugerišu dobrovoljne, proporcionalne ili ugovorne odnose koji su u suprotnosti sa stvarnim feudalnim shvatanjem apsolutnog vlasništva suverena nad podanicima i teritorijom.
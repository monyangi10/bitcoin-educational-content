question: Pierre de Boisguilbertin Ancien Régime -kritiikin mukaan mikä peruskäsitys oli 1600-luvun lopun mielivaltaisen verotusjärjestelmän taustalla?
answer: Hallitsijan katsottiin olevan kaikkien maiden ja alamaisten omistaja, mikä teki yksilöistä kansakunnan omaisuutta
wrong_answers:
  - Verotus perustui kansalaisten ja valtion välisiin vapaaehtoisiin sopimuksiin tietyistä palveluista
  - Verojärjestelmä suunniteltiin siten, että kaikkien yhteiskuntaluokkien maksuosuudet olivat yhtä suuret
  - Kansalaisia pidettiin itsenäisinä yrittäjinä, jotka saattoivat neuvotella verovelvoitteistaan vapaasti
explanation: |
  Boisguilbertin kritiikissä todettiin, että Ancien Régimen mielivaltainen verotus (kuten taille) perustui käsitykseen, jonka mukaan hallitsija omisti kaiken ja kaikki. Tämä teki yksilöistä olennaisesti kansakunnan omaisuutta, joka alistettiin hallitsijan tahdon alaiseksi heidän resurssejaan koskevissa asioissa. Muut vaihtoehdot viittaavat virheellisesti vapaaehtoisiin, suhteellisiin tai sopimussuhteisiin, jotka olivat ristiriidassa feodaalisen käsityksen kanssa, jonka mukaan hallitsija omisti absoluuttisesti alamaiset ja alueen.
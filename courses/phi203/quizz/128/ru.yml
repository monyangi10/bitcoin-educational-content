question: Почему современная экономическая взаимозависимость делает международные конфликты более дорогостоящими для всех стран, даже для тех, кто непосредственно не участвует в войне?
answer: Поскольку нарушения в работе глобальных торговых цепочек приводят к тому, что экономические потери распространяются на всех торговых партнеров по всему миру
wrong_answers:
  - Потому что современное оружие более разрушительно и наносит ущерб окружающей среде, что сказывается на соседних странах
  - Поскольку международное право требует, чтобы все государства оказывали финансовую помощь странам, переживающим конфликты
  - Потому что современные средства коммуникации позволяют людям более эмоционально переживать удаленные конфликты, чем в предыдущие века
explanation: |
  В главе объясняется, что современная экономическая взаимозависимость создает глобальную цепь взаимной выгоды через торговлю. Когда конфликты нарушают производство или торговлю в одном регионе, их последствия распространяются по всей сети экономических отношений. В тексте приводится пример того, как Гражданская война в Америке привела к разорению европейской текстильной промышленности, в частности в Лионе, просто из-за нарушения торговых отношений. Это демонстрирует, как экономическая взаимосвязь делает войну все более вредной для всех участников глобальной экономики, а не только для воюющих сторон.
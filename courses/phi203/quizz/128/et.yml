question: Miks muudab kaasaegne majanduslik vastastikune sõltuvus rahvusvahelised konfliktid kulukamaks kõigile riikidele, isegi neile, kes otseselt sõjategevuses ei osale?
answer: Kuna häired ülemaailmsetes kaubandusahelates põhjustavad majanduslikku kahju, mis kandub üle kõigile kaubanduspartneritele kogu maailmas
wrong_answers:
  - Kuna kaasaegsed relvad on hävitavamad ja tekitavad keskkonnakahjustusi, mis mõjutavad naaberriike
  - Kuna rahvusvaheline õigus nõuab nüüd kõigilt riikidelt finantsabi andmist konfliktidest mõjutatud riikidele
  - Kuna kaasaegne kommunikatsioon muudab inimesed kaugemate konfliktide tõttu emotsionaalselt rohkem mõjutatud kui varasematel sajanditel
explanation: |
  Peatükis selgitatakse, et kaasaegne majanduslik vastastikune sõltuvus loob kaubanduse kaudu ülemaailmse vastastikuse kasu ahela. Kui konfliktid häirivad tootmist või kaubandust ühes piirkonnas, levib mõju kogu majandussuhete võrgustikku. Tekstis tuuakse näide Ameerika kodusõjast, mis hävitas Euroopa tekstiilitööstust, eriti Lyonis, lihtsalt kaubandussuhete katkemise tõttu. See näitab, kuidas majanduslik seotus muudab sõja üha kahjulikumaks kõigile maailmamajanduses osalejatele, mitte ainult sõdivatele osapooltele.
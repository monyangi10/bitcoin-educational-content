question: Porque é que a interdependência económica moderna torna os conflitos internacionais mais onerosos para todas as nações, mesmo para as que não estão diretamente envolvidas em guerras?
answer: Porque as perturbações nas cadeias comerciais globais provocam perdas económicas que se propagam a todos os parceiros comerciais a nível mundial
wrong_answers:
  - Porque as armas modernas são mais destrutivas e causam danos ambientais que afectam os países vizinhos
  - Porque o direito internacional exige atualmente que todas as nações prestem ajuda financeira aos países em conflito
  - Porque a comunicação moderna faz com que as pessoas sejam mais afectadas emocionalmente por conflitos distantes do que nos séculos anteriores
explanation: |
  O capítulo explica que a interdependência económica moderna cria uma cadeia global de benefícios mútuos através do comércio. Quando os conflitos perturbam a produção ou o comércio numa região, os efeitos repercutem-se em toda a rede de relações económicas. O texto utiliza o exemplo da Guerra Civil Americana, que causou a ruína das indústrias têxteis europeias, nomeadamente em Lyon, simplesmente devido à rutura das relações comerciais. Isto demonstra como a interconexão económica torna a guerra cada vez mais prejudicial para todos os participantes na economia global, e não apenas para as partes beligerantes.
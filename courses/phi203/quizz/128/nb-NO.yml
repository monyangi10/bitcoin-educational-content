question: Hvorfor gjør moderne økonomisk gjensidig avhengighet internasjonale konflikter mer kostbare for alle nasjoner, selv de som ikke er direkte involvert i krigføring?
answer: Fordi forstyrrelser i globale handelskjeder fører til at økonomiske tap sprer seg til alle handelspartnere over hele verden
wrong_answers:
  - Fordi moderne våpen er mer destruktive og skaper miljøskader som påvirker nabolandene
  - Fordi folkeretten nå krever at alle nasjoner skal gi økonomisk støtte til land som opplever konflikter
  - Fordi moderne kommunikasjon gjør at folk blir mer følelsesmessig berørt av fjerne konflikter enn i tidligere århundrer
explanation: |
  Kapitlet forklarer at moderne økonomisk gjensidig avhengighet skaper en global kjede av gjensidig nytte gjennom handel. Når konflikter forstyrrer produksjon eller handel i én region, får det ringvirkninger gjennom hele nettverket av økonomiske relasjoner. Teksten bruker eksemplet med den amerikanske borgerkrigen som ødela europeisk tekstilindustri, særlig i Lyon, rett og slett fordi handelsforbindelsene ble forstyrret. Dette viser hvordan den økonomiske sammenkoblingen gjør krig stadig mer skadelig for alle deltakerne i den globale økonomien, ikke bare for de krigførende partene.
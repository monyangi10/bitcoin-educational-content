question: Waarom maakt de moderne economische onderlinge afhankelijkheid internationale conflicten duurder voor alle landen, zelfs voor de landen die niet direct betrokken zijn bij oorlogsvoering?
answer: Omdat verstoringen van wereldwijde handelsketens leiden tot economische verliezen die zich uitbreiden naar alle handelspartners wereldwijd
wrong_answers:
  - Omdat moderne wapens destructiever zijn en milieuschade veroorzaken die naburige landen treft
  - Omdat het internationaal recht nu vereist dat alle landen financiële hulp bieden aan landen die conflicten hebben
  - Omdat moderne communicatie ervoor zorgt dat mensen emotioneler betrokken zijn bij conflicten op afstand dan in vorige eeuwen
explanation: |
  Het hoofdstuk legt uit dat moderne economische onderlinge afhankelijkheid een wereldwijde keten van wederzijds voordeel creëert door middel van handel. Wanneer conflicten de productie of handel in één regio verstoren, werken de gevolgen door in het hele netwerk van economische relaties. De tekst gebruikt het voorbeeld van de Amerikaanse Burgeroorlog die de Europese textielindustrie ruïneerde, met name in Lyon, simpelweg door de verstoring van handelsrelaties. Dit laat zien hoe economische onderlinge verbondenheid oorlog steeds schadelijker maakt voor alle deelnemers aan de wereldeconomie, niet alleen voor de strijdende partijen.
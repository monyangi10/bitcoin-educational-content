question: Dlaczego współczesna współzależność gospodarcza sprawia, że konflikty międzynarodowe są bardziej kosztowne dla wszystkich narodów, nawet tych, które nie są bezpośrednio zaangażowane w działania wojenne?
answer: Ponieważ zakłócenia w globalnych łańcuchach handlowych powodują rozprzestrzenianie się strat gospodarczych na wszystkich partnerów handlowych na całym świecie
wrong_answers:
  - Ponieważ nowoczesna broń jest bardziej niszczycielska i powoduje szkody środowiskowe, które wpływają na sąsiednie kraje
  - Ponieważ prawo międzynarodowe wymaga obecnie, aby wszystkie narody zapewniały pomoc finansową krajom doświadczającym konfliktów
  - Ponieważ nowoczesna komunikacja sprawia, że ludzie bardziej emocjonalnie reagują na odległe konflikty niż w poprzednich stuleciach
explanation: |
  Rozdział ten wyjaśnia, że współczesna współzależność gospodarcza tworzy globalny łańcuch wzajemnych korzyści poprzez handel. Kiedy konflikty zakłócają produkcję lub handel w jednym regionie, ich skutki rozprzestrzeniają się na całą sieć relacji gospodarczych. W tekście wykorzystano przykład amerykańskiej wojny secesyjnej, która doprowadziła do ruiny europejski przemysł tekstylny, w szczególności w Lyonie, po prostu poprzez zakłócenie stosunków handlowych. Pokazuje to, w jaki sposób wzajemne powiązania gospodarcze sprawiają, że wojna staje się coraz bardziej szkodliwa dla wszystkich uczestników globalnej gospodarki, a nie tylko dla walczących stron.
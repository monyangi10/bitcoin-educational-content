question: چرا وابستگی اقتصادی مدرن باعث می‌شود که درگیری‌های بین‌المللی برای همه کشورها، حتی آن‌هایی که مستقیماً در جنگ درگیر نیستند، هزینه‌برتر شود؟
answer: زیرا اختلالات در زنجیره‌های تجارت جهانی باعث می‌شود که زیان‌های اقتصادی به تمامی شرکای تجاری در سراسر جهان گسترش یابد
wrong_answers:
  - زیرا سلاح‌های مدرن مخرب‌تر هستند و آسیب‌های زیست‌محیطی ایجاد می‌کنند که کشورهای همسایه را تحت تأثیر قرار می‌دهد
  - زیرا قوانین بین‌المللی اکنون همه کشورها را ملزم می‌کند که به کشورهایی که درگیر مناقشات هستند کمک مالی ارائه دهند.
  - زیرا ارتباطات مدرن باعث می‌شود مردم بیشتر از قرن‌های گذشته به‌طور احساسی تحت تأثیر درگیری‌های دوردست قرار گیرند.
explanation: |
  این فصل توضیح می‌دهد که وابستگی متقابل اقتصادی مدرن از طریق تجارت، زنجیره‌ای جهانی از منافع متقابل ایجاد می‌کند. زمانی که درگیری‌ها تولید یا تجارت را در یک منطقه مختل می‌کنند، اثرات آن در سراسر شبکه روابط اقتصادی گسترش می‌یابد. متن از مثال جنگ داخلی آمریکا استفاده می‌کند که باعث ویرانی صنایع نساجی اروپا، به‌ویژه در لیون، تنها از طریق اختلال در روابط تجاری شد. این نشان می‌دهد که چگونه پیوستگی اقتصادی، جنگ را برای همه شرکت‌کنندگان در اقتصاد جهانی، نه فقط طرف‌های درگیر، به طور فزاینده‌ای زیان‌بار می‌کند.
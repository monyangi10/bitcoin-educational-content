question: 根據經濟理論，集中式經濟計劃無法有效協調生產的主要原因是什麼？
answer: 它缺乏價格訊號，無法顯示真正的消費者需求和生產優先順序
wrong_answers:
  - 它過於依賴利益動機，而利益動機會腐化政府的決策。
  - 造成國有企業之間對資源的過度競爭
  - 它允許個人在生產和消費選擇上有太多的自由
explanation: |
  集中式規劃之所以失敗，是因為它消除了自由市場中作為重要資訊系統的價格機制。如果價格不依供需關係浮動，中央規劃者就會盲目運作，無法知道消費者實際想要什麼、他們什麼時候想要、或他們願意為此犧牲多少。在複雜的經濟體系中，價格就像是指南針，引導生產者找到符合消費者實際需求的獲利機會。錯誤答案的原因是：集中式規劃實際上是消除而非依賴獲利動機；集中式規劃通常會減少而非增加競爭；集中式規劃會限制而非允許個人經濟自由。
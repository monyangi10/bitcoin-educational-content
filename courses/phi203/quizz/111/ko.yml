question: 중앙 집중식 경제 계획이 경제 이론에 따라 생산을 효과적으로 조정하지 못하는 주된 이유는 무엇인가요?
answer: 실제 소비자 요구와 생산 우선순위를 나타내는 가격 신호가 부족합니다
wrong_answers:
  - 정부의 의사 결정을 부패시키는 이익 동기에 지나치게 의존합니다
  - 국유 기업 간 자원 확보를 위한 과도한 경쟁을 유발합니다
  - 생산 및 소비 선택에 있어 개인의 자유를 너무 많이 허용합니다
explanation: |
  중앙 집중식 계획은 자유 시장에서 중요한 정보 시스템 역할을 하는 가격 메커니즘을 제거하기 때문에 실패합니다. 수요와 공급에 따라 가격이 변동하지 않으면 중앙 계획자들은 소비자가 실제로 무엇을 원하는지, 언제 원하는지, 그것을 위해 얼마나 희생할 의향이 있는지 알 수 없어 맹목적으로 운영하게 됩니다. 가격은 복잡한 경제에서 나침반과 같은 역할을 하며 생산자가 실제 소비자 니즈에 부합하는 수익성 있는 기회를 찾도록 안내합니다. 중앙 집중식 계획은 이윤 동기에 의존하기보다는 오히려 제거하며, 일반적으로 경쟁을 증가시키기보다는 감소시키고, 개인의 경제적 자유를 허용하기보다는 제한하기 때문에 오답은 틀린 답입니다.
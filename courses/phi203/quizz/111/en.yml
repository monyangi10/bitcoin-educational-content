question: What is the primary reason why centralized economic planning fails to coordinate production effectively according to economic theory?
answer: It lacks price signals to indicate real consumer needs and production priorities
wrong_answers:
  - It relies too heavily on profit motives that corrupt government decision-making
  - It creates excessive competition between state-owned enterprises for resources
  - It allows too much individual freedom in production and consumption choices
explanation: |
  Centralized planning fails because it eliminates the price mechanism that serves as a crucial information system in free markets. Without prices fluctuating based on supply and demand, central planners operate blindly, unable to know what consumers actually want, when they want it, or how much they're willing to sacrifice for it. Prices act like a compass in complex economies, guiding producers toward profitable opportunities that align with real consumer needs. The wrong answers are incorrect because: centralized planning actually eliminates rather than relies on profit motives; it typically reduces rather than increases competition; and it restricts rather than allows individual economic freedom.

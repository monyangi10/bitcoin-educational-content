question: Quelle est la principale raison pour laquelle la planification économique centralisée ne parvient pas à coordonner efficacement la production selon la théorie économique ?
answer: Il manque des signaux de prix pour indiquer les besoins réels des consommateurs et les priorités de production
wrong_answers:
  - Elle s'appuie trop fortement sur les motivations de profit qui corrompent le processus décisionnel des gouvernements
  - Elle crée une concurrence excessive entre les entreprises publiques pour l'accès aux ressources
  - Elle laisse trop de liberté individuelle dans les choix de production et de consommation
explanation: |
  La planification centralisée échoue parce qu'elle élimine le mécanisme des prix qui sert de système d'information crucial dans les marchés libres. Sans prix fluctuant en fonction de l'offre et de la demande, les planificateurs centraux agissent à l'aveuglette, incapables de savoir ce que les consommateurs veulent réellement, quand ils le veulent et combien ils sont prêts à sacrifier pour l'obtenir. Les prix agissent comme une boussole dans les économies complexes, guidant les producteurs vers des opportunités rentables qui correspondent aux besoins réels des consommateurs. Les mauvaises réponses sont incorrectes parce que : la planification centralisée élimine en fait les motivations de profit au lieu de s'y fier ; elle réduit généralement la concurrence au lieu de l'accroître ; et elle restreint la liberté économique individuelle au lieu de l'autoriser.
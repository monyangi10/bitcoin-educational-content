question: Hva er den viktigste grunnen til at sentralisert økonomisk planlegging ikke klarer å koordinere produksjonen effektivt i henhold til økonomisk teori?
answer: Det mangler prissignaler som indikerer reelle forbrukerbehov og produksjonsprioriteringer
wrong_answers:
  - Den er for avhengig av profittmotiver som korrumperer myndighetenes beslutningsprosesser
  - Det skaper overdreven konkurranse mellom statseide selskaper om ressurser
  - Det gir for stor individuell frihet i produksjons- og forbruksvalg
explanation: |
  Sentralisert planlegging mislykkes fordi den eliminerer prismekanismen som fungerer som et avgjørende informasjonssystem i frie markeder. Uten priser som svinger basert på tilbud og etterspørsel, opererer sentrale planleggere i blinde, ute av stand til å vite hva forbrukerne faktisk vil ha, når de vil ha det, eller hvor mye de er villige til å ofre for det. Prisene fungerer som et kompass i komplekse økonomier, og leder produsentene mot lønnsomme muligheter som er i tråd med forbrukernes reelle behov. De gale svarene er feil fordi: Sentralisert planlegging faktisk eliminerer profittmotivet i stedet for å basere seg på det, den reduserer konkurransen i stedet for å øke den, og den begrenser den individuelle økonomiske friheten i stedet for å tillate den.
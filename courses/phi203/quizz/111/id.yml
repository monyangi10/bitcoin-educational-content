question: Apa alasan utama mengapa perencanaan ekonomi terpusat gagal mengoordinasikan produksi secara efektif menurut teori ekonomi?
answer: Tidak ada sinyal harga untuk menunjukkan kebutuhan konsumen yang sebenarnya dan prioritas produksi
wrong_answers:
  - Terlalu bergantung pada motif keuntungan yang merusak pengambilan keputusan pemerintah
  - Hal ini menciptakan persaingan yang berlebihan di antara badan usaha milik negara untuk mendapatkan sumber daya
  - Hal ini memungkinkan terlalu banyak kebebasan individu dalam pilihan produksi dan konsumsi
explanation: |
  Perencanaan terpusat gagal karena menghilangkan mekanisme harga yang berfungsi sebagai sistem informasi penting dalam pasar bebas. Tanpa harga yang berfluktuasi berdasarkan penawaran dan permintaan, para perencana pusat beroperasi secara membabi buta, tidak dapat mengetahui apa yang sebenarnya diinginkan oleh konsumen, kapan mereka menginginkannya, atau seberapa besar pengorbanan mereka untuk mendapatkannya. Harga bertindak seperti kompas dalam ekonomi yang kompleks, memandu produsen menuju peluang yang menguntungkan yang selaras dengan kebutuhan konsumen yang sebenarnya. Jawaban yang salah adalah salah karena: perencanaan terpusat sebenarnya menghilangkan dan bukannya bergantung pada motif keuntungan; perencanaan terpusat biasanya mengurangi dan bukannya meningkatkan persaingan; dan perencanaan terpusat membatasi dan bukannya mengizinkan kebebasan ekonomi individu.
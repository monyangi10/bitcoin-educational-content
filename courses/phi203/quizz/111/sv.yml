question: Vad är det främsta skälet till att centraliserad ekonomisk planering inte lyckas samordna produktionen på ett effektivt sätt enligt ekonomisk teori?
answer: Det saknas prissignaler som indikerar verkliga konsumentbehov och produktionsprioriteringar
wrong_answers:
  - Den förlitar sig alltför mycket på vinstintressen som korrumperar beslutsfattandet i regeringen
  - Det skapar överdriven konkurrens mellan statsägda företag om resurser
  - Det ger för stor individuell frihet i produktions- och konsumtionsval
explanation: |
  Centraliserad planering misslyckas eftersom den eliminerar den prismekanism som fungerar som ett avgörande informationssystem på fria marknader. Utan priser som fluktuerar baserat på utbud och efterfrågan arbetar centralplanerare i blindo och kan inte veta vad konsumenterna faktiskt vill ha, när de vill ha det eller hur mycket de är villiga att offra för det. Priserna fungerar som en kompass i komplexa ekonomier och vägleder producenterna mot lönsamma möjligheter som är i linje med konsumenternas verkliga behov. De felaktiga svaren är felaktiga eftersom: centraliserad planering faktiskt eliminerar snarare än förlitar sig på vinstmotiv; den minskar snarare än ökar konkurrensen; och den begränsar snarare än tillåter individuell ekonomisk frihet.
question: Какова основная причина того, что централизованное экономическое планирование не позволяет эффективно координировать производство, согласно экономической теории?
answer: В нем отсутствуют ценовые сигналы, указывающие на реальные потребности потребителей и приоритеты производства
wrong_answers:
  - Она слишком сильно опирается на мотивы прибыли, которые разлагают процесс принятия государственных решений
  - Создает чрезмерную конкуренцию между государственными предприятиями за ресурсы
  - Он предоставляет слишком большую свободу индивидуального выбора в сфере производства и потребления
explanation: |
  Централизованное планирование не работает, потому что оно устраняет механизм цен, который служит важнейшей информационной системой на свободных рынках. Без цен, колеблющихся в зависимости от спроса и предложения, централизованное планирование действует вслепую, не зная, чего на самом деле хотят потребители, когда они этого хотят и сколько они готовы за это отдать. Цены действуют как компас в сложных экономиках, направляя производителей к выгодным возможностям, которые соответствуют реальным потребностям потребителей. Неправильные ответы неверны, потому что: централизованное планирование на самом деле устраняет, а не полагается на мотивы прибыли; оно обычно уменьшает, а не увеличивает конкуренцию; и оно ограничивает, а не предоставляет индивидуальную экономическую свободу.
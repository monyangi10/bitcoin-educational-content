question: Wat is de belangrijkste reden waarom gecentraliseerde economische planning er volgens de economische theorie niet in slaagt om de productie effectief te coördineren?
answer: Het ontbreekt aan prijssignalen die de werkelijke behoeften van de consument en de productieprioriteiten aangeven
wrong_answers:
  - Het leunt te zwaar op winstmotieven die de besluitvorming van de overheid corrumperen
  - Het creëert buitensporige concurrentie tussen staatsbedrijven om middelen
  - Het laat te veel individuele vrijheid in productie- en consumptiekeuzes toe
explanation: |
  Gecentraliseerde planning faalt omdat het het prijsmechanisme elimineert dat dient als een cruciaal informatiesysteem in vrije markten. Zonder prijzen die fluctueren op basis van vraag en aanbod, werken centrale planners blind, niet in staat om te weten wat consumenten echt willen, wanneer ze het willen, of hoeveel ze bereid zijn ervoor op te offeren. Prijzen fungeren als een kompas in complexe economieën en leiden producenten naar winstgevende mogelijkheden die overeenkomen met echte consumentenbehoeften. De foute antwoorden zijn fout omdat: gecentraliseerde planning in feite winstmotieven elimineert in plaats van erop te vertrouwen; het typisch concurrentie vermindert in plaats van verhoogt; en het individuele economische vrijheid eerder beperkt dan toestaat.
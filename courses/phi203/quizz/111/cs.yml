question: Jaký je hlavní důvod, proč podle ekonomické teorie centralizované ekonomické plánování nedokáže efektivně koordinovat výrobu?
answer: Chybí cenové signály, které by ukazovaly skutečné potřeby spotřebitelů a výrobní priority
wrong_answers:
  - Příliš se spoléhá na ziskové motivy, které kazí rozhodování vlády
  - Vytváří nadměrnou konkurenci mezi státními podniky o zdroje
  - Umožňuje příliš velkou individuální svobodu při rozhodování o výrobě a spotřebě
explanation: |
  Centralizované plánování selhává, protože eliminuje cenový mechanismus, který na volných trzích slouží jako klíčový informační systém. Bez kolísání cen v závislosti na nabídce a poptávce pracují centrální plánovači slepě a nemohou vědět, co spotřebitelé skutečně chtějí, kdy to chtějí a kolik jsou pro to ochotni obětovat. Ceny fungují ve složitých ekonomikách jako kompas, který vede výrobce k ziskovým příležitostem, jež jsou v souladu se skutečnými potřebami spotřebitelů. Špatné odpovědi jsou nesprávné, protože: centralizované plánování ve skutečnosti spíše eliminuje, než aby se spoléhalo na motivy zisku; obvykle spíše omezuje, než aby zvyšovalo konkurenci; a spíše omezuje, než aby umožňovalo individuální ekonomickou svobodu.
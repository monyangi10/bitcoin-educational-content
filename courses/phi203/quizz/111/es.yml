question: ¿Cuál es la razón principal por la que la planificación económica centralizada no consigue coordinar eficazmente la producción según la teoría económica?
answer: Carece de señales de precios que indiquen las necesidades reales de los consumidores y las prioridades de producción
wrong_answers:
  - Se basa demasiado en el afán de lucro, que corrompe la toma de decisiones del gobierno
  - Crea una competencia excesiva entre las empresas estatales por los recursos
  - Permite demasiada libertad individual en las opciones de producción y consumo
explanation: |
  La planificación centralizada fracasa porque elimina el mecanismo de precios que sirve de sistema de información crucial en los mercados libres. Sin precios que fluctúen en función de la oferta y la demanda, los planificadores centrales actúan a ciegas, incapaces de saber qué quieren realmente los consumidores, cuándo lo quieren o cuánto están dispuestos a sacrificar por ello. Los precios actúan como una brújula en las economías complejas, guiando a los productores hacia oportunidades rentables que se ajustan a las necesidades reales de los consumidores. Las respuestas erróneas son incorrectas porque: la planificación centralizada en realidad elimina el ánimo de lucro en lugar de basarse en él; normalmente reduce la competencia en lugar de aumentarla; y restringe la libertad económica individual en lugar de permitirla.
question: Jaki jest główny powód, dla którego scentralizowane planowanie gospodarcze nie jest w stanie skutecznie koordynować produkcji zgodnie z teorią ekonomii?
answer: Brakuje sygnałów cenowych, które wskazywałyby na rzeczywiste potrzeby konsumentów i priorytety produkcyjne
wrong_answers:
  - W zbyt dużym stopniu opiera się na motywach zysku, które korumpują rządowy proces decyzyjny
  - Tworzy to nadmierną konkurencję między przedsiębiorstwami państwowymi o zasoby
  - Pozwala na zbyt dużą indywidualną swobodę w zakresie wyborów dotyczących produkcji i konsumpcji
explanation: |
  Scentralizowane planowanie zawodzi, ponieważ eliminuje mechanizm cenowy, który służy jako kluczowy system informacyjny na wolnych rynkach. Bez cen zmieniających się w oparciu o podaż i popyt, centralni planiści działają na ślepo, nie mogąc wiedzieć, czego tak naprawdę chcą konsumenci, kiedy tego chcą, ani ile są skłonni za to poświęcić. Ceny działają jak kompas w złożonych gospodarkach, kierując producentów w stronę zyskownych możliwości, które są zgodne z rzeczywistymi potrzebami konsumentów. Błędne odpowiedzi są nieprawidłowe, ponieważ: scentralizowane planowanie w rzeczywistości eliminuje, a nie opiera się na motywach zysku; zazwyczaj zmniejsza, a nie zwiększa konkurencję; i ogranicza, a nie pozwala na indywidualną wolność gospodarczą.
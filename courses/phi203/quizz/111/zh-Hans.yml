question: 根据经济理论，中央集权经济计划无法有效协调生产的主要原因是什么？
answer: 它缺乏价格信号来表明消费者的实际需求和生产的优先次序
wrong_answers:
  - 它过于依赖利益驱动，而利益驱动会腐蚀政府决策
  - 造成国有企业之间对资源的过度竞争
  - 它允许个人在生产和消费选择上有太多的自由
explanation: |
  中央计划之所以失败，是因为它取消了作为自由市场重要信息系统的价格机制。如果价格不根据供求关系波动，中央规划者就会盲目运作，无法知道消费者真正想要什么，何时想要，或愿意为此牺牲多少。在复杂的经济体中，价格就像指南针一样，引导生产者寻找符合消费者实际需求的盈利机会。答案错误的原因是：中央集权计划实际上消除而不是依赖利润动机；它通常减少而不是增加竞争；它限制而不是允许个人经济自由。
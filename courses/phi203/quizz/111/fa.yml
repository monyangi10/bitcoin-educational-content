question: دلیل اصلی اینکه چرا برنامه‌ریزی اقتصادی متمرکز نمی‌تواند تولید را به‌طور مؤثر هماهنگ کند طبق نظریه اقتصادی چیست؟
answer: فاقد سیگنال‌های قیمتی برای نشان دادن نیازهای واقعی مصرف‌کننده و اولویت‌های تولید است.
wrong_answers:
  - این بیش از حد به انگیزه‌های سود متکی است که تصمیم‌گیری‌های دولتی را فاسد می‌کند.
  - این امر رقابت بیش از حد بین شرکت‌های دولتی برای منابع ایجاد می‌کند.
  - این اجازه می‌دهد آزادی فردی زیادی در انتخاب‌های تولید و مصرف داشته باشد.
explanation: |
  برنامه‌ریزی متمرکز شکست می‌خورد زیرا مکانیسم قیمتی را حذف می‌کند که به عنوان یک سیستم اطلاعاتی حیاتی در بازارهای آزاد عمل می‌کند. بدون نوسان قیمت‌ها بر اساس عرضه و تقاضا، برنامه‌ریزان مرکزی به صورت کورکورانه عمل می‌کنند و نمی‌توانند بدانند که مصرف‌کنندگان واقعاً چه می‌خواهند، چه زمانی آن را می‌خواهند، یا چقدر حاضرند برای آن فداکاری کنند. قیمت‌ها مانند یک قطب‌نما در اقتصادهای پیچیده عمل می‌کنند و تولیدکنندگان را به سمت فرصت‌های سودآوری هدایت می‌کنند که با نیازهای واقعی مصرف‌کنندگان همسو هستند. پاسخ‌های نادرست اشتباه هستند زیرا: برنامه‌ریزی متمرکز در واقع انگیزه‌های سود را حذف می‌کند نه اینکه به آن‌ها متکی باشد؛ معمولاً رقابت را کاهش می‌دهد نه اینکه افزایش دهد؛ و آزادی اقتصادی فردی را محدود می‌کند نه اینکه اجازه دهد.
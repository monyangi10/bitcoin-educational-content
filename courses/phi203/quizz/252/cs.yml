question: Co liberální teorie označuje za hlavní slabinu izolovaných jedinců, která vyžaduje dobrovolná sdružení namísto státních zásahů?
answer: Jejich zranitelnost vůči nejistotám života a klesající produktivní schopnosti v průběhu času
wrong_answers:
  - Jejich neschopnost vytvářet racionální smlouvy bez institucionálního vedení
  - Jejich tendence přijímat ekonomicky neefektivní rozhodnutí bez regulace
  - Jejich nedostatečný morální vývoj bez kolektivních sociálních struktur
explanation: |
  Podle liberální teorie byli izolovaní jedinci vždy slabí, když čelili životním nejistotám a přirozenému vývoji svých produktivních schopností v průběhu života. Tato základní zranitelnost vysvětluje, proč lidé žijí ve společnostech již od dob kmenů, ale liberálové tvrdí, že tuto slabost by měla řešit dobrovolná sdružení a soukromé podniky, nikoliv státní zásahy. Špatné odpovědi zkreslují liberální myšlení: liberálové věří, že jednotlivci mohou autonomně vytvářet racionální smlouvy, činit efektivní rozhodnutí prostřednictvím tržních mechanismů a morálně se rozvíjet prostřednictvím dobrovolné spolupráce, nikoliv vyžadovat státní vedení nebo kolektivní struktury.
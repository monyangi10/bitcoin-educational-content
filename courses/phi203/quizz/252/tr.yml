question: Liberal teori, devlet müdahalesi yerine gönüllü birliktelikleri gerekli kılan izole bireylerin temel zayıflığı olarak neyi tanımlar?
answer: Hayatın belirsizliklerine ve zaman içinde azalan üretken kapasiteye karşı kırılganlıkları
wrong_answers:
  - Kurumsal rehberlik olmadan rasyonel sözleşmeler oluşturamamaları
  - Düzenleme olmaksızın ekonomik açıdan verimsiz kararlar alma eğilimleri
  - Kolektif sosyal yapılar olmadan ahlaki gelişimden yoksun olmaları
explanation: |
  Liberal teoriye göre, izole edilmiş bireyler hayatın belirsizlikleri ve yaşamları boyunca üretken kapasitelerinin doğal evrimi karşısında her zaman zayıf olmuşlardır. Bu temel zayıflık, insanların kabile dönemlerinden beri neden toplumlar halinde yaşadığını açıklar, ancak liberaller bu zayıflığı devlet müdahalesi yerine gönüllü birliklerin ve özel girişimlerin gidermesi gerektiğini savunur. Yanlış cevaplar liberal düşünceyi yanlış temsil etmektedir: liberaller bireylerin özerk bir şekilde rasyonel sözleşmeler oluşturabileceğine, piyasa mekanizmaları aracılığıyla verimli kararlar alabileceğine ve devletin rehberliğine veya kolektif yapılara ihtiyaç duymak yerine gönüllü işbirliği yoluyla ahlaki açıdan gelişebileceğine inanmaktadır.
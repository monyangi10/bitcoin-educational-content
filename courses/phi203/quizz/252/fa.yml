question: نظریه لیبرال چه ضعفی را در افراد منزوی شناسایی می‌کند که نیاز به انجمن‌های داوطلبانه به جای مداخله دولت را ضروری می‌سازد؟
answer: آسیب‌پذیری آن‌ها در برابر عدم‌قطعیت‌های زندگی و کاهش ظرفیت تولیدی در طول زمان
wrong_answers:
  - ناتوانی آنها در تشکیل قراردادهای منطقی بدون راهنمایی نهادی
  - تمایل آنها به اتخاذ تصمیمات اقتصادی ناکارآمد بدون مقررات
  - فقدان توسعه اخلاقی آنها بدون ساختارهای اجتماعی جمعی
explanation: |
  بر اساس نظریه لیبرال، افراد منزوی همواره در مواجهه با عدم قطعیت‌های زندگی و تکامل طبیعی ظرفیت‌های تولیدی خود در طول زندگی ضعیف بوده‌اند. این آسیب‌پذیری بنیادی توضیح می‌دهد که چرا انسان‌ها از زمان‌های قبیله‌ای در جوامع زندگی کرده‌اند، اما لیبرال‌ها استدلال می‌کنند که انجمن‌های داوطلبانه و شرکت‌های خصوصی باید به این ضعف رسیدگی کنند نه مداخله دولت. پاسخ‌های نادرست، اندیشه لیبرال را نادرست نشان می‌دهند: لیبرال‌ها معتقدند افراد می‌توانند به‌طور مستقل قراردادهای عقلانی تشکیل دهند، از طریق مکانیزم‌های بازار تصمیمات کارآمد بگیرند و از طریق همکاری داوطلبانه به‌طور اخلاقی توسعه یابند، بدون نیاز به راهنمایی دولت یا ساختارهای جمعی.
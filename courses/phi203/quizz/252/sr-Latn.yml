question: Šta liberalna teorija identifikuje kao primarnu slabost izolovanih pojedinaca koja zahteva dobrovoljna udruženja umesto državne intervencije?
answer: Njihova ranjivost na životne neizvesnosti i opadajuća produktivna sposobnost tokom vremena
wrong_answers:
  - Njihova nesposobnost da formiraju racionalne ugovore bez institucionalnog vođenja
  - Njihova sklonost donošenju ekonomski neefikasnih odluka bez regulacije
  - Njihov nedostatak moralnog razvoja bez kolektivnih društvenih struktura
explanation: |
  Prema liberalnoj teoriji, izolovani pojedinci su uvek bili slabi suočeni sa neizvesnostima života i prirodnom evolucijom svojih produktivnih sposobnosti tokom života. Ova fundamentalna ranjivost objašnjava zašto ljudi žive u društvima još od plemenskih vremena, ali liberali tvrde da bi dobrovoljna udruženja i privatna preduzeća trebalo da rešavaju ovu slabost, a ne državna intervencija. Pogrešni odgovori pogrešno predstavljaju liberalnu misao: liberali veruju da pojedinci mogu autonomno formirati racionalne ugovore, donositi efikasne odluke kroz tržišne mehanizme i razvijati se moralno kroz dobrovoljnu saradnju, umesto da im je potrebna državna smernica ili kolektivne strukture.
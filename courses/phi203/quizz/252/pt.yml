question: O que é que a teoria liberal identifica como a principal fraqueza dos indivíduos isolados que exige associações voluntárias em vez da intervenção do Estado?
answer: A sua vulnerabilidade às incertezas da vida e o declínio da capacidade produtiva ao longo do tempo
wrong_answers:
  - A sua incapacidade de celebrar contratos racionais sem orientação institucional
  - A sua tendência para tomar decisões economicamente ineficientes sem regulamentação
  - A sua falta de desenvolvimento moral sem estruturas sociais colectivas
explanation: |
  Segundo a teoria liberal, os indivíduos isolados sempre foram fracos perante as incertezas da vida e a evolução natural das suas capacidades produtivas ao longo da vida. Esta vulnerabilidade fundamental explica o facto de os seres humanos viverem em sociedades desde os tempos tribais, mas os liberais defendem que as associações voluntárias e as empresas privadas devem resolver esta fraqueza em vez da intervenção do Estado. As respostas erradas representam mal o pensamento liberal: os liberais acreditam que os indivíduos podem formar contratos racionais de forma autónoma, tomar decisões eficientes através de mecanismos de mercado e desenvolver-se moralmente através da cooperação voluntária, em vez de necessitarem de orientação estatal ou de estruturas colectivas.
question: Worin sieht die liberale Theorie die primäre Schwäche isolierter Individuen, die eher freiwillige Zusammenschlüsse als staatliches Eingreifen erforderlich macht?
answer: Ihre Anfälligkeit für die Unwägbarkeiten des Lebens und die im Laufe der Zeit abnehmende Produktionskapazität
wrong_answers:
  - Ihre Unfähigkeit, ohne institutionelle Anleitung vernünftige Verträge zu schließen
  - Ihre Tendenz, ohne Regulierung wirtschaftlich ineffiziente Entscheidungen zu treffen
  - Ihr Mangel an moralischer Entwicklung ohne kollektive soziale Strukturen
explanation: |
  Die liberale Theorie besagt, dass isolierte Individuen schon immer schwach waren, wenn sie mit den Unwägbarkeiten des Lebens und der natürlichen Entwicklung ihrer produktiven Fähigkeiten im Laufe ihres Lebens konfrontiert wurden. Diese grundlegende Schwäche erklärt, warum die Menschen seit Stammeszeiten in Gesellschaften leben, aber Liberale argumentieren, dass freiwillige Vereinigungen und private Unternehmen diese Schwäche eher beheben sollten als staatliche Eingriffe. Die falschen Antworten geben das liberale Denken falsch wieder: Liberale glauben, dass der Einzelne autonom rationale Verträge schließen, durch Marktmechanismen effiziente Entscheidungen treffen und sich durch freiwillige Zusammenarbeit moralisch weiterentwickeln kann, anstatt staatliche Führung oder kollektive Strukturen zu benötigen.
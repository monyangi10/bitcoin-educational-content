question: Quelle est, selon la théorie libérale, la principale faiblesse des individus isolés qui nécessite des associations volontaires plutôt qu'une intervention de l'État ?
answer: Leur vulnérabilité face aux incertitudes de la vie et le déclin de leur capacité de production au fil du temps
wrong_answers:
  - Leur incapacité à former des contrats rationnels sans aide institutionnelle
  - Leur tendance à prendre des décisions économiquement inefficaces en l'absence de réglementation
  - Leur manque de développement moral en l'absence de structures sociales collectives
explanation: |
  Selon la théorie libérale, les individus isolés ont toujours été faibles face aux incertitudes de la vie et à l'évolution naturelle de leurs capacités productives tout au long de leur vie. Cette vulnérabilité fondamentale explique pourquoi les hommes vivent en société depuis l'époque tribale, mais les libéraux affirment que les associations volontaires et les entreprises privées devraient remédier à cette faiblesse plutôt que l'intervention de l'État. Les mauvaises réponses déforment la pensée libérale : les libéraux pensent que les individus peuvent former des contrats rationnels de manière autonome, prendre des décisions efficaces grâce aux mécanismes du marché et se développer moralement par le biais d'une coopération volontaire plutôt que d'avoir besoin de l'aide de l'État ou de structures collectives.
question: Hva er det som ifølge liberal teori er den primære svakheten ved isolerte individer, og som gjør det nødvendig med frivillige sammenslutninger snarere enn statlig inngripen?
answer: Deres sårbarhet for livets usikkerheter og synkende produksjonsevne over tid
wrong_answers:
  - Manglende evne til å inngå rasjonelle kontrakter uten institusjonell veiledning
  - Deres tendens til å ta økonomisk ineffektive beslutninger uten regulering
  - Deres manglende moralske utvikling uten kollektive sosiale strukturer
explanation: |
  Ifølge liberal teori har isolerte individer alltid vært svake i møte med livets usikkerhet og den naturlige utviklingen av deres produktive evner gjennom livet. Denne grunnleggende sårbarheten forklarer hvorfor mennesker har levd i samfunn siden stammetiden, men liberale argumenterer for at frivillige sammenslutninger og private foretak bør avhjelpe denne svakheten snarere enn statlig inngripen. De gale svarene gir en feilaktig fremstilling av liberal tenkning: Liberale mener at individer kan inngå rasjonelle kontrakter på egen hånd, ta effektive beslutninger gjennom markedsmekanismer, og utvikle seg moralsk gjennom frivillig samarbeid snarere enn å trenge statlig veiledning eller kollektive strukturer.
question: Dukurikije ikigabane, ni ibikorwa vy’uguhingura ibihe birangwa n’ubukazi bujanye n’ugusambura aho kurema?
answer: Guhiga no kuroba
wrong_answers:
  - Ubuhinzi n'uburimyi .
  - Uguhingura n'ubuhinga
  - Ubucuruzi n'ubucuruzi
explanation: |
  Ico kigabane kivuga neza yuko uguhiga no kuroba ari uburyo bw’ubukazi bwo guhingura ibintu bujanye n’ugusambura aho kurema. Ivyo bikorwa bisaba gukura ubuzima ku bikoko biriho, bikabigira ibikoko bifata abantu mu kameremere. Mu buryo butandukanye n’ubwo, uburimyi burashikirizwa nk’ugutera imbere mu bijanye n’uguhingura mu mahoro bituma haba uguhuza aho gutuma haba ugusambura. Ivy’uguhingura ibintu, ubuhinga bw’amaboko, ubudandaji n’ubudandaji vyose ni uburyo bwo guhingura ibintu mu mahoro bitera agaciro ata gusenyura ubuzima buriho, bikaba bitandukanye cane n’uburyo bwo guhigira no kuroba bukora ubukazi, bukaba ari ubw’ubukazi.
question: Según el capítulo, ¿qué tipo de actividades productivas se caracterizan por ser formas violentas que implican destrucción en lugar de creación?
answer: Caza y pesca
wrong_answers:
  - Agricultura y ganadería
  - Fabricación y artesanía
  - Comercio
explanation: |
  El capítulo afirma explícitamente que la caza y la pesca constituyen formas violentas de producción que implican destrucción en lugar de creación. Estas actividades requieren quitar la vida a animales existentes, lo que las convierte en depredadoras por naturaleza. En cambio, la agricultura se presenta como un avance hacia la producción pacífica que crea armonía en lugar de destrucción. La manufactura, la artesanía, el intercambio y el comercio son formas de producción pacífica que crean valor sin destruir la vida existente, lo que las diferencia fundamentalmente de la naturaleza extractiva y violenta de la caza y la pesca.
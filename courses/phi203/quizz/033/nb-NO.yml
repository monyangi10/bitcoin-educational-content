question: Hvilken type produksjonsaktiviteter kjennetegnes, ifølge kapittelet, som voldelige former som innebærer ødeleggelse snarere enn nyskaping?
answer: Jakt og fiske
wrong_answers:
  - Landbruk og oppdrett
  - Produksjon og håndverk
  - Handel og næringsliv
explanation: |
  I kapittelet står det eksplisitt at jakt og fiske er voldelige produksjonsformer som innebærer ødeleggelse snarere enn skapelse. Disse aktivitetene krever at man tar liv fra eksisterende dyr, noe som gjør dem til rovdyr. I kontrast til dette presenteres jordbruket som en utvikling mot fredelig produksjon som skaper harmoni snarere enn ødeleggelse. Produksjon, håndverk, handel og næringsvirksomhet er alle former for fredelig produksjon som skaper verdier uten å ødelegge eksisterende liv, noe som gjør dem fundamentalt forskjellige fra jaktens og fiskets ekstraktive og voldelige karakter.
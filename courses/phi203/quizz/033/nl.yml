question: Welk type productieactiviteiten worden volgens het hoofdstuk gekarakteriseerd als gewelddadige vormen waarbij eerder sprake is van vernietiging dan van creatie?
answer: Jagen en vissen
wrong_answers:
  - Landbouw en veeteelt
  - Productie en vakmanschap
  - Handel en commercie
explanation: |
  Het hoofdstuk stelt expliciet dat jagen en vissen gewelddadige vormen van productie zijn die eerder vernietiging dan schepping inhouden. Deze activiteiten vereisen het nemen van leven van bestaande dieren, waardoor ze roofzuchtig van aard zijn. Landbouw wordt daarentegen voorgesteld als een vooruitgang in de richting van vreedzame productie die harmonie schept in plaats van vernietiging. Productie, vakmanschap, handel en commercie zijn allemaal vormen van vreedzame productie die waarde creëren zonder bestaand leven te vernietigen, waardoor ze fundamenteel verschillen van de extractieve, gewelddadige aard van jagen en vissen.
question: D'après le chapitre, quel type d'activités de production se caractérise par des formes violentes qui impliquent la destruction plutôt que la création ?
answer: Chasse et pêche
wrong_answers:
  - Agriculture et élevage
  - Fabrication et artisanat
  - Commerce et échanges
explanation: |
  Le chapitre indique explicitement que la chasse et la pêche constituent des formes violentes de production qui impliquent la destruction plutôt que la création. Ces activités nécessitent de prélever la vie sur des animaux existants, ce qui les rend prédatrices par nature. En revanche, l'agriculture est présentée comme un progrès vers une production pacifique qui crée l'harmonie plutôt que la destruction. La fabrication, l'artisanat, les échanges et le commerce sont autant de formes de production pacifique qui créent de la valeur sans détruire la vie existante, ce qui les différencie fondamentalement de la nature extractive et violente de la chasse et de la pêche.
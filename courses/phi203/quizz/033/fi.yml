question: Luvun mukaan mitä tuotantotoimintaa luonnehditaan väkivaltaisiksi muodoiksi, joihin liittyy pikemminkin tuhoa kuin luomista?
answer: Metsästys ja kalastus
wrong_answers:
  - Maatalous ja maanviljely
  - Valmistus ja käsityötaito
  - Kauppa ja kaupankäynti
explanation: |
  Luvussa todetaan nimenomaisesti, että metsästys ja kalastus ovat väkivaltaisia tuotantomuotoja, joihin liittyy pikemminkin tuhoa kuin luomista. Nämä toiminnot edellyttävät elämän riistämistä olemassa olevilta eläimiltä, mikä tekee niistä luonteeltaan petoeläimiä. Maatalous sen sijaan esitetään edistysaskeleena kohti rauhanomaista tuotantoa, joka luo harmoniaa eikä tuhoa. Teollisuus, käsityö, kauppa ja kaupankäynti ovat kaikki rauhanomaisen tuotannon muotoja, jotka luovat arvoa tuhoamatta olemassa olevaa elämää, mikä erottaa ne perustavanlaatuisesti metsästyksen ja kalastuksen väkivaltaisesta ja riistävästä luonteesta.
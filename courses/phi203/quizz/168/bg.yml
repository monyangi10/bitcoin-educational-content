question: Каква е основната мотивация за протекционизма на работниците и антиимиграционните закони според либералните икономисти от XIX в.?
answer: Защита на местните работници от конкуренцията с чуждестранни работници, които са готови да работят за по-ниски заплати
wrong_answers:
  - Да се предотврати пренасянето на болести и културни конфликти от чуждестранни работници в страната
  - Поддържане на националната сигурност чрез ограничаване на достъпа до чувствителни отрасли и правителствени позиции
  - Да се запазят традиционните занаятчийски методи срещу индустриализацията и механизацията
explanation: |
  Според тази глава либералните икономисти от XIX в. определят протекционизма на работниците като основно икономически - местните работници търсят защита от конкуренцията на чуждестранните работници, особено на тези, които са готови да работят в мините и други индустрии срещу конкурентно заплащане. Това съвпада с начина, по който собствениците на предприятия използват тарифния протекционизъм, за да се предпазят от конкуренцията на чуждестранни продукти. Другите варианти се фокусират върху културни проблеми, проблеми на сигурността или технологични проблеми, но либералните икономисти разглеждат това конкретно като механизъм за икономическа защита, при който работниците използват политически средства, за да избегнат пазарната конкуренция, подобно на начина, по който китайските работници са били изключени от австралийските и калифорнийските мини въпреки желанието им да участват чрез договор и обмен.
question: Apa motivasi utama di balik proteksionisme pekerja dan undang-undang anti-imigrasi menurut para ekonom liberal pada abad ke-19?
answer: Untuk melindungi pekerja domestik dari persaingan dengan pekerja asing yang bersedia bekerja dengan upah yang lebih rendah
wrong_answers:
  - Untuk mencegah pekerja asing membawa penyakit dan konflik budaya ke dalam negeri
  - Untuk menjaga keamanan nasional dengan membatasi akses ke industri sensitif dan posisi pemerintah
  - Untuk melestarikan metode pengerjaan tradisional melawan industrialisasi dan mekanisasi
explanation: |
  Menurut bab ini, para ekonom liberal abad ke-19 mengidentifikasi proteksionisme pekerja sebagai sesuatu yang bersifat fundamental secara ekonomi - pekerja domestik mencari perlindungan dari persaingan dengan pekerja asing, terutama mereka yang bersedia bekerja di tambang dan industri lain dengan upah yang kompetitif. Hal ini sejalan dengan bagaimana para pemilik bisnis menggunakan proteksionisme tarif untuk melindungi diri mereka sendiri dari persaingan produk asing. Pilihan lainnya berfokus pada masalah budaya, keamanan, atau teknologi, tetapi para ekonom liberal secara khusus melihat hal ini sebagai mekanisme perlindungan ekonomi di mana para pekerja menggunakan cara-cara politis untuk menghindari persaingan pasar, mirip dengan bagaimana pekerja Cina dikecualikan dari tambang-tambang di Australia dan California, meskipun mereka bersedia untuk berpartisipasi melalui kontrak dan pertukaran.
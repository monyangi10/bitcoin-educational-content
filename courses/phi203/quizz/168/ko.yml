question: 19세기 자유주의 경제학자들에 따르면 노동자 보호주의와 반이민법의 주된 동기는 무엇이었을까요?
answer: 저임금을 받고 일하려는 외국인 근로자와의 경쟁으로부터 국내 근로자를 보호하기 위해
wrong_answers:
  - 외국인 근로자가 질병과 문화적 갈등을 국내로 가져오는 것을 방지합니다
  - 민감한 산업 및 정부 직책에 대한 접근을 제한하여 국가 안보를 유지하기 위해
  - 산업화와 기계화에 맞서 전통 장인 정신을 보존하기 위해
explanation: |
  이 장에 따르면 19세기 자유주의 경제학자들은 노동자 보호주의를 근본적으로 경제적인 것으로 파악했으며, 국내 노동자들은 특히 광산 및 기타 산업에서 경쟁력 있는 임금을 받고 일하려는 외국인 노동자들과의 경쟁으로부터 보호받기를 원했습니다. 이는 사업주들이 외국 제품과의 경쟁에서 자신을 보호하기 위해 관세 보호주의를 사용한 것과 유사합니다. 다른 옵션은 문화, 안보 또는 기술적 문제에 초점을 맞추지만 자유주의 경제학자들은 특히 중국 노동자들이 계약과 교환을 통해 호주와 캘리포니아 광산에 참여할 의사가 있었음에도 불구하고 배제된 것과 마찬가지로 노동자들이 시장 경쟁을 피하기 위해 정치적 수단을 사용하는 경제적 보호 메커니즘으로 보았습니다.
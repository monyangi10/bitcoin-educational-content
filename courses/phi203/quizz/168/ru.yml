question: Какова была основная мотивация протекционизма и антииммиграционных законов, по мнению либеральных экономистов XIX века?
answer: Защитить отечественных работников от конкуренции с иностранными рабочими, готовыми работать за более низкую зарплату
wrong_answers:
  - Чтобы иностранные рабочие не приносили в страну болезни и культурные конфликты
  - Для поддержания национальной безопасности путем ограничения доступа к чувствительным отраслям и государственным должностям
  - Сохранение традиционных методов ремесленного производства в условиях индустриализации и механизации
explanation: |
  Согласно этой главе, либеральные экономисты XIX века считали, что протекционизм в отношении рабочих имеет фундаментальную экономическую природу: отечественные рабочие искали защиты от конкуренции с иностранными рабочими, особенно с теми, кто готов работать в шахтах и других отраслях за конкурентоспособную зарплату. Это совпадает с тем, как владельцы бизнеса использовали тарифный протекционизм, чтобы оградить себя от конкуренции с иностранной продукцией. В других вариантах основное внимание уделялось проблемам культуры, безопасности или технологиям, но либеральные экономисты рассматривали это как механизм экономической защиты, когда рабочие использовали политические средства, чтобы избежать рыночной конкуренции, подобно тому, как китайские рабочие были исключены из австралийских и калифорнийских шахт, несмотря на их готовность к участию через контракты и обмен.
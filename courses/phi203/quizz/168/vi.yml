question: Theo các nhà kinh tế tự do thế kỷ 19, động cơ chính đằng sau chủ nghĩa bảo hộ người lao động và các đạo luật chống nhập cư là gì?
answer: Để bảo vệ người lao động trong nước khỏi sự cạnh tranh với người lao động nước ngoài sẵn sàng làm việc với mức lương thấp hơn.
wrong_answers:
  - Để ngăn chặn lao động nước ngoài mang bệnh tật và xung đột văn hóa vào đất nước.
  - Nhằm duy trì an ninh quốc gia bằng cách hạn chế tiếp cận các ngành công nghiệp nhạy cảm và các vị trí trong chính phủ.
  - Bảo tồn các phương pháp thủ công truyền thống trước sự công nghiệp hóa và cơ giới hóa.
explanation: |
  Theo chương này, các nhà kinh tế tự do thế kỷ 19 xác định chủ nghĩa bảo hộ người lao động về bản chất là kinh tế - người lao động trong nước tìm kiếm sự bảo vệ khỏi sự cạnh tranh với người lao động nước ngoài, đặc biệt là những người sẵn sàng làm việc trong các mỏ và các ngành công nghiệp khác với mức lương cạnh tranh. Điều này tương tự như cách các chủ doanh nghiệp sử dụng chủ nghĩa bảo hộ thuế quan để tự bảo vệ mình khỏi sự cạnh tranh của sản phẩm nước ngoài. Các lựa chọn khác tập trung vào các mối quan ngại về văn hóa, an ninh hoặc công nghệ, nhưng các nhà kinh tế tự do đặc biệt coi đây là một cơ chế bảo hộ kinh tế, trong đó người lao động sử dụng các biện pháp chính trị để tránh cạnh tranh thị trường, tương tự như việc người lao động Trung Quốc bị loại trừ khỏi các mỏ ở Úc và California mặc dù họ sẵn sàng tham gia thông qua hợp đồng và trao đổi.
question: Hva var hovedmotivasjonen bak arbeiderproteksjonisme og anti-immigrasjonslover ifølge liberale økonomer på 1800-tallet?
answer: For å beskytte innenlandske arbeidere mot konkurranse fra utenlandske arbeidere som er villige til å jobbe for lavere lønninger
wrong_answers:
  - For å forhindre at utenlandske arbeidere bringer med seg sykdommer og kulturelle konflikter inn i landet
  - Opprettholde nasjonal sikkerhet ved å begrense tilgangen til sensitive bransjer og offentlige stillinger
  - Å bevare tradisjonelle håndverksmetoder mot industrialisering og mekanisering
explanation: |
  Ifølge kapittelet identifiserte 1800-tallets liberale økonomer arbeiderproteksjonisme som grunnleggende økonomisk - innenlandske arbeidere søkte beskyttelse mot konkurranse fra utenlandske arbeidere, særlig de som var villige til å jobbe i gruver og andre industrier for konkurransedyktige lønninger. Dette var en parallell til hvordan bedriftseiere brukte tollproteksjonisme for å beskytte seg mot konkurranse fra utenlandske produkter. De andre alternativene fokuserer på kulturelle, sikkerhetsmessige eller teknologiske hensyn, men de liberale økonomene så på dette som en økonomisk beskyttelsesmekanisme der arbeiderne brukte politiske virkemidler for å unngå konkurranse på markedet, på samme måte som de kinesiske arbeiderne ble utestengt fra australske og californiske gruver til tross for at de var villige til å delta gjennom kontrakter og utveksling.
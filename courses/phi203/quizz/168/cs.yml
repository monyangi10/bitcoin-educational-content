question: Co bylo podle liberálních ekonomů 19. století hlavní motivací protekcionismu a protiimigračních zákonů?
answer: Chránit domácí pracovníky před konkurencí zahraničních pracovníků, kteří jsou ochotni pracovat za nižší mzdy
wrong_answers:
  - Zabránit zahraničním pracovníkům, aby do země vnášeli nemoci a kulturní konflikty
  - Zachování národní bezpečnosti omezením přístupu do citlivých odvětví a na vládní pozice
  - Zachovat tradiční řemeslné postupy proti industrializaci a mechanizaci
explanation: |
  Podle této kapitoly liberální ekonomové 19. století označili protekcionismus pracovníků za zásadně ekonomický - domácí pracovníci se snažili chránit před konkurencí zahraničních pracovníků, zejména těch, kteří byli ochotni pracovat v dolech a dalších odvětvích za konkurenceschopné mzdy. To odpovídalo tomu, jak majitelé podniků využívali celní protekcionismus, aby se chránili před konkurencí zahraničních výrobků. Další možnosti se zaměřují na kulturní, bezpečnostní nebo technologické otázky, ale liberální ekonomové to konkrétně považovali za ekonomický ochranný mechanismus, kdy pracovníci využívali politické prostředky, aby se vyhnuli konkurenci na trhu, podobně jako byli čínští pracovníci vyloučeni z australských a kalifornských dolů, přestože byli ochotni se zapojit prostřednictvím smlouvy a výměny.
question: อะไรคือแรงจูงใจหลักเบื้องหลังการปกป้องแรงงานและกฎหมายต่อต้านการย้ายถิ่นฐานตามมุมมองของนักเศรษฐศาสตร์เสรีนิยมในศตวรรษที่ 19?
answer: เพื่อปกป้องแรงงานในประเทศจากการแข่งขันกับแรงงานต่างชาติที่ยินดีทำงานในอัตราค่าจ้างที่ต่ำกว่า
wrong_answers:
  - เพื่อป้องกันไม่ให้แรงงานต่างชาตินำโรคและความขัดแย้งทางวัฒนธรรมเข้ามาในประเทศ
  - เพื่อรักษาความมั่นคงของชาติด้วยการจำกัดการเข้าถึงอุตสาหกรรมที่มีความอ่อนไหวและตำแหน่งในรัฐบาล
  - เพื่ออนุรักษ์วิธีการช่างฝีมือแบบดั้งเดิมจากการอุตสาหกรรมและการใช้เครื่องจักรกล
explanation: |
  ตามบทนี้ นักเศรษฐศาสตร์เสรีนิยมในศตวรรษที่ 19 ระบุว่าการปกป้องแรงงานเป็นเรื่องเศรษฐกิจโดยพื้นฐาน - แรงงานในประเทศต้องการการปกป้องจากการแข่งขันกับแรงงานต่างชาติ โดยเฉพาะผู้ที่ยินดีทำงานในเหมืองและอุตสาหกรรมอื่น ๆ ด้วยค่าจ้างที่แข่งขันได้ สิ่งนี้คล้ายคลึงกับวิธีที่เจ้าของธุรกิจใช้การปกป้องภาษีเพื่อป้องกันตนเองจากการแข่งขันของผลิตภัณฑ์ต่างชาติ ตัวเลือกอื่น ๆ มุ่งเน้นไปที่ความกังวลด้านวัฒนธรรม ความมั่นคง หรือเทคโนโลยี แต่เศรษฐศาสตร์เสรีนิยมมองว่านี่เป็นกลไกการปกป้องทางเศรษฐกิจที่แรงงานใช้วิธีการทางการเมืองเพื่อหลีกเลี่ยงการแข่งขันในตลาด เช่นเดียวกับที่แรงงานจีนถูกกีดกันจากเหมืองในออสเตรเลียและแคลิฟอร์เนียแม้ว่าพวกเขาจะยินดีเข้าร่วมผ่านสัญญาและการแลกเปลี่ยนก็ตาม
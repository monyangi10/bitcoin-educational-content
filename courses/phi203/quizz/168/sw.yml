question: Ni nini kilikuwa kichocheo kikuu cha ulinzi wa wafanyakazi na sheria za kupinga uhamiaji kulingana na wanauchumi huria wa karne ya 19?
answer: Kuwalinda wafanyakazi wa ndani kutokana na ushindani na wafanyakazi wa kigeni walio tayari kufanya kazi kwa mishahara ya chini
wrong_answers:
  - Ili kuzuia wafanyakazi wa kigeni kuleta magonjwa na migogoro ya kitamaduni nchini
  - Kudumisha usalama wa taifa kwa kupunguza ufikiaji wa viwanda nyeti na nafasi za serikali
  - Kuhifadhi mbinu za kitamaduni za ufundi dhidi ya viwanda na mitambo
explanation: |
  Kulingana na sura hiyo, wanauchumi huria wa karne ya 19 walitambua ulinzi wa wafanyakazi kama asili ya kiuchumi kimsingi - wafanyakazi wa majumbani walitafuta ulinzi dhidi ya ushindani na wafanyakazi wa kigeni, hasa wale walio tayari kufanya kazi katika migodi na viwanda vingine kwa ajili ya mishahara ya ushindani. Hii ilifanana na jinsi wamiliki wa biashara walivyotumia ulinzi wa ushuru ili kujikinga na ushindani wa bidhaa za kigeni. Chaguzi zingine zinazingatia masuala ya kitamaduni, usalama, au kiteknolojia, lakini wanauchumi huria waliona hili kama utaratibu wa ulinzi wa kiuchumi ambapo wafanyakazi walitumia njia za kisiasa ili kuepuka ushindani wa soko, sawa na jinsi wafanyakazi wa China walivyotengwa kutoka migodi ya Australia na California licha ya nia yao ya kushiriki kupitia mkataba na ubadilishanaji.
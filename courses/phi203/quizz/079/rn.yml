question: Ni uburyo ubuhe bwo gusesangura amateka ico canditswe kivuga ko butanga ubumenyi bwiza kuruta kwibanda gusa ku gukurikirana kw’ubutegetsi bwa politike?
answer: Kwibanda ku kwigarurira umwidegemvyo buhoro buhoro mu mateka yose .
wrong_answers:
  - Gusuzuma politike z'ubutunzi z'ingoma zitandukanye zitwara
  - Kwiga ingamba za gisirikare zakoreshwa mu ntambara zikomeye zo mu mateka .
  - Gusuzuma imyizere y’idini yahinduye ubutekerezi bwa kera .
explanation: |
  Ico canditswe kivuga neza ko ugusesangura amateka kuronka akamaro iyo kwibanda ku kwigarurira umwidegemvyo mu buryo bugenda buratera imbere aho kwibanda ku gukurikirana kworoshe kw’ububasha bwa politike. Ubwo buryo burahishura ingene umwidegemvyo wishingira intahe buhorobuhoro kandi bugasigura isano riri hagati y’iterambere ry’ubuhinga, uguhinduka kw’ubutunzi be n’ugutera imbere kw’ivyiyumviro vya politike. Ibindi bishobora gukoreshwa, naho bishobora kuba ari uburyo bw’agaciro bwo gutorera umuti amateka, ntibivugwa mu canditswe nk’ubundi buryo bwiza bwo kwiga ivy’ugukurikirana mu vya politike.
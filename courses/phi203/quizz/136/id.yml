question: Menurut analisis sistem non-kebebasan, karakteristik fundamental apa yang dimiliki oleh sosialisme dan komunisme meskipun mereka memiliki pendekatan yang berbeda dalam hal kontrol ekonomi?
answer: Keduanya menggantikan kontrak individu, pilihan bebas, dan otonomi pribadi dengan arahan politik dan pengambilan keputusan kolektif
wrong_answers:
  - Keduanya sepenuhnya menghapus kepemilikan pribadi dan menetapkan kepemilikan penuh negara atas semua alat produksi
  - Keduanya mempertahankan hak milik individu dan hanya mengatur distribusi sumber daya kolektif
  - Keduanya mempertahankan otonomi pribadi dalam keputusan sehari-hari sementara hanya mengendalikan perencanaan ekonomi skala besar
explanation: |
  Teks tersebut dengan jelas menyatakan bahwa kesamaan mendasar antara sosialisme dan komunisme adalah 'penggantian kontrak, pilihan bebas, dan otonomi individu dengan arahan politik' Meskipun komunisme mencoba untuk mengontrol penuh dan sosialisme beroperasi sebagai 'setengah komunis', kedua sistem ini menggantikan pertukaran sukarela dan pilihan individu dengan peraturan politik dan layanan kolektif. Pilihan lainnya tidak benar karena hanya menggambarkan penghapusan total kepemilikan komunisme, secara keliru menyatakan bahwa sistem-sistem ini mempertahankan hak-hak individu, atau salah menggambarkan ruang lingkup kontrol mereka atas keputusan pribadi.
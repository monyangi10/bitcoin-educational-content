question: Zgodnie z analizą systemów niewolnościowych, jaką podstawową cechę mają socjalizm i komunizm pomimo ich różnych podejść do kontroli gospodarczej?
answer: Oba zastępują indywidualne umowy, wolny wybór i osobistą autonomię politycznym kierownictwem i zbiorowym podejmowaniem decyzji
wrong_answers:
  - Oba całkowicie eliminują własność prywatną i ustanawiają pełną państwową własność wszystkich środków produkcji
  - Oba utrzymują indywidualne prawa własności, regulując jedynie dystrybucję zasobów zbiorowych
  - Oba zachowują osobistą autonomię w codziennych decyzjach, kontrolując jedynie planowanie gospodarcze na dużą skalę
explanation: |
  Tekst wyraźnie stwierdza, że to, co socjalizm zasadniczo łączy z komunizmem, to "zastąpienie umowy, wolnego wyboru i indywidualnej autonomii przez kierownictwo polityczne" Podczas gdy komunizm dąży do pełnej kontroli, a socjalizm działa jako "pół-komunizm", oba systemy zastępują dobrowolną wymianę i indywidualne wybory regulacjami politycznymi i usługami zbiorowymi. Pozostałe opcje są nieprawidłowe, ponieważ albo opisują jedynie całkowitą eliminację własności przez komunizm, błędnie sugerują, że systemy te zachowują prawa jednostki, albo błędnie przedstawiają zakres ich kontroli nad osobistymi decyzjami.
question: Jaký základní rys mají podle analýzy nesvobodných systémů socialismus a komunismus společný navzdory rozdílným přístupům k řízení ekonomiky?
answer: Obě nahrazují individuální smlouvy, svobodnou volbu a osobní autonomii politickým řízením a kolektivním rozhodováním
wrong_answers:
  - Obě zcela eliminují soukromé vlastnictví a zavádějí plné státní vlastnictví všech výrobních prostředků
  - Obě zachovávají individuální vlastnická práva, přičemž upravují pouze rozdělování kolektivních zdrojů
  - Obě zachovávají osobní autonomii při každodenním rozhodování a kontrolují pouze rozsáhlé ekonomické plánování
explanation: |
  V textu se jasně uvádí, že socialismus má s komunismem společné to, že "nahrazuje smlouvu, svobodnou volbu a autonomii jednotlivce politickým řízením" Zatímco komunismus se pokouší o úplnou kontrolu a socialismus funguje jako "polokomunismus", oba systémy nahrazují dobrovolnou směnu a individuální volbu politickými předpisy a kolektivními službami. Ostatní možnosti jsou nesprávné, protože buď popisují pouze úplné odstranění vlastnictví komunismem, nesprávně naznačují, že tyto systémy zachovávají individuální práva, nebo zkreslují rozsah jejich kontroly nad osobními rozhodnutími.
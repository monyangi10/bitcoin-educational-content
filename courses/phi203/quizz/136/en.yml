question: According to the analysis of non-freedom systems, what fundamental characteristic do socialism and communism share despite their different approaches to economic control?
answer: Both replace individual contracts, free choice, and personal autonomy with political direction and collective decision-making
wrong_answers:
  - Both completely eliminate private property and establish full state ownership of all means of production
  - Both maintain individual property rights while only regulating the distribution of collective resources
  - Both preserve personal autonomy in daily decisions while only controlling large-scale economic planning
explanation: |
  The text clearly states that what socialism fundamentally shares with communism is 'the replacement of contract, free-choice and individual autonomy by political direction.' While communism attempts complete control and socialism operates as 'half-communist,' both systems substitute voluntary exchanges and individual choices with political regulations and collective services. The other options are incorrect because they either describe only communism's total elimination of property, incorrectly suggest these systems maintain individual rights, or misrepresent the scope of their control over personal decisions.

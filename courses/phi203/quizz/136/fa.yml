question: بر اساس تحلیل سیستم‌های غیرآزاد، چه ویژگی بنیادی‌ای را سوسیالیسم و کمونیسم با وجود رویکردهای متفاوتشان به کنترل اقتصادی به اشتراک می‌گذارند؟
answer: هر دو قراردادهای فردی، انتخاب آزاد و خودمختاری شخصی را با هدایت سیاسی و تصمیم‌گیری جمعی جایگزین می‌کنند.
wrong_answers:
  - هر دو به طور کامل مالکیت خصوصی را حذف کرده و مالکیت کامل دولتی بر تمام وسایل تولید را برقرار می‌کنند.
  - هر دو حقوق مالکیت فردی را حفظ می‌کنند در حالی که فقط توزیع منابع جمعی را تنظیم می‌کنند.
  - هر دو استقلال شخصی در تصمیم‌گیری‌های روزانه را حفظ می‌کنند در حالی که تنها برنامه‌ریزی اقتصادی در مقیاس بزرگ را کنترل می‌کنند.
explanation: |
  متن به وضوح بیان می‌کند که آنچه سوسیالیسم اساساً با کمونیسم به اشتراک می‌گذارد، «جایگزینی قرارداد، انتخاب آزاد و خودمختاری فردی با هدایت سیاسی» است. در حالی که کمونیسم به کنترل کامل می‌پردازد و سوسیالیسم به عنوان «نیمه‌کمونیست» عمل می‌کند، هر دو سیستم مبادلات داوطلبانه و انتخاب‌های فردی را با مقررات سیاسی و خدمات جمعی جایگزین می‌کنند. گزینه‌های دیگر نادرست هستند زیرا یا فقط حذف کامل مالکیت توسط کمونیسم را توصیف می‌کنند، به اشتباه پیشنهاد می‌دهند که این سیستم‌ها حقوق فردی را حفظ می‌کنند، یا دامنه کنترل آن‌ها بر تصمیمات شخصی را نادرست نشان می‌دهند.
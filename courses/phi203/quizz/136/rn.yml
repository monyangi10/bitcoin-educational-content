question: Dushingiye ku gusesangura uburyo butagira umwidegemvyo, ni ikihe kintu nyamukuru ubusosiyalisimu n’ubukomunisita bihuriyeko naho uburyo butandukanye bwo kugenzura ubutunzi bufise?
answer: Ivyo vyose bisubirira amasezerano y’umuntu ku giti ciwe, uguhitamwo mu mwidegemvyo, n’ukwigenga kw’umuntu ku giti ciwe, uburongozi bwa politike n’ugufata ingingo rusangi .
wrong_answers:
  - Ivyo vyose birakuraho burundu umutungo w’abantu ku giti cabo, bigatuma Leta igira uburenganzira bwo gukoresha uburyo bwose bwo guhingura .
  - Ivyo vyose bigumya uburenganzira bw’umuntu ku giti ciwe mu gihe bigenzura gusa ugusangira umutungo rusangi .
  - Ivyo vyose bizigama ubwigenge bw’umuntu ku giti ciwe mu ngingo zifata ku musi ku musi mu gihe bigenzura gusa igenamigambi ry’ubutunzi ry’urugero runini .
explanation: |
  Ico canditswe kivuga neza yuko ico ubusosiyalisimu busangira n'ubukomunisimu ari 'ugusubirira amasezerano, uburenganzira bwo kwihitiramwo n'ukwigenga kw'umuntu ku giti ciwe n'uburongozi bwa politike.' Naho ubukomunisita bugerageza gutegeka vyose kandi ubusosiyalisiti bukora nk’‘igice c’ubukomunisita,’ izo nzira zompi zisubirira uguhanahana ku bushake n’uguhitamwo kw’umuntu ku giti ciwe n’amategeko ya politike n’ibikorwa rusangi. Ibindi bihitamwo ntibibereye kubera ko bidondora gusa ukuntu ubukomunisita bukuraho umutungo wose, bikaba bitanga iciyumviro kitari co c’uko izo nzira zigumya uburenganzira bw’umuntu ku giti ciwe, canke bikaba bigaragaza nabi urugero rw’ububasha bwavyo ku ngingo z’umuntu ku giti ciwe.
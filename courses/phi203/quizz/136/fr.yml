question: Selon l'analyse des systèmes de non-liberté, quelle caractéristique fondamentale le socialisme et le communisme partagent-ils en dépit de leurs approches différentes du contrôle économique ?
answer: Tous deux remplacent les contrats individuels, le libre choix et l'autonomie personnelle par une direction politique et une prise de décision collective
wrong_answers:
  - Tous deux éliminent complètement la propriété privée et établissent la propriété totale de l'État sur tous les moyens de production
  - Tous deux maintiennent les droits de propriété individuels et ne font que réglementer la distribution des ressources collectives
  - Toutes deux préservent l'autonomie personnelle dans les décisions quotidiennes et ne contrôlent que la planification économique à grande échelle
explanation: |
  Le texte indique clairement que ce que le socialisme partage fondamentalement avec le communisme est "le remplacement du contrat, du libre choix et de l'autonomie individuelle par une direction politique". Alors que le communisme vise un contrôle total et que le socialisme fonctionne comme un "demi-communisme", les deux systèmes remplacent les échanges volontaires et les choix individuels par des réglementations politiques et des services collectifs. Les autres options sont incorrectes, car elles décrivent uniquement l'élimination totale de la propriété par le communisme, suggèrent à tort que ces systèmes maintiennent les droits individuels ou présentent de manière erronée l'étendue du contrôle qu'ils exercent sur les décisions personnelles.

question: Özgürlükçü olmayan sistemlerin analizine göre, sosyalizm ve komünizm, ekonomik kontrol konusundaki farklı yaklaşımlarına rağmen hangi temel özelliği paylaşmaktadır?
answer: Her ikisi de bireysel sözleşmelerin, özgür seçimin ve kişisel özerkliğin yerine siyasi yönlendirmeyi ve kolektif karar almayı koymaktadır
wrong_answers:
  - Her ikisi de özel mülkiyeti tamamen ortadan kaldırır ve tüm üretim araçları üzerinde tam devlet mülkiyeti kurar
  - Her ikisi de bireysel mülkiyet haklarını korurken sadece kolektif kaynakların dağıtımını düzenler
  - Her ikisi de günlük kararlarda kişisel özerkliği korurken, yalnızca büyük ölçekli ekonomik planlamayı kontrol eder
explanation: |
  Metin, sosyalizmin komünizmle temelde paylaştığı şeyin 'sözleşmenin, özgür seçimin ve bireysel özerkliğin yerini siyasi yönlendirmenin alması' olduğunu açıkça belirtmektedir Komünizm tam kontrol sağlamaya çalışırken ve sosyalizm 'yarı komünist' olarak faaliyet gösterirken, her iki sistem de gönüllü mübadeleleri ve bireysel seçimleri siyasi düzenlemeler ve kolektif hizmetlerle ikame etmektedir. Diğer seçenekler yanlıştır çünkü ya sadece komünizmin mülkiyeti tamamen ortadan kaldırdığını tanımlarlar, ya bu sistemlerin bireysel hakları koruduğunu yanlış bir şekilde öne sürerler ya da kişisel kararlar üzerindeki kontrollerinin kapsamını yanlış ifade ederler.
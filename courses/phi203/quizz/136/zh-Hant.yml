question: 根據對非自由制度的分析，社會主義與共產主義儘管採取不同的經濟控制方式，但它們有什麼共同的基本特徵？
answer: 兩者都以政治指導和集體決策取代個人契約、自由選擇和個人自主權
wrong_answers:
  - 兩者都完全消除私有財產，並建立所有生產工具的完全國家所有制
  - 兩者都維持個人財產權，但只規範集體資源的分配
  - 兩者都保留個人在日常決策上的自主權，只控制大規模的經濟規劃
explanation: |
  文中明確指出，社會主義與共產主義的根本共通點是「以政治指導取代契約、自由選擇和個人自主。雖然共產主義試圖完全控制，而社會主義則以「半共產主義」的方式運作，但這兩種制度都是以政治規範和集體服務取代自願交換和個人選擇。其他選項都是不正確的，因為它們不是只描述共產主義完全消除財產，就是不正確地暗示這些制度維持個人權利，或是歪曲這些制度對個人決策的控制範圍。
question: De acordo com a análise dos sistemas sem liberdade, que caraterística fundamental partilham o socialismo e o comunismo, apesar das suas diferentes abordagens ao controlo económico?
answer: Ambos substituem os contratos individuais, a livre escolha e a autonomia pessoal pela direção política e pela tomada de decisões colectivas
wrong_answers:
  - Ambos eliminam completamente a propriedade privada e estabelecem a propriedade total do Estado sobre todos os meios de produção
  - Ambos mantêm os direitos de propriedade individuais, regulando apenas a distribuição dos recursos colectivos
  - Ambos preservam a autonomia pessoal nas decisões quotidianas, controlando apenas o planeamento económico em grande escala
explanation: |
  O texto afirma claramente que o que o socialismo partilha fundamentalmente com o comunismo é "a substituição do contrato, da livre escolha e da autonomia individual pela direção política" Enquanto o comunismo tenta o controlo total e o socialismo funciona como "meio-comunista", ambos os sistemas substituem as trocas voluntárias e as escolhas individuais por regulamentos políticos e serviços colectivos. As outras opções estão incorrectas porque descrevem apenas a eliminação total da propriedade pelo comunismo, sugerem incorretamente que estes sistemas mantêm os direitos individuais ou deturpam o âmbito do seu controlo sobre as decisões pessoais.
question: Jaká posloupnost podle popsaného historického vývoje představuje vývoj směrem ke společnosti svobodných jedinců?
answer: Od otroctví k nevolnictví, pak ke stále méně regulované a omezené svobodě
wrong_answers:
  - Od primitivní svobody k otroctví a pak k moderní regulované svobodě
  - Od přirozené svobody ke společenským smlouvám a následně k institucionální demokracii
  - Od feudalismu k monarchii a poté k republikánským formám vlády
explanation: |
  Text výslovně popisuje historický vývoj, v němž "pokrok samosprávy umožnil od starověku a primitivních dob velký pokrok, který vedl od otroctví k nevolnictví a poté ke stále méně regulované a omezené svobodě" Tato posloupnost ukazuje, že svoboda není přirozeným stavem, ale výsledkem civilizačního procesu. Ostatní možnosti buď obracejí popsaný skutečný vývoj, zaměřují se spíše na politické struktury než na vývoj individuální svobody, nebo zkreslují výchozí bod tohoto historického vývoje.
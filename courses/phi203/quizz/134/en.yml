question: Which four thinkers does the text identify as contributors to the French liberal programme for international peace, and what approach did each bring?
answer: Saint-Pierre (international institutions), Passy (public opinion education), Molinari (international justice and police), and Bastiat (free trade as the surest foundation for peace)
wrong_answers:
  - Bastiat (free trade), Tocqueville (democracy), Say (economic growth), and Molinari (military deterrence)
  - Saint-Pierre (perpetual peace treaty), Rousseau (social contract), Turgot (free markets), and Guyot (human perfectibility)
  - Molinari (federalism), Bastiat (taxation reform), Leroy-Beaulieu (colonial policy), and Coquelin (monetary stability)
explanation: |
  The text identifies four distinct contributions to the liberal programme for international peace. The Abbé de Saint-Pierre proposed international institutions to guarantee the rule of law at a global scale. Frédéric Passy, the first Nobel Peace Prize laureate, placed his confidence in public opinion — if peoples understood their prosperity depended on that of their trading partners, peace would become irresistible. Gustave de Molinari argued for international justice and police forces to enforce the rights of nations as domestic courts enforce individual rights. And Frédéric Bastiat argued that free trade itself was the surest foundation for peace, as exchange aligns the interests of nations and makes war prohibitively costly.

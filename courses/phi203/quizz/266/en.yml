question: According to the analysis of economic mechanisms, what fundamental role do prices and profits serve in free exchange systems?
answer: They guide production by signalling where resources should flow, while ensuring that voluntary transactions are mutually satisfactory for all participants
wrong_answers:
  - They redistribute wealth from producers to consumers through market regulation
  - They establish government control over resource allocation and production decisions
  - They create artificial scarcity to maximize returns for dominant market players
explanation: |
  The text explicitly states that prices and profits "guide production" — they signal to producers where resources and effort should be directed. Alongside this guiding function, they ensure that every voluntary transaction is mutually satisfactory, since each party only exchanges when it benefits them. The wrong answers reflect interventionist or manipulative approaches that contradict the voluntary nature of free exchange: redistribution through regulation involves government interference, government control over allocation opposes market freedom, and artificial scarcity creation represents market manipulation rather than genuine voluntary exchange that benefits all parties involved.

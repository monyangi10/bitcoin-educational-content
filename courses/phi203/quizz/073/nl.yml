question: Welke belangrijke ontwikkeling maakte de accumulatie van overschotten en het ontstaan van commerciële uitwisselingen in menselijke samenlevingen mogelijk?
answer: De geboorte van de landbouw
wrong_answers:
  - De uitvinding van de stoommachine
  - De ontwikkeling van jachttechnieken
  - De ontdekking van nieuwe continenten
explanation: |
  Het ontstaan van de landbouw vormt een cruciaal keerpunt in de geschiedenis van de mensheid omdat het vreedzame productiemethoden introduceerde en samenlevingen voor het eerst in staat stelde om overschotten te verzamelen. Deze landbouwrevolutie creëerde de materiële voorwaarden die nodig waren voor commerciële uitwisselingen en contractuele relaties gebaseerd op wederzijdse overeenkomst in plaats van geweld. Terwijl de jacht uitgestrekte gebieden vereiste die onverenigbaar waren met privébezit, maakte de landbouw een stabieler en productiever landgebruik mogelijk, waardoor de basis werd gelegd voor de ontwikkeling van individuele vrijheid en eigendomsrechten.
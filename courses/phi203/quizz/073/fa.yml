question: چه تحول عمده‌ای امکان انباشت مازاد و ظهور مبادلات تجاری در جوامع انسانی را فراهم کرد؟
answer: تولد کشاورزی
wrong_answers:
  - اختراع موتور بخار
  - توسعه تکنیک‌های شکار
  - کشف قاره‌های جدید
explanation: |
  تولد کشاورزی نقطه عطف مهمی در تاریخ بشر است زیرا روش‌های تولید صلح‌آمیز را معرفی کرد و به جوامع این امکان را داد تا برای اولین بار کالاهای مازاد را انباشته کنند. این انقلاب کشاورزی شرایط مادی لازم برای مبادلات تجاری و روابط قراردادی مبتنی بر توافق متقابل به جای زور را ایجاد کرد. در حالی که شکار به قلمروهای وسیعی نیاز داشت که با مالکیت خصوصی ناسازگار بود، کشاورزی استفاده از زمین را به شکلی پایدارتر و پربارتر ممکن ساخت و پایه‌ای برای توسعه آزادی فردی و حقوق مالکیت فراهم کرد.
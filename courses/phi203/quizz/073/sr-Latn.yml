question: Koji je glavni razvoj omogućio akumulaciju viška i pojavu komercijalnih razmena u ljudskim društvima?
answer: Rađanje poljoprivrede
wrong_answers:
  - Pronalaženje parne mašine
  - Razvoj lovačkih tehnika
  - Otkrivanje novih kontinenata
explanation: |
  Rođenje poljoprivrede predstavlja ključnu prekretnicu u ljudskoj istoriji jer je uvelo mirne metode proizvodnje i omogućilo društvima da po prvi put akumuliraju višak dobara. Ova poljoprivredna revolucija stvorila je materijalne uslove neophodne za komercijalne razmene i ugovorne odnose zasnovane na međusobnom dogovoru, a ne na sili. Dok je lov zahtevao ogromne teritorije nespojive sa privatnom svojinom, poljoprivreda je omogućila stabilnije i produktivnije korišćenje zemljišta, postavljajući temelje za razvoj individualne slobode i prava svojine.
question: Какое важное событие привело к накоплению излишков и возникновению коммерческого обмена в человеческих обществах?
answer: Зарождение сельского хозяйства
wrong_answers:
  - Изобретение парового двигателя
  - Развитие техники охоты
  - Открытие новых континентов
explanation: |
  Зарождение сельского хозяйства стало важнейшим поворотным пунктом в истории человечества, поскольку оно внедрило мирные методы производства и впервые позволило обществу накапливать излишки товаров. Эта сельскохозяйственная революция создала материальные условия, необходимые для коммерческих обменов и договорных отношений, основанных на взаимном согласии, а не на силе. В то время как охота требовала огромных территорий, несовместимых с частной собственностью, сельское хозяйство позволило более стабильно и продуктивно использовать землю, заложив основу для развития индивидуальной свободы и прав собственности.
question: Jaký významný vývoj umožnil akumulaci přebytků a vznik obchodní směny v lidských společnostech?
answer: Zrod zemědělství
wrong_answers:
  - Vynález parního stroje
  - Vývoj loveckých technik
  - Objevení nových kontinentů
explanation: |
  Vznik zemědělství představuje zásadní zlom v dějinách lidstva, protože zavedlo mírové výrobní metody a poprvé umožnilo společnostem hromadit přebytečné zboží. Tato zemědělská revoluce vytvořila materiální podmínky nezbytné pro obchodní směnu a smluvní vztahy založené na vzájemné dohodě, nikoli na síle. Zatímco lov vyžadoval rozsáhlá území neslučitelná se soukromým vlastnictvím, zemědělství umožnilo stabilnější a produktivnější využívání půdy a položilo základ pro rozvoj individuální svobody a vlastnických práv.
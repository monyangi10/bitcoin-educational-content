question: Jakie główne zmiany umożliwiły akumulację nadwyżek i pojawienie się wymiany handlowej w społeczeństwach ludzkich?
answer: Narodziny rolnictwa
wrong_answers:
  - Wynalezienie silnika parowego
  - Rozwój technik łowieckich
  - Odkrycie nowych kontynentów
explanation: |
  Narodziny rolnictwa stanowią kluczowy punkt zwrotny w historii ludzkości, ponieważ wprowadziły pokojowe metody produkcji i po raz pierwszy umożliwiły społeczeństwom gromadzenie nadwyżek towarów. Ta rewolucja rolnicza stworzyła warunki materialne niezbędne do wymiany handlowej i stosunków umownych opartych na wzajemnym porozumieniu, a nie na sile. Podczas gdy łowiectwo wymagało rozległych terytoriów niezgodnych z własnością prywatną, rolnictwo pozwoliło na bardziej stabilne i produktywne użytkowanie gruntów, kładąc podwaliny pod rozwój indywidualnej wolności i praw własności.
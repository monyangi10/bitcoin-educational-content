question: ¿Qué acontecimiento importante permitió la acumulación de excedentes y la aparición de intercambios comerciales en las sociedades humanas?
answer: El nacimiento de la agricultura
wrong_answers:
  - La invención de la máquina de vapor
  - El desarrollo de las técnicas de caza
  - El descubrimiento de nuevos continentes
explanation: |
  El nacimiento de la agricultura representa un punto de inflexión crucial en la historia de la humanidad, ya que introdujo métodos de producción pacíficos y permitió a las sociedades acumular excedentes por primera vez. Esta revolución agrícola creó las condiciones materiales necesarias para los intercambios comerciales y las relaciones contractuales basadas en el acuerdo mutuo y no en la fuerza. Mientras que la caza requería vastos territorios incompatibles con la propiedad privada, la agricultura permitió un uso más estable y productivo de la tierra, sentando las bases para que se desarrollaran la libertad individual y los derechos de propiedad.
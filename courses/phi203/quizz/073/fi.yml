question: Minkä merkittävän kehityksen ansiosta ylijäämä kasaantui ja kaupallinen vaihto syntyi ihmisyhteisöissä?
answer: Maatalouden synty
wrong_answers:
  - Höyrykoneen keksiminen
  - Metsästystekniikoiden kehittäminen
  - Uusien maanosien löytäminen
explanation: |
  Maatalouden synty on ratkaiseva käännekohta ihmiskunnan historiassa, sillä se toi mukanaan rauhanomaiset tuotantomenetelmät ja mahdollisti ensimmäistä kertaa ylijäämätuotteiden kerryttämisen yhteiskunnissa. Maatalouden vallankumous loi aineelliset edellytykset kaupalliselle vaihdannalle ja sopimussuhteille, jotka perustuivat pikemminkin keskinäiseen sopimukseen kuin voimankäyttöön. Metsästys vaati laajoja alueita, jotka eivät sopineet yhteen yksityisomistuksen kanssa, mutta maanviljely mahdollisti vakaamman ja tuottavamman maankäytön, mikä loi perustan yksilönvapauden ja omistusoikeuden kehittymiselle.
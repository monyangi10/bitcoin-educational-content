question: Waarom zijn volgens de Franse liberale traditie individuele gewaarwordingen en percepties fundamenteel belangrijk voor sociale organisatie?
answer: Omdat sensaties individuele ervaringen zijn die niet gedeeld kunnen worden, zijn persoonlijke beslissingen beter geïnformeerd dan collectieve
wrong_answers:
  - Omdat individuele gewaarwordingen sociale harmonie creëren als ze goed gecoördineerd worden door collectieve besluitvorming
  - Omdat sensaties gemakkelijk kunnen worden overgedragen tussen mensen, waardoor een efficiënte collectieve planning mogelijk is
  - Omdat individuele percepties onbetrouwbaar zijn en gecorrigeerd moeten worden via groepsconsensus
explanation: |
  De tekst benadrukt dat gewaarwordingen fundamenteel individueel zijn - je kunt geen honger ervaren door een ander of zien door de ogen van iemand anders. Deze individualiteit betekent dat persoonlijke beslissingen gebaseerd op directe waarnemingen een superieure informatiekwaliteit hebben in vergelijking met collectieve beslissingen. Wanneer collectieve beslissingen verschillende individuele behoeften en percepties proberen samen te voegen, worden ze onvermijdelijk minder aangepast aan de werkelijke situatie van elke persoon, aangezien de behoeften van mensen verschillen in timing en intensiteit.
question: De acordo com a tradição liberal francesa, porque é que as sensações e percepções individuais são fundamentalmente importantes para a organização social?
answer: Porque as sensações são experiências individuais que não podem ser partilhadas, o que torna as decisões pessoais mais informadas do que as colectivas
wrong_answers:
  - Porque as sensações individuais criam harmonia social quando devidamente coordenadas através de decisões colectivas
  - Porque as sensações podem ser facilmente transmitidas entre as pessoas, permitindo um planeamento coletivo eficiente
  - Porque as percepções individuais não são fiáveis e devem ser corrigidas através do consenso do grupo
explanation: |
  O texto sublinha que as sensações são fundamentalmente individuais - não se pode sentir fome através de outra pessoa ou ver através dos olhos de outra pessoa. Esta individualidade significa que as decisões pessoais baseadas em percepções diretas têm uma qualidade de informação superior às decisões colectivas. Quando as decisões colectivas tentam agregar diferentes necessidades e percepções individuais, tornam-se inevitavelmente menos adaptadas à situação real de cada pessoa, uma vez que as necessidades das pessoas diferem em termos de tempo e intensidade.
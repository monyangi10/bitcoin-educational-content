question: Prema francuskoj liberalnoj tradiciji, zašto su individualne senzacije i percepcije fundamentalno važne za društvenu organizaciju?
answer: Zato što su senzacije individualna iskustva koja se ne mogu deliti, donošenje ličnih odluka je informisanije od kolektivnih.
wrong_answers:
  - Zato što individualne senzacije stvaraju društvenu harmoniju kada su pravilno koordinisane kroz kolektivno donošenje odluka
  - Zbog toga što se senzacije mogu lako prenositi između ljudi, omogućavajući efikasno kolektivno planiranje
  - Zato što su individualne percepcije nepouzdane i moraju se ispraviti kroz konsenzus grupe
explanation: |
  Tekst naglašava da su osećaji suštinski individualni - ne može se iskusiti glad kroz drugu osobu ili videti kroz tuđe oči. Ova individualnost znači da lične odluke zasnovane na direktnim percepcijama imaju superioran kvalitet informacija u poređenju sa kolektivnim odlukama. Kada kolektivne odluke pokušavaju da objedine različite individualne potrebe i percepcije, one neizbežno postaju manje prilagođene stvarnoj situaciji svake osobe, jer se potrebe ljudi razlikuju u vremenu i intenzitetu.
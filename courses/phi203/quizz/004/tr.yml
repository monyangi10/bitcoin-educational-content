question: Fransız liberal geleneğine göre, bireysel duyumlar ve algılar toplumsal örgütlenme için neden temel önemdedir?
answer: Duyumlar paylaşılamayan bireysel deneyimler olduğundan, kişisel kararları kolektif olanlardan daha bilinçli hale getirir
wrong_answers:
  - Çünkü bireysel duyumlar, kolektif karar alma yoluyla uygun şekilde koordine edildiğinde sosyal uyum yaratır
  - Çünkü duyumlar insanlar arasında kolayca iletilebilir, bu da verimli kolektif planlamaya olanak tanır
  - Çünkü bireysel algılar güvenilmezdir ve grup konsensüsü yoluyla düzeltilmesi gerekir
explanation: |
  Metin, duyumların temelde bireysel olduğunu vurgulamaktadır - bir kişi açlığı bir başkası aracılığıyla deneyimleyemez veya bir başkasının gözleriyle göremez. Bu bireysellik, doğrudan algılara dayanan kişisel kararların kolektif kararlara kıyasla daha üstün bilgi kalitesine sahip olduğu anlamına gelir. Kolektif kararlar farklı bireysel ihtiyaçları ve algıları bir araya getirmeye çalıştığında, insanların ihtiyaçları zamanlama ve yoğunluk açısından farklılık gösterdiğinden, kaçınılmaz olarak her bir kişinin gerçek durumuna daha az adapte olurlar.
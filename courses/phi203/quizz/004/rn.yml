question: Dushingiye ku mugenzo w’ubwigenge bw’Abafaransa, ni kuki inyiyumvo n’ukuntu umuntu abona ibintu ari ngirakamaro cane ku bijanye n’imitunganirize y’imibano?
answer: Kubera ko inyiyumvo ari ibintu umuntu wese abona bidashobora gusangira, bikaba bituma umuntu afata ingingo zishingiye ku makuru kuruta izo abantu bose bafata .
wrong_answers:
  - Kubera ko inyiyumvo z’umuntu ku giti ciwe zituma haba uguhuza abantu iyo zihujwe neza biciye mu gufata ingingo rusangi .
  - Kubera ko inyiyumvo zishobora gukwiragizwa bitagoranye hagati y’abantu, bikaba bituma habaho umugambi mwiza wo gukorana .
  - Kubera ko ivyiyumviro vy’umuntu ku giti ciwe bitari vyo kandi bitegerezwa gukosorwa biciye mu kwumvikana kw’imigwi .
explanation: |
  Ico canditswe gishimika ku vy’uko ivyiyumviro ari ivy’umuntu ku giti ciwe - umuntu ntashobora kuronka inzara biciye ku wundi muntu canke ngo abone biciye ku maso y’uwundi muntu. Ukwo kuntu umuntu afata ku giti ciwe bisigura ko ingingo zifatwa n’umuntu ku giti ciwe zishingiye ku vyo abona ataco akora zifise uburyo bw’amakuru burengeye ubw’ingingo zifatwa n’abantu bose. Iyo ingingo z’abantu bose zigerageje gukoranya ivyo umuntu akeneye n’ingene abona ibintu bitandukanye, nta nkeka ko zidashobora guhura n’ingene umuntu wese ameze vy’ukuri, kuko ivyo abantu bakeneye bitandukanye mu gihe no mu bukomezi.
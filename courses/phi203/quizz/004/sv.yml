question: Enligt den franska liberala traditionen, varför är individuella förnimmelser och uppfattningar fundamentalt viktiga för den sociala organisationen?
answer: Eftersom sinnesintryck är individuella upplevelser som inte kan delas, blir personliga beslut mer välgrundade än kollektiva
wrong_answers:
  - Eftersom individuella förnimmelser skapar social harmoni när de samordnas på rätt sätt genom kollektivt beslutsfattande
  - Eftersom förnimmelser lätt kan överföras mellan människor, vilket möjliggör effektiv kollektiv planering
  - Eftersom individuella uppfattningar är opålitliga och måste korrigeras genom gruppkonsensus
explanation: |
  Texten understryker att sinnesintryck i grunden är individuella - man kan inte uppleva hunger genom en annan person eller se genom någon annans ögon. Denna individualitet innebär att personliga beslut som baseras på direkta uppfattningar har överlägsen informationskvalitet jämfört med kollektiva beslut. När kollektiva beslut försöker sammanfatta olika individuella behov och uppfattningar blir de oundvikligen mindre anpassade till varje persons verkliga situation, eftersom människors behov skiljer sig åt i fråga om tidpunkt och intensitet.
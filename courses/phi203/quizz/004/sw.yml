question: Kulingana na utamaduni wa kiliberali wa Ufaransa, kwa nini hisia na mitazamo ya mtu binafsi ni muhimu sana kwa ajili ya upangaji wa kijamii?
answer: Kwa sababu hisia ni uzoefu wa mtu binafsi ambao hauwezi kushirikiwa, kufanya maamuzi ya kibinafsi yenye taarifa zaidi kuliko yale ya pamoja
wrong_answers:
  - Kwa sababu hisia za mtu binafsi huunda maelewano ya kijamii zinaporatibiwa ipasavyo kupitia kufanya maamuzi ya pamoja
  - Kwa sababu hisia zinaweza kusambazwa kwa urahisi kati ya watu, na hivyo kuruhusu mipango ya pamoja yenye ufanisi
  - Kwa sababu mitazamo ya mtu binafsi si ya kutegemewa na lazima irekebishwe kupitia makubaliano ya kikundi
explanation: |
  Maandishi yanasisitiza kwamba hisia kimsingi ni za mtu binafsi - mtu hawezi kupata njaa kupitia mtu mwingine au kuona kupitia macho ya mtu mwingine. Utu huu unamaanisha kwamba maamuzi ya kibinafsi yanayotegemea mitazamo ya moja kwa moja yana ubora wa juu wa taarifa ikilinganishwa na maamuzi ya pamoja. Maamuzi ya pamoja yanapojaribu kuunganisha mahitaji na mitazamo tofauti ya mtu binafsi, bila shaka hayabadiliki kulingana na hali halisi ya kila mtu, kwani mahitaji ya watu hutofautiana katika muda na nguvu.
question: 根據法國自由主義傳統，為什麼個人的感覺和知覺對於社會組織具有根本性的重要性？
answer: 因為感覺是無法分享的個人經驗，使得個人決策比集體決策更有根據
wrong_answers:
  - 因為透過集體決策的適當協調，個人的感覺會創造社會和諧
  - 因為感覺很容易在人與人之間傳遞，讓集體規劃更有效率
  - 因為個人的看法不可靠，必須透過團體共識來矯正
explanation: |
  文中強調，感覺從根本來說是個人的 - 一個人不可能透過別人來體驗飢餓，也不可能透過別人的眼睛來看東西。這種個體性意味著，與集體決策相比，基於直接感知的個人決策具有更高的資訊品質。當集體決策嘗試彙總不同的個人需求和感知時，由於人們的需求在時間和強度上有所不同，因此這些決策不可避免地會變得不太適合每個人的實際情況。
question: Miks on prantsuse liberaalse traditsiooni kohaselt individuaalsed aistingud ja tajud sotsiaalse korralduse jaoks põhimõtteliselt olulised?
answer: Kuna aistingud on individuaalsed kogemused, mida ei saa jagada, siis on isiklikud otsused teadlikumad kui kollektiivsed
wrong_answers:
  - Kuna individuaalsed tunded loovad sotsiaalset harmooniat, kui neid õigesti koordineeritakse kollektiivse otsustamise kaudu
  - Kuna aistingud on inimeste vahel kergesti ülekantavad, mis võimaldab tõhusat ühist planeerimist
  - Kuna individuaalsed arusaamad on ebausaldusväärsed ja neid tuleb korrigeerida grupi konsensuse kaudu
explanation: |
  Tekstis rõhutatakse, et tunded on põhimõtteliselt individuaalsed - keegi ei saa kogeda nälga teise inimese kaudu ega näha kellegi teise silmadega. See individuaalsus tähendab, et otsestel tajudel põhinevatel isiklikel otsustel on kollektiivsete otsustega võrreldes parem infokvaliteet. Kui kollektiivsed otsused püüavad koondada erinevaid individuaalseid vajadusi ja tajusid, muutuvad need paratamatult vähem kohandatud iga inimese tegelikule olukorrale, sest inimeste vajadused erinevad ajastuselt ja intensiivsuselt.
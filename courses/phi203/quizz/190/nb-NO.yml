question: Hvilken grunnleggende motsetning finnes det i dagens politiske systemer når det gjelder individuell kapasitet, ifølge det demokratiske formynderparadokset?
answer: Borgerne anses som ute av stand til å ta personlige beslutninger, men i stand til å ta kollektive politiske beslutninger for alle
wrong_answers:
  - Borgerne anses å være i stand til å ta økonomiske valg, men ute av stand til å forstå konstitusjonelle prinsipper
  - Enkeltpersoner kan ta umiddelbare beslutninger på en effektiv måte, men sliter med langsiktig politisk planlegging og fremsyn
  - Folk har kompetanse i lokal styring, men mangler kompetanse til å delta i demokratiet på nasjonalt nivå
explanation: |
  Det sentrale paradokset som identifiseres i teksten, viser at demokratiske systemer samtidig har to motstridende oppfatninger om borgernes kapasitet. På den ene siden forutsetter omfattende reguleringer og offentlig tilsyn at individer ikke kan styre seg selv og trenger konstant veiledning for å forhindre dårlige valg. På den andre siden forutsetter demokratiske mekanismer at de samme individene er fullt ut i stand til å ta komplekse kollektive beslutninger om styring, sammenligne programmer og evaluere politiske konsekvenser. Denne motsetningen er spesielt slående fordi individuelle økonomiske valg er enklere og mer umiddelbare enn komplekse politiske beslutninger som påvirker hele samfunn.
question: 민주적 후견의 역설에 따르면, 개인의 역량과 관련하여 현대 정치 시스템에는 어떤 근본적인 모순이 존재하나요?
answer: 시민은 개인적인 결정은 할 수 없지만 모두를 위한 집단적인 정치적 결정은 할 수 있는 것으로 간주됩니다
wrong_answers:
  - 시민은 경제적 선택은 가능하지만 헌법 원칙을 이해할 수 없는 것으로 간주됩니다
  - 개인은 즉각적인 의사 결정은 효과적으로 내릴 수 있지만 장기적인 정치적 계획과 선견지명에는 어려움을 겪습니다
  - 지역 거버넌스에서는 역량을 발휘하지만 국가 차원의 민주적 참여를 위한 전문성이 부족한 사람들
explanation: |
  본문의 핵심 역설은 민주주의 시스템이 시민 역량에 대한 두 가지 모순된 믿음을 동시에 가지고 있음을 보여줍니다. 한편으로, 광범위한 규제와 공공 감독은 개인이 스스로를 통제할 수 없으며 잘못된 선택을 방지하기 위해 지속적인 지시가 필요하다고 가정합니다. 반면에 민주적 메커니즘은 개인이 거버넌스에 대한 복잡한 집단적 결정을 내리고, 프로그램을 비교하고, 정치적 결과를 평가할 수 있는 능력을 완벽하게 갖추고 있다고 전제합니다. 개인의 경제적 선택은 사회 전체에 영향을 미치는 복잡한 정치적 결정보다 더 간단하고 즉각적이기 때문에 이러한 모순은 특히 두드러집니다.
question: 根據民主監護悖論，當代政治體系在個人能力方面存在什麼基本矛盾？
answer: 公民被認為沒有能力做出個人決定，但有能力為所有人做出集體政治決定
wrong_answers:
  - 公民被認為有能力做出經濟選擇，但無法理解憲法原則
  - 個人可以有效地做出即時決策，但在長期政治規劃和遠見方面卻舉步維艱
  - 人們表現出地方治理的能力，但缺乏參與國家級民主的專業知識
explanation: |
  文中指出的核心悖論揭示了民主制度同時對公民能力持有兩種相互矛盾的信念。一方面，廣泛的法規和公共監督假定個人無法自我管理，需要不斷的指導來防止錯誤的選擇。另一方面，民主機制預設這些個人完全有能力就治理、比較計畫和評估政治後果做出複雜的集體決策。這個矛盾特別明顯，因為個人的經濟選擇比影響整個社會的複雜政治決策更簡單、更直接。
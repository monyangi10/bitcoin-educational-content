question: 根据民主监护悖论，当代政治制度在个人能力方面存在什么基本矛盾？
answer: 公民被认为没有能力做出个人决定，但有能力为所有人做出集体政治决定
wrong_answers:
  - 公民被认为有能力做出经济选择，但无法理解宪法原则
  - 个人可以有效地做出即时决策，但在长期政治规划和远见方面却举步维艰
  - 人们在地方治理方面表现出能力，但缺乏参与国家级民主的专业知识
explanation: |
  文中指出的核心悖论揭示了民主制度对公民能力同时持有两种相互矛盾的信念。一方面，广泛的法规和公共监督假定个人无法自我管理，需要不断的指导来防止错误的选择。另一方面，民主机制又假定这些个人完全有能力就治理问题做出复杂的集体决策、比较方案并评估政治后果。这一矛盾尤为突出，因为与影响整个社会的复杂政治决策相比，个人的经济选择更简单、更直接。
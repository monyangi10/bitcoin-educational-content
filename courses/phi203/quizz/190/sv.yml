question: Enligt den demokratiska förmyndarparadoxen, vilken grundläggande motsägelse finns i dagens politiska system när det gäller individuell kapacitet?
answer: Medborgare anses oförmögna att fatta personliga beslut men kapabla att fatta kollektiva politiska beslut för alla
wrong_answers:
  - Medborgarna anses kunna göra ekonomiska val men inte förstå konstitutionella principer
  - Individer kan fatta omedelbara beslut på ett effektivt sätt men har svårt med långsiktig politisk planering och framförhållning
  - Människor visar kompetens inom lokal förvaltning men saknar expertis för demokratiskt deltagande på nationell nivå
explanation: |
  Den centrala paradox som identifieras i texten visar att demokratiska system samtidigt har två motsägelsefulla uppfattningar om medborgarnas kapacitet. Å ena sidan förutsätter omfattande regleringar och offentlig tillsyn att individer inte kan styra sig själva och behöver ständig vägledning för att förhindra dåliga val. Å andra sidan förutsätter de demokratiska mekanismerna att samma individer är fullt kapabla att fatta komplexa kollektiva beslut om styrning, jämföra program och utvärdera politiska konsekvenser. Denna motsägelse är särskilt slående eftersom individuella ekonomiska val är enklare och mer omedelbara än komplexa politiska beslut som påverkar hela samhällen.
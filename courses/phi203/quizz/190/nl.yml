question: Welke fundamentele tegenstrijdigheid bestaat er volgens de democratische voogdijparadox in hedendaagse politieke systemen met betrekking tot individuele capaciteiten?
answer: Burgers worden niet in staat geacht persoonlijke beslissingen te nemen, maar wel collectieve politieke beslissingen voor iedereen
wrong_answers:
  - Burgers worden in staat geacht economische keuzes te maken, maar niet in staat geacht grondwettelijke principes te begrijpen
  - Individuen kunnen effectief onmiddellijke beslissingen nemen, maar hebben moeite met politieke planning en vooruitziendheid op de lange termijn
  - Mensen tonen competentie in lokaal bestuur, maar missen de expertise voor democratische participatie op nationaal niveau
explanation: |
  De kernparadox die in de tekst wordt geïdentificeerd onthult dat democratische systemen tegelijkertijd twee tegenstrijdige overtuigingen hebben over de capaciteit van burgers. Aan de ene kant gaan uitgebreide regelgeving en overheidstoezicht ervan uit dat individuen zichzelf niet kunnen besturen en constante sturing nodig hebben om slechte keuzes te voorkomen. Aan de andere kant veronderstellen democratische mechanismen dat diezelfde individuen perfect in staat zijn om complexe collectieve beslissingen te nemen over bestuur, programma's te vergelijken en politieke gevolgen te evalueren. Deze tegenstrijdigheid is vooral opvallend omdat individuele economische keuzes eenvoudiger en directer zijn dan complexe politieke beslissingen die hele samenlevingen beïnvloeden.
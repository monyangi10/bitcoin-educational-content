question: Milline põhimõtteline vastuolu eksisteerib tänapäeva poliitilistes süsteemides vastavalt demokraatliku eestkoste paradoksile seoses individuaalse võimekusega?
answer: Kodanikke peetakse võimetuks tegema isiklikke otsuseid, kuid võimeliseks tegema kollektiivseid poliitilisi otsuseid kõigi jaoks
wrong_answers:
  - Kodanikke peetakse võimeliseks majanduslikeks valikuteks, kuid võimetuks mõistma põhiseaduslikke põhimõtteid
  - Üksikisikud suudavad teha koheseid otsuseid tõhusalt, kuid neil on raskusi pikaajalise poliitilise planeerimise ja ettenägemisega
  - Inimesed näitavad üles pädevust kohalikus juhtimises, kuid neil puuduvad teadmised riikliku tasandi demokraatlikuks osalemiseks
explanation: |
  Tekstis tuvastatud põhiparadoks näitab, et demokraatlikes süsteemides on samaaegselt kaks vastandlikku uskumust kodanike võimekuse kohta. Ühest küljest eeldavad ulatuslikud eeskirjad ja avalik järelevalve, et üksikisikud ei suuda end ise valitseda ja vajavad pidevat suunamist, et vältida halbu valikuid. Teisest küljest eeldavad demokraatlikud mehhanismid, et need samad inimesed on täiesti võimelised tegema keerulisi kollektiivseid otsuseid valitsemise kohta, võrdlema programme ja hindama poliitilisi tagajärgi. See vastuolu on eriti silmatorkav, sest individuaalsed majanduslikud valikud on lihtsamad ja vahetumad kui keerulised poliitilised otsused, mis mõjutavad terveid ühiskondi.
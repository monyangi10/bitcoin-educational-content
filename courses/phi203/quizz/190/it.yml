question: Secondo il paradosso della tutela democratica, quale contraddizione fondamentale esiste nei sistemi politici contemporanei riguardo alle capacità individuali?
answer: I cittadini sono considerati incapaci di prendere decisioni personali, ma capaci di prendere decisioni politiche collettive per tutti
wrong_answers:
  - I cittadini sono considerati capaci di scelte economiche ma incapaci di comprendere i principi costituzionali
  - Gli individui sono in grado di prendere decisioni immediate in modo efficace, ma hanno difficoltà a pianificare e prevedere politiche a lungo termine
  - Le persone dimostrano di essere competenti nella governance locale, ma non hanno le competenze necessarie per la partecipazione democratica a livello nazionale
explanation: |
  Il paradosso centrale identificato nel testo rivela che i sistemi democratici hanno contemporaneamente due convinzioni contraddittorie sulla capacità dei cittadini. Da un lato, le ampie regolamentazioni e la supervisione pubblica presuppongono che gli individui non siano in grado di governarsi da soli e che abbiano bisogno di una guida costante per evitare scelte sbagliate. Dall'altro lato, i meccanismi democratici presuppongono che questi stessi individui siano perfettamente in grado di prendere decisioni collettive complesse sulla governance, di confrontare i programmi e di valutare le conseguenze politiche. Questa contraddizione è particolarmente evidente perché le scelte economiche individuali sono più semplici e immediate delle complesse decisioni politiche che riguardano intere società.
question: Kulingana na kitendawili cha ulezi wa kidemokrasia, ni utata gani wa msingi uliopo katika mifumo ya kisiasa ya kisasa kuhusu uwezo wa mtu binafsi?
answer: Raia wanaonekana kutokuwa na uwezo wa kufanya maamuzi binafsi lakini wana uwezo wa kufanya maamuzi ya kisiasa kwa pamoja kwa kila mtu
wrong_answers:
  - Raia wanachukuliwa kuwa na uwezo wa kufanya maamuzi ya kiuchumi lakini hawawezi kuelewa kanuni za kikatiba
  - Watu binafsi wanaweza kufanya maamuzi ya haraka kwa ufanisi lakini wanapambana na mipango ya kisiasa ya muda mrefu na mtazamo wa mbele.
  - Watu huonyesha uwezo katika utawala wa mitaa lakini hawana utaalamu wa ushiriki wa kidemokrasia katika ngazi ya kitaifa
explanation: |
  Kitendawili kikuu kilichotambuliwa katika maandishi kinaonyesha kwamba mifumo ya kidemokrasia kwa wakati mmoja ina imani mbili zinazokinzana kuhusu uwezo wa raia. Kwa upande mmoja, kanuni pana na usimamizi wa umma hudhani watu hawawezi kujitawala wenyewe na wanahitaji mwelekeo wa mara kwa mara ili kuzuia chaguzi mbaya. Kwa upande mwingine, mifumo ya kidemokrasia inadai kwamba watu hawa hao wana uwezo kamili wa kufanya maamuzi magumu ya pamoja kuhusu utawala, kulinganisha programu, na kutathmini matokeo ya kisiasa. Mkanganyiko huu unashangaza hasa kwa sababu chaguzi za kiuchumi za mtu binafsi ni rahisi na za haraka zaidi kuliko maamuzi magumu ya kisiasa yanayoathiri jamii nzima.
question: Demokratik vesayet paradoksuna göre, çağdaş siyasi sistemlerde bireysel kapasiteye ilişkin hangi temel çelişki vardır?
answer: Vatandaşların kişisel karar verme yetisine sahip olmadıkları ancak herkes için kolektif siyasi kararlar alabilecekleri kabul edilir
wrong_answers:
  - Vatandaşların ekonomik tercihler yapabileceği ancak anayasal ilkeleri anlamaktan aciz olduğu düşünülmektedir
  - Bireyler anlık kararları etkili bir şekilde alabilirler ancak uzun vadeli siyasi planlama ve öngörüde zorlanırlar
  - İnsanlar yerel yönetişim konusunda yetkinlik gösterirken ulusal düzeyde demokratik katılım için gerekli uzmanlığa sahip değildir
explanation: |
  Metinde tanımlanan temel paradoks, demokratik sistemlerin aynı anda vatandaş kapasitesi hakkında iki çelişkili inanca sahip olduğunu ortaya koymaktadır. Bir yandan, kapsamlı düzenlemeler ve kamu gözetimi, bireylerin kendi kendilerini yönetemeyeceklerini ve kötü seçimleri önlemek için sürekli yönlendirmeye ihtiyaç duyduklarını varsayar. Öte yandan, demokratik mekanizmalar aynı bireylerin yönetişimle ilgili karmaşık kolektif kararlar alma, programları karşılaştırma ve siyasi sonuçları değerlendirme konusunda mükemmel bir kapasiteye sahip olduğunu varsayar. Bu çelişki özellikle çarpıcıdır çünkü bireysel ekonomik tercihler, tüm toplumları etkileyen karmaşık siyasi kararlardan daha basit ve daha anlıktır.
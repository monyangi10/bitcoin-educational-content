question: 民主的指導のパラドックスによれば、現代の政治システムには、個人の能力に関してどのような根本的矛盾が存在するのか？
answer: 市民は個人的な決定はできないが、みんなのために集団的な政治的決定はできるとみなされる
wrong_answers:
  - 市民は経済的な選択はできるが、憲法の原則を理解することはできないと考えられている。
  - 個人は即座に効果的な決断を下すことができるが、長期的な政治計画や先見性には苦労する。
  - 人々は地方自治の能力は示すが、全国レベルの民主的参加のための専門知識が不足している。
explanation: |
  本文で明らかにされた核心的なパラドックスは、民主主義制度が、市民の能力に関する2つの矛盾した信念を同時に保持していることを明らかにしている。一方では、広範な規制と公的監視は、個人が自らを統治することはできず、誤った選択を防ぐために絶え間ない指示を必要とすることを前提としている。他方で、民主主義の仕組みは、同じ個人がガバナンスに関する複雑な集団的決定を下し、プログラムを比較し、政治的結果を評価する能力を完全に備えていることを前提としている。個人の経済的選択は、社会全体に影響を及ぼす複雑な政治的決定よりも単純で即時性が高いため、この矛盾は特に顕著である。
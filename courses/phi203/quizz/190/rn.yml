question: Dushingiye ku nsiguro y’uburenganzira bwa demokarasi, ni ikihe kivuguruzanya c’ishimikiro kiri mu mice ya politike yo muri iki gihe ku bijanye n’ubushobozi bw’umuntu ku giti ciwe?
answer: Abanyagihugu babonwa ko badashobora gufata ingingo zabo bwite ariko bagashobora gufata ingingo za politike rusangi ku muntu wese .
wrong_answers:
  - Abanyagihugu babonwa ko bashobora guhitamwo mu vy'ubutunzi ariko badashobora gutahura ingingo ngenderwako z'itegeko nshinga .
  - Abantu ku giti cabo barashobora gufata ingingo zihuse mu buryo bubereye ariko bagahangana n’imigambi y’igihe kirekire ya politike be n’ukubona imbere y’igihe .
  - Abantu berekana ubushobozi mu butegetsi bw'intara ariko ntibagira ubuhinga bwo kugira uruhara muri demokarasi ku rwego rw'igihugu
explanation: |
  Ico kintu nyamukuru giteye ubwoba kigaragazwa muri ico canditswe kirerekana ko uburyo bwa demokarasi bufise icarimwe ivyiyumviro bibiri bivuguruzanya ku bijanye n’ubushobozi bw’abanyagihugu. Ku ruhande rumwe, amategeko menshi be n’ukugenzura kwa bose vyiyumvira ko abantu badashobora kwitegeka kandi ko bakeneye ubuyobozi buhoraho kugira ngo ntihagire amahitamwo mabi. Ku rundi ruhande, uburyo bwa demokarasi buvuga ko abo bantu nyene bashobora gufata ingingo zikomeye rusangi zijanye n’ubutegetsi, kugereranya porogarama, no gusuzuma ingaruka za politike. Ivyo bivuguruzanya biratangaje canecane kubera ko amahitamwo y’ubutunzi y’umuntu ku giti ciwe yoroshe kandi ahita afata kuruta ingingo za politike zigoye zigira ico zikoze ku mibano yose.
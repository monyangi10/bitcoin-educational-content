question: Kulingana na nadharia ya uchumi huria, ni tatizo gani la msingi ambalo matumizi ya nakisi husababisha katika jamii za kidemokrasia?
answer: Inaruhusu vizazi vya sasa kufurahia manufaa huku ikihamisha gharama kwa vizazi vijavyo ambavyo haviwezi kushiriki katika maamuzi ya kidemokrasia ya sasa.
wrong_answers:
  - Inasababisha mfumuko wa bei kupita kiasi ambao hupunguza mara moja uwezo wa ununuzi wa walipa kodi wa sasa na kudhoofisha uchumi.
  - Inaweka nguvu nyingi za kiuchumi mikononi mwa wadai matajiri ambao wanaweza kushawishi maamuzi ya sera za serikali.
  - Inapunguza ufanisi wa serikali kwa kuunda ushindani wa urasimu kati ya idara tofauti za matumizi kwa rasilimali chache
explanation: |
  Sura hiyo inaelezea kwamba matumizi ya nakisi huvunja uhusiano wa asili kati ya starehe na uwajibikaji kwa kuwaruhusu raia wa sasa kunufaika na huduma za serikali huku wakihamisha gharama kisheria kwa vizazi vijavyo. Hii inaunda utata wa msingi wa kidemokrasia kwa sababu raia hao wa baadaye ambao watachukua mzigo wa kifedha hawawezi kushiriki katika maamuzi ya kisiasa ya leo ambayo husababisha deni. Hii inakiuka kanuni ya 'hakuna kodi bila uwakilishi' kwa kuwa vizazi vijavyo hutozwa kodi kwa ufanisi bila kuwa na sauti katika mchakato wa kufanya maamuzi.
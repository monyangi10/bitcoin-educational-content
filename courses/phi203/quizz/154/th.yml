question: ตามทฤษฎีเศรษฐศาสตร์เสรีนิยม ปัญหาพื้นฐานที่การใช้จ่ายเกินดุลสร้างขึ้นในสังคมประชาธิปไตยคืออะไร?
answer: มันทำให้คนรุ่นปัจจุบันได้รับประโยชน์ในขณะที่โอนค่าใช้จ่ายไปยังคนรุ่นอนาคตที่ไม่สามารถมีส่วนร่วมในการตัดสินใจในระบอบประชาธิปไตยในปัจจุบันได้
wrong_answers:
  - มันสร้างภาวะเงินเฟ้อที่มากเกินไปซึ่งลดอำนาจการซื้อของผู้เสียภาษีในปัจจุบันทันทีและทำให้เศรษฐกิจไม่มั่นคง
  - มันมุ่งเน้นอำนาจทางเศรษฐกิจมากเกินไปในมือของเจ้าหนี้ที่มั่งคั่งซึ่งสามารถมีอิทธิพลต่อการตัดสินใจนโยบายของรัฐบาล
  - มันลดประสิทธิภาพของรัฐบาลโดยการสร้างการแข่งขันทางราชการระหว่างแผนกการใช้จ่ายต่าง ๆ สำหรับทรัพยากรที่จำกัด
explanation: |
  บทนี้อธิบายว่าการใช้จ่ายเกินดุลทำลายความเชื่อมโยงตามธรรมชาติระหว่างความเพลิดเพลินและความรับผิดชอบโดยอนุญาตให้พลเมืองปัจจุบันได้รับประโยชน์จากบริการของรัฐบาลในขณะที่โอนค่าใช้จ่ายไปยังคนรุ่นอนาคตอย่างถูกกฎหมาย สิ่งนี้สร้างความขัดแย้งพื้นฐานในระบอบประชาธิปไตยเพราะพลเมืองในอนาคตที่ต้องแบกรับภาระทางการเงินไม่สามารถมีส่วนร่วมในการตัดสินใจทางการเมืองในวันนี้ที่สร้างหนี้สินขึ้นมาได้ สิ่งนี้ละเมิดหลักการ 'ไม่มีการเก็บภาษีโดยไม่มีตัวแทน' เนื่องจากคนรุ่นอนาคตถูกเก็บภาษีโดยไม่มีเสียงในการตัดสินใจ
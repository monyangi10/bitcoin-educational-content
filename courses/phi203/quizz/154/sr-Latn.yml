question: Prema liberalnoj ekonomskoj teoriji, koji osnovni problem deficitna potrošnja stvara u demokratskim društvima?
answer: Omogućava sadašnjim generacijama da uživaju u pogodnostima dok prenose troškove na buduće generacije koje ne mogu učestvovati u trenutnim demokratskim odlukama.
wrong_answers:
  - Stvara prekomernu inflaciju koja odmah smanjuje kupovnu moć trenutnih poreskih obveznika i destabilizuje ekonomiju
  - Koncentriše previše ekonomske moći u rukama bogatih poverilaca koji zatim mogu uticati na odluke vladine politike.
  - Smanjuje efikasnost vlade stvaranjem birokratske konkurencije između različitih odeljenja za trošenje za ograničene resurse
explanation: |
  Poglavlje objašnjava da deficitna potrošnja prekida prirodnu vezu između uživanja i odgovornosti tako što omogućava sadašnjim građanima da imaju koristi od vladinih usluga dok zakonski prenose troškove na buduće generacije. Ovo stvara fundamentalnu demokratsku kontradikciju jer budući građani koji će snositi finansijski teret ne mogu učestvovati u današnjim političkim odlukama koje stvaraju dug. Ovo krši princip 'nema oporezivanja bez zastupljenosti' jer su buduće generacije efektivno oporezovane bez prava glasa u procesu donošenja odluka.
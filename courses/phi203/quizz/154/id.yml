question: Menurut teori ekonomi liberal, masalah mendasar apa yang ditimbulkan oleh pengeluaran defisit dalam masyarakat demokratis?
answer: Hal ini memungkinkan generasi saat ini untuk menikmati manfaat sambil mengalihkan biaya ke generasi mendatang yang tidak dapat berpartisipasi dalam keputusan demokratis saat ini
wrong_answers:
  - Hal ini menciptakan inflasi yang berlebihan yang segera mengurangi daya beli pembayar pajak saat ini dan mengacaukan perekonomian
  - Hal ini memusatkan terlalu banyak kekuatan ekonomi di tangan kreditor kaya yang kemudian dapat mempengaruhi keputusan kebijakan pemerintah
  - Ini mengurangi efisiensi pemerintah dengan menciptakan persaingan birokrasi antara departemen pengeluaran yang berbeda untuk sumber daya yang terbatas
explanation: |
  Bab ini menjelaskan bahwa pengeluaran defisit memutus hubungan alamiah antara kenikmatan dan tanggung jawab dengan membiarkan warga negara saat ini mendapatkan manfaat dari layanan pemerintah sementara secara hukum mengalihkan biayanya kepada generasi mendatang. Hal ini menciptakan kontradiksi demokrasi yang mendasar karena warga negara di masa depan yang akan menanggung beban keuangan tidak dapat berpartisipasi dalam keputusan politik saat ini yang menciptakan utang. Hal ini melanggar prinsip 'tidak ada pajak tanpa perwakilan' karena generasi mendatang secara efektif dibebani pajak tanpa memiliki suara dalam proses pengambilan keputusan.
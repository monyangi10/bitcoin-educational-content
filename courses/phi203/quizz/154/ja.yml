question: 自由主義経済理論によれば、赤字支出は民主主義社会においてどのような根本的問題を引き起こすのか？
answer: 現在の世代が利益を享受する一方で、現在の民主的な決定に参加できない将来の世代にコストを移転することを可能にする。
wrong_answers:
  - 過剰なインフレを引き起こし、現在の納税者の購買力を即座に低下させ、経済を不安定にする。
  - 政府の政策決定に影響を与えることができる裕福な債権者に、経済力が集中しすぎている。
  - 限られた資源をめぐって異なる支出部門間で官僚主義的な競争を引き起こすことで、政府の効率を低下させる。
explanation: |
  この章では、赤字支出は、現在の市民が政府サービスの恩恵を受ける一方で、その費用を将来の世代に合法的に移転することで、享受と責任の間の自然なつながりを断ち切るものだと説明する。財政負担を負うことになる将来の市民は、債務を生み出す今日の政治的決定に参加できないため、これは根本的な民主主義の矛盾を生む。これは「代表なくして課税なし」という原則に違反する。なぜなら、将来の世代は意思決定プロセスにおいて発言することなく、事実上課税されるからだ。
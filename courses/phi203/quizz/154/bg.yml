question: Според либералната икономическа теория какъв основен проблем създава дефицитът в демократичните общества?
answer: Тя позволява на настоящите поколения да се възползват от ползите, като прехвърля разходите върху бъдещите поколения, които не могат да участват в настоящите демократични решения
wrong_answers:
  - Тя води до прекомерна инфлация, която незабавно намалява покупателната способност на настоящите данъкоплатци и дестабилизира икономиката
  - Той концентрира твърде много икономическа власт в ръцете на богати кредитори, които могат да влияят върху политическите решения на правителството
  - Тя намалява ефективността на правителството, като създава бюрократична конкуренция между различните разходни отдели за ограничени ресурси
explanation: |
  В тази глава се обяснява, че дефицитните разходи нарушават естествената връзка между удоволствието и отговорността, като позволяват на настоящите граждани да се възползват от услугите на правителството, а разходите законно се прехвърлят върху бъдещите поколения. Това създава фундаментално демократично противоречие, тъй като бъдещите граждани, които ще понесат финансовата тежест, не могат да участват в днешните политически решения, които създават дълга. Това е нарушение на принципа "няма данъчно облагане без представителство", тъй като бъдещите поколения на практика се облагат с данъци, без да имат право на глас в процеса на вземане на решения.
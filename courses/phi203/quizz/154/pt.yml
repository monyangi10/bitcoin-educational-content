question: De acordo com a teoria económica liberal, que problema fundamental cria o défice orçamental nas sociedades democráticas?
answer: Permite que as gerações actuais usufruam dos benefícios e transfere os custos para as gerações futuras, que não podem participar nas decisões democráticas actuais
wrong_answers:
  - Cria uma inflação excessiva que reduz imediatamente o poder de compra dos actuais contribuintes e desestabiliza a economia
  - Concentra demasiado poder económico nas mãos de credores ricos que podem influenciar as decisões políticas do governo
  - Reduz a eficiência do governo ao criar uma competição burocrática entre diferentes departamentos de despesas por recursos limitados
explanation: |
  O capítulo explica que as despesas do défice quebram a ligação natural entre usufruto e responsabilidade, permitindo que os cidadãos actuais beneficiem dos serviços públicos e transferindo legalmente os custos para as gerações futuras. Isto cria uma contradição democrática fundamental, porque os futuros cidadãos que suportarão os encargos financeiros não podem participar nas decisões políticas actuais que criam a dívida. Isto viola o princípio de "não tributação sem representação", uma vez que as gerações futuras são efetivamente tributadas sem terem voz no processo de tomada de decisões.
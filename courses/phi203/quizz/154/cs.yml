question: Jaký zásadní problém podle liberální ekonomické teorie způsobují deficitní výdaje v demokratických společnostech?
answer: Umožňuje současným generacím využívat výhod, zatímco náklady přenáší na budoucí generace, které se nemohou podílet na současných demokratických rozhodnutích
wrong_answers:
  - Vytváří nadměrnou inflaci, která okamžitě snižuje kupní sílu současných daňových poplatníků a destabilizuje ekonomiku
  - Soustřeďuje příliš velkou ekonomickou moc v rukou bohatých věřitelů, kteří pak mohou ovlivňovat politická rozhodnutí vlády
  - Snižuje efektivitu veřejné správy tím, že vytváří byrokratickou soutěž mezi různými výdajovými odděleními o omezené zdroje
explanation: |
  Kapitola vysvětluje, že deficitní výdaje narušují přirozenou vazbu mezi požitkem a odpovědností tím, že umožňují současným občanům využívat vládní služby a zároveň legálně přenášejí náklady na budoucí generace. To vytváří zásadní demokratický rozpor, protože ti budoucí občané, kteří ponesou finanční břemeno, se nemohou podílet na dnešních politických rozhodnutích, která dluh vytvářejí. Tím je porušena zásada "žádné zdanění bez zastoupení", neboť budoucí generace jsou fakticky zdaněny, aniž by se mohly podílet na rozhodovacím procesu.
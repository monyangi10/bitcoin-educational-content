question: Theo lý thuyết kinh tế tự do, chi tiêu thâm hụt tạo ra vấn đề cơ bản nào trong các xã hội dân chủ?
answer: Nó cho phép các thế hệ hiện tại hưởng lợi trong khi chuyển gánh nặng chi phí sang các thế hệ tương lai, những người không thể tham gia vào các quyết định dân chủ hiện tại.
wrong_answers:
  - Điều này gây ra lạm phát quá mức, ngay lập tức làm giảm sức mua của người đóng thuế hiện tại và gây bất ổn cho nền kinh tế.
  - Nó tập trung quá nhiều quyền lực kinh tế vào tay các chủ nợ giàu có, những người sau đó có thể gây ảnh hưởng đến các quyết định chính sách của chính phủ.
  - Nó làm giảm hiệu quả hoạt động của chính phủ bằng cách tạo ra sự cạnh tranh quan liêu giữa các bộ phận chi tiêu khác nhau để giành lấy nguồn lực hạn chế.
explanation: |
  Chương này giải thích rằng chi tiêu thâm hụt phá vỡ mối liên hệ tự nhiên giữa hưởng thụ và trách nhiệm bằng cách cho phép công dân hiện tại hưởng lợi từ các dịch vụ của chính phủ trong khi về mặt pháp lý chuyển gánh nặng chi phí sang các thế hệ tương lai. Điều này tạo ra một mâu thuẫn dân chủ cơ bản bởi vì những công dân tương lai sẽ gánh chịu gánh nặng tài chính lại không thể tham gia vào các quyết định chính trị hiện tại tạo ra khoản nợ đó. Điều này vi phạm nguyên tắc "không đánh thuế mà không có đại diện" vì các thế hệ tương lai thực chất bị đánh thuế mà không có tiếng nói trong quá trình ra quyết định.
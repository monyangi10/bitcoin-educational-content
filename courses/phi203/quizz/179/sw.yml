question: Kulingana na uchambuzi wa kiliberali, kwa nini utendaji kazi wa kisiasa wa kidemokrasia unakuwa mgumu kudumishwa chini ya mfumo wa kiuchumi wa kikomunisti?
answer: Kwa sababu kusimamia michakato ya uzalishaji na usambazaji kunahitaji udhibiti wa kudumu wa kimabavu ambao hauwezi kuhatarisha kuhamishiwa kwa wapinzani wa mfumo.
wrong_answers:
  - Kwa sababu wafanyakazi hujikita sana katika mipango ya kiuchumi kiasi cha kutoweza kushiriki kikamilifu katika michakato ya kidemokrasia na maamuzi ya kisiasa
  - Kwa sababu ugumu wa kuratibu shughuli za kiuchumi hauachi muda wa mijadala ya kisiasa na taratibu za mashauriano ya kidemokrasia
  - Kwa sababu umiliki wa pamoja huondoa haki za mali za mtu binafsi ambazo ni msingi muhimu kwa ushiriki wowote wa kisiasa wa kidemokrasia.
explanation: |
  Maandishi yanaelezea kwamba utendaji kazi wa kidemokrasia hauwezi kuruhusu usimamizi endelevu wa michakato ya uzalishaji na usambazaji. Nguvu ya kudumu ya ufundishaji inakuwa muhimu sana, na wakomunisti hawawezi kukubali kwamba nguvu hii ihamishiwe kwa wapinzani wa mfumo. Hii inaunda mkanganyiko wa asili kati ya uhamisho wa kidemokrasia wa madaraka na hitaji la udhibiti endelevu wa kimabavu juu ya michakato ya kiuchumi. Chaguzi zingine zinazingatia vikwazo vya vitendo badala ya kutokubaliana huku kwa msingi wa kisiasa.
question: 根据自由派的分析，在共产主义经济制度下，为什么民主政治功能无法维持？
answer: 因为管理生产和分销流程需要长期的专制控制，而这种控制不能冒险转移给系统对手
wrong_answers:
  - 因为工人过于专注于经济规划，无法有效参与民主进程和政治决策
  - 由于协调经济活动的复杂性，没有时间进行政治辩论和民主协商程序
  - 因为集体所有权消除了个人财产权，而个人财产权是任何民主政治参与的必要基础
explanation: |
  文中解释说，民主运作无法对生产和分配过程进行可持续管理。一种永久性的监护权力变得不可或缺，而共产党人不能接受将这种权力移交给制度的对手。这就造成了权力的民主转移与对经济过程的持续专制控制之间的内在矛盾。其他方案的重点在于实际制约因素，而不是这种根本性的政治不相容性。
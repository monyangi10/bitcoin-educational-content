question: Selon l'analyse libérale, pourquoi le fonctionnement politique démocratique devient-il impossible à maintenir dans un système économique communiste ?
answer: Parce que la gestion des processus de production et de distribution nécessite un contrôle autoritaire permanent qui ne risque pas d'être transféré aux adversaires du système
wrong_answers:
  - Parce que les travailleurs se concentrent trop sur la planification économique pour participer efficacement aux processus démocratiques et à la prise de décision politique
  - Parce que la complexité de la coordination des activités économiques ne laisse pas de temps pour les débats politiques et les procédures de consultation démocratique
  - Parce que la propriété collective élimine les droits de propriété individuels, qui sont le fondement nécessaire de toute participation politique démocratique
explanation: |
  Le texte explique que le fonctionnement démocratique ne peut permettre une gestion durable des processus de production et de distribution. Un pouvoir tutélaire permanent devient indispensable, et les communistes ne peuvent accepter que ce pouvoir soit transféré à des adversaires du système. Il en résulte une contradiction inhérente entre le transfert démocratique du pouvoir et la nécessité d'un contrôle autoritaire permanent sur les processus économiques. Les autres options mettent l'accent sur les contraintes pratiques plutôt que sur cette incompatibilité politique fondamentale.
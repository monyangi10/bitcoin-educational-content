question: Liberal analize göre, komünist bir ekonomik sistem altında demokratik siyasi işleyişin sürdürülmesi neden imkansız hale gelmektedir?
answer: Çünkü üretim ve dağıtım süreçlerini yönetmek, sistem muhaliflerine devredilme riski olmayan kalıcı otoriter kontrol gerektirir
wrong_answers:
  - Çünkü işçiler demokratik süreçlere ve siyasi karar alma mekanizmalarına etkin bir şekilde katılamayacak kadar ekonomik planlamaya odaklanmışlardır
  - Çünkü ekonomik faaliyetlerin koordinasyonunun karmaşıklığı siyasi tartışmalara ve demokratik danışma süreçlerine zaman bırakmamaktadır
  - Çünkü kolektif mülkiyet, her türlü demokratik siyasi katılım için gerekli olan bireysel mülkiyet haklarını ortadan kaldırır
explanation: |
  Metin, demokratik işleyişin üretim ve dağıtım süreçlerinin sürdürülebilir yönetimine izin veremeyeceğini açıklamaktadır. Kalıcı bir vesayet gücü kaçınılmaz hale gelir ve komünistler bu gücün sistemin muhaliflerine devredilmesini kabul edemezler. Bu durum, demokratik iktidar devri ile ekonomik süreçler üzerinde sürekli otoriter kontrol ihtiyacı arasında içsel bir çelişki yaratır. Diğer seçenekler bu temel siyasi uyumsuzluktan ziyade pratik kısıtlamalara odaklanmaktadır.
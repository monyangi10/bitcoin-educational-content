question: Secondo l'analisi liberale, perché il funzionamento politico democratico diventa impossibile da mantenere in un sistema economico comunista?
answer: Perché la gestione dei processi produttivi e distributivi richiede un controllo autoritario permanente che non può rischiare di essere trasferito agli avversari del sistema
wrong_answers:
  - Perché i lavoratori diventano troppo concentrati sulla pianificazione economica per partecipare efficacemente ai processi democratici e al processo decisionale politico
  - Perché la complessità del coordinamento delle attività economiche non lascia tempo ai dibattiti politici e alle procedure di consultazione democratica
  - Perché la proprietà collettiva elimina i diritti di proprietà individuali, che sono la base necessaria per qualsiasi partecipazione politica democratica
explanation: |
  Il testo spiega che il funzionamento democratico non può consentire una gestione sostenibile dei processi di produzione e distribuzione. Diventa indispensabile un potere tutelare permanente, che i comunisti non possono accettare di trasferire agli avversari del sistema. Ciò crea una contraddizione intrinseca tra il trasferimento democratico del potere e la necessità di un continuo controllo autoritario sui processi economici. Le altre opzioni si concentrano sui vincoli pratici piuttosto che su questa fondamentale incompatibilità politica.
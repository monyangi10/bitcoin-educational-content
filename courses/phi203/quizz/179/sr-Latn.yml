question: Prema liberalnoj analizi, zašto demokratsko političko funkcionisanje postaje nemoguće za održavanje pod komunističkim ekonomskim sistemom?
answer: Zato što upravljanje proizvodnim i distributivnim procesima zahteva stalnu autoritarnu kontrolu koja ne sme biti prepuštena protivnicima sistema
wrong_answers:
  - Zato što radnici postaju previše fokusirani na ekonomsko planiranje da bi efikasno učestvovali u demokratskim procesima i političkom odlučivanju
  - Zbog složenosti koordinacije ekonomskih aktivnosti nema vremena za političke debate i demokratske konsultacione procedure
  - Zato što kolektivno vlasništvo eliminiše individualna vlasnička prava koja su neophodna osnova za bilo kakvo demokratsko političko učešće
explanation: |
  Tekst objašnjava da demokratsko funkcionisanje ne može omogućiti održivo upravljanje procesima proizvodnje i distribucije. Trajna tutelarna moć postaje neophodna, a komunisti ne mogu prihvatiti da se ta moć prenese na protivnike sistema. Ovo stvara inherentnu kontradikciju između demokratskog prenosa vlasti i potrebe za kontinuiranom autoritarnom kontrolom nad ekonomskim procesima. Druge opcije se fokusiraju na praktična ograničenja, a ne na ovu fundamentalnu političku nekompatibilnost.
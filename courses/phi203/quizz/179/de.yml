question: Warum, so die liberale Analyse, ist das demokratische politische Funktionieren in einem kommunistischen Wirtschaftssystem nicht mehr aufrechtzuerhalten?
answer: Denn die Steuerung der Produktions- und Vertriebsprozesse erfordert eine permanente autoritäre Kontrolle, die nicht auf die Systemgegner übertragen werden kann
wrong_answers:
  - Weil sich die Arbeitnehmer zu sehr auf die wirtschaftliche Planung konzentrieren, um sich wirksam an demokratischen Prozessen und politischen Entscheidungen zu beteiligen
  - Weil die Komplexität der Koordinierung der wirtschaftlichen Aktivitäten keine Zeit für politische Debatten und demokratische Konsultationsverfahren lässt
  - Weil kollektives Eigentum die individuellen Eigentumsrechte ausschaltet, die die notwendige Grundlage für jede demokratische politische Beteiligung sind
explanation: |
  In dem Text wird erläutert, dass das demokratische Funktionieren eine nachhaltige Steuerung der Produktions- und Verteilungsprozesse nicht zulässt. Eine ständige Vormundschaftsmacht wird unverzichtbar, und die Kommunisten können nicht akzeptieren, dass diese Macht an Gegner des Systems übertragen wird. Dadurch entsteht ein inhärenter Widerspruch zwischen der demokratischen Machtübertragung und der Notwendigkeit einer ständigen autoritären Kontrolle der Wirtschaftsprozesse. Die anderen Optionen konzentrieren sich eher auf praktische Zwänge als auf diese grundlegende politische Unvereinbarkeit.
question: Согласно либеральному анализу, почему демократическое политическое функционирование становится невозможным в условиях коммунистической экономической системы?
answer: Поскольку управление процессами производства и распределения требует постоянного авторитарного контроля, который не может быть передан системным противникам
wrong_answers:
  - Потому что рабочие слишком сосредоточены на экономическом планировании, чтобы эффективно участвовать в демократических процессах и принятии политических решений
  - Потому что сложность координации экономической деятельности не оставляет времени на политические дебаты и демократические процедуры консультаций
  - Потому что коллективная собственность устраняет индивидуальные права собственности, которые являются необходимой основой для любого демократического политического участия
explanation: |
  В тексте объясняется, что демократическое функционирование не может обеспечить устойчивое управление процессами производства и распределения. Постоянная опека становится необходимой, и коммунисты не могут согласиться с тем, чтобы эта власть была передана противникам системы. Это создает внутреннее противоречие между демократической передачей власти и необходимостью постоянного авторитарного контроля над экономическими процессами. Другие варианты сосредоточены на практических ограничениях, а не на этой фундаментальной политической несовместимости.
question: Proč je podle liberální analýzy v komunistickém ekonomickém systému nemožné udržet demokratické politické fungování?
answer: Protože řízení výrobních a distribučních procesů vyžaduje trvalou autoritativní kontrolu, která nemůže být přenesena na systémové oponenty
wrong_answers:
  - Protože se pracovníci příliš soustředí na ekonomické plánování, než aby se mohli účinně podílet na demokratických procesech a politickém rozhodování
  - Protože složitost koordinace ekonomických aktivit neponechává čas na politické debaty a demokratické konzultační postupy
  - Protože kolektivní vlastnictví eliminuje individuální vlastnická práva, která jsou nezbytným základem pro jakoukoli demokratickou politickou účast
explanation: |
  Text vysvětluje, že demokratické fungování nemůže umožnit udržitelné řízení výrobních a distribučních procesů. Nezbytnou se stává stálá poručnická moc a komunisté nemohou připustit, aby tato moc byla předána protivníkům systému. To vytváří vnitřní rozpor mezi demokratickým předáváním moci a potřebou neustálé autoritářské kontroly ekonomických procesů. Ostatní možnosti se zaměřují spíše na praktická omezení než na tuto zásadní politickou neslučitelnost.
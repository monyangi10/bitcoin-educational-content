question: Según el análisis liberal, ¿por qué resulta imposible mantener un funcionamiento político democrático en un sistema económico comunista?
answer: Porque la gestión de los procesos de producción y distribución requiere un control autoritario permanente que no puede arriesgarse a transferir a los oponentes del sistema
wrong_answers:
  - Porque los trabajadores se centran demasiado en la planificación económica como para participar eficazmente en los procesos democráticos y en la toma de decisiones políticas
  - Porque la complejidad de la coordinación de las actividades económicas no deja tiempo para debates políticos y procedimientos democráticos de consulta
  - Porque la propiedad colectiva elimina los derechos de propiedad individual, que son la base necesaria para cualquier participación política democrática
explanation: |
  El texto explica que el funcionamiento democrático no puede permitir una gestión sostenible de los procesos de producción y distribución. Se hace indispensable un poder tutelar permanente, y los comunistas no pueden aceptar que este poder se transfiera a los adversarios del sistema. Esto crea una contradicción inherente entre la transferencia democrática del poder y la necesidad de un control autoritario continuo sobre los procesos económicos. Las otras opciones se centran en las limitaciones prácticas más que en esta incompatibilidad política fundamental.
question: 자유주의적 분석에 따르면, 공산주의 경제 체제 하에서 민주적 정치 기능이 유지될 수 없는 이유는 무엇일까요?
answer: 생산 및 유통 프로세스를 관리하려면 시스템 반대자에게 이전될 위험이 없는 영구적인 권위주의적 통제가 필요하기 때문입니다
wrong_answers:
  - 노동자들이 경제 계획에 너무 집중하다 보니 민주적 과정과 정치적 의사 결정에 효과적으로 참여하지 못하기 때문입니다
  - 경제 활동을 조율해야 하는 복잡성 때문에 정치적 논쟁과 민주적 협의 절차를 진행할 시간이 없습니다
  - 집단적 소유권은 민주적 정치 참여의 필수 기반인 개인의 재산권을 없애기 때문입니다
explanation: |
  이 텍스트는 민주적 기능으로는 생산과 유통 과정을 지속 가능하게 관리할 수 없다고 설명합니다. 영구적인 후견 권력은 필수 불가결하며, 공산주의자들은 이 권력이 체제의 적에게 이전되는 것을 받아들일 수 없습니다. 이로 인해 민주적 권력 이양과 경제 과정에 대한 지속적인 권위주의적 통제의 필요성 사이에 내재적 모순이 발생합니다. 다른 옵션은 이러한 근본적인 정치적 비양립성보다는 현실적인 제약에 초점을 맞추고 있습니다.
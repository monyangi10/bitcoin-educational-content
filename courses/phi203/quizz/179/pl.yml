question: Zgodnie z liberalną analizą, dlaczego demokratyczne funkcjonowanie polityczne staje się niemożliwe do utrzymania w komunistycznym systemie gospodarczym?
answer: Ponieważ zarządzanie procesami produkcji i dystrybucji wymaga stałej autorytarnej kontroli, która nie może być przeniesiona na przeciwników systemu
wrong_answers:
  - Ponieważ pracownicy stają się zbyt skoncentrowani na planowaniu gospodarczym, aby skutecznie uczestniczyć w procesach demokratycznych i podejmowaniu decyzji politycznych
  - Ponieważ złożoność koordynacji działań gospodarczych nie pozostawia czasu na debaty polityczne i demokratyczne procedury konsultacji
  - Ponieważ kolektywna własność eliminuje indywidualne prawa własności, które są niezbędnym fundamentem każdej demokratycznej partycypacji politycznej
explanation: |
  Tekst wyjaśnia, że demokratyczne funkcjonowanie nie może pozwolić na zrównoważone zarządzanie procesami produkcji i dystrybucji. Stała władza opiekuńcza staje się niezbędna, a komuniści nie mogą zaakceptować przekazania tej władzy przeciwnikom systemu. Stwarza to nieodłączną sprzeczność między demokratycznym przekazaniem władzy a potrzebą ciągłej autorytarnej kontroli nad procesami gospodarczymi. Pozostałe opcje koncentrują się raczej na praktycznych ograniczeniach niż na tej fundamentalnej politycznej niezgodności.
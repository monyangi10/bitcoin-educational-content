question: Защо според либералния анализ демократичното политическо функциониране става невъзможно за поддържане в условията на комунистическа икономическа система?
answer: Тъй като управлението на процесите на производство и дистрибуция изисква постоянен авторитарен контрол, който не може да бъде прехвърлен на системните опоненти
wrong_answers:
  - Защото работниците са твърде съсредоточени върху икономическото планиране, за да участват ефективно в демократичните процеси и вземането на политически решения
  - Тъй като сложността на координацията на икономическите дейности не оставя време за политически дебати и демократични процедури за консултации
  - Защото колективната собственост елиминира индивидуалните права на собственост, които са необходимата основа за всяко демократично политическо участие
explanation: |
  В текста се обяснява, че демократичното функциониране не може да позволи устойчиво управление на процесите на производство и разпространение. Необходима става постоянна опекунска власт, а комунистите не могат да приемат тази власт да бъде предадена на противниците на системата. Това създава вътрешно противоречие между демократичното предаване на властта и необходимостта от постоянен авторитарен контрол върху икономическите процеси. Другите варианти се фокусират върху практическите ограничения, а не върху тази фундаментална политическа несъвместимост.
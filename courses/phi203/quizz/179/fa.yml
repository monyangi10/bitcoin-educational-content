question: بر اساس تحلیل لیبرال، چرا عملکرد سیاسی دموکراتیک تحت یک سیستم اقتصادی کمونیستی غیرممکن می‌شود؟
answer: زیرا مدیریت فرآیندهای تولید و توزیع نیازمند کنترل دائمی اقتدارگرایانه‌ای است که نمی‌تواند به مخالفان سیستم منتقل شود.
wrong_answers:
  - زیرا کارگران بیش از حد بر برنامه‌ریزی اقتصادی متمرکز می‌شوند تا به‌طور مؤثر در فرآیندهای دموکراتیک و تصمیم‌گیری‌های سیاسی شرکت کنند.
  - زیرا پیچیدگی هماهنگی فعالیت‌های اقتصادی زمانی برای مباحثات سیاسی و رویه‌های مشاوره دموکراتیک باقی نمی‌گذارد
  - زیرا مالکیت جمعی حقوق مالکیت فردی را که پایه ضروری برای هرگونه مشارکت سیاسی دموکراتیک است، از بین می‌برد.
explanation: |
  متن توضیح می‌دهد که عملکرد دموکراتیک نمی‌تواند مدیریت پایدار فرآیندهای تولید و توزیع را امکان‌پذیر کند. یک قدرت سرپرستی دائمی ضروری می‌شود و کمونیست‌ها نمی‌توانند بپذیرند که این قدرت به دشمنان سیستم منتقل شود. این امر تضاد ذاتی بین انتقال دموکراتیک قدرت و نیاز به کنترل مستمر اقتدارگرایانه بر فرآیندهای اقتصادی ایجاد می‌کند. گزینه‌های دیگر بر محدودیت‌های عملی تمرکز دارند نه این ناسازگاری اساسی سیاسی.
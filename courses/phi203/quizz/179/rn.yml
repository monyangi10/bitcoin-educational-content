question: Dushingiye ku nseguro y’abanyagihugu, ni kuki imikorere ya politike ya demokarasi idashoboka ko igumaho mu gihe c’ubutunzi bw’abakomunisita?
answer: Kubera ko gucunga uburyo bwo gukora no gukwiragiza bisaba ubugenzuzi buhoraho bw’ubutegetsi bw’agahomerabunwa budashobora gutera ingorane zo kwimurirwa ku barwanya ubuhinga .
wrong_answers:
  - Kubera ko abakozi bibanda cane ku bijanye n’igenamigambi ry’ubutunzi kugira ngo bagire uruhara rwiza mu migenderanire ya demokarasi no mu gufata ingingo za politike .
  - Kubera ko uguhuza ibikorwa vy’ubutunzi bigoye cane, nta mwanya usiga wo gukora impaka za politike n’uburyo bwo kugisha inama mu buryo bwa demokarasi .
  - Kuko ubutunzi rusangi burakuraho uburenganzira bw’umuntu ku giti ciwe ari bwo bushingiro bukenewe kugira ngo umuntu agire uruhara muri politike mu buryo bwa demokarasi .
explanation: |
  Ico canditswe gisigura ko ugukora kwa demokarasi kudashobora kwemera uburongozi buramba bw’imigenderanire y’uguhingura n’ugukwiragiza. Ububasha bwo kubungabunga ubudasiba buraba ikintu gihambaye cane, kandi abakomunisita ntibashobora kwemera ko ubwo bubasha bushikirizwa abansi b’urwo rutonde. Ivyo bituma habaho ukuvuguruzanya gusanzwe hagati yo kwimurira ubutegetsi mu buryo bwa demokarasi n’ugukenera ubugenzuzi bw’ubutegetsi buhoraho ku migenderanire y’ubutunzi. Ayandi mahitamwo yibanda ku nzitizi zikora aho kwibanda kuri iyo ntambara y’ishimikiro ya politike.
question: What prediction did Paul Leroy-Beaulieu make about the social position of great doctors and elite professors in a society founded on contract?
answer: They would become the most privileged people of the future, as life became increasingly precious and those who protected and enriched it would see their value recognised accordingly
wrong_answers:
  - They would form a new technocratic governing class, replacing traditional political elites through expertise-based authority
  - They would face growing competition from self-taught practitioners freed by deregulation, gradually losing their elite status
  - They would remain subordinate to industrial and commercial classes whose wealth-generating activities the market would value more highly
explanation: |
  In his Essai sur la répartition des richesses (1885), Paul Leroy-Beaulieu anticipated that in an advanced civilisation founded on contract, life would become increasingly precious to individuals, and therefore those who protected and enriched it — great doctors and elite professors — would see their value recognised in due measure. This prediction stands in direct contrast to the current reality, where state monopolisation devalues these professions. In a free system, the high value of these services would translate into high social recognition and reward.

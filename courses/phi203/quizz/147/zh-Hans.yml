question: 根据对民主国家的批判，政治权力的临时性产生了什么根本问题？
answer: 政党急于迅速利用权力优势，导致资源浪费和草率立法
wrong_answers:
  - 民主政府在实施必要的改革时变得过于谨慎和缓慢
  - 政治领导人形成的长远思维与公民的即时需求相冲突
  - 临时权力造成过度稳定，阻碍了必要的政治变革
explanation: |
  文中解释说，民主国家造成的垄断特别有害，因为它是暂时的。这种临时性导致政党匆忙享受权力带来的好处，造成公共资源的浪费，以及由并不总是适合履行此类职能的个人制定法律。临时性造成了紧迫感，而非深思熟虑，这与个人在做出个人决定时的耐心思考形成了鲜明对比。其他选项错误地认为，临时权力会造成谨慎、长期思考或过度稳定，这与本文的分析相矛盾。
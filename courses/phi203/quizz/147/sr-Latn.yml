question: Prema kritici demokratskih država, koji fundamentalni problem proizlazi iz privremene prirode političke moći?
answer: Političke stranke žure da brzo iskoriste prednosti moći, što dovodi do rasipanja resursa i brzopletog donošenja zakona.
wrong_answers:
  - Demokratske vlade postaju previše oprezne i spore u sprovođenju neophodnih reformi
  - Politički lideri razvijaju dugoročno razmišljanje koje je u sukobu sa trenutnim potrebama građana
  - Privremena moć stvara prekomernu stabilnost koja sprečava neophodne političke promene
explanation: |
  Tekst objašnjava da demokratske države stvaraju posebno štetan monopol jer je privremen. Ova privremenost dovodi političke stranke do toga da žurno uživaju u prednostima vlasti, što rezultira rasipanjem javnih resursa i zakonima koje donose pojedinci koji nisu uvek prikladni za takve funkcije. Privremena priroda stvara hitnost umesto pažljivog razmatranja, što je u suprotnosti sa strpljivim razmišljanjem koje pojedinci koriste u ličnim odlukama. Druge opcije pogrešno sugerišu da privremena vlast stvara oprez, dugoročno razmišljanje ili prekomernu stabilnost, što je u suprotnosti sa predstavljenom analizom.
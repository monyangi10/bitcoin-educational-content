question: بر اساس نقد دولت‌های دموکراتیک، چه مشکل اساسی از ماهیت موقت قدرت سیاسی ناشی می‌شود؟
answer: احزاب سیاسی به سرعت برای بهره‌برداری از مزایای قدرت عجله می‌کنند که منجر به هدر رفت منابع و قانون‌گذاری شتاب‌زده می‌شود.
wrong_answers:
  - دولت‌های دموکراتیک بیش از حد محتاط و کند در اجرای اصلاحات ضروری می‌شوند
  - رهبران سیاسی تفکر بلندمدتی را توسعه می‌دهند که با نیازهای فوری شهروندان در تضاد است.
  - قدرت موقت ثبات بیش از حدی ایجاد می‌کند که مانع از تغییرات سیاسی ضروری می‌شود.
explanation: |
  متن توضیح می‌دهد که دولت‌های دموکراتیک یک انحصار به‌ویژه مضر ایجاد می‌کنند زیرا این انحصار موقتی است. این موقتی بودن باعث می‌شود احزاب سیاسی به سرعت از مزایای قدرت بهره‌مند شوند که منجر به هدر رفتن منابع عمومی و قوانینی می‌شود که توسط افرادی که همیشه برای چنین وظایفی مناسب نیستند، ساخته می‌شود. ماهیت موقتی باعث ایجاد فوریت به جای بررسی دقیق می‌شود، که با تأمل صبورانه‌ای که افراد در تصمیمات شخصی استفاده می‌کنند، در تضاد است. گزینه‌های دیگر به اشتباه پیشنهاد می‌کنند که قدرت موقتی باعث احتیاط، تفکر بلندمدت یا ثبات بیش از حد می‌شود که با تحلیل ارائه شده در تضاد است.
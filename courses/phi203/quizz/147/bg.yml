question: Според критиката на демократичните държави какъв основен проблем произтича от временния характер на политическата власт?
answer: Политическите партии бързат да се възползват от предимствата на властта, което води до разхищение на ресурси и прибързано законодателство
wrong_answers:
  - Демократичните правителства стават твърде предпазливи и бавно провеждат необходимите реформи
  - Политическите лидери развиват дългосрочно мислене, което противоречи на непосредствените нужди на гражданите
  - Временната власт създава прекомерна стабилност, която възпрепятства необходимите политически промени
explanation: |
  В текста се обяснява, че демократичните държави създават особено вреден монопол, защото той е временен. Тази временност кара политическите партии прибързано да се възползват от предимствата на властта, което води до разхищение на обществени ресурси и до закони, създавани от лица, които не винаги са подходящи за такива функции. Временният характер създава по-скоро спешност, отколкото внимателно обмисляне, което контрастира с търпеливата рефлексия, която индивидите използват при вземането на лични решения. Другите варианти неправилно предполагат, че временната власт създава предпазливост, дългосрочно мислене или прекомерна стабилност, което противоречи на представения анализ.
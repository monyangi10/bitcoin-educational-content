question: Frédéric Bastiat ve Gustave de Molinari'ye göre, sosyal ilişkilerde doğal uyumu ne yaratır?
answer: Değişim ilişkilerinde müşteriler ve tedarikçiler arasındaki karşılıklı bağımlılık
wrong_answers:
  - Ticari faaliyetlere ilişkin katı hükümet düzenlemelerinin uygulanması
  - İşletmeler arasındaki her türlü ekonomik rekabetin ortadan kaldırılması
  - Üretim ve dağıtımın yetkililer tarafından merkezi olarak planlanması
explanation: |
  Bastiat ve Molinari, uyumun doğal olarak mübadele ilişkilerinden doğduğunu, çünkü müşterilerin arzulanan mallar için tedarikçilere, tedarikçilerin ise ürünlerini karşılayabilecek müreffeh müşterilere ihtiyaç duyduğunu tespit etmiştir. Bu da aileden uluslararası ticarete kadar her düzeyde karşılıklı fayda sağlayan ilişkiler yaratır. Diğer seçenekler onların felsefesiyle çelişmektedir: doğal uyuma müdahale ettiğine inandıkları hükümet düzenlemelerine ve merkezi planlamaya karşı çıkmışlardır. Ayrıca, insan ihtiyaçlarının karşılanmasında ilerleme ve verimlilik sağladığı için rekabeti ortadan kaldırılması gereken bir şey olarak değil, faydalı bir şey olarak desteklemişlerdir.
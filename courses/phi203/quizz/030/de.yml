question: Was schafft nach Frédéric Bastiat und Gustave de Molinari natürliche Harmonie in sozialen Beziehungen?
answer: Die gegenseitige Abhängigkeit zwischen Kunden und Lieferanten in Austauschbeziehungen
wrong_answers:
  - Die Durchsetzung strenger staatlicher Vorschriften für kommerzielle Aktivitäten
  - Die Beseitigung aller Formen des wirtschaftlichen Wettbewerbs zwischen Unternehmen
  - Die zentralisierte Planung von Produktion und Vertrieb durch Behörden
explanation: |
  Bastiat und Molinari stellten fest, dass sich Harmonie auf natürliche Weise aus Tauschbeziehungen ergibt, da die Kunden Lieferanten für die gewünschten Waren benötigen, während die Lieferanten wohlhabende Kunden brauchen, die sich ihre Produkte leisten können. So entstehen auf allen Ebenen, von der Familie bis zum internationalen Handel, Beziehungen zum gegenseitigen Nutzen. Die anderen Optionen stehen im Widerspruch zu ihrer Philosophie: Sie lehnten staatliche Regulierung und zentralisierte Planung ab, weil sie glaubten, dass diese die natürliche Harmonie beeinträchtigen. Außerdem befürworteten sie den Wettbewerb als etwas Nützliches und nicht als etwas, das es zu beseitigen gilt, da er den Fortschritt und die Effizienz bei der Befriedigung menschlicher Bedürfnisse fördert.
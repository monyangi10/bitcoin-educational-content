question: Secondo Frédéric Bastiat e Gustave de Molinari, cosa crea un'armonia naturale nelle relazioni sociali?
answer: La dipendenza reciproca tra clienti e fornitori nelle relazioni di scambio
wrong_answers:
  - L'applicazione di rigide normative governative sulle attività commerciali
  - L'eliminazione di ogni forma di concorrenza economica tra le imprese
  - La pianificazione centralizzata della produzione e della distribuzione da parte delle autorità
explanation: |
  Bastiat e Molinari hanno individuato che l'armonia emerge naturalmente dalle relazioni di scambio perché i clienti hanno bisogno dei fornitori per i beni desiderati, mentre i fornitori hanno bisogno di clienti benestanti che possano permettersi i loro prodotti. Questo crea relazioni reciprocamente vantaggiose a tutti i livelli, dalla famiglia al commercio internazionale. Le altre opzioni contraddicono la loro filosofia: si opponevano alla regolamentazione governativa e alla pianificazione centralizzata, ritenendo che interferissero con l'armonia naturale. Sostenevano inoltre che la concorrenza fosse benefica, non qualcosa da eliminare, poiché guida il progresso e l'efficienza nel servire i bisogni umani.
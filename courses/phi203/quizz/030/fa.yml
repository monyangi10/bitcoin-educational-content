question: به گفته فردریک باستیا و گوستاو دو مولیناری، چه چیزی هماهنگی طبیعی در روابط اجتماعی ایجاد می‌کند؟
answer: وابستگی متقابل بین مشتریان و تأمین‌کنندگان در روابط مبادله‌ای
wrong_answers:
  - اجرای مقررات سخت‌گیرانه دولتی بر فعالیت‌های تجاری
  - حذف همه اشکال رقابت اقتصادی بین کسب‌وکارها
  - برنامه‌ریزی متمرکز تولید و توزیع توسط مقامات
explanation: |
  باستیا و مولیناری تشخیص دادند که هماهنگی به‌طور طبیعی از روابط مبادله‌ای پدید می‌آید زیرا مشتریان به تأمین‌کنندگان برای کالاهای مورد نظر نیاز دارند، در حالی که تأمین‌کنندگان به مشتریان مرفه که توانایی خرید محصولاتشان را دارند نیازمندند. این امر روابط متقابل سودمند را در تمام سطوح، از خانواده تا تجارت بین‌المللی، ایجاد می‌کند. گزینه‌های دیگر با فلسفه آن‌ها در تضاد است: آن‌ها با مقررات دولتی و برنامه‌ریزی متمرکز مخالف بودند و معتقد بودند که این‌ها با هماهنگی طبیعی تداخل دارند. آن‌ها همچنین از رقابت به عنوان امری سودمند حمایت می‌کردند، نه چیزی که باید حذف شود، زیرا رقابت باعث پیشرفت و کارایی در خدمت به نیازهای انسانی می‌شود.
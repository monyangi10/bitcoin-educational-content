question: Co podle Frédérica Bastiata a Gustava de Molinariho vytváří přirozenou harmonii ve společenských vztazích?
answer: Vzájemná závislost mezi zákazníky a dodavateli ve směnných vztazích
wrong_answers:
  - Prosazování přísných vládních nařízení pro obchodní činnosti
  - Odstranění všech forem hospodářské soutěže mezi podniky
  - Centralizované plánování výroby a distribuce ze strany úřadů
explanation: |
  Bastiat a Molinari zjistili, že harmonie přirozeně vzniká ze směnných vztahů, protože klienti potřebují dodavatele požadovaného zboží, zatímco dodavatelé potřebují prosperující klienty, kteří si mohou dovolit jejich výrobky. Vznikají tak vzájemně výhodné vztahy na všech úrovních, od rodiny až po mezinárodní obchod. Jiné možnosti jsou v rozporu s jejich filozofií: byli proti vládní regulaci a centralizovanému plánování, protože se domnívali, že tyto narušují přirozenou harmonii. Podporovali také konkurenci jako něco prospěšného, nikoliv něco, co je třeba odstranit, protože pohání pokrok a efektivitu při uspokojování lidských potřeb.
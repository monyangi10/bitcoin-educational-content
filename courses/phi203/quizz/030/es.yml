question: Según Frédéric Bastiat y Gustave de Molinari, ¿qué crea la armonía natural en las relaciones sociales?
answer: La dependencia mutua entre clientes y proveedores en las relaciones de intercambio
wrong_answers:
  - La aplicación de una estricta normativa gubernamental a las actividades comerciales
  - La eliminación de toda forma de competencia económica entre empresas
  - La planificación centralizada de la producción y la distribución por parte de las autoridades
explanation: |
  Bastiat y Molinari señalaron que la armonía surge de forma natural de las relaciones de intercambio porque los clientes necesitan proveedores para los bienes deseados, mientras que los proveedores necesitan clientes prósperos que puedan permitirse sus productos. Esto crea relaciones mutuamente beneficiosas a todos los niveles, desde la familia hasta el comercio internacional. Las otras opciones contradicen su filosofía: se oponían a la regulación gubernamental y a la planificación centralizada, por considerar que interferían con la armonía natural. También apoyaban la competencia como algo beneficioso, no algo a eliminar, ya que impulsa el progreso y la eficiencia a la hora de satisfacer las necesidades humanas.
question: Според Фредерик Бастиа и Гюстав дьо Молинари какво създава естествена хармония в социалните отношения?
answer: Взаимната зависимост между клиентите и доставчиците в отношенията на размяна
wrong_answers:
  - Прилагане на строги правителствени разпоредби за търговските дейности
  - Премахване на всички форми на икономическа конкуренция между предприятията
  - Централизирано планиране на производството и дистрибуцията от страна на властите
explanation: |
  Бастиа и Молинари установяват, че хармонията възниква по естествен начин от разменните отношения, тъй като клиентите се нуждаят от доставчици на желаните стоки, а доставчиците - от проспериращи клиенти, които могат да си позволят техните продукти. Така се създават взаимноизгодни отношения на всички нива - от семейството до международната търговия. Другите варианти противоречат на тяхната философия: те се противопоставят на държавното регулиране и централизираното планиране, тъй като смятат, че те пречат на естествената хармония. Подкрепяли са също така конкуренцията като полезна, а не като нещо, което трябва да се премахне, тъй като тя стимулира прогреса и ефективността в обслужването на човешките нужди.
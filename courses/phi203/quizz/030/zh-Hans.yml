question: 根据 Frédéric Bastiat 和 Gustave de Molinari 的观点，是什么创造了社会关系中的自然和谐？
answer: 客户和供应商在交换关系中的相互依赖
wrong_answers:
  - 政府对商业活动实施严格监管
  - 消除企业间一切形式的经济竞争
  - 当局对生产和分配的集中规划
explanation: |
  巴斯蒂亚和莫里纳利认为，交换关系中自然会产生和谐，因为客户需要供应商提供所需的商品，而供应商则需要有能力购买其产品的富裕客户。这就在从家庭到国际商业的各个层面创造了互惠互利的关系。其他选项与他们的理念相悖：他们反对政府监管和集中规划，认为这些会干扰自然和谐。他们还支持竞争，认为竞争是有益的，而不是应该消除的，因为竞争能推动进步，提高效率，满足人类的需求。
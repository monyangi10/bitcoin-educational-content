question: Frédéric Bastiat'n ja Gustave de Molinarin mukaan mikä luo luonnollista harmoniaa sosiaalisiin suhteisiin?
answer: Asiakkaiden ja tavarantoimittajien keskinäinen riippuvuus vaihtosuhteessa
wrong_answers:
  - Kaupallista toimintaa koskevien tiukkojen viranomaismääräysten täytäntöönpano
  - Kaikenlaisen taloudellisen kilpailun poistaminen yritysten väliltä
  - Tuotannon ja jakelun keskitetty suunnittelu viranomaisten toimesta
explanation: |
  Bastiat ja Molinari totesivat, että harmonia syntyy luonnollisesti vaihtosuhteista, koska asiakkaat tarvitsevat tavarantoimittajia haluttuja tavaroita varten, kun taas tavarantoimittajat tarvitsevat hyvinvoivia asiakkaita, joilla on varaa heidän tuotteisiinsa. Näin syntyy molempia osapuolia hyödyttäviä suhteita kaikilla tasoilla perheestä kansainväliseen kauppaan. Muut vaihtoehdot ovat ristiriidassa heidän filosofiansa kanssa: he vastustivat valtion sääntelyä ja keskitettyä suunnittelua, koska uskoivat niiden häiritsevän luonnollista harmoniaa. He kannattivat myös kilpailua hyödyllisenä, ei poistettavana asiana, koska se edistää edistystä ja tehokkuutta ihmisten tarpeiden palvelemisessa.
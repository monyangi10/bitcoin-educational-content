question: Nk’uko Frédéric Bastiat na Gustave de Molinari babivuga, ni igiki gituma haba uguhuza kw’akameremere mu migenderanire y’abantu?
answer: Ugufatanya hagati y'abaguzi n'abaguzi mu migenderanire y'uguhana
wrong_answers:
  - Gushirwa mu ngiro kw'amabwirizwa akomeye ya Leta yerekeye ibikorwa vy'ubudandaji
  - Gukuraho ubwoko bwose bw'uguhiganwa mu vy'ubutunzi hagati y'abacuruzi .
  - Itegeko ry'uguhingura n'ugukwiragiza n'ubutegetsi
explanation: |
  Bastiat na Molinari bamenyesheje ko uguhuza biva mu migenderanire y’uguhanahana amakuru kubera ko abaguzi bakeneye abaguha ibintu bipfuza, mu gihe abaguzi bakeneye abaguzi batunze bashobora kugura ibintu vyabo. Ivyo bituma haba ubucuti bufitiye akamaro ku nzego zose, kuva ku muryango gushika ku bucuruzi mpuzamakungu. Ayandi mahitamwo aravuguruza filozofiya yabo: barwanya amategeko ya Leta n’igenamigambi ry’ibintu bimwe, bemera ko ivyo bibangamira uguhuza kw’ibidukikije. Bashigikiye kandi ko uguhiganwa ari ikintu gifise akamaro, atari ikintu co gukuraho, kubera ko ari co gituma umuntu atera imbere kandi akagira ubushobozi bwo gufasha abantu mu vyo bakeneye.
question: 이 장에서는 왜 경제적 시장 선택이 개별 시민의 정치적 선택보다 근본적으로 더 단순하다고 주장할까요?
answer: 경제적 선택은 경험을 바탕으로 쉽게 비교하고 조정할 수 있는 측정 가능한 개인적 결과와 함께 즉각적이고 직접적인 피드백을 제공합니다
wrong_answers:
  - 경제적 선택은 정치적 결정에 수반되는 막대한 예산에 비해 적은 돈과 자원을 필요로 합니다
  - 경제적 선택은 전문 지식을 가진 개인이 하는 반면 정치적 선택은 복잡한 헌법을 이해해야 합니다
  - 경제적 선택은 시장 메커니즘에 의해 규제되는 반면 정치적 선택은 명확한 규칙 없이 비정형화된 환경에서 작동합니다
explanation: |
  이 텍스트는 경제적 선택이 즉각적인 피드백, 직접적인 개인적 결과, 결과를 비교하고 경험을 바탕으로 행동을 조정할 수 있는 능력을 제공하기 때문에 더 간단하다고 강조합니다. 시민들은 자신이 알고 있는 제품을 평가하고 자신에게 직접적인 영향을 미치는 것을 이해할 수 있습니다. 반면, 정치적 선택은 시간이 지남에 따라 시차가 있고, 추적하기 어려운 집단적 결과를 초래하며, 보이지 않는 사람들에게 피해를 줄 수 있고, 전체를 이해하기 어려운 복잡한 프로그램을 수반합니다. 다른 옵션은 피드백 메커니즘과 결과 가시성의 근본적인 차이보다는 돈, 전문성 또는 규제에 초점을 맞추면서 논점을 잘못 표현합니다.
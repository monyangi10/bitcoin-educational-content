question: Почему в главе утверждается, что экономический выбор на рынке принципиально проще, чем политический выбор для отдельных граждан?
answer: Экономический выбор обеспечивает немедленную, прямую обратную связь с измеримыми личными последствиями, которые можно легко сравнить и скорректировать на основе опыта
wrong_answers:
  - Экономические решения связаны с меньшими суммами денег и ресурсов по сравнению с огромными бюджетами, задействованными в политических решениях
  - Экономические решения принимаются людьми, обладающими специальными знаниями, в то время как политические решения требуют понимания сложного конституционного права
  - Экономический выбор регулируется рыночными механизмами, в то время как политический выбор действует в неструктурированной среде без четких правил
explanation: |
  В тексте подчеркивается, что экономический выбор проще, потому что он предполагает немедленную обратную связь, прямые личные последствия, возможность сравнивать результаты и корректировать поведение на основе опыта. Граждане могут оценивать продукты, которые они знают и понимают, как они непосредственно влияют на них самих. В отличие от этого, политический выбор растянут во времени, имеет коллективные последствия, которые трудно отследить, может нанести вред невидимым людям и включает в себя сложные программы, которые трудно понять во всей их полноте. Другие варианты искажают аргументацию, фокусируясь на деньгах, опыте или регулировании, а не на фундаментальных различиях в механизмах обратной связи и видимости последствий.
question: Bu bölüm neden ekonomik piyasa tercihlerinin bireysel vatandaşlar için siyasi tercihlerden temelde daha basit olduğunu savunuyor?
answer: Ekonomik seçimler, kolayca karşılaştırılabilen ve deneyime dayalı olarak ayarlanabilen ölçülebilir kişisel sonuçlarla anında, doğrudan geri bildirim sağlar
wrong_answers:
  - Ekonomik tercihler, siyasi kararların içerdiği devasa bütçelere kıyasla daha az miktarda para ve kaynak içerir
  - Ekonomik tercihler uzmanlık bilgisine sahip bireyler tarafından yapılırken, siyasi tercihler karmaşık anayasa hukukunu anlamayı gerektirir
  - Ekonomik tercihler piyasa mekanizmaları tarafından düzenlenirken, siyasi tercihler net kuralların olmadığı yapılandırılmamış bir ortamda işlemektedir
explanation: |
  Metin, ekonomik seçimlerin daha basit olduğunu, çünkü anında geri bildirim, doğrudan kişisel sonuçlar ve sonuçları karşılaştırma ve deneyime dayalı olarak davranışı ayarlama olanağı sunduğunu vurgulamaktadır. Vatandaşlar, kendileri üzerindeki doğrudan etkisini bildikleri ve anladıkları ürünleri değerlendirebilirler. Buna karşılık, siyasi seçimler zamana yayılır, izlenmesi zor kolektif sonuçlar doğurur, görünmeyen insanlara zarar verebilir ve bütünüyle anlaşılması zor karmaşık programlar içerir. Diğer seçenekler, geri bildirim mekanizmaları ve sonuçların görünürlüğündeki temel farktan ziyade para, uzmanlık veya düzenlemeye odaklanarak argümanı yanlış yansıtmaktadır.
question: Ni kuki ikigabane kivuga ko amahitamwo y’isoko ry’ubutunzi yoroshe cane kuruta amahitamwo ya politike ku benegihugu ku giti cabo?
answer: Amahitamwo y’ubutunzi atanga inyishu zihita, zitaziguye zifise ingaruka zishobora gupimwa ku muntu ku giti ciwe zishobora kugereranywa bitagoranye no guhindurwa bishingiye ku bumenyi .
wrong_answers:
  - Amahitamwo y’ubutunzi asaba amahera makeyi n’ubutunzi bukeyi ugereranyije n’ingengo y’imari nyinshi cane zijanye n’ingingo za politike .
  - Amahitamwo y'ubutunzi akorwa n'abantu bafise ubumenyi bwihariye mu gihe amahitamwo ya politike asaba gutahura itegeko nshinga rikomeye .
  - Amahitamwo y'ubutunzi agenzurwa n'uburyo bw'isoko mu gihe amahitamwo ya politike akora mu bidukikije bitatunganijwe ata mategeko atomoye .
explanation: |
  Ico canditswe gishimika ku vy’uko amahitamwo y’ubutunzi yoroshe kubera ko atanga inyishu zihita, ingaruka zitaziguye ku muntu ku giti ciwe, n’ubushobozi bwo kugereranya ivyavuyemwo no guhindura inyifato bishingiye ku bumenyi. Abanyagihugu barashobora gusuzuma ibintu bazi no gutahura ingaruka zitaziguye bigira kuri bo nyene. Mu buryo butandukanye n’ubwo, amahitamwo ya politike aratandukanye n’igihe, afise ingaruka rusangi zigoye gukurikirana, zishobora gutera ingorane abantu bataboneka, kandi zirimwo porogarama zikomeye zigoye gutahura muri zo zose. Ayandi mahitamwo agaragaza nabi imvo n’imvano mu kwibanda ku mahera, ubuhinga canke amategeko aho kwibanda ku ntandukaniro y’ishimikiro mu buryo bwo gutanga inyishu no ku kugaragara kw’ingaruka.
question: 为什么本章认为经济市场选择从根本上说比公民个人的政治选择简单？
answer: 经济选择提供即时、直接的反馈，其个人后果可衡量，易于比较，并可根据经验进行调整
wrong_answers:
  - 与政治决策涉及的大量预算相比，经济选择涉及的资金和资源较少
  - 经济选择由具备专业知识的个人做出，而政治选择则需要了解复杂的宪法法律
  - 经济选择受市场机制的调节，而政治选择则在没有明确规则的非结构化环境中运行
explanation: |
  课文强调，经济选择比较简单，因为它提供即时反馈、直接的个人后果以及比较结果和根据经验调整行为的能力。公民可以评估他们所知道的产品，并了解其对自己的直接影响。相比之下，政治选择的时间跨度大，集体后果难以追踪，可能会对看不见的人造成伤害，而且涉及复杂的程序，难以理解其全部内容。其他方案歪曲了这一论点，把重点放在了资金、专业知识或监管上，而不是反馈机制和后果可见性的根本区别上。
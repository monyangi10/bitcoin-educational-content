question: Hvorfor argumenterer kapittelet for at økonomiske markedsvalg er fundamentalt enklere enn politiske valg for den enkelte borger?
answer: Økonomiske valg gir umiddelbare, direkte tilbakemeldinger med målbare personlige konsekvenser som enkelt kan sammenlignes og justeres basert på erfaring
wrong_answers:
  - Økonomiske valg involverer mindre mengder penger og ressurser sammenlignet med de enorme budsjettene som er involvert i politiske beslutninger
  - Økonomiske valg tas av individer med spesialisert kunnskap, mens politiske valg krever forståelse av komplekse konstitusjonelle lover
  - Økonomiske valg er regulert av markedsmekanismer, mens politiske valg foregår i et ustrukturert miljø uten klare regler
explanation: |
  Teksten understreker at økonomiske valg er enklere fordi de gir umiddelbar tilbakemelding, direkte personlige konsekvenser og muligheten til å sammenligne resultater og justere atferd basert på erfaring. Innbyggerne kan evaluere produkter de kjenner og forstå de direkte konsekvensene for seg selv. Politiske valg er derimot spredt over tid, har kollektive konsekvenser som er vanskelige å spore, kan skade usynlige mennesker og involverer komplekse programmer som det er vanskelig å forstå i sin helhet. De andre alternativene fordreier argumentet ved å fokusere på penger, ekspertise eller regulering i stedet for den grunnleggende forskjellen i tilbakemeldingsmekanismer og konsekvensenes synlighet.
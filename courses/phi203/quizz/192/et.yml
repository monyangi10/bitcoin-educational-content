question: Miks väidetakse selles peatükis, et majanduslikud turuvalikud on põhimõtteliselt lihtsamad kui poliitilised valikud üksikute kodanike jaoks?
answer: Majanduslikud valikud annavad vahetut, otsest tagasisidet koos mõõdetavate isiklike tagajärgedega, mida saab hõlpsasti võrrelda ja kogemuste põhjal kohandada
wrong_answers:
  - Majanduslikud valikud hõlmavad väiksemaid rahasummasid ja ressursse võrreldes tohutute eelarvetega, mis on seotud poliitiliste otsustega
  - Majanduslikke valikuid teevad eriteadmistega inimesed, samas kui poliitilised valikud nõuavad keerulise põhiseadusliku õiguse mõistmist
  - Majanduslikud valikud on reguleeritud turumehhanismidega, samas kui poliitilised valikud toimivad struktureerimata keskkonnas, kus puuduvad selged reeglid
explanation: |
  Tekstis rõhutatakse, et majanduslikud valikud on lihtsamad, sest need pakuvad vahetut tagasisidet, otseseid isiklikke tagajärgi ning võimalust võrrelda tulemusi ja kohandada käitumist kogemuste põhjal. Kodanikud saavad hinnata tooteid, mida nad tunnevad ja mõistavad nende otsest mõju endale. Seevastu poliitilised valikud on ajaliselt hajutatud, neil on kollektiivsed tagajärjed, mida on raske jälgida, nad võivad kahjustada nähtamatuid inimesi ja hõlmavad keerulisi programme, mida on raske tervikuna mõista. Teised valikud moonutavad argumenti, keskendudes pigem rahale, asjatundlikkusele või reguleerimisele kui tagasisidemehhanismide ja tagajärgede nähtavuse põhimõttelisele erinevusele.
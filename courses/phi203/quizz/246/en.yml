question: According to the liberal perspective on social issues, what are the two complementary foundations around which human relations naturally organise themselves?
answer: Contract on one side, and human sympathy with natural associations such as the family circle, relatives, close friends, and voluntary organisations on the other
wrong_answers:
  - The state on one side, providing collective security and welfare, and the market on the other, allocating resources through price signals
  - Rational self-interest on one side, driving economic exchange, and moral duty on the other, compelling charitable contributions to those in need
  - Legal rights on one side, enforced by public institutions, and cultural norms on the other, maintained through community social pressure
explanation: |
  The text describes a specific liberal conception of social organisation: human relations are naturally organised around contract, but also around what it calls human sympathy and the individual's natural associations — the family circle, relatives, close friends, as well as the free associations and companies in which each person evolves. This dual foundation of voluntary contract and natural affective bonds is what enables voluntary solidarity to emerge and reach considerable proportions, without requiring state intervention or bureaucratic redistribution.

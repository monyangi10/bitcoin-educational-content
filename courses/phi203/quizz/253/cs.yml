question: Co je podle liberální doktríny svobody hlavním důvodem pro omezení osobní svobody?
answer: Chránit podobné svobody a práva jiných osob před újmou
wrong_answers:
  - Sloužit kolektivnímu zájmu a podporovat národní jednotu nad individuálními zájmy
  - Udržovat společenský pořádek a zabránit jakékoli formě občanské neposlušnosti nebo nesouhlasu
  - Zajistit ekonomickou efektivitu a maximalizovat celkovou produktivitu společnosti
explanation: |
  V textu se výslovně uvádí, že "jediné přípustné omezení osobní svobody spočívá v ochraně svobod druhých" Tato zásada odráží liberální základ, podle něhož je autonomie jednotlivce prvořadá, ale musí být omezena, pokud by zasahovala do rovných práv ostatních. Špatné odpovědi představují kolektivistické, autoritářské nebo utilitaristické přístupy, které kapitola výslovně odmítá, neboť podřizují svobodu jednotlivce abstraktním kolektivním statkům, nikoli ochraně konkrétních práv jednotlivce.
question: 根據自由主義的自由理論，限制個人自由的主要理由是什麼？
answer: 保護其他人的類似自由和權利不受到傷害
wrong_answers:
  - 為集體利益服務，並促進民族團結，而非個人問題
  - 維持社會秩序，防止任何形式的公民抗命或異議
  - 確保經濟效率，使社會整體生產力最大化
explanation: |
  文中明確指出，「個人自由唯一可接受的限制，在於保護他人的自由。這項原則反映了自由主義的基礎，即個人自主是至高無上的，但當它會侵害他人的平等權利時，就必須受到限制。錯誤的答案代表集體主義、專制主義或功利主義的方法，本章明確拒絕這些方法，因為它們讓個人自由從屬於抽象的集體物品，而非保護具體的個人權利。
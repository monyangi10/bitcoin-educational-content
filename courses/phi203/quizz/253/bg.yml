question: Според либералната доктрина за свободата кое е основното оправдание за ограничаване на личната свобода?
answer: За да защитите подобни свободи и права на други лица от увреждане
wrong_answers:
  - Да служи на колективния интерес и да насърчава националното единство над индивидуалните проблеми
  - Да поддържат социалния ред и да предотвратяват всякакви форми на гражданско неподчинение или несъгласие
  - Да се осигури икономическа ефективност и да се увеличи общата производителност на обществото
explanation: |
  В текста изрично се посочва, че "единственото допустимо ограничение на личната свобода се състои в защитата на свободите на другите" Този принцип отразява либералната основа, според която индивидуалната автономия е от първостепенно значение, но трябва да бъде ограничавана, когато би нарушила равните права на другите. Грешните отговори представляват колективистки, авторитарни или утилитарни подходи, които главата изрично отхвърля, тъй като те подчиняват индивидуалната свобода на абстрактни колективни блага, вместо да защитават конкретни индивидуални права.
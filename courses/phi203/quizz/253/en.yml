question: According to the liberal doctrine of freedom, what is the primary justification for limiting individual liberty?
answer: To protect the similar freedoms and rights of other individuals from harm
wrong_answers:
  - To serve the collective interest and promote national unity above individual concerns
  - To maintain social order and prevent any form of civil disobedience or dissent
  - To ensure economic efficiency and maximize the overall productivity of society
explanation: |
  The text explicitly states that 'the only admissible limitation to individual freedom lies in the protection of others' freedoms.' This principle reflects the liberal foundation that individual autonomy is paramount, but must be constrained when it would infringe upon others' equal rights. The wrong answers represent collectivist, authoritarian, or utilitarian approaches that the chapter explicitly rejects, as they subordinate individual liberty to abstract collective goods rather than protecting concrete individual rights.

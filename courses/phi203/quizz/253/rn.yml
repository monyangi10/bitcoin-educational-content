question: Dushingiye ku nyigisho y’umwidegemvyo y’ubwigenge, ni igiki nyamukuru cotuma umuntu ashobora guhagarika umwidegemvyo wiwe?
answer: Kugira ngo umuntu akingire umwidegemvyo n’uburenganzira nk’ubwo nk’ubwo bw’abandi bantu kugira ngo ntibagire nabi .
wrong_answers:
  - Gukorera inyungu rusangi no guteza imbere ubumwe bw'igihugu hejuru y'ivy'umuntu ku giti ciwe
  - Kubungabunga urutonde rw'imibano no gukingira uburyo bwose bw'ubugarariji bw'abanyagihugu canke ukutumvikana
  - Kugira ngo ubutunzi bugende neza no gutuma abantu bose bagira umwimbu mwinshi
explanation: |
  Ico canditswe kivuga mu buryo butomoye yuko 'ikintu conyene cemewe co guhagarika umwidegemvyo w'umuntu ku giti ciwe ari ugukingira umwidegemvyo w'abandi.' Iryo hame ryerekana umushinge w’ubwigenge w’uko ubwigenge bw’umuntu ku giti ciwe ari bwo buhambaye kuruta ibindi vyose, ariko butegerezwa guhagarikwa igihe bwoba buhungabanya uburenganzira bungana bw’abandi. Inyishu zitari zo zigereranya uburyo bwo gukorana n’abandi, ubutegetsi bw’agahomerabunwa canke uburyo bwo gukoresha abantu bose, ivyo ikigabane kikanka mu buryo butomoye, kuko bushira umwidegemvyo w’umuntu ku giti ciwe munsi y’ivyiza vy’abantu bose bitaboneka aho kurinda uburenganzira nyabwo bw’umuntu ku giti ciwe.
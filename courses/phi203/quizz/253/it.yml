question: Secondo la dottrina liberale della libertà, qual è la principale giustificazione per limitare la libertà individuale?
answer: Proteggere le libertà e i diritti analoghi di altri individui da eventuali danni
wrong_answers:
  - Servire l'interesse collettivo e promuovere l'unità nazionale al di sopra delle preoccupazioni individuali
  - Mantenere l'ordine sociale e prevenire qualsiasi forma di disobbedienza o dissenso civile
  - Garantire l'efficienza economica e massimizzare la produttività complessiva della società
explanation: |
  Il testo afferma esplicitamente che "l'unica limitazione ammissibile alla libertà individuale consiste nella protezione delle libertà altrui" Questo principio riflette il fondamento liberale secondo cui l'autonomia individuale è fondamentale, ma deve essere limitata quando viola gli uguali diritti degli altri. Le risposte sbagliate rappresentano approcci collettivisti, autoritari o utilitaristici che il capitolo rifiuta esplicitamente, in quanto subordinano la libertà individuale a beni collettivi astratti piuttosto che proteggere i diritti individuali concreti.
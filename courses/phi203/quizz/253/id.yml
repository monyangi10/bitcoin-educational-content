question: Menurut doktrin liberal tentang kebebasan, apa pembenaran utama untuk membatasi kebebasan individu?
answer: Untuk melindungi kebebasan dan hak-hak yang sama dari individu lain dari bahaya
wrong_answers:
  - Untuk melayani kepentingan bersama dan mempromosikan persatuan nasional di atas kepentingan individu
  - Untuk menjaga ketertiban sosial dan mencegah segala bentuk pembangkangan atau perbedaan pendapat sipil
  - Untuk memastikan efisiensi ekonomi dan memaksimalkan produktivitas masyarakat secara keseluruhan
explanation: |
  Teks tersebut secara eksplisit menyatakan bahwa 'satu-satunya batasan yang dapat diterima untuk kebebasan individu terletak pada perlindungan kebebasan orang lain Prinsip ini mencerminkan landasan liberal bahwa otonomi individu adalah yang terpenting, tetapi harus dibatasi ketika hal itu akan melanggar hak-hak orang lain yang setara. Jawaban yang salah mewakili pendekatan kolektivis, otoriter, atau utilitarian yang secara eksplisit ditolak oleh bab ini, karena mereka menundukkan kebebasan individu pada barang kolektif yang abstrak daripada melindungi hak-hak individu yang konkret.
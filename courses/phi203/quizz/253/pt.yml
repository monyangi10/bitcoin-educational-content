question: De acordo com a doutrina liberal da liberdade, qual é a principal justificação para limitar a liberdade individual?
answer: Proteger de danos as liberdades e direitos semelhantes de outras pessoas
wrong_answers:
  - Servir o interesse coletivo e promover a unidade nacional acima das preocupações individuais
  - Manter a ordem social e impedir qualquer forma de desobediência civil ou dissidência
  - Assegurar a eficiência económica e maximizar a produtividade global da sociedade
explanation: |
  O texto afirma explicitamente que "a única limitação admissível à liberdade individual reside na proteção das liberdades dos outros" Este princípio reflecte o fundamento liberal de que a autonomia individual é primordial, mas deve ser restringida quando infringe a igualdade de direitos dos outros. As respostas erradas representam abordagens colectivistas, autoritárias ou utilitaristas que o capítulo rejeita explicitamente, uma vez que subordinam a liberdade individual a bens colectivos abstractos em vez de protegerem direitos individuais concretos.
question: Mikä on liberaalin vapausopin mukaan ensisijainen peruste yksilönvapauden rajoittamiselle?
answer: Suojella muiden yksilöiden samankaltaisia vapauksia ja oikeuksia vahingoittumiselta
wrong_answers:
  - Palvella kollektiivista etua ja edistää kansallista yhtenäisyyttä yksilöllisiä huolenaiheita tärkeämpänä
  - Yhteiskunnallisen järjestyksen ylläpitäminen ja kaikenlaisen kansalaistottelemattomuuden tai toisinajattelun estäminen
  - Taloudellisen tehokkuuden varmistaminen ja yhteiskunnan kokonaistuottavuuden maksimointi
explanation: |
  Tekstissä todetaan nimenomaisesti, että "ainoa hyväksyttävä yksilönvapauden rajoitus on muiden vapauksien suojelu" Tämä periaate kuvastaa liberaalia perustaa, jonka mukaan yksilön autonomia on ensisijainen, mutta sitä on rajoitettava, jos se loukkaa muiden yhtäläisiä oikeuksia. Väärät vastaukset edustavat kollektivistisia, autoritaarisia tai utilitaristisia lähestymistapoja, jotka tässä luvussa nimenomaisesti hylätään, koska ne alistavat yksilönvapauden abstrakteille kollektiivisille hyödykkeille sen sijaan, että ne suojelisivat konkreettisia yksilön oikeuksia.
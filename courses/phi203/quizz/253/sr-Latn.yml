question: Prema liberalnoj doktrini slobode, koja je primarna opravdanost za ograničavanje individualne slobode?
answer: Da zaštitimo slične slobode i prava drugih pojedinaca od štete
wrong_answers:
  - Da služi kolektivnom interesu i promoviše nacionalno jedinstvo iznad individualnih interesa
  - Da bi se održao društveni poredak i sprečio bilo koji oblik građanske neposlušnosti ili neslaganja
  - Da bi se osigurala ekonomska efikasnost i maksimizirala ukupna produktivnost društva
explanation: |
  Tekst eksplicitno navodi da 'jedino prihvatljivo ograničenje individualne slobode leži u zaštiti sloboda drugih.' Ovaj princip odražava liberalnu osnovu da je individualna autonomija najvažnija, ali mora biti ograničena kada bi narušila jednaka prava drugih. Pogrešni odgovori predstavljaju kolektivističke, autoritarne ili utilitarističke pristupe koje poglavlje eksplicitno odbacuje, jer podređuju individualnu slobodu apstraktnim kolektivnim dobrima umesto zaštiti konkretnih individualnih prava.
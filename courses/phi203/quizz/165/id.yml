question: Kondisi ekonomi apa yang mendasari terciptanya persaingan alamiah yang ingin dihindari oleh proteksionisme?
answer: Kelangkaan sumber daya yang tersedia yang membutuhkan alokasi dan distribusi di antara individu
wrong_answers:
  - Peraturan pemerintah yang berlebihan yang membatasi operasi pasar bebas dan kewirausahaan
  - Distribusi kekayaan yang tidak merata yang disebabkan oleh keuntungan yang tidak adil yang diberikan kepada pesaing asing
  - Kurangnya program pendidikan dan pelatihan yang layak bagi pekerja rumah tangga dan produsen
explanation: |
  Menurut bab ini, proteksionisme muncul sebagai respon terhadap persaingan alamiah yang terjadi karena kelangkaan sumber daya yang mendasar. Kelangkaan ini menciptakan kebutuhan untuk akuisisi dan distribusi yang dapat terjadi baik melalui kontrak sukarela maupun melalui cara-cara politik. Bab ini menjelaskan bahwa persaingan alamiah ini memberikan penghargaan bagi upaya-upaya produktif namun tak terelakkan meninggalkan beberapa orang di belakang - mereka yang kurang produktif atau membuat keputusan ekonomi yang buruk. Proteksionisme kemudian menjadi solusi yang mereka pilih untuk menghindari persaingan dalam sistem alamiah ini. Pilihan lain secara keliru menyatakan bahwa persaingan diciptakan secara artifisial oleh peraturan, keuntungan asing yang tidak adil, atau kekurangan pendidikan, dan bukannya mengakui bahwa persaingan merupakan konsekuensi yang melekat pada kelangkaan sumber daya.
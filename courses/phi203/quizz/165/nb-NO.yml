question: Hvilke underliggende økonomiske forhold er det som skaper den naturlige konkurransen som proteksjonismen søker å unngå?
answer: Knapphet på tilgjengelige ressurser som krever allokering og fordeling mellom individer
wrong_answers:
  - Den overdrevne statlige reguleringen som begrenser frie markedsoperasjoner og entreprenørskap
  - Den skjeve fordelingen av velstand som skapes av urettferdige fordeler gitt til utenlandske konkurrenter
  - Mangelen på gode utdannings- og opplæringsprogrammer for hushjelper og produsenter
explanation: |
  Ifølge kapittelet oppstår proteksjonisme som et svar på den naturlige konkurransen som eksisterer på grunn av den grunnleggende knappheten på ressurser. Denne knappheten skaper et behov for oppkjøp og fordeling som kan skje enten gjennom frivillige kontrakter eller gjennom politiske virkemidler. Kapitlet forklarer at denne naturlige konkurransen belønner produktiv innsats, men at den uunngåelig fører til at noen blir hengende etter - de som er mindre produktive eller tar dårlige økonomiske beslutninger. Proteksjonisme blir da deres foretrukne løsning for å unngå å konkurrere i dette naturlige systemet. De andre alternativene antyder feilaktig at konkurransen er kunstig skapt av reguleringer, urettferdige utenlandske fordeler eller mangelfull utdanning, i stedet for å anerkjenne den som en iboende konsekvens av ressursknapphet.
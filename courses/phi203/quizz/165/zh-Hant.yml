question: 保護主義想要避免的自然競爭是由什麼基本經濟條件造成的？
answer: 可用資源稀少，需要在個人之間分配和分配
wrong_answers:
  - 限制自由市場運作和企業精神的過度政府管制
  - 給予外國競爭者不公平優勢所造成的財富分配不均
  - 家務勞動者和生產者缺乏適當的教育和訓練計畫
explanation: |
  根據本章所述，保護主義的出現是對自然競爭的回應，而自然競爭是由於資源的基本稀缺性而存在的。這種稀缺性造成了取得和分配的必要性，而取得和分配可以透過自願契約或政治手段來進行。本章解釋，這種自然競爭會獎勵生產性的努力，但不可避免地會讓某些人落後，也就是那些生產力較低或做出不良經濟決策的人。於是保護主義就成為他們避免在這個自然系統中競爭的首選解決方案。其他方案錯誤地認為競爭是由管制、不公平的外國優勢或教育缺陷所人為製造出來的，而不是承認競爭是資源稀缺的固有結果。
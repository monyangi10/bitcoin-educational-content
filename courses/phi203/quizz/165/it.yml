question: Quale condizione economica di fondo crea la concorrenza naturale che il protezionismo cerca di evitare?
answer: La scarsità di risorse disponibili che richiede l'allocazione e la distribuzione tra gli individui
wrong_answers:
  - L'eccessiva regolamentazione governativa che limita le operazioni di libero mercato e l'imprenditorialità
  - L'iniqua distribuzione della ricchezza creata da ingiusti vantaggi concessi ai concorrenti stranieri
  - La mancanza di programmi di istruzione e formazione adeguati per i lavoratori e i produttori domestici
explanation: |
  Secondo il capitolo, il protezionismo emerge come risposta alla concorrenza naturale che esiste a causa della fondamentale scarsità di risorse. Questa scarsità crea una necessità di acquisizione e distribuzione che può avvenire sia attraverso contratti volontari sia attraverso mezzi politici. Il capitolo spiega che questa competizione naturale premia gli sforzi produttivi, ma inevitabilmente lascia indietro alcune persone, quelle meno produttive o che prendono decisioni economiche sbagliate. Il protezionismo diventa quindi la soluzione preferita per evitare di competere in questo sistema naturale. Le altre opzioni suggeriscono erroneamente che la concorrenza sia creata artificialmente da normative, vantaggi stranieri sleali o carenze educative, invece di riconoscerla come una conseguenza intrinseca della scarsità di risorse.
question: Điều kiện kinh tế cơ bản nào tạo ra sự cạnh tranh tự nhiên mà chủ nghĩa bảo hộ tìm cách né tránh?
answer: Sự khan hiếm nguồn lực sẵn có đòi hỏi phải phân bổ và phân phối giữa các cá nhân.
wrong_answers:
  - Sự quản lý quá mức của chính phủ hạn chế hoạt động thị trường tự do và tinh thần kinh doanh.
  - Sự phân bổ tài sản không đồng đều do những lợi thế không công bằng dành cho các đối thủ cạnh tranh nước ngoài.
  - Thiếu các chương trình giáo dục và đào tạo bài bản cho người lao động giúp việc nhà và người sản xuất.
explanation: |
  Theo chương này, chủ nghĩa bảo hộ xuất hiện như một phản ứng đối với sự cạnh tranh tự nhiên tồn tại do sự khan hiếm cơ bản của các nguồn lực. Sự khan hiếm này tạo ra nhu cầu về việc thu mua và phân phối, có thể diễn ra thông qua các hợp đồng tự nguyện hoặc thông qua các biện pháp chính trị. Chương này giải thích rằng sự cạnh tranh tự nhiên này tưởng thưởng cho những nỗ lực sản xuất nhưng chắc chắn sẽ bỏ lại một số người phía sau - những người kém năng suất hoặc đưa ra những quyết định kinh tế sai lầm. Chủ nghĩa bảo hộ sau đó trở thành giải pháp được họ ưa thích để tránh cạnh tranh trong hệ thống tự nhiên này. Các lựa chọn khác cho rằng sự cạnh tranh được tạo ra một cách nhân tạo bởi quy định, lợi thế nước ngoài không công bằng hoặc thiếu sót về giáo dục, thay vì nhận ra đó là hệ quả tất yếu của sự khan hiếm nguồn lực.
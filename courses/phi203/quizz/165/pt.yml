question: Que condição económica subjacente cria a concorrência natural que o protecionismo procura evitar?
answer: A escassez de recursos disponíveis que exige a afetação e distribuição entre os indivíduos
wrong_answers:
  - A regulamentação governamental excessiva que limita o funcionamento do mercado livre e o espírito empresarial
  - A distribuição desigual da riqueza criada pelas vantagens injustas concedidas aos concorrentes estrangeiros
  - A falta de programas de educação e formação adequados para trabalhadores domésticos e produtores
explanation: |
  Segundo o capítulo, o protecionismo surge como uma resposta à concorrência natural que existe devido à escassez fundamental de recursos. Esta escassez cria uma necessidade de aquisição e distribuição que pode ocorrer quer através de contratos voluntários quer através de meios políticos. O capítulo explica que esta concorrência natural recompensa os esforços produtivos, mas deixa inevitavelmente algumas pessoas para trás - aquelas que são menos produtivas ou que tomam más decisões económicas. O protecionismo torna-se então a sua solução preferida para evitar competir neste sistema natural. As outras opções sugerem incorretamente que a concorrência é criada artificialmente pela regulamentação, por vantagens estrangeiras injustas ou por deficiências educativas, em vez de a reconhecerem como uma consequência inerente à escassez de recursos.
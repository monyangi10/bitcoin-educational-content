question: Welche wirtschaftliche Grundbedingung schafft den natürlichen Wettbewerb, den der Protektionismus zu verhindern sucht?
answer: Die Knappheit der verfügbaren Ressourcen, die eine Aufteilung und Verteilung unter den Individuen erfordert
wrong_answers:
  - Die übermäßige staatliche Regulierung, die die freie Marktwirtschaft und das Unternehmertum einschränkt
  - Die ungleiche Verteilung des Wohlstands, die durch unfaire Vorteile für ausländische Wettbewerber entsteht
  - Das Fehlen geeigneter Bildungs- und Ausbildungsprogramme für Hausangestellte und Produzenten
explanation: |
  Dem Kapitel zufolge entsteht Protektionismus als Reaktion auf den natürlichen Wettbewerb, der aufgrund der grundlegenden Knappheit von Ressourcen besteht. Diese Knappheit schafft eine Notwendigkeit für Erwerb und Verteilung, die entweder durch freiwillige Verträge oder durch politische Mittel erfolgen kann. In dem Kapitel wird erläutert, dass dieser natürliche Wettbewerb produktive Anstrengungen belohnt, aber unweigerlich einige Menschen zurücklässt - diejenigen, die weniger produktiv sind oder schlechte wirtschaftliche Entscheidungen treffen. Protektionismus wird dann zu ihrer bevorzugten Lösung, um den Wettbewerb in diesem natürlichen System zu vermeiden. Die anderen Optionen suggerieren fälschlicherweise, dass der Wettbewerb durch Regulierung, unfaire ausländische Vorteile oder Bildungsdefizite künstlich erzeugt wird, anstatt ihn als inhärente Folge der Ressourcenknappheit anzuerkennen.
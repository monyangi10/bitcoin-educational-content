question: Кое е основното икономическо условие, което създава естествената конкуренция, която протекционизмът се опитва да избегне?
answer: Оскъдността на наличните ресурси, която изисква разпределение между хората
wrong_answers:
  - Прекомерното държавно регулиране, което ограничава функционирането на свободния пазар и предприемачеството
  - Неравномерното разпределение на богатството, породено от несправедливи предимства, предоставени на чуждестранни конкуренти
  - Липсата на подходящи програми за образование и обучение на домашните работници и производители
explanation: |
  Според тази глава протекционизмът се появява в отговор на естествената конкуренция, която се дължи на фундаменталния недостиг на ресурси. Тази оскъдност поражда необходимост от придобиване и разпределение, което може да стане или чрез доброволни договори, или чрез политически средства. В главата се обяснява, че тази естествена конкуренция възнаграждава продуктивните усилия, но неизбежно оставя някои хора назад - тези, които са по-малко продуктивни или вземат лоши икономически решения. Тогава протекционизмът се превръща в предпочитано от тях решение, за да избегнат конкуренцията в тази естествена система. Другите варианти неправилно внушават, че конкуренцията е изкуствено създадена от регулации, несправедливи чуждестранни предимства или образователни недостатъци, вместо да я признаят за присъща последица от недостига на ресурси.
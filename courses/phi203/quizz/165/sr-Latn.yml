question: Koji osnovni ekonomski uslov stvara prirodnu konkurenciju koju protekcionizam nastoji da izbegne?
answer: Oškudica dostupnih resursa koja zahteva alokaciju i distribuciju među pojedincima
wrong_answers:
  - Prekomerna vladina regulativa koja ograničava slobodno tržišno poslovanje i preduzetništvo
  - Nejednaka raspodela bogatstva stvorena nepravednim prednostima datim stranim konkurentima
  - Nedostatak odgovarajućeg obrazovanja i programa obuke za domaće radnike i proizvođače
explanation: |
  Prema poglavlju, protekcionizam se javlja kao odgovor na prirodnu konkurenciju koja postoji zbog fundamentalne oskudice resursa. Ova oskudica stvara potrebu za sticanjem i distribucijom koja može da se odvija ili putem dobrovoljnih ugovora ili političkim sredstvima. Poglavlje objašnjava da ova prirodna konkurencija nagrađuje produktivne napore, ali neizbežno ostavlja neke ljude iza - one koji su manje produktivni ili donose loše ekonomske odluke. Protekcionizam tada postaje njihovo preferirano rešenje kako bi izbegli takmičenje u ovom prirodnom sistemu. Druge opcije pogrešno sugerišu da je konkurencija veštački stvorena regulacijom, nepoštenim stranim prednostima ili obrazovnim nedostacima, umesto da je prepoznaju kao inherentnu posledicu oskudice resursa.
question: Korumacılığın kaçınmaya çalıştığı doğal rekabeti yaratan temel ekonomik koşul nedir?
answer: Bireyler arasında tahsis ve dağıtım gerektiren mevcut kaynakların kıtlığı
wrong_answers:
  - Serbest piyasa faaliyetlerini ve girişimciliği sınırlayan aşırı hükümet düzenlemeleri
  - Yabancı rakiplere sağlanan haksız avantajların yarattığı eşitsiz servet dağılımı
  - Ev işçileri ve üreticiler için uygun eğitim ve öğretim programlarının eksikliği
explanation: |
  Bu bölüme göre korumacılık, kaynakların temel kıtlığı nedeniyle var olan doğal rekabete bir yanıt olarak ortaya çıkmaktadır. Bu kıtlık, gönüllü sözleşmeler ya da siyasi yollarla gerçekleşebilecek bir edinim ve dağıtım gerekliliği yaratmaktadır. Bu bölüm, bu doğal rekabetin üretken çabaları ödüllendirdiğini ancak kaçınılmaz olarak bazı insanları geride bıraktığını açıklamaktadır - daha az üretken olan veya kötü ekonomik kararlar verenler. Bu durumda korumacılık, bu doğal sistemde rekabet etmekten kaçınmak için tercih ettikleri çözüm haline gelmektedir. Diğer seçenekler, rekabetin kaynak kıtlığının doğal bir sonucu olduğunu kabul etmek yerine, rekabetin düzenlemeler, haksız dış avantajlar veya eğitim eksiklikleri tarafından yapay olarak yaratıldığını öne sürmektedir.
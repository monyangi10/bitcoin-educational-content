question: Milline majanduslik olukord tekitab loomuliku konkurentsi, mida protektsionismiga püütakse vältida?
answer: Olemasolevate ressursside nappus, mis nõuab nende jaotamist ja jagamist üksikisikute vahel
wrong_answers:
  - Valitsuse liigne reguleerimine, mis piirab vaba turu toimimist ja ettevõtlust
  - Väliskonkurentidele antud ebaõiglastest eelistest tulenev rikkuse ebavõrdne jagunemine
  - Kodutöötajate ja tootjate nõuetekohaste haridus- ja koolitusprogrammide puudumine
explanation: |
  Peatüki kohaselt tekib protektsionism vastusena loomulikule konkurentsile, mis on tingitud ressursside põhilisest nappusest. See nappus tekitab vajaduse omandamise ja jaotamise järele, mis võib toimuda kas vabatahtlike lepingute või poliitiliste vahendite kaudu. Peatükis selgitatakse, et see loomulik konkurents premeerib tootlikke jõupingutusi, kuid jätab paratamatult mõned inimesed maha - need, kes on vähem tootlikud või teevad halbu majandusotsuseid. Protektsionism muutub siis nende eelistatud lahenduseks, et vältida konkureerimist selles loomulikus süsteemis. Teised valikud viitavad ekslikult sellele, et konkurents on kunstlikult loodud reguleerimise, ebaausate välismaiste eeliste või hariduslike puuduste abil, selle asemel, et tunnistada seda ressursside nappuse loomupärase tagajärjena.
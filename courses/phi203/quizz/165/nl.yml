question: Welke onderliggende economische toestand creëert de natuurlijke concurrentie die protectionisme probeert te vermijden?
answer: De schaarste van beschikbare middelen die toewijzing en verdeling onder individuen vereist
wrong_answers:
  - De buitensporige overheidsregulering die vrije marktwerking en ondernemerschap beperkt
  - De ongelijke verdeling van rijkdom die ontstaat door oneerlijke voordelen voor buitenlandse concurrenten
  - Het gebrek aan goede opleidings- en trainingsprogramma's voor huishoudelijk personeel en producenten
explanation: |
  Volgens het hoofdstuk ontstaat protectionisme als reactie op de natuurlijke concurrentie die het gevolg is van de fundamentele schaarste van hulpbronnen. Deze schaarste creëert een noodzaak voor verwerving en verdeling die kan plaatsvinden via vrijwillige contracten of via politieke middelen. Het hoofdstuk legt uit dat deze natuurlijke concurrentie productieve inspanningen beloont, maar onvermijdelijk sommige mensen achterlaat - zij die minder productief zijn of slechte economische beslissingen nemen. Protectionisme wordt dan hun voorkeursoplossing om niet te hoeven concurreren in dit natuurlijke systeem. De andere opties suggereren ten onrechte dat concurrentie kunstmatig wordt gecreëerd door regelgeving, oneerlijke buitenlandse voordelen of onderwijstekorten, in plaats van het te erkennen als een inherent gevolg van grondstoffenschaarste.
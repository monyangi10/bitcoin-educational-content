question: 是什么基本经济条件造成了保护主义试图避免的自然竞争？
answer: 可用资源稀缺，需要在个人之间进行分配和分配
wrong_answers:
  - 政府的过度监管限制了自由市场的运作和创业精神
  - 外国竞争者的不公平优势造成财富分配不均
  - 缺乏针对家庭佣工和生产者的适当教育和培训计划
explanation: |
  本章认为，保护主义的出现是对资源基本稀缺所导致的自然竞争的回应。这种稀缺性造成了获取和分配的必要性，而获取和分配可以通过自愿契约或政治手段实现。本章解释说，这种自然竞争奖励生产性努力，但不可避免地会使一些人落后--那些生产性较差或做出错误经济决策的人。于是，保护主义就成了他们避免在这种自然体系中竞争的首选方案。其他方案错误地认为，竞争是由监管、不公平的外国优势或教育缺陷人为造成的，而不是承认竞争是资源稀缺的固有后果。
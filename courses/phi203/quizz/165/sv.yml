question: Vilka underliggande ekonomiska förhållanden skapar den naturliga konkurrens som protektionismen försöker undvika?
answer: Knapphet på tillgängliga resurser som kräver allokering och fördelning mellan individer
wrong_answers:
  - Den överdrivna statliga regleringen som begränsar den fria marknadens funktion och entreprenörskap
  - Den ojämna fördelningen av välstånd som skapas av orättvisa fördelar för utländska konkurrenter
  - Avsaknad av lämpliga utbildnings- och träningsprogram för hushållsarbetare och producenter
explanation: |
  Enligt kapitlet uppstår protektionism som ett svar på den naturliga konkurrens som råder på grund av den grundläggande bristen på resurser. Denna knapphet skapar ett behov av förvärv och distribution som kan ske antingen genom frivilliga avtal eller med politiska medel. Kapitlet förklarar att denna naturliga konkurrens belönar produktiva ansträngningar men oundvikligen lämnar vissa människor bakom sig - de som är mindre produktiva eller fattar dåliga ekonomiska beslut. Protektionism blir då deras föredragna lösning för att undvika att konkurrera i detta naturliga system. De andra alternativen antyder felaktigt att konkurrens skapas artificiellt genom regleringar, orättvisa utländska fördelar eller brister i utbildningen, snarare än att erkänna den som en naturlig konsekvens av resursbrist.
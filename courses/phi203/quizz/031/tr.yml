question: Bu bölüme göre siyasi özgürlükte adem-i merkeziyetçilik ilkesi neye dayanmaktadır?
answer: Temelde bireysel olan insan ihtiyaçlarının, tercihlerinin ve koşullarının çeşitliliği
wrong_answers:
  - Yalnızca bireyler tarafından karşılanamayan evrensel güvenlik ihtiyacı
  - Serbest piyasalarda müşteriler ve tedarikçiler arasındaki ekonomik ilişkiler
  - Sinir sistemi aracılığıyla iletilen fizyolojik ağrı deneyimi
explanation: |
  Adem-i merkeziyetçilik ilkesi temelini insan çeşitliliğinde bulur - insanların farklı ihtiyaçlara, tercihlere ve doğası gereği öncelikle bireysel olan koşullara sahip olduğu gerçeği. Bu çeşitlilik, Benjamin Constant tarafından savunulduğu üzere, adem-i merkeziyetçiliğin bireysel özerkliğe doğru itilmesini mantıksal olarak destekler. Diğer seçenekler farklı kavramlarla ilgilidir: evrensel güvenlik ihtiyaçları kolektif koruma gerekliliklerini açıklar, müşteri-tedarikçi ilişkileri karşılıklı fayda yoluyla sosyal uyum yaratır ve acı aktarımı saldırmazlık ilkesinin fizyolojik temelini oluşturur. Sadece insan çeşitliliği, merkezi planlamanın neden farklı bireyler için işe yaramayacağını göstererek siyasi ademi merkeziyetçiliği doğrudan haklı çıkarır.
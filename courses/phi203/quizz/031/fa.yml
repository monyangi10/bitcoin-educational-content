question: اصل عدم تمرکز در آزادی سیاسی طبق این فصل از کجا نشأت می‌گیرد؟
answer: تنوع نیازها، ترجیحات و شرایط انسانی که به طور اساسی فردی هستند
wrong_answers:
  - نیاز جهانی به امنیت که نمی‌تواند تنها توسط افراد برآورده شود
  - روابط اقتصادی بین مشتریان و تأمین‌کنندگان در بازارهای آزاد
  - تجربه فیزیولوژیکی درد که از طریق سیستم عصبی منتقل می‌شود
explanation: |
  اصل تمرکززدایی بر تنوع انسانی استوار است - این واقعیت که افراد نیازها، ترجیحات و شرایط متفاوتی دارند که عمدتاً ماهیتی فردی دارند. این تنوع به طور منطقی از پیشبرد تمرکززدایی به سمت خودمختاری فردی حمایت می‌کند، همان‌طور که بنجامین کنستانت دفاع کرده است. گزینه‌های دیگر به مفاهیم متفاوتی مربوط می‌شوند: نیازهای امنیتی جهانی توضیح‌دهنده الزامات حفاظت جمعی هستند، روابط مشتری-تأمین‌کننده از طریق منافع متقابل هماهنگی اجتماعی ایجاد می‌کنند، و انتقال درد پایه فیزیولوژیکی برای اصل عدم تجاوز را برقرار می‌کند. تنها تنوع انسانی به طور مستقیم تمرکززدایی سیاسی را توجیه می‌کند با نشان دادن اینکه چرا برنامه‌ریزی متمرکز نمی‌تواند برای افراد متنوع کار کند.
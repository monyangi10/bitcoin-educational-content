question: Millest tuleneb peatüki kohaselt poliitilise vabaduse detsentraliseerimise põhimõte?
answer: Inimeste vajaduste, eelistuste ja asjaolude mitmekesisus, mis on põhimõtteliselt individuaalne
wrong_answers:
  - Universaalne vajadus turvalisuse järele, mida üksikisikud üksi ei suuda rahuldada
  - Klientide ja tarnijate vahelised majandussuhted vabaturul
  - Närvisüsteemi kaudu edastatav valu füsioloogiline kogemus
explanation: |
  Detsentraliseerimise põhimõte põhineb inimeste mitmekesisusel - asjaolul, et inimestel on erinevad vajadused, eelistused ja asjaolud, mis on eelkõige individuaalsed. See mitmekesisus toetab loogiliselt detsentraliseerimise tõukamist individuaalsele autonoomiale, nagu seda kaitses Benjamin Constant. Teised valikud on seotud erinevate kontseptsioonidega: universaalsed julgeolekuvajadused seletavad kollektiivse kaitse nõudeid, kliendi ja tarnija suhted loovad sotsiaalse harmoonia vastastikuse kasu kaudu ja valu ülekandmine loob füsioloogilise aluse mitteagressiooni põhimõttele. Ainult inimeste mitmekesisus õigustab otseselt poliitilist detsentraliseerimist, näidates, miks tsentraliseeritud planeerimine ei saa erinevate indiviidide puhul toimida.
question: 根據本章所述，政治自由中的分權原則源自於什麼？
answer: 人類的各種需求、偏好和情況，基本上都是個人化的
wrong_answers:
  - 單靠個人無法滿足對安全的普遍需求
  - 自由市場中客戶與供應商的經濟關係
  - 透過神經系統傳遞的疼痛生理體驗
explanation: |
  分權原則的基礎在於人類的多樣性 - 人們有不同的需求、偏好和環境，而這些主要是個人性質的。這種多樣性在邏輯上支持將分權推向個人自治，正如本傑明‧康斯坦特（Benjamin Constant）所辯護的。其他的選擇則與不同的概念有關：普遍的安全需求解釋了集體保護的要求，客戶與供應者的關係透過互惠互利創造了社會和諧，而疼痛的傳播則建立了不侵犯原則的生理基礎。只有人類的多樣性直接證明了政治分權的合理性，證明了為什麼集中式的規劃無法對多樣的個體發揮作用。
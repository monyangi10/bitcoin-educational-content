question: Kanuni ya ugatuzi katika uhuru wa kisiasa inatokana na nini kulingana na sura hiyo?
answer: Aina mbalimbali za mahitaji, mapendeleo na hali za kibinadamu ambazo kimsingi ni za kibinafsi
wrong_answers:
  - Hitaji la usalama la ulimwengu wote ambalo haliwezi kutoshelezwa na watu binafsi pekee
  - Uhusiano wa kiuchumi kati ya wateja na wauzaji katika masoko huria
  - Uzoefu wa kisaikolojia wa maumivu yanayopitishwa kupitia mfumo wa neva
explanation: |
  Kanuni ya ugatuzi hupata msingi wake katika utofauti wa binadamu - ukweli kwamba watu wana mahitaji, mapendeleo, na hali tofauti ambazo kimsingi ni za mtu binafsi. Utofauti huu kimantiki unaunga mkono kusukuma ugatuzi kwa uhuru wa mtu binafsi, kama ilivyotetewa na Benjamin Constant. Chaguzi zingine zinahusiana na dhana tofauti: mahitaji ya usalama wa jumla yanaelezea mahitaji ya ulinzi wa pamoja, uhusiano kati ya mteja na muuzaji huunda maelewano ya kijamii kupitia manufaa ya pande zote, na maambukizi ya maumivu huweka msingi wa kisaikolojia wa kanuni isiyo ya uchokozi. Utofauti wa binadamu pekee ndio unaohalalisha moja kwa moja ugatuzi wa kisiasa kwa kuonyesha kwa nini mipango ya kati haiwezi kufanya kazi kwa watu mbalimbali.
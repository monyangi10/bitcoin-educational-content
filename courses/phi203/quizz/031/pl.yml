question: Z czego według rozdziału wynika zasada decentralizacji wolności politycznej?
answer: Różnorodność ludzkich potrzeb, preferencji i okoliczności, które są zasadniczo indywidualne
wrong_answers:
  - Uniwersalna potrzeba bezpieczeństwa, której nie mogą zaspokoić same jednostki
  - Relacje ekonomiczne między klientami i dostawcami na wolnym rynku
  - Fizjologiczne doświadczenie bólu przekazywane przez układ nerwowy
explanation: |
  Zasada decentralizacji opiera się na ludzkiej różnorodności - fakcie, że ludzie mają różne potrzeby, preferencje i okoliczności, które mają przede wszystkim charakter indywidualny. Ta różnorodność logicznie wspiera dążenie do decentralizacji na rzecz indywidualnej autonomii, której bronił Benjamin Constant. Pozostałe opcje odnoszą się do różnych koncepcji: uniwersalne potrzeby bezpieczeństwa wyjaśniają wymogi ochrony zbiorowej, relacje klient-dostawca tworzą harmonię społeczną poprzez wzajemne korzyści, a przenoszenie bólu ustanawia fizjologiczną podstawę zasady nieagresji. Jedynie ludzka różnorodność bezpośrednio uzasadnia polityczną decentralizację, pokazując, dlaczego scentralizowane planowanie nie może działać na rzecz różnorodnych jednostek.
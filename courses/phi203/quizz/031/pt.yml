question: De acordo com o capítulo, qual é a origem do princípio da descentralização na liberdade política?
answer: A variedade de necessidades, preferências e circunstâncias humanas que são fundamentalmente individuais
wrong_answers:
  - A necessidade universal de segurança que não pode ser satisfeita apenas pelos indivíduos
  - As relações económicas entre clientes e fornecedores em mercados livres
  - A experiência fisiológica da dor transmitida através do sistema nervoso
explanation: |
  O princípio da descentralização encontra o seu fundamento na variedade humana - o facto de as pessoas terem necessidades, preferências e circunstâncias diferentes, que são essencialmente de natureza individual. Esta diversidade permite, logicamente, empurrar a descentralização para a autonomia individual, como defende Benjamin Constant. As outras opções estão relacionadas com conceitos diferentes: as necessidades universais de segurança explicam as exigências de proteção colectiva, as relações cliente-fornecedor criam harmonia social através do benefício mútuo e a transmissão da dor estabelece a base fisiológica para o princípio da não agressão. Só a variedade humana justifica diretamente a descentralização política, demonstrando por que razão o planeamento centralizado não pode funcionar para indivíduos diversos.
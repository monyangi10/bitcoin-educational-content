question: ¿Cuál era la actitud de Napoleón hacia el grupo de pensadores que él llamaba "Idéologues"?
answer: Les dio este nombre de forma peyorativa, aunque más tarde admitió que desconocía el propósito de sus propias conquistas
wrong_answers:
  - Los elogió como pensadores prácticos que entendían el mundo real mejor que los teóricos abstractos
  - Adoptó sus teorías al completo y las aplicó a lo largo de sus campañas militares
  - Las ignoró por completo porque las consideraba irrelevantes para los asuntos políticos y militares
explanation: |
  Napoleón acuñó el término "Idéologues" como un insulto, despreciando a estos pensadores como teóricos poco prácticos. Sin embargo, la ironía fue que, mientras los criticaba por estar desconectados de la realidad, el propio Napoleón admitió más tarde en Santa Elena que ni siquiera entendía el propósito de sus propias conquistas. Los Idéologues, a pesar de ser tachados de meros teóricos, en realidad tenían una comprensión coherente de la acción humana y a menudo eran ellos mismos practicantes (como el médico Cabanis y el agrónomo Destutt de Tracy), mientras que el supuesto "hombre de acción" Napoleón carecía de una dirección clara.
question: Napolyon'un 'İdéologues' adını verdiği düşünürler grubuna karşı tutumu neydi?
answer: Onlara bu ismi aşağılayıcı bir şekilde verdi, ancak daha sonra kendi fetihlerinin amacını bilmediğini itiraf etti
wrong_answers:
  - Onları gerçek dünyayı soyut teorisyenlerden daha iyi anlayan pratik düşünürler olarak övdü
  - Onların teorilerini toptan benimsedi ve askeri seferleri boyunca uyguladı
  - Onları tamamen görmezden geldi çünkü siyasi ve askeri meselelerle ilgileri olmadığını düşünüyordu
explanation: |
  Napolyon 'Idéologues' terimini bir hakaret olarak kullanmış ve bu düşünürleri pratik olmayan teorisyenler olarak nitelendirmiştir. Ancak ironik olan, onları gerçeklikten kopuk olmakla eleştirirken, Napolyon'un daha sonra Saint Helena'da kendi fetihlerinin amacını bile anlamadığını itiraf etmesiydi. İdéologue'lar, salt teorisyen olarak yaftalanmalarına rağmen, aslında insan eylemine dair tutarlı bir anlayışa sahiptiler ve çoğu zaman kendileri de uygulayıcıydılar (hekim Cabanis ve ziraatçı Destutt de Tracy gibi), oysa sözde 'eylem adamı' Napolyon net bir yönden yoksundu.
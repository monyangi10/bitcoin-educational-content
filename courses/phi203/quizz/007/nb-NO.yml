question: Hva var Napoleons holdning til gruppen av tenkere han kalte "Idéologues"?
answer: Han ga dem dette navnet på en nedsettende måte, men innrømmet senere at han ikke visste hensikten med sine egne erobringer
wrong_answers:
  - Han hyllet dem som praktiske tenkere som forstod den virkelige verden bedre enn abstrakte teoretikere
  - Han adopterte teoriene deres i sin helhet og implementerte dem i alle sine felttog
  - Han ignorerte dem fullstendig fordi han anså dem som irrelevante for politiske og militære anliggender
explanation: |
  Napoleon skapte begrepet "Idéologues" som en fornærmelse, og avfeide disse tenkerne som upraktiske teoretikere. Det ironiske var imidlertid at Napoleon selv, samtidig som han kritiserte dem for å være virkelighetsfjerne, senere innrømmet på Sankt Helena at han ikke engang forsto formålet med sine egne erobringer. Idéologene, til tross for at de ble stemplet som teoretikere, hadde faktisk en sammenhengende forståelse av menneskelig handling og var ofte praktikere selv (som legen Cabanis og jordbrukseksperten Destutt de Tracy), mens den påståtte "handlingens mann" Napoleon manglet en klar retning.
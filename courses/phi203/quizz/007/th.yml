question: ทัศนคติของนโปเลียนต่อกลุ่มนักคิดที่เขาเรียกว่า 'Idéologues' คืออะไร?
answer: เขาให้ชื่อพวกเขาในทางดูถูก แต่ต่อมายอมรับว่าเขาไม่รู้จุดประสงค์ของการพิชิตของตัวเอง
wrong_answers:
  - เขายกย่องพวกเขาในฐานะนักคิดเชิงปฏิบัติที่เข้าใจโลกแห่งความเป็นจริงได้ดีกว่านักทฤษฎีเชิงนามธรรม
  - เขานำทฤษฎีของพวกเขามาใช้ทั้งหมดและนำไปใช้ตลอดการรณรงค์ทางทหารของเขา
  - เขาเพิกเฉยต่อพวกเขาอย่างสิ้นเชิงเพราะเขาถือว่าพวกเขาไม่เกี่ยวข้องกับกิจการทางการเมืองและการทหาร
explanation: |
  นโปเลียนบัญญัติคำว่า 'Idéologues' เป็นคำดูถูก โดยมองว่าผู้คิดเหล่านี้เป็นนักทฤษฎีที่ไม่สามารถนำไปปฏิบัติได้ อย่างไรก็ตาม ความประชดประชันคือในขณะที่เขาวิจารณ์พวกเขาว่าไม่เชื่อมโยงกับความเป็นจริง นโปเลียนเองกลับยอมรับที่เซนต์เฮเลนาว่าเขาไม่เข้าใจจุดประสงค์ของการพิชิตของเขาเองด้วยซ้ำ Idéologues แม้จะถูกตราหน้าว่าเป็นเพียงนักทฤษฎี แต่จริงๆ แล้วพวกเขามีความเข้าใจที่สอดคล้องกันเกี่ยวกับการกระทำของมนุษย์และมักจะเป็นผู้ปฏิบัติเอง (เช่น Cabanis แพทย์และ Destutt de Tracy นักเกษตรกรรม) ในขณะที่นโปเลียนซึ่งถูกมองว่าเป็น 'คนของการกระทำ' กลับขาดทิศทางที่ชัดเจน
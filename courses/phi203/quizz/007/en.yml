question: What was Napoleon's attitude toward the group of thinkers he called 'Idéologues'?
answer: He gave them this name in a pejorative way, yet later admitted he didn't know the purpose of his own conquests
wrong_answers:
  - He praised them as practical thinkers who understood the real world better than abstract theorists
  - He adopted their theories wholesale and implemented them throughout his military campaigns
  - He ignored them completely because he considered them irrelevant to political and military affairs
explanation: |
  Napoleon coined the term 'Idéologues' as an insult, dismissing these thinkers as impractical theorists. However, the irony was that while criticizing them for being disconnected from reality, Napoleon himself later admitted at Saint Helena that he didn't even understand the purpose of his own conquests. The Idéologues, despite being labeled as mere theorists, actually had a coherent understanding of human action and were often practitioners themselves (like Cabanis the physician and Destutt de Tracy the agriculturalist), while the supposed 'man of action' Napoleon lacked clear direction.

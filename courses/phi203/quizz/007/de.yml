question: Wie stand Napoleon zu der Gruppe von Denkern, die er "Idéologen" nannte?
answer: Er gab ihnen diesen Namen in abwertender Weise, gab aber später zu, dass er den Zweck seiner eigenen Eroberungen nicht kannte
wrong_answers:
  - Er lobte sie als praktische Denker, die die reale Welt besser verstehen als abstrakte Theoretiker
  - Er übernahm ihre Theorien in vollem Umfang und setzte sie in seinen Feldzügen um
  - Er ignorierte sie völlig, weil er sie als irrelevant für politische und militärische Angelegenheiten ansah
explanation: |
  Napoleon prägte den Begriff "Idéologues" als Schimpfwort und bezeichnete diese Denker als unpraktische Theoretiker. Die Ironie dabei war, dass Napoleon, der ihnen Realitätsferne vorwarf, später in St. Helena selbst zugab, dass er nicht einmal den Zweck seiner eigenen Eroberungen verstanden hatte. Obwohl die Idéologen als reine Theoretiker bezeichnet wurden, verfügten sie in Wirklichkeit über ein kohärentes Verständnis des menschlichen Handelns und waren oft selbst Praktiker (wie der Arzt Cabanis und der Landwirt Destutt de Tracy), während dem vermeintlichen "Mann der Tat" Napoleon eine klare Orientierung fehlte.
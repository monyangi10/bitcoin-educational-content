question: None Napoléon yari afise inyifato iyihe ku bijanye n’umugwi w’abanyabwenge yise ‘Idéologues’?
answer: Yarabahaye iryo zina mu buryo bwo kubasuzugura, yamara mu nyuma yemera ko atazi intumbero y’ivyo yigaruriye .
wrong_answers:
  - Yarabashimagije ko ari abantu biyumvira mu buryo bukora kandi batahura neza isi nyakuri kuruta abahinga mu vy’inyigisho zitaboneka .
  - Yaremeye ivyiyumviro vyabo vyinshi maze arabishira mu ngiro mu bikorwa vyiwe vyose vy’igisirikare .
  - Yaravyirengagije rwose kuko yabona ko ata co bimaze mu vya politike no mu vya gisirikare .
explanation: |
  Napoléon yashizeho ijambo ‘Idéologues’ nk’ugutuka, akuraho abo biyumvira ko ari abahinga mu vy’inyigisho zidakora. Ariko rero, ikintu giteye isoni ni uko mu gihe yariko arabanegura ko batagira aho bahuriye n’ukuri, Napoléon ubwiwe mu nyuma yaremeye i Sainte-Hélène ko mbere atatahura intumbero y’ivyo yigaruriye. Aba Idéologues, naho bavugwa ko ari abahinga mu vy’inyigisho gusa, mu vy’ukuri bari bafise ugutahura guhuye kw’ibikorwa vy’umuntu kandi kenshi na kenshi bari abakozi ubwabo (nka Cabanis umuganga na Destutt de Tracy umuhinga mu vy’uburimyi), mu gihe Napoléon yitwa ko ari ‘umuntu w’ibikorwa’ ata buyobozi butomoye yari afise.
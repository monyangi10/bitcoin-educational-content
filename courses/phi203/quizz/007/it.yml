question: Qual era l'atteggiamento di Napoleone nei confronti del gruppo di pensatori che chiamava "Idéologues"?
answer: Ha dato loro questo nome in senso peggiorativo, ma in seguito ha ammesso di non conoscere lo scopo delle sue conquiste
wrong_answers:
  - Li elogiava come pensatori pratici che comprendevano il mondo reale meglio dei teorici astratti
  - Egli adottò in toto le loro teorie e le mise in pratica durante le sue campagne militari
  - Le ignorò completamente perché le considerava irrilevanti per gli affari politici e militari
explanation: |
  Napoleone coniò il termine "Idéologues" come insulto, liquidando questi pensatori come teorici poco pratici. Tuttavia, l'ironia della sorte volle che, mentre li criticava per il loro scollamento dalla realtà, lo stesso Napoleone ammise in seguito a Sant'Elena di non comprendere nemmeno lo scopo delle sue stesse conquiste. Gli Idéologues, nonostante fossero etichettati come semplici teorici, avevano in realtà una comprensione coerente dell'azione umana e spesso erano essi stessi dei praticanti (come il medico Cabanis e l'agrario Destutt de Tracy), mentre il presunto "uomo d'azione" Napoleone mancava di una direzione chiara.
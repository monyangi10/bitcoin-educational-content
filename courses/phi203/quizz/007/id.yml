question: Bagaimana sikap Napoleon terhadap kelompok pemikir yang disebutnya 'Idéologues'?
answer: Dia memberi mereka nama ini dengan cara yang merendahkan, namun kemudian mengakui bahwa dia tidak tahu tujuan penaklukannya sendiri
wrong_answers:
  - Dia memuji mereka sebagai pemikir praktis yang memahami dunia nyata lebih baik daripada para ahli teori abstrak
  - Dia mengadopsi teori-teori mereka secara besar-besaran dan menerapkannya di seluruh kampanye militernya
  - Dia mengabaikannya sama sekali karena dia menganggapnya tidak relevan dengan urusan politik dan militer
explanation: |
  Napoleon menciptakan istilah 'Idéologues' sebagai sebuah penghinaan, menganggap para pemikir ini sebagai ahli teori yang tidak praktis. Namun, ironisnya, ketika mengkritik mereka karena terputus dari kenyataan, Napoleon sendiri kemudian mengakui di Saint Helena bahwa ia bahkan tidak memahami tujuan penaklukannya sendiri. Para Idéolog, meskipun dicap sebagai ahli teori belaka, sebenarnya memiliki pemahaman yang koheren tentang tindakan manusia dan sering kali merupakan praktisi sendiri (seperti Cabanis sang dokter dan Destutt de Tracy sang ahli pertanian), sementara Napoleon yang dianggap sebagai 'orang yang beraksi' tidak memiliki arah yang jelas.
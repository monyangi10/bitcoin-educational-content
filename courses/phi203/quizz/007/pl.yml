question: Jaki był stosunek Napoleona do grupy myślicieli, których nazywał "Idéologues"?
answer: Nadał im tę nazwę w pejoratywny sposób, ale później przyznał, że nie znał celu swoich podbojów
wrong_answers:
  - Chwalił ich jako praktycznych myślicieli, którzy rozumieli rzeczywisty świat lepiej niż abstrakcyjni teoretycy
  - Przyjął ich teorie hurtowo i wdrożył je podczas swoich kampanii wojskowych
  - Zignorował je całkowicie, ponieważ uznał je za nieistotne dla spraw politycznych i wojskowych
explanation: |
  Napoleon ukuł termin "Idéologues" jako obelgę, odrzucając tych myślicieli jako niepraktycznych teoretyków. Ironią losu było jednak to, że krytykując ich za oderwanie od rzeczywistości, sam Napoleon przyznał później na Świętej Helenie, że nie rozumiał nawet celu swoich własnych podbojów. Idéologues, pomimo tego, że byli określani jako zwykli teoretycy, w rzeczywistości mieli spójne zrozumienie ludzkiego działania i często sami byli praktykami (jak lekarz Cabanis i rolnik Destutt de Tracy), podczas gdy rzekomemu "człowiekowi czynu" Napoleonowi brakowało jasnego kierunku.
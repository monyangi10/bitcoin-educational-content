question: Kuidas suhtus Napoleon mõtlejate rühma, keda ta nimetas "Idéologues"?
answer: Ta andis neile selle nime halvustavalt, kuid hiljem tunnistas, et ei teadnud oma vallutuste eesmärki
wrong_answers:
  - Ta kiitis neid kui praktilisi mõtlejaid, kes mõistavad tegelikku maailma paremini kui abstraktsed teoreetikud
  - Ta võttis nende teooriad täielikult üle ja rakendas neid kogu oma sõjakäikude jooksul
  - Ta ignoreeris neid täielikult, sest pidas neid poliitilistes ja sõjalistes küsimustes ebaoluliseks
explanation: |
  Napoleon lõi solvanguna termini "idéologues", jättes need mõtlejad kõrvale kui ebapraktilised teoreetikud. Iroonia seisnes aga selles, et kritiseerides neid tegelikkusest lahusoleku pärast, tunnistas Napoleon hiljem Saint Helenas ise, et ta ei mõistnud isegi omaenda vallutuste eesmärki. Idéoloogidel, hoolimata sellest, et neid nimetati pelgalt teoreetikuteks, oli tegelikult sidus arusaam inimtegevusest ja nad olid sageli ise praktikud (nagu arst Cabanis ja põllumajandusteadlane Destutt de Tracy), samas kui väidetaval "tegude mehel" Napoleonil puudusid selged suunad.
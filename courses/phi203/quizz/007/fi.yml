question: Miten Napoleon suhtautui ajattelijoiden ryhmään, jota hän kutsui "idéologeiksi"?
answer: Hän antoi heille tämän nimen halventavalla tavalla, mutta myönsi myöhemmin, ettei tiennyt omien valloitustensa tarkoitusta
wrong_answers:
  - Hän kehui heitä käytännöllisiksi ajattelijoiksi, jotka ymmärsivät reaalimaailmaa paremmin kuin abstraktit teoreetikot
  - Hän omaksui heidän teoriansa ja toteutti niitä koko sotaretkensä ajan
  - Hän jätti ne kokonaan huomiotta, koska piti niitä poliittisten ja sotilaallisten asioiden kannalta merkityksettöminä
explanation: |
  Napoleon käytti termiä "idéologues" loukkauksena ja hylkäsi nämä ajattelijat epäkäytännöllisinä teoreetikkoina. Ironista oli kuitenkin se, että samalla kun Napoleon kritisoi heitä todellisuudesta irtautuneiksi, hän itse myönsi myöhemmin Saint Helenassa, ettei hän edes ymmärtänyt omien valloitustensa tarkoitusta. Vaikka idéologit leimattiin pelkiksi teoreetikoiksi, heillä oli itse asiassa johdonmukainen käsitys inhimillisestä toiminnasta, ja he olivat usein itse käytännön toimijoita (kuten lääkäri Cabanis ja maanviljelijä Destutt de Tracy), kun taas oletetulla "toiminnan miehellä" Napoleonilla ei ollut selkeää suuntaa.
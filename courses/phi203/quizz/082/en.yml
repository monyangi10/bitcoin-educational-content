question: According to the text, why does the increasingly intellectual character of work in the 21st century favor the expansion of freedom?
answer: Because intellectual production requires free debate and the competition of ideas, making religious tolerance, freedom of expression, and free education practically necessary
wrong_answers:
  - Because intellectual work is cleaner and less physically demanding, giving workers more time and energy to participate in civic life
  - Because knowledge workers earn higher wages, allowing them to purchase legal protections and political influence that manual workers cannot afford
  - Because intellectual activity is harder to monitor and control than physical labor, giving workers de facto freedom regardless of political conditions
explanation: |
  The text argues that the development of thought does not happen by miracle — it requires free debate and the competition of ideas. In societies where production depended on brute force, educational freedom and intellectual liberty had no particular importance. As work becomes increasingly intellectual, authoritarian systems of education and thought become counterproductive, because they treat truth as fixed and transmittable rather than as something created and improved. The practical demands of an intellectual economy therefore impose freedom of expression, free education, and religious tolerance as functional necessities, not merely moral aspirations.

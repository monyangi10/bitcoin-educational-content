question: Според представената либерална теория за нациите, какво отличава легитимната национална организация от историческото формиране на нациите?
answer: Нациите трябва да функционират като доброволни асоциации за управление на правосъдието и полицията, основани на договорни споразумения, а не на наложено единство
wrong_answers:
  - Нациите трябва да се формират въз основа на общи езикови, културни и исторически характеристики, които създават естествено единство между народите
  - Нациите извличат легитимност от териториалните завоевания и способността да поддържат политически контрол върху разширените групи от населението
  - За да постигнат истинско политическо единство и ефективно управление, нациите трябва да отдадат приоритет на колективните интереси пред индивидуалните права
explanation: |
  Текстът изрично доказва, че традиционните оправдания за национално единство (език, култура, история) не издържат на безпристрастен анализ, тъй като историческото формиране на нациите е станало чрез опортюнистично разширяване на политическата клиентела, а не чрез културна близост. Либералната концепция преосмисля нациите като доброволни сдружения, в които индивидите организират правосъдието и полицейската администрация, като отхвърля схващането, че нациите са висши образувания, които доминират над индивидите. Тази договорна основа рязко контрастира с историческите модели на експанзия, основана на завоевания, и на колективно господство над индивидуалната автономия.
question: Hva skiller legitim nasjonal organisering fra historisk nasjonsdannelse, ifølge den liberale nasjonsteorien som presenteres?
answer: Nasjoner bør fungere som frivillige sammenslutninger for administrasjon av rettsvesen og politi, basert på kontraktfestede avtaler snarere enn påtvunget enhet
wrong_answers:
  - Nasjoner bør dannes på grunnlag av felles språklige, kulturelle og historiske kjennetegn som skaper naturlig samhold mellom folkeslagene
  - Nasjoner henter legitimitet fra territoriell erobring og evnen til å opprettholde politisk kontroll over utvidede klientgrupper
  - Nasjoner må prioritere kollektive interesser fremfor individuelle rettigheter for å oppnå ekte politisk enhet og effektivt styresett
explanation: |
  Teksten argumenterer eksplisitt for at tradisjonelle begrunnelser for nasjonal enhet (språk, kultur, historie) ikke tåler en upartisk analyse, ettersom den historiske nasjonsdannelsen skjedde gjennom opportunistisk utvidelse av politisk klientell snarere enn kulturell tilhørighet. Den liberale oppfatningen ser på nasjoner som frivillige sammenslutninger der individer organiserer rettsvesen og politi, og avviser forestillingen om at nasjoner er overlegne enheter som dominerer individer. Dette kontraktsfestede grunnlaget står i skarp kontrast til historiske mønstre med erobringsbasert ekspansjon og kollektiv dominans over individuell autonomi.
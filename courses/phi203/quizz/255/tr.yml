question: Sunulan liberal uluslar teorisine göre, meşru ulusal örgütlenmeyi tarihsel ulus oluşumundan ayıran nedir?
answer: Uluslar, dayatılan birlikten ziyade sözleşmeye dayalı anlaşmalar temelinde adalet ve polisin idaresi için gönüllü birlikler olarak işlev görmelidir
wrong_answers:
  - Uluslar, halklar arasında doğal bir birlik oluşturan ortak dilsel, kültürel ve tarihi özelliklere dayalı olarak oluşturulmalıdır
  - Uluslar meşruiyetlerini toprak fetihlerinden ve genişleyen müşteri kitleleri üzerinde siyasi kontrol sağlama becerilerinden alırlar
  - Gerçek bir siyasi birlik ve etkili bir yönetişim için ulusların kolektif çıkarlara bireysel haklardan daha fazla öncelik vermesi gerekir
explanation: |
  Metin, ulusal birlik için geleneksel gerekçelerin (dil, kültür, tarih) tarafsız bir analize dayanmadığını, çünkü tarihsel ulus oluşumunun kültürel yakınlıklardan ziyade siyasi müşterilerin fırsatçı genişlemesi yoluyla gerçekleştiğini açıkça savunmaktadır. Liberal anlayış, ulusları bireylerin adaleti ve polis yönetimini organize ettiği gönüllü birlikler olarak yeniden çerçevelendirir ve ulusların bireylere hükmeden üstün varlıklar olduğu fikrini reddeder. Bu sözleşmeye dayalı temel, fethe dayalı genişleme ve bireysel özerklik üzerinde kolektif hakimiyetin tarihsel örüntüleriyle keskin bir tezat oluşturmaktadır.
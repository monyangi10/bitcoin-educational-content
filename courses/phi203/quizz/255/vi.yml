question: Theo lý thuyết quốc tế tự do được trình bày, điều gì phân biệt tổ chức quốc gia hợp pháp với sự hình thành quốc gia trong lịch sử?
answer: Các quốc gia nên hoạt động như những hiệp hội tự nguyện để quản lý công lý và cảnh sát, dựa trên các thỏa thuận hợp đồng chứ không phải sự thống nhất áp đặt.
wrong_answers:
  - Các quốc gia nên được hình thành dựa trên những đặc điểm chung về ngôn ngữ, văn hóa và lịch sử, tạo nên sự thống nhất tự nhiên giữa các dân tộc.
  - Các quốc gia có được tính hợp pháp từ việc chinh phục lãnh thổ và khả năng duy trì quyền kiểm soát chính trị đối với các tầng lớp dân chúng phụ thuộc ngày càng mở rộng.
  - Để đạt được sự thống nhất chính trị thực sự và quản trị hiệu quả, các quốc gia phải ưu tiên lợi ích tập thể hơn quyền cá nhân.
explanation: |
  Văn bản này lập luận rõ ràng rằng những lý lẽ truyền thống biện minh cho sự thống nhất quốc gia (ngôn ngữ, văn hóa, lịch sử) không thể đứng vững trước sự phân tích khách quan, bởi vì quá trình hình thành quốc gia trong lịch sử diễn ra thông qua sự bành trướng cơ hội của các thế lực chính trị chứ không phải dựa trên sự tương đồng về văn hóa. Quan niệm tự do định hình lại các quốc gia như những hiệp hội tự nguyện, nơi các cá nhân tổ chức việc quản lý công lý và cảnh sát, bác bỏ quan điểm cho rằng các quốc gia là những thực thể vượt trội thống trị các cá nhân. Nền tảng dựa trên hợp đồng này trái ngược hoàn toàn với các mô hình lịch sử về sự bành trướng dựa trên chinh phục và sự thống trị tập thể đối với quyền tự chủ cá nhân.
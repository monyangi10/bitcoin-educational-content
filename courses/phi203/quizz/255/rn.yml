question: Dushingiye ku ciyumviro c’uburenganzira bw’amahanga cashikirijwe, ni igiki gitandukanya umuteguro w’igihugu wemewe n’ugushinga amahanga mu mateka?
answer: Amahanga akwiye gukora nk’amashirahamwe y’ubushake yo gutanga ubutungane n’igipolisi, ashingiye ku masezerano y’amasezerano aho gukora nk’ubumwe butegetswe .
wrong_answers:
  - Amahanga akwiye gushingwa ashingiye ku rurimi, umuco n’amateka basangira bituma haba ubumwe busanzwe hagati y’abantu .
  - Amahanga aronka uburenganzira mu kwigarurira intara no mu bushobozi bwo kuguma afise ububasha bwa politike ku bantu benshi
  - Amahanga ategerezwa gushira imbere inyungu rusangi kuruta uburenganzira bw'umuntu ku giti ciwe kugira ngo ashike ku bumwe nyakuri bwa politike n'ubutegetsi bwiza .
explanation: |
  Ico canditswe kivuga neza ko imvo za kera zituma haba ubumwe bw’igihugu (ururimi, umuco, amateka) zidashobora guhangana n’isesengura ritagira aho ribogamiye, kuko ugushinga igihugu mu mateka kwabaye biciye mu kwagura abaguzi ba politike aho gushingira ku mico kama. Iciyumviro c’ubwigenge gihindura amahanga nk’amashirahamwe y’ubushake aho abantu batunganya ubutungane n’uburongozi bwa polisi, kikanka iciyumviro c’uko amahanga ari ibigo bisumba ibindi biganza abantu. Uwo mushinge w’amasezerano uratandukanye cane n’imirongo y’amateka y’ukwaguka gushingiye ku kwigarurira no kuganza rusangi ku bwigenge bw’umuntu ku giti ciwe.
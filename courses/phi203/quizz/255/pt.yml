question: De acordo com a teoria liberal das nações apresentada, o que distingue a organização nacional legítima da formação histórica de nações?
answer: As nações devem funcionar como associações voluntárias para administrar a justiça e a polícia, com base em acordos contratuais e não numa unidade imposta
wrong_answers:
  - As nações devem ser formadas com base em caraterísticas linguísticas, culturais e históricas comuns que criem uma unidade natural entre os povos
  - As nações obtêm legitimidade da conquista territorial e da capacidade de manter o controlo político sobre populações clientelares alargadas
  - As nações devem dar prioridade aos interesses colectivos sobre os direitos individuais para alcançarem uma verdadeira unidade política e uma governação eficaz
explanation: |
  O texto argumenta explicitamente que as justificações tradicionais para a unidade nacional (língua, cultura, história) não resistem a uma análise imparcial, uma vez que a formação histórica das nações ocorreu através da expansão oportunista de clientelas políticas e não de afinidades culturais. A conceção liberal reformula as nações como associações voluntárias em que os indivíduos organizam a justiça e a administração da polícia, rejeitando a noção de que as nações são entidades superiores que dominam os indivíduos. Esta base contratual contrasta fortemente com os padrões históricos de expansão baseada na conquista e no domínio coletivo sobre a autonomia individual.
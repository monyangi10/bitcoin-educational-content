question: 根據所提出的自由民族理論，合法的民族組織與歷史上的民族形成有何區別？
answer: 各國應根據契約協定，而非強加的統一，作為管理司法和警察的自願協會來運作。
wrong_answers:
  - 國家的形成應基於共同的語言、文化和歷史特徵，這些特徵使各民族自然地團結在一起。
  - 國家的合法性來自於對領土的征服，以及對擴大的客戶群維持政治控制的能力。
  - 國家必須將集體利益放在個人權利之上，才能達到真正的政治統一和有效治理
explanation: |
  文中明確指出，傳統的國家統一理據（語言、文化、歷史）經不起公正的分析，因為歷史上的國家形成是透過政治客戶的機會性擴張，而非文化的親緣關係。自由主義的概念將國家重塑為自願結合的組織，由個人組織司法與警察管理，摒棄國家是主宰個人的優越實體的觀念。這種契約基礎與歷史上以征服為基礎的擴張和集體支配個人自主的模式形成強烈對比。
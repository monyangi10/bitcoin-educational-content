question: Čím se podle předložené liberální teorie národů liší legitimní národní organizace od historického utváření národů?
answer: Národy by měly fungovat jako dobrovolná sdružení pro správu justice a policie, založená na smluvních dohodách, nikoli na vynucené jednotě
wrong_answers:
  - Národy by se měly formovat na základě společných jazykových, kulturních a historických charakteristik, které vytvářejí přirozenou jednotu mezi národy
  - Národy odvozují svou legitimitu od územních výbojů a schopnosti udržet si politickou kontrolu nad rozšířenou klientelou
  - Pro dosažení skutečné politické jednoty a efektivní správy musí národy upřednostnit kolektivní zájmy před právy jednotlivců
explanation: |
  Text výslovně tvrdí, že tradiční ospravedlnění národní jednoty (jazyk, kultura, historie) neobstojí při nestranné analýze, protože k historickému formování národů docházelo spíše oportunistickým rozšiřováním politické klientely než kulturní příbuzností. Liberální pojetí přehodnocuje národy jako dobrovolná sdružení, v nichž jednotlivci organizují soudnictví a policejní správu, a odmítá představu, že národy jsou nadřazené entity, které ovládají jednotlivce. Tento smluvní základ ostře kontrastuje s historickými vzorci expanze založené na dobývání a kolektivní nadvládě nad individuální autonomií.
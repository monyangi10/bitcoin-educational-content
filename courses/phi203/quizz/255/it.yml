question: Secondo la teoria liberale delle nazioni presentata, cosa distingue l'organizzazione nazionale legittima dalla formazione storica della nazione?
answer: Le nazioni dovrebbero funzionare come associazioni volontarie per l'amministrazione della giustizia e della polizia, basate su accordi contrattuali piuttosto che su un'unità imposta
wrong_answers:
  - Le nazioni dovrebbero essere formate sulla base di caratteristiche linguistiche, culturali e storiche condivise che creano un'unità naturale tra i popoli
  - Le nazioni traggono legittimità dalla conquista del territorio e dalla capacità di mantenere il controllo politico su popolazioni clientelari allargate
  - Le nazioni devono dare priorità agli interessi collettivi rispetto ai diritti individuali per raggiungere una vera unità politica e una governance efficace
explanation: |
  Il testo sostiene esplicitamente che le giustificazioni tradizionali per l'unità nazionale (lingua, cultura, storia) non reggono a un'analisi imparziale, poiché la formazione storica delle nazioni è avvenuta attraverso un'espansione opportunistica delle clientele politiche piuttosto che delle affinità culturali. La concezione liberale inquadra le nazioni come associazioni volontarie in cui gli individui organizzano l'amministrazione della giustizia e della polizia, rifiutando l'idea che le nazioni siano entità superiori che dominano gli individui. Questo fondamento contrattuale contrasta nettamente con i modelli storici di espansione basati sulla conquista e sul dominio collettivo rispetto all'autonomia individuale.
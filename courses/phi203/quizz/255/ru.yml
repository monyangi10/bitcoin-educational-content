question: Что, согласно представленной либеральной теории наций, отличает легитимную национальную организацию от исторического формирования нации?
answer: Нации должны функционировать как добровольные ассоциации по отправлению правосудия и полиции, основанные на договорных соглашениях, а не на навязанном единстве
wrong_answers:
  - Нации должны формироваться на основе общих языковых, культурных и исторических характеристик, которые создают естественное единство между народами
  - Государства черпают легитимность из территориальных завоеваний и способности поддерживать политический контроль над расширенной клиентурой
  - Для достижения подлинного политического единства и эффективного управления страны должны ставить коллективные интересы выше индивидуальных прав
explanation: |
  В тексте прямо утверждается, что традиционные обоснования национального единства (язык, культура, история) не выдерживают беспристрастного анализа, поскольку историческое формирование наций происходило скорее за счет оппортунистического расширения политической клиентуры, чем за счет культурного родства. Либеральная концепция рассматривает нации как добровольные ассоциации, в которых индивиды организуют правосудие и полицейское управление, отвергая идею о том, что нации являются высшими образованиями, которые доминируют над индивидами. Эта договорная основа резко контрастирует с историческими моделями экспансии, основанной на завоеваниях и доминировании коллектива над индивидуальной автономией.
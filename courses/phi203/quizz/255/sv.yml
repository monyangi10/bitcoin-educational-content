question: Vad skiljer, enligt den liberala nationsteori som presenteras, en legitim nationell organisation från en historisk nationsbildning?
answer: Nationer bör fungera som frivilliga sammanslutningar för att administrera rättsväsende och polis, baserat på avtal snarare än påtvingad enighet
wrong_answers:
  - Nationer bör bildas på grundval av gemensamma språkliga, kulturella och historiska egenskaper som skapar en naturlig enhet mellan folken
  - Nationer hämtar legitimitet från territoriell erövring och förmågan att upprätthålla politisk kontroll över utökade kundkretsar
  - Nationer måste prioritera kollektiva intressen framför individuella rättigheter för att uppnå verklig politisk enighet och effektiv styrning
explanation: |
  I texten hävdas uttryckligen att traditionella motiveringar för nationell enhet (språk, kultur, historia) inte tål en opartisk analys, eftersom historisk nationsbildning skedde genom opportunistisk expansion av politiska klientel snarare än kulturella affiniteter. Enligt den liberala uppfattningen är nationer frivilliga sammanslutningar där individer organiserar rättsväsendet och polisväsendet, och man förkastar uppfattningen att nationer är överordnade enheter som dominerar individer. Denna avtalsmässiga grund står i skarp kontrast till historiska mönster av erövringsbaserad expansion och kollektiv dominans över individuell autonomi.
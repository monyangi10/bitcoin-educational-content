question: According to the liberal theory of nations presented, what distinguishes legitimate national organization from historical nation-formation?
answer: Nations should function as voluntary associations for administering justice and police, based on contractual agreements rather than imposed unity
wrong_answers:
  - Nations should be formed based on shared linguistic, cultural, and historical characteristics that create natural unity among peoples
  - Nations derive legitimacy from territorial conquest and the ability to maintain political control over expanded clientele populations
  - Nations must prioritize collective interests over individual rights to achieve true political unity and effective governance
explanation: |
  The text explicitly argues that traditional justifications for national unity (language, culture, history) don't withstand impartial analysis, as historical nation-formation occurred through opportunistic expansion of political clientele rather than cultural affinities. The liberal conception reframes nations as voluntary associations where individuals organize justice and police administration, rejecting the notion that nations are superior entities that dominate individuals. This contractual foundation contrasts sharply with historical patterns of conquest-based expansion and collective dominance over individual autonomy.
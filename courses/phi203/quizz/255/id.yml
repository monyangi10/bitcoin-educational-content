question: Menurut teori liberal tentang negara yang dipaparkan, apa yang membedakan organisasi nasional yang sah dengan pembentukan negara secara historis?
answer: Negara harus berfungsi sebagai asosiasi sukarela untuk mengelola keadilan dan polisi, berdasarkan perjanjian kontrak daripada kesatuan yang dipaksakan
wrong_answers:
  - Bangsa harus dibentuk berdasarkan karakteristik bahasa, budaya, dan sejarah yang sama yang menciptakan persatuan alami di antara masyarakat
  - Negara-negara memperoleh legitimasi dari penaklukan teritorial dan kemampuan untuk mempertahankan kontrol politik atas populasi klien yang diperluas
  - Negara-negara harus memprioritaskan kepentingan kolektif di atas hak-hak individu untuk mencapai persatuan politik yang sejati dan pemerintahan yang efektif
explanation: |
  Teks ini secara eksplisit berargumen bahwa pembenaran tradisional untuk persatuan nasional (bahasa, budaya, sejarah) tidak dapat bertahan dalam analisis yang tidak memihak, karena pembentukan bangsa secara historis terjadi melalui perluasan oportunistik dari klien politik daripada afinitas budaya. Konsepsi liberal membingkai ulang negara sebagai asosiasi sukarela di mana individu-individu mengorganisir keadilan dan administrasi kepolisian, menolak gagasan bahwa negara adalah entitas superior yang mendominasi individu. Landasan kontraktual ini sangat kontras dengan pola historis ekspansi berbasis penaklukan dan dominasi kolektif atas otonomi individu.
question: According to the text's "descending community ladder" argument, what does the socialist willingness to respect collective property rights at the national level reveal when applied consistently downward?
answer: That the same logic must extend to ever-smaller groups — from micro-state to community to family to the individual — exposing the arbitrary refusal to recognise property at the individual level
wrong_answers:
  - That national property rights are uniquely legitimate because nations are the only groups that can enforce borders through military means
  - That collective property is valid only above a minimum threshold of population, below which individual ownership becomes the natural and necessary form
  - That the recognition of national borders is a pragmatic concession to geopolitical reality rather than a principled endorsement of any property concept
explanation: |
  The text argues that once socialists accept collective property at the national level, they are committed to the same logic at every lower scale: the micro-state, the community of a thousand, the community of a hundred, the family, and finally the individual. The first level is always the individual. If we respect the boundaries of property at the level of the group, there is no principled reason to stop before reaching the individual. The text concludes that we remain prisoners of ancient tribal conceptions where collective ownership of a hunting ground was exclusive to all other tribes without being conceived as belonging to the whole human race — and that this tribalism, not principle, explains the selective recognition of property.

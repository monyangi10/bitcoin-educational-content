question: How did Yves Guyot apply the principle of individual liberty to the social questions of feminism, racism, and immigration at the turn of the 20th century?
answer: He argued that any system excluding a part of humanity from the free exercise of their faculties — whether by sex, race, or national origin — is a system of tutelage, not of freedom
wrong_answers:
  - He argued that social distinctions based on sex or race are natural and that liberalism concerns only economic relationships between legally equal citizens
  - He supported limited restrictions on immigration to protect the contractual freedoms of existing citizens from disruption by newcomers unfamiliar with liberal norms
  - He believed feminism was a separate political cause that liberalism should avoid taking positions on, to preserve the coherence of its economic doctrine
explanation: |
  Yves Guyot was one of the most combative French liberals of his generation and applied the principle of freedom consistently across social as well as economic questions. On feminism, he argued that a system excluding half the human race from the enjoyment of its own faculties is not freedom but tutelage. On racism and anti-Semitism, he held that if Jews wished to form communities, practice trades, or profess ideas, this was individual liberty in action. On immigration, he opposed national preference: preventing advantageous contracts by excluding part of humanity from exchange contradicts the very principle of freedom that enables harmony. Freedom of work, exchange, and contract must apply to all without distinction.

question: Согласно анализу систем несвободы, что представляет собой наиболее экстремальную форму порабощения личности в коммунистических режимах?
answer: Тотальный контроль над всей собственностью, кроме неприкосновенного сознания и метафизической свободы мысли
wrong_answers:
  - Полная ликвидация всех прав личности, включая сознание и мыслительные процессы
  - Выборочная конфискация материальных благ при сохранении права собственности на семью и труд
  - Постепенная замена частных услуг государственными через демократические избирательные процессы
explanation: |
  В тексте прямо говорится, что в коммунистических системах человек сохраняет только те свойства себя, которые невозможно нарушить, - неприкосновенное сознание и метафизическую свободу мысли, так как непроявленная мысль остается под индивидуальным контролем. Все остальные свободы исчезают: семейные права, материальная собственность, владение землей, контроль над собственным трудом заменяются государственным регулированием. Неправильные ответы либо преувеличивают степень контроля (уничтожение даже мысли), либо преуменьшают ее (сохранение некоторых прав собственности), либо описывают социалистические, а не коммунистические методы.
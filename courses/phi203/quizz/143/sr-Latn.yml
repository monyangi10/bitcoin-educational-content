question: Prema analizi sistema bez slobode, šta predstavlja najekstremniji oblik individualne potčinjenosti u komunističkim režimima?
answer: Totalna kontrola nad svom imovinom osim nepovredivom svešću i metafizičkom slobodom misli
wrong_answers:
  - Potpuno ukidanje svih individualnih prava uključujući svest i misaone procese
  - Selektivna konfiskacija materijalnih dobara uz očuvanje porodičnih i radnih vlasničkih prava
  - Postepena zamena privatnih usluga javnim putem demokratskih izbornih procesa
explanation: |
  Tekst eksplicitno navodi da u komunističkim sistemima pojedinac zadržava samo one osobine sebe koje je nemoguće slomiti - naime nepovredivu svest i metafizičku slobodu misli, budući da nemanifestovana misao ostaje pod individualnom kontrolom. Sve ostale slobode nestaju: porodična prava, materijalna svojina, vlasništvo nad zemljom i kontrola nad sopstvenim radom zamenjuju se državnom regulacijom. Pogrešni odgovori ili preuveličavaju kontrolu (eliminisanjem čak i misli), potcenjuju je (očuvanjem nekih prava svojine), ili opisuju socijalističke umesto komunističkih metoda.
question: Özgürlükçü olmayan sistemlerin analizine göre, komünist rejimlerde bireysel boyun eğdirmenin en uç biçimini ne temsil eder?
answer: Dokunulmaz bilinç ve metafizik düşünce özgürlüğü dışında tüm mülkiyet üzerinde tam kontrol
wrong_answers:
  - Bilinç ve düşünce süreçleri de dahil olmak üzere tüm bireysel hakların tamamen ortadan kaldırılması
  - Aile ve iş mülkiyeti hakları korunurken maddi mallara seçici olarak el konulması
  - Demokratik seçim süreçleri yoluyla özel hizmetlerin kademeli olarak kamu hizmetleriyle değiştirilmesi
explanation: |
  Metinde açıkça belirtildiği üzere, komünist sistemlerde birey sadece kırılması imkansız olan benlik özelliklerini korur - yani dokunulmaz bilinç ve metafizik düşünce özgürlüğü, çünkü tezahür etmemiş düşünce bireysel kontrol altında kalır. Diğer tüm özgürlükler ortadan kalkar: aile hakları, maddi mülkiyet, toprak mülkiyeti ve kişinin kendi işi üzerindeki kontrolünün yerini devlet düzenlemesi alır. Yanlış cevaplar ya kontrolü abartmakta (düşünceyi bile ortadan kaldırmakta), ya hafife almakta (bazı mülkiyet haklarını korumakta) ya da komünist değil sosyalist yöntemleri tarif etmektedir.
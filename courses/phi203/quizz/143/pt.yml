question: De acordo com a análise dos sistemas sem liberdade, qual é a forma mais extrema de subjugação individual nos regimes comunistas?
answer: Controlo total sobre todos os bens, exceto a consciência inviolável e a liberdade metafísica de pensamento
wrong_answers:
  - Eliminação total de todos os direitos individuais, incluindo a consciência e os processos de pensamento
  - Confisco seletivo de bens materiais, preservando os direitos de propriedade da família e do trabalho
  - Substituição gradual dos serviços privados por serviços públicos através de processos eleitorais democráticos
explanation: |
  O texto afirma explicitamente que, nos sistemas comunistas, o indivíduo conserva apenas as propriedades do eu que são impossíveis de quebrar - nomeadamente a consciência inviolável e a liberdade metafísica do pensamento, uma vez que o pensamento não manifestado permanece sob controlo individual. Todas as outras liberdades desaparecem: os direitos de família, a propriedade material, a propriedade da terra e o controlo do próprio trabalho são substituídos pela regulamentação estatal. As respostas erradas ou exageram o controlo (eliminando até o pensamento), ou o subestimam (preservando alguns direitos de propriedade), ou descrevem métodos socialistas em vez de comunistas.
question: 非自由主義体制の分析によれば、共産主義体制における個人の服従の最も極端な形態は何か？
answer: 不可侵の意識と形而上学的な思想の自由を除くすべての財産を完全に支配する。
wrong_answers:
  - 意識と思考過程を含むすべての個人の権利を完全に排除する。
  - 家族と仕事の所有権を維持しながら、物質的財貨を選択的に没収する。
  - 民主的な選挙プロセスを通じて、私的なサービスを徐々に公的なものに置き換えていく。
explanation: |
  つまり、不可侵の意識と形而上学的な思想の自由である。なぜなら、顕在化していない思想は個人の支配下にあるからだ。家族の権利、物質的所有権、土地の所有権、自分の仕事に対するコントロールは、国家の規制にとって代わられる。間違った答えは、統制を誇張しているか（思考さえも排除している）、控えめにしているか（財産権をいくらか維持している）、共産主義的な方法ではなく社会主義的な方法を述べている。
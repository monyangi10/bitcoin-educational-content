question: Kulingana na uchambuzi wa mifumo isiyo ya uhuru, ni nini kinachowakilisha aina kali zaidi ya ukandamizaji wa mtu binafsi katika tawala za kikomunisti?
answer: Udhibiti kamili wa mali yote isipokuwa fahamu isiyoweza kuharibika na uhuru wa mawazo wa kimetafizikia
wrong_answers:
  - Kuondolewa kabisa kwa haki zote za mtu binafsi ikiwa ni pamoja na fahamu na michakato ya mawazo
  - Unyang'anyi wa kuchagua wa bidhaa huku ukihifadhi haki za umiliki wa familia na kazi
  - Kubadilisha huduma za kibinafsi taratibu na zile za umma kupitia michakato ya uchaguzi ya kidemokrasia
explanation: |
  Maandishi yanasema waziwazi kwamba katika mifumo ya kikomunisti, mtu binafsi huhifadhi sifa zile tu za nafsi ambazo haziwezekani kuzivunja - yaani fahamu isiyoweza kuvunjika na uhuru wa mawazo wa kimetafizikia, kwa kuwa mawazo yasiyodhihirishwa hubaki chini ya udhibiti wa mtu binafsi. Uhuru mwingine wote hutoweka: haki za kifamilia, mali ya kimwili, umiliki wa ardhi, na udhibiti wa kazi ya mtu mwenyewe hubadilishwa na kanuni za serikali. Majibu yasiyo sahihi ama huzidisha udhibiti (kuondoa hata mawazo), kuidharau (kuhifadhi baadhi ya haki za mali), au kuelezea mbinu za kijamaa badala ya kikomunisti.
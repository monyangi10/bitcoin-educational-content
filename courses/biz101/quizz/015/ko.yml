question: 어부의 이야기는 자본의 본질에 대해 무엇을 설명할 수 있을까요?
answer: 자본은 미래의 생산성을 향상시킬 수 있는 도구를 구축할 수 있는 절약된 리소스를 의미합니다.
wrong_answers:
  - 자본은 즉시 소비되기를 기다리는 소비재의 비축에 불과합니다.
  - 정부 대출을 통해 자본을 즉시 조성해야 합니다.
  - 자본은 대기업에만 중요하지 소규모 기업가에게는 중요하지 않습니다.
explanation: |
  창을 만들기 위해 며칠치 물고기를 저장하는 어부는 미래의 이익을 위해 당장의 소비를 미루고 있습니다. 이 예는 저축(자본 축적)이 어떻게 시간이 지남에 따라 더 높은 효율성과 생산량 증가로 이어지는지 보여줍니다.
reviewed: true
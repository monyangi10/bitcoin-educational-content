question: Wat illustreert het verhaal van de visser over de aard van kapitaal?
answer: Kapitaal vertegenwoordigt bespaarde middelen die bouwgereedschappen mogelijk maken om de toekomstige productiviteit te verbeteren.
wrong_answers:
  - Kapitaal is slechts een voorraad consumptiegoederen die wachten om onmiddellijk geconsumeerd te worden.
  - Kapitaal moet onmiddellijk worden gecreëerd door middel van staatsleningen.
  - Kapitaal is alleen belangrijk voor grote bedrijven, niet voor kleine ondernemers.
explanation: |
  De visser die een paar dagen vis spaart om een speer te bouwen, stelt onmiddellijke consumptie uit voor toekomstige winst. Dit voorbeeld laat zien hoe sparen (kapitaalaccumulatie) leidt tot een hogere efficiëntie en een grotere productie in de toekomst.
reviewed: false
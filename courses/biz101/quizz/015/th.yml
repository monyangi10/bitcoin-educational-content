question: เรื่องราวของชาวประมงแสดงให้เห็นถึงธรรมชาติของทุนอย่างไร?
answer: ทุนหมายถึงทรัพยากรที่เก็บสะสมไว้ซึ่งช่วยให้สามารถสร้างเครื่องมือเพื่อปรับปรุงประสิทธิภาพในอนาคตได้
wrong_answers:
  - ทุนคือการสะสมของสินค้าอุปโภคบริโภคที่รอการบริโภคในทันที
  - เงินทุนต้องถูกสร้างขึ้นทันทีผ่านการกู้ยืมจากรัฐบาล
  - ทุนมีความสำคัญเฉพาะสำหรับบริษัทขนาดใหญ่ ไม่ใช่ผู้ประกอบการรายย่อย
explanation: |
  ชาวประมงที่เก็บปลาที่จับได้ไม่กี่วันเพื่อสร้างหอก กำลังเลื่อนการบริโภคทันทีเพื่อผลประโยชน์ในอนาคต ตัวอย่างนี้แสดงให้เห็นว่าการออม (การสะสมทุน) นำไปสู่ประสิทธิภาพที่สูงขึ้นและการผลิตที่เพิ่มขึ้นเมื่อเวลาผ่านไป
reviewed: true
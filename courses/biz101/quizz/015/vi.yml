question: Câu chuyện của người đánh cá minh họa điều gì về bản chất của vốn?
answer: Vốn đại diện cho nguồn tài nguyên được tiết kiệm giúp xây dựng các công cụ cải thiện năng suất trong tương lai.
wrong_answers:
  - Vốn chỉ là một kho dự trữ hàng tiêu dùng đang chờ được tiêu thụ ngay lập tức.
  - Vốn phải được tạo ra ngay lập tức thông qua các khoản vay của chính phủ.
  - Vốn chỉ quan trọng với các tập đoàn lớn chứ không phải với các doanh nhân nhỏ.
explanation: |
  Người đánh cá tiết kiệm số cá đủ dùng trong vài ngày để đóng giáo đang trì hoãn việc tiêu dùng ngay lập tức để thu lợi nhuận trong tương lai. Ví dụ này minh họa cách tiết kiệm (tích lũy vốn) dẫn đến hiệu quả cao hơn và tăng sản lượng theo thời gian.
reviewed: true
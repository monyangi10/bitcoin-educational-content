question: Co historia rybaka ilustruje na temat natury kapitału?
answer: Kapitał reprezentuje zaoszczędzone zasoby, które umożliwiają budowanie narzędzi poprawiających przyszłą produktywność.
wrong_answers:
  - Kapitał jest tylko zapasem dóbr konsumpcyjnych czekających na natychmiastową konsumpcję.
  - Kapitał musi być tworzony natychmiast poprzez pożyczki rządowe.
  - Kapitał ma znaczenie tylko dla dużych korporacji, a nie dla małych przedsiębiorców.
explanation: |
  Rybak, który oszczędza ryby z kilku dni, aby zbudować włócznię, odkłada natychmiastową konsumpcję na rzecz przyszłego zysku. Ten przykład pokazuje, w jaki sposób oszczędzanie (akumulacja kapitału) prowadzi do wyższej wydajności i większej produkcji w przyszłości.
reviewed: false
question: मछुआरे की कहानी पूंजी की प्रकृति के बारे में क्या दिखाती है?
answer: पूंजी बचाए गए संसाधनों को दर्शाती है जो भविष्य की उत्पादकता बढ़ाने के लिए औजार बनाने में मदद करते हैं।
wrong_answers:
  - पूंजी सिर्फ उपभोक्ता सामानों का एक ढेर है जो तुरंत खपत के लिए इंतज़ार कर रहा है।
  - सरकारी कर्ज़े से पूंजी तुरंत बनानी चाहिए।
  - बड़ी कंपनियों के लिए ही पूंजी मायने रखती है, छोटे उद्यमियों के लिए नहीं।
explanation: |
  वो मछुआरा जो कुछ दिनों की मछलियाँ बचाकर एक भाला बनाता है, वह अपनी तात्कालिक खपत को भविष्य के फायदे के लिए टाल रहा है। यह उदाहरण दिखाता है कि बचत (पूँजी संचय) कैसे भविष्य में अधिक दक्षता और ज्यादा उत्पादन की ओर ले जाती है।

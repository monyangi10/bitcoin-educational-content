question: Hadithi ya mvuvi inaonyesha nini kuhusu asili ya mtaji?
answer: Mtaji unawakilisha rasilimali zilizohifadhiwa ambazo huwezesha zana za ujenzi ili kuboresha tija ya siku zijazo.
wrong_answers:
  - Mtaji ni hifadhi tu ya bidhaa za walaji zinazosubiri kuliwa mara moja.
  - Mtaji lazima uundwe mara moja kupitia mikopo ya serikali.
  - Mtaji ni muhimu kwa mashirika makubwa tu, sio wajasiriamali wadogo.
explanation: |
  Mvuvi anayehifadhi samaki wa siku chache ili kutengeneza mkuki anaahirisha matumizi ya mara moja kwa faida ya siku zijazo. Mfano huu unaonyesha jinsi kuokoa (mkusanyiko wa mitaji) kunasababisha ufanisi wa juu na uzalishaji mkubwa chini ya mstari.
reviewed: true

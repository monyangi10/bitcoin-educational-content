question: Inkuru y’umurovyi yerekana iki ku bijanye n’ingene umutungo w’igihugu umeze?
answer: Itunga rigereranya ubutunzi bwazigamye bushoboza ibikoresho vyo kwubaka kugira ngo umuntu ashobore gutanga umusaruro mwiza muri kazoza.
wrong_answers:
  - Itunga ni ububiko gusa bw’ibintu vy’abaguzi bitegereje gukoreshwa ubwo nyene.
  - Itunga ritegerezwa kuremwa ubwo nyene biciye mu ngurane za Leta.
  - Itunga rihambaye gusa ku mashirahamwe manini, si ku bacuruzi batobato.
explanation: |
  Umurovyi azigama ifi z’imisi mikeyi kugira ngo yubake icumu, aba ariko arasubiramwo ukuzirya ubwo nyene kugira ngo aronke inyungu muri kazoza. Aka karorero karerekana ingene kuzigama (kwirundanira umutungo) bituma habaho ubushobozi bwinshi n’umwimbu mwinshi mu nyuma.
reviewed: true

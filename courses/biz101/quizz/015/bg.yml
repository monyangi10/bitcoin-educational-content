question: Какво илюстрира историята на рибаря за естеството на капитала?
answer: Капиталът представлява спестените ресурси, които дават възможност за изграждане на инструменти за подобряване на бъдещата производителност.
wrong_answers:
  - Капиталът е просто запас от потребителски стоки, които чакат да бъдат потребени веднага.
  - Капиталът трябва да се създаде незабавно чрез държавни заеми.
  - Капиталът е от значение само за големите корпорации, но не и за малките предприемачи.
explanation: |
  Рибарят, който спестява риба за няколко дни, за да си направи копие, отлага непосредственото потребление в името на бъдеща печалба. Този пример илюстрира как спестяването (натрупването на капитал) води до по-висока ефективност и увеличаване на производството с течение на времето.
reviewed: true
question: 회사 자금의 일부를 Bitcoin에 할당할 때 일반적으로 권장되는 것은 무엇인가요?
answer: 몇 년 동안 필요하지 않은 초과 유동성만 투자하고 최소 4년의 기간을 유지하세요.
wrong_answers:
  - 유동성 수요를 고려하지 않고 모든 운영 현금을 즉시 사용하세요.
  - 단기 수익을 극대화하기 위해 몇 주 안에 매매하는 것을 목표로 하세요.
  - 비용을 충당하기 위해 긴급한 단기 대출이 필요한 경우에만 투자하세요.
explanation: |
  Bitcoin의 가격은 단기적으로 변동성이 클 수 있으므로 당장 필요하지 않은 자금은 최소 4년 이상 보유하는 것이 현명합니다. 이러한 접근 방식은 변동성을 완화하고 장기적인 가치 상승을 실현할 가능성을 높입니다.
reviewed: true
question: Was wird im Allgemeinen empfohlen, wenn ein Teil der Finanzmittel eines Unternehmens in Bitcoin investiert werden soll?
answer: Nur anlegen überschüssige Liquidität, die in den nächsten Jahren nicht benötigt wird, und einhalten eines Zeithorizonts von mindestens vier Jahren.
wrong_answers:
  - Sofortige Verwendung aller Betriebsmittel ohne Berücksichtigung des Liquiditätsbedarfs.
  - Versuchen, innerhalb weniger Wochen zu kaufen und zu verkaufen, um kurzfristige Gewinne zu erzielen.
  - Nur investieren, wenn dringend ein kurzfristiger Kredit zur Deckung von Ausgaben benötigt wird.
explanation: |
  Da der Bitcoin-Kurs kurzfristig volatil sein kann, ist es ratsam, Mittel zu verwenden, die nicht sofort benötigt werden und mindestens vier Jahre lang gehalten werden. Dieser Ansatz glättet die Volatilität und erhöht die Chancen auf einen langfristigen Wertzuwachs.
reviewed: true

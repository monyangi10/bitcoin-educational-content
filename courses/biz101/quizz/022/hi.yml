question: कंपनी के ट्रेजरी का एक हिस्सा Bitcoin में आवंटित करते समय आमतौर पर क्या सलाह दी जाती है?
answer: केवल उस अतिरिक्त नकदी को निवेश करें जिसकी आपको कई सालों तक ज़रूरत नहीं होगी और कम से कम चार साल का समय सीमा बनाए रखें।
wrong_answers:
  - सारे ऑपरेशनल कैश को तुरंत खर्च कर दो, लिक्विडिटी की जरूरतों की परवाह किए बिना।
  - कुछ हफ़्तों के अंदर खरीदने और बेचने का लक्ष्य रखें ताकि कम समय में ज़्यादा मुनाफ़ा कमाया जा सके।
  - जब तुम्हें जरूरत हो तभी निवेश करो, वो भी तब जब तुरंत छोटे समय के लिए कर्ज चाहिए खर्चे पूरे करने के लिए।
explanation: |
  क्योंकि Bitcoin की कीमत कम समय में उतार-चढ़ाव भरी हो सकती है, इसलिए बेहतर है कि आप ऐसे पैसे इस्तेमाल करें जिनकी आपको अभी जरूरत नहीं है और कम से कम चार साल तक होल्ड करें। इस तरह से उतार-चढ़ाव कम होता है और लंबे समय में कीमत बढ़ने की संभावना बेहतर होती है।
reviewed: false
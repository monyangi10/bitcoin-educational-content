question: Какво обикновено се препоръчва, когато част от съкровищницата на компанията се разпределя към Bitcoin?
answer: Инвестирайте само излишната ликвидност, която няма да ви е необходима в продължение на няколко години, и поддържайте времеви хоризонт от поне четири години.
wrong_answers:
  - Използване на всички оперативни парични средства незабавно, без да се вземат предвид нуждите от ликвидност.
  - Стремете се да купувате и продавате в рамките на няколко седмици, за да увеличите краткосрочните си печалби.
  - Инвестирайте само когато се нуждаете от спешен краткосрочен заем за покриване на разходи.
explanation: |
  Тъй като цената на Bitcoin може да бъде нестабилна в краткосрочен план, разумно е да използвате средствата, които не са ви необходими веднага, и да ги държите поне четири години. Този подход изглажда волатилността и увеличава шансовете за реализиране на дългосрочно нарастване на стойността.
reviewed: true
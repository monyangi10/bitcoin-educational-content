question: Wat wordt over het algemeen aanbevolen bij het toewijzen van een deel van de schatkist van een bedrijf aan Bitcoin?
answer: Beleg alleen overtollige liquiditeiten die je de komende jaren niet nodig hebt en houd een tijdshorizon van minstens vier jaar aan.
wrong_answers:
  - Gebruik al het operationele geld onmiddellijk zonder rekening te houden met liquiditeitsbehoeften.
  - Streef ernaar om binnen een paar weken te kopen en te verkopen om de winst op korte termijn te maximaliseren.
  - Investeer alleen als je een dringende kortetermijnlening nodig hebt om uitgaven te dekken.
explanation: |
  Omdat de prijs van Bitcoin op korte termijn volatiel kan zijn, is het verstandig om fondsen te gebruiken die je niet meteen nodig hebt en deze minstens vier jaar vast te houden. Deze aanpak vlakt de volatiliteit af en vergroot de kans op waardevermeerdering op de lange termijn.
reviewed: false
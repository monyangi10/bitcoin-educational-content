question: Người ta thường khuyến nghị gì khi phân bổ một phần ngân quỹ của công ty cho Bitcoin?
answer: Chỉ đầu tư lượng tiền mặt dư thừa mà bạn sẽ không cần đến trong nhiều năm và duy trì thời hạn đầu tư ít nhất là bốn năm.
wrong_answers:
  - Sử dụng toàn bộ tiền mặt hoạt động ngay lập tức mà không cần cân nhắc đến nhu cầu thanh khoản.
  - Mục tiêu là mua và bán trong vòng vài tuần để tối đa hóa lợi nhuận ngắn hạn.
  - Chỉ đầu tư khi bạn cần một khoản vay ngắn hạn khẩn cấp để trang trải chi phí.
explanation: |
  Vì giá Bitcoin có thể biến động trong ngắn hạn, nên tốt nhất là sử dụng số tiền bạn chưa cần ngay lập tức và nắm giữ trong ít nhất bốn năm. Cách tiếp cận này giúp giảm thiểu biến động và tăng cơ hội nhận được giá trị tăng trưởng dài hạn.
reviewed: true
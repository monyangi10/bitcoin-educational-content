question: Chuyên gia thường khuyến nghị gì khi doanh nghiệp phân bổ một phần ngân quỹ vào Bitcoin?
answer: Chỉ đầu tư lượng tiền mặt dư thừa mà doanh nghiệp sẽ không cần đến trong nhiều năm và duy trì thời hạn đầu tư tối thiểu là bốn năm.
wrong_answers:
  - Sử dụng toàn bộ tiền mặt hoạt động ngay lập tức mà không cần cân nhắc đến nhu cầu thanh khoản.
  - Mục tiêu là mua và bán trong vòng vài tuần để tối đa hóa lợi nhuận ngắn hạn.
  - Chỉ đầu tư khi doanh nghiệp cần một khoản vay ngắn hạn khẩn cấp để trang trải chi phí.
explanation: |
  Vì giá Bitcoin có thể biến động trong ngắn hạn, nên tốt nhất là sử dụng số tiền doanh nghiệp chưa cần ngay lập tức và nắm giữ trong ít nhất bốn năm. Cách tiếp cận này giúp giảm thiểu biến động và tăng cơ hội nhận được giá trị tăng trưởng dài hạn.
reviewed: true
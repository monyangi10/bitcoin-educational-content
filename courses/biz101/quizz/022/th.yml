question: โดยทั่วไปแนะนำอะไรเมื่อจัดสรรส่วนหนึ่งของคลังของบริษัทให้กับ Bitcoin?
answer: ลงทุนเฉพาะสภาพคล่องส่วนเกินที่คุณจะไม่ต้องการใช้เป็นเวลาหลายปี และรักษาแนวโน้มระยะเวลาอย่างน้อยสี่ปี
wrong_answers:
  - ใช้เงินสดจากการดำเนินงานทั้งหมดทันทีโดยไม่พิจารณาความต้องการสภาพคล่อง
  - ตั้งเป้าซื้อและขายภายในไม่กี่สัปดาห์เพื่อเพิ่มผลกำไรระยะสั้นสูงสุด
  - ลงทุนเฉพาะเมื่อคุณต้องการเงินกู้ระยะสั้นเร่งด่วนเพื่อครอบคลุมค่าใช้จ่ายเท่านั้น
explanation: |
  เนื่องจากราคาของ Bitcoin อาจมีความผันผวนในระยะสั้น จึงควรใช้เงินทุนที่คุณไม่จำเป็นต้องใช้ทันทีและถือครองไว้อย่างน้อยสี่ปี วิธีการนี้ช่วยลดความผันผวนและเพิ่มโอกาสในการรับรู้มูลค่าเพิ่มในระยะยาว
reviewed: true
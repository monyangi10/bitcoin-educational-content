question: Waarom wordt schaarste beschouwd als een belangrijke eigenschap van een goede valuta?
answer: Omdat beperkte Supply de waarde ervan beschermt tegen verwatering door overproductie.
wrong_answers:
  - Omdat het ervoor zorgt dat iedereen gemakkelijk zijn eigen valuta kan slaan.
  - Omdat het daardoor moeilijker wordt om de valuta te herkennen.
  - Omdat het het gebruik van valuta in de handel over lange afstanden ontmoedigt.
explanation: |
  Een valuta met gecontroleerde schaarste behoudt zijn koopkracht na verloop van tijd. Zonder schaarste kan overmatige uitgifte leiden tot inflatie, waardoor de waarde van de munt afneemt.

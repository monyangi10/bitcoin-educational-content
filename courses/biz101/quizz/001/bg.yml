question: Защо недостигът се смята за важно свойство на добрата валута?
answer: Защото ограниченото предлагане предпазва стойността на продукта от размиване поради свръхпроизводство.
wrong_answers:
  - Защото гарантира, че всеки може лесно да изкове своя собствена валута.
  - Защото това затруднява разпознаването на валутата.
  - Тъй като тя не насърчава използването на валута в търговията на дълги разстояния.
explanation: |
  Валута с контролиран недостиг запазва покупателната си способност с течение на времето. При липса на недостиг прекомерното емитиране може да доведе до инфлация и да намали стойността на валутата.
reviewed: true
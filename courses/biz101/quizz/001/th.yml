question: ทำไมความขาดแคลนถึงถือว่าเป็นคุณสมบัติที่สำคัญของสกุลเงินที่ดี?
answer: เพราะว่าการมีจำนวนจำกัดช่วยปกป้องมูลค่าของมันจากการถูกลดทอนด้วยการผลิตมากเกินไป
wrong_answers:
  - เพราะมันทำให้ทุกคนสามารถสร้างสกุลเงินของตัวเองได้อย่างง่ายดาย
  - เพราะมันทำให้สกุลเงินยากที่จะได้รับการยอมรับ
  - เพราะมันกีดกันการใช้สกุลเงินในการค้าระยะไกล
explanation: |
  สกุลเงินที่มีการควบคุมความขาดแคลนจะรักษาอำนาจการซื้อของมันไว้ได้ตลอดเวลา หากไม่มีความขาดแคลน การออกสกุลเงินมากเกินไปอาจนำไปสู่อัตราเงินเฟ้อ ซึ่งจะทำให้มูลค่าของสกุลเงินลดลง
reviewed: true
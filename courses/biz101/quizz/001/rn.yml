question: Ni kubera iki ubukene bufatwa nk’ikintu gihambaye c’amahera meza?
answer: Kubera ko Supply ifise aho igarukira irinda agaciro kayo kugira ngo ntikagabanywe n’uguhingura birenze urugero.
wrong_answers:
  - Kuko bituma umuntu wese ashobora gukora amafaranga yiwe bitagoranye.
  - Kuko bituma bigorana ko amafaranga yemerwa.
  - Kuko bica intege gukoresha amafaranga mu bucuruzi bwo kure.
explanation: |
  Ifaranga rifise ubukene bugenzurwa riguma rifise ububasha bwo kugura uko igihe kigenda kirarenga. Hatariho ubukene, gutanga amafaranga birenze urugero vyoshobora gutuma amafaranga agenda araduga, bigatuma agaciro k’amafaranga gahungabana.

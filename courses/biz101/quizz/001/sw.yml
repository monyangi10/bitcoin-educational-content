question: Kwa nini uhaba unachukuliwa kuwa mali muhimu ya sarafu nzuri?
answer: Kwa sababu Supply ndogo hulinda thamani yake kutokana na kupunguzwa kwa uzalishaji kupita kiasi.
wrong_answers:
  - Kwa sababu inahakikisha kwamba kila mtu anaweza kutengeneza sarafu yake kwa urahisi.
  - Kwa sababu inafanya kuwa vigumu kwa sarafu kutambuliwa.
  - Kwa sababu inakatisha tamaa matumizi ya sarafu katika biashara ya masafa marefu.
explanation: |
  Sarafu iliyo na uhaba unaodhibitiwa hudumisha uwezo wake wa ununuzi kwa wakati. Bila uhaba, utoaji wa kupindukia unaweza kusababisha mfumuko wa bei, na kuharibu thamani ya sarafu.
reviewed: true

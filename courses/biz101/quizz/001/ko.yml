question: 희소성이 좋은 화폐의 중요한 속성으로 간주되는 이유는 무엇인가요?
answer: 제한된 Supply은 과잉 생산으로 인해 그 가치가 희석되는 것을 방지하기 때문입니다.
wrong_answers:
  - 누구나 쉽게 자신의 화폐를 발행할 수 있기 때문입니다.
  - 통화를 인식하기 어렵게 만들기 때문입니다.
  - 장거리 거래에서 통화 사용을 억제하기 때문입니다.
explanation: |
  희소성이 통제된 통화는 시간이 지나도 구매력을 유지합니다. 희소성이 없으면 과도한 발행은 인플레이션으로 이어져 통화 가치를 떨어뜨릴 수 있습니다.
reviewed: true
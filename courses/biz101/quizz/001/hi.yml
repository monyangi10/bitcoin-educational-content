question: कमी को एक अच्छी करेंसी की महत्वपूर्ण खूबी क्यों माना जाता है?
answer: क्योंकि सीमित Supply अपनी वैल्यू को ज़्यादा उत्पादन से कम होने से बचाता है।
wrong_answers:
  - क्योंकि इससे हर कोई आसानी से अपनी खुद की करेंसी बना सकता है।
  - क्योंकि इससे करेंसी को पहचानना मुश्किल हो जाता है।
  - क्योंकि यह लंबी दूरी के व्यापार में मुद्रा के उपयोग को हतोत्साहित करता है।
explanation: |
  एक ऐसी मुद्रा जिसकी उपलब्धता सीमित हो, वह समय के साथ अपनी क्रय शक्ति बनाए रखती है। अगर यह दुर्लभता न हो, तो ज़रूरत से ज़्यादा मुद्रा छापने से मुद्रास्फीति हो सकती है, जिससे मुद्रा का मूल्य कम हो जाता है।

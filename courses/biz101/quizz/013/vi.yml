question: Theo kinh tế học Áo, tại sao lợi nhuận được coi là chỉ số quan trọng phản ánh tình hình sức khỏe của một công ty?
answer: Bởi vì lợi nhuận cho thấy doanh nghiệp đang đáp ứng nhu cầu của người tiêu dùng một cách hiệu quả và bền vững.
wrong_answers:
  - Bởi vì lợi nhuận đảm bảo lực lượng lao động của công ty là lớn nhất trong ngành.
  - Bởi vì lợi nhuận chỉ là dấu hiệu cho thấy công ty đã nhận được trợ cấp của chính phủ.
  - Bởi vì lợi nhuận phản ánh các sự kiện ngẫu nhiên của thị trường không liên quan đến nhu cầu của người tiêu dùng.
explanation: |
  Trong kinh tế học Áo, lợi nhuận báo hiệu một công ty đang sản xuất hàng hóa hoặc dịch vụ được người tiêu dùng đánh giá cao với mức giá vượt quá chi phí sản xuất. Kết quả này cho thấy việc sử dụng nguồn lực hiệu quả và phù hợp với nhu cầu thị trường.
reviewed: true
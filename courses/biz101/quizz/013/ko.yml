question: 오스트리아 경제학에 따르면 이익이 기업의 건전성을 나타내는 핵심 지표로 간주되는 이유는 무엇일까요?
answer: 수익은 비즈니스가 효율적이고 지속 가능한 방식으로 소비자의 요구를 충족하고 있음을 보여주기 때문입니다.
wrong_answers:
  - 수익을 통해 동종 업계에서 가장 많은 인력을 확보할 수 있기 때문입니다.
  - 수익은 회사가 정부 보조금을 받았다는 신호일 뿐이기 때문입니다.
  - 수익은 소비자 수요와 무관한 무작위적인 시장 이벤트를 반영하기 때문입니다.
explanation: |
  오스트리아 경제학에서 이익은 기업이 생산 원가를 초과하는 가격으로 소비자에게 가치 있는 상품이나 서비스를 생산하고 있다는 신호입니다. 이 결과는 효율적인 자원 사용과 시장의 요구에 부합하는 것을 의미합니다.
reviewed: true
question: Dukurikije ubutunzi bwo muri Otirishiya, ni kubera iki inyungu zibonwa ko ari ikimenyetso nyamukuru c’amagara y’ishirahamwe?
answer: Kuko inyungu zigaragaza ko ubucuruzi buriko burashitsa ivyo abaguzi bakeneye mu buryo bwiza kandi buramba.
wrong_answers:
  - Kuko inyungu zituma abakozi b’iyo sosiyete baba benshi mu bijanye n’ubuhinga bwayo.
  - Kuko inyungu ni ikimenyetso gusa c’uko iyo sosiyete yaronse infashanyo za Leta.
  - Kubera ko inyungu zigaragaza ibintu bishika kw’isoko ataco bihuriyeko n’ivyo abaguzi basaba.
explanation: |
  Mu bukungu bwa Otirishiya, inyungu zigaragaza ko ishirahamwe ririko rikora ibintu canke ibikorwa bihabwa agaciro n’abaguzi ku giciro kiri hejuru y’igiciro co gukora. Ivyo bigaragaza ko umutungo ukoreshwa neza kandi ukawuhuza n’ivyo isoko rikeneye.
reviewed: true

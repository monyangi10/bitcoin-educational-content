question: Waarom wordt winst volgens de Oostenrijkse economie beschouwd als een belangrijke indicator voor de gezondheid van een bedrijf?
answer: Omdat winst aantoont dat het bedrijf efficiënt en duurzaam in de behoeften van de consument voorziet.
wrong_answers:
  - Omdat de winst ervoor zorgt dat het bedrijf het grootste personeelsbestand in zijn sector heeft.
  - Want winst is alleen maar een teken dat het bedrijf overheidssubsidies heeft ontvangen.
  - Omdat winsten willekeurige marktgebeurtenissen weerspiegelen die niets te maken hebben met de vraag van de consument.
explanation: |
  In de Oostenrijkse economie geeft winst aan dat een bedrijf goederen of diensten produceert die door consumenten gewaardeerd worden tegen een prijs die boven de productiekosten ligt. Deze uitkomst suggereert een efficiënt gebruik van hulpbronnen en afstemming op de behoeften van de markt.
reviewed: false
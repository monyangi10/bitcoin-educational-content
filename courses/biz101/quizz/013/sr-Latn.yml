question: Prema austrijskoj ekonomiji, zašto se profiti smatraju ključnim pokazateljem zdravlja kompanije?
answer: Jer profiti pokazuju da posao efikasno i održivo zadovoljava potrebe potrošača.
wrong_answers:
  - Zato što profiti osiguravaju da je radna snaga kompanije najveća u svojoj industriji.
  - Zato što su profiti samo znak da je kompanija dobila državne subvencije.
  - Jer profiti odražavaju nasumične tržišne događaje nepovezane sa zahtevima potrošača.
explanation: |
  U austrijskoj ekonomiji, profit signalizira da kompanija proizvodi dobra ili usluge koje potrošači vrednuju po ceni iznad troškova proizvodnje. Ovaj ishod sugeriše efikasno korišćenje resursa i usklađenost sa potrebama tržišta.

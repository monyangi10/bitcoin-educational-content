question: Kulingana na uchumi wa Austria, kwa nini faida inachukuliwa kuwa kiashirio kikuu cha afya ya kampuni?
answer: Kwa sababu faida inaonyesha biashara inakidhi mahitaji ya watumiaji kwa ufanisi na kwa uendelevu.
wrong_answers:
  - Kwa sababu faida inahakikisha kuwa wafanyikazi wa kampuni ndio wakubwa zaidi katika tasnia yake.
  - Kwa sababu faida ni ishara tu kwamba kampuni ilipokea ruzuku ya serikali.
  - Kwa sababu faida huakisi matukio ya soko nasibu yasiyohusiana na matakwa ya watumiaji.
explanation: |
  Katika uchumi wa Austria, faida huashiria kwamba kampuni inazalisha bidhaa au huduma zinazothaminiwa na watumiaji kwa bei iliyo juu ya gharama ya uzalishaji. Matokeo haya yanapendekeza matumizi bora ya rasilimali na upatanishi na mahitaji ya soko.
reviewed: true

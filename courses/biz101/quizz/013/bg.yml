question: Защо според австрийската икономическа школа печалбата се счита за основен показател за състоянието на компанията?
answer: Защото печалбите показват, че бизнесът задоволява нуждите на потребителите по ефективен и устойчив начин.
wrong_answers:
  - Защото печалбите гарантират, че работната сила на компанията е най-голямата в нейния бранш.
  - Защото печалбата е само знак, че компанията е получила държавни субсидии.
  - Защото печалбите отразяват случайни пазарни събития, които не са свързани с потребителските изисквания.
explanation: |
  В австрийската икономиеска школа печалбата е сигнал, че компанията произвежда стоки или услуги, които се ценят от потребителите на цена, която надвишава производствените разходи. Този резултат предполага ефективно използване на ресурсите и съобразяване с нуждите на пазара.
reviewed: true

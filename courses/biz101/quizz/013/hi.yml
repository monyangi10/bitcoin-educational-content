question: ऑस्ट्रियन इकोनॉमिक्स के मुताबिक, मुनाफ़ा किसी कंपनी की सेहत का अहम संकेतक क्यों माना जाता है?
answer: क्योंकि मुनाफ़ा दिखाता है कि व्यापार ग्राहकों की ज़रूरतों को कुशलता और टिकाऊ तरीके से पूरा कर रहा है।
wrong_answers:
  - क्योंकि मुनाफ़ा यह सुनिश्चित करता है कि कंपनी का कर्मचारी दल उद्योग में सबसे बड़ा हो।
  - क्योंकि मुनाफ़ा सिर्फ़ इस बात का संकेत है कि कंपनी को सरकारी सब्सिडी मिली है।
  - क्योंकि मुनाफ़ा बाज़ार की अंधाधुंध घटनाओं को दिखाता है जो ग्राहकों की मांग से कोई वास्ता नहीं रखतीं।
explanation: |
  ऑस्ट्रियन इकोनॉमिक्स में, मुनाफ़ा यह दिखाता है कि कंपनी ऐसे सामान या सेवाएँ बना रही है जिन्हें ग्राहक उत्पादन लागत से ज़्यादा कीमत पर वैल्यू देते हैं। यह नतीजा बताता है कि संसाधनों का कुशल इस्तेमाल हो रहा है और यह बाज़ार की ज़रूरतों के साथ मेल खा रहा है।
reviewed: false
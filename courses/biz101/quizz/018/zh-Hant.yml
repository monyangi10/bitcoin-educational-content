question: 機構投資者和大公司對 Bitcoin 感興趣的一個原因是什麼？
answer: 貝萊德 (BlackRock) 等主要金融業者採用 Bitcoin，以及 Spot Bitcoin ETF 的成功，使 Bitcoin 成為價值儲存資產的合法地位。
wrong_answers:
  - Bitcoin 的價格由政府機構制定和保證。
  - Bitcoin 交易由中央銀行提供全額保險。
  - 它不需要瞭解數位資產或金融法規。
explanation: |
  當主要機構承認 Bitcoin 是一種有效的投資時，這就向市場發出了一個信號：Bitcoin 已經成熟，超越了投機的範疇。現貨 Bitcoin ETF 等產品可讓企業更容易獲得投資機會，進一步推動主流市場的接受度。
reviewed: false
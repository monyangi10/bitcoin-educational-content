question: 기관 투자자와 대기업이 Bitcoin에 관심을 갖게 된 이유는 무엇인가요?
answer: 블랙록과 같은 주요 금융 업체들이 Bitcoin을 채택하고 현물 Bitcoin ETF가 성공하면서 가치 저장 자산으로 인정받게 되었습니다.
wrong_answers:
  - Bitcoin의 가격은 정부 기관에서 정하고 보장합니다.
  - Bitcoin 거래는 중앙은행에서 전액 보험에 가입합니다.
  - 디지털 자산이나 금융 규제에 대한 이해가 필요하지 않습니다.
explanation: |
  주요 기관이 Bitcoin를 유효한 투자로 인정한다는 것은 시장에 투기를 넘어 성숙 단계에 접어들었다는 신호입니다. 현물 Bitcoin ETF와 같은 상품은 기업이 더 쉽게 노출될 수 있도록 하여 주류 수용을 더욱 촉진합니다.
reviewed: true
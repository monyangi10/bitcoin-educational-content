question: การทำธุรกรรมด้วยบัตรเครดิตแตกต่างจากการทำธุรกรรมด้วยเงินสดอย่างไร?
answer: มันเกี่ยวข้องกับคนกลางหลายคน
wrong_answers:
  - มันเกิดขึ้นทันทีโดยไม่มีการเกี่ยวข้องของคนกลาง
  - มันต้องการการแลกเปลี่ยนสกุลเงินทางกายภาพเท่านั้น
  - มันกำหนดให้ทั้งสองฝ่ายผลิตสินค้าที่เหมือนกัน
explanation: |
  ต่างจากเงินสดซึ่งมีการแลกเปลี่ยนทันที การทำธุรกรรมด้วยบัตรเครดิตต้องผ่านขั้นตอนหลายขั้นตอนที่เกี่ยวข้องกับธนาคาร เครือข่ายบัตร และกระบวนการเคลียร์ริ่ง ส่งผลให้เกิดความล่าช้าและค่าใช้จ่ายเพิ่มเติม
reviewed: true
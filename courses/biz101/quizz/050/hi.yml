question: एक क्रेडिट कार्ड ट्रांजैक्शन और सीधे कैश ट्रांजैक्शन में आमतौर पर क्या फर्क होता है?  

1. **भुगतान का तरीका**:  
   - कैश में आप सीधे नकदी देते हैं।  
   - क्रेडिट कार्ड से पेमेंट असल में एक "उधार" होता है – बाद में बिल भरना पड़ता है।  

2. **सुरक्षा**:  
   - कैश खो गया तो वापस नहीं मिलता।  
   - क्रेडिट कार्ड से धोखाधड़ी हो तो बैंक/कंपनी रिफंड कर सकती है।  

3. **रिकॉर्ड**:  
   - कैश ट्रांजैक्शन का कोई डिजिटल प्रूफ नहीं होता।  
   - क्रेडिट कार्ड से हर पेमेंट का स्टेटमेंट मिलता है, जो ट्रैक करने में मदद करता है।  

4. **ऑनलाइन/दूर के लेन-देन**:  
   - कैश सिर्फ आमने-सामने काम आता है।  
   - क्रेडिट कार्ड से ऑनलाइन या फोन पर भी पेमेंट हो सकता है।  

5. **कैशबैक/रिवॉर्ड्स**:  
   - कैश में कोई एक्स्ट्रा फायदा नहीं।  
   - क्रेडिट कार्ड से पॉइंट्स, डिस्काउंट या कैशबैक मिल सकता है।  

**ध्यान रखें**: क्रेडिट कार्ड का बिल समय पर न भरें तो ब्याज़ और जुर्माना लगता है! 💳↔️💰
answer: इसमें कई बिचौलिये शामिल होते हैं
wrong_answers:
  - यह बिना किसी बिचौलिए के तुरंत हो जाता है
  - इसे सिर्फ करेंसी का फिजिकल Exchange चाहिए
  - इसमें यह अनिवार्य किया गया है कि दोनों पक्ष एक जैसा माल तैयार करें
explanation: |
  नकद के विपरीत, जिसका लेन-देन तुरंत हो जाता है, क्रेडिट कार्ड लेन-देन में बैंकों, कार्ड नेटवर्क और क्लीयरिंग प्रक्रियाओं की एक श्रृंखला शामिल होती है, जिसके कारण देरी और अतिरिक्त लागत आती है।
reviewed: false
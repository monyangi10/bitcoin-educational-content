question: Je, muamala wa kadi ya mkopo kwa kawaida hutofautiana vipi na muamala rahisi wa pesa taslimu?
answer: Inahusisha wapatanishi wengi
wrong_answers:
  - Inatokea mara moja bila ushiriki wa mpatanishi
  - Inahitaji Exchange halisi ya sarafu pekee
  - Inaamuru kwamba pande zote mbili zitazalisha bidhaa zinazofanana
explanation: |
  Tofauti na pesa taslimu, ambazo hubadilishwa mara moja, miamala ya kadi ya mkopo hupitia mfululizo wa hatua zinazohusisha benki, mitandao ya kadi, na taratibu za kusafisha, na kusababisha ucheleweshaji na gharama za ziada.
reviewed: true

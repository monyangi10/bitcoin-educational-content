question: Ni gute mu bisanzwe gukoresha ikarita y’inguzanyo bitandukanye n’ugukoresha amahera yoroshe?
answer: Birimwo abahuza benshi .
wrong_answers:
  - Bica bishika ubwo nyene ata n’umwe abigiramwo uruhara .
  - Bisaba Exchange y’amahera gusa .
  - Bitegeka ko abo bompi batanga ibicuruzwa bisa .
explanation: |
  Mu buryo butandukanye n’amahera, kuko ahita ahindurwa, amahera akoreshwa n’ikarata y’inguzanyo aca mu ntambwe zitandukanye zijanye n’amabanki, imihora y’amakarata be n’uburyo bwo gukuraho amahera, ivyo bikaba bituma umuntu ateba kandi akagira amahera menshi.
reviewed: true

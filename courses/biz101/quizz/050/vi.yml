question: Giao dịch thẻ tín dụng thường khác so với giao dịch đơn giản bằng tiền mặt như thế nào?
answer: Nó liên quan đến nhiều trung gian thanh toán
wrong_answers:
  - Nó xảy ra ngay lập tức mà không cần sự tham gia trung gian
  - Nó chỉ yêu cầu trao đổi tiền tệ vật lý
  - Nó yêu cầu cả hai bên phải sản xuất hàng hóa giống hệt nhau
explanation: |
  Không giống như tiền mặt, được trao đổi ngay lập tức, các giao dịch thẻ tín dụng trải qua một loạt các bước liên quan đến ngân hàng, mạng lưới thẻ và quy trình thanh toán, dẫn đến sự chậm trễ và chi phí bổ sung.
reviewed: true
question: По какво обикновено се различава транзакцията с кредитна карта от обикновената транзакция в брой?
answer: Тя включва множество посредници
wrong_answers:
  - Това се случва мигновено, без участието на посредници
  - Изисква само физически обмен на валута
  - Тя изисква двете страни да произвеждат идентични стоки
explanation: |
  За разлика от парите в брой, които се разменят веднага, транзакциите с кредитни карти преминават през редица стъпки, включващи банки, картови мрежи и клирингови процеси, което води до забавяне и допълнителни разходи.
reviewed: true
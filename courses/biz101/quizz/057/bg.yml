question: Защо е важно да се проследява стойността на фиат в момента на всяка транзакция с Bitcoin?
answer: Осигуряване на точно счетоводство и спазване на данъчното законодателство
wrong_answers:
  - Автоматично увеличаване на баланса wallet
  - Да се даде възможност за пазарна търговия в реално време директно от wallet
  - Намаляване на таксите за транзакции, наложени от мрежата
explanation: |
  Проследяването на фиатната стойност помага на предприятията да управляват счетоводството при променливи цени на Bitcoin.
reviewed: true
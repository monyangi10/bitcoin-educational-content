question: Tại sao việc theo dõi giá trị bằng tiền pháp định tại thời điểm của mỗi giao dịch Bitcoin lại quan trọng?
answer: Để đảm bảo việc ghi sổ sách kế toán và tuân thủ thuế chính xác
wrong_answers:
  - Để tự động tăng số dư ví
  - Để cho phép giao dịch thị trường theo thời gian thực trực tiếp từ ví
  - Để giảm phí giao dịch do mạng áp đặt
explanation: |
  Theo dõi giá trị bằng tiền pháp định giúp doanh nghiệp quản lý sổ sách kế toán khi giá Bitcoin biến động.
reviewed: true
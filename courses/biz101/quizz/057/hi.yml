question: यह क्यों जरूरी है कि हर Bitcoin ट्रांजैक्शन के वक्त फिएट वैल्यू को ट्रैक किया जाए?
answer: सटीक बहीखाता और टैक्स अनुपालन सुनिश्चित करने के लिए
wrong_answers:
  - Wallet बैलेंस को अपने आप बढ़ाने के लिए
  - Wallet से सीधे रियल-टाइम मार्केट ट्रेडिंग को सक्षम करने के लिए
  - नेटवर्क द्वारा लगाए गए लेन-देन शुल्क को कम करने के लिए
explanation: |
  फिएट वैल्यू को ट्रैक करने से बिजनेस को Bitcoin की उतार-चढ़ाव वाली कीमतों के साथ बुककीपिंग मैनेज करने में मदद मिलती है।
reviewed: false
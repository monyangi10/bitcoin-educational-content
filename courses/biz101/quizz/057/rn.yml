question: Ni kuki bihambaye gukurikirana agaciro kamahera asanzwe ku gihe c’ukurungika kwa Bitcoin?
answer: Kugira ngo haboneke ububiko  bwamahera ukuntu agenda n'imisoro yubahirizwe neza
wrong_answers:
  - Kugira ngo ubwo nyene wongere uburinganire bwi ngodo ngurukana bumenyi
  - Kugira ngo bishobore gucuruza isoko mu gihe nyaco biva ku ngodo ngurukana bumenyi.
  - Kugabanya amafaranga y'ugucuruza ashirwaho n'urubuga .
explanation: |
  Gukurikirana agaciro ka amahera bifasha uruganda gucunga ububiko  bw’ibiciro vya Bitcoin bihinduka.
reviewed: true

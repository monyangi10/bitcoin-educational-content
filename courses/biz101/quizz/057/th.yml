question: ทำไมการติดตามมูลค่าของเงินเฟียตในขณะทำธุรกรรม Bitcoin แต่ละครั้งจึงสำคัญ?
answer: เพื่อให้แน่ใจว่าการทำบัญชีและการปฏิบัติตามภาษีถูกต้อง
wrong_answers:
  - เพื่อเพิ่มยอดคงเหลือ wallet โดยอัตโนมัติ
  - เพื่อเปิดใช้งานการซื้อขายตลาดแบบเรียลไทม์โดยตรงจาก wallet
  - เพื่อลดค่าธรรมเนียมการทำธุรกรรมที่กำหนดโดยเครือข่าย
explanation: |
  การติดตามมูลค่าของเงินเฟียตช่วยให้ธุรกิจจัดการการทำบัญชีได้เมื่อราคาของ Bitcoin มีความผันผวน
reviewed: true
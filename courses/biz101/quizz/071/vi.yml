question: LSP đóng vai trò gì trong thanh toán Enterprise Bitcoin?
answer: Quản lý các giao dịch khối lượng lớn trên Lightning
wrong_answers:
  - Lưu trữ khóa riêng của Lightning wallet
  - In hóa đơn Lightning
  - Xử lý hoàn tiền thủ công trên Lightning
explanation: |
  LSP xử lý các hoạt động phức tạp và khối lượng lớn trên mạng Lightning.
reviewed: true
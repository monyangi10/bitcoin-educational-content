question: Каква е ролята на LSP в плащанията с Bitcoin?
answer: Управление на транзакции с голям обем в Lightning network
wrong_answers:
  - Съхраняване на частни ключове на Lightning network портфейл
  - Отпечатване на фактури Lightning network
  - Ръчно обработване на възстановявания в Lightning network
explanation: |
  LSP се справят със сложни операции с голям обем в Lightning network мрежата.
reviewed: true

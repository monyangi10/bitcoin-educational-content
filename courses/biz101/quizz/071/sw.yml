question: Je, LSP ina jukumu gani katika malipo ya Enterprise Bitcoin?
answer: Dhibiti miamala ya kiwango cha juu kwenye Lightning 
wrong_answers:
  - Hifadhi funguo za kibinafsi za Lightning Wallet
  - Chapisha invoice za Lightning 
  - Mchakato wa kurejesha pesa mwenyewe kwenye Lightning
explanation: |
  LSP hushughulikia utendakazi changamano na wa kiwango cha juu kwenye Lightning.
reviewed: true

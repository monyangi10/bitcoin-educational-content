question: एंटरप्राइज़ Bitcoin पेमेंट्स में LSP क्या भूमिका निभाता है?
answer: लाइटनिंग पर भारी मात्रा में लेन-देन को प्रबंधित करें
wrong_answers:
  - लाइटनिंग Wallet के प्राइवेट कीज को स्टोर करें
  - प्रिंट लाइटनिंग इनवॉइस
  - लाइटनिंग पर मैन्युअली रिफंड प्रोसेस करें
explanation: |
  एलएसपी (LSPs) लाइटनिंग पर जटिल और बड़े पैमाने के ऑपरेशन्स को संभालते हैं।
reviewed: false
question: Как приемането на плащания Bitcoin може да помогне за повишаване на видимостта на бизнеса?
answer: Чрез включване на бизнеса в платформи като BTCmap.org и привличане на вниманието на Bitcoin общността.
wrong_answers:
  - Чрез забрана на всички други методи на плащане и принуждаване на всички клиенти да използват Bitcoin.
  - Като гарантира, че правителството ще рекламира бизнеса безплатно.
  - Като изискват от клиентите да се регистрират в няколко онлайн акаунта, преди да платят.
explanation: |
  Приемането на Bitcoin все още е сравнително рядко срещано, което може да предизвика интерес от страна на общността на Bitcoin. Обявяването на магазина ви в специализирани директории и ползването на промоция, движена от общността, може да ви помогне да се откроите и да привлечете нови клиенти.
reviewed: true
question: Hoe kan het accepteren van Bitcoin betalingen de zichtbaarheid van een bedrijf vergroten?
answer: Door het bedrijf te vermelden op platforms zoals BTCmap.org en een beroep te doen op de mond-tot-mondreclame van de Bitcoin gemeenschap.
wrong_answers:
  - Door alle andere betaalmethoden te verbieden en alle klanten te dwingen Bitcoin te gebruiken.
  - Door te garanderen dat de overheid gratis reclame zal maken voor het bedrijf.
  - Door klanten te verplichten zich te registreren voor meerdere online accounts voordat ze betalen.
explanation: |
  Het accepteren van Bitcoin is nog steeds relatief ongewoon, wat de interesse van de Bitcoin gemeenschap kan wekken. Door je winkel op te nemen in gespecialiseerde directory's en te profiteren van promotie door de community, kun je opvallen en nieuwe klanten aantrekken.
reviewed: false
question: Bitcoin 결제를 수락하면 비즈니스의 가시성을 높이는 데 어떻게 도움이 되나요?
answer: BTCmap.org와 같은 플랫폼에 비즈니스를 등록하고 Bitcoin 커뮤니티의 입소문에 호소합니다.
wrong_answers:
  - 다른 모든 결제 수단을 금지하고 모든 고객이 Bitcoin를 사용하도록 강제합니다.
  - 정부가 해당 비즈니스를 무료로 광고할 수 있도록 보장합니다.
  - 고객이 결제하기 전에 여러 온라인 계정에 등록하도록 요구합니다.
explanation: |
  Bitcoin 수락은 아직 비교적 흔하지 않으므로 Bitcoin 커뮤니티의 관심을 끌 수 있습니다. 전문 디렉토리에 스토어를 등록하고 커뮤니티 중심의 프로모션을 활용하면 눈에 띄고 새로운 고객을 유치하는 데 도움이 될 수 있습니다.
reviewed: true
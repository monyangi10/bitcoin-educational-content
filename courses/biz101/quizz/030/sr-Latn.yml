question: Kako prihvatanje Bitcoin plaćanja može pomoći u povećanju vidljivosti preduzeća?
answer: Postavljanjem poslovanja na platforme kao što je BTCmap.org i privlačenjem preporuka zajednice Bitcoin.
wrong_answers:
  - Zabranom svih drugih metoda plaćanja i prisiljavanjem svih kupaca da koriste Bitcoin.
  - Garantujući da će vlada reklamirati posao besplatno.
  - Tako što se od kupaca zahteva da se registruju za više online naloga pre plaćanja.
explanation: |
  Prihvatanje Bitcoin je još uvek relativno neuobičajeno, što može privući interesovanje zajednice Bitcoin. Listing vaše prodavnice na specijalizovanim direktorijumima i korišćenje promocije vođene od strane zajednice može vam pomoći da se istaknete i privučete nove kupce.

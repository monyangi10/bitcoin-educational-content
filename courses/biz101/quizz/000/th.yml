question: ระบบการชำระเงินที่สร้างขึ้นบนระบบสกุลเงินแบบดั้งเดิมคืออะไร?
answer: โดยพื้นฐานแล้วจ่ายโดยพ่อค้าผ่านค่าธรรมเนียมของผู้ประมวลผลการชำระเงิน
wrong_answers:
  - โดยพื้นฐานแล้วฟรีเพราะลูกค้าจ่ายราคาที่แสดงโดยผู้ค้า
  - ชำระโดยลูกค้านอกเหนือจากราคาที่ผู้ขายกำหนด
  - ชำระเงินโดยบริษัทบัตรที่ขายต่อข้อมูลลูกค้า
explanation: |
  ไม่มีอะไรฟรี ระบบการชำระเงินที่สร้างขึ้นในระบบสกุลเงินแบบดั้งเดิมดำเนินการโดยผู้ขายต่าง ๆ เช่น บริษัทบัตรและธนาคารผู้รับซึ่งเรียกเก็บค่าธรรมเนียมคงที่และ/หรือค่าธรรมเนียมเปอร์เซ็นต์สำหรับแต่ละธุรกรรม
reviewed: true
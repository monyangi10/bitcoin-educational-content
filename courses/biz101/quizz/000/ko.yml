question: 기존 통화 시스템 위에 구축된 결제 레일은 무엇인가요?
answer: 기본적으로 판매자는 결제 처리업체의 수수료를 통해 비용을 지불합니다
wrong_answers:
  - 고객이 판매자가 표시한 가격을 지불하므로 기본적으로 무료입니다
  - 판매자의 요청 가격에 추가하여 고객이 결제합니다
  - 고객 데이터를 재판매하는 카드사가 비용을 지불합니다
explanation: |
  공짜는 없습니다. 기존 통화 시스템에 구축된 결제 레일은 카드 회사 및 매입 은행과 같은 다양한 공급업체에서 운영하며, 각 거래에 대해 고정 수수료 및/또는 일정 비율의 수수료를 부과합니다
reviewed: true
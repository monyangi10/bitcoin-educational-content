question: पारंपरिक मुद्रा प्रणालियों पर बने पेमेंट रेल्स क्या हैं?
answer: मूल रूप से भुगतान प्रोसेसरों के शुल्क के माध्यम से व्यापारियों द्वारा भुगतान किया गया
wrong_answers:
  - मूल रूप से मुफ़्त क्योंकि ग्राहक व्यापारी द्वारा दिखाए गए दाम का भुगतान करता है
  - ग्राहक द्वारा दुकानदार की मांगी गई कीमत के ऊपर अदा किया गया
  - कार्ड कंपनियों द्वारा भुगतान किया गया जो ग्राहकों का डेटा दोबारा बेचती हैं
explanation: |
  कोई भी चीज़ मुफ्त नहीं होती। पारंपरिक मुद्रा प्रणालियों में बने भुगतान नेटवर्क को कार्ड कंपनियों और अधिग्रहण बैंकों जैसे विभिन्न विक्रेताओं द्वारा संचालित किया जाता है, जो हर लेन-देन के लिए एक निश्चित शुल्क और/या प्रतिशत शुल्क वसूलते हैं।

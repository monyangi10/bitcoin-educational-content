question: Zahlungssysteme, die auf den traditionellen Währungssystemen aufbauen, ...?
answer: Werden im Wesentlichen von den Händlern über die Gebühren der Zahlungsdienstleister bezahlt.
wrong_answers:
  - Sind im Wesentlichen kostenlos, da der Kunde den vom Händler angezeigten Preis bezahlt.
  - Werden vom Kunden zusätzlich zum Angebotspreis des Händlers bezahlt.
  - Werden von den Kartenunternehmen bezahlt, die die Daten der Kunden weiterverkaufen.
explanation: |
  Nichts ist kostenlos. Die in den traditionellen Währungssystemen eingebauten Zahlungsschienen werden von verschiedenen Anbietern wie Kartengesellschaften und akquirierenden Banken betrieben, die für jede Transaktion eine feste Gebühr und/oder eine prozentuale Gebühr erheben.
reviewed: true

question: Платежните релси, изградени върху традиционните валутни системи са финансирани чрез?
answer: По същество се заплащат от търговците чрез таксите на компаниите, обработващи плащанията
wrong_answers:
  - По същество са безплатни, защото клиентът плаща цената, посочена от търговеца
  - Заплаща се от клиента в допълнение към цената на търговеца
  - Плаща се от картовите компании, които препродават данните на клиентите
explanation: |
  Нищо не е безплатно. Платежните релси, изградени в традиционните валутни системи, се управляват от различни доставчици, като например картови компании и банки, които събират фиксирана такса и/или процент за всяка транзакция
reviewed: true

question: Ni kuki bisabwa ko uruganda rutangura kugura ama bitcoin makeyi?
answer: Bituma baronka ubumenyi n’ugutahura imbere y’uko bashiramwo amahera menshi.
wrong_answers:
  - Bituma ingana zitaba zikiriha imisoro.
  - Ubwo nyene bica bitanga icemeza ko ubucuruzi buzoronka inyungu nyinshi.
  - Bituma iyo sosiyete idashobora gushikirwa n’ubuhendanyi bwose bw’amahera y’imbere mu gihugu.
explanation: |
  Ishoramari ritoyi ry’intango rifasha abacuruzi kwiga imice ngirakamaro yo kugura, kubika no gucunga Bitcoin ataco bafata mu kaga gakomeye.
reviewed: true

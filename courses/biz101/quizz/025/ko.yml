question: 비즈니스에 Bitcoin의 초기 구매를 소량으로 시작하는 것이 권장되는 이유는 무엇인가요?
answer: 이를 통해 더 큰 금액을 투자하기 전에 실무 경험과 이해를 쌓을 수 있습니다.
wrong_answers:
  - 이는 법적으로 회사가 세금 부채에 직면하는 것을 방지합니다.
  - 즉시 비즈니스의 최대 수익을 보장합니다.
  - 이를 통해 회사는 모든 암호화폐 사기에 대한 면역력을 갖게 됩니다.
explanation: |
  적은 초기 투자로 기업은 큰 위험 부담 없이 Bitcoin 구매, 보관, 관리의 실질적인 측면을 배울 수 있습니다.
reviewed: true
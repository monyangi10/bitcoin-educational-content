question: Kwa nini kuanza na ununuzi mdogo wa awali wa Bitcoin unapendekezwa kwa biashara?
answer: Inawaruhusu kupata uzoefu wa vitendo na uelewa kabla ya kutoa kiasi kikubwa.
wrong_answers:
  - Inazuia kisheria kampuni kukabiliwa na dhima ya ushuru.
  - Inahakikisha papo hapo mapato ya juu zaidi ya biashara.
  - Inafanya kampuni kuwa kinga dhidi ya kashfa zote za cryptocurrency.
explanation: |
  Uwekezaji mdogo wa awali husaidia biashara kujifunza vipengele vya vitendo vya kununua, kuhifadhi, na kusimamia Bitcoin bila kuhatarisha hatari.
reviewed: true

question: Vì sao doanh nghiệp ban đầu nên làm quen bằng việc mua Bitcoin với số lượng nhỏ?
answer: Việc này cho phép họ có được kinh nghiệm thực tế và hiểu biết trước khi cam kết số tiền lớn hơn.
wrong_answers:
  - Về mặt pháp lý, điều này giúp công ty không phải đối mặt với nghĩa vụ thuế.
  - Việc này đảm bảo ngay lập tức lợi nhuận tối đa cho doanh nghiệp.
  - Việc này giúp công ty miễn nhiễm với các chiêu lừa đảo tiền điện tử.
explanation: |
  Một khoản đầu tư ban đầu nhỏ giúp các doanh nghiệp tìm hiểu những vấn đềß thực tế của việc thu mua, lưu trữ và quản lý Bitcoin mà không phải đối mặt với những rủi ro đáng kể.
reviewed: true
question: Waarom is het voor bedrijven aan te raden om te beginnen met een kleine initiële aankoop van Bitcoin?
answer: Zo kunnen ze praktijkervaring opdoen en inzicht krijgen voordat ze grotere bedragen toezeggen.
wrong_answers:
  - Het voorkomt wettelijk dat het bedrijf te maken krijgt met belastingverplichtingen.
  - Het garandeert het bedrijf onmiddellijk een maximaal rendement.
  - Het maakt het bedrijf immuun voor alle zwendel met cryptocurrency.
explanation: |
  Een kleine initiële investering helpt bedrijven om de praktische aspecten van het kopen, opslaan en beheren van Bitcoin te leren zonder grote risico's te nemen.
reviewed: false
question: Защо за бизнеса се препоръчва да започне с малка първоначална покупка на Bitcoin?
answer: Това им позволява да придобият практически опит и разбиране, преди да се ангажират с по-големи суми.
wrong_answers:
  - Това юридически предпазва дружеството от данъчни задължения.
  - Тя незабавно гарантира на бизнеса максимална възвръщаемост.
  - Това прави компанията имунизирана срещу всички измами с криптовалути.
explanation: |
  Малката първоначална инвестиция помага на фирмите да се запознаят с практическите аспекти на закупуването, съхранението и управлението на Bitcoin, без да поемат значителен риск.
reviewed: true
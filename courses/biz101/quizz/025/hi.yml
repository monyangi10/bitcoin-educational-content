question: छोटी शुरुआत में Bitcoin की खरीदारी क्यों सुझाई जाती है व्यापारों के लिए?
answer: यह उन्हें बड़ी रकम लगाने से पहले हाथों-हाथ अनुभव और समझ हासिल करने का मौका देता है।
wrong_answers:
  - यह कानूनी तौर पर कंपनी को टैक्स के दायित्वों से बचाता है।
  - यह तुरंत व्यापार को अधिकतम मुनाफ़ा सुनिश्चित करता है।
  - यह कंपनी को सभी क्रिप्टोकरेंसी स्कैम्स से बचाता है।
explanation: |
  एक छोटा सा शुरुआती निवेश व्यवसायों को Bitcoin खरीदने, स्टोर करने और प्रबंधित करने के व्यावहारिक पहलुओं को सीखने में मदद करता है, बिना कोई बड़ा जोखिम उठाए।
reviewed: false
question: Dlaczego ochrona kapitału jest niezbędna dla zdrowej firmy w niepewnej przyszłości?
answer: Utrzymywanie rezerw kapitałowych pozwala firmie dostosowywać się, inwestować w rozwój i przetrwać spowolnienia gospodarcze.
wrong_answers:
  - Zachowanie kapitału gwarantuje, że żaden konkurent nigdy nie wejdzie na rynek.
  - Zachowanie kapitału zapewnia stałą odporność na wszelkie zmiany regulacyjne.
  - Zachowanie kapitału jest ważne tylko wtedy, gdy firma planuje nigdy się nie rozwijać.
explanation: |
  Przyszłe warunki są nieprzewidywalne. Utrzymując pewien kapitał w rezerwie, firma może wykorzystywać nowe możliwości, radzić sobie z nieoczekiwanymi wyzwaniami i inwestować w długoterminowe inicjatywy bez polegania wyłącznie na finansowaniu zewnętrznym.

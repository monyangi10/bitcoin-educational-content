question: Zašto je očuvanje kapitala ključno za zdravu kompaniju u neizvesnoj budućnosti?
answer: Održavanje kapitalnih rezervi omogućava kompaniji da se prilagodi, investira u rast i prebrodi ekonomske padove.
wrong_answers:
  - Očuvanje kapitala garantuje da nijedan konkurent nikada ne može ući na tržište.
  - Očuvanje kapitala osigurava trajni imunitet od svih regulatornih promena.
  - Očuvanje kapitala je važno samo ako kompanija planira da nikada ne raste.
explanation: |
  Budući uslovi su nepredvidivi. Držeći deo kapitala u rezervi, preduzeće može iskoristiti nove prilike, nositi se sa neočekivanim izazovima i ulagati u dugoročne inicijative bez oslanjanja isključivo na spoljašnje finansiranje.

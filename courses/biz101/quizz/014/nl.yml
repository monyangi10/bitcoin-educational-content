question: Waarom is het behouden van kapitaal essentieel voor een gezond bedrijf in een onzekere toekomst?
answer: Het aanhouden van kapitaalreserves stelt het bedrijf in staat om zich aan te passen, te investeren in groei en economische neergang te doorstaan.
wrong_answers:
  - Het behouden van kapitaal garandeert dat er nooit een concurrent op de markt kan komen.
  - Het behouden van kapitaal zorgt voor permanente immuniteit tegen alle wijzigingen in de regelgeving.
  - Het behouden van kapitaal is alleen belangrijk als het bedrijf van plan is om nooit te groeien.
explanation: |
  Toekomstige omstandigheden zijn onvoorspelbaar. Door wat kapitaal achter de hand te houden, kan een bedrijf nieuwe kansen grijpen, onverwachte uitdagingen het hoofd bieden en investeren in langetermijninitiatieven zonder alleen afhankelijk te zijn van externe financiering.
reviewed: false
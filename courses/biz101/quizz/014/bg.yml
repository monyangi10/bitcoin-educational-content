question: Защо запазването на капитала е от съществено значение за една здрава компания в условията на несигурно бъдеще?
answer: Поддържането на капиталови резерви позволява на компанията да се адаптира, да инвестира в растеж и да преодолява икономически спадове.
wrong_answers:
  - Запазването на капитала гарантира, че нито един конкурент няма да може да навлезе на пазара.
  - Запазването на капитала осигурява постоянен имунитет срещу всички регулаторни промени.
  - Запазването на капитала е важно само ако компанията не планира да се разраства.
explanation: |
  Бъдещите условия са непредсказуеми. Поддържайки капиталов резерв, бизнесът може да се възползва от нови възможности, да се справи с неочаквани предизвикателства и да инвестира в дългосрочни инициативи, без да разчита единствено на външно финансиране.
reviewed: true
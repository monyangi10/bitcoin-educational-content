question: 불확실한 미래에서 건강한 기업을 위해 자본을 보존하는 것이 중요한 이유는 무엇일까요?
answer: 자본 유보금을 유지하면 회사는 적응하고 성장에 투자하며 경기 침체를 극복할 수 있습니다.
wrong_answers:
  - 자본을 보존하면 경쟁자가 시장에 진입할 수 없게 됩니다.
  - 자본을 보존하면 모든 규제 변화에 대한 영구적인 면책이 보장됩니다.
  - 자본을 보존하는 것은 회사가 성장하지 않을 계획일 때만 중요합니다.
explanation: |
  미래 상황은 예측할 수 없습니다. 기업은 자본 준비금을 유지함으로써 외부 자금 조달에만 의존하지 않고도 새로운 기회와 예상치 못한 도전에 대응하고 장기적인 이니셔티브에 투자할 수 있습니다.
reviewed: true
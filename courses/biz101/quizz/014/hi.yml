question: क्योंकि भविष्य अनिश्चित है, इसलिए किसी भी कंपनी के लिए पूंजी को सुरक्षित रखना बेहद ज़रूरी है। अगर कंपनी के पास पर्याप्त पूंजी होगी, तो वह मुश्किल समय में भी अपने कामकाज को चालू रख सकेगी, नए मौकों का फायदा उठा सकेगी और अचानक आने वाले झटकों को झेल सकेगी। बिना पूंजी के, कंपनी का टिक पाना मुश्किल हो जाता है, खासकर जब बाज़ार में उतार-चढ़ाव हो या आर्थिक मंदी आ जाए। इसलिए, पूंजी बचाकर रखना कंपनी की सेहत के लिए बिल्कुल ज़रूरी है।
answer: पूंजी भंडार बनाए रखने से कंपनी को ढलने, विकास में निवेश करने और आर्थिक मंदी का सामना करने में मदद मिलती है।
wrong_answers:
  - पूंजी को सुरक्षित रखने से यह गारंटी मिलती है कि कोई भी प्रतियोगी बाजार में कभी प्रवेश नहीं कर सकता।
  - पूंजी को सुरक्षित रखने से सभी नियामक परिवर्तनों से स्थायी सुरक्षा मिलती है।
  - कैपिटल बचाना तभी जरूरी है जब कंपनी कभी बढ़ने की प्लानिंग ही न करे।
explanation: |
  भविष्य की स्थितियाँ अंदाज़ा लगाना मुश्किल होता है। कुछ पूँजी रिज़र्व में रखकर, कोई भी व्यवसाय नए मौकों का फायदा उठा सकता है, अचानक आने वाली मुश्किलों से निपट सकता है, और बाहरी वित्त पर निर्भर हुए बिना लंबे समय के प्रोजेक्ट्स में निवेश कर सकता है।

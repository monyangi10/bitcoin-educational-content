question: निम्नलिखित में से कौन सा Bitcoin प्राप्त करने के तीन प्राथमिक तरीकों में से एक नहीं है?
answer: सरकारी अनुदान के रूप में Bitcoin प्राप्त करना, जो कारोबार के विकास के लिए है।
wrong_answers:
  - Exchange में Bitcoin प्राप्त करना (माल या सेवाओं के लिए)।
  - जीडब्ल्यू-5 जीडब्ल्यू-4 विशेष हार्डवेयर और ऊर्जा उपयोग के माध्यम से।
  - प्लेटफॉर्म या ब्रोकर से Bitcoin खरीदना।
explanation: |
  अध्याय में Bitcoin प्राप्त करने के तीन मुख्य तरीकों का जिक्र है; इसे भुगतान के रूप में स्वीकार करना, खनन करना, या खरीदना। सरकारी अनुदान के रूप में Bitcoin प्राप्त करना, अधिग्रहण का मान्यता प्राप्त मानक तरीका नहीं है।
reviewed: false
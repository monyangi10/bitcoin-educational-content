question: Кое от следните неща НЕ е един от трите основни метода за придобиване на Bitcoin?
answer: Получаване на Bitcoin като държавна субсидия за развитие на бизнеса.
wrong_answers:
  - Получаване на Bitcoin в замяна на стоки или услуги.
  - Mining Bitcoin чрез специализиран хардуер и използване на енергия.
  - Закупуване на Bitcoin от платформа или брокер.
explanation: |
  В главата са описани три основни метода за придобиване на Bitcoin, които се състоят в приемането му като плащане, mining или закупуването му. Получаването на Bitcoin като държавна субсидия не е признат стандартен метод на придобиване.
reviewed: true
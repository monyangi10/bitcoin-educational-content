question: ข้อใดต่อไปนี้ไม่ใช่วิธีหลักสามวิธีที่กล่าวถึงในการรับ Bitcoin?
answer: ได้รับ Bitcoin เป็นเงินช่วยเหลือจากรัฐบาลเพื่อพัฒนาธุรกิจ
wrong_answers:
  - การรับ Bitcoin แลกเปลี่ยนกับสินค้าและบริการ
  - Mining Bitcoin ผ่านฮาร์ดแวร์เฉพาะทางและการใช้พลังงาน
  - การซื้อ Bitcoin จากแพลตฟอร์มหรือนายหน้า
explanation: |
  บทนี้สรุปวิธีหลักสามวิธีในการได้มาซึ่ง Bitcoin ซึ่งประกอบด้วยการยอมรับเป็นการชำระเงิน, mining มัน, หรือการซื้อ การรับ Bitcoin เป็นเงินช่วยเหลือจากรัฐบาลไม่ถือเป็นวิธีการได้มาซึ่งมาตรฐานที่ได้รับการยอมรับ
reviewed: true
question: Ni ipi kati ya zifuatazo SI mojawapo ya njia tatu za msingi zilizotajwa za kupata Bitcoin?
answer: Kupokea Bitcoin kama ruzuku ya serikali kwa maendeleo ya biashara.
wrong_answers:
  - Kupokea Bitcoin katika Exchange kwa bidhaa au huduma.
  - Mining Bitcoin kupitia maunzi maalum na matumizi ya nishati.
  - Kununua Bitcoin kutoka kwa jukwaa au wakala.
explanation: |
  Sura inataja njia kuu tatu za kupata Bitcoin; kuikubali kama malipo, Mining, au kununua. Kupokea Bitcoin kama ruzuku ya serikali si njia ya kawaida inayotambulika ya kupata.
reviewed: true

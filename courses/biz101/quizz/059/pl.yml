question: Jakie dwa typy Wallet są uwzględnione w profilu Starter?
answer: Powiernicze i niepowiernicze portfele Lightning
wrong_answers:
  - Przechowywanie Hot i Cold Portfele Bitcoin
  - Multisig i papierowe portfele Bitcoin

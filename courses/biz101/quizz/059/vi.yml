question: Hai loại ví nào được coi là có trong nhóm khởi đầu (hồ sơ 1)?
answer: Ví Lightning tự lưu ký và lưu ký hộ
wrong_answers:
  - Ví nóng và ví lạnh Bitcoin
  - Ví Multisig (đa chữ ký) và ví giấy Bitcoin
  - Phần cứng và Ví Lightning
explanation: |
  Nhóm khởi đầu (hồ sơ 1) sử dụng ví Lightning tự lưu ký và lưu ký hộ.
reviewed: true
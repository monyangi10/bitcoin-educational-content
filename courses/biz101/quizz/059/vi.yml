question: Hai loại wallet nào được coi là có trong hồ sơ Starter?
answer: Ví Lightning lưu ký và không lưu ký
wrong_answers:
  - Ví Hot và ví lưu trữ lạnh Bitcoin
  - Ví Multisig và ví giấy Bitcoin
  - Phần cứng và não Ví Lightning
explanation: |
  Hồ sơ Starter sử dụng ví Lightning lưu ký hoặc không lưu ký.
reviewed: true
question: Ni aina gani mbili za Wallet zinazozingatiwa kwenye wasifu wa Starter?
answer: Lightning Wallet zinazotunzwa na zisizo za ulinzi
wrong_answers:
  - Hot na Cold kuhifadhi wallet Bitcoin
  - Multisig na Wallet za karatasi za Bitcoin
  - Vifaa na Lightning wallet za ubongo
explanation: |
  Wasifu wa Starter hutumia Lightning wallet za uhifadhi au zisizo za ulezi.
reviewed: true

question: Welche beiden Wallet-Typen werden im Starterprofil berücksichtigt?
answer: Custodial und Non-Custodial Lightning-Wallets
wrong_answers:
  - Hot- und Cold-Storage Bitcoin-Wallets
  - Multisig und Papier-Bitcoin-Wallet
  - Hardware und Gehirn Lightning-Wallets
explanation: |
  Das Starter-Profil verwendet entweder Custodial oder Non-Custodial Lightning-Wallets.
reviewed: true

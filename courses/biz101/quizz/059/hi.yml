question: स्टार्टर प्रोफाइल में कौन से दो Wallet प्रकार माने जाते हैं?
answer: कस्टोडियल और नॉन-कस्टोडियल लाइटनिंग वॉलेट्स
wrong_answers:
  - जीडब्ल्यू-3 और जीडब्ल्यू-2 स्टोरेज जीडब्ल्यू-1 वॉलेट्स
  - जीडब्ल्यू-4 और पेपर जीडब्ल्यू-5 वॉलेट्स
  - हार्डवेयर और ब्रेन लाइटनिंग वॉलेट्स
explanation: |
  स्टार्टर प्रोफाइल कस्टोडियल या नॉन-कस्टोडियल लाइटनिंग वॉलेट्स का इस्तेमाल करती है।
reviewed: false
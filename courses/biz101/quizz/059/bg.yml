question: Кои два типа портфейли се разглеждат за начинаещи?
answer: попечителски и самостоятелни Lightning network портфейли
wrong_answers:
  - горещи и студени биткойн портфейли
  - Multisig и хартиени портфейли за Bitcoin
  - Хардуерен портфейл и за Светкавичната мрежа
explanation: |
  начинаещите се препоръчва да използват попечителски или непопечителски портфейли за Lightning network.
reviewed: true

question: Lightning Network을 '결제용 이메일'과 비교할 수 있는 이유는 무엇인가요?
answer: 메시지를 보내는 것만큼이나 쉽게 원활하고 글로벌하며 권한이 필요 없는 Exchange 가치를 구현할 수 있기 때문입니다.
wrong_answers:
  - 기존 이메일 제공업체를 통해 결제를 전송하기 때문입니다.
  - 일반 이메일 메시지에 첨부된 경우에만 작동하기 때문입니다.
  - 이메일 본문에 사용자 잔액을 저장하기 때문입니다.
explanation: |
  이메일이 중개자를 없애고 누구나 전 세계로 메시지를 보낼 수 있게 함으로써 커뮤니케이션에 혁신을 가져온 것처럼, Lightning Network는 거래를 간소화하고 속도를 높여 이메일처럼 마찰 없이 가치를 전달할 수 있게 해줍니다.
reviewed: true
question: ทำไม Lightning Network ถึงสามารถเปรียบเทียบกับ "อีเมลสำหรับการชำระเงิน"?
answer: เพราะมันช่วยให้การแลกเปลี่ยนมูลค่าเป็นไปอย่างราบรื่น ทั่วโลก และไม่ต้องขออนุญาตได้ง่ายดายเหมือนการส่งข้อความ
wrong_answers:
  - เพราะมันส่งการชำระเงินผ่านผู้ให้บริการอีเมลแบบดั้งเดิม
  - เพราะมันทำงานได้เฉพาะเมื่อแนบกับข้อความอีเมลปกติเท่านั้น
  - เพราะมันเก็บยอดคงเหลือของผู้ใช้ในเนื้อหาของอีเมล
explanation: |
  เช่นเดียวกับที่อีเมลปฏิวัติการสื่อสารโดยการกำจัดตัวกลางและทำให้ใครก็ตามสามารถส่งข้อความไปทั่วโลกได้ Lightning Network ก็ทำให้การทำธุรกรรมง่ายขึ้นและเร็วขึ้น ทำให้การโอนมูลค่าเป็นไปอย่างราบรื่นและเข้าถึงได้เหมือนอีเมล
reviewed: true
question: Защо Lightning Network може да се сравнява с "електронна поща за плащания"?
answer: Защото позволява безпроблемен, глобален и безпроблемен обмен на стойност, толкова лесен, колкото и изпращането на съобщение.
wrong_answers:
  - Защото изпраща плащания чрез традиционните доставчици на имейл.
  - Защото тя работи само когато е прикачена към обикновени имейл съобщения.
  - Тъй като тя съхранява баланса на потребителя в тялото на имейл.
explanation: |
  Точно както електронната поща направи революция в комуникацията, като премахна посредниците и даде възможност на всеки да изпраща съобщения по целия свят, Lightning Network опростява и ускорява трансакциите, като прави трансфера на стойност толкова безпроблемен и достъпен, колкото и електронната поща.
reviewed: true
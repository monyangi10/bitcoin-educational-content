question: Ni kuki Lightning Network ishobora kugereranywa n’“imeli yo kwishura”?
answer: Kuko bishoboza agaciro ka Exchange katagira umurongo, k’isi yose, kandi katagira uruhusha mu buryo bworoshe nk’ugutuma ubutumwa.
wrong_answers:
  - Kuko yohereza amahera biciye ku ba email ba kera.
  - Kuko ikora gusa iyo ifatanye n’ubutumwa busanzwe bwo kuri email.
  - Kuko ibika amafaranga y’abakoresha mu mubiri w’imeli.
explanation: |
  Nk’uko nyene imeyili yahinduye cane uburyo bwo guhanahana amakuru mu gukuraho abahuza no gutuma umuntu wese yohereza ubutumwa kw’isi yose, Lightning Network yorosha kandi yihutisha ibikorwa vyo gutanga ubutumwa, igatuma gutanga agaciro ata ngorane kandi bishikira nk’imeyili.

question: 為什麼 Lightning Network 可以與「付款電子郵件」相提並論？
answer: 因為它可以實現無縫、全局、無權限的價值 Exchange，就像傳送訊息一樣簡單。
wrong_answers:
  - 因為它是透過傳統的電子郵件供應商傳送付款。
  - 因為它只有在附加到一般電子郵件訊息時才會運作。
  - 因為它會在電子郵件正文中儲存使用者結餘。
explanation: |
  正如電子郵件徹底改變了通訊方式，消除了中介，讓任何人都能傳送訊息到世界各地，Lightning Network 簡化並加速了交易，讓價值轉移像電子郵件一樣無摩擦、無障礙。
reviewed: false
question: Lightning Network को "भुगतान के लिए ईमेल" की तरह क्यों कहा जा सकता है?
answer: क्योंकि यह बिना किसी रुकावट, वैश्विक और बिना अनुमति के मूल्य Exchange को संदेश भेजने जितनी आसानी से ट्रांसफर करने में सक्षम बनाता है।
wrong_answers:
  - क्योंकि यह पेमेंट्स को पारंपरिक ईमेल प्रदाताओं के जरिए भेजता है।
  - क्योंकि यह सिर्फ तभी काम करता है जब यह नियमित ईमेल संदेशों से जुड़ा होता है।
  - क्योंकि यह यूज़र के बैलेंस को ईमेल के बॉडी में स्टोर करता है।
explanation: |
  जैसे ईमेल ने बिचौलियों को हटाकर और दुनिया भर में किसी को भी संदेश भेजने की सुविधा देकर संचार में क्रांति ला दी, वैसे ही Lightning Network लेन-देन को सरल और तेज़ बनाता है, जिससे मूल्य हस्तांतरण ईमेल की तरह ही आसान और सुलभ हो जाता है।
reviewed: false
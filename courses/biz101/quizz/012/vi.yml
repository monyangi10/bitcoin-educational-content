question: Vì sao Lightning Network (mạng Lightning) có thể được so sánh như “thanh toán qua email”?
answer: Bởi vì nó cho phép trao đổi giá trị toàn cầu không cần cấp phép và dễ dàng như gửi tin nhắn.
wrong_answers:
  - Bởi vì nó gửi thanh toán thông qua các nhà cung cấp email truyền thống.
  - Bởi vì nó chỉ hoạt động khi được đính kèm vào các email thông thường.
  - Bởi vì nó lưu trữ số dư của người dùng trong nội dung email.
explanation: |
  Cũng giống như email đã cách mạng hóa giao tiếp bằng cách loại bỏ các trung gian và cho phép bất kỳ ai cũng có thể gửi tin nhắn trên toàn thế giới, Lightning Network (mạng Lightning) đơn giản hóa và tăng tốc các giao dịch, giúp việc chuyển giao giá trị trở nên dễ dàng và thuận tiện như email.
reviewed: true
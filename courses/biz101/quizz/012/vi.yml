question: Tại sao Lightning Network có thể được so sánh với “email để thanh toán”?
answer: Bởi vì nó cho phép trao đổi giá trị liền mạch, toàn cầu và không cần xin phép dễ dàng như gửi tin nhắn.
wrong_answers:
  - Bởi vì nó gửi thanh toán thông qua các nhà cung cấp email truyền thống.
  - Bởi vì nó chỉ hoạt động khi được đính kèm vào các email thông thường.
  - Bởi vì nó lưu trữ số dư của người dùng trong nội dung email.
explanation: |
  Cũng giống như email đã cách mạng hóa giao tiếp bằng cách loại bỏ các trung gian và cho phép bất kỳ ai cũng có thể gửi tin nhắn trên toàn thế giới, Lightning Network đơn giản hóa và tăng tốc các giao dịch, giúp việc chuyển giao giá trị trở nên dễ dàng và thuận tiện như email.
reviewed: true
question: 初次接受 Bitcoin 付款時，從小規模開始的好處是什麼？
answer: 它可讓企業從最初的幾筆交易中學習，並在客戶需求成長時逐漸轉換為更複雜的解決方案。
wrong_answers:
  - 它迫使企業只能立即使用自我保管解決方案。
  - 它可防止企業日後升級或變更供應商。
  - 它要求公司在瞭解流程之前接受每一位客戶的 Bitcoin。
explanation: |
  從簡單的入門級方法開始，可以讓企業在沒有重大風險的情況下獲得實際經驗。如果對 Bitcoin 付款的興趣證明是值得的，公司就可以升級其基礎架構，並整合更先進的工具。
reviewed: false
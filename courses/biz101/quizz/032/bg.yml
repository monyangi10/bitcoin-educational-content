question: Каква е ползата от това да започнете с малки суми, когато за първи път приемате плащания Bitcoin?
answer: Това позволява на бизнеса да се учи от няколко първоначални транзакции и постепенно да преминава към по-сложни решения, ако търсенето на клиентите нараства.
wrong_answers:
  - Това принуждава бизнеса да използва незабавно само решения за самоохрана.
  - Това не позволява на предприятието да надгражда или да сменя доставчика по-късно.
  - Тя изисква компанията да приеме Bitcoin от всеки клиент, преди да разбере процеса.
explanation: |
  Започването с прост подход на начално ниво дава възможност на предприятието да придобие практически опит без значителен риск. Ако интересът към Bitcoin плащанията се окаже оправдан, компанията може да надгради инфраструктурата си и да интегрира по-усъвършенствани инструменти.
reviewed: true
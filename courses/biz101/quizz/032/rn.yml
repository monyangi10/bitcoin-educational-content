question: Ni inyungu imwe iyihe yo gutangura bitoyi igihe wemera ubwa mbere amahera ya Bitcoin?
answer: Bituma ubucuruzi bwigira ku bikorwa bikeyi vy’intango maze buhorobuhoro bugaca buja ku mirongo ngenderwako y’ubuhinga buhanitse iyo abaguzi basaba cane.
wrong_answers:
  - Bihatira ubucuruzi gukoresha gusa inyishu zo kwirinda ubwo nyene.
  - Bibuza ubucuruzi gutera imbere canke guhindura ababutanga mu nyuma.
  - Bisaba ko sosiyete yemera Bitcoin ku mukiriya wese imbere y’uko itahura ingene bigenda.
explanation: |
  Gutangura n’uburyo bworoshe, bwo gutangura, bituma ubucuruzi bushobora kuronka ubumenyi ngirakamaro ata ngorane zikomeye. Iyo inyungu y’amahera y’ugutanga Bitcoin yerekanye ko ari ngirakamaro, iyo sosiyete irashobora rero gutera imbere mu bikorwa remezo vyayo no gushiramwo ibikoresho biteye imbere kuruta.

question: कौन सा ओपन-सोर्स सॉफ्टवेयर प्रोफेशनल Bitcoin पेमेंट सिस्टम के लिए अनुकूलित है?
answer: बीटीसी पे सर्वर
wrong_answers:
  - स्विस जीडब्ल्यू-1 पे
  - खुला नोड
  - बिटकॉइनाइज़ पीओएस (PoS)
explanation: |
  कोर्स में BTC पे सर्वर को प्रोफेशनल सेटअप्स के लिए कोर ओपन-सोर्स सॉल्यूशन के रूप में हाइलाइट किया गया है, क्योंकि इसमें एक्सटेंसिव इंटीग्रेशन ऑप्शंस और कंट्रोल होते हैं।
reviewed: false
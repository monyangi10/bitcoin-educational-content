question: Ni iyihe porogarama yigenga  ihuye n’uburyo bwo kwishura bwa kinyamwuga Bitcoin?
answer: Serveur BTC Pay
wrong_answers:
  - Swiss Bitcoin Pay
  - Open Node
  - Bitcoinize PoS
explanation: |
  BTC Pay Server irashirwa ahabona muri iyo nyigisho nk’umuti w’ingenzi w’inkomoko yuguruye ku mitunganyirize y’abahinga kubera uburyo bwinshi bwo gukwirikirana neza ibikorwa.
reviewed: true

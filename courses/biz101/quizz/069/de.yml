question: Welche Open-Source-Software ist an ein professionelles Bitcoin-Zahlungssystem angepasst?
answer: BTC Pay Server
wrong_answers:
  - Swiss Bitcoin Pay
  - Open Node
  - Bitcoinize PoS
explanation: |
  BTC Pay Server wird im Kurs als die zentrale Open-Source-Lösung für Professional Setups aufgrund seiner umfangreichen Integrationsmöglichkeiten und Kontrolle hervorgehoben.
reviewed: true

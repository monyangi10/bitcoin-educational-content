question: Các doanh nghiệp thuộc nhóm chuyên nghiệp (hồ sơ 3) thường yêu cầu những tính năng nâng cao nào?
answer: Những chỉ số báo cáo nâng cao cùng với hỗ trợ nhiều vai trò quản trị
wrong_answers:
  - Ghi chép giao dịch và biên lai cơ bản
  - Tích hợp ví đơn giản và tạo mã QR
  - Tự động chuyển đổi sang tiền pháp định mà không có bất kỳ tùy chọn báo cáo nào
explanation: |
  Các doanh nghiệp thuộc nhóm chuyên nghiệp cần tùy chỉnh hóa đơn, báo cáo chi tiết và quản lý vai trò để phù hợp với quy trình làm việc phức tạp.
reviewed: true
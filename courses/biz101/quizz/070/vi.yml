question: Các doanh nghiệp chuyên nghiệp thường yêu cầu những tính năng nâng cao nào?
answer: Bảng thông tin báo cáo nâng cao và nhiều vai trò quản trị
wrong_answers:
  - Ghi chép giao dịch cơ bản và biên lai tiêu chuẩn
  - Tích hợp wallet đơn giản và tạo mã QR
  - Tự động chuyển đổi sang tiền pháp định mà không có bất kỳ tùy chọn báo cáo nào
explanation: |
  Các doanh nghiệp chuyên nghiệp cần hóa đơn có thể tùy chỉnh, báo cáo phức tạp và quản lý vai trò để phù hợp với quy trình làm việc phức tạp của họ.
reviewed: true
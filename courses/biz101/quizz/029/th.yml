question: ข้อดีของการชำระเงิน Lightning Network สำหรับผู้ค้าขาย ณ จุดขายคืออะไร?
answer: การชำระเงินด้วย Lightning จะเสร็จสิ้นเกือบจะทันทีและไม่จำเป็นต้องมีตัวกลางหลายตัว ลดค่าธรรมเนียมและความล่าช้าในการชำระเงิน
wrong_answers:
  - การชำระเงินด้วย Lightning ต้องใช้เวลาหลายสัปดาห์ในการยืนยันและต้องการเอกสารจำนวนมาก
  - การชำระเงินด้วย Lightning จะเกิดขึ้นได้ก็ต่อเมื่อได้รับการอนุมัติจากหน่วยงานของธนาคารกลางเท่านั้น
  - การชำระเงินด้วย Lightning สามารถถูกยกเลิกได้ตามต้องการโดยผู้ซื้อหลังการขาย
explanation: |
  Lightning Network ช่วยให้การทำธุรกรรมเร็วขึ้นและถูกลงโดยการอำนวยความสะดวกในการชำระเงิน off-chain ผู้ค้าสามารถรับเงินได้เกือบจะทันที ด้วยค่าธรรมเนียมที่น้อยที่สุด และไม่ต้องพึ่งพาตัวกลางการชำระเงินแบบดั้งเดิม
reviewed: true
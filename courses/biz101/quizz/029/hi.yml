question: जी, पॉइंट ऑफ सेल (POS) पर Lightning Network पेमेंट्स का मर्चेंट्स के लिए एक फायदा यह है कि इसमें **ज़ीरो ट्रांजैक्शन फीस** होती है। यानी, मर्चेंट्स को किसी भी अतिरिक्त चार्ज या कमीशन का भुगतान नहीं करना पड़ता, जिससे उनकी लागत कम होती है और मुनाफ़ा बढ़ता है। साथ ही, यह सिस्टम तेज़ और सुरक्षित होता है, जिससे ग्राहकों को भी आसानी होती है।
answer: बिजली की तरह तेज़ भुगतान, तुरंत सेटल हो जाते हैं और बिचौलियों की ज़रूरत नहीं पड़ती, जिससे फीस और देरी दोनों कम हो जाती है।
wrong_answers:
  - बिजली के भुगतान को पुष्टि करने में हफ्तों लगते हैं और भारी कागजी कार्रवाई की जरूरत होती है।
  - बिजली भुगतान तभी होते हैं जब किसी केंद्रीय बैंक के अधिकारी द्वारा मंजूरी मिल जाए।
  - खरीदार बिक्री के बाद मनमर्जी से लाइटनिंग भुगतान को वापस ले सकता है।
explanation: |
  Lightning Network, off-chain सेटलमेंट की मदद से लेन-देन को तेज़ और सस्ता बना देता है। दुकानदारों को पैसे लगभग तुरंत मिल जाते हैं, बहुत कम फीस के साथ, और बिना पारंपरिक भुगतान बिचौलियों पर निर्भर रहे।

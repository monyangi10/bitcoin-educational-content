question: Кое е предимството на плащанията Lightning Network за търговците в точката на продажба?
answer: Светкавичните плащания се уреждат почти незабавно и не изискват множество посредници, което намалява таксите и забавянията при уреждане.
wrong_answers:
  - Потвърждаването на мълниеносните плащания отнема седмици и изисква много документи.
  - Мълниеносните плащания се извършват само ако са одобрени от органа на централната банка.
  - Плащанията за мълнии могат да бъдат отменени по желание на купувача след продажбата.
explanation: |
  Lightning Network дава възможност за по-бързи и по-евтини транзакции, като улеснява сетълмента на off-chain. Търговците могат да получават средства почти мигновено, с минимални такси и без да разчитат на традиционните платежни посредници.
reviewed: true
question: Was ist ein Vorteil von Lightning Network-Zahlungen für Händler am Point of Sale?
answer: Lightning-Zahlungen werden fast sofort abgewickelt und erfordern nicht mehrere Zwischenhändler, was Gebühren und Abwicklungsverzögerungen reduziert.
wrong_answers:
  - Bei Lightning-Zahlungen dauert es Wochen, bis sie bestätigt werden, und es ist viel Papierkram erforderlich.
  - Lightning-Zahlungen erfolgen nur, wenn sie von einer Zentralbankbehörde genehmigt wurden.
  - Lightning-Zahlungen können vom Käufer nach dem Verkauf nach Belieben rückgängig gemacht werden.
explanation: |
  Das Lightning Network macht Transaktionen schneller und billiger, indem es eine Off-Chain-Abwicklung ermöglicht. Händler können Gelder fast sofort erhalten, mit minimalen Gebühren und ohne auf traditionelle Zahlungsmittler angewiesen zu sein.
reviewed: true

question: 판매 시점에 판매자가 Lightning Network 결제를 사용하면 어떤 이점이 있나요?
answer: 라이트닝 결제는 거의 즉시 정산되며 여러 중개자가 필요하지 않으므로 수수료와 정산 지연을 줄일 수 있습니다.
wrong_answers:
  - 라이트닝 결제는 확인까지 몇 주가 걸리고 서류 작업이 많이 필요합니다.
  - 라이트닝 결제는 중앙은행 당국의 승인을 받은 경우에만 이루어집니다.
  - 라이트닝 결제는 판매 후 구매자가 마음대로 취소할 수 있습니다.
explanation: |
  Lightning Network은 off-chain 결제를 촉진하여 더 빠르고 저렴한 거래를 가능하게 합니다. 판매자는 기존 결제 중개업체에 의존하지 않고 최소한의 수수료로 거의 즉시 자금을 받을 수 있습니다.
reviewed: true
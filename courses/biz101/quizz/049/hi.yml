question: पारंपरिक भुगतान प्रणालियों में सिक्कों के मुकाबले कागज़ के नोट का क्या बड़ा फायदा है?
answer: पोर्टेबिलिटी और कार्यक्षमता में वृद्धि
wrong_answers:
  - कीमती धातुओं के जरिए बढ़ाया गया आंतरिक मूल्य
  - हर लेन-देन की स्वचालित जाँच
  - नकली उत्पादों के जोखिमों का पूरी तरह से खात्मा
explanation: |
  कागज़ के नोट, सिक्कों की तुलना में हल्के और आसानी से ले जाने में सुविधाजनक होने के कारण, लंबी दूरी के व्यापार को और अधिक कुशल बनाते हैं और ढुलाई की समस्याओं को कम करते हैं।
reviewed: false
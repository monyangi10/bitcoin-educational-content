question: ข้อได้เปรียบหลักของเงินกระดาษเหนือเหรียญในระบบการชำระเงินแบบดั้งเดิมคืออะไร?
answer: ความสะดวกในการพกพาและประสิทธิภาพที่เพิ่มขึ้น
wrong_answers:
  - เพิ่มคุณค่าภายในผ่านโลหะมีค่า
  - การตรวจสอบธุรกรรมทุกครั้งโดยอัตโนมัติ
  - การกำจัดความเสี่ยงจากสินค้าปลอมอย่างสมบูรณ์
explanation: |
  ธนบัตร ซึ่งมีน้ำหนักเบาและง่ายต่อการขนส่งมากกว่าเหรียญ ช่วยให้การค้าระยะไกลมีประสิทธิภาพมากขึ้นและลดความท้าทายด้านลอจิสติกส์
reviewed: true
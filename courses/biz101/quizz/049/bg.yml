question: Кое е основното предимство на хартиените пари пред монетите в традиционните платежни системи?
answer: Повишена преносимост и ефективност
wrong_answers:
  - Повишена вътрешна стойност чрез благородни метали
  - Автоматична проверка на всяка транзакция
  - Пълно елиминиране на рисковете от фалшифициране
explanation: |
  Хартиените пари, които са леки и по-лесни за пренасяне от монетите, позволяват по-ефективна търговия на дълги разстояния и намаляват логистичните предизвикателства.
reviewed: true
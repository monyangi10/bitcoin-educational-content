question: Welk belangrijk voordeel heeft papiergeld ten opzichte van munten in traditionele betalingssystemen?
answer: Verhoogde draagbaarheid en efficiëntie
wrong_answers:
  - Verbeterde intrinsieke waarde door edelmetalen
  - Automatische verificatie van elke transactie
  - Volledige eliminatie van namaakrisico's
explanation: |
  Papiergeld was lichter en gemakkelijker te vervoeren dan munten, waardoor de handel over lange afstanden efficiënter kon verlopen en de logistieke uitdagingen kleiner werden.
reviewed: false
question: Jaką kluczową przewagę ma pieniądz papierowy nad monetami w tradycyjnych systemach płatności?
answer: Zwiększona przenośność i wydajność
wrong_answers:
  - Zwiększona wartość wewnętrzna dzięki metalom szlachetnym
  - Automatyczna weryfikacja każdej transakcji
  - Całkowita eliminacja ryzyka podrabiania
explanation: |
  Pieniądz papierowy, będąc lekkim i łatwiejszym w transporcie niż monety, umożliwił bardziej wydajny handel na duże odległości i zmniejszył wyzwania logistyczne.

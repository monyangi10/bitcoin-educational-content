question: Ni mazoezi gani yaliyopendekezwa kuhusu ulinzi wakati wa kupata Bitcoin?
answer: Fikiria masuluhisho ya kujilinda baada ya ununuzi wa awali, ili biashara idhibiti mali zake kikweli.
wrong_answers:
  - Usiwahi kutoa Bitcoin kutoka kwa Exchange kwa hali yoyote.
  - Daima mwamini mtunzaji mmoja bila kukagua hatua za usalama.
  - Hifadhi zote za Bitcoin kwenye tovuti ya umma na nenosiri rahisi
explanation: |
  Baada ya kununua Bitcoin, kuihamishia kwenye Wallet ya kujilinda inahakikisha biashara ina udhibiti wa moja kwa moja juu ya fedha zake. Ingawa walinzi wengine wanaweza kuwa rahisi, ulinzi wa kibinafsi unalingana na kanuni ya Bitcoin ya uhuru wa kifedha.
reviewed: true

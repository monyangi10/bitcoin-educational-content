question: ข้อเสนอแนะหนึ่งเกี่ยวกับการดูแลเมื่อได้รับ Bitcoin คืออะไร?
answer: พิจารณาโซลูชันการดูแลตนเองหลังจากการซื้อครั้งแรก เพื่อให้ธุรกิจควบคุมสินทรัพย์ของตนเองอย่างแท้จริง
wrong_answers:
  - อย่าถอน Bitcoin จากการแลกเปลี่ยนไม่ว่าในกรณีใด ๆ
  - เชื่อถือผู้ดูแลเพียงคนเดียวเสมอโดยไม่ต้องตรวจสอบมาตรการรักษาความปลอดภัย
  - จัดเก็บ Bitcoin ทั้งหมดบนเว็บไซต์สาธารณะที่มีรหัสผ่านง่าย ๆ
explanation: |
  หลังจากซื้อ Bitcoin การย้ายไปยังการดูแลตนเอง wallet ช่วยให้ธุรกิจมีการควบคุมโดยตรงเหนือเงินทุนของตนเอง แม้ว่าผู้ดูแลบุคคลที่สามจะสะดวก แต่การดูแลตนเองสอดคล้องกับหลักการของ Bitcoin ในเรื่องอธิปไตยทางการเงิน
reviewed: true
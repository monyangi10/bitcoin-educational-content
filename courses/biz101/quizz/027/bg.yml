question: Коя е препоръчителната практика по отношение на попечителството при придобиване на Bitcoin?
answer: Обмислете решения за самостоятелно съхранение след първоначалните покупки, за да може бизнесът наистина да контролира своите активи.
wrong_answers:
  - Никога и при никакви обстоятелства не изтегляйте Bitcoin от борсата.
  - Винаги се доверявайте на един попечител, без да преглеждате мерките за сигурност.
  - Съхранявайте всички Bitcoin на публичен уебсайт с проста парола
explanation: |
  След закупуването на Bitcoin, преместването му в wallet за самостоятелно съхранение гарантира, че бизнесът има пряк контрол върху средствата си. Макар че попечителите от трети страни могат да бъдат удобни, самопопечителството съответства на принципа за финансов суверенитет на Bitcoin.
reviewed: true
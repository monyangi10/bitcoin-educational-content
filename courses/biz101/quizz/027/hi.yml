question: Bitcoin प्राप्त करते समय कस्टडी के बारे में एक सुझावित प्रथा क्या है?
answer: शुरुआती खरीदारी के बाद सेल्फ-कस्टडी सॉल्यूशन्स पर विचार करें, ताकि बिजनेस वास्तव में अपनी संपत्ति पर कंट्रोल रख सके।
wrong_answers:
  - किसी भी हालत में Exchange से Bitcoin को वापस नहीं निकालना।
  - हमेशा सुरक्षा उपायों की जाँच किए बिना एक ही कस्टोडियन पर भरोसा करो।
  - सभी Bitcoin को एक सार्वजनिक वेबसाइट पर स्टोर करें, एक साधारण पासवर्ड के साथ
explanation: |
  Bitcoin खरीदने के बाद, इसे सेल्फ-कस्टडी Wallet में ट्रांसफर करने से बिज़नेस को अपने फंड्स पर सीधा कंट्रोल मिलता है। हालांकि थर्ड-पार्टी कस्टडियन सुविधाजनक हो सकते हैं, लेकिन सेल्फ-कस्टडी Bitcoin के फाइनेंशियल सॉवरेन्टी के सिद्धांत के साथ मेल खाती है।
reviewed: false
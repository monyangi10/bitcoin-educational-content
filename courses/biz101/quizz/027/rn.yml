question: Ni uwuhe mugenzo umwe ushikirizwa ku bijanye n’ukubungabunga igihe umuntu aronka Bitcoin?
answer: Rimbura inyishu zo kwizigama inyuma y’ugugura kwa mbere, rero ubudandaji buragenzura vy’ukuri itunga ryabwo.
wrong_answers:
  - Ntukigere ukura Bitcoin muri Exchange uko vyogenda kwose.
  - Imisi yose wizere umucungezi umwe utasubiyemwo ingingo z’umutekano.
  - Bika Bitcoin zose ku rubuga rwa bose ukoresheje ijambobanga ryoroshe
explanation: |
  Amaze kugura Bitcoin, kuyijana mu Wallet yigenzura bituma ubucuruzi bugira ububasha butaziguye ku mahera yabwo. Naho abacungera amafaranga bashobora kuba babereye, ukwicungera bihuye n’ingingo ngenderwako y’ubusegaba bw’ivy’ubutunzi ya Bitcoin.
reviewed: true

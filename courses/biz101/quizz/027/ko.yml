question: Bitcoin 획득 시 양육권과 관련하여 권장되는 관행은 무엇인가요?
answer: 초기 구매 후에는 기업이 자산을 실질적으로 관리할 수 있도록 셀프 커스터디 솔루션을 고려하세요.
wrong_answers:
  - 어떤 상황에서도 Exchange에서 Bitcoin를 철회하지 마세요.
  - 보안 조치를 검토하지 않고 항상 단일 관리자를 신뢰하세요.
  - 간단한 비밀번호를 사용하여 모든 Bitcoin를 공개 웹사이트에 저장하세요
explanation: |
  Bitcoin를 구매한 후 자체 관리 Wallet로 이전하면 비즈니스가 자금을 직접 관리할 수 있습니다. 제3자 관리인이 편리할 수 있지만, 자체 관리가 Bitcoin의 재정 주권 원칙에 부합합니다.
reviewed: true
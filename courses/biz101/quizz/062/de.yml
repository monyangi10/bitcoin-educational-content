question: Welche alternative Lösung zu Swiss Bitcoin Pay, um Bitcoin-Zahlungen für das Essential-Profil zu akzeptieren, ist 100% Custodial?
answer: Open Node
wrong_answers:
  - BTCPay Server
  - Bitcoinize PoS
  - Phoenix Wallet
explanation: |
  Open Node ist eine reine Custodial-Lösung, die sich von der Hybridlösung Swiss Bitcoin Pay unterscheidet.
reviewed: true

question: स्विस Bitcoin के बजाय कौन सा विकल्प Essential प्रोफाइल के लिए Bitcoin भुगतान स्वीकार करने में 100% कस्टोडियल है?
answer: नोड खोलो
wrong_answers:
  - बीटीसीपे सर्वर
  - बिटकॉइनाइज़ पीओएस
  - फीनिक्स जीडब्ल्यू-1
explanation: |
  ओपन नोड को एक पूरी तरह से कस्टोडियल समाधान के रूप में पहचाना जाता है, जो स्विस जीडब्ल्यू-2 पे के हाइब्रिड स्वभाव से अलग है।
reviewed: false
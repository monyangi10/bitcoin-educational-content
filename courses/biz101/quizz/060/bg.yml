question: Кое е основното хардуерно изискване, за да приема плащания Bitcoin?
answer: Смартфон
wrong_answers:
  - ASIC Bitcoin миньор
  - хардуерен портфейл
  - Самостоятелно хостван сървър
explanation: |
  изискванията за приемане на биткойн са малки: смартфон или таблет с портфейл за Lightning network, което го прави леснодостъпно решение.
reviewed: true

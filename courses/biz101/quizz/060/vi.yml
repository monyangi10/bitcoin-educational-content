question: Yêu cầu phần cứng chính để cấu hình Starter có thể chấp nhận thanh toán Bitcoin là gì?
answer: Một chiếc điện thoại thông minh
wrong_answers:
  - Một máy khai thác Bitcoin ASIC
  - Một phần cứng wallet
  - Một máy chủ tự lưu trữ
explanation: |
  Cấu hình Starter chỉ yêu cầu điện thoại thông minh hoặc máy tính bảng có Lightning wallet, khiến nó trở thành giải pháp gọn nhẹ.
reviewed: true
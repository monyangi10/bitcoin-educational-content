question: स्टार्टर प्रोफाइल के लिए Bitcoin पेमेंट स्वीकार करने की प्राथमिक हार्डवेयर आवश्यकता क्या है?
answer: एक स्मार्टफोन
wrong_answers:
  - एक जीडब्ल्यू-1 जीडब्ल्यू-2 जीडब्ल्यू-3
  - एक जीडब्ल्यू-4
  - एक स्व-होस्टेड सर्वर
explanation: |
  स्टार्टर प्रोफाइल के लिए सिर्फ एक स्मार्टफोन या टैबलेट चाहिए जिसमें लाइटनिंग Wallet हो, यह एक हल्का-फुल्का समाधान है।
reviewed: false
question: कौन सा सीन Bitcoin पेमेंट्स के लिए एसेंशियल प्रोफाइल के इस्तेमाल को सबसे अच्छे तरीके से दिखाता है?
answer: एक रेस्तरां जो महीने में कुछ Bitcoin भुगतान स्वीकार करता है
wrong_answers:
  - एक बहुराष्ट्रीय कंपनी जो रोज़ हज़ारों लेन-देन संभालती है
  - एक स्वतंत्र फ्रीलांसर जो अपने इनवॉइस के भुगतान के लिए बिटकॉइन स्वीकार करता है
  - एक हाई-फ्रीक्वेंसी Bitcoin ट्रेडिंग डेस्क
explanation: |
  एसेंशियल प्रोफाइल छोटे से मध्यम आकार के व्यवसायों के लिए है जिनके पास कम Bitcoin लेनदेन होते हैं, जैसे कि एक रेस्तरां।
reviewed: false
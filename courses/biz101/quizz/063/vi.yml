question: Ví dụ nào minh họa tốt nhất khi nhóm hồ sơ thiết yếu sử dụng cho việc thanh toán với Bitcoin?
answer: Một nhà hàng chấp nhận một vài khoản thanh toán bằng Bitcoin mỗi tháng
wrong_answers:
  - Một tập đoàn đa quốc gia xử lý hàng ngàn giao dịch mỗi ngày
  - Một người làm việc tự do độc lập chấp nhận thanh toán hóa đơn của họ bằng bitcoin
  - Bàn giao dịch Bitcoin tần suất cao
explanation: |
  Nhóm hồ sơ thiết yếu nhắm đến các doanh nghiệp vừa và nhỏ có số lượng giao dịch Bitcoin hạn chế, chẳng hạn như nhà hàng.
reviewed: true
question: Кой сценарий илюстрира най-добре профила Essential за плащания Bitcoin?
answer: Ресторант, който приема няколко плащания с Bitcoin на месец
wrong_answers:
  - Многонационална корпорация, която обработва хиляди транзакции дневно
  - Независим специалист на свободна практика, който приема плащане на фактурите си в биткойни
  - Отдел за високочестотна търговия Bitcoin
explanation: |
  Профилът Essential е насочен към малки и средни предприятия с ограничени транзакции по Bitcoin, като например ресторанти.
reviewed: true

question: Ni hali gani inayoonyesha vyema matumizi ya Wasifu Muhimu kwa malipo ya Bitcoin?
answer: Mkahawa unaokubali malipo machache ya Bitcoin kwa mwezi
wrong_answers:
  - Shirika la kimataifa linalochakata maelfu ya miamala kila siku
  - Mfanyakazi huru anayekubali malipo ya ankara zao kwenye bitcoins
  - Dawati la biashara la Bitcoin la masafa ya juu
explanation: |
  Wasifu Muhimu unalenga biashara ndogo hadi za kati zilizo na miamala michache ya Bitcoin, kama vile mkahawa.
reviewed: true

question: Ni ikihe kintu kigaragaza neza ikoreshwa ry’urutonde rw’ivy’ingenzi ku bijanye n’ugutanga amahera ya Bitcoin?
answer: Resitora yemera amahera makeyi y'ama Bitcoin ku kwezi
wrong_answers:
  - Ishirahamwe ry'ibihugu vyinshi rikora amafaranga ibihumbi ku musi
  - Umuntu yigenga yigenga yemera kwishurwa amafagitire yabo mu bitcoins
  - Ibiro vy'ubudandaji vy'incuro nyinshi Bitcoin
explanation: |
  Igishushanyo c’ingenzi kigenewe ubucuruzi buto buto n’ubuciriritse bufise amafaranga make ya Bitcoin, nk’iresitora.

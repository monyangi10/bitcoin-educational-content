question: 오늘날 소매점에서의 카드 기반 결제 프로세스의 복잡한 특징은 무엇일까요?
answer: 여러 중개업체와 여러 단계를 거쳐야 하며 자금을 완전히 정산하는 데 며칠이 걸릴 수 있습니다.
wrong_answers:
  - 한 단계만 거치면 즉시 자금이 정산됩니다.
  - 중개자 없이 실물 현금에만 의존합니다.
  - 카드를 스와이프하면 판매자는 즉시 그리고 비가역적으로 자금을 확보할 수 있습니다.
explanation: |
  카드 결제에는 일련의 중개자(매입자, 발급자, 카드 네트워크)가 관여하고 승인 및 결제 단계가 필요하며 판매자가 순 자금을 수령하기까지 48시간에서 며칠이 걸릴 수 있습니다.
reviewed: true
question: Ni nini kinachoonyesha ugumu wa mchakato wa malipo wa leo kulingana na kadi katika sehemu ya mauzo ya rejareja?
answer: Inajumuisha wapatanishi wengi, hatua kadhaa, na inaweza kuchukua siku kutatua kikamilifu pesa.
wrong_answers:
  - Inahitaji hatua moja tu ya papo hapo na pesa zinatatuliwa mara moja.
  - Inategemea pesa taslimu pekee na hakuna waamuzi.
  - Inahakikisha kwamba mara tu kadi inapotelezeshwa kidole, mfanyabiashara atakuwa na pesa papo hapo na bila kubatilishwa.
explanation: |
  Malipo ya kadi mara nyingi huhusisha msururu wa wapatanishi (wanunuaji, watoaji, mitandao ya kadi), huhitaji uidhinishaji na hatua za kulipa, na inaweza kuchukua kutoka saa 48 hadi siku kadhaa kabla ya mfanyabiashara kupokea pesa zote.
reviewed: true 

question: อะไรที่เป็นลักษณะเฉพาะของความซับซ้อนในกระบวนการชำระเงินด้วยบัตรในปัจจุบันที่จุดขายปลีก?
answer: มันเกี่ยวข้องกับคนกลางหลายคน หลายขั้นตอน และอาจใช้เวลาหลายวันในการชำระเงินให้เสร็จสมบูรณ์
wrong_answers:
  - มันต้องการเพียงขั้นตอนเดียวทันที และเงินจะถูกชำระทันที
  - มันพึ่งพาเงินสดจริงเท่านั้นและไม่มีตัวกลางใด ๆ
  - มันทำให้มั่นใจได้ว่าเมื่อบัตรถูกรูดแล้ว ผู้ขายจะได้รับเงินทันทีและไม่สามารถย้อนกลับได้
explanation: |
  การชำระเงินด้วยบัตรมักเกี่ยวข้องกับการเชื่อมโยงของตัวกลาง (ผู้รับ, ผู้ออก, เครือข่ายบัตร), ต้องการขั้นตอนการอนุมัติและการชำระบัญชี, และอาจใช้เวลา 48 ชั่วโมงถึงหลายวันก่อนที่ผู้ขายจะได้รับเงินสุทธิ
reviewed: true
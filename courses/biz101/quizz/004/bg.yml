question: Каква е сложността на днешния процес на плащане с карта в търговския обект?
answer: Тя включва множество посредници, няколко стъпки и може да отнеме дни за пълно уреждане на средствата.
wrong_answers:
  - Изисква се само една незабавна стъпка и средствата се превеждат незабавно.
  - Тя разчита изключително на физически парични средства и без посредници.
  - Тя гарантира, че след като картата бъде прокарана, търговецът ще разполага със средствата незабавно и необратимо.
explanation: |
  Картовите плащания често включват верига от посредници (получатели, издатели, картови мрежи), изискват стъпки за оторизация и сетълмент и могат да отнемат от 48 часа до няколко дни, преди търговецът да получи средства.
reviewed: true

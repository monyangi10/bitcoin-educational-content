question: आज के रिटेल पॉइंट ऑफ सेल (POS) पर कार्ड-आधारित भुगतान प्रक्रिया की जटिलता क्या है?
answer: इसमें कई बिचौलिए शामिल होते हैं, कई चरण होते हैं, और पूरी तरह से फंड सेटल होने में दिनों का समय लग सकता है।
wrong_answers:
  - इसमें सिर्फ एक ही पल का कदम चाहिए और पैसे तुरंत सेटल हो जाते हैं।
  - यह पूरी तरह से नकदी पर निर्भर करता है और बीच में कोई दलाल नहीं होता।
  - यह सुनिश्चित करता है कि जैसे ही कार्ड स्वाइप किया जाता है, व्यापारी को तुरंत और अपरिवर्तनीय रूप से धनराशि मिल जाती है।
explanation: |
  कार्ड पेमेंट्स में अक्सर कई बिचौलिये शामिल होते हैं (एक्वायरर्स, इश्यूअर्स, कार्ड नेटवर्क्स), इन्हें अथॉराइज़ेशन और सेटलमेंट के चरणों की ज़रूरत होती है, और मर्चेंट को नेट फंड्स मिलने में 48 घंटे से लेकर कई दिन तक का समय लग सकता है।
reviewed: false
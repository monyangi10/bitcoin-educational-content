question: Tiếp cận vốn dựa vào nợ khác với vốn theo thuyết kinh tế Áo như thế nào?
answer: Theo thuyết kinh tế Áo, Vốn bắt nguồn từ sự tiết kiệm và hy sinh thực sự, trong khi vốn dựa trên nợ được tạo ra ngay lập tức từ tín dụng và có thể làm sai lệch các tín hiệu kinh tế.
wrong_answers:
  - Vốn theo thuyết kinh tế Áo được tạo ra bằng cách in thêm tiền bất cứ khi nào cần thiết.
  - Vốn vay không bao giờ cần phải trả nợ và tương đương với khoản tiết kiệm thực tế.
  - Không có sự khác biệt nào cả; cả hai hình thức vốn đều giống nhau về bản chất và tác dụng.
explanation: |
  Vốn theo thuyết kinh tế Áo xuất phát từ việc tiêu dùng thực tế bị bỏ qua và đầu tư thận trọng. Vốn dựa trên nợ, được tạo ra dễ dàng thông qua các khoản vay, có thể gây hiểu lầm cho các doanh nghiệp và dẫn đến đầu tư kém hiệu quả, vì nó không phản ánh đúng việc tiết kiệm hoặc sở thích của người tiêu dùng.
reviewed: true
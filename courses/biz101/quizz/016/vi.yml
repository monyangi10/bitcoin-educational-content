question: Vốn nhân tạo được tạo ra từ tiền dựa trên nợ khác với vốn theo kiểu Áo như thế nào?
answer: Vốn theo kiểu Áo bắt nguồn từ sự tiết kiệm và hy sinh thực sự, trong khi vốn dựa trên nợ được tạo ra ngay lập tức từ tín dụng và có thể làm sai lệch các tín hiệu kinh tế.
wrong_answers:
  - Vốn theo kiểu Áo được tạo ra bằng cách in thêm tiền bất cứ khi nào cần thiết.
  - Vốn vay không bao giờ cần phải trả nợ và tương đương với khoản tiết kiệm thực tế.
  - Không có sự khác biệt nào cả; cả hai hình thức vốn đều giống nhau về bản chất và tác dụng.
explanation: |
  Vốn Áo xuất phát từ việc tiêu dùng thực tế bị bỏ qua và đầu tư thận trọng. Vốn dựa trên nợ, được tạo ra dễ dàng thông qua các khoản vay, có thể gây hiểu lầm cho các doanh nhân và dẫn đến đầu tư kém hiệu quả, vì nó không phản ánh đúng mức tiết kiệm hoặc sở thích của người tiêu dùng.
reviewed: true
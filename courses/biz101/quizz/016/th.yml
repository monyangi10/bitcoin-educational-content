question: ทุนที่สร้างขึ้นจากเงินที่มีหนี้เป็นฐานแตกต่างจากทุนแบบออสเตรียอย่างไร?
answer: ทุนแบบออสเตรียเกิดจากการออมและการเสียสละที่แท้จริง ในขณะที่ทุนที่มาจากหนี้ถูกสร้างขึ้นทันทีจากเครดิตและสามารถบิดเบือนสัญญาณทางเศรษฐกิจได้
wrong_answers:
  - เงินทุนแบบออสเตรียเกิดจากการพิมพ์เงินเพิ่มเมื่อใดก็ตามที่จำเป็น
  - ทุนที่มาจากหนี้ไม่เคยต้องการการชำระคืนและเทียบเท่ากับการออมที่แท้จริง
  - ไม่มีความแตกต่าง; ทั้งสองรูปแบบของทุนมีลักษณะและผลกระทบที่เหมือนกัน
explanation: |
  เมืองหลวงของออสเตรียเกิดจากการบริโภคที่ถูกละเว้นจริงและการลงทุนอย่างรอบคอบ ทุนที่มาจากหนี้ซึ่งสร้างขึ้นได้ง่ายผ่านการกู้ยืมสามารถทำให้นักธุรกิจเข้าใจผิดและนำไปสู่การลงทุนที่ไม่มีประสิทธิภาพ เนื่องจากไม่ได้สะท้อนถึงการออมที่แท้จริงหรือความชอบของผู้บริโภค
reviewed: true
question: По какво се различава изкуствено създаденият капитал от пари, базирани на дълг, от капитала от австрийски тип?
answer: Капиталът от австрийски тип се формира от реални спестявания и жертви, докато капиталът, базиран на дълг, се създава мигновено от кредит и може да изкриви икономическите сигнали.
wrong_answers:
  - Капиталът в австрийски стил се генерира чрез печатане на повече пари, когато е необходимо.
  - Капиталът, базиран на дълг, никога не се нуждае от изплащане и е равностоен на реални спестявания.
  - Няма разлика - и двете форми на капитал са идентични по своята същност и ефект.
explanation: |
  Австрийският капитал се формира от реално пропуснато потребление и внимателни инвестиции. Дълговият капитал, който се създава лесно чрез заеми, може да заблуди предприемачите и да доведе до неефективни инвестиции, тъй като не отразява истинските спестявания или предпочитанията на потребителите.
reviewed: true
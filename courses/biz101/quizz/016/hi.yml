question: कर्ज़-आधारित पैसे से बनाया गया कृत्रिम पूंजी और ऑस्ट्रियाई स्टाइल के पूंजी में क्या फर्क है?
answer: ऑस्ट्रियन-स्टाइल पूंजी असली बचत और त्याग से आती है, जबकि कर्ज़-आधारित पूंजी क्रेडिट से तुरंत बन जाती है और आर्थिक संकेतों को गड़बड़ा सकती है।
wrong_answers:
  - ऑस्ट्रियन-स्टाइल की पूंजी तब बनती है जब जरूरत पड़ने पर ज्यादा पैसा छापा जाता है।
  - ऋण-आधारित पूंजी को कभी भी चुकाने की ज़रूरत नहीं होती और यह असली बचत के बराबर होती है।
  - कोई फर्क नहीं है; दोनों तरह की पूंजी प्रकृति और प्रभाव में एक जैसी हैं।
explanation: |
  ऑस्ट्रियाई राजधानी असली बचत और सोच-समझकर निवेश से पैदा होती है। कर्ज़े पर बनी पूँजी, जो आसानी से लोन के ज़रिए बन जाती है, व्यापारियों को गुमराह कर सकती है और बेकार निवेश की वजह बन सकती है, क्योंकि यह असली बचत या ग्राहकों की पसंद को नहीं दिखाती।

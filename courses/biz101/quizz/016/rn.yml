question: Ni gute umutungo waremwe mu buryo bw’ubuhinga buva ku mahera ashingiye ku madeni utandukanye n’umutungo w’umuco w’i Otirishiya?
answer: Itunga nk’iryo muri Otirishiya rikomoka ku kuzigama nyakuri no kwitanga, mu gihe itunga rishingiye ku madeni riremwa ubwo nyene rivuye ku ngurane kandi rishobora guhindura ibimenyetso vy’ubutunzi.
wrong_answers:
  - Igihugu c’ubutunzi nk’ico muri Otirishiya kiva mu gukora amahera menshi igihe cose bikenewe.
  - Itunga rishingiye ku ku madeni ntirigera risaba kwishurwa kandi ringana n’amahera nyayo umuntu azigamye.
  - Nta tandukaniro ririho; ubwo bwoko bwose bw’umutungo burasa mu kamere no mu ngaruka.
explanation: |
  Itunga rya Otirishiya riva mu gukoresha vy’ukuri n’ugushiramwo amahera vyitondewe. Itunga rishingiye kumadeni, riremeshwa mu buryo bworoshe biciye mu ngurane, rirashobora kuzimiza abashoramari no gutuma habaho ishoramari ritagira akamaro, kuko ritagaragaza ukuzigama nyakuri canke ivyo abaguzi bakunda.
reviewed: true

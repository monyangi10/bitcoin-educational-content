question: Waarin verschilt kunstmatig gecreëerd kapitaal uit schuldgeld van Oostenrijks kapitaal?
answer: Kapitaal in Oostenrijkse stijl komt voort uit echte besparingen en opoffering, terwijl kapitaal op basis van schulden direct wordt gecreëerd uit krediet en economische signalen kan verstoren.
wrong_answers:
  - Kapitaal in Oostenrijkse stijl wordt gegenereerd door meer geld bij te drukken wanneer dat nodig is.
  - Kapitaal op basis van schulden hoeft nooit te worden terugbetaald en is gelijk aan echt sparen.
  - Er is geen verschil; beide vormen van kapitaal zijn identiek in aard en effect.
explanation: |
  Oostenrijks kapitaal ontstaat uit werkelijke gederfde consumptie en zorgvuldige investeringen. Kapitaal op basis van schulden, dat gemakkelijk wordt gecreëerd door middel van leningen, kan ondernemers misleiden en leiden tot inefficiënte investeringen, omdat het niet de werkelijke besparingen of consumentenvoorkeuren weerspiegelt.
reviewed: false
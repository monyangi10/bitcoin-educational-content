question: 부채를 기반으로 인위적으로 만든 자본은 오스트리아식 자본과 어떻게 다른가요?
answer: 오스트리아식 자본은 실제 저축과 희생에서 비롯되는 반면, 부채 기반 자본은 신용을 통해 즉각적으로 생성되어 경제 신호를 왜곡할 수 있습니다.
wrong_answers:
  - 오스트리아식 자본은 필요할 때마다 더 많은 돈을 찍어내는 방식으로 만들어집니다.
  - 부채 기반 자본은 상환이 필요하지 않으며 실제 저축과 동일합니다.
  - 두 가지 형태의 자본은 본질과 효과가 동일하기 때문에 차이가 없습니다.
explanation: |
  오스트리아의 자본은 실제 소비와 신중한 투자에서 비롯됩니다. 대출을 통해 쉽게 형성되는 부채 기반 자본은 실제 저축이나 소비자 선호도를 반영하지 않기 때문에 기업가들을 오도하고 비효율적인 투자로 이어질 수 있습니다.
reviewed: true
question: 以債務為基礎的貨幣所人為製造的資本與奧地利式的資本有何不同？
answer: 奧地利式的資本源自於真正的儲蓄和犧牲，而債務式的資本則是由信貸即時創造出來的，而且會扭曲經濟訊號。
wrong_answers:
  - 奧地利式的資本是透過在需要時印製更多鈔票來產生的。
  - 債務型資本從不需要償還，等同於實際儲蓄。
  - 這兩種形式的資本在本質和效果上都是相同的。
explanation: |
  奧地利的資本來自於實際的前置消費和謹慎的投資。透過貸款輕易創造的債務型資本會誤導企業家，導致投資效率低下，因為它無法反映真正的儲蓄或消費者偏好。

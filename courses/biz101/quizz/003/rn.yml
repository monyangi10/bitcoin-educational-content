question: Ni ikihe kintu kibi kiri mu bijanye n’ubuhinga bwa none bwo gukoresha amahera  akwirikiranwa ninzego na reta?
answer: Akenshi birabuze gukorera mumuco , n’ubugenzuzi bwa amahera azunguruka mubantu.
wrong_answers:
  - Bitanga agaciro kadahinduka ku mafaranga yose abaho.
  - Bikuraho abahuza bose maze bigatuma amarungika yihuta kumurindi wa milisegonda.
  - Vyemeza ko ishirwaho ryamafaranga ata nzego nimwe iyagenzura , kandi arinzwe gutakaza agaciro.
explanation: |
  Uburyo bwamahera bukurikiramwa (centralisés) burashobora gutanga amahera uko bushaka, kenshi bidaciye mumuco. Ivyo birashobora gusenyura ukwizigirwa kubera ukuduga kwibiciro, ibikorwa bigorana hagati y’amabanki, n’ubugenzuzi bubi bushobora kubaho.
reviewed: true

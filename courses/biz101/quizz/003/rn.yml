question: Ni ikihe kintu kimwe kibi kiri mu bijanye n’ubuhinga bwa none bwo gukoresha amahera hagati?
answer: Akenshi ntibagira umuco n’ubugenzuzi mu gucunga amahera Supply.
wrong_answers:
  - Bitanga agaciro gakomeye, kadahinduka ku mafaranga yose.
  - Bakuraho abahuza bose maze bagatuma amasezerano yihuta gushika ku milisegonda.
  - Bakora vyose kugira ngo ugutanga amahera gushikirizwe mu buryo bushitse kandi ntihagire ugutera imbere kw’ibiciro.
explanation: |
  Uburyo buhurikiye hamwe burashobora gutanga amahera uko bushaka, kenshi ata kugenzura gutomoye. Ivyo birashobora gusenyura ukwizigirana kubera ugutera imbere kw’ibiciro, amasezerano agoranye hagati y’amabanki, n’uburongozi bubi bushobora kubaho.

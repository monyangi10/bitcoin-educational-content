question: 현대 중앙 집중식 통화 시스템의 한 가지 단점은 무엇인가요?
answer: Supply 자금 관리의 투명성과 감사 가능성이 부족한 경우가 많습니다.
wrong_answers:
  - 모든 통화 단위에 대해 안정적이고 변하지 않는 가치를 제공합니다.
  - 모든 중개자를 제거하고 정산 속도를 밀리초로 단축합니다.
  - 화폐 발행이 완전히 탈중앙화되고 인플레이션을 방지할 수 있도록 보장합니다.
explanation: |
  중앙 집중식 시스템은 투명한 감독 없이 마음대로 화폐를 발행할 수 있습니다. 이는 인플레이션, 복잡한 은행 간 결제, 잠재적인 관리 부실로 인해 신뢰를 약화시킬 수 있습니다.
reviewed: true
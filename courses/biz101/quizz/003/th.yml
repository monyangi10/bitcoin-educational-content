question: ข้อเสียอย่างหนึ่งของระบบสกุลเงินแบบรวมศูนย์สมัยใหม่คืออะไร?
answer: พวกเขามักขาดความโปร่งใสและความสามารถในการตรวจสอบในการจัดการปริมาณเงิน
wrong_answers:
  - พวกเขามอบค่าที่มั่นคงและไม่เปลี่ยนแปลงสำหรับทุกหน่วยสกุลเงิน
  - พวกเขากำจัดตัวกลางทั้งหมดและเร่งการชำระเงินให้เร็วขึ้นในระดับมิลลิวินาที
  - พวกเขามั่นใจว่าการออกเงินนั้นกระจายอำนาจอย่างเต็มที่และป้องกันเงินเฟ้อ
explanation: |
  ระบบรวมศูนย์สามารถออกเงินได้ตามต้องการ มักจะไม่มีการกำกับดูแลที่โปร่งใส สิ่งนี้สามารถทำลายความเชื่อมั่นเนื่องจากเงินเฟ้อ การชำระบัญชีระหว่างธนาคารที่ซับซ้อน และการจัดการที่ผิดพลาดที่อาจเกิดขึ้นได้
reviewed: true
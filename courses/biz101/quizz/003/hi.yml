question: आधुनिक केंद्रीकृत मुद्रा प्रणालियों का एक नुकसान क्या है?
answer: वे अक्सर पैसे Supply के प्रबंधन में पारदर्शिता और ऑडिट करने की क्षमता की कमी रखते हैं।
wrong_answers:
  - वे हर मुद्रा इकाई के लिए एक स्थिर, अपरिवर्तनीय मूल्य प्रदान करते हैं।
  - वे सभी बिचौलियों को हटा देते हैं और भुगतान को मिलीसेकंड में पूरा कर देते हैं।
  - वे यह सुनिश्चित करते हैं कि पैसे का जारी होना पूरी तरह से विकेंद्रीकृत हो और मुद्रास्फीति से सुरक्षित हो।
explanation: |
  केंद्रीकृत सिस्टम मनमर्जी से पैसा छाप सकते हैं, अक्सर बिना किसी पारदर्शी निगरानी के। इससे मुद्रास्फीति, जटिल इंटरबैंक सेटलमेंट्स और संभावित गलत प्रबंधन के कारण भरोसा कम हो सकता है।

question: Кой е недостатъкът на съвременните централизирани валутни системи?
answer: При управлението на паричното предлагане често липсват прозрачност и възможност за контрол.
wrong_answers:
  - Те осигуряват стабилна, непроменяща се стойност за всяка парична единица.
  - Те премахват всички посредници и ускоряват разплащанията до милисекунди.
  - Те гарантират, че емитирането на пари е напълно децентрализирано и устойчиво на инфлация.
explanation: |
  Централизираните системи могат да емитират пари по свое усмотрение, често без прозрачен надзор. Това може да подкопае доверието поради инфлация, сложни междубанкови разплащания и потенциално лошо управление.
reviewed: true
question: ลักษณะเด่นอย่างหนึ่งของ Bitcoin ในฐานะเครือข่ายสกุลเงินคืออะไร?
answer: มันเหมือนเงินสดและไม่ต้องการหน่วยงานกลางหรือคนกลางสำหรับการทำธุรกรรม
wrong_answers:
  - มันสามารถทำงานได้ก็ต่อเมื่อได้รับอนุญาตจากหน่วยงานรัฐบาลเท่านั้น
  - มันออกหน่วยสกุลเงินใหม่ตามคำขอของผู้ใช้
  - มันต้องการให้ธนาคารตรวจสอบและชำระธุรกรรมทุกครั้ง
explanation: |
  Bitcoin ทำงานเป็นเครือข่ายแบบกระจายศูนย์ ทำให้ทุกคนสามารถเข้าร่วมได้โดยไม่ต้องขออนุญาต การทำธุรกรรมได้รับการตรวจสอบโดยโหนดและนักขุด ไม่ใช่โดยหน่วยงานกลาง
reviewed: true
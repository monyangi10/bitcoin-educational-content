question: Bitcoin की करेंसी नेटवर्क के रूप में एक खास बात यह है कि यह बिना किसी सेंट्रल अथॉरिटी के काम करता है - यानी यह डिसेंट्रलाइज्ड है। इसमें सारे ट्रांजैक्शन पीयर-टू-पीयर होते हैं और किसी बैंक या सरकार का इसमें दखल नहीं होता।
answer: यह नकदी की तरह है और लेन-देन के लिए किसी केंद्रीय प्राधिकरण या बिचौलिए की जरूरत नहीं होती।
wrong_answers:
  - यह सिर्फ तभी काम कर सकता है जब सरकारी एजेंसी द्वारा अनुमति दी जाए।
  - यह किसी भी यूजर के अनुरोध पर करेंसी के नए यूनिट जारी करता है।
  - इसे हर लेन-देन को सत्यापित और निपटाने के लिए बैंकों की जरूरत होती है।
explanation: |
  Bitcoin एक विकेंद्रीकृत नेटवर्क की तरह काम करता है, जहाँ बिना किसी अनुमति के कोई भी हिस्सा ले सकता है। लेन-देन को नोड्स और माइनर्स द्वारा वैलिडेट किया जाता है, न कि किसी केंद्रीय प्राधिकरण द्वारा।

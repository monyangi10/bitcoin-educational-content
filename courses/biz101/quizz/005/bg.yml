question: Коя е характерната особеност на Bitcoin като валутна мрежа?
answer: Тя е като парите в брой и не изисква централен орган или посредник за транзакциите.
wrong_answers:
  - Тя може да функционира само когато е разрешена от правителствена агенция.
  - Тя издава нови парични единици по искане на всеки потребител.
  - Тя се нуждае от банки, които да проверяват и уреждат всяка транзакция.
explanation: |
  Bitcoin функционира като децентрализирана мрежа, която позволява на всеки да участва без разрешение. Транзакциите се потвърждават от възли и миньори, а не от централен орган.
reviewed: true
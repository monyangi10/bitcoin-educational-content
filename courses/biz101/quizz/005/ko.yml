question: 통화 네트워크로서 Bitcoin의 특징 중 하나는 무엇인가요?
answer: 현금과 같으며 거래에 중앙 기관이나 중개자가 필요하지 않습니다.
wrong_answers:
  - 정부 기관의 승인을 받은 경우에만 작동할 수 있습니다.
  - 사용자의 요청에 따라 새로운 화폐 단위를 발행합니다.
  - 모든 거래를 확인하고 결제하려면 은행이 필요합니다.
explanation: |
  Bitcoin은 탈중앙화된 네트워크로 운영되므로 누구나 허가 없이 참여할 수 있습니다. 거래는 중앙 기관이 아닌 노드와 채굴자에 의해 검증됩니다.
reviewed: true
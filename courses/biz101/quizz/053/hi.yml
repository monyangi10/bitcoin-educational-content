question: हर Bitcoin लेन-देन के लिए कौन-कौन से मुख्य भुगतान विवरण दर्ज किए जाने चाहिए?
answer: तारीख, रकम, समतुल्य फिएट मूल्य, और संबंधित पतों
wrong_answers:
  - जीडब्ल्यू-1, नेटवर्क फीस, और मर्चेंट का जीडब्ल्यू-2
  - तारीख, Exchange दर, Wallet प्रकार, और भौगोलिक स्थान
  - जीडब्ल्यू-6 ब्लॉक नंबर, जीडब्ल्यू-5, और इस्तेमाल किया गया स्क्रिप्ट
explanation: |
  इन ब्यौरों को दर्ज करने से स्पष्टता आती है और अकाउंटेंट को आने वाले और जाने वाले फंड्स में अंतर समझने में मदद मिलती है।
reviewed: false
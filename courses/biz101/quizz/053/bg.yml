question: Какви ключови данни за плащането трябва да се документират за всяка транзакция Bitcoin?
answer: Датата, сумата, еквивалентната фиатна стойност и свързаните с нея адреси
wrong_answers:
  - transaction ID, мрежова такса и адрес на търговеца
  - Дата, обменен курс, тип портфейл и географско местоположение
  - Номер на блока Bitcoin, времеви печат и използван скрипт
explanation: |
  Документирането на тези детайли осигурява яснота и помага на счетоводителите да разграничават входящите и изходящите потоци.
reviewed: true

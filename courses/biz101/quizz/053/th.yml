question: รายละเอียดการชำระเงินที่สำคัญที่ต้องบันทึกสำหรับแต่ละธุรกรรม Bitcoin คืออะไร?
answer: วันที่ จำนวน มูลค่าเงินตราที่เทียบเท่า และที่อยู่ที่เกี่ยวข้อง
wrong_answers:
  - transaction ID, ค่าธรรมเนียมเครือข่าย, และที่อยู่ของผู้ค้า
  - วันที่, อัตราแลกเปลี่ยน, ประเภท wallet, และที่ตั้งทางภูมิศาสตร์
  - หมายเลขบล็อก Bitcoin, การประทับเวลา, และสคริปต์ที่ใช้
explanation: |
  การบันทึกรายละเอียดเหล่านี้ช่วยให้เกิดความชัดเจนและช่วยให้นักบัญชีสามารถแยกแยะกระแสเงินเข้าและออกได้
reviewed: true
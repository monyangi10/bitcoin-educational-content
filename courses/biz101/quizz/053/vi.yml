question: Trong mỗi giao dịch Bitcoin, những thông tin thanh toán nào quan trọng phải được ghi lại?
answer: Ngày, số lượng, giá trị tiền pháp định tương đương và địa chỉ liên quan
wrong_answers:
  - Số định danh của mỗi giao dịch, phí mạng và địa chỉ của người bán
  - Ngày, tỷ giá hối đoái, loại ví và vị trí địa lý
  - Số thứ tự của khối Bitcoin, dấu mốcß thời gian và loại tập lệnh được sử dụng
explanation: |
  Việc ghi lại những chi tiết này đảm bảo tính rõ ràng và hỗ trợ kế toán viên phân biệt luồng tiền ra vào.
reviewed: true
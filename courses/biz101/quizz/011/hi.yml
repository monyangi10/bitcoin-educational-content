question: लाइटनिंग मर्चेंट्स को पेमेंट फाइनैलिटी के मामले में क्या फायदा देता है?
answer: लाइटनिंग पर भुगतान तुरंत पूरा हो जाता है, जिससे रिवर्सल या धोखाधड़ी का खतरा कम हो जाता है।
wrong_answers:
  - इसमें पैसे खर्च करने से पहले 24 घंटे का इंतज़ार करना पड़ता है।
  - यह ग्राहकों को कभी भी अपना भुगतान वापस लेने की अनुमति देता है।
  - यह लेन-देन को पूरी तरह से 90 दिनों तक वापस लेने योग्य बना देता है।
explanation: |
  लाइटनिंग के साथ, एक बार पेमेंट नेटवर्क के ज़रिए रूट और सेटल हो जाता है, तो वो फाइनल होता है। यह पारंपरिक पेमेंट सिस्टम में देखे जाने वाले चार्जबैक के मामलों को खत्म कर देता है।
reviewed: false
question: ライトニングが加盟店に提供する決済の確定に関する利点は何ですか？
answer: ライトニングでの支払いはほぼ即座に確定するため、取り消しや詐欺のリスクが軽減されること。
wrong_answers:
  - 資金が使用可能になるまで24時間待つ必要があること。
  - これにより、顧客はいつでも支払いを取り戻すことができること。
  - 最長90日間、取引を完全にリバーシブルにすること。
explanation: |
  ライトニングでは、決済がネットワークを通じてルーティングされ、決済されると、それが最終決定となる。これにより、従来の決済システムで見られたチャージバックのシナリオが排除される。

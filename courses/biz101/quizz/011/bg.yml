question: Какво предимство предлага Lightning на търговците по отношение на окончателността на плащането?
answer: Плащанията чрез Lightning се финализират почти незабавно, което намалява риска от сторниране или измама.
wrong_answers:
  - Изисква се 24 часа изчакване, преди средствата да могат да бъдат изразходвани.
  - Тя позволява на клиентите да възстановят плащането си по всяко време.
  - Тя прави транзакциите напълно обратими за период до 90 дни.
explanation: |
  При Lightning плащането е окончателно, след като бъде прехвърлено и уредено в мрежата. Това елиминира сценариите за чарджбек, които се наблюдават при традиционните платежни системи.
reviewed: true

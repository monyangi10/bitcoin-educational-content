question: 라이트닝은 결제 완결성과 관련하여 판매자에게 어떤 이점을 제공하나요?
answer: Lightning에서의 결제는 거의 즉시 완료되므로 결제 취소나 사기의 위험이 줄어듭니다.
wrong_answers:
  - 자금을 사용할 수 있으려면 24시간을 기다려야 합니다.
  - 이를 통해 고객은 언제든지 결제 금액을 회수할 수 있습니다.
  - 최대 90일 동안 거래를 완전히 되돌릴 수 있습니다.
explanation: |
  Lightning을 사용하면 네트워크를 통해 결제가 라우팅되고 정산되면 결제가 완료됩니다. 따라서 기존 결제 시스템에서 발생하는 지불 거절 시나리오가 사라집니다.
reviewed: true
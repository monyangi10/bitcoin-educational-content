question: Lightning มีข้อได้เปรียบอะไรบ้างสำหรับพ่อค้าในเรื่องความแน่นอนของการชำระเงิน?
answer: การชำระเงินบน Lightning เสร็จสิ้นเกือบจะทันที ลดความเสี่ยงของการย้อนกลับหรือการฉ้อโกง
wrong_answers:
  - จำเป็นต้องรอ 24 ชั่วโมงก่อนที่เงินจะสามารถใช้จ่ายได้
  - ช่วยให้ลูกค้าสามารถเรียกคืนการชำระเงินได้ทุกเมื่อ
  - มันทำให้การทำธุรกรรมสามารถย้อนกลับได้อย่างสมบูรณ์นานถึง 90 วัน
explanation: |
  ด้วย Lightning เมื่อการชำระเงินถูกส่งผ่านและชำระผ่านเครือข่ายแล้ว จะถือเป็นที่สิ้นสุด ซึ่งจะช่วยขจัดสถานการณ์การเรียกเงินคืนที่พบในระบบการชำระเงินแบบดั้งเดิม
reviewed: true
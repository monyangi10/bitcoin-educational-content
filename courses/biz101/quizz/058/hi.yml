question: एक फायदा यह है कि कस्टोडियल Wallet का इस्तेमाल करने से Starter प्रोफाइल वालों को अपने फंड्स का मैनेजमेंट करने की चिंता नहीं रहती, क्योंकि यह सुरक्षित तरीके से थर्ड पार्टी के ज़रिए होल्ड किया जाता है।
answer: टेक्निकल ज़िम्मेदारियाँ कम हो गईं
wrong_answers:
  - प्राइवेट कीज़ पर बढ़ा हुआ कंट्रोल
  - लेन-देन पर पूर्ण नियंत्रण के साथ बेहतर गोपनीयता
  - लेन-देन शुल्क को खत्म करना
explanation: |
  कस्टोडियल वॉलेट्स प्राइवेट कीज़ को मैनेज करते हैं, जिससे यूज़र्स के लिए टेक्निकल दिक्कतें कम हो जाती हैं।
reviewed: false
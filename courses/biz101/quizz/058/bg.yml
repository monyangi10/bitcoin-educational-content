question: Кое е предимството на използването на попечителски wallet за профила Starter?
answer: Намалени технически отговорности
wrong_answers:
  - Повишен контрол върху частните ключове
  - Повишена поверителност с пълна автономия на транзакциите
  - Премахване на таксите за транзакции
explanation: |
  Портфейлите за съхранение управляват частните ключове, като облекчават техническите тежести за потребителите.
reviewed: true
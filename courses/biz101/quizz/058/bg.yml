question: Кое е предимството на използването на попечителски портфейл?
answer: Намалени технически отговорности
wrong_answers:
  - Повишен контрол върху частните ключове
  - Повишена поверителност с пълна автономия на транзакциите
  - Премахване на таксите за транзакции
explanation: |
  При попечителските портфейли чужда компания управлява частните ключове, като по този начин улеснява потребителите.
reviewed: true

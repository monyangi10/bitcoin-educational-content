question: Ni inyungu imwe iyihe yo gukoresha Wallet y’ububiko ku bijanye n’ivy’Intango?
answer: Inshingano z'ubuhinga zagabanutse
wrong_answers:
  - Kwongera kugenzura imfunguruzo z'ibanga
  - Ubuzima bwite bwongereweko n'ubwigenge bwose ku bikorwa
  - Gukuraho amafaranga y'ugucuruza
explanation: |
  Amasakoshi y'ububiko aracungera imfunguruzo z'ibanga, yorosha imitwaro y'ubuhinga ku bakoresha.
reviewed: true

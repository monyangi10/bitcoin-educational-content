question: Ni uwuhe muti w’intango wo kwishura usabwa ku bucuruzi bw’ivy’ingenzi?
answer: Ubusuwisi Bitcoin kwishura
wrong_answers:
  - Open Node
  - Serveur BTCPay
  - Bitcoinize PoS
explanation: |
  Turashira ahabona Swiss Bitcoin Pay nk’umuti ushimikijwe ku bijanye n’ivy’ingenzi, ugereranije ukworohereza n’umutekano.
reviewed: true

question: Tại sao một công ty lại cân nhắc nắm giữ một phần kho bạc của mình ở Bitcoin?
answer: Là một tài sản có khả năng tăng giá trị, có thể lưu trữ giá trị và cung cấp thanh khoản mà không cần dựa vào các trung gian tài chính truyền thống.
wrong_answers:
  - Để loại bỏ ngay mọi rủi ro và đảm bảo lợi nhuận ổn định.
  - Để tuân thủ các quy định bắt buộc của chính phủ yêu cầu nắm giữ Bitcoin.
  - Để đảm bảo rằng nó không bao giờ có thể chuyển đổi tài sản của mình trở lại thành tiền tệ truyền thống.
explanation: |
  Tính khan hiếm, tính thanh khoản toàn cầu và tính độc lập với hệ thống ngân hàng truyền thống của Bitcoin có thể khiến nó trở thành một tài sản kho bạc hấp dẫn. Mặc dù tiềm ẩn rủi ro và biến động, các doanh nghiệp có thể xem đây là một kênh lưu trữ giá trị dài hạn và là một biện pháp phòng ngừa lạm phát.
reviewed: true
question: Vì sao một công ty nên cân nhắc nắm giữ một phần tài sản của mình ở dạng Bitcoin?
answer: Bitcoin là một tài sản có khả năng tăng giá trị, có thể lưu trữ giá trị trong dài hạn và cung cấp thanh khoản mà không cần dựa vào các trung gian tài chính truyền thống.
wrong_answers:
  - Để loại bỏ ngay mọi rủi ro và đảm bảo lợi nhuận ổn định.
  - Để tuân thủ các quy định bắt buộc của chính phủ yêu cầu nắm giữ Bitcoin.
  - Để đảm bảo doanh nghiệp không chuyển đổi tài sản của họ trở lại tiền tệ truyền thống.
explanation: |
  Bitcoin có tính khan hiếm, tính thanh khoản toàn cầu và tính độc lập với hệ thống ngân hàng truyền thống. Khiến nó trở thành một tài sản kho bạc hấp dẫn. Mặc dù tiềm ẩn rủi ro và biến động, các doanh nghiệp có thể xem đây là một kênh lưu trữ giá trị dài hạn và là một biện pháp phòng ngừa lạm phát.
reviewed: true
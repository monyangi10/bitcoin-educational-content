question: ทำไมบริษัทอาจพิจารณาถือครองส่วนหนึ่งของคลังใน Bitcoin?
answer: ในฐานะสินทรัพย์ที่อาจมีมูลค่าเพิ่มขึ้นซึ่งสามารถเก็บรักษามูลค่าและเสนอความคล่องตัวโดยไม่ต้องพึ่งพาตัวกลางทางการเงินแบบดั้งเดิม
wrong_answers:
  - เพื่อกำจัดความเสี่ยงทั้งหมดทันทีและรับประกันผลตอบแทนที่มั่นคง
  - เพื่อปฏิบัติตามข้อบังคับของรัฐบาลที่บังคับใช้ซึ่งกำหนดให้มีการถือครอง Bitcoin
  - เพื่อให้แน่ใจว่าจะไม่สามารถแปลงสินทรัพย์กลับเป็นสกุลเงินดั้งเดิมได้อีกต่อไป
explanation: |
  ความขาดแคลนของ Bitcoin สภาพคล่องทั่วโลก และความเป็นอิสระจากระบบธนาคารแบบดั้งเดิมสามารถทำให้มันเป็นสินทรัพย์คลังที่น่าสนใจ แม้ว่าจะมีความเสี่ยงและความผันผวน แต่ธุรกิจอาจมองว่ามันเป็นการเก็บรักษามูลค่าในระยะยาวและเป็นการป้องกันความเสี่ยงจากเงินเฟ้อ
reviewed: true
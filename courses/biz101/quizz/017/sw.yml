question: Kwa nini kampuni inaweza kufikiria kushikilia sehemu ya hazina yake katika Bitcoin?
answer: Kama mali inayoweza kuthaminiwa ambayo inaweza kuhifadhi thamani na kutoa ukwasi bila kutegemea wasuluhishi wa jadi wa kifedha.
wrong_answers:
  - Ili kuondoa mara moja hatari zote na kuhakikisha kurudi kwa utulivu.
  - Kuzingatia kanuni za lazima za serikali zinazohitaji umiliki wa Bitcoin.
  - Ili kuhakikisha kuwa haiwezi kamwe kubadilisha mali yake kuwa sarafu za jadi.
explanation: |
  Uhaba wa Bitcoin, ukwasi wa kimataifa, na uhuru kutoka kwa mifumo ya kitamaduni ya benki inaweza kuifanya kuvutia kama rasilimali ya hazina. Ingawa inahusisha hatari na tete, biashara zinaweza kuiona kama hifadhi ya muda mrefu ya thamani na ua dhidi ya mfumuko wa bei.
reviewed: true

question: Защо дадено дружество може да обмисли да държи част от съкровищницата си в Bitcoin?
answer: Като потенциално поскъпващ актив, който може да съхранява стойност и да предлага ликвидност, без да разчита на традиционните финансови посредници.
wrong_answers:
  - Незабавно елиминиране на всички рискове и гарантиране на стабилна възвръщаемост.
  - За да се спазят задължителните правителствени разпоредби, изискващи притежаването на Bitcoin.
  - За да гарантира, че никога няма да може да конвертира активите си обратно в традиционни валути.
explanation: |
  Оскъдността на Bitcoin, глобалната ликвидност и независимостта от традиционните банкови системи могат да го превърнат в привлекателен резервен актив. Въпреки че е свързан с риск и волатилност, предприятията могат да го разглеждат като дългосрочно средство за съхранение на стойност и хедж срещу инфлацията.
reviewed: true

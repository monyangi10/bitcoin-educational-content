question: 기업이 보유 자산의 일부를 Bitcoin에 보유하는 것을 고려하는 이유는 무엇인가요?
answer: 전통적인 금융 중개기관에 의존하지 않고도 가치를 저장하고 유동성을 제공할 수 있는 잠재적 가치 상승 자산입니다.
wrong_answers:
  - 모든 리스크를 즉시 제거하고 안정적인 수익을 보장합니다.
  - Bitcoin 보유를 요구하는 정부의 의무 규정을 준수하기 위해.
  - 자산을 기존 통화로 다시 전환할 수 없도록 하기 위해서입니다.
explanation: |
  Bitcoin의 희소성, 글로벌 유동성, 기존 은행 시스템으로부터의 독립성 덕분에 매력적인 자산이 될 수 있습니다. 위험과 변동성이 수반되지만, 기업은 이를 장기적인 가치 저장 수단이자 인플레이션에 대한 헤지 수단으로 간주할 수 있습니다.
reviewed: true
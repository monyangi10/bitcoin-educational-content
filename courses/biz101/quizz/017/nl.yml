question: Waarom zou een bedrijf overwegen om een deel van zijn kasmiddelen in Bitcoin te houden?
answer: Als een potentieel waardevermeerderend actief dat waarde kan opslaan en liquiditeit kan bieden zonder afhankelijk te zijn van traditionele financiële tussenpersonen.
wrong_answers:
  - Om onmiddellijk alle risico's uit te sluiten en stabiele rendementen te garanderen.
  - Om te voldoen aan de verplichte overheidsvoorschriften die Bitcoin bedrijven vereisen.
  - Om ervoor te zorgen dat het zijn activa nooit meer kan omzetten in traditionele valuta.
explanation: |
  Bitcoin's schaarste, wereldwijde liquiditeit en onafhankelijkheid van traditionele banksystemen kunnen het aantrekkelijk maken als een schatkistactief. Hoewel het risico en volatiliteit met zich meebrengt, kunnen bedrijven het zien als een lange-termijn opslagplaats van waarde en een indekking tegen inflatie.
reviewed: false
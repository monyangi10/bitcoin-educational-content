question: एक कंपनी अपने ट्रेजरी का कुछ हिस्सा Bitcoin में क्यों रखना चाहेगी?
answer: एक संभावित रूप से मूल्यवर्धित संपत्ति के रूप में जो मूल्य संचय कर सकती है और पारंपरिक वित्तीय मध्यस्थों पर निर्भर किए बिना तरलता प्रदान कर सकती है।
wrong_answers:
  - तुरंत सारा जोखिम खत्म करने और स्थिर रिटर्न्स की गारंटी देने के लिए।
  - सरकारी नियमों का पालन करने के लिए जीडब्ल्यू-1 होल्डिंग्स अनिवार्य हैं।
  - यह सुनिश्चित करने के लिए कि वह अपनी संपत्ति को कभी भी पारंपरिक मुद्राओं में वापस नहीं बदल सके।
explanation: |
  Bitcoin की कमी, वैश्विक तरलता, और पारंपरिक बैंकिंग प्रणालियों से स्वतंत्रता इसे एक ट्रेजरी संपत्ति के रूप में आकर्षक बना सकती है। हालांकि इसमें जोखिम और अस्थिरता शामिल है, फिर भी व्यवसाय इसे मुद्रास्फीति के खिलाफ एक बचाव और दीर्घकालिक मूल्य संचय के रूप में देख सकते हैं।

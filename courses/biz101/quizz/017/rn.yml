question: Ni kubera iki ishirahamwe ryoshobora kwiyumvira gufata igice c’itunga ryaryo muri Bitcoin?
answer: Nk’umutungo ushobora gushimwa ushobora kubika agaciro no gutanga amafaranga ata kwizigira abahuza b’ivy’ubutunzi ba kera.
wrong_answers:
  - Kugira ngo ubwo nyene ukureho ingorane zose kandi ubone inyungu zidahinduka.
  - Kugira ngo umuntu yubahirize amabwirizwa ya Leta asaba ko umuntu afise Bitcoin.
  - Kugira ngo ntiyigere ihindura itunga ryayo ngo isubire mu mafaranga y’agaciro.
explanation: |
  Ubukene bwa Bitcoin, ubukene bw’amahera kw’isi yose, n’ukwigenga ku mice ya kera y’amabanki birashobora gutuma ikwegera nk’umutungo w’itunga. Naho birimwo ingorane n’uguhinduka, abacuruzi boshobora kubibona nk’ububiko bw’agaciro bw’igihe kirekire be n’uburinzi bwo kwikingira ugutera imbere kw’ibiciro.

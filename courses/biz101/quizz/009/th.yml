question: วัตถุประสงค์หลักของ Lightning Network ที่สร้างบน Bitcoin คืออะไร?
answer: เพื่อเปิดใช้งานการชำระเงินที่รวดเร็วและเกือบจะทันทีด้วยการโต้ตอบกับ on-chain ที่น้อยที่สุด
wrong_answers:
  - แทนที่บล็อกเชนของ Bitcoin ทั้งหมดและจัดเก็บธุรกรรมทั้งหมดในเครื่อง
  - เพื่อให้เครือข่ายที่มีการอนุญาตซึ่งควบคุมโดยหน่วยงานเดียว
  - เพื่อชะลอการทำธุรกรรมเพื่อให้แน่ใจว่าสามารถติดตามได้อย่างเต็มที่โดยรัฐบาล
explanation: |
  Lightning Network เป็นโปรโตคอล "ชั้นที่สอง" ที่ช่วยให้ผู้เข้าร่วมสามารถสร้างช่องทางการชำระเงิน ทำธุรกรรม off-chain และชำระยอดสุทธิสุดท้ายเฉพาะบนบล็อกเชน Bitcoin เท่านั้น การออกแบบนี้ช่วยให้ได้ความเร็วที่เร็วขึ้นและต้นทุนที่ต่ำลง
reviewed: true
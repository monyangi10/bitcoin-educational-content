question: Каква е основната цел на Lightning Network, изграден върху Bitcoin?
answer: Да се осигурят по-бързи и почти незабавни плащания с минимално взаимодействие с on-chain.
wrong_answers:
  - Да замени изцяло блокчейна на Bitcoin и да съхранява всички трансакции локално.
  - Предоставяне на мрежа с разрешение, контролирана от един субект.
  - Забавяне на трансакциите, за да се гарантира, че те остават напълно проследими от правителствата.
explanation: |
  Lightning Network е протокол от "второ ниво", който позволява на участниците да създават платежни канали, да извършват трансакции по off-chain и да уреждат крайния нетен баланс само в блокчейна на Bitcoin. С този дизайн се постигат по-високи скорости и по-ниски разходи.
reviewed: true
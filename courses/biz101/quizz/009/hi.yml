question: Bitcoin के ऊपर बनाए गए Lightning Network का मुख्य उद्देश्य क्या है?
answer: तेज़, लगभग तुरंत भुगतान सक्षम करने के लिए और On-Chain के साथ न्यूनतम संपर्क के साथ।
wrong_answers:
  - Bitcoin के Blockchain को पूरी तरह से बदलने और सभी लेन-देन को स्थानीय रूप से स्टोर करने के लिए।
  - एक ही संस्था द्वारा नियंत्रित एक अनुमति-आधारित नेटवर्क प्रदान करना।
  - लेन-देन को धीमा करना ताकि सरकारें उन्हें पूरी तरह से ट्रैक कर सकें।
explanation: |
  Lightning Network एक "दूसरी पीढ़ी का Layer" प्रोटोकॉल है जो प्रतिभागियों को भुगतान चैनल बनाने, off-chain लेनदेन करने और अंतिम शुद्ध शेष को सिर्फ Bitcoin Blockchain पर सेटल करने की अनुमति देता है। यह डिज़ाइन तेज़ गति और कम लागत हासिल करता है।
reviewed: false
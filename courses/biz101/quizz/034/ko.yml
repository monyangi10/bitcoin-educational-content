question: Lightning Network에서 노드를 운영하는 참여자들 사이에서는 어떤 경향이 두드러지나요?
answer: 전문 노드 운영자들은 점점 더 유동성을 공급하고 있으며, 개인 사용자들은 '엣지' 노드에 집중하면서 네트워크의 구성을 변화시키고 있습니다.
wrong_answers:
  - 개인 취미 활동가들이 모든 전문 운영자를 완전히 대체했습니다.
  - 대형 은행은 이제 모든 라이트닝 노드를 중앙에서 운영합니다.
  - 네트워크는 대기업만 허용하도록 개인 노드를 차단했습니다.
explanation: |
  전문 기관이 제공하는 유동성과 안정성을 높이려는 움직임이 있는 반면, 일반 사용자는 단순화되거나 호스팅된 솔루션에 의존하여 네트워크를 더욱 견고하게 만들고 접근성을 높이고 있습니다.
reviewed: true
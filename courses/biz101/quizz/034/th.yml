question: แนวโน้มใดที่สังเกตได้ในหมู่ผู้เข้าร่วมที่ดำเนินการโหนดบน Lightning Network?
answer: ผู้ดำเนินการโหนดมืออาชีพกำลังให้สภาพคล่องมากขึ้น ในขณะที่ผู้ใช้รายบุคคลมุ่งเน้นไปที่โหนด "ขอบ" ซึ่งเปลี่ยนแปลงองค์ประกอบของเครือข่าย
wrong_answers:
  - นักเล่นงานอดิเรกส่วนบุคคลได้แทนที่ผู้ปฏิบัติงานมืออาชีพทั้งหมดอย่างสมบูรณ์
  - ขณะนี้ธนาคารขนาดใหญ่ดำเนินการโหนด Lightning ทั้งหมดจากศูนย์กลาง
  - เครือข่ายได้ปิดการใช้งานโหนดส่วนบุคคลเพื่ออนุญาตเฉพาะบริษัทขนาดใหญ่เท่านั้น
explanation: |
  มีการเคลื่อนไหวไปสู่สภาพคล่องและความเสถียรที่มากขึ้นซึ่งจัดหาโดยหน่วยงานมืออาชีพ ในขณะที่ผู้ใช้ทั่วไปพึ่งพาวิธีการที่ง่ายขึ้นหรือโซลูชันที่โฮสต์ ทำให้เครือข่ายมีความแข็งแกร่งและเข้าถึงได้มากขึ้น
reviewed: true
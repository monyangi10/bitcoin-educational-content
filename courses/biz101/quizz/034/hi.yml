question: Lightning Network पर नोड्स चलाने वाले प्रतिभागियों में क्या ट्रेंड देखने को मिल रहा है?
answer: पेशेवर नोड ऑपरेटर तेजी से लिक्विडिटी प्रदान कर रहे हैं, जबकि व्यक्तिगत यूजर्स "एज" नोड्स पर ध्यान केंद्रित कर रहे हैं, जिससे नेटवर्क की संरचना बदल रही है।
wrong_answers:
  - व्यक्तिगत शौकीनों ने पूरी तरह से सभी पेशेवर ऑपरेटरों को बदल दिया है।
  - बड़े बैंक अब सभी लाइटनिंग नोड्स को केंद्रीय रूप से संचालित करते हैं।
  - नेटवर्क ने बड़ी कंपनियों को ही अनुमति देने के लिए व्यक्तिगत नोड्स को बंद कर दिया है।
explanation: |
  पेशेवर संस्थाएँ ज़्यादा लिक्विडिटी और स्थिरता दे रही हैं, जबकि आम यूज़र्स सरल या होस्ट किए गए समाधानों पर निर्भर हैं, जिससे नेटवर्क और मज़बूत और सुलभ हो रहा है।

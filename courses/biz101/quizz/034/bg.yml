question: Каква тенденция се забелязва сред участниците, работещи с възли на Lightning Network?
answer: Професионалните оператори на възли осигуряват все повече ликвидност, докато отделните потребители се фокусират върху "крайните" възли, променяйки състава на мрежата.
wrong_answers:
  - Индивидуалните любители са заменили изцяло всички професионални оператори.
  - Големите банки вече управляват централно всички възли на Lightning.
  - Мрежата е изключила личните възли, за да допусне само големи корпорации.
explanation: |
  Налице е стремеж към по-голяма ликвидност и стабилност, осигурявани от професионални структури, докато обикновените потребители разчитат на опростени или хоствани решения, което прави мрежата по-стабилна и достъпна.
reviewed: true
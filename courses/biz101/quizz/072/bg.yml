question: Как корпоративните системи актуализират инвентара автоматично?
answer: Чрез задействания на работния процес
wrong_answers:
  - Ръчни актуализации
  - Качване в края на деня
  - Планирани отчети
explanation: |
  Тригерите на работния поток актуализират системите в реално време.
reviewed: true
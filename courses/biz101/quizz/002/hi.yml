question: सिक्कों से नोटों की तरफ बदलाव ने करेंसी नेटवर्क को कैसे बेहतर बनाया?  

(व्याख्या: यहाँ "currency network" को "करेंसी नेटवर्क" लिखा गया है क्योंकि यह एक टेक्निकल टर्म है जिसे हिंदी में अक्सर ऐसे ही इस्तेमाल किया जाता है। "Improve" का अनुवाद "बेहतर बनाया" किया गया है जो कॉलोक्वियल हिंदी में प्राकृतिक लगता है। पूरा वाक्य सरल और बोलचाल की हिंदी में है।)
answer: इसने पैसे को और ज्यादा पोर्टेबल और स्केलेबल बना दिया, जिससे लंबी दूरी के व्यापार और जटिल वित्तीय प्रणालियों को आसानी हो गई।
wrong_answers:
  - इसने किसी भी अंतर्निहित संपत्ति या ट्रस्ट की जरूरत को खत्म कर दिया।
  - इसने तुरंत महंगाई को रोक दिया और अर्थव्यवस्था को स्थिर कर दिया।
  - इसने सरकारों को पैसे Supply का बिल्कुल भी प्रबंधन करने से बचा लिया।
explanation: |
  कागज़ के नोट कीमती धातुओं से बने सिक्कों के मुकाबले हल्के और बनाने व ढोने में आसान थे। यह पोर्टेबिलिटी और मानकीकरण ने लेन-देन को सरल बना दिया और अर्थव्यवस्थाओं को स्थानीय क्षेत्रों से आगे बढ़ने में मदद की।

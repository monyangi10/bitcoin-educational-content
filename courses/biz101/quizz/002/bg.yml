question: Как преходът от монети към книжни пари подобри валутната мрежа?
answer: Той направи парите по-преносими и мащабируеми, като улесни търговията на дълги разстояния и сложните финансови системи.
wrong_answers:
  - Той премахва необходимостта от какъвто и да е базов актив или тръст.
  - Тя незабавно спря инфлацията и стабилизира икономиката.
  - Тя позволи на правителствата да избегнат изцяло управлението на паричното предлагане.
explanation: |
  Хартиените пари били по-леки и по-лесни за изработване и транспортиране от монетите от благородни метали. Тази преносимост и стандартизация опростиха транзакциите и позволиха на икономиките да се развиват извън местните региони.
reviewed: true
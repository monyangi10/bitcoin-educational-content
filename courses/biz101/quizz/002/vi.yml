question: Sự chuyển đổi từ tiền xu sang tiền giấy đã cải thiện mạng lưới tiền tệ như thế nào?
answer: Nó giúp tiền tệ dễ di chuyển và có thể mở rộng hơn, tạo điều kiện thuận lợi cho thương mại đường dài và các hệ thống tài chính phức tạp.
wrong_answers:
  - Nó loại bỏ nhu cầu về bất kỳ tài sản cơ bản hoặc ủy thác nào.
  - Nó ngay lập tức ngăn chặn lạm phát và ổn định nền kinh tế.
  - Nó cho phép chính phủ tránh được việc quản lý hoàn toàn nguồn cung tiền.
explanation: |
  Tiền giấy nhẹ hơn, dễ sản xuất và vận chuyển hơn so với tiền xu làm từ kim loại quý. Tính di động và tiêu chuẩn hóa này đã đơn giản hóa các giao dịch, cho phép nền kinh tế phát triển vượt ra ngoài phạm vi địa phương.
reviewed: true
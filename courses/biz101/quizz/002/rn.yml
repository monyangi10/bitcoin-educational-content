question: Ni gute ukuva ku bice vy’amahera(monnaie fidiciaire) gushika ku mahera y’impapuro vyatumye uruja n’uruza rw’amahera rutera imbere?
answer: Yatumye amahera yoroha gutwara no gukoreshwa mu buryo bubereye, bigatuma vyorohereza urudandazwa rubera kure na kure hamwe nubuhinga bwubutunzi bugoye, bushobora kubaho.
wrong_answers:
  - Ntihagikenewe ivy’uko hakenerwa umutungo ugaragara nki nzahabu canke kugenda kubitsa muma banki canke ahandi ahariho hose.
  - Yarahagaritse ubwo nyene uguta agaciro kamahera, bituma ubutunzi buhagarara neza butajegajega.
  - Vyatuma intwaro zishobora kwirinda gucunga amahera azunguruka yose uko ingana.
explanation: |
  Amahera y’impapuro yari yoroshe  gukora no gutwara kuruta ibiceri vy’ivyuma vy’agaciro bakoresha kera. Ukwo gutwara amafaranga vyoroshe no guhuza ibintu bimwe bimwe vyatumye ibikorwa vyo gucuruza vyoroha kandi vyatumye ubutunzi butera imbere bukarenga nakarere bukoreramwo.
reviewed: true

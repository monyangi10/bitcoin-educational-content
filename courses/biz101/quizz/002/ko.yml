question: 동전에서 종이 화폐로 전환하면서 통화 네트워크가 어떻게 개선되었나요?
answer: 화폐의 휴대성과 확장성을 높여 장거리 무역과 복잡한 금융 시스템을 용이하게 만들었습니다.
wrong_answers:
  - 기본 자산이나 신탁이 필요하지 않습니다.
  - 인플레이션을 즉각적으로 막고 경제를 안정시켰습니다.
  - 이를 통해 정부는 Supply 자금의 관리를 완전히 피할 수 있었습니다.
explanation: |
  지폐는 귀금속으로 만든 동전보다 가볍고 만들기 쉽고 운반하기 쉬웠습니다. 이러한 휴대성과 표준화는 거래를 간소화하여 지역을 넘어 경제가 성장할 수 있게 했습니다.
reviewed: true
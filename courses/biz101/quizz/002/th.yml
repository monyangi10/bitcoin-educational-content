question: การเปลี่ยนจากเหรียญเป็นเงินกระดาษช่วยปรับปรุงเครือข่ายสกุลเงินได้อย่างไร?
answer: มันทำให้เงินพกพาได้สะดวกและขยายขนาดได้ง่ายขึ้น ช่วยอำนวยความสะดวกในการค้าระยะไกลและระบบการเงินที่ซับซ้อน
wrong_answers:
  - มันกำจัดความจำเป็นสำหรับสินทรัพย์พื้นฐานหรือความไว้วางใจใด ๆ
  - มันหยุดเงินเฟ้อทันทีและทำให้เศรษฐกิจมีเสถียรภาพ
  - มันทำให้รัฐบาลสามารถหลีกเลี่ยงการจัดการปริมาณเงินได้อย่างสมบูรณ์
explanation: |
  ธนบัตรมีน้ำหนักเบาและง่ายต่อการผลิตและขนส่งมากกว่าเหรียญที่ทำจากโลหะมีค่า ความสะดวกในการพกพาและมาตรฐานนี้ทำให้การทำธุรกรรมง่ายขึ้น ช่วยให้เศรษฐกิจเติบโตเกินกว่าภูมิภาคท้องถิ่น
reviewed: true
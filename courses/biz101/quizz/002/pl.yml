question: W jaki sposób przejście od monet do pieniądza papierowego usprawniło sieć walutową?
answer: Dzięki temu pieniądze stały się bardziej przenośne i skalowalne, ułatwiając handel na duże odległości i złożone systemy finansowe.
wrong_answers:
  - Wyeliminowało to potrzebę posiadania jakichkolwiek aktywów bazowych lub trustu.
  - To natychmiast zatrzymało inflację i ustabilizowało gospodarkę.
  - Pozwoliło to rządom całkowicie uniknąć zarządzania pieniędzmi Supply.
explanation: |
  Pieniądz papierowy był lżejszy i łatwiejszy w produkcji i transporcie niż monety wykonane z metali szlachetnych. Ta przenośność i standaryzacja uprościły transakcje i umożliwiły rozwój gospodarek poza lokalnymi regionami.
reviewed: false
question: Hoe heeft de overgang van munten naar papiergeld het valutanetwerk verbeterd?
answer: Het maakte geld draagbaarder en schaalbaarder, waardoor handel over lange afstanden en complexe financiële systemen mogelijk werden.
wrong_answers:
  - Er zijn geen onderliggende activa of trusts nodig.
  - Het stopte onmiddellijk de inflatie en stabiliseerde de economie.
  - Het stelde overheden in staat om het beheer van het geld Supply volledig te vermijden.
explanation: |
  Papiergeld was lichter en gemakkelijker te maken en te vervoeren dan munten van edelmetaal. Deze draagbaarheid en standaardisatie vereenvoudigde transacties en zorgde ervoor dat economieën konden groeien buiten de lokale regio's.

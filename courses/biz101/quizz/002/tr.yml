question: Madeni paradan kağıt paraya geçiş para ağını nasıl geliştirdi?
answer: Parayı daha taşınabilir ve ölçeklenebilir hale getirerek uzun mesafeli ticareti ve karmaşık finansal sistemleri kolaylaştırdı.
wrong_answers:
  - Herhangi bir dayanak varlık veya tröst ihtiyacını ortadan kaldırdı.
  - Enflasyonu anında durdurdu ve ekonomiyi istikrara kavuşturdu.
  - Hükümetlerin Supply parasını yönetmekten tamamen kaçınmasını sağladı.
explanation: |
  Kağıt para, değerli metallerden yapılmış madeni paralara göre daha hafifti, yapımı ve taşınması daha kolaydı. Bu taşınabilirlik ve standardizasyon işlemleri basitleştirdi ve ekonomilerin yerel bölgelerin ötesine geçmesini sağladı.

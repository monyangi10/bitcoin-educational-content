question: Защо се препоръчва експортиране в CSV на всички транзакции Bitcoin?
answer: осигурява ясен, структуриран запис на всяка транзакция, което улеснява счетоводителите при включването ѝ във финансовите отчети и данъчните декларации.
wrong_answers:
  - Защото хартиените разписки са единствените законно приемливи счетоводни документи.
  - Тъй като експортирането на данни автоматично завършва данъчната ви декларация без преглед.
  - Тъй като CSV файловете премахват необходимостта от проследяване на базата на разходите.
explanation: |
  Наличието на цифров запис в общ формат позволява безпроблемно интегриране в счетоводните системи, поддържане на одитни пътеки и поддържане на точни данъчни отчети и отчети за съответствие.
reviewed: true

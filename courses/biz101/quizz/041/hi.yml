question: Bitcoin से सभी लेन-देन का CSV एक्सपोर्ट रखने की सलाह क्यों दी जाती है?
answer: यह हर लेन-देन का साफ़ और व्यवस्थित रिकॉर्ड देता है, जिससे अकाउंटेंट्स के लिए इन्हें फाइनेंशियल रिपोर्ट्स और टैक्स फाइलिंग में शामिल करना आसान हो जाता है।
wrong_answers:
  - क्योंकि कागज़ की रसीदें ही कानूनी तौर पर मान्य लेखा दस्तावेज़ हैं।
  - क्योंकि डेटा एक्सपोर्ट करने से आपका टैक्स रिटर्न बिना किसी रिव्यू के अपने आप पूरा हो जाता है।
  - क्योंकि CSV फाइलों से कॉस्ट बेसिस ट्रैक करने की जरूरत नहीं रह जाती।
explanation: |
  एक कॉमन फॉर्मेट में डिजिटल रिकॉर्ड रखने से अकाउंटिंग सिस्टम में आसानी से जुड़ जाता है, ऑडिट ट्रेल को मेंटेन करने में मदद मिलती है, और टैक्स व कंप्लायंस रिपोर्टिंग एकदम सही होती है।

question: 모든 Bitcoin 트랜잭션의 CSV 내보내기를 권장하는 이유는 무엇인가요?
answer: 모든 거래에 대한 명확하고 체계적인 기록을 제공하여 회계사가 이를 재무 보고서 및 세금 신고에 쉽게 통합할 수 있도록 도와줍니다.
wrong_answers:
  - 종이 영수증은 법적으로 허용되는 유일한 회계 문서이기 때문입니다.
  - 데이터를 내보내면 검토할 필요 없이 자동으로 세금 신고가 완료되기 때문입니다.
  - CSV 파일을 사용하면 비용 기준을 추적할 필요가 없기 때문입니다.
explanation: |
  공통 형식의 디지털 기록을 보유하면 회계 시스템과 원활하게 통합하고 감사 추적을 유지하며 정확한 세금 및 규정 준수 보고를 지원할 수 있습니다.
reviewed: true
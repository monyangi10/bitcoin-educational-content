question: ทำไมถึงแนะนำให้มีการส่งออก CSV ของธุรกรรมทั้งหมดของ Bitcoin?
answer: มันให้บันทึกที่ชัดเจนและมีโครงสร้างของทุกธุรกรรม ทำให้นักบัญชีสามารถรวมสิ่งเหล่านี้เข้ากับรายงานทางการเงินและการยื่นภาษีได้ง่ายขึ้น
wrong_answers:
  - เนื่องจากใบเสร็จรับเงินกระดาษเป็นเอกสารทางบัญชีที่ยอมรับได้ตามกฎหมายเพียงอย่างเดียว
  - เนื่องจากการส่งออกข้อมูลจะทำให้การยื่นภาษีของคุณเสร็จสมบูรณ์โดยอัตโนมัติโดยไม่มีการตรวจสอบ
  - เนื่องจากไฟล์ CSV ช่วยขจัดความจำเป็นในการติดตามฐานต้นทุน
explanation: |
  การมีบันทึกดิจิทัลในรูปแบบทั่วไปช่วยให้สามารถผสานรวมเข้ากับระบบบัญชีได้อย่างราบรื่น รักษาร่องรอยการตรวจสอบ และสนับสนุนการรายงานภาษีและการปฏิบัติตามข้อกำหนดอย่างถูกต้อง
reviewed: true
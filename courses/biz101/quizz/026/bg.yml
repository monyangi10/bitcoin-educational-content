question: Кое е основното съображение при избора на платформа или брокер за закупуване на Bitcoin за бизнеса?
answer: Репутацията на доставчика, мерките за сигурност и възможността за експортиране на историята на транзакциите за счетоводни цели.
wrong_answers:
  - Гарантиране, че платформата поддържа само неясни криптовалути.
  - Намиране на доставчик, който отказва да предложи каквато и да е поддръжка на клиенти.
  - Използване на услуга, която забранява изтеглянето на Bitcoin към собствен портфейл.
explanation: |
  Надеждната платформа трябва да има солидна репутация, добра сигурност и инструменти за водене на документация. Възможността за изтегляне на Bitcoin и интегриране със счетоводен софтуер също е от решаващо значение за бизнес операциите.
reviewed: true

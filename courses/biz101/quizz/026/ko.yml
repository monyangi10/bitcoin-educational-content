question: 비즈니스용 Bitcoin 구매를 위해 플랫폼 또는 브로커를 선택할 때 고려해야 할 주요 사항은 무엇인가요?
answer: 공급업체의 평판, 보안 조치, 회계를 위해 거래 내역을 내보낼 수 있는 능력.
wrong_answers:
  - 플랫폼이 잘 알려지지 않은 암호화폐만 지원하도록 합니다.
  - 고객 지원 제공을 거부하는 제공업체 찾기.
  - Bitcoin을 자기 관리 Wallet로 인출하는 것을 금지하는 서비스 사용.
explanation: |
  신뢰할 수 있는 플랫폼은 평판이 좋고, 보안이 우수하며, 기록 보관 도구가 있어야 합니다. Bitcoin 인출 및 회계 소프트웨어와의 통합 기능도 비즈니스 운영에 매우 중요합니다.
reviewed: true
question: Каква е основната цел на специализираните счетоводни инструменти Bitcoin?
answer: Опростяване на автоматичното събиране и обработване на данни, свързани с Bitcoin
wrong_answers:
  - Повишаване на сигурността на частните ключове Bitcoin
  - Улесняване на директната търговия с Bitcoin на децентрализирани борси за бизнеса
  - Създаване на PoS система за приемане на плащания Bitcoin
explanation: |
  Тези инструменти са предназначени за автоматизиране на събирането на данни, преобразуването на формати, изчисляването на данъци и категоризирането на транзакциите.
reviewed: true
question: Wat is "verborgen inflatie" in de context van een op schulden gebaseerd monetair systeem?
answer: Het is de toename van het geld Supply (ongeveer 7% per jaar) dat jouw aandeel in de totale waarde vermindert als je niet dienovereenkomstig investeert of je vermogen laat groeien.
wrong_answers:
  - Het is een officiële economische term voor vaste rentetarieven.
  - Het verwijst naar inflatiecijfers die niet door centrale banken worden gepubliceerd.
  - Het betekent dat de prijzen nooit stijgen, zelfs niet wanneer geld Supply toeneemt.
explanation: |
  Verborgen inflatie treedt op wanneer het geld Supply uitbreidt, waardoor de koopkracht van spaargeld afneemt. Als een bedrijf niet proactief investeert of zijn rijkdom beschermt, loopt het het risico waarde te verliezen aan deze stille vorm van monetaire verwatering.

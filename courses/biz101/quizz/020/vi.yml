question: “Lạm phát tiềm ẩn” là gì trong bối cảnh hệ thống tiền tệ dựa trên nợ?
answer: Chính sự gia tăng nguồn cung tiền (khoảng 7% mỗi năm) làm giảm giá trị tổng thể của bạn nếu bạn không đầu tư hoặc tăng trưởng tài sản theo đó.
wrong_answers:
  - Đây là thuật ngữ kinh tế chính thức để chỉ lãi suất cố định.
  - Nó đề cập đến số liệu lạm phát không được các ngân hàng trung ương công bố.
  - Điều này có nghĩa là giá cả không bao giờ tăng, ngay cả khi nguồn cung tiền tăng.
explanation: |
  Lạm phát ẩn xảy ra khi cung tiền tăng, làm giảm sức mua của tiền tiết kiệm. Nếu một doanh nghiệp không chủ động đầu tư hoặc bảo vệ tài sản của mình, doanh nghiệp có nguy cơ mất giá do hình thức pha loãng tiền tệ âm thầm này.
reviewed: true
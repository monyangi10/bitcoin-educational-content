question: 부채 기반 통화 시스템의 맥락에서 '숨겨진 인플레이션'이란 무엇인가요?
answer: 이에 따라 자산을 투자하거나 성장시키지 않으면 전체 가치에서 차지하는 비중이 줄어드는 것은 Supply(연간 약 7%)의 증가입니다.
wrong_answers:
  - 고정 금리를 뜻하는 공식 경제 용어입니다.
  - 중앙은행에서 발표하지 않는 인플레이션 수치를 말합니다.
  - 즉, Supply 화폐가 확장되더라도 가격은 절대 오르지 않습니다.
explanation: |
  숨겨진 인플레이션은 Supply 화폐가 팽창하여 저축의 구매력을 감소시킬 때 발생합니다. 기업이 선제적으로 투자하거나 자산을 보호하지 않으면 이러한 조용한 형태의 화폐 희석으로 인해 가치를 잃을 위험이 있습니다.
reviewed: true
question: एक डेट-बेस्ड मोनेटरी सिस्टम के कॉन्टेक्स्ट में "हिडन इन्फ्लेशन" क्या होता है?
answer: यह Supply में पैसे की बढ़ोतरी (लगभग 7% सालाना) है जो आपके कुल मूल्य के हिस्से को कम कर देती है, अगर आप उसी हिसाब से निवेश या संपत्ति नहीं बढ़ाते।
wrong_answers:
  - यह फिक्स्ड इंटरेस्ट रेट्स के लिए एक आधिकारिक आर्थिक शब्द है।
  - यह उन मुद्रास्फीति के आंकड़ों की बात करता है जो केंद्रीय बैंकों द्वारा प्रकाशित नहीं किए जाते।
  - इसका मतलब है कि कीमतें कभी नहीं बढ़ती, चाहे पैसा Supply बढ़ जाए।
explanation: |
  छुपी हुई मुद्रास्फीति तब होती है जब पैसा Supply बढ़ता है, जिससे बचत की खरीदारी शक्ति कम हो जाती है। अगर कोई व्यवसाय सक्रिय रूप से निवेश नहीं करता या अपनी दौलत की सुरक्षा नहीं करता, तो उसे मुद्रा के इस चुपके से कमजोर होने के कारण मूल्य खोने का खतरा होता है।
reviewed: false
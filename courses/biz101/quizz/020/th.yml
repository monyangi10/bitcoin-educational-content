question: "\"เงินเฟ้อที่ซ่อนอยู่\" ในบริบทของระบบการเงินที่อิงตามหนี้คืออะไร?"
answer: "มันคือการเพิ่มขึ้นของปริมาณเงิน (ประมาณ 7% ต่อปี) ที่ลดส่วนแบ่งของคุณในมูลค่ารวมถ้าคุณไม่ลงทุนหรือเพิ่มสินทรัพย์ตามนั้น"
wrong_answers:
  - "มันเป็นคำศัพท์ทางเศรษฐกิจอย่างเป็นทางการสำหรับอัตราดอกเบี้ยคงที่"
  - "มันหมายถึงตัวเลขเงินเฟ้อที่ไม่ได้เผยแพร่โดยธนาคารกลาง"
  - "มันหมายความว่าราคาจะไม่เพิ่มขึ้น แม้ว่าอุปทานเงินจะขยายตัว"
explanation: |
  ภาวะเงินเฟ้อที่ซ่อนอยู่เกิดขึ้นเมื่อปริมาณเงินขยายตัว ทำให้กำลังซื้อของการออมลดลง หากธุรกิจไม่ลงทุนหรือปกป้องความมั่งคั่งอย่างรอบคอบ ก็เสี่ยงที่จะสูญเสียมูลค่าให้กับรูปแบบการเจือจางทางการเงินที่เงียบนี้
reviewed: true

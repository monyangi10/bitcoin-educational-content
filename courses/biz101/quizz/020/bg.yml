question: Какво представлява "скритата инфлация" в контекста на паричната система, основана на дълга?
answer: Увеличаването на паричното предлагане (около 7% годишно) намалява дела ви в общата стойност, ако не инвестирате или не увеличавате активите си по съответния начин.
wrong_answers:
  - Това е официален икономически термин за фиксирани лихвени проценти.
  - Той се отнася до данни за инфлацията, които не се публикуват от централните банки.
  - Това означава, че цените никога не се повишават, дори когато паричното предлагане се разширява.
explanation: |
  Скрита инфлация се появява, когато паричното предлагане се разширява, намалявайки покупателната способност на спестяванията. Ако бизнесът не инвестира активно или не защитава богатството си, той рискува да загуби стойността си в резултат на тази тиха форма на парично разводняване.
reviewed: true
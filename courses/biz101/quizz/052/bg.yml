question: Коя подробност НЕ е изрично документирана в типичния CSV файл на транзакция Bitcoin, както е описано в курса?
answer: Типът на използвания скрипт
wrong_answers:
  - Датата на транзакцията
  - Еквивалентната фиатна стойност
  - Адресите на Bitcoin
explanation: |
  Типичният CSV файл с транзакции в Bitcoin обикновено посочва дата, сума, фиатен еквивалент и адреси в Bitcoin, но не и използвания тип скрипт.
reviewed: true

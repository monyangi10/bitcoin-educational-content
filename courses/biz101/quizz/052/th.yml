question: รายละเอียดใดที่ไม่ได้ระบุไว้อย่างชัดเจนในไฟล์ CSV ของธุรกรรม Bitcoin ตามที่อธิบายไว้ในหลักสูตร?
answer: ประเภทสคริปต์ที่ใช้
wrong_answers:
  - วันที่ทำรายการ
  - มูลค่าเงินเฟียตที่เทียบเท่า
  - Bitcoin ที่อยู่ที่เกี่ยวข้อง
explanation: |
  ไฟล์ CSV ของธุรกรรม Bitcoin ทั่วไปมักจะระบุวันที่ จำนวนเงิน มูลค่าเทียบเท่าในสกุลเงินทั่วไป และที่อยู่ Bitcoin แต่ไม่ระบุประเภทสคริปต์ที่ใช้
reviewed: true
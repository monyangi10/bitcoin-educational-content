question: कोर्स में बताए गए Bitcoin ट्रांजैक्शन CSV फाइल में निम्नलिखित में से कौन सा डिटेल साफ़ तौर पर दर्ज नहीं होता है?  

(नोट: विकल्प नहीं दिए गए हैं, इसलिए सीधे अनुवाद किया गया है)
answer: इस्तेमाल किया गया लिपि प्रकार
wrong_answers:
  - लेन-देन की तारीख
  - समतुल्य फिएट मूल्य
  - जीडब्ल्यू-1 से जुड़े पते
explanation: |
  एक आम Bitcoin लेनदेन की CSV फाइल में आमतौर पर तारीख, रकम, फिएट समकक्ष, और Bitcoin पते का जिक्र होता है, लेकिन इस्तेमाल किए गए स्क्रिप्ट प्रकार का नहीं।
reviewed: false
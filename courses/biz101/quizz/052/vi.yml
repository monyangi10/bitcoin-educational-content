question: Chi tiết nào KHÔNG được ghi rõ trong tệp CSV giao dịch Bitcoin thông thường như được mô tả trong khóa học?
answer: Loại tập lệnh được sử dụng
wrong_answers:
  - Ngày giao dịch
  - Giá trị fiat tương đương
  - Các địa chỉ Bitcoin liên quan
explanation: |
  Tệp CSV giao dịch Bitcoin thông thường thường đề cập đến ngày, số tiền, đơn vị tiền tệ tương đương và địa chỉ Bitcoin, nhưng không đề cập đến loại tập lệnh được sử dụng.
reviewed: true
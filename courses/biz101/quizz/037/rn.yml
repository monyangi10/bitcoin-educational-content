question: Ni akamaro kamwe akahe k’ingenzi k’ubuhinga bwo kwishura Bitcoin mu bijanye no guhindura hagati y’imiti?
answer: Biroroshe guhindura abatanga canke guhindura ibikoresho, kuko ingingo ngenderwako za Bitcoin zifunguye, zikorana zituma amafaranga yoherezwa ata nkomanzi.
wrong_answers:
  - Iyo umuntu amaze gutoranywa, ubucuruzi ntibushobora kwigera buhindukira bukaja ku wundi muti.
  - Inyishu za Bitcoin ni iz’abanyagihugu kandi zikingiwe n’umucuruzi umwe.
  - Guhindura abatanga ubuvuzi bisaba kwemezwa na leta n’urugendo rurerure rw’amategeko.
explanation: |
  Kubera ko Bitcoin yubatswe ku masezerano yuguruye, abacuruzi barafise umwidegemvyo wo kwimurira amahera yabo canke bagafata inyishu nshasha uko bakura canke uko ivyo bakeneye bihinduka. Ukwo guhinduranya bituma ubucuruzi bushobora guhitamwo ibikoresho vyiza ata gufunga abaguzi.

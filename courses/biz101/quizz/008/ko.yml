question: 다음 중 비즈니스를 위한 네트워크 및 자산으로서 Bitcoin의 역할을 가장 잘 설명하는 문장은?
answer: 글로벌 탈중앙화 시스템에서 가치 저장소이자 Exchange의 매개체 역할을 할 수 있습니다.
wrong_answers:
  - 로컬 기프트 카드 시스템으로만 작동할 수 있습니다.
  - 실제 유용성이 없는 투기적 거래 도구일 뿐입니다.
  - 작동하려면 단일 국가의 통화 정책과 연계되어야 합니다.
explanation: |
  Bitcoin의 글로벌 인터넷 네이티브 설계는 가치 저장소로서의 역할뿐 아니라 Exchange의 매개체 역할도 수행하여 전 세계 거래에 대해 빠르고 허가 없이 최종 정산할 수 있도록 지원합니다.
reviewed: true
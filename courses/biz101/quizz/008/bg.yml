question: Кое твърдение най-добре отразява ролята на Bitcoin като мрежа и актив за бизнеса?
answer: Тя може да служи както за съхранение на стойност, така и за разменно средство в глобална децентрализирана система.
wrong_answers:
  - Тя може да функционира само като местна система за карти за подаръци.
  - Това е единствено спекулативен инструмент за търговия без реална полза.
  - За да функционира, тя трябва да е обвързана с паричната политика на една държава.
explanation: |
  Глобалният дизайн на Bitcoin, базиран на интернет, му позволява да служи не само като средство за съхранение на стойност, но и като средство за размяна, предоставяйки на бизнеса бърз, безпроблемен и окончателен сетълмент на транзакции в цял свят.
reviewed: true
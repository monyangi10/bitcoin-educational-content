question: Welke uitspraak beschrijft het best de rol van Bitcoin als netwerk en aanwinst voor bedrijven?
answer: Het kan fungeren als zowel een opslagplaats van waarde als een medium van Exchange in een wereldwijd, gedecentraliseerd systeem.
wrong_answers:
  - Het kan alleen functioneren als een lokaal cadeaukaartsysteem.
  - Het is uitsluitend een speculatief handelstool zonder echt nut.
  - Het moet gebonden zijn aan het monetaire beleid van één land om te kunnen werken.
explanation: |
  Bitcoin s wereldwijde, internet-native ontwerp maakt het mogelijk om niet alleen te dienen als een opslagplaats van waarde, maar ook als een medium van Exchange, dat bedrijven voorziet van een snelle, toestemmingsvrije en definitieve afwikkeling van transacties wereldwijd.
reviewed: false
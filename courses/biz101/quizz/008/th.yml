question: ข้อความใดที่อธิบายบทบาทของ Bitcoin ในฐานะเครือข่ายและสินทรัพย์สำหรับธุรกิจได้ดีที่สุด?
answer: มันสามารถทำหน้าที่เป็นทั้งที่เก็บมูลค่าและสื่อกลางในการแลกเปลี่ยนในระบบที่กระจายอำนาจทั่วโลก
wrong_answers:
  - มันสามารถทำงานได้เฉพาะในฐานะระบบบัตรของขวัญท้องถิ่นเท่านั้น
  - มันเป็นเพียงเครื่องมือการซื้อขายเพื่อการเก็งกำไรโดยไม่มีประโยชน์ที่แท้จริง
  - มันต้องผูกกับนโยบายการเงินของประเทศเดียวเพื่อดำเนินการ
explanation: |
  การออกแบบที่เป็นสากลและเน้นอินเทอร์เน็ตของ Bitcoin ช่วยให้มันทำหน้าที่ไม่เพียงแค่เป็นที่เก็บมูลค่า แต่ยังเป็นสื่อกลางในการแลกเปลี่ยน โดยให้ธุรกิจสามารถทำธุรกรรมได้อย่างรวดเร็ว ไม่มีข้อจำกัด และมีการชำระเงินที่สิ้นสุดทั่วโลก
reviewed: true
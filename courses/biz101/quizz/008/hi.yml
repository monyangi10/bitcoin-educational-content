question: Bitcoin का कारोबारों के लिए नेटवर्क और संपत्ति के रूप में क्या भूमिका है, यह कौन सा कथन सबसे अच्छे से बताता है?
answer: यह एक वैश्विक, विकेंद्रीकृत प्रणाली में मूल्य के भंडार और Exchange के माध्यम दोनों के रूप में काम कर सकता है।
wrong_answers:
  - यह सिर्फ एक लोकल गिफ्ट कार्ड सिस्टम की तरह काम कर सकता है।
  - यह सिर्फ एक अटकलबाज़ी वाला ट्रेडिंग टूल है, जिसका कोई असली फायदा नहीं है।
  - इसे चलाने के लिए एक ही देश की मौद्रिक नीतियों से जोड़ा जाना चाहिए।
explanation: |
  Bitcoin का ग्लोबल, इंटरनेट-नेटिव डिज़ाइन इसे सिर्फ एक वैल्यू स्टोर के रूप में नहीं, बल्कि Exchange के माध्यम के तौर पर भी काम करने देता है। यह व्यवसायों को दुनिया भर में तेज़, बिना अनुमति के और अंतिम लेन-देन सेटलमेंट की सुविधा देता है।
reviewed: false
question: 다음 중 Bitcoin 트랜잭션이 완결성을 달성하는 방법을 가장 잘 설명하는 것은 무엇인가요?
answer: Blockchain에 기록된 거래는 변경할 수 없으며 변경할 수 없습니다.
wrong_answers:
  - 분쟁이 발생하면 은행에서 거래를 취소할 수 있습니다.
  - 사용자는 거래를 완료하기 위해 여러 정부 기관의 승인을 받아야 합니다.
  - 모든 참가자는 특별한 코드가 있는 경우 과거 거래를 마음대로 편집할 수 있습니다.
explanation: |
  Bitcoin의 Blockchain는 변조 방지 Ledger입니다. 트랜잭션이 확인되어 블록에 포함되면 영구 기록의 일부가 되어 최종성을 보장합니다.
reviewed: true
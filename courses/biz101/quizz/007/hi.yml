question: निम्नलिखित में से कौन सा विकल्प Bitcoin लेनदेन की फाइनैलिटी (अंतिमता) को सबसे बेहतर तरीके से बताता है?
answer: Blockchain पर एक बार रिकॉर्ड हो जाने के बाद, लेन-देन को बदला नहीं जा सकता।
wrong_answers:
  - बैंक लेन-देन को वापस ले सकते हैं अगर कोई विवाद हो जाए।
  - उपयोगकर्ताओं को लेन-देन पूरा करने के लिए कई सरकारी संस्थाओं से मंजूरी लेनी होगी।
  - कोई भी भागीदार पिछले लेन-देन को मनमर्जी से बदल सकता है, अगर उनके पास एक खास कोड हो।
explanation: |
  Bitcoin का Blockchain एक हैक-प्रूफ Ledger है। एक बार जब कोई लेन-देन कन्फर्म हो जाता है और ब्लॉक में शामिल हो जाता है, तो वह परमानेंट रिकॉर्ड का हिस्सा बन जाता है, जिससे फाइनैलिटी सुनिश्चित होती है।

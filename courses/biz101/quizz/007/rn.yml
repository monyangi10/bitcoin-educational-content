question: Ni ikihe muri ibi bikurikira kidondora neza ingene amarungika ya Bitcoin aherahezwa?
answer: Iyo amafaranga amaze kwandikwa kuri Blockchain, amarungika ntashobora guhinduka kandi ntashobora guhindurwa.
wrong_answers:
  - Irungikwa rirashobora guhagarikwa  n’amabanki iyo habaye ingorane.
  - Abakoresha ayo mahera bategerezwa kwemererwa n’inzego nyinshi za Leta kugira ngo bashobore kurangiza igikorwa cabo cirungika.
  - Umuntu wese  arashobora guhindura amafaranga yarungitswe kera uko ashatse, nimba afise kode idasanzwe.
explanation: |
   Blockchain ya  Bitcoin ni registre idashobora guhibwa. Mugihe igikorwa cemejwe kandi kigashirwa mu kibanza, kiba igice c’inyandiko gihoraho, kigatuma habaho iherahezwa ryigikorwa.
reviewed: true

question: ข้อใดต่อไปนี้อธิบายได้ดีที่สุดว่า Bitcoin ธุรกรรมบรรลุความสมบูรณ์ได้อย่างไร?
answer: เมื่อบันทึกลงในบล็อกเชนแล้ว ธุรกรรมจะไม่สามารถเปลี่ยนแปลงได้และไม่สามารถแก้ไขได้
wrong_answers:
  - ธุรกรรมสามารถถูกย้อนกลับโดยธนาคารหากมีข้อพิพาทเกิดขึ้น
  - ผู้ใช้ต้องได้รับการอนุมัติจากหน่วยงานรัฐบาลหลายแห่งเพื่อสรุปการทำธุรกรรม
  - ผู้เข้าร่วมใด ๆ สามารถแก้ไขธุรกรรมที่ผ่านมาได้ตามต้องการหากพวกเขามีรหัสพิเศษ
explanation: |
  บล็อกเชนของ Bitcoin เป็นบัญชีแยกประเภทที่ป้องกันการปลอมแปลง เมื่อธุรกรรมได้รับการยืนยันและรวมอยู่ในบล็อกแล้ว จะกลายเป็นส่วนหนึ่งของบันทึกถาวร เพื่อให้มั่นใจในความแน่นอน
reviewed: true
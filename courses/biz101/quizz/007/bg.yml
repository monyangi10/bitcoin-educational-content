question: Кое от следните неща описва най-добре начина, по който транзакциите Bitcoin постигат окончателност?
answer: Веднъж записани в блокчейна, трансакциите са неизменни и не могат да бъдат променяни.
wrong_answers:
  - Банките могат да анулират трансакциите при възникване на спор.
  - Потребителите трябва да получат одобрение от няколко правителствени структури, за да финализират дадена транзакция.
  - Всеки участник може да редактира минали транзакции по желание, ако има специален код.
explanation: |
  Блокчейнът на Bitcoin е защитена от фалшификации счетоводна книга. След като дадена транзакция бъде потвърдена и включена в блок, тя става част от постоянния запис, което гарантира окончателност.
reviewed: true
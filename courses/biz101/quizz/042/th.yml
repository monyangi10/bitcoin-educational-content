question: ในเขตอำนาจศาลส่วนใหญ่ อะไรที่เป็นตัวกระตุ้นเหตุการณ์ที่ต้องเสียภาษีเมื่อจัดการกับ Bitcoin?
answer: การขาย การซื้อขาย หรือการใช้ Bitcoin เป็นการชำระเงินมักจะก่อให้เกิดเหตุการณ์ที่ต้องเสียภาษี
wrong_answers:
  - เพียงแค่ถือ Bitcoin ไว้โดยไม่ทำธุรกรรมใด ๆ
  - การสำรองข้อมูล Bitcoin wallet หรือคีย์ของคุณ
  - กำลังดูราคา Bitcoin ออนไลน์
explanation: |
  โดยทั่วไป เหตุการณ์ที่ต้องเสียภาษีจะเกิดขึ้นเมื่อธุรกิจจำหน่ายหรือใช้ Bitcoin ของตน ไม่ใช่เพียงแค่ถือไว้ในสำรอง การขายหรือแลกเปลี่ยน Bitcoin แต่ละครั้งสำหรับสินค้า บริการ หรือสกุลเงินที่ออกโดยรัฐบาลสามารถทำให้เกิดกำไรหรือขาดทุนที่ต้องเสียภาษี generate
reviewed: true
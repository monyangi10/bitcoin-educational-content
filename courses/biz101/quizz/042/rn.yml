question: Mu bihugu vyinshi, ni igiki gituma umuntu  atanga umusoro  kuri Bitcoin?
answer: Gucuruza, kuyihanahana canke gukoresha Bitcoin mukwishura akenshi bituma umuntu shobora kurihishwa imisoro.
wrong_answers:
  - Gufata gusa Bitcoin ubuziraherezo atanarimwe uyikoresha.
  - Gusubiza inyuma Bitcoin Wallet(ingodo) yawe canke imfunguruzo.
  - Kuraba igiciro ca Bitcoin kuri internet.
explanation: |
  Mu bisanzwe, ikintu gishobora gukorwako umusoro kiba igihe ubudandaji butanga canke bukoresha Bitcoin yayo, atari  kufita gusa. Igihe cose ugurisha canke muhanahana Bitcoin ku bicuruzwa, ibikorwa, canke amafaranga y’amahera bishobora gutanga inyungu canke ibihombo bishobora gutozwako umusoro.
reviewed: true

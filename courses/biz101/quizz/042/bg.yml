question: В повечето юрисдикции какво предизвиква данъчно събитие при работа с Bitcoin?
answer: Продажбата, размяната или използването на Bitcoin като плащане често предизвиква данъчно събитие.
wrong_answers:
  - държане на Bitcoin за неопределено време без никакви транзакции.
  - Създаване на резервно копие на вашия Bitcoin портфейл или ключове.
  - Преглед на цената на Bitcoin онлайн.
explanation: |
  Обикновено данъчно събитие настъпва, когато предприятието се разпорежда с или използва своя биткойн, а не само като го държи като резерв. Всяка продажба или размяна на биткойн за стоки, услуги или фиатна валута може да доведе до облагаеми печалби или загуби.
reviewed: true

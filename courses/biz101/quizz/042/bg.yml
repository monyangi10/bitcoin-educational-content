question: В повечето юрисдикции какво предизвиква данъчно събитие при работа с Bitcoin?
answer: Продажбата, размяната или използването на Bitcoin като плащане често предизвиква данъчно събитие.
wrong_answers:
  - Просто задържане на Bitcoin за неопределено време без никакви транзакции.
  - Създаване на резервно копие на вашия Bitcoin wallet или ключове.
  - Преглед на цената на Bitcoin онлайн.
explanation: |
  Обикновено данъчно събитие настъпва, когато предприятието се разпорежда с или използва своя ГВ-7, а не само като го държи в резерв. Всяка продажба или размяна на ГС-7 за стоки, услуги или фиатна валута може да доведе до облагаеми печалби или загуби.
reviewed: true
question: Какво Bitcoin ви позволява да правите без посредници?
answer: размяна на стойност в интернет
wrong_answers:
  - Създаване на централизирани приложения
  - Получаване на банкови заеми
  - Съхраняване на лични данни
explanation: |
  Bitcoin дава възможност за обмен на стойност в интернет без посредници чрез своя протокол peer-to-peer.  
reviewed: true

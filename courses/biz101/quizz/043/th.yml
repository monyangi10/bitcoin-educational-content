question: Bitcoin ช่วยให้คุณทำอะไรได้โดยไม่ต้องมีตัวกลาง?
answer: ค่า Exchange บนอินเทอร์เน็ต
wrong_answers:
  - สร้างแอปพลิเคชันแบบรวมศูนย์
  - ขอสินเชื่อจากธนาคาร
  - จัดเก็บข้อมูลส่วนบุคคล
explanation: |
  Bitcoin ช่วยให้การแลกเปลี่ยนมูลค่าบนอินเทอร์เน็ตเป็นไปได้โดยไม่ต้องมีตัวกลางผ่านโปรโตคอลแบบเพียร์ทูเพียร์
reviewed: true
question: Bitcoin आपको बिना किसी बिचौलिए के क्या करने की अनुमति देता है?
answer: इंटरनेट पर Exchange का मूल्य
wrong_answers:
  - केंद्रीकृत एप्लिकेशन बनाएं
  - बैंक से लोन लें
  - व्यक्तिगत डेटा स्टोर करें
explanation: |
  Bitcoin, अपने पीयर-टू-पीयर प्रोटोकॉल के जरिए, बिना किसी बिचौलिए के इंटरनेट पर Exchange के मूल्य को सक्षम बनाता है।
reviewed: false
question: Bitcoin cho phép bạn làm gì mà không cần trung gian?
answer: Giá trị Exchange trên Internet
wrong_answers:
  - Tạo các ứng dụng tập trung
  - Vay vốn ngân hàng
  - Lưu trữ dữ liệu cá nhân
explanation: |
  Bitcoin cho phép trao đổi giá trị trên Internet mà không cần trung gian thông qua giao thức ngang hàng.
reviewed: true
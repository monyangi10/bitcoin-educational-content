question: Lightning Network की बेहतर कार्यक्षमता और स्पीड पारंपरिक भुगतान तरीकों की तुलना में कैसी है?
answer: यह काफी तेज़ है, अक्सर लेन-देन एक सेकंड से भी कम समय में पूरा कर देता है, जिसमें कम फीस लगती है और कई बिचौलियों पर निर्भरता नहीं होती।
wrong_answers:
  - यह पारंपरिक बैंकिंग समय से मेल खाता है, और अक्सर सेटल होने में 2-5 दिन लगते हैं।
  - यह पारंपरिक कार्ड भुगतान से धीमा है और इसकी फीस भी ज्यादा है।
  - इसे कई मंजूरी देने वाली संस्थाओं की जरूरत होती है, बिल्कुल वैसे ही जैसे बैंक ट्रांसफर में होता है।
explanation: |
  off-chain लेनदेन को सक्षम करके और भुगतान को लगभग तुरंत अंतिम रूप देकर, Lightning पारंपरिक तरीकों पर गति और दक्षता का लाभ प्रदान करता है जो कई मध्यस्थों पर निर्भर करते हैं।
reviewed: false
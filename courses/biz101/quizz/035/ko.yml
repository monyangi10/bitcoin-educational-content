question: Lightning Network의 향상된 효율성과 속도는 기존 결제 수단과 비교했을 때 어떤 차이가 있나요?
answer: 수수료가 저렴하고 여러 중개업체에 의존하지 않고 1초 이내에 거래가 정산되는 경우가 많아 훨씬 빠릅니다.
wrong_answers:
  - 결제까지 보통 2~5일이 걸리는 기존 은행 업무 시간과 일치합니다.
  - 기존 카드 결제보다 속도가 느리고 수수료가 높습니다.
  - 현재 은행 송금과 마찬가지로 여러 승인 기관이 필요합니다.
explanation: |
  라이트닝은 off-chain 거래를 활성화하고 거의 즉각적으로 결제를 완료함으로써 여러 중개자에 의존하는 기존 방식에 비해 속도와 효율성 측면에서 이점을 제공합니다.
reviewed: true
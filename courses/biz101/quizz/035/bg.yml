question: Как подобрената ефективност и бързина на Lightning Network се сравняват с традиционните методи на плащане?
answer: Тя е значително по-бърза, като често урежда трансакции за по-малко от секунда, с по-ниски такси и без зависимост от множество посредници.
wrong_answers:
  - Тя съвпада с традиционните банкови срокове и често отнема от 2 до 5 дни.
  - То е по-бавно от традиционните картови плащания и има по-високи такси.
  - Изискват се няколко одобряващи органа, точно както при текущите банкови преводи.
explanation: |
  Като дава възможност за трансакции off-chain и финализира плащанията почти мигновено, Lightning предлага предимство по отношение на скоростта и ефективността в сравнение с традиционните методи, които разчитат на няколко посредници.
reviewed: true

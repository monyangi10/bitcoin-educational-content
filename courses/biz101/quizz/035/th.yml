question: ประสิทธิภาพและความเร็วที่ดีขึ้นของ Lightning Network เปรียบเทียบกับวิธีการชำระเงินแบบดั้งเดิมอย่างไร?
answer: มันเร็วขึ้นอย่างมาก โดยมักจะทำธุรกรรมเสร็จสิ้นในเวลาน้อยกว่าหนึ่งวินาที มีค่าธรรมเนียมที่ต่ำกว่าและไม่ต้องพึ่งพาตัวกลางหลายราย
wrong_answers:
  - มันตรงกับเวลาธนาคารแบบดั้งเดิม ซึ่งมักใช้เวลา 2-5 วันในการชำระเงิน
  - มันช้ากว่าการชำระเงินด้วยบัตรแบบดั้งเดิมและมีค่าธรรมเนียมสูงกว่า
  - มันต้องการหน่วยงานอนุมัติหลายแห่ง เช่นเดียวกับการโอนเงินผ่านธนาคารในปัจจุบัน
explanation: |
  ด้วยการเปิดใช้งานธุรกรรม off-chain และการชำระเงินที่เสร็จสิ้นเกือบจะทันที Lightning มอบความเร็วและประสิทธิภาพที่เหนือกว่าวิธีการแบบดั้งเดิมที่ต้องพึ่งพาตัวกลางหลายราย
reviewed: true
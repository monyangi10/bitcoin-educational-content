question: 與傳統的付款方式相比，Lightning Network 所提升的效率和速度如何？
answer: 它的速度明顯更快，通常不到一秒就能完成交易，而且費用更低，也不需要依賴多個中介。
wrong_answers:
  - 它與傳統的銀行時間相符，通常需要 2-5 天的時間來結算。
  - 它比傳統的卡片支付速度慢，而且費用較高。
  - 它需要多個核准實體，就像目前的銀行轉帳一樣。
explanation: |
  Lightning 可實現 off-chain 交易，並幾乎在瞬間完成付款，與依賴多個中介的傳統方法相比，具有速度和效率方面的優勢。

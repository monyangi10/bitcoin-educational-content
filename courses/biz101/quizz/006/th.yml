question: ทำไมการจำกัดการออก Bitcoin ที่ 21 ล้านจึงมีความสำคัญ?
answer: มันสร้างสินทรัพย์ที่มีภาวะเงินฝืด ปกป้องมูลค่าของมันจากภาวะเงินเฟ้อที่ไม่แน่นอน
wrong_answers:
  - มันทำให้รัฐบาลสามารถพิมพ์บิตคอยน์ได้ตามต้องการ
  - มันป้องกันไม่ให้ใครส่งธุรกรรมหลังจากถึงขีดจำกัดแล้ว
  - มันกำจัดความผันผวนทั้งหมดในราคาของ Bitcoin
explanation: |
  ด้วยจำนวนสูงสุดที่ 21 ล้าน Bitcoin มีความขาดแคลนที่ถูกกำหนดไว้ในโค้ด ทำให้แตกต่างอย่างพื้นฐานจากสกุลเงินที่มีอัตราเงินเฟ้อ ซึ่งสามารถเพิ่มปริมาณได้ตามต้องการ
reviewed: true
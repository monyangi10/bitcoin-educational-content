question: Tại sao mức giới hạn phát hành 21 triệu đơn vị Bitcoin lại quan trọng?
answer: Nó tạo ra một loại tài sản giảm phát, bảo vệ giá trị của nó khỏi tình trạng tùy chỉnh lạm phát.
wrong_answers:
  - Nó đảm bảo rằng chính phủ có thể in bao nhiêu bitcoin tùy theo nhu cầu.
  - Nó ngăn chặn bất kỳ ai gửi giao dịch sau khi đạt đến giới hạn.
  - Nó loại bỏ mọi biến động trong giá của Bitcoin.
explanation: |
  Với nguồn cung tối đa là 21 triệu, tính khan hiếm của Bitcoin được mã hóa cứng, khiến nó về cơ bản khác với các loại tiền tệ pháp định, nơi nguồn cung có thể tăng theo ý muốn.
reviewed: true
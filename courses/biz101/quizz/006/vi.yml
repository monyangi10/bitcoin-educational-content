question: Tại sao mức giới hạn phát hành Bitcoin là 21 triệu lại quan trọng?
answer: Nó tạo ra một tài sản giảm phát, bảo vệ giá trị của nó khỏi tình trạng lạm phát tùy ý.
wrong_answers:
  - Nó đảm bảo rằng chính phủ có thể in bao nhiêu bitcoin tùy theo nhu cầu.
  - Nó ngăn chặn bất kỳ ai gửi giao dịch sau khi đạt đến giới hạn.
  - Nó loại bỏ mọi biến động trong giá của Bitcoin.
explanation: |
  Với nguồn cung tối đa là 21 triệu, tình trạng khan hiếm của Bitcoin được mã hóa cứng, khiến nó về cơ bản khác với các loại tiền tệ lạm phát, nơi nguồn cung có thể tăng theo ý muốn.
reviewed: true
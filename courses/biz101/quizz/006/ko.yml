question: Bitcoin 발행 한도 2,100만 개가 중요한 이유는 무엇인가요?
answer: 디플레이션 자산을 생성하여 임의의 인플레이션으로부터 자산 가치를 보호합니다.
wrong_answers:
  - 이는 정부가 필요한 만큼의 비트코인을 발행할 수 있도록 보장합니다.
  - 한도에 도달한 후에는 누구도 거래를 보낼 수 없습니다.
  - 이는 Bitcoin 가격의 모든 변동성을 제거합니다.
explanation: |
  최대 Supply가 2,100만 개인 Bitcoin의 희소성은 Hard로 코딩되어 있어 Supply를 마음대로 늘릴 수 있는 인플레이션 통화와는 근본적으로 다릅니다.
reviewed: true
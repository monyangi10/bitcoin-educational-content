question: Ni kuki urugero rw’amamiliyoni 21 ya Bitcoin rutanga ruhambaye?
answer: Irema umutungo muke wagaciro(déflationniste) , ugakingira agaciro kawo kubera badashobora kuyakora uko bashatse.
wrong_answers:
  - Biremezwa ko intwaro zishobora gukora amafaranga ya bitcoin akenewe yose uko bashatse.
  - Birabuza umuntu wese kohereza amafaranga iyo urubuga rucitse.
  - Bikuraho uguhindagurika  kwa gaciro ka Bitcoin.
explanation: |
  Hamwe nagaciro ntarengwa ka miliyoni 21, Ukutaboneka(rareté) kwa Bitcoin birakomeye cane, bikaba arivyo biyatandukanya cane n’amahera inflationnistes bisigura ko bashobora gukorwa amahera uko babishatse.
reviewed: true

question: Защо лимитът от 21 млн. евро за издаване на Bitcoin е значителен?
answer: Той създава дефлационен актив, който защитава стойността му от произволна инфлация.
wrong_answers:
  - Тя гарантира, че правителствата могат да печатат толкова биткойни, колкото е необходимо.
  - Тя не позволява на никого да изпраща трансакции след достигане на лимита.
  - Това елиминира всички колебания в цената на Bitcoin.
explanation: |
  С максимално предлагане от 21 милиона, недостигът на Bitcoin е твърдо кодиран, което я прави коренно различна от инфлационните валути, при които предлагането може да се увеличава по желание.
reviewed: true
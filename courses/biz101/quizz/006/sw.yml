question: Kwa nini kikomo cha milioni 21 kwenye utoaji wa Bitcoin ni muhimu?
answer: Inaunda mali ya deflationary, kulinda thamani yake dhidi ya mfumuko wa bei wa kiholela.
wrong_answers:
  - Inahakikisha kwamba serikali zinaweza kuchapisha bitcoins nyingi kama inahitajika.
  - Inazuia mtu yeyote kutuma miamala baada ya kikomo kufikiwa.
  - Inaondoa tete zote katika bei ya Bitcoin.
explanation: |
  Kwa kuwa na kiwango cha juu cha Supply kati ya milioni 21, uhaba wa Bitcoin ni Hard-coded, na kuifanya kuwa tofauti kimsingi na sarafu ya mfumuko wa bei ambapo Supply inaweza kuongezwa kwa hiari.
reviewed: true

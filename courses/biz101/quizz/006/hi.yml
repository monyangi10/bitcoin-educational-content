question: Bitcoin के 21 मिलियन के इश्यू कैप का क्या महत्व है?
answer: यह एक अपस्फीतिकारी (deflationary) संपत्ति बनाता है, जो मनमाने ढंग से मुद्रास्फीति (inflation) के खिलाफ अपने मूल्य की रक्षा करता है।
wrong_answers:
  - यह सुनिश्चित करता है कि सरकारें जितने चाहें उतने बिटकॉइन छाप सकती हैं।
  - यह कैप पहुँचने के बाद किसी को भी लेन-देन भेजने से रोकता है।
  - यह Bitcoin के दाम में होने वाले उतार-चढ़ाव को पूरी तरह खत्म कर देता है।
explanation: |
  21 मिलियन की अधिकतम Supply सीमा होने से, Bitcoin की कमी Hard कोडेड है, जो इसे मुद्रास्फीति वाली करेंसी से बिल्कुल अलग बनाता है जहां Supply को मनमर्जी से बढ़ाया जा सकता है।

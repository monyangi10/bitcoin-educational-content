question: 為何公司會考慮持有 Bitcoin 而非房地產等傳統「安全」資產？
answer: Bitcoin 有可能超越實際通貨膨脹，且不與不動產的流動性和維護成本掛鉤。
wrong_answers:
  - 房地產永遠比 Bitcoin 便宜，而且永遠不需要維護。
  - Bitcoin 提供房地產所沒有的政府背書保證。
  - 在所有市場條件下，不動產的升值速度都比 Bitcoin 快。
explanation: |
  房地產通常涉及流動性限制和持續成本，而且可能跟不上以債務為基礎的貨幣體系中隱藏的通貨膨脹。Bitcoin 的稀缺性和全球覆蓋範圍提供了獨特的價值儲存主張，長期而言可能優於傳統資產。
reviewed: false
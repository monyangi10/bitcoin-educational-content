question: ทำไมบริษัทอาจพิจารณาถือ Bitcoin แทนสินทรัพย์ "ปลอดภัย" แบบดั้งเดิมอย่างอสังหาริมทรัพย์?
answer: Bitcoin สามารถแซงหน้าอัตราเงินเฟ้อที่แท้จริงได้และไม่ผูกติดกับความไม่มีสภาพคล่องและค่าใช้จ่ายในการบำรุงรักษาของอสังหาริมทรัพย์
wrong_answers:
  - อสังหาริมทรัพย์มักจะถูกกว่า Bitcoin และไม่เคยต้องการการบำรุงรักษา
  - Bitcoin ให้การรับประกันที่ได้รับการสนับสนุนจากรัฐบาลซึ่งอสังหาริมทรัพย์ไม่สามารถให้ได้
  - อสังหาริมทรัพย์มีมูลค่าเพิ่มขึ้นเร็วกว่าที่ Bitcoin ภายใต้ทุกสภาวะตลาด
explanation: |
  อสังหาริมทรัพย์มักเกี่ยวข้องกับข้อจำกัดด้านสภาพคล่องและค่าใช้จ่ายต่อเนื่อง และอาจไม่ทันกับอัตราเงินเฟ้อที่ซ่อนอยู่ในระบบการเงินที่อิงหนี้สิน ความหายากและการเข้าถึงทั่วโลกของ Bitcoin เสนอข้อเสนอการเก็บรักษามูลค่าที่แตกต่างซึ่งอาจมีประสิทธิภาพดีกว่าสินทรัพย์แบบดั้งเดิมในระยะยาว
reviewed: true
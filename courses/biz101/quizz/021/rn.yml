question: Ni kuki ishirahamwe ryoshobora kwiyumvira gufata Bitcoin ku bintu vya kera "bitekanye" nk'amazu?
answer: Bitcoin ishobora gusumba inflation nyayo kandi ntiboshe ku bijanye n’ukubura amahera n’ibiciro vyo kwitwararika amazu.
wrong_answers:
  - Ivy’ubutunzi vyama bihendutse kuruta Bitcoin kandi ntivyigera bikenera gusanurwa.
  - Bitcoin itanga ivyemezo bishigikiwe na Leta ko amazu n’ibindi bitagira.
  - Ivy’ubutunzi birashima cane kuruta Bitcoin mu bihe vyose vy’isoko.
explanation: |
  Ivy’ubutunzi akenshi birimwo ingorane z’amahera n’ibiciro biguma bigenda, kandi bishobora kutajana n’ugutera imbere kw’ibiciro mu buryo bwihishije mu bijanye n’amahera ashingiye ku myenda. Ubukene bwa Bitcoin n’ugushikira kw’isi yose bitanga iciyumviro c’agaciro kidasanzwe gishobora gusumba ivy’agaciro vya kera mu gihe kirekire.

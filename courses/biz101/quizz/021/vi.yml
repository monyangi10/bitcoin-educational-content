question: Tại sao một công ty lại cân nhắc nắm giữ Bitcoin thay vì các tài sản "an toàn" truyền thống như bất động sản?
answer: Bitcoin có khả năng vượt xa lạm phát thực tế và không liên quan đến tính thanh khoản thấp và chi phí bảo trì bất động sản.
wrong_answers:
  - Bất động sản luôn rẻ hơn Bitcoin và không bao giờ cần bảo trì.
  - Bitcoin cung cấp sự bảo lãnh do chính phủ bảo lãnh mà bất động sản không có.
  - Giá bất động sản tăng nhanh hơn Bitcoin trong mọi điều kiện thị trường.
explanation: |
  Bất động sản thường liên quan đến những hạn chế về thanh khoản và chi phí liên tục, và có thể không theo kịp lạm phát tiềm ẩn trong hệ thống tiền tệ dựa trên nợ. Sự khan hiếm và phạm vi toàn cầu của Bitcoin mang lại một đề xuất lưu trữ giá trị riêng biệt, có thể vượt trội hơn các tài sản truyền thống về lâu dài.
reviewed: true
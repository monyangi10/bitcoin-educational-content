question: Dlaczego firma może rozważyć posiadanie Bitcoin zamiast tradycyjnych "bezpiecznych" aktywów, takich jak nieruchomości?
answer: Bitcoin może potencjalnie przewyższać rzeczywistą inflację i nie jest powiązany z brakiem płynności i kosztami utrzymania nieruchomości.
wrong_answers:
  - Nieruchomości są zawsze tańsze niż Bitcoin i nigdy nie wymagają konserwacji.
  - Bitcoin zapewnia gwarancje rządowe, których nie dają nieruchomości.
  - Nieruchomości zyskują na wartości szybciej niż Bitcoin w każdych warunkach rynkowych.
explanation: |
  Nieruchomości często wiążą się z ograniczeniami płynności i bieżącymi kosztami i mogą nie nadążać za ukrytą inflacją w systemie monetarnym opartym na długu. Niedobór Bitcoin i globalny zasięg oferują wyraźną propozycję przechowywania wartości, która w dłuższej perspektywie może przewyższać tradycyjne aktywa.
reviewed: false
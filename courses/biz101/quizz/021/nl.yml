question: Waarom zou een bedrijf overwegen om Bitcoin te houden in plaats van traditionele "veilige" activa zoals vastgoed?
answer: Bitcoin kan mogelijk de reële inflatie overtreffen en is niet gebonden aan de illiquiditeit en onderhoudskosten van onroerend goed.
wrong_answers:
  - Onroerend goed is altijd goedkoper dan Bitcoin en heeft nooit onderhoud nodig.
  - Bitcoin biedt door de overheid gesteunde garanties die onroerend goed niet biedt.
  - Onroerend goed waardeert sneller dan Bitcoin onder alle marktomstandigheden.
explanation: |
  Onroerend goed gaat vaak gepaard met liquiditeitsbeperkingen en doorlopende kosten, en kan mogelijk geen gelijke tred houden met de verborgen inflatie in een op schulden gebaseerd monetair systeem. De schaarste en het wereldwijde bereik van Bitcoin bieden een duidelijke waardeopslag die het op de lange termijn beter kan doen dan traditionele activa.
reviewed: false
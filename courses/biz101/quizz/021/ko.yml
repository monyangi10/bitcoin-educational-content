question: 기업이 부동산과 같은 전통적인 '안전' 자산 대신 Bitcoin 보유를 고려하는 이유는 무엇일까요?
answer: Bitcoin은 잠재적으로 실제 인플레이션을 능가할 수 있으며 부동산의 비유동성 및 유지 관리 비용과 관련이 없습니다.
wrong_answers:
  - 부동산은 항상 Bitcoin보다 저렴하고 유지 관리가 필요하지 않습니다.
  - Bitcoin는 부동산이 제공하지 않는 정부 지원 보증을 제공합니다.
  - 부동산은 모든 시장 조건에서 Bitcoin보다 더 빠르게 가치가 상승합니다.
explanation: |
  부동산은 유동성 제약과 지속적인 비용을 수반하는 경우가 많으며, 부채 기반 통화 시스템에서는 숨겨진 인플레이션을 따라가지 못할 수도 있습니다. Bitcoin의 희소성과 글로벌 범위는 장기적으로 기존 자산을 능가할 수 있는 뚜렷한 가치 저장 제안을 제공합니다.
reviewed: true
question: एक कंपनी Bitcoin को पारंपरिक "सुरक्षित" संपत्तियों जैसे रियल एस्टेट पर क्यों चुन सकती है?
answer: जीडब्ल्यू-1 असली महँगाई से आगे निकल सकता है और रियल एस्टेट की अशक्तता और रखरखाव लागत से जुड़ा नहीं है।
wrong_answers:
  - रियल एस्टेट हमेशा Bitcoin से सस्ता होता है और उसमें मेंटेनेंस की भी जरूरत नहीं पड़ती।
  - जीडब्ल्यू-3 सरकारी गारंटी प्रदान करता है जो रियल एस्टेट नहीं देता।
  - रियल एस्टेट Bitcoin की तुलना में हर मार्केट कंडीशन में तेजी से प्राइस बढ़ाता है।
explanation: |
  रियल एस्टेट में अक्सर लिक्विडिटी की कमी और लगातार खर्चे होते हैं, और यह कर्ज़-आधारित मौद्रिक प्रणाली में छुपी हुई मुद्रास्फीति के साथ कदम नहीं मिला पाता। Bitcoin की कमी और वैश्विक पहुंच एक अलग स्टोर-ऑफ-वैल्यू प्रस्ताव देती है जो लंबे समय में पारंपरिक संपत्तियों से बेहतर प्रदर्शन कर सकती है।

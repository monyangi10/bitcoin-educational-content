question: Kwa nini kampuni inaweza kufikiria kushikilia Bitcoin juu ya mali ya jadi "salama" kama vile mali isiyohamishika?
answer: Bitcoin inaweza kuzidi kasi ya mfumuko wa bei halisi na haihusiani na gharama zisizo halali na za matengenezo ya mali isiyohamishika.
wrong_answers:
  - Mali isiyohamishika daima ni nafuu kuliko Bitcoin na kamwe hauhitaji matengenezo.
  - Bitcoin hutoa uhakikisho unaoungwa mkono na serikali ambao mali isiyohamishika haifanyi.
  - Mali isiyohamishika inathamini kwa kasi zaidi kuliko Bitcoin chini ya hali zote za soko.
explanation: |
  Mali isiyohamishika mara nyingi huhusisha vikwazo vya ukwasi na gharama zinazoendelea, na huenda zisiendane na mfumuko wa bei uliofichika katika mfumo wa fedha unaotegemea deni. Uhaba wa Bitcoin na ufikiaji wa kimataifa unatoa pendekezo tofauti la duka la thamani ambalo linaweza kushinda mali ya kitamaduni kwa muda mrefu.
reviewed: true

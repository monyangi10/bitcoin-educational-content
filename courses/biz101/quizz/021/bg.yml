question: Защо една компания може да предпочете да притежава Bitcoin пред традиционните "сигурни" активи като недвижимите имоти?
answer: Bitcoin може потенциално да изпревари реалната инфлация и не е обвързан с неликвидността и разходите за поддръжка на недвижимите имоти.
wrong_answers:
  - Недвижимите имоти винаги са по-евтини от Bitcoin и никога не се нуждаят от поддръжка.
  - Bitcoin предоставя държавни гаранции, каквито недвижимите имоти не предоставят.
  - Недвижимите имоти поскъпват по-бързо от Bitcoin при всички пазарни условия.
explanation: |
  Недвижимите имоти често са свързани с ликвидни ограничения и текущи разходи и може да не са в крак със скритата инфлация в паричната система, основана на дълга. Оскъдността и глобалният обхват на Bitcoin предлагат различно предложение за съхранение на стойност, което може да надмине традиционните активи в дългосрочен план.
reviewed: true
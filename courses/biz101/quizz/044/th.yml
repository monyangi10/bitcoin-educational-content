question: ข้อดีอย่างหนึ่งสำหรับพ่อค้าที่ใช้ Lightning Network คืออะไร?
answer: ค่าธรรมเนียมการทำธุรกรรมที่ลดลง
wrong_answers:
  - การชำระเงินที่รับประกันโดยธนาคาร
  - การเพิ่มยอดขายโดยอัตโนมัติ
  - การยกเลิกภาษีการค้า
explanation: |
  ค่าธรรมเนียมการทำธุรกรรมบน Lightning Network ต่ำมาก ทำให้เป็นโซลูชันที่คุ้มค่าสำหรับผู้ค้า
reviewed: true
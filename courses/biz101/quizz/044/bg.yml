question: Кое е едно от основните предимства за търговците, които използват Lightning Network?
answer: Намалени такси за транзакции
wrong_answers:
  - Плащания, гарантирани от банки
  - Автоматично увеличаване на продажбите
  - Премахване на търговските данъци
explanation: |
  Таксите за транзакции при Lightning Network са много ниски, което го прави рентабилно решение за търговците.  
reviewed: true
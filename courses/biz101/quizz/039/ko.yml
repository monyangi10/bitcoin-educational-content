question: Bitcoin을 디지털 자산으로 취급하는 것과 회계에서 통화처럼 취급하는 것의 주요 차이점은 무엇인가요?
answer: 디지털 자산은 각 거래의 원가 기준과 손익을 추적해야 하지만, 통화처럼 취급한다면 재평가가 더 간단하고 빈도가 낮아질 것입니다.
wrong_answers:
  - 디지털 자산으로 취급되면 모든 세금이 전액 면제됩니다.
  - 통화처럼 취급하면 거래 기록이 필요하지 않습니다.
  - 화폐처럼 취급하려면 즉시 새 회계 소프트웨어로 전환해야 합니다.
explanation: |
  디지털 자산을 처리하려면 일반적으로 각 거래의 자본 이득 또는 손실을 계산해야 하므로 복잡성이 더해집니다. Bitcoin을 통화처럼 회계 처리한다면 다른 통화처럼 주기적으로 법정 화폐 가치를 업데이트하면 되므로 더 간단할 것입니다.
reviewed: true
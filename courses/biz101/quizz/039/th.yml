question: ความแตกต่างหลักประการหนึ่งระหว่างการจัดการ Bitcoin เป็นสินทรัพย์ดิจิทัลกับการจัดการเป็นสกุลเงินในทางบัญชีคืออะไร?
answer: ในฐานะสินทรัพย์ดิจิทัล ต้นทุนพื้นฐานและกำไร/ขาดทุนของแต่ละธุรกรรมจะต้องถูกติดตาม ในขณะที่หากมันถูกปฏิบัติเหมือนเป็นสกุลเงิน การประเมินมูลค่าใหม่จะง่ายขึ้นและเกิดขึ้นไม่บ่อยนัก
wrong_answers:
  - เมื่อถือว่าเป็นสินทรัพย์ดิจิทัล จะได้รับการยกเว้นภาษีทั้งหมด
  - เมื่อถูกปฏิบัติเหมือนเป็นสกุลเงิน ไม่จำเป็นต้องมีบันทึกการทำธุรกรรม
  - การปฏิบัติต่อมันเหมือนเป็นสกุลเงินต้องมีการเปลี่ยนไปใช้ซอฟต์แวร์บัญชีใหม่ทันที
explanation: |
  การจัดการสินทรัพย์ดิจิทัลมักเกี่ยวข้องกับการคำนวณกำไรหรือขาดทุนจากการลงทุนในแต่ละธุรกรรม ซึ่งเพิ่มความซับซ้อน หาก Bitcoin ถูกบันทึกบัญชีเหมือนสกุลเงิน มันจะง่ายกว่า เพียงแค่ปรับปรุงมูลค่าเงินตราเป็นระยะ ๆ เช่นเดียวกับที่ทำกับสกุลเงินอื่น ๆ
reviewed: true
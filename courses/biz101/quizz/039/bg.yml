question: Коя е основната разлика между третирането на Bitcoin като цифров актив и третирането му като валута в счетоводството?
answer: Тъй като е цифров актив, при всяка транзакция трябва да се проследява себестойността и печалбите/загубите, докато ако се третираше като валута, преоценките щяха да бъдат по-прости и по-редки.
wrong_answers:
  - Когато се третира като цифров актив, той е напълно освободен от всякакви данъци.
  - Когато се третират като валута, не са необходими записи на транзакции.
  - Третирането му като валута изисква незабавно преминаване към нов счетоводен софтуер.
explanation: |
  Третирането на цифрови активи обикновено включва изчисляване на капиталовите печалби или загуби за всяка транзакция, което допълнително усложнява ситуацията. Ако Bitcoin се отчитат като валута, това би било по-лесно - просто периодично се актуализира фиатната стойност, както се прави за другите валути.
reviewed: true
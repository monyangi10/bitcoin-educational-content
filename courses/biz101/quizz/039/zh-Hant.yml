question: 在會計上，將 Bitcoin 視為數位資產與將其視為貨幣有什麼主要差異？
answer: 身為數位資產，每筆交易的成本基礎和收益/虧損都必須追蹤，而如果將它當成貨幣處理，重新估值就會更簡單、更不頻繁。
wrong_answers:
  - 當被視為數位資產時，可完全免除所有稅項。
  - 當被當作貨幣處理時，不需要交易記錄。
  - 將其當作貨幣處理需要立即轉換為新的會計軟體。
explanation: |
  數位資產處理通常涉及計算每次交易的資本收益或虧損，增加了複雜性。如果 Bitcoin 像貨幣一樣入帳，那就更簡單了；只要定期更新法定價值即可，就像其他貨幣一樣。
reviewed: false
question: Bitcoin को डिजिटल एसेट की तरह ट्रीट करने और करेंसी की तरह ट्रीट करने में एक बड़ा फर्क यह है:

**डिजिटल एसेट की तरह:**  
- Bitcoin को प्रॉपर्टी/संपत्ति माना जाता है  
- वैल्यू में उतार-चढ़ाव (volatility) के हिसाब से बुक वैल्यू एडजस्ट की जाती है  
- कैपिटल गेन/लॉस के रूप में टैक्स लगता है  

**करेंसी की तरह:**  
- Bitcoin को एक्सचेंज मीडियम माना जाता है  
- फॉरेन करेंसी ट्रांजैक्शन की तरह ट्रीट किया जाता है  
- रेवेन्यू/खर्चे के रूप में रिकॉर्ड किया जाता है  

सीधा फर्क यह है कि एसेट ट्रीटमेंट में वैल्यू बदलने पर अकाउंटिंग एंट्रीज होती हैं, जबकि करेंसी ट्रीटमेंट में ट्रांजैक्शन के टाइम ही रिकॉर्डिंग होती है।
answer: एक डिजिटल एसेट के तौर पर, हर लेन-देन का कॉस्ट बेसिस और फायदा/नुकसान ट्रैक करना पड़ता है, जबकि अगर इसे करेंसी की तरह माना जाए तो वैल्यूएशन सिंपल और कम बार होगा।
wrong_answers:
  - जब इसे डिजिटल एसेट माना जाता है, तो यह सभी टैक्स से पूरी तरह मुक्त होता है।
  - जब इसे करेंसी की तरह इस्तेमाल किया जाता है, तो ट्रांजैक्शन के कोई रिकॉर्ड्स की जरूरत नहीं होती।
  - इसे करेंसी की तरह ट्रीट करने के लिए तुरंत एक नए अकाउंटिंग सॉफ्टवेयर पर स्विच करना पड़ेगा।
explanation: |
  डिजिटल एसेट ट्रीटमेंट में आमतौर पर हर लेन-देन पर कैपिटल गेन या लॉस की गणना करनी पड़ती है, जिससे जटिलता बढ़ जाती है। अगर Bitcoin को करेंसी की तरह ट्रीट किया जाए, तो यह सरल होगा; बस अन्य करेंसीज़ की तरह समय-समय पर इसके फिएट वैल्यू को अपडेट करते रहें।

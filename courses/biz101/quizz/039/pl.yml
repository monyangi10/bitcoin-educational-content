question: Jaka jest główna różnica między traktowaniem Bitcoin jako zasobu cyfrowego a traktowaniem go jak waluty w księgowości?
answer: Jako aktywa cyfrowe, podstawa kosztowa każdej transakcji oraz zyski/straty muszą być śledzone, podczas gdy gdyby były traktowane jak waluta, przeszacowania byłyby prostsze i rzadsze.
wrong_answers:
  - Gdy jest traktowany jako zasób cyfrowy, jest całkowicie zwolniony z wszelkich podatków.
  - Gdy traktuje się je jak walutę, nie ma potrzeby rejestrowania transakcji.
  - Traktowanie go jak waluty wymaga natychmiastowego przejścia na nowe oprogramowanie księgowe.
explanation: |
  Traktowanie aktywów cyfrowych zazwyczaj wiąże się z obliczaniem zysków lub strat kapitałowych dla każdej transakcji, co zwiększa złożoność. Gdyby Bitcoin był rozliczany jak waluta, byłoby to prostsze; wystarczy okresowo aktualizować wartość fiat, tak jak ma to miejsce w przypadku innych walut.

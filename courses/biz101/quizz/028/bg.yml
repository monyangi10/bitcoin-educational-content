question: Защо едно предприятие може да избере да приема плащания с Bitcoin от клиенти?
answer: Да се възползва от нарастваща потребителска база, да намали таксите за трансакции и да притежава ценен актив в своята каса.
wrong_answers:
  - За да се гарантира, че всички клиенти ще платят повече от посочената цена.
  - За да се гарантира, че никога няма да се прилагат данъци или регулаторни изисквания.
  - За да направите процеса на проверка по-бавен и сложен.
explanation: |
  Приемането на Bitcoin може да привлече нови купувачи, да намали таксите за обработка на плащанията и да създаде магазин за ценности. То може също така да увеличи глобалния обхват, тъй като Bitcoin е без граници и работи 24 часа в денонощието, 7 дни в седмицата.
reviewed: true
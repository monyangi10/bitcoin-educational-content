question: ทำไมธุรกิจอาจเลือกที่จะยอมรับการชำระเงิน Bitcoin จากลูกค้า?
answer: เพื่อเข้าถึงฐานผู้ใช้ที่กำลังเติบโต ลดค่าธรรมเนียมการทำธุรกรรมที่อาจเกิดขึ้น และถือครองสินทรัพย์ที่มีค่าในคลังของบริษัท
wrong_answers:
  - เพื่อรับประกันว่าลูกค้าทุกคนจะจ่ายมากกว่าราคาที่ระบุไว้
  - เพื่อให้แน่ใจว่าจะไม่มีภาษีหรือข้อกำหนดด้านกฎระเบียบใดๆ ที่ใช้บังคับ
  - เพื่อทำให้กระบวนการชำระเงินช้าลงและซับซ้อนมากขึ้น
explanation: |
  การยอมรับ Bitcoin สามารถดึงดูดกลุ่มผู้ซื้อใหม่ ลดค่าธรรมเนียมการประมวลผลการชำระเงิน และสร้างมูลค่าให้กับร้านค้า นอกจากนี้ยังสามารถเพิ่มการเข้าถึงทั่วโลก เนื่องจาก Bitcoin ไม่มีพรมแดนและดำเนินการตลอด 24/7
reviewed: true
question: Ni kuki ubucuruzi bwoshobora guhitamwo kwemera amahera y’abakiriya ba Bitcoin?
answer: Kugira ngo ukoreshe abakoresha benshi, ushobora kugabanya amafaranga y’ugucuruza, kandi ufise umutungo w’agaciro mu bubiko bwawo.
wrong_answers:
  - Kugira ngo abakiriya bose bazotanga amahera menshi kuruta igiciro canditswe.
  - Kugira ngo ntihagire imisoro canke ibisabwa n’amategeko bizokwigera bikoreshwa.
  - Kugira ngo igikorwa co gusohora amahera kigende buhoro kandi kigoye.
explanation: |
  Kwemera Bitcoin birashobora gukwegera abantu benshi bagura, bikagabanya amafaranga yo gukora ivyo kwishura, no kwubaka ububiko bw’agaciro. Ishobora kandi kwongera gushikira abantu kw’isi yose, kuko Bitcoin ata mipaka ifise kandi ikora amasaha yose.
reviewed: false
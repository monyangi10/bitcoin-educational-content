question: 비즈니스가 고객으로부터 Bitcoin 결제를 수락하는 이유는 무엇인가요?
answer: 증가하는 사용자 기반을 활용하고, 잠재적으로 거래 수수료를 낮추며, 귀중한 자산을 보유할 수 있습니다.
wrong_answers:
  - 모든 고객이 정가보다 더 많은 금액을 지불하도록 보장합니다.
  - 세금이나 규제 요건이 적용되지 않도록 합니다.
  - 결제 프로세스가 더 느리고 복잡해집니다.
explanation: |
  Bitcoin을 수락하면 새로운 구매자층을 유치하고 결제 처리 수수료를 절감하며 가치 있는 스토어를 구축할 수 있습니다. 또한 Bitcoin은 국경이 없고 연중무휴 24시간 운영되므로 글로벌 도달 범위를 넓힐 수 있습니다.
reviewed: true
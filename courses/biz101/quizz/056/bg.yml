question: По какво се различава функционалността на wallet без право на задържане за потребителите на Starter?
answer: Тя дава на собственика на фирмата пълен контрол върху частните ключове
wrong_answers:
  - Той може автоматично да конвертира биткойни във фиатна валута
  - Не изисква процедури за архивиране или мерки за сигурност
  - Управлява всички транзакции чрез услуга на трета страна
explanation: |
  Портфейлите, в които не се съхраняват лични ключове, предоставят контрола върху частните ключове и транзакциите изцяло в ръцете на потребителя.
reviewed: true
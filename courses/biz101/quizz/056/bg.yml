question: По какво се различава функционалността на самостоятелен (self-custody) портфейл?
answer: дава на собственика на фирмата пълен контрол върху частните ключове
wrong_answers:
  - Той може автоматично да конвертира биткойни във фиатна валута
  - Не изисква процедури за архивиране или мерки за сигурност
  - Управлява всички транзакции чрез услуга на трета страна
explanation: |
  Портфейлите, които се управляват чрез частен ключ, предоставят контрола върху биткойн и транзакциите изцяло в ръцете на потребителя.
reviewed: true

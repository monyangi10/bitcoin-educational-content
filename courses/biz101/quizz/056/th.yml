question: ฟังก์ชันการทำงานของ wallet ที่ไม่ใช่การดูแลแตกต่างกันอย่างไรสำหรับผู้ใช้เริ่มต้น?
answer: มันทำให้เจ้าของธุรกิจมีการควบคุมคีย์ส่วนตัวอย่างเต็มที่
wrong_answers:
  - มันสามารถแปลงบิทคอยน์เป็นสกุลเงินเฟียตได้โดยอัตโนมัติ
  - ไม่จำเป็นต้องมีขั้นตอนการสำรองข้อมูลหรือมาตรการรักษาความปลอดภัย
  - มันจัดการธุรกรรมทั้งหมดผ่านบริการของบุคคลที่สาม
explanation: |
  กระเป๋าเงินที่ไม่ใช่การคุมขังทำให้การควบคุมคีย์ส่วนตัวและการทำธุรกรรมอยู่ในมือของผู้ใช้ทั้งหมด
reviewed: true
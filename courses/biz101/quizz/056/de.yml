question: Wie unterscheidet sich eine Non-Custodial-Wallet in ihrer Funktionalität für Anfänger?
answer: Der Geschäftsinhaber hat die volle Kontrolle über die privaten Schlüssel
wrong_answers:
  - Sie kann Bitcoins automatisch in Fiat-Währung umwandeln
  - Sie erfordert keine Backup-Verfahren oder Sicherheitsmaßnahmen
  - Sie verwaltet alle Transaktionen über einen Drittanbieterdienst
explanation: |
  Bei Non-Custodial-Wallets liegt die Kontrolle über private Schlüssel und Transaktionen vollständig in den Händen des Nutzers.
reviewed: true

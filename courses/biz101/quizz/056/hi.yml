question: एक नॉन-कस्टोडियल Wallet स्टार्टर यूजर्स के लिए फंक्शनैलिटी में कैसे अलग होता है?
answer: यह बिज़नेस मालिक को प्राइवेट कीज़ का पूरा कंट्रोल देता है
wrong_answers:
  - यह अपने आप बिटकॉइन को फिएट करेंसी में बदल देता है
  - इसे किसी बैकअप प्रक्रिया या सुरक्षा उपायों की जरूरत नहीं है।
  - यह सारे लेन-देन को एक तीसरे पक्ष की सेवा के जरिए संभालता है
explanation: |
  नॉन-कस्टोडियल वॉलेट्स में प्राइवेट कीज़ और ट्रांजैक्शन का पूरा कंट्रोल यूज़र के हाथ में होता है।

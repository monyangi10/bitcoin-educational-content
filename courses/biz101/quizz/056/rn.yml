question: Ni gute Wallet idafise ububiko itandukanye mu mikorere ku bakoresha Starter?
answer: Biha nyen'ubucuruzi ububasha bwose ku mfunguruzo z'ibanga .
wrong_answers:
  - Ishobora guhindura bitcoins mu mafaranga ya fiat
  - Nta buryo bwo gusubiza inyuma canke ingingo z'umutekano bisaba .
  - Icungera amafaranga yose akoreshwa biciye ku yindi nsiguro
explanation: |
  Amasakoshi atagira ububiko ashira ububasha bwo kugenzura imfunguruzo z’ibanga n’ibikorwa vyose mu minwe y’uwubikoresha.

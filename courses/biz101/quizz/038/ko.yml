question: 회사 회계에서 Bitcoin을 처리할 때 신중한 기록 보관이 필수적인 이유는 무엇인가요?
answer: 모든 Bitcoin 거래는 과세 대상 이벤트를 발생시킬 수 있으며, 이익, 손실 및 세금 부채를 계산하려면 정확한 기록이 필요합니다.
wrong_answers:
  - Blockchain가 회사를 대신하여 자동으로 세금을 신고하기 때문입니다.
  - Bitcoin 거래에는 회계 기준이 전혀 적용되지 않기 때문입니다.
  - 일단 기록된 Bitcoin 트랜잭션은 추적이 불가능하기 때문입니다.
explanation: |
  Bitcoin에서 이루어진 각 구매, 판매 또는 결제는 세금에 영향을 미칠 수 있습니다. 비용 기준, 판매 가격, 시기를 자세히 기록해두면 정확하고 규정을 준수하는 세금 신고를 할 수 있습니다.
reviewed: true
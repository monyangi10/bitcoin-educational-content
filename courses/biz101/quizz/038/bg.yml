question: Защо внимателното водене на документацията е от съществено значение, когато става въпрос за Bitcoin в счетоводството на дадена компания?
answer: Тъй като всяка транзакция по Bitcoin може да доведе до данъчно събитие, са необходими точни записи за изчисляване на печалбите, загубите и данъчните задължения.
wrong_answers:
  - Защото блокчейнът автоматично подава данъчни декларации от името на компанията.
  - Защото за сделките с биткойн изобщо не се прилагат счетоводни стандарти.
  - Защото е невъзможно да се проследят трансакциите Bitcoin, след като бъдат записани.
explanation: |
  Всяка покупка, продажба или плащане, извършено в Bitcoin, може да има данъчни последици. Воденето на подробни записи за себестойността, продажната цена и сроковете гарантира правилно и съобразено с изискванията данъчно отчитане.
reviewed: true

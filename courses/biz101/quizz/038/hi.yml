question: कंपनी के अकाउंटिंग में Bitcoin के साथ काम करते समय सावधानीपूर्वक रिकॉर्ड रखना क्यों जरूरी है?
answer: क्योंकि हर Bitcoin लेन-देन से टैक्स योग्य घटना हो सकती है, और मुनाफ़ा, नुकसान और टैक्स दायित्वों की गणना के लिए सटीक रिकॉर्ड्स की ज़रूरत होती है।
wrong_answers:
  - क्योंकि Blockchain अपने आप कंपनी की तरफ से टैक्स फाइल कर देता है।
  - क्योंकि Bitcoin लेनदेन पर कोई भी लेखा मानक लागू नहीं होता है।
  - क्योंकि Bitcoin लेनदेन को एक बार रिकॉर्ड करने के बाद उसका पता लगाना नामुमकिन हो जाता है।
explanation: |
  Bitcoin में की गई हर खरीद, बिक्री या भुगतान पर टैक्स का असर हो सकता है। खर्च का आधार (cost basis), बिक्री मूल्य और समय की विस्तृत रिकॉर्डिंग रखने से सही और कानून के अनुसार टैक्स रिपोर्टिंग सुनिश्चित होती है।
reviewed: false
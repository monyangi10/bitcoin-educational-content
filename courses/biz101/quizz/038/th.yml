question: ทำไมการเก็บบันทึกอย่างรอบคอบจึงมีความสำคัญเมื่อจัดการกับ Bitcoin ในการบัญชีของบริษัท?
answer: เนื่องจากทุกธุรกรรม Bitcoin อาจสร้างเหตุการณ์ที่ต้องเสียภาษี และจำเป็นต้องมีบันทึกที่ถูกต้องเพื่อคำนวณกำไร ขาดทุน และภาระภาษี
wrong_answers:
  - เนื่องจากบล็อกเชนทำการยื่นภาษีโดยอัตโนมัติในนามของบริษัท
  - เนื่องจากไม่มีมาตรฐานการบัญชีใดที่ใช้กับธุรกรรม Bitcoin เลย
  - เพราะเป็นไปไม่ได้ที่จะติดตามธุรกรรม Bitcoin เมื่อบันทึกแล้ว
explanation: |
  การซื้อ ขาย หรือการชำระเงินแต่ละครั้งใน Bitcoin อาจมีผลกระทบทางภาษี การเก็บบันทึกรายละเอียดของฐานต้นทุน ราคาขาย และเวลาที่ทำธุรกรรมจะช่วยให้การรายงานภาษีถูกต้องและเป็นไปตามข้อกำหนด
reviewed: true
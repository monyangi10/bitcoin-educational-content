question: Ni kubera iki ari ngombwa kubika neza amakuru igihe umuntu ariko arakorana na Bitcoin mu vy’ubuhinga bwo guharura amafaranga y’ishirahamwe?
answer: Kubera ko igikorwa cose co gucuruza Bitcoin gishobora gutuma haba ikintu gishobora gukorwako umusoro, kandi hakenewe amakuru atagiramwo uburyarya kugira ngo umuntu abaze inyungu, ibihombo be n’ivyo umuntu akwiye gutanga umusoro.
wrong_answers:
  - Kubera ko iyo Blockchain ihita itanga imisoro mw’izina ry’iyo sosiyete.
  - Kuko nta ngingo ngenderwako z’ivy’ubuhinga bw’ibarabara zikoreshwa ku bikorwa vya Bitcoin na gato.
  - Kuko ntibishoboka gukurikirana amafaranga ya Bitcoin iyo amaze kwandikwa.
explanation: |
  Igihe cose umuntu agura, agurisha canke yishuye muri Bitcoin, vyoshobora kugira ingaruka ku misoro. Kubika amakuru y’ido n’ido yerekeye igiciro, igiciro c’ugurisha, n’igihe bituma habaho raporo y’imisoro ibereye kandi yubahiriza amategeko.
reviewed: true

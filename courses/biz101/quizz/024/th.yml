question: เมื่อซื้อ Bitcoin วิธีหนึ่งที่แนะนำในการจัดการกับความผันผวนของราคาคืออะไร?
answer: ค่อยๆ สะสม Bitcoin เป็นระยะๆ และรักษามุมมองระยะยาว
wrong_answers:
  - พยายามทำนายจุดสูงสุดของตลาดในระยะสั้นและขายทันที
  - ทุ่มสุดตัวด้วยเงินทุนทั้งหมดของบริษัทในครั้งเดียว
  - ซื้อ Bitcoin เฉพาะในวันที่ราคาของมันพุ่งสูงขึ้นเท่านั้น
explanation: |
  การซื้ออย่างสม่ำเสมอในช่วงเวลาหนึ่ง (การเฉลี่ยต้นทุนเป็นดอลลาร์) ช่วยลดความผันผวน มุมมองระยะยาว (เช่น 4 ปี) ช่วยลดผลกระทบจากการแกว่งของราคาระยะสั้น
reviewed: true
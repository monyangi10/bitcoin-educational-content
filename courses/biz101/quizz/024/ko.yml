question: Bitcoin을 구매할 때 가격 변동성을 처리하기 위해 권장되는 한 가지 접근 방식은 무엇인가요?
answer: 일정한 간격으로 Bitcoin을 점진적으로 축적하고 장기적인 관점을 유지하세요.
wrong_answers:
  - 단기 시장 정점을 예측하고 즉시 매도하세요.
  - 회사 전체 자금을 한 번에 관리하세요.
  - Bitcoin는 가격이 급등한 날에만 구매하세요.
explanation: |
  시간이 지남에 따라 정기적으로 매수(달러 비용 평균화)하면 변동성을 완화하는 데 도움이 됩니다. 장기적인 기간(예: 4년)은 단기적인 가격 변동에 따른 영향을 줄여줍니다.
reviewed: true
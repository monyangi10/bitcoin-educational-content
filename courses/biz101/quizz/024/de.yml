question: Welcher Ansatz wird beim Kauf von Bitcoin empfohlen, um mit der Preisvolatilität umzugehen?
answer: Kaufe schrittweise und in regelmäßigen Abständen Bitcoin und behalte eine langfristige Perspektive bei.
wrong_answers:
  - Versuche, kurzfristige Marktspitzen vorherzusehen und sofort zu verkaufen.
  - Nimm das gesamte Vermögen des Unternehmens auf einmal in die Hand.
  - Kaufe Bitcoin nur an Tagen, an denen der Preis stark gestiegen ist.
explanation: |
  Regelmäßige Käufe im Laufe der Zeit (Dollar-Cost-Averaging) tragen zur Glättung der Volatilität bei. Ein längerfristiger Zeithorizont (z. B. 4 Jahre) verringert die Auswirkungen kurzfristiger Kursschwankungen.
reviewed: true

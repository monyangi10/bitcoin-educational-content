question: Wakati wa kununua Bitcoin, ni mbinu gani iliyopendekezwa ya kushughulikia tete ya bei yake?
answer: Hatua kwa hatua kusanya Bitcoin kwa vipindi vya kawaida na kudumisha mtazamo wa muda mrefu.
wrong_answers:
  - Jaribu kutabiri kilele cha soko cha muda mfupi na uuze mara moja.
  - Ingia ndani kabisa na hazina nzima ya kampuni mara moja.
  - Nunua tu Bitcoin siku ambazo bei yake imepanda sana.
explanation: |
  Ununuzi wa mara kwa mara baada ya muda (wastani wa gharama ya dola) “(Dollar-Cost Averaging)” husaidia kukabiliana na tete. Upeo wa muda mrefu (k.m., miaka 4) hupunguza athari za mabadiliko ya bei ya muda mfupi.
reviewed: true

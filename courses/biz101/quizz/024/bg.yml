question: Какъв е препоръчителният подход за справяне с волатилността на цената на Bitcoin при покупка?
answer: Постепенно натрупвайте Bitcoin на редовни интервали и поддържайте дългосрочна перспектива.
wrong_answers:
  - Опитайте се да предвидите краткосрочните върхове на пазара и продавайте незабавно.
  - Включете цялата каса на компанията наведнъж.
  - Купувайте Bitcoin само в дни, когато цената му се е повишила рязко.
explanation: |
  Редовните покупки с течение на времето (осредняване на разходите в долари или DCA) помагат за изглаждане на волатилността. По-дългосрочният хоризонт (напр. 4 години) намалява въздействието на краткосрочните колебания на цените.
reviewed: true

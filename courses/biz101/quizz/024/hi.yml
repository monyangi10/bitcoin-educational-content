question: Bitcoin खरीदते समय, इसकी कीमत में उतार-चढ़ाव को संभालने के लिए एक सुझाया गया तरीका क्या है?
answer: धीरे-धीरे नियमित अंतराल पर Bitcoin जमा करते रहें और लंबे समय तक का नजरिया बनाए रखें।
wrong_answers:
  - "छोटे समय के लिए मार्केट के चरम स्तर का अनुमान लगाने की कोशिश करो और तुरंत बेच दो।"
  - कंपनी का पूरा खजाना एक ही बार में झोंक दो।
  - केवल उन दिनों Bitcoin खरीदें जब इसकी कीमत तेज़ी से बढ़ गई हो।
explanation: |
  समय के साथ नियमित खरीदारी (डॉलर-कॉस्ट एवरेजिंग) उतार-चढ़ाव को कम करने में मदद करती है। लंबी अवधि (जैसे, 4 साल) का नजरिया अल्पकालिक कीमतों में उछाल के प्रभाव को कम करता है।
reviewed: false
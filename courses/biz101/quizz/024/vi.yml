question: Khi mua Bitcoin, cách tiếp cận được khuyến nghị để xử lý sự biến động giá của nó là gì?
answer: Tích lũy Bitcoin dần dần theo các khoảng thời gian đều đặn và duy trì quan điểm dài hạn.
wrong_answers:
  - Cố gắng dự đoán đỉnh thị trường ngắn hạn và bán ngay lập tức.
  - Đầu tư toàn bộ ngân quỹ của công ty cùng một lúc.
  - Chỉ mua Bitcoin vào những ngày giá của nó tăng mạnh.
explanation: |
  Việc mua thường xuyên theo thời gian (trung bình chi phí đô la) giúp làm giảm biến động. Khung thời gian dài hơn (ví dụ: 4 năm) giúp giảm thiểu tác động của biến động giá ngắn hạn.
reviewed: true
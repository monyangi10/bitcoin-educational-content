question: Khi mua Bitcoin, cách tiếp cận nào được khuyến nghị để xử lý giảm thiểu biến động giá?
answer: Mua lũy kế Bitcoin dần theo các khoảng thời gian và duy trì đều đặn trong dài hạn.
wrong_answers:
  - Cố gắng dự đoán đỉnh của thị trường trong ngắn hạn để bán ngay lập tức.
  - Đầu tư toàn bộ ngân quỹ của công ty cùng một lúc.
  - Chỉ mua Bitcoin vào những ngày giá của nó tăng mạnh.
explanation: |
  Việc mua thường xuyên và đều đặn theo thời gian (chi phí thu mua trung bình) giúp làm giảm biến động. Khung thời gian dài hơn (ví dụ: 4 năm) giúp giảm thiểu tác động của biến động giá ngắn hạn.
reviewed: true
question: Какви инструменти са необходими, за да може служителите да обработват плащания чрез ПОС терминали?
answer: Създаване на меню с цени на артикулите в PoS приложението
wrong_answers:
  - Ръчна счетоводна книга за записване на продажбите
  - Система за издаване на фактури на хартиен носител за всяка операция
  - Система за автоматично отчитане на транзакциите от PoS
explanation: |
  PoS приложението дава възможност на служителите да избират продукти от предварително зададено меню, което оптимизира процеса на фактуриране.
reviewed: true

question: Какво използва профилът Essential, за да помага на служителите да обработват плащания на ПОС?
answer: Създаване на меню с цени на артикулите в приложението PoS
wrong_answers:
  - Ръчна счетоводна книга за записване на продажбите
  - Система за издаване на фактури на хартиен носител за всяка операция
  - Система за автоматично отчитане на транзакциите от PoS
explanation: |
  Приложението PoS в профила Essential дава възможност на служителите да избират продукти от предварително зададено меню, което оптимизира процеса на фактуриране.
reviewed: true
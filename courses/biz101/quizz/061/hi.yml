question: एसेंशियल प्रोफाइल पॉइंट ऑफ सेल (PoS) पर कर्मचारियों को भुगतान प्रोसेस करने में मदद के लिए क्या इस्तेमाल करता है?
answer: पीओएस ऐप पर आइटम की कीमतों के साथ एक मेनू बनाना
wrong_answers:
  - एक मैनुअल जीडब्ल्यू-0 बुक जो सेल्स रिकॉर्ड करने के लिए है
  - हर लेन-देन के लिए एक कागज़ी Invoice सिस्टम
  - पॉइंट ऑफ सेल (PoS) से लेन-देन के लिए एक स्वचालित लेखा रिकॉर्ड सिस्टम
explanation: |
  एसेंशियल प्रोफाइल में पीओएस ऐप कर्मचारियों को पहले से सेट मेनू से आइटम चुनने की सुविधा देता है, जिससे बिलिंग प्रक्रिया आसान हो जाती है।
reviewed: false
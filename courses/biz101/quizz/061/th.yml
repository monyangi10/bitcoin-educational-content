question: โปรไฟล์ Essential ใช้อะไรเพื่อช่วยให้พนักงานดำเนินการชำระเงินที่ PoS?
answer: การสร้างเมนูพร้อมราคาสินค้าในแอป PoS
wrong_answers:
  - สมุดบัญชีแบบแมนนวลสำหรับบันทึกการขาย
  - ระบบใบแจ้งหนี้กระดาษสำหรับแต่ละธุรกรรม
  - ระบบบันทึกบัญชีอัตโนมัติสำหรับธุรกรรมจาก PoS
explanation: |
  แอป PoS ในโปรไฟล์ Essential ช่วยให้พนักงานสามารถเลือกสินค้าจากเมนูที่ตั้งค่าไว้ล่วงหน้า ทำให้กระบวนการเรียกเก็บเงินเป็นไปอย่างราบรื่น
reviewed: true
question: หน้าที่หลักของระบบการชำระเงินแบบดั้งเดิมคืออะไร?
answer: เพื่อเปิดใช้งานการโอนเงินระหว่างสองฝ่าย
wrong_answers:
  - เพื่อสร้างสกุลเงินเดียวทั่วโลกที่ถูกควบคุมโดยหน่วยงานกลาง
  - เพื่ออำนวยความสะดวกในการค้าระหว่างประเทศ
  - จำกัดการโอนเงินให้เป็นการแลกเปลี่ยนเงินสดด้วยตนเองเท่านั้น
explanation: |
  ระบบการชำระเงินแบบดั้งเดิมให้กลไกและโครงสร้างพื้นฐานสำหรับการโอนเงินระหว่างผู้ชำระเงินและผู้รับเงินทั้งในบริบทท้องถิ่นและระหว่างประเทศ
reviewed: true
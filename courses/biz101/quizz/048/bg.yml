question: Каква е основната функция на традиционните платежни системи?
answer: да  даде възможност за прехвърляне на средства между две страни
wrong_answers:
  - Създаване на единна глобална валута, регулирана от централен орган
  - Улесняване на международната търговия
  - Ограничаване на прехвърлянето на средства само до личен обмен на пари в брой
explanation: |
  Традиционните платежни системи осигуряват механизми и инфраструктура за прехвърляне на средства между платци и получатели както в местен, така и в международен контекст.
reviewed: true

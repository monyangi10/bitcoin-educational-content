question: पारंपरिक भुगतान प्रणालियों का मुख्य काम क्या है?
answer: दो पक्षों के बीच धन हस्तांतरण को सक्षम करने के लिए
wrong_answers:
  - एकल वैश्विक मुद्रा बनाना जिसे केंद्रीय प्राधिकरण द्वारा नियंत्रित किया जाए
  - अंतरराष्ट्रीय व्यापार को आसान बनाने के लिए
  - फंड ट्रांसफर को सिर्फ आमने-सामने नकद लेन-देन तक सीमित करना
explanation: |
  पारंपरिक भुगतान प्रणालियाँ स्थानीय और अंतरराष्ट्रीय स्तर पर भुगतानकर्ताओं और प्राप्तकर्ताओं के बीच धन हस्तांतरण के लिए तंत्र और बुनियादी ढांचा प्रदान करती हैं।
reviewed: false
question: Ni uwuhe muti uwundi uvugwa ku bucuruzi bukunda gukoresha ubuhinga bwo kugurisha ibintu vyose kuri Internet?
answer: Kuba-BOP
wrong_answers:
  - Fenikisi
  - Gufungura urudodo
  - Ubusuwisi Bitcoin kwishura
explanation: |
  Be-BOP ni nk’uburyo bwo guhitamwo ku bipfuza iduka ry’ubuhinga bwa none ry’ubuhinga bwa none ryorohereza abantu kwishura Bitcoin.
reviewed: false
question: Ni uwuhe muti uwundi uvugwa ku nganda zikunda gukoresha ubuhinga bwo kugurisha ibintu vyose kuri Internet?
answer: Kuba-BOP
wrong_answers:
 - Phoenix
 - Open Node
 - Swiss Bitcoin Pay
explanation: |
  Be-BOP ni nk’uburyo bwo guhitamwo ku bipfuza iduka ry’ubuhinga bwa none r ryorohereza abantu kwishura Bitcoin.
reviewed: true

question: Welke alternatieve oplossing wordt genoemd voor bedrijven die de voorkeur geven aan een alles-in-één online retailomgeving?
answer: Be-BOP
wrong_answers:
  - Phoenix
  - Open knooppunt
  - Zwitsers Bitcoin loon
explanation: |
  Be-BOP is een optie voor diegenen die een geïntegreerde online webwinkel willen die Bitcoin betalingen faciliteert.
reviewed: false
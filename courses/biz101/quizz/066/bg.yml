question: Кое алтернативно решение е споменато за предприятия, които предпочитат цялостна онлайн среда за търговия на дребно?
answer: Be-BOP
wrong_answers:
  - Phoenix
  - Отворен възел
  - Швейцарска заплата Bitcoin
explanation: |
  Be-BOP е вариант за тези, които желаят интегриран онлайн електронен магазин, който улеснява плащанията с Bitcoin.
reviewed: true
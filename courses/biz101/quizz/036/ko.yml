question: Lightning Network은 온라인 커머스 및 디지털 서비스의 미래를 어떻게 만들어가고 있나요?
answer: 마찰 없는 즉각적인 무허가 소액 결제를 지원함으로써 새로운 비즈니스 모델과 수익원을 창출할 수 있습니다.
wrong_answers:
  - 온라인에서 새로운 비즈니스 모델이 출현하는 것을 방지합니다.
  - 판매자가 이전과 같이 느리고 비용이 많이 드는 결제 레일을 사용하도록 요구합니다.
  - 높은 수수료로 인해 디지털 상품을 판매할 수 없게 만들 수 있습니다.
explanation: |
  적은 양의 가치를 저렴한 비용으로 즉시 전송할 수 있는 Lightning의 기능은 종량제 콘텐츠, 스트리밍 결제, 기계 간 거래와 같은 분야에서 혁신을 촉진하여 온라인 서비스의 수익 창출 방식을 변화시킬 수 있습니다.
reviewed: true
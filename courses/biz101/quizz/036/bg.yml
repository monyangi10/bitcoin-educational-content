question: По какъв начин Lightning Network допринася за формирането на бъдещето на онлайн търговията и цифровите услуги?
answer: Като дава възможност за мигновени микротранзакции без разрешение, открива нови бизнес модели и потоци от приходи.
wrong_answers:
  - Като предотвратява появата на нови бизнес модели онлайн.
  - Като изисква от търговците да използват същите бавни и скъпи платежни релси, както преди.
  - Като направи невъзможна продажбата на цифрови стоки поради високите такси.
explanation: |
  Способността на Светкавичната мрежа да се изпращат малки суми незабавно и на ниска цена насърчава иновациите в области като платено съдържание, стрийминг плащания и транзакции между машини, като потенциално променя начина на монетизиране на онлайн услугите.
reviewed: true

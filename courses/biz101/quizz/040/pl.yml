question: Dlaczego firma może zdecydować się na utrzymywanie Bitcoin jako inwestycji długoterminowej w swoim bilansie?
answer: Ponieważ może służyć jako magazyn wartości, potencjalnie zyskując na wartości w czasie i zapewniając zabezpieczenie przed inflacją.
wrong_answers:
  - Ponieważ zapewnia natychmiastową eliminację wszystkich podatków związanych z walutą.
  - Ponieważ wymagają tego międzynarodowe standardy rachunkowości.
  - Ponieważ Bitcoin z natury zapewnia gwarantowane zyski bez ryzyka.
explanation: |
  Niektóre firmy postrzegają Bitcoin jako strategiczne aktywo długoterminowe, które może zachować lub zyskać na wartości, chroniąc przed deprecjacją tradycyjnych walut i dywersyfikując swój skarbiec.
reviewed: false
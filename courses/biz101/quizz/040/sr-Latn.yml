question: Zašto bi preduzeće moglo odlučiti da drži Bitcoin kao dugoročnu investiciju na svom bilansu stanja?
answer: Jer može služiti kao čuvar vrednosti, potencijalno povećavajući vrednost tokom vremena i pružajući zaštitu od inflacije.
wrong_answers:
  - Jer osigurava trenutno ukidanje svih poreza povezanih s valutom.
  - Zato što je to zahtevano međunarodnim računovodstvenim standardima.
  - Jer Bitcoin inherentno obezbeđuje zagarantovane profite bez rizika.
explanation: |
  Neke kompanije vide Bitcoin kao strateški dugoročni aset koji može očuvati ili povećati vrednost, štiteći od devalvacije tradicionalnih valuta i diversifikujući njihov trezor.
reviewed: false
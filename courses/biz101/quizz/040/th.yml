question: ทำไมธุรกิจอาจเลือกถือ Bitcoin เป็นการลงทุนระยะยาวในงบดุล?
answer: เนื่องจากอาจทำหน้าที่เป็นแหล่งเก็บมูลค่า โดยมีโอกาสเพิ่มมูลค่าเมื่อเวลาผ่านไปและเป็นการป้องกันความเสี่ยงจากเงินเฟ้อ
wrong_answers:
  - เพราะมันรับประกันการกำจัดภาษีที่เกี่ยวข้องกับสกุลเงินทั้งหมดในทันที
  - เพราะเป็นข้อกำหนดตามมาตรฐานการบัญชีระหว่างประเทศ
  - เพราะว่า Bitcoin โดยธรรมชาติแล้วให้ผลกำไรที่รับประกันโดยไม่มีความเสี่ยง
explanation: |
  บริษัทบางแห่งมองว่า Bitcoin เป็นสินทรัพย์เชิงกลยุทธ์ระยะยาวที่สามารถรักษาหรือเพิ่มมูลค่าได้ ซึ่งช่วยป้องกันการลดค่าเงินของสกุลเงินดั้งเดิมและกระจายความเสี่ยงในคลังของพวกเขา
reviewed: true
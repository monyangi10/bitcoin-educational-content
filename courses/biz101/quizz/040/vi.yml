question: Tại sao một doanh nghiệp lại chọn giữ Bitcoin làm khoản đầu tư dài hạn trên bảng cân đối kế toán của mình?
answer: Bởi vì nó có thể đóng vai trò là nơi lưu trữ giá trị, có khả năng tăng giá theo thời gian và là biện pháp phòng ngừa lạm phát.
wrong_answers:
  - Bởi vì nó đảm bảo việc loại bỏ ngay lập tức mọi loại thuế liên quan đến tiền tệ.
  - Bởi vì nó được yêu cầu theo chuẩn mực kế toán quốc tế.
  - Bởi vì Bitcoin vốn dĩ mang lại lợi nhuận được đảm bảo mà không có rủi ro.
explanation: |
  Một số công ty coi Bitcoin là tài sản chiến lược dài hạn có thể bảo toàn hoặc tăng giá trị, do đó bảo vệ chống lại sự mất giá của các loại tiền tệ truyền thống và đa dạng hóa kho bạc của họ.
reviewed: true
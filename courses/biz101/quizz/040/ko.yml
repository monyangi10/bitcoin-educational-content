question: 기업이 재무제표에서 Bitcoin을 장기 투자로 보유하는 이유는 무엇인가요?
answer: 시간이 지남에 따라 가치가 상승하고 인플레이션에 대한 헤지 역할을 할 수 있는 가치 저장소 역할을 할 수 있기 때문입니다.
wrong_answers:
  - 모든 통화 관련 세금을 즉시 제거할 수 있기 때문입니다.
  - 국제 회계 기준에서 요구하는 사항이기 때문입니다.
  - Bitcoin은 본질적으로 위험 없이 보장된 수익을 제공하기 때문입니다.
explanation: |
  일부 기업은 Bitcoin를 가치를 보존하거나 성장시킬 수 있는 전략적 장기 자산으로 간주하여 기존 통화의 가치 하락을 방지하고 재무를 다각화할 수 있습니다.
reviewed: true
question: Why might a business choose to hold Bitcoin as a long-term investment on its balance sheet?
answer: Because it may serve as a store of value, potentially appreciating over time and providing a hedge against inflation.
wrong_answers:
  - Because it ensures the immediate elimination of all currency-related taxes.
  - Because it’s required by international accounting standards.
  - Because Bitcoin inherently provides guaranteed profits with no risk.
explanation: |
  Some companies view Bitcoin as a strategic long-term asset that can preserve or grow in value, thereby protecting against the debasement of traditional currencies and diversifying their treasuries.
reviewed: true

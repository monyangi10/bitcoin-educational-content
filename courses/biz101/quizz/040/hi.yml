question: एक बिज़नेस Bitcoin को अपने बैलेंस शीट पर लॉन्ग-टर्म इन्वेस्टमेंट के तौर पर क्यों रखना चाहेगा?
answer: क्योंकि यह मूल्य संचय का काम कर सकता है, समय के साथ इसकी कीमत बढ़ सकती है और यह महंगाई से बचाव का ज़रिया भी हो सकता है।
wrong_answers:
  - क्योंकि इससे करेंसी से जुड़े सभी टैक्स तुरंत खत्म हो जाते हैं।
  - क्योंकि यह अंतर्राष्ट्रीय लेखा मानकों द्वारा आवश्यक है।
  - क्योंकि Bitcoin में खुद ही बिना किसी जोखिम के गारंटीड मुनाफा मिलता है।
explanation: |
  कुछ कंपनियां Bitcoin को एक स्ट्रैटेजिक लॉन्ग-टर्म एसेट के रूप में देखती हैं जिसकी वैल्यू प्रिज़र्व या ग्रो हो सकती है, जो ट्रेडिशनल करेंसीज़ के डिवैल्यूएशन से बचाती है और उनके ट्रेजरी को डायवर्सिफाई करती है।
reviewed: false
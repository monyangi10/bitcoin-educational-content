question: Защо едно предприятие може да избере да държи Bitcoin като дългосрочна инвестиция в баланса си?
answer: Тъй като може да служи за съхранение на стойност, като потенциално може да поскъпне с течение на времето и да осигури предпазване от инфлация.
wrong_answers:
  - Защото гарантира незабавното премахване на всички данъци, свързани с валутата.
  - Защото това се изисква от международните счетоводни стандарти.
  - Защото Bitcoin по своята същност осигурява гарантирани печалби без риск.
explanation: |
  Някои компании гледат на Bitcoin като на стратегически дългосрочен актив, който може да запази или увеличи стойността си, като по този начин се предпазват от обезценяването на традиционните валути и диверсифицират своите резерви.
reviewed: true

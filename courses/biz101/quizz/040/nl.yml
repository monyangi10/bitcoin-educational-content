question: Waarom zou een bedrijf ervoor kiezen om Bitcoin als langetermijninvestering op de balans te houden?
answer: Omdat het kan dienen als een opslagplaats van waarde, die in de loop der tijd kan stijgen en een bescherming kan bieden tegen inflatie.
wrong_answers:
  - Omdat het zorgt voor onmiddellijke afschaffing van alle valutagerelateerde belastingen.
  - Omdat het verplicht is volgens de internationale boekhoudstandaarden.
  - Omdat Bitcoin inherent gegarandeerde winst biedt zonder risico.
explanation: |
  Sommige bedrijven zien Bitcoin als een strategisch langetermijnactief dat zijn waarde kan behouden of groeien, bescherming biedt tegen de devaluatie van traditionele valuta en hun kasmiddelen diversifieert.
reviewed: false
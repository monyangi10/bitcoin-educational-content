question: Wat is de belangrijkste functie van valuta?
answer: Optreden als tussenpersoon die de Exchange van waarde vereenvoudigt
wrong_answers:
  - Om intrinsieke waarde op te slaan in fysieke vorm
  - Om ruilhandel volledig te vervangen door directe goederen-voor-goederen Exchange
  - Alle economische transacties centraliseren via één enkele autoriteit
explanation: |
  Valuta vereenvoudigt de handel door te dienen als een gemeenschappelijk medium dat het complexe web van Exchange koersen vermindert dat nodig is in een ruilhandelsysteem, waardoor transacties eenvoudiger worden.
reviewed: false
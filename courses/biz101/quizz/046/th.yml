question: หน้าที่หลักของสกุลเงินคืออะไร?
answer: ทำหน้าที่เป็นตัวกลางที่ทำให้การแลกเปลี่ยนมูลค่าง่ายขึ้น
wrong_answers:
  - เก็บรักษามูลค่าที่แท้จริงในรูปแบบทางกายภาพ
  - แทนที่การแลกเปลี่ยนด้วยการแลกเปลี่ยนสินค้าต่อสินค้าโดยตรง
  - เพื่อรวมศูนย์ธุรกรรมทางเศรษฐกิจทั้งหมดผ่านหน่วยงานเดียว
explanation: |
  สกุลเงินช่วยให้การค้าเป็นเรื่องง่ายขึ้นโดยทำหน้าที่เป็นสื่อกลางที่ลดความซับซ้อนของอัตราแลกเปลี่ยนที่จำเป็นในระบบแลกเปลี่ยนสินค้า ซึ่งทำให้การทำธุรกรรมง่ายขึ้น
reviewed: true
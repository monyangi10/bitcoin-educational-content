question: Chức năng chính của tiền tệ là gì?
answer: Hoạt động như một trung gian giúp đơn giản hóa việc trao đổi giá trị
wrong_answers:
  - Để lưu trữ giá trị nội tại dưới dạng vật lý
  - Thay thế hoàn toàn hình thức trao đổi hàng hóa bằng hình thức trao đổi trực tiếp hàng hóa đổi hàng hóa
  - Tập trung tất cả các giao dịch kinh tế thông qua một cơ quan duy nhất
explanation: |
  Tiền tệ giúp đơn giản hóa thương mại bằng cách đóng vai trò là phương tiện chung giúp giảm bớt mạng lưới tỷ giá hối đoái phức tạp cần thiết trong hệ thống trao đổi hàng hóa, do đó tạo điều kiện cho các giao dịch dễ dàng hơn.
reviewed: true
question: मुद्रा (करेंसी) का मुख्य काम क्या है?
answer: एक बिचौलिया बनकर काम करना जो मूल्य के Exchange को सरल बनाता है
wrong_answers:
  - भौतिक रूप में आंतरिक मूल्य को संग्रहित करने के लिए
  - बार्टर को पूरी तरह से सीधे सामान-के-बदले-सामान Exchange से बदलने के लिए
  - एक ही अधिकारी के ज़रिए सभी आर्थिक लेन-देन को केंद्रीकृत करना
explanation: |
  मुद्रा व्यापार को आसान बनाती है क्योंकि यह एक सामान्य माध्यम के रूप में काम करती है जो बार्टर प्रणाली में जटिल Exchange दरों के जाल को कम कर देती है, जिससे लेन-देन आसान हो जाता है।

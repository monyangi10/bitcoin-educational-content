question: Каква е основната функция на валутата?
answer: Да действа като посредник, който опростява обмена на стойност
wrong_answers:
  - Съхраняване на вътрешна стойност във физическа форма
  - Пълна замяна на бартера с пряк обмен на стоки срещу стоки
  - Централизиране на всички икономически транзакции чрез единен орган
explanation: |
  Валутата опростява търговията, тъй като служи като общо средство, което намалява сложната мрежа от обменни курсове, необходима при бартерната система, и по този начин улеснява транзакциите.
reviewed: true
question: 화폐의 주요 기능은 무엇인가요?
answer: 가치의 Exchange을 단순화하는 중개자 역할 수행
wrong_answers:
  - 내재적 가치를 물리적 형태로 저장하려면
  - 물물교환을 직접 상품 대 상품으로 완전히 대체하려면 Exchange
  - 단일 기관을 통해 모든 경제 거래를 중앙 집중화하기 위해
explanation: |
  화폐는 물물교환 시스템에서 필요한 복잡한 Exchange 환율을 줄여주는 공통의 매개체 역할을 함으로써 거래를 단순화하여 보다 쉬운 거래를 촉진합니다.
reviewed: true
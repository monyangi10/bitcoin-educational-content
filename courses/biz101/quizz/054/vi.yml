question: Phần mềm Bitcoin nào sau đây không phải là giải pháp phần mềm cho kế toán?
answer: Sparrow
wrong_answers:
  - CoinTracker
  - Koinly
  - ZenLedger
explanation: |
  Sparrow (phần mềm ví Bitcoin) không phải là giải pháp phần mềm kế toán của Bitcoin, trong khi các giải pháp khác thì đúng.
reviewed: true
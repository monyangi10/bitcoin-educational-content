question: ธุรกิจประเภทใดที่มีแนวโน้มจะพบว่าไฟล์ CSV แบบง่ายเพียงพอสำหรับการบัญชี?
answer: ธุรกิจขนาดเล็ก
wrong_answers:
  - บริษัทข้ามชาติขนาดใหญ่
  - สถาบันการเงินหลัก
  - แพลตฟอร์มการซื้อขายความถี่สูง
explanation: |
  ธุรกิจขนาดเล็กส่วนใหญ่ได้รับประโยชน์จากความเรียบง่ายและรายละเอียดที่เพียงพอที่มีอยู่ในการส่งออก CSV
reviewed: true
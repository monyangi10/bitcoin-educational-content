question: За кой тип предприятие е най-вероятно да е достатъчен обикновен CSV файл за счетоводно отчитане?
answer: Малки предприятия
wrong_answers:
  - Големи мултинационални корпорации
  - Основни финансови институции
  - Платформи за високочестотна търговия
explanation: |
  Повечето малки предприятия се възползват от простотата и достатъчната подробност на експорта в CSV.
reviewed: true
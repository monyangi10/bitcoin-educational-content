question: ऐसा कौन सा व्यवसाय है जिसके लिए एक साधारण CSV फाइल अकाउंटिंग के लिए काफी हो सकती है?
answer: छोटे व्यवसाय
wrong_answers:
  - बड़ी बहुराष्ट्रीय कंपनियाँ
  - प्रमुख वित्तीय संस्थान
  - हाई-फ़्रीक्वेंसी ट्रेडिंग प्लेटफ़ॉर्म्स
explanation: |
  ज़्यादातर छोटे व्यवसायों को CSV एक्सपोर्ट की सरलता और पर्याप्त डिटेल से फायदा होता है।
reviewed: false
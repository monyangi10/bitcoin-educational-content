question: ทำไมความผันผวนถึงถูกพิจารณาว่าเป็นลักษณะธรรมชาติของ Bitcoin ในฐานะสินทรัพย์ที่เกิดขึ้นใหม่?
answer: เนื่องจาก Bitcoin ยังค่อนข้างใหม่ จึงดึงดูดนักเก็งกำไรและตอบสนองต่อข่าวสารในตลาด ทำให้เกิดความผันผวนของราคาก่อนที่จะมีเสถียรภาพในระยะยาว
wrong_answers:
  - เพราะว่ามันถูกควบคุมโดยศูนย์กลางและราคาถูกกำหนดโดยหน่วยงานเดียว
  - เนื่องจาก Bitcoin ขาดผู้ใช้ที่ถือครองในระยะยาว
  - เพราะพ่อค้าต้องตั้งราคาอย่างคาดเดาไม่ได้ทุกชั่วโมง
explanation: |
  ในฐานะสินทรัพย์ที่กำลังพัฒนา ราคาของ Bitcoin ได้รับอิทธิพลจากการเก็งกำไร ความรู้สึก และอัตราการยอมรับที่แตกต่างกันไป เมื่อเวลาผ่านไป เมื่อมีผู้ถือครองระยะยาวที่มั่นคงเข้าร่วมมากขึ้น ความผันผวนอาจลดลง อย่างไรก็ตาม มันยังคงเป็นลักษณะของการเติบโตในระยะเริ่มต้น
reviewed: true
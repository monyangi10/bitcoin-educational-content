question: Ni kuki uguhinduka kw’ibintu bifatwa nk’ikintu gisanzwe ca Bitcoin nk’umutungo uriko urakura?
answer: Kubera ko Bitcoin ikiri nto cane, ikwegera abahinga mu vy’ubudandaji kandi igasubiza amakuru y’isoko, bigatuma ibiciro bihinduka imbere y’uko bihagarara neza mu kiringo kirekire.
wrong_answers:
  - Kuko n’ubutegetsi bugenzurwa n’ubutegetsi bumwe kandi ibiciro bishirwaho n’ubutegetsi bumwe.
  - Kuko Bitcoin ibura abayikoresha bose bayifata igihe kirekire.
  - Kubera ko abacuruzi bategerezwa gushinga ibiciro ata co bazi buri saha.
explanation: |
  Nk’umutungo uriko uratera imbere, igiciro ca Bitcoin gishikirwa n’ugutekereza ku bintu, inyiyumvo, n’ibiharuro bitandukanye vy’abavyemera. Uko igihe kigenda kirarenga, uko abafise amafaranga menshi bashikamye kandi bamara igihe kirekire bagira uruhara, uguhinduka gushobora kugabanuka, ariko biguma ari ikintu kigaragaza iterambere ry’intango.

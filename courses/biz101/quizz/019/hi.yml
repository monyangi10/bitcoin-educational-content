question: वोलेटिलिटी को Bitcoin के लिए एक नेचुरल एस्पेक्ट क्यों माना जाता है, जो एक इमर्जिंग एसेट है?
answer: क्योंकि Bitcoin अभी भी अपेक्षाकृत नया है, सट्टेबाजों को आकर्षित करता है और बाजार की खबरों पर प्रतिक्रिया देता है, जिससे कीमतों में उतार-चढ़ाव होता है, लेकिन लंबे समय में यह स्थिर हो जाता है।
wrong_answers:
  - क्योंकि यह केंद्रीय रूप से नियंत्रित है और कीमतें एक ही अधिकारी द्वारा तय की जाती हैं।
  - क्योंकि Bitcoin में कोई भी यूज़र लंबे समय तक इसे होल्ड नहीं कर रहा।
  - क्योंकि दुकानदारों को हर घंटे कीमतें अप्रत्याशित तरीके से तय करनी पड़ती हैं।
explanation: |
  Bitcoin एक विकासशील संपत्ति है, जिसकी कीमत अटकलों, मनोदशा और अलग-अलग अपनाने की दरों से प्रभावित होती है। समय के साथ, जब अधिक स्थिर, दीर्घकालिक धारक भाग लेंगे, तो अस्थिरता कम हो सकती है, लेकिन यह शुरुआती चरण के विकास की एक खासियत बनी रहेगी।

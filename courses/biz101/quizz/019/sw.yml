question: Kwa nini tete inachukuliwa kuwa Element ya asili ya Bitcoin kama mali inayoibuka?
answer: Kwa sababu Bitcoin bado ni changa, inavutia walanguzi na kujibu habari za soko, na kusababisha kubadilika kwa bei kabla ya kutengemaa kwa muda mrefu.
wrong_answers:
  - Kwa sababu inadhibitiwa na serikali kuu na bei huwekwa na mamlaka moja.
  - Kwa sababu Bitcoin haina watumiaji wowote wanaoishikilia kwa muda mrefu.
  - Kwa sababu ni lazima wafanyabiashara waweke bei bila kutabirika kila saa.
explanation: |
  Kama rasilimali inayoendelea, bei ya Bitcoin huathiriwa na uvumi, hisia na viwango tofauti vya uasilishaji. Baada ya muda, kama imara zaidi, wamiliki wa muda mrefu wanashiriki, tete inaweza kupungua, lakini inabakia kipengele cha ukuaji wa mapema.
reviewed: true

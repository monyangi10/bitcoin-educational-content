question: Защо волатилността се смята за естествен аспект на Bitcoin като нововъзникващ актив?
answer: Тъй като Bitcoin е все още сравнително ново явление, то привлича спекуланти и реагира на пазарните новини, предизвиквайки колебания в цените, преди да се стабилизира за по-дълъг период от време.
wrong_answers:
  - Защото се контролира централно и цените се определят от един орган.
  - Защото Bitcoin няма потребители, които да го поддържат в дългосрочен план.
  - Защото търговците трябва да определят цените непредсказуемо на всеки час.
explanation: |
  Като развиващ се актив, цената на Bitcoin се влияе от спекулациите, настроенията и различните нива на приемане. С течение на времето, когато се включат по-стабилни и дългосрочни притежатели, волатилността може да намалее; тя обаче остава характерна за ранния етап на растеж.
reviewed: true

question: 為什麼波動性被認為是 Bitcoin 作為新興資產的一個自然方面？
answer: 因為 Bitcoin 仍相對較新，吸引投機者並回應市場消息，造成價格波動，然後在較長期間內穩定。
wrong_answers:
  - 因為它是中央控制的，價格是由一個機關來決定的。
  - 因為 Bitcoin 缺乏長期持有的使用者。
  - 因為商家必須每小時不可預測地設定價格。
explanation: |
  作為一種發展中的資產，Bitcoin 的價格受到投機、情緒和不同採用率的影響。隨著時間的推移，隨著更多穩定、長期持有者的參與，波動性可能會降低，但它仍然是早期成長階段的特徵。
reviewed: false
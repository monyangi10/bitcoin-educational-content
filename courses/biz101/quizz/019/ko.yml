question: 변동성이 이머징 자산으로서 Bitcoin의 자연스러운 측면으로 간주되는 이유는 무엇인가요?
answer: Bitcoin은 아직 비교적 초기 단계이기 때문에 투기꾼을 끌어들이고 시장 뉴스에 반응하여 가격 변동을 일으킨 후 장기간에 걸쳐 안정화됩니다.
wrong_answers:
  - 중앙에서 통제하고 한 기관에서 가격을 책정하기 때문입니다.
  - Bitcoin를 장기 보유하는 사용자가 없기 때문입니다.
  - 판매자는 매시간 예측할 수 없는 가격을 설정해야 하기 때문입니다.
explanation: |
  개발 중인 자산인 Bitcoin의 가격은 투기, 정서, 다양한 채택률에 영향을 받습니다. 시간이 지남에 따라 안정적인 장기 보유자가 늘어나면서 변동성은 줄어들 수 있지만, 여전히 초기 성장 단계의 특징입니다.
reviewed: true
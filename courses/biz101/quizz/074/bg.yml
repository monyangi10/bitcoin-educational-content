question: Какви усъвършенствани функции за сигурност обикновено се прилагат на ниво предприятие за Bitcoin?
answer: Множество подписи с часовници
wrong_answers:
  - Защита с парола за мобилна светкавица wallet
  - Единична регистрация със защита BIP39 passphrase
  - Еднозначна фраза с 24 думи seed
explanation: |
  Мерките за висока степен на сигурност, като например конфигурации с множество подписи и времеви ключалки, са от решаващо значение за управлението на големи суми.
reviewed: true
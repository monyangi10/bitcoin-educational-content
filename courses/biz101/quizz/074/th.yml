question: ฟีเจอร์ความปลอดภัยขั้นสูงที่มักจะนำมาใช้ในระดับองค์กรสำหรับ Bitcoin คืออะไร?
answer: มัลติซิกเนเจอร์พร้อมการล็อกเวลา
wrong_answers:
  - การป้องกันด้วยรหัสผ่านสำหรับมือถือ Lightning wallet
  - ซิงเกิลซิกกับการป้องกัน BIP39 passphrase
  - ซิงเกิลซิกกับวลี seed 24 คำ
explanation: |
  มาตรการรักษาความปลอดภัยสูง เช่น การกำหนดค่าลายเซ็นหลายตัวพร้อมการล็อกเวลา มีความสำคัญอย่างยิ่งสำหรับการจัดการเงินจำนวนมาก
reviewed: true
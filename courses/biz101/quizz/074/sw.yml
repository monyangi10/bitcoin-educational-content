question: Ni vipengele vipi vya usalama vya hali ya juu ambavyo kwa kawaida hutekelezwa katika kiwango cha Biashara kwa bitcoins?
answer: Multi-signature zilizo na timelocks
wrong_answers:
  - Ulinzi wa nenosiri kwa kifaa cha mkononi cha Lightning Wallet
  - Single signature yenye ulinzi wa BIP39 passphrase.
  - Single signature yenye 24-word seed phrase.
explanation: |
  Hatua za usalama wa juu kama vile usanidi wa multiple-signs zilizo na vifunga saa ni muhimu kwa kudhibiti kiasi kikubwa.
reviewed: true

question: एंटरप्राइज़ लेवल पर बिटकॉइन के लिए आमतौर पर कौन-कौन से एडवांस्ड सिक्योरिटी फीचर्स इस्तेमाल किए जाते हैं?
answer: मल्टी-सिग्नेचर टाइमलॉक के साथ
wrong_answers:
  - मोबाइल लाइटनिंग Wallet के लिए पासवर्ड सुरक्षा
  - सिंगल-सिग (Single-sig) जो BIP39 passphrase प्रोटेक्शन के साथ है
  - सिंगल-सिग वाले 24 शब्दों वाला seed फ्रेज़
explanation: |
  बड़ी रकम को मैनेज करने के लिए मल्टी-सिग्नेचर कॉन्फिगरेशन और टाइमलॉक जैसी हाई-सिक्योरिटी वाली सुविधाएं बेहद जरूरी हैं।
reviewed: false
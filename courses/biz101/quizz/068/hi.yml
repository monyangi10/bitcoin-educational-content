question: BTC Pay Server को Professional Environment में कैसे Deploy किया जा सकता है?
answer: ऑन-प्रिमाइसेस या क्लाउड होस्टिंग के जरिए
wrong_answers:
  - समर्पित हार्डवेयर उपकरणों पर विशेष रूप से
  - एक पूरी तरह से आउटसोर्स किए गए तीसरे पक्ष की सेवा के माध्यम से
  - एक मोबाइल ऐप के रूप में
explanation: |
  BTC Pay Server को ऑन-प्रिमाइसेस या क्लाउड पर डिप्लॉय करने की लचीलापन व्यवसायों को उनकी परिचालन आवश्यकताओं के अनुरूप सबसे उपयुक्त सेटअप चुनने की सुविधा देता है।
reviewed: false
question: Trường phái kinh tế học Áo định nghĩa khái niệm "ưu tiên thời gian" như thế nào?
answer: Ưu tiên sở thích tiêu thụ ngay thời điểm bây giờ hơn là sau này
wrong_answers:
  - Mong muốn giảm chi phí ngắn hạn
  - Tối ưu hóa các khoản đầu tư tức thời
  - Khả năng cân bằng cung và cầu
explanation: |
  Ưu tiên về thời gian đề cập đến sở thích tiêu dùng ngay lập tức hơn là trì hoãn các sở thích này, điều này ảnh hưởng đến quyết định tiết kiệm và đầu tư.
reviewed: true
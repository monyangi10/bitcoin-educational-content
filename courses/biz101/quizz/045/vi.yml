question: Trường phái Áo định nghĩa khái niệm "ưu tiên thời gian" như thế nào?
answer: Sở thích tiêu thụ ngay bây giờ hơn là sau này
wrong_answers:
  - Mong muốn giảm chi phí ngắn hạn
  - Tối ưu hóa các khoản đầu tư tức thời
  - Khả năng cân bằng cung và cầu
explanation: |
  Sở thích về thời gian đề cập đến sở thích tiêu dùng ngay lập tức hơn là lợi ích bị trì hoãn, điều này ảnh hưởng đến quyết định tiết kiệm và đầu tư.
reviewed: true
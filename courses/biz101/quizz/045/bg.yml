question: Как Австрийската школа дефинира понятието "времеви предпочитания"?
answer: Предпочитание за потребление сега, а не по-късно
wrong_answers:
  - Желанието да се намалят краткосрочните разходи
  - Оптимизиране на непосредствените инвестиции
  - Способността да се балансира търсенето и предлагането
explanation: |
  Предпочитанието към времето се отнася до предпочитанието на незабавното потребление пред отложените ползи, което оказва влияние върху решенията за спестяване и инвестиране.  
reviewed: true
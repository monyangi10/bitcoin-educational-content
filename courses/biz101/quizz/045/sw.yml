question: Je! Shule ya Austria inafafanuaje dhana ya "mapendeleo ya wakati"?
answer: Upendeleo wa kuteketeza sasa badala ya baadaye
wrong_answers:
  - Tamaa ya kupunguza gharama za muda mfupi
  - Uboreshaji wa uwekezaji wa haraka
  - Uwezo wa kusawazisha Supply na mahitaji
explanation: |
  Upendeleo wa wakati unarejelea chaguo la matumizi ya haraka kuliko faida iliyoahirishwa, ambayo huathiri maamuzi juu ya kuokoa na kuwekeza.
reviewed: true

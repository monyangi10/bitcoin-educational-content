question: ऑस्ट्रियन स्कूल "टाइम प्रिफरेंस" को कैसे परिभाषित करता है?
answer: अभी खपत करने की पसंद बजाय बाद में
wrong_answers:
  - छोटे समय के खर्चे को कम करने की चाहत
  - फौरन निवेश का बेहतरीन इंतज़ाम
  - Supply और मांग को संतुलित करने की क्षमता
explanation: |
  समय प्राथमिकता (Time preference) का मतलब है तुरंत खर्च करने को चुनना बजाय भविष्य के फायदे के, जो बचत और निवेश के फैसलों को प्रभावित करता है।

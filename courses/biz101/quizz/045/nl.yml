question: Hoe definieert de Oostenrijkse School het begrip "tijdsvoorkeur"?
answer: De voorkeur voor nu consumeren in plaats van later
wrong_answers:
  - De wens om de kosten op korte termijn te verlagen
  - De optimalisatie van onmiddellijke investeringen
  - Het vermogen om Supply en vraag in balans te brengen
explanation: |
  Tijdsvoorkeur verwijst naar de keuze voor onmiddellijke consumptie boven uitgestelde voordelen, wat beslissingen over sparen en beleggen beïnvloedt.  
reviewed: false
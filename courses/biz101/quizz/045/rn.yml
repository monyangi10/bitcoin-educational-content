question: Ishure ry'i Otirishiya risobanura gute iciyumviro c'"uguhitamwo umwanya"?
answer: Guhitamwo gufungura ubu aho gufungura hanyuma
wrong_answers:
  - Icipfuzo co kugabanya ibiciro vy’igihe gito
  - Gutunganya neza ishoramari ry'ubu nyene
  - Ubushobozi bwo guhuza Supply n'ivyo usaba
explanation: |
  Guhitamwo igihe vyerekeye uguhitamwo gukoresha ubwo nyene kuruta inyungu zisubirwamwo, ivyo bikaba bigira ico bikoze ku ngingo zijanye no kuzigama no gushiramwo amahera.  

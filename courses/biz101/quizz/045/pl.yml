question: Jak Szkoła Austriacka definiuje pojęcie "preferencji czasowej"?
answer: Preferowanie konsumpcji teraz, a nie później
wrong_answers:
  - Chęć obniżenia kosztów krótkoterminowych
  - Optymalizacja natychmiastowych inwestycji
  - Zdolność do zrównoważenia Supply i popytu
explanation: |
  Preferencja czasowa odnosi się do wyboru natychmiastowej konsumpcji nad odroczonymi korzyściami, co wpływa na decyzje dotyczące oszczędzania i inwestowania.  

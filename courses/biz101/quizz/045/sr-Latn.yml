question: Kako Austrijska škola definiše koncept "vremenske preferencije"?
answer: Preferencija za konzumiranjem sada, a ne kasnije
wrong_answers:
  - Želja za smanjenjem kratkoročnih troškova
  - Optimizacija trenutnih investicija
  - Sposobnost balansiranja Supply i potražnje
explanation: |
  Vremenska preferencija odnosi se na izbor trenutne potrošnje u odnosu na odloženu korist, što utiče na odluke o štednji i investiranju.
reviewed: false
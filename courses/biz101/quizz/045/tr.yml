question: Avusturya Okulu "zaman tercihi" kavramını nasıl tanımlamaktadır?
answer: Daha sonra tüketmek yerine şimdi tüketme tercihi
wrong_answers:
  - Kısa vadeli maliyetleri azaltma arzusu
  - Acil yatırımların optimizasyonu
  - Supply ve talebi dengeleme yeteneği
explanation: |
  Zaman tercihi, tasarruf ve yatırım kararlarını etkileyen, ertelenmiş fayda yerine anında tüketim tercihini ifade eder.  

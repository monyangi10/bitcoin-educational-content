question: โรงเรียนออสเตรียนิยามแนวคิดของ "การให้ความสำคัญกับเวลา" อย่างไร?
answer: ความชอบในการบริโภคตอนนี้มากกว่าภายหลัง
wrong_answers:
  - ความต้องการลดค่าใช้จ่ายในระยะสั้น
  - การเพิ่มประสิทธิภาพของการลงทุนทันที
  - ความสามารถในการปรับสมดุลระหว่างอุปทานและอุปสงค์
explanation: |
  การให้ความสำคัญกับเวลา หมายถึง ความชอบในการบริโภคทันทีมากกว่าผลประโยชน์ที่เลื่อนออกไป ซึ่งมีอิทธิพลต่อการตัดสินใจในการออมและการลงทุน
reviewed: true
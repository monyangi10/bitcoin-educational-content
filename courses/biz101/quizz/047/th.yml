question: ทำไมความขาดแคลนจึงเป็นคุณสมบัติที่สำคัญของสกุลเงินที่ดี?
answer: มันรักษามูลค่า
wrong_answers:
  - มันรับประกันว่าเฉพาะสินทรัพย์ทางกายภาพเท่านั้นที่สามารถใช้เป็นสกุลเงินได้
  - มันทำให้มั่นใจได้ว่าสกุลเงินนั้นมีให้กับทุกคนอย่างแพร่หลาย
  - มันทำให้มั่นใจได้ว่าสกุลเงินจะต้องได้รับการสนับสนุนจากสินค้าโภคภัณฑ์เช่นทองคำเสมอ
explanation: |
  ความขาดแคลนป้องกันการสร้างสกุลเงินมากเกินไป จึงรักษามูลค่าและอำนาจการซื้อของมันไว้ตลอดเวลา
reviewed: true
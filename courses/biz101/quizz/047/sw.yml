question: Kwa nini uhaba ni mali muhimu ya sarafu nzuri?
answer: Inahifadhi thamani
wrong_answers:
  - Inahakikisha kuwa ni mali halisi pekee ndiyo inaweza kutumika kama sarafu
  - Inahakikisha kwamba sarafu inapatikana kwa kila mtu binafsi
  - Inahakikisha kuwa sarafu lazima iungwe mkono na bidhaa kama dhahabu kila wakati
explanation: |
  Uhaba huzuia uundaji mwingi wa sarafu, na hivyo kudumisha thamani yake na uwezo wa ununuzi kwa wakati.
reviewed: true

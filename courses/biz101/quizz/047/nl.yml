question: Waarom is schaarste een essentiële eigenschap van een goede valuta?
answer: Het behoudt waarde
wrong_answers:
  - Het garandeert dat alleen fysieke activa kunnen worden gebruikt als valuta
  - Het zorgt ervoor dat de munteenheid op grote schaal beschikbaar is voor elk individu
  - Het zorgt ervoor dat de valuta altijd moet worden ondersteund door een grondstof zoals goud
explanation: |
  Schaarste voorkomt het buitensporig creëren van geld, waardoor de waarde en koopkracht van het geld in de loop der tijd behouden blijft.

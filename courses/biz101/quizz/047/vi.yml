question: Tại sao tính khan hiếm lại là đặc tính thiết yếu của một loại tiền tệ tốt?
answer: Nó bảo tồn giá trị
wrong_answers:
  - Nó đảm bảo rằng chỉ có tài sản vật chất mới có thể được sử dụng làm tiền tệ
  - Nó đảm bảo rằng tiền tệ có sẵn rộng rãi cho mọi cá nhân
  - Nó đảm bảo rằng tiền tệ phải luôn được hỗ trợ bởi một hàng hóa như vàng
explanation: |
  Sự khan hiếm ngăn chặn việc tạo ra quá nhiều tiền tệ, do đó duy trì giá trị và sức mua của tiền tệ theo thời gian.
reviewed: true
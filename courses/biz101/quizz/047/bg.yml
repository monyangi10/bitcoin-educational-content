question: Защо недостигът е основно свойство на добрата валута?
answer: Запазва стойността си
wrong_answers:
  - Тя гарантира, че като валута могат да се използват само физически активи
  - Тя гарантира, че валутата е широко достъпна за всеки човек
  - Тя гарантира, че валутата винаги трябва да бъде обезпечена със стока като златото
explanation: |
  Недостигът предотвратява прекомерното създаване на валута, като по този начин запазва нейната стойност и покупателна способност във времето.
reviewed: true
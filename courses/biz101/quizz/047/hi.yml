question: क्यों एक अच्छी करेंसी के लिए कमी होना ज़रूरी है?
answer: यह वैल्यू को बचाता है
wrong_answers:
  - यह सुनिश्चित करता है कि केवल भौतिक संपत्ति ही मुद्रा के रूप में इस्तेमाल की जा सकती है
  - यह सुनिश्चित करता है कि मुद्रा हर व्यक्ति को आसानी से उपलब्ध हो।
  - यह सुनिश्चित करता है कि मुद्रा हमेशा सोने जैसी किसी वस्तु द्वारा समर्थित होनी चाहिए
explanation: |
  कमी होने से करेंसी का ज़्यादा बनना रुकता है, जिससे उसकी वैल्यू और खरीदने की ताकत समय के साथ बनी रहती है।
reviewed: false
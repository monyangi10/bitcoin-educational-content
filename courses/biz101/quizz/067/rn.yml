question: Ni uruhara uruhe ibikoresho nka Zaprite na Musqet bigira mu gutorera umuti ibibazo vy’ukwishura mu buryo bw’umwuga?
answer: Banonosora ubumenyi bwo gusohoka
wrong_answers:
  - Bajejwe guhindura amafaranga menshi no gutanga amafaranga
  - Bibanda ku gupfuka amakuru y'ibikorwa no gucunga imfunguruzo z'ibanga
  - Bikora nk'uburyo bwa POS bw'ishimikiro
explanation: |
  Zaprite na Musqet bongerako guhindura ibintu no gutanga raporo ku bijanye n’ugutanga amahera, bikaba vyuzuza ibikorwa remezo nyamukuru vyo kwishura.

question: Как се е развил Lightning Network, за да се подобри потребителското изживяване от създаването му досега?
answer: Тя въведе функции като сплитинг, статични фактури Bolt12 и по-добро управление на ликвидността, което прави транзакциите по-гладки и надеждни.
wrong_answers:
  - В него са премахнати всички функции за сигурност, за да се ускорят трансакциите.
  - Сега за всяко плащане се изисква одобрение от правителството.
  - Тя е спряла да работи по нови функции, като разчита само на първоначалния дизайн.
explanation: |
  С течение на времето Lightning Network получи технически подобрения, които намаляват затрудненията на потребителите. Новите функции и по-добрите инструменти за управление на възли допринесоха за по-безпроблемно и удобно за потребителя преживяване.
reviewed: true
question: Lightning Network มีการพัฒนาอย่างไรเพื่อปรับปรุงประสบการณ์ของผู้ใช้ตั้งแต่เริ่มต้น?
answer: มันได้แนะนำคุณสมบัติต่างๆ เช่น การต่อสาย, ใบแจ้งหนี้ Bolt12 แบบสแตติก, และการจัดการสภาพคล่องที่ดีขึ้น ทำให้การทำธุรกรรมราบรื่นและเชื่อถือได้มากขึ้น
wrong_answers:
  - มันได้ลบคุณสมบัติความปลอดภัยทั้งหมดเพื่อเร่งความเร็วในการทำธุรกรรม
  - ขณะนี้ต้องได้รับการอนุมัติจากรัฐบาลสำหรับการชำระเงินแต่ละครั้ง
  - มันหยุดทำงานในฟีเจอร์ใหม่ๆ โดยพึ่งพาการออกแบบดั้งเดิมเท่านั้น
explanation: |
  เมื่อเวลาผ่านไป Lightning Network ได้รับการปรับปรุงทางเทคนิคที่ลดแรงเสียดทานสำหรับผู้ใช้ ฟีเจอร์ใหม่และเครื่องมือการจัดการโหนดที่ดียิ่งขึ้นได้ช่วยให้ประสบการณ์การใช้งานเป็นไปอย่างราบรื่นและเป็นมิตรกับผู้ใช้มากขึ้น
reviewed: true
question: Lightning Network는 출시 이후 사용자 경험을 개선하기 위해 어떻게 발전해왔나요?
answer: 스플라이싱, 정적 Bolt12 송장, 유동성 관리 개선 등의 기능을 도입하여 거래를 더욱 원활하고 안정적으로 만들었습니다.
wrong_answers:
  - 거래 속도를 높이기 위해 모든 보안 기능을 제거했습니다.
  - 이제 각 결제에 대해 정부의 승인이 필요합니다.
  - 새로운 기능 개발을 중단하고 기존 디자인에만 의존하고 있습니다.
explanation: |
  시간이 지남에 따라 Lightning Network은 사용자의 불편함을 줄여주는 기술적 개선이 이루어졌습니다. 새로운 기능과 더 나은 노드 관리 도구는 더욱 원활하고 사용자 친화적인 경험을 제공하는 데 기여했습니다.
reviewed: true
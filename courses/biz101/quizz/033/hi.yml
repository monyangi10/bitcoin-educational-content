question: Lightning Network ने अपनी शुरुआत से लेकर अब तक यूजर एक्सपीरियंस को बेहतर बनाने के लिए कैसे विकास किया है?
answer: इसने स्प्लिसिंग, स्टैटिक Bolt12 इनवॉइस, और बेहतर लिक्विडिटी मैनेजमेंट जैसी फीचर्स पेश की हैं, जिससे ट्रांजैक्शन्स और स्मूद और रिलायबल हो गए हैं।
wrong_answers:
  - इसने लेन-देन को तेज़ करने के लिए सभी सुरक्षा फ़ीचर्स हटा दिए हैं।
  - अब हर भुगतान के लिए सरकारी मंजूरी की जरूरत होती है।
  - यह नए फीचर्स पर काम करना बंद कर चुका है, सिर्फ़ पुराने डिज़ाइन पर ही भरोसा कर रहा है।
explanation: |
  समय के साथ, Lightning Network में तकनीकी सुधार हुए हैं जिससे यूजर्स के लिए घर्षण कम हुआ है। नई सुविधाएँ और बेहतर नोड प्रबंधन टूल्स ने एक सहज और यूजर-फ्रेंडली अनुभव में योगदान दिया है।
reviewed: false
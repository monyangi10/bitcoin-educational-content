question: Lightning Network ช่วยลดค่าธรรมเนียมสำหรับธุรกรรม Bitcoin ได้อย่างไร?
answer: โดยการดำเนินการธุรกรรมส่วนใหญ่ผ่าน off-chain และเผยแพร่เฉพาะธุรกรรมการชำระบัญชีช่องทางบนบล็อกเชนหลักเท่านั้น
wrong_answers:
  - โดยการลบการตรวจสอบการเข้ารหัสทั้งหมดออกจากการชำระเงิน
  - โดยการรวมศูนย์การควบคุมในศูนย์การชำระเงินขนาดใหญ่แห่งเดียว
  - โดยกำหนดให้ผู้ค้าเป็นผู้ชำระค่าใช้จ่ายเครือข่ายทั้งหมดล่วงหน้า
explanation: |
  เนื่องจากธุรกรรม Lightning เกิดขึ้นที่ off-chain สถานะช่องทางสุดท้ายเท่านั้นที่ถูกชำระบนบล็อกเชน Bitcoin ซึ่งช่วยลดความแออัดและลดค่าธรรมเนียมโดยการหลีกเลี่ยงการทำธุรกรรม on-chain จำนวนมาก
reviewed: true
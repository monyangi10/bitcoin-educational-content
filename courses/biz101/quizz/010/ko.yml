question: Lightning Network은 Bitcoin 거래의 수수료 절감에 어떻게 도움이 되나요?
answer: 대부분의 트랜잭션은 off-chain에서 수행하고 채널 정산 트랜잭션만 메인 Blockchain에 게시합니다.
wrong_answers:
  - 결제에서 모든 암호화 인증을 제거합니다.
  - 하나의 대규모 결제 허브에서 제어를 중앙 집중화합니다.
  - 판매자가 모든 네트워크 비용을 선불로 지불하도록 요구합니다.
explanation: |
  라이트닝 트랜잭션은 off-chain에서 발생하기 때문에 최종 채널 상태만 Bitcoin Blockchain에서 정산됩니다. 이렇게 하면 On-Chain 트랜잭션이 많이 발생하지 않아 혼잡이 줄어들고 수수료가 낮아집니다.
reviewed: true
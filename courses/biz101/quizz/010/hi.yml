question: Lightning Network कैसे Bitcoin ट्रांजैक्शन के फीस को कम करने में मदद करता है?
answer: ज्यादातर लेन-देन off-chain पर करके और सिर्फ चैनल सेटलमेंट लेन-देन को मुख्य Blockchain पर पब्लिश करके।
wrong_answers:
  - भुगतान से सारी क्रिप्टोग्राफिक पुष्टि हटाकर।
  - एक बड़े पेमेंट हब में नियंत्रण को केंद्रीकृत करके।
  - व्यापारियों को सभी नेटवर्क लागत पहले से चुकाने के लिए बाध्य करके।
explanation: |
  जब लाइटनिंग ट्रांजैक्शन off-chain पर होते हैं, तो सिर्फ फाइनल चैनल स्टेट्स Bitcoin Blockchain पर सेटल होती हैं। इससे कंजेशन कम होता है और फीस भी घट जाती है क्योंकि बहुत सारे On-Chain ट्रांजैक्शन करने से बचा जाता है।

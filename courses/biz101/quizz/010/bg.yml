question: Как Lightning Network помага за намаляване на таксите за трансакциите Bitcoin?
answer: Чрез провеждане на повечето транзакции извън блокчейна (off-chain) и публикуване върху блокчейна само на транзакциите за сетълмент в каналите на Lightning network.
wrong_answers:
  - Премахване на всички криптографски проверки при плащанията.
  - Чрез централизиране на контрола в един голям център за плащания.
  - Като изисква от търговците да заплащат предварително всички разходи за мрежата.
explanation: |
  Тъй като транзакциите със светкавици се извършват off-chain, само окончателните състояния на каналите се уреждат в блокчейна на Bitcoin. Това намалява претоварването и по този начин намалява таксите, като се избягва извършването на много транзакции on-chain.
reviewed: true

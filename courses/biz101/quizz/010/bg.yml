question: Как Lightning Network помага за намаляване на таксите за трансакциите Bitcoin?
answer: Чрез провеждане на повечето транзакции off-chain и публикуване на транзакциите за сетълмент на канали само в основната блокчейн верига.
wrong_answers:
  - Премахване на всички криптографски проверки при плащанията.
  - Чрез централизиране на контрола в един голям център за плащания.
  - Като изисква от търговците да заплащат предварително всички разходи за мрежата.
explanation: |
  Тъй като транзакциите със светкавици се извършват в off-chain, само окончателните състояния на каналите се уреждат в блокчейна Bitcoin. Това намалява претоварването и по този начин намалява таксите, като се избягва извършването на много транзакции on-chain.
reviewed: true
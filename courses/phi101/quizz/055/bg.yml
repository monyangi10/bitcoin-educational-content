question: По какво библейската етика се различава от древната?
answer: Всички останали отговори са верни.
wrong_answers:
  - Библейската етика придава безкрайна стойност на индивида, тъй като той е създаден по образ и подобие на Бога, докато античната етика подчинява човека на космоса.
  - Библейската етика се застъпва за любовта към ближния и състраданието, докато античната етика набляга на справедливостта и реципрочността.
  - Библейската етика е насочена към всички хора, докато античната етика е запазена за елитна група граждани.
explanation: |
  Библейската етика оценява индивида като носител на божествено достойнство, насърчава универсалната любов и състрадание и е насочена към всички човешки същества, за разлика от античната етика, която привилегирова елита и се фокусира върху космическата хармония и взаимната справедливост.
reviewed: true
question: اخلاقیات کتاب مقدس چگونه با اخلاقیات باستانی تفاوت دارد؟
answer: همه پاسخ‌های دیگر صحیح هستند.
wrong_answers:
  - اخلاقیات کتاب مقدس به فرد ارزش بی‌نهایت می‌دهد زیرا او به صورت خدا آفریده شده است، در حالی که اخلاقیات باستانی انسان را به کیهان تابع می‌کند.
  - اخلاقیات کتاب مقدس بر عشق به همسایه و شفقت تأکید دارد، در حالی که اخلاقیات باستانی بر عدالت و مقابله به مثل تأکید می‌کند.
  - اخلاقیات کتاب مقدس به همه انسان‌ها می‌پردازد، در حالی که اخلاقیات باستانی برای یک گروه نخبه از شهروندان محفوظ است.
explanation: |
  اخلاقیات کتاب مقدس فرد را به عنوان حامل کرامت الهی ارزش می‌نهد، عشق و شفقت جهانی را ترویج می‌کند و به همه انسان‌ها می‌پردازد، در مقابل اخلاقیات باستانی که به نخبگان اولویت می‌دهد و بر هماهنگی کیهانی و عدالت متقابل تمرکز دارد.
reviewed: false
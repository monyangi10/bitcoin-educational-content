question: Je, maadili ya Biblia yanatofautianaje na maadili ya kale?
answer: Majibu mengine yote ni sahihi.
wrong_answers:
  - Maadili ya Kibiblia yanapeana thamani isiyo na kikomo kwa mtu binafsi kwani wameumbwa kwa mfano wa Mungu, ambapo maadili ya zamani huweka mwanadamu chini ya ulimwengu.
  - Maadili ya Kibiblia yanatetea upendo kwa jirani na huruma, wakati maadili ya kale yanasisitiza haki na usawa.
  - Maadili ya Kibiblia yanawahusu watu wote, ilhali maadili ya kale yametengwa kwa ajili ya kundi la watu wasomi.
explanation: |
  Maadili ya Kibiblia yanamthamini mtu kama anayebeba utu wa kimungu, yanakuza upendo na huruma kwa wote, na yanawashughulikia wanadamu wote, tofauti na maadili ya kale, ambayo yanawapa upendeleo wasomi na kuzingatia maelewano ya ulimwengu na haki ya usawa.

question: จริยธรรมตามหลักพระคัมภีร์แตกต่างจากจริยธรรมโบราณอย่างไร?
answer: คำตอบอื่น ๆ ทั้งหมดถูกต้อง
wrong_answers:
  - จริยธรรมในพระคัมภีร์ให้คุณค่าอันไม่มีที่สิ้นสุดแก่บุคคลเนื่องจากพวกเขาถูกสร้างขึ้นตามภาพลักษณ์ของพระเจ้า ในขณะที่จริยธรรมโบราณให้ความสำคัญกับมนุษย์รองจากจักรวาล
  - จริยธรรมในพระคัมภีร์สนับสนุนความรักต่อเพื่อนบ้านและความเมตตา ในขณะที่จริยธรรมโบราณเน้นความยุติธรรมและการตอบแทน
  - จริยธรรมในพระคัมภีร์กล่าวถึงมนุษย์ทุกคน ในขณะที่จริยธรรมโบราณสงวนไว้สำหรับกลุ่มพลเมืองชั้นยอดเท่านั้น
explanation: |
  จริยธรรมในพระคัมภีร์ให้คุณค่าต่อปัจเจกบุคคลในฐานะที่มีศักดิ์ศรีอันศักดิ์สิทธิ์ ส่งเสริมความรักและความเมตตาสากล และมุ่งเน้นไปที่มนุษย์ทุกคน ซึ่งแตกต่างจากจริยธรรมโบราณที่ให้สิทธิพิเศษแก่ชนชั้นสูงและมุ่งเน้นไปที่ความกลมกลืนของจักรวาลและความยุติธรรมซึ่งกันและกัน
reviewed: true
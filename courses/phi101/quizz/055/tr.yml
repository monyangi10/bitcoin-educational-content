question: Kutsal Kitap etiği antik etikten nasıl farklıdır?
answer: Diğer tüm cevaplar doğrudur.
wrong_answers:
  - İncil etiği, Tanrı'nın suretinde yaratıldıkları için bireye sonsuz değer atfederken, antik etik insanı kozmosa tabi kılar.
  - İncil etiği komşu sevgisini ve merhameti savunurken, antik etik adalet ve karşılıklılığı vurgular.
  - Kutsal Kitap etiği tüm insanlara hitap ederken, antik etik elit bir vatandaş grubuna ayrılmıştır.
explanation: |
  Kutsal Kitap etiği bireye ilahi haysiyete sahip olduğu için değer verir, evrensel sevgi ve şefkati teşvik eder ve elit bir kesime ayrıcalık tanıyan ve kozmik uyum ve karşılıklı adalete odaklanan antik etiğin aksine tüm insanlara hitap eder.
reviewed: true
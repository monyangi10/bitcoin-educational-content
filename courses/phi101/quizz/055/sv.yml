question: Hur skiljer sig biblisk etik från antikens etik?
answer: Alla de andra svaren är korrekta.
wrong_answers:
  - Den bibliska etiken tillmäter individen oändligt värde eftersom den är skapad till Guds avbild, medan den antika etiken underordnar människan kosmos.
  - Den bibliska etiken förespråkar kärlek till nästan och medkänsla, medan den antika etiken betonar rättvisa och ömsesidighet.
  - Den bibliska etiken vänder sig till alla människor, medan den antika etiken är förbehållen en elitgrupp av medborgare.
explanation: |
  Biblisk etik värderar individen som bärare av gudomlig värdighet, främjar universell kärlek och medkänsla och vänder sig till alla människor, i motsats till antikens etik, som privilegierar en elit och fokuserar på kosmisk harmoni och ömsesidig rättvisa.
reviewed: true
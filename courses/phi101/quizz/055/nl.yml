question: Waarin verschilt de bijbelse ethiek van de oude ethiek?
answer: Alle andere antwoorden zijn juist.
wrong_answers:
  - De Bijbelse ethiek kent een oneindige waarde toe aan het individu omdat het geschapen is naar het beeld van God, terwijl de oude ethiek de mens ondergeschikt maakt aan de kosmos.
  - De Bijbelse ethiek pleit voor naastenliefde en mededogen, terwijl de oude ethiek de nadruk legt op rechtvaardigheid en wederkerigheid.
  - De Bijbelse ethiek richt zich tot alle mensen, terwijl de oude ethiek voorbehouden is aan een elitegroep van burgers.
explanation: |
  De Bijbelse ethiek waardeert het individu als drager van goddelijke waardigheid, bevordert universele liefde en mededogen en richt zich tot alle mensen, in tegenstelling tot de oude ethiek, die een elite bevoordeelt en zich richt op kosmische harmonie en wederzijdse rechtvaardigheid.
reviewed: true
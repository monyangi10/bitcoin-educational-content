question: توهم اساسی دولت از نظر مارکس چیست؟
answer: این نمایانگر منافع عمومی است و نه منافع خاص یک طبقه.
wrong_answers:
  - قادر به تضمین بی‌طرفی است.
  - این به جامعه مدنی خدمت می‌کند.
  - این ترویج مبارزه طبقاتی است.
explanation: |
  برای مارکس، دولت ادعا می‌کند که نماینده منافع عمومی است، اما در واقع، ابزاری در خدمت منافع طبقه حاکم است و به این ترتیب، سرکوب طبقات فرودست را تداوم می‌بخشد.
reviewed: false
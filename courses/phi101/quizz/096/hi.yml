question: मार्क्स के अनुसार राज्य की मूलभूत भ्रम क्या है?
answer: यह सामान्य हित को दर्शाता है, न कि किसी वर्ग के विशेष हितों को।
wrong_answers:
  - यह निष्पक्षता की गारंटी देने में सक्षम है।
  - यह सिविल सोसाइटी की सेवा करता है।
  - यह वर्ग संघर्ष को बढ़ावा देता है।
explanation: |
  मार्क्स के लिए, राज्य यह दावा करता है कि वह सामान्य हित का प्रतिनिधित्व करता है, लेकिन असल में, यह प्रभुत्वशाली वर्ग के हितों की सेवा का एक औज़ार है, जिससे अधीनस्थ वर्गों का उत्पीड़न बना रहता है।
reviewed: false
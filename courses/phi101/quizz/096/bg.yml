question: Каква е основната илюзия на държавата според Маркс?
answer: Той представлява общия интерес, а не специфичните интереси на дадена класа.
wrong_answers:
  - Тя е в състояние да гарантира безпристрастност.
  - Тя служи на гражданското общество.
  - Тя насърчава класовата борба.
explanation: |
  За Маркс държавата твърди, че представлява общия интерес. В действителност обаче тя е инструмент в служба на интересите на господстващата класа, като по този начин увековечава потисничеството на подчинените класи.
reviewed: true
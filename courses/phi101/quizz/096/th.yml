question: อะไรคือภาพลวงตาพื้นฐานของรัฐตามความคิดของมาร์กซ์?
answer: มันแสดงถึงผลประโยชน์ทั่วไปและไม่ใช่ผลประโยชน์เฉพาะของชั้นเรียนใดชั้นเรียนหนึ่ง
wrong_answers:
  - มันสามารถรับประกันความเป็นกลางได้
  - มันให้บริการแก่ภาคประชาสังคม
  - มันส่งเสริมการต่อสู้ทางชนชั้น
explanation: |
  สำหรับมาร์กซ์ รัฐอ้างว่าเป็นตัวแทนของผลประโยชน์ทั่วไป แต่ในความเป็นจริงแล้ว มันเป็นเครื่องมือที่ให้บริการผลประโยชน์ของชนชั้นปกครอง ซึ่งทำให้การกดขี่ชนชั้นรองดำเนินต่อไป
reviewed: true
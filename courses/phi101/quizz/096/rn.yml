question: Ni igiki ari co ciyumviro nyamukuru ca Leta nk’uko Marx abivuga?
answer: Riserukira inyungu rusangi atari inyungu zidasanzwe z’umugwi.
wrong_answers:
  - Irashoboye kwemeza ko ata n’umwe abogamiye.
  - Ikorera sosiyete sivile.
  - Ritera imbere urugamba rw’imigwi.
explanation: |
  Ku bwa Marx, Leta ivuga ko iserukira inyungu rusangi. Naho ari ukwo, mu vy’ukuri ni igikoresho gikoreshwa mu gufasha inyungu z’umugwi utwara, gutyo kigatuma umugwi uri munsi yawo ukomeza guhahazwa.
reviewed: true
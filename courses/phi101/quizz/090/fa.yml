question: به گفته توکویل، پیامد برابری شرایط چیست؟
answer: افراد شکننده‌تر و منزوی‌تر می‌شوند.
wrong_answers:
  - افراد بیشتر خودمختار و مستقل می‌شوند.
  - افراد ثروتمندتر و موفق‌تر می‌شوند.
  - خشونت کمتر است.
explanation: |
  توكویل مشاهده می‌کند که برابری شرایط می‌تواند باعث شود افراد به درون خود عقب‌نشینی کنند و با از دست دادن پیوندهای اجتماعی و حمایت جمعی که قبلاً توسط سلسله‌مراتب سنتی فراهم می‌شد، آسیب‌پذیرتر و منزوی‌تر شوند.
reviewed: false
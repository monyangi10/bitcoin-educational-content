question: टॉकविल के अनुसार, स्थितियों के समान होने का क्या परिणाम होता है?
answer: लोग ज़्यादा नाज़ुक और अलग-थलग हो जाते हैं।
wrong_answers:
  - लोग ज़्यादा आज़ाद और खुदमुख्तार हो जाते हैं।
  - लोग अमीर और खुशहाल हो जाते हैं।
  - हिंसा कम हो गई है।
explanation: |
  टोकविल ने देखा कि हालात की बराबरी लोगों को खुद में सिमटने पर मजबूर कर सकती है, जिससे वे ज्यादा कमजोर और अकेले हो जाते हैं। क्योंकि पुराने ढाँचों से मिलने वाली सामाजिक जुड़ाव और सामूहिक सहारा अब उन्हें नहीं मिलता।
reviewed: false
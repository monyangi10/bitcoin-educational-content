question: ตามที่ Tocqueville กล่าว ผลที่ตามมาของการทำให้เงื่อนไขเท่าเทียมกันคืออะไร?
answer: บุคคลกลายเป็นเปราะบางและโดดเดี่ยวมากขึ้น
wrong_answers:
  - บุคคลมีความเป็นอิสระและพึ่งพาตนเองมากขึ้น
  - บุคคลมีความมั่งคั่งและเจริญรุ่งเรืองมากขึ้น
  - มีความรุนแรงน้อยลง
explanation: |
  Tocqueville สังเกตว่าการทำให้เงื่อนไขเท่าเทียมกันสามารถทำให้บุคคลถอนตัวเข้าสู่ตัวเอง ทำให้พวกเขาเปราะบางและโดดเดี่ยวมากขึ้น เนื่องจากพวกเขาสูญเสียสายสัมพันธ์ทางสังคมและการสนับสนุนร่วมกันที่เคยได้รับจากลำดับชั้นแบบดั้งเดิม
reviewed: true
question: نقد مارکسیستی از دین چیست؟
answer: این افراد را از مبارزه برای رهایی واقعی‌شان منحرف می‌کند.
wrong_answers:
  - این افیون روشنفکران است.
  - این با اصول آزادی و برابری ناسازگار است.
  - این در کار هیچ ارزش افزوده‌ای ندارد.
explanation: |
  مارکس دین را به عنوان ابزاری می‌بیند که کارگران را از مبارزه برای رهایی منحرف می‌کند، با تسلی دادن به آن‌ها درباره شرایط مادی‌شان بدون تشویق آن‌ها به تغییر ساختارهای استثمار.
reviewed: false
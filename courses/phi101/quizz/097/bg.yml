question: Каква е марксистката критика на религията?
answer: Тя отклонява хората от борбата за тяхната действителна еманципация.
wrong_answers:
  - Това е опиумът на интелектуалците.
  - То е несъвместимо с принципите на свобода и равенство.
  - Той не осигурява добавена стойност на труда.
explanation: |
  Маркс разглежда религията като инструмент, който отклонява работниците от борбата им за еманципация, като ги утешава за материалните им условия, без да ги насърчава да променят структурите на експлоатация.
reviewed: true
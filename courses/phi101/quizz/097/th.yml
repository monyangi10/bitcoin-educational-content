question: คำวิจารณ์ของมาร์กซิสต์เกี่ยวกับศาสนาคืออะไร?
answer: มันเบี่ยงเบนผู้คนจากการต่อสู้เพื่อการปลดปล่อยที่แท้จริงของพวกเขา
wrong_answers:
  - มันคือฝิ่นของปัญญาชน
  - มันไม่สอดคล้องกับหลักการของเสรีภาพและความเท่าเทียมกัน
  - มันไม่ได้เพิ่มมูลค่าใด ๆ ในแรงงาน
explanation: |
  มาร์กซ์มองว่าศาสนาเป็นเครื่องมือที่เบี่ยงเบนความสนใจของแรงงานจากการต่อสู้เพื่อการปลดปล่อย โดยการปลอบโยนพวกเขาเกี่ยวกับสภาพวัตถุของพวกเขาโดยไม่กระตุ้นให้พวกเขาเปลี่ยนแปลงโครงสร้างของการแสวงหาประโยชน์
reviewed: true
question: धर्म की मार्क्सवादी आलोचना क्या है?
answer: यह लोगों को उनकी वास्तविक मुक्ति के संघर्ष से विचलित करता है।
wrong_answers:
  - यह बुद्धिजीवियों की अफीम है।
  - यह स्वतंत्रता और समानता के सिद्धांतों के साथ असंगत है।
  - यह श्रम में कोई अतिरिक्त मूल्य प्रदान नहीं करता है।
explanation: |
  मार्क्स धर्म को एक ऐसे उपकरण के रूप में देखते हैं जो श्रमिकों को शोषण की संरचनाओं को बदलने के लिए प्रोत्साहित किए बिना उनकी भौतिक स्थितियों के बारे में सांत्वना देकर उन्हें मुक्ति के संघर्ष से विचलित करता है।
reviewed: false
question: Na czym polega marksistowska krytyka religii?
answer: Odwraca uwagę ludzi od walki o ich rzeczywistą emancypację.
wrong_answers:
  - To opium dla intelektualistów.
  - Jest to niezgodne z zasadami wolności i równości.
  - Nie zapewnia wartości dodanej w postaci pracy.
explanation: |
  Marks postrzega religię jako narzędzie, które odwraca uwagę robotników od ich walki o emancypację, pocieszając ich w kwestii ich warunków materialnych bez zachęcania ich do zmiany struktur wyzysku.

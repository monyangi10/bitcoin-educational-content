question: تفاوت اساسی بین نظریه‌های تورگو و آدام اسمیت در مورد ارزش چیست؟
answer: تورگو معتقد بود که ارزش توسط کار تعیین می‌شود، در حالی که اسمیت معتقد بود که ارزش توسط سودمندی تعیین می‌شود.
wrong_answers:
  - تورگو معتقد بود که تجارت آزاد بهترین سیاست اقتصادی است در حالی که اسمیت به حمایت‌گرایی اعتقاد داشت.
  - تورگو معتقد بود که نقش دولت این است که بازار را آزاد بگذارد، در حالی که اسمیت معتقد بود که دولت باید در اقتصاد مداخله کند.
  - هیچ تفاوت اساسی بین نظریه‌های تورگو و نظریه‌های اسمیت درباره ارزش وجود ندارد.
explanation: |
  تورگو کار را به عنوان عامل اصلی تعیین‌کننده ارزش در نظر گرفت، در حالی که آدام اسمیت مفهومی از ارزش را معرفی کرد که تحت تأثیر سودمندی و تقاضا بود و به نوعی اقتصاد ذهنی را پیش‌بینی می‌کرد.

question: Wat is het fundamentele verschil tussen de theorieën van Turgot en die van Adam Smith over waarde?
answer: Turgot geloofde dat waarde werd bepaald door arbeid, terwijl Smith geloofde dat waarde werd bepaald door nut.
wrong_answers:
  - Turgot geloofde dat vrije handel het beste economische beleid was, terwijl Smith geloofde in protectionisme.
  - Turgot geloofde dat de rol van de staat was om de markt vrij te laten, terwijl Smith geloofde dat de overheid moest ingrijpen in de economie.
  - Er is geen fundamenteel verschil tussen de theorieën van Turgot en die van Smith over waarde.
explanation: |
  Turgot beschouwde arbeid als de belangrijkste bepalende factor van waarde, terwijl Adam Smith een notie van waarde introduceerde die beïnvloed werd door nut en vraag, een voorbode van subjectieve economie.
reviewed: true
question: तुर्गो और एडम स्मिथ के सिद्धांतों में मूल्य के बारे में मूलभूत अंतर क्या है?
answer: तुर्गो का मानना था कि मूल्य श्रम से निर्धारित होता है, जबकि स्मिथ का मानना था कि यह उपयोगिता से निर्धारित होता है।
wrong_answers:
  - तुर्गो का मानना था कि मुक्त व्यापार सबसे अच्छी आर्थिक नीति है, जबकि स्मिथ संरक्षणवाद में विश्वास रखते थे।
  - तुर्गो का मानना था कि सरकार की भूमिका बाज़ार को आज़ाद छोड़ने की होनी चाहिए, जबकि स्मिथ का मानना था कि सरकार को अर्थव्यवस्था में दख़ल देना चाहिए।
  - तुर्गो और स्मिथ के सिद्धांतों में मूल्य पर कोई बुनियादी अंतर नहीं है।
explanation: |
  तुर्गो ने श्रम को मूल्य का मुख्य निर्धारक माना, जबकि एडम स्मिथ ने उपयोगिता और मांग से प्रभावित मूल्य की अवधारणा पेश की, जो व्यक्तिपरक अर्थशास्त्र की झलक दिखाती है।

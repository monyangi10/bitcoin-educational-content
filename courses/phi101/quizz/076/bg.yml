question: Каква е основната разлика между теориите за стойността на Турго и тези на Адам Смит?
answer: Турго смята, че стойността се определя от труда, а Смит - че тя се определя от полезността.
wrong_answers:
  - Турго смята, че свободната търговия е най-добрата икономическа политика, докато Смит е убеден в протекционизма.
  - Турго смята, че ролята на държавата е да остави пазара свободен, докато Смит смята, че правителството трябва да се намесва в икономиката.
  - Няма съществена разлика между теориите на Турго и тези на Смит относно стойността.
explanation: |
  Турго смята, че трудът е основният фактор, определящ стойността, докато Адам Смит въвежда понятие за стойност, повлияно от полезността и търсенето, което предвещава субективната икономика.
reviewed: true
question: 가치에 관한 투르고의 이론과 아담 스미스의 이론의 근본적인 차이점은 무엇인가요?
answer: 투르고는 가치가 노동에 의해 결정된다고 믿었고, 스미스는 효용에 의해 결정된다고 믿었습니다.
wrong_answers:
  - 투르고는 자유무역이 최고의 경제 정책이라고 믿었고, 스미스는 보호무역주의를 믿었습니다.
  - 투르고는 국가의 역할은 시장을 자유롭게 두는 것이라고 믿었고, 스미스는 정부가 경제에 개입해야 한다고 믿었습니다.
  - 가치에 대한 투르고의 이론과 스미스의 이론 사이에는 근본적인 차이가 없습니다.
explanation: |
  투르고는 노동을 가치의 주요 결정 요인으로 간주한 반면, 아담 스미스는 효용과 수요의 영향을 받는 가치 개념을 도입하여 주관적 경제학을 예고했습니다.
reviewed: true
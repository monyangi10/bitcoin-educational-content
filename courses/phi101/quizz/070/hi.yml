question: पाठ के अनुसार, Contract सिद्धांतों और बाजार सिद्धांतों में मूलभूत अंतर क्या है?
answer: जीडब्ल्यू-1 सिद्धांत राज्य के दबाव से सामाजिक सामंजस्य चाहते हैं, जबकि बाजार के सिद्धांत व्यक्तिगत हितों को अपने आप सामंजस्य बिठाने देते हैं।
wrong_answers:
  - जीडब्ल्यू-2 के सिद्धांत आदिम समाजों पर लागू होते हैं जबकि बाजार के सिद्धांत आधुनिक समाजों पर लागू होते हैं।
  - जीडब्ल्यू-3 सिद्धांत धन के बंटवारे से जुड़े हैं, जबकि बाजार सिद्धांत सामान और सेवाओं के उत्पादन से संबंधित हैं।
  - Contract सिद्धांतों का समर्थन फिजियोक्रेट्स करते हैं जबकि बाजार सिद्धांतों का समर्थन मर्केंटिलिस्ट्स करते हैं।
explanation: |
  Contract के सिद्धांत सामाजिक सद्भाव को राज्य द्वारा थोपा हुआ मानते हैं, जबकि बाजार के सिद्धांतों का मानना है कि व्यक्तिगत हित, स्वतंत्र रूप से परस्पर क्रिया करके, स्वतः ही एक सामाजिक संतुलन बना देते हैं।

question: ตามข้อความ ความแตกต่างพื้นฐานระหว่างทฤษฎีสัญญาและทฤษฎีตลาดคืออะไร?
answer: ทฤษฎี Contract แสวงหาความกลมกลืนทางสังคมผ่านการบังคับของรัฐ ในขณะที่ทฤษฎีตลาดอนุญาตให้ผลประโยชน์ของแต่ละบุคคลกลมกลืนกันเอง
wrong_answers:
  - ทฤษฎี Contract ใช้กับสังคมดั้งเดิม ในขณะที่ทฤษฎีตลาดใช้กับสังคมสมัยใหม่
  - ทฤษฎี Contract เกี่ยวข้องกับการกระจายความมั่งคั่ง ในขณะที่ทฤษฎีตลาดเกี่ยวข้องกับการผลิตสินค้าและบริการ
  - ทฤษฎี Contract ได้รับการปกป้องโดยนักสรีรศาสตร์ ในขณะที่ทฤษฎีตลาดได้รับการปกป้องโดยนักพาณิชยนิยม
explanation: |
  ทฤษฎี Contract มองว่าความสามัคคีในสังคมถูกกำหนดโดยรัฐ ในขณะที่ทฤษฎีตลาดพิจารณาว่าผลประโยชน์ของแต่ละบุคคล โดยการมีปฏิสัมพันธ์อย่างเสรี สร้างสมดุลทางสังคมขึ้นมาเองโดยธรรมชาติ
reviewed: true
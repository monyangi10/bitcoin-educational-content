question: Jaka jest podstawowa różnica między teoriami Contract a teoriami rynkowymi?
answer: Teorie Contract dążą do harmonii społecznej poprzez przymus państwowy, podczas gdy teorie rynkowe pozwalają indywidualnym interesom harmonizować się samodzielnie.
wrong_answers:
  - Teorie Contract mają zastosowanie do prymitywnych społeczeństw, podczas gdy teorie rynkowe mają zastosowanie do nowoczesnych społeczeństw.
  - Teorie Contract dotyczą dystrybucji bogactwa, podczas gdy teorie rynkowe dotyczą produkcji dóbr i usług.
  - Teorie Contract są bronione przez fizjokratów, podczas gdy teorie rynkowe są bronione przez merkantylistów.
explanation: |
  Teorie Contract postrzegają harmonię społeczną jako narzuconą przez państwo, podczas gdy teorie rynkowe uważają, że indywidualne interesy, poprzez swobodną interakcję, spontanicznie tworzą równowagę społeczną.

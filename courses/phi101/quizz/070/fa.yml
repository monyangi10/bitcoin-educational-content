question: بر اساس متن، تفاوت اساسی بین نظریه‌های Contract و نظریه‌های بازار چیست؟
answer: نظریه‌های Contract به دنبال هماهنگی اجتماعی از طریق اجبار دولتی هستند، در حالی که نظریه‌های بازار اجازه می‌دهند منافع فردی به‌طور خودجوش هماهنگ شوند.
wrong_answers:
  - نظریه‌های Contract به جوامع ابتدایی اعمال می‌شوند در حالی که نظریه‌های بازار به جوامع مدرن اعمال می‌شوند.
  - نظریه‌های Contract به توزیع ثروت مربوط می‌شوند در حالی که نظریه‌های بازار به تولید کالاها و خدمات مربوط می‌شوند.
  - نظریه‌های Contract توسط فیزیوکرات‌ها دفاع می‌شوند در حالی که نظریه‌های بازار توسط مرکانتیلیست‌ها دفاع می‌شوند.
explanation: |
  نظریه‌های Contract هماهنگی اجتماعی را به‌عنوان امری تحمیل‌شده توسط دولت می‌بینند، در حالی که نظریه‌های بازار معتقدند که منافع فردی با تعامل آزادانه به‌طور خودجوش یک تعادل اجتماعی ایجاد می‌کنند.
reviewed: false
question: 본문에 따르면 Contract 이론과 시장 이론의 근본적인 차이점은 무엇인가요?
answer: Contract 이론은 국가의 강압을 통해 사회적 조화를 추구하고, 시장 이론은 개인의 이해관계가 스스로 조화를 이루도록 합니다.
wrong_answers:
  - Contract 이론은 원시 사회에 적용되는 반면, 시장 이론은 현대 사회에 적용됩니다.
  - Contract 이론은 부의 분배에 관한 것이고, 시장 이론은 상품과 서비스의 생산에 관한 것입니다.
  - Contract 이론은 생리학자들이 옹호하는 반면, 시장 이론은 중상주의자들이 옹호합니다.
explanation: |
  Contract 이론은 사회적 조화를 국가가 강요하는 것으로 보는 반면, 시장 이론은 개인의 이해관계가 자유롭게 상호 작용하여 자발적으로 사회적 균형을 이룬다고 봅니다.
reviewed: true
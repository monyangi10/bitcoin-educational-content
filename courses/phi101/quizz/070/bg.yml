question: Според текста каква е основната разлика между теориите за договора и теориите за пазара?
answer: Теориите на Contract търсят социална хармония чрез държавна принуда, докато пазарните теории позволяват на индивидуалните интереси да се хармонизират сами.
wrong_answers:
  - Теориите на Contract се отнасят за примитивните общества, а пазарните теории - за съвременните общества.
  - Теориите на ГС-2 се отнасят до разпределението на богатството, докато пазарните теории - до производството на стоки и услуги.
  - Теориите на Contract се защитават от физиократите, а пазарните теории - от меркантилистите.
explanation: |
  Теориите на Contract разглеждат социалната хармония като наложена от държавата, докато пазарните теории смятат, че индивидуалните интереси, взаимодействайки си свободно, спонтанно създават социално равновесие.
reviewed: true
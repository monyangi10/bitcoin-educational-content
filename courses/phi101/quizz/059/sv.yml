question: På vilken grund hävdade lärarna vid Salamancaskolan att ursprungsbefolkningen hade rätt till sina landområden?
answer: Naturlagar.
wrong_answers:
  - Gudomlig rätt.
  - Erövrarnas rätt.
  - Internationell rätt.
explanation: |
  Forskarna vid Salamancaskolan hävdade att ursprungsbefolkningen hade rätt till sina marker enligt naturrätten, eftersom alla människor har grundläggande rättigheter oberoende av religiös tro eller erövringar.
reviewed: true
question: دانشکده سالامانکا بر چه اساسی استدلال کرد که مردم بومی حق داشتن سرزمین‌های خود را دارند؟
answer: قانون طبیعی.
wrong_answers:
  - حق الهی.
  - حق فاتحان.
  - قانون بین‌الملل.
explanation: |
  دانشوران مدرسه سالامانکا اظهار داشتند که مردم بومی بر اساس قانون طبیعی حق داشتن سرزمین‌های خود را دارند، با این استدلال که همه انسان‌ها دارای حقوق اساسی هستند که مستقل از باورهای مذهبی یا فتوحات است.
reviewed: false
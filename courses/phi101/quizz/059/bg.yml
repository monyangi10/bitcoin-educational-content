question: На какво основание учените от школата в Саламанка твърдят, че коренното население има права върху земите си?
answer: Естествено право.
wrong_answers:
  - Божествено право.
  - Правото на завоевателите.
  - Международно право.
explanation: |
  Учените от училището в Саламанка твърдят, че коренното население има права върху земите си въз основа на естественото право, като смятат, че всички човешки същества имат основни права, независимо от религиозни убеждения или завоевания.
reviewed: true
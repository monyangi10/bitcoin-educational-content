question: Ni igiki intiti zo mw’Ishure ry’i Salamanca zashingiyeko ku vy’uko Abasangwabutaka bari bafise uburenganzira ku bihugu vyabo?
answer: Itegeko ry’ibidukikije.
wrong_answers:
  - Uburenganzira bw’Imana.
  - Uburenganzira bw’abanesheje.
  - Amategeko mpuzamakungu.
explanation: |
  Intiti zo mw’ishure rya Salamanca zemeje ko Abasangwabutaka bari bafise uburenganzira ku bihugu vyabo bishingiye ku mategeko kavukire, babona ko abantu bose bafise uburenganzira bw’ishimikiro butajanye n’ivyo bemera canke ivyo bigaruriye.
reviewed: true
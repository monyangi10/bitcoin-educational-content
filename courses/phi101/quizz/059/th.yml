question: นักวิชาการจาก School of Salamanca ให้เหตุผลว่าชนพื้นเมืองมีสิทธิในที่ดินของตนบนพื้นฐานของกฎหมายธรรมชาติและศีลธรรม โดยยืนยันว่าทุกคนมีสิทธิในทรัพย์สินและการปกครองตนเอง ซึ่งไม่สามารถถูกลิดรอนได้โดยไม่มีเหตุผลที่ชอบธรรม
answer: กฎธรรมชาติ
wrong_answers:
  - สิทธิ์อันศักดิ์สิทธิ์
  - สิทธิของผู้พิชิต
  - กฎหมายระหว่างประเทศ
explanation: |
  นักวิชาการจากโรงเรียนซาลามังกาได้ยืนยันว่าชนพื้นเมืองมีสิทธิในที่ดินของตนตามกฎหมายธรรมชาติ โดยพิจารณาว่ามนุษย์ทุกคนมีสิทธิพื้นฐานที่เป็นอิสระจากความเชื่อทางศาสนาหรือการพิชิต
reviewed: true
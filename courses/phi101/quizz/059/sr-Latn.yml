question: Na kojoj osnovi su učenjaci Škole iz Salamanke tvrdili da autohtoni narodi imaju prava na svoje zemlje?
answer: Prirodni zakon.
wrong_answers:
  - Božansko pravo.
  - Pravo osvajača.
  - Međunarodno pravo.
explanation: |
  Naučnici Škole iz Salamanke tvrdili su da domorodački narodi imaju prava na svoje zemlje na osnovu prirodnog prava, s obzirom na to da sva ljudska bića imaju osnovna prava nezavisno od verskih uverenja ili osvajanja.

question: Vad var syftet med det bröd och de spel som de romerska kejsarna anordnade?
answer: Att underhålla folket och avleda deras uppmärksamhet från politiska problem
wrong_answers:
  - Att främja romersk kultur och konst
  - Att utbilda soldater och förbereda medborgarna för krig
  - Att stimulera ekonomin och skapa arbetstillfällen
explanation: |
  Brödet och spelen var utformade för att underhålla folket och avleda deras uppmärksamhet från politiska och ekonomiska svårigheter, vilket gjorde det möjligt för ledarna att upprätthålla social fred genom att tillhandahålla underhållning och distribuera mat.
reviewed: true
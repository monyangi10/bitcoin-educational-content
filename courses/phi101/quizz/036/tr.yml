question: Roma imparatorları tarafından düzenlenen ekmek ve oyunların amacı neydi?
answer: İnsanları eğlendirmek ve dikkatlerini siyasi sorunlardan uzaklaştırmak
wrong_answers:
  - Roma kültür ve sanatını tanıtmak
  - Askerleri eğitmek ve vatandaşları savaşa hazırlamak
  - Ekonomiyi canlandırmak ve istihdam yaratmak için
explanation: |
  Ekmek ve oyunlar halkı eğlendirmek ve dikkatlerini siyasi ve ekonomik zorluklardan başka yöne çekmek için tasarlanmış, liderlerin eğlence sağlayarak ve yiyecek dağıtarak toplumsal barışı korumalarına olanak tanımıştır.
reviewed: true
question: วัตถุประสงค์ของการจัดขนมปังและเกมโดยจักรพรรดิโรมันคืออะไร?
answer: เพื่อสร้างความบันเทิงให้กับประชาชนและเบี่ยงเบนความสนใจจากปัญหาทางการเมือง
wrong_answers:
  - เพื่อส่งเสริมวัฒนธรรมและศิลปะโรมัน
  - ฝึกทหารและเตรียมพลเมืองสำหรับสงคราม
  - เพื่อกระตุ้นเศรษฐกิจและสร้างงาน
explanation: |
  ขนมปังและเกมถูกออกแบบมาเพื่อสร้างความบันเทิงให้กับประชาชนและเบี่ยงเบนความสนใจจากปัญหาทางการเมืองและเศรษฐกิจ ทำให้ผู้นำสามารถรักษาความสงบเรียบร้อยของสังคมได้โดยการให้ความบันเทิงและแจกจ่ายอาหาร
reviewed: true
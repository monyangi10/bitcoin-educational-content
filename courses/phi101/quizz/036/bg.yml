question: Каква е била целта на хляба и игрите, организирани от римските императори?
answer: Да забавлява хората и да отклонява вниманието им от политическите проблеми
wrong_answers:
  - Популяризиране на римската култура и изкуство
  - Да обучава войници и да подготвя гражданите за война
  - Стимулиране на икономиката и създаване на работни места
explanation: |
  Хлябът и игрите са предназначени да забавляват хората и да отклоняват вниманието им от политическите и икономическите трудности, което позволява на лидерите да поддържат социалния мир чрез осигуряване на развлечения и раздаване на храна.
reviewed: true
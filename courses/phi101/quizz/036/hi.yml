question: रोमन सम्राटों द्वारा आयोजित रोटी और खेलों का उद्देश्य क्या था?
answer: लोगों का मनोरंजन करना और उनका ध्यान राजनीतिक समस्याओं से हटाना
wrong_answers:
  - रोमन संस्कृति और कला को बढ़ावा देना
  - सैनिकों को प्रशिक्षित करना और नागरिकों को युद्ध के लिए तैयार करना
  - अर्थव्यवस्था को प्रोत्साहित करना और रोजगार सृजन करना
explanation: |
  रोटी और खेल लोगों का मनोरंजन करने तथा उनका ध्यान राजनीतिक और आर्थिक कठिनाइयों से हटाने के लिए बनाये गये थे, जिससे नेताओं को मनोरंजन और भोजन वितरण के माध्यम से सामाजिक शांति बनाये रखने में मदद मिली।

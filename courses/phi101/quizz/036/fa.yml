question: هدف از نان و بازی‌هایی که توسط امپراتوران روم برگزار می‌شد چه بود؟
answer: برای سرگرم کردن مردم و منحرف کردن توجه آن‌ها از مشکلات سیاسی
wrong_answers:
  - برای ترویج فرهنگ و هنر رومی
  - آموزش سربازان و آماده‌سازی شهروندان برای جنگ
  - برای تحریک اقتصاد و ایجاد شغل‌ها
explanation: |
  نان و بازی‌ها طراحی شده بودند تا مردم را سرگرم کنند و توجه آن‌ها را از مشکلات سیاسی و اقتصادی منحرف کنند، و به رهبران اجازه دهند با ارائه سرگرمی و توزیع غذا، صلح اجتماعی را حفظ کنند.
reviewed: false
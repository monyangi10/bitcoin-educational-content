question: तर्क और विश्वास के बीच संबंध के बारे में थॉमस एक्विनास का मुख्य सिद्धांत क्या है?
answer: तर्क और विश्वास एक दूसरे के पूरक हैं और एक दूसरे को सहायता प्रदान कर सकते हैं।
wrong_answers:
  - तर्क और विश्वास ज्ञान के दो स्वतंत्र और विरोधाभासी स्रोत हैं।
  - अन्य सभी उत्तर सही हैं.
  - आस्था तर्क से श्रेष्ठ है और बिना तर्क के भी चल सकती है।
explanation: |
  थॉमस एक्विनास का तर्क है कि तर्क और विश्वास एक दूसरे के पूरक हैं: तर्क विश्वास के सत्य को समझने और समझाने में मदद कर सकता है, जबकि विश्वास तर्क को उन सत्यों की ओर निर्देशित करता है जो अन्यथा उसके लिए दुर्गम होते।
reviewed: false
question: نظریه اصلی توماس آکویناس در مورد رابطه بین عقل و ایمان چیست؟
answer: عقل و ایمان مکمل یکدیگرند و می‌توانند از همدیگر حمایت کنند.
wrong_answers:
  - عقل و ایمان دو منبع مستقل و متناقض دانش هستند.
  - همه پاسخ‌های دیگر صحیح هستند.
  - ایمان برتر از عقل است و می‌تواند بدون استدلال‌های آن عمل کند.
explanation: |
  توماس آکویناس استدلال می‌کند که عقل و ایمان مکمل یکدیگرند: عقل می‌تواند به درک و توضیح حقایق ایمان کمک کند، در حالی که ایمان عقل را به سوی حقایقی هدایت می‌کند که در غیر این صورت برای آن غیرقابل دسترس خواهند بود.
reviewed: false
question: Каква е основната теза на Тома Аквински относно връзката между разума и вярата?
answer: Разумът и вярата се допълват и могат да се подкрепят взаимно.
wrong_answers:
  - Разумът и вярата са два независими и противоречиви източника на познание.
  - Всички други отговори са верни.
  - Вярата е по-висша от разума и може да се справи без неговите аргументи.
explanation: |
  Тома Аквински твърди, че разумът и вярата се допълват; разумът може да помогне да се разберат и обяснят истините на вярата. За разлика от това вярата насочва разума към истини, които иначе биха били недостъпни за него.
reviewed: true
question: 이성과 신앙의 관계에 관한 토마스 아퀴나스의 주요 논지는 무엇인가요?
answer: 이성과 신앙은 상호 보완적이며 서로를 지지할 수 있습니다.
wrong_answers:
  - 이성과 믿음은 서로 독립적이고 모순되는 두 가지 지식의 원천입니다.
  - 다른 모든 답은 정답입니다.
  - 믿음은 이성보다 우월하며 논증 없이도 할 수 있습니다.
explanation: |
  토마스 아퀴나스는 이성과 신앙은 상호 보완적인 것으로, 이성은 신앙의 진리를 이해하고 설명하는 데 도움을 줄 수 있다고 주장합니다. 반대로 신앙은 이성이 접근하기 어려운 진리를 향해 이성을 인도합니다.
reviewed: true
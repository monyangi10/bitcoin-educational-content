question: Prema Svetom Augustinu, kako Bog pomiruje činjenicu da je dao slobodnu volju čoveku sa činjenicom da je svemoćan i sveznajući?
answer: Bog dopušta zlo kako bi ljudi mogli učiti iz svojih grešaka i duhovno rasti.
wrong_answers:
  - Bog nije odgovoran za zlo koje ljudi odluče da čine svojom slobodnom voljom.
  - Bog nema moć da spreči ljude da biraju zlo.
  - Sve od navedenog.
explanation: |
  Sveti Avgustin veruje da dopuštanjem slobodne volje, Bog ostavlja mogućnost zla kako bi ljudi mogli učiti i usavršavati se, čineći slobodu sredstvom duhovnog rasta uprkos pogrešnim izborima.
reviewed: false
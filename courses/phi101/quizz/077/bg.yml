question: Какво е заглавието на книгата на Томас Пейн?
answer: Здравият разум.
wrong_answers:
  - Уникалният смисъл.
  - Общото благо.
  - Нито един от горните отговори не е верен.
explanation: |
  Книгата на Томас Пейн, озаглавена "Здравият разум" (на френски: Le sens commun), е влиятелен памфлет, който защитава американската независимост и осъжда британската тирания, като играе ключова роля за мобилизирането на колонистите.
reviewed: true
question: What is the title of Thomas Paine's book?
answer: สามัญสำนึก
wrong_answers:
  - ความรู้สึกที่ไม่เหมือนใคร
  - ความดีส่วนรวม
  - ไม่มีคำตอบใดข้างต้นถูกต้อง
explanation: |
  หนังสือของโธมัส เพน ชื่อว่า Common Sense (Le sens commun ในภาษาฝรั่งเศส) เป็นแผ่นพับที่มีอิทธิพลซึ่งโต้แย้งเพื่อเอกราชของอเมริกาและประณามการกดขี่ของอังกฤษ โดยมีบทบาทสำคัญในการระดมชาวอาณานิคม
reviewed: true
question: عنوان کتاب توماس پین چیست؟
answer: عقل سلیم.
wrong_answers:
  - حس منحصر به فرد.
  - خیر عمومی.
  - هیچ‌کدام از پاسخ‌های بالا صحیح نیست.
explanation: |
  کتاب توماس پین، با عنوان عقل سلیم (Le sens commun به زبان فرانسوی)، یک جزوه تأثیرگذار است که برای استقلال آمریکا استدلال کرده و استبداد بریتانیا را محکوم می‌کند و نقش کلیدی در بسیج مستعمره‌نشینان ایفا کرد.
reviewed: false
question: तुर्गो का धार्मिक सत्य के प्रति क्या रवैया था?
answer: धार्मिक सच्चाई व्यक्ति की अपनी अंतरात्मा का मामला है और इसे किसी भी अधिकारी द्वारा थोपा नहीं जा सकता।
wrong_answers:
  - धार्मिक सच्चाई सापेक्ष होती है और उस संस्कृति और युग पर निर्भर करती है जिसमें कोई रहता है।
  - धार्मिक सत्य मनुष्य की पहुँच से बाहर है और किसी भी निश्चितता का विषय नहीं हो सकता।
  - धार्मिक सच्चाई को राजनीतिक ताकत द्वारा तय किया जाना चाहिए और सभी नागरिकों पर थोपा जाना चाहिए।
explanation: |
  तुर्गो ने धार्मिक सच्चाई को व्यक्तिगत विवेक से जुड़ा मामला माना, और यह दावा किया कि सत्ता को व्यक्तियों पर धार्मिक मान्यताएँ थोपने का कोई अधिकार नहीं है।

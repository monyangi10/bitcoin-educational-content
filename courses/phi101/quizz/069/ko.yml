question: 종교적 진리에 대한 투르고의 태도는 어땠나요?
answer: 종교적 진리는 개인의 양심의 문제이며 어떤 권위에 의해서도 강요될 수 없습니다.
wrong_answers:
  - 종교적 진리는 상대적이며 자신이 살고 있는 문화와 시대에 따라 달라집니다.
  - 종교적 진리는 인간이 접근할 수 없으며 어떤 확실성의 대상이 될 수 없습니다.
  - 종교적 진실은 정치 권력에 의해 결정되고 모든 시민에게 강요되어야 합니다.
explanation: |
  투르고는 종교적 진리를 개인의 양심과 관련된 개인적인 문제로 간주하여 권위가 개인에게 종교적 신념을 강요할 권리가 없다고 주장했습니다.
reviewed: true
question: نگرش تورگو به حقیقت دینی چه بود؟
answer: حقیقت دینی مسئله‌ای است که به وجدان فردی مربوط می‌شود و نمی‌توان آن را توسط هیچ مرجعی تحمیل کرد.
wrong_answers:
  - حقیقت دینی نسبی است و به فرهنگ و دوره‌ای که فرد در آن زندگی می‌کند بستگی دارد.
  - حقیقت دینی برای انسان غیرقابل دسترسی است و نمی‌تواند موضوع هیچ قطعیتی باشد.
  - حقیقت دینی باید توسط قدرت سیاسی تعیین شود و بر همه شهروندان تحمیل گردد.
explanation: |
  تورگو حقیقت دینی را به عنوان یک مسئله شخصی مربوط به وجدان فردی در نظر می‌گرفت و اظهار می‌داشت که اقتدار حق ندارد باورهای دینی را بر افراد تحمیل کند.
reviewed: false
question: Какво е било отношението на Турго към религиозната истина?
answer: Религиозната истина е въпрос на индивидуална съвест и не може да бъде наложена от никакъв орган.
wrong_answers:
  - Религиозната истина е относителна и зависи от културата и епохата, в която човек живее.
  - Религиозната истина е недостъпна за човека и не може да бъде предмет на каквато и да било сигурност.
  - Религиозната истина трябва да се определя от политическата власт и да се налага на всички граждани.
explanation: |
  Турго смята, че религиозната истина е личен въпрос, свързан с индивидуалната съвест, и твърди, че властта няма право да налага религиозни убеждения на хората.
reviewed: true
question: ทัศนคติของเทอร์กอตต่อความจริงทางศาสนาเป็นอย่างไร?
answer: ความจริงทางศาสนาเป็นเรื่องของมโนธรรมส่วนบุคคลและไม่สามารถถูกบังคับโดยอำนาจใด ๆ ได้
wrong_answers:
  - ความจริงทางศาสนาเป็นสิ่งสัมพัทธ์และขึ้นอยู่กับวัฒนธรรมและยุคสมัยที่บุคคลอาศัยอยู่
  - ความจริงทางศาสนาไม่สามารถเข้าถึงได้โดยมนุษย์และไม่สามารถเป็นหัวข้อของความแน่นอนได้
  - ความจริงทางศาสนาต้องถูกกำหนดโดยอำนาจทางการเมืองและบังคับใช้กับพลเมืองทุกคน
explanation: |
  Turgot พิจารณาความจริงทางศาสนาเป็นเรื่องส่วนบุคคลที่เกี่ยวข้องกับมโนธรรมของแต่ละบุคคล โดยยืนยันว่าอำนาจไม่มีสิทธิ์ที่จะบังคับให้บุคคลยอมรับความเชื่อทางศาสนา
reviewed: true
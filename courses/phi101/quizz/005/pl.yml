question: Jaki jest dominujący pogląd na władzę w zachodniej filozofii i historiografii?
answer: Władza jest korumpującą siłą, która prowadzi do ucisku
wrong_answers:
  - Moc jest niezbędna dla postępu i dobrobytu ludzkości
  - Władza jest neutralnym narzędziem, które może być wykorzystane dla dobra lub zła
  - Wszystkie powyższe
explanation: |
  W zachodniej filozofii i historiografii władza jest często postrzegana jako siła korumpująca, która może prowadzić do ucisku i nadużyć, podkreślając niebezpieczeństwa związane z koncentracją władzy i negatywny wpływ na wolność jednostki.

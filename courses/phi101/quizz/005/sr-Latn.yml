question: Koji je dominantni pogled na moć u zapadnoj filozofiji i istoriografiji?
answer: Moć je sila koja korumpira i vodi ka ugnjetavanju
wrong_answers:
  - Moć je neophodna za napredak i prosperitet čovečanstva.
  - Moć je neutralno sredstvo koje se može koristiti za dobro ili zlo.
  - Sve od navedenog
explanation: |
  U zapadnoj filozofiji i istoriografiji, moć se često posmatra kao korumpirajuća sila, koja verovatno vodi ka ugnjetavanju i zloupotrebi, ističući opasnosti koncentracije autoriteta i negativne posledice po individualnu slobodu.

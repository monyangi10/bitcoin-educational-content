question: دیدگاه غالب درباره قدرت در فلسفه و تاریخ‌نگاری غربی چیست؟
answer: قدرت نیرویی فاسدکننده است که به سرکوب منجر می‌شود
wrong_answers:
  - قدرت برای پیشرفت و شکوفایی بشریت ضروری است
  - قدرت ابزاری خنثی است که می‌تواند برای خیر یا شر استفاده شود
  - همه موارد فوق
explanation: |
  در فلسفه و تاریخ‌نگاری غربی، قدرت اغلب به عنوان نیرویی فاسدکننده دیده می‌شود که احتمالاً به سرکوب و سوءاستفاده منجر می‌شود و خطرات تمرکز قدرت و تأثیرات منفی بر آزادی فردی را برجسته می‌کند.
reviewed: false
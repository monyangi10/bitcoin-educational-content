question: Какъв е доминиращият възглед за властта в западната философия и историография?
answer: Властта е корумпираща сила, която води до потисничество
wrong_answers:
  - Силата е необходима за напредъка и просперитета на човечеството
  - Властта е неутрален инструмент, който може да се използва за добро или зло
  - Всичко изброено по-горе
explanation: |
  В западната философия и историография властта често се разглежда като развращаваща сила, която може да доведе до потисничество и злоупотреба, като се подчертават опасностите от концентрацията на власт и отрицателното въздействие върху свободата на личността.
reviewed: true
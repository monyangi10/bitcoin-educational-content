question: Jaka jest główna różnica między teoriami Locke'a i Rousseau na temat suwerenności?
answer: Locke wierzył, że suwerenność jest ograniczona przez prawa naturalne, podczas gdy Rousseau uważał, że jest ona nieograniczona.
wrong_answers:
  - Locke wierzył, że suwerenność należy do monarchy, podczas gdy Rousseau uważał, że należy ona do ludu.
  - Locke wierzył, że najlepszą formą rządu jest demokracja, podczas gdy Rousseau uważał, że najlepszą formą rządu jest republika.
  - Wszystkie pozostałe odpowiedzi są poprawne.
explanation: |
  Locke argumentował, że suwerenność państwa jest ograniczona naturalnymi prawami jednostek, podczas gdy Rousseau uważał, że ogólna suwerenność może być wykonywana bez ograniczeń w imię zbiorowej woli.

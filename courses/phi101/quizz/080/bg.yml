question: Каква е основната разлика между теориите на Лок и Русо за суверенитета?
answer: Лок смята, че суверенитетът е ограничен от естествените права, докато Русо вярва, че той е неограничен.
wrong_answers:
  - Лок смята, че суверенитетът принадлежи на монарха, а Русо - че принадлежи на народа.
  - Лок смята, че най-добрата форма на управление е демокрацията, а Русо - че най-добрата форма на управление е републиката.
  - Всички останали отговори са верни.
explanation: |
  Лок твърди, че суверенитетът на държавата е ограничен от естествените права на индивидите. За разлика от него Русо смята, че общият суверенитет може да се упражнява без ограничения в името на колективната воля.
reviewed: true
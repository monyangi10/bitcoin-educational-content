question: ความแตกต่างหลักระหว่างทฤษฎีของล็อคและรูโซเกี่ยวกับอธิปไตยคืออะไร?
answer: ล็อคเชื่อว่าอธิปไตยถูกจำกัดโดยสิทธิตามธรรมชาติ ในขณะที่รูโซเชื่อว่าอธิปไตยนั้นไม่มีขีดจำกัด
wrong_answers:
  - ล็อคเชื่อว่าอำนาจอธิปไตยเป็นของพระมหากษัตริย์ ในขณะที่รูโซเชื่อว่าเป็นของประชาชน
  - ล็อคเชื่อว่ารูปแบบการปกครองที่ดีที่สุดคือประชาธิปไตย ในขณะที่รูโซเชื่อว่ารูปแบบการปกครองที่ดีที่สุดคือสาธารณรัฐ
  - คำตอบอื่น ๆ ทั้งหมดถูกต้อง
explanation: |
  ล็อคโต้แย้งว่าอธิปไตยของรัฐถูกจำกัดโดยสิทธิตามธรรมชาติของปัจเจกบุคคล ในทางตรงกันข้าม รูโซรู้สึกว่าอธิปไตยทั่วไปสามารถถูกใช้อำนาจได้โดยไม่มีขีดจำกัดในนามของเจตจำนงร่วมของประชาชน
reviewed: true
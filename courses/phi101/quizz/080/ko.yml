question: 주권에 관한 로크와 루소 이론의 주요 차이점은 무엇인가요?
answer: 로크는 주권이 자연권에 의해 제한된다고 믿었지만 루소는 주권이 무제한적이라고 믿었습니다.
wrong_answers:
  - 로크는 주권이 군주에게 있다고 믿었고, 루소는 주권이 국민에게 있다고 믿었습니다.
  - 로크는 최고의 정부 형태가 민주주의라고 믿었고, 루소는 최고의 정부 형태가 공화제라고 믿었습니다.
  - 다른 모든 정답이 맞습니다.
explanation: |
  로크는 국가의 주권은 개인의 자연권에 의해 제약을 받는다고 주장했습니다. 반면 루소는 집단 의지의 이름으로 일반 주권이 제한 없이 행사될 수 있다고 생각했습니다.
reviewed: true
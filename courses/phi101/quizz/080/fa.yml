question: تفاوت اصلی بین نظریات لاک و روسو در مورد حاکمیت چیست؟
answer: لاک معتقد بود که حاکمیت توسط حقوق طبیعی محدود می‌شود، در حالی که روسو معتقد بود که حاکمیت نامحدود است.
wrong_answers:
  - لاک معتقد بود که حاکمیت به پادشاه تعلق دارد، در حالی که روسو معتقد بود که به مردم تعلق دارد.
  - لاک معتقد بود که بهترین شکل حکومت دموکراسی است، در حالی که روسو معتقد بود بهترین شکل حکومت جمهوری است.
  - همه پاسخ‌های دیگر صحیح هستند.
explanation: |
  لاک استدلال کرد که حاکمیت دولت توسط حقوق طبیعی افراد محدود می‌شود، در حالی که روسو معتقد بود که حاکمیت عمومی می‌تواند بدون محدودیت به نام اراده جمعی اعمال شود.
reviewed: false
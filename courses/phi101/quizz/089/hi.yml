question: कॉन्स्टेंट द्वारा प्रस्तावित सार्वजनिक और निजी क्षेत्र के बीच सख़्त सीमा का क्या मतलब है?
answer: यह सीमा दर्शाती है कि राज्य को व्यक्तियों के निजी जीवन में दखल नहीं देना चाहिए।
wrong_answers:
  - यह सीमा यह दर्शाती है कि व्यक्तियों को सार्वजनिक मामलों में दखल नहीं देना चाहिए।
  - यह सीमा चर्च और राज्य के बीच पूर्ण अलगाव को दर्शाती है।
  - यह सीमा यह दर्शाती है कि व्यक्तियों को सार्वजनिक और निजी दोनों क्षेत्रों में समान स्वतंत्रताएँ होनी चाहिए।
explanation: |
  बेंजामिन कॉन्स्टेंट के लिए, सार्वजनिक और निजी क्षेत्रों के बीच एक सख़्त सीमा का मतलब है कि राज्य को व्यक्तियों की निजता का सम्मान करना चाहिए और उन व्यक्तिगत चुनावों में किसी भी तरह के हस्तक्षेप से बचना चाहिए जो सार्वजनिक क्षेत्र से संबंधित नहीं हैं।
reviewed: false
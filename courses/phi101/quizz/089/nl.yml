question: Wat houdt de strikte grens tussen de publieke sfeer en de privésfeer in die Constant voorstaat?
answer: Deze grens impliceert dat de staat zich niet mag mengen in het privéleven van individuen.
wrong_answers:
  - Deze grens houdt in dat individuen zich niet moeten bemoeien met publieke zaken.
  - Deze grens impliceert een totale scheiding tussen de kerk en de staat.
  - Deze grens impliceert dat individuen dezelfde vrijheden moeten hebben in zowel de publieke als de private sfeer.
explanation: |
  Voor Benjamin Constant betekent een strikte grens tussen de publieke en private sfeer dat de staat de privacy van individuen moet respecteren en zich niet moet bemoeien met persoonlijke keuzes die geen betrekking hebben op het publieke domein.
reviewed: true
question: Co oznacza postulowana przez Constanta ścisła granica między sferą publiczną a prywatną?
answer: Granica ta oznacza, że państwo nie powinno ingerować w życie prywatne jednostek.
wrong_answers:
  - Granica ta oznacza, że jednostki nie powinny angażować się w sprawy publiczne.
  - Granica ta oznacza całkowity rozdział Kościoła od państwa.
  - Granica ta oznacza, że jednostki muszą mieć takie same wolności zarówno w sferze publicznej, jak i prywatnej.
explanation: |
  Dla Benjamina Constanta ścisła granica między sferą publiczną i prywatną oznacza, że państwo musi szanować prywatność jednostek i unikać jakiejkolwiek interwencji w osobiste wybory, które nie dotyczą domeny publicznej.
reviewed: false
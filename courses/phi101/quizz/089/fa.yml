question: مرز سخت بین حوزه عمومی و حوزه خصوصی که توسط کنستانت ترویج می‌شود، چه مفهومی دارد؟
answer: این مرز به این معناست که دولت نباید در زندگی خصوصی افراد دخالت کند.
wrong_answers:
  - این مرز به این معناست که افراد نباید در امور عمومی دخالت کنند.
  - این مرز به معنای جدایی کامل بین کلیسا و دولت است.
  - این مرز به این معناست که افراد باید در هر دو حوزه عمومی و خصوصی از آزادی‌های یکسانی برخوردار باشند.
explanation: |
  برای بنجامین کنستانت، مرز سخت‌گیرانه‌ای بین حوزه‌های عمومی و خصوصی به این معناست که دولت باید به حریم خصوصی افراد احترام بگذارد و از هرگونه مداخله در انتخاب‌های شخصی که به حوزه عمومی مربوط نمی‌شود، اجتناب کند.
reviewed: false
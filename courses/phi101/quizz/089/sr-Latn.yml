question: Šta podrazumeva stroga granica između javne sfere i privatne sfere koju zagovara Constant?
answer: Ova granica implicira da država ne bi trebala da se meša u privatne živote pojedinaca.
wrong_answers:
  - Ova granica implicira da pojedinci ne bi trebalo da se uključuju u javne poslove.
  - Ova granica podrazumeva potpunu odvojenost između Crkve i Države.
  - Ova granica podrazumeva da pojedinci moraju imati iste slobode i u javnoj i u privatnoj sferi.
explanation: |
  Za Benjamina Constanta, stroga granica između javne i privatne sfere znači da država mora poštovati privatnost pojedinaca i izbegavati bilo kakvu intervenciju u lične izbore koji se ne tiču javne sfere.

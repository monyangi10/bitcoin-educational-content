question: ขอบเขตที่เข้มงวดระหว่างพื้นที่สาธารณะและพื้นที่ส่วนตัวที่ Constant สนับสนุนมีความหมายว่าอย่างไร?
answer: ขอบเขตนี้หมายความว่ารัฐไม่ควรแทรกแซงในชีวิตส่วนตัวของบุคคล
wrong_answers:
  - ขอบเขตนี้หมายความว่าบุคคลไม่ควรเข้าไปยุ่งเกี่ยวกับกิจการสาธารณะ
  - ขอบเขตนี้หมายถึงการแยกออกจากกันโดยสิ้นเชิงระหว่างศาสนจักรและรัฐ
  - ขอบเขตนี้หมายความว่าบุคคลต้องมีเสรีภาพเท่าเทียมกันทั้งในพื้นที่สาธารณะและส่วนตัว
explanation: |
  สำหรับ Benjamin Constant การมีขอบเขตที่ชัดเจนระหว่างสาธารณะและส่วนตัวหมายความว่ารัฐต้องเคารพความเป็นส่วนตัวของบุคคลและหลีกเลี่ยงการแทรกแซงในทางเลือกส่วนบุคคลที่ไม่เกี่ยวข้องกับสาธารณะ
reviewed: true
question: Какво означава строгата граница между публичната и частната сфера, за която се застъпва Констант?
answer: Тази граница предполага, че държавата не трябва да се намесва в личния живот на хората.
wrong_answers:
  - Тази граница предполага, че хората не трябва да се месят в обществените дела.
  - Тази граница предполага пълно разделение между Църквата и държавата.
  - Тази граница предполага, че хората трябва да имат еднакви свободи както в публичната, така и в частната сфера.
explanation: |
  За Бенджамин Констант строгата граница между публичната и частната сфера означава, че държавата трябва да зачита личния живот на хората и да избягва всякаква намеса в личния избор, който не засяга публичната сфера.
reviewed: true
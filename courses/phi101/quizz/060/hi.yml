question: कैपिटलिज़्म (पूंजीवाद) किस धार्मिक संदर्भ में पैदा हुआ था?
answer: ईसाई धर्म के संदर्भ में।
wrong_answers:
  - इस्लाम के संदर्भ में।
  - यहूदी धर्म के संदर्भ में।
  - पगनवाद के संदर्भ में।
explanation: |
  पूंजीवाद की शुरुआत यूरोप के मध्यकालीन ईसाई धर्म के दौरान हुई थी, जहां व्यापारिक शहरों और आर्थिक प्रथाओं का विकास हुआ, भले ही धर्म ने ब्याज वाले कर्ज और सूदखोरी पर पाबंदी लगा रखी थी।

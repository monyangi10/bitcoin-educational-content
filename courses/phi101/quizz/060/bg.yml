question: В какъв религиозен контекст се ражда капитализмът?
answer: В контекста на християнството.
wrong_answers:
  - В контекста на исляма.
  - В контекста на юдаизма.
  - В контекста на езичеството.
explanation: |
  Капитализмът се заражда в контекста на средновековното християнство в Европа, където търговските градове и икономическите практики се развиват въпреки религиозните ограничения върху лихвените заеми и лихварството.
reviewed: true
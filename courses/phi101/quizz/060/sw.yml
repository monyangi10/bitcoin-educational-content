question: Ubepari ulizaliwa katika mazingira gani ya kidini?
answer: Katika muktadha wa Ukristo.
wrong_answers:
  - Katika muktadha wa Uislamu.
  - Katika muktadha wa Uyahudi.
  - Katika mazingira ya upagani.
explanation: |
  Ubepari ulianzia katika muktadha wa Ukristo wa enzi za kati huko Uropa, ambapo miji ya wafanyabiashara na mazoea ya kiuchumi yalibadilika licha ya vikwazo vya kidini kwa mikopo yenye riba na riba.

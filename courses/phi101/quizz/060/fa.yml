question: سرمایه‌داری در چه زمینه مذهبی متولد شد؟
answer: در زمینه مسیحیت.
wrong_answers:
  - در زمینه اسلام.
  - در زمینه یهودیت.
  - در زمینه پاگانیسم.
explanation: |
  سرمایه‌داری در بستر مسیحیت قرون وسطی در اروپا شکل گرفت، جایی که شهرهای تجاری و شیوه‌های اقتصادی علی‌رغم محدودیت‌های مذهبی بر وام‌های بهره‌دار و ربا توسعه یافتند.
reviewed: false
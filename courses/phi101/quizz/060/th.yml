question: ในบริบททางศาสนาใดที่ทุนนิยมถือกำเนิดขึ้น?
answer: ในบริบทของศาสนาคริสต์
wrong_answers:
  - ในบริบทของศาสนาอิสลาม
  - ในบริบทของศาสนายูดาย
  - ในบริบทของลัทธินอกศาสนา
explanation: |
  ทุนนิยมมีต้นกำเนิดในบริบทของศาสนาคริสต์ยุคกลางในยุโรป ซึ่งเมืองการค้าและแนวปฏิบัติทางเศรษฐกิจได้พัฒนาขึ้นแม้จะมีข้อจำกัดทางศาสนาเกี่ยวกับเงินกู้ที่มีดอกเบี้ยและการปล่อยเงินกู้เกินกำหนด
reviewed: true
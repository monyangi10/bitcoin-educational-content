question: Vad är Constants kritik av Rousseau och hans frihetsbegrepp?
answer: Constant kritiserar Rousseau för att han blandar ihop antikens frihet med modernitetens.
wrong_answers:
  - Constant kritiserar Rousseau för att förespråka demokrati.
  - Constant kritiserar Rousseau för att förneka vikten av val.
  - Constant kritiserar Rousseau för att stödja revolutionärt våld.
explanation: |
  Constant anklagar Rousseau för att värdesätta ett frihetsbegrepp som inspirerats av antiken, med fokus på kollektivt deltagande, på bekostnad av den individuella frihet som kännetecknar moderna samhällen, där den privata sfären måste skyddas.
reviewed: true
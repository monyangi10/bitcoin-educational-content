question: Jaka jest krytyka Rousseau i jego koncepcji wolności przeprowadzona przez Constanta?
answer: Constant krytykuje Rousseau za mylenie wolności starożytnych z wolnością nowożytnych.
wrong_answers:
  - Constant krytykuje Rousseau za popieranie demokracji.
  - Constant krytykuje Rousseau za negowanie znaczenia wyborów.
  - Constant krytykuje Rousseau za wspieranie rewolucyjnej przemocy.
explanation: |
  Constant zarzuca Rousseau, że ceni koncepcję wolności zainspirowaną przez starożytnych, skupioną na zbiorowym uczestnictwie, kosztem indywidualnej wolności charakterystycznej dla nowoczesnych społeczeństw, w których sfera prywatna musi być chroniona.

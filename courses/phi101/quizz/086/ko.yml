question: 루소에 대한 콘스탄트의 비판과 그의 자유 개념은 무엇인가요?
answer: 콘스탄트는 루소가 고대의 자유와 현대의 자유를 혼동했다고 비판합니다.
wrong_answers:
  - 콘스탄트는 민주주의를 옹호한 루소를 비판합니다.
  - 콘스탄트는 선거의 중요성을 부정하는 루소를 비판합니다.
  - 콘스탄트는 루소가 혁명적 폭력을 지지했다고 비판합니다.
explanation: |
  끊임없이 루소는 사적 영역을 보호해야 하는 현대 사회의 특징인 개인의 자유를 희생하면서까지 집단적 참여에 초점을 맞춘 고대인의 자유 개념을 중시했다고 비난받습니다.
reviewed: true
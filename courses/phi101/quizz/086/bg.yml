question: Каква е критиката на Констант към Русо и неговата концепция за свободата?
answer: Констан критикува Русо, че бърка свободата на древните с тази на модерните.
wrong_answers:
  - Констант критикува Русо, че се застъпва за демокрацията.
  - Констант критикува Русо, че отрича значението на изборите.
  - Констант критикува Русо, че подкрепя революционното насилие.
explanation: |
  Констант упреква Русо, че оценява концепцията за свобода, вдъхновена от древните и насочена към колективното участие, за сметка на индивидуалната свобода, характерна за съвременните общества, където частната сфера трябва да бъде защитена.
reviewed: true
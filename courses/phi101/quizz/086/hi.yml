question: कॉन्स्टेंट ने रूसो और उनकी स्वतंत्रता की अवधारणा की क्या आलोचना की है?
answer: कॉन्स्टैंट, रूसो की आलोचना करते हैं कि उन्होंने प्राचीन लोगों की आज़ादी को आधुनिक लोगों की आज़ादी से मिला दिया।
wrong_answers:
  - कॉन्स्टैंट, रूसो पर लोकतंत्र का समर्थन करने के लिए आलोचना करता है।
  - कॉन्स्टैंट, रूसो की आलोचना करते हैं क्योंकि वह चुनावों के महत्व को नकारते हैं।
  - कॉन्स्टेंट ने रूसो को क्रांतिकारी हिंसा का समर्थन करने के लिए आलोचना की।
explanation: |
  कॉन्स्टंट, रूसो पर यह आरोप लगाता है कि वह प्राचीन विचारों से प्रेरित स्वतंत्रता की अवधारणा को महत्व देता है, जो सामूहिक भागीदारी पर केंद्रित है, और इसके चलते आधुनिक समाजों की व्यक्तिगत स्वतंत्रता की अनदेखी करता है, जहाँ निजी क्षेत्र को सुरक्षित रखना ज़रूरी है।
reviewed: false
question: Ni igiki Constant anegura Rousseau n’iciyumviro ciwe c’umwidegemvyo?
answer: Constant aranegura Rousseau kubera yivangamwo umwidegemvyo w’Aba kera n’uw’Abanyabu.
wrong_answers:
  - Constant aranegura Rousseau kubera avugira demokarasi.
  - Constant anegura Rousseau kubera ahakana akamaro k’amatora.
  - Constant aranegura Rousseau kubera yashigikiye ubukazi bw’ihinduka.
explanation: |
  Constant ahora atuka Rousseau kubera yahaye agaciro iciyumviro c’umwidegemvyo cahumekewe n’Aba kera, cibanda ku kwifatanya n’abantu bose, kubera umwidegemvyo w’umuntu ku giti ciwe uranga imibano ya none, aho urwego rw’abantu ku giti cabo rutegerezwa kurindwa.
reviewed: true
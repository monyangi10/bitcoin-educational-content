question: คำวิจารณ์ของ Constant ต่อ Rousseau และแนวคิดเรื่องเสรีภาพคืออะไร?
answer: Constant วิจารณ์ Rousseau ว่าสับสนระหว่างเสรีภาพของคนโบราณกับเสรีภาพของคนสมัยใหม่
wrong_answers:
  - Constant วิจารณ์ Rousseau สำหรับการสนับสนุนประชาธิปไตย
  - Constant วิจารณ์ Rousseau สำหรับการปฏิเสธความสำคัญของการเลือกตั้ง
  - คอนสแตนท์วิจารณ์รูโซที่สนับสนุนความรุนแรงในการปฏิวัติ
explanation: |
  Constant ตำหนิ Rousseau ที่ให้คุณค่ากับแนวคิดเรื่องเสรีภาพที่ได้รับแรงบันดาลใจจากคนโบราณ ซึ่งเน้นการมีส่วนร่วมของส่วนรวม โดยแลกกับเสรีภาพส่วนบุคคลที่เป็นลักษณะของสังคมสมัยใหม่ ซึ่งต้องปกป้องพื้นที่ส่วนตัว
reviewed: true
question: Constant'ın Rousseau'ya ve onun özgürlük kavramına yönelik eleştirisi nedir?
answer: Constant, Rousseau'yu Kadimlerin özgürlüğü ile Modernlerin özgürlüğünü birbirine karıştırdığı için eleştirir.
wrong_answers:
  - Constant, Rousseau'yu demokrasiyi savunduğu için eleştirir.
  - Constant, Rousseau'yu seçimlerin önemini reddettiği için eleştirir.
  - Constant, Rousseau'yu devrimci şiddeti desteklediği için eleştirir.
explanation: |
  Constant, Rousseau'yu, özel alanın korunması gereken modern toplumların karakteristik özelliği olan bireysel özgürlük pahasına, kolektif katılıma odaklanan ve Eskilerden esinlenen bir özgürlük kavramına değer verdiği için suçlar.
reviewed: true
question: نقد کنستانت از روسو و مفهوم آزادی او چیست؟
answer: کنستانت، روسو را به خاطر اشتباه گرفتن آزادی باستانیان با آزادی مدرن‌ها مورد انتقاد قرار می‌دهد.
wrong_answers:
  - کانستنت روسو را به خاطر حمایت از دموکراسی مورد انتقاد قرار می‌دهد.
  - کنستانت، روسو را به خاطر انکار اهمیت انتخابات مورد انتقاد قرار می‌دهد.
  - کنستانت از روسو به دلیل حمایت از خشونت انقلابی انتقاد می‌کند.
explanation: |
  کانت، روسو را به خاطر ارزش نهادن به مفهومی از آزادی که از باستانیان الهام گرفته و بر مشارکت جمعی تمرکز دارد، به زیان آزادی فردی که ویژگی جوامع مدرن است و در آن حوزه خصوصی باید محافظت شود، مورد سرزنش قرار می‌دهد.
reviewed: false
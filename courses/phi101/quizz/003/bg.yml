question: Каква е връзката между свободата и отговорността?
answer: Отговорността произтича от свободата на индивидуалния избор
wrong_answers:
  - Свободата е ограничена от отговорността на другите
  - Свободата и отговорността са две независими понятия
  - Отговорността е пречка за свободата
explanation: |
  Връзката между свободата и отговорността е вътрешно присъща, тъй като свободата да правиш избор предполага и отговорност за последиците от този избор, като по този начин се подчертава, че всяко свободно действие е придружено от морално задължение.
reviewed: true
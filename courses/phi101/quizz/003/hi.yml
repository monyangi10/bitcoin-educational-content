question: "आज़ादी और ज़िम्मेदारी के बीच क्या रिश्ता है?"
answer: ज़िम्मेदारी व्यक्ति के अपने चुनाव की आज़ादी से पैदा होती है
wrong_answers:
  - "आज़ादी दूसरों की ज़िम्मेदारी से सीमित होती है"
  - "आज़ादी और ज़िम्मेदारी दो अलग-अलग चीज़ें हैं"
  - ज़िम्मेदारी आज़ादी में रुकावट है
explanation: |
  आज़ादी और ज़िम्मेदारी का रिश्ता अनिवार्य है, क्योंकि चुनाव करने की आज़ादी का मतलब उन चुनावों के नतीजों की ज़िम्मेदारी भी होती है। यह दिखाता है कि हर आज़ाद काम के साथ एक नैतिक ज़िम्मेदारी जुड़ी होती है।

question: رابطه بین آزادی و مسئولیت چیست؟
answer: مسئولیت از آزادی انتخاب‌های فردی ناشی می‌شود
wrong_answers:
  - آزادی با مسئولیت دیگران محدود می‌شود
  - آزادی و مسئولیت دو مفهوم مستقل هستند
  - مسئولیت مانعی برای آزادی است
explanation: |
  رابطه بین آزادی و مسئولیت ذاتی است، زیرا آزادی در انتخاب به معنای مسئولیت در قبال پیامدهای آن انتخاب‌ها نیز می‌باشد و بدین ترتیب نشان می‌دهد که هر عمل آزاد با یک تعهد اخلاقی همراه است.
reviewed: false
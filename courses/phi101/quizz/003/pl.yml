question: Jaki jest związek między wolnością a odpowiedzialnością?
answer: Odpowiedzialność wynika z wolności indywidualnych wyborów
wrong_answers:
  - Wolność jest ograniczona przez odpowiedzialność innych
  - Wolność i odpowiedzialność to dwa niezależne pojęcia
  - Odpowiedzialność jest przeszkodą dla wolności
explanation: |
  Związek między wolnością a odpowiedzialnością jest nieodłączny, ponieważ wolność dokonywania wyborów pociąga za sobą również odpowiedzialność za konsekwencje tych wyborów, podkreślając w ten sposób, że każdemu wolnemu aktowi towarzyszy moralny obowiązek.
reviewed: false
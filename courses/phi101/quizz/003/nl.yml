question: Wat is de relatie tussen vrijheid en verantwoordelijkheid?
answer: Verantwoordelijkheid komt voort uit de vrijheid van individuele keuzes
wrong_answers:
  - Vrijheid wordt beperkt door de verantwoordelijkheid van anderen
  - Vrijheid en verantwoordelijkheid zijn twee onafhankelijke concepten
  - Verantwoordelijkheid is een obstakel voor vrijheid
explanation: |
  De relatie tussen vrijheid en verantwoordelijkheid is intrinsiek, want de vrijheid om keuzes te maken impliceert ook de verantwoordelijkheid voor de gevolgen van die keuzes, wat benadrukt dat elke vrije handeling gepaard gaat met een morele verplichting.
reviewed: true
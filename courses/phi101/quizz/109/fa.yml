question: راه‌حل پیشنهادی هایک برای جلوگیری از بردگی چیست؟
answer: از مالکیت خصوصی و نظم خودجوش بازار به عنوان سنگرهایی در برابر استبداد دفاع کنید.
wrong_answers:
  - او از افزایش مالیات برای کمک به فقرا حمایت می‌کند.
  - او خواستار بازگشت به یک سیستم اقتصادی شبیه به فئودالیسم است.
  - آموزش قوانین جاده به عموم مردم.
explanation: |
  هایک بر این باور است که آزادی فردی با حفاظت از مالکیت خصوصی و اجازه دادن به بازار برای خودتنظیمی حفظ می‌شود، و بدین ترتیب از انحرافات استبدادی و تمرکز قدرت جلوگیری می‌کند.
reviewed: false
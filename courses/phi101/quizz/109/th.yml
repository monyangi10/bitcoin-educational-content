question: ทางแก้ที่ Hayek เสนอเพื่อหลีกเลี่ยงการเป็นทาสคืออะไร?
answer: ปกป้องทรัพย์สินส่วนตัวและระเบียบที่เกิดขึ้นเองของตลาดในฐานะป้อมปราการต่อต้านการกดขี่
wrong_answers:
  - เขาสนับสนุนการเพิ่มภาษีเพื่อช่วยเหลือคนจน
  - เขาเรียกร้องให้กลับไปสู่ระบบเศรษฐกิจแบบศักดินา
  - ให้ความรู้แก่ประชาชนเกี่ยวกับกฎจราจร
explanation: |
  ฮาเย็คเชื่อว่าเสรีภาพของปัจเจกบุคคลจะได้รับการรักษาโดยการปกป้องทรัพย์สินส่วนตัวและอนุญาตให้ตลาดควบคุมตัวเอง ซึ่งจะป้องกันการเบี่ยงเบนไปสู่เผด็จการและการรวมศูนย์อำนาจ
reviewed: true
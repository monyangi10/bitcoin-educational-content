question: Какво е решението, предложено от Хайек, за да се избегне робството?
answer: Защитавайте частната собственост и спонтанния ред на пазара като защитници срещу тиранията.
wrong_answers:
  - Той се застъпва за увеличаване на данъците, за да се помогне на бедните.
  - Той призовава за връщане към феодалния тип икономическа система.
  - Обучение на обществеността относно правилата за движение по пътищата.
explanation: |
  Хайек вярва, че индивидуалната свобода се запазва, като се защитава частната собственост и се позволява на пазара да се саморегулира, като по този начин се предотвратява авторитарният уклон и централизацията на властта.
reviewed: true
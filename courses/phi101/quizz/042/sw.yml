question: Ni nini kazi ya sheria ya asili kulingana na Mtakatifu Thomas Aquinas?
answer: Inaangazia dhamiri ya wanadamu na kuwaruhusu kufanya maamuzi ya kiadili tu.
wrong_answers:
  - Inawaongoza wanadamu kuelekea wokovu kwa kufunua mapenzi ya Mungu.
  - Inaruhusu ujuzi wa sheria za asili.
  - Ni aina ya silika.
explanation: |
  Kulingana na Mtakatifu Thomas Aquinas, kazi ya sheria ya asili ni kuangaza dhamiri ya mwanadamu, kutoa viwango vya maadili vya ulimwengu ambavyo vinasaidia watu kutambua na kuchagua kile ambacho ni kizuri katika matendo yao.

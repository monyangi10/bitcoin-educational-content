question: หน้าที่ของกฎธรรมชาติตามที่นักบุญโทมัส อไควนัสคืออะไร?
answer: มันให้ความสว่างแก่จิตสำนึกของมนุษย์และช่วยให้พวกเขาตัดสินใจทางศีลธรรมอย่างยุติธรรม
wrong_answers:
  - มันนำทางมนุษย์ไปสู่ความรอดโดยการเปิดเผยพระประสงค์ของพระเจ้า
  - มันช่วยให้ความรู้เกี่ยวกับกฎของธรรมชาติ
  - มันเป็นสัญชาตญาณอย่างหนึ่ง
explanation: |
  ตามที่นักบุญโทมัส อไควนัสกล่าวไว้ หน้าที่ของกฎธรรมชาติคือการให้ความกระจ่างแก่จิตสำนึกของมนุษย์ โดยให้มาตรฐานทางศีลธรรมสากลที่ช่วยให้บุคคลสามารถแยกแยะและเลือกสิ่งที่ดีในพฤติกรรมของตนได้
reviewed: true
question: Каква е функцията на естественото право според Свети Тома Аквински?
answer: Тя просветлява съвестта на хората и им позволява да правят справедлив морален избор.
wrong_answers:
  - Тя води хората към спасение, като им разкрива Божията воля.
  - Тя позволява да се опознаят природните закони.
  - Това е вид инстинкт.
explanation: |
  Според свети Тома Аквински функцията на естественото право е да просветлява човешката съвест, като предоставя универсални морални критерии, които помагат на хората да разпознават и избират доброто в своите действия.
reviewed: true
question: وظیفه قانون طبیعی از نظر سنت توماس آکویناس چیست؟
answer: این وجدان مردان را روشن می‌کند و به آن‌ها اجازه می‌دهد انتخاب‌های اخلاقی عادلانه‌ای داشته باشند.
wrong_answers:
  - این مردان را با آشکار ساختن اراده خداوند به سوی نجات هدایت می‌کند.
  - این امکان را می‌دهد تا قوانین طبیعت را بشناسیم.
  - این یک نوع غریزه است.
explanation: |
  بر اساس نظر سنت توماس آکویناس، وظیفه قانون طبیعی این است که وجدان انسانی را روشن کند و معیارهای اخلاقی جهانی را فراهم آورد که به افراد کمک می‌کند تا در اعمال خود خوب را تشخیص داده و انتخاب کنند.
reviewed: false
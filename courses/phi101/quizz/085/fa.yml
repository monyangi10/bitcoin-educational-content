question: حدود حاکمیت دولت از نظر جان استوارت میل چیست؟
answer: دولت تنها زمانی می‌تواند مداخله کند که اقدامات یک فرد به دیگران آسیب برساند.
wrong_answers:
  - دولت تحت هر شرایطی حاکمیت دارد و نمی‌تواند توسط هیچ فرد یا گروهی از افراد محدود شود.
  - حاکمیت دولت توسط ابزارهای اقتصادی محدود می‌شود.
  - حاکمیت دولت توسط قوانین طبیعت محدود می‌شود.
explanation: |
  جان استوارت میل استدلال می‌کند که مداخله دولت تنها زمانی مشروع است که اقدامات فرد به دیگران آسیب برساند، به منظور حفاظت از آزادی شخصی در زمینه‌هایی که به دیگران آسیب نمی‌رساند.
reviewed: false
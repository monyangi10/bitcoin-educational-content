question: जॉन स्टुअर्ट मिल के अनुसार राज्य की संप्रभुता की सीमा क्या है?
answer: राज्य तभी हस्तक्षेप कर सकता है जब किसी व्यक्ति के कार्यों से दूसरों को नुकसान पहुंचता है।
wrong_answers:
  - राज्य हर हाल में संप्रभु होता है और किसी भी व्यक्ति या व्यक्तियों के समूह द्वारा सीमित नहीं किया जा सकता।
  - राज्य की संप्रभुता आर्थिक साधनों से सीमित होती है।
  - राज्य की संप्रभुता प्रकृति के नियमों से सीमित होती है।
explanation: |
  जॉन स्टुअर्ट मिल का कहना है कि सरकारी हस्तक्षेप तभी जायज़ है जब किसी व्यक्ति के कार्य दूसरों को नुकसान पहुँचाते हों, ताकि उन क्षेत्रों में व्यक्तिगत आज़ादी की रक्षा की जा सके जहाँ दूसरों को कोई नुकसान नहीं होता।

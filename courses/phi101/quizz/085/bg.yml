question: Каква е границата на държавния суверенитет според Джон Стюарт Мил?
answer: Държавата може да се намеси само когато действията на дадено лице вредят на другите.
wrong_answers:
  - Държавата е суверенна при всички обстоятелства и не може да бъде ограничавана от нито един човек или група хора.
  - Държавният суверенитет се ограничава с икономически средства.
  - Държавният суверенитет е ограничен от природните закони.
explanation: |
  Джон Стюарт Мил твърди, че държавната намеса е легитимна само когато действията на индивида причиняват вреда на другите, за да се защити личната свобода в области, които не вредят на другите.
reviewed: true
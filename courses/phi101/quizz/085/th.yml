question: ขีดจำกัดของอธิปไตยของรัฐตามที่ John Stuart Mill กล่าวคืออะไร?
answer: รัฐสามารถแทรกแซงได้เมื่อการกระทำของบุคคลนั้นก่อให้เกิดอันตรายต่อผู้อื่นเท่านั้น
wrong_answers:
  - รัฐมีอำนาจอธิปไตยภายใต้ทุกสถานการณ์และไม่สามารถถูกจำกัดโดยบุคคลหรือกลุ่มบุคคลใด ๆ ได้
  - อธิปไตยของรัฐถูกจำกัดด้วยวิธีการทางเศรษฐกิจ
  - อธิปไตยของรัฐถูกจำกัดโดยกฎของธรรมชาติ
explanation: |
  John Stuart Mill โต้แย้งว่าการแทรกแซงของรัฐเป็นสิ่งที่ชอบธรรมเฉพาะเมื่อการกระทำของบุคคลก่อให้เกิดอันตรายต่อผู้อื่น เพื่อปกป้องเสรีภาพส่วนบุคคลในด้านที่ไม่ก่อให้เกิดอันตรายต่อผู้อื่น
reviewed: true
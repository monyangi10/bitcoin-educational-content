question: Ni gute iciyumviro c’icaha gifitaniye isano n’iciyumviro c’umwidegemvyo mu vyiyumviro vya gikirisu?
answer: Icaha ni ingaruka zitaziguye z’umwidegemvyo w’umuntu kuko abantu bafise umwidegemvyo wo guhitamwo hagati y’iciza n’ikibi.
wrong_answers:
  - Icaha ni akaga Adamu na Eva barazwe n’abakomotse kuri bo bose, bigatuma umwidegemvyo wabo ugabanuka.
  - Icaha ni ukwihenda kwaremwe na shetani kugira ngo ahende abantu kandi abambure umwidegemvyo wabo.
  - Icaha ni ikigeragezo gikenewe ku bantu kugira ngo berekane urukundo bakunda Imana maze baronke agakiza.
explanation: |
  Mu vyiyumviro vya gikirisu, icaha kiva ku gukoresha umwidegemvyo wo kwihitiramwo. Abantu, bahawe umwidegemvyo, barafise amahitamwo hagati y’iciza n’ikibi, kandi ukwo kwihitiramwo ni kwo gutuma igikorwa co gucumura gishoboka.
reviewed: true
question: Hur är tanken på synd kopplad till tanken på frihet i det kristna tänkandet?
answer: Synden är en direkt följd av människans frihet, eftersom människan är fri att välja mellan gott och ont.
wrong_answers:
  - Synden är ett ärftligt fel som Adam och Eva överförde till alla sina ättlingar och som begränsar deras frihet.
  - Synden är en illusion som djävulen har skapat för att lura människan och beröva henne hennes frihet.
  - Synden är en nödvändig prövning för att människan ska kunna bevisa sin kärlek till Gud och förtjäna frälsning.
explanation: |
  Enligt kristet tänkande är synden ett resultat av den fria viljan. Människan, som är utrustad med frihet, har möjlighet att välja mellan gott och ont, och det är detta fria val som gör det möjligt att synda.
reviewed: true
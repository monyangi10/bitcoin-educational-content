question: Wazo la dhambi linaunganishwaje na wazo la uhuru katika mawazo ya Kikristo?
answer: Dhambi ni tokeo la moja kwa moja la uhuru wa mwanadamu kwa sababu wanadamu wana uhuru wa kuchagua kati ya mema na mabaya.
wrong_answers:
  - Dhambi ni kasoro ya urithi iliyopitishwa na Adamu na Hawa kwa wazao wao wote, ikiweka kikomo uhuru wao.
  - Dhambi ni udanganyifu uliotengenezwa na shetani ili kuwahadaa wanadamu na kuwanyima uhuru wao.
  - Dhambi ni jaribu la lazima kwa wanadamu ili kuthibitisha upendo wao kwa Mungu na kupata wokovu.
explanation: |
  Katika mawazo ya Kikristo, dhambi hutokana na kutumia uhuru wa kuchagua. Wanadamu, waliopewa uhuru, wana chaguo kati ya mema na mabaya, na ni chaguo hili huru ambalo hufanya tendo la dhambi liwezekane.

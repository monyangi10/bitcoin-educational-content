question: Как идеята за греха е свързана с понятието за свободата в християнската мисъл?
answer: Грехът е пряка последица от човешката свобода, защото хората са свободни да избират между доброто и злото.
wrong_answers:
  - Грехът е наследствен недостатък, предаден от Адам и Ева на всички техни потомци, който ограничава тяхната свобода.
  - Грехът е илюзия, създадена от дявола, за да заблуди хората и да ги лиши от свободата им.
  - Грехът е необходимо изпитание за хората, за да докажат любовта си към Бога и да заслужат спасение.
explanation: |
  В християнската мисъл грехът е резултат от упражняването на свободната воля. Хората, надарени със свобода, имат възможност да избират между доброто и злото и именно този свободен избор прави възможен акта на греха.
reviewed: true
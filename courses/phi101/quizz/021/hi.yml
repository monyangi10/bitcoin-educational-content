question: रॉथबार्ड ने सामाजिक शक्ति की परिभाषा क्या दी है?
answer: लोगों की मेहनत और नए तरीकों से काम करके साथ मिलकर धन बनाने की काबिलियत
wrong_answers:
  - राज्य की जबरदस्त ताकत जिसका इस्तेमाल समाज को नियंत्रित करने और शोषण करने के लिए किया जाता है
  - बड़े कॉर्पोरेशन और एकाधिकारवादी कंपनियों की अर्थव्यवस्था पर पकड़
  - यूनियनों और मजदूर संगठनों की ताकत
explanation: |
  रॉथबार्ड सामाजिक शक्ति को व्यक्तियों की उस क्षमता के रूप में परिभाषित करते हैं जिसमें वे साथ आकर सहयोग करते हैं, नवाचार करते हैं और धन का सृजन करते हैं। वे आर्थिक मूल्य बनाने में व्यक्तिगत पहल और सहयोग के महत्व पर जोर देते हैं।

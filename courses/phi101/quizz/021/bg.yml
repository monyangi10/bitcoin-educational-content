question: Какво е определението за социална власт, дадено от Ротбард?
answer: Способността на хората да си сътрудничат и да създават богатство чрез работа и иновации
wrong_answers:
  - Принудителната сила на държавата, използвана за контрол и експлоатация на обществото
  - Властта на големите корпорации и монополите над икономиката
  - Силата на профсъюзите и работническите организации
explanation: |
  Ротбард определя социалната власт като способността на индивидите да се обединяват, за да си сътрудничат, да правят нововъведения и да произвеждат богатство, като подчертава значението на личната инициатива и сътрудничеството за създаването на икономическа стойност.
reviewed: true
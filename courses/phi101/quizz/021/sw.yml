question: Ni nini ufafanuzi wa nguvu za kijamii uliotolewa na Rothbard?
answer: Uwezo wa watu kushirikiana na kuunda utajiri kupitia kazi na uvumbuzi
wrong_answers:
  - Nguvu ya shuruti ya Serikali inayotumika kudhibiti na kunyonya jamii
  - Nguvu ya mashirika makubwa na ukiritimba juu ya uchumi
  - Nguvu ya vyama vya wafanyakazi na mashirika ya wafanyakazi
explanation: |
  Rothbard anafafanua nguvu za kijamii kama uwezo wa watu binafsi kuja pamoja ili kushirikiana, kuvumbua, na kuzalisha mali, akisisitiza umuhimu wa juhudi binafsi na ushirikiano katika kujenga thamani ya kiuchumi.

question: คำจำกัดความของอำนาจทางสังคมที่ให้โดย Rothbard คืออะไร?
answer: ความสามารถของบุคคลในการร่วมมือกันและสร้างความมั่งคั่งผ่านการทำงานและนวัตกรรม
wrong_answers:
  - อำนาจบีบบังคับของรัฐที่ใช้ในการควบคุมและแสวงหาประโยชน์จากสังคม
  - อำนาจของบรรษัทขนาดใหญ่และการผูกขาดเหนือเศรษฐกิจ
  - พลังของสหภาพแรงงานและองค์กรแรงงาน
explanation: |
  Rothbard กำหนดอำนาจทางสังคมว่าเป็นความสามารถของบุคคลในการมารวมตัวกันเพื่อร่วมมือกัน สร้างสรรค์นวัตกรรม และผลิตความมั่งคั่ง โดยเน้นความสำคัญของความคิดริเริ่มส่วนบุคคลและความร่วมมือในการสร้างมูลค่าทางเศรษฐกิจ
reviewed: true
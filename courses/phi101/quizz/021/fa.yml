question: تعریف قدرت اجتماعی که توسط روتبارد ارائه شده چیست؟
answer: توانایی افراد برای همکاری و ایجاد ثروت از طریق کار و نوآوری
wrong_answers:
  - نیروی قهری دولت برای کنترل و بهره‌برداری از جامعه
  - قدرت شرکت‌های بزرگ و انحصارات بر اقتصاد
  - قدرت اتحادیه‌ها و سازمان‌های کارگری
explanation: |
  روثبارد قدرت اجتماعی را به عنوان توانایی افراد برای گردهم آمدن، همکاری، نوآوری و تولید ثروت تعریف می‌کند و بر اهمیت ابتکار شخصی و همکاری در ایجاد ارزش اقتصادی تأکید دارد.
reviewed: false
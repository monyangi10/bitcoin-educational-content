question: Koja je definicija društvene moći koju je dao Rothbard?
answer: Sposobnost pojedinaca da sarađuju i stvaraju bogatstvo kroz rad i inovacije
wrong_answers:
  - Prinudna sila države korišćena za kontrolu i eksploataciju društva
  - Moć velikih korporacija i monopola nad ekonomijom
  - Moć sindikata i radničkih organizacija
explanation: |
  Rothbard definiše društvenu moć kao sposobnost pojedinaca da se okupe kako bi sarađivali, inovirali i stvarali bogatstvo, naglašavajući važnost lične inicijative i saradnje u stvaranju ekonomske vrednosti.

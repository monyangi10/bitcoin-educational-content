question: Ni insobanuro iyihe y’ububasha bwo mu kibano yatanzwe na Rothbard?
answer: Ubushobozi bw'abantu ku giti cabo bwo gukorana no kurema ubutunzi biciye mu bikorwa no mu guhingura ibintu bishasha .
wrong_answers:
  - Inguvu z'agahato za Leta zakoreshwa mu kugenzura no gukoresha nabi abantu .
  - Ububasha bw'amashirahamwe manini manini n'ubutegetsi bw'ubutunzi .
  - Ububasha bw'amasendika n'amashirahamwe y'abakozi .
explanation: |
  Rothbard asobanura ububasha bw’imibano nk’ubushobozi bw’abantu bwo gukorana kugira ngo bafatanye, bashireho ibintu bishasha, kandi bashiremwo ubutunzi, ashimika ku kamaro k’ugutangura n’ugukorana n’umuntu ku giti ciwe mu kurema agaciro k’ubutunzi.
reviewed: true
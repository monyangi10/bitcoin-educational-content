question: Rothbard tarafından verilen sosyal güç tanımı nedir?
answer: Bireylerin işbirliği yapma ve çalışma ve yenilik yoluyla zenginlik yaratma yeteneği
wrong_answers:
  - Toplumu kontrol etmek ve sömürmek için kullanılan Devletin zorlayıcı gücü
  - Büyük şirketlerin ve tekellerin ekonomi üzerindeki gücü
  - Sendikaların ve işçi örgütlerinin gücü
explanation: |
  Rothbard, toplumsal gücü, bireylerin işbirliği yapmak, yenilik yapmak ve zenginlik üretmek için bir araya gelme yeteneği olarak tanımlar ve ekonomik değer yaratmada kişisel inisiyatif ve işbirliğinin önemini vurgular.
reviewed: true
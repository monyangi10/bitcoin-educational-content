question: Vilken är Rothbards definition av social makt?
answer: Individers förmåga att samarbeta och skapa välstånd genom arbete och innovation
wrong_answers:
  - Statens tvångsmakt som används för att kontrollera och exploatera samhället
  - Storföretagens och monopolens makt över ekonomin
  - Fackföreningarnas och arbetstagarorganisationernas makt
explanation: |
  Rothbard definierar social makt som individers förmåga att gå samman för att samarbeta, förnya sig och producera välstånd, och betonar vikten av personliga initiativ och samarbete för att skapa ekonomiskt värde.
reviewed: true
question: Wat is de definitie van sociale macht die Rothbard geeft?
answer: Het vermogen van individuen om samen te werken en welvaart te creëren door werk en innovatie
wrong_answers:
  - De dwangkracht van de staat die wordt gebruikt om de samenleving te controleren en uit te buiten
  - De macht van grote bedrijven en monopolies over de economie
  - De kracht van vakbonden en werknemersorganisaties
explanation: |
  Rothbard definieert sociale macht als het vermogen van individuen om samen te komen om samen te werken, te innoveren en rijkdom te produceren, en benadrukt het belang van persoonlijk initiatief en samenwerking bij het creëren van economische waarde.
reviewed: true
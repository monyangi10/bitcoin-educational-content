question: रोथबार्ड का यह मानना ​​क्यों है कि लिखित संविधान राज्य की शक्ति को सीमित करने के लिए पर्याप्त नहीं हैं?
answer: ऊपर के सभी
wrong_answers:
  - सत्ता में बैठे लोगों द्वारा इन्हें आसानी से संशोधित किया जा सकता है
  - इनकी व्याख्या की जा सकती है
  - वे नौकरशाहों और अधिकारियों द्वारा सत्ता के दुरुपयोग को रोक नहीं सकते
explanation: |
  रोथबार्ड का मानना ​​है कि लिखित संविधान राज्य की शक्ति को सीमित करने के लिए पर्याप्त नहीं हैं, क्योंकि वे व्याख्या के अधीन हैं, उनमें सत्ताधारियों द्वारा संशोधन किया जा सकता है, तथा वे नौकरशाहों द्वारा दुर्व्यवहार के विरुद्ध प्रभावी रूप से सुरक्षा नहीं देते हैं।
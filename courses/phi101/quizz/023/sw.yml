question: Kwa nini Rothbard anaamini kwamba katiba zilizoandikwa hazitoshi kuweka mipaka ya mamlaka ya serikali?
answer: Yote ya hapo juu
wrong_answers:
  - Wanaweza kurekebishwa kwa urahisi na walio madarakani
  - Wanaweza kufasiriwa
  - Hawawezi kuzuia matumizi mabaya ya madaraka na warasimu na viongozi
explanation: |
  Rothbard anaamini kwamba katiba zilizoandikwa hazitoshi kuweka kikomo mamlaka ya serikali kwa sababu ziko chini ya tafsiri, zinaweza kurekebishwa na wale walio na mamlaka, na hazilinde ipasavyo dhidi ya unyanyasaji unaofanywa na warasimu.
question: Varför anser Rothbard att skrivna grundlagar inte är tillräckliga för att begränsa statens makt?
answer: Alla ovanstående
wrong_answers:
  - De kan lätt ändras av makthavarna
  - De kan tolkas på följande sätt
  - De kan inte förhindra maktmissbruk av byråkrater och tjänstemän
explanation: |
  Rothbard anser att skrivna konstitutioner är otillräckliga för att begränsa statens makt eftersom de är föremål för tolkning, kan ändras av makthavarna och inte effektivt skyddar mot missbruk av byråkrater.
  granskad: sann
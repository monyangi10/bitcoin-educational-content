question: Dlaczego Rothbard uważa, że spisane konstytucje nie wystarczą do ograniczenia władzy państwa?
answer: Wszystkie powyższe
wrong_answers:
  - Mogą być łatwo zmieniane przez rządzących
  - Można je interpretować
  - Nie mogą zapobiec nadużyciom władzy przez biurokratów i urzędników
explanation: |
  Rothbard uważa, że spisane konstytucje nie są wystarczające do ograniczenia władzy państwa, ponieważ podlegają interpretacji, mogą być zmieniane przez tych, którzy sprawują władzę i nie chronią skutecznie przed nadużyciami ze strony biurokratów.
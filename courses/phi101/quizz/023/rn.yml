question: Ni kuki Rothbard abona ko amategeko nshingiro yanditse adahagije kugira ngo ububasha bwa Leta bube buke?
answer: Ivyo vyose biri hejuru
wrong_answers:
  - Bishobora guhindurwa bitagoranye n'abafise ububasha .
  - Bishobora gusobanurwamwo .
  - Ntibashobora gukingira ubutegetsi bukoreshwa nabi n'abategetsi n'abategetsi .
explanation: |
  Rothbard abona ko amategeko nshingiro yanditse adahagije kugira ngo agabanye ububasha bwa Leta kuko ashobora gusobanurwamwo, ashobora guhindurwa n’abafise ububasha, kandi ntashobora gukingira neza abakozi bo mu biro.
  yasubiwemwo: ukuri
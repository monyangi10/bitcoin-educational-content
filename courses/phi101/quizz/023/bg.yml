question: Защо Ротбард смята, че писаните конституции не са достатъчни, за да ограничат властта на държавата?
answer: Всичко изброено по-горе
wrong_answers:
  - Те могат лесно да бъдат променяни от управляващите
  - Те могат да се тълкуват
  - Те не могат да предотвратят злоупотребите с власт от страна на бюрократи и длъжностни лица
explanation: |
  Ротбард смята, че писаните конституции не са достатъчни за ограничаване на държавната власт, тъй като подлежат на тълкуване, могат да бъдат променяни от управляващите и не защитават ефективно от злоупотреби от страна на бюрократите.
  прегледано: вярно
question: ทำไม Rothbard ถึงเชื่อว่ารัฐธรรมนูญที่เขียนขึ้นไม่เพียงพอที่จะจำกัดอำนาจของรัฐ?
answer: ทั้งหมดที่กล่าวมา
wrong_answers:
  - พวกเขาสามารถแก้ไขได้ง่ายโดยผู้มีอำนาจ
  - พวกเขาสามารถตีความได้
  - พวกเขาไม่สามารถป้องกันการใช้อำนาจในทางที่ผิดโดยข้าราชการและเจ้าหน้าที่
explanation: |
  Rothbard เชื่อว่ารัฐธรรมนูญที่เป็นลายลักษณ์อักษรไม่เพียงพอที่จะจำกัดอำนาจของรัฐ เพราะสามารถตีความได้ แก้ไขโดยผู้มีอำนาจ และไม่สามารถป้องกันการละเมิดโดยข้าราชการได้อย่างมีประสิทธิภาพ
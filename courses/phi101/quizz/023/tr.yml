question: Rothbard neden yazılı anayasaların devletin gücünü sınırlamak için yeterli olmadığına inanıyor?
answer: Yukarıdakilerin hepsi
wrong_answers:
  - İktidardakiler tarafından kolayca değiştirilebilirler
  - Bunlar yorumlanabilir
  - Bürokrat ve memurların yetkilerini kötüye kullanmalarını önleyemezler
explanation: |
  Rothbard, yazılı anayasaların devletin gücünü sınırlamakta yetersiz olduğuna inanmaktadır, çünkü yoruma tabidirler, iktidardakiler tarafından değiştirilebilirler ve bürokratların suiistimallerine karşı etkili bir koruma sağlamazlar.
  gözden geçirildi: doğru
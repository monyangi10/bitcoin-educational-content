question: چرا روتبارد معتقد است که قانون اساسی مکتوب برای محدود کردن قدرت دولت کافی نیست؟
answer: همه موارد فوق
wrong_answers:
  - آنها به راحتی توسط افراد در قدرت اصلاح می‌شوند.
  - آنها می‌توانند تفسیر شوند
  - آنها نمی‌توانند از سوءاستفاده‌های قدرت توسط بوروکرات‌ها و مقامات جلوگیری کنند.
explanation: |
  راتبارد معتقد است که قانون‌های اساسی نوشته شده برای محدود کردن قدرت دولت کافی نیستند زیرا آن‌ها قابل تفسیر هستند، می‌توانند توسط کسانی که قدرت را در دست دارند اصلاح شوند و به طور مؤثری از سوءاستفاده‌های بوروکرات‌ها محافظت نمی‌کنند.
question: تعریف آزادی از دیدگاه لرد اکتون چیست؟
answer: قدرت عمل بر اساس وجدان شخصی حتی در برابر نظر اکثریت
wrong_answers:
  - توانایی انجام هر کاری که فرد می‌خواهد
  - عدم وجود هرگونه محدودیت
  - محافظت در برابر تهاجمات خارجی
explanation: |
  لرد اکتون آزادی را به عنوان قدرت عمل بر اساس وجدان شخصی تعریف می‌کند و بر اهمیت توانایی فرد در گرفتن تصمیمات شخصی تأکید می‌کند، حتی زمانی که این تصمیمات برخلاف نظر اکثریت باشد.
reviewed: false
question: Wat is de definitie van vrijheid die Lord Acton geeft?
answer: De macht om naar eigen geweten te handelen, zelfs tegen de mening van de meerderheid in
wrong_answers:
  - De mogelijkheid om te doen wat je wilt
  - De afwezigheid van enige beperking
  - Bescherming tegen invasies van buitenaf
explanation: |
  Lord Acton definieert vrijheid als de macht om naar eigen geweten te handelen en benadrukt daarmee het belang van het vermogen van het individu om persoonlijke beslissingen te nemen, zelfs als deze tegen de mening van de meerderheid ingaan.
reviewed: true
question: Какво е определението за свобода, дадено от лорд Актън?
answer: Право на действие според собствената си съвест, дори против мнението на мнозинството
wrong_answers:
  - Възможността да правите каквото си поискате
  - Липсата на ограничения
  - Защита от външни инвазии
explanation: |
  Лорд Актън определя свободата като правото да се действа според собствената съвест, подчертавайки значението на способността на индивида да взема лични решения, дори когато те противоречат на мнението на мнозинството.
reviewed: true
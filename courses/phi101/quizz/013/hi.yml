question: लॉर्ड एक्टन ने स्वतंत्रता की क्या परिभाषा दी है?
answer: बहुमत की राय के विरुद्ध भी अपने विवेक के अनुसार कार्य करने की शक्ति
wrong_answers:
  - जो चाहे वह करने की क्षमता
  - किसी भी बाधा का अभाव
  - बाहरी आक्रमणों से सुरक्षा
explanation: |
  लॉर्ड एक्टन स्वतंत्रता को अपने विवेक के अनुसार कार्य करने की शक्ति के रूप में परिभाषित करते हैं, तथा व्यक्तिगत निर्णय लेने की व्यक्ति की क्षमता के महत्व पर प्रकाश डालते हैं, भले ही ये निर्णय बहुमत की राय के विरुद्ध हों।

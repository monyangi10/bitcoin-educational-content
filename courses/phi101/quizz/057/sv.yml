question: Vilket inflytande hade Salamancaskolan på utvecklingen av det moderna tänkandet?
answer: Alla de andra svaren är korrekta.
wrong_answers:
  - Den bidrog till framväxten av internationell rätt och erkännandet av universella mänskliga rättigheter.
  - Den lade grunden till den moderna politiska filosofin genom att hävda maktdelning och folksuveränitet.
  - Den påverkade det vetenskapliga tänkandet genom att uppmuntra den experimentella metoden och rationalism.
explanation: |
  Salamancaskolan hade ett djupgående inflytande på det moderna tänkandet och lade grunden för internationell rätt, förespråkade universella mänskliga rättigheter och fastställde grundläggande principer för politisk filosofi och vetenskapligt tänkande.
reviewed: true
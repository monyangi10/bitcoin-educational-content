question: Jaki był wpływ Szkoły w Salamance na rozwój nowoczesnej myśli?
answer: Wszystkie pozostałe odpowiedzi są poprawne.
wrong_answers:
  - Przyczyniła się do powstania prawa międzynarodowego i uznania powszechnych praw człowieka.
  - Położył on podwaliny pod nowoczesną filozofię polityczną, zapewniając podział władzy i suwerenność ludu.
  - Wpłynął na myśl naukową, zachęcając do metody eksperymentalnej i racjonalizmu.
explanation: |
  Szkoła w Salamance wywarła głęboki wpływ na współczesną myśl, kładąc podwaliny pod prawo międzynarodowe, opowiadając się za uniwersalnymi prawami człowieka i ustanawiając podstawowe zasady filozofii politycznej i myślenia naukowego.

question: อิทธิพลของโรงเรียนซาลามังกาต่อการพัฒนาความคิดสมัยใหม่คืออะไร?
answer: คำตอบอื่น ๆ ทั้งหมดถูกต้อง
wrong_answers:
  - มันมีส่วนช่วยในการเกิดขึ้นของกฎหมายระหว่างประเทศและการยอมรับสิทธิมนุษยชนสากล
  - มันวางรากฐานของปรัชญาการเมืองสมัยใหม่โดยการยืนยันการแยกอำนาจและอธิปไตยของประชาชน
  - มันมีอิทธิพลต่อความคิดทางวิทยาศาสตร์โดยการส่งเสริมวิธีการทดลองและเหตุผลนิยม
explanation: |
  โรงเรียนซาลามังกามีอิทธิพลอย่างลึกซึ้งต่อความคิดสมัยใหม่ วางรากฐานสำหรับกฎหมายระหว่างประเทศ สนับสนุนสิทธิมนุษยชนสากล และสร้างหลักการพื้นฐานสำหรับปรัชญาการเมืองและการคิดทางวิทยาศาสตร์
reviewed: true
question: تأثیر مدرسه سالامانکا بر توسعه تفکر مدرن چه بود؟
answer: همه پاسخ‌های دیگر صحیح هستند.
wrong_answers:
  - این به ظهور حقوق بین‌الملل و شناسایی حقوق بشر جهانی کمک کرد.
  - این پایه‌های فلسفه سیاسی مدرن را با تأکید بر تفکیک قوا و حاکمیت مردمی بنا نهاد.
  - این بر تفکر علمی با تشویق روش تجربی و عقل‌گرایی تأثیر گذاشت.
explanation: |
  مکتب سالامانکا تأثیر عمیقی بر تفکر مدرن داشت، پایه‌های حقوق بین‌الملل را بنا نهاد، از حقوق بشر جهانی حمایت کرد و اصول اساسی فلسفه سیاسی و تفکر علمی را ایجاد کرد.
reviewed: false
question: ब्याज-आधारित ऋणों के प्रति मध्यकालीन चर्च का रवैया क्या था?
answer: इसने उन पर प्रतिबन्ध लगा दिया।
wrong_answers:
  - इससे उन्हें प्रोत्साहन मिला।
  - कुछ मामलों में तो उन्हें सहन भी किया गया।
  - इस मामले पर उसकी कोई राय नहीं थी।
explanation: |
  मध्यकालीन चर्च ने ब्याज-आधारित ऋण पर प्रतिबंध लगा दिया था, क्योंकि इस प्रथा को सूदखोरी का पाप माना जाता था, क्योंकि प्रारंभिक राशि से अधिक की मांग करके ऋण से लाभ कमाना अनैतिक माना जाता था।
reviewed: false
question: Kakav je bio stav srednjovekovne Crkve prema zajmovima s kamatom?
answer: Zabranilo im je.
wrong_answers:
  - To ih je ohrabrilo.
  - Tolerisao ih je u određenim slučajevima.
  - Nije imao mišljenje o tom pitanju.
explanation: |
  Srednjovekovna crkva zabranjivala je zajmove s kamatom, smatrajući ovu praksu grehom lihvarenja, jer je smatrala nemoralnim profitirati od zajma zahtevajući više od početnog iznosa.

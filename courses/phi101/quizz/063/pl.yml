question: Jaki był stosunek średniowiecznego Kościoła do oprocentowanych pożyczek?
answer: Zabronił im tego.
wrong_answers:
  - To ich zachęciło.
  - Tolerowała je w niektórych przypadkach.
  - Nie miał zdania w tej sprawie.
explanation: |
  Średniowieczny Kościół zakazał udzielania oprocentowanych pożyczek, uznając tę praktykę za grzech lichwy, ponieważ uważał za niemoralne czerpanie korzyści z pożyczki poprzez żądanie kwoty wyższej niż początkowa.
reviewed: false
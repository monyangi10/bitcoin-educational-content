question: Hoe stond de middeleeuwse kerk tegenover rentedragende leningen?
answer: Het verbood hen.
wrong_answers:
  - Het moedigde hen aan.
  - Het tolereerde ze in bepaalde gevallen.
  - Het had geen mening over de zaak.
explanation: |
  De middeleeuwse kerk verbood rentedragende leningen en beschouwde deze praktijk als een woekerzonde, omdat ze het immoreel vond om te profiteren van een lening door meer te vragen dan het oorspronkelijke bedrag.
reviewed: true
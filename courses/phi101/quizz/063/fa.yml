question: نگرش کلیسای قرون وسطی نسبت به وام‌های بهره‌دار چه بود؟
answer: این کار را برای آن‌ها ممنوع کرد.
wrong_answers:
  - این به آن‌ها انگیزه داد.
  - در موارد خاصی آن‌ها را تحمل می‌کرد.
  - در این مورد نظری نداشت.
explanation: |
  کلیسای قرون وسطی وام‌های بهره‌دار را ممنوع کرد و این عمل را گناه رباخواری می‌دانست، زیرا سود بردن از وام با درخواست بیش از مبلغ اولیه را غیراخلاقی می‌پنداشت.
reviewed: false
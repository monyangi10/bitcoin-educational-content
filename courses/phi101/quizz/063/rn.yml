question: None Ekleziya yo mu kinjana ca mbere yari ifise inyifato iyihe ku bijanye n’inguzanyo zitanga inyungu?
answer: Rwarababujije.
wrong_answers:
  - Rwarabaremesheje.
  - Rwarabihanganira mu bihe bimwebimwe.
  - Nta ciyumviro cari gifise ku bijanye n’ico kibazo.
explanation: |
  Ekleziya yo mu kinjana ca mbere yarabujije inguzanyo zitanga inyungu, ibona ko uwo mugenzo ari icaha c’inyungu, kuko yabona ko ari ubusambanyi kuronka inyungu mu ngurane mu gusaba amahera menshi kuruta ayo umuntu yatanze.
reviewed: true
question: ทัศนคติของคริสตจักรในยุคกลางต่อการให้กู้ยืมเงินที่มีดอกเบี้ยเป็นอย่างไร?
answer: มันห้ามพวกเขา
wrong_answers:
  - มันกระตุ้นให้พวกเขา
  - มันยอมรับพวกเขาในบางกรณี
  - มันไม่มีความคิดเห็นในเรื่องนี้
explanation: |
  ในยุคกลาง คริสตจักรห้ามการให้กู้ยืมที่มีดอกเบี้ย โดยถือว่าการปฏิบัตินี้เป็นบาปของการให้ดอกเบี้ยเกินควร เนื่องจากถือว่าไม่มีศีลธรรมที่จะทำกำไรจากการให้กู้ยืมโดยการเรียกร้องมากกว่าจำนวนเงินเริ่มต้น
reviewed: true
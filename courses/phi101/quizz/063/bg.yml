question: Какво е било отношението на средновековната Църква към лихвените заеми?
answer: Тя ги забранява.
wrong_answers:
  - Това ги окуражава.
  - Тя ги толерира в определени случаи.
  - Тя нямаше мнение по въпроса.
explanation: |
  Средновековната Църква забранява лихвените заеми, считайки тази практика за грях на лихварството, тъй като смята за неморално да се печели от заем, като се иска повече от първоначалната сума.
reviewed: true
question: 스콜라스틱 방법에서 디스패치의 역할은 무엇인가요?
answer: 비판적 사고와 논증 능력의 발달을 촉진합니다.
wrong_answers:
  - 이를 통해 학생들은 신앙의 교리를 질문하지 않고 암기할 수 있습니다.
  - 신학적인 논쟁을 확실하게 해결하고 독특한 진리에 도달하는 데 도움이 됩니다.
  - 스승과 제자 간의 관계를 의식화하고 교회의 권위를 주장하는 데 사용됩니다.
explanation: |
  토론은 학생들이 비판적 사고를 키우고 엄격하게 논쟁하도록 장려하여 철학적, 신학적 질문에 대한 깊은 성찰에 기여하는 학문적 방법의 핵심 연습입니다.
reviewed: true
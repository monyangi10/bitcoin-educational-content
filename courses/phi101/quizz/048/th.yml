question: บทบาทของ disputatio ในวิธีการสกอลาสติกคืออะไร?
answer: มันส่งเสริมการพัฒนาทักษะการคิดเชิงวิพากษ์และการโต้แย้ง
wrong_answers:
  - มันช่วยให้นักเรียนจดจำหลักคำสอนของศาสนาโดยไม่ตั้งคำถาม
  - มันทำหน้าที่ในการยุติการถกเถียงทางเทววิทยาอย่างเด็ดขาดและไปสู่ความจริงที่เป็นเอกลักษณ์
  - มันถูกใช้เพื่อสร้างพิธีกรรมในความสัมพันธ์ระหว่างอาจารย์และลูกศิษย์และเพื่อยืนยันอำนาจของคริสตจักร
explanation: |
  การโต้แย้ง (disputatio) เป็นการฝึกฝนที่สำคัญในวิธีการแบบสกอลาสติก ซึ่งส่งเสริมให้นักเรียนพัฒนาความคิดเชิงวิพากษ์และโต้แย้งอย่างเข้มงวด มีส่วนช่วยในการสะท้อนลึกซึ้งเกี่ยวกับคำถามทางปรัชญาและเทววิทยา
reviewed: true
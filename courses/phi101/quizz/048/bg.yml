question: Каква е ролята на disputatio в схоластичния метод?
answer: Той насърчава развитието на критично мислене и умения за аргументиране.
wrong_answers:
  - Тя позволява на учениците да запомнят догмите на вярата, без да ги подлагат на съмнение.
  - Тя служи за окончателно разрешаване на богословски спорове и за достигане до уникална истина.
  - Той се използва за ритуализиране на отношенията между учители и ученици и за утвърждаване на авторитета на Църквата.
explanation: |
  Диспутът е централно упражнение в схоластичния метод, което насърчава учениците да развиват критичното си мислене и да спорят стриктно, допринасяйки за задълбочено осмисляне на философски и богословски въпроси.
reviewed: true
question: Jaka jest rola disputatio w metodzie scholastycznej?
answer: Promuje rozwój umiejętności krytycznego myślenia i argumentacji.
wrong_answers:
  - Pozwala uczniom zapamiętać dogmaty wiary bez kwestionowania ich.
  - Służy ostatecznemu rozstrzygnięciu debat teologicznych i dojściu do jedynej prawdy.
  - Służy do rytualizacji relacji między mistrzami i uczniami oraz do zapewnienia autorytetu Kościoła.
explanation: |
  Dysputa jest centralnym ćwiczeniem w metodzie scholastycznej, zachęcającym uczniów do rozwijania krytycznego myślenia i rygorystycznej argumentacji, przyczyniając się do głębokiej refleksji nad kwestiami filozoficznymi i teologicznymi.
reviewed: false
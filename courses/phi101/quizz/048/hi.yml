question: विद्वतापूर्ण विधि (स्कॉलास्टिक मेथड) में "डिस्प्यूटेशियो" (disputatio) की क्या भूमिका है?
answer: यह आलोचनात्मक सोच और बहस करने के कौशल को बढ़ावा देता है।
wrong_answers:
  - यह छात्रों को बिना सवाल किए धर्म के सिद्धांतों को याद करने देता है।
  - यह धार्मिक बहसों को पूरी तरह सुलझाने और एक अद्वितीय सच्चाई तक पहुँचने में मदद करता है।
  - यह गुरु और शिष्य के बीच के रिश्तों को रीति-रिवाज़ का रूप देने और चर्च के अधिकार को स्थापित करने के लिए इस्तेमाल किया जाता है।
explanation: |
  विवाद (disputatio) स्कॉलैस्टिक पद्धति में एक मुख्य अभ्यास है, जो छात्रों को उनकी आलोचनात्मक सोच विकसित करने और सख्ती से तर्क करने के लिए प्रोत्साहित करता है, जिससे दार्शनिक और धार्मिक प्रश्नों पर गहन विचार होता है।
reviewed: false
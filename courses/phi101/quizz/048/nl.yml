question: Wat is de rol van de disputatio in de scholastieke methode?
answer: Het bevordert de ontwikkeling van kritisch denken en argumentatievaardigheden.
wrong_answers:
  - Het stelt studenten in staat om de dogma's van het geloof uit het hoofd te leren zonder ze in twijfel te trekken.
  - Het dient om theologische debatten definitief te beslechten en tot een unieke waarheid te komen.
  - Het wordt gebruikt om de relaties tussen meesters en leerlingen te ritualiseren en om de autoriteit van de kerk te bevestigen.
explanation: |
  De disputatio is een centrale oefening in de scholastieke methode en moedigt studenten aan om hun kritisch denken te ontwikkelen en rigoureus te argumenteren, wat bijdraagt aan een diepgaande reflectie op filosofische en theologische vragen.
reviewed: true
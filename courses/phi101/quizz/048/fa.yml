question: نقش "disputatio" در روش اسکولاستیک چیست؟
answer: این به توسعه مهارت‌های تفکر انتقادی و استدلال کمک می‌کند.
wrong_answers:
  - این به دانش‌آموزان اجازه می‌دهد تا اصول عقاید ایمان را بدون پرسش به خاطر بسپارند.
  - این به منظور حل قطعی مباحثات الهیاتی و رسیدن به یک حقیقت یکتا است.
  - از آن برای آیینی کردن روابط بین استادان و شاگردان و برای تأکید بر اقتدار کلیسا استفاده می‌شود.
explanation: |
  بحث و گفتگو یک تمرین مرکزی در روش اسکولاستیک است که دانشجویان را تشویق می‌کند تا تفکر انتقادی خود را توسعه دهند و به طور دقیق استدلال کنند، که به تأمل عمیق در مسائل فلسفی و الهیاتی کمک می‌کند.

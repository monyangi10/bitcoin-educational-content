question: Koja je uloga disputatio u skolastičkom metodu?
answer: Podstiče razvoj kritičkog mišljenja i veština argumentacije.
wrong_answers:
  - Omogućava studentima da memorišu dogme vere bez da ih preispituju.
  - Služi za definitivno rešavanje teoloških rasprava i dolazak do jedinstvene istine.
  - Koristi se za ritualizaciju odnosa između učitelja i učenika i za potvrđivanje autoriteta Crkve.
explanation: |
  Disputatio je centralna vežba u skolastičkoj metodi, koja podstiče studente da razvijaju kritičko mišljenje i da rigorozno argumentuju, doprinoseći dubokoj refleksiji o filozofskim i teološkim pitanjima.

question: เหตุการณ์สำคัญใดที่เป็นจุดสิ้นสุดของการเปลี่ยนแปลงดอลลาร์เป็นทองคำ?
answer: นิกสันช็อก
wrong_answers:
  - ภาวะเศรษฐกิจตกต่ำครั้งใหญ่
  - ช็อกน้ำมัน
  - สงครามโลกครั้งที่สอง
explanation: |
  Nixon Shock ในปี 1971 ได้ยุติการแปลงสภาพของดอลลาร์เป็นทองคำ ซึ่งเป็นการสิ้นสุดระบบ Bretton Woods และเป็นจุดเริ่มต้นของสกุลเงินลอยตัว เนื่องจากสหรัฐอเมริกาไม่สามารถสนับสนุนการแลกเปลี่ยนทองคำเป็นดอลลาร์ได้อีกต่อไป
reviewed: true
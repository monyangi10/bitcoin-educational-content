question: Jakie ważne wydarzenie oznaczało koniec wymienialności dolara na złoto?
answer: Szok Nixona
wrong_answers:
  - Wielki Kryzys
  - Szok naftowy
  - II wojna światowa
explanation: |
  Szok Nixona w 1971 r. zakończył wymienialność dolara na złoto, oznaczając koniec systemu z Bretton Woods i początek płynnych walut, ponieważ Stany Zjednoczone nie mogły dłużej wspierać Exchange złota za dolary.
reviewed: false
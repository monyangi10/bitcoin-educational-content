question: Ni tukio gani kuu lililoashiria mwisho wa ubadilishaji wa dola kuwa dhahabu?
answer: Mshtuko wa Nixon
wrong_answers:
  - Unyogovu Mkuu
  - Mshtuko wa mafuta
  - Vita Kuu ya II
explanation: |
  Mshtuko wa Nixon, mnamo 1971, ulimaliza ubadilishaji wa dola kuwa dhahabu, ikiashiria mwisho wa mfumo wa Bretton Woods na mwanzo wa sarafu zinazoelea, kwani Merika haikuweza tena kuunga mkono Exchange ya dhahabu kwa dola.

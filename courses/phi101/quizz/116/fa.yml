question: چه رویداد مهمی پایان تبدیل دلار به طلا را نشان داد؟
answer: شوک نیکسون
wrong_answers:
  - رکود بزرگ اقتصادی
  - شوک نفتی
  - جنگ جهانی دوم
explanation: |
  شوک نیکسون در سال 1971، تبدیل‌پذیری دلار به طلا را پایان داد و به این ترتیب به سیستم برتون وودز پایان داد و آغازگر ارزهای شناور شد، زیرا ایالات متحده دیگر نمی‌توانست Exchange طلا برای دلارها را پشتیبانی کند.
reviewed: false
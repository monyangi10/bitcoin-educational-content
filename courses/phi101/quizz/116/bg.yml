question: Кое важно събитие бележи края на конвертируемостта на долара в злато?
answer: Шокът на Никсън
wrong_answers:
  - Голямата депресия
  - Петролният шок
  - Втората световна война
explanation: |
  Шокът на Никсън през 1971 г. прекратява конвертируемостта на долара в злато, с което се слага край на Бретън-Уудската система и се поставя началото на плаващите валути, тъй като САЩ вече не могат да поддържат обмена на злато срещу долари.
reviewed: true
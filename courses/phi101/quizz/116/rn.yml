question: Ni ikintu gihambaye ikihe catumye idolari rihinduka inzahabu?
answer: Igitero ca Nixon
wrong_answers:
  - Ikigoyi gikomeye
  - Amavuta yateye ubwoba
  - Intambara ya kabiri y'isi yose
explanation: |
  Ico gitero ca Nixon, mu mwaka w’1971, cararangije uguhindura idolari mu nzahabu, kikaba ari co catumye ubuhinga bwa Bretton Woods buhera, n’intango y’amahera agendagenda, kuko Leta Zunze Ubumwe za Amerika zitagishobora gushigikira Exchange y’inzahabu ku madolari.
reviewed: true
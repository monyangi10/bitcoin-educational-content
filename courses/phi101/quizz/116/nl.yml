question: Welke belangrijke gebeurtenis markeerde het einde van de omwisselbaarheid van de dollar in goud?
answer: De schok van Nixon
wrong_answers:
  - De Grote Depressie
  - De olieschok
  - Tweede Wereldoorlog
explanation: |
  De Nixon Shock, in 1971, maakte een einde aan de converteerbaarheid van de dollar in goud, wat het einde betekende van het Bretton Woods systeem en het begin van zwevende valuta's, omdat de Verenigde Staten de Exchange van goud voor dollars niet langer kon ondersteunen.
reviewed: true
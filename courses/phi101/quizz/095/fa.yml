question: به گفته مارکس، محدودیت اصلی حقوق بشر چیست؟
answer: آن‌ها فقط از آزادی رسمی و انتزاعی محافظت می‌کنند.
wrong_answers:
  - آن‌ها حقوق طبیعی هستند.
  - آنها حقوق اختیاری هستند.
  - آنها از انقلاب جلوگیری می‌کنند.
explanation: |
  مارکس حقوق بشر را به دلیل اینکه آنها را رسمی می‌نامد، مورد انتقاد قرار می‌دهد زیرا آنها آزادی فردی انتزاعی را تضمین می‌کنند، بدون اینکه واقعاً شرایط مادی استثمار در جامعه سرمایه‌داری را تغییر دهند.
reviewed: false
question: Според Маркс кое е основното ограничение на правата на човека?
answer: Те защитават само една формална и абстрактна свобода.
wrong_answers:
  - Те са естествени права.
  - Те са незадължителни права.
  - Те предотвратяват революцията.
explanation: |
  Маркс критикува правата на човека, като ги нарича формални, защото гарантират абстрактна индивидуална свобода, без да променят материалните условия на експлоатация в капиталистическото общество.
reviewed: true
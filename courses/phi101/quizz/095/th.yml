question: ตามที่มาร์กซ์กล่าว ข้อจำกัดหลักของสิทธิมนุษยชนคืออะไร?
answer: พวกเขาปกป้องเพียงเสรีภาพที่เป็นทางการและนามธรรมเท่านั้น
wrong_answers:
  - พวกเขาคือสิทธิตามธรรมชาติ
  - พวกเขาเป็นสิทธิ์ที่เลือกได้
  - พวกเขาป้องกันการปฏิวัติ
explanation: |
  มาร์กซ์วิจารณ์สิทธิมนุษยชนโดยเรียกมันว่าเป็นสิทธิที่เป็นทางการเพราะพวกมันรับประกันเสรีภาพของปัจเจกบุคคลในเชิงนามธรรม โดยไม่เปลี่ยนแปลงเงื่อนไขทางวัตถุของการแสวงหาประโยชน์ในสังคมทุนนิยมอย่างแท้จริง
reviewed: true
question: Nk’uko Marx abivuga, ni igiki nyamukuru kigabanya uburenganzira bwa muntu?
answer: Bakingira gusa umwidegemvyo usanzwe n’uwutaboneka.
wrong_answers:
  - Ni uburenganzira busanzwe.
  - Ni uburenganzira umuntu ashobora guhitamwo.
  - Babuza amahinduka.
explanation: |
  Marx anegura uburenganzira bwa muntu mu kubwita uburenganzira busanzwe kuko butanga umwidegemvyo w’umuntu ku giti ciwe udasanzwe, ataco buhinduye mu vy’ukuri ku bijanye n’ibintu vy’umubiri vy’ugukoreshwa nabi mu kibano c’abanyagihugu.
reviewed: true
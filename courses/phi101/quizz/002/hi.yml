question: आज़ादी का मतलब क्या है?
answer: बाकी सारे जवाब
wrong_answers:
  - अपनी चीज़ों के साथ जो चाहे करने की ताक़त
  - बाहरी बंधनों का न होना
  - स्वतंत्र रूप से सोचने और कार्य करने की क्षमता
explanation: |
  "स्वतंत्रता" के कई पहलू हैं, जैसे कि अपनी मर्जी से काम करने की ताकत, बाहरी रोक-टोक का न होना, और सोचने-समझने व काम करने में खुदमुख्तारी... ये सब मिलकर इस अहम अवधारणा को पूरी तरह समझाते हैं।
reviewed: false
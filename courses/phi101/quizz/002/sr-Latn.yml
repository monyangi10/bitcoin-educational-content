question: Šta sloboda podrazumeva?
answer: Svi ostali odgovori
wrong_answers:
  - Moć da se radi šta se želi sa onim što im pripada
  - Odsustvo spoljašnjih ograničenja
  - Sposobnost da mislite i delujete samostalno
explanation: |
  Sloboda obuhvata nekoliko dimenzija, uključujući moć da se deluje u skladu sa svojom voljom, odsustvo spoljašnjih ograničenja i sposobnost za autonomiju u mišljenju i delovanju, što sve doprinosi sveobuhvatnoj definiciji ovog pojma.

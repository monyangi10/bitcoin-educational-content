question: آزادی شامل چه چیزهایی می‌شود؟
answer: همه پاسخ‌های دیگر
wrong_answers:
  - قدرت انجام آنچه که فرد می‌خواهد با آنچه که به او تعلق دارد
  - عدم وجود محدودیت‌های خارجی
  - توانایی تفکر و عمل به‌صورت مستقل
explanation: |
  آزادی شامل ابعاد مختلفی است، از جمله قدرت عمل بر اساس اراده شخصی، نبود محدودیت‌های خارجی، و ظرفیت خودمختاری در فکر و عمل، که همگی به تعریف جامع این مفهوم کمک می‌کنند.
reviewed: false
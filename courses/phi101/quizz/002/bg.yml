question: Какво включва свободата?
answer: Всички останали отговори
wrong_answers:
  - Властта да правиш каквото си искаш с това, което ти принадлежи
  - Липсата на външни ограничения
  - Способност за самостоятелно мислене и действие
explanation: |
  Свободата включва няколко измерения, включително правото да се действа по собствена воля, липсата на външни ограничения и способността за автономност в мисленето и действието, като всички те допринасят за цялостното определение на това понятие.
reviewed: ture
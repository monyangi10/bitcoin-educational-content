question: طبقاً به سنت آگوستین، دو شهری که در جهان همزیستی دارند کدامند؟
answer: شهر خدا و شهر زمینی.
wrong_answers:
  - شهر انسان‌ها و شهر خدایان.
  - شهر مقدسین و شهر گناهکاران.
  - شهر دانشگاه و شهر فرشتگان.
explanation: |
  سنت آگوستین دو شهر را توصیف می‌کند که در جهان همزیستی دارند: شهر خدا، که به سوی خدا و زندگی معنوی گرایش دارد، و شهر زمینی، که بر نگرانی‌های انسانی و مسائل مادی متمرکز است، هر یک اهداف متمایزی را دنبال می‌کنند.
reviewed: false
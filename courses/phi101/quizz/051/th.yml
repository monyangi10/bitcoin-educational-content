question: ตามที่นักบุญออกัสตินกล่าวไว้ เมืองสองเมืองที่อยู่ร่วมกันในโลกคืออะไร?
answer: นครของพระเจ้าและนครทางโลก
wrong_answers:
  - เมืองของมนุษย์และเมืองของเทพเจ้า
  - เมืองแห่งนักบุญและเมืองแห่งคนบาป
  - เมืองมหาวิทยาลัยและเมืองแห่งเทวดา
explanation: |
  นักบุญออกัสตินอธิบายถึงสองเมืองที่อยู่ร่วมกันในโลก: เมืองของพระเจ้า ซึ่งมุ่งเน้นไปที่พระเจ้าและชีวิตทางจิตวิญญาณ และเมืองทางโลก ซึ่งมุ่งเน้นไปที่ความกังวลของมนุษย์และเรื่องทางวัตถุ โดยแต่ละเมืองมีวัตถุประสงค์ที่แตกต่างกัน
reviewed: true
question: संत ऑगस्टीन के अनुसार विश्व में कौन से दो शहर एक साथ मौजूद हैं?
answer: ईश्वर का शहर और सांसारिक शहर.
wrong_answers:
  - मनुष्यों का शहर और देवताओं का शहर.
  - संतों का शहर और पापियों का शहर.
  - विश्वविद्यालय शहर और स्वर्गदूतों का शहर।
explanation: |
  संत ऑगस्टीन ने विश्व में सह-अस्तित्व वाले दो शहरों का वर्णन किया है: ईश्वर का शहर, जो ईश्वर और आध्यात्मिक जीवन की ओर उन्मुख है, और सांसारिक शहर, जो मानवीय चिंताओं और भौतिक मामलों पर केंद्रित है, तथा जिनमें से प्रत्येक अलग-अलग उद्देश्यों का अनुसरण करता है।
reviewed: false
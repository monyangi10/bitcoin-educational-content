question: Според свети Августин кои са двата града, които съществуват едновременно в света?
answer: Божият град и земният град.
wrong_answers:
  - Градът на хората и градът на боговете.
  - Градът на светците и градът на грешниците.
  - Университетският град и градът на ангелите.
explanation: |
  Свети Августин описва два града, които съжителстват в света: Божият град, насочен към Бога и духовния живот, и земният град, съсредоточен върху човешките грижи и материалните въпроси, като всеки от тях преследва различни цели.
reviewed: true
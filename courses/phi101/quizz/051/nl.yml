question: Wat zijn volgens Sint-Augustinus de twee steden die naast elkaar bestaan in de wereld?
answer: De stad van God en de aardse stad.
wrong_answers:
  - De stad van de mensen en de stad van de goden.
  - De stad van de heiligen en de stad van de zondaars.
  - De universiteitsstad en de engelenstad.
explanation: |
  Sint Augustinus beschrijft twee steden die naast elkaar bestaan in de wereld: de Stad van God, gericht op God en het spirituele leven, en de Aardse Stad, gericht op menselijke zorgen en materiële zaken, elk met hun eigen doelstellingen.
reviewed: true
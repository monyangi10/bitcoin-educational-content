question: ตามที่เฮเยคกล่าว ความเชื่อมโยงระหว่างสังคมนิยมและนาซีคืออะไร?
answer: คำตอบอื่น ๆ ทั้งหมด (พวกเขาปฏิเสธความเป็นปัจเจกนิยม, ให้ความสำคัญกับสวัสดิการของกลุ่ม, และใช้การบังคับ)
wrong_answers:
  - อุดมการณ์ทั้งสองไม่สามารถเข้ากันได้
  - สังคมนิยมและนาซีมีความขัดแย้งกันในประเด็นทางเศรษฐกิจ
  - ลัทธิสังคมนิยมและลัทธินาซีไม่มีความเชื่อมโยงกัน
explanation: |
  ฮาเย็คโต้แย้งว่าสังคมนิยมและนาซีมีลักษณะร่วมกัน เช่น การปฏิเสธความเป็นปัจเจกบุคคลเพื่อสนับสนุนส่วนรวมและการใช้การบังคับ ซึ่งทำให้พวกเขามีความคล้ายคลึงกันในผลกระทบแบบเผด็จการ
reviewed: true
question: Nk’uko Hayek abivuga, ni isano irihe riri hagati y’ubusosiyalisimu n’ubunazi?
answer: Ibindi bisubizo vyose (bisangiye ukwanka ubwigenge bw’umuntu ku giti ciwe, bishira imbere ineza y’umugwi, bikoresha uguhatira).
wrong_answers:
  - Izo ngendo zibiri ntizihuye.
  - Ubusosiyalisimu n’ubunazi birarwanywa ku bibazo vy’ubutunzi.
  - Ubusosiyalisimu n’ubunazi nta sano bifitaniye.
explanation: |
  Hayek yavuze ko ubusosiyalisimu n’ubunazi bihuriyeko, nk’ukwanka ubumwe bw’abantu ku giti cabo kugira ngo bafashe abantu bose, ivyo bikaba bituma bisa mu ngaruka zavyo z’ubutegetsi bw’agahomerabunwa.
reviewed: true
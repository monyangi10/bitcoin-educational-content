question: 하이에크에 따르면 사회주의와 나치즘의 관계는 무엇일까요?
answer: 다른 모든 답변(개인주의에 대한 거부감, 집단의 복지를 우선시하고 강압을 사용한다는 공통점)이 있습니다.
wrong_answers:
  - 이 두 가지 이념은 양립할 수 없습니다.
  - 사회주의와 나치즘은 경제 문제에서 대립합니다.
  - 사회주의와 나치즘은 아무런 관련이 없습니다.
explanation: |
  하이에크는 사회주의와 나치즘이 집단을 위해 개인주의를 거부하고 강압을 사용하는 등 공통된 특성을 공유하며, 이는 권위주의적 효과에 있어서도 유사하다고 주장했습니다.
reviewed: true
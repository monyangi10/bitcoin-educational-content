question: Каква е връзката между социализма и нацизма според Хайек?
answer: Всички останали отговори (те споделят отхвърлянето на индивидуализма, дават приоритет на благосъстоянието на групата и използват принуда).
wrong_answers:
  - Двете идеологии са несъвместими.
  - Социализмът и нацизмът се противопоставят по икономически въпроси.
  - Социализмът и нацизмът нямат никаква връзка.
explanation: |
  Хайек твърди, че социализмът и нацизмът имат общи черти, като например отхвърлянето на индивидуализма в полза на колектива и използването на принуда, което ги прави сходни по отношение на авторитарния им ефект.
reviewed: true
question: طبق نظر هایک، ارتباط بین سوسیالیسم و نازیسم چیست؟
answer: همه پاسخ‌های دیگر (آن‌ها رد فردگرایی را به اشتراک می‌گذارند، رفاه گروه را در اولویت قرار می‌دهند، از اجبار استفاده می‌کنند).
wrong_answers:
  - این دو ایدئولوژی ناسازگار هستند.
  - سوسیالیسم و نازیسم در مسائل اقتصادی مخالف یکدیگر هستند.
  - سوسیالیسم و نازیسم هیچ ارتباطی ندارند.
explanation: |
  هایک استدلال کرد که سوسیالیسم و نازیسم ویژگی‌های مشترکی دارند، مانند رد فردگرایی به نفع جمع‌گرایی و استفاده از اجبار، که آن‌ها را در اثرات استبدادی‌شان مشابه می‌سازد.
reviewed: false
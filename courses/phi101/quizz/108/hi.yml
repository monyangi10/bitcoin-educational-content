question: हायक के अनुसार, समाजवाद और नाज़ीवाद के बीच क्या संबंध है?
answer: बाकी सारे जवाब (वे व्यक्तिवाद को खारिज करते हैं, समूह के कल्याण को प्राथमिकता देते हैं, ज़बरदस्ती का इस्तेमाल करते हैं)।
wrong_answers:
  - दोनों विचारधाराएँ एक-दूसरे से मेल नहीं खातीं।
  - समाजवाद और नाज़ीवाद आर्थिक मुद्दों पर एक-दूसरे के विरोधी हैं।
  - समाजवाद और नाज़ीवाद का कोई संबंध नहीं है।
explanation: |
  हायक ने कहा कि समाजवाद और नाज़ीवाद में कुछ समानताएं हैं, जैसे कि व्यक्तिवाद को खारिज करके सामूहिकता को महत्व देना और ज़बरदस्ती का इस्तेमाल करना। इस वजह से दोनों ही अधिनायकवादी प्रभाव पैदा करते हैं।
reviewed: false
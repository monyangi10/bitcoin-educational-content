question: Vad var fysiokraternas bidrag till det liberala tänkandet?
answer: Alla ovanstående svar är korrekta.
wrong_answers:
  - De förespråkade individuell frihet och privat egendom.
  - De utvecklade teorin om den fria marknaden.
  - De kritiserade merkantilism och statliga ingripanden.
explanation: |
  Fysiokraterna bidrog till det liberala tänkandet genom att förespråka individuell frihet, privat egendom och den fria marknaden, samtidigt som de förkastade merkantilism och statliga ingripanden och därmed lade grunden för en ekonomi baserad på naturlagar.
reviewed: true
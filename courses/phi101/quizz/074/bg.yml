question: Какъв е приносът на физиократите за либералната мисъл?
answer: Всички отговори по-горе са верни.
wrong_answers:
  - Те се застъпват за индивидуалната свобода и частната собственост.
  - Те развиват теорията за свободния пазар.
  - Те критикуват меркантилизма и държавната намеса.
explanation: |
  Физиократите допринасят за развитието на либералната мисъл, като се застъпват за индивидуалната свобода, частната собственост и свободния пазар, като същевременно отхвърлят меркантилизма и държавната намеса, с което полагат основите на икономика, основана на природни закони.
reviewed: true
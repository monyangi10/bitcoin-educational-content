question: อะไรคือการมีส่วนร่วมของกลุ่มฟีซิโอแครตต่อแนวคิดเสรีนิยม?
answer: คำตอบทั้งหมดข้างต้นถูกต้อง
wrong_answers:
  - พวกเขาสนับสนุนเสรีภาพส่วนบุคคลและทรัพย์สินส่วนตัว
  - พวกเขาได้พัฒนาทฤษฎีของตลาดเสรี
  - พวกเขาวิจารณ์ลัทธิพาณิชย์นิยมและการแทรกแซงของรัฐ
explanation: |
  พวกฟิสิโอแครตมีส่วนในการพัฒนาความคิดเสรีโดยสนับสนุนเสรีภาพส่วนบุคคล ทรัพย์สินส่วนตัว และตลาดเสรี ในขณะที่ปฏิเสธลัทธิพาณิชยนิยมและการแทรกแซงของรัฐ ซึ่งเป็นการวางรากฐานสำหรับเศรษฐกิจที่อิงตามกฎธรรมชาติ
reviewed: true
question: مشارکت فیزیوکرات‌ها در اندیشه لیبرال چه بود؟
answer: همه پاسخ‌های فوق صحیح هستند.
wrong_answers:
  - آن‌ها از آزادی فردی و مالکیت خصوصی حمایت کردند.
  - آن‌ها نظریه بازار آزاد را توسعه دادند.
  - آن‌ها از مرکانتیلیسم و مداخله دولت انتقاد کردند.
explanation: |
  فیزیوکرات‌ها با حمایت از آزادی فردی، مالکیت خصوصی، بازار آزاد و رد مرکانتیلیسم و مداخله دولت، به تفکر لیبرال کمک کردند و زمینه را برای اقتصادی مبتنی بر قوانین طبیعی فراهم کردند.
reviewed: false
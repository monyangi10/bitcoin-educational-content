question: फिजियोक्रेट्स ने उदारवादी विचारधारा में क्या योगदान दिया?
answer: ऊपर दिए गए सभी जवाब सही हैं।
wrong_answers:
  - उन्होंने व्यक्तिगत स्वतंत्रता और निजी संपत्ति की वकालत की।
  - उन्होंने मुक्त बाजार के सिद्धांत को विकसित किया।
  - उन्होंने व्यापारवाद और सरकारी हस्तक्षेप की आलोचना की।
explanation: |
  फिजियोक्रेट्स ने व्यक्तिगत स्वतंत्रता, निजी संपत्ति, मुक्त बाजार की वकालत करके और मर्केंटिलिज़्म व सरकारी हस्तक्षेप को खारिज करके उदार विचारधारा में योगदान दिया, जिससे प्राकृतिक नियमों पर आधारित अर्थव्यवस्था की नींव रखी गई।
reviewed: false
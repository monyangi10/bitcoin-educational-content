question: Kakav je bio doprinos fiziokrata liberalnoj misli?
answer: Svi gore navedeni odgovori su tačni.
wrong_answers:
  - Zagovarali su individualnu slobodu i privatnu svojinu.
  - Razvili su teoriju slobodnog tržišta.
  - Kritikovali su merkantilizam i državnu intervenciju.
explanation: |
  Fiziokrati su doprineli liberalnoj misli zagovarajući individualnu slobodu, privatnu svojinu, slobodno tržište i odbacujući merkantilizam i državnu intervenciju, postavljajući temelje za ekonomiju zasnovanu na prirodnim zakonima.

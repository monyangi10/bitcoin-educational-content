question: Fizyokratların liberal düşünceye katkısı ne olmuştur?
answer: Yukarıdaki cevapların hepsi doğrudur.
wrong_answers:
  - Bireysel özgürlüğü ve özel mülkiyeti savundular.
  - Serbest piyasa teorisini geliştirdiler.
  - Merkantilizmi ve devlet müdahalesini eleştirdiler.
explanation: |
  Fizyokratlar, merkantilizmi ve devlet müdahalesini reddederken bireysel özgürlüğü, özel mülkiyeti ve serbest piyasayı savunarak liberal düşünceye katkıda bulunmuş ve böylece doğal yasalara dayalı bir ekonominin temellerini atmışlardır.
reviewed: true
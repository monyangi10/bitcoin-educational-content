question: Wat was de bijdrage van de Fysiocraten aan het liberale denken?
answer: Alle bovenstaande antwoorden zijn juist.
wrong_answers:
  - Ze pleitten voor individuele vrijheid en privébezit.
  - Ze ontwikkelden de theorie van de vrije markt.
  - Ze bekritiseerden het mercantilisme en staatsinterventie.
explanation: |
  De Fysiocraten droegen bij aan het liberale gedachtegoed door te pleiten voor individuele vrijheid, privébezit en de vrije markt, terwijl ze mercantilisme en staatsinterventie verwierpen en zo de basis legden voor een economie gebaseerd op natuurwetten.
reviewed: true
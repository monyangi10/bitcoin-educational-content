question: Je! ni mchango gani wa Wanafiziokrasia katika fikra huria?
answer: Majibu yote hapo juu ni sahihi.
wrong_answers:
  - Walitetea uhuru wa mtu binafsi na mali binafsi.
  - Walianzisha nadharia ya soko huria.
  - Walikosoa mercantilism na kuingilia serikali.
explanation: |
  Wanafiziokrasia walichangia mawazo ya kiliberali kwa kutetea uhuru wa mtu binafsi, mali ya kibinafsi, soko huria, na kwa kukataa biashara ya kibiashara na kuingilia serikali, wakiweka msingi wa uchumi unaotegemea sheria za asili.

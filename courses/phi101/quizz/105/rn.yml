question: Ni igiki ciyumviro nyamukuru Hayek avuga mu gitabu ciwe Inzira y’Ubuja?
answer: Ukwivanga mu vyo Leta ikora bituma ata kabuza umuntu aba abaja.
wrong_answers:
  - Ubusosiyalisimu n’ubunazi ni ivyiyumviro bitandukanye cane.
  - Ivy’umuntu ku giti ciwe ni ubutungane, iyo bifise aho bigarukira.
  - Umuvuduko wo guca mu nzira ija mu busuku ni 80 km/h.
explanation: |
  Mu gitabu ciwe citwa The Road to Serfdom, Hayek avuga ko iyo Leta yinjiye mu vy’ubutunzi buhorobuhoro bituma umuntu atakaza umwidegemvyo, kuko igenamigambi ry’imbere mu gihugu rituma ata kabuza umwidegemvyo w’umuntu ku giti ciwe uhagarara.
reviewed: true
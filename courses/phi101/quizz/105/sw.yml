question: Ni nadharia gani kuu ya Hayek katika Barabara ya Serfdom?
answer: Uingiliaji kati wa serikali bila shaka husababisha utumwa.
wrong_answers:
  - Ujamaa na Unazi kimsingi ni itikadi tofauti.
  - Mali ya kibinafsi ni tu ikiwa ni mdogo.
  - Kikomo cha kasi kwenye barabara ya serfdom ni 80 km / h.
explanation: |
  Katika Barabara ya Serfdom, Hayek anasema kuwa kuingilia kati kwa serikali katika uchumi hatua kwa hatua kunasababisha kupoteza uhuru, kwani upangaji mkuu bila shaka husababisha vikwazo kwa uhuru wa mtu binafsi.

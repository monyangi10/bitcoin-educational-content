question: อะไรคือวิทยานิพนธ์หลักของ Hayek ใน The Road to Serfdom?
answer: การแทรกแซงของรัฐนำไปสู่การเป็นทาสอย่างหลีกเลี่ยงไม่ได้
wrong_answers:
  - สังคมนิยมและลัทธินาซีเป็นอุดมการณ์ที่แตกต่างกันโดยพื้นฐาน
  - ทรัพย์สินส่วนบุคคลเป็นธรรม หากมีการจำกัด
  - ขีดจำกัดความเร็วบนถนนสู่ความเป็นทาสคือ 80 กม./ชม.
explanation: |
  ในหนังสือ The Road to Serfdom, Hayek โต้แย้งว่าการแทรกแซงของรัฐในเศรษฐกิจจะนำไปสู่การสูญเสียเสรีภาพอย่างค่อยเป็นค่อยไป เนื่องจากการวางแผนแบบรวมศูนย์จะส่งผลให้เกิดข้อจำกัดต่อเสรีภาพส่วนบุคคลอย่างหลีกเลี่ยงไม่ได้
reviewed: true
question: تز اصلی هایک در کتاب "راهی به سوی بردگی" چیست؟
answer: مداخله‌گرایی دولتی به ناچار به بندگی منجر می‌شود.
wrong_answers:
  - سوسیالیسم و نازیسم به‌طور اساسی ایدئولوژی‌های متفاوتی هستند.
  - مالکیت خصوصی تنها در صورتی عادلانه است که محدود باشد.
  - حداکثر سرعت در جادهٔ بندگی ۸۰ کیلومتر در ساعت است.
explanation: |
  در کتاب راه بردگی، هایک استدلال می‌کند که مداخله دولت در اقتصاد به تدریج منجر به از دست رفتن آزادی می‌شود، زیرا برنامه‌ریزی مرکزی به‌طور اجتناب‌ناپذیری به محدودیت‌هایی بر آزادی فردی منجر می‌شود.
reviewed: false
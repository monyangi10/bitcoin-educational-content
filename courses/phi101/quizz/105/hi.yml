question: द रोड टू सर्फडम में हायेक की मुख्य थीसिस क्या है?
answer: राज्य का हस्तक्षेप अनिवार्यतः दासता की ओर ले जाता है।
wrong_answers:
  - समाजवाद और नाज़ीवाद मूलतः भिन्न विचारधाराएँ हैं।
  - निजी संपत्ति तभी न्यायसंगत है जब वह सीमित हो।
  - सर्फडम की ओर जाने वाली सड़क पर गति सीमा 80 किमी/घंटा है।
explanation: |
  द रोड टू सर्फडम में हायेक ने तर्क दिया है कि अर्थव्यवस्था में राज्य का हस्तक्षेप धीरे-धीरे स्वतंत्रता की हानि की ओर ले जाता है, क्योंकि केंद्रीय योजना के परिणामस्वरूप अनिवार्य रूप से व्यक्तिगत स्वतंत्रता पर प्रतिबंध लग जाता है।
reviewed: false
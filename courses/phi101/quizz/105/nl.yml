question: Wat is de belangrijkste stelling van Hayek in The Road to Serfdom?
answer: Staatsinterventionisme leidt onvermijdelijk tot slavernij.
wrong_answers:
  - Socialisme en nazisme zijn fundamenteel verschillende ideologieën.
  - Privébezit is rechtvaardig als het beperkt is.
  - De maximumsnelheid op de weg naar lijfeigenschap is 80 km/u.
explanation: |
  In The Road to Serfdom stelt Hayek dat staatsinterventie in de economie geleidelijk leidt tot een verlies van vrijheid, omdat centrale planning onvermijdelijk leidt tot beperkingen van de individuele vrijheid.
reviewed: true
question: Jaka jest główna teza Hayeka w "Drodze do poddaństwa"?
answer: Interwencjonizm państwowy nieuchronnie prowadzi do zniewolenia.
wrong_answers:
  - Socjalizm i nazizm to zasadniczo różne ideologie.
  - Własność prywatna jest sprawiedliwa, jeśli jest ograniczona.
  - Ograniczenie prędkości na drodze do poddaństwa wynosi 80 km/h.
explanation: |
  W Drodze do poddaństwa Hayek argumentuje, że interwencja państwa w gospodarkę stopniowo prowadzi do utraty wolności, ponieważ centralne planowanie nieuchronnie skutkuje ograniczeniem wolności jednostki.
reviewed: false
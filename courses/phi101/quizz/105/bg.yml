question: Каква е основната теза на Хайек в "Пътят към робството"?
answer: Държавният интервенционизъм неизбежно води до робство.
wrong_answers:
  - Социализмът и нацизмът са коренно различни идеологии.
  - Частната собственост е справедлива, ако е ограничена.
  - Ограничението на скоростта по пътя към робството е 80 км/ч.
explanation: |
  В "Пътят към крепостничеството" Хайек твърди, че държавната намеса в икономиката постепенно води до загуба на свободата, тъй като централното планиране неизбежно води до ограничаване на личната свобода.
reviewed: true
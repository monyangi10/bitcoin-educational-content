question: موضع سنت آگوستین در مورد رابطه بین قدرت معنوی و قدرت دنیوی چه بود؟
answer: قدرت دنیوی باید تابع قدرت معنوی باشد.
wrong_answers:
  - قدرت معنوی باید تابع قدرت دنیوی باشد.
  - دو قدرت مستقل از یکدیگر هستند و باید به‌طور مسالمت‌آمیز همزیستی کنند.
  - قدرت دنیوی مشروعیتی ندارد و باید به نفع قدرت معنوی لغو شود.
explanation: |
  سنت آگوستین استدلال کرد که قدرت دنیوی باید تابع قدرت معنوی باشد زیرا هدف زندگی انسان معنوی است و باید اقدامات سیاسی را به گونه‌ای هدایت کند که با ارزش‌های مسیحی همخوانی داشته باشد.
reviewed: false
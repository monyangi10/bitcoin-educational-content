question: จุดยืนของนักบุญออกัสตินเกี่ยวกับความสัมพันธ์ระหว่างอำนาจทางจิตวิญญาณและอำนาจทางโลกคืออะไร?
answer: อำนาจทางโลกต้องอยู่ใต้บังคับของอำนาจทางจิตวิญญาณ
wrong_answers:
  - อำนาจทางจิตวิญญาณต้องอยู่ภายใต้อำนาจทางโลก
  - อำนาจทั้งสองเป็นอิสระจากกันและต้องอยู่ร่วมกันอย่างสันติ
  - อำนาจทางโลกไม่มีความชอบธรรมและต้องถูกยกเลิกเพื่อสนับสนุนอำนาจทางจิตวิญญาณ
explanation: |
  นักบุญออกัสตินให้เหตุผลว่าอำนาจทางโลกต้องอยู่ใต้บังคับบัญชาของอำนาจทางจิตวิญญาณเพราะจุดประสงค์สูงสุดของชีวิตมนุษย์คือจิตวิญญาณและควรชี้นำการกระทำทางการเมืองให้สอดคล้องกับค่านิยมของคริสเตียน
reviewed: true
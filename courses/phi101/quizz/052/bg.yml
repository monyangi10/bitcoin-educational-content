question: Каква е позицията на свети Августин относно връзката между духовната и светската власт?
answer: Временната власт трябва да бъде подчинена на духовната.
wrong_answers:
  - Духовната власт трябва да бъде подчинена на светската власт.
  - Двете сили са независими една от друга и трябва да съжителстват мирно.
  - Временната власт няма легитимност и трябва да бъде премахната в полза на духовната власт.
explanation: |
  Свети Августин твърди, че светската власт трябва да бъде подчинена на духовната, тъй като крайната цел на човешкия живот е духовна и трябва да ръководи политическите действия в съответствие с християнските ценности.
reviewed: true
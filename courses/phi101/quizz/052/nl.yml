question: Wat was het standpunt van Sint Augustinus over de relatie tussen geestelijke macht en wereldlijke macht?
answer: Tijdelijke macht moet ondergeschikt zijn aan geestelijke macht.
wrong_answers:
  - Geestelijke macht moet ondergeschikt zijn aan wereldlijke macht.
  - De twee machten zijn onafhankelijk van elkaar en moeten vreedzaam naast elkaar bestaan.
  - Tijdelijke macht heeft geen legitimiteit en moet worden afgeschaft ten gunste van geestelijke macht.
explanation: |
  De heilige Augustinus stelde dat wereldlijke macht ondergeschikt moet zijn aan geestelijke macht omdat het uiteindelijke doel van het menselijk leven spiritueel is en politiek handelen in overeenstemming met christelijke waarden zou moeten sturen.
reviewed: true
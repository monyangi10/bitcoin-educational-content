question: Какъв е основният аргумент на Жак Руеф по отношение на валутата?
answer: Хартиените пари са опасни и водят до дирижизъм
wrong_answers:
  - Хартиените пари са стабилни и предвидими
  - Хартиените пари са необходими за икономическото развитие
  - Хартиените пари трябва да бъдат обезпечени с физически активи
explanation: |
  Жак Рюф смята, че книжните пари, улеснявайки контрола на властите върху икономиката, благоприятстват дирижизма и създават рискове за паричната стабилност.
reviewed: true
question: استدلال اصلی ژاک روف در مورد ارز چیست؟
answer: پول کاغذی خطرناک است و به دیریژیسم منجر می‌شود
wrong_answers:
  - پول کاغذی پایدار و قابل پیش‌بینی است
  - پول کاغذی برای توسعه اقتصادی ضروری است
  - پول کاغذی باید توسط دارایی‌های فیزیکی پشتیبانی شود
explanation: |
  ژاک روف معتقد بود که پول کاغذی، با تسهیل کنترل اقتصاد توسط مقامات، به نفع دولت‌گرایی است و خطراتی برای ثبات پولی ایجاد می‌کند.
reviewed: false
question: ข้อโต้แย้งหลักของ Jacques Rueff เกี่ยวกับสกุลเงินคืออะไร?
answer: เงินกระดาษเป็นอันตรายและนำไปสู่การควบคุมเศรษฐกิจโดยรัฐ
wrong_answers:
  - เงินกระดาษมีความเสถียรและคาดการณ์ได้
  - เงินกระดาษเป็นสิ่งจำเป็นสำหรับการพัฒนาเศรษฐกิจ
  - เงินกระดาษต้องได้รับการสนับสนุนโดยสินทรัพย์ทางกายภาพ
explanation: |
  ฌาคส์ รูเอฟ เชื่อว่าเงินกระดาษ โดยการอำนวยความสะดวกในการควบคุมเศรษฐกิจโดยเจ้าหน้าที่ ส่งเสริมการควบคุมจากส่วนกลางและก่อให้เกิดความเสี่ยงต่อเสถียรภาพทางการเงิน
reviewed: true
question: Jacques Rueff'un para birimine ilişkin temel argümanı nedir?
answer: Kâğıt para tehlikelidir ve dirijizme yol açar
wrong_answers:
  - Kağıt para istikrarlı ve öngörülebilirdir
  - Kağıt para ekonomik kalkınma için gereklidir
  - Kağıt para fiziksel varlıklarla desteklenmelidir
explanation: |
  Jacques Rueff, kağıt paranın ekonominin yetkililer tarafından kontrol edilmesini kolaylaştırarak dirijizme destek verdiğine ve parasal istikrar için risk oluşturduğuna inanıyordu.
reviewed: true
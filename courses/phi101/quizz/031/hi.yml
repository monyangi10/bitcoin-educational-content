question: रोमन कानून का पहला लिखित संहिताकरण क्या है?
answer: बारह तख्तों का कानून
wrong_answers:
  - हम्मुराबी का संहिता
  - डाइजेस्ट
  - जस्टिनियन के आदेश
explanation: |
  बारह तालिकाओं का कानून रोमन कानून का पहला लिखित संहिताकरण है, जिसे कानूनों को औपचारिक रूप देने और कानून को सभी के लिए सुलभ बनाकर नागरिकों के बीच कानूनी समानता सुनिश्चित करने के लिए बनाया गया था।
reviewed: false
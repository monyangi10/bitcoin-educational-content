question: نام اولین تدوین مکتوب قانون روم چیست؟
answer: قانون دوازده جدول
wrong_answers:
  - قانون حمورابی
  - هضم
  - فرمان‌های ژوستینین
explanation: |
  قانون دوازده جدول اولین تدوین مکتوب قانون روم است که برای رسمی‌سازی قوانین و تضمین برابری قانونی در میان شهروندان با در دسترس قرار دادن قانون برای همه ایجاد شد.

question: ชื่อของการประมวลกฎหมายโรมันที่เขียนขึ้นเป็นครั้งแรกคืออะไร?
answer: กฎหมายสิบสองโต๊ะ
wrong_answers:
  - ประมวลกฎหมายฮัมมูราบี
  - The Digest
  - พระราชกฤษฎีกาของจัสติเนียน
explanation: |
  กฎหมายสิบสองโต๊ะเป็นการประมวลกฎหมายโรมันที่เขียนขึ้นครั้งแรก สร้างขึ้นเพื่อทำให้กฎหมายเป็นทางการและเพื่อให้ความเท่าเทียมทางกฎหมายในหมู่พลเมืองโดยทำให้กฎหมายเข้าถึงได้สำหรับทุกคน
reviewed: true
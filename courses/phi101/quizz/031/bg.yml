question: Как се нарича първата писмена кодификация на римското право?
answer: Законът за дванадесетте таблици
wrong_answers:
  - Кодексът на Хамурапи
  - The Digest
  - Едиктите на Юстиниан
explanation: |
  Законът на дванадесетте таблици е първата писмена кодификация на римското право, създадена, за да официализира законите и да осигури правно равенство между гражданите, като направи закона достъпен за всички.
reviewed: true
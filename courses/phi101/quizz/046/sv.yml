question: Hur skiljer sig den medeltida mystiken från den religiösa rationalismen?
answer: Mysticismen betonar den direkta upplevelsen av Gud och trons transcendens.
wrong_answers:
  - Mysticismen värdesätter förnuftet och strävan efter rationell kunskap.
  - Religiös rationalism betraktar tro som en form av kunskap som är underlägsen förnuftet.
  - Religiös rationalism strävar efter att förena tro och förnuft genom att formulera dem på ett sammanhängande sätt.
explanation: |
  Den medeltida mystiken förespråkar ett intuitivt och personligt förhållningssätt till tron, med fokus på den direkta upplevelsen av Gud, i motsats till den religiösa rationalismen, som försöker förstå och strukturera tron med hjälp av förnuftet.
reviewed: true
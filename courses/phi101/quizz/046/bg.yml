question: По какво се различава средновековният мистицизъм от религиозния рационализъм?
answer: Мистицизмът набляга на прякото преживяване на Бога и на трансцендентността на вярата.
wrong_answers:
  - Мистицизмът цени разума и стремежа към рационално познание.
  - Религиозният рационализъм смята вярата за форма на познание, която отстъпва на разума.
  - Религиозният рационализъм се стреми да съчетае вярата и разума, като ги формулира по един последователен начин.
explanation: |
  Средновековният мистицизъм предпочита интуитивния и личен подход към вярата, насочен към прякото преживяване на Бога, в противовес на религиозния рационализъм, който се стреми да разбере и структурира вярата чрез разума.
reviewed: true
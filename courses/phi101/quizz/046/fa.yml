question: تفاوت عرفان قرون وسطی با عقل‌گرایی دینی در چیست؟
answer: عرفان بر تجربه مستقیم از خدا و تعالی ایمان تأکید دارد.
wrong_answers:
  - عرفان به عقل و جستجوی دانش عقلانی ارزش می‌نهد.
  - راسیونالیسم دینی ایمان را به عنوان شکلی از دانش که نسبت به عقل پایین‌تر است، در نظر می‌گیرد.
  - عقل‌گرایی دینی تلاش می‌کند تا ایمان و عقل را با بیان آن‌ها به شیوه‌ای منسجم آشتی دهد.
explanation: |
  عرفان قرون وسطایی رویکردی شهودی و شخصی به ایمان را ترجیح می‌دهد که بر تجربه مستقیم خدا تمرکز دارد، در مقابل عقل‌گرایی دینی که به دنبال درک و ساختاردهی ایمان از طریق عقل است.
reviewed: false
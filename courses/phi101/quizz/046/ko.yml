question: 중세 신비주의는 종교적 합리주의와 어떻게 다른가요?
answer: 신비주의는 신에 대한 직접적인 경험과 신앙의 초월성을 강조합니다.
wrong_answers:
  - 신비주의는 이성과 합리적 지식의 추구를 중시합니다.
  - 종교적 합리주의는 신앙을 이성보다 열등한 지식의 한 형태로 간주합니다.
  - 종교적 합리주의는 신앙과 이성을 일관된 방식으로 표현하여 조화시키려고 노력합니다.
explanation: |
  중세 신비주의는 이성을 통해 신앙을 이해하고 구조화하려는 종교적 합리주의와 달리 신에 대한 직접적인 경험에 초점을 맞춘 직관적이고 개인적인 신앙 접근 방식을 선호합니다.
reviewed: true
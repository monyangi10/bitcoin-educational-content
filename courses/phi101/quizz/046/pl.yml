question: Czym średniowieczny mistycyzm różni się od religijnego racjonalizmu?
answer: Mistycyzm podkreśla bezpośrednie doświadczenie Boga i transcendencję wiary.
wrong_answers:
  - Mistycyzm ceni rozum i dążenie do racjonalnej wiedzy.
  - Religijny racjonalizm uważa wiarę za formę wiedzy gorszą od rozumu.
  - Racjonalizm religijny stara się pogodzić wiarę i rozum, wyrażając je w spójny sposób.
explanation: |
  Średniowieczny mistycyzm preferuje intuicyjne i osobiste podejście do wiary, skoncentrowane na bezpośrednim doświadczeniu Boga, w przeciwieństwie do religijnego racjonalizmu, który stara się zrozumieć i ustrukturyzować wiarę za pomocą rozumu.
reviewed: false
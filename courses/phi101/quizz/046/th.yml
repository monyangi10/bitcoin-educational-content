question: ความลึกลับในยุคกลางแตกต่างจากการใช้เหตุผลทางศาสนาอย่างไร?
answer: ลัทธิความลึกลับเน้นประสบการณ์ตรงของพระเจ้าและการอยู่เหนือศรัทธา
wrong_answers:
  - ลัทธิความลึกลับให้คุณค่ากับเหตุผลและการแสวงหาความรู้ที่มีเหตุผล
  - ลัทธิเหตุผลนิยมทางศาสนามองว่าความเชื่อเป็นรูปแบบของความรู้ที่ด้อยกว่าเหตุผล
  - ลัทธิเหตุผลนิยมทางศาสนามุ่งที่จะประสานความเชื่อและเหตุผลโดยการอธิบายให้สอดคล้องกันในลักษณะที่มีเหตุผล
explanation: |
  ลัทธิความลึกลับในยุคกลางนิยมวิธีการที่ใช้สัญชาตญาณและส่วนบุคคลต่อศรัทธา โดยเน้นประสบการณ์ตรงกับพระเจ้า ซึ่งตรงข้ามกับเหตุผลนิยมทางศาสนา ที่พยายามทำความเข้าใจและจัดโครงสร้างศรัทธาผ่านเหตุผล
reviewed: true
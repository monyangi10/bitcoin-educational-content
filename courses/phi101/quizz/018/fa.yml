question: صنعتی شدن چگونه بر شرایط زندگی کارگران تأثیر گذاشت؟
answer: این تأثیرات متفاوتی داشت بسته به مناطق و بخش‌های فعالیت
wrong_answers:
  - این امر منجر به وخامت کلی شرایط زندگی آن‌ها شد
  - این فرصت‌های جدیدی ایجاد کرد و استاندارد زندگی آن‌ها را بهبود بخشید.
  - تأثیر صنعتی‌سازی بر کارگران بیش از حد پیچیده است که بتوان آن را قضاوت کرد
explanation: |
  صنعتی‌سازی تأثیرات متنوعی بر شرایط زندگی کارگران داشت، به‌طوری‌که اثرات آن بسته به منطقه و بخش متفاوت بود؛ برخی کارگران بهبودهایی را تجربه کردند، در حالی که دیگران با شرایط کاری دشوار مواجه شدند.
reviewed: false
question: อุตสาหกรรมส่งผลต่อสภาพความเป็นอยู่ของคนงานอย่างไร?
answer: มันมีผลกระทบที่แตกต่างกันขึ้นอยู่กับภูมิภาคและภาคส่วนของกิจกรรม
wrong_answers:
  - มันนำไปสู่การเสื่อมสภาพโดยทั่วไปของสภาพความเป็นอยู่ของพวกเขา
  - มันสร้างโอกาสใหม่ๆ และปรับปรุงมาตรฐานการครองชีพของพวกเขา
  - ผลกระทบของการปฏิวัติอุตสาหกรรมต่อคนงานนั้นซับซ้อนเกินกว่าจะตัดสินได้
explanation: |
  การปฏิวัติอุตสาหกรรมมีผลกระทบที่หลากหลายต่อสภาพความเป็นอยู่ของคนงาน โดยผลกระทบแตกต่างกันไปตามภูมิภาคและภาคส่วน; คนงานบางส่วนได้รับการปรับปรุงสภาพความเป็นอยู่ ในขณะที่คนงานบางส่วนต้องเผชิญกับสภาพการทำงานที่ยากลำบาก
reviewed: true
question: Как индустриализацията се отразява на условията на живот на работниците?
answer: Тя има различни ефекти в зависимост от регионите и секторите на дейност
wrong_answers:
  - Това доведе до общо влошаване на условията им на живот
  - Създава нови възможности и подобрява стандарта им на живот
  - Въздействието на индустриализацията върху работниците е твърде сложно, за да бъде оценено
explanation: |
  Индустриализацията оказва различно въздействие върху условията на живот на работниците, като последиците се различават в зависимост от региона и сектора; някои от работниците се чувстват по-добре, докато други са изправени пред трудни условия на труд.
reviewed: true
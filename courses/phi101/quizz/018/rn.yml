question: Ni gute ugutera imbere kw’inganda kwagize ico gukoze ku buzima bw’abakozi?
answer: Yari afise ingaruka zitandukanye bivanye n'uturere n'imice y'ibikorwa .
wrong_answers:
  - Vyatumye ubuzima bwabo bugenda burahungabana muri rusangi .
  - Vyatumye baronka uturyo dushasha kandi bituma ubuzima bwabo butera imbere .
  - Ingaruka z'inganda ku bakozi ni nyinshi cane ku buryo zidashobora gucirwa urubanza .
explanation: |
  Inganda zari zifise ingaruka zitandukanye ku mibereho y’abakozi, ingaruka zikaba zitandukanye hakurikijwe akarere n’urwego; abakozi bamwebamwe bararonse iterambere, abandi na bo barashikiwe n’ibintu bigoye ku kazi.
reviewed: true
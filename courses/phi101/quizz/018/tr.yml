question: Sanayileşme işçilerin yaşam koşullarını nasıl etkiledi?
answer: Bölgelere ve faaliyet gösterilen sektörlere göre farklı etkileri olmuştur
wrong_answers:
  - Yaşam koşullarında genel bir kötüleşmeye yol açtı
  - Yeni fırsatlar yarattı ve yaşam standartlarını iyileştirdi
  - Sanayileşmenin işçiler üzerindeki etkisi değerlendirilemeyecek kadar karmaşıktır
explanation: |
  Sanayileşmenin işçilerin yaşam koşulları üzerinde çeşitli etkileri olmuş, bu etkiler bölgelere ve sektörlere göre farklılık göstermiştir; bazı işçiler iyileşmeler yaşarken, diğerleri zor çalışma koşullarıyla karşı karşıya kalmıştır.
reviewed: true
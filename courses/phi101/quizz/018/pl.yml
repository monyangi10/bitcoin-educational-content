question: Jak industrializacja wpłynęła na warunki życia robotników?
answer: Miało to różne skutki w zależności od regionów i sektorów działalności
wrong_answers:
  - Doprowadziło to do ogólnego pogorszenia ich warunków życia
  - Stworzyło to nowe możliwości i poprawiło standard ich życia
  - Wpływ industrializacji na pracowników jest zbyt złożony, by można go było ocenić
explanation: |
  Uprzemysłowienie miało zróżnicowany wpływ na warunki życia pracowników, przy czym skutki różniły się w zależności od regionu i sektora, niektórzy pracownicy doświadczyli poprawy, podczas gdy inni mieli do czynienia z trudnymi warunkami pracy.

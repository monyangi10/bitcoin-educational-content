question: Hur påverkade industrialiseringen arbetarnas levnadsvillkor?
answer: Den hade olika effekter beroende på regioner och verksamhetssektorer
wrong_answers:
  - Det ledde till en allmän försämring av deras levnadsvillkor
  - Det skapade nya möjligheter och förbättrade deras levnadsstandard
  - Industrialiseringens inverkan på arbetstagarna är alltför komplex för att kunna bedömas
explanation: |
  Industrialiseringen hade varierande inverkan på arbetarnas levnadsvillkor, och effekterna skilde sig åt mellan olika regioner och sektorer; vissa arbetare upplevde förbättringar, medan andra hade svåra arbetsförhållanden.
reviewed: true
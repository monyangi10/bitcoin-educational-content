question: Ukuaji wa viwanda uliathiri vipi hali ya maisha ya wafanyikazi?
answer: Ilikuwa na athari tofauti kulingana na mikoa na sekta za shughuli
wrong_answers:
  - Ilisababisha kuzorota kwa ujumla kwa hali yao ya maisha
  - Iliunda fursa mpya na kuboresha kiwango chao cha maisha
  - Athari za ukuaji wa viwanda kwa wafanyikazi ni ngumu sana kuhukumiwa
explanation: |
  Ukuaji wa viwanda ulikuwa na athari tofauti kwa hali ya maisha ya wafanyikazi, na athari zikitofautiana kwa mkoa na sekta, wafanyikazi wengine wakipitia maboresho, huku wengine wakikabiliwa na mazingira magumu ya kazi.

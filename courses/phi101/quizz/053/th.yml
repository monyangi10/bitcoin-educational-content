question: ข้อโต้แย้งที่ใช้โดยคริสตจักรเพื่อยืนยันอำนาจสูงสุดเหนืออำนาจทางโลกคืออะไร?
answer: คำตอบทั้งหมดข้างต้นถูกต้อง
wrong_answers:
  - อำนาจของพระสันตะปาปาในฐานะผู้แทนของพระคริสต์บนโลก
  - กฎหมายบัญญัติและศาลศาสนจักร
  - ความเหนือกว่าของความเชื่อคริสเตียนเหนือศาสนาหรือปรัชญาอื่นใด
explanation: |
  คริสตจักรให้เหตุผลถึงอำนาจสูงสุดเหนืออำนาจทางโลกโดยอ้างอิงถึงอำนาจของพระสันตะปาปาในฐานะตัวแทนของพระคริสต์, อำนาจของศาลศาสนาผ่านกฎหมายศาสนจักร, และการอ้างว่าความเชื่อคริสเตียนเหนือกว่าหลักคำสอนอื่น ๆ ทั้งหมด
reviewed: true
question: Vilka är de argument som kyrkan använder för att hävda sin överhöghet över den världsliga makten?
answer: Alla ovanstående svar är korrekta.
wrong_answers:
  - Påvens auktoritet som Kristi ställföreträdare på jorden.
  - Kanonisk rätt och kyrkliga domstolar.
  - Den kristna trons överlägsenhet över alla andra religioner eller filosofier.
explanation: |
  Kyrkan motiverar sin överhöghet över den världsliga makten med påvens auktoritet som Kristi företrädare, de kyrkliga domstolarnas makt genom kanonisk rätt och påståendet att den kristna tron överträffar alla andra läror.
reviewed: true
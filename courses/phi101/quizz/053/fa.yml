question: کلیسا از چه استدلال‌هایی برای تأکید بر برتری خود بر قدرت دنیوی استفاده می‌کند؟
answer: همه پاسخ‌های فوق صحیح هستند.
wrong_answers:
  - اقتدار پاپ به عنوان نماینده مسیح بر روی زمین.
  - قانون کلیسا و دادگاه‌های کلیسایی.
  - برتری ایمان مسیحی بر هر دین یا فلسفه دیگری.
explanation: |
  کلیسا برتری خود بر قدرت دنیوی را بر اساس اقتدار پاپ به عنوان نماینده مسیح، قدرت دادگاه‌های کلیسایی از طریق حقوق کلیسایی، و ادعای اینکه ایمان مسیحی بر تمام آموزه‌های دیگر برتری دارد، توجیه می‌کند.
reviewed: false
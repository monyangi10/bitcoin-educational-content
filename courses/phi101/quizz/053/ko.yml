question: 교회가 현세적 권력에 대한 우위를 주장하기 위해 사용하는 논거는 무엇인가요?
answer: 위의 정답은 모두 정답입니다.
wrong_answers:
  - 지상에서 그리스도의 대리자로서 교황의 권위.
  - 교회법 및 교회 법정.
  - 다른 어떤 종교나 철학보다 기독교 신앙의 우월성.
explanation: |
  교회는 그리스도의 대표자인 교황의 권위, 교회법을 통한 교회 법원의 권한, 기독교 신앙이 다른 모든 교리를 능가한다는 주장에 근거하여 현세적 권력에 대한 우월성을 정당화합니다.
reviewed: true
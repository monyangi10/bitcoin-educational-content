question: Koje argumente koristi Crkva da bi tvrdila svoju nadmoć nad privremenom vlašću?
answer: Svi gore navedeni odgovori su tačni.
wrong_answers:
  - Autoritet pape kao Hristovog namesnika na Zemlji.
  - Kanon pravo i crkveni sudovi.
  - Nadmoć hrišćanske vere nad bilo kojom drugom religijom ili filozofijom.
explanation: |
  Crkva opravdava svoju prevlast nad privremenom vlašću na osnovu autoriteta Pape kao predstavnika Hrista, moći crkvenih sudova kroz kanonsko pravo i tvrdnje da hrišćanska vera nadmašuje sve druge doktrine.

question: Какви са аргументите, използвани от Църквата, за да утвърди своето върховенство над светската власт?
answer: Всички отговори по-горе са верни.
wrong_answers:
  - Властта на папата като викарий на Христос на земята.
  - Канонично право и църковни съдилища.
  - Превъзходството на християнската вяра над всяка друга религия или философия.
explanation: |
  Църквата обосновава върховенството си над светската власт с авторитета на папата като представител на Христос, с властта на църковните съдилища чрез каноничното право и с твърдението, че християнската вяра превъзхожда всички други учения.
reviewed: true
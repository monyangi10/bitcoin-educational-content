question: इस पाठ्यक्रम का उद्देश्य क्या है?
answer: ऊपर के सभी
wrong_answers:
  - स्वतंत्रता संग्राम की ऐतिहासिक घटनाओं का अध्ययन करें
  - आज बेहतर कार्य करने के लिए विचारों और घटनाओं के बीच संबंध को समझें
  - स्वतंत्रता से संबंधित दार्शनिक अवधारणाओं को परिभाषित करें
explanation: |
  इस पाठ्यक्रम का उद्देश्य बहुआयामी है: इसका उद्देश्य स्वतंत्रता के संघर्ष में प्रभावशाली ऐतिहासिक घटनाओं का अध्ययन करना, हमारे वर्तमान कार्यों को प्रबुद्ध करने के लिए विचारों और घटनाओं के बीच संबंध का विश्लेषण करना और स्वतंत्रता से संबंधित दार्शनिक अवधारणाओं को स्पष्ट करना है।

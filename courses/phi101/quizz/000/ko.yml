question: 이 과정의 목적은 무엇인가요?
answer: 위의 모든 사항
wrong_answers:
  - 자유를 위한 투쟁을 상징하는 역사적 사건에 대해 알아보세요
  - 아이디어와 이벤트 간의 관계를 이해하여 오늘 더 나은 행동을 취하세요
  - 자유와 관련된 철학적 개념 정의하기
explanation: |
  이 강좌의 목적은 자유를 위한 투쟁에서 영향력 있는 역사적 사건을 연구하고, 사상과 사건의 연관성을 분석하여 현재 우리의 행동을 깨우치고, 자유와 관련된 철학적 개념을 명확히 하는 등 다면적인 것입니다.
reviewed: true
question: วัตถุประสงค์ของหลักสูตรนี้คืออะไร?
answer: ทั้งหมดที่กล่าวมา
wrong_answers:
  - ศึกษาถึงเหตุการณ์ทางประวัติศาสตร์ที่ได้สร้างเครื่องหมายในการต่อสู้เพื่อเสรีภาพ
  - ทำความเข้าใจความสัมพันธ์ระหว่างแนวคิดและเหตุการณ์เพื่อการกระทำที่ดียิ่งขึ้นในวันนี้
  - กำหนดแนวคิดทางปรัชญาที่เกี่ยวข้องกับเสรีภาพ
explanation: |
  วัตถุประสงค์ของหลักสูตรนี้มีหลายด้าน: มุ่งศึกษาถึงเหตุการณ์ทางประวัติศาสตร์ที่มีอิทธิพลในการต่อสู้เพื่อเสรีภาพ วิเคราะห์ความเชื่อมโยงระหว่างแนวคิดและเหตุการณ์เพื่อให้ความกระจ่างแก่การกระทำในปัจจุบันของเรา และชี้แจงแนวคิดทางปรัชญาที่เกี่ยวข้องกับเสรีภาพ
reviewed: true
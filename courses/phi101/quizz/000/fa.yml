question: هدف این دوره چیست؟
answer: همه موارد فوق
wrong_answers:
  - مطالعه رویدادهای تاریخی که مبارزه برای آزادی را رقم زده‌اند
  - درک رابطه بین ایده‌ها و رویدادها برای عملکرد بهتر امروز
  - تعریف مفاهیم فلسفی مرتبط با آزادی
explanation: |
  هدف این دوره چندوجهی است: هدف آن مطالعه رویدادهای تاریخی تأثیرگذار در مبارزه برای آزادی، تحلیل ارتباط بین ایده‌ها و رویدادها برای روشن کردن اقدامات کنونی ما، و روشن کردن مفاهیم فلسفی مرتبط با آزادی است.
reviewed: false
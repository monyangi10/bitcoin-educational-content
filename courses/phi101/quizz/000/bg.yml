question: Каква е целта на този курс?
answer: Всичко изброено по-горе
wrong_answers:
  - Изучаване на историческите събития, които са белязали борбата за свобода
  - Разберете връзката между идеите и събитията, за да действате по-добре днес
  - Определете философските понятия, свързани със свободата
explanation: |
  Целта на този курс е многостранна: да се изучат влиятелните исторически събития в борбата за свобода, да се анализира връзката между идеите и събитията, за да се осветлят настоящите ни действия, и да се изяснят философските концепции, свързани със свободата.
reviewed: true
question: Vad är syftet med den här kursen?
answer: Alla ovanstående
wrong_answers:
  - Studera de historiska händelser som har präglat kampen för frihet
  - Förstå sambandet mellan idéer och händelser för att bättre kunna agera idag
  - Definiera de filosofiska begrepp som är relaterade till frihet
explanation: |
  Syftet med denna kurs är mångfacetterat: den syftar till att studera de inflytelserika historiska händelserna i kampen för frihet, att analysera sambandet mellan idéer och händelser för att upplysa våra nuvarande handlingar och att klargöra de filosofiska begrepp som är relaterade till frihet.
reviewed: true
question: On İki Levha Kanunu'nun bireysel hakların korunması açısından getirdiği temel yenilik nedir?
answer: Mülkiyet haklarını ve bunların devri için gerekli koşulları açıkça tanımlar.
wrong_answers:
  - Tüm yabancılara oy kullanma hakkı vermektedir.
  - Onarıcı bir adalet sistemi kurar.
  - İfade ve din özgürlüğünü güvence altına alır.
explanation: |
  On İki Levha Kanunu, mülkiyet ve mülkiyetin devrine ilişkin açık kurallar koyarak bir yenilik getirmiş, böylece bireysel hakların korunması ve mülkiyete ilişkin konularda gücün kötüye kullanımının azaltılması için sağlam bir yasal temel sağlamıştır.
reviewed: true
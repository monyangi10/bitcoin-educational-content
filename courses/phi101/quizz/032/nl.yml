question: Wat is de belangrijkste innovatie van de Wet van de Twaalf Tafelen als het gaat om het beschermen van individuele rechten?
answer: Het definieert duidelijk eigendomsrechten en de voorwaarden voor de overdracht ervan.
wrong_answers:
  - Alle buitenlanders hebben stemrecht.
  - Er wordt een systeem van herstelrecht ingesteld.
  - Het garandeert vrijheid van meningsuiting en godsdienst.
explanation: |
  De Wet van de Twaalf Tafelen innoveerde door duidelijke regels op te stellen voor eigendom en de overdracht ervan, waardoor een solide wettelijke basis werd gelegd voor het beschermen van individuele rechten en het beperken van machtsmisbruik in zaken van bezit.
reviewed: true
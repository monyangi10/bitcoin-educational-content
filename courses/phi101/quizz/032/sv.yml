question: Vilken är den viktigaste nyheten i de tolv bordens lag när det gäller att skydda individens rättigheter?
answer: Den definierar tydligt äganderätten och villkoren för att överföra den.
wrong_answers:
  - Det ger rösträtt till alla utlänningar.
  - Det inrättar ett system för reparativ rättvisa.
  - Den garanterar yttrandefrihet och religionsfrihet.
explanation: |
  De tolv bordens lag var nyskapande genom att fastställa tydliga regler för egendom och dess överföring, vilket gav en solid rättslig grund för att skydda individuella rättigheter och minska maktmissbruk i frågor som rör innehav.
reviewed: true
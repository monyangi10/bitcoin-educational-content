question: Кое е основното нововъведение на Закона на дванадесетте таблици по отношение на защитата на индивидуалните права?
answer: В него ясно се определят правата на собственост и условията за тяхното прехвърляне.
wrong_answers:
  - Тя дава право на глас на всички чужденци.
  - С него се създава система за възстановително правосъдие.
  - Тя гарантира свободата на словото и религията.
explanation: |
  Законът на дванадесетте таблици е новаторски, тъй като установява ясни правила за собствеността и нейното прехвърляне, като по този начин осигурява солидна правна основа за защита на индивидуалните права и намаляване на злоупотребите с власт в областта на собствеността.
reviewed: true
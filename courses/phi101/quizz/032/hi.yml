question: व्यक्तिगत अधिकारों की सुरक्षा के संदर्भ में बारह तालिकाओं के कानून का मुख्य नवाचार क्या है?
answer: इसमें संपत्ति के अधिकारों और उनके हस्तांतरण की शर्तों को स्पष्ट रूप से परिभाषित किया गया है।
wrong_answers:
  - यह सभी विदेशियों को वोट देने का अधिकार देता है।
  - यह पुनर्स्थापनात्मक न्याय की प्रणाली स्थापित करता है।
  - यह अभिव्यक्ति और धर्म की स्वतंत्रता की गारंटी देता है।
explanation: |
  बारह तालिकाओं के कानून ने संपत्ति और उसके हस्तांतरण के लिए स्पष्ट नियम निर्धारित करके नवाचार किया, इस प्रकार व्यक्तिगत अधिकारों की रक्षा और कब्जे के मामलों में सत्ता के दुरुपयोग को कम करने के लिए एक ठोस कानूनी आधार प्रदान किया।
reviewed: false
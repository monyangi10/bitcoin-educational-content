question: نوآوری اصلی قانون دوازده جدول در زمینه حفاظت از حقوق فردی چیست؟
answer: این به وضوح حقوق مالکیت و شرایط انتقال آن‌ها را تعریف می‌کند.
wrong_answers:
  - این حق رأی دادن به همه خارجی‌ها را اعطا می‌کند.
  - این یک سیستم عدالت ترمیمی را ایجاد می‌کند.
  - این آزادی بیان و مذهب را تضمین می‌کند.
explanation: |
  قانون دوازده جدول با تعیین قوانین روشن برای مالکیت و انتقال آن نوآوری کرد و بدین ترتیب پایه قانونی محکمی برای حفاظت از حقوق فردی و کاهش سوءاستفاده‌های قدرت در مسائل مربوط به مالکیت فراهم آورد.
reviewed: false
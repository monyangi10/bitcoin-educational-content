question: ผลงานที่มีชื่อเสียงที่สุดของ Adam Smith ในด้านเศรษฐศาสตร์คืออะไร?
answer: เขาได้พัฒนาทฤษฎีของมือที่มองไม่เห็น
wrong_answers:
  - เขาได้พัฒนาทฤษฎีนิ้วที่มองเห็นได้
  - เขาได้พัฒนาทฤษฎีนิ้วที่มองไม่เห็น
  - เขาได้พัฒนาทฤษฎีของมือที่มองเห็นได้
explanation: |
  อดัม สมิธ เป็นที่รู้จักจากทฤษฎีมือที่มองไม่เห็น ซึ่งเสนอว่าการกระทำของแต่ละบุคคลที่มีแรงจูงใจจากผลประโยชน์ส่วนตนจะมีส่วนช่วยโดยไม่ตั้งใจต่อความเป็นอยู่ทางเศรษฐกิจโดยรวมของสังคม
reviewed: true
question: Кой е най-известният принос на Адам Смит към икономиката?
answer: Той разработва теорията за невидимата ръка.
wrong_answers:
  - Той разработва теорията за видимия пръст.
  - Той разработва теорията за невидимия пръст.
  - Той разработва теорията за видимата ръка.
explanation: |
  Адам Смит е известен с теорията си за невидимата ръка, според която индивидуалните действия, мотивирани от личен интерес, непреднамерено допринасят за общото икономическо благосъстояние на обществото.
reviewed: true
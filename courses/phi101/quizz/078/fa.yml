question: مهم‌ترین مشارکت آدام اسمیت در اقتصاد چیست؟
answer: او نظریه دست نامرئی را توسعه داد.
wrong_answers:
  - او نظریه انگشت قابل مشاهده را توسعه داد.
  - او نظریه انگشت نامرئی را توسعه داد.
  - او نظریه دست مرئی را توسعه داد.
explanation: |
  آدام اسمیت به خاطر نظریه دست نامرئی شناخته می‌شود، که بیان می‌کند اقدامات فردی که با انگیزه منافع شخصی انجام می‌شوند، به طور ناخواسته به رفاه اقتصادی کل جامعه کمک می‌کنند.
reviewed: false
question: एडम स्मिथ का अर्थशास्त्र में सबसे मशहूर योगदान क्या है?
answer: उसने "अदृश्य हाथ" के सिद्धांत को विकसित किया।
wrong_answers:
  - उसने "दृश्यमान उंगली" का सिद्धांत विकसित किया।
  - उसने "अदृश्य उंगली" का सिद्धांत विकसित किया।
  - उसने "दृश्यमान हाथ" (visible hand) का सिद्धांत विकसित किया।
explanation: |
  एडम स्मिथ अपने "अदृश्य हाथ" के सिद्धांत के लिए मशहूर हैं, जो कहता है कि स्वार्थ से प्रेरित व्यक्तिगत कार्य अनजाने में पूरे समाज की आर्थिक भलाई में योगदान देते हैं।
reviewed: false
question: عبارت مستر اکهارت "همه چیزها دلیلی دارند، اما خدا دلیلی ندارد" به چه معناست؟
answer: خدا برای عقل انسانی غیرقابل درک است و نمی‌توان او را با دلایل منطقی توضیح داد.
wrong_answers:
  - ایمان برتر از عقل است و نباید مورد پرسش عقلانی قرار گیرد.
  - جستجوی دانش عقلانی بیهوده است و نمی‌تواند ما را به خدا برساند.
  - همه پاسخ‌های فوق صحیح هستند.
explanation: |
  استاد اکهارت این ایده را منتقل می‌کند که خداوند فراتر از مفاهیم عقلانی و توضیحات انسانی است. برخلاف چیزهای خلق‌شده، خداوند تابع علل و دلایلی نیست که توسط ذهن انسان قابل درک باشد.
reviewed: false
question: Nini maana ya msemo wa Mwalimu Eckhart Mambo yote yana sababu, lakini Mungu hana kwa nini?
answer: Mungu hawezi kueleweka kwa akili za kibinadamu na hawezi kuelezewa kwa sababu za busara.
wrong_answers:
  - Imani ni bora kuliko akili na haipaswi kuulizwa maswali ya busara.
  - Kufuatia ujuzi wa akili ni ubatili na hakuwezi kutuongoza kwa Mungu.
  - Majibu yote hapo juu ni sahihi.
explanation: |
  Mwalimu Eckhart anatoa wazo kwamba Mungu hupita dhana za kimantiki na maelezo ya kibinadamu. Tofauti na vitu vilivyoumbwa, Mungu hayuko chini ya sababu na sababu zinazoweza kueleweka kwa akili ya mwanadamu.

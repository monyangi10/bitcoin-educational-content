question: Vad är innebörden av Mäster Eckharts fras Alla ting har ett varför, men Gud har inget varför?
answer: Gud är obegriplig för det mänskliga förnuftet och kan inte förklaras med rationella orsaker.
wrong_answers:
  - Tron är överordnad förnuftet och ska inte utsättas för rationellt ifrågasättande.
  - Strävan efter rationell kunskap är meningslös och kan inte leda oss till Gud.
  - Alla ovanstående svar är korrekta.
explanation: |
  Mäster Eckhart förmedlar tanken att Gud överskrider rationella begrepp och mänskliga förklaringar. Till skillnad från skapade ting är Gud inte föremål för orsaker och skäl som det mänskliga sinnet kan förstå.
reviewed: true
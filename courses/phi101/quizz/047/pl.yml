question: Jakie jest znaczenie wyrażenia Mistrza Eckharta Wszystkie rzeczy mają powód, ale Bóg nie ma powodu?
answer: Bóg jest niepojęty dla ludzkiego rozumu i nie może być wyjaśniony racjonalnymi przyczynami.
wrong_answers:
  - Wiara jest nadrzędna wobec rozumu i nie powinna być poddawana racjonalnemu kwestionowaniu.
  - Pogoń za racjonalną wiedzą jest daremna i nie może doprowadzić nas do Boga.
  - Wszystkie powyższe odpowiedzi są prawidłowe.
explanation: |
  Mistrz Eckhart przekazuje ideę, że Bóg wykracza poza racjonalne koncepcje i ludzkie wyjaśnienia. W przeciwieństwie do rzeczy stworzonych, Bóg nie podlega przyczynom i powodom, które mogą być zrozumiane przez ludzki umysł.
reviewed: false
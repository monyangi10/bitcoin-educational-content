question: मास्टर एकहार्ट के वाक्य "सभी चीज़ों का एक कारण होता है, लेकिन भगवान का कोई कारण नहीं होता" का क्या अर्थ है?
answer: भगवान इंसानी समझ से परे हैं और उन्हें तर्क से नहीं समझाया जा सकता।
wrong_answers:
  - विश्वास तर्क से बेहतर है और इसे तर्कसंगत सवालों के घेरे में नहीं लाया जाना चाहिए।
  - तर्कसंगत ज्ञान की खोज व्यर्थ है और यह हमें ईश्वर तक नहीं पहुंचा सकती।
  - ऊपर दिए गए सभी जवाब सही हैं।
explanation: |
  मास्टर एकहार्ट यह विचार रखते हैं कि भगवान तर्कसंगत अवधारणाओं और मानवीय व्याख्याओं से परे हैं। बाकी चीज़ों की तरह नहीं, भगवान कारणों और तर्कों के अधीन नहीं हैं जिन्हें इंसानी दिमाग समझ सके।
reviewed: false
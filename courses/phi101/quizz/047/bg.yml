question: Какво е значението на фразата на Учителя Екхарт Всички неща имат защо, но Бог няма защо?
answer: Бог е неразбираем за човешкия разум и не може да бъде обяснен с рационални причини.
wrong_answers:
  - Вярата е по-висша от разума и не бива да бъде подлагана на рационално съмнение.
  - Стремежът към рационално познание е безполезен и не може да ни доведе до Бога.
  - Всички отговори по-горе са верни.
explanation: |
  Учителят Екхарт изразява идеята, че Бог надхвърля рационалните понятия и човешките обяснения. За разлика от сътворените неща, Бог не е подвластен на причини и основания, които човешкият ум може да разбере.
reviewed: true
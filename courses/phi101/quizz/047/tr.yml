question: Üstat Eckhart'ın Her şeyin bir nedeni vardır, ama Tanrı'nın nedeni yoktur sözünün anlamı nedir?
answer: Tanrı insan aklı için anlaşılmazdır ve rasyonel nedenlerle açıklanamaz.
wrong_answers:
  - İnanç akıldan üstündür ve rasyonel sorgulamaya tabi tutulmamalıdır.
  - Rasyonel bilgi arayışı boşunadır ve bizi Tanrı'ya götüremez.
  - Yukarıdaki cevapların hepsi doğrudur.
explanation: |
  Üstat Eckhart, Tanrı'nın rasyonel kavramları ve insan açıklamalarını aştığı fikrini aktarır. Yaratılmış şeylerin aksine, Tanrı insan aklının anlayabileceği nedenlere ve sebeplere tabi değildir.
reviewed: true
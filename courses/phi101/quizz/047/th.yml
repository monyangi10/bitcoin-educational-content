question: ความหมายของวลีของมาสเตอร์เอคฮาร์ท "All things have a why, but God has no why" คืออะไร?
answer: พระเจ้าไม่สามารถเข้าใจได้ด้วยเหตุผลของมนุษย์และไม่สามารถอธิบายได้ด้วยเหตุผลที่มีเหตุผล
wrong_answers:
  - ศรัทธาเหนือกว่าการใช้เหตุผลและไม่ควรถูกตั้งคำถามด้วยเหตุผล
  - การแสวงหาความรู้ที่มีเหตุผลนั้นไร้ประโยชน์และไม่สามารถนำเราไปสู่พระเจ้าได้
  - คำตอบทั้งหมดข้างต้นถูกต้อง
explanation: |
  มาสเตอร์เอคฮาร์ต ถ่ายทอดแนวคิดที่ว่าพระเจ้าทรงอยู่เหนือแนวคิดเชิงเหตุผลและคำอธิบายของมนุษย์ ไม่เหมือนสิ่งที่ถูกสร้างขึ้น พระเจ้าไม่อยู่ภายใต้สาเหตุและเหตุผลที่จิตใจมนุษย์สามารถเข้าใจได้
reviewed: true
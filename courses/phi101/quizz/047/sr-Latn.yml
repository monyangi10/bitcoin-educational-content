question: Šta znači fraza Majstora Ekharta Sve stvari imaju zašto, ali Bog nema zašto?
answer: Bog je neshvatljiv ljudskom razumu i ne može se objasniti racionalnim uzrocima.
wrong_answers:
  - Vera je superiornija od razuma i ne treba je podvrgavati racionalnom preispitivanju.
  - Potraga za racionalnim znanjem je uzaludna i ne može nas dovesti do Boga.
  - Svi gore navedeni odgovori su tačni.
explanation: |
  Majstor Eckhart prenosi ideju da Bog nadilazi racionalne pojmove i ljudska objašnjenja. Za razliku od stvorenih stvari, Bog nije podložan uzrocima i razlozima koje ljudski um može razumeti.

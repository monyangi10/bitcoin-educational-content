question: Den atenska demokratin kännetecknades av...
answer: Livliga offentliga diskussioner om stadens angelägenheter
wrong_answers:
  - En ärftlig kung som fattade alla beslut
  - En liten grupp rika män som kontrollerade regeringen
  - En mäktig armé som tvingade sin vilja på andra städer
explanation: |
  Den atenska demokratin innebar ett aktivt deltagande av medborgarna, som offentligt debatterade stadens angelägenheter i församlingen, vilket främjade kollektivt beslutsfattande och ett regeringssystem baserat på dialog.
reviewed: true
question: دموکراسی آتنی با... مشخص می‌شد.
answer: بحث‌های عمومی پرشور درباره امور شهری
wrong_answers:
  - یک پادشاه موروثی که تمام تصمیمات را می‌گرفت
  - گروه کوچکی از مردان ثروتمند که دولت را کنترل می‌کردند
  - یک ارتش قدرتمند که اراده خود را بر شهرهای دیگر تحمیل می‌کرد.
explanation: |
  دموکراسی آتنی شامل مشارکت فعال شهروندان بود که در مجمع به‌طور عمومی درباره امور شهر بحث می‌کردند و بدین ترتیب تصمیم‌گیری جمعی و یک سیستم حکومتی مبتنی بر گفتگو را ترویج می‌کردند.
reviewed: false
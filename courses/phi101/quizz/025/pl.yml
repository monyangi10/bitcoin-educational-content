question: Demokracja ateńska charakteryzowała się...
answer: Ożywione dyskusje publiczne na temat spraw miasta
wrong_answers:
  - Dziedziczny król, który podejmował wszystkie decyzje
  - Niewielka grupa bogatych mężczyzn, którzy kontrolowali rząd
  - Potężna armia, która narzucała swoją wolę innym miastom
explanation: |
  Demokracja ateńska polegała na aktywnym uczestnictwie obywateli, którzy publicznie debatowali nad sprawami miasta na Zgromadzeniu, promując w ten sposób zbiorowe podejmowanie decyzji i system rządów oparty na dialogu.

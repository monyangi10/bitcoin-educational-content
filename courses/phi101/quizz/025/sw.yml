question: Demokrasia ya Athene ilikuwa na sifa ya...
answer: Mijadala hai ya umma juu ya maswala ya jiji
wrong_answers:
  - Mfalme wa urithi ambaye alifanya maamuzi yote
  - Kikundi kidogo cha watu matajiri walioidhibiti serikali
  - Jeshi lenye nguvu ambalo liliweka mapenzi yake kwa miji mingine
explanation: |
  Demokrasia ya Athene ilihusisha ushiriki hai wa wananchi, ambao walijadili hadharani masuala ya jiji kwenye Bunge, na hivyo kukuza maamuzi ya pamoja na mfumo wa serikali unaozingatia mazungumzo.

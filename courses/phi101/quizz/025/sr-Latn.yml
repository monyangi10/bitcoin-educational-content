question: Atinska demokratija bila je karakterizovana...
answer: Žive javne rasprave o gradskim pitanjima
wrong_answers:
  - Nasledni kralj koji je donosio sve odluke
  - Mala grupa bogatih ljudi koji su kontrolisali vladu
  - Moćna vojska koja je nametnula svoju volju drugim gradovima
explanation: |
  Atinska demokratija uključivala je aktivno učešće građana, koji su javno raspravljali o gradskim pitanjima na Skupštini, čime su promovisali kolektivno donošenje odluka i sistem vlasti zasnovan na dijalogu.

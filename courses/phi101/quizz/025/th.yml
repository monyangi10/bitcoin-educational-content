question: ประชาธิปไตยแบบเอเธนส์มีลักษณะโดย...
answer: การอภิปรายสาธารณะที่มีชีวิตชีวาเกี่ยวกับกิจการเมือง
wrong_answers:
  - กษัตริย์ที่สืบทอดตำแหน่งโดยสายเลือดซึ่งเป็นผู้ตัดสินใจทุกเรื่อง
  - กลุ่มเล็ก ๆ ของผู้ชายที่ร่ำรวยซึ่งควบคุมรัฐบาล
  - กองทัพที่ทรงพลังซึ่งบังคับใช้เจตจำนงของตนกับเมืองอื่น ๆ
explanation: |
  ประชาธิปไตยแบบเอเธนส์เกี่ยวข้องกับการมีส่วนร่วมอย่างแข็งขันของพลเมือง ซึ่งได้อภิปรายเรื่องราวของเมืองในที่ประชุมสาธารณะ ส่งเสริมการตัดสินใจร่วมกันและระบบการปกครองที่อิงตามการสนทนา
reviewed: true
question: Atina demokrasisinin karakteristik özelliği...
answer: Şehir meseleleri hakkında canlı kamu tartışmaları
wrong_answers:
  - Tüm kararları veren kalıtsal bir kral
  - Hükümeti kontrol eden küçük bir grup zengin adam
  - Kendi iradesini diğer şehirlere dayatan güçlü bir ordu
explanation: |
  Atina demokrasisi, şehir meselelerini Mecliste alenen tartışan vatandaşların aktif katılımını içeriyor, böylece kolektif karar alma ve diyaloğa dayalı bir hükümet sistemini teşvik ediyordu.
reviewed: true
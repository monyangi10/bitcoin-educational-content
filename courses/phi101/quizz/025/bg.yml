question: Атинската демокрация се е характеризирала с...
answer: Оживени публични дискусии по въпроси, свързани с града
wrong_answers:
  - Наследствен крал, който взема всички решения
  - Малка група богаташи, които контролират правителството
  - Мощна армия, която налага волята си на други градове
explanation: |
  Атинската демокрация включвала активното участие на гражданите, които публично обсъждали градските дела в събранието, като по този начин насърчавали колективното вземане на решения и системата на управление, основана на диалога.
reviewed: true
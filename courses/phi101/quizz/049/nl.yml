question: Hoe droeg de opkomst van de middeleeuwse universiteiten bij aan de reflectie over de relatie tussen rede en geloof?
answer: De universiteiten faciliteerden de confrontatie van verschillende ideeën en de geboorte van een intellectueel debat over geloof en rede.
wrong_answers:
  - De universiteiten waren voorstander van het ontstaan van één enkel dogmatisch gedachtegoed dat onderworpen was aan het gezag van de kerk.
  - De universiteiten richtten zich op praktisch en professioneel onderwijs en verwaarloosden filosofische en theologische reflectie.
  - De universiteiten speelden geen belangrijke rol in de reflectie over de relatie tussen rede en geloof.
explanation: |
  De opkomst van de middeleeuwse universiteiten creëerde een ruimte voor de confrontatie van ideeën en het debat over geloof en rede, waardoor diepgaande filosofische reflectie en het naast elkaar bestaan van verschillende standpunten over de relatie tussen deze twee domeinen mogelijk werd.
reviewed: true
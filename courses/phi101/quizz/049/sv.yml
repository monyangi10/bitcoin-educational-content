question: Hur bidrog de medeltida universitetens framväxt till reflektionen över förhållandet mellan förnuft och tro?
answer: Universiteten gjorde det möjligt för olika idéer att konfronteras och det uppstod en intellektuell debatt om tro och förnuft.
wrong_answers:
  - Universiteten främjade framväxten av en enda dogmatisk tanke som var underställd kyrkans auktoritet.
  - Universiteten fokuserade på praktisk och yrkesinriktad undervisning och försummade filosofisk och teologisk reflektion.
  - Universiteten spelade ingen betydande roll i reflektionen över förhållandet mellan förnuft och tro.
explanation: |
  Uppkomsten av medeltida universitet skapade ett utrymme för konfrontation av idéer och debatt om tro och förnuft, vilket möjliggjorde djup filosofisk reflektion och samexistens av olika synsätt på förhållandet mellan dessa två områden.
reviewed: true
question: Как възходът на средновековните университети е допринесъл за размисъла върху връзката между разума и вярата?
answer: Университетите улесняват конфронтацията на различни идеи и зараждането на интелектуален дебат за вярата и разума.
wrong_answers:
  - Университетите благоприятстваха появата на единна догматична мисъл, подчинена на властта на Църквата.
  - Университетите се съсредоточават върху практическото и професионалното обучение, като пренебрегват философската и богословската рефлексия.
  - Университетите не играят съществена роля в разсъжденията за връзката между разума и вярата.
explanation: |
  Възходът на средновековните университети създава пространство за конфронтация на идеи и дебати по въпросите на вярата и разума, което дава възможност за задълбочен философски размисъл и съжителство на различни гледни точки за връзката между тези две области.
reviewed: true
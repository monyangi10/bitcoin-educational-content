question: मध्यकालीन विश्वविद्यालयों के उदय ने तर्क और आस्था के बीच संबंध पर विचार करने में कैसे योगदान दिया?
answer: विश्वविद्यालयों ने अलग-अलग विचारों के टकराव और आस्था तथा तर्क पर बौद्धिक बहस के जन्म को सुगम बनाया।
wrong_answers:
  - विश्वविद्यालयों ने चर्च के अधिकार के अधीन एक ही, कट्टर विचारधारा के उभरने को प्रोत्साहित किया।
  - विश्वविद्यालयों ने व्यावहारिक और पेशेवर शिक्षा पर ध्यान केंद्रित किया, जिससे दार्शनिक और धार्मिक चिंतन को नज़रअंदाज़ कर दिया गया।
  - विश्वविद्यालयों ने तर्क और आस्था के बीच के रिश्ते पर विचार करने में कोई खास भूमिका नहीं निभाई।
explanation: |
  मध्यकालीन विश्वविद्यालयों के उदय ने विचारों के टकराव और आस्था व तर्क पर बहस के लिए एक जगह बनाई, जिससे गहन दार्शनिक चिंतन और इन दोनों क्षेत्रों के बीच संबंध पर अलग-अलग दृष्टिकोणों का सह-अस्तित्व संभव हुआ।
reviewed: false
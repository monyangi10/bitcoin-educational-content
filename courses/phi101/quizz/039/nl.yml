question: Welke vergelijking maakt Philippe Fabry tussen het Romeinse Rijk en het socialisme?
answer: Het Romeinse Rijk werd, net als socialistische regimes, gekenmerkt door gecentraliseerde macht en een geleide economie.
wrong_answers:
  - Er is geen overeenkomst tussen het Romeinse Rijk en het socialisme.
  - Het Romeinse Rijk was gebaseerd op de Romeinse wet en respecteerde individuele vrijheden.
  - Het Romeinse Rijk was een multinationaal rijk dat probeerde zijn overheersing op te leggen aan andere volkeren.
explanation: |
  Philippe Fabry vergelijkt het Romeinse Rijk met moderne socialistische regimes door de nadruk te leggen op hun centralisatie van de macht en hun controle over de economie, een structuur die volgens hem de vrijheden beperkt en leidt tot interne spanningen.
reviewed: true
question: Ni igiki Philippe Fabry agereranya Ubwami bw’Uburoma n’ubusosiyalisimu?
answer: Ubwami bw’Uburoma, cokimwe n’intwaro z’abasosiyalisiti, bwari burangwa n’ububasha bushingiye ku bintu bimwe bimwe be n’ubutunzi burongowe.
wrong_answers:
  - Nta sano riri hagati y’Ubwami bw’Uburoma n’ubusosiyalisimu.
  - Ubwami bw’Uburoma bwashingiye ku mategeko y’Uburoma kandi bwari bubaha umwidegemvyo w’umuntu ku giti ciwe.
  - Ubwami bw’Uburoma bwari ubwami bw’ibihugu vyinshi bwarondera gutegeka ubukuru bwabwo ku bindi bisata.
explanation: |
  Philippe Fabry agereranya Ubwami bw’Uburoma n’intwaro za sosiyalisiti zo muri iki gihe mu kugaragaza ukuntu ubutegetsi bwazo bushize ahantu hamwe n’ukuntu zigenzura ubutunzi, iyo nzira, nk’uko abivuga, igabanura umwidegemvyo kandi igatuma haba uguhuzagurika imbere mu gihugu.
reviewed: true
question: Vilken jämförelse gör Philippe Fabry mellan det romerska riket och socialismen?
answer: Det romerska riket, liksom socialistiska regimer, kännetecknades av centraliserad makt och en styrd ekonomi.
wrong_answers:
  - Det finns ingen likhet mellan det romerska riket och socialismen.
  - Romarriket byggde på romersk lag och respekterade individens frihet.
  - Romarriket var ett multinationellt imperium som försökte påtvinga andra folk sitt herravälde.
explanation: |
  Philippe Fabry jämför romarriket med moderna socialistiska regimer genom att lyfta fram deras centralisering av makten och deras kontroll över ekonomin, en struktur som enligt honom begränsar friheterna och leder till interna spänningar.
reviewed: true
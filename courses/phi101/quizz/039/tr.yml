question: Philippe Fabry Roma İmparatorluğu ile sosyalizm arasında nasıl bir karşılaştırma yapıyor?
answer: Roma İmparatorluğu, sosyalist rejimler gibi, merkezi güç ve yönlendirilmiş bir ekonomi ile karakterize edilmiştir.
wrong_answers:
  - Roma İmparatorluğu ile sosyalizm arasında hiçbir benzerlik yoktur.
  - Roma İmparatorluğu, Roma hukuku üzerine kurulmuş ve bireysel özgürlüklere saygı göstermiştir.
  - Roma İmparatorluğu, egemenliğini diğer halklara kabul ettirmeye çalışan çok uluslu bir imparatorluktu.
explanation: |
  Philippe Fabry, Roma İmparatorluğu'nu modern sosyalist rejimlerle karşılaştırarak, iktidarın merkezileşmesine ve ekonomi üzerindeki kontrollerine dikkat çekmektedir; ona göre bu yapı özgürlükleri kısıtlamakta ve iç gerilimlere yol açmaktadır.
reviewed: true
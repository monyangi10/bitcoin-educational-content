question: Какво сравнение прави Филип Фабри между Римската империя и социализма?
answer: Римската империя, подобно на социалистическите режими, се характеризира с централизирана власт и дирижирана икономика.
wrong_answers:
  - Няма никаква прилика между Римската империя и социализма.
  - Римската империя е основана на римското право и зачита индивидуалните свободи.
  - Римската империя е многонационална империя, която се опитва да наложи господството си над други народи.
explanation: |
  Филип Фабри сравнява Римската империя със съвременните социалистически режими, като подчертава централизацията на властта и контрола върху икономиката - структура, която според него ограничава свободите и води до вътрешни напрежения.
reviewed: true
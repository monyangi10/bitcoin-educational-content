question: فیلیپ فابری چه مقایسه‌ای بین امپراتوری روم و سوسیالیسم انجام می‌دهد؟
answer: امپراتوری روم، مانند رژیم‌های سوسیالیستی، با قدرت متمرکز و اقتصادی هدایت‌شده مشخص می‌شد.
wrong_answers:
  - هیچ شباهتی بین امپراتوری روم و سوسیالیسم وجود ندارد.
  - امپراتوری روم بر اساس قانون روم تأسیس شد و به آزادی‌های فردی احترام می‌گذاشت.
  - امپراتوری روم یک امپراتوری چندملیتی بود که به دنبال تحمیل سلطه خود بر سایر ملل بود.
explanation: |
  فیلیپ فابری امپراتوری روم را با رژیم‌های سوسیالیستی مدرن مقایسه می‌کند و بر تمرکز قدرت و کنترل آن‌ها بر اقتصاد تأکید می‌کند، ساختاری که به گفته او، آزادی‌ها را محدود کرده و به تنش‌های داخلی منجر می‌شود.
reviewed: false
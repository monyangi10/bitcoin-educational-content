question: Under vilken historisk period härjade religionskrigen i Europa?
answer: Renässans
wrong_answers:
  - Medeltiden
  - Upplysning
  - Franska revolutionen
explanation: |
  Religionskrigen präglade främst Europa under renässansen, en period då konflikter mellan katoliker och protestanter ledde till våldsamma sammanstötningar, särskilt i Frankrike och det tysk-romerska riket.
reviewed: true
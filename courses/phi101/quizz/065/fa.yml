question: در کدام دوره تاریخی جنگ‌های مذهبی اروپا را ویران کرد؟
answer: رنسانس
wrong_answers:
  - قرون وسطی
  - روشنگری
  - انقلاب فرانسه
explanation: |
  جنگ‌های مذهبی عمدتاً اروپا را در دوران رنسانس مشخص کردند، دوره‌ای که در آن درگیری‌ها بین کاتولیک‌ها و پروتستان‌ها به برخوردهای خشونت‌آمیز منجر شد، به‌ویژه در فرانسه و امپراتوری مقدس روم.
reviewed: false
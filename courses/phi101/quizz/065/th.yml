question: ในช่วงประวัติศาสตร์ใดที่สงครามศาสนาทำลายล้างยุโรป?
answer: เรอเนซองส์
wrong_answers:
  - ยุคกลาง
  - การตรัสรู้
  - การปฏิวัติฝรั่งเศส
explanation: |
  สงครามศาสนาส่วนใหญ่เกิดขึ้นในยุโรปในช่วงยุคฟื้นฟูศิลปวิทยา ซึ่งเป็นช่วงเวลาที่ความขัดแย้งระหว่างคาทอลิกและโปรเตสแตนต์นำไปสู่การปะทะกันอย่างรุนแรง โดยเฉพาะในฝรั่งเศสและจักรวรรดิโรมันอันศักดิ์สิทธิ์
reviewed: true
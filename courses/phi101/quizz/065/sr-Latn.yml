question: U kom istorijskom periodu su verski ratovi opustošili Evropu?
answer: Renesansa
wrong_answers:
  - Srednji vek
  - Prosvetljenje
  - Francuska revolucija
explanation: |
  Verski ratovi su prvenstveno obeležili Evropu tokom Renesanse, perioda tokom kojeg su sukobi između katolika i protestanata doveli do nasilnih sukoba, naročito u Francuskoj i Svetom rimskom carstvu.
reviewed: false
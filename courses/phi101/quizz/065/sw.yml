question: Ni katika kipindi gani cha kihistoria ambapo vita vya kidini viliharibu Ulaya?
answer: Renaissance
wrong_answers:
  - Zama za Kati
  - Kuelimika
  - Mapinduzi ya Ufaransa
explanation: |
  Vita vya kidini vilitia alama Ulaya hasa wakati wa Renaissance, kipindi ambacho migogoro kati ya Wakatoliki na Waprotestanti ilisababisha mapigano makali, hasa katika Ufaransa na Milki Takatifu ya Roma.
reviewed: false
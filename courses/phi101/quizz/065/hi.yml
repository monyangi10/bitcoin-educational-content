question: यूरोप में धार्मिक युद्धों ने किस ऐतिहासिक काल में तबाही मचाई थी?
answer: पुनर्जागरण
wrong_answers:
  - मध्य युग
  - ज्ञान (Gyaan)
  - फ्रांसीसी क्रांति
explanation: |
  रेनैसांस के दौरान धार्मिक युद्धों ने खासकर यूरोप को प्रभावित किया, जब कैथोलिक और प्रोटेस्टेंट समुदायों के बीच टकराव हुए, खास तौर पर फ्रांस और पवित्र रोमन साम्राज्य में हिंसक झड़पें हुईं।
reviewed: false
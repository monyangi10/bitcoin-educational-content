question: През кой исторически период религиозните войни опустошават Европа?
answer: Ренесанс
wrong_answers:
  - Средновековие
  - Просвещение
  - Френската революция
explanation: |
  Религиозните войни бележат Европа най-вече по време на Ренесанса - период, през който конфликтите между католици и протестанти водят до ожесточени сблъсъци, особено във Франция и Свещената Римска империя.
reviewed: true
question: Каква е разликата между история и философия?
answer: Всички останали отговори
wrong_answers:
  - Историята описва миналото, а философията го съди
  - Историята е фактическа, а философията - нормативна
  - Историята се фокусира върху събитията, а философията - върху понятията
explanation: |
  Разликата между историята и философията се състои в съответните им подходи: историята се концентрира върху описанието и анализа на минали събития, докато философията се стреми да съди, тълкува и установява норми въз основа на абстрактни понятия.
reviewed: true
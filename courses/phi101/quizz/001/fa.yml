question: تفاوت بین تاریخ و فلسفه چیست؟
answer: همه پاسخ‌های دیگر
wrong_answers:
  - تاریخ گذشته را توصیف می‌کند در حالی که فلسفه آن را قضاوت می‌کند
  - تاریخ واقعی است در حالی که فلسفه هنجاری است
  - تاریخ بر رویدادها تمرکز دارد در حالی که فلسفه بر مفاهیم تمرکز دارد
explanation: |
  تفاوت بین تاریخ و فلسفه در رویکردهای مربوطه آن‌ها نهفته است: تاریخ بر توصیف و تحلیل رویدادهای گذشته تمرکز دارد، در حالی که فلسفه به دنبال قضاوت، تفسیر و ایجاد هنجارها بر اساس مفاهیم انتزاعی است.
reviewed: false
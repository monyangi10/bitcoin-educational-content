question: ความแตกต่างระหว่างประวัติศาสตร์และปรัชญาคืออะไร?
answer: คำตอบอื่น ๆ ทั้งหมด
wrong_answers:
  - ประวัติศาสตร์บรรยายถึงอดีต ในขณะที่ปรัชญาตัดสินมัน
  - ประวัติศาสตร์เป็นข้อเท็จจริง ในขณะที่ปรัชญาเป็นเชิงบรรทัดฐาน
  - ประวัติศาสตร์มุ่งเน้นที่เหตุการณ์ ในขณะที่ปรัชญามุ่งเน้นที่แนวคิด
explanation: |
  ความแตกต่างระหว่างประวัติศาสตร์และปรัชญาอยู่ที่แนวทางของแต่ละด้าน: ประวัติศาสตร์มุ่งเน้นไปที่การบรรยายและวิเคราะห์เหตุการณ์ในอดีต ในขณะที่ปรัชญามุ่งหวังที่จะตัดสินใจ ตีความ และสร้างบรรทัดฐานตามแนวคิดเชิงนามธรรม
reviewed: true
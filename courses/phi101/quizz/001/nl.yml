question: Wat is het verschil tussen geschiedenis en filosofie?
answer: Alle andere antwoorden
wrong_answers:
  - Geschiedenis beschrijft het verleden terwijl filosofie het beoordeelt
  - Geschiedenis is feitelijk, terwijl filosofie normatief is
  - Geschiedenis richt zich op gebeurtenissen, terwijl filosofie zich richt op concepten
explanation: |
  Het verschil tussen geschiedenis en filosofie ligt in hun respectievelijke benaderingen: geschiedenis concentreert zich op het beschrijven en analyseren van gebeurtenissen in het verleden, terwijl filosofie probeert te oordelen, te interpreteren en normen vast te stellen op basis van abstracte concepten.
reviewed: true
question: इतिहास और दर्शन में क्या अंतर है?
answer: अन्य सभी उत्तर
wrong_answers:
  - इतिहास अतीत का वर्णन करता है जबकि दर्शन उसका न्याय करता है
  - इतिहास तथ्यात्मक है जबकि दर्शन मानक है
  - इतिहास घटनाओं पर केंद्रित होता है जबकि दर्शन अवधारणाओं पर केंद्रित होता है
explanation: |
  इतिहास और दर्शन के बीच अंतर उनके संबंधित दृष्टिकोणों में निहित है: इतिहास अतीत की घटनाओं का वर्णन और विश्लेषण करने पर ध्यान केंद्रित करता है, जबकि दर्शन अमूर्त अवधारणाओं के आधार पर न्याय, व्याख्या और मानदंड स्थापित करने का प्रयास करता है।

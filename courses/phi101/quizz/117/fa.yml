question: به گفته کینز، مشکل اصلی استاندارد طلا چیست؟
answer: این امر توانایی دولت در تأمین مالی هزینه‌های خود را محدود می‌کند.
wrong_answers:
  - این باعث تورم می‌شود
  - این امر تجارت بین‌المللی را مختل می‌کند
  - همه پاسخ‌های دیگر صحیح هستند.
explanation: |
  کینز معتقد بود که استاندارد طلا توانایی دولت را در تنظیم پول Supply محدود می‌کند و مانع از آن می‌شود که به راحتی هزینه‌های خود را، به ویژه در زمان بحران‌های اقتصادی، تأمین مالی کنند.
reviewed: false
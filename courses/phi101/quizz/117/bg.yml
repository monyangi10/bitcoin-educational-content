question: Според Кейнс какъв е основният проблем на златния стандарт?
answer: Ограничава способността на правителството да финансира своите разходи
wrong_answers:
  - Тя насърчава инфлацията
  - Възпрепятства международната търговия
  - Всички останали отговори са верни.
explanation: |
  Кейнс смята, че златният стандарт ограничава възможностите на правителствата да регулират паричното предлагане, което им пречи лесно да финансират разходите си, особено по време на икономически кризи.
reviewed: true
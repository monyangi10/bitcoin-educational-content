question: ตามที่เคนส์กล่าว ปัญหาหลักของมาตรฐานทองคำคืออะไร?
answer: มันจำกัดความสามารถของรัฐบาลในการจัดหาเงินทุนสำหรับค่าใช้จ่ายของตน
wrong_answers:
  - มันส่งเสริมเงินเฟ้อ
  - มันขัดขวางการค้าระหว่างประเทศ
  - คำตอบอื่น ๆ ทั้งหมดถูกต้อง
explanation: |
  เคนส์เชื่อว่ามาตรฐานทองคำจำกัดความสามารถของรัฐบาลในการปรับปริมาณเงิน ทำให้ไม่สามารถจัดหาเงินทุนสำหรับการใช้จ่ายได้อย่างง่ายดาย โดยเฉพาะในช่วงวิกฤตเศรษฐกิจ
reviewed: true
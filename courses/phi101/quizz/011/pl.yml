question: Jaka jest główna teza Lorda Actona na temat historii?
answer: Konflikt między wolnością a władzą jest siłą napędową postępu i ewolucji społeczeństw.
wrong_answers:
  - Postęp jest liniowy i nieunikniony, prowadząc do społeczeństwa wolności i równości.
  - Historia to powtarzający się cykl, w którym po okresach wolności następują okresy tyranii.
  - Czynniki ekonomiczne są głównymi determinantami biegu historii.
explanation: |
  Lord Acton argumentuje, że historia jest przede wszystkim naznaczona konfliktem między wolnością a władzą, uznając tę walkę za niezbędną dla postępu i ewolucji społeczeństw w kierunku większej wolności jednostki.
reviewed: false
question: 액튼 경의 역사에 대한 중심 논지는 무엇인가요?
answer: 자유와 권력 사이의 갈등은 사회 발전과 진화의 원동력입니다.
wrong_answers:
  - 진보란 선형적이고 필연적인 것이며, 자유와 평등의 사회로 나아가는 길입니다.
  - 역사는 자유의 시대와 폭정의 시대가 반복되는 순환의 연속입니다.
  - 경제적 요인은 역사의 흐름을 결정하는 주요 요인입니다.
explanation: |
  액튼 경은 역사는 주로 자유와 권력 사이의 갈등으로 특징지어지며, 이러한 투쟁은 진보와 개인의 자유를 향한 사회의 진화에 필수적이라고 주장합니다.
reviewed: true
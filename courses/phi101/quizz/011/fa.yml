question: مرکزیت نظریه لرد اکتون در تاریخ چیست؟
answer: تضاد بین آزادی و قدرت نیروی محرکه پیشرفت و تکامل جوامع است.
wrong_answers:
  - پیشرفت خطی و اجتناب‌ناپذیر است و به جامعه‌ای از آزادی و برابری منجر می‌شود.
  - تاریخ چرخه‌ای از تکرار است که دوره‌های آزادی را با دوره‌های استبداد دنبال می‌کند.
  - عوامل اقتصادی تعیین‌کننده‌های اصلی مسیر تاریخ هستند.
explanation: |
  لرد اکتون استدلال می‌کند که تاریخ عمدتاً با تضاد بین آزادی و قدرت مشخص می‌شود و این مبارزه را برای پیشرفت و تکامل جوامع به سوی آزادی فردی بیشتر ضروری می‌داند.
reviewed: false
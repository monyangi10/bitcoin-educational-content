question: Каква е основната теза на лорд Актън за историята?
answer: Конфликтът между свободата и властта е движещата сила на прогреса и еволюцията на обществата.
wrong_answers:
  - Прогресът е линеен и неизбежен, водещ до общество на свобода и равенство.
  - Историята е цикъл от повторения, в който периодите на свобода се сменят с периоди на тирания.
  - Икономическите фактори са основните фактори, определящи хода на историята.
explanation: |
  Лорд Актън твърди, че историята е белязана преди всичко от конфликта между свободата и властта, като смята, че тази борба е от съществено значение за прогреса и развитието на обществата към по-голяма индивидуална свобода.
reviewed: true
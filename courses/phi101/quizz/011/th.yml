question: อะไรคือวิทยานิพนธ์หลักของลอร์ดแอคตันเกี่ยวกับประวัติศาสตร์?
answer: ความขัดแย้งระหว่างเสรีภาพและอำนาจเป็นแรงขับเคลื่อนของความก้าวหน้าและวิวัฒนาการของสังคม
wrong_answers:
  - ความก้าวหน้าเป็นเส้นตรงและหลีกเลี่ยงไม่ได้ นำไปสู่สังคมแห่งเสรีภาพและความเท่าเทียม
  - ประวัติศาสตร์เป็นวัฏจักรของการซ้ำรอย โดยมีช่วงเวลาแห่งเสรีภาพตามมาด้วยช่วงเวลาแห่งการกดขี่
  - ปัจจัยทางเศรษฐกิจเป็นตัวกำหนดหลักของเส้นทางประวัติศาสตร์
explanation: |
  ลอร์ดแอคตันโต้แย้งว่าประวัติศาสตร์ถูกทำเครื่องหมายโดยความขัดแย้งระหว่างเสรีภาพและอำนาจ โดยพิจารณาว่าการต่อสู้นี้เป็นสิ่งสำคัญสำหรับความก้าวหน้าและวิวัฒนาการของสังคมไปสู่เสรีภาพส่วนบุคคลที่มากขึ้น
reviewed: true
question: تفاوت اصلی بین انقلاب آمریکا و انقلاب فرانسه چیست؟
answer: انقلاب آمریکا به تشکیل یک دولت قانون‌مدار غیرمتمرکز منجر شد، در حالی که انقلاب فرانسه به دوره‌ای از وحشت و دیکتاتوری انجامید.
wrong_answers:
  - انقلاب آمریکا از ایده‌های روشنگری الهام گرفته بود، در حالی که انقلاب فرانسه از ایده‌های مذهبی الهام گرفته بود.
  - انقلاب آمریکا توسط استعمارگران رهبری شد، در حالی که انقلاب فرانسه توسط اشراف رهبری شد.
  - انقلاب آمریکا طولانی بود، در حالی که انقلاب فرانسه کوتاه بود.
explanation: |
  انقلاب آمریکا به یک سیستم غیرمتمرکز و پایدار مبتنی بر حاکمیت قانون منجر شد، در حالی که انقلاب فرانسه به سرعت به وحشت و دیکتاتوری به دلیل اختلافات داخلی و تمرکز قدرت فرو رفت.
reviewed: false
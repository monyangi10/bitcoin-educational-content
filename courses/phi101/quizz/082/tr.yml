question: Amerikan Devrimi ile Fransız Devrimi arasındaki temel fark nedir?
answer: Amerikan Devrimi ademi merkeziyetçi bir hukuk devletinin kurulmasına yol açarken, Fransız Devrimi bir Terör ve diktatörlük dönemine yol açmıştır.
wrong_answers:
  - Amerikan Devrimi Aydınlanma fikirlerinden, Fransız Devrimi ise dini fikirlerden esinlenmiştir.
  - Amerikan Devrimi kolonistler tarafından yönetilirken, Fransız Devrimi soylular tarafından yönetilmiştir.
  - Amerikan Devrimi uzun, Fransız Devrimi ise kısaydı.
explanation: |
  Amerikan Devrimi hukukun üstünlüğüne dayalı adem-i merkeziyetçi ve istikrarlı bir sistemle sonuçlanırken, Fransız Devrimi iç bölünmeler ve gücün merkezileşmesi nedeniyle hızla Teröre ve diktatörlüğe dönüşmüştür.
reviewed: true
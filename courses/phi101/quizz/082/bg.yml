question: Каква е основната разлика между Американската революция и Френската революция?
answer: Американската революция доведе до формирането на децентрализирана правова държава, докато Френската революция доведе до период на терор и диктатура.
wrong_answers:
  - Американската революция е вдъхновена от идеите на Просвещението, докато Френската революция е вдъхновена от религиозните идеи.
  - Американската революция е водена от колонистите, а Френската революция - от благородниците.
  - Американската революция беше дълга, а Френската - кратка.
explanation: |
  Американската революция доведе до децентрализирана и стабилна система, основана на върховенството на закона, докато Френската революция бързо се превърна в терор и диктатура поради вътрешни разделения и централизация на властта.
reviewed: true
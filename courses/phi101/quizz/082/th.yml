question: ความแตกต่างหลักระหว่างการปฏิวัติอเมริกาและการปฏิวัติฝรั่งเศสคืออะไร?
answer: การปฏิวัติอเมริกันนำไปสู่การก่อตั้งรัฐที่มีกฎหมายแบบกระจายอำนาจ ในขณะที่การปฏิวัติฝรั่งเศสนำไปสู่ยุคแห่งความหวาดกลัวและเผด็จการ
wrong_answers:
  - การปฏิวัติอเมริกันได้รับแรงบันดาลใจจากแนวคิดแห่งการตรัสรู้ ในขณะที่การปฏิวัติฝรั่งเศสได้รับแรงบันดาลใจจากแนวคิดทางศาสนา
  - การปฏิวัติอเมริกานำโดยชาวอาณานิคม ในขณะที่การปฏิวัติฝรั่งเศสนำโดยขุนนาง
  - การปฏิวัติอเมริกายาวนาน ในขณะที่การปฏิวัติฝรั่งเศสสั้น
explanation: |
  การปฏิวัติอเมริกันส่งผลให้เกิดระบบที่กระจายอำนาจและมีเสถียรภาพซึ่งตั้งอยู่บนพื้นฐานของหลักนิติธรรม ในขณะที่การปฏิวัติฝรั่งเศสกลับตกอยู่ในภาวะความหวาดกลัวและเผด็จการอย่างรวดเร็วเนื่องจากความแตกแยกภายในและการรวมศูนย์อำนาจ
reviewed: true
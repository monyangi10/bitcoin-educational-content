question: बास्टियत के अनुसार, सबसे बुरी तरह की लूट क्या है?
answer: टैक्स और इकरारनामे
wrong_answers:
  - एक व्यक्ति द्वारा दूसरे व्यक्ति की चोरी
  - युद्ध और जीत
  - सभी तरह की लूट एक जैसी बुरी होती है
explanation: |
  बास्तियात करों और एकाधिकारों को लूट का सबसे बुरा रूप मानते हैं क्योंकि ये राज्य द्वारा वैध ठहराए जाते हैं, जिससे व्यक्तियों के संसाधनों और आज़ादियों का व्यवस्थित रूप से हरण होता है, अक्सर जनहित के नाम पर।
reviewed: false
question: ตามที่บาสเตียตกล่าว รูปแบบการปล้นที่เลวร้ายที่สุดคืออะไร?
answer: ภาษีและการผูกขาด
wrong_answers:
  - การลักทรัพย์ที่กระทำโดยบุคคลหนึ่งต่ออีกบุคคลหนึ่ง
  - สงครามและการพิชิต
  - การปล้นทุกรูปแบบเลวร้ายเท่ากัน
explanation: |
  บาสเตียตพิจารณาว่าภาษีและการผูกขาดเป็นรูปแบบการปล้นที่เลวร้ายที่สุดเพราะได้รับการรับรองโดยรัฐ นำไปสู่การยึดครองทรัพยากรและเสรีภาพของบุคคลอย่างเป็นระบบ บ่อยครั้งภายใต้ข้ออ้างของผลประโยชน์สาธารณะ
reviewed: true
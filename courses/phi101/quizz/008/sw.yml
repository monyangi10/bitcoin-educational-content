question: Kulingana na Bastiat, ni aina gani mbaya zaidi ya uporaji?
answer: Ushuru na ukiritimba
wrong_answers:
  - Wizi unaofanywa na mtu mmoja dhidi ya mwingine
  - Vita na ushindi
  - Aina zote za uporaji ni mbaya sawa
explanation: |
  Bastiat anaona kodi na ukiritimba kuwa aina mbaya zaidi ya uporaji kwa sababu zimehalalishwa na serikali, na hivyo kusababisha ugawaji wa kimfumo wa rasilimali na uhuru wa watu binafsi, mara nyingi chini ya kivuli cha maslahi ya umma.

question: به گفته باستیا، بدترین شکل غارت چیست؟
answer: مالیات و انحصارات
wrong_answers:
  - سرقتی که توسط یک فرد علیه فرد دیگر انجام می‌شود
  - جنگ و فتوحات
  - همه اشکال غارت به یک اندازه بد هستند
explanation: |
  باستیا مالیات‌ها و انحصارها را بدترین شکل غارت می‌داند زیرا آنها توسط دولت مشروعیت یافته‌اند و منجر به مصادره سیستماتیک منابع و آزادی‌های افراد می‌شوند، اغلب تحت پوشش منافع عمومی.
reviewed: false
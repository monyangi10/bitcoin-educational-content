question: Jaka jest najgorsza forma grabieży według Bastiata?
answer: Podatki i monopole
wrong_answers:
  - Kradzież popełniona przez jedną osobę przeciwko drugiej
  - Wojna i podboje
  - Wszystkie formy grabieży są równie złe
explanation: |
  Bastiat uważa podatki i monopole za najgorszą formę grabieży, ponieważ są one legitymizowane przez państwo, prowadząc do systematycznego zawłaszczania zasobów i wolności jednostek, często pod pozorem interesu publicznego.

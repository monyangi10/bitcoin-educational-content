question: Според Бастиа какво е най-лошата форма на грабеж?
answer: Данъци и монополи
wrong_answers:
  - Кражба, извършена от едно лице срещу друго
  - Война и завоевания
  - Всички форми на грабеж са еднакво лоши
explanation: |
  Бастиа смята, че данъците и монополите са най-лошата форма на грабеж, тъй като са узаконени от държавата и водят до систематично присвояване на ресурсите и свободите на хората, често под прикритието на обществения интерес.
reviewed: true
question: انتقاد فردریک باستیا از دموکراسی سوسیالیستی چیست؟
answer: باستیا دموکراسی سوسیالیستی را مورد انتقاد قرار می‌دهد زیرا منجر به افزایش مالیات‌ها، بدهی دولت و غارت می‌شود.
wrong_answers:
  - باستیا دموکراسی سوسیالیستی را نقد می‌کند زیرا به اصول آزادی و برابری احترام نمی‌گذارد.
  - باستیا دموکراسی سوسیالیستی را به دلیل اینکه منجر به رکود می‌شود، مورد انتقاد قرار می‌دهد.
  - باستیا دموکراسی سوسیالیستی را مورد انتقاد قرار می‌دهد زیرا ارزش‌های سنتی خانواده و دین را تهدید می‌کند.
explanation: |
  فردریک باستیا در دموکراسی سوسیالیستی تمایلی می‌بیند که از دولت برای توزیع مجدد ثروت از طریق مالیات و بدهی استفاده کند، که او آن را غارت قانونی مالکیت فردی می‌داند.
reviewed: false
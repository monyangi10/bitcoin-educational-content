question: Каква е критиката на Фредерик Бастиа към социалистическата демокрация?
answer: Бастиа критикува социалистическата демокрация, защото тя води до увеличаване на данъците, задлъжняване на държавата и разграбване.
wrong_answers:
  - Бастиа критикува социалистическата демокрация, защото тя не зачита принципите на свободата и равенството.
  - Бастиа критикува социалистическата демокрация, защото тя води до стагнация.
  - Бастиа критикува социалистическата демокрация, защото тя застрашава традиционните ценности на семейството и религията.
explanation: |
  Фредерик Бастиа смята, че социалистическата демокрация е склонна да използва държавата за преразпределение на богатството чрез данъци и дългове, което според него е форма на законно ограбване на индивидуалната собственост.
reviewed: true
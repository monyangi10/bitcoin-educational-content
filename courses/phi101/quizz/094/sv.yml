question: Vad är Frédéric Bastiats kritik av den socialistiska demokratin?
answer: Bastiat kritiserar den socialistiska demokratin för att den leder till ökade skatter, statlig skuldsättning och plundring.
wrong_answers:
  - Bastiat kritiserar den socialistiska demokratin för att den inte respekterar principerna om frihet och jämlikhet.
  - Bastiat kritiserar den socialistiska demokratin för att den leder till stagnation.
  - Bastiat kritiserar den socialistiska demokratin för att den hotar traditionella värderingar som familj och religion.
explanation: |
  Frédéric Bastiat anser att den socialistiska demokratin har en tendens att använda staten för att omfördela rikedomar genom beskattning och skuldsättning, vilket han ser som en form av laglig plundring av enskild egendom.
reviewed: true
question: Vad är det nödvändiga villkoret för verklig frigörelse enligt Marx?
answer: Förverkligandet av en ekonomisk och social revolution som avskaffar kapitalismen.
wrong_answers:
  - Upprättandet av en opartisk och neutral stat.
  - Eliminering av religion och dess illusioner.
  - Förstörelsen av McDonald's.
explanation: |
  För Marx kräver verklig frigörelse en radikal omvandling av ekonomiska och sociala strukturer genom revolution, för att därigenom göra slut på kapitalistisk exploatering och upprätta ett klasslöst samhälle.
reviewed: true
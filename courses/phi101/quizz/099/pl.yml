question: Jaki jest niezbędny warunek prawdziwej emancypacji według Marksa?
answer: Realizacja rewolucji gospodarczej i społecznej znoszącej kapitalizm.
wrong_answers:
  - Ustanowienie bezstronnego i neutralnego państwa.
  - Eliminacja religii i jej iluzji.
  - Zniszczenie McDonald's.
explanation: |
  Dla Marksa prawdziwa emancypacja wymaga radykalnej transformacji struktur gospodarczych i społecznych poprzez rewolucję, aby położyć kres kapitalistycznemu wyzyskowi i ustanowić społeczeństwo bezklasowe.
reviewed: false
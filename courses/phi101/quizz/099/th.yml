question: เงื่อนไขที่จำเป็นสำหรับการปลดปล่อยที่แท้จริงตามมาร์กซ์คืออะไร?
answer: การตระหนักถึงการปฏิวัติทางเศรษฐกิจและสังคมที่ยกเลิกทุนนิยม
wrong_answers:
  - การจัดตั้งรัฐที่เป็นกลางและไม่ลำเอียง
  - การกำจัดศาสนาและภาพลวงตาของมัน
  - การทำลายล้างของแมคโดนัลด์
explanation: |
  สำหรับมาร์กซ์ การปลดปล่อยที่แท้จริงจำเป็นต้องมีการเปลี่ยนแปลงอย่างรุนแรงของโครงสร้างทางเศรษฐกิจและสังคมผ่านการปฏิวัติ ซึ่งจะยุติการแสวงหาประโยชน์ในระบบทุนนิยมและสร้างสังคมที่ไร้ชนชั้น
reviewed: true
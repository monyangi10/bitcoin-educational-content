question: Кое е необходимото условие за истинска еманципация според Маркс?
answer: Осъществяването на икономическа и социална революция, която да премахне капитализма.
wrong_answers:
  - Създаване на безпристрастна и неутрална държава.
  - Премахване на религията и нейните илюзии.
  - Унищожаването на McDonald's.
explanation: |
  За Маркс истинската еманципация изисква радикална трансформация на икономическите и социалните структури чрез революция, която да сложи край на капиталистическата експлоатация и да създаде безкласово общество.
reviewed: true
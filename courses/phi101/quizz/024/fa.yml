question: چشم‌انداز روتبارد از یک جامعه آزاد چیست؟
answer: جامعه‌ای که در آن هیچ امکانی برای تجاوز اجباری علیه شخص یا دارایی فرد وجود ندارد.
wrong_answers:
  - جامعه‌ای که در آن دولت تنها چند جنبه از زندگی اقتصادی و اجتماعی را کنترل می‌کند.
  - جامعه‌ای که در آن افراد آزادند هر کاری که می‌خواهند بدون هیچ محدودیتی انجام دهند.
  - جامعه‌ای که در آن قدرت به طور مساوی در میان تمام طبقات اجتماعی توزیع شده است.
explanation: |
  راتبارد یک جامعه آزاد را به‌عنوان مکانی تعریف می‌کند که در آن هیچ تجاوز اجباری علیه شخص یا دارایی مجاز نیست، بنابراین از لیبرترینیسم رادیکالی حمایت می‌کند که هرگونه مداخله دولتی در زندگی فردی را رد می‌کند.
reviewed: false
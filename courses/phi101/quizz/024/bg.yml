question: Каква е визията на Ротбард за свободното общество?
answer: Общество, в което не съществува възможност за насилствена агресия срещу личността или собствеността на индивида.
wrong_answers:
  - Общество, в което държавата контролира само някои аспекти на икономическия и социалния живот.
  - Общество, в което хората са свободни да правят каквото искат без никакви ограничения.
  - Общество, в което властта е равномерно разпределена между всички социални класи.
explanation: |
  Ротбард определя свободното общество като място, в което не се допуска принудителна агресия срещу човек или неговата собственост, като по този начин се застъпва за радикален либертариански подход, който отхвърля всякаква държавна намеса в живота на индивида.
reviewed: true
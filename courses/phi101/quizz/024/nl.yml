question: Wat is Rothbards visie op een vrije samenleving?
answer: Een samenleving waarin er geen mogelijkheid is tot dwangmatige agressie tegen de persoon of het eigendom van een individu.
wrong_answers:
  - Een samenleving waarin de staat slechts enkele aspecten van het economische en sociale leven controleert.
  - Een samenleving waarin individuen vrij zijn om te doen wat ze willen, zonder beperkingen.
  - Een samenleving waar de macht gelijk verdeeld is over alle sociale klassen.
explanation: |
  Rothbard definieert een vrije samenleving als een plaats waar geen dwangmatige agressie is toegestaan tegen een persoon of zijn eigendom, waarmee hij pleit voor een radicaal libertarisme dat elke staatsbemoeienis met individuele levens afwijst.
reviewed: true
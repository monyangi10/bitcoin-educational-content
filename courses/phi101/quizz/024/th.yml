question: วิสัยทัศน์ของ Rothbard เกี่ยวกับสังคมเสรีคืออะไร?
answer: สังคมที่ไม่มีความเป็นไปได้ในการใช้ความรุนแรงบังคับต่อบุคคลหรือทรัพย์สินของบุคคลใด ๆ
wrong_answers:
  - สังคมที่รัฐควบคุมเพียงไม่กี่ด้านของชีวิตเศรษฐกิจและสังคม
  - สังคมที่บุคคลมีอิสระที่จะทำอะไรก็ได้ตามต้องการโดยไม่มีข้อจำกัดใดๆ
  - สังคมที่มีการกระจายอำนาจอย่างเท่าเทียมกันในทุกชนชั้นทางสังคม
explanation: |
  Rothbard กำหนดสังคมเสรีว่าเป็นสถานที่ที่ไม่มีการรุกรานด้วยการบังคับต่อบุคคลหรือทรัพย์สินของพวกเขา ดังนั้นจึงสนับสนุนลัทธิเสรีนิยมสุดโต่งที่ปฏิเสธการแทรกแซงของรัฐในชีวิตส่วนบุคคล
reviewed: true
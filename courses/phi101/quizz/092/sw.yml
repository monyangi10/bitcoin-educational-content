question: Ubinafsi ni nini kulingana na Tocqueville?
answer: Ubinafsi ni hisia ya kujitosheleza ambayo inawapelekea wananchi kujitenga na wengine na kujitenga wenyewe.
wrong_answers:
  - Ubinafsi ni kipengele ambacho kipo katika kila zama.
  - Ubinafsi ni fundisho la kisiasa ambalo linatetea kurudi kwa maisha ya mababu.
  - Ubinafsi ni neno linalodhihirisha ubinafsi wa mwanadamu.
explanation: |
  Kwa Tocqueville, ubinafsi ni mwelekeo wa kisasa kuelekea utoshelevu unaowasukuma wananchi kupuuza majukumu ya pamoja, hivyo basi kujenga utengano unaodhoofisha mfumo wa kijamii.

question: ปัจเจกนิยมตามที่ Tocqueville กล่าวคืออะไร?
answer: ลัทธิปัจเจกนิยมคือความรู้สึกของการพึ่งพาตนเองที่นำพาประชาชนให้แยกตัวออกจากผู้อื่นและหันกลับเข้าสู่ตัวเอง
wrong_answers:
  - ลัทธิปัจเจกนิยมเป็นองค์ประกอบที่มีอยู่ในทุกยุคสมัย
  - ลัทธิปัจเจกนิยมเป็นหลักคำสอนทางการเมืองที่สนับสนุนการกลับไปสู่ชีวิตบรรพบุรุษ
  - ลัทธิปัจเจกนิยมเป็นคำที่บ่งบอกถึงความเห็นแก่ตัวของมนุษย์
explanation: |
  สำหรับ Tocqueville ปัจเจกนิยมเป็นแนวโน้มสมัยใหม่ที่มุ่งเน้นความพึ่งพาตนเองซึ่งผลักดันให้พลเมืองละเลยความรับผิดชอบร่วมกัน จึงก่อให้เกิดการแยกตัวที่ทำให้โครงสร้างทางสังคมอ่อนแอลง
reviewed: true
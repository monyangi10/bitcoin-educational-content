question: Какво представлява индивидуализмът според Токвил?
answer: Индивидуализмът е чувство за самодостатъчност, което кара гражданите да се изолират от другите и да се затварят в себе си.
wrong_answers:
  - Индивидуализмът е елемент, който съществува във всяка епоха.
  - Индивидуализмът е политическа доктрина, която се застъпва за завръщане към живота на предците.
  - Индивидуализмът е термин, който характеризира човешкия егоизъм.
explanation: |
  За Токвил индивидуализмът е модерна тенденция към самодостатъчност, която кара гражданите да пренебрегват колективните отговорности, като по този начин създава изолация, която отслабва социалната тъкан.
reviewed: true
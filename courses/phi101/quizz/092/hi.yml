question: टोकेविले के अनुसार व्यक्तिवाद क्या है?
answer: व्यक्तिवाद आत्मनिर्भरता की भावना है जो नागरिकों को दूसरों से अलग कर देती है तथा उन्हें अपने में सिमट कर रहने के लिए प्रेरित करती है।
wrong_answers:
  - व्यक्तिवाद एक ऐसा तत्व है जो हर युग में विद्यमान रहता है।
  - व्यक्तिवाद एक राजनीतिक सिद्धांत है जो पैतृक जीवन की ओर लौटने की वकालत करता है।
  - व्यक्तिवाद एक ऐसा शब्द है जो मानव स्वार्थ को दर्शाता है।
explanation: |
  टोकेविले के लिए, व्यक्तिवाद आत्मनिर्भरता की ओर एक आधुनिक प्रवृत्ति है जो नागरिकों को सामूहिक जिम्मेदारियों की उपेक्षा करने के लिए प्रेरित करती है, जिससे अलगाव पैदा होता है जो सामाजिक ताने-बाने को कमजोर करता है।

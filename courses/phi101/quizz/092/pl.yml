question: Czym jest indywidualizm według Tocqueville'a?
answer: Indywidualizm to poczucie samowystarczalności, które prowadzi obywateli do izolowania się od innych i zamykania się w sobie.
wrong_answers:
  - Indywidualizm jest elementem, który istnieje w każdej epoce.
  - Indywidualizm jest doktryną polityczną, która opowiada się za powrotem do życia przodków.
  - Indywidualizm to termin, który charakteryzuje ludzki egoizm.
explanation: |
  Dla Tocqueville'a indywidualizm jest nowoczesną tendencją do samowystarczalności, która skłania obywateli do zaniedbywania zbiorowych obowiązków, tworząc w ten sposób izolację, która osłabia tkankę społeczną.

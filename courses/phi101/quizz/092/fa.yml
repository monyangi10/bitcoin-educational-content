question: فردگرایی از دیدگاه توکویل چیست؟
answer: فردگرایی احساسی از خودکفایی است که شهروندان را به انزوا از دیگران و عقب‌نشینی به درون خود سوق می‌دهد.
wrong_answers:
  - فردگرایی عنصری است که در هر دوره‌ای وجود دارد.
  - فردگرایی یک دکترین سیاسی است که از بازگشت به زندگی نیاکانی حمایت می‌کند.
  - فردگرایی اصطلاحی است که خودخواهی انسان را توصیف می‌کند.
explanation: |
  برای توکویل، فردگرایی یک گرایش مدرن به سمت خودکفایی است که شهروندان را به نادیده گرفتن مسئولیت‌های جمعی سوق می‌دهد و در نتیجه انزوایی ایجاد می‌کند که بافت اجتماعی را تضعیف می‌کند.
reviewed: false
question: रोमन साम्राज्य की वो क्या खास बात थी जिसने एक जटिल कानूनी व्यवस्था के विकास को आसान बनाया?
answer: इसका विशाल आकार और सांस्कृतिक तथा भाषाई विविधता
wrong_answers:
  - इसका संगठन स्वतंत्र नगर-राज्यों में है
  - इसका बिल्कुल राजशाही वाला राजनीतिक सिस्टम है
  - यह धार्मिक परंपराओं का पालन करता है
explanation: |
  रोमन साम्राज्य, जिसका विस्तार और विविध लोगों व संस्कृतियों का समावेश था, को एक जटिल कानूनी व्यवस्था की जरूरत थी जो अलग-अलग प्रांतों की विभिन्न वास्तविकताओं के अनुकूल हो सके और साथ ही साम्राज्य को सामान्य कानूनी सिद्धांतों के तहत एकजुट कर सके।
reviewed: false
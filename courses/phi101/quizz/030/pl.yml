question: Jaka była wyjątkowa cecha Imperium Rzymskiego, która ułatwiła rozwój złożonego systemu prawnego?
answer: Jego ogrom oraz różnorodność kulturowa i językowa
wrong_answers:
  - Jego organizacja w niezależne miasta-państwa
  - Absolutny monarchiczny system polityczny
  - Jego przywiązanie do tradycji religijnych
explanation: |
  Imperium Rzymskie, ze swoim ogromnym obszarem i różnorodnością ludów i kultur, wymagało złożonego systemu prawnego zdolnego do dostosowania się do zróżnicowanych realiów różnych prowincji, przy jednoczesnym zjednoczeniu Imperium w ramach wspólnych zasad prawnych.
reviewed: false
question: Vilken var den unika egenskapen hos det romerska riket som underlättade utvecklingen av ett komplext rättssystem?
answer: Dess vidsträckta yta och kulturella och språkliga mångfald
wrong_answers:
  - Dess organisation i självständiga stadsstater
  - Det är ett absolut monarkiskt politiskt system
  - Dess efterlevnad av religiösa traditioner
explanation: |
  Det romerska riket, med dess enorma utbredning och mångfald av folk och kulturer, krävde ett sofistikerat rättssystem som kunde ta hänsyn till de olika provinsernas varierande verklighet och samtidigt ena riket under gemensamma rättsprinciper.
reviewed: true
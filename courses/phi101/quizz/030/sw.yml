question: Je, ni sifa gani ya pekee ya Milki ya Roma iliyowezesha kusitawishwa kwa mfumo tata wa kisheria?
answer: Ukuu wake na utofauti wa kitamaduni na lugha
wrong_answers:
  - Shirika lake katika majimbo ya jiji huru
  - Mfumo wake wa kisiasa wa kifalme kabisa
  - Kushikamana kwake na mila za kidini
explanation: |
  Milki ya Roma, pamoja na upana wake mkubwa na utofauti wa watu na tamaduni, ilihitaji mfumo changamano wa kisheria wenye uwezo wa kukabiliana na hali halisi mbalimbali za majimbo mbalimbali huku ukiunganisha Dola chini ya kanuni za kawaida za kisheria.

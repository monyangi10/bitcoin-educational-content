question: Коя е уникалната особеност на Римската империя, която улеснява развитието на сложна правна система?
answer: Неговата обширност и културно и езиково разнообразие
wrong_answers:
  - Организирането му в независими градове-държави
  - Това е абсолютна монархическа политическа система
  - Придържането му към религиозните традиции
explanation: |
  Римската империя с огромната си територия и разнообразните си народи и култури се нуждае от сложна правна система, която да може да се приспособи към разнообразните реалности на различните провинции и същевременно да обедини империята под общи правни принципи.
reviewed: true
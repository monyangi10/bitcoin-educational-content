question: What was the unique feature of the Roman Empire that facilitated the development of a complex legal system?
answer: Its vastness and cultural and linguistic diversity
wrong_answers:
  - Its organization into independent city-states
  - It's an absolute monarchical political system
  - Its adherence to religious traditions
explanation: |
  The Roman Empire, with its immense expanse and diverse array of peoples and cultures, necessitated a sophisticated legal system that could accommodate the varied realities of different provinces while unifying the Empire under common legal principles.
reviewed: true

question: Ni igiki kidasanzwe mu Bwami bw’Uburoma catumye habaho urutonde rw’amategeko rutoroshe?
answer: Ubwaguke bwayo n'ubudasa bw'imico kama n'indimi
wrong_answers:
  - Itunganywa ryayo mu bisagara-bihugu vyigenga
  - Ni ubutegetsi bwa politike bw'umwami
  - Ukwo kwisunga imigenzo y’idini .
explanation: |
  Ubwami bw’Uburoma, kubera uburebure bwabwo buhambaye cane be n’abantu n’imico kama itandukanye, bwari bukeneye uburyo buhambaye bwo gukurikiza amategeko bwoshobora guhangana n’ibintu bitandukanye vyo mu ntara zitandukanye, mu gihe bwari buhuza Ubwami bushingiye ku ngingo ngenderwako z’amategeko zihurikiyeko.
reviewed: true
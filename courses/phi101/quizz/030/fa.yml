question: ویژگی منحصر به فرد امپراتوری روم که توسعه یک سیستم حقوقی پیچیده را تسهیل کرد چه بود؟
answer: وسعت و تنوع فرهنگی و زبانی آن
wrong_answers:
  - سازماندهی آن به شهر-دولت‌های مستقل
  - سیستم سیاسی مطلقه سلطنتی آن
  - پایبندی آن به سنت‌های مذهبی
explanation: |
  امپراتوری روم، با گستره وسیع و تنوع مردمان و فرهنگ‌هایش، نیازمند یک سیستم حقوقی پیچیده بود که بتواند به واقعیت‌های متنوع استان‌های مختلف پاسخ دهد و در عین حال امپراتوری را تحت اصول حقوقی مشترک متحد کند.
reviewed: false
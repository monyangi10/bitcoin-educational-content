question: Prema Actonu, koja je uloga Katoličke crkve bila u usponu slobode u Evropi?
answer: Sve navedeno
wrong_answers:
  - Promovisala je podelu vlasti i ravnotežu snaga
  - Branio je individualna prava i slobodu savesti
  - Podsticao je kritičko razmišljanje i preispitivanje autoriteta.
explanation: |
  Prema Actonu, Katolička crkva je igrala ključnu ulogu u usponu slobode u Evropi promovisanjem podele vlasti, odbranom individualnih prava i podsticanjem kritičkog duha, čime je doprinela formiranju slobodnijeg društva.

question: Според Актън каква роля е изиграла Католическата църква за възхода на свободата в Европа?
answer: Всичко изброено по-горе
wrong_answers:
  - Той насърчава разделението на властите и баланса на силите
  - Той защитаваше индивидуалните права и свободата на съвестта
  - Насърчава критичното мислене и поставянето на авторитети под въпрос
explanation: |
  Според Актън Католическата църква е изиграла решаваща роля за възхода на свободата в Европа, като е насърчавала разделението на властите, защитавала е индивидуалните права и е поощрявала критичния дух, допринасяйки по този начин за формирането на по-свободно общество.
reviewed: true
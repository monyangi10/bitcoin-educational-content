question: طبق نظر اکتون، کلیسای کاتولیک چه نقشی در ظهور آزادی در اروپا ایفا کرد؟
answer: همه موارد فوق
wrong_answers:
  - این ترویج جدایی قوا و تعادل نیروها را به همراه داشت
  - از حقوق فردی و آزادی وجدان دفاع کرد
  - این امر تفکر انتقادی و پرسش از قدرت را تشویق کرد.
explanation: |
  به گفته اکتون، کلیسای کاتولیک نقش مهمی در ظهور آزادی در اروپا ایفا کرد، با ترویج تفکیک قوا، دفاع از حقوق فردی و تشویق روحیه انتقادی، و بدین ترتیب به شکل‌گیری جامعه‌ای آزادتر کمک کرد.
reviewed: false
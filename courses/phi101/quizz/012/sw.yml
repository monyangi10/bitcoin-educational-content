question: Kulingana na Acton, Kanisa Katoliki lilitimiza daraka gani katika kuinuka kwa uhuru huko Ulaya?
answer: Yote ya hapo juu
wrong_answers:
  - Ilikuza mgawanyo wa mamlaka na usawa wa nguvu
  - Ilitetea haki za mtu binafsi na uhuru wa dhamiri
  - Ilihimiza mamlaka ya kufikiri kwa kina na kuhoji mamlaka
explanation: |
  Kulingana na Acton, Kanisa Katoliki lilitimiza fungu muhimu katika kuinuka kwa uhuru katika Ulaya kwa kuendeleza mgawanyo wa mamlaka, kutetea haki za mtu binafsi, na kutia moyo roho ya kuchambua, na hivyo kuchangia kufanyizwa kwa jamii huru.
reviewed: false
question: 액튼에 따르면 가톨릭 교회는 유럽에서 자유가 부상하는 과정에서 어떤 역할을 했나요?
answer: 위의 모든 사항
wrong_answers:
  - 권력 분립과 힘의 균형을 촉진했습니다
  - 개인의 권리와 양심의 자유를 옹호했습니다
  - 비판적 사고와 권위에 대한 의문을 장려합니다
explanation: |
  액튼에 따르면 가톨릭 교회는 권력 분립을 촉진하고 개인의 권리를 옹호하며 비판 정신을 장려함으로써 유럽에서 자유가 부상하는 데 중요한 역할을 했으며, 더 자유로운 사회가 형성되는 데 기여했습니다.
reviewed: true
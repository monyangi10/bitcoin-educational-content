question: ตามที่แอคตันกล่าว บทบาทของคริสตจักรคาทอลิกในการเพิ่มขึ้นของเสรีภาพในยุโรปคืออะไร?
answer: ทั้งหมดที่กล่าวมา
wrong_answers:
  - มันส่งเสริมการแยกอำนาจและความสมดุลของกองกำลัง
  - มันปกป้องสิทธิส่วนบุคคลและเสรีภาพในการมีมโนธรรม
  - มันส่งเสริมการคิดเชิงวิพากษ์และการตั้งคำถามต่ออำนาจ
explanation: |
  ตามที่แอคตันกล่าวไว้ว่า โบสถ์คาทอลิกมีบทบาทสำคัญในการเพิ่มขึ้นของเสรีภาพในยุโรปโดยส่งเสริมการแยกอำนาจ ปกป้องสิทธิส่วนบุคคล และส่งเสริมจิตวิญญาณวิพากษ์วิจารณ์ ซึ่งมีส่วนช่วยในการสร้างสังคมที่เสรีมากขึ้น
reviewed: true
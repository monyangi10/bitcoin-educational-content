question: Каква е основната разлика между философията на свободата и философията на властта?
answer: Всички останали отговори
wrong_answers:
  - Философията на свободата е в полза на индивида, а философията на властта - в полза на обществото
  - Философията на свободата цени частната собственост, а философията на властта - колективния интерес
  - Философията на свободата се основава на естественото право, а философията на властта - на позитивното право
explanation: |
  Фундаменталната разлика се състои в това, че философията на свободата акцентира върху индивида и неговите права, докато философията на властта се фокусира върху социалните и политическите структури, често за сметка на индивидуалната автономия и частната собственост.
reviewed: true
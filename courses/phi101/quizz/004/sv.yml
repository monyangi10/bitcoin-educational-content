question: Vad är den grundläggande skillnaden mellan frihetsfilosofin och maktfilosofin?
answer: Alla de andra svaren
wrong_answers:
  - Frihetsfilosofin gynnar individen, medan maktfilosofin gynnar samhället
  - Frihetsfilosofin värdesätter privat egendom, medan maktfilosofin värdesätter det kollektiva intresset
  - Frihetsfilosofin bygger på naturrätten, medan maktfilosofin bygger på positiv rätt
explanation: |
  Den grundläggande skillnaden ligger i att frihetsfilosofin betonar individen och dennes rättigheter, medan maktfilosofin fokuserar på sociala och politiska strukturer, ofta på bekostnad av individens autonomi och privat egendom.
reviewed: true
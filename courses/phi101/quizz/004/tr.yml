question: Özgürlük felsefesi ile iktidar felsefesi arasındaki temel fark nedir?
answer: Diğer tüm cevaplar
wrong_answers:
  - Özgürlük felsefesi bireyi, güç felsefesi ise toplumu destekler
  - Özgürlük felsefesi özel mülkiyete değer verirken, güç felsefesi kolektif çıkara değer verir
  - Özgürlük felsefesi doğal hukuka, iktidar felsefesi ise pozitif hukuka dayanır
explanation: |
  Aradaki temel fark, özgürlük felsefesinin bireyi ve haklarını vurgulaması, iktidar felsefesinin ise genellikle bireysel özerklik ve özel mülkiyet pahasına sosyal ve siyasi yapılara odaklanmasıdır.
reviewed: true
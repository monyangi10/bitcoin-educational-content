question: Hur karaktäriserar Rothbard staten?
answer: En parasit som lever på bekostnad av det produktiva samhället och hindrar utvecklingen
wrong_answers:
  - Ett viktigt instrument för att skydda individens fri- och rättigheter
  - Ett nödvändigt ont för att säkerställa ordning och social stabilitet
  - En neutral kraft som kan användas för gott eller ont, beroende på omständigheterna
explanation: |
  Rothbard beskriver staten som en parasit och menar att den tillskansar sig resurser från det produktiva samhället samtidigt som den hindrar ekonomiska och sociala framsteg och därmed skadar friheten och det individuella initiativet.
reviewed: true
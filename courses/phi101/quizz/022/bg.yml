question: Как Ротбард характеризира държавата?
answer: Паразит, който живее за сметка на продуктивното общество и пречи на прогреса
wrong_answers:
  - Основен инструмент за защита на индивидуалните права и свободи
  - Необходимо зло за осигуряване на ред и социална стабилност
  - Неутрална сила, която може да се използва за добро или зло в зависимост от обстоятелствата
explanation: |
  Ротбард описва държавата като паразит, твърдейки, че тя присвоява ресурси от продуктивното общество, като същевременно възпрепятства икономическия и социалния прогрес и по този начин вреди на свободата и индивидуалната инициатива.
reviewed: true
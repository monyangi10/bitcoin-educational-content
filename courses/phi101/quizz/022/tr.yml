question: Rothbard Devleti nasıl nitelendiriyor?
answer: Üretken toplumun sırtından geçinen ve ilerlemeyi engelleyen bir parazit
wrong_answers:
  - Bireysel hak ve özgürlüklerin korunması için temel bir araç
  - Düzeni ve sosyal istikrarı sağlamak için gerekli bir kötülük
  - Koşullara bağlı olarak iyilik veya kötülük için kullanılabilen tarafsız bir güç
explanation: |
  Rothbard, Devleti bir parazit olarak tanımlamakta, ekonomik ve sosyal ilerlemeyi engellerken üretken toplumun kaynaklarına el koyduğunu ve böylece özgürlüğe ve bireysel inisiyatife zarar verdiğini savunmaktadır.
reviewed: true
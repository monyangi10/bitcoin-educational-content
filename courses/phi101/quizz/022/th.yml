question: Rothbard อธิบายรัฐอย่างไร?
answer: ปรสิตที่อาศัยอยู่โดยพึ่งพาสังคมที่มีผลผลิตและขัดขวางความก้าวหน้า
wrong_answers:
  - เครื่องมือที่จำเป็นสำหรับการคุ้มครองสิทธิและเสรีภาพของบุคคล
  - ความชั่วร้ายที่จำเป็นเพื่อให้เกิดความเป็นระเบียบและเสถียรภาพทางสังคม
  - พลังที่เป็นกลางซึ่งสามารถใช้เพื่อความดีหรือความชั่วได้ ขึ้นอยู่กับสถานการณ์
explanation: |
  Rothbard อธิบายว่ารัฐเป็นปรสิต โดยโต้แย้งว่ารัฐยึดทรัพยากรจากสังคมที่มีการผลิต ในขณะที่ขัดขวางความก้าวหน้าทางเศรษฐกิจและสังคม ซึ่งทำให้เสรีภาพและความคิดริเริ่มของบุคคลเสียหาย
reviewed: true
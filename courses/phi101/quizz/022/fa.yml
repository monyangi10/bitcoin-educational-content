question: روثبارد چگونه دولت را توصیف می‌کند؟
answer: انگل که به هزینه جامعه مولد زندگی می‌کند و مانع پیشرفت می‌شود
wrong_answers:
  - یک ابزار ضروری برای حفاظت از حقوق و آزادی‌های فردی
  - یک شر ضروری برای تضمین نظم و ثبات اجتماعی
  - یک نیروی خنثی که بسته به شرایط می‌تواند برای خیر یا شر استفاده شود
explanation: |
  روثبارد دولت را به عنوان یک انگل توصیف می‌کند و استدلال می‌کند که دولت منابع را از جامعه مولد تصاحب می‌کند و در عین حال پیشرفت اقتصادی و اجتماعی را مختل می‌کند و به این ترتیب به آزادی و ابتکار فردی آسیب می‌رساند.
reviewed: false
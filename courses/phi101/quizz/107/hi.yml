question: हायक का समाजवाद पर क्या आलोचना है?
answer: वह समाजवाद द्वारा अपने लक्ष्यों को प्राप्त करने के लिए इस्तेमाल किए गए तरीकों, जैसे केंद्रीय योजना और निजी संपत्ति को खत्म करने, की आलोचना करता है।
wrong_answers:
  - वह समाजवाद के लक्ष्यों जैसे न्याय और समानता को नकारता है।
  - वह सोचता है कि समाजवाद एक बहुत ही पुराना सिद्धांत है।
  - इनमें से कोई नहीं।
explanation: |
  हायक समाजवाद की आलोचना उसके लक्ष्यों के लिए नहीं, बल्कि उसके तरीकों के लिए करते हैं, जैसे केंद्रीय योजना और निजी संपत्ति का उन्मूलन, जिसे वह व्यक्तिगत स्वतंत्रता और आर्थिक दक्षता के लिए खतरनाक मानते हैं।

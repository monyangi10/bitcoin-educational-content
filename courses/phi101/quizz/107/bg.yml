question: Каква е критиката на Хайек към социализма?
answer: Той критикува средствата, използвани от социализма за постигане на целите му, като централното планиране и премахването на частната собственост.
wrong_answers:
  - Той отхвърля целите на социализма, като справедливост и равенство.
  - Той смята, че социализмът е твърде древна доктрина.
  - Нито едно от изброените.
explanation: |
  Хайек критикува социализма не заради целите му, а заради методите му, като централното планиране и премахването на частната собственост, които смята за опасни за индивидуалната свобода и икономическата ефективност.
reviewed: true
question: คำวิจารณ์ของฮาเย็คต่อสังคมนิยมคืออะไร?
answer: เขาวิพากษ์วิจารณ์วิธีการที่สังคมนิยมใช้เพื่อบรรลุเป้าหมาย เช่น การวางแผนจากส่วนกลางและการกำจัดทรัพย์สินส่วนตัว
wrong_answers:
  - เขาปฏิเสธเป้าหมายของสังคมนิยม เช่น ความยุติธรรมและความเสมอภาค
  - เขาคิดว่าสังคมนิยมเป็นหลักคำสอนที่โบราณเกินไป
  - ไม่มีข้อใดข้างต้น
explanation: |
  ฮาเย็ควิจารณ์ลัทธิสังคมนิยมไม่ใช่เพราะเป้าหมายของมัน แต่เพราะวิธีการ เช่น การวางแผนจากศูนย์กลางและการยกเลิกทรัพย์สินส่วนตัว ซึ่งเขาถือว่าเป็นอันตรายต่อเสรีภาพส่วนบุคคลและประสิทธิภาพทางเศรษฐกิจ
reviewed: true
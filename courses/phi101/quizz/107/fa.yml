question: انتقاد هایک از سوسیالیسم چیست؟
answer: او از روش‌هایی که سوسیالیسم برای دستیابی به اهداف خود استفاده می‌کند، مانند برنامه‌ریزی مرکزی و حذف مالکیت خصوصی، انتقاد می‌کند.
wrong_answers:
  - او اهداف سوسیالیسم مانند عدالت و برابری را رد می‌کند.
  - او فکر می‌کند که سوسیالیسم یک دکترین بیش از حد قدیمی است.
  - هیچکدام از موارد بالا.
explanation: |
  هایک سوسیالیسم را نه به خاطر اهدافش، بلکه به خاطر روش‌هایش، مانند برنامه‌ریزی مرکزی و لغو مالکیت خصوصی، که او آن‌ها را برای آزادی فردی و کارایی اقتصادی خطرناک می‌داند، مورد انتقاد قرار می‌دهد.
reviewed: false
question: Кои са двете форми на грабеж, описани от Бастиа?
answer: Законен и незаконен грабеж
wrong_answers:
  - Морален грабеж и неморален грабеж
  - Вътрешен и външен грабеж
  - Грабеж на стоки и грабеж на услуги
explanation: |
  Бастиа прави разграничение между законен грабеж, който се определя от закона и често се упражнява от държавата (като данъците), и незаконен грабеж, който се извършва извън правната рамка, като кражбата или нападението.
reviewed: true
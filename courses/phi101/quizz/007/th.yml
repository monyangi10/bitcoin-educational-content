question: รูปแบบของการปล้นสะดมสองรูปแบบที่ Bastiat อธิบายคืออะไร?
answer: การปล้นที่ถูกกฎหมายและการปล้นที่ผิดกฎหมาย
wrong_answers:
  - การปล้นสะดมทางศีลธรรมและการปล้นสะดมที่ผิดศีลธรรม
  - การปล้นภายในและการปล้นภายนอก
  - การปล้นสะดมสินค้าและการปล้นสะดมบริการ
explanation: |
  บาสเตียตแยกแยะระหว่างการปล้นที่ถูกกฎหมาย ซึ่งถูกกำหนดโดยกฎหมายและมักดำเนินการโดยรัฐ (เช่น ภาษี) และการปล้นที่ผิดกฎหมาย ซึ่งเกิดขึ้นนอกกรอบกฎหมาย เช่น การขโมยหรือการทำร้ายร่างกาย
reviewed: true
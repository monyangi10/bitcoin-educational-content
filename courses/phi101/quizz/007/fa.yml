question: دو شکل غارت که توسط بستیات توصیف شده‌اند چیست؟
answer: غارت قانونی و غارت غیرقانونی
wrong_answers:
  - غارت اخلاقی و غارت غیراخلاقی
  - غارت داخلی و غارت خارجی
  - غارت کالاها و غارت خدمات
explanation: |
  باستیا بین غارت قانونی، که توسط قانون تعریف شده و اغلب توسط دولت اعمال می‌شود (مانند مالیات)، و غارت غیرقانونی، که خارج از چارچوب قانونی رخ می‌دهد، مانند دزدی یا حمله، تمایز قائل می‌شود.
reviewed: false
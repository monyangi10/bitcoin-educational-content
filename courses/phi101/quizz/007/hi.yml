question: बास्टियेट द्वारा वर्णित लूट के दो रूप क्या हैं?
answer: कानूनी लूट और गैरकानूनी लूट
wrong_answers:
  - नैतिक लूट और अनैतिक लूट
  - अंदरूनी लूट और बाहरी लूट
  - माल की लूट और सेवाओं की लूट
explanation: |
  बास्टियत कानूनी लूट और गैर-कानूनी लूट के बीच अंतर करते हैं। कानूनी लूट जो कानून द्वारा परिभाषित होती है और अक्सर राज्य द्वारा लागू की जाती है (जैसे कर), और गैर-कानूनी लूट जो कानूनी ढांचे के बाहर होती है, जैसे चोरी या हमला।
reviewed: false
question: رابطه بین قانون طبیعی و قانون انسانی از دیدگاه سنت توماس آکویناس چیست؟
answer: قانون بشری باید مطابق با قانون طبیعی باشد تا عادلانه و مشروع تلقی شود.
wrong_answers:
  - قانون انسانی برتر از قانون طبیعی است زیرا توسط مقامات قانونی وضع می‌شود.
  - قانون طبیعی برابر با قانون انسانی است.
  - قانون انسانی فقط به‌طور جزئی اعمال می‌شود.
explanation: |
  برای سنت توماس آکویناس، قانون بشری مشروعیت خود را از تطابق با قانون طبیعی می‌گیرد که اصول اخلاقی جهانی را بیان می‌کند. اگر قانون بشری با قانون طبیعی در تضاد باشد، عدالت و مشروعیت خود را از دست می‌دهد.
reviewed: false
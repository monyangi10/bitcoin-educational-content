question: ความสัมพันธ์ระหว่างกฎธรรมชาติและกฎหมายมนุษย์ตามที่นักบุญโทมัส อไควนัสคืออะไร?
answer: กฎหมายของมนุษย์ต้องสอดคล้องกับกฎธรรมชาติเพื่อให้เป็นธรรมและชอบธรรม
wrong_answers:
  - กฎหมายมนุษย์มีความเหนือกว่ากฎหมายธรรมชาติเนื่องจากถูกตราขึ้นโดยเจ้าหน้าที่ที่ชอบธรรม
  - กฎธรรมชาติเสมอกับกฎหมายมนุษย์
  - กฎหมายของมนุษย์ใช้บังคับได้เพียงบางส่วนเท่านั้น
explanation: |
  สำหรับนักบุญโทมัส อไควนัส กฎหมายมนุษย์ได้รับความชอบธรรมจากการสอดคล้องกับกฎธรรมชาติ ซึ่งแสดงถึงหลักศีลธรรมสากล หากกฎหมายมนุษย์ขัดแย้งกับกฎธรรมชาติ มันจะสูญเสียความยุติธรรมและความชอบธรรม
reviewed: true
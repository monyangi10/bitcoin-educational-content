question: Kuna uhusiano gani kati ya sheria ya asili na sheria ya binadamu kulingana na Mtakatifu Thomas Aquinas?
answer: Sheria ya binadamu lazima iwe kwa mujibu wa sheria ya asili ili kuwa ya haki na halali.
wrong_answers:
  - Sheria ya binadamu ni bora kuliko sheria ya asili kwa sababu inatungwa na mamlaka halali.
  - Sheria ya asili ni sawa na sheria ya binadamu.
  - Sheria ya binadamu inatumika kwa sehemu tu.
explanation: |
  Kwa Mtakatifu Thomas Akwino, sheria ya binadamu inapata uhalali wake kutokana na upatanifu wake na sheria ya asili, ambayo inaeleza kanuni za maadili za ulimwengu. Ikiwa sheria ya kibinadamu inapingana na sheria ya asili, inapoteza haki na uhalali wake.

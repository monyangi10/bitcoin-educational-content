question: Jaka jest relacja między prawem naturalnym a prawem ludzkim według świętego Tomasza z Akwinu?
answer: Prawo ludzkie musi być zgodne z prawem naturalnym, aby było sprawiedliwe i uzasadnione.
wrong_answers:
  - Prawo ludzkie jest lepsze od prawa naturalnego, ponieważ jest stanowione przez prawowite władze.
  - Prawo naturalne jest równe prawu ludzkiemu.
  - Prawo ludzkie ma zastosowanie tylko częściowo.
explanation: |
  Dla św. Tomasza z Akwinu prawo ludzkie czerpie swoją legitymizację z jego zgodności z prawem naturalnym, które wyraża uniwersalne zasady moralne. Jeśli prawo ludzkie jest sprzeczne z prawem naturalnym, traci swoją sprawiedliwość i legitymizację.
reviewed: false
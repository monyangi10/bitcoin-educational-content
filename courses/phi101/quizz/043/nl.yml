question: Wat is de relatie tussen de natuurwet en de menselijke wet volgens Thomas van Aquino?
answer: Menselijk recht moet in overeenstemming zijn met het natuurrecht om rechtvaardig en legitiem te zijn.
wrong_answers:
  - Mensenrecht is superieur aan natuurrecht omdat het wordt uitgevaardigd door legitieme autoriteiten.
  - De natuurwet is gelijk aan de menselijke wet.
  - Het menselijk recht is slechts gedeeltelijk van toepassing.
explanation: |
  Voor de heilige Thomas van Aquino ontleent de menselijke wet haar legitimiteit aan haar overeenstemming met de natuurwet, die universele morele principes uitdrukt. Als de menselijke wet in strijd is met de natuurwet, verliest ze haar rechtvaardigheid en legitimiteit.
reviewed: true
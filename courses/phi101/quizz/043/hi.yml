question: संत थॉमस एक्विनास के अनुसार प्राकृतिक कानून और मानवीय कानून के बीच क्या संबंध है?
answer: मानवीय कानून को न्यायसंगत और वैध होने के लिए प्राकृतिक कानून के अनुरूप होना चाहिए।
wrong_answers:
  - मानवीय कानून प्राकृतिक कानून से श्रेष्ठ है क्योंकि इसे वैध प्राधिकारियों द्वारा अधिनियमित किया जाता है।
  - प्राकृतिक कानून मानवीय कानून के बराबर है।
  - मानवीय कानून केवल आंशिक रूप से ही लागू होता है।
explanation: |
  सेंट थॉमस एक्विनास के अनुसार, मानवीय कानून अपनी वैधता प्राकृतिक कानून के अनुरूप होने से प्राप्त करता है, जो सार्वभौमिक नैतिक सिद्धांतों को व्यक्त करता है। यदि मानवीय कानून प्राकृतिक कानून का खंडन करता है, तो वह अपना न्याय और वैधता खो देता है।

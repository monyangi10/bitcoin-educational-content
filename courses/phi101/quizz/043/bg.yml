question: Каква е връзката между естественото и човешкото право според свети Тома Аквински?
answer: Човешкото право трябва да е в съответствие с естественото право, за да бъде справедливо и легитимно.
wrong_answers:
  - Човешкото право е по-висше от естественото, тъй като се издава от легитимни органи.
  - Естественото право е равно на човешкото.
  - Човешкото право се прилага само частично.
explanation: |
  За свети Тома Аквински човешкото право извлича своята легитимност от съответствието си с естественото право, което изразява универсалните морални принципи. Ако човешкият закон противоречи на естествения закон, той губи своята справедливост и легитимност.
reviewed: true
question: طبق نظر مارکس، چه چیزی رشد استثنایی اروپا را توضیح می‌دهد؟
answer: ترکیب پیشرفت فنی و بهره‌برداری از دیگران
wrong_answers:
  - پیشرفت تکنیک‌ها و انباشت سرمایه
  - امپریالیسم، برده‌داری، و استثمار سایر ملل
  - توسعه آزادی‌های فردی و دموکراسی
explanation: |
  مارکس رشد استثنایی اروپا را به اتحاد پیشرفت فنی و بهره‌برداری از سایر ملل نسبت می‌دهد و تأکید می‌کند که توسعه اقتصادی اروپا از طریق سلطه و تصاحب منابع از دیگر کشورها به دست آمده است.
reviewed: false
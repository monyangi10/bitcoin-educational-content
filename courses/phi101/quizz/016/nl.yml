question: Wat verklaart volgens Marx de uitzonderlijke groei van Europa?
answer: De combinatie van technische vooruitgang en de uitbuiting van andere mensen
wrong_answers:
  - De vooruitgang van technieken en de accumulatie van kapitaal
  - Imperialisme, slavernij en uitbuiting van andere mensen
  - De ontwikkeling van individuele vrijheden en democratie
explanation: |
  Marx schrijft de uitzonderlijke groei van Europa toe aan de alliantie van technische vooruitgang en de uitbuiting van andere volkeren en benadrukt dat de Europese economische ontwikkeling tot stand kwam door de overheersing en toe-eigening van hulpbronnen van andere naties.
reviewed: true
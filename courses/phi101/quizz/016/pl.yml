question: Co według Marksa tłumaczy wyjątkowy rozwój Europy?
answer: Połączenie postępu technicznego i wyzysku innych narodów
wrong_answers:
  - Postęp techniczny i akumulacja kapitału
  - Imperializm, niewolnictwo i wyzysk innych narodów
  - Rozwój indywidualnych wolności i demokracji
explanation: |
  Marks przypisuje wyjątkowy rozwój Europy połączeniu postępu technicznego i wyzysku innych narodów, podkreślając, że europejski rozwój gospodarczy został osiągnięty poprzez dominację i zawłaszczanie zasobów innych narodów.

question: С какво според Маркс се обяснява изключителният растеж на Европа?
answer: Комбинацията от технически прогрес и експлоатация на други хора
wrong_answers:
  - Напредъкът на техниката и натрупването на капитал
  - Империализъм, робство и експлоатация на други народи
  - Развитието на индивидуалните свободи и демокрацията
explanation: |
  Маркс обяснява изключителния растеж на Европа със съюза на техническия прогрес и експлоатацията на други народи, като подчертава, че европейското икономическо развитие е постигнато чрез доминиране и присвояване на ресурси от други народи.
reviewed: true
question: Vad förklarar enligt Marx den exceptionella tillväxten i Europa?
answer: Kombinationen av teknisk utveckling och exploatering av andra människor
wrong_answers:
  - Teknikens utveckling och kapitalackumulation
  - Imperialism, slaveri och exploatering av andra människor
  - Utvecklingen av individuella friheter och demokrati
explanation: |
  Marx tillskriver Europas exceptionella tillväxt alliansen mellan tekniska framsteg och exploatering av andra folk, och betonar att den europeiska ekonomiska utvecklingen uppnåddes genom dominans och tillägnande av resurser från andra nationer.
reviewed: true
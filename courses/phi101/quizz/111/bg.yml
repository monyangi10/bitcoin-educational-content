question: Каква е ролята на парите в икономиката според Кейнс?
answer: Инструмент на икономическата политика
wrong_answers:
  - Просто средство за размяна
  - Спиране на растежа
  - Инструмент за спекулации
explanation: |
  За Кейнс парите служат като лост на икономическата политика, който позволява на правителствата да регулират икономиката, като влияят върху инвестициите, заетостта и общото търсене.
reviewed: true
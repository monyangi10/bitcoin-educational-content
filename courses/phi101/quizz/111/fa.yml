question: به گفته کینز، نقش پول در اقتصاد چیست؟
answer: ابزاری از سیاست اقتصادی
wrong_answers:
  - صرف وسیله‌ای برای Exchange
  - ترمزی بر رشد
  - ابزاری برای حدس و گمان
explanation: |
  برای کینز، پول اهرمی از سیاست اقتصادی است که به دولت‌ها اجازه می‌دهد با تأثیرگذاری بر سرمایه‌گذاری، اشتغال و تقاضای کلی، اقتصاد را تنظیم کنند.
reviewed: false
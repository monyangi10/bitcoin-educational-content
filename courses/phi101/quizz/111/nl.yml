question: Wat is volgens Keynes de rol van geld in de economie?
answer: Een instrument voor economisch beleid
wrong_answers:
  - Een louter middel om Exchange
  - Een rem op de groei
  - Een hulpmiddel voor speculatie
explanation: |
  Voor Keynes dient geld als hefboom voor economisch beleid, waarmee overheden de economie kunnen reguleren door investeringen, werkgelegenheid en de algehele vraag te beïnvloeden.
reviewed: true
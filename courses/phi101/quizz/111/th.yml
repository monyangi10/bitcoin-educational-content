question: ตามที่เคนส์กล่าว บทบาทของเงินในเศรษฐกิจคืออะไร?
answer: เครื่องมือของนโยบายเศรษฐกิจ
wrong_answers:
  - เพียงแค่เครื่องมือในการแลกเปลี่ยน
  - การเบรกการเติบโต
  - เครื่องมือสำหรับการเก็งกำไร
explanation: |
  สำหรับเคนส์ เงินทำหน้าที่เป็นคันโยกของนโยบายเศรษฐกิจ ช่วยให้รัฐบาลสามารถควบคุมเศรษฐกิจได้โดยการมีอิทธิพลต่อการลงทุน การจ้างงาน และอุปสงค์โดยรวม
reviewed: true
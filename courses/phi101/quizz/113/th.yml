question: คำวิจารณ์หลักของฮาเย็คต่อการเงินการคลังแบบเคนส์คืออะไร?
answer: มันสร้างฟองสบู่ทางเศรษฐกิจและภาวะถดถอย
wrong_answers:
  - มันสนับสนุนการลงทุนระยะยาว
  - มันลดความไม่เท่าเทียมกันทางสังคม
  - มันเพิ่มความต้องการภายในประเทศอย่างไม่สามารถควบคุมได้
explanation: |
  ฮาเย็ควิจารณ์นโยบายการเงินแบบเคนส์โดยกล่าวว่ามันส่งเสริมวงจรการลงทุนเกินจริงอย่างไม่เป็นธรรมชาติ นำไปสู่ฟองสบู่ทางเศรษฐกิจ และในที่สุดก็เกิดภาวะถดถอยเมื่อฟองสบู่เหล่านี้แตก
reviewed: true
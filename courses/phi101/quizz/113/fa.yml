question: انتقاد اصلی هایک از سیاست پولی کینزی چیست؟
answer: این باعث ایجاد حباب‌های اقتصادی و رکود می‌شود
wrong_answers:
  - این به سرمایه‌گذاری بلندمدت ترجیح می‌دهد
  - این نابرابری‌های اجتماعی را کاهش می‌دهد
  - این به طور غیرقابل کنترلی تقاضای داخلی را افزایش می‌دهد.
explanation: |
  هایک سیاست پولی کینزی را مورد انتقاد قرار داد و اظهار داشت که این سیاست باعث تشویق چرخه‌های سرمایه‌گذاری بیش از حد مصنوعی می‌شود که منجر به حباب‌های اقتصادی و در نهایت به رکود اقتصادی می‌شود زمانی که این حباب‌ها می‌ترکند.
reviewed: false
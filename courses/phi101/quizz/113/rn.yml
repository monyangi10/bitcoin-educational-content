question: Ni igiki Hayek anegura cane politike y’amahera ya Keynes?
answer: Bituma ubutunzi butera imbere n'ugusubira inyuma kw'ubutunzi .
wrong_answers:
  - Irashigikira ishoramari ry'igihe kirekire
  - Bigabanya ubusumbane mu kibano .
  - Birongera ubusabe bwo mu gihugu ataco bushobora gukora .
explanation: |
  Hayek yaraneguye politike y’amahera ya Keynes mu kuvuga ko iremesha inzinguzingu z’ishoramari ryinshi ry’ubuhinga, bikajana mu bihuha vy’ubutunzi, kandi, ata kabuza, bikajana mu gusubira inyuma kw’ubutunzi iyo ivyo bihuha bituritse.
reviewed: true
question: Каква е основната критика на Хайек към кейнсианската парична политика?
answer: Създава икономически балони и рецесии
wrong_answers:
  - Тя благоприятства дългосрочните инвестиции
  - Намалява социалното неравенство
  - Увеличава неконтролируемо вътрешното търсене
explanation: |
  Хайек критикува кейнсианската парична политика, заявявайки, че тя насърчава изкуствени цикли на свръхинвестиране, което води до икономически балони и неизбежно до рецесии, когато тези балони се спукат.
reviewed: true
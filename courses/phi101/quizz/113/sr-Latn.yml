question: Koja je glavna kritika Hajeka na račun kejnzijanske monetarne politike?
answer: Stvara ekonomske balone i recesije
wrong_answers:
  - Ovo favorizuje dugoročna ulaganja
  - Smanjuje društvene nejednakosti
  - To nekontrolisano povećava domaću potražnju
explanation: |
  Hayek je kritikovao kejzijansku monetarnu politiku tvrdeći da ona podstiče veštačke cikluse prekomernih investicija, što dovodi do ekonomskih balona i, neizbežno, do recesija kada ti baloni puknu.

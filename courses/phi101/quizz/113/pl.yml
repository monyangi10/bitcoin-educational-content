question: Jaki jest główny zarzut Hayeka wobec keynesowskiej polityki monetarnej?
answer: Tworzy bańki gospodarcze i recesje
wrong_answers:
  - Sprzyja inwestycjom długoterminowym
  - Zmniejsza nierówności społeczne
  - W niekontrolowany sposób zwiększa popyt krajowy
explanation: |
  Hayek krytykował keynesowską politykę monetarną, twierdząc, że zachęca ona do sztucznych cykli przeinwestowania, co prowadzi do baniek gospodarczych i nieuchronnie do recesji, gdy te bańki pękają.
reviewed: false
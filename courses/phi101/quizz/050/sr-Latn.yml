question: Koja je glavna karakteristika teološko-političkog sistema koji je dominirao srednjovekovnim društvima?
answer: Politička moć i verska moć bile su usko povezane, a politički vođa je bio i verski vođa.
wrong_answers:
  - Razdvajanje vlasti između Crkve i Države bilo je jasno definisano i poštovano.
  - Verska tolerancija je bila široko praktikovana, a verske manjine su uživale ista prava kao i većina.
  - Svi ostali odgovori su tačni.
explanation: |
  U srednjovekovnim društvima, teološko-politički sistem je bio karakterisan snažnim preplitanjem političke i verske moći, pri čemu su lideri često bili obdareni duhovnim autoritetom pored svoje svetovne vlasti.

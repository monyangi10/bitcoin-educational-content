question: Vilken är den viktigaste egenskapen hos det teologisk-politiska system som dominerade medeltida samhällen?
answer: Politisk makt och religiös makt var nära sammanflätade, och den politiska ledaren var också en religiös ledare.
wrong_answers:
  - Maktfördelningen mellan kyrkan och staten var tydligt definierad och respekterades.
  - Religiös tolerans tillämpades i stor utsträckning och religiösa minoriteter åtnjöt samma rättigheter som majoriteten.
  - Alla andra svar är korrekta.
explanation: |
  I medeltida samhällen kännetecknades det teologisk-politiska systemet av en stark sammanflätning av politisk och religiös makt, där ledare ofta hade andlig auktoritet utöver sin världsliga makt.
reviewed: true
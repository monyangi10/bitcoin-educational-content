question: Каква е основната характеристика на теологично-политическата система, която доминира в средновековните общества?
answer: Политическата и религиозната власт били тясно свързани, а политическият лидер бил и религиозен водач.
wrong_answers:
  - Разделението на властите между Църквата и държавата е ясно определено и се спазва.
  - Религиозната толерантност е широко разпространена, а религиозните малцинства се ползват със същите права като мнозинството.
  - Всички други отговори са верни.
explanation: |
  В средновековните общества богословско-политическата система се характеризира със силно преплитане на политическата и религиозната власт, като лидерите често са надарени с духовна власт в допълнение към светската си власт.
reviewed: true
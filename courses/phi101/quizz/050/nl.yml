question: Wat is het belangrijkste kenmerk van het theologisch-politieke systeem dat middeleeuwse samenlevingen domineerde?
answer: Politieke macht en religieuze macht waren nauw met elkaar verweven en de politieke leider was ook een religieus leider.
wrong_answers:
  - De scheiding der machten tussen de Kerk en de Staat werd duidelijk gedefinieerd en gerespecteerd.
  - Religieuze tolerantie was wijdverspreid en religieuze minderheden genoten dezelfde rechten als de meerderheid.
  - Alle andere antwoorden zijn juist.
explanation: |
  In middeleeuwse samenlevingen werd het theologisch-politieke systeem gekenmerkt door een sterke verweving van politieke en religieuze macht, waarbij leiders vaak spiritueel gezag hadden naast hun wereldlijke macht.
reviewed: true
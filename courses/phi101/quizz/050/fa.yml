question: ویژگی اصلی سیستم الهی-سیاسی که بر جوامع قرون وسطی حاکم بود چیست؟
answer: قدرت سیاسی و قدرت مذهبی به‌طور نزدیکی به هم پیوسته بودند و رهبر سیاسی نیز رهبر مذهبی بود.
wrong_answers:
  - جدایی قدرت‌ها بین کلیسا و دولت به وضوح تعریف و محترم شمرده شد.
  - تحمل دینی به طور گسترده‌ای رعایت می‌شد و اقلیت‌های دینی از همان حقوقی برخوردار بودند که اکثریت داشتند.
  - همه پاسخ‌های دیگر صحیح هستند.
explanation: |
  در جوامع قرون وسطی، سیستم الهی-سیاسی با درهم‌تنیدگی قوی قدرت سیاسی و مذهبی مشخص می‌شد، به‌طوری‌که رهبران اغلب علاوه بر قدرت دنیوی خود، دارای اقتدار معنوی نیز بودند.
reviewed: false
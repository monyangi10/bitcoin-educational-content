question: ลักษณะสำคัญของระบบเทววิทยา-การเมืองที่ครอบงำสังคมยุคกลางคืออะไร?
answer: อำนาจทางการเมืองและอำนาจทางศาสนาเชื่อมโยงกันอย่างใกล้ชิด และผู้นำทางการเมืองก็เป็นผู้นำทางศาสนาด้วย
wrong_answers:
  - การแยกอำนาจระหว่างศาสนจักรและรัฐถูกกำหนดไว้อย่างชัดเจนและได้รับการเคารพ
  - มีการปฏิบัติความอดทนทางศาสนาอย่างกว้างขวาง และชนกลุ่มน้อยทางศาสนาได้รับสิทธิเท่าเทียมกับคนส่วนใหญ่
  - คำตอบอื่น ๆ ทั้งหมดถูกต้อง
explanation: |
  ในสังคมยุคกลาง ระบบเทววิทยา-การเมืองมีลักษณะเด่นคือการผสมผสานอย่างแน่นแฟ้นระหว่างอำนาจทางการเมืองและศาสนา โดยผู้นำมักได้รับอำนาจทางจิตวิญญาณควบคู่ไปกับอำนาจทางโลกของพวกเขา
reviewed: true
question: 중세 사회를 지배했던 신학-정치 체제의 주요 특징은 무엇인가요?
answer: 정치 권력과 종교 권력은 밀접하게 얽혀 있었고, 정치 지도자는 종교 지도자이기도 했습니다.
wrong_answers:
  - 교회와 국가 간의 권력 분립은 명확하게 정의되고 존중되었습니다.
  - 종교적 관용이 널리 실천되었고, 종교적 소수자들도 다수와 동일한 권리를 누렸습니다.
  - 다른 모든 답은 정답입니다.
explanation: |
  중세 사회에서 신학-정치 체제는 정치와 종교 권력이 강하게 결합된 것이 특징이었으며, 지도자는 현세적 권력에 더해 영적 권위를 부여받는 경우가 많았습니다.
reviewed: true
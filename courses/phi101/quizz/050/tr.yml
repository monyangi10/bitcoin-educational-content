question: Ortaçağ toplumlarına hakim olan teolojik-politik sistemin temel özelliği nedir?
answer: Siyasi güç ve dini güç iç içe geçmişti ve siyasi lider aynı zamanda dini liderdi.
wrong_answers:
  - Kilise ve Devlet arasındaki güçler ayrılığı açıkça tanımlanmış ve buna saygı gösterilmiştir.
  - Dini hoşgörü yaygın olarak uygulanmış ve dini azınlıklar çoğunluk ile aynı haklara sahip olmuştur.
  - Diğer tüm cevaplar doğrudur.
explanation: |
  Ortaçağ toplumlarında teolojik-politik sistem, siyasi ve dini gücün güçlü bir şekilde iç içe geçmesiyle karakterize edilmiş ve liderler genellikle zamansal güçlerine ek olarak ruhani yetkiyle donatılmışlardır.
reviewed: true
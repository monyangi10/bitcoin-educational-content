question: Jaka jest główna cecha systemu teologiczno-politycznego, który dominował w średniowiecznych społeczeństwach?
answer: Władza polityczna i religijna były ze sobą ściśle powiązane, a przywódca polityczny był również przywódcą religijnym.
wrong_answers:
  - Rozdział władzy między Kościołem a państwem był jasno określony i przestrzegany.
  - Tolerancja religijna była powszechnie praktykowana, a mniejszości religijne cieszyły się takimi samymi prawami jak większość.
  - Wszystkie pozostałe odpowiedzi są poprawne.
explanation: |
  W średniowiecznych społeczeństwach system teologiczno-polityczny charakteryzował się silnym przenikaniem się władzy politycznej i religijnej, a przywódcy często byli obdarzani władzą duchową oprócz władzy doczesnej.
reviewed: false
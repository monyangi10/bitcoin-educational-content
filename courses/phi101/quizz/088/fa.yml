question: رابطه بین آزادی سیاسی و آزادی اقتصادی از نظر کنستانت چیست؟
answer: دو آزادی به یکدیگر وابسته‌اند.
wrong_answers:
  - آزادی سیاسی پیش‌نیاز ضروری برای آزادی اقتصادی است.
  - آزادی اقتصادی پیش‌نیاز ضروری برای آزادی سیاسی است.
  - این دو آزادی با یکدیگر ناسازگار هستند.
explanation: |
  برای بنجامین کنستانت، آزادی سیاسی و آزادی اقتصادی به‌طور نزدیکی به هم مرتبط هستند، زیرا خودمختاری فردی به همان اندازه که به توانایی مشارکت در امور عمومی وابسته است، به آزادی انجام فعالیت‌های اقتصادی بدون مانع نیز بستگی دارد.
reviewed: false
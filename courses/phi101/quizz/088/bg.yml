question: Каква е връзката между политическата и икономическата свобода според Констант?
answer: Двете свободи са взаимозависими.
wrong_answers:
  - Политическата свобода е необходима предпоставка за икономическа свобода.
  - Икономическата свобода е необходима предпоставка за политическата свобода.
  - Двете свободи са несъвместими една с друга.
explanation: |
  За Бенджамин Констант политическата и икономическата свобода са тясно свързани, тъй като индивидуалната автономия зависи както от възможността да се участва в обществените дела, така и от свободата да се извършват безпрепятствено икономически дейности.
reviewed: true
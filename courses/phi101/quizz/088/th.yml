question: ความสัมพันธ์ระหว่างเสรีภาพทางการเมืองและเสรีภาพทางเศรษฐกิจตามที่ Constant กล่าวคืออะไร?
answer: เสรีภาพทั้งสองมีความพึ่งพาอาศัยกันและกัน
wrong_answers:
  - เสรีภาพทางการเมืองเป็นเงื่อนไขเบื้องต้นที่จำเป็นสำหรับเสรีภาพทางเศรษฐกิจ
  - เสรีภาพทางเศรษฐกิจเป็นเงื่อนไขที่จำเป็นสำหรับเสรีภาพทางการเมือง
  - เสรีภาพทั้งสองไม่สามารถเข้ากันได้
explanation: |
  สำหรับ Benjamin Constant เสรีภาพทางการเมืองและเสรีภาพทางเศรษฐกิจมีความเชื่อมโยงกันอย่างใกล้ชิด เนื่องจากอิสรภาพของบุคคลขึ้นอยู่กับความสามารถในการมีส่วนร่วมในกิจการสาธารณะพอๆ กับเสรีภาพในการดำเนินกิจกรรมทางเศรษฐกิจโดยไม่มีอุปสรรค
reviewed: true
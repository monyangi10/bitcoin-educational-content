question: ความแตกต่างระหว่างกฎหมายธรรมชาติและกฎหมายเชิงบวกตามความคิดของโรมันคืออะไร?
answer: กฎธรรมชาตินั้นเป็นสากลและไม่เปลี่ยนแปลง ในขณะที่กฎหมายเชิงบวกนั้นเปลี่ยนแปลงได้และขึ้นอยู่กับกฎหมายของมนุษย์
wrong_answers:
  - กฎธรรมชาติคือกฎของผู้มีอำนาจ ในขณะที่กฎหมายเชิงบวกคือกฎหมายของผู้ที่อ่อนแอ
  - กฎธรรมชาติมีพื้นฐานมาจากศาสนา ในขณะที่กฎหมายเชิงบวกมีพื้นฐานมาจากเหตุผล
  - กฎหมายธรรมชาติใช้บังคับเฉพาะกับพลเมืองโรมัน ในขณะที่กฎหมายเชิงบวกใช้บังคับกับผู้อยู่อาศัยทั้งหมดของจักรวรรดิ
explanation: |
  ในความคิดของชาวโรมัน กฎธรรมชาติถือว่าเป็นสากลและไม่สามารถเปลี่ยนแปลงได้ เนื่องจากมีต้นกำเนิดจากหลักการที่ไม่เปลี่ยนแปลง ในทางตรงกันข้าม กฎหมายเชิงบวกหมายถึงชุดของกฎที่มนุษย์สร้างขึ้นและสามารถเปลี่ยนแปลงได้ตามบริบททางสังคมและการเมือง
reviewed: true
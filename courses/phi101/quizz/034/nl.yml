question: Wat is het verschil tussen natuurrecht en positief recht volgens het Romeinse denken?
answer: De natuurwet is universeel en onveranderlijk, terwijl de positieve wet veranderlijk is en afhankelijk van menselijke wetten.
wrong_answers:
  - De natuurwet is de wet van de machtigen, terwijl de positieve wet de wet van de zwakken is.
  - Natuurrecht is gebaseerd op religie, terwijl positief recht gebaseerd is op rede.
  - De natuurwet geldt alleen voor Romeinse burgers, terwijl de positieve wet geldt voor alle inwoners van het Rijk.
explanation: |
  In het Romeinse denken wordt natuurrecht beschouwd als universeel en onveranderlijk, voortkomend uit onveranderlijke principes. Positief recht daarentegen verwijst naar een reeks regels die door mensen zijn opgesteld en die onderhevig zijn aan verandering in overeenstemming met sociale en politieke contexten.
reviewed: true
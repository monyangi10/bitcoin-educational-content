question: تفاوت بین قانون طبیعی و قانون مثبت طبق اندیشه رومی چیست؟
answer: قانون طبیعی جهانی و تغییرناپذیر است، در حالی که قانون مثبت متغیر است و به قوانین انسانی بستگی دارد.
wrong_answers:
  - قانون طبیعی قانون قدرتمندان است در حالی که قانون مثبت قانون ضعیفان است.
  - قانون طبیعی بر اساس دین است در حالی که قانون مثبت بر اساس عقل است.
  - قانون طبیعی فقط برای شهروندان رومی اعمال می‌شود در حالی که قانون مثبت برای همه ساکنان امپراتوری اعمال می‌شود.
explanation: |
  در تفکر رومی، قانون طبیعی به عنوان جهانی و تغییرناپذیر در نظر گرفته می‌شود که از اصول ثابت ناشی می‌شود، در حالی که قانون مثبت مجموعه‌ای از قواعد است که توسط انسان‌ها وضع شده و بر اساس زمینه‌های اجتماعی و سیاسی قابل تغییر است.
reviewed: false
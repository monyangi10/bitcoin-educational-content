question: Каква е разликата между естественото и позитивното право според римската мисъл?
answer: Естественото право е универсално и неизменно, докато позитивното право е променливо и зависи от човешките закони.
wrong_answers:
  - Естественото право е правото на силните, а позитивното право е правото на слабите.
  - Естественото право се основава на религията, докато позитивното право се основава на разума.
  - Естественото право се прилага само за римските граждани, докато позитивното право се прилага за всички жители на империята.
explanation: |
  В римската мисъл естественото право се смята за универсално и непроменимо, произтичащо от неизменни принципи. За разлика от него позитивното право се отнася до набор от правила, установени от хората и подлежащи на промяна в съответствие със социалния и политическия контекст.
reviewed: true
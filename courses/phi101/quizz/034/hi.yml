question: रोमन विचारधारा के अनुसार प्राकृतिक कानून (natural law) और सकारात्मक कानून (positive law) में क्या अंतर है?
answer: प्राकृतिक कानून सार्वभौमिक और अपरिवर्तनीय है, जबकि सकारात्मक कानून परिवर्तनशील है और मानव निर्मित कानूनों पर निर्भर करता है।
wrong_answers:
  - प्राकृतिक कानून ताकतवरों का कानून है जबकि सकारात्मक कानून कमजोरों का कानून है।
  - प्राकृतिक कानून धर्म पर आधारित होता है जबकि सकारात्मक कानून तर्क पर आधारित होता है।
  - स्वाभाविक कानून सिर्फ रोमन नागरिकों पर लागू होता है, जबकि सकारात्मक कानून साम्राज्य के सभी निवासियों पर लागू होता है।
explanation: |
  रोमन विचारधारा में, नैसर्गिक कानून (natural law) को सार्वभौमिक और अपरिवर्तनीय माना जाता है, जो अटल सिद्धांतों से निकलता है, जबकि सकारात्मक कानून (positive law) इंसानों द्वारा बनाए गए नियमों का एक समूह है जो सामाजिक और राजनीतिक हालात के मुताबिक बदल सकता है।
reviewed: false
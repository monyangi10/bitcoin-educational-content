question: ग्रीक पोलिस क्या है?
answer: बाज़ार
wrong_answers:
  - प्रकृति का नियम
  - इंसानी क़ानून
  - देवताओं को समर्पित मंदिर
explanation: |
  ग्रीक पोलिस का मतलब है शहर-राज्य, यानी एक राजनीतिक और सामाजिक संगठन जहाँ नागरिक सार्वजनिक जीवन में हिस्सा लेते हैं और सामूहिक फैसलों में शामिल होते हैं। यह प्राचीन ग्रीस में लोकतंत्र और नागरिकता का ढाँचा था।
reviewed: false
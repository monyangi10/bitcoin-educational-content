question: Какво представлява гръцкият полис?
answer: Пазарът
wrong_answers:
  - Законът на природата
  - Човешко право
  - Храмът е посветен на боговете
explanation: |
  Гръцкият полис се отнася до града-държава - политическа и социална организация, в която гражданите участват в обществения живот и взимат колективни решения. Тя представлява рамката на демокрацията и гражданството в Древна Гърция.
reviewed: true
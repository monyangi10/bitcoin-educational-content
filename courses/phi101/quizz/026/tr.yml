question: Yunan polisi nedir?
answer: Şehir devleti
wrong_answers:
  - Doğanın kanunu
  - İnsan hukuku
  - Tapınak tanrılara adanmıştır
explanation: |
  Yunan polisi, vatandaşların kamusal yaşama katıldığı ve kolektif kararlarda yer aldığı siyasi ve sosyal bir organizasyon olan şehir devletini ifade eder. Antik Yunan'da demokrasi ve vatandaşlığın çerçevesini oluşturur.
reviewed: true

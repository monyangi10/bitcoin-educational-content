question: polis ya Ugiriki ni nini?
answer: Sokoni
wrong_answers:
  - Sheria ya asili
  - Sheria ya binadamu
  - Hekalu lililowekwa wakfu kwa miungu
explanation: |
  polis ya Ugiriki inarejelea jimbo la jiji, shirika la kisiasa na kijamii ambapo raia hushiriki katika maisha ya umma na kushiriki katika maamuzi ya pamoja. Inajumuisha mfumo wa demokrasia na uraia katika Ugiriki ya kale.

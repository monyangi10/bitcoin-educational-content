question: None polis y’Abagiriki ni iki?
answer: Igisagara-gihugu
wrong_answers:
  - Itegeko ry'ibidukikije
  - Itegeko rya muntu
  - Urusengero rwerejwe imana .
explanation: |
  Iryo jambo ry’ikigiriki ryitwa polis ryerekeza ku gisagara-gihugu, ni ukuvuga ishirahamwe ry’ivya politike n’imibano aho abanyagihugu bagira uruhara mu buzima bwa bose kandi bagafata ingingo rusangi. Ni co gishingira intahe demokarasi n’ubwenegihugu mu Bugiriki bwa kera.
reviewed: true

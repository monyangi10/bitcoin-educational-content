question: پولیس یونانی چیست؟
answer: بازار
wrong_answers:
  - قانون طبیعت
  - قانون بشر
  - معبدی که به خدایان اختصاص داده شده است
explanation: |
  پولیس یونانی به شهر-دولت اشاره دارد، یک سازمان سیاسی و اجتماعی که در آن شهروندان در زندگی عمومی شرکت می‌کنند و در تصمیم‌گیری‌های جمعی نقش دارند. این چارچوب دموکراسی و شهروندی در یونان باستان را تشکیل می‌دهد.

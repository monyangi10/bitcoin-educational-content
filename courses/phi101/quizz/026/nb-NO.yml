question: Hva er den greske polis?
answer: Bystaten
wrong_answers:
  - Naturens lov
  - Menneskelov
  - Tempelet dedikert til gudene
explanation: |
  Den greske polis refererer til bystaten, en politisk og sosial organisasjon hvor borgere deltar i offentlig liv og tar del i kollektive beslutninger. Den utgjør rammeverket for demokrati og statsborgerskap i antikkens Hellas.

question: โพลิสกรีกคืออะไร?
answer: นครรัฐ
wrong_answers:
  - กฎของธรรมชาติ
  - กฎหมายมนุษย์
  - วัดนี้อุทิศให้กับเทพเจ้า
explanation: |
  นครรัฐกรีกหมายถึงนครรัฐ ซึ่งเป็นองค์กรทางการเมืองและสังคมที่ประชาชนมีส่วนร่วมในชีวิตสาธารณะและมีส่วนร่วมในการตัดสินใจร่วมกัน มันเป็นกรอบของประชาธิปไตยและความเป็นพลเมืองในกรีกโบราณ
reviewed: true

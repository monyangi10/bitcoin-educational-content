question: बाइबिल का सूद (ब्याज) पर उधार देने के प्रति क्या रवैया था?
answer: यह मना था।
wrong_answers:
  - इसने इसे प्रोत्साहित किया।
  - कुछ मामलों में इसने इसे बर्दाश्त कर लिया।
  - इस मामले पर इसकी कोई राय नहीं थी।
explanation: |
  बाइबल ब्याज पर उधार देने से मना करती है, खासकर पुराने नियम में, जहां समुदाय के सदस्यों के बीच ब्याज के साथ उधार देना अनैतिक और एकजुटता के मूल्यों के खिलाफ माना जाता है।

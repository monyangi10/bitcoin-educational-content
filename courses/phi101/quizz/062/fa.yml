question: نگرش کتاب مقدس نسبت به وام دادن با بهره چه بود؟
answer: ممنوع بود.
wrong_answers:
  - این را تشویق کرد.
  - در برخی موارد آن را تحمل کرد.
  - در این مورد نظری نداشت.
explanation: |
  کتاب مقدس قرض دادن با بهره را ممنوع می‌کند، به ویژه در عهد عتیق، جایی که قرض دادن با بهره در میان اعضای جامعه به عنوان غیراخلاقی و مخالف با ارزش‌های همبستگی تلقی می‌شود.
reviewed: false
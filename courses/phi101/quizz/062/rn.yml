question: None Bibiliya yari ifise inyifato iyihe ku bijanye no kuguriza umuntu ku nyungu?
answer: Vyari bibujijwe.
wrong_answers:
  - Rwararemesheje.
  - Rwaravyihanganira mu bihe bimwebimwe.
  - Nta ciyumviro cari gifise ku bijanye n’ico kibazo.
explanation: |
  Bibiliya irabuza gutanga inguzanyo ku nyungu, cane cane mw’Isezerano rya Kera, aho kugurana inyungu mu banyagihugu bibonwa ko ari ubusambanyi kandi biteye kubiri n’agaciro k’ubumwe.
reviewed: true
question: Hoe stond de Bijbel tegenover lenen tegen rente?
answer: Het was verboden.
wrong_answers:
  - Het moedigde het aan.
  - Het tolereerde het in sommige gevallen.
  - Het had geen mening over de zaak.
explanation: |
  De Bijbel verbiedt het lenen tegen rente, vooral in het Oude Testament, waar het lenen met rente tussen leden van de gemeenschap wordt gezien als immoreel en in strijd met de waarden van solidariteit.
reviewed: true
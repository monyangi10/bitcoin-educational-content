question: Какво е отношението на Библията към отпускането на заеми срещу лихва?
answer: Беше забранено.
wrong_answers:
  - Тя го насърчава.
  - В някои случаи тя го толерира.
  - Тя нямаше мнение по въпроса.
explanation: |
  Библията забранява отпускането на заеми с лихва, особено в Стария завет, където отпускането на заеми с лихва между членовете на общността се счита за неморално и противоречи на ценностите на солидарността.
reviewed: true
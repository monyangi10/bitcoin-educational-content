question: ทัศนคติของพระคัมภีร์ต่อการให้กู้ยืมเงินโดยคิดดอกเบี้ยเป็นอย่างไร?
answer: มันเป็นสิ่งต้องห้าม
wrong_answers:
  - มันสนับสนุนมัน
  - มันยอมรับได้ในบางกรณี
  - มันไม่มีความคิดเห็นในเรื่องนี้
explanation: |
  พระคัมภีร์ห้ามการให้กู้ยืมโดยคิดดอกเบี้ย โดยเฉพาะในพันธสัญญาเดิมที่การให้กู้ยืมโดยคิดดอกเบี้ยในหมู่สมาชิกชุมชนถูกมองว่าเป็นสิ่งผิดศีลธรรมและขัดต่อค่านิยมของความเป็นน้ำหนึ่งใจเดียวกัน
reviewed: true
question: Ni upi ukosoaji mkuu wa uchambuzi wa Marx?
answer: Yote ya hapo juu
wrong_answers:
  - Marx haizingatii jukumu la taasisi za kisiasa katika historia
  - Marx anakadiria umuhimu wa uvumbuzi na maendeleo ya kiufundi
  - Marx ana mtazamo potofu wa asili ya faida na unyonyaji
explanation: |
  Wakosoaji wa uchambuzi wa Marx wanaangazia mambo kadhaa, kama vile kutozingatia kwake taasisi za kisiasa, kutothamini kwake uvumbuzi na maendeleo ya kiufundi, na uelewa unaopingana wa faida na unyonyaji, na kupendekeza mtazamo rahisi zaidi wa mienendo ya kiuchumi.

question: Koja je glavna kritika Marksove analize?
answer: Sve navedeno
wrong_answers:
  - Marks ne uzima u obzir ulogu političkih institucija u istoriji
  - Marks potcenjuje značaj inovacija i tehničkog napretka
  - Marks ima pogrešan pogled na prirodu profita i eksploatacije
explanation: |
  Kritičari Marksove analize ističu nekoliko tačaka, kao što su njegovo zanemarivanje političkih institucija, potcenjivanje inovacija i tehničkog napretka, i osporavano razumevanje profita i eksploatacije, sugerišući previše pojednostavljen pogled na ekonomske dinamike.

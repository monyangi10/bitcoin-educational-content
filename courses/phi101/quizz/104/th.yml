question: ทำไมชาวออสเตรียถึงอ้างว่าสังคมนิยมไม่สามารถบรรลุได้?
answer: พวกเขายืนยันว่าสังคมนิยมไม่มีประสิทธิภาพทางเศรษฐกิจแต่มีความยุติธรรมทางศีลธรรม
wrong_answers:
  - สังคมนิยมขัดต่อธรรมชาติ
  - สังคมนิยมมีประสิทธิภาพทางเศรษฐกิจแต่ไร้ศีลธรรม
  - ชาวออสเตรียวิจารณ์สังคมนิยมเพราะไม่เปิดโอกาสให้เกิดนวัตกรรมและการสร้างความมั่งคั่ง
explanation: |
  นักเศรษฐศาสตร์จากสำนักออสเตรียมองว่าสังคมนิยมไม่มีประสิทธิภาพทางเศรษฐกิจเนื่องจากขาดกลไกราคาที่เสรี ซึ่งจำเป็นต่อการประสานงานทางเศรษฐกิจอย่างมีประสิทธิภาพ แม้ว่าบางครั้งพวกเขาจะยอมรับเจตนาทางศีลธรรมของมันก็ตาม
reviewed: true
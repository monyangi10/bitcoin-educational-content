question: 오스트리아 사람들은 왜 사회주의 실현이 불가능하다고 주장할까요?
answer: 그들은 사회주의가 경제적으로는 비효율적이지만 도덕적으로는 정의롭다고 주장합니다.
wrong_answers:
  - 사회주의는 자연에 반하는 것입니다.
  - 사회주의는 경제적으로 효율적이지만 비도덕적입니다.
  - 오스트리아 사람들은 사회주의가 혁신과 부의 창출을 허용하지 않는다는 이유로 사회주의를 비판합니다.
explanation: |
  오스트리아 학파의 경제학자들은 사회주의의 도덕적 의도는 인정하지만, 경제를 효과적으로 조정하는 데 필요한 자유 가격 메커니즘이 없기 때문에 경제적으로 비효율적이라고 생각합니다.
reviewed: true
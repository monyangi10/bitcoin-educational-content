question: Kwa nini Waaustria wanadai kwamba ujamaa hauwezekani kupatikana?
answer: Wanadai kuwa ujamaa hauna tija kiuchumi bali ni wa haki kimaadili.
wrong_answers:
  - Ujamaa ni kinyume na maumbile.
  - Ujamaa una ufanisi wa kiuchumi lakini hauna maadili.
  - Waaustria wanaukosoa ujamaa kwa sababu hauruhusu uvumbuzi na uzalishaji mali.
explanation: |
  Wanauchumi kutoka shule ya Austria wanaona ujamaa kuwa usiofaa kiuchumi kwa sababu ya kukosekana kwa mifumo ya bei ya bure, muhimu ili kuratibu uchumi ipasavyo, ingawa wakati mwingine wanakubali nia yake ya maadili.
question: ऑस्ट्रियाई लोग क्यों कहते हैं कि समाजवाद हासिल करना असंभव है?
answer: वे कहते हैं कि समाजवाद आर्थिक रूप से अक्षम है लेकिन नैतिक रूप से न्यायसंगत है।
wrong_answers:
  - समाजवाद प्रकृति के खिलाफ है।
  - समाजवाद आर्थिक रूप से कुशल है लेकिन अनैतिक है।
  - ऑस्ट्रियाई लोग समाजवाद की आलोचना करते हैं क्योंकि यह नवाचार और धन निर्माण की अनुमति नहीं देता।
explanation: |
  ऑस्ट्रियन स्कूल के अर्थशास्त्री समाजवाद को आर्थिक रूप से अक्षम मानते हैं क्योंकि इसमें मुक्त मूल्य तंत्र का अभाव होता है, जो अर्थव्यवस्था को प्रभावी ढंग से संचालित करने के लिए जरूरी है, हालांकि वे कभी-कभी इसके नैतिक इरादों को स्वीकार करते हैं।
question: چرا اتریشی‌ها ادعا می‌کنند که سوسیالیسم غیرقابل دستیابی است؟
answer: آن‌ها ادعا می‌کنند که سوسیالیسم از نظر اقتصادی ناکارآمد اما از نظر اخلاقی عادلانه است.
wrong_answers:
  - سوسیالیسم برخلاف طبیعت است.
  - سوسیالیسم از نظر اقتصادی کارآمد است اما غیراخلاقی.
  - اتریشی‌ها از سوسیالیسم انتقاد می‌کنند زیرا اجازه نوآوری و ایجاد ثروت را نمی‌دهد.
explanation: |
  اقتصاددانان مکتب اتریشی، سوسیالیسم را به دلیل نبود مکانیسم‌های قیمت آزاد که برای هماهنگی مؤثر اقتصاد ضروری هستند، از نظر اقتصادی ناکارآمد می‌دانند، حتی اگر گاهی به نیت‌های اخلاقی آن اذعان کنند.
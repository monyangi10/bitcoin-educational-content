question: Защо австрийците твърдят, че социализмът е невъзможен за постигане?
answer: Те твърдят, че социализмът е икономически неефективен, но морално справедлив.
wrong_answers:
  - Социализмът е в противоречие с природата.
  - Социализмът е икономически ефективен, но неморален.
  - Австрийците критикуват социализма, защото той не позволява иновации и създаване на богатство.
explanation: |
  Икономистите от австрийската школа смятат, че социализмът е икономически неефективен поради отсъствието на свободни ценови механизми, необходими за ефективното координиране на икономиката, въпреки че понякога признават моралните му намерения.
reviewed: true
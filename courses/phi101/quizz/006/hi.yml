question: बस्तियात के अनुसार उत्पीड़न का स्रोत क्या है?
answer: ताकत की प्यास
wrong_answers:
  - इंसान की असली बुरी फितरत
  - बिजली का ग़ायब होना
  - आर्थिक असमानताएँ
explanation: |
  बस्तियाँ सत्ता की प्यास को उत्पीड़न का मूल स्रोत बताते हैं, उनका तर्क है कि जो लोग सत्ता में होते हैं वो अक्सर उसे बढ़ाने और दूसरों को नियंत्रित करने की कोशिश करते हैं, जिससे अधिकारों का हनन और दुरुपयोग होता है।

question: Wat is volgens Bastiat de bron van onderdrukking?
answer: De zucht naar macht
wrong_answers:
  - De inherent slechte aard van mensen
  - De afwezigheid van macht
  - Economische ongelijkheden
explanation: |
  Bastiat identificeert de zucht naar macht als de fundamentele bron van onderdrukking, door te stellen dat mensen met macht vaak proberen deze macht uit te breiden en anderen te controleren, wat leidt tot misbruik en schending van individuele rechten.
reviewed: true
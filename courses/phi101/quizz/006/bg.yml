question: Какъв е източникът на потисничеството според Бастиа?
answer: Жаждата за власт
wrong_answers:
  - Изконно злата природа на хората
  - Отсъствието на власт
  - Икономически неравенства
explanation: |
  Бастиа определя жаждата за власт като основен източник на потисничество, като твърди, че тези, които притежават власт, често се стремят да я разширят и да контролират другите, което води до злоупотреби и нарушения на индивидуалните права.
reviewed: true
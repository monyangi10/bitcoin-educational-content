question: منبع ستم از نظر بستیات چیست؟
answer: تشنگی برای قدرت
wrong_answers:
  - ماهیت ذاتاً شرور انسان‌ها
  - عدم قدرت
  - نابرابری‌های اقتصادی
explanation: |
  باستیا تشنگی برای قدرت را به عنوان منبع اساسی ستم شناسایی می‌کند و استدلال می‌کند که کسانی که قدرت را در دست دارند اغلب به دنبال گسترش آن و کنترل دیگران هستند که منجر به سوءاستفاده‌ها و نقض حقوق فردی می‌شود.
reviewed: false
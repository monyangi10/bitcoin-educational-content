question: แหล่งที่มาของการกดขี่ตามที่บาสเตียตกล่าวคืออะไร?
answer: ความกระหายอำนาจ
wrong_answers:
  - ธรรมชาติที่ชั่วร้ายโดยเนื้อแท้ของมนุษย์
  - การขาดอำนาจ
  - ความไม่เท่าเทียมทางเศรษฐกิจ
explanation: |
  บาสเตียตระบุว่าความกระหายอำนาจเป็นแหล่งที่มาพื้นฐานของการกดขี่ โดยโต้แย้งว่าผู้ที่ถือครองอำนาจมักจะพยายามขยายอำนาจและควบคุมผู้อื่น ซึ่งนำไปสู่การละเมิดและการฝ่าฝืนสิทธิส่วนบุคคล
reviewed: true
question: Nini chanzo cha ukandamizaji kwa mujibu wa Bastiat?
answer: Kiu ya madaraka
wrong_answers:
  - Asili mbaya ya asili ya wanadamu
  - Kutokuwepo kwa nguvu
  - Ukosefu wa usawa wa kiuchumi
explanation: |
  Bastiat anabainisha kiu ya madaraka kama chanzo cha msingi cha ukandamizaji, akisema kwamba wale walio na mamlaka mara nyingi hutafuta kupanua na kudhibiti wengine, na kusababisha unyanyasaji na ukiukwaji wa haki za mtu binafsi.

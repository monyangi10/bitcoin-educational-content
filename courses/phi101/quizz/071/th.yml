question: อะไรคือคำขวัญของกลุ่มฟิสิโอแครต?
answer: ปล่อยให้ทำ ปล่อยให้ผ่าน
wrong_answers:
  - รัฐเป็นทั้งนายธนาคาร พ่อค้า และผู้ให้บริการในเวลาเดียวกัน
  - ฝรั่งเศสสามารถร่ำรวยได้ก็ต่อเมื่ออังกฤษและฮอลแลนด์ล่มสลายเท่านั้น
  - เศรษฐศาสตร์การเมือง ตามที่สรุปโดย Dupont de Nemours คือวิทยาศาสตร์ของกฎธรรมชาติที่ประยุกต์ใช้กับสังคมที่เจริญแล้ว
explanation: |
  คำขวัญ "Laissez-faire, laissez passer" ของกลุ่มฟิสิโอแครตแสดงถึงความเชื่อของพวกเขาว่าเศรษฐกิจจะเจริญรุ่งเรืองเมื่อปราศจากการแทรกแซงจากรัฐ ปล่อยให้พลังธรรมชาติของตลาดสมดุลอย่างอิสระ
reviewed: true
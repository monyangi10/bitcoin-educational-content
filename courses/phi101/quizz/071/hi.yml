question: फिजियोक्रेट्स का नारा क्या है?
answer: लेसे-फेयर, लेसे पासे।
wrong_answers:
  - राज्य एक साथ बैंकर, व्यापारी और प्रदाता है।
  - फ्रांस तभी अमीर बन सकता है जब इंग्लैंड और हॉलैंड का बर्बाद हो जाए।
  - डुपोंट डी नेमूर के अनुसार राजनीतिक अर्थव्यवस्था, सभ्य समाजों पर लागू प्राकृतिक नियमों का विज्ञान है।
explanation: |
  फिजियोक्रेट्स का नारा "लेसे-फेयर, लेसे पासे" उनके इस विश्वास को दर्शाता है कि अर्थव्यवस्था तब फलती-फूलती है जब इसे सरकारी हस्तक्षेप से मुक्त रखा जाता है, जिससे बाजार की प्राकृतिक ताकतें खुलकर संतुलन बना सकें।

question: شعار فیزیوکرات‌ها چیست؟
answer: لِسِه‌فِر، لِسِه پاسِر.
wrong_answers:
  - دولت همزمان بانکدار، تاجر و تأمین‌کننده است.
  - فرانسه تنها از طریق نابودی انگلستان و هلند می‌تواند ثروتمند شود.
  - اقتصاد سیاسی به‌طور خلاصه توسط دوپونت دو نمور علم قانون طبیعی است که به جوامع متمدن اعمال می‌شود.
explanation: |
  شعار Laissez-faire, laissez passer از فیزیوکرات‌ها بیانگر این باور است که اقتصاد زمانی شکوفا می‌شود که از مداخلات دولتی آزاد باشد و به نیروهای طبیعی بازار اجازه دهد آزادانه به تعادل برسند.
reviewed: false
question: None icivugo c’abafiziyokarate ni ikihe?
answer: Laissez-faire, uburenganzira bwo guca.
wrong_answers:
  - Leta ni icarimwe umukozi wa banki, umucuruzi, n’uwutanga ivyo akeneye.
  - Ubufaransa bushobora gutunga gusa biciye mu gusenyuka kw’Ubwongereza n’Ubuholandi.
  - Ubutunzi bwa politike, nk’uko bwavuzwe mu ncamake na Dupont de Nemours, ni ubuhinga bw’amategeko kavukire bukoreshwa mu mibano iteye imbere.
explanation: |
  Icivugo c'abafiziyokarate citwa "Laissez-faire, laissez passer" kigaragaza iciyumviro cabo c'uko ubutunzi butera imbere iyo butagira ubufasha bwa Leta, bigatuma inguvu z'isoko zishobora gufatanya ataco zitwaye.
reviewed: true
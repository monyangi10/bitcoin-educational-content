question: Какъв е девизът на физиократите?
answer: Laissez-faire, laissez passer.
wrong_answers:
  - Държавата е едновременно банкер, търговец и доставчик.
  - Франция може да забогатее само чрез разоряването на Англия и Холандия.
  - Политическата икономия, обобщена от Дюпон дьо Немур, е наука за естественото право, прилагана в цивилизованите общества.
explanation: |
  Девизът "Laissez-faire, laissez passer" на физиократите изразява убеждението им, че икономиката процъфтява, когато е свободна от държавна намеса и позволява на естествените сили на пазара да балансират свободно.
reviewed: true
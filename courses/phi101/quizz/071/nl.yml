question: Wat is het motto van de Fysiocraten?
answer: Laissez-faire, laissez passer.
wrong_answers:
  - De staat is tegelijkertijd bankier, handelaar en leverancier.
  - Frankrijk kan alleen rijk worden door Engeland en Nederland te ruïneren.
  - Politieke economie, zoals samengevat door Dupont de Nemours, is de wetenschap van de natuurwet toegepast op beschaafde samenlevingen.
explanation: |
  Het motto "Laissez-faire, laissez passer" van de Fysiocraten drukt hun geloof uit dat de economie floreert als deze vrij is van staatsinterventie, zodat de natuurlijke krachten van de markt vrij kunnen balanceren.
reviewed: true
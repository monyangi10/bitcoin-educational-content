question: Ni nini kauli mbiu ya Wanafizikia?
answer: Laissez-faire, mpita njia.
wrong_answers:
  - Jimbo ni benki, mfanyabiashara na mtoaji.
  - Ufaransa inaweza tu kuwa tajiri kupitia uharibifu wa Uingereza na Uholanzi.
  - Uchumi wa kisiasa kama ulivyofupishwa na Dupont de Nemours ni sayansi ya sheria asilia inayotumika kwa jamii zilizostaarabika.
explanation: |
  Kauli mbiu ya Laissez-faire, laissez mpita wa Physiocrats inaeleza imani yao kwamba uchumi unastawi unapokuwa huru kutokana na uingiliaji kati wa serikali, kuruhusu nguvu za asili za soko kusawazisha kwa uhuru.

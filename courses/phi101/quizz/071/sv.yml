question: Vad är fysiokraternas motto?
answer: Laissez-faire, laissez passer.
wrong_answers:
  - Staten är på en och samma gång bankir, handlare och leverantör.
  - Frankrike kan bara bli rikt genom att England och Holland ruineras.
  - Politisk ekonomi, som sammanfattas av Dupont de Nemours, är vetenskapen om naturlagar tillämpad på civiliserade samhällen.
explanation: |
  Fysiokraternas motto "Laissez-faire, laissez passer" uttrycker deras övertygelse om att ekonomin blomstrar när den är fri från statliga ingripanden, vilket gör att marknadens naturliga krafter kan balansera fritt.
reviewed: true
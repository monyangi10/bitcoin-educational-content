question: เป้าหมายหลักของผู้สนับสนุนการกลับไปใช้ระบบการเงินที่อิงกับโลหะมีค่าคืออะไร?
answer: เพื่อจำกัดอำนาจของธนาคารกลาง
wrong_answers:
  - เพิ่มอัตราเงินเฟ้อ
  - ส่งเสริมการค้าระหว่างประเทศ
  - ควบคุมตลาดการเงิน
explanation: |
  ผู้สนับสนุนระบบที่อิงตามโลหะมีค่า มุ่งหวังที่จะจำกัดอำนาจของธนาคารกลางโดยการจำกัดความสามารถในการสร้างเงินโดยไม่มีทุนสำรองที่จับต้องได้ ซึ่งจะลดความเสี่ยงของเงินเฟ้อและการบิดเบือนทางการเงิน
reviewed: true
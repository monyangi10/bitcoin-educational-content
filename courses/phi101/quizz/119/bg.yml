question: Каква е основната цел на привържениците на връщането към парична система, основана на благородни метали?
answer: Ограничаване на правомощията на централните банки
wrong_answers:
  - Увеличаване на инфлацията
  - Насърчаване на международната търговия
  - Контрол на финансовите пазари
explanation: |
  Привържениците на система, основана на благороден метал, целят да ограничат властта на централните банки, като ограничат възможността да създават пари без материален резерв, което намалява рисковете от инфлация и парични манипулации.
reviewed: true
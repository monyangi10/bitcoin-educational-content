question: Wat is het belangrijkste doel van de voorstanders van een terugkeer naar een op edelmetaal gebaseerd monetair systeem?
answer: De macht van centrale banken beperken
wrong_answers:
  - Inflatie verhogen
  - Internationale handel bevorderen
  - Financiële markten controleren
explanation: |
  Voorstanders van een systeem gebaseerd op een edelmetaal willen de macht van centrale banken beperken door de mogelijkheid te beperken om geld te creëren zonder een tastbare reserve, wat de risico's van inflatie en monetaire manipulatie vermindert.
reviewed: true
question: Jaki jest główny cel zwolenników powrotu do systemu monetarnego opartego na metalach szlachetnych?
answer: Ograniczenie władzy banków centralnych
wrong_answers:
  - Wzrost inflacji
  - Promowanie handlu międzynarodowego
  - Kontrola rynków finansowych
explanation: |
  Zwolennicy systemu opartego na metalach szlachetnych dążą do ograniczenia władzy banków centralnych poprzez ograniczenie możliwości tworzenia pieniędzy bez materialnej rezerwy, co zmniejsza ryzyko inflacji i manipulacji monetarnych.
reviewed: false
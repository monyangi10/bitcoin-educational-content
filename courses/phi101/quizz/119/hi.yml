question: सोने-चांदी जैसी कीमती धातुओं पर आधारित मौद्रिक प्रणाली की वापसी के पक्षधरों का मुख्य लक्ष्य क्या है?
answer: केंद्रीय बैंकों की शक्ति को सीमित करने के लिए
wrong_answers:
  - महँगाई बढ़ाओ
  - अंतरराष्ट्रीय व्यापार को बढ़ावा दें
  - वित्तीय बाज़ारों को नियंत्रित करें
explanation: |
  एक कीमती धातु पर आधारित प्रणाली के समर्थक केंद्रीय बैंकों की शक्ति को सीमित करना चाहते हैं, ताकि बिना ठोस भंडार के पैसा बनाने की क्षमता पर रोक लग सके। इससे मुद्रास्फीति और मौद्रिक हेरफेर के जोखिम कम होते हैं।
reviewed: false
question: Koji je glavni cilj zagovornika povratka na monetarni sistem zasnovan na plemenitim metalima?
answer: Da se ograniči moć centralnih banaka
wrong_answers:
  - Povećanje inflacije
  - Promovi međunarodnu trgovinu
  - Kontroliši finansijska tržišta
explanation: |
  Zagovornici sistema zasnovanog na plemenitom metalu teže da ograniče moć centralnih banaka ograničavanjem sposobnosti kreiranja novca bez opipljive rezerve, što smanjuje rizike od inflacije i monetarne manipulacije.

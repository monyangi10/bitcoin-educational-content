question: Vad är det huvudsakliga målet för dem som förespråkar en återgång till ett ädelmetallbaserat monetärt system?
answer: Att begränsa centralbankernas makt
wrong_answers:
  - Öka inflationen
  - Främja internationell handel
  - Kontrollera finansmarknaderna
explanation: |
  Förespråkarna för ett system baserat på en ädelmetall vill begränsa centralbankernas makt genom att begränsa möjligheten att skapa pengar utan en konkret reserv, vilket minskar riskerna för inflation och penningmanipulation.
reviewed: true
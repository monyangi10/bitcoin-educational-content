question: هدف اصلی طرفداران بازگشت به سیستم پولی مبتنی بر فلزات گران‌بها چیست؟
answer: برای محدود کردن قدرت بانک‌های مرکزی
wrong_answers:
  - افزایش تورم
  - ترویج تجارت بین‌المللی
  - کنترل بازارهای مالی
explanation: |
  طرفداران یک سیستم مبتنی بر فلزات گرانبها هدفشان محدود کردن قدرت بانک‌های مرکزی از طریق محدود کردن توانایی ایجاد پول بدون ذخیره ملموس است، که خطرات تورم و دستکاری پولی را کاهش می‌دهد.
reviewed: false
question: Jakie były konsekwencje kryzysu gospodarczego i głodu we Francji pod koniec 1791 roku?
answer: Wywołały one falę zamieszek i powstań.
wrong_answers:
  - Doprowadziły one do przyjęcia pieniądza papierowego.
  - Doprowadzili Zgromadzenie do konfiskaty własności Kościoła.
  - Wszystkie powyższe odpowiedzi są prawidłowe.
explanation: |
  Kryzys gospodarczy i głód w 1791 r. pogłębiły niezadowolenie społeczne, powodując zamieszki i powstania w odpowiedzi na rosnące trudności, oznaczając wzrost napięcia społecznego we Francji.

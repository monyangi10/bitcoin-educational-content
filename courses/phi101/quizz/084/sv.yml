question: Vad blev följderna av den ekonomiska krisen och hungersnöden i Frankrike i slutet av 1791?
answer: De utlöste en våg av kravaller och uppror.
wrong_answers:
  - De ledde till att papperspengar började användas.
  - De fick församlingen att konfiskera kyrkans egendom.
  - Alla ovanstående svar är korrekta.
explanation: |
  Den ekonomiska krisen och hungersnöden 1791 förvärrade det folkliga missnöjet, vilket ledde till upplopp och uppror som svar på de ökande svårigheterna och markerade en ökning av de sociala spänningarna i Frankrike.
reviewed: true
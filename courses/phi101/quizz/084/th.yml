question: ผลที่ตามมาของวิกฤตเศรษฐกิจและความอดอยากในฝรั่งเศสในช่วงปลายปี 1791 คืออะไร?
answer: พวกเขาก่อให้เกิดคลื่นของการจลาจลและการลุกฮือ
wrong_answers:
  - พวกเขานำไปสู่การนำเงินกระดาษมาใช้
  - พวกเขานำสมัชชาไปยึดทรัพย์สินของคริสตจักร
  - คำตอบทั้งหมดข้างต้นถูกต้อง
explanation: |
  วิกฤตเศรษฐกิจและความอดอยากในปี 1791 ทำให้ความไม่พอใจของประชาชนเพิ่มขึ้น นำไปสู่การจลาจลและการลุกฮือเพื่อตอบสนองต่อความยากลำบากที่เพิ่มขึ้น และเป็นจุดเริ่มต้นของความตึงเครียดทางสังคมที่เพิ่มขึ้นในฝรั่งเศส
reviewed: true
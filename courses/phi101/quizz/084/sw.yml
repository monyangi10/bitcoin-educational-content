question: Ni nini matokeo ya mzozo wa kiuchumi na njaa nchini Ufaransa mwishoni mwa 1791?
answer: Walianzisha wimbi la ghasia na ghasia.
wrong_answers:
  - Walisababisha kupitishwa kwa pesa za karatasi.
  - Waliongoza Bunge kutaifisha mali ya Kanisa.
  - Majibu yote hapo juu ni sahihi.
explanation: |
  Mgogoro wa kiuchumi na njaa ya 1791 ulizidisha kutoridhika kwa watu wengi, na kusababisha ghasia na machafuko katika kukabiliana na ugumu wa kuongezeka, kuashiria kuongezeka kwa mvutano wa kijamii nchini Ufaransa.

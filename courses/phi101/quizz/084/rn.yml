question: Ni ingaruka izihe z’ingorane z’ubutunzi n’inzara vyabaye mu Bufaransa mu mpera z’umwaka wa 1791?
answer: Zatumye haba umupfunda w’imigumuko n’imigumuko.
wrong_answers:
  - Vyatumye abantu bemera amahera y’impapuro.
  - Barongoye Ishengero mu gufata ivy’Ekleziya.
  - Inyishu zose zivugwa haruguru ni ukuri.
explanation: |
  Ivyago vy’ubutunzi n’inzara vyo mu 1791 vyatumye abantu barushiriza kudashima, bituma haba imigumuko n’imigumuko kubera ingorane zariko ziragwira, kandi bituma haba uguhuzagurika mu kibano mu Bufaransa.
reviewed: true
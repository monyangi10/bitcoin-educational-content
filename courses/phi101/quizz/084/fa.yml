question: پیامدهای بحران اقتصادی و قحطی در فرانسه در پایان سال 1791 چه بود؟
answer: آنها موجی از شورش‌ها و قیام‌ها را برانگیختند.
wrong_answers:
  - آنها به پذیرش پول کاغذی منجر شدند.
  - آنها مجمع را به مصادره اموال کلیسا هدایت کردند.
  - همه پاسخ‌های فوق صحیح هستند.
explanation: |
  بحران اقتصادی و قحطی سال 1791 نارضایتی عمومی را تشدید کرد و باعث شورش‌ها و قیام‌هایی در واکنش به سختی‌های فزاینده شد و افزایش تنش‌های اجتماعی در فرانسه را نشان داد.
reviewed: false
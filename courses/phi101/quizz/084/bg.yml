question: Какви са последиците от икономическата криза и глада във Франция в края на 1791 г.?
answer: Те предизвикват вълна от бунтове и въстания.
wrong_answers:
  - Те доведоха до приемането на книжни пари.
  - Те карат Асамблеята да конфискува имуществото на Църквата.
  - Всички отговори по-горе са верни.
explanation: |
  Икономическата криза и гладът през 1791 г. изострят народното недоволство, което води до бунтове и въстания в отговор на нарастващите трудности и бележи ръст на социалното напрежение във Франция.
reviewed: true
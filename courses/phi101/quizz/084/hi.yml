question: 1791 के अंत में फ्रांस में आर्थिक संकट और अकाल के परिणाम क्या थे?
answer: उन्होंने दंगों और विद्रोहों की लहर शुरू कर दी।
wrong_answers:
  - उन्होंने कागजी मुद्रा को अपनाने का मार्ग प्रशस्त किया।
  - उन्होंने सभा का नेतृत्व कर चर्च की संपत्ति जब्त कर ली।
  - उपरोक्त सभी उत्तर सही हैं।
explanation: |
  1791 के आर्थिक संकट और अकाल ने लोकप्रिय असंतोष को और बढ़ा दिया, जिससे बढ़ती कठिनाइयों के कारण दंगे और विद्रोह हुए, जिससे फ्रांस में सामाजिक तनाव में वृद्धि हुई।
reviewed: false
question: 1791'in sonunda Fransa'da yaşanan ekonomik kriz ve kıtlığın sonuçları neler oldu?
answer: Bir isyan ve ayaklanma dalgasını tetiklediler.
wrong_answers:
  - Kağıt paranın kabul edilmesine yol açtılar.
  - Meclis'i Kilise'nin mallarına el koymaya yönelttiler.
  - Yukarıdaki cevapların hepsi doğrudur.
explanation: |
  1791'deki ekonomik kriz ve kıtlık, halkın hoşnutsuzluğunu daha da arttırarak, artan zorluklara tepki olarak isyanlara ve ayaklanmalara yol açtı ve Fransa'daki sosyal gerilimin yükselişine işaret etti.
reviewed: true
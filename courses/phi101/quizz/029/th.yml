question: ใครคือปรัชญาแรกที่พยายามทำความเข้าใจธรรมชาติผ่านเหตุผล?
answer: นักปรัชญาก่อนโสกราตีส
wrong_answers:
  - นักบวชชาวกรีก
  - กวีชาวกรีก
  - นักคณิตศาสตร์ชาวกรีก
explanation: |
  นักปรัชญาก่อนโสกราตีสเป็นกลุ่มแรกที่ใช้เหตุผลในการทำความเข้าใจธรรมชาติ โดยค้นหาหลักการที่มีเหตุผลและเป็นสากลเพื่ออธิบายโลก โดยไม่พึ่งพาคำอธิบายเชิงตำนาน
reviewed: true
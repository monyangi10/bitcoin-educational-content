question: Ni bande ba filozofe ba mbere barondeye gutahura ibidukikije biciye ku vyiyumviro?
answer: Abanyabwenge b'imbere ya Socrate
wrong_answers:
  - Abaherezi b’Abagiriki .
  - Abanyamivugo b'Abagiriki .
  - Abahinga mu vy'imibare b'Abagiriki .
explanation: |
  Abanyabwenge ba mbere ya Socrate ni bo ba mbere bakoresheje impamvu kugira ngo batahure kamere, barondera ingingo ngenderwako zishingiye ku vyiyumviro kandi zijanye n’isi yose kugira ngo basigure isi, ataco bafatiye ku nsobanuro z’imigani.
reviewed: true
question: نخستین فیلسوفانی که تلاش کردند طبیعت را از طریق عقل درک کنند چه کسانی بودند؟
answer: فلاسفه پیشاسقراطی
wrong_answers:
  - کشیش‌های یونانی
  - شاعران یونانی
  - ریاضیدانان یونانی
explanation: |
  فیلسوفان پیشاسقراطی اولین کسانی بودند که از عقل برای درک طبیعت استفاده کردند و به دنبال اصول عقلانی و جهانی برای توضیح جهان، به طور مستقل از توضیحات اسطوره‌ای بودند.
reviewed: false
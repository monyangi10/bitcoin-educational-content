question: Ni akina nani walikuwa wanafalsafa wa kwanza kutafuta kuelewa asili kupitia akili?
answer: Wanafalsafa wa Pre-Socratic
wrong_answers:
  - Makuhani wa Kigiriki
  - Washairi wa Kigiriki
  - Wanahisabati wa Kigiriki
explanation: |
  Wanafalsafa wa Pre-Socratic walikuwa wa kwanza kutumia sababu kujaribu kuelewa asili, wakitafuta kanuni za kimantiki na za kiulimwengu kuelezea ulimwengu, bila kutegemea maelezo ya kizushi.
reviewed: false
question: ใครเป็นผู้เสนอแนวคิดการแข่งขันระหว่างสกุลเงินเอกชน?
answer: ฟรีดริช ฮาเย็ค
wrong_answers:
  - จอห์น เมย์นาร์ด เคนส์
  - ฌาคส์ รูเอฟ
  - Satoshi นากาโมโตะ
explanation: |
  ฟรีดริช ฮาเย็ค เสนอแนวคิดการแข่งขันระหว่างสกุลเงินเอกชนเพื่อลดอิทธิพลของรัฐบาลต่อสกุลเงินและส่งเสริมเสถียรภาพทางการเงินที่อิงตามตลาดแทนนโยบายแบบรวมศูนย์
reviewed: true
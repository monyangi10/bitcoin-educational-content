question: چه کسی ایده رقابت بین ارزهای خصوصی را پیشنهاد داد؟
answer: فریدریش هایک
wrong_answers:
  - جان مینارد کینز
  - ژاک روف
  - Satoshi ناکاموتو
explanation: |
  فریدریش هایک ایده رقابت میان ارزهای خصوصی را پیشنهاد داد تا تأثیر دولت‌ها بر ارز را کاهش دهد و ثبات پولی را بر اساس بازار به جای سیاست‌های متمرکز تشویق کند.
reviewed: false
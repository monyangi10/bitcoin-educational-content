question: Кой предлага идеята за конкуренция между частните валути?
answer: Фридрих Хайек
wrong_answers:
  - Джон Мейнард Кейнс
  - Жак Руеф
  - Satoshi Nakamoto
explanation: |
  Фридрих Хайек предлага идеята за конкуренция между частните валути, за да се намали влиянието на правителствата върху валутата и да се насърчи паричната стабилност, основана на пазара, а не на централизирани политики.
reviewed: true
question: เมืองพ่อค้าของอิตาลีที่ Henri Pirenne ถือว่าเป็นแหล่งกำเนิดของทุนนิยมที่เกิดขึ้นใหม่คือเมืองใด?
answer: เวนิส
wrong_answers:
  - เจนัว
  - ฟลอเรนซ์
  - ทั้งหมดที่กล่าวมา
explanation: |
  อองรี ปิแรนน์ พิจารณาว่าเวนิสเป็นแหล่งกำเนิดของระบบทุนนิยมเนื่องจากบทบาทสำคัญในด้านการค้าทางทะเลและการพัฒนาวิธีการทางการค้าที่ก้าวหน้าในช่วงแรก เช่น การเป็นหุ้นส่วนและเครดิต
reviewed: true
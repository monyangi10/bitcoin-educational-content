question: شهر ونیز در ایتالیا شهری است که آنری پیرن آن را به عنوان گهواره سرمایه‌داری نوظهور می‌داند.
answer: ونیز.
wrong_answers:
  - جنوا.
  - فلورانس.
  - همه موارد فوق.
explanation: |
  هانری پیرن ونیز را به دلیل نقش مرکزی‌اش در تجارت دریایی و توسعه زودهنگام روش‌های پیشرفته تجاری، مانند مشارکت‌ها و اعتبار، گهواره‌ای برای سرمایه‌داری می‌داند.
reviewed: false
question: Wat is de Italiaanse handelsstad die Henri Pirenne beschouwt als de bakermat van het opkomende kapitalisme?
answer: Venetië.
wrong_answers:
  - Genua.
  - Florence.
  - Al het bovenstaande.
explanation: |
  Henri Pirenne beschouwt Venetië als de bakermat van het kapitalisme vanwege de centrale rol in de zeehandel en de vroege ontwikkeling van geavanceerde handelspraktijken, zoals partnerschappen en krediet.
reviewed: true
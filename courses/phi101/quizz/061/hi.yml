question: वो कौन सा इटैलियन व्यापारिक शहर है जिसे हेनरी पिरेन उभरते पूंजीवाद का पालना मानते हैं?
answer: वेनिस।
wrong_answers:
  - जेनोआ।
  - फ्लोरेंस।
  - ऊपर लिखे सभी।
explanation: |
  हेनरी पिरेन वेनिस को पूंजीवाद का जनक मानते हैं क्योंकि इसने समुद्री व्यापार में अहम भूमिका निभाई और साझेदारी तथा क्रेडिट जैसी उन्नत वाणिज्यिक प्रथाओं को जल्दी विकसित किया।
reviewed: false
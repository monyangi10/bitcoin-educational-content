question: Koja je italijanska trgovačka luka koju Henri Piren smatra kolevkom kapitalizma u nastajanju?
answer: Venecija.
wrong_answers:
  - Đenova.
  - Firenca.
  - Sve navedeno.
explanation: |
  Henri Pirenne smatra Veneciju kolevkom kapitalizma zbog njene centralne uloge u pomorskoj trgovini i ranog razvoja naprednih komercijalnih praksi, kao što su partnerstva i kredit.

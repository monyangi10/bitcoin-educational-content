question: Ni igisagara ikihe c’ubudandaji c’Ubutaliyano Henri Pirenne abona ko ari co kibanza c’ubu kapitalizimu buriko burakura?
answer: Venise.
wrong_answers:
  - Genova.
  - Firensiya.
  - Ivyo vyose bivugwa haruguru.
explanation: |
  Henri Pirenne abona ko Venise ari ikibanza c’ubu kapitalizimu kubera uruhara ruhambaye ifise mu bucuruzi bwo mu kiyaga be n’ugutera imbere kwayo kwa kera kw’imigenzo y’ubudandaji iteye imbere, nk’ubufatanye n’inguzanyo.
reviewed: true
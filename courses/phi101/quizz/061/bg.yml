question: Кой е италианският търговски град, който Анри Пирен смята за люлка на зараждащия се капитализъм?
answer: Венеция.
wrong_answers:
  - Генуа.
  - Флоренция.
  - Всичко изброено по-горе.
explanation: |
  Анри Пирен смята Венеция за люлка на капитализма поради централната ѝ роля в морската търговия и ранното развитие на напреднали търговски практики, като партньорство и кредит.
reviewed: true
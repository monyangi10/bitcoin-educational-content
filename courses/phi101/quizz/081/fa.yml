question: اهداف اصلی دولت از نظر لاک چه بودند؟
answer: برای حفاظت از زندگی، آزادی و دارایی افراد.
wrong_answers:
  - اجرای قانون و حفظ نظم.
  - برای ارتقاء رفاه عمومی و عدالت اجتماعی.
  - برای دفاع از دین و ارزش‌های اخلاقی.
explanation: |
  برای لاک، مأموریت اصلی دولت تضمین امنیت حقوق طبیعی، به‌ویژه زندگی، آزادی و مالکیت است تا به افراد اجازه دهد در صلح زندگی کنند و پیشرفت کنند.
reviewed: false
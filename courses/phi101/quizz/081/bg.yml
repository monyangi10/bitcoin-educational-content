question: Какви са основните цели на държавата според Лок?
answer: Да защитава живота, свободата и собствеността на хората.
wrong_answers:
  - Да прилага закона и да поддържа реда.
  - Да насърчава общото благосъстояние и социалната справедливост.
  - Да защитава религията и моралните ценности.
explanation: |
  За Лок основната мисия на държавата е да гарантира сигурността на естествените права, особено на живота, свободата и собствеността, за да могат хората да живеят в мир и просперитет.
reviewed: true
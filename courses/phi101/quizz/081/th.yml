question: วัตถุประสงค์หลักของรัฐตามที่ล็อคคืออะไร?
answer: เพื่อปกป้องชีวิต เสรีภาพ และทรัพย์สินของบุคคล
wrong_answers:
  - บังคับใช้กฎหมายและรักษาความสงบเรียบร้อย
  - เพื่อส่งเสริมสวัสดิการส่วนรวมและความยุติธรรมทางสังคม
  - เพื่อปกป้องศาสนาและค่านิยมทางศีลธรรม
explanation: |
  สำหรับล็อค ภารกิจหลักของรัฐคือการประกันความปลอดภัยของสิทธิตามธรรมชาติ โดยเฉพาะชีวิต เสรีภาพ และทรัพย์สิน เพื่อให้บุคคลสามารถดำรงชีวิตอย่างสงบสุขและเจริญรุ่งเรือง
reviewed: true
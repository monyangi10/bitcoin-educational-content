question: Koji su bili glavni ciljevi države prema Locke-u?
answer: Da zaštiti život, slobodu i imovinu pojedinaca.
wrong_answers:
  - Da sprovodi zakon i održava red.
  - Da promoviše opšte blagostanje i socijalnu pravdu.
  - Da brani religiju i moralne vrednosti.
explanation: |
  Za Loka, primarna misija države je da osigura bezbednost prirodnih prava, posebno života, slobode i imovine, kako bi omogućila pojedincima da žive u miru i napreduju.
reviewed: false
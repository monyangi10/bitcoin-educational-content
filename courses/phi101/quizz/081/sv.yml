question: Vilka var de viktigaste målen för staten enligt Locke?
answer: Att skydda individers liv, frihet och egendom.
wrong_answers:
  - För att upprätthålla lag och ordning.
  - Att främja den allmänna välfärden och social rättvisa.
  - Att försvara religion och moraliska värderingar.
explanation: |
  Enligt Locke är statens främsta uppgift att säkerställa de naturliga rättigheterna, i synnerhet liv, frihet och egendom, så att människor kan leva i fred och välstånd.
reviewed: true
question: लॉक के अनुसार राज्य के मुख्य उद्देश्य क्या थे?
answer: व्यक्तियों के जीवन, स्वतंत्रता और संपत्ति की रक्षा करना।
wrong_answers:
  - कानून लागू करना और व्यवस्था बनाए रखना।
  - सामान्य कल्याण और सामाजिक न्याय को बढ़ावा देना।
  - धर्म और नैतिक मूल्यों की रक्षा करना।
explanation: |
  लॉक के अनुसार, राज्य का प्राथमिक मिशन प्राकृतिक अधिकारों, विशेषकर जीवन, स्वतंत्रता और संपत्ति की सुरक्षा सुनिश्चित करना है, ताकि व्यक्ति शांति और समृद्धि से रह सकें।
reviewed: false
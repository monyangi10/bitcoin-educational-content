question: Koja je centralna ideja priče o pljački prema Bastijatu?
answer: Priča je stalna borba između slobode i ugnjetavanja
wrong_answers:
  - Priča je ciklus napretka i propadanja civilizacija
  - Priča je određena ekonomskim faktorima
  - Priča je narativ o nepromenljivoj ljudskoj prirodi.
explanation: |
  Prema Bastijatu, centralna ideja priče o pljački leži u stalnoj borbi između individualne slobode i sila ugnjetavanja, gde se privilegije nekih često ostvaruju na račun prava i sloboda drugih.

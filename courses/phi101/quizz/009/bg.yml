question: Каква е основната идея на историята за грабежа според Бастиа?
answer: Историята е постоянна борба между свободата и потисничеството
wrong_answers:
  - Историята е цикъл на напредък и упадък на цивилизациите
  - Историята се определя от икономически фактори
  - Историята е разказ за неизменната човешка природа
explanation: |
  Според Бастиа централната идея на историята на грабежа се крие в непрекъснатата борба между индивидуалната свобода и силите на потисничеството, при която привилегиите на едни често се получават за сметка на правата и свободите на други.
reviewed: true
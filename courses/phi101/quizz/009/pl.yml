question: Jaka jest główna idea opowieści o grabieży według Bastiata?
answer: Historia jest ciągłą walką między wolnością a uciskiem
wrong_answers:
  - Historia jest cyklem postępu i upadku cywilizacji
  - Historia jest zdeterminowana przez czynniki ekonomiczne
  - Historia jest narracją o niezmiennej ludzkiej naturze
explanation: |
  Według Bastiata centralną ideą opowieści o grabieży jest ciągła walka między indywidualną wolnością a siłami ucisku, w której przywileje niektórych są często uzyskiwane kosztem praw i wolności innych.

question: Vilken är den centrala idén i historien om plundring enligt Bastiat?
answer: Berättelsen är en ständig kamp mellan frihet och förtryck
wrong_answers:
  - Berättelsen är en cykel av framsteg och nedgång för civilisationer
  - Berättelsen bestäms av ekonomiska faktorer
  - Berättelsen är en berättelse om människans oföränderliga natur
explanation: |
  Enligt Bastiat ligger den centrala idén i historien om plundring i den ständiga kampen mellan individuell frihet och förtryckande krafter, där vissa personers privilegier ofta uppnås på bekostnad av andras fri- och rättigheter.
reviewed: true
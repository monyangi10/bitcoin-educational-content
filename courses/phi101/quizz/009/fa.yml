question: ایده مرکزی داستان غارت از نظر بَستیا چیست؟
answer: داستان یک مبارزه مداوم بین آزادی و سرکوب است
wrong_answers:
  - داستان چرخه‌ای از پیشرفت و افول تمدن‌ها است.
  - داستان توسط عوامل اقتصادی تعیین می‌شود
  - داستان روایتی از طبیعت انسانی تغییرناپذیر است.
explanation: |
  به گفته باستیا، ایده مرکزی داستان غارت در مبارزه مداوم بین آزادی فردی و نیروهای سرکوب نهفته است، جایی که امتیازات برخی اغلب به بهای حقوق و آزادی‌های دیگران به دست می‌آید.
reviewed: false
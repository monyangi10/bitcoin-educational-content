question: Wat is het centrale idee van het verhaal van de plundering volgens Bastiat?
answer: Het verhaal is een constante strijd tussen vrijheid en onderdrukking
wrong_answers:
  - Het verhaal is een cyclus van vooruitgang en verval van beschavingen
  - Het verhaal wordt bepaald door economische factoren
  - Het verhaal is een verhaal over de onveranderlijke menselijke natuur
explanation: |
  Volgens Bastiat ligt het centrale idee van het verhaal van de plundering in de voortdurende strijd tussen individuele vrijheid en de krachten van onderdrukking, waarbij de privileges van sommigen vaak worden verkregen ten koste van de rechten en vrijheden van anderen.
reviewed: true
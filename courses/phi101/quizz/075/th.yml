question: ชื่อหนังสือของ Adam Smith คืออะไร?
answer: การสอบสวนธรรมชาติและสาเหตุของความมั่งคั่งของประชาชาติ
wrong_answers:
  - การสอบถามถึงธรรมชาติและจิตวิญญาณแห่งความมั่งคั่งของประชาชาติ
  - การสอบสวนธรรมชาติและต้นกำเนิดของความมั่งคั่งของชาติ
  - การสอบสวนถึงสาเหตุและต้นกำเนิดของความมั่งคั่งของชาติ
explanation: |
  ชื่อเต็มของหนังสือของอดัม สมิธ, An Inquiry into the Nature and Causes of the Wealth of Nations, เน้นย้ำการวิเคราะห์ของเขาเกี่ยวกับปัจจัยที่ส่งเสริมความเจริญรุ่งเรืองทางเศรษฐกิจ โดยตรวจสอบกลไกของการผลิตและการกระจายความมั่งคั่ง
reviewed: true
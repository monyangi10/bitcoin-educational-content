question: عنوان کتاب آدام اسمیت چیست؟
answer: تحقیقی درباره ماهیت و علل ثروت ملل.
wrong_answers:
  - یک تحقیق در مورد ماهیت و روح ثروت ملل.
  - تحقیقی دربارهٔ ماهیت و منشأ ثروت ملل.
  - تحقیقی درباره علت و منشأ ثروت ملل.
explanation: |
  عنوان کامل کتاب آدام اسمیت، تحقیقی درباره ماهیت و علل ثروت ملل، تحلیل او از عوامل مؤثر بر شکوفایی اقتصادی را برجسته می‌کند و به بررسی مکانیسم‌های تولید و توزیع ثروت می‌پردازد.
reviewed: false
question: Ni igiki nyamukuru gituma umuntu yitandukanya n’abandi nk’uko Marx abivuga?
answer: Ukwitandukanya n’abandi mu vy’ubutunzi biva ku gukoreshwa nabi kw’abanyagihugu.
wrong_answers:
  - Ukwitandukanya na politike kubuza abanyagihugu guserura ivyiyumviro vyabo mu mwidegemvyo.
  - Ukwitandukanya n’idini gupfuka ukuri kw’akarenganyo ko mu kibano.
  - Ukwitandukanya n’umuco w’Abanyamerika.
explanation: |
  Nk’uko Marx abivuga, ugutandukana kw’abantu gushingiye ku gutandukana kw’ubutunzi, aho umukozi abuzwa ivyamwa vy’ibikorwa vyiwe mu gihe c’ubu kapitalizimu, bikaba bituma atakaza ububasha n’insobanuro mu buzima bwiwe.
reviewed: true
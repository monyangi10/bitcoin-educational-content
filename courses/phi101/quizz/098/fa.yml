question: منبع اصلی بیگانگی انسان از نظر مارکس چیست؟
answer: از خودبیگانگی اقتصادی ناشی از استثمار سرمایه‌داری.
wrong_answers:
  - بیگانگی سیاسی که مانع از بیان آزادانه شهروندان می‌شود.
  - از خودبیگانگی مذهبی که واقعیت بی‌عدالتی‌های اجتماعی را پنهان می‌کند.
  - بیگانگی از فرهنگ آمریکایی.
explanation: |
  بر اساس نظر مارکس، بیگانگی انسانی ریشه در بیگانگی اقتصادی دارد، جایی که کارگر تحت سرمایه‌داری از ثمرات کار خود محروم می‌شود و این امر منجر به از دست دادن کنترل و معنا در وجودشان می‌شود.

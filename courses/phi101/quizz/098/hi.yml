question: मार्क्स के अनुसार मानव अलगाव का प्राथमिक स्रोत क्या है?
answer: पूंजीवादी शोषण के परिणामस्वरूप आर्थिक अलगाव।
wrong_answers:
  - राजनीतिक अलगाव जो नागरिकों को स्वतंत्र रूप से अपनी बात कहने से रोकता है।
  - धार्मिक अलगाव जो सामाजिक अन्याय की वास्तविकता को छुपाता है।
  - अमेरिकी संस्कृति से अलगाव.
explanation: |
  मार्क्स के अनुसार, मानव अलगाव आर्थिक अलगाव में निहित है, जहां पूंजीवाद के तहत श्रमिक को उसके श्रम के फल से वंचित किया जाता है, जिससे उसके अस्तित्व पर नियंत्रण और अर्थ का नुकसान होता है।

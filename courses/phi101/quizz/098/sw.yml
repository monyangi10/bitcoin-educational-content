question: Ni nini chanzo kikuu cha kutengwa kwa wanadamu kulingana na Marx?
answer: Kutengwa kiuchumi kutokana na unyonyaji wa kibepari.
wrong_answers:
  - Utengano wa kisiasa unaozuia raia kujieleza kwa uhuru.
  - Utengano wa kidini unaofunika ukweli wa dhuluma za kijamii.
  - Kutengwa na tamaduni za Amerika.
explanation: |
  Kulingana na Marx, kutengwa kwa wanadamu kunatokana na kutengwa kwa uchumi, ambapo mfanyakazi ananyimwa matunda ya kazi yake chini ya ubepari, na kusababisha kupoteza udhibiti na maana katika uwepo wao.

question: Wat is de belangrijkste bron van menselijke vervreemding volgens Marx?
answer: Economische vervreemding als gevolg van kapitalistische uitbuiting.
wrong_answers:
  - Politieke vervreemding waardoor burgers zich niet vrij kunnen uiten.
  - Religieuze vervreemding die de realiteit van sociaal onrecht maskeert.
  - Vervreemding van de Amerikaanse cultuur.
explanation: |
  Volgens Marx is menselijke vervreemding geworteld in economische vervreemding, waarbij de arbeider onder het kapitalisme wordt beroofd van de vruchten van zijn arbeid, wat leidt tot een verlies van controle en betekenis in zijn bestaan.
reviewed: true
question: Кой е основният източник на човешкото отчуждение според Маркс?
answer: Икономическо отчуждение в резултат на капиталистическата експлоатация.
wrong_answers:
  - Политическо отчуждение, което пречи на гражданите да се изразяват свободно.
  - Религиозно отчуждение, което прикрива реалността на социалната несправедливост.
  - Отчуждаване от американската култура.
explanation: |
  Според Маркс човешкото отчуждение се корени в икономическото отчуждение, когато работникът е лишен от плодовете на своя труд в условията на капитализма, което води до загуба на контрол и смисъл на неговото съществуване.
reviewed: true
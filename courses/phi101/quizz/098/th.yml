question: แหล่งที่มาหลักของการแปลกแยกของมนุษย์ตามมาร์กซ์คืออะไร?
answer: ความแปลกแยกทางเศรษฐกิจที่เกิดจากการแสวงหาผลประโยชน์แบบทุนนิยม
wrong_answers:
  - ความแปลกแยกทางการเมืองที่ขัดขวางไม่ให้พลเมืองแสดงความคิดเห็นอย่างเสรี
  - การแปลกแยกทางศาสนาที่ปกปิดความเป็นจริงของความอยุติธรรมทางสังคม
  - ความแปลกแยกจากวัฒนธรรมอเมริกัน
explanation: |
  ตามที่มาร์กซ์กล่าวไว้ การแปลกแยกของมนุษย์มีรากฐานมาจากการแปลกแยกทางเศรษฐกิจ ซึ่งคนงานถูกพรากจากผลผลิตของแรงงานของตนภายใต้ระบบทุนนิยม นำไปสู่การสูญเสียการควบคุมและความหมายในชีวิตของพวกเขา
reviewed: true
question: Според Констант кои са областите, в които политическата власт няма влияние?
answer: Всички области, споменати по-горе (религия, наука, индустрия).
wrong_answers:
  - Религия
  - Наука
  - Индустрия
explanation: |
  Констант смята, че политическата власт не трябва да се намесва в области като религията, науката и промишлеността, за да се запази индивидуалната свобода и автономността на човешките дейности, които попадат в частната сфера.
reviewed: true
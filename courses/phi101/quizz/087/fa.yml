question: بر اساس نظر کنستانت، حوزه‌هایی که قدرت سیاسی در آن‌ها تأثیری ندارد کدامند؟
answer: همه حوزه‌های ذکر شده در بالا (دین، علم، صنعت).
wrong_answers:
  - دین
  - علم
  - صنعت
explanation: |
  کنستانت معتقد است که قدرت سیاسی نباید در حوزه‌هایی مانند دین، علم و صنعت مداخله کند تا آزادی فردی و خودمختاری فعالیت‌های انسانی که در حوزه خصوصی قرار می‌گیرند، حفظ شود.
reviewed: false
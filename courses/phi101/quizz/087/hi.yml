question: कॉन्स्टेंट के अनुसार, राजनीतिक सत्ता का किन क्षेत्रों में कोई प्रभाव नहीं होता है?
answer: ऊपर बताए गए सभी क्षेत्र (धर्म, विज्ञान, उद्योग)।
wrong_answers:
  - धर्म
  - विज्ञान
  - उद्योग
explanation: |
  कॉन्स्टेंट का मानना है कि राजनीतिक सत्ता को धर्म, विज्ञान और उद्योग जैसे क्षेत्रों में दखल नहीं देना चाहिए, ताकि व्यक्तिगत स्वतंत्रता और निजी क्षेत्र में आने वाली मानवीय गतिविधियों की स्वायत्तता बनी रहे।
reviewed: false
question: Jaka jest definicja tolerancji według Turgota?
answer: Odmowa użycia przemocy wobec tych, którzy mają inne przekonania niż my sami, przy jednoczesnej obronie własnych przekonań za pomocą rozumu.
wrong_answers:
  - Akceptowanie i zatwierdzanie wszystkich przekonań religijnych, nawet tych uważanych za błędne.
  - Wyrzeczenie się własnych przekonań religijnych, aby żyć w pokoju z innymi.
  - Całkowita obojętność na kwestie religijne i ich wpływ na społeczeństwo.
explanation: |
  Dla Turgota tolerancja polega na niestosowaniu przemocy wobec tych, którzy różnią się w swoich przekonaniach, przy jednoczesnym zachowaniu wolności do racjonalnej obrony własnych przekonań.
reviewed: false
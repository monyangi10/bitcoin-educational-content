question: Какво е определението за толерантност според Турго?
answer: Отказът да се използва насилие срещу онези, които имат различни от твоите убеждения, като същевременно продължаваш да защитаваш собствените си убеждения с помощта на разума.
wrong_answers:
  - Приемане и одобряване на всички религиозни вярвания, дори на тези, които се смятат за погрешни.
  - Отказ от собствените си религиозни убеждения, за да живееш в мир с другите.
  - Пълно безразличие към религиозните въпроси и тяхното въздействие върху обществото.
explanation: |
  За Турго толерантността се състои в това да не се прибягва до насилие срещу тези, които имат различни убеждения, като същевременно се запазва свободата да се защитават рационално собствените убеждения.
reviewed: true
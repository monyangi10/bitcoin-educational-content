question: تعریف تساهل از نظر تورگو چیست؟
answer: امتناع از استفاده از خشونت علیه کسانی که باورهای متفاوتی دارند، در حالی که همچنان از اعتقادات خود از طریق منطق دفاع می‌کنند.
wrong_answers:
  - پذیرش و تأیید همه باورهای مذهبی حتی آنهایی که نادرست تلقی می‌شوند.
  - انکار از اعتقادات دینی خود برای زندگی در صلح با دیگران.
  - بی‌تفاوتی کامل نسبت به مسائل دینی و تأثیر آن‌ها بر جامعه.
explanation: |
  برای تورگو، تساهل شامل عدم توسل به خشونت علیه کسانی است که در باورهایشان متفاوت هستند، در حالی که آزادی دفاع عقلانی از اعتقادات خود را حفظ می‌کند.
reviewed: false
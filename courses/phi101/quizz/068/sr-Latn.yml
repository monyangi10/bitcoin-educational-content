question: Šta je definicija tolerancije prema Turgotu?
answer: Odbijanje upotrebe nasilja protiv onih koji imaju različita uverenja od sopstvenih, uz nastavak odbrane sopstvenih uverenja putem razuma.
wrong_answers:
  - Prihvatanje i odobravanje svih religijskih verovanja čak i onih koja se smatraju pogrešnim.
  - Odricanje od sopstvenih verskih uverenja radi života u miru sa drugima.
  - Potpuna ravnodušnost prema verskim pitanjima i njihovom uticaju na društvo.
explanation: |
  Za Turgota, tolerancija se sastoji u tome da se ne pribegava nasilju protiv onih koji se razlikuju u svojim uverenjima, uz očuvanje slobode da se racionalno brane sopstvena uverenja.

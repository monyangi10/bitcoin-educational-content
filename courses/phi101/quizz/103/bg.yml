question: Каква е австрийската критика на марксистката теория за печалбата?
answer: Печалбата е необходимо възнаграждение за предприемачите, които поемат рискове и инвестират.
wrong_answers:
  - Австрийците твърдят, че печалбата е форма на експлоатация на работниците.
  - Австрийците критикуват теорията на Маркс, защото тя не отчита ролята на заслугите.
  - Марксистката теория за печалбата обслужва интересите на дадена класа.
explanation: |
  За австрийските икономисти печалбата представлява компенсация за предприемачите за поетите рискове и направените инвестиции, в противовес на марксисткия възглед, който я разглежда като експлоатация на работниците.
reviewed: true
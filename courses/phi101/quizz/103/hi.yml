question: ऑस्ट्रियन स्कूल का मार्क्सवादी मुनाफ़ा सिद्धांत पर क्या आपत्ति है?  

(नोट: ऑस्ट्रियन इकोनॉमिक्स के अनुसार, मार्क्स का "शोषण सिद्धांत" ग़लत है क्योंकि पूंजीपति सिर्फ़ मज़दूरों का शोषण नहीं करता, बल्कि वह समय और जोखिम उठाकर पूंजी लगाता है। उनका मानना है कि मुनाफ़ा पूंजी की उत्पादकता और उपभोक्ता की प्राथमिकताओं का नतीजा होता है, न कि श्रम के "अधिशेष मूल्य" का चोरी।)
answer: मुनाफ़ा उद्यमियों के लिए एक ज़रूरी इनाम है जो जोखिम उठाते हैं और निवेश करते हैं।
wrong_answers:
  - ऑस्ट्रियाई लोग कहते हैं कि मुनाफ़ा मज़दूरों के शोषण का एक रूप है।
  - ऑस्ट्रियाई लोग मार्क्स के सिद्धांत की आलोचना करते हैं क्योंकि यह योग्यता की भूमिका को ध्यान में नहीं रखता।
  - मार्क्सवादी मुनाफ़े का सिद्धांत एक वर्ग के हितों की सेवा करता है।
explanation: |
  ऑस्ट्रियाई अर्थशास्त्रियों के लिए, मुनाफा उद्यमियों को उनके द्वारा लिए गए जोखिम और किए गए निवेश का मुआवजा है, जबकि मार्क्सवादी नजरिया इसे मजदूरों के शोषण के रूप में देखता है।
reviewed: false
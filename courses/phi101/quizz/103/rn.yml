question: Ni igiki abanya Otirishiya banegura inyigisho y’aba Marx y’inyungu?
answer: Inyungu ni impembo ikenewe ku bacuruzi bafata ivyago bagashiramwo amahera.
wrong_answers:
  - Abanya Otirishiya bavuga ko inyungu ari uburyo bwo gukoresha nabi abakozi.
  - Abanya Otirishiya baranegura inyigisho ya Marx kubera ko idafata mu muzirikanyi uruhara rw’uburenganzira.
  - Iciyumviro ca Marx c’inyungu gikorera inyungu z’umugwi.
explanation: |
  Ku bahinga b’ubutunzi bo muri Otirishiya, inyungu igereranya indishi abashoramare bahabwa kubera ingorane bafashe n’ishoramari bashizeho, bikaba binyuranye n’ivyiyumviro vy’aba Marxiste, bibona ko ari ugukoresha nabi abakozi.
reviewed: true
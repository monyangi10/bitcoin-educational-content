question: คำวิจารณ์ของออสเตรียเกี่ยวกับทฤษฎีกำไรของมาร์กซิสต์คืออะไร?
answer: กำไรเป็นรางวัลที่จำเป็นสำหรับผู้ประกอบการที่ยอมรับความเสี่ยงและลงทุน
wrong_answers:
  - ชาวออสเตรียโต้แย้งว่ากำไรเป็นรูปแบบหนึ่งของการเอารัดเอาเปรียบแรงงาน
  - ชาวออสเตรียวิจารณ์ทฤษฎีของมาร์กซ์เพราะมันไม่ได้คำนึงถึงบทบาทของความดีความชอบ
  - ทฤษฎีมาร์กซิสต์เกี่ยวกับกำไรให้บริการผลประโยชน์ของชนชั้นหนึ่ง.
explanation: |
  สำหรับนักเศรษฐศาสตร์ออสเตรีย กำไรหมายถึงค่าตอบแทนสำหรับผู้ประกอบการสำหรับความเสี่ยงที่ได้รับและการลงทุนที่ทำไป ซึ่งตรงข้ามกับมุมมองของมาร์กซิสต์ที่มองว่ามันเป็นการเอารัดเอาเปรียบแรงงาน
reviewed: true
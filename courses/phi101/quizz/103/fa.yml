question: انتقاد اتریشی به نظریه مارکسیستی سود چیست؟
answer: سود پاداش ضروری برای کارآفرینانی است که ریسک می‌کنند و سرمایه‌گذاری می‌کنند.
wrong_answers:
  - اتریشی‌ها استدلال می‌کنند که سود شکلی از استثمار کارگران است.
  - اتریشی‌ها نظریه مارکس را به دلیل عدم توجه به نقش شایستگی مورد انتقاد قرار می‌دهند.
  - نظریه مارکسیستی سود به منافع یک طبقه خدمت می‌کند.
explanation: |
  برای اقتصاددانان اتریشی، سود نمایانگر جبران خسارت برای کارآفرینان به خاطر ریسک‌های پذیرفته شده و سرمایه‌گذاری‌های انجام شده است، در مقابل دیدگاه مارکسیستی که آن را به عنوان استثمار کارگران می‌بیند.
reviewed: false
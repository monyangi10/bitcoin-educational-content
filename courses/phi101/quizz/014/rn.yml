question: Ni akamaro akahe k’ubunywanyi bw’amategeko mu icegeranyo ca Harold J. Berman?
answer: Ivyo vyose biri hejuru
wrong_answers:
  - Vyatumye ubutegetsi buca ibice .
  - Yarateye imbere umwidegemvyo w'umuntu ku giti ciwe .
  - Yatumye habaho ubuhinga bushasha .
explanation: |
  Harold J. Berman ashimika ku vy’uko ubunywanyi bw’amategeko ari ikintu gihambaye cane kubera ko butuma amasoko atandukanye y’amategeko abaho hamwe, gutyo bikaba bituma umuntu agira umwidegemvyo, bigatuma habaho ubuhinga bushasha, kandi bikabuza kwibanda cane ku bubasha, ivyo bikaba bituma ivy’amategeko bitunganywa.
reviewed: true
question: ตามที่นักปรัชญาโรมัน เซเนกา กล่าวไว้ ความสุขประกอบด้วยอะไรบ้าง?
answer: การปฏิบัติคุณธรรม
wrong_answers:
  - ความมั่งคั่ง
  - ความสุข
  - ทั้งหมดที่กล่าวมา
explanation: |
  สำหรับเซเนกา ความสุขที่แท้จริงอยู่ในการปฏิบัติคุณธรรม ซึ่งทำให้บุคคลสามารถดำเนินชีวิตตามเหตุผลและบรรลุความสงบภายในที่ยั่งยืน โดยไม่ขึ้นอยู่กับความสุขหรือความมั่งคั่ง
reviewed: true
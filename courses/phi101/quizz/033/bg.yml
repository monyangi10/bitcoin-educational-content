question: Според римския философ Сенека в какво се състои щастието?
answer: Практиката на добродетелта
wrong_answers:
  - Богатство
  - Удоволствие
  - Всичко изброено по-горе
explanation: |
  За Сенека истинското щастие се крие в практикуването на добродетелите, които позволяват на човека да живее в съответствие с разума и да постигне траен вътрешен мир, независимо от удоволствията и богатството.
reviewed: true
question: Prema rečima rimskog filozofa Seneke, u čemu se sastoji sreća?
answer: Praksa vrline
wrong_answers:
  - Bogatstvo
  - Zadovoljstvo
  - Sve navedeno
explanation: |
  Za Seneku, prava sreća leži u praksi vrline, koja omogućava pojedincu da živi u skladu s razumom i postigne trajni unutrašnji mir, nezavisno od užitaka ili bogatstva.

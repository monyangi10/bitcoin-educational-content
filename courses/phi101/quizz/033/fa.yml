question: به گفته فیلسوف رومی سنکا، خوشبختی از چه چیزی تشکیل شده است؟
answer: تمرین فضیلت
wrong_answers:
  - ثروت
  - لذت
  - همه موارد فوق
explanation: |
  برای سنکا، خوشبختی واقعی در تمرین فضیلت نهفته است، که به فرد اجازه می‌دهد مطابق با عقل زندگی کند و به آرامش درونی پایدار دست یابد، مستقل از لذت‌ها یا ثروت.
reviewed: false
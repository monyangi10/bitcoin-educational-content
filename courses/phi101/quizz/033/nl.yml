question: Waaruit bestaat geluk volgens de Romeinse filosoof Seneca?
answer: De praktijk van de deugd
wrong_answers:
  - Rijkdom
  - Plezier
  - Alle bovenstaande
explanation: |
  Voor Seneca ligt het ware geluk in het beoefenen van de deugd, waardoor een individu in overeenstemming met de rede kan leven en blijvende innerlijke vrede kan bereiken, onafhankelijk van genoegens of rijkdom.
reviewed: true
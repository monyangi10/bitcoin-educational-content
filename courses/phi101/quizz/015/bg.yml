question: Каква е визията за историята, предложена от Маркс?
answer: Историята е резултат от борбата между социалните класи
wrong_answers:
  - Историята е линейна прогресия към буржоазно общество
  - Историята е цикъл от повторения с периоди на свобода, следвани от периоди на тирания
  - Историята се определя от климатичните фактори
explanation: |
  Маркс разглежда историята като продукт на конфликтите между социалните класи, като твърди, че напрежението между класите на потисниците и потиснатите е движещата сила на социалните и икономическите промени през вековете.
reviewed: true
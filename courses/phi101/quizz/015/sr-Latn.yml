question: Kakva je vizija istorije koju je predložio Marks?
answer: Istorija je rezultat borbe između društvenih klasa
wrong_answers:
  - Istorija je linearni napredak ka buržoaskom društvu
  - Istorija je ciklus ponavljanja sa periodima slobode praćenim periodima tiranije.
  - Istorija je određena klimatskim faktorima
explanation: |
  Marks posmatra istoriju kao proizvod sukoba između društvenih klasa, tvrdeći da su tenzije između tlačiteljskih i potlačenih klasa pokretačka snaga društvenih i ekonomskih promena kroz vekove.

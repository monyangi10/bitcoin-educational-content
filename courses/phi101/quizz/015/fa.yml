question: چشم‌انداز تاریخ که توسط مارکس پیشنهاد شده چیست؟
answer: تاریخ نتیجه‌ی مبارزه بین طبقات اجتماعی است
wrong_answers:
  - تاریخ یک پیشرفت خطی به سوی جامعه بورژوازی است
  - تاریخ چرخه‌ای از تکرار است با دوره‌های آزادی که به دنبال آن دوره‌های استبداد می‌آید.
  - تاریخ توسط عوامل اقلیمی تعیین می‌شود
explanation: |
  مارکس تاریخ را به‌عنوان محصولی از درگیری‌های بین طبقات اجتماعی می‌بیند و ادعا می‌کند که تنش‌های بین طبقات ستمگر و ستمدیده نیروی محرکه تغییرات اجتماعی و اقتصادی در طول اعصار هستند.
reviewed: false
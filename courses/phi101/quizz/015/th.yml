question: วิสัยทัศน์ของประวัติศาสตร์ที่ Marx เสนอคืออะไร?
answer: ประวัติศาสตร์เป็นผลมาจากการต่อสู้ระหว่างชนชั้นทางสังคม
wrong_answers:
  - ประวัติศาสตร์เป็นความก้าวหน้าเชิงเส้นไปสู่สังคมชนชั้นกลาง
  - ประวัติศาสตร์เป็นวงจรของการทำซ้ำ โดยมีช่วงเวลาแห่งเสรีภาพตามด้วยช่วงเวลาแห่งการกดขี่
  - ประวัติศาสตร์ถูกกำหนดโดยปัจจัยทางภูมิอากาศ
explanation: |
  มาร์กซ์มองว่าประวัติศาสตร์เป็นผลผลิตของความขัดแย้งระหว่างชนชั้นทางสังคม โดยยืนยันว่าความตึงเครียดระหว่างชนชั้นผู้กดขี่และชนชั้นผู้ถูกกดขี่เป็นแรงผลักดันของการเปลี่ยนแปลงทางสังคมและเศรษฐกิจตลอดยุคสมัย
reviewed: true
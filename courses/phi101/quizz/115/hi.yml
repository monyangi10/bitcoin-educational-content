question: वह कौन सी धातु है जिसे ऐतिहासिक रूप से मुद्रा के मानक संदर्भ के रूप में माना जाता रहा है?
answer: सोना
wrong_answers:
  - चांदी
  - तांबा
  - कांस्य
explanation: |
  सोने ने ऐतिहासिक रूप से मानक का काम किया है क्योंकि यह दुर्लभ है, टिकाऊ है और इसकी कीमत सभी जगह मान्य है, जिससे यह मौद्रिक प्रणालियों के लिए एक स्थिर आधार बनता है।
reviewed: false
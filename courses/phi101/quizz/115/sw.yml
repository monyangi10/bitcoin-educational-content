question: Ni chuma gani ambacho kimezingatiwa kihistoria kuwa rejeleo la kawaida la sarafu?
answer: Dhahabu
wrong_answers:
  - Fedha
  - Shaba
  - Shaba
explanation: |
  Dhahabu imetumika kihistoria kama kiwango kutokana na uhaba wake, uimara, na thamani inayotambulika ulimwenguni, na kuifanya kuwa msingi thabiti wa mifumo ya fedha.
reviewed: false
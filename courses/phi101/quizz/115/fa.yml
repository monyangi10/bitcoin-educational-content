question: کدام فلز به طور تاریخی به عنوان مرجع استاندارد برای ارز در نظر گرفته شده است؟
answer: طلا
wrong_answers:
  - نقره‌ای
  - مس
  - برنز
explanation: |
  طلا به دلیل کمیابی، دوام و ارزش شناخته‌شده جهانی، به‌طور تاریخی به‌عنوان استاندارد خدمت کرده است و آن را به یک پایه پایدار برای سیستم‌های پولی تبدیل کرده است.
reviewed: false
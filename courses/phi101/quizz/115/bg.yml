question: Кой метал в миналото се е смятал за стандартен еталон за парични знаци?
answer: Злато
wrong_answers:
  - Silver
  - Мед
  - Бронз
explanation: |
  В миналото златото е служило като стандарт поради своята рядкост, трайност и общопризната стойност, което го прави стабилна основа за паричните системи.
reviewed: true
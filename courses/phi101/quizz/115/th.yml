question: โลหะใดที่ถือว่าเป็นมาตรฐานอ้างอิงสำหรับสกุลเงินในประวัติศาสตร์?
answer: ทองคำ
wrong_answers:
  - ซิลเวอร์
  - ทองแดง
  - บรอนซ์
explanation: |
  ทองคำมีประวัติศาสตร์ที่ยาวนานในการเป็นมาตรฐานเนื่องจากความหายาก ความทนทาน และมูลค่าที่ได้รับการยอมรับทั่วโลก ทำให้เป็นฐานที่มั่นคงสำหรับระบบการเงิน
reviewed: true
question: Kulingana na Tocqueville, ni nini mojawapo ya mambo makuu yaliyochangia mafanikio ya Mapinduzi ya Marekani?
answer: Heshima kwa sheria ya juu.
wrong_answers:
  - Uwekaji kati wa nguvu.
  - Kutokuwepo kwa dini kuu.
  - Uwepo wa ufalme wenye nguvu.
explanation: |
  Tocqueville inahusisha mafanikio ya Mapinduzi ya Marekani kwa heshima ya wakoloni kwa sheria ya juu zaidi, ambayo iliweka uhuru wa mtu binafsi na kutoa msingi thabiti wa maadili na kisheria kwa shirika la jamii.

question: Nk’uko Tocqueville abivuga, ni ikihe kintu nyamukuru catumye Impinduka y’Abanyamerika iroranirwa?
answer: Ivyubahiro vy’itegeko risumba ayandi.
wrong_answers:
  - Ugushira ubutegetsi hagati.
  - Kubura idini riganzwa.
  - Kuba hariho ubwami bukomeye.
explanation: |
  Tocqueville avuga ko ukuroranirwa kw’Impinduka y’Abanyamerika kwatumwe n’uko abakoloni bubaha itegeko ryo hejuru, ryashizeho umwidegemvyo w’umuntu ku giti ciwe, rikaba ryari ritanga urufatiro rukomeye rw’inyifato runtu n’urw’amategeko rwo gutunganya ikibano.
reviewed: true
question: ตามที่ Tocqueville กล่าว หนึ่งในปัจจัยหลักที่มีส่วนทำให้การปฏิวัติอเมริกาประสบความสำเร็จคืออะไร?
answer: ความเคารพต่อกฎหมายที่สูงกว่า
wrong_answers:
  - การรวมศูนย์อำนาจ
  - การขาดหายไปของศาสนาที่โดดเด่น
  - การมีอยู่ของสถาบันกษัตริย์ที่เข้มแข็ง
explanation: |
  Tocqueville ให้เครดิตความสำเร็จของการปฏิวัติอเมริกันแก่การเคารพของชาวอาณานิคมต่อกฎหมายที่สูงกว่า ซึ่งเป็นกรอบสำหรับเสรีภาพส่วนบุคคลและให้พื้นฐานทางศีลธรรมและกฎหมายที่มั่นคงสำหรับการจัดระเบียบสังคม
reviewed: true
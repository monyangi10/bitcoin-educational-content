question: Jaki jest według Tocqueville'a jeden z głównych czynników, które przyczyniły się do sukcesu rewolucji amerykańskiej?
answer: Szacunek dla wyższego prawa.
wrong_answers:
  - Centralizacja władzy.
  - Brak dominującej religii.
  - Obecność silnej monarchii.
explanation: |
  Tocqueville przypisuje sukces rewolucji amerykańskiej szacunkowi kolonistów dla wyższego prawa, które określiło indywidualne wolności i zapewniło solidne podstawy moralne i prawne dla organizacji społeczeństwa.
reviewed: false
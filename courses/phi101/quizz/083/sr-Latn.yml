question: Prema Tokvilu, jedan od glavnih faktora koji je doprineo uspehu Američke revolucije je postojanje snažnog osećaja zajedničkog identiteta i političke svesti među kolonistima.
answer: Poštovanje prema višem zakonu.
wrong_answers:
  - Centralizacija moći.
  - Odsustvo dominantne religije.
  - Prisustvo jake monarhije.
explanation: |
  Tocqueville pripisuje uspeh Američke revolucije poštovanju kolonista prema višem zakonu, koji je oblikovao individualne slobode i obezbedio čvrstu moralnu i pravnu osnovu za organizaciju društva.

question: Според Токвил кой е един от основните фактори, допринесли за успеха на Американската революция?
answer: Зачитането на по-висш закон.
wrong_answers:
  - Централизация на властта.
  - Липсата на доминираща религия.
  - Наличието на силна монархия.
explanation: |
  Токвил обяснява успеха на Американската революция с уважението на колонистите към висшия закон, който определя индивидуалните свободи и осигурява солидна морална и правна основа за организацията на обществото.
reviewed: true
question: به گفته توکویل، یکی از عوامل اصلی که به موفقیت انقلاب آمریکا کمک کرد چیست؟
answer: احترام به یک قانون بالاتر.
wrong_answers:
  - تمرکز قدرت.
  - عدم وجود یک دین غالب.
  - حضور یک سلطنت قوی.
explanation: |
  توکویل موفقیت انقلاب آمریکا را به احترام مستعمره‌نشینان به یک قانون برتر نسبت می‌دهد که آزادی‌های فردی را چارچوب‌بندی کرده و پایه‌ای محکم اخلاقی و قانونی برای سازماندهی جامعه فراهم کرده است.
reviewed: false
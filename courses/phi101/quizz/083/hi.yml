question: टॉकविल के मुताबिक, अमेरिकी क्रांति की सफलता का एक मुख्य कारण क्या था?
answer: एक उच्च कानून के प्रति सम्मान।
wrong_answers:
  - सत्ता का केंद्रीकरण।
  - प्रमुख धर्म का अभाव।
  - एक मजबूत राजशाही की मौजूदगी।
explanation: |
  टोकविल अमेरिकी क्रांति की सफलता का श्रेय उपनिवेशवासियों के उस उच्चतर कानून के प्रति सम्मान को देते हैं, जिसने व्यक्तिगत स्वतंत्रताओं को सीमाबद्ध किया और समाज के संगठन के लिए एक ठोस नैतिक एवं कानूनी आधार प्रदान किया।
reviewed: false
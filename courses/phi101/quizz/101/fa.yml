question: پلی‌لوژیسم از دیدگاه لودویگ فن میزس چیست؟
answer: پلی‌لوژیسم یکتایی و جهان‌شمولی عقل را به چالش می‌کشد.
wrong_answers:
  - پلی‌لوژیسم نظریه‌ای است که تنوع زبان‌ها و فرهنگ‌ها را توضیح می‌دهد.
  - اتریشی‌ها از آن برای نشان دادن اینکه منطق مارکسیستی متناقض است استفاده می‌کنند.
  - پلی‌لوژیسم روشی برای تحلیل متن است که امکان شناسایی سفسطه‌ها را فراهم می‌کند.
explanation: |
  برای لودویگ فون میزس، پلی‌لوژیسم ایده‌ای است که ساختارهای فکری بین طبقات یا گروه‌ها متفاوت است و این چالش را به وجود می‌آورد که عقلانیت جهانی و به همان شکل برای همه قابل اعمال نیست.
reviewed: false
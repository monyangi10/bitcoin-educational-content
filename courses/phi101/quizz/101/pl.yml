question: Czym jest polilogizm według Ludwiga von Misesa?
answer: Polilogizm podważa wyjątkowość i uniwersalność rozumu.
wrong_answers:
  - Polilogizm to teoria wyjaśniająca różnorodność języków i kultur.
  - Austriacy używają go, aby pokazać, że logika marksistowska jest sprzeczna.
  - Polilogizm to metoda analizy tekstu, która pozwala na wykrywanie sofizmatów.
explanation: |
  Dla Ludwiga von Misesa polilogizm to koncepcja, zgodnie z którą struktury myślowe różnią się w zależności od klasy lub grupy, co podważa pogląd, że rozum jest uniwersalny i ma zastosowanie do wszystkich w ten sam sposób.

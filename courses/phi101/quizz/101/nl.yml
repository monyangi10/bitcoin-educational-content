question: Wat is polylogisme volgens Ludwig von Mises?
answer: Polylogisme daagt de uniciteit en universaliteit van de rede uit.
wrong_answers:
  - Polylogisme is een theorie die de diversiteit van talen en culturen verklaart.
  - Oostenrijkers gebruiken het om aan te tonen dat marxistische logica tegenstrijdig is.
  - Polylogisme is een methode voor tekstanalyse waarmee drogredenen kunnen worden opgespoord.
explanation: |
  Voor Ludwig von Mises is polylogisme het idee dat denkstructuren verschillen tussen klassen of groepen, waardoor het idee dat rede universeel is en op iedereen op dezelfde manier van toepassing is, in twijfel wordt getrokken.
reviewed: true
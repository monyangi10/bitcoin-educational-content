question: Какво е полилогизъм според Лудвиг фон Мизес?
answer: Полилогизмът оспорва уникалността и универсалността на разума.
wrong_answers:
  - Полилогизмът е теория, която обяснява разнообразието на езиците и културите.
  - Австрийците го използват, за да покажат, че марксистката логика е противоречива.
  - Полилогизмът е метод за анализ на текстове, който позволява да се откриват софизми.
explanation: |
  За Лудвиг фон Мизес полилогизмът е идеята, че мисловните структури се различават в различните класи или групи, което поставя под въпрос схващането, че разумът е универсален и приложим за всички по един и същи начин.
reviewed: true
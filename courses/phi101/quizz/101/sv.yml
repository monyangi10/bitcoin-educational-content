question: Vad är polylogism enligt Ludwig von Mises?
answer: Polylogism utmanar förnuftets unika och universella karaktär.
wrong_answers:
  - Polylogism är en teori som förklarar mångfalden av språk och kulturer.
  - Österrikare använder det för att visa att marxistisk logik är motsägelsefull.
  - Polylogism är en metod för textanalys som gör det möjligt att upptäcka sofismer.
explanation: |
  För Ludwig von Mises är polylogism idén om att tankestrukturer varierar mellan olika klasser eller grupper, vilket utmanar föreställningen om att förnuftet är universellt och tillämpligt på alla på samma sätt.
reviewed: true
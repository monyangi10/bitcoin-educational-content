question: 루드비히 폰 미제스에 따르면 폴리로지즘이란 무엇인가요?
answer: 다원주의는 이성의 고유성과 보편성에 도전합니다.
wrong_answers:
  - 다원주의는 언어와 문화의 다양성을 설명하는 이론입니다.
  - 오스트리아 사람들은 마르크스주의 논리가 모순된다는 것을 보여주기 위해 이를 사용합니다.
  - 폴리로지즘은 정교함을 감지할 수 있는 텍스트 분석 방법입니다.
explanation: |
  루트비히 폰 미제스에게 다원주의는 사고 구조가 계층이나 집단에 따라 다르다는 생각으로, 이성이 보편적이며 모든 사람에게 동일하게 적용된다는 개념에 도전합니다.
reviewed: true
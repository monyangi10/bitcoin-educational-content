question: Polylogism ตามที่ Ludwig von Mises กล่าวถึงคืออะไร?
answer: พอลิโลจิซึมท้าทายความเป็นเอกลักษณ์และความเป็นสากลของเหตุผล
wrong_answers:
  - พอลิโลจิสม์เป็นทฤษฎีที่อธิบายถึงความหลากหลายของภาษาและวัฒนธรรม
  - ชาวออสเตรียใช้มันเพื่อแสดงให้เห็นว่าเหตุผลแบบมาร์กซิสต์มีความขัดแย้งกันเอง
  - Polylogism เป็นวิธีการวิเคราะห์ข้อความที่ช่วยในการตรวจจับการใช้เหตุผลที่ผิดพลาด
explanation: |
  สำหรับลุดวิก ฟอน มีเซส โพลีโลจิสม์คือแนวคิดที่ว่าโครงสร้างความคิดแตกต่างกันระหว่างชนชั้นหรือกลุ่ม ซึ่งท้าทายแนวคิดที่ว่าเหตุผลเป็นสากลและสามารถใช้ได้กับทุกคนในลักษณะเดียวกัน
reviewed: true
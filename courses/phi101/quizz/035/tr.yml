question: Montesquieu, Roma İmparatorluğu'nun çöküş nedenleri arasında hangisinin altını çizmektedir?
answer: Cumhuriyetçi değerlerin terk edilmesi ve otoriter bir imparatorluk sisteminin benimsenmesi
wrong_answers:
  - Fetihlerin sona ermesi ve nüfusun yoksullaşması
  - Hiperenflasyon ve ekonomik kriz
  - Siyasi istikrarsızlık ve imparatorların hızla birbirini izlemesi
explanation: |
  Montesquieu, Roma İmparatorluğu'nun çöküşünü, Roma'nın gücünün temeli olan cumhuriyetçi değerlerin kaybına ve uyumu ve sivil erdemi zayıflatan merkezi ve otoriter bir imparatorluk rejimine doğru evrilmesine bağlar.
reviewed: true
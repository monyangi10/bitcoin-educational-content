question: Wśród przyczyn upadku Cesarstwa Rzymskiego, którą z nich podkreśla Monteskiusz?
answer: Porzucenie wartości republikańskich i przyjęcie autorytarnego systemu imperialnego
wrong_answers:
  - Koniec podbojów i zubożenie ludności
  - Hiperinflacja i kryzys gospodarczy
  - Niestabilność polityczna i szybka sukcesja cesarzy
explanation: |
  Montesquieu przypisuje upadek Imperium Rzymskiego utracie republikańskich wartości, które były podstawą siły Rzymu, oraz ewolucji w kierunku scentralizowanego i autorytarnego reżimu imperialnego, który osłabił spójność i cnoty obywatelskie.
reviewed: false
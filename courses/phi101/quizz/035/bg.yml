question: Коя от причините за падането на Римската империя изтъква Монтескьо?
answer: Отказ от републиканските ценности и приемане на авторитарна имперска система
wrong_answers:
  - Краят на завоеванията и обедняването на населението
  - Хиперинфлация и икономическа криза
  - Политическа нестабилност и бърза смяна на императорите
explanation: |
  Монтескьо обяснява падането на Римската империя със загубата на републиканските ценности, които са били в основата на силата на Рим, и с еволюцията към централизиран и авторитарен имперски режим, който отслабва сплотеността и гражданската добродетел.
reviewed: true
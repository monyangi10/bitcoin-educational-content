question: ในบรรดาสาเหตุของการล่มสลายของจักรวรรดิโรมัน สาเหตุใดที่มองเตสกิเออร์เน้นย้ำ?
answer: การละทิ้งคุณค่าของสาธารณรัฐและการยอมรับระบบจักรวรรดิแบบเผด็จการ
wrong_answers:
  - จุดจบของการพิชิตและความยากจนของประชากร
  - ภาวะเงินเฟ้อสูงและวิกฤตเศรษฐกิจ
  - ความไม่มั่นคงทางการเมืองและการสืบทอดตำแหน่งจักรพรรดิอย่างรวดเร็ว
explanation: |
  Montesquieu อ้างถึงการล่มสลายของจักรวรรดิโรมันว่าเกิดจากการสูญเสียคุณค่าของสาธารณรัฐซึ่งเป็นรากฐานของความแข็งแกร่งของโรม และการพัฒนาไปสู่ระบอบจักรวรรดิที่รวมศูนย์และเผด็จการซึ่งทำให้ความสามัคคีและคุณธรรมพลเมืองอ่อนแอลง
reviewed: true
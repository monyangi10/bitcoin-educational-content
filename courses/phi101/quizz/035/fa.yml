question: در میان علل سقوط امپراتوری روم، کدام یک توسط منتسکیو برجسته شده است؟
answer: رها کردن ارزش‌های جمهوری‌خواهانه و پذیرش یک سیستم امپراتوری استبدادی
wrong_answers:
  - پایان فتوحات و فقیر شدن جمعیت
  - اَبَرتورم و بحران اقتصادی
  - بی‌ثباتی سیاسی و جانشینی سریع امپراتورها
explanation: |
  مونتسکیو سقوط امپراتوری روم را به از دست دادن ارزش‌های جمهوری‌خواهانه‌ای که پایه و اساس قدرت روم بودند نسبت می‌دهد، و به تکامل به سمت یک رژیم امپراتوری متمرکز و استبدادی که انسجام و فضیلت مدنی را تضعیف کرد.
reviewed: false
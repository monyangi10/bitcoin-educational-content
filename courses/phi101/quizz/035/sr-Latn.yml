question: Među uzrocima pada Rimskog carstva, koji je istakao Montesquieu?
answer: Napustanje republikanskih vrednosti i usvajanje autoritarnog carskog sistema
wrong_answers:
  - Kraj osvajanja i osiromašenje stanovništva
  - Hiperinflacija i ekonomska kriza
  - Politička nestabilnost i brza smena careva
explanation: |
  Montesquieu pripisuje pad Rimskog carstva gubitku republikanskih vrednosti koje su bile temelj snage Rima, kao i evoluciji ka centralizovanom i autoritarnom carskom režimu koji je oslabio koheziju i građansku vrlinu.

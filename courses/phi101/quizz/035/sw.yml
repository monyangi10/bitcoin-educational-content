question: Miongoni mwa sababu za kuanguka kwa Milki ya Kirumi, ni ipi iliyoangaziwa na Montesquieu?
answer: Kuachwa kwa maadili ya jamhuri na kupitishwa kwa mfumo wa kifalme wa kimabavu
wrong_answers:
  - Mwisho wa ushindi na umaskini wa watu
  - Mfumuko wa bei na mgogoro wa kiuchumi
  - Kukosekana kwa utulivu wa kisiasa na mfululizo wa haraka wa wafalme
explanation: |
  Montesquieu anahusisha anguko la Dola ya Kirumi na upotevu wa maadili ya jamhuri ambayo yalikuwa msingi wa nguvu ya Roma, na mageuzi kuelekea serikali kuu na ya kimabavu ya kifalme ambayo ilidhoofisha mshikamano na wema wa kiraia.
reviewed: false
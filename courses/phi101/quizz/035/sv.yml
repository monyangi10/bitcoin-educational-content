question: Vilken av orsakerna till romarrikets fall lyfter Montesquieu fram?
answer: Övergivandet av republikanska värderingar och införandet av ett auktoritärt imperialistiskt system
wrong_answers:
  - Slut på erövringarna och utarmning av befolkningen
  - Hyperinflation och ekonomisk kris
  - Politisk instabilitet och snabb succession av kejsare
explanation: |
  Montesquieu tillskriver romarrikets fall förlusten av de republikanska värderingar som låg till grund för Roms styrka och utvecklingen mot en centraliserad och auktoritär kejserlig regim som försvagade sammanhållningen och medborgarandan.
reviewed: true
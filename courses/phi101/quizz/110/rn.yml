question: Ni igikoresho nyamukuru ikihe c’ubutunzi Keynes yasavye kugira ngo ubutunzi butere imbere?
answer: Ukwongerekana kw'amahera Leta ikoresha
wrong_answers:
  - Gugabanya imisoro
  - Ukwidegemvya kw'isoko
  - Ukwongerekana kw'ivyoherezwa hanze
explanation: |
  Keynes yasavye kwongerera amafaranga Leta ikoresha kugira ngo abantu bose basabe, cane cane mu bihe vy’ihungabana ry’ubutunzi, kugira ngo ubushomeri bugabanuke kandi ubutunzi butere imbere.
reviewed: true
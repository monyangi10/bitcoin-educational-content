question: Кой е основният икономически инструмент, препоръчан от Кейнс за стимулиране на икономиката?
answer: Увеличаване на публичните разходи
wrong_answers:
  - Намаляване на данъците
  - Либерализация на пазара
  - Увеличаване на износа
explanation: |
  Кейнс се застъпва за увеличаване на публичните разходи, за да се стимулира общото търсене, особено в периоди на рецесия, да се намали безработицата и да се стимулира икономическият растеж.
reviewed: true
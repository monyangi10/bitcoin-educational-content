question: เครื่องมือทางเศรษฐกิจหลักที่แนะนำโดยเคนส์เพื่อกระตุ้นเศรษฐกิจคืออะไร?
answer: การเพิ่มขึ้นของการใช้จ่ายภาครัฐ
wrong_answers:
  - การลดภาษี
  - การเปิดเสรีตลาด
  - การส่งออกเพิ่มขึ้น
explanation: |
  เคนส์สนับสนุนการเพิ่มการใช้จ่ายของภาครัฐเพื่อกระตุ้นอุปสงค์โดยรวม โดยเฉพาะในช่วงภาวะถดถอย เพื่อลดการว่างงานและกระตุ้นการเติบโตทางเศรษฐกิจ
reviewed: true
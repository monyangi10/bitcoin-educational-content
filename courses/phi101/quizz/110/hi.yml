question: कीन्स ने अर्थव्यवस्था को उत्तेजित करने के लिए मुख्य आर्थिक उपकरण क्या सुझाया है?
answer: सार्वजनिक खर्च में वृद्धि
wrong_answers:
  - टैक्स कटौती
  - बाजार उदारीकरण
  - निर्यात में वृद्धि
explanation: |
  कीन्स ने सार्वजनिक खर्च बढ़ाने की वकालत की ताकि कुल मांग को बढ़ाया जा सके, खासकर मंदी के दौरों में, ताकि बेरोजगारी कम हो और आर्थिक विकास को गति मिले।
reviewed: false
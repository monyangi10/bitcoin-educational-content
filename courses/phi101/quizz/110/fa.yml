question: ابزار اصلی اقتصادی که کینز برای تحریک اقتصاد توصیه می‌کند چیست؟
answer: افزایش در هزینه‌های عمومی
wrong_answers:
  - کاهش مالیات‌ها
  - آزادسازی بازار
  - افزایش صادرات
explanation: |
  کینز برای افزایش هزینه‌های عمومی به منظور تحریک تقاضای کلی، به ویژه در دوره‌های رکود، به منظور کاهش بیکاری و آغاز رشد اقتصادی، حمایت کرد.
reviewed: false
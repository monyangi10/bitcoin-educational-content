question: ตามที่เคนส์กล่าวไว้ รัฐควรมีบทบาทอย่างไรในเศรษฐกิจ?
answer: บทบาทที่กระตือรือร้นโดยการกระตุ้นความต้องการเพื่อส่งเสริมเศรษฐกิจ
wrong_answers:
  - บทบาทขั้นต่ำในการปล่อยให้ตลาดควบคุมเศรษฐกิจ
  - บทบาทที่เป็นกลางโดยไม่แทรกแซงกลไกตลาด
  - บทบาททางการคลังหลักในการปรับสมดุลงบประมาณ
explanation: |
  เคนส์โต้แย้งว่ารัฐควรเข้าแทรกแซงอย่างแข็งขันเพื่อกระตุ้นอุปสงค์ โดยเฉพาะในช่วงภาวะถดถอย เพื่อกระตุ้นเศรษฐกิจและชดเชยข้อบกพร่องของตลาด
reviewed: true
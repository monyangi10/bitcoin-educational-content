question: Nk’uko Keynes abivuga, ni uruhara uruhe Leta ikwiye kugira mu bukungu?
answer: Uruhara rukomeye mu gutuma habaho ugusaba kugira ngo ubutunzi butere imbere
wrong_answers:
  - Uruhara rutoyi rwo kureka isoko rikagenzura ubutunzi
  - Uruhara rudafise aho rugarukira ata kwivanga mu buryo bw'isoko
  - Uruhara rwa mbere rw'ingengo y'imari kugira ngo ingengo y'imari igere ku rugero rubereye
explanation: |
  Keynes yavuze ko Leta ikwiye kwinjiramwo n’umwete kugira ngo ivyure ivyifuzo, cane cane mu gihe c’ihungabana ry’ubutunzi, kugira ngo ubutunzi butere imbere no gusubiza inyuma intege nke z’isoko.
reviewed: true
question: Каква роля трябва да играе държавата в икономиката според Кейнс?
answer: Активна роля чрез стимулиране на търсенето за насърчаване на икономиката
wrong_answers:
  - Минимална роля, която позволява на пазара да регулира икономиката
  - Неутрална роля без намеса в пазарните механизми
  - Предимно фискална роля за балансиране на бюджета
explanation: |
  Кейнс твърди, че държавата трябва активно да се намесва, за да стимулира търсенето, особено по време на рецесия, за да даде тласък на икономиката и да компенсира недостатъците на пазара.
reviewed: true
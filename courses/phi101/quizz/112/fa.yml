question: بر اساس نظر کینز، دولت چه نقشی باید در اقتصاد ایفا کند؟
answer: نقش فعال با تحریک تقاضا برای تقویت اقتصاد
wrong_answers:
  - نقش حداقلی که به بازار اجازه می‌دهد اقتصاد را تنظیم کند
  - نقش بی‌طرف بدون مداخله در مکانیزم‌های بازار
  - نقشی عمدتاً مالی برای متعادل کردن بودجه
explanation: |
  کینز استدلال کرد که دولت باید به‌طور فعال برای تحریک تقاضا، به‌ویژه در دوران رکود، مداخله کند تا اقتصاد را تقویت کرده و کاستی‌های بازار را جبران کند.
reviewed: false
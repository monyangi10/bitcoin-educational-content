question: कीन्स के मुताबिक, अर्थव्यवस्था में सरकार को क्या भूमिका निभानी चाहिए?
answer: अर्थव्यवस्था को बढ़ावा देने के लिए मांग को उत्तेजित करके एक सक्रिय भूमिका
wrong_answers:
  - बाजार को अर्थव्यवस्था को नियंत्रित करने देना
  - बाजार के तंत्र में हस्तक्षेप किए बिना एक तटस्थ भूमिका
  - मुख्य रूप से बजट को संतुलित करने वाली वित्तीय भूमिका
explanation: |
  कीन्स ने तर्क दिया कि सरकार को मांग को बढ़ावा देने के लिए सक्रिय रूप से हस्तक्षेप करना चाहिए, खासकर मंदी के दौरान, ताकि अर्थव्यवस्था को बढ़ावा मिले और बाजार की कमियों की भरपाई हो सके।
reviewed: false
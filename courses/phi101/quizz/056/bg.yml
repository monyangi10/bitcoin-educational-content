question: Какъв е обхватът на етичната революция, предизвикана от Библията?
answer: Всички останали отговори са верни.
wrong_answers:
  - Тя води до нова концепция за справедливост, основана на равенство и състрадание.
  - Тя предизвиква пасивното приемане на страданието и насърчава действия за неговото облекчаване.
  - Той полага основите на моралния универсализъм, признаващ равната стойност на всяко човешко същество.
explanation: |
  Библията извършва етична революция, като предлага концепции за справедливост, основани на равенство и състрадание, оценява действия срещу страданието и полага основите на морален универсализъм, според който всеки човек притежава присъщо достойнство.
reviewed: true
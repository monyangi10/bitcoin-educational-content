question: None ihinduka ry’inyifato runtu ryazanywe na Bibiliya ringana gute?
answer: Ibindi bisubizo vyose ni ukuri.
wrong_answers:
  - Bishikana ku ciyumviro gishasha c’ubutungane gishingiye ku kungana n’impuhwe.
  - Riratera ingorane ukwemera imibabaro ata co ukora kandi rikaremesha gukora kugira ngo rigabanuke.
  - Rishinga umushinge w’ubumwe bw’abantu bose mu vy’inyifato runtu bwemera agaciro kangana k’umuntu wese.
explanation: |
  Bibiliya yarashizeho ihinduka ry’inyifato runtu mu gutanga ivyiyumviro vy’ubutungane bishingiye ku kungana n’impuhwe, guha agaciro igikorwa co kurwanya imibabaro, no gushinga imishinge y’ubumwe bw’abantu bose mu vy’inyifato runtu aho umuntu wese afise icubahiro c’imbere mu mutima.
reviewed: true
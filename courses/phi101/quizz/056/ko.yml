question: 성경이 가져온 윤리적 혁명의 범위는 어디까지인가요?
answer: 다른 모든 정답이 맞습니다.
wrong_answers:
  - 평등과 연민에 기반한 새로운 정의의 개념으로 이어집니다.
  - 고통에 대한 수동적인 수용에 도전하고 고통을 완화하기 위한 행동을 장려합니다.
  - 이는 모든 인간의 동등한 가치를 인정하는 도덕적 보편주의의 토대를 마련합니다.
explanation: |
  성서는 평등과 연민에 기반한 정의의 개념을 제시하고, 고통에 대한 행동을 중시하며, 각 개인이 내재적 존엄성을 지닌다는 도덕적 보편주의의 토대를 마련함으로써 윤리적 혁명을 일으켰습니다.
reviewed: true
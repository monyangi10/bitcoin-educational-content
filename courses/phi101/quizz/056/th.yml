question: ขอบเขตของการปฏิวัติทางจริยธรรมที่เกิดจากพระคัมภีร์คืออะไร?
answer: คำตอบอื่นๆ ทั้งหมดถูกต้อง
wrong_answers:
  - มันนำไปสู่แนวคิดใหม่ของความยุติธรรมที่มีพื้นฐานมาจากความเสมอภาคและความเมตตา
  - มันท้าทายการยอมรับความทุกข์ทรมานอย่างเฉยเมยและกระตุ้นให้เกิดการกระทำเพื่อลดความทุกข์นั้น
  - มันวางรากฐานสำหรับสากลนิยมทางศีลธรรมที่ยอมรับคุณค่าเท่าเทียมกันของมนุษย์ทุกคน
explanation: |
  พระคัมภีร์ได้แนะนำการปฏิวัติทางจริยธรรมโดยเสนอแนวคิดเรื่องความยุติธรรมที่ตั้งอยู่บนความเสมอภาคและความเมตตา ให้คุณค่ากับการกระทำเพื่อต่อต้านความทุกข์ทรมาน และวางรากฐานสำหรับสากลนิยมทางศีลธรรมที่แต่ละบุคคลมีศักดิ์ศรีในตัวเอง
reviewed: true
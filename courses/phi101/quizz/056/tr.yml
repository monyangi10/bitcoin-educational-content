question: Kutsal Kitap'ın getirdiği etik devrimin kapsamı nedir?
answer: Diğer tüm cevaplar doğrudur.
wrong_answers:
  - Eşitlik ve merhamete dayalı yeni bir adalet kavramına yol açar.
  - Acının pasif bir şekilde kabullenilmesine meydan okur ve acıyı hafifletmek için harekete geçmeyi teşvik eder.
  - Her insanın eşit değerde olduğunu kabul eden ahlaki bir evrenselciliğin temelini atar.
explanation: |
  Kutsal Kitap, eşitlik ve merhamete dayalı adalet kavramlarını önererek, acıya karşı eyleme değer vererek ve her bireyin içsel haysiyete sahip olduğu ahlaki bir evrenselciliğin temellerini atarak etik bir devrim yaratmıştır.
reviewed: true
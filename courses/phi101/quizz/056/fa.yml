question: دامنه انقلاب اخلاقی که توسط کتاب مقدس به وجود آمده چیست؟
answer: همه پاسخ‌های دیگر صحیح هستند.
wrong_answers:
  - این به یک مفهوم جدید از عدالت بر اساس برابری و شفقت منجر می‌شود.
  - این به چالش کشیدن پذیرش منفعلانه رنج و تشویق به اقدام برای کاهش آن است.
  - این پایه‌ای برای یک جهان‌شمولی اخلاقی است که ارزش برابر هر انسان را به رسمیت می‌شناسد.
explanation: |
  کتاب مقدس یک انقلاب اخلاقی را با پیشنهاد مفاهیم عدالت بر اساس برابری و همدلی معرفی کرد، اقدام علیه رنج را ارزشمند دانست و پایه‌های یک جهان‌شمولی اخلاقی را بنا نهاد که در آن هر فرد دارای کرامت ذاتی است.
reviewed: false
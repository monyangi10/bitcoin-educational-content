question: Vad är omfattningen av den etiska revolution som Bibeln har åstadkommit?
answer: Alla de andra svaren är korrekta.
wrong_answers:
  - Det leder till en ny syn på rättvisa som bygger på jämlikhet och medkänsla.
  - Den utmanar det passiva accepterandet av lidande och uppmuntrar till handling för att lindra det.
  - Den lägger grunden för en moralisk universalism som erkänner varje människas lika värde.
explanation: |
  Bibeln introducerade en etisk revolution genom att föreslå begrepp som rättvisa baserad på jämlikhet och medkänsla, värdesätta åtgärder mot lidande och lägga grunden för en moralisk universalism där varje individ har en inneboende värdighet.
reviewed: true
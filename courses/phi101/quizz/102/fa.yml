question: نقد اتریشی به نظریه ارزش کار مارکس چیست؟
answer: اتریشی‌ها ادعا می‌کنند که ارزش ذهنی است و توسط ترجیحات مصرف‌کننده تعیین می‌شود، نه توسط کار.
wrong_answers:
  - آن‌ها استدلال می‌کنند که نظریه مارکس دشواری کار را در نظر نمی‌گیرد.
  - اتریشی‌ها نظریه مارکس را به دلیل ناکارآمدی مورد انتقاد قرار می‌دهند.
  - اتریشی‌ها نظریه مارکس را به این دلیل نقد می‌کنند که ارزش کار یک فضیلت بورژوایی است.
explanation: |
  مکتب اتریشی بر این باور است که ارزش ذهنی است و توسط ترجیحات فردی مصرف‌کنندگان تعریف می‌شود، در مقابل نظریه مارکسیستی که ارزش را به زمان و تلاش کار مرتبط می‌کند.
reviewed: false
question: 마르크스의 노동 가치론에 대한 오스트리아의 비판은 무엇인가요?
answer: 오스트리아 사람들은 가치가 주관적이며 노동이 아닌 소비자 선호도에 의해 결정된다고 주장합니다.
wrong_answers:
  - 그들은 마르크스의 이론이 노동의 어려움을 고려하지 않았다고 주장합니다.
  - 오스트리아 사람들은 마르크스의 이론이 비효율적이라고 비판합니다.
  - 오스트리아 사람들은 노동 가치가 부르주아의 미덕이라는 이유로 마르크스의 이론을 비판합니다.
explanation: |
  오스트리아 학파는 가치를 노동 시간과 노력에 연결 짓는 마르크스주의 이론과 달리, 가치는 소비자의 개인적 선호에 의해 정의되는 주관적이라고 주장합니다.
reviewed: true
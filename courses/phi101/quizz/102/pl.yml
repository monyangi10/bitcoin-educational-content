question: Jaka jest austriacka krytyka teorii wartości pracy Marksa?
answer: Austriacy twierdzą, że wartość jest subiektywna i determinowana przez preferencje konsumentów, a nie przez pracę.
wrong_answers:
  - Twierdzą oni, że teoria Marksa nie bierze pod uwagę trudności pracy.
  - Austriacy krytykują teorię Marksa, ponieważ jest ona nieefektywna.
  - Austriacy krytykują teorię Marksa, ponieważ wartość pracy jest burżuazyjną cnotą.
explanation: |
  Szkoła austriacka utrzymuje, że wartość jest subiektywna, definiowana przez indywidualne preferencje konsumentów, w przeciwieństwie do teorii marksistowskiej, która łączy wartość z czasem pracy i wysiłkiem.
reviewed: false
question: คำวิจารณ์ของออสเตรียเกี่ยวกับทฤษฎีมูลค่าของแรงงานของมาร์กซ์คืออะไร?
answer: ชาวออสเตรียยืนยันว่ามูลค่าเป็นเรื่องส่วนบุคคลและถูกกำหนดโดยความชอบของผู้บริโภค ไม่ใช่โดยแรงงาน
wrong_answers:
  - พวกเขาโต้แย้งว่า ทฤษฎีของมาร์กซ์ไม่ได้คำนึงถึงความยากลำบากของแรงงาน
  - ชาวออสเตรียวิจารณ์ทฤษฎีของมาร์กซ์เพราะมันไม่มีประสิทธิภาพ
  - ชาวออสเตรียวิจารณ์ทฤษฎีของมาร์กซ์เพราะมูลค่าจากแรงงานเป็นคุณธรรมของชนชั้นกลาง
explanation: |
  โรงเรียนออสเตรียเน้นว่ามูลค่าเป็นเรื่องส่วนบุคคล กำหนดโดยความชอบของผู้บริโภคแต่ละคน ซึ่งตรงข้ามกับทฤษฎีมาร์กซิสต์ที่เชื่อมโยงมูลค่ากับเวลาและความพยายามในการทำงาน
reviewed: true
question: Wat is de Oostenrijkse kritiek op Marx' arbeidstheorie van waarde?
answer: De Oostenrijkers beweren dat waarde subjectief is en bepaald wordt door consumentenvoorkeuren, niet door arbeid.
wrong_answers:
  - Ze beweren dat de theorie van Marx geen rekening houdt met de moeilijkheid van arbeid.
  - De Oostenrijkers bekritiseren de theorie van Marx omdat deze inefficiënt is.
  - De Oostenrijkers bekritiseren Marx' theorie omdat arbeidswaarde een burgerlijke deugd is.
explanation: |
  De Oostenrijkse school stelt dat waarde subjectief is, gedefinieerd door de individuele voorkeuren van consumenten, in tegenstelling tot de marxistische theorie die waarde koppelt aan arbeidstijd en inspanning.
reviewed: true
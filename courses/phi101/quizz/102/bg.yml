question: Каква е австрийската критика на трудовата теория за стойността на Маркс?
answer: Австрийците твърдят, че стойността е субективна и се определя от предпочитанията на потребителите, а не от труда.
wrong_answers:
  - Те твърдят, че теорията на Маркс не отчита трудността на труда.
  - Австрийците критикуват теорията на Маркс, защото тя е неефективна.
  - Австрийците критикуват теорията на Маркс, защото трудовата стойност е буржоазна добродетел.
explanation: |
  Австрийската школа твърди, че стойността е субективна и се определя от индивидуалните предпочитания на потребителите, за разлика от марксистката теория, която свързва стойността с времето и усилията за труд.
reviewed: true
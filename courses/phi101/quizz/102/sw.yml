question: Ni upi ukosoaji wa Waaustria wa nadharia ya thamani ya kazi ya Marx?
answer: Waaustria wanadai kuwa thamani ni ya kibinafsi na imeamuliwa na matakwa ya watumiaji, si kwa nguvu kazi.
wrong_answers:
  - Wanasema kuwa nadharia ya Marx haizingatii ugumu wa kazi.
  - Waaustria wanaikosoa nadharia ya Marx kwa sababu haina tija.
  - Waaustria wanaikosoa nadharia ya Marx kwa sababu thamani ya kazi ni fadhila ya ubepari.
explanation: |
  Shule ya Austria inashikilia kuwa thamani ni ya kibinafsi, inayofafanuliwa na mapendeleo ya kibinafsi ya watumiaji, kinyume na nadharia ya Umaksi ambayo inaunganisha thamani na wakati na bidii ya kazi.

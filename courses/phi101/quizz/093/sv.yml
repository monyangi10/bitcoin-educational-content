question: Vad är Tocquevilles syn på rätten till arbete?
answer: Tocqueville är motståndare till rätten till arbete och befarar att den kan leda till statism och förlust av individuell frihet.
wrong_answers:
  - Tocqueville är för rätten till arbete och anser att staten ska garantera alla medborgare ett anständigt jobb.
  - Tocqueville anser att rätten till arbete är en ädel princip, men att den är svår att genomföra på ett effektivt och rättvist sätt.
  - Tocqueville ger inte klart uttryck för sin inställning till rätten till arbete.
explanation: |
  Tocqueville motsätter sig rätten till arbete och fruktar att detta ansvar som ges till staten kan leda till överdriven interventionism och en minskning av individuella friheter till förmån för centraliserad kontroll.
reviewed: true
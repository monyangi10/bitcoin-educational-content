question: Jaka jest perspektywa Tocqueville'a na prawo do pracy?
answer: Tocqueville jest przeciwny prawu do pracy i obawia się, że może ono prowadzić do etatyzmu i utraty wolności jednostki.
wrong_answers:
  - Tocqueville popiera prawo do pracy i uważa, że państwo powinno zagwarantować wszystkim obywatelom godną pracę.
  - Tocqueville uważa, że prawo do pracy jest szlachetną zasadą, ale trudno ją skutecznie i sprawiedliwie wdrożyć.
  - Tocqueville nie określa jasno swojego stanowiska w sprawie prawa do pracy.
explanation: |
  Tocqueville sprzeciwia się prawu do pracy, obawiając się, że ta odpowiedzialność powierzona państwu może prowadzić do nadmiernego interwencjonizmu i ograniczenia wolności jednostki na rzecz scentralizowanej kontroli.

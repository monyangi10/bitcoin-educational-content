question: دیدگاه توکویل درباره حق کار چیست؟
answer: توکویل با حق کار مخالف است و نگران است که این امر ممکن است به دولت‌گرایی و از دست رفتن آزادی فردی منجر شود.
wrong_answers:
  - توکویل طرفدار حق کار است و معتقد است که دولت باید برای همه شهروندان شغل شایسته‌ای را تضمین کند.
  - توکویل معتقد است که حق کار یک اصل نجیب است، اما اجرای آن به‌طور مؤثر و عادلانه دشوار است.
  - توكویل به‌طور واضح موضع خود را در مورد حق کار بیان نمی‌کند.
explanation: |
  توکویل با حق کار مخالف است، زیرا می‌ترسد که این مسئولیت داده شده به دولت ممکن است به مداخله‌گرایی بیش از حد و کاهش آزادی‌های فردی به نفع کنترل متمرکز منجر شود.
reviewed: false
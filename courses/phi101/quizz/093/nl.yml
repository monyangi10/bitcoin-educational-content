question: Wat is Tocqueville's perspectief op het recht op werk?
answer: Tocqueville is tegen het recht op werk en vreest dat het zal leiden tot statisme en het verlies van individuele vrijheid.
wrong_answers:
  - Tocqueville is voorstander van het recht op werk en vindt dat de staat alle burgers een fatsoenlijke baan moet garanderen.
  - Tocqueville vindt dat het recht op werk een nobel principe is, maar dat het moeilijk effectief en eerlijk te implementeren is.
  - Tocqueville geeft niet duidelijk zijn standpunt over het recht op werk.
explanation: |
  Tocqueville is tegen het recht op werk, omdat hij vreest dat deze verantwoordelijkheid die aan de staat wordt gegeven kan leiden tot buitensporig interventionisme en een vermindering van individuele vrijheden, ten gunste van gecentraliseerde controle.
reviewed: true
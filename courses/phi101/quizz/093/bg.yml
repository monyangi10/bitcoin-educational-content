question: Каква е гледната точка на Токвил за правото на труд?
answer: Токвил е противник на правото на труд и се опасява, че то може да доведе до етатизъм и загуба на индивидуалната свобода.
wrong_answers:
  - Токвил подкрепя правото на труд и смята, че държавата трябва да гарантира на всички граждани достойна работа.
  - Токвил смята, че правото на труд е благороден принцип, но че е трудно да се приложи ефективно и справедливо.
  - Токвил не изразява ясно позицията си по отношение на правото на труд.
explanation: |
  Токвил се противопоставя на правото на труд, опасявайки се, че тази отговорност, предоставена на държавата, може да доведе до прекомерна намеса и намаляване на индивидуалните свободи в полза на централизирания контрол.
reviewed: true
question: None Tocqueville abona gute uburenganzira bwo gukora?
answer: Tocqueville arwanya uburenganzira bwo gukora kandi atinya ko bushobora gutuma umuntu agira statism no gutakaza umwidegemvyo w’umuntu ku giti ciwe.
wrong_answers:
  - Tocqueville ashigikiye uburenganzira bwo gukora kandi abona ko Leta ikwiye guha abanyagihugu bose akazi keza.
  - Tocqueville abona ko uburenganzira bwo gukora ari ingingo ngenderwako y’agaciro ariko ko igoye gushirwa mu ngiro neza kandi mu buryo bubereye.
  - Tocqueville ntavuga neza aho ahagaze ku bijanye n’uburenganzira bwo gukora.
explanation: |
  Tocqueville arwanya uburenganzira bwo gukora, atinya ko iyo nshingano Leta yahawe yoshobora gutuma habaho ukwinjira mu bintu birenze urugero no kugabanya umwidegemvyo w’umuntu ku giti ciwe, kugira ngo haboneke ubugenzuzi bushingiye ku rwego rwo hejuru.
reviewed: true
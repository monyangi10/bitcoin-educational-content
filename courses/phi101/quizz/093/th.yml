question: มุมมองของ Tocqueville เกี่ยวกับสิทธิในการทำงานคืออะไร?
answer: Tocqueville ต่อต้านสิทธิในการทำงานและกลัวว่ามันอาจนำไปสู่การรวมศูนย์อำนาจของรัฐและการสูญเสียเสรีภาพส่วนบุคคล
wrong_answers:
  - Tocqueville สนับสนุนสิทธิในการทำงานและเชื่อว่ารัฐควรรับประกันงานที่เหมาะสมให้กับพลเมืองทุกคน
  - Tocqueville คิดว่าสิทธิในการทำงานเป็นหลักการที่สูงส่ง แต่ยากที่จะนำไปปฏิบัติอย่างมีประสิทธิภาพและเป็นธรรม
  - Tocqueville ไม่ได้ระบุชัดเจนถึงจุดยืนของเขาเกี่ยวกับสิทธิในการทำงาน
explanation: |
  Tocqueville คัดค้านสิทธิในการทำงาน โดยเกรงว่าความรับผิดชอบนี้ที่มอบให้แก่รัฐอาจนำไปสู่การแทรกแซงที่มากเกินไปและการลดเสรีภาพของปัจเจกบุคคล เพื่อสนับสนุนการควบคุมแบบรวมศูนย์
reviewed: true
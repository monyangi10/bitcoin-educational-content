question: 일할 권리에 대한 토크빌의 관점은 무엇인가요?
answer: 토크빌은 일할 권리에 반대하며 이것이 국가주의와 개인의 자유 상실로 이어질 수 있다고 우려했습니다.
wrong_answers:
  - 토크빌은 일할 권리를 지지하며 국가가 모든 시민에게 양질의 일자리를 보장해야 한다고 믿었습니다.
  - 토크빌은 일할 권리는 고귀한 원칙이지만 효과적이고 공정하게 구현하기는 어렵다고 생각했습니다.
  - 토크빌은 일할 권리에 대한 자신의 입장을 명확하게 밝히지 않았습니다.
explanation: |
  토크빌은 국가에 주어진 이러한 책임이 중앙집권적 통제를 위해 과도한 개입주의와 개인의 자유를 축소할 수 있다고 우려하며 일할 권리에 반대했습니다.
reviewed: true
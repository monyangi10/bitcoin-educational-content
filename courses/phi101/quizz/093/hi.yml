question: टॉकविल के नज़रिए में "काम का अधिकार" क्या है?
answer: टॉकविल काम के अधिकार के खिलाफ है और उसे डर है कि यह राज्यवाद और व्यक्तिगत स्वतंत्रता के नुकसान की ओर ले जा सकता है।
wrong_answers:
  - टॉकविल काम करने के अधिकार के पक्ष में है और मानता है कि सरकार को सभी नागरिकों को एक सभ्य नौकरी की गारंटी देनी चाहिए।
  - टोकविल का मानना है कि काम का अधिकार एक महान सिद्धांत है, लेकिन इसे प्रभावी और न्यायपूर्ण तरीके से लागू करना मुश्किल है।
  - टॉकविल ने काम के अधिकार पर अपना रुख साफ़-साफ़ नहीं बताया।
explanation: |
  टॉकविल काम करने के अधिकार का विरोध करते हैं, क्योंकि उन्हें डर है कि राज्य को यह ज़िम्मेदारी देने से अत्यधिक हस्तक्षेपवाद और व्यक्तिगत स्वतंत्रताओं में कमी आ सकती है, जिससे केंद्रीकृत नियंत्रण को बढ़ावा मिलेगा।

question: پادشاهان از چه ابزارهایی برای اثبات حاکمیت خود در برابر کلیسا استفاده می‌کردند؟
answer: همه پاسخ‌های دیگر صحیح هستند.
wrong_answers:
  - توسعه یک دستگاه دولتی متمرکز و قدرتمند.
  - ایجاد سیستم‌های قانونی و مالیاتی خودشان.
  - ارتش‌ها را بسیج کردن و جنگ‌ها را علیه کلیسا به راه انداختن.
explanation: |
  برای تأکید بر حاکمیت خود در برابر کلیسا، پادشاهان قدرت خود را با متمرکز کردن دولت، ایجاد سیستم‌های قانونی و مالی خود و گاهی با اعزام ارتش‌ها برای به چالش کشیدن نفوذ کلیسایی تقویت کردند.
reviewed: false
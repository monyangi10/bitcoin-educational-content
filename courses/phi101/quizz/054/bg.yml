question: Какви средства са използвали кралете, за да утвърдят суверенитета си срещу Църквата?
answer: Всички останали отговори са верни.
wrong_answers:
  - Развитието на централизиран и мощен държавен апарат.
  - Създаване на собствени правни и данъчни системи.
  - Събиране на армии и водене на войни срещу Църквата.
explanation: |
  За да отстояват суверенитета си срещу Църквата, кралете укрепват властта си, като централизират държавата, създават свои собствени правни и данъчни системи, а понякога изпращат армии, за да оспорят църковното влияние.
reviewed: true
question: Vilka medel använde kungar för att hävda sin suveränitet mot kyrkan?
answer: Alla de andra svaren är korrekta.
wrong_answers:
  - Utvecklingen av en centraliserad och kraftfull statsapparat.
  - Skapandet av egna rätts- och skattesystem.
  - Upprätta arméer och föra krig mot kyrkan.
explanation: |
  För att hävda sin suveränitet gentemot kyrkan stärkte kungarna sin makt genom att centralisera staten, upprätta egna rätts- och skattesystem och ibland genom att sätta in arméer för att utmana det kyrkliga inflytandet.
reviewed: true
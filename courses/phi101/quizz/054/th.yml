question: กษัตริย์ใช้วิธีใดในการยืนยันอำนาจอธิปไตยของตนต่อสู้กับคริสตจักร?
answer: คำตอบอื่น ๆ ทั้งหมดถูกต้อง
wrong_answers:
  - การพัฒนากลไกรัฐที่มีศูนย์กลางและทรงพลัง
  - การสร้างระบบกฎหมายและการเงินของตนเอง
  - การระดมกองทัพและทำสงครามกับคริสตจักร
explanation: |
  เพื่อยืนยันอธิปไตยของพวกเขาต่อคริสตจักร กษัตริย์ได้เสริมสร้างอำนาจของตนโดยการรวมศูนย์รัฐ จัดตั้งระบบกฎหมายและการคลังของตนเอง และบางครั้งโดยการส่งกองทัพเพื่อท้าทายอิทธิพลของศาสนจักร
reviewed: true
question: Ni uburyo ubuhe abami bakoresha kugira ngo bemeze ubusegaba bwabo kuri Ekleziya?
answer: Ibindi bisubizo vyose ni ukuri.
wrong_answers:
  - Gutegura igikoresho ca Leta gihurikiye hamwe kandi gikomeye.
  - Gushinga uburyo bwabo bwite bwo gukurikiza amategeko n’ivy’ubutunzi.
  - Guhagurutsa ingabo no gutera intambara Ekleziya.
explanation: |
  Kugira ngo abami bemeze ubusegaba bwabo kuri Ekleziya, barakomeza ububasha bwabo mu gushiramwo Leta hamwe, bagashinga amategeko yabo n’ivy’ubutunzi, rimwe na rimwe bagatuma ingabo zirwanya akosho k’ishengero.
reviewed: true
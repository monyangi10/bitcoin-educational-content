question: Jakich środków używali królowie, aby zapewnić sobie suwerenność przeciwko Kościołowi?
answer: Wszystkie pozostałe odpowiedzi są poprawne.
wrong_answers:
  - Rozwój scentralizowanego i potężnego aparatu państwowego.
  - Stworzenie własnych systemów prawnych i podatkowych.
  - Tworzenie armii i prowadzenie wojen przeciwko Kościołowi.
explanation: |
  Aby zapewnić sobie suwerenność przeciwko Kościołowi, królowie wzmocnili swoją władzę poprzez centralizację państwa, ustanowienie własnych systemów prawnych i fiskalnych, a czasem poprzez rozmieszczenie armii w celu podważenia wpływów kościelnych.

question: Koja su sredstva kraljevi koristili da potvrde svoj suverenitet protiv Crkve?
answer: Svi ostali odgovori su tačni.
wrong_answers:
  - Razvoj centralizovanog i moćnog državnog aparata.
  - Stvaranje sopstvenih pravnih i fiskalnih sistema.
  - Podizanje vojski i vođenje ratova protiv Crkve.
explanation: |
  Da bi potvrdili svoj suverenitet protiv Crkve, kraljevi su jačali svoju moć centralizacijom države, uspostavljanjem sopstvenih pravnih i fiskalnih sistema, a ponekad i raspoređivanjem vojski kako bi osporili crkveni uticaj.

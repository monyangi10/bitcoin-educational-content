question: Каква е била позицията на училището в Саламанка относно покръстването на индианците?
answer: Това трябва да стане чрез убеждаване.
wrong_answers:
  - Трябваше да се действа със сила.
  - Това изобщо не трябва да се прави.
  - Те не заеха позиция по този въпрос.
explanation: |
  Училището в Саламанка се застъпва за покръстването на индианците чрез убеждаване, като по този начин зачита свободата на съвестта им и отхвърля всякаква насилствена принуда в съответствие с принципите на естественото право и зачитането на човешките права.
reviewed: true
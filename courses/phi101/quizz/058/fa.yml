question: موضع مدرسه سالامانکا در مورد تبدیل سرخپوستان چه بود؟
answer: این کار باید از طریق ترغیب انجام شود.
wrong_answers:
  - باید با زور انجام می‌شد.
  - این کار نباید اصلاً انجام شود.
  - آن‌ها در این مورد موضع‌گیری نکردند.
explanation: |
  مکتب سالامانکا از تبدیل سرخپوستان از طریق ترغیب حمایت می‌کرد و بدین ترتیب به آزادی وجدان آن‌ها احترام می‌گذاشت و هرگونه اجبار خشونت‌آمیز را رد می‌کرد، که این مطابق با اصول حقوق طبیعی و احترام به حقوق بشر آن‌ها بود.
reviewed: false
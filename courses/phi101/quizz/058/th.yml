question: ตำแหน่งของโรงเรียนซาลามังกาเกี่ยวกับการเปลี่ยนศาสนาของชาวอินเดียนแดงคืออะไร?
answer: ควรทำผ่านการชักชวน
wrong_answers:
  - มันต้องทำด้วยกำลัง
  - ไม่ควรทำเลย
  - พวกเขาไม่ได้แสดงความคิดเห็นในประเด็นนี้
explanation: |
  โรงเรียนแห่งซาลามังกาได้สนับสนุนการเปลี่ยนศาสนาของชาวอินเดียนผ่านการชักชวน โดยเคารพเสรีภาพในการคิดของพวกเขาและปฏิเสธการบังคับใช้ความรุนแรงใด ๆ ตามหลักการของกฎหมายธรรมชาติและการเคารพสิทธิมนุษยชนของพวกเขา
reviewed: true
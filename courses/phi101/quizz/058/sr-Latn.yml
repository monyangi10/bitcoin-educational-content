question: Kakva je bila pozicija Škole iz Salamanke o konverziji Indijanaca?
answer: To treba uraditi kroz ubeđivanje.
wrong_answers:
  - To je moralo biti urađeno silom.
  - To uopšte ne bi trebalo raditi.
  - Nisu zauzeli stav po ovom pitanju.
explanation: |
  Škola iz Salamanke zalagala se za preobraćenje Indijanaca putem ubeđivanja, čime se poštovala njihova sloboda savesti i odbacivala svaka nasilna prinuda, u skladu sa njihovim principima prirodnog prava i poštovanja ljudskih prava.

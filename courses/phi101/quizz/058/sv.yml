question: Hur ställde sig Salamancaskolan till omvändelsen av indianerna?
answer: Det bör ske genom övertalning.
wrong_answers:
  - Det var tvunget att ske med våld.
  - Det borde inte göras överhuvudtaget.
  - De tog inte ställning i denna fråga.
explanation: |
  Salamancaskolan förespråkade att indianerna skulle omvändas genom övertalning, med respekt för deras samvetsfrihet och utan våldsamt tvång, i enlighet med deras principer om naturrätt och respekt för mänskliga rättigheter.
reviewed: true
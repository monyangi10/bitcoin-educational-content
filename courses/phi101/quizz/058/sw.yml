question: Je! Shule ya Salamanca ilikuwa na msimamo gani juu ya uongofu wa Wahindi?
answer: Inapaswa kufanywa kwa njia ya ushawishi.
wrong_answers:
  - Ilibidi ifanywe kwa nguvu.
  - Haipaswi kufanywa kabisa.
  - Hawakuwa na msimamo juu ya suala hili.
explanation: |
  Shule ya Salamanca ilitetea ubadilishaji wa Wahindi kupitia ushawishi, na hivyo kuheshimu uhuru wao wa dhamiri na kukataa shuruti yoyote ya jeuri, kwa mujibu wa kanuni zao za sheria ya asili na kuheshimu haki za binadamu.

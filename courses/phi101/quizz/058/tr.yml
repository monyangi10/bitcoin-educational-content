question: Salamanca Okulu'nun Kızılderililerin din değiştirmesi konusundaki tutumu neydi?
answer: Bu ikna yoluyla yapılmalıdır.
wrong_answers:
  - Zorla yapılması gerekiyordu.
  - Bu hiç yapılmamalıdır.
  - Bu konuda bir pozisyon almadılar.
explanation: |
  Salamanca Okulu, doğal hukuk ve insan haklarına saygı ilkelerine uygun olarak, Kızılderililerin ikna yoluyla din değiştirmelerini savunmuş, böylece vicdan özgürlüklerine saygı göstermiş ve şiddet içeren her türlü zorlamayı reddetmiştir.
reviewed: true
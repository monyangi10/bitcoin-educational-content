question: Jakie było stanowisko Szkoły w Salamance w sprawie nawracania Indian?
answer: Powinno się to odbywać poprzez perswazję.
wrong_answers:
  - Trzeba było to zrobić siłą.
  - W ogóle nie powinno się tego robić.
  - Nie zajęli oni stanowiska w tej sprawie.
explanation: |
  Szkoła z Salamanki opowiadała się za nawróceniem Indian poprzez perswazję, szanując w ten sposób ich wolność sumienia i odrzucając wszelki brutalny przymus, zgodnie z ich zasadami prawa naturalnego i poszanowania praw człowieka.

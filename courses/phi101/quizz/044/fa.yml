question: چگونه تأکید بر آزادی انسان در الهیات مسیحی قرون وسطی به توسعه تفکر مدرن کمک کرد؟
answer: همه پاسخ‌های فوق صحیح هستند.
wrong_answers:
  - این به پرسشگری از اقتدار سیاسی و تأکید بر آزادی وجدان منجر شد.
  - این زمینه را برای دفاع از حقوق فردی فراهم کرد.
  - این امر توسعه علم تجربی و تحقیق عقلانی را تقویت کرد.
explanation: |
  ادعای آزادی انسان در الهیات مسیحی قرون وسطی راه را برای اندیشه مدرن هموار کرد، با تشویق به خودمختاری وجدان، ایجاد پایه‌های حقوق فردی و ترویج رویکردی عقلانی و تجربی به دانش.
reviewed: false
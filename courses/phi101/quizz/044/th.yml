question: การยืนยันเสรีภาพของมนุษย์ในเทววิทยาคริสเตียนยุคกลางมีส่วนช่วยในการพัฒนาความคิดสมัยใหม่อย่างไร?
answer: คำตอบทั้งหมดข้างต้นถูกต้อง
wrong_answers:
  - มันนำไปสู่การตั้งคำถามเกี่ยวกับอำนาจทางการเมืองและการยืนยันเสรีภาพแห่งมโนธรรม
  - มันได้วางรากฐานสำหรับการปกป้องสิทธิส่วนบุคคล
  - มันส่งเสริมการพัฒนาวิทยาศาสตร์เชิงทดลองและการวิจัยอย่างมีเหตุผล
explanation: |
  การยืนยันเสรีภาพของมนุษย์ในเทววิทยาคริสเตียนยุคกลางได้ปูทางไปสู่ความคิดสมัยใหม่โดยการส่งเสริมความเป็นอิสระของมโนธรรม วางรากฐานสำหรับสิทธิส่วนบุคคล และส่งเสริมแนวทางการใช้เหตุผลและการทดลองเพื่อความรู้
reviewed: true
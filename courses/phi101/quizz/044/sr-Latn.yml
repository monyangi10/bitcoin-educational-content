question: Kako je tvrdnja o ljudskoj slobodi u srednjovekovnoj hrišćanskoj teologiji doprinela razvoju modernog mišljenja?
answer: Svi gore navedeni odgovori su tačni.
wrong_answers:
  - To je dovelo do preispitivanja političkog autoriteta i afirmacije slobode savesti.
  - Postavilo je temelje za odbranu individualnih prava.
  - Podstakao je razvoj eksperimentalne nauke i racionalnog istraživanja.
explanation: |
  Afirmacija ljudske slobode u srednjovekovnoj hrišćanskoj teologiji otvorila je put modernoj misli podsticanjem autonomije savesti, postavljanjem temelja za individualna prava i promovisanjem racionalnog i eksperimentalnog pristupa znanju.
reviewed: false
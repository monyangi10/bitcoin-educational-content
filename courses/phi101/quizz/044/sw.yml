question: Madai ya uhuru wa binadamu katika teolojia ya Kikristo ya zama za kati yalichangiaje maendeleo ya mawazo ya kisasa?
answer: Majibu yote hapo juu ni sahihi.
wrong_answers:
  - Iliongoza kwenye kuhojiwa kwa mamlaka ya kisiasa na kudai uhuru wa dhamiri.
  - Iliweka msingi wa utetezi wa haki za mtu binafsi.
  - Ilikuza maendeleo ya sayansi ya majaribio na utafiti wa busara.
explanation: |
  Madai ya uhuru wa binadamu katika teolojia ya Kikristo ya zama za kati yalifungua njia kwa mawazo ya kisasa kwa kuhimiza uhuru wa dhamiri, kuweka msingi wa haki za mtu binafsi, na kukuza mtazamo wa busara na wa majaribio kwa ujuzi.
reviewed: false
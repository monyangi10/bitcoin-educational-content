question: Как утвърждаването на човешката свобода в средновековното християнско богословие е допринесло за развитието на модерната мисъл?
answer: Всички отговори по-горе са верни.
wrong_answers:
  - Това доведе до оспорване на политическата власт и утвърждаване на свободата на съвестта.
  - Той постави основите на защитата на индивидуалните права.
  - Той насърчава развитието на експерименталната наука и рационалните изследвания.
explanation: |
  Утвърждаването на човешката свобода в средновековното християнско богословие проправя пътя на модерната мисъл, като насърчава автономията на съвестта, полага основите на индивидуалните права и насърчава рационалния и експериментален подход към познанието.
reviewed: true
question: W jaki sposób twierdzenie o ludzkiej wolności w średniowiecznej teologii chrześcijańskiej przyczyniło się do rozwoju współczesnej myśli?
answer: Wszystkie powyższe odpowiedzi są prawidłowe.
wrong_answers:
  - Doprowadziło to do zakwestionowania władzy politycznej i zapewnienia wolności sumienia.
  - Położył on podwaliny pod obronę praw jednostki.
  - Sprzyjało to rozwojowi nauk eksperymentalnych i racjonalnych badań.
explanation: |
  Zapewnienie ludzkiej wolności w średniowiecznej teologii chrześcijańskiej utorowało drogę nowoczesnej myśli, zachęcając do autonomii sumienia, kładąc podwaliny pod prawa jednostki oraz promując racjonalne i eksperymentalne podejście do wiedzy.
reviewed: false
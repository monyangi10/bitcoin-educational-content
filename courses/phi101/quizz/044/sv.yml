question: Hur bidrog hävdandet av människans frihet i den medeltida kristna teologin till utvecklingen av det moderna tänkandet?
answer: Alla ovanstående svar är korrekta.
wrong_answers:
  - Det ledde till att den politiska makten ifrågasattes och att samvetsfriheten hävdades.
  - Den lade grunden för ett försvar av individuella rättigheter.
  - Den främjade utvecklingen av experimentell vetenskap och rationell forskning.
explanation: |
  Den medeltida kristna teologins hävdande av människans frihet banade väg för det moderna tänkandet genom att uppmuntra samvetets autonomi, lägga grunden för individuella rättigheter och främja ett rationellt och experimentellt förhållningssätt till kunskap.
reviewed: true
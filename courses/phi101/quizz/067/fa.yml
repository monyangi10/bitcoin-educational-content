question: مرکزیت ایده‌ی ولتر در مورد گذرگاه بورس لندن Exchange چیست؟
answer: تاجران از تمام ادیان اختلافات خود را کنار می‌گذارند تا بر سود متقابل تمرکز کنند.
wrong_answers:
  - ادیان مختلف جهان در Stock Exchange گرد هم می‌آیند تا ایمان خود را در آرامش تمرین کنند.
  - بازار بورس لندن Exchange مکانی برای سفته‌بازی و فساد است که در آن ارزش‌های اخلاقی نادیده گرفته می‌شوند.
  - مذهب در دنیای کسب‌وکار که تحت سلطه روحیه رقابت و فردگرایی است، جایی ندارد.
explanation: |
  ولتر تأکید می‌کند که در بورس لندن Exchange، تاجران از تفاوت‌های مذهبی خود فراتر می‌روند تا برای دستیابی به یک هدف اقتصادی مشترک همکاری کنند، که اولویت منافع مادی بر تقسیمات مذهبی را نشان می‌دهد.
reviewed: false
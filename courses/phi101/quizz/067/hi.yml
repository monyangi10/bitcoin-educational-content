question: वॉल्टेयर के लंदन स्टॉक Exchange वाले पैसेज का मुख्य विचार क्या है?
answer: सभी धर्मों के व्यापारी आपसी मतभेद भुलाकर आपसी फायदे पर ध्यान देते हैं।
wrong_answers:
  - दुनिया के अलग-अलग धर्मों के लोग शांति से अपने धर्म का पालन करने के लिए स्टॉक Exchange पर इकट्ठा होते हैं।
  - लंदन स्टॉक Exchange एक सट्टेबाज़ी और भ्रष्टाचार की जगह है जहाँ नैतिक मूल्यों को ताक पर रख दिया जाता है।
  - धर्म का व्यापार की दुनिया में कोई स्थान नहीं है, जो प्रतिस्पर्धा और व्यक्तिवाद की भावना से प्रभावित है।
explanation: |
  वोल्टेयर ने बताया है कि, लंदन स्टॉक Exchange पर, व्यापारी अपने धार्मिक मतभेदों से ऊपर उठकर एक साझा आर्थिक लक्ष्य के लिए मिलकर काम करते हैं, जो दिखाता है कि भौतिक स्वार्थ धार्मिक विभाजनों से ऊपर होता है।

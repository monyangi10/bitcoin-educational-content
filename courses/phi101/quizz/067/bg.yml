question: Каква е основната идея на пасажа на Волтер за Лондонската борса Exchange?
answer: Бизнесмените от всички религии оставят настрана различията си, за да се съсредоточат върху взаимната печалба.
wrong_answers:
  - Различните религии по света се събират в Stock Exchange, за да практикуват вярата си в мир.
  - Лондонската фондова борса Exchange е място за спекулации и корупция, където моралните ценности се пренебрегват.
  - Религията няма място в света на бизнеса, доминиран от дух на конкуренция и индивидуализъм.
explanation: |
  Волтер подчертава, че на Лондонската фондова борса Exchange бизнесмените преодоляват религиозните си различия, за да си сътрудничат за постигането на обща икономическа цел, което показва превъзходството на материалния интерес над религиозните различия.
reviewed: true
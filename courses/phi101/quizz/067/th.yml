question: แนวคิดหลักของข้อความของโวลแตร์เกี่ยวกับตลาดหลักทรัพย์ลอนดอน Exchange คืออะไร?
answer: นักธุรกิจทุกศาสนาวางความแตกต่างไว้เพื่อมุ่งเน้นที่ผลกำไรร่วมกัน
wrong_answers:
  - ศาสนาต่าง ๆ ของโลกมารวมตัวกันที่ Stock Exchange เพื่อปฏิบัติศรัทธาของพวกเขาอย่างสงบสุข
  - ตลาดหลักทรัพย์ลอนดอน Exchange เป็นสถานที่ของการเก็งกำไรและการทุจริตที่ซึ่งค่านิยมทางศีลธรรมถูกละเลย
  - ศาสนาไม่มีที่ทางในโลกธุรกิจที่ถูกครอบงำด้วยจิตวิญญาณแห่งการแข่งขันและปัจเจกนิยม
explanation: |
  โวลแตร์เน้นย้ำว่า ที่ตลาดหลักทรัพย์ลอนดอน Exchange นักธุรกิจสามารถก้าวข้ามความแตกต่างทางศาสนาเพื่อร่วมมือกันสู่เป้าหมายทางเศรษฐกิจร่วมกัน ซึ่งแสดงให้เห็นถึงความสำคัญของผลประโยชน์ทางวัตถุเหนือความแตกต่างทางศาสนา
reviewed: true
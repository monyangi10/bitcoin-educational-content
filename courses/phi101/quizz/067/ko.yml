question: 볼테르가 런던 주식 Exchange에 대해 언급한 구절의 핵심 사상은 무엇인가요?
answer: 모든 종교의 사업가들은 서로의 차이를 제쳐두고 상호 이익에 집중합니다.
wrong_answers:
  - 전 세계의 다양한 종교인들이 평화롭게 신앙을 실천하기 위해 스톡 Exchange에 모입니다.
  - 런던증권거래소 Exchange는 도덕적 가치가 무시되는 투기와 부패의 장소입니다.
  - 경쟁과 개인주의 정신이 지배하는 비즈니스 세계에서 종교는 설 자리가 없습니다.
explanation: |
  볼테르는 런던 만국회의에서 사업가들이 종교적 차이를 초월하여 공동의 경제적 목표를 향해 협력하는 모습을 통해 종교적 분열보다 물질적 이익이 우선한다는 점을 강조합니다.
reviewed: true
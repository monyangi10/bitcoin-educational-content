question: อะไรคือสิ่งที่มักเป็นจุดสนใจในตำราเรียนประวัติศาสตร์แบบดั้งเดิม?
answer: การพิชิตทางทหารและชีวประวัติของผู้นำ
wrong_answers:
  - การพัฒนาของแนวคิดและขบวนการทางปรัชญา
  - การต่อสู้เพื่อเสรีภาพและสิทธิส่วนบุคคล
  - ความก้าวหน้าทางวิทยาศาสตร์และเทคโนโลยี
explanation: |
  ในตำราเรียนประวัติศาสตร์แบบดั้งเดิม มักจะเน้นไปที่การพิชิตทางทหารและชีวประวัติของผู้นำ จึงละเลยผลกระทบของแนวคิด การเคลื่อนไหวทางสังคม และความก้าวหน้าในด้านอื่นๆ
reviewed: true
question: पारंपरिक इतिहास की किताबों में अक्सर क्या चीज़ पर ध्यान दिया जाता है?
answer: सैन्य विजय और नेताओं की जीवनियाँ
wrong_answers:
  - विचारों और दार्शनिक आंदोलनों का विकास
  - आज़ादी और व्यक्तिगत अधिकारों के लिए संघर्ष
  - वैज्ञानिक और तकनीकी प्रगति
explanation: |
  पारंपरिक इतिहास की किताबों में, ज़्यादा ज़ोर अक्सर सैन्य जीत और नेताओं की जीवनियों पर दिया जाता है, जिससे विचारों, सामाजिक आंदोलनों और दूसरे क्षेत्रों में हुई तरक्की के असर को नज़रअंदाज़ कर दिया जाता है।
reviewed: false
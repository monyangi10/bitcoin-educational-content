question: تمرکز اغلب در کتاب‌های درسی تاریخ سنتی بر چیست؟
answer: فتوحات نظامی و زندگینامه‌های رهبران
wrong_answers:
  - توسعه ایده‌ها و جنبش‌های فلسفی
  - مبارزات برای آزادی و حقوق فردی
  - پیشرفت‌های علمی و فناوری
explanation: |
  در کتاب‌های درسی تاریخ سنتی، تأکید اغلب بر فتوحات نظامی و زندگی‌نامه‌های رهبران قرار می‌گیرد و بدین ترتیب تأثیر ایده‌ها، جنبش‌های اجتماعی و پیشرفت‌ها در سایر زمینه‌ها نادیده گرفته می‌شود.
reviewed: false
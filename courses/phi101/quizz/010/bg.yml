question: На какво често се обръща внимание в традиционните учебници по история?
answer: Военни завоевания и биографии на лидери
wrong_answers:
  - Развитие на идеи и философски движения
  - Борбите за свобода и индивидуални права
  - Научни и технологични постижения
explanation: |
  В традиционните учебници по история акцентът често се поставя върху военните завоевания и биографиите на лидерите, като по този начин се пренебрегва влиянието на идеите, социалните движения и напредъка в други области.
reviewed: true
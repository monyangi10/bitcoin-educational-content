question: हायेक के अनुसार उदारवाद को समाजवाद से क्या अलग करता है?
answer: इन उद्देश्यों को प्राप्त करने के लिए उपयोग किये जाने वाले साधन।
wrong_answers:
  - पीछा समाप्त होता है.
  - बुद्धिजीवियों की भूमिका.
  - ऊपर के सभी।
explanation: |
  हायेक के अनुसार उदारवाद और समाजवाद के बीच मूलभूत अंतर साधनों में निहित है: उदारवाद व्यक्तिगत स्वतंत्रता और मुक्त बाजार को बढ़ावा देता है, जबकि समाजवाद में राज्य का हस्तक्षेप और योजना शामिल होती है।

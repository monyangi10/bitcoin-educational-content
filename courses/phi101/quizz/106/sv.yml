question: Vad skiljer enligt Hayek liberalism från socialism?
answer: De medel som används för att uppnå dessa mål.
wrong_answers:
  - Den förföljda slutar.
  - De intellektuellas roll.
  - Allt det ovanstående.
explanation: |
  För Hayek ligger den grundläggande skillnaden mellan liberalism och socialism i medlen: liberalism främjar individuell frihet och den fria marknaden, medan socialism innebär statliga ingripanden och planering.
reviewed: true
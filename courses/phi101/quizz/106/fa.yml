question: طبق نظر هایک، چه چیزی لیبرالیسم را از سوسیالیسم متمایز می‌کند؟
answer: وسایلی که برای دستیابی به این اهداف استفاده می‌شوند.
wrong_answers:
  - تعقیب به پایان می‌رسد.
  - نقش روشنفکران.
  - همه موارد فوق.
explanation: |
  برای هایک، تفاوت اساسی بین لیبرالیسم و سوسیالیسم در وسایل نهفته است: لیبرالیسم آزادی فردی و بازار آزاد را ترویج می‌کند، در حالی که سوسیالیسم شامل مداخلات دولتی و برنامه‌ریزی است.
reviewed: false
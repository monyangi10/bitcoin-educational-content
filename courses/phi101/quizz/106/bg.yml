question: Според Хайек какво отличава либерализма от социализма?
answer: Средствата, използвани за постигане на тези цели.
wrong_answers:
  - Преследваният завършва.
  - Ролята на интелектуалците.
  - Всичко изброено по-горе.
explanation: |
  За Хайек основната разлика между либерализма и социализма се състои в средствата: либерализмът насърчава индивидуалната свобода и свободния пазар, докато социализмът включва държавна намеса и планиране.
reviewed: true
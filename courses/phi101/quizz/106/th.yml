question: ตามที่ฮาเย็คกล่าว อะไรที่ทำให้ลัทธิเสรีนิยมแตกต่างจากลัทธิสังคมนิยม?
answer: วิธีการที่ใช้เพื่อบรรลุเป้าหมายเหล่านี้
wrong_answers:
  - การไล่ล่าสิ้นสุดลง
  - บทบาทของปัญญาชน
  - ทั้งหมดที่กล่าวมา
explanation: |
  สำหรับฮาเย็ค ความแตกต่างพื้นฐานระหว่างลัทธิเสรีนิยมและสังคมนิยมอยู่ที่วิธีการ: ลัทธิเสรีนิยมส่งเสริมเสรีภาพส่วนบุคคลและตลาดเสรี ในขณะที่สังคมนิยมเกี่ยวข้องกับการแทรกแซงและการวางแผนของรัฐ
reviewed: true
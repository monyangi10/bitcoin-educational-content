question: Prema Hayeku, šta razlikuje liberalizam od socijalizma?
answer: Sredstva korišćena za postizanje ovih ciljeva.
wrong_answers:
  - Progonjeni ciljevi.
  - Uloga intelektualaca.
  - Sve od navedenog.
explanation: |
  Za Hayeka, osnovna razlika između liberalizma i socijalizma leži u sredstvima: liberalizam promoviše individualnu slobodu i slobodno tržište, dok socijalizam uključuje državne intervencije i planiranje.
reviewed: false
question: Kulingana na Murray Rothbard, ni nini nguvu inayoongoza ya historia?
answer: Mgogoro kati ya nguvu ya kijamii na nguvu ya serikali
wrong_answers:
  - Mapambano kati ya tabaka za kijamii
  - Maendeleo ya kisayansi na kiteknolojia
  - Majibu mengine yote ni sahihi.
explanation: |
  Murray Rothbard anasema kwamba mgongano kati ya mamlaka ya kijamii, ambayo inawakilisha ushirikiano na uzalishaji, na mamlaka ya serikali, ambayo inataka kudhibiti na kunyonya, ndiyo nguvu ya kweli ya kuendesha matukio ya kihistoria na maendeleo ya kijamii.

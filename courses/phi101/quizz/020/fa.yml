question: طبق نظر موری راتبارد، نیروی محرکه تاریخ چیست؟
answer: تضاد بین قدرت اجتماعی و قدرت دولتی
wrong_answers:
  - مبارزه بین طبقات اجتماعی
  - پیشرفت علمی و فناوری
  - همه پاسخ‌های دیگر صحیح هستند.
explanation: |
  موری راتبارد استدلال می‌کند که تضاد بین قدرت اجتماعی، که نمایانگر همکاری و تولید است، و قدرت دولتی، که به دنبال کنترل و بهره‌برداری است، نیروی محرکه واقعی پشت رویدادهای تاریخی و تحولات اجتماعی است.
reviewed: false
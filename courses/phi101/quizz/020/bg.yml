question: Според Мъри Ротбард коя е движещата сила на историята?
answer: Конфликтът между социалната и държавната власт
wrong_answers:
  - Борбата между социалните класи
  - Научен и технологичен напредък
  - Всички останали отговори са верни.
explanation: |
  Мъри Ротбард твърди, че конфликтът между социалната власт, която представлява сътрудничество и производство, и държавната власт, която се стреми да контролира и експлоатира, е истинската движеща сила на историческите събития и социалното развитие.
reviewed: true
question: Prema Murrayju Rothbardu, pokretačka snaga istorije je ljudska akcija vođena individualnim interesima i ekonomskim motivima.
answer: Sukob između društvene moći i državne moći
wrong_answers:
  - Borba između društvenih klasa
  - Naučni i tehnološki napredak
  - Svi ostali odgovori su tačni.
explanation: |
  Murray Rothbard tvrdi da je sukob između društvene moći, koja predstavlja saradnju i proizvodnju, i državne moći, koja nastoji da kontroliše i eksploatiše, prava pokretačka snaga iza istorijskih događaja i društvenih razvoja.

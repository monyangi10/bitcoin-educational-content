question: Murray Rothbard'a göre tarihin itici gücü nedir?
answer: Toplumsal güç ve devlet gücü arasındaki çatışma
wrong_answers:
  - Sosyal sınıflar arasındaki mücadele
  - Bilimsel ve teknolojik ilerleme
  - Diğer tüm cevaplar doğrudur.
explanation: |
  Murray Rothbard, işbirliğini ve üretimi temsil eden toplumsal güç ile kontrol etmeyi ve sömürmeyi amaçlayan devlet gücü arasındaki çatışmanın, tarihsel olayların ve toplumsal gelişmelerin ardındaki gerçek itici güç olduğunu savunur.
reviewed: true
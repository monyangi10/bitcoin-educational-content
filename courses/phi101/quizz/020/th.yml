question: ตามที่ Murray Rothbard กล่าวไว้ อะไรคือแรงผลักดันของประวัติศาสตร์?
answer: ความขัดแย้งระหว่างอำนาจทางสังคมและอำนาจรัฐ
wrong_answers:
  - การต่อสู้ระหว่างชนชั้นทางสังคม
  - ความก้าวหน้าทางวิทยาศาสตร์และเทคโนโลยี
  - คำตอบอื่น ๆ ทั้งหมดถูกต้อง
explanation: |
  Murray Rothbard โต้แย้งว่าความขัดแย้งระหว่างอำนาจทางสังคม ซึ่งเป็นตัวแทนของความร่วมมือและการผลิต กับอำนาจของรัฐที่มุ่งควบคุมและแสวงหาผลประโยชน์ เป็นแรงผลักดันที่แท้จริงเบื้องหลังเหตุการณ์ทางประวัติศาสตร์และการพัฒนาทางสังคม
reviewed: true
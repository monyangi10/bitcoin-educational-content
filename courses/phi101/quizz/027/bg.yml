question: Каква е разликата между phusis и nomos?
answer: Phusis е природният закон, а nomos е човешкият закон.
wrong_answers:
  - Phusis е законът на боговете, а nomos е законът на хората.
  - Phusis е законът на слабите, а nomos е законът на силните.
  - Phusis е законът на древността, а nomos е законът на съвремието.
explanation: |
  В гръцката философия phusis се отнася до природните закони или тези, които са присъщи на природата и не зависят от човешките действия, докато nomos се отнася до човешките закони, създадени от обществата, за да регулират живота в общността.
reviewed: true
question: تفاوت بین فوسیس و نوموس چیست؟
answer: فوسیس قانون طبیعت است، نوموس قانون انسانی است.
wrong_answers:
  - فوسیس قانون خدایان است، نوموس قانون انسان‌ها.
  - فوسیس قانون ضعیفان است، نوموس قانون قدرتمندان.
  - فوسیس قانون باستان است، نوموس قانون دوران مدرن است.
explanation: |
  در فلسفه یونان، فوسیس به قوانین طبیعی یا آن‌هایی که ذاتی طبیعت هستند و مستقل از اعمال انسانی اشاره دارد، در حالی که نوموس به قوانین انسانی اشاره دارد که توسط جوامع برای تنظیم زندگی در جامعه ایجاد شده‌اند.
reviewed: false
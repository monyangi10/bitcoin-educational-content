question: ความแตกต่างระหว่าง phusis และ nomos คืออะไร?
answer: Phusis คือกฎของธรรมชาติ, nomos คือกฎหมายของมนุษย์.
wrong_answers:
  - Phusis คือกฎของเทพเจ้า, nomos คือกฎของมนุษย์.
  - Phusis คือกฎของผู้ที่อ่อนแอ, nomos คือกฎของผู้ที่แข็งแกร่ง
  - Phusis คือกฎหมายของสมัยโบราณ, nomos คือกฎหมายของยุคสมัยใหม่
explanation: |
  ในปรัชญากรีก, phusis หมายถึงกฎธรรมชาติหรือสิ่งที่มีอยู่ในธรรมชาติเอง, ซึ่งไม่ขึ้นอยู่กับการกระทำของมนุษย์, ในขณะที่ nomos หมายถึงกฎหมายของมนุษย์, ที่สร้างขึ้นโดยสังคมเพื่อควบคุมชีวิตในชุมชน.
reviewed: true
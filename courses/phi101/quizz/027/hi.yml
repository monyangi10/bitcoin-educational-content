question: फ़ुसिस और नोमोस में क्या अंतर है?
answer: फ़ुसिस प्रकृति का नियम है, नोमोस मानव का कानून है।
wrong_answers:
  - फुसिस देवताओं का कानून है, नोमोस इंसानों का कानून है।
  - फूसिस कमजोरों का कानून है, नोमोस ताकतवरों का कानून है।
  - फुसिस प्राचीन काल का नियम है, नोमोस आधुनिक समय का नियम है।
explanation: |
  ग्रीक दर्शन में, 'फ्यूसिस' (phusis) प्राकृतिक नियमों या उन चीज़ों को कहते हैं जो प्रकृति में खुद-ब-खुद मौजूद हैं, इंसानों के कामों से अलग। वहीं 'नोमोस' (nomos) इंसानों द्वारा बनाए गए क़ानूनों को कहते हैं, जो समाज ने मिल-जुलकर रहने के लिए बनाए हैं।

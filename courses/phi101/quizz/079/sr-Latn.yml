question: Zašto je ideja spontanog poretka važna za liberalnu misao?
answer: Pokazuje da pojedinci, sledeći svoje interese, mogu unaprediti dobrobit društva u celini.
wrong_answers:
  - Opravdava važnu ulogu vlade u ekonomiji.
  - Ističe važnost kolektivnih emocija.
  - Svi gore navedeni odgovori su tačni.
explanation: |
  Ideja spontanog reda je centralna za liberalnu misao jer sugeriše da, bez intervencije države, individualne akcije vođene sopstvenim interesom prirodno vode ka korisnoj ravnoteži za celo društvo.

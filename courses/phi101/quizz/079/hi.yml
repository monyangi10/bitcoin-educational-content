question: स्वतःस्फूर्त व्यवस्था (spontaneous order) का विचार उदारवादी सोच (liberal thought) के लिए क्यों महत्वपूर्ण है?
answer: यह दिखाता है कि व्यक्ति अपने स्वार्थ को पूरा करके पूरे समाज की भलाई को बढ़ावा दे सकते हैं।
wrong_answers:
  - यह अर्थव्यवस्था में सरकार की महत्वपूर्ण भूमिका को सही ठहराता है।
  - यह सामूहिक भावनाओं के महत्व पर जोर देता है।
  - ऊपर दिए गए सभी जवाब सही हैं।
explanation: |
  स्वतः उत्पन्न व्यवस्था (spontaneous order) का विचार उदारवादी सोच का मूल है क्योंकि यह दिखाता है कि बिना सरकारी हस्तक्षेप के, स्वार्थ से प्रेरित व्यक्तिगत कार्य स्वाभाविक रूप से पूरे समाज के लिए फायदेमंद संतुलन ले आते हैं।
reviewed: false
question: Varför är idén om spontan ordning viktig för det liberala tänkandet?
answer: Det visar att individer, genom att driva sina egna intressen, kan främja välbefinnandet i samhället som helhet.
wrong_answers:
  - Det rättfärdigar statens viktiga roll i ekonomin.
  - Det understryker vikten av kollektiva känslor.
  - Alla ovanstående svar är korrekta.
explanation: |
  Idén om spontan ordning är central för det liberala tänkandet eftersom den innebär att individuella handlingar som styrs av egenintresse, utan statlig inblandning, på ett naturligt sätt leder till en gynnsam jämvikt för hela samhället.
reviewed: true
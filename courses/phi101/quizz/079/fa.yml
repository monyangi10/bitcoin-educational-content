question: چرا ایده نظم خودجوش برای تفکر لیبرال مهم است؟
answer: این نشان می‌دهد که افراد با دنبال کردن منافع خود می‌توانند به رفاه جامعه به‌طور کلی کمک کنند.
wrong_answers:
  - این نقش مهم دولت در اقتصاد را توجیه می‌کند.
  - بر اهمیت احساسات جمعی تأکید می‌کند.
  - همه پاسخ‌های فوق صحیح هستند.
explanation: |
  ایده نظم خودجوش در اندیشه لیبرال مرکزی است زیرا نشان می‌دهد که بدون مداخله دولت، اقدامات فردی که توسط منافع شخصی هدایت می‌شوند به طور طبیعی به یک تعادل سودمند برای کل جامعه منجر می‌شوند.
reviewed: false
question: Защо идеята за спонтанния ред е важна за либералната мисъл?
answer: Тя показва, че индивидите, преследвайки собствените си интереси, могат да насърчават благосъстоянието на обществото като цяло.
wrong_answers:
  - Той обосновава важната роля на правителството в икономиката.
  - Той подчертава значението на колективните емоции.
  - Всички отговори по-горе са верни.
explanation: |
  Идеята за спонтанния ред е централна за либералната мисъл, защото предполага, че без държавна намеса индивидуалните действия, водени от личния интерес, естествено водят до благоприятно равновесие за цялото общество.
reviewed: true
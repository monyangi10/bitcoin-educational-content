question: Je, ni matokeo gani kuu ya sera ya udhibiti wa bei iliyotekelezwa na Mtawala Diocletian?
answer: Ilisababisha uhaba wa bidhaa na kuongezeka kwa soko nyeusi.
wrong_answers:
  - Ilisaidia kuleta utulivu wa bei na kupunguza mfumuko wa bei.
  - Iliimarisha nguvu za mfalme na kuongeza umaarufu wake kati ya watu.
  - Ilichangia kuongezeka kwa rasilimali za kijeshi.
explanation: |
  Sera ya Diocletian ya kudhibiti bei iliunda upotoshaji wa kiuchumi, na kusababisha uhaba na kuhimiza maendeleo ya soko nyeusi, kwani bei zilizowekwa hazikuonyesha ukweli wa Supply na mahitaji.

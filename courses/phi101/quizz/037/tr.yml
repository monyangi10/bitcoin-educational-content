question: İmparator Diocletianus tarafından uygulanan fiyat kontrol politikasının temel sonucu nedir?
answer: Bu durum mal kıtlığına ve karaborsada artışa yol açtı.
wrong_answers:
  - Fiyatların dengelenmesine ve enflasyonun kontrol altına alınmasına yardımcı oldu.
  - Bu, imparatorun gücünü pekiştirdi ve halk arasındaki popülaritesini artırdı.
  - Askeri kaynakların artmasına katkıda bulunmuştur.
explanation: |
  Diocletianus'un fiyat kontrol politikası ekonomik çarpıklıklara yol açmış, belirlenen fiyatlar Supply ve talep gerçeklerini tam olarak yansıtmadığı için kıtlıklara ve karaborsanın gelişmesine neden olmuştur.
reviewed: true
question: Vilken är den viktigaste konsekvensen av den priskontrollpolitik som kejsar Diocletianus genomförde?
answer: Det ledde till brist på varor och en ökning av den svarta marknaden.
wrong_answers:
  - Det bidrog till att stabilisera priserna och dämpa inflationen.
  - Det stärkte kejsarens makt och ökade hans popularitet bland folket.
  - Det bidrog till att de militära resurserna ökade.
explanation: |
  Diocletianus priskontrollpolitik skapade ekonomiska snedvridningar, vilket ledde till brist och utveckling av en svart marknad, eftersom de fastställda priserna inte exakt återspeglade verkligheten av Supply och efterfrågan.
reviewed: true
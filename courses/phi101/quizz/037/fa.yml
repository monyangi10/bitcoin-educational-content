question: پیامد اصلی سیاست کنترل قیمت که توسط امپراتور دیوکلتیان اجرا شد چیست؟
answer: این منجر به کمبود کالا و افزایش بازار سیاه شد.
wrong_answers:
  - این به تثبیت قیمت‌ها و مهار تورم کمک کرد.
  - این امر قدرت امپراتور را تقویت کرد و محبوبیت او را در میان مردم افزایش داد.
  - این به افزایش منابع نظامی کمک کرد.
explanation: |
  سیاست کنترل قیمت دیوکلتیان باعث ایجاد اختلالات اقتصادی شد، که منجر به کمبودها و تشویق به توسعه بازار سیاه گردید، زیرا قیمت‌های تعیین‌شده واقعیت Supply و تقاضا را منعکس نمی‌کردند.
reviewed: false
question: सम्राट डायोक्लेशियन द्वारा लागू की गई कीमत नियंत्रण नीति का मुख्य परिणाम क्या था?
answer: इससे सामान की कमी हो गई और कालाबाजारी बढ़ गई।
wrong_answers:
  - इसने कीमतों को स्थिर करने और मुद्रास्फीति को रोकने में मदद की।
  - इससे सम्राट की ताकत मजबूत हुई और लोगों के बीच उसकी लोकप्रियता बढ़ गई।
  - इसने सैन्य संसाधनों में वृद्धि में योगदान दिया।
explanation: |
  डायोक्लेशियन की कीमत नियंत्रण नीति ने आर्थिक विकृतियाँ पैदा कर दीं, जिससे कमी हो गई और काले बाजार के विकास को बढ़ावा मिला, क्योंकि तय कीमतें Supply और मांग की वास्तविकता को नहीं दर्शाती थीं।
reviewed: false
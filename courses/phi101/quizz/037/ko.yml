question: 디오클레티아누스 황제가 시행한 물가 통제 정책의 주요 결과는 무엇인가요?
answer: 이로 인해 상품이 부족해지고 암시장이 증가했습니다.
wrong_answers:
  - 이는 물가를 안정시키고 인플레이션을 억제하는 데 도움이 되었습니다.
  - 황제의 권력이 강화되고 백성들 사이에서 황제의 인기가 높아졌습니다.
  - 이는 군사 자원의 증가에 기여했습니다.
explanation: |
  디오클레티아누스의 가격 통제 정책은 경제 왜곡을 일으켰고, 설정된 가격이 Supply의 현실과 수요를 정확하게 반영하지 못해 공급 부족과 암시장의 발달을 초래했습니다.
reviewed: true
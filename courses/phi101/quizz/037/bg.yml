question: Каква е основната последица от политиката на ценови контрол, въведена от император Диоклециан?
answer: Това доведе до недостиг на стоки и увеличаване на черния пазар.
wrong_answers:
  - Това помогна за стабилизиране на цените и ограничаване на инфлацията.
  - Това укрепва властта на императора и увеличава популярността му сред народа.
  - Това допринесе за увеличаване на военните ресурси.
explanation: |
  Политиката на Диоклециан за контрол на цените води до икономически изкривявания, в резултат на което се стига до недостиг и развитие на черен пазар, тъй като определените цени не отразяват точно реалното търсене и предлагане.
reviewed: true
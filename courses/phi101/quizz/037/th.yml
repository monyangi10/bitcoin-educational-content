question: ผลลัพธ์หลักของนโยบายควบคุมราคาที่จักรพรรดิไดโอคลีเชียนนำมาใช้คืออะไร?
answer: มันนำไปสู่การขาดแคลนสินค้าและการเพิ่มขึ้นของตลาดมืด
wrong_answers:
  - มันช่วยรักษาเสถียรภาพของราคาและควบคุมเงินเฟ้อ
  - มันเสริมสร้างอำนาจของจักรพรรดิและเพิ่มความนิยมของเขาในหมู่ประชาชน
  - มันมีส่วนทำให้ทรัพยากรทางทหารเพิ่มขึ้น
explanation: |
  นโยบายการควบคุมราคาของไดโอคลีเชียนสร้างความบิดเบือนทางเศรษฐกิจ ส่งผลให้เกิดการขาดแคลนและการพัฒนาตลาดมืด เนื่องจากราคาที่กำหนดไม่สะท้อนความเป็นจริงของอุปสงค์และอุปทานอย่างถูกต้อง
reviewed: true
question: Kulingana na Physiocrats, ni nini asili ya utaratibu wa kiuchumi?
answer: Sheria za asili za soko.
wrong_answers:
  - Maamuzi ya serikali.
  - Sheria ya kimataifa.
  - Mapendeleo ya aristocracy.
explanation: |
  Wanafiziokrati waliamini kwamba utaratibu wa kiuchumi unatokana na sheria za asili za soko, wakisisitiza kwamba, bila kuingilia kati, soko linaelekea kwenye usawa unaohakikisha ustawi wa jumla.

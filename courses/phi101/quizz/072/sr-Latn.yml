question: Prema fiziokratama, šta je poreklo ekonomskog poretka?
answer: Prirodni zakoni tržišta.
wrong_answers:
  - Vladine odluke.
  - Međunarodno pravo.
  - Privilegije aristokratije.
explanation: |
  Fiziokrati su verovali da ekonomski poredak proizilazi iz prirodnih zakona tržišta, tvrdeći da, bez intervencije, tržište teži ravnoteži koja osigurava opštu prosperitet.

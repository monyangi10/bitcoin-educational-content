question: Wat is volgens de fysiocraten de oorsprong van de economische orde?
answer: De natuurlijke wetten van de markt.
wrong_answers:
  - Regeringsbesluiten.
  - Internationaal recht.
  - De privileges van de aristocratie.
explanation: |
  De Fysiocraten geloofden dat de economische orde voortkwam uit de natuurlijke wetten van de markt en beweerden dat de markt, zonder tussenkomst, neigt naar een evenwicht dat zorgt voor algemene welvaart.
reviewed: true
question: ตามแนวคิดของฟิสิโอแครต ต้นกำเนิดของระเบียบเศรษฐกิจคืออะไร?
answer: กฎธรรมชาติของตลาด
wrong_answers:
  - การตัดสินใจของรัฐบาล
  - กฎหมายระหว่างประเทศ
  - อภิสิทธิ์ของชนชั้นสูง
explanation: |
  นักสรีรศาสตร์เชื่อว่า ระเบียบเศรษฐกิจเกิดจากกฎธรรมชาติของตลาด โดยยืนยันว่า หากไม่มีการแทรกแซง ตลาดจะมีแนวโน้มไปสู่ความสมดุลที่รับประกันความเจริญรุ่งเรืองทั่วไป
reviewed: true
question: फिजियोक्रेट्स के अनुसार, आर्थिक व्यवस्था की उत्पत्ति क्या है?
answer: बाज़ार के प्राकृतिक नियम।
wrong_answers:
  - सरकारी फैसले।
  - अंतरराष्ट्रीय कानून।
  - अमीरों के विशेषाधिकार।
explanation: |
  फिजियोक्रेट्स का मानना था कि आर्थिक व्यवस्था बाजार के प्राकृतिक नियमों से उत्पन्न होती है, और उनका दावा था कि बिना किसी हस्तक्षेप के, बाजार स्वयं ही संतुलन की ओर बढ़ता है जो सामान्य समृद्धि सुनिश्चित करता है।
reviewed: false
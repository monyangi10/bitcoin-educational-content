question: Какъв е произходът на икономическия ред според физиократите?
answer: Естествените закони на пазара.
wrong_answers:
  - Правителствени решения.
  - Международно право.
  - Привилегиите на аристокрацията.
explanation: |
  Физиократите смятат, че икономическият ред произтича от естествените закони на пазара, като твърдят, че без намеса пазарът се стреми към равновесие, което осигурява общо благоденствие.
reviewed: true
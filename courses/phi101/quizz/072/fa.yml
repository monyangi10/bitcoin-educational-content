question: طبق نظر فیزیوکرات‌ها، منشأ نظم اقتصادی چیست؟
answer: قوانین طبیعی بازار.
wrong_answers:
  - تصمیمات دولت.
  - قانون بین‌الملل.
  - امتیازات اشراف‌زادگان.
explanation: |
  فیزیوکرات‌ها بر این باور بودند که نظم اقتصادی از قوانین طبیعی بازار ناشی می‌شود و ادعا می‌کردند که بدون مداخله، بازار به سمت تعادلی می‌رود که رفاه عمومی را تضمین می‌کند.
reviewed: false
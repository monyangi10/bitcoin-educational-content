question: ตามที่อริสโตเติลกล่าวไว้ เสรีภาพคืออะไร?
answer: การเชื่อฟังกฎหมายของเมือง
wrong_answers:
  - การไม่มีข้อจำกัดใด ๆ
  - อำนาจในการทำสิ่งที่ต้องการ
  - คำตอบอื่น ๆ ทั้งหมดถูกต้อง
explanation: |
  สำหรับอริสโตเติล เสรีภาพประกอบด้วยการเชื่อฟังกฎหมายของเมือง เนื่องจากกฎหมายเหล่านี้ถูกจัดตั้งขึ้นเพื่อประโยชน์ส่วนรวม เสรีภาพที่แท้จริงจะเกิดขึ้นภายในกรอบของความเป็นพลเมืองและการมีส่วนร่วมในชีวิตทางการเมือง
reviewed: true
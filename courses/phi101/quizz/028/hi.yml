question: अरस्तू के अनुसार, आज़ादी क्या है?
answer: शहर के कानून का पालन करना
wrong_answers:
  - किसी भी पाबंदी का न होना
  - जो चाहे वो करने की ताक़त
  - बाकी सभी जवाब सही हैं।
explanation: |
  अरस्तू के लिए, आज़ादी शहर के कानूनों का पालन करने में है, क्योंकि ये कानून सबके भले के लिए बनाए गए हैं। असली आज़ादी नागरिकता और राजनीतिक जीवन में हिस्सा लेने के दायरे में ही मिलती है।

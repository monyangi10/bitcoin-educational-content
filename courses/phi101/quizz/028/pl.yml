question: Czym według Arystotelesa jest wolność?
answer: Posłuszeństwo wobec prawa miejskiego
wrong_answers:
  - Brak jakichkolwiek ograniczeń
  - Moc robienia tego, co się chce
  - Wszystkie pozostałe odpowiedzi są poprawne.
explanation: |
  Dla Arystotelesa wolność polega na przestrzeganiu praw miasta, ponieważ są one ustanawiane dla wspólnego dobra. Prawdziwa wolność jest realizowana w ramach obywatelstwa i uczestnictwa w życiu politycznym.

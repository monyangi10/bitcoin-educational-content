question: Nk’uko Aristote abivuga, umwidegemvyo ni iki?
answer: Kumvira itegeko ry’igisagara .
wrong_answers:
  - Kubura inzitizi iyo ari yo yose
  - Ububasha bwo gukora ivyo umuntu ashaka vyose .
  - Ibindi bisubizo vyose ni ukuri.
explanation: |
  Ku bwa Aristote, umwidegemvyo ni ukugamburuka amategeko y’igisagara, kuko ayo mategeko ashirwaho ku bw’ineza ya bose. Umwidegemvyo nyawo ushikwako mu rwego rw’ubwenegihugu no kugira uruhara mu buzima bwa politike.
reviewed: true
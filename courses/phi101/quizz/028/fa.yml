question: طبق نظر ارسطو، آزادی چیست؟
answer: اطاعت از قانون شهر
wrong_answers:
  - عدم وجود هرگونه محدودیت
  - قدرت انجام هر کاری که کسی می‌خواهد
  - همه پاسخ‌های دیگر صحیح هستند.
explanation: |
  برای ارسطو، آزادی در اطاعت از قوانین شهر است، زیرا این قوانین برای خیر عمومی وضع شده‌اند. آزادی واقعی در چارچوب شهروندی و مشارکت در زندگی سیاسی محقق می‌شود.
reviewed: false
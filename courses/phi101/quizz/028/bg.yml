question: Какво е свободата според Аристотел?
answer: Подчинение на законите на града
wrong_answers:
  - Липсата на ограничения
  - Силата да правиш каквото си поискаш
  - Всички останали отговори са верни.
explanation: |
  За Аристотел свободата се състои в това да се подчиняваш на законите на града, тъй като те са създадени за общото благо. Истинската свобода се реализира в рамките на гражданството и участието в политическия живот.
reviewed: true
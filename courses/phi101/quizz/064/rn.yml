question: Nk’uko Jacques Le Goff abivuga, ni ryari iciyumviro c’inyungu zibereye catanguye gushirwaho?
answer: Mu kinjana ca 13.
wrong_answers:
  - Mu kinjana ca 11.
  - Mu kinjana ca 12.
  - Mu kinjana ca 14.
explanation: |
  Jacques Le Goff ashira inyigisho ya mbere y’inyungu zibereye mu kinjana ca 13, aho ico ciyumviro cavutse mu gihe c’uguzirikana mu vy’idini no mu vy’ubutunzi ku bijanye n’ugukoresha amahera n’imigenzo y’ubudandaji.
reviewed: true
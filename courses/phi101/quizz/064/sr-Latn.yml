question: Prema Jacquesu Le Goffu, pojam legitimnog interesa prvi put je teoretizovan u srednjem veku.
answer: U 13. veku.
wrong_answers:
  - U 11. veku.
  - U 12. veku.
  - U 14. veku.
explanation: |
  Jacques Le Goff postavlja prvu teorizaciju legitimnog interesa u 13. vek, gde se ova ideja pojavila u kontekstu teološke i ekonomske refleksije o korišćenju novca i komercijalnim praksama.

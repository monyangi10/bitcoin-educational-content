question: Jacques Le Goff'a göre meşru menfaat kavramı ilk olarak ne zaman teorize edilmiştir?
answer: 13. yüzyılda.
wrong_answers:
  - 11. yüzyılda.
  - 12. yüzyılda.
  - 14. yüzyılda.
explanation: |
  Jacques Le Goff, meşru menfaatin ilk kuramsallaştırılmasını 13. yüzyıla yerleştirir; bu fikir, paranın kullanımı ve ticari uygulamalar üzerine teolojik ve ekonomik düşünceler bağlamında ortaya çıkmıştır.
reviewed: true
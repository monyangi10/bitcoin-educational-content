question: به گفته ژاک لو گوف، مفهوم علاقه مشروع برای اولین بار چه زمانی نظریه‌پردازی شد؟
answer: در قرن سیزدهم.
wrong_answers:
  - در قرن یازدهم.
  - در قرن دوازدهم.
  - در قرن چهاردهم.
explanation: |
  ژاک لو گوف اولین نظریه‌پردازی از علاقه مشروع را در قرن سیزدهم قرار می‌دهد، جایی که این ایده در زمینه‌ای از تأملات الهیاتی و اقتصادی درباره استفاده از پول و شیوه‌های تجاری پدیدار شد.
reviewed: false
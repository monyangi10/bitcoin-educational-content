question: Според Жак Льо Гоф кога за първи път е теоретично обосновано понятието "законен интерес"?
answer: През 13 век.
wrong_answers:
  - През 11 век.
  - През 12 век.
  - През 14 век.
explanation: |
  Жак Льо Гоф поставя първата теоретична обосновка на законния интерес през XIII в., когато тази идея възниква в контекста на теологични и икономически размисли за използването на парите и търговските практики.
reviewed: true
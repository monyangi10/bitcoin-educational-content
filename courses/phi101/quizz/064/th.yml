question: ตามที่ Jacques Le Goff กล่าวไว้ แนวคิดเรื่องความสนใจที่ชอบธรรมถูกทฤษฎีขึ้นครั้งแรกเมื่อใด?
answer: ในศตวรรษที่ 13
wrong_answers:
  - ในศตวรรษที่ 11
  - ในศตวรรษที่ 12
  - ในศตวรรษที่ 14
explanation: |
  Jacques Le Goff วางแนวคิดแรกเกี่ยวกับความสนใจที่ชอบธรรมในศตวรรษที่ 13 ซึ่งแนวคิดนี้เกิดขึ้นในบริบทของการสะท้อนทางเทววิทยาและเศรษฐกิจเกี่ยวกับการใช้เงินและการปฏิบัติทางการค้า
reviewed: true
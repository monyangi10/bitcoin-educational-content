question: जैक्स ले गॉफ़ के अनुसार, वैध हित (legitimate interest) की अवधारणा पहली बार कब सिद्धांतित की गई थी?
answer: 13वीं सदी में।
wrong_answers:
  - 11वीं सदी में।
  - 12वीं सदी में।
  - 14वीं सदी में।
explanation: |
  जैक्स ले गॉफ़ ने 13वीं सदी में वैध हित की पहली सैद्धांतिक व्याख्या की है, जहाँ यह विचार धन के उपयोग और व्यावसायिक प्रथाओं पर धार्मिक और आर्थिक चिंतन के संदर्भ में उभरा।
reviewed: false
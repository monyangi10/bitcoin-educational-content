question: คำวิจารณ์หลักของชาวออสเตรียเกี่ยวกับทฤษฎีการต่อสู้ทางชนชั้นของมาร์กซิสต์คืออะไร?
answer: พวกเขาโต้แย้งแนวคิดที่ว่าสังคมถูกแบ่งออกเป็นสองชนชั้นที่เป็นปฏิปักษ์กัน
wrong_answers:
  - พวกเขาอ้างว่าเศรษฐกิจเป็นแหล่งหลักของความขัดแย้งทางสังคม ไม่ใช่การต่อสู้ทางชนชั้น
  - พวกเขาปฏิเสธแนวคิดที่ว่าคนงานได้รับค่าจ้างต่ำเกินไป
  - คำตอบอื่น ๆ ทั้งหมดถูกต้อง
explanation: |
  ชาวออสเตรียปฏิเสธมุมมองของมาร์กซิสต์ที่ว่าด้วยสังคมที่แบ่งออกเป็นสองชนชั้นที่เป็นปฏิปักษ์กัน โดยเชื่อว่าปฏิสัมพันธ์ทางเศรษฐกิจนั้นตั้งอยู่บนพื้นฐานของความร่วมมือโดยสมัครใจมากกว่าความขัดแย้งเชิงโครงสร้างระหว่างชนชั้น
reviewed: true
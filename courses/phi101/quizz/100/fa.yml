question: انتقاد اصلی اتریشی‌ها نسبت به نظریه مبارزه طبقاتی مارکسیستی چیست؟
answer: آن‌ها با این ایده که جامعه به دو طبقه متخاصم تقسیم شده است، مخالفت می‌کنند.
wrong_answers:
  - آنها ادعا می‌کنند که اقتصاد منبع اصلی درگیری‌های اجتماعی است، نه مبارزه طبقاتی.
  - آن‌ها ایده‌ی اینکه کارگر کم‌دستمزد است را رد می‌کنند.
  - همه پاسخ‌های دیگر صحیح هستند.
explanation: |
  اتریشی‌ها دیدگاه مارکسیستی مبنی بر تقسیم جامعه به دو طبقه متخاصم را رد می‌کنند و بر این باورند که تعاملات اقتصادی بر اساس همکاری داوطلبانه استوار است نه بر اساس تضادهای ساختاری بین طبقات.
reviewed: false
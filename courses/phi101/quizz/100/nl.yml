question: Wat is de belangrijkste kritiek van de Oostenrijkers op de marxistische theorie van de klassenstrijd?
answer: Ze bestrijden het idee dat de samenleving verdeeld is in twee antagonistische klassen.
wrong_answers:
  - Ze beweren dat de economie de belangrijkste bron is van sociale conflicten, niet de klassenstrijd.
  - Ze verwerpen het idee dat de arbeider onderbetaald wordt.
  - Alle andere antwoorden zijn juist.
explanation: |
  De Oostenrijkers verwerpen de marxistische visie van een samenleving die verdeeld is in twee antagonistische klassen en geloven dat economische interacties gebaseerd zijn op vrijwillige samenwerking in plaats van op structurele conflicten tussen klassen.
reviewed: true
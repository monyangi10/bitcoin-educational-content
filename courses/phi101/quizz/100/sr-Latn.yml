question: Koja je glavna kritika Austrijanaca u vezi sa marksističkom teorijom klasne borbe?
answer: Oni osporavaju ideju da je društvo podeljeno na dve antagonističke klase.
wrong_answers:
  - Tvrde da je ekonomija glavni izvor društvenih sukoba, a ne klasna borba.
  - Oni odbacuju ideju da je radnik potplaćen.
  - Svi ostali odgovori su tačni.
explanation: |
  Austrijanci odbacuju marksistički pogled na društvo podeljeno na dve antagonističke klase, verujući da su ekonomske interakcije zasnovane na dobrovoljnoj saradnji, a ne na strukturnim sukobima između klasa.

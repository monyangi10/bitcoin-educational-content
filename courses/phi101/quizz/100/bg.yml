question: Каква е основната критика на австрийците по отношение на марксистката теория за класовата борба?
answer: Те оспорват идеята, че обществото е разделено на две антагонистични класи.
wrong_answers:
  - Те твърдят, че икономиката е основният източник на социални конфликти, а не класовата борба.
  - Те отхвърлят идеята, че работникът е недостатъчно заплатен.
  - Всички други отговори са верни.
explanation: |
  Австрийците отхвърлят марксисткия възглед за общество, разделено на две антагонистични класи, като смятат, че икономическите взаимодействия се основават на доброволно сътрудничество, а не на структурни конфликти между класите.
reviewed: true
question: 마르크스주의 계급투쟁 이론에 대한 오스트리아 인들의 주요 비판은 무엇인가요?
answer: 그들은 사회가 두 개의 적대적인 계급으로 나뉘어져 있다는 생각에 이의를 제기합니다.
wrong_answers:
  - 그들은 계급 투쟁이 아니라 경제가 사회 갈등의 주요 원인이라고 주장합니다.
  - 그들은 근로자가 임금을 적게 받는다는 생각을 거부합니다.
  - 다른 모든 답은 정답입니다.
explanation: |
  오스트리아 사람들은 사회를 두 개의 적대적인 계급으로 나눈 마르크스주의적 관점을 거부하며, 경제적 상호작용은 계급 간의 구조적 갈등이 아니라 자발적인 협력에 기반한다고 믿습니다.
reviewed: true
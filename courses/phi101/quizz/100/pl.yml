question: Jaka jest główna krytyka Austriaków dotycząca marksistowskiej teorii walki klas?
answer: Kwestionują oni pogląd, że społeczeństwo jest podzielone na dwie antagonistyczne klasy.
wrong_answers:
  - Twierdzą oni, że głównym źródłem konfliktów społecznych jest gospodarka, a nie walka klas.
  - Odrzucają oni pogląd, że pracownik otrzymuje zbyt niskie wynagrodzenie.
  - Wszystkie pozostałe odpowiedzi są poprawne.
explanation: |
  Austriacy odrzucają marksistowski pogląd o społeczeństwie podzielonym na dwie antagonistyczne klasy, wierząc, że interakcje gospodarcze opierają się na dobrowolnej współpracy, a nie na strukturalnych konfliktach między klasami.
reviewed: false
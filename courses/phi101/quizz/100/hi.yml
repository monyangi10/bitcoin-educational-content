question: ऑस्ट्रियाई लोग मार्क्सवादी वर्ग संघर्ष के सिद्धांत पर क्या मुख्य आपत्ति उठाते हैं?
answer: वे इस विचार से असहमत हैं कि समाज दो विरोधी वर्गों में बंटा हुआ है।
wrong_answers:
  - वे दावा करते हैं कि अर्थव्यवस्था सामाजिक संघर्षों का मुख्य स्रोत है, न कि वर्ग संघर्ष।
  - वे इस बात को नकारते हैं कि मजदूर को कम वेतन मिलता है।
  - बाकी सारे जवाब सही हैं।
explanation: |
  ऑस्ट्रियाई लोग मार्क्सवादी विचार को नकारते हैं जो समाज को दो विरोधी वर्गों में बाँटता है। उनका मानना है कि आर्थिक संबंध स्वैच्छिक सहयोग पर आधारित होते हैं, न कि वर्गों के बीच संरचनात्मक संघर्ष पर।

question: Vilken är österrikarnas huvudsakliga kritik mot den marxistiska teorin om klasskampen?
answer: De ifrågasätter idén om att samhället är uppdelat i två antagonistiska klasser.
wrong_answers:
  - De hävdar att ekonomin är den främsta källan till sociala konflikter, inte klasskampen.
  - De förkastar tanken på att arbetstagaren är underbetald.
  - Alla andra svar är korrekta.
explanation: |
  Österrikarna förkastar den marxistiska synen på ett samhälle som är uppdelat i två antagonistiska klasser och anser att ekonomiska interaktioner bygger på frivilligt samarbete snarare än på strukturella konflikter mellan klasser.
reviewed: true
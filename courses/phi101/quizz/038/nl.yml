question: Wat is de belangrijkste stelling van Philippe Fabry over de oorzaken van de val van het Romeinse Rijk?
answer: De val van het Romeinse Rijk is het gevolg van een falend economisch systeem en interventionistisch imperialistisch beleid.
wrong_answers:
  - Het Romeinse Rijk stortte in door invasies van barbaren en de druk van Germaanse volkeren.
  - Het Romeinse Rijk bezweek onder een morele crisis en een verlies van traditionele waarden.
  - De val van het Romeinse Rijk is te wijten aan religieuze oorzaken en de uitbreiding van het christendom.
explanation: |
  Volgens Philippe Fabry is de val van het Romeinse Rijk het gevolg van een economisch systeem dat verzwakt is door sterke centralisatie en buitensporig staatsinterventionisme, waardoor de economische autonomie beperkt is en er interne onevenwichtigheden zijn ontstaan.
reviewed: true
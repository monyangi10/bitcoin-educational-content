question: วิทยานิพนธ์หลักของ Philippe Fabry เกี่ยวกับสาเหตุของการล่มสลายของจักรวรรดิโรมันคืออะไร?
answer: การล่มสลายของจักรวรรดิโรมันเป็นผลมาจากระบบเศรษฐกิจที่ล้มเหลวและนโยบายจักรวรรดิที่แทรกแซง
wrong_answers:
  - จักรวรรดิโรมันล่มสลายเนื่องจากการรุกรานของชนเผ่าบาร์บาเรียนและแรงกดดันจากชนเผ่าเยอรมานิก
  - จักรวรรดิโรมันล่มสลายเนื่องจากวิกฤตทางศีลธรรมและการสูญเสียคุณค่าดั้งเดิม
  - การล่มสลายของจักรวรรดิโรมันเกิดจากสาเหตุทางศาสนาและการขยายตัวของศาสนาคริสต์
explanation: |
  ตามที่ฟิลิปป์ ฟาบรีกล่าว การล่มสลายของจักรวรรดิโรมันเกิดจากระบบเศรษฐกิจที่อ่อนแอลงเนื่องจากการรวมศูนย์ที่เข้มแข็งและการแทรกแซงของรัฐที่มากเกินไป ซึ่งจำกัดความเป็นอิสระทางเศรษฐกิจและก่อให้เกิดความไม่สมดุลภายใน
reviewed: true
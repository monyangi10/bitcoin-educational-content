question: Каква е основната теза на Филип Фабри относно причините за падането на Римската империя?
answer: Падането на Римската империя е следствие от провала на икономическата система и интервенционистката имперска политика.
wrong_answers:
  - Римската империя се разпада поради варварските нашествия и натиска на германските народи.
  - Римската империя изпада в морална криза и загуба на традиционните ценности.
  - Падането на Римската империя се дължи на религиозни причини и на разпространението на християнството.
explanation: |
  Според Филип Фабри падането на Римската империя е резултат от икономическа система, отслабена от силна централизация и прекомерна държавна намеса, която ограничава икономическата автономия и води до вътрешни дисбаланси.
reviewed: true
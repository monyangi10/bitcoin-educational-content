question: फिलिप फैबरी के अनुसार रोमन साम्राज्य के पतन का मुख्य कारण क्या है?
answer: रोमन साम्राज्य का पतन एक असफल आर्थिक प्रणाली और हस्तक्षेपवादी साम्राज्यवादी नीति का नतीजा है।
wrong_answers:
  - रोमन साम्राज्य बर्बर आक्रमणों और जर्मनिक लोगों के दबाव की वजह से ढह गया।
  - रोमन साम्राज्य नैतिक संकट और पारंपरिक मूल्यों के क्षरण का शिकार हो गया।
  - रोमन साम्राज्य के पतन का कारण धार्मिक वजहें और ईसाई धर्म का फैलाव है।
explanation: |
  फिलिप फैब्री के मुताबिक, रोमन साम्राज्य का पतन एक कमजोर आर्थिक व्यवस्था की वजह से हुआ, जो अत्यधिक केंद्रीकरण और राज्य के ज्यादा हस्तक्षेप से कमजोर हो गई थी। इससे आर्थिक स्वायत्तता सीमित हो गई और आंतरिक असंतुलन पैदा हो गए।
reviewed: false
question: Ni nadharia gani kuu ya Philippe Fabry kuhusu sababu za kuanguka kwa Dola ya Kirumi?
answer: Kuanguka kwa Dola ya Kirumi ni matokeo ya mfumo dhaifu wa kiuchumi na sera ya kifalme ya kuingilia kati.
wrong_answers:
  - Milki ya Kirumi ilianguka kwa sababu ya uvamizi wa washenzi na shinikizo kutoka kwa watu wa Ujerumani.
  - Milki ya Roma ilishindwa na mzozo wa kimaadili na upotevu wa maadili ya kitamaduni.
  - Kuanguka kwa Dola ya Kirumi kunatokana na sababu za kidini na upanuzi wa Ukristo.
explanation: |
  Kulingana na Philippe Fabry, kuanguka kwa Milki ya Kirumi kunatokana na mfumo wa kiuchumi uliodhoofishwa na serikali kuu na uingiliaji mwingi wa serikali, kuzuia uhuru wa kiuchumi na kusababisha usawa wa ndani.

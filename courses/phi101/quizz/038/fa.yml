question: موضوع اصلی فیلیپ فابری در مورد علل سقوط امپراتوری روم چیست؟
answer: سقوط امپراتوری روم نتیجه یک سیستم اقتصادی ناکارآمد و سیاست امپریالیستی مداخله‌گر است.
wrong_answers:
  - امپراتوری روم به دلیل تهاجمات بربرها و فشار از سوی اقوام ژرمنی فروپاشید.
  - امپراتوری روم به یک بحران اخلاقی و از دست دادن ارزش‌های سنتی تسلیم شد.
  - سقوط امپراتوری روم به دلایل مذهبی و گسترش مسیحیت است.
explanation: |
  به گفته فیلیپ فابری، سقوط امپراتوری روم ناشی از یک سیستم اقتصادی است که به دلیل تمرکز شدید و مداخله‌گرایی بیش از حد دولت تضعیف شده و باعث محدودیت در خودمختاری اقتصادی و ایجاد عدم تعادل‌های داخلی شده است.
reviewed: false
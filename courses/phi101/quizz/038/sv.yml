question: Vilken är Philippe Fabrys huvudtes om orsakerna till romarrikets fall?
answer: Romarrikets fall är en följd av ett sviktande ekonomiskt system och en interventionistisk imperialistisk politik.
wrong_answers:
  - Romarriket kollapsade på grund av barbarinvasioner och påtryckningar från germanska folk.
  - Romarriket dukade under för en moralisk kris och en förlust av traditionella värderingar.
  - Romarrikets fall beror på religiösa orsaker och kristendomens utbredning.
explanation: |
  Enligt Philippe Fabry berodde romarrikets fall på ett ekonomiskt system som försvagades av stark centralisering och överdriven statlig interventionism, vilket begränsade den ekonomiska självständigheten och orsakade interna obalanser.
reviewed: true
question: Ni tofauti gani ya kimsingi kati ya mercantilism na biashara huria kulingana na fisiokrati?
answer: Mercantilism hutajirisha taifa moja kwa gharama ya wengine, wakati biashara huria hutajirisha mataifa yote.
wrong_answers:
  - Mercantilism ni mchezo wa jumla chanya, wakati biashara huria ni mchezo wa sifuri.
  - Mercantilism inakuza ushindani.
  - Biashara huria inakuza ubadilishaji.
explanation: |
  Kwa wanafisiokrasia, mercantilism inatokana na wazo kwamba taifa linajitajirisha lenyewe kwa gharama ya wengine, ilhali biashara huria inaruhusu manufaa yanayolingana, kutajirisha mataifa yote kupitia mabadilishano ya manufaa kwa pande zote mbili.

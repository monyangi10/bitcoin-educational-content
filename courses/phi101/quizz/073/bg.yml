question: Каква е основната разлика между меркантилизма и свободната търговия според физиократите?
answer: Меркантилизмът обогатява една нация за сметка на други, докато свободната търговия обогатява всички нации.
wrong_answers:
  - Меркантилизмът е игра с положителен резултат, докато свободната търговия е игра с нулев резултат.
  - Меркантилизмът насърчава конкуренцията.
  - Свободната търговия насърчава размяната.
explanation: |
  За физиократите меркантилизмът се основава на идеята, че една нация се обогатява за сметка на другите. За разлика от тях свободната търговия дава възможност за реципрочни ползи, като обогатява всички нации чрез взаимноизгоден обмен.
reviewed: true
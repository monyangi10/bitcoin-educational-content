question: फिजियोक्रेट्स के अनुसार, मर्केंटिलिज़्म और फ्री ट्रेड में मूलभूत अंतर क्या है?
answer: व्यापारवाद एक देश को दूसरों के नुकसान पर अमीर बनाता है, जबकि मुक्त व्यापार सभी देशों को समृद्ध करता है।
wrong_answers:
  - मर्केंटिलिज़्म एक पॉजिटिव-सम गेम है, जबकि फ्री ट्रेड एक जीरो-सम गेम है।
  - मर्केंटिलिज़्म प्रतिस्पर्धा को बढ़ावा देता है।
  - मुक्त व्यापार से अदला-बदली बढ़ती है।
explanation: |
  फिजियोक्रेट्स के लिए, मर्केंटिलिज़्म इस विचार पर आधारित है कि एक राष्ट्र दूसरों की कीमत पर खुद को समृद्ध करता है, जबकि मुक्त व्यापार पारस्परिक लाभ की अनुमति देता है, सभी राष्ट्रों को आपसी फायदेमंद विनिमय के जरिए समृद्ध करता है।
reviewed: false
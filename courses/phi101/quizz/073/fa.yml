question: تفاوت اساسی بین مرکانتیلیسم و تجارت آزاد از نظر فیزیوکرات‌ها چیست؟
answer: مرکانتیلیسم یک ملت را به بهای دیگران غنی می‌کند، در حالی که تجارت آزاد همه ملت‌ها را غنی می‌سازد.
wrong_answers:
  - مرکانتیلیسم یک بازی با مجموع مثبت است، در حالی که تجارت آزاد یک بازی با مجموع صفر است.
  - مرکانتیلیسم رقابت را ترویج می‌کند.
  - تجارت آزاد مبادله را ترویج می‌کند.
explanation: |
  برای فیزیوکرات‌ها، مرکانتیلیسم بر این ایده استوار است که یک ملت با هزینه دیگران خود را غنی می‌سازد، در حالی که تجارت آزاد اجازه می‌دهد تا از طریق مبادلات متقابل سودمند، همه ملت‌ها بهره‌مند شوند و غنی شوند.
reviewed: false
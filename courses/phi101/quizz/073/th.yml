question: ความแตกต่างพื้นฐานระหว่างลัทธิพาณิชยนิยมและการค้าเสรีตามแนวคิดของนักเศรษฐศาสตร์ฟิสิโอแครตคืออะไร?
answer: ลัทธิพาณิชย์นิยมทำให้ประเทศหนึ่งร่ำรวยขึ้นโดยแลกกับความเสียหายของประเทศอื่น ในขณะที่การค้าเสรีทำให้ทุกประเทศร่ำรวยขึ้น
wrong_answers:
  - ลัทธิพาณิชยนิยมเป็นเกมผลรวมบวก ในขณะที่การค้าเสรีเป็นเกมผลรวมศูนย์
  - ลัทธิพาณิชยนิยมส่งเสริมการแข่งขัน
  - การค้าเสรีส่งเสริมการแลกเปลี่ยน
explanation: |
  สำหรับนักสรีรศาสตร์ เศรษฐกิจแบบพาณิชย์นิยมมีพื้นฐานมาจากแนวคิดที่ว่าชาติหนึ่งร่ำรวยขึ้นโดยการเสียเปรียบของชาติอื่น ในทางตรงกันข้าม การค้าเสรีช่วยให้เกิดประโยชน์ซึ่งกันและกัน ทำให้ทุกชาติร่ำรวยขึ้นผ่านการแลกเปลี่ยนที่เป็นประโยชน์ร่วมกัน
reviewed: true
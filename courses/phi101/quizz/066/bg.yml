question: Каква е основната теза на Волтер за връзката между търговията и религиозната толерантност?
answer: Търговията насърчава хората да си сътрудничат и да зачитат мненията на другите, включително религиозните им убеждения, чрез общия стремеж към печалба.
wrong_answers:
  - Търговията обединява хората чрез общ мироглед, основан на научния метод.
  - Търговията насърчава лукса и мързела.
  - Всички останали отговори са верни.
explanation: |
  Волтер твърди, че търговията насърчава религиозната толерантност, като подтиква хората с различни убеждения да си сътрудничат и взаимно да зачитат мненията си в преследването на общи икономически интереси.
reviewed: true
question: วิทยานิพนธ์หลักของโวลแตร์เกี่ยวกับความเชื่อมโยงระหว่างการค้าและความอดทนทางศาสนาคืออะไร?
answer: การพาณิชย์ส่งเสริมให้ผู้คนร่วมมือกันและเคารพความคิดเห็นของกันและกัน รวมถึงความเชื่อทางศาสนาของพวกเขา ผ่านการแสวงหาผลกำไรร่วมกัน
wrong_answers:
  - การพาณิชย์รวมผู้คนผ่านมุมมองร่วมกันที่อิงตามวิธีการทางวิทยาศาสตร์
  - การพาณิชย์ส่งเสริมความหรูหราและความเกียจคร้าน
  - คำตอบอื่น ๆ ทั้งหมดถูกต้อง
explanation: |
  โวลแตร์โต้แย้งว่าการค้าส่งเสริมความอดทนทางศาสนาโดยกระตุ้นให้บุคคลที่มีความเชื่อต่างกันร่วมมือกันและเคารพความคิดเห็นของกันและกันในการแสวงหาผลประโยชน์ทางเศรษฐกิจร่วมกัน
reviewed: true
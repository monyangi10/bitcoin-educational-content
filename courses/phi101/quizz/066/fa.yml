question: تز اصلی ولتر در مورد ارتباط بین تجارت و تحمل مذهبی چیست؟
answer: تجارت مردم را تشویق می‌کند تا از طریق پیگیری مشترک سود، با یکدیگر همکاری کرده و به نظرات یکدیگر، از جمله باورهای مذهبی‌شان، احترام بگذارند.
wrong_answers:
  - تجارت مردم را از طریق یک جهان‌بینی مشترک مبتنی بر روش علمی متحد می‌کند.
  - تجارت تجمل و تنبلی را ترویج می‌کند.
  - همه پاسخ‌های دیگر صحیح هستند.
explanation: |
  ولتر استدلال می‌کند که تجارت باعث تقویت تساهل دینی می‌شود، زیرا افراد با باورهای مختلف را ترغیب می‌کند تا در جهت منافع اقتصادی مشترک با یکدیگر همکاری کرده و به نظرات یکدیگر احترام بگذارند.
reviewed: false
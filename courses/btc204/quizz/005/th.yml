question: อินพุตในธุรกรรมคืออะไร?
answer: การอ้างอิงถึง UTXO ที่ยังไม่ได้ใช้ก่อนหน้านี้
wrong_answers:
  - สัญญาณยืนยันจากนักขุด
  - บล็อกใหม่ถูกเพิ่มลงในบล็อกเชน
  - รหัสยืนยันเพื่อรักษาความปลอดภัยของการทำธุรกรรม
explanation: |
  อินพุตของแต่ละธุรกรรมเป็นการอ้างอิงถึง UTXO ซึ่งหมายถึงเอาต์พุตของธุรกรรมก่อนหน้า
reviewed: true
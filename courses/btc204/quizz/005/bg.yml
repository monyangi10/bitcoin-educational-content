question: Какво е вход в транзакция?
answer: Препратка към предишен неизползван UTXO.
wrong_answers:
  - Сигнал за потвърждение от миньорите.
  - В блокчейна беше добавен нов блок.
  - Код за проверка, за да се гарантира транзакцията.
explanation: |
  Всеки вход на транзакция е препратка към UTXO, т.е. към изхода на предишна транзакция.
reviewed: true
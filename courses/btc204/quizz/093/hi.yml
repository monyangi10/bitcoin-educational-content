question: Whirlpool में ट्रांजैक्शन Tx0 का मुख्य रोल क्या है?
answer: यूटीएक्सओ को बराबर करने के लिए।
wrong_answers:
  - पहला मिक्स करने के लिए।
  - पूल से UTXOs को हटाने के लिए।
  - मिश्रित UTXOs को खर्च करने के लिए।
explanation: |
Tx0 का उद्देश्य CoinJoin के लिए UTXOs को तैयार करना और बराबर करना है, उन्हें चुने गए पूल की राशि के अनुरूप इकाइयों में विभाजित करके, ताकि मिक्सिंग की एकरूपता सुनिश्चित की जा सके।

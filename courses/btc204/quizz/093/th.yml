question: บทบาทหลักของธุรกรรม Tx0 ใน Whirlpool คืออะไร?
answer: เพื่อทำให้ UTXOs เท่ากัน
wrong_answers:
  - เพื่อทำการผสมครั้งแรก
  - เพื่อลบ UTXOs ออกจากพูล
  - ใช้จ่าย UTXOs ที่ผสมแล้ว
explanation: |
  Tx0 มีเป้าหมายเพื่อเตรียมและทำให้ UTXOs เท่าเทียมกันสำหรับการ coinjoin โดยการแบ่งพวกมันออกเป็นหน่วยที่สอดคล้องกับจำนวนของพูลที่เลือกเพื่อให้แน่ใจว่าการผสมเป็นเนื้อเดียวกัน
reviewed: true
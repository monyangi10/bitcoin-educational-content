question: Каква е основната роля на транзакцията Tx0 в Whirlpool?
answer: Изравняване на UTXOs.
wrong_answers:
  - За да извършите първото смесване.
  - За да премахнете UTXO от пула.
  - Да изразходвате смесените UTXOs.
explanation: |
  Tx0 има за цел да подготви и уеднакви UTXO за съвместяването, като ги раздели на единици, съответстващи на количеството на избрания басейн, за да се осигури хомогенност на смесването.
  
reviewed: true

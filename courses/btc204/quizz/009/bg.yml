question: Кои са двата елемента, които съставляват възнаграждението за блок (coinbase транзакцията)?
answer: Субсидията за блокове и таксите за транзакции.
wrong_answers:
  - Субсидията за блок и бонусите за скорост.
  - Правата на емисии и премиите за сигурност.
  - Дивидентите mining и мрежовите данъци.
explanation: |
  Когато даден миньор открие валиден блок, той има право на възнаграждение, което се състои, от една страна, от субсидията за блока, а от друга - от таксите за транзакциите, включени в неговия блок.
reviewed: true

question: องค์ประกอบ 2 อย่างที่ประกอบขึ้นเป็นรางวัลบล็อกในธุรกรรม coinbase คืออะไร?
answer: เงินอุดหนุนบล็อกและค่าธรรมเนียมการทำธุรกรรม
wrong_answers:
  - เงินอุดหนุนบล็อกและโบนัสความเร็ว
  - สิทธิการปล่อยมลพิษและเบี้ยประกันความปลอดภัย
  - เงินปันผล mining และภาษีเครือข่าย
explanation: |
  เมื่อคนขุดเหมืองพบบล็อกที่ถูกต้อง พวกเขามีสิทธิ์ได้รับรางวัลซึ่งประกอบด้วยเงินอุดหนุนบล็อกในด้านหนึ่ง และค่าธรรมเนียมการทำธุรกรรมที่รวมอยู่ในบล็อกของพวกเขาในอีกด้านหนึ่ง
reviewed: true
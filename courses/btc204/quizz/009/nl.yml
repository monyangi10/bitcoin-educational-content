question: Wat zijn de 2 Elements die samen de Block reward vormen in een Coinbase Transaction?
answer: De bloksubsidie en de transactiekosten.
wrong_answers:
  - De bloksubsidie en de snelheidsbonussen.
  - De emissierechten en de veiligheidspremies.
  - De Mining dividenden en de netwerkbelastingen.
explanation: |
  Wanneer een Miner een geldig blok vindt, heeft hij recht op een beloning die bestaat uit enerzijds de bloksubsidie en anderzijds de vergoedingen van de transacties die hij in zijn blok heeft opgenomen.
reviewed: false
question: หากในการทำธุรกรรมการชำระเงินแบบง่าย ที่อยู่เดียวกันถูกใช้ในอินพุตและในหนึ่งในสองเอาต์พุต เอาต์พุตใดมีแนวโน้มที่จะเป็นตัวแทนของเงินทอน?
answer: คนที่มีที่อยู่เดียวกับข้อมูลที่ป้อนเข้าไป
wrong_answers:
  - คนที่มีที่อยู่ล่าสุด
  - คนที่มีที่อยู่ต่างจากที่ป้อนเข้าไป
  - คนที่มีที่อยู่ไม่ทราบแน่ชัด
explanation: |
  หากมีการใช้ที่อยู่ซ้ำภายในธุรกรรมเดียวกัน เป็นการสมเหตุสมผลที่จะสันนิษฐานว่าผู้ใช้ยังคงครอบครอง UTXO ที่เกี่ยวข้อง ดังนั้น ผลลัพธ์ที่มีที่อยู่เดียวกันกับอินพุตจึงน่าจะเป็นผลมาจากการเปลี่ยนแปลง
reviewed: true
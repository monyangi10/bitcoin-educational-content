question: もし単純な支払いトランザクションで同じアドレスがインプットと2つのアウトプットのうちの1つで使用されている場合、どちらのアウトプットがチェンジとして考えられるでしょうか？
answer: インプットと同じアドレスを持つもの
wrong_answers:
  - 最も最近のアドレスを持つもの
  - インプットと異なるアドレスを持つもの
  - 未知のアドレスを持つもの
explanation: |
  同一トランザクション内でアドレスの再利用が発生した場合、ユーザーが関連する未使用トランザクションアウトプット（UTXO）をまだ保有していると推定するのが妥当です。したがって、インプットと同じアドレスを持つアウトプットがチェンジとして考えられます。
reviewed: false

question: Ако при обикновена платежна транзакция един и същ адрес се използва на входа и на един от двата изхода, кой изход вероятно представлява рестото?
answer: Този със същия адрес като входния.
wrong_answers:
  - Този с последния адрес.
  - Този, който е с различен адрес от входния.
  - Този с неизвестен адрес.
explanation: |
  Ако в рамките на една и съща транзакция се извърши повторна употреба на адреса, разумно е да се предположи, че потребителят все още притежава свързания UTXO. Следователно изходът със същия адрес като входния вероятно е резултат от рестото.
reviewed: true

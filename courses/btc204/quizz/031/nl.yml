question: Als in een eenvoudige betalingstransactie dezelfde Address wordt gebruikt in een input en in een van de 2 outputs, welke uitgang vertegenwoordigt dan waarschijnlijk het wisselgeld?
answer: Die met hetzelfde adres als de input.
wrong_answers:
  - Degene met met meest recente adres.
  - Die met een ander input-adres.
  - Die met een onbekend adres.
explanation: |
  Als adreshergebruik binnen dezelfde transactie plaatsvindt, is het redelijk om aan te nemen dat de gebruiker nog steeds de bijbehorende UTXO bezit. Daarom is de output met hetzelfde adres als de input waarschijnlijk het wisselgeld.
reviewed: false

question: Какво представлява сделката Stonewall?
answer: Транзакция, която имитира мини-coin-join, без да е такъв
wrong_answers:
  - Платежна транзакция под формата на присъединяване на мини-монети
  - Сделка в сътрудничество, включваща трима участници
  - Транзакция, при която получателят участва във входящите данни
explanation: |
  Stonewall е специфична форма на транзакция Bitcoin, предназначена да подобри поверителността на потребителя по време на харчене, като симулира мини-съединяване на монети между две страни, без всъщност да е такова.
  
reviewed: true
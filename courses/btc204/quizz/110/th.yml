question: ธุรกรรม Stonewall คืออะไร?
answer: ธุรกรรมที่เลียนแบบมินิ-คอยน์จอยน์โดยไม่ใช่คอยน์จอยน์
wrong_answers:
  - การทำธุรกรรมการชำระเงินในรูปแบบของมินิคอยน์จอยน์
  - ธุรกรรมร่วมที่เกี่ยวข้องกับผู้เข้าร่วมสามคน
  - ธุรกรรมที่เกี่ยวข้องกับผู้รับในอินพุต
explanation: |
  Stonewall เป็นรูปแบบเฉพาะของธุรกรรม Bitcoin ที่ออกแบบมาเพื่อเพิ่มความเป็นส่วนตัวของผู้ใช้ในระหว่างการใช้จ่าย โดยการจำลอง mini-coinjoin ระหว่างสองฝ่าย โดยที่จริงแล้วไม่ได้เป็นการทำ coinjoin
reviewed: true
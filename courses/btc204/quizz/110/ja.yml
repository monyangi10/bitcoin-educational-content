question: ストーンウォール・トランザクションとは何ですか？

answer: ミニ・コインジョインのように見せかけるが、実際にはそうではないトランザクション

wrong_answers:
  - ミニ・コインジョインの形をした支払いトランザクション
  - 3人の参加者を含む協調的トランザクション
  - 受取人をインプットとして含むトランザクション

explanation: |
  ストーンウォールは、ビットコイントランザクションの特定の形態であり、実際にはそうではないが、2人の間でミニ・コインジョインを模倣することにより、支出時のユーザー・プライバシーを高めることを目的としています。


question: एक स्टोनवॉल ट्रांजैक्शन क्या है?
answer: एक लेन-देन जो एक मिनी-जीडब्ल्यू-0 की नकल करता है, लेकिन असल में वह होता नहीं
wrong_answers:
  - एक भुगतान लेन-देन जिसका रूप है मिनी-जीडब्ल्यू-1
  - तीन सहभागियों वाला एक सहयोगात्मक लेन-देन
  - एक ऐसा लेन-देन जिसमें प्राप्तकर्ता भी इनपुट्स में शामिल होता है
explanation: |
स्टोनवॉल एक खास तरह का Bitcoin ट्रांजैक्शन है जिसका मकसद यूजर की प्राइवेसी बढ़ाना होता है, खासकर पैसे खर्च करते वक्त। यह दो लोगों के बीच एक छोटे से CoinJoin जैसा दिखता है, लेकिन असल में वो होता नहीं है।

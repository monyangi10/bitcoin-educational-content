question: Wat is een Stonewall-transactie?
answer: Een transactie die een mini-CoinJoin nabootst zonder er een te zijn
wrong_answers:
  - Een betalingstransactie in de vorm van een mini-CoinJoin
  - Een gezamenlijke transactie met drie deelnemers
  - Een transactie waarbij de ontvanger betrokken is bij de inputs
explanation: |
  Stonewall is een specifieke vorm van Bitcoin-transactie gericht op het verhogen van de privacy van gebruikers tijdens een output door een mini-CoinJoin tussen twee mensen na te bootsen, zonder er daadwerkelijk een te zijn.
  
reviewed: false

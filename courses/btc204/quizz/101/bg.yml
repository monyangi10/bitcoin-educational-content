question: Как се изчислява ентропията в контекста на блокчейн анализа на Bitcoin?
answer: Като се вземе двоичният логаритъм на броя на интерпретациите.
wrong_answers:
  - Чрез умножаване на броя на входовете по броя на изходите.
  - Като съберете броя на входовете и изходите.
  - Като се вземе двоичният логаритъм на броя на входовете и изходите.
explanation: |
  Ентропията се определя като двоичен логаритъм на броя на възможните комбинации.
  
reviewed: true

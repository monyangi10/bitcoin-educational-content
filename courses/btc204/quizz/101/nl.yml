question: Hoe wordt entropie berekend in de context van ketenanalyse op Bitcoin?
answer: Door het binaire logaritme van het aantal interpretaties te nemen.
wrong_answers:
  - Door het aantal inputs te vermenigvuldigen met het aantal outputs.
  - Door het aantal inputs en outputs bij elkaar op te tellen.
  - Door de binaire logaritme van het aantal inputs en outputs te nemen.
explanation: |
  Entropie wordt gedefinieerd als het binaire logaritme van het aantal mogelijke combinaties.
  

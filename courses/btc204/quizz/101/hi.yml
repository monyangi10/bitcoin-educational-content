question: Bitcoin पर चेन एनालिसिस के संदर्भ में एन्ट्रॉपी की गणना कैसे की जाती है?
answer: व्याख्याओं की संख्या का बाइनरी लघुगणक लेकर।
wrong_answers:
  - इनपुट की संख्या को आउटपुट की संख्या से गुणा करके।
  - इनपुट और आउटपुट की संख्या को जोड़कर।
  - इनपुट और आउटपुट की संख्या का बाइनरी लघुगणक लेकर।
explanation: |
एन्ट्रॉपी को संभावित संयोजनों की संख्या के बाइनरी लघुगणक के रूप में परिभाषित किया जाता है।
reviewed: false
question: วิธีการคำนวณเอนโทรปีในบริบทของการวิเคราะห์เชนบน Bitcoin คืออะไร?
answer: โดยการหาลอการิทึมฐานสองของจำนวนการตีความ
wrong_answers:
  - โดยการคูณจำนวนอินพุตด้วยจำนวนเอาต์พุต
  - โดยการเพิ่มจำนวนของอินพุตและเอาต์พุต
  - โดยการหาลอการิทึมฐานสองของจำนวนอินพุตและเอาต์พุต
explanation: |
  เอนโทรปีถูกกำหนดให้เป็นลอการิทึมฐานสองของจำนวนการจัดเรียงที่เป็นไปได้
reviewed: true
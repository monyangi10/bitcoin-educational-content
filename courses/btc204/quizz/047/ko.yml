question: BIP47에서 알림 트랜잭션의 역할은 무엇인가요?
answer: 수취인에게 결제 코드를 전송하여 결제가 곧 이루어질 것임을 알립니다.
wrong_answers:
  - 결제 코드를 통해 향후 거래를 위해 Bitcoin을 수신하는 Address의 유효성을 검사합니다.
  - BIP47로 수취인의 비트코인 수령을 확인합니다.
  - 발신자의 임시 개인키를 수신자에게 전송하여 비트코인을 사용할 수 있도록 합니다.
explanation: |
  알림 트랜잭션을 사용하면 발신자가 수신자에게 결제 코드를 전송할 수 있으므로, 수신자는 나중에 Wallet 복구의 경우 seed에서만 해당 코드를 검색할 수 있습니다. 이름에서 알 수 있듯이 알림 역할도 수행합니다.
reviewed: true
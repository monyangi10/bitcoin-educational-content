question: BIP47 में नोटिफिकेशन ट्रांजैक्शन की भूमिका क्या है?
answer: भुगतान कोड प्राप्तकर्ता को भेजने के लिए और यह संकेत देने के लिए कि भुगतान आ रहा है।
wrong_answers:
  - Bitcoin को भविष्य के लेन-देन के लिए Address से पेमेंट कोड के जरिए वैलिडेट करें।
  - BIP47 का इस्तेमाल करके प्राप्तकर्ता ने बिटकॉइन की रसीद की पुष्टि कर दी है।
  - भेजने वाले की अस्थायी निजी कुंजियाँ प्राप्तकर्ता को भेजें ताकि वह बिटकॉइन खर्च कर सके।
explanation: |
नोटिफिकेशन ट्रांजैक्शन भेजने वाले से प्राप्तकर्ता को पेमेंट कोड भेजने की अनुमति देता है, ताकि प्राप्तकर्ता इसे जान सके और बाद में केवल अपने seed से इसे ढूंढ सके, अगर Wallet रिकवरी की स्थिति हो। जैसा कि इसके नाम से पता चलता है, यह एक नोटिफिकेशन की भूमिका भी निभाता है।

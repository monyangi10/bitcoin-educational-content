question: บทบาทของการทำธุรกรรมการแจ้งเตือนใน BIP47 คืออะไร?
answer: เพื่อส่งรหัสการชำระเงินไปยังผู้รับและส่งสัญญาณว่าการชำระเงินกำลังจะมา
wrong_answers:
  - ตรวจสอบที่อยู่รับ Bitcoin สำหรับธุรกรรมในอนาคตผ่านรหัสการชำระเงิน
  - ยืนยันการรับบิตคอยน์โดยผู้รับด้วย BIP47.
  - ส่งกุญแจส่วนตัวชั่วคราวของผู้ส่งไปยังผู้รับเพื่อให้พวกเขาสามารถใช้จ่ายบิตคอยน์ได้
explanation: |
  ธุรกรรมการแจ้งเตือนอนุญาตให้ส่งรหัสการชำระเงินจากผู้ส่งไปยังผู้รับ เพื่อให้ผู้รับสามารถดึงข้อมูลได้ในภายหลังจาก seed ของตนเองในกรณีที่มีการกู้คืน wallet ตามชื่อของมัน ธุรกรรมนี้ยังมีบทบาทในการแจ้งเตือนด้วยเช่นกัน
reviewed: true
question: Каква е ролята на операцията за уведомяване в BIP47?
answer: Предаване на кода за плащане на получателя и сигнализиране за предстоящи плащания.
wrong_answers:
  - Утвърждаване на адреса за получаване на Bitcoin за бъдещи транзакции чрез кодове за плащане.
  - Потвърдете получаването на биткойни от получателя с BIP47.
  - Изпратете ефимерните частни ключове на изпращача на получателя, за да може той да похарчи биткойните.
explanation: |
  Транзакцията за уведомяване позволява предаването на кода за плащане от изпращача на получателя, така че последният да може да го получи по-късно само от своя seed в случай на възстановяване на wallet. Както подсказва името ѝ, тя играе и ролята на уведомление.
reviewed: true
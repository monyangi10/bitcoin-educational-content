question: Wat is een Bitcoin-ontvangstadres?
answer: Een tekenreeks dat wordt gebruikt om bitcoins te ontvangen.
wrong_answers:
  - Een code die wordt gebruikt om bitcoins te versturen.
  - Een algoritme om bitcoins te minen.
  - een smart contract.
explanation: |
  Een ontvangstadres wordt gebruikt om bitcoins te ontvangen in een wallet.
  
reviewed: false

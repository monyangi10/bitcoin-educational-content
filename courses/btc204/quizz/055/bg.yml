question: Какво представлява адресът за получаване Bitcoin?
answer: Поредица от символи, използвани за получаване на биткойни.
wrong_answers:
  - Код, използван за изпращане на биткойни.
  - Алгоритъм за копаене на биткойни.
  - умен договор.
explanation: |
  Получаващият адрес се използва за получаване на биткойни в портфейла.
reviewed: true

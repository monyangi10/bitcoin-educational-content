question: Коя е най-трудната характеристика, която може да се постигне с цифрова валута като Bitcoin?
answer: Отсъствието на double-spending
wrong_answers:
  - Интегритет
  - Автентичност
  - Достоверност
explanation: |
  При цифровите валути гарантирането на липсата на double-spending е по-сложно, тъй като всяка цифрова стока по същество е информация. За разлика от физическите стоки, информацията не се разделя по време на обмена, а се разпространява чрез умножаване.
reviewed: true

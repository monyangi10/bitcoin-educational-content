question: ลักษณะที่ยากที่สุดในการบรรลุด้วยสกุลเงินดิจิทัลเช่น Bitcoin คืออะไร?
answer: การขาด double-spending
wrong_answers:
  - ความซื่อสัตย์
  - ความแท้จริง
  - ความจริง
explanation: |
  สำหรับสกุลเงินดิจิทัล การรับรองการไม่มี double-spending นั้นซับซ้อนมากขึ้น เนื่องจากสินค้าดิจิทัลใด ๆ ก็คือข้อมูลโดยพื้นฐาน ซึ่งแตกต่างจากสินค้าทางกายภาพ ข้อมูลจะไม่แบ่งแยกในระหว่างการแลกเปลี่ยน แต่จะแพร่กระจายโดยการคูณ
reviewed: true
question: What is the most difficult characteristic to achieve with a digital currency like Bitcoin?
answer: The absence of double-spending
wrong_answers:
  - Integrity
  - Authenticity
  - Veracity
explanation: |
  For digital currencies, ensuring the absence of double-spending is more complex, since any digital good is essentially information. Unlike physical goods, information does not divide during exchanges; instead, it propagates by multiplying.
reviewed: true

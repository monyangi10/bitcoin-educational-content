question: Кое е основното предимство на транзакцията payjoin в сравнение с класическата платежна транзакция?
answer: Подобрява поверителността
wrong_answers:
  - Увеличава скоростта на потвърждаване
  - Намалява таксите за транзакции
  - Заблуждава получателя
explanation: |
  Транзакцията payjoin подобрява неприкосновеността на личния живот на заинтересованите страни чрез заблуждаване на блокчейн анализа.
reviewed: true

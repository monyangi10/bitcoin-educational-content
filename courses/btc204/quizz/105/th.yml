question: ข้อได้เปรียบหลักของการทำธุรกรรมแบบ payjoin เมื่อเทียบกับการทำธุรกรรมแบบชำระเงินแบบคลาสสิกคืออะไร?
answer: มันช่วยเพิ่มความเป็นส่วนตัว
wrong_answers:
  - มันเพิ่มความเร็วในการยืนยัน
  - มันช่วยลดค่าธรรมเนียมการทำธุรกรรม
  - มันทำให้ผู้รับเข้าใจผิด
explanation: |
  ธุรกรรม payjoin ช่วยเพิ่มความเป็นส่วนตัวของผู้มีส่วนได้ส่วนเสียโดยการทำให้การวิเคราะห์เชนเข้าใจผิด
reviewed: true
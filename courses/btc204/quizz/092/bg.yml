question: Какво е името на сметката, използвана за UTXOs, които не могат да влязат в пул за присъединяване към Whirlpool?
answer: Сметка за промяна на Doxxic.
wrong_answers:
  - Акаунт Postmix.
  - Сметка за премикс.
  - Депозитна сметка.
explanation: |
  Промяната, която не е могла да се присъедини към пула, се изолира в акаунта "доксична промяна", за да се осигури стриктно отделяне от другите UTXO в wallet.
  
reviewed: true
question: Какво е името на сметката, използвана за UTXO, която не може да влезе в Whirlpool coinjoin басейн?
answer: doxxic change сметка
wrong_answers:
  - Акаунт Postmix.
  - Сметка за премикс.
  - Депозитна сметка.
explanation: |
  Промяната, която не е могла да се присъедини към пула, се изолира в акаунта "doxxic change", за да се осигури стриктно отделяне от другите UTXO в портфейла.
  
reviewed: true

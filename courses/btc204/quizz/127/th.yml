question: ข้อเสียหลักของ coinswaps และ atomic swaps ในแง่ของความเป็นส่วนตัวคืออะไร?
answer: พวกเขาไม่ทำลายประวัติของเหรียญที่แลกเปลี่ยน
wrong_answers:
  - พวกเขามีค่าธรรมเนียมการทำธุรกรรมที่สูงมาก
  - พวกเขาต้องการการแลกเปลี่ยนข้อมูลส่วนบุคคลระหว่างคู่สัญญา
  - พวกเขาอาจถูกวิเคราะห์โดยแพลตฟอร์มแลกเปลี่ยน
explanation: |
  ข้อเสียหลักของวิธีการเหล่านี้คือมีความเสี่ยงสูงมากหากไม่ได้ใช้เทคนิคเพิ่มเติมในการทำลายประวัติของเหรียญ
reviewed: true
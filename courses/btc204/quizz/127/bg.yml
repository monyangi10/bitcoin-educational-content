question: Какъв е основният недостатък на размяната на монети и атомни разменни монети по отношение на поверителността?
answer: Те не прекъсват историята на обменените монети
wrong_answers:
  - Те са много скъпи от гледна точка на таксите за транзакции
  - Те изискват обмен на лична информация между страните
  - Те могат да бъдат обект на анализ от платформите за обмен
explanation: |
  Основният недостатък на тези методи е, че те са много рисковани без използването на допълнителна техника за разбиване на историята на монетата.
  
reviewed: true
question: सिक्के स्वैप (coinswaps) और एटॉमिक स्वैप (atomic swaps) का सबसे बड़ा नुकसान प्राइवेसी के मामले में क्या है?
answer: वे एक्सचेंज किए गए सिक्कों का इतिहास नहीं तोड़ते।
wrong_answers:
  - वो ट्रांजैक्शन फीस में बहुत महंगे हैं
  - उन्हें पार्टियों के बीच व्यक्तिगत जानकारी का Exchange चाहिए
  - उनका Exchange प्लेटफॉर्म्स द्वारा विश्लेषण किया जा सकता है
explanation: |
इन तरीकों का मुख्य नुकसान यह है कि सिक्के के इतिहास को तोड़ने के लिए अतिरिक्त तकनीक के बिना ये बहुत जोखिम भरे होते हैं।
reviewed: false
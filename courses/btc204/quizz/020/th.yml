question: เมื่อค้นหารูปแบบ เราจะศึกษาส่วนใดของธุรกรรม?
answer: โครงสร้างของมัน
wrong_answers:
  - เมทาดาทาของมัน
  - สคริปต์ของมัน
  - ลายเซ็นของมัน
explanation: |
  รูปแบบการทำธุรกรรมคือแบบจำลองหรือโครงสร้างโดยรวมของการทำธุรกรรมทั่วไปที่สามารถพบได้บนบล็อกเชน ซึ่งการตีความที่เป็นไปได้เป็นที่รู้จัก
reviewed: true
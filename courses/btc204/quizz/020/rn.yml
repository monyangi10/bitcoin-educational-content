question: Igihe turiko turarondera akarorero, ni igice ikihe c’ugucuruza tuzokwiga?
answer: Imiterere yayo
wrong_answers:
  - Amakuru yayo
  - Ivyanditswe vyayo
  - Umukono wayo
explanation: |
  Igishushanyo c’ugucuruza ni gusa ikigereranyo canke imiterere rusangi y’ugucuruza gusanzwe gushobora kuboneka kuri Blockchain, insobanuro yayo ishobora kuba izwi.
reviewed: false
question: Когато търсим модел, коя част от транзакцията ще проучим?
answer: Неговата структура
wrong_answers:
  - Неговите метаданни
  - Неговите скриптове
  - Нейният подпис
explanation: |
  Моделът на трансакция е просто модел или цялостна структура на типична трансакция, която може да бъде открита в блокчейна и чиято вероятна интерпретация е известна.
reviewed: true
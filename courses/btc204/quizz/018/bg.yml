question: Кой от следните отговори не е част от 3-те основни категории евристики и характеристики, използвани при блокчейн анализа?
answer: Криптографски модели.
wrong_answers:
  - Модели на транзакции.
  - Евристики за вътрешни транзакции.
  - Евристики за външни транзакции.
explanation: |
  Евристиките, използвани при блокчейн анализа, могат да бъдат групирани в три категории: модели на транзакции (или модели на транзакции), вътрешни евристики на транзакциите и външни евристики на транзакциите.
reviewed: true

question: 以下の回答のうち、チェーン分析で使用される3つの主要なヒューリスティックと特性のカテゴリーに含まれないものはどれですか？
answer: 暗号モデル
wrong_answers:
  - トランザクションモデル
  - 内部トランザクション・ヒューリスティック
  - 外部トランザクション・ヒューリスティックス
explanation: |
  チェーン分析で使用されるヒューリスティックスは、トランザクションパターン（またはトランザクションモデル）、内部トランザクション・ヒューリスティック、外部トランザクション・ヒューリスティックの3つのカテゴリーに分けることができます。
reviewed: false

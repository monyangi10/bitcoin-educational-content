question: ในบรรดาคำตอบต่อไปนี้ ข้อใดไม่ใช่ส่วนหนึ่งของ 3 หมวดหมู่หลักของฮิวริสติกส์และลักษณะที่ใช้ในการวิเคราะห์เชน?
answer: โมเดลการเข้ารหัสลับ
wrong_answers:
  - โมเดลธุรกรรม
  - ฮิวริสติกการทำธุรกรรมภายใน
  - ฮิวริสติกการทำธุรกรรมภายนอก
explanation: |
  ฮิวริสติกที่ใช้ในการวิเคราะห์เชนสามารถจัดกลุ่มได้เป็นสามประเภท ซึ่งได้แก่ รูปแบบธุรกรรม (หรือโมเดลธุรกรรม), ฮิวริสติกธุรกรรมภายใน, และฮิวริสติกธุรกรรมนอก.
reviewed: true
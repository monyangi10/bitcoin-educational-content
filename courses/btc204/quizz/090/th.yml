question: อะไรที่ทำให้รีมิกซ์ใน Whirlpool มีความพิเศษเมื่อเทียบกับการใช้งาน coinjoin อื่น ๆ?
answer: พวกเขาฟรีทั้งหมด
wrong_answers:
  - พวกเขาต้องจ่ายเฉพาะค่าธรรมเนียม mining เท่านั้น
  - พวกเขาถูกจำกัดให้หนึ่งต่อผู้ใช้หนึ่งคน
  - พวกเขาต้องจ่ายเฉพาะค่าบริการเท่านั้น
explanation: |
  Whirlpool remixes ฟรี 100%: ไม่ต้องเสียค่าบริการเพิ่มเติมหรือค่าธรรมเนียม mining
reviewed: true
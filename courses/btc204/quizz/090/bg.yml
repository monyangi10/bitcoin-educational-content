question: Какво е уникалното при ремиксите в Whirlpool в сравнение с други реализации на coinjoin?
answer: Те са напълно безплатни.
wrong_answers:
  - Те изискват само заплащане на таксите mining.
  - Те са ограничени до един за всеки потребител.
  - Те изискват само заплащане на таксите за обслужване.
explanation: |
  Ремиксите на Whirlpool са 100% безплатни: не се изискват допълнителни такси за услуги или такси за mining.
  
reviewed: true
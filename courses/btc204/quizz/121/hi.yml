question: डैंडेलायन प्रोटोकॉल में स्टेम फेज कैसे काम करता है?
answer: लेन-देन नोड्स के एक रैंडम रास्ते से भेजा जाता है
wrong_answers:
  - लेन-देन तुरंत स्रोत नोड के सभी साथियों को प्रसारित कर दिया जाता है
  - लेन-देन को प्रसारित करने से पहले अस्थायी रूप से एक केंद्रीय नोड में संग्रहीत किया जाता है
  - ट्रांजैक्शन हर ब्रॉडकास्ट के कदम पर धीरे-धीरे एन्क्रिप्ट होता है
explanation: |
डैंडीलायन पहले स्टेम फेज का इस्तेमाल करता है जहां लेन-देन को नोड्स के एक रैंडम रास्ते से भेजा जाता है। फिर फ्लफ फेज में यह लेन-देन पूरे नेटवर्क में ब्रॉडकास्ट कर दिया जाता है।

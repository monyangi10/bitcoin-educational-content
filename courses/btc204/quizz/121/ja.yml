question: ダンデライオン（Dandelion）プロトコルにおけるstemフェーズはどのように機能しますか？

answer: トランザクションはランダムなノードのパスを通じて送信される

wrong_answers:
  - トランザクションは直ちにソースノードのすべてのピアにブロードキャストされる
  - トランザクションはブロードキャストされる前に一時的に中央ノードに保存される
  - トランザクションはブロードキャストの各ステップで段階的に暗号化される

explanation: |
  ダンデライオンは最初にstemフェーズを使用し、トランザクションはランダムなノードのパスを通じて送信されます。その後、fluffフェーズでトランザクションはネットワーク全体にブロードキャストされます。

reviewed: false

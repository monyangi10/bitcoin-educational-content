question: एक ट्रांजैक्शन में एक्सटर्नल और इंटरनल Address रीयूज़ में क्या अंतर है?
answer: बाहरी पुन:उपयोग कई लेन-देन में देखा जाता है, जबकि आंतरिक पुन:उपयोग एक ही लेन-देन के भीतर होता है।
wrong_answers:
  - बाहरी पुन: उपयोग सार्वजनिक पतों से संबंधित है, जबकि आंतरिक पुन: उपयोग लेन-देन स्क्रिप्ट्स में इस्तेमाल होने वाले निजी पतों से संबंधित है।
  - आंतरिक पुन: उपयोग कई लेन-देन में देखा जाता है, जबकि बाहरी पुन: उपयोग एक ही लेन-देन के भीतर देखा जाता है।
  - आंतरिक पुन: उपयोग सार्वजनिक पतों से संबंधित है, जबकि बाहरी पुन: उपयोग लेन-देन स्क्रिप्ट्स में इस्तेमाल होने वाले निजी पतों से संबंधित है।
explanation: |
बाहरी Address पुनर्उपयोग तब देखा जाता है जब एक Address को कई अलग-अलग लेन-देन में दोबारा इस्तेमाल किया जाता है, जबकि आंतरिक पुनर्उपयोग उस Address से संबंधित है जिसे एक ही लेन-देन के इनपुट और आउटपुट दोनों में इस्तेमाल किया जाता है।

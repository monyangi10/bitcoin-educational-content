question: Каква е разликата между повторното използване на външен и вътрешен адрес в транзакция?
answer: Външното повторно използване се наблюдава при множество транзакции, докато вътрешното повторно използване се наблюдава в рамките на една и съща транзакция.
wrong_answers:
  - Външното повторно използване се отнася до публичните адреси, а вътрешното - до частните адреси, използвани в скриптовете на транзакциите.
  - Вътрешното повторно използване се наблюдава при множество транзакции, докато външното повторно използване се наблюдава в рамките на една и съща транзакция.
  - Вътрешното повторно използване се отнася до публичните адреси, а външното - до частните адреси, използвани в скриптовете на транзакциите.
explanation: |
  Външното повторно използване на адреси се случва, когато даден адрес се използва в множество транзакции, докато вътрешното повторно използване включва адрес, който се използва както на входа, така и на изхода на една и съща транзакция.
reviewed: true
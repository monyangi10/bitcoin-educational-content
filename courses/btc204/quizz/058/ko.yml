question: 거래에서 외부 Address 재사용과 내부 Address 재사용의 차이점은 무엇인가요?
answer: 외부 재사용은 여러 트랜잭션에서 관찰되는 반면, 내부 재사용은 동일한 트랜잭션 내에서 관찰됩니다.
wrong_answers:
  - 외부 재사용은 공개 주소와 관련된 것이고 내부 재사용은 트랜잭션 스크립트에 사용되는 비공개 주소와 관련된 것입니다.
  - 내부 재사용은 여러 트랜잭션에서 관찰되는 반면, 외부 재사용은 동일한 트랜잭션 내에서 관찰됩니다.
  - 내부 재사용은 공개 주소와 관련된 것이고, 외부 재사용은 거래 스크립트에 사용되는 비공개 주소와 관련된 것입니다.
explanation: |
  외부 Address 재사용은 Address이 여러 거래에서 사용되는 경우 발생하며, 내부 재사용은 동일한 거래의 입력과 출력에 모두 사용되는 Address을 포함합니다.
reviewed: true
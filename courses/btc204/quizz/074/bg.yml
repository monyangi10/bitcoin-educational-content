question: Кой от следните отговори не представлява предимство на използването на собствен възел?
answer: Намаляване на таксите за трансакции.
wrong_answers:
  - Участие в консенсуса.
  - Независимост от трети страни.
  - Да можеш да се противопоставиш на цензурата на транзакциите.
explanation: |
  Ето защо притежаването на собствен възел е от решаващо значение за напълно суверенното използване на Bitcoin: Устойчивост на цензура; Вашите транзакции не могат да бъдат блокирани от никого; Независимост от трети страни; Вече не зависите от външна услуга за проверка на блокчейн данните; Активно участие; Имате възможност да задавате свои собствени правила за валидиране и да участвате пряко в консенсуса; Принос към мрежата; Управлявайки възел, вие помагате за укрепването и разпространението на мрежата Bitcoin; Техническо образование; Управлението на full node е отличен начин да задълбочите техническите си познания за Bitcoin.
reviewed: true
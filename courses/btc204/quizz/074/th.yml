question: ในบรรดาคำตอบต่อไปนี้ ข้อใดไม่ใช่ประโยชน์ของการใช้โหนดของคุณเอง?
answer: การลดค่าธรรมเนียมการทำธุรกรรม
wrong_answers:
  - การมีส่วนร่วมในฉันทามติ
  - การเป็นอิสระจากบุคคลที่สาม
  - สามารถต้านทานการเซ็นเซอร์ธุรกรรมได้
explanation: |
  นี่คือเหตุผลว่าทำไมการมีโหนดของคุณเองจึงมีความสำคัญสำหรับการใช้งาน Bitcoin อย่างเต็มที่: การต้านทานการเซ็นเซอร์; ธุรกรรมของคุณไม่สามารถถูกบล็อกโดยใครได้; ความเป็นอิสระจากภาษาบุคคลที่สาม; คุณไม่ต้องพึ่งพาบริการภายนอกใดๆ ในการตรวจสอบข้อมูลบล็อกเชนอีกต่อไป; การมีส่วนร่วมอย่างแข็งขัน; คุณมีความสามารถในการตั้งกฎการตรวจสอบของคุณเองและมีส่วนร่วมโดยตรงในฉันทามติ; การมีส่วนร่วมในเครือข่าย; โดยการรันโหนด คุณช่วยเสริมความแข็งแกร่งและกระจายเครือข่าย Bitcoin; การศึกษาเชิงเทคนิค; การจัดการ full node เป็นวิธีที่ยอดเยี่ยมในการเพิ่มพูนความรู้ทางเทคนิคของคุณเกี่ยวกับ Bitcoin.
reviewed: true
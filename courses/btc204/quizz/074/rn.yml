question: Mu nyishu zikurikira, ni iyihe idaserura inyungu yo gukoresha urudodo rwawe bwite?
answer: Kugabanya amafaranga y’ugucuruza.
wrong_answers:
  - Kugira uruhara mu guhurizako.
  - Kuba wigenga ku bandi bantu.
  - Kuba umuntu ashobora kunanira ugucengera ibikorwa vy’ubudandaji.
explanation: |
  Ehe igituma kugira node yawe bwite ari ikintu gihambaye cane kugira ngo ukoreshe Bitcoin mu buryo bushitse: Uguhangana n’ugucengera; Ivyo ukora nta n’umwe ashobora kubibuza; Ukwigenga ku rurimi rwa gatatu; es Ntugishingiye ku gikorwa ico ari co cose co hanze co kugenzura amakuru ya Blockchain; Ukwifatanya n’umwete; Ufise ubushobozi bwo kwishingira amategeko yawe yo kwemeza no kugira uruhara mu buryo butaziguye mu guhurizako; Intererano ku rubuga; Mu gukoresha node, ufasha gukomeza no gukwiragiza urusobe rwa Bitcoin; Uburezi bw’ubuhinga; Gucungera Full node ni uburyo bwiza bwo gukomeza ubumenyi bwawe ku vyerekeye Bitcoin.
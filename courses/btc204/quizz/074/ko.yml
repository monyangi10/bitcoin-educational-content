question: 다음 중 자체 노드를 사용할 때 얻을 수 있는 이점이 아닌 것은 무엇인가요?
answer: 거래 수수료 절감.
wrong_answers:
  - 합의에 참여하기.
  - 제3자로부터 독립적이어야 합니다.
  - 거래 검열에 저항할 수 있습니다.
explanation: |
  검열 저항성; 누구도 여러분의 거래를 차단할 수 없음; 제3자로부터의 독립성; 더 이상 외부 서비스에 의존하여 Blockchain 데이터를 검증하지 않음; 적극적인 참여; 여러분 스스로 검증 규칙을 설정하고 합의에 직접 참여할 수 있음; 네트워크에 기여; 노드를 운영함으로써 Bitcoin 네트워크를 강화하고 배포하는 데 도움이 됨; 기술 교육; Full node을 관리하면 Bitcoin에 대한 기술 지식을 심화할 수 있는 훌륭한 방법임 등이 있습니다.
reviewed: true
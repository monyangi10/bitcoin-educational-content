question: निम्नलिखित जवाबों में से कौन सा आपके खुद के नोड का उपयोग करने का फायदा नहीं दर्शाता है?
answer: लेन-देन शुल्क कम करना।
wrong_answers:
  - सहमति में भाग लेना।
  - तीसरे पक्षों से स्वतंत्र होना।
  - ट्रांजैक्शन सेंसरशिप का विरोध करने में सक्षम होना।

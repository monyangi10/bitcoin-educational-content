question: Как Wabisabi управлява промените в сравнение с Wasabi 1.0?
answer: разделя я на няколко малки суми, разпределени в равни купюри.
wrong_answers:
  - консолидира, за да предотврати разпиляването им.
  - изключва ги преди транзакцията за обединяване на монети, като изравнява входовете.
  - автоматично ги прехвърля в резервен портфейл.
explanation: |
  За разлика от Wasabi 1.0, където промяната беше пряко свързана с вложените от потребителите средства, Wabisabi има за цел да раздели промяната на няколко малки суми, разпределени в еднакви купюри за всички участници.
  
reviewed: true

question: Как Wabisabi управлява промените в сравнение с Wasabi 1.0?
answer: Той я разделя на няколко малки суми, разпределени в равни купюри.
wrong_answers:
  - Той ги консолидира, за да предотврати разпиляването им.
  - Той ги изключва преди транзакцията за обединяване на монети, като изравнява входовете.
  - Той автоматично я прехвърля в резерв wallet.
explanation: |
  За разлика от Wasabi 1.0, където промяната беше пряко свързана с вложените от потребителите средства, Wabisabi има за цел да раздели промяната на няколко малки суми, разпределени в еднакви купюри за всички участници.
  
reviewed: true
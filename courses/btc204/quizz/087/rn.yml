question: Wabisabi icungera gute ihinduka ugereranije na Wasabi 1.0?
answer: Irayigabanyamwo utugingo ngengabuzima dutoduto twinshi tugabanwa mu madini angana.
wrong_answers:
  - Irazikomeza kugira ngo ntizibe Dust.
  - Irazikuramwo imbere y’ugucuruza CoinJoin mu kungana ivyinjizwa.
  - Ica ihita iyirungika mu gice c’ububiko Wallet.
explanation: |
  Udakunze Wasabi 1.0, aho ihinduka ryari rifitaniye isano n’ivyo abakoresha bashizemwo, Wabisabi ifise intumbero yo gucapura iryo hinduka mu bice bitobito vyinshi, bikagabanwa mu bice bingana ku bari muri iyo nama bose.
  

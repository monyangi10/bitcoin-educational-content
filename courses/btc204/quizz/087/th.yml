question: Wabisabi จัดการการเปลี่ยนแปลงอย่างไรเมื่อเทียบกับ Wasabi 1.0?
answer: มันแบ่งออกเป็นจำนวนเล็ก ๆ หลายจำนวนที่แจกจ่ายในสกุลเงินที่เท่ากัน
wrong_answers:
  - มันรวบรวมพวกมันเพื่อป้องกันไม่ให้กลายเป็นฝุ่น
  - มันแยกพวกเขาออกก่อนการทำธุรกรรม coinjoin โดยการทำให้จำนวนอินพุตเท่ากัน
  - มันจะโอนย้ายไปยัง wallet สำรองโดยอัตโนมัติ
explanation: |
  ไม่เหมือนกับ Wasabi 1.0 ที่การเปลี่ยนแปลงถูกเชื่อมโยงโดยตรงกับข้อมูลที่ผู้ใช้ป้อน Wabisabi มุ่งเน้นที่การแบ่งการเปลี่ยนแปลงออกเป็นจำนวนเล็ก ๆ หลาย ๆ จำนวน ซึ่งแจกจ่ายในสกุลเงินที่เท่ากันให้กับผู้เข้าร่วมทุกคน
reviewed: true
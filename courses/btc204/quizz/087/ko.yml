question: 와비사비는 와사비 1.0과 비교하여 변경 사항을 어떻게 관리하나요?
answer: 동일한 액면가로 분배된 여러 개의 소량으로 분할합니다.
wrong_answers:
  - 이를 통합하여 Dust이 되지 않도록 방지합니다.
  - 입력값을 균등화하여 CoinJoin 트랜잭션 이전에는 제외합니다.
  - 자동으로 예비 Wallet로 전송됩니다.
explanation: |
  와비사비는 사용자의 입력에 직접적으로 연동되어 있던 와사비 1.0과 달리, 모든 참여자에게 동일한 액수로 분배되는 여러 개의 작은 금액으로 변경을 세분화하는 것을 목표로 합니다.
  
reviewed: true
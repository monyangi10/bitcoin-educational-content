question: वासाबी कैसे बदलाव को मैनेज करता है वासाबी 1.0 की तुलना में?
answer: यह इसे कई छोटी-छोटी बराबर रकमों में बाँट देता है।
wrong_answers:
  - यह उन्हें Dust बनने से रोकने के लिए उन्हें मजबूत करता है।
  - यह CoinJoin लेन-देन से पहले इनपुट्स को बराबर करके उन्हें बाहर कर देता है।
  - यह इसे अपने आप रिजर्व Wallet में ट्रांसफर कर देता है।
explanation: |
वसाबी 1.0 के विपरीत, जहाँ बदलाव सीधे उपयोगकर्ताओं के इनपुट से जुड़ा था, वहीं वाबिसाबी का लक्ष्य है कि बदलाव को कई छोटी-छोटी राशियों में बाँट दिया जाए, जो सभी भागीदारों को बराबर हिस्सों में बाँटी जाएँ।
reviewed: false
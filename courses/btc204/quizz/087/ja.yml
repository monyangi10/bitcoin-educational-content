question: WabisabiはWasabi 1.0と比べて変更をどのように管理しますか？

answer: いくつかの小さな額に分割し、等しい額面で分配する

wrong_answers:
  - ダストとならないようにそれらをマージングする
  - インプットを均等化することによって、コインジョイン・トランザクション前にそれらを除外する
  - 予備のウォレットに自動的に転送する

explanation: |
  Wasabi 1.0では変更が直接ユーザーのインプットにリンクされていたのに対し、Wabisabiは変更をいくつかの小さな額に分割し、すべての参加者に等しい額面で分配することを目指しています。


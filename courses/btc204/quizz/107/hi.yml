question: एक PayJoin ट्रांजैक्शन को स्टेगनोग्राफिक ट्रांजैक्शन कैसे माना जा सकता है?
answer: यह बाहरी नज़रों से असली भुगतान रकम को छुपाता है।
wrong_answers:
  - यह बाहरी नज़रों के लिए असली भुगतान रकम को एन्क्रिप्ट कर देता है।
  - यह रिसीवर को असली भुगतान रकम छुपाता है।
  - यह प्राप्तकर्ता के लिए वास्तविक भुगतान राशि को एन्क्रिप्ट करता है।
explanation: |
PayJoin लेन-देन स्टेग्नोग्राफी (छुपी हुई जानकारी) के दायरे में आता है क्योंकि यह असली लेन-देन की रकम को एक नकली लेन-देन के अंदर छुपा देता है, जो बाहरी निगरानी करने वालों के लिए एक भ्रम पैदा करता है।
reviewed: false
question: Как транзакция за payjoin може да се счита за стеганографска транзакция?
answer: скрива действителната сума на плащането от външни наблюдатели.
wrong_answers:
  - Тя криптира действителната сума на плащането за външни наблюдатели.
  - Тя скрива действителната сума на плащането от получателя.
  - Тя криптира действителната сума на плащането за получателя.
explanation: |
  Транзакцията payjoin попада в областта на стеганографията, тъй като скрива действителната сума на транзакцията в рамките на фалшива транзакция, която служи като примамка за външни наблюдатели.
  
reviewed: true

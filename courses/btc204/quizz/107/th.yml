question: ธุรกรรมแบบ payjoin สามารถถือเป็นธุรกรรมแบบสเตกาโนกราฟีได้อย่างไร?
answer: มันซ่อนจำนวนเงินที่ชำระจริงจากผู้สังเกตการณ์ภายนอก
wrong_answers:
  - มันเข้ารหัสจำนวนเงินที่ชำระจริงสำหรับผู้สังเกตการณ์ภายนอก
  - มันซ่อนจำนวนเงินที่จ่ายจริงจากผู้รับ
  - มันเข้ารหัสจำนวนเงินที่จ่ายจริงสำหรับผู้รับ
explanation: |
  ธุรกรรม payjoin อยู่ภายใต้โดเมนของสเตกาโนกราฟีเพราะมันซ่อนจำนวนที่แท้จริงของธุรกรรมภายในธุรกรรมปลอมที่ทำหน้าที่เป็นตัวล่อสำหรับผู้สังเกตการณ์ภายนอก
reviewed: true
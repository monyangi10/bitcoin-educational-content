question: บทบาทของผู้ร่วมมือในธุรกรรม Stonewall x2 คืออะไร?
answer: ให้บิทคอยน์เพื่อเพิ่มความสงสัย
wrong_answers:
  - ทำหน้าที่เป็นผู้ประสานงานธุรกรรม
  - รับจำนวนเงินที่ชำระ
  - ส่งจำนวนเงินที่ชำระ
explanation: |
  ผู้ร่วมมือในธุรกรรม Stonewall x2 ให้บิตคอยน์เพื่อเพิ่มความสงสัยในการวิเคราะห์ธุรกรรม ในขณะที่กู้คืนเงินทุนของพวกเขาอย่างเต็มที่ในตอนท้าย (เป็นการกระทำที่เป็นกลางสำหรับพวกเขา ลบด้วยค่าธรรมเนียม mining)
reviewed: true
question: Каква е ролята на сътрудника при сделка Stonewall x2?
answer: Осигурява биткойни, за да добави съмнение
wrong_answers:
  - Действа като координатор на транзакцията
  - Получава сумата на плащането
  - Изпраща сумата за плащане
explanation: |
  Сътрудникът в транзакция Stonewall x2 предоставя биткойни, за да добави съмнение към анализа на транзакцията, като в същото време възстановява напълно средствата си накрая (неутрално действие за него, минус таксите за копаене).
  
reviewed: true

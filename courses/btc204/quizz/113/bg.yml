question: Кой елемент пречи на външния наблюдател да разграничи транзакциите Stonewall и Stonewall x2?
answer: Моделът на транзакциите е един и същ
wrong_answers:
  - Транзакциите са криптирани
  - Сумите, включени в транзакциите, са винаги идентични
  - Цифровите подписи на трансакциите се генерират от един и същ алгоритъм
explanation: |
  От външна гледна точка моделът на транзакциите остава същият. Следователно без допълнителна информация за контекста е невъзможно да се разграничи транзакция на Stonewall от транзакция на Stonewall x2, тъй като те приемат един и същ модел.
  
reviewed: true
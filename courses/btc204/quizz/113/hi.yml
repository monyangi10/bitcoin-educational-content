question: कौन सा तत्व बाहरी पर्यवेक्षक को Stonewall और Stonewall x2 लेन-देन के बीच अंतर करने से रोकता है?
answer: लेन-देन का पैटर्न एक जैसा है
wrong_answers:
  - लेन-देन एन्क्रिप्टेड होते हैं
  - लेन-देन में शामिल रकम हमेशा एक जैसी होती है
  - ट्रांजैक्शन्स के डिजिटल सिग्नेचर एक ही अल्गोरिदम से बनते हैं
explanation: |
बाहरी नज़रिए से देखें तो लेन-देन का पैटर्न बिल्कुल वही है। अतिरिक्त जानकारी के बिना, स्टोनवॉल लेन-देन और स्टोनवॉल x2 लेन-देन में फर्क करना मुश्किल है, क्योंकि दोनों एक ही पैटर्न अपनाते हैं।
reviewed: false
question: ビットコイントランザクションにおけるOP_RETURNとは何ですか？

answer: アウトプットを無効とマークし、データストレージを可能にするオペコード

wrong_answers:
  - ビットコイントランザクションにおける署名の有効性を検証するオペコード
  - IPFSに保存されたファイルへのハイパーリンクを含むオペコード
  - ビットコインブロックチェーンから取引を削除するコマンド

explanation: |
  OP_RETURNは、無効なスクリプトを示すオペコードであり、それが含むアウトプットを証明可能に使えないものとして扱います。したがって、ネットワークノードはこのアウトプットを自分たちのUTXOセットから削除することができます。OP_RETURNは、ブロックチェーンに任意のデータを記録するためによく使用されます。


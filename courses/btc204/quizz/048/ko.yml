question: Bitcoin 거래에서 OP_RETURN이란 무엇인가요?
answer: 출력을 유효하지 않은 것으로 표시하고 데이터 저장을 허용하는 연산 코드입니다.
wrong_answers:
  - Bitcoin 트랜잭션에서 서명의 유효성을 확인하는 연산 코드입니다.
  - IPFS에 저장된 파일에 대한 하이퍼링크가 포함된 연산 코드입니다.
  - Bitcoin Blockchain에서 트랜잭션을 삭제하는 명령입니다.
explanation: |
  OP_RETURN은 유효하지 않은 스크립트를 알리는 연산 코드로, 스크립트에 포함된 출력을 사용할 수 없는 것으로 간주합니다. 따라서 네트워크 노드는 UTXO 세트에서 이 출력을 제거할 수 있습니다. OP_RETURN은 종종 Blockchain에 임의의 데이터를 기록하는 데 사용됩니다.
reviewed: true
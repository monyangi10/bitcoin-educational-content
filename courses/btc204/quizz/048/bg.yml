question: Какво представлява OP_RETURN в транзакция Bitcoin?
answer: Операционен код, който маркира изхода като невалиден и позволява съхраняването на данни.
wrong_answers:
  - Операционен код, който проверява валидността на подписа в транзакция Bitcoin.
  - Опкод, който съдържа хипервръзка към файл, съхраняван в IPFS.
  - Команда, която изтрива транзакция от блокчейна на Bitcoin.
explanation: |
  OP_RETURN е опкод, който сигнализира за невалиден скрипт, правейки съдържащия се в него изход доказано неизползваем. По този начин мрежовите възли могат да премахнат този изход от своя набор UTXO. OP_RETURN често се използва за записване на произволни данни в блокчейна.
reviewed: true
question: OP_RETURN और Bitcoin ट्रांजेक्शन में OP_RETURN क्या होता है?
answer: एक ऐसा ऑपकोड जो आउटपुट को अमान्य (invalid) मार्क करता है और डेटा स्टोरेज की अनुमति देता है।
wrong_answers:
  - एक ओपकोड जो Bitcoin ट्रांजैक्शन में सिग्नेचर की वैधता को वेरिफाई करता है।
  - एक ऑपकोड जिसमें IPFS पर संग्रहीत एक फ़ाइल का हाइपरलिंक होता है।
  - एक कमांड जो Bitcoin Blockchain से एक ट्रांजैक्शन डिलीट कर देता है।
explanation: |
OP_RETURN एक ऐसा ऑपकोड है जो अमान्य स्क्रिप्ट का संकेत देता है, जिससे इसके अंदर मौजूद आउटपुट को साबित तौर पर खर्च न करने योग्य बना देता है। इसलिए, नेटवर्क नोड्स इस आउटपुट को अपने UTXO सेट से हटा सकते हैं। OP_RETURN का उपयोग अक्सर Blockchain में मनमाना डेटा रिकॉर्ड करने के लिए किया जाता है।

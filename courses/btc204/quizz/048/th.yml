question: OP_RETURN ในธุรกรรม Bitcoin คืออะไร?
answer: รหัสปฏิบัติการที่ทำเครื่องหมายเอาต์พุตว่าไม่ถูกต้องและอนุญาตให้จัดเก็บข้อมูล
wrong_answers:
  - รหัสปฏิบัติการที่ตรวจสอบความถูกต้องของลายเซ็นในธุรกรรม Bitcoin
  - ออปโค้ดที่มีไฮเปอร์ลิงก์ไปยังไฟล์ที่เก็บไว้บน IPFS.
  - คำสั่งที่ลบธุรกรรมจากบล็อกเชน Bitcoin
explanation: |
  OP_RETURN เป็นรหัสปฏิบัติการที่ส่งสัญญาณสคริปต์ที่ไม่ถูกต้อง ทำให้ผลลัพธ์ที่มีอยู่ไม่สามารถใช้จ่ายได้อย่างพิสูจน์ได้ ดังนั้น โหนดเครือข่ายสามารถลบผลลัพธ์นี้ออกจากชุด UTXO ของพวกเขาได้ OP_RETURN มักถูกใช้เพื่อบันทึกข้อมูลตามอำเภอใจในบล็อกเชน
reviewed: true
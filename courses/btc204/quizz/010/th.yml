question: บนเหรียญ มีเกณฑ์พื้นฐาน 3 ข้อที่ช่วยให้บุคคลมั่นใจได้ว่าสามารถใช้จ่ายได้ในภายหลังคืออะไร?
answer: เหรียญต้องอยู่ในสภาพสมบูรณ์ เป็นของแท้ และต้องไม่ถูกใช้ซ้ำ
wrong_answers:
  - เหรียญต้องเป็นของโบราณ หายาก และอยู่ในสภาพดี
  - เหรียญต้องได้รับการยอมรับทั่วโลก ถูกกฎหมาย และเก็บไว้ในธนาคาร
  - เหรียญต้องได้รับการอนุมัติจากรัฐ จดทะเบียน และทนทาน
explanation: |
  บุคคลที่มีเหตุผลใด ๆ ที่ต้องการรับเหรียญ ไม่ว่าจะเป็นดิจิทัลหรือกายภาพ จะต้องมั่นใจว่าเหรียญนั้นไม่ได้ถูกแก้ไข ว่าเป็นเหรียญจริง และไม่สามารถนำกลับมาใช้ใหม่โดยผู้ออกได้
reviewed: true
question: Кои са трите основни критерия, които позволяват на човек да си гарантира, че ще може да я похарчи по-късно?
answer: Монетата трябва да е непокътната, автентична и да не е двойно похарчена.
wrong_answers:
  - Монетата трябва да е древна, рядка и в добро състояние.
  - Монетата трябва да е общоприета, законна и да се съхранява в банка.
  - Монетата трябва да бъде одобрена от държавата, регистрирана и трайна.
explanation: |
  Всеки разумен човек, който иска да приеме монета, независимо дали е цифрова или физическа, се уверява, че тя не е променена, че наистина е истинска монета и че не може да бъде използвана повторно от емитента.
reviewed: true
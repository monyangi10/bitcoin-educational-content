question: コインにおいて、後で使用できることを保証するための3つの基本的な基準は何ですか？
answer: コインが無傷であること、本物であること、二重支払いされていないこと
wrong_answers:
  - コインが古代のもので、珍しく、良い状態であること
  - コインが普遍的に受け入れられ、合法で、銀行に保管されていること
  - コインが国家によって承認され、登録され、耐久性があること
explanation: |
  デジタルであれ物理的であれ、コインを受け入れようとするどんな合理的な個人も、それが改変されていないこと、本当に本物のコインであること、発行者によって再利用されないことを確認します。

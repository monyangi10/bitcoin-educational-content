question: Coin에서 나중에 사용할 수 있도록 보장하는 3가지 기본 기준은 무엇인가요?
answer: Coin은 온전하고 진품이어야 하며 이중으로 사용되어서는 안 됩니다.
wrong_answers:
  - Coin는 고대의 희귀한 제품이어야 하며 상태가 양호해야 합니다.
  - Coin는 보편적으로 통용되고 합법적이며 은행에 보관해야 합니다.
  - Coin는 주정부의 승인을 받아야 하며, 등록되어 있고 내구성이 있어야 합니다.
explanation: |
  디지털이든 실물이든 Coin를 받으려는 이성적인 개인이라면 누구나 Coin가 변조되지 않았는지, 실제 Coin인지, 발급자가 재사용할 수 없는지 확인해야 합니다.
reviewed: true
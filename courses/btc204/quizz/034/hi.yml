question: एक साधारण भुगतान लेनदेन में, जहां 500,000 Sats का इनपुट है जो 47,500 Sats के एक आउटपुट और 451,000 Sats के दूसरे आउटपुट में बंटा हुआ है, तो कौन सा UTXO संभावित रूप से बचत (चेंज) होगा?  

**जवाब:** 451,000 Sats वाला आउटपुट UTXO (चेंज) होने की संभावना है, क्योंकि यह इनपुट रकम (500,000 Sats) के करीब है और 47,500 Sats वाला आउटपुट मुख्य भुगतान जैसा दिखता है।
answer: 451,000 Sats वाला एक।
wrong_answers:
  - ५,००,००० Sats में से एक।
  - 47,500 Sats वाला एक।
  - कोई भी नहीं।
explanation: |
  जब एक साधारण भुगतान मॉडल पर लेन-देन में दो आउटपुट के बीच काफी बड़ा अंतर होता है, तो यह अनुमान लगाया जा सकता है कि बड़ा आउटपुट संभवतः बचत (चेंज) है।
reviewed: false
question: ในการทำธุรกรรมการชำระเงินแบบง่าย ๆ ที่มีการป้อนข้อมูล 500,000 sats แบ่งออกเป็นผลลัพธ์หนึ่งที่ 47,500 sats และอีกหนึ่งที่ 451,000 sats, UTXO ใดที่น่าจะเป็นเงินทอน?
answer: อันที่มี 451,000 sats.
wrong_answers:
  - คนที่มี 500,000 sats.
  - อันที่มี 47,500 sats.
  - ไม่มีใครเลย
explanation: |
  เมื่อมีความแตกต่างที่มากพอระหว่างสองผลลัพธ์ในธุรกรรมบนโมเดลการชำระเงินแบบง่าย สามารถประมาณได้ว่าผลลัพธ์ที่ใหญ่กว่าน่าจะเป็นผลมาจากการเปลี่ยนแปลง
reviewed: true
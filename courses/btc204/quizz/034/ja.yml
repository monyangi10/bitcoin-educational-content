question: 単純な支払いトランザクションで、500,000 satsがインプットされ、一方のアウトプットが47,500 sats、もう一方が451,000 satsに分割される場合、どちらのUTXOがチェンジと考えられるでしょうか？
answer: 451,000 sats
wrong_answers:
  - 500,000 sats
  - 47,500 sats
  - どちらも違う
explanation: |
  単純な支払いモデルのトランザクションで、2つのアウトプット間に十分に大きな差がある場合、より大きなアウトプットがチェンジであると推定できます。
reviewed: false

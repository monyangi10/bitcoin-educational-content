question: 500,000Sats의 입력이 47,500Sats의 출력과 451,000Sats의 출력으로 나뉘는 간편결제 거래에서 변경될 가능성이 있는 UTXO은 어느 것일까요?
answer: 451,000 Sats를 가진 것.
wrong_answers:
  - 500,000 Sats를 가진 것.
  - 47,500 Sats.
  - 하나도 없습니다.
explanation: |
  간편결제 모델에서 거래에서 두 결과값 사이에 충분히 큰 차이가 있는 경우, 더 큰 결과값이 변경의 결과일 가능성이 높다고 추정할 수 있습니다.
reviewed: true
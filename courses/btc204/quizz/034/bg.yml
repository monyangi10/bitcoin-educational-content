question: При обикновена платежна операция, при която има входяща стойност от 500 000 sats, разделена на една изходяща стойност от 47 500 sats и друга от 451 000 sats, коя UTXO вероятно е промяната?
answer: Този с 451 000 sats.
wrong_answers:
  - Този с 500 000 sats.
  - Този с 47 500 sats.
  - Никой от тях.
explanation: |
  Когато има достатъчно голяма разлика между два резултата от транзакция по прост модел на плащане, може да се прецени, че по-големият резултат вероятно е резултат от промяна.
reviewed: true
question: Какво означава съкращението UTXO на английски език?
answer: Неизразходван изход от транзакция (unspent transaction output)
wrong_answers:
  - Унифициран изход на транзакция
  - Само потребителски транзакции
  - Опция за полезен токен на борса
explanation: |
  UTXO е резултат от транзакция, който все още не е изразходван.
reviewed: true

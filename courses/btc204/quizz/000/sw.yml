question: Je, ufupi wa UTXO unaanisha nini kwa Kiingereza?
answer: Pato la Muamala Lisilotumika
wrong_answers:
  - Pato la Muamala Iliyounganishwa
  - Muamala wa Mtumiaji Pekee
  - Chaguo la Ishara ya Utility Exchange
explanation: |
  UTXO ni matokeo ya shughuli ambayo bado haijatumika.

question: Кое е основното предимство на Silent Payments в сравнение с BIP47?
answer: Те не изискват транзакция за уведомяване.
wrong_answers:
  - Те предлагат пълна поверителност на транзакциите.
  - Те позволяват възстановяване на сумата от получателя.
  - Те осигуряват съвместимост с всички портфейли.
explanation: |
  Тихите плащания се извършват без транзакция с известие, което спестява такси за транзакции и предотвратява претоварването на блокчейна.
reviewed: true
question: ข้อได้เปรียบหลักของ Silent Payments เมื่อเทียบกับ BIP47 คืออะไร?
answer: พวกเขาไม่ต้องการการทำธุรกรรมแจ้งเตือน
wrong_answers:
  - พวกเขาเสนอความเป็นส่วนตัวในการทำธุรกรรมอย่างสมบูรณ์
  - พวกเขาอนุญาตให้มีการคืนเงินจากผู้รับ
  - พวกเขารับประกันความเข้ากันได้กับกระเป๋าเงินทั้งหมด
explanation: |
  Silent Payments ทำงานโดยไม่มีการแจ้งเตือนการทำธุรกรรม ซึ่งช่วยประหยัดค่าธรรมเนียมการทำธุรกรรมและหลีกเลี่ยงการโอเวอร์โหลดบล็อกเชน
reviewed: true
question: Silent Payments का मुख्य फायदा BIP47 के मुकाबले यह है कि इसमें **प्राइवेसी ज्यादा बढ़िया है**।  

- **No Reusable Addresses**: BIP47 में आपको एक ही payment code बार-बार इस्तेमाल करना पड़ता है, जिससे privacy कम हो जाती है। वहीं, Silent Payments हर ट्रांजैक्शन के लिए नया, यूनिक एड्रेस जनरेट करता है।  
- **No On-Chain Linkage**: BIP47 में sender और receiver के बीच का connection ब्लॉकचेन पर दिखता है, लेकिन Silent Payments में ऐसा नहीं होता।  
- **No Extra Metadata**: BIP47 को payment codes और notification transactions की जरूरत पड़ती है, जबकि Silent Payments बिना किसी अतिरिक्त डेटा के काम करता है।  

सीधे शब्दों में कहें तो, **Silent Payments ज्यादा गोपनीय और हल्का (lightweight) सॉल्यूशन है**।
answer: उन्हें एक नोटिफिकेशन ट्रांजैक्शन की जरूरत नहीं है।
wrong_answers:
  - वे पूरी तरह से लेन-देन की गोपनीयता प्रदान करते हैं।
  - वे रिसीवर से रिफंड की अनुमति देते हैं।
  - वे सभी वॉलेट्स के साथ कंपैटिबिलिटी सुनिश्चित करते हैं।
explanation: |
साइलेंट पेमेंट्स बिना किसी नोटिफिकेशन ट्रांजैक्शन के काम करते हैं, जिससे ट्रांजैक्शन फीस कम होती है और Blockchain पर ज्यादा लोड नहीं पड़ता।

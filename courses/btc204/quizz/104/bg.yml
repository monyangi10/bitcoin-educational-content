question: Каква е максималната ентропия на транзакция?
answer: Най-високата ентропия, която може да се постигне от структура на транзакция.
wrong_answers:
  - Най-ниската ентропия, която може да бъде постигната от дадена структура на транзакция.
  - Действителната ентропия на транзакцията.
  - Ефективността на дадена транзакция.
explanation: |
  Максималната ентропия се отнася до най-високата ентропия, която дадена структура на транзакция може да постигне теоретично.
  
reviewed: true
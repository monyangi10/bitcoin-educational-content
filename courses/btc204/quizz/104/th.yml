question: อะไรคือเอนโทรปีสูงสุดของธุรกรรม?
answer: เอนโทรปีสูงสุดที่โครงสร้างธุรกรรมสามารถทำได้
wrong_answers:
  - เอนโทรปีต่ำสุดที่โครงสร้างธุรกรรมสามารถทำได้
  - เอนโทรปีที่แท้จริงของธุรกรรม
  - ประสิทธิภาพของการทำธุรกรรม
explanation: |
  เอนโทรปีสูงสุดหมายถึงเอนโทรปีที่สูงที่สุดที่โครงสร้างการทำธุรกรรมเฉพาะสามารถบรรลุได้ในทางทฤษฎี
reviewed: true
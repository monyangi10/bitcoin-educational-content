question: एक ट्रांजैक्शन की अधिकतम एंट्रॉपी क्या होती है?
answer: एक ट्रांजैक्शन स्ट्रक्चर जितनी अधिकतम एंट्रॉपी हासिल कर सकता है।
wrong_answers:
  - एक लेन-देन संरचना द्वारा प्राप्त की जा सकने वाली सबसे कम एन्ट्रॉपी।
  - एक लेन-देन की असली एन्ट्रॉपी।
  - एक लेन-देन की कार्यक्षमता।
explanation: |
"मैक्सिमम एंट्रॉपी" का मतलब है किसी खास ट्रांजैक्शन स्ट्रक्चर द्वारा थ्योरेटिकली हासिल की जा सकने वाली सबसे ज्यादा एंट्रॉपी।

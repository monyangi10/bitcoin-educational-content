question: KYC คืออะไร?
answer: ขั้นตอนในการยืนยันและบันทึกตัวตนของลูกค้า
wrong_answers:
  - ระบบการเข้ารหัสเพื่อความปลอดภัยของธุรกรรมทางการเงิน
  - วิธีการตรวจสอบความถูกต้องสำหรับธุรกรรมทางการเงิน
  - เทคนิคการตลาดเพื่อวิเคราะห์พฤติกรรมของลูกค้า
explanation: |
  KYC ย่อมาจาก Know Your Customer เป็นกระบวนการทางกฎหมายเพื่อยืนยันตัวตนของลูกค้า
reviewed: true
question: Какво е KYC?
answer: Процедура за проверка и регистриране на самоличността на клиентите.
wrong_answers:
  - Криптографска система за защита на финансови транзакции.
  - Метод за валидиране на финансови транзакции.
  - Маркетингова техника за анализ на поведението на клиентите.
explanation: |
  KYC е съкращение от "Познай своя клиент". Това наистина е регулаторна процедура за проверка на самоличността на клиента.
reviewed: true
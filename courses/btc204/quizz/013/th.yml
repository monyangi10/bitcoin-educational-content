question: รูปแบบความเป็นส่วนตัวของระบบธนาคารคืออะไร?
answer: มีเพียงธนาคารเท่านั้นที่สามารถเข้าถึงรายละเอียดการทำธุรกรรมได้
wrong_answers:
  - ธุรกรรมเป็นสาธารณะ แต่ตัวตนของผู้ใช้ไม่เป็นที่รู้จัก
  - ธุรกรรมเหล่านี้เป็นแบบไม่ระบุตัวตนและถูกซ่อนไว้จากทุกคน รวมถึงธนาคารด้วย
  - มีเพียงรัฐบาลเท่านั้นที่สามารถเข้าถึงรายละเอียดการทำธุรกรรมได้
explanation: |
  ในระบบดั้งเดิม บัญชีธนาคารแต่ละบัญชีจะเชื่อมโยงกับตัวตนเฉพาะ อย่างไรก็ตาม การไหลของข้อมูลถูกตัดขาดระหว่างธนาคารและสาธารณชน
reviewed: true
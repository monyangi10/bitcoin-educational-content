question: Какъв е моделът на поверителност на банковата система?
answer: Достъп до данните за транзакцията има само банката.
wrong_answers:
  - Транзакциите са публични, но самоличността на потребителите не е известна.
  - Транзакциите са анонимни и скрити за всички, включително за банката.
  - Достъп до данните за транзакциите имат само правителствата.
explanation: |
  В традиционната система всяка банкова сметка е свързана с конкретна самоличност. Потокът от информация обаче е прекъснат между банката и публичното пространство.
reviewed: true
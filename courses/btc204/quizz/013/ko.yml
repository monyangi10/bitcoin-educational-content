question: 뱅킹 시스템의 개인정보 보호 모델은 무엇인가요?
answer: 은행만 거래 세부 정보에 액세스할 수 있습니다.
wrong_answers:
  - 거래는 공개되지만 사용자의 신원은 알 수 없습니다.
  - 거래는 익명으로 처리되며 은행을 포함한 모든 사람에게 공개되지 않습니다.
  - 정부만 거래 세부 정보에 액세스할 수 있습니다.
explanation: |
  기존 시스템에서는 각 은행 계좌가 특정 신원과 연결되어 있습니다. 하지만 은행과 퍼블릭 도메인 사이에는 정보의 흐름이 단절되어 있습니다.
reviewed: true
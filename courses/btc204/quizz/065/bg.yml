question: Какво е прах в контекста на UTXO?
answer: UTXOs, чиято стойност е твърде ниска, за да покрие необходимите такси за изразходването им.
wrong_answers:
  - UTXO, генерирани от грешки в транзакциите, които не могат да бъдат потвърдени в блокчейна.
  - UTXO, които са маркирани като подозрителни или свързани с незаконни дейности в мрежата.
  - UTXO, които се съхраняват на адреси, които не се използват от дълго време и се считат за изгубени.
explanation: |
  Dust се отнася за UTXO, чиято стойност в sats е толкова ниска, че не е достатъчна, за да покрие таксите за транзакции, необходими за тяхното изразходване.
  
reviewed: true
question: UTXO의 맥락에서 Dust이란 무엇인가요?
answer: 가치가 너무 낮아서 필요한 수수료를 감당할 수 없는 UTXO.
wrong_answers:
  - Blockchain에서 확인할 수 없는 트랜잭션 오류로 인해 생성된 UTXO입니다.
  - 네트워크에서 의심스러운 것으로 표시되거나 불법 활동과 연관된 것으로 표시된 UTXO.
  - 오랫동안 사용하지 않은 주소에 저장되어 분실된 것으로 간주되는 UTXO.
explanation: |
  Dust는 Sats의 가치가 너무 낮아 이를 사용하는 데 필요한 거래 수수료를 충당하기에 충분하지 않은 UTXO를 말합니다.
  
reviewed: true
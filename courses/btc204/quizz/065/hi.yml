question: Dust, UTXOs के संदर्भ में क्या है?
answer: ऐसे UTXO जिनकी वैल्यू इतनी कम है कि उन्हें खर्च करने के लिए जरूरी फीस को कवर नहीं कर पाते।
wrong_answers:
  - ट्रांजैक्शन एरर्स से बने UTXOs जिन्हें Blockchain पर कन्फर्म नहीं किया जा सकता।
  - नेटवर्क पर संदिग्ध या अवैध गतिविधियों से जुड़े हुए UTXOs।
  - वे UTXOs जो लंबे समय से इस्तेमाल नहीं किए गए पतों में संग्रहीत हैं और खोए हुए माने जाते हैं।
explanation: |
Dust उन UTXOs को संदर्भित करता है जिनका मूल्य Sats में इतना कम होता है कि उन्हें खर्च करने के लिए आवश्यक लेन-देन शुल्क को पूरा करने के लिए पर्याप्त नहीं होता।

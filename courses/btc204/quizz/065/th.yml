question: ฝุ่นคืออะไรในบริบทของ UTXOs?
answer: UTXOs ที่มีมูลค่าต่ำเกินกว่าที่จะครอบคลุมค่าธรรมเนียมที่จำเป็นในการใช้จ่ายพวกมัน
wrong_answers:
  - UTXOs ที่เกิดจากข้อผิดพลาดของธุรกรรมที่ไม่สามารถยืนยันบนบล็อกเชนได้
  - UTXOs ที่ถูกระบุว่าน่าสงสัยหรือเชื่อมโยงกับกิจกรรมที่ผิดกฎหมายบนเครือข่าย
  - UTXOs ที่ถูกเก็บไว้ในที่อยู่ที่ไม่ได้ใช้งานเป็นเวลานานและถือว่าหายไปแล้ว
explanation: |
  Dust หมายถึง UTXOs ที่มีมูลค่าใน sats ต่ำมากจนไม่เพียงพอที่จะครอบคลุมค่าธรรมเนียมการทำธุรกรรมที่จำเป็นในการใช้จ่ายพวกมัน
reviewed: true
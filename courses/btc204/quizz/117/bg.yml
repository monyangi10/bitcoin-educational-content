question: Колко последователни операции обикновено извършва класическият рикошет?
answer: 5
wrong_answers:
  - 2
  - 8
  - 14
explanation: |
  Методът "рикошет" обикновено включва извършването на 4 трансакции към себе си и една последна, с която средствата се изпращат на крайния получател.
  
reviewed: true
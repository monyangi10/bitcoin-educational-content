question: もし私たちが単純な支払いトランザクションでアウトプットが丸い金額であることを観察した場合、どのような解釈を導き出すことができるでしょうか？
answer: 丸いアウトプットはもはやインプットユーザーのものではない
wrong_answers:
  - 丸いアウトプットはトランザクション手数料のためのものである
  - 丸いアウトプットは依然としてインプットユーザーのものである
  - 丸いアウトプットは予約アドレスである
explanation: |
  単純な支払いパターン（1つのインプットと2つのアウトプット）に直面した場合、アウトプットの一つが丸い金額を使っているなら、それは支払いを表しています。したがって、それはインプットユーザーの所有を離れます。
reviewed: false

question: Ако при обикновена платежна транзакция наблюдаваме, че на изхода има кръгла сума, какво вероятно тълкуване можем да направим от това?
answer: Изходът вече не е собственост на потребителя.
wrong_answers:
  - Кръглият изход е предназначен за такси за транзакции.
  - Изходът все още принадлежи на потребителя на входа.
  - Кръглият изход е резервен адрес.
explanation: |
  Когато се сблъскваме с прост модел на плащане (1 вход и 2 изходи), ако един от изходите изразходва кръгла сума, той представлява плащането. По този начин тя напуска владението на потребителя на входа.
reviewed: true

question: 간편결제 거래에서 출력물에 반올림 금액이 있는 것을 관찰하면 어떤 해석을 도출할 수 있을까요?
answer: 라운드 출력은 더 이상 입력 사용자가 소유하지 않습니다.
wrong_answers:
  - 라운드 출력은 거래 수수료로 사용됩니다.
  - 라운드 출력은 여전히 입력 사용자의 소유입니다.
  - 라운드 출력은 예비 Address입니다.
explanation: |
  간편결제 패턴(입력 1개, 출력 2개)에서 출력 중 하나가 라운드 금액을 소비하면 해당 금액이 결제를 나타냅니다. 따라서 입력 사용자의 소유가 됩니다.
reviewed: true
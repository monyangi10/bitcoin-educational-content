question: หากเราสังเกตเห็นในการทำธุรกรรมการชำระเงินแบบง่าย ๆ ว่ามีผลลัพธ์ที่เป็นจำนวนเต็ม เราสามารถตีความได้ว่าอย่างไร?
answer: เอาต์พุตแบบกลมไม่อยู่ในความครอบครองของผู้ใช้ที่ป้อนข้อมูลอีกต่อไป
wrong_answers:
  - ผลลัพธ์ที่เป็นรอบมีไว้สำหรับค่าธรรมเนียมการทำธุรกรรม
  - เอาต์พุตแบบกลมยังคงเป็นของผู้ใช้ที่ป้อนข้อมูล
  - เอาต์พุตแบบกลมเป็นที่อยู่สำรอง
explanation: |
  เมื่อเผชิญกับรูปแบบการชำระเงินที่ง่าย (1 อินพุตและ 2 เอาต์พุต) หากหนึ่งในเอาต์พุตใช้จำนวนเงินที่เป็นจำนวนเต็ม แสดงว่ามันเป็นตัวแทนของการชำระเงิน ดังนั้นจึงออกจากการครอบครองของผู้ใช้ที่เป็นอินพุต
reviewed: true
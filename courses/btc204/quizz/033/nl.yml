question: Als we bij een eenvoudige betalingstransactie waarnemen dat een output een rond bedrag heeft, welke waarschijnlijke interpretatie kunnen we hier dan uit afleiden?
answer: De ronde output van de ronde is niet langer in het bezit van de input-gebruiker.
wrong_answers:
  - De ronde output is bedoeld voor transactiekosten.
  - De ronde-uitgang behoort nog steeds toe aan de input-gebruiker.
  - De ronde uitgang is een reserve adres.
explanation: |
  Bij een eenvoudig betalingspatroon (1 input en 2 outputs), als een van de outputs een rond bedrag uitgeeft, dan vertegenwoordigt deze de betaling en verlaat daarmee het bezit van de input-gebruiker.
reviewed: false

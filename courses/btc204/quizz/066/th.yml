question: การรวมกิจการเกี่ยวข้องกับอะไร?
answer: การรวมข้อมูลหลายรายการเพื่อสร้างข้อมูลที่ใหญ่ขึ้นเพียงรายการเดียว
wrong_answers:
  - การแบ่งข้อมูลขนาดใหญ่เป็นหลายส่วนที่เล็กลง
  - โอนข้อมูลจากหลายกระเป๋าเงินไปยังกระเป๋าเงินเดียว
  - กำหนดอินพุตที่ไม่ได้ใช้ใหม่ไปยังที่อยู่ใหม่
explanation: |
  หลักการของการรวมบัญชีคือการใช้ประโยชน์จากช่วงเวลาที่ค่าธรรมเนียมต่ำบน Bitcoin เพื่อรวม UTXO ขนาดเล็กหลายรายการให้เป็นรายการเดียวที่ใหญ่ขึ้น
reviewed: true
question: कंसॉलिडेशन में क्या शामिल होता है?
answer: कई इनपुट्स को मिलाकर एक बड़ा इनपुट बनाना।
wrong_answers:
  - एक बड़े इनपुट को कई छोटे इनपुट में बाँटना।
  - कई वॉलेट्स से इनपुट्स को एक ही वॉलेट में ट्रांसफर करना।
  - अनइस्तेमाल इनपुट्स को नए पतों पर दोबारा असाइन करना।
explanation: |
समेकन का सिद्धांत यह है कि जब Bitcoin पर फीस कम हो, तो छोटे UTXOs को मिलाकर एक बड़े UTXO में बदल दिया जाए।

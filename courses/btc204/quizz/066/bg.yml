question: Какво включва консолидацията?
answer: Сливане на няколко входящи UTXO за създаване на един по-голям.
wrong_answers:
  - Разделяне на голям вход на няколко по-малки.
  - Прехвърляне на входни данни от няколко портфейла в един.
  - Пренасочване на неизползвани входове към нови адреси.
explanation: |
  Принципът на консолидацията е да се използват периодите, когато таксите на Bitcoin са ниски, за да се обединят по-малките UTXO в една по-голяма.
  
reviewed: true

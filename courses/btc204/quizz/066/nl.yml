question: Wat houdt consolidatie in?
answer: Meerdere inputs samenvoegen om één grotere te maken.
wrong_answers:
  - Een grote input opsplitsen in meerdere kleinere.
  - Inputs overzetten van meerdere wallets naar een enkele.
  - Ongebruikte inputs opnieuw toewijzen aan nieuwe adressen.
explanation: |
  Het principe van consolidatie is om te profiteren van periodes waarin de Bitcoin-vergoedingen laag zijn om kleinere UTXO's samen te voegen tot één grotere.
  

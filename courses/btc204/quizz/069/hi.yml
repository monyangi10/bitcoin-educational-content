question: Bitcoin ट्रांजैक्शन के वजन को क्या प्रभावित करता है?
answer: इनपुट और आउटपुट की संख्या।
wrong_answers:
  - Blockchain का आकार
  - इनपुट और आउटपुट की मात्रा।
  - यूटीएक्सओ (UTXO) की उम्र का इस्तेमाल हुआ।
explanation: |
Bitcoin ट्रांजैक्शन में जितने ज्यादा इनपुट और आउटपुट होंगे, उतना ही वह vB में भारी होगा।

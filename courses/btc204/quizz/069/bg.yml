question: Какво влияе върху тежестта на транзакция Bitcoin?
answer: Броят на входовете и изходите.
wrong_answers:
  - Размерът на блокчейна.
  - Размерът на входовете и изходите.
  - Възрастта на използваните UTXOs.
explanation: |
  Колкото повече входове и изходи има транзакция Bitcoin, толкова по-тежко ще бъде в vB.
  
reviewed: true
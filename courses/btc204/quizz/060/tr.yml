  - Bir UTXO boyutunda.
  - Bir UTXO'ün oluşturulmasıyla ilişkili ücret miktarı.
explanation: |
  Etiketleme, bir UTXO'ün kaynağını hatırlamaya yardımcı olan iyi bir uygulamadır.
  

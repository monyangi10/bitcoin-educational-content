question: Каква информация трябва да бъде посочена на етикета?
answer: Произход на UTXO.
wrong_answers:
  - Датата на създаване на UTXO.
  - Размерът на UTXO.
  - Размерът на таксите, свързани със създаването на UTXO.
explanation: |
  Етикетирането е добра практика, която помага да се запомни произходът на UTXO.
reviewed: true
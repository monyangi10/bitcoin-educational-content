question: Wat is de naam van het patroon dat bestaat uit een enkele input-UTXO en een enkele output-UTXO?
answer: Vegen
wrong_answers:
  - Consolidatie
  - CoinJoin
  - Batch-uitgaven
explanation: |
  De interpretatie van deze structuur is dat we ons in de aanwezigheid van een sweep (vegen) bevinden, wat een zelfoverdracht van bitcoins betekent.
reviewed: false

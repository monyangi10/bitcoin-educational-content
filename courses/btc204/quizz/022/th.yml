question: ชื่อของรูปแบบที่ประกอบด้วย UTXO เดียวในอินพุตและ UTXO เดียวในเอาต์พุตคืออะไร?
answer: กวาด
wrong_answers:
  - การรวมกิจการ
  - Coinjoin
  - การใช้จ่ายแบบกลุ่ม
explanation: |
  การตีความโครงสร้างนี้บ่งชี้ว่าเรากำลังอยู่ในสถานการณ์ของการกวาดล้าง ซึ่งเกี่ยวข้องกับการโอนบิตคอยน์ด้วยตนเอง
reviewed: true
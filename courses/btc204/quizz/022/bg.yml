question: Как се нарича моделът, състоящ се от един UTXO на входа и един UTXO на изхода?
answer: Почистване
wrong_answers:
  - Консолидация
  - Присъединяване към
  - Партидни разходи
explanation: |
  Интерпретацията на тази структура предполага, че сме свидетели на замитане, което включва самостоятелно прехвърляне на биткойни.
reviewed: true
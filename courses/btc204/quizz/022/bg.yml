question: Как се нарича моделът, състоящ се от един UTXO на входа и един UTXO на изхода?
answer: пълно изпращане
wrong_answers:
  - Консолидация
  - Присъединяване
  - Партидни разходи
explanation: |
  Интерпретацията на тази структура предполага, че сме свидетели на пълно изпращане, което включва самостоятелно прехвърляне на биткойни.
reviewed: true

question: 단델리온 프로토콜에서 스템 단계는 어떻게 작동하나요?
answer: 트랜잭션은 임의의 노드 경로를 통해 전송됩니다.
wrong_answers:
  - 트랜잭션은 즉시 소스 노드의 모든 피어에게 브로드캐스트됩니다.
  - 트랜잭션은 브로드캐스트되기 전에 중앙 노드에 일시적으로 저장됩니다.
  - 트랜잭션은 생방송의 각 단계에서 점진적으로 암호화됩니다.
explanation: |
  단델리온은 먼저 무작위 노드 경로를 통해 트랜잭션을 전송하는 스템 단계를 사용합니다. 그런 다음 트랜잭션은 플러프 단계에서 전체 네트워크에 브로드캐스트됩니다.
  
reviewed: true
question: डैंडेलायन प्रोटोकॉल में स्टेम फेज कैसे काम करता है?
answer: लेन-देन नोड्स के एक बेतरतीब रास्ते से भेजा जाता है।
wrong_answers:
  - लेन-देन तुरंत स्रोत नोड के सभी साथियों (पीयर्स) को प्रसारित कर दिया जाता है।
  - ट्रांजैक्शन को ब्रॉडकास्ट करने से पहले अस्थायी रूप से एक सेंट्रल नोड में स्टोर किया जाता है।
  - ट्रांजैक्शन को ब्रॉडकास्ट के हर कदम पर धीरे-धीरे एन्क्रिप्ट किया जाता है।
explanation: |
डैंडेलायन पहले स्टेम फेज का इस्तेमाल करता है जहां ट्रांजैक्शन को नोड्स के रैंडम पथ के जरिए भेजा जाता है। फिर फ्लफ फेज में ट्रांजैक्शन को पूरे नेटवर्क में ब्रॉडकास्ट कर दिया जाता है।

question: Как протича фазата на стъблото в Dandelion протокола?
answer: Транзакцията се изпраща по произволен път от възли.
wrong_answers:
  - Транзакцията се предава незабавно на всички връстници на възела източник.
  - Транзакцията се съхранява временно в централен възел, преди да бъде излъчена.
  - Транзакцията се криптира поетапно на всяка стъпка от излъчването.
explanation: |
  Dandelion първо използва начална фаза, при която транзакцията се изпраща през произволен път от възли. След това транзакцията се разпространява в цялата мрежа във фазата "пух".
  
reviewed: true

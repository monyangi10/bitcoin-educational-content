question: ขั้นตอนของก้านทำงานอย่างไรในโปรโตคอล Dandelion?
answer: ธุรกรรมถูกส่งผ่านเส้นทางสุ่มของโหนด
wrong_answers:
  - ธุรกรรมจะถูกกระจายไปยังเพื่อนร่วมเครือข่ายทั้งหมดของโหนดต้นทางทันที
  - ธุรกรรมถูกจัดเก็บชั่วคราวในโหนดกลางก่อนที่จะถูกกระจายออกไป
  - ธุรกรรมถูกเข้ารหัสแบบเพิ่มขึ้นในแต่ละขั้นตอนของการกระจายสัญญาณ
explanation: |
  แดนดิไลออนเริ่มต้นด้วยขั้นตอนของลำต้นที่การทำธุรกรรมถูกส่งผ่านเส้นทางสุ่มของโหนด จากนั้นการทำธุรกรรมจะถูกกระจายไปยังเครือข่ายทั้งหมดในขั้นตอนฟลัฟ
reviewed: true
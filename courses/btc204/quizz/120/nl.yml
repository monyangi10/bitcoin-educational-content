question: Hoe werkt de stamfase in het paardenbloem-protocol (dandelion)?
answer: De transactie wordt verzonden via een willekeurig pad van knooppunten (nodes)
wrong_answers:
  - De transactie wordt onmiddellijk uitgezonden naar alle peers van het bronknooppunt.
  - De transactie wordt tijdelijk opgeslagen in een centraal knooppunt voordat ze wordt uitgezonden.
  - De transactie wordt bij elke stap van de uitzending incrementeel versleuteld.
explanation: |
  Dandelion gebruikt eerst een stamfase waarin de transactie door een willekeurig pad van knooppunten wordt gestuurd. De transactie wordt vervolgens uitgezonden naar het hele netwerk in de fluff-fase.
  
reviewed: false

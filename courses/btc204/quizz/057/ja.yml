question: アドレスの再利用に関連する主な脅威は何ですか？

answer: 異なるトランザクション間および関連する未使用トランザクションアウトプット（UTXO）の共通の所有権に決定的なリンクを確立することが可能になること

wrong_answers:
  - トランザクションの検証中に他のネットワーク参加者にユーザーのIPアドレスを露出させること
  - デジタル署名メカニズムの効果を低下させ、トランザクションのセキュリティを弱めること
  - アドレスの再利用によって引き起こされる混雑により、トランザクション手数料が増加すること

explanation: |
  同じアドレスが複数のトランザクションに使用される場合、そのアドレスに関連するすべてのビットコインが同一人物に属していると推測することが可能になります。

reviewed: false

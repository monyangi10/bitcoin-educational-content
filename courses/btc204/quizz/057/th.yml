question: ภัยคุกคามหลักที่เกี่ยวข้องกับการใช้ที่อยู่ซ้ำคืออะไร?
answer: มันอนุญาตให้มีการสร้างลิงก์แบบกำหนดได้ระหว่างธุรกรรมต่างๆ และการเป็นเจ้าของร่วมกันของ UTXOs ที่เกี่ยวข้อง
wrong_answers:
  - มันเปิดเผยที่อยู่ IP ของผู้ใช้ให้กับผู้เข้าร่วมเครือข่ายอื่น ๆ ในระหว่างการตรวจสอบธุรกรรม
  - มันลดประสิทธิภาพของกลไกการลงนามดิจิทัล ซึ่งทำให้ความปลอดภัยของการทำธุรกรรมอ่อนแอลง
  - มันนำไปสู่การเพิ่มขึ้นของค่าธรรมเนียมการทำธุรกรรมเนื่องจากความแออัดที่เกิดจากการใช้ที่อยู่ซ้ำ
explanation: |
  หากมีการใช้ที่อยู่เดียวกันสำหรับธุรกรรมหลายรายการ จะสามารถสรุปได้ว่า bitcoins ทั้งหมดที่เกี่ยวข้องกับที่อยู่นั้นเป็นของบุคคลเดียวกัน
reviewed: true
question: Address 재사용과 관련된 주요 위협은 무엇인가요?
answer: 이를 통해 서로 다른 트랜잭션과 해당 UTXO의 공통 Ownership 간에 결정론적 링크를 설정할 수 있습니다.
wrong_answers:
  - 트랜잭션 유효성 검사 중에 사용자의 IP Address를 다른 네트워크 참여자에게 노출합니다.
  - 이는 디지털 서명 메커니즘의 효율성을 감소시켜 거래의 보안을 약화시킵니다.
  - Address 재사용으로 인한 혼잡으로 인해 거래 수수료가 증가합니다.
explanation: |
  동일한 Address가 여러 거래에 사용되는 경우, 해당 Address와 관련된 모든 비트코인이 동일한 사람의 소유라는 추론이 가능해집니다.
reviewed: true
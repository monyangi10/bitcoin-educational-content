question: Каква е основната заплаха, свързана с повторното използване на адреси?
answer: Тя позволява да се установят детерминистични връзки между различни транзакции и обща собственост на съответните UTXO.
wrong_answers:
  - По време на валидирането на транзакцията IP адресът на потребителя се разкрива пред другите участници в мрежата.
  - Това намалява ефективността на механизмите за цифров подпис, което отслабва сигурността на транзакциите.
  - Това води до увеличаване на таксите за транзакции поради претоварване, причинено от повторното използване на адреси.
explanation: |
  Ако един и същ адрес се използва за множество транзакции, може да се заключи, че всички биткойни, свързани с този адрес, принадлежат на едно и също лице.
reviewed: true
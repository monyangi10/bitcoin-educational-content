question: Address के दोबारा इस्तेमाल से जुड़ा मुख्य खतरा क्या है?
answer: यह अलग-अलग लेन-देन और संबंधित UTXOs के एक सामान्य Ownership के बीच निश्चित लिंक स्थापित करने की अनुमति देता है।
wrong_answers:
  - यह ट्रांजैक्शन वैलिडेशन के दौरान यूज़र के आईपी Address को दूसरे नेटवर्क पार्टिसिपेंट्स के सामने उजागर कर देता है।
  - यह डिजिटल सिग्नेचर मैकेनिज्म की प्रभावशीलता को कम कर देता है, जिससे लेन-देन की सुरक्षा कमजोर हो जाती है।
  - इससे Address के दोबारा इस्तेमाल की वजह से भीड़भाड़ होती है, जिसकी वजह से लेन-देन शुल्क बढ़ जाता है।
explanation: |
अगर एक ही Address कई लेन-देन में इस्तेमाल होता है, तो यह पता लगाना मुमकिन हो जाता है कि उस Address से जुड़े सारे बिटकॉइन एक ही शख्स के हैं।

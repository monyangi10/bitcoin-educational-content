question: วิธีการเข้ารหัสที่สามารถใช้ใน coinswaps เพื่อรับรองความปลอดภัยของการแลกเปลี่ยนโดยไม่ต้องการความไว้วางใจคืออะไร?
answer: ลายเซ็นต์อะแดปเตอร์
wrong_answers:
  - การเข้ารหัสแบบสมมาตร
  - ECDH
  - การเข้ารหัสแบบอสมมาตร
explanation: |
  ในการทำ coinswap สามารถใช้ HTLCs หรือ PTLCs ได้ โปรโตคอลทั้งสองนี้ทำงานในลักษณะที่คล้ายกันโดยใช้ระบบ time-lock ที่รับประกันว่าการแลกเปลี่ยนจะเสร็จสมบูรณ์หรือยกเลิกทั้งหมด ซึ่งจะปกป้องความสมบูรณ์ของเงินทุนจากทั้งสองฝ่าย ความแตกต่างหลักระหว่าง HTLCs และ PTLCs คือ HTLCs ใช้แฮชและภาพก่อนหน้าเพื่อรักษาความปลอดภัยของธุรกรรม ในขณะที่ PTLCs ใช้ Adaptor Signatures
reviewed: true
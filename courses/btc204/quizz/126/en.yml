question: What cryptographic method can be used in coinswaps to ensure the security of the exchange without the need for trust?

answer: Adaptor Signatures

wrong_answers:
  - Symmetric encryption
  - ECDH
  - Asymmetric encryption

explanation: |
  To perform a coinswap, one can use HTLCs or PTLCs. These two protocols operate in a similar manner by utilizing a time-lock system that ensures the exchange is either completed successfully or fully canceled, thereby protecting the integrity of the funds from both parties. The main difference between HTLCs and PTLCs is that HTLCs utilize hashes and preimages to secure the transaction, whereas PTLCs employ Adaptor Signatures.

reviewed: true

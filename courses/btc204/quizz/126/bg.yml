question: Какъв криптографски метод може да се използва при обмена на монети, за да се гарантира сигурността на обмена, без да е необходимо доверие?
answer: Подписи на адаптера
wrong_answers:
  - Симетрично криптиране
  - ECDH
  - Асиметрично криптиране
explanation: |
  За да се извърши размяна на монети, могат да се използват HTLC или PTLC. Тези два протокола работят по сходен начин, като използват система за заключване на времето, която гарантира, че обменът е или успешно завършен, или напълно отменен, като по този начин се защитава целостта на средствата и от двете страни. Основната разлика между HTLC и PTLC е, че HTLC използват хешове и предварителни изображения за защита на трансакцията, докато PTLC използват адаптивни подписи.
  
reviewed: true
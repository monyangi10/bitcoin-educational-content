explanation: |
सिक्कों की अदला-बदली (coinswap) करने के लिए, आप HTLCs या PTLCs का इस्तेमाल कर सकते हैं। ये दोनों प्रोटोकॉल एक जैसे तरीके से काम करते हैं, जिसमें एक टाइम-लॉक सिस्टम का उपयोग होता है। यह सुनिश्चित करता है कि Exchange या तो सफलतापूर्वक पूरा हो जाए या पूरी तरह रद्द हो जाए, जिससे दोनों पक्षों के फंड्स की सुरक्षा बनी रहती है। HTLCs और PTLCs में मुख्य अंतर यह है कि HTLCs लेन-देन को सुरक्षित रखने के लिए हैश और प्रीइमेज का उपयोग करते हैं, जबकि PTLCs एडाप्टर सिग्नेचर्स का इस्तेमाल करते हैं।

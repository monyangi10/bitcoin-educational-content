question: 코인스왑에서 신뢰 없이 Exchange의 보안을 보장하기 위해 어떤 암호화 방법을 사용할 수 있나요?
answer: 어댑터 서명
wrong_answers:
  - 대칭 암호화
  - ECDH
  - 비대칭 암호화
explanation: |
  코인스왑을 수행하려면 HTLC 또는 PTLC를 사용할 수 있습니다. 이 두 프로토콜은 Exchange이 성공적으로 완료되거나 완전히 취소되도록 보장하는 타임락 시스템을 활용하여 양 당사자로부터 자금의 무결성을 보호하는 유사한 방식으로 작동합니다. HTLC와 PTLC의 가장 큰 차이점은 HTLC는 해시와 프리이미지를 사용해 거래를 보호하는 반면, PTLC는 어댑터 서명을 사용한다는 점입니다.
  
reviewed: true
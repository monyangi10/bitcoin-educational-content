question: คำว่าอะไรที่ใช้อธิบายการป้องกันที่เกิดจากการใช้ coinjoin ต่อการวิเคราะห์ธุรกรรมที่ผ่านมา?
answer: การตั้งค่าผู้ไม่ประสงค์ออกนามย้อนหลัง
wrong_answers:
  - กลุ่มนิรนามที่คาดหวัง
  - ความต้านทานการตรวจสอบย้อนกลับ
  - ความเป็นส่วนตัวชั่วคราว
explanation: |
  การป้องกันการวิเคราะห์จากปัจจุบันไปยังอดีตคือสิ่งที่เรียกว่าการไม่เปิดเผยย้อนหลัง
reviewed: true
question: Кой термин описва защитата, която предлага монетното обединение, срещу анализа на минали транзакции на дадена монета?
answer: Ретроспективен анонс.
wrong_answers:
  - Перспективен анонс.
  - Устойчивост на проследяване.
  - Времева поверителност.
explanation: |
  Защитата срещу анализ от настоящето към миналото е т.нар. ретроспективен анонс.
  
reviewed: true
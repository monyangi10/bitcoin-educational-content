question: Ако наблюдаваме транзакция с 6 UTXOs като входове и само един UTXO като изход, какво вероятно тълкуване можем да направим?
answer: Всички UTXO на входа са принадлежали на един и същ потребител и този потребител все още притежава UTXO на изхода.
wrong_answers:
  - Входящите UTXO са от различни потребители, които си сътрудничат за една транзакция.
  - Всички UTXO на входа са принадлежали на един и същ потребител, а този на изхода вече принадлежи на друг потребител.
  - UTXOs на входа са от 2 различни потребители, а този на изхода все още принадлежи на тези 2 потребители.
explanation: |
  Вероятно сме в процес на консолидация. Следователно е налице обща собственост върху входящите и изходящите ресурси.
reviewed: true
question: 6개의 UTXO를 입력으로 하고 하나의 UTXO만 출력으로 하는 트랜잭션을 관찰한다면 어떤 해석을 도출할 수 있을까요?
answer: 입력의 모든 UTXO는 동일한 사용자의 소유이며, 이 사용자는 여전히 출력의 UTXO을 소유하고 있습니다.
wrong_answers:
  - 입력된 UTXO는 단일 트랜잭션을 위해 협업하는 여러 사용자로부터 나온 것입니다.
  - 입력에 있는 모든 UTXO는 동일한 사용자의 것이었고 출력에 있는 것은 이제 다른 사용자의 것이었습니다.
  - 입력의 UTXO는 2명의 다른 사용자로부터 왔으며 출력의 UTXO는 여전히 이 2명의 사용자에 속합니다.
explanation: |
  우리는 통합이 있을 가능성이 높습니다. 따라서 입력과 출력의 공통 Ownership가 있습니다.
reviewed: true
question: Защо анализаторът няма да приложи CIOH върху транзакция от тип Stonewall?
answer: Защото има 2 изхода с еднаква стойност
wrong_answers:
  - Защото има само 2 входа
  - Тъй като не са запознати с този модел
  - Защото има повече изходи, отколкото входове
explanation: |
  
  Анализът на транзакция Stonewall отвън не води до прилагане на CIOH, тъй като наличието на два outputs с еднакъв размер предполага pattern на coinjoin. От външна гледна точка CIOH следователно не е приложима в този конкретен случай.

reviewed: true
question: Защо анализаторът не прилага COINJOIN при транзакция от типа "Стоунуол"?
answer: Защото има 2 изхода с еднаква стойност
wrong_answers:
  - Защото има само 2 входа
  - Тъй като не са запознати с този модел
  - Защото има повече изходи, отколкото входове
explanation: |
  Анализирането на транзакция на Stonewall отвън не води до прилагането на COINJOIN, тъй като наличието на два изхода на една и съща сума предполага модел на coinjoin. Следователно от външна гледна точка COINJOIN не е приложим в този конкретен случай.
  
reviewed: true
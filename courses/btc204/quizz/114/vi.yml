question: Tại sao nhà phân tích sẽ không áp dụng CIOH cho giao dịch loại Stonewall?

answer: Bởi vì có 2 đầu ra với cùng một số lượng

wrong_answers:
  - Bởi vì chỉ có 2 đầu vào
  - Bởi vì họ không quen thuộc với mẫu này
  - Bởi vì có nhiều đầu ra hơn so với đầu vào

explanation: |

  Phân tích giao dịch Stonewall từ bên ngoài không dẫn đến việc áp dụng CIOH, vì sự hiện diện của hai output có cùng số tiền gợi ý một mô hình coinjoin. Từ quan điểm bên ngoài, CIOH do đó không áp dụng được trong trường hợp cụ thể này.

reviewed: false
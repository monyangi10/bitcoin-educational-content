question: Zašto analitičar neće primeniti CIOH na transakciju tipa Stonewall?
answer: Zato što postoje 2 izlaza istih iznosa
wrong_answers:
  - Zato što postoje samo 2 ulaza
  - Zato što nisu upoznati sa ovim obrascem
  - Zato što ima više izlaza nego ulaza
explanation: |
  Analiza Stonewall transakcije spolja ne vodi primeni CIOH, jer prisustvo dva outputa istog iznosa sugeriše pattern coinjoin-a. Sa spoljašnje tačke gledišta, CIOH stoga nije primenljiva u ovom specifičnom slučaju.


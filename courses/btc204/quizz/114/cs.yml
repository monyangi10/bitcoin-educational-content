question: Proč analytik nepoužije CIOH na transakci typu Stonewall?

answer: Protože existují 2 výstupy se stejnými částkami

wrong_answers:
  - Protože existují pouze 2 vstupy
  - Protože se s tímto vzorem nejsou obeznámeni
  - Protože je více výstupů než vstupů

explanation: |

  Analýza transakce Stonewall zvenčí nevede k aplikaci CIOH, protože přítomnost dvou outputs stejné částky naznačuje pattern coinjoin. Z vnějšího pohledu tedy CIOH není v tomto specifickém případě použitelná.


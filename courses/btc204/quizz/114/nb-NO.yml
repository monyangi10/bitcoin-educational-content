question: Hvorfor vil ikke analytikeren anvende CIOH på en Stonewall-type transaksjon?

answer: Fordi det er 2 utdata med samme beløp

wrong_answers:
  - Fordi det bare er 2 inndata
  - Fordi de ikke er kjent med dette mønsteret
  - Fordi det er flere utdata enn inndata

explanation: |

  Analyse av en Stonewall-transaksjon fra utsiden fører ikke til anvendelse av CIOH, fordi tilstedeværelsen av to outputs med samme beløp antyder et coinjoin-mønster. Fra et eksternt synspunkt er CIOH derfor ikke anvendelig i dette spesifikke tilfellet.

reviewed: false
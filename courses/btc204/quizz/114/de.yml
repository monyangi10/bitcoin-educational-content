question: Warum wendet der Analyst CIOH nicht auf eine Transaktion vom Typ Stonewall an?

answer: Weil es 2 Ausgänge mit denselben Beträgen gibt

wrong_answers:
  - Weil es nur 2 Eingänge gibt
  - Weil sie mit diesem Muster nicht vertraut sind
  - Weil es mehr Ausgänge als Eingänge gibt

explanation: |

  Die Analyse einer Stonewall-Transaktion von außen führt nicht zur Anwendung der CIOH, da das Vorhandensein von zwei Outputs mit demselben Betrag auf ein Coinjoin-Muster hindeutet. Aus externer Sicht ist die CIOH daher in diesem spezifischen Fall nicht anwendbar.

reviewed: false
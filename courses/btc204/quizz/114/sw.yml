question: Kwa nini mchambuzi hataweka CIOH kwenye muamala wa aina ya Stonewall?
answer: Kwa sababu kuna matokeo mawili ya kiasi sawa
wrong_answers:
  - Kwa sababu kuna pembejeo 2 tu
  - Kwa sababu hawafahamu muundo huu
  - Kwa sababu kuna matokeo zaidi ya pembejeo
explanation: |
  
  Uchanganuzi wa muamala wa Stonewall kutoka nje hauongozi kwa utumizi wa CIOH, kwa sababu uwepo wa outputs mbili za kiasi sawa unapendekeza pattern ya coinjoin. Kutoka mtazamo wa nje, CIOH kwa hivyo haitumiki katika kesi hii maalum.

reviewed: true

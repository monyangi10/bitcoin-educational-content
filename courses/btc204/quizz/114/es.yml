question: ¿Por qué el analista no va a aplicar la CIOH en una transacción de tipo Stonewall?

answer: Porque hay 2 salidas de los mismos montos

wrong_answers:
  - Porque solo hay 2 entradas
  - Porque no están familiarizados con este patrón
  - Porque hay más salidas que entradas

explanation: |
  El análisis de una transacción Stonewall desde el exterior no conduce a la aplicación de la CIOH, ya que la presencia de dos outputs del mismo importe sugiere un patrón de coinjoin. Desde un punto de vista exterior, la CIOH no es aplicable en este caso específico.

reviewed: true

question: Miksi analyytikko ei sovella CIOH:ta Stonewall-tyyppiseen transaktioon?

answer: Koska siinä on 2 samansuuruista lähtöä

wrong_answers:
  - Koska siinä on vain 2 sisääntuloa
  - Koska he eivät ole tuttuja tämän mallin kanssa
  - Koska lähtöjä on enemmän kuin sisääntuloja

explanation: |

  Stonewall-transaktion analysointi ulkopuolelta ei johda CIOH:n soveltamiseen, koska kahden saman suuruisen outputin olemassaolo viittaa coinjoin-malliin. Ulkoisesta näkökulmasta CIOH ei siis ole sovellettavissa tässä erityistapauksessa.

reviewed: false
question: Varför kommer analytikern inte att tillämpa CIOH på en transaktion av typen Stonewall?
answer: Eftersom det finns 2 utgångar med samma belopp
wrong_answers:
  - Eftersom det bara finns 2 ingångar
  - Eftersom de inte är bekanta med detta mönster
  - Eftersom det finns fler utgångar än ingångar
explanation: |
  
  Analysen av en Stonewall-transaktion utifrån leder inte till tillämpning av CIOH, eftersom förekomsten av två outputs med samma belopp tyder på ett coinjoin-mönster. Från en extern synvinkel är CIOH därför inte tillämpbar i detta specifika fall.

reviewed: false
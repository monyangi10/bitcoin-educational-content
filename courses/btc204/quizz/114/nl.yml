question: Waarom zal de analist CIOH niet toepassen op een transactie van het type Stonewall?
answer: Omdat er 2 outputs zijn met dezelfde bedragen
wrong_answers:
  - Omdat er maar 2 inputs zijn
  - Omdat ze niet bekend zijn met dit patroon
  - Omdat er meer outputs dan inputs zijn
explanation: |
  
  De analyse van een Stonewall-transactie van buitenaf leidt niet tot de toepassing van CIOH, omdat de aanwezigheid van twee outputs van hetzelfde bedrag een coinjoin-patroon suggereert. Vanuit extern oogpunt is CIOH daarom niet toepasbaar in dit specifieke geval.

reviewed: false

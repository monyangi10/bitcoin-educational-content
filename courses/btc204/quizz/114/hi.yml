question: विश्लेषक स्टोनवॉल टाइप के लेन-देन पर CoinJoin क्यों नहीं लगाएगा?
answer: क्योंकि एक ही रकम के 2 आउटपुट हैं
wrong_answers:
  - क्योंकि सिर्फ 2 इनपुट हैं
  - क्योंकि वे इस तरीके से अनजान हैं
  - क्योंकि इनपुट्स से ज़्यादा आउटपुट्स हैं
explanation: |
बाहर से एक स्टोनवॉल ट्रांजैक्शन का विश्लेषण करने से CoinJoin लागू नहीं होता, क्योंकि एक ही रकम के दो आउटपुट होने से CoinJoin पैटर्न का संकेत मिलता है। बाहरी नज़रिए से, इस खास मामले में CoinJoin लागू नहीं होता।

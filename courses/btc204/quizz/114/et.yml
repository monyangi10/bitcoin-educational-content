question: Miks analüütik ei rakenda CIOH-d Stonewall-tüüpi tehingule?

answer: Kuna on 2 väljundit sama suurusega summadega

wrong_answers:
  - Kuna on ainult 2 sisendit
  - Kuna nad ei ole selle mustriga tuttavad
  - Kuna väljundeid on rohkem kui sisendeid

explanation: |

  Stonewall-tehingu analüüsimine väljastpoolt ei vii CIOH rakendamiseni, kuna kahe sama summaga väljundi olemasolu viitab coinjoin mustri olemasolule. Välisest vaatenurgast ei ole CIOH seetõttu selles konkreetses juhtumis kohaldatav.

reviewed: false
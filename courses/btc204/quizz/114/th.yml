question: ทำไมนักวิเคราะห์ถึงไม่ใช้ COINJOIN กับธุรกรรมประเภท Stonewall?
answer: เพราะมี 2 ผลลัพธ์ที่มีจำนวนเท่ากัน
wrong_answers:
  - เพราะมีเพียง 2 อินพุตเท่านั้น
  - เพราะพวกเขาไม่คุ้นเคยกับรูปแบบนี้
  - เพราะมีผลลัพธ์มากกว่าข้อมูลนำเข้า
explanation: |
  การวิเคราะห์ธุรกรรม Stonewall จากภายนอกไม่ได้ทำให้เกิดการใช้ COINJOIN เพราะการมีอยู่ของผลลัพธ์สองรายการที่มีจำนวนเท่ากันบ่งบอกถึงรูปแบบ coinjoin จากมุมมองภายนอก COINJOIN จึงไม่สามารถใช้ได้ในกรณีเฉพาะนี้
reviewed: true
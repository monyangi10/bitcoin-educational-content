question: ทำไมนักวิเคราะห์จึงไม่นำ CIOH ไปใช้กับธุรกรรมประเภท Stonewall?
answer: เพราะมี 2 ผลลัพธ์ที่มีจำนวนเท่ากัน
wrong_answers:
  - เพราะมีเพียง 2 อินพุตเท่านั้น
  - เพราะพวกเขาไม่คุ้นเคยกับรูปแบบนี้
  - เพราะมีผลลัพธ์มากกว่าข้อมูลนำเข้า
explanation: |
  การวิเคราะห์ธุรกรรม Stonewall จากภายนอกไม่นำไปสู่การใช้ CIOH เนื่องจากการมีอยู่ของ outputs สองรายการที่มีจำนวนเงินเท่ากันบ่งบอกถึงรูปแบบ coinjoin จากมุมมองภายนอก CIOH จึงไม่สามารถนำไปใช้ได้ในกรณีเฉพาะนี้

reviewed: true
question: Dlaczego analityk nie zastosuje CIOH do transakcji typu Stonewall?
answer: Ponieważ istnieją 2 wyjścia o tej samej wartości
wrong_answers:
  - Ponieważ są tylko 2 wejścia
  - Ponieważ nie są zaznajomieni z tym wzorem
  - Ponieważ jest więcej wyjść niż wejść
explanation: |
  
  Analiza transakcji Stonewall z zewnątrz nie prowadzi do zastosowania CIOH, ponieważ obecność dwóch outputs tej samej kwoty sugeruje wzorzec coinjoin. Z zewnętrznego punktu widzenia CIOH nie ma zatem zastosowania w tym konkretnym przypadku.


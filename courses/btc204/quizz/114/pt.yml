question: Por que o analista não vai aplicar a CIOH em uma transação do tipo Stonewall?

answer: Porque existem 2 saídas de mesmos valores

wrong_answers:
  - Porque existem apenas 2 entradas
  - Porque eles não estão familiarizados com esse padrão
  - Porque existem mais saídas do que entradas

explanation: |
  A análise de uma transação Stonewall do exterior não leva à aplicação da CIOH, pois a presença de dois outputs do mesmo valor sugere um padrão de coinjoin. De um ponto de vista externo, a CIOH não é, portanto, aplicável neste caso específico.

reviewed: true

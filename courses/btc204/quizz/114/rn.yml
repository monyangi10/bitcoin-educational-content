question: Kuki umushakashatsi atazoshirako CIOH kuri transaction yubwoko bwa Stonewall?
answer: Kuko hariho ibisohoka 2 vy'amahera amwe .
wrong_answers:
  - Kuko hariho 2 gusa vyinjizwa .
  - Kubera ko batamenyereye iyo nzira .
  - Kuko hariho ibisohoka vyinshi kuruta ivyo yinjira .
explanation: |
  
  Isesengura rya transaction ya Stonewall kuva hanze ntabwo riganisha ku gushirako CIOH, kuko kubaho kwa outputs ebyiri zifise amafaranga amwe byerekana pattern ya coinjoin. Uhereye ku buryo bwo hanze, CIOH ntibikwiranye muri iyi nkuru yihariye.


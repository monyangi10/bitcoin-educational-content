question: چرا تحلیلگر CIOH را بر روی تراکنش نوع Stonewall اعمال نخواهد کرد؟
answer: زیرا دو خروجی با مقادیر یکسان وجود دارد
wrong_answers:
  - زیرا تنها ۲ ورودی وجود دارد
  - زیرا آنها با این الگو آشنا نیستند
  - زیرا خروجی‌ها بیشتر از ورودی‌ها هستند
explanation: |
  تجزیه و تحلیل یک تراکنش Stonewall از بیرون منجر به اعمال CIOH نمی‌شود، زیرا وجود دو خروجی با مقدار یکسان نشان‌دهنده الگوی coinjoin است. از دیدگاه بیرونی، CIOH در این مورد خاص قابل اعمال نیست.

reviewed: false
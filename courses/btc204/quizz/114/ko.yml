question: 분석가가 스톤월형 트랜잭션에 CoinJoin을 적용하지 않는 이유는 무엇인가요?
answer: 동일한 금액의 출력이 2개이므로
wrong_answers:
  - 입력이 2개뿐이므로
  - 이 패턴에 익숙하지 않기 때문에
  - 입력보다 출력이 더 많기 때문입니다
explanation: |
  외부에서 스톤월 트랜잭션을 분석해도 동일한 금액의 출금이 두 개 있으면 CoinJoin 패턴이 적용되지 않기 때문입니다. 따라서 외부에서 볼 때 이 특정 사례에는 CoinJoin이 적용되지 않습니다.
  
reviewed: true
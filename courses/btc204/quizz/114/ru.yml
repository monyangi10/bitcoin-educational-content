question: Почему аналитик не будет применять CIOH к транзакции типа Stonewall?

answer: Потому что есть 2 выхода одинаковых сумм

wrong_answers:
  - Потому что есть только 2 входа
  - Потому что они не знакомы с этим паттерном
  - Потому что выходов больше, чем входов

explanation: |

  Анализ транзакции Stonewall снаружи не приводит к применению CIOH, поскольку наличие двух outputs одинаковой суммы предполагает паттерн coinjoin. С внешней точки зрения CIOH, следовательно, неприменима в этом конкретном случае.


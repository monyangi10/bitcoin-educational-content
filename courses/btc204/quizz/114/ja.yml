question: アナリストはなぜStonewallタイプのトランザクションにコインジョインを適用しないのですか？

answer: 同じ金額の2つのアウトプットがあるため

wrong_answers:
  - 入イントプットが2つしかないため
  - このパターンに慣れていないため
  - アウトプットがイントプットよりも多いため

explanation: |
  Stonewallトランザクションを外部から分析すると、コインジョインの適用には至りません。なぜなら、同じ金額の2つのアウトプットがあることが、コインジョイン・パターンを示唆しているからです。外部の観点からは、この特定のケースではコインジョインは適用不可能です。

  レビュー済み: false

question: なぜアナリストはStonewallタイプのトランザクションにCIOHを適用しないのですか?

answer: 同じ金額の2つのアウトプットがあるため

wrong_answers:
  - 入イントプットが2つしかないため
  - このパターンに慣れていないため
  - アウトプットがイントプットよりも多いため

explanation: |

  外部からのStonewall トランザクションの分析はCIOHの適用には至りません。なぜなら、同じ金額の2つのoutputの存在はcoinjoinのパターンを示唆するからです。外部の観点から見ると、CIOHはこの特定のケースには適用できません。

reviewed: false

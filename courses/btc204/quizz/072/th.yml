question: โมเดลสคริปต์ใดที่แนะนำมากที่สุดในปี 2024 สำหรับการเพิ่มความเป็นส่วนตัวบน Bitcoin?
answer: P2TR
wrong_answers:
  - P2PK
  - P2PKH
  - P2SH
explanation: |
  เพื่อให้กลมกลืนกับฝูงชนที่ใหญ่ที่สุดเท่าที่จะเป็นไปได้ ขอแนะนำให้ใช้รูปแบบสคริปต์ที่ได้รับการยอมรับอย่างกว้างขวางที่สุด สคริปต์ P2TR กำลังเป็นที่นิยมใช้มากที่สุดในธุรกรรม Bitcoin
reviewed: true
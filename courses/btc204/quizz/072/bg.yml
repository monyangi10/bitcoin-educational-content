question: Кой модел на скрипт е най-препоръчителен през 2024 г. за подобряване на поверителността на Bitcoin?
answer: P2TR
wrong_answers:
  - P2PK
  - P2PKH
  - P2SH
explanation: |
  За да се слеете с възможно най-голямата тълпа, се препоръчва да използвате най-широко разпространения модел на сценарий. Понастоящем скриптовете P2TR се използват най-често при транзакциите Bitcoin.
  
reviewed: true
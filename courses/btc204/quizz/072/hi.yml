question: 2024 में Bitcoin पर बेहतर प्राइवेसी के लिए सबसे रेकमेंडेड स्क्रिप्ट मॉडल कौन सा है?
answer: जीडब्ल्यू-1
wrong_answers:
  - पी2पीके
  - पी2पीकेएच (P2PKH)
  - जीडब्ल्यू-2
explanation: |
जितना हो सके सबसे बड़ी भीड़ में घुलने-मिलने के लिए, सबसे ज्यादा इस्तेमाल होने वाली स्क्रिप्ट मॉडल का उपयोग करने की सलाह दी जाती है। P2TR स्क्रिप्ट्स वर्तमान में Bitcoin लेन-देन में सबसे ज्यादा प्रयोग की जाती हैं।
reviewed: false
question: Bitcoin पर चेन एनालिसिस के संदर्भ में एन्ट्रॉपी क्या दर्शाती है?
answer: एनालिस्ट्स को ट्रांजैक्शन के सटीक कॉन्फिगरेशन की जानकारी न होना।
wrong_answers:
  - एक लेन-देन के बारे में जानकारी नेटवर्क में कितनी तेजी से फैलती है।
  - लेन-देन में इस्तेमाल किए गए डिजिटल हस्ताक्षरों का क्रिप्टोग्राफिक सुरक्षा स्तर।
  - समूह का आकार जिसमें एक सिक्का छिपा हुआ है, जहां सभी UTXO एक जैसे हैं।
explanation: |
एंट्रॉपी का इस्तेमाल लेन-देन के सही कॉन्फिगरेशन के बारे में विश्लेषकों की जानकारी की कमी को मापने के लिए किया जाता है। दूसरे शब्दों में, एंट्रॉपी जितनी ज्यादा होगी, इनपुट और आउटपुट के बीच बिटकॉइन के फ्लो को पहचानना विश्लेषकों के लिए उतना ही मुश्किल हो जाएगा।
reviewed: false
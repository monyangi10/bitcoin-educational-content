question: 엔트로피는 Bitcoin에서 체인 분석의 맥락에서 무엇을 의미하나요?
answer: 트랜잭션의 정확한 구성에 대한 분석가의 지식이 부족합니다.
wrong_answers:
  - 트랜잭션에 대한 정보가 네트워크에 퍼지는 속도입니다.
  - 거래에 사용된 디지털 서명의 암호화 보안 수준입니다.
  - Coin이 숨겨져 있는 동일한 UTXO 그룹의 크기입니다.
explanation: |
  엔트로피는 트랜잭션의 정확한 구성에 대한 분석가의 지식 부족을 측정하는 데 사용됩니다. 즉, 엔트로피가 높을수록 분석가가 입력과 출력 사이의 비트코인 흐름을 파악하기가 더 어려워집니다.
  
reviewed: true
question: Какво показва ентропията в контекста на верижния анализ на Bitcoin?
answer: Липсата на познания на анализаторите за точната конфигурация на сделката.
wrong_answers:
  - Скоростта, с която информацията за дадена трансакция се разпространява в мрежата.
  - Нивото на криптографска сигурност на цифровите подписи, използвани в транзакцията.
  - Размерът на групата от еднакви UTXO, в която е скрита една монета.
explanation: |
  Ентропията се използва за измерване на липсата на знания на анализаторите за точната конфигурация на транзакцията. С други думи, колкото по-висока е ентропията, толкова по-трудно е за анализаторите да определят потоците биткойни между входовете и изходите.
  
reviewed: true
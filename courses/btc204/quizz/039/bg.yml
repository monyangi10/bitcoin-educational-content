question: Защо се препоръчва да не се публикуват адреси за получаване в социалните мрежи?
answer: Защото те могат да се използват за свързване на дейностите на on-chain с реална самоличност.
wrong_answers:
  - Защото те могат лесно да бъдат хакнати от злонамерени хакери.
  - Защото те могат да привлекат измамни предложения и да ви изложат на фишинг кампании.
  - Тъй като те могат да позволят прилагането на евристиката за обща собственост на входа.
explanation: |
  Споделянето на адреси за получаване на Bitcoin в интернет може да послужи като входна точка за анализ на веригата чрез свързване на самоличност (реална или псевдонимна) с дейност на on-chain.
reviewed: true
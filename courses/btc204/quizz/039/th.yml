question: ทำไมถึงแนะนำว่าไม่ควรโพสต์ที่อยู่รับบนโซเชียลมีเดีย?
answer: เพราะสามารถใช้เชื่อมโยงกิจกรรม on-chain กับตัวตนจริงได้
wrong_answers:
  - เพราะสามารถถูกแฮ็กได้ง่ายโดยแฮ็กเกอร์ที่เป็นอันตราย
  - เพราะพวกเขาอาจดึงดูดข้อเสนอที่ฉ้อโกงและทำให้คุณเสี่ยงต่อแคมเปญฟิชชิ่ง
  - เพราะพวกเขาสามารถอนุญาตให้ใช้การประเมินความเป็นเจ้าของข้อมูลร่วมกันได้
explanation: |
  การแชร์ที่อยู่รับ Bitcoin บนอินเทอร์เน็ตสามารถเป็นจุดเริ่มต้นสำหรับการวิเคราะห์เชนโดยการเชื่อมโยงตัวตน (จริงหรือใช้นามแฝง) กับกิจกรรม on-chain
reviewed: true
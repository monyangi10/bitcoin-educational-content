question: 소셜 미디어에 수신 주소를 게시하지 않는 것이 권장되는 이유는 무엇인가요?
answer: On-Chain 활동을 실제 신원과 연결하는 데 사용할 수 있기 때문입니다.
wrong_answers:
  - 악의적인 해커가 쉽게 해킹할 수 있기 때문입니다.
  - 사기성 제안을 유도하고 피싱 캠페인에 노출될 수 있기 때문입니다.
  - 공통 입력 Ownership 휴리스틱을 적용할 수 있기 때문입니다.
explanation: |
  인터넷에서 Bitcoin 수신 주소를 공유하면 신원(실명 또는 익명)을 On-Chain 활동에 연결하여 체인 분석의 시작점이 될 수 있습니다.
reviewed: true
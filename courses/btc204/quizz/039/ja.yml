question: ソーシャルメディアに受信アドレスを投稿することはなぜ勧められないのですか？
answer: オンチェーン活動を実際の身元と関連付けるために使用される可能性があるから
wrong_answers:
  - 悪意のあるハッカーによって簡単にハッキングされる可能性があるから
  - 詐欺的なオファーを引き寄せ、フィッシングキャンペーンにさらされるリスクがあるから
  - 一般的なインプット所有権のヒューリスティックの適用を可能にするから
explanation: |
  インターネット上でビットコインの受信アドレスを共有することは、身元（実名または匿名）とオンチェーン活動を関連付けるためのチェーン分析の入り口として使用される可能性があります。
reviewed: false

question: 비밀 속성 Exchange에서 Smart contract의 효용은 무엇인가요?
answer: 정보를 동시에 체계적으로 공개하여 양 당사자가 상대방의 자금을 회수할 수 있도록 합니다.
wrong_answers:
  - 정당한 수신자만 암호를 해독할 수 있도록 자산 정보를 암호화하여 기밀성을 보장합니다.
  - 전송 프로세스를 자동화하여 사람의 개입을 최소화하고 오류를 줄이세요.
  - 부정 행위 시도가 발생할 경우 양 당사자의 비트코인을 보유하여 분쟁 해결을 촉진합니다.
explanation: |
  서로를 신뢰하지 않는 당사자 간의 교류를 원활하게 하기 위해 Smart contract 시스템을 활용합니다. Smart contract는 미리 정의된 조건이 충족되면 자동으로 실행되는 프로그램으로, 상호 신뢰 없이도 Exchange의 속성이 자동으로 수행되도록 합니다. Smart contract를 사용하면 참여자 간에 두 가지 민감한 정보를 동시에 공개할 수 있습니다. 정상적으로 실행되어 각 당사자가 상대방의 자금을 회수하거나, 실패하여 모두가 원래 자금을 보유하게 됩니다.
  
reviewed: true
question: Каква е ползата от умен договор при таен обмен на собственост?
answer: Едновременно и систематично разкриване на информация, което позволява на двете страни да получат средствата на другата страна.
wrong_answers:
  - Осигурете конфиденциалност, като криптирате информацията за собствеността, така че само легитимният получател да може да я декриптира.
  - Автоматизирайте процеса на прехвърляне, за да сведете до минимум човешките взаимодействия и да намалите грешките.
  - Улесняване на разрешаването на спорове чрез задържане на биткойните на двете страни в случай на опити за измама.
explanation: |
  За да се улесни обменът между страни, които не си имат доверие, се използват системи за умни договори. Умният договор е програма, която се изпълнява автоматично, когато са изпълнени предварително определени условия, като гарантира, че обменът на собственост се извършва автоматично, без да се изисква взаимно доверие. Умният договор позволява едновременното разкриване на две чувствителни части от информацията между участниците. Или той се изпълнява нормално и всяка страна получава средствата на другата, или се проваля и всеки запазва първоначалните си средства.
  
reviewed: true

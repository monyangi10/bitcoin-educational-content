question: Ni akamaro akahe ka Smart contract mu mutungo w’ibanga Exchange?
answer: Guhishura icarimwe kandi mu buryo butunganye amakuru atuma abo bompi bashobora kuronka amahera y’uwundi.
wrong_answers:
  - Kumenya neza ibanga mu gupfuka amakuru y’umutungo kugira ngo uwuyaronse wenyene abe ari we ashobora kuyafungura.
  - Gukoresha ubuhinga bwo kwimurira kugira ngo ugabanye imigenderanire y’abantu no kugabanya amakosa.
  - Gufasha gutorera umuti amatati mu gufata ama bitcoins y’impande zompi mu gihe hoba hari ukugerageza guhenda.
explanation: |
  Kugira ngo bishobore guhanahana amakuru hagati y’abafise uruhara batizigirana, hakoreshwa ubuhinga bwa Smart contract. Smart contract ni porogarama yikora iyo ibintu vyategekanijwe bishitse, ivyo bikaba, muri twebwe, bituma umutungo Exchange ukora ubwawo ataco bisaba ko umuntu wese yizigirana. Smart contract iremesha guhishurirwa icarimwe amakuru abiri ahambaye hagati y’abaje mu nama. Canke irashitsa mu buryo busanzwe, maze umwe wese akagarura amahera y’uwundi, canke ikananirwa, umwe wese akagumana amahera yiwe y’intango.
  

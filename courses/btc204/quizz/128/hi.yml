question: Smart contract का उपयोग एक गुप्त संपत्ति Exchange में क्या है?
answer: दोनों पक्षों को एक साथ और व्यवस्थित रूप से जानकारी प्रकट करने की अनुमति देता है ताकि वे एक-दूसरे के फंड्स वापस ले सकें।
wrong_answers:
  - संपत्ति की जानकारी को एन्क्रिप्ट करके गोपनीयता सुनिश्चित करें, ताकि सिर्फ सही प्राप्तकर्ता ही उसे डिक्रिप्ट कर सके।
  - इंसानी हस्तक्षेप को कम करने और गलतियाँ घटाने के लिए ट्रांसफर प्रक्रिया को स्वचालित कर दो।
  - धोखाधड़ी की कोशिश होने पर दोनों पक्षों के बिटकॉइन को रोककर विवाद समाधान को आसान बनाएं।
explanation: |
एक दूसरे पर भरोसा न करने वाले पार्टियों के बीच लेन-देन को संभव बनाने के लिए, Smart contract सिस्टम का इस्तेमाल किया जाता है। Smart contract एक ऐसा प्रोग्राम है जो अपने आप चलता है जब पहले से तय शर्तें पूरी हो जाती हैं, और हमारे मामले में यह सुनिश्चित करता है कि संपत्ति Exchange अपने आप ट्रांसफर हो जाए बिना किसी परस्पर भरोसे की जरूरत के। Smart contract प्रतिभागियों के बीच दो संवेदनशील जानकारियों को एक साथ सामने लाने की अनुमति देता है। या तो यह सामान्य रूप से काम करता है, और हर पार्टी दूसरे के फंड्स प्राप्त कर लेती है, या फिर यह फेल हो जाता है, और हर कोई अपने मूल फंड्स रखता है।

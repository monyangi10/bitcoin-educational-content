question: ยูทิลิตี้ของสมาร์ทคอนแทรคในกระบวนการแลกเปลี่ยนทรัพย์สินลับคืออะไร?
answer: เพื่อเปิดเผยข้อมูลอย่างพร้อมเพรียงและเป็นระบบ อนุญาตให้ทั้งสองฝ่ายดึงเงินของอีกฝ่ายได้
wrong_answers:
  - ตรวจสอบความลับโดยการเข้ารหัสข้อมูลทรัพย์สินเพื่อให้เฉพาะผู้รับที่ถูกต้องเท่านั้นที่สามารถถอดรหัสได้
  - ทำให้กระบวนการโอนเป็นอัตโนมัติเพื่อลดการมีปฏิสัมพันธ์ของมนุษย์และลดข้อผิดพลาด
  - อำนวยความสะดวกในการแก้ไขข้อพิพาทโดยการถือบิตคอยน์ของทั้งสองฝ่ายในกรณีที่มีความพยายามโกง
explanation: |
  เพื่ออำนวยความสะดวกในการแลกเปลี่ยนระหว่างฝ่ายที่ไม่ไว้วางใจกัน ระบบสัญญาอัจฉริยะถูกนำมาใช้ สัญญาอัจฉริยะคือโปรแกรมที่ดำเนินการโดยอัตโนมัติเมื่อเงื่อนไขที่กำหนดไว้ล่วงหน้าถูกตอบสนอง เพื่อให้แน่ใจว่าการแลกเปลี่ยนทรัพย์สินดำเนินไปโดยอัตโนมัติโดยไม่ต้องอาศัยความไว้วางใจซึ่งกันและกัน สัญญาอัจฉริยะช่วยให้การเปิดเผยข้อมูลที่ละเอียดอ่อนสองชิ้นระหว่างผู้เข้าร่วมเกิดขึ้นพร้อมกัน ไม่ว่าจะดำเนินการตามปกติและแต่ละฝ่ายได้รับเงินของอีกฝ่าย หรือมันล้มเหลวและทุกคนเก็บเงินเดิมของตนไว้
reviewed: true
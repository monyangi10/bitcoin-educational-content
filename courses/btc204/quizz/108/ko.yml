question: PayJoin 트랜잭션이 분석을 위한 속임수 역할을 하기 위해 사용하는 체인에 대한 휴리스틱 분석은 무엇인가요?
answer: CIOH
wrong_answers:
  - Address 재사용
  - Wallet 핑거프린팅
  - 버전 재사용
explanation: |
  분석가가 PayJoin 트랜잭션을 검토할 때, CIOH로 인해 모든 입력이 동일한 사람으로부터 발생한다고 믿게 됩니다. 그러나 결제 수취인도 실제 결제자와 함께 입력에 기여하기 때문에 이러한 인식은 잘못된 것입니다. 따라서 연쇄 분석은 잘못된 것으로 판명된 해석으로 전환됩니다.
  
reviewed: true
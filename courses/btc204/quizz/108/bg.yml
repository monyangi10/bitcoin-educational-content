question: Какъв евристичен анализ на веригата се използва от транзакцията payjoin, за да действа като измама за анализ?
answer: CIOH
wrong_answers:
  - Повторна употреба на адрес
  - Вземане на пръстови отпечатъци от портфейла
  - Повторно използване на версиите
explanation: |
  Когато анализаторът разглежда payjoin, той е убеден, че всички входящи данни произхождат от едно и също лице, благодарение на CIOH. Това схващане обаче е погрешно, тъй като получателят на плащането също допринася за входящите данни заедно с действителния платец. Следователно анализът се насочва към тълкуване, което се оказва невярно.
  
reviewed: true

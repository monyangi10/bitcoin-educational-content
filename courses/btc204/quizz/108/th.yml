question: การวิเคราะห์เชิงฮิวริสติกของเชนที่ใช้โดยธุรกรรม payjoin เพื่อทำหน้าที่เป็นการหลอกลวงสำหรับการวิเคราะห์คืออะไร?
answer: CIOH
wrong_answers:
  - การใช้ซ้ำ Address
  - การพิมพ์ลายนิ้วมือ Wallet
  - การใช้ซ้ำเวอร์ชัน
explanation: |
  เมื่อนักวิเคราะห์ตรวจสอบธุรกรรม payjoin พวกเขาจะถูกชักนำให้เชื่อว่าทุกอินพุตมาจากบุคคลเดียวกันเนื่องจาก CIOH อย่างไรก็ตาม การรับรู้นี้ไม่ถูกต้อง เนื่องจากผู้รับชำระเงินก็มีส่วนร่วมในอินพุตเช่นเดียวกับผู้ชำระเงินจริง ดังนั้น การวิเคราะห์เชนจึงถูกเบี่ยงเบนไปสู่การตีความที่กลายเป็นเท็จ
reviewed: true
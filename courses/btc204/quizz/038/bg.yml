question: Кой модел на транзакция отменя използването на CIOH?
answer: Сделка за сътрудничество.
wrong_answers:
  - Просто плащане.
  - Консолидация.
  - Почистване.
explanation: |
  CIOH не е приложима към сделки, които приемат модел на сътрудничество, тъй като в този конкретен случай входящите данни задължително идват от различни субекти.
reviewed: true
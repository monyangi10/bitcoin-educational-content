question: โมเดลธุรกรรมใดที่ทำให้การใช้ CIOH เป็นโมฆะ?
answer: ธุรกรรมแบบร่วมมือกัน
wrong_answers:
  - การชำระเงินที่ง่าย
  - การรวมกิจการ
  - กวาด.
explanation: |
  CIOH ไม่สามารถใช้กับธุรกรรมที่ใช้รูปแบบการทำงานร่วมกันได้ เนื่องจากในกรณีเฉพาะนี้ ข้อมูลนำเข้าจำเป็นต้องมาจากหน่วยงานที่แตกต่างกัน
reviewed: true
question: Какъв е основният недостатък на банкоматите?
answer: Често много високи такси.
wrong_answers:
  - Необходимост от бърза интернет връзка.
  - Липса на подкрепа за местните валути.
  - Сигурността на транзакциите не е гарантирана.
explanation: |
  Закупуването на биткойни чрез банкомати е интересно решение за защита на личните данни на потребителите, но основният им недостатък е, че често начисляват непосилни такси.
reviewed: true
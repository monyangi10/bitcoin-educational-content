question: Wat is het grootste nadeel van geldautomaten?
answer: Vaak zeer hoge kosten.
wrong_answers:
  - Behoefte aan een snelle internetverbinding.
  - Gebrek aan ondersteuning voor lokale valuta.
  - Transactiebeveiliging niet gegarandeerd.
explanation: |
  Bitcoins kopen via geldautomaten is een interessante oplossing voor de privacy van gebruikers, maar hun grootste nadeel is dat ze vaak exorbitante kosten in rekening brengen.
reviewed: false
question: ข้อเสียหลักของเครื่องเอทีเอ็ม (ATM) คืออะไร?
answer: มักมีค่าธรรมเนียมสูงมาก
wrong_answers:
  - ความต้องการการเชื่อมต่ออินเทอร์เน็ตความเร็วสูง
  - ขาดการสนับสนุนสกุลเงินท้องถิ่น
  - ความปลอดภัยของการทำธุรกรรมไม่ได้รับการรับประกัน
explanation: |
  การซื้อบิตคอยน์ผ่านตู้เอทีเอ็มเป็นทางเลือกที่น่าสนใจสำหรับความเป็นส่วนตัวของผู้ใช้ แต่ข้อเสียหลักของมันคือมักจะคิดค่าธรรมเนียมที่สูงเกินไป
reviewed: true
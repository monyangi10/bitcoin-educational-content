question: Bitcoin Wallet सॉफ्टवेयर में कॉइन कंट्रोल ऑप्शन का क्या उद्देश्य है?
answer: लेन-देन के लिए इनपुट के रूप में कौन से UTXO का उपयोग करना है, उसे चुनने के लिए।
wrong_answers:
  - Wallet की सुरक्षा बढ़ाने के लिए UTXOs को एन्क्रिप्ट करना।
  - संदिग्ध स्रोतों से आने वाले UTXOs का पता लगाना और उन्हें ब्लॉक करना।
  - Wallet में हर UTXO को लेबल करना।
explanation: |
कॉइन कंट्रोल एक फीचर है जो अच्छे Bitcoin और Wallet सॉफ्टवेयर में मिलता है। यह आपको ट्रांजैक्शन करते समय खुद से विशेष UTXOs को इनपुट के रूप में चुनने की सुविधा देता है।
reviewed: false
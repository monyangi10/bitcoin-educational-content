question: Какво е предназначението на опцията за контрол на монетите в софтуера Bitcoin wallet?
answer: Избор на UTXO, които да се използват като входни данни за транзакциите.
wrong_answers:
  - Криптиране на UTXO за повишаване на сигурността на wallet.
  - Откриване и блокиране на UTXO от подозрителни източници.
  - Етикетиране на всеки UTXO в wallet.
explanation: |
  Контролът Coin е функция, открита в добрия софтуер Bitcoin wallet, която ви дава възможност ръчно да избирате конкретни UTXO, които да използвате като входни данни при извършване на транзакция.
  
reviewed: true
question: Какво е предназначението на опцията за контрол на монетите в софтуерен Bitcoin портфейл?
answer: Избор на UTXO, които да се използват като входни данни за транзакциите.
wrong_answers:
  - Криптиране на UTXO за повишаване на сигурността.
  - Откриване и блокиране на UTXO от подозрителни източници.
  - Етикетиране на всеки UTXO.
explanation: |
  Контролът на койните е функция, открита в добрия софтуерен Bitcoin портфейл, която ви дава възможност ръчно да избирате конкретни UTXO, които да използвате като входни данни при извършване на транзакция.
  
reviewed: true

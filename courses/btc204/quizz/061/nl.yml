question: Wat is het doel van de muntcontrole-optie in de Bitcoin-wallet software?
answer: Om te kiezen welke UTXO's worden gebruikt als input voor transacties.
wrong_answers:
  - UTXO's versleutelen om de veiligheid van de wallet te verbeteren.
  - UTXO's van verdachte bronnen detecteren en blokkeren.
  - Elke UTXO in de wallet labelen.
explanation: |
  Muntcontrole is een functie in de betere Bitcoin-wallet software, waarmee je handmatig specifieke UTXO's kunt selecteren om te gebruiken als input bij het maken van een transactie.
  

question: ビットコインウォレット・ソフトウェアの「coin control」オプションの目的は何ですか？

answer: トランザクションのインプットとして消費するUTXOを選択すること

wrong_answers:
  - UTXOを暗号化してウォレットのセキュリティを向上させること
  - 疑わしいソースからのUTXOを検出してブロックすること
  - ウォレット内の各UTXOにラベルを付けること

explanation: |
  Coin controlは、良質なビットコインウォレット・ソフトウェアに見られる機能で、トランザクションを行う際に特定の未使用トランザクションアウトプット（UTXO）をインプットとして手動で選択する能力を提供します。

reviewed: false

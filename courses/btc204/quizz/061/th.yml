question: วัตถุประสงค์ของตัวเลือกการควบคุมเหรียญในซอฟต์แวร์ Bitcoin wallet คืออะไร?
answer: เลือก UTXOs ใดที่จะใช้เป็นอินพุตสำหรับธุรกรรม
wrong_answers:
  - เพื่อเข้ารหัส UTXOs เพื่อเพิ่มความปลอดภัยของ wallet.
  - เพื่อตรวจจับและบล็อก UTXOs จากแหล่งที่น่าสงสัย
  - เพื่อระบุแต่ละ UTXO ใน wallet
explanation: |
  การควบคุม Coin เป็นคุณสมบัติที่พบในซอฟต์แวร์ Bitcoin wallet ที่ดี ซึ่งช่วยให้คุณสามารถเลือก UTXOs เฉพาะเพื่อใช้เป็นอินพุตเมื่อทำธุรกรรมได้ด้วยตนเอง
reviewed: true
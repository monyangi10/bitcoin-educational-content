question: ประสิทธิภาพของธุรกรรม Bitcoin คำนวณอย่างไรในแง่ของความเป็นส่วนตัว?
answer: โดยการเปรียบเทียบเอนโทรปีที่แท้จริงของธุรกรรมกับเอนโทรปีสูงสุดที่เป็นไปได้
wrong_answers:
  - โดยการคูณจำนวนอินพุตด้วยจำนวนเอาต์พุต
  - โดยการคูณเอนโทรปีที่แท้จริงของธุรกรรมด้วยจำนวนอินพุตและเอาต์พุต
  - โดยการเปรียบเทียบจำนวนอินพุตกับจำนวนเอาต์พุต
explanation: |
  ประสิทธิภาพของการทำธุรกรรมถูกคำนวณโดยการลบเอนโทรปีสูงสุดออกจากเอนโทรปีจริงของการทำธุรกรรมที่วิเคราะห์
reviewed: true
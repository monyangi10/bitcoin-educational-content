question: Bitcoin लेनदेन की प्राइवेसी के मामले में दक्षता कैसे मापी जाती है?
answer: वास्तविक लेन-देन की एन्ट्रॉपी को अधिकतम संभव एन्ट्रॉपी से तुलना करके।
wrong_answers:
  - इनपुट की संख्या को आउटपुट की संख्या से गुणा करके।
  - लेन-देन की वास्तविक एन्ट्रॉपी को इनपुट और आउटपुट की संख्या से गुणा करके।
  - इनपुट की संख्या को आउटपुट की संख्या से तुलना करके।
explanation: |
लेन-देन की कार्यक्षमता की गणना विश्लेषित लेन-देन की वास्तविक एन्ट्रॉपी से अधिकतम एन्ट्रॉपी को घटाकर की जाती है।

question: プライバシーの観点から、ビットコイン取引の効率はどのように計算されますか？

answer: トランザクションにおける実際のエントロピーを最大可能エントロピーと比較する

wrong_answers:
  - インプットの数をアウトプットの数で乗算する
  - トランザクションにおける実際のエントロピーをインプットとアウトプットの数で乗算する
  - インプットの数をアウトプットの数と比較する

explanation: |
  トランザクション効率は、分析されたトランザクションにおける実際のエントロピーから最大エントロピーを引くことによって計算されます。

reviewed: true

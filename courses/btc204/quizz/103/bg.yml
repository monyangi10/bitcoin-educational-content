question: Как се изчислява ефективността на транзакция Bitcoin по отношение на поверителността?
answer: Чрез сравняване на действителната ентропия на транзакцията с максималната възможна ентропия.
wrong_answers:
  - Чрез умножаване на броя на входовете по броя на изходите.
  - Като умножите действителната ентропия на транзакцията по броя на входовете и изходите.
  - Чрез сравняване на броя на входовете с броя на изходите.
explanation: |
  Ефективността на транзакцията се изчислява чрез изваждане на максималната ентропия от действителната ентропия на анализираната транзакция.
  
reviewed: true
question: ผลกระทบของธุรกรรม Bitcoin ต่อ UTXOs ในเอาท์พุตคืออะไร?
answer: มันสร้างขึ้นโดยใช้ UTXOs ที่ใช้ในอินพุต
wrong_answers:
  - มันบริโภคพวกเขาเพื่อตอบสนองข้อมูลนำเข้า
  - มันเข้ารหัสเพื่อทำให้ผู้รับไม่ระบุตัวตน
  - มันแบ่งพวกเขาชั่วคราวเพื่อการตรวจสอบ
explanation: |
  UTXOs ในเอาต์พุตของธุรกรรมถูกสร้างขึ้นโดยการใช้ UTXOs ในอินพุต มันเป็นจุดหมายปลายทางของเงินในทางหนึ่ง
reviewed: true
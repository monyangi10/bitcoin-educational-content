question: Какъв е ефектът на Bitcoin транзакция върху изходящите UTXO?
answer: Тя ги създава, като използва входящи UTXO.
wrong_answers:
  - Тя ги консумира, за да задоволи входовете.
  - Тя ги криптира, за да анонимизира получателя.
  - Тя временно ги разделя за проверка.
explanation: |
  Изходящите UTXO се създават чрез консумиране на входящите UTXO. В известен смисъл това е предназначението на парите.
reviewed: true

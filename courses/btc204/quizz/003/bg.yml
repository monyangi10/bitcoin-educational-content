question: Какъв е ефектът на транзакция Bitcoin върху UTXOs в изходите?
answer: Той ги създава, като използва UTXOs, консумирани във входовете.
wrong_answers:
  - Той ги консумира, за да задоволи входовете.
  - Той ги криптира, за да анонимизира получателя.
  - Той временно ги разделя за проверка.
explanation: |
  UTXOs на изходите на транзакцията се създават чрез консумиране на UTXOs на входовете. В известен смисъл това е предназначението на парите.
reviewed: true
question: Каква е основната разлика между съвместното и попечителското смесване?
answer: Coinjoin ви позволява да запазите пълен контрол върху средствата си.
wrong_answers:
  - Coinjoin изисква временен отказ от попечителство на средствата.
  - Смесителите са по-безопасни от съединенията.
  - Смесителите осигуряват по-добро качество на смесване.
explanation: |
  Основният недостатък на миксерите в сравнение с монетните комбинации е, че те изискват от потребителя да се откаже от опеката над средствата си по време на процеса на смесване, което го излага на риск от кражба.
  
reviewed: true
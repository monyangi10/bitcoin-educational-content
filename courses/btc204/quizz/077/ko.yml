question: CoinJoin과 커스터디 믹서의 주요 차이점은 무엇인가요?
answer: CoinJoin을 사용하면 자금에 대한 완전한 통제권을 유지할 수 있습니다.
wrong_answers:
  - CoinJoin는 자금의 일시적인 양육권 포기를 요구합니다.
  - 믹서는 코인조인보다 안전합니다.
  - 믹서는 더 나은 품질의 믹싱을 제공합니다.
explanation: |
  코인조인에 비해 믹서의 가장 큰 단점은 믹싱 과정에서 사용자가 자금의 소유권을 포기해야 하므로 도난 위험에 노출된다는 점입니다.
  
reviewed: true
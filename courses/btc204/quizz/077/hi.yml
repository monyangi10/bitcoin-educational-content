question: CoinJoin और कस्टोडियल मिक्सर में मुख्य अंतर क्या है?
answer: जीडब्ल्यू-1 आपको अपने फंड्स पर पूरा कंट्रोल रखने की सुविधा देता है।
wrong_answers:
  - जीडब्ल्यू-2 को फंड्स की कस्टडी अस्थायी रूप से छोड़नी पड़ती है।
  - मिक्सर सिक्योर होते हैं कोइनजॉइन्स से।
  - मिक्सर बेहतर क्वालिटी का मिश्रण देते हैं।
explanation: |
मिक्सर्स की सबसे बड़ी खामी, जब उनकी तुलना कॉइनजॉइन्स से की जाती है, वो ये है कि इस्तेमाल करने वाले को मिक्सिंग प्रोसेस के दौरान अपने फंड्स की कस्टडी छोड़नी पड़ती है। इससे उनके पैसे चोरी होने का खतरा बढ़ जाता है।
reviewed: false
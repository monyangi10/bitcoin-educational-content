question: ความแตกต่างหลักระหว่าง coinjoin และ custodial mixer คืออะไร?
answer: Coinjoin ช่วยให้คุณสามารถควบคุมเงินทุนของคุณได้อย่างเต็มที่
wrong_answers:
  - Coinjoin ต้องการการสละสิทธิ์การควบคุมเงินทุนชั่วคราว
  - เครื่องผสมปลอดภัยกว่าการรวมเหรียญ
  - เครื่องผสมให้คุณภาพการผสมที่ดีกว่า
explanation: |
  ข้อเสียหลักของการใช้มิกเซอร์เมื่อเทียบกับการใช้คอยน์จอยน์คือ ผู้ใช้จำเป็นต้องสละการควบคุมเงินของตนในระหว่างกระบวนการผสม ซึ่งทำให้เสี่ยงต่อการถูกขโมย
reviewed: true
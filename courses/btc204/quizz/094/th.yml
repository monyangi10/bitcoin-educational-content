question: ในบรรดาคำตอบต่อไปนี้ ข้อใดไม่ใช่แนวทางที่แนะนำสำหรับการจัดการการเปลี่ยนแปลงที่เป็นพิษ?
answer: การรวม UTXO ที่เป็นพิษเข้าด้วยกัน
wrong_answers:
  - การผสม UTXOs ที่เป็นพิษในกลุ่มที่เล็กกว่า
  - การบริจาค UTXOs ที่เป็นพิษของตนเอง
  - การทำเครื่องหมาย UTXOs ที่เป็นพิษของตนว่าไม่สามารถใช้จ่ายได้
explanation: |
  มีการแนะนำให้หลีกเลี่ยงการรวม UTXOs ที่เป็น doxxic เข้าด้วยกัน เพราะจะทำให้สามารถเชื่อมโยงระหว่างรายการต่างๆ ของผู้ใช้ใน Whirlpool ได้
reviewed: true
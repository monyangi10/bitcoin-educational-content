question: Коя от следните отговори не е препоръчителна практика за управление на доксалната промяна?
answer: Сливане на доксични UTXOs заедно.
wrong_answers:
  - Смесване на доксични UTXO в по-малък басейн.
  - Даряване на своите доксични UTXOs.
  - Маркиране на доксалните UTXO като неизползваеми.
explanation: |
  Препоръчва се да не се обединяват доксични UTXO заедно, тъй като това позволява да се направи връзка между различните записи на потребителя в Whirlpool.
  
reviewed: true
question: 次の回答の中で、自分のdoxxic changeを管理するために推奨されない方法はどれですか？

answer: doxxic UTXOを一緒にマージングすること

wrong_answers:
  - doxxic UTXOをより小さいプールで混ぜること
  - 自分のdoxxic UTXOを寄付すること
  - 自分のdoxxic UTXOを非支出可能としてマークすること

explanation: |
  doxxic UTXOを一緒にマージすることは、Whirlpool内のユーザーの異なるエントリー間の接続が可能になるため、推奨されません。

  レビュー済み: false

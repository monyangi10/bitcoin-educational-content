question: निम्नलिखित जवाबों में से, कौन सा अपने डॉक्सिक परिवर्तन को प्रबंधित करने के लिए एक अनुशंसित अभ्यास नहीं है?
answer: डॉक्सिक UTXOs को एक साथ मिला रहा है।
wrong_answers:
  - छोटे पूल में डॉक्सिक UTXOs को मिलाना।
  - अपने डॉक्सिक UTXOs दान करना।
  - अपने डॉक्सिक UTXOs को नॉन-स्पेंडेबल मार्क करना।
explanation: |
यह सलाह दी जाती है कि डॉक्सिक यूटीएक्सओ (UTXOs) को एक साथ मर्ज न करें, क्योंकि इससे Whirlpool में यूजर के अलग-अलग एंट्रीज के बीच कनेक्शन बनाने की संभावना होती है।
reviewed: false
question: 거래에 5,000Sats의 UTXO 2개가 입력으로 있고 3,000Sats의 UTXO 3개가 출력으로 있는 경우 거래 수수료는 얼마인가요?
answer: 1,000 Sats
wrong_answers:
  - 1,500 Sats
  - 2,500 Sats
  - 3,000 Sats
explanation: |
  트랜잭션 수수료는 총 입력과 총 출력의 차이를 나타냅니다. 이는 모든 입력을 소비하고 모든 출력을 생성한 후 남은 금액입니다. 따라서 계산은 수수료 = (5000x2) - (3000x3) = 10000 - 9000 = 1000입니다.
reviewed: true
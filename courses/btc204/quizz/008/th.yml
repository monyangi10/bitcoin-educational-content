question: หากธุรกรรมมี 2 UTXOs ของ 5,000 sats เป็นอินพุตและ 3 UTXOs ของ 3,000 sats เป็นเอาต์พุต ค่าธรรมเนียมการทำธุรกรรมคือเท่าใด?
answer: 1,000 sats
wrong_answers:
  - 1,500 กิกะวัตต์-2
  - 2,500 sats
  - 3,000 sats
explanation: |
  ค่าธรรมเนียมของธุรกรรมแสดงถึงความแตกต่างระหว่างอินพุตทั้งหมดและเอาต์พุตทั้งหมด มันคือสิ่งที่เหลืออยู่หลังจากใช้ทุกอินพุตและสร้างทุกเอาต์พุต การคำนวณคือ; ค่าธรรมเนียม = (5000x2) - (3000x3) = 10000 - 9000 = 1000.
reviewed: true
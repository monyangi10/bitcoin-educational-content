question: トランザクションが5,000 satsのUTXOを2つのインプットとして、そして3,000 satsのUTXOを3つのアウトプットとして持つ場合、トランザクション手数料はいくらですか？
answer: 1,000 sats
wrong_answers:
  - 1,500 sats
  - 2,500 sats
  - 3,000 sats
explanation: |
  トランザクション手数料は、合計インプットと合計アウトプットの差額を表します。これは、すべてのインプットを消費し、すべてのアウトプットを生成した後に残るものです。したがって、計算は次のようになります。手数料 = (5000x2) - (3000x3) = 10000 - 9000 = 1000。
reviewed: false

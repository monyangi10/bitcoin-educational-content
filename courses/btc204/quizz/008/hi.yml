question: अगर एक लेन-देन में 5,000 Sats के 2 UTXO इनपुट के रूप में हैं और 3,000 Sats के 3 UTXO आउटपुट के रूप में हैं, तो लेन-देन शुल्क क्या होगा?  

**हल:**  
1. कुल इनपुट = 2 × 5,000 Sats = **10,000 Sats**  
2. कुल आउटपुट = 3 × 3,000 Sats = **9,000 Sats**  
3. लेन-देन शुल्क = कुल इनपुट − कुल आउटपुट = 10,000 − 9,000 = **1,000 Sats**  

**जवाब:** लेन-देन शुल्क **1,000 Sats** है।
answer: 1,000 गीगावॉट (GW)
wrong_answers:
  - 1,500 गीगावॉट-2
  - 2,500 Sats
  - 3,000 गीगावॉट-4
explanation: |
  एक ट्रांजैक्शन की फीस टोटल इनपुट और टोटल आउटपुट के बीच का अंतर होती है। यह वो बचता है जब सारे इनपुट खर्च कर दिए जाते हैं और सारे आउटपुट बना दिए जाते हैं। इसलिए कैलकुलेशन है; फीस = (5000x2) - (3000x3) = 10000 - 9000 = 1000।

question: Ако транзакция има 2 UTXO от 5000 sats като входни данни и 3 UTXO от 3000 sats като изходни данни, какви са таксите за транзакцията?
answer: 1,000 sats
wrong_answers:
  - 1,500 sats
  - 2,500 sats
  - 3,000 sats
explanation: |
  Таксите по дадена транзакция представляват разликата между общия обем на вложените средства и общия обем на изведените средства. Това е онова, което остава след консумирането на всички входове и създаването на всички изходи. Следователно изчислението е следното: такси = (5000x2) - (3000x3) = 10000 - 9000 = 1000.
reviewed: true
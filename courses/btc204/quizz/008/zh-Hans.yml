question: 如果一笔交易有 2 个 UTXO 作为输入，每个 UTXO 为 5,000 聪，以及 3 个 UTXO 作为输出，每个 UTXO 为 3,000 聪，那么这笔交易的手续费是多少？
answer: 1,000 聪
wrong_answers:
  - 1,500 聪
  - 2,500 聪
  - 3,000 聪
explanation:
  交易的手续费代表了总输入和总输出之间的差额。这是在消耗所有输入并创建所有输出后剩余的部分。因此，计算公式为；手续费 = (5000 × 2) - (3000 × 3) = 10000 - 9000 = 1000。
reviewed: true

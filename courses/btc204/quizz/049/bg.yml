question: Защо операторът XOR се използва в BIP47?
answer: Симетрично криптиране на полезния товар на кода за плащане на изпращача.
wrong_answers:
  - Асиметрично криптиране на полезния товар на кода за плащане на изпращача.
  - Симетрично криптиране на метаданните на кода за плащане на изпращача.
  - Асиметрично криптиране на метаданните на кода за плащане на изпращача.
explanation: |
  Операторът XOR се използва за симетрично криптиране на полезния товар на кода за плащане на изпращача в BIP47.
reviewed: true
  - Om de metadata van de betalingscode van de verzender symmetrisch te versleutelen.
  - Om de metadata van de betalingscode van de verzender asymmetrisch te versleutelen.
explanation: |
  De XOR-operator wordt gebruikt om de payload van de betalingscode van de verzender symmetrisch te versleutelen in BIP47.
  

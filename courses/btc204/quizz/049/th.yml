question: ทำไมถึงใช้ตัวดำเนินการ XOR ใน BIP47?
answer: ในการเข้ารหัสแบบสมมาตรของข้อมูลที่ส่งในรหัสการชำระเงินของผู้ส่ง
wrong_answers:
  - เพื่อเข้ารหัสแบบอสมมาตรของข้อมูลที่ส่งในรหัสการชำระเงินของผู้ส่ง
  - ในการเข้ารหัสเมตาดาทาของรหัสการชำระเงินของผู้ส่งแบบสมมาตร
  - เพื่อเข้ารหัสเมตาดาทาของรหัสการชำระเงินของผู้ส่งแบบอสมมาตร
explanation: |
  ตัวดำเนินการ XOR ถูกใช้ในการเข้ารหัสแบบสมมาตรของข้อมูลการชำระเงินของผู้ส่งใน BIP47
reviewed: true
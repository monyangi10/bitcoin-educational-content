question: ทำไมการใช้ PayJoin สำหรับการชำระเงินจึงมักซับซ้อน?
answer: มันต้องการความร่วมมืออย่างแข็งขันของผู้รับในการก่อสร้าง
wrong_answers:
  - ต้องใช้จำนวนเงินคงที่สำหรับแต่ละธุรกรรม
  - มันบังคับให้ทั้งสองฝ่ายใช้ซอฟต์แวร์ประเภทเดียวกัน
  - มันต้องการให้ผู้ชำระเงินมี UTXO อย่างน้อย 2 รายการที่มีมูลค่ามากกว่าการชำระเงิน
explanation: |
  ความยากลำบากในการใช้ PayJoin อยู่ที่การพึ่งพาการมีส่วนร่วมของผู้ค้า ในฐานะลูกค้า การใช้ PayJoin เป็นไปไม่ได้หากผู้ค้าไม่รองรับ
reviewed: true
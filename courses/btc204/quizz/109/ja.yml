question: 支払いにペイジョインを使用することがしばしば複雑な理由は何ですか？

answer: 受取人の積極的な協力が構築に必要なため

wrong_answers:
  - 各トランザクションに固定額が必要なため
  - 両当事者が同じタイプのソフトウェアを使用することを強制するため
  - 支払い者が支払い額を超える少なくとも2つのUTXOを持っている必要があるため

explanation: |
  ペイジョインを使用する際の難しさは、使用者に依存していることにあります。顧客として、売り手がそれをサポートしていない場合、ペイジョインを使用することは不可能です。


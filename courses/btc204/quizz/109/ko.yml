question: PayJoin을 결제에 사용하는 것이 왜 종종 복잡한가요?
answer: 건설에 있어 수령인의 적극적인 협조가 필요합니다
wrong_answers:
  - 각 거래에 대해 고정 금액이 필요합니다
  - 양 당사자가 동일한 유형의 소프트웨어를 사용하도록 강제합니다
  - 결제자는 결제 금액보다 큰 UTXO를 2개 이상 보유해야 합니다
explanation: |
  PayJoin 사용의 어려움은 판매자의 참여 여부에 따라 달라진다는 데 있습니다. 판매자가 지원하지 않으면 고객 입장에서는 PayJoin을 사용할 수 없습니다.
  
reviewed: true
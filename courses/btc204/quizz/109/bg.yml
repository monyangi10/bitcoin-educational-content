question: Защо често е сложно да се използва PayJoin за плащане?
answer: Тя изисква активното сътрудничество на получателя при изграждането на
wrong_answers:
  - Изисква фиксирани суми за всяка транзакция
  - Налага се двете страни да използват един и същ вид софтуер
  - Тя изисква платецът да има поне 2 UTXO, по-големи от стойността на плащането
explanation: |
  Трудността при използването на PayJoin се състои в това, че тя зависи от участието на търговеца. Като клиент използването на PayJoin е невъзможно, ако търговецът не го поддържа.
  
reviewed: true
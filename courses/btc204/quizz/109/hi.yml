question: PayJoin का इस्तेमाल करने में अक्सर दिक्कत क्यों होती है?
answer: इसे बनाने में प्राप्तकर्ता का सक्रिय सहयोग चाहिए
wrong_answers:
  - हर लेन-देन के लिए निश्चित रकम की जरूरत होती है
  - यह दोनों पक्षों को एक ही तरह के सॉफ़्टवेयर का उपयोग करने के लिए मजबूर करता है
  - इसके लिए जरूरी है कि भुगतानकर्ता के पास कम से कम 2 UTXO हों जो भुगतान की राशि से अधिक हों
explanation: |
PayJoin का इस्तेमाल करने में मुश्किल यह है कि यह दुकानदार के सहयोग पर निर्भर करता है। अगर दुकानदार इसे सपोर्ट नहीं करता, तो ग्राहक के लिए PayJoin का इस्तेमाल करना नामुमकिन है।

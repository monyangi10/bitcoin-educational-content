question: Кое е основното предимство на онлайн обмена на P2P в сравнение с физическите парични транзакции?
answer: По-малък риск за личната безопасност.
wrong_answers:
  - По-малък риск от кражба.
  - Повече неприкосновеност на личния живот за купувача.
  - По-ниски такси за транзакции.
explanation: |
  Онлайн обменът на ГС-1 оставя повече следи и е по-уязвим от рискове от кражби в сравнение с обмена на ГС-1 в брой. Що се отнася до таксите за транзакции, те обикновено са еквивалентни или дори по-високи, особено ако процесът изисква няколко стъпки. Въпреки това основното предимство на онлайн обмена на ГВ-1 се състои в намаляването на рисковете за личната безопасност на потребителите в сравнение с трансакциите в брой.
reviewed: true
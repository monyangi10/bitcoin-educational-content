question: Кое е основното предимство на онлайн P2P обмена в сравнение с физическите парични транзакции?
answer: По-малък риск за личната безопасност.
wrong_answers:
  - По-малък риск от кражба.
  - Повече неприкосновеност на личния живот за купувача.
  - По-ниски такси за транзакции.
explanation: |
  Онлайн обменът оставя повече следи и е по-уязвим от рискове от кражби в сравнение с обмена в брой. Що се отнася до таксите за транзакции, те обикновено са еквивалентни или дори по-високи, особено ако процесът изисква няколко стъпки. Въпреки това основното предимство на онлайн обмена се състои в намаляването на рисковете за личната безопасност на потребителите в сравнение с трансакциите в брой.
reviewed: true

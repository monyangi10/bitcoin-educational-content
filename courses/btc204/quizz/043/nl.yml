question: Wat is het belangrijkste voordeel van online P2P-uitwisseling in vergelijking met fysieke geldtransacties?
answer: Minder risico voor persoonlijke veiligheid.
wrong_answers:
  - Minder risico op diefstal.
  - Meer privacy voor de koper.
  - Lagere transactiekosten.
explanation: |
  Online P2P-uitwisselingen laten meer sporen na en staan meer bloot aan diefstalrisico's dan contante P2P-uitwisselingen. De transactiekosten zijn over het algemeen gelijk of zelfs hoger, vooral als het proces meerdere stappen vereist. Het grootste voordeel van online P2P-uitwisselen ligt echter in de verminderde risico's voor de persoonlijke veiligheid van gebruikers in vergelijking met contante transacties.
reviewed: false

question: What is the main advantage of online P2P exchanges compared to physical cash transactions?
answer: Less risk to personal safety.
wrong_answers:
  - Less risk of theft.
  - More privacy for the buyer.
  - Lower transaction fees.
explanation: |
  Online P2P exchanges leave more traces and are more vulnerable to theft risks than cash-based P2P exchanges. Regarding transaction fees, they are generally equivalent or even higher, especially if the process requires multiple steps. However, the primary advantage of online P2P exchanges lies in the reduction of risks to users' personal safety compared to cash transactions.
reviewed: true

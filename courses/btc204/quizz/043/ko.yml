question: 실물 현금 거래와 비교했을 때 온라인 P2P 거래소의 주요 장점은 무엇인가요?
answer: 개인 안전에 대한 위험 감소.
wrong_answers:
  - 도난 위험 감소.
  - 구매자를 위한 개인정보 보호 강화.
  - 거래 수수료 절감.
explanation: |
  온라인 P2P 거래소는 현금 기반 P2P 거래소보다 더 많은 흔적을 남기고 도난 위험에 더 취약합니다. 거래 수수료는 일반적으로 비슷하거나 더 높으며, 특히 여러 단계를 거쳐야 하는 경우 더욱 그렇습니다. 그러나 온라인 P2P 거래소의 가장 큰 장점은 현금 거래에 비해 사용자의 개인 안전에 대한 위험이 줄어든다는 점입니다.
reviewed: true
question: Ni akamaro akahe nyamukuru k’uguhinduranya amafaranga kuri internet P2P ugereranyije n’uguhinduranya amafaranga y’umubiri?
answer: Ivyago bikeyi ku mutekano w’umuntu ku giti ciwe.
wrong_answers:
  - Ivyago vy’ubusuma bike.
  - Ivy’ubuzima bwite vyinshi ku muguzi.
  - Amafaranga yo gucuruza agabanutse.
explanation: |
  Ivy’uguhindura P2P kuri Internet bisiga ibimenyetso vyinshi kandi birashobora gushikirwa n’ingorane z’ubusuma kuruta ivy’uguhindura P2P ku mafaranga. Ku bijanye n’amahera yo gukoresha, muri rusangi arangana canke mbere ararenga, canecane iyo iyo nzira isaba intambwe nyinshi. Ariko rero, akamaro nyamukuru k’uguhanahana amakuru ku rubuga rwa P2P kari mu kugabanya ingorane zishobora gutera umutekano w’abakoresha ugereranyije n’uguhinduranya amahera.

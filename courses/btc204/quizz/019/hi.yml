question: Satoshi नाकामोतो द्वारा Bitcoin व्हाइट पेपर में बताए गए चेन एनालिसिस ह्यूरिस्टिक्स क्या हैं? (केवल एक उत्तर संभव है)  

**उत्तर:** लॉन्गेस्ट चेन रूल (सबसे लंबी श्रृंखला का नियम)
answer: सीआईओएच और जीडब्ल्यू-2 का पुन: उपयोग।
wrong_answers:
  - हस्ताक्षर और समय सहसंबंध के आधार पर समूहीकरण।
  - गोल संख्या भुगतान और बड़ा आउटपुट।
  - वॉल्यूम विश्लेषण और स्क्रिप्ट समानताएँ।
explanation: |
  Bitcoin व्हाइट पेपर के भाग 10 में, Satoshi नाकामोटो उपयोगकर्ताओं को CIOH (कॉमन इनपुट Ownership ह्यूरिस्टिक) और एक ही जोड़ी की कुंजियों के पुन: उपयोग के बारे में चेतावनी देता है।
reviewed: false
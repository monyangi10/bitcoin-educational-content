question: Кои са евристичните методи за анализ на блокчейна, споменати от Satoshi Nakamoto в Бялата книга на Bitcoin? (възможен е само един отговор)
answer: CIOH и повторна употреба на адреса.
wrong_answers:
  - Клъстеризация по сигнатура и корелация на времето.
  - Закръглените плащания и големият резултат.
  - Анализ на обема и сходства на сценария.
explanation: |
  В част 10 на Бялата книга на Bitcoin, Satoshi Nakamoto предупреждава потребителите за CIOH (Common Input Ownership Heuristic) и повторното използване на една и съща двойка ключове.
reviewed: true

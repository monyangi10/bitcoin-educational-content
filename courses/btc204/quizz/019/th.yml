question: อะไรคือการวิเคราะห์เชิงโซ่ที่กล่าวถึงโดย Satoshi Nakamoto ในเอกสาร Bitcoin White Paper? (ตอบได้เพียงคำตอบเดียว)
answer: CIOH และการใช้ที่อยู่ซ้ำ
wrong_answers:
  - การจัดกลุ่มโดยลายเซ็นและความสัมพันธ์ของเวลา
  - การชำระเงินด้วยจำนวนเต็มและผลลัพธ์ที่ใหญ่
  - การวิเคราะห์ปริมาณและความคล้ายคลึงของสคริปต์
explanation: |
  ในส่วนที่ 10 ของเอกสารไวท์เปเปอร์ Bitcoin, Satoshi Nakamoto เตือนผู้ใช้เกี่ยวกับ CIOH (Common Input Ownership Heuristic) และการใช้คู่กุญแจเดียวกันซ้ำอีก
reviewed: true
question: What is key identification?
answer: The ability to associate an aspect of a user's identity with an on-chain activity.
wrong_answers:
  - The process of assigning a public key to each new on-chain transaction.
  - The ability to trace on-chain transactions through the common ownership heuristic of inputs.
  - The process by which a public key is derived from a private key.
explanation: |
  Key identification involves linking an aspect of a user's identity to an on-chain activity.
reviewed: true

question: การระบุคีย์คืออะไร?
answer: ความสามารถในการเชื่อมโยงแง่มุมของตัวตนของผู้ใช้กับกิจกรรม on-chain
wrong_answers:
  - กระบวนการกำหนดคีย์สาธารณะให้กับแต่ละธุรกรรม on-chain ใหม่
  - ความสามารถในการติดตามธุรกรรม on-chain ผ่านการอนุมานความเป็นเจ้าของร่วมกันของอินพุต
  - กระบวนการที่สร้างคีย์สาธารณะจากคีย์ส่วนตัว
explanation: |
  การระบุคีย์เกี่ยวข้องกับการเชื่อมโยงแง่มุมของตัวตนของผู้ใช้กับกิจกรรม on-chain
reviewed: true
question: Какво представлява идентификацията на ключовете?
answer: Възможност за свързване на аспект от идентичността на потребителя с on-chain дейност.
wrong_answers:
  - Процесът на присвояване на публичен ключ на всяка нова on-chain транзакция.
  - Възможност за проследяване на транзакциите по on-chain чрез евристиката на общата собственост на входящите данни.
  - Процесът, при който публичен ключ се получава от частен ключ.
explanation: |
  Идентификацията на ключове включва свързването на даден аспект от идентичността на потребителя с on-chain дейност.
reviewed: true

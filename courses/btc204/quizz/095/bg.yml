question: Какво показва prospective anonset?
answer: Размерът на групата от неразличими UTXO на изхода на циклите.
wrong_answers:
  - Размерът на групата от неразличими UTXO на входа на цикъла.
  - Размерът на групата от неразличими UTXO в басейна.
  - Броят на транзакциите, необходими за постигане на анонимност.
explanation: |
  Перспективният анонсет (prospective anonset) показва размера на групата, сред която е скрита изследваната UTXO на изхода на цикъла, като се има предвид UTXO на входа, т.е. броят на неразличимите монети, присъстващи в това множество.
  
reviewed: true

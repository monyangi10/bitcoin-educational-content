question: 잠재적 무응답은 무엇을 의미하나요?
answer: 사이클 출력 시 구분할 수 없는 UTXO 그룹의 크기입니다.
wrong_answers:
  - 사이클 입력 시 구분할 수 없는 UTXO 그룹의 크기입니다.
  - 풀에서 구별할 수 없는 UTXO 그룹의 크기입니다.
  - 익명성을 달성하는 데 필요한 트랜잭션 수입니다.
explanation: |
  전향적 익명 집합은 입력 시 UTXO, 즉 이 집합 내에 존재하는 구별할 수 없는 동전의 수가 주어졌을 때 사이클의 출력에서 연구된 UTXO이 숨겨지는 그룹의 크기를 나타냅니다.
  
reviewed: true
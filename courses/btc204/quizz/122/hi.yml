question: P2P ट्रांसपोर्ट V2 नोड्स के बीच संचार की प्राइवेसी और सुरक्षा को कैसे बेहतर बनाता है?
answer: ऑपरच्यूनिस्टिक एन्क्रिप्शन को इंटीग्रेट करके
wrong_answers:
  - ऑथेंटिकेशन को इंटीग्रेट करके
  - अतिरिक्त रिले का उपयोग करके
  - Tor इस्तेमाल करके
explanation: |
जीडब्ल्यू-2 ट्रांसपोर्ट वी2 में जीडब्ल्यू-1 का इस्तेमाल होता है जो मौके के हिसाब से एन्क्रिप्शन करता है, ताकि नोड्स के बीच की कम्युनिकेशन की प्राइवेसी और सुरक्षा बेहतर हो सके।
reviewed: false
question: P2P transport V2 ปรับปรุงความเป็นส่วนตัวและความปลอดภัยของการสื่อสารระหว่างโหนดอย่างไร?
answer: โดยการรวมการเข้ารหัสแบบฉวยโอกาส
wrong_answers:
  - โดยการผสานการตรวจสอบสิทธิ์
  - โดยการใช้รีเลย์เพิ่มเติม
  - โดยการใช้ Tor
explanation: |
  P2P transport V2 รวมชั้นของการเข้ารหัสแบบฉวยโอกาสเพื่อเพิ่มความเป็นส่วนตัวและความปลอดภัยของการสื่อสารระหว่างโหนด
reviewed: true
question: Какъв е конкретният модел за подбор на потребители, използван от JoinMarket?
answer: P2P пазар между създатели и купувачи.
wrong_answers:
  - Сървър, който разпределя участниците на случаен принцип.
  - Обмени, базирани на холандски търгове.
  - Услуга за посредничество, при която участниците се избират ръчно.
explanation: |
  JoinMarket функционира в рамките на обменния пазар P2P, където някои потребители, т.е. създателите, предлагат своите биткойни за смесване, а други, т.е. приемателите, използват тези средства, за да извършват coinjoins срещу заплащане.
  
reviewed: true
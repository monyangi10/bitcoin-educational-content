question: JoinMarket에서 사용하는 구체적인 사용자 매칭 모델은 무엇인가요?
answer: 메이커와 테이커 간의 P2P 마켓.
wrong_answers:
  - 참가자를 무작위로 할당하는 서버입니다.
  - 네덜란드 경매를 기반으로 하는 거래소입니다.
  - 참가자를 수동으로 선택하는 중개 서비스입니다.
explanation: |
  조인마켓은 일부 사용자(메이커)가 자신의 비트코인을 믹싱에 제공하고, 다른 사용자(테이커)는 이 자금을 사용해 수수료를 받고 Exchange에서 코인 조인을 수행하는 P2P Exchange 마켓에서 운영됩니다.
  
reviewed: true
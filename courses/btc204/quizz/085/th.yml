question: โมเดลการจับคู่ผู้ใช้เฉพาะที่ใช้โดย JoinMarket คืออะไร?
answer: ตลาด P2P ระหว่างผู้สร้างและผู้รับ.
wrong_answers:
  - เซิร์ฟเวอร์ที่สุ่มกำหนดผู้เข้าร่วม
  - การแลกเปลี่ยนที่อิงตามการประมูลแบบดัตช์
  - บริการไกล่เกลี่ยที่เลือกผู้เข้าร่วมด้วยตนเอง
explanation: |
  JoinMarket ดำเนินการในตลาดแลกเปลี่ยน P2P ที่ซึ่งผู้ใช้บางคนที่เรียกว่า makers เสนอ bitcoins ของพวกเขาสำหรับการผสม ในขณะที่ผู้ใช้คนอื่น ๆ ที่เรียกว่า takers ใช้เงินเหล่านี้เพื่อทำ coinjoins โดยแลกกับค่าธรรมเนียม
reviewed: true
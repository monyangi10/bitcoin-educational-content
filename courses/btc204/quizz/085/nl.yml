question: Wat is het specifieke gebruikersmatchingsmodel dat JoinMarket gebruikt?
answer: P2P markt tussen makers en nemers.
wrong_answers:
  - Server die willekeurig deelnemers toewijst.
  - Ruilen op basis van Nederlandse veilingen.
  - Bemiddelingsdienst die handmatig deelnemers selecteert.
explanation: |
  JoinMarket werkt op een P2P-ruilmarkt waar sommige gebruikers, de makers, hun bitcoins aanbieden om te mengen, terwijl anderen, de nemers, deze fondsen gebruiken om coinjoins uit te voeren in ruil tegen betaling.
  
reviewed: false

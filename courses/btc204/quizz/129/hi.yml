question: सिक्का स्वैप (coinswaps) में इस्तेमाल होने वाले स्मार्ट कॉन्ट्रैक्ट्स के दो मुख्य प्रकार कौन से हैं?
answer: जीडब्ल्यू-0 और पीटीएलसी
wrong_answers:
  - मल्टी-सिग्नेचर और सिंगल-सिग्नेचर
  - स्मार्ट कॉन्ट्रैक्ट्स और डीऐप्स
  - जीडब्ल्यू-2 और जीडब्ल्यू-1
explanation: |
सिक्कों की अदला-बदली (coinswap) करने के लिए, आप HTLCs (Hash टाइम-लॉक्ड कॉन्ट्रैक्ट्स) या PTLCs (पॉइंट टाइम-लॉक्ड कॉन्ट्रैक्ट्स) का इस्तेमाल कर सकते हैं।
reviewed: false
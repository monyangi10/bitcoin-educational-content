question: การวัดการเกิดย้อนหลังคืออะไร?
answer: ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากปัจจุบันสู่อดีต
wrong_answers:
  - ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากอดีตสู่อนาคต
  - ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากปัจจุบันสู่อนาคต
  - ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากอดีตถึงปัจจุบัน
explanation: |
  มาตรการการไม่เปิดเผยตัวตนย้อนหลังวัดความต้านทานของความเป็นส่วนตัวของเหรียญต่อการวิเคราะห์จากปัจจุบันไปสู่อดีต (จากผลลัพธ์ไปยังข้อมูลนำเข้า)
reviewed: true
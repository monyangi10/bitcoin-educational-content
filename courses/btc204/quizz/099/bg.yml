question: Какво измерва ретроспективното отпадане?
answer: Съпротивата на неприкосновеността на личния живот срещу анализа на настоящето и миналото.
wrong_answers:
  - Съпротивата на неприкосновеността на личния живот срещу анализа на миналото и бъдещето.
  - Съпротивата на неприкосновеността на личния живот срещу анализа на настоящето и бъдещето.
  - Съпротивата на неприкосновеността на личния живот срещу анализа на миналото и настоящето.
explanation: |
  Ретроспективният анонс измерва съпротивлението на личния живот на монетата срещу анализ от настоящето към миналото (от изхода към входа).
  
reviewed: true
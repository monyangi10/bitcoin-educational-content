question: रेट्रोस्पेक्टिव अनॉनसेट क्या मापता है?
answer: प्राइवेसी का विरोध, वर्तमान से अतीत के विश्लेषण के खिलाफ।
wrong_answers:
  - गुज़रे समय से भविष्य की ओर विश्लेषण के खिलाफ़ निजता का प्रतिरोध।
  - वर्तमान से भविष्य के विश्लेषण के खिलाफ निजता का प्रतिरोध।
  - गोपनीयता का अतीत से वर्तमान तक के विश्लेषण के खिलाफ प्रतिरोध।
explanation: |
रेट्रोस्पेक्टिव अनॉनसेट एक सिक्के की प्राइवेसी के प्रतिरोध को मापता है, जो वर्तमान से अतीत के विश्लेषण (आउटपुट से इनपुट) के खिलाफ होता है।
reviewed: false
question: CoinJoin ट्रांजैक्शन क्या है?
answer: एक सहयोगी लेन-देन जहां कई यूजर्स अपने UTXOs को मिलाते हैं।
wrong_answers:
  - दो ही उपयोगकर्ताओं के बीच एक सहयोगात्मक लेन-देन।
  - एक ऐसा लेन-देन जहां एक ही यूज़र कई पतों पर पैसे भेजता है।
  - एक लेन-देन जहां एक केंद्रीय खिलाड़ी अपने ग्राहकों के बिटकॉइन मिलाता है।
explanation: |
CoinJoin लेन-देन एक सहयोगात्मक लेन-देन है जिसमें कई उपयोगकर्ता अपने सिक्कों को मिलाते हैं।

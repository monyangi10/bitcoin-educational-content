question: Какво е транзакция за обединяване на монети?
answer: Съвместна транзакция, при която няколко потребители обединяват своите UTXO.
wrong_answers:
  - Съвместна транзакция само между двама потребители.
  - Транзакция, при която един потребител изпраща средства на няколко адреса.
  - Транзакция, при която централен участник смесва биткойните на своите клиенти.
explanation: |
  Транзакцията coinjoin е съвместна транзакция, при която няколко потребители смесват своите монети.
  
reviewed: true
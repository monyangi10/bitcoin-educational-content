question: การทำธุรกรรม CoinJoin คืออะไร?
answer: การทำธุรกรรมแบบร่วมมือกันที่ผู้ใช้หลายคนรวม UTXO ของพวกเขาเข้าด้วยกัน
wrong_answers:
  - การทำธุรกรรมร่วมกันระหว่างผู้ใช้เพียงสองคนเท่านั้น
  - ธุรกรรมที่ผู้ใช้คนเดียวส่งเงินไปยังหลายที่อยู่
  - ธุรกรรมที่มีผู้ดำเนินการกลางทำการผสมบิตคอยน์ของลูกค้าของพวกเขา
explanation: |
  ธุรกรรม coinjoin เป็นธุรกรรมแบบร่วมมือกันที่ผู้ใช้หลายคนผสมเหรียญของพวกเขา
reviewed: true
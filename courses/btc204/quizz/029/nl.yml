question: Welke van deze 4 methodes om bitcoins te verwerven stelt je het minst bloot aan het risico van sleutelidentificatie?
answer: Kopen in P2P met contant geld
wrong_answers:
  - Kopen via een gereguleerd platform zonder KYC
  - Kopen via een gereguleerd platform met KYC
  - Kopen via PayPal via een P2P matchmaking platform
explanation: |
  De peer-to-peer aankoop van bitcoins met contant geld is de methode die je het minst blootstelt aan de risico's van sleutelidentificatie omdat het niet nodig is om via een gereguleerd bedrijf te gaan en geen sporen achterlaat in het banksysteem. Bovendien is het bij deze methode over het algemeen niet nodig om persoonlijke informatie vrij te geven.
reviewed: false

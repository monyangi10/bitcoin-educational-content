question: 비트코인을 획득하는 4가지 방법 중 키 식별의 위험에 가장 적게 노출되는 방법은 무엇인가요?
answer: 현금으로 P2P에서 구매하기
wrong_answers:
  - KYC 없이 규제된 플랫폼을 통한 구매
  - KYC가 적용된 규제된 플랫폼을 통한 구매
  - P2P 매치메이킹 플랫폼을 통해 페이팔로 구매하기
explanation: |
  현금으로 비트코인을 P2P로 구매하는 것은 규제 대상 회사를 거칠 필요가 없고 은행 시스템에 흔적을 남기지 않기 때문에 키 신원 확인의 위험이 가장 적은 방법입니다. 또한, 이 방법은 일반적으로 개인 정보를 공개할 필요가 없습니다.
reviewed: true
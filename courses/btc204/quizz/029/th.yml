question: ในบรรดา 4 วิธีการได้มาซึ่งบิตคอยน์เหล่านี้ วิธีใดที่ทำให้คุณเสี่ยงต่อการถูกระบุคีย์น้อยที่สุด?
answer: การซื้อใน P2P ด้วยเงินสด
wrong_answers:
  - การซื้อผ่านแพลตฟอร์มที่มีการควบคุมโดยไม่ต้องใช้ KYC
  - การซื้อผ่านแพลตฟอร์มที่มีการควบคุมด้วย KYC
  - การซื้อผ่าน PayPal ผ่านแพลตฟอร์มจับคู่ P2P
explanation: |
  การซื้อบิตคอยน์แบบเพียร์ทูเพียร์ด้วยเงินสดเป็นวิธีที่ทำให้คุณเสี่ยงต่อการถูกระบุตัวตนได้น้อยที่สุด เพราะไม่จำเป็นต้องผ่านบริษัทที่มีการควบคุมและไม่ทิ้งร่องรอยในระบบธนาคาร นอกจากนี้ วิธีนี้โดยทั่วไปไม่จำเป็นต้องเปิดเผยข้อมูลส่วนบุคคล
reviewed: true
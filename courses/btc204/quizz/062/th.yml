question: ในบรรดาตัวเลือกเหล่านี้ ข้อใดไม่ใช่วิธีการเลือกชิ้นส่วนอัตโนมัติ?
answer: การชำระเงินแบบเงียบ
wrong_answers:
  - Branch-and-Bound
  - FIFO
  - ตัวแก้ปัญหา Knapsack
explanation: |
  ซึ่งแตกต่างจากตัวเลือกอื่น ๆ อีกสามตัวเลือก Silent Payments ไม่ใช่วิธีการเลือกส่วนต่าง ๆ แต่เป็นโปรโตคอลสำหรับการใช้ที่อยู่แบบคงที่
reviewed: true
question: Welke van deze opties is geen methode voor automatische onderdeelselectie?
answer: Stille betalingen
wrong_answers:
  - Tak-en-grens
  - FIFO
  - Knapzakoplosser
explanation: |
  In tegenstelling tot de andere drie opties is Silent Payments geen methode om onderdelen te selecteren, maar een protocol om statische adressen te gebruiken.
  

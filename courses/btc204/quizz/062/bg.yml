question: Коя от тези възможности не е метод за автоматичен избор на част?
answer: Безшумни плащания
wrong_answers:
  - Разклонения и връзки
  - FIFO
  - Решаваща програма за кнапсак
explanation: |
  За разлика от другите три опции, "Тихите плащания" не е метод за избор на части, а протокол за използване на статични адреси.
  
reviewed: true
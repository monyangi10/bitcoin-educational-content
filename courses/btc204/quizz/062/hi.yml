question: इन विकल्पों में से, कौन सा स्वचालित पार्ट चयन का तरीका नहीं है?
answer: चुपके भुगतान
wrong_answers:
  - ब्रांच-एंड-बाउंड
  - पहले आओ पहले पाओ (FIFO)
  - कनैपसैक सॉल्वर
explanation: |
अन्य तीन विकल्पों के विपरीत, साइलेंट पेमेंट्स पार्ट्स चुनने का तरीका नहीं है, बल्कि स्थिर पतों का उपयोग करने के लिए एक प्रोटोकॉल है।
reviewed: false
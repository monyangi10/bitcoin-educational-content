question: Какво представлява UTXO в Bitcoin?
answer: Част от биткойн, която все още не е похарчена.
wrong_answers:
  - Адрес Bitcoin за получаване на средства.
  - Специален тип Bitcoin портфейл.
  - Алгоритъм за криптиране за Bitcoin.
explanation: |
  UTXO е неизразходван резултат от транзакция, така че по същество е "парче биткойн".
reviewed: true

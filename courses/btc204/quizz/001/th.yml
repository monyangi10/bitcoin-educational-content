question: UTXO คืออะไรบน Bitcoin?
answer: ชิ้นส่วนของบิตคอยน์ที่ยังไม่ได้ใช้จ่าย
wrong_answers:
  - ที่อยู่ Bitcoin เพื่อรับเงินทุน
  - ประเภทพิเศษของ Bitcoin wallet.
  - อัลกอริทึมการเข้ารหัสสำหรับ Bitcoin
explanation: |
  UTXO คือเอาต์พุตของธุรกรรมที่ยังไม่ได้ใช้ ดังนั้นมันจึงเป็น "ชิ้นส่วนของบิตคอยน์"
reviewed: true
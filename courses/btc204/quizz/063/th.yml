question: ความเสี่ยงด้านความเป็นส่วนตัว 2 ประการที่เกี่ยวข้องกับการเลือกเหรียญคืออะไร?
answer: CIOH และความเชื่อมโยงระหว่างข้อมูลนำเข้า/อัตลักษณ์โดยผู้รับ
wrong_answers:
  - การติดตามที่อยู่ IP และการเชื่อมโยงกิจกรรม
  - การติดตามเชิงเวลาและการใช้ที่อยู่ซ้ำ
  - การใช้ซ้ำ Address และความเชื่อมโยงระหว่างอินพุต/อัตลักษณ์โดยผู้สังเกตการณ์ภายนอก
explanation: |
  ความเสี่ยงสองประการที่ต้องพิจารณาเมื่อเลือกเหรียญ: ความเป็นไปได้ที่ผู้รับการชำระเงินสามารถเชื่อมโยงส่วนหนึ่งของตัวตนของคุณกับ UTXOs ที่ใช้เป็นอินพุต และความสามารถของผู้สังเกตการณ์ภายนอกในการสร้างลิงก์ระหว่าง UTXOs ทั้งหมดที่ถูกใช้เป็นอินพุต (CIOH)
reviewed: true
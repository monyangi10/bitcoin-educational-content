question: Какви са двата риска за поверителността, свързани с избора на монети?
answer: CIOH и връзката между входовете/личността на получателя.
wrong_answers:
  - Проследяване на IP адреси и корелация на дейностите.
  - Времево проследяване и повторно използване на адреси.
  - Address повторна употреба и връзката между входовете/личността от външен наблюдател.
explanation: |
  При избора на монети трябва да се вземат предвид два риска: възможността получателят на плащането да свърже част от вашата самоличност с използваните като входни данни UTXO и възможността външен наблюдател да установи връзки между всички UTXO, използвани като входни данни (CIOH).
reviewed: true
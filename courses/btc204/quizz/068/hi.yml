question: कोईएचआई (COIH) के प्रभाव को कम करने के लिए यूटीएक्सओ (UTXOs) को कंसोलिडेट करते समय हम क्या कर सकते हैं?
answer: एक ही स्रोत से सिर्फ UTXOs को मिलाकर।
wrong_answers:
  - थर्ड-पार्टी एड्रेसेस को UTXO भेजकर।
  - यूटीएक्सओ को बिना किसी पहचान योग्य पैटर्न से बचने के लिए बेतरतीब ढंग से चुनकर।
  - कम एक्टिविटी के समय में UTXOs को मिलाकर (कंसोलिडेट करके)।
explanation: |
अगर आपको अपने बिटकॉइन को मिलाने की ज़रूरत पड़े, तो पहले एक ही स्रोत से आए UTXOs को मिलाने को प्राथमिकता दें।
reviewed: false
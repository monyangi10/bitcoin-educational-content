question: Как можем да сведем до минимум въздействието на COIH при консолидирането на UTXO?
answer: Чрез консолидиране само на UTXO от един и същи източник.
wrong_answers:
  - Чрез изпращане на UTXO до адреси на трети страни.
  - Чрез случаен избор на UTXOs, за да се избегнат разпознаваеми модели.
  - Чрез консолидиране на UTXO по време на периоди на ниска активност.
explanation: |
  Ако трябва да консолидирате своите биткойни, първо консолидирайте UTXO от един и същи източник.
  
reviewed: true
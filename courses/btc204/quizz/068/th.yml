question: เราจะลดผลกระทบของ COIH ได้อย่างไรเมื่อรวม UTXOs?
answer: โดยการรวมเฉพาะ UTXO จากแหล่งเดียวกันเท่านั้น
wrong_answers:
  - โดยการส่ง UTXOs ไปยังที่อยู่ของบุคคลที่สาม
  - โดยการสุ่มเลือก UTXOs เพื่อหลีกเลี่ยงรูปแบบที่สามารถจดจำได้
  - โดยการรวม UTXOs ในช่วงที่มีกิจกรรมต่ำ
explanation: |
  หากคุณต้องการรวมบิตคอยน์ของคุณ ให้จัดลำดับความสำคัญในการรวม UTXO จากแหล่งเดียวกันก่อน
reviewed: true
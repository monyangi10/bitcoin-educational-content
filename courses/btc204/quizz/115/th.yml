question: ริโคเชต์ในบริบทของ Bitcoin คืออะไร?
answer: เทคนิคที่เกี่ยวข้องกับการทำธุรกรรมหลายรายการให้กับตนเอง
wrong_answers:
  - การทำธุรกรรมร่วมกันที่เกี่ยวข้องกับผู้เข้าร่วมหลายคน
  - วิธีการผสมบิตคอยน์เพื่อเพิ่มความเป็นนิรนามที่คาดหวัง
  - ประเภทของ coinjoin ที่เฉพาะเจาะจงสำหรับแพลตฟอร์มแลกเปลี่ยนบางแห่ง
explanation: |
  การกระเด้งกลับเป็นเทคนิคที่เกี่ยวข้องกับการทำธุรกรรมปลอมหลายรายการให้กับตนเอง (การกวาดล้าง)
reviewed: true
question: Какво е рикошет в контекста на Bitcoin?
answer: Техника, която включва извършването на множество транзакции към себе си
wrong_answers:
  - Съвместна транзакция, включваща множество участници
  - Метод за смесване на биткойни за увеличаване на потенциалната анонимност
  - Вид обединяване на монети, специфично за определени платформи за обмен
explanation: |
  Рикошетът е техника, която включва извършването на няколко фиктивни транзакции към себе си (замитане).
  
reviewed: true
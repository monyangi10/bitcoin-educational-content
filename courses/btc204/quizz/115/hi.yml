question: Bitcoin के संदर्भ में रिकोशे (ricochet) क्या है?
answer: एक तकनीक जिसमें खुद के साथ कई लेन-देन करना शामिल है
wrong_answers:
  - 
  - बिटकॉइन की गोपनीयता बढ़ाने के लिए उन्हें मिलाने (मिक्स करने) की एक विधि
  - एक प्रकार का CoinJoin जो कुछ खास Exchange प्लेटफॉर्म्स के लिए ही होता है
explanation: |
रिकोशेट एक तकनीक है जिसमें खुद के नाम पर कई काल्पनिक लेन-देन करना शामिल होता है (स्वीपिंग)।
reviewed: false
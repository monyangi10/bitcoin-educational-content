question: वाबीसाबी एनॉनसेट्स (anonymous participants) को बढ़ाने के लिए कौन-सी रणनीति अपनाता है?
answer: कुछ बहुत बड़े लेन-देन के साथ।
wrong_answers:
  - बहुत सारे बहुत छोटे लेन-देन के साथ।
  - एक छोटे से लेन-देन के साथ।
  - कोई लेन-देन नहीं।
explanation: |
भागीदारों की संख्या बढ़ाने के लिए, वाबीसाबी बहुत बड़े CoinJoin लेनदेन का इस्तेमाल करता है जो दर्जनों भागीदारों को एक साथ जोड़ते हैं।
reviewed: false
question: กลยุทธ์ใดที่ Wabisabi ใช้เพื่อเพิ่ม anonsets ของผู้เข้าร่วม?
answer: ด้วยธุรกรรมขนาดใหญ่มากเพียงไม่กี่รายการ
wrong_answers:
  - ด้วยธุรกรรมขนาดเล็กจำนวนมาก
  - ด้วยการทำธุรกรรมเล็ก ๆ เพียงครั้งเดียว
  - ไม่มีธุรกรรม
explanation: |
  เพื่อเพิ่มความไม่ระบุตัวตนของผู้เข้าร่วม Wabisabi ใช้ธุรกรรม coinjoin ขนาดใหญ่ที่รวมกลุ่มผู้เข้าร่วมหลายสิบคนเข้าด้วยกัน
reviewed: true
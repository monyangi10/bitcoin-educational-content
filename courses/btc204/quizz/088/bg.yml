question: Каква стратегия използва Wabisabi, за да увеличи броя на участниците?
answer: С няколко много големи транзакции.
wrong_answers:
  - С много малки транзакции.
  - С една малка транзакция.
  - Без транзакции.
explanation: |
  За да увеличи броя на участниците, Wabisabi използва много големи транзакции за обединяване на монети, които обединяват десетки участници.
  
reviewed: true
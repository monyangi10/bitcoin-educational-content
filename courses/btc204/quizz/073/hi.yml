question: निम्नलिखित जवाबों में से कौन सा चेन एनालिसिस ह्यूरिस्टिक्स को धोखा देने की अनुमति नहीं देता है?
answer: हमेशा एक ही रिसीविंग Address का इस्तेमाल करना।
wrong_answers:
  - एक ऐसा बदलाव बनाना जिसकी कीमत भुगतान के करीब हो।
  - अनियमित, गोल न होने वाली मात्राओं के आउटपुट बनाना।
  - दिन भर में लेन-देन को फैलाकर बांटना।
explanation: |
एक को खास तौर पर Address को बार-बार इस्तेमाल नहीं करना चाहिए। बाकी सभी जवाब चेन एनालिसिस ह्यूरिस्टिक्स से बचने की अनुमति देते हैं।
reviewed: false
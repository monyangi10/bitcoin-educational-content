question: Кой от изброените отговори не позволява измама на евристиката на блокчейн анализа?
answer: Винаги използвате един и същ адрес за получаване.
wrong_answers:
  - Създаване на ресто, чиято стойност е близка до стойността на плащането.
  - Извършване на изходи с неправилни, некръгли стойности.
  - Разпределяне на разпределението на транзакциите през деня.
explanation: |
  Особено важно е да не използвате един адрес за получаване многократно. Всички останали отговори позволяват да се избегне евристиката на блокчейн анализа.
  
reviewed: true

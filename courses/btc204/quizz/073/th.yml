question: ในบรรดาคำตอบต่อไปนี้ ข้อใดที่ไม่อนุญาตให้หลอกลวงการวิเคราะห์เชิงฮิวริสติกของเชน?
answer: มักใช้ที่อยู่รับเดียวกันเสมอ
wrong_answers:
  - สร้างเงินทอนที่มีมูลค่าใกล้เคียงกับการชำระเงิน
  - การสร้างผลลัพธ์ของจำนวนที่ไม่ปกติและไม่เป็นจำนวนเต็มรอบ
  - กระจายการทำธุรกรรมตลอดทั้งวัน
explanation: |
  ไม่ควรใช้ที่อยู่รับหลายครั้งเป็นพิเศษ คำตอบอื่น ๆ ทั้งหมดช่วยหลีกเลี่ยงการวิเคราะห์เชิงพฤติกรรมของเครือข่าย
reviewed: true
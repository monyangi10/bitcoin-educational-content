question: Кой от следните отговори не представлява риск при изпращането на биткойни, които са били свързани с монети, към регулирана платформа?
answer: Платформата може да увеличи таксите за транзакции
wrong_answers:
  - Платформата може да замрази средствата
  - Платформата може да блокира профила на потребителя
  - Платформата може да докладва на властите за подозрително поведение
explanation: |
  Ако изпратите монетата си на регулирана платформа за обмен, но тя наскоро е била присъединена към монета, инструментът за анализ на веригата на платформата ще открие този факт. Тогава платформата може да откаже да приеме вашата UTXO, която е претърпяла coinjoin, или дори да поиска обяснения от вас, като има риск сметката ви да бъде спряна или средствата ви да бъдат замразени. В някои случаи платформата може да докладва за поведението ви и на държавните органи.
  
reviewed: true
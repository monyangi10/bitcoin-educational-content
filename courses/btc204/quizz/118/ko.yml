question: 다음 중 CoinJoin을 거친 비트코인을 규제 플랫폼으로 전송할 때 위험하지 않은 것은 어느 것입니까?
answer: 플랫폼에서 거래 수수료가 인상될 수 있습니다
wrong_answers:
  - 플랫폼에서 자금을 동결할 수 있습니다
  - 플랫폼에서 사용자의 계정을 차단할 수 있습니다
  - 플랫폼은 의심스러운 행동을 당국에 신고할 수 있습니다
explanation: |
  Coin을 규제 대상인 Exchange 플랫폼으로 보냈지만 최근에 CoinJoin을 받은 경우, 플랫폼의 체인 분석 도구가 이 사실을 감지합니다. 그러면 플랫폼은 CoinJoin을 거친 UTXO의 수락을 거부하거나 회원님의 계정이 정지되거나 자금이 동결될 수 있는 위험과 함께 회원님에게 소명을 요구할 수 있습니다. 경우에 따라 플랫폼이 주 당국에 회원님의 행동을 신고할 수도 있습니다.
  
reviewed: true
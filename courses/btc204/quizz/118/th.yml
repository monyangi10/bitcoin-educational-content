question: ในบรรดาคำตอบต่อไปนี้ ข้อใดไม่แสดงถึงความเสี่ยงเมื่อส่งบิตคอยน์ที่ผ่านการทำ coinjoin ไปยังแพลตฟอร์มที่มีการควบคุม?
answer: แพลตฟอร์มอาจเพิ่มค่าธรรมเนียมการทำธุรกรรม
wrong_answers:
  - แพลตฟอร์มอาจระงับเงินทุน
  - แพลตฟอร์มอาจบล็อกบัญชีของผู้ใช้
  - แพลตฟอร์มอาจรายงานพฤติกรรมที่น่าสงสัยต่อเจ้าหน้าที่
explanation: |
  หากคุณส่งเหรียญของคุณไปยังแพลตฟอร์มแลกเปลี่ยนที่มีการควบคุม แต่เหรียญนั้นเพิ่งผ่านการทำ coinjoin มา เครื่องมือวิเคราะห์เชนของแพลตฟอร์มจะตรวจพบข้อเท็จจริงนี้ แพลตฟอร์มอาจปฏิเสธที่จะรับ UTXO ของคุณที่ผ่านการทำ coinjoin หรือแม้กระทั่งเรียกร้องคำอธิบายจากคุณ โดยมีความเสี่ยงที่บัญชีของคุณจะถูกระงับหรือเงินของคุณจะถูกแช่แข็ง ในบางกรณี แพลตฟอร์มอาจรายงานพฤติกรรมของคุณต่อเจ้าหน้าที่รัฐด้วย
reviewed: true
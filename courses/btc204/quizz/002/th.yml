question: การดำเนินการของธุรกรรม Bitcoin บน UTXOs ที่ป้อนคืออะไร?
answer: มันบริโภคพวกเขาเพื่อให้ได้ผลลัพธ์
wrong_answers:
  - มันเก็บถาวรไว้ในบล็อกเชนเพื่อใช้อ้างอิงในอนาคต
  - มันเข้ารหัสเพื่อความปลอดภัยของการทำธุรกรรม
  - มันทำซ้ำเพื่อสร้าง UTXOs ใหม่
explanation: |
  อินพุต UTXOs ในธุรกรรมจะถูกใช้เพื่อเป็นทุนให้กับเอาต์พุต มันเป็นแหล่งที่มาของเงินในทางหนึ่ง
reviewed: true
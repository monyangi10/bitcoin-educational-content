question: Какво е действието на Bitcoin транзакция върху входящите UTXOs?
answer: Тя ги консумира, за да генерира изходящите.
wrong_answers:
  - Тя ги архивира в блокчейна за бъдеща справка.
  - Тя ги криптира, за да защити транзакцията.
  - Тя ги дублира, за да създаде нови UTXOs.
explanation: |
  Входящите UTXO в транзакцията се изразходват за финансиране на изходящите. В известен смисъл това е източникът на парите.
reviewed: true

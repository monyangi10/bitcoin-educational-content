question: Какво е действието на транзакция Bitcoin върху входните UTXOs?
answer: Той ги консумира, за да задоволи изходите.
wrong_answers:
  - Той ги архивира в блокчейна за бъдеща справка.
  - Той ги криптира, за да защити транзакцията.
  - Той ги дублира, за да създаде нови UTXOs.
explanation: |
  Входните UTXO в транзакцията се изразходват за финансиране на изходите. В известен смисъл това е източникът на парите.
reviewed: true
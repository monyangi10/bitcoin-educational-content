question: ज़ीरोलिंक प्रोटोकॉल में पोस्ट-मिक्स Wallet की क्या भूमिका है?
answer: मिक्सिंग के बाद UTXOs को स्टोर करने के लिए।
wrong_answers:
  - मिक्सिंग से पहले UTXOs को स्टोर करने के लिए।
  - बदलाव UTXOs को स्टोर करने के लिए।
  - कंसोलिडेशन UTXOs को स्टोर करने के लिए।
explanation: |
पोस्ट-मिक्स Wallet उन सिक्कों के लिए आरक्षित है जिन्हें मिलाया गया है।
reviewed: false
question: Каква е ролята на портфейла след смесването в протокола Zerolink?
answer: да съхранява UTXO след смесване.
wrong_answers:
  - да съхранява UTXO преди смесване.
  - да съхранява промените в UTXOs.
  - да съхранява UTXO за консолидация.
explanation: |
  След смесването портфейлът е запазен за монети, които са били смесени.
  
reviewed: true

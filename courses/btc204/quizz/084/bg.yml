question: Каква е ролята на wallet след смесването в протокола Zerolink?
answer: За съхраняване на UTXOs след смесване.
wrong_answers:
  - За да съхранявате UTXOs преди смесване.
  - За съхраняване на промените в UTXOs.
  - За съхраняване на UTXO за консолидация.
explanation: |
  След смесването wallet е запазен за монети, които са били смесени.
  
reviewed: true
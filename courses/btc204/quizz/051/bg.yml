question: Какъв е недостатъкът на "Тихите плащания" в сравнение с BIP47?
answer: Получателят трябва да сканира почти целия блокчейн.
wrong_answers:
  - Те осигуряват по-високи такси за трансакции за изпращача.
  - Те ограничават броя на възможните трансакции.
  - Те са по-малко анонимни.
explanation: |
  В замяна на отказа от транзакцията за уведомяване получателят трябва да сканира всички транзакции Bitcoin, които отговарят на стандарта, в опит да открие адресираните до него плащания.
reviewed: true
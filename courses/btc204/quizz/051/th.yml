question: ข้อเสียของ Silent Payments เมื่อเทียบกับ BIP47 คืออะไร?
answer: ผู้รับต้องสแกนบล็อกเชนเกือบทั้งหมด
wrong_answers:
  - พวกเขา generate ค่าธรรมเนียมการทำธุรกรรมที่สูงขึ้นสำหรับผู้ส่ง
  - พวกเขาจำกัดจำนวนธุรกรรมที่เป็นไปได้
  - พวกเขามีความไม่เปิดเผยตัวตนน้อยลง
explanation: |
  เพื่อแลกกับการละเว้นการแจ้งเตือนธุรกรรม ผู้รับต้องสแกนธุรกรรม Bitcoin ทั้งหมดที่เป็นไปตามมาตรฐานเพื่อพยายามค้นหาการชำระเงินที่ส่งถึงพวกเขา
reviewed: true
question: साइलेंट पेमेंट्स की BIP47 के मुकाबले क्या कमी है?  

साइलेंट पेमेंट्स और BIP47 दोनों ही प्राइवेसी-फोकस्ड बिटकॉइन ट्रांजैक्शन टेक्नोलॉजी हैं, लेकिन साइलेंट पेमेंट्स की कुछ सीमाएँ हैं:  

1. **रिसीवर की एक्टिविटी ज़रूरी**: BIP47 में सेंडर बिना रिसीवर के एक्शन के पेमेंट भेज सकता है, लेकिन साइलेंट पेमेंट्स के लिए रिसीवर को पहले से एक स्पेशल "साइलेंट पेमेंट एड्रेस" जेनरेट करना होता है।  

2. **कम यूज़र-फ्रेंडली**: BIP47 में एक बार पेमेंट कोड शेयर करने के बाद मल्टीपल ट्रांजैक्शन हो सकती हैं, जबकि साइलेंट पेमेंट्स के लिए हर ट्रांजैक्शन के लिए नया एड्रेस चाहिए।  

3. **कम्पैटिबिलिटी**: BIP47 पुराने वॉलेट्स के साथ काम करता है, लेकिन साइलेंट पेमेंट्स को नए सॉफ्टवेयर अपडेट की ज़रूरत होती है।  

4. **प्राइवेसी लेवल**: BIP47 में सेंडर और रिसीवर के बीच एक बार की इंटरैक्शन होती है, जबकि साइलेंट पेमेंट्स में हर ट्रांजैक्शन अलग होता है, लेकिन कुछ केस में BIP47 ज़्यादा प्राइवेसी दे सकता है।  

अगर आपको और डिटेल्स चाहिए, तो बताइए!

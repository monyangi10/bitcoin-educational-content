question: อะไรที่ทำให้ UTXOs บน Bitcoin ปลอดภัย?
answer: ผ่านสคริปต์ที่กำหนดเงื่อนไขการใช้จ่าย
wrong_answers:
  - ผ่านการตรวจสอบเป็นระยะโดยนักขุด
  - ผ่านฐานข้อมูลแบบรวมศูนย์
  - ผ่านการยืนยันตัวตนของผู้ใช้
explanation: |
  เอาต์พุตของธุรกรรม Bitcoin คือ UTXOs ซึ่งได้รับการรักษาความปลอดภัยด้วยสคริปต์ สคริปต์นี้ต้องการให้เงื่อนไขการใช้จ่ายที่กำหนดไว้ล่วงหน้าถูกปฏิบัติตามเพื่อที่จะใช้จ่าย UTXO
reviewed: true
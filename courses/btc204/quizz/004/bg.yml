question: Какво гарантира UTXO в Bitcoin?
answer: Чрез скриптове, които определят условията за изразходване на средства.
wrong_answers:
  - Чрез периодична проверка от миньори.
  - Чрез централизирана база данни.
  - Чрез проверка на самоличността на потребителя.
explanation: |
  Неизразходващите изходящи транзакции в Bitcoin са UTXO, които са защитени със скрипт. Този скрипт изисква да бъдат изпълнени предварително определени условия за изразходване, за да се изразходва UTXO.
reviewed: true

question: Wat beveiligt de UTXO's op Bitcoin?
answer: Door middel van scripts die de bestedingsvoorwaarden definiëren.
wrong_answers:
  - Door periodieke verificatie door miners.
  - Via een gecentraliseerde database.
  - Door identiteitsverificatie van de gebruiker.
explanation: |
  De output van een Bitcoin transactie zijn UTXO's die beveiligd zijn met een script. Dit script vereist dat aan vooraf gedefinieerde bestedingsvoorwaarden wordt voldaan om de UTXO te kunnen uitgeven.
reviewed: false

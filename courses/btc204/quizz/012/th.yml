question: วิธีป้องกัน double-spending บน Bitcoin คืออะไร?
answer: ผ่านการกระจายเสียงสาธารณะของธุรกรรมระบบทั้งหมด
wrong_answers:
  - โดยการยืนยันตัวตนของผู้ใช้ก่อนการทำธุรกรรมแต่ละครั้ง
  - โดยการตรวจสอบธุรกรรมโดยผู้ตรวจสอบบัญชีเป็นระยะ ๆ
  - โดยการจำกัดจำนวนธุรกรรมต่อผู้ใช้
explanation: |
  ในการยืนยันการไม่มีธุรกรรมและเพื่อหลีกเลี่ยง double-spending จำเป็นที่ผู้ใช้ทุกคนต้องทราบถึงธุรกรรมที่ผ่านมาทั้งหมด
reviewed: true
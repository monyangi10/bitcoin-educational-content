question: ビットコインで二重支払いはどのように防がれていますか？
answer: 全てのシステム・トランザクションを公開することによって
wrong_answers:
  - 各トランザクションの前にユーザーの身元を確認することによって
  - 定期的に監査人によるトランザクションのレビューを行うことによって
  - ユーザーごとのトランザクション数を制限することによって。
explanation: |
  二重支払いを防ぐため、トランザクションが存在しないことを確認するには、すべてのユーザーが過去のトランザクションすべてを把握している必要があります。

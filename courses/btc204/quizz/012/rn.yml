question: Ni gute gukoresha amahera kabiri ku Bitcoin bibujijwe?
answer: Biciye mu gutangaza abantu bose ibikorwa vyose vy’ubuhinga.
wrong_answers:
  - Mu kugenzura akaranga k’abakoresha imbere y’ugucuruza kwose.
  - Mu gusubiramwo kenshi ibikorwa vy’ubudandaji n’abagenzuzi.
  - Mu kugabanya igitigiri c’ibikorwa ku muntu wese akoresha.
explanation: |
  Kugira ngo umuntu wemeze ko ata n’imwe yagurishije, gutyo rero yirinde gukoresha amahera incuro zibiri, birakenewe ko uwukoresha wese amenya ibikorwa vyose vya kera.

question: Как double-spending се предотвратява в Bitcoin?
answer: Чрез публично излъчване на всички системни транзакции.
wrong_answers:
  - Чрез проверка на самоличността на потребителите преди всяка транзакция.
  - Чрез периодичен преглед на транзакциите от одитори.
  - Чрез ограничаване на броя на транзакциите за един потребител.
explanation: |
  За да се потвърди липсата на транзакция и по този начин да се избегне double-spending, е необходимо всеки потребител да е наясно с всички минали транзакции.
reviewed: true
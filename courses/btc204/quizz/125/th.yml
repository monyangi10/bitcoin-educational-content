question: เป้าหมายหลักของการทำ coinswap คืออะไร?
answer: เพื่อโอนความเป็นเจ้าของบิตคอยน์อย่างลับๆ
wrong_answers:
  - เพิ่มความเร็วในการทำธุรกรรม
  - ผสมบิตคอยน์
  - แลกเปลี่ยนเหรียญทางเลือกเป็นบิตคอยน์อย่างลับๆ
explanation: |
  Coinswap ใช้สัญญาอัจฉริยะเพื่ออำนวยความสะดวกในการโอนกรรมสิทธิ์ของบิตคอยน์ระหว่างผู้ใช้สองคน โดยไม่จำเป็นต้องมีความไว้วางใจและทำให้การโอนนี้ไม่ปรากฏบนบล็อกเชน
reviewed: true
question: सिक्के की अदला-बदली (coinswap) का मुख्य मकसद क्या है?
answer: बिटकॉइन के Ownership को चुपके से ट्रांसफर करना
wrong_answers:
  - ट्रांजैक्शन की स्पीड बढ़ाओ
  - बिटकॉइन मिलाओ
  - चुपके से Exchange और Altcoin, Bitcoin के लिए
explanation: |
कॉइनस्वैप स्मार्ट कॉन्ट्रैक्ट्स का इस्तेमाल करके दो यूजर्स के बीच Bitcoin से Ownership की ट्रांसफर को संभव बनाता है, बिना किसी भरोसे की जरूरत के और बिना इस ट्रांसफर को Blockchain पर साफ तौर पर दिखाए।

question: What is the main goal of a coinswap?

answer: To secretly transfer the ownership of bitcoins

wrong_answers:
  - Increase the speed of transactions
  - Mix bitcoins
  - Secretly exchange an altcoin for bitcoin

explanation: |
  Coinswap utilizes smart contracts to facilitate the transfer of bitcoin ownership between two users, eliminating the need for trust and ensuring that this transfer remains invisible on the blockchain.

reviewed: true

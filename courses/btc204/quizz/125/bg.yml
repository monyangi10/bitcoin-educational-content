question: Каква е основната цел на размяната на монети?
answer: Тайно прехвърляне на собствеността върху биткойни
wrong_answers:
  - Увеличаване на скоростта на транзакциите
  - Смесете биткойни
  - Тайно обменете алткойн за биткойн
explanation: |
  Coinswap използва умни договори, за да улесни прехвърлянето на собствеността върху биткойни между двама потребители, като премахва необходимостта от доверие и гарантира, че това прехвърляне остава невидимо в блокчейна.
  
reviewed: true

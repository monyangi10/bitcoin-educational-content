question: Ако наблюдаваме транзакция с 1 UTXO на входа и 43 UTXO на изхода, какъв модел можем да разпознаем?
answer: Пакетиран разход
wrong_answers:
  - Консолидация
  - Опростено плащане
  - Сделка в сътрудничество
explanation: |
  Тълкуването на този модел е, че става въпрос за пакетно харчене. Тази структура дава възможност на организации, като например платформи за обмен, да спестят от такси, като консолидират разходите си в една транзакция.
reviewed: true
question: Als we een transactie observeren met 1 UTXO in de invoer en 43 UTXO's in de uitvoer, welk patroon kunnen we dan herkennen?
answer: Een gebatchte uitgave
wrong_answers:
  - Een consolidatie
  - Een vereenvoudigde betaling
  - Een gezamenlijke transactie
explanation: |
  De interpretatie van dit patroon is dat we te maken hebben met gebundelde uitgaven. Deze structuur stelt entiteiten zoals Exchange platforms in staat om te besparen op kosten door hun uitgaven te groeperen in een enkele transactie.
reviewed: false
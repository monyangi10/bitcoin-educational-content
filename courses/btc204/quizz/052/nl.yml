question: Welk type script wordt uitsluitend gebruikt door Silent Payments?
answer: P2TR
wrong_answers:
  - P2WPKH
  - P2SP
  - P2WSH
explanation: |
  Om de implementatie van dit protocol te vergemakkelijken en de anonimiteit van de gebruikers te verbeteren, vertrouwt Silent Payments uitsluitend op P2TR (Pay to Taproot) scripts.
  
reviewed: false
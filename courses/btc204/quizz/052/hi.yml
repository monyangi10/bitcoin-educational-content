question: साइलेंट पेमेंट्स द्वारा एक्सक्लूसिवली किस तरह की स्क्रिप्ट का इस्तेमाल किया जाता है?
answer: जीडब्ल्यू-0
wrong_answers:
  - जीडब्ल्यू-1
  - पी2एसपी
  - P2WSH को हिंदी में "पे टू डब्ल्यू एस एच" (Pay To Witness Script Hash) कहा जाता है। यह बिटकॉइन की एक स्क्रिप्टिंग सिस्टम है जो सिग्नेचर डेटा को ब्लॉकचेन से अलग करके स्केलेबिलिटी बढ़ाता है।
explanation: |
इस प्रोटोकॉल को लागू करने में आसानी के लिए और इसके उपयोगकर्ताओं की गुमनामी को बेहतर बनाने के लिए, साइलेंट पेमेंट्स पूरी तरह से P2TR (पे टू Taproot) स्क्रिप्ट्स पर निर्भर करते हैं।
reviewed: false
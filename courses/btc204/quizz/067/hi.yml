question: कंसोलिडेशन के सभी इनपुट्स को जोड़ने के लिए कौन सा ह्यूरिस्टिक इस्तेमाल किया जा सकता है?
answer: सीआईओएच (CIOH)
wrong_answers:
  - जीडब्ल्यू-0 दोबारा इस्तेमाल।
  - सबसे बड़ा आउटपुट।
  - गोल भुगतान।
explanation: |
एक बाहरी पर्यवेक्षक CIOH का उपयोग यह अनुमान लगाने के लिए कर सकता है कि एक समेकन के सभी इनपुट एक ही इकाई के हैं।
reviewed: false
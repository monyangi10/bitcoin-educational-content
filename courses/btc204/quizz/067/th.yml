question: ฮิวริสติกใดที่สามารถใช้เชื่อมโยงข้อมูลนำเข้าทั้งหมดของการรวมบัญชี?
answer: The CIOH.
wrong_answers:
  - การใช้ซ้ำ Address
  - เอาต์พุตที่ใหญ่ที่สุด
  - การชำระเงินแบบปัดเศษ
explanation: |
  ผู้สังเกตการณ์ภายนอกสามารถใช้ CIOH เพื่อสมมติฐานว่าข้อมูลทั้งหมดของการรวมเป็นของหน่วยงานเดียวกัน
reviewed: true
question: Welke heuristiek kan worden gebruikt om alle inputs van een consolidatie te koppelen?
answer: Het CIOH.
wrong_answers:
  - Adreshergebruik.
  - De grootste output.
  - Ronde betaling.
explanation: |
  Een externe waarnemer kan de CIOH toepassen om te veronderstellen dat alle inputs van een consolidatie tot dezelfde entiteit behoren.
  
reviewed: false

question: Коя евристика може да се използва за свързване на всички входове на консолидацията?
answer: CIOH.
wrong_answers:
  - Повторна употреба на Address.
  - Най-голямата продукция.
  - Кръгло плащане.
explanation: |
  Външен наблюдател може да приложи CIOH, за да предположи, че всички входове на консолидацията принадлежат на една и съща единица.
  
reviewed: true
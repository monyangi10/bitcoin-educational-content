question: ขั้นตอนหลัก 3 ขั้นตอนของการวิเคราะห์บล็อกเชนคืออะไร?
answer: การสังเกตบล็อกเชน การระบุลักษณะ และการสรุปสมมติฐาน
wrong_answers:
  - การเก็บรวบรวมข้อมูล, การจัดเก็บอย่างปลอดภัย, และการรายงาน.
  - การระบุตัวตนผู้ใช้, การควบคุมการแลกเปลี่ยน, และการป้องกันการฉ้อโกง.
  - การเก็บรวบรวมข้อมูล, การสุ่มเลือก, และการประณาม.
explanation: |
  การวิเคราะห์ Blockchain เริ่มต้นด้วยการเข้าถึงข้อมูลบล็อกเชน Bitcoin จากนั้นพยายามระบุลักษณะในข้อมูลนี้ และสุดท้ายทำการตีความที่เป็นไปได้
reviewed: true
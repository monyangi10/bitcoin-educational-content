question: Кои са трите основни стъпки на блокчейн анализа?
answer: Наблюдение на блокчейн, идентифициране на характеристики и извеждане на хипотези.
wrong_answers:
  - Събиране на данни, сигурно съхранение и отчитане.
  - Идентифициране на потребителите, регулиране на обмена и защита от измами.
  - Събиране на данни, случаен подбор и доказване.
explanation: |
  Анализът на Blockchain първо включва достъп до данните от блокчейн Bitcoin, след това опит за идентифициране на характеристиките в тези данни и накрая - правдоподобни интерпретации.
reviewed: true
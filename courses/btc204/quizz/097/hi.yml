question: एक बड़ा anonset UTXO की प्राइवेसी के बारे में क्या संकेत देता है?
answer: बेहतर गोपनीयता।
wrong_answers:
  - प्राइवेसी कम हो गई।
  - बेहतर पता लगाने की क्षमता।
  - तेज़ CoinJoin लेन-देन की गति।
explanation: |
एक बड़ा अनॉनसेट उच्च स्तर की गुमनामी दिखाता है, क्योंकि एक खास UTXO को इस एक जैसे समूह में पहचानना मुश्किल हो जाता है।
reviewed: false
question: ขนาดของ anonset ที่ใหญ่บ่งบอกถึงความเป็นส่วนตัวที่สูงขึ้นของ UTXO
answer: ความเป็นส่วนตัวที่ดีขึ้น
wrong_answers:
  - ความเป็นส่วนตัวที่ลดลง
  - การตรวจสอบย้อนกลับที่ดีขึ้น
  - ความเร็วในการทำธุรกรรม coinjoin ที่เร็วขึ้น
explanation: |
  กลุ่มนิรนามขนาดใหญ่บ่งบอกถึงระดับความเป็นนิรนามที่สูง เนื่องจากยากที่จะระบุ UTXO เฉพาะภายในกลุ่มที่มีลักษณะเหมือนกัน
reviewed: true
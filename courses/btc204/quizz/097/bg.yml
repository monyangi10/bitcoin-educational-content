question: Какво показва големият брой анонси за поверителността на UTXO?
answer: Подобрена поверителност.
wrong_answers:
  - Намалена поверителност.
  - Подобрена проследимост.
  - По-бърза скорост на транзакциите за съвместно свързване.
explanation: |
  Големият брой анонси показва високо ниво на анонимност, тъй като става трудно да се различи конкретен UTXO в хомогенното множество.
  
reviewed: true
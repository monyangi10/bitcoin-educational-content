question: เป้าหมายหลักของ BIP47 คืออะไร?
answer: เพื่อมีตัวระบุที่ไม่ซ้ำกันในการรับ BTC โดยไม่ต้องใช้ที่อยู่ซ้ำ
wrong_answers:
  - เพิ่มขนาดของบล็อกเพื่อให้การทำธุรกรรมเร็วขึ้น
  - อนุญาตให้ทำธุรกรรมโดยไม่เสียค่าธรรมเนียมบนเครือข่าย Bitcoin
  - ทำธุรกรรมให้ไม่ระบุตัวตนอย่างสมบูรณ์บน Bitcoin
explanation: |
  เป้าหมายของ BIP47 คือการให้ตัวระบุที่ไม่ซ้ำกันซึ่งช่วยให้สามารถรับบิตคอยน์ได้หลายครั้งและจากหลายคน แต่โดยไม่ต้องใช้ที่อยู่ซ้ำ เนื่องจากนี่เป็นการปฏิบัติที่ไม่ดีมากสำหรับความเป็นส่วนตัวของผู้ใช้
reviewed: true
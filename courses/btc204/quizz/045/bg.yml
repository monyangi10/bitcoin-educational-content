question: Каква е основната цел на BIP47?
answer: Да имате уникален идентификатор за получаване на BTC, без да използвате повторно адреси.
wrong_answers:
  - Увеличете размера на блоковете за по-бързи транзакции.
  - Разрешаване на трансакции без такси в мрежата Bitcoin.
  - Направете транзакциите напълно анонимни в Bitcoin.
explanation: |
  Целта на BIP47 е да се осигури уникален идентификатор, който да позволява получаването на биткойни многократно и от много хора, но без повторно използване на адреси, тъй като това е много лоша практика за поверителността на потребителите.
reviewed: true
question: BIP47の主な目標は何ですか？

answer: アドレスの再利用なしにBTCを受け取るためのユニークな識別子を持つこと

wrong_answers:
  - トランザクションを高速化するためにブロックのサイズを増やすこと
  - ビットコインネットワーク上で手数料なしのトランザクションを可能にすること
  - ビットコイン上でのトランザクションを完全に匿名にすること

explanation: |
  BIP47の目標は、ビットコインを複数回、複数の人から受け取ることを可能にするユニークな識別子を提供することですが、これはユーザーのプライバシーにとって非常に悪い習慣であるアドレスの再利用なしに行います。


question: BIP47 का मुख्य लक्ष्य क्या है?
answer: बीटीसी प्राप्त करने के लिए एक यूनिक आईडेंटिफायर रखना ताकि पते को दोबारा इस्तेमाल न करना पड़े।
wrong_answers:
  - ट्रांजैक्शन को तेज़ करने के लिए ब्लॉक्स का साइज़ बढ़ा दो।
  - Bitcoin नेटवर्क पर बिना फी वाले लेन-देन की अनुमति दें।
  - Bitcoin पर लेन-देन को पूरी तरह से गुमनाम बना दो।
explanation: |
BIP47 का लक्ष्य एक यूनिक आइडेंटिफायर प्रदान करना है जो बिटकॉइन को कई बार और कई लोगों से प्राप्त करने की अनुमति देता है, लेकिन बिना एड्रेस को दोबारा इस्तेमाल किए, क्योंकि यूजर की प्राइवेसी के लिए यह बहुत ही खराब प्रैक्टिस है।

question: BIP47의 주요 목표는 무엇인가요?
answer: 주소를 재사용하지 않고 BTC를 받을 수 있는 고유 식별자를 갖기 위해서입니다.
wrong_answers:
  - 더 빠른 트랜잭션을 위해 블록 크기를 늘립니다.
  - Bitcoin 네트워크에서 수수료 없는 거래를 허용합니다.
  - Bitcoin에서 거래를 완전히 익명으로 처리하세요.
explanation: |
  BIP47의 목표는 여러 번 여러 사람에게서 비트코인을 받을 수 있는 고유 식별자를 제공하는 것이지만, 이는 사용자 개인정보 보호에 매우 나쁜 관행이므로 주소를 재사용하지 않는 것입니다.
reviewed: true
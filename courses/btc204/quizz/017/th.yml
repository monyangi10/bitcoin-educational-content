question: คำศัพท์สำหรับข้อมูลที่เชื่อมโยงกลุ่มกิจกรรม on-chain กับรูปแบบของตัวตนจริงคืออะไร?
answer: จุดเริ่มต้น
wrong_answers:
  - คีย์การเชื่อมโยง
  - ลิงก์ลายนิ้วมือ
  - เครื่องหมายการวิเคราะห์
explanation: |
  พฤติกรรมและข้อมูลที่อาจเชื่อมโยงตัวตนจริงกับกิจกรรม on-chain เรียกว่า จุดเริ่มต้น
reviewed: true
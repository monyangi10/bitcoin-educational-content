question: Какъв е терминът за информация, която свързва съвкупност от дейности on-chain с форма на реална идентичност?
answer: Входна точка.
wrong_answers:
  - Ключ за свързване.
  - Връзка с пръстови отпечатъци.
  - Маркер за анализ.
explanation: |
  Поведението и информацията, които могат да свържат реалната самоличност с дейността на on-chain, се наричат входни точки.
reviewed: true
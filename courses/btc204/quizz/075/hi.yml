question: CoinJoin ट्रांजैक्शन का मुख्य मकसद क्या है?
answer: एक सिक्के का इतिहास तोड़ने के लिए।
wrong_answers:
  - लेन-देन शुल्क कम करने के लिए।
  - बिटकॉइन को पता न चलने देने के लिए।
  - पुष्टि की गति बढ़ाने के लिए।
explanation: |
CoinJoin लेनदेन का मकसद सिक्के के इतिहास को तोड़ना है। यह तकनीक स्थायी गुमनामी नहीं देती और न ही बिटकॉइन की ट्रैकिंग को पूरी तरह रोकती है, जैसा कि कोई सोच सकता है। CoinJoin का उद्देश्य सिर्फ उस बिंदु पर इतिहास को तोड़ना है जहां CoinJoin लेनदेन किया जाता है।
reviewed: false
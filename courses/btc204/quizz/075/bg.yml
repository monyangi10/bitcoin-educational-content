question: Каква е основната цел на транзакцията за обединяване на монети?
answer: Разбиване на историята на една монета.
wrong_answers:
  - Намаляване на таксите за трансакции.
  - Да направите биткойните неоткриваеми.
  - За да увеличите скоростта на потвърждаване.
explanation: |
  Целта на транзакцията за присъединяване на монети е да се прекъсне историята на дадена монета. Тази техника не осигурява постоянна анонимност, нито пък окончателно блокира проследяването на биткойни, противно на това, което може да се мисли. Coinjoin има за цел само да прекъсне историята в момента, в който се извършва транзакцията coinjoin.
  
reviewed: true
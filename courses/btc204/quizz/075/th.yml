question: เป้าหมายหลักของธุรกรรม CoinJoin คืออะไร?
answer: เพื่อทำลายประวัติศาสตร์ของเหรียญ
wrong_answers:
  - เพื่อลดค่าธรรมเนียมการทำธุรกรรม
  - เพื่อทำให้บิตคอยน์ไม่สามารถตรวจจับได้
  - เพื่อเพิ่มความเร็วในการยืนยัน
explanation: |
  เป้าหมายของการทำธุรกรรม coinjoin คือการตัดประวัติของเหรียญ เทคนิคนี้ไม่ได้ให้ความเป็นนิรนามถาวร และไม่ได้ปิดกั้นการติดตามบิตคอยน์อย่างเด็ดขาด ตรงกันข้ามกับที่บางคนอาจคิด Coinjoin มีเป้าหมายเพียงแค่ตัดประวัติในจุดที่ทำธุรกรรม coinjoin เท่านั้น
reviewed: true
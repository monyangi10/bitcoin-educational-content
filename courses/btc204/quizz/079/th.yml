question: คำว่าอะไรที่อธิบายถึงการป้องกันที่เสนอโดย coinjoin ต่อการวิเคราะห์ธุรกรรมในอนาคตของเหรียญ?
answer: กลุ่มนิรนามที่คาดหวัง
wrong_answers:
  - การตั้งค่าผู้ไม่ประสงค์ออกนามย้อนหลัง
  - ความต้านทานการตรวจสอบย้อนกลับ
  - ความเป็นส่วนตัวชั่วคราว
explanation: |
  การป้องกันการวิเคราะห์จากอดีตถึงปัจจุบันคือสิ่งที่เรียกว่าการเริ่มต้นที่ไม่ระบุชื่อในอนาคต
reviewed: true
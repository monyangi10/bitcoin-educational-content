question: CoinJoin द्वारा सिक्के के भविष्य के लेन-देन के विश्लेषण से सुरक्षा को क्या कहते हैं?
answer: संभावित गुमनामी।
wrong_answers:
  - रेट्रोस्पेक्टिव अनॉनसेट।
  - ट्रेसबिलिटी रेजिस्टेंस (पता लगाने में मुश्किल)।
  - समय संबंधी गोपनीयता।
explanation: |
अतीत से वर्तमान तक विश्लेषण से सुरक्षा को ही भविष्य में अनसेट (prospective anonset) कहा जाता है।
reviewed: false
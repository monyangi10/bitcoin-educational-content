question: Кой термин описва защитата, предлагана от coinjoin, срещу анализа на бъдещите транзакции на дадена монета?
answer: Перспективен анонс.
wrong_answers:
  - Ретроспективен анонс.
  - Устойчивост на проследяване.
  - Времева поверителност.
explanation: |
  Защитата срещу анализ от миналото към настоящето е така наречената проспективна анотация.
  
reviewed: true

question: तीसरे पार्टी नोड का इस्तेमाल करने से क्या जोखिम हो सकते हैं?
answer: सेंसरशिप और गतिविधियों की निगरानी।
wrong_answers:
  - बिटकॉइन का नुकसान।
  - लेन-देन शुल्क में वृद्धि।
  - बिटकॉइन की चोरी और उसका पता लगाना।
explanation: |
अगर तुम किसी ऐसे नोड का इस्तेमाल करते हो जो तुम्हारा नहीं है, तो तुम्हारे ट्रांजैक्शन ब्रॉडकास्ट ब्लॉक होने और ऑपरेटर द्वारा मॉनिटर किए जाने का खतरा होता है।

question: ความเสี่ยงที่เกี่ยวข้องกับการใช้โหนดของบุคคลที่สามคืออะไร?
answer: การเซ็นเซอร์และการตรวจสอบกิจกรรม
wrong_answers:
  - การสูญเสียบิตคอยน์
  - เพิ่มค่าธรรมเนียมการทำธุรกรรม
  - การขโมยบิตคอยน์และการติดตาม
explanation: |
  หากคุณใช้โหนดที่ไม่ใช่ของคุณเอง คุณมีความเสี่ยงที่จะถูกบล็อกการกระจายธุรกรรมและถูกตรวจสอบโดยผู้ดำเนินการ
reviewed: true
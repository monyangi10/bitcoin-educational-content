question: Какви рискове са свързани с използването на възел на трета страна?
answer: Цензура и наблюдение на дейностите.
wrong_answers:
  - Загуба на биткойни.
  - Увеличаване на таксите за транзакции.
  - Кражба на биткойни и проследяване.
explanation: |
  Ако използвате възел, който не ви принадлежи, рискувате излъчването на транзакциите ви да бъде блокирано и наблюдавано от оператора.
  
reviewed: true
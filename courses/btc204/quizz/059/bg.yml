question: Приблизително на какво ниво е общият процент на повторно използване на адреси в Bitcoin?
answer: Около 50%
wrong_answers:
  - Около 5%
  - За 15%
  - Около 40%
explanation: |
  От началото на 2010 г. общият процент на повторна употреба на адреси в Bitcoin се колебае около 50 %.
reviewed: true
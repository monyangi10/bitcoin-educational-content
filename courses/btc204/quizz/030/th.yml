question: เป้าหมายของการใช้วิธีการอนุมานธุรกรรมภายในคืออะไร?
answer: เพื่อระบุการแลกเปลี่ยน
wrong_answers:
  - เพื่อระบุธุรกรรมที่เป็นการฉ้อโกงในเวลาจริง
  - เพื่อระบุรูปแบบการทำธุรกรรม
  - เพื่อระบุคลัสเตอร์ที่เป็นของเอนทิตีเดียวกัน
explanation: |
  ฮิวริสติกภายในช่วยให้เราสามารถระบุการแลกเปลี่ยนโดยมีเป้าหมายในการสังเกตผู้ใช้ในการทำธุรกรรมครั้งต่อไป
reviewed: true
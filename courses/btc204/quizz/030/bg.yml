question: Каква е целта на евристиката на вътрешните транзакции?
answer: Идентифициране на обмена.
wrong_answers:
  - Идентифициране на измамни транзакции в реално време.
  - Идентифициране на модели на транзакции.
  - Идентифициране на клъстер, принадлежащ на една и съща единица.
explanation: |
  Вътрешната евристика ни позволява да идентифицираме обмена с цел да наблюдаваме потребителя при последващи транзакции.
reviewed: true
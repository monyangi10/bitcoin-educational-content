question: Stonewall x2 işlemi nedir?
answer: Mini-CoinJoin şeklinde bir ödeme işlemi
wrong_answers:
  - Bir mini-CoinJoin'i taklit eden ancak öyle olmayan bir işlem
  - Basit bir ödeme işlemi
  - Alıcının girdilere dahil olduğu bir işlem
explanation: |
  Stonewall x2, bir harcama sırasında kullanıcı gizliliğini artırmayı amaçlayan belirli bir Bitcoin işlem biçimidir, ancak bu kez harcamaya dahil olmayan üçüncü bir tarafla işbirliği yaparak. Bu yöntem, iki katılımcı arasında mini bir CoinJoin gibi işlev görürken aynı zamanda üçüncü bir kişiye ödeme yapar.
question: ธุรกรรม Stonewall x2 คืออะไร?
answer: การทำธุรกรรมการชำระเงินในรูปแบบของมินิ-คอยน์จอยน์
wrong_answers:
  - ธุรกรรมที่เลียนแบบมินิ-คอยน์จอยน์โดยไม่ใช่ธุรกรรมคอยน์จอยน์
  - ธุรกรรมการชำระเงินที่ง่าย
  - ธุรกรรมที่เกี่ยวข้องกับผู้รับในอินพุต
explanation: |
  Stonewall x2 เป็นรูปแบบเฉพาะของธุรกรรม Bitcoin ที่ออกแบบมาเพื่อเพิ่มความเป็นส่วนตัวของผู้ใช้ในระหว่างการใช้จ่าย โดยการร่วมมือกับบุคคลที่สามที่ไม่เกี่ยวข้องกับธุรกรรม วิธีนี้ทำงานเหมือนกับการทำ mini-coinjoin ระหว่างผู้เข้าร่วมสองคน ในขณะเดียวกันก็ทำการชำระเงินให้กับบุคคลที่สาม
reviewed: true
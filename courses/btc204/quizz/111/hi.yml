question: "Stonewall x2 transaction" क्या होता है?
answer: एक भुगतान लेन-देन जो मिनी-जीडब्ल्यू-0 के रूप में है
wrong_answers:
  - एक लेन-देन जो एक मिनी-जीडब्ल्यू-1 की नकल करता है, लेकिन असल में वह होता नहीं
  - एक साधा भुगतान लेनदेन
  - एक लेन-देन जिसमें प्राप्तकर्ता इनपुट्स में शामिल होता है
explanation: |
  स्टोनवॉल x2 एक खास तरह का Bitcoin ट्रांजैक्शन है जिसका मकसद खर्च के दौरान यूजर की प्राइवेसी बढ़ाना है, लेकिन इस बार खर्च में शामिल न होने वाले तीसरे पक्ष के साथ मिलकर। यह तरीका दो प्रतिभागियों के बीच एक मिनी-CoinJoin की तरह काम करता है, साथ ही साथ किसी तीसरे व्यक्ति को भुगतान भी करता है।
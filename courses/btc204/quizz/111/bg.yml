question: Какво представлява транзакцията Stonewall x2?
answer: Платежна транзакция под формата на присъединяване на мини-монети
wrong_answers:
  - Транзакция, която имитира мини-coin-join, без да е такъв
  - Обикновена платежна операция
  - Транзакция, при която получателят участва във входящите данни
explanation: |
  Stonewall x2 е специфична форма на транзакция Bitcoin, предназначена да подобри поверителността на потребителя по време на харчене, постигната чрез сътрудничество с трета страна, която не участва в транзакцията. Този метод функционира като минимонетно обединение между двама участници, като едновременно с това се извършва плащане към трето лице.
reviewed: true
question: What is a Stonewall x2 transaction?
answer: A payment transaction in the form of a mini-coinjoin
wrong_answers:
  - A transaction that mimics a mini-coinjoin without being one
  - A simple payment transaction
  - A transaction that involves the recipient in the inputs
explanation: |
  Stonewall x2 is a specific form of Bitcoin transaction designed to enhance user privacy during a spend, achieved by collaborating with a third party not involved in the transaction. This method functions like a mini-coinjoin between two participants, while simultaneously making a payment to a third person.
reviewed: true

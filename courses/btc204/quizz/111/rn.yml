question: Igikoresho ca Stonewall x2 ni iki?
answer: Igikoresho co kwishura mu buryo bwa mini-CoinJoin.
wrong_answers:
  - Igurisha ryigana mini-CoinJoin ataco riba
  - Ugutanga amahera yoroshe
  - Ibikorwa vy'ugucuruza birimwo uwuvyakira mu vyinjijwe
explanation: |
  Stonewall x2 ni uburyo bwihariye bwo gukoresha Bitcoin bugamije kwongerera ubuzima bwite bw’abakoresha mu gihe c’ugukoresha amahera, ariko ubu mu gukorana n’uwundi muntu atagira uruhara mu gukoresha amahera. Ubwo buryo bukora nk’ivyo bita mini-CoinJoin hagati y’abantu babiri bari muri iyo nama, mu gihe nyene bariha umuntu agira gatatu.
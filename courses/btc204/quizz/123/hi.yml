question: Bitcoin नोड के लिए Tor का इस्तेमाल करने का मुख्य नुकसान क्या है?
answer: संचार की गति में कमी
wrong_answers:
  - लेन-देन शुल्क में वृद्धि
  - लेन-देन पर प्रतिबंध लगने का खतरा
  - नोड पर ग्रहण हमले का खतरा
explanation: |
टॉर पर संचार धीमा होता है। यह देरी नोड के शुरुआती लॉन्च के दौरान खास तौर पर परेशानी भरी होती है, क्योंकि आईबीडी (इनिशियल ब्लॉक डाउनलोड) में बहुत सारे संचार की जरूरत होती है।

question: Кой е основният недостатък на използването на Tor за възел Bitcoin?
answer: Намаляване на скоростта на комуникация
wrong_answers:
  - Увеличаване на таксите за транзакции
  - Риск от цензура на транзакциите
  - Риск от атака на Eclipse върху възела
explanation: |
  Комуникациите през Tor са по-бавни. Това закъснение е особено неприятно при първоначалното стартиране на възел, тъй като IBD (Initial Block Download) изисква много комуникация.
  
reviewed: true
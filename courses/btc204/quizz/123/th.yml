question: ข้อเสียหลักของการใช้ Tor สำหรับโหนด Bitcoin คืออะไร?
answer: ลดความเร็วในการสื่อสาร
wrong_answers:
  - เพิ่มค่าธรรมเนียมการทำธุรกรรม
  - ความเสี่ยงของการเซ็นเซอร์ธุรกรรม
  - ความเสี่ยงของการโจมตี Eclipse บนโหนด
explanation: |
  การสื่อสารผ่าน Tor จะช้ากว่า ความหน่วงนี้เป็นปัญหาโดยเฉพาะในช่วงเริ่มต้นของการเปิดตัวโหนด เนื่องจาก IBD (Initial Block Download) ต้องการการสื่อสารจำนวนมาก
reviewed: true
question: 다음 답변 중 KYC를 받는 사용자의 3가지 주요 위험 중 하나에 해당하지 않는 것은 무엇인가요?
answer: 구매한 비트코인의 대체 불가능성
wrong_answers:
  - 국가 감시에 노출
  - On-Chain 추적의 용이성
  - 데이터 유출 위험
explanation: |
  KYC는 정보가 저장되므로 데이터 유출의 위험이 있고, 정보가 전송되거나 압수될 수 있으므로 국가 감시에 노출될 위험이 있으며, KYC가 진입점으로 작용할 수 있으므로 추적의 위험이 있습니다. 하지만 KYC가 구매 비트코인의 대체 가능성을 낮추지는 않습니다.
reviewed: true
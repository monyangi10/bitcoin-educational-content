question: Кой от тези отговори не е един от трите основни риска за потребителя, който се подлага на KYC?
answer: Неизменяемостта на закупените биткойни
wrong_answers:
  - Излагане на държавно наблюдение
  - Улесняване на проследяването на on-chain
  - Рискът от изтичане на данни
explanation: |
  KYC крие риск от изтичане на данни, тъй като вашата информация се съхранява, риск от излагане на държавно наблюдение, тъй като вашата информация може да бъде предадена или иззета, и риск от проследяване, тъй като KYC може да служи като входна точка. KYC обаче не намалява възможността за размяна на закупените биткойни.
reviewed: true
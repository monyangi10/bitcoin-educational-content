question: ในบรรดาคำตอบเหล่านี้ ข้อใดไม่ใช่หนึ่งใน 3 ความเสี่ยงหลักสำหรับผู้ใช้ที่ต้องผ่านกระบวนการ KYC?
answer: การไม่สามารถทดแทนกันได้ของบิตคอยน์ที่ซื้อ
wrong_answers:
  - การเปิดเผยต่อการสอดส่องของรัฐ
  - การอำนวยความสะดวกในการติดตาม on-chain
  - ความเสี่ยงของการรั่วไหลของข้อมูล
explanation: |
  KYC เกี่ยวข้องกับความเสี่ยงของการรั่วไหลของข้อมูลเนื่องจากข้อมูลของคุณถูกจัดเก็บ ความเสี่ยงของการเปิดเผยต่อการเฝ้าระวังของรัฐเนื่องจากข้อมูลของคุณสามารถถูกส่งหรือยึด และความเสี่ยงของการติดตาม เนื่องจาก KYC สามารถทำหน้าที่เป็นจุดเริ่มต้น อย่างไรก็ตาม KYC ไม่ได้ลดความสามารถในการแลกเปลี่ยนของบิตคอยน์ที่ซื้อมา
reviewed: true
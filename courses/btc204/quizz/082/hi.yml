question: चौमियन CoinJoin प्रक्रिया का कौन सा चरण Tor पर पहचान बदलकर गुमनामी सुनिश्चित करता है?
answer: आउटपुट का पंजीकरण।
wrong_answers:
  - इनपुट्स का पंजीकरण।
  - लेन-देन पर हस्ताक्षर करना।
  - लेन-देन का प्रसारण।
explanation: |
कोऑर्डिनेटर को किसी विशेष आउटपुट को इनपुट से जोड़ने से रोकने के लिए, यूजर्स अपना टॉर आइडेंटिटी बदल लेते हैं, इससे पहले कि वे कोऑर्डिनेटर को अपना क्लियर-टेक्स्ट रिसीविंग एड्रेस भेजें।
reviewed: false
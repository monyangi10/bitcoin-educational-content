question: Коя стъпка от процеса CoinJoin на Chaumian включва промяна на самоличността в Tor, за да се осигури анонимност?
answer: Регистриране на резултатите.
wrong_answers:
  - Регистриране на входящите данни.
  - Подписването на сделката.
  - Излъчването на транзакцията.
explanation: |
  За да попречат на координатора да свърже конкретен изход с вход, потребителите променят самоличността си в Tor, преди да изпратят на координатора адресите си за получаване на ясен текст.
reviewed: true
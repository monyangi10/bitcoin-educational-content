question: คะแนนโบลต์ซมันน์แสดงถึงอะไรในบริบทของธุรกรรม Bitcoin?
answer: ความน่าจะเป็นแบบมีเงื่อนไขที่อินพุตเชื่อมโยงกับเอาต์พุตที่กำหนด
wrong_answers:
  - จำนวนรวมของบิตคอยน์ที่ถูกโอน
  - จำนวนอินพุตในธุรกรรม
  - เอนโทรปีที่เกี่ยวข้องกับแต่ละอินพุตหรือเอาต์พุต
explanation: |
  คะแนนโบลต์ซมันน์แสดงถึงความน่าจะเป็นตามเงื่อนไขที่อินพุตเฉพาะจะสัมพันธ์กับเอาต์พุตที่กำหนด ดังนั้นจึงเป็นการวัดเชิงปริมาณของความน่าจะเป็นตามเงื่อนไขที่ความสัมพันธ์ระหว่างอินพุตและเอาต์พุตในธุรกรรมเกิดขึ้น โดยตั้งอยู่บนอัตราส่วนของจำนวนเหตุการณ์ที่เป็นไปได้ที่ดีต่อจำนวนเหตุการณ์ที่เป็นไปได้ทั้งหมดในชุดของการตีความ
reviewed: true
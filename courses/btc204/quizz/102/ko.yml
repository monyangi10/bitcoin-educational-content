question: Bitcoin 거래의 맥락에서 볼츠만 점수는 무엇을 의미하나요?
answer: 입력이 주어진 출력에 연결될 조건부 확률입니다.
wrong_answers:
  - 전송된 비트코인의 총 금액입니다.
  - 트랜잭션의 입력 수입니다.
  - 각 입력 또는 출력과 관련된 엔트로피입니다.
explanation: |
  볼츠만 점수는 특정 입력이 주어진 출력과 연관될 수 있는 조건부 확률을 나타냅니다. 따라서 거래에서 입력과 출력 사이의 연관성이 발생할 조건부 확률을 정량적으로 측정한 것으로, 일련의 해석에서 가능한 총 발생 횟수 대비 이 이벤트의 유리한 발생 횟수의 비율에 따라 설정됩니다.
  
reviewed: true
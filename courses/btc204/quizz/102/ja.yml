question: ボルツマン・スコア（Boltzmann score）がビットコイン取引の文脈で表すものは何ですか？

answer: あるインプットが特定のアウトプットにリンクされている条件付き確率

wrong_answers:
  - 移転されたビットコインの総量
  - トランザクションにおけるインプットの数
  - 各インプットまたはアウトプットに関連するエントロピー

explanation: |
  ボルツマン・スコアは、特定のインプットが特定のアウトプットにリンクされている条件付き確率を示します。これは、トランザクションにおけるインプットとアウトプットの間の関連が発生する条件付き確率の定量的な尺度であり、解釈のセット内でこのイベントの有利な発生の数を可能な発生の総数と比較した比率に基づいて確立されます。

reviewed: false

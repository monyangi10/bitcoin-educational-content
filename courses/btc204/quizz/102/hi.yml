question: Bitcoin लेन-देन के संदर्भ में Boltzmann स्कोर क्या दर्शाता है?
answer: इनपुट का दिया गया आउटपुट से जुड़ा होने की सशर्त संभावना।
wrong_answers:
  - कुल ट्रांसफर किए गए बिटकॉइन की मात्रा।
  - एक लेन-देन में इनपुट्स की संख्या।
  - हर इनपुट या आउटपुट से जुड़ी एन्ट्रॉपी।
explanation: |
बोल्ट्ज़मैन स्कोर यह दर्शाता है कि किसी खास इनपुट का दिए गए आउटपुट से जुड़ने की सशर्त संभावना क्या है। यह एक मात्रात्मक माप है जो किसी लेन-देन में इनपुट और आउटपुट के बीच संबंध होने की सशर्त संभावना को दिखाता है। यह संभावना उन घटनाओं की संख्या के अनुपात पर आधारित होती है जहाँ यह संबंध सही ढंग से होता है, बनाम संभावित घटनाओं की कुल संख्या, जो कि व्याख्याओं के एक समूह में मापी जाती है।

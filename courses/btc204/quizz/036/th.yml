question: ทำไมประเภทสคริปต์ที่ใช้น้อยกว่าถึงสามารถระบุได้ง่ายกว่าสคริปต์ที่ใช้กันอย่างแพร่หลาย?
answer: เนื่องจากกลุ่มของธุรกรรมที่มีประเภทสคริปต์เดียวกันมีขนาดเล็กกว่า
wrong_answers:
  - เพราะพวกเขาต้องการการตรวจสอบเพิ่มเติมโดยนักขุด
  - เพราะพวกเขาใช้การเข้ารหัสที่อ่อนแอกว่า
  - เพราะพวกเขามักถูกปฏิเสธโดยโหนดเครือข่าย Bitcoin บ่อยครั้งกว่า
explanation: |
  หากกลุ่มธุรกรรมทั้งหมดที่มีประเภทสคริปต์เดียวกันซึ่งเรากำลังซ่อนอยู่นั้นมีขนาดเล็ก เราจะถูกระบุได้ง่ายกว่ากลุ่มธุรกรรมที่มีขนาดใหญ่มาก
reviewed: true
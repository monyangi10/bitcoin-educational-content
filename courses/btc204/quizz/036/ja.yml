question: なぜ、あまり一般的に使用されていないスクリプトタイプの方が、広く使用されているスクリプトよりも識別しやすいのでしょうか？
answer: 同じスクリプトタイプを持つトランザクションのグループが小さいため
wrong_answers:
  - マイナーによる検証がより多く必要なため
  - より弱い暗号化アルゴリズムを使用しているため
  - ビットコインネットワーク・ノードによってより頻繁に拒否されるため
explanation: |
  隠れている同じスクリプトタイプのトランザクションの総グループが小さい場合、非常に大きなグループのトランザクションよりも、識別しやすくなります。
reviewed: false

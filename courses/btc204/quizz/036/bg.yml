question: Защо по-рядко използваните типове шрифтове могат да бъдат по-лесно разпознаваеми от широко използваните шрифтове?
answer: Тъй като групата на транзакциите с един и същ тип скрипт е по-малка.
wrong_answers:
  - Защото изискват повече валидирания от миньорите.
  - Тъй като те използват по-слаби алгоритми за криптиране.
  - Тъй като те по-често се отхвърлят от мрежовите възли Bitcoin.
explanation: |
  Ако общата група от трансакции с един и същ тип скрипт, в която се крием, е малка, е по-лесно да ни идентифицират, отколкото в много голяма група трансакции.
reviewed: true
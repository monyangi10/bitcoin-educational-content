question: 널리 사용되는 스크립트보다 덜 일반적으로 사용되는 스크립트 유형이 더 쉽게 식별되는 이유는 무엇인가요?
answer: 스크립트 유형이 같은 트랜잭션 그룹이 더 작기 때문입니다.
wrong_answers:
  - 채굴자의 검증이 더 많이 필요하기 때문입니다.
  - 더 약한 암호화 알고리즘을 사용하기 때문입니다.
  - Bitcoin 네트워크 노드에서 거부되는 경우가 더 많기 때문입니다.
explanation: |
  숨기고 있는 스크립트 유형이 동일한 트랜잭션의 전체 그룹이 작으면 매우 큰 트랜잭션 그룹보다 더 쉽게 식별할 수 있습니다.
reviewed: true
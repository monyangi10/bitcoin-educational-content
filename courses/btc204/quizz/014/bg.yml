question: Какъв е моделът за поверителност на системата Bitcoin?
answer: Транзакциите са публични, но самоличността на потребителите не е известна.
wrong_answers:
  - Само Satoshi Nakamoto има достъп до данните за транзакцията.
  - Транзакциите са криптирани и невидими в мрежата.
  - Достъп до данните за транзакциите имат само правителствата.
explanation: |
  В случая на Bitcoin, тъй като потокът от информация не може да бъде прекъснат между трансакциите и публичната сфера, моделът за поверителност разчита на разделянето на самоличността на потребителя и трансакциите.
reviewed: true
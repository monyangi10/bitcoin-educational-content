question: ビットコイン・システムのプライバシー・モデルとは何ですか？
answer: トランザクションは公開されているが、ユーザーの身元は不明である
wrong_answers:
  - トランザクションの詳細にアクセスできるのはサトシ・ナカモトだけである
  - トランザクションは暗号化されており、ネットワーク上では見ることができない
  - トランザクションの詳細にアクセスできるのは政府だけである
explanation: |
  ビットコインの場合、トランザクションと公共領域の間の情報の流れが断ち切れないため、プライバシー・モデルはユーザーの身元とトランザクションの分離に依存しています。
reviewed: false

question: รูปแบบความเป็นส่วนตัวของระบบ Bitcoin คืออะไร?
answer: ธุรกรรมเป็นสาธารณะ แต่ตัวตนของผู้ใช้ไม่เป็นที่รู้จัก
wrong_answers:
  - เฉพาะ Satoshi Nakamoto เท่านั้นที่สามารถเข้าถึงรายละเอียดการทำธุรกรรมได้
  - ธุรกรรมถูกเข้ารหัสและมองไม่เห็นบนเครือข่าย
  - มีเพียงรัฐบาลเท่านั้นที่สามารถเข้าถึงรายละเอียดการทำธุรกรรมได้
explanation: |
  ในกรณีของ Bitcoin เนื่องจากการไหลของข้อมูลไม่สามารถถูกตัดขาดระหว่างธุรกรรมและสาธารณสมบัติ โมเดลความเป็นส่วนตัวจึงพึ่งพาการแยกตัวตนของผู้ใช้และธุรกรรมออกจากกัน
reviewed: true
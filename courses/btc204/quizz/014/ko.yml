question: Bitcoin 시스템의 개인정보 보호 모델은 무엇인가요?
answer: 거래는 공개되지만 사용자의 신원은 알 수 없습니다.
wrong_answers:
  - Satoshi 나카모토만 거래 세부 정보에 액세스할 수 있습니다.
  - 트랜잭션은 암호화되어 네트워크에서 보이지 않습니다.
  - 정부만 거래 세부 정보에 액세스할 수 있습니다.
explanation: |
  Bitcoin의 경우 트랜잭션과 퍼블릭 도메인 간에 정보의 흐름을 분리할 수 없기 때문에 개인정보 보호 모델은 사용자의 신원과 트랜잭션의 분리에 의존합니다.
reviewed: true
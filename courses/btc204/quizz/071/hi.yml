question: जब आप अपना खुद का Bitcoin नोड इस्तेमाल नहीं कर रहे हैं, तो कनेक्शन छुपाने के लिए आप कौन-सा इंटरमीडिएट उपाय अपना सकते हैं?
answer: टॉर का इस्तेमाल
wrong_answers:
  - फायरवॉल का इस्तेमाल।
  - एन्क्रिप्टेड Wallet का इस्तेमाल
  - डबल Wallet का इस्तेमाल
explanation: |
जोखिम को कम करने के लिए कि आप पर नज़र रखी जा रही है, एक बीच का हल है Wallet सॉफ्टवेयर का इस्तेमाल करना जो आपके कनेक्शन को Tor के ज़रिए छुपाने की सुविधा देता है।
reviewed: false
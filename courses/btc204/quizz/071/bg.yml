question: Какви междинни мерки могат да бъдат предприети за скриване на връзките, когато не използвате собствен възел Bitcoin?
answer: Използване на Tor.
wrong_answers:
  - Използване на защитна стена.
  - Използване на криптиран wallet.
  - Използване на двоен wallet.
explanation: |
  За да ограничите риска да бъдете наблюдавани, междинно решение е да използвате софтуер wallet, който ви позволява да скриете връзките си чрез Tor.
  
reviewed: true
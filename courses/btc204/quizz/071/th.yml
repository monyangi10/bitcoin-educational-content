question: สามารถใช้มาตรการระดับกลางอะไรบ้างเพื่อซ่อนการเชื่อมต่อเมื่อคุณไม่ได้ใช้โหนด Bitcoin ของคุณเอง?
answer: การใช้ Tor.
wrong_answers:
  - การใช้ไฟร์วอลล์
  - การใช้ wallet ที่เข้ารหัส
  - การใช้ wallet แบบคู่
explanation: |
  เพื่อจำกัดความเสี่ยงจากการถูกสังเกต วิธีแก้ปัญหากลางๆ คือการใช้ซอฟต์แวร์ wallet ที่ช่วยให้คุณซ่อนการเชื่อมต่อของคุณผ่าน Tor
reviewed: true
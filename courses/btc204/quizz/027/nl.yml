question: Welke techniek helpt beschermen tegen het risico van tracking dat wordt veroorzaakt door KYC?
answer: CoinJoin transacties
wrong_answers:
  - Het gebruik van VPN
  - Het gebruik van een Full node
  - Validatie door Proof of Work
explanation: |
  Coinjoins hebben het effect dat de geschiedenis van een munt wordt verbroken, wat je helpt om het risico van tracking in verband met KYC tegen te gaan.
reviewed: false
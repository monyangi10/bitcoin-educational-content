question: Коя техника помага за защита срещу риска от проследяване, предизвикан от KYC?
answer: Транзакции Coinjoin
wrong_answers:
  - Използване на VPN
  - Използване на full node
  - Утвърждаване чрез proof of work
explanation: |
  Свързването на монети води до прекъсване на историята на монетата, което ви помага да противодействате на риска от проследяване, свързан с KYC.
reviewed: true
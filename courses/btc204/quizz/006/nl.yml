question: Wat betekent wisselgeld (change) in een transactie?
answer: Een output die terugkeert naar de oorspronkelijke afzender van de transactie.
wrong_answers:
  - Een vergoeding voor het Bitcoin-netwerk.
  - Een output die wordt overgedragen aan de ontvanger van de transactie.
  - Een bonus voor de verzender voor snelle transacties.
explanation: |
  Wisselgeld is een output die het deel van de input vertegenwoordigt dat niet is gebruikt om de betaling uit te voeren, en gaat dus terug naar de oorspronkelijke afzender van de transactie.

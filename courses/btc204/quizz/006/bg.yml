question: Какво представлява промяната в дадена транзакция?
answer: Изход, който се връща към първоначалния изпращач на транзакцията.
wrong_answers:
  - Такса, взета от мрежата Bitcoin.
  - Резултат, който се предава на получателя на транзакцията.
  - Бонус, който изпращачът получава за бързи транзакции.
explanation: |
  Промяната е резултат, който представлява частта от входящите ресурси, която не е използвана за извършване на плащането, и по този начин се връща на първоначалния изпращач на транзакцията.
reviewed: true
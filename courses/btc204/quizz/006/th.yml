question: การเปลี่ยนแปลงในธุรกรรมหมายถึงอะไร?
answer: เอาต์พุตที่ส่งกลับไปยังผู้ส่งเดิมของธุรกรรม
wrong_answers:
  - ค่าธรรมเนียมที่เรียกเก็บโดยเครือข่าย Bitcoin
  - เอาต์พุตที่ถูกโอนไปยังผู้รับของธุรกรรม
  - โบนัสที่มอบให้กับผู้ส่งสำหรับการทำธุรกรรมที่รวดเร็ว
explanation: |
  การเปลี่ยนแปลงคือผลลัพธ์ที่แสดงถึงส่วนของข้อมูลนำเข้าที่ไม่ได้ใช้ในการชำระเงิน และดังนั้นจึงกลับไปยังผู้ส่งเดิมของธุรกรรม
reviewed: true
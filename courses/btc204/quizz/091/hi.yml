question: CoinJoin साइकल्स के बाद कई UTXOs को मर्ज करने के खिलाफ सलाह क्यों दी जाती है?
answer: यह CIOH की वजह से प्राइवेसी को खतरे में डाल सकता है।
wrong_answers:
  - यह लेन-देन की गति को कम कर देता है।
  - यह कोऑर्डिनेटर को संदिग्ध गतिविधि दिखाता है।
  - इससे गोपनीयता खतरे में पड़ सकती है क्योंकि राउंड पेमेंट ह्यूरिस्टिक के कारण।
explanation: |
यह ज़रूरी है कि मिक्स्ड UTXOs को अनमिक्स्ड UTXOs के साथ एक ही ट्रांजैक्शन में मिलाने से बचें, साथ ही UTXOs को आपस में मिक्स करने से भी बचें, ताकि Common-Input-Ownership-Heuristic (CIOH) से बचा जा सके।

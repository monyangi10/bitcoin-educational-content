question: Защо се препоръчва да не се сливат няколко UTXO след циклите на coinjoin?
answer: Това би могло да застраши неприкосновеността на личния живот поради CIOH.
wrong_answers:
  - Това намалява скоростта на транзакциите.
  - Той разкрива на координатора подозрителна дейност.
  - Това може да застраши поверителността поради евристиката на кръговото плащане.
explanation: |
  От съществено значение е да се избягва комбинирането на смесени UTXO с несмесени UTXO в една и съща транзакция, както и смесването на UTXO помежду им, за да се предотврати Common-Input-Ownership-Heuristic (CIOH).
  
reviewed: true
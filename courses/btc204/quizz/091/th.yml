question: ทำไมถึงแนะนำว่าไม่ควรรวม UTXO หลายรายการหลังจากรอบ coinjoin?
answer: สิ่งนี้อาจทำให้ความเป็นส่วนตัวถูกละเมิดเนื่องจาก CIOH.
wrong_answers:
  - มันลดความเร็วของการทำธุรกรรมลง
  - มันเปิดเผยกิจกรรมที่น่าสงสัยให้กับผู้ประสานงาน
  - สิ่งนี้อาจทำให้ความเป็นส่วนตัวถูกละเมิดเนื่องจากการคาดเดาการชำระเงินแบบรอบ
explanation: |
  สิ่งสำคัญคือต้องหลีกเลี่ยงการรวม UTXOs ที่ผสมแล้วกับ UTXOs ที่ยังไม่ผสมในธุรกรรมเดียวกัน รวมถึงการผสม UTXOs ระหว่างกันเอง เพื่อป้องกัน Common-Input-Ownership-Heuristic (CIOH)
reviewed: true
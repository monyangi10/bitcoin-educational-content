question: コインジョイン・サイクルの後に複数のUTXOを統合することはなぜ推奨されないのですか？

answer: CIOHによってプライバシーが損なわれる可能性があるため

wrong_answers:
  - トランザクションの速度が低下するため
  - コーディネーターに不審な活動を示すことになるため
  - 丸め支払いヒューリスティックによってプライバシーが損なわれる可能性があるため

explanation: |
  ミックスされた未使用トランザクションアウトプット（UTXO）をミックスされていないUTXOと同じトランザクションで組み合わせることを避けることが重要ですが、UTXO同士をミックスすることも避ける必要があります。これは、Common-Input-Ownership-Heuristic (CIOH)を避けるためです。


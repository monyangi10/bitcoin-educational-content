question: Hangi seçenek Bitcoin core yapılandırma dosyasında P2P aktarım V2'yi etkinleştirmeyi veya devre dışı bırakmayı sağlar?
answer: v2transport=
wrong_answers:
  - p2penable=
  - networkv2=
  - enablev2=
explanation: |
  P2P V2 aktarımı, bir Çekirdek düğümün yapılandırma dosyasındaki v2transport= seçeneği ile değiştirilebilir.
  
reviewed: false
question: Кой от отговорите представлява една от основните цели на верижния анализ?
answer: Групирайте различни дейности, свързани с Bitcoin, за да определите уникалността на потребителя.
wrong_answers:
  - Оптимизиране на работата на mining в мрежата.
  - Осъществяване на правосъдие по протокол за прилагане на закона в съответствие с юрисдикцията.
  - Повишаване на поверителността на транзакциите Bitcoin.
explanation: |
  Една от целите на верижния анализ е да се групират различните дейности в Bitcoin, за да се определи уникалността на потребителя, който ги е извършил. Впоследствие ще бъде възможно да се направи опит за свързване на тази група от дейности с реална самоличност.
reviewed: true
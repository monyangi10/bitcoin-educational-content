question: 回答の中で、チェーン分析の主要な目標の一つを表しているものはどれですか？
answer: ビットコイン上の様々な活動をグループ化し、ユーザーのユニークさを特定する
wrong_answers:
  - ネットワーク上でのマイニング性能を最適化する
  - 法域に応じて法を施行するためにプロトコル上で正義を管理する
  - ビットコイン・トランザクションの機密性を高める
explanation: |
  チェーン分析の目標の一つは、ビットコイン上で行われた様々な活動をグループ化して、それらを行ったユーザーのユニークさを特定することです。その後、この活動の束を実際の身元にリンクしようと試みることが可能になります。
reviewed: false

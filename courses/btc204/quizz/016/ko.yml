question: 다음 중 체인 분석의 주요 목표 중 하나를 나타내는 답은?
answer: Bitcoin과 관련된 다양한 활동을 그룹화하여 사용자의 고유성을 파악합니다.
wrong_answers:
  - 네트워크에서 Mining 성능을 최적화하세요.
  - 관할권에 따라 법을 집행하기 위해 프로토콜에 대한 사법을 관리합니다.
  - Bitcoin 거래의 기밀성을 높입니다.
explanation: |
  체인 분석의 목표 중 하나는 Bitcoin의 다양한 활동을 그룹화하여 해당 활동을 수행한 사용자의 고유성을 파악하는 것입니다. 그런 다음 이 활동 묶음을 실제 신원과 연결할 수 있습니다.
reviewed: true
question: Какво показва ретроспективното отпадане?
answer: Броят на вероятните източници за UTXO в края на циклите.
wrong_answers:
  - Размерът на групата от неразличими UTXO в края на циклите.
  - Броят на вероятните източници за UTXO в началото на циклите.
  - Времето, необходимо за завършване на съвместното присъединяване.
explanation: |
  Ретроспективният анонс показва броя на възможните източници за дадена монета, като се има предвид UTXO в края на цикъла.
  
reviewed: true
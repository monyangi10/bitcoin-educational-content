question: レトロスペクティブ・アノンセットは何を示していますか？

answer: サイクルの終わりにおけるUTXOの可能性のあるソースの数

wrong_answers:
  - サイクルの終わりにおける区別できないUTXOグループのサイズ
  - サイクルの開始時におけるUTXOの可能性のあるソース数
  - コインジョインを完了するのに必要な時間

explanation: |
  レトロスペクティブ・アノンセットは、サイクルの終わりにおける未使用トランザクションアウトプット（UTXO）を考慮して、特定のコインの可能性のあるソース数を示します。


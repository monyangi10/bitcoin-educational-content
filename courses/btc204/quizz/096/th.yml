question: การเริ่มต้นย้อนหลังบ่งบอกถึงอะไร?
answer: จำนวนแหล่งที่เป็นไปได้สำหรับ UTXO เมื่อสิ้นสุดรอบ.
wrong_answers:
  - ขนาดของกลุ่ม UTXOs ที่ไม่สามารถแยกแยะได้เมื่อสิ้นสุดรอบการทำงาน
  - จำนวนแหล่งที่เป็นไปได้สำหรับ UTXO ที่จุดเริ่มต้นของรอบ.
  - เวลาที่ต้องใช้ในการทำ coinjoin ให้เสร็จสิ้น
explanation: |
  การย้อนกลับของ anonset บ่งชี้ถึงจำนวนแหล่งที่เป็นไปได้สำหรับเหรียญที่กำหนด โดยพิจารณาจาก UTXO ที่สิ้นสุดรอบการทำงาน
reviewed: true
question: P2P एक्सचेंजों से खरीदे गए बिटकॉइन अक्सर रेगुलेटेड प्लेटफॉर्म्स की तुलना में महंगे क्यों होते हैं?
answer: अतिरिक्त जोखिम, लेन-देन शुल्क, और गोपनीयता के लिए प्रीमियम।
wrong_answers:
  - मार्केट में उतार-चढ़ाव, डबल खर्च करने का खतरा, और कानूनी अनुपालन।
  - रजिस्ट्रेशन फीस, सीमित विकल्प, और वैलिडेशन में ज्यादा समय।
  - रजिस्ट्रेशन फीस, सख्त नियम, और कम सुरक्षा।
  Bitcoins sold on P2P platforms are generally more expensive than those from regulated platforms. This markup is due to several factors: the seller takes on more risks, they also have to cover additional costs, and the exchange offers the buyer a higher level of privacy.
reviewed: false
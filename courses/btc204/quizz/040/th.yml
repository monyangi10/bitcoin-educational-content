question: ทำไมบิตคอยน์ที่ซื้อผ่านการแลกเปลี่ยน P2P มักมีราคาสูงกว่าที่ซื้อบนแพลตฟอร์มที่มีการควบคุม?
answer: ความเสี่ยงเพิ่มเติม ค่าธรรมเนียมการทำธุรกรรม และค่าพรีเมียมสำหรับความเป็นส่วนตัว
wrong_answers:
  - ความผันผวนของตลาด, ความเสี่ยง double-spending, และการปฏิบัติตามกฎหมาย.
  - ค่าธรรมเนียมการลงทะเบียน, ตัวเลือกที่จำกัด, และเวลาการตรวจสอบที่นานขึ้น
  - ค่าลงทะเบียน, กฎระเบียบที่เข้มงวด, และความปลอดภัยต่ำ
explanation: |
  Bitcoins ที่ขายบนแพลตฟอร์ม P2P มักจะมีราคาสูงกว่าที่ขายบนแพลตฟอร์มที่มีการควบคุม ส่วนต่างของราคานี้เกิดจากหลายปัจจัย: ผู้ขายต้องรับความเสี่ยงมากขึ้น พวกเขายังต้องครอบคลุมค่าใช้จ่ายเพิ่มเติม และการแลกเปลี่ยนยังมอบระดับความเป็นส่วนตัวที่สูงขึ้นให้กับผู้ซื้อ
reviewed: true
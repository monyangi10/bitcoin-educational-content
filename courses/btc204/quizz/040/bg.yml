question: Защо биткойните, закупени чрез борсите P2P, често са по-скъпи от тези, закупени чрез регулирани платформи?
answer: Допълнителни рискове, такси за транзакции и премия за поверителност.
wrong_answers:
  - Пазарна волатилност, рискове, свързани с double-spending, и спазване на законодателството.
  - Такси за регистрация, ограничени възможности и по-дълго време за валидиране.
  - Такси за регистрация, строги правила и ниска степен на сигурност.
explanation: |
  Биткойните, продавани в платформите P2P, обикновено са по-скъпи от тези в регулираните платформи. Тази надценка се дължи на няколко фактора: продавачът поема повече рискове, той трябва да покрие и допълнителни разходи, а борсата предлага на купувача по-високо ниво на поверителност.
reviewed: true
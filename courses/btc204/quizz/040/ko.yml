question: P2P 거래소를 통해 구매한 비트코인이 규제 플랫폼에서 구매한 비트코인보다 비싼 이유는 무엇인가요?
answer: 추가 위험, 거래 수수료, 개인정보 보호에 대한 프리미엄.
wrong_answers:
  - 시장 변동성, Double-spending 위험 및 법률 준수.
  - 등록비, 제한된 옵션, 더 긴 유효성 검사 시간.
  - 등록비, 엄격한 규정, 낮은 보안.
explanation: |
  P2P 플랫폼에서 판매되는 비트코인은 일반적으로 규제 플랫폼에서 판매되는 비트코인보다 더 비쌉니다. 판매자는 더 많은 위험을 감수하고, 추가 비용을 부담해야 하며, Exchange는 구매자에게 더 높은 수준의 프라이버시를 제공하는 등 여러 가지 요인으로 인해 가격이 인상됩니다.
reviewed: true
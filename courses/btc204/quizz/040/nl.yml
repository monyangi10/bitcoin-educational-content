question: Waarom zijn bitcoins die gekocht zijn via P2P-exchanges vaak duurder dan bitcoins die gekocht zijn op gereguleerde platforms?
answer: Extra risico's, transactiekosten en een premie voor privacy.
wrong_answers:
  - Marktvolatiliteit, risico's op dubbele uitgaven en naleving van wettelijke voorschriften.
  - Registratiekosten, beperkte opties en langere validatietijd.
  - Registratierechten, strenge regels en weinig veiligheid.
explanation: |
  Bitcoins die verkocht worden op P2P-platformen zijn over het algemeen duurder dan die van gereguleerde platformen. Deze toeslag is te wijten aan verschillende factoren: de verkoper neemt meer risico's, hij moet ook extra kosten dekken en het platform biedt de koper een hoger niveau van privacy.
reviewed: false

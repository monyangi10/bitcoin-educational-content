question: BIP47 के ऑपरेशन का दिल कौन सा क्रिप्टोग्राफ़िक की Exchange एल्गोरिदम है?
answer: ECDH (Elliptic Curve Diffie-Hellman)
wrong_answers:
  - आरएसए (RSA)
  - एलगमाल
  - डिफी-हैलमैन
explanation: |
इस्तेमाल किया गया एल्गोरिदम ECDH (एलिप्टिक कर्व डिफी-हेलमैन) है। यह क्लासिक डिफी-हेलमैन एल्गोरिदम का एक वेरिएंट है जो एलिप्टिक कर्व्स का उपयोग करता है।
reviewed: false
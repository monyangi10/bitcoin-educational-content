question: เป้าหมายหลักของเทคนิคการกระเด้งคืออะไร?
answer: เพื่อลบเลือนร่องรอยในอดีตของเหรียญ
wrong_answers:
  - เพื่อเพิ่มการไม่เปิดเผยตัวตนของธุรกรรม
  - เพื่อเพิ่มเอนโทรปีของธุรกรรม
  - เพื่อจ่ายค่าธรรมเนียมการทำธุรกรรมให้น้อยลงในอนาคต
explanation: |
  เป้าหมายของการกระเด็นคือการจำลองการเปลี่ยนแปลงความเป็นเจ้าของเหรียญ Bitcoin เพื่อฟื้นฟูความสามารถในการแลกเปลี่ยนได้โดยการเบลอร่องรอยในอดีตของมัน
reviewed: true
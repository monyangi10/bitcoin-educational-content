question: रिकोशेट तकनीक का मुख्य लक्ष्य क्या है?
answer: सिक्के के अतीत के निशान धुंधला करने के लिए
wrong_answers:
  - लेन-देन की संभावित गति बढ़ाने के लिए
  - एक लेन-देन की एन्ट्रॉपी बढ़ाने के लिए
  - भविष्य में लेन-देन शुल्क कम करने के लिए
explanation: |
रिकोशेट का मकसद है Bitcoin सिक्के के Ownership में बदलाव की नकल करना, ताकि उसके पुराने निशानों को धुंधला करके उसकी विनिमेयता (फंजिबिलिटी) को बहाल किया जा सके।

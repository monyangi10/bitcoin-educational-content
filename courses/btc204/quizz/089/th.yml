question: ผู้สร้างได้รับค่าตอบแทนอย่างไรใน JoinMarket?
answer: ผ่านค่าธรรมเนียมที่จ่ายโดยผู้รับ
wrong_answers:
  - ผ่านค่าธรรมเนียม mining
  - ผ่านการบริจาคโดยสมัครใจจากผู้รับ
  - ผ่านเงินทุนสนับสนุนจากชุมชน Bitcoin
explanation: |
  ผู้สร้างปล่อยให้บิตคอยน์ของพวกเขาพร้อมใช้งานสำหรับผู้รับ และได้รับค่าธรรมเนียมเป็นการตอบแทนสำหรับบริการของพวกเขา ผู้รับจะจ่ายเงินเพื่อใช้บิตคอยน์ของผู้สร้างเพื่อดำเนินการทำธุรกรรม coinjoin ของตนเอง
reviewed: true
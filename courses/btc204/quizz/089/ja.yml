question: JoinMarketで「メーカー」はどのようにして報酬を得ていますか？

answer: 「テイカー」から支払われる手数料

wrong_answers:
  - マイニング手数料
  - テイカーからの自発的な寄付
  - ビットコイン・コミュニティからの助成金

explanation: |
  「メーカー」は自分のビットコインを「テイカー」が利用できるようにしておき、そのサービスの対価として手数料を受け取ります。「テイカー」は、自分たちのコインジョイン・トランザクションを行うために、「メーカー」のビットコインを使用することに対して手数料を支払います。

  レビュー済み: false

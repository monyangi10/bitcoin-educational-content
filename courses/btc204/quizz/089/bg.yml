question: Как се компенсират производителите в JoinMarket?
answer: Чрез такси, плащани от потребителите.
wrong_answers:
  - Чрез такси за копаене.
  - Чрез доброволни дарения от страна на потребителите.
  - Чрез безвъзмездни средства от общността Bitcoin.
explanation: |
  Създателите оставят своите биткойни на разположение на потребителите и получават такси в замяна на услугата си. На свой ред приемащите плащат, за да използват биткойните на създателите, за да извършват своите собствени трансакции с монети.
  
reviewed: true

question: JoinMarket में makers को कैसे मुआवजा मिलता है?
answer: परीक्षा देने वालों द्वारा दिए गए शुल्क के माध्यम से।
wrong_answers:
  - Mining फीस के जरिए।
  - देने वालों के स्वैच्छिक दान के माध्यम से।
  - जीडब्ल्यू-1 समुदाय के अनुदान के माध्यम से।
explanation: |
निर्माता अपने बिटकॉइन्स को लेने वालों के लिए उपलब्ध छोड़ देते हैं और अपनी सेवा के बदले फीस प्राप्त करते हैं। बदले में, लेने वाले अपने खुद के CoinJoin लेन-देन करने के लिए निर्माताओं के बिटकॉइन्स का उपयोग करने के लिए भुगतान करते हैं।
reviewed: false
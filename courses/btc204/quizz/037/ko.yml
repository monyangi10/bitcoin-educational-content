question: 공통 입력 Ownership 휴리스틱(CIOH)은 무엇을 수반하나요?
answer: 트랜잭션에 여러 개의 입력이 포함된 경우, 이는 모두 단일 엔터티에서 발생한 것일 가능성이 높습니다.
wrong_answers:
  - 트랜잭션에 여러 개의 입력이 포함된 경우, 이러한 입력은 모두 다른 엔티티에서 제공되었을 가능성이 높습니다.
  - 트랜잭션에 여러 개의 출력이 포함된 경우, 이러한 출력은 모두 단일 엔터티로 전달될 가능성이 높습니다.
  - 트랜잭션에 여러 개의 출력이 포함된 경우, 이 출력은 모두 다른 엔티티로 전달될 가능성이 높습니다.
explanation: |
  CIOH는 거래에 여러 개의 입력이 포함된 경우 이러한 입력이 단일 엔터티에서 비롯되었을 가능성이 높다는 것을 암시하는 휴리스틱입니다. 따라서 Ownership은 공통적입니다.

question: Wat houdt de Common Input Ownership Heuristic (CIOH) in?
answer: Als een transactie meerdere inputs bevat, zijn deze waarschijnlijk allemaal afkomstig van één entiteit.
wrong_answers:
  - Als een transactie meerdere inputs bevat, zijn deze waarschijnlijk allemaal afkomstig van verschillende entiteiten.
  - Als een transactie meerdere outputs bevat, gaan deze waarschijnlijk allemaal naar één entiteit.
  - Als een transactie meerdere outputs bevat, gaan deze waarschijnlijk allemaal naar verschillende entiteiten.
explanation: |
  De CIOH is een heuristiek die suggereert dat wanneer een transactie meerdere inputs bevat, deze inputs waarschijnlijk allemaal afkomstig zijn van één entiteit. Daarom is hun eigenaar gemeenschappelijk.

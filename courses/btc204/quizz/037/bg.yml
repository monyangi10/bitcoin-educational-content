question: Какво включва евристиката на общия вход Ownership (CIOH)?
answer: Когато дадена транзакция включва множество входящи данни, вероятно всички те са от едно лице.
wrong_answers:
  - Когато дадена транзакция включва множество входящи данни, те вероятно идват от различни субекти.
  - Когато дадена транзакция включва множество изходи, вероятно всички те ще бъдат насочени към едно лице.
  - Когато дадена транзакция включва множество изходи, вероятно всички те ще бъдат предназначени за различни субекти.
explanation: |
  CIOH е евристичен метод, който подсказва, че когато дадена транзакция включва множество входящи данни, те вероятно произхождат от едно лице. Следователно тяхната собственост е обща.
reviewed: true
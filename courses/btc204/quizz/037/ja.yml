question: Common Input Ownership Heuristic（CIOH）とは何を意味しますか？
answer: トランザクションに複数のインプットが含まれる場合、これらはすべて単一の主体からのものである可能性が高い
wrong_answers:
  - トランザクションに複数のインプットが含まれる場合、これらは異なる主体からのものである可能性が高い
  - トランザクションに複数のアウトプットが含まれる場合、これらはすべて単一の主体に向かっている可能性が高い
  - トランザクションに複数のアウトプットが含まれる場合、これらは異なる主体に向かっている可能性が高い
explanation: |
  CIOHは、トランザクションに複数のインプットが含まれる場合、これらのインプットはおそらくすべて単一の主体から発生しているという推測です。その結果、所有権は共通です。

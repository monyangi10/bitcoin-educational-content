question: Common Input Ownership Heuristic (CIOH) ประกอบด้วยอะไรบ้าง?
answer: เมื่อธุรกรรมมีการรวมอินพุตหลายรายการ อินพุตเหล่านี้มีแนวโน้มที่จะมาจากหน่วยงานเดียวกันทั้งหมด
wrong_answers:
  - เมื่อธุรกรรมมีหลายอินพุต สิ่งเหล่านี้อาจมาจากหน่วยงานต่าง ๆ กัน
  - เมื่อธุรกรรมมีหลายเอาท์พุต สิ่งเหล่านี้มีแนวโน้มที่จะไปยังหน่วยงานเดียวกันทั้งหมด
  - เมื่อธุรกรรมมีหลายเอาท์พุต สิ่งเหล่านี้มีแนวโน้มที่จะไปยังหน่วยงานต่างๆ ทั้งหมด
explanation: |
  CIOH เป็นฮิวริสติกที่แนะนำว่าเมื่อธุรกรรมมีอินพุตหลายรายการ อินพุตเหล่านี้น่าจะมาจากหน่วยงานเดียวกัน ดังนั้น การเป็นเจ้าของจึงเป็นเรื่องปกติ
reviewed: true
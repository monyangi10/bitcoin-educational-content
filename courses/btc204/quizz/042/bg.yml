question: Кой от тези рискове не е свързан с паричните P2P обмени?
answer: Риск от изтичане на данни.
wrong_answers:
  - Риск за личната безопасност.
  - Риск от кражба.
  - Правен риск.
explanation: |
  P2P борсите крият много рискове, но при тях не се изисква извършване на KYC. Поради това няма риск от изтичане на данни.
reviewed: true

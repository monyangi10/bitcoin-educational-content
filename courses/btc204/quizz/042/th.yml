question: ในบรรดาความเสี่ยงเหล่านี้ ความเสี่ยงใดที่ไม่เกี่ยวข้องกับการแลกเปลี่ยนเงินสด P2P?
answer: ความเสี่ยงของการรั่วไหลของข้อมูล
wrong_answers:
  - ความเสี่ยงต่อความปลอดภัยส่วนบุคคล
  - ความเสี่ยงจากการโจรกรรม
  - ความเสี่ยงทางกฎหมาย
explanation: |
  การแลกเปลี่ยนเงินสด P2P มีความเสี่ยงหลายประการ แต่ไม่จำเป็นต้องทำ KYC ดังนั้นจึงไม่มีความเสี่ยงในการรั่วไหลของข้อมูล
reviewed: true
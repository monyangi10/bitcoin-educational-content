question: Bitcoin और Wallet से जुड़े लेबल कैसे स्टोर किए जाते हैं?
answer: Wallet सॉफ्टवेयर पर लोकली।
wrong_answers:
  - डेवलपर द्वारा नियंत्रित एक केंद्रीकृत डेटाबेस में।
  - जीडब्ल्यू-5 से जीडब्ल्यू-3 तक, जीडब्ल्यू-4 के माध्यम से।
  - सॉफ़्टवेयर के चलते समय सिर्फ़ RAM में।
explanation: |
लेबल Wallet सॉफ्टवेयर द्वारा स्थानीय रूप से स्टोर किए जाते हैं और कभी भी Bitcoin नेटवर्क पर ट्रांसमिट नहीं किए जाते। इस तरह, लेबलिंग एक व्यक्तिगत प्रबंधन उपकरण है।

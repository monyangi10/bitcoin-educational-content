question: ป้ายกำกับที่เชื่อมโยงกับ Bitcoin wallet ถูกจัดเก็บอย่างไร?
answer: ในซอฟต์แวร์ wallet ในเครื่อง
wrong_answers:
  - ในฐานข้อมูลแบบรวมศูนย์ที่ควบคุมโดยนักพัฒนา
  - บนบล็อกเชน Bitcoin ผ่าน OP_RETURN
  - ใน RAM เท่านั้นระหว่างการทำงานของซอฟต์แวร์
explanation: |
  Labels จะถูกจัดเก็บไว้ในเครื่องโดยซอฟต์แวร์ wallet และจะไม่ถูกส่งผ่านเครือข่าย Bitcoin ดังนั้นการติดฉลากจึงเป็นเครื่องมือการจัดการส่วนบุคคล
reviewed: true
question: Как се съхраняват етикетите, свързани с Bitcoin wallet?
answer: Локално в софтуера wallet.
wrong_answers:
  - В централизирана база данни, контролирана от разработчика.
  - В блокчейна Bitcoin чрез OP_RETURN.
  - В RAM само по време на изпълнението на софтуера.
explanation: |
  Етикетите се съхраняват локално от софтуера wallet и никога не се предават по мрежата на Bitcoin. По този начин етикетирането е инструмент за лично управление.
  
reviewed: true
question: साइलेंट पेमेंट्स में रिसीवर और पेयर के बीच शेयर्ड सीक्रेट स्थापित करने के लिए जिस क्रिप्टोग्राफिक एल्गोरिदम का इस्तेमाल होता है, उसका नाम क्या है?
answer: ECDH (Elliptic Curve Diffie-Hellman)
wrong_answers:
  - आरएसए (RSA)
  - डीएच
  - एस-एच-ए-256 (SHA-256)
explanation: |
ECDH (एलिप्टिक-कर्व डिफी-हेलमैन) एल्गोरिदम का इस्तेमाल साइलेंट पेमेंट्स में रिसीवर के स्कैन की-पेयर और सेंडर के की-पेयर के योग के बीच शेयर्ड सीक्रेट स्थापित करने के लिए किया जाता है, जो यूनिक पेमेंट Address को डेरिव करने में सक्षम बनाता है।
reviewed: false
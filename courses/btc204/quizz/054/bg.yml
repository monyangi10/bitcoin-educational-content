question: Как се нарича криптографският алгоритъм, използван в "Тихи плащания" за установяване на споделена тайна между получателя и платеца?
answer: ECDH
wrong_answers:
  - RSA
  - DH
  - SHA256
explanation: |
  Алгоритъмът ECDH (Elliptic-Curve Diffie-Hellman) се използва в Silent Payments за установяване на споделената тайна между сканираната двойка ключове на получателя и сумата от двойката ключове на изпращача, което позволява извличането на уникалния адрес за плащане.
reviewed: true
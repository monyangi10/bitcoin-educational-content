question: ชื่อของอัลกอริธึมการเข้ารหัสที่ใช้ใน Silent Payments เพื่อสร้างความลับร่วมกันระหว่างผู้รับและผู้จ่ายคืออะไร?
answer: ECDH
wrong_answers:
  - อาร์เอสเอ
  - DH
  - SHA256
explanation: |
  อัลกอริทึม ECDH (Elliptic-Curve Diffie-Hellman) ถูกใช้ใน Silent Payments เพื่อสร้างความลับร่วมกันระหว่างคู่กุญแจสแกนของผู้รับและผลรวมของคู่กุญแจของผู้ส่ง ซึ่งช่วยให้สามารถสร้างที่อยู่การชำระเงินที่ไม่ซ้ำกันได้
reviewed: true
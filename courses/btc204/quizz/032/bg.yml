question: Ако при обикновена платежна транзакция се наблюдава, че един и същ тип скрипт се използва на входа и само на един от двата изхода, кой изход вероятно представлява рестото?
answer: Този със същия тип скрипт като входния.
wrong_answers:
  - Този с най-новия тип скрипт.
  - Този с различен тип скрипт от входния.
  - Този с нестандартен тип шрифт.
explanation: |
  Ако повторното използване на версията се случи в рамките на транзакция, разумно е да се предположи, че потребителят все още притежава свързания UTXO. Следователно изходът със същата версия на скрипта като входната вероятно е резултат от рестото.
reviewed: true

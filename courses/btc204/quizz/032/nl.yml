question: Als in een eenvoudige betalingstransactie wordt waargenomen dat hetzelfde type script wordt gebruikt in de input en in slechts een van de 2 outputs, welke output vertegenwoordigt dan waarschijnlijk het wisselgeld?
answer: Degene met hetzelfde type script als de input.
wrong_answers:
  - Degene met het meest recente scripttype.
  - Degene met een ander type script dan de input.
  - Degene met een niet-standaard scripttype.
explanation: |
  Als een hergebruik van versiebeheer plaatsvindt binnen een transactie, is het redelijk om aan te nemen dat de gebruiker nog steeds de bijbehorende UTXO bezit. Daarom is de output met dezelfde scriptversie als de input waarschijnlijk het wisselgeld.

question: 単純なな支払いトランザクションで、インプットと2つのアウトプットのうちの1つだけに同じタイプのスクリプトが使用されていることが観察された場合、どちらのアウトプットがチェンジと考えられるでしょうか？
answer: インプットと同じタイプのスクリプトを使用しているアウトプット
wrong_answers:
  - 最も新しいスクリプトタイプを使用しているアウトプット
  - インプットと異なるタイプのスクリプトを使用しているアウトプット
  - 標準外のスクリプトタイプを使用しているアウトプット
explanation: |
  トランザクション内でバージョニングの再利用が発生した場合、ユーザーが関連する未使用トランザクションアウトプット（UTXO）をまだ保持していると推定するのが妥当です。したがって、インプットと同じスクリプトバージョンを持つアウトプットがチェンジと考えられます。
reviewed: false

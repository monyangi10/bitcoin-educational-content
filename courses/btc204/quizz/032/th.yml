question: หากในการทำธุรกรรมการชำระเงินแบบง่าย ๆ มีการสังเกตว่ามีการใช้สคริปต์ประเภทเดียวกันในอินพุตและในเอาต์พุตเพียงหนึ่งในสองรายการ เอาต์พุตใดมีแนวโน้มที่จะเป็นตัวแทนของเงินทอน?
answer: คนที่มีประเภทของสคริปต์เดียวกันกับอินพุต
wrong_answers:
  - คนที่มีประเภทสคริปต์ล่าสุดที่สุด
  - คนที่มีสคริปต์ประเภทต่างจากอินพุต
  - คนที่มีประเภทสคริปต์ที่ไม่เป็นมาตรฐาน
explanation: |
  หากมีการใช้เวอร์ชันซ้ำภายในธุรกรรม เป็นการสมเหตุสมผลที่จะสันนิษฐานว่าผู้ใช้ยังคงครอบครอง UTXO ที่เกี่ยวข้อง ดังนั้น ผลลัพธ์ที่มีเวอร์ชันสคริปต์เดียวกันกับอินพุตจึงน่าจะเป็นผลมาจากการเปลี่ยนแปลง
reviewed: true
question: 간편결제 거래에서 입력과 2개의 출력 중 하나에만 동일한 유형의 스크립트가 사용되는 것이 관찰되는 경우, 변경 사항을 나타내는 출력은 무엇인가요?
answer: 입력과 동일한 유형의 스크립트가 있는 스크립트입니다.
wrong_answers:
  - 가장 최근 스크립트 유형이 있는 스크립트입니다.
  - 입력과 다른 유형의 스크립트가 있는 스크립트입니다.
  - 비표준 스크립트 유형이 있는 스크립트입니다.
explanation: |
  트랜잭션 내에서 버전 재사용이 발생하는 경우, 사용자가 여전히 관련 UTXO을 보유하고 있다고 가정하는 것이 합리적입니다. 따라서 입력과 동일한 스크립트 버전을 가진 출력은 변경의 결과일 가능성이 높습니다.
reviewed: true
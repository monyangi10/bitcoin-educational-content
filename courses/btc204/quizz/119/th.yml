question: ความแตกต่างหลักระหว่างการกระเด้งกลับแบบปรับปรุงและการกระเด้งกลับแบบคลาสสิกคืออะไร?
answer: การกระจายของธุรกรรมตามเวลา
wrong_answers:
  - จำนวนธุรกรรมที่ใช้
  - ประเภทของที่อยู่ที่ใช้
  - จำนวนเอาต์พุตในธุรกรรม
explanation: |
  การกระเด้งที่ได้รับการปรับปรุงช่วยให้มั่นใจได้ว่าการทำธุรกรรมแต่ละครั้งจะถูกกระจายออกไปในเวลาที่แตกต่างกันและบันทึกในบล็อกที่แตกต่างกัน ในขณะที่การกระเด้งแบบคลาสสิกจะกระจายการทำธุรกรรมทั้งหมดภายในช่วงเวลาสั้น ๆ
reviewed: true
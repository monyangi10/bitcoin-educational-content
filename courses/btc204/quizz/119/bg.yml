question: Каква е основната разлика между засиления рикошет и класическия рикошет?
answer: Разпределение на транзакциите във времето
wrong_answers:
  - Броят на използваните транзакции
  - Видът на използвания адрес
  - Броят на изходите в транзакциите
explanation: |
  Усъвършенстваният рикошет гарантира, че всяка транзакция се излъчва в отделен момент и се записва в различен блок, докато класическият рикошет излъчва всички транзакции в рамките на кратък период от време.
  
reviewed: true
question: एक एन्हांस्ड रिकोशे और क्लासिक रिकोशे में मुख्य फर्क क्या है?
answer: समय के साथ लेन-देन का वितरण
wrong_answers:
  - लेन-देन की संख्या का उपयोग किया गया
  - जिस प्रकार का Address इस्तेमाल किया गया
  - लेन-देन में आउटपुट की संख्या
explanation: |
एन्हांस्ड रिकोशे यह सुनिश्चित करता है कि हर लेन-देन एक अलग समय पर प्रसारित हो और अलग ब्लॉक में दर्ज हो, जबकि क्लासिक रिकोशे सभी लेन-देन को कम समय के अंदर प्रसारित कर देता है।
reviewed: false
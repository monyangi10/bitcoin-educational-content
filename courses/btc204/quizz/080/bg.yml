question: Каква е ролята на координатора на съвместното свързване?
answer: Свържете участниците и създайте транзакцията.
wrong_answers:
  - Криптиране на данните на участниците за конфиденциалност на транзакциите.
  - Запазете запис на предишни съвместни операции за целите на одитите за сигурност.
  - Получаване на биткойни от участниците, за да ги смесите.
explanation: |
  Ролята на координаторите е да свързват различните потребители, освен че конструират и излъчват съвместната транзакция.
reviewed: true
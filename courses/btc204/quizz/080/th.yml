question: บทบาทของผู้ประสานงาน CoinJoin คืออะไร?
answer: เชื่อมต่อผู้เข้าร่วมและสร้างธุรกรรม
wrong_answers:
  - เข้ารหัสข้อมูลผู้เข้าร่วมเพื่อความลับของธุรกรรม
  - เก็บบันทึกการรวมเหรียญก่อนหน้านี้สำหรับการตรวจสอบความปลอดภัย
  - รับบิตคอยน์จากผู้เข้าร่วมเพื่อผสมพวกมัน
explanation: |
  บทบาทของผู้ประสานงานคือการเชื่อมต่อผู้ใช้ต่าง ๆ นอกเหนือจากการสร้างและกระจายธุรกรรมร่วมกัน
reviewed: true
question: CoinJoin कोऑर्डिनेटर की भूमिका क्या है?
answer: प्रतिभागियों को जोड़ें और लेन-देन को पूरा करें।
wrong_answers:
  - लेन-देन की गोपनीयता के लिए प्रतिभागी डेटा को एन्क्रिप्ट करें।
  - पिछले कॉइनजॉइन्स का रिकॉर्ड रखें सुरक्षा ऑडिट के लिए।
  - भागीदारों से बिटकॉइन प्राप्त करें और उन्हें मिक्स करें।
explanation: |
कोऑर्डिनेटर्स की भूमिका अलग-अलग यूजर्स को जोड़ने और सहयोगी लेन-देन (ट्रांजैक्शन) बनाने और फिर उसे प्रसारित करने की होती है।

question: Ni uruhara uruhe umuhuzabikorwa wa CoinJoin afise?
answer: Huza abaje mu nama maze wubake ivy’ugucuruza.
wrong_answers:
  - Gushiramwo amakuru y'abaje mu nama kugira ngo ubucuruzi bube ibanga.
  - Bika urutonde rw’ama coinjoins ya kera kugira ngo ukore igenzura ry’umutekano.
  - Kwakira ama bitcoins ku bari muri iyo nama kugira ngo uyavange.
explanation: |
  Uruhara rw’abahuzabikorwa ni uguhuza abakoresha batandukanye no kwubaka hanyuma bagatangaza ivy’ugukorana.
  

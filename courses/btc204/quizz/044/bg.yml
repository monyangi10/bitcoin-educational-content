question: Какъв механизъм се използва от онлайн платформите за сватовство "peer-to-peer" (P2P), за да се намали рискът от кражба?
answer: Механизъм за ескроу.
wrong_answers:
  - Алгоритъм за сигурно съвпадение.
  - Механизъм за проверка на имейл.
  - Механизъм за проверка на самоличността.
explanation: |
  Тези платформи обикновено използват защитен механизъм, при който биткойните се задържат, докато продавачът не потвърди получаването на плащането във фиатна валута. Този механизъм на държане от трета страна представлява т.нар. ескроу.
reviewed: true
question: กลไกใดที่แพลตฟอร์มจับคู่แบบเพียร์ทูเพียร์ออนไลน์ (P2P) ใช้เพื่อลดความเสี่ยงของการโจรกรรม?
answer: กลไกเอสโครว์
wrong_answers:
  - อัลกอริทึมการจับคู่ที่ปลอดภัย
  - กลไกการยืนยันอีเมล
  - กลไกการยืนยันตัวตน
explanation: |
  แพลตฟอร์มเหล่านี้มักใช้กลไกการป้องกันที่บิตคอยน์จะถูกถือครองไว้จนกว่าผู้ขายจะยืนยันการรับชำระเงินในสกุลเงินเฟียต กลไกการถือครองโดยบุคคลที่สามนี้เรียกว่าการเอสโครว์
reviewed: true
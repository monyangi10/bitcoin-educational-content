question: Какъв е моделът на опростено плащане по Bitcoin?
answer: 1 или повече UTXO на входа и 2 UTXO на изхода.
wrong_answers:
  - 1 UTXO на входа и 1 UTXO на изхода
  - Няколко UTXO на входа и 1 UTXO на изхода
  - 5 UTXO на входовете и 5 UTXO на изходите
explanation: |
  При опростено плащане потребителят консумира един или повече UTXO като входни данни, за да изпълни на изхода плащане UTXO и промяна UTXO (следователно 2 UTXO).
reviewed: true

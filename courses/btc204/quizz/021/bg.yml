question: Какъв е моделът на опростено плащане по Bitcoin?
answer: 1 или повече UTXOs на входа и 2 UTXOs на изхода.
wrong_answers:
  - 1 UTXO на входа и 1 UTXO на изхода
  - Няколко UTXOs на входа и 1 UTXO на изхода
  - 5 UTXOs на входовете и 5 UTXOs на изходите
explanation: |
  При опростено плащане потребителят консумира един или повече UTXOs като входни данни, за да изпълни на изхода плащане UTXO и промяна UTXO (следователно 2 UTXOs).
reviewed: true
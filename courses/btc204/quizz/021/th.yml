question: รูปแบบของการชำระเงินที่ง่ายขึ้นบน Bitcoin คืออะไร?
answer: 1 หรือมากกว่า UTXO ในอินพุตและ 2 UTXO ในเอาต์พุต
wrong_answers:
  - 1 UTXO ในอินพุตและ 1 UTXO ในเอาต์พุต
  - หลาย UTXOs ในอินพุตและ 1 UTXO ในเอาต์พุต
  - 5 UTXOs ในอินพุตและ 5 UTXOs ในเอาต์พุต
explanation: |
  ในการชำระเงินแบบง่าย ผู้ใช้จะใช้ UTXO หนึ่งหรือมากกว่าเป็นอินพุตเพื่อทำการชำระเงิน UTXO และการเปลี่ยนแปลง UTXO (ดังนั้นจึงมี 2 UTXO) ในเอาต์พุต
reviewed: true
question: ビットコインにおける簡易支払いのパターンは何ですか？
answer: インプットに1つ以上のUTXOがあり、アウトプットに2つのUTXOがある
wrong_answers:
  - インプットに1つのUTXOがあり、アウトプットに1つのUTXOがある
  - インプットに複数のUTXOがあり、アウトプットに1つのUTXOがある
  - インプットに5つのUTXOがあり、アウトプットに5つのUTXOがある
explanation: |
  簡易支払いでは、ユーザーはインプットとして1つ以上のUTXOを消費し、アウトプットとして支払い未使用トランザクションアウトプット（UTXO）とチェンジUTXO（したがって2つのUTXO）を満たします。
reviewed: false

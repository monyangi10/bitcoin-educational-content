question: यूटीएक्सओ को लॉक करने के लिए पतों का उपयोग कैसे किया जाता है?
answer: वे स्क्रिप्टपबकी में इंटीग्रेटेड होते हैं
wrong_answers:
  - वे स्क्रिप्टसिग में एकीकृत होते हैं
  - वे सिक्के के आधार में एकीकृत हो गए हैं।
  - वे कहीं भी एकीकृत नहीं हैं।
explanation: |
जब एक भुगतान किया जाता है, तो लेन-देन UTXOs को इनपुट के रूप में इस्तेमाल करके एक नया UTXO आउटपुट बनाता है। इस आउटपुट पर एक स्क्रिप्ट लगाई जाती है जो बताती है कि इस UTXO को बाद में कैसे खर्च किया जा सकता है। इस स्क्रिप्ट को ScriptPubKey के नाम से जाना जाता है। प्राप्त करने वाला Address इस स्क्रिप्ट में शामिल किया जाता है।

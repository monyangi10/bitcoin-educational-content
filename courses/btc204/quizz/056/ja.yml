question: アドレスは未使用トランザクションアウトプット（UTXO）をロックするためにどのように使用されますか？

answer: ScriptPubKeyにマージングされます

wrong_answers:
  - ScriptSigにマージングされます
  - コインベースにマージングされます
  - どこにもマージングされません

explanation: |
  支払いが行われると、トランザクションはインプットとして消費されたUTXOからアウトプットとして新しいUTXOを作成します。このアウトプットには、後でこのUTXOをどのように使うかを定義するスクリプトが配置されます。このスクリプトは「ScriptPubKey」として知られています。受信アドレスはこのスクリプトにマージングされます。

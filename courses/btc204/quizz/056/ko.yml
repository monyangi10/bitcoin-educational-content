question: 주소는 UTXO를 잠그는 데 어떻게 사용되나요?
answer: 스크립트펍키에 통합되어 있습니다
wrong_answers:
  - 스크립트시그에 통합되어 있습니다
  - 코인베이스에 통합되어 있습니다.
  - 어디에도 통합되어 있지 않습니다.
explanation: |
  결제가 완료되면 트랜잭션은 입력으로 소비된 UTXO를 출력으로 새로운 UTXO을 생성합니다. 이 출력에는 나중에 이 UTXO이 어떻게 사용될 수 있는지 정의하는 스크립트가 배치됩니다. 이 스크립트를 일반적으로 ScriptPubKey라고 합니다. 수신 Address은 이 스크립트에 통합됩니다.
reviewed: true
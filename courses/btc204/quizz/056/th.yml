question: ที่อยู่ถูกใช้ในการล็อก UTXO อย่างไร?
answer: พวกเขาถูกรวมเข้ากับ ScriptPubKey
wrong_answers:
  - พวกเขาถูกรวมเข้ากับ ScriptSig
  - พวกเขาถูกรวมเข้ากับฐานเหรียญ
  - พวกเขาไม่ได้ถูกรวมเข้าที่ไหนเลย
explanation: |
  เมื่อมีการชำระเงินเกิดขึ้น ธุรกรรมจะสร้าง UTXO ใหม่เป็นผลลัพธ์จาก UTXOs ที่ถูกใช้เป็นข้อมูลนำเข้า ในผลลัพธ์นี้จะมีการวางสคริปต์ซึ่งกำหนดวิธีการใช้จ่าย UTXO นี้ในภายหลัง สคริปต์นี้มักเรียกกันว่า ScriptPubKey ที่อยู่ผู้รับจะถูกรวมเข้าไปในสคริปต์นี้
reviewed: true
question: Как се използват адресите за заключване на UTXO?
answer: Те са интегрирани в ScriptPubKey
wrong_answers:
  - Те са интегрирани в ScriptSig
  - Те са интегрирани в coinbase.
  - Те не са интегрирани никъде.
explanation: |
  Когато се извърши плащане, транзакцията създава нов UTXO като изход от UTXOs, използвани като вход. В този изход се поставя скрипт, който определя как този UTXO може да бъде изразходван по-късно. Този скрипт обикновено се нарича ScriptPubKey. Получаващият адрес е интегриран в този скрипт.
reviewed: true
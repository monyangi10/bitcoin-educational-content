question: การรวมในธุรกรรมคืออะไร?
answer: มันคือการกระทำของการใช้ UTXO หลายรายการเป็นอินพุต
wrong_answers:
  - มันคือการสร้าง UTXOs หลายรายการเป็นผลลัพธ์
  - เป็นการกระทำของการรวมที่อยู่หลาย ๆ แห่งเข้าด้วยกัน
  - มันคือการรวมบล็อกหลายๆ บล็อกในบล็อกเชนเข้าด้วยกัน
explanation: |
  เมื่อผู้ใช้ไม่มี UTXO ใด ๆ ที่มากกว่าหรือเท่ากับจำนวนที่ต้องการส่ง พวกเขาต้องใช้ UTXO หลายรายการเพื่อให้เป็นไปตามผลลัพธ์ การปฏิบัตินี้เรียกว่าการรวม (merging)
reviewed: true
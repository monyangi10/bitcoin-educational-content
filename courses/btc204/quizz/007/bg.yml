question: Какво представлява сливането при транзакция?
answer: Това е действието за използване на множество UTXOs като входове.
wrong_answers:
  - Това е действието по създаване на множество UTXO като изходи.
  - Това е актът на комбиниране на няколко адреса в един.
  - Това е актът на комбиниране на няколко блока в блокчейна.
explanation: |
  Когато потребителят няма UTXO, по-голям или равен на сумата, която иска да изпрати, той трябва да използва няколко от своите UTXO, за да задоволи изходите. Тази практика се нарича сливане.
reviewed: true
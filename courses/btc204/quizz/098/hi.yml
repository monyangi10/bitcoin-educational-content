question: फॉरवर्ड एनोनिमिटी क्या मापती है?
answer: गोपनीयता का अतीत से वर्तमान तक के विश्लेषण के खिलाफ प्रतिरोध।
wrong_answers:
  - गोपनीयता का वर्तमान से अतीत के विश्लेषण के खिलाफ प्रतिरोध।
  - गोपनीयता का भविष्य-से-वर्तमान विश्लेषण के खिलाफ प्रतिरोध।
  - भविष्य से अतीत के विश्लेषण के खिलाफ निजता का प्रतिरोध।
explanation: |
आगे की गुमनामी (Forward anonymity) एक सिक्के की प्राइवेसी के उस प्रतिरोध को मापती है जो पिछले से वर्तमान विश्लेषण (इनपुट से आउटपुट) के खिलाफ होता है।

question: การไม่เปิดเผยตัวตนไปข้างหน้าวัดอะไร?
answer: ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากอดีตถึงปัจจุบัน
wrong_answers:
  - ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากปัจจุบันสู่อดีต
  - ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากอนาคตสู่ปัจจุบัน
  - ความต้านทานของความเป็นส่วนตัวต่อการวิเคราะห์จากอนาคตสู่อดีต
explanation: |
  การไม่เปิดเผยตัวตนไปข้างหน้าวัดความต้านทานของความเป็นส่วนตัวของเหรียญต่อการวิเคราะห์จากอดีตถึงปัจจุบัน (จากอินพุตถึงเอาต์พุต)
reviewed: true
question: Какво измерва анонимността на предаването?
answer: Съпротивата на неприкосновеността на личния живот срещу анализа на миналото и настоящето.
wrong_answers:
  - Съпротивата на неприкосновеността на личния живот срещу анализа на настоящето и миналото.
  - Съпротивата на неприкосновеността на личния живот срещу анализа "от бъдещето към настоящето".
  - Съпротивата на неприкосновеността на личния живот срещу анализа на бъдещето и миналото.
explanation: |
  Анонимността в посока напред измерва устойчивостта на поверителността на монетата срещу анализ от минало към настояще (от вход към изход).
  
reviewed: true
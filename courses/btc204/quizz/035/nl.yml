question: Wie ontdekte de adreshergebruik heuristiek van Address hergebrui?
answer: Satoshi Nakamoto
wrong_answers:
  - Vitalik Buterin
  - Hal Finney
  - Gavin Andresen
explanation: |
  De eerste persoon die dit concept besprak was Satoshi Nakamoto in deel 10 van het Bitcoin Witboek.

question: Защо координаторът не може да модифицира транзакцията coinjoin, след като събере подписите на всички участници?
answer: Промяната му ще доведе до невалидност на транзакцията.
wrong_answers:
  - Те нямат достъп до получаващите адреси на участниците.
  - Подписите са криптирани.
  - Транзакцията вече е излъчена в мрежата Bitcoin.
explanation: |
  След като участниците са подписали цялата транзакция, след като са се уверили, че всичко е правилно, координаторът вече не може да променя тази транзакция, включително резултатите, без да я обяви за невалидна, тъй като подписът обхваща цялата транзакция.
  
reviewed: true
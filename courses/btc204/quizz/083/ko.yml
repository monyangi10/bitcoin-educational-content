question: 코디네이터가 모든 참가자의 서명을 수집한 후 CoinJoin 트랜잭션을 수정할 수 없는 이유는 무엇인가요?
answer: 이를 수정하면 트랜잭션이 무효화됩니다.
wrong_answers:
  - 참가자의 수신 주소에 액세스할 수 없습니다.
  - 서명은 암호화되어 있습니다.
  - 트랜잭션은 이미 Bitcoin 네트워크에서 브로드캐스트되었습니다.
explanation: |
  참가자가 전체 트랜잭션에 서명한 후에는 모든 것이 올바른지 확인한 후 서명이 전체 트랜잭션에 적용되므로 코디네이터는 더 이상 출력을 포함한 이 트랜잭션을 무효화하지 않고는 수정할 수 없습니다.
  
reviewed: true
question: コーディネーターがすべての参加者から署名を集めた後、なぜコインジョイン・トランザクションを変更できないのですか？

answer: 変更するとトランザクションが無効になるため

wrong_answers:
  - 参加者の受取アドレスにアクセスできないため
  - 署名が暗号化されているため
  - トランザクションは既にビットコインネットワーク上でブロードキャストされているため

explanation: |
  参加者が全体のトランザクションに署名し、すべてが正しいことを確認した後、コーディネーターはそのトランザクションを、出力を含む、無効にすることなく変更することはできません。なぜなら、署名はトランザクション全体をカバーしているからです。


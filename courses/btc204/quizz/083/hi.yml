question: कोऑर्डिनेटर CoinJoin ट्रांजैक्शन को सभी प्रतिभागियों के सिग्नेचर इकट्ठा करने के बाद क्यों नहीं बदल सकता?
answer: इसे बदलने से लेन-देन अमान्य हो जाएगा।
wrong_answers:
  - उन्हें प्रतिभागियों के प्राप्त करने वाले पते तक पहुंच नहीं है।
  - हस्ताक्षर एन्क्रिप्टेड हैं।
  - लेन-देन पहले ही Bitcoin नेटवर्क पर प्रसारित हो चुका है।
explanation: |
एक बार सभी भागीदारों ने पूरे लेन-देन पर हस्ताक्षर कर दिए, और यह सुनिश्चित कर लिया कि सब कुछ सही है, तो कोऑर्डिनेटर अब इस लेन-देन को बदल नहीं सकता, जिसमें आउटपुट्स भी शामिल हैं, बिना इसे अमान्य किए, क्योंकि हस्ताक्षर पूरे लेन-देन को कवर करता है।
reviewed: false
question: ทำไมผู้ประสานงานไม่สามารถแก้ไขธุรกรรม coinjoin หลังจากรวบรวมลายเซ็นจากผู้เข้าร่วมทั้งหมดแล้ว?
answer: การแก้ไขจะทำให้ธุรกรรมเป็นโมฆะ
wrong_answers:
  - พวกเขาไม่มีสิทธิ์เข้าถึงที่อยู่รับของผู้เข้าร่วม
  - ลายเซ็นถูกเข้ารหัสแล้ว
  - ธุรกรรมได้ถูกกระจายบนเครือข่าย Bitcoin แล้ว
explanation: |
  เมื่อลงนามในธุรกรรมทั้งหมดแล้ว หลังจากตรวจสอบให้แน่ใจว่าทุกอย่างถูกต้อง ผู้ประสานงานจะไม่สามารถแก้ไขธุรกรรมนี้ได้อีกต่อไป รวมถึงผลลัพธ์ด้วย โดยไม่ทำให้ธุรกรรมเป็นโมฆะ เนื่องจากลายเซ็นครอบคลุมธุรกรรมทั้งหมด
reviewed: true
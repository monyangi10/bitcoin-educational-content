question: 자동 결제에서 레이블의 용도는 무엇인가요?
answer: 스캔 작업량을 부당하게 늘리지 않고 여러 개의 서로 다른 정적 주소를 사용하려면.
wrong_answers:
  - 거래의 실제 수신자를 숨기기 위해 자동 결제 거래를 암호화합니다.
  - 외부 관찰자가 연결할 수 없는 여러 개의 서로 다른 정적 주소를 사용하려면.
  - 결제 참조 방식으로 자동 결제를 식별할 수 있도록 Blockchain에 눈에 띄는 라벨을 부착합니다.
explanation: |
  라벨은 하나의 기본 정적 Address에서 여러 개의 정적 주소를 generate에 사용하여 Wallet 구성을 용이하게 합니다. 그러나 스캔 공개 키가 모두 동일하기 때문에 외부 관찰자는 이러한 레이블이 지정된 정적 주소 간의 링크를 쉽게 설정할 수 있습니다.
reviewed: true
question: साइलेंट पेमेंट्स में लेबल्स का क्या उद्देश्य है?
answer: बिना स्कैनिंग के काम को बेवजह बढ़ाए, कई अलग-अलग स्थिर पतों का इस्तेमाल करना।
wrong_answers:
  - साइलेंट पेमेंट्स लेनदेन को एन्क्रिप्ट करने के लिए ताकि लेनदेन के असली प्राप्तकर्ता को छुपाया जा सके।
  - बाहरी नज़र रखने वाले को जोड़ न सके, ऐसे कई अलग-अलग स्थिर पतों का इस्तेमाल करना।
  - Blockchain पर एक दिखने वाला लेबल लगाना है जो साइलेंट पेमेंट्स को पेमेंट रेफरेंस की तरह पहचानने में मदद करे।
explanation: |
लेबल्स का इस्तेमाल generate को मुख्य स्थिर Address से कई स्थिर पतों को जोड़ने के लिए किया जाता है, जिससे Wallet का संगठन आसान हो जाता है। हालाँकि, एक बाहरी पर्यवेक्षक आसानी से इन लेबल किए गए स्थिर पतों के बीच एक कड़ी स्थापित कर सकता है, क्योंकि स्कैन पब्लिक की सभी के लिए एक ही होती है।

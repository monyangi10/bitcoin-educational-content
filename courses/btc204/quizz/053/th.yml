question: วัตถุประสงค์ของป้ายกำกับใน Silent Payments คืออะไร?
answer: ในการใช้ที่อยู่คงที่หลาย ๆ ที่โดยไม่เพิ่มภาระงานการสแกนอย่างไม่สมเหตุสมผล
wrong_answers:
  - เพื่อเข้ารหัสธุรกรรม Silent Payments เพื่อซ่อนผู้รับที่แท้จริงของธุรกรรม
  - ในการใช้ที่อยู่แบบคงที่หลาย ๆ ที่ไม่สามารถเชื่อมโยงโดยผู้สังเกตการณ์ภายนอกได้
  - เพื่อวางป้ายกำกับที่มองเห็นได้บนบล็อกเชนเพื่อระบุ Silent Payments ในลักษณะของการอ้างอิงการชำระเงิน
explanation: |
  ป้ายกำกับถูกใช้เพื่อ generate ที่อยู่คงที่หลายรายการจากที่อยู่คงที่หลักเดียว อำนวยความสะดวกในการจัดระเบียบ wallet อย่างไรก็ตาม ผู้สังเกตการณ์ภายนอกสามารถสร้างลิงก์ระหว่างที่อยู่คงที่ที่มีป้ายกำกับเหล่านี้ได้อย่างง่ายดาย เนื่องจากคีย์สาธารณะการสแกนเหมือนกันทั้งหมด
reviewed: true
question: Какво е предназначението на етикетите в тихите плащания?
answer: Използване на множество различни статични адреси, без да се увеличава необосновано работното натоварване при сканиране.
wrong_answers:
  - Криптиране на транзакциите Silent Payments, за да се скрие истинският получател на транзакцията.
  - Използване на няколко различни статични адреса, които не могат да бъдат свързани от външен наблюдател.
  - Поставяне на видим етикет в блокчейна за идентифициране на тихите плащания по подобие на референция за плащане.
explanation: |
  Етикетите се използват за създаването множество статични адреси от един основен статичен адрес, което улеснява организацията на портфейла. Външен наблюдател обаче може лесно да установи връзка между тези маркирани статични адреси, тъй като публичният ключ за сканиране е един и същ за всички.
reviewed: true

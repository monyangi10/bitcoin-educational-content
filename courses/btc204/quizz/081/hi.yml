question: CoinJoin में कोऑर्डिनेटर को इनपुट और आउटपुट को लिंक करने से रोकने के लिए कौन सी क्रिप्टोग्राफ़िक विधि का उपयोग किया जाता है?
answer: चौम ब्लाइंड सिग्नेचर्स।
wrong_answers:
  - स्नोर सिग्नेचर्स।
  - जीडब्ल्यू-1 पते।
  - जीडब्ल्यू-2 पते।
explanation: |
तथाकथित चौमियन कॉइनजॉइन्स में, यूजर्स को यह सुनिश्चित करने के लिए टॉर और डेविड चौम के ब्लाइंड सिग्नेचर्स का इस्तेमाल किया जाता है कि कोऑर्डिनेटर को पता न चले कि कौन सा आउटपुट किस यूजर का है।
reviewed: false
question: Какъв криптографски метод се използва, за да се попречи на координатора да свърже входовете и изходите при coinjoin?
answer: Слепи подписи на Чаум.
wrong_answers:
  - Подписи на Schnorr.
  - Адреси P2SH.
  - Адреси на P2TR.
explanation: |
  При така наречените Chaumian coinjoins се комбинира използването на Tor и слепите подписи на Дейвид Чаум, за да се гарантира, че координаторът не може да знае кой изход принадлежи на кой потребител.
  
reviewed: true
question: วิธีการเข้ารหัสใดที่ใช้เพื่อป้องกันไม่ให้ผู้ประสานงานเชื่อมโยงอินพุตและเอาต์พุตใน coinjoin?
answer: ลายเซ็นแบบบอดของ Chaum
wrong_answers:
  - ลายเซ็นชอร์
  - P2SH ที่อยู่
  - P2TR ที่อยู่
explanation: |
  ในสิ่งที่เรียกว่า Chaumian coinjoins การใช้ Tor และลายเซ็นต์แบบไม่เปิดเผยของ David Chaum ถูกผสมผสานเพื่อให้แน่ใจว่าผู้ประสานงานไม่สามารถรู้ได้ว่าผลลัพธ์ใดเป็นของผู้ใช้คนใด
reviewed: true
question: What is the primary security mechanism that ensures Greenlight infrastructure cannot access user funds despite hosting Lightning nodes in the cloud?
answer: Private keys never leave user devices and all operations require active application signing
wrong_answers:
  - Multi-signature wallets with distributed key shards across multiple cloud providers
  - Hardware security modules that encrypt all transactions before cloud processing
  - Time-locked smart contracts that automatically return funds if unauthorized access occurs
explanation: |
  The Breeze SDK maintains security through a trustless architecture where private keys remain exclusively on user devices. While Greenlight hosts the Lightning node infrastructure, it cannot perform any operations without an actively connected application that can sign transactions and messages. This design ensures that even though the node runs in the cloud, Greenlight never has access to user keys and cannot move funds without explicit user authorization through their local application. The other options describe different security mechanisms that aren't used in this architecture.

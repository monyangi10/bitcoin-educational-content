question: What are the two variants of Rust's Result enum used for handling recoverable errors?
answer: Ok(T) for successful operations and Err(E) for failures
wrong_answers:
  - Success(T) for successful operations and Failure(E) for failures
  - Some(T) for successful operations and None for failures
  - Pass(T) for successful operations and Panic(E) for failures
explanation: |
  The Result enum in Rust has exactly two variants: Ok(T) which contains a successful value of type T, and Err(E) which contains an error of type E. This design forces developers to explicitly handle both success and failure cases. The other options are incorrect - Success/Failure are not Result variants, Some/None belong to the Option enum for handling null values, and Pass/Panic are not standard Rust enum variants for error handling.

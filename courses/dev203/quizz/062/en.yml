question: What is the primary advantage of using the `cargo expand` command when developing complex macros in Rust?
answer: It displays the fully expanded code generated by macro invocations, allowing developers to verify the generated output and debug issues
wrong_answers:
  - It automatically optimizes macro performance by reducing compilation time and eliminating redundant pattern matching branches
  - It validates macro syntax at runtime and provides real-time error checking for dynamic macro argument validation
  - It converts function-like macros into derive macros automatically, improving code reusability and trait implementation efficiency
explanation: |
  The `cargo expand` command is invaluable for macro development because it reveals the actual code that macros generate during compilation. Since macros operate at compile-time and transform input patterns into generated code, developers need to see this expanded output to verify their macros work correctly. This is especially crucial when macro-generated code contains errors, as the expanded output helps determine whether issues stem from the macro definition itself or the structure of the generated code. The other options are incorrect because `cargo expand` is purely a debugging and inspection tool - it doesn't optimize performance, validate runtime behavior, or automatically convert between macro types.

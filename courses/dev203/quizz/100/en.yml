question: What is the primary architectural advantage that enables LDK to function in WebAssembly browser environments where traditional Lightning nodes cannot operate?
answer: LDK's system-call-free design philosophy allows it to operate without direct access to file systems, network sockets, or entropy sources
wrong_answers:
  - "LDK's modular Rust library structure automatically provides WebAssembly compatibility through native Rust-to-WASM compilation features"
  - "LDK's event-driven architecture eliminates the need for persistent connections and can operate entirely through HTTP request-response cycles"
  - "LDK's lightweight blockchain integration reduces memory usage sufficiently to meet WebAssembly's strict resource constraints and limitations"
explanation: |
  LDK's system-call-free design is specifically what enables browser compatibility. Traditional Lightning nodes rely on direct system calls for networking, file I/O, and randomness, which WebAssembly environments prohibit for security reasons. LDK abstracts these dependencies, allowing developers to provide browser-compatible implementations using WebSockets for networking and browser APIs for persistence and randomness, while maintaining full Lightning protocol compliance.

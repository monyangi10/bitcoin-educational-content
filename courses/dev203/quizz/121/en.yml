question: What is the primary mechanism by which Breeze SDK's zero-channel reserves feature creates additional risk that must be absorbed by Lightning Service Providers?
answer: LSPs must accept the risk of users spending their complete channel balance, eliminating the safety buffer that traditionally protects against channel force closures
wrong_answers:
  - LSPs become responsible for maintaining continuous network graph synchronization across multiple user devices without traditional reserve-based fee compensation
  - LSPs must guarantee instant payment routing without the liquidity cushion that channel reserves provide for handling network congestion scenarios
  - LSPs assume liability for on-chain swap failures when users attempt to convert their full Lightning balance to Bitcoin during high-fee periods
explanation: |
  Zero-channel reserves allow users to spend their complete displayed balance, but this eliminates the traditional safety buffer that protects Lightning Service Providers during channel force closures. Channel reserves typically ensure that some funds remain locked to cover closing costs and provide security against malicious behavior. By removing these reserves to improve user experience, LSPs must absorb the additional operational and financial risks that these buffers were designed to mitigate, representing a clear trade-off where technical complexity and risk are shifted from users to service providers.

bio: |
  Получив образование дизайнера интерьеров и архитектора, я хотел связать свои космические проекты с моей страстью к технологиям и Bitcoin. Взламывая предметы и соединяя их с решениями второго уровня, я обнаружил простой и веселый способ популяризации Bitcoin через интерактивный опыт. Сегодня я делюсь этим подходом, чтобы помочь всем понять, поэкспериментировать и создать свои собственные интерактивные проекты.
  

bio: |
  Sisekujundaja ja arhitekti haridusega tahtsin siduda oma ruumiprojektid oma kirega tehnoloogia ja Bitcoin vastu. Objektide häkkimise ja nende ühendamise kaudu teise kihi lahendustega avastasin lihtsa ja lõbusa viisi, kuidas Bitcoin interaktiivsete kogemuste kaudu populariseerida. Täna jagan seda lähenemisviisi, et aidata kõigil mõista, katsetada ja luua oma interaktiivseid projekte.
  

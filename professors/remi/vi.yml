bio: |
  Được đào tạo bài bản về thiết kế nội thất và kiến trúc, tôi muốn kết nối các dự án không gian của mình với niềm đam mê công nghệ và Bitcoin. Bằng cách hack các vật thể và kết nối chúng với các giải pháp lớp thứ hai, tôi đã khám phá ra một cách đơn giản và thú vị để phổ biến Bitcoin thông qua các trải nghiệm tương tác. Hôm nay, tôi chia sẻ cách tiếp cận này để giúp mọi người hiểu, thử nghiệm và xây dựng các dự án tương tác của riêng mình.

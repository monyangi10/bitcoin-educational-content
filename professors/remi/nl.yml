bio: |
  Opgeleid als binnenhuisarchitect en architect, wilde ik mijn ruimteprojecten koppelen aan mijn passie voor technologie en Bitcoin. Door objecten te hacken en ze te verbinden met second layer oplossingen, ontdekte ik een eenvoudige en leuke manier om Bitcoin populair te maken door middel van interactieve ervaringen. Vandaag deel ik deze aanpak om iedereen te helpen bij het begrijpen, experimenteren en bouwen van hun eigen interactieve projecten.
  
short_bio: Ontwerper
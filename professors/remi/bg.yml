bio: |
  Имам образование на интериорен дизайнер и архитект, но исках да свържа проектите си в областта на пространството с моята страст към технологиите и Bitcoin. Чрез хакване на обекти и свързването им с решения от второ ниво открих прост и забавен начин да популяризирам Bitcoin чрез интерактивни преживявания. Днес споделям този подход, за да помогна на всички да разберат, експериментират и създадат свои собствени интерактивни проекти.
  

bio: |
  Jeg er utdannet interiørdesigner og arkitekt, og ønsket å knytte romprosjektene mine til min lidenskap for teknologi og Bitcoin. Ved å hacke objekter og koble dem til løsninger i andre lag, oppdaget jeg en enkel og morsom måte å popularisere Bitcoin på gjennom interaktive opplevelser. I dag deler jeg denne tilnærmingen for å hjelpe alle med å forstå, eksperimentere og bygge sine egne interaktive prosjekter.
  
short_bio: Designer
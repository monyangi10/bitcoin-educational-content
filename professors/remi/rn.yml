bio: |
  Narize ubuhinga bwo guhingura ibintu vyo mu nzu n’ubwubatsi, nashaka guhuza imigambi yanje yo mu kirere n’ivyo nkunda cane mu vy’ubuhinga bwa none be na Bitcoin. Mu gucapura ibintu no kubihuza n’ibisubizo vy’urugero rwa kabiri, narabonye uburyo bworoshe kandi bushimishije bwo gukwiragiza Bitcoin biciye mu bikorwa vy’ubuhinga. Uyu musi, ndababwira ubu buryo bwo gufasha umuntu wese gutahura, kugerageza no kwubaka imigambi yiwe y’ugukorana.
  
short_bio: Umuhinguzi
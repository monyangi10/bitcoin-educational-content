bio: |
  Ausgebildet als Innenarchitektin und Architektin, wollte ich meine Raumprojekte mit meiner Leidenschaft für Technologie und Bitcoin verbinden. Indem ich Objekte hackte und sie mit Lösungen der zweiten Ebene verband, entdeckte ich einen einfachen und unterhaltsamen Weg, Bitcoin durch interaktive Erfahrungen populär zu machen. Heute teile ich diesen Ansatz, um allen zu helfen, zu verstehen, zu experimentieren und ihre eigenen interaktiven Projekte zu bauen.
  

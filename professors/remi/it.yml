bio: |
  Formatosi come designer e architetto d'interni, ho voluto collegare i miei progetti spaziali alla mia passione per la tecnologia e per Bitcoin. Hackerando gli oggetti e collegandoli a soluzioni di secondo livello, ho scoperto un modo semplice e divertente per rendere popolare Bitcoin attraverso esperienze interattive. Oggi condivido questo approccio per aiutare tutti a capire, sperimentare e costruire i propri progetti interattivi.
  

bio: |
  Jag är utbildad inredningsarkitekt och arkitekt och ville koppla mina rymdprojekt till min passion för teknik och Bitcoin. Genom att hacka föremål och ansluta dem till lösningar i andra lagret upptäckte jag ett enkelt och roligt sätt att popularisera Bitcoin genom interaktiva upplevelser. Idag delar jag med mig av detta tillvägagångssätt för att hjälpa alla att förstå, experimentera och bygga sina egna interaktiva projekt.
  
short_bio: Designer
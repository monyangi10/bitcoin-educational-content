bio: |
  İç mimarlık ve mimarlık eğitimi almış biri olarak, mekân projelerimi teknolojiye ve Bitcoin'a olan tutkumla ilişkilendirmek istedim. Nesneleri hackleyerek ve onları ikinci katman çözümlerine bağlayarak, etkileşimli deneyimler yoluyla Bitcoin'ı popülerleştirmenin basit ve eğlenceli bir yolunu keşfettim. Bugün, herkesin kendi interaktif projelerini anlamasına, denemesine ve oluşturmasına yardımcı olmak için bu yaklaşımı paylaşıyorum.
  
short_bio: Tasarımcı
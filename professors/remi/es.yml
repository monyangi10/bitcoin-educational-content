bio: |
  Formado como diseñador de interiores y arquitecto, quería vincular mis proyectos espaciales a mi pasión por la tecnología y Bitcoin. Hackeando objetos y conectándolos a soluciones de segunda capa, descubrí una forma sencilla y divertida de popularizar Bitcoin a través de experiencias interactivas. Hoy comparto este enfoque para ayudar a todo el mundo a entender, experimentar y construir sus propios proyectos interactivos.
  
short_bio: Diseñador
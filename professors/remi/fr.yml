bio: |
  Designer et architecte d’intérieur de formation, j’ai voulu relier mes projets d’espace à ma passion pour la technologie et pour Bitcoin. En hackant des objets et en les connectant aux solutions de second layer, j’ai découvert un moyen simple et ludique de vulgariser Bitcoin à travers des expériences interactives. Aujourd’hui, je partage cette approche pour aider chacun à comprendre, expérimenter et construire ses propres projets interactifs.

short_bio: Designer
bio: |
  Obučen kao dizajner enterijera i arhitekta, želeo sam da povežem svoje projekte prostora sa svojom strašću za tehnologiju i Bitcoin. Hakovanjem objekata i povezivanjem sa rešenjima drugog sloja, otkrio sam jednostavan i zabavan način da popularizujem Bitcoin kroz interaktivna iskustva. Danas delim ovaj pristup kako bih pomogao svima da razumeju, eksperimentišu i izgrade svoje interaktivne projekte.
short_bio: Dizajner
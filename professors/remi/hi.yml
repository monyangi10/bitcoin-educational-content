bio: |
  एक इंटीरियर डिज़ाइनर और आर्किटेक्ट के रूप में प्रशिक्षित, मैं अपनी अंतरिक्ष परियोजनाओं को तकनीक और Bitcoin के प्रति अपने जुनून से जोड़ना चाहता था। वस्तुओं को हैक करके और उन्हें दूसरी परत के समाधानों से जोड़कर, मैंने इंटरैक्टिव अनुभवों के माध्यम से Bitcoin को लोकप्रिय बनाने का एक सरल और मज़ेदार तरीका खोजा। आज, मैं यह तरीका सभी को समझने, प्रयोग करने और अपनी इंटरैक्टिव परियोजनाएँ बनाने में मदद करने के लिए साझा कर रहा हूँ।
  
short_bio: डिजाइनर
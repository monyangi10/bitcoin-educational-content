bio: |
  Dilatih sebagai desainer interior dan arsitek, saya ingin menghubungkan proyek luar angkasa saya dengan hasrat saya terhadap teknologi dan Bitcoin. Dengan meretas objek dan menghubungkannya ke solusi lapisan kedua, saya menemukan cara yang sederhana dan menyenangkan untuk mempopulerkan Bitcoin melalui pengalaman interaktif. Hari ini, saya membagikan pendekatan ini untuk membantu semua orang memahami, bereksperimen, dan membangun proyek interaktif mereka sendiri.
  
short_bio: Desainer
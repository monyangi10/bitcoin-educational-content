bio: |
  Sisustussuunnittelijan ja arkkitehdin koulutuksen saaneena halusin yhdistää tilaprojektini intohimooni teknologiaa ja Bitcoin:ta kohtaan. Hakkeroimalla esineitä ja yhdistämällä ne toisen kerroksen ratkaisuihin löysin yksinkertaisen ja hauskan tavan popularisoida Bitcoin:ta interaktiivisten kokemusten avulla. Tänään jaan tämän lähestymistavan auttaakseni kaikkia ymmärtämään, kokeilemaan ja rakentamaan omia interaktiivisia projektejaan.
  

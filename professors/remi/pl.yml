bio: |
  Z wykształcenia projektant wnętrz i architekt, chciałem połączyć moje projekty kosmiczne z moją pasją do technologii i Bitcoin. Hakując obiekty i łącząc je z rozwiązaniami drugiej warstwy, odkryłem prosty i zabawny sposób na popularyzację Bitcoin poprzez interaktywne doświadczenia. Dziś dzielę się tym podejściem, aby pomóc wszystkim zrozumieć, eksperymentować i tworzyć własne interaktywne projekty.
  
short_bio: Projektant
bio: |
  Vystudovala jsem interiérový design a architekturu a chtěla jsem propojit své projekty v oblasti prostoru se svou vášní pro technologie a Bitcoin. Díky hackování objektů a jejich propojení s řešeními druhé vrstvy jsem objevil jednoduchý a zábavný způsob, jak zpopularizovat Bitcoin prostřednictvím interaktivních zážitků. Dnes se o tento přístup dělím, abych všem pomohl pochopit, experimentovat a vytvářet vlastní interaktivní projekty.
  

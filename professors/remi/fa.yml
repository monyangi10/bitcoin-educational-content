bio: |
  به عنوان یک طراح داخلی و معمار آموزش دیده‌ام، می‌خواستم پروژه‌های فضایی خود را به علاقه‌ام به فناوری و Bitcoin پیوند دهم. با هک کردن اشیاء و اتصال آن‌ها به راه‌حل‌های لایه دوم، راهی ساده و سرگرم‌کننده برای محبوب‌سازی Bitcoin از طریق تجربیات تعاملی کشف کردم. امروز، این رویکرد را به اشتراک می‌گذارم تا به همه کمک کنم تا بفهمند، آزمایش کنند و پروژه‌های تعاملی خود را بسازند.
short_bio: طراح
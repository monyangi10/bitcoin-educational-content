bio: |
  ได้รับการฝึกฝนเป็นนักออกแบบภายในและสถาปนิก ฉันต้องการเชื่อมโยงโครงการพื้นที่ของฉันกับความหลงใหลในเทคโนโลยีและ Bitcoin โดยการแฮ็กวัตถุและเชื่อมต่อกับโซลูชันชั้นที่สอง ฉันค้นพบวิธีที่ง่ายและสนุกในการทำให้ Bitcoin เป็นที่นิยมผ่านประสบการณ์เชิงโต้ตอบ วันนี้ฉันกำลังแบ่งปันแนวทางนี้เพื่อช่วยให้ทุกคนเข้าใจ ทดลอง และสร้างโครงการเชิงโต้ตอบของตนเอง
short_bio: นักออกแบบ
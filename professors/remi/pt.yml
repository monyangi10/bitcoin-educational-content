bio: |
  Formado como designer de interiores e arquiteto, quis associar os meus projectos espaciais à minha paixão pela tecnologia e pelo Bitcoin. Ao piratear objectos e ligá-los a soluções de segunda camada, descobri uma forma simples e divertida de popularizar o Bitcoin através de experiências interactivas. Hoje, partilho esta abordagem para ajudar todos a compreender, experimentar e construir os seus próprios projectos interactivos.
  
short_bio: Designer
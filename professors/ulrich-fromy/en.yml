bio: |
  Ulrich Fromy is a Bitcoin educator and writer specializing in economics, history, and geopolitics. He runs the Café Viennois publication and podcast, where he explores current events, individual freedoms, and economic sovereignty. He contributes to HowtoBitcoin.fr and Mises.org, bringing Austrian economics perspectives to Bitcoin education.

short_bio: Bitcoin educator and writer on economics and history.

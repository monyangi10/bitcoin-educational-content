bio: |
  Hujambo, mimi ni mvulana mwenye shauku ya kutaka kujua kila wakati ambaye hutafuta kujifunza mambo mapya kila wakati. Nina kituo cha YouTube kiitwacho Hatua ya Mwisho Bitcoin, ambapo ninajaribu kufanya dhana changamano za ulimwengu wa Bitcoin kuwa rahisi kueleweka.
  
short_bio: Ninazungumza kuhusu Bitcoin kwenye YouTube.
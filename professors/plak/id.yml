  Hai, saya adalah orang yang selalu ingin tahu dan selalu ingin mempelajari hal-hal baru. Saya memiliki saluran YouTube bernama Final Step Bitcoin, di mana saya mencoba untuk membuat konsep-konsep kompleks dari dunia Bitcoin lebih mudah dipahami.
  
short_bio: Saya berbicara tentang Bitcoin di YouTube.
bio: |
  Terpesona oleh prospek baru yang ditawarkan oleh Bitcoin dalam hal kebebasan dan kedaulatan individu, saya mencurahkan waktu saya untuk mengeksplorasi dan menguji inovasi yang memungkinkan semua orang untuk menggunakan teknologi ini tanpa keahlian teknis sebelumnya. Jika saya bisa melakukannya, siapa pun bisa.
  
short_bio: Penggemar Bitcoin
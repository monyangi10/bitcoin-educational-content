bio: |
  Fasciné par les các quan điểm mới về Bitcoin en terme de libertés et de souveraineté individuelle, je consacre mon temps à explorer et test les đổi mới qui permettent à chacun de s'approper cette technologie sans chuyên môn kỹ thuật có thể bán được. Nếu tôi đến nơi, chào đón người đến.
  

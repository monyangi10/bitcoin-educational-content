bio: |
  Bị cuốn hút bởi những triển vọng mới mà Bitcoin mang lại về mặt tự do và chủ quyền cá nhân, tôi dành thời gian để khám phá và thử nghiệm những đổi mới cho phép mọi người tiếp cận công nghệ này mà không cần bất kỳ chuyên môn kỹ thuật nào. Nếu tôi làm được, bất kỳ ai cũng có thể làm được.
short_bio: Người đam mê Bitcoin
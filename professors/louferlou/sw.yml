bio: |
  Nikiwa nimevutiwa na matarajio mapya yanayotolewa na Bitcoin katika suala la uhuru na uhuru wa mtu binafsi, ninatumia wakati wangu kuchunguza na kujaribu ubunifu unaowezesha kila mtu kutumia teknolojia hii bila ujuzi wowote wa kiufundi. Ikiwa naweza kuifanya, mtu yeyote anaweza.
  
short_bio: Mpenzi wa Bitcoin
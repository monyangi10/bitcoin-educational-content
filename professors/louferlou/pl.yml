bio: |
  Zafascynowany nowymi perspektywami oferowanymi przez Bitcoin w zakresie wolności i suwerenności jednostki, poświęcam swój czas na odkrywanie i testowanie innowacji, które umożliwiają każdemu korzystanie z tej technologii bez wcześniejszej wiedzy technicznej. Jeśli ja mogę to zrobić, to każdy może.
  
short_bio: Entuzjasta Bitcoin
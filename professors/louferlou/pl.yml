bio: |
  Zafascynowany nowymi perspektywami, jakie oferuje Bitcoin w zakresie wolności i indywidualnej suwerenności, poświęcam czas na odkrywanie i testowanie innowacji, które pozwalają każdemu na zastosowanie tej technologii bez wcześniejszej wiedzy specjalistycznej. Jeśli ja się pojawię, cały świat może się pojawić.
  

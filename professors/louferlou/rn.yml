bio: |
  Nshimishijwe n’ivyizigiro bishasha Bitcoin itanga mu bijanye n’umwidegemvyo n’ubusegaba bw’umuntu ku giti ciwe, ndatanga umwanya wanje mu gutohoza no kugerageza ubuhinga bushasha bushoboza umuntu wese kwikoresha ubu buhinga ata buhinga bwo mu vy’ubuhinga afise imbere y’aho. Nimba nshobora kubikora, umuntu wese arashobora.
  
short_bio: Umukunzi wa Bitcoin
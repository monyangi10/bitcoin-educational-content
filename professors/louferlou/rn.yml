bio: |
  Fascined par les perspectives nouvelles qu'o Bitcoin mu bijanye n'umwidegemvyo n'ukwibuka kw'umuntu ku giti ciwe, n'ibihe vyinshi vyo gutohoza no kugerageza ubuhinga bushasha bushobora gutuma umuntu abona ubuhinga bubereye ata buhinga bushobora gukoreshwa. Si j’y gushika, n’ubundi bushobora gushika.
  

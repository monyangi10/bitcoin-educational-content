bio: |
  Bitcoin:n tarjoamat uudet vapauden ja yksilön itsemääräämisoikeuden näkymät kiehtovat minua, joten käytän aikaani sellaisten innovaatioiden tutkimiseen ja testaamiseen, joiden avulla jokainen voi käyttää tätä teknologiaa ilman aiempaa teknistä asiantuntemusta. Jos minä pystyn siihen, kuka tahansa pystyy.
  

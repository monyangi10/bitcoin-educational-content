bio: |
  Bitcoin:n tarjoamat uudet näkymät yksilön vapauden ja itsemääräämisoikeuden alalla kiehtovat minua, ja käytän aikaani tutkiakseni ja testatakseni innovaatioita, jotka antavat jokaiselle mahdollisuuden käyttää tätä teknologiaa ilman ennakkotietämystä. Jos minä pääsen perille, koko maailma pääsee perille.
  

bio: |
  Gefascineerd door de nieuwe vooruitzichten die Bitcoin biedt op het gebied van vrijheid en individuele soevereiniteit, besteed ik mijn tijd aan het onderzoeken en testen van innovaties die iedereen in staat stellen zich deze technologie toe te eigenen zonder enige technische voorkennis. Als ik het kan, kan iedereen het.
  
short_bio: Bitcoin liefhebber
bio: |
  Affascinato dalle nuove prospettive offerte dal Bitcoin in termini di libertà e sovranità individuale, dedico il mio tempo a esplorare e testare innovazioni che consentano a tutti di appropriarsi di questa tecnologia senza alcuna competenza tecnica preliminare. Se posso farlo io, può farlo chiunque.
  
short_bio: Appassionato di Bitcoin
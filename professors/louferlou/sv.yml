bio: |
  Jag är fascinerad av de nya möjligheter som Bitcoin erbjuder när det gäller frihet och individuell suveränitet, och jag ägnar min tid åt att utforska och testa innovationer som gör det möjligt för alla att använda denna teknik utan föregående teknisk expertis. Om jag kan göra det, kan vem som helst göra det.
  
short_bio: Bitcoin-entusiast
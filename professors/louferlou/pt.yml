bio: |
  Fascinado pelas novas perspectivas oferecidas pelo Bitcoin em termos de liberdade e soberania individual, dedico o meu tempo a explorar e testar inovações que permitam a todos apropriarem-se desta tecnologia sem qualquer conhecimento técnico prévio. Se eu posso fazê-lo, qualquer um pode.
  
short_bio: Entusiasta do Bitcoin
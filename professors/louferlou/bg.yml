bio: |
  Очарован от новите перспективи, които Bitcoin предлага по отношение на свободата и индивидуалния суверенитет, посвещавам времето си на проучване и тестване на иновации, които позволяват на всеки да използва тази технология без предварителни технически познания. Щом аз мога да го направя, значи всеки може.
  
short_bio: Ентусиаст на Bitcoin
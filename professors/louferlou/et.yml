bio: |
  Kuna mind paeluvad Bitcoin poolt pakutavad uued väljavaated vabaduse ja individuaalse suveräänsuse osas, pühendan oma aega uuenduste uurimisele ja katsetamisele, mis võimaldavad kõigil seda tehnoloogiat ilma eelnevate tehniliste oskusteta kasutada. Kui mina saan seda teha, siis igaüks saab seda teha.
  

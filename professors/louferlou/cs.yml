bio: |
  Fascinován novými perspektivami, které Bitcoin nabízí z hlediska svobody a osobní suverenity, věnuji svůj čas zkoumání a testování inovací, které umožňují každému, aby si tuto technologii přivlastnil bez jakýchkoli předchozích technických znalostí. Když to dokážu já, dokáže to každý.
  
short_bio: Nadšenec do Bitcoin
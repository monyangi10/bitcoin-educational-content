bio: |
  Jeg er fascinert av de nye mulighetene Bitcoin gir når det gjelder frihet og individuell suverenitet, og jeg bruker tiden min på å utforske og teste innovasjoner som gjør det mulig for alle å tilegne seg denne teknologien uten teknisk ekspertise på forhånd. Hvis jeg kan gjøre det, kan hvem som helst gjøre det.
  
short_bio: Bitcoin-entusiast
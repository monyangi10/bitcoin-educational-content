bio: |
  Очарованный новыми перспективами, которые открывает Bitcoin в плане свободы и суверенитета личности, я посвящаю свое время изучению и тестированию инноваций, которые позволяют каждому человеку использовать эту технологию без предварительного опыта. Если я приду, весь мир сможет прийти".
  

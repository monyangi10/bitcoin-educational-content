bio: |
  Увлеченный новыми перспективами, которые открывает Bitcoin с точки зрения свободы и суверенитета личности, я посвящаю свое время изучению и тестированию инноваций, которые позволят каждому воспользоваться этой технологией без каких-либо предварительных технических знаний. Если это могу сделать я, это может сделать каждый.
  
short_bio: Энтузиаст Bitcoin
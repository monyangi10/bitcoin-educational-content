bio: |
  Fasziniert von den neuen Perspektiven, die Bitcoin im Hinblick auf die Freiheit und Souveränität des Einzelnen bietet, nehme ich mir die Zeit, die Innovationen zu erforschen und zu testen, die es jedem ermöglichen, sich diese Technologie ohne vorhersehbares technisches Know-how anzueignen. Wenn ich ankomme, kann die ganze Welt auch ankommen.
  

bio: |
  Fasziniert von den neuen Perspektiven, die Bitcoin im Hinblick auf Freiheit und individuelle Souveränität bietet, widme ich meine Zeit der Erforschung und Erprobung von Innovationen, die es jedem ermöglichen, sich diese Technologie ohne technische Vorkenntnisse anzueignen. Wenn ich es kann, kann es jeder.
  
short_bio: Bitcoin-Enthusiast
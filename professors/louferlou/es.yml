bio: |
  Fascinado por las nuevas perspectivas que ofrece el Bitcoin en términos de libertad y soberanía individual, dedico mi tiempo a explorar y probar innovaciones que permitan a todo el mundo apropiarse de esta tecnología sin necesidad de conocimientos técnicos previos. Si yo puedo hacerlo, cualquiera puede.
  
short_bio: Entusiasta de Bitcoin
bio: |
  شیفته‌ی چشم‌اندازهای جدیدی که Bitcoin در زمینه‌ی آزادی و حاکمیت فردی ارائه می‌دهد، وقتم را به کاوش و آزمایش نوآوری‌هایی اختصاص می‌دهم که به همه امکان می‌دهد بدون هیچ تخصص فنی قبلی این فناوری را به کار گیرند. اگر من می‌توانم این کار را انجام دهم، هر کسی می‌تواند.
short_bio: Bitcoin علاقه‌مند
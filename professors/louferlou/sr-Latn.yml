bio: |
  Fasciniran novim mogućnostima koje nudi Bitcoin u smislu slobode i individualnog suvereniteta, posvećujem svoje vreme istraživanju i testiranju inovacija koje omogućavaju svima da prisvoje ovu tehnologiju bez ikakvog prethodnog tehničkog znanja. Ako ja to mogu, svako može.

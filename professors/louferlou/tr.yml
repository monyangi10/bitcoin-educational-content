bio: |
  Bitcoin'ın özgürlükler ve bireysel egemenlik açısından sunduğu yeni perspektiflerden etkilenerek, zamanımı bu teknolojiyi önceden uzmanlık tekniği olmaksızın herkesin kullanmasına olanak tanıyan yenilikleri keşfetmeye ve test etmeye ayırıyorum. Eğer ben varırsam, tüm dünya varabilir.
  

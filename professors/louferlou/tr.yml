bio: |
  Bitcoin'ın özgürlük ve bireysel egemenlik açısından sunduğu yeni beklentilerden etkilenerek, zamanımı herkesin bu teknolojiyi önceden herhangi bir teknik uzmanlığa sahip olmadan kullanabilmesini sağlayan yenilikleri keşfetmeye ve test etmeye adadım. Ben yapabiliyorsam, herkes yapabilir.
  

bio: |
  2017'de Bitcoin tavşan deliğinden aşağı hissettim. Bitcoin beni büyülüyor. Yenilikçi ve çok karmaşık bir teknoloji, ancak vaatlerle dolu. Ben zamanımı Bitcoin eğitimine adamaya karar vermiş tutkulu bir bitcoin kullanıcısıyım! LN 201'in yaratıcısıyım ve LN Markets'te çalışıyorum.
  

bio: |
  Nilihisi chini ya shimo la sungura la Bitcoin mwaka wa 2017. Bitcoin inanivutia. Ni teknolojia ya ubunifu na ngumu sana, lakini iliyojaa ahadi. Mimi ni bitcoiner mwenye shauku ambaye aliamua kujitolea wakati wangu kwa elimu ya Bitcoin! Mimi ndiye mtayarishi wa LN 201 na ninafanya kazi katika Masoko ya LN.
  
short_bio: Mchawi wa LN
bio: |
  Narumvise nmanutse mu mwobo w’inkwavu wa Bitcoin mu 2017. Bitcoin iranshimisha cane. Ni ubuhinga bushasha kandi butoroshe cane, ariko buzuye amasezerano. Ndi umunya bitcoiner afise urukundo rwinshi nafashe ingingo yo gutanga umwanya wanje mu burezi bwa Bitcoin! Ndi umuremyi wa LN 201 kandi nkora ku masoko ya LN.
  
short_bio: LN Umupfumu
bio: |
  През 2017 г. се почувствах в заешката дупка на Bitcoin. Bitcoin ме очарова. Това е иновативна и много сложна технология, но пълна с обещания. Аз съм страстен биткойнър, който реши да посвети времето си на обучението по Bitcoin! Аз съм създател на LN 201 и работя в LN Markets.
  
short_bio: Магьосник LN
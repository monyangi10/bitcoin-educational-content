bio: |
  In 2017 voelde ik me in het Bitcoin konijnenhol. Bitcoin fascineert me. Het is een innovatieve en zeer complexe technologie, maar vol beloftes. Ik ben een gepassioneerde bitcoiner die besloot mijn tijd te wijden aan Bitcoin onderwijs! Ik ben de maker van LN 201 en werk bij LN Markets.
  
short_bio: LN Tovenaar
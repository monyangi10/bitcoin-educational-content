bio: |
  Jag kände mig ner i Bitcoin-kaninhålet 2017. Bitcoin fascinerar mig. Det är en innovativ och mycket komplex teknik, men full av löften. Jag är en passionerad bitcoiner som bestämde mig för att ägna min tid åt Bitcoin-utbildning! Jag är skaparen av LN 201 och arbetar på LN Markets.
  
short_bio: LN Trollkarl
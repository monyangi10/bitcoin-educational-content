bio: |
  W 2017 roku poczułem się jak w króliczej norze Bitcoin. Bitcoin mnie fascynuje. To innowacyjna i bardzo złożona technologia, ale pełna obietnic. Jestem pasjonatem bitcoinerów, który postanowił poświęcić swój czas na edukację Bitcoin! Jestem twórcą LN 201 i pracuję w LN Markets.
  
short_bio: Kreator LN
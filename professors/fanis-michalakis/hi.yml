bio: |
  2017 में मैंने Bitcoin के जाल में फँसने का अनुभव किया। Bitcoin मुझे आकर्षित करता है। यह एक अभिनव और बेहद जटिल तकनीक है, लेकिन संभावनाओं से भरी है। मैं एक उत्साही बिटकॉइनर हूँ जिसने अपना समय Bitcoin शिक्षा के लिए समर्पित करने का फैसला किया है! मैं LN 201 का निर्माता हूँ और LN मार्केट्स में काम करता हूँ।
  
short_bio: LN विज़ार्ड
bio: |
    Tether Tim. Pokrenut 2014. godine, Tether je platforma sa podrškom za Blockchain dizajnirana da olakša korišćenje fiat valuta na digitalni način. Tether radi na tome da poremeti konvencionalni finansijski sistem putem modernijeg pristupa novcu. Tether je postigao napredak omogućavajući korisnicima da obavljaju transakcije sa tradicionalnim valutama preko Blockchain, bez inherentne volatilnosti i složenosti koje su obično povezane sa digitalnom valutom. Kao prva platforma sa podrškom za Blockchain koja olakšava digitalno korišćenje tradicionalnih valuta (poznata, stabilna računovodstvena jedinica), Tether je demokratizovao transakcije preko granica putem Blockchain.

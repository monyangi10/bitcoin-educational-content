bio: |
    Tether Team. Tether werd gelanceerd in 2014 en is een platform met Blockchain, ontworpen om het gebruik van fiatvaluta's op een digitale manier te vergemakkelijken. Tether probeert het conventionele financiële systeem te ontwrichten via een modernere benadering van geld. Tether heeft vooruitgang geboekt door klanten de mogelijkheid te geven om transacties te doen met traditionele valuta via een Blockchain, zonder de inherente volatiliteit en complexiteit die typisch zijn voor een digitale valuta. Als eerste platform met Blockchain-ondersteuning dat het digitale gebruik van traditionele valuta (een vertrouwde, stabiele rekeneenheid) mogelijk maakt, heeft Tether grensoverschrijdende transacties over een Blockchain gedemocratiseerd.
    

bio: |
    Ishirahamwe ry’Imirongo. Tether yatangujwe mu mwaka w’2014, ni urubuga rukoreshwa na Blockchain rwagenewe gufasha gukoresha amafaranga y’amahera mu buryo bwa digitale. Tether ikora kugira ngo ihungabanye uburyo busanzwe bwo gukoresha amahera biciye mu buryo bugezweho bwo gukoresha amahera. Tether yarateye imbere mu guha abakiriya ubushobozi bwo gukoresha amafaranga y’agaciro mu Blockchain, ata guhinduka n’ugusobanuka bisanzwe bifitaniye isano n’amafaranga y’ubuhinga bwa none. Nk'urubuga rwa mbere rukoreshwa na Blockchain rwo kworohereza ikoreshwa ry'amafaranga y'agaciro (ikigo gisanzwe, gikomeye c'ubuhinga bwo guharura amafaranga), Tether yaratumye habaho demokarasi y'amafaranga ajabuka imipaka biciye kuri Blockchain.
    
short_bio: Ishirahamwe ry’Imirongo.
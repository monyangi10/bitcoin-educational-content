bio: |
  Strastven u vezi sa Bitcoin i uveren da je obrazovanje ključ, želim da podelim sa vama malo znanja koje imam i tako doprinesem usvajanju Bitcoin. Inače, veliki sam fan Pink Floyda, učim da programiram i pravim mimove. Radujem se susretu na sledećem okupljanju!
  Ja sam tvorac kursa obuke BTC 205 - Rešenje za kupovinu bez KYC.

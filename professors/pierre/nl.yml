bio: |
  Gepassioneerd door Bitcoin en ervan overtuigd dat onderwijs de sleutel is, wil ik de weinige kennis die ik heb met jullie delen en zo bijdragen aan de adoptie van Bitcoin. Verder ben ik een grote fan van Pink Floyd, leer ik coderen en maak ik memes. Ik kijk ernaar uit je te ontmoeten bij de volgende meet-up!
  Ik ben de maker van de training BTC 205 - Non-KYC Purchase Solution.
  
short_bio: KYC is oplichterij
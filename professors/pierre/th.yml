bio: |
  หลงใหลใน Bitcoin และเชื่อมั่นว่าการศึกษาเป็นกุญแจสำคัญ ฉันต้องการแบ่งปันความรู้เล็กๆ น้อยๆ ที่ฉันมีและมีส่วนร่วมในการนำ Bitcoin มาใช้ นอกจากนี้ ฉันยังเป็นแฟนตัวยงของ Pink Floyd กำลังเรียนรู้การเขียนโค้ด และทำมีม รอคอยที่จะพบคุณในงานพบปะครั้งหน้า!
  
  ฉันเป็นผู้สร้างหลักสูตรฝึกอบรม BTC 205 - Non-KYC Purchase Solution.
short_bio: KYC เป็นการหลอกลวง
bio: |
  Pasjonat Bitcoin i przekonany, że edukacja jest kluczem, chciałbym podzielić się z wami niewielką wiedzą, którą posiadam, a tym samym przyczynić się do przyjęcia Bitcoin. Poza tym jestem wielkim fanem Pink Floyd, uczę się kodować i tworzę memy. Nie mogę się doczekać spotkania na następnym meet-upie!
  Jestem twórcą szkolenia BTC 205 - Rozwiązanie zakupowe bez KYC.
  
short_bio: KYC to oszustwo
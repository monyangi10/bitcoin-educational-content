bio: |
  Kubera ko nkunda cane Bitcoin kandi nemera neza ko uburezi ari bwo buhambaye, nipfuza kubasangiza ubumenyi buke mfise, gutyo nkagira ico nterereye mu kwemera Bitcoin. Ahandi ho, ndi umufana akomeye wa Pink Floyd, ndiko ndiga gukora code, kandi nkora memes. Turategereje ko tuzobonana mu nama izokurikira!
  Ndi umuremyi w'amahugurwa BTC 205 - Umuti wo kugura utari KYC.
  
short_bio: KYC ni ubuhendanyi
bio: |
  Bitcoin konusunda tutkulu ve eğitimin anahtar olduğuna inanan biri olarak, sahip olduğum küçük bilgileri sizlerle paylaşmak ve böylece Bitcoin'ın benimsenmesine katkıda bulunmak istiyorum. Bunun dışında, Pink Floyd'un büyük bir hayranıyım, kod yazmayı öğreniyorum ve memler yapıyorum. Bir sonraki buluşmada sizinle tanışmak için sabırsızlanıyorum!
  BTC 205 - Non-KYC Satın Alma Çözümü eğitim kursunun yaratıcısıyım.
  

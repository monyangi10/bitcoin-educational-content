bio: |
  مشتاق به Bitcoin و معتقد به اینکه آموزش کلید است، مایلم دانشی که دارم را با شما به اشتراک بگذارم و به این ترتیب به پذیرش Bitcoin کمک کنم. در غیر این صورت، من یک طرفدار بزرگ پینک فلوید هستم، در حال یادگیری کدنویسی هستم و میم می‌سازم. مشتاقانه منتظر دیدار شما در ملاقات بعدی هستم!
  من خالق دوره آموزشی BTC 205 - راه‌حل خرید بدون KYC هستم.
short_bio: KYC یک کلاهبرداری است
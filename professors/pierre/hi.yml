bio: |
  Bitcoin के प्रति जुनूनी और शिक्षा को इसकी कुंजी मानते हुए, मैं आपके साथ अपना थोड़ा सा ज्ञान साझा करना चाहता हूँ और इस तरह Bitcoin को अपनाने में योगदान देना चाहता हूँ। वैसे, मैं पिंक फ़्लॉइड का बहुत बड़ा प्रशंसक हूँ, मैं कोडिंग सीख रहा हूँ और मीम्स बनाता हूँ। अगले मीट-अप में आपसे मिलने का इंतज़ार रहेगा!
  मैं BTC 205 - नॉन-KYC परचेज सॉल्यूशन नामक प्रशिक्षण पाठ्यक्रम का निर्माता हूँ।
  

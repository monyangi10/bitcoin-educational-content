bio: |
  Запален по Bitcoin и убеден, че ключът е в образованието, искам да споделя с вас малкото знания, които имам, и по този начин да допринеса за приемането на Bitcoin. Иначе съм голям фен на Pink Floyd, уча се да програмирам и правя мемета. С нетърпение очаквам да се срещнем на следващата среща! Създател съм на обучителния курс БТК 205 - Решение за покупка на стоки, които не са предмет на криптография.
  
short_bio: KYC е измама

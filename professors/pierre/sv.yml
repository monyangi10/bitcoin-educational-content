bio: |
  Passionerad om Bitcoin och övertygad om att utbildning är nyckeln, vill jag dela med mig av den lilla kunskap jag har och därmed bidra till antagandet av Bitcoin. Annars är jag ett stort fan av Pink Floyd, jag lär mig att koda och jag gör memes. Ser fram emot att träffa dig på nästa möte!
  Jag är skaparen av utbildningskursen BTC 205 - Non-KYC Purchase Solution.
  
short_bio: KYC är en bluff
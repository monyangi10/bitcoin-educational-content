bio: |
  Kwa shauku kuhusu Bitcoin na kusadikishwa kwamba elimu ndio ufunguo, ningependa kushiriki nanyi ujuzi mdogo nilionao na hivyo kuchangia katika kupitishwa kwa Bitcoin. Vinginevyo, mimi ni shabiki mkubwa wa Pink Floyd, ninajifunza kuweka msimbo, na ninatengeneza meme. Tunatazamia kukutana nawe kwenye mkutano unaofuata!
  Mimi ndiye muundaji wa kozi ya mafunzo ya BTC 205 - Suluhisho la Ununuzi lisilo la KYC.
  
short_bio: KYC ni kashfa
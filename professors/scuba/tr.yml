bio: |
  Yaşam boyu öğrenen, öğrenmeyi ve bilgiyi paylaşmayı seven biriyim. Dalış ve astronomiye olan tutkum nedeniyle tavşan deliğine düştüğümde ekonomiden teknolojiye Bitcoin'ın derinliklerini keşfetmeye başlamam çok doğaldı.
  
short_bio: Meraklı ve tutkulu kaşif, ekonomi ve teknoloji arasında Bitcoin'in derinliklerine heyecanla dalıyor.
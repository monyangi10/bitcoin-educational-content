bio: |
  Livslang student, jeg elsker å lære og dele kunnskap. Som en lidenskapelig dykker og astronom var det naturlig å utforske dypet av Bitcoin – fra økonomi til teknologi – etter å ha falt ned i kaninhullet.

short_bio: Nysgjerrig og lidenskapelig oppdagelsesreisende som dykker entusiastisk ned i Bitcoinkunnskap – mellom økonomi og teknologi.

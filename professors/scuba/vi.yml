bio: |
  Người học suốt đời, tôi yêu thích việc học hỏi và chia sẻ kiến thức. Đam mê lặn biển và thiên văn học, nên khi rơi vào “hang thỏ”, tôi đã tự nhiên bắt đầu khám phá độ sâu của Bitcoin – từ kinh tế đến công nghệ.

short_bio: Nhà thám hiểm tò mò và đầy đam mê, tôi lặn sâu vào thế giới Bitcoin giữa kinh tế và công nghệ.

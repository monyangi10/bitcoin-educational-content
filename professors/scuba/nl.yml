bio: |
  Een leven lang leren, ik hou ervan om te leren en kennis te delen. Gepassioneerd door duiken en astronomie, was het niet meer dan logisch dat toen ik in het konijnenhol viel, ik de diepten van Bitcoin ging verkennen - van economie tot technologie.
  
short_bio: Nieuwsgierige en gepassioneerde ontdekkingsreiziger, enthousiast duikend in de diepten van Bitcoin, tussen economie en technologie.
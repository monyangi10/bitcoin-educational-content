bio: |
  Eluaegne õppija, mulle meeldib õppida ja oma teadmisi jagada. Kirgliku sukelduja ja astronoomiahuvilisena oli loomulik, et kui sattusin jäneseurgu, hakkasin avastama Bitcoini sügavusi – majandusest tehnoloogiani.

short_bio: Uudishimulik ja kirglik uurija, kes sukeldub entusiastlikult Bitcoini sügavustesse, majanduse ja tehnoloogia ristumiskohas.

bio: |
  Étudiant à vie, j'aime apprendre & partager ma connaissance. Passionné de plongée & d'astronomie, il était évident qu'en tombant dans le terrier du lapin, que j'aille explorer les différents fonds dans Bitcoin, de l'économie à la tech.

short_bio: Explorateur curieux et passionné, je plonge avec enthousiasme dans les profondeurs de Bitcoin, entre économie et technologie.
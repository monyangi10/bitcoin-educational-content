bio: |
  Вечный ученик, я люблю учиться и делиться знаниями. Увлечённый дайвингом и астрономией, я естественным образом, оказавшись в кроличьей норе, начал исследовать глубины Биткоина — от экономики до технологий.

short_bio: Любознательный и страстный исследователь, с энтузиазмом погружаюсь в глубины Биткоина между экономикой и технологиями.

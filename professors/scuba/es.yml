bio: |
  Estudiante de por vida, me encanta aprender y compartir mi conocimiento. Apasionado por el buceo y la astronomía, era natural que al caer en la madriguera del conejo, me pusiera a explorar las profundidades de Bitcoin, desde la economía hasta la tecnología.

short_bio: Explorador curioso y apasionado, me sumerjo con entusiasmo en las profundidades de Bitcoin, entre economía y tecnología.

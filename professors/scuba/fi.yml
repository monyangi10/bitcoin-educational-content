bio: |
  Elinikäinen oppija, rakastan oppimista ja tiedon jakamista. Sukelluksen ja tähtitieteen intoilijana oli luonnollista, että pudottuani kaninkoloon lähdin tutkimaan Bitcoiniin kätkeytyviä syvyyksiä taloudesta teknologiaan.

short_bio: Utelias ja intohimoinen tutkija, joka sukeltuu innokkaasti Bitcoiniin – talouden ja teknologian syvyyksiin.

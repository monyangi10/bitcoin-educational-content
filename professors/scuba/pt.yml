bio: |
  Estudante para a vida toda, adoro aprender e partilhar conhecimento. Apaixonado por mergulho e astronomia, foi natural que, ao cair na toca do coelho, fosse explorar as profundezas do Bitcoin – da economia à tecnologia.

short_bio: Explorador curioso e apaixonado, mergulho com entusiasmo nas profundezas do Bitcoin, entre economia e tecnologia.

bio: |
  یادگیرنده مادام‌العمر، من عاشق یادگیری و به اشتراک‌گذاری دانش هستم. با علاقه به غواصی و نجوم، طبیعی بود که وقتی به دنیای ناشناخته‌ها وارد شدم، به کاوش در اعماق Bitcoin پرداختم – از اقتصاد تا فناوری.
short_bio: کاوشگر کنجکاو و پرشور، با اشتیاق به اعماق Bitcoin، بین اقتصاد و فناوری فرو می‌رود.
bio: |
  Livslång student, jag älskar att lära mig och dela kunskap. Som en passionerad dykare och astronom var det självklart att jag, efter att ha fallit ner i kaninhålet, skulle utforska Bitcoinkunskapens djup – från ekonomi till teknik.

short_bio: Nyfiken och passionerad upptäcktsresande som entusiastiskt dyker ner i Bitcoins djup, mellan ekonomi och teknik.

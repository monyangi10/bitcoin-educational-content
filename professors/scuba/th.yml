bio: |
  ผู้เรียนรู้ตลอดชีวิต ฉันรักการเรียนรู้และการแบ่งปันความรู้ หลงใหลในการดำน้ำและดาราศาสตร์ มันเป็นเรื่องธรรมดาที่เมื่อฉันตกลงไปในหลุมกระต่าย ฉันก็ไปสำรวจความลึกของ Bitcoin – ตั้งแต่เศรษฐศาสตร์ไปจนถึงเทคโนโลยี
short_bio: นักสำรวจที่อยากรู้อยากเห็นและมีความหลงใหล ดำดิ่งอย่างกระตือรือร้นสู่ความลึกของ Bitcoin ระหว่างเศรษฐศาสตร์และเทคโนโลยี
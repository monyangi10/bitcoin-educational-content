bio: |
  Celoživotní student, rád se učím a sdílím své znalosti. Jako vášnivý potápěč a milovník astronomie bylo přirozené, že když jsem spadl do králičí nory, začal jsem zkoumat hlubiny Bitcoinu – od ekonomie až po technologie.

short_bio: Zvědavý a zapálený průzkumník, který se s nadšením ponořil do hlubin Bitcoinu, mezi ekonomikou a technologií.

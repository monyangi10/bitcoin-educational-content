bio: |
  Mwanafunzi wa maisha, napenda kujifunza na kushiriki maarifa. Kwa kuwa nina shauku na uogeleaji wa kina na astronomia, ilikuwa wazi kwamba nilipoanguka kwenye shimo la sungura, nilianza kuchunguza undani wa Bitcoin — kutoka uchumi hadi teknolojia.

short_bio: Mvumbuzi mwenye shauku na udadisi, ninazama kwa shauku katika kina cha Bitcoin kati ya uchumi na teknolojia.

bio: |
  Doživotni učenik, volim da učim i delim znanje. Strastven prema ronjenju i astronomiji, bilo je sasvim prirodno da, kada sam pao u zečju rupu, krenem da istražujem dubine Bitcoin – od ekonomije do tehnologije.
short_bio: Radoznao i strastveno istraživač, entuzijasta ronjenja koji se s entuzijazmom upušta u dubine Bitcoin, između ekonomije i tehnologije.
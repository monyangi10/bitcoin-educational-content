bio: |
  Umwigishwa w’ubuzima bwose, ndakunda kwiga no gusangira ubumenyi. Kubera ko nkunda cane kwibira mu mazi no kumenya inyenyeri, vyari bimenyerewe ko igihe nagwa mu mwobo w’inkwavu, nja gutohoza uburebure bwa Bitcoin – kuva ku bukungu gushika ku buhinga.
  
short_bio: Umuntu ashaka kumenya vyinshi kandi afise urukundo rwinshi, yisuka n’igishika mu bwimbike bwa Bitcoin, hagati y’ubutunzi n’ubuhinga.
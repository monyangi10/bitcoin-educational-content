bio: |
  Lebenslanger Lerner, ich liebe es zu lernen und mein Wissen zu teilen. Als leidenschaftlicher Taucher und Astronom war es nur logisch, dass ich beim Sturz in den Kaninchenbau die Tiefen von Bitcoin erkunde – von der Ökonomie bis zur Technik.

short_bio: Neugieriger und leidenschaftlicher Entdecker, der mit Begeisterung in die Tiefen von Bitcoin eintaucht – zwischen Wirtschaft und Technologie.

bio: |
  Uczeń przez całe życie, uwielbiam się uczyć i dzielić wiedzą. Zafascynowany nurkowaniem i astronomią, naturalnie, po wpadnięciu do króliczej nory, zacząłem eksplorować głębiny Bitcoina – od ekonomii po technologię.

short_bio: Ciekawski i pełen pasji odkrywca, zanurzający się z entuzjazmem w głębiny Bitcoina, między ekonomią a technologią.

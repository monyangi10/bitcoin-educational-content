bio: |
  Pembelajar seumur hidup, saya senang belajar dan berbagi pengetahuan. Sebagai penggemar menyelam dan astronomi, masuk ke lubang kelinci dan menjelajahi kedalaman Bitcoin—dari ekonomi hingga teknologi—menjadi hal yang alami bagi saya.

short_bio: Penjelajah yang penasaran dan penuh semangat, menyelami kedalaman Bitcoin antara ekonomi dan teknologi.

bio: |
  Studente a vita, amo imparare e condividere la conoscenza. Appassionato di immersioni e astronomia, era naturale che, caduto nella tana del coniglio, mi mettessi a esplorare le profondità di Bitcoin, dall’economia alla tecnologia.

short_bio: Esploratore curioso e appassionato, mi immergo con entusiasmo nelle profondità di Bitcoin tra economia e tecnologia.

bio: |
  ජීවිතය පුරාම අධ්‍යාපන ශිෂ්‍යයෙකු වන මම ඉගෙන ගැනීමට සහ තම දැනුම බෙදා ගැනීමට ආසයි. ගිලීම සහ නාසන විද්‍යාව පිළිබඳ ආශාවක් ඇති නිසා, සතුටින්ම Bitcoin හි ආර්ථිකය සිට තාක්ෂණය දක්වා ගැඹුරු මට්ටම් තොගයක් ගවේෂණය කළෙමි.

short_bio: කුතුහලයෙන් සහ ආශාවෙන් යුතු ගවේෂකයෙකු ලෙස, මම Bitcoin හි ගැඹුරු මට්ටම්වලට උද්යෝගයෙන් මුළුන් වෙමි — ආර්ථිකය සහ තාක්ෂණය අතරින්.

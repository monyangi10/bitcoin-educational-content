bio: |
  Уча се през целия живот, обичам да уча и да споделям знания. Страстен любител на гмуркането и астрономията, съвсем естествено беше, че когато паднах в заешката дупка, започнах да изследвам дълбините на Bitcoin - от икономиката до технологиите.
  
short_bio: Любопитен и страстен изследовател, който с ентусиазъм се гмурка в дълбините на Bitcoin, между икономиката и технологиите.
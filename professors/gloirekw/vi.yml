bio: |
  Với niềm đam mê về Bitcoin, tôi là đồng sáng lập Hội nghị Bitcoin Châu Phi và các sáng kiến lớn khác tại Cộng hòa Dân chủ Congo nhằm thúc đẩy việc áp dụng Bitcoin. Tôi hỗ trợ các doanh nghiệp Bitcoin mong muốn thành lập và phát triển tại lục địa Châu Phi.
short_bio: Cofondateur Châu Phi Bitcoin Hội nghị & Cầu Sats
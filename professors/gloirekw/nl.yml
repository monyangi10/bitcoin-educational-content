bio: |
  Gepassioneerd door Bitcoin, ben ik medeoprichter van de Afrika Bitcoin Conferentie en andere belangrijke initiatieven in de Democratische Republiek Congo om de adoptie ervan te promoten. Ik ondersteun Bitcoin bedrijven die zich willen vestigen en groeien op het Afrikaanse continent.
  
short_bio: Cofondateur Afrika Bitcoin Conferentie & Brug Sats
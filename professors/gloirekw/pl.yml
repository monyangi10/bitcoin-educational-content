bio: |
  Pasjonat Bitcoin, jestem współzałożycielem Africa Bitcoin Conference i innych ważnych inicjatyw w Demokratycznej Republice Konga promujących jego przyjęcie. Wspieram firmy Bitcoin, które chcą założyć i rozwijać się na kontynencie afrykańskim.
  
short_bio: Cofondateur Africa Bitcoin Conference & Bridge Sats
bio: |
  Bitcoin के प्रति जुनूनी, मैं अफ्रीका Bitcoin सम्मेलन और कांगो लोकतांत्रिक गणराज्य में इसके उपयोग को बढ़ावा देने के लिए अन्य प्रमुख पहलों का सह-संस्थापक हूँ। मैं उन Bitcoin व्यवसायों का समर्थन करता हूँ जो अफ्रीकी महाद्वीप पर स्थापित और विकसित होना चाहते हैं।
  
short_bio: कोफ़ॉन्डेटर अफ़्रीका Bitcoin सम्मेलन और ब्रिज Sats
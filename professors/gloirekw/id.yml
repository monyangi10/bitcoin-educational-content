bio: |
  Saya sangat antusias dengan Bitcoin, saya adalah salah satu pendiri Konferensi Bitcoin Afrika dan inisiatif besar lainnya di Republik Demokratik Kongo untuk mempromosikan pengadopsiannya. Saya mendukung bisnis Bitcoin yang ingin membangun dan berkembang di benua Afrika.
  
short_bio: Cofondateur Afrika Bitcoin Konferensi & Jembatan Sats
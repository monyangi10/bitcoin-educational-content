bio: |
  Увлеченный Bitcoin, я являюсь одним из основателей Африканской конференции Bitcoin и других крупных инициатив в Демократической Республике Конго по продвижению ее внедрения. Я поддерживаю компании, желающие создать и развивать Bitcoin на африканском континенте.
  
short_bio: Кофонд Африка Bitcoin Конференция и мост Sats
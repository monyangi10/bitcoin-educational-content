bio: |
  Kuna olen Bitcoin suhtes kirglik, olen Aafrika Bitcoin konverentsi ja teiste suuremate algatuste kaasasutajaks Kongo Demokraatlikus Vabariigis, et edendada selle kasutuselevõtmist. Toetan Bitcoin ettevõtteid, kes soovivad luua ja kasvada Aafrika mandril.
  
short_bio: Cofondateur Africa Bitcoin Konverents ja sild Sats
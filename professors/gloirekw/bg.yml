bio: |
  Запален по Bitcoin, аз съм съосновател на Африканската конференция за Bitcoin и на други важни инициативи в Демократична република Конго за насърчаване на приемането му. Подкрепям предприятия, които искат да се установят и развиват на африканския континент.
  

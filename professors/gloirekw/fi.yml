bio: |
  Olen innostunut Bitcoin:sta, ja olen mukana perustamassa Afrikan Bitcoin-konferenssia ja muita merkittäviä aloitteita Kongon demokraattisessa tasavallassa sen käyttöönoton edistämiseksi. Tuen Bitcoin-yrityksiä, jotka haluavat perustaa ja kasvaa Afrikan mantereella.
  
short_bio: Cofondateur Africa Bitcoin Konferenssi ja silta Sats
bio: |
  Bitcoin konusunda tutkuluyum, Afrika Bitcoin Konferansı'nın ve Demokratik Kongo Cumhuriyeti'nde benimsenmesini teşvik etmek için diğer büyük girişimlerin kurucularından biriyim. Afrika kıtasında kurulmak ve büyümek isteyen Bitcoin işletmelerini destekliyorum.
  
short_bio: Cofondateur Afrika Bitcoin Konferans ve Köprü Sats
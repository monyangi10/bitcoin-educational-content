bio: |
  Als leidenschaftlicher Anhänger von Bitcoin bin ich Mitbegründer der Bitcoin-Konferenz in Afrika und anderer wichtiger Initiativen in der Demokratischen Republik Kongo zur Förderung der Einführung von Bitcoin. Ich unterstütze Bitcoin-Unternehmen, die sich auf dem afrikanischen Kontinent niederlassen und wachsen wollen.
  
short_bio: Cofondateur Afrika Bitcoin Konferenz & Brücke Sats
bio: |
  Nina shauku kuhusu Bitcoin, mimi ni mwanzilishi mwenza wa Mkutano wa Afrika wa Bitcoin na mipango mingine mikuu katika Jamhuri ya Kidemokrasia ya Kongo ili kukuza kupitishwa kwake. Ninaunga mkono biashara za Bitcoin ambazo zingependa kuanzisha na kukua katika bara la Afrika.
  
short_bio: Cofondateur Africa Bitcoin Conference & Bridge Sats
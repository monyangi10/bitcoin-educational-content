bio: |
  Jeg er lidenskapelig opptatt av Bitcoin, og jeg er en av grunnleggerne av Africa Bitcoin Conference og andre store initiativer i Den demokratiske republikken Kongo for å fremme innføringen av Bitcoin. Jeg støtter Bitcoin-virksomheter som ønsker å etablere seg og vokse på det afrikanske kontinentet.
  
short_bio: Cofondateur Africa Bitcoin Konferanse og bro Sats
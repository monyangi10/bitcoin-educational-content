bio: |
  Jsem nadšenec pro Bitcoin, spoluzakladatel konference Africa Bitcoin a dalších významných iniciativ v Demokratické republice Kongo na podporu jeho přijetí. Podporuji podniky Bitcoin, které se chtějí na africkém kontinentu etablovat a rozvíjet.
  
short_bio: Cofondateur Africa Bitcoin Konference a most Sats
bio: |
  Kubera ko nkunda cane Bitcoin, ndi umwe mu bashinze Inama y’Afrika Bitcoin n’izindi nzira zikomeye muri Repubulika iharanira demokarasi ya Kongo kugira ngo yemezwe. Ndashigikiye ubucuruzi bwa Bitcoin bwipfuza gushinga intahe no gukura ku mugabane wa Afirika.
  
short_bio: Umushingwamanza wa Afirika Bitcoin Inama & Ikiraro Sats.
bio: |
  Thibaut Gress is a French philosopher, author, and educator. An alumnus of the ENS (École Normale Supérieure), he holds the agrégation and a doctorate in philosophy. He teaches philosophy in Classes Préparatoires at ENC Blomet, as well as at ICP and ESJ. He founded and served as editor-in-chief of the journal Actu-Philosophia and is a regular contributor to Revue Conflits. He has published approximately fifteen books, primarily focused on 17th-century philosophy, where he investigates the genesis of liberalism through lectures and analytical work.

short_bio: Philosopher and author specializing in liberalism

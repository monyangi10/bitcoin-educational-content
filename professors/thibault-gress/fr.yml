bio: |
  Thibaut Gress est un philosophe, auteur et enseignant français. Ancien élève de l'ENS (École Normale Supérieure), il est agrégé et docteur en philosophie. Il enseigne la philosophie en Classes Préparatoires à l'ENC Blomet, ainsi qu'à l'ICP et à l'ESJ. Il a fondé et dirigé la revue Actu-Philosophia et contribue régulièrement à la Revue Conflits. Il a publié une quinzaine d'ouvrages, principalement consacrés à la philosophie du XVIIe siècle, où il étudie la genèse du libéralisme à travers des cours et des travaux analytiques.

short_bio: Philosophe et auteur spécialiste du libéralisme

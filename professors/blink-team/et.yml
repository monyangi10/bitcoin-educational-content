bio: |
  Blink on lihtsasti kasutatav ja turvaline Lightning wallet, mis võimaldab igaühel hõlpsasti hallata oma Bitcoin makseid. Tänu Stablesatsi integreerimisele pakub see võimalust hoida, saata ja vastu võtta raha Bitcoin või stabiilimüntides, hõlbustades samal ajal Lightning Network igapäevast kasutamist.
  
short_bio: Lihtsalt kasutatav Lightning Network hooldusvahend wallet
bio: |
  Blink on lihtsalt kasutatav ja turvaline Lightning Wallet, mis võimaldab igaühel hõlpsasti hallata oma Bitcoin makseid. Tänu Stablesatsi integreerimisele pakub see võimalust hoida, saata ja vastu võtta raha Bitcoin või stablecoine, hõlbustades samal ajal Lightning Network igapäevast kasutamist.
  

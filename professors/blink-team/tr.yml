bio: |
  Blink, herkesin Wallet ödemelerini kolayca yönetmesine olanak tanıyan, kullanımı kolay ve güvenli bir Lightning Bitcoin'dir. Stablesats entegrasyonu ile Lightning Network'ın günlük kullanımını kolaylaştırırken, Bitcoin veya stablecoin cinsinden para tutma, gönderme ve alma olanağı sunar.
  

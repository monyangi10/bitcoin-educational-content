bio: |
  Il Blink è un Lightning wallet facile da usare e sicuro, che consente a tutti di gestire facilmente i propri pagamenti in Bitcoin. Con l'integrazione di Stablesats, offre la possibilità di detenere, inviare e ricevere fondi in Bitcoin o stablecoin, facilitando al contempo l'uso quotidiano del Lightning Network.
  
short_bio: Lightning Network custode facile da usare wallet
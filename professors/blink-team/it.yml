bio: |
  Blink è un Lightning Wallet facile da usare e sicuro che consente a tutti di gestire facilmente i propri pagamenti in Bitcoin. Grazie all'integrazione di Stablesats, offre la possibilità di detenere, inviare e ricevere fondi in Bitcoin o stablecoin, facilitando al contempo l'uso quotidiano di Lightning Network.
  

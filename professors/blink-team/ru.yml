bio: |
  Blink - это простая в использовании и безопасная система Lightning Wallet, которая позволяет всем желающим легко управлять своими платежами в Bitcoin. Благодаря интеграции Stablesats он позволяет хранить, отправлять и получать средства в Bitcoin или стабильных монетах, облегчая при этом ежедневное использование Lightning Network.
  

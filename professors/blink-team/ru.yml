bio: |
  Blink - это простой в использовании и безопасный Lightning wallet, который позволяет всем легко управлять своими платежами в Bitcoin. Благодаря интеграции Stablesats он позволяет хранить, отправлять и получать средства в Bitcoin или стабильных монетах, облегчая при этом ежедневное использование Lightning Network.
  
short_bio: Простой в использовании Lightning Network, хранительский wallet
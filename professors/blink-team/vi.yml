bio: |
  Blink là một Lightning wallet dễ sử dụng và bảo mật, cho phép mọi người dễ dàng quản lý các khoản thanh toán Bitcoin của mình. Với việc tích hợp Stablesats, nó cung cấp khả năng nắm giữ, gửi và nhận tiền bằng Bitcoin hoặc stablecoin, đồng thời tạo điều kiện thuận lợi cho việc sử dụng Lightning Network hàng ngày.
  
  
short_bio: Lightning Network dễ sử dụng wallet
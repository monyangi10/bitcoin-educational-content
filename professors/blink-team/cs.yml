bio: |
  Blink je snadno použitelný a bezpečný blesk wallet, který umožňuje každému snadno spravovat své platby Bitcoin. Díky integraci Stablesats nabízí možnost držet, posílat a přijímat prostředky v Bitcoin nebo stablecoinech a zároveň usnadňuje každodenní používání Lightning Network.
  
short_bio: Snadné použití Lightning Network kustod wallet
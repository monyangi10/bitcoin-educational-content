bio: |
  Blink adalah Lightning wallet yang mudah digunakan dan aman yang memungkinkan semua orang mengelola pembayaran Bitcoin mereka dengan mudah. Dengan integrasi Stablesats, Blink menawarkan kemampuan untuk menyimpan, mengirim, dan menerima dana dalam Bitcoin atau stablecoin, sekaligus memfasilitasi penggunaan Lightning Network sehari-hari.
  
short_bio: Lightning Network kustodian wallet yang mudah digunakan
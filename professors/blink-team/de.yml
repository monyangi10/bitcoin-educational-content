bio: |
  Blink ist ein benutzerfreundliches und sicheres Lightning Wallet, das es jedem ermöglicht, seine Bitcoin-Zahlungen einfach zu verwalten. Mit der Integration von Stablesats bietet es die Möglichkeit, Gelder in Bitcoin oder Stablecoins zu halten, zu senden und zu empfangen, während es die tägliche Nutzung des Lightning Network erleichtert.
  

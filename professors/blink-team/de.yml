bio: |
  Blink ist ein einfach zu bedienendes und sicheres Lightning-wallet, mit dem jeder seine Bitcoin-Zahlungen einfach verwalten kann. Mit der Integration von Stablesats bietet es die Möglichkeit, Gelder in Bitcoin oder Stablecoins zu halten, zu senden und zu empfangen, während es die tägliche Nutzung des Lightning Network erleichtert.
  
short_bio: Leicht zu handhaben Lightning Network für die Aufbewahrung wallet
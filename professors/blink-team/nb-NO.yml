bio: |
  Blink er en brukervennlig og sikker Lightning wallet som gjør det enkelt for alle å administrere sine Bitcoin-betalinger. Med integrasjonen av Stablesats gir den muligheten til å oppbevare, sende og motta penger i Bitcoin eller stablecoins, samtidig som den forenkler den daglige bruken av Lightning Network.
  
short_bio: Lightning Network er enkel å bruke wallet
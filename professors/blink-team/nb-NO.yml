bio: |
  Blink er en brukervennlig og sikker Lightning Wallet som gjør det enkelt for alle å administrere sine Bitcoin-betalinger. Med integrasjonen av Stablesats gir det muligheten til å oppbevare, sende og motta penger i Bitcoin eller stablecoins, samtidig som det forenkler den daglige bruken av Lightning Network.
  

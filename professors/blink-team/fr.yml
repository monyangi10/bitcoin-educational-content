bio: |
  Équipe de Blink - Blink est un portefeuille Lightning facile à utiliser et sécurisé, permettant à chacun de gérer facilement ses paiements en bitcoins. Grâce à l’intégration de Stablesats, il offre la possibilité de détenir, d’envoyer et de recevoir des fonds en bitcoins ou en dollars stables, tout en facilitant l’utilisation quotidienne du Lightning Network.


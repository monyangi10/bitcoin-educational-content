bio: |
  Blink est un Lightning wallet facile à utiliser et sécurisé qui permet à chacun de gérer facilement ses paiements Bitcoin. Avec l'intégration de Stablesats, il offre la possibilité de conserver, d'envoyer et de recevoir des fonds en Bitcoin ou en stablecoins, tout en facilitant l'utilisation quotidienne du Lightning Network.
  
short_bio: Lightning Network facile à utiliser wallet de garde
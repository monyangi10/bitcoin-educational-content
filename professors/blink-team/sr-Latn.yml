bio: |
  Blink je jednostavan za korišćenje i siguran Lightning wallet koji omogućava svima da lako upravljaju svojim Bitcoin plaćanjima. Sa integracijom Stablesats, nudi mogućnost držanja, slanja i primanja sredstava u Bitcoin ili stabilnim koinima, dok olakšava svakodnevnu upotrebu Lightning Network.
short_bio: Jednostavan za korišćenje Lightning Network skrbnički wallet
bio: |
  O Blink é um Lightning wallet fácil de usar e seguro que permite a todos gerenciar facilmente seus pagamentos em Bitcoin. Com a integração do Stablesats, ele oferece a capacidade de manter, enviar e receber fundos em Bitcoin ou stablecoins, facilitando o uso diário do Lightning Network.
  
short_bio: Fácil de utilizar Lightning Network custodial wallet
bio: |
  Blink ni Lightning Wallet yoroshe gukoresha kandi itekanye ituma umuntu wese ashobora gucungera neza amahera yiwe ya Bitcoin. Mu gushiramwo Stablesats, itanga ubushobozi bwo gufata, kohereza, no kwakira amahera mu Bitcoin canke stablecoins, mu gihe yorosha gukoresha Lightning Network ku musi ku musi.
  

bio: |
  Blink เป็น Lightning wallet ที่ใช้งานง่ายและปลอดภัย ช่วยให้ทุกคนสามารถจัดการการชำระเงิน Bitcoin ได้อย่างง่ายดาย ด้วยการผสานรวม Stablesats มันมีความสามารถในการถือ ส่ง และรับเงินใน Bitcoin หรือ stablecoins ในขณะที่อำนวยความสะดวกในการใช้งานประจำวันของ Lightning Network
short_bio: ใช้งานง่าย Lightning Network custodial wallet
bio: |
  Blink är en lättanvänd och säker Lightning Wallet som gör det möjligt för alla att enkelt hantera sina Bitcoin-betalningar. Med integrationen av Stablesats erbjuder det möjligheten att hålla, skicka och ta emot pengar i Bitcoin eller stablecoins, samtidigt som det underlättar den dagliga användningen av Lightning Network.
  

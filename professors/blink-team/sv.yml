bio: |
  Blink är en lättanvänd och säker Lightning wallet som gör det möjligt för alla att enkelt hantera sina Bitcoin-betalningar. Med integrationen av Stablesats erbjuder den möjligheten att hålla, skicka och ta emot medel i Bitcoin eller stablecoins, samtidigt som den underlättar den dagliga användningen av Lightning Network.
  
short_bio: Lätt att använda Lightning Network förvaring wallet
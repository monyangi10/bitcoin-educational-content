bio: |
  Blink is een gebruiksvriendelijke en veilige Lightning Wallet waarmee iedereen gemakkelijk zijn Bitcoin betalingen kan beheren. Met de integratie van Stablesats biedt het de mogelijkheid om geld in Bitcoin of stablecoins vast te houden, te versturen en te ontvangen, terwijl het dagelijks gebruik van de Lightning Network wordt vergemakkelijkt.
  

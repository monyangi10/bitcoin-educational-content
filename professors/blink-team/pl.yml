bio: |
  Blink to łatwy w użyciu i bezpieczny Lightning wallet, który pozwala każdemu na łatwe zarządzanie płatnościami Bitcoin. Dzięki integracji Stablesats oferuje możliwość przechowywania, wysyłania i otrzymywania środków w Bitcoin lub stablecoinach, jednocześnie ułatwiając codzienne korzystanie z Lightning Network.
  
short_bio: Łatwy w użyciu Lightning Network wallet
bio: |
  Mimi ni mwanasayansi na Cypherpunk ninafanya shughuli za kisayansi, uhandisi na biashara. 
  Lengo langu kuu ni kujenga misingi ya siku zijazo - misingi, ambayo itafungua uwezo kamili wa watu binafsi, kuwezesha kujitawala, faragha na upinzani wa udhibiti. Huu ni mustakabali wa maendeleo ya wima na mageuzi ya binadamu kuwa maumbo nje ya yale ambayo jumuiya ya sasa ya mjumuisho inaweza kupendekeza au kuruhusu.
  
  
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, AI, robotiki, transhumanism. Waundaji wa RGB, Prime, Radiant na lnp_bp, mycitadel_io & cyphernet_io
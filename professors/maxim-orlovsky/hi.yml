bio: |
  मैं एक ट्रांसह्यूमनिस्ट और Cypherpunk हूँ, जो वैज्ञानिक, इंजीनियरिंग और व्यावसायिक गतिविधियाँ करता हूँ।
  मेरा मुख्य ध्यान भविष्य के लिए नींव तैयार करने पर है - ऐसी नींव जो व्यक्तियों की पूरी क्षमता को उजागर करेगी, आत्म-संप्रभुता, गोपनीयता और सेंसरशिप-प्रतिरोध को सक्षम बनाएगी। यह ऊर्ध्वाधर प्रगति और मानवता के उन रूपों में विकास का भविष्य है जो वर्तमान सामूहिक समाज द्वारा प्रस्तावित या अनुमत से बहुत अलग हैं।
  
  
short_bio: पूर्व टेनेब्रा सेंटेंटिया सेपियंस डोमिनबिटुर एस्ट्रिस। साइफर, एआई, रोबोटिक्स, ट्रांसह्यूमनिज़्म। RGB, Prime, Radiant और lnp_bp, mycitadel_io और cyphernet_io के निर्माता
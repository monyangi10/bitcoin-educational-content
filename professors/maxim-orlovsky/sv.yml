bio: |
  Jag är en transhumanist och Cypherpunk som arbetar med vetenskap, teknik och affärsverksamhet.
  Mitt primära fokus är att bygga fundament för framtiden - fundament som kommer att frigöra individernas fulla potential och möjliggöra självsuveränitet, integritet och censurmotstånd. Detta är framtiden för vertikala framsteg och mänsklighetens utveckling till former som ligger långt utanför vad det nuvarande kollektivistiska samhället kan föreslå eller tillåta.
  
  
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, AI, robotteknik, transhumanism. Skapare av RGB, Prime, Radiant och lnp_bp, mycitadel_io & cyphernet_io
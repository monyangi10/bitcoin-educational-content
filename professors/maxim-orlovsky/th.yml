bio: |
  ฉันเป็นผู้สนับสนุนการพัฒนามนุษย์และไซเฟอร์พังค์ที่ดำเนินกิจกรรมทางวิทยาศาสตร์ วิศวกรรม และธุรกิจ 
  จุดสนใจหลักของฉันคือการสร้างรากฐานสำหรับอนาคต - รากฐานที่จะปลดล็อกศักยภาพเต็มที่ของบุคคล ช่วยให้เกิดการปกครองตนเอง ความเป็นส่วนตัว และการต่อต้านการเซ็นเซอร์ นี่คืออนาคตของความก้าวหน้าในแนวดิ่งและวิวัฒนาการของมนุษยชาติไปสู่รูปแบบที่อยู่นอกเหนือจากสิ่งที่สังคมรวมหมู่ในปัจจุบันสามารถเสนอหรืออนุญาตได้
short_bio: อดีต Tenebrae sententia sapiens dominabitur astris. Cypher, AI, หุ่นยนต์, transhumanism. ผู้สร้าง RGB, Prime, Radiant และ lnp_bp, mycitadel_io & cyphernet_io
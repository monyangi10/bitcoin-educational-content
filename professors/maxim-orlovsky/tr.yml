bio: |
  Bilimsel, mühendislik ve ticari faaliyetler yürüten bir transhümanist ve Cypherpunk'ım.
  Öncelikli odak noktam gelecek için temeller inşa etmek - bireylerin tam potansiyelini ortaya çıkaracak, kendi kendine egemenliği, mahremiyeti ve sansüre karşı direnci mümkün kılacak temeller. Bu, dikey ilerlemenin ve insanlığın mevcut kolektivist toplumun önerebileceği ya da izin verebileceğinin çok dışındaki biçimlere doğru evriminin geleceğidir.
  
  
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, yapay zeka, robotik, transhümanizm. RGB, Prime, Radiant ve lnp_bp, mycitadel_io & cyphernet_io'nun yaratıcısı
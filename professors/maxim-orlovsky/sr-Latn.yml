bio: |
  Ja sam transhumanista i Cypherpunk koji se bavi naučnim, inženjerskim i poslovnim aktivnostima. 
  Moj primarni fokus je izgradnja temelja za budućnost - temelja koji će otključati puni potencijal pojedinaca, omogućavajući samosuverenitet, privatnost i otpornost na cenzuru. Ovo je budućnost vertikalnog napretka i evolucije čovečanstva u oblike daleko izvan onoga što trenutna kolektivistička društva mogu predložiti ili dozvoliti.
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, AI, robotics, transhumanism. Creator of RGB, Prime, Radiant and lnp_bp, mycitadel_io & cyphernet_io
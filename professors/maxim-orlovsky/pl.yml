bio: |
  Jestem transhumanistą i Cypherpunk prowadzącym działalność naukową, inżynieryjną i biznesową.
  Moim głównym celem jest budowanie fundamentów dla przyszłości - fundamentów, które odblokują pełny potencjał jednostek, umożliwiając suwerenność, prywatność i odporność na cenzurę. Jest to przyszłość pionowego postępu i ewolucji ludzkości do form znacznie wykraczających poza to, co obecne kolektywistyczne społeczeństwo może zaproponować lub na co może pozwolić.
  
  
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, AI, robotyka, transhumanizm. Twórca RGB, Prime, Radiant i lnp_bp, mycitadel_io & cyphernet_io
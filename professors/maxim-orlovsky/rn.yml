bio: |
  Ndi umuhinga mu vy’ubuhinga bw’abantu kandi ndi Cypherpunk nkora ibikorwa vy’ubuhinga, ubuhinga n’ubudandaji. 
  Ico nshaka cane ni ugushinga imishinge y’akazoza - imishinge, izofungura ubushobozi bwose bw’umuntu ku giti ciwe, ishoboze kwigenga, kwirinda no kunanira gucengera. Iryo ni ryo kazoza k’iterambere ry’uburinganire n’ugutera imbere kw’abantu mu buryo buri hanze cane y’ivyo ikibano c’ubu gishobora gusaba canke kwemera.
  
  
short_bio: Ex Tenebrae amajambo y’ubwenge atwara inyenyeri. Cypher, AI, ubuhinga bwa robo, ubuhinga bwo guhindura abantu. Umuremyi wa RGB, Umukuru, Umuco na lnp_bp, mycitadeli_io & cyphernet_io
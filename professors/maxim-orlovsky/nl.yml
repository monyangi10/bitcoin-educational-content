bio: |
  Ik ben een transhumanist en Cypherpunk die wetenschappelijke, technische en zakelijke activiteiten uitvoert.
  Mijn primaire focus is het bouwen van fundamenten voor de toekomst - fundamenten die het volledige potentieel van individuen zullen ontsluiten, waardoor zelf-soevereiniteit, privacy en censuur-resistentie mogelijk worden. Dit is de toekomst van verticale vooruitgang en de evolutie van de mensheid in vormen die veel verder gaan dan wat de huidige collectivistische maatschappij kan voorstellen of toestaan.
  
  
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, AI, robotica, transhumanisme. Schepper van RGB, Prime, Radiant en lnp_bp, mycitadel_io & cyphernet_io
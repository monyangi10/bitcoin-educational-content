bio: |
  저는 트랜스휴머니스트이자 과학, 공학 및 비즈니스 활동을 수행하는 Cypherpunk입니다.
  저의 주된 관심사는 미래를 위한 기반, 즉 개인의 잠재력을 최대한 발휘하여 자기 주권, 프라이버시, 검열 저항을 가능하게 하는 기반을 구축하는 것입니다. 이것이 바로 수직적 진보의 미래이며 현재의 집단주의 사회가 제안하거나 허용할 수 없는 형태로 인류가 진화하는 것입니다.
  
  
short_bio: 전 테네브라 센텐티아 사피엔스 도미니나비투르 아스트리스. 사이퍼, 인공지능, 로봇공학, 트랜스휴머니즘. RGB, 프라임, 래디언트 및 lnp_bp, mycitadel_io 및 cyphernet_io의 제작자
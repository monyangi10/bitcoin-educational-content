bio: |
  من یک ترنس‌هیومنیست و Cypherpunk هستم که به فعالیت‌های علمی، مهندسی و تجاری می‌پردازم. تمرکز اصلی من بر ساختن زیرساخت‌هایی برای آینده است - زیرساخت‌هایی که پتانسیل کامل افراد را آزاد می‌کند و به خودمختاری، حریم خصوصی و مقاومت در برابر سانسور امکان می‌دهد. این آینده پیشرفت عمودی و تکامل بشریت به اشکالی است که بسیار فراتر از آنچه جامعه جمع‌گرای کنونی می‌تواند پیشنهاد دهد یا اجازه دهد.
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, AI, رباتیک، ترابشریت. خالق RGB، Prime، Radiant و lnp_bp، mycitadel_io و cyphernet_io
bio: |
  Аз съм трансхуманист и шифърпънк, който се занимава с научна, инженерна и бизнес дейност.
  Основният ми фокус е изграждането на основи за бъдещето - основи, които ще отключат пълния потенциал на хората, ще им позволят да се самоовластят, да запазят личния си живот и да се противопоставят на цензурата. Това е бъдещето на вертикалния прогрес и на еволюцията на човечеството във форми, които са много извън това, което сегашното колективистично общество може да предложи или позволи.
  
short_bio: Ex Tenebrae sententia sapiens dominabitur astris. Cypher, AI, роботика, трансхуманизъм. Създател на RGB, Prime, Radiant и lnp_bp, mycitadel_io & cyphernet_io

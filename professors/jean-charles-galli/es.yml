bio: |
  Enseño geopolítica en escuelas de negocios tras haber trabajado en el ámbito de las relaciones internacionales, en Francia y en el extranjero. Amante de cruzar ideas con la práctica, soy coautor del libro "Bitcoin, le choc géopolitique" con Alexandre Stachtchenko (Armand Colin, 2025) y hablo regularmente en conferencias y en los medios de comunicación sobre los retos geopolíticos del Bitcoin.
  
  
short_bio: Coautor de Bitcoin, le choc géopolitique
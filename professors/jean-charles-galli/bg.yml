bio: |
  Преподавам геополитика в бизнес училища, след като съм работил в областта на международните отношения във Франция и в чужбина. Обичам да пресичам идеите с практиката, затова съм съавтор на книгата "Bitcoin, le choc géopolitique" заедно с Александър Стахченко (Armand Colin, 2025 г.) и редовно говоря на конференции и в медиите за геополитическите залози на Bitcoin.
  
  
short_bio: Съавтор на Bitcoin, le choc géopolitique
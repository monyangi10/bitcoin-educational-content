bio: |
  Predajem geopolitiku u poslovnim školama nakon rada u oblasti međunarodnih odnosa, u Francuskoj i inostranstvu. Volim da ukrštam ideje sa praksom, koautor sam knjige 'Bitcoin, le choc géopolitique' sa Aleksandrom Staččenkom (Armand Colin, 2025) i redovno govorim na konferencijama i u medijima o geopolitičkim ulozima Bitcoin.
short_bio: Koautor Bitcoin, le choc géopolitique
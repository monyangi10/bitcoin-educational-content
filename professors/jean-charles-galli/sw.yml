bio: |
  Ninafundisha jiografia katika shule za biashara baada ya kufanya kazi katika uwanja wa mahusiano ya kimataifa, nchini Ufaransa na nje ya nchi. Kwa kupenda kuvuka mawazo na mazoezi, niliandika kwa pamoja kitabu 'Bitcoin, le choc géopolitique' na Alexandre Stachtchenko (Armand Colin, 2025) na mimi huzungumza mara kwa mara kwenye mikutano na vyombo vya habari kuhusu masuala ya kisiasa ya Bitcoin.
  
  
short_bio: Mwandishi mwenza wa Bitcoin, le choc géopolitique
bio: |
  I teach geopolitics in business schools after working in the field of international relations, in France and abroad. Loving to cross ideas with practice, I co-authored the book 'Bitcoin, le choc géopolitique' with Alexandre Stachtchenko (Armand Colin, 2025) and I regularly speak at conferences and in the media on the geopolitical stakes of Bitcoin.
  
  
short_bio: Co-author of Bitcoin, le choc géopolitique
bio: |
  J’enseigne la géopolitique en écoles de commerce après avoir travaillé dans le domaine des relations internationales, en France et à l’étranger. Adorant croiser les idées à la pratique, j’ai co-écrit l’ouvrage ‘Bitcoin, le choc géopolitique’ avec Alexandre Stachtchenko (Armand Colin, 2025) et je m’exprime régulièrement en conférence et dans les médias sur les enjeux géopolitiques de Bitcoin.


short_bio: Co-auteur de l'ouvrage Bitcoin, le choc géopolitique

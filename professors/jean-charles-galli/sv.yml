bio: |
  Jag undervisar i geopolitik på handelshögskolor efter att ha arbetat med internationella relationer, både i Frankrike och utomlands. Jag älskar att kombinera idéer med praktik och är medförfattare till boken "Bitcoin, le choc géopolitique" tillsammans med Alexandre Stachtchenko (Armand Colin, 2025) och talar regelbundet på konferenser och i media om de geopolitiska aspekterna av Bitcoin.
  
  
short_bio: Medförfattare till Bitcoin, le choc géopolitique
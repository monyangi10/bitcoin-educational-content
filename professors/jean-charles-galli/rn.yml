bio: |
  Ndigisha geopolitique mu mashure y’ubudandaji maze gukora mu bijanye n’imigenderanire mpuzamakungu, mu Bufaransa no mu mahanga. Kubera ko nakunda guhuza ivyiyumviro n’ibikorwa, naranditse igitabu ‘Bitcoin, le choc géopolitique’ ndi kumwe na Alexandre Stachtchenko (Armand Colin, 2025) kandi ndakunda kuvuga mu nama no mu binyamakuru ku bijanye n’ivya politike y’isi ya Bitcoin.
  
  
short_bio: Umwanditsi w'igitabu Bitcoin, igitabu c'ivya politike y'isi
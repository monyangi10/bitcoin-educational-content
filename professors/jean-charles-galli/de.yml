bio: |
  Ich unterrichte Geopolitik an Wirtschaftsschulen, nachdem ich in Frankreich und im Ausland auf dem Gebiet der internationalen Beziehungen gearbeitet habe. Da ich gerne Ideen mit der Praxis verbinde, habe ich zusammen mit Alexandre Stachtchenko das Buch "Bitcoin, le choc géopolitique" (Armand Colin, 2025) verfasst und spreche regelmäßig auf Konferenzen und in den Medien über die geopolitischen Aspekte von Bitcoin.
  
  
short_bio: Mitautor von Bitcoin, le choc géopolitique
bio: |
  Opetan geopolitiikkaa kauppakorkeakouluissa työskenneltyäni kansainvälisten suhteiden alalla Ranskassa ja ulkomailla. Rakastan ajatusten ja käytännön yhdistämistä, ja olen kirjoittanut yhdessä Alexandre Stachtchenkon kanssa kirjan "Bitcoin, le choc géopolitique" (Armand Colin, 2025), ja puhun säännöllisesti konferensseissa ja tiedotusvälineissä Bitcoin:n geopoliittisista panoksista.
  
  
short_bio: Kirjan Bitcoin, le choc géopolitique (Bitcoin, géopoliittinen sekasorto) toinen kirjoittaja
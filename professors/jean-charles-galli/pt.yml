bio: |
  Ensino geopolítica em escolas de gestão depois de ter trabalhado no domínio das relações internacionais, em França e no estrangeiro. Apaixonado pelo cruzamento de ideias com a prática, sou coautor do livro "Bitcoin, le choc géopolitique" com Alexandre Stachtchenko (Armand Colin, 2025) e intervenho regularmente em conferências e nos meios de comunicação social sobre os desafios geopolíticos do Bitcoin.
  
  
short_bio: Coautor de Bitcoin, le choc géopolitique (Bitcoin, o choque géopolítico)
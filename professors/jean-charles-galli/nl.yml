bio: |
  Ik geef les in geopolitiek aan business schools nadat ik in Frankrijk en in het buitenland heb gewerkt op het gebied van internationale betrekkingen. Ik houd ervan om ideeën met de praktijk te combineren en ben co-auteur van het boek 'Bitcoin, le choc géopolitique' met Alexandre Stachtchenko (Armand Colin, 2025) en ik spreek regelmatig op conferenties en in de media over de geopolitieke inzet van Bitcoin.
  
  
short_bio: Co-auteur van Bitcoin, le choc géopolitique
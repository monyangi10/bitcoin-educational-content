bio: |
  После работы в области международных отношений во Франции и за рубежом я преподаю геополитику в бизнес-школах. Любя скрещивать идеи с практикой, я в соавторстве с Александром Стахтченко написал книгу "Bitcoin, le choc géopolitique" (Armand Colin, 2025) и регулярно выступаю на конференциях и в СМИ по вопросам геополитических ставок Bitcoin.
  
  
short_bio: Соавтор книги Bitcoin, le choc géopolitique
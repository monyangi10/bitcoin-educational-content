bio: |
  Insegno geopolitica nelle scuole di economia dopo aver lavorato nel campo delle relazioni internazionali, in Francia e all'estero. Amando incrociare le idee con la pratica, sono coautore del libro "Bitcoin, le choc géopolitique" con Alexandre Stachtchenko (Armand Colin, 2025) e intervengo regolarmente alle conferenze e nei media sulla posta in gioco geopolitica del Bitcoin.
  
  
short_bio: Coautore di Bitcoin, le choc géopolitique
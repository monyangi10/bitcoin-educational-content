bio: |
  Pärast tööd rahvusvaheliste suhete valdkonnas Prantsusmaal ja välismaal õpetan ma geopoliitikat ärikoolides. Armastades ideede ja praktika ristamist, olen koos Alexandre Stachtchenkoga (Armand Colin, 2025) kaasautoriks raamatule "Bitcoin, le choc géopolitique" ning räägin regulaarselt konverentsidel ja meedias Bitcoin geopoliitilistest panustest.
  
  
short_bio: Bitcoin, le choc géopolitique kaasautor
bio: |
  Tôi giảng dạy địa chính trị tại các trường kinh doanh sau thời gian làm việc trong lĩnh vực quan hệ quốc tế, tại Pháp và nước ngoài. Với niềm đam mê kết hợp lý tưởng với thực tiễn, tôi đã đồng sáng tác cuốn sách "Bitcoin, le choc géopolitique" với Alexandre Stachtchenko (Armand Colin, 2025) và thường xuyên phát biểu tại các hội nghị và trên các phương tiện truyền thông về các vấn đề địa chính trị của Bitcoin.
  
  
short_bio: Đồng tác giả Bitcoin, le choc géopolitique
bio: |
  फ्रांस और विदेशों में अंतर्राष्ट्रीय संबंधों के क्षेत्र में काम करने के बाद, मैं बिज़नेस स्कूलों में भू-राजनीति पढ़ाता हूँ। विचारों को व्यवहार में लाने के शौक़ीन, मैंने एलेक्ज़ेंडर स्टैचेंको (आर्मंड कॉलिन, 2025) के साथ मिलकर 'Bitcoin, ले चोक जियोपोलिटिक' नामक पुस्तक लिखी है और मैं नियमित रूप से सम्मेलनों और मीडिया में Bitcoin के भू-राजनीतिक पहलुओं पर बोलता हूँ।
  
  
short_bio: Bitcoin के सह-लेखक, ले चोक जियोपोलिटिक
bio: |
  Fransa'da ve yurtdışında uluslararası ilişkiler alanında çalıştıktan sonra işletme okullarında jeopolitik dersleri veriyorum. Fikirleri pratikle birleştirmeyi sevdiğim için Alexandre Stachtchenko ile birlikte 'Bitcoin, le choc géopolitique' (Armand Colin, 2025) kitabını yazdım ve düzenli olarak konferanslarda ve medyada Bitcoin'ın jeopolitik riskleri üzerine konuşmalar yapıyorum.
  
  
short_bio: Bitcoin, le choc géopolitique kitabının ortak yazarı
bio: |
  Uczę geopolityki w szkołach biznesu po pracy w dziedzinie stosunków międzynarodowych, we Francji i za granicą. Uwielbiam łączyć idee z praktyką, jestem współautorem książki "Bitcoin, le choc géopolitique" z Alexandre Stachtchenko (Armand Colin, 2025) i regularnie wypowiadam się na konferencjach i w mediach na temat geopolitycznej stawki Bitcoin.
  
  
short_bio: Współautor Bitcoin, le choc géopolitique
bio: |
  ฉันสอนภูมิรัฐศาสตร์ในโรงเรียนธุรกิจหลังจากทำงานในด้านความสัมพันธ์ระหว่างประเทศ ทั้งในฝรั่งเศสและต่างประเทศ รักที่จะผสมผสานแนวคิดกับการปฏิบัติ ฉันร่วมเขียนหนังสือ 'Bitcoin, le choc géopolitique' กับ Alexandre Stachtchenko (Armand Colin, 2025) และฉันมักจะพูดในที่ประชุมและสื่อเกี่ยวกับเดิมพันทางภูมิรัฐศาสตร์ของ Bitcoin
short_bio: ผู้เขียนร่วมของ Bitcoin, le choc géopolitique
bio: |
  Jeg underviser i geopolitikk på handelshøyskoler etter å ha jobbet med internasjonale relasjoner, både i Frankrike og i utlandet. Jeg elsker å krysse ideer med praksis, og sammen med Alexandre Stachtchenko har jeg skrevet boken "Bitcoin, le choc géopolitique" (Armand Colin, 2025), og jeg holder jevnlig foredrag på konferanser og i media om de geopolitiske utfordringene knyttet til Bitcoin.
  
  
short_bio: Medforfatter av Bitcoin, le choc géopolitique
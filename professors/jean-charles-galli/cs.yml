bio: |
  Po práci v oblasti mezinárodních vztahů ve Francii i v zahraničí vyučuji geopolitiku na obchodních školách. Rád křížím myšlenky s praxí, a proto jsem spolu s Alexandrem Stachtchenkem napsal knihu "Bitcoin, le choc géopolitique" (Armand Colin, 2025) a pravidelně vystupuji na konferencích a v médiích na téma geopolitických sázek Bitcoin.
  
  
short_bio: Spoluautor knihy Bitcoin, le choc géopolitique
bio: |
  Saya mengajar geopolitik di sekolah bisnis setelah bekerja di bidang hubungan internasional, baik di Prancis maupun di luar negeri. Senang memadukan ide dengan praktik, saya turut menulis buku 'Bitcoin, le choc géopolitique' bersama Alexandre Stachtchenko (Armand Colin, 2025) dan secara teratur berbicara di berbagai konferensi dan di media tentang pertaruhan geopolitik Bitcoin.
  
  
short_bio: Rekan penulis Bitcoin, le choc géopolitique
bio: |
  من پس از کار در زمینه روابط بین‌الملل، در فرانسه و خارج از کشور، به تدریس ژئوپلیتیک در مدارس کسب‌وکار می‌پردازم. با علاقه به ترکیب ایده‌ها با عمل، به همراه الکساندر استاچچنکو کتاب 'Bitcoin, le choc géopolitique' (آرماند کولین، 2025) را تألیف کرده‌ام و به طور منظم در کنفرانس‌ها و رسانه‌ها درباره مسائل ژئوپلیتیکی Bitcoin صحبت می‌کنم.
short_bio: همکار نویسنده Bitcoin، شوک ژئوپلیتیک
bio: |
  Hej alla! Passionerad om Bitcoin sedan 2018, utvecklade jag en benägenhet mot ekonomi och hyperinflation. Jag strävar efter att dela med mig av min passion genom ECON204-kursen om hyperinflation och även genom min bok "Tous sur Bitcoin". Jag ser fram emot att diskutera med dig på de kommande Bitcoin-konferenserna!
  
short_bio: Expert på hyperinflation och författare till "Tous sur Bitcoin"
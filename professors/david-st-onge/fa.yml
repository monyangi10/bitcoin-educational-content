bio: |
  سلام به همه! از سال 2018 به Bitcoin علاقه‌مند شدم و تمایل خاصی به اقتصاد و ابر تورم پیدا کردم. سعی می‌کنم از طریق دوره ECON204 درباره ابر تورم و همچنین از طریق کتابم "Tous sur Bitcoin" علاقه‌ام را به اشتراک بگذارم. مشتاقانه منتظر بحث با شما در کنفرانس‌های آینده Bitcoin هستم!
short_bio: متخصص در ابر تورم و نویسنده "Tous sur Bitcoin"
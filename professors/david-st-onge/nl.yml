bio: |
  Hallo allemaal! Gepassioneerd door Bitcoin sinds 2018, heb ik een voorliefde ontwikkeld voor economie en hyperinflatie. Ik streef ernaar om mijn passie te delen via de ECON204 cursus over hyperinflatie en ook via mijn boek "Tous sur Bitcoin". Ik kijk ernaar uit om met jullie te discussiëren op de komende Bitcoin conferenties!
  
short_bio: Expert in hyperinflatie & auteur van "Tous sur Bitcoin"
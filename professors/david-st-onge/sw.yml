bio: |
  Jambo kila mtu! Nikiwa na shauku kuhusu Bitcoin tangu 2018, nilikuza mwelekeo kuelekea uchumi na mfumuko mkubwa wa bei. Ninajitahidi kushiriki mapenzi yangu kupitia kozi ya ECON204 kuhusu mfumuko wa bei na pia kupitia kitabu changu "Tous sur Bitcoin". Tunatazamia kujadiliana nawe katika mikutano ijayo ya Bitcoin!
  
short_bio: Mtaalamu wa Mfumuko wa bei & mwandishi wa "Tous sur Bitcoin"
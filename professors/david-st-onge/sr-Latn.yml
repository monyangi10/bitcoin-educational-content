bio: |
  Zdravo svima! Strastven u vezi sa Bitcoin od 2018, razvio sam sklonost ka ekonomiji i hiperinflaciji. Trudim se da podelim svoju strast kroz kurs ECON204 o hiperinflaciji i takođe kroz svoju knjigu "Tous sur Bitcoin". Radujem se diskusiji sa vama na predstojećim Bitcoin konferencijama!
short_bio: Stručnjak za hiperinflaciju i autor "Tous sur Bitcoin"
bio: |
  Здравейте на всички! Увлечен по биткойн от 2018 г., развих склонност към икономиката и хиперинфлацията. Стремя се да споделям страстта си чрез курса ECON204 по хиперинфлация, а също и чрез книгата си "Tous sur Bitcoin". Очаквам с нетърпение да дискутирам с вас на предстоящите конференции за биткойн!
  
short_bio: Експерт по хиперинфлация и автор на книгата "Tous sur bitcoin"
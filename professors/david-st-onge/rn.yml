bio: |
  Muraho mwese! Nakunda cane Bitcoin kuva mu 2018, naratanguye gukunda ubutunzi n’ugutera imbere kw’ibiciro. Nshaka gusangira n'abandi ivyo nkunda biciye mu nyigisho ya ECON204 ku bijanye n'ugutera imbere kw'ibiciro no mu gitabu canje "Tous sur Bitcoin". Turategereje kuganira namwe mu makoraniro ya Bitcoin azoba!
  
short_bio: Impuguke mu vy'ugutera imbere kw'ibiciro n'umwanditsi w'igitabu "Tous sur Bitcoin"
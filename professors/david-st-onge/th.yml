bio: |
  สวัสดีทุกคน! หลงใหลในบิตคอยน์ตั้งแต่ปี 2018 ฉันได้พัฒนาความสนใจในด้านเศรษฐศาสตร์และภาวะเงินเฟ้อรุนแรง ฉันพยายามที่จะแบ่งปันความหลงใหลของฉันผ่านหลักสูตร ECON204 เกี่ยวกับภาวะเงินเฟ้อรุนแรงและผ่านหนังสือของฉัน "Tous sur Bitcoin" รอคอยที่จะได้พูดคุยกับคุณในงานประชุมบิตคอยน์ที่จะถึงนี้!
short_bio: ผู้เชี่ยวชาญด้านภาวะเงินเฟ้อสูง & ผู้เขียน "Tous sur bitcoin"
bio: |
  Herkese merhaba! 2018'den beri Bitcoin konusunda tutkuluyum, ekonomi ve hiperenflasyona karşı bir eğilim geliştirdim. Hiperenflasyon üzerine ECON204 dersi ve ayrıca "Tous sur Bitcoin" kitabım aracılığıyla tutkumu paylaşmaya çalışıyorum. Önümüzdeki Bitcoin konferanslarında sizinle tartışmak için sabırsızlanıyoruz!
  
short_bio: Hiper Enflasyon Uzmanı ve "Tous sur Bitcoin" kitabının yazarı
bio: |
  सभी को नमस्कार! 2018 से Bitcoin के प्रति जुनून के कारण, मेरा अर्थशास्त्र और अतिमुद्रास्फीति की ओर रुझान बढ़ा है। मैं अतिमुद्रास्फीति पर ECON204 पाठ्यक्रम और अपनी पुस्तक "Tous sur Bitcoin" के माध्यम से अपने इस जुनून को साझा करने का प्रयास करता हूँ। आगामी Bitcoin सम्मेलनों में आपके साथ चर्चा करने के लिए उत्सुक हूँ!
  
short_bio: हाइपरइन्फ्लेशन के विशेषज्ञ और "Tous sur Bitcoin" के लेखक
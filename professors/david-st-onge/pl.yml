bio: |
  Witam wszystkich! Pasjonat Bitcoin od 2018 roku, rozwinąłem skłonność do ekonomii i hiperinflacji. Staram się dzielić moją pasją poprzez kurs ECON204 na temat hiperinflacji, a także poprzez moją książkę "Tous sur Bitcoin". Z niecierpliwością czekam na dyskusję z wami na nadchodzących konferencjach Bitcoin!
  
short_bio: Ekspert w dziedzinie hiperinflacji i autor książki "Tous sur Bitcoin"
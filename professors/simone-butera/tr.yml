bio: |
  Simone Butera, açık kaynak geliştirme ve eşler arası teknolojiler konusunda uzmanlığa sahip bir yazılım mühendisidir. Plan B Network'te Baş Kodlama Eğitmenidir ve burada verdiği kurslarla Bitcoin'a özgü olmayan teknik konuları ele almaktadır. Ayrıca DX (geliştirici deneyimi) ve programlama dili tasarımı konusunda çok tutkulu.
  
short_bio: Yazılım mühendisi, kodlama temelleri hakkında kurslar veriyor
bio: |
  Simone Butera es ingeniero de software experto en desarrollo de código abierto y tecnologías peer-to-peer. Es Lead Coding Instructor en Plan B Network, donde cubre los temas técnicos no específicos de Bitcoin con sus cursos. También le apasiona el DX (experiencia del desarrollador) y el diseño de lenguajes de programación.
  
short_bio: Ingeniero informático, imparte cursos sobre fundamentos de codificación

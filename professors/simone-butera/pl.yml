bio: |
  Simone Butera jest inżynierem oprogramowania z doświadczeniem w rozwoju open source i technologiach peer-to-peer. Jest głównym instruktorem kodowania w Plan B Network, gdzie w swoich kursach zajmuje się tematami technicznymi niezwiązanymi z Bitcoin. Pasjonuje się również DX (doświadczeniem programisty) i projektowaniem języków programowania.
  
short_bio: Inżynier oprogramowania, prowadzi kursy dotyczące podstaw kodowania
bio: |
  Simone Butera é um engenheiro de software com experiência em desenvolvimento de código aberto e tecnologias peer-to-peer. É Lead Coding Instructor na Plan B Network, onde aborda os tópicos técnicos não específicos do Bitcoin nos seus cursos. Também é muito apaixonado por DX (experiência do programador) e design de linguagens de programação.
  
short_bio: Engenheiro de software, ministra cursos sobre fundamentos de codificação
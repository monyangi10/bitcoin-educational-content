bio: |
  Simone Butera is een software engineer met expertise in open-source ontwikkeling en peer-to-peer technologieën. Hij is Lead Coding Instructor bij Plan B Network, waar hij de niet-Bitcoin-specifieke technische onderwerpen behandelt met zijn cursussen. Hij is ook erg gepassioneerd over DX (developer experience) en het ontwerp van programmeertaal.
  
short_bio: Software-ingenieur, geeft cursussen over codeerfundamenten
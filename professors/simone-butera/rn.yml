bio: |
  Simone Butera ni umuhinga mu vy’ubuhinga bwa none afise ubuhinga bwo gutegura ubuhinga bwa none n’ubuhinga bwo gukorana n’abandi. Arakunda cane kandi DX (ubumenyi bw’abahinguzi) n’uguhingura ururimi rwa porogarama.
  
short_bio: Injeniyeri wa mudasobwa, atanga amashure yerekeye ivy'ishimikiro vyo gukora kode
bio: |
  Simone Butera ni umuhinga mu vy’ubuhinga bwa none afise ubuhinga bwo gutegura ubuhinga bwa none n’ubuhinga bwo gukorana n’abandi. Ni umwigisha mukuru w’ubuhinga bwo gukora amakode muri Plan B Network, aho yigisha ingingo zitari izo Bitcoin n’amashure yiwe. Arakunda cane kandi DX (ubumenyi bw’abahinguzi) n’uguhingura ururimi rwa porogarama.
  
short_bio: Injeniyeri wa porogaramu, atanga amashure yerekeye ivy'ishimikiro vyo gukora kode
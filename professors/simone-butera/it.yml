bio: |
  Simone Butera è un ingegnere informatico esperto di sviluppo open-source e tecnologie peer-to-peer. È Lead Coding Instructor presso Plan B Network, dove copre gli argomenti tecnici non specifici di Bitcoin con i suoi corsi. È anche molto appassionato di DX (developer experience) e di progettazione di linguaggi di programmazione.
  
short_bio: Ingegnere del software, offre corsi sui fondamenti del coding
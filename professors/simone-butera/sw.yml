bio: |
  Simone Butera ni mhandisi wa programu aliye na ujuzi katika ukuzaji wa chanzo huria na teknolojia ya rika hadi rika. Yeye ni Mkufunzi Mkuu wa Usimbaji katika Mtandao wa Plan B, ambapo anashughulikia mada za kiufundi zisizo za Bitcoin na kozi zake. Pia anapenda sana DX (uzoefu wa msanidi programu) na muundo wa lugha ya programu.
  
short_bio: Mhandisi wa programu, hutoa kozi kuhusu misingi ya usimbaji
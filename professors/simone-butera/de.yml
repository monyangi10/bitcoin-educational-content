bio: |
  Simone Butera ist ein Software-Ingenieur mit Erfahrung in Open-Source-Entwicklung und Peer-to-Peer-Technologien. Er ist Lead Coding Instructor bei Plan B Network, wo er in seinen Kursen die nicht Bitcoin-spezifischen technischen Themen abdeckt. Seine Leidenschaft gilt auch dem DX (Developer Experience) und dem Design von Programmiersprachen.
  
short_bio: Software-Ingenieur, bietet Kurse über die Grundlagen der Programmierung an
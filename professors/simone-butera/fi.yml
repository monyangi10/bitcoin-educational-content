bio: |
  Simone Butera on ohjelmistosuunnittelija, jolla on asiantuntemusta avoimen lähdekoodin kehityksestä ja vertaisverkkoteknologioista. Hän on Lead Coding Instructor Plan B Networkissa, jossa hän kattaa kursseillaan Bitcoin:n ulkopuolisia teknisiä aiheita. Hän on myös hyvin innostunut DX:stä (developer experience) ja ohjelmointikielten suunnittelusta.
  
short_bio: Ohjelmistoinsinööri, tarjoaa kursseja koodauksen perusteista
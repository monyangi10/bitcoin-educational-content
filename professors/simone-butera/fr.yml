bio: |
  Simone Butera est un ingénieur logiciel spécialisé dans le développement de logiciels libres et les technologies peer-to-peer. Il est Lead Coding Instructor chez Plan B Network, où il couvre les sujets techniques non spécifiques à la Bitcoin dans ses cours. Il est également passionné par le DX (expérience du développeur) et la conception de langages de programmation.
  
short_bio: Ingénieur logiciel, donne des cours sur les principes fondamentaux du codage
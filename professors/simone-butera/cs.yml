bio: |
  Simone Butera je softwarový inženýr se zkušenostmi s vývojem open-source a peer-to-peer technologiemi. Je vedoucím instruktorem kódování ve společnosti Plan B Network, kde se v rámci svých kurzů věnuje technickým tématům nesouvisejícím se systémem Bitcoin. Jeho velkou vášní jsou také DX (zkušenosti vývojářů) a návrh programovacích jazyků.
  
short_bio: Softwarový inženýr, poskytuje kurzy základů kódování
bio: |
  Simone Butera är en mjukvaruingenjör med expertis inom utveckling av öppen källkod och peer-to-peer-teknik. Han är Lead Coding Instructor på Plan B Network, där han täcker de icke-Bitcoin-specifika tekniska ämnena med sina kurser. Han är också mycket passionerad om DX (utvecklarupplevelse) och design av programmeringsspråk.
  
short_bio: Programvaruingenjör, ger kurser om grundläggande kodning
bio: |
  Simone Butera on tarkvarainsener, kellel on kogemused avatud lähtekoodiga arenduse ja peer-to-peer-tehnoloogiate alal. Ta on Plan B Networki juhtiv kodeerimisõpetaja, kus ta katab oma kursustega mitte-Bitcoin-spetsiifilisi tehnilisi teemasid. Samuti on ta väga kirglik DX (arendajakogemus) ja programmeerimiskeele disain.
  
short_bio: Tarkvarainsener, pakub kursusi kodeerimise aluste kohta
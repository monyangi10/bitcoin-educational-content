bio: |
  Simone Butera là một kỹ sư phần mềm có chuyên môn về phát triển mã nguồn mở và công nghệ ngang hàng (peer-to-peer). Anh cũng rất tâm huyết với DX (trải nghiệm của nhà phát triển) và thiết kế ngôn ngữ lập trình.
short_bio: Kỹ sư phần mềm, cung cấp các khóa học về nguyên tắc cơ bản của mã hóa
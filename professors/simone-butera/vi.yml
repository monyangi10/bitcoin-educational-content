bio: |
  Simone Butera là một kỹ sư phần mềm có chuyên môn về phát triển mã nguồn mở và công nghệ ngang hàng (peer-to-peer). Anh là Giảng viên Lập trình Chính tại Plan B Network, nơi anh giảng dạy các chủ đề kỹ thuật không liên quan đến Bitcoin trong các khóa học của mình. Anh cũng rất tâm huyết với DX (trải nghiệm của nhà phát triển) và thiết kế ngôn ngữ lập trình.
short_bio: Kỹ sư phần mềm, cung cấp các khóa học về nguyên tắc cơ bản của mã hóa
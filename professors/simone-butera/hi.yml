bio: |
  सिमोन बुटेरा एक सॉफ्टवेयर इंजीनियर हैं, जिन्हें ओपन-सोर्स डेवलपमेंट और पीयर-टू-पीयर तकनीकों में विशेषज्ञता प्राप्त है। वे प्लान बी नेटवर्क में लीड कोडिंग इंस्ट्रक्टर हैं, जहाँ वे अपने पाठ्यक्रमों में गैर-Bitcoin-विशिष्ट तकनीकी विषयों को शामिल करते हैं। उन्हें DX (डेवलपर अनुभव) और प्रोग्रामिंग भाषा डिज़ाइन में भी गहरी रुचि है।
  
short_bio: सॉफ्टवेयर इंजीनियर, कोडिंग के मूल सिद्धांतों पर पाठ्यक्रम प्रदान करता है
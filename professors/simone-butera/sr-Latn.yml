bio: |
  Simone Butera je softverski inženjer sa ekspertizom u razvoju otvorenog koda i peer-to-peer tehnologijama. On je vodeći instruktor kodiranja u Plan B Network, gde pokriva tehničke teme koje nisu specifične za Bitcoin sa svojim kursevima. Takođe je veoma strastven u vezi sa DX (iskustvo programera) i dizajnom programskih jezika.
short_bio: Softverski inženjer, pruža kurseve o osnovama kodiranja
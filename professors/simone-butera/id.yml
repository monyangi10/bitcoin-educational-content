bio: |
  Simone Butera adalah seorang insinyur perangkat lunak dengan keahlian dalam pengembangan sumber terbuka dan teknologi peer-to-peer. Dia adalah Instruktur Pengkodean Utama di Plan B Network, di mana dia membahas topik-topik teknis yang tidak spesifik untuk Bitcoin dalam kursus-kursusnya. Dia juga sangat bersemangat tentang DX (pengalaman pengembang) dan desain bahasa pemrograman.
  
short_bio: Insinyur perangkat lunak, menyediakan kursus tentang dasar-dasar pengkodean
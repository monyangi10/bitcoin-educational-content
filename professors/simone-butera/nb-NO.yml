bio: |
  Simone Butera er programvareingeniør med ekspertise innen utvikling av åpen kildekode og peer-to-peer-teknologi. Han er Lead Coding Instructor hos Plan B Network, der han dekker ikke-Bitcoin-spesifikke tekniske emner i sine kurs. Han er også svært opptatt av DX (utvikleropplevelse) og design av programmeringsspråk.
  
short_bio: Programvareingeniør, holder kurs om grunnleggende koding
bio: |
  Симоне Бутера - инженер-программист, специализирующийся на разработке программного обеспечения с открытым исходным кодом и пиринговых технологиях. Он является ведущим инструктором по кодингу в Plan B Network, где в своих курсах он освещает технические темы, не относящиеся к Bitcoin. Он также очень увлечен DX (опытом разработчика) и дизайном языков программирования.
  
short_bio: Инженер-программист, проводит курсы по основам кодирования
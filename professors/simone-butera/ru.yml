bio: |
  Симоне Бутера - инженер-программист, специализирующийся на разработке программного обеспечения с открытым исходным кодом и пиринговых технологиях. Он также очень увлечен DX (опытом разработчика) и дизайном языков программирования.
  
short_bio: Инженер-программист, проводит курсы по основам кодирования
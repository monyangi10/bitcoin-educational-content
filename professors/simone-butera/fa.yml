bio: |
  سیمونه بوترا یک مهندس نرم‌افزار با تخصص در توسعه منبع‌باز و فناوری‌های همتا به همتا است. او مدرس ارشد کدنویسی در شبکه Plan B است، جایی که موضوعات فنی غیر مرتبط با Bitcoin را با دوره‌های خود پوشش می‌دهد. او همچنین به تجربه توسعه‌دهنده (DX) و طراحی زبان‌های برنامه‌نویسی بسیار علاقه‌مند است.
short_bio: مهندس نرم‌افزار، دوره‌هایی درباره اصول کدنویسی ارائه می‌دهد
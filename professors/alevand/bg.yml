bio: |
  Здравейте, аз съм Алеванд, италиански счетоводител и програмист, с диплома по комуникационни науки. В офиса си предоставям ИТ и данъчни консултации по Bitcoin. Член съм на маркетинговия екип на BitPolito и съм възпитаник на Biz School 2024 на Plan ₿ Network.
  
short_bio: Аз съм хубав човек с хубави мечти.
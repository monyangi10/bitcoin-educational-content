bio: |
  Hej, jag heter Alevand och är en italiensk revisor och programmerare med en examen i kommunikationsvetenskap.
  På mitt kontor tillhandahåller jag IT- och skatterådgivning på Bitcoin.
  Jag är medlem i BitPolitos marknadsföringsteam och har tagit examen från Biz School 2024 i Plan ₿ Network.
  
short_bio: Jag är en trevlig kille, med några trevliga drömmar.
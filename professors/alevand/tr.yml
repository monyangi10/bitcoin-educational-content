bio: |
  Merhaba, ben Alevand, iletişim bilimleri mezunu bir İtalyan muhasebeci ve programcıyım.
  Ofisimde Bitcoin'de BT ve vergi danışmanlığı yapıyorum.
  BitPolito pazarlama ekibinin bir üyesiyim ve Biz School'in 2024 Plan ₿ Network mezunuyum.
  
short_bio: Ben güzel hayalleri olan iyi bir adamım.
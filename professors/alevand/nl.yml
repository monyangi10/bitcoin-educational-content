bio: |
  Hoi, ik ben Alevand, een Italiaanse accountant en programmeur, met een diploma in communicatiewetenschappen. Op mijn kantoor geef ik IT- en belastingadvies op Bitcoin. Ik ben lid van het marketingteam van BitPolito en afgestudeerd aan de Biz School 2024 van de Plan ₿ Network.
  
short_bio: Ik ben een aardige vent, met mooie dromen.
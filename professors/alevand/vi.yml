bio: |
  Chào, tôi là Alevand, một kế toán viên và lập trình viên người Ý, tốt nghiệp ngành khoa học truyền thông. Tại văn phòng, tôi cung cấp dịch vụ tư vấn CNTT và thuế cho chương trình Bitcoin. Tôi là thành viên của đội ngũ marketing BitPolito và là cựu học viên của chương trình Biz School 2024 thuộc Plan ₿ Network.
  
short_bio: Tôi là một người tốt bụng, với những ước mơ đẹp đẽ.
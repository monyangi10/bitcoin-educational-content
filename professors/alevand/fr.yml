bio: |
  Bonjour, je suis Alevand, comptable et programmeur italien, diplômé en sciences de la communication. Dans mon bureau, je fournis des services de conseil en informatique et en fiscalité sur la Bitcoin. Je suis membre de l'équipe marketing de BitPolito et diplômé de la Biz School 2024 de la Plan ₿ Network.
  
short_bio: Je suis un bon gars, avec de beaux rêves.
bio: |
  Hei, jeg er Alevand, en italiensk regnskapsfører og programmerer, med en grad i kommunikasjonsvitenskap.
  På kontoret mitt tilbyr jeg IT- og skatterådgivning på Bitcoin.
  Jeg er medlem av BitPolitos markedsføringsteam og er uteksaminert fra Biz School 2024 i Plan ₿ Network.
  
short_bio: Jeg er en hyggelig fyr, med noen fine drømmer.
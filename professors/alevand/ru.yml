bio: |
  Привет, я Алеванд, итальянский бухгалтер и программист, со степенью в области коммуникационных наук. В своем офисе я предоставляю IT и налоговые консультации на Bitcoin. Я являюсь членом маркетинговой команды BitPolito и выпускником Biz School 2024 Plan ₿ Network.
  
short_bio: Я хороший парень, с хорошими мечтами.
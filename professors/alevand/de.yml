bio: |
  Hallo, ich bin Alevand, ein italienischer Buchhalter und Programmierer, mit einem Abschluss in Kommunikationswissenschaften. In meinem Büro biete ich IT- und Steuerberatung auf Bitcoin an. Ich bin Mitglied des BitPolito-Marketing-Teams und Absolvent der Biz School 2024 der Plan ₿ Network.
  
short_bio: Ich bin ein netter Kerl, mit schönen Träumen.
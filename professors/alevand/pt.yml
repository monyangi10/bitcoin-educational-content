bio: |
  Olá, chamo-me Alevand, sou um contabilista e programador italiano, com uma licenciatura em ciências da comunicação. No meu escritório, presto serviços de consultoria informática e fiscal no Bitcoin. Sou membro da equipa de marketing da BitPolito e graduado no Biz School 2024 do Plan ₿ Network.
  
short_bio: Sou um tipo porreiro, com alguns sonhos porreiros.
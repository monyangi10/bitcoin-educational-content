bio: |
  Hujambo, mimi ni Alevand, mhasibu wa Italia na mpanga programu, mwenye shahada ya sayansi ya mawasiliano.
  Ofisini kwangu mimi hutoa ushauri wa IT na kodi kwenye Bitcoin.
  Mimi ni mwanachama wa timu ya uuzaji ya BitPolito na mhitimu wa Shule ya Biz 2024 ya Plan ₿ Network.
  
short_bio: Mimi ni mtu mzuri, nina ndoto nzuri.
bio: |
  Habari, mimi ni Alevand, mhasibu na mpangaji programu wa Kiitaliano, mwenye shahada ya sayansi ya mawasiliano. Ofisini kwangu mimi hutoa ushauri wa TEHAMA na kodi kuhusu Bitcoin. Mimi ni mwanachama wa timu ya uuzaji ya BitPolito na mhitimu wa Biz School 2024 ya Plan ₿ Network.
  
short_bio: Mimi ni mtu mzuri, mwenye ndoto nzuri.
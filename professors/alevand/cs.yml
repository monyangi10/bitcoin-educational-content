bio: |
  Ahoj, jsem Alevand, italský účetní a programátor, vystudoval jsem komunikační vědy.
  Ve své kanceláři poskytuji IT a daňové poradenství na Bitcoin.
  Jsem členem marketingového týmu společnosti BitPolito a absolventem školy Biz 2024 na Plan ₿ Network.
  
short_bio: Jsem milý chlapík s krásnými sny.
bio: |
  Hei, ma olen Alevand, itaalia raamatupidaja ja programmeerija, kellel on diplom kommunikatsiooniteadustes. Oma kontoris pakun IT- ja maksualast nõustamist Bitcoin. Olen BitPolito turundusmeeskonna liige ja Biz School 2024 Plan ₿ Network lõpetanud.
  
short_bio: Ma olen tore mees, kellel on toredad unistused.
bio: |
  Hej, jestem Alevand, włoski księgowy i programista, z dyplomem z nauk o komunikacji.
  W moim biurze zajmuję się doradztwem informatycznym i podatkowym na Bitcoin.
  Jestem członkiem zespołu marketingowego BitPolito i absolwentem Biz School 2024 Plan ₿ Network.
  
short_bio: Jestem miłym facetem, z kilkoma miłymi marzeniami.
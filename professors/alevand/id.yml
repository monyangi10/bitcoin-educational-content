bio: |
  Hai, saya Alevand, seorang akuntan dan programmer Italia, dengan gelar sarjana di bidang ilmu komunikasi.
  Di kantor saya, saya menyediakan konsultasi TI dan pajak pada Bitcoin.
  Saya adalah anggota tim pemasaran BitPolito dan lulusan Biz School 2024 dari Plan ₿ Network.
  
short_bio: Saya adalah pria yang baik, dengan mimpi-mimpi yang indah.
bio: |
  नमस्ते, मैं एलेवांड हूँ, एक इतालवी एकाउंटेंट और प्रोग्रामर, जिसके पास संचार विज्ञान में डिग्री है।
  अपने कार्यालय में मैं Bitcoin पर आईटी और कर परामर्श प्रदान करता हूँ।
  मैं बिटपोलिटो मार्केटिंग टीम का सदस्य हूँ और Plan ₿ Network के बिज़ स्कूल 2024 का स्नातक हूँ।
  
short_bio: मैं एक अच्छा इंसान हूं, और मेरे कुछ अच्छे सपने हैं।
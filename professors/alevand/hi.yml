bio: |
  नमस्कार, मैं एलेवांड हूँ, एक इतालवी लेखाकार और प्रोग्रामर, मेरे पास संचार विज्ञान में डिग्री है। मैं अपने कार्यालय में Bitcoin के आधार पर IT और कर परामर्श सेवाएं प्रदान करता हूँ। मैं बिटपोलिटो की मार्केटिंग टीम का सदस्य हूँ और Plan ₿ Network के Biz School 2024 बैच का स्नातक हूँ।
  
  
short_bio: मैं एक अच्छा इंसान हूँ, और मेरे कुछ अच्छे सपने हैं।
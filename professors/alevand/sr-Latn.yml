bio: |
  Hej, ja sam Alevand, italijanski računovođa i programer, sa diplomom iz komunikoloških nauka.  
  U mojoj kancelariji pružam IT i poresko savetovanje na Bitcoin.  
  Član sam BitPolito marketinškog tima i diplomac Biz School 2024 na Plan ₿ Network.
short_bio: Ja sam fin tip, sa nekim lepim snovima.
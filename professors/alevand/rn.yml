bio: |
  Hey, ndi Alevand, umutaliyani w'umucungezi w'amakonti n'umuhinga mu vy'amaporogarama, mfise impamyabushobozi mu vy'itumanaho.
  Ku biro vyanje ndatanga impanuro ku vyerekeye IT n’imisoro ku bijanye na Bitcoin.
  Ndi umunyamuryango w'umugwi w'ubudandaji wa BitPolito kandi narangije amashure yisumbuye muri Biz School 2024 ya Plan ₿ Network.
  
short_bio: Ndi umugabo mwiza, mfise indoto nziza.
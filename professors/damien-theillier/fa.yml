bio: |
  دامین تیلیر استاد فلسفه در پاریس، فارغ‌التحصیل سوربن پاریس IV، بنیان‌گذار مؤسسه کوپه و مدرسه آزادی است. او هم‌نویسنده کتاب راهنمای کلاس مقدماتی فرهنگ عمومی (پیرسون، ۲۰۱۳) و راهی به سوی آزادی، فلسفه از باستان تا امروز (برگ اینترنشنال، ۲۰۱۳) است. او همچنین به فلسفه در ۶۰ کتاب (اللیپس، ۲۰۲۱) کمک کرده است.
short_bio: استاد فلسفه در پاریس
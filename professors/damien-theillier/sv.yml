bio: |
  Damien Theillier är filosofiprofessor i Paris, utexaminerad från Sorbonne Paris IV, grundare av Institut Coppet och École de la liberté. Han är medförfattare till den förberedande klasshandboken General Culture (Pearson, 2013) och A Path to Freedom, the philosophy from Antiquity to our days, (Berg International, 2013). Han har också bidragit till Philosophy in 60 Books (Ellipse, 2021).
  
short_bio: Professor i filosofi i Paris
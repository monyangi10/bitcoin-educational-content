bio: |
  Damien Theillier Paris'te felsefe profesörü, Sorbonne Paris IV mezunu, Institut Coppet ve École de la liberté'nin kurucusudur. Hazırlık sınıfı el kitabı Genel Kültür (Pearson, 2013) ve A Path to Freedom, the philosophy from Antiquity to our days (Berg International, 2013) kitaplarının ortak yazarıdır. Ayrıca 60 Kitapta Felsefe (Ellipse, 2021) kitabına katkıda bulunmuştur.
  
short_bio: Paris'te felsefe profesörü
bio: |
  Damien Theillier is professor filosofie in Parijs, afgestudeerd aan de Sorbonne Paris IV, oprichter van het Institut Coppet en de École de la liberté. Hij is co-auteur van het handboek voor voorbereidende lessen Algemene Cultuur (Pearson, 2013) en Een Pad naar Vrijheid, de filosofie van de Oudheid tot onze dagen (Berg International, 2013). Hij heeft ook bijgedragen aan Filosofie in 60 boeken (Ellipse, 2021).
  
short_bio: Hoogleraar filosofie in Parijs
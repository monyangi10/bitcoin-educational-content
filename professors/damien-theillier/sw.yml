bio: |
  Damien Theillier ni profesa wa falsafa huko Paris, mhitimu wa Sorbonne Paris IV, mwanzilishi wa Institut Coppet na École de la liberté. Yeye ndiye mwandishi mwenza wa mwongozo wa darasa la maandalizi Utamaduni Mkuu (Pearson, 2013) na Njia ya Uhuru, falsafa kutoka Mambo ya Kale hadi siku zetu, (Berg International, 2013). Pia amechangia Falsafa katika Vitabu 60 (Ellipse, 2021). 
  
short_bio: Profesa wa falsafa huko Paris
bio: |
  Damien Theillier jest profesorem filozofii w Paryżu, absolwentem Sorbony Paris IV, założycielem Institut Coppet i École de la liberté. Jest współautorem podręcznika przygotowawczego do zajęć z kultury ogólnej (Pearson, 2013) i A Path to Freedom, filozofii od starożytności do naszych czasów (Berg International, 2013). Przyczynił się również do powstania Philosophy in 60 Books (Ellipse, 2021).
  
short_bio: Profesor filozofii w Paryżu
bio: |
  Damien Theillier ni umwigisha wa filozofiya i Paris, yize amashure yisumbuye muri Sorbonne Paris IV, yashinze ishure ry’ubuhinga bwa filozofiya n’ishure ry’umwidegemvyo. Ni we yanditse igitabu c’itegurwa ry’ishure Umuco rusangi (Pearson, 2013) n’Inzira ijana mu mwidegemvyo, filozofiya kuva kera gushika n’ubu, (Berg International, 2013). Yaratanze kandi umusanzu mu vy’ubuhinga bwa filozofiya mu bitabu 60 (Ellipse, 2021). 
  
short_bio: Umwigisha wa filozofiya i Paris
bio: |
  Damien Theillier je profesor filozofije u Parizu, diplomac Sorbone Paris IV, osnivač Instituta Coppet i École de la liberté. Koautor je priručnika za pripremnu nastavu Opšta kultura (Pearson, 2013) i Put ka slobodi, filozofija od antike do naših dana, (Berg International, 2013). Takođe je doprineo delu Filozofija u 60 knjiga (Ellipse, 2021).
short_bio: Profesor filozofije u Parizu
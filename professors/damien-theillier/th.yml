bio: |
  Damien Theillier เป็นศาสตราจารย์ด้านปรัชญาในปารีส จบการศึกษาจาก Sorbonne Paris IV ผู้ก่อตั้ง Institut Coppet และ École de la liberté เขาเป็นผู้ร่วมเขียนหนังสือคู่มือชั้นเตรียม General Culture (Pearson, 2013) และ A Path to Freedom, the philosophy from Antiquity to our days, (Berg International, 2013) นอกจากนี้เขายังมีส่วนร่วมใน Philosophy in 60 Books (Ellipse, 2021)
short_bio: ศาสตราจารย์ปรัชญาในปารีส
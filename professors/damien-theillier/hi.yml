bio: |
  डेमियन थेलियर पेरिस में दर्शनशास्त्र के प्रोफेसर हैं, सोरबोन पेरिस IV से स्नातक हैं, और इंस्टीट्यूट कोपेट और इकोले डे ला लिबर्टी के संस्थापक हैं। वे प्रारंभिक कक्षा मैनुअल "जनरल कल्चर" (पियर्सन, 2013) और "ए पाथ टू फ्रीडम, द फिलॉसफी फ्रॉम एंटिक्विटी टू अवर डेज़" (बर्ग इंटरनेशनल, 2013) के सह-लेखक हैं। उन्होंने "फिलॉसफी इन 60 बुक्स" (एलिप्स, 2021) में भी योगदान दिया है।
  
short_bio: पेरिस में दर्शनशास्त्र के प्रोफेसर
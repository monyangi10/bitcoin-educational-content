bio: |
  Дамиен Тейе е професор по философия в Париж, завършва Сорбоната Париж IV, основател е на Института Коппет и на Школата за свобода (École de la liberté). Той е съавтор на учебното помагало за подготвителен клас "Обща култура" (Pearson, 2013) и "Път към свободата", философията от древността до наши дни, (Berg International, 2013). Участвал е и в изданието "Философия в 60 книги" (Елипса, 2021 г.).
  
short_bio: Професор по философия в Париж
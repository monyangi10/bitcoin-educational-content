bio: |
  Damien Theillier je pařížský profesor filozofie, absolvent Sorbonny Paris IV, zakladatel Institut Coppet a École de la liberté. Je spoluautorem příručky pro přípravné třídy Obecná kultura (Pearson, 2013) a Cesta ke svobodě, filozofie od antiky po naše dny, (Berg International, 2013). Přispěl také do knihy Filozofie v 60 knihách (Ellipse, 2021).
  
short_bio: Profesor filozofie v Paříži
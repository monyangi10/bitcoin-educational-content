bio: |
  Som oberoende konsult är jag specialiserad på nätverk och säkerhet. Jag tillhandahåller konsult- och supporttjänster. Jag är också internutbildare, så jag växlar mellan att använda och dela med mig av min kunskap!
  
short_bio: Som oberoende konsult är jag specialiserad på nätverk och säkerhet
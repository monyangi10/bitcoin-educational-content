bio: |
  Jako niezależny konsultant specjalizuję się w sieciach i bezpieczeństwie. Świadczę usługi konsultingowe i wsparcia. Jestem również trenerem wewnętrznym, więc na przemian wykorzystuję i dzielę się swoją wiedzą!
  
short_bio: Jako niezależny konsultant specjalizuję się w sieciach i bezpieczeństwie
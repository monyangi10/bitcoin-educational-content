bio: |
  Като независим консултант съм специализиран в областта на мрежите и сигурността. Предоставям консултантски услуги и поддръжка. Също така съм вътрешен обучител, така че редувам използването и споделянето на знанията си!
  
short_bio: Като независим консултант съм специализиран в областта на мрежите и сигурността
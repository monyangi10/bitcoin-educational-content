bio: |
  Sebagai konsultan independen, saya mengkhususkan diri pada jaringan dan keamanan. Saya menyediakan layanan konsultasi dan dukungan. Saya juga seorang pelatih internal, jadi saya bergantian antara menggunakan dan berbagi pengetahuan saya!
  
short_bio: Sebagai konsultan independen, saya berspesialisasi dalam jaringan dan keamanan
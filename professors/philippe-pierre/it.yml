bio: |
  Philippe Pierre ha lavorato per molti anni come amministratore di database e amministratore di sistema Unix/Linux. Ha insegnato reti al CNAM (Parigi). È stato anche impiegato come ingegnere dell'infrastruttura in un laboratorio farmaceutico e amministratore di un cluster di calcolo HPC. Aveva molta familiarità con gli ambienti GNU/Linux in un contesto aziendale e con i sistemi ad alta disponibilità. Gli piaceva condividere la sua esperienza.
  
short_bio: Amministratore di database e amministratore di sistema Unix/Linux
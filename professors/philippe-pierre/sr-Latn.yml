bio: |
  Philippe Pierre je mnogo godina radio kao administrator baza podataka i Unix/Linux sistem administrator. Predavao je mreže na CNAM-u (Pariz). Takođe je bio zaposlen kao inženjer infrastrukture u farmaceutskom laboratoriju i administrator HPC računarskog klastera. Bio je veoma upoznat sa GNU/Linux okruženjima u korporativnom okruženju i sa sistemima visoke dostupnosti. Uživao je u deljenju svog iskustva.
short_bio: Administrator baze podataka i Unix/Linux sistem administrator
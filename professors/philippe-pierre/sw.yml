bio: |
  Philippe Pierre amefanya kazi kwa miaka mingi kama msimamizi wa hifadhidata na msimamizi wa mfumo wa Unix/Linux. Alifundisha mitandao katika CNAM (Paris). Pia aliajiriwa kama mhandisi wa miundombinu katika maabara ya dawa na msimamizi wa nguzo ya kompyuta ya HPC. Alifahamu sana mazingira ya GNU/Linux katika mpangilio wa shirika na mifumo ya upatikanaji wa hali ya juu. Alifurahia kushiriki uzoefu wake.
  
short_bio: Msimamizi wa hifadhidata na msimamizi wa mfumo wa Unix/Linux
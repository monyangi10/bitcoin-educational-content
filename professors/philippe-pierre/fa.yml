bio: |
  فیلیپ پیر برای سال‌های زیادی به عنوان مدیر پایگاه داده و مدیر سیستم‌های یونیکس/لینوکس کار کرده است. او در CNAM (پاریس) شبکه‌ها را تدریس کرده است. او همچنین به عنوان مهندس زیرساخت در یک آزمایشگاه داروسازی و مدیر یک خوشه محاسباتی HPC مشغول به کار بوده است. او با محیط‌های GNU/Linux در یک محیط شرکتی و سیستم‌های با دسترسی بالا بسیار آشنا بود. او از به اشتراک گذاشتن تجربیاتش لذت می‌برد.
short_bio: مدیر پایگاه داده و مدیر سیستم یونیکس/لینوکس
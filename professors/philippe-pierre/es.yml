bio: |
  Philippe Pierre ha trabajado muchos años como administrador de bases de datos y administrador de sistemas Unix/Linux. Fue profesor de redes en el CNAM (París). También trabajó como ingeniero de infraestructuras en un laboratorio farmacéutico y administrador de un clúster informático HPC. Estaba muy familiarizado con los entornos GNU/Linux en un entorno corporativo y con los sistemas de alta disponibilidad. Disfrutaba compartiendo su experiencia.
  
short_bio: Administrador de bases de datos y administrador de sistemas Unix/Linux
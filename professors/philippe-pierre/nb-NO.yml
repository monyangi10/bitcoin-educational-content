bio: |
  Philippe Pierre har jobbet i mange år som databaseadministrator og Unix/Linux-systemadministrator. Han har undervist i nettverk ved CNAM (Paris). Han har også jobbet som infrastrukturingeniør i et farmasøytisk laboratorium og som administrator av en HPC-dataklynge. Han var godt kjent med GNU/Linux-miljøer i bedriftsmiljøer og med systemer med høy tilgjengelighet. Han likte å dele av sin erfaring.
  
short_bio: Databaseadministrator og Unix/Linux-systemadministrator
bio: |
  ฟิลิปป์ ปิแอร์ ทำงานมาหลายปีในตำแหน่งผู้ดูแลฐานข้อมูลและผู้ดูแลระบบ Unix/Linux เขาเคยสอนเกี่ยวกับเครือข่ายที่ CNAM (ปารีส) นอกจากนี้เขายังเคยทำงานเป็นวิศวกรโครงสร้างพื้นฐานในห้องปฏิบัติการเภสัชกรรมและผู้ดูแลคลัสเตอร์การประมวลผล HPC เขาคุ้นเคยกับสภาพแวดล้อม GNU/Linux ในการทำงานขององค์กรและระบบที่มีความพร้อมใช้งานสูง เขาชอบที่จะแบ่งปันประสบการณ์ของเขา
short_bio: ผู้ดูแลฐานข้อมูลและผู้ดูแลระบบ Unix/Linux
bio: |
  Philippe Pierre amaze imyaka myinshi akora nk’umuyobozi w’urutonde rw’amakuru n’umuyobozi wa sisitemu ya Unix/Linux. Yari yigisha ivy’imihora y’ubuhinga bwa none muri CNAM (Paris). Yarakoze kandi nk’umuhinga mu vy’ibikorwa remezo mu laboratwari y’imiti, akaba n’umuyobozi w’ikigo c’ubuhinga bwa none citwa HPC. Yari amenyereye cane ibidukikije vya GNU/Linux mu bikorwa vy’amashirahamwe be n’uburyo bwo gukoresha cane. Yarakunda gusangira n’abandi ivyo yaciyemwo.
  
short_bio: Umuyobozi w'urutonde rw'amakuru n'umuyobozi wa sisitemu ya Unix/Linux
bio: |
  फिलिप पियरे ने कई वर्षों तक डेटाबेस एडमिनिस्ट्रेटर और यूनिक्स/लिनक्स सिस्टम एडमिनिस्ट्रेटर के रूप में काम किया है। उन्होंने सीएनएएम (पेरिस) में नेटवर्क पढ़ाया। वे एक फार्मास्युटिकल प्रयोगशाला में इंफ्रास्ट्रक्चर इंजीनियर और एक एचपीसी कंप्यूटिंग क्लस्टर के एडमिनिस्ट्रेटर के रूप में भी कार्यरत थे। वे कॉर्पोरेट परिवेश में जीएनयू/लिनक्स वातावरण और उच्च-उपलब्धता प्रणालियों से अच्छी तरह परिचित थे। उन्हें अपना अनुभव साझा करने में आनंद आता था।
  
short_bio: डेटाबेस प्रशासक और यूनिक्स/लिनक्स सिस्टम प्रशासक
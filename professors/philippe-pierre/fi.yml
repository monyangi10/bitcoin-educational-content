bio: |
  Philippe Pierre on työskennellyt useita vuosia tietokantojen ylläpitäjänä ja Unix/Linux-järjestelmien ylläpitäjänä. Hän on opettanut verkkoja CNAM:ssa (Pariisi). Hän työskenteli myös infrastruktuuri-insinöörinä lääkelaboratoriossa ja HPC-laskentaklusterin ylläpitäjänä. Hän tunsi hyvin GNU/Linux-ympäristöt yritysympäristössä ja korkean käytettävyyden järjestelmät. Hän nautti kokemustensa jakamisesta.
  
short_bio: Tietokannan ylläpitäjä ja Unix/Linux-järjestelmän ylläpitäjä
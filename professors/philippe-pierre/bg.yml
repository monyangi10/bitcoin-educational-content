bio: |
  Филип Пиер е работил дълги години като администратор на бази данни и системен администратор на Unix/Linux. Преподава мрежи в CNAM (Париж). Работил е и като инфраструктурен инженер във фармацевтична лаборатория и администратор на клъстер за високопроизводителни изчисления. Познава добре средите на GNU/Linux в корпоративна среда и системите с висока достъпност. С удоволствие споделяше своя опит.
  
short_bio: Администратор на бази данни и системен администратор на Unix/Linux
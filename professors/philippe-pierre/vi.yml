bio: |
  Philippe Pierre đã có nhiều năm kinh nghiệm làm quản trị viên cơ sở dữ liệu và quản trị viên hệ thống Unix/Linux. Ông giảng dạy về mạng tại CNAM (Paris). Ông cũng từng là kỹ sư cơ sở hạ tầng tại một phòng thí nghiệm dược phẩm và quản trị viên cụm máy tính HPC. Ông rất quen thuộc với môi trường GNU/Linux trong môi trường doanh nghiệp và các hệ thống có tính sẵn sàng cao. Ông rất thích chia sẻ kinh nghiệm của mình.
short_bio: Quản trị viên cơ sở dữ liệu và quản trị viên hệ thống Unix/Linux
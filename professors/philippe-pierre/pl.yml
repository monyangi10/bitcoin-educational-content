bio: |
  Philippe Pierre przez wiele lat pracował jako administrator baz danych i administrator systemów Unix/Linux. Wykładał sieci w CNAM (Paryż). Był również zatrudniony jako inżynier infrastruktury w laboratorium farmaceutycznym i administrator klastra obliczeniowego HPC. Był bardzo dobrze zaznajomiony ze środowiskami GNU/Linux w środowisku korporacyjnym oraz z systemami wysokiej dostępności. Chętnie dzielił się swoim doświadczeniem.
  
short_bio: Administrator baz danych i administrator systemów Unix/Linux
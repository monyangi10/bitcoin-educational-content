bio: |
  Philippe Pierre hat viele Jahre lang als Datenbankadministrator und Unix/Linux-Systemadministrator gearbeitet. Er unterrichtete Netzwerke an der CNAM (Paris). Außerdem war er als Infrastrukturingenieur in einem pharmazeutischen Labor und als Administrator eines HPC-Rechenclusters tätig. Er war sehr vertraut mit GNU/Linux-Umgebungen in Unternehmen und mit hochverfügbaren Systemen. Er teilte gerne seine Erfahrungen.
  
short_bio: Datenbankadministrator und Unix/Linux-Systemadministrator
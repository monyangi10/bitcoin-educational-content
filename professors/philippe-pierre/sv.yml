bio: |
  Philippe Pierre har under många år arbetat som databasadministratör och systemadministratör för Unix/Linux. Han undervisade i nätverk vid CNAM (Paris). Han har också arbetat som infrastrukturingenjör på ett läkemedelslaboratorium och som administratör av ett HPC-datakluster. Han var mycket väl förtrogen med GNU/Linux-miljöer i företagsmiljö och med system med hög tillgänglighet. Han tyckte om att dela med sig av sina erfarenheter.
  
short_bio: Databasadministratör och systemadministratör för Unix/Linux
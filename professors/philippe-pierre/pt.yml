bio: |
  Philippe Pierre trabalhou durante muitos anos como administrador de bases de dados e administrador de sistemas Unix/Linux. Ensinou redes no CNAM (Paris). Trabalhou também como engenheiro de infra-estruturas num laboratório farmacêutico e administrador de um cluster de computação HPC. Estava muito familiarizado com os ambientes GNU/Linux num contexto empresarial e com os sistemas de alta disponibilidade. Gostava de partilhar a sua experiência.
  
short_bio: Administrador de bases de dados e administrador de sistemas Unix/Linux
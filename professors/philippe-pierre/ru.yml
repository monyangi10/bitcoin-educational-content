bio: |
  Филипп Пьер много лет работал администратором баз данных и системным администратором Unix/Linux. Он преподавал сетевые технологии в CNAM (Париж). Он также работал инженером по инфраструктуре в фармацевтической лаборатории и администратором вычислительного кластера HPC. Он хорошо знаком со средами GNU/Linux в корпоративной среде и с системами высокой доступности. Он с удовольствием делится своим опытом.
  
short_bio: Администратор баз данных и системный администратор Unix/Linux
bio: |
  Philippe Pierre a exercé de nombreuses années en tant qu'administrateur de base de données et comme administrateur Système Unix/Linux. Il a enseigné les réseaux au CNAM (Paris). Il a également été employé en tant qu'ingénieur infrastructure, au sein d'un laboratoire pharmaceutique et administrateur d'un cluster de calculs HPC. Il connaissait parfaitement les environnements GNU/Linux dans le cadre d'une entreprise et des systèmes de haute disponibilité. Il aimait partager son expérience.

short_bio: Administrateur de base de données et administrateur Système Unix/Linux
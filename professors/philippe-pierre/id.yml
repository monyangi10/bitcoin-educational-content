bio: |
  Philippe Pierre telah bekerja selama bertahun-tahun sebagai administrator database dan administrator sistem Unix/Linux. Dia mengajar jaringan di CNAM (Paris). Dia juga bekerja sebagai insinyur infrastruktur di laboratorium farmasi dan administrator cluster komputasi HPC. Dia sangat akrab dengan lingkungan GNU/Linux di lingkungan perusahaan dan dengan sistem dengan ketersediaan tinggi. Dia senang berbagi pengalamannya.
  
short_bio: Administrator basis data dan administrator sistem Unix/Linux
bio: |
  Philippe Pierre uzun yıllar veritabanı yöneticisi ve Unix/Linux sistem yöneticisi olarak çalışmıştır. CNAM'da (Paris) ağlar konusunda ders vermiştir. Ayrıca bir ilaç laboratuvarında altyapı mühendisi ve bir HPC bilgi işlem kümesinin yöneticisi olarak çalışmıştır. Kurumsal ortamdaki GNU/Linux ortamlarına ve yüksek kullanılabilirlikli sistemlere çok aşinaydı. Deneyimlerini paylaşmaktan keyif alıyordu.
  
short_bio: Veritabanı yöneticisi ve Unix/Linux sistem yöneticisi
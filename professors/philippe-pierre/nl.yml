bio: |
  Philippe Pierre heeft vele jaren gewerkt als databasebeheerder en Unix/Linux-systeembeheerder. Hij doceerde netwerken aan het CNAM (Parijs). Hij werkte ook als infrastructuuringenieur in een farmaceutisch laboratorium en als beheerder van een HPC-computercluster. Hij was zeer vertrouwd met GNU/Linux-omgevingen in een bedrijfsomgeving en met systemen met hoge beschikbaarheid. Hij deelde zijn ervaring graag.
  
short_bio: Databasebeheerder en Unix/Linux-systeembeheerder
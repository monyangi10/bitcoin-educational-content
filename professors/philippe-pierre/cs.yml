bio: |
  Philippe Pierre pracoval mnoho let jako správce databází a správce systémů Unix/Linux. Vyučoval sítě na CNAM (Paříž). Pracoval také jako inženýr infrastruktury ve farmaceutické laboratoři a správce výpočetního clusteru HPC. Velmi dobře se seznámil s prostředím GNU/Linux v podnikovém prostředí a se systémy s vysokou dostupností. O své zkušenosti se rád dělil.
  
short_bio: Správce databáze a správce systému Unix/Linux
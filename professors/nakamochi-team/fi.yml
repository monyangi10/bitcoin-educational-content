bio: |
  Nakamochi on suunniteltu siten, että Bitcoin- ja Lightning Full node -toiminnot ovat kaikkien saatavilla teknisestä osaamisesta riippumatta. Sveitsissä valmistetun plug-and-play-solmun avulla yksityishenkilöt voivat saavuttaa täydellisen yksityisyyden ja riippumattomuuden. Käyttämällä omaa Full node:aa vahvistat henkilökohtaista itsemääräämisoikeuttasi, mutta myös edistät Bitcoin-verkon hajauttamista ja kestävyyttä.
  
short_bio: Nakamochi, käyttäjäystävällinen Bitcoin ja Lightning Full node, joka ei vaadi teknistä osaamista. Valmistettu Sveitsissä.
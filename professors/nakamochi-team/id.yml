bio: |
  Nakamochi dirancang untuk membuat pengoperasian Bitcoin dan Lightning Full node dapat diakses oleh semua orang, terlepas dari keahlian teknisnya. Node plug-and-play yang diproduksi di Swiss ini memberdayakan setiap orang untuk mencapai privasi dan kemandirian penuh. Dengan menjalankan Full node Anda sendiri, Anda tidak hanya memperkuat kedaulatan pribadi Anda, tetapi juga berkontribusi pada desentralisasi dan ketahanan jaringan Bitcoin.
  
short_bio: Nakamochi, Bitcoin dan Lightning Full node yang mudah digunakan dan tidak memerlukan pengetahuan teknis. Diproduksi di Swiss.
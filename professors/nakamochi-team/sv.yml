bio: |
  Nakamochi är utformad för att göra Bitcoin- och Lightning Full node-drift tillgänglig för alla, oavsett teknisk expertis. Den schweiziskt tillverkade plug-and-play-noden gör det möjligt för individer att uppnå fullständig integritet och oberoende. Genom att köra din egen Full node stärker du inte bara din personliga suveränitet utan bidrar också till decentraliseringen och motståndskraften i Bitcoin-nätverket.
  
short_bio: Nakamochi, en användarvänlig Bitcoin och Lightning Full node som inte kräver någon teknisk kunskap. Tillverkad i Schweiz.
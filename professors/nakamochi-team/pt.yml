bio: |
  O Nakamochi foi concebido para tornar o funcionamento do Bitcoin e do Lightning Full node acessível a todos, independentemente dos conhecimentos técnicos. O nó plug-and-play fabricado na Suíça permite que os indivíduos alcancem total privacidade e independência. Ao gerir o seu próprio Full node, não só reforça a sua soberania pessoal como também contribui para a descentralização e resiliência da rede Bitcoin.
  
short_bio: Nakamochi, um Bitcoin e um Lightning Full node de fácil utilização que não requer conhecimentos técnicos. Fabricado na Suíça.
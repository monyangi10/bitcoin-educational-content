bio: |
  Nakamochi, Bitcoin ve Lightning Full node operasyonunu teknik uzmanlıktan bağımsız olarak herkes için erişilebilir kılmak üzere tasarlanmıştır. İsviçre'de üretilen tak ve çalıştır düğümü, bireylerin tam gizlilik ve bağımsızlık elde etmelerini sağlar. Kendi Full node'ınızı çalıştırarak sadece kişisel egemenliğinizi güçlendirmekle kalmaz, aynı zamanda Bitcoin ağının ademi merkeziyetçiliğine ve esnekliğine de katkıda bulunursunuz.
  
short_bio: Nakamochi, teknik bilgi gerektirmeyen kullanıcı dostu bir Bitcoin ve Lightning Full node. İsviçre'de üretilmiştir.
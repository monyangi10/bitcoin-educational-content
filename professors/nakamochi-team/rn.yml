bio: |
  Nakamochi yagenewe gutuma igikorwa ca Bitcoin na Lightning Full node gishikira umuntu wese, ataravye ubuhinga bwo mu vy’ubuhinga. Ico gikoresho cakozwe n’Ubusuwisi gishobora gutuma umuntu ashobora gushika ku buzima bwiwe bwite n’ukwigenga. Mu gutwara Full node yawe, ntukomeza gusa ubusegaba bwawe bwite ariko kandi uragira ico ukoze ku kwegereza ubutegetsi abaturage no gukomera kw’urubuga rwa Bitcoin.
  
short_bio: Nakamochi, ni Bitcoin n’umuravyo Full node bikoreshwa neza kandi ntibisaba ubumenyi bw’ubuhinga. Ikoreshwa mu Busuwisi.
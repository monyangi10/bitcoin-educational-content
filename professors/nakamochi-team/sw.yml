bio: |
  Nakamochi imeundwa kufanya operesheni ya Bitcoin na Lightning Full node kupatikana kwa kila mtu, bila kujali utaalam wa kiufundi. Njia ya programu-jalizi-na-kucheza inayotengenezwa na Uswizi huwezesha watu binafsi kufikia faragha kamili na uhuru. Kwa kuendesha Full node yako mwenyewe, sio tu unaimarisha uhuru wako wa kibinafsi lakini pia unachangia katika ugatuaji na uthabiti wa mtandao wa Bitcoin.
  
short_bio: Nakamochi, Bitcoin na Lightning Full node ambayo ni rafiki kwa mtumiaji ambayo haihitaji maarifa ya kiufundi. Imetengenezwa nchini Uswizi.
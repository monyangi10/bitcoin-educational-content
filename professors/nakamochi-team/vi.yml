bio: |
  Nakamochi được thiết kế để mọi người đều có thể vận hành Bitcoin và Lightning Full node, bất kể trình độ chuyên môn kỹ thuật. Nút cắm và chạy (plug-and-play) được sản xuất tại Thụy Sĩ này cho phép mọi người đạt được sự riêng tư và độc lập hoàn toàn. Bằng cách vận hành Full node của riêng mình, bạn không chỉ củng cố chủ quyền cá nhân mà còn đóng góp vào tính phi tập trung và khả năng phục hồi của mạng lưới Bitcoin.
  
  
short_bio: Nakamochi, Bitcoin và Lightning Full node dễ sử dụng, không yêu cầu kiến thức chuyên môn. Sản xuất tại Thụy Sĩ.
bio: |
  Nakamochi está diseñado para que el funcionamiento de Bitcoin y Lightning Full node sea accesible a todo el mundo, independientemente de sus conocimientos técnicos. El nodo plug-and-play de fabricación suiza permite a las personas lograr una total privacidad e independencia. Al gestionar su propia Full node, no sólo refuerza su soberanía personal, sino que también contribuye a la descentralización y resistencia de la red Bitcoin.
  
short_bio: Nakamochi, una Bitcoin y una Full node Lightning fáciles de usar que no requieren conocimientos técnicos. Fabricado en Suiza.
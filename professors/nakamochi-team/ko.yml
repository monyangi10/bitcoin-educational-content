bio: |
  나카모치는 기술적 전문 지식에 관계없이 누구나 Bitcoin과 Lightning Full node을 사용할 수 있도록 설계되었습니다. 스위스에서 제조된 플러그 앤 플레이 노드는 개인이 완전한 프라이버시와 독립성을 확보할 수 있도록 지원합니다. 나만의 Full node을 운영함으로써 개인의 주권을 강화할 뿐만 아니라 Bitcoin 네트워크의 탈중앙화와 복원력에도 기여할 수 있습니다.
  
short_bio: 나카모치, 기술 지식이 필요 없는 사용자 친화적인 Bitcoin 및 라이트닝 Full node. 스위스에서 제조되었습니다.
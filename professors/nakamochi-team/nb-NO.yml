bio: |
  Nakamochi er utviklet for å gjøre Bitcoin- og Lightning Full node-drift tilgjengelig for alle, uavhengig av teknisk ekspertise. Den sveitsiskproduserte plug-and-play-noden gjør det mulig for enkeltpersoner å oppnå fullstendig personvern og uavhengighet. Ved å kjøre din egen Full node styrker du ikke bare din personlige suverenitet, men bidrar også til desentraliseringen og robustheten til Bitcoin-nettverket.
  
short_bio: Nakamochi, en brukervennlig Bitcoin og Lightning Full node som ikke krever noen teknisk kunnskap. Produsert i Sveits.
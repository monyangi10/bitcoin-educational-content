bio: |
  Nakamochi je navrženo tak, aby provoz Bitcoin a Lightning Full node byl přístupný všem bez ohledu na technické znalosti. Uzel typu plug-and-play švýcarské výroby umožňuje jednotlivcům dosáhnout naprostého soukromí a nezávislosti. Provozováním vlastního Full node nejen posilujete svou osobní suverenitu, ale také přispíváte k decentralizaci a odolnosti sítě Bitcoin.
  
short_bio: Nakamochi, uživatelsky přívětivý Bitcoin a Lightning Full node, který nevyžaduje žádné technické znalosti. Vyrobeno ve Švýcarsku.
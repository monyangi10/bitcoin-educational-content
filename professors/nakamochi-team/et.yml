bio: |
  Nakamochi eesmärk on muuta Bitcoin ja Lightning Full node kasutamine kättesaadavaks kõigile, sõltumata tehnilistest oskustest. Šveitsis toodetud plug-and-play-sõlm annab inimestele võimaluse saavutada täielik privaatsus ja sõltumatus. Kasutades oma Full node, ei tugevda te mitte ainult oma isiklikku suveräänsust, vaid aitate ka kaasa Bitcoin võrgu detsentraliseerimisele ja vastupidavusele.
  
short_bio: Nakamochi, kasutajasõbralik Bitcoin ja Lightning Full node, mis ei nõua tehnilisi teadmisi. Valmistatud Šveitsis.
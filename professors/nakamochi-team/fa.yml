bio: |
  ناکاموچی به گونه‌ای طراحی شده است که عملیات Bitcoin و Lightning Full node را برای همه، بدون توجه به تخصص فنی، قابل دسترسی کند. این نود سوئیسی ساخته شده به صورت پلاگ اند پلی به افراد قدرت می‌دهد تا به حریم خصوصی و استقلال کامل دست یابند. با اجرای Full node خود، نه تنها حاکمیت شخصی خود را تقویت می‌کنید، بلکه به تمرکززدایی و مقاومت شبکه Bitcoin نیز کمک می‌کنید.
short_bio: ناکاموچی، یک Bitcoin کاربرپسند و Lightning Full node که نیاز به دانش فنی ندارد. ساخت سوئیس.
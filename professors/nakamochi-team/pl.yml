bio: |
  Nakamochi został zaprojektowany tak, aby obsługa Bitcoin i Lightning Full node była dostępna dla każdego, niezależnie od wiedzy technicznej. Wyprodukowany w Szwajcarii węzeł typu plug-and-play umożliwia jednostkom osiągnięcie pełnej prywatności i niezależności. Uruchamiając własny Full node, nie tylko wzmacniasz swoją osobistą suwerenność, ale także przyczyniasz się do decentralizacji i odporności sieci Bitcoin.
  
short_bio: Nakamochi, przyjazny dla użytkownika Bitcoin i Lightning Full node, który nie wymaga wiedzy technicznej. Wyprodukowano w Szwajcarii.
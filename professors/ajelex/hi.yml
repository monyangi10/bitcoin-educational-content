bio: |
  Bitcoin और Mining के प्रति जुनूनी, मैं अल साल्वाडोर और दुनिया भर में DiscoverBitcoin के शैक्षिक मिशन में उनके साथ हूँ। Bitcoin के क्षेत्र में अपनी यात्रा के दौरान, मुझे Mining और होम Miner की अवधारणा के प्रति एक विशेष जुनून का पता चला। इसी को ध्यान में रखते हुए, मैंने MIN201 में, समानांतर रूप से, अट्टाकाई एक्सप्लोरर परियोजना शुरू की।
  
short_bio: अट्टाकई के निर्माता
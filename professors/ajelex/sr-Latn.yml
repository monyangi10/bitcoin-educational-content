bio: |
  Strastven prema Bitcoin i Mining, pratim DiscoverBitcoin u njihovoj obrazovnoj misiji u El Salvadoru i širom sveta. Kroz moje putovanje niz zečju rupu Bitcoin, otkrio sam posebnu strast za Mining i koncept Home Miner. Imajući to na umu, pokrenuo sam, paralelno, projekat Attakai Explorer na MIN201.
short_bio: Kreator Attakai-a
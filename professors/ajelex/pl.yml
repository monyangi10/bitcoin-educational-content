bio: |
  Pasjonując się Bitcoin i Mining, towarzyszę DiscoverBitcoin w ich misji edukacyjnej w Salwadorze i na całym świecie. Podczas mojej podróży w dół króliczej nory Bitcoin odkryłem szczególną pasję do Mining i koncepcji Home Miner. Mając to na uwadze, równolegle uruchomiłem projekt Attakai Explorer na MIN201.
  
short_bio: Twórca Attakai
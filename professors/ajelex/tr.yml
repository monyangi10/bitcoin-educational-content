bio: |
  Bitcoin ve Mining konusunda tutkulu olan DiscoverBitcoin'e El Salvador'daki ve dünyanın dört bir yanındaki eğitim misyonlarında eşlik ediyorum. Bitcoin tavşan deliğindeki yolculuğum sırasında, Mining ve Home Miner konseptine karşı özel bir tutkum olduğunu keşfettim. Bu düşünceyle MIN201'de Attakai Explorer projesini paralel olarak başlattım.
  

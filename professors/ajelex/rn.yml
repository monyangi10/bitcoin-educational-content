bio: |
  Kubera ko nkunda cane Bitcoin na Mining, ndaherekeza DiscoverBitcoin mu butumwa bwabo bwo kwigisha muri El Salvador no kw’isi yose. Mu rugendo rwanje rwo kumanuka mu mwobo w'inkwavu Bitcoin, nasanze urukundo rudasanzwe mfise kuri Mining n'iciyumviro ca Home Miner. Ni muri ivyo mu muzirikanyi ko natanguje, mu buryo bumwe, umugambi wa Attakai Explorer kuri MIN201.
  
short_bio: Umuremyi wa Attakai
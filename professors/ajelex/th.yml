bio: |
  หลงใหลใน Bitcoin และ mining ฉันร่วมเดินทางกับ DiscoverBitcoin ในภารกิจการศึกษาในเอลซัลวาดอร์และทั่วโลก ผ่านการเดินทางลงไปในโพรงกระต่าย Bitcoin ฉันค้นพบความหลงใหลเป็นพิเศษใน mining และแนวคิดของ Home Miner ด้วยเหตุนี้ฉันจึงเปิดตัวโครงการ Attakai Explorer ที่ MIN201 ควบคู่กันไป
short_bio: ผู้สร้าง Attakai
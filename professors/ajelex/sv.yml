bio: |
  Jag är passionerad för Bitcoin och Mining och följer DiscoverBitcoin i deras utbildningsuppdrag i El Salvador och runt om i världen. Genom min resa ner i Bitcoin-kaninhålet upptäckte jag en särskild passion för Mining och konceptet Home Miner. Det är med detta i åtanke som jag parallellt lanserade projektet Attakai Explorer på MIN201.
  

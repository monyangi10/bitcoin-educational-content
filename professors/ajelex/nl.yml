bio: |
  Gepassioneerd door Bitcoin en Mining, begeleid ik DiscoverBitcoin in hun educatieve missie in El Salvador en over de hele wereld. Door mijn reis door het Bitcoin konijnenhol, ontdekte ik een bijzondere passie voor Mining en het concept van Home Miner. Met dit in mijn achterhoofd lanceerde ik parallel het Attakai Explorer project op MIN201.
  
short_bio: Schepper van Attakai
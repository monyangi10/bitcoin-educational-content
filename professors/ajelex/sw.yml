bio: |
  Nina shauku kuhusu Bitcoin na Mining, ninaandamana na DiscoverBitcoin katika misheni yao ya elimu huko El Salvador na ulimwenguni kote. Kupitia safari yangu chini ya shimo la sungura la Bitcoin, niligundua shauku fulani kwa Mining na dhana ya Nyumbani Miner. Ni kwa kuzingatia hili kwamba nilizindua, sambamba, mradi wa Attakai Explorer katika MIN201.
  
short_bio: Muumba wa Attakai
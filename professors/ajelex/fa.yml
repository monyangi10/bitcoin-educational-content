bio: |
  عاشق Bitcoin و Mining، من DiscoverBitcoin را در مأموریت آموزشی‌شان در السالوادور و سراسر جهان همراهی می‌کنم. در طول سفرم به عمق Bitcoin، به علاقه خاصی به Mining و مفهوم Home Miner پی بردم. با این ذهنیت، به‌طور موازی، پروژه Attakai Explorer را در MIN201 راه‌اندازی کردم.
short_bio: خالق Attakai
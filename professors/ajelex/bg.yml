bio: |
  Запален по Bitcoin и mining, аз придружавам DiscoverBitcoin в тяхната образователна мисия в Ел Салвадор и по целия свят. По време на пътуването си по заешката дупка на Bitcoin открих особена страст към mining и концепцията за Home Miner. Именно с оглед на това стартирах паралелно проекта Attakai Explorer в MIN201.
  
short_bio: Създател на Attakai
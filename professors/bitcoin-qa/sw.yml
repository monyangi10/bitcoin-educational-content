bio: |
  Jina langu ni QnA. Mimi ni Bitcoiner na napenda kusaidia Bitcoiners wengine. Ninatumia siku zangu kujenga zana za uhuru wa Bitcoin katika Foundation. Tovuti hii ni mkusanyiko wa michango yangu ambayo ninaweza kuwaelekeza watu ili kuwasaidia katika safari yao. Iwapo unaona ni muhimu, tafadhali ishiriki na wenzako na ufikirie kuchangia au kutuma kidokezo.
  
short_bio: Mwalimu wa Bitcoin
bio: |
  Mijn naam is QnA. Ik ben een Bitcoiner en ik help graag andere Bitcoiners. Ik breng mijn dagen door met het bouwen van Bitcoin-gerichte soevereiniteitshulpmiddelen bij Foundation. Deze site is een verzameling van mijn bijdragen waar ik mensen naar toe kan wijzen om ze te helpen op hun reis. Als je het waardevol vindt, deel het dan met je collega's en overweeg bij te dragen of een tip te sturen.
  
short_bio: Bitcoin opvoeder
bio: |
  نام من QnA است. من یک بیت‌کوینر هستم و دوست دارم به دیگر بیت‌کوینرها کمک کنم. روزهایم را صرف ساخت ابزارهای حاکمیتی متمرکز بر Bitcoin در Foundation می‌کنم. این سایت مجموعه‌ای از مشارکت‌های من است که می‌توانم به افراد نشان دهم تا به آن‌ها در مسیرشان کمک کنم. اگر آن را ارزشمند یافتید، لطفاً آن را با همتایان خود به اشتراک بگذارید و در نظر داشته باشید که مشارکت کنید یا انعامی بفرستید.
short_bio: Bitcoin مربی
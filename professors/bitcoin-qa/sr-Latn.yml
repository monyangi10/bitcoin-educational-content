bio: |
  Moje ime je QnA. Ja sam Bitcoiner i volim da pomažem drugim Bitcoinerima. Provodim svoje dane praveći alate za suverenitet fokusirane na Bitcoin u Foundation-u. Ovaj sajt je zbirka mojih doprinosa na koje mogu uputiti ljude kako bih im pomogao na njihovom putovanju. Ako smatrate da je vredno, podelite ga sa svojim kolegama i razmislite o doprinosu ili slanju napojnice.
short_bio: Bitcoin edukator
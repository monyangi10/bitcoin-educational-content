bio: |
  Името ми е QnA. Аз съм биткойнър и обичам да помагам на други биткойнъри. Прекарвам дните си в изграждане на Bitcoin-ориентирани инструменти за суверенитет във Фондацията. Този сайт е колекция от моите приноси, към които мога да насоча хората, за да им помогна по пътя им. Ако го намирате за ценен, моля, споделете го с колегите си и помислете дали да не допринесете или да изпратите съвет.
  
short_bio: Възпитател Bitcoin
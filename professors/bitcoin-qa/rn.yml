bio: |
  Izina ryanje ni QnA. Ndi umunya Bitcoin kandi ndakunda gufasha abandi ba Bitcoin. Imisi yanje ndayimara nkora ibikoresho vy’ubusegaba bishingiye kuri Bitcoin kuri Foundation. Uru rubuga ni urutonde rw’intererano zanje nshobora kwerekeza abantu kugira ngo mbafashe mu rugendo rwabo. Niwabona ko ari ngirakamaro, ndagusavye ubisangize abo mu runganwe rwawe kandi wiyumvire gutanga canke kohereza amahera.
  
short_bio: Bitcoin umwigisha
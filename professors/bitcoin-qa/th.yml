bio: |
  ชื่อของฉันคือ QnA ฉันเป็น Bitcoiner และฉันชอบช่วยเหลือ Bitcoiners คนอื่น ๆ ฉันใช้เวลาทั้งวันในการสร้างเครื่องมืออธิปไตยที่เน้น Bitcoin ที่ Foundation ไซต์นี้เป็นการรวบรวมผลงานของฉันที่ฉันสามารถชี้ให้ผู้คนดูเพื่อช่วยพวกเขาในเส้นทางของพวกเขา หากคุณพบว่ามันมีคุณค่า โปรดแบ่งปันกับเพื่อนของคุณและพิจารณามีส่วนร่วมหรือส่งทิป
short_bio: Bitcoin ผู้ให้การศึกษา
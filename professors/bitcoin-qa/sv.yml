bio: |
  Mitt namn är QnA. Jag är en Bitcoiner och jag gillar att hjälpa andra Bitcoiners. Jag tillbringar mina dagar med att bygga Bitcoin-centrerade suveränitetsverktyg på Foundation. Den här webbplatsen är en samling av mina bidrag som jag kan peka människor mot för att hjälpa dem längs sin resa. Om du tycker att det är värdefullt, vänligen dela det med dina kamrater och överväga att bidra eller skicka ett tips.
  
short_bio: Bitcoin utbildare
bio: |
  Nazywam się QnA. Jestem Bitcoinerem i lubię pomagać innym Bitcoinerom. Moje dni spędzam na budowaniu narzędzi suwerenności Bitcoin w Foundation. Ta strona jest zbiorem mojego wkładu, który mogę wskazać ludziom, aby pomóc im w ich podróży. Jeśli uznasz ją za wartościową, podziel się nią ze swoimi rówieśnikami i rozważ wniesienie wkładu lub wysłanie napiwku.
  
short_bio: Wychowawca Bitcoin
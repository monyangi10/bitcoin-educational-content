bio: |
  Ruben Waterman เป็นผู้ก่อตั้ง Bittr และเป็นผู้ที่ทุ่มเทให้กับ Bitcoin หลังจากได้รับปริญญาโทสาขาสกุลเงินดิจิทัลจากมหาวิทยาลัยนิโคเซีย เขาได้เริ่มสร้างวิธีที่ง่ายที่สุดในการออมในบิตคอยน์ ด้วยความเชื่อมั่นอย่างแรงกล้าว่าบิตคอยน์เป็นเทคโนโลยีการออมที่ดีที่สุด Ruben ได้สร้าง Bittr เป็นเครื่องมือที่เรียบง่ายและตรงไปตรงมาสำหรับผู้ที่ต้องการออมในระยะยาว Bittr รองรับการซื้อบิตคอยน์ทั้งแบบครั้งเดียวและแบบประจำ โดยจะส่งตรงไปยัง wallet ของคุณเสมอ
short_bio: Bittr เป็นบริการที่ง่ายต่อการซื้อ Bitcoin โดยตรงเข้าสู่ Wallet ของคุณเอง
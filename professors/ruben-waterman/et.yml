bio: |
  Ruben Waterman on Bittri asutaja ja pühendunud Bitcoiner. Pärast magistrikraadi omandamist Nikosia ülikoolist digitaalvaluuta alal võttis ta eesmärgiks luua lihtsaim viis Bitcoin-säästmiseks. Kuna Ruben usub kindlalt, et Bitcoin on parim säästmistehnoloogia, ehitas ta Bittri kui minimalistliku ja lihtsakoelise tööriista pikaajaliste säästjate jaoks. Bittr toetab nii ühekordseid kui ka korduvaid Bitcoin oste, mis saadetakse alati otse teie enda Wallet-i.
  
short_bio: Bittr on lihtne teenus, millega saab osta Bitcoin otse oma Wallet-i
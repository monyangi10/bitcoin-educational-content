bio: |
  Ruben Waterman Bittr'nin kurucusu ve kendini Bitcoin'e adamış bir kullanıcıdır. Lefkoşa Üniversitesi'nden Dijital Para Birimi alanında yüksek lisans derecesini aldıktan sonra, Bitcoin'da tasarruf etmenin en basit yolunu yaratmak için yola çıktı. Bitcoin'ın en iyi tasarruf teknolojisi olduğuna dair güçlü bir inanca sahip olan Ruben, Bittr'i uzun vadeli tasarruf sahipleri için minimalist, saçma olmayan bir araç olarak inşa etti. Bittr, her zaman doğrudan kendi Wallet'inize gönderilen hem tek seferlik hem de yinelenen Bitcoin satın alımlarını destekler.
  
short_bio: Bittr, Bitcoin'yi doğrudan kendi Wallet'ünüze satın almak için kolay bir hizmettir
bio: |
  Ruben Waterman là nhà sáng lập Bittr và là một người dùng Bitcoin tận tụy. Sau khi nhận bằng Thạc sĩ về Tiền kỹ thuật số tại Đại học Nicosia, anh bắt đầu tạo ra cách đơn giản nhất để tiết kiệm trong Bitcoin. Với niềm tin mạnh mẽ rằng Bitcoin là công nghệ tiết kiệm tốt nhất, Ruben đã xây dựng Bittr như một công cụ tối giản, thiết thực dành cho những người tiết kiệm dài hạn. Bittr hỗ trợ cả giao dịch mua Bitcoin một lần và định kỳ, luôn được gửi trực tiếp đến tài khoản Wallet của bạn.
short_bio: Bittr là một dịch vụ dễ dàng để mua Bitcoin trực tiếp vào Wallet của bạn
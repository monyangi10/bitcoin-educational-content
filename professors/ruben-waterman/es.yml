bio: |
  Ruben Waterman es el fundador de Bittr y un Bitcoiner comprometido. Tras obtener su máster en Moneda Digital en la Universidad de Nicosia, se propuso crear la forma más sencilla de ahorrar en bitcoin. Convencido de que bitcoin es la mejor tecnología de ahorro, Ruben construyó Bittr como una herramienta minimalista y directa para ahorradores a largo plazo. Bittr permite compras de bitcoin tanto únicas como recurrentes, siempre enviadas directamente a tu propia cartera.

short_bio: Bittr es un servicio sencillo para comprar bitcoin directamente en tu propia cartera.

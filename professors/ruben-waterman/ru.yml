bio: |
  Рубен Уотерман - основатель Bittr и преданный биткойнер. Получив степень магистра в области цифровых валют в Университете Никосии, он задался целью создать самый простой способ накопления в Bitcoin. Будучи твердо уверенным в том, что Bitcoin - лучшая технология накопления, Рубен создал Bittr как минималистичный, бесхитростный инструмент для долгосрочных сберегателей. Bittr поддерживает как разовые, так и повторяющиеся покупки в Bitcoin, которые всегда отправляются непосредственно на ваш собственный Wallet.
  
short_bio: Bittr - это простой сервис для покупки Bitcoin непосредственно в ваш собственный Wallet
bio: |
  Ruben Waterman je zakladatel společnosti Bittr a oddaný uživatel Bitcoinu. Po získání magisterského titulu v oboru digitálních měn na univerzitě v Nikósii se rozhodl vytvořit nejjednodušší způsob spoření v Bitcoin. S pevným přesvědčením, že Bitcoin je nejlepší technologií pro spoření, Ruben vytvořil Bittr jako minimalistický, nesmyslný nástroj pro dlouhodobé střadatele. Bittr podporuje jednorázové i opakované nákupy v Bitcoin, které jsou vždy zasílány přímo na váš vlastní účet Wallet.
  
short_bio: Bittr je jednoduchá služba pro nákup Bitcoin přímo do vašeho vlastního Wallet
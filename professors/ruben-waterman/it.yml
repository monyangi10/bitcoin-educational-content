bio: |
  Ruben Waterman è il fondatore di Bittr e un Bitcoiner convinto. Dopo aver conseguito un master in valute digitali all'Università di Nicosia, ha deciso di creare il modo più semplice per risparmiare in Bitcoin. Con la forte convinzione che il Bitcoin sia la migliore tecnologia di risparmio, Ruben ha costruito Bittr come strumento minimalista e senza fronzoli per i risparmiatori a lungo termine. Bittr supporta sia gli acquisti una tantum che quelli ricorrenti in Bitcoin, sempre inviati direttamente al proprio Wallet.
  
short_bio: Bittr è un servizio semplice per acquistare Bitcoin direttamente nel proprio Wallet
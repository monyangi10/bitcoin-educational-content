bio: |
  Ruben Waterman adalah pendiri Bittr dan seorang Bitcoiner yang berdedikasi. Setelah mendapatkan gelar MSc dalam bidang Mata Uang Digital dari University of Nicosia, ia mulai menciptakan cara paling sederhana untuk menabung dalam Bitcoin. Dengan keyakinan kuat bahwa Bitcoin adalah teknologi tabungan terbaik, Ruben membangun Bittr sebagai alat yang minimalis dan tidak berbelit-belit untuk penabung jangka panjang. Bittr mendukung pembelian Bitcoin satu kali dan berulang, selalu dikirim langsung ke Wallet Anda.
  
short_bio: Bittr adalah layanan yang mudah untuk membeli Bitcoin langsung ke dalam Wallet Anda sendiri
bio: |
  Ruben Waterman ndiye mwanzilishi wa Bittr na Bitcoiner aliyejitolea. Baada ya kupata MSc yake katika Sarafu ya Dijiti kutoka Chuo Kikuu cha Nicosia, aliazimia kuunda njia rahisi zaidi ya kuokoa katika Bitcoin. Kwa imani kubwa kwamba Bitcoin ndiyo teknolojia bora zaidi ya kuweka akiba, Ruben aliiunda Bittr kama zana isiyo na maana na isiyo na maana kwa waokoaji wa muda mrefu. Bittr inasaidia ununuzi wa mara moja na unaorudiwa wa Bitcoin, hutumwa kila mara moja kwa moja kwa Wallet yako mwenyewe.
  
short_bio: Bittr ni huduma rahisi kununua Bitcoin moja kwa moja kwenye Wallet yako mwenyewe
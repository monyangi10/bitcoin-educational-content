bio: |
  Ruben Waterman ist der Gründer von Bittr und ein begeisterter Bitcoiner. Nachdem er seinen MSc in Digitaler Währung an der Universität von Nikosia erworben hatte, machte er sich daran, die einfachste Möglichkeit zum Sparen in Bitcoin zu schaffen. In der festen Überzeugung, dass Bitcoin die beste Spartechnologie ist, hat Ruben Bittr als minimalistisches, unkompliziertes Tool für Langzeitsparer entwickelt. Bittr unterstützt sowohl einmalige als auch wiederkehrende Bitcoin-Käufe, die immer direkt an Ihr eigenes Wallet gesendet werden.
  
short_bio: Bittr ist ein einfacher Dienst zum Kauf von Bitcoin direkt in Ihr eigenes Wallet
bio: |
  Ruben Waterman er grunnleggeren av Bittr og en dedikert bitcoiner. Etter å ha tatt en mastergrad i digital valuta ved University of Nicosia, satte han seg fore å skape den enkleste måten å spare i Bitcoin på. Med en sterk tro på at Bitcoin er den beste spareteknologien, bygde Ruben Bittr som et minimalistisk, no-nonsense-verktøy for langtidssparere. Bittr støtter både engangskjøp og gjentatte Bitcoin-kjøp, som alltid sendes direkte til din egen Wallet.
  
short_bio: Bittr er en enkel tjeneste for å kjøpe Bitcoin direkte til din egen Wallet
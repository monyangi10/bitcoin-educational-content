bio: |
  روبن واترمن بنیان‌گذار Bittr و یک بیت‌کوینر متعهد است. پس از کسب مدرک کارشناسی ارشد در ارز دیجیتال از دانشگاه نیکوزیا، او تصمیم گرفت ساده‌ترین راه برای پس‌انداز در Bitcoin را ایجاد کند. با اعتقاد قوی به اینکه Bitcoin بهترین فناوری پس‌انداز است، روبن Bittr را به عنوان یک ابزار مینیمالیستی و بدون حاشیه برای پس‌اندازکنندگان بلندمدت ساخت. Bittr از خریدهای یک‌باره و دوره‌ای Bitcoin پشتیبانی می‌کند که همیشه مستقیماً به Wallet خودتان ارسال می‌شود.
short_bio: بیتتر یک سرویس آسان برای خرید Bitcoin به‌طور مستقیم به Wallet خودتان است.
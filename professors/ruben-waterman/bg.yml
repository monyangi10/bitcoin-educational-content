bio: |
  Рубен Уотърман е основател на Bittr и отдаден на биткойна. След като получава магистърска степен по цифрова валута от Университета в Никозия, той се заема да създаде най-простия начин за спестяване в биткойни. С твърдото убеждение, че биткойнът е най-добрата технология за спестяване, Рубен създава Bittr като минималистичен, безсмислен инструмент за дългосрочни спестители. Bittr поддържа както еднократни, така и повтарящи се покупки в биткойни, които винаги се изпращат директно на вашия собствен wallet.
  
short_bio: Bittr е лесна услуга за закупуване на Bitcoin директно в собствения ви Wallet
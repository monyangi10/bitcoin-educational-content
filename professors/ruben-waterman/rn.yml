bio: |
  Ruben Waterman niwe yashinze Bittr kandi niwe yiyemeje gukoresha amahera ya Bitcoin. Amaze guhabwa impamyabushobozi ya MSc mu vy’amahera y’ubuhinga bwa none muri kaminuza ya Nicosia, yaciye afata ingingo yo guhingura uburyo bworoshe bwo kuzigama mu Bitcoin. Mu kwemera gukomeye ko Bitcoin ari ubuhinga bwiza bwo kuzigama, Ruben yubatse Bittr nk’igikoresho gitoyi, kitagira ubusa ku bazigama igihe kirekire. Bittr ishigikira ugugura kwa Bitcoin rimwe n'ugusubiramwo, kwama koherezwa kuri Wallet yawe.
  
short_bio: Bittr ni service yoroshe yo kugura Bitcoin uyishire muri Wallet yawe bwite.
bio: |
  Ruben Waterman jest założycielem Bittr i oddanym Bitcoinerem. Po uzyskaniu tytułu magistra w dziedzinie walut cyfrowych na Uniwersytecie w Nikozji, postanowił stworzyć najprostszy sposób oszczędzania w Bitcoin. Z silnym przekonaniem, że Bitcoin jest najlepszą technologią oszczędzania, Ruben zbudował Bittr jako minimalistyczne, bezsensowne narzędzie dla długoterminowych oszczędzających. Bittr obsługuje zarówno jednorazowe, jak i cykliczne zakupy Bitcoin, zawsze wysyłane bezpośrednio do własnego Wallet.
  
short_bio: Bittr to łatwa usługa umożliwiająca zakup Bitcoin bezpośrednio do własnego Wallet
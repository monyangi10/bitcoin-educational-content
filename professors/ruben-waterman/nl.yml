bio: |
  Ruben Waterman is de oprichter van Bittr en een toegewijde Bitcoiner. Na het behalen van zijn MSc in Digitale Valuta aan de Universiteit van Nicosia, ging hij op zoek naar de eenvoudigste manier om in Bitcoin te sparen. Met de overtuiging dat Bitcoin de beste spaartechnologie is, bouwde Ruben Bittr als een minimalistische, no-nonsense tool voor langetermijnspaarders. Bittr ondersteunt zowel eenmalige als terugkerende Bitcoin aankopen, die altijd direct naar je eigen Wallet worden gestuurd.
  
short_bio: Bittr is een gemakkelijke service om Bitcoin direct in je eigen Wallet te kopen
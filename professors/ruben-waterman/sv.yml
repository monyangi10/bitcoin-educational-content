bio: |
  Ruben Waterman är grundare av Bittr och en hängiven Bitcoiner. Efter att ha tagit sin MSc i digital valuta från University of Nicosia bestämde han sig för att skapa det enklaste sättet att spara i Bitcoin. Med en stark tro på att Bitcoin är den bästa sparandetekniken byggde Ruben Bittr som ett minimalistiskt, no-nonsense-verktyg för långsiktiga sparare. Bittr stöder både engångs- och återkommande Bitcoin-köp, som alltid skickas direkt till din egen Wallet.
  
short_bio: Bittr är en enkel tjänst för att köpa Bitcoin direkt till din egen Wallet
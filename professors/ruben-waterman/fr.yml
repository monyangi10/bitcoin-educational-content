bio: |
  Ruben Waterman est le fondateur de Bittr et un Bitcoiner convaincu. Après avoir obtenu son master en Monnaie Numérique à l’Université de Nicosie, il a voulu créer le moyen le plus simple d’épargner en bitcoin. Convaincu que le bitcoin est la meilleure technologie d’épargne, Ruben a conçu Bittr comme un outil minimaliste et sans complication pour les épargnants à long terme. Bittr prend en charge les achats de bitcoin uniques ou récurrents, toujours envoyés directement vers votre propre portefeuille.

short_bio: Bittr est un service simple pour acheter du bitcoin directement sur votre propre portefeuille.

bio: |
  Ruben Waterman é o fundador da Bittr e um Bitcoiner dedicado. Depois de obter o seu MSc em Moeda Digital pela Universidade de Nicosia, ele propôs-se a criar a forma mais simples de poupar em Bitcoin. Com uma forte crença de que o Bitcoin é a melhor tecnologia de poupança, Ruben construiu o Bittr como uma ferramenta minimalista e sem sentido para poupadores de longo prazo. O Bittr suporta compras únicas e recorrentes em Bitcoin, sempre enviadas diretamente para o seu próprio Wallet.
  
short_bio: Bittr é um serviço fácil para comprar Bitcoin diretamente para o seu próprio Wallet
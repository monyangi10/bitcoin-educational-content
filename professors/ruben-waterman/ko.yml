bio: |
  루벤 워터맨은 비트르의 창립자이자 열렬한 비트코인 애호가입니다. 니코시아 대학교에서 디지털 화폐 석사 학위를 취득한 후, 그는 가장 간단한 Bitcoin 저축 방법을 만들기 시작했습니다. Bitcoin이 최고의 저축 기술이라는 확고한 신념을 가지고 루벤은 장기 저축자를 위한 미니멀하고 간편한 도구로 Bittr을 만들었습니다. Bittr은 일회성 및 반복적인 Bitcoin 구매를 모두 지원하며, 항상 자신의 Wallet로 직접 전송됩니다.
  
short_bio: Bittr은 Bitcoin를 직접 Wallet로 구매할 수 있는 간편한 서비스입니다
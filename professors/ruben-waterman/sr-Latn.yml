bio: |
  Ruben Waterman je osnivač Bittr-a i posvećeni Bitcoiner. Nakon što je stekao zvanje MSc u Digitalnoj Valuti na Univerzitetu u Nikoziji, odlučio je da kreira najjednostavniji način za štednju u Bitcoin. Sa snažnim uverenjem da je Bitcoin najbolja tehnologija za štednju, Ruben je izgradio Bittr kao minimalistički, jednostavan alat za dugoročne štediše. Bittr podržava jednokratne i ponavljajuće kupovine Bitcoin, koje se uvek šalju direktno na vaš sopstveni Wallet.
short_bio: Bittr je jednostavna usluga za kupovinu Bitcoin direktno u vaš sopstveni Wallet
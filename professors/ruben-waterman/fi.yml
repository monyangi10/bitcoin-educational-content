bio: |
  Ruben Waterman on Bittrin perustaja ja vannoutunut Bitcoiner. Valmistuttuaan digitaalisen valuutan maisteriksi Nikosian yliopistosta hän lähti luomaan yksinkertaisinta tapaa säästää Bitcoin:lla. Ruben uskoo vahvasti, että Bitcoin on paras säästöteknologia, ja hän rakensi Bittrin minimalistiseksi, mutkattomaksi työkaluksi pitkäaikaissäästäjille. Bittr tukee sekä kertaluonteisia että toistuvia Bitcoin-ostoksia, jotka lähetetään aina suoraan omaan Wallet:ään.
  
short_bio: Bittr on helppo palvelu ostaa Bitcoin suoraan omaan Wallet:een
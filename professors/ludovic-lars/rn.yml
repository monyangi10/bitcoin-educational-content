bio: |
  Ludovic Lars ni umwanditsi, umunyamakuru, n’umumenyereza mw’isi ya Bitcoin n’amahera y’amahera. Yahumekewe n’ivyiyumviro vy’ubwigenge, yavumbuye Bitcoin mu 2013, kandi yarayihebeye kuva mu 2017. Yanditse igitabu citwa The Elegance of Bitcoin, casohowe mu 2024 n’ishirahamwe ryitwa Konsensus Network. Yarafashije mu guhindura ibitabu vy’ubutunzi bw’amahinguriro, igitabu ca Satoshi, n’intambara y’ubunini bw’amabuye. Yanditse kandi ingingo zirenga ijana ku rubuga rwiwe no ku yindi mihora yihariye. Kubera ko afise ubumenyi mu vya siyansi, yama arondera gusobanura neza amafaranga y’ibanga kandi aherutse kwiga amateka ya Bitcoin.
  
short_bio: Umwanditsi w’igitabu Ubwiza bwa Bitcoin.
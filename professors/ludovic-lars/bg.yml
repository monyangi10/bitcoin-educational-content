bio: |
  Людовик Ларс е автор, редактор и обучител в областта на Bitcoin и криптовалутите. Вдъхновен от либералните идеи, той открива Bitcoin през 2013 г. и му се посвещава от 2017 г. насам. Автор е на книгата "Елегантността на Bitcoin", публикувана през 2024 г. от Konsensus Network. Допринася за превода на Cryptoeconomics, The Book of Satoshi и The Blocksize War. Освен това е написал повече от сто статии в блога си и в други специализирани сайтове. С научно образование, той винаги се е стремял да описва криптовалутите възможно най-точно и напоследък се е специализирал в изучаването на историята на Bitcoin.
  
short_bio: Автор на The Elegance of Bitcoin
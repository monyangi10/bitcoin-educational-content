bio: |
  Ludovic Lars is auteur, redacteur en trainer in de wereld van Bitcoin en cryptocurrency. Geïnspireerd door liberale ideeën ontdekte hij Bitcoin in 2013 en is er sinds 2017 aan toegewijd. Hij schreef The Elegance of Bitcoin, gepubliceerd in 2024 door Konsensus Network. Hij heeft bijgedragen aan de vertaling van Cryptoeconomics, The Book of Satoshi en The Blocksize War. Hij heeft ook meer dan honderd artikelen geschreven op zijn blog en andere gespecialiseerde sites. Met een wetenschappelijke achtergrond heeft hij er altijd naar gestreefd cryptocurrency zo nauwkeurig mogelijk te beschrijven en hij heeft zich recentelijk gespecialiseerd in het bestuderen van de geschiedenis van Bitcoin.
  
short_bio: Auteur van De elegantie van Bitcoin
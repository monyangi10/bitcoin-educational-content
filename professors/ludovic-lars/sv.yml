bio: |
  Ludovic Lars är författare, redaktör och utbildare i världen av Bitcoin och kryptovaluta. Inspirerad av liberala idéer upptäckte han Bitcoin 2013 och har ägnat sig åt det sedan 2017. Han skrev The Elegance of Bitcoin, som publicerades 2024 av Konsensus Network. Han bidrog till översättningen av Cryptoeconomics, The Book of Satoshi och The Blocksize War. Han har också skrivit mer än hundra artiklar på sin blogg och andra specialiserade webbplatser. Med en vetenskaplig bakgrund har han alltid försökt beskriva kryptovaluta så exakt som möjligt och har nyligen specialiserat sig på att studera Bitcoin:s historia.
  
short_bio: Författare till The Elegance of Bitcoin
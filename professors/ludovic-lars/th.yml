bio: |
  Ludovic Lars เป็นนักเขียน บรรณาธิการ และผู้ฝึกอบรมในโลกของ Bitcoin และสกุลเงินดิจิทัล ได้รับแรงบันดาลใจจากแนวคิดเสรีนิยม เขาค้นพบ Bitcoin ในปี 2013 และได้ทุ่มเทให้กับมันตั้งแต่ปี 2017 เขาเขียนหนังสือ The Elegance of Bitcoin ซึ่งตีพิมพ์ในปี 2024 โดย Konsensus Network เขามีส่วนร่วมในการแปล Cryptoeconomics, The Book of Satoshi และ The Blocksize War นอกจากนี้เขายังเขียนบทความมากกว่าร้อยบทความในบล็อกของเขาและเว็บไซต์เฉพาะทางอื่น ๆ ด้วยพื้นฐานทางวิทยาศาสตร์ เขามักจะพยายามอธิบายสกุลเงินดิจิทัลให้ถูกต้องที่สุดเท่าที่จะเป็นไปได้ และเมื่อเร็ว ๆ นี้เขาได้เชี่ยวชาญในการศึกษาประวัติศาสตร์ของ Bitcoin
short_bio: ผู้เขียน The Elegance of Bitcoin
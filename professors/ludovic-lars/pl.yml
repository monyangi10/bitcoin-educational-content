bio: |
  Ludovic Lars jest autorem, redaktorem i trenerem w świecie Bitcoin i kryptowalut. Zainspirowany liberalnymi ideami, odkrył Bitcoin w 2013 roku i poświęcił się mu od 2017 roku. Napisał książkę The Elegance of Bitcoin, opublikowaną w 2024 r. przez Konsensus Network. Przyczynił się do przetłumaczenia Cryptoeconomics, The Book of Satoshi i The Blocksize War. Napisał również ponad sto artykułów na swoim blogu i innych specjalistycznych stronach. Mając wykształcenie naukowe, zawsze starał się jak najdokładniej opisywać kryptowaluty, a ostatnio specjalizuje się w badaniu historii Bitcoin.
  
short_bio: Autor The Elegance of Bitcoin
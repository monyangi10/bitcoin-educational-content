bio: |
  Ludovic Lars je autor, urednik i trener u svetu Bitcoin i kriptovaluta. Inspirisan liberalnim idejama, otkrio je Bitcoin 2013. godine i posvetio mu se od 2017. Napisao je The Elegance of Bitcoin, objavljen 2024. od strane Konsensus Network. Doprineo je prevodu Cryptoeconomics, The Book of Satoshi, i The Blocksize War. Takođe je napisao više od stotinu članaka na svom blogu i drugim specijalizovanim sajtovima. Sa naučnom pozadinom, uvek je težio da što tačnije opiše kriptovalute i nedavno se specijalizovao za proučavanje istorije Bitcoin.
short_bio: Autor knjige "Elegancija Bitcoin"
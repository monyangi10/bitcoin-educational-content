bio: |
  루도빅 라스는 Bitcoin 및 암호화폐 분야의 저자, 편집자, 트레이너입니다. 자유주의 사상에서 영감을 받아 2013년에 Bitcoin을 발견하고 2017년부터 이 분야에 전념하고 있습니다. 그는 2024년 컨센서스 네트워크에서 출간한 'Bitcoin의 우아함'을 저술했습니다. 크립토이코노믹스, Satoshi의 책, 블록사이즈 전쟁의 번역에도 기여했습니다. 또한 블로그와 기타 전문 사이트에 백 개가 넘는 기사를 작성했습니다. 과학적 배경을 가진 그는 항상 암호화폐를 가능한 한 정확하게 설명하고자 노력해왔으며, 최근에는 Bitcoin의 역사를 전문적으로 연구하고 있습니다.
  
short_bio: Bitcoin의 우아함 저자
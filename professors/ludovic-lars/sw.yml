bio: |
  Ludovic Lars ni mwandishi, mhariri, na mkufunzi katika ulimwengu wa Bitcoin na cryptocurrency. Alihamasishwa na mawazo huria, aligundua Bitcoin mwaka 2013 na amejitolea kwake tangu 2017. Aliandika The Elegance of Bitcoin, iliyochapishwa mwaka wa 2024 na Konsensus Network. Alichangia katika tafsiri ya Cryptoeconomics, The Book of Satoshi, na The Blocksize War. Pia ameandika zaidi ya makala mia moja kwenye blogu yake na tovuti nyingine maalumu. Akiwa na historia ya kisayansi, amekuwa akitafuta kuelezea sarafu-fiche kwa usahihi iwezekanavyo na hivi karibuni amebobea katika kusoma historia ya Bitcoin.
  
short_bio: Mwandishi wa The Elegance of Bitcoin
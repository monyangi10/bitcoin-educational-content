bio: |
  Ludovic Lars 是 Bitcoin 和加密貨幣世界的作者、編輯和培訓員。受到自由思想的啟發，他在 2013 年發現了 Bitcoin，並從 2017 年開始致力於此。他撰寫了《The Elegance of Bitcoin》，於 2024 年由 Konsensus Network 出版。他參與翻譯了《加密經濟學》、《Satoshi 之書》和《區塊大小戰爭》。他還在自己的部落格和其他專門網站寫了一百多篇文章。擁有科學背景的他，一直力求盡可能精確地描述加密貨幣，最近更專門研究 Bitcoin 的歷史。
  
short_bio: The Elegance of Bitcoin 的作者
bio: |
  Ludovic Lars, Bitcoin ve kripto para dünyasında bir yazar, editör ve eğitmendir. Liberal fikirlerden esinlenerek 2013 yılında Bitcoin'ı keşfetti ve 2017'den beri kendini ona adadı. Konsensus Network tarafından 2024 yılında yayınlanan The Elegance of Bitcoin kitabını yazdı. Cryptoeconomics, The Book of Satoshi ve The Blocksize War kitaplarının çevirisine katkıda bulundu. Ayrıca blogunda ve diğer özel sitelerde yüzden fazla makale yazdı. Bilimsel bir geçmişe sahip olarak, kripto para birimini her zaman mümkün olduğunca doğru bir şekilde tanımlamaya çalışmış ve son zamanlarda Bitcoin'ın tarihini inceleme konusunda uzmanlaşmıştır.
  
short_bio: The Elegance of Bitcoin kitabının yazarı
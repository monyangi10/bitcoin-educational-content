bio: |
  لودویک لارس نویسنده، ویراستار و مربی در دنیای Bitcoin و ارزهای دیجیتال است. او که از ایده‌های لیبرال الهام گرفته بود، در سال ۲۰۱۳ با Bitcoin آشنا شد و از سال ۲۰۱۷ به آن اختصاص داده شده است. او کتاب "ظرافت Bitcoin" را نوشت که در سال ۲۰۲۴ توسط شبکه Konsensus منتشر شد. او در ترجمه کتاب‌های "اقتصاد رمزنگاری"، "کتاب Satoshi" و "جنگ اندازه بلاک" مشارکت داشته است. او همچنین بیش از صد مقاله در وبلاگ خود و سایت‌های تخصصی دیگر نوشته است. با داشتن پیشینه علمی، او همیشه به دنبال توصیف دقیق ارزهای دیجیتال بوده و اخیراً در مطالعه تاریخچه Bitcoin تخصص یافته است.
short_bio: نویسنده کتاب The Elegance of Bitcoin
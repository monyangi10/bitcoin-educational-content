bio: |
  Ludovic Lars on kirjailija, toimittaja ja kouluttaja Bitcoin- ja kryptovaluuttamaailmassa. Liberaalien ajatusten innoittamana hän löysi Bitcoin:n vuonna 2013 ja on omistautunut sille vuodesta 2017 lähtien. Hän kirjoitti The Elegance of Bitcoin:n, jonka Konsensus Network julkaisi vuonna 2024. Hän osallistui Cryptoeconomicsin, The Book of Satoshi:n ja The Blocksize Warin kääntämiseen. Hän on myös kirjoittanut yli sata artikkelia blogiinsa ja muille erikoistuneille sivustoille. Luonnontieteellisen taustan omaavana hän on aina pyrkinyt kuvaamaan kryptovaluuttaa mahdollisimman tarkasti ja on viime aikoina erikoistunut Bitcoin:n historian tutkimiseen.
  
short_bio: Teoksen kirjoittaja The Elegance of Bitcoin

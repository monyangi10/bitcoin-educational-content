bio: |
  Sa akademskim obrazovanjem iz fizike i iskustvom kao tehnološki konsultant, od 2013. godine Giacomo Zucco se ponovo pronašao kao aktivni Bitcoin preduzetnik (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) i organizator događaja (Milan Bitcoin Meetup, Scaling Bitcoin konferencije, Understanding Bitcoin konferencije). Takođe je radio kao freelance konsultant i trener i podržavao inženjere u kreiranju nekoliko otvorenih standarda (kao što su BOLT, OTS, RGB, BDK).
  
  Još uvek je uključen kao konsultant i mikro-investitor u mnoge kompanije i organizacije povezane sa Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), ali njegov glavni fokus od 2024. godine je inicijativa Plan B Network.
short_bio: Ja sam Giacomo Zucco
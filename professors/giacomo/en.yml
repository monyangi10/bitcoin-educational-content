bio: |
  With an academic background in Physics and a background as a technology consultant, since 2013 Giacomo Zucco has reinvented himself as an active Bitcoin entrepreneur (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) and event organizer (Milan Bitcoin Meetup, Scaling Bitcoin conferences, Understanding Bitcoin conferences). He has also worked as a freelance consultant and trainer and supported engineers in the creation of several open standards (such as BOLT, OTS, RGB, BDK).
  
  He is still involved as a consultant and micro-investor in many Bitcoin-related companies and organizations (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), but his main focus since 2024 has been the Plan B Network initiative.
  
short_bio: I am Giacomo Zucco
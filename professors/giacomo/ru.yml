bio: |
  Имея академическое образование в области физики и опыт работы консультантом по технологиям, с 2013 года Giacomo Zucco переродился в активного предпринимателя Bitcoin (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) и организатора мероприятий (Milan Bitcoin Meetup, конференции Scaling Bitcoin, Understanding Bitcoin). Он также работал в качестве внештатного консультанта и тренера и помогал инженерам в создании нескольких открытых стандартов (таких как BOLT, OTS, RGB, BDK).
  
  Он по-прежнему участвует в качестве консультанта и микроинвестора во многих компаниях и организациях, связанных с Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, Ассоциация LNP-BP, Plan B Foundation), но с 2024 года его основным направлением является инициатива Plan B Network.
  
short_bio: Я - Giacomo Zucco
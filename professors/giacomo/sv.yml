bio: |
  Med en akademisk bakgrund inom fysik och en bakgrund som teknikkonsult har Giacomo Zucco sedan 2013 återuppfunnit sig själv som en aktiv Bitcoin-entreprenör (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) och evenemangsarrangör (Milan Bitcoin Meetup, Scaling Bitcoin-konferenser, Understanding Bitcoin-konferenser). Han har också arbetat som frilanskonsult och utbildare och stöttat ingenjörer i skapandet av flera öppna standarder (t.ex. BOLT, OTS, RGB, BDK).
  
  Han är fortfarande involverad som konsult och mikroinvesterare i många Bitcoin-relaterade företag och organisationer (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), men hans huvudfokus sedan 2024 har varit Plan B Network-initiativet.
  
short_bio: Jag är Giacomo Zucco
bio: |
  Fizik alanında akademik bir geçmişe ve teknoloji danışmanlığı geçmişine sahip olan Giacomo Zucco, 2013 yılından bu yana aktif bir Bitcoin girişimcisi (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) ve etkinlik organizatörü (Milan Bitcoin Meetup, Scaling Bitcoin konferansları, Understanding Bitcoin konferansları) olarak kendini yeniden keşfetti. Ayrıca serbest danışman ve eğitmen olarak çalışmış ve çeşitli açık standartların (BOLT, OTS, RGB, BDK gibi) oluşturulmasında mühendislere destek vermiştir.
  
  Halen Bitcoin ile ilgili birçok şirket ve kuruluşta (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation) danışman ve mikro yatırımcı olarak yer almaktadır, ancak 2024'ten bu yana ana odak noktası Plan B Network girişimidir.
  
short_bio: Ben Giacomo Zucco
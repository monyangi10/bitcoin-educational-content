bio: |
  物理学の学歴と技術コンサルタントの経歴を持ち、2013年以降、Bitcoin起業家（BSolutions、Coincapital、Bitsource、Greenaddress、inBitcoin、Blockchainlab、0301、BTCTimes、Bcademy、BHB Network）、イベントオーガナイザー（Milan Bitcoin Meetup、Scaling Bitcoinカンファレンス、Understanding Bitcoinカンファレンス）として活躍。また、フリーランスのコンサルタントやトレーナーとしても活動し、いくつかのオープンスタンダード（BOLT、OTS、RGB、BDKなど）の作成においてエンジニアをサポートしてきた。
  
  現在も多くのBitcoin関連企業や組織（OCEAN、Relai、Satsback、Xsats、Geyser、Invebit、Lightning Ventures、Breez、LNP-BP Association、Plan B Foundation）にコンサルタントやマイクロ投資家として関わっているが、2024年以降はPlan B Network構想に主眼を置いている。
  
short_bio: 私はGiacomo Zucco
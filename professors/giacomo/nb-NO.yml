bio: |
  Med en akademisk bakgrunn i fysikk og en bakgrunn som teknologikonsulent, har Giacomo Zucco siden 2013 gjenoppfunnet seg selv som en aktiv Bitcoin-gründer (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) og arrangør av arrangementer (Milan Bitcoin Meetup, Scaling Bitcoin-konferanser, Understanding Bitcoin-konferanser). Han har også jobbet som frilanskonsulent og kursholder og støttet ingeniører i etableringen av flere åpne standarder (for eksempel BOLT, OTS, RGB, BDK).
  
  Han er fortsatt involvert som konsulent og mikroinvestor i mange Bitcoin-relaterte selskaper og organisasjoner (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), men hans hovedfokus siden 2024 har vært Plan B Network-initiativet.
  
short_bio: Jeg er Giacomo Zucco
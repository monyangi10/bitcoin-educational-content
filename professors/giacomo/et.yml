bio: |
  Giacomo Zucco, kellel on akadeemiline taust füüsikas ja tehnoloogiakonsultant, on alates 2013. aastast tegutsenud aktiivselt Bitcoin ettevõtjana (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) ja ürituste korraldajana (Milano Bitcoin Meetup, Scaling Bitcoin konverentsid, Understanding Bitcoin konverentsid). Ta on töötanud ka vabakutselise konsultandi ja koolitajana ning toetanud insenere mitmete avatud standardite (nt BOLT, OTS, RGB, BDK) loomisel.
  
  Ta osaleb endiselt konsultandina ja mikroinvestorina paljudes Bitcoinga seotud ettevõtetes ja organisatsioonides (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), kuid alates 2024. aastast on tema põhifookus olnud Plan B Network algatusel.
  
short_bio: Ma olen Giacomo Zucco
bio: |
  Kubera ko afise ubumenyi mu vy’ubuhinga bwa fizike, akaba n’ubumenyi bwo kuba umujanama mu vy’ubuhinga bwa none, kuva mu 2013 Giacomo Zucco yarasubiye kwihingura nk’umugwi w’abahinga mu vy’ubuhinga bwa none. Bitcoin Meetup, Gutera imbere mu nama za Bitcoin, Gutahura inama za Bitcoin). Yarakoze kandi nk’umujanama n’umumenyereza yigenga kandi yarafashije abahinga mu kurema ingingo ngenderwako nyinshi zifunguye (nka BOLT, OTS, RGB, BDK).
  
  Aracari mu bikorwa vy’ubuhinga nk’umujanama n’umushoramari muto mu masosiyete n’imiryango myinshi ifitaniye isano na Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, Ishirahamwe rya LNP-BP, Ishirahamwe rya Plan B Foundation), ariko ikintu nyamukuru yitaho kuva mu 2024 ni ugukorana n’ishirahamwe ryitwa Plan Biti.
  
short_bio: Ndi Giacomo Zucco.
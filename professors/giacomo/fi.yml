bio: |
  Giacomo Zucco, jolla on akateeminen fysiikan tausta ja tausta teknologiakonsulttina, on vuodesta 2013 lähtien toiminut aktiivisena Bitcoin-yrittäjänä (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) ja tapahtumajärjestäjänä (Milan Bitcoin Meetup, Scaling Bitcoin -konferenssit, Understanding Bitcoin -konferenssit). Hän on toiminut myös freelance-konsulttina ja kouluttajana ja tukenut insinöörejä useiden avointen standardien (kuten BOLT, OTS, RGB, BDK) luomisessa.
  
  Hän on edelleen mukana konsulttina ja mikrosijoittajana monissa Bitcoin:aan liittyvissä yrityksissä ja organisaatioissa (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), mutta vuodesta 2024 lähtien hänen pääpainopisteensä on ollut Plan B Network -aloite.
  
short_bio: Olen Giacomo Zucco
bio: |
  Met een academische achtergrond in Natuurkunde en een achtergrond als technologieconsultant heeft Giacomo Zucco zichzelf sinds 2013 opnieuw uitgevonden als actieve Bitcoin ondernemer (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) en organisator van evenementen (Milaan Bitcoin Meetup, Scaling Bitcoin conferenties, Understanding Bitcoin conferenties). Hij heeft ook gewerkt als freelance consultant en trainer en heeft ingenieurs ondersteund bij het creëren van verschillende open standaarden (zoals BOLT, OTS, RGB, BDK).
  
  Hij is nog steeds betrokken als consultant en micro-investeerder bij veel Bitcoin-gerelateerde bedrijven en organisaties (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), maar zijn belangrijkste focus sinds 2024 is het Plan B Network initiatief.
  
short_bio: Ik ben Giacomo Zucco
bio: |
  Akiwa na historia ya kitaaluma katika Fizikia na historia kama mshauri wa teknolojia, tangu 2013 Giacomo Zucco amejifungua tena kama mfanyabiashara anayefanya kazi wa Bitcoin (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, Sganizer-0 Meet-uplan GW organisation GW) mikutano, Kuelewa mikutano ya Bitcoin). Pia amefanya kazi kama mshauri wa kujitegemea na mkufunzi na kusaidia wahandisi katika uundaji wa viwango kadhaa vya wazi (kama vile BOLT, OTS, RGB, BDK).
  
  Bado anahusika kama mshauri na mwekezaji mdogo katika makampuni na mashirika mengi yanayohusiana na Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), lakini lengo lake kuu tangu 2024 limekuwa mpango wa Mtandao wa Plan B.
  
short_bio: Mimi ni Giacomo Zucco
bio: |
  Z wykształceniem akademickim w dziedzinie fizyki i doświadczeniem jako konsultant technologiczny, od 2013 roku Giacomo Zucco stał się aktywnym przedsiębiorcą Bitcoin (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) i organizatorem wydarzeń (Milan Bitcoin Meetup, konferencje Scaling Bitcoin, konferencje Understanding Bitcoin). Pracował również jako niezależny konsultant i trener oraz wspierał inżynierów w tworzeniu kilku otwartych standardów (takich jak BOLT, OTS, RGB, BDK).
  
  Nadal jest zaangażowany jako konsultant i mikroinwestor w wiele firm i organizacji związanych z Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, Stowarzyszenie LNP-BP, Fundacja Plan B), ale jego głównym celem od 2024 roku jest inicjatywa Plan B Network.
  
short_bio: Jestem Giacomo Zucco
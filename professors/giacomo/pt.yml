bio: |
  Com formação académica em Física e experiência como consultor tecnológico, desde 2013 que Giacomo Zucco se reinventou como empresário ativo no domínio do Bitcoin (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) e organizador de eventos (Milan Bitcoin Meetup, conferências Scaling Bitcoin, conferências Understanding Bitcoin). Trabalhou também como consultor e formador freelance e apoiou engenheiros na criação de várias normas abertas (como BOLT, OTS, RGB, BDK).
  
  Ainda está envolvido como consultor e micro-investidor em muitas empresas e organizações relacionadas com o Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), mas o seu principal foco desde 2024 tem sido a iniciativa Plan B Network.
  
short_bio: Chamo-me Giacomo Zucco
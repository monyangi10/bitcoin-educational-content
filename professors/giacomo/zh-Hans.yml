bio: |
  拥有物理学学术背景和技术顾问背景的 Giacomo Zucco 自 2013 年起重塑自我，成为一名活跃的 Bitcoin 企业家（BSolutions、Coincapital、Bitsource、Greenaddress、inBitcoin、Blockchainlab、0301、BTCTimes、Bcademy、BHB Network）和活动组织者（米兰 Bitcoin Meetup、Scaling Bitcoin 会议、Understanding Bitcoin 会议）。他还曾担任自由职业顾问和培训师，并在多个开放标准（如 BOLT、OTS、RGB、BDK）的创建过程中为工程师提供支持。
  
  目前，他仍以顾问和小额投资者的身份参与许多与 Bitcoin 相关的公司和组织（OCEAN、Relai、Satsback、Xsats、Geyser、Invebit、Lightning Ventures、Breez、LNP-BP 协会、Plan B 基金会），但自 2024 年以来，他的主要关注点一直是 Plan B Network 计划。
  
short_bio: 我是 Giacomo Zucco
bio: |
  물리학을 전공하고 기술 컨설턴트로서의 경력을 쌓은 Giacomo Zucco은 2013년부터 Bitcoin 기업가(BSolutions, 코인캐피털, 비트소스, 그린어드레스, 인비트코인, 블록체인랩, 0301, BTCTimes, 비아카데미, BHB 네트워크) 및 이벤트 주최자(밀라노 Bitcoin 밋업, 스케일링 Bitcoin 컨퍼런스, 이해 Bitcoin 컨퍼런스)로 재탄생했습니다. 또한 프리랜서 컨설턴트 및 트레이너로 활동하며 여러 개방형 표준(예: BOLT, OTS, RGB, BDK)을 만드는 데 엔지니어를 지원했습니다.
  
  그는 여전히 많은 Bitcoin 관련 회사 및 단체(OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP 협회, Plan B 재단)에서 컨설턴트 및 소액 투자자로 참여하고 있지만 2024년부터는 주로 Plan B 네트워크 이니셔티브에 집중하고 있습니다.
  
short_bio: 나는 Giacomo Zucco입니다
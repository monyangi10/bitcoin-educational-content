bio: |
  Con formación académica en Física y experiencia como consultor tecnológico, desde 2013 Giacomo Zucco se ha reinventado como emprendedor activo de Bitcoin (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) y organizador de eventos (Milan Bitcoin Meetup, conferencias Scaling Bitcoin, conferencias Understanding Bitcoin). También ha trabajado como consultor y formador autónomo y ha apoyado a ingenieros en la creación de varios estándares abiertos (como BOLT, OTS, RGB, BDK).
  
  Sigue participando como consultor y microinversor en muchas empresas y organizaciones relacionadas con Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), pero su principal objetivo desde 2024 ha sido la iniciativa Plan B Network.
  
short_bio: Soy Giacomo Zucco
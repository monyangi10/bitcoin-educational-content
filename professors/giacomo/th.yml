bio: |
  ด้วยพื้นฐานทางวิชาการในสาขาฟิสิกส์และประสบการณ์เป็นที่ปรึกษาด้านเทคโนโลยี ตั้งแต่ปี 2013 Giacomo Zucco ได้ปรับเปลี่ยนตัวเองเป็นผู้ประกอบการ Bitcoin ที่มีความกระตือรือร้น (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) และผู้จัดงาน (Milan Bitcoin Meetup, Scaling Bitcoin conferences, Understanding Bitcoin conferences) เขายังทำงานเป็นที่ปรึกษาอิสระและผู้ฝึกอบรมและสนับสนุนวิศวกรในการสร้างมาตรฐานเปิดหลายอย่าง (เช่น BOLT, OTS, RGB, BDK)
  
  เขายังคงมีส่วนร่วมเป็นที่ปรึกษาและนักลงทุนรายย่อยในหลายบริษัทและองค์กรที่เกี่ยวข้องกับ Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation) แต่ตั้งแต่ปี 2024 เป็นต้นมา ความสนใจหลักของเขาคือโครงการ Plan B Network.
short_bio: ฉันคือ Giacomo Zucco
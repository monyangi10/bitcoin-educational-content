bio: |
  С академично образование по физика и опит като технологичен консултант, от 2013 г. Giacomo Zucco се преоткрива като активен Bitcoin предприемач (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) и организатор на събития (Milan Bitcoin Meetup, Scaling Bitcoin conferences, Understanding Bitcoin conferences). Работил е и като консултант и обучител на свободна практика и е подпомагал инженерите в създаването на няколко отворени стандарта (като BOLT, OTS, RGB, BDK).
  
  Той все още участва като консултант и микроинвеститор в много компании и организации, свързани с Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), но основният му фокус от 2024 г. насам е инициативата Plan B Network.
  
short_bio: Аз съм Giacomo Zucco
bio: |
  Dengan latar belakang akademis di bidang Fisika dan latar belakang sebagai konsultan teknologi, sejak tahun 2013 Giacomo Zucco telah mengubah dirinya menjadi seorang wirausahawan Bitcoin yang aktif (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) dan penyelenggara acara (Milan Bitcoin Meetup, konferensi Scaling Bitcoin, konferensi Understanding Bitcoin). Dia juga bekerja sebagai konsultan dan pelatih lepas serta mendukung para insinyur dalam pembuatan beberapa standar terbuka (seperti BOLT, OTS, RGB, BDK).
  
  Dia masih terlibat sebagai konsultan dan investor mikro di banyak perusahaan dan organisasi yang terkait dengan Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), tetapi fokus utamanya sejak tahun 2024 adalah inisiatif Plan B Network.
  
short_bio: Saya Giacomo Zucco
bio: |
  Giacomo Zucco má akademické vzdělání v oboru fyziky a zkušenosti technologického konzultanta a od roku 2013 se znovu objevil jako aktivní podnikatel v oblasti Bitcoin (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) a organizátor akcí (Milan Bitcoin Meetup, konference Scaling Bitcoin, konference Understanding Bitcoin). Pracoval také jako konzultant a školitel na volné noze a podporoval inženýry při vytváření několika otevřených standardů (například BOLT, OTS, RGB, BDK).
  
  Stále se angažuje jako konzultant a mikroinvestor v mnoha společnostech a organizacích souvisejících s Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), ale od roku 2024 se zaměřuje především na iniciativu Plan B Network.
  
short_bio: Jsem Giacomo Zucco
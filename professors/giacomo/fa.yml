bio: |
  با پیشینه‌ای در فیزیک و تجربه‌ای به عنوان مشاور فناوری، از سال 2013، Giacomo Zucco خود را به عنوان یک کارآفرین فعال Bitcoin (BSolutions، Coincapital، Bitsource، Greenaddress، inBitcoin، Blockchainlab، 0301، BTCTimes، Bcademy، BHB Network) و سازمان‌دهنده رویداد (Milan Bitcoin Meetup، کنفرانس‌های Scaling Bitcoin، کنفرانس‌های Understanding Bitcoin) بازآفرینی کرده است. او همچنین به عنوان مشاور و مربی مستقل کار کرده و از مهندسان در ایجاد چندین استاندارد باز (مانند BOLT، OTS، RGB، BDK) حمایت کرده است.
  
  او همچنان به عنوان مشاور و سرمایه‌گذار خرد در بسیاری از شرکت‌ها و سازمان‌های مرتبط با Bitcoin (OCEAN، Relai، Satsback، Xsats، Geyser، Invebit، Lightning Ventures، Breez، LNP-BP Association، Plan B Foundation) درگیر است، اما تمرکز اصلی او از سال 2024 بر روی ابتکار Plan B Network بوده است.
short_bio: من Giacomo Zucco هستم
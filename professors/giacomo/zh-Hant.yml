bio: |
  Giacomo Zucco 擁有物理學學術背景和技術顧問背景，自 2013 年起，他重新塑造自己成為活躍的 Bitcoin 企業家 (BSolutions、Coincapital、Bitsource、Greenaddress、inBitcoin、Blockchainlab、0301、BTCTimes、Bcademy、BHB Network) 和活動組織者 (米蘭 Bitcoin Meetup、Scaling Bitcoin 會議、Understanding Bitcoin 會議)。他也曾擔任自由顧問與訓練員，並支援工程師建立數個開放標準（例如 BOLT、OTS、RGB、BDK）。
  
  他目前仍以顧問和微型投資者的身份參與許多與 Bitcoin 相關的公司和組織（OCEAN、Relai、Satsback、Xsats、Geyser、Invebit、Lightning Ventures、Breez、LNP-BP 協會、Plan B 基金會），但自 2024 年起，他的主要重點就是 Plan B Network 計畫。
  

bio: |
  Avec une formation universitaire en physique et une expérience en tant que consultant en technologie, Giacomo Zucco s'est réinventé depuis 2013 en tant qu'entrepreneur Bitcoin actif (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) et organisateur d'événements (Milan Bitcoin Meetup, conférences Scaling Bitcoin, conférences Understanding Bitcoin). Il a également travaillé en tant que consultant et formateur indépendant et a soutenu des ingénieurs dans la création de plusieurs normes ouvertes (telles que BOLT, OTS, RGB, BDK).
  
  Il est toujours impliqué en tant que consultant et micro-investisseur dans de nombreuses entreprises et organisations liées au Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), mais son principal centre d'intérêt depuis 2024 est l'initiative Plan B Network.
  
short_bio: Je suis Giacomo Zucco
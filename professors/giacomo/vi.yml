bio: |
  Với nền tảng học thuật về Vật lý và kinh nghiệm làm cố vấn công nghệ, từ năm 2013, Giacomo Zucco đã tự khẳng định mình là một doanh nhân năng động của Bitcoin (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) và nhà tổ chức sự kiện (Milan Bitcoin Meetup, hội nghị Scaling Bitcoin, hội nghị Understanding Bitcoin). Ông cũng từng làm cố vấn và đào tạo tự do, đồng thời hỗ trợ các kỹ sư trong việc tạo ra một số tiêu chuẩn mở (như BOLT, OTS, RGB, BDK).
  
  Ông vẫn tham gia với tư cách là cố vấn và nhà đầu tư vi mô tại nhiều công ty và tổ chức liên quan đến Bitcoin (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, Hiệp hội LNP-BP, Plan B Foundation), nhưng trọng tâm chính của ông kể từ năm 2024 là sáng kiến Plan B Network.
  
  
short_bio: Tôi là Giacomo Zucco
bio: |
  Mit einem akademischen Hintergrund in Physik und einem Hintergrund als Technologieberater hat sich Giacomo Zucco seit 2013 als aktiver Bitcoin-Unternehmer (BSolutions, Coincapital, Bitsource, Greenaddress, inBitcoin, Blockchainlab, 0301, BTCTimes, Bcademy, BHB Network) und Veranstaltungsorganisator (Milan Bitcoin Meetup, Scaling Bitcoin conferences, Understanding Bitcoin conferences) neu erfunden. Er hat auch als freiberuflicher Berater und Ausbilder gearbeitet und Ingenieure bei der Schaffung mehrerer offener Standards (wie BOLT, OTS, RGB, BDK) unterstützt.
  
  Er ist immer noch als Berater und Mikroinvestor in vielen Bitcoin-bezogenen Unternehmen und Organisationen tätig (OCEAN, Relai, Satsback, Xsats, Geyser, Invebit, Lightning Ventures, Breez, LNP-BP Association, Plan B Foundation), aber sein Hauptaugenmerk liegt seit 2024 auf der Plan B Network Initiative.
  
short_bio: Ich bin Giacomo Zucco
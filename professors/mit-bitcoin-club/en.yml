bio: |
  The MIT Bitcoin Club is one of the first blockchain clubs in the world, founded to educate members on the foundation and latest innovations in blockchain technology. Run by undergraduate and graduate students at MIT, the club focuses on trust-minimizing distributed systems, their socioeconomic effects, and practical applications. The club organizes the MIT Bitcoin Expo, one of the largest academic blockchain conferences, and an annual Bitcoin Hackathon.

short_bio: Student-run Bitcoin and blockchain organization at MIT

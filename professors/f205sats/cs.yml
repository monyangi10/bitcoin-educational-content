bio: |
  Autor výukových programů a lektor technik pro zjednodušení praktického používání různých nástrojů souvisejících se samoobsluhou Bitcoin, a to jak softwaru, tak hardwaru. S odhodláním a správnou pomocí může výzvu, kterou tato technologie nabízí, zvládnout každý. Začínal jsem od nuly a pokaždé pomalu prováděl nějaký PoW.
  
  Nostr-maxi. EST 720730, LN na adrese f205sats@sats.mobi
  
short_bio: Přednášející, autor, odborník na sebepéči.
bio: |
  Autor de tutoriais e conferencista sobre técnicas para simplificar a utilização prática de várias ferramentas relacionadas com os autocuidados Bitcoin, tanto de software como de hardware. Qualquer pessoa pode enfrentar o desafio que esta tecnologia oferece, com empenho e a ajuda certa. Comecei do zero, realizando lentamente alguns PoW de cada vez.
  
  Nostr-maxi. EST 720730, LN em f205sats@sats.mobi
  
short_bio: Conferencista, autor, especialista em auto-custódia.
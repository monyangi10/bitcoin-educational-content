bio: |
  Autrice di tutorial e docente di tecniche per semplificare l'utilizzo pratico di vari strumenti legati all’auto custodia di Bitcoin, sia software sia hardware. Chiunque può vincere la sfida che questa tecnologia propone, con impegno e il giusto aiuto. Io sono partita da zero, svolgendo piano piano un po' di PoW ogni volta.
  
  Nostr-maxi. EST 720730, LN at f205sats@sats.mobi

short_bio: Docente, autrice, esperta di self-custody.

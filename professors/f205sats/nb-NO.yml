bio: |
  Forfatter av veiledninger og foredragsholder om teknikker for å forenkle den praktiske bruken av ulike verktøy knyttet til Bitcoin egenomsorg, både programvare og maskinvare. Alle kan møte utfordringen denne teknologien byr på, med engasjement og riktig hjelp. Jeg begynte helt fra bunnen av, og utførte sakte litt PoW hver gang.
  
  Nostr-maxi. EST 720730, LN på f205sats@sats.mobi
  
short_bio: Foredragsholder, forfatter, ekspert på selvforvaring.
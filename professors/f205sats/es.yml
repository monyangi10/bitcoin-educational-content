bio: |
  Autor de tutoriales y conferenciante sobre técnicas para simplificar el uso práctico de diversas herramientas relacionadas con el autocuidado de Bitcoin, tanto de software como de hardware. Cualquiera puede afrontar el reto que ofrece esta tecnología, con compromiso y la ayuda adecuada. Empecé desde cero, llevando a cabo lentamente algunos PoW cada vez.
  
  Nostr-maxi. EST 720730, LN en f205sats@sats.mobi
  
short_bio: Conferenciante, autor, experto en autocustodia.
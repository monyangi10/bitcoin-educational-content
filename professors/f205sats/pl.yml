bio: |
  Autor samouczków i wykładowca na temat technik upraszczających praktyczne wykorzystanie różnych narzędzi związanych z samoobsługą Bitcoin, zarówno oprogramowania, jak i sprzętu. Każdy może sprostać wyzwaniu, jakie oferuje ta technologia, przy zaangażowaniu i odpowiedniej pomocy. Zaczynałem od zera, za każdym razem powoli realizując jakieś PoW.
  
  Nostr-maxi. EST 720730, LN na f205sats@sats.mobi
  
short_bio: Wykładowca, autor, ekspert w dziedzinie samoobrony.
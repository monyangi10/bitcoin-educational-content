bio: |
  Penulis tutorial dan pengajar teknik untuk menyederhanakan penggunaan praktis berbagai alat yang berkaitan dengan perawatan mandiri Bitcoin, baik perangkat lunak maupun perangkat keras. Siapa pun dapat memenuhi tantangan yang ditawarkan teknologi ini, dengan komitmen dan bantuan yang tepat. Saya memulai dari nol, perlahan-lahan melakukan beberapa PoW setiap kali.
  
  Nostr-maxi. EST 720730, LN di f205sats@sats.mobi
  
short_bio: Dosen, penulis, ahli penitipan diri.
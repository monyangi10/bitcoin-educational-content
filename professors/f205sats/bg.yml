bio: |
  Автор на ръководства и лектор по техники за опростяване на практическото използване на различни инструменти, свързани със самообслужването на Bitcoin, както софтуерни, така и хардуерни. Всеки може да се справи с предизвикателството, което предлага тази технология, с ангажираност и подходяща помощ. Започнах от нулата, като всеки път бавно извършвах някакви PoW.
  
  Nostr-maxi. EST 720730, LN на f205sats@sats.mobi
  

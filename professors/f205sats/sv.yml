bio: |
  Författare till handledningar och föreläsare om tekniker för att förenkla den praktiska användningen av olika verktyg relaterade till Bitcoin self-storage, både mjukvara och hårdvara.
  Vem som helst kan möta den utmaning som denna teknik erbjuder, med Commitment och rätt hjälp. Jag började från scratch, lite POW i taget.
  Nostr-maxi. EST 720730
  

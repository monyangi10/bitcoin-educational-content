bio: |
  Författare till handledningar och föreläsare om tekniker för att förenkla den praktiska användningen av olika verktyg relaterade till Bitcoin egenvård, både mjukvara och hårdvara. Vem som helst kan möta utmaningen som denna teknik erbjuder, med engagemang och rätt hjälp. Jag började från scratch och utförde långsamt lite PoW varje gång.
  
  Nostr-maxi. EST 720730, LN på f205sats@sats.mobi
  
short_bio: Föreläsare, författare, expert på egenvård.
bio: |
  Kirjoittaja ja luennoitsija Bitcoin:n itsehoitoon liittyvien eri työkalujen, sekä ohjelmistojen että laitteistojen, käytännön käyttöä helpottavista tekniikoista. Kuka tahansa voi vastata tämän tekniikan tarjoamiin haasteisiin, kunhan sitoutuu ja saa oikeaa apua. Aloitin tyhjästä, suorittaen hitaasti jonkin verran PoW:tä joka kerta.
  
  Nostr-maxi. EST 720730, LN osoitteessa f205sats@sats.mobi
  

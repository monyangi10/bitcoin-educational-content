bio: |
  Bitcoin öz bakımıyla ilgili çeşitli araçların pratik kullanımını basitleştiren teknikler üzerine hem yazılım hem de donanım eğitimlerinin yazarı ve eğitmen. Bağlılık ve doğru yardımla herkes bu teknolojinin sunduğu zorlukların üstesinden gelebilir. Sıfırdan başladım, her seferinde yavaş yavaş biraz PoW gerçekleştirdim.
  
  Nostr-maxi. EST 720730, LN f205sats@sats.mobi adresinde
  
short_bio: Öğretim görevlisi, yazar, öz saklama uzmanı.
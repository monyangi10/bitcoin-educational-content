bio: |
  Bitcoin self-storage ile ilgili çeşitli araçların, hem yazılım hem de donanımın pratik kullanımını basitleştirmek için teknikler üzerine eğitimlerin yazarı ve eğitmen.
  Commitment ve doğru yardım ile herkes bu teknolojinin sunduğu zorlukların üstesinden gelebilir. Sıfırdan başladım, her seferinde küçük bir POW.
  Nostr-maxi. EST 720730
  

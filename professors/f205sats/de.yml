bio: |
  Autorin von Tutorials und Dozentin für Techniken zur Vereinfachung der praktischen Nutzung verschiedener Werkzeuge im Zusammenhang mit der Bitcoin-Selbsthilfe, sowohl Software als auch Hardware. Jeder kann sich der Herausforderung stellen, die diese Technologie bietet, mit Engagement und der richtigen Hilfe. Ich habe bei Null angefangen und jedes Mal langsam etwas PoW durchgeführt.
  
  Nostr-maxi. EST 720730, LN unter f205sats@sats.mobi
  
short_bio: Dozentin, Autorin, Expertin für Selbstjustiz.
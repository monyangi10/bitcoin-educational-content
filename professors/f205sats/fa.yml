bio: |
  نویسنده آموزش‌ها و مدرس تکنیک‌هایی برای ساده‌سازی استفاده عملی از ابزارهای مختلف مرتبط با مراقبت از خود Bitcoin، هم نرم‌افزار و هم سخت‌افزار. هر کسی می‌تواند با تعهد و کمک مناسب، چالشی که این فناوری ارائه می‌دهد را بپذیرد. من از صفر شروع کردم و هر بار به آرامی مقداری PoW انجام دادم.
  
  Nostr-maxi. EST 720730, LN at f205sats@sats.mobi
short_bio: مدرس، نویسنده، کارشناس خودامانی.
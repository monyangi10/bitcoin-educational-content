bio: |
  نویسنده آموزش‌ها و مدرس تکنیک‌هایی برای ساده‌سازی استفاده عملی از ابزارهای مختلف مرتبط با ذخیره‌سازی شخصی Bitcoin، هم نرم‌افزار و هم سخت‌افزار.  
  هر کسی می‌تواند با چالشی که این فناوری ارائه می‌دهد، با Commitment و کمک مناسب روبرو شود. من از صفر شروع کردم، یک کمی POW در هر زمان.  
  Nostr-maxi. EST 720730  
  
  f205sats@Sats.mobi
short_bio: مدرس، نویسنده، کارشناس خودامانی.
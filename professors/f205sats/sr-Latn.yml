bio: |
  Autor tutorijala i predavač o tehnikama za pojednostavljenje praktične upotrebe raznih alata vezanih za Bitcoin samopomoć, kako softverskih tako i hardverskih. Svako može da se suoči sa izazovom koji ova tehnologija nudi, uz posvećenost i pravu pomoć. Počeo sam od nule, polako izvodeći neki PoW svaki put.
  
  Nostr-maxi. EST 720730, LN na f205sats@sats.mobi
short_bio: Predavač, autor, stručnjak za samostalno čuvanje.
bio: |
  Autor tutorijala i predavač o tehnikama za pojednostavljenje praktične upotrebe različitih alata vezanih za Bitcoin samoskladištenje, kako softverskih tako i hardverskih.
  Svako može da se suoči sa izazovom koji ova tehnologija nudi, uz Commitment i pravu pomoć. Počeo sam od nule, malo po malo POW.
  Nostr-maxi. EST 720730
  
  f205sats@Sats.mobi
short_bio: Predavač, autor, stručnjak za samostalno čuvanje.
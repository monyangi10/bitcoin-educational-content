bio: |
  Auteur van tutorials en docent over technieken om het praktische gebruik van verschillende hulpmiddelen voor Bitcoin zelfzorg te vereenvoudigen, zowel software als hardware. Iedereen kan de uitdaging aangaan die deze technologie biedt, met inzet en de juiste hulp. Ik ben vanaf nul begonnen, en heb elke keer langzaam wat PoW uitgevoerd.
  
  Nostr-maxi. EST 720730, LN op f205sats@sats.mobi
  
short_bio: Docent, auteur, expert op het gebied van zelfbehoud.
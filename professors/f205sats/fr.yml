bio: |
  Auteur de tutoriels et conférencier sur les techniques visant à simplifier l'utilisation pratique de divers outils liés à l'autosoin Bitcoin, qu'il s'agisse de logiciels ou de matériel. Tout le monde peut relever le défi que représente cette technologie, avec de l'engagement et l'aide appropriée. J'ai commencé à partir de zéro, en effectuant lentement un peu de PoW à chaque fois.
  
  Nostr-maxi. EST 720730, LN sur f205sats@sats.mobi
  
short_bio: Conférencier, auteur, spécialiste de l'autodéfense.
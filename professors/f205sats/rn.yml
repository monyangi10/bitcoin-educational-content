bio: |
  Umwanditsi w’inyigisho n’umwigisha ku buhinga bwo kworohereza ikoreshwa ry’ibikoresho bitandukanye bijanye no kwitwararika Bitcoin, haba ari porogarama n’ibikoresho. Umuntu wese arashobora guhangana n’ingorane iyo tekinoloji itanga, afise ukwiyemeza n’imfashanyo ibereye. Natanguye kuva ku ntango, buhoro buhoro nkora PoW zimwe zimwe igihe cose.
  
  Nostr-irengeye. EST 720730, LN kuri f205sats@sats.mobi
  
short_bio: Umwigisha, umwanditsi, umuhinga mu vy’ukwibungabunga.
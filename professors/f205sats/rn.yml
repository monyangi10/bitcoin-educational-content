bio: |
  Umwanditsi w’inyigisho n’umwigisha ku buhinga bwo kworohereza ikoreshwa ry’ibikoresho bitandukanye bijanye n’ukwibika kwa Bitcoin, haba ari porogarama n’ibikoresho.
  Umuntu wese arashobora guhangana n’ingorane iyo tekinoloji itanga, afise Commitment n’imfashanyo ibereye. Natanguye kuva ku ntango, POW mutoyi ku gihe.
  Nostr-maxi. 720730
  
  f205isats@Sats.mobi
  
short_bio: Umwigisha, umwanditsi, umuhinga mu vy’ukwibungabunga.
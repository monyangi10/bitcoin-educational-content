bio: |
  Tác giả của các bài hướng dẫn và giảng viên về các kỹ thuật giúp đơn giản hóa việc sử dụng thực tế các công cụ khác nhau liên quan đến việc tự chăm sóc bản thân Bitcoin, cả phần mềm và phần cứng. Bất kỳ ai cũng có thể vượt qua thử thách mà công nghệ này mang lại, với sự cam kết và hỗ trợ phù hợp. Tôi đã bắt đầu từ con số 0, từ từ thực hiện một số PoW mỗi lần.
  
  Nostr-maxi. EST 720730, LN tại f205sats@sats.mobi
  
short_bio: Giảng viên, tác giả, chuyên gia về tự quản.
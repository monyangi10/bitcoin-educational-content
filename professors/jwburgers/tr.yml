bio: |
  Jan-Willem on yılı aşkın süredir Bitcoin ekosisteminde aktif olarak çalışmaktadır. Şu anda Andes Üniversitesi, Cubo+ programı ve Discovering Bitcoin platformu da dahil olmak üzere Bitcoin hakkında çeşitli dersler vermektedir. Ayrıca BitDevs Amsterdam ve Amsterdam Bitcoin Meetup'ın ortak organizasyonunu yürütmektedir. Jan-Willem, Bitcoin çalışmalarının yanı sıra erken aşama yatırım fonu olan Great Stuff Ventures'ın ortağıdır.
  
short_bio: Kriptografi uzmanı.
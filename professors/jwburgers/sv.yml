bio: |
  Jan-Willem har varit aktiv i Bitcoin:s ekosystem i över tio år. För närvarande undervisar han i olika kurser om Bitcoin, bland annat för University of the Andes, Cubo+-programmet och Discovering Bitcoin-plattformen. Han är också med och organiserar BitDevs Amsterdam och Amsterdam Bitcoin Meetup. Förutom sina Bitcoin-ansträngningar är Jan-Willem partner på Great Stuff Ventures, en investeringsfond för tidiga skeden.
  
short_bio: Expert på kryptografi.
bio: |
  Jan-Willem je aktivan u ekosistemu Bitcoin više od deset godina. Trenutno predaje razne kurseve o Bitcoin, uključujući za Univerzitet Anda, program Cubo+ i platformu Discovering Bitcoin. Takođe je ko-organizator BitDevs Amsterdam i Amsterdam Bitcoin Meetup-a. Pored svojih aktivnosti vezanih za Bitcoin, Jan-Willem je partner u Great Stuff Ventures, fondu za investicije u ranoj fazi.

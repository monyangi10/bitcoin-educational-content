bio: |
  Jan-Willem is al meer dan tien jaar actief in het Bitcoin ecosysteem. Momenteel geeft hij verschillende cursussen over Bitcoin, onder andere voor de Universiteit van de Andes, het Cubo+ programma en het Discovering Bitcoin platform. Hij is ook medeorganisator van BitDevs Amsterdam en de Amsterdam Bitcoin Meetup. Naast zijn Bitcoin inspanningen is Jan-Willem partner bij Great Stuff Ventures, een early-stage investeringsfonds.
  
short_bio: Expert in cryptografie.
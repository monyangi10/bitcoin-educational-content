bio: |
  जैन-विलेम दस वर्षों से भी अधिक समय से Bitcoin पारिस्थितिकी तंत्र में सक्रिय हैं। वर्तमान में, वे Bitcoin पर विभिन्न पाठ्यक्रम पढ़ाते हैं, जिनमें एंडीज़ विश्वविद्यालय, क्यूबो+ कार्यक्रम और डिस्कवरिंग Bitcoin प्लेटफ़ॉर्म शामिल हैं। वे बिटडेव्स एम्स्टर्डम और एम्स्टर्डम Bitcoin मीटअप का सह-आयोजन भी करते हैं। अपने Bitcoin प्रयासों के अलावा, जैन-विलेम ग्रेट स्टफ वेंचर्स, एक प्रारंभिक चरण निवेश कोष, में भागीदार हैं।
  
short_bio: क्रिप्टोग्राफी में विशेषज्ञ.
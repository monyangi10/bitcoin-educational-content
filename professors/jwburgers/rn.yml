bio: |
  Jan-Willem amaze imyaka irenga cumi akora cane mu bidukikije vya Bitcoin. Ubu, yigisha amashure atandukanye yerekeye Bitcoin, harimwo n’aya Kaminuza ya Andes, porogarama ya Cubo+, n’urubuga rwa Discovering Bitcoin. Ni we kandi afatanije n’ugutegura BitDevs Amsterdam n’Ikoraniro rya Bitcoin ry’i Amsterdam. Uretse ibikorwa vyiwe vya Bitcoin, Jan-Willem ni umufatanyabikorwa muri Great Stuff Ventures, ikigega c’ishoramari kiri mu ntango.
  
short_bio: Impuguke mu vy’ubuhinga bwo gukingira amakuru.
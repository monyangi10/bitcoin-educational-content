bio: |
  Jan-Willem on tegutsenud Bitcoin ökosüsteemis üle kümne aasta. Praegu õpetab ta erinevaid Bitcoin kursusi, sealhulgas Andide ülikoolis, Cubo+ programmis ja platvormil Discovering Bitcoin. Ta on ka kaasorganiseerija BitDevs Amsterdami ja Amsterdami Bitcoin Meetup'i juures. Lisaks Bitcoin ettevõtmistele on Jan-Willem partner varajase faasi investeerimisfondis Great Stuff Ventures.
  
short_bio: Krüptograafia ekspert.
bio: |
  Jan-Willem ได้มีบทบาทในระบบนิเวศ Bitcoin มานานกว่าสิบปี ปัจจุบันเขาสอนหลักสูตรต่างๆ เกี่ยวกับ Bitcoin รวมถึงสำหรับมหาวิทยาลัย Andes, โปรแกรม Cubo+ และแพลตฟอร์ม Discovering Bitcoin นอกจากนี้เขายังร่วมจัด BitDevs Amsterdam และ Amsterdam Bitcoin Meetup นอกเหนือจากความพยายามในด้าน Bitcoin แล้ว Jan-Willem ยังเป็นหุ้นส่วนที่ Great Stuff Ventures ซึ่งเป็นกองทุนการลงทุนระยะเริ่มต้นอีกด้วย
short_bio: ผู้เชี่ยวชาญด้านการเข้ารหัสลับ
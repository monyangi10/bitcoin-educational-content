bio: |
  یان-ویلم بیش از ده سال است که در اکوسیستم Bitcoin فعال است. در حال حاضر، او دوره‌های مختلفی درباره Bitcoin تدریس می‌کند، از جمله برای دانشگاه آند، برنامه Cubo+ و پلتفرم Discovering Bitcoin. او همچنین هم‌سازمان‌دهنده BitDevs آمستردام و Meetup Bitcoin آمستردام است. علاوه بر فعالیت‌هایش در زمینه Bitcoin، یان-ویلم شریک در Great Stuff Ventures، یک صندوق سرمایه‌گذاری در مراحل اولیه، می‌باشد.
short_bio: متخصص در رمزنگاری.
bio: |
  Jan-Willem jest aktywny w ekosystemie Bitcoin od ponad dziesięciu lat. Obecnie prowadzi różne kursy na temat Bitcoin, w tym dla Uniwersytetu Andyjskiego, programu Cubo+ i platformy Discovering Bitcoin. Współorganizuje również BitDevs Amsterdam i Amsterdam Bitcoin Meetup. Oprócz działalności związanej z Bitcoin, Jan-Willem jest partnerem w Great Stuff Ventures, funduszu inwestycyjnym na wczesnym etapie rozwoju.
  
short_bio: Ekspert w dziedzinie kryptografii.
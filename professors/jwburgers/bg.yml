bio: |
  Ян-Вилем работи активно в екосистемата на Bitcoin повече от десет години. Понастоящем той води различни курсове за Bitcoin, включително за Университета на Андите, програмата Cubo+ и платформата Discovering Bitcoin. Той също така е съорганизатор на BitDevs Amsterdam и Amsterdam Bitcoin Meetup. В допълнение към начинанията си, свързани с Bitcoin, Ян-Вилем е партньор в Great Stuff Ventures, инвестиционен фонд за ранни етапи на развитие.
  
short_bio: Експерт в областта на криптографията.
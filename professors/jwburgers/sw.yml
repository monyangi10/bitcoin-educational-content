bio: |
  Jan-Willem amekuwa akifanya kazi katika mfumo ikolojia wa Bitcoin kwa zaidi ya miaka kumi. Kwa sasa, anafundisha kozi mbalimbali kuhusu Bitcoin, ikiwa ni pamoja na Chuo Kikuu cha Andes, programu ya Cubo+, na jukwaa la Kugundua Bitcoin. Pia anashirikiana kupanga BitDevs Amsterdam na Amsterdam Bitcoin Meetup. Mbali na juhudi zake za Bitcoin, Jan-Willem ni mshirika katika Great Stuff Ventures, mfuko wa uwekezaji wa hatua ya awali.
  
short_bio: Mtaalam katika cryptography.
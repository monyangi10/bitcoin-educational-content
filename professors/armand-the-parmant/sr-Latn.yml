bio: |
  Moja misija je da ubrzam hiperbitkoinizaciju što je brže moguće. Verujem da je to ionako neizbežno, ali želim da se dogodi ranije. Bitcoin je već dovoljno dobar; ono što treba da se promeni je prihvatanje ljudi. To dolazi sa znanjem. I tako, činim sve što mogu da širim znanje – od trenutka kada se probudim, do trenutka kada zaspim, a onda čak i u snu, služim.
short_bio: Kreator Parmanode Softvera i Bitcoin edukator
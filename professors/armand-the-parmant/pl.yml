bio: |
  Moją misją jest doprowadzenie do hiperbitcoinizacji tak szybko, jak to możliwe. Wierzę, że i tak jest to nieuniknione, ale chcę, aby nastąpiło to wcześniej. Bitcoin jest już wystarczająco dobry; to, co musi się zmienić, to akceptacja ludzi. To przychodzi wraz z wiedzą. Dlatego robię wszystko, co w mojej mocy, aby szerzyć tę wiedzę - od momentu, gdy się budzę, do momentu, gdy zasypiam, a potem nawet we śnie, służę.
  
short_bio: Twórca oprogramowania Parmanode i edukator Bitcoin
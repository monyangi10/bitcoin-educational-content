bio: |
  Dhamira yangu ni kuleta hyperbitcoinization haraka iwezekanavyo. Ninaamini kuwa haliepukiki hata hivyo, lakini nataka ije mapema. Bitcoin tayari ni nzuri ya kutosha; kinachotakiwa kubadilika ni kukubalika kwa watu. Hiyo inakuja na ujuzi. Na kwa hiyo, ninafanya kila niwezalo kueneza ujuzi - tangu wakati ninapoamka, hadi wakati ninalala, na kisha hata katika usingizi wangu, ninatumikia.
  
short_bio: Muundaji wa Programu ya Parmanode na mwalimu wa Bitcoin
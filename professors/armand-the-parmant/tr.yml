bio: |
  Benim misyonum hiperbitcoinleşmeyi mümkün olduğunca hızlı bir şekilde gerçekleştirmek. Bunun zaten kaçınılmaz olduğuna inanıyorum, ancak daha erken gelmesini istiyorum. Bitcoin zaten yeterince iyi; değişmesi gereken şey insanların kabulü. Bu da bilgiyle gelir. Bu yüzden de bilgiyi yaymak için elimden gelen her şeyi yapıyorum - uyandığım andan uykuya daldığım ana kadar ve hatta uykumda bile hizmet ediyorum.
  
short_bio: Parmanode Yazılımının Yaratıcısı ve Bitcoin Eğitimcisi
bio: |
  Mitt uppdrag är att få till stånd en hyperbitcoinisering så snabbt som möjligt. Jag tror att det är oundvikligt ändå, men jag vill att det ska komma tidigare. Bitcoin är redan tillräckligt bra; det som behöver förändras är människors acceptans. Det kommer med kunskap. Och därför gör jag allt jag kan för att sprida kunskapen - från det ögonblick jag vaknar till det ögonblick jag somnar, och sedan till och med i sömnen, tjänar jag.
  
short_bio: Skapare av Parmanode Software och Bitcoin-utbildare
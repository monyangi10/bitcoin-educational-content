bio: |
  ภารกิจของฉันคือการเร่งให้เกิดการใช้บิตคอยน์อย่างแพร่หลายให้เร็วที่สุดเท่าที่จะเป็นไปได้ ฉันเชื่อว่ามันจะเกิดขึ้นอย่างหลีกเลี่ยงไม่ได้อยู่แล้ว แต่ฉันต้องการให้มันเกิดขึ้นเร็วขึ้น Bitcoin นั้นดีพอแล้ว สิ่งที่ต้องเปลี่ยนคือการยอมรับของผู้คน ซึ่งมาพร้อมกับความรู้ ดังนั้นฉันจึงทำทุกอย่างที่ทำได้เพื่อเผยแพร่ความรู้ ตั้งแต่ตอนที่ฉันตื่นนอน จนถึงตอนที่ฉันหลับ และแม้กระทั่งในขณะที่ฉันหลับ ฉันก็ยังคงรับใช้ต่อไป
short_bio: ผู้สร้างซอฟต์แวร์ Parmanode และผู้ให้ความรู้เกี่ยวกับบิตคอยน์
bio: |
  मेरा मिशन हाइपरबिटकॉइनाइजेशन को जल्द से जल्द लाना है। मेरा मानना है कि यह वैसे भी अपरिहार्य है, लेकिन मैं चाहता हूँ कि यह जल्दी आए। Bitcoin पहले से ही काफी अच्छा है; बस बदलाव की ज़रूरत है लोगों की स्वीकृति की। यह ज्ञान के साथ आता है। इसलिए, मैं ज्ञान फैलाने के लिए हर संभव प्रयास करता हूँ - जब मैं जागता हूँ, तब से लेकर जब तक मैं सो नहीं जाता, और फिर नींद में भी, मैं सेवा करता हूँ।
  
short_bio: परमानोड सॉफ्टवेयर के निर्माता और Bitcoin शिक्षक
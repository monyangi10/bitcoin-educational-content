bio: |
  Mijn missie is om de hyperbitcoinisatie zo snel mogelijk op gang te brengen. Ik geloof dat het hoe dan ook onvermijdelijk is, maar ik wil dat het eerder gebeurt. Bitcoin is al goed genoeg; wat moet veranderen is de acceptatie van mensen. Dat komt met kennis. En dus doe ik alles wat ik kan om die kennis te verspreiden - vanaf het moment dat ik wakker word, tot het moment dat ik in slaap val, en dan zelfs in mijn slaap, dien ik.
  
short_bio: Schepper van Parmanode Software en Bitcoin opleider
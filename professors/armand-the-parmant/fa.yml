bio: |
  ماموریت من این است که فرآیند هایپربیت‌کوینیزاسیون را هرچه سریع‌تر به انجام برسانم. من معتقدم که این امر به هر حال اجتناب‌ناپذیر است، اما می‌خواهم زودتر اتفاق بیفتد. Bitcoin به اندازه کافی خوب است؛ چیزی که باید تغییر کند، پذیرش مردم است. این پذیرش با دانش به دست می‌آید. بنابراین، من هر کاری که می‌توانم انجام می‌دهم تا دانش را گسترش دهم – از لحظه‌ای که بیدار می‌شوم تا لحظه‌ای که به خواب می‌روم، و حتی در خواب، خدمت می‌کنم.
short_bio: خالق نرم‌افزار Parmanode و مربی Bitcoin
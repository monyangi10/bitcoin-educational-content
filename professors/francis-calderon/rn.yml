bio: |
  Ndi umuhinga mu vy'amaporogarama, Open source & umushigikiye Bitcoin. Nkoresha umwanya wanje mu gutanga umusanzu ku migambi ijanye n’ubuhinga bwa open source Bitcoin na Ligthning Network, nshaka gufasha gutuma Bitcoin igira amahera meza kandi yorohe gukoreshwa ku bantu batari abahinga mu vy’ubuhinga. Nakoze ku migambi ya Lightning Network kuva mu kwezi kwa mbere 2018, ubu ndi umujanama yigenga ku migambi ijanye na Bitcoin/Lightning Network, nimba ushaka kuvuga DM me gusa.
  
short_bio: Abanyacypherpunk bandika kode.
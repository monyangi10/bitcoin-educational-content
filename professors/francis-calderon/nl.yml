bio: |
  Ik ben software engineer, Open Source & Bitcoin supporter. Ik besteed mijn tijd aan het bijdragen aan open source Bitcoin en Ligthning Network gerelateerde projecten, ik wil helpen om Bitcoin beter te laten renderen en gebruiksvriendelijk te maken voor niet-technische mensen. Ik werk aan Lightning Network projecten sinds Q1 2018, momenteel ben ik een onafhankelijke consultant voor Bitcoin/Lightning Network gerelateerde projecten, als je wilt praten, DM me gewoon.
  

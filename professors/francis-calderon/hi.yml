bio: |
  मैं एक सॉफ्टवेयर इंजीनियर, ओपन सोर्स और Bitcoin समर्थक हूँ। मैं अपना समय ओपन सोर्स Bitcoin और लाइटनिंग नेटवर्क से जुड़ी परियोजनाओं में योगदान देने में बिताता हूँ। मैं Bitcoin को बेहतर वित्तीय लाभ दिलाने और गैर-तकनीकी लोगों के लिए उपयोग में आसान बनाने में मदद करना चाहता हूँ। मैं 2018 की पहली तिमाही से Lightning Network परियोजनाओं पर काम कर रहा हूँ, और वर्तमान में मैं Bitcoin/Lightning Network से जुड़ी परियोजनाओं पर एक स्वतंत्र सलाहकार हूँ। अगर आप मुझसे बात करना चाहते हैं, तो मुझे DM करें।
  
short_bio: साइफरपंक कोड लिखते हैं।
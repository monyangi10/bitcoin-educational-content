bio: |
  Jestem inżynierem oprogramowania, zwolennikiem Open Source i Bitcoin. Poświęcam swój czas na udział w projektach związanych z Bitcoin i Ligthning Network, chcę pomóc uczynić Bitcoin lepszym i łatwiejszym w użyciu dla osób nietechnicznych. Pracuję nad projektami Lightning Network od pierwszego kwartału 2018 roku, obecnie jestem niezależnym konsultantem w projektach związanych z Bitcoin/Lightning Network, jeśli chcesz porozmawiać, po prostu napisz do mnie.
  
short_bio: Cypherpunks piszą kod.
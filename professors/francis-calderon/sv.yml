bio: |
  Jag är en mjukvaruingenjör, Open source & Bitcoin supporter. Jag tillbringar min tid med att bidra till öppen källkod Bitcoin och Ligthning Network-relaterade projekt, jag vill hjälpa till att göra Bitcoin bättre pengar och vara lätt att använda för icke-tekniska personer. Jag har arbetat med Lightning Network-projekt sedan Q1 2018, för närvarande är jag en oberoende konsult på Bitcoin/Lightning Network-relaterade projekt, om du vill prata bara DM mig.
  
short_bio: Cypherpunks skriver kod.
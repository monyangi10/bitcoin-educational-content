bio: |
  Mimi ni mhandisi wa programu, Open source & mfuasi wa Bitcoin. Ninatumia muda wangu kuchangia miradi huria inayohusiana na Bitcoin na Ligthning Network, ninataka kusaidia kutengeneza pesa bora zaidi ya Bitcoin na iwe rahisi kutumia kwa watu wasio wa kiufundi. Nimekuwa nikifanya kazi kwenye miradi ya Lightning Network tangu Q1 2018, kwa sasa mimi ni mshauri wa kujitegemea wa miradi inayohusiana na Bitcoin/Lightning Network, ikiwa ungependa kuzungumza nami tu DM.
  
short_bio: Cypherpunks kuandika code.
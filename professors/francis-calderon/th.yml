bio: |
  ฉันเป็นวิศวกรซอฟต์แวร์ ผู้สนับสนุนโอเพ่นซอร์สและ Bitcoin ฉันใช้เวลาของฉันในการมีส่วนร่วมในโครงการโอเพ่นซอร์สที่เกี่ยวข้องกับ Bitcoin และ Ligthning Network ฉันต้องการช่วยทำให้ Bitcoin เป็นเงินที่ดียิ่งขึ้นและใช้งานง่ายสำหรับคนที่ไม่เชี่ยวชาญด้านเทคนิค ฉันได้ทำงานในโครงการ Lightning Network ตั้งแต่ไตรมาสที่ 1 ปี 2018 ปัจจุบันฉันเป็นที่ปรึกษาอิสระในโครงการที่เกี่ยวข้องกับ Bitcoin/Lightning Network หากคุณต้องการพูดคุยเพียง DM ฉันได้เลย
short_bio: Cypherpunks เขียนโค้ด
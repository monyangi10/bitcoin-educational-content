bio: |
  Ja sam softverski inženjer, pristalica otvorenog koda i Bitcoin. Provodim vreme doprinoseći projektima otvorenog koda vezanim za Bitcoin i Ligthning Network, želim pomoći da Bitcoin postane bolji novac i lak za korišćenje za ljude bez tehničkog znanja. Radim na Lightning Network projektima od Q1 2018, trenutno sam nezavisni konsultant na projektima vezanim za Bitcoin/Lightning Network, ako želite da razgovaramo, samo mi pošaljite DM.
short_bio: Cypherpunks pišu kod.
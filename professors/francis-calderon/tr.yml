bio: |
  Ben bir yazılım mühendisiyim, Açık kaynak ve Bitcoin destekçisiyim. Zamanımı açık kaynaklı Bitcoin ve Ligthning Network ile ilgili projelere katkıda bulunarak geçiriyorum, Bitcoin'in daha iyi para kazanmasına ve teknik olmayan insanlar için kullanımının kolay olmasına yardımcı olmak istiyorum. Q1 2018'den beri Lightning Network projeleri üzerinde çalışıyorum, şu anda Bitcoin / Lightning Network ile ilgili projelerde bağımsız bir danışmanım, konuşmak isterseniz bana DM atın.
  
short_bio: Cypherpunk'lar kod yazar.
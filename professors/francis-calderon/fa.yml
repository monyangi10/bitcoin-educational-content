bio: |
  من یک مهندس نرم‌افزار، حامی منبع باز و Bitcoin هستم. وقتم را صرف مشارکت در پروژه‌های مرتبط با منبع باز Bitcoin و شبکه لایتنینگ می‌کنم، می‌خواهم به بهتر شدن Bitcoin به عنوان پول و آسان شدن استفاده از آن برای افراد غیر فنی کمک کنم. از سه‌ماهه اول 2018 روی پروژه‌های Lightning Network کار کرده‌ام، در حال حاضر به عنوان مشاور مستقل در پروژه‌های مرتبط با Bitcoin/Lightning Network فعالیت می‌کنم، اگر می‌خواهید صحبت کنید فقط به من پیام دهید.
short_bio: سایفرپانک‌ها کد می‌نویسند.
bio: |
  Olen tarkvarainsener, avatud lähtekoodiga ja Bitcoin toetaja. Ma kulutan oma aega panustades avatud lähtekoodiga Bitcoin ja Ligthning Networkiga seotud projektidesse, tahan aidata Bitcoin-i raha paremini teenida ja seda on lihtne kasutada ka mitte-tehnilistele inimestele. Olen töötanud Lightning Network projektidega alates 2018. aasta esimesest kvartalist, praegu olen sõltumatu konsultant Bitcoin / Lightning Network seotud projektides, kui soovite rääkida, siis lihtsalt DM mind.
  
short_bio: Cypherpunks kirjutavad koodi.
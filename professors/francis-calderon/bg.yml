bio: |
  Аз съм софтуерен инженер, привърженик на отворения код и Bitcoin. Прекарвам времето си, допринасяйки за проекти с отворен код, свързани с Bitcoin и Ligthning Network, искам да помогна за това Bitcoin да бъде по-добър и лесен за използване от хора без технически познания. Работя по проектите на Lightning Network от първото тримесечие на 2018 г., в момента съм независим консултант по проекти, свързани с Bitcoin/Lightning Network, ако искате да поговорим, просто ми изпратете DM.
  
short_bio: Шифърпънкърите пишат код.
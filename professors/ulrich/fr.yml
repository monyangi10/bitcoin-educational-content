bio: |
  Ulrich est un éducateur Bitcoin et écrivain spécialisé en économie, histoire et géopolitique. Il anime la publication et le podcast Café Viennois, où il explore l'actualité, les libertés individuelles et la souveraineté économique. Il contribue à HowtoBitcoin.fr et Mises.org, apportant les perspectives de l'école autrichienne d'économie à l'éducation Bitcoin.

short_bio: Éducateur Bitcoin et écrivain sur l'économie et l'histoire.

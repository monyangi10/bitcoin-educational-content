bio: |
  Линеа има докторска степен по електронни системи. Тя е преводач от шведски език на "Малката книга за Bitcoin" и съпреводач на "Стандартът Bitcoin".  Тя е и член на управителния съвет на Шведската асоциация Bitcoin. Професионалният ѝ опит е в областта на разработката на фърмуер, като напоследък се насочва към разработката на софтуер.
  
short_bio: Съавтор на книгата за философията на развитието на Bitcoin
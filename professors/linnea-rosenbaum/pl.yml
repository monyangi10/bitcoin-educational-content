bio: |
  Linnéa ma tytuł doktora w dziedzinie systemów elektronicznych. Jest szwedzką tłumaczką The Little Bitcoin Book_ i współtłumaczką The Bitcoin Standard.  Jest również członkiem zarządu Szwedzkiego Stowarzyszenia Bitcoin. Z wykształcenia jest programistką oprogramowania układowego, a od niedawna zajmuje się tworzeniem oprogramowania.
  
short_bio: Współautor książki o filozofii rozwoju Bitcoin
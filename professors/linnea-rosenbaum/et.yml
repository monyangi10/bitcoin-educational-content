bio: |
  Linnéal on doktorikraad elektroonikasüsteemide alal. Ta on "Väikese Bitcoin raamatu" rootsi keele tõlkija ja "Bitcoin standardi" kaastõlkija.  Ta kuulub ka Rootsi Bitcoin assotsiatsiooni juhatusse. Tema taustaks on püsivara arendamine, kuid hiljuti on ta suundunud tarkvaraarenduse poole.
  
short_bio: Bitcoin arengufilosoofia raamatu kaasautor
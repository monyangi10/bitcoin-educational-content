bio: |
  Linnéa afise impamyabushobozi ya Ph.D. mu vy’Ivyuma vy’Ikoranabuhanga. Ni umuhinduzi w’ikisuwede w’igitabu gitoyi ca Bitcoin_kandi ni umuhinduzi w’igitabu ca Bitcoin Standard.  Ari kandi mu nama nkuru y’ishirahamwe ry’i Suède ryitwa Bitcoin. Ivyo yize ni ugutegura porogarama zikomeye (firmware) n’ubu nyene aherutse guhindukira aja mu gutegura porogarama zisanzwe.
  
short_bio: Umwanditsi w'igitabu c'ubuhinga bwa filozofiya y'iterambere Bitcoin
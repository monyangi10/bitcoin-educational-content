bio: |
  Linnéa on suorittanut tohtorin tutkinnon elektroniikan alalla. Hän on The Little Bitcoin Book_kirjan ruotsinkielinen kääntäjä ja The Bitcoin Standardin toinen kääntäjä.  Hän on myös Ruotsin Bitcoin-yhdistyksen hallituksessa. Hänen taustansa on firmware-kehityksessä, ja viime aikoina hän on siirtynyt ohjelmistokehitykseen.
  
short_bio: Bitcoin-kehitysfilosofiaa käsittelevän kirjan toinen kirjoittaja
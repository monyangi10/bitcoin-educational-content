bio: |
  Linnéa har en doktorsexamen i elektroniska system. Hon är den svenska översättaren av The Little Bitcoin Book_och medöversättare av The Bitcoin Standard.  Hon sitter också i styrelsen för Svenska Bitcoin Föreningen. Hennes bakgrund är inom firmware-utveckling med ett nyligen skifte mot mjukvaruutveckling.
  
short_bio: Medförfattare till boken om Bitcoin:s utvecklingsfilosofi
bio: |
  Linnéa ha conseguito un dottorato di ricerca in sistemi elettronici. È la traduttrice svedese di The Little Bitcoin Book_e co-traduttrice di The Bitcoin Standard.  Fa anche parte del consiglio di amministrazione dell'Associazione svedese Bitcoin. Il suo background è lo sviluppo di firmware, con un recente passaggio allo sviluppo di software.
  
short_bio: Coautore del libro sulla filosofia di sviluppo Bitcoin
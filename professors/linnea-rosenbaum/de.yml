bio: |
  Linnéa hat einen Doktortitel in elektronischen Systemen. Sie ist die schwedische Übersetzerin von The Little Bitcoin Book_und Mitübersetzerin von The Bitcoin Standard.  Außerdem ist sie Mitglied des Vorstands der schwedischen Bitcoin Association. Ihr Hintergrund liegt in der Firmware-Entwicklung, wobei sie sich in letzter Zeit der Software-Entwicklung zugewandt hat.
  
short_bio: Mitautor des Buches über die Bitcoin-Entwicklungsphilosophie
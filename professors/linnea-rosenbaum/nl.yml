bio: |
  Linnéa heeft een Ph.D. in Elektronische Systemen. Ze is de Zweedse vertaler van The Little Bitcoin Book_en co-vertaler van The Bitcoin Standard.  Ze zit ook in het bestuur van de Zweedse Bitcoin vereniging. Haar achtergrond is in firmware ontwikkeling met een recente verschuiving naar software ontwikkeling.
  
short_bio: Co-auteur van het Bitcoin ontwikkelingsfilosofieboek
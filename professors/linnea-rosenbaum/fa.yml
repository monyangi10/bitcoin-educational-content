bio: |
  لینه‌آ دارای دکترای سیستم‌های الکترونیکی است. او مترجم سوئدی کتاب کوچک Bitcoin و هم‌مترجم استاندارد Bitcoin است. او همچنین عضو هیئت مدیره انجمن Bitcoin سوئد است. پیشینه او در توسعه سیستم‌افزار است و اخیراً به سمت توسعه نرم‌افزار تغییر جهت داده است.
short_bio: نویسنده مشترک کتاب فلسفه توسعه Bitcoin
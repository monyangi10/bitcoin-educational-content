bio: |
  Linnéa est titulaire d'un doctorat en systèmes électroniques. Elle est la traductrice suédoise du Little Bitcoin Book_et la co-traductrice de The Bitcoin Standard.  Elle est également membre du conseil d'administration de l'association suédoise Bitcoin. Elle est spécialisée dans le développement de microprogrammes et s'est récemment orientée vers le développement de logiciels.
  
short_bio: Co-auteur du livre sur la philosophie du développement Bitcoin
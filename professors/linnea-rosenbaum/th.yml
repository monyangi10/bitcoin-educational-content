bio: |
  Linnéa มีปริญญาเอกด้านระบบอิเล็กทรอนิกส์ เธอเป็นผู้แปลภาษาไทยของ The Little Bitcoin Book และผู้ร่วมแปลของ The Bitcoin Standard นอกจากนี้เธอยังเป็นคณะกรรมการของสมาคม Bitcoin แห่งสวีเดนอีกด้วย พื้นฐานของเธออยู่ในด้านการพัฒนาเฟิร์มแวร์ โดยเมื่อเร็วๆ นี้ได้เปลี่ยนไปสู่การพัฒนาซอฟต์แวร์
short_bio: ผู้ร่วมเขียนหนังสือปรัชญาการพัฒนา Bitcoin
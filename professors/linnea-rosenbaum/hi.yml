bio: |
  लिनिया ने इलेक्ट्रॉनिक सिस्टम में पीएचडी की है। वह "द लिटिल Bitcoin बुक" की स्वीडिश अनुवादक और "द Bitcoin स्टैंडर्ड" की सह-अनुवादक हैं। वह स्वीडिश Bitcoin एसोसिएशन के बोर्ड में भी हैं। उनकी पृष्ठभूमि फ़र्मवेयर विकास में है और हाल ही में उन्होंने सॉफ़्टवेयर विकास की ओर रुख किया है।
  
short_bio: Bitcoin विकास दर्शन पुस्तक के सह-लेखक
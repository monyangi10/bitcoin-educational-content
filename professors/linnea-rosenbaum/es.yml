bio: |
  Linnéa es doctora en Sistemas Electrónicos. Es la traductora al sueco de The Little Bitcoin Book_y co-traductora de The Bitcoin Standard.  También forma parte de la junta directiva de la Asociación Sueca de Bitcoin. Su formación se centra en el desarrollo de firmware y recientemente se ha pasado al desarrollo de software.
  
short_bio: Coautor del libro de filosofía de desarrollo Bitcoin
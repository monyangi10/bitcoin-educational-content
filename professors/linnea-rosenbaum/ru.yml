bio: |
  Линнея имеет степень доктора философии в области электронных систем. Она является переводчиком на шведский язык книги The Little Bitcoin Book_ и со-переводчиком The Bitcoin Standard.  Она также является членом правления Шведской ассоциации Bitcoin. Она занимается разработкой микропрограмм, а в последнее время переключилась на разработку программного обеспечения.
  
short_bio: Соавтор книги по философии развития Bitcoin
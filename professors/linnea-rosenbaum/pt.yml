bio: |
  Linnéa tem um doutoramento em Sistemas Electrónicos. É a tradutora sueca de The Little Bitcoin Book_e co-tradutora de The Bitcoin Standard.  Ela também faz parte do conselho da Associação Sueca Bitcoin. A sua formação é em desenvolvimento de firmware, com uma mudança recente para o desenvolvimento de software.
  
short_bio: Coautor do livro de filosofia de desenvolvimento Bitcoin
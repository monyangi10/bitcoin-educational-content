bio: |
  Linnéa ima doktorat iz Elektronskih sistema. Ona je švedski prevodilac knjige The Little Bitcoin Book_i suprevodilac knjige The Bitcoin Standard. Takođe je član odbora Švedske Bitcoin Asocijacije. Njeno iskustvo je u razvoju firmvera sa nedavnim prelaskom ka razvoju softvera.
short_bio: Koautor knjige o razvoju filozofije Bitcoin
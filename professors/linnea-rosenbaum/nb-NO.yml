bio: |
  Linnéa har en doktorgrad i elektroniske systemer. Hun er den svenske oversetteren av The Little Bitcoin Book_og medoversetter av The Bitcoin Standard.  Hun sitter også i styret for den svenske Bitcoin-foreningen. Hun har bakgrunn fra fastvareutvikling, men har nylig gått over til programvareutvikling.
  
short_bio: Medforfatter av boken om Bitcoins utviklingsfilosofi
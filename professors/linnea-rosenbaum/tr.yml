bio: |
  Linnéa'nın Elektronik Sistemler alanında doktora derecesi vardır. The Little Bitcoin Book_ kitabının İsveççe çevirmeni ve The Bitcoin Standard'ın ortak çevirmenidir.  Aynı zamanda İsveç Bitcoin Derneği'nin yönetim kurulunda yer almaktadır. Geçmişi, son zamanlarda yazılım geliştirmeye doğru bir geçişle birlikte ürün yazılımı geliştirmedir.
  
short_bio: Bitcoin gelişim felsefesi kitabının ortak yazarı
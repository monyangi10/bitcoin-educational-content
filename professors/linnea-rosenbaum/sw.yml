bio: |
  Linnéa ana Ph.D. katika Mifumo ya Kielektroniki. Yeye ni mfasiri wa Kiswidi wa The Little Bitcoin Book_na mtafsiri mwenza wa The Bitcoin Standard.  Yeye pia yuko kwenye bodi ya Jumuiya ya Bitcoin ya Uswidi. Asili yake iko katika ukuzaji wa programu dhibiti na mabadiliko ya hivi karibuni kuelekea ukuzaji wa programu.
  
short_bio: Mwandishi mwenza wa kitabu cha falsafa ya maendeleo ya Bitcoin
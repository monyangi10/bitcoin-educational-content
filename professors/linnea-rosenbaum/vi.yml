bio: |
  Linnéa có bằng Tiến sĩ về Hệ thống Điện tử. Cô là dịch giả tiếng Thụy Điển của cuốn The Little Bitcoin Book_và đồng dịch giả của cuốn The Bitcoin Standard. Cô cũng là thành viên hội đồng quản trị của Hiệp hội Bitcoin Thụy Điển. Cô có kinh nghiệm trong lĩnh vực phát triển phần mềm và gần đây đã chuyển sang phát triển phần mềm.
short_bio: Đồng tác giả của cuốn sách triết lý phát triển Bitcoin
bio: |
  Linnéa memiliki gelar Ph.D. di bidang Sistem Elektronik. Dia adalah penerjemah Swedia untuk The Little Bitcoin Book_dan salah satu penerjemah The Bitcoin Standard.  Dia juga menjadi anggota dewan Asosiasi Bitcoin Swedia. Latar belakangnya adalah pengembangan firmware dengan pergeseran baru-baru ini ke arah pengembangan perangkat lunak.
  
short_bio: Rekan penulis buku filosofi pengembangan Bitcoin
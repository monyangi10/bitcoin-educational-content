bio: |
  Linnéa má doktorát z elektronických systémů. Je švédskou překladatelkou knihy The Little Bitcoin Book_a spolutvůrkyní překladu knihy The Bitcoin Standard.  Je také členkou představenstva Švédské asociace Bitcoin. Má zkušenosti s vývojem firmwaru a v poslední době se přeorientovala na vývoj softwaru.
  
short_bio: Spoluautor knihy o filozofii vývoje Bitcoin
bio: |
  Pierre Ginet è un autore e filosofo francese appassionato dell'intersezione tra la filosofia illuminista e la tecnologia Bitcoin. Autore del libro "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", esplora i profondi legami tra il pensiero di Spinoza, gli ideali dell'Illuminismo e la rivoluzione tecnologica incarnata da Bitcoin. Il suo approccio unico consiste nel dimostrare che la filosofia politica dei Cypherpunk, sebbene influenzata dalla scuola austriaca di economia, ha le sue vere radici nella filosofia illuminista. Il suo lavoro offre una prospettiva filosofica e umanistica sul Bitcoin, andando oltre gli aspetti puramente tecnici o finanziari per esplorare le profonde implicazioni di questa tecnologia sulla libertà umana.
  
short_bio: Filosofo e autore specializzato in Bitcoin e filosofia illuminista
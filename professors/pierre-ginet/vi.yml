bio: |
  Pierre Ginet là một tác giả và triết gia người Pháp, người say mê sự giao thoa giữa triết học Khai sáng và công nghệ Bitcoin. Là tác giả của cuốn sách "Bitcoin, l'évangile de la liberté: Spinoza, les Lumières et la philosophie des Cypherpunks", ông khám phá mối liên hệ sâu sắc giữa tư tưởng của Spinoza, lý tưởng của Khai sáng và cuộc cách mạng công nghệ mà Bitcoin thể hiện. Cách tiếp cận độc đáo của ông là chứng minh rằng triết học chính trị của Cypherpunks, mặc dù chịu ảnh hưởng của trường phái kinh tế Áo, nhưng thực sự có nguồn gốc từ triết học Khai sáng. Tác phẩm của ông đưa ra một góc nhìn triết học và nhân văn về Bitcoin, vượt ra ngoài các khía cạnh thuần túy kỹ thuật hoặc tài chính để khám phá những tác động sâu sắc của công nghệ này đối với tự do của con người.
short_bio: Nhà triết học và tác giả chuyên về triết học Bitcoin và Khai sáng
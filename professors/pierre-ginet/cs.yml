bio: |
  Pierre Ginet je francouzský spisovatel a filosof, který se vášnivě zabývá prolínáním osvícenské filosofie a technologie Bitcoin. Je autorem knihy "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", v níž zkoumá hluboké souvislosti mezi Spinozovým myšlením, ideály osvícenství a technologickou revolucí ztělesněnou Bitcoin. Jeho jedinečný přístup spočívá v tom, že ukazuje, že politická filozofie cypherpunkerů, ačkoli je ovlivněna rakouskou ekonomickou školou, má své skutečné kořeny v osvícenské filozofii. Jeho práce nabízí filosofický a humanistický pohled na Bitcoin, který přesahuje čistě technické nebo finanční aspekty a zkoumá hluboké důsledky této technologie pro lidskou svobodu.
  
short_bio: Filozof a autor specializující se na filozofii Bitcoin a osvícenství
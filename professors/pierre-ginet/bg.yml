bio: |
  Пиер Жине е френски писател и философ, който се интересува от пресечната точка между философията на Просвещението и технологията Bitcoin. Автор на книгата "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", той изследва дълбоките връзки между мисълта на Спиноза, идеалите на Просвещението и технологичната революция, въплътена от Bitcoin. Неговият уникален подход се състои в това да покаже, че политическата философия на Cypherpunks, макар и повлияна от австрийската икономическа школа, има своите истински корени във философията на Просвещението. Работата му предлага философска и хуманистична перспектива за Bitcoin, която надхвърля чисто техническите или финансовите аспекти, за да изследва дълбоките последици от тази технология за човешката свобода.
  
short_bio: Философ и автор, специализиран в областта на философията на Bitcoin и Просвещението
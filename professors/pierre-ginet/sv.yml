bio: |
  Pierre Ginet är en fransk författare och filosof som brinner för skärningspunkten mellan upplysningsfilosofi och Bitcoin-teknik. Som författare till boken "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks" utforskar han de djupgående kopplingarna mellan Spinozas tankar, upplysningens ideal och den tekniska revolution som Bitcoin förkroppsligar. Hans unika metod är att visa att Cypherpunks politiska filosofi, även om den är influerad av den österrikiska ekonomiska skolan, har sina verkliga rötter i upplysningsfilosofin. Hans arbete erbjuder ett filosofiskt och humanistiskt perspektiv på Bitcoin, som går bortom de rent tekniska eller ekonomiska aspekterna för att utforska de djupgående konsekvenserna av denna teknik för mänsklig frihet.
  
short_bio: Filosof och författare specialiserad på Bitcoin och upplysningsfilosofi
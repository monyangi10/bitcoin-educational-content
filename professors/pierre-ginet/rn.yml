bio: |
  Pierre Ginet ni umwanditsi w’Umufaransa akaba n’umunyabwenge akunda cane ukuntu ubuhinga bwa filozofiya bw’Umuco buhuriye hamwe n’ubuhinga bwa Bitcoin. Umwanditsi w'igitabu "Bitcoin, ubutumwa bw'umwidegemvyo : Spinoza, Lumières na filozofiya y'abanyabwenge", aratohoza amasano akomeye ari hagati y'ivyiyumviro vya Spinoza, ivyiyumviro vy'Umuco n'ihinduka ry'ubuhinga ryashizwemwo na Bitcoin. Uburyo bwiwe budasanzwe ni ubwo kwerekana ko filozofiya ya politike y’aba Cypherpunks, naho nyene yakozweko n’ishure ry’ubutunzi ryo muri Otirishiya, ifise imizi nyakuri mu filozofiya y’Umuco. Ibikorwa vyiwe biratanga iciyumviro ca filozofiya n’ivy’ubumuntu ku bijanye na Bitcoin, bikarenga ivy’ubuhinga canke ivy’amahera gusa kugira ngo bisuzume ingaruka zikomeye z’ubu buhinga ku mwidegemvyo w’umuntu.
  
short_bio: Umunyabwenge n'umwanditsi yize cane Bitcoin n'ubuhinga bwa filozofiya y'Umuco
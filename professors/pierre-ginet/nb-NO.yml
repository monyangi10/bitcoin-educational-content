bio: |
  Pierre Ginet er en fransk forfatter og filosof som brenner for skjæringspunktet mellom opplysningsfilosofi og Bitcoin-teknologi. I boken "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks" utforsker han de dype forbindelsene mellom Spinozas tenkning, opplysningstidens idealer og den teknologiske revolusjonen som Bitcoin representerer. Hans unike tilnærming er å vise at Cypherpunks' politiske filosofi, selv om den er påvirket av den østerrikske økonomiske skolen, har sine egentlige røtter i opplysningstidens filosofi. Hans arbeid tilbyr et filosofisk og humanistisk perspektiv på Bitcoin, og går utover de rent tekniske eller økonomiske aspektene for å utforske de dyptgripende implikasjonene denne teknologien har på menneskets frihet.
  
short_bio: Filosof og forfatter med Bitcoin og opplysningsfilosofi som spesialfelt
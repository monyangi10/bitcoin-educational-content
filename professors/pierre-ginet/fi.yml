bio: |
  Pierre Ginet on ranskalainen kirjailija ja filosofi, joka suhtautuu intohimoisesti valistusfilosofian ja Bitcoin-teknologian risteyskohtiin. Kirjan "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks" (Bitcoin, vapauden vuosisata: Spinoza, valistus ja Cypherpunksin filosofia) kirjoittaja tutkii Spinozan ajattelun, valistuksen ihanteiden ja Bitcoin:n ilmentämän teknologisen vallankumouksen välisiä syvällisiä yhteyksiä. Hänen ainutlaatuinen lähestymistapansa on osoittaa, että vaikka itävaltalainen taloustieteellinen koulukunta on vaikuttanut Cypherpunksin poliittiseen filosofiaan, sen todelliset juuret ovat valistusfilosofiassa. Hänen teoksensa tarjoaa Bitcoin:n filosofisen ja humanistisen näkökulman, jossa mennään puhtaasti teknisiä tai taloudellisia näkökohtia pidemmälle ja tutkitaan tämän teknologian syvällisiä vaikutuksia ihmisen vapauteen.
  
short_bio: Filosofi ja kirjailija, joka on erikoistunut Bitcoin- ja valistusfilosofiaan
bio: |
  Pierre Ginet on prantsuse kirjanik ja filosoof, kes tegeleb kirglikult valgustusfilosoofia ja Bitcoin tehnoloogia kokkupuutepunktidega. Raamatu "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks" autorina uurib ta põhjalikke seoseid Spinoza mõtte, valgustusajastu ideaalide ja tehnoloogilise revolutsiooni vahel, mida Bitcoin kehastab. Tema ainulaadne lähenemisviis on näidata, et Cypherpunks'i poliitiline filosoofia on küll mõjutatud Austria majanduskoolkonnast, kuid selle tegelikud juured on valgustusfilosoofias. Tema töö pakub Bitcoin-le filosoofilist ja humanistlikku vaatenurka, minnes kaugemale puhtalt tehnilistest või finantsaspektidest, et uurida selle tehnoloogia sügavat mõju inimvabadusele.
  
short_bio: Filosoof ja autor, kes on spetsialiseerunud Bitcoin ja valgustusfilosoofiale
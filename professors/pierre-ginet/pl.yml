bio: |
  Pierre Ginet jest francuskim pisarzem i filozofem pasjonującym się skrzyżowaniem filozofii oświecenia i technologii Bitcoin. Autor książki "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", bada głębokie powiązania między myślą Spinozy, ideałami Oświecenia i rewolucją technologiczną uosabianą przez Bitcoin. Jego unikalne podejście polega na wykazaniu, że filozofia polityczna Cypherpunks, choć pod wpływem austriackiej szkoły ekonomii, ma swoje prawdziwe korzenie w filozofii oświecenia. Jego praca oferuje filozoficzną i humanistyczną perspektywę na Bitcoin, wykraczając poza czysto techniczne lub finansowe aspekty, aby zbadać głębokie implikacje tej technologii dla ludzkiej wolności.
  
short_bio: Filozof i autor specjalizujący się w Bitcoin i filozofii oświecenia
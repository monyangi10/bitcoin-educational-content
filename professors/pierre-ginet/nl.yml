bio: |
  Pierre Ginet is een Franse auteur en filosoof die gepassioneerd is over het kruispunt tussen Verlichtingsfilosofie en Bitcoin technologie. Als auteur van het boek "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", verkent hij de diepgaande verbanden tussen Spinoza's denken, de idealen van de Verlichting en de technologische revolutie die Bitcoin belichaamt. Zijn unieke benadering is om aan te tonen dat de politieke filosofie van de Cypherpunks, hoewel beïnvloed door de Oostenrijkse economische school, haar echte wortels heeft in de filosofie van de Verlichting. Zijn werk biedt een filosofisch en humanistisch perspectief op Bitcoin, en gaat verder dan de puur technische of financiële aspecten om de diepgaande implicaties van deze technologie op de menselijke vrijheid te onderzoeken.
  
short_bio: Filosoof en auteur gespecialiseerd in Bitcoin en Verlichtingsfilosofie
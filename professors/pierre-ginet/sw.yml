bio: |
  Pierre Ginet ni mwandishi wa Kifaransa na mwanafalsafa anayependa sana makutano kati ya falsafa ya Kutaalamika na teknolojia ya Bitcoin. Mwandishi wa kitabu "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", anachunguza uhusiano wa kina kati ya mawazo ya Spinoza, maadili ya Mwangaza na mapinduzi ya kiteknolojia yaliyojumuishwa na Bitcoin. Mtazamo wake wa kipekee ni kuonyesha kwamba falsafa ya kisiasa ya Cypherpunks, ingawa imeathiriwa na shule ya uchumi ya Austria, ina mizizi yake ya kweli katika falsafa ya Kutaalamika. Kazi yake inatoa mtazamo wa kifalsafa na ubinadamu kuhusu Bitcoin, ukienda zaidi ya vipengele vya kiufundi au vya kifedha ili kuchunguza athari za kina za teknolojia hii kwenye uhuru wa binadamu.
  
short_bio: Mwanafalsafa na mwandishi aliyebobea katika Bitcoin na falsafa ya Kutaalamika
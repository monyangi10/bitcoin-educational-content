bio: |
  Pierre Ginet é um autor e filósofo francês apaixonado pela intersecção entre a filosofia iluminista e a tecnologia Bitcoin. Autor do livro "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", ele explora as profundas ligações entre o pensamento de Spinoza, os ideais do Iluminismo e a revolução tecnológica encarnada pelo Bitcoin. A sua abordagem única consiste em demonstrar que a filosofia política dos Cypherpunks, embora influenciada pela escola austríaca de economia, tem as suas verdadeiras raízes na filosofia do Iluminismo. O seu trabalho oferece uma perspetiva filosófica e humanista sobre o Bitcoin, indo além dos aspectos puramente técnicos ou financeiros para explorar as profundas implicações desta tecnologia na liberdade humana.
  
short_bio: Filósofo e autor especializado em Bitcoin e filosofia iluminista
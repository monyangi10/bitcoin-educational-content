bio: |
  Пьер Гине - французский автор и философ, увлеченный темой пересечения философии Просвещения и технологии Bitcoin. Автор книги "Bitcoin, l'évangile de la liberté: Spinoza, les Lumières et la philosophie des Cypherpunks", он исследует глубокие связи между мыслью Спинозы, идеалами Просвещения и технологической революцией, воплощенной в Bitcoin. Его уникальный подход заключается в том, чтобы продемонстрировать, что политическая философия киберпанков, хотя и испытала влияние австрийской школы экономики, имеет свои истинные корни в философии Просвещения. Его работа предлагает философский и гуманистический взгляд на Bitcoin, выходящий за рамки чисто технических или финансовых аспектов и исследующий глубокие последствия этой технологии для человеческой свободы.
  
short_bio: Философ и автор, специализирующийся на философии ГВ-1 и Просвещения
bio: |
  Pierre Ginet est un auteur et philosophe français passionné par l'intersection entre la philosophie des Lumières et la technologie Bitcoin. Auteur du livre "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", il explore les liens profonds entre la pensée de Spinoza, les idéaux des Lumières et la révolution technologique qu'incarne Bitcoin. Sa démarche unique consiste à démontrer que la philosophie politique des Cypherpunks, bien qu'influencée par l'école autrichienne d'économie, trouve ses véritables racines dans la philosophie des Lumières. Ses travaux offrent une perspective philosophique et humaniste sur Bitcoin, allant au-delà des aspects purement techniques ou financiers pour explorer les implications profondes de cette technologie sur la liberté humaine.

short_bio: Philosophe et auteur spécialisé dans Bitcoin et la philosophie des Lumières
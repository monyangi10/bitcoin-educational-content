bio: |
  Pierre Ginet 是一位法國作家兼哲學家，熱衷於啟蒙哲學與 Bitcoin 科技之間的交集。他著有《Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks》一書，探討 Spinoza 的思想、啟蒙時期的理想與 Bitcoin 所體現的科技革命之間的深刻關聯。他的獨特方法是證明 Cypherpunks 的政治哲學雖然受到奧地利經濟學派的影響，但其真正根源卻在於啟蒙哲學。他的作品為 Bitcoin 提供了哲學與人文主義的觀點，超越了純粹的技術或財務層面，探索這項科技對人類自由的深遠影響。
  
short_bio: 哲學家和作家，專攻 Bitcoin 和啟蒙哲學
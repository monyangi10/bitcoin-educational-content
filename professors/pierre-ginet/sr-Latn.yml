bio: |
  Pierre Ginet je francuski autor i filozof strastven prema spoju filozofije prosvetiteljstva i Bitcoin tehnologije. Autor knjige "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", istražuje duboke veze između Spinozine misli, ideala prosvetiteljstva i tehnološke revolucije koju predstavlja Bitcoin. Njegov jedinstveni pristup je pokazati da politička filozofija Cypherpunksa, iako pod uticajem austrijske škole ekonomije, ima svoje prave korene u filozofiji prosvetiteljstva. Njegov rad nudi filozofsku i humanističku perspektivu na Bitcoin, prelazeći preko čisto tehničkih ili finansijskih aspekata kako bi istražio duboke implikacije ove tehnologije na ljudsku slobodu.
short_bio: Filozof i autor specijalizovan za Bitcoin i filozofiju prosvetiteljstva
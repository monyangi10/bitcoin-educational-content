bio: |
  Pierre Ginet adalah seorang penulis dan filsuf Prancis yang sangat tertarik dengan hubungan antara filosofi Pencerahan dan teknologi Bitcoin. Penulis buku "Bitcoin, l'évangile de la liberté: Spinoza, les Lumières et la philosophie des Cypherpunks", dia mengeksplorasi hubungan mendalam antara pemikiran Spinoza, cita-cita Pencerahan, dan revolusi teknologi yang diwujudkan oleh Bitcoin. Pendekatannya yang unik adalah untuk menunjukkan bahwa filosofi politik Cypherpunks, meskipun dipengaruhi oleh mazhab ekonomi Austria, memiliki akar yang sebenarnya dalam filosofi Pencerahan. Karyanya menawarkan perspektif filosofis dan humanis tentang Bitcoin, melampaui aspek teknis atau finansial semata untuk mengeksplorasi implikasi mendalam dari teknologi ini terhadap kebebasan manusia.
  
short_bio: Filsuf dan penulis yang mengkhususkan diri dalam filsafat Bitcoin dan Pencerahan
bio: |
  پیر ژینه نویسنده و فیلسوف فرانسوی است که به تقاطع فلسفه روشنگری و فناوری Bitcoin علاقه‌مند است. او نویسنده کتاب "Bitcoin، انجیل آزادی: اسپینوزا، روشنگری و فلسفه سایفرپانک‌ها" است و در آن به بررسی پیوندهای عمیق بین اندیشه اسپینوزا، ایده‌آل‌های روشنگری و انقلاب فناوری تجسم‌یافته در Bitcoin می‌پردازد. رویکرد منحصر به فرد او نشان دادن این است که فلسفه سیاسی سایفرپانک‌ها، اگرچه تحت تأثیر مکتب اقتصادی اتریش قرار دارد، ریشه‌های واقعی خود را در فلسفه روشنگری دارد. کار او دیدگاهی فلسفی و انسان‌گرایانه به Bitcoin ارائه می‌دهد و فراتر از جنبه‌های صرفاً فنی یا مالی، به بررسی پیامدهای عمیق این فناوری بر آزادی انسان می‌پردازد.
short_bio: فیلسوف و نویسنده متخصص در فلسفه Bitcoin و روشنگری
bio: |
  皮埃尔-吉内特是一位法国作家和哲学家，热衷于研究启蒙哲学与 Bitcoin 技术之间的交集。他著有《Bitcoin，l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks》一书，探讨了斯宾诺莎的思想、启蒙运动的理想和 Bitcoin 所体现的技术革命之间的深刻联系。他以独特的方式证明，尽管 "非球面朋克 "的政治哲学受到奥地利经济学派的影响，但其真正的根源却是启蒙哲学。他的作品为 Bitcoin 提供了一个哲学和人文主义的视角，超越了纯粹的技术或金融层面，探讨了这项技术对人类自由的深远影响。
  
short_bio: 哲学家和作家，专攻 Bitcoin 和启蒙哲学
bio: |
  Pierre Ginet es un escritor y filósofo francés apasionado por la intersección entre la filosofía de la Ilustración y la tecnología Bitcoin. Autor del libro "Bitcoin, l'évangile de la liberté : Spinoza, les Lumières et la philosophie des Cypherpunks", explora los profundos vínculos entre el pensamiento de Spinoza, los ideales de la Ilustración y la revolución tecnológica encarnada por Bitcoin. Su singular enfoque consiste en demostrar que la filosofía política de los Cypherpunks, aunque influida por la escuela austriaca de economía, tiene sus verdaderas raíces en la filosofía de la Ilustración. Su obra ofrece una perspectiva filosófica y humanista sobre Bitcoin, que va más allá de los aspectos puramente técnicos o financieros para explorar las profundas implicaciones de esta tecnología en la libertad humana.
  
short_bio: Filósofo y escritor especializado en Bitcoin y filosofía de la Ilustración
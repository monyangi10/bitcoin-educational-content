bio: |
  Hej!!! Som advokat och producent av audiovisuellt innehåll är jag ett nyfiket sinne som tycker om att lära mig nya saker. Sedan 2020 har jag varit intresserad av finans, Blockchain och Bitcoin. Nästa steg: nu vill jag dela med mig av min kunskap.
  

bio: |
  Hei! Asianajajana ja audiovisuaalisen sisällön tuottajana olen utelias mieli, joka nauttii uusien asioiden oppimisesta. Vuodesta 2020 lähtien olen ollut kiinnostunut rahoituksesta, Blockchain:sta ja Bitcoin:stä. Seuraava askel: nyt haluan jakaa tietoni.
  
short_bio: Asianajaja ja audiovisuaalisen sisällön tuottaja
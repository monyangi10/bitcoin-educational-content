bio: |
  Mwaramutse!! Nk’umuvoka n’umuhinga mu bijanye n’amajwi n’amashusho, ndi umuntu afise ubwenge bushaka kumenya vyinshi kandi nkunda kwiga ibintu bishasha. Kuva mu mwaka w’2020, narakunda ivy’amahera, Blockchain, na Bitcoin. Intambwe ikurikira: ubu nshaka gusangira ubumenyi mfise.
  
short_bio: Umunyamategeko n'umuhinguzi w'ibirimwo amajwi n'amashusho
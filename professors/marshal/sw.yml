bio: |
  Habari!! Kama mwanasheria na mtayarishaji wa maudhui ya sauti na taswira, mimi ni mtu mwenye udadisi ambaye anafurahia kujifunza mambo mapya. Tangu 2020, nimekuwa nikivutiwa na fedha, Blockchain, na Bitcoin. Hatua inayofuata: sasa nataka kushiriki maarifa yangu.
  
short_bio: Mwanasheria na mtayarishaji wa maudhui ya sauti na kuona
bio: |
  Halo!! Sebagai seorang pengacara dan produser konten audiovisual, saya memiliki rasa ingin tahu yang tinggi dan senang mempelajari hal-hal baru. Sejak tahun 2020, saya tertarik pada bidang keuangan, Blockchain, dan Bitcoin. Langkah selanjutnya: sekarang saya ingin membagikan pengetahuan saya.
  
short_bio: Pengacara dan produser konten audiovisual
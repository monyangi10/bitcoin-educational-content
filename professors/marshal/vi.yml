bio: |
  Xin chào!! Là một luật sư và nhà sản xuất nội dung nghe nhìn, tôi là một người ham học hỏi và thích tìm hiểu những điều mới mẻ. Từ năm 2020, tôi đã quan tâm đến tài chính, Blockchain và Bitcoin. Bước tiếp theo: bây giờ tôi muốn chia sẻ kiến thức của mình.
  
  
short_bio: Luật sư và nhà sản xuất nội dung nghe nhìn
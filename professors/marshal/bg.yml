bio: |
  Здравейте!! Като адвокат и продуцент на аудиовизуално съдържание съм любопитен човек, който обича да научава нови неща. От 2020 г. се интересувам от финанси, блокчейн и Bitcoin. Следващата стъпка: сега искам да споделям знанията си.
  

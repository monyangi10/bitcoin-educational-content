bio: |
  Anatomiste nigérian devenu adepte du Bitcoin. J'ai découvert le Bitcoin en 2014 et j'ai vraiment compris son fonctionnement en 2017. Ma révélation concernant le Bitcoin a eu lieu en 2021. J'écris des articles sur les bases de la technologie Bitcoin, des guides pratiques et des conseils personnels pour utiliser le Bitcoin, notamment en matière de conservation et d'héritage. Je développe Bolta.app, une banque d'assurance Bitcoin.
  
short_bio: Je suis l'auteur du tutoriel sur le portefeuille Valet.

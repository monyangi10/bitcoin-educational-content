bio: |
  Un anatomista humano nigeriano que se volvió bitcoiner. Oí hablar de Bitcoin por primera vez en 2014 y, como era de esperar, en 2017. Mi momento "Ajá" con Bitcoin fue en 2021. Escribo trucos básicos sobre tecnología Bitcoin, guías para principiantes y consejos personales generales para usar Bitcoin, especialmente sobre custodia y herencias. Estoy desarrollando Bolta.app, un banco de seguros de Bitcoin.

short_bio: Soy el autor del tutorial Valet wallet.

bio: |
  A Nigerian Human Anatomist turned Bitcoiner. First heard about Bitcoin in 2014, properly orange-pilled in 2017. My Bitcoin "Ahaaa" moment was in 2021. I write basic Bitcoin technology hacks, DIY guides, and general personal tips for using Bitcoin, especially on custody and inheritance. I'm building Bolta.app, a Bitcoin Insurance Bank.

short_bio: I'm the author of the Valet wallet tutorial.

bio: |
  發現 Bitcoin 並沒有從根本上改變我的為人，但卻大大提高了我的行動力，無論是對我自己還是對整個社會。擁有 Bitcoin 體現了清晰的視野、批判性思考和人格力量。通過保護他們的財務免受通貨膨脹和審查，比特幣持有者增強了他們的自主性和影響力，根據他們的價值觀塑造未來。儘管面臨挑戰，Bitcoin 激發了堅定樂觀的精神，以建立一個更自由、更有彈性的明日世界。同時也是 Bitcoin 的顧問和教練、orangepeel.fr 的創辦人、法國南特 Bitcoin Meetup 的管理人，以及狂熱的棋盤運動愛好者。
  
short_bio: Bitcoin 顧問和教練、orangepeel.fr 的創辦人和 Nantes Bitcoin Meetup 的管理員
bio: |
  Odkrycie Bitcoin nie zmieniło zasadniczo tego, kim jestem, ale znacznie zwiększyło moją siłę do działania, zarówno w mojej własnej skali, jak i dla społeczeństwa jako całości. Posiadanie Bitcoin uosabia jasną wizję, krytyczne myślenie i siłę charakteru. Chroniąc swoje finanse przed inflacją i cenzurą, Bitcoiners wzmacniają swoją autonomię i wpływ, kształtując przyszłość zgodnie ze swoimi wartościami. Pomimo wyzwań, Bitcoin inspiruje zdeterminowanym optymizmem do budowania bardziej wolnego, odpornego świata jutra. Również konsultant i trener Bitcoin, założyciel orangepeel.fr, administrator Bitcoin Meetup w Nantes (Francja) i zapalony entuzjasta sportów planszowych.
  
short_bio: Konsultant i trener Bitcoin, założyciel orangepeel.fr i administrator Nantes Bitcoin Meetup
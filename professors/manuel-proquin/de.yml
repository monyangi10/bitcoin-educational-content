bio: |
  Die Entdeckung von Bitcoin hat nicht grundlegend verändert, wer ich bin, aber sie hat meine Handlungsfähigkeit erheblich gestärkt, sowohl in meinem eigenen Maßstab als auch für die Gesellschaft als Ganzes. Der Besitz von Bitcoin verkörpert eine klare Vision, kritisches Denken und Charakterstärke. Indem sie ihre Finanzen vor Inflation und Zensur schützen, stärken Bitcoiners ihre Autonomie und ihren Einfluss und gestalten die Zukunft nach ihren Werten. Trotz der Herausforderungen inspiriert Bitcoin einen entschlossenen Optimismus, um eine freiere, widerstandsfähigere Welt von morgen zu schaffen. Außerdem ist er Bitcoin-Berater und -Coach, Gründer von orangepeel.fr, Administrator des Bitcoin-Meetups in Nantes (Frankreich) und ein begeisterter Brettsportler.
  
short_bio: Bitcoin-Berater und -Coach, Gründer von orangepeel.fr und Administrator des Bitcoin-Meetups in Nantes
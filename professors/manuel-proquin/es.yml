bio: |
  Descubrir Bitcoin no ha cambiado fundamentalmente quién soy, pero ha amplificado considerablemente mi poder de acción, tanto a mi propia escala como para la sociedad en su conjunto. Poseer Bitcoin encarna una visión clara, pensamiento crítico y fuerza de carácter. Al salvaguardar sus finanzas de la inflación y la censura, los Bitcoiners refuerzan su autonomía e influencia, moldeando el futuro según sus valores. A pesar de los retos, Bitcoin inspira un optimismo decidido para construir un mundo del mañana más libre y resistente. También es consultor y entrenador de Bitcoin, fundador de orangepeel.fr, administrador del Bitcoin Meetup de Nantes (Francia) y un ávido entusiasta de los deportes de mesa.
  
short_bio: Consultor y coach Bitcoin, fundador de orangepeel.fr y administrador del Bitcoin Meetup de Nantes
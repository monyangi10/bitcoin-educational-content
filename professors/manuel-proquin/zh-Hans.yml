bio: |
  发现 Bitcoin 并没有从根本上改变我的为人，但它大大增强了我的行动力，无论是在我自己的范围内，还是在整个社会。拥有 Bitcoin 体现了清晰的视野、批判性思维和人格力量。比特币持有者通过保护自己的财务不受通货膨胀和审查的影响，增强了自己的自主性和影响力，并根据自己的价值观塑造未来。尽管挑战重重，Bitcoin 激发了人们坚定的乐观主义精神，以建设一个更加自由、更有韧性的未来世界。他也是 Bitcoin 的顾问和教练、orangepeel.fr 的创始人、法国南特 Bitcoin Meetup 的管理员以及狂热的棋盘运动爱好者。
  
short_bio: Bitcoin 顾问和教练，orangepeel.fr 创始人，南特 Bitcoin Meetup 管理员
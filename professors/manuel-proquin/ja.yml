bio: |
  Bitcoinを発見したことで、私という人間が根本的に変わったわけではないが、自分自身のスケールと社会全体のために行動する力がかなり増幅された。Bitcoinを所有することは、明確なビジョン、批判的思考、そして人格の強さを体現している。インフレや検閲から資金を守ることで、ビットコイナーは自律性と影響力を強化し、自分の価値観に従って未来を形作る。困難にもかかわらず、Bitcoinは、より自由で、より強靭な明日の世界を築くための断固とした楽観主義を鼓舞する。また、Bitcoinコンサルタント兼コーチ、orangepeel.frの創設者、ナント（フランス）のBitcoinミートアップの管理者、熱心なボードスポーツ愛好家でもある。
  
short_bio: Bitcoinコンサルタント兼コーチ、orangepeel.fr創設者、ナントBitcoinミートアップ管理者。
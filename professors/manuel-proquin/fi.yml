bio: |
  Bitcoin:n löytäminen ei ole muuttanut minua perusteellisesti, mutta se on lisännyt huomattavasti vaikutusvaltaani sekä omalla kohdallani että koko yhteiskunnan hyväksi. Bitcoin:n omistaminen ilmentää selkeää näkemystä, kriittistä ajattelua ja luonteenlujuutta. Suojaamalla taloutensa inflaatiolta ja sensuurilta Bitcoin-käyttäjät vahvistavat autonomiaansa ja vaikutusvaltaansa ja muokkaavat tulevaisuutta arvojensa mukaisesti. Haasteista huolimatta Bitcoin herättää päättäväistä optimismia rakentaa vapaampaa ja kestävämpää tulevaisuuden maailmaa. Lisäksi Bitcoin-konsultti ja -valmentaja, orangepeel.fr-sivuston perustaja, Nantesin (Ranska) Bitcoin Meetupin ylläpitäjä ja innokas lautaurheilun harrastaja.
  
short_bio: Bitcoin-konsultti ja -valmentaja, orangepeel.fr-sivuston perustaja ja Nantesin Bitcoin Meetupin ylläpitäjä
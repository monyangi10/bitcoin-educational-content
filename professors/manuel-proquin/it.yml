bio: |
  La scoperta del Bitcoin non ha cambiato radicalmente la mia persona, ma ha notevolmente amplificato il mio potere di agire, sia a livello personale che per la società nel suo complesso. Possedere Bitcoin incarna una visione chiara, un pensiero critico e una forza di carattere. Salvando le proprie finanze dall'inflazione e dalla censura, i Bitcoiners rafforzano la propria autonomia e influenza, plasmando il futuro secondo i propri valori. Nonostante le sfide, Bitcoin ispira un determinato ottimismo per costruire un mondo di domani più libero e resistente. È anche consulente e coach di Bitcoin, fondatore di orangepeel.fr, amministratore del Bitcoin Meetup di Nantes (Francia) e appassionato di sport da tavolo.
  
short_bio: Consulente e coach Bitcoin, fondatore di orangepeel.fr e amministratore del Meetup Bitcoin di Nantes
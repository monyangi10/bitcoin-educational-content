bio: |
  Việc khám phá ra Bitcoin không thay đổi căn bản con người tôi, nhưng nó đã khuếch đại đáng kể sức mạnh hành động của tôi, cả ở quy mô cá nhân lẫn toàn xã hội. Sở hữu Bitcoin thể hiện tầm nhìn rõ ràng, tư duy phản biện và sức mạnh của bản thân. Bằng cách bảo vệ tài chính khỏi lạm phát và kiểm duyệt, những người dùng Bitcoin củng cố quyền tự chủ và sức ảnh hưởng của mình, định hình tương lai theo các giá trị của họ. Bất chấp những thách thức, Bitcoin truyền cảm hứng lạc quan mạnh mẽ để xây dựng một thế giới tương lai tự do và kiên cường hơn. Tôi cũng là một cố vấn và huấn luyện viên của Bitcoin, người sáng lập orangepeel.fr, quản trị viên của Bitcoin Meetup tại Nantes (Pháp) và là một người đam mê thể thao lướt ván.
short_bio: Chuyên gia tư vấn và huấn luyện viên Bitcoin, người sáng lập orangepeel.fr và quản trị viên của Nantes Bitcoin Meetup
bio: |
  Kugundua Bitcoin hakujabadilisha mimi ni nani, lakini kumeongeza uwezo wangu wa kutenda, kwa kiwango changu na kwa jamii kwa ujumla. Kumiliki Bitcoin kunajumuisha maono wazi, fikra muhimu na nguvu ya tabia. Kwa kulinda fedha zao dhidi ya mfumuko wa bei na udhibiti, Bitcoiners huimarisha uhuru na ushawishi wao, wakitengeneza siku zijazo kulingana na maadili yao. Licha ya changamoto, Bitcoin inatia moyo matumaini thabiti ya kujenga ulimwengu huru na thabiti zaidi wa kesho. Pia mshauri na mkufunzi wa Bitcoin, mwanzilishi wa orangepeel.fr, msimamizi wa Bitcoin Meetup huko Nantes (Ufaransa) na mpenda michezo wa bodi.
  
short_bio: Bitcoin mshauri na kocha, mwanzilishi wa orangepeel.fr na msimamizi wa Nantes Bitcoin Meetup
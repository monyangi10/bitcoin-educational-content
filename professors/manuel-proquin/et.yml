bio: |
  Bitcoin avastamine ei ole põhimõtteliselt muutnud seda, kes ma olen, kuid see on oluliselt suurendanud minu tegutsemisvõimet nii minu enda kui ka kogu ühiskonna jaoks. Bitcoin omamine kehastab selget visiooni, kriitilist mõtlemist ja tugevat iseloomu. Kaitses oma raha inflatsiooni ja tsensuuri eest, tugevdavad bitcoinlased oma autonoomiat ja mõju, kujundades tulevikku vastavalt oma väärtustele. Hoolimata väljakutsetest inspireerib Bitcoin sihikindlat optimismi, et ehitada vabamat ja vastupidavamat homset maailma. Samuti on Bitcoin konsultant ja treener, orangepeel.fr asutaja, Bitcoin Meetup'i administraator Nantes'is (Prantsusmaa) ja innukas laudispordi harrastaja.
  
short_bio: Bitcoin konsultant ja treener, orangepeel.fr asutaja ja Nantes'i Bitcoin kokkusaamise administraator
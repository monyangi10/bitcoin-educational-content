bio: |
  Otkrivanje Bitcoin nije fundamentalno promenilo ko sam, ali je značajno pojačalo moju moć delovanja, kako na ličnom nivou, tako i za društvo u celini. Posedovanje Bitcoin oličava jasnu viziju, kritičko razmišljanje i snagu karaktera. Štiteći svoje finansije od inflacije i cenzure, Bitkoineri jačaju svoju autonomiju i uticaj, oblikujući budućnost prema svojim vrednostima. Uprkos izazovima, Bitcoin inspiriše odlučan optimizam za izgradnju slobodnijeg, otpornijeg sveta sutrašnjice. Takođe sam Bitcoin konsultant i trener, osnivač orangepeel.fr, administrator Bitcoin Meetup-a u Nantu (Francuska) i strastveni ljubitelj bord sportova.
short_bio: Bitcoin konsultant i trener, osnivač orangepeel.fr i administrator Nantes Bitcoin Meetup-a
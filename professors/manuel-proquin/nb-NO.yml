bio: |
  Oppdagelsen av Bitcoin har ikke fundamentalt forandret hvem jeg er, men den har forsterket handlekraften min betraktelig, både på min egen skala og for samfunnet som helhet. Å eie Bitcoin er et uttrykk for klar visjon, kritisk tenkning og karakterstyrke. Ved å beskytte økonomien sin mot inflasjon og sensur styrker bitcoinere sin autonomi og innflytelse, og former fremtiden i henhold til sine verdier. Til tross for utfordringene inspirerer Bitcoin til en besluttsom optimisme for å bygge en friere og mer motstandsdyktig verden i morgen. Han er også Bitcoin-konsulent og coach, grunnlegger av orangepeel.fr, administrator av Bitcoin Meetup i Nantes (Frankrike) og en ivrig brettsportentusiast.
  
short_bio: Bitcoin-konsulent og coach, grunnlegger av orangepeel.fr og administrator av Nantes Bitcoin Meetup
bio: |
  Objevení Bitcoin nezměnilo od základu to, kdo jsem, ale výrazně posílilo mou sílu jednat, a to jak v mém vlastním měřítku, tak pro celou společnost. Vlastnictví Bitcoin ztělesňuje jasnou vizi, kritické myšlení a sílu charakteru. Tím, že si bitcoináři chrání své finance před inflací a cenzurou, posilují svou autonomii a vliv a utvářejí budoucnost podle svých hodnot. Navzdory výzvám vzbuzuje Bitcoin odhodlaný optimismus při budování svobodnějšího a odolnějšího světa zítřka. Také konzultant a kouč Bitcoin, zakladatel webu orangepeel.fr, správce setkání Bitcoin Meetup v Nantes (Francie) a vášnivý nadšenec do deskových sportů.
  
short_bio: Bitcoin konzultant a kouč, zakladatel orangepeel.fr a správce Bitcoin Meetupu v Nantes
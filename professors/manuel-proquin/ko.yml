bio: |
  Bitcoin을 발견했다고 해서 제가 근본적으로 달라지지는 않았지만, 제 자신과 사회 전체를 위해 행동할 수 있는 힘이 상당히 증폭되었습니다. Bitcoin을 소유하면 명확한 비전, 비판적 사고, 강인한 인격이 구현됩니다. 비트코인 사용자는 인플레이션과 검열로부터 재정을 보호함으로써 자율성과 영향력을 강화하여 자신의 가치에 따라 미래를 만들어갑니다. 어려움에도 불구하고 Bitcoin는 더 자유롭고 회복력 있는 미래의 세상을 만들기 위해 단호한 낙관주의를 고취합니다. 또한 Bitcoin 컨설턴트이자 코치이며, 프랑스 낭트에서 열리는 Bitcoin 밋업의 관리자이자 열렬한 보드 스포츠 애호가인 orangepeel.fr의 설립자입니다.
  
short_bio: Bitcoin 컨설턴트 겸 코치, orangepeel.fr의 창립자이자 낭트 Bitcoin 밋업의 관리자
bio: |
  کشف Bitcoin به طور بنیادی من را تغییر نداده است، اما قدرت من برای عمل کردن را به طور قابل توجهی افزایش داده است، هم در مقیاس شخصی و هم برای جامعه به طور کلی. مالکیت Bitcoin نماد دیدگاه روشن، تفکر انتقادی و قدرت شخصیت است. با محافظت از امور مالی خود در برابر تورم و سانسور، بیت‌کوینرها استقلال و تأثیر خود را تقویت می‌کنند و آینده را بر اساس ارزش‌های خود شکل می‌دهند. با وجود چالش‌ها، Bitcoin الهام‌بخش خوش‌بینی مصمم برای ساختن دنیایی آزادتر و مقاوم‌تر برای فرداست. همچنین مشاور و مربی Bitcoin، بنیان‌گذار orangepeel.fr، مدیر Bitcoin Meetup در نانت (فرانسه) و علاقه‌مند به ورزش‌های تخته‌ای.
short_bio: مشاور و مربی Bitcoin، بنیان‌گذار orangepeel.fr و مدیر Meetup Bitcoin نانت
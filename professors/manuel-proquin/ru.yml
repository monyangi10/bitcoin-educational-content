bio: |
  Открытие Bitcoin не изменило мою сущность, но значительно расширило мои возможности действовать как для себя, так и для общества в целом. Владение Bitcoin воплощает в себе ясное видение, критическое мышление и силу характера. Защищая свои финансы от инфляции и цензуры, биткойнеры укрепляют свою автономию и влияние, формируя будущее в соответствии со своими ценностями. Несмотря на трудности, Bitcoin вселяет оптимизм, чтобы построить более свободный и устойчивый мир завтрашнего дня. Также является консультантом и тренером Bitcoin, основателем сайта orangepeel.fr, администратором Bitcoin Meetup в Нанте (Франция) и заядлым любителем настольных видов спорта.
  
short_bio: Консультант и тренер по Bitcoin, основатель сайта orangepeel.fr и администратор Nantes Bitcoin Meetup
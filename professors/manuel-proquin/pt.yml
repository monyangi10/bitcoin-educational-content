bio: |
  Descobrir o Bitcoin não mudou fundamentalmente quem eu sou, mas ampliou consideravelmente o meu poder de ação, tanto à minha escala como para a sociedade em geral. Possuir o Bitcoin representa uma visão clara, pensamento crítico e força de carácter. Ao protegerem as suas finanças da inflação e da censura, os Bitcoiners reforçam a sua autonomia e influência, moldando o futuro de acordo com os seus valores. Apesar dos desafios, o Bitcoin inspira um otimismo determinado para construir um mundo de amanhã mais livre e resistente. Também é consultor e treinador do Bitcoin, fundador do orangepeel.fr, administrador do Bitcoin Meetup em Nantes (França) e um ávido entusiasta de desportos de tabuleiro.
  
short_bio: Consultor e formador Bitcoin, fundador de orangepeel.fr e administrador do Meetup Bitcoin de Nantes
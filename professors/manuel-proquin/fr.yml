bio: |
  Découvrir Bitcoin n’a pas fondamentalement changé qui je suis, mais a considérablement amplifié mon pouvoir d’action, tant à mon échelle qu’à celle de la société. Détenir du Bitcoin incarne une vision claire, un esprit critique et une force de caractère. En préservant leurs finances de l’inflation et de la censure, les Bitcoiners renforcent leur autonomie et leur influence, façonnant l’avenir selon leurs valeurs. Malgré les défis, Bitcoin inspire un optimisme déterminé pour bâtir un monde de demain plus libre et résilient. Également consultant et accompagnateur Bitcoin, fondateur d’orangepeel.fr, administrateur du Bitcoin Meetup de Nantes (France) et passionné de sports de glisse.

short_bio: Consultant et accompagnateur Bitcoin, fondateur d’orangepeel.fr et administrateur du Bitcoin Meetup de Nantes
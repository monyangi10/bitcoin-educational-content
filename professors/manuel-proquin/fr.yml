bio: |
  Lorsque j’ai découvert Bitcoin, je ne suis pas passé à côté — ou plutôt, c’est lui qui ne m’a pas laissé passer. Il n’a pas fondamentalement changé qui je suis, mais il m’a donné une force insoupçonnée. Détenir du bitcoin n’est pas un simple choix financier ; c’est une démarche de caractère. En ce sens, chaque Bitcoiner contribue à façonner une nouvelle forme de société. Je suis un optimiste, pleinement conscient des défis à relever. Également fondateur d’orangepeel.fr, administrateur du Bitcoin Meetup de Nantes (France) et passionné de sports de glisse.

short_bio: Fondateur d’orangepeel.fr et administrateur du Bitcoin Meetup de Nantes
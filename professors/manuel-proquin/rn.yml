bio: |
  Kumenya Bitcoin ntivyahinduye cane uwo ndi we, ariko vyatumye ngira ububasha bwo gukora, ku rugero rwanje no ku kibano cose. Kugira Bitcoin birimwo iyerekwa ritomoye, ivyiyumviro bikomeye n’inkomezi z’akaranga. Mu kurinda amafaranga yabo ku bijanye n’ugutera imbere kw’ibiciro n’ugucengera, aba Bitcoiners barakomeza ubwigenge bwabo n’ububasha bwabo, bagahingura kazoza bivanye n’agaciro kabo. Naho hari ingorane, Bitcoin iratuma umuntu agira icizigiro c’uko yokwubaka isi y’ejo yidegemvya kandi ishobora kwihangana. Kandi ni umujanama n’umumenyereza wa Bitcoin, yashinze orangepeel.fr, umuyobozi w’inama ya Bitcoin Meetup i Nantes (Ubufaransa) kandi akunda cane imikino y’amabarabara.
  
short_bio: Umujanama n'umumenyereza wa Bitcoin, uwashinze orangepeel.fr akaba n'umuyobozi w'Ihuriro rya Bitcoin ry'i Nantes
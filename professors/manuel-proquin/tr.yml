bio: |
  Bitcoin'ı keşfetmek kim olduğumu temelden değiştirmedi, ancak hem kendi ölçeğimde hem de bir bütün olarak toplum için harekete geçme gücümü önemli ölçüde artırdı. Bitcoin'a sahip olmak net bir vizyon, eleştirel düşünme ve karakter gücünü temsil ediyor. Bitcoin kullanıcıları, mali durumlarını enflasyon ve sansüre karşı koruyarak özerkliklerini ve etkilerini güçlendiriyor, geleceği kendi değerlerine göre şekillendiriyorlar. Zorluklara rağmen Bitcoin, yarının daha özgür, daha dirençli dünyasını inşa etmek için kararlı bir iyimserliğe ilham veriyor. Aynı zamanda bir Bitcoin danışmanı ve koçu, orangepeel.fr'nin kurucusu, Nantes'daki (Fransa) Bitcoin Buluşması'nın yöneticisi ve hevesli bir masa sporu tutkunu.
  
short_bio: Bitcoin danışmanı ve koçu, orangepeel.fr'nin kurucusu ve Nantes Bitcoin Buluşması'nın yöneticisi
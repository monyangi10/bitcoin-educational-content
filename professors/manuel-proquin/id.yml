bio: |
  Menemukan Bitcoin tidak mengubah diri saya secara mendasar, tetapi telah meningkatkan kekuatan saya untuk bertindak, baik dalam skala saya sendiri maupun untuk masyarakat secara keseluruhan. Memiliki Bitcoin mewujudkan visi yang jelas, pemikiran kritis, dan kekuatan karakter. Dengan melindungi keuangan mereka dari inflasi dan sensor, para Bitcoiners memperkuat otonomi dan pengaruh mereka, membentuk masa depan sesuai dengan nilai-nilai mereka. Terlepas dari tantangan yang ada, Bitcoin menginspirasi optimisme yang teguh untuk membangun dunia masa depan yang lebih bebas dan tangguh. Juga seorang konsultan dan pelatih Bitcoin, pendiri orangepeel.fr, administrator Bitcoin Meetup di Nantes (Prancis) dan penggemar olahraga papan.
  
short_bio: Konsultan dan pelatih Bitcoin, pendiri orangepeel.fr dan administrator Nantes Bitcoin Meetup
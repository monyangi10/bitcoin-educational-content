bio: |
  การค้นพบ Bitcoin ไม่ได้เปลี่ยนแปลงตัวตนของฉันอย่างพื้นฐาน แต่ได้เพิ่มพลังในการกระทำของฉันอย่างมาก ทั้งในระดับส่วนตัวและสำหรับสังคมโดยรวม การเป็นเจ้าของ Bitcoin เป็นการแสดงถึงวิสัยทัศน์ที่ชัดเจน การคิดเชิงวิพากษ์ และความแข็งแกร่งของบุคลิกภาพ โดยการปกป้องการเงินของพวกเขาจากเงินเฟ้อและการเซ็นเซอร์ ผู้ถือ Bitcoin เสริมสร้างความเป็นอิสระและอิทธิพลของพวกเขา กำหนดอนาคตตามค่านิยมของพวกเขา แม้จะมีความท้าทาย Bitcoin ก็ยังสร้างแรงบันดาลใจให้เกิดความมุ่งมั่นในเชิงบวกในการสร้างโลกที่เสรีและยืดหยุ่นมากขึ้นในวันพรุ่งนี้ นอกจากนี้ยังเป็นที่ปรึกษาและโค้ช Bitcoin ผู้ก่อตั้ง orangepeel.fr ผู้ดูแล Bitcoin Meetup ในเมืองน็องต์ (ฝรั่งเศส) และผู้ที่ชื่นชอบกีฬากระดานอย่างมาก
short_bio: ที่ปรึกษาและโค้ช Bitcoin ผู้ก่อตั้ง orangepeel.fr และผู้ดูแล Nantes Bitcoin Meetup
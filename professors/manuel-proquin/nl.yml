bio: |
  De ontdekking van Bitcoin heeft niet fundamenteel veranderd wie ik ben, maar het heeft mijn slagkracht aanzienlijk vergroot, zowel op mijn eigen schaal als voor de maatschappij als geheel. Het bezit van Bitcoin belichaamt een heldere visie, kritisch denken en karakter. Door hun financiën te beschermen tegen inflatie en censuur, versterken Bitcoiners hun autonomie en invloed, en geven ze de toekomst vorm volgens hun waarden. Ondanks de uitdagingen inspireert Bitcoin een vastberaden optimisme om te bouwen aan een vrijere, veerkrachtigere wereld van morgen. Ook Bitcoin consultant en coach, oprichter van orangepeel.fr, beheerder van de Bitcoin Meetup in Nantes (Frankrijk) en een fervent boardsport liefhebber.
  
short_bio: Bitcoin consultant en coach, oprichter van orangepeel.fr en beheerder van de Nantes Bitcoin Meetup
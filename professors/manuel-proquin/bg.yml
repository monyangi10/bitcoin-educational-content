bio: |
  Откриването на Bitcoin не е променило из основи това, което съм, но значително е увеличило силата ми да действам, както в моя собствен мащаб, така и за обществото като цяло. Притежаването на Bitcoin въплъщава ясна визия, критично мислене и сила на характера. Като предпазват финансите си от инфлация и цензура, биткойнърите засилват своята автономност и влияние, оформяйки бъдещето според своите ценности. Въпреки предизвикателствата Bitcoin вдъхва решителен оптимизъм за изграждане на по-свободен и устойчив свят на утрешния ден. Също така Bitcoin консултант и треньор, основател на orangepeel.fr, администратор на Bitcoin Meetup в Нант (Франция) и запален любител на бордовите спортове.
  
short_bio: Bitcoin консултант и треньор, основател на orangepeel.fr и администратор на Bitcoin Meetup в Нант
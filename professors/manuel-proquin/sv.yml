bio: |
  Upptäckten av Bitcoin har inte i grunden förändrat vem jag är, men den har avsevärt förstärkt min handlingskraft, både på egen hand och för samhället som helhet. Att äga Bitcoin förkroppsligar klar vision, kritiskt tänkande och karaktärsstyrka. Genom att skydda sina finanser från inflation och censur stärker Bitcoiners sin självständighet och sitt inflytande och formar framtiden enligt sina värderingar. Trots utmaningarna inspirerar Bitcoin till en beslutsam optimism för att bygga en friare och mer motståndskraftig värld i morgon. Även Bitcoin-konsult och coach, grundare av orangepeel.fr, administratör av Bitcoin Meetup i Nantes (Frankrike) och en ivrig brädsportsentusiast.
  
short_bio: Bitcoin-konsult och coach, grundare av orangepeel.fr och administratör av Nantes Bitcoin Meetup
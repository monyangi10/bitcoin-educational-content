bio: |
  बेनोइट मालब्रांके कॉपेट इंस्टीट्यूट के अध्यक्ष हैं, जो फ्रांसीसी राजनीतिक अर्थशास्त्र स्कूल को बढ़ावा देने वाला एक संगठन है। वे कई पुस्तकों के लेखक हैं, जिनमें उनकी नवीनतम पुस्तक, विंसेंट डी गौर्ने; द पॉलिटिकल इकोनॉमी ऑफ़ लेसेज़-फ़ेयर (2016) भी शामिल है। वे कॉपेट इंस्टीट्यूट के प्रकाशन संग्रह में फ्रांसीसी अर्थशास्त्रियों के लेखों को पुनः प्रकाशित करते हैं।
  
short_bio: कोप्पेट इंस्टीट्यूट के अध्यक्ष, फ्रांसीसी उदार आर्थिक विचार के विशेषज्ञ और इस विषय पर कई कार्यों के लेखक।
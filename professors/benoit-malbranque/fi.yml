bio: |
  Benoît Malbranque on Coppet-instituutin puheenjohtaja, joka on ranskalaista poliittisen taloustieteen koulukuntaa edistävä yhdistys. Hän on kirjoittanut useita kirjoja, joista viimeisin on Vincent de Gournay; The Political Economy of Laissez-faire (2016). Hän julkaisee uudelleen ranskalaisten taloustieteilijöiden kirjoituksia Coppet-instituutin julkaisukokoelmissa.
  
short_bio: Coppet-instituutin puheenjohtaja, ranskalaisen liberaalin talousajattelun asiantuntija ja useiden aiheeseen liittyvien teosten kirjoittaja.
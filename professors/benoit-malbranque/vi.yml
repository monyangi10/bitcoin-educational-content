bio: |
  Benoît Malbranque là chủ tịch Viện Coppet, một hiệp hội thúc đẩy trường phái kinh tế chính trị Pháp. Ông là tác giả của một số cuốn sách, bao gồm cuốn sách mới nhất của ông, Vincent de Gournay; Kinh tế Chính trị của Tự do (2016). Ông tái bản các bài viết của các nhà kinh tế học Pháp trong bộ sưu tập xuất bản của Viện Coppet.
short_bio: Chủ tịch Viện Coppet, chuyên gia về tư tưởng kinh tế tự do của Pháp và là tác giả của một số tác phẩm về chủ đề này.
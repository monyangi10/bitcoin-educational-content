bio: |
  Бенуа Мальбранк - президент Института Коппет, ассоциации, продвигающей французскую школу политэкономии. Автор нескольких книг, в том числе своей последней - "Винсент де Гурне: политическая экономия laissez-faire" (2016). Он переиздает труды французских экономистов в издательских коллекциях Института Коппет.
  
short_bio: Президент Института Коппет, специалист по французской либеральной экономической мысли и автор нескольких работ на эту тему.
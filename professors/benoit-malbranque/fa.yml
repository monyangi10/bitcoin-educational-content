bio: |
  بنوآ مالبرانک رئیس مؤسسه کوپه، یک انجمن که مکتب اقتصاد سیاسی فرانسه را ترویج می‌کند، است. او نویسنده چندین کتاب از جمله آخرین اثرش، وینسنت دو گورنی؛ اقتصاد سیاسی لسه‌فر (2016) می‌باشد. او نوشته‌های اقتصاددانان فرانسوی را در مجموعه‌های انتشاراتی مؤسسه کوپه بازنشر می‌کند.
short_bio: رئیس مؤسسه کوپه، متخصص در اندیشه اقتصادی لیبرال فرانسوی و نویسنده چندین اثر در این زمینه.
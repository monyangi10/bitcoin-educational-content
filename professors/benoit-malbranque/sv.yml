bio: |
  Benoît Malbranque är ordförande för Coppet Institute, en förening som främjar den franska skolan inom politisk ekonomi. Han är författare till flera böcker, bland annat den senaste, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Han återpublicerar franska ekonomers skrifter i Coppet-institutets förlagssamlingar.
  
short_bio: Ordförande i Coppet Institute, specialist på franskt liberalt ekonomiskt tänkande och författare till flera verk i ämnet.
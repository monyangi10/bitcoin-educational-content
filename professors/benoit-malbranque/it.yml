bio: |
  Benoît Malbranque è presidente dell'Istituto Coppet, un'associazione che promuove la scuola francese di economia politica. È autore di diversi libri, tra cui l'ultimo, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Ripubblica gli scritti di economisti francesi nelle raccolte editoriali dell'Istituto Coppet.
  
short_bio: Presidente dell'Istituto Coppet, specialista del pensiero economico liberale francese e autore di diverse opere sull'argomento.
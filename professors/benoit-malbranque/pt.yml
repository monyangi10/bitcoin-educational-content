bio: |
  Benoît Malbranque é presidente do Instituto Coppet, uma associação que promove a escola francesa de economia política. É autor de vários livros, entre os quais o mais recente, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Reedita os escritos de economistas franceses nas colecções editoriais do Instituto Coppet.
  
short_bio: Presidente do Instituto Coppet, especialista em pensamento económico liberal francês e autor de várias obras sobre o assunto.
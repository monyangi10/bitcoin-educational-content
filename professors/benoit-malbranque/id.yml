bio: |
  Benoît Malbranque adalah presiden Coppet Institute, sebuah asosiasi yang mempromosikan mazhab ekonomi politik Prancis. Ia adalah penulis beberapa buku, termasuk yang terbaru, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Dia menerbitkan ulang tulisan-tulisan para ekonom Prancis dalam koleksi penerbitan Coppet Institute.
  
short_bio: Presiden Coppet Institute, spesialis dalam pemikiran ekonomi liberal Prancis dan penulis beberapa karya tentang masalah ini.
bio: |
  Benoît Malbranque ni umukuru w’ishirahamwe ryitwa Coppet, ishirahamwe ritera imbere ishure ry’ubutunzi bwa politike ry’Ubufaransa. Ni we yanditse ibitabu vyinshi, harimwo n’ica nyuma yanditse, Vincent de Gournay; Ubutunzi bwa politike bw’ukwidegemvya (2016). Asubira gusohora ivyo abahinga mu vy’ubutunzi b’Abafaransa banditse mu bitabo vy’ibitabu vy’Ishirahamwe Coppet Institute.
  
short_bio: Umukuru w’ikigo Coppet Institute, umuhinga mu vyiyumviro vy’ubutunzi vy’ubwigenge bw’Abafaransa, akaba n’umwanditsi w’ibitabu vyinshi ku bijanye n’ico kibazo.
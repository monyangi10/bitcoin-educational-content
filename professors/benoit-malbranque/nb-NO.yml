bio: |
  Benoît Malbranque er president for Coppet-instituttet, en forening som fremmer den franske skolen i politisk økonomi. Han er forfatter av flere bøker, deriblant den siste, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Han utgir skrifter av franske økonomer i Coppet-instituttets utgivelsessamlinger.
  
short_bio: President for Coppet-instituttet, spesialist på fransk liberal økonomisk tenkning og forfatter av flere verk om emnet.
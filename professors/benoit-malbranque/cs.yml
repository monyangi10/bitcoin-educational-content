bio: |
  Benoît Malbranque je prezidentem Coppetova institutu, sdružení, které propaguje francouzskou školu politické ekonomie. Je autorem několika knih, včetně své poslední, Vincent de Gournay; Politická ekonomie Laissez-faire (2016). Znovu vydává spisy francouzských ekonomů v edičních řadách Coppetova institutu.
  
short_bio: Prezident Coppetova institutu, odborník na francouzské liberální ekonomické myšlení a autor několika prací na toto téma.
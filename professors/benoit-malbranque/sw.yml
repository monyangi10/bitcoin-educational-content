bio: |
  Benoît Malbranque ni rais wa Taasisi ya Coppet, chama ambacho kinakuza shule ya Kifaransa ya uchumi wa kisiasa. Yeye ndiye mwandishi wa vitabu kadhaa, ikiwa ni pamoja na yake ya hivi karibuni, Vincent de Gournay; Uchumi wa Kisiasa wa Laissez-faire (2016). Anachapisha upya maandishi ya wanauchumi wa Ufaransa katika makusanyo ya uchapishaji ya Taasisi ya Coppet.
  
short_bio: Rais wa Taasisi ya Coppet, mtaalamu wa fikra huria ya kiuchumi ya Ufaransa na mwandishi wa kazi kadhaa kuhusu mada hiyo.
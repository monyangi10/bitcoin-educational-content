bio: |
  Benoît Malbranque is voorzitter van het Coppet Institute, een vereniging die de Franse school van de politieke economie promoot. Hij is de auteur van verschillende boeken, waaronder zijn laatste, Vincent de Gournay; De politieke economie van Laissez-faire (2016). Hij geeft de geschriften van Franse economen opnieuw uit in de publicatiecollecties van het Coppet Institute.
  
short_bio: Voorzitter van het Coppet Institute, specialist in het Franse liberale economische gedachtegoed en auteur van verschillende werken over dit onderwerp.
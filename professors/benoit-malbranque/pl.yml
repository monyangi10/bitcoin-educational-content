bio: |
  Benoît Malbranque jest prezesem Instytutu Coppet, stowarzyszenia promującego francuską szkołę ekonomii politycznej. Jest autorem kilku książek, w tym najnowszej, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Ponownie publikuje pisma francuskich ekonomistów w kolekcjach wydawniczych Instytutu Coppet.
  
short_bio: Prezes Instytutu Coppet, specjalista w dziedzinie francuskiej liberalnej myśli ekonomicznej i autor kilku prac na ten temat.
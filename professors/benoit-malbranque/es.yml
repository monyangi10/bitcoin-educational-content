bio: |
  Benoît Malbranque es presidente del Instituto Coppet, asociación que promueve la escuela francesa de economía política. Es autor de varios libros, entre ellos el último, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Reedita los escritos de economistas franceses en las colecciones editoriales del Instituto Coppet.
  
short_bio: Presidente del Instituto Coppet, especialista del pensamiento económico liberal francés y autor de varias obras sobre el tema.
bio: |
  เบอนัวต์ มัลแบรงค์ เป็นประธานของสถาบันคอปเปต์ ซึ่งเป็นสมาคมที่ส่งเสริมโรงเรียนเศรษฐศาสตร์การเมืองของฝรั่งเศส เขาเป็นผู้เขียนหนังสือหลายเล่ม รวมถึงเล่มล่าสุดของเขา Vincent de Gournay; The Political Economy of Laissez-faire (2016) เขาได้ตีพิมพ์งานเขียนของนักเศรษฐศาสตร์ชาวฝรั่งเศสในคอลเลกชันการพิมพ์ของสถาบันคอปเปต์
short_bio: ประธานสถาบัน Coppet ผู้เชี่ยวชาญด้านความคิดเศรษฐกิจเสรีนิยมของฝรั่งเศสและผู้เขียนผลงานหลายชิ้นในหัวข้อนี้
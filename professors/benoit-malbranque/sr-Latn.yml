bio: |
  Benoît Malbranque je predsednik Instituta Coppet, udruženja koje promoviše francusku školu političke ekonomije. Autor je nekoliko knjiga, uključujući svoju najnoviju, Vincent de Gournay; Politička ekonomija laissez-faire (2016). Ponovo objavljuje spise francuskih ekonomista u izdavačkim zbirkama Instituta Coppet.
short_bio: Predsednik Instituta Coppet, specijalista za francusku liberalnu ekonomsku misao i autor nekoliko dela na tu temu.
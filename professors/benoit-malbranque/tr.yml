bio: |
  Benoît Malbranque, Fransız ekonomi politik ekolünü destekleyen bir dernek olan Coppet Enstitüsü'nün başkanıdır. Son kitabı Vincent de Gournay; The Political Economy of Laissez-faire (2016) dahil olmak üzere birçok kitabın yazarıdır. Coppet Enstitüsü'nün yayın koleksiyonlarında Fransız ekonomistlerin yazılarını yeniden yayınlamaktadır.
  
short_bio: Coppet Enstitüsü Başkanı, Fransız liberal ekonomik düşüncesi uzmanı ve konuyla ilgili çeşitli eserlerin yazarı.
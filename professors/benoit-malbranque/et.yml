bio: |
  Benoît Malbranque on Prantsuse poliitökonoomia koolkonna edendamise ühingu Coppet Institute president. Ta on mitmete raamatute autor, sealhulgas tema viimase raamatu "Vincent de Gournay; The Political Economy of Laissez-faire" (2016). Ta avaldab uuesti Prantsuse majandusteadlaste kirjutisi Coppet Instituudi kirjastuskogudes.
  
short_bio: Coppet' instituudi president, Prantsuse liberaalse majandusmõtte spetsialist ja mitmete teemakohaste teoste autor.
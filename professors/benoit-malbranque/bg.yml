bio: |
  Беноа Малбранк е председател на Института "Коппет" - асоциация, която популяризира френската школа по политическа икономия. Той е автор на няколко книги, сред които последната му, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Той преиздава трудовете на френски икономисти в издателските колекции на Института Коппет.
  
short_bio: Президент на Института "Коппет", специалист по френската либерална икономическа мисъл и автор на няколко труда по темата.
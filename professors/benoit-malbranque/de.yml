bio: |
  Benoît Malbranque ist Präsident des Instituts Coppet, einer Vereinigung, die die französische Schule der politischen Ökonomie fördert. Er ist Autor mehrerer Bücher, darunter sein neuestes, Vincent de Gournay; The Political Economy of Laissez-faire (2016). Er veröffentlicht die Schriften französischer Wirtschaftswissenschaftler in den Verlagssammlungen des Coppet-Instituts neu.
  
short_bio: Präsident des Instituts Coppet, Spezialist für liberales französisches Wirtschaftsdenken und Autor mehrerer Werke zu diesem Thema.
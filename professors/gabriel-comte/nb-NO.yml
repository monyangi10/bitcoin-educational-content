bio: |
  Mottoet hans er "Jeg skriver kode og gjør ting"; han er en utvikler som brenner for Bitcoin og kryptografi, og er for tiden involvert i lipa, et sveitsisk Bitcoin Lightning Network-selskap, i rollen som "Lightning Legend". PGP: 448A 27DC D9A0 0F41 6C3D.
  
short_bio: Jeg skriver kode. Lightning Network-ekspert.
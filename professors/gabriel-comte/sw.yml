bio: |
  Kauli mbiu yake ni "Naandika kanuni na kufanya mambo"; yeye ni msanidi anayependa sana Bitcoin na cryptography, kwa sasa anahusika katika lipa, kampuni ya Uswizi ya Bitcoin Lightning Network, chini ya jukumu la "Lightning Legend". PGP: 448A 27DC D9A0 0F41 6C3D.
  
short_bio: Ninaandika kanuni. Mtaalam wa Lightning Network.
bio: |
  Hans motto är "Jag skriver kod och gör saker"; han är en utvecklare som brinner för Bitcoin och kryptografi, för närvarande involverad i lipa, ett schweiziskt Bitcoin Lightning Network-företag, under rollen som "Lightning Legend". PGP: 448A 27DC D9A0 0F41 6C3D.
  
short_bio: Jag skriver kod. Lightning Network expert.
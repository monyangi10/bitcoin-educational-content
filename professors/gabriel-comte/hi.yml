  उनका आदर्श वाक्य है, "मैं कोड लिखता हूँ और काम करता हूँ"; वे Bitcoin और क्रिप्टोग्राफी के प्रति जुनूनी डेवलपर हैं, और वर्तमान में "लाइटनिंग लीजेंड" की भूमिका में, स्विस Bitcoin Lightning Network कंपनी lipa में कार्यरत हैं। PGP: 448A 27DC D9A0 0F41 6C3D.
  
short_bio: मैं कोड लिखता हूँ। Lightning Network विशेषज्ञ।
bio: |
  Phương châm của anh ấy là "Tôi viết code và làm việc"; anh ấy là một nhà phát triển đam mê Bitcoin và mật mã, hiện đang làm việc tại lipa, một công ty Thụy Sĩ chuyên về Bitcoin Lightning Network, với vai trò là "Huyền thoại Tia Chớp". PGP: 448A 27DC D9A0 0F41 6C3D.
  
  
short_bio: Tôi viết mã. Chuyên gia Lightning Network.
bio: |
  Jeho mottem je "píšu kód a dělám věci"; je vývojářem, který se vášnivě zajímá o Bitcoin a kryptografii a v současné době působí ve švýcarské společnosti lipa Bitcoin Lightning Network v roli "Lightning Legend". PGP: 448A 27DC D9A0 0F41 6C3D.
  
short_bio: Píšu kód. Odborník na Lightning Network.
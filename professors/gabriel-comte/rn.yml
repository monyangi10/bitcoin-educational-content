bio: |
  Icivugo ciwe ni "Ndandika code nkakora ibintu"; ni umuhinga mu vy'ubuhinga bw'amakuru akunda cane Bitcoin n'ubuhinga bwo gukingira amakuru, ubu akora muri lipa, ishirahamwe ry'Ubusuwisi Bitcoin Lightning Network, afise uruhara rwa "Lightning Legend". PGP: 448A 27DC D9A0 0F41 6C3D.
  
short_bio: Ndandika kode. Lightning Network umuhinga mu vy’ubuhinga.
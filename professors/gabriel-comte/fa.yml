bio: |
  شعار او این است: "من کد می‌نویسم و کارهایی انجام می‌دهم"؛ او یک توسعه‌دهنده مشتاق به Bitcoin و رمزنگاری است که در حال حاضر در شرکت سوئیسی Bitcoin Lightning Network به نام لیپا، تحت عنوان "Lightning Legend" فعالیت می‌کند. PGP: 448A 27DC D9A0 0F41 6C3D.
short_bio: من کد می‌نویسم. متخصص Lightning Network.
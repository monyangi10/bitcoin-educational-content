bio: |
  Mottonya adalah "Saya menulis kode dan melakukan sesuatu"; dia adalah seorang pengembang yang sangat menyukai Bitcoin dan kriptografi, yang saat ini terlibat dalam lipa, sebuah perusahaan Bitcoin Lightning Network di Swiss, dengan peran sebagai "Legenda Petir". PGP: 448A 27DC D9A0 0F41 6C3D.
  
short_bio: Aku menulis kode. Ahli Lightning Network.
bio: |
  ผู้เชี่ยวชาญด้านไอทีและที่ปรึกษาด้านความปลอดภัยทางไซเบอร์ ฉันมีความหลงใหลในบิตคอยน์ตั้งแต่ค้นพบมันในปี 2010 แฮกเกอร์ที่มีจริยธรรมและแฟนของ Norster ฉันช่วยให้ผู้คนเตรียมพร้อมสำหรับความท้าทายในวันพรุ่งนี้ได้ดียิ่งขึ้น ฉันมีส่วนร่วมในการสร้าง SECU101 สำหรับผู้เริ่มต้น
short_bio: ผู้เชี่ยวชาญด้านความปลอดภัยทางไซเบอร์
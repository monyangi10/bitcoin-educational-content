bio: |
  Impuguke mu vy’ubuhinga bwa none n’umujanama mu vy’umutekano wo kuri internet. Nakunda cane Bitcoin kuva nayivumbura mu 2010. Ethical hacker kandi umufana wa Norster, mfasha abantu kwitegurira neza ingorane z’ejo. Naragize uruhara mu kurema SECU101 y’abatangura.
  
short_bio: Impuguke mu vy'umutekano wo kuri interineti
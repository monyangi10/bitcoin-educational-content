bio: |
  Mtaalam wa IT na mshauri wa usalama wa mtandao. Nimekuwa na shauku kuhusu Bitcoin tangu nilipoigundua mwaka wa 2010. Mdukuzi wa maadili na shabiki wa Norster, ninasaidia watu kujiandaa vyema kwa ajili ya changamoto za kesho. Nilichangia kuunda SECU101 kwa Kompyuta.
  
short_bio: Mtaalamu wa usalama wa mtandao
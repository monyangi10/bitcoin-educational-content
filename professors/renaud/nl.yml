bio: |
  IT-expert en mentor op het gebied van cyberbeveiliging. Ik ben gepassioneerd door Bitcoin sinds ik het ontdekte in 2010. Als ethisch hacker en fan van Norster help ik mensen zich beter voor te bereiden op de uitdagingen van morgen. Ik heb bijgedragen aan het maken van SECU101 voor beginners.
  
short_bio: Cyberbeveiligingsexpert
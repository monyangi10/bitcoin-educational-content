bio: |
  BT uzmanı ve siber güvenlik danışmanı. Bitcoin'ı 2010 yılında keşfettiğimden beri bu konuda tutkuluyum. Etik hacker ve Norster hayranı olarak, insanların yarının zorluklarına daha iyi hazırlanmalarına yardımcı oluyorum. Yeni başlayanlar için SECU101'in oluşturulmasına katkıda bulundum.
  
short_bio: Siber güvenlik uzmanı
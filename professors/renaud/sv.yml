bio: |
  IT-expert och mentor inom cybersäkerhet. Jag har varit passionerad kring Bitcoin sedan jag upptäckte det 2010. Som etisk hacker och Norster-fan hjälper jag människor att bättre förbereda sig för morgondagens utmaningar. Jag bidrog till skapandet av SECU101 för nybörjare.
  
short_bio: Expert på cybersäkerhet
bio: |
  IT stručnjak i mentor za sajber bezbednost. Strastven sam prema Bitcoin od kada sam ga otkrio 2010. godine. Eticki haker i obožavalac Norstera, pomažem ljudima da se bolje pripreme za izazove sutrašnjice. Doprineo sam stvaranju SECU101 za početnike.
short_bio: Stručnjak za sajber bezbednost
bio: |
  ИТ експерт и ментор по киберсигурност. Откакто открих биткойна през 2010 г., съм запален по него. Етичен хакер и фен на Норстър, помагам на хората да се подготвят по-добре за утрешните предизвикателства. Допринесох за създаването на SECU101 за начинаещи.
  
short_bio: Експерт по киберсигурност
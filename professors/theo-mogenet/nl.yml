bio: |
  Ik ben professor aan de Kedge in Bordeaux, doceer Bitcoin en de economische theorieën van de Oostenrijkse School en ben de oprichter van het Bitcoin Institute, een onderwijs- en trainingsbedrijf in Parijs. Ik heb een passie voor economie, geschiedenis, literatuur, politieke wetenschappen en technologie. Ik geniet van skiën, wijn, whisky, steaks en gesprekken. Omdat ik overal goed in ben, maar nergens een expert in ben, heb ik besloten om me fulltime te wijden aan Bitcoin onderwijs.
  Ik ben de bedenker van ECON 201 - inleiding tot de Oostenrijkse economie.
  
short_bio: Fiat is oplichterij, een passie voor Oostenrijkse economie.
bio: |
  استاد در Kedge Bordeaux، من Bitcoin و نظریه‌های اقتصادی مکتب اتریش را تدریس می‌کنم و بنیان‌گذار مؤسسه Bitcoin، یک شرکت آموزشی و آموزشی واقع در پاریس هستم. من به اقتصاد، تاریخ، ادبیات، علوم سیاسی و فناوری علاقه‌مندم. از اسکی، شراب، ویسکی، استیک و گفتگو لذت می‌برم. با اینکه در همه چیز آگاه هستم اما در هیچ‌چیز متخصص نیستم، تصمیم گرفته‌ام به‌طور تمام‌وقت به آموزش Bitcoin بپردازم.  
  من خالق ECON 201 - مقدمه‌ای بر اقتصاد اتریشی هستم.
short_bio: فیات یک کلاهبرداری است، مشتاق به اقتصاد اتریشی.
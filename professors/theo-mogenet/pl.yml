bio: |
  Profesor w Kedge Bordeaux, wykładam Bitcoin i teorie ekonomiczne Szkoły Austriackiej oraz jestem założycielem Bitcoin Institute, firmy edukacyjnej i szkoleniowej z siedzibą w Paryżu. Jestem pasjonatem ekonomii, historii, literatury, nauk politycznych i technologii. Lubię jazdę na nartach, wino, whisky, steki i rozmowy. Będąc dobrze zorientowanym we wszystkim, ale ekspertem w niczym, postanowiłem poświęcić się edukacji Bitcoin w pełnym wymiarze godzin.
  Jestem twórcą ECON 201 - wprowadzenia do ekonomii austriackiej.
  
short_bio: Fiat to oszustwo, pasjonat austriackiej ekonomii.
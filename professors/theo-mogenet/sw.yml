bio: |
  Profesa katika Kedge Bordeaux, ninafundisha Bitcoin na nadharia za kiuchumi za Shule ya Austria, na ni mwanzilishi wa Taasisi ya Bitcoin, kampuni ya elimu na mafunzo iliyoko Paris. Ninapenda sana uchumi, historia, fasihi, sayansi ya siasa na teknolojia. Ninafurahia kuteleza kwenye theluji, divai, whisky, steaks, na mazungumzo. Kwa kuwa mjuzi wa kila kitu lakini mtaalam katika chochote, nimeamua kujitolea wakati wote kwa elimu ya Bitcoin.
  Mimi ndiye mtayarishi wa ECON 201 - utangulizi wa uchumi wa Austria.
  
short_bio: Fiat ni kashfa, anayependa sana uchumi wa Austria.
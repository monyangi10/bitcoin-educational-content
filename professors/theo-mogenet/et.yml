bio: |
  Bordeaux'i Kedge'i professor, õpetan Bitcoin ja Austria koolkonna majandusteooriaid ning olen Pariisis asuva haridus- ja koolitusettevõtte Bitcoin Instituudi asutaja. Olen kirglik majanduse, ajaloo, kirjanduse, politoloogia ja tehnoloogia vastu. Naudin suusatamist, veini, viskit, praade ja vestlust. Kuna ma tunnen kõike hästi, kuid ei ole ekspert milleski, olen otsustanud pühenduda täiskohaga Bitcoin haridusele.
  Olen ECON 201 - sissejuhatus Austria majandusse - looja.
  
short_bio: Fiat on pettus, kirglik Austria majandus.
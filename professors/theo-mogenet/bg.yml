bio: |
  Професор в Kedge Bordeaux, преподавам Bitcoin и икономическите теории на Австрийската школа и съм основател на Bitcoin Institute, образователна и обучителна компания в Париж. Страстно се интересувам от икономика, история, литература, политически науки и технологии. Обичам да карам ски, да пия вино, уиски, пържоли и да разговарям. Тъй като съм добре запознат с всичко, но не съм експерт в нищо, реших да се посветя на пълно работно време на образованието в Bitcoin.
  Създател съм на ECON 201 - въведение в австрийската икономика.
  
short_bio: Fiat е измама, страстна за австрийската икономика.
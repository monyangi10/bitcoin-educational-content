bio: |
  Jag är professor vid Kedge Bordeaux, undervisar i Bitcoin och den österrikiska skolans ekonomiska teorier och är grundare av Bitcoin Institute, ett utbildningsföretag beläget i Paris. Jag är passionerat intresserad av ekonomi, historia, litteratur, statsvetenskap och teknik. Jag tycker om skidåkning, vin, whisky, biffar och att samtala. Eftersom jag är väl bevandrad i allt men inte expert på någonting har jag beslutat att ägna mig åt Bitcoin-utbildning på heltid.
  Jag är skaparen av ECON 201 - introduktion till österrikisk ekonomi.
  
short_bio: Fiat är en bluff, passionerad för österrikisk ekonomi.
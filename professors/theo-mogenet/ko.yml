bio: |
  저는 케지 보르도 대학의 교수로서 Bitcoin와 오스트리아 학파의 경제 이론을 가르치고 있으며, 파리에 위치한 교육 및 훈련 회사인 Bitcoin 인스티튜트의 설립자입니다. 저는 경제, 역사, 문학, 정치학, 기술에 대한 열정을 가지고 있습니다. 스키, 와인, 위스키, 스테이크, 대화를 즐깁니다. 모든 것에 능통하지만 어느 것 하나 전문가가 아닌 저는 Bitcoin 교육에 전념하기로 결심했습니다.
  저는 오스트리아 경제학 입문 과목인 ECON 201을 만든 사람입니다.
  
short_bio: 피아트는 오스트리아 경제에 대한 열정을 가진 사기꾼입니다.
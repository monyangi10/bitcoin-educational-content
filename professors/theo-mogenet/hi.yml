bio: |
  केज बोर्डो में प्रोफ़ेसर, मैं Bitcoin और ऑस्ट्रियाई स्कूल के आर्थिक सिद्धांत पढ़ाता हूँ, और पेरिस स्थित एक शैक्षिक एवं प्रशिक्षण कंपनी, Bitcoin संस्थान का संस्थापक हूँ। मुझे अर्थशास्त्र, इतिहास, साहित्य, राजनीति विज्ञान और प्रौद्योगिकी में गहरी रुचि है। मुझे स्कीइंग, वाइन, व्हिस्की, स्टेक और बातचीत का आनंद मिलता है। हर चीज़ में पारंगत होने के बावजूद, किसी भी चीज़ में विशेषज्ञ न होने के कारण, मैंने Bitcoin शिक्षा के लिए अपना पूरा समय समर्पित करने का निर्णय लिया है।
  मैं ECON 201 - ऑस्ट्रियाई अर्थशास्त्र का परिचय - का निर्माता हूँ।
  
short_bio: फिएट एक घोटाला है, जो ऑस्ट्रियाई अर्थशास्त्र के प्रति जुनूनी है।
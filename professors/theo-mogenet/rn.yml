bio: |
  Porofeseri muri Kedge Bordeaux, nigisha Bitcoin n’inyigisho z’ubutunzi z’ishure ry’i Otirishiya, kandi ni jewe nashinze ikigo Bitcoin, ishirahamwe ry’inyigisho n’amahugurwa riri i Paris. Ndakunda cane ubutunzi, amateka, ubuhinga bwo kwandika, ubuhinga bwa politike n'ubuhinga bwa none. Nkunda gukina umupira w’amaguru, umuvinyu, whisky, inyama z’ingurube be n’ibiyago. Kubera ko nzi neza vyose ariko nkaba ndi umuhinga mu vyo ataco bimaze, nafashe ingingo yo kwihebera uburezi bwa Bitcoin igihe cose.
  Ndi umuremyi wa ECON 201 - intangamarara y'ubutunzi bwa Otirishiya.
  
short_bio: Fiat ni umuhendanyi, akunda cane ubutunzi bwa Otirishiya.
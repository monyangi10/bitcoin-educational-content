bio: |
  ศาสตราจารย์ที่ Kedge Bordeaux ฉันสอน Bitcoin และทฤษฎีเศรษฐศาสตร์ของสำนักออสเตรีย และเป็นผู้ก่อตั้งสถาบัน Bitcoin ซึ่งเป็นบริษัทการศึกษาและฝึกอบรมที่ตั้งอยู่ในปารีส ฉันมีความหลงใหลในเศรษฐศาสตร์ ประวัติศาสตร์ วรรณกรรม รัฐศาสตร์ และเทคโนโลยี ฉันชอบเล่นสกี ไวน์ วิสกี้ สเต็ก และการสนทนา แม้ว่าจะมีความรู้รอบด้านแต่ไม่เชี่ยวชาญในสิ่งใดเลย ฉันจึงตัดสินใจอุทิศตนให้กับการศึกษา Bitcoin เต็มเวลา
  ฉันเป็นผู้สร้าง ECON 201 - บทนำสู่เศรษฐศาสตร์ออสเตรีย
short_bio: Fiat คือการหลอกลวง มีความหลงใหลในเศรษฐศาสตร์แบบออสเตรีย
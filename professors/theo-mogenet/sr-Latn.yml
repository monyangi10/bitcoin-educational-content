bio: |
  Profesor na Kedge Bordeaux, predajem Bitcoin i ekonomske teorije Austrijske škole, i osnivač sam Bitcoin Instituta, obrazovne i trening kompanije smeštene u Parizu. Strastven sam prema ekonomiji, istoriji, književnosti, političkim naukama i tehnologiji. Uživam u skijanju, vinu, viskiju, biftecima i razgovoru. Dobro sam upućen u sve, ali stručnjak ni u čemu, odlučio sam da se posvetim puno radno vreme Bitcoin obrazovanju.
  Ja sam tvorac ECON 201 - uvod u austrijsku ekonomiju.
short_bio: Fiat je prevara, strastven prema austrijskoj ekonomiji.
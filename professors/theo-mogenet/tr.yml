bio: |
  Kedge Bordeaux'da profesör olarak Bitcoin ve Avusturya Okulu'nun ekonomik teorilerini öğretiyorum ve Paris'te bulunan bir eğitim ve öğretim şirketi olan Bitcoin Enstitüsü'nün kurucusuyum. Ekonomi, tarih, edebiyat, siyaset bilimi ve teknoloji konularında tutkuluyum. Kayak yapmaktan, şaraptan, viskiden, biftekten ve sohbetten hoşlanırım. Her konuda bilgili ama hiçbir konuda uzman olmadığım için kendimi tam zamanlı olarak Bitcoin eğitimine adamaya karar verdim.
  Ben ECON 201 - Avusturya ekonomisine giriş dersinin yaratıcısıyım.
  
short_bio: Fiat bir aldatmacadır, Avusturya ekonomisi konusunda tutkuludur.
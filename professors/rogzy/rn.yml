bio: |
  Kubera ko nari nkunda cane Bitcoin kuva yavumburwa, naciye mfata ingingo yo gutanga igice c’ubuzima bwanje kugira ngo nshigikire ukuyifata biciye mu kwigisha. Biciye mu nyigisho zanje nyinshi, nzogerageza kukuyobora mu rugendo rwawe rwo kumanuka mu mwobo w’inkwavu. Ahandi ho, ndakunda gukina pool no gutembera mu misozi.
  
short_bio: Bitcoin Umucuruzi
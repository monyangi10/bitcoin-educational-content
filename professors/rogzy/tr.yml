bio: |
  Keşfedildiğinden bu yana Bitcoin konusunda tutkulu olan ben, hayatımın bir bölümünü eğitim yoluyla benimsenmesini desteklemeye adamaya karar verdim. Çok sayıda kursum aracılığıyla, tavşan deliğinden aşağı yolculuğunuzda size rehberlik etmeye çalışacağım. Bunun dışında havuz ve yürüyüş yapmaktan hoşlanırım.
  
short_bio: Bitcoin Girişimci
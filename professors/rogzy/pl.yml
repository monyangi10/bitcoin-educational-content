bio: |
  Pasjonując się Bitcoin od czasu jego odkrycia, postanowiłem poświęcić część swojego życia na wspieranie jego adopcji poprzez edukację. Dzięki moim licznym kursom postaram się poprowadzić cię w podróży w dół króliczej nory. Poza tym lubię bilard i piesze wędrówki.
  
short_bio: Bitcoin Przedsiębiorca
bio: |
  از زمان کشف Bitcoin به شدت به آن علاقه‌مند شدم و تصمیم گرفتم بخشی از زندگی‌ام را به حمایت از پذیرش آن از طریق آموزش اختصاص دهم. از طریق دوره‌های متعدد خود، سعی خواهم کرد شما را در سفر به اعماق این موضوع راهنمایی کنم. در غیر این صورت، از بیلیارد و پیاده‌روی لذت می‌برم.
short_bio: Bitcoin کارآفرین
bio: |
  Gepassioneerd door Bitcoin sinds de ontdekking ervan, besloot ik een deel van mijn leven te wijden aan het ondersteunen van de adoptie ervan door middel van onderwijs. Via mijn vele cursussen zal ik proberen je te begeleiden op je reis door het konijnenhol. Verder houd ik van biljarten en wandelen.
  
short_bio: Bitcoin Ondernemer
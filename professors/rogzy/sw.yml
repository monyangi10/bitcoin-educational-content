bio: |
  Nikiwa na shauku kuhusu Bitcoin tangu ilipogunduliwa, niliamua kujitolea sehemu ya maisha yangu ili kuunga mkono kupitishwa kwake kupitia elimu. Kupitia kozi zangu nyingi, nitajaribu kukuongoza kwenye safari yako chini ya shimo la sungura. Vinginevyo, ninafurahia bwawa la kuogelea na kupanda mlima.
  
short_bio: Bitcoin Mjasiriamali
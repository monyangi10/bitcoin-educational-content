bio: |
  Kuna olen Bitcoin avastamisest saadik innustunud, otsustasin pühendada osa oma elust sellele, et toetada selle kasutuselevõtmist hariduse kaudu. Oma arvukate kursuste kaudu püüan teid juhendada teie teekonnal mööda küülikute auku. Muidu naudin piljardit ja matkamist.
  
short_bio: Bitcoin Ettevõtja
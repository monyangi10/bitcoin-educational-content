bio: |
  Jag har varit passionerad för Bitcoin sedan det upptäcktes och bestämde mig för att ägna en del av mitt liv åt att stödja dess införande genom utbildning. Genom mina många kurser kommer jag att försöka vägleda dig på din resa ner i kaninhålet. Annars tycker jag om att spela biljard och vandra.
  
short_bio: Bitcoin Entreprenör
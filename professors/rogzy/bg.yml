bio: |
  Запален по Bitcoin още от откриването му, реших да посветя част от живота си, за да подкрепя приемането му чрез образование. Чрез многобройните си курсове ще се опитам да ви напътствам в пътуването ви по заешката дупка. Иначе обичам да играя басейн и да ходя по планините.
  
short_bio: Bitcoin Предприемач
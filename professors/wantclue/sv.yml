bio: |
  Passionerad datavetare med expertis inom nätverk, kryptovaluta och datateknik. Hängiven att hjälpa människor genom att hitta innovativa lösningar på problem och dela med sig av kunskap genom utbildningsinnehåll. Specialiserar sig på Bitcoin Mining-hårdvara, särskilt Bitaxe-utveckling, och ger praktiska handledningar om kryptovalutainfrastruktur och hårdvarulösningar.
  
short_bio: Datavetare specialiserad på utbildning i Bitcoin Mining-hårdvara och kryptovaluta
bio: |
  Gepassioneerde computerwetenschapper met expertise in netwerken, cryptocurrency en computertechnologieën. Toegewijd aan het helpen van mensen door het vinden van innovatieve oplossingen voor problemen en het delen van kennis door middel van educatieve content. Gespecialiseerd in Bitcoin Mining hardware, met name Bitaxe-ontwikkeling, en biedt praktische tutorials over cryptocurrency-infrastructuur en hardwareoplossingen.
  
short_bio: Computerwetenschapper gespecialiseerd in Bitcoin Mining hardware en cryptocurrency onderwijs
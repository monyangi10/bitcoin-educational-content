bio: |
  Strastveni kompjuterski naučnik sa ekspertizom u umrežavanju, kriptovalutama i računarskim tehnologijama. Posvećen pomaganju ljudima pronalaženjem inovativnih rešenja za probleme i deljenjem znanja kroz edukativni sadržaj. Specijalizovan za Bitcoin Mining hardver, posebno za razvoj Bitaxe-a, i pruža praktične tutorijale o infrastrukturi kriptovaluta i hardverskim rešenjima.
short_bio: Računarski naučnik specijalizovan za Bitcoin Mining hardver i edukaciju o kriptovalutama
bio: |
  Pasjonat informatyki z doświadczeniem w sieciach, kryptowalutach i technologiach obliczeniowych. Poświęca się pomaganiu ludziom poprzez znajdowanie innowacyjnych rozwiązań problemów i dzielenie się wiedzą poprzez treści edukacyjne. Specjalizuje się w sprzęcie Bitcoin Mining, w szczególności w rozwoju Bitaxe, i zapewnia praktyczne samouczki dotyczące infrastruktury kryptowalut i rozwiązań sprzętowych.
  
short_bio: Informatyk specjalizujący się w sprzęcie Bitcoin Mining i edukacji kryptowalutowej
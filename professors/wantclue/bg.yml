bio: |
  Страстен компютърен специалист с опит в областта на мрежите, криптовалутите и компютърните технологии. Посветил се е на това да помага на хората, като намира иновативни решения на проблеми и споделя знания чрез образователно съдържание. Специализира в хардуера на Bitcoin mining, особено в разработването на Bitaxe, и предоставя практически уроци за инфраструктурата на криптовалутата и хардуерните решения.
  
short_bio: Компютърен учен, специализиран в обучението по хардуер Bitcoin mining и криптовалути
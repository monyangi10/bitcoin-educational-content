bio: |
  Увлеченный компьютерщик с опытом работы в области сетей, криптовалют и вычислительных технологий. Стремится помогать людям, находя инновационные решения проблем и делясь знаниями через образовательный контент. Специализируется на аппаратном обеспечении Bitcoin Mining, в частности на разработке Bitaxe, и предоставляет практические руководства по криптовалютной инфраструктуре и аппаратным решениям.
  
short_bio: Компьютерный ученый, специализирующийся на аппаратном обеспечении Bitcoin Mining и криптовалютном образовании
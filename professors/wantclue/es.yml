bio: |
  Informático apasionado con experiencia en redes, criptomoneda y tecnologías informáticas. Dedicado a ayudar a la gente encontrando soluciones innovadoras a los problemas y compartiendo conocimientos a través de contenidos educativos. Se especializa en hardware de Bitcoin Mining, en particular en el desarrollo de Bitaxe, y ofrece tutoriales prácticos sobre infraestructura de criptomoneda y soluciones de hardware.
  
short_bio: Informático especializado en hardware Bitcoin Mining y educación sobre criptomoneda
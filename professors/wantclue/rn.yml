bio: |
  Umunyabwenge w'ivy'ingurukanabumenyi afise ubuhinga bwo gukorana n'abandi, amafaranga y'ibanga, n'ubuhinga bwo gukoresha mudasobwa. Yiyemeje gufasha abantu mu kurondera inyishu nshasha z’ingorane no gusangira ubumenyi biciye mu birimwo inyigisho. Ikora cane cane mu bijanye n’ibikoresho vya Bitcoin Mining, cane cane uguteza imbere Bitaxe, kandi itanga inyigisho ngirakamaro ku bikorwa remezo vy’amahera y’amahera n’imiti y’ibikoresho.
  
short_bio: Umuhinga mu vya mudasobwa yize cane mu vy'ubuhinga bwa Bitcoin Mining n'uburezi bw'amahera y'ibanga
bio: |
  Ağ, kripto para ve bilgi işlem teknolojilerinde uzmanlığa sahip tutkulu bilgisayar bilimcisi. Sorunlara yenilikçi çözümler bularak ve eğitim içeriği aracılığıyla bilgi paylaşarak insanlara yardım etmeye kendini adamıştır. Bitcoin Mining donanımı, özellikle Bitaxe geliştirme konusunda uzmanlaşmıştır ve kripto para altyapısı ve donanım çözümleri hakkında pratik eğitimler vermektedir.
  
short_bio: Bitcoin Mining donanımı ve kripto para eğitimi konusunda uzmanlaşmış bilgisayar bilimcisi
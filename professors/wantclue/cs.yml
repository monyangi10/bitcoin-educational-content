bio: |
  Vášnivý informatik s odbornými znalostmi v oblasti sítí, kryptoměn a výpočetních technologií. Věnuje se pomoci lidem hledáním inovativních řešení problémů a sdílením znalostí prostřednictvím vzdělávacího obsahu. Specializuje se na hardware Bitcoin Mining, zejména na vývoj Bitaxe, a poskytuje praktické výukové programy o kryptoměnové infrastruktuře a hardwarových řešeních.
  
short_bio: Počítačový vědec specializující se na hardware Bitcoin Mining a vzdělávání v oblasti kryptoměn
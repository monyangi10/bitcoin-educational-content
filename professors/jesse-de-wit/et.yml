bio: |
  Ta on mitmekülgne andmespetsialist, kes tunneb äriintellekti, tehisintellekti ja andmeanalüüsi. Ta oskab koos kasutajaga mõelda ja seega analüüsida teabenõuet ning kujundada armatuurlauda. Arendajana oskab ta kirjutada ETLi ja modelleerida andmeid. Lõpuks on ta Lightning Network entusiast, praegu töötab ta Breezis Rust arendajana.
  
short_bio: Lightning Network entusiast | arendaja | Breez
bio: |
  او یک متخصص همه‌جانبه داده با دانش در زمینه هوش تجاری، هوش مصنوعی و تحلیل داده است. او می‌تواند همراه با کاربر فکر کند و به این ترتیب یک درخواست اطلاعات را تحلیل کرده و یک داشبورد طراحی کند. به عنوان یک توسعه‌دهنده، او می‌تواند ETL بنویسد و داده‌ها را مدل‌سازی کند. در نهایت، او یک علاقه‌مند به Lightning Network است و در حال حاضر به عنوان یک توسعه‌دهنده Rust در Breez کار می‌کند.
short_bio: Lightning Network علاقه‌مند | توسعه‌دهنده | Breez
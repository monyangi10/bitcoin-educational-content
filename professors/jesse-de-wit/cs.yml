bio: |
  Je všestranným datovým specialistou se znalostmi v oblasti Business Intelligence, umělé inteligence a analýzy dat. Dokáže přemýšlet spolu s uživatelem, a tak analyzovat požadavek na informace a navrhnout řídicí panel. Jako vývojář dokáže psát ETL a modelovat data. V neposlední řadě je nadšencem do Lightning Network, v současné době pracuje jako vývojář Rust ve společnosti Breez.
  
short_bio: Nadšenec Lightning Network | vývojář | Breez
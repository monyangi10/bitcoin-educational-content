bio: |
  Jest wszechstronnym specjalistą od danych, posiadającym wiedzę z zakresu Business Intelligence, sztucznej inteligencji i analizy danych. Potrafi myśleć razem z użytkownikiem, a tym samym analizować żądania informacji i projektować pulpity nawigacyjne. Jako programista potrafi pisać ETL i modelować dane. Wreszcie, jest entuzjastą Lightning Network, obecnie pracującym jako programista Rust w Breez.
  
short_bio: Entuzjasta Lightning Network | deweloper | Breez
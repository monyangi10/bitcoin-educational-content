bio: |
  Он является универсальным специалистом по данным, обладающим знаниями в области бизнес-аналитики, искусственного интеллекта и анализа данных. Он может мыслить вместе с пользователем и, таким образом, анализировать информационный запрос и разрабатывать приборную панель. Как разработчик он может писать ETL и моделировать данные. Наконец, он энтузиаст Lightning Network, в настоящее время работает разработчиком Rust в Breez.
  
short_bio: Энтузиаст Lightning Network | разработчик | Breez
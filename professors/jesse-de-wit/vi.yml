bio: |
  Anh ấy là một chuyên gia dữ liệu toàn diện với kiến thức về Business Intelligence, Trí tuệ Nhân tạo và phân tích dữ liệu. Anh ấy có thể tư duy cùng người dùng, từ đó phân tích yêu cầu thông tin và thiết kế bảng điều khiển. Là một nhà phát triển, anh ấy có thể viết ETL và mô hình hóa dữ liệu. Cuối cùng, anh ấy là một người đam mê Lightning Network, hiện đang làm việc với tư cách là nhà phát triển Rust tại Breez.
short_bio: Người đam mê Lightning Network | nhà phát triển | Breez
bio: |
  Han är en allround dataspecialist med kunskap om Business Intelligence, Artificiell Intelligens och dataanalys. Han kan tänka tillsammans med en användare och på så sätt analysera en informationsförfrågan och utforma en instrumentpanel. Som utvecklare kan han skriva ETL och modellera data. Slutligen är han en Lightning Network-entusiast som för närvarande arbetar som Rust-utvecklare på Breez.
  
short_bio: Lightning Network entusiast | utvecklare | Breez
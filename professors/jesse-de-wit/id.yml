bio: |
  Dia adalah spesialis data serba bisa dengan pengetahuan tentang Business Intelligence, Artificial Intelligence, dan analisis data. Dia dapat berpikir bersama dengan pengguna dan dengan demikian menganalisis permintaan informasi dan merancang dasbor. Sebagai pengembang, ia dapat menulis ETL dan memodelkan data. Terakhir, dia adalah penggemar Lightning Network, saat ini bekerja sebagai pengembang Rust di Breez.
  
short_bio: Penggemar Lightning Network | pengembang | Breez
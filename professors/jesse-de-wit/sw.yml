bio: |
  Yeye ni mtaalamu wa pande zote wa data na ujuzi wa Ujasusi wa Biashara, Upelelezi wa Artificial na uchambuzi wa data. Anaweza kufikiria pamoja na mtumiaji na hivyo kuchambua ombi la habari na kuunda dashibodi. Kama msanidi programu anaweza kuandika ETL na data ya mfano. Hatimaye, yeye ni mpenda Lightning Network, kwa sasa anafanya kazi kama msanidi wa Rust huko Breez.
  
short_bio: Mshabiki wa Lightning Network | msanidi | Breez
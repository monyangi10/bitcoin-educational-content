bio: |
  İş Zekası, Yapay Zeka ve veri analizi bilgisine sahip çok yönlü bir veri uzmanıdır. Bir kullanıcı ile birlikte düşünebilir ve böylece bir bilgi talebini analiz edebilir ve bir gösterge tablosu tasarlayabilir. Bir geliştirici olarak ETL yazabilir ve verileri modelleyebilir. Son olarak, şu anda Breez'de Rust geliştiricisi olarak çalışan bir Lightning Network meraklısıdır.
  
short_bio: Lightning Network meraklısı | geliştirici | Breez
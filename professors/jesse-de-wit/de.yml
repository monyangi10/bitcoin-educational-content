bio: |
  Er ist ein vielseitiger Datenspezialist mit Kenntnissen in Business Intelligence, künstlicher Intelligenz und Datenanalyse. Er kann mit einem Benutzer mitdenken und so eine Informationsanfrage analysieren und ein Dashboard entwerfen. Als Entwickler kann er ETL schreiben und Daten modellieren. Schließlich ist er ein Lightning Network-Enthusiast und arbeitet derzeit als Rust-Entwickler bei Breez.
  
short_bio: Lightning Network-Enthusiast | Entwickler | Breez
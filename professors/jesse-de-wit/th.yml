bio: |
  เขาเป็นผู้เชี่ยวชาญด้านข้อมูลรอบด้านที่มีความรู้เกี่ยวกับ Business Intelligence, Artificial Intelligence และการวิเคราะห์ข้อมูล เขาสามารถคิดร่วมกับผู้ใช้และวิเคราะห์คำขอข้อมูลและออกแบบแดชบอร์ดได้ ในฐานะนักพัฒนาเขาสามารถเขียน ETL และสร้างแบบจำลองข้อมูลได้ สุดท้าย เขาเป็นผู้ที่ชื่นชอบ Lightning Network ปัจจุบันทำงานเป็นนักพัฒนา Rust ที่ Breez
short_bio: Lightning Network ผู้ที่ชื่นชอบ | นักพัฒนา | Breez
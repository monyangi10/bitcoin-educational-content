bio: |
  On je svestrani stručnjak za podatke sa znanjem o poslovnoj inteligenciji, veštačkoj inteligenciji i analizi podataka. Može da razmišlja zajedno sa korisnikom i tako analizira zahtev za informacijama i dizajnira kontrolnu tablu. Kao programer, može da piše ETL i modeluje podatke. Na kraju, on je entuzijasta za Lightning Network, trenutno radi kao Rust programer u Breez-u.
short_bio: Lightning Network entuzijasta | developer | Breez
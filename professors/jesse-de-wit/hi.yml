bio: |
  वह एक सर्वांगीण डेटा विशेषज्ञ हैं, जिन्हें बिज़नेस इंटेलिजेंस, आर्टिफिशियल इंटेलिजेंस और डेटा विश्लेषण का ज्ञान है। वह उपयोगकर्ता के साथ मिलकर सोच सकते हैं और इस प्रकार सूचना अनुरोध का विश्लेषण कर सकते हैं और एक डैशबोर्ड डिज़ाइन कर सकते हैं। एक डेवलपर के रूप में, वह ETL लिख सकते हैं और डेटा मॉडल कर सकते हैं। इसके अलावा, वह Lightning Network के प्रति उत्साही हैं और वर्तमान में ब्रीज़ में Rust डेवलपर के रूप में कार्यरत हैं।
  
short_bio: Lightning Network उत्साही | डेवलपर | ब्रीज़
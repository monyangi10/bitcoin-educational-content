bio: |
  Hän on monipuolinen data-asiantuntija, jolla on tietoa Business Intelligence -palveluista, tekoälystä ja data-analyysistä. Hän osaa ajatella yhdessä käyttäjän kanssa ja siten analysoida tietopyynnön ja suunnitella kojelaudan. Kehittäjänä hän osaa kirjoittaa ETL:ää ja mallintaa tietoja. Lisäksi hän on Lightning Network-harrastaja, joka työskentelee tällä hetkellä Rust-kehittäjänä Breezillä.
  
short_bio: Lightning Network-harrastaja | kehittäjä | Breez
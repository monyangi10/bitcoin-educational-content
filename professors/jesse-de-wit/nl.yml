bio: |
  Hij is een allround dataspecialist met kennis van Business Intelligence, Artificial Intelligence en data-analyse. Hij kan meedenken met een gebruiker en zo een informatievraag analyseren en een dashboard ontwerpen. Als ontwikkelaar kan hij ETL schrijven en data modelleren. Tot slot is hij een Lightning Network enthousiasteling, momenteel werkzaam als Rust ontwikkelaar bij Breez.
  
short_bio: Lightning Network liefhebber | ontwikkelaar | Breez
bio: |
  Той е всестранен специалист по данни с познания в областта на бизнес разузнаването, изкуствения интелект и анализа на данни. Той може да мисли заедно с потребителя и по този начин да анализира заявка за информация и да проектира табло за управление. Като разработчик той може да пише ETL и да моделира данни. И накрая, той е ентусиаст на Lightning Network, който в момента работи като разработчик на Rust в Breez.
  
short_bio: Lightning Network ентусиаст | разработчик | Breez
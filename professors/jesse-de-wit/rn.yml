bio: |
  Ni umuhinga mu vy’amakuru mu buryo bwose afise ubumenyi mu vy’ubuhinga bw’ubudandaji, ubuhinga bukoranye n’abantu n’ugusesangura amakuru. Arashobora kwiyumvira hamwe n’uwukoresha, gutyo agasuzuma amakuru asaba maze agahingura urutonde rw’ibintu. Nk’umuhinguzi arashobora kwandika ETL n’amakuru y’akarorero. Ubwa nyuma, ni umukunzi wa Lightning Network, ubu akora nk’umuhinga mu bijanye n’ugutegura Rust muri Breez.
  
short_bio: Umukunzi wa Lightning Network | umuhinguzi | Umuyaga
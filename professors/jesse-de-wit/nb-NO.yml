bio: |
  Han er en allsidig dataspesialist med kunnskap om Business Intelligence, kunstig intelligens og dataanalyse. Han kan tenke sammen med en bruker og dermed analysere en informasjonsforespørsel og utforme et dashbord. Som utvikler kan han skrive ETL og modellere data. Til slutt er han en Lightning Network-entusiast, og jobber for tiden som Rust-utvikler hos Breez.
  
short_bio: Lightning Network-entusiast | utvikler | Breez
bio: |
  Hannah har en kandidatexamen i ekonomi från University of Illinois Chicago. Under studietiden blev hon djupt fascinerad av pengar. När hon upptäckte Bitcoin 2012 blev hon snabbt förälskad. Efter att ha tillbringat flera år som webbutvecklare med teknisk bakgrund började Hannah studera och arbeta inom kryptovalutateknik. Sedan hon upptäckte Bitcoin grundade Hannah Velas Commerce och 2017 började hon undervisa i kryptoteknik på UIC och olika ideella organisationer.
short_bio: Developer Advocate på Lightning Labs
bio: |
  Hannah har en bachelorgrad i økonomi fra University of Illinois Chicago. I løpet av studietiden ble hun dypt fascinert av penger. Da hun oppdaget Bitcoin i 2012, ble hun raskt forelsket. Etter å ha tilbrakt mange år som webutvikler med teknisk bakgrunn, begynte Hannah å studere og jobbe med kryptovaluta-teknologi. Etter at hun oppdaget Bitcoin, grunnla Hannah Velas Commerce, og i 2017 begynte hun å undervise i kryptoteknologi ved UIC og ulike ideelle organisasjoner.
short_bio: Developer Advocate hos Lightning Labs
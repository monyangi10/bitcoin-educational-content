bio: |
  हन्ना ने शिकागो के इलिनोइस विश्वविद्यालय से अर्थशास्त्र में स्नातक की उपाधि प्राप्त की है। अपनी पढ़ाई के दौरान, उन्हें पैसों का गहरा शौक हो गया था। 2012 में जब उन्हें Bitcoin के बारे में पता चला, तो उन्हें तुरंत ही उससे प्यार हो गया। तकनीकी पृष्ठभूमि वाली एक वेब डेवलपर के रूप में वर्षों बिताने के बाद, हन्ना ने क्रिप्टोकरेंसी तकनीक के क्षेत्र में अध्ययन और काम करना शुरू कर दिया। Bitcoin की खोज के बाद, हन्ना ने वेलास कॉमर्स की स्थापना की और 2017 में, उन्होंने UIC और विभिन्न गैर-लाभकारी संस्थाओं में क्रिप्टो तकनीक पढ़ाना शुरू किया।
short_bio: लाइटनिंग लैब्स में डेवलपर एडवोकेट
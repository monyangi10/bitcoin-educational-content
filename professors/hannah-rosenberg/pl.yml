bio: |
  Hannah uzyskała tytuł licencjata w dziedzinie ekonomii na Uniwersytecie Illinois w Chicago. Podczas studiów zafascynowała się pieniędzmi. Kiedy w 2012 roku odkryła Bitcoin, szybko się zakochała. Spędziwszy lata jako programista stron internetowych z zapleczem technicznym, Hannah zaczęła studiować i pracować w przestrzeni technologicznej kryptowalut. Od czasu odkrycia Bitcoin Hannah założyła Velas Commerce, a w 2017 r. zaczęła uczyć technologii kryptograficznej na UIC i w różnych organizacjach non-profit.
short_bio: Rzecznik deweloperów w Lightning Labs
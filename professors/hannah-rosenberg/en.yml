bio: |
  Hannah holds a bachelor's degree in Economics from the University of Illinois Chicago. During her studies, she became deeply fascinated with money. When she discovered Bitcoin in 2012, she quickly fell in love. Having spent years as a web developer with a technical background, Hannah began studying and working within the cryptocurrency technology space. Since discovering Bitcoin, Hannah founded Velas Commerce and in 2017, she began teaching crypto technology at UIC and various non-profits.
short_bio: Developer Advocate at Lightning Labs

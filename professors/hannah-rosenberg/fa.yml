bio: |
  هانا دارای مدرک کارشناسی در رشته اقتصاد از دانشگاه ایلینوی شیکاگو است. در طول تحصیلاتش، او به شدت به پول علاقه‌مند شد. وقتی در سال ۲۰۱۲ با Bitcoin آشنا شد، به سرعت عاشق آن شد. پس از سال‌ها کار به عنوان توسعه‌دهنده وب با پیشینه فنی، هانا شروع به مطالعه و کار در حوزه فناوری ارزهای دیجیتال کرد. از زمان کشف Bitcoin، هانا شرکت Velas Commerce را تأسیس کرد و در سال ۲۰۱۷، او شروع به تدریس فناوری کریپتو در UIC و سازمان‌های غیرانتفاعی مختلف کرد.
short_bio: مدافع توسعه‌دهنده در Lightning Labs
bio: |
  Hannah on omandanud bakalaureusekraadi majandusteaduses Illinoisi Ülikoolist Chicagos. Õpingute ajal tekkis tal sügav huvi raha vastu. Kui ta 2012. aastal avastas Bitcoin, armus ta kiiresti. Olles aastaid töötanud tehnilise taustaga veebiarendajana, hakkas Hannah uurima ja töötama krüptoraha tehnoloogia valdkonnas. Pärast Bitcoin avastamist asutas Hannah Velas Commerce'i ning 2017. aastal hakkas ta õpetama krüptotehnoloogiat UIC-s ja erinevates mittetulundusühingutes.

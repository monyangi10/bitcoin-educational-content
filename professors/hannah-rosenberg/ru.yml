bio: |
  Ханна получила степень бакалавра экономики в Иллинойском университете Чикаго. Во время учебы она сильно увлеклась деньгами. Когда в 2012 году она открыла для себя Bitcoin, то быстро влюбилась. Проработав несколько лет в качестве веб-разработчика с техническим образованием, Ханна начала изучать и работать в сфере криптовалютных технологий. После открытия Bitcoin Ханна основала компанию Velas Commerce, а в 2017 году начала преподавать криптовалютные технологии в UIC и различных некоммерческих организациях.
short_bio: Защитник разработчиков в Lightning Labs
bio: |
  Хана има бакалавърска степен по икономика от Университета на Илинойс Чикаго. По време на следването си тя се увлича дълбоко по парите. Когато през 2012 г. открива Bitcoin, тя бързо се влюбва в него. След като прекарва години като уеб разработчик с техническо образование, Хана започва да изучава и работи в областта на криптовалутните технологии. След като открива Bitcoin, Хана основава Велас Комерс, а през 2017 г. започва да преподава криптотехнологии в UIC и различни организации с нестопанска цел.

short_bio: Застъпник на разработчиците в Lightning Labs

bio: |
  Hannah heeft een bachelordiploma economie van de University of Illinois Chicago. Tijdens haar studie raakte ze diep gefascineerd door geld. Toen ze in 2012 Bitcoin ontdekte, werd ze al snel verliefd. Na jaren als webontwikkelaar met een technische achtergrond te hebben gewerkt, begon Hannah de cryptocurrency-technologie te bestuderen en te werken. Sinds ze Bitcoin ontdekte, richtte Hannah Velas Commerce op en in 2017 begon ze cryptotechnologie te onderwijzen aan UIC en verschillende non-profits.
short_bio: Developer Advocate bij Lightning Labs
bio: |
  Hannah ha conseguito una laurea in Economia presso la University of Illinois Chicago. Durante i suoi studi, è rimasta profondamente affascinata dal denaro. Quando ha scoperto il Bitcoin nel 2012, se ne è subito innamorata. Dopo aver lavorato per anni come sviluppatore web con un background tecnico, Hannah ha iniziato a studiare e lavorare nello spazio tecnologico delle criptovalute. Dopo aver scoperto Bitcoin, Hannah ha fondato Velas Commerce e nel 2017 ha iniziato a insegnare tecnologia delle criptovalute all'UIC e a varie organizzazioni non profit.
short_bio: Consulente per gli sviluppatori presso Lightning Labs
bio: |
  Hannah hat einen Bachelor-Abschluss in Wirtschaftswissenschaften von der University of Illinois Chicago. Während ihres Studiums war sie zutiefst von Geld fasziniert. Als sie im Jahr 2012 Bitcoin entdeckte, verliebte sie sich schnell. Nachdem sie jahrelang als Webentwicklerin mit technischem Hintergrund gearbeitet hatte, begann Hannah mit dem Studium und der Arbeit im Bereich der Kryptowährungstechnologie. Seit ihrer Entdeckung von Bitcoin gründete Hannah Velas Commerce und begann 2017, Krypto-Technologie an der UIC und bei verschiedenen gemeinnützigen Organisationen zu unterrichten.
short_bio: Fürsprecher der Entwickler bei Lightning Labs
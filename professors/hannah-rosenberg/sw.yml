bio: |
  Hannah ana shahada ya kwanza katika Uchumi kutoka Chuo Kikuu cha Illinois Chicago. Wakati wa masomo yake, alipendezwa sana na pesa. Alipogundua Bitcoin mnamo 2012, alipenda haraka. Baada ya kutumia miaka mingi kama msanidi wavuti aliye na usuli wa kiufundi, Hannah alianza kusoma na kufanya kazi ndani ya nafasi ya teknolojia ya cryptocurrency. Tangu kugundua Bitcoin, Hannah alianzisha Velas Commerce na mwaka wa 2017, alianza kufundisha teknolojia ya crypto katika UIC na mashirika mbalimbali yasiyo ya faida.
short_bio: Wakili wa Wasanidi Programu katika Maabara ya Umeme
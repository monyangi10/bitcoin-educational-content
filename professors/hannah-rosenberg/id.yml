bio: |
  Hannah meraih gelar sarjana di bidang Ekonomi dari University of Illinois Chicago. Selama masa studinya, ia sangat tertarik dengan uang. Ketika ia menemukan Bitcoin pada tahun 2012, ia langsung jatuh cinta. Setelah menghabiskan waktu bertahun-tahun sebagai pengembang web dengan latar belakang teknis, Hannah mulai belajar dan bekerja di bidang teknologi mata uang kripto. Sejak menemukan Bitcoin, Hannah mendirikan Velas Commerce dan pada tahun 2017, ia mulai mengajar teknologi kripto di UIC dan berbagai organisasi nirlaba.
short_bio: Advokat Pengembang di Lightning Labs
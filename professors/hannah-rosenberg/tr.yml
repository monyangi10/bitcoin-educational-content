bio: |
  Hannah, Chicago Illinois Üniversitesi Ekonomi Bölümü'nden lisans derecesine sahiptir. Eğitimi sırasında paraya karşı derin bir hayranlık duymaya başladı. 2012'de Bitcoin'ı keşfettiğinde kısa sürede aşık oldu. Yıllarını teknik geçmişe sahip bir web geliştiricisi olarak geçiren Hannah, kripto para teknolojisi alanında çalışmaya ve çalışmaya başladı. Bitcoin'ı keşfettiğinden beri Hannah Velas Commerce'i kurdu ve 2017'de UIC'de ve çeşitli kâr amacı gütmeyen kuruluşlarda kripto teknolojisi öğretmeye başladı.
short_bio: Lightning Labs'de Geliştirici Danışmanı
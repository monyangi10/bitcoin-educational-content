bio: |
  Hannah získala bakalářský titul v oboru ekonomie na University of Illinois Chicago. Během studia ji hluboce zaujaly peníze. Když v roce 2012 objevila Bitcoin, rychle si ji zamilovala. Hannah strávila roky jako webová vývojářka s technickým vzděláním a začala studovat a pracovat v oblasti kryptoměnových technologií. Od objevení Bitcoin Hannah založila společnost Velas Commerce a v roce 2017 začala vyučovat kryptoměnové technologie na UIC a v různých neziskových organizacích.
short_bio: Zástupce vývojářů ve společnosti Lightning Labs
bio: |
  Hannah afise impapuro z’umutsindo mu vy’ubutunzi muri kaminuza ya Illinois Chicago. Mu gihe c’inyigisho ziwe, yarakunda cane amahera. Igihe yavumbura Bitcoin mu 2012, yaciye yihuta gukundana. Hannah amaze imyaka ari umuhinga mu bijanye n’ubuhinga, yaratanguye kwiga no gukora mu kibanza c’ubuhinga bw’amahera y’amahera. Kuva aho Hannah abonye Bitcoin, yashinze Velas Commerce, mu mwaka w’2017, atangura kwigisha ubuhinga bwa crypto muri UIC no mu mashirahamwe atandukanye atagira inyungu.
short_bio: Umuvugizi w'abahinguzi mu bigo vy'ubushakashatsi vy'umuravyo
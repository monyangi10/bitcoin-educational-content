bio: |
  Hannah est titulaire d'une licence en économie de l'Université de l'Illinois à Chicago. Au cours de ses études, elle est devenue profondément fascinée par l'argent. Lorsqu'elle a découvert Bitcoin en 2012, elle est rapidement tombée amoureuse. Ayant passé des années en tant que développeuse web avec une formation technique, Hannah a commencé à étudier et à travailler dans l'espace technologique des crypto-monnaies. Depuis qu'elle a découvert Bitcoin, Hannah a fondé Velas Commerce et, en 2017, elle a commencé à enseigner la technologie des crypto-monnaies à l'UIC et à diverses organisations à but non lucratif.
short_bio: Défenseur des développeurs chez Lightning Labs
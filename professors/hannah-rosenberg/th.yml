bio: |
  Hannah สำเร็จการศึกษาระดับปริญญาตรีด้านเศรษฐศาสตร์จากมหาวิทยาลัยอิลลินอยส์ชิคาโก ในระหว่างการศึกษา เธอมีความหลงใหลในเรื่องเงินอย่างลึกซึ้ง เมื่อเธอค้นพบ Bitcoin ในปี 2012 เธอก็ตกหลุมรักอย่างรวดเร็ว หลังจากใช้เวลาหลายปีในฐานะนักพัฒนาเว็บที่มีพื้นฐานด้านเทคนิค Hannah เริ่มศึกษาและทำงานในพื้นที่เทคโนโลยีสกุลเงินดิจิทัล ตั้งแต่ค้นพบ Bitcoin Hannah ได้ก่อตั้ง Velas Commerce และในปี 2017 เธอเริ่มสอนเทคโนโลยีคริปโตที่ UIC และองค์กรไม่แสวงหาผลกำไรหลายแห่ง
short_bio: ผู้สนับสนุนนักพัฒนาที่ Lightning Labs
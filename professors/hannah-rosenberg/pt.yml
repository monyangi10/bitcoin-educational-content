bio: |
  A Hannah tem uma licenciatura em Economia pela Universidade de Illinois em Chicago. Durante os seus estudos, ficou profundamente fascinada com o dinheiro. Quando descobriu a Bitcoin em 2012, apaixonou-se rapidamente. Tendo passado anos como programadora web com formação técnica, Hannah começou a estudar e a trabalhar no espaço tecnológico das criptomoedas. Desde a descoberta do Bitcoin, Hannah fundou a Velas Commerce e, em 2017, começou a ensinar tecnologia de criptografia na UIC e em várias organizações sem fins lucrativos.
short_bio: Defensor do desenvolvedor na Lightning Labs
bio: |
  Hannah ima diplomu iz ekonomije sa Univerziteta Ilinois Čikago. Tokom studija, duboko se fascinirala novcem. Kada je otkrila Bitcoin 2012. godine, brzo se zaljubila. Nakon što je provela godine kao veb programer sa tehničkom pozadinom, Hannah je počela da proučava i radi u oblasti tehnologije kriptovaluta. Od kada je otkrila Bitcoin, Hannah je osnovala Velas Commerce i 2017. godine počela da predaje kripto tehnologiju na UIC i raznim neprofitnim organizacijama.
short_bio: Developer Advocate at Lightning Labs
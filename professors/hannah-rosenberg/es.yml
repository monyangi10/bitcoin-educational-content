bio: |
  Hannah es licenciada en Economía por la Universidad de Illinois Chicago. Durante sus estudios, se sintió profundamente fascinada por el dinero. Cuando descubrió Bitcoin en 2012, se enamoró rápidamente. Tras pasar años como desarrolladora web con formación técnica, Hannah comenzó a estudiar y trabajar en el ámbito de la tecnología de las criptomonedas. Desde que descubrió Bitcoin, Hannah fundó Velas Commerce y, en 2017, comenzó a enseñar tecnología criptográfica en la UIC y en varias organizaciones sin ánimo de lucro.
short_bio: Defensor de los desarrolladores en Lightning Labs
bio: |
  Hannah có bằng cử nhân Kinh tế của Đại học Illinois Chicago. Trong quá trình học, cô đã bị cuốn hút sâu sắc bởi tiền bạc. Khi khám phá ra Bitcoin vào năm 2012, cô đã nhanh chóng yêu thích lĩnh vực này. Sau nhiều năm làm nhà phát triển web với nền tảng kỹ thuật, Hannah bắt đầu nghiên cứu và làm việc trong lĩnh vực công nghệ tiền điện tử. Kể từ khi khám phá ra Bitcoin, Hannah đã thành lập Velas Commerce và vào năm 2017, cô bắt đầu giảng dạy công nghệ tiền điện tử tại UIC và nhiều tổ chức phi lợi nhuận khác.
short_bio: Người ủng hộ nhà phát triển tại Lightning Labs
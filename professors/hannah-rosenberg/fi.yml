bio: |
  Hannah on suorittanut taloustieteen kandidaatin tutkinnon Illinoisin yliopistossa Chicagossa. Opintojensa aikana hän kiinnostui syvästi rahasta. Kun hän löysi Bitcoin:n vuonna 2012, hän rakastui siihen nopeasti. Vietettyään vuosia teknisen taustan omaavana web-kehittäjänä Hannah alkoi opiskella ja työskennellä kryptovaluuttateknologian parissa. Bitcoin:n löytämisen jälkeen Hannah perusti Velas Commerce -yrityksen, ja vuonna 2017 hän alkoi opettaa kryptoteknologiaa UIC:ssä ja erilaisissa voittoa tavoittelemattomissa yhteisöissä.
short_bio: Lightning Labsin kehittäjäasiamies
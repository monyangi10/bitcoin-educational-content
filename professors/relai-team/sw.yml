bio: |
  Timu ya Relai. Relai ni jukwaa la Bitcoin Exchange lenye makao yake Uswizi lililoanzishwa na Julian Liniger na Adem Bilican. Relai hufanya kuokoa na kuwekeza katika Bitcoin kupatikana kwa kila mtu. Programu ya Bitcoin-pekee imeundwa kuwa rahisi na angavu, ikiruhusu mtu yeyote barani Ulaya kununua na kuuza Bitcoin ndani ya dakika chache, bila usajili, uthibitishaji au kuweka akiba. Imekaguliwa kwa kujitegemea na zaidi ya CHF milioni 50 za Bitcoin zimewekezwa kupitia mfumo wake, Relai huwapa watumiaji fursa ya kufungua njia mpya za kuokoa na kuwekeza.
  
short_bio: Timu ya Relai. Relai ni jukwaa la Bitcoin Exchange lenye makao yake Uswizi.
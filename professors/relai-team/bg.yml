bio: |
  Relai Екип. Relai е базирана в Швейцария платформа за обмен на Bitcoin, основана от Джулиан Линигер и Адем Биликан. Relai прави спестяването и инвестирането в Bitcoin достъпно за всички. Приложението, предназначено само за биткойни, е проектирано така, че да бъде просто и интуитивно, като позволява на всеки в Европа да купува и продава Bitcoin в рамките на няколко минути, без регистрация, проверка или депозит. Независимо одитирана и с над 50 млн. швейцарски франка в Bitcoin, инвестирани чрез нейната платформа, Relai дава на потребителите възможност да отключат нови начини за спестяване и инвестиране.
  
short_bio: Relai Екип. Relai е базирана в Швейцария платформа за обмен на Bitcoin.
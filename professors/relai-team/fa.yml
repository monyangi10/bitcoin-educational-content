bio: |
  تیم Relai. Relai یک پلتفرم Bitcoin Exchange مستقر در سوئیس است که توسط جولیان لینگر و آدم بیلیکان تأسیس شده است. Relai پس‌انداز و سرمایه‌گذاری در Bitcoin را برای همه قابل دسترس می‌کند. این اپلیکیشن که فقط برای Bitcoin طراحی شده است، ساده و شهودی است و به هر کسی در اروپا اجازه می‌دهد تا در عرض چند دقیقه Bitcoin را خرید و فروش کند، بدون نیاز به ثبت‌نام، تأیید یا واریز. با حسابرسی مستقل و بیش از ۵۰ میلیون CHF از Bitcoin سرمایه‌گذاری شده از طریق پلتفرم خود، Relai به مصرف‌کنندگان این فرصت را می‌دهد تا راه‌های جدیدی برای پس‌انداز و سرمایه‌گذاری کشف کنند.

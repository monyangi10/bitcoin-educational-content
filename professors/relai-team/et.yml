bio: |
  Relai meeskond. Relai on Šveitsis asuv Bitcoin Exchange platvorm, mille asutasid Julian Liniger ja Adem Bilican. Relai teeb Bitcoin-säästmise ja investeerimise kõigile kättesaadavaks. Ainult Bitcoin-ile mõeldud rakendus on loodud lihtsaks ja intuitiivseks, võimaldades igaühel Euroopas osta ja müüa Bitcoin-i mõne minutiga, ilma registreerimise, kontrollimise või deposiidita. Relai on sõltumatult auditeeritud ja selle platvormi kaudu on investeeritud üle 50 miljoni Šveitsi frangi Bitcoin, mis annab tarbijatele võimaluse avada uusi võimalusi säästmiseks ja investeerimiseks.
  
short_bio: Relai meeskond. Relai on Šveitsis asuv Bitcoin Exchange platvorm.
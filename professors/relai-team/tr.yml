bio: |
  Relai Ekibi. Relai, Julian Liniger ve Adem Bilican tarafından kurulan İsviçre merkezli bir Bitcoin Exchange platformudur. Relai, Bitcoin'de tasarruf ve yatırımı herkes için erişilebilir hale getirir. Yalnızca Bitcoin uygulaması basit ve sezgisel olacak şekilde tasarlanmıştır ve Avrupa'daki herkesin kayıt, doğrulama veya depozito olmadan dakikalar içinde Bitcoin alıp satmasına olanak tanır. Bağımsız olarak denetlenen ve platformu aracılığıyla 50 milyon CHF'den fazla Bitcoin yatırımı yapan Relai, tüketicilere yeni tasarruf ve yatırım yollarının kilidini açma şansı veriyor.
  
short_bio: Relai Ekibi. Relai, İsviçre merkezli bir Bitcoin Exchange platformudur.
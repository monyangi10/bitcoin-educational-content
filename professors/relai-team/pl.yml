bio: |
  Zespół Relai. Relai to szwajcarska platforma Bitcoin Exchange założona przez Juliana Linigera i Adema Bilicana. Relai sprawia, że oszczędzanie i inwestowanie w Bitcoin jest dostępne dla każdego. Aplikacja przeznaczona wyłącznie do Bitcoin została zaprojektowana tak, aby była prosta i intuicyjna, umożliwiając każdemu w Europie kupowanie i sprzedawanie Bitcoin w ciągu kilku minut, bez rejestracji, weryfikacji lub depozytu. Dzięki niezależnemu audytowi i zainwestowaniu ponad 50 milionów CHF w Bitcoin za pośrednictwem swojej platformy, Relai daje konsumentom szansę na odblokowanie nowych sposobów oszczędzania i inwestowania.
  
short_bio: Zespół Relai. Relai jest szwajcarską platformą Bitcoin Exchange.
bio: |
  Relai Team. Relai is een in Zwitserland gevestigd Bitcoin Exchange platform, opgericht door Julian Liniger en Adem Bilican. Relai maakt sparen en investeren in Bitcoin toegankelijk voor iedereen. De Bitcoin app is eenvoudig en intuïtief ontworpen, zodat iedereen in Europa binnen enkele minuten Bitcoin kan kopen en verkopen, zonder registratie, verificatie of storting. Onafhankelijk gecontroleerd en met meer dan 50 miljoen CHF aan Bitcoin geïnvesteerd via het platform, geeft Relai consumenten de kans om nieuwe manieren van sparen en investeren te ontsluiten.
  
short_bio: Relai Team. Relai is een in Zwitserland gevestigd Bitcoin Exchange platform.
bio: |
  Relai Team. Relai är en Schweizbaserad Bitcoin Exchange-plattform som grundades av Julian Liniger och Adem Bilican. Relai gör sparande och investeringar i Bitcoin tillgängligt för alla. Den enda Bitcoin-appen är utformad för att vara enkel och intuitiv, så att alla i Europa kan köpa och sälja Bitcoin inom några minuter, utan registrering, verifiering eller insättning. Relai är oberoende granskat och har över 50 miljoner CHF i Bitcoin investerat genom sin plattform, vilket ger konsumenterna möjlighet att låsa upp nya sätt att spara och investera.
  
short_bio: Relai Team. Relai är en Schweizbaserad Bitcoin Exchange plattform.
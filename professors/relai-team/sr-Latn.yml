bio: |
  Relai Tim. Relai je švajcarska platforma Bitcoin Exchange koju su osnovali Julian Liniger i Adem Bilican. Relai omogućava štednju i investiranje u Bitcoin dostupnim svima. Aplikacija samo za Bitcoin je dizajnirana da bude jednostavna i intuitivna, omogućavajući svakome u Evropi da kupuje i prodaje Bitcoin u roku od nekoliko minuta, bez registracije, verifikacije ili depozita. Nezavisno revidirana i sa preko 50 miliona CHF investiranih u Bitcoin putem svoje platforme, Relai pruža potrošačima priliku da otključaju nove načine štednje i investiranja.
short_bio: Relai Tim. Relai je švajcarska Bitcoin Exchange platforma.
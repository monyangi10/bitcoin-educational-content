bio: |
  रिले टीम। रिले एक स्विस-आधारित Bitcoin Exchange प्लेटफ़ॉर्म है जिसकी स्थापना जूलियन लिनिगर और एडेम बिलिकन ने की है। रिले Bitcoin में बचत और निवेश को सभी के लिए सुलभ बनाता है। Bitcoin-केवल ऐप को सरल और सहज बनाया गया है, जिससे यूरोप में कोई भी व्यक्ति बिना पंजीकरण, सत्यापन या जमा राशि के, मिनटों में Bitcoin खरीद और बेच सकता है। स्वतंत्र रूप से ऑडिट किया गया और अपने प्लेटफ़ॉर्म के माध्यम से 50 मिलियन से अधिक CHF Bitcoin का निवेश किया गया, रिले उपभोक्ताओं को बचत और निवेश के नए तरीके खोजने का मौका देता है।
  
short_bio: रिले टीम। रिले एक स्विस-आधारित Bitcoin Exchange प्लेटफॉर्म है।
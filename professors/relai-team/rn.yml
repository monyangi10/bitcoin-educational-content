bio: |
  Ishirahamwe rya Relai. Relai ni urubuga rwo mu Busuwisi rwashinzwe na Julian Liniger na Adem Bilican. Relai ituma kuzigama no gushiramwo amahera muri Bitcoin bishikira umuntu wese. Iyi porogarama ikoresha Bitcoin gusa yakozwe kugira ngo ibe yoroshe kandi ishobora gukoreshwa neza, igatuma umuntu wese wo mu Buraya ashobora kugura no kugurisha Bitcoin mu minota mikeyi, ata kwiyandikisha, ata kugenzura canke ngo ashiremwo amahera. Relai igenzurwa n’abantu bigenga kandi ikaba ifise amafaranga arenga miliyoni 50 z’ama CHF ya Bitcoin yashizwemwo biciye ku rubuga rwayo, itanga amahirwe ku baguzi yo gufungura uburyo bushasha bwo kuzigama no gushiramwo amafaranga.
  
short_bio: Ishirahamwe rya Relai. Relai ni urubuga rwa Bitcoin Exchange rukorera mu Busuwisi.
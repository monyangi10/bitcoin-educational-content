bio: |
  Relai 팀. Relai는 줄리안 리니거와 아뎀 빌리칸이 설립한 스위스에 기반을 둔 Bitcoin Exchange 플랫폼입니다. Relai는 누구나 Bitcoin에 저축하고 투자할 수 있도록 지원합니다. Bitcoin 전용 앱은 간단하고 직관적으로 설계되어 유럽의 누구나 등록, 인증, 보증금 없이 몇 분 안에 Bitcoin을 사고 팔 수 있습니다. 독립적인 감사를 받았으며 플랫폼을 통해 5천만 스위스프랑 이상의 Bitcoin이 투자된 Relai는 소비자에게 새로운 저축 및 투자 방법을 제공합니다.
  
short_bio: Relai 팀. Relai는 스위스에 기반을 둔 Bitcoin Exchange 플랫폼입니다.
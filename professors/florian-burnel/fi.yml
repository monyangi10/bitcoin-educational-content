bio: |
  Järjestelmä- ja verkkoinsinööri, IT-Connectin toinen perustaja ja Microsoft MVP "Cloud and Datacenter Management". Haluan jakaa kokemuksiani ja löydöksiäni artikkeleideni kautta. Olen generalisti, joka on erityisen kiinnostunut Microsoftin ratkaisuista ja skriptauksesta.
  

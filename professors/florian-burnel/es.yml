bio: |
  Ingeniero de sistemas y redes, cofundador de IT-Connect y MVP de Microsoft "Cloud and Datacenter Management". Me gustaría compartir mi experiencia y descubrimientos a través de mis artículos. Soy generalista con especial interés en las soluciones de Microsoft y el scripting.
  

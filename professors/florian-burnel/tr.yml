bio: |
  Sistem ve ağ mühendisi, IT-Connect'in kurucu ortağı ve Microsoft MVP "Bulut ve Veri Merkezi Yönetimi". Deneyimlerimi ve keşiflerimi makalelerim aracılığıyla paylaşmak istiyorum. Microsoft çözümleri ve komut dosyası yazmaya özel ilgi duyan bir genel uzmanım.
  

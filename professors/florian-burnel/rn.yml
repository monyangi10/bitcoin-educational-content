bio: |
  Injeniyeri w'imirongo n'imirongo, umushingwamanza wa IT-Connect na Microsoft MVP "Uburongozi bw'igicu n'amakuru". Ndashaka kubabwira ivyo naciyemwo n’ivyo navumbuye biciye mu ngingo zanje. Ndi umuhinga mu vy’ubuhinga bwa none afise ugukunda cane inyishu za Microsoft n’inyandiko.
  
short_bio: Injeniyeri wa sisitemu n'urubuga, umushingwamanza wa IT-Connect na Microsoft MVP
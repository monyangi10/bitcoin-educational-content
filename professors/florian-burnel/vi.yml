bio: |
  Kỹ sư hệ thống và mạng, đồng sáng lập IT-Connect và Microsoft MVP "Quản lý Đám mây và Trung tâm Dữ liệu". Tôi muốn chia sẻ kinh nghiệm và những khám phá của mình qua các bài viết. Tôi là một chuyên gia đa năng, đặc biệt quan tâm đến các giải pháp và kịch bản của Microsoft.
  
  
short_bio: Kỹ sư hệ thống và mạng, đồng sáng lập IT-Connect và Microsoft MVP
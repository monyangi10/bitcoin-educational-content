bio: |
  مهندس سیستم و شبکه، هم‌بنیان‌گذار IT-Connect و MVP مایکروسافت "مدیریت ابر و مرکز داده". دوست دارم تجربیات و کشفیات خود را از طریق مقالاتم به اشتراک بگذارم. من یک متخصص عمومی هستم که به راه‌حل‌های مایکروسافت و اسکریپت‌نویسی علاقه خاصی دارم.
short_bio: مهندس سیستم و شبکه، هم‌بنیان‌گذار IT-Connect و MVP مایکروسافت
bio: |
  Системный и сетевой инженер, сооснователь компании IT-Connect и Microsoft MVP "Управление облаками и дата-центрами". Я хочу поделиться своим опытом и открытиями через свои статьи. Я специалист широкого профиля с особым интересом к решениям Microsoft и скриптингу.
  

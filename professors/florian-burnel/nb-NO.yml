bio: |
  System- og nettverksingeniør, medgrunnlegger av IT-Connect og Microsoft MVP "Cloud and Datacenter Management". Jeg vil gjerne dele mine erfaringer og oppdagelser gjennom artiklene mine. Jeg er generalist med en spesiell interesse for Microsoft-løsninger og skripting.
  

bio: |
  Mhandisi wa Mifumo na mtandao, mwanzilishi mwenza wa IT-Connect na Microsoft MVP "Usimamizi wa Cloud na Datacenter". Ningependa kushiriki uzoefu wangu na uvumbuzi kupitia makala zangu. Mimi ni mwanajumla ninayependa sana suluhu za Microsoft na uandishi.
  
short_bio: Mhandisi wa mifumo na mtandao, mwanzilishi mwenza wa IT-Connect na Microsoft MVP
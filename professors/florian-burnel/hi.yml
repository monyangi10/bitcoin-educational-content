bio: |
  सिस्टम और नेटवर्क इंजीनियर, आईटी-कनेक्ट के सह-संस्थापक और माइक्रोसॉफ्ट एमवीपी "क्लाउड और डेटासेंटर मैनेजमेंट"। मैं अपने लेखों के माध्यम से अपने अनुभव और खोजें साझा करना चाहता/चाहती हूँ। मैं एक सामान्यज्ञ हूँ और माइक्रोसॉफ्ट समाधानों और स्क्रिप्टिंग में मेरी विशेष रुचि है।
  

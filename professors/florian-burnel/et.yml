bio: |
  Süsteemi- ja võrgumehaanik, IT-Connecti kaasasutaja ja Microsofti MVP "Cloud and Datacenter Management". Soovin oma artiklite kaudu jagada oma kogemusi ja avastusi. Olen üldteadlane, kellel on eriline huvi Microsofti lahenduste ja skriptide vastu.
  
short_bio: Süsteemi- ja võrgumehaanik, IT-Connecti kaasasutaja ja Microsoft MVP
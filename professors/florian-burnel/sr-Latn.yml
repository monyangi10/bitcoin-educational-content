bio: |
  Sistemski i mrežni inženjer, suosnivač IT-Connect-a i Microsoft MVP "Cloud and Datacenter Management". Želeo bih da podelim svoje iskustvo i otkrića kroz svoje članke. Ja sam generalista sa posebnim interesovanjem za Microsoft rešenja i skriptovanje.
short_bio: Sistemski i mrežni inženjer, suosnivač IT-Connect i Microsoft MVP
bio: |
  Systémový a síťový inženýr, spoluzakladatel společnosti IT-Connect a Microsoft MVP "Cloud and Datacenter Management". Rád bych se prostřednictvím svých článků podělil o své zkušenosti a objevy. Jsem univerzální odborník se zvláštním zájmem o řešení Microsoft a skriptování.
  
short_bio: Systémový a síťový inženýr, spoluzakladatel společnosti IT-Connect a Microsoft MVP
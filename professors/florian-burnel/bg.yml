bio: |
  Системен и мрежов инженер, съосновател на IT-Connect и Microsoft MVP "Cloud and Datacenter Management". Бих искал да споделям опита и откритията си чрез моите статии. Аз съм специалист с общ профил и особен интерес към решенията на Microsoft и скриптовете.
  

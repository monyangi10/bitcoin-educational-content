bio: |
  Inżynier systemów i sieci, współzałożyciel IT-Connect i Microsoft MVP "Cloud and Datacenter Management". Chciałbym podzielić się swoim doświadczeniem i odkryciami poprzez moje artykuły. Jestem generalistą ze szczególnym zainteresowaniem rozwiązaniami Microsoft i skryptami.
  
short_bio: Inżynier systemów i sieci, współzałożyciel IT-Connect i Microsoft MVP
bio: |
  วิศวกรระบบและเครือข่าย, ผู้ร่วมก่อตั้ง IT-Connect และ Microsoft MVP "Cloud and Datacenter Management" ฉันต้องการแบ่งปันประสบการณ์และการค้นพบของฉันผ่านบทความของฉัน ฉันเป็นผู้เชี่ยวชาญทั่วไปที่มีความสนใจเป็นพิเศษในโซลูชันของ Microsoft และการเขียนสคริปต์
short_bio: วิศวกรระบบและเครือข่าย, ผู้ร่วมก่อตั้ง IT-Connect และ Microsoft MVP
bio: |
  BTC Sessions là nhà giáo dục Bitcoin đáng tin cậy nhất thế giới kể từ năm 2016. Ben và đội ngũ của ông đã giảng dạy cho hàng chục triệu người trên toàn cầu thông qua các buổi hướng dẫn, huấn luyện và các buổi nói chuyện tại các hội nghị quốc tế.
short_bio: Người dẫn chương trình BTC Sessions trên YouTube
bio: |
  BTC Sessions on maailman luotetuin Bitcoin-only-kouluttaja vuodesta 2016 lähtien. Ben ja tiimi ovat opettaneet kymmeniä miljoonia ihmisiä ympäri maailmaa opetusohjelmien, valmennusten ja kansainvälisissä konferensseissa pidettyjen puheiden avulla.
  
short_bio: BTC-istuntojen isäntä YouTubessa
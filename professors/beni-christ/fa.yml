bio: |
  سلام! من یک توسعه‌دهنده فرانت‌اند هستم، با ذهنی کنجکاو و علاقه‌ای شدید به یادگیری. از سال 2024، به امور مالی، بلاکچین و Bitcoin علاقه‌مند شده‌ام. اکنون، می‌خواهم قدم بعدی را بردارم: به اشتراک‌گذاری دانش خود و مشارکت در پروژه‌هایی که فناوری و آموزش را به هم متصل می‌کنند.
short_bio: توسعه‌دهنده فرانت‌اند، با ذهنی کنجکاو و اشتیاقی برای یادگیری
bio: |
  Hallo! Ich bin ein Frontend-Entwickler, mit einem neugierigen Geist und einer Leidenschaft für das Lernen. Seit 2024 interessiere ich mich für Finanzen, Blockchain und Bitcoin. Jetzt möchte ich den nächsten Schritt machen: mein Wissen teilen und zu Projekten beitragen, die Technologie und Bildung miteinander verbinden.
  
short_bio: Frontend-Entwickler, der neugierig ist und gerne lernt
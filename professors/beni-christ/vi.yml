bio: |
  Xin chào! Tôi là một lập trình viên front-end, với tư duy tò mò và niềm đam mê học hỏi. Từ năm 2024, tôi đã quan tâm đến tài chính, blockchain và Bitcoin. Giờ đây, tôi muốn thực hiện bước tiếp theo: chia sẻ kiến thức và đóng góp cho các dự án kết nối công nghệ và giáo dục.
short_bio: Nhà phát triển front-end, có tư duy tò mò và niềm đam mê học hỏi
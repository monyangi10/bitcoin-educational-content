bio: |
  Cześć! Jestem frontend developerem z ciekawskim umysłem i pasją do nauki. Od 2024 roku interesuję się finansami, blockchainem i Bitcoin. Teraz chcę zrobić kolejny krok: dzielić się swoją wiedzą i wnosić wkład w projekty łączące technologię i edukację.
  
short_bio: Frontend developer z ciekawym umysłem i pasją do nauki
bio: |
  Zdravo! Ja sam frontend developer, sa radoznalim umom i strašću za učenjem. Od 2024. godine, interesujem se za finansije, blockchain i Bitcoin. Sada želim da napravim sledeći korak: da podelim svoje znanje i doprinesem projektima koji povezuju tehnologiju i obrazovanje.

short_bio: Frontend developer, sa radoznalim umom i strašću za učenjem

bio: |
  Olá! Sou um desenvolvedor front-end, com uma mente curiosa e uma paixão por aprender. Desde 2024, tenho-me interessado por finanças, blockchain e Bitcoin. Agora, quero dar o próximo passo: partilhar os meus conhecimentos e contribuir para projectos que ligam a tecnologia à educação.
  

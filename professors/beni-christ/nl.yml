bio: |
  Hallo! Ik ben een frontend developer, met een nieuwsgierige geest en een passie voor leren. Sinds 2024 ben ik geïnteresseerd in financiën, blockchain en Bitcoin. Nu wil ik de volgende stap zetten: mijn kennis delen en bijdragen aan projecten die technologie en onderwijs met elkaar verbinden.
  

bio: |
  Dobrý den! Jsem frontendový vývojář se zvídavou myslí a vášní pro učení. Od roku 2024 se zajímám o finance, blockchain a Bitcoin. Nyní chci udělat další krok: sdílet své znalosti a přispívat k projektům, které propojují technologie a vzdělávání.
  
short_bio: Frontendový vývojář se zvídavou myslí a vášní pro učení
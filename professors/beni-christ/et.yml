bio: |
  Tere! Olen uudishimulik ja õpihimuline frontend-arendaja. Alates 2024. aastast olen ma huvitatud rahandusest, plokiahelast ja Bitcoin-st. Nüüd tahan astuda järgmise sammu: jagada oma teadmisi ja panustada projektidesse, mis ühendavad tehnoloogiat ja haridust.
  
short_bio: Uudishimulik ja õpihimuline frontend-arendaja
bio: |
  Hej på er! Jag är en frontend-utvecklare med ett nyfiket sinne och en passion för att lära mig. Sedan 2024 har jag varit intresserad av finans, blockchain och Bitcoin. Nu vill jag ta nästa steg: dela med mig av min kunskap och bidra till projekt som kopplar samman teknik och utbildning.
  
short_bio: Frontend-utvecklare med ett nyfiket sinne och en passion för att lära sig
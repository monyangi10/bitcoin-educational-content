bio: |
  Mwaramutse! Ndi umuhinga mu bijanye n’ugutegura imbere, mfise ubwenge bwo kumenya vyinshi kandi nkunda cane kwiga. Kuva mu mwaka w’2024, narakunda ivy’amahera, blockchain, na Bitcoin. Ubu, nshaka gutera intambwe ikurikira: gusangira ubumenyi bwanje no gutanga umusanzu mu migambi ihuza ubuhinga n’uburezi.
  
short_bio: Umuhinguzi w'imbere, afise ubwenge bushaka kumenya n'urukundo rwo kwiga
bio: |
  Merhaba! Ben meraklı bir zihne ve öğrenme tutkusuna sahip bir frontend geliştiricisiyim. 2024'ten beri finans, blockchain ve Bitcoin ile ilgileniyorum. Şimdi bir sonraki adımı atmak istiyorum: bilgimi paylaşmak ve teknoloji ile eğitimi birbirine bağlayan projelere katkıda bulunmak.
  
short_bio: Meraklı bir zihne ve öğrenme tutkusuna sahip ön uç geliştiricisi
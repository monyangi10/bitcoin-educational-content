bio: |
  Привет! Я фронтенд-разработчик, с любопытным умом и страстью к обучению. С 2024 года я интересуюсь финансами, блокчейном и Bitcoin. Теперь я хочу сделать следующий шаг: поделиться своими знаниями и внести свой вклад в проекты, которые соединяют технологии и образование.
  
short_bio: Фронтенд-разработчик, обладающий любознательным умом и страстью к обучению
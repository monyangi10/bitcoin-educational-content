bio: |
  Здравейте! Аз съм frontend разработчик, с любопитен ум и страст към ученето. От 2024 г. се интересувам от финанси, блокчейн и Bitcoin. Сега искам да направя следващата стъпка: да споделя знанията си и да допринасям за проекти, които свързват технологиите и образованието.
  
short_bio: Разработчик на Frontend, с любопитен ум и страст към учене
bio: |
  Halo! Saya adalah seorang pengembang frontend, dengan rasa ingin tahu dan hasrat untuk belajar. Sejak tahun 2024, saya telah tertarik pada bidang keuangan, blockchain, dan Bitcoin. Sekarang, saya ingin mengambil langkah selanjutnya: berbagi pengetahuan dan berkontribusi pada proyek-proyek yang menghubungkan teknologi dan pendidikan.
  
short_bio: Pengembang frontend, dengan rasa ingin tahu dan hasrat untuk belajar
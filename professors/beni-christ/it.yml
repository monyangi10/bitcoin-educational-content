bio: |
  Ciao a tutti! Sono uno sviluppatore frontend, con una mente curiosa e una passione per l'apprendimento. Dal 2024 mi interesso di finanza, blockchain e Bitcoin. Ora voglio fare il passo successivo: condividere le mie conoscenze e contribuire a progetti che collegano tecnologia e istruzione.
  

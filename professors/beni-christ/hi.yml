bio: |
  नमस्ते! मैं एक फ्रंटएंड डेवलपर हूँ, जिज्ञासु मन और सीखने का जुनून रखता हूँ। 2024 से, मुझे वित्त, ब्लॉकचेन और Bitcoin में रुचि रही है। अब, मैं अगला कदम उठाना चाहता हूँ: अपना ज्ञान साझा करना और उन परियोजनाओं में योगदान देना जो तकनीक और शिक्षा को जोड़ती हैं।
  
short_bio: फ्रंटएंड डेवलपर, जिज्ञासु मन और सीखने के जुनून के साथ
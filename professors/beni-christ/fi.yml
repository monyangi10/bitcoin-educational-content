bio: |
  Hei! Olen frontend-kehittäjä, jolla on utelias mieli ja intohimo oppimiseen. Vuodesta 2024 lähtien olen ollut kiinnostunut rahoituksesta, lohkoketjuista ja Bitcoin:sta. Nyt haluan ottaa seuraavan askeleen: jakaa tietoni ja osallistua hankkeisiin, jotka yhdistävät teknologian ja koulutuksen.
  

bio: |
  สวัสดี! ฉันเป็นนักพัฒนาฝั่งหน้า ด้วยจิตใจที่อยากรู้อยากเห็นและความหลงใหลในการเรียนรู้ ตั้งแต่ปี 2024 ฉันสนใจด้านการเงิน บล็อกเชน และ Bitcoin ตอนนี้ฉันต้องการก้าวไปอีกขั้น: แบ่งปันความรู้ของฉันและมีส่วนร่วมในโครงการที่เชื่อมโยงเทคโนโลยีและการศึกษา
short_bio: นักพัฒนาฝั่งหน้าที่มีจิตใจใฝ่รู้และหลงใหลในการเรียนรู้
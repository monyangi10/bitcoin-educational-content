bio: |
  Hei på deg! Jeg er en frontend-utvikler, med et nysgjerrig sinn og en lidenskap for å lære. Siden 2024 har jeg vært interessert i finans, blockchain og Bitcoin. Nå ønsker jeg å ta det neste steget: å dele kunnskapen min og bidra til prosjekter som kobler teknologi og utdanning.
  
short_bio: Frontend-utvikler, med et nysgjerrig sinn og en lidenskap for å lære
bio: |
  Jag är expert på Mining och anslutna enheter och hittade min väg till Bitcoin genom Mining i hemmet. Jag är upphovsman till Attakai-projektet, som syftar till att demokratisera Mining för så många människor som möjligt genom att omvandla begagnade S9:or till små extravärmare.
  
short_bio: Medskapare av Attakaï & Mining-expert
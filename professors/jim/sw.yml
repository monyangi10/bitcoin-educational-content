bio: |
  Mtaalam katika Mining na vifaa vilivyounganishwa, nilipata njia yangu katika Bitcoin kupitia Mining ya nyumbani. Mimi ndiye mwanzilishi wa mradi wa Attakai, unaolenga kuweka demokrasia ya Mining kwa watu wengi iwezekanavyo kwa kubadilisha S9 zilizotumika kuwa hita ndogo saidizi.
  
short_bio: Muundaji mwenza wa Attakaï & mtaalamu wa Mining
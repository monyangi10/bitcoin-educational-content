bio: |
  Експерт по mining и свързани устройства, открих пътя си към биткойн чрез домашния mining. Аз съм инициатор на проекта Attakai, който има за цел да демократизира mining за възможно най-много хора, като трансформира използвани S9 в малки спомагателни нагреватели.
  
short_bio: Съавтор на Attakaï и mining
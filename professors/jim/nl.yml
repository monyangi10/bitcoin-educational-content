bio: |
  Expert in Mining en aangesloten apparaten, vond ik mijn weg in Bitcoin via thuis-Mining. Ik ben de initiatiefnemer van het Attakai project, dat Mining voor zoveel mogelijk mensen wil democratiseren door gebruikte S9's te transformeren in kleine bijverwarmers.
  
short_bio: Medebedenker van Attakaï & Mining expert
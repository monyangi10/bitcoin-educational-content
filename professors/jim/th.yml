bio: |
  ผู้เชี่ยวชาญด้าน mining และอุปกรณ์ที่เชื่อมต่อกัน ฉันพบเส้นทางของฉันในบิตคอยน์ผ่านทาง mining ที่บ้าน ฉันเป็นผู้ริเริ่มโครงการ Attakai ซึ่งมีเป้าหมายที่จะทำให้ mining เป็นที่แพร่หลายสำหรับคนจำนวนมากที่สุดเท่าที่จะเป็นไปได้โดยการเปลี่ยน S9 ที่ใช้แล้วให้กลายเป็นเครื่องทำความร้อนขนาดเล็กเสริม
short_bio: ผู้ร่วมสร้าง Attakaï & mining ผู้เชี่ยวชาญ
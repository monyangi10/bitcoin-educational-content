bio: |
  Ekspert w dziedzinie Mining i urządzeń połączonych, znalazłem swoją ścieżkę w Bitcoin poprzez domowe Mining. Jestem pomysłodawcą projektu Attakai, którego celem jest demokratyzacja Mining dla jak największej liczby osób poprzez przekształcenie używanych S9 w małe grzejniki pomocnicze.
  
short_bio: Współtwórca Attakaï i ekspert Mining
bio: |
  Mining ve bağlantılı cihazlar konusunda uzmanım, Bitcoin'daki yolumu evdeki Mining aracılığıyla buldum. Kullanılmış S9'ları küçük yardımcı ısıtıcılara dönüştürerek Mining'i mümkün olduğunca çok insan için demokratikleştirmeyi amaçlayan Attakai projesinin yaratıcısıyım.
  
short_bio: Attakaï'nin ortak yaratıcısı & Mining uzmanı
bio: |
  Impuguke muri Mining n'ibikoresho bihuye, nasanze inzira yanje muri Bitcoin biciye mu nzu Mining. Ndi umutanguzi w’umugambi wa Attakai, ugamije gutuma Mining igira demokarasi ku bantu benshi bishobotse mu guhindura S9s zakoreshejwe zikaba ibikoresho bitobito vy’ugushushanya.
  
short_bio: Umuremyi wa Attakaï & umuhinga Mining
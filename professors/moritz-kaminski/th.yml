bio: |
  ชื่อของฉันคือ Moritz ฉันสนับสนุนผู้ก่อตั้งและธุรกิจ Lightning Network ในการนำเทคโนโลยีนี้มาใช้
  
  ฉันสนใจในโครงการของทุกอุตสาหกรรมที่ใช้โปรโตคอล Bitcoin Lightning: โครงการที่เป็นฟรีและโอเพ่นซอร์ส, โครงการที่ทำลายแนวตั้งที่มีอยู่ด้วยความได้เปรียบที่ไม่เป็นธรรมของ Lightning และโครงการที่สร้างหมวดหมู่ใหม่และมีศักยภาพที่จะกลายเป็นธุรกิจชั้นนำในหมวดหมู่นั้น
  
  ฉันมีความหลงใหลในผู้ประกอบการและการแก้ปัญหาที่สำคัญร่วมกับทีม ฉันได้ให้ทุนธุรกิจและนั่งในบอร์ดตั้งแต่ seed ถึง Series A; ฉันได้บริหารทีม, จัดตั้งกระบวนการ, และระดมทุน
  
  ก่อนหน้านี้ ฉันทำงานเป็นผู้จัดการการลงทุนที่ Unternehmertum Venture Capital Partners ซึ่งเป็นบริษัทเงินร่วมลงทุนที่ลงทุนในสตาร์ทอัพเทคโนโลยีระยะเริ่มต้น จนถึงปัจจุบัน UVC Partners ได้ช่วยให้บริษัทมากกว่า 30 แห่งเปิดตัวและขยายธุรกิจของพวกเขา ฉันมีส่วนร่วมทั้งสองด้านของอุตสาหกรรมการลงทุน: ในฐานะนักลงทุนและผู้จัดการสตาร์ทอัพ ที่ Bosch Digital Solutions เราทำงานกับเทคโนโลยีแบบกระจายในการสร้างบล็อกสำหรับอธิปไตยดิจิทัลขององค์กร
  
  ในเวลาว่างฉันชอบวิ่ง, ใช้เวลากับกิจกรรมกลางแจ้ง และกินอาหารรสจัด ฉันยินดีเสมอที่จะพบปะผู้คนที่มีความหลงใหลในหัวข้อเหล่านี้เช่นกัน
short_bio: ฉันสนับสนุนผู้ก่อตั้งและธุรกิจ Lightning Network ในการนำเทคโนโลยีนี้มาใช้
bio: |
  Jina langu ni Moritz. Ninaunga mkono waanzilishi na biashara za Lightning Network katika kutumia teknolojia hii.
  
  Ninavutiwa na miradi ya wima zote za tasnia inayotumia itifaki ya Umeme ya Bitcoin: ambayo ni chanzo huria na huria, inayotatiza wima zilizopo kwa faida isiyo ya haki ya Umeme na inayounda kitengo kipya na inayo uwezo wa kuwa biashara zinazoongoza katika kitengo.
  
  Nina shauku juu ya ujasiriamali na kutatua shida ambazo ni muhimu pamoja na timu. Nimefadhili biashara na kukaa kwenye bodi kutoka seed hadi Series A; Nimeendesha timu, nimeanzisha michakato, na kukusanya pesa.
  
  Hapo awali, nilifanya kazi kama meneja wa uwekezaji katika Unternehmertum Venture Capital Partners, kampuni ya mtaji ambayo inawekeza katika uanzishaji wa teknolojia ya hatua za awali. Kufikia sasa, Washirika wa UVC wamesaidia zaidi ya kampuni 30 kuzindua na kuongeza biashara zao. Nilijishughulisha na pande zote mbili za tasnia ya ubia: kama mwekezaji na meneja wa kuanzisha. Katika Bosch Digital Solutions tulifanya kazi na teknolojia zilizogatuliwa kwenye vizuizi vya ujenzi wa uhuru wa kidijitali wa mashirika.
  
  Katika wakati wangu wa bure napenda kwenda mbio, kutumia muda kwenye shughuli za nje na kula chakula cha spicy. Daima huwa na furaha kukutana na watu wanaoshiriki shauku sawa kwa mada hizi.
  
short_bio: Ninaunga mkono waanzilishi na biashara za Lightning Network kutumia teknolojia hii
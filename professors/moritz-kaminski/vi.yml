bio: |
  Tôi tên là Moritz. Tôi hỗ trợ các nhà sáng lập và doanh nghiệp Lightning Network áp dụng công nghệ này.
  
  Tôi quan tâm đến các dự án thuộc mọi ngành dọc áp dụng giao thức Bitcoin Lightning: các dự án miễn phí và mã nguồn mở, các dự án phá vỡ các ngành dọc hiện có bằng lợi thế không công bằng của Lightning và các dự án tạo ra một danh mục mới và có tiềm năng trở thành doanh nghiệp dẫn đầu ngành.
  
  Tôi đam mê khởi nghiệp và cùng nhau giải quyết các vấn đề quan trọng. Tôi đã tài trợ cho các doanh nghiệp và tham gia hội đồng quản trị từ seed đến Series A; tôi đã điều hành các nhóm, thiết lập quy trình và gây quỹ.
  
  Trước đây, tôi từng làm quản lý đầu tư tại Unternehmertum Venture Capital Partners, một công ty đầu tư mạo hiểm chuyên đầu tư vào các công ty khởi nghiệp công nghệ giai đoạn đầu. Cho đến nay, UVC Partners đã hỗ trợ hơn 30 công ty khởi nghiệp và mở rộng quy mô kinh doanh. Tôi đã tham gia vào cả hai lĩnh vực của ngành công nghiệp khởi nghiệp: với tư cách là nhà đầu tư và quản lý khởi nghiệp. Tại Bosch Digital Solutions, chúng tôi đã làm việc với các công nghệ phi tập trung để xây dựng các nền tảng cho chủ quyền kỹ thuật số của các tổ chức.
  
  Vào thời gian rảnh rỗi, tôi thích chạy bộ, tham gia các hoạt động ngoài trời và thưởng thức đồ ăn cay. Tôi luôn vui mừng khi gặp gỡ những người có cùng niềm đam mê với những chủ đề này.
short_bio: Tôi ủng hộ những người sáng lập và doanh nghiệp Lightning Network áp dụng công nghệ này
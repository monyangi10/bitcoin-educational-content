bio: |
  Mitt navn er Moritz. Jeg støtter Lightning Network-grunnleggere og bedrifter i å ta i bruk denne teknologien.
  
  Jeg er interessert i prosjekter i alle bransjevertikaler som bruker Bitcoin Lightning-protokollen: de som er gratis og har åpen kildekode, de som forstyrrer eksisterende vertikaler med den urettferdige fordelen med Lightning, og de som skaper en ny kategori og har potensial til å bli kategoriledende virksomheter.
  
  Jeg brenner for entreprenørskap og for å løse viktige problemer sammen med et team. Jeg har finansiert bedrifter og sittet i styrer fra seed til Series A. Jeg har ledet team, satt opp prosesser og hentet inn penger.
  
  Tidligere jobbet jeg som investeringsforvalter hos Unternehmertum Venture Capital Partners, et venturekapitalselskap som investerer i nystartede teknologibedrifter i tidlig fase. Til dags dato har UVC Partners hjulpet mer enn 30 selskaper med å lansere og skalere virksomhetene sine. Jeg var engasjert på begge sider av venturebransjen: som investor og oppstartssjef. Hos Bosch Digital Solutions jobbet vi med desentraliserte teknologier som byggesteiner for organisasjoners digitale suverenitet.
  
  På fritiden liker jeg å løpe, drive med utendørsaktiviteter og spise krydret mat. Jeg er alltid glad for å møte mennesker som deler samme lidenskap for disse temaene.
  
short_bio: Jeg støtter Lightning Network-gründere og bedrifter i å ta i bruk denne teknologien
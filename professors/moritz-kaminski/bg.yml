bio: |
  Казвам се Мориц. Подкрепям основателите на Lightning Network и фирмите при внедряването на тази технология.
  
  Интересувам се от проекти от всички индустриални вертикали, прилагащи протокола Bitcoin Lightning: такива, които са безплатни и с отворен код, такива, които разрушават съществуващи вертикали с несправедливото предимство на Lightning, и такива, които създават нова категория и имат потенциала да се превърнат във водещи в категорията предприятия.
  
  Запален съм по предприемачеството и решаването на важни проблеми заедно с екип. Финансирал съм бизнеси и съм участвал в управителни съвети от seed до Серия А; ръководил съм екипи, създавал съм процеси и съм набирал средства.
  
  Преди това работих като инвестиционен мениджър в Unternehmertum Venture Capital Partners, компания за рисков капитал, която инвестира в технологични стартъпи в ранен етап. Към днешна дата UVC Partners е помогнала на повече от 30 компании да стартират и разширят бизнеса си. Участвах и от двете страни на рисковата индустрия: като инвеститор и мениджър на стартиращи предприятия. В Bosch Digital Solutions работихме с децентрализирани технологии върху градивните елементи за дигиталния суверенитет на организациите.
  
  В свободното си време обичам да тичам, да прекарвам време в дейности на открито и да ям пикантна храна. Винаги се радвам да срещна хора, които споделят подобна страст към тези теми.
  
short_bio: Подкрепям основателите на Lightning Network и предприятията при приемането на тази технология
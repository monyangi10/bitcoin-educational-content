bio: |
  Mein Name ist Moritz. Ich unterstütze Lightning Network-Gründer und Unternehmen bei der Einführung dieser Technologie.
  
  Ich interessiere mich für Projekte aus allen Branchen, die das Bitcoin Lightning-Protokoll anwenden: solche, die kostenlos und quelloffen sind, solche, die bestehende Branchen mit dem unfairen Vorteil von Lightning stören, und solche, die eine neue Kategorie schaffen und das Potenzial haben, in dieser Kategorie führend zu werden.
  
  Meine Leidenschaft gilt dem Unternehmertum und dem Lösen von Problemen, die von Bedeutung sind, zusammen mit einem Team. Ich habe Unternehmen finanziert und saß in Aufsichtsräten von seed bis Series A; ich habe Teams geleitet, Prozesse eingerichtet und Gelder beschafft.
  
  Zuvor arbeitete ich als Investment Manager bei Unternehmertum Venture Capital Partners, einer Risikokapitalgesellschaft, die in Technologie-Startups in der Frühphase investiert. Bis heute hat UVC Partners mehr als 30 Unternehmen bei der Gründung und dem Ausbau ihrer Geschäfte unterstützt. Ich war auf beiden Seiten der Venture-Industrie tätig: als Investor und als Startup-Manager. Bei Bosch Digital Solutions haben wir mit dezentralen Technologien an Bausteinen für die digitale Souveränität von Organisationen gearbeitet.
  
  In meiner Freizeit gehe ich gerne joggen, verbringe Zeit mit Outdoor-Aktivitäten und esse gerne scharfes Essen. Ich freue mich immer, wenn ich Menschen treffe, die eine ähnliche Leidenschaft für diese Themen teilen.
  
short_bio: Ich unterstütze Lightning Network-Gründer und Unternehmen bei der Einführung dieser Technologie
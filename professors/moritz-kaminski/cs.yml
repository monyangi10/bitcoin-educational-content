bio: |
  Jmenuji se Moritz. Podporuji zakladatele Lightning Network a podniky při zavádění této technologie.
  
  Zajímají mě projekty všech průmyslových vertikál, které používají protokol Bitcoin Lightning: ty, které jsou zdarma a mají otevřený zdrojový kód, ty, které narušují existující vertikály díky neférové výhodě Lightningu, a ty, které vytvářejí novou kategorii a mají potenciál stát se vedoucími podniky v dané kategorii.
  
  Jsem nadšenec do podnikání a do řešení důležitých problémů společně s týmem. Financoval jsem podniky a zasedal ve správních radách od seed až po Series A; vedl jsem týmy, nastavoval procesy a získával finanční prostředky.
  
  Dříve jsem pracoval jako investiční manažer ve společnosti Unternehmertum Venture Capital Partners, která investuje do technologických startupů v rané fázi vývoje. K dnešnímu dni společnost UVC Partners pomohla více než 30 společnostem zahájit a rozšířit jejich podnikání. Angažoval jsem se na obou stranách odvětví rizikového kapitálu: jako investor i manažer startupu. Ve společnosti Bosch Digital Solutions jsme pracovali s decentralizovanými technologiemi na stavebních blocích pro digitální suverenitu organizací.
  
  Ve volném čase rád běhám, věnuji se outdoorovým aktivitám a jím kořeněná jídla. Vždy se rád setkám s lidmi, kteří sdílejí podobnou vášeň pro tato témata.
  

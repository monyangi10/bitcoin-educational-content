bio: |
  Izina ryanje ni Moritz. Ndashigikiye abashinze Lightning Network n’abacuruzi mu kwemera ubu buhinga.
  
  Nkunda imigambi y’inzego zose z’inganda zikoresha umurongo wa Bitcoin Lightning: iyo ikoreshwa ku buntu kandi ifunguye, iyo ihungabanya inzego zisanzwe zihari n’akarusho kadatunganye ka Lightning n’iyo irema urutonde rushasha kandi ifise ubushobozi bwo kuba ubucuruzi burongoye urutonde.
  
  Nkunda cane gukora ubudandaji no gutorera umuti ingorane zihambaye ndi kumwe n’umugwi. Narafashije mu vy’ubudandaji kandi nicara ku nama kuva kuri seed gushika kuri Series A; Narongoye amashirahamwe, nshingaho uburyo bwo kubikora, kandi nkoranya amahera.
  
  Mbere, nakora nk’umuyobozi w’ishoramari muri Unternehmertum Venture Capital Partners, ishirahamwe ry’ishoramari ry’ishoramari mu bikorwa vy’ubuhinga bwa none. Kugeza ubu, UVC Partners yarafashije amashirahamwe arenga 30 gutanguza no gutera imbere mu bucuruzi bwayo. Nari nkora ku mpande zompi z’ubuhinga bwo gukora ibikorwa vy’ubuhinga: nk’umushoramari n’umuyobozi w’ibikorwa vy’ubuhinga. Muri Bosch Digital Solutions twakoranye n’ubuhinga bushasha ku bijanye n’ibintu vy’inyubako vy’ubusegaba bw’imiryango.
  
  Mu gihe c’uburuhukiro ndakunda kuja kwiruka, nkamara umwanya mu bikorwa vyo hanze no kurya ivyokurya birunze. Nkama nshima no guhura n’abantu basangiye urukundo nk’urwo ku bijanye n’izo nsiguro.
  
short_bio: Ndashigikiye abashinze Lightning Network n'abacuruzi mu kwemera ubu buhinga
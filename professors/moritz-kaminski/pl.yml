bio: |
  Nazywam się Moritz. Wspieram założycieli Lightning Network i firmy we wdrażaniu tej technologii.
  
  Interesują mnie projekty ze wszystkich branż stosujące protokół Bitcoin Lightning: te, które są bezpłatne i open source, te, które zakłócają istniejące branże dzięki nieuczciwej przewadze Lightning oraz te, które tworzą nową kategorię i mają potencjał, aby stać się wiodącymi firmami w swojej kategorii.
  
  Jestem pasjonatem przedsiębiorczości i rozwiązywania problemów, które mają znaczenie wraz z zespołem. Finansowałem firmy i zasiadałem w zarządach od seed do serii A; prowadziłem zespoły, konfigurowałem procesy i pozyskiwałem fundusze.
  
  Wcześniej pracowałem jako menedżer inwestycyjny w Unternehmertum Venture Capital Partners, firmie venture capital, która inwestuje w startupy technologiczne na wczesnym etapie rozwoju. Do tej pory UVC Partners pomogło ponad 30 firmom w uruchomieniu i skalowaniu ich działalności. Byłem zaangażowany po obu stronach branży venture: jako inwestor i menedżer startupu. W Bosch Digital Solutions pracowaliśmy ze zdecentralizowanymi technologiami nad elementami składowymi cyfrowej suwerenności organizacji.
  
  W wolnym czasie lubię biegać, spędzać czas na świeżym powietrzu i jeść pikantne jedzenie. Zawsze chętnie poznaję ludzi, którzy dzielą podobną pasję do tych tematów.
  

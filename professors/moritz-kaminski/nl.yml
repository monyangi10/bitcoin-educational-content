bio: |
  Mijn naam is Moritz. Ik ondersteun Lightning Network oprichters en bedrijven bij het adopteren van deze technologie.
  
  Ik ben geïnteresseerd in projecten uit alle bedrijfstakken die het Bitcoin Lightning-protocol toepassen: projecten die gratis en open source zijn, projecten die bestaande bedrijfstakken verstoren met het oneerlijke voordeel van Lightning en projecten die een nieuwe categorie creëren en het potentieel hebben om toonaangevende bedrijven te worden.
  
  Ik ben gepassioneerd door ondernemerschap en het samen met een team oplossen van problemen die er toe doen. Ik heb bedrijven gefinancierd en in besturen gezeten van seed tot Series A; ik heb teams geleid, processen opgezet en fondsen geworven.
  
  Daarvoor werkte ik als investeringsmanager bij Unternehmertum Venture Capital Partners, een durfkapitaalbedrijf dat investeert in startende technologiebedrijven in een vroeg stadium. Tot op heden heeft UVC Partners meer dan 30 bedrijven geholpen bij het opstarten en opschalen van hun bedrijf. Ik was betrokken bij beide kanten van de venture-industrie: als investeerder en als startupmanager. Bij Bosch Digital Solutions werkten we met gedecentraliseerde technologieën aan bouwstenen voor de digitale soevereiniteit van organisaties.
  
  In mijn vrije tijd houd ik van hardlopen, buitenactiviteiten en pittig eten. Ik ben altijd blij om mensen te ontmoeten met dezelfde passie voor deze onderwerpen.
  
short_bio: Ik steun Lightning Network oprichters en bedrijven bij het adopteren van deze technologie
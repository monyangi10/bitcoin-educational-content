bio: |
  제 이름은 모리츠입니다. 저는 Lightning Network 창립자와 기업이 이 기술을 채택하는 것을 지원합니다.
  
  저는 무료 오픈 소스인 프로젝트, 라이트닝의 불공정한 이점으로 기존 업계를 파괴하는 프로젝트, 새로운 카테고리를 창출하고 카테고리를 선도하는 비즈니스가 될 가능성이 있는 프로젝트 등 Bitcoin 라이트닝 프로토콜을 적용하는 모든 산업 분야의 프로젝트에 관심이 있습니다.
  
  저는 기업가 정신과 팀과 함께 중요한 문제를 해결하는 것에 열정을 가지고 있습니다. 저는 seed부터 시리즈 A까지 비즈니스에 자금을 조달하고 이사회에 참여했으며, 팀을 운영하고 프로세스를 설정하고 자금을 조달했습니다.
  
  이전에는 초기 단계의 기술 스타트업에 투자하는 벤처 캐피털 회사인 Unternehmertum Venture Capital Partners에서 투자 매니저로 일했습니다. 현재까지 UVC 파트너스는 30개 이상의 기업이 비즈니스를 시작하고 확장하는 데 도움을 주었습니다. 저는 투자자와 스타트업 매니저로서 벤처 업계의 양쪽에서 활동했습니다. 보쉬 디지털 솔루션에서는 조직의 디지털 주권을 위한 빌딩 블록에 탈중앙화 기술을 적용하는 작업을 했습니다.
  
  여가 시간에는 달리기, 야외 활동, 매운 음식 먹기를 좋아합니다. 이러한 주제에 대해 비슷한 열정을 가진 사람들을 만나면 항상 행복합니다.
  
short_bio: Lightning Network 창업자 및 기업이 이 기술을 채택하는 것을 지원합니다
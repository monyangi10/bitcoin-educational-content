bio: |
  Me llamo Moritz. Apoyo a los fundadores y empresas de Lightning Network en la adopción de esta tecnología.
  
  Me interesan los proyectos de todos los sectores verticales que aplican el protocolo Bitcoin Lightning: los que son gratuitos y de código abierto, los que perturban los sectores verticales existentes con la ventaja desleal de Lightning y los que crean una nueva categoría y tienen potencial para convertirse en empresas líderes de su categoría.
  
  Me apasiona el espíritu empresarial y resolver problemas importantes junto con un equipo. He financiado empresas y formado parte de consejos de administración desde seed hasta Series A; he dirigido equipos, establecido procesos y recaudado fondos.
  
  Anteriormente, trabajé como gestor de inversiones en Unternehmertum Venture Capital Partners, una empresa de capital riesgo que invierte en startups tecnológicas en fase inicial. Hasta la fecha, UVC Partners ha ayudado a más de 30 empresas a lanzar y ampliar sus negocios. Participé en ambos lados del sector del capital riesgo: como inversor y como gestor de startups. En Bosch Digital Solutions trabajamos con tecnologías descentralizadas en bloques de construcción para la soberanía digital de las organizaciones.
  
  En mi tiempo libre me gusta salir a correr, dedicar tiempo a actividades al aire libre y comer comida picante. Siempre me alegra conocer gente que comparta una pasión similar por estos temas.
  
short_bio: Apoyo a los fundadores y empresas de Lightning Network para que adopten esta tecnología
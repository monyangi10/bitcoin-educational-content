bio: |
  Minu nimi on Moritz. Ma toetan Lightning Network asutajad ja ettevõtted selle tehnoloogia kasutuselevõtmisel.
  
  Olen huvitatud kõikide valdkondade projektidest, mis rakendavad Bitcoin Lightning-protokolli: need, mis on tasuta ja avatud lähtekoodiga, need, mis häirivad olemasolevaid vertikaalseid valdkondi Lightningi ebaõiglase eelise abil, ja need, mis loovad uue kategooria ja millel on potentsiaal saada kategooria juhtivateks ettevõteteks.
  
  Olen kirglik ettevõtluse ja meeskonnaga koos oluliste probleemide lahendamise vastu. Olen rahastanud ettevõtteid ja istunud juhatustes alates seed-st kuni A-seeriateni; olen juhtinud meeskondi, loonud protsesse ja kaasanud vahendeid.
  
  Varem töötasin investeerimisjuhina ettevõtetes Unternehmertum Venture Capital Partners, mis on riskikapitaliettevõte, mis investeerib varajase faasi tehnoloogiaettevõtetesse. Praeguseks on UVC Partners aidanud rohkem kui 30 ettevõttel käivitada ja laiendada oma tegevust. Olin tegev mõlemal pool riskikapitalitööstust: investori ja idufirmade juhina. Bosch Digital Solutionsis töötasime detsentraliseeritud tehnoloogiatega organisatsioonide digitaalse suveräänsuse ehitusplokkide kallal.
  
  Vabal ajal meeldib mulle jooksmine, vaba aja veetmine ja vürtsika toidu söömine. Mul on alati hea meel kohtuda inimestega, kes jagavad sarnast kirge nende teemade vastu.
  

bio: |
  Nama saya Moritz. Saya mendukung para pendiri dan bisnis Lightning Network dalam mengadopsi teknologi ini.
  
  Saya tertarik dengan proyek-proyek dari semua vertikal industri yang menerapkan protokol Bitcoin Lightning: yang gratis dan open source, yang mengganggu vertikal yang sudah ada dengan keuntungan yang tidak adil dari Lightning, dan yang menciptakan kategori baru dan memiliki potensi untuk menjadi bisnis yang terdepan dalam kategori tersebut.
  
  Saya sangat tertarik dengan kewirausahaan dan memecahkan masalah yang penting bersama tim. Saya telah membiayai bisnis dan duduk di dewan direksi dari seed hingga Seri A; saya telah menjalankan tim, mengatur proses, dan mengumpulkan dana.
  
  Sebelumnya, saya bekerja sebagai manajer investasi di Unternehmertum Venture Capital Partners, sebuah perusahaan modal ventura yang berinvestasi di perusahaan rintisan teknologi tahap awal. Hingga saat ini, UVC Partners telah membantu lebih dari 30 perusahaan meluncurkan dan mengembangkan bisnis mereka. Saya terlibat di kedua sisi industri ventura: sebagai investor dan manajer startup. Di Bosch Digital Solutions, kami bekerja dengan teknologi terdesentralisasi untuk membangun blok bangunan bagi kedaulatan digital organisasi.
  
  Di waktu luang saya, saya suka berlari, menghabiskan waktu untuk kegiatan di luar ruangan, dan makan makanan pedas. Saya selalu senang bertemu dengan orang-orang yang memiliki minat yang sama terhadap topik-topik ini.
  
short_bio: Saya mendukung para pendiri dan bisnis Lightning Network dalam mengadopsi teknologi ini
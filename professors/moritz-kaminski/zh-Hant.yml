bio: |
  我的名字是 Moritz。我支持 Lightning Network 創始人和企業採用這項技術。
  
  我對應用 Bitcoin Lightning 協定的所有行業垂直項目都感興趣：免費開放源碼的項目、利用 Lightning 的不公平優勢顛覆現有垂直行業的項目，以及創造新類別並有潛力成為領導類別企業的項目。
  
  我熱衷於創業和與團隊一起解決重要的問題。從 seed 到 A 系列，我都曾為企業提供資金，並擔任過董事會成員；我曾經經營運團隊、設立流程以及募集資金。
  
  在此之前，我在 Unternehmertum Venture Capital Partners 擔任投資經理，這是一家投資於早期科技創業公司的風險投資公司。到目前為止，UVC Partners 已經幫助超過 30 家公司啟動和擴大業務規模。我在創投產業的兩邊都有參與：身為投資人和創業公司經理人。在 Bosch Digital Solutions，我們與分散式技術合作，為組織的數位主權提供建置區塊。
  
  空閒時，我喜歡跑步、戶外活動和吃辣。我很樂意認識對這些主題有相同熱情的人。
  
short_bio: 我支持 Lightning Network 創辦人和企業採用這項技術
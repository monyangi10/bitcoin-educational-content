bio: |
  Меня зовут Мориц. Я поддерживаю основателей и компании Lightning Network в освоении этой технологии.
  
  Меня интересуют проекты всех отраслевых вертикалей, применяющие протокол Bitcoin Lightning: свободные и с открытым исходным кодом, те, которые разрушают существующие вертикали благодаря несправедливому преимуществу Lightning, и те, которые создают новую категорию и имеют потенциал стать ведущими предприятиями категории.
  
  Я страстно люблю предпринимательство и решение важных проблем вместе с командой. Я финансировал компании и входил в советы директоров от seed до серии А; я руководил командами, налаживал процессы и привлекал средства.
  
  Ранее я работал менеджером по инвестициям в Unternehmertum Venture Capital Partners, венчурной компании, инвестирующей в технологические стартапы ранних стадий. На сегодняшний день UVC Partners помогла более чем 30 компаниям запустить и расширить свой бизнес. Я участвовал в обеих сторонах венчурной индустрии: как инвестор и как руководитель стартапа. В компании Bosch Digital Solutions мы работали с децентрализованными технологиями над созданием блоков для цифрового суверенитета организаций.
  
  В свободное время я люблю бегать, проводить время на свежем воздухе и есть острую пищу. Я всегда рад встретить людей, которые разделяют страсть к этим темам.
  
short_bio: Я поддерживаю основателей и предприятия Lightning Network в освоении этой технологии
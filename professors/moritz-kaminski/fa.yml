bio: |
  نام من موریس است. من از بنیان‌گذاران و کسب‌وکارهای Lightning Network در پذیرش این فناوری حمایت می‌کنم.
  
  من به پروژه‌های تمام صنایع که از پروتکل Bitcoin Lightning استفاده می‌کنند علاقه‌مندم: پروژه‌هایی که رایگان و منبع باز هستند، پروژه‌هایی که با استفاده از مزیت ناعادلانه Lightning صنایع موجود را مختل می‌کنند و پروژه‌هایی که یک دسته جدید ایجاد می‌کنند و پتانسیل تبدیل شدن به کسب‌وکارهای پیشرو در دسته خود را دارند.
  
  من به کارآفرینی و حل مشکلات مهم به همراه یک تیم علاقه‌مندم. من کسب‌وکارها را تأمین مالی کرده‌ام و در هیئت‌مدیره‌ها از seed تا سری A حضور داشته‌ام؛ تیم‌ها را مدیریت کرده‌ام، فرآیندها را راه‌اندازی کرده‌ام و سرمایه جمع‌آوری کرده‌ام.
  
  قبلاً به عنوان مدیر سرمایه‌گذاری در Unternehmertum Venture Capital Partners، یک شرکت سرمایه‌گذاری خطرپذیر که در استارتاپ‌های فناوری در مراحل اولیه سرمایه‌گذاری می‌کند، کار کرده‌ام. تا به امروز، UVC Partners به بیش از 30 شرکت کمک کرده است تا کسب‌وکارهای خود را راه‌اندازی و مقیاس‌پذیر کنند. من در هر دو طرف صنعت سرمایه‌گذاری خطرپذیر مشغول بوده‌ام: به عنوان سرمایه‌گذار و مدیر استارتاپ. در Bosch Digital Solutions با فناوری‌های غیرمتمرکز بر روی بلوک‌های سازنده برای حاکمیت دیجیتال سازمان‌ها کار کردیم.
  
  در اوقات فراغت خود دوست دارم بدوم، به فعالیت‌های بیرون از خانه بپردازم و غذای تند بخورم. همیشه خوشحال می‌شوم با افرادی که علاقه مشابهی به این موضوعات دارند ملاقات کنم.
short_bio: من از بنیان‌گذاران و کسب‌وکارهای Lightning Network در پذیرش این فناوری حمایت می‌کنم.
bio: |
  Je m'appelle Moritz. J'aide les fondateurs et les entreprises de Lightning Network à adopter cette technologie.
  
  Je suis intéressé par les projets de tous les secteurs d'activité qui appliquent le protocole Bitcoin Lightning : ceux qui sont gratuits et open source, ceux qui perturbent les secteurs d'activité existants grâce à l'avantage injuste de Lightning et ceux qui créent une nouvelle catégorie et ont le potentiel de devenir des entreprises leaders dans leur catégorie.
  
  Je suis passionné par l'esprit d'entreprise et par la résolution de problèmes importants en équipe. J'ai financé des entreprises et siégé dans des conseils d'administration depuis le seed jusqu'à la série A ; j'ai dirigé des équipes, mis en place des processus et levé des fonds.
  
  Auparavant, j'ai travaillé comme gestionnaire d'investissement chez Unternehmertum Venture Capital Partners, une société de capital-risque qui investit dans des start-ups technologiques en phase de démarrage. À ce jour, UVC Partners a aidé plus de 30 entreprises à lancer et à développer leurs activités. J'ai été impliqué des deux côtés de l'industrie du capital-risque : en tant qu'investisseur et gestionnaire de startups. Chez Bosch Digital Solutions, nous avons travaillé avec des technologies décentralisées sur des blocs de construction pour la souveraineté numérique des organisations.
  
  Pendant mon temps libre, j'aime courir, faire des activités de plein air et manger des plats épicés. Je suis toujours heureux de rencontrer des personnes qui partagent la même passion pour ces sujets.
  
short_bio: Je soutiens les fondateurs et les entreprises de Lightning Network dans l'adoption de cette technologie
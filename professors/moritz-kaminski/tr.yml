bio: |
  Benim adım Moritz. Lightning Network kurucularını ve işletmelerini bu teknolojiyi benimsemeleri konusunda destekliyorum.
  
  Bitcoin Lightning protokolünü uygulayan tüm sektör dikeylerindeki projelerle ilgileniyorum: ücretsiz ve açık kaynaklı olanlar, Lightning'in haksız avantajıyla mevcut dikeyleri bozanlar ve yeni bir kategori yaratan ve kategori lideri işletmeler olma potansiyeline sahip olanlar.
  
  Girişimcilik ve bir ekiple birlikte önemli sorunları çözme konusunda tutkuluyum. seed'den Seri A'ya kadar işletmeleri finanse ettim ve yönetim kurullarında yer aldım; ekipler çalıştırdım, süreçler kurdum ve fon topladım.
  
  Daha önce, erken aşama teknoloji girişimlerine yatırım yapan bir girişim sermayesi şirketi olan Unternehmertum Venture Capital Partners'da yatırım yöneticisi olarak çalıştım. UVC Partners bugüne kadar 30'dan fazla şirketin işlerini başlatmasına ve ölçeklendirmesine yardımcı oldu. Girişim endüstrisinin her iki tarafında da yer aldım: yatırımcı ve startup yöneticisi olarak. Bosch Dijital Çözümler'de, kuruluşların dijital egemenliği için yapı taşları üzerinde merkezi olmayan teknolojilerle çalıştık.
  
  Boş zamanlarımda koşmayı, açık hava etkinliklerinde vakit geçirmeyi ve baharatlı yemekler yemeyi seviyorum. Bu konularda benzer tutkuları paylaşan insanlarla tanışmaktan her zaman mutluluk duyuyorum.
  
short_bio: Lightning Network kurucularını ve işletmelerini bu teknolojiyi benimsemeleri konusunda destekliyorum
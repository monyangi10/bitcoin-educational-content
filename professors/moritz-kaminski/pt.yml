bio: |
  O meu nome é Moritz. Apoio os fundadores e as empresas da Lightning Network na adoção desta tecnologia.
  
  Estou interessado em projectos de todas as verticais da indústria que apliquem o protocolo Bitcoin Lightning: os que são gratuitos e de código aberto, os que perturbam as verticais existentes com a vantagem injusta do Lightning e os que criam uma nova categoria e têm o potencial de se tornarem empresas líderes na categoria.
  
  Sou apaixonado pelo espírito empresarial e pela resolução de problemas importantes em conjunto com uma equipa. Financiei empresas e fiz parte de conselhos de administração desde o seed até à Série A; dirigi equipas, criei processos e angariei fundos.
  
  Anteriormente, trabalhei como gestor de investimentos na Unternehmertum Venture Capital Partners, uma empresa de capital de risco que investe em startups tecnológicas em fase inicial. Até à data, a UVC Partners ajudou mais de 30 empresas a lançar e a expandir os seus negócios. Estive envolvido em ambos os lados da indústria de capital de risco: como investidor e gestor de start-ups. Na Bosch Digital Solutions, trabalhámos com tecnologias descentralizadas em blocos de construção para a soberania digital das organizações.
  
  Nos meus tempos livres, gosto de correr, fazer actividades ao ar livre e comer comida picante. Fico sempre feliz por conhecer pessoas que partilham a mesma paixão por estes temas.
  
short_bio: Apoio os fundadores e as empresas do Lightning Network na adoção desta tecnologia
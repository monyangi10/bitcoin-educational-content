bio: |
  मेरा नाम मोरिट्ज़ है। मैं Lightning Network के संस्थापकों और व्यवसायों को इस तकनीक को अपनाने में सहयोग करता हूँ।
  
  मुझे Bitcoin लाइटनिंग प्रोटोकॉल लागू करने वाले सभी उद्योग क्षेत्रों की परियोजनाओं में रुचि है: वे जो मुफ़्त और ओपन सोर्स हैं, वे जो लाइटनिंग के अनुचित लाभ से मौजूदा क्षेत्रों में बदलाव लाती हैं और वे जो एक नई श्रेणी बनाती हैं और श्रेणी में अग्रणी व्यवसाय बनने की क्षमता रखती हैं।
  
  मुझे उद्यमिता और एक टीम के साथ मिलकर महत्वपूर्ण समस्याओं का समाधान करने का जुनून है। मैंने seed से लेकर सीरीज़ A तक के व्यवसायों को वित्तपोषित किया है और बोर्ड में शामिल रहा हूँ; मैंने टीमों का संचालन किया है, प्रक्रियाएँ स्थापित की हैं और धन जुटाया है।
  
  इससे पहले, मैंने Unternehmertum Venture Capital Partners में एक निवेश प्रबंधक के रूप में काम किया था, जो एक उद्यम पूंजी फर्म है जो शुरुआती चरण के तकनीकी स्टार्टअप में निवेश करती है। आज तक, UVC पार्टनर्स ने 30 से ज़्यादा कंपनियों को अपने व्यवसाय शुरू करने और उनका विस्तार करने में मदद की है। मैं उद्यम उद्योग के दोनों पक्षों से जुड़ा रहा हूँ: एक निवेशक और स्टार्टअप प्रबंधक के रूप में। Bosch Digital Solutions में हमने संगठनों की डिजिटल संप्रभुता के लिए विकेन्द्रीकृत तकनीकों के साथ काम किया है।
  
  अपने खाली समय में मुझे दौड़ना, बाहरी गतिविधियाँ करना और मसालेदार खाना पसंद है। मुझे ऐसे लोगों से मिलकर हमेशा खुशी होती है जो इन विषयों में समान रुचि रखते हैं।
  
short_bio: मैं Lightning Network के संस्थापकों और व्यवसायों को इस तकनीक को अपनाने में समर्थन देता हूँ
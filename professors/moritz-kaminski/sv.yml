bio: |
  Mitt namn är Moritz. Jag stöder Lightning Network-grundare och företag i att anta denna teknik.
  
  Jag är intresserad av projekt inom alla branschvertikaler som tillämpar Bitcoin Lightning-protokollet: de som är gratis och har öppen källkod, de som stör befintliga vertikaler med den orättvisa fördelen med Lightning och de som skapar en ny kategori och har potential att bli kategoriledande företag.
  
  Jag brinner för entreprenörskap och att lösa problem som spelar roll tillsammans med ett team. Jag har finansierat företag och suttit i styrelser från seed till Series A; jag har drivit team, satt upp processer och rest kapital.
  
  Tidigare arbetade jag som investment manager på Unternehmertum Venture Capital Partners, ett riskkapitalbolag som investerar i nystartade teknikföretag i tidiga skeden. Hittills har UVC Partners hjälpt mer än 30 företag att lansera och skala upp sina verksamheter. Jag var engagerad på båda sidor av ventureindustrin: som investerare och startup-chef. På Bosch Digital Solutions arbetade vi med decentraliserad teknik och byggstenar för organisationers digitala suveränitet.
  
  På fritiden gillar jag att springa, ägna tid åt utomhusaktiviteter och äta kryddstark mat. Jag är alltid glad över att träffa människor som delar samma passion för dessa ämnen.
  
short_bio: Jag stöder Lightning Network-grundare och företag i att anta denna teknik
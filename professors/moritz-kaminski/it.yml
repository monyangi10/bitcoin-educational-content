bio: |
  Mi chiamo Moritz. Sostengo i fondatori e le aziende di Lightning Network nell'adozione di questa tecnologia.
  
  Sono interessato a progetti di tutti i settori verticali che applicano il protocollo Bitcoin Lightning: quelli che sono gratuiti e open source, quelli che sconvolgono i settori verticali esistenti con il vantaggio sleale di Lightning e quelli che creano una nuova categoria e hanno il potenziale per diventare aziende leader di categoria.
  
  Sono appassionato di imprenditoria e di risolvere problemi importanti insieme a un team. Ho finanziato aziende e fatto parte di consigli di amministrazione da seed a Series A; ho gestito team, impostato processi e raccolto fondi.
  
  In precedenza, ho lavorato come responsabile degli investimenti presso Unternehmertum Venture Capital Partners, una società di venture capital che investe in startup tecnologiche in fase iniziale. Ad oggi, UVC Partners ha aiutato più di 30 aziende a lanciare e scalare le loro attività. Sono stato impegnato su entrambi i fronti del settore del venture: come investitore e gestore di startup. In Bosch Digital Solutions abbiamo lavorato con le tecnologie decentralizzate per creare i blocchi per la sovranità digitale delle organizzazioni.
  
  Nel tempo libero mi piace andare a correre, fare attività all'aria aperta e mangiare cibi piccanti. Sono sempre felice di incontrare persone che condividono la stessa passione per questi argomenti.
  
short_bio: Sostengo i fondatori e le aziende di Lightning Network nell'adozione di questa tecnologia
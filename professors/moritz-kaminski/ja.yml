bio: |
  私の名前はモーリッツです。私はLightning Networkの創設者や企業がこの技術を採用するのをサポートしています。
  
  私は、Bitcoin Lightningプロトコルを応用したあらゆる業種のプロジェクトに興味があります。フリーでオープンソースのもの、Lightningの不当な優位性によって既存の業種を破壊するもの、新しいカテゴリーを創造し、カテゴリーをリードするビジネスになる可能性のあるものなどです。
  
  私は起業家精神と、チームとともに重要な問題を解決することに情熱を注いでいます。私は、seedからシリーズAまで、事業に融資し、取締役会のメンバーとして、チームを運営し、プロセスを設定し、資金を調達してきました。
  
  以前は、アーリーステージの技術系新興企業に投資するベンチャーキャピタル、ウンターネマートゥム・ベンチャー・キャピタル・パートナーズで投資マネージャーを務めていました。現在までに、UVCパートナーズは30社以上の企業の立ち上げと事業拡大を支援してきました。私は投資家として、また新興企業の経営者として、ベンチャー業界の両側面に携わってきました。ボッシュ・デジタル・ソリューションズでは、分散型テクノロジーを使って、組織のデジタル主権を実現するためのビルディング・ブロックに取り組みました。
  
  趣味はランニング、アウトドア、辛いものを食べることです。このようなトピックに同じような情熱を持つ人々と出会えることを、私はいつも嬉しく思っています。
  
short_bio: Lightning Networkの創設者や企業がこの技術を採用することを支援する
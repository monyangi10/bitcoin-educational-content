bio: |
  我叫莫里茨。我支持 Lightning Network 创始人和企业采用这项技术。
  
  我对所有应用 Bitcoin Lightning 协议的垂直行业项目都感兴趣：免费开源的项目、利用 Lightning 的不公平优势颠覆现有垂直行业的项目，以及开创一个新类别并有可能成为该类别领先企业的项目。
  
  我热衷于创业和与团队一起解决重要问题。从 seed 到 A 轮融资，我都为企业提供过资金，并担任过董事会成员；我经营过团队，建立过流程，也筹集过资金。
  
  此前，我在 Unternehmertum Venture Capital Partners 担任投资经理，这是一家投资早期技术初创企业的风险投资公司。迄今为止，UVC Partners 已帮助 30 多家公司启动并扩大了业务规模。我既是投资人，也是初创企业的管理者。在博世数字解决方案公司（Bosch Digital Solutions），我们利用去中心化技术为组织的数字主权提供构建模块。
  
  闲暇时，我喜欢跑步、户外活动和吃辣。我总是乐于结识对这些话题有着同样热情的人。
  
short_bio: 我支持 Lightning Network 创始人和企业采用这项技术
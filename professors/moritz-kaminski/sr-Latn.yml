bio: |
  Moje ime je Moritz. Podržavam osnivače i preduzeća Lightning Network u usvajanju ove tehnologije.
  
  Zainteresovan sam za projekte iz svih industrijskih vertikala koji primenjuju Bitcoin Lightning protokol: one koji su besplatni i otvorenog koda, one koji remete postojeće vertikale sa nepravednom prednošću Lightning-a i one koji stvaraju novu kategoriju i imaju potencijal da postanu vodeći poslovi u kategoriji.
  
  Strastven sam prema preduzetništvu i rešavanju problema koji su važni zajedno sa timom. Finansirao sam preduzeća i bio član odbora od seed do Serije A; vodio sam timove, postavljao procese i prikupljao sredstva.
  
  Prethodno sam radio kao menadžer investicija u Unternehmertum Venture Capital Partners, firmi rizičnog kapitala koja ulaže u tehnološke startape u ranoj fazi. Do danas, UVC Partners je pomogao više od 30 kompanija da pokrenu i skaliraju svoje poslovanje. Bio sam angažovan na obe strane industrije rizičnog kapitala: kao investitor i menadžer startapa. U Bosch Digital Solutions radili smo sa decentralizovanim tehnologijama na izgradnji blokova za digitalni suverenitet organizacija.
  
  U slobodno vreme volim da trčim, provodim vreme u aktivnostima na otvorenom i jedem ljutu hranu. Uvek sam srećan da upoznam ljude koji dele sličnu strast prema ovim temama.
short_bio: Podržavam osnivače i preduzeća Lightning Network u usvajanju ove tehnologije.
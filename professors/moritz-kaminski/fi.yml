bio: |
  Nimeni on Moritz. Tuen Lightning Network:n perustajia ja yrityksiä tämän teknologian käyttöönotossa.
  
  Olen kiinnostunut Bitcoin Lightning -protokollaa soveltavista hankkeista kaikilla toimialoilla: hankkeista, jotka ovat ilmaisia ja avoimen lähdekoodin hankkeita, hankkeista, jotka häiritsevät nykyisiä toimialoja Lightningin epäreilun edun avulla, ja hankkeista, jotka luovat uuden kategorian ja joilla on potentiaalia tulla kategorian johtaviksi yrityksiksi.
  
  Olen innostunut yrittäjyydestä ja tärkeiden ongelmien ratkaisemisesta yhdessä tiimin kanssa. Olen rahoittanut yrityksiä ja istunut hallituksissa seed:sta A-sarjaan; olen johtanut tiimejä, luonut prosesseja ja hankkinut varoja.
  
  Aiemmin työskentelin sijoitusjohtajana Unternehmertum Venture Capital Partnersissa, joka on varhaisen vaiheen teknologia-alan startup-yrityksiin sijoittava pääomasijoitusyhtiö. Tähän mennessä UVC Partners on auttanut yli 30 yritystä käynnistämään ja laajentamaan liiketoimintaansa. Olin mukana pääomasijoitustoimialan molemmilla puolilla: sijoittajana ja startup-yritysten johtajana. Bosch Digital Solutionsissa työskentelimme hajautettujen teknologioiden kanssa organisaatioiden digitaalisen suvereniteetin rakennuspalikoilla.
  
  Vapaa-ajallani tykkään juosta, viettää aikaa ulkoilun parissa ja syödä mausteista ruokaa. Olen aina iloinen tavatessani ihmisiä, jotka jakavat samanlaisen intohimon näitä aiheita kohtaan.
  
short_bio: Tuen Lightning Network:n perustajia ja yrityksiä tämän teknologian käyttöönotossa
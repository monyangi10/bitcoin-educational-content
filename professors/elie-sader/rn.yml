bio: |
  Mu myaka irenga 20 nkora imihora y’ubuhinga buhambaye, narabonye ubwanje gukoresha ubuhinga bushasha n’ukuntu amategeko yuguruye asumba ayandi n’ingaruka zayo. Ndatahura ingorane zo kwubaka ibintu bishasha, ubuhinga bushasha bwo gukora ubucuruzi n’imiti hamwe no kwamamaza isoko n’abaguzi. Part time buisness angel mfasha amashirahamwe kuzana ubuhinga bushasha kw’isoko. Natanguje Network Effect kugira ngo mfashe amashirahamwe gutahura agaciro Bitcoin ishobora kubazanira, hamwe no gusobanura ingene yokoreshwa ku bwoko bwose bw’ubudandaji nyamukuru. Iryo shirahamwe rya Bitcoin ni umurongo w’ibarabara ry’agaciro kanini cane Exchange kandi amategeko ya Layer 2 nk’aya Lightning ntazohungabanya cane abahuza n’imiterere y’amahera gusa, ariko kandi azozana igihe c’ubuhinga bushasha bw’ubudandaji bukomeye kandi bubaha ubuzima bwite bw’umuntu ku giti ciwe.
  
short_bio: Amashirahamwe yose ya internet azoba amashirahamwe ya Bitcoin, turi hano kugira ngo dufashe
bio: |
  Met meer dan 20 jaar ervaring in het implementeren van mission-critical netwerken met lage latency heb ik uit eerste hand de inzet van nieuwe technologieën en de superioriteit van open standaardprotocollen met hun netwerkeffecten ervaren. Ik begrijp de uitdagingen van het bouwen van nieuwe producten, nieuwe bedrijfsmodellen en oplossingen, evenals het evangeliseren van de markt en klanten. Als parttime business angel help ik bedrijven om innovatieve technologie op de markt te brengen. Ik heb Network Effect gelanceerd om bedrijven te helpen begrijpen welke waarde Bitcoin hen kan bieden en om praktische use cases voor allerlei kernactiviteiten te beschrijven. Het Bitcoin netwerk is een waardevol Exchange spoor en Layer 2 protocollen zoals Lightning zullen niet alleen tussenpersonen en vergoedingsstructuren grondig verstoren, maar ook een tijdperk inluiden van nieuwe bedrijfsmodellen die krachtiger zijn en de privacy van het individu meer respecteren.
  
short_bio: Alle internetbedrijven worden Bitcoin bedrijven, wij zijn er om te helpen
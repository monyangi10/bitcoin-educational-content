bio: |
  С повече от 20 години внедряване на критични мрежи с ниска латентност съм се сблъскал от първа ръка с внедряването на нови технологии и превъзходството на отворените стандартни протоколи с техните мрежови ефекти. Разбирам предизвикателствата на изграждането на нови продукти, нови бизнес модели и решения, както и на популяризирането на пазара и клиентите. На непълно работно време помагам на компаниите да въвеждат иновативни технологии на пазара. Стартирах Network Effect, за да помогна на компаниите да разберат стойността, която Bitcoin може да им донесе, както и да изложа практически случаи на използване за всички видове основни бизнеси. Мрежата на Bitcoin е свръхмощна релса за обмен на стойност, а протоколите от второ ниво като Lightning ще разрушат дълбоко не само посредниците и структурите на таксите, но и ще поставят началото на ера на нови бизнес модели, по-мощни и по-зачитащи неприкосновеността на личния живот на индивида.
  
short_bio: Всички интернет компании ще се превърнат в биткойн компании, ние сме тук, за да помогнем
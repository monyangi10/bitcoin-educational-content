bio: |
  20년 넘게 저지연 미션 크리티컬 네트워크를 구축하면서 저는 새로운 기술의 배포와 개방형 표준 프로토콜의 네트워크 효과와 그 우수성을 직접 경험했습니다. 저는 새로운 제품, 새로운 비즈니스 모델 및 솔루션을 구축하고 시장과 고객을 전도하는 데 따르는 어려움을 잘 이해하고 있습니다. 파트타임 비즈니스 엔젤로서 저는 기업들이 혁신적인 기술을 시장에 출시할 수 있도록 돕고 있습니다. 저는 기업들이 Bitcoin이 가져다 줄 수 있는 가치를 이해하고 모든 종류의 핵심 비즈니스에 대한 실질적인 사용 사례를 설명하기 위해 네트워크 효과를 시작했습니다. Bitcoin 네트워크는 Exchange 레일과 라이트닝과 같은 Layer 프로토콜을 통해 중개자와 수수료 구조를 크게 변화시킬 뿐만 아니라 더욱 강력하고 개인의 프라이버시를 존중하는 새로운 비즈니스 모델의 시대를 열어갈 것입니다.
  
short_bio: 모든 인터넷 기업이 Bitcoin 기업이 될 수 있도록 저희가 도와드리겠습니다
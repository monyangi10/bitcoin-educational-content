bio: |
  Sa više od 20 godina iskustva u implementaciji mreža sa niskom latencijom koje su kritične za misije, iz prve ruke sam iskusio primenu novih tehnologija i superiornost otvorenih standardnih protokola sa njihovim mrežnim efektima. Razumem izazove izgradnje novih proizvoda, novih poslovnih modela i rešenja, kao i evangelizaciju tržišta i kupaca. Kao povremeni poslovni anđeo, pomažem kompanijama da plasiraju inovativne tehnologije na tržište. Pokrenuo sam Network Effect kako bih pomogao kompanijama da razumeju vrednost koju Bitcoin može doneti, kao i da objasnim praktične slučajeve upotrebe za sve vrste osnovnih poslova. Bitcoin mreža je supernapunjena vrednost Exchange šina i Layer 2 protokola kao što je Lightning će duboko poremetiti ne samo posrednike i strukture naknada, već će i uvesti eru novih poslovnih modela koji su moćniji i koji više poštuju privatnost pojedinca.
short_bio: Sve internet kompanije će postati Bitcoin kompanije, ovde smo da pomognemo
bio: |
  我擁有超過 20 年的低延遲關鍵任務網路部署經驗，親身體驗過新技術的部署，以及開放式標準通訊協定在網路效能上的優勢。我了解建立新產品、新商業模式和解決方案，以及向市場和客戶傳播的挑戰。我是兼職的商業天使，協助公司將創新科技帶進市場。我推出了 Network Effect，目的是幫助企業瞭解 Bitcoin 能為他們帶來的價值，並說明各種核心業務的實際使用案例。Bitcoin 網路是一個超值的 Exchange 軌道和 Layer 2 協定，如 Lightning，不僅會深刻地破壞中介和收費結構，還會開啟一個更強大、更尊重個人隱私的新商業模式時代。
  
short_bio: 所有網際網路公司都將成為 Bitcoin 公司，我們在此提供協助
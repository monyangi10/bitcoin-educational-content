bio: |
  Dzięki ponad 20-letniemu doświadczeniu we wdrażaniu sieci o niskim opóźnieniu o znaczeniu krytycznym, z pierwszej ręki doświadczyłem wdrażania nowych technologii i wyższości otwartych standardowych protokołów z ich efektami sieciowymi. Rozumiem wyzwania związane z tworzeniem nowych produktów, nowych modeli biznesowych i rozwiązań, a także ewangelizacją rynku i klientów. W niepełnym wymiarze godzin pomagam firmom wprowadzać innowacyjne technologie na rynek. Uruchomiłem Network Effect, aby pomóc firmom zrozumieć wartość, jaką może im przynieść Bitcoin, a także opisać praktyczne przypadki użycia dla wszystkich rodzajów podstawowej działalności. Sieć Bitcoin jest doładowaną wartością szyny Exchange, a protokoły Layer 2, takie jak Lightning, głęboko zakłócą nie tylko pośredników i struktury opłat, ale także zapoczątkują erę nowych modeli biznesowych, potężniejszych i bardziej szanujących prywatność jednostki.
  
short_bio: Wszystkie firmy internetowe staną się firmami Bitcoin, jesteśmy tutaj, aby pomóc
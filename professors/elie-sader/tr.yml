bio: |
  20 yılı aşkın süredir düşük gecikmeli kritik görev ağları kurarak, yeni teknolojilerin dağıtımını ve açık standart protokollerin ağ etkileriyle üstünlüğünü ilk elden deneyimledim. Yeni ürünler, yeni iş modelleri ve çözümler oluşturmanın yanı sıra pazarı ve müşterileri ikna etmenin zorluklarını anlıyorum. Yarı zamanlı iş meleği olarak şirketlerin yenilikçi teknolojileri pazara sunmalarına yardımcı oluyorum. Şirketlerin Bitcoin'in onlara sağlayabileceği değeri anlamalarına yardımcı olmak ve her türlü temel işletme için pratik kullanım durumlarını açıklamak için Network Effect'i başlattım. Bitcoin ağı, aşırı değerli bir Exchange rayıdır ve Lightning gibi Layer 2 protokolleri yalnızca aracıları ve ücret yapılarını derinden bozmakla kalmayacak, aynı zamanda daha güçlü ve bireylerin mahremiyetine daha saygılı yeni iş modelleri çağını başlatacaktır.
  

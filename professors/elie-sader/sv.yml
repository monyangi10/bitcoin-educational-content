bio: |
  Med över 20 års erfarenhet av driftsättning av uppdragskritiska nätverk med låg latens har jag själv upplevt driftsättningen av ny teknik och överlägsenheten hos öppna standardprotokoll med deras nätverkseffekter. Jag förstår utmaningarna med att bygga nya produkter, nya affärsmodeller och lösningar samt att evangelisera marknaden och kunderna. Som affärsängel på deltid hjälper jag företag att få ut innovativ teknik på marknaden. Jag har lanserat Network Effect för att hjälpa företag att förstå det värde som Bitcoin kan ge dem, samt beskriva praktiska användningsfall för alla typer av kärnverksamheter. Bitcoin-nätverket är ett överladdat värde Exchange-skena och Layer 2-protokoll som Lightning kommer inte bara att störa mellanhänder och avgiftsstrukturer, utan också inleda en era av nya affärsmodeller som är kraftfullare och mer respektfulla för individens integritet.
  
short_bio: Alla internetbolag kommer att bli Bitcoin-bolag, vi är här för att hjälpa till
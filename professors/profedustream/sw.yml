bio: |
  Karibu PlanB.network! Mimi ni Thomas, a.k.a. @ProfEduStream, na nilivutiwa kwanza na Bitcoin kupitia Mining. Baadaye, baada ya kujijulisha na uchambuzi wa data na Python, nilivutiwa haraka na uchambuzi wa On-Chain; hasa katika uchanganuzi wa miamala kutoka kwa block 1 hadi 210000. Mnamo mwaka wa 2023, nilianza kuandika makala yenye kichwa "Bitcoin Blockchain Fun Facts" kwenye Substack yangu.
  Sambamba, kama mwalimu, nina shauku kubwa ya kushiriki maarifa yangu. Hii ndiyo sababu nilianzisha ushirikiano wa Bitcoin Lille nchini Ufaransa, ambapo tunafanya mkutano wa kila wiki. Huko, mimi hutoa mawasilisho mara kwa mara, ya kiufundi na yaliyorahisishwa, ambayo yote yanapatikana kwa njia huria kwenye YouTube na Hifadhi yangu ndogo.
  Hatimaye, ninajaribu kuleta pamoja jumuiya, Kifaransa na kimataifa. Kwa sababu pamoja, tutaenda mbali zaidi, kwa kasi zaidi.
  
short_bio: Elimu ndiyo silaha yenye nguvu zaidi unayoweza kuitumia kubadilisha dunia - Nelson Mandela
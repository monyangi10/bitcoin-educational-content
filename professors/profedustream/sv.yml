bio: |
  Välkommen till PlanB.network! Jag heter Thomas, alias @ProfEduStream, och jag blev först intresserad av Bitcoin genom Mining. Därefter, efter att ha bekantat mig med dataanalys och Python, blev jag snabbt intresserad av On-Chain-analys; särskilt av analysen av transaktioner från block 1 till 210000. År 2023 började jag skriva artiklar med titeln "Bitcoin Blockchain Fun Facts" på min Substack.
  Parallellt med detta har jag som lärare en djup passion för att dela med mig av min kunskap. Det är därför jag var med och skapade föreningen Bitcoin Lille i Frankrike, med vilken vi har ett möte varje vecka. Där ger jag regelbundet presentationer, både tekniska och förenklade, som alla finns tillgängliga som öppen källkod på YouTube och min Substack.
  Slutligen försöker jag sammanföra olika grupper, både franska och internationella. För tillsammans kommer vi att gå mycket längre, mycket snabbare.
  
short_bio: Utbildning är det kraftfullaste vapnet som du kan använda för att förändra världen - Nelson Mandela
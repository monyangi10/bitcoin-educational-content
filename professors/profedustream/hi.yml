bio: |
  PlanB.network में आपका स्वागत है! मैं थॉमस हूँ, उर्फ़ @ProfEduStream, और मुझे सबसे पहले Bitcoin से Mining में रुचि हुई। इसके बाद, डेटा विश्लेषण और पायथन से परिचित होने के बाद, मुझे जल्द ही On-Chain विश्लेषण में रुचि हो गई; विशेष रूप से ब्लॉक 1 से 210000 तक के लेन-देन के विश्लेषण में। 2023 में, मैंने अपने सबस्टैक पर "Bitcoin Blockchain के रोचक तथ्य" शीर्षक से लेख लिखना शुरू किया।
  इसके साथ ही, एक शिक्षक के रूप में, मुझे अपने ज्ञान को साझा करने का गहरा शौक है। यही कारण है कि मैंने फ्रांस में Bitcoin लिली एसोसिएशन की सह-स्थापना की, जिसके साथ हम साप्ताहिक बैठक करते हैं। वहाँ, मैं नियमित रूप से तकनीकी और सरलीकृत दोनों प्रकार की प्रस्तुतियाँ देता हूँ, जो सभी YouTube और मेरे सबस्टैक पर ओपन-सोर्स उपलब्ध हैं।
  अंत में, मैं फ्रांसीसी और अंतर्राष्ट्रीय, दोनों समुदायों को एक साथ लाने का प्रयास करता हूँ। क्योंकि साथ मिलकर, हम बहुत आगे, बहुत तेज़ी से आगे बढ़ेंगे।
  
short_bio: शिक्षा सबसे शक्तिशाली हथियार है जिसका उपयोग आप दुनिया को बदलने के लिए कर सकते हैं - नेल्सन मंडेला
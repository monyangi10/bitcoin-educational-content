bio: |
  Vítejte na stránkách PlanB.network! Jsem Thomas alias @ProfEduStream a o Bitcoin jsem se poprvé začal zajímat prostřednictvím Mining. Následně, poté co jsem se seznámil s analýzou dat a Pythonem, jsem se rychle začal zajímat o analýzu On-Chain; zejména o analýzu transakcí z bloků 1 až 210000. V roce 2023 jsem začal na svém Substacku psát články s názvem "Bitcoin Blockchain Fun Facts".
  Souběžně s tím mám jako učitel hlubokou vášeň pro sdílení svých znalostí. Proto jsem spoluzaložil sdružení Bitcoin Lille ve Francii, se kterým pořádáme týdenní setkání. Tam pravidelně přednáším prezentace, a to jak technické, tak zjednodušené, které jsou všechny dostupné jako open-source na YouTube a na mém Substacku.
  V neposlední řadě se snažím sdružovat komunity, a to jak francouzské, tak mezinárodní. Protože společně se dostaneme mnohem dál a mnohem rychleji.
  
short_bio: Vzdělání je nejmocnější zbraň, kterou můžete použít ke změně světa - Nelson Mandela
bio: |
  Witamy na PlanB.network! Jestem Thomas, alias @ProfEduStream i po raz pierwszy zainteresowałem się Bitcoin poprzez Mining. Następnie, po zapoznaniu się z analizą danych i Pythonem, szybko zainteresowałem się analizą On-Chain; w szczególności analizą transakcji z bloków od 1 do 210000. W 2023 roku zacząłem pisać artykuły zatytułowane "Bitcoin Blockchain Fun Facts" na moim Substacku.
  Równolegle, jako nauczyciel, mam głęboką pasję do dzielenia się swoją wiedzą. Dlatego też współtworzyłem stowarzyszenie Bitcoin Lille we Francji, z którym organizujemy cotygodniowe spotkania. Regularnie prowadzę tam prezentacje, zarówno techniczne, jak i uproszczone, które są dostępne jako open-source na YouTube i moim Substack.
  Wreszcie, staram się łączyć społeczności, zarówno francuskie, jak i międzynarodowe. Ponieważ razem zajdziemy znacznie dalej, znacznie szybciej.
  
short_bio: Edukacja jest najpotężniejszą bronią, której można użyć do zmiany świata - Nelson Mandela
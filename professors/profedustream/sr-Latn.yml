bio: |
  Dobrodošli na PlanB.network! Ja sam Thomas, poznat i kao @ProfEduStream, i prvi put sam se zainteresovao za Bitcoin preko Mining. Nakon što sam se upoznao sa analizom podataka i Python-om, brzo sam se zainteresovao za analizu On-Chain; posebno za analizu transakcija od blokova 1 do 210000. U 2023. godini počeo sam pisati članke pod nazivom "Bitcoin Blockchain Zanimljive činjenice" na svom Substack-u. Paralelno, kao učitelj, imam duboku strast za deljenje svog znanja. Zato sam suosnivač Bitcoin Lille udruženja u Francuskoj, sa kojim održavamo nedeljne sastanke. Tamo redovno držim prezentacije, kako tehničke tako i pojednostavljene, koje su sve dostupne kao open-source na YouTube-u i mom Substack-u. Na kraju, trudim se da okupim zajednice, kako francuske tako i međunarodne. Jer zajedno ćemo ići mnogo dalje, mnogo brže.
short_bio: Obrazovanje je najmoćnije oružje koje možete koristiti da promenite svet - Nelson Mandela
bio: |
  PlanB.network에 오신 것을 환영합니다! 저는 @ProfEduStream으로 알려진 Thomas라고 하며, Bitcoin를 통해 Mining에 처음 관심을 갖게 되었습니다. 그 후 데이터 분석과 파이썬에 익숙해지면서 On-Chain 분석, 특히 블록 1부터 210000까지의 트랜잭션 분석에 관심을 갖게 되었습니다. 2023년에 저는 서브스택에 "Bitcoin Blockchain 재미있는 사실"이라는 제목의 기사를 쓰기 시작했습니다.
  이와 동시에 저는 교사로서 제 지식을 공유하는 데 깊은 열정을 가지고 있습니다. 그래서 저는 프랑스에서 Bitcoin 릴 협회를 공동 창설하여 매주 모임을 갖고 있습니다. 그곳에서 저는 정기적으로 기술적인 프레젠테이션과 간단한 프레젠테이션을 진행하며, 모든 프레젠테이션은 유튜브와 서브스택에서 오픈소스로 제공됩니다.
  마지막으로 프랑스와 전 세계의 커뮤니티를 하나로 모으기 위해 노력합니다. 함께라면 훨씬 더 멀리, 훨씬 더 빨리 나아갈 수 있기 때문입니다.
  
short_bio: 교육은 세상을 바꿀 수 있는 가장 강력한 무기 - 넬슨 만델라
bio: |
  PlanB.network'e hoş geldiniz! Ben Thomas, nam-ı diğer @ProfEduStream, ve ilk olarak Mining aracılığıyla Bitcoin ile ilgilenmeye başladım. Daha sonra, veri analizi ve Python'a aşina olduktan sonra, hızlı bir şekilde On-Chain analiziyle ilgilenmeye başladım; özellikle de 1'den 210000'e kadar olan bloklardaki işlemlerin analiziyle. 2023 yılında Substack'imde "Bitcoin Blockchain Fun Facts" başlıklı makaleler yazmaya başladım.
  Buna paralel olarak, bir öğretmen olarak bilgimi paylaşma konusunda derin bir tutkum var. Bu nedenle Fransa'da haftalık buluşmalar düzenlediğimiz Bitcoin Lille derneğini kurdum. Orada düzenli olarak hem teknik hem de basitleştirilmiş sunumlar yapıyorum ve bunların hepsi YouTube'da ve Substack'imde açık kaynak olarak mevcut.
  Son olarak, hem Fransız hem de uluslararası toplulukları bir araya getirmeye çalışıyorum. Çünkü birlikte çok daha ileri, çok daha hızlı gideceğiz.
  
short_bio: Eğitim, dünyayı değiştirmek için kullanabileceğiniz en güçlü silahtır - Nelson Mandela
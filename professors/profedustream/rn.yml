bio: |
  Ikaze kuri PlanB.urubuga! Ndi Thomas, n'izina rya @ProfEduStream, kandi nabanje gukunda Bitcoin gushika kuri Mining. Mu nyuma, maze kumenya neza ugusesangura amakuru n’ururimi rwa Python, naciye nca nkunda cane ugusesangura On-Chain; cane cane mu gusesangura amafaranga kuva ku ma bloc 1 gushika ku 210000. Mu mwaka w'2023, natanguye kwandika ingingo zitwa "Bitcoin Blockchain Fun Facts" kuri Substack yanje.
  Mu buryo buhuye, nk’umwigisha, ndafise urukundo rwinshi rwo gusangira ubumenyi mfise. Ni co gituma nafatanije gushinga ishirahamwe Bitcoin Lille mu Bufaransa, iryo tugirana inama buri ndwi. Aho, ndatanga ibiganiro, vy’ubuhinga n’ivyoroshe, vyose bikaba biboneka mu buryo bufunguye kuri YouTube no kuri Substack yanje.
  Ubwa nyuma, ndagerageza guhuriza hamwe imiryango, iyo mu Bufaransa no mu mahanga. Kuko twese hamwe, tuzoja kure cane, twihuta cane.
  
short_bio: Uburezi ni intwaro ikomeye cane ushobora gukoresha mu guhindura isi - Nelson Mandela
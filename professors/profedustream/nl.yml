bio: |
  Welkom bij PlanB.network! Ik ben Thomas, ook bekend als @ProfEduStream, en ik raakte voor het eerst geïnteresseerd in Bitcoin via Mining. Vervolgens raakte ik, na vertrouwd te zijn geraakt met data-analyse en Python, snel geïnteresseerd in On-Chain analyse. Nadat ik mezelf vertrouwd had gemaakt met data-analyse en Python, raakte ik al snel geïnteresseerd in On-Chain analyse; met name in de analyse van transacties van blok 1 tot 210000. In 2023 begon ik artikelen te schrijven met de titel "Bitcoin Blockchain Fun Facts" op mijn Substack.
  Daarnaast heb ik als docent een grote passie voor het delen van mijn kennis. Daarom heb ik de vereniging Bitcoin Lille in Frankrijk mede opgericht, waarmee we een wekelijkse bijeenkomst houden. Daar geef ik regelmatig presentaties, zowel technische als vereenvoudigde, die allemaal open-source beschikbaar zijn op YouTube en mijn Substack.
  Tot slot probeer ik gemeenschappen samen te brengen, zowel Franse als internationale. Want samen komen we veel verder, veel sneller.
  
short_bio: Onderwijs is het machtigste wapen waarmee je de wereld kunt veranderen - Nelson Mandela
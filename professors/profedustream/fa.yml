bio: |
  به PlanB.network خوش آمدید! من توماس هستم، معروف به @ProfEduStream، و اولین بار از طریق Mining به Bitcoin علاقه‌مند شدم. سپس، با آشنایی با تحلیل داده‌ها و پایتون، به سرعت به تحلیل On-Chain علاقه‌مند شدم؛ به‌ویژه در تحلیل تراکنش‌ها از بلوک‌های 1 تا 210000. در سال 2023، شروع به نوشتن مقالاتی با عنوان "حقایق جالب Bitcoin Blockchain" در Substack خود کردم.  
  به‌طور همزمان، به عنوان یک معلم، علاقه زیادی به اشتراک‌گذاری دانش خود دارم. به همین دلیل، انجمن Bitcoin Lille را در فرانسه هم‌تأسیس کردم که با آن هر هفته یک ملاقات برگزار می‌کنیم. در آنجا، به‌طور منظم ارائه‌هایی، هم فنی و هم ساده‌شده، ارائه می‌دهم که همه به‌صورت منبع‌باز در YouTube و Substack من در دسترس هستند.  
  در نهایت، سعی می‌کنم جوامع، هم فرانسوی و هم بین‌المللی را گرد هم بیاورم. زیرا با هم، بسیار دورتر و بسیار سریع‌تر خواهیم رفت.
short_bio: آموزش قدرتمندترین سلاحی است که می‌توانید برای تغییر جهان از آن استفاده کنید - نلسون ماندلا
bio: |
  Добре дошли в PlanB.network! Аз съм Томас, известен още като @ProfEduStream, и за първи път се заинтересувах от Bitcoin чрез mining. Впоследствие, след като се запознах с анализа на данни и Python, бързо се заинтересувах от анализа на on-chain; по-специално от анализа на транзакциите от блокове 1 до 210000. През 2023 г. започнах да пиша статии, озаглавени "Забавни факти за Bitcoin Blockchain", в моя Substack.
  Успоредно с това, като учител, изпитвам дълбока страст към споделянето на знанията си. Ето защо съм съосновател на асоциацията Bitcoin Lille във Франция, с която провеждаме ежеседмични срещи. Там редовно изнасям презентации, както технически, така и опростени, които са достъпни с отворен код в YouTube и в моя Substack.
  И накрая, опитвам се да обединявам общности, както френски, така и международни. Защото заедно ще стигнем много по-далеч и много по-бързо.
  
short_bio: Образованието е най-мощното оръжие, с което можеш да промениш света - Нелсън Мандела
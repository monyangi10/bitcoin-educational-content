bio: |
  ยินดีต้อนรับสู่ PlanB.network! ผมชื่อ Thomas หรือที่รู้จักกันในนาม @ProfEduStream และผมเริ่มสนใจใน Bitcoin ผ่านทาง mining หลังจากนั้น เมื่อผมได้ทำความคุ้นเคยกับการวิเคราะห์ข้อมูลและ Python ผมก็เริ่มสนใจในการวิเคราะห์ on-chain อย่างรวดเร็ว โดยเฉพาะการวิเคราะห์ธุรกรรมจากบล็อกที่ 1 ถึง 210000 ในปี 2023 ผมเริ่มเขียนบทความชื่อ "Bitcoin Blockchain Fun Facts" บน Substack ของผม
  
  ในขณะเดียวกัน ในฐานะครู ผมมีความหลงใหลในการแบ่งปันความรู้ของผมอย่างลึกซึ้ง นี่คือเหตุผลที่ผมร่วมสร้างสมาคม Bitcoin Lille ในฝรั่งเศส ซึ่งเราจัดการพบปะกันทุกสัปดาห์ ที่นั่นผมมักจะให้การนำเสนอ ทั้งในเชิงเทคนิคและแบบง่าย ซึ่งทั้งหมดนี้สามารถเข้าถึงได้แบบโอเพ่นซอร์สบน YouTube และ Substack ของผม
  
  สุดท้ายนี้ ผมพยายามที่จะรวบรวมชุมชนทั้งในฝรั่งเศสและระดับนานาชาติ เพราะเมื่อเราร่วมมือกัน เราจะไปได้ไกลและเร็วขึ้นมาก
short_bio: การศึกษาเป็นอาวุธที่ทรงพลังที่สุดที่คุณสามารถใช้เพื่อเปลี่ยนแปลงโลก - เนลสัน แมนเดลา
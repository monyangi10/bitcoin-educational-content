bio: |
  歡迎來到 PlanB.network！我是 Thomas，又名 @ProfEduStream，我最初是透過 Mining 對 Bitcoin 感興趣的。隨後，在熟悉了資料分析和 Python 之後，我很快就對 On-Chain 分析產生了興趣；特別是從區塊 1 到 210000 的交易分析。2023 年，我開始在我的 Substack 上撰寫題為「Bitcoin Blockchain Fun Facts」的文章。
  與此同時，身為一名教師，我對分享我的知識充滿熱情。這就是我在法國共同創建 Bitcoin Lille 協會的原因，我們每週都會與該協會舉行聚會。在那裡，我定期做技術性和簡化的簡報，這些簡報都可以在 YouTube 和我的 Substack 上開放原始碼。
  最後，我嘗試聚集法國和國際社群。因為大家一起努力，我們會走得更快、更遠。
  
short_bio: 教育是您可以用來改變世界的最有力武器 - Nelson Mandela
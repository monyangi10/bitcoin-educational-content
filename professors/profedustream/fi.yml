bio: |
  Tervetuloa PlanB.networkiin! Olen Thomas, eli @ProfEduStream, ja kiinnostuin Bitcoin:sta Mining:n kautta. Myöhemmin tutustuttuani data-analyysiin ja Pythoniin kiinnostuin nopeasti On-Chain-analyysistä; erityisesti lohkojen 1-210000 transaktioiden analysoinnista. Vuonna 2023 aloin kirjoittaa Substackiin artikkeleita otsikolla "Bitcoin Blockchain Fun Facts".
  Samanaikaisesti opettajana minulla on syvä intohimo jakaa tietojani. Siksi olen mukana perustamassa Bitcoin Lille -yhdistystä Ranskassa, jonka kanssa pidämme viikoittaisia tapaamisia. Siellä pidän säännöllisesti sekä teknisiä että yksinkertaistettuja esityksiä, jotka ovat kaikki saatavilla avoimen lähdekoodin muodossa YouTubessa ja Substack-palvelussani.
  Lopuksi yritän tuoda yhteen sekä ranskalaisia että kansainvälisiä yhteisöjä. Sillä yhdessä pääsemme paljon pidemmälle ja nopeammin.
  
short_bio: Koulutus on voimakkain ase, jolla voit muuttaa maailmaa - Nelson Mandela
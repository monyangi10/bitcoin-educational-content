description: |
  bitcoin++ comes to Vienna for its first ever Economics Edition, exploring the intersection of free markets and protocols at the heart of Bitcoin's incentive design.
  Hosted at Weitsicht Cobenzl in the hills north of Vienna on May 27-28, 2026, this edition digs into the ecosystem of protocols for incentives and open marketplaces being built with and on top of Bitcoin: protocols for exchange, free markets, auction mechanisms, and open source.
  For the first time, bitcoin++ introduces a non-technical stage focused on economic research and academic intuitions, bringing together economists, academics, builders, and developers to talk about free markets, free trade, and the protocols enabling them.

description: |
  The Btrust Developer Day is back, and this year we’re heading to
  Mauritius 🇲🇺. Taking place just ahead of the Africa Bitcoin Conference, this
  one-day technical event is designed for Bitcoin developers, builders, and
  open-source contributors across Africa and beyond.​The event dives deep into
  the technical side of Bitcoin, from protocol upgrades and privacy tools to
  layer 2 innovations and open-source contribution.​ The Developer Day is your
  space to learn and connect. ​Join us as we spotlight African Bitcoin
  innovation, elevate local talent, and build the future of Bitcoin open-source,
  together.

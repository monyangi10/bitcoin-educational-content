description: |
  Nos conférences ne se limitent pas à Bitcoin en tant qu'actif, mais visent à en comprendre l'ensemble de l'écosystème et ses implications. Nous abordons ainsi les dimensions économiques et politiques, l'histoire et l'évolution de Bitcoin, les mécanismes du minage, les aspects comptables, les enjeux de sécurité, l'utilisation des portefeuilles, ainsi que les fondements technologiques.
  L'ensemble de ces thématiques est regroupé lors de la première journée, conçue pour offrir une vision globale, accessible et structurée. La seconde journée propose une approche plus technique, destinée à approfondir certains sujets pour ceux qui souhaitent aller plus loin.
  Nos conférences s'adressent à tous les niveaux : elles permettent à chacun de faire ses premiers pas dans l'univers de Bitcoin ou de consolider et approfondir ses connaissances.

name: "Conférence sur la crypto-monnaie à Strasbourg"
type: conference
description: |
  "17 ans après sa création, plus de 300 millions d'individus dans le monde utilisent Bitcoin. Il est donc temps de se demander ce que cette innovation de rupture peut apporter à l’échelle locale, à Strasbourg comme en Alsace. La matinée sera consacrée à une présentation vulgarisée ainsi qu’à une séance de questions-réponses, afin de poser les bases de compréhension et d’aborder les enjeux de cette monnaie numérique. L’après-midi sera quant à elle dédiée à différents panels mêlant technique, politique et adoption. En fin de journée, il sera enfin possible d’échanger avec les intervenants autour d’un verre."

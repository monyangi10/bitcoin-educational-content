description: |
  "La conférence B-Only 2025 à Annecy est l’événement incontournable
  pour les Bitcoiners et les passionnés de Bitcoin, ainsi que pour tous les
  curieux désireux d’en savoir plus sur cette révolution monétaire.

  Pour sa troisième édition, le B-Only vous propose une immersion totale dans
  l’univers du Bitcoin, où vous pourrez à la fois approfondir vos connaissances,
  découvrir de nouvelles perspectives et, surtout, rencontrer une communauté
  engagée et dynamique.

  Avec un focus exclusif sur Bitcoin, les conférences aborderont son écosystème,
  ses acteurs clés, et les valeurs fondamentales qui définissent son ethos.
  
  L’événement se déroule sur trois jours complets, comprenant des conférences
  enrichissantes, des ateliers pratiques et des moments d’échanges conviviaux.
  Vous n’aurez à vous soucier de rien : deux nuits d’hébergement et les repas
  sont inclus, vous permettant de vous concentrer pleinement sur l’expérience.

  Rejoignez-nous pour trois jours d’apprentissage, de partage et de rencontres
  autour du thème unique de Bitcoin."

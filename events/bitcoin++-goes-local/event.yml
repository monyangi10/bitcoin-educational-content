description: |
  "Bitcoin stands amongst the great decentralized protocols. Money is
  global, but decentralization means that bitcoin is also local. In our local
  edition series, bitcoin++ aims to bring the global conference series local as
  well, highlighting local bitcoin developer talent wherever it finds itself. In
  this edition of btc++ we are bringing the party to Durham, North Carolina,
  home of many great hackers, miners, and protocol devs."

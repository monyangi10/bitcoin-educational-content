description: |
  "The hackathon will be a public non-profit event gathering more
  than 100 participants to develop business and technical innovative solutions
  using Bitcoin FOSS and close source tools, during 1 month. For this event,
  organizers are volunteers and results are open-source.
  
  With this hackathon, we will try to tackle some issues that our population
  faces on a day-to-day basis and that we think Bitcoin can solve. The hackathon
  will be 100% online."

description: "Bitcoin Week France 2025, from May 19 to 25, is a decentralized,
  participatory event celebrated throughout France (and beyond) on the occasion
  of Bitcoin Pizza Day week (May 22). It invites businesses, individuals,
  activists, companies and institutions to promote the use of Bitcoin through
  workshops, conferences, meetings, BTC payments and much more.\r

  Each initiative, large or small, helps to promote the concrete adoption of
  Bitcoin, while highlighting local players who already accept it or wish to
  discover it."

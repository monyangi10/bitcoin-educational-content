description: |
  Mondo Convenienza is een Italiaanse meubelverkoper die in juli 2022 Bitcoin begon te accepteren om jongere demografen aan te trekken en gebruik te maken van de Italiaanse cryptobelastingstructuur, die uitgaven aanmoedigt. Hun cryptobetalingen bedragen in totaal ongeveer €500K per jaar en ze zagen een groei van 10% van september tot november 2024, waarbij het gebruik correleerde met stijgende marktperiodes.
  
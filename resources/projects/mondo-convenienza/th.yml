description: |
  Mondo Convenienza เป็นผู้ค้าปลีกเฟอร์นิเจอร์สัญชาติอิตาลีที่เริ่มรับบิตคอยน์ในเดือนกรกฎาคม 2022 เพื่อดึงดูดกลุ่มประชากรที่อายุน้อยกว่าและใช้ประโยชน์จากโครงสร้างภาษีคริปโตของอิตาลีซึ่งส่งเสริมการใช้จ่าย การชำระเงินด้วยคริปโตของพวกเขารวมประมาณ €500K ต่อปี และพวกเขาเห็นการเติบโต 10% จากเดือนกันยายนถึงพฤศจิกายน 2024 โดยการใช้งานมีความสัมพันธ์กับช่วงตลาดขาขึ้น
description: |
  Mondo Convenienza е италиански търговец на мебели на дребно, който започва да приема биткойни през юли 2022 г., за да привлече по-младите хора и да се възползва от криптоданъчната структура на Италия, която насърчава харченето. Криптоплащанията им възлизат на около 500 хил. евро годишно и от септември до ноември 2024 г. те отбелязват 10% ръст, като използването им корелира с бичи пазарни периоди.
  
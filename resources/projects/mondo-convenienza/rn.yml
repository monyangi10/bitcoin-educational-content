description: |
  Mondo Convenienza ni umucuruzi w’ibikoresho vyo mu nzu wo mu Butaliyano watanguye kwemera Bitcoin muri Nyakanga 2022 kugira ngo akwegere abantu bakiri bato no gukoresha neza imisoro y’Ubutaliyano, ivyo bikaba biremesha gukoresha amahera. Ivyo bihembo vyabo vy’ubuhinga bwa none bishika nk’€500K ku mwaka, kandi babonye iterambere rya 10% kuva muri Nzero gushika mu kwezi kwa Munyonyo 2024, n’ikoreshwa rihuye n’ibihe vy’isoko ry’iterambere.
  
description: |
  StackinSat ni urubuga rw’umugambi wo kuzigama Bitcoin rukoresha ubuhinga bwo gupima igiciro c’amadolari (DCA) kugira ngo umuntu ashobore gushiramwo amahera igihe kirekire, ata ngorane.
  
  Bituma abakoresha bashobora kwirundanira ama satoshis menshi iyo igiciro ca Bitcoin kiri hasi, gutyo bagatuma amahera bazigamye agira agaciro kanini. StackinSat yanditswe n’Ikigo c’Isoko ry’Imari nk’umucuruzi n’umucungezi wa Bitcoin. Itanga kimwe mu bisubizo bihendutse cane mu Buraya n’amahera make ashika kuri 0,5%. Iryo koraniro rirakoreshwa neza kandi rirashobora guhindurwa n’abantu ku giti cabo n’ubudandaji, bikabafasha guhindura umutungo wabo mu kuzigama Bitcoin buri kwezi.
  
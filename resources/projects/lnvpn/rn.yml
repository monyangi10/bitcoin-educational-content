description: |
  Na LNVPN twarubatse VPN yoroshe cane yishura uko ugenda yishurwa biciye ku Bitcoin Lightning. Aho kwishura nk'amadolari 5$ buri kwezi n'ikarita yawe y'inguzanyo kubera agateka ko gushobora gukoresha ubuhinga bwa VPN buri gihe turaguha ubuhinga bwo gukorana na VPN ku ma server yo mu bihugu bitandukanye mu kiringo c'isaha imwe ku masenti 10 gusa mu madolari y'Amerika -- wishurwa biciye ku ⚡!
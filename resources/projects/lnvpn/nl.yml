description: |
  Met LNVPN hebben we een zeer eenvoudige VPN pay-as-you-go service ontwikkeld die betaald wordt via Bitcoin Lightning. In plaats van elke maand ongeveer 5 dollar te betalen met je creditcard voor het voorrecht om af en toe een VPN-dienst te kunnen gebruiken, bieden wij je een VPN-verbinding op servers in verschillende landen voor een uur voor slechts 10 cent in US$ -- betaald via ⚡!
description: |
  LNVPN ile Bitcoin Lightning üzerinden ödenen çok basit bir kullandıkça öde VPN hizmeti oluşturduk. Arada sırada bir VPN hizmetini kullanabilme ayrıcalığı için kredi kartınızla her ay yaklaşık 5 $ ödemek yerine, size farklı ülkelerdeki sunucularda bir saat boyunca yalnızca 10 sent ABD doları karşılığında VPN bağlantısı sağlıyoruz - ⚡ ile ödenir!
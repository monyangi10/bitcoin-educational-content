description: |
  ด้วย LNVPN เราได้สร้างบริการ VPN แบบจ่ายตามการใช้งานที่เรียบง่ายมาก โดยชำระเงินผ่าน Bitcoin Lightning แทนที่จะจ่ายประมาณ 5$ ทุกเดือนด้วยบัตรเครดิตของคุณเพื่อสิทธิ์ในการใช้บริการ VPN เป็นครั้งคราว เราให้คุณเชื่อมต่อ VPN บนเซิร์ฟเวอร์ในประเทศต่าง ๆ เป็นเวลาหนึ่งชั่วโมงในราคาเพียง 10 เซ็นต์ใน US$ -- ชำระผ่าน ⚡!
description: |
 Gukiza Satoshi ni umukino w’umutima woroshe, w’uruhara (RPG) uvuga ku buhinga bwa Bitcoin. Ihuza ingorane ziryoshe, zishasha n’inkuru n’ubuhinga bw’imikino kugira ngo ireme inzira y’injira y’ubugwaneza mu guteza imbere Bitcoin. Yubatswe n'umunezero ku ba coders bashaka kumenya vyinshi n'umuntu wese yipfuza kumenya ingene Bitcoin ikora vy'ukuri. Ni ku babonye ubupfumu bwa Bitcoin open source software (₿OSS) kandi bariko barondera uburyo bwo gutangura gutanga.
 
  Ikigabane cose cuzuye ibirimwo ivyigwa bishingiye ku mategeko, ivyigwa, n’imyimenyerezo yo gukora porogarama kugira ngo kwiga amakuru y’ido n’ido y’ubuhinga bwa Bitcoin bibe vyiza cane. Abakinyi bakoresheje ingero zoroshe kandi zigororotse, bubaka imishinge ikomeye imbere y’uko bashira ku bintu bigoranye. Biciye mu UX itera ubwoba, amashusho ateye igomwe, n’ugukorana ata nkomanzi, abanyeshure bajanwa mu rugendo biciye mu nsiguro zitandukanye.
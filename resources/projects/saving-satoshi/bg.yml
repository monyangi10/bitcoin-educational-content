description: |
 Saving Satoshi е интерактивна ролева игра (RPG) с леко сърце, посветена на технологията на биткойн. Тя съчетава забавни, иновативни предизвикателства с разказване на истории и игрови механики, за да създаде лесна отправна точка към разработването на биткойн. Тя е създадена със забавление за любопитни програмисти и за всеки, който иска да научи как наистина работи биткойн. Тя е за тези, които са видели магията на софтуера с отворен код за биткойн (₿OSS) и търсят начини да започнат да допринасят.
 
  Всяка глава е изпълнена със съдържание на уроци, базирани на код, симулации и упражнения за програмиране, които правят изучаването на езотеричните детайли на биткойн технологията по-приятно. С прости, ясни примери играчите изграждат солидни основи, преди да натрупат сложност. Чрез поглъщащ UX, богати визуализации и безпроблемни взаимодействия учениците се отправят на пътешествие през различни теми.
description: |
 Saving Satoshi is een luchtig, interactief rollenspel (RPG) over Bitcoin technologie. Het combineert leuke, innovatieve uitdagingen met verhaallijnen en spelmechanismen om een zachte instap te creëren voor Bitcoin ontwikkeling. Het is gemaakt met plezier voor nieuwsgierige programmeurs en iedereen die wil leren hoe Bitcoin echt werkt. Het is voor diegenen die de magie van Bitcoin open source software (₿OSS) hebben gezien en op zoek zijn naar manieren om bij te dragen.
 
  Elk hoofdstuk is gevuld met op code gebaseerde lesinhoud, simulaties en programmeeroefeningen om het leren van de esoterische details van Bitcoin technologie leuker te maken. Met eenvoudige, ongecompliceerde voorbeelden bouwen spelers een solide basis voordat ze complexer worden. Via een meeslepende UX, rijke visuals en naadloze interacties worden leerlingen meegenomen op een reis door verschillende onderwerpen.
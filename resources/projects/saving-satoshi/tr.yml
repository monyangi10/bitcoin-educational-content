description: |
 Saving Satoshi, Bitcoin teknolojisi hakkında hafif yürekli, etkileşimli bir rol yapma oyunudur (RPG). Bitcoin geliştirmeye nazik bir giriş noktası oluşturmak için eğlenceli, yenilikçi zorlukları hikaye anlatımı ve oyun mekaniği ile birleştirir. Meraklı kodlayıcılar ve Bitcoin'ın gerçekten nasıl çalıştığını öğrenmek isteyen herkes için eğlenceli bir şekilde inşa edilmiştir. Bitcoin açık kaynak yazılımının (₿OSS) büyüsünü görmüş ve katkıda bulunmaya başlamanın yollarını arayanlar içindir.
 
  Her bölüm, Bitcoin teknolojisinin ezoterik ayrıntılarını öğrenmeyi daha eğlenceli hale getirmek için kod tabanlı ders içeriği, simülasyonlar ve programlama alıştırmalarıyla doludur. Basit ve anlaşılır örneklerle, oyuncular karmaşıklığa geçmeden önce sağlam temeller oluşturuyor. Sürükleyici bir kullanıcı arayüzü, zengin görseller ve kusursuz etkileşimler sayesinde, öğrenciler çeşitli konularda bir yolculuğa çıkarılır.
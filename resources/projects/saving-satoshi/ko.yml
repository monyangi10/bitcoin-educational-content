description: |
 Saving Satoshi은 Bitcoin 기술에 관한 가벼운 인터랙티브 롤플레잉 게임(RPG)입니다. 재미있고 혁신적인 도전 과제와 스토리텔링 및 게임 메커니즘을 결합하여 Bitcoin 개발에 대한 부드러운 진입점을 제공합니다. 호기심 많은 코더와 Bitcoin의 실제 작동 방식을 배우고자 하는 모든 사람을 위해 재미있게 제작되었습니다. Bitcoin 오픈 소스 소프트웨어(₿OSS)의 마법을 경험하고 기여를 시작할 방법을 찾고 있는 분들을 위한 책입니다.
 
  각 장은 코드 기반 강의 콘텐츠, 시뮬레이션, 프로그래밍 연습으로 구성되어 있어 Bitcoin 기술의 난해한 세부 사항을 보다 즐겁게 배울 수 있습니다. 간단하고 직관적인 예제를 통해 탄탄한 기초를 쌓은 후 복잡한 내용을 학습할 수 있습니다. 몰입형 UX, 풍부한 시각 자료, 원활한 상호 작용을 통해 학습자는 다양한 주제를 학습할 수 있습니다.
description: |
 Saving Satoshi เป็นเกมเล่นตามบทบาท (RPG) ที่มีเนื้อหาเบาสมองและมีปฏิสัมพันธ์เกี่ยวกับเทคโนโลยีบิตคอยน์ มันผสมผสานความท้าทายที่สนุกสนานและนวัตกรรมเข้ากับการเล่าเรื่องและกลไกของเกมเพื่อสร้างจุดเริ่มต้นที่นุ่มนวลในการพัฒนาบิตคอยน์ ถูกสร้างขึ้นเพื่อความสนุกสำหรับนักเขียนโค้ดที่อยากรู้อยากเห็นและใครก็ตามที่ต้องการเรียนรู้ว่าบิตคอยน์ทำงานอย่างไรจริงๆ มันสำหรับผู้ที่ได้เห็นความมหัศจรรย์ของซอฟต์แวร์โอเพ่นซอร์สบิตคอยน์ (₿OSS) และกำลังมองหาวิธีที่จะเริ่มมีส่วนร่วม
 
 แต่ละบทเต็มไปด้วยเนื้อหาบทเรียนที่ใช้โค้ดเป็นพื้นฐาน การจำลอง และแบบฝึกหัดการเขียนโปรแกรมเพื่อทำให้การเรียนรู้รายละเอียดที่ซับซ้อนของเทคโนโลยีบิตคอยน์สนุกยิ่งขึ้น ด้วยตัวอย่างที่เรียบง่ายและตรงไปตรงมา ผู้เล่นจะสร้างพื้นฐานที่มั่นคงก่อนที่จะเพิ่มความซับซ้อน ผ่าน UX ที่ดื่มด่ำ ภาพที่สมบูรณ์ และการโต้ตอบที่ไร้รอยต่อ ผู้เรียนจะถูกพาไปสู่การเดินทางผ่านหัวข้อต่างๆ มากมาย
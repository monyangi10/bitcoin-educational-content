description: |
  IVPN เป็นบริการ VPN ที่เน้นความเป็นส่วนตัวซึ่งไม่บันทึกกิจกรรมของผู้ใช้และไม่เก็บรวบรวมหรือจัดเก็บข้อมูลส่วนบุคคลเมื่อสมัครใช้งาน เรารับชำระเงินด้วยเงินสด Monero และ Bitcoin เรามุ่งมั่นในความโปร่งใสและความปลอดภัย โดยเว็บไซต์และแอป IVPN ทั้งหมดของเราเป็นโอเพ่นซอร์ส
  
  เซิร์ฟเวอร์ของเรา รวมถึงอีเมลและแชทสด ถูกโฮสต์และดำเนินการโดยเราเอง เรามุ่งมั่นที่จะตรวจสอบความปลอดภัยโดยอิสระทุกปีและไม่หลงระเริงกับการโฆษณาเท็จ เช่น การจ่ายเงินสำหรับรีวิวหรือการสัญญาความไม่เปิดเผยตัวตน
  
  เรามีส่วนร่วมกับองค์กรต่างๆ เช่น EFF, Open Rights Group และโครงการ Tor เป็นประจำ โมเดลธุรกิจของเราพึ่งพาการสมัครสมาชิกแบบชำระเงินเท่านั้น โดยไม่มีบริการเสริมหรือเว็บไซต์รีวิว VPN ใดๆ
  
  คุณสมบัติของเรารวมถึงการเลือกโปรโตคอล WireGuard, OpenVPN หรือ IPSec, AntiTracker ที่บล็อกโฆษณาและตัวติดตาม, ตัวเลือก Killswitch/Firewall, เซิร์ฟเวอร์ DNS ส่วนตัวที่ไม่บันทึกข้อมูล, เส้นทาง VPN แบบหลายจุด, การส่งต่อพอร์ต และ Obfsproxy เพื่อหลีกเลี่ยงการเซ็นเซอร์
  
  แม้ว่าเราจะชี้แจงว่า VPN ไม่สามารถบรรลุความไม่เปิดเผยตัวตนหรือป้องกันการเก็บข้อมูลโดยยักษ์ใหญ่อย่าง Google หรือ Facebook ได้ แต่เรารับรองว่า VPN ที่เชื่อถือได้อย่างเราสามารถเข้ารหัสข้อมูลและคำขอ DNS ของคุณได้อย่างมีประสิทธิภาพ เพิ่มความปลอดภัยในเครือข่ายสาธารณะที่ไม่น่าเชื่อถือ ปกปิดที่อยู่ IP ของคุณ และหลีกเลี่ยงการเซ็นเซอร์หรือการบล็อกทางภูมิศาสตร์ เราเป็นส่วนที่เชื่อถือได้ในกลยุทธ์การปกป้องความเป็นส่วนตัวของคุณ หากคุณไว้วางใจเราได้มากกว่า ISP ของคุณ
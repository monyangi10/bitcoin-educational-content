description: |
  IVPN은 사용자 활동을 기록하지 않으며 가입 시 개인 데이터를 수집하거나 저장하지 않는 개인 정보 보호 중심 VPN 서비스입니다. 현금, 모네로, Bitcoin로 결제할 수 있습니다. 저희는 투명성과 보안을 위해 최선을 다하고 있으며, 웹사이트와 모든 IVPN 앱은 오픈 소스입니다.
  
  이메일 및 실시간 채팅을 포함한 서버는 자체 호스팅 및 운영됩니다. 매년 독립적인 보안 감사를 실시하며, 리뷰 대가를 지불하거나 익명성을 약속하는 등의 허위 광고에 빠지지 않습니다.
  
  또한 환경재단, 오픈 라이츠 그룹, 토르 프로젝트와 같은 단체에 정기적으로 기부하고 있습니다. 당사의 비즈니스 모델은 부가 서비스나 VPN 리뷰 사이트 없이 오직 유료 구독에만 의존합니다.
  
  WireGuard, OpenVPN 또는 IPSec 프로토콜, 광고 및 추적기를 차단하는 AntiTracker, 킬스위치/방화벽 옵션, 비공개 비로깅 DNS 서버, 멀티홉 VPN 경로, 포트 포워딩, 검열 우회를 위한 Obfsproxy 등의 기능을 제공합니다.
  
  VPN이 익명성을 보장하거나 Google이나 Facebook과 같은 거대 기업의 데이터 수집을 막을 수는 없지만, 저희와 같은 신뢰할 수 있는 VPN은 사용자의 데이터와 DNS 요청을 효과적으로 암호화하고, 신뢰할 수 없는 공용 네트워크에서 보안을 강화하고, IP Address을 마스킹하고, 검열이나 지리적 차단을 우회할 수 있음을 확신합니다. ISP보다 당사를 더 신뢰한다면 당사는 개인 정보 보호 전략의 신뢰할 수 있는 일부가 될 수 있습니다.
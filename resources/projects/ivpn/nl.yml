description: |
  IVPN is een op privacy gerichte VPN-service die geen gebruikersactiviteiten vastlegt en geen persoonlijke gegevens verzamelt of opslaat bij aanmelding. We accepteren betalingen in contanten, Monero en Bitcoin. We zetten ons in voor transparantie en veiligheid en onze website en alle IVPN-apps zijn open-source.
  
  Onze servers, inclusief e-mail en live chat, worden door ons zelf gehost en beheerd. We verplichten ons tot jaarlijkse onafhankelijke veiligheidscontroles en houden ons niet bezig met valse reclame, zoals het betalen voor recensies of het beloven van anonimiteit.
  
  We dragen regelmatig bij aan organisaties zoals de EFF, Open Rights Group en het Tor-project. Ons bedrijfsmodel is uitsluitend gebaseerd op betaalde abonnementen, zonder aanvullende diensten of VPN-reviewsites.
  
  Onze functies omvatten een keuze uit WireGuard, OpenVPN of IPSec protocollen, AntiTracker die advertenties en trackers blokkeert, Killswitch/Firewall optie, private non-logging DNS servers, multi-hop VPN routes, port forwarding en Obfsproxy om censuur te omzeilen.
  
  Hoewel we verduidelijken dat VPN's geen anonimiteit kunnen bereiken of gegevensverzameling door giganten als Google of Facebook kunnen voorkomen, verzekeren we dat een betrouwbare VPN zoals de onze je gegevens en DNS-verzoeken effectief kan versleutelen, de veiligheid op onbetrouwbare openbare netwerken kan verhogen, je IP Address kan maskeren en censuur of geografische blokkades kan omzeilen. We zijn een betrouwbaar onderdeel van je privacybeschermingsstrategie, op voorwaarde dat je ons meer vertrouwt dan je ISP.
description: |
  IVPN е VPN услуга, ориентирана към поверителността, която не регистрира дейността на потребителите и не събира и не съхранява лични данни при регистрация. Приемаме плащания в брой, Monero и Bitcoin. Ангажираме се с прозрачност и сигурност, като нашият уебсайт и всички приложения на IVPN са с отворен код.
  
  Нашите сървъри, включително електронната поща и чатът на живо, се хостват самостоятелно и се управляват от нас. Ангажираме се с ежегодни независими одити на сигурността и не си позволяваме фалшива реклама, като например да плащаме за ревюта или да обещаваме анонимност.
  
  Редовно допринасяме за организации като EFF, Open Rights Group и проекта Tor. Нашият бизнес модел разчита единствено на платени абонаменти, без допълнителни услуги или сайтове за преглед на VPN.
  
  Функциите ни включват избор на протоколи WireGuard, OpenVPN или IPSec, AntiTracker, който блокира реклами и тракери, опция Killswitch/Firewall, частни нерегистриращи DNS сървъри, маршрути за VPN с множество преки, пренасочване на портове и Obfsproxy за заобикаляне на цензурата.
  
  Макар да поясняваме, че VPN не могат да постигнат анонимност или да предотвратят събирането на данни от гиганти като Google или Facebook, уверяваме, че надеждна VPN като нашата може ефективно да криптира данните и DNS заявките ви, да увеличи сигурността в ненадеждни обществени мрежи, да маскира вашия IP адрес и да заобиколи цензурата или географските блокажи. Ние сме надеждна част от вашата стратегия за защита на личните данни, при условие че ни се доверявате повече, отколкото на вашия доставчик на интернет услуги.
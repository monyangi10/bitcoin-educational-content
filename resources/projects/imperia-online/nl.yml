description: |
  Imperia Online JSC is een Europese ontwikkelaar van online games. Ze introduceerden Bitcoin-betalingen in 2018 om hun wereldwijde spelersbestand meer flexibiliteit te geven. Ze hebben een toename van 284% gezien in BTC-transactievolumes van 2022 tot 2023, en verdere groei in 2024, wat duidt op een stijgende interesse van gebruikers.
  
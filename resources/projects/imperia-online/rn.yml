description: |
  Imperia Online JSC ni ikigo c’i Buraya gikora imikino yo kuri internet. Bashizeho amahera ya Bitcoin mu 2018 kugira ngo abakinyi babo bo kw’isi yose bashobore guhindura uko bashaka. Babonye 284% vy’ukwiyongera kw’ibikorwa vya BTC kuva mu 2022 gushika mu 2023, n’ukwiyongera kw’iyindi mu 2024, vyerekana ko inyungu y’abakoresha iriko iragwira.
  
description: |
  Imperia Online JSC เป็นผู้พัฒนาเกมออนไลน์ในยุโรป พวกเขาได้แนะนำการชำระเงินด้วยบิตคอยน์ในปี 2018 เพื่อให้ฐานผู้เล่นทั่วโลกของพวกเขามีความยืดหยุ่นมากขึ้น พวกเขาได้เห็นการเพิ่มขึ้นของปริมาณธุรกรรม BTC ถึง 284% จากปี 2022 ถึง 2023 และการเติบโตเพิ่มเติมในปี 2024 ซึ่งบ่งบอกถึงความสนใจที่เพิ่มขึ้นของผู้ใช้
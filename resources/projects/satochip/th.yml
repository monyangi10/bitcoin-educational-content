description: |
  Satochip บริษัทจากเบลเยียม พัฒนาโซลูชันฮาร์ดแวร์และซอฟต์แวร์สำหรับการจัดการและเก็บรักษาสกุลเงินดิจิทัล ผลิตภัณฑ์หลักของบริษัทคือ Satochip ฮาร์ดแวร์ wallet ซึ่งเป็นบัตร NFC ที่ติดตั้ง secure element ที่ได้รับการรับรอง EAL6+ เสริมด้วย Seedkeeper ซึ่งเป็นตัวจัดการวลีช่วยจำ และ Satodime ซึ่งเป็นของขวัญเย็น wallet Satochip นำเสนอผลิตภัณฑ์ที่ครบถ้วนเพื่อตอบสนองความต้องการของผู้ใช้ อุปกรณ์ของบริษัทที่ขับเคลื่อนด้วยซอฟต์แวร์โอเพนซอร์ส มุ่งหวังที่จะทำให้ความปลอดภัยของ Bitcoin เป็นที่แพร่หลาย
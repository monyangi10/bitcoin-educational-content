description: |
  Satochip, een Belgisch bedrijf, ontwikkelt hardware- en softwareoplossingen voor het beheer en de opslag van cryptocurrency. Het vlaggenschip, de Satochip Hardware Wallet, is een NFC-kaart uitgerust met een EAL6+-gecertificeerde secure element. Aangevuld met de Seedkeeper, een Mnemonic frase manager, en de Satodime, een gave Cold Wallet, biedt Satochip een compleet assortiment dat is afgestemd op de behoeften van de gebruiker. De apparaten, aangedreven door open-source software, hebben als doel de Bitcoin beveiliging te democratiseren.
  
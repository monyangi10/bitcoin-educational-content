description: |
  Kagi Inc, yashinzwe na Vladimir Prelovac, irema ibikoresho vy’abakoresha, vy’ubuzima bwite. Moteri yayo y’ubushakashatsi yitwa Kagi Search itanga ubushakashatsi ata kwamamaza, ata gucungera, kandi umucukumbuzi wayo Orion atanga ubushakashatsi bwihuta, bwihariye kandi bushobora guhindurwa.
description: |
  Ishirahamwe ry’amasanamu ryashinzwe mu 2013 ryishize ahantu nk’iyindi nzira yigenga ku nzira zikomeye z’ubuhinga bwa none. Rumble itanga ibidukikije vyuzuye bishingiye ku mwidegemvyo wo kuvuga no kugenzura abaremyi ku birimwo. Mu bijanye n’intumbero yayo yo kurwanira internet yuguruye, Rumble ishimika ku vyiyumviro bitandukanye, ubuhinga bushasha, n’ukwigenga kw’ubuhinga bwa none. Vuba aha, Rumble yariko irategura ubuhinga bushasha bwa wallet ku Bitcoin n’amahera adahinduka, n’ugukorana cane n’urubuga rwayo.  
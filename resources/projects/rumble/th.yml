description: |
  แพลตฟอร์มวิดีโอที่ก่อตั้งขึ้นในปี 2013 ซึ่งวางตำแหน่งตัวเองเป็นทางเลือกอิสระต่อแพลตฟอร์มดิจิทัลหลัก ๆ Rumble นำเสนอระบบนิเวศที่สมบูรณ์ซึ่งมุ่งเน้นไปที่เสรีภาพในการแสดงออกและการควบคุมของผู้สร้างเนื้อหาให้กับเนื้อหาของพวกเขา ตามพันธกิจในการปกป้องอินเทอร์เน็ตที่เปิดกว้าง Rumble เน้นความหลากหลายของความคิดเห็น นวัตกรรม และความเป็นอิสระทางดิจิทัล เมื่อเร็ว ๆ นี้ Rumble ได้พัฒนาแอปพลิเคชัน wallet ที่เป็นนวัตกรรมสำหรับ Bitcoin และ stablecoins โดยมีการบูรณาการอย่างลึกซึ้งกับแพลตฟอร์มของตน
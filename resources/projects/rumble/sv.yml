description: |
  Videoplattform grundad 2013 som positionerar sig som ett oberoende alternativ till de stora digitala plattformarna. Rumble erbjuder ett komplett ekosystem centrerat kring yttrandefrihet och kreatörers kontroll över sitt innehåll. Rumble är troget sitt uppdrag att försvara ett öppet internet och betonar mångfald av åsikter, innovation och digitalt oberoende. Nyligen har Rumble utvecklat en innovativ wallet-applikation för Bitcoin och stablecoins, med djup integration med sin plattform.  
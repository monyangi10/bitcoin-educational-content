description: |
  Plataforma de vídeo fundada en 2013 que se posiciona como alternativa independiente a las grandes plataformas digitales. Rumble ofrece un ecosistema completo centrado en la libertad de expresión y el control de los creadores sobre sus contenidos. Fiel a su misión de defender una internet abierta, Rumble hace hincapié en la diversidad de opiniones, la innovación y la independencia digital. Recientemente, Rumble ha estado desarrollando una innovadora aplicación de wallet para Bitcoin y stablecoins, con una profunda integración con su plataforma.  
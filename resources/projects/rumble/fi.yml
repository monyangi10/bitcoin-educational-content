description: |
  Vuonna 2013 perustettu videoalusta, joka toimii itsenäisenä vaihtoehtona suurille digitaalisille alustoille. Rumble tarjoaa täydellisen ekosysteemin, jonka keskiössä on ilmaisunvapaus ja tekijöiden kontrolli sisältöönsä. Uskollisena tehtävälleen puolustaa avointa internetiä Rumble korostaa mielipiteiden moninaisuutta, innovointia ja digitaalista riippumattomuutta. Viime aikoina Rumble on kehittänyt innovatiivista wallet-sovellusta Bitcoin- ja stablecoineille, joka on integroitu syvälle sen alustaan.  
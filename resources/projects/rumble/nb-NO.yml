description: |
  En videoplattform som ble grunnlagt i 2013, og som posisjonerer seg som et uavhengig alternativ til de store digitale plattformene. Rumble tilbyr et komplett økosystem med fokus på ytringsfrihet og skapernes kontroll over eget innhold. I tråd med sin misjon om å forsvare et åpent internett, legger Rumble vekt på meningsmangfold, innovasjon og digital uavhengighet. Nylig har Rumble utviklet en innovativ wallet-applikasjon for Bitcoin og stablecoins, med dyp integrasjon med plattformen.  
description: |
  Видеоплатформа, основанная в 2013 году и позиционирующая себя как независимая альтернатива крупным цифровым платформам. Rumble предлагает полную экосистему, в центре которой - свобода самовыражения и контроль создателей над своим контентом. Следуя своей миссии по защите открытого интернета, Rumble делает акцент на разнообразии мнений, инновациях и цифровой независимости. Недавно Rumble разработал инновационное приложение wallet для Bitcoin и стабильных монеток с глубокой интеграцией со своей платформой.  
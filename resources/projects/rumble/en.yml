description: |
  Video platform founded in 2013 that positions itself as an independent alternative to major digital platforms. Rumble offers a complete ecosystem centered on freedom of expression and creators’ control over their content. True to its mission of defending an open internet, Rumble emphasizes diversity of opinions, innovation, and digital independence. Recently, Rumble has been developing an innovative wallet application for Bitcoin and stablecoins, with deep integration with its platform.  

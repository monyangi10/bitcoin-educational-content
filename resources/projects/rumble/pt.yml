description: |
  Plataforma de vídeo fundada em 2013 que se posiciona como uma alternativa independente às principais plataformas digitais. O Rumble oferece um ecossistema completo centrado na liberdade de expressão e no controlo dos criadores sobre os seus conteúdos. Fiel à sua missão de defender uma Internet aberta, o Rumble dá ênfase à diversidade de opiniões, à inovação e à independência digital. Recentemente, o Rumble tem vindo a desenvolver uma inovadora aplicação wallet para Bitcoin e stablecoins, com uma profunda integração com a sua plataforma.  
description: |
  Video platforma založená v roce 2013, která se prezentuje jako nezávislá alternativa k velkým digitálním platformám. Rumble nabízí kompletní ekosystém zaměřený na svobodu projevu a kontrolu tvůrců nad jejich obsahem. Věrna svému poslání bránit otevřený internet, klade Rumble důraz na rozmanitost názorů, inovace a digitální nezávislost. V poslední době Rumble vyvíjí inovativní aplikaci wallet pro Bitcoin a stablecoiny s hlubokou integrací do své platformy.  
description: |
  Plateforme de vidéos fondée en 2013 qui se positionne comme une alternative indépendante aux grandes plateformes numériques. Rumble propose un écosystème complet centré sur la liberté d’expression et le contrôle des créateurs sur leurs contenus. Fidèle à sa mission de défendre un internet ouvert, Rumble met en avant la diversité des opinions, l’innovation et l’indépendance numérique. Depuis peu, Rumble développe une application innovante de portefeuille Bitcoin et stablecoins, avec une intégration poussée avec sa plateforme.
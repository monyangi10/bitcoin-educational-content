description: |
  پلتفرم ویدئویی که در سال ۲۰۱۳ تأسیس شد و خود را به عنوان جایگزینی مستقل برای پلتفرم‌های دیجیتال بزرگ معرفی می‌کند. Rumble یک اکوسیستم کامل ارائه می‌دهد که بر آزادی بیان و کنترل سازندگان بر محتوای خود متمرکز است. وفادار به مأموریت خود در دفاع از اینترنت باز، Rumble بر تنوع نظرات، نوآوری و استقلال دیجیتال تأکید دارد. اخیراً، Rumble در حال توسعه یک برنامه نوآورانه wallet برای Bitcoin و استیبل‌کوین‌ها با یکپارچگی عمیق با پلتفرم خود بوده است.
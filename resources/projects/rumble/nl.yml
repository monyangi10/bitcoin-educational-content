description: |
  Videoplatform opgericht in 2013 dat zich positioneert als een onafhankelijk alternatief voor de grote digitale platformen. Rumble biedt een compleet ecosysteem waarin vrijheid van meningsuiting en de controle van makers over hun content centraal staan. Trouw aan zijn missie om een open internet te verdedigen, legt Rumble de nadruk op diversiteit van meningen, innovatie en digitale onafhankelijkheid. Recentelijk heeft Rumble een innovatieve wallet applicatie ontwikkeld voor Bitcoin en stablecoins, met diepe integratie met zijn platform.  
description: |
  2013 gegründete Videoplattform, die sich als unabhängige Alternative zu den großen digitalen Plattformen positioniert. Rumble bietet ein komplettes Ökosystem, in dessen Mittelpunkt die Freiheit der Meinungsäußerung und die Kontrolle der Urheber über ihre Inhalte stehen. Getreu seiner Mission, ein offenes Internet zu verteidigen, setzt Rumble auf Meinungsvielfalt, Innovation und digitale Unabhängigkeit. Kürzlich hat Rumble eine innovative wallet-Anwendung für Bitcoin und Stablecoins entwickelt, die tief in seine Plattform integriert ist.  
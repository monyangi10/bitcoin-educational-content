description: |
  ภารกิจของ Blockstream คือการสร้างโครงสร้างพื้นฐานทางการเงินแห่งอนาคต
  
  เราสร้างโครงสร้างพื้นฐานทางการเงินคริปโตโดยอิงจาก Bitcoin ซึ่งเป็นบล็อกเชนที่แข็งแกร่งและปลอดภัยที่สุด ด้วยการประยุกต์ใช้วิทยาการเข้ารหัสลับและวิศวกรรมความปลอดภัยที่ล้ำสมัย เรากำลังสร้างเทคโนโลยีที่ทำให้ตลาดการเงินมีประสิทธิภาพมากขึ้นโดยลดการพึ่งพาความไว้วางใจ ด้วยมุมมองระยะยาวในการส่งมอบโซลูชันที่แข็งแกร่งและปรับขนาดได้ เราลงทุนอย่างมากในการวิจัยและพัฒนาเพื่อเสริมสร้างระบบนิเวศและโปรโตคอลของ Bitcoin
  
  การเงินแบบเครือข่ายเปิดแบบเพียร์ทูเพียร์มีศักยภาพที่จะเปลี่ยนแปลงโลกเพื่อประโยชน์ของทุกคน Blockstream ภูมิใจที่ได้ทำให้สิ่งนี้เป็นจริง
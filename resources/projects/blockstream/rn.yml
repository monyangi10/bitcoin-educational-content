description: |
  Intumbero ya Blockstream ni uguhingura ibikorwa remezo vy’ivy’ubutunzi vyo muri kazoza. 
  
  Twubaka ibikorwa remezo vy’ivy’amahera bishingiye kuri Bitcoin, Blockchain ikomeye kandi itekanye kuruta izindi. Dukoresheje ubuhinga bushasha bwo gukingira amakuru n’ubuhinga bwo gucungera umutekano, turiko turakora ubuhinga butuma amasoko y’ivy’ubutunzi akora neza mu kugabanya ukwizigira ukwizigira. Kubera ko dufise iciyumviro c’igihe kirekire co gutanga inyishu zikomeye kandi zishobora gukoreshwa, dushiramwo amahera menshi mu bushakashatsi no mu guteza imbere kugira ngo dukomeze ibidukikije n’amasezerano ya Bitcoin.
  
  Ivy’ubutunzi vy’urunganwe n’urunganwe, vy’uruja n’uruza rwuguruye, bifise umuhango wo guhindura isi ku nyungu ya bose. Blockstream irashima kuba iriko iratuma ivyo bishika.
description: |
  블록스트림의 사명은 미래의 금융 인프라를 구축하는 것입니다.
  
  가장 강력하고 안전한 Bitcoin을 기반으로 암호화 금융 인프라를 구축합니다. 최첨단 암호화 및 보안 엔지니어링을 적용하여 신뢰에 대한 의존도를 낮춤으로써 금융 시장의 효율성을 높이는 기술을 구축하고 있습니다. 견고하고 확장 가능한 솔루션을 제공한다는 장기적인 전망을 가지고 Bitcoin 생태계와 프로토콜을 강화하기 위해 연구 개발에 많은 투자를 하고 있습니다.
  
  P2P 개방형 네트워크 금융은 모두를 위해 세상을 바꿀 수 있는 가능성을 가지고 있습니다. 블록스트림은 이를 현실로 만들고 있는 것을 자랑스럽게 생각합니다.
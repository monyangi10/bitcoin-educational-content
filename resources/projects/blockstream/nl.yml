description: |
  De missie van Blockstream is het creëren van de financiële infrastructuur van de toekomst.
  
  Wij bouwen crypto-financiële infrastructuur gebaseerd op Bitcoin, de meest robuuste en veilige Blockchain. Door het toepassen van geavanceerde cryptografie en beveiligingstechnieken bouwen we de technologie die financiële markten efficiënter maakt door de afhankelijkheid van vertrouwen te verminderen. Met een langetermijnvisie op het leveren van robuuste en schaalbare oplossingen, investeren we veel in onderzoek en ontwikkeling om het Bitcoin ecosysteem en protocol te versterken.
  
  Peer-to-peer, open-netwerk financiering houdt de belofte in om de wereld te veranderen ten voordele van iedereen. Blockstream is er trots op dit te kunnen realiseren.
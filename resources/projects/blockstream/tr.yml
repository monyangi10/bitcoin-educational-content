description: |
  Blockstream'in misyonu geleceğin finansal altyapısını oluşturmaktır.
  
  En sağlam ve güvenli Blockchain olan Bitcoin'e dayalı kripto-finansal altyapı inşa ediyoruz. En son kriptografi ve güvenlik mühendisliğini uygulayarak, güvene olan bağımlılığı azaltarak finansal piyasaları daha verimli hale getiren teknolojiyi inşa ediyoruz. Sağlam ve ölçeklenebilir çözümler sunmaya yönelik uzun vadeli bir bakış açısıyla, Bitcoin ekosistemini ve protokolünü güçlendirmek için araştırma ve geliştirmeye büyük yatırımlar yapıyoruz.
  
  Eşler arası, açık ağ finansmanı, dünyayı herkesin yararına değiştirme vaadini taşıyor. Blockstream bunu gerçeğe dönüştürmekten gurur duyuyor.
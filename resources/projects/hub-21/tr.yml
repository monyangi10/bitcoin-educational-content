description: |
  Hub 21, Belgrad'ın merkezinde bulunan ve Bitcoin profesyonelleri için eğitim, öğretim, araştırma ve topluluğa adanmış, kar amacı gütmeyen bir kuruluştur. Yazılım geliştirme, sanat, tasarım, içerik oluşturma ve eğitim dahil olmak üzere çeşitli alanlardan üyeler için işbirliğine dayalı bir merkez olarak hizmet vermektedir. Hub 21 Bitcoin, döngüsel ekonomiler, Lightning Network, Nostr, yapay zeka ve dijital girişimcilik konularına odaklanmaktadır. Tesisleri arasında bir ortak çalışma alanı, podcast odası, toplantı odası, yüksek hızlı internet ve topluluk etkinlikleri ve atölye çalışmaları için alanlar bulunmaktadır.
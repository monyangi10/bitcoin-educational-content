description: |
  Hub 21 is een non-profit organisatie gevestigd in het centrum van Belgrado, gewijd aan onderwijs, training, onderzoek en gemeenschap voor Bitcoin professionals. Het dient als een samenwerkingscentrum voor leden uit verschillende velden, waaronder softwareontwikkeling, kunst, design, contentcreatie en onderwijs. Hub 21 richt zich op Bitcoin, circulaire economieën, de Lightning Network, Nostr, kunstmatige intelligentie en digitaal ondernemerschap. De faciliteiten omvatten een coworkingruimte, podcastruimte, vergaderruimte, snel internet en ruimtes voor gemeenschapsevenementen en workshops.
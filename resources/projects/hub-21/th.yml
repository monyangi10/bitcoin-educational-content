description: |
  Hub 21 เป็นองค์กรไม่แสวงหาผลกำไรที่ตั้งอยู่ในใจกลางเบลเกรด มุ่งเน้นด้านการศึกษา การฝึกอบรม การวิจัย และชุมชนสำหรับมืออาชีพ Bitcoin ทำหน้าที่เป็นศูนย์กลางความร่วมมือสำหรับสมาชิกจากหลากหลายสาขา รวมถึงการพัฒนาซอฟต์แวร์ ศิลปะ การออกแบบ การสร้างเนื้อหา และการศึกษา Hub 21 มุ่งเน้นที่ Bitcoin เศรษฐกิจหมุนเวียน Lightning Network Nostr ปัญญาประดิษฐ์ และการเป็นผู้ประกอบการดิจิทัล สิ่งอำนวยความสะดวกของที่นี่ประกอบด้วยพื้นที่ทำงานร่วมกัน ห้องพอดแคสต์ ห้องประชุม อินเทอร์เน็ตความเร็วสูง และพื้นที่สำหรับกิจกรรมชุมชนและเวิร์กช็อป
description: |
  허브 21은 베오그라드 중심부에 위치한 비영리 단체로, Bitcoin 전문가를 위한 교육, 훈련, 연구, 커뮤니티에 전념하고 있습니다. 소프트웨어 개발, 예술, 디자인, 콘텐츠 제작, 교육 등 다양한 분야의 회원들을 위한 협업 허브 역할을 하고 있습니다. 허브 21은 Bitcoin, 순환 경제, Lightning Network, 노스트르, 인공지능, 디지털 기업가정신에 중점을 두고 있습니다. 코워킹 스페이스, 팟캐스팅 룸, 회의실, 초고속 인터넷, 커뮤니티 이벤트 및 워크샵을 위한 공간 등의 시설을 갖추고 있습니다.
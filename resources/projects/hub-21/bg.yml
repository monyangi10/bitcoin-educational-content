description: |
  Хъб 21 е организация с нестопанска цел, която се намира в центъра на Белград и е посветена на образованието, обучението, изследванията и общността на професионалистите от Bitcoin. Той служи като център за сътрудничество на членове от различни области, включително разработване на софтуер, изкуство, дизайн, създаване на съдържание и образование. Хъб 21 се фокусира върху Bitcoin, кръговата икономика, Lightning Network, Nostr, изкуствения интелект и цифровото предприемачество. Съоръженията му включват зона за коуъркинг, стая за подкастинг, зала за срещи, високоскоростен интернет и пространства за общностни събития и семинари.
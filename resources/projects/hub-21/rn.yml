description: |
  Hub 21 ni ishirahamwe ritagira inyungu riri hagati mu gisagara ca Belgrade, ryihaye uburezi, amahugurwa, ubushakashatsi, n’imibano y’abahinga ba Bitcoin. Ikora nk’aho abanywanyi bo mu nzego zitandukanye bakorana, harimwo no gutegura porogarama, ubuhinga, guhingura ibintu, guhingura ibirimwo, n’uburezi. Hub 21 yibanze kuri Bitcoin, ubutunzi buzunguruka, Lightning Network, Nostr, ubwenge bukoranye, n’ubudandaji bushingiye ku buhinga bwa none. Ivyumba vyayo birimwo ahantu ho gukorera hamwe, icumba co gushiramwo amakuru, icumba c’amakoraniro, internet yihuta cane, n’ahantu ho gukorera ibirori n’amahugurwa y’abanyagihugu.
description: |
  4NK Academy ni umugambi w’uburezi uhambaye ushingiye i Rouen mu Bufaransa, wiyemeje gukuraho itandukaniro riri hagati ya Bitcoin n’iterambere ry’umwuga. Nk’aho ari co kibanza gikoreramwo ishirahamwe rya Normandie Bitcoin, ishure rya 4NK ryibanda ku gutegura abantu ku giti cabo kugira ngo bashobore gukora akazi muri Bitcoin no mu mice yegerejwe. Porogarama zacu zitanga ubumenyi bwimbitse bw’ubuhinga n’ibikorwa vy’ubuhinga bihuye n’ibintu vy’ukuri vy’umwuga.
  
  Turakira n’ubwibone ikibanza co gukoreramwo Bitcoin, cuzuye ububiko bw’ibitabu bwihariye bwagenewe aba Bitcoiners kwiga, gukorana, no gukora ibintu bishasha. Intumbero yacu irarenga uburezi—dufise intumbero yo guteza imbere umuryango uhuye n’inyifato runtu ya Bitcoin y’umwidegemvyo, ubuzima bwite, n’ingingo ngenderwako zifunguye.
  
  4NK Academy irafasha cane mu guteza imbere ibidukikije vya Bitcoin biciye mu nyigisho z’inyigisho, ibirori vya bose, n’ubufatanye n’abarongozi b’inganda.
  
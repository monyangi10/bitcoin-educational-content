description: |
  Bitstack ni porogaramu nshasha ihindura amahera ukoresha ku musi ku musi mu kuzigama kwa Bitcoin.
  
  Mu gukikuza ivyo ugura buri musi, iyo porogarama ihita itanga amahera uzigamye agahindurwa ataco uhinduye mu Bitcoin, ata kigoro na kimwe ukora. Bitstack izwi cane kubera uko ikoreshwa neza, iraguha umwidegemvyo wose wo gucunga amahera yawe bivanye n’ivyo ukeneye, ufise ubushobozi bwo kugura no kugurisha ubwo nyene, hamwe n’uburyo bwo kuzigama bushobora guhindurwa. Bitstack yanditswe muri AMF nk’i PSAN, iraguha umutekano w’amahera uzigamye. Kubera amasuzuma meza y’abakoresha bayo, Bitstack iriko irategura guhindura cane ubuzigama bwa Bitcoin. Ivyo bizotangura mu mpera z’umwaka w’2023.
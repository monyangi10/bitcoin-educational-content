description: |
  Ishirahamwe ryo muri Suède ryitaho cane ubuzima bwite bwo kuri internet, ritanga ubuhinga bwa VPN butekanye kandi bwibanda ku buzima bwite. Mullvad yashinzwe mu 2009, igaragara cane kubera Commitment yayo yo kugabanya amakuru: nta email Address canke amakuru y’umuntu ku giti ciwe asabwa kugira ngo umuntu ashobore gukora konti. Mullvad ifise ubuhinga bukomeye bwo gukingira amakuru, ubuhuza butazwi, n’ingingo ngenderwako zikomeye zo kutagira amakuru, ifise intumbero yo kurinda abakoresha bayo ubugenzuzi n’uguhungabanya ubuzima bwite bwo kuri Internet. Mullvad VPN ishobora kwishurwa muri Bitcoin.
  
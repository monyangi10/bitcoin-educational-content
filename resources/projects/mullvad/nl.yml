description: |
  Zweeds bedrijf gespecialiseerd in online privacy, dat een veilige en privacygerichte VPN-dienst aanbiedt. Mullvad werd opgericht in 2009 en onderscheidt zich door zijn Commitment voor het minimaliseren van gegevensverzameling: er is geen e-mail Address of persoonlijke informatie nodig om een account aan te maken. Met robuuste encryptie, anonieme verbindingen en een strikt 'no-logs'-beleid wil Mullvad haar gebruikers beschermen tegen toezicht en online privacyschendingen. Mullvad VPN kan worden betaald in Bitcoin.
  
description: |
  The Free Cities Foundation inspires, informs, and connects people building a global market of jurisdictions based on contractual governance and individual sovereignty. Through its annual Free Cities Conference, online summit, weekly podcast, and publications — including the book Strategies for Liberty: Free Cities and Bitcoin — it links the parallel movements of sound money and free communities. The Foundation recognizes Bitcoin as the monetary layer of a voluntary social order, with several flagship Free Cities (such as Próspera) operating as Bitcoin-aligned hubs.

description: |
  Tiankii เป็นสตาร์ทอัพด้านเทคโนโลยีจากเอลซัลวาดอร์ที่เชี่ยวชาญในการพัฒนา Bitcoin และ Lightning เราช่วยธุรกิจรับชำระเงิน Bitcoin ด้วยโครงสร้างพื้นฐานที่ผู้ใช้ควบคุมเอง เป็นผู้บุกเบิกการใช้ Bitcoin และ Lightning Network ในเอลซัลวาดอร์ สัมผัสพลังของเทคโนโลยีที่ผ่านการทดสอบในสนามจริงและหล่อหลอมจากประสบการณ์จริง – สร้างขึ้นในเอลซัลวาดอร์ เพื่อเสริมพลังให้กับโลก
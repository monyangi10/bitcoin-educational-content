description: |
  Tiankii ni ishirahamwe ry’ubuhinga ryo muri Salvador ryitaho ivy’iterambere rya Bitcoin n’iry’umuravyo. Turafasha ubucuruzi kwemera kwishura Bitcoin n’ibikorwa remezo vy’ukwizigama, tukaba aba mbere mu gukoresha Bitcoin na Lightning Network muri El Salvador.  Iyumvire ububasha bw’ubuhinga bwageragejwe mu ntambara bushingiye ku bumenyi nyakuri – Bubatswe muri El Salvador, Buha ubushobozi Isi.
  
description: |
  Tiankii е салвадорски технологичен стартъп, специализиран в разработването на Bitcoin и Lightning. Ние помагаме на бизнеса да приема плащания по Bitcoin със самостоятелна инфраструктура, като сме пионери в използването на Bitcoin и Lightning Network в Салвадор.  Изпитайте силата на една изпитана в битка технология, оформена от реалния опит - изградена в Салвадор, даваща възможности на света.
  
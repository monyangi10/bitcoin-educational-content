description: |
  Tiankii, Bitcoin ve Lightning geliştirme konusunda uzmanlaşmış Salvadorlu bir teknoloji girişimidir. El Salvador'da Bitcoin ve Lightning Network kullanımına öncülük ederek, işletmelerin kendi kendine emanet altyapısı ile Bitcoin ödemelerini kabul etmelerine yardımcı oluyoruz.  Gerçek dünya deneyimiyle şekillendirilmiş, savaşta test edilmiş bir teknolojinin gücünü deneyimleyin - El Salvador'da İnşa Edildi, Dünyayı Güçlendiriyor.
  
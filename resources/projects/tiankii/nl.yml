description: |
  Tiankii is een Salvadoraanse technische startup gespecialiseerd in de ontwikkeling van Bitcoin en Lightning. We helpen bedrijven om Bitcoin betalingen te accepteren met een zelfbehoudende infrastructuur, en pionieren met het gebruik van Bitcoin en Lightning Network in El Salvador.  Ervaar de kracht van een technologie die zich in de strijd heeft bewezen en is gevormd door ervaringen uit de echte wereld - Built in El Salvador, Empowering the World.
  
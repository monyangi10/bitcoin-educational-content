description: |
  Bitcoin Saigon wil bijdragen aan de opbouw van een sterk lokaal netwerk en gemeenschap van Bitcoin enthousiastelingen, Bitcoin bedrijven, Bitcoin ontwikkelaars & onderzoekers om zo het onderwijs te versterken, innovatie te bevorderen en werkgelegenheid te creëren voor mensen die een actieve rol willen spelen in de groei van het bredere Bitcoin ecosysteem.
description: |
  Bitcoin Saigon има за цел да допринесе за изграждането на силна местна мрежа и общност от ентусиасти на Bitcoin, бизнес с Bitcoin, разработчици и изследователи на Bitcoin, за да се засили образованието, да се развият иновациите и да се даде възможност за създаване на възможности за заетост за хора, които искат да играят активна роля в растежа на по-широката екосистема на Bitcoin.
description: |
  Bitcoin Saigon ifise intumbero yo gutanga umusanzu wo kwubaka urubuga rukomeye rwo mu karere n’umuryango w’abakunda Bitcoin, ubucuruzi bwa Bitcoin, abategura Bitcoin n’abashakashatsi kugira ngo bakomeze uburezi, bateze imbere ubuhinga bushasha no gutuma habaho amahirwe y’akazi ku bantu barondera kugira uruhara runini mu gukura kw’ubuhinga bwa none.
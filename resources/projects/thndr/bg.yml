description: |
  THNDR е платформа, която интегрира в уебсайтове или приложения игри за залагания, базирани на умения, като използва изключително биткойн за депозити и плащания чрез Lightning. Тя поддържа депозити под един долар, така че на потребителите не им се налага да захранват предварително сметките си. THNDR е обработила над 7,5 милиона плащания с биткойни и екипът отбелязва, че никой не е поискал друг метод на плащане освен биткойн.
  
description: |
  THNDR is een platform dat op vaardigheden gebaseerde gokspellen integreert in websites of apps, waarbij uitsluitend Bitcoin wordt gebruikt voor stortingen en uitbetalingen via Lightning. Het ondersteunt stortingen van minder dan een dollar, dus gebruikers hoeven hun accounts niet voor te financieren. THNDR heeft meer dan 7,5 miljoen Bitcoin-betalingen verwerkt en het team merkt op dat niemand heeft gevraagd om een andere betaalmethode dan Bitcoin.
  
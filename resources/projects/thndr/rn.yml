description: |
  THNDR ni urubuga rushiramwo imikino yo gutera amahera ishingiye ku buhinga mu mbuga canke mu maporogarama, rukoresha gusa Bitcoin ku gushiramwo amahera no kwishura biciye ku Lightning. Ishigikira amafaranga ashirwa munsi y’idolari, rero abakoresha ntibakeneye gutanga amafaranga mbere y’igihe. THNDR yarakoze amafaranga arenga miliyoni 7,5 za Bitcoin, kandi iyo ntumwa ivuga ko ata n’umwe yasavye uburyo bwo kwishura uretse Bitcoin.
  
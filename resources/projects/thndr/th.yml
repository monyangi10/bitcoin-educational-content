description: |
  THNDR เป็นแพลตฟอร์มที่ผสานรวมเกมเดิมพันที่ใช้ทักษะเข้ากับเว็บไซต์หรือแอป โดยใช้บิตคอยน์สำหรับการฝากและการจ่ายเงินผ่าน Lightning เท่านั้น รองรับการฝากเงินต่ำกว่าหนึ่งดอลลาร์ ดังนั้นผู้ใช้ไม่จำเป็นต้องเติมเงินล่วงหน้า THNDR ได้ดำเนินการชำระเงินด้วยบิตคอยน์มากกว่า 7.5 ล้านครั้ง และทีมงานระบุว่าไม่มีใครขอวิธีการชำระเงินอื่นนอกจากบิตคอยน์
description: |
  Money Badger ni ishirahamwe ry’ubuhinga ryitaho gushiramwo amafaranga Bitcoin y’abacuruzi. Ukoresheje Lightning Network, bituma abagurisha bashobora gutanga amafaranga yihuta kandi atari menshi mu gihe bagabanya kwizigira abacuruzi ba kera bo kwishura. Inyishu zabo zifasha gutuma ubuhinga bwo gutanga amafaranga bugenda neza no kugabanya amafaranga y’ugucuruza ku bucuruzi bukorera mu masoko atandukanye.
  
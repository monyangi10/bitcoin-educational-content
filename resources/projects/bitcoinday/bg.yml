description: |
  BitcoinDay е локализирано, еднодневно, бързо и целенасочено събиране само на Bitcoin, което има за цел да увеличи максимално сигнала и свързаността и да сведе до минимум ехото и шума. То е предназначено за улесняване на връзките между влиятелните личности в Bitcoin и плебса. Привличаме висококвалифицирани лектори-експерти, които да прекарат деня с нас и да взаимодействат с участниците както на сцената, така и извън нея. Работим, за да поддържаме местна, малка среда за събиране, в която всеки има възможност да взаимодейства помежду си. Нашата цел е да създадем връзки, които да останат за цял живот, и да вдъхновим положителни действия, които да ускорят прехода към икономика, основана на Bitcoin.
  
description: |
  BitcoinDay is een gelokaliseerde, eendaagse, snelle en gerichte bijeenkomst, alleen voor Bitcoin, met als doel het signaal en de connectiviteit te maximaliseren en echo en ruis te minimaliseren. Het is ontworpen om verbindingen te vergemakkelijken tussen Bitcoin beïnvloeders en plebs. We trekken deskundige sprekers van hoog kaliber aan om de dag met ons door te brengen en zowel op als naast het podium met de deelnemers te communiceren. We streven naar een lokale, kleine bijeenkomst waar iedereen de kans krijgt om met elkaar in contact te komen. Ons doel is om connecties te creëren die een leven lang meegaan en om positieve actie te inspireren die de overgang naar een Bitcoin economie versnelt.
  
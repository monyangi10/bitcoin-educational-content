description: |
  BitcoinDay ni ikoraniro ry’aho hantu, ry’umusi umwe, ryihuta kandi ryibanda kuri Bitcoin gusa rigamije gutuma ikimenyetso n’uguhuza bigenda neza, no kugabanya ijwi n’urusaku. Igenewe gutuma habaho amasano hagati y’abanyagihugu ba Bitcoin n’abanyagihugu. Turakwegera abavugishwa b’abahinga kandi b’abahinga kugira ngo bamarane umusi wose natwe kandi bavugane n’abaje mu nama haba ku rubuga canke hanze yarwo. Turakora kugira ngo tuzigame ahantu h’iteraniro ryo mu karere, ritoyi aho umuntu wese afise akaryo ko gukorana n’uwundi. Intumbero yacu ni ugutuma habaho amasano azomara ubuzima bwose no gutuma habaho ibikorwa vyiza vyihuta guhindukira bikaja mu bukungu bwa Bitcoin.
  
description: |
  Bitcoin 필름페스트는 정기적으로 국내외에서 행사를 주최하고 참여하지만, 바르샤바는 BFF의 본거지 역할을 합니다. 스탈린의 명령으로 세워진 독특한 건물인 문화과학궁전에서 매년 며칠 동안 개최되는 이 행사는 한때 중앙 통제의 상징이었던 이곳에서 분권과 자유의 메시지를 전달합니다. Bitcoin 필름페스트는 단순한 이벤트 그 이상의 의미를 지닙니다. 독립 크리에이터, 영화 제작자, 프로듀서, 자유를 추구하는 사람, 영화 팬 등 다양한 분야의 가장 열정적인 사람들이 모이는 네트워킹 플랫폼인 Bitcoin 시네마 허브의 역할을 하기도 합니다.
  
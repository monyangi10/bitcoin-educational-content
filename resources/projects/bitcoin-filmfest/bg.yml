description: |
  Въпреки че Bitcoin FilmFest редовно ще бъде домакин и ще участва в събития на местно и международно ниво, Варшава е родната база на BFF. Провеждан в емблематичния Дворец на културата и науката - уникална сграда, построена по заповед на Сталин - за няколко дни всяка година, той носи посланието за децентрализация и свобода на място, което някога е било символ на централен контрол. Без значение колко велики са те, Bitcoin FilmFest надхвърля рамките на поредица от събития. Всъщност той служи и като платформа за работа в мрежа - Bitcoin Cinema Hub, която събира най-ожесточените умове от много области - независими творци, режисьори, продуценти, търсещи свобода и фенове на киното.
  
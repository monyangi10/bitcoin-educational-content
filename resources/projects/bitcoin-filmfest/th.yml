description: |
  ในขณะที่ Bitcoin FilmFest จะจัดและเข้าร่วมกิจกรรมทั้งในประเทศและต่างประเทศเป็นประจำ วอร์ซอว์ทำหน้าที่เป็นฐานบ้านของ BFF จัดขึ้นที่พระราชวังแห่งวัฒนธรรมและวิทยาศาสตร์ที่มีชื่อเสียง—อาคารที่สร้างขึ้นตามคำสั่งของสตาลิน—เป็นเวลาสองสามวันในแต่ละปี มันนำข้อความของการกระจายอำนาจและเสรีภาพไปยังสถานที่ที่ครั้งหนึ่งเคยเป็นสัญลักษณ์ของการควบคุมจากศูนย์กลาง ไม่ว่าพวกเขาจะยอดเยี่ยมแค่ไหน Bitcoin FilmFest ไปไกลกว่าการเป็นเพียงชุดของกิจกรรม ในความเป็นจริง มันยังทำหน้าที่เป็นแพลตฟอร์มเครือข่าย Bitcoin Cinema Hub ที่รวบรวมจิตใจที่แข็งแกร่งที่สุดจากหลายพื้นที่—ผู้สร้างอิสระ ผู้สร้างภาพยนตร์ ผู้ผลิต ผู้แสวงหาเสรีภาพ และแฟนภาพยนตร์
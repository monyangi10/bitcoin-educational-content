description: |
  Terwijl Bitcoin FilmFest regelmatig gastheer is van en deelneemt aan evenementen in binnen- en buitenland, is Warschau de thuisbasis van BFF. Het wordt elk jaar een paar dagen gehouden in het iconische Paleis van Cultuur en Wetenschap - een uniek gebouw dat op bevel van Stalin werd gebouwd - en brengt de boodschap van decentralisatie en vrijheid naar een locatie die ooit een symbool was van centrale controle. Hoe groot ze ook zijn, Bitcoin FilmFest gaat verder dan een reeks evenementen. In feite dient het ook als netwerkplatform, de Bitcoin Cinema Hub, die de knapste koppen uit vele gebieden samenbrengt - onafhankelijke makers, filmmakers, producenten, vrijheidszoekers en filmfans.
  
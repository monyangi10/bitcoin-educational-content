description: |
  Naho Bitcoin FilmFest izokwama yakira kandi ikagira uruhara mu birori vyo mu gihugu no hanze, Warsaw ni co kibanza ca BFF. Ibera mu ngoro y’agaciro y’Umuco n’Ivya Siyansi—inyubakwa idasanzwe yubatswe ku mategeko ya Stalin—mu misi mikeyi buri mwaka, ikazana ubutumwa bwo kwegereza ubutegetsi abaturage n’umwidegemvyo mu kibanza cari ikimenyetso c’ubutegetsi bwa mbere. Naho boba bakomeye gute, Bitcoin FilmFest irarenga urutonde rw’ibintu. Nkako, irakora kandi nk’urubuga rwo gukorana n’abandi, ari rwo Bitcoin Cinema Hub, ruhuriza hamwe abantu bafise ubwenge bukomeye cane bo mu bice vyinshi, ni ukuvuga abahinguzi b’amasanamu bigenga, abakora amasanamu, abahingura amasanamu, abarondera umwidegemvyo be n’abakunda amasanamu.
  
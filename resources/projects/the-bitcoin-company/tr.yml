description: |
  Bitcoin Şirketi, Bitcoinciler tarafından herkes için kurulmuş bir şirkettir. Bitcoin, herkes için. Bitcoin'ı tek bir yerden öğrenmenize, kazanmanıza, harcamanıza, tasarruf etmenize, ödünç almanıza ve satın almanıza yardımcı olacağız. Bankanızdan beklediğiniz tüm geleneksel finansal araçlara sahip (hiçbir baş ağrısı olmadan), ancak özünde Bitcoin olan basit, özel ve kullanımı kolay bir uygulama geliştiriyoruz.
  
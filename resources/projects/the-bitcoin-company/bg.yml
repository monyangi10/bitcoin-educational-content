description: |
  The Bitcoin Company е компания, създадена от биткойнисти, за всички. Bitcoin, за всички. Ние ще ви помогнем да научите, печелите, харчите, спестявате, вземате назаем и купувате Bitcoin, всичко това на едно място. Изграждаме просто, частно и лесно за използване приложение с всички традиционни финансови инструменти, които очаквате от банката си (без нито едно от главоболията), но с Bitcoin в основата си.
  
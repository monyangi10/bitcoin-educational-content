description: |
  The Bitcoin Company เป็นบริษัทที่สร้างขึ้นโดยผู้ที่ชื่นชอบ Bitcoin สำหรับทุกคน Bitcoin สำหรับทุกคน เราจะช่วยให้คุณเรียนรู้ รับรายได้ ใช้จ่าย ออม ยืม และซื้อ Bitcoin ทั้งหมดในที่เดียว เรากำลังสร้างแอปที่เรียบง่าย เป็นส่วนตัว และใช้งานง่าย พร้อมด้วยเครื่องมือทางการเงินแบบดั้งเดิมทั้งหมดที่คุณคาดหวังจากธนาคารของคุณ (โดยไม่มีความยุ่งยาก) แต่มี Bitcoin เป็นแกนหลัก
description: |
  De Bitcoin Company is een bedrijf gebouwd door Bitcoiners, voor iedereen. Bitcoin, voor iedereen. Wij helpen je om Bitcoin te leren, te verdienen, uit te geven, te sparen, te lenen en te kopen, allemaal op één plek. We bouwen een eenvoudige, privé en makkelijk te gebruiken app met alle traditionele financiële tools die je van je bank gewend bent (zonder de kopzorgen), maar met Bitcoin in de kern.
  
description: |
  LNbits는 확장 기능을 갖춘 무료 오픈소스 Bitcoin 라이트닝 계정 시스템입니다. 이를 통해 자신, 친구, 가족 또는 전 세계를 대상으로 자신만의 Lightning Network 계정 시스템을 운영할 수 있습니다. LNbits는 LND, c-lightning, Spark, LNpay, OpenNode, lntxbot 등 다양한 Lightning Network 펀딩 소스를 지원합니다.
  
  LNbits를 사용하면 여러 계정이나 지갑을 생성하고 기여자가 구축한 다양한 확장 기능에 액세스할 수 있습니다. 이러한 확장 기능을 통해 수도꼭지, 페이링크, 공유 가능한 POS, 페이월, 이벤트 티켓, 주사위 게임, 서버 서비스, 공유 가능한 주크박스 등 다양한 기능을 추가할 수 있습니다. LNbits는 여러 노드 및 펀딩 소스에 연결할 수 있는 간단한 API를 제공하여 기존 스택에 쉽게 통합할 수 있습니다.
  
  추가 애플리케이션을 다운로드할 필요 없이 브라우저에서 즉시 바로 사용할 수 있다는 것도 LNbits의 장점 중 하나입니다. 프론트엔드에는 Quasar 및 VueJS 프레임워크를 활용하여 고성능의 반응형 사용자 인터페이스를 제공합니다. 백엔드에서는 최신 고성능 Python API 프레임워크인 FastAPI를 활용합니다.
  
  LNbits를 시작하려면 GitHub 문서, YouTube 튜토리얼 및 Awesome LNbits 리소스를 확인하세요. LNbits 커뮤니티는 사용자와 개발자가 이 무료 오픈소스 소프트웨어의 개발에 기여하고, 아이디어를 제공하고, 도움을 줄 수 있는 텔레그램 그룹을 운영하며 활발하게 활동하고 있습니다.
  
  LNbits는 확장 프레임워크를 통해 Lightning Network 계정을 관리하고 다양한 기능을 통합할 수 있는 유연하고 확장 가능한 솔루션을 제공합니다.
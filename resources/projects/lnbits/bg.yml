description: |
  LNbits е безплатна система с отворен код Bitcoin Lightning Accounts System с разширения. Тя ви позволява да управлявате собствена система за акаунти Lightning Network, независимо дали е за вас, за приятелите и семейството ви или за целия свят. LNbits поддържа различни източници на финансиране на Lightning Network, включително LND, c-lightning, Spark, LNpay, OpenNode, lntxbot и други.
  
  С LNbits можете да създадете няколко сметки или портфейли и да получите достъп до широк набор от разширения, създадени от сътрудници. Тези разширения ви дават възможност да добавяте функционалности като кранове, платени връзки, споделени точки на продажба, платени стени, билети за събития, игри със зарове, сървърни услуги и дори споделена музикална кутия, както и много други. LNbits предоставя проста API, която може да се свързва с множество възли и източници на финансиране, което я прави лесна за интегриране във вашия съществуващ стек.
  
  Едно от предимствата на LNbits е, че можете да го използвате незабавно и директно в браузъра си, без да е необходимо да изтегляте допълнителни приложения. За своя фронтенд той използва рамки Quasar и VueJS, като осигурява високопроизводителни и отзивчиви потребителски интерфейси. За бекенда LNbits използва FastAPI - модерна и високопроизводителна Python рамка за API.
  
  За да започнете работа с LNbits, можете да разгледате документацията им в GitHub, уроците в YouTube и ресурса Awesome LNbits. Общността на LNbits е активна и подкрепяща, като предлага група Telegram за потребители и разработчици, които могат да обменят идеи, да оказват помощ и да допринасят за развитието на този безплатен софтуер с отворен код.
  
  LNbits предлага гъвкаво и разширяемо решение за управление на Lightning Network акаунти и интегриране на различни функционалности чрез своята рамка за разширения.
description: |
  LNbits เป็นระบบบัญชี Bitcoin Lightning ที่ฟรีและโอเพ่นซอร์สพร้อมส่วนขยาย ช่วยให้คุณสามารถเรียกใช้ระบบบัญชี Lightning Network ของคุณเอง ไม่ว่าจะเป็นสำหรับตัวคุณเอง เพื่อนและครอบครัว หรือสำหรับทั้งโลก LNbits รองรับแหล่งเงินทุน Lightning Network ต่างๆ รวมถึง LND, c-lightning, Spark, LNpay, OpenNode, lntxbot และอื่นๆ
  
  ด้วย LNbits คุณสามารถสร้างบัญชีหรือกระเป๋าเงินหลายบัญชีและเข้าถึงส่วนขยายที่หลากหลายที่สร้างโดยผู้ร่วมพัฒนา ส่วนขยายเหล่านี้ช่วยให้คุณเพิ่มฟังก์ชันการทำงาน เช่น faucets, paylinks, จุดขายที่แชร์ได้, paywalls, ตั๋วงาน, เกมลูกเต๋า, บริการเซิร์ฟเวอร์ และแม้แต่ตู้เพลงที่แชร์ได้ และอื่นๆ อีกมากมาย LNbits มี API ที่เรียบง่ายที่สามารถเชื่อมต่อกับโหนดและแหล่งเงินทุนหลายแห่ง ทำให้ง่ายต่อการรวมเข้ากับสแต็กที่มีอยู่ของคุณ
  
  หนึ่งในข้อดีของ LNbits คือคุณสามารถใช้งานได้ทันทีและโดยตรงในเบราว์เซอร์ของคุณ โดยไม่จำเป็นต้องดาวน์โหลดแอปพลิเคชันเพิ่มเติมใดๆ มันใช้เฟรมเวิร์ก Quasar และ VueJS สำหรับส่วนหน้าของมัน ให้ประสิทธิภาพสูงและอินเทอร์เฟซผู้ใช้ที่ตอบสนอง ในส่วนหลัง LNbits ใช้ FastAPI ซึ่งเป็นเฟรมเวิร์ก API Python ที่ทันสมัยและมีประสิทธิภาพสูง
  
  ในการเริ่มต้นกับ LNbits คุณสามารถตรวจสอบเอกสาร GitHub ของพวกเขา วิดีโอสอนใน YouTube และแหล่งข้อมูล Awesome LNbits ชุมชน LNbits มีความกระตือรือร้นและให้การสนับสนุน โดยมี Telegram กลุ่มสำหรับผู้ใช้และนักพัฒนาเพื่อแลกเปลี่ยนความคิด ให้ความช่วยเหลือ และมีส่วนร่วมในการพัฒนาซอฟต์แวร์ฟรีและโอเพ่นซอร์สนี้
  
  LNbits นำเสนอวิธีการที่ยืดหยุ่นและขยายได้สำหรับการจัดการบัญชี Lightning Network และการรวมฟังก์ชันการทำงานต่างๆ ผ่านเฟรมเวิร์กส่วนขยายของมัน
description: |
  Public Pool е платформа за самостоятелен пул mining, която позволява на миньорите да опитат късмета си в блок mining от Bitcoin, без да споделят наградата. За разлика от традиционните пулове, Public Pool не агрегира изчислителна мощ; потребителите получават пълната награда, ако бъде намерен блок. Платформата предоставя на миньорите шаблон на блок, като по този начин се премахва необходимостта от управление на възел Bitcoin. Въпреки че шансовете за успех са малки, системата функционира като лотария с потенциално високи награди. Информационното табло предлага подробна статистика за производителността и мрежата.
  
description: |
  Public Pool เป็นแพลตฟอร์ม Solo Pool mining ที่อนุญาตให้นักขุดลองเสี่ยงโชคที่ mining บล็อก Bitcoin โดยไม่ต้องแบ่งปันรางวัล แตกต่างจากพูลแบบดั้งเดิม Public Pool ไม่รวมพลังการประมวลผล; ผู้ใช้จะได้รับรางวัลเต็มจำนวนหากพบบล็อก แพลตฟอร์มนี้ให้นักขุดด้วยเทมเพลตบล็อก ทำให้ไม่จำเป็นต้องจัดการโหนด Bitcoin แม้ว่าโอกาสในการประสบความสำเร็จจะต่ำ แต่ระบบทำงานเหมือนลอตเตอรี่ที่มีรางวัลสูงที่เป็นไปได้ แดชบอร์ดมีสถิติโดยละเอียดเกี่ยวกับประสิทธิภาพและเครือข่าย
description: |
  Public Pool, madencilerin ödülü paylaşmadan bir Mining bloğunda şanslarını denemelerine olanak tanıyan bir Solo Pool Bitcoin platformudur. Geleneksel havuzların aksine, Public Pool bilgi işlem gücünü bir araya getirmez; kullanıcılar bir blok bulunursa ödülün tamamını alır. Platform, madencilere bir blok şablonu sağlayarak bir Bitcoin düğümünü yönetme ihtiyacını ortadan kaldırır. Başarı şansı düşük olsa da, sistem potansiyel olarak yüksek ödüllü bir piyango gibi işlemektedir. Bir gösterge paneli, performans ve ağ hakkında ayrıntılı istatistikler sunar.
  
description: |
  Public Pool ni urubuga rwa Solo Pool Mining rutuma abacukuzi bagerageza amahirwe yabo kuri Mining a Bitcoin block batasangira impembo. Mu buryo butandukanye n’ibidengeri vya kera, Public Pool ntikoranya ubushobozi bwo gukoresha ubuhinga bwa none; abakoresha baronka impembo yuzuye iyo habonetse ububiko. Iryo koraniro ritanga abacukuzi b’amabuye y’agaciro igishushanyo c’amabuye, bikaba bikuraho ivy’ugucungera urudodo rwa Bitcoin. Naho amahirwe yo kuroranirwa ari make, iyo nzira ikora nk’urukino rwo gutora rufise impembo nyinshi. Dashboard itanga imibare ido n’ido yerekeye ibikorwa n’urubuga.
  
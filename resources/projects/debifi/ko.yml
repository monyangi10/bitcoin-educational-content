description: |
  데비파이에서는 "자신의 돈을 소유하라"는 모토 아래 살고 있습니다 우리는 Bitcoin이 단순한 자산이 아니라 재정적 자립을 위한 기둥으로서 그 힘을 믿습니다. 당사의 서비스는 "절대 팔지 말고 빌려라."라는 철학을 바탕으로 설계되었습니다. 빌려라." 즉, 자산을 매각하지 않고도 Bitcoin 보유 자산을 담보로 대출을 받을 수 있습니다. "키를 보유하세요"는 단순한 슬로건이 아니라 Bitcoin을 계속 관리할 수 있도록 보장하는 Commitment입니다. 당사의 비수탁 솔루션은 금융 미래를 형성하는 데 있어 Bitcoin의 성공이 얼마나 중요한지 강조합니다. Bitcoin을 슈퍼담보로 사용함으로써 우리는 그 잠재력을 최대한 발휘하고 고객에게 비교할 수 없는 보안과 마음의 평화를 제공하는 것을 목표로 합니다.
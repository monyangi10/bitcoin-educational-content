description: |
  Muri Debifi, tuba munsi y'ijambo ry'ikirundi ry'uko "Ufise amahera yawe." Twemera ububasha bwa Bitcoin atari nk’umutungo gusa ahubwo nk’inkingi y’ukwigenga mu vy’amahera. Ibikorwa vyacu bishingiye ku ciyumviro c'uko "Ntukigere ugurisha. Guza." Ivyo bisigura ko ushobora gukoresha amafaranga yawe ya Bitcoin nk’ingwati kugira ngo ubone inguzanyo utatandukanye n’itunga ryawe. "Fata Imfunguruzo Zawe" ni ikintu kirenze invugo kuri twebwe; ni Commitment kugira ngo umenye neza ko uguma ugenzura Bitcoin yawe. Inyishu zacu zitari izo gucungera amafaranga zishimika ku kamaro dushira ku kuroranirwa kwa Bitcoin mu guhingura kazoza kacu k’ivy’ubutunzi. Mu gukoresha Bitcoin nk’ingwati nini, dufise intumbero yo gufungura ubushobozi bwayo bwose no guha abakiriya bacu umutekano n’amahoro yo mu mutima bitagira uko bingana.
description: |
  Debifi'de "Paranıza sahip çıkın" mantığıyla yaşıyoruz Bitcoin'in gücüne sadece bir varlık olarak değil, aynı zamanda finansal bağımsızlık için bir dayanak olarak inanıyoruz. Hizmetlerimiz "Asla satma. Ödünç alın." Bu, varlıklarınızdan ayrılmadan kredileri güvence altına almak için Bitcoin varlıklarınızı teminat olarak kullanabileceğiniz anlamına gelir. "Anahtarlarınızı Elinizde Tutun" bizim için bir slogandan daha fazlasıdır; Bitcoin'inizin kontrolünün sizde kalmasını sağlamak için bir Commitment'dır. Gözetim dışı çözümlerimiz, Bitcoin'in finansal geleceğimizi şekillendirmedeki başarısına verdiğimiz önemin altını çizmektedir. Bitcoin'i süper teminat olarak kullanarak, tam potansiyelini ortaya çıkarmayı ve müşterilerimize benzersiz bir güvenlik ve gönül rahatlığı sağlamayı amaçlıyoruz.
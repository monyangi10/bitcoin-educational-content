description: |
  Bitshala, Hintli Bitcoin meraklıları tarafından yönetilen, yeni geliştiricilere Bitcoin yolculuklarına başlarken rehberlik etmek ve destek olmak için tasarlanmış, tabandan gelen, topluluk odaklı bir eğitim girişimidir (bir pathshala).
  
  Piyasadaki çok sayıda kurs EVM ve "akıllı sözleşmeler" hakkında yüzeysel dersler sunarken, Bitcoin geliştirme çeşitli teknik alanlarda çok daha derin ve geniş bir anlayış gerektirir.
  
  Bitcoin, Yazılım Mühendisliği, Sistem Mühendisliği, Ağ Protokolü Tasarımı, Oyun Teorisi, Kriptografi, Ekonomi ve piyasalar gibi Karmaşık Sistemlerin Sosyal Dinamiklerini kapsayan multidisipliner bir konudur. Bu karmaşıklık nedeniyle, tam kapsamlı bir Bitcoin kursu oluşturmak neredeyse imkansızdır ve mevcut akademik programlar veya kodlama eğitim kampları bu ihtiyaçları karşılamakta yetersiz kalmaktadır. Sonuç olarak, Bitcoin geliştirmeye yeni başlayanlar genellikle kendilerini internete dağılmış çok sayıda gevşek organize kaynak arasında gezinirken bulurlar.
  
  Bitshala, hevesli Bitcoin geliştiricilerinin benzersiz öğrenme ihtiyaçlarını karşılayan çeşitli açık kaynaklı içeriklerin oluşturulmasını, küratörlüğünü ve yayınlanmasını teşvik ederek bu boşluğu doldurmayı amaçlamaktadır.
  
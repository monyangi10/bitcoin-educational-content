description: |
  비샬라는 인도의 Bitcoin 애호가들이 주도하는 풀뿌리 커뮤니티 중심의 교육 이니셔티브(패스샬라)로, 신규 개발자가 Bitcoin 여정을 시작할 때 안내하고 지원하기 위해 고안되었습니다.
  
  시중의 수많은 교육 과정이 EVM과 "스마트 계약"에 대한 피상적인 강의를 제공하지만, Bitcoin 개발을 위해서는 다양한 기술 분야에 대한 훨씬 더 깊고 폭넓은 이해가 필요합니다.
  
  Bitcoin은 소프트웨어 공학, 시스템 공학, 네트워킹 프로토콜 설계, 게임 이론, 암호화, 경제학, 시장과 같은 복잡한 시스템의 사회적 역학 등을 포괄하는 다학제적 주제입니다. 이러한 복잡성으로 인해 완전히 포괄적인 Bitcoin 과정을 만드는 것은 거의 불가능하며, 기존의 교육 프로그램이나 코딩 부트캠프는 이러한 요구를 충족시키지 못합니다. 그 결과, Bitcoin 개발을 처음 접하는 사람들은 인터넷에 흩어져 있는 느슨하게 정리된 방대한 리소스를 탐색해야 하는 경우가 많습니다.
  
  비샬라는 Bitcoin 개발자의 고유한 학습 요구를 충족하는 다양한 오픈소스 콘텐츠의 제작, 큐레이션 및 게시를 촉진함으로써 이러한 격차를 해소하고자 합니다.
  
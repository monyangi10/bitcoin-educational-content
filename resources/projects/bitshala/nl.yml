description: |
  Bitshala is een grassroots, community-gedreven educatief initiatief (een pathshala) geleid door Indiase Bitcoin enthousiastelingen, ontworpen om nieuwe ontwikkelaars te begeleiden en te ondersteunen tijdens hun Bitcoin reis.
  
  Terwijl veel cursussen oppervlakkige lessen bieden over EVM en "slimme contracten", vereist Bitcoin ontwikkeling een veel dieper en breder begrip van verschillende technische gebieden.
  
  Bitcoin is een multidisciplinair onderwerp dat Software Engineering, Systeem Engineering, Netwerk Protocol Ontwerp, Speltheorie, Cryptografie, Economie en de Sociale Dynamiek van Complexe Systemen zoals markten omvat. Door deze complexiteit is het bijna onmogelijk om een volledige Bitcoin cursus te maken, en bestaande academische programma's of coding boot camps voldoen niet aan deze behoeften. Het resultaat is dat nieuwkomers in Bitcoin ontwikkeling vaak moeten navigeren door een groot aantal losjes georganiseerde bronnen verspreid over het internet.
  
  Bitshala probeert deze leemte op te vullen door het creëren, cureren en publiceren van diverse open-source content, die tegemoet komt aan de unieke leerbehoeften van aspirant Bitcoin ontwikkelaars.
  
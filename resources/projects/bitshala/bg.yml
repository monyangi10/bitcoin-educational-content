description: |
  Битшала е образователна инициатива, ръководена от общността, ръководена от индийски биткойн ентусиасти, която има за цел да насочва и подкрепя новите разработчици, когато те започват своето пътешествие с Bitcoin.
  
  Докато многобройните курсове там предлагат повърхностни уроци по EVM и "умни договори", разработката на Bitcoin изисква много по-дълбоко и широко разбиране на различни технически области.
  
  Bitcoin е мултидисциплинарна тема, която обхваща софтуерното инженерство, системното инженерство, проектирането на мрежови протоколи, теорията на игрите, криптографията, икономиката и социалната динамика на сложни системи като пазарите. Поради тази сложност създаването на напълно изчерпателен курс по Bitcoin е почти невъзможно, а съществуващите академични програми или обучителни лагери за програмиране не успяват да отговорят на тези нужди. В резултат на това новаците в разработването на Bitcoin често се оказват в ситуация да се ориентират в огромен набор от слабо организирани ресурси, разпръснати из интернет.
  
  Bitshala се стреми да запълни тази празнина, като насърчава създаването, подреждането и публикуването на разнообразно съдържание с отворен код, което отговаря на уникалните нужди от обучение на начинаещите разработчици на Bitcoin.
  
description: |
  Bitshala ni umugambi w’inyigisho wo mu rwego rwo hasi, urongowe n’abanyagihugu (a pathshala) uyobowe n’abahindi bakunda Bitcoin, ugenewe kuyobora no gufasha abashasha batera imbere uko batangura urugendo rwabo rwa Bitcoin.
  
  Naho amashure menshi hanze atanga inyigisho zo hejuru ku vyerekeye EVM n’“amasezerano y’ubwenge,” gutegura Bitcoin bisaba ugutahura kwimbitse cane kandi kwagutse ku bijanye n’ubuhinga butandukanye.
  
  Bitcoin ni isomo ry’inyigisho nyinshi rigizwe n’ubuhinga bwa porogarama, ubuhinga bwa sisitemu, uguhingura amasezerano y’imirongo, inyigisho y’imikino, ubuhinga bwo gukingira amakuru, ubutunzi, n’imigenderanire y’imibano y’imirongo ikomeye nk’amasoko. Kubera ivyo bigoranye, guhingura inyigisho yuzuye ya Bitcoin biragoye cane, kandi porogarama z’inyigisho zihari canke amakambi y’ugukora amakode ntizishobora gutorera umuti ivyo bikenewe. Ivyo bituma abashasha mu gutegura Bitcoin kenshi basanga bariko bararondera ibikoresho vyinshi vy’ubuhinga butunganijwe neza binyanyagiye kuri internet.
  
  Bitshala irondera kwuzuza ico kinogo mu guteza imbere uguhingura, ugucungera, no gusohora ibirimwo bitandukanye vy’inkomoko yuguruye bihuye n’ivyo abashaka gukora Bitcoin bakeneye mu kwiga.
  
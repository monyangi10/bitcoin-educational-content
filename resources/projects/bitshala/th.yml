description: |
  Bitshala เป็นโครงการการศึกษาที่ขับเคลื่อนโดยชุมชนระดับรากหญ้า (pathshala) นำโดยผู้ที่ชื่นชอบบิตคอยน์ในอินเดีย ออกแบบมาเพื่อแนะนำและสนับสนุนนักพัฒนารายใหม่ในขณะที่พวกเขาเริ่มต้นการเดินทาง Bitcoin ของพวกเขา
  
  แม้ว่าจะมีหลักสูตรมากมายที่เสนอการเรียนรู้พื้นผิวเกี่ยวกับ EVM และ “สัญญาอัจฉริยะ” แต่การพัฒนา Bitcoin ต้องการความเข้าใจที่ลึกซึ้งและกว้างขวางยิ่งขึ้นในหลากหลายสาขาเทคนิค
  
  Bitcoin เป็นวิชาที่มีหลายสาขาวิชาที่ครอบคลุม วิศวกรรมซอฟต์แวร์ วิศวกรรมระบบ การออกแบบโปรโตคอลเครือข่าย ทฤษฎีเกม การเข้ารหัสลับ เศรษฐศาสตร์ และพลวัตทางสังคมของระบบที่ซับซ้อนเช่นตลาด เนื่องจากความซับซ้อนนี้ การสร้างหลักสูตร Bitcoin ที่ครอบคลุมอย่างเต็มที่จึงแทบจะเป็นไปไม่ได้ และโปรแกรมการศึกษาหรือค่ายฝึกอบรมการเขียนโค้ดที่มีอยู่ไม่สามารถตอบสนองความต้องการเหล่านี้ได้ ส่งผลให้ผู้มาใหม่ในการพัฒนา Bitcoin มักพบว่าตัวเองต้องนำทางผ่านแหล่งข้อมูลที่จัดระเบียบอย่างหลวม ๆ ที่กระจายอยู่ทั่วอินเทอร์เน็ต
  
  Bitshala มุ่งหวังที่จะเติมเต็มช่องว่างนี้โดยส่งเสริมการสร้าง การดูแล และการเผยแพร่เนื้อหาโอเพ่นซอร์สที่หลากหลายซึ่งตอบสนองความต้องการการเรียนรู้ที่ไม่เหมือนใครของนักพัฒนา Bitcoin ที่ต้องการ
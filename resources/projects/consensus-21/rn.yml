description: Consensus21 ni umurongo w’inyigisho ufunguye ushiramwo inyigisho, ukuraho ubukuru, ibizame bihuye, n’imyenda y’amashure. Itera imbere inyigisho yiyobora, ishingiye ku migambi, ifashijwe n’abajanama, igaha ubushobozi abanyeshure bo kwiyumvira neza, gukora ubudandaji, no gutorera umuti ingorane.
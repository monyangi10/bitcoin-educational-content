description: Consensus21 is een open-source onderwijsprotocol dat leren decentraliseert, hiërarchieën, gestandaardiseerde toetsen en studieschulden verwijdert. Het bevordert zelfsturend, projectgebaseerd leren met ondersteuning van mentoren, waardoor leerlingen kritisch denken, ondernemerschap en probleemoplossende vaardigheden verwerven.
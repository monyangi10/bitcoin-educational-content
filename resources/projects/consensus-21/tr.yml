description: Consensus21, öğrenmeyi merkezsizleştiren, hiyerarşileri, standart testleri ve harç borcunu ortadan kaldıran açık kaynaklı bir eğitim protokolüdür. Mentor desteği ile kendi kendini yöneten, proje tabanlı öğrenmeyi teşvik eder, öğrencileri eleştirel düşünme, girişimcilik ve problem çözme becerileriyle güçlendirir.
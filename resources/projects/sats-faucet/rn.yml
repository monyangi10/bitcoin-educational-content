description: |
  Uhembwa muri Bitcoin mu gukina imikino, kugerageza ama apps, kuraba ama video, kwuzuza amatohoza n’ibindi. Mu gihe ukoresha SatsFaucet uzoronka amafaranga, atari Sats. Ibiceri bifise igiciro gifatanye n’idolari ry’Amerika (ibiceri 10k = $1) kandi bishobora guhindurwa igihe cose bigereranywa na Sats. Igitigiri cawe ca Sats ni uguhindura igihe nyaco c’igitigiri c’ibiceri vyawe kandi ntikigereranya igitigiri cawe nyaco. Reka dutangure urugendo rwawe rwo guteranya!
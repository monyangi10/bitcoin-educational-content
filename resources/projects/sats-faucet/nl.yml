description: |
  Krijg betaald in Bitcoin voor het spelen van games, testen van apps, bekijken van video's, invullen van enquêtes en meer. Tijdens het gebruik van SatsFaucet verdien je munten, niet direct Sats. Munten hebben een prijs die gekoppeld is aan de Amerikaanse dollar (10k munten = $1) en kunnen op elk moment worden ingewisseld tegen Sats. Je Sats saldo is een realtime omrekening van je munten saldo en vertegenwoordigt niet je echte saldo. Laten we beginnen met je stacker-reis!
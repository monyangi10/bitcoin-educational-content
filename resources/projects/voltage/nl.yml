description: |
  Voltage is een platform dat enterprise-grade infrastructuur biedt voor de Lightning Network.
  
  Het biedt verschillende diensten om bedrijven en ontwikkelaars te helpen sneller te bouwen, implementeren en schalen op de Lightning Network. De belangrijkste producten zijn Node Hosting voor probleemloos nodebeheer, Surge voor inzichten en waarschuwingen over je node, en Flow voor het eenvoudig aanmaken van Lightning-kanalen. Het platform is ontworpen om totale controle, versleutelde beveiliging en constante online beschikbaarheid te bieden. Voltage biedt ook updates, gidsen en inzichten via zijn blog. Gebruikers kunnen het platform uitproberen met een gratis proefversie van 7 dagen.
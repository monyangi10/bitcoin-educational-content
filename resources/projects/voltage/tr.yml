description: |
  Voltage, Lightning Network için kurumsal düzeyde altyapı sağlayan bir platformdur.
  
  İşletmelerin ve geliştiricilerin Lightning Network'ı daha hızlı oluşturmasına, dağıtmasına ve ölçeklendirmesine yardımcı olmak için çeşitli hizmetler sunar. Temel ürünler arasında sorunsuz düğüm yönetimi için Node Hosting, düğümünüz hakkında içgörüler ve uyarılar için Surge ve Lightning kanallarının kolay oluşturulması için Flow yer alıyor. Platform tam kontrol, şifreli güvenlik ve sürekli çevrimiçi kullanılabilirlik sunmak üzere tasarlanmıştır. Voltage ayrıca blogu aracılığıyla güncellemeler, kılavuzlar ve içgörüler sağlar. Kullanıcılar platformu 7 günlük ücretsiz deneme ile deneyebilirler.
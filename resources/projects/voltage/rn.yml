description: |
  Voltage ni urubuga rutanga ibikorwa remezo vy'urugero rw'ishirahamwe ku Lightning Network. 
  
  Itanga ibikorwa bitandukanye vyo gufasha ubucuruzi n’abategura kwubaka, gukoresha, no gutera imbere kuri Lightning Network vyihuta. Ibintu nyamukuru birimwo Node Hosting kugira ngo ushobore gucunga node ata ngorane, Surge kugira ngo ubone ubumenyi n’imburi ku node yawe, na Flow kugira ngo ushobore kurema imirongo ya Lightning mu buryo bworoshe. Iryo koraniro ryagenewe gutanga ubugenzuzi bwose, umutekano ushizwemwo amakuru, n’uguhora uboneka kuri Internet. Voltage kandi itanga amakuru mashasha, ubuyobozi, n’ubumenyi biciye ku rubuga rwayo. Abakoresha barashobora kugerageza urubuga n’iminsi 7 y’ubuntu.
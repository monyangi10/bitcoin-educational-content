description: |
  Voltage เป็นแพลตฟอร์มที่ให้โครงสร้างพื้นฐานระดับองค์กรสำหรับ Lightning Network
  
  มันมีบริการหลากหลายเพื่อช่วยธุรกิจและนักพัฒนาสร้าง, ปรับใช้, และขยายบน Lightning Network ได้เร็วขึ้น ผลิตภัณฑ์หลักรวมถึง Node Hosting สำหรับการจัดการโหนดที่ไร้ปัญหา, Surge สำหรับข้อมูลเชิงลึกและการแจ้งเตือนเกี่ยวกับโหนดของคุณ, และ Flow สำหรับการสร้างช่องทาง Lightning ได้ง่าย แพลตฟอร์มนี้ถูกออกแบบมาเพื่อให้การควบคุมทั้งหมด, ความปลอดภัยที่เข้ารหัส, และการออนไลน์ตลอดเวลา Voltage ยังให้การอัปเดต, คู่มือ, และข้อมูลเชิงลึกผ่านบล็อกของมัน ผู้ใช้สามารถลองใช้แพลตฟอร์มได้ฟรี 7 วัน
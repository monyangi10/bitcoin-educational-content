description: |
  Voltage는 Lightning Network을 위한 엔터프라이즈급 인프라를 제공하는 플랫폼입니다.
  
  비즈니스와 개발자가 Lightning Network에서 더 빠르게 구축, 배포, 확장할 수 있도록 다양한 서비스를 제공합니다. 주요 제품으로는 번거로움 없는 노드 관리를 위한 노드 호스팅, 노드에 대한 인사이트와 알림을 제공하는 Surge, 라이트닝 채널을 쉽게 생성할 수 있는 Flow가 있습니다. 이 플랫폼은 완벽한 제어, 암호화된 보안, 지속적인 온라인 가용성을 제공하도록 설계되었습니다. 또한 블로그를 통해 업데이트, 가이드, 인사이트를 제공합니다. 사용자는 7일 무료 평가판으로 플랫폼을 사용해 볼 수 있습니다.
description: |
  Voltage е платформа, която осигурява инфраструктура от корпоративен клас за Lightning Network.
  
  Тя предлага различни услуги, които помагат на предприятията и разработчиците да изграждат, внедряват и мащабират Lightning Network по-бързо. Ключовите продукти включват Node Hosting за безпроблемно управление на възли, Surge за прозрения и предупреждения за вашия възел и Flow за лесно създаване на Lightning канали. Платформата е проектирана така, че да предлага пълен контрол, криптирана сигурност и постоянна онлайн наличност. Voltage също така предоставя актуализации, ръководства и прозрения чрез своя блог. Потребителите могат да изпробват платформата с безплатна 7-дневна пробна версия.
description: |
  IBEX is een baanbrekend fintech bedrijf dat Bitcoin en Lightning Network gebaseerde betalingsoplossingen levert. IBEX werd in 2018 opgericht in Guatemala als een Bitcoin-only OTC desk en heeft zich ontwikkeld tot een toonaangevende leverancier van Lightning-as-a-Service infrastructuur. Zijn modulaire API-platform en merchant-oplossingen stellen retailers, e-commerce platforms en financiële instellingen in staat om veilige, snelle en kosteneffectieve Bitcoin betalingen te integreren met wereldwijde real-time settlement. Door naadloze en schaalbare transacties mogelijk te maken, heeft IBEX een cruciale rol gespeeld in het stimuleren van de overstap naar Bitcoin in opkomende markten zoals El Salvador en blijft het strategische partnerschappen aangaan met internationale merken om bestaande financiële systemen te moderniseren.
  
description: |
  IBEX는 Bitcoin 및 Lightning Network 기반 결제 솔루션을 제공하는 선구적인 핀테크 기업입니다. 2018년 과테말라에서 Bitcoin 전용 OTC 데스크로 설립된 IBEX는 서비스형 라이트닝 인프라의 선도적인 공급업체로 발전해 왔습니다. 모듈형 API 플랫폼과 판매자 솔루션을 통해 소매업체, 이커머스 플랫폼, 금융기관은 안전하고 빠르며 비용 효율적인 Bitcoin 결제와 실시간 글로벌 결제를 통합할 수 있습니다. IBEX는 원활하고 확장 가능한 거래를 촉진함으로써 엘살바도르와 같은 신흥 시장에서 Bitcoin 채택을 촉진하는 데 중요한 역할을 해왔으며, 레거시 금융 시스템을 현대화하기 위해 국제 브랜드와 전략적 파트너십을 지속적으로 구축해 나가고 있습니다.
  
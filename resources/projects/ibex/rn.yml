description: |
  IBEX ni ishirahamwe ry’ubuhinga bwa none ry’ubuhinga bwa none ritanga inyishu zo kwishura zishingiye kuri Bitcoin na Lightning Network. Yashinzwe mu 2018 muri Guatemala nk’ibiro vy’ubuhinga bwa Bitcoin gusa, IBEX yarateye imbere iba umuhinga mu gutanga ibikorwa remezo vy’umuravyo nk’igikorwa. Igikoresho caco ca API c’ibice n’imiti y’abacuruzi bituma abacuruzi, ibikoresho vy’ubudandaji vyo kuri interineti, n’ibigo vy’ivy’imari bishobora gushiramwo amahera ya Bitcoin atekanye, yihuta kandi atari menshi n’ugutanga amahera kw’isi yose mu gihe nyaco. Mu gufasha mu gucuruza ata nkomanzi kandi bishobora gutera imbere, IBEX yarafise uruhara runini mu gutuma Bitcoin yemerwa mu masoko ariko aratera imbere nka El Salvador kandi irabandanya gukorana n’ibigo mpuzamakungu kugira ngo ihindure uburyo bw’ivy’ubutunzi bwa kera.
  
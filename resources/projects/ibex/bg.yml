description: |
  IBEX е пионерска финтех компания, която предлага платежни решения, базирани на Bitcoin и Lightning Network. Основана през 2018 г. в Гватемала като извънборсово бюро, работещо само с Bitcoin, IBEX се превърна във водещ доставчик на инфраструктура Lightning-as-a-Service. Нейната модулна платформа API и решения за търговци позволяват на търговците на дребно, платформите за електронна търговия и финансовите институции да интегрират сигурни, бързи и рентабилни плащания Bitcoin с глобален сетълмент в реално време. Като улеснява безпроблемните и мащабируеми транзакции, IBEX изигра решаваща роля в стимулирането на приемането на Bitcoin на нововъзникващи пазари като Ел Салвадор и продължава да създава стратегически партньорства с международни марки за модернизиране на старите финансови системи.
  
description: |
  Satsback ni urubuga rwo gutanga impembo n’ugusubiza amahera rutera intege abantu gukoresha amahera buri musi mu guha abarukoresha satoshis—ibice bitobito kuruta ibindi vyose vya Bitcoin. Satsback ikorana n’abaguzi batandukanye, iremesha abaguzi kuronka Bitcoin ku vyo bagura, gutyo bikaba bitera imbere mu kwemera cane amafaranga y’ubuhinga bwa none mu gihe itanga inyungu ziboneka ku bakoresha.
  
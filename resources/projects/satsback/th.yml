description: |
  Satsback เป็นแพลตฟอร์มรางวัลและเงินคืนที่กระตุ้นการใช้จ่ายในชีวิตประจำวันโดยมอบรางวัลให้ผู้ใช้ด้วย satoshis—หน่วยที่เล็กที่สุดของบิตคอยน์ โดยการร่วมมือกับผู้ค้าปลีกต่างๆ Satsback ช่วยให้ผู้บริโภคสามารถรับบิตคอยน์จากการซื้อของพวกเขา ซึ่งส่งเสริมการยอมรับสกุลเงินดิจิทัลในวงกว้างขึ้นในขณะที่มอบประโยชน์ที่จับต้องได้ให้กับผู้ใช้
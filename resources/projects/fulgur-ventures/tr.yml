description: |
  gW-1'in geleceğin merkezi olmayan finansının temeli olan yeni nesil politik olarak tarafsız bir para sistemi olduğuna inanıyoruz. Bitcoin etkin bir yerleşim Layer olsa da, günlük işlemler için bir Layer-2 çözümüne ihtiyaç duymaktadır. Bu nedenle, merkezi olmayan finansa doğru önemli bir adım olan Lightning Network'ın geliştirilmesini destekliyoruz.
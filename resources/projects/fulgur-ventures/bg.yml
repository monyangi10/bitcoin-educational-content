description: |
  ние вярваме в Bitcoin като политически неутрална парична система от следващо поколение, основа за децентрализираните финанси на бъдещето. Въпреки че Bitcoin е ефикасен слой за сетълмент, тя се нуждае от решение Layer-2 за ежедневните транзакции. Ето защо подкрепяме разработването на Lightning Network - съществена стъпка към децентрализираните финанси.
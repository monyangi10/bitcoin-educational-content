description: |
  twemera Bitcoin nk’uburyo bw’amahera butagira aho bugarukira mu vya politike bw’uruvyaro ruzokurikira, umushinge w’amahera yegerejwe muri kazoza. Naho Bitcoin ari uburyo bwiza bwo gutorera umuti Layer, ikeneye umuti wa Layer-2 ku bikorwa vya misi yose. Ni co gituma dushigikira iterambere rya Lightning Network - intambwe ihambaye mu bijanye n’ivy’ubutunzi vy’intara.
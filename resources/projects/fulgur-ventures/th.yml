description: |
  เราเชื่อใน Bitcoin ว่าเป็นระบบการเงินรุ่นถัดไปที่เป็นกลางทางการเมือง ซึ่งเป็นรากฐานสำหรับการเงินแบบกระจายศูนย์ในอนาคต แม้ว่า Bitcoin จะเป็นชั้นการชำระบัญชีที่มีประสิทธิภาพ แต่ก็ต้องการโซลูชัน Layer-2 สำหรับการทำธุรกรรมในชีวิตประจำวัน นั่นคือเหตุผลที่เราสนับสนุนการพัฒนา Lightning Network - ซึ่งเป็นขั้นตอนสำคัญสู่การเงินแบบกระจายศูนย์
description: |
  wij geloven in Bitcoin als een politiek neutraal monetair systeem van de volgende generatie, de basis voor gedecentraliseerde financiën van de toekomst. Terwijl Bitcoin een efficiënte Layer vereffening is, heeft het een Layer-2 oplossing nodig voor alledaagse transacties. Daarom steunen wij de ontwikkeling van de Lightning Network - een essentiële stap naar gedecentraliseerde financiën.
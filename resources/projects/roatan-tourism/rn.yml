description: |
  Ibiro vy’ubukerarugendo vya Roatan ni ishirahamwe ry’abikorera ku giti cabo, ritagira aho rigarukira kuri Leta (ONG), rigamije gutera intege no guteza imbere ubuzima n’iterambere ry’ubukerarugendo bwa Roatan. Guteza imbere Roatan, nk’izinga ry’ingendo ry’imbere (mu gihugu no hanze) ni co kintu nyamukuru Ibiro vyibandako. Roatan.Online yatangujwe mu ntango z’umwaka w’2017 nk’ikinyamakuru co kuri internet n’ihuriro ry’ingendo. Mu mpera z’uwo mwaka, twatanguje Ibiro vy’Ubukerarugendo vy’i Roatan nk’ishirahamwe riterwa inkunga n’abantu ku giti cabo ry’uguteza imbere Roatan n’abayishigikiye. Intumbero yacu ni ugutuma Roatan ishobora kuboneka ku rubuga rwa interineti biciye ku buhinga bushasha bwo kwamamaza ku rubuga rwa interineti be n’ibibanza bishasha vyo kuri internet n’uburyo bushasha bwo gukoresha.
  
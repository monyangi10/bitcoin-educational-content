description: |
  GLOBAL PAYMENTS DECENTRALIZED. LIGHTNING ECOSYSTEM AMPLIFIED. Verujemo u potencija Lightning Network da demokratizuje plaćanja za svet i omogući pojedincima da poseduju svoju finansijsku sudbinu. Vođeni ovom vizijom, c= pojačava lightning ekosistem pružajući našu likvidnost, usluge i infrastrukturu koja omogućava svima da imaju koristi od brzih, niskotroškovnih globalnih plaćanja.
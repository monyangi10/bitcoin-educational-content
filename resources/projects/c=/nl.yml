description: |
  WERELDWIJDE BETALINGEN GEDECENTRALISEERD. BLIKSEM ECOSYSTEEM VERSTERKT. Wij geloven in het potentieel van de Lightning Network om betalingen voor de wereld te democratiseren en individuen in staat te stellen hun financiële lot in eigen handen te nemen. Geleid door deze visie, versterkt c= het lightning ecosysteem door onze liquiditeit, diensten en infrastructuur aan te bieden waardoor iedereen kan profiteren van snelle, goedkope wereldwijde betalingen.
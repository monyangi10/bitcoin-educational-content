description: |
  MALIPO YA ULIMWENGUNI YALIPUNGUZWA MADARAKA. ECOSYSTEM YA UMEME IMEONGEZWA. Tunaamini katika uwezo wa Lightning Network kuweka malipo ya kidemokrasia kwa ulimwengu na kuwawezesha watu binafsi kumiliki hatima yao ya kifedha. Kwa kuongozwa na maono haya, c= inakuza mfumo ikolojia wa umeme kwa kutoa ukwasi wetu, huduma, na miundombinu inayowezesha kila mtu kufaidika na malipo ya haraka na ya bei nafuu duniani.
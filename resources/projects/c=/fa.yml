description: |
  پرداخت‌های جهانی غیرمتمرکز. اکوسیستم لایتنینگ تقویت شده. ما به پتانسیل Lightning Network برای دموکراتیزه کردن پرداخت‌ها برای جهان و توانمندسازی افراد برای مالکیت بر سرنوشت مالی خود باور داریم. با هدایت این چشم‌انداز، c= اکوسیستم لایتنینگ را با ارائه نقدینگی، خدمات و زیرساخت‌های خود که به همه امکان بهره‌مندی از پرداخت‌های سریع و کم‌هزینه جهانی را می‌دهد، تقویت می‌کند.
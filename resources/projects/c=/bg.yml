description: |
  ДЕЦЕНТРАЛИЗИРАНИ ГЛОБАЛНИ ПЛАЩАНИЯ. МЪЛНИЕНОСНА ЕКОСИСТЕМА.
  Вярваме в потенциала на мрежата lightning да демократизира плащанията по света и да даде възможност на хората да управляват своята финансова съдба.
  Ръководейки се от тази визия, c= усилва екосистемата на lightning, като предоставя нашата ликвидност, услуги и инфраструктура, които позволяват на всеки да се възползва от бързи и евтини глобални плащания.
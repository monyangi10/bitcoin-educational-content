description: |
  การชำระเงินทั่วโลกแบบกระจายศูนย์ ระบบนิเวศของ LIGHTNING ขยายตัว เรามีความเชื่อในศักยภาพของเครือข่าย lightning ที่จะทำให้การชำระเงินเป็นประชาธิปไตยสำหรับโลกและช่วยให้บุคคลสามารถควบคุมชะตากรรมทางการเงินของตนเอง ด้วยวิสัยทัศน์นี้ c= กำลังขยายระบบนิเวศของ lightning โดยการให้บริการสภาพคล่อง บริการ และโครงสร้างพื้นฐานของเรา ซึ่งช่วยให้ทุกคนได้รับประโยชน์จากการชำระเงินทั่วโลกที่รวดเร็วและมีต้นทุนต่ำ
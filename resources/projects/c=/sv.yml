description: |
  GLOBALA BETALNINGAR DECENTRALISERADE. BLIXTENS EKOSYSTEM FÖRSTÄRKS. Vi tror på Lightning Network:s potential att demokratisera betalningar för hela världen och göra det möjligt för individer att äga sitt ekonomiska öde. Med denna vision som ledstjärna förstärker c= Lightning-ekosystemet genom att tillhandahålla likviditet, tjänster och infrastruktur som gör det möjligt för alla att dra nytta av snabba globala betalningar till låg kostnad.
description: |
  GLOBALNE PŁATNOŚCI ZDECENTRALIZOWANE. WZMOCNIONY EKOSYSTEM LIGHTNING. Wierzymy w potencjał Lightning Network do demokratyzacji płatności na świecie i umożliwienia jednostkom posiadania własnego losu finansowego. Kierując się tą wizją, c= wzmacnia ekosystem lightning, zapewniając naszą płynność, usługi i infrastrukturę, która umożliwia każdemu korzystanie z szybkich, tanich płatności globalnych.
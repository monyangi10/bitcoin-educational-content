description: |
  MERKEZİ OLMAYAN KÜRESEL ÖDEMELER. LIGHTNING EKOSISTEMI GÜÇLENDIRILDI. Lightning Network'ın dünya için ödemeleri demokratikleştirme ve bireylerin finansal kaderlerine sahip olmalarını sağlama potansiyeline inanıyoruz. Bu vizyonun rehberliğinde c=, herkesin hızlı ve düşük maliyetli küresel ödemelerden yararlanmasını sağlayan likiditemizi, hizmetlerimizi ve altyapımızı sağlayarak lightning ekosistemini güçlendiriyor.
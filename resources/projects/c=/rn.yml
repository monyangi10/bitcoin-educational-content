description: |
  IVYO KWISHURWA KW’ISI YOSE VYASHIKIRIJWE. UBURYO BW’IBIDUKIKIJO BW’UMURARO BUKOMEZWE. Twemera ubushobozi bwa Lightning Network bwo gutuma amahera yishurwa kw’isi yose agira demokarasi no gutuma abantu ku giti cabo bagira aho bazoshika mu vy’amahera. Iyobowe n’iryo yerekwa, c= iriko irakomeza ibidukikije vy’umuravyo mu gutanga amahera yacu, ibikorwa, n’ibikorwa remezo bishoboza umuntu wese kwungukira ku kwishura kw’isi yose vyihuta kandi bihenda.
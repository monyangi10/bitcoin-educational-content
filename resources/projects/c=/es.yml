description: |
  PAGOS GLOBALES DESCENTRALIZADOS. ECOSISTEMA DE LIGHTNING AMPLIFICADO. Creemos en el potencial de la red lightning para democratizar los pagos en todo el mundo y permitir a las personas ser dueñas de su destino financiero. Guiados por esta visión, c= está amplificando el ecosistema de lightning al proporcionar nuestra liquidez, servicios e infraestructura que permiten a todos beneficiarse de pagos globales rápidos y de bajo costo.
description: |
  Berlín El Salvador je inicijativa pokrenuta 2023. godine s ciljem uspostavljanja cirkularne ekonomije u lokalnom gradu. Nakon što su lokalni i međunarodni volonteri započeli obrazovni projekat, proširili su se na stvaranje Bitcoin centra. Ovaj centar nudi Bitcoin edukaciju, časove engleskog jezika i obuku za preduzetništvo. Pored toga, organizuje podkast i redovne sastanke, te je organizovao prvu konferenciju Economia Bitcoin u aprilu 2024. godine. Grad je sada jedna od najbrže rastućih Bitcoin zajednica na globalnom nivou, sa preko 120 preduzeća koja prihvataju Bitcoin.
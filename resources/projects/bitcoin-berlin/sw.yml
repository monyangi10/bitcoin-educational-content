description: |
  Berlín El Salvador ni mpango uliozinduliwa mnamo 2023 ili kuanzisha uchumi wa mzunguko katika mji wa ndani. Baada ya wajitoleaji wa ndani na wa kimataifa kuanza mradi wa elimu, walipanuka na kuunda kituo cha Bitcoin. Kituo hiki kinatoa elimu ya Bitcoin, madarasa ya Kiingereza, na mafunzo ya ujasiriamali. Zaidi ya hayo, huandaa podikasti na mikutano ya mara kwa mara, na kuandaa mkutano wa kwanza wa Economia Bitcoin mwezi Aprili 2024. Jiji hilo sasa ni mojawapo ya jumuiya zinazokua kwa kasi zaidi duniani za Bitcoin, na zaidi ya biashara 120 zinakubali Bitcoin.
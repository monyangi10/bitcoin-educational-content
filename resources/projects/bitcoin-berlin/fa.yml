description: |
  برلین السالوادور یک ابتکار است که در سال ۲۰۲۳ برای ایجاد یک اقتصاد چرخشی در یک شهر محلی راه‌اندازی شد. پس از اینکه داوطلبان محلی و بین‌المللی پروژه آموزشی را آغاز کردند، آن‌ها به ایجاد یک مرکز Bitcoin گسترش یافتند. این مرکز آموزش Bitcoin، کلاس‌های انگلیسی و آموزش کارآفرینی ارائه می‌دهد. علاوه بر این، یک پادکست و ملاقات‌های منظم را میزبانی می‌کند و اولین کنفرانس Economia Bitcoin را در آوریل ۲۰۲۴ سازماندهی کرد. این شهر اکنون یکی از سریع‌ترین جوامع در حال رشد Bitcoin در سطح جهانی است، با بیش از ۱۲۰ کسب‌وکار که Bitcoin را می‌پذیرند.
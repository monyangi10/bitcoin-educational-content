description: |
  Berlín El Salvador to inicjatywa rozpoczęta w 2023 r. w celu ustanowienia gospodarki o obiegu zamkniętym w lokalnym mieście. Po tym, jak lokalni i międzynarodowi wolontariusze rozpoczęli projekt edukacyjny, rozszerzyli go, tworząc centrum Bitcoin. Centrum to oferuje edukację Bitcoin, lekcje języka angielskiego i szkolenia z zakresu przedsiębiorczości. Ponadto jest gospodarzem podcastu i regularnych spotkań, a w kwietniu 2024 r. zorganizowało pierwszą konferencję Economia Bitcoin. Miasto jest obecnie jedną z najszybciej rozwijających się społeczności Bitcoin na świecie, z ponad 120 firmami akceptującymi Bitcoin.
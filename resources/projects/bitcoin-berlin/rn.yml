description: |
  Berlín El Salvador ni umugambi watangujwe mu 2023 wo gushinga ubutunzi buzunguruka mu gisagara co mu karere. Abakozi b’intahemuka bo mu gihugu no hanze y’igihugu bamaze gutangura umugambi w’uburezi, baragwije kugira ngo bareme ikigo ca Bitcoin. Ico kigo gitanga inyigisho za Bitcoin, amashure y’icongereza, n’amahugurwa ku bijanye n’ubudandaji.
  Ikindi, irakira ikiganiro ca podcast n’amakoraniro adasanzwe, kandi yatunganije inama ya mbere y’ubutunzi Bitcoin muri Ndamukiza 2024. Igisagara ubu ni kimwe mu bihugu bitera imbere cane kw’isi yose, n’ubucuruzi burenga 120 bwemera Bitcoin.
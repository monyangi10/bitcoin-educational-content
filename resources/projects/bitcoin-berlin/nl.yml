description: |
  Berlín El Salvador is een initiatief dat in 2023 werd gelanceerd om een circulaire economie op te zetten in een lokale stad. Nadat lokale en internationale vrijwilligers begonnen met het onderwijsproject, breidden ze uit om een Bitcoin centrum op te zetten. Dit centrum biedt Bitcoin onderwijs, Engelse lessen en ondernemerschapstraining.
  Daarnaast organiseert het een podcast en regelmatige meetups, en organiseerde het de eerste Economia Bitcoin conferentie in april 2024. De stad is nu een van de snelst groeiende Bitcoin gemeenschappen wereldwijd, met meer dan 120 bedrijven die Bitcoin accepteren.
description: |
  베린 엘살바도르는 지역 마을에 순환 경제를 구축하기 위해 2023년에 시작된 이니셔티브입니다. 현지 및 국제 자원봉사자들이 교육 프로젝트를 시작한 후 이를 확장하여 Bitcoin 센터를 설립했습니다. 이 센터에서는 Bitcoin 교육, 영어 수업, 기업가 정신 교육을 제공합니다. 또한 팟캐스트와 정기적인 밋업을 주최하고, 2024년 4월에는 제1회 이코노미아 Bitcoin 컨퍼런스를 개최했습니다. 현재 이 마을은 전 세계에서 가장 빠르게 성장하는 Bitcoin 커뮤니티 중 하나로, 120개 이상의 기업이 Bitcoin을 받아들이고 있습니다.
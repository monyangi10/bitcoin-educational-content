description: |
  Berlín El Salvador เป็นโครงการที่เปิดตัวในปี 2023 เพื่อสร้างเศรษฐกิจหมุนเวียนในเมืองท้องถิ่น หลังจากที่อาสาสมัครท้องถิ่นและนานาชาติเริ่มโครงการการศึกษา พวกเขาได้ขยายไปสร้างศูนย์ Bitcoin ศูนย์นี้มีการศึกษา Bitcoin, ชั้นเรียนภาษาอังกฤษ, และการฝึกอบรมผู้ประกอบการ

  นอกจากนี้ยังมีพอดแคสต์และการพบปะสังสรรค์เป็นประจำ และจัดการประชุม Economia Bitcoin ครั้งแรกในเดือนเมษายน 2024 เมืองนี้กลายเป็นหนึ่งในชุมชน Bitcoin ที่เติบโตเร็วที่สุดในโลก โดยมีธุรกิจกว่า 120 แห่งที่ยอมรับ Bitcoin
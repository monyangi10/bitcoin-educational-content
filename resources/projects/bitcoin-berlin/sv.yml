description: |
  Berlín El Salvador är ett initiativ som lanserades 2023 för att etablera en cirkulär ekonomi i en lokal stad. Efter att lokala och internationella volontärer påbörjat utbildningsprojektet expanderade de för att skapa ett Bitcoin-center. Detta center erbjuder Bitcoin-utbildning, engelskakurser och entreprenörskapsutbildning. Dessutom är det värd för en podcast och regelbundna möten, och organiserade den första Economia Bitcoin-konferensen i april 2024. Staden är nu ett av de snabbast växande Bitcoin-samhällena globalt, med över 120 företag som accepterar Bitcoin.
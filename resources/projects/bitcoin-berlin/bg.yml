description: |
  Берлин Салвадор е инициатива, стартирала през 2023 г., за създаване на кръгова икономика в местен град. След като местни и международни доброволци започват образователен проект, те се разширяват, за да създадат център Bitcoin. Този център предлага Bitcoin образование, курсове по английски език и обучение по предприемачество. Освен това той е домакин на подкаст и редовни срещи, а през април 2024 г. организира първата конференция Economia Bitcoin. Понастоящем градът е една от най-бързо развиващите се Bitcoin общности в световен мащаб, с над 120 предприятия, приемащи Bitcoin.
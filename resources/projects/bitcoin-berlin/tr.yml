description: |
  Berlín El Salvador, yerel bir kasabada döngüsel bir ekonomi kurmak için 2023 yılında başlatılan bir girişimdir. Yerel ve uluslararası gönüllüler eğitim projesine başladıktan sonra, bir Bitcoin merkezi oluşturmak için genişlediler. Bu merkezde Bitcoin eğitimi, İngilizce dersleri ve girişimcilik eğitimi veriliyor. Ayrıca, bir podcast ve düzenli buluşmalara ev sahipliği yapıyor ve Nisan 2024'te ilk Economia Bitcoin konferansını düzenledi. Kasaba şu anda Bitcoin kabul eden 120'den fazla işletmeyle küresel olarak en hızlı büyüyen Bitcoin topluluklarından biri.
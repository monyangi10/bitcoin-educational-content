description: |
  Lightning Ventures stoi na czele wyłaniającego się krajobrazu Bitcoin venture capital. Wierzymy, że Bitcoin jest globalnym aktywem pieniężnym przyszłości przyszłości i inwestujemy w firmy, które są zgodne z sukcesem Bitcoin.

  Każdy, kto próbował naprawdę zrozumieć Bitcoin, wie, że królicza nora jest głęboka dziura jest głęboka. Jeśli chcesz dowiedzieć się więcej o Bitcoin i o tym, dlaczego zbudowaliśmy wokół niego całą naszą strategię inwestycyjną.
description: |
  Lightning Ventures อยู่ในแนวหน้าของภูมิทัศน์การร่วมทุน Bitcoin ที่กำลังเกิดขึ้นใหม่ เราเชื่อว่า Bitcoin คือสินทรัพย์ทางการเงินระดับโลกแห่งอนาคต และเราลงทุนในบริษัทที่สอดคล้องกับความสำเร็จของ Bitcoin

  ทุกคนที่พยายามทำความเข้าใจ Bitcoin อย่างแท้จริงรู้ว่ารูหนูนั้นลึก หากคุณสนใจที่จะเจาะลึกเกี่ยวกับ Bitcoin และเหตุผลที่เราสร้างกลยุทธ์การลงทุนทั้งหมดของเรารอบ ๆ มัน
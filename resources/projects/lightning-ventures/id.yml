description: |
  Lightning Ventures berdiri di garis depan dalam lanskap modal ventura Bitcoin yang sedang berkembang lanskap modal ventura yang sedang berkembang. Kami percaya bahwa Bitcoin adalah moneter global masa depan, dan kami berinvestasi di perusahaan yang sejalan dengan kesuksesan Bitcoin.

  Setiap orang yang telah berusaha untuk benar-benar memahami Bitcoin tahu bahwa kelinci itu lubang yang dalam. Jika Anda tertarik untuk mempelajari lebih dalam tentang Bitcoin dan mengapa kami membangun seluruh strategi investasi kami di sekitarnya.
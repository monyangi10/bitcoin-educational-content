description: |
  Lightning Ventures е в челните редици на нововъзникващата Bitcoin рисковия капитал. Ние вярваме, че Bitcoin е глобалната парична на бъдещето и инвестираме в компании, които са в съответствие с успеха на Bitcoin.

  Всеки, който се е опитал да разбере Bitcoin, знае, че заекът е дълбока. Ако се интересувате от задълбочаване на темата за Bitcoin и защо сме изградихме цялата си инвестиционна стратегия около него.
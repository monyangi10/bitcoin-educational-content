description: |
  Lightning Ventures står i spissen for det fremvoksende Bitcoin venturekapital-landskapet. Vi tror at Bitcoin er fremtidens globale monetære fremtidens globale monetære ressurs, og vi investerer i selskaper som er i tråd med suksessen til Bitcoin.

  Alle som har forsøkt å forstå Bitcoin, vet at kaninhullet er dypt kaninhullet er dypt. Hvis du er interessert i å gå dypere inn i Bitcoin og hvorfor vi har bygget hele investeringsstrategien vår rundt det.
description: |
  Lightning Ventures ligger i framkant av det framväxande Bitcoin riskkapitallandskap. Vi tror att Bitcoin är den globala monetära framtida monetära tillgång, och vi investerar i företag som är i linje med framgången för Bitcoin.

  Alla som har försökt att verkligen förstå Bitcoin vet att kaninhålet är djupt hålet är djupt. Om du är intresserad av att gå djupare in på Bitcoin och varför vi har byggt hela vår investeringsstrategi runt den.
description: |
  Lightning Ventures steht an der Spitze der entstehenden Bitcoin risikokapitallandschaft. Wir glauben, dass Bitcoin der globale Geldwert der Zukunft ist geldwert der Zukunft ist, und wir investieren in Unternehmen, die auf den Erfolg von Bitcoin PASSEN.

  Jeder, der versucht hat, Bitcoin wirklich zu verstehen, weiß, dass der Kaninchenbau loch tief ist. Wenn Sie daran interessiert sind, mehr über Bitcoin zu erfahren und warum wir unsere gesamte Anlagestrategie darauf aufgebaut haben.
description: |
  A Lightning Ventures está na vanguarda do emergente cenário de capital de risco Bitcoin e de capital de risco. Acreditamos que o Bitcoin é o ativo monetário global global do futuro, e investimos em empresas que se alinham com o sucesso do Bitcoin.

  Todos os que procuraram compreender verdadeiramente o Bitcoin sabem que a toca do coelho é profunda. Se estiver interessado em aprofundar o Bitcoin e porque é que nós construímos toda a nossa estratégia de investimento em torno dele.
description: |
  Lightning Ventures stoji na čelu nove Bitcoin venture capital scene. Verujemo da je Bitcoin globalna monetarna imovina budućnosti, i investiramo u kompanije koje su u skladu sa uspehom Bitcoin.

  Svi koji su pokušali da zaista razumeju Bitcoin znaju da je zečja rupa duboka. Ako ste zainteresovani da dublje istražite Bitcoin i zašto smo izgradili celu našu investicionu strategiju oko njega.
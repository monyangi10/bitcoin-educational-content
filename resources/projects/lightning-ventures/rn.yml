description: |
  Ishirahamwe ry’umuravyo rihagaze ku ruhande rw’imbere mu bikorwa vy’ubuhinga bwa none bita Bitcoin. ivyerekeye umutungo w’ubudandaji. Twemera ko Bitcoin ari amafaranga y’isi yose . umutungo wa kazoza, kandi dushiramwo amahera mu masosiyete ahuye n’ukuroranirwa kw’ Bitcoin.

  Umuntu wese yarondeye gutahura vy’ukuri Bitcoin arazi ko iyo nkwavu . umwobo ni muremure. Niba ushaka kuja kure cane kuri Bitcoin n’igituma twa yubatse ingamba zacu zose z’ishoramari zikikuje.
description: |
  Lightning Ventures đứng đầu trong bối cảnh đầu tư mạo hiểm Bitcoin mới nổi. Chúng tôi tin rằng Bitcoin là tài sản tiền tệ toàn cầu của tương lai và chúng tôi đầu tư vào các công ty phù hợp với thành công của Bitcoin.

  Bất kỳ ai đã tìm cách thực sự hiểu Bitcoin đều biết rằng hang thỏ rất sâu. Nếu bạn muốn tìm hiểu sâu hơn về Bitcoin và lý do tại sao chúng tôi xây dựng toàn bộ chiến lược đầu tư của mình xung quanh nó.
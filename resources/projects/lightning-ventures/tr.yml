description: |
  Lightning Ventures, gelişmekte olan Bitcoin'ın ön saflarında yer alıyor girişim sermayesi ortamı. Bitcoin'ın küresel para birimi olduğuna inanıyoruz geleceğin varlığıdır ve biz de bu varlığın başarısıyla uyumlu şirketlere yatırım yapıyoruz Bitcoin.

  Bitcoin'ı gerçekten anlamaya çalışan herkes bilir ki tavşan delik derin. Bitcoin hakkında daha derine inmekle ilgileniyorsanız ve neden tüm yatırım stratejimizi bunun üzerine kurduk.
description: |
  Lightning Ventures находится в авангарде развивающегося рынка Bitcoin венчурного капитала. Мы считаем, что Bitcoin - это глобальный денежный активом будущего, и мы инвестируем в компании, которые стремятся к успеху Bitcoin.

  Каждый, кто пытался по-настоящему понять Bitcoin, знает, что кроличья нора кроличья нора очень глубока. Если вам интересно узнать больше о Bitcoin и о том, почему мы мы построили всю нашу инвестиционную стратегию вокруг него.
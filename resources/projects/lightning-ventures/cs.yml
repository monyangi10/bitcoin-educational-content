description: |
  Společnost Lightning Ventures stojí v čele vznikajícího Bitcoin rizikového kapitálu. Věříme, že Bitcoin je globální peněžní budoucnosti, a investujeme do společností, které jsou v souladu s úspěchem Bitcoin.

  Každý, kdo se snažil skutečně porozumět Bitcoin, ví, že králíček je hluboká. Pokud máte zájem proniknout hlouběji do problematiky Bitcoin a proč jsme se na něm postavili celou naši investiční strategii.
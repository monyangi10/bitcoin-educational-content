description: |
  Lightning Ventures est à l'avant-garde du paysage émergent du capital-risque Bitcoin en matière de capital-risque. Nous pensons que le Bitcoin est l'actif monétaire de l'avenir, et nous investissons dans des entreprises qui s'alignent sur le succès du Bitcoin.

  Tous ceux qui ont cherché à comprendre le Bitcoin savent que le terrier est profond est profond. Si vous souhaitez en savoir plus sur le Bitcoin et sur les raisons pour lesquelles nous avons avons construit toute notre stratégie d'investissement autour de lui.
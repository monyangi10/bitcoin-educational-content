description: |
  Швейцарска фондация с нестопанска цел, ангажирана със защитата на цифровите права. STF работи за запазване на надеждността, поверителността и оперативната съвместимост на интернет, по-специално чрез разработването на Session - децентрализиран, сигурен и свободен от оторизация комуникационен протокол, използван в съобщенията Session. Действията на организацията са част от визията за свободен и отворен интернет, който зачита неприкосновеността на личния живот.
description: |
  Zwitserse stichting zonder winstoogmerk die zich inzet voor de verdediging van digitale rechten. STF werkt aan het behoud van de robuustheid, vertrouwelijkheid en interoperabiliteit van het internet, met name door de ontwikkeling van Session, een gedecentraliseerd, veilig en autorisatievrij communicatieprotocol dat wordt gebruikt in Session messaging. Haar acties maken deel uit van een visie van een vrij, open internet dat privacy respecteert.
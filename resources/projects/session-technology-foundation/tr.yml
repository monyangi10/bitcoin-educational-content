description: |
  Dijital hakların savunulmasına kendini adamış, kâr amacı gütmeyen İsviçre vakfı. STF, özellikle Oturum mesajlaşmasında kullanılan merkezi olmayan, güvenli ve yetkisiz bir iletişim protokolü olan Session'ın geliştirilmesi yoluyla İnternet'in sağlamlığını, gizliliğini ve birlikte çalışabilirliğini korumak için çalışmaktadır. STF'nin eylemleri, gizliliğe saygı duyan özgür ve açık bir İnternet vizyonunun bir parçasıdır.
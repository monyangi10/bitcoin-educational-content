description: |
  Ishirahamwe ry'Ubusuwisi ridaharanira inyungu ryiyemeje kugwanira uburenganzira bwa none. STF ikora kugira ngo Internet izigame ubukomezi, ibanga n’ugukorana neza, cane cane biciye mu gutegura Session, uburyo bwo guhanahana amakuru bushizwe ahantu hamwe, butekanye kandi butagira uruhusha bukoreshwa mu gutanga ubutumwa bwa Session. Ivyo ikora biri mu ciyumviro c’iyerekwa ry’Internet y’ubuntu, yuguruye, yubaha ubuzima bwite.
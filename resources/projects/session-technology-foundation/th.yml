description: |
  มูลนิธิไม่แสวงหาผลกำไรในสวิตเซอร์แลนด์ที่มุ่งมั่นในการปกป้องสิทธิ์ดิจิทัล STF ทำงานเพื่อรักษาความแข็งแกร่ง ความลับ และความสามารถในการทำงานร่วมกันของอินเทอร์เน็ต โดยเฉพาะอย่างยิ่งผ่านการพัฒนา Session ซึ่งเป็นโปรโตคอลการสื่อสารที่กระจายศูนย์ ปลอดภัย และไม่ต้องมีการอนุญาตที่ใช้ในข้อความ Session การดำเนินการของมันเป็นส่วนหนึ่งของวิสัยทัศน์ของอินเทอร์เน็ตที่เสรี เปิดกว้าง และเคารพความเป็นส่วนตัว
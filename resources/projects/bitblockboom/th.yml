description: |
  BitBlockBoom! เป็นการประชุมเกี่ยวกับบิตคอยน์ พูดง่ายๆ ก็คือการประชุมนี้มีไว้สำหรับผู้ที่สนใจใน Bitcoin เท่านั้น ผู้เข้าร่วมมีตั้งแต่คนที่มีชื่อเสียงและมีส่วนร่วมอย่างมากใน Bitcoin ไปจนถึงคนที่เพิ่งพยายามเรียนรู้ว่าบิตคอยน์คืออะไร คุณจะไม่พบใครที่มาขายเหรียญไร้ค่า (shitcoins) หรือ NFTs นี่คือการประชุม Bitcoin ที่แท้จริง BitBlockBoom ได้สร้างบรรยากาศที่ยอดเยี่ยมในการพบปะและพูดคุยเกี่ยวกับบิตคอยน์กับวิทยากรและผู้ที่สนใจบิตคอยน์คนอื่นๆ
description: |
  BitBlockBoom! е конференция за биткойни. Казано по-просто, тази конференция е само за хора, които се интересуват от Bitcoin. Участниците варират от хора, които са много известни и силно ангажирани с Bitcoin, до хора, които просто се опитват да научат какво е биткойн. Няма да намерите никого, който да продава shitcoins или NFT. Това е истинска конференция за Bitcoin. BitBlockBoom е създал чудесна атмосфера за срещи и обсъждане на биткойн с лекторите и други биткойнери.
description: |
  Ivyo BitBlock Boom! ni inama ya Bitcoin. Mu kuvuga mu majambo yoroshe iyi nama ni iy'abantu bakunda Bitcoin gusa. Abaje muri iyo nama bava ku bantu bazwi cane kandi bafise uruhara runini muri Bitcoin, gushika ku bantu bariko baragerageza gusa kumenya ico Bitcoin ari co. Nta n’umwe uzosanga ashinga shitcoins canke NFTs. Iyi ni Inama ya Bitcoin y’Ukuri. BitBlockBoom yaremye ikirere ciza cane co guhura no kuganira kuri Bitcoin n’abavuga n’abandi ba bitcoiners.
description: |
  De BitBlockBoom! is een Bitcoin conferentie. Eenvoudig gezegd is deze conferentie alleen voor mensen die geïnteresseerd zijn in Bitcoin. Deelnemers variëren van mensen die zeer bekend zijn met en betrokken zijn bij Bitcoin, tot mensen die alleen maar willen leren waar Bitcoin over gaat. Je zult niemand vinden die shitcoins of NFT's shilt. Dit is een echte Bitcoin conferentie. BitBlockBoom heeft een geweldige sfeer gecreëerd om Bitcoin te ontmoeten en te bespreken met de sprekers en andere bitcoiners.
description: |
  사토시랩스는 가장 안전하고 신뢰할 수 있는 Bitcoin 보관 방법 중 하나인 트레저 Hardware Wallet을 만든 것으로 잘 알려진 기술 회사입니다. 2013년 마렉 팔라티누스, 파볼 루스낙, 알레나 브라노바가 설립한 회사로 체코 프라하에 본사를 두고 있습니다.
  
  사토시랩스의 대표 제품인 트레저 Hardware Wallet은 사용자의 개인 키를 오프라인에 안전하게 보관하는 물리적 장치입니다. 이 기능은 다양한 유형의 온라인 해킹에 대한 저항력을 제공합니다. 트레저는 개인 키를 장치와 오프라인에 보관함으로써 사용자의 Bitcoin 자산에 대해 추가적인 Layer 보안을 제공합니다.
  
  트레저 Hardware Wallet 외에도, 사토시랩스는 Bitcoin 생태계에 상당한 기여를 해왔습니다. 여기에는 다양한 보안 표준을 만들고, Bitcoin 트랜잭션을 강화하고 보호하기 위해 설계된 새로운 기술을 개발하는 것이 포함됩니다.
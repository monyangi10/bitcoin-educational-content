description: |
  SatoshiLabs ni ishirahamwe ry’ubuhinga rizwi cane cane mu guhingura Trezor Hardware Wallet, bumwe mu buryo butekanye kandi bwizewe bwo kubika Bitcoin. Iyo sosiyete yashinzwe mu mwaka w’2013 na Marek Palatinus, Pavol Rusnak na Alena Vranova, ikaba iri i Prague muri Repubulika ya Tchèque.
  
  Trezor Hardware Wallet, igikoresho gihambaye ca SatoshiLabs, ni igikoresho gishobora kubika neza imfunguruzo z’ibanga z’abakoresha ata murongo. Ivyo bituma ishobora guhangana n’ubwoko bwinshi bw’ubusuma bwo kuri Internet. Mu kugumiza imfunguruzo z’ibanga ku gikoresho no hanze y’umurongo, Trezor itanga Layer y’inyongera y’umutekano ku mutungo w’abakoresha Bitcoin.
  
  Uretse Trezor Hardware Wallet, SatoshiLabs yarateye imbere cane mu bijanye n’ibidukikije vya Bitcoin. Ivyo birimwo gushinga ingingo zitandukanye z’umutekano no gutegura ubuhinga bushasha bugenewe kwongereza no kurinda amafaranga y’ubudandaji bwa Bitcoin.
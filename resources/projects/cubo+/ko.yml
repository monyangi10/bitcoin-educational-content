description: |
  CUBO+는 Bitcoin 및 Lightning Network 기업의 증가하는 고용 수요를 충족하고 엘살바도르의 채택을 촉진하고 경제 발전을 촉진하기 위해 훈련된 살바도르 전문가 커뮤니티를 형성하는 것을 목표로 하는 선구적인 교육 이니셔티브의 시작을 알립니다.
  
  우리는 학생들이 Bitcoin 산업에 합류하고 금융 시스템 재편에 기여하는 데 필요한 기술과 지식을 갖추도록 최선을 다하고 있습니다.
  
  우리는 재능 있는 젊은 인재들에게 헌신적이고 심도 있는 수준에서 Bitcoin의 기본은 물론 가장 진보된 세부 사항까지 가르치는 데 전념하는 프로그램입니다. 우리는 장벽이나 제한 없이 엘살바도르의 Bitcoin 혁명에 살바도르 사람들이 참여할 수 있도록 옹호합니다.
  
  우리는 주권적이고 독립적인 개인들로 구성된 번성하고 자유로운 커뮤니티를 구축하는 것을 목표로 합니다. 우리의 임무는 우리 모두가 살고 싶은 국가와 세상을 건설할 Bitcoin 전문가를 양성하는 것입니다!
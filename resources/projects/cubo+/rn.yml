description: |
  CUBO+ ni intango y’umugambi w’uburezi w’ubutsimvyi ugamije gushinga umuryango w’abahinga bo muri Salvador bamenyerejwe kugira ngo bashobore guhabwa akazi n’amashirahamwe Bitcoin na Lightning Network, hamwe no gutuma abantu bemera no guteza imbere iterambere ry’ubutunzi muri El Salvador.
  
  Twiyemeje guha abanyeshure ubuhinga n’ubumenyi bikenewe kugira ngo binjire mu gisata ca Bitcoin no kugira ico baterereye mu guhindura uburyo bw’ivy’ubutunzi.
  
  Turi porogarama yiyemeje kwigisha ubwenge bushasha bufise ubuhinga ivy’ishimikiro vya Bitcoin ku rugero rwiyemeje kandi rwimbitse, hamwe n’ibintu vy’ido n’ido biteye imbere cane. Turaburanira ko abanya Salvador bogira uruhara mu ntambara ya Bitcoin muri El Salvador, ata nzitizi canke imipaka.
  
  Turafise intumbero yo kwubaka umuryango w’abantu bafise ubusegaba kandi bigenga, utera imbere kandi widegemvya. Intumbero yacu ni uguhingura abahinga ba Bitcoin bazokwubaka igihugu n'isi twese twipfuza kubamwo!
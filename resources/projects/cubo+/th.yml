description: |
  CUBO+ เป็นจุดเริ่มต้นของโครงการการศึกษาที่บุกเบิกซึ่งมุ่งเน้นการสร้างชุมชนของมืออาชีพชาวซัลวาดอร์ที่ได้รับการฝึกฝนเพื่อตอบสนองความต้องการที่เพิ่มขึ้นสำหรับการจ้างงานโดยบริษัท Bitcoin และ Lightning Network รวมถึงเพื่อขับเคลื่อนการยอมรับและส่งเสริมการพัฒนาเศรษฐกิจในเอลซัลวาดอร์
  
  เรามุ่งมั่นที่จะให้ความรู้และทักษะที่จำเป็นแก่ผู้เรียนเพื่อเข้าร่วมอุตสาหกรรม Bitcoin และมีส่วนร่วมในการปรับโครงสร้างระบบการเงิน
  
  เราเป็นโปรแกรมที่มุ่งมั่นในการสอนพื้นฐานของ Bitcoin ให้กับเยาวชนที่มีพรสวรรค์ในระดับที่ทุ่มเทและลึกซึ้ง รวมถึงรายละเอียดที่ก้าวหน้าที่สุด เราสนับสนุนการมีส่วนร่วมของชาวซัลวาดอร์ในปฏิวัติ Bitcoin ในเอลซัลวาดอร์ โดยไม่มีอุปสรรคหรือข้อจำกัด
  
  เรามุ่งหวังที่จะสร้างชุมชนที่เจริญรุ่งเรืองและเสรีของบุคคลที่มีอธิปไตยและเป็นอิสระ ภารกิจของเราคือการสร้างมืออาชีพ Bitcoin ที่จะสร้างประเทศและโลกที่เราทุกคนต้องการอยู่อาศัย!
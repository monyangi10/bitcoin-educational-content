description: |
  CUBO+, Bitcoin ve Lightning Network şirketleri tarafından artan istihdam talebini karşılamak üzere eğitilmiş Salvadorlu profesyonellerden oluşan bir topluluk oluşturmanın yanı sıra El Salvador'da benimsemeyi ve ekonomik kalkınmayı teşvik etmeyi amaçlayan öncü bir eğitim girişiminin başlangıcına işaret ediyor.
  
  Öğrencileri Bitcoin endüstrisine katılmak ve finansal sistemin yeniden şekillendirilmesine katkıda bulunmak için gerekli bilgi ve becerilerle donatmaya kararlıyız.
  
  Genç ve yetenekli beyinlere Bitcoin'in temellerini özel ve derin bir düzeyde ve en ileri ayrıntıları öğretmeyi taahhüt eden bir programız. El Salvador'daki Bitcoin devrimine Salvadorluların hiçbir engel ya da sınırlama olmaksızın katılmasını savunuyoruz.
  
  Egemen ve bağımsız bireylerden oluşan, gelişen ve özgür bir topluluk oluşturmayı hedefliyoruz. Misyonumuz, hepimizin yaşamak istediği ülkeyi ve dünyayı inşa edecek Bitcoin profesyonelleri yaratmaktır!
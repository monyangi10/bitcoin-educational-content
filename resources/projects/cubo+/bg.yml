description: |
  CUBO+ поставя началото на новаторска образователна инициатива, насочена към формиране на общност от салвадорски специалисти, обучени да посрещнат нарастващото търсене на работа от страна на компаниите Bitcoin и Lightning Network, както и да стимулират приемането и икономическото развитие в Ел Салвадор.
  
  Ангажираме се да предоставим на студентите необходимите умения и знания, за да се присъединят към индустрията Bitcoin и да допринесат за преоформянето на финансовата система.
  
  Ние сме програма, ангажирана с преподаването на млади талантливи умове на основите на Bitcoin на специализирано и задълбочено ниво, както и на най-напредналите детайли. Ние се застъпваме за включването на салвадорци в революцията на Bitcoin в Салвадор, без бариери и ограничения.
  
  Целта ни е да изградим процъфтяваща и свободна общност от суверенни и независими личности. Нашата мисия е да създадем професионалисти в областта на Bitcoin, които ще изградят страната и света, в които всички искаме да живеем!
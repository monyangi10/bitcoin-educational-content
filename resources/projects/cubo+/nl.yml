description: |
  CUBO+ markeert het begin van een baanbrekend onderwijsinitiatief dat gericht is op het vormen van een gemeenschap van Salvadoraanse professionals die opgeleid zijn om te voldoen aan de groeiende vraag naar werkgelegenheid door Bitcoin en Lightning Network bedrijven, maar ook om de adoptie te stimuleren en de economische ontwikkeling in El Salvador te bevorderen.
  
  We zijn vastbesloten om studenten uit te rusten met de vaardigheden en kennis die nodig zijn om toe te treden tot de Bitcoin industrie en bij te dragen aan de hervorming van het financiële systeem.
  
  Wij zijn een programma dat jonge getalenteerde geesten de fundamenten van Bitcoin op een toegewijd en diep niveau wil bijbrengen, evenals de meest geavanceerde details. Wij pleiten voor de betrokkenheid van Salvadoranen bij de Bitcoin revolutie in El Salvador, zonder barrières of beperkingen.
  
  We streven naar een bloeiende en vrije gemeenschap van soevereine en onafhankelijke individuen. Onze missie is om Bitcoin professionals te creëren die zullen bouwen aan het land en de wereld waarin we allemaal willen leven!
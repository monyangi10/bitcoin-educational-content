description: |
  ก่อตั้งขึ้นในปี 2024 โดยผู้นำที่มีวิสัยทัศน์ Marcel Lorraine, DADA DEVS เป็นโครงการไม่แสวงหาผลกำไรที่เกิดจากความต้องการในการเสริมพลังให้กับนักพัฒนาหญิงชาวแอฟริกันเพื่อก้าวขึ้นมาเป็นผู้นำในนวัตกรรม Bitcoin และบล็อกเชน แอฟริกามีศักยภาพที่ยังไม่ได้รับการใช้ประโยชน์อย่างเต็มที่ แต่ผู้หญิงยังคงมีสัดส่วนที่น้อยในด้านเทคโนโลยี โดยเฉพาะในการพัฒนา Bitcoin การตระหนักถึงความจำเป็นเร่งด่วนในการเชื่อมช่องว่างนี้ DADA DEVS ถูกสร้างขึ้นเพื่อไม่เพียงแค่ให้การศึกษา แต่ยังเพื่อสร้างแรงบันดาลใจและจัดหาเครื่องมือให้กับผู้หญิงชาวแอฟริกันในการแก้ไขปัญหาจริงผ่านทางโซลูชันแบบกระจายศูนย์
description: |
  DADA DEVS, opgericht in 2024 door visionair leider Marcel Lorraine, is een non-profit initiatief geboren uit de noodzaak om Afrikaanse vrouwelijke ontwikkelaars in staat te stellen een centrale rol te spelen in Bitcoin en Blockchain innovatie. Afrika zit boordevol onaangeboord potentieel, maar vrouwen zijn nog steeds sterk ondervertegenwoordigd in technologie, met name in Bitcoin ontwikkeling. DADA DEVS erkent de dringende noodzaak om deze kloof te overbruggen en werd opgericht om Afrikaanse vrouwen niet alleen te onderwijzen, maar ook te inspireren en uit te rusten met de tools om echte uitdagingen op te lossen door middel van gedecentraliseerde oplossingen.
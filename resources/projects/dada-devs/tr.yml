description: |
  2024 yılında vizyoner lider Marcel Lorraine tarafından kurulan DADA DEVS, Afrikalı kadın geliştiricileri Bitcoin ve Blockchain inovasyonunda merkez sahneye çıkmaları için güçlendirme ihtiyacından doğan, kâr amacı gütmeyen bir girişimdir.Afrika, kullanılmayan potansiyel ile dolup taşmaktadır, ancak kadınlar teknolojide, özellikle de Bitcoin geliştirmede önemli ölçüde yetersiz temsil edilmektedir. Bu boşluğu doldurmaya yönelik acil ihtiyacın farkına varan DADA DEVS, Afrikalı kadınları sadece eğitmek değil, aynı zamanda merkezi olmayan çözümler yoluyla gerçek dünyadaki zorlukları çözecek araçlarla donatmak ve ilham vermek için kuruldu.
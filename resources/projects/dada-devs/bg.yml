description: |
  Основана през 2024 г. от визионера Марсел Лорейн, DADA DEVS е инициатива с нестопанска цел, породена от необходимостта да се даде възможност на африканските жени разработчици да заемат централно място в иновациите в Bitcoin и блокчейн.Африка е изпълнена с неизползван потенциал, но жените остават значително по-слабо представени в технологиите, особено в разработването на Bitcoin. Признавайки спешната нужда от преодоляване на тази пропаст, DADA DEVS е създадена, за да не само обучава, но и да вдъхновява и да снабдява африканските жени с инструменти за решаване на реални предизвикателства чрез децентрализирани решения.
description: |
  2024년 선구적인 리더인 마르셀 로레인이 설립한 DADA DEVS는 아프리카 여성 개발자들이 Bitcoin 및 Blockchain 혁신의 중심이 될 수 있도록 힘을 실어주자는 취지에서 시작된 비영리 이니셔티브입니다. 아프리카는 아직 개발되지 않은 잠재력으로 가득하지만 기술, 특히 Bitcoin 개발 분야에서 여성은 여전히 상당히 저조한 비율을 보이고 있습니다. 이러한 격차를 해소해야 한다는 시급한 필요성을 인식한 DADA DEVS는 교육뿐만 아니라 아프리카 여성들에게 탈중앙화 솔루션을 통해 현실의 문제를 해결할 수 있는 도구를 제공하고 영감을 주기 위해 만들어졌습니다.
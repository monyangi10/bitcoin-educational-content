description: |
  Yashinzwe mu 2024 n’umurongozi w’iyerekwa Marcel Lorraine, DADA DEVS ni umugambi udaharanira inyungu wavutse ku nkenerwa yo guha ubushobozi abagore bo muri Afirika batera imbere kugira ngo bafate ikibanza ca mbere mu guhingura ibintu bishasha vya Bitcoin na Blockchain. Kubera ko DADA DEVS yemeye ko bikenewe cane gukuraho ico kinogo, yashinzwe kugira ngo ntiyigishe gusa ahubwo ngo itere intege no guha abagore b’Afirika ibikoresho vyo gutorera umuti ingorane zo mw’isi nyakuri biciye mu gutorera umuti ingorane zitandukanye.
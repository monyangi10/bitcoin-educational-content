description: |
  Onze missie is om lokale Bitcoin gemeenschappen te ondersteunen door middel van open-source onderwijs en netwerken. We verzamelen, organiseren en creëren de nodige bronnen (cursussen, boeken, posters, flyers, video's) om de Bitcoin industrie vooruit te helpen.
  
  We centraliseren kennis om deze beter te verspreiden via een eenvoudige, meertalige GitHub repository en een E-learning platform. We helpen lokale Bitcoin hubs in hun ontwikkeling met de juiste hulpmiddelen om hun talent te laten groeien.
  
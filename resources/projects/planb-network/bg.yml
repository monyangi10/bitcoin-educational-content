description: |
  Нашата мисия е да подкрепяме местните общности на Bitcoin чрез обучение и работа в мрежа с отворен код. Събираме, организираме и създаваме необходимите ресурси (курсове, книги, плакати, флаери, видеоклипове) за развитието на Bitcoin индустрията.
  
  Централизираме знанията, за да ги разпространяваме по-добре чрез просто, многоезично хранилище GitHub и платформа за електронно обучение. Подпомагаме местните Bitcoin центрове в тяхното развитие с подходящи инструменти, за да може талантът им да се развива.
  
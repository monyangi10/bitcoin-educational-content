description: |
  ภารกิจของเราคือการสนับสนุนชุมชน Bitcoin ท้องถิ่นผ่านการศึกษาแบบโอเพ่นซอร์สและการสร้างเครือข่าย เรารวบรวม จัดระเบียบ และสร้างทรัพยากรที่จำเป็น (หลักสูตร หนังสือ โปสเตอร์ ใบปลิว วิดีโอ) สำหรับอุตสาหกรรม Bitcoin เพื่อก้าวหน้า
  
  เรารวมศูนย์ความรู้เพื่อแจกจ่ายให้ดีขึ้นผ่านที่เก็บ GitHub แบบหลายภาษาที่เรียบง่ายและแพลตฟอร์มการเรียนรู้อิเล็กทรอนิกส์ เราช่วยเหลือศูนย์กลาง Bitcoin ท้องถิ่นในการพัฒนาด้วยเครื่องมือที่เหมาะสมเพื่อให้พรสวรรค์ของพวกเขาเติบโต
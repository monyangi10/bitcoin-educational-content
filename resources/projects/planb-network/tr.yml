description: |
  Misyonumuz, açık kaynaklı eğitim ve ağ oluşturma yoluyla yerel Bitcoin topluluklarını desteklemektir. Bitcoin endüstrisinin ilerlemesi için gerekli kaynakları (kurslar, kitaplar, posterler, el ilanları, videolar) topluyor, organize ediyor ve yaratıyoruz.
  
  Basit, çok dilli bir GitHub deposu ve bir E-öğrenme platformu aracılığıyla bilgiyi daha iyi dağıtmak için merkezileştiriyoruz. Yerel Bitcoin merkezlerine, yeteneklerinin gelişmesi için doğru araçlarla gelişimlerinde yardımcı oluyoruz.
  
description: |
  Intumbero yacu ni ugushigikira imiryango yo mu karere ka Bitcoin biciye mu kwigisha n’ugukorana n’abandi. Turakorakoranya, tugatunganya, kandi tugahingura ibintu bikenewe (amashure, ibitabu, amafoto, amakete, amasanamu) kugira ngo inganda ya Bitcoin itere imbere. 
  
  Turashira hamwe ubumenyi kugira ngo tubukwiragize neza biciye mu bubiko bworoshe, bw’indimi nyinshi bwa GitHub be n’urubuga rwo kwigisha ku mbuga ngurukanabumenyi. Turafasha amashirahamwe ya Bitcoin yo mu karere mu guteza imbere ibikoresho bikwiye kugira ngo ubuhinga bwabo bukure.
  
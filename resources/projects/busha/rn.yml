description: |
  Busha ni crypto Exchange yo muri Nijeriya ituma vyoroha kugura, kugurisha no gucunga itunga ry’ubuhinga bwa none. Busha yibanze cane ku kworoha, umutekano, n’uburezi, iha ubushobozi abantu ku giti cabo n’ubudandaji muri Afirika yose kugira ngo bashobore gushika ku bukungu bwa crypto no gufata ububasha ku kazoza kabo k’ivy’ubutunzi.
description: |
  AmityAge ni mpango wa elimu kwenye kisiwa cha Roatan, Honduras, kilicho ndani ya eneo maalum la kiuchumi la Prospera. Wanaendesha Kituo cha Bitcoin ambacho ni maradufu kama nafasi ya kufanya kazi pamoja, duka la kahawa, na mgahawa, kutoa nyenzo kama vile vitabu na maunzi kwa ajili ya kujifunza Bitcoin. Pia zina ATM ya kwanza ya kisiwa cha Bitcoin kwa ubadilishaji wa sarafu. Timu yao hufundisha mtaala wa Mi Primer Bitcoin katika shule za mitaa, kusaidia shughuli zao kwa kutumia Bitcoin Mining nchini Paraguay. AmityAge pia inatoa ziara za visiwa na inaendesha Mpango wa Waelimishaji wa Bitcoin ili kutoa mafunzo kwa walimu.
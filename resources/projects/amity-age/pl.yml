description: |
  AmityAge to inicjatywa edukacyjna na wyspie Roatan w Hondurasie, zlokalizowana w specjalnej strefie ekonomicznej Prospera. Prowadzi Centrum Bitcoin, które pełni funkcję przestrzeni coworkingowej, kawiarni i restauracji, zapewniając zasoby takie jak książki i sprzęt do nauki Bitcoin. Znajduje się tam również pierwszy na wyspie bankomat Bitcoin do wymiany walut. Ich zespół uczy programu nauczania Mi Primer Bitcoin w lokalnych szkołach, wspierając swoje działania Bitcoin Mining w Paragwaju. AmityAge oferuje również wycieczki po wyspie i prowadzi program Bitcoin Educators Program w celu szkolenia nauczycieli.
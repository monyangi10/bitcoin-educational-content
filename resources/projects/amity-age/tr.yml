description: |
  AmityAge, Honduras'ın Roatan adasında, Prospera özel ekonomik bölgesi içinde yer alan bir eğitim girişimidir. Bitcoin öğrenimi için kitap ve donanım gibi kaynaklar sağlayan bir ortak çalışma alanı, kahve dükkanı ve restoran olarak ikiye katlanan bir Bitcoin Merkezi işletiyorlar.
  Ayrıca para birimi dönüştürme için adanın ilk Bitcoin ATM'sine de ev sahipliği yapıyorlar. Ekipleri yerel okullarda Mi Primer Bitcoin müfredatını öğretiyor ve Paraguay'daki Bitcoin Mining ile faaliyetlerini destekliyor. AmityAge ayrıca ada turları düzenliyor ve öğretmenleri eğitmek için bir Bitcoin Eğitimci Programı yürütüyor.
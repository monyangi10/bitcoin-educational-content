description: |
  AmityAge е образователна инициатива на остров Роатан, Хондурас, разположен в специалната икономическа зона Prospera. Те управляват център Bitcoin, който е едновременно пространство за съвместна работа, кафене и ресторант, като предоставя ресурси като книги и хардуер за обучение по Bitcoin. В тях се намира и първият на острова Bitcoin банкомат за обмяна на валута. Екипът им преподава учебната програма Mi Primer Bitcoin в местните училища, като подпомага дейността им с Bitcoin mining в Парагвай. AmityAge също така предлага обиколки на острова и провежда програма за обучение на учители по Bitcoin.
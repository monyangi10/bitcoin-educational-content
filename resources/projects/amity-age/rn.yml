description: |
  AmityAge ni umugambi w’inyigisho ku kirwa ca Roatan muri Honduras, kiri mu karere k’ubutunzi kadasanzwe ka Prospera. Bakoresha ikigo ca Bitcoin gikora kabiri nk’ahantu ho gukorera hamwe, iduka ry’ikawa, n’iresitora, bagatanga ibikoresho nk’ibitabu n’ibikoresho vyo kwiga Bitcoin. Ni ho kandi harimwo ikibanza ca mbere co gukura amahera muri iryo zinga citwa Bitcoin ATM co guhindura amahera. Ishirahamwe ryabo ryigisha inyigisho za Mi Primer Bitcoin mu mashure yo mu karere, rishigikira ibikorwa vyabo n’ishure rya Bitcoin Mining muri Paraguay. AmityAge kandi itanga ingendo zo mu mazinga kandi ikora Porogarama y’Abigisha ya Bitcoin yo gutoza abigisha.
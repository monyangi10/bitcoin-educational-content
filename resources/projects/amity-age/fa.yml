description: |
  AmityAge یک ابتکار آموزشی در جزیره رواتان، هندوراس است که در منطقه ویژه اقتصادی Prospera واقع شده است. آن‌ها یک مرکز Bitcoin را اداره می‌کنند که به عنوان فضای کار مشترک، کافی‌شاپ و رستوران عمل می‌کند و منابعی مانند کتاب و سخت‌افزار برای یادگیری Bitcoin فراهم می‌کند. آن‌ها همچنین اولین دستگاه خودپرداز Bitcoin جزیره را برای تبدیل ارز در اختیار دارند. تیم آن‌ها برنامه درسی Mi Primer Bitcoin را در مدارس محلی تدریس می‌کند و عملیات خود را با Bitcoin Mining در پاراگوئه پشتیبانی می‌کنند. AmityAge همچنین تورهای جزیره‌ای ارائه می‌دهد و یک برنامه آموزشی Bitcoin برای آموزش معلمان اجرا می‌کند.
description: |
  AmityAge is een onderwijsinitiatief op het eiland Roatan, Honduras, gelegen in de speciale economische zone Prospera. Ze beheren een Bitcoin Centrum dat ook dienst doet als een coworkingruimte, koffieshop en restaurant, en voorzien in bronnen zoals boeken en hardware om Bitcoin te leren. Ze hebben ook de eerste Bitcoin pinautomaat van het eiland om geld om te wisselen. Hun team onderwijst het Mi Primer Bitcoin curriculum op lokale scholen en ondersteunt hun activiteiten met Bitcoin Mining in Paraguay. AmityAge biedt ook rondleidingen op het eiland en heeft een Bitcoin onderwijsprogramma om leraren op te leiden.
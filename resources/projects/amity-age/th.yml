description: |
  AmityAge เป็นโครงการด้านการศึกษาบนเกาะ Roatan, Honduras ซึ่งตั้งอยู่ในเขตเศรษฐกิจพิเศษของ Prospera พวกเขาดำเนินการศูนย์ Bitcoin ที่ทำหน้าที่เป็นทั้งพื้นที่ทำงานร่วมกัน ร้านกาแฟ และร้านอาหาร โดยมีทรัพยากรเช่น หนังสือและฮาร์ดแวร์สำหรับการเรียนรู้ Bitcoin
  
  พวกเขายังมีตู้ ATM Bitcoin แห่งแรกของเกาะสำหรับการแลกเปลี่ยนสกุลเงิน ทีมงานของพวกเขาสอนหลักสูตร Mi Primer Bitcoin ในโรงเรียนท้องถิ่น โดยสนับสนุนการดำเนินงานด้วย Bitcoin mining ในปารากวัย AmityAge ยังมีบริการทัวร์เกาะและดำเนินโครงการ Bitcoin Educators Program เพื่อฝึกอบรมครู
description: |
  AmityAge är ett utbildningsinitiativ på ön Roatan i Honduras, som ligger inom den särskilda ekonomiska zonen Prospera. De driver ett Bitcoin-center som fungerar som ett coworking space, kafé och restaurang, och tillhandahåller resurser som böcker och hårdvara för Bitcoin-lärande. De har också öns första Bitcoin-automat för valutaväxling. Deras team undervisar i Mi Primer Bitcoin-läroplanen i lokala skolor och stödjer deras verksamhet med Bitcoin Mining i Paraguay. AmityAge erbjuder även rundturer på ön och driver ett Bitcoin Educators Program för att utbilda lärare.
description: |
  AmityAge는 온두라스 로아탄 섬의 경제특구인 프로스페라에 위치한 교육 이니셔티브입니다. 이들은 코워킹 스페이스, 커피숍, 레스토랑을 겸하는 Bitcoin 센터를 운영하며 Bitcoin 학습을 위한 책과 하드웨어와 같은 리소스를 제공합니다.
  또한 섬 최초의 통화 변환용 Bitcoin ATM도 설치되어 있습니다. 이 팀은 지역 학교에서 미 프라이머 Bitcoin 커리큘럼을 가르치며 파라과이에서 Bitcoin Mining 운영을 지원하고 있습니다. 아미티에이지에서는 섬 투어를 제공하고 교사 교육을 위한 Bitcoin 교육자 프로그램도 운영합니다.
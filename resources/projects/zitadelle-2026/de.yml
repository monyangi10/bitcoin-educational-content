description: |
  Zitadelle ist ein deutschsprachiges Bitcoin-Community-Event, das vom 28. bis 31. Mai 2026 auf der Privatinsel Obonjan in Kroatien stattfindet. Die viertägige Veranstaltung bringt über 500 Bitcoin-Enthusiasten zusammen – mit technischen Vorträgen, wirtschaftlichen Diskussionen, praktischen Workshops und Community-Networking in einer einzigartigen Inselkulisse. Das Programm umfasst über 30 Vorträge und mehr als 15 Workshops zu verschiedenen Aspekten von Bitcoin, kombiniert mit Outdoor-Aktivitäten und gemeinschaftlichen Erlebnissen.

description: |
  Tropic Square develops the world's first open-source, auditable secure element chip (TROPIC01) for hardware security. Built on RISC-V architecture, their tamper-resistant chips provide transparent, verifiable security for applications including Bitcoin hardware wallets, IoT devices, digital identity, and decentralized infrastructure. The company pioneered security through open hardware, replacing traditional black-box secure elements with fully inspectable and auditable solutions that invite scrutiny from security researchers and engineers.

description: |
  Започвайки през 21 г. с двудневно събиране на 35 безстрашни анонимни потребители от Bitcoin Twitter и включвайки импровизиран семинар и викторина за светкавици, през 22 и 23 г. се превръща в тридневно разпродадено събитие със 100 биткойнери, включително 11 колеги, които любезно провеждат семинари/разговори. Ние не сме конференция, на която лекторите се резервират предварително. Биткойнърите се записват за отстъплението, а ние оттам набираме лекции и дейности, тъй като сме благословени да бъдем заобиколени от връстници с умения за споделяне.
  
description: |
  เริ่มต้นในปี ’21 ด้วยการรวมตัวสองคืนของผู้กล้าหาญ 35 คนจาก Bitcoin Twitter และรวมถึงการเวิร์กช็อป & ควิซ Lightning แบบฉับพลัน เติบโตในปี ’22 & ’23 เป็นงานสามคืนที่ขายหมดเกลี้ยงกับ 100 Bitcoiners รวมถึงเพื่อน 11 คนที่กรุณาทำเวิร์กช็อป/พูดคุย เราไม่ใช่การประชุมที่มีการจองวิทยากรล่วงหน้า Bitcoiners จองเข้าร่วม Retreat และเราร่วมกันสร้างสรรค์การพูดคุย & กิจกรรมจากที่นั่นเพราะเราโชคดีที่ได้อยู่ท่ามกลางเพื่อนที่มีทักษะที่จะแบ่งปัน
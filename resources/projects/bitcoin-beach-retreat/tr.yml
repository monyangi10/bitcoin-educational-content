description: |
  '21'de Bitcoin Twitter'dan 35 cesur anonstan oluşan iki gecelik bir toplantı ile başlayan ve doğaçlama bir Lightning atölyesi ve bilgi yarışması da dahil olmak üzere, '22 ve '23'te 11 akranın nazikçe atölye çalışmaları / konuşmalar yaptığı 100 Bitcoiner ile üç gecelik kapalı gişe bir etkinliğe dönüştü. Biz konuşmacıların önceden rezerve edildiği bir konferans değiliz. Bitcoin kullanıcıları Retreat'e rezervasyon yaptırıyor ve paylaşacak becerilere sahip akranlarla çevrili olduğumuz için kutsanmış olduğumuzdan, herhangi bir konuşma ve etkinliği oradan kitle kaynaklı olarak gerçekleştiriyoruz.
  
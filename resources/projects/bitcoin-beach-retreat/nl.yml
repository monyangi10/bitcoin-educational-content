description: |
  Begonnen in '21 met een bijeenkomst van 35 onverschrokken anons van Bitcoin Twitter en inclusief een geïmproviseerde Lightning-workshop & quiz, uitgegroeid in '22 & '23 tot een uitverkocht evenement van drie avonden met 100 Bitcoiners inclusief 11 peers die vriendelijk workshops/talks gaven. We zijn geen conferentie waar sprekers van tevoren worden geboekt. Bitcoiners schrijven zich in voor de Retreat en wij zorgen voor crowdsourcing van gesprekken en activiteiten, omdat we gezegend zijn omringd te zijn door peers met vaardigheden om te delen.
  
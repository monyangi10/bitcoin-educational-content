description: |
  Guhera mu ’21 n’ikoraniro ry’amajoro abiri ry’abanyabwenge 35 bavuye kuri Bitcoin Twitter kandi harimwo n’amahugurwa y’umuravyo n’ikibazo, gukura mu ’22 & ’23 gushika mu birori vy’amajoro atatu vyagurishijwe n’aba Bitcoiners 100 harimwo n’abo mu runganwe rwabo 11 bakora amahugurwa n’ibiganiro. Si inama aho abazotanga insiguro bashirwa imbere y’igihe. Bitcoiners book onto the Retreat kandi turakoranya ibiganiro vyose n’ibikorwa vyose biva ng’aho kuko duhezagiwe kuba dukikujwe n’urunganwe rwacu rufise ubuhinga bwo gusangira.
  
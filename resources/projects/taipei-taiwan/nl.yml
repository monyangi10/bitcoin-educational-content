description: |
  Wij zijn een groep Bitcoin enthousiastelingen in Taiwan, toegewijd om de juiste kennis over Bitcoin te verschaffen aan jonge mensen die erin geïnteresseerd zijn. Door samenwerking en assistentie in teamverband bevorderen we een dieper begrip van de onderliggende technologie van Bitcoin en het potentieel ervan om het financiële landschap opnieuw vorm te geven.
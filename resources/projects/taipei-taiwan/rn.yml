description: |
  Turi umugwi w’abakunda Bitcoin muri Tayiwani, twiyemeje gutanga ubumenyi bubereye ku bijanye na Bitcoin ku rubyiruko ruyikunda. Biciye mu gukorana n’imigwi no gufashanya, turatera imbere ugutahura gukomeye kw’ubuhinga bwa Bitcoin n’ubushobozi bwayo bwo guhindura uburyo bw’ivy’ubutunzi.
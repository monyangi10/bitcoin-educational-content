description: |
  Cardware, hem Bitcoin hem de EVM tabanlı varlıkların depolanması ve yönetilmesi için tasarlanmış bir Hardware Wallet'dır. Özel anahtarları çevrimdışı tutmak için QR Kod teknolojisini kullanan, çevrimiçi tehditlere ve yetkisiz erişime karşı koruma sağlayan, hava boşluklu, çevrimdışı bir çözüm sunar.
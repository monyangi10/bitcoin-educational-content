description: |
  Cardware ni Hardware Wallet yagenewe kubika no gucunga ivy’ubutunzi vyose bishingiye kuri Bitcoin n’ivya EVM. Itanga umuti w’ikirere, utari mu murongo ukoresheje ubuhinga bwa QR Code kugira ngo imfunguruzo z’ibanga zigume zitari mu murongo, zikingire iterabwoba ryo mu murongo n’ugushikira ata wemerewe. 
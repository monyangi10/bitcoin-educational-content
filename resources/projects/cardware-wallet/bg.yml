description: |
  Cardware е хардуерен wallet, предназначен за съхраняване и управление на активи, базирани на Bitcoin и EVM. Той осигурява въздушно защитено, офлайн решение, използващо технологията QR Code, за да съхранява частните ключове офлайн, защитавайки ги от онлайн заплахи и неоторизиран достъп.
description: |
  Компания, специализирана в разработването на решения за поверителни съобщения. SimpleX Chat е система за криптирани съобщения, използваща децентрализиран протокол за комуникация. Комуникацията не се основава на идентификатори на потребители или метаданни за комуникация, което гарантира високо ниво на анонимност.
description: |
  Gizli mesajlaşma çözümlerinin geliştirilmesinde uzmanlaşmış bir şirket. SimpleX Chat, merkezi olmayan bir iletişim protokolü kullanan şifreli bir mesajlaşma sistemidir. İletişim, kullanıcı tanımlayıcılarına veya iletişim meta verilerine dayanmaz ve yüksek düzeyde anonimliği garanti eder.
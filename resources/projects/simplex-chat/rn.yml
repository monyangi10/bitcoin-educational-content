description: |
  Ishirahamwe ry’abahinga mu gutegura inyishu z’ubutumwa bw’ibanga. SimpleX Chat ni uburyo bwo gutanga ubutumwa bufise ubuhinga bwo gutanga ubutumwa bukoresheje uburyo bwo guhanahana amakuru bushizwe ahantu hamwe. Ivy’uguhanahana amakuru ntibishingiye ku bimenyetso vy’abakoresha canke ku makuru y’ivy’uguhanahana amakuru, bikaba vyemeza ko umuntu atamenyekana cane.
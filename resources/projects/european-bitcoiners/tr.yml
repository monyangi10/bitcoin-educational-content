description: |
  'Avrupalı Bitcoinciler' est. Blok 731398, tüm Avrupalı Plebleri ve Bitcoin hakkında bilgi edinmek isteyenleri bir araya getirmek için bir eğitim ve topluluk girişimidir. Kâr amacı gütmeyen bu dağıtık girişim, tüm Avrupa'daki diller, bölgeler ve ülkeler arasındaki boşluğu doldurarak paylaşım, işbirliği ve Bitcoin Eğitimi için bir platform oluşturmaya odaklanmıştır. Dağıtık bir eğitim ağı olarak, bu girişim için merkezi bir otorite veya yönetim yoktur ve yalnızca katılıma, gönüllülük esasına dayalı olarak içeriğin düzenlenmesine dayanır. Avrupa'nın herhangi bir yerindeki herkes bu girişimin oluşturulmasına ve kapsamının genişletilmesine katkıda bulunabilir. Bunun yanı sıra, dünyanın dört bir yanındaki diğer bitcoin kullanıcıları da katkıda bulunabilir ve materyalin, uzmanlığın ve kapsamın genişletilmesine yardımcı olabilirler.
description: |
  'European Bitcoiners' est. Block 731398 เป็นโครงการการศึกษาและชุมชนที่มุ่งเน้นการรวมตัวของ Plebs ชาวยุโรปและผู้ที่ต้องการเรียนรู้เกี่ยวกับ Bitcoin โครงการไม่แสวงหาผลกำไรนี้มุ่งเน้นการสร้างแพลตฟอร์มสำหรับการแบ่งปัน การร่วมมือ และการศึกษา Bitcoin เพื่อเชื่อมช่องว่างระหว่างภาษา ภูมิภาค และประเทศต่างๆ ทั่วทั้งยุโรป ในฐานะเครือข่ายการศึกษาที่กระจายตัว ไม่มีหน่วยงานหรือการจัดการส่วนกลางสำหรับโครงการนี้ และพึ่งพาการมีส่วนร่วม การดูแลเนื้อหาโดยอาสาสมัครเท่านั้น ใครก็ตามที่อยู่ที่ใดก็ได้ในยุโรปสามารถมีส่วนร่วมในการสร้างและขยายขอบเขตของโครงการนี้ได้ เช่นเดียวกับบิตคอยเนอร์คนอื่นๆ ทั่วโลกที่ยินดีมีส่วนร่วมและช่วยขยายวัสดุ ความเชี่ยวชาญ และขอบเขตของโครงการนี้
description: |
  "Europeiska Bitcoiners" est. Block 731398 är ett utbildnings- och samhällsinitiativ för att sammanföra alla europeiska plebs och de som vill lära sig om Bitcoin. Detta distribuerade ideella initiativ är inriktat på att bygga en plattform för delning, samarbete och Bitcoin-utbildning, som överbryggar klyftan mellan språk, regioner och länder över hela Europa. Som ett distribuerat utbildningsnätverk finns det ingen central myndighet eller ledning för detta initiativ och förlitar sig enbart på deltagande, kurering av innehåll på frivillig basis. Vem som helst, var som helst i Europa, kan bidra till att bygga upp och utöka omfattningen av detta initiativ. Andra bitcoinare runt om i världen är också välkomna att bidra och hjälpa till att utöka materialet, expertisen och omfattningen av det.
description: |
  'European Bitcoiners' est. Block 731398 ni mpango wa elimu na jumuiya wa kuleta pamoja Pleb zote za Ulaya na wale wanaotaka kujifunza kuhusu Bitcoin. Mpango huu usio wa faida uliosambazwa unalenga katika kujenga jukwaa la kushiriki, ushirikiano na Elimu ya Bitcoin, kuziba pengo kati ya lugha, maeneo na nchi kote Ulaya. Kama mtandao wa elimu unaosambazwa, hakuna mamlaka kuu au usimamizi wa mpango huu na unategemea tu ushiriki, uratibu wa maudhui kwa hiari. Mtu yeyote, popote kote Ulaya, anaweza kuchangia kujenga na kupanua wigo wa mpango huu. Vile vile, bitcoiners wengine duniani kote pia wanakaribishwa kuchangia na kusaidia kupanua nyenzo, utaalam na upeo wake.
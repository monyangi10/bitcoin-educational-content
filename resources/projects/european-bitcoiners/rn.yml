description: |
  'Abanyaburaya ba Bitcoiners' est. Block 731398 ni umugambi w'inyigisho n'abanyagihugu wo guhuriza hamwe aba Plebs bose b'abanyaburaya n'abashaka kwiga ivyerekeye Bitcoin. Iryo shirahamwe ry’abanyagihugu ritagira inyungu ryibanda ku kwubaka urubuga rwo gusangira, gukorana n’uburezi bwa Bitcoin, gukuraho itandukaniro hagati y’indimi, uturere n’ibihugu vyo mu Buraya bwose.
  Nk’urubuga rw’uburezi rwakwiragijwe, nta butegetsi canke uburongozi buhambaye bw’iyi nzira kandi bwishingikiriza gusa ku kugira uruhara, gutegura ibirimwo ku bushake. Umuntu wese, aho ari ho hose mu Buraya, arashobora gutanga umusanzu wo kwubaka no kwagura urugero rw’iyi nzira. Na, abandi bitcoiners kw’isi yose na bo nyene barahawe ikaze kugira ngo batange no gufasha kwagura ibikoresho, ubuhinga n’urugero rwavyo.
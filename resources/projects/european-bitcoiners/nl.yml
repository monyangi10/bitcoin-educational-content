description: |
  europese Bitcoiners' est. Block 731398 is een onderwijs- en gemeenschapsinitiatief om alle Europese Plebs en degenen die willen leren over Bitcoin samen te brengen. Dit gedistribueerde non-profit initiatief is gericht op het bouwen van een platform voor het delen, samenwerken en Bitcoin onderwijs, en het overbruggen van de kloof tussen talen, regio's en landen in heel Europa.
  Als een gedistribueerd onderwijsnetwerk is er geen centrale autoriteit of management voor dit initiatief en vertrouwt het uitsluitend op deelname, curatie van inhoud op vrijwillige basis. Iedereen, overal in Europa, kan bijdragen aan het opbouwen en uitbreiden van dit initiatief. Ook andere bitcoiners over de hele wereld zijn welkom om bij te dragen en te helpen het materiaal, de expertise en de reikwijdte ervan uit te breiden.
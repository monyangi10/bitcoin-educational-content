description: |
  "European Bitcoiners" est. Block 731398 to inicjatywa edukacyjna i społecznościowa mająca na celu zebranie wszystkich europejskich Plebsów i tych, którzy chcą dowiedzieć się o Bitcoin. Ta rozproszona inicjatywa non-profit koncentruje się na budowaniu platformy do dzielenia się, współpracy i edukacji Bitcoin, wypełniając lukę między językami, regionami i krajami w całej Europie. Jako rozproszona sieć edukacyjna, inicjatywa ta nie ma centralnego organu ani zarządzania i opiera się wyłącznie na dobrowolnym uczestnictwie i selekcji treści. Każdy, w dowolnym miejscu w Europie, może przyczynić się do budowania i rozszerzania zakresu tej inicjatywy. Inni użytkownicy bitcoinów z całego świata są również mile widziani, aby wnieść swój wkład i pomóc rozszerzyć materiał, wiedzę i zakres tej inicjatywy.
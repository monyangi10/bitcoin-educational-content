description: |
  "Европейски биткойнери" ест. Блок 731398 е образователна и общностна инициатива за обединяване на всички европейски плебеи и тези, които искат да научат за Bitcoin. Тази разпределена инициатива с нестопанска цел е насочена към изграждането на платформа за споделяне, сътрудничество и образование за Bitcoin, преодолявайки различията между езиците, регионите и държавите в цяла Европа.
  Като разпределена образователна мрежа тази инициатива няма централен орган или управление и разчита единствено на участието, курирането на съдържание на доброволна основа. Всеки, навсякъде из Европа, може да допринесе за изграждането и разширяването на обхвата на тази инициатива. Както и, други биткойнери по света също са добре дошли да допринесат и да помогнат за разширяване на материала, опита и обхвата ѝ.
description: |
  Guhuza aba Bitcoiners na Net kw’isi yose kuva muri 2020. Umenye uburyo bwo guhuza ata mipaka mu bihugu 160+ ata KYC, imipaka y’amakuru, canke igihe co guhera - wishyure gusa uko ugenda maze uhimbarirwe igikorwa kitahagarara. Nta Mipaka, Ikora ubwayo mu bihugu 160+, Nta KYC isabwa, Nta Mipaka y’Amakuru: Pay as You go flat tariff, nta mipaka y’amakuru canke umuvuduko wo guhagarika, Nta gihe co guhera: Amahera na konti ntizigera zihera.
  
description: |
  Mercari, Japans top online marktplaats met meer dan 23 miljoen gebruikers, lanceerde een Bitcoin handelsdienst in 2023 om nieuwe gebruikers vertrouwd te maken met Bitcoin. In 2024 introduceerden ze BTC als betaalmethode. Meer dan 2 miljoen mensen gebruikten de handelsdienst in het eerste jaar, en de betalingsoptie zag 100.000 Bitcoin betalingen in de eerste maand, wat een sterke publieke interesse weerspiegelt.
  
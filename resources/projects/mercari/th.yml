description: |
  Mercari ซึ่งเป็นตลาดออนไลน์ชั้นนำของญี่ปุ่นที่มีผู้ใช้มากกว่า 23 ล้านคน ได้เปิดตัวบริการซื้อขายบิตคอยน์ในปี 2023 เพื่อให้ผู้ใช้ใหม่คุ้นเคยกับบิตคอยน์ ในปี 2024 พวกเขาได้แนะนำ BTC เป็นวิธีการชำระเงิน มีผู้ใช้บริการซื้อขายกว่า 2 ล้านคนในปีแรก และตัวเลือกการชำระเงินมีการชำระเงินด้วยบิตคอยน์ 100,000 รายการในเดือนแรก สะท้อนถึงความสนใจของสาธารณชนอย่างมาก
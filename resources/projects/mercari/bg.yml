description: |
  Mercari, най-големият онлайн пазар в Япония с над 23 милиона потребители, стартира услуга за търговия с биткойни през 2023 г., за да запознае новите потребители с биткойните. През 2024 г. те въвеждат BTC като метод за плащане. През първата година от услугата за търговия се възползваха над 2 млн. души, а през първия месец от опцията за плащане бяха извършени 100 000 плащания в биткойни, което отразяваше силния обществен интерес.
  
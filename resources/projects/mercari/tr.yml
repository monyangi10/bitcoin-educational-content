description: |
  Japonya'nın 23 milyondan fazla kullanıcısı olan en büyük çevrimiçi pazarı Mercari, 2023 yılında yeni kullanıcıları Bitcoin ile tanıştırmak için bir Bitcoin ticaret hizmeti başlattı. 2024'te BTC'yi bir ödeme yöntemi olarak tanıttılar. İlk yılında 2 milyondan fazla kişi alım satım hizmetini kullandı ve ödeme seçeneği ilk ayında 100.000 Bitcoin ödemesi görerek halkın yoğun ilgisini yansıttı.
  
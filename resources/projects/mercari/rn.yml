description: |
  Mercari, isoko ry’ubuhinga bwa none ryo mu Buyapani rifise abakoresha barenga miliyoni 23, ryatanguje ubucuruzi bwa Bitcoin mu 2023 kugira ngo rimenye abashasha bakoresha Bitcoin. Mu mwaka w’2024, bashizeho BTC nk’uburyo bwo kwishura. Abantu barenga miliyoni 2 barakoresheje iyo nzira y’ubudandaji mu mwaka wayo wa mbere, kandi uburyo bwo kwishura bwabonye amahera 100.000 Bitcoin mu kwezi kwa mbere, ivyo bikaba vyerekana inyungu ikomeye ya bose.
  
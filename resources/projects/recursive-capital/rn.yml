description: |
  Recursive Capital ni ikigega c’ubutunzi c’intango ca Bitcoin gishiramwo amafaranga y’ubudandaji mu masosiyete ya Bitcoin, kikaba kijejwe umugabane wa Afirika. Ikigega gishiramwo amafaranga mu nsanganyamatsiko zitandukanye z’ishoramari mu bidukikije vya Bitcoin, kirondera abashoramare b’abahinga bubaka ku ruhande rw’imbere mu guteza imbere Bitcoin.
  
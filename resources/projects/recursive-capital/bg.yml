description: |
  Recursive Capital е фонд за рисков капитал в ранен етап на развитие на Bitcoin, който инвестира в компании от Bitcoin с фокус върху африканския континент. Фондът инвестира в различни инвестиционни теми в екосистемата Bitcoin, като търси талантливи предприемачи, които изграждат авангарда на развитието на Bitcoin.
  
description: |
  Ledger เป็นบริษัทชั้นนำระดับโลกที่เชี่ยวชาญด้านโซลูชันความปลอดภัยและโครงสร้างพื้นฐานสำหรับสกุลเงินดิจิทัลและแอปพลิเคชันบล็อกเชน ก่อตั้งขึ้นในปี 2014 บริษัทเป็นที่รู้จักมากที่สุดในด้านกระเป๋าเงินฮาร์ดแวร์ Ledger Nano S และ Ledger Nano X ซึ่งมอบวิธีการที่ปลอดภัยให้กับบุคคลในการจัดเก็บกุญแจส่วนตัวแบบออฟไลน์ ซึ่งเป็นวิธีที่เรียกว่าการจัดเก็บแบบเย็น
  
  อุปกรณ์เหล่านี้สร้างขึ้นรอบชิปที่มีความปลอดภัยสูง เพื่อให้มั่นใจถึงความปลอดภัยที่ดีที่สุด กระเป๋าเงินฮาร์ดแวร์ของ Ledger ผสานรวมกับซอฟต์แวร์ Ledger Live ช่วยให้ผู้ใช้จัดการโทเค็นและเข้าถึงบริการบล็อกเชนต่างๆ จากแพลตฟอร์มเดียว Ledger ยังให้บริการแก่ธุรกิจด้วยโซลูชันสำหรับการรักษาความปลอดภัยสินทรัพย์ทางการเงินและการจัดการการดำเนินงานสินทรัพย์ดิจิทัล
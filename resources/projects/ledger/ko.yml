description: |
  Ledger은 암호화폐 및 Blockchain 애플리케이션을 위한 보안 및 인프라 솔루션을 전문으로 하는 글로벌 선도 기업입니다. 2014년에 설립된 이 회사는 개인 키를 오프라인에서 안전하게 보관할 수 있는 방법인 Cold 스토리지로 알려진 하드웨어 지갑인 Ledger 나노 S와 Ledger 나노 X로 가장 잘 알려져 있습니다.
  
  이 장치들은 강력한 보안 칩을 기반으로 제작되어 최적의 보안을 보장합니다. Ledger의 하드웨어 지갑은 Ledger 라이브 소프트웨어와 통합되어 사용자가 단일 플랫폼에서 토큰을 관리하고 다양한 Blockchain 서비스에 액세스할 수 있습니다. 또한 Ledger은 금융 자산을 보호하고 디지털 자산 운영을 관리할 수 있는 솔루션을 기업에게 제공합니다.
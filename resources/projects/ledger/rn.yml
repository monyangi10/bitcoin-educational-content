description: |
  Ledger ni ishirahamwe rihambaye kw’isi yose ryitaho ivy’umutekano n’ibikorwa remezo vy’amahera y’amahera y’amahera n’ibikorwa vya Blockchain. Yashinzwe mu mwaka w’2014, iyo sosiyete izwi cane kubera amasakoshi yayo y’ibikoresho, Ledger Nano S na Ledger Nano X, atanga uburyo butekanye bwo kubika imfunguruzo zabo z’ibanga ata murongo, uburyo buzwi nka Cold storage.
  
  Ibi bikoresho vyubatswe hirya no hino y'igice gikomeye c'umutekano, bituma haba umutekano mwiza. Ivyo bikoresho vya Ledger bifatanya na porogarama ya Ledger Live, bikaba bituma abakoresha bashobora gucunga ibimenyetso vyabo no kuronka ibikorwa bitandukanye vya Blockchain bakoresheje urubuga rumwe. Ledger kandi ifasha amashirahamwe afise inyishu zo gucungera umutungo w’ivy’ubutunzi no gucunga ibikorwa vy’umutungo w’ivy’ubuhinga bwa none.
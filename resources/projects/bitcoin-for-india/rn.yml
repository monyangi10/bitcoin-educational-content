description: |
  Turafise umuryango utera imbere w’abakozi b’intahemuka batagira ubwikunzi, abakunda Bitcoin, abazirikana Bitcoin, n’abahinga mu vy’ubuhinga bwa Bitcoin. Intumbero yacu ni ukwigisha abantu miliyaridi 1,3 ivyerekeye bicoin, gutuma habaho imiryango ikoresha Bitcoin gusa n’akazi gafitaniye isano na Bitcoin .
  
description: |
  Bitcoin Magazine, създадено през 2012 г., е основен източник на новини, анализи и коментари за Bitcoin и блокчейн.
  
  Основано е от Михай Алиси и Виталик Бутерин, а сега е собственост на BTC Media LLC. Редакционният екип на списанието има за цел да предоставя точно, навременно и подходящо съдържание на ентусиастите на Bitcoin, разработчиците, инвеститорите и предприемачите. Те предлагат възможности за реклама, плащат на авторите си, но строго забраняват плащания от трети страни за отразяване на събитията. Служителите често притежават криптовалути, като за избягване на конфликти на интереси е въведена строга политика на оповестяване.
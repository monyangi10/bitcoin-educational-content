description: |
  2012년에 설립된 Bitcoin 매거진은 Bitcoin 및 Blockchain 뉴스, 분석, 논평을 제공하는 최고의 소식통입니다.
  
  미하이 알리시와 비탈릭 부테린이 설립한 이 매거진은 현재 BTC Media LLC가 소유하고 있습니다. 이 매거진의 편집팀은 Bitcoin 애호가, 개발자, 투자자, 기업가에게 정확하고 시의적절하며 관련성 있는 콘텐츠를 제공하는 것을 목표로 합니다. 광고 기회를 제공하고 저자에게 비용을 지불하지만 취재에 대한 제3자 대가는 엄격히 금지하고 있습니다. 직원들은 종종 암호화폐를 보유하고 있으며, 이해 상충을 피하기 위해 엄격한 공개 정책을 시행하고 있습니다.
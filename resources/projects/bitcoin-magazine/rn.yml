description: |
  Ikinyamakuru Bitcoin, cashinzwe mu 2012, ni isoko ry’imbere ry’amakuru ya Bitcoin na Blockchain, isesengura n’ibisobanuro. 
  
  Yashinzwe na Mihai Alisie na Vitalik Buterin, ubu ikaba ari iya BTC Media LLC. Ishirahamwe ry’abanyamakuru b’iki kinyamakuru rifise intumbero yo gutanga ibintu vy’ukuri, bigeze ku gihe kandi bibereye ku bakunzi ba Bitcoin, abayitegura, abashoramari n’abanyamigambi. Bitanga uturyo two kwamamaza, bihemba abanditsi bavyo, ariko bikabuza cane abandi kwishura kugira ngo bamenyeshe. Abakozi akenshi bafise amafaranga y’ivy’ubuhinga bwa none, hakaba hariho ingingo ngenderwako ikomeye yo gutangaza amakuru kugira ngo ntihagire amakimbirane y’inyungu.
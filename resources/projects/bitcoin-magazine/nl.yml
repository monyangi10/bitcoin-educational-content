description: |
  Bitcoin Magazine, opgericht in 2012, is een topbron voor Bitcoin en Blockchain nieuws, analyse en commentaar.
  
  Het werd opgericht door Mihai Alisie en Vitalik Buterin en is nu eigendom van BTC Media LLC. Het redactieteam van het tijdschrift streeft ernaar om nauwkeurige, actuele en relevante inhoud te bieden aan Bitcoin enthousiastelingen, ontwikkelaars, investeerders en ondernemers. Ze bieden advertentiemogelijkheden, betalen hun auteurs, maar verbieden betalingen door derden voor berichtgeving. De medewerkers bezitten vaak cryptocurrencies, met een strikt openbaarmakingsbeleid om belangenverstrengeling te voorkomen.
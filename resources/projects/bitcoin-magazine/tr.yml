description: |
  2012 yılında kurulan Bitcoin Magazine, Bitcoin ve Blockchain haberleri, analizleri ve yorumları için en iyi kaynaktır.
  
  Mihai Alisie ve Vitalik Buterin tarafından kurulan dergi şu anda BTC Media LLC'ye aittir. Derginin editör ekibi, Bitcoin meraklılarına, geliştiricilere, yatırımcılara ve girişimcilere doğru, zamanında ve ilgili içerik sağlamayı amaçlamaktadır. Reklam fırsatları sunuyorlar, yazarlarına ödeme yapıyorlar, ancak haber için üçüncü taraf ödemelerini kesinlikle yasaklıyorlar. Personel genellikle kripto para birimlerine sahiptir ve çıkar çatışmalarını önlemek için sıkı bir açıklama politikası uygulanmaktadır.
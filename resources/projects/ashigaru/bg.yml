description: |
  Ashigaru е безплатна версия с отворен код Bitcoin wallet, създадена от Fork на Samurai Wallet след ареста на разработчиците му. Тя предлага усъвършенствани инструменти за защита на личните данни на Bitcoin, като Whirlpool за присъединяване на монети към Zerolink, поддръжка на BIP-47 чрез PayNym, връзка с възел Dojo чрез Tor и функции като Ricochet, Stealth Mode и контрол на UTXO, всички в самостоятелно съхранение.
description: |
  आशिगारू एक मुफ़्त और ओपन सोर्स Bitcoin Wallet है, जो समुराई Wallet के Fork से उसके डेवलपर्स की गिरफ़्तारी के बाद बना है। यह उन्नत Bitcoin गोपनीयता उपकरण प्रदान करता है, जैसे कि ज़ीरोलिंक कॉइनजॉइन के लिए Whirlpool, PayNym के ज़रिए BIP-47 सपोर्ट, Tor के ज़रिए डोजो नोड से कनेक्शन, और रिकोशे, स्टील्थ मोड और UTXO कंट्रोल जैसी सुविधाएँ, और ये सभी स्व-संरक्षण में उपलब्ध हैं।
description: |
  آشیگارو یک Bitcoin Wallet رایگان و متن‌باز است که از Fork سامورایی Wallet پس از دستگیری توسعه‌دهندگان آن به وجود آمده است. این ابزارهای پیشرفته حریم خصوصی Bitcoin مانند Whirlpool برای Zerolink coinjoins، پشتیبانی از BIP-47 از طریق PayNym، اتصال به یک نود Dojo از طریق Tor و ویژگی‌هایی مانند Ricochet، حالت مخفی و کنترل UTXO را ارائه می‌دهد، همه در خود-نگهداری.
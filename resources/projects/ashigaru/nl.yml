description: |
  Ashigaru is een vrije en open source Bitcoin Wallet, ontstaan uit Samurai Wallet's Fork na de arrestatie van de ontwikkelaars. Het biedt geavanceerde Bitcoin privacy tools zoals Whirlpool voor Zerolink coinjoins, BIP-47 ondersteuning via PayNym, verbinding met een Dojo node via Tor, en functies zoals Ricochet, Stealth Mode en UTXO controle, allemaal in eigen beheer.
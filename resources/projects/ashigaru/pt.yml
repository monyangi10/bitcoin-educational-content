description: |
  Ashigaru é um Bitcoin Wallet gratuito e de código aberto, nascido do Fork do Samurai Wallet após a prisão dos seus criadores. Oferece ferramentas avançadas de privacidade Bitcoin, tais como Whirlpool para coinjoins Zerolink, suporte BIP-47 via PayNym, ligação a um nó Dojo via Tor, e caraterísticas como Ricochet, Stealth Mode e controlo UTXO, tudo em auto-custódia.
description: |
  Ashigaru je besplatan i otvoren izvor Bitcoin Wallet, nastao iz Samurai Wallet's Fork nakon hapšenja njegovih programera. Nudi napredne Bitcoin alate za privatnost kao što je Whirlpool za Zerolink coinjoins, BIP-47 podršku putem PayNym, povezivanje sa Dojo čvorom preko Tor-a, i funkcije kao što su Ricochet, Stealth Mode i UTXO kontrola, sve u samostalnom čuvanju.
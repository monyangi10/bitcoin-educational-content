description: |
  Ashigaru je svobodný a otevřený Bitcoin Wallet, který vznikl z Fork Samurai Wallet po zatčení jeho vývojářů. Nabízí pokročilé nástroje pro ochranu soukromí Bitcoin, jako je Whirlpool pro spojení mincí Zerolink, podpora BIP-47 prostřednictvím PayNym, připojení k uzlu Dojo prostřednictvím Toru a funkce jako Ricochet, Stealth Mode a ovládání UTXO, a to vše v samospádové podobě.
description: |
  Ashigaru ni Bitcoin Wallet y’ubuntu kandi yuguruye, yavutse kuri Fork ya Samurai Wallet inyuma y’ugufatwa kw’abayikoze. Itanga ibikoresho vy’ubuzima bwite vya Bitcoin biteye imbere nka Whirlpool ku mahera ya Zerolink, ubufasha bwa BIP-47 biciye kuri PayNym, gufatanya n’urudodo rwa Dojo biciye kuri Tor, n’ibintu nka Ricochet, Stealth Mode n’ubugenzuzi bwa UTXO, vyose biri mu kwizigama.
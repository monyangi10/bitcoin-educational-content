description: |
  Ashigaru, geliştiricilerinin tutuklanmasının ardından Samurai Wallet'nin Fork'ünden doğan ücretsiz ve açık kaynaklı bir Bitcoin Wallet'dir. Zerolink coinjoins için Whirlpool, PayNym aracılığıyla BIP-47 desteği, Tor aracılığıyla bir Dojo düğümüne bağlantı ve Ricochet, Stealth Mode ve UTXO kontrolü gibi özellikler gibi gelişmiş Bitcoin gizlilik araçlarını kendi gözetiminde sunar.
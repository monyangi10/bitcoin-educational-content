description: |
  Ashigaru ni chanzo huria na huria cha Bitcoin Wallet, kilichozaliwa kutoka Fork ya Samurai Wallet kufuatia kukamatwa kwa wasanidi wake. Inatoa zana za hali ya juu za faragha za Bitcoin kama vile Whirlpool kwa viunganishi vya Zerolink, usaidizi wa BIP-47 kupitia PayNym, muunganisho wa nodi ya Dojo kupitia Tor, na vipengele kama vile Ricochet, Modi ya Stealth na udhibiti wa UTXO, vyote vikiwa chini ya ulinzi wa kibinafsi.
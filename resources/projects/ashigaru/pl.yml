description: |
  Ashigaru to darmowy i otwarty Bitcoin Wallet, zrodzony z Fork Samurai Wallet po aresztowaniu jego twórców. Oferuje zaawansowane narzędzia Bitcoin do ochrony prywatności, takie jak Whirlpool dla coinjoinów Zerolink, wsparcie BIP-47 przez PayNym, połączenie z węzłem Dojo przez Tor oraz funkcje takie jak Ricochet, Stealth Mode i kontrola UTXO, a wszystko to we własnym zakresie.
description: |
  사무라이는 개인 정보 보호 및 보안에 특화된 Bitcoin Wallet입니다.
  
  고급 기술을 사용하여 Blockchain 기반 감시를 방지하고 오프라인 거래를 허용합니다. 비수탁형 Wallet는 개인 키에 대한 완전한 제어 기능을 제공합니다. 또한, 고성능 자체 호스팅 Full node인 로닌도조와 비트코인과 거래 내역 간의 연결을 끊기 위해 설계된 차우미안 CoinJoin의 구현인 Whirlpool를 제공합니다. 사무라이의 팀은 개인 정보 보호 활동가들로 구성되어 있으며, Bitcoin 생태계에서 개인 정보 보호와 보안을 우선시하는 소프트웨어를 만드는 데 전념하고 있습니다.
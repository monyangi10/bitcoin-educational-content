description: |
  Samourai เป็น Bitcoin wallet ที่มุ่งเน้นความเป็นส่วนตัวและความปลอดภัย
  
  มันใช้เทคโนโลยีขั้นสูงเพื่อป้องกันการเฝ้าระวังที่ใช้บล็อกเชนและอนุญาตให้ทำธุรกรรมแบบออฟไลน์ wallet ที่ไม่ใช่การดูแลรักษาให้การควบคุมเต็มรูปแบบเหนือคีย์ส่วนตัว นอกจากนี้ยังมี RoninDojo, full node ที่มีประสิทธิภาพสูงและโฮสต์เอง, และ Whirlpool ซึ่งเป็นการนำ Chaumian CoinJoin มาใช้ ออกแบบมาเพื่อทำลายลิงก์ระหว่างบิตคอยน์และประวัติการทำธุรกรรม ทีมงานเบื้องหลัง Samourai ประกอบด้วยนักเคลื่อนไหวด้านความเป็นส่วนตัวที่มุ่งมั่นในการสร้างซอฟต์แวร์ที่ให้ความสำคัญกับความเป็นส่วนตัวและความปลอดภัยในระบบนิเวศ Bitcoin
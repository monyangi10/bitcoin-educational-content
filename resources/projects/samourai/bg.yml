description: |
  Samourai е Bitcoin wallet, посветен на поверителността и сигурността.
  
  Тя използва усъвършенствани технологии за предотвратяване на наблюдението, базирано на блокчейн, и позволява офлайн транзакции. Несъхраняващата се wallet осигурява пълен контрол върху частните ключове. Той предлага и RoninDojo, високопроизводителен, самохостващ се full node, и Whirlpool, реализация на чауменския CoinJoin, предназначен да прекъсне връзката между биткойните и историята на техните транзакции. Екипът, който стои зад Samourai, се състои от активисти за защита на личните данни, ангажирани със създаването на софтуер, който дава приоритет на неприкосновеността на личния живот и сигурността в екосистемата Bitcoin.
description: |
  Samourai is een Bitcoin Wallet toegewijd aan privacy en veiligheid.
  
  Het maakt gebruik van geavanceerde technologieën om toezicht op Blockchain te voorkomen en maakt offline transacties mogelijk. De niet-custodiale Wallet biedt volledige controle over private sleutels. Het biedt ook RoninDojo, een krachtige, zelf gehoste Full node, en Whirlpool, een implementatie van Chaumian CoinJoin, ontworpen om de link tussen bitcoins en hun transactiegeschiedenis te verstoren. Het team achter Samourai bestaat uit privacy-activisten die toegewijd zijn aan het maken van software die privacy en veiligheid prioriteit geeft in het Bitcoin ecosysteem.
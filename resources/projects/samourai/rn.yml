description: |
  Samourai ni Bitcoin Wallet yihariye ku bijanye n’ubuzima bwite n’umutekano. 
  
  Ikoresha ubuhinga buteye imbere kugira ngo ntihagire ubugenzuzi bushingiye kuri Blockchain kandi iremesha gukoresha amafaranga atari mu nzira. Wallet idafise ububiko itanga ububasha bwose ku mfunguruzo z’ibanga. Itanga kandi RoninDojo, igikorwa gikomeye cane, Full node yikorera, na Whirlpool, ugushirwa mu ngiro kwa Chaumian CoinJoin, igenewe guhungabanya isano hagati y’ama bitcoins n’amateka yabo y’ugucuruza. Ishirahamwe riri inyuma ya Samourai rigizwe n’abaharanira ubuzima bwite biyemeje guhingura porogarama zishira imbere ubuzima bwite n’umutekano mu bidukikije vya Bitcoin.
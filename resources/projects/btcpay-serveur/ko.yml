description: |
  BTCPay 서버는 자체 호스팅되는 오픈소스 Bitcoin 결제 프로세서입니다.
  
  이 소프트웨어를 사용하면 수수료나 제3자 중개자 없이 Bitcoin(BTC) 결제를 Wallet로 직접 수락할 수 있습니다. 향상된 개인 정보 보호 및 보안, 사용자 지정 가능한 사용자 Interface, 이커머스 및 POS 사용 기능을 제공합니다. 이 플랫폼은 워드프레스, 마그네토, 드루팔 등 다양한 이커머스 플랫폼과의 통합을 지원합니다. 기업, 자선단체, 콘텐츠 크리에이터, 개인이 자체적으로 관리할 수 있는 Bitcoin 결제 시스템을 찾는다면 다용도로 활용할 수 있는 솔루션입니다.
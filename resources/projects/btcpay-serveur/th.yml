description: |
  BTCPay Server เป็นโปรเซสเซอร์การชำระเงิน Bitcoin แบบโอเพ่นซอร์สที่โฮสต์เอง
  
  ซอฟต์แวร์นี้ช่วยให้คุณรับชำระเงิน Bitcoin (BTC) โดยตรงไปยัง wallet ของคุณ โดยไม่มีค่าธรรมเนียมหรือคนกลาง มันมีความเป็นส่วนตัวและความปลอดภัยที่เพิ่มขึ้น อินเทอร์เฟซผู้ใช้ที่ปรับแต่งได้ และฟีเจอร์สำหรับการใช้งานทั้งอีคอมเมิร์ซและจุดขาย แพลตฟอร์มนี้รองรับการผสานรวมกับแพลตฟอร์มอีคอมเมิร์ซต่างๆ เช่น WordPress, Magneto, Drupal และอื่นๆ เป็นโซลูชันที่หลากหลายสำหรับธุรกิจ องค์กรการกุศล ผู้สร้างเนื้อหา และบุคคลที่มองหาระบบการชำระเงิน Bitcoin ที่เป็นอิสระ
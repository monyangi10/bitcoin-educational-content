description: |
  BTCPay Server is een zelf gehoste, open-source Bitcoin betalingsverwerker.
  
  Met deze software kun je Bitcoin (BTC) betalingen direct op je Wallet accepteren, zonder kosten of tussenkomst van een derde partij. Het biedt verbeterde privacy en veiligheid, een aanpasbare Interface gebruiker en functies voor zowel e-commerce als point-of-sale gebruik. Het platform ondersteunt integratie met verschillende e-commerce platforms zoals WordPress, Magneto, Drupal en andere. Het is een veelzijdige oplossing voor bedrijven, liefdadigheidsinstellingen, contentmakers en particulieren die op zoek zijn naar een autonoom Bitcoin betalingssysteem.
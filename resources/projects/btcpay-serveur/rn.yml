description: |
  BTCPay Server ni ubuhinga bwo kwishura Bitcoin bwikoresha, bufise inkomoko yuguruye. 
  
  Iyi porogarama iragufasha kwemera amahera ya Bitcoin (BTC) ataco ushize kuri Wallet yawe, ata mahera canke uwundi muntu akufasha. Itanga ubuzima bwite n’umutekano vyiza, umukoresha ashobora guhindurwa Interface, n’ibintu vyo gukoresha mu bucuruzi bwo kuri interineti no mu gukoresha aho ugurisha. Iryo koraniro rifasha gukorana n’ibindi bikoresho bitandukanye vy’ubudandaji nka WordPress, Magneto, Drupal, n’ibindi. Ni umuti w’ibintu vyinshi ku bucuruzi, amashirahamwe y’ubugiraneza, abahingura ibintu, n’abantu ku giti cabo barondera uburyo bwo kwishura Bitcoin bwigenga.
description: |
  Сървърът на BTCPay е самостоятелно хостван платежен процесор с отворен код Bitcoin.
  
  Този софтуер ви позволява да приемате Bitcoin (BTC) плащания директно към вашия wallet, без такси или посредник от трета страна. Той предлага подобрена поверителност и сигурност, персонализируем потребителски интерфейс и функции за използване както в електронната търговия, така и в точките за продажба. Платформата поддържа интеграция с различни платформи за електронна търговия като WordPress, Magneto, Drupal и други. Това е универсално решение за предприятия, благотворителни организации, създатели на съдържание и физически лица, които търсят самостоятелна система за плащане Bitcoin.
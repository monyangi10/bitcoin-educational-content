description: |
  Bitcoin Bush Bash ni urutonde rw’ibirori bitamenyerewe, vy’abanyagihugu ba Bitcoin bibera mu bice vy’akarere ka Australiya. Igamije gutuma abantu bagira inyiyumvo yo kubana n’abandi no gushigikira kwemera Bitcoin hanze y’ibisagara bininibinini. Ivyo birori bikunda kubamwo ibiganiro, ibiganiro, n’ibikorwa vy’imibano vyibanda kuri Bitcoin, bikwegera abashasha n’abazi Bitcoiners. Bush Bash yateguwe kugira ngo umuntu ashobore kuyironka, ashimikiye cane ku kwubaka ubumenyi bwo mu karere ka Bitcoin no guhimiriza iterambere ry’ibidukikije vya Bitcoin mu ntara z’ivyaro. Ivyo birori birazwi cane kubera ko bimeze neza kandi birongowe n’abanyagihugu, bikaba birinda guterwa inkunga cane canke gucuruzwa, ivyo bikaba bifasha kuguma vyibanda ku ngingo ngenderwako nyamukuru za Bitcoin n’ivyiza bishobora kuronka ku bantu ku giti cabo no ku mibano.
  
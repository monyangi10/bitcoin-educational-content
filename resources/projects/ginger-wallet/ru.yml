description: |
  Bitcoin wallet с открытым исходным кодом, не требующая хранения данных, с акцентом на приватность. Fork от Wasabi Wallet, Ginger интегрирует coinjoins, Tor и аппаратную совместимость wallet. Разработанный как простой и автоматизированный, он позволяет каждому сохранить свой финансовый суверенитет и анонимность без особых усилий.
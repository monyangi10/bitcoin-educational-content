description: |
  Avatud lähtekoodiga, mittekaitstav Bitcoin wallet, mis keskendub privaatsusele. Fork alates Wasabi Wallet, Ginger integreerib coinjoins, Tor ja riistvara wallet ühilduvuse. See on loodud lihtsaks ja automatiseeritud, võimaldades kõigil oma rahalise sõltumatuse ja anonüümsuse säilitamist vaevata.
description: |
  Open-source, niet-custodial Bitcoin wallet met de nadruk op privacy. Fork van Wasabi Wallet, Ginger integreert coinjoins, Tor en hardware wallet compatibiliteit. Ontworpen om eenvoudig en geautomatiseerd te zijn, stelt het iedereen in staat om moeiteloos zijn financiële soevereiniteit en anonimiteit te bewaren.
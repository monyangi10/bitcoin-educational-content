description: |
  Avoimen lähdekoodin Bitcoin wallet, jossa ei ole huoltajuutta ja jossa keskitytään yksityisyyteen. Fork Wasabi Wallet:stä, Ginger integroi coinjoinit, Torin ja laitteiston wallet-yhteensopivuuden. Se on suunniteltu yksinkertaiseksi ja automatisoiduksi, ja sen avulla jokainen voi säilyttää taloudellisen riippumattomuutensa ja anonymiteettinsä vaivattomasti.
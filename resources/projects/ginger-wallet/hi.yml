description: |
  ओपन-सोर्स, नॉन-कस्टोडियल Bitcoin wallet, गोपनीयता पर केंद्रित। Wasabi Wallet से Fork, Ginger, कॉइनजॉइन्स, Tor और हार्डवेयर wallet संगतता को एकीकृत करता है। सरल और स्वचालित होने के लिए डिज़ाइन किया गया, यह सभी को अपनी वित्तीय संप्रभुता और गुमनामी को सहजता से बनाए रखने में सक्षम बनाता है।
description: |
  Otvoreni kod, ne-kustodijalni Bitcoin wallet sa fokusom na privatnost. Fork iz Wasabi Wallet, Ginger integriše coinjoins, Tor i kompatibilnost sa hardverskim wallet. Dizajniran da bude jednostavan i automatizovan, omogućava svima da očuvaju svoj finansijski suverenitet i anonimnost bez napora.
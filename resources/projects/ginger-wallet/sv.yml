description: |
  Öppen källkod, Bitcoin wallet utan frihetsberövande med fokus på integritet. Fork från Wasabi Wallet, Ginger integrerar coinjoins, Tor och hårdvarukompatibilitet med wallet. Ginger är utformad för att vara enkel och automatiserad och gör det möjligt för alla att bevara sin ekonomiska suveränitet och anonymitet utan ansträngning.
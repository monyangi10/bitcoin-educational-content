description: |
  Sumber terbuka, non-kustodian Bitcoin wallet dengan fokus pada privasi. Fork dari Wasabi Wallet, Ginger mengintegrasikan kompatibilitas coinjoin, Tor dan perangkat keras wallet. Dirancang untuk menjadi sederhana dan otomatis, ini memungkinkan semua orang untuk menjaga kedaulatan keuangan dan anonimitas mereka dengan mudah.
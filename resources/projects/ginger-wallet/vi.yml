description: |
  Bitcoin wallet mã nguồn mở, không lưu ký, tập trung vào quyền riêng tư. Từ Fork, Ginger tích hợp coinjoin, Tor và khả năng tương thích phần cứng với wallet. Được thiết kế đơn giản và tự động hóa, Ginger cho phép mọi người bảo vệ chủ quyền tài chính và tính ẩn danh của mình một cách dễ dàng.
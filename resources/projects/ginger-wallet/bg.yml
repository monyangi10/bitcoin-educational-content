description: |
  Bitcoin wallet с отворен код, без право на задържане, с акцент върху неприкосновеността на личния живот. Fork от Wasabi Wallet, Джинджър интегрира монети, Tor и хардуерна съвместимост с wallet. Проектиран да бъде прост и автоматизиран, той позволява на всеки да запази финансовия си суверенитет и анонимност без усилие.
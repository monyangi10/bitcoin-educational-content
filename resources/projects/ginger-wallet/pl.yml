description: |
  Bitcoin wallet o otwartym kodzie źródłowym z naciskiem na prywatność. Fork z Wasabi Wallet, Ginger integruje coinjoiny, Tor i sprzętową kompatybilność wallet. Zaprojektowany tak, aby był prosty i zautomatyzowany, umożliwia każdemu zachowanie suwerenności finansowej i anonimowości bez wysiłku.
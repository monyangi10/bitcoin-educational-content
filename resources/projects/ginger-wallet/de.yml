description: |
  Open-Source, nicht-verwahrendes Bitcoin wallet mit Fokus auf Privatsphäre. Fork von Wasabi Wallet, Ginger integriert Coinjoins, Tor und Hardware wallet Kompatibilität. Entwickelt, um einfach und automatisiert zu sein, ermöglicht es jedem, seine finanzielle Souveränität und Anonymität mühelos zu bewahren.
description: |
  Joltz ni umuhinga mu bijanye n’ubuhinga bwibanda ku gutuma amahera yishurwa Bitcoin agenda neza no kworohereza ubucuruzi gukorana na Lightning Network. Biciye kuri APIs zayo n’ibikoresho vy’abahinguzi, Joltz ishoboza gukoresha amafaranga yihuta, atekanye, kandi akora neza ya Bitcoin, bikaba vyoroshe ku bacuruzi n’ibibanza vyo gukoresha amafaranga y’ubuhinga bwa none ata ngorane nyinshi.
  
description: |
  우리의 임무는 개인 투자자에게 독점적 인 액세스를 제공하는 것입니다
  개인 시장 투자에 대한 독점적 접근을 제공하는 동시에 Bitcoin 및 오픈 소스 프로젝트의
  오픈소스 프로젝트의 성장을 지원하는 것입니다. 저희는 투자자 교육, 완전한 규제 준수 및
  규정을 준수하고 생태계 내에서 활기찬 커뮤니티를 육성하기 위해 최선을 다하고 있습니다.
  
  Thunder Funder는 미국 증권거래위원회(SEC)에 등록된 펀딩 포털입니다
  위원회(SEC)와 금융 산업 규제 당국의 회원사
  (FINRA)의 회원입니다. 당사는 증권형 크라우드펀딩 규제에 따라 증권형 펀딩을 진행합니다
  ("Reg CF")에 따라 1933년 증권법에 따른 증권 공모를 촉진합니다.
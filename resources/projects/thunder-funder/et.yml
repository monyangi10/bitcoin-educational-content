description: |
  Meie missioon on pakkuda jaeinvestoritele eksklusiivset juurdepääsu eraturu investeeringud, toetades samal ajal Bitcoin ja avatud lähtekoodiga projekte. Oleme pühendunud investorite harimisele, täielikule regulatiivsele nõuetele vastavust ja elujõulise kogukonna edendamist meie ökosüsteemis.

  Thunder Funder on väärtpaberite ja Exchange registreeritud rahastamisportaal Commission (SEC) ning Financial Industry Regulatory Authority liige (FINRA) LIIGE. Me hõlbustame väärtpaberipakkumisi määruse (Regulation Crowdfunding) alusel ("Reg CF") vastavalt 1933. aasta väärtpaberite seadusele.
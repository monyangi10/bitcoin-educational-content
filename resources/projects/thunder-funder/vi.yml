description: |
  Sứ mệnh của chúng tôi là cung cấp cho các nhà đầu tư bán lẻ quyền truy cập độc quyền vào các khoản đầu tư trên thị trường tư nhân trong khi hỗ trợ sự phát triển của Bitcoin và các dự án nguồn mở. Chúng tôi cam kết giáo dục nhà đầu tư, tuân thủ đầy đủ các quy định và thúc đẩy một cộng đồng năng động trong hệ sinh thái của chúng tôi.

  Thunder Funder là một cổng thông tin tài trợ đã đăng ký với Ủy ban Chứng khoán và Exchange (SEC) và là thành viên của Cơ quan quản lý ngành tài chính (FINRA). Chúng tôi tạo điều kiện cho các đợt chào bán chứng khoán theo Quy định về huy động vốn cộng đồng (“Reg CF”) của Đạo luật Chứng khoán năm 1933.
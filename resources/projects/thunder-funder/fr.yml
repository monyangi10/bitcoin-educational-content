description: |
  Notre mission est de fournir aux investisseurs individuels un accès exclusif aux investissements sur le marché privé tout en soutenant la croissance de Bitcoin et de GW-2 aux investissements du marché privé tout en soutenant la croissance des projets Bitcoin et projets open-source. Nous nous engageons à éduquer les investisseurs, à nous conformer à la réglementation et à favoriser l'émergence d'une communauté dynamique au sein de notre écosystème.

  Thunder Funder est un portail de financement enregistré auprès de la Securities and Exchange Commission (SEC) et membre de la Financial Industry Regulatory Authority (FINRA) (FINRA). Nous facilitons les offres de titres en vertu de la réglementation Crowdfunding ("Reg CF") de la loi sur les valeurs mobilières de 1933.
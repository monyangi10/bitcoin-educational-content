description: |
  Vårt oppdrag er å gi privatinvestorer eksklusiv tilgang til private markedsinvesteringer samtidig som vi støtter veksten i Bitcoin og åpen kildekode-prosjekter. Vi er forpliktet til investoropplæring, full etterlevelse av regelverk og å fremme et levende fellesskap i økosystemet vårt.

  Thunder Funder er en finansieringsportal registrert hos Securities and Exchange Commission (SEC) og medlem av Financial Industry Regulatory Authority (FINRA) (FINRA). Vi legger til rette for verdipapirtilbud under Regulation Crowdfunding ("Reg CF") i verdipapirloven av 1933.
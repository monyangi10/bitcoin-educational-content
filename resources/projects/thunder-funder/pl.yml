description: |
  Naszą misją jest zapewnienie inwestorom detalicznym wyłącznego dostępu do inwestycji na rynku prywatnym, jednocześnie wspierając rozwój Bitcoin i projektów projektów open-source. Jesteśmy zaangażowani w edukację inwestorów, pełną zgodność z przepisami zgodność z przepisami i wspieranie tętniącej życiem społeczności w naszym ekosystemie.

  Thunder Funder to portal finansowania zarejestrowany w Komisji Papierów Wartościowych i Exchange Komisji Papierów Wartościowych i Giełd (SEC) oraz członkiem Financial Industry Regulatory Authority (FINRA). Ułatwiamy oferty papierów wartościowych zgodnie z rozporządzeniem Crowdfunding ("Reg CF") Ustawy o papierach wartościowych z 1933 roku.
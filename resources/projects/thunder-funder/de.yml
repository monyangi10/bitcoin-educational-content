description: |
  Unsere Aufgabe ist es, Kleinanlegern einen exklusiven Zugang zu privatmarktinvestitionen zu ermöglichen und gleichzeitig das Wachstum von Bitcoin und open-Source-Projekte zu unterstützen. Wir engagieren uns für die Aufklärung der Anleger, die vollständige und die Förderung einer lebendigen Gemeinschaft innerhalb unseres Ökosystems.

  Thunder Funder ist ein Finanzierungsportal, das bei der Securities and Exchange Commission (SEC) registriert und ist Mitglied der Financial Industry Regulatory Authority (FINRA). Wir erleichtern Wertpapierangebote gemäß der Verordnung Crowdfunding ("Reg CF") des Wertpapiergesetzes von 1933.
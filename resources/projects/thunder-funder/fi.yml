description: |
  Tehtävämme on tarjota yksityissijoittajille yksinoikeudella seuraavat palvelut yksityismarkkinasijoituksiin ja tukevat samalla Bitcoin:n kasvua ja avoimen lähdekoodin projekteja. Olemme sitoutuneet sijoittajille suunnattuun koulutukseen, täyteen sääntelyyn noudattamiseen ja elinvoimaisen yhteisön vaalimiseen ekosysteemissämme.

  Thunder Funder on rahoitusportaali, joka on rekisteröity arvopaperi- ja Exchange Commissionin (SEC) rekisteröity ja Financial Industry Regulatory Authorityn jäsen (FINRA). Helpotamme arvopaperitarjouksia Regulation Crowdfunding -asetuksen mukaisesti ("Reg CF") vuoden 1933 arvopaperilain nojalla.
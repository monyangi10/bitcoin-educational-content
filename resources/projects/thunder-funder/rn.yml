description: |
  Intumbero yacu ni uguha abashoramari b’ubudandaji uburenganzira bwo gushika ku
  isoko ry’abikorera ku giti cabo mu gihe rishigikira iterambere rya Bitcoin na
  imigambi y’inkomoko yuguruye. Twiyemeje kwigisha abashoramari, gukurikiza amategeko yose
  kwubahiriza amategeko, no guteza imbere umuryango ugira ubuzima mu bidukikije vyacu.
  
  Thunder Funder ni urubuga rwo gutanga amafaranga rwanditswe mu bigo vy’ubutunzi na Exchange.
  Komisiyo (SEC) n’umunyamuryango w’Ikigo kijejwe gucungera inganda z’ivy’imari
  (IBIMENYETSO). Turafasha mu gutanga amashikanwa y'umutekano hakurikijwe amabwirizwa y'ugufasha abantu benshi
  (“Reg CF”) ry’Itegeko ry’Ivy’Imigabane ryo mu 1933.
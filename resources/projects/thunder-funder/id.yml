description: |
  Misi kami adalah menyediakan akses eksklusif kepada investor ritel untuk investasi pasar swasta sambil mendukung pertumbuhan Bitcoin dan proyek-proyek sumber terbuka. Kami berkomitmen terhadap edukasi investor, kepatuhan terhadap peraturan peraturan penuh, dan membina komunitas yang dinamis dalam ekosistem kami.

  Thunder Funder adalah portal pendanaan yang terdaftar di Securities and Komisi Sekuritas dan Exchange (SEC) dan anggota Otoritas Regulator Industri Keuangan (FINRA). Kami memfasilitasi penawaran sekuritas di bawah Regulasi Crowdfunding ("Reg CF") dari Undang-Undang Sekuritas tahun 1933.
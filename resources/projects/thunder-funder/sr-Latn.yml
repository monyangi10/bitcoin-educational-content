description: |
  Naša misija je da obezbedimo maloprodajnim investitorima ekskluzivan pristup investicijama na privatnom tržištu dok podržavamo rast Bitcoin i open-source projekata. Posvećeni smo edukaciji investitora, potpunoj regulatornoj usklađenosti i negovanju dinamične zajednice unutar našeg ekosistema.

  Thunder Funder je portal za finansiranje registrovan kod Komisije za hartije od vrednosti i Exchange (SEC) i član Finansijske industrijske regulatorne agencije (FINRA). Olakšavamo ponude hartija od vrednosti prema Regulaciji Crowdfunding („Reg CF“) Zakona o hartijama od vrednosti iz 1933. godine.
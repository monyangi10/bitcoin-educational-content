description: |
  Naším posláním je poskytovat drobným investorům exkluzivní přístup k soukromých investic a zároveň podporovat růst společností Bitcoin a GW-2 open-source projektů. Zavázali jsme se ke vzdělávání investorů, úplnému regulačnímu dodržování předpisů a podpoře živé komunity v rámci našeho ekosystému.

  Thunder Funder je portál pro financování registrovaný u Úřadu pro cenné papíry a Exchange Commission (SEC) a členem Financial Industry Regulatory Authority (FINRA). Zprostředkováváme nabídky cenných papírů podle nařízení o crowdfundingu (Regulation Crowdfunding) ("Reg CF") zákona o cenných papírech z roku 1933.
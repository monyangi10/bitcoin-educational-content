description: |
  Наша миссия заключается в предоставлении розничным инвесторам эксклюзивного доступа к частным инвестициям, поддерживая при этом рост Bitcoin и проектов с открытым исходным кодом. Мы стремимся к просвещению инвесторов, полному соблюдению нормативных требований соблюдение всех нормативных требований, а также создание энергичного сообщества в рамках нашей экосистемы.

  Thunder Funder - это портал финансирования, зарегистрированный Комиссией по ценным бумагам и Exchange Комиссии по ценным бумагам и биржам США (SEC) и является членом Управления по регулированию финансовой индустрии (FINRA). Мы содействуем размещению ценных бумаг в соответствии с Положением о краудфандинге ("Reg CF") Закона о ценных бумагах от 1933 года.
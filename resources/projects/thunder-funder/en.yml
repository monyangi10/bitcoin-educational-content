description: |
  Our mission is to provide retail investors exclusive access to
  private market investments while supporting the growth of Bitcoin and
  open-source projects. We’re committed to investor education, full regulatory
  compliance, and fostering a vibrant community within our ecosystem.

  Thunder Funder is a funding portal registered with the Securities and Exchange
  Commission (SEC) and a member of the Financial Industry Regulatory Authority
  (FINRA). We facilitate securities offerings under Regulation Crowdfunding
  (“Reg CF”) of the Securities Act of 1933.

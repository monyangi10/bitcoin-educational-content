description: |
  La nostra missione è quella di fornire agli investitori al dettaglio un accesso esclusivo agli investimenti sul mercato privato, sostenendo al contempo la crescita dei progetti Bitcoin e progetti open-source. Ci impegniamo a educare gli investitori, a garantire la completa e a promuovere una comunità vivace all'interno del nostro ecosistema.

  Thunder Funder è un portale di finanziamento registrato presso la Securities and Exchange (SEC) e membro della Financial Industry Regulatory Authority (FINRA) (FINRA). Facilitiamo le offerte di titoli ai sensi della Regulation Crowdfunding ("Reg CF") della SEC ("Reg CF") del Securities Act del 1933.
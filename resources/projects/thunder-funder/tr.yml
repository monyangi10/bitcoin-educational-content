description: |
  Misyonumuz, bireysel yatırımcılara aşağıdakilere özel erişim sağlamaktır
  gW-1'in büyümesini desteklerken özel pazar yatırımları ve
  açık kaynaklı projeler. Yatırımcı eğitimine, tam yasal düzenlemelere ve
  uyumluluk ve ekosistemimiz içinde canlı bir topluluğu teşvik etmek.
  
  Thunder Funder, Securities and Exchange'a kayıtlı bir finansman portalıdır
  Komisyonu (SEC) ve Finans Endüstrisi Düzenleme Kurumu üyesidir
  (FINRA). Kitle Fonlaması Yönetmeliği kapsamında menkul kıymet tekliflerini kolaylaştırıyoruz
  ("Reg CF") 1933 tarihli Menkul Kıymetler Yasası.
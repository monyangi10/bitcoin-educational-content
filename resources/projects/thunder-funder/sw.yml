description: |
  Dhamira yetu ni kuwapa wawekezaji wa reja reja ufikiaji wa kipekee uwekezaji wa soko la kibinafsi huku ukisaidia ukuaji wa Bitcoin na miradi ya chanzo huria. Tumejitolea kwa elimu ya wawekezaji, udhibiti kamili kufuata, na kukuza jumuiya iliyochangamka ndani ya mfumo wetu wa ikolojia.

  Thunder Funder ni tovuti ya ufadhili iliyosajiliwa na Securities na Exchange Tume (SEC) na mwanachama wa Mamlaka ya Udhibiti wa Sekta ya Fedha (FINRA). Tunawezesha matoleo ya dhamana chini ya Udhibiti wa Umati wa Watu ("Reg CF") ya Sheria ya Usalama ya 1933.
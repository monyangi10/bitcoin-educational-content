description: |
  Onze missie is om particuliere investeerders exclusieve toegang te bieden tot
  investeringen op de particuliere markt en tegelijkertijd de groei van Bitcoin en
  open-source projecten. We zetten ons in voor de educatie van investeerders, volledige
  volledige naleving van de regelgeving en het stimuleren van een levendige gemeenschap binnen ons ecosysteem.
  
  Thunder Funder is een financieringsportaal dat geregistreerd staat bij de Securities and Exchange
  Commission (SEC) en lid van de Financial Industry Regulatory Authority (FINRA)
  (FINRA). We faciliteren effectenaanbiedingen onder Regulation Crowdfunding
  ("Reg CF") van de Securities Act van 1933.
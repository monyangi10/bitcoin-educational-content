description: |
  A nossa missão consiste em proporcionar aos investidores de retalho acesso exclusivo a investimentos no mercado privado, apoiando o crescimento de projectos Bitcoin e projectos de código aberto. Estamos empenhados na educação dos investidores, na conformidade regulamentar conformidade regulamentar e a promoção de uma comunidade vibrante no nosso ecossistema.

  O Thunder Funder é um portal de financiamento registado na Securities and Exchange Comissão de Valores Mobiliários (SEC) e membro da Autoridade Reguladora do Setor Financeiro (FINRA). Facilitamos as ofertas de valores mobiliários ao abrigo do Regulamento de Crowdfunding ("Reg CF") do Securities Act de 1933.
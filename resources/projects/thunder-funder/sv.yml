description: |
  Vårt uppdrag är att ge privatinvesterare exklusiv tillgång till privata marknadsinvesteringar samtidigt som vi stöder tillväxten av Bitcoin och öppen källkodsprojekt. Vi är engagerade i investerarutbildning, full regelefterlevnad efterlevnad och främja en livlig gemenskap inom vårt ekosystem.

  Thunder Funder är en finansieringsportal som är registrerad hos Securities and Exchange Commission (SEC) och medlem i Financial Industry Regulatory Authority (FINRA) (FINRA). Vi underlättar värdepapperserbjudanden enligt förordning Crowdfunding ("Reg CF") i Securities Act från 1933.
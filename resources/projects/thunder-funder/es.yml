description: |
  Nuestra misión es proporcionar a los inversores minoristas acceso exclusivo a inversiones en el mercado privado al tiempo que apoyamos el crecimiento de Bitcoin y proyectos de código abierto. Estamos comprometidos con la educación de los inversores, el pleno cumplimiento de la normativa y el fomento de una comunidad dinámica dentro de nuestro ecosistema y fomentar una comunidad dinámica dentro de nuestro ecosistema.

  Thunder Funder es un portal de financiación registrado en la Securities and Exchange Securities and Exchange Commission (SEC) y miembro de la Financial Industry Regulatory Authority (FINRA). Facilitamos ofertas de valores bajo la Regulación Crowdfunding ("Reg CF") de la Ley de Valores de 1933.
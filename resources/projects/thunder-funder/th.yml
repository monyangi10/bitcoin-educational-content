description: |
  ภารกิจของเราคือการให้ผู้ลงทุนรายย่อยเข้าถึงการลงทุนในตลาดเอกชนอย่างพิเศษ ในขณะเดียวกันก็สนับสนุนการเติบโตของ Bitcoin และโครงการโอเพ่นซอร์ส เรามุ่งมั่นในการให้ความรู้แก่ผู้ลงทุน ปฏิบัติตามกฎระเบียบอย่างเต็มที่ และส่งเสริมชุมชนที่มีชีวิตชีวาภายในระบบนิเวศของเรา
  
  Thunder Funder เป็นพอร์ทัลการระดมทุนที่จดทะเบียนกับคณะกรรมการหลักทรัพย์และ Exchange (SEC) และเป็นสมาชิกของหน่วยงานกำกับดูแลอุตสาหกรรมการเงิน (FINRA) เราอำนวยความสะดวกในการเสนอขายหลักทรัพย์ภายใต้ระเบียบการระดมทุน (“Reg CF”) ของพระราชบัญญัติหลักทรัพย์ปี 1933
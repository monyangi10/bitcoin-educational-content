description: |
  Breez is een innovatief platform dat gebruik maakt van de kracht van Bitcoin om de wereld van peer-to-peer betalingen te openen voor individuen en applicaties. Met de mobiele app van Breez kunnen gebruikers direct Bitcoin-betalingen verzenden en ontvangen, waardoor hun broekzak verandert in een niet-vrijblijvend Lightning-knooppunt.
  
  Het platform bevat ook een Podcasting 2.0 Player voor het streamen van Sats en ideeën, en een Point-of-Sale systeem dat Lightning-betalingen accepteert zonder KYC-vereisten. Breez fungeert ook als Lightning Service Provider en biedt liquiditeit en netwerkconnectiviteit.
  
  Voor degenen die P2P Lightning-betalingen in hun apps willen integreren, biedt Breez een SDK voor maximale aanpassing met minimale programmering. Breez Cloud verbetert verder de gebruikerservaring door de soevereiniteit van niet-custodial Lightning te combineren met het gemak van custodial services voor veelzijdige, altijd beschikbare betalingen.
  
  Breez geeft vorm aan de toekomst van de Lightning-economie en maakt Bitcoin betalingen toegankelijker en efficiënter dan ooit tevoren.
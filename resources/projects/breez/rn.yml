description: |
  Breez ni urubuga rushasha rwerekeye gukoresha ububasha bwa Bitcoin kugira ngo rwugurure isi y’ukwishyura kw’abantu ku giti cabo n’ibikorwa. Hakoreshejwe porogarama ya Breez mobile, abakoresha barashobora kohereza no kwakira amahera ya Bitcoin ubwo nyene, bagahindura umufuko wabo ukagira urudodo rwa Lightning rudashobora kubikwa.
  
  Iryo koraniro kandi rifise Podcasting 2.0 Player yo gutangaza Sats n’ivyiyumviro, n’uburyo bwa Point-of-Sale bwemera kwishura Lightning ata bisabwa vya KYC. Breez kandi ikora nk’Umutanga Serivisi y’Imiravyo, itanga amafaranga n’uguhuza urubuga.
  
  Ku barondera kwinjiza amahera ya P2P Lightning mu maporogarama yabo, Breez itanga SDK kugira ngo umuntu ashobore guhindura ibintu vyinshi afise porogarama nkeyi. Breez Cloud irarushirizaho kwongereza ubumenyi bw’abakoresha, igahuza ubusegaba bwa Lightning idafise uburenganzira bwo kuzigama n’uburyo bwo kuzigama ibikorwa vy’uburenganzira bwo kwishura mu buryo butandukanye, igihe cose.
  
  Breez iriko irahingura kazoza k’ubutunzi bwa Lightning, ituma amahera ya Bitcoin ashobora gushikwako kandi akora neza kuruta uko vyari bimeze kera.
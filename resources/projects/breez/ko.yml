description: |
  Breez는 Bitcoin의 힘을 활용하여 개인과 애플리케이션을 위한 P2P 결제의 세계를 여는 데 전념하는 혁신적인 플랫폼입니다. Breez 모바일 앱을 통해 사용자는 즉시 Bitcoin 결제를 주고받을 수 있으며, 주머니를 비수탁형 라이트닝 노드로 전환할 수 있습니다.
  
  또한 이 플랫폼에는 Sats 및 아이디어 스트리밍을 위한 팟캐스팅 2.0 플레이어와 KYC 요구 사항 없이 라이트닝 결제를 수락하는 POS 시스템이 통합되어 있습니다. 브리즈는 또한 유동성과 네트워크 연결을 제공하는 라이트닝 서비스 제공자의 역할도 수행합니다.
  
  P2P Lightning 결제를 앱에 통합하고자 하는 경우, Breez는 최소한의 프로그래밍으로 최대한 맞춤화할 수 있는 SDK를 제공합니다. Breez Cloud는 비수탁형 Lightning의 주권과 수탁 서비스의 편리함을 결합하여 사용자 경험을 더욱 향상시켜 언제 어디서나 다양하게 결제할 수 있도록 지원합니다.
  
  Breez는 Bitcoin 결제를 그 어느 때보다 더 쉽고 효율적으로 만들어 라이트닝 경제의 미래를 만들어가고 있습니다.
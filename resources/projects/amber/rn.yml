description: |
  Amber ni porogaramu yo kuri telefone ngendanwa yihariye mu kworohereza amafaranga Bitcoin.
  
  Amber yagenewe ibikoresho vya iOS na Android, itanga urubuga rwihuta, rutekanye kandi rukoreshwa neza rwo kugura, kugurisha no gucunga Bitcoin. Ico yitaho Bitcoin gusa ni co gituma amafaranga akoreshwa neza mu gihe ingingo zayo zo gucungera umutekano, harimwo kwemeza ko umuntu ari uwuriho, gushiramwo amakuru, no kuzigama mu buryo bufatanijwe, zituma abakoresha bagira amahoro yo mu mutima. Kubera ubuhinga bwayo bwo gupima igiciro c’idolari (DCA), Amber iremesha abakoresha gushinga urutonde rudasanzwe rwo kuronka Bitcoin, bikaba biyigira igikoresho ciza ku bashasha n’abamenyereye gukoresha Bitcoin.
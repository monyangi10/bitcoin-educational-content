description: |
   Le Fonds Hodari est un programme de capital-risque destiné aux entrepreneurs exclus du système financier. Il finance en priorité des projets portés par des réfugiés, des personnes débancarisées et d'autres profils sans accès aux capitaux traditionnels. En plus du financement, il offre une éducation digitale et financière adaptée, afin de renforcer la résilience des bénéficiaires et de favoriser leur autonomisation durable.

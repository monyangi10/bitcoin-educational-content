description: |
   Hodari Fonu, finansal sistemden dışlanmış girişimcilere yönelik bir risk sermayesi programıdır. Mülteciler, haklarından mahrum bırakılanlar ve geleneksel sermayeye erişimi olmayan diğer profiller tarafından yönetilen projelerin finansmanına öncelik vermektedir. Finansmana ek olarak, yararlanıcıların dayanıklılığını güçlendirmek ve sürdürülebilir güçlenmelerini teşvik etmek için özel dijital ve finansal eğitim sunar.
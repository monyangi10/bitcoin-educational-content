description: |
   Het Hodari Fund is een durfkapitaalprogramma voor ondernemers die zijn uitgesloten van het financiële systeem. Het geeft voorrang aan de financiering van projecten die worden geleid door vluchtelingen, mensen zonder rechten en andere groepen die geen toegang hebben tot traditioneel kapitaal. Naast financiering biedt het op maat gemaakte digitale en financiële educatie om de weerbaarheid van begunstigden te versterken en hun duurzame empowerment te bevorderen.
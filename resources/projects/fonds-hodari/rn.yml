description: |
   Ikigega ca Hodari ni porogarama y’ubudandaji bw’abanyamigambi bavuye mu bijanye n’ivy’ubutunzi. Itanga imbere mu gufasha imigambi iyobowe n’impunzi, abatagira uburenganzira n’abandi bantu badashobora kuronka umutungo w’agaciro. Uretse amafaranga, itanga inyigisho zijanye n’ubuhinga bwa none n’ivy’amafaranga, kugira ngo zikomeze ukwihangana kw’abaronka inyungu no guteza imbere ubushobozi bwabo buramba.
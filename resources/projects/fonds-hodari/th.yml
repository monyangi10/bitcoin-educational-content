description: |
   Hodari Fund เป็นโครงการร่วมลงทุนสำหรับผู้ประกอบการที่ถูกกีดกันจากระบบการเงิน โดยให้ความสำคัญกับการจัดหาเงินทุนสำหรับโครงการที่นำโดยผู้ลี้ภัย ผู้ด้อยโอกาส และบุคคลอื่นๆ ที่ไม่มีโอกาสเข้าถึงเงินทุนแบบดั้งเดิม นอกจากการจัดหาเงินทุนแล้ว ยังมีการให้การศึกษาแบบดิจิทัลและการเงินที่ปรับให้เหมาะสม เพื่อเสริมสร้างความยืดหยุ่นของผู้รับประโยชน์และส่งเสริมการเสริมสร้างพลังอำนาจอย่างยั่งยืนของพวกเขา
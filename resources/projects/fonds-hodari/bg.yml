description: |
   Фонд Ходари е програма за рисков капитал за предприемачи, изключени от финансовата система. Тя дава приоритет на финансирането на проекти, ръководени от бежанци, хора без права и други профили без достъп до традиционен капитал. В допълнение към финансирането той предлага съобразено с нуждите цифрово и финансово обучение, за да засили устойчивостта на бенефициентите и да насърчи устойчивото им овластяване.
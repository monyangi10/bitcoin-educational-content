description: |
  Когато бях на 18 години, създадох уебсайт за покер стратегии. Това беше първият ми голям проект, но на 23-годишна възраст започнах да губя интерес към покера. Затова за известно време прекъснах създаването на уебсайтове. В началото на 2015 г. бях на 26 години, играех в сайтове за покер с биткойни и от години не бях докосвал HTML файл. Имах нужда от причина да ставам от леглото сутрин, затова реших да започна да правя уебсайт за най-големия си интерес по това време. Не знам какви точно са уменията ми, но мисля, че едно от тях е да обяснявам как работят нещата по лесен за разбиране начин. Също така смятам, че Bitcoin в момента е най-голямото възможно предизвикателство в този момент за обясняване на това как работи нещо, така че ето, че започваме.
description: |
  Toen ik 18 was, begon ik een website over pokerstrategie. Het was mijn eerste grote project, maar toen ik 23 was begon ik mijn interesse in poker te verliezen. Dus nam ik een tijdje pauze van het maken van websites. Begin 2015 was ik 26, speelde ik op Bitcoin pokersites en had ik al jaren geen HTML-bestand meer aangeraakt. Ik had een reden nodig om 's ochtends mijn bed uit te komen, dus besloot ik een website te gaan maken over mijn grootste interesse op dat moment. Ik weet niet precies wat mijn vaardigheden zijn, maar ik denk dat één ervan is om uit te leggen hoe dingen werken op een manier die makkelijk te begrijpen is. Ik denk ook dat Bitcoin op dit moment de grootst mogelijke uitdaging is om uit te leggen hoe iets werkt, dus daar gaan we.
description: |
  Igihe nari mfise imyaka 18 naratanguye urubuga rw’ubuhinga bwo gukina poker. Ni wo mugambi wanje wa mbere munini, mugabo mfise imyaka 23 naratanguye gutakaza ugukunda umukino wa poker. Naciye rero mfata akaruhuko ko gukora imbuga ngurukanabumenyi umwanya mutoyi. Mu ntango za 2015 nari mfise imyaka 26, nkina ku mbuga za poker za Bitcoin, kandi nari maze imyaka ntakora kuri dosiye ya HTML. Nari nkeneye imvo yo kuva mu gitanda mu gitondo, nca mfata ingingo yo gutangura gukora urubuga rwerekeye ikintu nakunda cane ico gihe. Sinzi neza ubuhinga mfise, ariko mbona ko bumwe muri bwo ari ugusigura ingene ibintu bigenda mu buryo bworoshe gutahura. Niyumvira kandi ko Bitcoin ari yo ngorane nini kuruta izindi zose zishoboka muri iki gihe co gusigura ingene ikintu gikora, rero ng’aha turagenda.
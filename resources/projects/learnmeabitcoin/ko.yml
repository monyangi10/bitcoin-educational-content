description: |
  18살 때 포커 전략 웹사이트를 시작했습니다. 제 첫 번째 큰 프로젝트였지만 23살이 되자 포커에 흥미를 잃기 시작했습니다. 그래서 한동안 웹사이트 제작을 쉬었죠. 2015년 초에 저는 26살의 나이에 Bitcoin 포커 사이트에서 게임을 하고 있었고, 몇 년 동안 HTML 파일을 만져본 적도 없었습니다. 아침에 침대에서 일어날 이유가 필요했기 때문에 당시 가장 관심이 많았던 웹사이트를 만들기로 결심했습니다. 제 특기가 정확히 무엇인지는 모르겠지만, 그 중 하나는 사물의 작동 원리를 이해하기 쉽게 설명하는 것이라고 생각합니다. 또한 현재로서는 Bitcoin이 작동 원리를 설명하는 데 있어 가장 큰 도전 과제라고 생각해서 여기까지 왔습니다.
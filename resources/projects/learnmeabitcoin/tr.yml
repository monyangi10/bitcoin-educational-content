description: |
  18 yaşındayken bir poker stratejisi web sitesi açtım. Bu benim ilk büyük projemdi, ancak 23 yaşıma geldiğimde pokere olan ilgimi kaybetmeye başladım. Bu yüzden bir süre web sitesi yapmaya ara verdim. 2015'in başında 26 yaşındaydım, Bitcoin poker sitelerinde oynuyordum ve yıllardır bir HTML dosyasına dokunmamıştım. Sabahları yataktan kalkmak için bir nedene ihtiyacım vardı, bu yüzden o zamanki en büyük ilgi alanım hakkında bir web sitesi yapmaya karar verdim. Yeteneklerimin tam olarak ne olduğunu bilmiyorum ama sanırım bunlardan biri işlerin nasıl yürüdüğünü anlaşılması kolay bir şekilde açıklamak. Ayrıca Bitcoin'ın şu anda bir şeyin nasıl çalıştığını açıklamak için şu anda mümkün olan en büyük zorluk olduğunu düşünüyorum, bu yüzden işte başlıyoruz.
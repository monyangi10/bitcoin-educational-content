description: |
  เมื่อฉันอายุ 18 ปี ฉันเริ่มเว็บไซต์กลยุทธ์โป๊กเกอร์ มันเป็นโปรเจกต์ใหญ่ครั้งแรกของฉัน แต่เมื่ออายุ 23 ปี ฉันเริ่มหมดความสนใจในโป๊กเกอร์ ดังนั้นฉันจึงหยุดทำเว็บไซต์ไปสักพัก ตอนต้นปี 2015 ฉันอายุ 26 ปี กำลังเล่นที่เว็บไซต์โป๊กเกอร์บิทคอยน์ และไม่ได้แตะไฟล์ HTML มาหลายปีแล้ว ฉันต้องการเหตุผลที่จะลุกจากเตียงในตอนเช้า ดังนั้นฉันจึงตัดสินใจเริ่มทำเว็บไซต์เกี่ยวกับความสนใจที่ใหญ่ที่สุดของฉันในขณะนั้น ฉันไม่รู้ว่าทักษะของฉันคืออะไรแน่ชัด แต่ฉันคิดว่าหนึ่งในนั้นคือการอธิบายวิธีการทำงานของสิ่งต่างๆ ในแบบที่เข้าใจง่าย ฉันยังคิดว่า Bitcoin เป็นความท้าทายที่ใหญ่ที่สุดในขณะนี้สำหรับการอธิบายวิธีการทำงานของบางสิ่ง ดังนั้นเรามาเริ่มกันเลย
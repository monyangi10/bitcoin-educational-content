description: |
  Itongo rya "Zum Wilden Michel" riri mu mutima w'Ishamba ryiza cane ry'Ibirabura. Abakunda ibidukikije n’abatembera, abakunda gukambika n’abakunda gusohoka hanze, abagendera ku mapikipiki n’abagendera ku makinga bose barahawe ikaze cane. Abakunzi b'umuziki n'umuco nabo bazoronka amahera yabo hano. Turafise ikintu kigenda hafi buri ndwi. Kuva ku muziki wa rock gushika ku muziki w’umuringa, kuva ku muziki w’ubuhinga bwa none gushika ku muziki w’inkino n’uwa cabaret. Mu restaurant yacu y’ivyatsi uzokwononekazwa n’ibifungurwa vyiza vy’akarere. Tugura mu karere kandi dukora vyose mu nzu - ikintu kidasanzwe gitandukanye buri mpera y’umusi. Turashobora kwakira abantu 120 mu nkambi , mu nzu z'ibiruhuko no mu nzu z'uburaro . Hariho kandi n’uburyo bumwebumwe budasanzwe cane bwo gucumbika! Ushaka kwubaka ? Guhimbaza umusi mukuru w’abasore? Woba uryoherwa n’indirimbo zitandukanye mu kibanza kidasanzwe? Ufise umusi mukuru w’umugwi canke isabukuru n’ishirahamwe ryawe? Guhimbaza umusi mukuru w’amavuko? Muhagarare hamwe muvyine n’amapikipiki, amataratara canke ibindi binyabiziga bitera urusaku? Canke gusa guhimbaza IKINTU? Niho rero turi abantu babereye neza na neza! Kuko ibintu birashobora gutera ijwi rirenga kandi bikaba nk’ibikoko hano.
  
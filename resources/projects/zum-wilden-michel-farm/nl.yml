description: |
  De boerderij "Zum Wilden Michel" ligt in het hart van het prachtige Zwarte Woud. Natuurliefhebbers en wandelaars, kampeer- en outdoorliefhebbers, motorrijders en fietsers zijn hier allemaal van harte welkom. Ook muziek- en cultuurliefhebbers komen hier aan hun trekken. We hebben bijna elke week wel iets te doen. Van rock tot kopermuziek, van elektronische muziek tot theater en cabaret. In ons rustieke restaurant word je verwend met culinaire lekkernijen uit de regio. We kopen lokaal in en maken alles zelf - elk weekend een andere special. We kunnen gemakkelijk 120 personen herbergen op de camping, in de vakantieappartementen en in de slaapzaal. Er zijn ook bijzondere overnachtingsmogelijkheden! Wil je trouwen? Een vrijgezellenfeest vieren? Genieten van verschillende concerten op een bijzondere locatie? Heb je een teamevenement of jubileum met je bedrijf? Een grote verjaardag vieren? Samen staan dansen met motoren, tractoren of andere lawaaierige voertuigen? Of gewoon iets te vieren? Dan zijn wij precies de juiste mensen voor jou! Want het kan er hier luid en wild aan toe gaan.
  
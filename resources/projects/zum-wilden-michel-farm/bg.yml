description: |
  Фермата "Zum Wilden Michel" се намира в сърцето на красивата Шварцвалд. Любителите на природата и пешеходните преходи, почитателите на къмпингуването и любителите на активния живот на открито, мотоциклетистите и велосипедистите са добре дошли. Почитателите на музиката и културата също ще получат своето тук. Почти всяка седмица при нас се случва нещо. От рок до духова музика, от електронна музика до театър и кабаре. В нашия селски ресторант ще бъдете поглезени с кулинарни деликатеси от региона. Купуваме от местни производители и правим всичко на място - всеки уикенд има различен специалитет. Лесно можем да настаним 120 души в къмпинга , във ваканционните апартаменти и в общежитието. Има и някои особено необичайни възможности за настаняване! Искате да се ожените ? Празнувате ергенско парти? Да се насладите на разнообразни концерти на специално място? Организирате екипно събитие или годишнина на вашата компания? Празнувате голям рожден ден? Да застанете заедно и да танцувате с мотоциклети, трактори или други шумни превозни средства? Или просто празнувайте НЕЩО? Тогава ние сме точно тези хора, които са подходящи за вас! Защото тук нещата могат да станат шумни и диви.
  
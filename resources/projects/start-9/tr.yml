description: |
  Start9, veri kontrolünün büyük bir endişe kaynağı olduğu günümüz dijital dünyasında güven sorununu çözmeyi amaçlamaktadır.
  
  Şirket, geleneksel olarak yalnızca teknoloji meraklısı bireyler veya varlıklı kuruluşlar tarafından erişilebilen kişisel bir sunucu çalıştırarak verilerinize sahip olma ve kontrol etme gücü sağlar. Start9 ile, işlemleri doğrulamak için tam bir Bitcoin düğümü, Bitcoin'iniz üzerinde Lightning Network'da tam gözetim sağlamak için bir Lightning düğümü çalıştırabilir ve esasen kendi dijital varlığınız haline gelebilirsiniz. Bu, kişisel sunucular için tarayıcı tabanlı bir işletim sistemi olan EmbassyOS ile mümkün olmaktadır. Kişisel bir sunucu çalıştırmanın potansiyel olarak ürkütücü doğasına rağmen Start9, ayrıntılı bir kullanım kılavuzu, SSS, öğreticiler ve teknik uzman topluluğuna doğrudan erişim dahil olmak üzere kapsamlı müşteri desteği sağlar.
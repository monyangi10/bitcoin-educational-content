description: |
  Start9 is gericht op het oplossen van het vertrouwensprobleem in de huidige digitale wereld waar controle over gegevens een grote zorg is.
  
  Het bedrijf biedt u de mogelijkheid om uw gegevens te bezitten en te controleren door een persoonlijke server te draaien, die van oudsher alleen toegankelijk was voor technisch onderlegde individuen of rijke entiteiten. Met Start9 kun je een volledige Bitcoin node draaien om transacties te verifiëren, een Lightning node om volledige controle over je Bitcoin te krijgen op de Lightning Network, en in wezen je eigen digitale entiteit worden. Dit wordt mogelijk gemaakt door EmbassyOS, een browsergebaseerd besturingssysteem voor persoonlijke servers. Ondanks het potentieel ontmoedigende karakter van het runnen van een persoonlijke server, verzekert Start9 uitgebreide klantenondersteuning, inclusief een gedetailleerde gebruikershandleiding, FAQ, tutorials en directe toegang tot een technische expert community.
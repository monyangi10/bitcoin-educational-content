description: |
  Start9 ifise intumbero yo gutorera umuti ikibazo c’ukwizigirana mw’isi y’ubu y’ubuhinga bwa none aho ukugenzura amakuru ari ikintu gihambaye cane. 
  
  Iyo sosiyete iraguha ububasha bwo kugira amakuru yawe no kuyagenzura mu gukoresha server y’umuntu ku giti ciwe, iyo server yari ishobora gukoreshwa n’abantu canke ibigo vy’abatunzi gusa bazi ivy’ubuhinga bwa none. Na Start9, ushobora gukoresha node yuzuye ya Bitcoin kugira ngo ugenzure amafaranga, node ya Lightning kugira uronke uburenganzira bwo kubungabunga Bitcoin yawe kuri Lightning Network, kandi mu vy’ukuri ube ikigo cawe c’ubuhinga bwa none. Ivyo bishoboka biciye ku EmbassyOS, ubuhinga bushingiye ku mucukumbuzi w’ibikoresho vy’abantu ku giti cabo. Naho gukoresha server y’umuntu ku giti ciwe bishobora kuba biteye ubwoba, Start9 iratanga ubufasha bwose ku bakiriya, harimwo n’igitabu c’abakoresha, ibibazo bikunze kwibazwa, inyigisho, no gushika ku bahinga b’abahinga.
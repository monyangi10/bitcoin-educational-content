description: |
  Start9 има за цел да реши въпроса с доверието в днешния цифров свят, където контролът на данните е основен проблем.
  
  Компанията ви предоставя възможността да притежавате и контролирате данните си, като използвате личен сървър, който традиционно е достъпен само за технически грамотни лица или заможни структури. С Start9 можете да стартирате пълноценен възел Bitcoin за проверка на трансакциите, възел Lightning, за да получите пълно попечителство над вашия Bitcoin на Lightning Network, и по същество да се превърнете в свой собствен цифров субект. Това е възможно благодарение на EmbassyOS - базирана на браузър операционна система за персонални сървъри. Въпреки потенциално обезсърчителното естество на управлението на личен сървър, Start9 осигурява цялостна поддръжка на клиентите, включително подробно ръководство за потребителя, често задавани въпроси, уроци и директен достъп до общност от технически експерти.
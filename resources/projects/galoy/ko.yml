description: |
  Galoy는 엔터프라이즈 규모의 Bitcoin 및 Lightning 애플리케이션을 출시하도록 설계된 오픈 소스 코어 뱅킹 플랫폼을 제공합니다. 자체 호스팅 인프라 또는 관리형 '서비스로서의 뱅킹' 구현을 통해 Bitcoin 뱅킹 솔루션의 개발을 가속화할 수 있습니다.
  
  이 플랫폼을 통해 조직은 공유 수탁 모델과 사용이 간편한 Lightning Wallet를 사용하여 Bitcoin 커뮤니티 은행을 시작할 수 있습니다. 이는 Bitcoin 비치가 순환 경제를 구축하는 데 도움이 된 것과 동일한 기술입니다. 이 검증된 인프라는 정부에서도 휴대폰과 인터넷 연결이 가능한 모든 사람에게 21세기형 금융 서비스를 제공하는 데 사용할 수 있습니다.
  
  Bitcoin이 곧 돈이라는 신념을 바탕으로 설립된 Galoy는 규모에 관계없이 모든 조직이 자체적인 Bitcoin 기반 은행을 만들 수 있도록 지원합니다. 이 은행은 엘살바도르 엘존테에서 지속 가능한 Bitcoin 경제를 발전시키는 데 중요한 역할을 한 Bitcoin 비치 Wallet 프로젝트의 중추였으며, 엘살바도르에서 Bitcoin이 법정 화폐로 채택된 이후 상당한 성장을 보였습니다.
  
  Galoy는 Lightning Network와 통합하고자 하는 조직을 위한 가교이자 더 나은 금융 시스템을 구축하기 위해 노력하는 오픈소스 기여자들을 위한 등대 역할을 하고 있습니다.
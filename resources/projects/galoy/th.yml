description: |
  Galoy นำเสนอแพลตฟอร์มธนาคารหลักแบบโอเพ่นซอร์สที่ออกแบบมาเพื่อเปิดตัวแอปพลิเคชัน Bitcoin และ Lightning ในระดับองค์กร มันช่วยเร่งการพัฒนาของโซลูชันธนาคาร Bitcoin ผ่านโครงสร้างพื้นฐานที่โฮสต์เองหรือการใช้งาน "Banking-as-a-Service" ที่มีการจัดการ
  
  แพลตฟอร์มนี้ช่วยให้องค์กรสามารถเปิดตัวธนาคารชุมชน Bitcoin โดยใช้โมเดลการดูแลร่วมและ Lightning wallet ที่ใช้งานง่าย เป็นเทคโนโลยีเดียวกันที่ช่วยให้ Bitcoin Beach สร้างเศรษฐกิจหมุนเวียน โครงสร้างพื้นฐานที่พิสูจน์แล้วนี้ยังสามารถใช้โดยรัฐบาลเพื่อให้บริการทางการเงินในศตวรรษที่ 21 แก่ทุกคนที่มีโทรศัพท์มือถือและการเชื่อมต่ออินเทอร์เน็ต
  
  ก่อตั้งขึ้นบนความเชื่อที่ว่า Bitcoin คือเงิน Galoy ช่วยให้องค์กรทุกขนาดสามารถสร้างธนาคารที่ใช้ Bitcoin ของตนเองได้ มันเป็นกระดูกสันหลังของโครงการ Bitcoin Beach Wallet ใน El Zonte, El Salvador ซึ่งมีบทบาทสำคัญในการพัฒนาเศรษฐกิจ Bitcoin ที่ยั่งยืนและมีการเติบโตอย่างมีนัยสำคัญนับตั้งแต่ประเทศยอมรับ Bitcoin เป็นเงินที่ถูกกฎหมาย
  
  Galoy เป็นสะพานสำหรับองค์กรที่ต้องการรวมเข้ากับเครือข่าย Lightning และเป็นแสงสว่างสำหรับผู้ร่วมสร้างโอเพ่นซอร์สที่มุ่งมั่นสร้างระบบการเงินที่ดีกว่า
description: |
  Galoy предлага основна банкова платформа с отворен код, предназначена за стартиране на корпоративни приложения Bitcoin и Lightning. Тя осигурява ускорено разработване на банкови решения Bitcoin чрез самостоятелно хоствана инфраструктура или управлявано внедряване "банкиране като услуга".
  
  Платформата дава възможност на организациите да стартират Bitcoin общностна банка, използвайки модел на споделено попечителство и лесен за използване Lightning wallet. Това е същата технология, която помогна на Bitcoin Beach да изгради кръгова икономика. Тази доказана инфраструктура може да се използва и от правителствата за предоставяне на финансови услуги от 21-ви век на всеки, който има мобилен телефон и интернет връзка.
  
  Основана на убеждението, че Bitcoin са пари, Galoy дава възможност на организации от всякакъв размер да създадат своя собствена банка, базирана на Bitcoin. Тя е в основата на проекта Bitcoin Beach Wallet в Ел Зонте, Ел Салвадор, който е от съществено значение за развитието на устойчива Bitcoin икономика и бележи значителен растеж след приемането на Bitcoin като законно платежно средство в страната.
  
  Галой е мостът за организациите, които искат да се интегрират с мрежата Lightning, и маякът за сътрудниците с отворен код, които се стремят да изградят по-добра финансова система.
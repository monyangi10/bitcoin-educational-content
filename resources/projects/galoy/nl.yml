description: |
  Galoy biedt een open-source core banking platform dat ontworpen is om Bitcoin en Lightning applicaties op bedrijfsschaal te lanceren. Het biedt versnelde ontwikkeling van Bitcoin bancaire oplossingen via zelf gehoste infrastructuur of een beheerde "Banking-as-a-Service" implementatie.
  
  Het platform stelt organisaties in staat een Bitcoin gemeenschapsbank te lanceren met behulp van een gedeeld bewaarmodel en een gebruiksvriendelijke Lightning Wallet. Het is dezelfde technologie die Bitcoin Beach hielp een circulaire economie op te bouwen. Deze bewezen infrastructuur kan ook worden gebruikt door overheden om financiële diensten van de 21e eeuw te leveren aan iedereen met een mobiele telefoon en een internetverbinding.
  
  Galoy is opgericht vanuit de overtuiging dat Bitcoin geld is en stelt organisaties van elke omvang in staat om hun eigen op Bitcoin gebaseerde bank op te zetten. Galoy was de ruggengraat van het Bitcoin Beach Wallet project in El Zonte, El Salvador, dat belangrijk was voor de ontwikkeling van een duurzame Bitcoin economie en een aanzienlijke groei heeft doorgemaakt sinds het land Bitcoin als wettig betaalmiddel heeft ingevoerd.
  
  Galoy is de brug voor organisaties die willen integreren met de Lightning Network, en een baken voor open-source contribuanten die streven naar een beter financieel systeem.
description: |
  Galoy itanga urubuga rwa banki rwuguruye rwagenewe gutanguza ibikorwa vya Bitcoin na Lightning ku rugero rw’ibigo. Itanga iterambere ryihuse ry'imiti y'amabanki ya Bitcoin biciye mu bikorwa remezo vy'ubwakiranyi canke ugushirwa mu ngiro kw'amabanki nk'igikorwa.
  
  Iryo koraniro rituma amashirahamwe ashobora gutanguza banki y’abanyagihugu Bitcoin akoresheje uburyo bwo kubungabunga amafaranga hamwe n’uburyo bworoshe bwo gukoresha Lightning Wallet. Ni ubuhinga bumwe bwafashije Bitcoin Beach kwubaka ubutunzi buzunguruka. Ivyo bikorwa remezo vyemejwe birashobora kandi gukoreshwa na Leta kugira ngo zihe umuntu wese afise telefone ngendanwa n’internet ubufasha bw’ivy’ubutunzi bwo mu kinjana ca 21.
  
  Ishingiye ku ciyumviro c’uko Bitcoin ari amahera, Galoy itanga ububasha ku mashirahamwe y’ubunini bwose kugira ngo yihingurire banki yabo ishingiye kuri Bitcoin. Ni co cari umugongo w’umugambi wa Bitcoin Beach Wallet i El Zonte muri El Salvador, wari ufise akamaro kanini mu guteza imbere ubutunzi buramba bwa Bitcoin kandi warabonye iterambere rikomeye kuva igihugu cemeye Bitcoin nk’amahera yemewe.
  
  Galoy ni ikiraro ku mashirahamwe arondera kwifatanya na Lightning Network, kandi ni itara ku batererano bafunguye baharanira kwubaka uburyo bwiza bw’ivy’ubutunzi.
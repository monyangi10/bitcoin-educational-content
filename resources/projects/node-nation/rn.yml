description: |
  Node Nation ni porogarama y’inyigisho itera imbere ubusegaba bw’ivy’ubutunzi biciye mu Bitcoin mu banyeshure bo mu mashure ya leta yo muri El Salvador. Porogarama irabigisha ingene botunganya no gucunga ama node ya Bitcoin na Lightning Network bashimikiye cane ku buhinga.
  
  Uwo mugambi ukoresheje uburyo bukora kandi bushingiye ku buhinga, ugamije gutanga ubumenyi ku bijanye na Bitcoin no kwegereza ubutegetsi abaturage biciye mu gushiramwo no gucunga ama node. Ishigikirwa na Minisitere y’Uburezi, Ibiro vy’Igihugu vya Bitcoin, n’Ihuriro rya Plan B.
  
  Node Nation ifise intumbero ikomeye kandi y’ihinduka: gushiramwo ama node 6.000 ya Bitcoin mu mashure ya Leta mu gihugu cose, bikaba ari ikintu gihambaye kitari bwigere kibaho mu kwemera Bitcoin kw’isi yose. Ico gikorwa ntikirondera gusa gushiramwo El Salvador nk’igihugu kirongoye isi mu bijanye n’ubusegaba bw’ivy’ubutunzi, ariko kandi kirondera no gutoza uruvyaro rushasha rw’abanyeshure ibikoresho bikenewe kugira ngo bagire uruhara mu mpinduka y’ubuhinga bwa none izoza. Igihe cose node ishizweho, abanyeshure ntibazokwiga gusa gukoresha neza ubu buhinga ariko kandi bazoba abacungera ububasha bwa Bitcoin.
  
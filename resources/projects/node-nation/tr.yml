description: |
  Node Nation, El Salvador'daki devlet okullarındaki öğrenciler arasında Bitcoin aracılığıyla finansal egemenliği teşvik eden bir eğitim programıdır. Program, Bitcoin ve Lightning Network düğümlerini teknik bir odakla nasıl yapılandıracaklarını ve yöneteceklerini öğretir.
  
  Proje, pratik ve teknik bir yaklaşımla, düğümlerin kurulumu ve yönetimi yoluyla Bitcoin ve ademi merkeziyetçilik hakkında bilgi vermeyi amaçlamaktadır. Milli Eğitim Bakanlığı, Ulusal Bitcoin Ofisi ve Plan B Network tarafından desteklenmektedir.
  
  Node Nation'ın iddialı ve devrim niteliğinde bir hedefi var: ülke genelindeki devlet okullarına 6.000 Bitcoin düğümü kurarak küresel Bitcoin'in benimsenmesinde benzeri görülmemiş bir kilometre taşı oluşturmak. Bu çaba sadece El Salvador'u finansal egemenlikte bir dünya lideri olarak konumlandırmayı değil, aynı zamanda yeni nesil öğrencileri geleceğin dijital devrimine katılmak için gereken araçlar konusunda eğitmeyi de amaçlamaktadır. Kurulan her bir düğüm ile öğrenciler sadece bu teknolojide ustalaşmayı öğrenmekle kalmayacak, aynı zamanda Bitcoin'in merkezi olmayan gücünün emanetçileri haline gelecekler.
  
description: |
  노드네이션은 엘살바도르의 공립학교 학생들에게 Bitcoin을 통해 재정 주권을 장려하는 교육 프로그램입니다. 이 프로그램은 학생들에게 기술적인 부분에 중점을 두고 Bitcoin 및 Lightning Network 노드를 구성하고 관리하는 방법을 가르칩니다.
  
  이 프로젝트는 실용적이고 기술적인 접근 방식을 통해 노드 설치와 관리를 통해 Bitcoin과 탈중앙화에 대한 지식을 전수하는 것을 목표로 합니다. 이 프로젝트는 교육부, 국가 Bitcoin 사무소, 플랜 B 네트워크의 지원을 받고 있습니다.
  
  노드네이션은 전국 공립학교에 6,000개의 Bitcoin 노드를 설치하여 전 세계 Bitcoin 채택에 전례 없는 이정표를 세우겠다는 야심차고 혁신적인 목표를 가지고 있습니다. 이러한 노력은 엘살바도르를 금융 주권 분야의 세계적인 리더로 자리매김할 뿐만 아니라 미래의 디지털 혁명에 참여하는 데 필요한 도구를 새로운 세대의 학생들에게 교육하기 위한 것입니다. 각 노드가 설치될 때마다 학생들은 이 기술을 습득하는 법을 배울 뿐만 아니라 Bitcoin의 탈중앙화된 권력의 관리자가 될 것입니다.
  
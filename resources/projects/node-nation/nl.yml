description: |
  Node Nation is een educatief programma dat financiële soevereiniteit via Bitcoin promoot onder leerlingen van openbare scholen in El Salvador. Het programma leert hen hoe ze Bitcoin en Lightning Network nodes technisch moeten configureren en beheren.
  
  Met een praktische en technische aanpak wil het project kennis overbrengen over Bitcoin en decentralisatie door het installeren en beheren van nodes. Het wordt ondersteund door het Ministerie van Onderwijs, het Nationaal Bitcoin Kantoor en Plan B Network.
  
  Node Nation heeft een ambitieus en revolutionair doel: het installeren van 6.000 Bitcoin nodes in openbare scholen in het hele land, waarmee een ongekende mijlpaal in de wereldwijde adoptie van Bitcoin wordt bereikt. Deze inspanning is er niet alleen op gericht om El Salvador te positioneren als wereldleider in financiële soevereiniteit, maar ook om een nieuwe generatie studenten te trainen in de tools die nodig zijn om deel te nemen aan de digitale revolutie van de toekomst. Met elke geïnstalleerde node zullen studenten niet alleen leren om deze technologie te beheersen, maar zullen ze ook de bewaarders worden van de gedecentraliseerde kracht van Bitcoin.
  
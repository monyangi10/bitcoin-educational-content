description: |
  Crypto Lyon, Lyon bölgesindeki kripto para birimi meraklılarını bir araya getirmek için oluşturulmuş bir dernektir. Amacımız, atölye çalışmaları ve konferanslar aracılığıyla Blockchain teknolojisini ve kripto para birimlerini herkes için erişilebilir kılmak ve tüm oyuncuları bir araya getirmektir. Kripto devrimine katılın!
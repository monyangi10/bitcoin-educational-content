description: |
  Crypto Lyon ni ishirahamwe ryashinzwe kugira ngo rihurize hamwe abakunda amafaranga y’ivy’ubuhinga bwa none mu karere ka Lyon. Intumbero yacu ni ugutuma ubuhinga bwa Blockchain n’amafaranga y’ivy’ubuhinga bwa none (crypto-currencies) bishikira umuntu wese biciye mu mahugurwa n’inama, no gutuma abakinyi bose bahuriza hamwe. Nimwifatanye n’ihinduka ry’ivy’ubuhinga bwa none!
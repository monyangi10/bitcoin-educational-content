description: |
  Crypto Lyon е сдружение, създадено с цел да обедини ентусиастите на криптовалутите в региона на Лион. Нашата цел е да направим технологията Blockchain и криптовалутите достъпни за всички чрез семинари и конференции, както и да съберем всички участници заедно. Присъединете се към криптореволюцията!
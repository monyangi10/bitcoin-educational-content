description: |
  GrapheneOS е мобилна операционна система, фокусирана върху сигурността и поверителността, предназначена за устройствата Google Pixel. Това е проект с отворен код, базиран на Android, който повишава устойчивостта срещу атаки чрез интегриране на усъвършенствани функции и строг контрол върху разрешенията на приложенията. Без интегрирани по подразбиране услуги на Google, GrapheneOS осигурява минималистично потребителско изживяване, като същевременно позволява опционално инсталиране на инструменти, които да отговарят на нуждите на потребителите на мобилни устройства, загрижени за неприкосновеността на личния живот.
  
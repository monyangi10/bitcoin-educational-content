description: |
  GrapheneOS is een mobiel besturingssysteem gericht op beveiliging en privacy, ontworpen voor Google Pixel-apparaten. Het is een open-source project gebaseerd op Android, dat de weerbaarheid tegen aanvallen verbetert door het integreren van geavanceerde functies en strikte controles over app-machtigingen. Zonder standaard geïntegreerde Google-diensten biedt GrapheneOS een minimalistische gebruikerservaring, terwijl optionele installatie van tools mogelijk is om te voldoen aan de behoeften van privacy-bewuste mobiele gebruikers.
  
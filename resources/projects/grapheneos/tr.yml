description: |
  GrapheneOS, Google Pixel cihazları için tasarlanmış, güvenlik ve gizlilik odaklı bir mobil işletim sistemidir. Android tabanlı açık kaynaklı bir proje olup, gelişmiş özellikler ve uygulama izinleri üzerinde sıkı kontroller entegre ederek saldırılara karşı dayanıklılığı artırmaktadır. Varsayılan olarak Google hizmetlerinin entegre edilmediği GrapheneOS, minimalist bir kullanıcı deneyimi sunarken, gizlilik bilincine sahip mobil kullanıcıların ihtiyaçlarını karşılamak için isteğe bağlı araçların yüklenmesine izin veriyor.
  
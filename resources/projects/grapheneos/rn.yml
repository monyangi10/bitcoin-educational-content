description: |
  GrapheneOS ni ubuhinga bwo gukoresha telefone ngendanwa bwibanda ku mutekano n’ubuzima bwite, bwagenewe ibikoresho vya Google Pixel. Ni umugambi w’inkomoko yuguruye ushingiye kuri Android, wongerera ubushobozi bwo kwihanganira ibitero mu gushiramwo ibintu biteye imbere no kugenzura bikomeye uruhusha rwa porogarama. Ata serivisi za Google zishizwemwo ku buryo busanzwe, GrapheneOS itanga ubumenyi bukeyi bw’abakoresha mu gihe yemera gushiramwo ibikoresho vy’ubuhinga bwo gushitsa ivyo abakoresha telefone ngendanwa bakeneye.
  
description: |
  GrapheneOS เป็นระบบปฏิบัติการมือถือที่เน้นความปลอดภัยและความเป็นส่วนตัว ออกแบบมาสำหรับอุปกรณ์ Google Pixel เป็นโครงการโอเพ่นซอร์สที่พัฒนามาจาก Android เพิ่มความทนทานต่อการโจมตีโดยการรวมคุณสมบัติขั้นสูงและการควบคุมที่เข้มงวดเกี่ยวกับการอนุญาตของแอปพลิเคชัน โดยไม่มีบริการของ Google รวมอยู่โดยค่าเริ่มต้น GrapheneOS มอบประสบการณ์ผู้ใช้ที่เรียบง่ายในขณะที่อนุญาตให้ติดตั้งเครื่องมือเพิ่มเติมเพื่อตอบสนองความต้องการของผู้ใช้มือถือที่ใส่ใจในความเป็นส่วนตัว
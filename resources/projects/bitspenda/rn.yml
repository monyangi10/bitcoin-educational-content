description: |
  BitSpenda ni uburyo bworoshe bwo gukoresha Bitcoin muri Afrika yose. Ishirahamwe ry’ishirahamwe rya BitcoinDua, rizibira ikinogo kiri hagati ya Bitcoin n’amahera y’amatelefone ngendanwa (MoMo), rituma umuntu ashobora guhindura amahera ako kanya, ataco akora, kandi ashobora kugurwa ataco ahinduye kandi ataco atevye. BitSpenda ituma ukwishyura kwa misi yose vyoroha, bituma Bitcoin yemerwa biciye mu bikorwa bitagira umurongo, bishoboka.
description: |
  BitSpenda is de makkelijkste manier om Bitcoin uit te geven in heel Afrika. Als dochteronderneming van BitcoinDua overbrugt BitSpenda de kloof tussen Bitcoin en mobiel geld (MoMo), door directe, veilige en betaalbare conversies mogelijk te maken zonder omwisselingen of vertragingen. BitSpenda maakt alledaagse betalingen eenvoudig en stimuleert het gebruik van Bitcoin door middel van naadloze, toegankelijke transacties.
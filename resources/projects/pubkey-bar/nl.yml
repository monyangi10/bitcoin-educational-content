description: |
  PubKey is een bar in New York City die Bitcoin accepteert via de Lightning Network om de kosten van tussenpersonen te verlagen en het dagelijks gebruik van Bitcoin te demonstreren. Naast het aantrekken van de lokale Bitcoin gemeenschap, besparen ze op creditcardkosten (3,5% of meer) en bieden ze snelle, directe betalingen. Een opmerkelijke gebeurtenis was toen president Trump de eerste Amerikaanse president werd die daar een aankoop deed met Bitcoin.
  
description: |
  PubKey е бар в Ню Йорк, който реши да приема биткойни чрез Lightning Network, за да намали разходите за посредници и да демонстрира ежедневната употреба на биткойни. В допълнение към привличането на местната биткойн общност, те спестяват от такси за кредитни карти (3,5% или повече) и предлагат бързи и директни плащания. Забележително събитие беше, когато президентът Тръмп стана първият президент на САЩ, който направи покупка с биткойн там.
  
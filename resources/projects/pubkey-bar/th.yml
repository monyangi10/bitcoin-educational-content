description: |
  PubKey เป็นบาร์ในนิวยอร์กซิตี้ที่ตัดสินใจรับบิทคอยน์ผ่าน Lightning Network เพื่อลดต้นทุนจากคนกลางและแสดงให้เห็นถึงการใช้บิทคอยน์ในชีวิตประจำวัน นอกจากจะดึงดูดชุมชนบิทคอยน์ในท้องถิ่นแล้ว พวกเขายังประหยัดค่าธรรมเนียมบัตรเครดิต (3.5% หรือมากกว่า) และเสนอการชำระเงินที่รวดเร็วและตรงไปตรงมา เหตุการณ์ที่น่าจดจำคือเมื่อประธานาธิบดีทรัมป์กลายเป็นประธานาธิบดีสหรัฐฯ คนแรกที่ทำการซื้อด้วยบิทคอยน์ที่นั่น
description: |
  PubKey ni ibarabara ryo mu gisagara ca New York ryafashe ingingo yo kwemera Bitcoin biciye kuri Lightning Network kugira ngo rigabanye amafaranga y’abakozi bo hagati no kwerekana uko Bitcoin ikoreshwa buri musi. Uretse gukwegera abantu bo mu karere ka Bitcoin, barazigama amahera y’ikarata y’inguzanyo (3,5% canke irenga) kandi bagatanga amahera yihuta kandi ataco akora. Ikintu gihambaye cane ni igihe Perezida Trump yabaye Prezida wa mbere wa U.S. yaguriye na Bitcoin ng’aho.
  
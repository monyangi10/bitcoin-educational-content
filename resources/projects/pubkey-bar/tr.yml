description: |
  PubKey, New York'ta aracı maliyetlerini azaltmak ve Bitcoin'in günlük kullanımını göstermek için Lightning Network aracılığıyla Bitcoin kabul etmeye karar veren bir bardır. Yerel Bitcoin topluluğunu çekmenin yanı sıra, kredi kartı ücretlerinden (%3,5 veya daha fazla) tasarruf ediyor ve hızlı, doğrudan ödemeler sunuyorlar. Başkan Trump'ın Bitcoin ile orada alışveriş yapan ilk ABD başkanı olması kayda değer bir olaydı.
  
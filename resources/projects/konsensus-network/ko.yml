description: |
  2019년에 니코 라마넨이 설립한 컨센서스 네트워크는 사이페딘 암무스의 'Bitcoin 표준'을 핀란드어로 번역하는 것으로 시작되었습니다. 곧 Bitcoin에 대한 열정을 가진 활기차고 자유를 사랑하는 자원봉사자들로 구성된 팀으로 성장하여 이 책을 포르투갈어와 네덜란드어로 현지화하게 되었습니다. Bitcoin 전용 회사로서 지금까지 50권이 넘는 책을 출간하며 저자, 번역가, 유통 채널 간의 가교 역할을 하고 있습니다.
  
  우리의 임무는 현지화된 문헌을 통해 Bitcoin, 오스트리아 경제 및 주권에 대한 접근성을 높이는 것입니다. 우리는 Bitcoin의 잠재력이 엄청나다고 믿으며 이 지식을 전 세계와 공유하고자 합니다. 책 출판까지 이어질 것이라고는 예상하지 못했지만, 모든 사람이 탈중앙화 화폐의 혁신적 힘을 이해할 수 있도록 최선을 다하고 있습니다.
  
  저희는 빠른 적응력과 자원 봉사자들의 헌신으로 번창하는 탈중앙화된 리더 없는 조직 모델인 '불가사리 조직'으로 구성되어 있습니다. 각 참여자는 각자의 고유한 기술을 발휘하여 공동 작업에 기여하고 그로부터 이익을 얻습니다. 이 모델은 신속한 의사 결정과 문제에 대한 효과적인 대응을 가능하게 하며, 공동의 목표를 향해 커뮤니티의 역량을 강화합니다.
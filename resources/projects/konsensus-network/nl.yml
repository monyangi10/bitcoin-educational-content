description: |
  Konsensus Network werd in 2019 opgericht door Niko Laamanen en begon met de Finse vertaling van 'The Bitcoin Standard' door Saifedean Ammous. Het groeide al snel uit tot een levendig, vrijheidslievend team van vrijwilligers met een passie voor Bitcoin, wat leidde tot de lokalisatie van het boek in het Portugees en Nederlands. Als Bitcoin-only bedrijf hebben we tot nu toe meer dan 50 boeken gepubliceerd, als brug tussen auteurs, vertalers en distributiekanalen.
  
  Onze missie draait om het toegankelijker maken van Bitcoin, Oostenrijkse economie en soevereiniteit door middel van gelokaliseerde literatuur. Wij geloven dat het potentieel van Bitcoin enorm is en willen deze kennis met de wereld delen. We hadden niet verwacht dat we in het uitgeven van boeken terecht zouden komen, maar we zijn vastbesloten om iedereen in staat te stellen de transformerende kracht van gedecentraliseerd geld te begrijpen.
  
  We zijn gestructureerd als een 'zeesterrenorganisatie', een gedecentraliseerd, leiderloos organisatiemodel dat gedijt op een snel aanpassingsvermogen en de toewijding van vrijwilligers. Elke deelnemer brengt zijn unieke vaardigheden in en draagt bij aan en profiteert van ons collectieve werk. Dit model maakt snelle besluitvorming en effectieve reacties op uitdagingen mogelijk, waardoor onze gemeenschap sterker staat ten opzichte van ons gezamenlijke doel.
description: |
  Основана през 2019 г. от Нико Лааманен, мрежата Konsensus започна с финландския превод на "Стандартът Bitcoin" от Сайфедеан Аммус. Скоро тя се превърна в енергичен, свободолюбив екип от доброволци, запалени по биткойн, което доведе до локализирането на книгата на португалски и холандски език. Като компания, работеща само с биткойни, досега сме издали над 50 книги, като работим като мост между автори, преводачи и канали за разпространение.
  
  Нашата мисия се върти около това да направим биткойн, австрийската икономика и суверенитета по-достъпни чрез локализирана литература. Вярваме, че потенциалът на биткойн е огромен, и искаме да споделим тези знания със света. Не сме очаквали да се окажем в книгоиздаването, но сме решени да дадем възможност на всеки да разбере трансформиращата сила на децентрализираните пари.
  
  Структурирани сме като "организация на морските звезди" - децентрализиран, безлидерски модел на организация, който процъфтява благодарение на бързата адаптивност и отдадеността на доброволците. Всеки участник внася своите уникални умения, като допринася за колективната ни работа и се възползва от нея. Този модел дава възможност за бързо вземане на решения и ефективно реагиране на предизвикателствата, като дава възможност на общността ни да постигне общата ни цел.
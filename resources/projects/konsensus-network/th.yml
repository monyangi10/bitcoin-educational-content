description: |
  ก่อตั้งขึ้นในปี 2019 โดย Niko Laamanen, Konsensus Network เริ่มต้นด้วยการแปลเป็นภาษาฟินแลนด์ของ 'The Bitcoin Standard' โดย Saifedean Ammous ไม่นานก็เติบโตเป็นทีมอาสาสมัครที่มีชีวิตชีวาและรักอิสระที่หลงใหลในบิตคอยน์ นำไปสู่การแปลหนังสือเป็นภาษาโปรตุเกสและดัตช์ ในฐานะบริษัทที่เน้นบิตคอยน์เพียงอย่างเดียว เราได้ตีพิมพ์หนังสือมากกว่า 50 เล่มจนถึงปัจจุบัน ทำหน้าที่เป็นสะพานเชื่อมระหว่างผู้เขียน นักแปล และช่องทางการจัดจำหน่าย
  
  ภารกิจของเราหมุนรอบการทำให้บิตคอยน์ เศรษฐศาสตร์ออสเตรีย และอธิปไตยเข้าถึงได้ง่ายขึ้นผ่านวรรณกรรมที่แปลเป็นภาษาท้องถิ่น เราเชื่อว่าศักยภาพของบิตคอยน์นั้นมหาศาลและต้องการแบ่งปันความรู้นี้กับโลก เราไม่ได้คาดหวังว่าจะมาจบที่การตีพิมพ์หนังสือ แต่เรามุ่งมั่นที่จะทำให้ทุกคนเข้าใจพลังการเปลี่ยนแปลงของเงินที่กระจายอำนาจ
  
  เราโครงสร้างเป็น 'องค์กรปลาดาว' ซึ่งเป็นโมเดลองค์กรที่กระจายอำนาจและไม่มีผู้นำที่เจริญเติบโตด้วยความสามารถในการปรับตัวอย่างรวดเร็วและความทุ่มเทของอาสาสมัคร ผู้เข้าร่วมแต่ละคนจะนำทักษะเฉพาะตัวของตนมาสู่โต๊ะ มีส่วนร่วมและได้รับประโยชน์จากงานร่วมกันของเรา โมเดลนี้ช่วยให้การตัดสินใจรวดเร็วและตอบสนองต่อความท้าทายได้อย่างมีประสิทธิภาพ ส่งเสริมชุมชนของเราไปสู่เป้าหมายร่วมกันของเรา
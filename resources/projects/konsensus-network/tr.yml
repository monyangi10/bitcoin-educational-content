description: |
  2019 yılında Niko Laamanen tarafından kurulan Konsensus Network, Saifedean Ammous'un 'The Bitcoin Standard' kitabının Fince çevirisiyle başladı. Kısa sürede Bitcoin konusunda tutkulu gönüllülerden oluşan canlı ve özgürlüğüne düşkün bir ekibe dönüşerek kitabın Portekizce ve Hollandaca dillerinde yerelleştirilmesine öncülük etti. Sadece Bitcoin şirketi olarak, yazarlar, çevirmenler ve dağıtım kanalları arasında bir köprü görevi görerek bugüne kadar 50'den fazla kitap yayınladık.
  
  Misyonumuz, Bitcoin, Avusturya ekonomisi ve egemenliği yerelleştirilmiş literatür aracılığıyla daha erişilebilir hale getirmek etrafında dönüyor. Bitcoin'ın potansiyelinin çok büyük olduğuna inanıyoruz ve bu bilgiyi dünyayla paylaşmak istiyoruz. Sonunda kitap yayıncılığına girmeyi beklemiyorduk, ancak herkesin merkezi olmayan paranın dönüştürücü gücünü anlamasını sağlamaya kararlıyız.
  
  Bir 'denizyıldızı organizasyonu' olarak yapılandırıldık, hızlı uyum sağlama ve gönüllülerin adanmışlığı ile gelişen merkezi olmayan, lidersiz bir organizasyon modeli. Her katılımcı, kolektif çalışmalarımıza katkıda bulunarak ve bunlardan faydalanarak masaya kendi benzersiz becerilerini getiriyor. Bu model, zorluklara karşı hızlı karar alma ve etkili yanıtlar verme olanağı sağlayarak topluluğumuzu ortak hedefimiz doğrultusunda güçlendirmektedir.
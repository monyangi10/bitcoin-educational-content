description: |
  Ishirahamwe ry’ubumwe ryashinzwe mu mwaka w’2019 na Niko Laamanen, ryatanguye n’ubuhinduzi bw’ikifinlande bw’igitabu ‘Ikigereranyo ca Bitcoin’ cakozwe na Saifedean Ammous. Bidatevye, ryarakuze riba umugwi w’abakozi b’intahemuka bafise umutima ukunze, bakunda umwidegemvyo, bakunda cane Bitcoin, ivyo bikaba vyatumye ico gitabu gihindurwa mu rurimi rw’igiportigale no mu giholandi. Nk’ishirahamwe rikoresha Bitcoin gusa, twasohoye ibitabu birenga 50 gushika ubu, bikora nk’ikiraro hagati y’abanditsi, abahinduzi n’inzira zo kubikwiragiza.
  
  Intumbero yacu izunguruka gutuma Bitcoin, ubutunzi bwa Otirishiya, n’ubusegaba bishikira abantu biciye mu bitabu vy’aho hantu. Twemera ko ubushobozi bwa Bitcoin ari bwinshi cane kandi twipfuza gusangira ubwo bumenyi n’isi yose. Ntitwari twiteze ko tuzoheza mu gusohora ibitabu, ariko twiyemeje gutuma umuntu wese atahura ububasha bwo guhindura amahera yegerejwe.
  
  Turatunganijwe nk’‘ishirahamwe ry’inyenyeri zo mu kiyaga,’ ishirahamwe ry’abantu benshi, ritagira abarongozi, ritera imbere kubera ukuntu umuntu ashobora guhindura ibintu vyihuta be n’ukwitanga kw’abakorera ubushake. Umwe wese mu bari muri iyo nama azana ubuhinga bwiwe bwihariye ku meza, akagira ico aterereye kandi akavyungukirako mu gikorwa cacu rusangi. Ico kigereranyo kirashoboza gufata ingingo vyihuse no gusubiza neza ingorane, kigatuma umuryango wacu ushobora gushika ku ntumbero dusangiye.
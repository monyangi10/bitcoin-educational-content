description: |
  PlebLab je Bitcoin Hackerspace i akcelerator zajednice u Ostinu, Teksas. Njegova misija je da podstakne zajednicu programera, hakera, kreativaca i graditelja softvera/hardvera otvorenog koda, stvarajući prostor gde pojedinci mogu da sarađuju, unaprede svoje veštine i pretvore naizgled nemoguće ideje u stvarnost.


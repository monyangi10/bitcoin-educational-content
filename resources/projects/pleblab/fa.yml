description: |
  PlebLab یک فضای هکری Bitcoin و شتاب‌دهنده جامعه در آستین، تگزاس است. ماموریت آن پرورش جامعه‌ای از توسعه‌دهندگان، هکرها، خلاقان و سازندگان نرم‌افزار/سخت‌افزار متن‌باز است، ایجاد فضایی که در آن افراد می‌توانند همکاری کنند، مهارت‌های خود را ارتقا دهند و ایده‌های به‌ظاهر غیرممکن را به واقعیت تبدیل کنند.

  کمک مالی: https://pay.zaprite.com/pl_utaxL87ElV?utm_content=buffer4dcd7&utm_medium=social&utm_source=twitter.com&utm_campaign=buffer
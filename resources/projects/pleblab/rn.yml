description: |
  PlebLab ni ikigo ca Bitcoin c’ubuhinga bwa none n’ivy’abanyagihugu i Austin, muri Texas.
  Intumbero yayo ni uguteza imbere umuryango w’abahinguzi, abasuma, abahinguzi, n’abahinga mu vy’ubuhinga bwa none, bagatuma haba ikibanza aho abantu bashobora gukorana, bagashira hejuru ubuhinga bwabo, bagahindura ivyiyumviro bisa n’ibidashoboka bikaba ukuri.
  
  Intererano:
  Ivyiyumviro vy'abantu n'ivy'ubuhinga
  
description: |
  PlebLab är ett Bitcoin Hackerspace och en community-accelerator i Austin, Texas. Dess uppdrag är att främja en gemenskap av utvecklare, hackare, kreatörer och byggare av programvara/hårdvara med öppen källkod, och skapa ett utrymme där individer kan samarbeta, höja sina färdigheter och omvandla till synes omöjliga idéer till verklighet.

  Donation: https://pay.zaprite.com/pl_utaxL87ElV?utm_content=buffer4dcd7&utm_medium=social&utm_source=twitter.com&utm_campaign=buffer
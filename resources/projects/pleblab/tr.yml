description: |
  PlebLab, Austin, Teksas'ta bulunan bir Bitcoin Hackerspace ve topluluk hızlandırıcısıdır.
  Misyonu, geliştiricilerden, bilgisayar korsanlarından, yaratıcılardan ve açık kaynaklı yazılım/donanım üreticilerinden oluşan bir topluluğu teşvik etmek, bireylerin işbirliği yapabilecekleri, becerilerini geliştirebilecekleri ve görünüşte imkansız olan fikirleri gerçeğe dönüştürebilecekleri bir alan yaratmaktır.
  

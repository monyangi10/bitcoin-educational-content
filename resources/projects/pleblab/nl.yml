description: |
  PlebLab is een Bitcoin Hackerspace en community accelerator in Austin, Texas. Haar missie is het stimuleren van een gemeenschap van ontwikkelaars, hackers, creatieven en bouwers van open-source software/hardware, het creëren van een ruimte waar individuen kunnen samenwerken, hun vaardigheden kunnen verbeteren en schijnbaar onmogelijke ideeën kunnen omzetten in realiteit.


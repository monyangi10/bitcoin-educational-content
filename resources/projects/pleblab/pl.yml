description: |
  PlebLab to Bitcoin Hackerspace i akcelerator społeczności w Austin w Teksasie. Jego misją jest wspieranie społeczności programistów, hakerów, twórców i konstruktorów oprogramowania / sprzętu o otwartym kodzie źródłowym, tworząc przestrzeń, w której jednostki mogą współpracować, podnosić swoje umiejętności i przekształcać pozornie niemożliwe pomysły w rzeczywistość.

  Darowizna: https://pay.zaprite.com/pl_utaxL87ElV?utm_content=buffer4dcd7&utm_medium=social&utm_source=twitter.com&utm_campaign=buffer
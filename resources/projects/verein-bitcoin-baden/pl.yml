description: |
  Stowarzyszenie "Bitcoin Baden" wyłoniło się z grupy stołowej stałych bywalców Threema - luźnej grupy ludzi, którzy są zaangażowani w Bitcoin w różnym stopniu i prawdopodobnie zgadzają się co do jednej rzeczy: Coś jest nie tak z obecnymi pieniędzmi i Bitcoin oferuje obiecującą alternatywę. Mamy również szczęście, że w grupie są osoby, które obecnie pracują bezpośrednio dla firm z branży. Oznacza to, że mogą odpowiedzieć na pytania stałych bywalców, którzy być może są na początku swojej podróży Bitcoin z dogłębną wiedzą.

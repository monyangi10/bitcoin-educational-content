description: |
  La asociación "Bitcoin Baden" surgió de un grupo de la mesa de asiduos de Threema, un grupo informal de personas que se dedican a Bitcoin con mayor o menor profundidad y que probablemente están de acuerdo en una cosa en particular: Algo ya no va bien con el dinero actual y Bitcoin ofrece una alternativa prometedora. También tenemos la suerte de contar en el grupo con personas que ahora trabajan directamente para empresas del sector. Esto significa que pueden responder a las preguntas de los asiduos que quizá estén al principio de su andadura en Bitcoin con conocimientos profundos.

description: |
  De vereniging "Bitcoin Baden" is ontstaan uit een stamtafelgroep van Threema - een losse groep mensen die in meer of mindere mate betrokken zijn bij Bitcoin en het waarschijnlijk over één ding eens zijn: Er klopt iets niet meer met het huidige geld en Bitcoin biedt een veelbelovend alternatief. We hebben ook het geluk dat er mensen in de groep zitten die nu direct voor bedrijven in de industrie werken. Dit betekent dat ze de vragen van stamgasten die misschien aan het begin van hun Bitcoin reis staan met diepgaande expertise kunnen beantwoorden.

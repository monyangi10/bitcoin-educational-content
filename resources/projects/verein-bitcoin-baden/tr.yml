description: |
  "Bitcoin Baden" derneği, Threema müdavimlerinin masa grubundan ortaya çıktı - Bitcoin ile çeşitli derecelerde derinlemesine ilgilenen ve muhtemelen özellikle bir konuda hemfikir olan gevşek bir grup insan: Mevcut parayla artık bir şeyler doğru gitmiyor ve Bitcoin umut verici bir alternatif sunuyor. Grupta şu anda doğrudan sektördeki şirketler için çalışan insanlar olduğu için de şanslıyız. Bu, belki de Bitcoin yolculuklarının başında olan müdavimlerin sorularını derinlemesine uzmanlıkla yanıtlayabilecekleri anlamına geliyor.

description: |
  "Bitcoin Baden" -yhdistys syntyi Threeman vakiopöytäryhmästä - löyhästä ryhmästä ihmisiä, jotka ovat mukana Bitcoin:ssa vaihtelevan syvällisesti ja jotka ovat luultavasti samaa mieltä erityisesti yhdestä asiasta: Jokin ei ole enää kunnossa nykyisen rahan kanssa, ja Bitcoin tarjoaa lupaavan vaihtoehdon. Olemme myös onnekkaita, että ryhmässä on ihmisiä, jotka työskentelevät nyt suoraan alan yrityksille. Tämä tarkoittaa sitä, että he voivat vastata Bitcoin-matkansa alussa ehkä vielä olevien kanta-asiakkaiden kysymyksiin syvällisellä asiantuntemuksella.

description: |
  L'association "Bitcoin Baden" est née d'un groupe de table d'habitués de Threema - un groupe informel de personnes qui sont impliquées dans le Bitcoin à des degrés divers et qui sont probablement d'accord sur une chose en particulier : Quelque chose ne va plus avec l'argent actuel et Bitcoin offre une alternative prometteuse. Nous avons également la chance d'avoir dans le groupe des personnes qui travaillent maintenant directement pour des entreprises de l'industrie. Cela signifie qu'ils peuvent répondre aux questions des habitués qui sont peut-être au début de leur voyage dans Bitcoin avec une expertise approfondie.

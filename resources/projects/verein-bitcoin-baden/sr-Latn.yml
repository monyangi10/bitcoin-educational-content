description: |
  Udruženje "Bitcoin Baden" proizašlo je iz grupe redovnih članova na Threema platformi - labave grupe ljudi koji su uključeni u Bitcoin u različitim stepenima dubine i verovatno se slažu u jednoj stvari: Nešto više nije u redu sa trenutnim novcem i Bitcoin nudi obećavajuću alternativu. Takođe imamo sreće da u grupi imamo ljude koji sada rade direktno za kompanije u industriji. To znači da mogu odgovoriti na pitanja redovnih članova koji su možda na početku svog Bitcoin putovanja sa dubinskom stručnošću.

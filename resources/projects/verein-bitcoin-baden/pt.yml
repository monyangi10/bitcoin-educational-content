description: |
  A associação "Bitcoin Baden" surgiu a partir de um grupo de frequentadores regulares do Threema - um grupo informal de pessoas que estão envolvidas com o Bitcoin em diferentes graus de profundidade e provavelmente concordam numa coisa em particular: Algo já não está bem com o dinheiro atual e o Bitcoin oferece uma alternativa promissora. Também temos a sorte de ter no grupo pessoas que agora trabalham diretamente para empresas do sector. Isto significa que podem responder às perguntas dos utilizadores habituais, que talvez estejam no início da sua viagem ao Bitcoin, com conhecimentos aprofundados.

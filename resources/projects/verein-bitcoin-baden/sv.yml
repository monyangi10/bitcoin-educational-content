description: |
  Föreningen "Bitcoin Baden" uppstod ur en Threema-stambordsgrupp - en lös grupp människor som är involverade i Bitcoin i varierande grad av djup och förmodligen håller med om en sak i synnerhet: Något är inte längre rätt med de nuvarande pengarna och Bitcoin erbjuder ett lovande alternativ. Vi har också turen att ha personer i gruppen som nu arbetar direkt för företag i branschen. Detta innebär att de kan svara på frågorna från stamgäster som kanske är i början av sin Bitcoin-resa med djupgående expertis.

description: |
  انجمن "Bitcoin بادن" از یک گروه میزگرد Threema شکل گرفت - گروهی آزاد از افرادی که به درجات مختلف با Bitcoin درگیر هستند و احتمالاً بر سر یک چیز خاص توافق دارند: چیزی در سیستم پولی فعلی دیگر درست نیست و Bitcoin یک جایگزین امیدوارکننده ارائه می‌دهد. ما همچنین خوش‌شانس هستیم که افرادی در گروه داریم که اکنون مستقیماً برای شرکت‌های صنعت کار می‌کنند. این بدان معناست که آنها می‌توانند به سوالات اعضای ثابت که شاید در ابتدای سفر خود با Bitcoin هستند، با تخصص عمیق پاسخ دهند.

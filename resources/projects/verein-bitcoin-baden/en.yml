description: |
  The "Bitcoin Baden" association emerged from a Threema regulars' table group - a loose group of people who are involved with Bitcoin in varying degrees of depth and probably agree on one thing in particular: Something is no longer right with the current money and Bitcoin offers a promising alternative. We are also lucky to have people in the group who now work directly for companies in the industry. This means that they can answer the questions of regulars who are perhaps at the beginning of their Bitcoin journey with in-depth expertise.

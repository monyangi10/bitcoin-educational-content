description: |
  Асоциацията "Bitcoin Баден" възникна от групата на масата на редовните участници в Threema - свободна група от хора, които се занимават с Bitcoin в различна степен и вероятно са съгласни с едно конкретно нещо: Нещо вече не е наред със сегашните пари и Bitcoin предлага обещаваща алтернатива. Имаме и късмета в групата да има хора, които сега работят директно за компании от бранша. Това означава, че те могат да отговарят на въпросите на редовните потребители, които може би са в началото на своето пътешествие в Bitcoin, със задълбочена експертиза.
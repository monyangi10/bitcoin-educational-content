description: |
  Ühing "Bitcoin Baden" tekkis Threema regulaargrupist - lahtine grupp inimesi, kes tegelevad Bitcoin-ga erineval määral ja on ilmselt ühes asjas eriti üksmeelel: Midagi ei ole praeguse rahaga enam korras ja Bitcoin pakub paljulubavat alternatiivi. Meil on ka õnne, et rühmas on inimesi, kes töötavad nüüd otse tööstusettevõtetes. See tähendab, et nad saavad põhjaliku asjatundlikkusega vastata nende püsiklientide küsimustele, kes on ehk alles Bitcoin teekonna alguses.

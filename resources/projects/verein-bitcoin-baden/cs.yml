description: |
  Sdružení "Bitcoin Baden" vzniklo ze skupiny pravidelných návštěvníků Threemy - volné skupiny lidí, kteří se Bitcoin věnují v různé míře a pravděpodobně se shodují zejména v jedné věci: Něco už není v pořádku se současnými penězi a Bitcoin nabízí slibnou alternativu. Máme také to štěstí, že ve skupině jsou lidé, kteří nyní pracují přímo pro společnosti z oboru. To znamená, že mohou s hlubokými odbornými znalostmi odpovídat na otázky pravidelných uživatelů, kteří jsou možná na začátku své cesty za Bitcoin.

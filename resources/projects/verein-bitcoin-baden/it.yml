description: |
  L'associazione "Bitcoin Baden" è emersa da un gruppo di giocatori abituali di Threema - un gruppo di persone che sono coinvolte con Bitcoin in vari gradi di profondità e che probabilmente concordano su una cosa in particolare: Qualcosa non va più bene con i soldi attuali e Bitcoin offre un'alternativa promettente. Siamo anche fortunati ad avere nel gruppo persone che ora lavorano direttamente per aziende del settore. Questo significa che possono rispondere alle domande dei frequentatori abituali, che magari sono all'inizio del loro viaggio in Bitcoin, con una competenza approfondita.

description: |
  Foreningen "Bitcoin Baden" sprang ut av en Threema-stambordsgruppe - en løs gruppe mennesker som er involvert i Bitcoin i varierende grad og som nok er enige om én ting spesielt: Det er noe som ikke lenger stemmer med dagens penger, og Bitcoin tilbyr et lovende alternativ. Vi er også så heldige å ha folk i gruppen som nå jobber direkte for selskaper i bransjen. Det betyr at de kan svare på spørsmål fra stamgjester som kanskje er i begynnelsen av sin Bitcoin-reise, med inngående ekspertise.

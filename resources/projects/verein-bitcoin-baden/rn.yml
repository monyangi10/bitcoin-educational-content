description: |
  Ishirahamwe rya "Bitcoin Baden" ryavuye mu mugwi w'abakozi ba Threema - umugwi w'abantu bafise uruhara muri Bitcoin mu buryo butandukanye kandi kumbure bemeranya ku kintu kimwe cane cane: Hari ikintu kitagikora neza ku mahera ariho ubu kandi Bitcoin itanga ubundi buryo bwiza. Turafise kandi amahirwe yo kugira abantu muri uwo mugwi ubu bakorera ataco baciye ku masosiyete ari muri iyo nganda. Ivyo bisigura ko bashobora kwishura ibibazo vy’abahora baza kumbure bari mu ntango y’urugendo rwabo rwa Bitcoin bafise ubuhinga bwimbitse.
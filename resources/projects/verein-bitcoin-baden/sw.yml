description: |
  Muungano wa "Bitcoin Baden" uliibuka kutoka kwa kikundi cha mezani cha Threema regulars - kundi legelege la watu wanaojihusisha na Bitcoin katika viwango tofauti vya kina na pengine wanakubaliana juu ya jambo moja hasa: Kuna kitu si sawa na pesa za sasa na Bitcoin inatoa njia mbadala ya kuahidi. Pia tuna bahati ya kuwa na watu kwenye kikundi ambao sasa wanafanya kazi moja kwa moja kwa kampuni kwenye tasnia. Hii ina maana kwamba wanaweza kujibu maswali ya watu wa kawaida ambao labda wako mwanzoni mwa safari yao ya Bitcoin kwa utaalamu wa kina.

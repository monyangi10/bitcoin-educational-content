description: |
  Ассоциация "Bitcoin Baden" возникла на основе настольной группы завсегдатаев Threema - свободной группы людей, которые в разной степени глубоко вовлечены в Bitcoin и, вероятно, согласны с одной особенностью: Что-то уже не так с нынешними деньгами, и Bitcoin предлагает многообещающую альтернативу. Нам также повезло, что в группе есть люди, которые сейчас работают непосредственно в компаниях индустрии. Это значит, что они могут ответить на вопросы завсегдатаев, которые, возможно, находятся в самом начале своего пути по Bitcoin, с глубокой экспертизой.

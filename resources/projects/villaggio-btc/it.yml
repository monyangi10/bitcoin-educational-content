description: |
  Villaggio Bitcoin è una startup italiana Bitcoin-only fondata nel 2021 da Valerio Dalla Costa. Con sede a Brescia, Lecco e Lugano, offre formazione, consulenza e community building dedicati a Bitcoin. Attraverso la Villaggio Academy propone corsi di formazione, pubblica libri su Bitcoin, vende e configura hardware wallet e assembla full node. Con il programma Bitcoin 4 Business supporta le aziende nell'integrazione di Bitcoin. Ha co-organizzato il Bitcare Forum 2024, conferenza Bitcoin-only con oltre 750 partecipanti.

description: |
  Villaggio Bitcoin is an Italian Bitcoin-only startup founded in 2021 by Valerio Dalla Costa. Based in Brescia, Lecco, and Lugano, it provides education, consulting, and community building dedicated to Bitcoin. Through Villaggio Academy, it offers training courses, publishes books on Bitcoin, sells and configures hardware wallets, and assembles full nodes. With the Bitcoin 4 Business program, it supports companies in integrating Bitcoin. It co-organized Bitcare Forum 2024, a Bitcoin-only conference with over 750 participants.

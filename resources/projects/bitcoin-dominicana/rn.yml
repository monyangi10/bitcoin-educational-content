description: |
  Guhindura Kazoza Kawe k'Ivy'Imari ukoresheje Bitcoin Dominicana: Iga Uko Worungika No Kwakira Amahera Mu buryo Bworoshe Kandi Butekanye. Ishirahamwe ryacu rizoguyobora Utaravye Ubumenyi Ufise, Amateka y'Inguzanyo canke Igihugu. Tora Inyungu maze Ukwakire Igihugu Gishasha c’Ubutunzi kumwe natwe!
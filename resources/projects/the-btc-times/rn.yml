description: |
  Muri BTC Times, dutanga ibirimwo n’intumbero yo gutanga raporo nziza y’amakuru witwararika, mu gihe dutanga inkuru abandi batazi. Ubwa nyuma turashaka Address FUD n’ibibi bifata mu binyamakuru. Itanga amakuru y’umusi ku musi n’iterambere ry’ibintu bikikuje Bitcoin n’ibindi bikoresho vy’amahera. Biciye mu maraporo, mu vyigwa vyimbitse, no mu biganiro vy’abahinga mu vy’ivyo biganiro, dufise intumbero yo gufata ingaruka z’ubutunzi, politike n’imibano z’izo tekinoloji.
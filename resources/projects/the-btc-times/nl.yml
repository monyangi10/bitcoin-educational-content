description: |
  Bij BTC Times leveren we inhoud met een missie van kwaliteitsrapportering over het nieuws waar u om geeft, terwijl we verhalen verslaan die anderen niet verslaan. Tenslotte willen we Address FUD en slechte berichten in de media wegnemen. Het biedt dagelijks verslag van het nieuws en de ontwikkelingen rondom Bitcoin en andere cryptocurrencies. Door middel van rapporten, deep-dives en opiniestukken van materiedeskundigen proberen we de economische, politieke en sociale impact van deze technologieën vast te leggen.
description: |
  RoboSats е прост и частен начин за обмен на биткойн за национални валути. Robosats опростява потребителското преживяване при равнопоставени потребители и използва фактури за светкавично задържане, за да сведе до минимум изискванията за попечителство и доверие. Детерминистично генерираните аватари помагат на потребителите да се придържат към най-добрите практики за защита на личните данни.
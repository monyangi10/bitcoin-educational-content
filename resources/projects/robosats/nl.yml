description: |
  RoboSats is een eenvoudige en private manier om Exchange Bitcoin voor nationale valuta. Robosats vereenvoudigt de peer-to-peer gebruikerservaring en gebruikt lightning hold facturen om bewaring en vertrouwensvereisten te minimaliseren. De deterministisch gegenereerde avatars helpen gebruikers om zich aan de beste privacypraktijken te houden.
description: |
  Wallet yatoranijwe ishoboza gushiramwo ivy’amahera mu gutanga umutekano
  gushika ku Bitcoin ku bakoresha telefone zifise ubushobozi buke be n’abakoresha telefone ngendanwa zikoresha ubushobozi buke mu 2019.
  amasoko ariko arakura, gukuraho ikinogo casigajwe n’imiti isanzwe y’amasakoshi.
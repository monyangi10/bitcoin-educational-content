description: |
  La Wallet triée permet l'inclusion financière en fournissant un accès sécurisé à la Bitcoin pour les utilisateurs de téléphones mobiles et de smartphones à faible puissance
  l'accès sécurisé au Bitcoin pour les utilisateurs de feature phones et de smartphones de faible puissance dans les marchés émergents

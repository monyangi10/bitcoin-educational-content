description: |
  Bitcoin Dada is opgericht door Lorraine Marcel, een gepassioneerd pleitbezorger van financiële inclusie, nadat ze zich bewust werd van de enorme genderkloof in de Bitcoin en Blockchain ruimte. Haar reis begon in ruimtes waar vrouwen afwezig of sterk ondervertegenwoordigd waren, wat een Hard waarheid versterkte - financiële innovatie ging vooruit, maar vrouwen bleven achter. Vastbesloten om dit verhaal te veranderen, ging ze op weg om een ruimte te creëren waar Afrikaanse vrouwen toegang konden krijgen tot Bitcoin onderwijs, een carrière konden opbouwen en leiders in de sector konden worden.
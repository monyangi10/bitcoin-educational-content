description: |
  Bitcoin Dada ก่อตั้งโดย Lorraine Marcel ผู้สนับสนุนที่มีความหลงใหลในเรื่องการรวมทางการเงิน หลังจากที่เธอตระหนักถึงช่องว่างทางเพศที่ชัดเจนในพื้นที่ Bitcoin และบล็อกเชน การเดินทางของเธอเริ่มต้นในห้องที่ผู้หญิงไม่อยู่หรือมีตัวแทนที่น้อยมาก ซึ่งย้ำเตือนความจริงที่ยากลำบาก—นวัตกรรมทางการเงินกำลังก้าวไปข้างหน้า แต่ผู้หญิงกลับถูกทิ้งไว้ข้างหลัง ด้วยความมุ่งมั่นที่จะเปลี่ยนแปลงเรื่องราวนี้ เธอจึงตั้งใจที่จะสร้างพื้นที่ที่ผู้หญิงแอฟริกันสามารถเข้าถึงการศึกษา Bitcoin สร้างอาชีพ และกลายเป็นผู้นำในอุตสาหกรรมนี้
description: |
  Bitcoin Dada, finansal kapsayıcılığın tutkulu bir savunucusu olan Lorraine Marcel tarafından, Bitcoin ve Blockchain alanındaki keskin cinsiyet uçurumunu fark ettikten sonra kuruldu. Yolculuğu, kadınların ya hiç bulunmadığı ya da önemli ölçüde yetersiz temsil edildiği odalarda başladı ve bir Hard gerçeğini pekiştirdi - finansal yenilik ilerliyordu, ancak kadınlar geride kalıyordu. Bu anlatıyı değiştirmeye kararlı bir şekilde, Afrikalı kadınların KİS-1 eğitimine erişebilecekleri, kariyer yapabilecekleri ve sektörde lider olabilecekleri bir alan yaratmak için yola çıktı.
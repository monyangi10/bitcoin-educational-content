description: |
  Bitcoin Dada yashinzwe na Lorraine Marcel, umuvugizi w’ivy’ubutunzi, amaze kubona ko hariho itandukaniro rikomeye hagati y’igitsina mu kibanza ca Bitcoin na Blockchain. Urugendo rwiwe rwatanguye mu vyumba aho abagore batahari canke batari benshi cane, ivyo bikaba vyakomeje ukuri kwa Hard—ubuhinga bushasha mu vy’amahera bwariko buratera imbere, ariko abagore bariko barasigara inyuma. Kubera ko yari yiyemeje guhindura iyo nkuru, yaciye afata ingingo yo gushinga ikibanza aho abagore b’abanyafrika bashobora kuronka inyigisho za Bitcoin, kwubaka akazi, no kuba abarongozi muri iyo nganda.
description: |
  Bitcoin Dada е основана от Лорейн Марсел, страстна защитничка на финансовото приобщаване, след като осъзнава голямата разлика между половете в Bitcoin и блокчейн пространството. Нейното пътуване започва в стаи, в които жените или отсъстват, или са значително по-слабо представени, което затвърждава една трудна истина - финансовите иновации се движат напред, но жените остават назад. Решена да промени този разказ, тя се заема да създаде пространство, в което африканските жени могат да получат достъп до обучение по Bitcoin, да изградят кариера и да станат лидери в индустрията.
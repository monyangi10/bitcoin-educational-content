description: |
  Code Orange Dev School is Asia's Bitcoin developer training program based in Bali. The school offers hands-on workshops, online study cohorts, and crash courses covering Bitcoin development, node running, mining, multisig setups, privacy tools, and self-custody. Their mission is to strengthen Bitcoin's resilience through a robust social layer of developers and technical bitcoiners, offering programs like Decoding Bitcoin, Sovereign Bitcoiner courses, and weekly in-person workshops.

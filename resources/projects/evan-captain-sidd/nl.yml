description: |
  Geloof in jezelf. Alles is mentaal. Ga NIET mee op een Ride of Passage als je wilt dat je leven daarna hetzelfde blijft. Samengestelde avonturen met gelijkgestemden. Rijd door prachtige landschappen met collega-ondernemers terwijl je samen problemen oplost en op avontuur gaat. Een nieuwe en unieke vorm van een Mastermind conferentie.
  
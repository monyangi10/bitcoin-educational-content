description: |
  Niwizere wewe nyene. Ivyo vyose ni ivy’ubwenge. NTUZE ku Ride of Passage nimba ushaka ko ubuzima bwawe buguma uko buri inyuma. Ivyiza vy’ugutegura n’abantu bafise ivyiyumviro nk’ivyo. Mugende mu bibanza bitangaje hamwe n'abacuruzi bagenzi banyu uko mutorera umuti ingorane n'ugutemberera hamwe. Uburyo bushasha kandi budasanzwe bw’inama ya Mastermind.
  
description: |
  Вярвайте в себе си. Всичко е умствено. НЕ се включвайте в "Пътуване на прехода", ако искате животът ви да остане същият след това. Куриозни приключения с хора със сходно мислене. Пътувайте през зашеметяващи пейзажи с колеги предприемачи, докато решавате проблеми и приключенствате заедно. Нова и уникална форма на мастърмайнд конференция.
  
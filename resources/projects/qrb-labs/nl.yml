description: |
  QRB Labs is een bedrijf gevestigd in Addis Abeba, Ethiopië. Het is opgericht in 2021 en biedt datacenterdiensten aan internationale klanten, waarbij de nadruk ligt op locatie-agnostische berekeningen met een hoog energieverbruik, zoals Bitcoin Mining, en AI-modeltraining. QRB is een klant van Ethiopian Electric Power (EEP) en koopt overtollige hydro-elektrische energie, ook wel "stranded" energie genoemd, om schaalbare modulaire datacenters te exploiteren. Deze datacenters bevinden zich op strategische locaties in onderstations van EEP in heel Ethiopië.
description: |
  QRB Labs, Etiyopya'nın Addis Abeba kentinde kurulmuş bir şirkettir. 2021 yılında kurulan şirket, Bitcoin Mining gibi konumdan bağımsız yüksek enerjili hesaplamalara ve yapay zeka model eğitimine odaklanarak uluslararası müşterilere veri merkezi hizmetleri sunmaktadır. QRB, Etiyopya Elektrik Enerjisi'nin (EEP) bir müşterisidir ve ölçeklenebilir modüler veri merkezlerini işletmek için genellikle "karaya oturmuş" enerji olarak adlandırılan fazla hidroelektrik enerji tedarik etmektedir. Bu veri merkezleri, Etiyopya'daki EEP trafo merkezlerinde stratejik olarak konumlandırılmıştır.
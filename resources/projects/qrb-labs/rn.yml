description: |
  QRB Labs ni ishirahamwe ryashinzwe i Addis Abeba muri Etiyopiya. Yashinzwe mu 2021, itanga ibikorwa vy’ibibanza vy’amakuru ku bakiriya bo kw’isi yose, yibanda ku biharuro vy’inguvu nyinshi bitajanye n’aho umuntu ari nka Bitcoin Mining, n’amahugurwa y’ubuhinga bwa none. QRB ni umukiriya wa Etiyopiya Electric Power (EEP) kandi ironka amashanyarazi y’amazi asigaye, akenshi yitwa inguvu “zicitse intege”, kugira ngo ikoreshe ibibanza vy’amakuru bishobora guhindurwa. Ivyo bibanza vy’amakuru biri ahantu heza cane mu bibanza vy’ubuhinga bwa EEP muri Etiyopiya yose. 
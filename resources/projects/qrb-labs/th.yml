description: |
  QRB Labs เป็นบริษัทที่ก่อตั้งขึ้นในแอดดิสอาบาบา ประเทศเอธิโอเปีย ก่อตั้งขึ้นในปี 2021 โดยให้บริการศูนย์ข้อมูลแก่ลูกค้าต่างประเทศ โดยมุ่งเน้นที่การคำนวณพลังงานสูงที่ไม่ขึ้นกับสถานที่ เช่น Bitcoin mining และการฝึกอบรมโมเดล AI QRB เป็นลูกค้าของ Ethiopian Electric Power (EEP) และจัดหาพลังงานไฟฟ้าพลังน้ำส่วนเกิน ซึ่งมักเรียกกันว่า "พลังงานที่ถูกทิ้ง" เพื่อดำเนินการศูนย์ข้อมูลแบบโมดูลาร์ที่สามารถปรับขนาดได้ ศูนย์ข้อมูลเหล่านี้ตั้งอยู่ในสถานีย่อยของ EEP ทั่วเอธิโอเปียอย่างมีกลยุทธ์
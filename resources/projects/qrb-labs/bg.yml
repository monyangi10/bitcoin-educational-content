description: |
  QRB Labs е компания, създадена в Адис Абеба, Етиопия. Основана през 2021 г., тя предлага услуги на центрове за данни на международни клиенти, като се фокусира върху агностични по отношение на местоположението високоенергийни изчисления, като Bitcoin mining, и обучение на модели на изкуствен интелект. QRB е клиент на Ethiopian Electric Power (EEP) и закупува излишъци от водноелектрическа енергия, обикновено наричани "stranded" енергия, за да управлява мащабируеми модулни центрове за данни. Тези центрове за данни са стратегически разположени в подстанциите на EEP в цяла Етиопия.
description: |
  Hashlabs ni ishirahamwe rya Mining ritanga ibikorwa bitatu nyamukuru ku isoko ry’isi yose: kwakira abashitsi, ugugura ibikoresho, n’ugucungera urubuga. Kuva yatanguye muri Kazakhstan mu mwaka w’2021, Hashlabs yarateye imbere iba ishirahamwe ry’isi yose rifise ibikorwa ku migabane itatu, harimwo muri Afirika kandi rikorera abakiriya amajana n’amajana kw’isi yose.
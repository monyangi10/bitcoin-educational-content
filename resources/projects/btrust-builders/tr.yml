description: |
  Afrikalılar tarafından Afrika için Bitcoin.
  
  Btrust Builders, yeni nesil Afrikalı Bitcoin ve Lightning geliştiricilerini eğitmek için tasarlanmış bir programdır. Amacımız, Afrikalı yazılım geliştiricilerin Bitcoin ve Lightning için geliştirmeye geçiş yapmaları için bir yol oluşturmaktır.
description: |
  Bitcoin ku bwa Afirika, n’Abanyafirika.
  
  Btrust Builders ni porogarama yateguwe gutoza uruvyaro ruzokurikira rw’abahinga mu bijanye n’ubuhinga bwa Bitcoin n’ubw’umuravyo bo muri Afirika. Intumbero yacu ni ugushiraho inzira y’abahinguzi ba porogarama bo muri Afirika kugira ngo bahindukire baje mu kwubaka Bitcoin na Lightning.
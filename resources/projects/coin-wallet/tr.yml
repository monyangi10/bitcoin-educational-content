description: |
  Coin Wallet - kendi kendine emanet, açık kaynaklı, çoklu para birimi wallet 2015 yılında piyasaya sürüldü. Temel güçlü yönleri - gerçek çoklu platform - Web uygulaması, iOS, Android, Windows, Linux (snap, flatpak) ve Tor (.onion) olarak mevcuttur. Hem yeni başlayanlar hem de ileri düzey kullanıcılar için mükemmeldir.
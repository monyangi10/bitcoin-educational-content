description: |
  Coin Wallet - самодостаточная, мультивалютная wallet с открытым исходным кодом, запущенная в 2015 году. Ключевые преимущества - настоящая мультиплатформенность - доступно веб-приложение, iOS, Android, Windows, Linux (snap, flatpak) и Tor (.onion). Идеально подходит как для новичков, так и для опытных пользователей.
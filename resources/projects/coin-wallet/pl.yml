description: |
  Coin Wallet - samowystarczalny, open-source'owy, wielowalutowy wallet uruchomiony w 2015 roku. Kluczowe zalety - prawdziwie wieloplatformowy - dostępny jako aplikacja internetowa, iOS, Android, Windows, Linux (snap, flatpak) i Tor (.onion). Idealny zarówno dla początkujących, jak i zaawansowanych użytkowników.
description: |
  Coin Wallet - itsehallinnollinen, avoimen lähdekoodin ja monivaluuttainen wallet käynnistettiin vuonna 2015. Keskeiset vahvuudet - todellinen monialusta - saatavilla verkkosovelluksena, iOS, Android, Windows, Linux (snap, flatpak) ja Tor (.onion). Täydellinen sekä aloittelijoille että edistyneille käyttäjille.
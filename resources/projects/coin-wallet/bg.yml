description: |
  Coin Wallet - самостоятелна, с отворен код, с множество валути wallet стартира през 2015 г. Ключови предимства - истинска мултиплатформеност - предлага се като уеб приложение, iOS, Android, Windows, Linux (snap, flatpak) и Tor (.onion). Перфектна както за начинаещи, така и за напреднали потребители.
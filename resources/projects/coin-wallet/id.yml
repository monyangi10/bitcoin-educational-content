description: |
  Coin Wallet - kustodian mandiri, sumber terbuka, multi-mata uang wallet diluncurkan pada tahun 2015. Kekuatan utama - multi-platform sejati - tersedia dalam bentuk aplikasi Web, iOS, Android, Windows, Linux (snap, flatpak), dan Tor (.onion). Sempurna untuk pemula dan pengguna tingkat lanjut.
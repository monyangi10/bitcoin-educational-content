description: |
  Orange ni ishirahamwe ry’ubuhinga bwa none ryibanda ku kwishura vyihuta kandi bihenda, ryubatswe kuri Bitcoin Lightning Network.  Itanga API imwe ishobora gutuma amashirahamwe y’ubuhinga bwa none (fintechs), ibigo vy’imari, n’ibibanza vyo kohereza amahera bishobora kohereza no kwakira amahera ubwo nyene, ataco bimaze gutanga amahera imbere y’igihe. Orange ishigikira amafaranga yo kwishura muri Bitcoin, amafaranga y’aho hantu, n’amafaranga y’amatelefone ngendanwa. 
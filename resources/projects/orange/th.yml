description: |
  Orange เป็นบริษัทฟินเทคที่มุ่งเน้นการชำระเงินข้ามพรมแดนที่รวดเร็วและต้นทุนต่ำ สร้างขึ้นบน Bitcoin Lightning Network โดยเสนอ API เดียวที่ช่วยให้ฟินเทค สถาบันการเงิน และแพลตฟอร์มการโอนเงินสามารถส่งและรับเงินได้ทันที โดยไม่จำเป็นต้องมีการเติมเงินล่วงหน้า Orange รองรับการชำระเงินใน Bitcoin สกุลเงินท้องถิ่น และเงินมือถือ
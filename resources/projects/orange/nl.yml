description: |
  Orange is een fintechbedrijf dat zich richt op snelle, goedkope grensoverschrijdende betalingen, gebouwd op de Bitcoin Lightning Network.  Het biedt een enkele API waarmee fintechs, financiële instellingen en geldovermakingsplatforms direct geld kunnen versturen en ontvangen, zonder dat er vooraf financiering nodig is. Orange ondersteunt betalingen in Bitcoin, lokale fiatvaluta's en mobiel geld.
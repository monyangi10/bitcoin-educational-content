description: |
  Orange, Bitcoin Lightning Network üzerine inşa edilmiş, hızlı, düşük maliyetli sınır ötesi ödemelere odaklanan bir fintech şirketidir.  Fintech'lerin, finans kurumlarının ve para transferi platformlarının ön fonlamaya gerek kalmadan anında para gönderip almasına olanak tanıyan tek bir API sunar. Orange, Bitcoin, yerel fiat para birimleri ve mobil para cinsinden ödemeleri desteklemektedir.
description: |
  Orange е финтех компания, фокусирана върху бързи и евтини трансгранични плащания, изградена на базата на Bitcoin Lightning Network.  Тя предлага единна API, която позволява на финтех компаниите, финансовите институции и платформите за парични преводи да изпращат и получават пари незабавно, без необходимост от предварително финансиране. Orange поддържа разплащания в Bitcoin, местни фиатни валути и мобилни пари.
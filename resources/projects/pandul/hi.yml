description: |
  मैं लोइक मोरेल, एक लेखक और Bitcoin सलाहकार हूँ। मैं फ्रेंच में Bitcoin पर सौ से ज़्यादा तकनीकी लेखों का लेखक हूँ, जिनमें से कुछ संदर्भ बन गए हैं, जैसे कि BIP-47 पर मेरा काम जिसका कई भाषाओं में अनुवाद किया गया है। मैं Bitcoin डिक्शनरी का भी लेखक हूँ, जो एक संदर्भ कार्य है जिसमें Bitcoin और इसके पारिस्थितिकी तंत्र से संबंधित सभी तकनीकी शब्दों की परिभाषाएँ सूचीबद्ध हैं। मैंने Bitcoin और क्रिप्टोग्राफी और Bitcoin Wallet नामक ई-पुस्तकें भी लिखी हैं। मेरे सभी तकनीकी कार्य निःशुल्क हैं और एक निःशुल्क लाइसेंस के अंतर्गत हैं।
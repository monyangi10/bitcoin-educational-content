description: |
  Ndi Loïc Morel, umwanditsi akaba n’umujanama wa Bitcoin. Ndi umwanditsi w’ingingo zirenga ijana z’ubuhinga zivuga kuri Bitcoin mu gifaransa, zimwe muri zo zikaba zacitse ibitabu vyo gukoresha, nk’igitabu canje ku bijanye na BIP-47 cahinduwe mu ndimi nyinshi. Ndi kandi umwanditsi w’Inkoranyamagambo Bitcoin, igitabu c’inyigisho kivuga insobanuro z’amajambo yose y’ubuhinga ajanye na Bitcoin n’ibidukikije vyayo. Nanditse kandi ibitabu vyo kuri interineti Bitcoin na Cryptography na Bitcoin Wallet. Ibikorwa vyanje vyose vy’ubuhinga ni ubuntu kandi biri munsi y’uruhusha rw’ubuntu.
description: |
  저는 작가이자 Bitcoin 고문인 로익 모렐입니다. 저는 프랑스어로 작성된 Bitcoin 관련 기술 문서 100편 이상을 저술했으며, 그 중 일부는 여러 언어로 번역되어 참고 자료로 활용되고 있습니다(예: BIP-47에 대한 저의 작업).
  또한 Bitcoin 및 그 생태계와 관련된 모든 기술 용어의 정의를 나열한 참고 자료인 Bitcoin 사전의 저자이기도 합니다. 또한 전자책인 Bitcoin과 암호화 및 Bitcoin Wallet도 저술했습니다. 저의 모든 기술 저작물은 무료 라이선스에 따라 무료로 제공됩니다.
  
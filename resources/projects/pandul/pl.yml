description: |
  Nazywam się Loïc Morel, jestem pisarzem i doradcą Bitcoin. Jestem autorem ponad stu artykułów technicznych na temat Bitcoin w języku francuskim, z których niektóre stały się referencjami, takimi jak moja praca na temat BIP-47 przetłumaczona na kilka języków. Jestem również autorem Słownika Bitcoin, pracy referencyjnej, która zawiera definicje wszystkich terminów technicznych związanych z Bitcoin i jego ekosystemem. Napisałem również e-booki Bitcoin i kryptografia oraz Bitcoin Wallet. Wszystkie moje prace techniczne są darmowe i na wolnej licencji.
description: |
  Jag heter Loïc Morel och är författare och Bitcoin-rådgivare. Jag är författare till över hundra tekniska artiklar om Bitcoin på franska, varav några har blivit referenser, till exempel mitt arbete om BIP-47 som översatts till flera språk. Jag är också författare till Bitcoin Dictionary, ett referensverk som innehåller definitioner av alla tekniska termer relaterade till Bitcoin och dess ekosystem. Jag har även skrivit e-böckerna Bitcoin and Cryptography och The Bitcoin Wallet. Alla mina tekniska verk är gratis och under en fri licens.
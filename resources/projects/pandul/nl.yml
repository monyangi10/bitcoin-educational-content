description: |
  Ik ben Loïc Morel, schrijver en Bitcoin adviseur. Ik ben de auteur van meer dan honderd technische artikelen over Bitcoin in het Frans, waarvan sommige referenties zijn geworden, zoals mijn werk over BIP-47, vertaald in verschillende talen. Ik ben ook de auteur van het Bitcoin Woordenboek, een naslagwerk met definities van alle technische termen met betrekking tot Bitcoin en haar ecosysteem. Ik heb ook de e-books Bitcoin en Cryptografie en De Bitcoin Wallet geschreven. Al mijn technische werken zijn gratis en onder een vrije licentie.
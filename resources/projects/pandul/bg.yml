description: |
  Аз съм Лоик Морел, писател и съветник на Bitcoin. Автор съм на над сто технически статии за Bitcoin на френски език, някои от които са станали референтни, като например работата ми за BIP-47, преведена на няколко езика.
  Също така съм автор на "Речник на Bitcoin" - справочник, в който са дадени определения на всички технически термини, свързани с Bitcoin и неговата екосистема. Написал съм и електронните книги Bitcoin и криптография и Bitcoin Wallet. Всичките ми технически произведения са безплатни и със свободен лиценз.
  
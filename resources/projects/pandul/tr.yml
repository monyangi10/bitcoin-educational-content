description: |
  Ben Loïc Morel, bir yazar ve Bitcoin danışmanıyım. Bitcoin üzerine Fransızca olarak yüzden fazla teknik makalenin yazarıyım, bunlardan bazıları referans haline gelmiştir, örneğin BIP-47 üzerine yaptığım çalışma birçok dile çevrilmiştir.
  Ayrıca Bitcoin ve ekosistemi ile ilgili tüm teknik terimlerin tanımlarını listeleyen bir referans çalışması olan Bitcoin Sözlüğü'nün de yazarıyım. Ayrıca Bitcoin and Cryptography ve The Bitcoin Wallet adlı e-kitapları da yazdım. Tüm teknik çalışmalarım ücretsizdir ve özgür bir lisans altındadır.
  
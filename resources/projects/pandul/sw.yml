description: |
  Mimi ni Loïc Morel, mwandishi na mshauri wa Bitcoin. Mimi ni mwandishi wa makala zaidi ya mia ya kiufundi kuhusu Bitcoin katika Kifaransa, ambayo baadhi yamekuwa marejeleo, kama vile kazi yangu kwenye BIP-47 iliyotafsiriwa katika lugha kadhaa. Mimi pia ni mwandishi wa Kamusi ya Bitcoin, kitabu cha marejeleo ambacho huorodhesha ufafanuzi wa istilahi zote za kiufundi zinazohusiana na Bitcoin na mfumo wake wa ikolojia. Pia nimeandika e-vitabu Bitcoin na Cryptography na The Bitcoin Wallet. Kazi zangu zote za kiufundi ni bure na chini ya leseni ya bure.
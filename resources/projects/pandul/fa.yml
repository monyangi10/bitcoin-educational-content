description: |
  من لوئیک مورل هستم، نویسنده و مشاور Bitcoin. من نویسنده بیش از صد مقاله فنی درباره Bitcoin به زبان فرانسوی هستم که برخی از آن‌ها به عنوان مرجع شناخته شده‌اند، مانند کار من بر روی BIP-47 که به چندین زبان ترجمه شده است. همچنین من نویسنده فرهنگ لغت Bitcoin هستم، یک اثر مرجع که تعاریف تمام اصطلاحات فنی مرتبط با Bitcoin و اکوسیستم آن را فهرست می‌کند. من همچنین کتاب‌های الکترونیکی Bitcoin و رمزنگاری و Bitcoin Wallet را نوشته‌ام. تمام آثار فنی من رایگان و تحت یک مجوز آزاد هستند.
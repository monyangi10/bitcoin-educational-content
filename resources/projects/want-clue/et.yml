description: |
  Olen kirglik arvutiteadlane, kes tahab midagi muuta. Keskendudes inimeste aitamisele, on minu eesmärk leida probleemidele erinevaid lahendusi ja jagada oma teadmisi võimalikult paljude inimestega.
  
  Kuna olen õppinud arvutiteadust, siis on mul tekkinud suur huvi võrkude, krüpto ja üldlevinud arvutitehnoloogiate vastu. Need teemad on minu blogi sissekannete selgroog, mille eesmärk on harida, teavitada ja pakkuda lugejatele praktilisi lahendusi.
  
  ametlik e-posti aadress: info@wantclue.de
  äripäringud: business@wantclue.de
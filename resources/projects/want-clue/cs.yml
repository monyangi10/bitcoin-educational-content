description: |
  Jsem vášnivý informatik, který chce něco změnit. Mým cílem je pomáhat lidem, hledat různá řešení problémů a sdílet své znalosti s co největším počtem lidí.
  
  Jako člověk, který vystudoval informatiku, jsem projevil velký zájem o sítě, šifrování a běžné výpočetní technologie. Tato témata budou tvořit páteř mých blogových příspěvků, jejichž cílem je vzdělávat, informovat a nabízet čtenářům praktická řešení.
  
  oficiální e-mail: info@wantclue.de
  obchodní dotazy: business@wantclue.de
description: |
  I’m a passionate computer scientist with a drive to make a difference. With a focus on helping people, my goal is to find different solutions to problems and share my knowledge with as many as possible.
  
  As someone who has studied computer science, I developed a keen interest in networking, crypto and common computing technologies. These topics will be the backbone of my blog entries, which aim to educate, inform, and offer practial solutions to readers.
  

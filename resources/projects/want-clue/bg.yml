description: |
  Аз съм страстен компютърен специалист, който иска да промени нещо към по-добро. С фокус върху това да помагам на хората, целта ми е да намирам различни решения на проблемите и да споделям знанията си с възможно най-много хора.

  Като човек, който е изучавал компютърни науки, съм развил силен интерес към мрежите, криптографията и общите компютърни технологии. Тези теми ще бъдат в основата на записите ми в блога, които имат за цел да образоват, информират и предлагат практически решения на читателите.

  официален имейл: info@wantclue.de бизнес запитвания: business@wantclue.de
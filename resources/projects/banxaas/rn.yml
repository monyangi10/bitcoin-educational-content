description: |
  Banxaas ni urubuga rutekanye rwo guhindura FCFA ubwo nyene ku Sats (BTC), n’ibihushanye n’ivyo. Ikoresha amahera y’umuravyo n’aya Mobile Money kugira ngo amafaranga akoreshwe vyihuta kandi yizewe. Banxaas ni umuti wateguwe na Yité Technologies, ishirahamwe ry’ubuhinga bwa none ryitwa Bitcoin rifise icumba muri Senegal.
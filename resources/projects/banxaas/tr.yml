description: |
  Banxaas, FCFA'yı anında Sats (BTC) ile değiştirmek veya tam tersini yapmak için güvenli bir platformdur. Hızlı ve güvenilir işlemler sağlamak için Lightning ve Mobil Para ödemelerini kullanır. Banxaas, Senegal merkezli bir Bitcoin start-up'ı olan Yité Technologies tarafından geliştirilen bir çözümdür.
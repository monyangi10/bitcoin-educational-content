description: |
  Isoko rya Bitcoin riri imbere muri Telegaramu. Interface yoroshe aho ibikorwa vyose biri naho Bot, aho Ikipe ishobora gushikirwa ku bikenewe imbere y’ugucuruza n’inyuma y’ugucuruza. Nta rubuga canke porogarama bikenewe, nk’amaporogarama yo kuri telefone ngendanwa canke amapaje y’urubuga yegeranya amakuru kandi agatuma ubuzima bwite bwawe buhungabana. Nta IP yegeranywa, nta cookies zishizweho, ivyo ni uburyo bwo gukoresha Telegram busukuye gusa bufise ubuzima bwite bwongerewe. Nkako, gushiramwo amahera mu gitabu ca Bitcoin ni co kimwe nyene no gushiramwo amahera kuri telefone ngendanwa. Nta nyandiko ziri mu nzira, nta ngorane.
  
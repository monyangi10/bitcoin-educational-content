description: |
  Een Bitcoin marktplaats in Telegram. Een eenvoudige Interface waar alle diensten via de Bot lopen, waar het Team bereikbaar is voor pre-sale en after-sale behoeften. Er is geen behoefte aan een website of een applicatie, zoals mobiele apps of webpagina's die informatie verzamelen en je privacy aantasten. Er worden geen IP-adressen verzameld, geen cookies ingesteld, dat is gewoon een pure Telegram-procedure met verbeterde privacy. In feite is het opwaarderen met een Bitcoin Voucher precies hetzelfde als het opwaarderen van een mobiele telefoon. Geen documenten binnen drempels, geen risico's.
  
description: |
  Telegram içinde bir Bitcoin Pazaryeri. Tüm hizmetlerin Bot aracılığıyla sunulduğu, satış öncesi ve sonrası ihtiyaçlar için Ekibe ulaşılabilen basit bir Interface. Bilgi toplayan ve gizliliğinizi bozan mobil uygulamalar veya web sayfaları gibi bir web sitesine veya uygulamaya gerek yoktur. Toplanan IP yok, ayarlanan çerez yok, bu sadece gelişmiş gizliliğe sahip saf bir Telegram prosedürü. Aslında, bir Bitcoin Voucher ile kontör yüklemek, bir cep telefonuna kontör yüklemekle tamamen aynıdır. Eşik değerler dahilinde belge yok, risk yok.
  
description: |
  Merkezi olmayan finans dünyasını herkes için erişilebilir hale getirin
  
  Merkezi olmayan ve sistemler bireyleri güçlendiren bir dünya yaratır; kişinin finansal hizmetlere ve ekonomik işlemlere katılma hakkı ne kredi itibarını kanıtlamaya ve hesap ücretlerini ödeme yeteneğine bağlıdır ne de sansüre tabidir.
  
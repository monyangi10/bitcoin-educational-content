description: |
  Направете децентрализирания финансов свят достъпен - за всички
  
  Децентрализираните и системи създават свят, който овластява индивидите; правото на човек да участва във финансови услуги и икономически транзакции не е обвързано с доказване на кредитоспособност и способност за плащане на такси по сметка, нито с цензура.
  
description: |
  Gutuma isi y’ivy’ubutunzi yegerejwe ishobora gushikirwa n’abantu bose 
  
  Ivyegerejwe n’imirongo ngenderwako birema isi iha ubushobozi abantu ku giti cabo; uburenganzira bw’umuntu bwo gukora ibikorwa vy’ubutunzi n’ubutunzi ntibushingiye ku kwemeza ko afise inguzanyo n’ubushobozi bwo kwishura amafaranga y’ikonti, canke ngo bugenzurwe.
  
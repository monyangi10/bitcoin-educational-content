description: |
  ทำให้โลกการเงินแบบกระจายศูนย์เข้าถึงได้ – สำหรับทุกคน
  
  ระบบแบบกระจายศูนย์สร้างโลกที่เสริมสร้างพลังให้กับบุคคล; สิทธิ์ของบุคคลในการเข้าร่วมบริการทางการเงินและการทำธุรกรรมทางเศรษฐกิจไม่ถูกจำกัดด้วยการพิสูจน์ความน่าเชื่อถือทางเครดิตและความสามารถในการจ่ายค่าธรรมเนียมบัญชี และไม่ถูกเซ็นเซอร์.
description: |
  De gedecentraliseerde financiële wereld toegankelijk maken - voor iedereen
  
  Gedecentraliseerde en systemen creëren een wereld die individuen mondig maakt; iemands recht om deel te nemen aan financiële diensten en economische transacties is niet afhankelijk van het aantonen van kredietwaardigheid en het vermogen om rekeningkosten te betalen, noch onderworpen aan censuur.
  
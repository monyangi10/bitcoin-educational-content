description: |
  Bir fikir, ne kadar basit olursa olsun, kurşun geçirmezdir. Yok edilemez, yenilmez. Bir fikir sonsuza dek aktarılabilir. Böylece Agora 256 bir fikirden doğdu; dijital egemenliğe, izin almak zorunda kalmadan refaha yükselişimizi belgelemek.
  Devletin her şeyi bilen bir varlık olarak gün ışığında kendini tanıttığı yadsınamaz bir distopyada yaşıyoruz. Özgürlüklerimiz, boğucu merkezi kontrol lehine aşındırılıyor. Bununla birlikte, özerklik, sorumluluk, meritokrasi ve özgürlük ilkelerine dayalı bir gerçeklik inşa etmek için gerekli araçlara sahibiz.
  
  Agora256 ismi iki kavramın birleşiminden doğmuştur
  
  Agora terimi agorist felsefeyi çağrıştırmaktadır.
  Kendimizi bu düşünce ekolüyle sınırlamadan, kendimizi anarko-kapitalist olarak görüyor ve serbest piyasaların erdemlerine yürekten inanıyoruz.
  256 sayısı, Bitcoin para ağı tarafından kullanılan SHA-256 hashing algoritmasını ifade eder.
  Değişim bireyden ve onun bilinçli seçimlerinden gelir, bu nedenle Agora 256 projesi, kendi kendini atayan elitlerin yukarıdan aşağıya yönetimini reddeden eylem insanları arasında güçlü, güvenilir güven ağlarının oluşturulmasını teşvik etmeye çalışmaktadır.
  Her birey kendi yolunu seçebilir ve seçmelidir. Agora 256 ile, kendinize saygılı bir egemenliğe giden yolu benimsemenize yardımcı olmak istiyoruz.
  
  Bu web sitesindeki içeriğin bu düşünceyle sunulması amaçlanmıştır. Burada önerdiğimiz araçlar ve kılavuzlar, kişisel olarak kullandığımız ve hedef kitlemizin de faydalanacağına inandığımız araçlardır.
  Eğer bir mahremiyete sahip olmak istiyorsak, mahremiyetimizi korumak bizim görevimizdir.
  

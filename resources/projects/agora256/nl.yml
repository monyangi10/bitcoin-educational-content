description: |
  Een idee, hoe simpel ook, is kogelvrij. Onverwoestbaar, onoverwinnelijk. Een idee kan eeuwig worden overgebracht. Zo werd Agora 256 geboren uit een idee; om onze opmars naar digitale soevereiniteit te documenteren, naar welvaart zonder toestemming te hoeven vragen. We leven in een onmiskenbare dystopie, waar de staat zichzelf op klaarlichte dag promoot als een alwetende entiteit. Onze vrijheden worden uitgehold ten gunste van verstikkende gecentraliseerde controle. Toch hebben we de middelen om een realiteit op te bouwen die gebaseerd is op de principes van autonomie, verantwoordelijkheid, meritocratie en vrijheid.

  De naam Agora256 is ontstaan uit de combinatie van twee concepten

  De term Agora roept de agoristische filosofie op. Zonder ons te beperken tot deze specifieke denkschool, beschouwen we onszelf als anarcho-kapitalisten en geloven we sterk in de deugden van vrije markten. Het getal 256 verwijst naar het SHA-256 hashing algoritme dat gebruikt wordt door het Bitcoin monetaire netwerk. Verandering komt van het individu en zijn of haar geïnformeerde keuzes, daarom streeft het Agora 256 project naar het aanmoedigen van de creatie van sterke, betrouwbare netwerken van vertrouwen tussen mensen van actie die het top-down bestuur van zelfbenoemde elites weigeren. Elk individu kan en moet zijn eigen pad kiezen. Met Agora 256 willen we je helpen een pad te kiezen naar zelfrespecterende soevereiniteit.

  Het is met dit in gedachten dat de inhoud van deze website bedoeld is om geleverd te worden. De gereedschappen en gidsen die we hier voorstellen zijn dezelfde die we persoonlijk gebruiken en waarvan we geloven dat ons publiek er ook baat bij zal hebben. Het is onze plicht om onze privacy te verdedigen als we die willen hebben.

  Opgericht op blok 774659 door - FranklynHart - Hari Seldon - WINTER ☩ HODLER

  Bliksem Address - agora256@getalby.com
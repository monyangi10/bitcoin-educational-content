description: |
  ایده‌ای، هرچند ساده، ضدگلوله است. غیرقابل تخریب، شکست‌ناپذیر. یک ایده می‌تواند به‌طور ابدی منتقل شود. بنابراین، آگورا ۲۵۶ از یک ایده متولد شد؛ برای مستندسازی صعود ما به حاکمیت دیجیتال، به رفاه بدون نیاز به کسب اجازه. ما در یک دیستوپیای غیرقابل انکار زندگی می‌کنیم، جایی که دولت خود را در روز روشن به‌عنوان یک موجودیت همه‌دان ترویج می‌کند. آزادی‌های ما به نفع کنترل متمرکز خفه‌کننده در حال فرسایش است. با این حال، ما ابزارهایی داریم که با آن‌ها می‌توانیم واقعیتی بر اساس اصول خودمختاری، مسئولیت‌پذیری، شایسته‌سالاری و آزادی بسازیم.

  نام آگورا ۲۵۶ از ترکیب دو مفهوم به‌وجود آمد

  اصطلاح آگورا فلسفه آگوریسم را تداعی می‌کند. بدون محدود کردن خود به این مکتب فکری خاص، ما خود را آنارکو-کاپیتالیست می‌دانیم و به فضایل بازارهای آزاد به شدت باور داریم. عدد ۲۵۶ به الگوریتم هشینگ SHA-256 که توسط شبکه پولی Bitcoin استفاده می‌شود، اشاره دارد. تغییر از فرد و انتخاب‌های آگاهانه او ناشی می‌شود، به همین دلیل پروژه آگورا ۲۵۶ تلاش می‌کند تا ایجاد شبکه‌های قوی و قابل اعتماد از اعتماد بین افراد عمل‌گرا که از حکومت از بالا به پایین نخبگان خودخوانده امتناع می‌ورزند، تشویق کند. هر فرد می‌تواند و باید مسیر خود را انتخاب کند. با آگورا ۲۵۶، ما می‌خواهیم به شما کمک کنیم مسیری به سوی حاکمیت خودمحترم را بپذیرید.

  با این ذهنیت است که محتوای این وب‌سایت قصد دارد ارائه شود. ابزارها و راهنماهایی که در اینجا پیشنهاد می‌کنیم همان‌هایی هستند که ما شخصاً استفاده می‌کنیم و معتقدیم که مخاطبان ما نیز از آن‌ها بهره‌مند خواهند شد. وظیفه ماست که از حریم خصوصی خود دفاع کنیم اگر می‌خواهیم یکی داشته باشیم.

  تأسیس شده در بلوک ۷۷۴۶۵۹ توسط - FranklynHart - Hari Seldon - WINTER ☩ HODLER


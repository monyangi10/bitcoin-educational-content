description: |
  Ideja, ma koliko jednostavna bila, je neprobojna. Neuništiva, nepobediva. Ideja se može prenositi večno. Tako je rođena Agora 256 iz jedne ideje; da dokumentujemo naš uspon ka digitalnom suverenitetu, ka prosperitetu bez potrebe za traženjem dozvole. Živimo u neospornoj distopiji, gde se država promoviše na svetlu dana kao sveznajući entitet. Naše slobode se erodiraju u korist gušenja centralizovane kontrole. Ipak, imamo alate sa kojima možemo izgraditi stvarnost zasnovanu na principima autonomije, odgovornosti, meritokratije i slobode.

  Ime Agora256 je nastalo iz kombinacije dva koncepta

  Termin Agora priziva agorističku filozofiju. Bez ograničavanja na ovu specifičnu školu mišljenja, smatramo se anarho-kapitalistima i čvrsto verujemo u vrline slobodnih tržišta. Broj 256 se odnosi na SHA-256 heš algoritam koji koristi Bitcoin monetarna mreža. Promena dolazi od pojedinca i njegovih ili njenih informisanih izbora, zbog čega projekat Agora 256 nastoji da podstakne stvaranje jakih, pouzdanih mreža poverenja među ljudima od akcije koji odbijaju upravljanje odozgo od strane samoproglašenih elita. Svaki pojedinac može i mora izabrati svoj put. Sa Agora 256, želimo da vam pomognemo da usvojite put ka suverenitetu koji poštuje sebe.

  Sa ovim na umu, sadržaj na ovom sajtu je namenjen da bude isporučen. Alati i vodiči koje ovde predlažemo su isti oni koje mi lično koristimo, i za koje verujemo da će i naša publika imati koristi. Naša je dužnost da branimo našu privatnost ako želimo da je imamo.

  Osnovano na bloku 774659 od strane - FranklynHart - Hari Seldon - WINTER ☩ HODLER


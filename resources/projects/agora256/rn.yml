description: |
  Iciyumviro, naho coba coroshe gute, ntikigira amasasu. Ntashobora gusenyuka, ntashobora gutsindwa. Iciyumviro gishobora gushikirizwa ibihe bidahera. Gutyo, Agora 256 yavutse ku ciyumviro; kugira ngo dushire mu nyandiko ukuduga kwacu mu busegaba bwa digitale, mu guterimbere ataco dusaba uruhusha.
  Tuba mu gihe c’ubupfumu butagira uko bungana, aho Leta yishira hejuru ku murango nk’ikintu kizi vyose. Umwidegemvyo wacu uriko urasenyuka kugira ngo haboneke ubutegetsi bushingiye ku rwego rwo guhagarika ubugenzuzi. Naho biri ukwo, turafise ibikoresho vyo kwubaka ukuri gushingiye ku ngingo ngenderwako z’ubwigenge, inshingano, ubutegetsi bw’abantu n’umwidegemvyo.
  
  Izina Agora256 ryavutse bivuye ku guhuza ivyiyumviro bibiri .
  
  Ijambo Agora rivyura filozofiya y’aba agoriste.
  Tutagarukiye kuri iryo shure ry’ivyiyumviro ry’umwihariko, twifata nk’abanyagihugu b’abanyagitugu kandi twemera cane ivyiza vy’amasoko y’uburenganzira.
  Umubare 256 werekeye ubuhinga bwo gukora amakuru SHA-256 bukoreshwa n’urubuga rw’amahera rwa Bitcoin.
  Ihinduka riva ku muntu ku giti ciwe no ku mahitamwo yiwe afise amakuru, ni co gituma umugambi wa Agora 256 wihatira guhimiriza ugushinga imigenderanire ikomeye kandi yizigirwa y’ukwizigirana hagati y’abantu b’ibikorwa banse ubutegetsi buva hejuru buja hasi bw’abanyacubahiro biyise.
  Umuntu wese arashobora kandi ategerezwa kwihitiramwo inzira yiwe. Na Agora 256, turashaka kubafasha gufata inzira ijana ku busegaba bwo kwiyubaha.
  
  Ni muri ivyo mu muzirikanyi ko ibirimwo kuri uru rubuga bigenewe gushikirizwa. Ibikoresho n’indongozi dutanga ngaha ni vyo nyene dukoresha twebwe ubwacu, kandi twizera ko abatwumviriza na bo nyene bazovyungukirako.
  Ni inshingano yacu kurwanira ubuzima bwite bwacu nimba dushaka kugira.
  

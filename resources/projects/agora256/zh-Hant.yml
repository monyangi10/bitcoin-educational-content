description: |
  一個想法，無論多麼簡單，都是刀槍不入的。堅不可摧，所向披靡。一個想法可以永遠傳達下去。因此，Agora 256 誕生於一個想法；記錄我們邁向數位主權、邁向繁榮的過程，而無需徵求許可。 我們生活在一個無可否認的烏托邦，國家在光天化日之下宣揚自己是一個全知全能的實體。我們的自由正在被侵蝕，轉而成為令人窒息的中央控制。儘管如此，我們仍有工具可以建立一個以自主、責任、任人唯才和自由原則為基礎的現實。

  Agora256 這個名字來自於兩個概念的結合

  Agora 一詞令人聯想到農業主義哲學。 在不局限於這個特定思想流派的前提下，我們認為自己是無政府資本主義者，並堅信自由市場的美德。 數字 256 指的是 Bitcoin 貨幣網路使用的 SHA-256 散列演算法。 改變來自於個人及其明智的選擇，這也是 Agora 256 計畫致力於鼓勵行動者之間建立強大、可靠的信任網路，拒絕自封精英的自上而下管治的原因。 每個人都可以也必須選擇自己的道路。透過 Agora 256，我們希望幫助您走上一條自尊自重的主權之路。

  本網站的內容正是以此為宗旨。我們在此提出的工具和指南與我們個人使用的相同，而且我們相信我們的觀眾也會從中獲益。 如果我們想要擁有隱私，捍衛我們的隱私是我們的責任。

  成立於區塊 774659 由 - FranklynHart - Hari Seldon - 冬季 ☩ hodler


description: |
  Wazo, haijalishi ni rahisi jinsi gani, ni kuzuia risasi. Isiyoweza kuharibika, isiyoweza kushindwa. Wazo linaweza kuwasilishwa milele. Hivyo, Agora 256 alizaliwa na wazo; kurekodi kupanda kwetu kwa mamlaka ya kidijitali, kwa ustawi bila kulazimika kuomba ruhusa. Tunaishi katika hali isiyopingika ya dystopia, ambapo serikali inajitangaza mchana kweupe kama chombo kinachojua yote. Uhuru wetu unaminywa kwa ajili ya kukandamiza udhibiti wa serikali kuu. Hata hivyo, tuna zana za kujenga ukweli kwa kuzingatia kanuni za uhuru, uwajibikaji, sifa na uhuru.

  Jina Agora256 lilizaliwa kutokana na mchanganyiko wa dhana mbili

  Neno Agora linaibua falsafa ya agorist. Bila kujiwekea kikomo kwenye kundi hili la fikra, tunajiona kama mabepari wasio na adabu na tunaamini kwa uthabiti fadhila za soko huria. Nambari 256 inarejelea algoriti ya hashing ya SHA-256 inayotumiwa na mtandao wa fedha wa Bitcoin. Mabadiliko yanatokana na mtu binafsi na chaguo lake la ufahamu, ndiyo maana mradi wa Agora 256 unajitahidi kuhimiza uundaji wa mitandao imara na ya kuaminika ya uaminifu kati ya watu wa vitendo wanaokataa utawala wa juu chini wa wasomi waliojiteua. Kila mtu anaweza na lazima achague njia yake mwenyewe. Kwa Agora 256, tunataka kukusaidia kupitisha njia kuelekea kujiheshimu kujitawala.

  Ni kwa kuzingatia hili kwamba yaliyomo kwenye tovuti hii yanalenga kuwasilishwa. Zana na miongozo tunayopendekeza hapa ni ile ile tunayotumia kibinafsi, na ambayo tunaamini kwamba hadhira yetu pia itafaidika nayo. Ni wajibu wetu kulinda faragha yetu ikiwa tunataka kuwa nayo.

  Ilianzishwa kwenye block 774659 na - FranklynHart - Hari Seldon - WINTER ☩ HODLER


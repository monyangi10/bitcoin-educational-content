description: |
  아무리 단순하더라도 아이디어는 방탄입니다. 파괴할 수 없고, 무적입니다. 아이디어는 영원히 전달될 수 있습니다. 따라서 아고라 256은 디지털 주권, 번영을 향한 우리의 상승을 허가 없이도 기록하기 위한 아이디어에서 탄생했습니다.
  우리는 대낮에 국가가 전지전능한 존재로 자신을 홍보하는 부인할 수 없는 디스토피아에 살고 있습니다. 우리의 자유는 중앙집권적 통제를 위해 침식되고 있습니다. 그럼에도 불구하고 우리에게는 자율과 책임, 능력주의와 자유의 원칙에 기반한 현실을 구축할 수 있는 도구가 있습니다.
  
  아고라256이라는 이름은 두 가지 개념의 결합에서 탄생했습니다
  
  아고라라는 용어는 아고리스트 철학을 떠올리게 합니다.
  이 특정 학파에 국한하지 않고 우리는 스스로를 무정부주의 자본주의자라고 생각하며 자유 시장의 미덕을 굳게 믿습니다.
  숫자 256은 Bitcoin 화폐 네트워크에서 사용하는 SHA-256 해싱 알고리즘을 의미합니다.
  변화는 개인과 개인의 정보에 입각한 선택에서 비롯되므로, 아고라 256 프로젝트는 자칭 엘리트들의 하향식 거버넌스를 거부하는 행동하는 사람들 사이에 강력하고 신뢰할 수 있는 신뢰 네트워크를 구축하도록 장려하고자 노력합니다.
  각 개인은 자신의 길을 선택할 수 있고 또 선택해야 합니다. 아고라 256을 통해 여러분이 스스로 존중하는 주권을 향한 길을 택할 수 있도록 돕고자 합니다.
  
  이 웹사이트의 콘텐츠는 이를 염두에 두고 제작되었습니다. 여기에서 제안하는 도구와 가이드는 우리가 개인적으로 사용하는 것과 동일한 것으로, 우리 청중도 이로부터 혜택을 받을 수 있을 것으로 믿습니다.
  개인 정보를 보호하는 것은 우리의 의무입니다.
  

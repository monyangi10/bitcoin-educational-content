description: |
  En idé, oavsett hur enkel den är, är skottsäker. Oförstörbar, oövervinnelig. En idé kan förmedlas för evigt. Agora 256 föddes alltså ur en idé: att dokumentera vår väg mot digital suveränitet, mot välstånd utan att behöva be om lov. Vi lever i en obestridlig dystopi, där staten marknadsför sig själv i fullt dagsljus som en allvetande enhet. Våra friheter urholkas till förmån för en kvävande centraliserad kontroll. Ändå har vi verktygen för att bygga en verklighet som bygger på principerna om autonomi, ansvar, meritokrati och frihet.

  Namnet Agora256 föddes ur en kombination av två begrepp

  Termen Agora för tankarna till den agoristiska filosofin. Utan att begränsa oss till denna speciella tankeskola betraktar vi oss själva som anarkokapitalister och tror starkt på de fria marknadernas dygder. Siffran 256 hänvisar till hashingalgoritmen SHA-256 som används av det monetära nätverket Bitcoin. Förändring kommer från individen och hans eller hennes informerade val, vilket är anledningen till att Agora 256-projektet strävar efter att uppmuntra skapandet av starka, pålitliga nätverk av förtroende mellan handlingskraftiga människor som vägrar toppstyrningen av självutnämnda eliter. Varje individ kan och måste välja sin egen väg. Med Agora 256 vill vi hjälpa dig att välja en väg mot suveränitet med självrespekt.

  Det är med detta i åtanke som innehållet på denna webbplats är avsett att levereras. De verktyg och guider vi föreslår här är desamma som vi använder personligen, och som vi tror att vår publik också kommer att ha nytta av. Det är vår plikt att försvara vår integritet om vi vill ha en sådan.

  Grundat på block 774659 av - FranklynHart - Hari Seldon - VINTER ☩ HODLER

  Blixt Address - agora256@getalby.com
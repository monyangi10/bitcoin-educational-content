description: |
  แนวคิด ไม่ว่าจะเรียบง่ายเพียงใด ก็เป็นสิ่งที่ไม่สามารถทำลายได้ ไม่สามารถทำลายได้ ไม่สามารถเอาชนะได้ แนวคิดสามารถถ่ายทอดได้ตลอดกาล ดังนั้น Agora 256 จึงเกิดขึ้นจากแนวคิด; เพื่อบันทึกการขึ้นสู่ความเป็นอธิปไตยทางดิจิทัลของเรา สู่ความมั่งคั่งโดยไม่ต้องขออนุญาต เราอาศัยอยู่ในดิสโทเปียที่ไม่อาจปฏิเสธได้ ที่ซึ่งรัฐส่งเสริมตัวเองในที่แจ้งว่าเป็นหน่วยงานที่รอบรู้ เสรีภาพของเรากำลังถูกกัดกร่อนเพื่อแลกกับการควบคุมแบบรวมศูนย์ที่อึดอัด อย่างไรก็ตาม เรามีเครื่องมือที่สามารถสร้างความเป็นจริงตามหลักการของความเป็นอิสระ ความรับผิดชอบ ระบบคุณธรรม และเสรีภาพ

  ชื่อ Agora256 เกิดจากการรวมกันของสองแนวคิด

  คำว่า Agora สื่อถึงปรัชญา agorist โดยไม่จำกัดตัวเองอยู่ในโรงเรียนความคิดนี้โดยเฉพาะ เราถือว่าตัวเองเป็นอนาธิปไตยทุนนิยมและเชื่อมั่นในคุณธรรมของตลาดเสรี หมายเลข 256 หมายถึงอัลกอริธึมการแฮช SHA-256 ที่ใช้โดยเครือข่ายการเงิน Bitcoin การเปลี่ยนแปลงมาจากบุคคลและการเลือกที่มีข้อมูลของเขาหรือเธอ ซึ่งเป็นเหตุผลที่โครงการ Agora 256 มุ่งมั่นที่จะส่งเสริมการสร้างเครือข่ายความไว้วางใจที่แข็งแกร่งและเชื่อถือได้ระหว่างผู้คนที่ปฏิเสธการปกครองจากบนลงล่างของชนชั้นสูงที่แต่งตั้งตัวเอง แต่ละคนสามารถและต้องเลือกเส้นทางของตนเอง ด้วย Agora 256 เราต้องการช่วยให้คุณเลือกเส้นทางสู่ความเป็นอธิปไตยที่เคารพตนเอง

  ด้วยเหตุนี้ เนื้อหาบนเว็บไซต์นี้จึงมีจุดประสงค์เพื่อส่งมอบ เครื่องมือและคำแนะนำที่เราเสนอที่นี่คือสิ่งที่เราใช้เป็นการส่วนตัว และเราเชื่อว่าผู้ชมของเราจะได้รับประโยชน์เช่นกัน เป็นหน้าที่ของเราที่จะปกป้องความเป็นส่วนตัวของเราหากเราต้องการมี

  ก่อตั้งบนบล็อก 774659 โดย - FranklynHart - Hari Seldon - WINTER ☩ HODLER


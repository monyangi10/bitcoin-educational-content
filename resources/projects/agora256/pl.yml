description: |
  Pomysł, nieważne jak prosty, jest kuloodporny. Niezniszczalna, niepokonana. Idea może być przekazywana wiecznie. Tak więc Agora 256 narodziła się z pomysłu, aby udokumentować nasze dążenie do cyfrowej suwerenności, do dobrobytu bez konieczności proszenia o pozwolenie. Żyjemy w niezaprzeczalnej dystopii, w której państwo promuje się w biały dzień jako wszechwiedzący byt. Nasze wolności ulegają erozji na rzecz dławiącej scentralizowanej kontroli. Niemniej jednak mamy narzędzia, dzięki którym możemy zbudować rzeczywistość opartą na zasadach autonomii, odpowiedzialności, merytokracji i wolności.

  Nazwa Agora256 powstała z połączenia dwóch pojęć

  Termin Agora przywołuje na myśl filozofię agorystyczną. Nie ograniczając się do tej konkretnej szkoły myślenia, uważamy się za anarchokapitalistów i mocno wierzymy w zalety wolnego rynku. Liczba 256 odnosi się do algorytmu haszującego SHA-256 używanego przez sieć monetarną Bitcoin. Zmiana pochodzi od jednostki i jej świadomych wyborów, dlatego projekt Agora 256 stara się zachęcać do tworzenia silnych, niezawodnych sieci zaufania między ludźmi działania, którzy odrzucają odgórne rządy samozwańczych elit. Każda osoba może i musi wybrać własną ścieżkę. Dzięki Agora 256 chcemy pomóc ci obrać drogę ku szanującej się suwerenności.

  Mając to na uwadze, treści na tej stronie mają być dostarczane. Narzędzia i przewodniki, które tu proponujemy, są tymi samymi, których używamy osobiście i z których, jak wierzymy, skorzystają również nasi odbiorcy. Naszym obowiązkiem jest bronić naszej prywatności, jeśli chcemy ją mieć.

  Założona na bloku 774659 przez - FranklynHart - Hari Seldon - ZIMA ☩ HODLER

  Błyskawica Address - agora256@getalby.com
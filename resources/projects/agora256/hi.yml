description: |
  एक विचार, चाहे कितना भी सरल क्यों न हो, बुलेटप्रूफ होता है। अविनाशी, अजेय। एक विचार को अनंत काल तक व्यक्त किया जा सकता है। इस प्रकार, अगोरा 256 एक विचार से पैदा हुआ था; डिजिटल संप्रभुता, समृद्धि के लिए हमारी चढ़ाई को अनुमति मांगे बिना दस्तावेज करने के लिए। हम एक निर्विवाद डायस्टोपिया में रहते हैं, जहाँ राज्य खुद को दिन के उजाले में एक सर्वज्ञ इकाई के रूप में बढ़ावा देता है। केंद्रीकृत नियंत्रण को दबाने के पक्ष में हमारी स्वतंत्रताएँ खत्म हो रही हैं। फिर भी, हमारे पास ऐसे उपकरण हैं जिनके साथ स्वायत्तता, जिम्मेदारी, योग्यता और स्वतंत्रता के सिद्धांतों के आधार पर एक वास्तविकता का निर्माण किया जा सकता है। अगोरा 256 नाम दो अवधारणाओं के संयोजन से पैदा हुआ था अगोरा शब्द एगोरिस्ट दर्शन को उद्घाटित करता है। इस विशेष विचारधारा तक खुद को सीमित किए बिना, हम खुद को अराजकता-पूंजीवादी मानते हैं और मुक्त बाजारों के गुणों में दृढ़ता से विश्वास करते हैं। संख्या 256 Bitcoin मौद्रिक नेटवर्क द्वारा उपयोग किए जाने वाले SHA-256 हैशिंग एल्गोरिदम को संदर्भित करती है। परिवर्तन व्यक्ति और उसके सूचित विकल्पों से आता है, यही कारण है कि Agora 256 परियोजना उन लोगों के बीच विश्वास के मजबूत, विश्वसनीय नेटवर्क के निर्माण को प्रोत्साहित करने का प्रयास करती है जो स्व-नियुक्त अभिजात वर्ग के शीर्ष-नीचे शासन को अस्वीकार करते हैं। प्रत्येक व्यक्ति अपना रास्ता चुन सकता है और उसे चुनना चाहिए। Agora 256 के साथ, हम आपको आत्म-सम्मान वाली संप्रभुता की ओर एक मार्ग अपनाने में मदद करना चाहते हैं। इसी बात को ध्यान में रखते हुए इस वेबसाइट पर सामग्री वितरित करने का इरादा है। हम यहाँ जो उपकरण और मार्गदर्शिकाएँ प्रस्तावित करते हैं, वे वही हैं जिनका हम व्यक्तिगत रूप से उपयोग करते हैं, और हमें विश्वास है कि हमारे दर्शक भी उनसे लाभान्वित होंगे। यदि हम अपनी गोपनीयता रखना चाहते हैं तो यह हमारा कर्तव्य है कि हम उसकी रक्षा करें।


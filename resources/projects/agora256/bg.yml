description: |
  Една идея, колкото и проста да е, е непробиваема. Неразрушима, непобедима. Една идея може да бъде предадена вечно. Така Agora 256 се роди от една идея; да документира нашето изкачване към цифров суверенитет, към просперитет, без да се налага да искаме разрешение.
  Живеем в безспорна антиутопия, в която държавата се рекламира посред бял ден като всезнаещ субект. Свободите ни са подкопани в полза на задушаващ централизиран контрол. Въпреки това разполагаме с инструментите, с които да изградим реалност, основана на принципите на автономност, отговорност, меритокрация и свобода.
  
  Името Agora256 се ражда от комбинацията на две понятия
  
  Терминът "Агора" напомня за философията на агоризма.
  Без да се ограничаваме до тази конкретна мисловна школа, ние се смятаме за анархокапиталисти и твърдо вярваме в достойнствата на свободните пазари.
  Числото 256 се отнася до алгоритъма за хеширане SHA-256, използван от паричната мрежа Bitcoin.
  Промяната идва от отделния човек и неговия информиран избор, поради което проектът Agora 256 се стреми да насърчава създаването на силни, надеждни мрежи на доверие между хората на действието, които отказват управлението отгоре надолу на самозвани елити.
  Всеки човек може и трябва да избере своя собствен път. С проекта Agora 256 искаме да ви помогнем да възприемете пътя към самоуважаващ се суверенитет.
  
  Именно с оглед на това съдържанието на този уебсайт е предназначено да бъде предоставено. Инструментите и ръководствата, които предлагаме тук, са същите, които използваме лично и от които вярваме, че нашата аудитория също ще има полза.
  Наш дълг е да защитаваме личния си живот, ако искаме да имаме такъв.
  

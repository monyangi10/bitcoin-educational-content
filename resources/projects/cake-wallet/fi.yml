description: |
  Avoimen lähdekoodin, ei-huoltajille suunnattu mobiili wallet, joka on erikoistunut yksityisyyteen. Se helpottaa bitcoinien hallintaa ja lähettämistä ja tarjoaa samalla kehittyneitä turvallisuus- ja yksityisyysominaisuuksia (Tor, henkilökohtaiset solmut, ei tietojen keräämistä, Silent Payments...).
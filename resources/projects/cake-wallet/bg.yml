description: |
  Мобилен wallet с отворен код, без право на задържане, специализиран в областта на поверителността. Тя улеснява управлението и изпращането на биткойни, като същевременно предлага усъвършенствани функции за сигурност и поверителност (Tor, лични възли, без събиране на данни, безшумни плащания...).
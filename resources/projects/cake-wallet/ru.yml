description: |
  Мобильная wallet с открытым исходным кодом, специализирующаяся на конфиденциальности. Он позволяет легко управлять биткоинами и отправлять их, предлагая при этом передовые функции безопасности и конфиденциальности (Tor, персональные узлы, отсутствие сбора данных, Silent Payments...).
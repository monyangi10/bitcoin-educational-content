description: |
  Open-Source, nicht-verwahrendes mobiles wallet, spezialisiert auf Privatsphäre. Es macht es einfach, Bitcoins zu verwalten und zu versenden und bietet gleichzeitig fortschrittliche Sicherheits- und Datenschutzfunktionen (Tor, persönliche Nodes, keine Datenerfassung, Silent Payments...).
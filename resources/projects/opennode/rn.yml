description: |
  OpenNode ni urubuga rwo kwishura Bitcoin rufise intumbero yo guha ubushobozi isi yose na Bitcoin, ryizera ko ari ryo kazoza k’ukwishura kw’isi yose.
  
  Iyo sosiyete itanga ubuhinga bwo kwishura butekanye, bushobora guhindurwa, kandi bwizigirwa butuma ubucuruzi bwemeza kwishura Bitcoin canke bwohereza amahera Bitcoin. Ubu ikora mu bihugu birenga 120, OpenNode yiyemeje kwubaka ibikorwa remezo vy’akazoza k’amahera no gufasha umuntu wese kugira uruhara mu bukungu bwa Bitcoin buriko burakura.
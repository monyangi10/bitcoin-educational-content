description: |
  오픈노드는 글로벌 디지털 결제의 미래가 될 것이라고 믿으며 Bitcoin을 통해 전 세계에 힘을 실어주는 것을 목표로 하는 Bitcoin 결제 플랫폼입니다.
  
  이 회사는 안전하고 확장 가능하며 신뢰할 수 있는 결제 기술을 제공하여 기업이 Bitcoin 결제를 수락하거나 Bitcoin 지급금을 보낼 수 있도록 지원합니다. 현재 120여 개국에서 운영 중인 OpenNode는 미래의 화폐를 위한 인프라를 구축하고 모두가 성장하는 Bitcoin 경제에 참여할 수 있도록 지원하기 위해 최선을 다하고 있습니다.
description: |
  OpenNode is een Bitcoin betalingsplatform dat de wereld wil voorzien van Bitcoin, omdat het de toekomst is van wereldwijde digitale betalingen.
  
  Het bedrijf biedt veilige, schaalbare en betrouwbare betalingstechnologie waarmee bedrijven Bitcoin betalingen kunnen accepteren of Bitcoin uitbetalingen kunnen versturen. OpenNode is momenteel actief in meer dan 120 landen en is toegewijd aan het bouwen van infrastructuur voor de toekomst van geld en het helpen van iedereen om deel te nemen aan de groeiende Bitcoin economie.
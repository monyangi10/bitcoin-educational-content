description: |
  Wir sind Tether. Wir nutzen Technologie, um Einzelpersonen, Gemeinschaften, Städte und Nationen zu befähigen, sich selbst zu versorgen, unabhängig und frei zu werden. Gemeinsam sind wir unaufhaltsam.
  
  Wir durchbrechen die Ketten des Finanzwesens und machen Daten zugänglich, um Wissen und Macht mit allen und überall zu teilen.
  
  Produkte, die an der Finanztechnologiefront entwickelt wurden, Stablecoins, Tokenisierungsdienste für digitale Vermögenswerte und unser vertrauenswürdiges, zuverlässiges Flaggschiffprodukt USD₮, der weltweit größte Stablecoin, der von Hunderten Millionen Nutzern auf allen Kontinenten verwendet wird.
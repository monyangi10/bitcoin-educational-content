description: |
  Turi Teteri. Turakoresha ubuhinga bwa none kugira ngo duhe ubushobozi abantu ku giti cabo, imiryango, ibisagara n’ibihugu kugira ngo bishobore kwitunga, kwigenga, no kwidegemvya. Mube abadashobora guhagarara, muri kumwe.
  
  Turaca iminyororo y’ivy’amahera no gufungura amakuru, kugira ngo dusangire ubumenyi n’ububasha n’abantu bose, aho hose.
  
  Ibintu vyakozwe ku rwego rw’imbere rw’ubuhinga bwa none, amafaranga adahinduka, ibikorwa vyo gutanga ibimenyetso vy’itunga ry’ubuhinga bwa none, n’igicuruzwa cacu c’ibendera cizigirwa, cizigirwa, USD₮, amafaranga adahinduka manini kuruta ayandi yose kw’isi, akoreshwa n’amamiliyoni amajana y’abakoresha ku migabane yose.
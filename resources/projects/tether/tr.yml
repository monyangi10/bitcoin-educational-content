description: |
  Biz Tether'ız. Teknolojiyi bireyleri, toplulukları, şehirleri ve ulusları kendi kendine sürdürülebilir, bağımsız ve özgür olmaları için güçlendirmek için kullanıyoruz. Birlikte durdurulamaz olun.
  
  Bilgi ve gücü herkesle, her yerde paylaşmak için finans zincirlerini kırıyor ve verilerin kilidini açıyoruz.
  
  Fin-teknoloji cephesinde hazırlanmış ürünler, stabilcoinler, dijital varlık tokenizasyon hizmetleri ve güvenilir, amiral gemisi ürünümüz USD₮, her kıtada yüz milyonlarca kullanıcı tarafından kullanılan dünyanın en büyük stabilcoin'i.
description: |
  Vi er Tether. Vi bruker teknologi for å gi enkeltpersoner, lokalsamfunn, byer og nasjoner mulighet til å bli selvbærende, uavhengige og frie. Sammen blir vi ustoppelige.
  
  Vi bryter finanskjedene og frigjør data for å dele kunnskap og makt med alle, overalt.
  
  Produkter som er utviklet i fintech-frontlinjen, stablecoins, tokeniseringstjenester for digitale eiendeler og vårt pålitelige flaggskipprodukt, USD₮, verdens største stablecoin, som brukes av hundrevis av millioner av brukere over alle kontinenter.
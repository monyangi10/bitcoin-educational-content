description: |
  Nós somos a Tether. Usamos a tecnologia para capacitar indivíduos, comunidades, cidades e nações a tornarem-se auto-sustentáveis, independentes e livres. Sejamos imparáveis, juntos.
  
  Quebramos as cadeias financeiras e desbloqueamos dados, para partilhar conhecimento e poder com todos, em todo o lado.
  
  Produtos criados na linha de frente da tecnologia financeira, stablecoins, serviços de tokenização de ativos digitais e nosso produto principal confiável e confiável, USD₮, a maior stablecoin do mundo, usada por centenas de milhões de usuários em todos os continentes.
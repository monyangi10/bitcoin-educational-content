description: |
  ما تتر هستیم. ما از فناوری برای توانمندسازی افراد، جوامع، شهرها و کشورها استفاده می‌کنیم تا به خودکفایی، استقلال و آزادی برسند. با هم، توقف‌ناپذیر باشید.
  
  ما زنجیرهای مالی را می‌شکنیم و داده‌ها را باز می‌کنیم تا دانش و قدرت را با همه، در همه جا به اشتراک بگذاریم.
  
  محصولاتی که در خط مقدم فناوری مالی ساخته شده‌اند، استیبل‌کوین‌ها، خدمات توکنیزاسیون دارایی‌های دیجیتال، و محصول پرچمدار قابل اعتماد و مطمئن ما، USD₮، بزرگترین استیبل‌کوین جهان که توسط صدها میلیون کاربر در هر قاره استفاده می‌شود.
description: |
  Vi är Tether. Vi använder teknik för att ge individer, samhällen, städer och nationer möjlighet att bli självförsörjande, oberoende och fria. Var ostoppbara, tillsammans.
  
  Vi bryter de finansiella kedjorna och låser upp data för att dela kunskap och makt med alla, överallt.
  
  Produkter som skapats på den finteknologiska frontlinjen, stablecoins, tokeniseringstjänster för digitala tillgångar och vår pålitliga flaggskeppsprodukt USD₮, världens största stablecoin, som används av hundratals miljoner användare på alla kontinenter.
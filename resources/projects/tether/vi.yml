description: |
  Chúng tôi là Tether. Chúng tôi sử dụng công nghệ để trao quyền cho các cá nhân, cộng đồng, thành phố và quốc gia trở nên tự chủ, độc lập và tự do. Cùng nhau, chúng ta sẽ không thể ngăn cản.
  
  Chúng tôi phá vỡ các chuỗi tài chính và giải phóng dữ liệu, để chia sẻ kiến thức và sức mạnh với mọi người, ở mọi nơi.
  
  Các sản phẩm được chế tạo trên tuyến đầu công nghệ tài chính, stablecoin, dịch vụ token hóa tài sản kỹ thuật số, và sản phẩm chủ lực đáng tin cậy của chúng tôi, USD₮, stablecoin lớn nhất thế giới, được hàng trăm triệu người dùng trên khắp các châu lục sử dụng.
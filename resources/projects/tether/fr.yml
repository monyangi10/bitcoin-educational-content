description: |
  Nous sommes Tether. Nous utilisons la technologie pour permettre aux individus, aux communautés, aux villes et aux nations de devenir autonomes, indépendants et libres. Ensemble, soyons inarrêtables.
  
  Nous brisons les chaînes de la finance et débloquons les données, pour partager la connaissance et le pouvoir avec tout le monde, partout.
  
  Des produits conçus sur le front de la fin-tech, des stablecoins, des services de tokenisation d'actifs numériques, et notre produit phare fiable, USD₮, le plus grand stablecoin du monde, utilisé par des centaines de millions d'utilisateurs sur tous les continents.
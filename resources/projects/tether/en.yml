description: |
  We're Tether. We use technology to empower individuals, communities, cities and nations to become self-sustainable, independent, and free. Be unstoppable, together.

  We break the chains of finance and unlock data, to share knowledge and power with everyone, everywhere.

  Products crafted on the fin-tech frontline, stablecoins, digital assets tokenisation services, and our trusted, reliable flagship product, USD₮, the world's largest stablecoin, used by hundreds of millions of users across every continent.

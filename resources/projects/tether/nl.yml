description: |
  Wij zijn Tether. We gebruiken technologie om individuen, gemeenschappen, steden en naties in staat te stellen zelfvoorzienend, onafhankelijk en vrij te worden. Samen zijn we niet te stoppen.
  
  We doorbreken de financiële ketens en ontsluiten gegevens om kennis en kracht te delen met iedereen, overal.
  
  Producten gemaakt in de fintech frontlinie, stablecoins, tokenisatiediensten voor digitale activa en ons vertrouwde, betrouwbare vlaggenschipproduct, USD₮, 's werelds grootste stablecoin, gebruikt door honderden miljoenen gebruikers op elk continent.
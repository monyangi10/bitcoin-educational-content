description: |
  Kami adalah Tether. Kami menggunakan teknologi untuk memberdayakan individu, komunitas, kota, dan negara untuk menjadi mandiri, independen, dan bebas. Menjadi tak terhentikan, bersama-sama.
  
  Kami memutus rantai keuangan dan membuka data, untuk berbagi pengetahuan dan kekuatan dengan semua orang, di mana saja.
  
  Produk yang dibuat di garis depan teknologi keuangan, stablecoin, layanan tokenisasi aset digital, dan produk andalan kami yang terpercaya dan dapat diandalkan, USD₮, stablecoin terbesar di dunia, yang digunakan oleh ratusan juta pengguna di setiap benua.
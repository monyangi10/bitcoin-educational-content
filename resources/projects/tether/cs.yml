description: |
  Jsme Tether. Využíváme technologie k tomu, abychom jednotlivcům, komunitám, městům a národům umožnili stát se soběstačnými, nezávislými a svobodnými. Buďte společně nezastavitelní.
  
  Rozbíjíme řetězy financí a odemykáme data, abychom mohli sdílet znalosti a moc s každým a všude.
  
  Produkty vytvořené na frontě fin-tech, stablecoiny, služby tokenizace digitálních aktiv a náš důvěryhodný a spolehlivý vlajkový produkt USD₮, největší stablecoin na světě, který používají stovky milionů uživatelů na všech kontinentech.
description: |
  ThunderHub เป็นแพลตฟอร์มโอเพ่นซอร์สที่ช่วยให้คุณจัดการและตรวจสอบโหนด Lightning ของคุณจากอุปกรณ์ใดก็ได้
  
  คุณสมบัติหลักบางประการรวมถึงการส่งและรับการชำระเงินทั้ง Lightning และ On-Chain, ตัวเลือกการปรับสมดุล, การใช้ ln-pay และ ln-withdraw จากหน้าแรก, และการจัดการช่องทางเพื่อสภาพคล่องที่เหมาะสม ThunderHub ถูกรวมเข้ากับ BTCPay, RaspiBlitz, MyNode, Voltage, Umbrel, และ EmbassyOS ของ Start9 และรองรับเวอร์ชันโหนด LND ล่าสุด แพลตฟอร์มยังให้รายงานการทำธุรกรรมและรายละเอียดของการชำระเงินที่ส่งต่อ และมีโหมดกลางคืน/กลางวันเพื่อความสะดวกของผู้ใช้
description: |
  ThunderHub е платформа с отворен код, която ви позволява да управлявате и наблюдавате вашия възел Lightning от всяко устройство.
  
  Някои от основните функции включват изпращане и получаване на плащания от Lightning и On-Chain, опции за ребалансиране, използване на ln-pay и ln-withdraw от началната страница и управление на каналите за оптимална ликвидност. ThunderHub е интегрирана с EmbassyOS на BTCPay, RaspiBlitz, MyNode, Voltage, Umbrel и Start9 и поддържа най-новите версии на възел LND. Платформата също така предоставя отчети за транзакциите и подробности за препратените плащания и предлага нощен/дневен режим за удобство на потребителите.
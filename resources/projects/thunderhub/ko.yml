description: |
  ThunderHub는 모든 기기에서 Lightning 노드를 관리하고 모니터링할 수 있는 오픈 소스 플랫폼입니다.
  
  주요 기능으로는 라이트닝과 On-Chain 결제 송금 및 수신, 리밸런싱 옵션, 홈페이지에서 LN 페이 및 LN 인출 사용, 최적의 유동성을 위한 채널 관리 등이 있습니다. 썬더허브는 BTC페이, 라피블리츠, 마이노드, 볼티지, 엄브렐, 스타트나인의 엠바시OS와 통합되어 있으며, 최신 LND 노드 버전을 지원합니다. 또한 이 플랫폼은 거래 보고서와 송금 내역을 제공하며, 사용자 편의를 위해 야간/주간 모드를 모두 제공합니다.
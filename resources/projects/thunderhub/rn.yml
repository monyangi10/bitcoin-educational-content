description: |
  ThunderHub ni urubuga rwuguruye rugufasha gucunga no kugenzura urudodo rwawe rwa Lightning ukoresheje igikoresho ico ari co cose.
  
  Bimwe mu bintu nyamukuru birimwo kohereza no kwakira amahera yompi Lightning na On-Chain, uburyo bwo gusubiramwo, gukoresha LN-pay na LN-withdraw kuri paji y’intango, no gucunga imihora kugira ngo amahera ashobore gukoreshwa neza. ThunderHub ihuriweko na BTCPay, RaspiBlitz, MyNode, Ingufu, Umutaka, na EmbassyOS ya Start9, kandi ishigikira verisiyo za node za LND za nyuma. Iryo koraniro kandi ritanga raporo z’ibikorwa n’amakuru y’amahera yoherejwe, kandi ritanga uburyo bwompi bw’Ijoro/Umurango kugira ngo abakoresha bashobore kubikoresha.
description: |
  2012 yılında kurulan Bitfinex, çeşitli müşteriler için yüksek standartlı ticaret deneyimleri sağlayan ilk kripto para borsalarından biridir. Güvenlik ve verimliliğe odaklanan Bitfinex, 60'tan fazla sürekli vadeli işlem sözleşmesinin yanı sıra yaklaşık 200 token ve 400 spot işlem çifti listelemektedir. Bitcoin'ın ethosundan esinlenen Bitfinex'in misyonu, ücretsiz ve özel işlemleri ve etkileşimleri kolaylaştıran teknoloji geliştirmektir.
  
  Bitfinex, Bitcoin ve finansal katılımın anlaşılmasını teşvik etmek için eğitim girişimlerine yatırım yapmaktadır. CEO JL van der Velde ve CFO Giancarlo Devasini'nin de aralarında bulunduğu liderlik ekibi, teknoloji, finans ve uyumluluk alanlarında onlarca yıllık deneyime sahiptir. Bitfinex, ticaret platformlarıyla tam entegrasyon için API'ler sağlar ve çevrimiçi platformları aracılığıyla müşteri desteği sunar.
  
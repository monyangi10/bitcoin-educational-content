description: |
  Bitfinex is opgericht in 2012 en is een van de eerste cryptocurrency exchanges die hoogwaardige handelservaringen biedt aan verschillende klanten. Met een focus op veiligheid en efficiëntie biedt Bitfinex bijna 200 tokens en 400 spot handelsparen, samen met meer dan 60 eeuwigdurende termijncontracten. Geïnspireerd door het ethos van Bitcoin is het de missie van Bitfinex om technologie te ontwikkelen die vrije en private transacties en interacties mogelijk maakt.
  
  Bitfinex investeert in educatieve initiatieven om het begrip van Bitcoin en financiële inclusie te bevorderen. Het managementteam, waaronder CEO JL van der Velde en CFO Giancarlo Devasini, heeft tientallen jaren ervaring in technologie, financiën en compliance. Bitfinex biedt API's voor volledige integratie met handelsplatformen en biedt klantenondersteuning via hun online platform.
  
description: |
  ก่อตั้งขึ้นในปี 2012 Bitfinex เป็นหนึ่งในตลาดแลกเปลี่ยนสกุลเงินดิจิทัลแรก ๆ ที่ให้ประสบการณ์การซื้อขายมาตรฐานสูงสำหรับลูกค้าหลากหลาย ด้วยการมุ่งเน้นที่ความปลอดภัยและประสิทธิภาพ Bitfinex มีรายการโทเค็นเกือบ 200 รายการและคู่การซื้อขายสปอต 400 คู่ พร้อมด้วยสัญญาฟิวเจอร์สถาวรกว่า 60 รายการ ได้รับแรงบันดาลใจจากจริยธรรมของ Bitcoin ภารกิจของ Bitfinex คือการพัฒนาเทคโนโลยีที่อำนวยความสะดวกในการทำธุรกรรมและการโต้ตอบที่เสรีและเป็นส่วนตัว
  
  Bitfinex ลงทุนในโครงการการศึกษาเพื่อส่งเสริมความเข้าใจใน Bitcoin และการรวมทางการเงิน ทีมผู้นำรวมถึง CEO JL van der Velde และ CFO Giancarlo Devasini นำประสบการณ์หลายทศวรรษในด้านเทคโนโลยี การเงิน และการปฏิบัติตามกฎระเบียบ Bitfinex ให้บริการ API สำหรับการรวมเข้ากับแพลตฟอร์มการซื้อขายอย่างเต็มรูปแบบและให้การสนับสนุนลูกค้าผ่านแพลตฟอร์มออนไลน์ของพวกเขา
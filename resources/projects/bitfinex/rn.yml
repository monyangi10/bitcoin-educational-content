description: |
  Yashinzwe mu mwaka w’2012, Bitfinex ni imwe mu nzira za mbere zo guhindura amafaranga y’amahera, itanga ubumenyi bwo gucuruza buhambaye ku bakiriya batandukanye. Bitfinex yibanze ku mutekano n’ubushobozi, itanga urutonde rw’ibimenyetso hafi 200 n’ibimenyetso 400 vy’ubudandaji, hamwe n’amasezerano arenga 60 y’ubudandaji bw’igihe kizoza. Bitfinex ishingiye ku nyifato runtu ya Bitcoin, igikorwa cayo ni ugutegura ubuhinga bworohereza abantu gukorana n’abandi ku buntu no ku giti cabo.
  
  Bitfinex ishiramwo amahera mu migambi y’inyigisho kugira ngo iteze imbere ugutahura Bitcoin n’ugushiramwo ivy’amahera. Ishirahamwe ry’uburongozi, harimwo umuyobozi mukuru JL van der Velde n’umuyobozi mukuru Giancarlo Devasini, rizana ubumenyi bw’imyaka mirongo mu vy’ubuhinga, ivy’amahera, no kwubahiriza amategeko. Bitfinex itanga APIs zo gukorana neza n’ibibanza vy’ubudandaji kandi itanga ubufasha ku bakiriya biciye ku kibanza cabo co kuri internet.
  
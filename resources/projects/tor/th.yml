description: |
  โครงการไม่แสวงหาผลกำไรที่มุ่งเน้นเรื่องความเป็นส่วนตัวและเสรีภาพออนไลน์ พัฒนาเครือข่าย Tor ซึ่งช่วยให้การท่องเว็บเป็นไปอย่างไม่ระบุตัวตนโดยการปกป้องข้อมูลของผู้ใช้ผ่านระบบรีเลย์ที่เข้ารหัส ใช้ทั่วโลกเพื่อหลีกเลี่ยงการเซ็นเซอร์และปกป้องความเป็นส่วนตัว Tor เป็นเครื่องมือสำคัญสำหรับนักปกป้องสิทธิมนุษยชน นักข่าว และผู้ใช้อินเทอร์เน็ตที่กังวลเกี่ยวกับความปลอดภัยทางดิจิทัลของตน
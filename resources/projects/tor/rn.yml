description: |
  Umugambi udaharanira inyungu wihariye ubuzima bwite n'umwidegemvyo wo kuri internet. Itera imbere urubuga rwa Tor, rushobora gutuma umuntu ashobora gusoma amakuru atazi amazina yiwe mu kurinda amakuru y’abakoresha biciye ku buryo bw’amakuru apfutse. Ikoreshwa kw’isi yose kugira ngo umuntu akureho ugucengera no kurinda ubuzima bwite, Tor ni igikoresho gihambaye ku barwanira uburenganzira bwa muntu, abanyamakuru, n’abakoresha internet bahagaritse umutima ku bijanye n’umutekano wabo wo kuri interineti.
  
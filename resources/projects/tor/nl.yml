description: |
  Non-profitproject gewijd aan online privacy en vrijheid. Het ontwikkelt het Tor-netwerk, dat anoniem browsen mogelijk maakt door gebruikersgegevens te beschermen via een systeem van versleutelde relais. Tor wordt wereldwijd gebruikt om censuur te omzeilen en privacy te waarborgen en is een essentieel hulpmiddel voor mensenrechtenverdedigers, journalisten en internetgebruikers die bezorgd zijn over hun digitale veiligheid.
  
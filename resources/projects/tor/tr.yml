description: |
  Çevrimiçi gizlilik ve özgürlüğe adanmış kâr amacı gütmeyen proje. Kullanıcı verilerini şifreli rölelerden oluşan bir sistem aracılığıyla koruyarak anonim gezinmeyi sağlayan Tor ağını geliştirmektedir. Sansürü aşmak ve gizliliği korumak için dünya çapında kullanılan Tor, insan hakları savunucuları, gazeteciler ve dijital güvenlikleri konusunda endişe duyan internet kullanıcıları için vazgeçilmez bir araçtır.
  
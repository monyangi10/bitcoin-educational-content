description: |
  Проект с нестопанска цел, посветен на неприкосновеността на личния живот и свободата онлайн. Разработва мрежата Tor, която дава възможност за анонимно сърфиране, като защитава данните на потребителите чрез система от криптирани ретранслатори. Използвана в цял свят за заобикаляне на цензурата и защита на личните данни, Tor е основен инструмент за правозащитници, журналисти и интернет потребители, загрижени за своята цифрова сигурност.
  
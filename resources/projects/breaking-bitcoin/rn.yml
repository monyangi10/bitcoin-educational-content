description: |
  Guca Bitcoin ni ikintu gikorwa n’abahinga bibanda ku mutekano wa Bitcoin n’ibindi vyose biyikikuje. Ivyerekanwa bifise intumbero yo kuba ivy’ubuhinga, vyibanda ku vyo guhungabana, ibitero vy’ivyiyumviro canke vy’ibikorwa vyerekeye abakoresha n’umurongo wa Bitcoin. Ico gikorwa kigenewe abantu bafise ubumenyi ku bijanye n’ubuhinga bwa Bitcoin canke umutekano muri rusangi.
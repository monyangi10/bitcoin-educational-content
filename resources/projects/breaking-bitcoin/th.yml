description: |
  Breaking Bitcoin เป็นงานสำหรับชุมชนเทคนิคที่มุ่งเน้นด้านความปลอดภัยของ Bitcoin และทุกสิ่งที่เกี่ยวข้อง การนำเสนอมีเป้าหมายที่จะเป็นเชิงเทคนิค โดยมุ่งเน้นไปที่ช่องโหว่ การโจมตีทางทฤษฎีหรือปฏิบัติที่มุ่งเป้าไปที่ผู้ใช้และโปรโตคอล Bitcoin งานนี้มุ่งเน้นไปที่ผู้ที่มีความรู้ด้านเทคนิคของ Bitcoin หรือความปลอดภัยโดยทั่วไป
description: |
  Breaking Bitcoin is een evenement voor de technische gemeenschap, gericht op de beveiliging van Bitcoin en alles daaromheen. De presentaties zijn technisch, gericht op kwetsbaarheden, theoretische of praktische aanvallen gericht op de gebruikers en het Bitcoin protocol. Dit evenement is gericht op mensen met kennis van de technische aspecten van Bitcoin of beveiliging in het algemeen.
description: |
  Breaking Bitcoin, Bitcoin'ın ve etrafındaki her şeyin güvenliğine odaklanan teknik topluluk için bir etkinliktir. Sunumlar, kullanıcıları ve Bitcoin protokolünü hedef alan güvenlik açıklarına, teorik veya pratik saldırılara odaklanarak teknik olmayı amaçlamaktadır. Bu etkinlik, Bitcoin'ın teknik yönleri veya genel olarak güvenlik hakkında bilgi sahibi olan kişilere yöneliktir.
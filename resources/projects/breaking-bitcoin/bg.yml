description: |
  Breaking Bitcoin е събитие за техническата общност, което се фокусира върху сигурността на Bitcoin и всичко около него. Презентациите имат техническа насоченост и се фокусират върху уязвимости, теоретични или практически атаки, насочени към потребителите и протокола Bitcoin. Събитието е насочено към хора, които имат познания за техническите аспекти на Bitcoin или за сигурността като цяло.
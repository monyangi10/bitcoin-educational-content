description: |
  Lnmarket е платформа за търговия с деривати, изградена на базата на Lightning Network.
  
  Тя позволява на физическите лица да търгуват с висок ливъридж и много малко количество sats, осигурявайки забавен начин за потенциална загуба на парите си. Екипът зад Lnmarket се фокусира върху разработването на решения за Layer 2 и е висококвалифициран в областта на Lightning Network.
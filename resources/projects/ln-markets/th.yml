description: |
  Lnmarket เป็นแพลตฟอร์มการซื้อขายอนุพันธ์ที่สร้างขึ้นบน Lightning Network
  
  มันช่วยให้บุคคลสามารถซื้อขายด้วยเลเวอเรจสูงและจำนวนเงิน sats ที่น้อยมาก ทำให้เป็นวิธีที่สนุกในการสูญเสียเงินของพวกเขา ทีมงานที่อยู่เบื้องหลัง Lnmarket มุ่งเน้นการพัฒนาโซลูชัน Layer 2 และมีทักษะสูงในด้าน Lightning Network
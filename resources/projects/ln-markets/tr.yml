description: |
  Lnmarket, Lightning Network üzerine inşa edilmiş bir türev ticaret platformudur.
  
  Bireylerin yüksek kaldıraç ve çok az miktarda Sats ile işlem yapmalarına olanak tanıyarak potansiyel olarak paralarını kaybetmeleri için eğlenceli bir yol sağlar. Lnmarket'in arkasındaki ekip Layer 2 çözümleri geliştirmeye odaklanır ve Lightning Network alanında oldukça yeteneklidir.
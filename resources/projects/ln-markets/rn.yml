description: |
  Lnmarket ni urubuga rw'ubudandaji rwubatswe kuri Lightning Network. 
  
  Bituma abantu bashobora gucuruza n’amahera menshi n’amahera make cane ya Sats, bikaba bitanga uburyo bwo gutakaza amahera yabo. Ishirahamwe riri inyuma ya Lnmarket ryibanda ku gutegura inyishu za Layer 2 kandi rifise ubuhinga bwinshi mu bijanye na Lightning Network.
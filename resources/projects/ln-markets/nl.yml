description: |
  Lnmarket is een handelsplatform voor derivaten, gebouwd op Lightning Network.
  
  Het stelt particulieren in staat om te handelen met een hoge hefboom en een zeer kleine hoeveelheid Sats, waardoor het een leuke manier is om mogelijk geld te verliezen. Het team achter Lnmarket richt zich op het ontwikkelen van Layer 2-oplossingen en is zeer bedreven op het gebied van Lightning Network.
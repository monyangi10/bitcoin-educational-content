description: |
  Bitwarden is een open-source wachtwoordmanager waarmee je je wachtwoorden op meerdere apparaten kunt opslaan, beheren en synchroniseren. Bitwarden is toegankelijk via apps, een browserextensie of een web Interface en versleutelt je gegevens. Bitwarden is transparant en privacy-vriendelijk en is ontworpen voor gebruikers die op zoek zijn naar veilig en betrouwbaar wachtwoordbeheer, terwijl het flexibel en praktisch blijft voor dagelijks gebruik.
  
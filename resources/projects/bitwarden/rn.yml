description: |
  Bitwarden ni umucungerezi w’ijambobanga ry’inkomoko yuguruye rigufasha kubika, gucunga no guhuza amakuru yawe ku bikoresho vyinshi. Bitwarden ishobora gushikira biciye ku maporogarama, ku nzira y’umucukumbuzi, canke ku rubuga Interface, Bitwarden ipfuka amakuru yawe. Bitwarden iraboneka kandi irakunda ubuzima bwite, yagenewe abakoresha barondera uburyo bwo gucunga ijambobanga ry’umutekano kandi ryizewe mu gihe iguma ihinduka kandi ikoreshwa ku musi ku musi.
  
description: |
  KeePass, kimlik bilgilerinizi güvenli bir şekilde saklamak ve düzenlemek için tasarlanmış açık kaynaklı bir parola yöneticisidir. Yerel olarak çalışır ve hassas verilerinizi korumak için güçlü şifreleme kullanır. KeePass, özellikler eklemek ve çeşitli ihtiyaçlara uyum sağlamak için eklentileri destekler.
  
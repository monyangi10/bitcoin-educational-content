description: |
   Клуб Ubuntu Bitcoin е образователен проект, насочен към конгоански ученици. Той обединява университетски групи, ангажирани с изучаването на Bitcoin, и им предоставя човешките и логистичните ресурси, необходими за създаването на истинска академична общност от биткойнери в Демократична република Конго.
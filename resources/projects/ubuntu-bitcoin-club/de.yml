description: |
   Der Ubuntu Bitcoin Club ist ein Bildungsprojekt, das sich an kongolesische Studenten richtet. Es vereinigt Universitätsgruppen, die sich dem Erlernen von Bitcoin verschrieben haben, und stellt ihnen die personellen und logistischen Ressourcen zur Verfügung, die für die Schaffung einer echten akademischen Gemeinschaft von Bitcoinern in der Demokratischen Republik Kongo erforderlich sind.
description: |
   Ubuntu Bitcoin Club on kongolaisille opiskelijoille suunnattu koulutushanke. Se yhdistää Bitcoin:n oppimiseen sitoutuneita yliopistoryhmiä ja tarjoaa niille inhimilliset ja logistiset resurssit, joita tarvitaan aidon Bitcoin-asiakkaiden akateemisen yhteisön luomiseksi Kongon demokraattiseen tasavaltaan.
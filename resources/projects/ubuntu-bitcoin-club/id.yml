description: |
   Ubuntu Bitcoin Club adalah sebuah proyek pendidikan yang ditujukan untuk para pelajar di Kongo. Klub ini menyatukan kelompok-kelompok universitas yang berkomitmen untuk mempelajari Bitcoin dan menyediakan sumber daya manusia dan logistik yang dibutuhkan untuk menciptakan komunitas akademis Bitcoiners yang sesungguhnya di Republik Demokratik Kongo.
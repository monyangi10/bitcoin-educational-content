description: |
   Ubuntu Bitcoin Kulübü Kongolu öğrencilere yönelik bir eğitim projesidir. Bitcoin'ı öğrenmeye kendini adamış üniversite gruplarını bir araya getirmekte ve onlara Demokratik Kongo Cumhuriyeti'nde Bitcoin'cilerden oluşan gerçek bir akademik topluluk oluşturmak için gereken insani ve lojistik kaynakları sağlamaktadır.
description: |
   Ubuntu Bitcoin Club - это образовательный проект, ориентированный на конголезских студентов. Он объединяет университетские группы, приверженные изучению Bitcoin, и предоставляет им человеческие и материально-технические ресурсы, необходимые для создания настоящего академического сообщества биткойнеров в Демократической Республике Конго.
description: |
  Kiveclair alizaliwa Mei 2021, ili kukabiliana na mlipuko wa volcano ya Nyiragongo, kwa lengo la awali la kutoa msaada wa moja kwa moja kwa waathirika wa maafa. Kulingana na Goma, mpango huo ulibadilika haraka na kuwa shirika linalojitolea kuelimisha wakazi wa eneo hilo kuhusu Bitcoin. Kiveclair hupanga mikutano ya kila mwezi na mafunzo ya kina kwa hadhira mbalimbali, wakiwemo wanaharakati, wazalishaji wa nishati na waandishi wa habari. Zaidi ya hayo, chama huandaa mkutano wa kila mwaka, unaoleta pamoja mfumo ikolojia wa Kongo wa Bitcoin ili kukuza mabadilishano na maendeleo ya matumizi ya vitendo.
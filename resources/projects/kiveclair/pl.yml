description: |
  Organizacja Kiveclair powstała w maju 2021 r. w odpowiedzi na erupcję wulkanu Nyiragongo, a jej początkowym celem było zapewnienie bezpośredniej pomocy ofiarom katastrofy. Inicjatywa z siedzibą w Gomie szybko przekształciła się w organizację zajmującą się edukowaniem lokalnej ludności na temat Bitcoin. Kiveclair organizuje comiesięczne spotkania i dogłębne szkolenia dla różnych odbiorców, w tym aktywistów, producentów energii i dziennikarzy. Dodatkowo, stowarzyszenie organizuje coroczną konferencję, skupiającą kongijski ekosystem Bitcoin w celu promowania wymiany i rozwoju praktycznych zastosowań.
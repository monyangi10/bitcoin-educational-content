description: |
  Kiveclair, Mayıs 2021'de Nyiragongo yanardağının patlamasına tepki olarak, felaket mağdurlarına doğrudan yardım sağlamak amacıyla doğdu. Merkezi Goma'da bulunan girişim, kısa sürede yerel halkı Bitcoin konusunda eğitmeye adanmış bir organizasyona dönüştü. Kiveclair, aktivistler, enerji üreticileri ve gazeteciler de dahil olmak üzere çeşitli kitleler için aylık toplantılar ve derinlemesine eğitimler düzenliyor. Ayrıca dernek, Kongo Bitcoin ekosistemini bir araya getirerek değişimleri ve pratik uygulamaların geliştirilmesini teşvik etmek amacıyla yıllık bir konferansa ev sahipliği yapmaktadır.
description: |
  کیوکلیئر در ماه مه ۲۰۲۱، در پاسخ به فوران آتشفشان نیراگونگو، با هدف اولیه ارائه کمک مستقیم به قربانیان فاجعه تأسیس شد. این ابتکار که در گوما مستقر است، به سرعت به سازمانی تبدیل شد که به آموزش جمعیت محلی درباره Bitcoin اختصاص دارد. کیوکلیئر جلسات ماهانه و آموزش‌های عمیق برای مخاطبان مختلف، از جمله فعالان، تولیدکنندگان انرژی و روزنامه‌نگاران برگزار می‌کند. علاوه بر این، این انجمن یک کنفرانس سالانه میزبانی می‌کند که اکوسیستم Bitcoin کنگو را گرد هم می‌آورد تا تبادلات و توسعه کاربردهای عملی را ترویج دهد.
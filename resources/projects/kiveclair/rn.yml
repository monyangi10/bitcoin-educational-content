description: |
  Kiveclair yavutse muri Rusama 2021, mu kwishura ku guturika kw'ikirunga ca Nyiragongo, afise intumbero ya mbere yo gufasha abashikiwe n'ivyago.
  Iryo shirahamwe ryari rishingiye i Goma, ryaciye rihinduka ningoga ishirahamwe ryihaye kwigisha abanyagihugu ivyerekeye Bitcoin. Kiveclair itegura amakoraniro buri kwezi n’amahugurwa yimbitse ku bantu batandukanye, harimwo abaharanira uburenganzira bw’abantu, abahingura inguvu, n’abanyamakuru. Ikindi kandi, iryo shirahamwe rigira inama buri mwaka, ihuriza hamwe ibidukikije vya Kongo Bitcoin kugira ngo biteze imbere uguhanahana no gutegura uburyo bwo kubikoresha.
  
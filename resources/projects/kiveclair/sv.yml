description: |
  Kiveclair bildades i maj 2021, som ett svar på vulkanutbrottet i Nyiragongo, med det ursprungliga målet att ge direkt hjälp till katastrofens offer. Initiativet, som har sin bas i Goma, omvandlades snabbt till en organisation som ägnar sig åt att utbilda lokalbefolkningen om Bitcoin. Kiveclair anordnar månatliga möten och fördjupad utbildning för olika målgrupper, inklusive aktivister, energiproducenter och journalister. Dessutom är föreningen värd för en årlig konferens som sammanför det kongolesiska Bitcoin-ekosystemet för att främja utbyten och utvecklingen av praktiska tillämpningar.
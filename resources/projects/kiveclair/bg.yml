description: |
  Kiveclair се ражда през май 2021 г. в отговор на изригването на вулкана Нийрагонго с първоначалната цел да предостави пряка помощ на жертвите на бедствието.
  Базирана в Гома, инициативата бързо се трансформира в организация, посветена на обучението на местното население за Bitcoin. Kiveclair организира ежемесечни срещи и задълбочени обучения за различни аудитории, включително активисти, производители на енергия и журналисти. Освен това асоциацията е домакин на годишна конференция, на която се събира конгоанската екосистема на Bitcoin, за да се насърчи обменът и разработването на практически приложения.
  
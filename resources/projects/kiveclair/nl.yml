description: |
  Kiveclair werd geboren in mei 2021, als reactie op de uitbarsting van de vulkaan Nyiragongo, met als aanvankelijk doel directe hulp te bieden aan de slachtoffers van de ramp. Het initiatief, dat gevestigd is in Goma, veranderde al snel in een organisatie die zich toelegt op het onderwijzen van de lokale bevolking over Bitcoin. Kiveclair organiseert maandelijkse bijeenkomsten en diepgaande trainingen voor verschillende doelgroepen, waaronder activisten, energieproducenten en journalisten. Daarnaast organiseert de vereniging een jaarlijkse conferentie die het Congolese Bitcoin ecosysteem samenbrengt om uitwisselingen en de ontwikkeling van praktische toepassingen te bevorderen.
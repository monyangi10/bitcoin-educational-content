description: |
  Kiveclair ก่อตั้งขึ้นในเดือนพฤษภาคม 2021 เพื่อตอบสนองต่อการปะทุของภูเขาไฟ Nyiragongo โดยมีเป้าหมายเริ่มต้นในการให้ความช่วยเหลือโดยตรงแก่ผู้ประสบภัยพิบัติ ตั้งอยู่ในเมืองโกมา ความคิดริเริ่มนี้ได้เปลี่ยนแปลงอย่างรวดเร็วเป็นองค์กรที่มุ่งเน้นการให้ความรู้แก่ประชากรท้องถิ่นเกี่ยวกับ Bitcoin Kiveclair จัดการประชุมรายเดือนและการฝึกอบรมเชิงลึกสำหรับผู้ชมหลากหลายกลุ่ม รวมถึงนักเคลื่อนไหว ผู้ผลิตพลังงาน และนักข่าว นอกจากนี้ สมาคมยังจัดการประชุมประจำปีที่รวบรวมระบบนิเวศ Bitcoin ของคองโกเลสเพื่อส่งเสริมการแลกเปลี่ยนและการพัฒนาการประยุกต์ใช้ในทางปฏิบัติ
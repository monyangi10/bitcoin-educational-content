description: |
  Pick n Pay (PnP), ikigo gikomeye co muri Afirika y’Epfo, catanguye kwemera Bitcoin mu 2024. Biciye kuri Lightning Network, ukwishura kuranyaruka kandi kuzana n’amahera make kuruta amakarita y’inguzanyo. Bagerageje Bitcoin ubwa mbere mu 2017, ariko ubuhinga bw’ico gihe bwari butarakura cane. Na Lightning, ubu barabonye abaguzi benshi, bakorana na MoneyBadger kugira ngo bashire hamwe.
  
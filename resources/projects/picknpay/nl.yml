description: |
  Pick n Pay (PnP), een grote Zuid-Afrikaanse retailer, begon Bitcoin te accepteren in 2024. Met de Lightning Network zijn betalingen sneller en goedkoper dan met een creditcard. Ze testten Bitcoin voor het eerst in 2017, maar de technologie was toen nog minder volwassen. Met Lightning zien ze nu een sterke acceptatie door klanten, en voor de integratie werken ze samen met MoneyBadger.
  
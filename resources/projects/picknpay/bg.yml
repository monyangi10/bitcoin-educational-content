description: |
  Pick n Pay (PnP), голям южноафрикански търговец на дребно, започва да приема биткойни през 2024 г. Чрез Lightning Network плащанията са по-бързи и са с по-ниски такси от кредитните карти. За първи път те тестват биткойн през 2017 г., но тогава технологията не е толкова развита. С помощта на Lightning сега те виждат силно възприемане от страна на клиентите, като работят с MoneyBadger за интеграция.
  
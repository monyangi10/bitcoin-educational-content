description: |
  Pick n Pay (PnP) ซึ่งเป็นผู้ค้าปลีกรายใหญ่ของแอฟริกาใต้ เริ่มรับบิทคอยน์ในปี 2024 ผ่านทาง Lightning Network การชำระเงินจะเร็วขึ้นและมีค่าธรรมเนียมต่ำกว่าบัตรเครดิต พวกเขาได้ทดสอบบิทคอยน์ครั้งแรกในปี 2017 แต่เทคโนโลยีในตอนนั้นยังไม่เติบโตเต็มที่ ด้วย Lightning พวกเขาได้เห็นการตอบรับที่ดีจากลูกค้า โดยทำงานร่วมกับ MoneyBadger ในการผสานรวม
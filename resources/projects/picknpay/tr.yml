description: |
  Büyük bir Güney Afrika perakendecisi olan Pick n Pay (PnP), 2024 yılında Bitcoin'i kabul etmeye başladı. Lightning Network sayesinde ödemeler daha hızlı ve kredi kartlarından daha düşük ücretlerle gerçekleşiyor. Bitcoin'i ilk olarak 2017'de test ettiler, ancak o zamanlar teknoloji daha az olgunlaşmıştı. Lightning ile, entegrasyon için MoneyBadger ile çalışarak güçlü bir müşteri alımı gördüler.
  
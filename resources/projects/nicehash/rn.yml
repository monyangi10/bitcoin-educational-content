description: |
  Yashinzwe mu 2014, NiceHash ni isoko ry’imbere kw’isi rya Hashrate, kandi ni rimwe mu mazina yemewe cane mu bijanye n’amahera y’amahera. Nk’urubuga rwibanda kuri Bitcoin, NiceHash itanga urutonde rw’ibidukikije rwuzuye rwa Mining, Hashrate n’imiti yo kwishura, n’intumbero yo kwihutisha kwemerwa kwa Bitcoin kw’isi yose.
  
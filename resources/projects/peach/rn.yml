description: |
  Peach ni porogaramu yo kuri telefone ngendanwa ikora nk’urubuga rwo kugura no kugurisha Bitcoin. 
  
  Bituma abakoresha bashobora gukoresha aho bari hose, igihe cose, bakoresheje uburyo bwo kwishura bakunda. Iryo koraniro riha ububasha abakoresha kwishingira ibiciro vyabo vy’ibikorwa, bikaba vyerekana kamere nyakuri y’isoko ry’ibikorwa vy’ubudandaji. Igihambaye, Peach iremeza amafaranga ata KYC (Menya Umukiriya Wawe), igumya imice y’ishimikiro y’ubuzima bwite bwa Bitcoin. Inyifato y’iryo shirahamwe ikomoka ku kwemera ko Bitcoin ari uburyo bukomeye kuruta ubundi bwose bw’amahera bwabayeho, bufise intumbero yo gutuma umuntu wese ashobora kuyaronka ataco yihinduye.
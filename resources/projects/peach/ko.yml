description: |
  Peach는 Bitcoin을 사고 팔 수 있는 P2P 플랫폼 역할을 하는 모바일 애플리케이션입니다.
  
  사용자는 언제 어디서나 선호하는 결제 수단을 사용하여 거래할 수 있습니다. 이 애플리케이션은 P2P 시장의 진정한 특성을 반영하여 사용자가 직접 거래 가격을 설정할 수 있도록 지원합니다. 중요한 점은 Peach는 KYC(고객알기제도)가 필요 없는 거래를 허용하여 Bitcoin의 기본적인 개인정보 보호 측면을 유지한다는 점입니다. 회사의 정신은 Bitcoin이 지금까지 존재했던 가장 어려운 형태의 화폐라는 믿음에서 비롯되었으며, 모든 사람이 타협 없이 이용할 수 있도록 한다는 사명을 가지고 있습니다.
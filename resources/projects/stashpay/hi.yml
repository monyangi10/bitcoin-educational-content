description: |
  स्टैशपे एक न्यूनतम लाइटनिंग Wallet है जो ब्रीज़ Liquid SDK पर आधारित है और निर्बाध लेनदेन को सक्षम बनाता है। इसे सरलता और उपयोग में आसानी के लिए डिज़ाइन किया गया है, जिससे यह शुरुआती और अनुभवी दोनों उपयोगकर्ताओं के लिए समान रूप से सुलभ है। स्टैशपे के साथ, उपयोगकर्ता बिना किसी जटिल कॉन्फ़िगरेशन या तकनीकी ज्ञान के, बस कुछ ही टैप से Lightning Network पर Bitcoin भेज और प्राप्त कर सकते हैं।
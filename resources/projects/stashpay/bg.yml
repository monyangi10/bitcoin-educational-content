description: |
  StashPay е минималистична светкавица wallet, базирана на Breez Liquid SDK, която позволява безпроблемни транзакции. Той е проектиран с цел простота и лекота на използване, което го прави достъпен както за начинаещи, така и за опитни потребители. С StashPay потребителите могат да изпращат и получават Bitcoin през Lightning Network само с няколко докосвания, без да са необходими сложни конфигурации или технически познания.
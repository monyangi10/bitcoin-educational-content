description: |
  StashPay je minimalistički Lightning Wallet zasnovan na Breez Liquid SDK-u kako bi omogućio besprekorne transakcije. Dizajniran je za jednostavnost i lakoću korišćenja, čineći ga dostupnim i početnicima i iskusnim korisnicima. Sa StashPay-om, korisnici mogu slati i primati Bitcoin preko Lightning Network uz samo nekoliko dodira, bez potrebe za složenim konfiguracijama ili tehničkim znanjem.
description: |
  StashPay je minimalistický Lightning Wallet založený na SDK Breez Liquid, který umožňuje bezproblémové transakce. Je navržen s ohledem na jednoduchost a snadnost použití, takže je přístupný jak začátečníkům, tak zkušeným uživatelům. Pomocí StashPay mohou uživatelé odesílat a přijímat Bitcoin přes Lightning Network pouhými několika klepnutími, aniž by potřebovali složité konfigurace nebo technické znalosti.
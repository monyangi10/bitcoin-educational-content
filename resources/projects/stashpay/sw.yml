description: |
  StashPay ni Radi ya Wallet isiyo na kifani kulingana na Breez Liquid SDK ili kuwezesha miamala bila mshono. Imeundwa kwa urahisi na urahisi wa matumizi, na kuifanya ipatikane kwa wanaoanza na watumiaji wenye uzoefu sawa. Kwa kutumia StashPay, watumiaji wanaweza kutuma na kupokea Bitcoin kupitia Lightning Network kwa kugonga mara chache tu, bila kuhitaji usanidi changamano au maarifa ya kiufundi. 
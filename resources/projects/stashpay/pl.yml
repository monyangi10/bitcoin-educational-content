description: |
  StashPay to minimalistyczny Lightning Wallet oparty na Breez Liquid SDK, aby umożliwić płynne transakcje. Został zaprojektowany z myślą o prostocie i łatwości użytkowania, dzięki czemu jest dostępny zarówno dla początkujących, jak i doświadczonych użytkowników. Dzięki StashPay użytkownicy mogą wysyłać i odbierać Bitcoin przez Lightning Network za pomocą zaledwie kilku dotknięć, bez potrzeby skomplikowanych konfiguracji lub wiedzy technicznej.
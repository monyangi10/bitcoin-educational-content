description: |
  StashPay est un Lightning Wallet minimaliste basé sur le SDK Breez Liquid pour permettre des transactions transparentes. Il est conçu pour être simple et facile à utiliser, ce qui le rend accessible aux débutants comme aux utilisateurs expérimentés. Avec StashPay, les utilisateurs peuvent envoyer et recevoir des Bitcoin sur le Lightning Network en quelques clics, sans avoir besoin de configurations complexes ou de connaissances techniques.
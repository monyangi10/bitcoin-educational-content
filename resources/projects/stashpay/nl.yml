description: |
  StashPay is een minimalistische Lightning Wallet gebaseerd op de Breez Liquid SDK om naadloze transacties mogelijk te maken. Het is ontworpen voor eenvoud en gebruiksgemak, waardoor het toegankelijk is voor zowel beginners als ervaren gebruikers. Met StashPay kunnen gebruikers Bitcoin verzenden en ontvangen over de Lightning Network met slechts een paar tikken, zonder complexe configuraties of technische kennis.
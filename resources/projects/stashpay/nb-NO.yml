description: |
  StashPay er en minimalistisk Lightning Wallet basert på Breez Liquid SDK for å muliggjøre sømløse transaksjoner. Den er designet for enkelhet og brukervennlighet, noe som gjør den tilgjengelig for både nybegynnere og erfarne brukere. Med StashPay kan brukerne sende og motta Bitcoin over Lightning Network med bare noen få trykk, uten behov for komplekse konfigurasjoner eller teknisk kunnskap.
description: |
  StashPay är en minimalistisk Lightning Wallet baserad på Breez Liquid SDK för att möjliggöra sömlösa transaktioner. Den är utformad för enkelhet och användarvänlighet, vilket gör den tillgänglig för både nybörjare och erfarna användare. Med StashPay kan användare skicka och ta emot Bitcoin över Lightning Network med bara några få tryck, utan behov av komplexa konfigurationer eller teknisk kunskap.
description: |
  StashPay เป็น Lightning wallet แบบมินิมอลที่พัฒนาขึ้นบน Breez Liquid SDK เพื่อให้การทำธุรกรรมเป็นไปอย่างราบรื่น ออกแบบมาเพื่อความเรียบง่ายและใช้งานง่าย ทำให้สามารถเข้าถึงได้ทั้งผู้เริ่มต้นและผู้ใช้ที่มีประสบการณ์ ด้วย StashPay ผู้ใช้สามารถส่งและรับ Bitcoin ผ่าน Lightning Network ได้เพียงไม่กี่ครั้ง โดยไม่จำเป็นต้องมีการตั้งค่าที่ซับซ้อนหรือความรู้ทางเทคนิค
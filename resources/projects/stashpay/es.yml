description: |
  StashPay es un Lightning Wallet minimalista basado en el SDK Breez Liquid para permitir transacciones sin problemas. Está diseñado para la simplicidad y facilidad de uso, por lo que es accesible tanto para principiantes como para usuarios experimentados. Con StashPay, los usuarios pueden enviar y recibir Bitcoin a través de Lightning Network con unos pocos toques, sin necesidad de configuraciones complejas ni conocimientos técnicos.
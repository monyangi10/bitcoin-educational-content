description: |
  StashPay on minimalistlik Lightning Wallet, mis põhineb Breez Liquid SDK-l, et võimaldada tõrgeteta tehinguid. See on loodud lihtsuse ja kasutusmugavuse huvides, muutes selle kättesaadavaks nii algajatele kui ka kogenud kasutajatele. StashPayga saavad kasutajad saata ja vastu võtta Bitcoin üle Lightning Network vaid mõne puudutusega, ilma et oleks vaja keerulisi seadistusi või tehnilisi teadmisi.
description: |
  O StashPay é um Lightning Wallet minimalista baseado no SDK Breez Liquid para permitir transacções sem falhas. Foi concebido para ser simples e fácil de utilizar, tornando-o acessível tanto a principiantes como a utilizadores experientes. Com o StashPay, os utilizadores podem enviar e receber Bitcoin através do Lightning Network com apenas alguns toques, sem a necessidade de configurações complexas ou conhecimentos técnicos.
description: |
  StashPay, sorunsuz işlemleri mümkün kılmak için Breez Liquid SDK'yı temel alan minimalist bir Lightning Wallet'tür. Basitlik ve kullanım kolaylığı için tasarlanmıştır, bu da onu hem yeni başlayanlar hem de deneyimli kullanıcılar için erişilebilir kılar. StashPay ile kullanıcılar, karmaşık yapılandırmalara veya teknik bilgiye ihtiyaç duymadan sadece birkaç dokunuşla Lightning Network üzerinden Bitcoin gönderebilir ve alabilir.
description: |
  استش‌پی یک Wallet لایتنینگ مینیمالیستی است که بر اساس Breez Liquid SDK ساخته شده تا تراکنش‌های بدون درز را امکان‌پذیر کند. این برنامه برای سادگی و سهولت استفاده طراحی شده است و آن را برای مبتدیان و کاربران با تجربه به طور یکسان قابل دسترسی می‌کند. با استش‌پی، کاربران می‌توانند با چند ضربه ساده، Bitcoin را از طریق Lightning Network ارسال و دریافت کنند، بدون نیاز به تنظیمات پیچیده یا دانش فنی.
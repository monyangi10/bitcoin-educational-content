description: |
  StashPay là một Lightning Wallet tối giản dựa trên SDK Breez Liquid, cho phép giao dịch liền mạch. Nó được thiết kế đơn giản và dễ sử dụng, phù hợp cho cả người mới bắt đầu và người dùng có kinh nghiệm. Với StashPay, người dùng có thể gửi và nhận Bitcoin qua Lightning Network chỉ với vài thao tác, mà không cần cấu hình phức tạp hay kiến thức kỹ thuật.
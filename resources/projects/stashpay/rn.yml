description: |
  StashPay ni umuravyo Wallet ushingiye kuri Breez Liquid SDK kugira ngo ushobore gukoresha amafaranga ata nkomanzi. Igizwe n’ibintu vyoroshe kandi vyoroshe gukoresha, bikaba bituma abatangura n’abazi gukoresha bashobora kuyikoresha. Hakoreshejwe StashPay, abakoresha barashobora kohereza no kwakira Bitcoin kuri Lightning Network bakoresheje gusa amapompi makeyi, ataco bakeneye kugira ngo bakoreshe ibintu bikomeye canke ubumenyi bw’ubuhinga. 
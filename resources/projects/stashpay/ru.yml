description: |
  StashPay - это минималистичный Lightning Wallet, основанный на Breez Liquid SDK для обеспечения бесшовных транзакций. Он разработан для простоты и легкости использования, что делает его доступным как для новичков, так и для опытных пользователей. С помощью StashPay пользователи могут отправлять и получать Bitcoin через Lightning Network всего несколькими касаниями, без необходимости сложных конфигураций или технических знаний.
description: |
  StashPay adalah Lightning Wallet minimalis yang didasarkan pada Breez Liquid SDK untuk memungkinkan transaksi tanpa hambatan. StashPay dirancang untuk kesederhanaan dan kemudahan penggunaan, sehingga dapat diakses oleh pengguna pemula dan pengguna berpengalaman. Dengan StashPay, pengguna dapat mengirim dan menerima Bitcoin melalui Lightning Network hanya dengan beberapa ketukan, tanpa perlu konfigurasi yang rumit atau pengetahuan teknis.
description: |
  StashPay è un Lightning Wallet minimalista basato sull'SDK Breez Liquid per consentire transazioni senza interruzioni. È stato progettato per la semplicità e la facilità d'uso, rendendolo accessibile sia ai principianti che agli utenti esperti. Con StashPay, gli utenti possono inviare e ricevere Bitcoin su Lightning Network con pochi tocchi, senza bisogno di configurazioni complesse o conoscenze tecniche.
description: |
  StashPay ist ein minimalistisches Lightning Wallet, das auf dem Breez Liquid SDK basiert und nahtlose Transaktionen ermöglicht. Es ist auf Einfachheit und Benutzerfreundlichkeit ausgelegt, sodass es sowohl für Anfänger als auch für erfahrene Benutzer zugänglich ist. Mit StashPay können Benutzer Bitcoin über Lightning Network mit nur ein paar Fingertipps senden und empfangen, ohne dass komplexe Konfigurationen oder technisches Wissen erforderlich sind.
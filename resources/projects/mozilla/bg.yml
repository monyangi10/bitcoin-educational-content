description: |
  Фондация Mozilla е международна организация с нестопанска цел, която насърчава по-здравословен, по-отворен и приобщаващ интернет. Като защитава неприкосновеността на личния живот и прозрачността, тя подкрепя проекти и участници, работещи за етични, ориентирани към човека технологии. Mozilla предлага основни инструменти като Firefox, Thunderbird, Common Voice и Mozilla VPN.
description: |
  มูลนิธิ Mozilla เป็นองค์กรไม่แสวงหาผลกำไรระดับนานาชาติที่ส่งเสริมอินเทอร์เน็ตที่มีสุขภาพดี เปิดกว้าง และครอบคลุมมากขึ้น โดยการปกป้องความเป็นส่วนตัวและความโปร่งใส มันสนับสนุนโครงการและผู้เล่นที่ทำงานเพื่อเทคโนโลยีที่มีจริยธรรมและมุ่งเน้นมนุษย์ Mozilla นำเสนอเครื่องมือหลักเช่น Firefox, Thunderbird, Common Voice และ Mozilla VPN.
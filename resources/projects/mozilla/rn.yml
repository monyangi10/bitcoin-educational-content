description: |
  Mozilla Foundation ni ishirahamwe mpuzamakungu ridaharanira inyungu ritera imbere Internet ifise amagara meza, yuguruye kandi ihurikiyemwo abantu bose. Mu kugwanira ubuzima bwite n’uguseruka, rishigikira imigambi n’abakinyi bakorera ubuhinga bushingiye ku nyifato runtu, bushingiye ku muntu. Mozilla itanga ibikoresho bikomeye nka Firefox, Thunderbird, Ijwi rusangi na Mozilla VPN.
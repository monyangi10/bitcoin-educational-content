description: |
  Mozilla Vakfı, daha sağlıklı, daha açık ve kapsayıcı bir interneti teşvik eden, kâr amacı gütmeyen uluslararası bir kuruluştur. Gizliliği ve şeffaflığı savunarak, etik, insan merkezli teknoloji için çalışan projeleri ve oyuncuları destekler. Mozilla, Firefox, Thunderbird, Common Voice ve Mozilla VPN gibi önemli araçlar sunmaktadır.
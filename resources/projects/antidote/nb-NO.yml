description: |
  Vi er en akselerator som fokuserer på å skape vekst i Storbritannias sterkeste sektorer ved hjelp av banebrytende innovasjon. Vi kombinerer entreprenørskap, risikokapital, politikkutforming og en "kan-gjøre-holdning" for å endre ting til det bedre.
  
  Antidote akselererer gründere fra null til seed i løpet av seks måneder, og tilbyr kontorlokaler, juridisk støtte, utviklingsressurser, mentorskap og talentmatching. Vær der Storbritannias mest visjonære gründere, tenkere og investorer bygger fremtiden.
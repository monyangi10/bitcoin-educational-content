description: |
  Olemme kiihdyttämö, joka keskittyy kasvun käynnistämiseen Yhdistyneen kuningaskunnan vahvimmilla aloilla käyttämällä huippuluokan innovaatioita. Yhdistämme yrittäjyyttä, riskipääomaa, poliittista päätöksentekoa ja tekemisen meininkiä muuttaaksemme asioita parempaan suuntaan.
  
  Antidote kiihdyttää perustajia nollasta seed:aan 6 kuukauden aikana tarjoamalla toimistotilaa, oikeudellista tukea, kehitysresursseja, mentorointia ja kykyjen yhdistämistä. Tule sinne, missä Yhdistyneen kuningaskunnan visionäärisimmät perustajat, ajattelijat ja sijoittajat rakentavat tulevaisuutta.
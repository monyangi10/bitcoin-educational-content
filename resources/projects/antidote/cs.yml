description: |
  Jsme akcelerátor zaměřený na podněcování růstu v nejsilnějších odvětvích Spojeného království pomocí špičkových inovací. Kombinujeme podnikání, rizikový kapitál, tvorbu politiky a přístup "can-do", abychom změnili věci k lepšímu.
  
  Antidote akceleruje zakladatele z nuly na seed během 6 měsíců, poskytuje kancelářské prostory, právní podporu, vývojové zdroje, mentoring a vyhledávání talentů. Buďte tam, kde nejprozíravější britští zakladatelé, myslitelé a investoři budují budoucnost.
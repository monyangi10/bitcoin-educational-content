description: |
  We are an accelerator focused on igniting growth in the UK's strongest sectors using bleeding edge innovation. We combine entrepreneurship, venture capital, policymaking and a can-do attitude to change things for the better.
  
  Antidote accelerates founders from zero to seed over 6 months, providing office space, legal support, dev resource, mentorship and talent matching. Be where the UK’s most visionary founders, thinkers and investors are building the future.

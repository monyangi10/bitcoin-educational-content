description: |
  Somos una aceleradora centrada en impulsar el crecimiento de los sectores más pujantes del Reino Unido mediante la innovación de vanguardia. Combinamos el espíritu emprendedor, el capital riesgo, la formulación de políticas y una actitud positiva para mejorar las cosas.
  
  Antidote acelera a los fundadores desde cero hasta seed en 6 meses, proporcionándoles espacio de oficina, apoyo jurídico, recursos de desarrollo, tutoría y búsqueda de talentos. Esté donde los fundadores, pensadores e inversores más visionarios del Reino Unido están construyendo el futuro.
description: |
  Nous sommes un accélérateur dont l'objectif est de stimuler la croissance dans les secteurs les plus dynamiques du Royaume-Uni grâce à une innovation de pointe. Nous combinons l'esprit d'entreprise, le capital-risque, l'élaboration de politiques et une attitude positive pour améliorer les choses.
  
  Antidote fait passer les fondateurs de zéro à seed en six mois, en leur fournissant des bureaux, un soutien juridique, des ressources de développement, un mentorat et une mise en relation avec des talents. Soyez là où les fondateurs, les penseurs et les investisseurs les plus visionnaires du Royaume-Uni construisent l'avenir.
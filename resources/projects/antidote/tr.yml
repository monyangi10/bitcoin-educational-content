description: |
  Birleşik Krallık'ın en güçlü sektörlerinde çığır açan yenilikleri kullanarak büyümeyi ateşlemeye odaklanmış bir hızlandırıcıyız. Bir şeyleri daha iyi hale getirmek için girişimciliği, risk sermayesini, politika oluşturmayı ve yapabilirim tutumunu birleştiriyoruz.
  
  Antidote, ofis alanı, yasal destek, geliştirme kaynağı, mentorluk ve yetenek eşleştirmesi sağlayarak kurucuları 6 ay içinde sıfırdan seed'a hızlandırır. Birleşik Krallık'ın en vizyoner kurucularının, düşünürlerinin ve yatırımcılarının geleceği inşa ettiği yerde olun.
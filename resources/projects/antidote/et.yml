description: |
  Me oleme kiirendi, mis keskendub Ühendkuningriigi tugevaimate sektorite kasvu soodustamisele, kasutades tipptasemel innovatsiooni. Me ühendame ettevõtluse, riskikapitali, poliitikakujundamise ja teotahtelise suhtumise, et muuta asju paremaks.
  
  Antidote kiirendab asutajate tegevust 6 kuu jooksul nullist seed-ni, pakkudes kontoriruumi, juriidilist tuge, arendusressurssi, mentorlust ja talentide sobitamist. Olge seal, kus Ühendkuningriigi kõige visioonikamad asutajad, mõtlejad ja investorid ehitavad tulevikku.
description: |
  เราเป็นผู้เร่งการเติบโตที่มุ่งเน้นการจุดประกายการเติบโตในภาคส่วนที่แข็งแกร่งที่สุดของสหราชอาณาจักรโดยใช้เทคโนโลยีล้ำสมัย เราผสมผสานการเป็นผู้ประกอบการ การร่วมลงทุน การกำหนดนโยบาย และทัศนคติที่พร้อมลงมือทำเพื่อเปลี่ยนแปลงสิ่งต่างๆ ให้ดีขึ้น
  
  Antidote เร่งการเติบโตของผู้ก่อตั้งจากศูนย์ไปสู่ seed ภายใน 6 เดือน โดยให้บริการพื้นที่สำนักงาน การสนับสนุนด้านกฎหมาย ทรัพยากรการพัฒนา การให้คำปรึกษา และการจับคู่ความสามารถ อยู่ในที่ที่ผู้ก่อตั้ง นักคิด และนักลงทุนที่มีวิสัยทัศน์ที่สุดของสหราชอาณาจักรกำลังสร้างอนาคต
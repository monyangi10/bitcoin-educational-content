description: |
  Jesteśmy akceleratorem skoncentrowanym na stymulowaniu wzrostu w najsilniejszych sektorach Wielkiej Brytanii przy użyciu najnowocześniejszych innowacji. Łączymy przedsiębiorczość, kapitał wysokiego ryzyka, kształtowanie polityki i podejście "can-do", aby zmieniać rzeczy na lepsze.
  
  Antidote przyspiesza założycieli od zera do seed w ciągu 6 miesięcy, zapewniając przestrzeń biurową, wsparcie prawne, zasoby programistyczne, mentoring i dopasowywanie talentów. Bądź tam, gdzie najbardziej wizjonerscy założyciele, myśliciele i inwestorzy w Wielkiej Brytanii budują przyszłość.
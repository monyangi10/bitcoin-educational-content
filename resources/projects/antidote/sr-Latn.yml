description: |
  Mi smo akcelerator fokusiran na podsticanje rasta u najjačim sektorima UK koristeći najnovije inovacije. Kombinujemo preduzetništvo, rizični kapital, kreiranje politika i pozitivan stav kako bismo promenili stvari na bolje.
  
  Antidote ubrzava osnivače od nule do seed tokom 6 meseci, obezbeđujući kancelarijski prostor, pravnu podršku, razvojne resurse, mentorstvo i povezivanje talenata. Budite tamo gde najvizionarski osnivači, mislioci i investitori u UK grade budućnost.
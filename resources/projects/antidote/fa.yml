description: |
  ما یک شتاب‌دهنده هستیم که بر رشد در قوی‌ترین بخش‌های بریتانیا با استفاده از نوآوری پیشرفته تمرکز دارد. ما کارآفرینی، سرمایه‌گذاری خطرپذیر، سیاست‌گذاری و نگرش مثبت را برای ایجاد تغییرات بهتر ترکیب می‌کنیم.
  
  Antidote بنیان‌گذاران را طی ۶ ماه از صفر به seed شتاب می‌دهد و فضای اداری، پشتیبانی حقوقی، منابع توسعه، مشاوره و تطبیق استعداد را فراهم می‌کند. جایی باشید که آینده توسط بیناترین بنیان‌گذاران، متفکران و سرمایه‌گذاران بریتانیا ساخته می‌شود.
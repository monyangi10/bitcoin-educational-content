description: |
  Turi umunyavyihutisha yibanze ku gutera umuriro mu mice ikomeye cane yo mu Bwongereza dukoresheje ubuhinga bushasha bw’amaraso. Turahuza rwiyemezamirimo, umutungo wo gutera imbere, ugushinga amategeko n’agatima ko gukora kugira ngo ibintu bihindurwe neza.
  
  Antidote yihutisha abashinze kuva kuri zero gushika kuri seed mu mezi 6, itanga ibibanza vy’ibiro, ubufasha mu vy’amategeko, uburyo bwo guteza imbere, ubuyobozi n’uguhuza ubuhinga. Ba aho abashingwamanza b’Ubwongereza bafise iyerekwa, abazirikana n’abashoramari bariko bubaka kazoza.
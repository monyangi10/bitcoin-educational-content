description: |
  Chúng tôi là một chương trình tăng tốc khởi nghiệp tập trung vào việc thúc đẩy tăng trưởng trong các lĩnh vực mạnh nhất của Vương quốc Anh bằng cách sử dụng những đổi mới tiên tiến nhất. Chúng tôi kết hợp tinh thần khởi nghiệp, vốn đầu tư mạo hiểm, hoạch định chính sách và thái độ quyết tâm để thay đổi mọi thứ tốt đẹp hơn.
  
  Antidote hỗ trợ các nhà sáng lập từ con số 0 đến doanh thu toàn cầu (seed) trong vòng 6 tháng, cung cấp không gian văn phòng, hỗ trợ pháp lý, nguồn lực phát triển, cố vấn và kết nối nhân tài. Hãy đến với nơi các nhà sáng lập, nhà tư tưởng và nhà đầu tư có tầm nhìn nhất của Vương quốc Anh đang xây dựng tương lai.
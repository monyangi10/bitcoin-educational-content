description: |
  Vi är en accelerator som fokuserar på att skapa tillväxt i Storbritanniens starkaste sektorer med hjälp av banbrytande innovation. Vi kombinerar entreprenörskap, riskkapital, beslutsfattande och en "kan-göra"-attityd för att förändra saker till det bättre.
  
  Antidote accelererar grundare från noll till seed under 6 månader genom att tillhandahålla kontorsutrymme, juridiskt stöd, utvecklingsresurser, mentorskap och talangmatchning. Var där Storbritanniens mest visionära grundare, tänkare och investerare bygger framtiden.
description: |
  Kami adalah akselerator yang berfokus untuk memicu pertumbuhan di sektor-sektor terkuat di Inggris dengan menggunakan inovasi terdepan. Kami menggabungkan kewirausahaan, modal ventura, pembuatan kebijakan, dan sikap berani mengambil risiko untuk mengubah keadaan menjadi lebih baik.
  
  Antidote mempercepat para pendiri dari nol hingga seed dalam waktu 6 bulan, menyediakan ruang kantor, dukungan hukum, sumber daya pengembangan, bimbingan, dan pencocokan bakat. Jadilah tempat para pendiri, pemikir, dan investor paling visioner di Inggris membangun masa depan.
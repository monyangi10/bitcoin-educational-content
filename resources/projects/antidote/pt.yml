description: |
  Somos um acelerador centrado na promoção do crescimento nos sectores mais fortes do Reino Unido, utilizando inovação de ponta. Combinamos empreendedorismo, capital de risco, elaboração de políticas e uma atitude positiva para mudar as coisas para melhor.
  
  Antidote acelera os fundadores de zero a seed em 6 meses, fornecendo espaço de escritório, apoio jurídico, recursos de desenvolvimento, orientação e correspondência de talentos. Esteja onde os fundadores, pensadores e investidores mais visionários do Reino Unido estão a construir o futuro.
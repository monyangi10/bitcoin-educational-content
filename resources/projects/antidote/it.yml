description: |
  Siamo un acceleratore che si occupa di stimolare la crescita nei settori più forti del Regno Unito utilizzando innovazioni all'avanguardia. Combiniamo imprenditorialità, capitale di rischio, politica e un'attitudine a fare per cambiare le cose in meglio.
  
  Antidote accelera i fondatori da zero a seed nell'arco di 6 mesi, fornendo spazi per uffici, supporto legale, risorse di sviluppo, mentorship e matching di talenti. Si trova dove i fondatori, i pensatori e gli investitori più visionari del Regno Unito stanno costruendo il futuro.
description: |
  Мы являемся акселератором, нацеленным на стимулирование роста в самых сильных секторах экономики Великобритании с помощью передовых инноваций. Мы объединяем предпринимательство, венчурный капитал, разработку политики и настрой на успех, чтобы изменить ситуацию к лучшему.
  
  Antidote ускоряет основателей с нуля до seed в течение 6 месяцев, предоставляя им офисное пространство, юридическую поддержку, ресурсы для разработчиков, менторство и подбор талантов. Будьте там, где самые дальновидные основатели, мыслители и инвесторы Великобритании строят будущее.
description: |
  Wij zijn een versneller die zich richt op het stimuleren van groei in de sterkste sectoren van het Verenigd Koninkrijk door gebruik te maken van baanbrekende innovatie. Wij combineren ondernemerschap, durfkapitaal, beleidsvorming en een can-do houding om dingen ten goede te veranderen.
  
  Antidote versnelt oprichters van nul tot seed in 6 maanden en biedt kantoorruimte, juridische ondersteuning, dev resources, mentorschap en het matchen van talent. Kom naar de plek waar de meest visionaire oprichters, denkers en investeerders van het Verenigd Koninkrijk bouwen aan de toekomst.
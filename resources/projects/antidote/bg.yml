description: |
  Ние сме акселератор, който се фокусира върху стимулирането на растежа в най-силните сектори в Обединеното кралство с помощта на авангардни иновации. Съчетаваме предприемачество, рисков капитал, разработване на политики и отношение "мога да направя", за да променим нещата към по-добро.
  
  Antidote ускорява основателите от нула до seed в рамките на 6 месеца, като им осигурява офис пространство, правна подкрепа, ресурси за развитие, менторство и подбор на таланти. Бъдете там, където най-прозорливите основатели, мислители и инвеститори в Обединеното кралство изграждат бъдещето.
description: |
  Mavapay ni urubuga rwo kwishura rwizewe rukuraho ugucererwa kandi rugatuma amafaranga agenda neza kandi ashobora gutegekanirwa. Irizigirwa n’ubudandaji kw’isi yose, iratuma ibikorwa bigenda neza, igabanura ingorane, kandi igatuma umuntu ashobora kwishura neza, vyose bikaba ari umuti umwe wo kwizigirwa. 
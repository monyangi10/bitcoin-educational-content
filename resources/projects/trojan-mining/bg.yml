description: |
  Trojan Mining е нигерийска компания, която използва хидроелектрически и автономни енергийни източници за добив на Bitcoin по устойчив и енергийно ефективен начин. Като използва наличните на място възобновяеми ресурси, компанията намалява въздействието върху околната среда, като същевременно допринася за финансовото приобщаване и монетизирането на енергията в региони с недостатъчно обслужване.
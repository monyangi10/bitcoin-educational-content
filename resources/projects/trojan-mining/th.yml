description: |
  Trojan Mining เป็นบริษัทในไนจีเรียที่ใช้แหล่งพลังงานไฟฟ้าพลังน้ำและพลังงานนอกกริดในการขุด Bitcoin อย่างยั่งยืนและมีประสิทธิภาพด้านพลังงาน ด้วยการใช้ทรัพยากรหมุนเวียนที่มีอยู่ในท้องถิ่น บริษัทจึงลดผลกระทบต่อสิ่งแวดล้อมในขณะที่มีส่วนร่วมในการรวมทางการเงินและการสร้างรายได้จากพลังงานในภูมิภาคที่ขาดแคลนบริการ
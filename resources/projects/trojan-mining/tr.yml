description: |
  Trojan Mining, Bitcoin'ı sürdürülebilir ve enerji verimli bir şekilde çıkarmak için hidroelektrik ve şebeke dışı enerji kaynaklarından yararlanan Nijeryalı bir şirkettir. Şirket, yerel olarak mevcut yenilenebilir kaynaklardan yararlanarak çevresel etkiyi azaltırken, yetersiz hizmet alan bölgelerde finansal kapsayıcılığa ve enerjiden para kazanmaya katkıda bulunuyor.
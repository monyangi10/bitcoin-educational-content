description: |
  Trojan Mining ni ishirahamwe ryo muri Nijeriya rikoresha amashanyarazi y’amazi n’ay’inyuma y’uruzitiro kugira ngo ricukure Bitcoin mu buryo buramba kandi bukoresha neza inguvu. Mu gukoresha ubutunzi bushobora gusubirwamwo buboneka mu karere, iyo sosiyete iragabanya ingaruka mbi ku bidukikije mu gihe itanga umusanzu mu gushiramwo amafaranga no gutuma inguvu zigira amahera mu turere tudafise ubufasha buhagije.
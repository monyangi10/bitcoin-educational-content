description: |
  Trojan Mining is een Nigeriaans bedrijf dat hydro-elektrische en niet aan het net gekoppelde energiebronnen gebruikt om Bitcoin op een duurzame en energie-efficiënte manier te ontginnen. Door gebruik te maken van lokaal beschikbare hernieuwbare bronnen, vermindert het bedrijf de impact op het milieu terwijl het bijdraagt aan financiële inclusie en het te gelde maken van energie in achtergestelde regio's.
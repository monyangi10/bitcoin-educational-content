description: |
  Швейцарска компания, специализирана в областта на цифровата неприкосновеност на личния живот, предлагаща сигурни услуги, базирани на криптиране от край до край. Основана от учени от ЦЕРН, Proton предлага решения като Proton Mail, криптирана услуга за електронна поща, Proton VPN за частно сърфиране онлайн и Proton Drive за сигурно съхранение на файлове. Наскоро те пуснаха и софтуера Bitcoin wallet. Фокусирана върху прозрачността, компанията използва модел с отворен код. Proton се ангажира да защитава личните данни на своите потребители.
  
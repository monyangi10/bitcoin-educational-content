description: |
  Zwitsers bedrijf gespecialiseerd in digitale privacy, dat veilige diensten aanbiedt op basis van end-to-end encryptie. Proton is opgericht door wetenschappers van CERN en biedt oplossingen zoals Proton Mail, een versleutelde e-mailservice, Proton VPN voor privé online browsen en Proton Drive voor veilige bestandsopslag. Onlangs lanceerden ze ook Bitcoin Wallet software. Het bedrijf is gericht op transparantie en gebruikt een open-source model. Proton doet er alles aan om de privacy van zijn gebruikers te beschermen.
  
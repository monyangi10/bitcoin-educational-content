description: |
  Dijital gizlilik konusunda uzmanlaşmış, uçtan uca şifrelemeye dayalı güvenli hizmetler sunan İsviçreli şirket. CERN bilim insanları tarafından kurulan Proton, şifreli bir e-posta hizmeti olan Proton Mail, özel çevrimiçi tarama için Proton VPN ve güvenli dosya depolama için Proton Drive gibi çözümler sunmaktadır. Yakın zamanda Bitcoin Wallet yazılımını da piyasaya sürdüler. Şeffaflığa odaklanan şirket, açık kaynaklı bir model kullanıyor. Proton, kullanıcılarının gizliliğini korumayı taahhüt eder.
  
description: |
  디지털 개인 정보 보호에 특화된 스위스 회사로, 종단 간 암호화에 기반한 보안 서비스를 제공합니다. CERN 과학자들이 설립한 Proton은 암호화된 이메일 서비스인 Proton Mail, 비공개 온라인 브라우징을 위한 Proton VPN, 안전한 파일 저장을 위한 Proton Drive와 같은 솔루션을 제공합니다. 최근에는 Bitcoin Wallet 소프트웨어도 출시했습니다. 투명성에 중점을 둔 이 회사는 오픈 소스 모델을 사용합니다. Proton은 사용자의 개인 정보를 보호하기 위해 최선을 다하고 있습니다.
  
description: |
  Turi ishirahamwe ryashinzwe mu mwaka w’2021 ryibanda ku mahugurwa n’impanuro vy’aba Bitcoin gusa. Intiti y’ubu buhinga kuva mu 2014, ikipe yacu igizwe n’abahinga, abahinguzi n’abamenyereza bahuriye mu guteza imbere Bitcoin nk’ubuhinga bushasha bushobora gutuma imiryango n’ubudandaji bimera neza muri rusangi.
description: |
  Wij zijn een start-up, opgericht in 2021, die zich richt op training en advies op het gebied van Bitcoin. Ons team is sinds 2014 een geleerde op het gebied van deze technologie en bestaat uit ingenieurs, ontwikkelaars en trainers die Bitcoin promoten als een technologische innovatie die het algehele welzijn van huishoudens en bedrijven kan verbeteren.
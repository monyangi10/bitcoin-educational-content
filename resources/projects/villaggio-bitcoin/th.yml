description: |
  เราเป็นสตาร์ทอัพที่ก่อตั้งขึ้นในปี 2021 โดยมุ่งเน้นที่การฝึกอบรมและให้คำปรึกษาเฉพาะด้าน Bitcoin เท่านั้น ทีมงานของเราประกอบด้วยวิศวกร นักพัฒนา และผู้ฝึกสอนที่มีความรู้ในเทคโนโลยีนี้มาตั้งแต่ปี 2014 โดยมีเป้าหมายร่วมกันในการส่งเสริม Bitcoin ให้เป็นนวัตกรรมทางเทคโนโลยีที่สามารถปรับปรุงความเป็นอยู่ที่ดีโดยรวมของครัวเรือนและธุรกิจได้
description: |
  Biz 2021 yılında kurulan ve sadece Bitcoin eğitim ve danışmanlığına odaklanan bir start-up'ız. 2014'ten beri bu teknolojinin bir uzmanı olan ekibimiz, Bitcoin'ı hane halklarının ve işletmelerin genel refahını artırabilecek teknolojik bir yenilik olarak tanıtmak için bir araya gelen mühendisler, geliştiriciler ve eğitmenlerden oluşmaktadır.
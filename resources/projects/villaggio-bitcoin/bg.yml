description: |
  Ние сме стартъп, основан през 2021 г., който се фокусира върху обучението и консултациите на Bitcoin-only. Стипендиант на тази технология от 2014 г. насам, нашият екип се състои от инженери, разработчици и обучители, обединени в популяризирането на Bitcoin като технологична иновация, която може да подобри цялостното благосъстояние на домакинствата и бизнеса.
description: |
  Cashu, Bitcoin için oluşturulmuş ücretsiz ve açık kaynaklı bir Chaumian ecash sistemidir.
  
  Cashu, saklama amaçlı Bitcoin uygulamalarının kullanıcıları için mükemmele yakın gizlilik sunar. Kimsenin kim olduğunuzu, ne kadar paranız olduğunu ve kiminle işlem yaptığınızı bilmesine gerek yoktur.
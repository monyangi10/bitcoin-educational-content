description: |
  Cashu е безплатна система за обмен на пари на Chaumian с отворен код, създадена за Bitcoin.
  
  Cashu предлага почти идеална поверителност за потребителите на приложения за попечителство на Bitcoin. Никой не трябва да знае кой сте, колко средства имате и с кого извършвате транзакции.
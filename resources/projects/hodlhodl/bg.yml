description: |
  Hodl Hodl е сигурна платформа за търговия, в която не се налагат никакви ограничения Bitcoin и която цени поверителността на личните ви данни. С повече от 7 години бизнес, платформата улеснява анонимните peer-to-peer сделки при вашите собствени условия, поддържайки над 100 валути, с повече от 100 000 регистрирани потребители и 50 000 сключени сделки.
  
  Платформата работи с мултисиг (P2SH) договори, което означава, че вие контролирате ключовете за средствата в ескроу през цялото време на сделката. Не се изисква проверка, което позволява безпроблемна и лична търговия.
  
  Процесът за започване на търговия е прост. Потребителите сключват договор и Hodl Hodl генерира уникален multisig escrow адрес. Продавачът депозира биткойни в ескроу директно от своя wallet, а купувачът плаща на продавача съгласно договорения метод на плащане. Накрая продавачът освобождава биткойни от ескроу директно в wallet на купувача, с което приключва договора.
  
  Hodl Hodl ви позволява да създадете оферта при вашите условия, да определите цената си, да използвате множество методи на плащане и да настроите стойност на стоп-загуба. Прозрачните такси на платформата се разпределят между купувача и продавача и се приспадат от сумата в BTC. С Hodl Hodl можете да търгувате глобално, като използвате всяка платежна система, за всяка валута.
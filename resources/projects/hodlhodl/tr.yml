description: |
  HODL HODL, gizliliğinize değer veren güvenli, gözetimsiz bir Bitcoin ticaret platformudur. 7 yılı aşkın süredir faaliyette olan platform, 100.000'den fazla kayıtlı kullanıcı ve 50.000'den fazla kapalı anlaşma ile 100'den fazla para birimini destekleyerek kendi koşullarınızda anonim eşler arası anlaşmaları kolaylaştırır.
  
  Platform Multisig (P2SH) sözleşmeleriyle çalışır, yani tüm anlaşma boyunca emanetteki fonların anahtarlarını kontrol edersiniz. Hiçbir doğrulama gerekmez, bu da sorunsuz ve özel bir ticaret deneyimi sağlar.
  
  Ticarete başlama süreci basittir. Kullanıcılar bir Contract'a katılır ve HODL HODL benzersiz bir Multisig emanet Address oluşturur. Satıcı, bitcoinleri doğrudan Wallet'ten emanete yatırır ve alıcı, üzerinde anlaşmaya varılan ödeme yöntemine göre satıcıya ödeme yapar. Son olarak, satıcı bitcoinleri emanetten doğrudan alıcının Wallet'üne bırakarak Contract'ı tamamlar.
  
  HODL HODL, şartlarınıza göre bir teklif oluşturmanıza, fiyatınızı belirlemenize, birden fazla ödeme yöntemi kullanmanıza ve bir stop-loss değeri belirlemenize olanak tanır. Platformun şeffaf ücretleri alıcı ve satıcı arasında paylaştırılır ve BTC tutarından düşülür. HODL HODL ile, herhangi bir para birimi için herhangi bir ödeme sistemi kullanarak küresel olarak işlem yapabilirsiniz.
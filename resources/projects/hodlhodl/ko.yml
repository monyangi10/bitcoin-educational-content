description: |
  HODL HODL는 개인 정보를 소중히 여기는 안전한 비수탁형 Bitcoin 거래 플랫폼입니다. 7년 이상 사업을 운영해 온 이 플랫폼은 100개 이상의 통화를 지원하며 10만 명 이상의 등록 사용자와 5만 건 이상의 거래를 성사시킨 익명의 P2P 거래를 촉진합니다.
  
  이 플랫폼은 Multisig(P2SH) 계약으로 운영되며, 이는 전체 거래 기간 동안 에스크로 자금의 키를 사용자가 직접 관리한다는 의미입니다. 인증이 필요하지 않으므로 원활하고 비공개적인 거래 경험이 가능합니다.
  
  거래 시작 절차는 간단합니다. 사용자가 Contract에 참여하면 HODL가 고유한 Multisig 에스크로 Address를 생성합니다. 판매자는 Wallet에서 직접 에스크로에 비트코인을 입금하고, 구매자는 합의된 결제 방법에 따라 판매자에게 대금을 지불합니다. 마지막으로 판매자는 에스크로에서 구매자의 Wallet로 직접 비트코인을 릴리스하여 Contract을 완료합니다.
  
  HODL HODL에서는 원하는 조건으로 오퍼를 생성하고, 가격을 설정하고, 여러 결제수단을 사용하고, 손절가를 설정할 수 있습니다. 플랫폼의 투명한 수수료는 구매자와 판매자가 나눠서 부담하며 BTC 금액에서 차감됩니다. HODL를 사용하면 모든 결제 시스템을 사용해 모든 통화로 전 세계에서 거래할 수 있습니다.
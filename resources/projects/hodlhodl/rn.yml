description: |
  HODL HODL ni urubuga rw’ubudandaji rwa Bitcoin rutekanye, rudafise ububiko, ruha agaciro ubuzima bwite bwawe. Kubera imyaka irenga 7 mu bucuruzi, iyo nzira ifasha mu gukorana n’abandi ata mazina ku buryo bwawe bwite, igashigikira amafaranga arenga 100, n’abakoresha barenga 100.000 biyandikishije n’amasezerano 50.000 yafunze.
  
  Iryo koraniro rikorana n’amasezerano ya Multisig (P2SH), bisobanura ko ari wewe ugenzura imfunguruzo z’amahera ari mu escrow mu gihe cose c’amasezerano. Nta kugenzura bisabwa, bikaba vyemerera ubumenyi bw’ubudandaji butagira umurongo kandi bw’ibanga.
  
  Inzira yo gutangura gucuruza iragororotse. Abakoresha bifatanya na Contract, na HODL HODL itanga Multisig yihariye y'ububiko Address. Uwugurisha abika ama bitcoins mu escrow ataco akoresheje Wallet yabo, uwugurisha na we akariha uwugurisha akurikije uburyo bwo kwishura bemeranije. Ubwa nyuma, uwugurisha arekura ama bitcoins avuye mu escrow akaja ku Wallet y’umuguzi, akaheza Contract.
  
  HODL HODL iragufasha gukora igiciro ku mategeko yawe, gushinga igiciro cawe, gukoresha uburyo bwinshi bwo kwishura, no gushinga agaciro ko guhagarika gutakaza. Amafaranga y’iyi platform agaragara agabanywa hagati y’umuguzi n’ugurisha kandi akakurwa ku giciro ca BTC. Na HODL HODL, urashobora gucuruza kw’isi yose, ukoresheje uburyo bwo kwishura bwose, ku mafaranga yose.
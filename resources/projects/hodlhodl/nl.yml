description: |
  HODL HODL is een veilig, niet-bindend Bitcoin handelsplatform dat waarde hecht aan jouw privacy. Het platform bestaat al meer dan 7 jaar en faciliteert anonieme peer-to-peer deals op uw eigen voorwaarden. Het ondersteunt meer dan 100 valuta, met meer dan 100.000 geregistreerde gebruikers en 50.000 afgesloten deals.
  
  Het platform werkt met Multisig (P2SH) contracten, wat betekent dat jij de sleutels van de fondsen in escrow beheert gedurende de hele deal. Er is geen verificatie vereist, wat zorgt voor een naadloze en privé handelservaring.
  
  Het proces om te beginnen met handelen is eenvoudig. Gebruikers gaan een Contract aan en HODL genereert een unieke Multisig escrow Address. De verkoper stort bitcoins in escrow. De verkoper stort bitcoins in escrow direct vanuit zijn Wallet, en de koper betaalt de verkoper volgens de overeengekomen betalingsmethode. Tot slot geeft de verkoper de bitcoins uit escrow direct vrij aan de Wallet van de koper, waarmee de Contract compleet is.
  
  HODL Met HODL kun je een aanbod maken op jouw voorwaarden, je prijs bepalen, meerdere betalingsmethoden gebruiken en een stop-loss waarde instellen. De transparante vergoedingen van het platform worden verdeeld tussen koper en verkoper en afgetrokken van het BTC-bedrag. Met HODL HODL kun je wereldwijd handelen, met elk betalingssysteem en voor elke valuta.
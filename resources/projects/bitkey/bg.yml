description: |
  Bitkey е иновативно решение за съхранение и управление на Bitcoin wallet, разработено от Block, Inc. - компанията, която стои зад Square и Cash App. Проектиран за сигурност и лесна употреба, Bitkey се основава на 2-де-3 многоподписна архитектура, съчетаваща локален ключ на устройството Bitkey, ключ в мобилното приложение и трети ключ, криптиран на защитен сървър.
description: |
  Bitkey ni ubuhinga bushasha bwo kubika no gucunga Bitcoin Wallet bwateguwe na Block, Inc. ishirahamwe riri inyuma ya Square na Cash App. Bitkey yakozwe kugira ngo ikoreshe neza kandi ikoreshe neza, ishingiye ku buhinga bw’imikono myinshi 2-de-3, ihuriza hamwe urufunguzo rwo mu karere ku gikoresho ca Bitkey, urufunguzo rwo muri porogarama ya telefone ngendanwa n’urufunguzo rwa gatatu rwashizwe mu nzira ku server itekanye.
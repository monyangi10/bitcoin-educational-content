description: |
  Bitkey, Square ve Cash App'in arkasındaki şirket olan Block, Inc. tarafından geliştirilen yenilikçi bir Bitcoin Wallet depolama ve yönetim çözümüdür. Güvenlik ve kullanım kolaylığı için tasarlanan Bitkey, Bitkey cihazındaki yerel bir anahtarı, mobil uygulamadaki bir anahtarı ve güvenli bir sunucuda şifrelenmiş üçüncü bir anahtarı birleştiren 2-de-3 çoklu imza mimarisine dayanmaktadır.
description: |
  Bitkey เป็นโซลูชันการจัดเก็บและการจัดการ Bitcoin wallet ที่เป็นนวัตกรรมใหม่ที่พัฒนาโดย Block, Inc. บริษัทที่อยู่เบื้องหลัง Square และ Cash App ออกแบบมาเพื่อความปลอดภัยและความสะดวกในการใช้งาน Bitkey ใช้สถาปัตยกรรมมัลติซิกเนเจอร์แบบ 2-de-3 โดยรวมคีย์ท้องถิ่นบนอุปกรณ์ Bitkey คีย์ในแอปมือถือ และคีย์ที่สามที่เข้ารหัสบนเซิร์ฟเวอร์ที่ปลอดภัย
description: |
  Bitkey is een innovatieve Bitcoin opslag- en beheeroplossing ontwikkeld door Block, Inc. het bedrijf achter Square en Cash App. Bitkey is ontworpen voor veiligheid en gebruiksgemak en is gebaseerd op een 2-de-3 multisignature-architectuur, waarbij een lokale sleutel op het Bitkey-apparaat, een sleutel in de mobiele app en een derde sleutel versleuteld op een beveiligde server worden gecombineerd.
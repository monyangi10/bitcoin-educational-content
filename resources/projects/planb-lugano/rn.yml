description: |
  Lugano’s Plan ₿ ni umugambi w’ubufatanye hagati y’igisagara ca Lugano na Tether wo kwihutisha gukoresha no gukoresha ubuhinga bwa Bitcoin nk’umushinge wo guhindura ibikorwa remezo vy’ivy’ubutunzi vy’igisagara.
  Ico gikorwa kizoshika kuri Blockchain na Bitcoin mu gisagara cose kugira ngo kigire ingaruka nziza ku mice yose y’ubuzima bwa misi yose ku batuye Lugano. Kuva ku bikorwa bitobito n’abadandaza bo mu karere gushika ku bikorwa binini – nk’ukwishura imisoro ku mwaka – Blockchain izokora nk’umushinge w’uguhanahana amafaranga y’igisagara.
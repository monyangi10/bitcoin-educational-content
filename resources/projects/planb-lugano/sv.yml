description: |
  Luganos plan ₿ är ett gemensamt initiativ mellan Luganos stad och Tether för att påskynda användningen av och utnyttja Bitcoin-teknik som grund för att omvandla stadens finansiella infrastruktur. Planen kommer att skala Blockchain och Bitcoin i hela staden för att positivt påverka alla aspekter av det dagliga livet för invånarna i Lugano. Från små transaktioner med lokala handlare till större insatser - som att betala årlig skatt - kommer Blockchain att fungera som grunden för stadens finansiella utbyten.
description: |
  แผน ₿ ของลูกาโนเป็นความร่วมมือระหว่างเมืองลูกาโนและ Tether เพื่อเร่งการใช้และใช้ประโยชน์จากเทคโนโลยีบิตคอยน์เป็นพื้นฐานในการเปลี่ยนแปลงโครงสร้างพื้นฐานทางการเงินของเมือง แผนนี้จะขยายบล็อกเชนและ Bitcoin ทั่วทั้งเมืองเพื่อส่งผลดีต่อทุกด้านของชีวิตประจำวันของผู้อยู่อาศัยในลูกาโน ตั้งแต่การทำธุรกรรมขนาดเล็กกับพ่อค้าในท้องถิ่นไปจนถึงความพยายามที่ใหญ่ขึ้น เช่น การจ่ายภาษีประจำปี บล็อกเชนจะทำหน้าที่เป็นพื้นฐานสำหรับการแลกเปลี่ยนทางการเงินของเมือง
description: |
  Lugano's Plan ₿ is een gezamenlijk initiatief van de stad Lugano en Tether om het gebruik van Bitcoin technologie te versnellen en te benutten als basis om de financiële infrastructuur van de stad te transformeren. Het plan zal Blockchain en Bitcoin door de hele stad verspreiden om alle facetten van het dagelijks leven van de inwoners van Lugano positief te beïnvloeden. Van kleine transacties met lokale handelaren tot grotere inspanningen - zoals het betalen van de jaarlijkse belastingen - Blockchain zal dienen als basis voor de financiële uitwisselingen van de stad.
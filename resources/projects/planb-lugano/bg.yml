description: |
  Планът на Лугано ₿ е съвместна инициатива на град Лугано и Tether за ускоряване на използването на биткойн технологията като основа за трансформиране на финансовата инфраструктура на града.
  Планът ще разшири мащаба на блокчейн и Bitcoin в целия град, за да окаже положително въздействие върху всички аспекти на ежедневието на жителите на Лугано. От малки транзакции с местни търговци до по-големи усилия - като например плащането на годишните данъци - блокчейн ще служи като основа за финансовия обмен в града.
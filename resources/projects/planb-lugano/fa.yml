description: |
  طرح ₿ لوگانو یک ابتکار مشترک بین شهر لوگانو و تتر است که هدف آن تسریع استفاده و بهره‌برداری از فناوری Bitcoin به عنوان پایه‌ای برای تحول زیرساخت مالی شهر است. این طرح Blockchain و Bitcoin را در سراسر شهر گسترش خواهد داد تا تمامی جنبه‌های زندگی روزمره ساکنان لوگانو را به طور مثبت تحت تأثیر قرار دهد. از معاملات کوچک با بازرگانان محلی گرفته تا تلاش‌های بزرگتر – مانند پرداخت مالیات سالانه – Blockchain به عنوان پایه‌ای برای تبادلات مالی شهر عمل خواهد کرد.
description: |
  Lugano's Plan ₿ je zajednička inicijativa između Grada Lugana i Tethera za ubrzanje korišćenja i iskorišćavanje Bitcoin tehnologije kao osnove za transformaciju finansijske infrastrukture grada. Plan će proširiti Blockchain i Bitcoin širom grada kako bi pozitivno uticao na sve aspekte svakodnevnog života stanovnika Lugana. Od malih transakcija sa lokalnim trgovcima do većih napora – kao što je plaćanje godišnjih poreza – Blockchain će služiti kao osnova za finansijske razmene grada.
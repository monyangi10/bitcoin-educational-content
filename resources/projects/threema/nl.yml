description: |
  Zwitsers bedrijf gespecialiseerd in oplossingen voor beveiligde berichtenuitwisseling. Het werd opgericht in 2012 en ontwikkelt de gelijknamige Threema-applicatie, ontworpen om de vertrouwelijkheid van communicatie te garanderen dankzij end-to-end encryptie, zonder het verzamelen van persoonlijke gegevens.
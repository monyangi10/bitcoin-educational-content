description: |
  Sosiyete yo mu Busuwisi yizeye gutorera umuti ubutumwa butekanye. Yashinzwe mu mwaka w’2012, ikora ubuhinga bwa Threema bw’izina nyene, bugenewe gukingira ibanga ry’itumanaho biciye ku gukoresha ubuhinga bwo gushiramwo amakuru kuva ku mpera kugeza ku mpera, ata gukusanya amakuru y’umuntu ku giti ciwe.
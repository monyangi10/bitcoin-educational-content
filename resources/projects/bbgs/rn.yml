description: |
  BBGS ni ishirahamwe ry’ubuhinga bushasha ryitaho gushinga no gucunga amatongo ya Bitcoin Mining akoresha inguvu zirenga Green. Kubera ko iyo sosiyete ikora kw’isi yose, iri mu bagize umurongo uriko urakura wo gukoresha Bitcoin Mining idahungabanya ibidukikije.
  Ibikorwa vya BBGS bifashwa n’ishirahamwe ryayo ryitwa BBGS Asset Co, ritanga imashini zikenewe zo gukora Bitcoin Mining. Ishirahamwe ry’umuvyeyi, BBGS, ni ryo rigenzura ugushinga, ugukoresha n’ugutunganya amatongo ya Mining.
  he company ifise uburyo bwihariye bushimika ku buzima buramba bwa Proof-of-Work, kwegereza ibikorwa vya Mining, no kwongerekana kw'ukwizigira inguvu zishobora gusubirwamwo ku Bitcoin Mining. Mu gihe habayeho ukudakeka kw’ivy’ubutunzi, BBGS irashobora kwimurira itunga ryayo mu bibanza bitekanye.
  BBGS izwi cane kubera ubuhinga bwayo bwo kurema no gucunga amatongo ya Mining no kubera ubufatanye bwayo mu migabane itatu.
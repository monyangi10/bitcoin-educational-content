description: |
  Braiins ni umurongozi mu bijanye n’ubuhinga bwa Bitcoin Mining, itanga ibikoresho n’ibikorwa vyo gutuma ibikorwa vya Mining bigenda neza. Kubera ko ari yo ikoresha ubuhinga bwa Bitcoin Mining pool bumaze igihe kirekire kw’isi (kuva mu 2010), Braiins itanga ingororano zishobora gutegekanirwa n’akarorero kayo ka FPPS, igatuma abacukuzi b’amabuye y’agaciro bungukira ku mahera y’ugucuruza. Ivyo bikoresho vyabo vy’ubuhinga bwa none vyitwa Braiins OS biratuma ASIC ikora neza, biratuma ibikoresho bimara igihe kirekire, kandi bikaba bituma umuntu akoresha neza ubushobozi, bikaba bituma ari igikoresho gihambaye ku bacukuzi barondera inyungu nyinshi.
  
  Uretse porogarama, Braiins itanga inyishu z’ibikoresho zigenewe ibidukikije bisaba Mining n’ibikoresho vyo kurongora kugira ngo ibikorwa bibe vyiza. Iyo sosiyete kandi irasangira ibikoresho vy’inyigisho kugira ngo itere imbere ubumenyi bw’inganda. Kubera ko Braiins yibanda ku guseruka no gukora ibintu bishasha, yacitse ibuye ry’imfuruka rya Bitcoin Mining, ishinzwe Mining irenga miliyoni 1.25 BTC gushika ubu.
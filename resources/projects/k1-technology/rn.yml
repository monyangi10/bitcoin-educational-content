description: |
  K1 Technology irema imashini y’ugucuruza ibintu y’ubuhinga bushasha yitwa K1 Mini. Ico gikoresho cakozwe ku bucuruzi, kiratuma umuntu ashobora gukora amafaranga ata nkomanzi biciye kuri Bitcoin mu gihe kandi kizana amafaranga biciye mu kwamamaza guhuriweko. K1 Mini ifise ibintu nk’ivyo gukora ku mubiri vy’amasentimetero 8, gupima kode ya QR, n’igipfukisho c’icuma gikomeye, K1 Mini itanga umuti wo kwagura uburyo bwo gukoresha amafaranga y’ubuhinga bwa none. Kubera ko iyo sosiyete ari yo ihingura kandi igakora ivyo bikoresho vy’ubuhinga bwihariye, biragaragara ko iyo sosiyete iri mu rwego rw’ababikora.
  
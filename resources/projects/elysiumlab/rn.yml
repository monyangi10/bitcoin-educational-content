description: |
  ElysiumLab, ishirahamwe ryo mu Busuwisi rifise icumba i Lugano, ririko rihindura uburyo bwo gucunga umutungo w’ubuhinga bwa none rikoresheje Elysium Wallet, ubuhinga bushasha butagiramwo ububiko bwa Wallet. Gukoresha ubuhinga bwo kwizigama ata mfunguruzo, birakuraho ingorane zijanye n’ugucungera urufunguzo rw’ibanga rwa kera. Elysium Wallet ishobora gutahurwa neza kandi itekanye, yorohereza amafaranga Bitcoin na stablecoin biciye ku buryo bushingiye ku ntumbero (Ibikorwa bishingiye ku ntumbero).
  
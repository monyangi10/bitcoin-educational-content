description: |
  Benim adım QnA. Ben bir Bitcoin kullanıcısıyım ve diğer Bitcoin kullanıcılarına yardım etmeyi seviyorum.
  
  Günlerimi Foundation'da Bitcoin merkezli egemenlik araçları geliştirerek geçiriyorum.
  
  Bu site, insanlara yolculukları boyunca yardımcı olmak için yönlendirebileceğim katkılarımın bir koleksiyonudur. Eğer değerli bulursanız, lütfen meslektaşlarınızla paylaşın ve katkıda bulunmayı veya bir ipucu göndermeyi düşünün.
description: |
  LibreWolf is een onafhankelijk gemeenschapsproject opgericht door liefhebbers van vrije software. Het is ontworpen om browsen aan te bieden die gericht is op privacy, veiligheid en vrijheid. LibreWolf is gebaseerd op Firefox, maar ontdaan van alle telemetrie, reclame en opdringerige functies. Het wordt onderhouden door een team vrijwilligers op Codeberg en ondersteund door open discussies op Matrix.
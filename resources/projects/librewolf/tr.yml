description: |
  LibreWolf, özgür yazılım meraklıları tarafından kurulmuş bağımsız bir topluluk projesidir. Gizlilik, güvenlik ve özgürlük odaklı bir tarama sunmak için tasarlanmıştır. LibreWolf, Firefox'u temel alır, ancak tüm telemetri, reklam ve müdahaleci özelliklerden arındırılmıştır. Codeberg'de gönüllülerden oluşan bir ekip tarafından sürdürülmekte ve Matrix'teki açık tartışmalarla desteklenmektedir.
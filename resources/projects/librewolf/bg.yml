description: |
  LibreWolf е независим общностен проект, основан от ентусиасти на свободния софтуер. Той е създаден, за да предлага сърфиране, насочено към поверителността, сигурността и свободата. LibreWolf е базиран на Firefox, но е лишен от всички телеметрични данни, реклами и натрапчиви функции. Поддържа се от екип от доброволци в Codeberg и се подкрепя от отворени дискусии в Matrix.
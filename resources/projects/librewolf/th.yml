description: |
  LibreWolf เป็นโครงการชุมชนอิสระที่ก่อตั้งโดยผู้ที่ชื่นชอบซอฟต์แวร์เสรี ออกแบบมาเพื่อให้การท่องเว็บที่เน้นความเป็นส่วนตัว ความปลอดภัย และเสรีภาพ LibreWolf พัฒนามาจาก Firefox แต่ได้ตัดการติดตามโพรไฟล์ การโฆษณา และฟีเจอร์ที่ล่วงล้ำออกทั้งหมด โครงการนี้ดูแลโดยทีมอาสาสมัครบน Codeberg และได้รับการสนับสนุนจากการสนทนาแบบเปิดบน Matrix
description: |
  LibreWolf ni umugambi w’abanyagihugu wigenga washinzwe n’abakunda porogarama z’ubuntu. Igenewe gutanga ubushakashatsi bwibanda ku buzima bwite, umutekano n’umwidegemvyo. LibreWolf ishingiye kuri Firefox, ariko ikuweko ubuhinga bwose bwo gupima uburebure, kwamamaza n’ibintu bishobora kwinjira mu mutima. Itunganywa n’umugwi w’abakozi b’intahemuka kuri Codeberg kandi ishigikirwa n’ibiganiro vyuguruye kuri Matrix.
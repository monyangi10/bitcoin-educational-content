description: |
  Btrust on voittoa tavoittelematon järjestö, jonka tehtävänä on erityisesti
  hajauttaa Bitcoin-ohjelmistojen kehittämistä. Keskitymme edistämään
  kehittäjien lahjakkuutta globaalissa etelässä ja tukemalla vapaan ja avoimen lähdekoodin ohjelmistoja
  Bitcoin-ekosysteemiä.
  
  Me Btrustilla uskomme, että hajauttaminen lisää joustavuutta, ulottuvuutta..,
  gW-0:n merkitystä globaalina valuuttana. Olemme sitoutuneet toimimaan
  alueilla, joilla Bitcoin:n kehitys on harvinaista, ja edistämään kasvua..
  ja teknologian hajauttamista.
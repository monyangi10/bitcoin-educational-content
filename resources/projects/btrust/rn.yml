description: |
  Btrust ni ishirahamwe ridaharanira inyungu rifise intumbero yo gushikiriza iterambere ry’ubuhinga bwa Bitcoin. Ico twibandako ni ugutera imbere . ubuhinga bwo gutegura mu bumanuko bw'isi yose no gushigikira ubuntu n'inkomoko yuguruye Bitcoin ibidukikije.

  Muri Btrust, twizera ko kwegereza ubutegetsi abaturage bituma umuntu agira ubushobozi bwo kwihangana, gushikira abantu, n’akamaro ka Bitcoin nk’ifaranga ry’isi yose. Twiyemeje gukora mu turere aho iterambere rya Bitcoin ridasanzwe, bikaba bituma habaho iterambere . n’ugusenyura ubuhinga.
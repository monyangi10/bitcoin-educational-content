description: |
  Btrust - это некоммерческая организация, целью которой является
  децентрализовать разработку программного обеспечения Bitcoin. В центре нашего внимания - развитие
  талантов разработчиков на глобальном юге и поддержке свободной экосистемы Bitcoin с открытым исходным кодом
  Экосистемы Bitcoin.
  
  В Btrust мы считаем, что децентрализация повышает устойчивость, охват и актуальность Bitcoin как глобальной валюты,
  и актуальность Bitcoin как глобальной валюты. Мы стремимся работать
  в регионах, где Bitcoin развивается нечасто, способствуя росту
  и децентрализации технологии.
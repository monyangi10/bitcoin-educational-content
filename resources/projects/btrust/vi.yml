description: |
  Btrust là một tổ chức phi lợi nhuận với sứ mệnh tận tâm là
  phân quyền hóa việc phát triển phần mềm Bitcoin. Trọng tâm của chúng tôi là bồi dưỡng
  tài năng lập trình viên ở các nước đang phát triển và hỗ trợ hệ sinh thái Bitcoin mã nguồn mở và miễn phí.
  
  Tại Btrust, chúng tôi tin rằng sự phân quyền sẽ nâng cao khả năng phục hồi, phạm vi tiếp cận và tính phù hợp của Bitcoin như một loại tiền tệ toàn cầu. Chúng tôi cam kết hoạt động
  ở những khu vực mà việc phát triển Bitcoin còn chưa phổ biến, góp phần vào sự phát triển
  và phân quyền của công nghệ.
description: |
  Btrust, kar amacı gütmeyen bir kuruluş olup aşağıdaki amaçlara adanmıştır
  gW-0 yazılımının geliştirilmesini merkezsizleştirmek. Odak noktamız teşvik etmek
  küresel güneydeki geliştirici yetenekleri ve özgür ve açık kaynakların desteklenmesi
  Bitcoin ekosistemi.
  
  Btrust olarak, ademi merkeziyetçiliğin esnekliği ve erişimi artırdığına inanıyoruz,
  ve Bitcoin'ın küresel bir para birimi olarak uygunluğu. Faaliyet göstermeye kararlıyız
  gW-0 gelişiminin nadir olduğu bölgelerde büyümeye katkıda bulunur
  ve teknolojinin merkezsizleştirilmesi.
description: |
  Btrust je neprofitna organizacija sa posvećenom misijom da decentralizuje razvoj Bitcoin softvera. Naš fokus je na podsticanju talenata programera u globalnom jugu i podršci slobodnom i otvorenom Bitcoin ekosistemu.
  
  U Btrust-u verujemo da decentralizacija poboljšava otpornost, domet i relevantnost Bitcoin kao globalne valute. Posvećeni smo radu u regionima gde je razvoj Bitcoin retkost, doprinoseći rastu i decentralizaciji tehnologije.
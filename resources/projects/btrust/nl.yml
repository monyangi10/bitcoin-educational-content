description: |
  Btrust is een non-profit organisatie met een toegewijde missie om de ontwikkeling van Bitcoin software te decentraliseren. Onze focus ligt op het stimuleren van ontwikkelaarstalent in het zuiden van de wereld en het ondersteunen van het vrije en open-source Bitcoin ecosysteem.

  Bij Btrust geloven we dat decentralisatie de veerkracht, het bereik, en de relevantie van Bitcoin als wereldwijde valuta verbetert. We zijn toegewijd om te werken in regio's waar de ontwikkeling van Bitcoin ongewoon is, om zo bij te dragen aan de groei en decentralisatie van de technologie.
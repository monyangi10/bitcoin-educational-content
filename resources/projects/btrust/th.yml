description: |
  Btrust เป็นองค์กรไม่แสวงหาผลกำไรที่มีภารกิจเฉพาะในการกระจายการพัฒนาซอฟต์แวร์ Bitcoin เป้าหมายของเราคือการส่งเสริมความสามารถของนักพัฒนาในภูมิภาคใต้ของโลกและสนับสนุนระบบนิเวศ Bitcoin ที่เป็นอิสระและโอเพ่นซอร์ส

  ที่ Btrust เราเชื่อว่าการกระจายอำนาจช่วยเพิ่มความยืดหยุ่น การเข้าถึง และความเกี่ยวข้องของบิตคอยน์ในฐานะสกุลเงินระดับโลก เรามุ่งมั่นที่จะดำเนินการในภูมิภาคที่การพัฒนา Bitcoin ยังไม่แพร่หลาย มีส่วนร่วมในการเติบโตและการกระจายอำนาจของเทคโนโลยีนี้
description: |
  비트러스트는 다음과 같은 사명을 가진 비영리 단체입니다
  gW-0 소프트웨어 개발을 탈중앙화하는 것을 목표로 합니다. 저희의 초점은
  개발자 인재를 육성하고 무료 오픈소스인
  Bitcoin 생태계를 지원하는 데 중점을 두고 있습니다.
  
  비트러스트는 탈중앙화가 복원력, 도달 범위,
  글로벌 통화로서 Bitcoin의 탄력성, 도달 범위 및 관련성을 향상시킨다고 믿습니다. 저희는 다음과 같이 운영하기 위해 최선을 다하고 있습니다
  gW-0 개발이 흔하지 않은 지역에서 기술의 성장에 기여하고
  기술의 성장과 탈중앙화에 기여하기 위해 노력하고 있습니다.
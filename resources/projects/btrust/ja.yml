description: |
  Btrustは、Bitcoinソフトウェアの開発を分散化することを使命とする非営利団体です。
  Bitcoinソフトウェアの開発を分散化することを使命とする非営利団体です。私たちの焦点は
  グローバル・サウスにおける開発者の才能を育成し、フリーでオープンソースの
  Bitcoinエコシステムを支援することです。
  
  Btrustでは、分散化がグローバル通貨としてのBitcoinの回復力、リーチ、妥当性を高めると信じています、
  そしてグローバル通貨としてのBitcoinの妥当性を高めると信じています。私たちは
  Bitcoinの開発が一般的でない地域で事業を展開し、技術の成長と分散化に貢献します。
  テクノロジーの成長と分散化に貢献します。
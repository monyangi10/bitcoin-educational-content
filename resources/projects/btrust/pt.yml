description: |
  Btrust é uma organização sem fins lucrativos com uma missão dedicada a descentralizar o desenvolvimento de software Bitcoin. O nosso foco está em promover talentos de desenvolvedores no sul global e apoiar o ecossistema livre e de código aberto Ecossistema Bitcoin.

  Na Btrust, acreditamos que a descentralização aumenta a resiliência, o alcance, e relevância do Bitcoin como uma moeda global. Estamos empenhados em operar em regiões onde o desenvolvimento do Bitcoin é incomum, contribuindo para o crescimento e descentralização da tecnologia.
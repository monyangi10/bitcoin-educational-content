description: |
  Btrust est une organisation à but non lucratif dont la mission est de
  décentraliser le développement des logiciels Bitcoin. Notre objectif est d'encourager
  développeurs talentueux dans les pays du Sud et à soutenir l'écosystème libre et gratuit de
  Bitcoin libre et gratuit.
  
  Chez Btrust, nous pensons que la décentralisation renforce la résilience, la portée et la pertinence de Bitcoin en tant que monnaie mondiale,
  et la pertinence de Bitcoin en tant que monnaie mondiale. Nous nous engageons à opérer
  dans les régions où le développement du Bitcoin est peu courant, contribuant ainsi à la croissance et à la décentralisation de la technologie
  et à la décentralisation de la technologie.
description: |
  Btrust es una organización sin ánimo de lucro con la misión de
  descentralizar el desarrollo de software Bitcoin. Nos centramos en fomentar
  talento de los desarrolladores en el sur global y apoyar el ecosistema libre y de código abierto de
  Libre y de código abierto.
  
  En Btrust creemos que la descentralización mejora la resistencia, el alcance y la relevancia de Bitcoin como moneda global,
  y relevancia de Bitcoin como moneda global. Nos comprometemos a operar
  en regiones donde el desarrollo de Bitcoin es poco común, contribuyendo al crecimiento
  y la descentralización de la tecnología.
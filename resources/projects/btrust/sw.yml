description: |
  Btrust ni shirika lisilo la faida lenye dhamira ya kujitolea kugawanya maendeleo ya programu ya Bitcoin. Lengo letu ni kukuza talanta ya wasanidi programu kusini mwa kimataifa na kusaidia chanzo huria na huria Mfumo ikolojia wa Bitcoin.

  Katika Btrust, tunaamini kwamba ugatuaji huongeza uthabiti, ufikiaji, na umuhimu wa Bitcoin kama sarafu ya kimataifa. Tumejitolea kufanya kazi katika maeneo ambayo maendeleo ya Bitcoin si ya kawaida, na hivyo kuchangia ukuaji na ugatuaji wa teknolojia.
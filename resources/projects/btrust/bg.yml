description: |
  Btrust е организация с нестопанска цел, чиято мисия е да да децентрализира разработването на софтуер Bitcoin. Нашият фокус е върху насърчаването на таланта на разработчиците в глобалния юг и подкрепа на свободния и отворен код Bitcoin екосистемата.

  В Btrust вярваме, че децентрализацията повишава устойчивостта, обхвата, и значението на биткойн като глобална валута. Ние се ангажираме да работим в региони, където развитието на Bitcoin е рядкост, като допринасяме за растежа на и децентрализацията на технологията.
description: |
  Btrust adalah organisasi nirlaba dengan misi khusus untuk mendesentralisasikan pengembangan perangkat lunak Bitcoin. Fokus kami adalah membina bakat pengembang di belahan dunia selatan dan mendukung ekosistem Ekosistem Bitcoin.

  Di Btrust, kami percaya bahwa desentralisasi meningkatkan ketahanan, jangkauan, dan relevansi Bitcoin sebagai mata uang global. Kami berkomitmen untuk beroperasi di wilayah di mana pengembangan Bitcoin tidak umum, berkontribusi pada pertumbuhan dan desentralisasi teknologi.
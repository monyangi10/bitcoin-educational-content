description: |
  Btrust on mittetulundusühing, mille missioon on järgmine detsentraliseerida Bitcoin tarkvara arendamist. Meie tähelepanu keskmes on edendada arendajate andeid globaalses lõunas ning toetada vaba ja avatud lähtekoodiga Bitcoin ökosüsteemi toetamine.

  Btrustis usume, et detsentraliseerimine suurendab vastupidavust, ulatust, gW-0 kui ülemaailmse valuuta tähtsust ja asjakohasust. Me oleme pühendunud tegutsema piirkondades, kus Bitcoin areng on ebatavaline, aidates kaasa kasvu ja tehnoloogia detsentraliseerimisele.
description: |
  Btrust är en ideell organisation med ett dedikerat uppdrag att decentralisera utvecklingen av Bitcoin-programvara. Vårt fokus ligger på att främja utvecklartalang i den globala södern och stödja den fria och öppna källkoden Bitcoin-ekosystemet med fri och öppen källkod.

  På Btrust tror vi att decentralisering förbättrar motståndskraften, räckvidden och relevansen av Bitcoin som en global valuta. Vi är fast beslutna att verka i regioner där Bitcoin-utveckling är ovanlig, vilket bidrar till tillväxten och decentralisering av tekniken.
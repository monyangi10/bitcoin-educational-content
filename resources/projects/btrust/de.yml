description: |
  Btrust ist eine gemeinnützige Organisation, die sich zum Ziel gesetzt hat
  die Entwicklung von Bitcoin-Software zu dezentralisieren. Unser Fokus liegt auf der Förderung von
  entwickler-Talente im globalen Süden zu fördern und das freie und Open-Source
  Bitcoin-Ökosystem.
  
  Wir bei Btrust glauben, dass die Dezentralisierung die Widerstandsfähigkeit, die Reichweite
  und Relevanz von Bitcoin als globale Währung. Wir verpflichten uns zur Tätigkeit
  in Regionen, in denen die Entwicklung von Bitcoin unüblich ist, und tragen so zum Wachstum
  und Dezentralisierung der Technologie beitragen.
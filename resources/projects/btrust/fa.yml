description: |
  Btrust یک سازمان غیرانتفاعی با مأموریت اختصاصی برای غیرمتمرکز کردن توسعه نرم‌افزار Bitcoin است. تمرکز ما بر پرورش استعدادهای توسعه‌دهنده در جنوب جهانی و حمایت از اکوسیستم آزاد و متن‌باز Bitcoin است.

  در Btrust، ما معتقدیم که غیرمتمرکزسازی، مقاومت، دسترسی و ارتباط Bitcoin به عنوان یک ارز جهانی را افزایش می‌دهد. ما متعهد به فعالیت در مناطقی هستیم که توسعه Bitcoin در آن‌ها غیرمعمول است و به رشد و غیرمتمرکزسازی این فناوری کمک می‌کنیم.
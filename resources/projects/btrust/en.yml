description: |
  Btrust is a non-profit organization with a dedicated mission to
  decentralize the development of Bitcoin software. Our focus is on fostering
  developer talent in the global south and supporting the free and open-source
  Bitcoin ecosystem.

  At Btrust, we believe that decentralization enhances the resilience, reach,
  and relevance of bitcoin as a global currency. We are committed to operating
  in regions where Bitcoin development is uncommon, contributing to the growth
  and decentralization of the technology.

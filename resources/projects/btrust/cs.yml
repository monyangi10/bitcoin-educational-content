description: |
  Btrust je nezisková organizace, jejímž posláním je
  decentralizovat vývoj softwaru Bitcoin. Zaměřujeme se na podporu
  vývojářských talentů v zemích globálního Jihu a na podporu svobodného a otevřeného zdrojového kódu
  Bitcoin ekosystému.
  
  Ve společnosti Btrust věříme, že decentralizace zvyšuje odolnost, dosah,
  a význam Bitcoin jako globální měny. Jsme odhodláni provozovat
  v regionech, kde je rozvoj Bitcoin neobvyklý, a přispívat tak k růstu globální měny
  a decentralizaci této technologie.
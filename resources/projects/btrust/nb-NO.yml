description: |
  Btrust er en ideell organisasjon med et dedikert oppdrag om å desentralisere utviklingen av Bitcoin-programvare. Vårt fokus er på å fremme utviklertalenter i det globale sør og støtte det frie og åpen-kildekode Bitcoin-økosystemet med fri og åpen kildekode.

  Hos Btrust mener vi at desentralisering forbedrer motstandsdyktigheten, rekkevidden og relevansen til Bitcoin som en global valuta. Vi er forpliktet til å operere i regioner der Bitcoin-utvikling er uvanlig, og bidrar til vekst og desentralisering av og desentralisering av teknologien.
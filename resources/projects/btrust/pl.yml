description: |
  Btrust jest organizacją non-profit, której misją jest zdecentralizowanie rozwoju oprogramowania Bitcoin decentralizacji rozwoju oprogramowania Bitcoin. Skupiamy się na wspieraniu deweloperów na globalnym południu i wspieraniu wolnego i otwartego ekosystemu Ekosystemu Bitcoin.

  W Btrust wierzymy, że decentralizacja zwiększa odporność, zasięg, i znaczenie Bitcoin jako globalnej waluty. Jesteśmy zobowiązani do działania w regionach, w których rozwój Bitcoin jest rzadkością, przyczyniając się do wzrostu i decentralizacji tej technologii.
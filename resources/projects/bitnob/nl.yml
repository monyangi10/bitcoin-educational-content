description: |
  Bitnob maakt gebruik van de Lightning Network om grensoverschrijdende geldtransfers te vereenvoudigen, vooral in Afrika. De CEO van Bitnob wijst erop dat het versturen van $10 naar huis in Nigeria nu net zo eenvoudig is als het kopen van een koffie in de VS, waardoor de hoge kosten en lange wachttijden van traditionele overboekingsdiensten worden verminderd.
  
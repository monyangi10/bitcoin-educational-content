description: |
  Bitnob използва Lightning Network, за да опрости трансграничните парични преводи, особено в Африка. Главният изпълнителен директор на компанията посочва, че изпращането на 10 долара у дома в Нигерия вече е толкова лесно, колкото и купуването на кафе в САЩ, което намалява високите разходи и дългите срокове, характерни за традиционните услуги за парични преводи.
  
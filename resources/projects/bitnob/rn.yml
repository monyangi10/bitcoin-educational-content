description: |
  Bitnob ikoresha Lightning Network kugira ngo yorohereze amahera yoherezwa mu bindi bihugu, cane cane muri Afirika. Umuyobozi wayo yerekana ko kwohereza amadolari 10 muhira muri Nijeriya ubu vyoroshe nk’ugugura ikawa muri U.S., bikagabanya amahera menshi n’igihe kirekire gisanzwe mu bikorwa vya kera vyo kohereza amahera.
  
description: |
  Iri shirahamwe rifise uruhara runini mu gutanguza no gutegura kwemeza amasezerano ya RGB Smart contract n’ibidukikije vyayo. Ikora nk’ishirahamwe ry’Ubusuwisi ritagira inyungu hakurikijwe ingingo ya 40 y’Itegeko Nshinga ry’Ubusuwisi kandi rirongorwa n’abanywanyi baryo be n’abantu batowe na bo.
  
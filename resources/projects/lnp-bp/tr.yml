description: |
  Bu kuruluş, RGB Smart contract protokolünün ve ekosisteminin benimsenmesinin başlatılması ve geliştirilmesinde önemli bir rol oynamaktadır. İsviçre Medeni Kanunu'nun 40. Maddesi uyarınca kar amacı gütmeyen bir İsviçre derneği olarak faaliyet gösterir ve üyeleri ve onlar tarafından seçilen kişiler tarafından yönetilir.
  
description: |
  Deze organisatie speelt een belangrijke rol in de lancering en ontwikkeling van de adoptie van het RGB Smart contract protocol en haar ecosysteem. Ze werkt als een Zwitserse vereniging zonder winstoogmerk in overeenstemming met artikel 40 van het Zwitserse Burgerlijk Wetboek en wordt bestuurd door haar leden en de door hen gekozen personen.
  
description: |
  Тази организация играе важна роля за стартирането и развитието на приемането на протокола за интелигентни договори RGB и неговата екосистема. Тя функционира като швейцарска асоциация с нестопанска цел в съответствие с член 40 от Швейцарския граждански кодекс и се управлява от своите членове и избраните от тях лица.
  
description: |
  Bitcoin Indoneziya ni umugambi w’aba Bitcoin gusa wiyemeje guha ubushobozi Indoneziya biciye mu gutanga inyigisho ku buntu kandi zifunguye, kwubaka imiryango yo mu karere, no guteza imbere ubutunzi buzunguruka (closed-loop-system). Turakira amakoraniro arenga 20 buri kwezi mu gihugu cose, turatanga inyigisho ku mashure no muri kaminuza, turafise ikibanza c’uburezi co kuri internet, turagira amahugurwa adasanzwe kuri Bitcoin House Bali, n’ibindi vyinshi. Na Bitcoin House Bali, turatanga ikibanza c’umubiri ku muntu wese ashaka kwiga no kumenya Bitcoin mu buzima nyakuri. Ni ahantu heza ho kubaza ibibazo, kugerageza ibikoresho, gukodesha ibitabu, guhura n’abantu bafise ivyiyumviro nk’ivyawe, kuja mu mahugurwa y’ibikorwa, kugura Bitcoin, n’ibindi. amafaranga y’ubuhinga bwa none, Fediminti, na Nostr). Intumbero yacu ni ugutuma Bitcoin ishobora gushikirwa n’abantu bose bo muri Indoneziya no gutuma habaho uturyo twinshi two gukorana n’abandi no kwiga.
  
description: |
  Bitcoin Indonesië is een Bitcoin-only initiatief dat zich richt op het versterken van Indonesië door middel van Bitcoin, door het aanbieden van gratis en open-source onderwijs, het opbouwen van lokale gemeenschappen en het bevorderen van een circulaire economie (gesloten kringloopsysteem). We organiseren meer dan 20 maandelijkse meetups in het hele land, geven presentaties op scholen en universiteiten, hebben een online onderwijshub, organiseren regelmatig workshops in het Bitcoin Huis Bali en nog veel meer. Met het Bitcoin Huis Bali bieden we een fysieke ruimte voor iedereen die geïnteresseerd is in het leren en ervaren van Bitcoin in het echt. Het is een veilige ruimte om vragen te stellen, hardware uit te proberen, boeken te huren, gelijkgestemden te ontmoeten, deel te nemen aan hands-on workshops, Bitcoin te kopen, enz. Ons doel is om mensen de tools te geven voor economische empowerment, financiële mensenrechten te ondersteunen, financiële onderdrukking te overwinnen en hen toegang te geven tot vrijheidstechnologieën (d.w.z. Bitcoin, Lightning, e-cash, Fedimint en Nostr). Onze missie is om Bitcoin gemakkelijk toegankelijk te maken voor iedereen in Indonesië en om zoveel mogelijk contactpunten en leermogelijkheden te creëren.
  
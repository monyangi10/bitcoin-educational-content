description: |
  Bitcoin Indonesia เป็นโครงการที่มุ่งเน้นเฉพาะ Bitcoin ที่อุทิศตนเพื่อเสริมสร้างศักยภาพให้กับอินโดนีเซียผ่าน Bitcoin โดยการให้การศึกษาแบบเปิดและฟรี สร้างชุมชนท้องถิ่น และส่งเสริมเศรษฐกิจหมุนเวียน (ระบบปิดลูป) เราจัดการพบปะกว่า 20 ครั้งต่อเดือนทั่วประเทศ ให้การนำเสนอในโรงเรียนและมหาวิทยาลัย มีศูนย์การศึกษาออนไลน์ จัดเวิร์กช็อปเป็นประจำที่ Bitcoin House Bali และอื่นๆ อีกมากมาย ด้วย Bitcoin House Bali เรามอบพื้นที่จริงสำหรับทุกคนที่สนใจเรียนรู้และสัมผัสประสบการณ์ Bitcoin ในชีวิตจริง เป็นพื้นที่ปลอดภัยสำหรับการถามคำถาม ทดลองฮาร์ดแวร์ เช่าหนังสือ พบปะผู้คนที่มีความคิดเหมือนกัน เข้าร่วมเวิร์กช็อปที่ลงมือทำ ซื้อบิตคอยน์ ฯลฯ เรามุ่งหวังที่จะมอบเครื่องมือสำหรับการเสริมสร้างศักยภาพทางเศรษฐกิจ สนับสนุนสิทธิมนุษยชนทางการเงิน เอาชนะการกดขี่ทางการเงิน และให้พวกเขาเข้าถึงเทคโนโลยีเสรีภาพ (เช่น Bitcoin, Lightning, e-cash, Fedimint, และ Nostr) ภารกิจของเราคือทำให้ Bitcoin เข้าถึงได้ง่ายสำหรับทุกคนในอินโดนีเซียและสร้างจุดสัมผัสและโอกาสในการเรียนรู้ให้มากที่สุดเท่าที่จะเป็นไปได้
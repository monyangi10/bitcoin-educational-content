description: |
  Bitcoin Endonezya, ücretsiz ve açık kaynaklı eğitim sağlayarak, yerel topluluklar oluşturarak ve döngüsel bir ekonomiyi (kapalı döngü sistemi) teşvik ederek Endonezya'yı Bitcoin aracılığıyla güçlendirmeye adanmış, yalnızca Bitcoin'a özel bir girişimdir. Ülke çapında 20'den fazla aylık buluşmaya ev sahipliği yapıyoruz, okullarda ve üniversitelerde sunumlar yapıyoruz, çevrimiçi bir eğitim merkezimiz var, Bitcoin House Bali'de düzenli atölyeler düzenliyoruz ve çok daha fazlasını yapıyoruz. Bitcoin House Bali ile, Bitcoin'ı gerçek hayatta öğrenmek ve deneyimlemek isteyen herkes için fiziksel bir alan sağlıyoruz. Burası soru sormak, donanım denemek, kitap kiralamak, benzer düşünen insanlarla tanışmak, uygulamalı atölyelere katılmak, Bitcoin satın almak vb. için güvenli bir alan. İnsanlara ekonomik güçlenme için araçlar vermeyi, finansal insan haklarını desteklemeyi, finansal baskının üstesinden gelmeyi ve özgürlük teknolojilerine (yani Bitcoin, Lightning, e-cash, Fedimint ve Nostr) erişmelerini sağlamayı amaçlıyoruz. Misyonumuz, Bitcoin'ı Endonezya'daki herkes için kolayca erişilebilir kılmak ve mümkün olduğunca çok temas noktası ve öğrenme fırsatı yaratmaktır.
  
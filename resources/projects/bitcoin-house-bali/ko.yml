description: |
  Bitcoin 인도네시아는 무료 오픈소스 교육을 제공하고, 지역 커뮤니티를 구축하며, 순환 경제(폐쇄 루프 시스템)를 육성함으로써 Bitcoin을 통해 인도네시아의 역량을 강화하는 데 전념하는 Bitcoin 전용 이니셔티브입니다. 전국에서 매월 20회 이상의 밋업을 주최하고, 학교와 대학에서 프레젠테이션을 진행하며, 온라인 교육 허브를 운영하고, Bitcoin 하우스 발리에서 정기적인 워크숍을 운영하는 등 다양한 활동을 하고 있습니다. Bitcoin 하우스 발리는 Bitcoin을 실제로 배우고 경험하는 데 관심이 있는 모든 사람에게 물리적 공간을 제공합니다. 질문하고, 하드웨어를 사용해보고, 책을 대여하고, 같은 생각을 가진 사람들을 만나고, 실습 워크숍에 참여하고, Bitcoin을 구매하는 등의 활동을 할 수 있는 안전한 공간입니다. 저희는 사람들에게 경제적 역량 강화를 위한 도구를 제공하고, 금융 인권을 지원하고, 금융 억압을 극복하고, 자유 기술(예: Bitcoin, 라이트닝, 전자 현금, 페디민트, 노스트르)에 대한 접근성을 제공하는 것을 목표로 합니다. 저희의 임무는 인도네시아의 모든 사람이 Bitcoin에 쉽게 접근할 수 있도록 하고 가능한 한 많은 접점과 학습 기회를 만드는 것입니다.
  
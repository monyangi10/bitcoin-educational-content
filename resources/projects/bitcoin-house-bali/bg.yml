description: |
  Bitcoin Индонезия е инициатива, посветена само на Bitcoin, за овластяване на Индонезия чрез Bitcoin чрез предоставяне на безплатно образование с отворен код, изграждане на местни общности и насърчаване на кръгова икономика (затворена система). Организираме над 20 месечни срещи в цялата страна, изнасяме презентации в училища и университети, имаме онлайн образователен център, провеждаме редовни семинари в Bitcoin House Bali и много други. С Bitcoin House Bali осигуряваме физическо пространство за всички, които се интересуват от обучение и преживяване на Bitcoin в реалния живот. Това е безопасно място, където можете да задавате въпроси, да изпробвате хардуер, да наемате книги, да се срещате със съмишленици, да участвате в практически семинари, да купувате биткойни и т.н. Целта ни е да дадем на хората инструменти за икономическо овластяване, да подкрепим финансовите права на човека, да преодолеем финансовата репресия и да им дадем достъп до технологиите за свобода (т.е. Bitcoin, Lightning, e-cash, Fedimint и Nostr). Нашата мисия е да направим Bitcoin лесно достъпна за всички в Индонезия и да създадем възможно най-много допирни точки и възможности за обучение.
  
description: |
  sMiles belönar användarnas aktivitet och uppmärksamhet med bråkdelar av Bitcoin som kallas Sats. Det finns 100 miljoner Sats i en Bitcoin. Och det kommer bara att finnas 21 miljoner Bitcoin för alltid. Tjäna Sats med sMiles och bli en Bitcoiner. Ta ut dina belöningar till valfri Lightning Wallet.
description: |
  sMiles ihemba ibikorwa vy'abakoresha n'ukwitwararika n'imice ya Bitcoin yitwa Sats.
  Hariho ama Sats miliyoni 100 muri Bitcoin imwe. Kandi hazoba gusa ama Bitcoin miliyoni 21 ibihe bidahera. Uronke Sats na sMiles maze ube umunya Bitcoin. Kura ingororano zawe ku Muravyo Wallet uwo ari wo wose.
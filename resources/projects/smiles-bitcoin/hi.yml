description: |
  sMiles उपयोगकर्ता की गतिविधि और ध्यान को Bitcoin के अंशों के साथ पुरस्कृत करता है जिसे Sats कहा जाता है। एक Bitcoin में 100 मिलियन Sats होते हैं। और हमेशा के लिए केवल 21 मिलियन Bitcoin ही रहेंगे। sMiles के साथ Sats कमाएँ और बिटकॉइनर बनें। अपने पुरस्कारों को किसी भी लाइटनिंग Wallet में वापस ले लें।
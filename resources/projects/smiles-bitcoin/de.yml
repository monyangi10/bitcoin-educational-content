description: |
  sMiles belohnt die Aktivität und Aufmerksamkeit der Nutzer mit Bruchteilen von Bitcoin, die Sats genannt werden. In einem Bitcoin sind 100 Millionen Sats enthalten. Und es wird für immer nur 21 Millionen Bitcoin geben. Verdienen Sie Sats mit sMiles und werden Sie ein Bitcoiner. Ziehen Sie Ihre Belohnungen auf ein beliebiges Lightning Wallet ab.
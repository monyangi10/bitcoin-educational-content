description: |
  sMiles belønner brukeraktivitet og oppmerksomhet med brøkdeler av Bitcoin, kalt Sats. Det er 100 millioner Sats i én Bitcoin. Og det vil bare være 21 millioner Bitcoin for alltid. Tjen Sats med sMiles og bli en Bitcoiner. Ta ut belønningene dine til en hvilken som helst Lightning Wallet.
description: |
  sMiles ricompensa l'attività e l'attenzione degli utenti con frazioni di Bitcoin chiamate Sats. Ci sono 100 milioni di Sats in un Bitcoin. E ci saranno solo 21 milioni di Bitcoin per sempre. Guadagna Sats con sMiles e diventa un Bitcoiner. Preleva i tuoi premi in qualsiasi Lightning Wallet.
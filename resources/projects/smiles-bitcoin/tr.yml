description: |
  sMiles, kullanıcı aktivitesini ve dikkatini Bitcoin'ın Sats adı verilen kesirleriyle ödüllendirir. Bir Bitcoin'da 100 milyon Sats vardır. Ve sonsuza kadar sadece 21 milyon Bitcoin olacak. SMiles ile Sats kazanın ve bir Bitcoiner olun. Ödüllerinizi herhangi bir Lightning Wallet'e çekin.
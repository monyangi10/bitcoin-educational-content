description: |
  sMiles вознаграждает активность и внимание пользователя долями Bitcoin, называемыми Sats. В одном Bitcoin содержится 100 миллионов Sats. И навсегда останется только 21 миллион Bitcoin. Зарабатывайте Sats с помощью sMiles и становитесь биткойнером. Выводите свои вознаграждения на любую молнию Wallet.
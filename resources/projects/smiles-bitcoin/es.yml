description: |
  sMiles recompensa la actividad y la atención del usuario con fracciones de Bitcoin denominadas Sats. Hay 100 millones de Sats en un Bitcoin. Y sólo habrá 21 millones de Bitcoin para siempre. Gana Sats con sMiles y conviértete en un Bitcoiner. Retira tus recompensas a cualquier Wallet de Lightning.
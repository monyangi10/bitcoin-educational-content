description: |
  sMiles palkitsee käyttäjän aktiivisuuden ja huomion Bitcoin:n murto-osilla, joita kutsutaan Sats:ksi. Yhdessä Bitcoin:ssa on 100 miljoonaa Sats:ta. Ja ikuisesti on vain 21 miljoonaa Bitcoin. Ansaitse Sats sMilesilla ja tule Bitcoineriksi. Nosta palkkiosi mihin tahansa Lightning Wallet:een.
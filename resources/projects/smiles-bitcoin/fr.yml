description: |
  sMiles récompense l'activité et l'attention des utilisateurs par des fractions de Bitcoin appelées Sats. Il y a 100 millions de Sats dans une Bitcoin. Et il n'y aura que 21 millions de Bitcoin pour toujours. Gagnez des Sats avec sMiles et devenez un Bitcoiner. Retirez vos récompenses sur n'importe quel Lightning Wallet.
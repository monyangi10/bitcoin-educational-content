description: |
  Incuro zine ku mwaka, Wolf azana umugwi w’abashinze n’imigwi batoranijwe bava hirya no hino kw’isi, umwe wese asunika imbibe za Bitcoin, mu gisagara ca New York mu kiringo c’indwi umunani kugira ngo yubake, asubiremwo, kandi agwize. Mu buryo butari kure gusa, turarema vyinshi iyo turi kumwe. Wolf iri ku metero 1.200 hejuru mu kirere, ikaba ishobora kubona igisagara ca New York mu buryo bwa degre 360, ni kimwe mu bibanza bitera intege cane umuntu yokoreramwo.
  
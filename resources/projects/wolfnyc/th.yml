description: |
  ปีละสี่ครั้ง Wolf จะนำกลุ่มผู้ก่อตั้งและทีมที่คัดสรรจากทั่วโลก ซึ่งแต่ละทีมกำลังผลักดันขอบเขตของ Bitcoin มาที่นิวยอร์กซิตี้เป็นเวลาแปดสัปดาห์เพื่อสร้าง สร้างซ้ำ และขยายขนาด เฉพาะที่ไม่ใช่การทำงานระยะไกล เราสร้างสรรค์มากขึ้นเมื่อเราอยู่ด้วยกัน บนความสูง 1,200 ฟุตจากพื้นดิน พร้อมทิวทัศน์ 360 องศาของนิวยอร์กซิตี้ Wolf เป็นหนึ่งในสถานที่ทำงานที่สร้างแรงบันดาลใจมากที่สุดที่สามารถจินตนาการได้
description: |
  Vier keer per jaar brengt Wolf een selecte groep oprichters en teams van over de hele wereld, die elk de grenzen van Bitcoin verleggen, acht weken naar New York City om te bouwen, itereren en schalen. Exclusively Non-Remote, we creëren meer als we samen zijn. op 1.200 voet hoogte, met een 360-graden uitzicht over New York City, is Wolf een van de meest inspirerende werkplekken die je je kunt voorstellen.
  
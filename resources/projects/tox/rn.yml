description: |
  Itegeko ry’ubuntu, ry’uguhanahana amakuru ry’ubuntu, ryagenewe gutanga ubundi buryo butekanye bwo guhanahana amakuru mu buryo butekanye. Tox ikora ku buryo bw’urunganwe, ishobora gutuma umuntu ashobora gutanga ubutumwa ubwo nyene, guhamagara n’ijwi, gukorana n’amasanamu no gutanga amadosiye, mu gihe itanga ibanga ry’uguhanahana amakuru biciye ku nzira y’ugushiramwo amakuru ishingiye kuri libsodium. Tox yavutse mu 2013 inyuma y’ivyo Edward Snowden yerekanye, ifise intumbero yo gutanga ubutumwa bworoshe, bushingiye ku bwiherero biciye ku nyubakwa zitandukanye n’abaguzi bashobora gukoresha imbuga zitandukanye.
description: |
  Een vrij, gedecentraliseerd protocol voor versleutelde communicatie, ontworpen om een veilig alternatief te bieden voor gecentraliseerde diensten. Tox werkt op peer-to-peer basis en maakt instant messaging, spraakoproepen, videoconferenties en bestandsoverdracht mogelijk, terwijl de vertrouwelijkheid van de uitwisselingen wordt gegarandeerd dankzij end-to-end encryptie op basis van libsodium. Tox werd in 2013 geboren in de nasleep van de onthullingen van Edward Snowden en heeft als doel eenvoudige, privacy-vriendelijke communicatie te bieden via een modulaire architectuur en cross-platform clients.
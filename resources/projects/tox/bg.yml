description: |
  Безплатен децентрализиран протокол за криптирана комуникация, създаден да предложи сигурна алтернатива на централизираните услуги. Tox работи на принципа "от връстници към връстници", като дава възможност за незабавни съобщения, гласови повиквания, видеоконференции и прехвърляне на файлове, като същевременно гарантира поверителността на обмена благодарение на криптирането от край до край, базирано на libsodium. Създаден през 2013 г. след разкритията на Едуард Сноудън, Tox има за цел да предложи проста, съобразена с поверителността комуникация чрез модулна архитектура и клиенти за различни платформи.
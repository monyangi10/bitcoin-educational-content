description: |
  โปรโตคอลแบบกระจายศูนย์ที่ให้บริการการสื่อสารแบบเข้ารหัสฟรี ออกแบบมาเพื่อเสนอทางเลือกที่ปลอดภัยแทนบริการแบบศูนย์กลาง Tox ทำงานบนพื้นฐานแบบเพียร์ทูเพียร์ ช่วยให้สามารถส่งข้อความโต้ตอบแบบทันที โทรด้วยเสียง ประชุมทางวิดีโอ และโอนย้ายไฟล์ ในขณะที่รับประกันความลับของการแลกเปลี่ยนข้อมูลด้วยการเข้ารหัสแบบปลายทางถึงปลายทางที่ใช้ libsodium เกิดขึ้นในปี 2013 ภายหลังการเปิดเผยของ Edward Snowden Tox มุ่งหวังที่จะเสนอการสื่อสารที่ง่ายและเป็นมิตรต่อความเป็นส่วนตัวผ่านสถาปัตยกรรมแบบโมดูลาร์และไคลเอนต์ที่รองรับหลายแพลตฟอร์ม
description: |
  Geyser Fund is een investeringsvehikel gewijd aan het voeden van innovatie binnen de Bitcoin en Lightning ecosystemen. Het verschaft strategisch kapitaal en ondersteuning aan startups en ontwikkelaars die vooruitstrevende betalingsoplossingen en infrastructuurprojecten bouwen, en helpt zo de adoptie en evolutie van op Bitcoin gebaseerde technologieën te versnellen
  
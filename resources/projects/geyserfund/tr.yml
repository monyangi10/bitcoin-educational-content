description: |
  Geyser Fund, Bitcoin ve Lightning ekosistemlerinde inovasyonu beslemeye adanmış bir yatırım aracıdır. En yeni ödeme çözümleri ve altyapı projeleri geliştiren girişimlere ve geliştiricilere stratejik sermaye ve destek sağlayarak Bitcoin tabanlı teknolojilerin benimsenmesini ve gelişimini hızlandırmaya yardımcı olur
  
description: |
  Geyser Fund ni ikinyabiziga c’ishoramari kijejwe kugaburira ubuhinga bushasha mu bidukikije vya Bitcoin na Lightning. Itanga umutungo w’ingenzi n’infashanyo ku bigo bitangura n’abategura ivy’ubuhinga bubaka inyishu z’ubuhinga bwa none zo kwishura n’imigambi y’ibikorwa remezo, bifasha kwihutisha kwemera no gutera imbere kw’ubuhinga bushingiye kuri Bitcoin .
  
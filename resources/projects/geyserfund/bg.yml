description: |
  Geyser Fund е инвестиционен инструмент, посветен на насърчаването на иновациите в екосистемите на биткойн и Lightning. Той предоставя стратегически капитал и подкрепа на стартъпи и разработчици, които изграждат авангардни платежни решения и инфраструктурни проекти, като спомага за ускоряване на приемането и развитието на технологиите, базирани на биткойн
  
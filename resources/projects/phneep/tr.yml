description: |
  Eskiden sınıfın soytarısıydım, sınıfın önündeki otoriteyi güldürmek için uğraşırdım. Çalışmalarımın çoğu aslında var olan sanat eserlerini karıştırmak veya kompozit yapmakla ilgili. Görünüşe göre bu kombinasyon, sinizmimi kontrol altında tutmaya yardımcı olan ve belki de bu arada başkalarını eğlendiren veya eğiten bir hiciv biçimiyle sonuçlandı.
description: |
  ฉันเคยเป็นตัวตลกประจำชั้นที่มองหาความขบขันโดยแลกกับการท้าทายอำนาจที่อยู่หน้าห้องเรียน งานส่วนใหญ่ของฉันจริงๆ แล้วเกี่ยวกับการผสมผสานงานศิลปะที่มีอยู่หรือการสร้างงานผสมผสาน ดังนั้นการรวมกันนี้ดูเหมือนจะส่งผลให้เกิดรูปแบบของการเสียดสีที่ช่วยควบคุมความเหยียดหยามของฉัน และเฮ้ บางทีอาจทำให้คนอื่นๆ ขบขันหรือให้ความรู้ระหว่างทาง
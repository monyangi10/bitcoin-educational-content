description: |
  Vroeger was ik de clown van de klas, op zoek naar een lach ten koste van de autoriteit vooraan in de klas. Het meeste van mijn werk is eigenlijk het mixen van bestaande kunstwerken of het maken van composities. Dus de combinatie lijkt te hebben geresulteerd in een vorm van satire die helpt mijn cynicisme in toom te houden, en hé, misschien amuseert of onderwijst het ook anderen.
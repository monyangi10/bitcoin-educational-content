description: |
  Бях клоунът в класа, който се опитваше да се смее за сметка на авторитета в предната част на стаята. Повечето от моите работи се състоят в смесване на съществуващи произведения на изкуството или в създаването на композити. Така че комбинацията изглежда е довела до форма на сатира, която ми помага да държа цинизма си под контрол, а може би и да забавлява или обучава другите.
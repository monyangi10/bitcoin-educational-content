description: |
  Nahora ndi umunyamigani wo mw’ishure arondera ibitwenge kubera ubukuru buri imbere mu cumba. Ivyinshi mu bikorwa vyanje ni ivyo gukora ibishushanyo vy’ubuhinga biriho canke gukora ibintu bihuriweko. Rero, iyo combo isa n’iyatumye habaho uburyo bwo gutwenga bufasha kuguma umuntu afise ubupfumu, kandi hey, kumbure biratwenga canke bigatuma abandi bigisha.
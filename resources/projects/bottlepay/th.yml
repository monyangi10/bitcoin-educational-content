description: |
  Bottlepay เป็นแพลตฟอร์มการเงินดิจิทัลที่ใช้ Lightning Network เพื่อให้การทำธุรกรรมบิตคอยน์เป็นไปอย่างรวดเร็วทั่วโลก แพลตฟอร์มนี้ทำให้การซื้อขายบิตคอยน์ง่ายขึ้น โดยมีการตั้งค่าที่รวดเร็วและตรงไปตรงมา เส้นทางการชำระเงินที่ปรับแต่งได้ และความสามารถในการซื้อและขายบิตคอยน์ในธุรกรรมเดี่ยวหรือแบบต่อเนื่อง Bottlepay รองรับการฝากเงินทันทีผ่าน Open Banking และ SEPA Instant ในขณะที่สามารถชำระเงินโดยตรงจากยอดคงเหลือ GBP หรือ EUR ไปยังที่อยู่บิตคอยน์ใด ๆ นอกจากนี้ยังแนะนำ 'Lightning Address' ที่เป็นนวัตกรรมใหม่ ทำให้การส่งและรับบิตคอยน์ง่ายเหมือนการส่งอีเมล แม้จะมีคุณสมบัติขั้นสูง แต่ Bottlepay ได้ประกาศปิดแอปของตนเมื่อเร็ว ๆ นี้
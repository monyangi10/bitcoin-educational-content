description: |
  보틀페이는 Lightning Network을 사용해 전 세계에서 즉시 Bitcoin를 거래할 수 있는 디지털 금융 플랫폼입니다. 이 플랫폼은 빠르고 간단한 설정, 사용자 지정 가능한 결제 경로, 단일 또는 반복 거래로 Bitcoin를 사고 팔 수 있는 기능을 제공하여 Bitcoin 거래를 간소화합니다. 보틀페이는 오픈 뱅킹과 SEPA 인스턴트를 통해 즉시 입금을 지원하며, GBP 또는 EUR 잔액에서 모든 Bitcoin Address로 직접 결제할 수 있습니다. 또한 혁신적인 '라이트닝 Address'을 도입하여 Bitcoin 송금 및 수신 프로세스를 이메일 전송만큼 쉽게 만들었습니다. 이러한 고급 기능에도 불구하고 최근 Bottlepay는 앱 서비스 종료를 발표했습니다.
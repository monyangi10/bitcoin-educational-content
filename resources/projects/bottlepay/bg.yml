description: |
  Bottlepay е цифрова финансова платформа, която използва Lightning Network, за да позволи незабавни транзакции с биткойни в световен мащаб. Платформата опростява търговията с биткойни, като предлага бързи и лесни настройки, персонализирани маршрути за плащане и възможност за покупка и продажба на биткойни в единични или повтарящи се сделки. Bottlepay поддържа незабавни депозити чрез Open Banking и SEPA Instant, като същевременно дава възможност за директни плащания от салда в британски лири или евро към всеки биткойн адрес. Тя въвежда и иновативната "Lightning Address", която прави процеса на изпращане и получаване на биткойн толкова лесен, колкото изпращането на имейл. Въпреки усъвършенстваните си функции Bottlepay наскоро обяви затварянето на приложението си.
description: |
  Bottlepay ni urubuga rw’ivy’ubutunzi rw’ubuhinga bwa none rukoresha Lightning Network kugira ngo rushobore gukoresha amafaranga y’ubuhinga bwa none (Bitcoin) kw’isi yose. Iryo koraniro ryorosha ubudandaji bwa Bitcoin, ritanga uburyo bwo gutunganya ibintu vyihuta kandi bigororotse, inzira zo kwishura zishobora guhindurwa, n’ubushobozi bwo kugura no kugurisha Bitcoin mu bucuruzi bumwe canke busubiramwo. Bottlepay ifasha mu gushiramwo amahera vuba biciye mu banki yuguruye na SEPA Instant, mu gihe ishobora kwishura ataco ihinduye kuva ku giciro ca GBP canke EUR ku Bitcoin Address iyo ari yo yose. Irazana kandi ubuhinga bushasha bwitwa ‘Lightning Address,’ butuma uburyo bwo kohereza no kwakira Bitcoin bworoha nk’uko wohereza ubutumwa kuri e-mail. Naho ifise ibintu vyiza cane, Bottlepay iherutse gutangaza ko izofunga app yayo.
description: |
  Bottlepay is een digitaal financieel platform dat de Lightning Network gebruikt om wereldwijd directe Bitcoin transacties mogelijk te maken. Het platform vereenvoudigt de handel in Bitcoin en biedt snelle en eenvoudige setups, aanpasbare betalingsroutes en de mogelijkheid om Bitcoin te kopen en verkopen in eenmalige of terugkerende transacties. Bottlepay ondersteunt onmiddellijke stortingen via Open Banking en SEPA Instant, terwijl directe betalingen van GBP of EUR saldi naar elke Bitcoin Address mogelijk zijn. Het introduceert ook de innovatieve 'Lightning Address', waardoor het verzenden en ontvangen van Bitcoin net zo eenvoudig wordt als het versturen van een e-mail. Ondanks de geavanceerde functies heeft Bottlepay onlangs de sluiting van zijn app aangekondigd.
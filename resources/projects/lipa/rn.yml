description: |
  Sosiyete y’Ubusuwisi yizeye mu kwishura Bitcoin, ifise intumbero yo gutuma umwidegemvyo w’amahera ushikira umuntu wese. Yashinzwe mu 2020 n’abantu batatu bakunda Bitcoin, Lipa itegura uburyo bushasha bwo kwishura bushingiye kuri Lightning Network. Wallet yayo, Lipa Wallet, iratuma umuntu ashobora kwishura ubwo nyene, ata nkomanzi, kandi ata n’umwe amufasha mu gihe ashobora gutuma amafaranga akora ataco akora.
  
description: |
  Zwitsers bedrijf gespecialiseerd in Bitcoin betalingen, met een missie om financiële vrijheid voor iedereen toegankelijk te maken. Lipa werd in 2020 opgericht door drie Bitcoin enthousiastelingen en ontwikkelt innovatieve betaaloplossingen gebaseerd op de Lightning Network. Zijn Wallet, Lipa Wallet, maakt onmiddellijke, veilige betalingen zonder tussenpersonen mogelijk, terwijl de privacy van de transactie gewaarborgd blijft.
  
description: |
  บริษัทสวิสที่เชี่ยวชาญด้านการชำระเงิน Bitcoin โดยมีภารกิจในการทำให้เสรีภาพทางการเงินเข้าถึงได้สำหรับทุกคน ก่อตั้งขึ้นในปี 2020 โดยผู้ที่ชื่นชอบ Bitcoin สามคน Lipa พัฒนานวัตกรรมการชำระเงินที่ใช้เทคโนโลยี Lightning Network ซึ่ง wallet, Lipa Wallet ช่วยให้การชำระเงินเป็นไปอย่างรวดเร็ว ปลอดภัย และไม่มีตัวกลาง พร้อมทั้งรับประกันความเป็นส่วนตัวของการทำธุรกรรม
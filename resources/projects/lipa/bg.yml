description: |
  Швейцарска компания, специализирана в плащанията с Bitcoin, с мисия да направи финансовата свобода достъпна за всеки. Основана през 2020 г. от трима ентусиасти на Bitcoin, Lipa разработва иновативни платежни решения, базирани на Lightning Network. Нейната wallet, Lipa Wallet, дава възможност за незабавни, сигурни и без посредници плащания, като същевременно гарантира поверителността на трансакциите.
  
description: |
  Finansal özgürlüğü herkes için erişilebilir kılma misyonuyla Bitcoin ödemelerinde uzmanlaşmış İsviçreli şirket. 2020 yılında üç Bitcoin meraklısı tarafından kurulan Lipa, Lightning Network'a dayalı yenilikçi ödeme çözümleri geliştirmektedir. Wallet, Lipa Wallet, işlem gizliliğini sağlarken anında, güvenli ve aracısız ödemelere olanak tanır.
  
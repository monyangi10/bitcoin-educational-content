description: |
   BitDevs Goma, Bitcoin, kriptografi ve merkezi olmayan protokoller meraklılarını bir araya getiren açık bir topluluktur. Geliştiricileri, araştırmacıları, girişimcileri ve meraklıları düzenli olarak bir araya getirerek Bitcoin etrafında araştırma ve geliştirmeyi teşvik eder. Toplantıları, Bitcoin'ın teknik yönlerini derinlemesine keşfetmek, ekosistemdeki en son gelişmeleri tartışmak ve özgür yazılıma yerel bir katkı kültürünü güçlendirmek için bir fırsattır.
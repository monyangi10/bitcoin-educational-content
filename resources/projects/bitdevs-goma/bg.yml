description: |
   BitDevs Goma е отворена общност, която обединява ентусиастите на Bitcoin, криптографията и децентрализираните протоколи. Тя насърчава изследванията и разработките около Bitcoin, като редовно събира разработчици, изследователи, предприемачи и любопитни. Срещите ѝ са възможност за задълбочено проучване на техническите аспекти на Bitcoin, обсъждане на последните постижения в екосистемата и укрепване на местната култура на принос към свободния софтуер.
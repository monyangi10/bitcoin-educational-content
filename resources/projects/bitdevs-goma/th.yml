description: |
   BitDevs Goma เป็นชุมชนเปิดที่รวบรวมผู้ที่สนใจใน Bitcoin, การเข้ารหัส และโปรโตคอลแบบกระจายศูนย์ มันส่งเสริมการวิจัยและพัฒนารอบ ๆ Bitcoin โดยการรวบรวมนักพัฒนา นักวิจัย ผู้ประกอบการ และผู้ที่อยากรู้อยากเห็นเป็นประจำ การประชุมของมันเป็นโอกาสในการสำรวจแง่มุมทางเทคนิคของ Bitcoin อย่างลึกซึ้ง พูดคุยเกี่ยวกับความก้าวหน้าล่าสุดในระบบนิเวศ และเสริมสร้างวัฒนธรรมท้องถิ่นของการมีส่วนร่วมในซอฟต์แวร์เสรี
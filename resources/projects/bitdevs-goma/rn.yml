description: |
   BitDevs Goma ni umuryango wuguruye uhuza abakunda Bitcoin, ubuhinga bwo gukingira amakuru n’amategeko yegerejwe. Iremesha ubushakashatsi n’iterambere hirya no hino ya Bitcoin mu guhuza ubudasiba abaterambere, abashakashatsi, abashoramare n’abashaka kumenya vyinshi. Amakoraniro yayo ni akaryo ko gutohoza mu buryo bwimbitse imice y’ubuhinga bwa Bitcoin, kuganira ku bijanye n’iterambere rishasha mu bijanye n’ibidukikije no gukomeza umuco wo mu karere wo gutanga umusanzu ku bijanye n’ubuhinga bwa none.
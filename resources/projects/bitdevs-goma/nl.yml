description: |
   BitDevs Goma is een open gemeenschap die liefhebbers van Bitcoin, cryptografie en gedecentraliseerde protocollen samenbrengt. Het stimuleert onderzoek en ontwikkeling rond Bitcoin door regelmatig ontwikkelaars, onderzoekers, ondernemers en nieuwsgierigen samen te brengen. De bijeenkomsten zijn een gelegenheid om de technische aspecten van Bitcoin uit te diepen, de laatste ontwikkelingen in het ecosysteem te bespreken en een lokale cultuur van bijdragen aan vrije software te versterken.
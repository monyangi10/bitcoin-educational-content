description: |
  Er is een enorme vraag naar betrouwbare, schone en betaalbare energie in heel Afrika, maar minigrid-energieproducenten worstelen met hun duurzaamheid. Gridless werkt samen met hernieuwbare, landelijke minigrid-energieproducenten om de volledige capaciteit van hun output te gelde te maken als een koper in laatste instantie en als een Anchor huurder voor het creëren van nieuwe energieopwekking.
description: |
  В цяла Африка има огромно търсене на надеждна, чиста и достъпна енергия, но производителите на енергия от мини мрежи се борят за устойчивост. Gridless работи с производители на енергия от възобновяеми източници в селски райони, за да монетизира пълния капацитет на продукцията им като купувач от последна инстанция, както и да служи като опорен наемател за създаването на нови енергийни мощности.
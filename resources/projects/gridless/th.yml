description: |
  มีความต้องการอย่างมากสำหรับพลังงานที่เชื่อถือได้ สะอาด และราคาย่อมเยาทั่วแอฟริกา แต่ผู้ผลิตพลังงานแบบกริดขนาดเล็กยังคงประสบปัญหาในการรักษาความยั่งยืน Gridless ทำงานร่วมกับผู้ผลิตพลังงานแบบกริดขนาดเล็กในชนบทที่ใช้พลังงานหมุนเวียนเพื่อสร้างรายได้จากกำลังการผลิตทั้งหมดของพวกเขาในฐานะผู้ซื้อสุดท้าย รวมถึงทำหน้าที่เป็นผู้เช่าหลักสำหรับการสร้างพลังงานใหม่
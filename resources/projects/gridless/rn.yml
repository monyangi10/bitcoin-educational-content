description: |
  Hariho ugushaka kwinshi kw’inguvu zishobora kwizigirwa, zisukuye kandi zishoboka muri Afirika yose, yamara amahinguriro y’inguvu y’uruzitiro rutoyi ararwana kugira ngo ashobore kugumaho. Gridless ikorana n’ibikoresho vy’inguvu bishobora gusubirwamwo, vyo mu ntara, vy’inguvu ntoyi kugira ngo bikoreshe amahera y’ubushobozi bwose bw’inguvu zavyo nk’umuguzi w’uburyo bwa nyuma, hamwe no gukora nk’umukozi wa Anchor ku bijanye n’uguhingura inguvu nshasha.
description: |
  De Bitcoinize Machine is een Android 12 tablet met een thermische printer en NFC-mogelijkheden, geoptimaliseerd voor Bitcoin en Lightning Payments met voorgeïnstalleerde apps waarbij je kunt kiezen voor niet-custodial oplossingen zoals BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits of custodial oplossingen zoals Blink Wallet, SwissBitcoin Pay en Wallet of Satoshi.
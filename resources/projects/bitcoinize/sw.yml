description: |
  Mashine ya Bitcoinize ni kompyuta kibao ya Android 12 yenye printa ya joto na uwezo wa NFC, iliyoboreshwa kwa ajili ya Bitcoin na Malipo ya Umeme kwa programu zilizosakinishwa awali ambapo unaweza kuchagua suluhu zisizo za uangalizi kama vile BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits-LN3 Bits kama vile GWD ya Uswisi au GWdi ya GWdi ya Uswisi au GWdi. Wallet of Satoshi.
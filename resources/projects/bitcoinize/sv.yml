description: |
  Bitcoinize Machine är en Android 12-surfplatta med en termisk skrivare och NFC-funktioner, optimerad för Bitcoin och Lightning Payments med förinstallerade appar där du kan välja icke-depositionslösningar som BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits eller depositionslösningar som Blink Wallet, SwissBitcoin Pay och Wallet of Satoshi.
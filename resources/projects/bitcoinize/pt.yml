description: |
  A Bitcoinize Machine é um tablet Android 12 com uma impressora térmica e capacidades NFC, optimizado para Bitcoin e Lightning Payments com aplicações pré-instaladas onde pode escolher soluções não custodiais como BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits ou soluções custodiais como Blink Wallet, SwissBitcoin Pay e Wallet of Satoshi.
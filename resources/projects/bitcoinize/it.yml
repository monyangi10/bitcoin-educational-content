description: |
  La Bitcoinize Machine è un tablet Android 12 con stampante termica e funzionalità NFC, ottimizzato per Bitcoin e Lightning Payments con app preinstallate in cui è possibile scegliere soluzioni non custodiali come BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits o soluzioni custodiali come Blink Wallet, SwissBitcoin Pay e Wallet of Satoshi.
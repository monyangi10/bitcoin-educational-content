description: |
  Bitcoinize Machine je tablet se systémem Android 12, termální tiskárnou a funkcí NFC, optimalizovaný pro Bitcoin a Lightning Payments s předinstalovanými aplikacemi, kde si můžete vybrat neúschovná řešení, jako jsou BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits nebo úschovná řešení, jako jsou Blink Wallet, SwissBitcoin Pay a Wallet of Satoshi.
description: |
  Машината Bitcoinize е таблет с Android 12 с термичен принтер и NFC възможности, оптимизиран за Bitcoin и Lightning Payments с предварително инсталирани приложения, където можете да изберете неимуществени решения като BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits или имуществени решения като Blink Wallet, SwissBitcoin Pay и Wallet of Satoshi.
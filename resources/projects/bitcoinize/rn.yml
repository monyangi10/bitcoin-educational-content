description: |
  Igikoresho ca Bitcoinize ni igikoresho ca Android 12 gifise icapa ry’ubushuhe n’ubushobozi bwa NFC, gitunganijwe neza ku Bitcoin n’Ukwishura kw’umuravyo gifise porogarama zashizwemwo imbere y’igihe aho ushobora guhitamwo inyishu zitari izo mu bubiko nka BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Blink Wallet, Ugutanga amafaranga y'Ubusuwisi na Wallet of Satoshi.
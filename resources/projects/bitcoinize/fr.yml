description: |
  La Bitcoinize Machine est une tablette Android 12 avec une imprimante thermique et des capacités NFC, optimisée pour Bitcoin et Lightning Payments avec des applications préinstallées où vous pouvez choisir des solutions non dépositaires comme BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits ou des solutions dépositaires comme Blink Wallet, SwissBitcoin Pay et Wallet of Satoshi.
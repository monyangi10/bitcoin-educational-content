description: |
  دستگاه Bitcoinize یک تبلت اندروید 12 با چاپگر حرارتی و قابلیت‌های NFC است که برای پرداخت‌های Bitcoin و Lightning بهینه‌سازی شده و دارای اپلیکیشن‌های از پیش نصب شده است که در آن می‌توانید راه‌حل‌های غیرامانی مانند BtcPayServer، Breez، Zeus LN، BlueWallet، Bolt Card Wallet، LNBits یا راه‌حل‌های امانی مانند Blink Wallet، SwissBitcoin Pay و Wallet of Satoshi را انتخاب کنید.
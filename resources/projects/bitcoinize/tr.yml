description: |
  Bitcoinize Machine, termal yazıcı ve NFC özelliklerine sahip, BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits gibi gözetim dışı çözümleri veya Blink Wallet, SwissBitcoin Pay ve Wallet of Satoshi gibi gözetim çözümlerini seçebileceğiniz önceden yüklenmiş uygulamalarla Bitcoin ve Lightning Payments için optimize edilmiş bir Android 12 tablettir.
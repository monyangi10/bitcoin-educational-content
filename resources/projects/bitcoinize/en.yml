description: The Bitcoinize Machine is a Android 12 tablet with a thermal
  printer and NFC capabilities, optimized for Bitcoin and Lightning Payments
  with pre-installed apps where you can choose noncustodial solutions like
  BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits or
  custodial solutions such as Blink Wallet, SwissBitcoin Pay and Wallet of
  Satoshi.

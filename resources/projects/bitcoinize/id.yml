description: |
  Bitcoinize Machine adalah tablet Android 12 dengan printer termal dan kemampuan NFC, dioptimalkan untuk Bitcoin dan Lightning Payments dengan aplikasi yang sudah terpasang di mana Anda dapat memilih solusi non-kustodian seperti BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits, atau solusi kustodian seperti Blink Wallet, SwissBitcoin Pay, dan Wallet of Satoshi.
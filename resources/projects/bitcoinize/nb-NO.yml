description: |
  Bitcoinize Machine er et Android 12-nettbrett med en termisk skriver og NFC-funksjoner, optimalisert for Bitcoin og Lightning Payments med forhåndsinstallerte apper der du kan velge ikke-depotløsninger som BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits eller custodial-løsninger som Blink Wallet, SwissBitcoin Pay og Wallet of Satoshi.
description: |
  Bitcoinize Machine - это планшет на базе Android 12 с термопринтером и возможностями NFC, оптимизированный для Bitcoin и Lightning Payments с предустановленными приложениями, где вы можете выбрать некастодиальные решения, такие как BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits или кастодиальные решения, такие как Blink Wallet, SwissBitcoin Pay и Wallet of Satoshi.
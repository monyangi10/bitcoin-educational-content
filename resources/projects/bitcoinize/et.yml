description: |
  Bitcoinize Machine on Android 12 tablett termoprinteri ja NFC võimekusega, optimeeritud Bitcoin ja Lightning Maksed eelinstalleeritud rakendused, kus saab valida mitte-custodial lahendusi nagu BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits või custodial lahendusi nagu Blink Wallet, SwissBitcoin Pay ja Wallet of Satoshi.
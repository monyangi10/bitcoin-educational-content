description: |
  La Bitcoinize Machine es una tableta Android 12 con impresora térmica y capacidades NFC, optimizada para Bitcoin y Lightning Payments con apps preinstaladas donde puedes elegir soluciones sin custodia como BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits o soluciones con custodia como Blink Wallet, SwissBitcoin Pay y Wallet of Satoshi.
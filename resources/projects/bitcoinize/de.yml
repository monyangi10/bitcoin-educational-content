description: |
  Die Bitcoinize Machine ist ein Android 12-Tablet mit einem Thermodrucker und NFC-Fähigkeiten, optimiert für Bitcoin und Lightning Payments mit vorinstallierten Apps, bei denen Sie nicht-verwahrende Lösungen wie BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits oder verwahrende Lösungen wie Blink Wallet, SwissBitcoin Pay und Wallet of Satoshi wählen können.
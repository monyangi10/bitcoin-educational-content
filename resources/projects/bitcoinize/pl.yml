description: |
  Bitcoinize Machine to tablet z systemem Android 12 z drukarką termiczną i funkcjami NFC, zoptymalizowany pod kątem płatności Bitcoin i Lightning Payments z preinstalowanymi aplikacjami, w których można wybrać rozwiązania niepowiernicze, takie jak BtcPayServer, Breez, Zeus LN, BlueWallet, Bolt Card Wallet, LNBits lub rozwiązania powiernicze, takie jak Blink Wallet, SwissBitcoin Pay i Wallet of Satoshi.
description: |
  Nodl ni ishirahamwe ritanga inyishu z’ibikorwa remezo ku bantu ku giti cabo n’ubudandaji kugira ngo basubire kugenzura amakuru yabo n’amahera bariha.
  
  Batanga ama node yubatswe ku buryo bubereye n’ibikorwa remezo vy’igicu bituma abakoresha bashobora gucungera ibikorwa vyabo vya Bitcoin na Lightning Network. Na nodl, abakoresha barafise ububasha bwose ku makuru yabo bwite kandi barashobora kwemera kwishurwa ataco baciyeko ata bahuza canke amahera. Ibintu vyabo vyakozwe kugira ngo bikoreshwe neza, bibe bifise umutekano, kandi bibe vyibanda ku buzima bwite, bifise ibintu nk’ugushiramwo amakuru yuzuye kuri disiki be n’uguhindura amakuru y’umubiri. nodl ikora kuva mu mwaka w’2018 kandi ifise izina rikomeye muri iyo nganda.
description: |
  Nodl is een bedrijf dat infrastructuuroplossingen biedt waarmee particulieren en bedrijven weer controle krijgen over hun gegevens en betalingen.
  
  Ze bieden op maat gemaakte nodes en cloud-infrastructuur waarmee gebruikers hun eigen Bitcoin en Lightning Network operaties kunnen beheren. Met nodl hebben gebruikers volledige controle over hun persoonlijke gegevens en kunnen ze directe betalingen accepteren zonder tussenpersonen of kosten. Hun producten zijn ontworpen om gebruiksvriendelijk, veilig en privacygericht te zijn, met functies zoals volledige schijfversleuteling en fysieke kill-switches. nodl is actief sinds 2018 en heeft een sterke reputatie in de branche.
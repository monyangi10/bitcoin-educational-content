description: |
  Nodl은 개인과 기업이 데이터와 결제에 대한 통제권을 되찾을 수 있도록 인프라 솔루션을 제공하는 회사입니다.
  
  노들에서는 사용자가 직접 Bitcoin 및 Lightning Network 운영을 관리할 수 있는 맞춤형 노드와 클라우드 인프라를 제공합니다. 노들에서는 사용자가 자신의 개인 데이터를 완전히 제어할 수 있으며 중개자나 수수료 없이 직접 결제를 수락할 수 있습니다. 전체 디스크 암호화 및 물리적 킬 스위치와 같은 기능을 통해 사용자 친화적이고 안전하며 개인 정보 보호에 중점을 둔 제품으로 설계되었습니다. 2018년부터 운영되고 있으며 업계에서 높은 평판을 얻고 있는 nodl.
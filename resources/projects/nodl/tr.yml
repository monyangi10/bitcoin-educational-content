description: |
  Nodl, bireylerin ve işletmelerin verileri ve ödemeleri üzerinde yeniden kontrol sahibi olmaları için altyapı çözümleri sunan bir şirkettir.
  
  Kullanıcıların kendi Bitcoin ve Lightning Network operasyonlarını yönetmelerine olanak tanıyan özel yapım düğümler ve bulut altyapısı sunarlar. Nodl ile kullanıcılar kişisel verileri üzerinde tam kontrole sahiptir ve aracılar veya ücretler olmadan doğrudan ödeme kabul edebilirler. Ürünleri, tam disk şifreleme ve fiziksel kill switch gibi özelliklerle kullanıcı dostu, güvenli ve gizlilik odaklı olacak şekilde tasarlanmıştır. nodl 2018'den beri faaliyet göstermektedir ve sektörde güçlü bir itibara sahiptir.
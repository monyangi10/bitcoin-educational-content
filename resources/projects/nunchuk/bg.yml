description: |
  Nunchuk е компания, специализирана в областта на сигурността на Bitcoin, с напълно разпределен екип по целия свят. Тя разработва Bitcoin wallet, фокусирана върху управлението на множество подписи (multisig), което позволява сигурно и опростено съхранение на средства. Nunchuk предоставя практически решения за физически лица, семейства и консултанти, особено в Bitcoin планиране на имуществото. Нейната цел е да направи многосигналното съхранение достъпно за всички.
  
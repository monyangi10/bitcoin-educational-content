description: |
  Nunchuk, dünya çapında tamamen dağıtılmış bir ekiple Bitcoin güvenliği konusunda uzmanlaşmış bir şirkettir. Çoklu imza (Multisig) yönetimine odaklanan, güvenli ve basitleştirilmiş fon depolamaya olanak tanıyan bir Bitcoin Wallet geliştirmektedir. Nunchuk, özellikle Bitcoin emlak planlamasında bireyler, aileler ve danışmanlar için pratik çözümler sunar. Amacı, Multisig velayetini herkes için erişilebilir kılmaktır.
  
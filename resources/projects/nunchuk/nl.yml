description: |
  Nunchuk is een bedrijf gespecialiseerd in Bitcoin beveiliging, met een volledig gedistribueerd team wereldwijd. Het ontwikkelt een Bitcoin Wallet gericht op beheer met meerdere handtekeningen (Multisig), wat veilige en vereenvoudigde opslag van fondsen mogelijk maakt. Nunchuk biedt praktische oplossingen voor particulieren, families en adviseurs, met name in Bitcoin estate planning. Het doel is om Multisig bewaring voor iedereen toegankelijk te maken.
  
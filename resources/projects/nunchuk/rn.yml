description: |
  Nunchuk ni ishirahamwe ryitaho umutekano wa Bitcoin, rifise umugwi wuzuye kw’isi yose. Itegura Bitcoin Wallet yibanze ku burongozi bw’imikono myinshi (Multisig), bikaba bishoboza ububiko bw’amahera butekanye kandi bworoshe. Nunchuk itanga inyishu ngirakamaro ku bantu ku giti cabo, imiryango, n’abajanama, cane cane mu bijanye n’ugutegura ivy’ubutaka bwa Bitcoin. Intumbero yayo ni ugutuma uburenganzira bwo kubungabunga Multisig bushikira umuntu wese.
  
description: |
  Nunchuk เป็นบริษัทที่เชี่ยวชาญด้านความปลอดภัย Bitcoin โดยมีทีมงานที่กระจายอยู่ทั่วโลก พัฒนาผลิตภัณฑ์ Bitcoin wallet ที่เน้นการจัดการลายเซ็นหลายตัว (multisig) เพื่อให้การจัดเก็บเงินทุนมีความปลอดภัยและง่ายขึ้น Nunchuk มอบโซลูชันที่ใช้งานได้จริงสำหรับบุคคล ครอบครัว และที่ปรึกษา โดยเฉพาะในการวางแผนมรดก Bitcoin เป้าหมายของบริษัทคือการทำให้การดูแลรักษา multisig เข้าถึงได้สำหรับทุกคน
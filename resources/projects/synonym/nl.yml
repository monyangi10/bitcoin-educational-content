description: |
  Synonym is een technologiebedrijf dat zich toelegt op het ontwikkelen van een Bitcoin-gerichte toekomst door middel van een ecosysteem van software en diensten die een peer-to-peer economie bevorderen.
  
  Zij zijn de makers van het gedecentraliseerde webprotocol Slashtags en de Bitkit Wallet, een tool ontworpen om de Bitcoin Wallet ervaring te herdefiniëren. Synonym zet zich in voor een circulaire economie en pleit voor schaalbaarheid, interoperabiliteit, privacy, vertrouwen, zelfbehoud en open-source principes in hun producten.
description: |
  Synonym е технологична компания, посветена на развитието на бъдеще, ориентирано към Bitcoin, чрез екосистема от софтуер и услуги, които насърчават икономиката на равнопоставените партньори.
  
  Те са създатели на децентрализирания уеб протокол, Slashtags и Bitkit Wallet - инструмент, предназначен да предефинира опита на Bitcoin wallet. Ангажирани с кръговата икономика, Synonym се застъпват за мащабируемост, оперативна съвместимост, неприкосновеност на личния живот, доверие, самоуправление и принципи на отворения код в своите продукти.
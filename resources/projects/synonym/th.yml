description: |
  Synonym เป็นบริษัทเทคโนโลยีที่มุ่งมั่นพัฒนาอนาคตที่เน้น Bitcoin ผ่านระบบนิเวศของซอฟต์แวร์และบริการที่ส่งเสริมเศรษฐกิจแบบเพียร์ทูเพียร์
  
  พวกเขาเป็นผู้สร้างโปรโตคอลเว็บแบบกระจายศูนย์ Slashtags และ Bitkit Wallet ซึ่งเป็นเครื่องมือที่ออกแบบมาเพื่อกำหนดประสบการณ์ Bitcoin wallet ใหม่ โดยยึดมั่นในเศรษฐกิจหมุนเวียน Synonym สนับสนุนการขยายตัว ความสามารถในการทำงานร่วมกัน ความเป็นส่วนตัว ความไว้วางใจ การดูแลตนเอง และหลักการโอเพ่นซอร์สในผลิตภัณฑ์ของพวกเขา
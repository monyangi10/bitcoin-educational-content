description: |
  Synonym ni ishirahamwe ry’ubuhinga ryiyemeje guteza imbere kazoza gashingiye kuri Bitcoin biciye mu nzira y’ubuhinga n’ibikorwa bitera imbere ubutunzi bw’urunganwe.
  
  Ni bo baremye umurongo w’urubuga rwegerejwe, Slashtags, na Bitkit Wallet, igikoresho cagenewe gusubira gusobanura ubumenyi bwa Bitcoin Wallet. Ivyemeje ubutunzi buzunguruka, Synonym ivuganira ubushobozi bwo gutera imbere, gukorana n’abandi, ubuzima bwite, ukwizigirana, ukwizigama, n’ingingo ngenderwako z’inkomoko yuguruye mu bicuruzwa vyabo.
description: |
  Synonym, eşler arası ekonomiyi teşvik eden bir yazılım ve hizmet ekosistemi aracılığıyla Bitcoin merkezli bir gelecek geliştirmeye adanmış bir teknoloji şirketidir.
  
  Merkezi olmayan web protokolü Slashtags'in ve Bitcoin Wallet deneyimini yeniden tanımlamak için tasarlanmış bir araç olan Bitkit Wallet'in yaratıcılarıdır. Döngüsel bir ekonomiye bağlı olan Synonym, ürünlerinde ölçeklenebilirlik, birlikte çalışabilirlik, gizlilik, güven, kendi kendine saklama ve açık kaynak ilkelerini savunmaktadır.
description: |
  Mi Primer Bitcoin is een internationaal educatief project gericht op Bitcoin, met speciale nadruk op El Salvador. Het hoofddoel is om onpartijdige informatie van hoge kwaliteit te geven over Bitcoin, vooral nadat El Salvador het eerste land werd dat Bitcoin als wettig betaalmiddel erkende. Ze bieden gratis lessen aan, variërend van algemene concepten tot meer geavanceerde technische aspecten, met als doel het leren van Bitcoin toegankelijk en eenvoudig te maken voor studenten.
  
  Het project groeit snel, met hoofdkantoren in San Salvador en San Miguel, en klassen in verschillende departementen van El Salvador. Ze houden ook maandelijkse bijeenkomsten en hebben uitbreidingsplannen voor het komende jaar, waaronder een diplomaprogramma in openbare middelbare scholen. Naast onderwijs wil Mi Primer Bitcoin een circulaire economie en een bloeiende Bitcoin gemeenschap in El Salvador bevorderen.
  
  De filosofie en missie van Mi Primer Bitcoin richten zich op het geven van onbevooroordeeld Bitcoin onderwijs van hoge kwaliteit, zonder producten aan te prijzen of zich te mengen in politieke debatten. Hun doel is om individuen in staat te stellen hun eigen geïnformeerde beslissingen te nemen over Bitcoin en een positief voorbeeld te creëren in El Salvador en daarbuiten.
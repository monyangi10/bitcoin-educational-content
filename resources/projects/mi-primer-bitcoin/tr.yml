description: |
  Mi Primer Bitcoin, El Salvador'a özel bir vurgu yaparak Bitcoin'a odaklanan uluslararası bir eğitim projesidir. Temel amacı, özellikle El Salvador'un Bitcoin'ı yasal ödeme aracı olarak tanıyan ilk ülke olmasından sonra, Bitcoin hakkında tarafsız ve yüksek kaliteli bilgi sağlamaktır. Bitcoin öğrenimini öğrenciler için erişilebilir ve basit hale getirmek amacıyla genel kavramlardan daha ileri teknik yönlere kadar değişen ücretsiz dersler sunuyorlar.
  
  Proje, San Salvador ve San Miguel'deki merkezleri ve El Salvador'un çeşitli bölümlerindeki sınıflarıyla hızlı bir büyüme yaşıyor. Ayrıca aylık toplantılar düzenliyorlar ve önümüzdeki yıl için devlet liselerinde bir diploma programı da dahil olmak üzere genişleme planları var. Mi Primer Bitcoin, eğitimin yanı sıra El Salvador'da döngüsel bir ekonomiyi ve gelişen bir Bitcoin topluluğunu teşvik etmeyi amaçlamaktadır.
  
  Mi Primer Bitcoin'ın felsefesi ve misyonu, ürünleri desteklemeden veya siyasi tartışmalara girmeden tarafsız ve yüksek kaliteli Bitcoin eğitimi sağlamaya odaklanmaktadır. Amaçları, bireyleri Bitcoin hakkında kendi bilinçli kararlarını vermeleri için güçlendirmek ve El Salvador'da ve ötesinde olumlu bir örnek oluşturmaktır.
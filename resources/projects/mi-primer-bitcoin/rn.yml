description: |
  Mi Primer Bitcoin ni umugambi w’inyigisho mpuzamakungu wibanda kuri Bitcoin, ushimikiye cane kuri El Salvador. Intumbero yayo nyamukuru ni ugutanga amakuru atagira aho abogamiye kandi y’agaciro kanini ku bijanye na Bitcoin, cane cane inyuma y’aho El Salvador ibaye igihugu ca mbere cemeye ko Bitcoin ari amafaranga yemewe n’amategeko. Batanga amashure y’ubuntu kuva ku vyiyumviro rusangi gushika ku mice y’ubuhinga iteye imbere cane, n’intumbero yo gutuma inyigisho za Bitcoin zishikira kandi zigororotse ku banyeshure.
  
  Uwo mugambi uriko uratera imbere cane, ukaba ufise icicaro gikuru i San Salvador na San Miguel, kandi ukaba ufise amashure mu nzego zitandukanye zo muri El Salvador. Bagira kandi amakoraniro buri kwezi kandi bafise imigambi yo kwagura mu mwaka uza, harimwo n’ivyo gutanga impapuro z’umutsindo mu mashure yisumbuye ya Leta. Uretse uburezi, Mi Primer Bitcoin ifise intumbero yo guteza imbere ubutunzi buzunguruka n’umuryango w’aba Bitcoin utera imbere muri El Salvador.
  
  Filozofiya n’intumbero ya Mi Primer Bitcoin vyibanda ku gutanga inyigisho zitagira aho zigarukira kandi zifise akamaro kanini za Bitcoin, ata kwemeza ibintu canke kwinjira mu mpari za politike. Intumbero yabo ni uguha ubushobozi abantu ku giti cabo kugira ngo bafate ingingo zishingiye ku makuru ku bijanye na Bitcoin no gutanga akarorero keza muri El Salvador no hanze.
description: |
  미 프라이머 Bitcoin은 엘살바도르에 특별히 중점을 둔 Bitcoin에 초점을 맞춘 국제 교육 프로젝트입니다. 특히 엘살바도르가 Bitcoin을 법정화폐로 인정한 최초의 국가가 된 이후 Bitcoin에 대한 공정하고 수준 높은 정보를 제공하는 것이 주요 목표입니다. 일반 개념부터 고급 기술 측면까지 다양한 무료 강의를 제공하며, 학생들이 Bitcoin에 대해 쉽고 간편하게 학습할 수 있도록 하는 것을 목표로 하고 있습니다.
  
  이 프로젝트는 산살바도르와 산미겔에 본부를 두고 엘살바도르의 여러 부서에서 수업을 진행하는 등 빠르게 성장하고 있습니다. 또한 매월 회의를 개최하고 있으며, 내년에는 공립 고등학교 졸업장 프로그램을 포함한 확장 계획을 세우고 있습니다. 미 프라이머 Bitcoin는 교육 외에도 엘살바도르에서 순환 경제와 번성하는 Bitcoin 커뮤니티를 육성하는 것을 목표로 합니다.
  
  Mi Primer Bitcoin의 철학과 사명은 제품을 지지하거나 정치적 논쟁에 관여하지 않고 편견 없는 양질의 Bitcoin 교육을 제공하는 데 중점을 둡니다. 이들의 목표는 개인이 정보에 입각한 결정을 내릴 수 있도록 권한을 부여하고 엘살바도르와 그 밖의 지역에서 긍정적인 모범을 만드는 것입니다.
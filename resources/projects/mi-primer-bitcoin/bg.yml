description: |
  Mi Primer Bitcoin е международен образователен проект, посветен на Bitcoin, със специален акцент върху Ел Салвадор. Основната му цел е да предоставя безпристрастна и висококачествена информация за Bitcoin, особено след като Салвадор стана първата страна, признала Bitcoin за законно платежно средство. Те предлагат безплатни уроци, вариращи от общи понятия до по-напреднали технически аспекти, с цел да направят обучението по Bitcoin достъпно и лесно за учениците.
  
  Проектът се разраства с бързи темпове, като централата му се намира в Сан Салвадор и Сан Мигел, а класовете се провеждат в различни департаменти на Салвадор. Освен това те провеждат ежемесечни срещи и имат планове за разширяване през следващата година, включително програма за дипломиране в държавните гимназии. В допълнение към образованието, Mi Primer Bitcoin има за цел да насърчи кръговата икономика и процъфтяващата общност Bitcoin в Салвадор.
  
  Философията и мисията на Mi Primer Bitcoin се фокусират върху предоставянето на безпристрастно и висококачествено Bitcoin образование, без да се подкрепят продукти или да се участва в политически дебати. Тяхната цел е да дадат възможност на хората да вземат свои собствени информирани решения относно Bitcoin и да създадат положителен пример в Ел Салвадор и извън него.
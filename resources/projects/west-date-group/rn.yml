description: |
  West Data Group (WDG) yibanze ku kwubaka ibibanza vy’amakuru no guteza imbere ibikorwa remezo vy’ubuhinga bwa none. Ingamba zayo zihambaye cane ni ugushinga Wes Data Center Service PLC muri Etiyopiya, aho yatanguye kwubaka ikigo c’amakuru gifise ubushobozi bwa 30MW kigenewe amafaranga y’amahera Mining.
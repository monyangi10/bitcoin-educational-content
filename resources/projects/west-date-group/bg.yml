description: |
  West Data Group (WDG) се фокусира върху изграждането на центрове за данни и развитието на цифрова инфраструктура. Най-значимите й инициативи са създаването на Wes Data Center Service PLC в Етиопия, където започна изграждането на 30MW център за данни, предназначен за криптовалута mining.
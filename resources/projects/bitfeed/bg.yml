description: |
  Bitfeed е минималистичен изследовател на Bitcoin с отворен код, който ви дава информация в реално време за основния слой на мрежата Bitcoin. Той е проектиран да бъде лек и лесен за използване, като предлага прост интерфейс за преглед на транзакции, блокове и статистически данни за мрежата Bitcoin.
description: |
  Bitfeed je minimalistický průzkumník Bitcoin s otevřeným zdrojovým kódem, který vám v reálném čase poskytuje informace o hlavní vrstvě sítě Bitcoin. Je navržen tak, aby byl lehký a snadno použitelný, a nabízí jednoduché rozhraní pro prohlížení transakcí, bloků a statistik sítě Bitcoin.
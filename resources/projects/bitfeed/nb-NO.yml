description: |
  Bitfeed er en minimalistisk Bitcoin-utforsker med åpen kildekode som gir deg sanntidsinformasjon om hovedlaget i Bitcoin-nettverket.
  Den er designet for å være lett og enkel å bruke, og tilbyr et enkelt grensesnitt for visning av transaksjoner, blokker og statistikk på Bitcoin-nettverket.
description: |
  Bitfeed ist ein minimalistischer, quelloffener Bitcoin-Explorer, der Ihnen Echtzeitinformationen über die Hauptschicht des Bitcoin-Netzwerks liefert.
  Es ist leichtgewichtig und einfach zu bedienen und bietet eine einfache Schnittstelle zur Anzeige von Transaktionen, Blöcken und Statistiken im Bitcoin-Netzwerk.
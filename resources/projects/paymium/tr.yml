description: |
  Paymium, merkezi Paris, Fransa'da bulunan bir Bitcoin Exchange platformudur.
  
  2011 yılında kurulan şirket, uzun vadeli yatırım ve yüksek hacimli işlemler için araçlar ile hem bireyler hem de profesyoneller için hizmetler sunmaktadır. Paymium, Fransız Finansal Piyasalar Otoritesi tarafından tanınır ve %99'u Cold depolamada saklanan müşterilerinin fonlarının güvenliğini sağlamayı taahhüt eder. Bitcoin işlemlerini destekler ve hem Fransızca hem de İngilizce destek sunar.
description: |
  Paymium เป็นแพลตฟอร์มแลกเปลี่ยนบิตคอยน์ที่ตั้งอยู่ในปารีส ประเทศฝรั่งเศส
  
  ก่อตั้งขึ้นในปี 2011 ให้บริการทั้งบุคคลทั่วไปและมืออาชีพ พร้อมเครื่องมือสำหรับการลงทุนระยะยาวและการทำธุรกรรมปริมาณมาก Paymium ได้รับการยอมรับจากหน่วยงานตลาดการเงินของฝรั่งเศสและมุ่งมั่นที่จะรักษาความปลอดภัยของเงินทุนของลูกค้า โดยเก็บ 99% ไว้ในที่จัดเก็บแบบเย็น รองรับการทำธุรกรรม Bitcoin และให้การสนับสนุนทั้งภาษาฝรั่งเศสและภาษาอังกฤษ
description: |
  Paymium is een Bitcoin Exchange platform gevestigd in Parijs, Frankrijk.
  
  Het is opgericht in 2011 en biedt diensten voor zowel particulieren als professionals, met tools voor langetermijninvesteringen en transacties met hoge volumes. Paymium is erkend door de Franse Autoriteit Financiële Markten en zet zich in voor de veiligheid van de fondsen van haar klanten, met 99% opgeslagen in Cold opslag. Het ondersteunt Bitcoin transacties en biedt ondersteuning in zowel Frans als Engels.
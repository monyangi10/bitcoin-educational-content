description: |
  Paymium ni urubuga rwa Bitcoin Exchange ruri i Paris mu Bufaransa. 
  
  Yashinzwe mu mwaka w’2011, itanga ibikorwa ku bantu ku giti cabo no ku bahinga, ifise ibikoresho vyo gushiramwo amahera igihe kirekire no gukora amafaranga menshi. Paymium yemewe n’ikigo c’ubufaransa kijejwe amasoko y’ivy’imari kandi yiyemeje gucungera umutekano w’amahera y’abaguzi bayo, 99% bikabikwa mu bubiko bwa Cold. Ishigikira amafaranga y’ibikorwa vya Bitcoin kandi itanga ubufasha mu gifaransa no mu congereza.
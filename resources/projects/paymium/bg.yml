description: |
  Paymium е платформа за обмен на биткойни, базирана в Париж, Франция.
  
  Основана през 2011 г., тя предоставя услуги както за физически лица, така и за професионалисти, като разполага с инструменти за дългосрочно инвестиране и транзакции с голям обем. Paymium е призната от Френския орган за финансови пазари и се ангажира да гарантира сигурността на средствата на своите клиенти, като 99% от тях се съхраняват в хладилни камери. Тя поддържа транзакции Bitcoin и предлага поддръжка на френски и английски език.
description: |
  JAN3 ni ishirahamwe ry’ubuhinga ryiyemeje gutuma Bitcoin iba demokarasi no guteza imbere ubwigenge bw’ivy’ubutunzi kw’isi yose. Yashinzwe na Samson Mow, yahora ari umuyobozi wa Blockstream, JAN3 itera imbere mu bikorwa remezo ku buhinga bwa Bitcoin Layer 2, nka Lightning na Liquid. Mu gukorana n’ibihugu, ubucuruzi, n’abantu ku giti cabo, iyo sosiyete ifise intumbero yo kwihutisha hyperbitcoinization mu gutuma Bitcoin ishobora gushikwako kandi ikoreshwa ku rugero runini mu gihe itera imbere ubutunzi bubereye kandi bushizwe ahantu hamwe.
  
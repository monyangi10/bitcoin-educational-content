description: |
  JAN3 is een technologiebedrijf dat zich toelegt op het democratiseren van Bitcoin en het bevorderen van wereldwijde financiële autonomie. JAN3 is opgericht door Samson Mow, voormalig leidinggevende bij Blockstream, en ontwikkelt infrastructuur op Bitcoin Layer 2 technologieën, zoals Lightning en Liquid. Door samen te werken met nationale staten, bedrijven en individuen wil het bedrijf de hyperbitcoinisatie versnellen door Bitcoin op grote schaal toegankelijk en bruikbaar te maken en tegelijkertijd een eerlijkere en meer gedecentraliseerde economie te bevorderen.
  
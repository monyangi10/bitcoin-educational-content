description: |
  JAN3, Bitcoin'ı demokratikleştirmeye ve küresel finansal özerkliği teşvik etmeye adanmış bir teknoloji şirketidir. Blockstream'in eski yöneticisi Samson Mow tarafından kurulan JAN3, Lightning ve Bitcoin gibi Layer teknolojileri üzerinde altyapı geliştirmektedir. Şirket, ulus devletler, işletmeler ve bireylerle işbirliği yaparak, Bitcoin'ı büyük ölçekte erişilebilir ve kullanılabilir hale getirerek hiperbitcoinleşmeyi hızlandırmayı ve aynı zamanda daha adil ve merkezi olmayan bir ekonomiyi teşvik etmeyi amaçlıyor.
  
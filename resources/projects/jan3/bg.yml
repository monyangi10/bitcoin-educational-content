description: |
  JAN3 е технологична компания, посветена на демократизирането на Bitcoin и насърчаването на глобалната финансова автономия. Основана от Самсън Моу, бивш изпълнителен директор на Blockstream, JAN3 разработва инфраструктура за технологиите Bitcoin Layer 2, като Lightning и Liquid. Като си сътрудничи с национални държави, предприятия и частни лица, компанията има за цел да ускори хипербиткойнизацията, като направи Bitcoin достъпна и използваема в голям мащаб, като същевременно насърчава по-справедлива и децентрализирана икономика.
  
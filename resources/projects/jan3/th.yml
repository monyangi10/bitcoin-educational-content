description: |
  JAN3 เป็นบริษัทเทคโนโลยีที่มุ่งมั่นในการทำให้ Bitcoin เป็นประชาธิปไตยและส่งเสริมความเป็นอิสระทางการเงินทั่วโลก ก่อตั้งโดย Samson Mow อดีตผู้บริหารที่ Blockstream JAN3 พัฒนาโครงสร้างพื้นฐานบนเทคโนโลยี Bitcoin Layer 2 เช่น Lightning และ Liquid โดยการร่วมมือกับรัฐชาติ ธุรกิจ และบุคคล บริษัทมีเป้าหมายที่จะเร่งการเกิด hyperbitcoinization โดยทำให้ Bitcoin เข้าถึงได้และใช้งานได้ในวงกว้าง ในขณะเดียวกันก็ส่งเสริมเศรษฐกิจที่ยุติธรรมและกระจายอำนาจมากขึ้น
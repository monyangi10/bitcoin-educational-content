description: |
  Bitcoin, Umuravyo, n’ibindi! Uburyo bworoshe, bukomeye bwo gukoresha node ya Bitcoin na Lightning!
  
  Turahuza porogarama nziza cane y’inkomoko yuguruye na Interface yacu, uburongozi, n’ugushigikira kugira ngo ushobore gukoresha Bitcoin na Lightning mu buryo bworoshe, mu mwiherero, kandi ata nkomanzi.
description: |
  Lightning Network üzerinden Bitcoin'e erişim konusunda uzmanlaşmış, 100 CFA frangı gibi düşük bir fiyattan mobil hizmet ve paket satın alınmasını sağlayan platform. Bitcoin'in günlük kullanımı yoluyla bireylerin ve işletmelerin finansal olarak güçlendirilmesini teşvik etmek için esas olarak Batı Afrika'da çalışmaktadır.
description: |
  Платформа, специализирана в достъпа до Bitcoin чрез Lightning Network, която позволява закупуването на мобилни услуги и пакети само от 100 CFA франка. Тя работи основно в Западна Африка, за да насърчава финансовото овластяване на физически лица и предприятия чрез ежедневното използване на Bitcoin.
description: |
  Platform yihariye mu kuronka Bitcoin biciye kuri Lightning Network, ishobora kugura ubuhinga bwo gukoresha telefone ngendanwa n’amapaki y’amafaranga makeyi cane nk’amafranga 100 y’i CFA. Ikora cane cane muri Afirika y’Uburengero kugira ngo iteze imbere ubushobozi bw’abantu n’ubudandaji mu vy’amahera biciye mu gukoresha Bitcoin ku musi ku musi.
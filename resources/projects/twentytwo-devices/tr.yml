description: |
  Güvenlik, açık kaynak ve kullanıcı özerkliğini vurgulayan Bitcoin için donanım cüzdanlarının tasarımında uzmanlaşmış şirket. Alekos Filini tarafından kurulan şirket, hem donanımı hem de yazılımı tamamen açık kaynak olan ilk yerel mobil Bitcoin Hardware Wallet olan Portal'ı geliştirmektedir.
  
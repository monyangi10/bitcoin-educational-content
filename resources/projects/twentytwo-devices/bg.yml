description: |
  Компания, специализирана в проектирането на хардуерни портфейли за Bitcoin, с акцент върху сигурността, отворения код и автономията на потребителите. Основана от Алекос Филини, тя разработва Portal, първия местен хардуерен портфейл за Bitcoin wallet, като и хардуерът, и софтуерът са с напълно отворен код.
  
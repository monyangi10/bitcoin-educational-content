description: |
  Sosiyete yizeye mu guhingura ama wallets y’ibikoresho vya Bitcoin, ishimika ku mutekano, ku nzira yuguruye, no ku kwigenga kw’abakoresha. Yashinzwe na Alekos Filini, ikora Portal, telefone ya mbere y’akavukire Bitcoin Hardware Wallet, ifise ibikoresho n’amaporogarama vyose bikoreshwa mu buryo bushitse.
  
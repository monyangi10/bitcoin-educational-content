description: |
  
  Människor bygger framtidens internet med Bitcoin.
  Från sociala nätverk till strömmande betalningar och till och med anpassade tillgångar.
  14 år med 0 driftstopp och lika snabbt som ⚡️ på Layer 2!
  
  Bolt.FUN är en rolig plats för alla som vill lära sig, experimentera och dela kunskap kring att bygga verktyg och produkter på Bitcoin.
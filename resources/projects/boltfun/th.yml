description: |
  ผู้คนกำลังสร้างอนาคตของอินเทอร์เน็ตด้วย Bitcoin ตั้งแต่เครือข่ายสังคมไปจนถึงการชำระเงินแบบสตรีมมิ่ง และแม้กระทั่งสินทรัพย์ที่กำหนดเอง 14 ปีที่ไม่มีการหยุดทำงานและรวดเร็วเหมือน ⚡️ บนเลเยอร์ 2!

  BOLT.FUN เป็นสถานที่ที่สนุกสำหรับทุกคนที่ต้องการเรียนรู้ ทดลอง และแบ่งปันความรู้เกี่ยวกับการสร้างเครื่องมือและผลิตภัณฑ์บน Bitcoin
description: |

  Mensen bouwen aan de toekomst van het internet met Bitcoin. Van sociale netwerken tot streaming betalingen en zelfs aangepaste assets. 14 jaar 0 downtime en zo snel als ⚡️ op Layer 2!

  Bolt.FUN is een leuke plek voor iedereen die wil leren, experimenteren en kennis delen over het bouwen van tools en producten op Bitcoin.
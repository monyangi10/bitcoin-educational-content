description: |
  مردم در حال ساختن آینده اینترنت با Bitcoin هستند.  
  از شبکه‌های اجتماعی گرفته تا پرداخت‌های استریم و حتی دارایی‌های سفارشی.  
  14 سال بدون قطعی و سریع مثل ⚡️ روی Layer 2!
  
  Bolt.FUN مکان سرگرم‌کننده‌ای برای هر کسی است که می‌خواهد یاد بگیرد، آزمایش کند و دانش خود را در زمینه ساخت ابزارها و محصولات روی Bitcoin به اشتراک بگذارد.
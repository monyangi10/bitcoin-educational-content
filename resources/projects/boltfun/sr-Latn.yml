description: |
  Ljudi grade budućnost interneta sa Bitcoin. Od društvenih mreža, do strimovanja plaćanja, pa čak i prilagođenih sredstava. 14 godina bez prekida i brzo kao ⚡️ na Layer 2!

  Bolt.FUN je zabavno mesto za svakoga ko želi da uči, eksperimentiše i deli znanje o izgradnji alata i proizvoda na Bitcoin.
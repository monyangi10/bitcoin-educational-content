description: |
  Ejara ni urubuga rw’ishoramari rugendagenda ruri muri Cameroun. Ituma abakoresha bashobora kugura, kugurisha no kubika Bitcoin. Kubera ko uburyo bwo kuyironka butangura ku 1.000 FCFA gusa (\~\$1.50), itanga uburyo butekanye bwo gukoresha banki za kera, cane cane ku banyafirika bavuga igifaransa n’abanyamahanga.
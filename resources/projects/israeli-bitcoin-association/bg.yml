description: |
  Израелската асоциация Bitcoin е организация с нестопанска цел, чиято цел е да помага на хората в Израел да се възползват максимално от технологията на Bitcoin и други криптовалути. Някои от дейностите включват работа с израелските власти за създаване на регулаторна рамка за дейността на Bitcoin, създаване на осведоменост по отношение на Bitcoin, образование, предоставяне на подкрепа и насоки на потребителите, подпомагане на новодошлите, култивиране на израелската общност на Bitcoin в Израел и подкрепа на всички предприятия, които искат да използват Bitcoin или да се развиват с нея.
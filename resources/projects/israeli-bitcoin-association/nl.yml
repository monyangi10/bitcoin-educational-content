description: |
  De Israeli Bitcoin Association is een non-profit organisatie met als doel de mensen in Israël te helpen het meeste te halen uit de technologie van Bitcoin en andere cryptocurrencies. Enkele van de activiteiten zijn het samenwerken met de Israëlische autoriteiten om een regelgevend kader te creëren voor Bitcoin activiteiten, het creëren van bewustzijn voor Bitcoin, onderwijs, het bieden van ondersteuning en begeleiding aan gebruikers, het helpen van nieuwkomers, het cultiveren van de Israëlische Bitcoin gemeenschap in Israël, en het ondersteunen van alle bedrijven die Bitcoin willen gebruiken, of ermee willen ontwikkelen.
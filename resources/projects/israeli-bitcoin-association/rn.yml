description: |
  Ishirahamwe rya Isirayeli ryitwa Bitcoin Association ni ishirahamwe ritagira inyungu rifise intumbero yo gufasha abantu bo muri Isirayeli gukoresha neza ubuhinga bwa Bitcoin n’ayandi mafaranga y’ivy’ubuhinga bwa none. Bimwe mu bikorwa ni ugukorana n’ubutegetsi bwa Isirayeli kugira ngo haboneke urutonde rw’amategeko agenga igikorwa ca Bitcoin, gukangurira abantu ku bijanye na Bitcoin, uburezi, gutanga infashanyo n’ubuyobozi ku bakoresha, gufasha abashasha, gutera imbere umuryango wa Isirayeli wa Bitcoin muri Isirayeli, no gufasha ubucuruzi bwose bushaka kuyikoresha, canke buyikoresha na Bitcoin.
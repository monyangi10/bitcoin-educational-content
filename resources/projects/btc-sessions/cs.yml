description: |
  BTC Sessions je online osoba Bena Perrina, významného odborníka na Bitcoin a tvůrce obsahu z Kanady. Od roku 2016 se věnuje vytváří přístupné výukové programy krok za krokem, jejichž cílem je pomáhat jednotlivcům pochopit a bezpečně používat systém Bitcoin. Jeho vzdělávací obsah pokrývá řadu oblastí témat, včetně samopodpisů, hardwarových peněženek, nastavení více podpisů, a také Lightning Network a postupy ochrany osobních údajů
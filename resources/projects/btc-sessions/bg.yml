description: |
  BTC Sessions е онлайн личността на Бен Перин, виден Bitcoin преподавател и създател на съдържание, базиран в Канада. От 2016 г. той е създава достъпни уроци стъпка по стъпка, които имат за цел да помогнат на хората да разберат и безопасно да използват Bitcoin. Образователното му съдържание обхваща редица теми, включително самостоятелно съхранение, хардуерни портфейли, настройки с много подписи, Lightning Network, както и практики за защита на личните данни
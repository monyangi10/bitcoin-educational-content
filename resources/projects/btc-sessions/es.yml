description: |
  BTC Sessions es el personaje en línea de Ben Perrin, un destacado educador y creador de contenidos sobre la Bitcoin afincado en Canadá Educador de Bitcoin y creador de contenidos afincado en Canadá. Desde 2016, ha estado produciendo tutoriales accesibles, paso a paso, destinados a ayudar a las personas a a entender y utilizar de forma segura la Bitcoin. Su contenido educativo cubre una gama de temas, incluida la autocustodia, las billeteras de hardware, las configuraciones de firmas múltiples, el Lightning Network, y las prácticas de privacidad
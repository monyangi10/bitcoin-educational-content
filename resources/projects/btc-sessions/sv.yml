description: |
  BTC-sessioner är online-personen Ben Perrin, en framstående Bitcoin-utbildare och innehållsskapare baserad i Kanada. Sedan 2016 har han varit producera tillgängliga, steg-för-steg-handledning som syftar till att hjälpa individer förstå och på ett säkert sätt använda Bitcoin. Hans utbildningsinnehåll täcker en rad olika ämnen, inklusive självförvaring, hårdvaruplånböcker, multisignaturinställningar, Lightning Network Lightning Network och sekretesspraxis
description: |
  BTC Sessions ist die Online-Persona von Ben Perrin, einem bekannten Bitcoin-Pädagoge und Ersteller von Inhalten mit Sitz in Kanada. Seit 2016 hat er schritt-für-Schritt-Tutorials, die Einzelpersonen dabei helfen sollen gW-1 zu verstehen und sicher zu nutzen. Seine Bildungsinhalte decken eine Reihe von themen ab, darunter Self-Custody, Hardware-Wallets, Multisignatur-Setups, das Lightning Network, und Datenschutzpraktiken
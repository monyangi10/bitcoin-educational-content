description: |
  Ivyigwa vya BTC ni umuntu wo kuri Internet yitwa Ben Perrin, umuntu azwi cane Bitcoin umwigisha n’umuhinguzi w’ibintu afise icumba muri Canada. Kuva mu mwaka w’2016, ni we gutanga inyigisho zishikira, intambwe ku yindi zigamije gufasha abantu ku giti cabo gutahura no gukoresha neza Bitcoin. Ivyo yigisha birimwo ibintu vyinshi vy’ ingingo, harimwo ukwizigama, amasakoshi y’ibikoresho, gutegura imikono myinshi, ivy’ Lightning Network, n'imigenzo y'ubuzima bwite .
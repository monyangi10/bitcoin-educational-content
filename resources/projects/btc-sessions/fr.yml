description: |
  BTC Sessions est le personnage en ligne de Ben Perrin, un éminent éducateur et créateur de contenu basé au Canada Éducateur Bitcoin et créateur de contenu basé au Canada. Depuis 2016, il tutoriels accessibles, étape par étape, visant à aider les individus à à comprendre et à utiliser le Bitcoin en toute sécurité. Son contenu éducatif couvre un large éventail de sujets, y compris l'autodétention, les portefeuilles matériels, les configurations multi-signatures, le Lightning Network, et les pratiques de confidentialité
description: |
  BTC Sessions è il personaggio online di Ben Perrin, un importante educatore di Educatore e creatore di contenuti Bitcoin con sede in Canada. Dal 2016 produce produrre esercitazioni accessibili e passo-passo per aiutare le persone a a comprendere e utilizzare in modo sicuro Bitcoin. I suoi contenuti educativi coprono una serie di argomenti, tra cui l'autodeposito, i portafogli hardware, la configurazione di più firme, il Lightning Network e le pratiche sulla privacy Lightning Network e le pratiche sulla privacy
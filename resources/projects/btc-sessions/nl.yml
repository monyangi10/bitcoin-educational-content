description: |
  BTC Sessions is de online persona van Ben Perrin, een prominente Bitcoin opvoeder en content creator gevestigd in Canada. Sinds 2016 heeft hij toegankelijke, stap-voor-stap tutorials om mensen te helpen gW-1 te begrijpen en veilig te gebruiken. Zijn educatieve inhoud beslaat een reeks onderwerpen, waaronder self-custody, hardware wallets, multisignature setups, de Lightning Network en privacypraktijken
description: |
  BTC Sessions é a persona online de Ben Perrin, um proeminente Educador Bitcoin e criador de conteúdo baseado no Canadá. Desde 2016, ele tem estado produzindo tutoriais acessíveis, passo a passo, com o objetivo de ajudar os indivíduos entender e usar com segurança o Bitcoin. O seu conteúdo educacional abrange uma série de tópicos, incluindo autocustódia, carteiras de hardware, configurações de várias assinaturas, o Lightning Network e práticas de privacidade
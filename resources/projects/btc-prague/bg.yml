description: |
  Най-голямата европейска конференция Bitcoin през 2023 г. Едната група се състои от биткойнери от цял свят, които са запознати с темите и търсят по-задълбочени прозрения и срещи със съмишленици. Другата група са хора, които са чували за биткойн, искат да се запознаят с него или бавно навлизат в биткойн. Те ще получат пълно обслужване на събитието, включително информация и тестване на биткойн продукти и услуги.
description: |
  Grootste Bitcoin Europese conferentie in 2023. De ene groep bestaat uit bitcoiners van over de hele wereld die bekend zijn met de onderwerpen en op zoek zijn naar diepere inzichten en om gelijkgestemden te ontmoeten. De andere groep bestaat uit mensen die over Bitcoin hebben gehoord, ermee kennis willen maken of zich langzaam in Bitcoin beginnen te verdiepen. Zij krijgen volledige service op het evenement, inclusief informatie en het testen van Bitcoin producten en diensten.
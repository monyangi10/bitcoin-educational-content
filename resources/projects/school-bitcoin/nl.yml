description: |
  De School van Bitcoin biedt een dynamische leergemeenschap door middel van V4V Open Lessen en het Decentrale Autonome Onderwijs Systeem (DAES).
  Onze maandelijkse V4V sessies op HiveTalk zijn voor iedereen toegankelijk en bevorderen het delen van vaardigheden in de Bitcoin ruimte, waarbij deelnemers directe donaties kunnen ontvangen. DAES ondersteunt aspirant-leerlingen door een platform te bieden voor het indienen van Bitcoin projecten, potentiële financiering en mentorschap.
  We beheren ook het Stacker News on Education territorium en bieden een Signal chat voor samenwerking. Sluit je bij ons aan om bij te dragen, te leren en te innoveren binnen de Bitcoin gemeenschap.
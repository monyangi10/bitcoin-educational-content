description: |
  BitAxe เป็นโครงการโอเพ่นซอร์สที่ออกแบบมาเพื่อทดลองกับ Bitcoin mining ด้วยต้นทุนที่ต่ำกว่าโดยใช้ชิป ASIC ที่นำกลับมาใช้ใหม่ เช่น จาก Antminer S19 ที่ได้รับความนิยม โดยมีหลายรุ่นที่ปรับให้เหมาะกับความต้องการของนักขุด มอบประสิทธิภาพสูงสุดถึง 3.3 TH/s แตกต่างจากเครื่องมือการศึกษาเช่น NerdMiner, BitAxe ช่วยให้สามารถเข้าร่วมในกลุ่ม mining เพื่อรับรางวัล generate Bitcoin ปกติในขณะที่ยังคงเข้าถึงได้และปรับแต่งได้ เป็นเครื่องมือที่เหมาะสำหรับผู้ที่ชื่นชอบที่ต้องการสำรวจ mining
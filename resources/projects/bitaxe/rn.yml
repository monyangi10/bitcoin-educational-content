description: |
  BitAxe ni umugambi w'inkomoko yuguruye wagenewe kugerageza Bitcoin Mining kugiciro gitoyi hakoreshejwe ibice vya ASIC vyasubiwemwo, nk'ivyo biva kuri Antminer S19. Itanga ibigereranyo vyinshi bihuye n’ivyo abacukuzi bakeneye, itanga ubushobozi bushika kuri 3.3 TH/s. Udakunze ibikoresho vy’inyigisho nka NerdMiner, BitAxe iremeza kwifatanya mu bidengeri vya Mining ku ngororano za generate zisanzwe za Bitcoin mu gihe iguma ishobora gushikwako kandi ishobora gutunganirizwa. Igikoresho ciza cane ku bakunda gutohoza Mining.
  
description: |
  BitAxe е проект с отворен код, предназначен за експериментиране с Bitcoin mining на по-ниска цена, като се използват повторно използвани чипове ASIC, като тези от популярния Antminer S19. Предлагайки множество модели, съобразени с нуждите на миньорите, той осигурява производителност до 3,3 TH/s. За разлика от образователни инструменти като NerdMiner, BitAxe позволява участие в mining пулове до generate редовни награди Bitcoin, като същевременно остава достъпен и конфигурируем. Идеален инструмент за ентусиасти, които искат да изследват mining.
  
description: |
  Igikoresho co gutanga ubutumwa hagati y’abantu, gikoreshwa ku rubuga rwa Bluetooth mesh ataco rukeneye kuri Internet, ku ma server canke ku nimero za telefone. Igikoresho cose gikora nk’igikoresho cigenga, kigatuma habaho ivy’itumanaho ryo mu karere bishobora guhangana n’ugucengera, ugucungera n’uguhagarara kw’urubuga.
description: |
  Programu iliyogatuliwa kikamilifu ya utumaji ujumbe kutoka kwa rika-kwa-rika, inayofanya kazi kwenye mtandao wa wavu wa Bluetooth bila hitaji la Mtandao, seva au nambari za simu. Kila kifaa hufanya kazi kama relay inayojiendesha, inayowezesha mawasiliano ya ndani ambayo hayawezi kudhibitiwa, ufuatiliaji na kukatika kwa mtandao.
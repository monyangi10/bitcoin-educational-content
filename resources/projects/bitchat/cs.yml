description: |
  Plně decentralizovaná aplikace pro peer-to-peer zasílání zpráv, která funguje v síti Bluetooth mesh bez nutnosti internetu, serverů nebo telefonních čísel. Každé zařízení funguje jako autonomní relé, což umožňuje místní komunikaci, která je odolná vůči cenzuře, dohledu a výpadkům sítě.
description: |
  Aplikasi pesan peer-to-peer yang sepenuhnya terdesentralisasi, beroperasi pada jaringan mesh Bluetooth tanpa memerlukan Internet, server, atau nomor telepon. Setiap perangkat bertindak sebagai relai otonom, memungkinkan komunikasi lokal yang tahan terhadap penyensoran, pengawasan, dan pemadaman jaringan.
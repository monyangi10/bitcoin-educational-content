description: |
  Напълно децентрализирано peer-to-peer приложение за съобщения, работещо в Bluetooth mesh мрежа без нужда от интернет, сървъри или телефонни номера. Всяко устройство действа като автономно ретранслаторно устройство, което позволява локални комуникации, устойчиви на цензура, наблюдение и прекъсвания на мрежата.
description: |
  Полностью децентрализованное одноранговое приложение для обмена сообщениями, работающее в ячеистой сети Bluetooth без необходимости в Интернете, серверах или телефонных номерах. Каждое устройство действует как автономный ретранслятор, обеспечивая локальную связь, устойчивую к цензуре, слежке и перебоям в работе сети.
description: |
  पूरी तरह से विकेन्द्रीकृत पीयर-टू-पीयर मैसेजिंग एप्लिकेशन, ब्लूटूथ मेश नेटवर्क पर बिना इंटरनेट, सर्वर या फ़ोन नंबर की आवश्यकता के संचालित होता है। प्रत्येक डिवाइस एक स्वायत्त रिले के रूप में कार्य करता है, जो सेंसरशिप, निगरानी और नेटवर्क आउटेज के प्रतिरोधी स्थानीय संचार को सक्षम बनाता है।
description: |
  Täielikult detsentraliseeritud peer-to-peer sõnumsiderakendus, mis töötab Bluetooth-võrgus ilma interneti, serverite või telefoninumbrite vajaduseta. Iga seade toimib autonoomse releena, võimaldades kohalikku sidet, mis on vastupidav tsensuurile, järelevalvele ja võrgukatkestustele.
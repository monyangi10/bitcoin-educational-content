description: |
  Vollständig dezentralisierte Peer-to-Peer-Messaging-Anwendung, die über ein Bluetooth-Mesh-Netzwerk ohne Internet, Server oder Telefonnummern funktioniert. Jedes Gerät fungiert als autonomes Relais und ermöglicht lokale Kommunikation, die resistent gegen Zensur, Überwachung und Netzwerkausfälle ist.
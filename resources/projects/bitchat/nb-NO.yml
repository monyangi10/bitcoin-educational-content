description: |
  Fullstendig desentralisert peer-to-peer-meldingsapplikasjon, som opererer på et Bluetooth mesh-nettverk uten behov for Internett, servere eller telefonnumre. Hver enhet fungerer som et autonomt relé, noe som muliggjør lokal kommunikasjon som er motstandsdyktig mot sensur, overvåking og nettverksbrudd.
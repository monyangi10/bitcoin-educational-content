description: |
  W pełni zdecentralizowana aplikacja do przesyłania wiadomości peer-to-peer, działająca w sieci kratowej Bluetooth bez potrzeby korzystania z Internetu, serwerów lub numerów telefonów. Każde urządzenie działa jako autonomiczny przekaźnik, umożliwiając lokalną komunikację, która jest odporna na cenzurę, nadzór i awarie sieci.
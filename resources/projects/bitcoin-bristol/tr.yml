description: |
  Yerel taban eğitim buluşmaları ve atölye çalışmaları (Kuruluş 2020), Bitcoin Bristol, Bitcoin'ın ailelerimiz, topluluklarımız ve Bristol şehri için geleceği iyileştirme potansiyeli konusunda hevesli bireyler ve yerel işletmelerden oluşan bir ağdır. Dost canlısı yerel mekânlar arasında dönüşümlü olarak çalışıyoruz, siz de katılmak isterseniz bize ulaşın.
  
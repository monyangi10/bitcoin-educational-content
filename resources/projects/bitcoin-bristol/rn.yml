description: |
  Amakoraniro y’uburezi bwo mu karere n’amahugurwa (Est. 2020), Bitcoin Bristol ni urubuga rw’abantu ku giti cabo n’ubudandaji bwo mu karere bufise igishika ku bushobozi bwa Bitcoin bwo guteza imbere kazoza k’imiryango yacu, imiryango n’igisagara ca Bristol. Turazunguruka ibibanza vy’abagenzi vyo mu karere, ushikire nimba ushaka kuba umwe muri bo.
  
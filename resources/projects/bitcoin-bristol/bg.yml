description: |
  Местни образователни срещи и семинари на местно ниво (от 2020 г.), Bitcoin Бристол е мрежа от физически лица и местни предприятия, ентусиазирани от потенциала на Bitcoin да подобри бъдещето на нашите семейства, общности и град Бристол. Ние се въртим на приятелски настроени местни места, свържете се с нас, ако искате да бъдете един от тях.
  
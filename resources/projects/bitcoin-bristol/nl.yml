description: |
  Local grassroots education meetups & workshops (Est. 2020), Bitcoin Bristol is een netwerk van individuen & lokale bedrijven die enthousiast zijn over het potentieel van Bitcoin om de toekomst van onze families, gemeenschappen & de stad Bristol te verbeteren. We rouleren rond vriendelijke lokale locaties, neem contact op als je erbij wilt zijn.
  
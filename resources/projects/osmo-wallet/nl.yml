description: |
  OSMO biedt financiële oplossingen in Guatemala, Mexico, Costa Rica en binnenkort El Salvador, waarbij Bitcoin wordt gebruikt in de backend zonder dat gebruikers direct BTC hoeven te verwerken. Klanten houden en versturen fiat terwijl OSMO omzet van en naar Bitcoin. Deze aanpak maakt grensoverschrijdende transacties sneller en goedkoper dan traditionele bankoverschrijvingen.
  
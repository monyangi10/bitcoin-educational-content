description: |
  OSMO предоставя финансови решения в Гватемала, Мексико, Коста Рика и скоро в Салвадор, като използва биткойн в бекенда, без да е необходимо потребителите да боравят директно с BTC. Клиентите държат и изпращат фиатни пари, докато OSMO конвертира във и от биткойн. Този подход прави трансграничните трансакции по-бързи и по-евтини от традиционните банкови преводи.
  
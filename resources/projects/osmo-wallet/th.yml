description: |
  OSMO ให้บริการทางการเงินในกัวเตมาลา เม็กซิโก คอสตาริกา และเร็วๆ นี้ในเอลซัลวาดอร์ โดยใช้บิตคอยน์ในระบบหลังบ้านโดยที่ผู้ใช้ไม่จำเป็นต้องจัดการกับ BTC โดยตรง ลูกค้าถือและส่งเงินสกุลเงินทั่วไปในขณะที่ OSMO แปลงเป็นและจากบิตคอยน์ วิธีการนี้ทำให้การทำธุรกรรมข้ามพรมแดนรวดเร็วและถูกกว่าการโอนเงินผ่านธนาคารแบบดั้งเดิม
description: |
  OSMO itanga inyishu z’ivy’amahera muri Guatemala, Mexique, Costa Rica, no muri El Salvador vuba, ikoresheje Bitcoin mu nyuma ata bakoresha bakeneye gukorana na BTC ataco baciye. Abaguzi bafata kandi bagarungika fiat mu gihe OSMO ihindura ikaja no kuva kuri Bitcoin. Ubwo buryo butuma amafaranga ajabuka imipaka yihuta kandi atari make kuruta amafaranga yoherezwa muri banki asanzwe.
  
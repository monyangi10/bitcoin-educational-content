description: |
  Moon to usługa umożliwiająca zakup kart wirtualnych za pomocą Bitcoin. Te wirtualne karty są akceptowane przez wiele firm, aby pomóc w dokonywaniu zakupów online. Platforma wykorzystuje Lightning Network, aby ułatwić szybkie i tanie transakcje Bitcoin, ułatwiając użytkownikom wydawanie Bitcoin w codziennych sytuacjach.
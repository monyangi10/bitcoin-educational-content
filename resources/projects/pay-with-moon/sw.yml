description: |
  Moon ni huduma inayokuruhusu kununua kadi pepe kwa kutumia Bitcoin. Kadi hizi pepe zinakubaliwa na biashara nyingi ili kukusaidia kufanya ununuzi mtandaoni. Mfumo huu unatumia Lightning Network kuwezesha miamala ya haraka na ya bei nafuu ya Bitcoin, hivyo kurahisisha watumiaji kutumia Bitcoin yao katika hali za kila siku.
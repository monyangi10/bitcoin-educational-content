description: |
  Moon is een dienst waarmee je met Bitcoin virtuele kaarten kunt kopen. Deze virtuele kaarten worden door veel bedrijven geaccepteerd, zodat je online aankopen kunt doen. Het platform maakt gebruik van de Lightning Network om snelle en goedkope Bitcoin transacties mogelijk te maken, waardoor het voor gebruikers makkelijker wordt om hun Bitcoin in alledaagse situaties uit te geven.
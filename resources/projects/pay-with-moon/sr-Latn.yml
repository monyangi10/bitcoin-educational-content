description: |
  Moon je usluga koja vam omogućava kupovinu virtuelnih kartica koristeći Bitcoin. Ove virtuelne kartice prihvataju mnoge firme kako bi vam pomogle da obavljate online kupovine. Platforma koristi Lightning Network za olakšavanje brzih i niskotarifnih Bitcoin transakcija, što korisnicima olakšava trošenje njihovog Bitcoin u svakodnevnim situacijama.
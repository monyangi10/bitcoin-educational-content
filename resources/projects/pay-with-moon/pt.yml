description: |
  O Moon é um serviço que lhe permite adquirir cartões virtuais utilizando o Bitcoin. Estes cartões virtuais são aceites por muitas empresas para o ajudar a fazer compras online. A plataforma utiliza o Lightning Network para facilitar transacções rápidas e de baixo custo em Bitcoin, tornando mais fácil para os utilizadores gastarem os seus Bitcoin em situações quotidianas.
description: |
  Moon adalah layanan yang memungkinkan Anda membeli kartu virtual menggunakan Bitcoin. Kartu virtual ini diterima oleh banyak bisnis untuk membantu Anda melakukan pembelian online. Platform ini memanfaatkan Lightning Network untuk memfasilitasi transaksi Bitcoin yang cepat dan murah, sehingga memudahkan pengguna untuk membelanjakan Bitcoin mereka dalam situasi sehari-hari.
description: |
  Ukwezi ni igikorwa kigufasha kugura amakarita y'ubuhinga bwa none ukoresheje Bitcoin. Izo karata z’ubuhinga bwa none zemerwa n’ubudandaji bwinshi kugira ngo zigufashe kugura ibintu kuri Internet. Iryo koraniro rikoresha Lightning Network kugira ngo ryorohereza abantu gukoresha Bitcoin vyihuta kandi bihenda, bikaba vyoroshe ku bakoresha gukoresha Bitcoin yabo mu bihe vya misi yose.
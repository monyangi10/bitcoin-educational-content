description: |
  Moon - это сервис, позволяющий приобретать виртуальные карты с помощью Bitcoin. Эти виртуальные карты принимаются многими предприятиями, чтобы помочь вам совершать онлайн-покупки. Платформа использует Lightning Network для быстрых и недорогих транзакций Bitcoin, что облегчает пользователям трату Bitcoin в повседневных ситуациях.
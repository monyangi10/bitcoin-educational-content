description: |
  Lightning Labs ni ishirahamwe ry’ubuhinga ryibanda ku gutegura Lightning Network, ni porotokole ya Layer-two yubatswe hejuru ya Bitcoin ishobora gutuma umuntu ashobora gukora amafaranga yihuta kandi ataco atwara. Iyo sosiyete itanga inyishu zifunguye, zitekanye kandi zishobora guhindurwa zituma abakoresha boherezwa no kwakira amahera mu buryo butagira uko bungana.
  
  Kimwe mu bikoresho vyabo vy’intango ni Lightning Terminal, Interface ikoreshwa neza kandi yorosha gucunga node za Lightning. Ico gikoresho kiratanga urubuga rushingiye ku rubuga, urubuga rwo gutohoza urubuga, n’ibikoresho vyinshi vyo gucunga amahera, bikaba bituma vyoroha gukora ibikorwa vyinshi, vy’ubucuruzi bwa Bitcoin bihita bikoreshwa n’amahera makeyi.
  
  Uretse Lightning Terminal, Lightning Labs kandi itanga urutonde rw’ibikorwa vy’ivy’ubutunzi bishobora kugenzurwa, bitagiramwo ububiko bishingiye kuri Lightning Network, bikaba bizibira itandukaniro hagati ya porogarama zifunguye n’ibikorwa vy’ivy’ubutunzi vy’uruvyaro rukurikira rwa Bitcoin.
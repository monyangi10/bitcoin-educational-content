description: |
  VeraCrypt ni porogaramu yo gukingira amakuru yawe y’agaciro. Nk’uko ari yo yakurikiye TrueCrypt, itanga ubuhinga bukomeye bwo gukingira amakuru hakoreshejwe ubuhinga nka AES, Serpent, canke Twofish, bikaba bishoboza guhingura ibitabo vy’amakuru canke gukingira amakuru y’ibice n’amadisiki yose, yo mu mutima n’ayo hanze.
  
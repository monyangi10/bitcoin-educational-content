description: |
  VeraCrypt is open-source software voor schijfversleuteling die je gevoelige gegevens helpt beschermen. Als opvolger van TrueCrypt biedt het robuuste versleuteling met algoritmen zoals AES, Serpent of Twofish, waarmee je versleutelde volumes kunt aanmaken of partities en hele schijven kunt versleutelen, zowel intern als extern.
  
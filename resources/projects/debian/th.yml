description: |
  องค์กรชุมชนก่อตั้งขึ้นในปี 1993 ทุ่มเทให้กับการพัฒนาระบบปฏิบัติการฟรี Debian ประกอบด้วยอาสาสมัครจากทั่วโลก โครงการ Debian มุ่งมั่นที่จะผลิตระบบที่เสถียร ปลอดภัย และฟรีอย่างสมบูรณ์ โดยอิงจากเคอร์เนลลินุกซ์ Debian มีชื่อเสียงในด้านมาตรฐานคุณภาพซอฟต์แวร์ที่เข้มงวด การจัดการแบบประชาธิปไตย และนโยบายที่เข้มงวดในความโปรดปรานของซอฟต์แวร์ฟรี ซึ่งได้ถูกกำหนดไว้ใน Debian Social Contract และแนวทางซอฟต์แวร์ฟรีของ Debian
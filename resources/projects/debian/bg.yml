description: |
  Обществена организация, основана през 1993 г., посветена на разработването на свободната операционна система Debian. Съставен от доброволци от цял свят, проектът Debian има за цел да създаде стабилна, сигурна и напълно безплатна система, базирана на ядрото на Linux. Debian е известен със своите строги стандарти за качество на софтуера, демократично управление и строга политика в полза на свободния софтуер, оформена в Debian Social Contract и Debian Free Software Guidelines.
description: |
  Ishirahamwe ry'abanyagihugu ryashinzwe mu 1993, ryihaye gutegura uburyo bwo gukoresha Debian ku buntu. Ugizwe n’abakozi b’intahemuka bava kw’isi yose, umugambi wa Debian ugamije guhingura ubuhinga buhamye, butekanye kandi butagiramwo ubuntu, bushingiye ku ntumbero ya Linux. Debian izwi cane kubera ingingo ngenderwako zayo zikomeye z’uburyo bwa porogaramu, uburongozi bwa demokarasi n’ingingo ngenderwako zikomeye zishigikira porogaramu z’ubuntu, nk’uko vyategekanijwe muri Debian Social Contract n’Ingingo ngenderwako za Porogaramu z’Ubuntu za Debian.
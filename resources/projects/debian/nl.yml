description: |
  Gemeenschapsorganisatie opgericht in 1993, gewijd aan de ontwikkeling van het vrije besturingssysteem Debian. Het Debian-project bestaat uit vrijwilligers van over de hele wereld en heeft als doel het produceren van een stabiel, veilig en volledig vrij systeem, gebaseerd op de Linux-kernel. Debian staat bekend om zijn strenge softwarekwaliteitsnormen, democratisch beheer en strikte beleid ten gunste van vrije software, zoals geformaliseerd in de Debian Social Contract en de Debian Richtlijnen voor Vrije Software.
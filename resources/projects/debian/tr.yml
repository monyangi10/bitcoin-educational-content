description: |
  Debian özgür işletim sisteminin geliştirilmesine adanmış, 1993 yılında kurulmuş topluluk organizasyonu. Dünyanın dört bir yanından gelen gönüllülerden oluşan Debian projesi, Linux çekirdeğine dayanan istikrarlı, güvenli ve tamamen özgür bir sistem üretmeyi amaçlamaktadır. Debian, sıkı yazılım kalite standartları, demokratik yönetimi ve Debian Social Contract ve Debian Free Software Guidelines'da resmileştirildiği gibi özgür yazılım lehine katı politikası ile ünlüdür.
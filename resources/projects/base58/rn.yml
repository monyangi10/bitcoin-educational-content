description: |
  Base58🔓 ni ishure ry'amasezerano ya Bitcoin. Amashure yacu yo kuri internet no ku muntu ni ahantu heza ho gutangura ku batangura ubuhinga barondera gukaraba ku ruhande mbere n’abahinga mu vy’ubuhinga barondera kwigerageza n’ugutera intambwe mu bijanye n’amategeko ya Bitcoin ubwayo. Aho uri hose mu rugendo rwawe rwo kuja mu ruhande rw'ubuhinga rwa Bitcoin, turi hano kugira ngo tugushire ku rugero.
description: |
  Base58🔓 is een Bitcoin protocolschool. Onze online en persoonlijke cursussen zijn de perfecte startplaats voor technische beginners die de oppervlakte willen verkennen tot zelfs de meest ervaren ontwikkelaars die zichzelf willen uitdagen met een duik in het Bitcoin protocol zelf. Waar je ook bent op je reis naar de technische kant van Bitcoin, wij zijn er om je bij te scholen.
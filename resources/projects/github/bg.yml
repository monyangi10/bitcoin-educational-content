description: |
  Платформа за съвместна разработка на софтуер, която позволява на разработчиците да управляват, споделят и хостват своите проекти с помощта на системата за контрол на версиите Git. Основана през 2008 г. и понастоящем собственост на Microsoft, GitHub улеснява работата в екип с инструменти за проследяване на промени, докладване на проблеми и публикуване на код. GitHub се използва най-вече от проекта Bitcoin Core, който е основната реализация на Bitcoin.
  
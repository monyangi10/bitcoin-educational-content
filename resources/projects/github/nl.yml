description: |
  Samenwerkingsplatform voor softwareontwikkeling dat ontwikkelaars in staat stelt hun projecten te beheren, te delen en te hosten met behulp van het versiebeheersysteem Git. GitHub, opgericht in 2008 en nu eigendom van Microsoft, faciliteert teamwerk met tools voor het bijhouden van wijzigingen, het rapporteren van problemen en het publiceren van code. GitHub wordt met name gebruikt door het Bitcoin core project, de belangrijkste implementatie van Bitcoin.
  
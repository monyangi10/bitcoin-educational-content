description: |
  แพลตฟอร์มการพัฒนาซอฟต์แวร์ร่วมกันที่ช่วยให้นักพัฒนาสามารถจัดการ แบ่งปัน และโฮสต์โครงการของพวกเขาโดยใช้ระบบควบคุมเวอร์ชัน Git ก่อตั้งขึ้นในปี 2008 และปัจจุบันเป็นเจ้าของโดย Microsoft GitHub อำนวยความสะดวกในการทำงานเป็นทีมด้วยเครื่องมือสำหรับติดตามการเปลี่ยนแปลง รายงานปัญหา และเผยแพร่โค้ด GitHub ถูกใช้โดยโครงการ Bitcoin Core ซึ่งเป็นการนำไปใช้หลักของ Bitcoin อย่างเด่นชัด
description: |
  Geliştiricilerin Git sürüm kontrol sistemini kullanarak projelerini yönetmelerini, paylaşmalarını ve barındırmalarını sağlayan işbirliğine dayalı yazılım geliştirme platformu. 2008 yılında kurulan ve şu anda Microsoft'a ait olan GitHub, değişiklikleri izleme, sorunları bildirme ve kod yayınlama araçlarıyla ekip çalışmasını kolaylaştırır. GitHub, özellikle Bitcoin'in ana uygulaması olan Bitcoin core projesi tarafından kullanılmaktadır.
  
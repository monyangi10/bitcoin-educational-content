description: |
  Urubuga rwo gutegura porogarama rwo gukorana n’abandi rushoboza abategura gucunga, gusangira no kwakira imigambi yabo bakoresheje uburyo bwo kugenzura verisiyo ya Git. Yashinzwe mu 2008 ubu ikaba ari iya Microsoft, GitHub ifasha mu gukorana n’abandi n’ibikoresho vyo gukurikirana amahinduka, gutanga raporo y’ibibazo, no gutangaza kode. GitHub ikoreshwa cane cane n'umugambi wa Bitcoin core, ugushirwa mu ngiro kwa Bitcoin.
  
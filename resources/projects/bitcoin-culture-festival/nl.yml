description: |
  We zijn ervan overtuigd dat kunst, film en cultuur de Bitcoin beweging creatief kunnen vastleggen. We houden van de technologie en dromen groots. De waarheid is niet te stoppen. We promoten het Bitcoin ethos door middel van evenementen en kunsttentoonstellingen en staan open voor samenwerking met mensen die de principes van vreedzame revolutie begrijpen.
  
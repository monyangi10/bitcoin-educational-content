description: |
  เราเชื่อมั่นอย่างแน่วแน่ว่าศิลปะ ภาพยนตร์ และวัฒนธรรมสามารถจับภาพการเคลื่อนไหว Bitcoin ได้อย่างสร้างสรรค์ เรารักเทคโนโลยีและกำลังฝันให้ใหญ่ ความจริงนั้นไม่อาจหยุดยั้งได้ เราส่งเสริมจริยธรรมของ Bitcoin ผ่านกิจกรรมและการแสดงศิลปะ และเปิดรับการร่วมมือกับผู้ที่เข้าใจหลักการของการปฏิวัติอย่างสันติ
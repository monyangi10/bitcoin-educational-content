description: |
  Sanat, Film ve Kültürün Bitcoin hareketini yaratıcı bir şekilde yakalayabileceğine inanıyoruz. Teknolojiyi seviyoruz ve büyük hayaller kuruyoruz. Gerçek durdurulamaz. Bitcoin ethosunu etkinlikler ve sanat gösterileri aracılığıyla tanıtıyoruz ve barışçıl devrim ilkelerini anlayan insanlarla işbirliği yapmaya açığız.
  
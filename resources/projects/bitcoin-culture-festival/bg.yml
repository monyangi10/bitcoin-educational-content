description: |
  Твърдо вярваме, че изкуството, киното и културата могат по творчески начин да уловят движението Bitcoin. Обичаме техниката и мечтаем за нещо голямо. Истината е неудържима. Популяризираме етоса на Bitcoin чрез събития и художествени изложби и сме отворени за сътрудничество с хора, които разбират принципите на мирната революция.
  
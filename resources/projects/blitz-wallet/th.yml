description: |
  Blitz Wallet เป็นแอปพลิเคชันมือถือ Bitcoin wallet ที่ผู้ใช้ดูแลรักษาเอง ออกแบบมาเพื่อให้ง่ายต่อการใช้งาน Bitcoin ในชีวิตประจำวัน ช่วยให้การส่ง รับ และใช้จ่ายบิตคอยน์บน Lightning, Liquid และ eCash เป็นเรื่องง่าย นอกจากนี้ยังมีฟีเจอร์ที่ใช้งานได้จริง เช่น การซื้อบัตรของขวัญและการรวมระบบการชำระเงินของร้านค้า
description: |
  Blitz Wallet is een zelf-custodiale Bitcoin Wallet mobiele applicatie, ontworpen om het dagelijks gebruik van Bitcoin te vereenvoudigen. Het maakt het makkelijk om bitcoins te versturen, ontvangen en uit te geven op Lightning, Liquid en eCash. Het biedt ook praktische functies zoals het kopen van cadeaubonnen en integratie van betaalsystemen.
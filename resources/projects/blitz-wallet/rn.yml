description: |
  Blitz Wallet ni porogaramu yo kwikingira Bitcoin Wallet yagenewe kworohereza gukoresha Bitcoin ku musi ku musi. Bituma vyoroha kohereza, kwakira no gukoresha amafaranga y’ibiceri ku Muravyo, Liquid na eCash. Itanga kandi ibintu bikora nk’ugugura ikarita y’ingabirano n’ugushiramwo uburyo bwo kwishura abacuruzi.
description: |
  Blitz Wallet е самостоятелно мобилно приложение Bitcoin wallet, предназначено да опрости ежедневната употреба на Bitcoin. То улеснява изпращането, получаването и харченето на биткойни в Lightning, Liquid и eCash. То предлага и практични функции, като например закупуване на карти за подаръци и интеграция с платежни системи на търговци.
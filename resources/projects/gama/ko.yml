description: |
  Green 아프리카 Mining 연합은 아프리카 국가의 회사들로 구성되어 있으며, 매년 회원사가 자국에서 행사를 주최합니다. GAMA의 목적은 아프리카의 재생 가능한 Bitcoin Mining 기업을 한 우산 아래 모아 전 세계 Mining의 지리적 확산을 위해 협력하고, 신규 광부 및 Mining 조직이 아프리카에서 재생 에너지원을 찾고 공략하도록 지원하고, 에너지 회사가 더 많은 에너지가 필요한 새로운 지역사회와 장소를 찾도록 도와 아프리카의 전기화를 촉진하고, 미래의 Bitcoin Mining pool이 시작하고 성장할 수 있는 조직의 기반을 제공하는 것입니다.
  
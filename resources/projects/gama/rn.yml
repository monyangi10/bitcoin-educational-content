description: |
  Green Africa Mining Alliance igizwe n’amashirahamwe yo mu bihugu vya Afrika, buri mwaka ishirahamwe ry’abanyamuryango rigira umusi mukuru mu gihugu cabo. Intumbero ya GAMA ni ugutuma amashirahamwe y’inguvu zishobora gusubirwamwo muri Afirika aguma ari munsi y’umutaka aho yoshobora gukorana kugira ngo yongere gukwiragira kwa Mining kw’isi yose, gufasha abacukuzi bashasha n’imiryango ya Mining kurondera no gushimikira ku masoko y’inguvu zishobora gusubirwamwo muri Afirika, gutuma amashirahamwe mashasha akoresha amashanyarazi akenewe muri Afirika inguvu, no gutanga urufatiro rw’imirwi aho Bitcoin Mining pool izoza ishobora gutangura no gukura.
  
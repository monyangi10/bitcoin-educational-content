description: |
  Green Африка Алиансът Mining е съставен от компании от африкански държави, като всяка година една от членуващите компании е домакин на събитие в своята страна. Целта на GAMA е да обедини компаниите за възобновяеми биткойни mining в Африка под един чадър, където те да работят заедно, за да увеличат географското разпространение на mining по света, да подпомогнат новите миньори и mining организации да намерят и насочат възобновяеми енергийни източници в Африка, да катализират електрификацията на Африка, като помогнат на енергийните компании да намерят нови общности и места, които се нуждаят от повече енергия, и да осигурят база от организации, от които да започне и да се разрасне бъдещият биткойн mining пул.
  
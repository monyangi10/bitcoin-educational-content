description: |
  Green Afrika Mining İttifakı, Afrika ülkelerinden şirketlerden oluşmakta ve her yıl bir üye şirket kendi ülkesinde bir etkinliğe ev sahipliği yapmaktadır. GAMA'nın amacı, Afrika'daki yenilenebilir Bitcoin Mining şirketlerini, Mining'nin dünya çapında coğrafi yayılımını artırmak için birlikte çalışabilecekleri bir şemsiye altında toplamak, yeni madencilere ve Mining kuruluşlarına Afrika'da yenilenebilir enerji kaynakları bulma ve hedefleme konusunda yardımcı olmak, enerji şirketlerinin daha fazla enerjiye ihtiyaç duyan yeni topluluklar ve yerler bulmasına yardımcı olarak Afrika'nın elektrifikasyonunu katalize etmek ve gelecekteki Bitcoin Mining pool'ın başlayıp büyüyebileceği bir kuruluş tabanı sağlamaktır.
  
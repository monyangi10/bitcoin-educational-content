description: |
  Green Africa Mining Alliance ประกอบด้วยบริษัทจากประเทศในแอฟริกา โดยในแต่ละปีจะมีบริษัทสมาชิกเป็นเจ้าภาพจัดงานในประเทศของตน วัตถุประสงค์ของ GAMA คือการรวบรวมบริษัท mining พลังงานหมุนเวียนในแอฟริกาให้อยู่ภายใต้ร่มเดียวกัน ซึ่งพวกเขาสามารถทำงานร่วมกันเพื่อเพิ่มการกระจายตัวทางภูมิศาสตร์ของ mining ทั่วโลก ช่วยเหลือนักขุดและองค์กร mining ใหม่ในการค้นหาและมุ่งเป้าหมายแหล่งพลังงานหมุนเวียนในแอฟริกา กระตุ้นการใช้ไฟฟ้าในแอฟริกาโดยช่วยให้บริษัทพลังงานค้นหาชุมชนและสถานที่ใหม่ๆ ที่ต้องการพลังงานมากขึ้น และจัดหาฐานขององค์กรที่สามารถเริ่มต้นและเติบโตเป็นกลุ่ม bitcoin mining ในอนาคตได้
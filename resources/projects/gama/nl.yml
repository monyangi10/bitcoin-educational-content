description: |
  Green Africa Mining Alliance bestaat uit bedrijven uit Afrikaanse landen, elk jaar organiseert een lidbedrijf een evenement in hun land. Het doel van GAMA is om de duurzame Bitcoin Mining bedrijven in Afrika onder een paraplu te brengen, waar ze kunnen samenwerken om de geografische spreiding van Mining over de wereld te vergroten, nieuwe mijnbouwers en Mining organisaties te helpen bij het vinden en richten van duurzame energiebronnen in Afrika, de elektrificatie van Afrika te katalyseren door energiebedrijven te helpen nieuwe gemeenschappen en locaties te vinden die meer energie nodig hebben, en een basis van organisaties te bieden van waaruit een toekomstige Bitcoin Mining pool kan starten en groeien.
  
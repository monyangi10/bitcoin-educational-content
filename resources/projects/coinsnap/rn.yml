description: |
  Coinsnap ni urubuga rwo kwishura Bitcoin rukoreshwa neza rufasha ubucuruzi kwemera mu buryo bworoshe kwishura Bitcoin biciye ku ruzitiro rukuru n’urubuga rwa Lightning. Coinsnap yagenewe kworohereza uburyo bwo kwishura, itanga uburyo bwo gukoresha n’ibikoresho bikora ku bacuruzi bipfuza kwinjiza Bitcoin mu bikorwa vyabo vya misi yose.
description: |
  Bitcoin Chiang Mai ni ikibanza gikomeye c’umuryango wa Bitcoin mu Buraruko bwa Tayilande, gitanga ikibanza aho abantu bashobora guhurira, gukorana, no kwubaka mu bidukikije vya Bitcoin. Iri mu gisagara ca Chiang Mai gifise umuco mwinshi kandi gifise ubuhinga, iki kibanza gikwegera aba Bitcoiners bo hirya no hino kw’isi bakunda cane guteza imbere ubusegaba bw’umuntu ku giti ciwe n’imiti y’urunganwe.
  
   Ishimikiye ku bumenyi ngirakamaro, bushobora gukoreshwa, Bitcoin Chiang Mai irakira amahugurwa adasanzwe, amakoraniro y’ubuhinga, n’ibirori bihuye n’abaterambere, abacukuzi b’amabuye y’agaciro, abigisha, n’abanyamigambi. Iryo shirahamwe rishimika ku kwubaka ibikoresho n’imiti kuri Bitcoin mu gihe ritera imbere umuco wo gukorana n’uguhingura ibintu bishasha. Kubera umuryango wo mu karere no kw’isi yose utera imbere, ni ahantu aba Bitcoiners bashobora gutanga ivyiyumviro vya Exchange, gukora ku migambi y’inkomoko yuguruye, no gutegura uburyo bwo gukomeza kwemerwa kwa Bitcoin kw’isi yose.
  
   Waba uriko uratera imbere mu gushirwa mu ngiro kwa Lightning Network yawe, uriko urarondera inyishu z’ubusegaba bw’ivy’ubutunzi, canke uriko urarondera gusa kwifatanya n’abantu bafise ivyiyumviro nk’ivyawe, Bitcoin Chiang Mai itanga ikibanza ciza co kwibika muri kazoza ka Bitcoin.
  
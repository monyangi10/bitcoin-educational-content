description: |
  Ishirahamwe rya Blocktrainer ritanga ibikorwa vy’inyigisho vy’ukuri kandi bishingiye ku vyiyumviro vya Bitcoin n’ubutunzi. Kubera uburyo bwayo bwo gukora ata buryarya kandi bushingiye ku mutimanama, Blocktrainer yararonse izina mu bijanye n’ivy’ubutunzi bivuga ururimi rw’ikidagi Bitcoin n’ivy’amahera.
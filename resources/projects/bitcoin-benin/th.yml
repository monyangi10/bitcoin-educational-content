description: |
  Bitcoin Bénin คือชุมชนของผู้ใช้ Bitcoin ในเบนิน มันรวบรวมชุมชนท้องถิ่นแต่ก็กำลังทำงานเพื่อเข้าถึงผู้ชมที่กว้างขึ้นมาก
  
  ริเริ่มโดยสมาชิกที่กระตือรือร้นของชุมชนท้องถิ่น อัลฟองส์ - ลอยก์ & ซามาด Bitcoin Bénin ทำงานเพื่อให้ความรู้แก่ประชากรท้องถิ่นในทุกด้านของ Bitcoin ผ่านการพบปะ Bitcoin รายเดือน เซสชันพิเศษเกี่ยวกับหัวข้อ Bitcoin โรงเรียน La Bitcoin และกิจกรรมพิเศษอื่น ๆ อีกมากมายที่เสริมสร้างการศึกษาที่ดีเกี่ยวกับ Bitcoin
  
  เรามีชุมชนที่เติบโตผ่าน WhatsApp, telegram, เครือข่ายและการพบปะ และกำลังทำงานเพื่อพัฒนาโปรแกรมที่ตอบสนองความต้องการของชุมชนทั้งหมด
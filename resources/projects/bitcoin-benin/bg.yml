description: |
  Bitcoin Bénin е общността на биткойнърите в Бенин. Тя обединява местната общност, но работи за достигане на много по-широка аудитория.
  
  Инициирана от активните членове на местната общност, Алфонс - Лоик и Самад, Bitcoin Bénin работи за образоването на местното население по всички аспекти на Bitcoin чрез ежемесечни Bitcoin Meetups, специални сесии по теми, свързани с Bitcoin, La Bitcoin School и много други специални дейности, които подсилват доброто Bitcoin образование.
  
  Имаме разрастваща се общност чрез WhatsApp, Telegram, мрежи и Meetups и работим за разработване на програми, които да отговарят на нуждите на цялата общност.
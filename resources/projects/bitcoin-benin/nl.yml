description: |
  Bitcoin Bénin is de Beninse gemeenschap van Bitcoiners. Het brengt de lokale gemeenschap samen, maar werkt aan het bereiken van een veel breder publiek.
  
  Geïnitieerd door actieve leden van de lokale gemeenschap, Alphonse - Loïc & Samad, werkt Bitcoin Bénin aan het onderwijzen van de lokale bevolking over alle aspecten van Bitcoin door middel van maandelijkse Bitcoin Meetups, speciale sessies rond Bitcoin onderwerpen, La Bitcoin School en vele andere speciale activiteiten die goed Bitcoin onderwijs versterken.
  
  We hebben een groeiende gemeenschap via WhatsApp, telegram, netwerken en Meetups en werken aan de ontwikkeling van programma's die voldoen aan de behoeften van de hele gemeenschap.
description: |
  Bitcoin Bénin, Benin'in Bitcoin kullanıcıları topluluğudur. Yerel toplumu bir araya getiriyor ancak çok daha geniş bir kitleye ulaşmak için çalışıyor.
  
  Yerel topluluğun aktif üyeleri Alphonse - Loïc & Samad tarafından başlatılan Bitcoin Bénin, aylık Bitcoin Buluşmaları, Bitcoin konuları etrafında özel oturumlar, La Bitcoin Okulu ve iyi Bitcoin eğitimini güçlendiren diğer birçok özel etkinlik aracılığıyla yerel nüfusu Bitcoin'ın tüm yönleri hakkında eğitmek için çalışıyor.
  
  WhatsApp, telegram, ağlar ve Meetup'lar aracılığıyla büyüyen bir topluluğumuz var ve tüm topluluğun ihtiyaçlarını karşılayan programlar geliştirmek için çalışıyoruz.
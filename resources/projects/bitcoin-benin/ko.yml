description: |
  Bitcoin 베냉은 베냉의 비트코인 커뮤니티입니다. 베닌은 지역 커뮤니티를 하나로 모으지만 훨씬 더 많은 사람들에게 다가가기 위해 노력하고 있습니다.
  
  지역 커뮤니티의 활동적인 회원인 알폰스 로익과 사마드가 시작한 Bitcoin 베냉은 매월 Bitcoin 밋업, Bitcoin 주제에 관한 특별 세션, 라 Bitcoin 스쿨 및 기타 여러 특별 활동을 통해 지역 주민들에게 Bitcoin의 모든 측면을 교육하는 데 힘쓰며 좋은 Bitcoin 교육을 강화합니다.
  
  WhatsApp, 텔레그램, 네트워크, 밋업을 통해 커뮤니티가 성장하고 있으며, 전체 커뮤니티의 요구를 충족하는 프로그램을 개발하기 위해 노력하고 있습니다.
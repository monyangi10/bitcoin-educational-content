description: |
  Bitcoin Bénin ni umuryango w’abanya Benin bakoresha Bitcoin. Irahuza abantu bo mu karere ariko iriko irakora kugira ngo ishikire abantu benshi cane.
  
  Yatangujwe n’abanyamuryango b’abanyagihugu b’abanyamwete, Alphonse - Loïc & Samad, Bitcoin Bénin ikora kugira ngo yigishe abanyagihugu ku mice yose y’ubuhinga bwa Bitcoin biciye mu nama za Bitcoin zibera buri kwezi, ibiganiro bidasanzwe bishingiye ku nsiguro za Bitcoin, ishure rya La Bitcoin n’ibindi bikorwa vyinshi bidasanzwe vy’inyigisho nziza ku bijanye n’ubuhinga bwa none.
  
  Turafise umuryango uriko urakura biciye kuri WhatsApp, telegram, networks na Meetups kandi turiko turakora kugira ngo dutegure porogarama zihuye n’ivyo umuryango wose ukeneye.
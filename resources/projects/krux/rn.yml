description: |
  Krux ni porogaramu y’inkomoko yuguruye ihindura ibikoresho vya Kendryte K210 bitari ku ruhande, nka Maix Amigo, M5StickV n’ibindi, bikaba ibikoresho vy’ugusinya amasezerano vy’ubuhinga bwa Bitcoin. Uretse ibikorwa vyayo nyamukuru, Krux ni urubuga rushobora guhinduka rushobora gukoreshwa n’ibikoresho bifise imiterere itandukanye, rutanga ibikoresho vyinshi vyo gufasha mu kurema no gusubizaho ama backups ya Mnemonic, bimwe muri vyo bikaba birimwo uburyo bwo gushiramwo amakuru kugira ngo umutekano urushirizeho.
  
  Ivyuma nka Maix Amigo, Yahboom canke WonderMV biraza biteguye gukoreshwa, bifise amashusho manini manini akora ku mubiri atuma vyoroha kandi bikoreshwa neza. Ivyo bikoresho ni vyiza ku barondera umuti wo gutera n’ugukina. Ku rundi ruhande, Krux kandi irashigikira ibikoresho vy’iterambere, bikaba ari vyiza ku bakunzi ba DIY bakunda guhindura no kwubaka ibikoresho vyabo.
  
  Ikorana neza n’abarongozi b’amasakoshi y’abahuzabikorwa biciye ku makode ya QR, amakarita ya SD, mbere n’amacapiro y’ubushuhe, iyo porogarama ikoreshwa neza itanga ibintu bidasanzwe vyo gufasha mu gufasha amafaranga n’ugucungera amakuru ya Mnemonic mu bidukikije bitagira urubuga.
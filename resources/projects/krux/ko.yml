description: |
  Krux는 오픈 소스 펌웨어로, Maix Amigo, M5StickV 등과 같은 기성 Kendryte K210 장치를 다용도 Bitcoin 트랜잭션 서명기로 변환합니다. Krux는 핵심 기능 외에도 다양한 폼 팩터를 가진 장치에 적용할 수 있는 유연한 플랫폼으로, Mnemonic 백업의 생성 및 복구를 지원하는 도구 모음을 제공하며, 이 중 일부는 보안 강화를 위한 암호화 옵션을 포함합니다.
  
  마이스 아미고, 야붐, 원더엠브이 같은 장치는 대형 터치스크린을 통해 쉽고 편리하게 조작할 수 있어 바로 사용할 수 있습니다. 이러한 디바이스는 플러그 앤 플레이 솔루션을 찾는 사람들에게 이상적입니다. 한편, Krux는 개발 보드 키트도 지원하므로 자신만의 하드웨어 설정을 커스터마이징하고 구축하는 것을 즐기는 DIY 애호가에게 적합합니다.
  
  QR코드, SD 카드, 감열식 프린터를 통해 주요 코디네이터 지갑과 원활하게 상호작용하는 사용자 친화적인 펌웨어는 오프라인 환경에서 거래 및 Mnemonic 백업을 지원하는 고유한 기능을 제공합니다.
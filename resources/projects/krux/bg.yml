description: |
  Krux е фърмуер с отворен код, който превръща готовите устройства Kendryte K210, като Maix Amigo, M5StickV и други, в универсални устройства за подписване на транзакции с биткойни. Освен основната си функционалност Krux е гъвкава платформа, която може да се адаптира към устройства с различни форм-фактори, като предоставя набор от инструменти, подпомагащи създаването и възстановяването на мнемонични резервни копия, някои от които включват опции за криптиране за по-голяма сигурност.
  
  Устройства като Maix Amigo, Yahboom или WonderMV се предлагат готови за използване, с големи сензорни екрани, които правят работата с тях лесна и удобна. Тези устройства са идеални за тези, които търсят решение тип "включи и работи". От друга страна, Krux поддържа и комплекти развойни платки, които са идеални за ентусиасти от типа "направи си сам", които обичат да персонализират и изграждат свои собствени хардуерни конфигурации.
  
  Взаимодействайки безпроблемно с водещи координатни портфейли чрез QR кодове, SD карти и дори термични принтери, лесният за употреба фърмуер предлага уникални функции за поддръжка на транзакции и мнемонични резервни копия в офлайн среда.
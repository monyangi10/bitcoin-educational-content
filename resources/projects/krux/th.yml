description: |
  Krux เป็นเฟิร์มแวร์โอเพ่นซอร์สที่เปลี่ยนอุปกรณ์ Kendryte K210 ที่มีจำหน่ายทั่วไป เช่น Maix Amigo, M5StickV และอื่นๆ ให้กลายเป็นเครื่องลงนามธุรกรรมบิตคอยน์ที่หลากหลาย นอกเหนือจากฟังก์ชันหลักแล้ว Krux ยังเป็นแพลตฟอร์มที่ยืดหยุ่นซึ่งสามารถปรับให้เข้ากับอุปกรณ์ที่มีรูปแบบต่างๆ ได้ โดยมีชุดเครื่องมือที่ช่วยในการสร้างและกู้คืนการสำรองข้อมูลแบบมินิโมนิก ซึ่งบางส่วนมีตัวเลือกการเข้ารหัสเพื่อเพิ่มความปลอดภัย
  
  อุปกรณ์อย่าง Maix Amigo, Yahboom หรือ WonderMV มาพร้อมใช้งานได้ทันที ด้วยหน้าจอสัมผัสขนาดใหญ่ที่ทำให้ใช้งานง่ายและเป็นมิตรกับผู้ใช้ อุปกรณ์เหล่านี้เหมาะสำหรับผู้ที่มองหาวิธีการที่ง่ายและรวดเร็ว ในทางกลับกัน Krux ยังรองรับชุดบอร์ดพัฒนา ซึ่งเหมาะสำหรับผู้ที่ชื่นชอบการ DIY ที่สนุกกับการปรับแต่งและสร้างฮาร์ดแวร์ของตนเอง
  
  การโต้ตอบอย่างราบรื่นกับกระเป๋าเงินผู้ประสานงานชั้นนำผ่านรหัส QR, การ์ด SD และแม้กระทั่งเครื่องพิมพ์ความร้อน เฟิร์มแวร์ที่เป็นมิตรกับผู้ใช้มีคุณสมบัติพิเศษเพื่อสนับสนุนการทำธุรกรรมและการสำรองข้อมูลแบบมินิโมนิกในสภาพแวดล้อมออฟไลน์
description: |
  Krux, Maix Amigo, M5StickV ve daha fazlası gibi kullanıma hazır Kendryte K210 cihazlarını çok yönlü Bitcoin işlem imzalayıcılarına dönüştüren açık kaynaklı bir ürün yazılımıdır. Temel işlevselliğinin ötesinde Krux, farklı form faktörlerine sahip cihazlara uyum sağlayabilen esnek bir platformdur ve Mnemonic yedeklerinin oluşturulmasına ve kurtarılmasına yardımcı olacak, bazıları gelişmiş güvenlik için şifreleme seçenekleri içeren bir dizi araç sağlar.
  
  Maix Amigo, Yahboom veya WonderMV gibi cihazlar, kullanımı kolay ve kullanıcı dostu hale getiren büyük dokunmatik ekranlarla kullanıma hazır olarak gelir. Bu cihazlar tak ve çalıştır çözümü arayanlar için idealdir. Öte yandan Krux, kendi donanım kurulumlarını özelleştirmeyi ve oluşturmayı seven DIY meraklıları için mükemmel olan geliştirme kartı kitlerini de desteklemektedir.
  
  QR kodları, SD kartlar ve hatta termal yazıcılar aracılığıyla önde gelen koordinatör cüzdanlarıyla sorunsuz bir şekilde etkileşime giren kullanıcı dostu ürün yazılımı, çevrimdışı bir ortamda işlemleri ve Mnemonic yedeklemelerini desteklemek için benzersiz özellikler sunar.
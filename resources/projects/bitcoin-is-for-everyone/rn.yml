description: |
  Ku Bitcoin ni iya Bose, twemera tudakeka ko Bitcoin atari iyo abazi ubuhinga canke abafise amahera gusa; ni ku muntu wese yipfuza gufata ububasha bw’amahera yiwe no guhingura kazoza k’ubudandaji bw’ubuhinga bwa none. Dufise iyo ntumbero mu muzirikanyi, twashizeho inama "Bitcoin ni iya bose" kugira ngo duhe ubushobozi no kwigisha abaturage bo mu karere ka Portland, Oregon, no kubagira igice nyamukuru c'isi iriko irakwiragira cane ya Bitcoin.
  
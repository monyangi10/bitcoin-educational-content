description: |
  Bij Bitcoin is for Everyone zijn we ervan overtuigd dat Bitcoin niet exclusief is voor techneuten of financieel bevoorrechten; het is voor iedereen die controle wil krijgen over zijn financiën en de toekomst van digitale handel vorm wil geven. Met deze visie in ons achterhoofd hebben we de conferentie "Bitcoin is for Everyone" opgezet om de lokale gemeenschap van Portland, Oregon, te versterken en op te leiden, en hen een integraal onderdeel te laten zijn van de steeds dominanter wordende wereld van Bitcoin.
  
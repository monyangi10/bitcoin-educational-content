description: |
  Bitcoin Herkes İçin'de, Bitcoin'ın teknoloji meraklılarına veya mali açıdan ayrıcalıklı olanlara özel olmadığına; mali durumlarını kontrol altına almak ve dijital ticaretin geleceğini şekillendirmek isteyen herkes için olduğuna inanıyoruz. Bu vizyonla, Portland, Oregon yerel toplumunu güçlendirmek ve eğitmek ve onları giderek yaygınlaşan Bitcoin dünyasının ayrılmaz bir parçası haline getirmek için "Bitcoin Herkes içindir" konferansını oluşturduk.
  
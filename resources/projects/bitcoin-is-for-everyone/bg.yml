description: |
  В Bitcoin is for Everyone твърдо вярваме, че биткойнът не е изключителен за технически грамотните или финансово привилегированите; той е за всеки човек, който иска да поеме контрола над финансите си и да определи бъдещето на цифровата търговия. Имайки предвид тази визия, създадохме конференцията "Bitcoin is for Everyone", за да дадем възможност и да образоваме местната общност в Портланд, Орегон, и да я направим неразделна част от все по-разпространения свят на биткойн.
  
description: |
  ที่ Bitcoin is for Everyone เราเชื่อมั่นอย่างแน่วแน่ว่าบิทคอยน์ไม่ได้จำกัดเฉพาะผู้ที่เชี่ยวชาญด้านเทคโนโลยีหรือผู้ที่มีฐานะทางการเงินที่ดีเท่านั้น; มันคือสำหรับทุกคนที่ต้องการควบคุมการเงินของตนเองและกำหนดอนาคตของการค้าดิจิทัล ด้วยวิสัยทัศน์นี้ เราจึงได้สร้างการประชุม "Bitcoin is for Everyone" ขึ้นมาเพื่อเสริมสร้างพลังและให้ความรู้แก่ชุมชนท้องถิ่นในพอร์ตแลนด์ รัฐโอเรกอน และทำให้พวกเขาเป็นส่วนสำคัญของโลกบิทคอยน์ที่กำลังเติบโตอย่างรวดเร็ว
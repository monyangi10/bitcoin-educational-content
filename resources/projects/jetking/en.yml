description: |
  Jetking Infotrain is a 77-year-old Indian IT training company and the first publicly listed firm in India to adopt Bitcoin as its primary treasury reserve asset, beginning with a 12 BTC purchase in December 2024 and growing to 21+ BTC by mid-2025. Beyond its core courses in cybersecurity, cloud, and AI, Jetking actively builds Bitcoin and blockchain education programs, including a Masters in Blockchain Development, and positions itself as "India's gateway to the Bitcoin revolution." Its CFO Siddarth Bharwani has become a public advocate for the Bitcoin Standard in Indian corporate finance.

description: |
  는 일본에 본사를 둔 선도적인 Bitcoin 중심 회사입니다. 이 회사는 혁신적인 Bitcoin 제품 및 서비스 개발을 전문으로 하며, 특히 Lightning Network에 중점을 두고 있습니다. 제품 개발, Bitcoin 및 Lightning 통합, 미디어 및 로컬라이제이션 서비스 등을 제공합니다.
  
  또한 이벤트 조직, 개발자 협업 지원, 교육 리소스 제공 등 커뮤니티 구축 활동에도 적극적으로 참여하고 있습니다. 이들의 미션은 Bitcoin을 중심으로 더욱 개방적인 세상을 만드는 것입니다.
  
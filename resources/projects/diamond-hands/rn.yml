description: |
  Diamond Hands Inc. ni ishirahamwe rihambaye ryitaho Bitcoin rifise icicaro mu Buyapani. Bajejwe gutegura ibintu n’ibikorwa bishasha vya Bitcoin, bashimikiye cane kuri Lightning Network. Ivyo batanga birimwo gutegura ibintu, gukorana na Bitcoin na Lightning, n’ibikorwa vy’itangazamakuru n’ivyo gukoresha mu rurimi rw’aho hantu.
  
  Bagira kandi uruhara n’umwete mu bikorwa vyo kwubaka umuryango nk’ugutegura ibirori, gushigikira ubufatanye bw’abateza imbere, no gutanga ibikoresho vy’inyigisho. Intumbero yabo ni iyo kwubaka isi yuguruye cane ishingiye kuri Bitcoin.
  
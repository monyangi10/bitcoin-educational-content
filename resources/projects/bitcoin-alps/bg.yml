description: |
  Ние сме група ентусиасти, които вярват, че Bitcoin е ключът към по-добро бъдеще. Като изграждаме и подкрепяме оптимална среда за използване на Bitcoin, ние се стремим да използваме културните, екологичните, икономическите, политическите и социалните ползи от "твърдите (здрави) пари". Нашата цел е да създадем децентрализирани, политически неутрални и свободни пазарни алтернативи за обществото, в полза на индивидуалната свобода и суверенитет, както и на просперитета. Стремим се да направим света малко по-добър, като насърчаваме и подкрепяме използването на Bitcoin чрез образование и осведоменост.
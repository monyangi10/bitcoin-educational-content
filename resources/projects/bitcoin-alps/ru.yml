description: |
  Мы - группа энтузиастов, которые верят, что Bitcoin - это ключ к лучшему будущему. Создавая и поддерживая оптимальную среду для использования Bitcoin, мы стремимся использовать культурные, экологические, экономические, политические и социальные преимущества "Hard (sound) money". Наша цель - создать децентрализованные, политически нейтральные и свободные рыночные альтернативы для общества, на благо индивидуальной свободы и суверенитета, а также процветания. Мы стремимся сделать мир немного лучше, продвигая и поддерживая использование Bitcoin через образование и осведомленность.

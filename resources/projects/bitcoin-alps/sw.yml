description: |
  Sisi ni kundi la wapenda shauku wanaoamini kuwa Bitcoin ndio ufunguo wa maisha bora ya baadaye. Kwa kujenga na kusaidia mazingira bora ya matumizi ya Bitcoin, tunalenga kutumia manufaa ya kitamaduni, kimazingira, kiuchumi, kisiasa na kijamii ya "Hard (sauti) pesa". Lengo letu ni kuunda njia mbadala za ugatuzi, zisizoegemea upande wowote kisiasa na soko huria kwa jamii, kwa manufaa ya uhuru na uhuru wa mtu binafsi na pia ustawi. Tunajitahidi kufanya ulimwengu kuwa bora zaidi kwa kutangaza na kuunga mkono matumizi ya Bitcoin kupitia elimu na uhamasishaji.

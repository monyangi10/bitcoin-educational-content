description: |
  พวกเราเป็นกลุ่มผู้ที่มีความสนใจและเชื่อว่า Bitcoin คือกุญแจสู่อนาคตที่ดีกว่า ด้วยการสร้างและสนับสนุนสภาพแวดล้อมที่เหมาะสมสำหรับการใช้ Bitcoin เรามุ่งหวังที่จะใช้ประโยชน์จากวัฒนธรรม สิ่งแวดล้อม เศรษฐกิจ การเมือง และสังคมของ "เงินที่มั่นคง" เป้าหมายของเราคือการสร้างทางเลือกที่กระจายอำนาจ เป็นกลางทางการเมือง และตลาดเสรีสำหรับสังคม เพื่อประโยชน์ของเสรีภาพและอธิปไตยของบุคคล รวมถึงความเจริญรุ่งเรือง เรามุ่งมั่นที่จะทำให้โลกดีขึ้นเล็กน้อยโดยการส่งเสริมและสนับสนุนการใช้ Bitcoin ผ่านการศึกษาและการสร้างความตระหนักรู้
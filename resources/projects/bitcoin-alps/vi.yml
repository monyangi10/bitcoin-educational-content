description: |
  Chúng tôi là một nhóm những người đam mê tin rằng Bitcoin là chìa khóa cho một tương lai tốt đẹp hơn. Bằng cách xây dựng và hỗ trợ một môi trường tối ưu cho việc sử dụng Bitcoin, chúng tôi hướng đến việc khai thác các lợi ích về văn hóa, môi trường, kinh tế, chính trị và xã hội của "tiền Hard (âm thanh)". Mục tiêu của chúng tôi là tạo ra các giải pháp thay thế phi tập trung, trung lập về mặt chính trị và thị trường tự do cho xã hội, vì lợi ích của tự do và chủ quyền cá nhân cũng như sự thịnh vượng. Chúng tôi nỗ lực làm cho thế giới tốt đẹp hơn một chút bằng cách thúc đẩy và hỗ trợ việc sử dụng Bitcoin thông qua giáo dục và nâng cao nhận thức.

description: |
  Nous sommes un groupe de passionnés qui croient que le Bitcoin est la clé d'un avenir meilleur. En construisant et en soutenant un environnement optimal pour l'utilisation de Bitcoin, nous visons à exploiter les avantages culturels, environnementaux, économiques, politiques et sociaux de la "monnaie (saine) Hard". Notre objectif est de créer des alternatives décentralisées, politiquement neutres et de libre marché pour la société, au bénéfice de la liberté et de la souveraineté individuelles ainsi que de la prospérité. Nous nous efforçons de rendre le monde un peu meilleur en promouvant et en soutenant l'utilisation de Bitcoin par l'éducation et la sensibilisation.

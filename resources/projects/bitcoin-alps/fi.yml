description: |
  Olemme ryhmä harrastajia, jotka uskovat, että Bitcoin on avain parempaan tulevaisuuteen. Rakentamalla ja tukemalla optimaalista ympäristöä Bitcoin:n käytölle pyrimme valjastamaan "Hard-(ääni)rahan" kulttuuriset, ympäristölliset, taloudelliset, poliittiset ja sosiaaliset hyödyt. Tavoitteenamme on luoda hajautettuja, poliittisesti neutraaleja ja vapaita markkinavaihtoehtoja yhteiskuntaa varten yksilön vapauden ja itsemääräämisoikeuden sekä vaurauden edistämiseksi. Pyrimme tekemään maailmasta hieman paremman edistämällä ja tukemalla Bitcoin:n käyttöä koulutuksen ja tietoisuuden avulla.

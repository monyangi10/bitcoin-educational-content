description: |
  Kami adalah sekelompok penggemar yang percaya bahwa Bitcoin adalah kunci untuk masa depan yang lebih baik. Dengan membangun dan mendukung lingkungan yang optimal untuk penggunaan Bitcoin, kami bertujuan untuk memanfaatkan manfaat budaya, lingkungan, ekonomi, politik, dan sosial dari "uang (sehat) Hard". Tujuan kami adalah menciptakan alternatif pasar yang terdesentralisasi, netral secara politik, dan bebas bagi masyarakat, demi kepentingan kebebasan dan kedaulatan individu serta kesejahteraan. Kami berusaha untuk membuat dunia menjadi lebih baik dengan mempromosikan dan mendukung penggunaan Bitcoin melalui pendidikan dan kesadaran.

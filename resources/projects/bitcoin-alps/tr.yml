description: |
  Bizler Bitcoin'ın daha iyi bir geleceğin anahtarı olduğuna inanan bir grup tutkunuz. Bitcoin'ın kullanımı için en uygun ortamı oluşturarak ve destekleyerek, "Hard (sağlam) para "nın kültürel, çevresel, ekonomik, politik ve sosyal faydalarından yararlanmayı amaçlıyoruz. Amacımız, bireysel özgürlük ve egemenliğin yanı sıra refahın da yararına olacak şekilde toplum için merkezi olmayan, siyasi açıdan tarafsız ve serbest piyasa alternatifleri yaratmaktır. Eğitim ve farkındalık yoluyla Bitcoin kullanımını teşvik ederek ve destekleyerek dünyayı biraz daha iyi hale getirmeye çalışıyoruz.
  

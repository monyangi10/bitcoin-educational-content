description: |
  Me oleme entusiastide rühm, kes usub, et Bitcoin on parema tuleviku võti. Luues ja toetades Bitcoin kasutamiseks optimaalset keskkonda, püüame kasutada "Hard (heli)raha" kultuurilisi, keskkonnaalaseid, majanduslikke, poliitilisi ja sotsiaalseid eeliseid. Meie eesmärk on luua ühiskonnale detsentraliseeritud, poliitiliselt neutraalsed ja vaba turu alternatiivid, mis toovad kasu nii üksikisiku vabadusele ja suveräänsusele kui ka jõukusele. Me püüame muuta maailma veidi paremaks, edendades ja toetades Bitcoin kasutamist hariduse ja teadlikkuse tõstmise kaudu.

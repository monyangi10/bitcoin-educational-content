description: |
  우리는 Bitcoin이 더 나은 미래를 위한 열쇠라고 믿는 열성적인 사람들이 모인 단체입니다. Bitcoin을 사용하기 위한 최적의 환경을 구축하고 지원함으로써 우리는 "하드(건전한) 화폐"의 문화적, 환경적, 경제적, 정치적, 사회적 이점을 활용하는 것을 목표로 합니다. 우리의 목표는 개인의 자유와 주권, 번영을 위해 사회를 위한 탈중앙화되고 정치적으로 중립적인 자유 시장 대안을 만드는 것입니다. 저희는 교육과 인식을 통해 Bitcoin 사용을 장려하고 지원함으로써 세상을 조금 더 나은 곳으로 만들기 위해 노력합니다.
description: |
  Wij zijn een groep enthousiastelingen die geloven dat Bitcoin de sleutel is tot een betere toekomst. Door het bouwen en ondersteunen van een optimale omgeving voor het gebruik van Bitcoin, willen we de culturele, ecologische, economische, politieke en sociale voordelen van "Hard (gezond) geld" benutten. Ons doel is om gedecentraliseerde, politiek neutrale en vrije markt alternatieven te creëren voor de maatschappij, ten voordele van individuele vrijheid en soevereiniteit en welvaart. We streven ernaar de wereld een beetje beter te maken door het gebruik van Bitcoin te promoten en te ondersteunen door middel van onderwijs en bewustwording.

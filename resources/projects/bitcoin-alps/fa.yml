description: |
  ما گروهی از علاقه‌مندان هستیم که معتقدیم Bitcoin کلید آینده‌ای بهتر است. با ساخت و حمایت از محیطی بهینه برای استفاده از Bitcoin، هدف ما بهره‌برداری از مزایای فرهنگی، زیست‌محیطی، اقتصادی، سیاسی و اجتماعی "پول Hard (صوتی)" است. هدف ما ایجاد جایگزین‌های غیرمتمرکز، سیاسی بی‌طرف و بازار آزاد برای جامعه است، به نفع آزادی و حاکمیت فردی و همچنین رفاه. ما تلاش می‌کنیم با ترویج و حمایت از استفاده از Bitcoin از طریق آموزش و آگاهی، جهان را کمی بهتر کنیم.

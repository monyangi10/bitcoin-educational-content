description: |
  Vi är en grupp entusiaster som tror att Bitcoin är nyckeln till en bättre framtid. Genom att bygga och stödja en optimal miljö för användning av Bitcoin strävar vi efter att utnyttja de kulturella, miljömässiga, ekonomiska, politiska och sociala fördelarna med "Hard (sunda) pengar". Vårt mål är att skapa decentraliserade, politiskt neutrala och fria marknadsalternativ för samhället, till förmån för individuell frihet och suveränitet samt välstånd. Vi strävar efter att göra världen lite bättre genom att främja och stödja användningen av Bitcoin genom utbildning och medvetenhet.

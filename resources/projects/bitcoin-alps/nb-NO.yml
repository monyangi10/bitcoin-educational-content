description: |
  Vi er en gruppe entusiaster som mener at Bitcoin er nøkkelen til en bedre fremtid. Ved å bygge og støtte et optimalt miljø for bruk av Bitcoin, tar vi sikte på å utnytte de kulturelle, miljømessige, økonomiske, politiske og sosiale fordelene med "Hard (sunne) penger". Målet vårt er å skape desentraliserte, politisk nøytrale og frie markedsalternativer for samfunnet, til fordel for individuell frihet og suverenitet samt velstand. Vi streber etter å gjøre verden litt bedre ved å fremme og støtte bruken av Bitcoin gjennom utdanning og bevisstgjøring.

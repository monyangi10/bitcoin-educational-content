description: |
  We are a group of enthusiasts who believe that Bitcoin is the key to a better future. By building and supporting an optimal environment for the use of Bitcoin, we aim to harness the cultural, environmental, economic, political and social benefits of "hard (sound) money". Our goal is to create decentralized, politically neutral and free market alternatives for society, for the benefit of individual freedom and sovereignty as well as prosperity. We strive to make the world a little better by promoting and supporting the use of Bitcoin through education and awareness.

description: |
  Somos um grupo de entusiastas que acreditam que o Bitcoin é a chave para um futuro melhor. Ao construir e apoiar um ambiente ideal para a utilização do Bitcoin, pretendemos aproveitar os benefícios culturais, ambientais, económicos, políticos e sociais do "dinheiro Hard (sólido)". O nosso objetivo é criar alternativas descentralizadas, politicamente neutras e de mercado livre para a sociedade, em benefício da liberdade e soberania individuais, bem como da prosperidade. Esforçamo-nos por tornar o mundo um pouco melhor, promovendo e apoiando a utilização do Bitcoin através da educação e da consciencialização.

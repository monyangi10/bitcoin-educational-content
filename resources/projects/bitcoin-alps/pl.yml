description: |
  Jesteśmy grupą entuzjastów, którzy wierzą, że Bitcoin jest kluczem do lepszej przyszłości. Budując i wspierając optymalne środowisko do korzystania z Bitcoin, dążymy do wykorzystania kulturowych, środowiskowych, ekonomicznych, politycznych i społecznych korzyści płynących z "Hard (zdrowego) pieniądza". Naszym celem jest stworzenie zdecentralizowanych, politycznie neutralnych i wolnorynkowych alternatyw dla społeczeństwa, z korzyścią dla indywidualnej wolności i suwerenności, a także dobrobytu. Staramy się uczynić świat nieco lepszym, promując i wspierając wykorzystanie Bitcoin poprzez edukację i świadomość.

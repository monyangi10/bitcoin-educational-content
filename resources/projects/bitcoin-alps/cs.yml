description: |
  Jsme skupina nadšenců, kteří věří, že Bitcoin je klíčem k lepší budoucnosti. Budováním a podporou optimálního prostředí pro používání Bitcoin se snažíme využít kulturní, environmentální, ekonomické, politické a sociální výhody "(zdravých) peněz Hard". Naším cílem je vytvořit decentralizované, politicky neutrální a volnotržní alternativy pro společnost ve prospěch individuální svobody a suverenity i prosperity. Snažíme se udělat svět o něco lepším tím, že propagujeme a podporujeme používání Bitcoin prostřednictvím vzdělávání a osvěty.

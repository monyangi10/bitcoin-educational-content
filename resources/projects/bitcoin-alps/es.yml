description: |
  Somos un grupo de entusiastas que creen que Bitcoin es la clave para un futuro mejor. Al construir y apoyar un entorno óptimo para el uso de Bitcoin, pretendemos aprovechar los beneficios culturales, medioambientales, económicos, políticos y sociales del "dinero (sano) Hard". Nuestro objetivo es crear alternativas descentralizadas, políticamente neutrales y de libre mercado para la sociedad, en beneficio de la libertad y la soberanía individuales, así como de la prosperidad. Nos esforzamos por hacer el mundo un poco mejor promoviendo y apoyando el uso de Bitcoin a través de la educación y la concienciación.

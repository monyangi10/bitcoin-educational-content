description: |
  Mi smo grupa entuzijasta koji veruju da je Bitcoin ključ za bolju budućnost. Izgradnjom i podržavanjem optimalnog okruženja za korišćenje Bitcoin, cilj nam je da iskoristimo kulturne, ekološke, ekonomske, političke i društvene prednosti "Hard (sound) novca". Naš cilj je da stvorimo decentralizovane, politički neutralne i slobodno tržišne alternative za društvo, u korist individualne slobode i suvereniteta kao i prosperiteta. Težimo da učinimo svet malo boljim promovišući i podržavajući upotrebu Bitcoin kroz edukaciju i podizanje svesti.

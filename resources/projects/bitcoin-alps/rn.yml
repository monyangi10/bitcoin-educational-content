description: |
  Turi umugwi w’abanyamwete bemera ko Bitcoin ari yo nzira y’akazoza keza. Mu kwubaka no gushigikira ibidukikije vyiza vyo gukoresha Bitcoin, dufise intumbero yo gukoresha inyungu z'umuco, ibidukikije, ubutunzi, politike n'imibano z'"amahera akomeye". Intumbero yacu ni ugushiraho uburyo bwo guhindura isoko ry’igihugu ry’abantu bose, ritagira aho rigarukira mu vya politike kandi ry’ubwigenge, ku nyungu y’umwidegemvyo n’ubusegaba bw’umuntu ku giti ciwe hamwe n’uguterimbere. Turaharanira gutuma isi igira neza gatoyi mu guteza imbere no gushigikira ikoreshwa rya Bitcoin biciye mu kwigisha no gukangurira abantu.
description: |
  be-BOP е универсално решение за продажба, събиране и управление на плащания. То предлага електронна търговия, касиране, дарения, абонаменти, групово финансиране, продажба на билети и безплатно ценообразуване и поддържа Bitcoin, карти, преводи и пари в брой, с интегрирани счетоводни инструменти.
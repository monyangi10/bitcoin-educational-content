description: |
  be-BOP is een alles-in-één oplossing voor het verkopen, innen en beheren van betalingen. Het biedt e-commerce, afrekenen, donaties, abonnementen, crowdfunding, ticketing en gratis prijzen, en ondersteunt Bitcoin, kaarten, overschrijvingen en contant geld, met geïntegreerde boekhoudtools.
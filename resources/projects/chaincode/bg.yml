description: |
  Chaincode Labs е изследователски и развоен център на Bitcoin, базиран в Мидтаун Манхатън, Ню Йорк.
  В Chaincode Labs сме отдадени на напредъка в развитието на мрежата Bitcoin и на осигуряването на ресурси за независимите новатори в екосистемата Bitcoin. Финансираме се от частни източници и съществуваме единствено в подкрепа и развитие на Bitcoin.
  Chaincode Labs е основана през 2014 г. от Алекс Моркос и Сухас Дафтуар, които са съоснователи на глобалната търговска фирма Hudson River Trading.
  
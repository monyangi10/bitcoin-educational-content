description: |
  Chaincode Labs är ett Bitcoin forsknings- och utvecklingscenter baserat i Midtown Manhattan, New York.
  På Chaincode Labs brinner vi för utvecklingen av Bitcoin-nätverket och för att tillhandahålla resurser för oberoende innovatörer i Bitcoin-ekosystemet. Vi är privatfinansierade och existerar enbart för att stödja och utveckla Bitcoin.
  Chaincode Labs grundades 2014 av Alex Morcos och Suhas Daftuar, som båda var med och grundade det globala handelsföretaget Hudson River Trading.
  
description: |
  चेनकोड लैब्स, न्यूयॉर्क के मिडटाउन मैनहट्टन में स्थित एक Bitcoin अनुसंधान एवं विकास केंद्र है।
  चेनकोड लैब्स में, हम Bitcoin नेटवर्क के विकास और Bitcoin पारिस्थितिकी तंत्र में स्वतंत्र नवप्रवर्तकों के लिए संसाधन उपलब्ध कराने के प्रति समर्पित हैं। हम निजी तौर पर वित्त पोषित हैं और केवल Bitcoin के समर्थन और विकास के लिए कार्यरत हैं।
  चेनकोड लैब्स की स्थापना 2014 में एलेक्स मोरकोस और सुहास दफ्तुआर ने की थी, जो दोनों वैश्विक व्यापारिक फर्म हडसन रिवर ट्रेडिंग के सह-संस्थापक हैं।
  
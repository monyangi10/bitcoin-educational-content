description: |
  Chaincode Labs je Bitcoin istraživački i razvojni centar sa sedištem u Midtown Manhattanu, New York.  
  U Chaincode Labs, strastveni smo u vezi sa razvojnim napretkom Bitcoin mreže i pružanjem resursa za nezavisne inovatore u Bitcoin ekosistemu. Privatno smo finansirani i postojimo isključivo da podržimo i razvijamo Bitcoin.  
  Chaincode Labs su 2014. godine suosnovali Alex Morcos i Suhas Daftuar, koji su obojica suosnivači globalne trgovačke firme Hudson River Trading.
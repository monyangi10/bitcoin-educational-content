description: |
  چین‌کد لبز یک مرکز تحقیق و توسعه Bitcoin است که در میدتاون منهتن، نیویورک واقع شده است.  
  در چین‌کد لبز، ما به پیشرفت توسعه شبکه Bitcoin و ارائه منابع برای نوآوران مستقل در اکوسیستم Bitcoin علاقه‌مندیم. ما به صورت خصوصی تأمین مالی می‌شویم و تنها برای حمایت و توسعه Bitcoin وجود داریم.  
  چین‌کد لبز در سال ۲۰۱۴ توسط الکس مورکوس و سوهس دفتوار، که هر دو شرکت تجارت جهانی هادسون ریور تریدینگ را نیز تأسیس کرده‌اند، بنیان‌گذاری شد.
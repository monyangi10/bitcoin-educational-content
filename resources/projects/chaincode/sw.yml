description: |
  Chaincode Labs ni kituo cha utafiti na maendeleo cha Bitcoin kilichoko Midtown Manhattan, New York. Katika Chaincode Labs, tuna shauku kubwa kuhusu maendeleo ya mtandao wa Bitcoin na kutoa rasilimali kwa wavumbuzi huru katika mfumo ikolojia wa Bitcoin. Tunafadhiliwa kibinafsi na tunapatikana ili kusaidia na kuendeleza Bitcoin pekee. Chaincode Labs ilianzishwa mwaka 2014 na Alex Morcos na Suhas Daftuar, ambao wote walianzisha kampuni ya biashara ya kimataifa ya Hudson River Trading.
description: |
  Chaincode Labs is een Bitcoin onderzoeks- en ontwikkelingscentrum gevestigd in Midtown Manhattan, New York. Bij Chaincode Labs zijn we gepassioneerd over de voortgang van de ontwikkeling van het Bitcoin netwerk en het voorzien in middelen voor onafhankelijke vernieuwers in het Bitcoin ecosysteem. Wij worden privé gefinancierd en bestaan uitsluitend om Bitcoin te ondersteunen en te ontwikkelen. Chaincode Labs werd in 2014 mede opgericht door Alex Morcos en Suhas Daftuar, die beiden medeoprichter waren van de wereldwijde handelsfirma Hudson River Trading.
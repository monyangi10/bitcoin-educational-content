description: |
  Chaincode Labs ni ikigo c’ubushakashatsi n’iterambere ca Bitcoin kiri mu gisagara ca Manhattan, muri New York. Muri Chaincode Labs, turakunda cane iterambere ry’urubuga rwa Bitcoin no gutanga uburyo ku bahinga bigenga mu bidukikije vya Bitcoin. Turaterwa inkunga n'abikorera ku giti cabo kandi turiho gusa kugira ngo dushigikire no guteza imbere Bitcoin. Chaincode Labs yashinzwe mu mwaka w’2014 na Alex Morcos na Suhas Daftuar, bompi bakaba bari bashinze ishirahamwe ry’ubudandaji ry’isi yose ryitwa Hudson River Trading.
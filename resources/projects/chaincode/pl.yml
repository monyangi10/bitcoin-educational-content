description: |
  Chaincode Labs to centrum badawczo-rozwojowe Bitcoin z siedzibą w Midtown Manhattan w Nowym Jorku. W Chaincode Labs jesteśmy pasjonatami postępu rozwoju sieci Bitcoin i zapewniania zasobów dla niezależnych innowatorów w ekosystemie Bitcoin. Jesteśmy finansowani prywatnie i istniejemy wyłącznie po to, aby wspierać i rozwijać Bitcoin. Chaincode Labs zostało współzałożone w 2014 roku przez Alexa Morcosa i Suhasa Daftuara, którzy byli współzałożycielami globalnej firmy handlowej Hudson River Trading.
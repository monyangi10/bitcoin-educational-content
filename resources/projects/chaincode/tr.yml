description: |
  Chaincode Labs, Midtown Manhattan, New York'ta bulunan bir Bitcoin araştırma ve geliştirme merkezidir. Chaincode Labs olarak, Bitcoin ağının gelişim süreci ve Bitcoin ekosistemindeki bağımsız yenilikçiler için kaynak sağlama konusunda tutkuluyuz. Özel olarak finanse ediliyoruz ve yalnızca Bitcoin'ı desteklemek ve geliştirmek için varız. Chaincode Labs, her ikisi de küresel ticaret firması Hudson River Trading'in kurucu ortakları olan Alex Morcos ve Suhas Daftuar tarafından 2014 yılında kuruldu.
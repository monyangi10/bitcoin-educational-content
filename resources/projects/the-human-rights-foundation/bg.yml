description: |
  Фондацията за правата на човека е непартийна организация с нестопанска цел, която насърчава и защитава правата на човека в световен мащаб, с акцент върху затворените общества. Партнираме си с активисти, които променят света, в създаването на иновативни решения, за да обединим света срещу тиранията и да се борим заедно срещу нея.
  
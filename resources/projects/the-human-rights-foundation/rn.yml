description: |
  Ishirahamwe ry’uburenganzira bwa muntu ni ishirahamwe ritagira aho rigarukira, ritagira inyungu, ritera imbere kandi rikakingira uburenganzira bwa muntu kw’isi yose, ryibanda ku mibano yugarijwe. Turakorana n’abaharanira amahinduka y’isi mu guhingura inyishu nshasha zo guhuza isi mu kurwanya ububisha, no kuburwanya hamwe.
  
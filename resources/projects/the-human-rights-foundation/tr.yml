description: |
  İnsan Hakları Vakfı, kapalı toplumlara odaklanarak insan haklarını küresel olarak teşvik eden ve koruyan, partizan olmayan, kar amacı gütmeyen bir kuruluştur. Dünyayı zulme karşı birleştirmek ve zulme karşı birlikte mücadele etmek için yenilikçi çözümler üretme konusunda dünyayı değiştiren aktivistlerle ortaklık yapıyoruz.
  
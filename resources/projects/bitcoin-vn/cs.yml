description: |
  BitcoinVN.io je od roku 2014 první a nejdůvěryhodnější vietnamskou burzou Bitcoin. Umožňujeme uživatelům převádět digitální aktiva přímo na vietnamský Dong (VND) prostřednictvím tří klíčových služeb: Okamžité online swapy, bankomaty Bitcoin a mimoburzovní obchodování (OTC). Náš závazek k zabezpečení a dodržování předpisů na nejvyšší úrovni zajišťuje, že se na nás místní obyvatelé i cizinci spoléhají při bezpečných převodech, investicích a každodenních digitálních platbách.
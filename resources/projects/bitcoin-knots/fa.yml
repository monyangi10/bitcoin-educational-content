description: |
  Bitcoin Knots یک پیاده‌سازی جایگزین از پروتکل Bitcoin است که از Bitcoin Core مشتق شده است. Knots که توسط Luke Dashjr طراحی و نگهداری می‌شود، امکانات اضافی و تنظیمات قوانین را ارائه می‌دهد، در حالی که با سایر نودهای شبکه سازگار باقی می‌ماند. Bitcoin Knots می‌تواند برای مدیریت یک پورتفولیو یکپارچه یا به عنوان یک نود ساده و کامل اعتبارسنجی استفاده شود. این نرم‌افزار کنترل پیشرفته‌تری برای کاربران با تجربه ارائه می‌دهد، به ویژه در زمینه اعتبارسنجی تراکنش‌ها و پیکربندی.

description: |
  Bitcoin Knots เป็นการใช้งานทางเลือกของโปรโตคอล Bitcoin ที่ได้มาจาก Bitcoin Core ออกแบบและดูแลโดย Luke Dashjr, Knots นำเสนอฟังก์ชันเพิ่มเติมและการปรับกฎ ในขณะที่ยังคงความเข้ากันได้กับโหนดอื่นๆ ในเครือข่าย Bitcoin Knots สามารถใช้เพื่อจัดการพอร์ตโฟลิโอแบบบูรณาการ หรือทำงานเป็นโหนดการตรวจสอบความถูกต้องแบบเต็มที่เรียบง่าย มันนำเสนอการควบคุมขั้นสูงสำหรับผู้ใช้ที่มีประสบการณ์ โดยเฉพาะในแง่ของการตรวจสอบธุรกรรมและการกำหนดค่า
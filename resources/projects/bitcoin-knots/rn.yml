description: |
  Bitcoin Knots ni ubundi buryo bwo gushirwa mu ngiro kw’itegeko rya Bitcoin, rikomoka kuri Bitcoin Core. Yahinguwe kandi ibungabungwa na Luke Dashjr, Knots itanga ibindi bikoresho n’uguhindura amategeko, mu gihe iguma ihuye n’izindi nzira ziri mu rubuga. Bitcoin Knots ishobora gukoreshwa mu gucunga ibikorwa vy'ubuhinga, canke gukora nk'uruzitiro rworoshe, rwuzuye rwo kwemeza. Itanga ubugenzuzi buteye imbere cane ku bakoresha bazi utuntu n’utundi, cane cane mu bijanye no kwemeza no gutunganya ibikorwa.
description: |
  Bitcoin Knots е алтернативна реализация на протокола Bitcoin, получена от ядрото на Bitcoin. Проектиран и поддържан от Luke Dashjr, Knots предлага допълнителна функционалност и корекции на правилата, като същевременно остава съвместим с други възли в мрежата. Bitcoin Knots може да се използва за управление на интегриран портфейл или да работи като прост възел за пълно валидиране. Той предлага по-усъвършенстван контрол за опитни потребители, особено по отношение на валидирането и конфигурирането на трансакции.
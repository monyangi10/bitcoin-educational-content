description: |
  Bitcoin नॉट्स Bitcoin प्रोटोकॉल का एक वैकल्पिक कार्यान्वयन है, जो Bitcoin कोर से लिया गया है। ल्यूक डैशजर द्वारा डिज़ाइन और रखरखाव किया गया नॉट्स अतिरिक्त कार्यक्षमता और नियम समायोजन प्रदान करता है, जबकि नेटवर्क में अन्य नोड्स के साथ संगत रहता है। Bitcoin नॉट्स का उपयोग एक एकीकृत पोर्टफोलियो को प्रबंधित करने या एक सरल, पूर्ण सत्यापन नोड के रूप में संचालित करने के लिए किया जा सकता है। यह अनुभवी उपयोगकर्ताओं के लिए अधिक उन्नत नियंत्रण प्रदान करता है, विशेष रूप से लेनदेन सत्यापन और कॉन्फ़िगरेशन के संदर्भ में।

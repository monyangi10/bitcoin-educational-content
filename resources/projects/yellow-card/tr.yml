description: |
  Yellow Card, Afrika'da kullanıcıların yerel para birimlerini kullanarak kripto para satın almalarını, satmalarını ve yönetmelerini sağlayan düzenlenmiş bir kripto Exchange'dır. Uyumluluk, finansal eğitim ve dijital varlıklara basit erişim konularına odaklanarak bireyler için kullanımı kolay bir uygulama ve işletmeler için güçlü bir API sunmaktadır.
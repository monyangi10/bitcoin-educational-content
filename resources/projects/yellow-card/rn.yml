description: |
  Yellow Card ni crypto Exchange itegekanijwe muri Afirika ituma abayikoresha bagura, bagurisha, kandi bacungera amafaranga y’amahanga bakoresheje amafaranga yabo yo mu gihugu. Itanga app yoroshe gukoresha ku bantu ku giti cabo na API ikomeye ku bucuruzi, yibanze cane ku kwubahiriza amategeko, inyigisho z’ivy’amahera, no kuronka mu buryo bworoshe ivy’ubutunzi vy’ubuhinga bwa none.
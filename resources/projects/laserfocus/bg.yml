description: |
  Bitcoin е от решаващо значение за свободата и Laserfocus подпомага тази мисия, като свързва биткойнъри по целия свят за менторство и фокус сесии. Целта на Laserfocus е да ви свърже с други биткойнери чрез видеоразговори. Има четири категории сесии: Фокус, Работа в мрежа, Менторство и Изследване. Понастоящем Laserfocus е във фаза на бета тестване.
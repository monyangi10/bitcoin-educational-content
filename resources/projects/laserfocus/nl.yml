description: |
  Bitcoin is cruciaal voor vrijheid en Laserfocus ondersteunt die missie door Bitcoiners over de hele wereld met elkaar in contact te brengen voor mentorschap en focussessies. Het doel van Laserfocus is om je via videogesprekken in contact te brengen met andere Bitcoiners. Er zijn vier categorieën sessies: Focus, Netwerken, Mentorschap en Verkenning. Laserfocus is momenteel in een bèta-testfase.
description: |
  Bitcoin ni ubutumwa buhambaye ku mwidegemvyo kandi Laserfocus itanga ububasha mu guhuza aba Bitcoiners kw’isi yose kugira ngo bamenyerezwe kandi bashire umutima ku biganiro. Intumbero ya Laserfocus ni ukuguhuza n’abandi ba Bitcoiners biciye ku guhamagara kuri video. Hariho ibice bine vy’ibiganiro: Kwibanda, Gukorana n’abandi, Guhanura no Gutohoza. Laserfocus ubu iri mu gihe c’igerageza rya Beta.
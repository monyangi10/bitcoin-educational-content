description: |
  P2P Bitcoin и платформа за търговия с Monero. Бърза, лесна, частна, равнопоставена. Задвижвана от хората.
  
  Ние сме пазар, на който потребителите могат да купуват и продават криптовалути един от друг. Потребителите, известни като търговци, създават обяви с цената и начина на плащане, които искат да предложат.
  
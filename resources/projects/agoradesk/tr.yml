description: |
  P2P Bitcoin ve Monero ticaret platformu. Hızlı, kolay, özel, eşler arası. İnsanlar tarafından desteklenmektedir.
  
  Kullanıcıların birbirlerinden kripto para alıp satabilecekleri bir pazar yeriyiz. Tüccar olarak bilinen kullanıcılar, teklif etmek istedikleri fiyat ve ödeme yöntemi ile ilan oluştururlar.
  
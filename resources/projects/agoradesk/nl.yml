description: |
  P2P Bitcoin en Monero handelsplatform. Snel, gemakkelijk, privé, peer-to-peer. Aangedreven door de mensen.
  
  Wij zijn een marktplaats waar gebruikers cryptocurrencies van elkaar kunnen kopen en verkopen. Gebruikers, bekend als handelaren, maken advertenties aan met de prijs en betaalmethode die ze willen aanbieden.
  
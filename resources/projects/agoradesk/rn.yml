description: |
  P2P Bitcoin n’urubuga rwo gucururizamwo rwa Monero. Ivyihuta, vyoroshe, vy’ibanga, ivy’urunganwe. Ikoreshwa n’abantu.
  
  Turi isoko aho abakoresha bashobora kugura no kugurisha amafaranga y’ivy’ubuhinga bwa none (cryptocurrencies) ku bandi. Abakoresha, bazwi kw’izina ry’abacuruzi, barahingura amatangazo afise igiciro n’uburyo bwo kwishura bipfuza gutanga.
  
description: |
  Fedora Projesi, Red Hat tarafından desteklenen ve Fedora ücretsiz işletim sisteminin geliştirilmesine adanmış dünya çapında bir topluluktur. 2003 yılında başlatılan proje, Linux dünyasındaki en son teknolojileri entegre ederek yenilikçi, güvenli ve açık bir platform sağlamayı amaçlamaktadır. Fedora, hızlı geliştirme döngüsü, açık kaynağa Commitment ve gelecekteki Red Hat Enterprise Linux evrimleri için genellikle bir test yatağı olarak hizmet veren teknolojik bir vitrin rolü ile öne çıkmaktadır.
description: |
  Het Fedora Project is een wereldwijde gemeenschap, ondersteund door Red Hat, toegewijd aan de ontwikkeling van het Fedora vrije besturingssysteem. Het project werd gelanceerd in 2003 en heeft als doel een innovatief, veilig en open platform te bieden, dat de nieuwste technologieën uit de Linux wereld integreert. Fedora onderscheidt zich door zijn snelle ontwikkelingscyclus, zijn Commitment naar open source en zijn rol als technologisch uitstalraam, vaak dienend als testbed voor toekomstige Red Hat Enterprise Linux evoluties.
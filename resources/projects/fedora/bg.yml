description: |
  Проектът Fedora е световна общност, подкрепена от Red Hat, която се занимава с разработването на свободната операционна система Fedora. Стартирал през 2003 г., проектът има за цел да осигури иновативна, сигурна и отворена платформа, интегрираща най-новите технологии от света на Linux. Fedora се отличава с бързия си цикъл на разработване, ангажираността си към отворения код и ролята си на технологична витрина, която често служи като тестова площадка за бъдещите еволюции на Red Hat Enterprise Linux.
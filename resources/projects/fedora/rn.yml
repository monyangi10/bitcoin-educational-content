description: |
  Umugambi wa Fedora ni umuryango wo kw’isi yose, ushigikiwe na Red Hat, wiyemeje gutegura uburyo bwo gukoresha Fedora ku buntu. Uwo mugambi watangujwe mu mwaka w’2003, ukaba ugamije gutanga urubuga rushasha, rutekanye kandi rwuguruye, rushiramwo ubuhinga bushasha buva mw’isi ya Linux. Fedora igaragara cane kubera iterambere ryayo ryihuta, Commitment yayo ku nzira yuguruye n’uruhara rwayo nk’iyerekanwa ry’ubuhinga, akenshi ikora nk’ikibanza co kugerageza iterambere rya Red Hat Enterprise Linux ryo muri kazoza.
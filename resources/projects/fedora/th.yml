description: |
  โครงการ Fedora เป็นชุมชนระดับโลกที่ได้รับการสนับสนุนจาก Red Hat โดยมุ่งเน้นการพัฒนาระบบปฏิบัติการฟรี Fedora เปิดตัวในปี 2003 โครงการนี้มีเป้าหมายเพื่อมอบแพลตฟอร์มนวัตกรรมที่ปลอดภัยและเปิดกว้าง โดยผสานรวมเทคโนโลยีล่าสุดจากโลกของ Linux Fedora โดดเด่นด้วยวงจรการพัฒนาที่รวดเร็ว ความมุ่งมั่นต่อโอเพ่นซอร์ส และบทบาทในฐานะโชว์เคสทางเทคโนโลยี ซึ่งมักทำหน้าที่เป็นพื้นที่ทดสอบสำหรับการพัฒนา Red Hat Enterprise Linux ในอนาคต
description: |
  Hra Satoshi je globální příběhová hra Bitcoin, která kombinuje filmové epizody s interaktivními úkoly. Hráči sledují cestu Satoshi, řeší hádanky ukryté v každé epizodě a soutěží o výhry v hodnotě přes 1 BTC. Posláním projektu je vzdělávat, bavit a inspirovat tím, že ukazuje, jak Bitcoin řeší skutečné problémy finančního systému, a zároveň propojuje uživatele s důvěryhodnými nástroji a partnery v rámci ekosystému.
description: |
  The Game of Satoshi เป็นประสบการณ์ Bitcoin ระดับโลกที่ขับเคลื่อนด้วยเรื่องราว ซึ่งผสมผสานตอนภาพยนตร์กับความท้าทายแบบโต้ตอบ ผู้เล่นจะติดตามการเดินทางของ Satoshi แก้ปริศนาที่ซ่อนอยู่ในแต่ละตอน และแข่งขันเพื่อชิงรางวัลรวมกว่า 1 BTC ภารกิจของโครงการคือการให้ความรู้ สร้างความบันเทิง และสร้างแรงบันดาลใจ โดยแสดงให้เห็นว่า Bitcoin แก้ปัญหาในโลกการเงินอย่างไร ในขณะเดียวกันก็เชื่อมต่อผู้ใช้กับเครื่องมือและพันธมิตรที่เชื่อถือได้ภายในระบบนิเวศ
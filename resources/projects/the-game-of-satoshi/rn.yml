description: |
  Urukino rwa Satoshi ni urukino rw’isi yose, rushingiye ku nkuru rwa Bitcoin rufatanya ibice vya sinema n’ingorane zikorana. Abakinyi bakurikira urugendo rwa Satoshi, bagatorera umuti ibibazo vyihishije imbere mu gice cose, bagahiganwa kugira ngo baronke igihembo kirenga 1 BTC. Intumbero y’uwo mugambi ni iyo kwigisha, gushimisha, no gutera intege mu kwerekana ingene Bitcoin itorera umuti ingorane zo mu isi nyakuri mu bijanye n’ivy’ubutunzi, mu gihe ihuza abakoresha n’ibikoresho vyizigirwa n’abafatanyabikorwa mu bijanye n’ibidukikije.
description: |
  The Game of Satoshi är en global, berättelsedriven Bitcoin-upplevelse som kombinerar filmiska avsnitt med interaktiva utmaningar. Spelarna följer Satoshi:s resa, löser pussel som finns gömda i varje avsnitt och tävlar om en prispott på över 1 BTC. Projektets uppdrag är att utbilda, underhålla och inspirera genom att visa hur Bitcoin adresserar verkliga problem i det finansiella systemet, samtidigt som användarna kopplas till pålitliga verktyg och partners inom ekosystemet.
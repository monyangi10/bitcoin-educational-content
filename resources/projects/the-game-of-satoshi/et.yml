description: |
  The Game of Satoshi on globaalne, loo põhinev Bitcoin kogemus, mis ühendab filmi episoodid interaktiivsete väljakutsetega. Mängijad jälgivad Satoshi teekonda, lahendavad igas episoodis peidetud mõistatusi ja võistlevad üle 1 BTC suuruse auhinnafondi nimel. Projekti eesmärk on harida, meelelahutust pakkuda ja inspireerida, näidates, kuidas Bitcoin tegeleb finantssüsteemi tegelike probleemidega, ühendades samal ajal kasutajaid usaldusväärsete vahendite ja partneritega ökosüsteemis.
description: |
  The Game of Satoshi es una experiencia global de Bitcoin basada en una historia que combina episodios cinemáticos con desafíos interactivos. Los jugadores siguen el viaje de Satoshi, resuelven rompecabezas ocultos en cada episodio y compiten por un premio de más de 1 BTC. La misión del proyecto es educar, entretener e inspirar demostrando cómo Bitcoin aborda los problemas del mundo real en el sistema financiero, al tiempo que conecta a los usuarios con herramientas y socios de confianza dentro del ecosistema.
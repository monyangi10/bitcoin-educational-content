description: |
  Trò chơi Satoshi là một trải nghiệm Bitcoin toàn cầu, dựa trên cốt truyện, kết hợp các tập phim điện ảnh với các thử thách tương tác. Người chơi sẽ theo dõi hành trình của Satoshi, giải các câu đố ẩn trong mỗi tập phim và cạnh tranh để giành giải thưởng trị giá hơn 1 BTC. Sứ mệnh của dự án là giáo dục, giải trí và truyền cảm hứng bằng cách chứng minh cách Bitcoin giải quyết các vấn đề thực tế trong hệ thống tài chính, đồng thời kết nối người dùng với các công cụ và đối tác đáng tin cậy trong hệ sinh thái.
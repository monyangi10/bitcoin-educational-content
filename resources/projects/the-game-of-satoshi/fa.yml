description: |
  بازی Satoshi یک تجربه جهانی و داستان‌محور Bitcoin است که قسمت‌های سینمایی را با چالش‌های تعاملی ترکیب می‌کند. بازیکنان سفر Satoshi را دنبال می‌کنند، معماهای پنهان در هر قسمت را حل می‌کنند و برای جایزه‌ای بیش از 1 BTC رقابت می‌کنند. مأموریت این پروژه آموزش، سرگرمی و الهام‌بخشی است با نشان دادن اینکه چگونه Bitcoin مشکلات واقعی در سیستم مالی را حل می‌کند، در حالی که کاربران را به ابزارها و شرکای معتبر در اکوسیستم متصل می‌کند.
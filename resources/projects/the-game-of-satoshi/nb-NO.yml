description: |
  The Game of Satoshi er en global, historiedrevet Bitcoin-opplevelse som kombinerer filmatiske episoder med interaktive utfordringer. Spillerne følger Satoshis reise, løser gåter som er skjult i hver episode, og konkurrerer om en premiepott på over 1 BTC. Prosjektets mål er å utdanne, underholde og inspirere ved å demonstrere hvordan Bitcoin løser virkelige problemer i det finansielle systemet, samtidig som brukerne kobles til pålitelige verktøy og partnere i økosystemet.
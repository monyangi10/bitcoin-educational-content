description: |
  Играта Satoshi е глобално, сюжетно ориентирано преживяване на Bitcoin, което съчетава филмови епизоди с интерактивни предизвикателства. Играчите проследяват пътуването на Satoshi, решават пъзели, скрити във всеки епизод, и се състезават за награден фонд от над 1 BTC. Мисията на проекта е да образова, забавлява и вдъхновява, като демонстрира как Bitcoin решава реални проблеми във финансовата система, като същевременно свързва потребителите с надеждни инструменти и партньори в рамките на екосистемата.
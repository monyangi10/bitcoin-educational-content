description: |
  The Game of Satoshi is a global, story-driven Bitcoin experience that combines cinematic episodes with interactive challenges. Players follow Satoshi’s journey, solve puzzles hidden inside each episode, and compete for a prize pool of over 1 BTC. The project’s mission is to educate, entertain, and inspire by demonstrating how Bitcoin addresses real-world problems in the financial system, while connecting users to trusted tools and partners within the ecosystem.

description: |
  Game of Satoshi adalah pengalaman Bitcoin yang digerakkan oleh cerita global yang menggabungkan episode sinematik dengan tantangan interaktif. Pemain mengikuti perjalanan Satoshi, memecahkan teka-teki yang tersembunyi di dalam setiap episode, dan bersaing untuk memperebutkan hadiah lebih dari 1 BTC. Misi proyek ini adalah untuk mengedukasi, menghibur, dan menginspirasi dengan mendemonstrasikan bagaimana Bitcoin mengatasi masalah dunia nyata dalam sistem keuangan, sambil menghubungkan pengguna ke alat dan mitra tepercaya di dalam ekosistem.
description: |
  The Game of Satoshi, sinematik bölümleri interaktif mücadelelerle birleştiren küresel, hikaye odaklı bir Bitcoin deneyimidir. Oyuncular Satoshi'in yolculuğunu takip eder, her bölümün içine gizlenmiş bulmacaları çözer ve 1 BTC'nin üzerinde bir ödül havuzu için yarışır. Projenin misyonu, kullanıcıları ekosistemdeki güvenilir araçlar ve ortaklarla buluştururken, Bitcoin'ın finansal sistemdeki gerçek dünya sorunlarını nasıl ele aldığını göstererek eğitmek, eğlendirmek ve ilham vermektir.
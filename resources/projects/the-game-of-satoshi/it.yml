description: |
  The Game of Satoshi è un'esperienza globale di Bitcoin incentrata sulla storia che combina episodi cinematografici e sfide interattive. I giocatori seguono il viaggio di Satoshi, risolvono gli enigmi nascosti in ogni episodio e competono per un montepremi di oltre 1 BTC. La missione del progetto è quella di educare, intrattenere e ispirare dimostrando come Bitcoin affronti i problemi del mondo reale nel sistema finanziario, mettendo al contempo in contatto gli utenti con strumenti e partner fidati all'interno dell'ecosistema.
description: |
  The Game of Satoshi is een wereldwijde, verhaalgedreven Bitcoin-ervaring die filmische episodes combineert met interactieve uitdagingen. Spelers volgen de reis van Satoshi, lossen puzzels op die in elke aflevering verborgen zitten en strijden om een prijzenpot van meer dan 1 BTC. De missie van het project is om te onderwijzen, vermaken en inspireren door te laten zien hoe Bitcoin echte problemen in het financiële systeem aanpakt, terwijl gebruikers in contact worden gebracht met vertrouwde tools en partners binnen het ecosysteem.
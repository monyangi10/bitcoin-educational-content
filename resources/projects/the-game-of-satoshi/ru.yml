description: |
  The Game of Satoshi - это глобальная сюжетная игра Bitcoin, в которой кинематографические эпизоды сочетаются с интерактивными задачами. Игроки следят за путешествием Satoshi, решают головоломки, спрятанные в каждом эпизоде, и соревнуются за призовой фонд в размере более 1 BTC. Миссия проекта - просвещать, развлекать и вдохновлять, демонстрируя, как Bitcoin решает реальные проблемы финансовой системы, и одновременно связывая пользователей с надежными инструментами и партнерами в экосистеме.
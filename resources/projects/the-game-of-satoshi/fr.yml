description: |
  Le jeu de Satoshi est une expérience Bitcoin globale et scénarisée qui combine des épisodes cinématographiques et des défis interactifs. Les joueurs suivent le parcours de Satoshi, résolvent des énigmes cachées dans chaque épisode et concourent pour une cagnotte de plus d'un milliard de dollars. La mission du projet est d'éduquer, de divertir et d'inspirer en démontrant comment Bitcoin aborde les problèmes du monde réel dans le système financier, tout en connectant les utilisateurs à des outils et des partenaires de confiance au sein de l'écosystème.
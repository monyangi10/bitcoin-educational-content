description: |
  The Game of Satoshi on maailmanlaajuinen, tarinavetoinen Bitcoin-kokemus, jossa yhdistyvät elokuvalliset jaksot ja interaktiiviset haasteet. Pelaajat seuraavat Satoshi:n matkaa, ratkaisevat jokaiseen jaksoon piilotettuja arvoituksia ja kilpailevat yli 1 BTC:n palkintopotista. Projektin tehtävänä on kouluttaa, viihdyttää ja innostaa osoittamalla, miten Bitcoin ratkaisee rahoitusjärjestelmän todellisia ongelmia, ja samalla yhdistää käyttäjät luotettuihin työkaluihin ja kumppaneihin ekosysteemissä.
description: |
  Igra Satoshi je globalno, narativno Bitcoin iskustvo koje kombinuje filmske epizode sa interaktivnim izazovima. Igrači prate putovanje Satoshi, rešavaju zagonetke skrivene unutar svake epizode i takmiče se za nagradni fond veći od 1 BTC. Misija projekta je da edukuje, zabavi i inspiriše pokazujući kako Bitcoin rešava stvarne probleme u finansijskom sistemu, dok povezuje korisnike sa pouzdanim alatima i partnerima unutar ekosistema.
description: |
  The Game of Satoshi to globalne, oparte na fabule doświadczenie Bitcoin, które łączy epizody filmowe z interaktywnymi wyzwaniami. Gracze śledzą podróż Satoshi, rozwiązują zagadki ukryte w każdym odcinku i rywalizują o pulę nagród w wysokości ponad 1 BTC. Misją projektu jest edukacja, rozrywka i inspirowanie poprzez pokazanie, w jaki sposób Bitcoin rozwiązuje rzeczywiste problemy w systemie finansowym, jednocześnie łącząc użytkowników z zaufanymi narzędziami i partnerami w ekosystemie.
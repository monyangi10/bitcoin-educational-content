description: |
  The Game of Satoshi é uma experiência global de Bitcoin orientada para a história que combina episódios cinematográficos com desafios interactivos. Os jogadores seguem a viagem do Satoshi, resolvem puzzles escondidos em cada episódio e competem por um prémio total de mais de 1 BTC. A missão do projeto é educar, entreter e inspirar, demonstrando como o Bitcoin aborda problemas do mundo real no sistema financeiro, ao mesmo tempo que liga os utilizadores a ferramentas e parceiros de confiança dentro do ecossistema.
description: |
  Kaleidoswap е децентрализиран протокол за търговия, който дава възможност за атомен, незадължителен суап на активи в Lightning Network. Изграден върху RGB Lightning Node, Kaleidoswap позволява на потребителите да търгуват с токени Bitcoin и RGB по ненадежден начин - без посредници или централизирано попечителство.
  
  Пуснат като настолно приложение с отворен код, Kaleidoswap понастоящем поддържа търговия с множество активи в тестова среда, като предлага удобен за потребителя интерфейс за взаимодействие с активи от типа Lightning, канали RGB и доставчици на ликвидност (LSP). То е предназначено да даде възможност на суверенни търговци и разработчици да разполагат с напълно равнопоставен, програмируем финансов слой в Bitcoin.
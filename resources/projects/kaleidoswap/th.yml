description: |
  Kaleidoswap เป็นโปรโตคอลการซื้อขายแบบกระจายศูนย์ที่ช่วยให้สามารถแลกเปลี่ยนสินทรัพย์แบบอะตอมมิกและไม่ต้องมีการควบคุมบน Lightning Network สร้างขึ้นบน RGB Lightning Node Kaleidoswap ช่วยให้ผู้ใช้สามารถซื้อขายโทเค็น Bitcoin และ RGB ได้ในลักษณะที่ไม่ต้องพึ่งพาความไว้วางใจ—โดยไม่มีตัวกลางหรือการควบคุมแบบศูนย์กลาง
  
  เปิดตัวในรูปแบบแอปพลิเคชันเดสก์ท็อปแบบโอเพนซอร์ส Kaleidoswap ปัจจุบันรองรับการซื้อขายหลายสินทรัพย์ในสภาพแวดล้อมทดสอบ โดยมีอินเทอร์เฟซที่ใช้งานง่ายสำหรับการโต้ตอบกับสินทรัพย์ที่เป็นเนทีฟของ Lightning ช่องทาง RGB และผู้ให้บริการสภาพคล่อง (LSPs) ออกแบบมาเพื่อเสริมพลังให้กับผู้ค้าหรือผู้พัฒนาที่มีอำนาจอธิปไตยด้วยชั้นการเงินที่สามารถโปรแกรมได้แบบเพียร์ทูเพียร์บน Bitcoin
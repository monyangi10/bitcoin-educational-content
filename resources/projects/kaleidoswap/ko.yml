description: |
  칼레이도스왑은 탈중앙화 거래 프로토콜로, Lightning Network에서 자산의 비수탁 스왑을 가능하게 합니다. RGB 라이트닝 노드 위에 구축된 칼레이도스왑을 통해 사용자는 중개자나 중앙화된 커스터디 없이 Trustless 방식으로 Bitcoin 토큰과 RGB 토큰을 거래할 수 있습니다.
  
  오픈 소스 데스크톱 애플리케이션으로 출시된 칼레이도스왑은 현재 Testnet 환경에서 다중 자산 거래를 지원하며, 사용자 친화적인 Interface을 통해 라이트닝 네이티브 자산, RGB 채널, 유동성 공급자(LSP)와 상호 작용할 수 있습니다. 이는 Bitcoin에서 완전한 P2P, 프로그래밍 가능한 금융 Layer를 통해 소버린 트레이더와 개발자의 역량을 강화하도록 설계되었습니다.
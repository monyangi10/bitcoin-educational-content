description: |
  Kaleidoswap ni umurongo w'ubudandaji wegerejwe ushobora gutuma habaho uguhinduranya kw'itunga ku Lightning Network. Yubatswe hejuru ya RGB Lightning Node, Kaleidoswap iremesha abakoresha gucuruza ibimenyetso vya Bitcoin na RGB mu buryo bwa Trustless—ata bahuza canke ababicungera hamwe.
  
  Yasohotse nk’ikoreshwa ry’ibiro ry’inkomoko yuguruye, Kaleidoswap ubu irashigikira ubudandaji bw’ibintu vyinshi mu bidukikije vya Testnet, itanga Interface ikoreshwa neza kugira ngo ikoreshe n’ibintu vy’akavukire vya Lightning, imirongo ya RGB, n’abatanga amafaranga (LSPs). Igenewe guha ubushobozi abacuruzi n’abaterambere b’abanyagihugu n’ubuhinga bw’ivy’ubutunzi bushobora gutegurwa Layer kuri Bitcoin.
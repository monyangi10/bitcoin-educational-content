description: |
  Paystand.org има за цел да насърчи финансовото приобщаване чрез използването на технологиите Bitcoin и Blockchain. Вярваме, че можем да постигнем по-отворена и справедлива финансова система, като ускорим растежа на кръговите икономики, активирани чрез избрани организации в нововъзникващи и слабо представени общности.
  
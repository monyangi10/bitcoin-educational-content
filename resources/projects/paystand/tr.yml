description: |
  Paystand.org, Bitcoin ve Blockchain teknolojisini kullanarak finansal kapsayıcılığı artırmayı amaçlamaktadır. Gelişmekte olan ve yeterince temsil edilmeyen topluluklardaki seçilmiş kuruluşlar aracılığıyla döngüsel ekonomilerin büyümesini hızlandırarak daha açık ve adil bir finansal sisteme ulaşabileceğimize inanıyoruz.
  
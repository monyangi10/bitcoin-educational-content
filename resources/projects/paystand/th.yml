description: |
  Paystand.org มุ่งมั่นที่จะส่งเสริมการเข้าถึงทางการเงินผ่านการใช้เทคโนโลยี Bitcoin และ Blockchain เราเชื่อว่าเราสามารถสร้างระบบการเงินที่เปิดกว้างและเท่าเทียมมากขึ้นได้โดยการเร่งการเติบโตของเศรษฐกิจหมุนเวียนที่ได้รับการสนับสนุนจากองค์กรที่เลือกในชุมชนที่เกิดใหม่และไม่ได้รับการเป็นตัวแทนอย่างเพียงพอ
description: |
  Моята мисия е да доведа до хипербиткоинизация възможно най-бързо. Вярвам, че тя така или иначе е неизбежна, но искам да настъпи по-скоро. Bitcoin вече е достатъчно добър; това, което трябва да се промени, е приемането му от хората. Това идва със знанието. И така, правя всичко възможно, за да разпространявам знанието - от момента, в който се събудя, до момента, в който заспя, а след това дори и в съня си служа.
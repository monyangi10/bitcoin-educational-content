description: |
  Intumbero yanje ni ukuzana hyperbitcoinisation vyihuse uko bishoboka kwose. Nizera ko ataco bimaze uko biri kwose, ariko ndashaka ko biza vuba. Bitcoin irasanzwe ari nziza bihagije; igikeneye guhinduka ni ukwemera kw’abantu. Ivyo biza n’ubumenyi. Kandi rero, nkora ivyo nshoboye vyose kugira ngo nkwiragize ubumenyi – kuva aho nvyuka, gushika aho nsinziriye, hanyuma no mu gihe nsinziriye, nkorera.
description: |
  Nezisková komunita Breizh Bitcoin se podílí na zavádění Bitcoin v Bretani tím, že pěstuje kulturu Bitcoin. Nabízí bezplatně své odborné znalosti, aby pomohla jednotlivcům i profesionálům pochopit a přijmout Bitcoin jako platební prostředek. Komunita se zaměřuje výhradně na Bitcoin a inspiruje k vytváření nezávislých setkání, čímž přispívá k dynamickému rozvoji ekosystému Bitcoin na místní úrovni.

description: |
  Mittetulundusühing Breizh Bitcoin mängib rolli Bitcoin kasutuselevõtmisel Bretagne'is, kasvatades Bitcoin kultuuri. Ta pakub oma teadmisi tasuta, et aidata üksikisikutel ja spetsialistidel mõista ja aktsepteerida Bitcoin kui maksevahendit. Kogukond keskendub ainult Bitcoin-le ja innustab sõltumatute kohtumiste loomist, aidates kaasa Bitcoin ökosüsteemi dünaamilisele arengule kohapeal.

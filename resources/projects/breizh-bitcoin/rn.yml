description: |
  Breizh Bitcoin, umuryango udaharanira inyungu, urafise uruhara mu kwemera Bitcoin muri Bretagne mu gutera imbere umuco wa Bitcoin. Itanga ubuhinga bwayo ku buntu kugira ngo ifashe abantu ku giti cabo n’abahinga gutahura no kwemera Bitcoin nk’uburyo bwo kwishura. Kwibanda gusa kuri Bitcoin, umuryango uratera intege ugushinga amakoraniro yigenga, agafasha mu guteza imbere ibidukikije vya Bitcoin mu karere.
description: |
  Turi umugwi w'abantu bakunda cane Bitcoin & ubushobozi ishobora gutanga, ku bantu bo muri Irlande & ku bucuruzi bukora hano. Intumbero yacu ni uguhuza aba Bitcoiners baba muri Irlande, gushigikira no guteza imbere ubucuruzi bw’abagenzi ba Bitcoin, kwigisha abantu bose no gutanga uburyo bwo kuri internet ku muntu wese ashaka kwiga vyinshi. Ivyo tubikora kuko twizera ko Bitcoin ishobora gufasha isi kuba ahantu heza.
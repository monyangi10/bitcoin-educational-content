description: |
  Nous sommes un groupe d'individus passionnés par le Bitcoin et les possibilités qu'il peut offrir, à la fois au peuple irlandais et aux entreprises qui opèrent ici. Notre mission est de connecter les bitcoiners basés en Irlande, de soutenir et de promouvoir les entreprises favorables au Bitcoin, d'éduquer le public et de fournir une ressource en ligne à tous ceux qui souhaitent en savoir plus. Nous faisons cela parce que nous croyons que le Bitcoin peut aider à rendre le monde meilleur.
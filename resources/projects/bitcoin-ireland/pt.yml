description: |
  Somos um grupo de indivíduos apaixonados pelo Bitcoin e pelas possibilidades que ele pode oferecer, tanto para o povo da Irlanda quanto para as empresas que operam aqui. A nossa missão é ligar os Bitcoiners irlandeses, apoiar e promover empresas amigas do Bitcoin, educar o público e fornecer um recurso online para qualquer pessoa que esteja interessada em saber mais. Fazemos isso porque acreditamos que o Bitcoin pode ajudar a tornar o mundo um lugar melhor.
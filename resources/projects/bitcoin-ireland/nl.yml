description: |
  Wij zijn een groep mensen met een passie voor Bitcoin en de mogelijkheden die het kan bieden, zowel voor de mensen in Ierland als voor de bedrijven die hier actief zijn.
  Onze missie is om Ierse Bitcoiners met elkaar in contact te brengen, Bitcoin-vriendelijke bedrijven te ondersteunen en promoten, het publiek voor te lichten en een online bron te bieden voor iedereen die meer wil weten. We doen dit omdat we geloven dat Bitcoin kan helpen om van de wereld een betere plek te maken.
  
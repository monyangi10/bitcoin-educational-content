description: |
  Kami adalah sekelompok individu yang bersemangat tentang Bitcoin & kemungkinan yang ditawarkannya, baik untuk masyarakat Irlandia maupun bisnis yang beroperasi di sini. Misi kami adalah untuk menghubungkan para Bitcoiners yang berbasis di Irlandia, mendukung & mempromosikan bisnis yang ramah terhadap Bitcoin, mengedukasi masyarakat & menyediakan sumber daya online bagi siapa saja yang tertarik untuk mempelajari lebih lanjut. Kami melakukan ini karena kami percaya Bitcoin dapat membantu membuat dunia menjadi tempat yang lebih baik.
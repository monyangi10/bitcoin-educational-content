description: |
  Sisi ni kundi la watu wanaopenda sana Bitcoin na uwezekano inaoweza kutoa, kwa watu wa Ayalandi na biashara zinazofanya kazi hapa. Dhamira yetu ni kuunganisha Bitcoiners kutoka Ireland, kusaidia na kukuza biashara rafiki za Bitcoin, kuelimisha umma na kutoa nyenzo ya mtandaoni kwa mtu yeyote ambaye angependa kujifunza zaidi. Tunafanya hivi kwa sababu tunaamini Bitcoin inaweza kusaidia kufanya ulimwengu kuwa mahali bora zaidi.
description: |
  हम ऐसे व्यक्तियों का समूह हैं जो Bitcoin और इसके द्वारा प्रदान की जाने वाली संभावनाओं के बारे में भावुक हैं, आयरलैंड के लोगों और यहाँ संचालित होने वाले व्यवसायों दोनों के लिए। हमारा मिशन आयरिश आधारित बिटकॉइनर्स को जोड़ना, Bitcoin अनुकूल व्यवसायों का समर्थन और प्रचार करना, जनता को शिक्षित करना और अधिक जानने में रुचि रखने वाले किसी भी व्यक्ति के लिए एक ऑनलाइन संसाधन प्रदान करना है। हम ऐसा इसलिए करते हैं क्योंकि हमारा मानना ​​है कि Bitcoin दुनिया को एक बेहतर जगह बनाने में मदद कर सकता है।
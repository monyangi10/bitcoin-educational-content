description: |
  Somos un grupo de personas apasionadas por Bitcoin y las posibilidades que puede ofrecer, tanto a la gente de Irlanda como a las empresas que operan aquí. Nuestra misión es poner en contacto a los Bitcoiners irlandeses, apoyar y promover los negocios amigos de Bitcoin, educar al público y proporcionar un recurso en línea para cualquiera que esté interesado en aprender más. Hacemos esto porque creemos que Bitcoin puede ayudar a hacer del mundo un lugar mejor.
description: |
  Ние сме група от хора, които са запалени по Bitcoin и възможностите, които тя може да предложи както на хората в Ирландия, така и на предприятията, които работят тук.
  Нашата мисия е да свързваме базираните в Ирландия биткойнисти, да подкрепяме и насърчаваме приятелски настроени към Bitcoin бизнеси, да образоваме обществеността и да предоставяме онлайн ресурс за всеки, който се интересува да научи повече. Правим това, защото вярваме, че Bitcoin може да помогне за превръщането на света в по-добро място.
  
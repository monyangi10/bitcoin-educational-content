description: |
  Jesteśmy grupą osób pasjonujących się Bitcoin i możliwościami, jakie może on zaoferować zarówno mieszkańcom Irlandii, jak i działającym tu firmom. Naszą misją jest łączenie irlandzkich Bitcoinerów, wspieranie i promowanie firm przyjaznych Bitcoin, edukowanie społeczeństwa i zapewnianie zasobów online dla każdego, kto jest zainteresowany dowiedzeniem się więcej. Robimy to, ponieważ wierzymy, że Bitcoin może pomóc uczynić świat lepszym miejscem.
description: |
  Vi är en grupp individer som brinner för Bitcoin och de möjligheter det kan erbjuda, både för folket i Irland och de företag som verkar här. Vårt uppdrag är att ansluta irländska baserade Bitcoiners, stödja och främja Bitcoin-vänliga företag, utbilda allmänheten och tillhandahålla en online-resurs för alla som är intresserade av att lära sig mer. Vi gör detta eftersom vi tror att Bitcoin kan hjälpa till att göra världen till en bättre plats.
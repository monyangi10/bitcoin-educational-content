description: |
  Bitcoin ve hem İrlanda halkına hem de burada faaliyet gösteren işletmelere sunabileceği olanaklar konusunda tutkulu bir grup bireyiz.
  Misyonumuz İrlanda merkezli Bitcoin kullanıcıları arasında bağlantı kurmak, Bitcoin dostu işletmeleri desteklemek ve tanıtmak, halkı eğitmek ve daha fazla bilgi edinmek isteyen herkes için çevrimiçi bir kaynak sağlamaktır. Bunu yapıyoruz çünkü Bitcoin'ın dünyayı daha iyi bir yer haline getirmeye yardımcı olabileceğine inanıyoruz.
  
description: |
  Me oleme rühm inimesi, kes on huvitatud Bitcoin-st ja võimalustest, mida see võib pakkuda nii Iirimaa elanikele kui ka siin tegutsevatele ettevõtetele. Meie missioon on ühendada Iiri päritolu Bitcoiners, toetada ja edendada Bitcoin sõbralikud ettevõtted, harida avalikkust ja pakkuda online ressurss kõigile, kes on huvitatud rohkem teada. Me teeme seda, sest usume, et Bitcoin võib aidata maailma paremaks muuta.
description: |
  Siamo un gruppo di persone appassionate di Bitcoin e delle possibilità che può offrire, sia ai cittadini irlandesi che alle aziende che operano qui. La nostra missione è quella di mettere in contatto i Bitcoiners irlandesi, di sostenere e promuovere le imprese amiche della Bitcoin, di educare il pubblico e di fornire una risorsa online a chiunque sia interessato a saperne di più. Lo facciamo perché crediamo che la Bitcoin possa contribuire a rendere il mondo un posto migliore.
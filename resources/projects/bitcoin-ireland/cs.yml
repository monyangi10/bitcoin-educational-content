description: |
  Jsme skupina lidí, kteří jsou zapálení pro Bitcoin a možnosti, které může nabídnout jak obyvatelům Irska, tak podnikům, které zde působí. Naším posláním je spojovat bitcoináře se sídlem v Irsku, podporovat a propagovat podniky přátelské ke Bitcoin, vzdělávat veřejnost a poskytovat online zdroj informací všem, kteří mají zájem dozvědět se více. Děláme to proto, že věříme, že Bitcoin může pomoci udělat svět lepším místem.
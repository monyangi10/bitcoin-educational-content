description: |
  Wir sind eine Gruppe von Personen, die sich leidenschaftlich für Bitcoin und die Möglichkeiten, die es sowohl für die Menschen in Irland als auch für die hier tätigen Unternehmen bieten kann, einsetzen. Unsere Mission ist es, in Irland ansässige Bitcoiner zu vernetzen, Bitcoin-freundliche Unternehmen zu unterstützen und zu fördern, die Öffentlichkeit aufzuklären und eine Online-Ressource für jeden bereitzustellen, der daran interessiert ist, mehr zu erfahren. Wir tun dies, weil wir glauben, dass Bitcoin helfen kann, die Welt zu einem besseren Ort zu machen.
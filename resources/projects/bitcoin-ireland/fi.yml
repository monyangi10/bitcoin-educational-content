description: |
  Olemme ryhmä henkilöitä, jotka suhtautuvat intohimoisesti Bitcoin:aan ja sen tarjoamiin mahdollisuuksiin sekä Irlannin asukkaille että täällä toimiville yrityksille. Tehtävämme on yhdistää irlantilaisia Bitcoin-asiakkaita, tukea ja edistää Bitcoin-ystävällisiä yrityksiä, valistaa yleisöä ja tarjota verkkolähde kaikille, jotka ovat kiinnostuneita oppimaan lisää. Teemme tämän, koska uskomme, että Bitcoin voi auttaa tekemään maailmasta paremman paikan.
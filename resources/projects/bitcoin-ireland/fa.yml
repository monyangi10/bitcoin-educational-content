description: |
  ما گروهی از افراد هستیم که به Bitcoin و امکاناتی که ممکن است ارائه دهد، هم برای مردم ایرلند و هم برای کسب‌وکارهایی که در اینجا فعالیت می‌کنند، علاقه‌مندیم. ماموریت ما این است که بیت‌کوینرهای مستقر در ایرلند را متصل کنیم، از کسب‌وکارهای دوستدار Bitcoin حمایت و آن‌ها را ترویج کنیم، به عموم مردم آموزش دهیم و یک منبع آنلاین برای هر کسی که علاقه‌مند به یادگیری بیشتر است، فراهم کنیم. ما این کار را انجام می‌دهیم زیرا معتقدیم Bitcoin می‌تواند به بهتر شدن جهان کمک کند.
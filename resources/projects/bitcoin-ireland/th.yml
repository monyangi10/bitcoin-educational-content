description: |
  พวกเราเป็นกลุ่มบุคคลที่มีความหลงใหลใน Bitcoin และความเป็นไปได้ที่มันอาจนำเสนอ ทั้งต่อประชาชนชาวไอร์แลนด์และธุรกิจที่ดำเนินการอยู่ที่นี่ ภารกิจของเราคือการเชื่อมโยงผู้ใช้ Bitcoin ที่อยู่ในไอร์แลนด์ สนับสนุนและส่งเสริมธุรกิจที่เป็นมิตรกับ Bitcoin ให้ความรู้แก่สาธารณชน และจัดหาทรัพยากรออนไลน์สำหรับผู้ที่สนใจเรียนรู้เพิ่มเติม เราทำเช่นนี้เพราะเราเชื่อว่า Bitcoin สามารถช่วยทำให้โลกนี้เป็นสถานที่ที่ดียิ่งขึ้น
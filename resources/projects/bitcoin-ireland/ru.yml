description: |
  Мы - группа людей, увлеченных Bitcoin и возможностями, которые она может предложить как жителям Ирландии, так и компаниям, которые здесь работают. Наша миссия - объединить ирландских биткойнеров, поддерживать и продвигать дружественные Bitcoin предприятия, просвещать общественность и предоставлять онлайн-ресурс для всех, кто хочет узнать больше. Мы делаем это, потому что верим, что Bitcoin может помочь сделать мир лучше.
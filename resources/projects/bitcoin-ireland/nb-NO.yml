description: |
  Vi er en gruppe personer som brenner for Bitcoin og mulighetene det kan tilby, både for folket i Irland og virksomhetene som opererer her. Vårt oppdrag er å koble irskbaserte Bitcoiners, støtte og fremme Bitcoin-vennlige virksomheter, utdanne publikum og tilby en online ressurs for alle som er interessert i å lære mer. Vi gjør dette fordi vi tror Bitcoin kan bidra til å gjøre verden til et bedre sted.
description: |
  ภารกิจของเราคือการสร้างความตระหนักรู้ ให้ข้อมูลเชิงลึก และช่วยให้ความรู้เกี่ยวกับทุกสิ่งที่เกี่ยวข้องกับ Lighting Network, การขยายขนาดของบิตคอยน์ และการชำระเงินแบบกระจายศูนย์ เรานำเสนอข่าวสารล่าสุด แนวโน้ม และพัฒนาการต่างๆ เพื่อช่วยให้ผู้อ่านของเราได้รับข้อมูลที่ทันสมัยผ่านรายงาน การวิจัย และความคิดเห็น ในฐานะแพลตฟอร์มอิสระอย่างเต็มที่ เรามุ่งมั่นที่จะให้ข้อมูลแก่ผู้บริโภค ผู้ประกอบการ และผู้กำหนดนโยบาย เพื่อเชื่อมช่องว่างความรู้ระหว่างกลุ่มเหล่านี้ เราเชื่อในโปรโตคอลการชำระเงินแบบกระจายศูนย์และแบบเพียร์ทูเพียร์ และสนับสนุนทางเลือกของผู้บริโภคและนวัตกรรมทางการเงินที่ครอบคลุมและไม่จำกัดสิทธิ์
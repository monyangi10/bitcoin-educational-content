description: |
  Onze missie is om het bewustzijn te vergroten, inzichten te verschaffen en te helpen onderwijzen over alles wat te maken heeft met Lighting Network, Bitcoin schaling en gedecentraliseerde betalingen. We berichten over het laatste nieuws, trends en ontwikkelingen en helpen onze lezers op de hoogte te blijven met rapporten, onderzoek en meningen. Als volledig onafhankelijk platform willen we consumenten, exploitanten en beleidsmakers informeren en kenniskloven tussen deze groepen overbruggen. Wij geloven in gedecentraliseerde, peer-to-peer betalingsprotocollen en pleiten voor keuzevrijheid voor de consument en inclusieve, niet-vergunningsplichtige financiële innovatie.
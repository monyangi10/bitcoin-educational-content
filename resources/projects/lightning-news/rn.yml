description: |
  Intumbero yacu ni ugukangurira abantu, gutanga ubumenyi no gufasha kwigisha ku bintu vyose Lighting Network, Bitcoin scaling n’ugutanga amahera yegerejwe. Turatangaza amakuru mashasha, imigenderanire n’iterambere rifasha abasomyi bacu kuguma bamenya raporo, ubushakashatsi n’ivyiyumviro. Nk’urubuga rwigenga rwose turarondera kumenyesha abaguzi, abakoresha n’abashinga amategeko, tugakuraho ibihengeri vy’ubumenyi hagati y’ayo matsinda. Twemera amasezerano y’ukwishyura yegerejwe, ashingiye ku bandi kandi turaburanira amahitamwo y’abaguzi n’ubuhinga bushasha bw’ivy’ubutunzi bushiramwo bose, butagira uburenganzira.
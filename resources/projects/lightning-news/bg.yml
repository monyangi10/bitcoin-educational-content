description: |
  Нашата мисия е да повишаваме осведомеността, да предоставяме информация и да помагаме за обучението по всички въпроси, свързани с мрежата Lighting Network, мащабирането на биткойн и децентрализираните плащания. Ние отразяваме последните новини, тенденции и развития, като помагаме на нашите читатели да останат информирани с доклади, изследвания и мнения. Като напълно независима платформа ние се стремим да информираме потребителите, операторите и политиците, преодолявайки пропуските в знанията между тези групи. Вярваме в децентрализираните, peer-to-peer платежни протоколи и се застъпваме за потребителския избор и приобщаващите, нелиберални финансови иновации.
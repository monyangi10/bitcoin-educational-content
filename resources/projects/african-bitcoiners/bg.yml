description: |
  Ние сме общност на Bitcoin, която помага на новите африкански потребители да се качат на борда и да ги води безопасно по пътя на Bitcoin от спечелването на sats до самостоятелно попечителство. Опитваме се да плащаме сметките си чрез спонсорство и чрез изграждане на услуги на Bitcoin, които добавят стойност за членовете на нашата общност.
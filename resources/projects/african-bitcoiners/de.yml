description: |
  Wir sind eine Bitcoin-Gemeinschaft, die neuen afrikanischen Nutzern hilft, an Bord zu kommen und sie sicher auf ihrer Bitcoin-Reise vom Erwerb von Sats bis zur Selbstverwahrung zu begleiten. Wir versuchen, unsere Rechnungen durch Patenschaften und den Aufbau von Bitcoin-Diensten zu bezahlen, die einen Mehrwert für unsere Community-Mitglieder darstellen.
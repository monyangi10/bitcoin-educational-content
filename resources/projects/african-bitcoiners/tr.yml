description: |
  Bizler, yeni Afrikalı kullanıcıları bünyemize katmaya yardımcı olan ve onlara Sats'i kazanmalarından kendi velayetlerine kadar olan Bitcoin yolculuklarında güvenli bir şekilde rehberlik eden bir Bitcoin topluluğuyuz. Faturalarımızı sponsorluklarla ve topluluk üyelerimize değer katan Bitcoin hizmetlerini geliştirerek ödemeye çalışıyoruz.
  

description: |
  Chúng tôi là cộng đồng Bitcoin giúp đưa người dùng Châu Phi mới lên tàu và hướng dẫn họ an toàn trên hành trình Bitcoin của họ từ việc kiếm được Sats đến quyền nuôi con. Chúng tôi cố gắng và thanh toán hóa đơn của mình thông qua các khoản tài trợ và bằng cách xây dựng các dịch vụ Bitcoin mang lại giá trị cho các thành viên cộng đồng của chúng tôi.
description: |
  Vi är en Bitcoin-community som hjälper till att gå ombord på nya afrikanska användare och vägleda dem säkert på sin Bitcoin-resa från att tjäna Sats till självförvaring. Vi försöker betala våra räkningar genom sponsring och genom att bygga ut Bitcoin-tjänster som ger mervärde till våra medlemmar i samhället.

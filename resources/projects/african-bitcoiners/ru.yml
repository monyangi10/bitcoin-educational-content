description: |
  Мы являемся сообществом Bitcoin, помогающим новым африканским пользователям и безопасно проводящим их по пути Bitcoin от получения Sats до самостоятельной опеки. Мы пытаемся оплачивать наши счета за счет спонсорской помощи и создания сервисов Bitcoin, которые добавляют ценность для членов нашего сообщества.

description: |
  Somos uma comunidade Bitcoin que ajuda a integrar novos utilizadores africanos e a guiá-los em segurança na sua viagem Bitcoin, desde a obtenção do Sats até à auto-custódia. Tentamos pagar as nossas contas através de patrocínios e da construção de serviços Bitcoin que acrescentam valor aos membros da nossa comunidade.

description: |
  Jesteśmy społecznością Bitcoin, która pomaga nowym afrykańskim użytkownikom i bezpiecznie prowadzi ich przez podróż Bitcoin od zdobycia Sats do samodzielnego utrzymania. Staramy się płacić nasze rachunki poprzez sponsoring i budowanie usług Bitcoin, które stanowią wartość dodaną dla członków naszej społeczności.

description: |
  Olemme Bitcoin-yhteisö, joka auttaa uusia afrikkalaisia käyttäjiä ja opastaa heitä turvallisesti Bitcoin-matkallaan Sats:n ansaitsemisesta omatoimiseen huostaanottoon. Yritämme maksaa laskujamme sponsoroinneilla ja rakentamalla Bitcoin-palveluja, jotka tuovat lisäarvoa yhteisön jäsenillemme.

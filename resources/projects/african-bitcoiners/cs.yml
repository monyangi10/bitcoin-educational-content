description: |
  Jsme komunita Bitcoin, která pomáhá novým africkým uživatelům na palubě a bezpečně je provází na jejich cestě od získání Sats k vlastnímu opatrovnictví. Snažíme se platit své účty prostřednictvím sponzorů a budováním služeb Bitcoin, které mají pro členy naší komunity přidanou hodnotu.
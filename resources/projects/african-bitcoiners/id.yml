description: |
  Kami adalah komunitas Bitcoin yang membantu pengguna baru di Afrika dan memandu mereka dengan aman dalam perjalanan Bitcoin mereka mulai dari mendapatkan Sats hingga menjadi tahanan mandiri. Kami mencoba membayar tagihan kami melalui sponsor dan dengan membangun layanan Bitcoin yang memberikan nilai tambah bagi anggota komunitas kami.

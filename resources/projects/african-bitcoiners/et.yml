description: |
  Me oleme Bitcoin kogukond, mis aitab uutel Aafrika kasutajatel siseneda ja juhatab neid turvaliselt Bitcoin teekonnal Sats teenimisest kuni iseenda eestkostmiseni. Püüame oma arveid tasuda sponsorluse ja Bitcoin teenuste väljaarendamise kaudu, mis lisavad meie kogukonna liikmetele väärtust.

description: |
  Nous sommes une communauté Bitcoin qui aide les nouveaux utilisateurs africains à s'intégrer et les guide en toute sécurité dans leur voyage Bitcoin, de l'obtention du Sats à l'autodétention. Nous essayons de payer nos factures grâce à des sponsors et en développant des services Bitcoin qui ajoutent de la valeur aux membres de notre communauté.

description: |
  Mi smo Bitcoin zajednica koja pomaže u uključivanju novih afričkih korisnika i vodi ih sigurno na njihovom Bitcoin putovanju od zarađivanja Sats do samostalnog čuvanja. Pokušavamo platiti naše račune kroz sponzorstva i izgradnjom Bitcoin usluga koje dodaju vrednost našim članovima zajednice.

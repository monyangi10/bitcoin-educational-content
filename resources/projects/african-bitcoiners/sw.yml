description: |
  Sisi ni jumuiya ya Bitcoin tunayosaidia kuabiri watumiaji wapya wa Kiafrika na kuwaongoza kwa usalama katika safari yao ya Bitcoin kutoka kupata Sats hadi kujitunza. Tunajaribu na kulipa bili zetu kupitia ufadhili na kwa kuunda huduma za Bitcoin ambazo huongeza thamani kwa wanajamii wetu.

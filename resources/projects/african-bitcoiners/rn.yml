description: |
  Turi umuryango wa Bitcoin ufasha gushiramwo abakoresha bashasha b’Afrika no kubayobora ata nkomanzi mu rugendo rwabo rwa Bitcoin kuva ku kuronka sats gushika ku kwitunga. Turagerageza no kwishura amafaranga yacu biciye mu gutera inkunga no mu kwubaka ibikorwa vya Bitcoin vyongera agaciro ku banyagihugu bacu.
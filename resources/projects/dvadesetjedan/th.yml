description: |
  DvadesetJedan เป็นกลุ่มไม่เป็นทางการของผู้ที่ชื่นชอบบิตคอยน์จากพื้นที่อดีตยูโกสลาเวีย มีเป้าหมายในการให้ความรู้ ส่งเสริมการเป็นผู้ประกอบการ และขยายเครือข่ายบิตคอยน์ผ่านโครงการต่างๆ กลุ่มนี้มีสมาชิกหลายร้อยคนและจัดการประชุมเป็นประจำทั่วภูมิภาค ทุกคนที่เข้าใจถึงความพิเศษและความสำคัญของบิตคอยน์ยินดีต้อนรับ แต่ก็รวมถึงผู้ที่ต้องการเรียนรู้เกี่ยวกับมันด้วย ในฐานะคนรักบิตคอยน์ เรามีความยินดีที่จะแบ่งปันความรู้และประสบการณ์กับทุกคน บางคนในกลุ่มทำงานในอุตสาหกรรมบิตคอยน์ บางคนมีธุรกิจที่เกี่ยวข้องกับบิตคอยน์ ในขณะที่บางคนเป็นเพียงผู้ที่ชื่นชอบ สิ่งที่นำพาเรามารวมกันคือความรักในเทคโนโลยีนี้ หากสิ่งนี้ดูน่าสนใจสำหรับคุณ คุณต้องการฟังสิ่งที่เราต้องการจะพูด หรือมีบางอย่างที่คุณต้องการจะแบ่งปันกับเรา – เรากำลังรอคุณอยู่!
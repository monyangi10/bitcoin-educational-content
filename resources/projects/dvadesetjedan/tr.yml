description: |
  DvadesetJedan, çeşitli projeler aracılığıyla eğitim vermeyi, girişimciliği artırmayı ve Bitcoin ağını genişletmeyi amaçlayan eski Yu alanından Bitcoin meraklılarından oluşan gayri resmi bir gruptur. Grup şu anda yüzlerce üyeye sahiptir ve bölge genelinde düzenli toplantılar düzenlemektedir. Bitcoin'ın özelliğini ve önemini anlayan herkesin yanı sıra bu konuda bilgi edinmek isteyenlere de kapımız açıktır. Bir Bitcoin aşığı olarak, bilgi ve deneyimlerimizi herkesle paylaşmaktan mutluluk duyuyoruz. Bazılarımız Bitcoin endüstrisinde çalışıyor, bazılarımızın Bitcoin ile bağlantılı işleri var, bazıları ise sadece meraklı. Bizi bir araya getiren şey bu teknolojiye duyduğumuz sevgi. Bu size ilginç geliyorsa, söyleyeceklerimizi duymak istiyorsanız veya bizimle paylaşmak istediğiniz bir şey varsa - sizi bekliyoruz!
  
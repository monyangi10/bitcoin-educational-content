description: |
  드바데셋제단은 다양한 프로젝트를 통해 교육, 기업가 정신 증진, Bitcoin 네트워크 확장을 목표로 하는 전유 우주인 출신의 Bitcoin 애호가들의 비공식 그룹입니다. 이 그룹은 현재 수백 명의 회원을 보유하고 있으며 지역 전역에서 정기적인 모임을 개최하고 있습니다. Bitcoin의 특별함과 중요성을 이해하는 사람이라면 누구나 환영하지만, 이에 대해 배우고 싶은 사람들도 환영합니다. Bitcoin의 애호가로서 우리는 모든 사람과 지식과 경험을 공유할 수 있어 기쁩니다. 우리 중 일부는 Bitcoin 업계에서 일하고 있고, 일부는 Bitcoin과 관련된 사업을 하고 있으며, 일부는 그냥 애호가이기도 합니다. 우리를 하나로 모으는 것은 이 기술에 대한 애정입니다. 이 기술이 흥미로워 보이시거나, 저희의 이야기를 듣고 싶으시거나, 공유하고 싶은 내용이 있으시다면 언제든 환영합니다!
  
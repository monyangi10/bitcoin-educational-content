description: |
  DvadesetJedan ni umugwi udasanzwe w’abakunda Bitcoin bava mu kirere ca ex-yu ugamije kwigisha, guteza imbere rwiyemezamirimo no kwagura urubuga rwa Bitcoin biciye mu migambi itandukanye. Ubu uwo mugwi ufise abanywanyi amajana n’amajana kandi urategura amakoraniro adasanzwe mu karere kose. Umuntu wese atahura ubudasa n’akamaro ka Bitcoin arakaze, ariko n’abashaka kuyimenya. Nk'umukunzi wa Bitcoin, turanezerewe no gusangira ubumenyi n'ubuhinga n'abantu bose. Bamwe muri twebwe dukora mu gisata ca Bitcoin, bamwe bafise ubucuruzi buboshe kuri Bitcoin, mu gihe abandi ari abakunda gusa. Ico kiduhuza ni urukundo rw’iyi tekinoloji. Ivyo nimba bisa n’ibigushimisha, urashaka kwumva ivyo dufise canke hari ico wipfuza kudusangiza – turakurindiriye!
  
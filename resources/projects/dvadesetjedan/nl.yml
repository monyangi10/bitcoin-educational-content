description: |
  DvadesetJedan is een informele groep van Bitcoin enthousiastelingen uit de ex-yu ruimte, gericht op het opleiden, stimuleren van ondernemerschap en het uitbreiden van het Bitcoin netwerk door middel van verschillende projecten. De groep telt momenteel honderden leden en organiseert regelmatig bijeenkomsten in de hele regio. Iedereen die de bijzonderheid en het belang van Bitcoin inziet is welkom, maar ook degenen die er meer over willen leren. Als liefhebber van Bitcoin delen we graag kennis en ervaring met iedereen. Sommigen van ons werken in de Bitcoin industrie, sommigen hebben bedrijven die verbonden zijn met Bitcoin, terwijl sommigen gewoon enthousiastelingen zijn. Wat ons samenbrengt is de liefde voor deze technologie. Als dit je interessant lijkt, je wilt horen wat we te zeggen hebben of er is iets wat je met ons wilt delen - we wachten op je!
  
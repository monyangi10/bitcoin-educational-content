description: |
  DvadesetJedan е неформална група от биткойн ентусиасти от бившето пространство, чиято цел е да образова, да стимулира предприемачеството и да разширява биткойн мрежата чрез различни проекти. В момента групата наброява стотици членове и организира редовни срещи в целия регион. Добре дошли са всички, които разбират особеностите и значението на биткойн, а също и тези, които биха искали да научат повече за него. Като любители на биткойн, ние сме щастливи да споделим знания и опит с всички. Някои от нас работят в биткойн индустрията, други имат бизнес, който е свързан с биткойн, а трети са просто ентусиасти. Това, което ни обединява, е любовта към тази технология. Ако това ви се струва интересно, искате да чуете какво имаме да ви кажем или има нещо, което бихте искали да споделите с нас - ние ви очакваме!
  
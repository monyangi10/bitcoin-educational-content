description: |
  Fedi създава нов начин, по който общностите и организациите да защитават и използват парите и данните си с помощта на федеративна операционна система.
  
   Ние свързваме най-фундаменталната човешка технология - общността - с технологиите за свобода, като Bitcoin, за да повишим нивото на човечеството.
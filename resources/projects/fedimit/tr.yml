description: |
  Fedi, Federated OS ile toplulukların ve kuruluşların paralarını ve verilerini güvence altına almaları ve kullanmaları için yeni bir yol yaratıyor.
  
   İnsanlığın seviyesini yükseltmek için en temel insan teknolojisi olan topluluğu Bitcoin gibi özgürlük teknolojileriyle birleştiriyoruz.
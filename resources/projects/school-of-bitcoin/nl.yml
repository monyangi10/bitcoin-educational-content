description: |
  School of Bitcoin is een educatief platform met de ambitieuze missie om 21 miljoen mensen wereldwijd te onderwijzen over veilig gebruik van Bitcoin. Het initiatief biedt toegankelijk en betaalbaar Bitcoin onderwijs via digitale middelen, waardoor complexe Bitcoin concepten voor iedereen gemakkelijk te begrijpen zijn. Met een focus op wereldwijd bereik en inclusiviteit, wil het platform de kenniskloof in het Bitcoin onderwijs overbruggen, met name gericht op achtergestelde gemeenschappen die het meeste baat hebben bij het begrijpen van Bitcoin. Hun uitgebreide curriculum behandelt Bitcoin veiligheid, praktisch gebruik en fundamentele concepten, allemaal geleverd door gebruiksvriendelijk digitaal lesmateriaal.
  
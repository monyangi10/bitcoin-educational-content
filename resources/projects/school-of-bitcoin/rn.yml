description: |
  Ishure rya Bitcoin ni urubuga rw’inyigisho rufise intumbero yo kwigisha abantu imiliyoni 21 kw’isi yose ivyerekeye gukoresha neza Bitcoin. Iryo shirahamwe ritanga inyigisho za Bitcoin zishikira kandi zishoboka biciye ku bikoresho vy’ubuhinga bwa none, bigatuma ivyiyumviro bikomeye vya Bitcoin vyoroha gutahura umuntu wese. Mu kwibanda ku gushikira isi yose no gushiramwo abantu bose, iyo nzira igamije gukuraho ikinogo c’ubumenyi mu burezi bwa Bitcoin, cane cane yibanda ku mibano idafise ubufasha buhagije yoshobora kwungukira cane mu gutahura Bitcoin. Inyigisho zabo zijanye n’umutekano wa Bitcoin, ikoreshwa ry’ukuri, n’ivyiyumviro vy’ishimikiro, vyose bishikirizwa biciye ku bikoresho vy’inyigisho vy’ubuhinga bwa none bishobora gukoreshwa neza.
  
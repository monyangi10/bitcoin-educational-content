description: |
  Umbrel е операционна система с отворен код, която позволява на потребителите да управляват личен сървър в дома си, осигурявайки удобството на съхранението в облак с поверителността и контрола на локалното съхранение на данни.
  
  Потребителите могат самостоятелно да хостват различни приложения, включително Nextcloud за частно съхранение в облак, PhotoPrism за съхранение на снимки и видео, както и лични възли Bitcoin и Lightning за транзакции с биткойни. Umbrel разполага и със собствен магазин за приложения за допълнителни самостоятелно хоствани приложения, възможности за блокиране на реклами и интеграция на домашна автоматизация.
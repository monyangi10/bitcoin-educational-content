description: |
  Umbrel เป็นระบบปฏิบัติการโอเพ่นซอร์สที่ช่วยให้ผู้ใช้สามารถรันเซิร์ฟเวอร์ส่วนตัวในบ้านของตนเอง มอบความสะดวกสบายของการจัดเก็บข้อมูลบนคลาวด์พร้อมกับความเป็นส่วนตัวและการควบคุมการจัดเก็บข้อมูลในท้องถิ่น
  
  ผู้ใช้สามารถโฮสต์แอปพลิเคชันต่างๆ ได้ด้วยตนเอง รวมถึง Nextcloud สำหรับการจัดเก็บข้อมูลบนคลาวด์ส่วนตัว, PhotoPrism สำหรับการจัดเก็บรูปภาพและวิดีโอ, และโหนด Bitcoin และ Lightning ส่วนตัวสำหรับการทำธุรกรรมบิตคอยน์ Umbrel ยังมีร้านค้าแอปของตัวเองสำหรับแอปที่โฮสต์ด้วยตนเองเพิ่มเติม, ความสามารถในการบล็อกโฆษณา, และการผสานรวมระบบอัตโนมัติในบ้าน
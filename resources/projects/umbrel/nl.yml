description: |
  Umbrel is een open-source besturingssysteem waarmee gebruikers thuis een persoonlijke server kunnen draaien, die het gemak biedt van cloud-opslag met de privacy en controle van lokale gegevensopslag.
  
  Gebruikers kunnen zelf verschillende toepassingen hosten, waaronder Nextcloud voor privé cloud-opslag, PhotoPrism voor foto- en video-opslag en persoonlijke Bitcoin en Lightning nodes voor Bitcoin transacties. Umbrel beschikt ook over een eigen app store voor aanvullende zelf gehoste apps, mogelijkheden om advertenties te blokkeren en integraties met domotica.
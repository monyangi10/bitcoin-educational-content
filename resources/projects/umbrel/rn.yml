description: |
  Umbrel ni ubuhinga bwo gukoresha bufunguye bushobora gutuma abakoresha bakoresha server y’umuntu ku giti ciwe mu nzu yabo, bikaba bitanga uburyo bwo kubika amakuru mu gicu n’ubuzima bwite n’ubugenzuzi bw’ububiko bw’amakuru yo mu karere. 
  
  Abakoresha barashobora kwiyakira porogarama zitandukanye, harimwo Nextcloud yo kubika mu gicu c’ibanga, PhotoPrism yo kubika amafoto n’amasanamu, n’ibikoresho vy’umuntu ku giti ciwe Bitcoin na Lightning node ku bikorwa vya Bitcoin. Umbrel kandi ifise ububiko bwayo bwite bw’amaporogarama y’inyongera yikoresha, ubushobozi bwo kubuza amatangazo, n’ugushiramwo porogarama zikora mu nzu.
description: |
  엄브렐은 사용자가 집에서 개인 서버를 운영할 수 있는 오픈 소스 운영 체제로, 클라우드 스토리지의 편리함과 로컬 데이터 스토리지의 프라이버시 및 제어 기능을 제공합니다.
  
  사용자는 개인 클라우드 스토리지용 Nextcloud, 사진 및 동영상 스토리지용 PhotoPrism, Bitcoin 트랜잭션용 개인 Bitcoin 및 Lightning 노드 등 다양한 애플리케이션을 자체 호스팅할 수 있습니다. 또한 엄브렐은 자체 앱 스토어를 통해 추가 자체 호스팅 앱, 광고 차단 기능, 홈 자동화 통합 기능을 제공합니다.
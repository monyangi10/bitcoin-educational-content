description: |
  سات‌اسکرایب به شما کمک می‌کند تا بلاکچین Bitcoin را درک کنید—چه تازه‌کار باشید و چه به جزئیات فنی بپردازید. فقط یک transaction ID یا ارتفاع بلوک را وارد کنید تا توضیحی تولید شده توسط هوش مصنوعی به زبان ساده انگلیسی دریافت کنید. از خلاصه‌های سریع تا بینش‌های عمیق‌تر، سات‌اسکرایب داده‌های خام بلاکچین را به چیزی تبدیل می‌کند که هر کسی می‌تواند آن را درک کند.
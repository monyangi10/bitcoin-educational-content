description: |
  Satscribe auttaa sinua ymmärtämään Bitcoin-lohkoketjua - olitpa sitten uusi käyttäjä tai syventynyt sen teknisiin yksityiskohtiin. Kirjoita vain transaction ID tai lohkon korkeus ja saat tekoälyn luoman selityksen selkokielellä. Nopeista tiivistelmistä syvällisempiin oivalluksiin, Satscribe muuttaa raa'an lohkoketjutiedon joksikin, jota kuka tahansa voi ymmärtää.
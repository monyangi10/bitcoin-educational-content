description: |
  सैटस्क्राइब आपको Bitcoin ब्लॉकचेन को समझने में मदद करता है—चाहे आप इसमें नए हों या तकनीकी बारीकियों में डूबे हों। बस transaction ID या ब्लॉक की ऊँचाई दर्ज करें और सरल अंग्रेजी में AI द्वारा जनित व्याख्या प्राप्त करें। त्वरित सारांश से लेकर गहन अंतर्दृष्टि तक, सैटस्क्राइब कच्चे ब्लॉकचेन डेटा को ऐसी चीज़ में बदल देता है जिसे कोई भी समझ सकता है।
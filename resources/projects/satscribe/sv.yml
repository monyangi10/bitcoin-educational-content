description: |
  Satscribe hjälper dig att förstå Bitcoin-blockkedjan - oavsett om du är nybörjare eller dyker in i de tekniska detaljerna. Ange bara en transaction ID- eller blockhöjd för att få en AI-genererad förklaring på vanlig engelska. Från snabba sammanfattningar till djupare insikter - Satscribe förvandlar rå blockkedjedata till något som alla kan förstå.
description: |
  Satscribe iragufasha gutahura Bitcoin blockchain-waba uri mushasha muri yo canke wisuka mu bintu vy’ubuhinga. Injira gusa transaction ID canke uburebure bw’ibarabara kugira ngo uronke insobanuro ya AI mu congereza gisanzwe. Kuva ku ncamake zihuta gushika ku bumenyi bwimbitse, Satscribe ihindura amakuru y’ivya blockchain atagiramwo ivyatsi mu kintu umuntu wese ashobora gutahura.
description: |
  Satscribe hjelper deg med å forstå Bitcoin-blokkjeden - enten du er nybegynner eller dykker ned i de tekniske detaljene. Bare skriv inn en transaction ID- eller blokkhøyde for å motta en AI-generert forklaring på vanlig engelsk. Satscribe forvandler rå blokkjededata til noe alle kan forstå, fra raske sammendrag til dypere innsikt.
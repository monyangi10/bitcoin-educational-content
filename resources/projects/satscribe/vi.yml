description: |
  Satscribe giúp bạn hiểu rõ hơn về blockchain Bitcoin—dù bạn là người mới hay đã tìm hiểu sâu về nó. Chỉ cần nhập transaction ID hoặc chiều cao khối để nhận được lời giải thích do AI tạo ra bằng tiếng Anh dễ hiểu. Từ tóm tắt nhanh đến những hiểu biết sâu sắc hơn, Satscribe biến dữ liệu blockchain thô thành thứ mà bất kỳ ai cũng có thể hiểu được.
description: |
  Satscribe hilft Ihnen, die Bitcoin-Blockchain zu verstehen - egal, ob Sie neu sind oder sich in die technischen Details vertiefen wollen. Geben Sie einfach eine transaction ID- oder Blockhöhe ein und Sie erhalten eine KI-generierte Erklärung in einfachem Englisch. Von schnellen Zusammenfassungen bis hin zu tieferen Einblicken - Satscribe verwandelt rohe Blockchain-Daten in etwas, das jeder verstehen kann.
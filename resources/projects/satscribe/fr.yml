description: |
  Satscribe vous aide à comprendre la blockchain Bitcoin, que vous soyez novice en la matière ou que vous vous plongiez dans les détails techniques. Il suffit d'entrer un transaction ID ou une hauteur de bloc pour recevoir une explication générée par l'IA en langage clair. Qu'il s'agisse de résumés rapides ou d'informations plus approfondies, Satscribe transforme les données brutes de la blockchain en quelque chose que tout le monde peut comprendre.
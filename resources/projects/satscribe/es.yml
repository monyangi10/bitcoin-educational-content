description: |
  Satscribe te ayuda a entender la blockchain Bitcoin, tanto si eres nuevo en ella como si estás buceando en los detalles técnicos. Basta con introducir una transaction ID o la altura de un bloque para recibir una explicación generada por la IA en inglés sencillo. Desde resúmenes rápidos hasta perspectivas más profundas, Satscribe convierte los datos brutos de la cadena de bloques en algo que cualquiera puede entender.
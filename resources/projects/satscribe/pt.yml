description: |
  O Satscribe ajuda-o a dar sentido à blockchain Bitcoin - quer seja novo nela ou esteja a mergulhar nos detalhes técnicos. Basta digitar um transaction ID ou a altura do bloco para receber uma explicação gerada por IA em inglês simples. De resumos rápidos a insights mais profundos, o Satscribe transforma dados brutos de blockchain em algo que qualquer pessoa pode entender.
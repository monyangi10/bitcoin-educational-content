description: |
  Satscribe, ister yeni olun ister teknik ayrıntılara dalın, Bitcoin blok zincirini anlamanıza yardımcı olur. Sade bir İngilizce ile yapay zeka tarafından oluşturulmuş bir açıklama almak için bir transaction ID veya blok yüksekliği girmeniz yeterlidir. Satscribe, hızlı özetlerden daha derin içgörülere kadar ham blok zinciri verilerini herkesin anlayabileceği bir şeye dönüştürür.
description: |
  Satscribe vám pomůže pochopit smysl blockchainu Bitcoin - ať už se s ním teprve seznamujete, nebo pronikáte do technických detailů. Stačí zadat výšku bloku transaction ID nebo bloku a získáte vysvětlení generované umělou inteligencí ve srozumitelné angličtině. Od rychlých shrnutí až po hlubší vhledy - Satscribe promění surová data blockchainu v něco, čemu porozumí každý.
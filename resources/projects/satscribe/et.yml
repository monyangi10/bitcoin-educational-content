description: |
  Satscribe aitab teil Bitcoin plokiahelat mõista - olgu see teile uus või sukelduge tehnilistesse üksikasjadesse. Sisestage lihtsalt transaction ID või ploki kõrgus, et saada tehisintellekti poolt genereeritud selgitus lihtsas inglise keeles. Alates kiiretest kokkuvõtetest kuni sügavamate arusaamadeni muudab Satscribe plokiahela töötlemata andmed millekski, millest igaüks saab aru.
description: |
  Satscribe helpt je de Bitcoin blockchain te begrijpen - of je er nu nieuw in bent of in de technische details duikt. Voer gewoon een transaction ID of blok hoogte in om een AI-gegenereerde uitleg in gewoon Engels te ontvangen. Van snelle samenvattingen tot diepere inzichten, Satscribe verandert ruwe blockchain data in iets dat iedereen kan begrijpen.
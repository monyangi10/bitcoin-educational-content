description: |
  Satscribe vam pomaže da razumete Bitcoin blokčejn—bilo da ste novi u tome ili se upuštate u tehničke detalje. Samo unesite transaction ID ili visinu bloka da biste dobili AI-generisano objašnjenje na jednostavnom engleskom jeziku. Od brzih sažetaka do dubljih uvida, Satscribe pretvara sirove podatke blokčejna u nešto što svako može razumeti.
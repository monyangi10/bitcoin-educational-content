description: |
  Satscribe ช่วยให้คุณเข้าใจบล็อกเชน Bitcoin—ไม่ว่าคุณจะเป็นมือใหม่หรือกำลังเจาะลึกในรายละเอียดทางเทคนิค เพียงแค่ป้อน transaction ID หรือความสูงของบล็อกเพื่อรับคำอธิบายที่สร้างโดย AI ในภาษาอังกฤษที่เข้าใจง่าย ตั้งแต่สรุปอย่างรวดเร็วไปจนถึงข้อมูลเชิงลึกที่ลึกซึ้งยิ่งขึ้น Satscribe เปลี่ยนข้อมูลบล็อกเชนดิบให้เป็นสิ่งที่ใครๆ ก็สามารถเข้าใจได้
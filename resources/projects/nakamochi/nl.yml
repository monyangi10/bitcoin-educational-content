description: |
  Nakamochi is ontworpen om Bitcoin en Lightning Full node gebruik toegankelijk te maken voor iedereen, ongeacht technische expertise. De in Zwitserland gemaakte plug-and-play node stelt individuen in staat om volledige privacy en onafhankelijkheid te bereiken. Door je eigen Full node te gebruiken, versterk je niet alleen je persoonlijke soevereiniteit, maar draag je ook bij aan de decentralisatie en veerkracht van het Bitcoin netwerk.
  
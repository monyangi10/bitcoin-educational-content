description: |
  Nakamochi yagenewe gutuma igikorwa ca Bitcoin na Lightning Full node gishikira umuntu wese, ataravye ubuhinga bwo mu vy’ubuhinga. Ico gikoresho cakozwe n’Ubusuwisi gishobora gutuma umuntu ashobora gushika ku buzima bwiwe bwite n’ukwigenga. Mu gutwara Full node yawe, ntukomeza ubusegaba bwawe bwite gusa ariko kandi uragira ico uterereye mu kwegereza ubutegetsi abaturage no gukomera kw’urubuga rwa Bitcoin.
  
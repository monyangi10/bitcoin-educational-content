description: |
  Africa Free Routing 致力於擴大 Lightning Network 在整個非洲的應用。 非洲。我們為企業提供所需的技術和合作夥伴關係，以快速、高效地 高效地接受 Bitcoin Lightning 付款所需的技術和合作關係。Lightning 是建立在 Bitcoin 之上的最佳支付系統。 是最好的貨幣形式！有太多值得我們喜愛的地方，我們很高興能幫助 我們很高興能幫助非洲人開始使用這項革命性的技術。

  我們的服務包括

  - 完整的 Lightning 節點設定
  - 閃電基礎設施設置
  - 流動資金管理
  - 收入/費用策略
  - Lightning Network 費用最佳化
  - 入站渠道策略
  - 提供入境流動資金
  - 電子商務付款諮詢與設定
  - 銷售點諮詢及設定

  我們熱衷於讓 Lightning 成為非洲首選的支付系統。我們的計劃 為下一代 Lightning 開發人員舉辦 Lightning Bootcamps、舉辦有關運行 Lightning 節點的 網路研討會，等等，這些都強調了我們的 Commitment 技術。加入我們的行列，徹底改變整個非洲大陸的支付方式。
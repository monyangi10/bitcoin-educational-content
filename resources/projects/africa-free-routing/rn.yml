description: |
  Africa Free Routing yiyemeje kwagura kwemera Lightning Network hirya no hino
  Afirika. Turaha ubucuruzi ubuhinga n’ubufatanye bikenewe kugira ngo vyihuse kandi .
  kwemera neza amahera ya Bitcoin Lightning. Umuravyo ni uburyo bwiza bwo kwishura, bubatswe hejuru
  ya Bitcoin, ari yo nzira nziza cane y’amahera! Hari vyinshi vyo gukunda, kandi turanezerewe no gufasha
  Abanyafirika batangura n’ubu buhinga buhindura abantu.
  
  Ibikorwa vyacu birimwo- ururimi: de
  
  - Gutegura urudodo rw'umuravyo rwose
  - Gutegura ibikorwa remezo vy'umuravyo
  - Uburongozi bw'amahera
  - Ingamba z'amafaranga/amafaranga
  - Lightning Network Gutuma amafaranga agenda neza
  - Ingamba z'umurongo winjira
  - Gutanga amafaranga yinjira
  - Ubucuruzi bwo kuri interineti bwo gutanga inama no gutegura
  - Impanuro n'ugutegura ahantu ho kugurisha
     
   Turafise umutima ukunze wo guhindura Lightning ngo ibe uburyo bwo kwishura muri Afirika. Ingamba zacu,
   nk’ugutegura ama bootcamps y’umuravyo ku ruvyaro ruzokurikira rw’abahinguzi b’umuravyo, kwakira
   webinars ku gukoresha imiravyo n'ibindi, gushimika kuri Commitment yacu kuri iyi mpinduka
   ubuhinga. Twifatanye n’uguhindura ivyishyurwa ku mugabane wose.
  
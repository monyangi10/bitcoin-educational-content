description: |
  Bitcoin District is a startup society inside Próspera ZEDE, a semi-autonomous city on Roatán island, Honduras. Próspera is a special economic zone with regulatory and tax autonomy, where companies can incorporate in as little as 24 hours under one of the most competitive tax regimes in the world: 1% corporate tax, ~5% income tax, and 2.5% sales tax. Since 2022, Bitcoin is recognized as legal tender here—making it one of the most Bitcoin-friendly jurisdictions on the planet.
  On top of this foundation, Bitcoin District adds a Layer 2 for governance: a community where Bitcoin is the default money, and where people experiment with circular economies, voluntary rules, and open-source law. It's a landing zone for Bitcoiners who want to build or live in a freedom-first place, without needing permission from legacy financial or bureaucratic systems.

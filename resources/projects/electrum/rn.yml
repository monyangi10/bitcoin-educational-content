description: |
  Electrum ni Bitcoin Wallet ishobora gukoreshwa mu buryo bwinshi ishira imbere umutekano w’abakoresha n’uguhinduranya. 
  
  Ishigikira ama platforms menshi harimwo telefone ngendanwa, desktop, n’umurongo w’amabwirizwa. Imfunguruzo zawe z’ibanga zirashirwa mu mfuruka kandi zigabikwa ku gikoresho cawe, kugira ngo ntizigere zigaragara. Ikindi kandi, Electrum ikoresha ijambo ry’ibanga kugira ngo yemerere gusubirana amafaranga, kandi itanga uburyo bwo gushika ku Bitcoin Blockchain vyihuse biciye ku rubuga rwayo rwa server. Ishigikira "ububiko bwa Cold" butari mu murongo kugira ngo ugume utekanye imfunguruzo zawe z'ibanga, kandi itanga ubushobozi bwa Multisig bwo gusangira uruhusha rwo gukoresha Coin. Electrum kandi igenzura amafaranga yose mu mateka yawe ikoresheje Igenzura ry’Ukwishura ryoroshe (SPV), kandi iremeza ubufatanye bw’ibindi bikoresho, nk’ibikorwa vya Multisig n’ibikoresho vy’amasakoshi.
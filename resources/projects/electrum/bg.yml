description: |
  Electrum е универсален модел Bitcoin wallet, който дава приоритет на безопасността и гъвкавостта на потребителя.
  
  Той поддържа множество платформи, включително мобилни, настолни и интерфейси на командния ред. Вашите частни ключове се криптират и се съхраняват на вашето устройство, като се гарантира, че никога няма да бъдат изложени на риск. Освен това Electrum използва тайна фраза, за да позволи възстановяването на средства, и осигурява бърз достъп до блокчейна на Bitcoin чрез своята сървърна мрежа. Тя поддържа офлайн "студено съхранение", за да запази частните ви ключове сигурни, и предлага мултисиг възможности за разделяне на разрешенията за изразходване на монети. Electrum също така проверява всички транзакции в историята ви, като използва опростена проверка на плащанията (SPV), и позволява интеграция на приставки на трети страни, като например мултисиг услуги и хардуерни портфейли.
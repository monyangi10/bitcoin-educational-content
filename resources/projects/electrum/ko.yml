description: |
  일렉트럼은 사용자의 안전과 유연성을 최우선으로 고려한 다용도 Bitcoin Wallet입니다.
  
  모바일, 데스크톱, 명령줄 인터페이스 등 여러 플랫폼을 지원합니다. 개인 키는 암호화되어 장치에 보관되므로 절대 노출되지 않습니다. 또한, 일렉트럼은 비밀 문구를 사용하여 자금 회수를 허용하고 서버 네트워크를 통해 Bitcoin Blockchain에 대한 빠른 액세스를 제공합니다. 개인 키를 안전하게 보관하기 위해 오프라인 'Cold 스토리지'를 지원하며, Coin 지출에 대한 권한을 분할하는 Multisig 기능을 제공합니다. 또한 일렉트럼은 간소화된 결제 인증(SPV)을 사용해 거래 내역의 모든 거래를 확인하며, Multisig 서비스 및 하드웨어 지갑과 같은 타사 플러그인 통합을 허용합니다.
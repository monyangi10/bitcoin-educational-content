description: |
  Electrum เป็น Bitcoin wallet ที่หลากหลายซึ่งให้ความสำคัญกับความปลอดภัยและความยืดหยุ่นของผู้ใช้
  
  รองรับหลายแพลตฟอร์มรวมถึงมือถือ เดสก์ท็อป และอินเทอร์เฟซบรรทัดคำสั่ง กุญแจส่วนตัวของคุณถูกเข้ารหัสและเก็บไว้ในอุปกรณ์ของคุณ เพื่อให้มั่นใจว่าจะไม่ถูกเปิดเผย นอกจากนี้ Electrum ยังใช้วลีลับเพื่อให้สามารถกู้คืนเงินได้ และให้การเข้าถึงบล็อกเชน Bitcoin อย่างรวดเร็วผ่านเครือข่ายเซิร์ฟเวอร์ รองรับการจัดเก็บแบบออฟไลน์ "cold storage" เพื่อรักษาความปลอดภัยของกุญแจส่วนตัวของคุณ และมีความสามารถในการทำ multisig เพื่อแบ่งการอนุญาตในการใช้จ่ายเหรียญ Electrum ยังตรวจสอบธุรกรรมทั้งหมดในประวัติของคุณโดยใช้ Simplified Payment Verification (SPV) และอนุญาตให้มีการรวมปลั๊กอินของบุคคลที่สาม เช่น บริการ multisig และกระเป๋าเงินฮาร์ดแวร์
description: |
  256 | HEAT ni ishirahamwe ry’abahinga mu guhingura no kwubaka inyishu z’ubushuhe hakoreshejwe ubuhinga bwo gusubira gufata ubushuhe buva ku bikoresho vya ASIC bikoreshwa mu mafaranga y’ibanga Mining. Batanga ibikoresho bituma abacukuzi b’amabuye y’agaciro ba ASIC ba kera kandi batagira inyungu bahindurwa ibikoresho vyo gushushanya bishobora gutegurwa kandi bifise inyungu mu minota 15 gusa. Ikindi kandi, baratanga impanuro kugira ngo bashobore gushirwa mu ngiro uburyo bwo gushushanya amazu n’ubudandaji mu buryo bucereje kandi bukora neza, ivyo bikaba bituma hataba hakenewe ama ventilateur atera urusaku. Uburyo bwabo bushasha bukoresha ubushuhe buva ku mafaranga y’ibanga Mining mu bikorwa vyo gushusha, bikaba bitanga uburyo buzimvye kandi buramba bwo kuguma ahantu hashushe.
  
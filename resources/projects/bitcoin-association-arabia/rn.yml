description: |
  Ishirahamwe Bitcoin Arabiya ni ryo shirahamwe rya mbere ry'inyungu mu bihugu vyo mu Kiyaga c'Ikigobe ryiyemeje gusa ingingo ngenderwako za Bitcoin. Intumbero yayo ni uguteza imbere Ukwemera Bitcoin biciye mu bikorwa bitandukanye, harimwo ibirori, imigambi y’inyigisho, n’ubuvugizi bwa Leta n’ubw’abikorera ku giti cabo.
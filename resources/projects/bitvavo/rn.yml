description: |
  Gura, ugurisha, kandi ubike ibintu birenga 350 vy’ubuhinga bwa none kuri rimwe mu masoko akomeye yo mu Buraya. Amafaranga Bitvavo itanga ari mu make cane mu bijanye n’ubuhinga, kandi Exchange yanditswe muri De Nederlandsche Bank (DNB) kandi ifise amategeko y’ukubahiriza amategeko ahambaye mu bijanye n’ubuhinga.
  
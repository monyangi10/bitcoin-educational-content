description: |
  Produsent av Mining-maskiner, kjent for å ha designet den aller første ASIC som spesialiserte seg på Bitcoin Mining, og for å være den første aktøren i sektoren som ble notert på Nasdaq. Canaan har hovedkontor i Singapore, opererer i 21 land og er opptatt av innovasjon med fokus på Green Mining. Selskapet utvikler stadig mer effektivt utstyr for å optimalisere energiforbruket og forbedre lønnsomheten i Mining.

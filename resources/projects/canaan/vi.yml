description: |
  Nhà sản xuất máy Mining, nổi tiếng với việc thiết kế máy ASIC đầu tiên chuyên về Bitcoin Mining và là công ty đầu tiên trong lĩnh vực này được niêm yết trên Nasdaq. Có trụ sở tại Singapore, Canaan hoạt động tại 21 quốc gia và cam kết đổi mới với trọng tâm là Green Mining. Công ty phát triển các thiết bị ngày càng hiệu quả hơn để tối ưu hóa mức tiêu thụ năng lượng và cải thiện lợi nhuận của Mining.

description: |
  Fabricante de máquinas Mining, conhecido por ter concebido o primeiro ASIC especializado em Bitcoin Mining e por ser o primeiro ator do sector a ser cotado na Nasdaq. Sediada em Singapura, a Canaan está presente em 21 países e aposta na inovação com foco no Green Mining. Desenvolve equipamentos cada vez mais eficientes para otimizar o consumo de energia e melhorar a rentabilidade do Mining.

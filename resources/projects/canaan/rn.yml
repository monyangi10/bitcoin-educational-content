description: |
  Uwukora imashini za Mining, azwi ko ari we yakoze ASIC ya mbere yihariye muri Bitcoin Mining kandi akaba ari we mukinyi wa mbere muri urwo rwego ashirwa ku rutonde rwa Nasdaq. Ishirahamwe ry’i Singapore rikorera mu bihugu 21 kandi ryiyemeje gukora ibintu bishasha ryibanda ku Green Mining. Ikora ibikoresho vyiza cane kugira ngo ikoreshe neza inguvu no gutuma Mining igira inyungu nyinshi.
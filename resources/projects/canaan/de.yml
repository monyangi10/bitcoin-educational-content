description: |
  Hersteller von Mining-Maschinen, bekannt für die Entwicklung des allerersten ASIC, spezialisiert auf Bitcoin Mining und als erster Akteur in diesem Sektor, der an der Nasdaq notiert ist. Das in Singapur ansässige Unternehmen Canaan ist in 21 Ländern tätig und hat sich der Innovation verschrieben, wobei der Schwerpunkt auf Green Mining liegt. Das Unternehmen entwickelt immer effizientere Geräte, um den Energieverbrauch zu optimieren und die Rentabilität von Mining zu verbessern.

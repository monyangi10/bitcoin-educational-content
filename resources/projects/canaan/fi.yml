description: |
  Mining-koneiden valmistaja, joka tunnetaan siitä, että se on suunnitellut ensimmäisen ASIC-koneen, joka on erikoistunut Bitcoin Mining-koneisiin, ja siitä, että se on ensimmäinen alan toimija, joka on listattu Nasdaqiin. Singaporessa sijaitseva Canaan toimii 21 maassa ja on sitoutunut innovointiin keskittyen Green Mining:een. Se kehittää yhä tehokkaampia laitteita energiankulutuksen optimoimiseksi ja Mining:n kannattavuuden parantamiseksi.

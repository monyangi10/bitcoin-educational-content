description: |
  Mining makineleri üreticisi, Bitcoin Mining konusunda uzmanlaşmış ilk ASIC'ü tasarlaması ve sektörde Nasdaq'a kote olan ilk oyuncu olmasıyla tanınıyor. Merkezi Singapur'da bulunan Canaan, 21 ülkede faaliyet göstermektedir ve Green Mining'e odaklanarak kendini yeniliğe adamıştır. Enerji tüketimini optimize etmek ve Mining'in karlılığını artırmak için her zamankinden daha verimli ekipmanlar geliştirmektedir.

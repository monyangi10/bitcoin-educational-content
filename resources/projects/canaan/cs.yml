description: |
  Výrobce strojů Mining, známý tím, že navrhl první ASIC specializovaný na Bitcoin Mining a že jako první hráč v tomto odvětví byl kótován na burze Nasdaq. Společnost Canaan se sídlem v Singapuru působí ve 21 zemích a věnuje se inovacím se zaměřením na Green Mining. Vyvíjí stále účinnější zařízení pro optimalizaci spotřeby energie a zlepšení ziskovosti Mining.

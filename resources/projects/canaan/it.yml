description: |
  Produttore di macchine Mining, noto per aver progettato la prima ASIC specializzata in Bitcoin Mining e per essere stato il primo operatore del settore ad essere quotato al Nasdaq. Con sede a Singapore, Canaan opera in 21 Paesi ed è impegnata nell'innovazione, con particolare attenzione al Green Mining. Sviluppa apparecchiature sempre più efficienti per ottimizzare il consumo di energia e migliorare la redditività del Mining.

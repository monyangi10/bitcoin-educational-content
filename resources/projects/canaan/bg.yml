description: |
  Производител на машини mining, известен с това, че е проектирал първия ASIC, специализиран в биткойн mining, и с това, че е първият играч в сектора, който е регистриран на Nasdaq. Базирана в Сингапур, Canaan оперира в 21 държави и е отдадена на иновациите с фокус върху екологичните mining. Тя разработва все по-ефективно оборудване, за да оптимизира потреблението на енергия и да подобри рентабилността на mining.
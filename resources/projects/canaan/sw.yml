description: |
  Mtengenezaji wa mashine za Mining, anayejulikana kwa kuunda ASIC ya kwanza iliyobobea katika Bitcoin Mining na kwa kuwa mchezaji wa kwanza katika sekta hiyo kuorodheshwa kwenye Nasdaq. Ikianzia Singapore, Kanaani inafanya kazi katika nchi 21 na imejitolea kufanya uvumbuzi ikilenga Green Mining. Hutengeneza vifaa vyenye ufanisi zaidi ili kuboresha matumizi ya nishati na kuboresha faida ya Mining.

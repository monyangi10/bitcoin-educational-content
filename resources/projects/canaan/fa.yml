description: |
  تولیدکننده ماشین‌های Mining، که به خاطر طراحی اولین ASIC تخصصی در Bitcoin Mining شناخته شده و به عنوان اولین بازیگر در این بخش که در نزدک فهرست شده است. مستقر در سنگاپور، کنعان در 21 کشور فعالیت می‌کند و به نوآوری با تمرکز بر Green Mining متعهد است. این شرکت تجهیزات کارآمدتری را برای بهینه‌سازی مصرف انرژی و بهبود سودآوری Mining توسعه می‌دهد.

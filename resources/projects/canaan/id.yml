description: |
  Produsen mesin Mining, yang dikenal karena telah merancang ASIC pertama yang dikhususkan untuk Bitcoin Mining dan menjadi pemain pertama di sektor ini yang terdaftar di Nasdaq. Berbasis di Singapura, Canaan beroperasi di 21 negara dan berkomitmen pada inovasi dengan fokus pada Green Mining. Perusahaan ini mengembangkan peralatan yang lebih efisien untuk mengoptimalkan konsumsi energi dan meningkatkan profitabilitas Mining.

description: |
  Mining masinate tootja, kes on tuntud selle poolest, et on projekteerinud esimese ASIC, mis on spetsialiseerunud Bitcoin Mining-le, ja on esimene sektori mängija, kes on noteeritud Nasdaqis. Singapuris asuv Canaan tegutseb 21 riigis ja on pühendunud innovatsioonile, keskendudes Green Mining-le. Ta arendab üha tõhusamaid seadmeid, et optimeerida energiatarbimist ja parandada Mining kasumlikkust.

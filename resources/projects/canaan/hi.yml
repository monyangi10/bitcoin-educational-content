description: |
  Mining मशीनों का निर्माता, Bitcoin Mining में विशेषज्ञता प्राप्त सबसे पहले ASIC को डिजाइन करने और नैस्डैक पर सूचीबद्ध होने वाले इस क्षेत्र के पहले खिलाड़ी होने के लिए जाना जाता है। सिंगापुर में स्थित, कनान 21 देशों में काम करता है और Green Mining पर ध्यान केंद्रित करते हुए नवाचार के लिए प्रतिबद्ध है। यह ऊर्जा खपत को अनुकूलित करने और Mining की लाभप्रदता में सुधार करने के लिए और भी अधिक कुशल उपकरण विकसित करता है।

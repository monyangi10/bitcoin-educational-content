description: |
  Fabricante de máquinas Mining, conocido por haber diseñado la primera ASIC especializada en Bitcoin Mining y por ser el primer actor del sector en cotizar en el Nasdaq. Con sede en Singapur, Canaan opera en 21 países y apuesta por la innovación centrada en Green Mining. Desarrolla equipos cada vez más eficientes para optimizar el consumo de energía y mejorar la rentabilidad de la Mining.

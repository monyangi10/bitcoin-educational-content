description: |
  Producent maszyn Mining, znany z zaprojektowania pierwszego ASIC specjalizującego się w Bitcoin Mining i bycia pierwszym graczem w sektorze notowanym na Nasdaq. Firma Canaan z siedzibą w Singapurze działa w 21 krajach i jest zaangażowana w innowacje, koncentrując się na Green Mining. Opracowuje coraz bardziej wydajny sprzęt w celu optymalizacji zużycia energii i poprawy rentowności Mining.

description: |
  Tillverkare av Mining-maskiner, känd för att ha designat den allra första ASIC som är specialiserad på Bitcoin Mining och för att vara den första aktören i sektorn som noterades på Nasdaq. Canaan har sitt säte i Singapore, bedriver verksamhet i 21 länder och satsar på innovation med fokus på Green Mining. Företaget utvecklar allt effektivare utrustning för att optimera energiförbrukningen och förbättra lönsamheten för Mining.

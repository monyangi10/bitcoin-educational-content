description: |
  ผู้ผลิตเครื่องจักร mining ที่มีชื่อเสียงจากการออกแบบ ASIC เครื่องแรกที่เชี่ยวชาญใน bitcoin mining และเป็นผู้เล่นรายแรกในภาคส่วนที่จดทะเบียนใน Nasdaq ตั้งอยู่ในสิงคโปร์ Canaan ดำเนินงานใน 21 ประเทศและมุ่งมั่นสู่การนวัตกรรมโดยเน้นที่ mining สีเขียว พัฒนาอุปกรณ์ที่มีประสิทธิภาพมากขึ้นเพื่อเพิ่มประสิทธิภาพการใช้พลังงานและปรับปรุงความสามารถในการทำกำไรของ mining
description: |
  Proizvođač mašina Mining, poznat po tome što je dizajnirao prvi ASIC specijalizovan za Bitcoin Mining i po tome što je bio prvi igrač u sektoru koji je uvršten na Nasdaq. Sa sedištem u Singapuru, Canaan posluje u 21 zemlji i posvećen je inovacijama sa fokusom na Green Mining. Razvija sve efikasniju opremu kako bi optimizovao potrošnju energije i poboljšao profitabilnost Mining.

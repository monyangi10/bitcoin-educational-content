description: |
  Fabrikant van Mining machines, bekend om het ontwerp van de allereerste ASIC, gespecialiseerd in Bitcoin Mining en als eerste speler in de sector genoteerd aan Nasdaq. Canaan, gevestigd in Singapore, is actief in 21 landen en zet zich in voor innovatie met een focus op Green Mining. Het ontwikkelt steeds efficiëntere apparatuur om het energieverbruik te optimaliseren en de winstgevendheid van Mining te verbeteren.

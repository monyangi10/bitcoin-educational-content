description: |
  Производитель машин Mining, известный тем, что разработал самую первую машину ASIC, специализирующуюся на Bitcoin Mining, и стал первым игроком в этом секторе, зарегистрированным на бирже Nasdaq. Расположенная в Сингапуре, компания Canaan работает в 21 стране и стремится к инновациям, уделяя особое внимание Green Mining. Она разрабатывает все более эффективное оборудование для оптимизации энергопотребления и повышения рентабельности ГВ-1.

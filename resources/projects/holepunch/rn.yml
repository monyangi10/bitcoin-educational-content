description: |
  Holepunch ni urubuga rwo gukora porogaramu zidakoresha server dukoresheje ihuriro ryacu ry’ibice bitobito vya Javascript, Hypercore. 
  
  Ushobora kwubaka, guhindura, no gupima porogarama yawe ukoresheje laptop yawe. Porogarama zacu, nk’igikoresho co guhanahana amakuru Keet, ni iz’ibanga kandi zifise amakuru, zituma amakuru agira umutekano. Na Holepunch, ushobora gutegura neza porogarama no kuzikwiragiza, zikomezwa n’abakoresha bakomeza porogarama yawe mu gusubira kuyikira. Turahindura cane ugutegura ama apps ata servers, ata ba middleman, apps nziza gusa.
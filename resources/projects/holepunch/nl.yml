description: |
  Holepunch is een platform voor het maken van serverloze apps met behulp van onze verzameling kleine Javascript-modules, Hypercore.
  
  U kunt uw app rechtstreeks vanaf uw laptop bouwen, bijwerken en schalen. Onze apps, zoals de communicatietool Keet, zijn privé en versleuteld, zodat gegevens veilig zijn. Met Holepunch kunt u genieten van efficiënte app-ontwikkeling en -distributie, versterkt door een gebruikersbasis die uw app versterkt door hem opnieuw te hosten. Wij revolutioneren app-ontwikkeling zonder servers, zonder tussenpersonen, gewoon betere apps.
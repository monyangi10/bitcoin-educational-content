description: |
  Rigly'yi herkesin Mining'nin keyfini çıkarabilmesi için yarattık Bitcoin Bitcoin'in ilk günlerinde herkes bilgisayarında Bitcoin madenciliği yapabiliyordu. Zamanla Bitcoin büyüdü ve özel donanım - GPU'lar, ardından FPGA'lar ve şimdi ASIC'ler - Mining için gerekli hale geldi Bugün, ASIC Mining teçhizatları önemli yatırım ve yönetim gerektirir ve genellikle enerji santrallerinin yakınına kurulur. Rigly, bu madencilerden Hashrate satın almanıza ve Mining'ye katılmanıza olanak tanır
description: |
  Създадохме Rigly, за да може всеки да се наслаждава на биткойн mining В ранните дни на биткойн всеки можеше да добива биткойн на своя компютър. С течение на времето биткойнът се разрасна и специализираният хардуер - графични процесори, след това FPGA, а сега ASIC - стана необходим за mining Днес платформите ASIC mining изискват значителни инвестиции и управление и често се инсталират в близост до енергийни централи. Rigly ви позволява да купувате hashrate от тези миньори и да участвате в mining
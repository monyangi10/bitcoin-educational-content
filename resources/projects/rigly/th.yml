description: |
  เราได้สร้าง Rigly ขึ้นมาเพื่อให้ทุกคนสามารถเพลิดเพลินกับ mining bitcoin ในช่วงแรก ๆ ของ bitcoin ทุกคนสามารถขุด bitcoin บนคอมพิวเตอร์ของตนเองได้ เมื่อเวลาผ่านไป bitcoin เติบโตขึ้นและฮาร์ดแวร์เฉพาะทาง - GPUs, จากนั้น FPGAs, และตอนนี้ ASICs - กลายเป็นสิ่งจำเป็นสำหรับ mining ปัจจุบัน ASIC mining rigs ต้องการการลงทุนและการจัดการที่สำคัญ และมักจะติดตั้งใกล้กับโรงงานพลังงาน Rigly ช่วยให้คุณสามารถซื้อ hashrate จากนักขุดเหล่านี้และเข้าร่วมใน mining
description: |
  Twararemye Rigly kugira umuntu wese ashobore kunezerererwa Mining Bitcoin Mu misi ya mbere ya Bitcoin, umuntu wese yashobora gucukura Bitcoin kuri mudasobwa yiwe. Igihe cagenda kirarenga, Bitcoin yarakuze kandi ibikoresho vy’ubuhinga bwihariye - GPUs, hanyuma FPGAs, ubu na ho ASICs - vyaciye biba ngombwa kuri Mining Ubu, ibikoresho vya ASIC Mining bisaba ishoramari rikomeye n’uburongozi, kandi akenshi bishirwa hafi y’ibigo vy’inguvu. Rigly iraguha uburenganzira bwo kugura Hashrate kuri abo bacukuzi maze ukagira uruhara muri Mining.
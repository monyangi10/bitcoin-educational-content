description: |
  Wij hebben Rigly gemaakt zodat iedereen kan genieten van Mining Bitcoin In de begindagen van Bitcoin kon iedereen Bitcoin delven op zijn computer. Na verloop van tijd groeide Bitcoin en werd gespecialiseerde hardware - GPU's, toen FPGA's, en nu ASIC's - noodzakelijk voor Mining. Tegenwoordig vereisen ASIC Mining rigs aanzienlijke investeringen en beheer, en worden ze vaak geïnstalleerd in de buurt van energiecentrales. Met Rigly kun je Hashrate van deze miners kopen en deelnemen aan Mining
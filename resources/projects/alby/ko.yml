description: |
  Alby는 모바일 앱의 웹과 실세계 등 모든 곳에서 Bitcoin을 사용하는 간편한 Lightning Network 결제 도구로 소비자와 개발자의 역량을 강화하고 있습니다. Alby Hub를 통해 사용자는 다양한 앱에 손쉽게 연결할 수 있는 강력한 자체 관리형 라이트닝 Wallet를 확보할 수 있습니다. Alby 브라우저 확장 프로그램을 사용하면 웹 사이트와 원활하게 상호 작용하여 브라우저 내에서 바로 결제 및 신원 확인을 수행할 수 있습니다. 모바일 사용자를 위해 Alby Go는 이동 중에도 거래를 관리할 수 있는 사용자 친화적인 Wallet를 제공합니다. 또한 Alby는 Bitcoin 결제를 모든 앱에 통합하고 Bitcoin 라이트닝 월렛과 프로그래밍 방식으로 상호 작용할 수 있는 API를 제공합니다.
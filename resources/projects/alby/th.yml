description: |
  Alby กำลังเสริมพลังให้กับผู้บริโภคและนักพัฒนาด้วยเครื่องมือการชำระเงินด้วยบิตคอยน์ที่ใช้งานง่ายผ่านเครือข่าย lightning ทุกที่: บนเว็บ ในแอปมือถือ และในโลกแห่งความเป็นจริง ด้วย Alby Hub ผู้ใช้จะได้รับ wallet ที่ทรงพลังและควบคุมได้ด้วยตนเองซึ่งเชื่อมต่อกับแอปต่างๆ ได้อย่างง่ายดาย ส่วนขยายเบราว์เซอร์ Alby ช่วยให้การโต้ตอบกับเว็บไซต์เป็นไปอย่างราบรื่น อำนวยความสะดวกในการชำระเงินและการยืนยันตัวตนได้โดยตรงภายในเบราว์เซอร์ของคุณ สำหรับผู้ใช้มือถือ Alby Go มอบ wallet ที่ใช้งานง่ายเพื่อจัดการธุรกรรมได้ทุกที่ นอกจากนี้ Alby ยังมี API เพื่อรวมการชำระเงินด้วยบิตคอยน์เข้ากับแอปใดๆ และโต้ตอบกับกระเป๋าเงินบิตคอยน์ lightning ได้อย่างเป็นโปรแกรม
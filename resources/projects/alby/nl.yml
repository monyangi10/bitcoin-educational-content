description: |
  Alby biedt consumenten en ontwikkelaars gebruiksvriendelijke Bitcoin betalingstools met de Lightning Network overal: op het web in mobiele apps en in de echte wereld. Met Alby Hub krijgen gebruikers een krachtige, zelfbehoudende bliksem Wallet die moeiteloos verbinding maakt met verschillende apps. De Alby Browser Extension zorgt voor een soepele interactie met websites, waardoor betalingen en identiteitsverificatie direct in uw browser mogelijk zijn. Voor mobiele gebruikers biedt Alby Go een gebruiksvriendelijke Wallet om transacties onderweg te beheren. Daarnaast biedt Alby API's om Bitcoin betalingen te integreren in elke app en programmatisch te communiceren met Bitcoin lightning wallets.
description: |
  Alby iriko iraha ubushobozi abaguzi n’abahinguzi n’ibikoresho vyoroshe gukoresha vyo kwishura Bitcoin hakoreshejwe Lightning Network hose: ku rubuga mu maporogarama y’amatelefone ngendanwa n’isi nyakuri. Na Alby Hub, abakoresha baronka umuravyo ukomeye, wikingira Wallet ushobora gufatanya ata ngorane n’amaporogarama atandukanye. Igikoresho ca Alby Browser Extension kiremesha gukorana neza n’imbuga, kigatuma umuntu ashobora kwishura no kugenzura akaranga kawe ataco akora mu mucukumbuzi wawe. Ku bakoresha telefone ngendanwa, Alby Go itanga Wallet ikoreshwa neza kugira ngo ushobore gucunga amafaranga uri mu rugendo. Ikindi, Alby itanga APIs zo gushiramwo amahera ya Bitcoin muri porogarama iyo ari yo yose no gukorana n’amasakoshi y’umuravyo ya Bitcoin.
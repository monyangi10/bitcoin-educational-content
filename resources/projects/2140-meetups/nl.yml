description: |
  Welkom bij 2140meetups, het ontmoetingspunt waar je communities kunt maken en meetups kunt plannen om fysieke ontmoetingen tussen bitcoiners te stimuleren. Als je op zoek bent naar een community bij jou in de buurt, gebruik dan de kaart hierboven of kijk hier. Als je erover denkt om er een te beginnen, lees dan eerst de gids.
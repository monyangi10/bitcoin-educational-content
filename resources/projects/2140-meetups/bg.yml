description: |
  Добре дошли в 2140meetups - мястото за срещи, където можете да създавате общности и да планирате срещи, за да стимулирате физическите срещи между биткойнъри. Ако търсите общност близо до вас, използвайте картата по-горе или проверете тук. Ако смятате да създадете такава, първо прочетете ръководството.
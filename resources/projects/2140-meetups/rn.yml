description: |
  Ikaze kuri 2140meetups, ahantu ho guhurira aho ushobora gushinga imiryango no gutegura amakoraniro kugira ngo wongere utere imbere mu guhura kw’umubiri hagati y’aba bitcoiners. Niba uriko urarondera umuryango uri hafi yawe, koresha ikarata iri hejuru canke uyisuzume hano. Nimba uriko uriyumvira gutangura imwe, banza usome iyo ndongozi.
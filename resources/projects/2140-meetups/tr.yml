description: |
  Bitcoin kullanıcıları arasındaki fiziksel karşılaşmaları artırmak için topluluklar oluşturabileceğiniz ve buluşmalar planlayabileceğiniz buluşma noktası olan 2140meetups'a hoş geldiniz. Yakınınızda bir topluluk arıyorsanız, yukarıdaki haritayı kullanın veya buraya göz atın. Bir tane başlatmayı düşünüyorsanız, önce kılavuzu okuyun.
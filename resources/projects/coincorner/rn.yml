description: |
  Muratumiwe! We’re CoinCorner, umugwi w’abantu b’abagenzi kandi b’abanyamwete, dukorana kugira ngo Bitcoin ikurohereze uko bishoboka kwose. Cokimwe n’ibintu vyinshi vyo mu buzima, twatanguye mu gutahura umuti w’ingorane. Mu mwaka w’2014, vyari Hard kugura Bitcoin mu Bwongereza kandi mbere vyari bigoye kuyigura aho wizigiye. Injira mu Mfuruka y'Igiceri. Kuva ku musi wa mbere, intumbero yacu yari iyo gutuma kugura Bitcoin vyihuta kandi vyoroshe ku bantu bo mu Bwongereza no kw’isi yose. Twita Izinga rya Man inzu yacu, twateye intambwe nini mu kwubaka ukwizigira inganda za Bitcoin. Kuva ku gukorana cane na Leta y’Izinga rya Man ku bijanye n’itegeko rya Bitcoin gushika ku kwigisha abantu bo mu mice yose y’ubuzima biciye mu binyamakuru, ibiganiro vya bose, n’ibindi. Amaze gukwegera abantu kw’isi yose mu mwaka w’2017, Bitcoin yacitse izina ry’urugo rifise ugushimishwa cane n’amahera y’ubuhinga bwa none kuruta uko vyari bimeze kera. Ntuhagarike umutima rero, turaza ku kazi buri musi twiteguriye guca mu nzitizi zikikuje Bitcoin, tukayigira umuntu wese n’umuntu wese yipfuza kuyigiramwo uruhara.
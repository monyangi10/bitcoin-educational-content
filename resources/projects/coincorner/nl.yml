description: |
  Welkom! Wij zijn CoinCorner, een team van vriendelijke en enthousiaste mensen, die samenwerken om Bitcoin voor u zo gemakkelijk mogelijk te maken.
  Zoals de meeste dingen in het leven, zijn wij begonnen met het realiseren van de oplossing voor een probleem. In 2014 was het Hard om Bitcoin te kopen in de UK en nog moeilijker om het ergens te kopen waar je het vertrouwde.
  Enter CoinCorner. Vanaf de eerste dag is het ons doel geweest om het kopen van Bitcoin snel en gemakkelijk te maken voor mensen in de UK en de rest van de wereld.
  Met het eiland Man als thuisbasis, hebben we enorme stappen gezet om vertrouwen op te bouwen in de Bitcoin industrie. Van uitgebreide samenwerking met de regering van het eiland Man op het gebied van Bitcoin-regelgeving tot het voorlichten van mensen uit alle lagen van de bevolking via de media, openbare lezingen en nog veel meer.
  Na het aantrekken van wereldwijde aandacht in 2017, is Bitcoin een begrip geworden met meer interesse in de digitale valuta dan ooit tevoren. Maak je echter geen zorgen, wij komen elke dag naar ons werk om de verwarring rond Bitcoin te doorbreken en het toegankelijk te maken voor iedereen die erbij betrokken wil zijn.
description: |
  Добре дошли! Ние сме CoinCorner - екип от приятелски настроени и ентусиазирани хора, които работят заедно, за да направят Bitcoin възможно най-лесен за вас.
  Както повечето неща в живота, ние започнахме с намирането на решение на един проблем. През 2014 г. беше трудно да си купиш Bitcoin в Обединеното кралство, а още по-трудно - от място, на което имаш доверие.
  Навлезте в CoinCorner. От първия ден нашата цел беше да направим купуването на Bitcoin бързо и лесно за хората в Обединеното кралство и по света.
  Наричайки остров Ман свой дом, ние направихме огромни стъпки за изграждане на доверие в индустрията на Bitcoin. От интензивна работа с правителството на остров Ман по отношение на регулирането на Bitcoin до образоване на хора от всички сфери на живота чрез медиите, публични разговори и др.
  След като през 2017 г. Bitcoin привлече световното внимание, тя се превърна в нарицателно име, а интересът към цифровата валута е по-голям от всякога. Не се притеснявайте обаче, ние идваме на работа всеки ден, готови да пресечем объркването около Bitcoin, правейки я достъпна за всеки, който иска да се включи.
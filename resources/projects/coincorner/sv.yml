description: |
  Välkommen till CoinCorner! Vi är CoinCorner, ett team av vänliga och entusiastiska människor som arbetar tillsammans för att göra Bitcoin så enkelt för dig som möjligt. Som de flesta saker i livet började vi med att förverkliga lösningen på ett problem. Tillbaka i 2014 var det Hard att köpa Bitcoin i Storbritannien och ännu svårare att köpa det från någonstans du litade på. Kom in i CoinCorner. Från dag ett har vårt mål varit att göra det snabbt och enkelt att köpa Bitcoin för människor i Storbritannien och runt om i världen. Vi kallar Isle of Man vårt hem och har gjort stora framsteg för att bygga förtroende för Bitcoin-industrin. Från att arbeta i stor utsträckning med Isle of Man-regeringen om Bitcoin-reglering till att utbilda människor från alla samhällsskikt genom media, offentliga samtal och mer. Efter att ha väckt global uppmärksamhet 2017 har Bitcoin blivit ett hushållsnamn med mer intresse för den digitala valutan än någonsin tidigare. Oroa dig dock inte, vi kommer till jobbet varje dag redo att skära igenom förvirringen kring Bitcoin och göra den tillgänglig för alla som vill vara involverade.
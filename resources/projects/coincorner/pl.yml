description: |
  Witamy! Jesteśmy CoinCorner, zespołem przyjaznych i entuzjastycznych ludzi, którzy wspólnie pracują nad tym, aby Bitcoin było dla Ciebie jak najłatwiejsze. Jak większość rzeczy w życiu, zaczęliśmy od znalezienia rozwiązania pewnego problemu. W 2014 r. zakup Bitcoin w Wielkiej Brytanii był Hard, a jeszcze trudniej było kupić go w zaufanym miejscu. Oto CoinCorner. Od samego początku naszym celem było sprawienie, by zakup Bitcoin był szybki i łatwy dla ludzi w Wielkiej Brytanii i na całym świecie. Nazywając Wyspę Man naszym domem, poczyniliśmy ogromne postępy w budowaniu zaufania w branży Bitcoin. Od intensywnej współpracy z rządem wyspy Man w zakresie regulacji Bitcoin po edukację ludzi z różnych środowisk za pośrednictwem mediów, wystąpień publicznych i nie tylko. Po przyciągnięciu globalnej uwagi w 2017 r., Bitcoin stał się powszechnie znaną nazwą z większym zainteresowaniem cyfrową walutą niż kiedykolwiek wcześniej. Nie martw się jednak, codziennie przychodzimy do pracy gotowi przeciąć zamieszanie wokół Bitcoin, czyniąc go dostępnym dla każdego, kto chce się zaangażować.
description: |
  환영합니다! 저희는 친절하고 열정적인 사람들로 구성된 코인코너 팀으로, 여러분을 위해 최대한 쉽게 Bitcoin을 만들기 위해 함께 노력하고 있습니다.
  인생의 대부분의 일이 그렇듯이 저희도 문제에 대한 해결책을 깨닫는 것에서 시작했습니다. 2014년 당시 영국에서 Bitcoin을 구매하려면 Hard이 필요했고 신뢰할 수 있는 곳에서 구매하기는 더더욱 어려웠습니다.
  코인코너를 소개합니다. 처음부터 저희의 목표는 영국과 전 세계 사람들이 빠르고 쉽게 Bitcoin을 구매할 수 있도록 하는 것이었습니다.
  맨섬을 고향이라 부르며 Bitcoin 업계에서 신뢰를 쌓기 위해 큰 발전을 이루었습니다. Bitcoin 규제와 관련해 맨섬 정부와 광범위하게 협력하는 것부터 미디어, 공개 강연 등을 통해 각계각층의 사람들을 교육하는 것까지.
  2017년 전 세계의 주목을 받았던 Bitcoin는 그 어느 때보다 디지털 화폐에 대한 관심이 높아지면서 유명세를 타고 있습니다. 하지만 걱정하지 마세요. 저희는 매일 Bitcoin에 대한 혼란을 해소하고 참여를 원하는 모든 사람이 쉽게 접근할 수 있도록 준비된 상태로 출근합니다.
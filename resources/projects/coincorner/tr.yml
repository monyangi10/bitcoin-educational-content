description: |
  Hoş geldiniz! Biz CoinCorner'ız, Bitcoin'ı sizin için mümkün olduğunca kolay hale getirmek için birlikte çalışan, arkadaş canlısı ve hevesli insanlardan oluşan bir ekibiz.
  Hayattaki çoğu şey gibi, biz de bir sorunun çözümünü fark ederek başladık. 2014 yılında, Birleşik Krallık'ta Hard satın almak Bitcoin idi ve güvendiğiniz bir yerden satın almak daha da zordu.
  CoinCorner'a girin. İlk günden itibaren amacımız, İngiltere'deki ve dünyanın dört bir yanındaki insanlar için Bitcoin satın almayı hızlı ve kolay hale getirmek oldu.
  Man Adası'nı evimiz olarak adlandırarak, Bitcoin endüstrisinde güven oluşturmak için büyük adımlar attık. Bitcoin yönetmeliği konusunda Man Adası Hükümeti ile yoğun bir şekilde çalışmaktan, medya, halka açık konuşmalar ve daha fazlası aracılığıyla hayatın her kesiminden insanları eğitmeye kadar.
  Bitcoin, 2017'de küresel çapta dikkat çektikten sonra, dijital para birimine her zamankinden daha fazla ilgi duyan bir isim haline geldi. Yine de endişelenmeyin, her gün işe Bitcoin etrafındaki karışıklığı gidermeye hazır olarak geliyoruz ve dahil olmak isteyen herkes ve herkes için erişilebilir hale getiriyoruz.
description: |
  Dobrodošli! Mi smo CoinCorner, tim prijateljskih i entuzijastičnih ljudi, koji rade zajedno kako bi vam Bitcoin učinili što jednostavnijim. Kao i većina stvari u životu, počeli smo shvatajući rešenje problema. Još 2014. godine, bilo je Hard kupiti Bitcoin u Velikoj Britaniji, a još teže kupiti ga od nekoga kome verujete. Tu dolazi CoinCorner. Od prvog dana, naš cilj je bio da kupovina Bitcoin bude brza i laka za ljude u Velikoj Britaniji i širom sveta. Pozivajući Ostrvo Man našim domom, napravili smo ogromne korake u izgradnji poverenja u industriji Bitcoin. Od intenzivne saradnje sa Vladom Ostrva Man na regulaciji Bitcoin do edukacije ljudi iz svih sfera života putem medija, javnih govora i još mnogo toga. Nakon privlačenja globalne pažnje 2017. godine, Bitcoin je postao poznato ime sa više interesovanja za digitalnu valutu nego ikada pre. Ne brinite, dolazimo na posao svaki dan spremni da razjasnimo konfuziju oko Bitcoin, čineći ga dostupnim za svakoga ko želi da bude uključen.
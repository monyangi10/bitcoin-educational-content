description: |
  歡迎您我們是 CoinCorner，一個友好熱情的團隊，共同努力讓 Bitcoin 盡可能地為您提供方便。 就像生活中的大多數事情一樣，我們開始是為了解決問題。早在 2014 年，在英國購買 Bitcoin 是 Hard，而要從可信賴的地方購買則更加困難。 進入 CoinCorner。從第一天開始，我們的目標就是讓英國和世界各地的人們都能快速輕鬆地購買 Bitcoin。 以馬恩島為家，我們在建立 Bitcoin 行業信任方面取得了巨大進步。從與馬恩島政府就 Bitcoin 法規進行廣泛合作，到透過媒體、公開講座等方式教育各界人士。 在 2017 年引起全球關注後，Bitcoin 已經成為一個家喻戶曉的名字，人們對數位貨幣的興趣比以往任何時候都大。不過不用擔心，我們每天上班都準備好撥開圍繞 Bitcoin 的混亂，讓每一個想要參與其中的人都能了解 Bitcoin。
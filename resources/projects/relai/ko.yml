description: |
  Bitcoin이 돈을 절약할 수 있는 최고의 방법이라는 믿음에 따라, 당사는 간단하고 사용자 친화적이며 안전한 Bitcoin에 대한 액세스를 제공함으로써 새로운 세대의 장기 투자자를 양성하고 있습니다.
  
  줄리안 리니거와 아뎀 빌리칸이 안전하고 번거로움 없는 Bitcoin 구매 공간을 찾기 위해 고심하던 중 스위스에서 설립한 Relai는 누구나 Bitcoin 저축과 투자에 접근할 수 있도록 하고 있습니다. Bitcoin 전용 앱은 간단하고 직관적으로 설계되어 등록, 인증, 보증금 없이도 유럽의 누구나 몇 분 안에 Bitcoin을 사고 팔 수 있습니다. 독립적인 감사를 받았으며, 플랫폼을 통해 5천만 스위스프랑(CHF) 이상의 Bitcoin이 투자된 Relai는 소비자에게 새로운 저축 및 투자 수단을 제공할 수 있는 기회를 제공하고 있습니다.
  
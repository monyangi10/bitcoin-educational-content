description: |
  Gedreven door de overtuiging dat Bitcoin de beste manier is om geld te besparen, wekken we een nieuwe generatie langetermijninvesteerders op door hen eenvoudige, gebruiksvriendelijke en veilige toegang tot Bitcoin te geven.
  
  Opgericht in Zwitserland door Julian Liniger en Adem Bilican nadat ze worstelden met het vinden van een veilige, probleemloze ruimte voor het kopen van Bitcoin, maakt Relai Bitcoin sparen en investeren toegankelijk voor iedereen. De Bitcoin app is eenvoudig en intuïtief ontworpen, zodat iedereen in Europa binnen enkele minuten Bitcoin kan kopen en verkopen, zonder dat registratie, verificatie of stortingen nodig zijn. Onafhankelijk gecontroleerd en met meer dan 50 miljoen CHF aan Bitcoin geïnvesteerd via het platform, geeft Relai consumenten de kans om nieuwe manieren van sparen en investeren te ontsluiten.
  
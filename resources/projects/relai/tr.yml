description: |
  Bitcoin'ın para biriktirmenin en iyi yolu olduğu inancından hareketle, Bitcoin'a basit, kullanıcı dostu ve güvenli erişim sağlayarak yeni nesil uzun vadeli yatırımcılar yetiştiriyoruz.
  
  Bitcoin satın almak için güvenli ve sorunsuz bir alan bulmakta zorlanan Julian Liniger ve Adem Bilican tarafından İsviçre'de kurulan Relai, Bitcoin tasarruf ve yatırımını herkes için erişilebilir hale getiriyor. Yalnızca Bitcoin uygulaması basit ve sezgisel olacak şekilde tasarlanmıştır ve Avrupa'daki herkesin kayıt, doğrulama veya depozitoya gerek kalmadan dakikalar içinde Bitcoin alıp satmasını sağlar. Bağımsız olarak denetlenen ve platformu aracılığıyla 50 milyon CHF'den fazla Bitcoin yatırımı yapan Relai, tüketicilere yeni tasarruf ve yatırım yollarının kilidini açma şansı veriyor.
  
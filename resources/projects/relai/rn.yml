description: |
  Twisunze ukwemera ko Bitcoin ari yo nzira nziza yo kuzigama amahera, turiko turarera uruvyaro rushasha rw’abashoramari b’igihe kirekire, mu kubaha uburyo bworoshe, bworoshe bwo gukoresha, kandi butekanye bwo gukoresha Bitcoin. 
  
  Relai yashinzwe mu Busuwisi na Julian Liniger na Adem Bilican inyuma y’aho barwana no kuronka ahantu heza, hatagira ingorane ho kugura Bitcoin, Relai iriko iratuma ubuzigama n’ishoramari rya Bitcoin bishikira umuntu wese. Iyi porogarama ikoresha Bitcoin gusa yakozwe kugira ngo ibe yoroshe kandi ishobora gukoreshwa neza, igatuma umuntu wese wo mu Buraya ashobora kugura no kugurisha Bitcoin mu minota mikeyi, ataco akeneye kwiyandikisha, kugenzura canke gushiramwo amahera. Relai igenzurwa n’abantu bigenga, kandi ifise amafaranga arenga miliyoni 50 z’ama CHF ya Bitcoin yashizwemwo biciye ku rubuga rwayo, iriko iraha abaguzi amahirwe yo gufungura uburyo bushasha bwo kuzigama no gushiramwo amafaranga.
  
description: |
  ขับเคลื่อนด้วยความเชื่อว่า Bitcoin เป็นวิธีที่ดีที่สุดในการประหยัดเงิน เรากำลังสร้างนักลงทุนรุ่นใหม่ที่มีวิสัยทัศน์ระยะยาว โดยให้พวกเขาเข้าถึง Bitcoin ได้อย่างง่ายดาย ปลอดภัย และเป็นมิตรกับผู้ใช้
  
  ก่อตั้งขึ้นในสวิตเซอร์แลนด์โดย Julian Liniger และ Adem Bilican หลังจากที่พวกเขาพบว่าการหาสถานที่ที่ปลอดภัยและไม่ยุ่งยากในการซื้อบิตคอยน์เป็นเรื่องยาก Relai กำลังทำให้การออมและการลงทุนในบิตคอยน์เป็นเรื่องที่ทุกคนสามารถเข้าถึงได้ แอปที่เน้นบิตคอยน์เพียงอย่างเดียวนี้ถูกออกแบบมาให้เรียบง่ายและใช้งานง่าย ทำให้ใครก็ตามในยุโรปสามารถซื้อและขายบิตคอยน์ได้ภายในไม่กี่นาที โดยไม่จำเป็นต้องลงทะเบียน ยืนยันตัวตน หรือฝากเงิน ผ่านการตรวจสอบอย่างอิสระ และมีการลงทุนบิตคอยน์ผ่านแพลตฟอร์มของเรามากกว่า 50 ล้าน CHF Relai กำลังให้โอกาสผู้บริโภคในการเปิดประตูสู่การออมและการลงทุนในรูปแบบใหม่ๆ
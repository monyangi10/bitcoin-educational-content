description: |
  Водени от убеждението, че Bitcoin е най-добрият начин за спестяване на пари, ние създаваме ново поколение дългосрочни инвеститори, като им предоставяме лесен, удобен и сигурен достъп до Bitcoin.
  
  Основана в Швейцария от Джулиан Линигър и Адем Биликан, след като се затрудняват да намерят безопасно и безпроблемно място за закупуване на биткойни, Relai прави спестяването и инвестирането в биткойни достъпни за всички. Приложението, предназначено само за биткойни, е проектирано така, че да бъде просто и интуитивно, като позволява на всеки в Европа да купува и продава биткойни в рамките на няколко минути, без да е необходима регистрация, проверка или депозити. Независимо одитирана и с над 50 млн. швейцарски франка в биткойни, инвестирани чрез нейната платформа, Relai дава на потребителите възможност да отключат нови начини за спестяване и инвестиране.
  
description: |
  BIP-21 is a French Bitcoin association based in the Île-de-France region, coordinating and supporting a network of local Bitcoin meetups across Paris and surrounding areas. The association brings together 16 administrators representing various Bitcoin meetups, educational organizations, and independent Bitcoiners to create spaces for learning, networking, and Bitcoin adoption. BIP-21 focuses on building community connections, sharing practical Bitcoin knowledge, and supporting newcomers in their Bitcoin journey through regular local meetup events.

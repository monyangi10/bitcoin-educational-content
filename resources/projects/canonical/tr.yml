description: |
  Mark Shuttleworth tarafından kurulan ve öncelikle dünyanın en popüler Linux dağıtımlarından biri olan Ubuntu'yu geliştirmesiyle tanınan bir şirket. Merkezi Birleşik Krallık'ta bulunan Canonical, işletmeler ve geliştiriciler için açık kaynak çözümleri, teknik destek hizmetleri, bulut yönetimi ve BT altyapısı konularında uzmanlaşmıştır.
  
description: |
  บริษัทที่ก่อตั้งโดย Mark Shuttleworth ซึ่งเป็นที่รู้จักกันดีในการพัฒนา Ubuntu หนึ่งในลีนุกซ์ดิสทริบิวชันที่ได้รับความนิยมมากที่สุดในโลก ตั้งอยู่ในสหราชอาณาจักร Canonical เชี่ยวชาญในโซลูชันโอเพนซอร์ส บริการสนับสนุนทางเทคนิค การจัดการคลาวด์ และโครงสร้างพื้นฐานด้านไอทีสำหรับธุรกิจและนักพัฒนา
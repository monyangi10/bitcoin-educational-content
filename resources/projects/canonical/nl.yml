description: |
  Een bedrijf opgericht door Mark Shuttleworth, vooral bekend om de ontwikkeling van Ubuntu, een van 's werelds populairste Linux-distributies. Canonical is gevestigd in het Verenigd Koninkrijk en is gespecialiseerd in open-source oplossingen, technische ondersteuningsdiensten, cloudbeheer en IT-infrastructuur voor bedrijven en ontwikkelaars.
  
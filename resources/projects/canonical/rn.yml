description: |
  Ishirahamwe ryashinzwe na Mark Shuttleworth, rizwi cane cane mu gutegura Ubuntu, imwe mu nzira zizwi cane kw'isi zo gukoresha Linux. Canonical ifise icicaro mu Bwongereza, ni umuhinga mu bijanye n’ugutorera umuti ibibazo bikoreshwa mu buryo bufunguye, ubuhinga bwo gufasha, gucunga ibicu, n’ibikorwa remezo vy’ubuhinga bwa none ku bucuruzi n’abahinguzi.
  
description: |
  Компания, основана от Марк Шатълуърт, известен най-вече с разработването на Ubuntu, една от най-популярните дистрибуции на Linux в света. Базирана в Обединеното кралство, Canonical е специализирана в решения с отворен код, услуги за техническа поддръжка, управление на облаци и ИТ инфраструктура за фирми и разработчици.
  
description: |
  Satsconf es una conferencia anual celebrada en São Paulo que reúne a las mayores referencias nacionales e internacionales en Bitcoin. Con conferencias, talleres, mesas redondas y oportunidades para establecer contactos, nuestro objetivo es compartir conocimientos sobre la libertad, la soberanía individual y la Internet del dinero. Nuestro público abarca desde principiantes que quieren aprender más sobre Bitcoin hasta veteranos en la materia. Cada año, intentamos traer a ponentes expertos y líderes de opinión de la comunidad Bitcoin, así como establecer asociaciones con organizaciones influyentes del sector. Si cree en el poder transformador de la Bitcoin, Satsconf es para usted.

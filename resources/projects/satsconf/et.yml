description: |
  Satsconf on São Paulos toimuv iga-aastane konverents, mis toob kokku Bitcoin suurimad riiklikud ja rahvusvahelised referendid. Loengute, töötubade, paneeldiskussioonide ja võrgustike loomise võimalustega on meie eesmärk jagada teadmisi vabaduse, individuaalse suveräänsuse ja raha interneti kohta. Meie publik ulatub algajatest, kes soovivad Bitcoin kohta rohkem teada saada, kuni selle teema veteranideni. Igal aastal püüame kaasata Bitcoin kogukonna eksperdiesinejaid ja arvamusliidreid ning luua partnerlussuhteid valdkonna mõjukate organisatsioonidega. Kui te usute Bitcoin transformatiivsesse jõusse, siis on Satsconf just teile.

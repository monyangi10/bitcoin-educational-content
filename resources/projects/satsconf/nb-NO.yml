description: |
  Satsconf er en årlig konferanse i São Paulo som samler de største nasjonale og internasjonale referansene innen Bitcoin. Med foredrag, workshops, paneldiskusjoner og nettverksbygging har vi som mål å dele kunnskap om frihet, individuell suverenitet og pengenes internett. Vårt publikum spenner fra nybegynnere som ønsker å lære mer om Bitcoin, til veteraner innen emnet. Hvert år søker vi å hente inn ekspertforedragsholdere og opinionsledere fra Bitcoin-fellesskapet, i tillegg til å etablere partnerskap med innflytelsesrike organisasjoner i bransjen. Hvis du tror på Bitcoins transformative kraft, er Satsconf noe for deg.

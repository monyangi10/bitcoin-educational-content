description: |
  Satsconf est une conférence annuelle qui se tient à São Paulo et qui rassemble les plus grandes références nationales et internationales en matière de Bitcoin. Avec des conférences, des ateliers, des tables rondes et des opportunités de réseautage, notre objectif est de partager des connaissances sur la liberté, la souveraineté individuelle et l'Internet de l'argent. Notre public va des débutants qui veulent en savoir plus sur le Bitcoin aux vétérans du sujet. Chaque année, nous cherchons à faire venir des conférenciers experts et des leaders d'opinion de la communauté Bitcoin, ainsi qu'à établir des partenariats avec des organisations influentes dans l'industrie. Si vous croyez au pouvoir de transformation du Bitcoin, Satsconf est fait pour vous.

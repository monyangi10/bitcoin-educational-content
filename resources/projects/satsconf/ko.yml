description: |
  Satsconf는 상파울루에서 개최되는 연례 컨퍼런스로, Bitcoin의 국내외 주요 인사들이 한자리에 모이는 행사입니다. 강의, 워크숍, 패널 토론, 네트워킹 기회를 통해 자유, 개인 주권, 화폐 인터넷에 대한 지식을 공유하는 것이 목표입니다. 청중은 Bitcoin에 대해 더 자세히 알고 싶어 하는 초보자부터 이 주제의 베테랑까지 다양합니다. 매년 Bitcoin 커뮤니티의 전문 연사와 오피니언 리더를 초청하고 업계에서 영향력 있는 단체와 파트너십을 구축하기 위해 노력하고 있습니다. Bitcoin의 혁신적 힘을 믿으신다면 Satsconf는 여러분을 위한 행사입니다.
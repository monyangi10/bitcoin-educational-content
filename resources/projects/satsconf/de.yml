description: |
  Satsconf ist eine jährlich in São Paulo stattfindende Konferenz, die die größten nationalen und internationalen Referenzen im Bereich Bitcoin zusammenbringt. Mit Vorträgen, Workshops, Podiumsdiskussionen und Networking-Möglichkeiten ist es unser Ziel, Wissen über Freiheit, individuelle Souveränität und das Internet des Geldes zu vermitteln. Unser Publikum reicht von Anfängern, die mehr über Bitcoin erfahren wollen, bis hin zu Veteranen des Themas. Jedes Jahr bemühen wir uns, fachkundige Redner und Meinungsführer aus der Bitcoin-Gemeinschaft einzuladen und Partnerschaften mit einflussreichen Organisationen in der Branche zu schließen. Wenn Sie an die transformative Kraft von Bitcoin glauben, ist die Satsconf genau das Richtige für Sie.

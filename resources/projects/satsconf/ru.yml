description: |
  Satsconf - это ежегодная конференция, которая проводится в Сан-Паулу и собирает крупнейших национальных и международных специалистов в области Bitcoin. Лекции, семинары, панельные дискуссии и возможности для общения - наша цель состоит в том, чтобы поделиться знаниями о свободе, индивидуальном суверенитете и интернете денег. Наша аудитория варьируется от новичков, которые хотят узнать больше о Bitcoin, до ветеранов этой темы. Каждый год мы стараемся привлекать экспертов и лидеров мнений из сообщества Bitcoin, а также налаживаем партнерские отношения с влиятельными организациями в отрасли. Если вы верите в преобразующую силу Bitcoin, Satsconf - для вас.

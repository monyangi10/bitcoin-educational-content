description: |
  Satsconf är en årlig konferens som hålls i São Paulo och som samlar de största nationella och internationella referenserna inom Bitcoin. Med föreläsningar, workshops, paneldiskussioner och nätverksmöjligheter är vårt mål att dela med oss av kunskap om frihet, individuell suveränitet och pengarnas internet. Vår publik sträcker sig från nybörjare som vill lära sig mer om Bitcoin till veteraner inom ämnet. Varje år försöker vi ta in expertföreläsare och opinionsledare från Bitcoin-communityn, samt etablera partnerskap med inflytelserika organisationer i branschen. Om du tror på Bitcoin:s transformerande kraft är Satsconf något för dig.

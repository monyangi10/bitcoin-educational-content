description: |
  Satsconf è una conferenza annuale che si tiene a San Paolo e che riunisce i maggiori referenti nazionali e internazionali di Bitcoin. Con conferenze, workshop, tavole rotonde e opportunità di networking, il nostro obiettivo è quello di condividere le conoscenze sulla libertà, la sovranità individuale e l'internet del denaro. Il nostro pubblico spazia dai principianti che vogliono saperne di più sul Bitcoin ai veterani della materia. Ogni anno cerchiamo di coinvolgere relatori esperti e opinion leader della comunità Bitcoin, oltre a stabilire partnership con organizzazioni influenti del settore. Se credete nel potere di trasformazione di Bitcoin, il Satsconf è per voi.

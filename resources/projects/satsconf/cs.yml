description: |
  Satsconf je každoroční konference konaná v São Paulu, na které se setkávají největší národní a mezinárodní odborníci v oblasti Bitcoin. Naším cílem je prostřednictvím přednášek, workshopů, panelových diskusí a možností navazování kontaktů sdílet znalosti o svobodě, individuální suverenitě a internetu peněz. Naše publikum sahá od začátečníků, kteří se chtějí dozvědět více o Bitcoin, až po veterány tohoto tématu. Každý rok se snažíme přivést odborné řečníky a názorové vůdce z komunity Bitcoin a také navazovat partnerství s vlivnými organizacemi v oboru. Pokud věříte v transformační sílu Bitcoin, je konference Satsconf určena právě vám.

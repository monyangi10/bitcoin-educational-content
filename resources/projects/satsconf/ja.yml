description: |
  Satsconfはサンパウロで毎年開催されるカンファレンスで、Bitcoinにおける国内外の主要な専門家が一堂に会します。講演、ワークショップ、パネルディスカッション、ネットワーキングの機会を通じて、自由、個人主権、お金のインターネットに関する知識を共有することを目的としています。Bitcoinについてもっと知りたいという初心者の方から、このテーマのベテランの方まで、幅広い方々にご参加いただいています。毎年、Bitcoinコミュニティから専門家やオピニオンリーダーを招き、業界で影響力のある組織とのパートナーシップを確立することを目指しています。Bitcoinの変革力を信じるなら、Satsconfはあなたのためにあります。

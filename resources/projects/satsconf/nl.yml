description: |
  Satsconf is een jaarlijkse conferentie in São Paulo die de grootste nationale en internationale referenties in Bitcoin samenbrengt. Met lezingen, workshops, paneldiscussies en netwerkmogelijkheden willen we kennis delen over vrijheid, individuele soevereiniteit en het internet van geld. Ons publiek varieert van beginners die meer willen leren over Bitcoin tot veteranen van het onderwerp. Elk jaar proberen we deskundige sprekers en opinieleiders uit de Bitcoin gemeenschap aan te trekken, en gaan we partnerschappen aan met invloedrijke organisaties in de sector. Als je gelooft in de transformerende kracht van Bitcoin, dan is Satsconf iets voor jou.

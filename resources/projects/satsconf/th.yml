description: |
  Satsconf เป็นการประชุมประจำปีที่จัดขึ้นในเซาเปาโล ซึ่งรวบรวมบุคคลสำคัญทั้งในระดับประเทศและนานาชาติในด้าน Bitcoin ด้วยการบรรยาย การจัดเวิร์กช็อป การอภิปรายในแผง และโอกาสในการสร้างเครือข่าย เป้าหมายของเราคือการแบ่งปันความรู้เกี่ยวกับเสรีภาพ อธิปไตยส่วนบุคคล และอินเทอร์เน็ตของเงิน ผู้เข้าร่วมของเรามีตั้งแต่ผู้เริ่มต้นที่ต้องการเรียนรู้เพิ่มเติมเกี่ยวกับ Bitcoin ไปจนถึงผู้เชี่ยวชาญในหัวข้อนี้ ทุกปีเรามุ่งมั่นที่จะเชิญวิทยากรผู้เชี่ยวชาญและผู้นำความคิดเห็นจากชุมชน Bitcoin รวมถึงการสร้างความร่วมมือกับองค์กรที่มีอิทธิพลในอุตสาหกรรม หากคุณเชื่อในพลังการเปลี่ยนแปลงของ Bitcoin Satsconf คือที่สำหรับคุณ
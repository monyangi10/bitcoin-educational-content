description: |
  Satsconf is an annual conference held in São Paulo that brings together the biggest national and international references in Bitcoin. With lectures, workshops, panel discussions and networking opportunities, our aim is to share knowledge about freedom, individual sovereignty and the internet of money. Our audience ranges from beginners who want to learn more about Bitcoin to veterans of the subject. Each year, we seek to bring in expert speakers and opinion leaders from the Bitcoin community, as well as establishing partnerships with influential organizations in the industry. If you believe in the transformative power of Bitcoin, Satsconf is for you.

description: |
  Satsconf ni inama iba buri mwaka i São Paulo ihuriza hamwe ibitabu bikomeye vyo mu gihugu no hanze y’igihugu mu vy’ubuhinga bwa Bitcoin. Mu nyigisho, amahugurwa n’ibiganiro n’amahirwe yo gukorana n’abandi, intumbero yacu ni ugusangira ubumenyi bwerekeye umwidegemvyo, ubusegaba bw’umuntu ku giti ciwe na internet y’amahera. Abatwumviriza bava ku batangura bashaka kwiga vyinshi ku vyerekeye Bitcoin gushika ku bakuru b’ico cigwa. Buri mwaka, turarondera kuzana abahinga mu gutanga insiguro n’abarongozi b’ivyiyumviro bo mu muryango wa Bitcoin, hamwe no gushinga ubufatanye n’imiryango ifise ububasha muri iyo nganda. Niba wemera ububasha bwo guhindura bwa Bitcoin, Satsconf ni iyawe.
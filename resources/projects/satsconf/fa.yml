description: |
  ساتس‌کانف یک کنفرانس سالانه است که در سائو پائولو برگزار می‌شود و بزرگ‌ترین مراجع ملی و بین‌المللی در Bitcoin را گرد هم می‌آورد. با سخنرانی‌ها، کارگاه‌ها، میزگردها و فرصت‌های شبکه‌سازی، هدف ما به اشتراک‌گذاری دانش درباره آزادی، حاکمیت فردی و اینترنت پول است. مخاطبان ما از مبتدیانی که می‌خواهند بیشتر درباره Bitcoin بیاموزند تا کهنه‌کاران این موضوع را شامل می‌شود. هر سال، ما به دنبال آوردن سخنرانان متخصص و رهبران فکری از جامعه Bitcoin هستیم و همچنین به دنبال ایجاد همکاری با سازمان‌های تأثیرگذار در صنعت هستیم. اگر به قدرت تحول‌آفرین Bitcoin باور دارید، ساتس‌کانف برای شماست.

description: |
  Satsconf je godišnja konferencija koja se održava u São Paulu i okuplja najveće nacionalne i međunarodne reference u Bitcoin. Sa predavanjima, radionicama, panel diskusijama i mogućnostima za umrežavanje, naš cilj je da podelimo znanje o slobodi, individualnom suverenitetu i internetu novca. Naša publika se kreće od početnika koji žele da saznaju više o Bitcoin do veterana u toj oblasti. Svake godine nastojimo da dovedemo stručne govornike i lidere mišljenja iz Bitcoin zajednice, kao i da uspostavimo partnerstva sa uticajnim organizacijama u industriji. Ako verujete u transformativnu moć Bitcoin, Satsconf je za vas.

description: |
  Satsconf, São Paulo'da düzenlenen ve Bitcoin alanındaki en büyük ulusal ve uluslararası referansları bir araya getiren yıllık bir konferanstır. Konferanslar, atölye çalışmaları, panel tartışmaları ve ağ kurma fırsatları ile amacımız özgürlük, bireysel egemenlik ve paranın interneti hakkında bilgi paylaşmaktır. İzleyici kitlemiz Bitcoin hakkında daha fazla bilgi edinmek isteyen yeni başlayanlardan konunun duayenlerine kadar uzanmaktadır. Her yıl, Bitcoin topluluğundan uzman konuşmacılar ve fikir liderleri getirmenin yanı sıra sektördeki etkili kuruluşlarla ortaklıklar kurmaya çalışıyoruz. Bitcoin'ın dönüştürücü gücüne inanıyorsanız, Satsconf tam size göre.

description: |
  Satsconf е ежегодна конференция, която се провежда в Сао Пауло и събира най-големите национални и международни референции в областта на Bitcoin. С лекции, семинари, панелни дискусии и възможности за работа в мрежа нашата цел е да споделим знания за свободата, индивидуалния суверенитет и интернет на парите. Аудиторията ни обхваща както начинаещи, които искат да научат повече за Bitcoin, така и ветерани по темата. Всяка година се стремим да привличаме експертни лектори и лидери на мнение от общността на Bitcoin, както и да установяваме партньорства с влиятелни организации в бранша. Ако вярвате в трансформиращата сила на Bitcoin, Satsconf е за вас.
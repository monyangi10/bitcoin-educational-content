description: |
  Satsconf adalah konferensi tahunan yang diadakan di São Paulo yang menyatukan referensi nasional dan internasional terbesar di Bitcoin. Dengan ceramah, lokakarya, diskusi panel, dan kesempatan berjejaring, tujuan kami adalah berbagi pengetahuan tentang kebebasan, kedaulatan individu, dan internet uang. Audiens kami berkisar dari pemula yang ingin belajar lebih banyak tentang Bitcoin hingga veteran subjek ini. Setiap tahun, kami berusaha menghadirkan pembicara ahli dan pemimpin opini dari komunitas Bitcoin, serta menjalin kemitraan dengan organisasi berpengaruh di industri ini. Jika Anda percaya pada kekuatan transformatif Bitcoin, Satsconf cocok untuk Anda.

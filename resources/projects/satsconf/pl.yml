description: |
  Satsconf to coroczna konferencja odbywająca się w São Paulo, która gromadzi największe krajowe i międzynarodowe referencje w Bitcoin. Dzięki wykładom, warsztatom, dyskusjom panelowym i możliwościom nawiązywania kontaktów, naszym celem jest dzielenie się wiedzą na temat wolności, indywidualnej suwerenności i internetu pieniędzy. Nasza publiczność obejmuje zarówno początkujących, którzy chcą dowiedzieć się więcej o Bitcoin, jak i weteranów tematu. Każdego roku staramy się sprowadzać ekspertów i liderów opinii ze społeczności Bitcoin, a także nawiązywać partnerstwa z wpływowymi organizacjami w branży. Jeśli wierzysz w transformacyjną moc Bitcoin, Satsconf jest dla Ciebie.

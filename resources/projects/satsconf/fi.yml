description: |
  Satsconf on São Paulossa vuosittain järjestettävä konferenssi, joka kokoaa yhteen Bitcoin:n suurimmat kansalliset ja kansainväliset referenssit. Luentojen, työpajojen, paneelikeskustelujen ja verkostoitumismahdollisuuksien avulla tavoitteenamme on jakaa tietoa vapaudesta, yksilön suvereniteetista ja rahan internetistä. Yleisömme vaihtelee aloittelijoista, jotka haluavat oppia lisää Bitcoin:sta, aiheen veteraaneihin. Pyrimme joka vuosi saamaan mukaan asiantuntijapuhujia ja mielipidevaikuttajia Bitcoin-yhteisöstä sekä luomaan kumppanuuksia alan vaikutusvaltaisten organisaatioiden kanssa. Jos uskot Bitcoin:n mullistavaan voimaan, Satsconf on sinua varten.

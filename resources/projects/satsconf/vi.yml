description: |
  Satsconf là hội nghị thường niên được tổ chức tại São Paulo, quy tụ các tài liệu tham khảo quốc gia và quốc tế lớn nhất trong Bitcoin. Với các bài giảng, hội thảo, thảo luận nhóm và cơ hội giao lưu, mục tiêu của chúng tôi là chia sẻ kiến thức về tự do, chủ quyền cá nhân và mạng lưới tiền tệ. Đối tượng tham dự của chúng tôi bao gồm những người mới bắt đầu muốn tìm hiểu thêm về Bitcoin cho đến những người kỳ cựu trong lĩnh vực này. Hàng năm, chúng tôi tìm cách đưa các diễn giả chuyên gia và những người dẫn đầu dư luận từ cộng đồng Bitcoin, cũng như thiết lập quan hệ đối tác với các tổ chức có ảnh hưởng trong ngành. Nếu bạn tin vào sức mạnh chuyển đổi của Bitcoin, Satsconf là dành cho bạn.

description: |
  Bitcoin Core เป็นซอฟต์แวร์อ้างอิงแบบโอเพนซอร์สสำหรับระบบ Bitcoin และยังคงเป็นการใช้งานหลักของโปรโตคอล Bitcoin จนถึงทุกวันนี้ พัฒนาและดูแลโดยกลุ่มอาสาสมัครจำนวนมาก เดิมชื่อ "Bitcoin Qt" เป็นไคลเอนต์ที่สามในประวัติศาสตร์ของ Bitcoin หลังจาก Bitcoin โดย Satoshi Nakamoto และ Bitcoind พัฒนาจากโค้ดดั้งเดิมของ Satoshi และแนะนำอินเทอร์เฟซผู้ใช้แบบกราฟิก ที่น่าสังเกตคืออินเทอร์เฟซกราฟิกของ Bitcoin Core ยังคงเรียกว่า bitcoin-qt ในปัจจุบัน ตั้งแต่เวอร์ชัน 0.5 ได้รับการจัดเตรียมด้วย bitcoind Bitcoin Core มีวัตถุประสงค์หลายประการ ประการแรกทำหน้าที่เป็นไคลเอนต์โหนดเต็มรูปแบบ Bitcoin Core ยังรวมถึง wallet สำหรับผู้ใช้ที่ต้องการจัดเก็บ จัดการ และทำธุรกรรมโดยตรงกับ Bitcoin Core
description: |
  Bitcoin Core е референтният софтуер с отворен код за системата Bitcoin и до днес остава основната реализация на протокола Bitcoin. Той се разработва и поддържа от голяма група доброволци. Първоначално наречен "Bitcoin Qt", той е третият клиент в историята на Bitcoin след Bitcoin от Satoshi Nakamoto и Bitcoind. Той е разработен от оригиналния код на Satoshi и въвежда графичен потребителски интерфейс. Забележително е, че графичният интерфейс на Bitcoin Core и днес се нарича bitcoin-qt. От версия 0.5 насам той се предоставя заедно с bitcoind. Ядрото Bitcoin служи за множество цели. Първо, то действа като клиент с пълен възел. Bitcoin Core включва и wallet за потребители, които желаят да съхраняват, управляват и извършват транзакции директно с Bitcoin Core.
  
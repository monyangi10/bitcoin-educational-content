description: |
  Bitcoin core, Bitcoin sistemi için açık kaynaklı referans yazılımıdır ve bugüne kadar Bitcoin protokolünün birincil uygulaması olmaya devam etmektedir. Büyük bir gönüllü katılımcı grubu tarafından geliştirilmiş ve sürdürülmüştür. Başlangıçta "Bitcoin Qt" olarak adlandırılan bu yazılım, Bitcoin Nakamoto'nun Satoshi'inden ve bitcoind'ten sonra Bitcoin'ün tarihindeki üçüncü istemcidir. Satoshi'in orijinal kodundan geliştirilmiş ve grafiksel bir kullanıcı Interface'yi tanıtmıştır. Özellikle, Bitcoin core'ın grafiksel Interface'si bugün hala Bitcoin-qt olarak adlandırılmaktadır. Sürüm 0.5'ten beri bitcoind ile birlikte sağlanmaktadır. Bitcoin core birden fazla amaca hizmet eder. İlk olarak, bir Full-node istemcisi olarak görev yapar. Bitcoin core ayrıca doğrudan Bitcoin core ile depolamak, yönetmek ve işlem yapmak isteyen kullanıcılar için bir Wallet içerir.
  
description: |
  Bitcoin core ni porogaramu y’inkomoko yuguruye y’uburyo bwa Bitcoin kandi iguma ari yo nzira nyamukuru y’ugushirwa mu ngiro kw’amasezerano ya Bitcoin gushika n’uyu musi. Itegurwa kandi ikabungabungwa n’umugwi munini w’abatanga amahera b’intahemuka. Mu ntango yitwa “Bitcoin Qt,” ni umukiriya wa gatatu mu mateka ya Bitcoin inyuma ya Bitcoin yakozwe na Satoshi Nakamoto na bitcoind. Yateguwe ivuye kuri kode y’intango ya Satoshi maze izana umukoresha w’ibishushanyo Interface. Ikizwi n’uko igishushanyo Interface ca Bitcoin core kiguma citwa Bitcoin-qt n’ubu. Kuva kuri verisiyo 0.5, yatanzwe na bitcoind. Bitcoin core ikora intumbero nyinshi. Ica mbere, ikora nk’umukiriya wa Full-node. Bitcoin core kandi irimwo Wallet ku bakoresha bipfuza kubika, gucunga, no gukorana na Bitcoin core.
  
description: |
  Bitcoin core is de open-source referentiesoftware voor het Bitcoin systeem en is nog steeds de primaire implementatie van het Bitcoin protocol. Het wordt ontwikkeld en onderhouden door een grote groep vrijwilligers. Oorspronkelijk heette het "Bitcoin Qt", en het is de derde client in de geschiedenis van Bitcoin, na Bitcoin van Satoshi Nakamoto en bitcoind. Het werd ontwikkeld uit de oorspronkelijke code van Satoshi en introduceerde een grafische gebruiker Interface. De grafische Interface van Bitcoin core heet vandaag de dag nog steeds Bitcoin-qt. Sinds versie 0.5 wordt het geleverd met bitcoind. Bitcoin core dient meerdere doelen. Ten eerste fungeert het als Full-node client. Bitcoin core bevat ook een Wallet voor gebruikers die Bitcoin core willen opslaan, beheren en er direct mee willen handelen.
  
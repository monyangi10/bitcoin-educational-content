description: |
  Bitcoin core은 Bitcoin 시스템을 위한 오픈소스 참조 소프트웨어로, 현재까지도 Bitcoin 프로토콜의 기본 구현으로 사용되고 있습니다. 이 소프트웨어는 많은 자원봉사자 그룹에 의해 개발 및 유지 관리되고 있습니다. 원래 이름은 "Bitcoin Qt"였으며, Bitcoin의 역사상 Satoshi 나카모토의 Bitcoin와 bitcoind에 이어 세 번째 클라이언트입니다. Satoshi의 원래 코드를 기반으로 개발되었으며 그래픽 사용자 Interface를 도입했습니다. 특히, Bitcoin core의 그래픽 Interface는 오늘날에도 여전히 Bitcoin-qt라고 불립니다. 버전 0.5부터는 bitcoind과 함께 제공되고 있습니다. Bitcoin core은 여러 가지 용도로 사용됩니다. 첫째, Full-node 클라이언트 역할을 합니다. Bitcoin core에는 Bitcoin core을 직접 저장, 관리, 거래하고자 하는 사용자를 위한 Wallet도 포함되어 있습니다.
  
description: |
  Ark Labs builds programmable finance infrastructure for Bitcoin through its flagship technology, Arkade. The company enables fintechs, brokerages, and asset managers to build payments, lending, trading, and yield products on programmable infrastructure powered by Bitcoin. Backed by Tether and other prominent investors, Ark Labs raised $5.2M to deliver open, secure, and native Bitcoin financial applications with 24/7 global settlement.

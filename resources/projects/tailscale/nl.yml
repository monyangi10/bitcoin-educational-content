description: |
  Configuratievrije VPN-oplossing op basis van WireGuard, waarmee je in slechts een paar minuten een versleuteld privénetwerk kunt creëren tussen je apparaten, waar ze zich ook bevinden. Tailscale is eenvoudig te implementeren en compatibel met alle platformen. Het biedt veilige zero-trust toegang, zonder dat je poorten hoeft te openen of het netwerk ingewikkeld hoeft te maken.
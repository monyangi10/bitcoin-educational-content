description: |
  BCC8333 wil een jaarlijkse bijeenkomst creëren om open-source ontwikkelaars, bouwers en vrijheidsstrijders samen te brengen om samen te werken en oplossingen te vinden voor hun meest dringende uitdagingen. We streven ernaar om individuen te voorzien van de tools, middelen en kennis die nodig zijn om obstakels te overwinnen bij het bouwen van toegankelijke, veilige en privacy respecterende technologieën.
  
description: |
  BCC8333 има за цел да създаде ежегодна среща, която да обединява разработчици на софтуер с отворен код, строители и борци за свобода, за да си сътрудничат и да намират решения на най-неотложните си предизвикателства. Стремим се да предоставим на хората инструментите, ресурсите и знанията, необходими за преодоляване на пречките при изграждането на достъпни, сигурни и зачитащи неприкосновеността на личния живот технологии.
  
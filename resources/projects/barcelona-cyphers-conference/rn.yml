description: |
  BCC8333 ifise intumbero yo gushinga ikoraniro ry’umwaka wose ryo guhuza abahinguzi b’ubuhinga bufunguye, abahinga mu vy’ubwubatsi, n’abarwanya umwidegemvyo kugira ngo bakorane kandi barondere inyishu z’ingorane zabo zikomeye cane. Twihatira guha abantu ku giti cabo ibikoresho, ubutunzi n’ubumenyi bikenewe kugira ngo bashobore gutsinda intambamyi mu kwubaka ubuhinga bushoboka, butekanye kandi bubaha ubuzima bwite.
  
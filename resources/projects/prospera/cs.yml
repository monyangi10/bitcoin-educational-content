description: |
  Próspera je zvláštní ekonomická zóna v Hondurasu, jejímž cílem je vytvořit prosperitu prostřednictvím ekonomické svobody, právního státu a inovativní správy. Próspera je založena na principech dobrovolného sdružování a podnikatelských inovací a poskytuje jednotlivcům platformu pro vytváření hodnot prostřednictvím podnikatelských záměrů, které podporují sociální pokrok a prosperitu.
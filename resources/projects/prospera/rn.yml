description: |
  Próspera ni akarere kadasanzwe k’ubutunzi muri Honduras kagenewe kurema ubutunzi biciye mu mwidegemvyo w’ubutunzi, ubutegetsi bw’amategeko, n’ubutegetsi bushasha. Ishingiye ku ngingo ngenderwako z’amashirahamwe y’ubushake n’ubuhinga bushasha bwo gukora, Próspera itanga urubuga ku bantu ku giti cabo kugira ngo bareme agaciro biciye mu bikorwa vy’ubudandaji bituma abantu batera imbere n’uguterimbere.
description: |
  Próspera es una zona económica especial de Honduras diseñada para crear prosperidad a través de la libertad económica, el Estado de Derecho y una gobernanza innovadora. Fundada sobre los principios de la asociación voluntaria y la innovación empresarial, Próspera ofrece una plataforma para que las personas creen valor a través de iniciativas empresariales que impulsen el progreso social y la prosperidad.
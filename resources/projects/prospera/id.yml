description: |
  Próspera adalah zona ekonomi khusus di Honduras yang dirancang untuk menciptakan kemakmuran melalui kebebasan ekonomi, supremasi hukum, dan tata kelola pemerintahan yang inovatif. Didirikan berdasarkan prinsip-prinsip asosiasi sukarela dan inovasi kewirausahaan, Próspera menyediakan platform bagi individu untuk menciptakan nilai melalui usaha bisnis yang mendorong kemajuan dan kemakmuran sosial.
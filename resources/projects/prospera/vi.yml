description: |
  Próspera là một đặc khu kinh tế ở Honduras, được thiết kế để tạo ra sự thịnh vượng thông qua tự do kinh tế, pháp quyền và quản trị đổi mới. Được thành lập dựa trên các nguyên tắc của hiệp hội tự nguyện và đổi mới sáng tạo, Próspera cung cấp một nền tảng cho các cá nhân tạo ra giá trị thông qua các dự án kinh doanh thúc đẩy tiến bộ và thịnh vượng xã hội.
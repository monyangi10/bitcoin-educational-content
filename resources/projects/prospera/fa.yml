description: |
  پروسپرا یک منطقه ویژه اقتصادی در هندوراس است که برای ایجاد رفاه از طریق آزادی اقتصادی، حاکمیت قانون و حکمرانی نوآورانه طراحی شده است. پروسپرا بر اساس اصول انجمن داوطلبانه و نوآوری کارآفرینی تأسیس شده و بستری را برای افراد فراهم می‌کند تا از طریق سرمایه‌گذاری‌های تجاری که پیشرفت اجتماعی و رفاه را به پیش می‌برند، ارزش ایجاد کنند.
description: |
  Próspera ni eneo maalum la kiuchumi nchini Honduras lililoundwa ili kuleta ustawi kupitia uhuru wa kiuchumi, utawala wa sheria na utawala bunifu. Imeanzishwa kwa kanuni za ushirika wa hiari na uvumbuzi wa ujasiriamali, Próspera hutoa jukwaa kwa watu binafsi kuunda thamani kupitia ubia wa biashara unaosukuma maendeleo ya kijamii na ustawi.
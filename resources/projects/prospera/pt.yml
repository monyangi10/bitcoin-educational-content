description: |
  A Próspera é uma zona económica especial nas Honduras concebida para criar prosperidade através da liberdade económica, do Estado de direito e de uma governação inovadora. Fundada nos princípios da associação voluntária e da inovação empresarial, a Próspera oferece uma plataforma para que os indivíduos criem valor através de empreendimentos comerciais que impulsionam o progresso social e a prosperidade.
description: |
  Próspera on Hondurase erimajandustsoon, mille eesmärk on luua heaolu majandusliku vabaduse, õigusriigi põhimõtete ja uuendusliku juhtimise kaudu. Próspera on rajatud vabatahtliku ühinemise ja ettevõtluse uuenduslikkuse põhimõtetele ning pakub üksikisikutele platvormi, et luua väärtust äriettevõtete kaudu, mis edendavad sotsiaalset arengut ja jõukust.
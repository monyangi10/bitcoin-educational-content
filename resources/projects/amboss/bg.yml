description: |
  Amboss е платформа, която предлага данни, прозрения и инструменти за координация за управление на каналите Bitcoin Lightning Network.
  
  Тя използва предимно мрежови клюки от възли Bitcoin Lightning за предоставяне на съответната информация. Платформата включва и API за провеждане на операции, наред с Magma - специализиран пазар за ликвидност. Със своя ангажимент за прозрения, основани на данни, Amboss предоставя цялостно решение за ефективно и информирано управление на Lightning Network.
description: |
  Amboss ni urubuga rutanga amakuru, ubumenyi, n’ibikoresho vyo guhuza ibikorwa vyo gucunga imirongo ya Bitcoin Lightning Network.
  
  Ikoresha cane cane urusaku rw’urubuga ruva ku nzira za Bitcoin Lightning kugira ngo itange amakuru akwiriye. Iryo koraniro kandi ririmwo API yo gukora ibikorwa, iruhande ya Magma, isoko ry’amahera ryihariye. Amboss itanga umuti wuzuye wo gucunga Lightning Network neza kandi ifise amakuru.
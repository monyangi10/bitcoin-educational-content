description: |
  Inkomoko yuguruye, ishingiye ku rubuga Interface kugira ngo ushobore gucunga neza igice kimwe canke vyinshi vy’umuravyo (LND, Umuravyo nyamukuru, Eclair). RTL itanga ibikorwa vyinshi, harimwo gucunga imirongo, kwishura, gucungera no guhindura, vyose biri mu Interface ishobora gukoreshwa mu minota mikeyi ku mbuga nyinshi.
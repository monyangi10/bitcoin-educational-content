description: |
  Уеббазиран Interface с отворен код за лесно управление на един или повече възли Lightning (LND, Core Lightning, Eclair). RTL предлага широк набор от функции, включително управление на канали, плащания, резервни копия и суапове, всичко това в интуитивен Interface, който може да бъде внедрен за минути на множество платформи.
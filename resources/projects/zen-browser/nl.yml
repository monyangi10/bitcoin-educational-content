description: |
  Zen Browser is het resultaat van een gemeenschap van gepassioneerde ontwikkelaars en ontwerpers, zonder commerciële structuur, gedreven door de ambitie om de webervaring opnieuw uit te vinden. Dit gratis, open-source project heeft als doel een elegante, privacy-vriendelijke en functierijke browser te bieden, zodat iedereen kan browsen zonder bang te hoeven zijn voor zijn gegevens.
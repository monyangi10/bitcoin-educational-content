description: |
  Zen Browser е плод на общност от страстни разработчици и дизайнери, без търговска структура, водени от амбицията да преоткрият уеб изживяването. Този безплатен проект с отворен код има за цел да предложи елегантен, удобен за защита на личните данни и богат на функции браузър, който да позволи на всеки да сърфира, без да се страхува за своите данни.
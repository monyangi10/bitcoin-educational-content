description: |
  Zen Browser ni ivyamwa vy’umuryango w’abahinguzi b’ibintu n’abahinguzi b’ibintu, ata n’imiterere y’ubudandaji, ivyurwa n’icipfuzo co gusubira guhingura ubumenyi bw’urubuga. Uyu mugambi w’ubuntu, ufunguye, ugamije gutanga umurongo w’ivy’ubuhinga bwiza, w’ubuzima bwite kandi ufise ibintu vyinshi, ugatuma umuntu wese ashobora gukoresha amakuru yiwe ata bwoba afise.
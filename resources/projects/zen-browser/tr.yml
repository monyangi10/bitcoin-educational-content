description: |
  Zen Browser, web deneyimini yeniden keşfetme tutkusuyla hareket eden, ticari bir yapısı olmayan, tutkulu geliştiriciler ve tasarımcılardan oluşan bir topluluğun ürünüdür. Bu ücretsiz, açık kaynaklı proje, herkesin verilerinden korkmadan gezinmesini sağlayan zarif, gizlilik dostu ve zengin özelliklere sahip bir tarayıcı sunmayı amaçlamaktadır.
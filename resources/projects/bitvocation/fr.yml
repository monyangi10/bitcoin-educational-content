description: |
  Nous sommes un moteur de visibilité et un connecteur stratégique. Grâce à nos flux d'offres d'emploi, à nos données de marché et à la communauté du POW Lab, nous aidons les demandeurs d'emploi à se démarquer et nous facilitons la tâche des employeurs en leur permettant d'accéder rapidement aux talents dont ils ont besoin.
  
  Nous aidons les Bitcoiners à lancer leur carrière en leur permettant de devenir le signal dans un marché de l'emploi bruyant. Nous ne sommes pas des recruteurs. Nous sommes des entremetteurs, des mentors et des bâtisseurs de communautés. Nous trouvons les meilleurs emplois et aidons les bitcoiners à se démarquer. Nous construisons également la plus grande réserve de talents du Bitcoin, afin que les startups sachent exactement où chercher, avant même qu'elles ne publient une offre d'emploi.
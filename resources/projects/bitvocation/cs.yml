description: |
  Jsme hnacím motorem viditelnosti a strategickým spojovacím článkem. Prostřednictvím našich pracovních kanálů, tržních dat a komunity POW Lab pomáháme uchazečům o zaměstnání vyniknout a zaměstnavatelům usnadňujeme rychlé oslovení těch správných talentů.
  
  Pomáháme bitcoinistům nastartovat jejich kariéru tím, že jim umožňujeme stát se signálem na hlučném trhu práce. Nejsme náboráři. Jsme dohazovači, mentoři a tvůrci komunity. Vyhledáváme nejlepší pracovní místa a trénujeme bitcoinery, aby vynikli. Budujeme také největší zásobárnu talentů Bitcoin - takže startupy přesně vědí, kde hledat, ještě předtím, než zveřejní pracovní nabídku.
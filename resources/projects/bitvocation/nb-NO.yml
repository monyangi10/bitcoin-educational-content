description: |
  Vi er en synlighetsmotor og en strategisk kontakt. Gjennom våre jobbstrømmer, markedsdata og POW Lab-fellesskap hjelper vi jobbsøkere med å skille seg ut og gjør det enklere for arbeidsgivere å nå de rette talentene, raskt.
  
  Vi hjelper Bitcoinere med å starte karrieren ved å gjøre dem i stand til å bli signalet i et støyende arbeidsmarked. Vi er ikke rekrutterere. Vi er matchmakere, mentorer og samfunnsbyggere. Vi finner de beste jobbene, og coacher Bitcoinere til å skille seg ut. Vi bygger også Bitcoins største talentpool - slik at oppstartsbedrifter vet nøyaktig hvor de skal lete, før de i det hele tatt legger ut en jobb.
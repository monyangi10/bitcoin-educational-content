description: |
  Me oleme nähtavuse mootor ja strateegiline ühendaja. Oma töövoo, turuandmete ja POW Lab'i kogukonna abil aitame tööotsijatel silma paista ja lihtsustame tööandjate jaoks õigete talentideni jõudmist, ja seda kiiresti.
  
  Me aitame Bitcoineridel karjääri käivitada, võimaldades neil muutuda mürarikkal tööturul signaaliks. Me ei ole värbajad. Me oleme vahendajad, mentorid ja kogukonna ülesehitajad. Me toome esile parimad töökohad ja juhendame Bitcoinereid, et nad eristuksid. Samuti ehitame Bitcoin suurimat talendiparki - nii et alustavad ettevõtted teavad täpselt, kust otsida, enne kui nad isegi töökoha välja annavad.
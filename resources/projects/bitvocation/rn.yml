description: |
  Turi moteri y’ukuboneka n’umuhuza w’ingene twokora. Biciye mu bimenyetso vyacu vy’akazi, amakuru y’isoko, n’umuryango wa POW Lab, turafasha abarondera akazi gutandukana no gutuma abakoresha bashobora gushika ku buhinga bukwiye, vyihuta.
  
  Turafasha aba Bitcoiners gutanguza akazi kabo mu kubashoboza kuba ikimenyetso mw’isoko ry’akazi ry’urusaku. Si twebwe abashaka abakozi. Turi abashaka abagenzi, abajanama, n’abubatsi b’umuryango. Turabona akazi keza, kandi tugatoza aba Bitcoiners kugira ngo bagaragare. Turakora kandi ikigo kinini cane c’abahinga ca Bitcoin—ku buryo amashirahamwe atanguye azi neza aho yorondera, imbere y’uko ashira ahabona akazi.
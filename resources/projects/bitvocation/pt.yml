description: |
  Somos um motor de visibilidade e um conetor estratégico. Através dos nossos feeds de emprego, dados de mercado e comunidade POW Lab, ajudamos os candidatos a emprego a destacarem-se e facilitamos aos empregadores o acesso rápido aos talentos certos.
  
  Ajudamos os Bitcoiners a lançar as suas carreiras, permitindo-lhes tornar-se o sinal num mercado de trabalho ruidoso. Nós não somos recrutadores. Somos casamenteiros, mentores e criadores de comunidades. Nós encontramos os melhores empregos, e treinamos os Bitcoiners para se destacarem. Também estamos a construir a maior reserva de talentos da Bitcoin - para que as startups saibam exatamente onde procurar, antes mesmo de publicarem um emprego.
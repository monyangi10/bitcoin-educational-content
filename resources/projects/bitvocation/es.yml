description: |
  Somos un motor de visibilidad y un conector estratégico. A través de nuestros feeds de empleo, datos de mercado y la comunidad POW Lab, ayudamos a los demandantes de empleo a destacar y facilitamos a las empresas el acceso rápido al talento adecuado.
  
  Ayudamos a los Bitcoiners a lanzar sus carreras permitiéndoles convertirse en la señal en un mercado laboral ruidoso. No somos reclutadores. Somos intermediarios, mentores y creadores de comunidades. Localizamos los mejores trabajos y entrenamos a los Bitcoiners para que destaquen. También estamos construyendo la mayor reserva de talento de Bitcoin, para que las startups sepan exactamente dónde buscar, incluso antes de publicar un puesto de trabajo.
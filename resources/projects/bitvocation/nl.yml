description: |
  Wij zijn een zichtbaarheidsmotor en strategische verbinder. Met onze vacaturefeeds, marktgegevens en POW Lab-community helpen we werkzoekenden op te vallen en maken we het werkgevers gemakkelijker om snel het juiste talent te bereiken.
  
  We helpen Bitcoiners hun carrière te lanceren door hen in staat te stellen het signaal te worden in een lawaaierige banenmarkt. We zijn geen recruiters. We zijn matchmakers, mentoren en gemeenschapsbouwers. We laten de beste banen zien en coachen Bitcoiners om op te vallen. We bouwen ook aan Bitcoin's grootste talentenpool, zodat startups precies weten waar ze moeten zoeken, nog voordat ze een vacature plaatsen.
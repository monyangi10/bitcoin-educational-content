description: |
  Speed Bitcoin Lightning Wallet è un Bitcoin Wallet che consente agli utenti di inviare e ricevere Bitcoin e monete stabili in modo sicuro

  Gli utenti possono inviare e ricevere Bitcoin su qualsiasi sito web che supporti i pagamenti Bitcoin, effettuare pagamenti utilizzando LNurl, LN Invoice o LN Address e proteggere il proprio account con l'autenticazione a due fattori. Integrazione di USDT stablecoin e bitrefill.
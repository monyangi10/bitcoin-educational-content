description: |
  Speed Bitcoin Lightning Wallet - это Bitcoin Wallet, позволяющий пользователям безопасно отправлять и получать Bitcoin и стейблкоины

  Пользователи могут отправлять и получать Bitcoin на любом сайте, поддерживающем платежи Bitcoin, совершать платежи с помощью LNurl, LN Invoice или LN Address, а также защищать свой аккаунт с помощью двухфакторной аутентификации. Интеграция стабильных монет USDT и битрефилла.
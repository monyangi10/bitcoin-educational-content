description: |
  Speed Bitcoin Lightning Wallet е Bitcoin wallet, който позволява на потребителите да изпращат и получават Bitcoin и стабилни монети сигурно
  
  Потребителите могат да изпращат и получават Bitcoin на всеки уебсайт, който поддържа плащания с Bitcoin, да извършват плащания, използвайки LNurl, LN фактура или LN адрес, и да защитят профила си с двуфакторна автентификация.
  Интегриране на USDT stablecoin и bitrefill.
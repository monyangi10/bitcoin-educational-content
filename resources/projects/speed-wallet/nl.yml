description: |
  Speed Bitcoin Lightning Wallet is een Bitcoin Wallet waarmee gebruikers Bitcoin en stablecoins veilig kunnen verzenden en ontvangen
  
  Gebruikers kunnen Bitcoin verzenden en ontvangen op elke website die Bitcoin betalingen ondersteunt, betalingen doen met LNurl, LN Invoice, of LN Address, en hun account beveiligen met two-factor authenticatie.
  Integratie van USDT stablecoin en bitrefill.
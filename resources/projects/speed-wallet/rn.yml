description: |
  Umuvuduko Bitcoin Umuravyo Wallet ni Bitcoin Wallet ituma abakoresha bashobora kohereza no kwakira Bitcoin n'amahera y'amahera ataco akora .

  Abakoresha barashobora kohereza no kwakira Bitcoin ku rubuga urwo ari rwo rwose rushigikira ukwishura kwa Bitcoin, kwishura bakoresheje LNurl, LN Invoice, canke LN Address, no gukingira konti yabo hakoreshejwe ivyemezo vy’ibintu bibiri. Gushiramwo amafaranga y’USDT n’amafaranga y’agaciro.
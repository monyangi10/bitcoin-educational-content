description: |
  Speed Bitcoin Lightning Wallet ist ein Bitcoin Wallet, mit dem Nutzer Bitcoin und Stablecoins sicher senden und empfangen können

  Benutzer können Bitcoin auf jeder Website senden und empfangen, die Bitcoin-Zahlungen unterstützt, Zahlungen mit LNurl, LN Invoice oder LN Address vornehmen und ihr Konto mit Zwei-Faktor-Authentifizierung sichern. Integration von USDT-Stablecoin und Bitrefill.
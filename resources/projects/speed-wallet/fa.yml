description: |
  سرعت Bitcoin Lightning Wallet یک Bitcoin Wallet است که به کاربران اجازه می‌دهد تا Bitcoin و استیبل‌کوین‌ها را به صورت امن ارسال و دریافت کنند

  کاربران می‌توانند Bitcoin را در هر وب‌سایتی که از پرداخت‌های Bitcoin پشتیبانی می‌کند ارسال و دریافت کنند، با استفاده از LNurl، LN Invoice یا LN Address پرداخت انجام دهند و حساب خود را با احراز هویت دو مرحله‌ای ایمن کنند. ادغام استیبل‌کوین USDT و bitrefill.
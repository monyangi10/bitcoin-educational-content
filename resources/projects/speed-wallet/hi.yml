description: |
  स्पीड Bitcoin लाइटनिंग Wallet एक Bitcoin Wallet है जो उपयोगकर्ताओं को Bitcoin और स्टेबलकॉइन सुरक्षित रूप से भेजने और प्राप्त करने की अनुमति देता है

  उपयोगकर्ता किसी भी वेबसाइट पर Bitcoin भेज और प्राप्त कर सकते हैं जो Bitcoin भुगतान का समर्थन करती है, LNurl, LN Invoice, या LN Address का उपयोग करके भुगतान कर सकते हैं, और दो-कारक प्रमाणीकरण के साथ अपने खाते को सुरक्षित कर सकते हैं। USDT स्टेबलकॉइन और बिटरिफिल को एकीकृत करना।
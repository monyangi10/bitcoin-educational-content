description: |
  ZEBEDEE is een technologiebedrijf dat zich toelegt op het faciliteren van open, programmeerbare betalingen in virtuele werelden.
  
  Hun doel is een revolutie teweeg te brengen in online transacties, door makers in staat te stellen financiële prikkels te geven en gebruikers in staat te stellen generate echte waarde te creëren in virtuele ruimtes. Ze laten zich leiden door vertrouwen, durf, opwindende innovatie en expertise en zetten zich in om complexe technologieën om te zetten in eenvoudige, gebruiksvriendelijke producten. Ze voorzien een toekomst waarin economieën naadloos activiteiten in de echte en virtuele wereld integreren, met games als pioniers van deze verschuiving. ZEBEDEE loopt voorop en ontwikkelt de tools en producten die nodig zijn om deze visie werkelijkheid te laten worden.
description: |
  ZEBEDEE는 가상 세계에서 프로그래밍 가능한 개방형 결제를 촉진하는 데 전념하는 기술 회사입니다.
  
  온라인 거래를 혁신하여 크리에이터에게는 금전적 인센티브를, 사용자에게는 가상 공간에서 진정한 가치를 제공할 수 있도록 하는 것을 목표로 합니다. 신뢰, 대담함, 놀라운 혁신, 전문성을 바탕으로 복잡한 기술을 단순하고 사용자 친화적인 제품으로 전환하는 데 전념하고 있습니다. 이들은 경제가 현실과 가상 세계의 활동을 원활하게 통합하고 게임이 이러한 변화를 선도하는 미래를 예견합니다. 제베디는 이러한 비전을 실현하는 데 필요한 도구와 제품을 만드는 데 앞장서고 있습니다.
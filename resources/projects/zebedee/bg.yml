description: |
  ZEBEDEE е технологична компания, която се занимава с улесняване на отворените, програмируеми плащания във виртуалните светове.
  
  Целта им е да направят революция в онлайн транзакциите, като позволят на създателите да предоставят финансови стимули, а на потребителите - истинска стойност във виртуалното пространство. Водени от доверие, смелост, наелектризиращи иновации и опит, те се стремят да трансформират сложните технологии в прости и удобни за ползване продукти. Те предвиждат бъдеще, в което икономиките безпроблемно интегрират дейностите в реалния и виртуалния свят, като игрите са пионер в тази промяна. ZEBEDEE е в челните редици, създавайки необходимите инструменти и продукти, за да превърне тази визия в реалност.
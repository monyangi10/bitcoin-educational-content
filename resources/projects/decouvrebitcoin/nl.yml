description: |
  DecouvreBitcoin is een educatief project dat Bitcoin naar de massa wil brengen door de kosten van Bitcoin onderwijs te verlagen. Het team achter DecouvreBitcoin creëert en distribueert educatieve content van hoge kwaliteit in de vorm van boeken, posters, trainingen, interviews, podcasts, meetups en conferenties over de hele wereld. Zij zijn de belangrijkste medewerkers achter de ontwikkeling van deze universiteit.
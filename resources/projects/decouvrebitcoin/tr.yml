description: |
  DecouvreBitcoin, Bitcoin eğitiminin maliyetini düşürerek Bitcoin'ı kitlelere ulaştırmayı amaçlayan bir eğitim projesidir. DecouvreBitcoin'in arkasındaki ekip, dünyanın her yerinde kitaplar, posterler, eğitim oturumları, röportajlar, podcast'ler, buluşmalar ve konferanslar şeklinde yüksek kaliteli eğitim içeriği oluşturur ve dağıtır. Bu üniversitenin gelişiminin arkasındaki ana katkıda bulunanlar onlardır.
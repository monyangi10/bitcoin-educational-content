description: |
  DecouvreBitcoin ni umugambi w’inyigisho ugamije kuzana Bitcoin ku bantu benshi mu kugabanya igiciro c’inyigisho za Bitcoin. Ishirahamwe riri inyuma ya DecouvreBitcoin rirema kandi rigakwiragiza ibintu vy’inyigisho vy’agaciro kanini mu buryo bw’ibitabu, amafoto, amahugurwa, ibibazo, amakuru, amakoraniro, n’inama kw’isi yose. Ni bo bafashije cane mu guteza imbere iyi kaminuza.
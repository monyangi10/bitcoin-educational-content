description: |
  DecouvreBitcoin เป็นโครงการการศึกษาที่มีเป้าหมายเพื่อนำ Bitcoin มาสู่ผู้คนทั่วไปโดยลดค่าใช้จ่ายในการศึกษา Bitcoin ทีมงานเบื้องหลัง DecouvreBitcoin สร้างและแจกจ่ายเนื้อหาการศึกษาคุณภาพสูงในรูปแบบของหนังสือ โปสเตอร์ การฝึกอบรม สัมภาษณ์ พอดแคสต์ การพบปะ และการประชุมทั่วโลก พวกเขาเป็นผู้สนับสนุนหลักเบื้องหลังการพัฒนามหาวิทยาลัยนี้
description: |
  DecouvreBitcoin е образователен проект, който има за цел да донесе Bitcoin на масите, като намали разходите за обучение по Bitcoin. Екипът, който стои зад DecouvreBitcoin, създава и разпространява висококачествено образователно съдържание под формата на книги, плакати, обучения, интервюта, подкасти, срещи и конференции по целия свят. Те са основните участници, които стоят зад развитието на този университет.
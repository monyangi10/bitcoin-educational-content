description: |
  Quidax is een Nigeriaanse Bitcoin & crypto Exchange die het voor iedereen makkelijk maakt om digitale activa te kopen, verkopen en op te slaan. Quidax is ontworpen voor zowel beginners als professionals en vereenvoudigt de toegang tot cryptocurrencies terwijl het snelle, veilige transacties mogelijk maakt in Afrika en daarbuiten.
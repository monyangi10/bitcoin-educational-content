description: |
  Quidax ni Bitcoin & crypto Exchange yo muri Nijeriya ituma umuntu wese ashobora kugura, kugurisha, no kubika ibintu vy’ubuhinga bwa none. Igenewe abatangura n’abahinga, Quidax yorosha gushika ku mafaranga y’amahera y’amahera mu gihe ishobora gukora amafaranga yihuta kandi ataco akora muri Afirika yose no hanze.
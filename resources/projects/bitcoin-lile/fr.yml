description: "Bitcoin Lille est une association loi 1901 à but non lucratif, qui
  rassemble amateurs, professionnels et commerçants du Nord de la France. Son
  objectif est d’aider à la découverte et à l’approfondissement de Bitcoin dans
  la métropole lilloise.

  Pour ce faire, nous organisons mensuellement des rencontres gratuites ouvertes
  à tous, des conférences et ateliers dans des écoles et universités de la
  région; et occasionnellement des présentations à destination des commerçants."

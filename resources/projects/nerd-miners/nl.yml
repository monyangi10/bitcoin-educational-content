description: |
  NerdMiner is een educatieve en vermakelijke tool gewijd aan Bitcoin Mining, gebaseerd op een ESP-32 S3 bord. Hoewel het niet de kracht heeft van professionele ASIC's, stelt het gebruikers in staat om concreet te begrijpen hoe Mining werkt met een elektrisch verbruik van slechts 0,5 W. Aangesloten op Mining pools, biedt het een minimale kans om een blok te delven terwijl het statistieken weergeeft op het geïntegreerde scherm. Ideaal voor liefhebbers en nieuwsgierigen.
  
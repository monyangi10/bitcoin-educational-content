description: |
  NerdMiner ni igikoresho co kwigisha no kwisamaza kigenewe Bitcoin Mining, gishingiye ku rubaho rwa ESP-32 S3. Naho idafise ububasha bw’ibikoresho vy’ubuhinga vy’ubuhinga bwa none, ituma abayikoresha batahura neza ingene Mining ikora n’umuyagankuba ukoresha 0.5 W gusa. Ni vyiza ku bakunda cane n’abashaka kumenya vyinshi.
  
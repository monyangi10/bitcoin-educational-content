description: |
  NerdMiner е образователен и забавен инструмент, посветен на Bitcoin mining, базиран на платка ESP-32 S3. Въпреки че не притежава мощността на професионалните ASIC, той позволява на потребителите да разберат конкретно как работи mining с консумация на електроенергия от само 0,5 W. Свързан към басейни mining, той предлага минимален шанс за добив на блок, като същевременно показва статистически данни на вградения си екран. Идеален за ентусиасти и любопитни.
  
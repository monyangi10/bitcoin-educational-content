description: |
  NerdMiner เป็นเครื่องมือเพื่อการศึกษาและความบันเทิงที่อุทิศให้กับ Bitcoin mining โดยใช้บอร์ด ESP-32 S3 แม้ว่าจะไม่มีพลังเทียบเท่ากับ ASICs มืออาชีพ แต่ก็ช่วยให้ผู้ใช้เข้าใจการทำงานของ mining ได้อย่างชัดเจนด้วยการใช้ไฟฟ้าเพียง 0.5 W เชื่อมต่อกับพูล mining มันมีโอกาสเล็กน้อยในการขุดบล็อกขณะเดียวกันก็แสดงสถิติบนหน้าจอในตัว เหมาะสำหรับผู้ที่สนใจและผู้ที่อยากรู้อยากเห็น
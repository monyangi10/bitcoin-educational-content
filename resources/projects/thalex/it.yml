description: |
  Thalex è una piattaforma che si concentra su soluzioni di trading, consentendo agli utenti di intraprendere attività finanziarie, tra cui opzioni, futures e contratti perpetui su Bitcoin. Thalex sostiene un Market Quality Program ("MQP"), un programma di incentivi che premia i clienti Thalex che contribuiscono in modo significativo alla liquidità e al volume su Thalex. L'MQP incentiva i mercati di negoziazione di Thalex a offrire quotazioni competitive e strette. A differenza delle borse di TradFi, l'MQP di Thalex è aperto a tutti i clienti invece di essere disponibile solo per i grandi market maker.
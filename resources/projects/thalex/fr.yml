description: |
  Thalex est une plateforme axée sur les solutions de négociation, permettant aux utilisateurs de s'engager dans des activités financières, notamment des options, des contrats à terme et des contrats à durée indéterminée sur Bitcoin. Thalex soutient un programme de qualité du marché ("MQP"), un programme d'incitation qui récompense les clients de Thalex qui contribuent de manière significative à la liquidité et au volume sur Thalex. Le MQP incite les marchés de making sur Thalex à offrir des cotations compétitives et serrées. Contrairement aux bourses TradFi, le MQP de Thalex est ouvert à tous les clients et n'est pas réservé aux grands teneurs de marché.
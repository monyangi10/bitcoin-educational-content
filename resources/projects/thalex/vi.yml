description: |
  Thalex là một nền tảng tập trung vào các giải pháp giao dịch, cho phép người dùng tham gia vào các hoạt động tài chính, bao gồm quyền chọn, hợp đồng tương lai và hợp đồng vĩnh viễn trên Bitcoin. Thalex duy trì Chương trình Chất lượng Thị trường ("MQP"), một chương trình khuyến khích dành cho khách hàng Thalex có những đóng góp đáng kể vào thanh khoản và khối lượng giao dịch trên Thalex. MQP khuyến khích các nhà tạo lập thị trường trên Thalex đưa ra mức giá cạnh tranh và sát sao. Khác với các sàn giao dịch TradFi, MQP của Thalex mở cửa cho tất cả khách hàng thay vì chỉ dành cho các nhà tạo lập thị trường lớn.
description: |
  Thalex to platforma skupiająca się na rozwiązaniach handlowych, umożliwiająca użytkownikom angażowanie się w działalność finansową, w tym opcje, kontrakty futures i kontrakty wieczyste na Bitcoin. Thalex utrzymuje Program Jakości Rynku ("MQP"), program motywacyjny, który nagradza klientów Thalex, którzy w znaczący sposób przyczyniają się do płynności i wolumenu na Thalex. MQP zachęca rynki Thalex do oferowania konkurencyjnych i wąskich kwotowań. W przeciwieństwie do giełd TradFi, MQP Thalex jest otwarty dla wszystkich klientów, a nie tylko dla dużych animatorów rynku.
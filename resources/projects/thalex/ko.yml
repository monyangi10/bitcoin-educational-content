description: |
  탈렉스는 거래 솔루션에 중점을 둔 플랫폼으로, 사용자가 Bitcoin에서 옵션, 선물, 무기한 계약을 포함한 금융 활동에 참여할 수 있도록 지원합니다. 탈렉스는 탈렉스의 유동성과 거래량에 의미 있는 기여를 한 탈렉스 고객에게 보상하는 인센티브 프로그램인 시장 품질 프로그램("MQP")을 운영하고 있습니다. MQP는 탈렉스에서 경쟁력 있고 타이트한 호가를 제공하도록 시장을 만들도록 인센티브를 제공합니다. TradFi 거래소와 달리 탈렉스의 MQP는 대형 마켓 메이커에게만 제공되는 것이 아니라 모든 고객에게 열려 있습니다.
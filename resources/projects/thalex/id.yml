description: |
  Thalex adalah platform yang berfokus pada solusi perdagangan, yang memungkinkan pengguna untuk terlibat dalam aktivitas keuangan, termasuk opsi, kontrak berjangka, dan kontrak abadi pada Bitcoin. Thalex mendukung Program Kualitas Pasar ("MQP"), sebuah program insentif yang memberikan penghargaan kepada pelanggan Thalex yang memberikan kontribusi yang berarti bagi likuiditas dan volume di Thalex. MQP memberikan insentif kepada pasar di Thalex untuk menawarkan kuotasi yang kompetitif dan ketat. Berbeda dengan bursa TradFi, MQP Thalex terbuka untuk semua pelanggan, bukan hanya tersedia untuk pembuat pasar besar.
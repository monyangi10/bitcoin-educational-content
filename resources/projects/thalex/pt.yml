description: |
  A Thalex é uma plataforma centrada em soluções de negociação, que permite aos utilizadores participar em actividades financeiras, incluindo opções, futuros e contratos perpétuos sobre o Bitcoin. A Thalex mantém um Programa de Qualidade de Mercado ("MQP"), um programa de incentivo que recompensa os clientes da Thalex que fazem contribuições significativas para a liquidez e o volume na Thalex. O MQP incentiva a criação de mercados na Thalex para oferecer cotações competitivas e rigorosas. Em contraste com as bolsas TradFi, o MQP da Thalex está aberto a todos os clientes, em vez de estar disponível apenas para grandes criadores de mercado.
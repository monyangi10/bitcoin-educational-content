description: |
  Thalex is een platform dat zich richt op handelsoplossingen, waarmee gebruikers financiële activiteiten kunnen ontplooien, waaronder opties, futures en eeuwigdurende contracten op Bitcoin. Thalex heeft een Market Quality Program ("MQP"), een stimuleringsprogramma dat Thalex-klanten beloont die een zinvolle bijdrage leveren aan de liquiditeit en het volume op Thalex. Het MQP stimuleert het maken van markten op Thalex om concurrerende en strakke koersen aan te bieden. In tegenstelling tot de TradFi-beurzen staat de MQP van Thalex open voor alle klanten in plaats van alleen beschikbaar te zijn voor grote marketmakers.
description: |
  Thalex - это платформа, специализирующаяся на торговых решениях, позволяющая пользователям заниматься финансовой деятельностью, включая опционы, фьючерсы и бессрочные контракты на Bitcoin. Thalex поддерживает Программу качества рынка ("MQP"), программу поощрения, которая вознаграждает клиентов Thalex, вносящих значительный вклад в ликвидность и объем на Thalex. Программа MQP стимулирует рынки Thalex предлагать конкурентоспособные и жесткие котировки. В отличие от бирж TradFi, программа MQP на Thalex открыта для всех клиентов, а не только для крупных маркет-мейкеров.
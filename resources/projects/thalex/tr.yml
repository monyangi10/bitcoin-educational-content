description: |
  Thalex, kullanıcıların Bitcoin üzerinde opsiyonlar, vadeli işlemler ve sürekli sözleşmeler dahil olmak üzere finansal faaliyetlerde bulunmalarına olanak tanıyan ticaret çözümlerine odaklanan bir platformdur. Thalex, Thalex'teki likidite ve hacme anlamlı katkılarda bulunan Thalex müşterilerini ödüllendiren bir teşvik programı olan Piyasa Kalitesi Programını ("MQP") sürdürmektedir. MQP, Thalex'te piyasa oluşturmayı rekabetçi ve sıkı kotasyonlar sunmaya teşvik etmektedir. TradFi borsalarının aksine, Thalex'in MQP'si yalnızca büyük piyasa yapıcılarına açık olmak yerine tüm müşterilere açıktır.
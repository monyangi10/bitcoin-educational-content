description: |
  Thalex یک پلتفرم متمرکز بر راه‌حل‌های معاملاتی است که به کاربران امکان می‌دهد در فعالیت‌های مالی از جمله آپشن‌ها، قراردادهای آتی و قراردادهای دائمی در Bitcoin شرکت کنند. Thalex یک برنامه کیفیت بازار ("MQP") را حفظ می‌کند، که یک برنامه تشویقی است که به مشتریان Thalex که به طور معناداری به نقدینگی و حجم در Thalex کمک می‌کنند، پاداش می‌دهد. MQP تشویق به ایجاد بازار در Thalex برای ارائه قیمت‌های رقابتی و فشرده می‌کند. برخلاف صرافی‌های TradFi، MQP Thalex برای همه مشتریان باز است و نه فقط برای بازارسازان بزرگ.
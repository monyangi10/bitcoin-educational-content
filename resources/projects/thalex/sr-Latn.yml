description: |
  Thalex je platforma fokusirana na rešenja za trgovanje, omogućavajući korisnicima da se bave finansijskim aktivnostima, uključujući opcije, fjučerse i perpetualne ugovore na Bitcoin. Thalex održava Program kvaliteta tržišta ("MQP"), program podsticaja koji nagrađuje Thalex korisnike koji daju značajan doprinos likvidnosti i obimu na Thalexu. MQP podstiče kreiranje tržišta na Thalexu kako bi se ponudile konkurentne i uske kotacije. Za razliku od TradFi berzi, Thalexov MQP je otvoren za sve korisnike umesto da bude dostupan samo velikim kreatorima tržišta.
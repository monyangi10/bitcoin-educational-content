description: |
  Thalex er en plattform med fokus på handelsløsninger som gjør det mulig for brukere å delta i finansielle aktiviteter, inkludert opsjoner, futures og evigvarende kontrakter på Bitcoin. Thalex opprettholder et Market Quality Program ("MQP"), et insentivprogram som belønner Thalex-kunder som gir meningsfulle bidrag til likviditet og volum på Thalex. MQP stimulerer til at markedene på Thalex tilbyr konkurransedyktige og tette kurser. I motsetning til TradFi-børser er Thalex' MQP åpent for alle kunder i stedet for bare å være tilgjengelig for store market makere.
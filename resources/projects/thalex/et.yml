description: |
  Thalex on platvorm, mis keskendub kauplemislahendustele, võimaldades kasutajatel tegeleda finantstegevusega, sealhulgas optsioonide, futuuride ja tähtajatute lepingutega Bitcoin-l. Thalex toetab turukvaliteedi programmi ("MQP"), mis on stimuleeriv programm, mis premeerib Thalexi kliente, kes aitavad oluliselt kaasa Thalexi likviidsuse ja mahu suurendamisele. MQP stimuleerib Thalexi turgude loomist, et pakkuda konkurentsivõimelisi ja tihedaid noteeringuid. Erinevalt TradFi börsidest on Thalexi MQP avatud kõigile klientidele, mitte ainult suurtele turutegijatele.
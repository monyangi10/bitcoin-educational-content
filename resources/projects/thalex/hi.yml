description: |
  थैलेक्स एक ऐसा प्लेटफ़ॉर्म है जो ट्रेडिंग समाधानों पर केंद्रित है और उपयोगकर्ताओं को Bitcoin पर विकल्प, वायदा और सतत अनुबंधों सहित वित्तीय गतिविधियों में संलग्न होने में सक्षम बनाता है। थैलेक्स एक मार्केट क्वालिटी प्रोग्राम ("एमक्यूपी") चलाता है, जो थैलेक्स के उन ग्राहकों को पुरस्कृत करने वाला एक प्रोत्साहन कार्यक्रम है जो थैलेक्स पर तरलता और वॉल्यूम में सार्थक योगदान देते हैं। एमक्यूपी थैलेक्स पर बाज़ार बनाने वालों को प्रतिस्पर्धी और सटीक भाव प्रदान करने के लिए प्रोत्साहित करता है। ट्रेडफाई एक्सचेंजों के विपरीत, थैलेक्स का एमक्यूपी केवल बड़े मार्केट मेकरों के लिए उपलब्ध होने के बजाय सभी ग्राहकों के लिए खुला है।
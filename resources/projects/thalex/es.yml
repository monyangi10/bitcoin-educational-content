description: |
  Thalex es una plataforma centrada en soluciones de negociación, que permite a los usuarios participar en actividades financieras, incluidas opciones, futuros y contratos perpetuos sobre Bitcoin. Thalex mantiene un Programa de Calidad de Mercado ("MQP"), un programa de incentivos que recompensa a los clientes de Thalex que contribuyen significativamente a la liquidez y el volumen en Thalex. El MQP incentiva la creación de mercados en Thalex para ofrecer cotizaciones competitivas y ajustadas. A diferencia de las bolsas TradFi, el MQP de Thalex está abierto a todos los clientes, y no sólo a los grandes creadores de mercado.
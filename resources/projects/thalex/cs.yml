description: |
  Thalex je platforma zaměřená na obchodní řešení, která uživatelům umožňuje zapojit se do finančních aktivit, včetně opcí, futures a trvalých kontraktů na Bitcoin. Společnost Thalex udržuje Market Quality Program ("MQP"), motivační program, který odměňuje zákazníky společnosti Thalex, kteří významně přispívají k likviditě a objemu na platformě Thalex. Program MQP motivuje vytváření trhů na Thalexu k tomu, aby nabízely konkurenceschopné a přísné kotace. Na rozdíl od burz TradFi je program MQP společnosti Thalex otevřen všem zákazníkům a není k dispozici pouze velkým tvůrcům trhu.
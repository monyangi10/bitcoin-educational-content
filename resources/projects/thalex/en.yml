description: |
  Thalex is a platform focusing on trading solutions, enabling users to engage in financial activities, including options, futures, and perpetual contracts on Bitcoin. Thalex sustains a Market Quality Program ("MQP"), an incentive program that rewards Thalex customers who make meaningful contributions to liquidity and volume on Thalex. The MQP incentivizes making markets on Thalex to offer competitive and tight quotes. In contrast to TradFi exchanges, Thalex's MQP is open to all customers instead of only being available to large market makers.
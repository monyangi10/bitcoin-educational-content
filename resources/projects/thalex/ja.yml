description: |
  Thalexはトレーディング・ソリューションに特化したプラットフォームであり、ユーザーはBitcoinのオプション、先物、永久契約などの金融活動に従事することができる。Thalexはマーケット・クオリティ・プログラム（「MQP」）を維持し ており、これはThalexの流動性と取引量に有意義な貢献をしたThalex 顧客に報いるインセンティブ・プログラムである。MQPは、Thalexのマーケットが競争力のあるタイトな気配値を提供するよう奨励するものです。TradFi取引所とは対照的に、ThalexのMQPは、大手のマーケット・メーカーだけが利用できるのではなく、すべての顧客に開かれている。
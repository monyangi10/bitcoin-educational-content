description: |
  Thalex ni urubuga rwibanda ku mirongo y’ubudandaji, rushoboza abakoresha kwifatanya n’ibikorwa vy’ivy’ubutunzi, harimwo amahitamwo, ivy’imbere, n’amasezerano ahoraho kuri Bitcoin. Thalex ishigikira Porogarama y'Ubuhinga bw'Isoko ("MQP"), porogarama y'inkurikizi ihemba abakiriya ba Thalex batanga intererano zifise insiguro ku bijanye n'amahera n'ubunini kuri Thalex. MQP itera intege gukora amasoko kuri Thalex kugira ngo itange amafaranga y’uguhiganwa kandi akomeye. Mu buryo butandukanye n’ubucuruzi bwa TradFi, MQP ya Thalex yugururiye abakiriya bose aho gukoreshwa gusa n’abakora isoko rinini.
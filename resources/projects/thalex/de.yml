description: |
  Thalex ist eine Plattform, die sich auf Handelslösungen konzentriert und es den Nutzern ermöglicht, sich an Finanzaktivitäten zu beteiligen, einschließlich Optionen, Futures und unbefristete Verträge auf Bitcoin. Thalex unterhält ein Marktqualitätsprogramm ("MQP"), ein Anreizprogramm, das Thalex-Kunden belohnt, die einen bedeutenden Beitrag zu Liquidität und Volumen auf Thalex leisten. Das MQP schafft Anreize, dass die Märkte auf Thalex wettbewerbsfähige und enge Quotierungen anbieten. Im Gegensatz zu TradFi-Börsen steht das MQP von Thalex allen Kunden offen und ist nicht nur für große Market Maker zugänglich.
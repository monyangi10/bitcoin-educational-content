description: |
  Thalex е платформа, фокусирана върху решения за търговия, която позволява на потребителите да извършват финансови дейности, включително опции, фючърси и безсрочни договори за Bitcoin. Thalex поддържа Програма за качество на пазара ("MQP") - програма за стимулиране, която възнаграждава клиентите на Thalex, които имат значителен принос за ликвидността и обема на Thalex. MQP стимулира създаването на пазари на Thalex, които да предлагат конкурентни и строги котировки. За разлика от борсите TradFi, MQP на Thalex е отворена за всички клиенти, а не е достъпна само за големите маркет мейкъри.
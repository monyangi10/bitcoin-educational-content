description: |
  Thalex เป็นแพลตฟอร์มที่มุ่งเน้นการแก้ปัญหาการซื้อขาย ช่วยให้ผู้ใช้สามารถมีส่วนร่วมในกิจกรรมทางการเงิน รวมถึงออปชั่น ฟิวเจอร์ส และสัญญาถาวรบน Bitcoin Thalex สนับสนุนโปรแกรมคุณภาพตลาด ("MQP") ซึ่งเป็นโปรแกรมจูงใจที่ให้รางวัลแก่ลูกค้า Thalex ที่มีส่วนร่วมอย่างมีนัยสำคัญต่อสภาพคล่องและปริมาณการซื้อขายบน Thalex MQP กระตุ้นให้มีการสร้างตลาดบน Thalex เพื่อเสนอราคาที่แข่งขันได้และแคบ ในทางตรงกันข้ามกับการแลกเปลี่ยน TradFi MQP ของ Thalex เปิดให้ลูกค้าทุกคนแทนที่จะมีให้เฉพาะผู้สร้างตลาดรายใหญ่เท่านั้น
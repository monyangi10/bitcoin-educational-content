description: |
  Thalex är en plattform som fokuserar på handelslösningar och gör det möjligt för användare att bedriva finansiella aktiviteter, inklusive optioner, terminer och eviga kontrakt på Bitcoin. Thalex upprätthåller ett Market Quality Program ("MQP"), ett incitamentsprogram som belönar Thalex kunder som gör meningsfulla bidrag till likviditet och volym på Thalex. MQP ger incitament till att göra marknader på Thalex för att erbjuda konkurrenskraftiga och snäva priser. Till skillnad från TradFi-börser är Thalex MQP öppet för alla kunder istället för att endast vara tillgängligt för stora market makers.
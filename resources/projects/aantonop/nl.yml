description: |
  Andreas M. Antonopoulos is een vooraanstaand Bitcoin expert en auteur. Zijn centrale werk, "Mastering Bitcoin," biedt een technische gids om de ingewikkelde werking van Bitcoin te begrijpen. Antonopoulos is een krachtig pleitbezorger voor het potentieel van Bitcoin om een meer gedecentraliseerd financieel landschap te bevorderen. Hij heeft wereldwijd talloze lezingen gegeven, expertgetuigenissen afgelegd in wetgevende contexten en startups begeleid bij het navigeren door het Bitcoin ecosysteem. Zijn gevarieerde oeuvre, dat zich uitstrekt over auteurschap, belangenbehartiging en adviserende rollen, markeert hem als een toonaangevende stem in de Bitcoin industrie. Op een meer persoonlijke noot, hij is degene die me deze universiteit en decouvrebitcoin deed oprichten. als je dit ooit leest, bedankt Andreas :)
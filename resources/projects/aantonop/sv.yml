description: |
  Andreas M. Antonopoulos är en framstående Bitcoin-expert och författare. Hans centrala arbete, "Mastering Bitcoin", erbjuder en teknisk guide för att förstå Bitcoin:s invecklade funktion. Antonopoulos är en kraftfull förespråkare för Bitcoin:s potential att främja ett mer decentraliserat finansiellt landskap och har hållit otaliga föredrag över hela världen, gett expertutlåtanden i lagstiftningssammanhang och guidat nystartade företag som navigerar i Bitcoin:s ekosystem. Hans mångsidiga arbete, som spänner över författarskap, förespråkande och rådgivande roller, markerar honom som en ledande röst i Bitcoin-branschen. På ett mer personligt sätt är han den som fick mig att skapa detta universitet och decouvrebitcoin. om du någonsin läser detta, tack Andreas :)
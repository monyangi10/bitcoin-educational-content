description: |
  Андреас М. Антонопулос е изтъкнат експерт и автор на Bitcoin. Неговият ключов труд "Mastering Bitcoin" предлага техническо ръководство за разбиране на сложните механизми на Bitcoin. Мощен защитник на потенциала на Bitcoin за насърчаване на по-децентрализиран финансов пейзаж, Антонопулос е изнесъл безброй лекции по целия свят, предоставил е експертни показания в законодателен контекст и е ръководил стартиращи компании, които се ориентират в екосистемата на Bitcoin. Разнообразната му работа, обхващаща авторство, застъпничество и консултантски роли, го определя като водещ глас в Bitcoin индустрията.
  В по-личен план той е този, който ме накара да създам този университет и да декуверизирам биткойн. ако някога прочетеш това, благодаря ти, Андреас :)
description: |
  Consensus21 یک پروتکل آموزشی متن‌باز است که یادگیری را تقویت می‌کند، سلسله‌مراتب و بدهی تحصیلی را حذف می‌کند. این پروتکل یادگیری خودگردان و مبتنی بر مسئله را با پشتیبانی هدایت‌شده ترویج می‌دهد و به یادگیرندگان مهارت‌های تفکر انتقادی، کارآفرینی و حل مسئله را می‌بخشد.
  
  Consensus21 از طریق درس‌های باز V4V و سیستم آموزش خودگردان غیرمتمرکز (DAES) یک جامعه یادگیری پویا ارائه می‌دهد. جلسات ماهانه V4V ما در HiveTalk برای همه باز است و مهارت‌آموزی در فضای Bitcoin را ترویج می‌دهد، به طوری که شرکت‌کنندگان می‌توانند کمک‌های مستقیم دریافت کنند. DAES از یادگیرندگان مشتاق با ارائه یک پلتفرم برای ارسال پروژه‌های Bitcoin، تأمین مالی احتمالی و مشاوره پشتیبانی می‌کند.
  
  ما همچنین مدیریت اخبار Stacker در قلمرو آموزش را بر عهده داریم و یک چت Signal برای همکاری فراهم می‌کنیم. به ما بپیوندید تا در جامعه Bitcoin مشارکت کنید، یاد بگیرید و نوآوری کنید.
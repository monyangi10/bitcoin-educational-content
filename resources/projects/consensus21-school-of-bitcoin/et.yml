description: |
  Consensus21 on avatud lähtekoodiga haridusprotokoll, mis võimaldab õppimist, kaotab hierarhiad ja õppemaksuvõlad. See soodustab isejuhtivat, probleemipõhist õppimist koos juhendatud toetusega, andes õppijatele kriitilise mõtlemise, ettevõtlikkuse ja probleemide lahendamise oskuse.
  
  Consensus21 pakub dünaamilist õpikogukonda V4V Open Lessons ja detsentraliseeritud autonoomse haridussüsteemi (DAES) kaudu. Meie igakuised V4V-sessioonid HiveTalkis on avatud kõigile, edendades oskuste jagamist Bitcoin ruumis, kusjuures osalejad saavad otseseid annetusi. DAES toetab ambitsioonikaid õppijaid, pakkudes platvormi Bitcoin projektide esitamiseks, võimalikuks rahastamiseks ja mentorluseks.
  
  Samuti haldame Stacker News on Education territooriumi ja pakume koostööks Signal chat'i. Liitu meiega, et Bitcoin kogukonnas kaasa rääkida, õppida ja uuendusi teha.
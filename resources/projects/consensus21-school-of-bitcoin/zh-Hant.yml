description: |
  Consensus21 是一個開放源碼的教育協定，可增強學習能力、消除等級制度和學費負擔。它在指導支援下促進自主、以問題為基礎的學習，賦予學習者批判性思考、企業精神和解決問題的能力。
  
  Consensus21 透過 V4V 開放課程和分散式自主教育系統 (DAES) 提供一個充滿活力的學習社群。我們在 HiveTalk 上的每月 V4V 課程對所有人開放，促進 Bitcoin 空間的技能分享，參與者可直接獲得捐款。DAES 支援有抱負的學習者，提供 Bitcoin 專案提交平台、潛在資金和指導。
  
  我們也管理 Stacker News on Education 領域，並提供 Signal 聊天室以供合作。加入我們，在 Bitcoin 社群中貢獻、學習和創新。
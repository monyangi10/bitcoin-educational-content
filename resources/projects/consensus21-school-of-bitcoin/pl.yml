description: |
  Consensus21 to protokół edukacyjny typu open-source, który umożliwia naukę, usuwa hierarchie i zadłużenie z tytułu czesnego. Wspiera on samodzielne uczenie się oparte na rozwiązywaniu problemów, dając uczniom możliwość krytycznego myślenia, przedsiębiorczości i umiejętności rozwiązywania problemów.
  
  Consensus21 oferuje dynamiczną społeczność uczącą się poprzez otwarte lekcje V4V i zdecentralizowany autonomiczny system edukacji (DAES). Nasze comiesięczne sesje V4V na HiveTalk są otwarte dla wszystkich, wspierając wymianę umiejętności w przestrzeni Bitcoin, a uczestnicy mogą otrzymywać bezpośrednie darowizny. DAES wspiera aspirujących uczniów, oferując platformę do zgłaszania projektów Bitcoin, potencjalnego finansowania i mentoringu.
  
  Zarządzamy również terytorium Stacker News on Education i zapewniamy czat Signal do współpracy. Dołącz do nas, aby współtworzyć, uczyć się i wprowadzać innowacje w społeczności Bitcoin.
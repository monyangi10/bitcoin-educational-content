description: |
  Consensus21 er en utdanningsprotokoll med åpen kildekode som styrker læring, fjerner hierarkier og studiegjeld. Den fremmer selvstyrt, problembasert læring med veiledet støtte, noe som gir elevene ferdigheter i kritisk tenkning, entreprenørskap og problemløsning.
  
  Consensus21 tilbyr et dynamisk læringsfellesskap gjennom V4V Open Lessons og Decentralised Autonomous Education System (DAES). Våre månedlige V4V-økter på HiveTalk er åpne for alle, og fremmer deling av ferdigheter i Bitcoin-rommet, med deltakere som kan motta direkte donasjoner. DAES støtter håpefulle elever ved å tilby en plattform for innsending av Bitcoin-prosjekter, potensiell finansiering og mentorskap.
  
  Vi administrerer også Stacker News on Education-territoriet og tilbyr en Signal-chat for samarbeid. Bli med oss for å bidra, lære og innovere i Bitcoin-fellesskapet.
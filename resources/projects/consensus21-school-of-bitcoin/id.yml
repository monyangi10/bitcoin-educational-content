description: |
  Consensus21 adalah protokol pendidikan sumber terbuka yang memberdayakan pembelajaran, menghapus hierarki, dan utang biaya pendidikan. Protokol ini mendorong pembelajaran berbasis masalah yang diarahkan secara mandiri dengan dukungan yang dipandu, memberdayakan peserta didik dengan pemikiran kritis, kewirausahaan, dan keterampilan pemecahan masalah.
  
  Consensus21 menawarkan komunitas belajar yang dinamis melalui Pelajaran Terbuka V4V dan Sistem Pendidikan Otonomi Terdesentralisasi (DAES). Sesi V4V bulanan kami di HiveTalk terbuka untuk semua orang, mendorong berbagi keterampilan di ruang Bitcoin, dengan peserta yang dapat menerima donasi langsung. DAES mendukung calon pelajar dengan menawarkan platform untuk pengajuan proyek Bitcoin, potensi pendanaan, dan bimbingan.
  
  Kami juga mengelola Stacker News di wilayah Pendidikan dan menyediakan obrolan Signal untuk kolaborasi. Bergabunglah dengan kami untuk berkontribusi, belajar, dan berinovasi dalam komunitas Bitcoin.
description: |
  컨센서스21은 오픈소스 교육 프로토콜로, 학습에 힘을 실어주고 계층 구조와 학비 부담을 없애줍니다. 이 프로토콜은 안내식 지원을 통해 자기 주도적 문제 기반 학습을 촉진하고 학습자에게 비판적 사고, 기업가 정신, 문제 해결 능력을 부여합니다.
  
  컨센서스21은 V4V 오픈 레슨과 분산형 자율 교육 시스템(DAES)을 통해 역동적인 학습 커뮤니티를 제공합니다. 하이브톡에서 매월 진행되는 V4V 세션은 누구나 참여할 수 있으며, 참가자는 직접 기부를 받을 수 있는 Bitcoin 공간에서 기술 공유를 촉진합니다. DAES는 Bitcoin 프로젝트 제출, 잠재적 자금 지원, 멘토링을 위한 플랫폼을 제공하여 야심찬 학습자를 지원합니다.
  
  또한 교육 영역의 Stacker News를 관리하고 협업을 위한 Signal 채팅을 제공합니다. Bitcoin 커뮤니티에 참여하여 기여하고, 배우고, 혁신하세요.
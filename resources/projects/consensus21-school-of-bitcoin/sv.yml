description: |
  Consensus21 är ett utbildningsprotokoll med öppen källkod som möjliggör lärande och tar bort hierarkier och studieskulder. Det främjar självstyrt, problembaserat lärande med guidat stöd, vilket ger eleverna kritiskt tänkande, entreprenörskap och problemlösningsförmåga.
  
  Consensus21 erbjuder en dynamisk lärandegemenskap genom V4V Open Lessons och Decentralised Autonomous Education System (DAES). Våra månatliga V4V-sessioner på HiveTalk är öppna för alla och främjar kompetensdelning i Bitcoin-rymden, där deltagarna kan ta emot direkta donationer. DAES stöder blivande elever genom att erbjuda en plattform för Bitcoin-projektinlämningar, potentiell finansiering och mentorskap.
  
  Vi hanterar också Stacker News on Education-territoriet och tillhandahåller en Signal-chatt för samarbete. Gå med oss för att bidra, lära och innovera inom Bitcoin-communityn.
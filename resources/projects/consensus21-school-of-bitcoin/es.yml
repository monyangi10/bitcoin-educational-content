description: |
  Consensus21 es un protocolo educativo de código abierto que potencia el aprendizaje, eliminando jerarquías y deudas de matrícula. Fomenta el aprendizaje autodirigido y basado en problemas con apoyo guiado, dotando a los alumnos de pensamiento crítico, espíritu emprendedor y capacidad para resolver problemas.
  
  Consensus21 ofrece una comunidad de aprendizaje dinámica a través de las Lecciones Abiertas V4V y el Sistema de Educación Autónoma Descentralizada (DAES). Nuestras sesiones mensuales V4V en HiveTalk están abiertas a todos, fomentando el intercambio de habilidades en el espacio Bitcoin, y los participantes pueden recibir donaciones directas. DAES apoya a los aspirantes a estudiantes ofreciendo una plataforma para la presentación de proyectos Bitcoin, financiación potencial y tutoría.
  
  También gestionamos el territorio Stacker News on Education y ofrecemos un chat Signal para la colaboración. Únete a nosotros para contribuir, aprender e innovar dentro de la comunidad Bitcoin.
description: |
  Consensus21 е образователен протокол с отворен код, който дава възможност за учене, премахва йерархиите и дълговете за обучение. Той насърчава самостоятелното, проблемно базирано учене с насочваща подкрепа, като дава възможност на учащите да придобият умения за критично мислене, предприемачество и решаване на проблеми.
  
  Consensus21 предлага динамична учебна общност чрез отворените уроци на V4V и децентрализираната автономна образователна система (DAES). Нашите месечни V4V сесии в HiveTalk са отворени за всички, като насърчават обмена на умения в пространството Bitcoin, а участниците могат да получават директни дарения. DAES подкрепя амбициозните ученици, като предлага платформа за подаване на Bitcoin проекти, потенциално финансиране и менторство.
  
  Ние също така управляваме територията на Stacker News on Education и предоставяме чат за сътрудничество в Signal. Присъединете се към нас, за да допринасяте, да се учите и да въвеждате иновации в общността на Bitcoin.
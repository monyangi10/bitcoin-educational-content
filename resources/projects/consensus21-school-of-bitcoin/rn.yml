description: |
  Consensus21 ni umurongo w’inyigisho wuguruye utanga ubushobozi bwo kwiga, gukuraho ubukuru, n’imyenda y’amashure. Itera imbere inyigisho yiyobora, ishingiye ku ngorane ifise infashanyo iyobowe, igaha ubushobozi abanyeshure bwo kwiyumvira neza, gukora ubudandaji, no gutorera umuti ingorane.
  
  Consensus21 itanga umuryango w’inyigisho ufise inguvu biciye mu nyigisho zifunguye za V4V no mu buryo bw’uburezi bwigenga (DAES). Ivyigwa vyacu vy’ukwezi kwa V4V kuri HiveTalk vyugururiye bose, bitera intege ugusangira ubuhinga mu kibanza ca Bitcoin, abavyitavye bakaba bashobora kwakira intererano zitaziguye. DAES ishigikira abashaka kwiga mu gutanga urubuga rwo gutanga umugambi wa Bitcoin, amahera ashobora guhabwa, n’ubuyobozi.
  
  Turacungera kandi amakuru ya Stacker ku burezi kandi tugatanga Signal chat kugira ngo dukorane. Twifatanye n'ugutanga, kwiga, no gukora ibintu bishasha mu muryango wa Bitcoin.
description: |
  Consensus21はオープンソースの教育プロトコルであり、階層をなくし、学費の負債をなくすことで、学習に力を与えます。Consensus21は、ガイド付きのサポートにより、自己主導型の問題解決型学習を促進し、学習者に批判的思考力、起業家精神、問題解決能力を身につけさせる。
  
  Consensus21は、V4Vオープンレッスンと分散型自律教育システム（DAES）を通じて、ダイナミックな学習コミュニティを提供しています。HiveTalkで毎月開催されるV4Vセッションは誰でも参加でき、Bitcoin空間でのスキル共有を促進し、参加者は直接寄付を受けることができます。DAESは、Bitcoinプロジェクトの提出、潜在的な資金提供、指導のためのプラットフォームを提供することで、意欲的な学習者を支援しています。
  
  また、Stacker News on Educationのテリトリーを管理し、コラボレーションのためのシグナルチャットも提供しています。Bitcoinコミュニティで貢献し、学び、革新するために、私たちに参加してください。
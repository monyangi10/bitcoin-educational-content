description: |
  Consensus21 è un protocollo educativo open-source che favorisce l'apprendimento, eliminando le gerarchie e i debiti scolastici. Promuove l'apprendimento auto-diretto e basato su problemi, con un supporto guidato, che conferisce agli studenti capacità di pensiero critico, imprenditorialità e risoluzione dei problemi.
  
  Consensus21 offre una comunità di apprendimento dinamica attraverso le lezioni aperte V4V e il Sistema Educativo Autonomo Decentrato (DAES). Le nostre sessioni mensili di V4V su HiveTalk sono aperte a tutti e favoriscono la condivisione di competenze nello spazio Bitcoin, con la possibilità per i partecipanti di ricevere donazioni dirette. Il DAES sostiene gli aspiranti studenti offrendo una piattaforma per la presentazione di progetti Bitcoin, potenziali finanziamenti e mentorship.
  
  Gestiamo anche il territorio di Stacker News on Education e forniamo una chat di segnalazione per la collaborazione. Unitevi a noi per contribuire, imparare e innovare all'interno della comunità Bitcoin.
description: |
  Consensus21 est un protocole éducatif à code source ouvert qui favorise l'apprentissage en supprimant les hiérarchies et les dettes de scolarité. Il favorise l'apprentissage autodirigé, basé sur les problèmes, avec un soutien guidé, permettant aux apprenants d'acquérir une pensée critique, l'esprit d'entreprise et des compétences en matière de résolution de problèmes.
  
  Consensus21 offre une communauté d'apprentissage dynamique par le biais des leçons ouvertes V4V et du système d'éducation autonome décentralisé (DAES). Nos sessions mensuelles V4V sur HiveTalk sont ouvertes à tous et favorisent le partage de compétences dans l'espace Bitcoin, les participants pouvant recevoir des dons directs. Le DAES soutient les apprenants en herbe en offrant une plateforme pour les soumissions de projets Bitcoin, le financement potentiel et le mentorat.
  
  Nous gérons également le territoire Stacker News on Education et fournissons un chat Signal pour la collaboration. Rejoignez-nous pour contribuer, apprendre et innover au sein de la communauté Bitcoin.
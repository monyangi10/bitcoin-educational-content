description: |
  Consensus21 ist ein Open-Source-Bildungsprotokoll, das Lernen ermöglicht, Hierarchien abbaut und Studiengebühren abschafft. Es fördert selbstgesteuertes, problembasiertes Lernen mit angeleiteter Unterstützung und befähigt die Lernenden zu kritischem Denken, Unternehmertum und Problemlösungskompetenz.
  
  Consensus21 bietet eine dynamische Lerngemeinschaft durch V4V Open Lessons und das Dezentrale Autonome Bildungssystem (DAES). Unsere monatlichen V4V-Sitzungen auf HiveTalk sind für alle offen und fördern den Austausch von Fähigkeiten im Bitcoin-Raum, wobei die Teilnehmer direkte Spenden erhalten können. DAES unterstützt aufstrebende Lernende, indem es eine Plattform für Bitcoin-Projekteinreichungen, potenzielle Finanzierungen und Mentoring bietet.
  
  Wir verwalten auch das Gebiet von Stacker News on Education und bieten einen Signal-Chat für die Zusammenarbeit. Schließen Sie sich uns an, um innerhalb der Bitcoin-Gemeinschaft beizutragen, zu lernen und innovativ zu sein.
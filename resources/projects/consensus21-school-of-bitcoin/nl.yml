description: |
  Consensus21 is een open-source onderwijsprotocol dat leren mogelijk maakt, hiërarchieën en studieschuld wegneemt. Het bevordert zelfgestuurd, probleemgestuurd leren met begeleide ondersteuning, waardoor leerlingen kritisch kunnen denken, ondernemerschap en probleemoplossende vaardigheden kunnen ontwikkelen.
  
  Consensus21 biedt een dynamische leergemeenschap via V4V Open Lessen en het Decentraal Autonoom Onderwijs Systeem (DAES). Onze maandelijkse V4V-sessies op HiveTalk zijn voor iedereen toegankelijk en stimuleren het delen van vaardigheden in de Bitcoin-ruimte, waarbij deelnemers directe donaties kunnen ontvangen. DAES ondersteunt aspirant-leerders door een platform te bieden voor het indienen van Bitcoin projecten, potentiële financiering en mentorschap.
  
  We beheren ook het Stacker News on Education territorium en bieden een Signal chat voor samenwerking. Sluit je bij ons aan om bij te dragen, te leren en te innoveren binnen de Bitcoin gemeenschap.
description: |
  Consensus21 je vzdělávací protokol s otevřeným zdrojovým kódem, který posiluje učení, odstraňuje hierarchii a dluhy za školné. Podporuje samostatné učení založené na řešení problémů s řízenou podporou, čímž posiluje schopnosti studentů kriticky myslet, podnikat a řešit problémy.
  
  Consensus21 nabízí dynamickou vzdělávací komunitu prostřednictvím otevřených lekcí V4V a decentralizovaného autonomního vzdělávacího systému (DAES). Naše měsíční lekce V4V na HiveTalk jsou otevřené všem a podporují sdílení dovedností v prostoru Bitcoin, přičemž účastníci mohou získat přímé dary. DAES podporuje začínající studenty tím, že nabízí platformu pro podávání projektů Bitcoin, potenciální financování a mentoring.
  
  Spravujeme také území Stacker News on Education a poskytujeme chat Signal pro spolupráci. Připojte se k nám a přispívejte, učte se a inovujte v rámci komunity Bitcoin.
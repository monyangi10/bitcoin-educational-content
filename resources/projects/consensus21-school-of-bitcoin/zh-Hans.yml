description: |
  Consensus21 是一个开源教育协议，它增强了学习能力，消除了等级制度和学费债务。它在指导支持下促进自主、基于问题的学习，赋予学习者批判性思维、创业精神和解决问题的技能。
  
  Consensus21 通过 V4V 公开课和分散式自主教育系统（DAES）提供了一个充满活力的学习社区。我们每月在 HiveTalk 上举办的 V4V 课程向所有人开放，促进 Bitcoin 空间的技能共享，参与者可以直接获得捐赠。DAES 为有抱负的学习者提供了一个提交 Bitcoin 项目、获得潜在资金和导师指导的平台。
  
  我们还负责管理 Stacker News on Education 版块，并提供 Signal 聊天室以促进合作。加入我们，在 Bitcoin 社区中贡献、学习和创新。
description: |
  Consensus21 เป็นโปรโตคอลการศึกษาแบบโอเพ่นซอร์สที่เสริมสร้างการเรียนรู้ กำจัดลำดับชั้น และหนี้สินจากค่าเล่าเรียน มันส่งเสริมการเรียนรู้ด้วยตนเองที่เน้นปัญหาโดยมีการสนับสนุนที่แนะนำ เสริมสร้างผู้เรียนด้วยการคิดเชิงวิพากษ์ ทักษะการเป็นผู้ประกอบการ และการแก้ปัญหา
  
  Consensus21 เสนอชุมชนการเรียนรู้ที่มีชีวิตชีวาผ่าน V4V Open Lessons และระบบการศึกษาที่เป็นอิสระแบบกระจายอำนาจ (DAES) เซสชัน V4V รายเดือนของเราบน HiveTalk เปิดให้ทุกคนเข้าร่วม ส่งเสริมการแบ่งปันทักษะในพื้นที่ Bitcoin โดยผู้เข้าร่วมสามารถรับบริจาคโดยตรง DAES สนับสนุนผู้เรียนที่มีความมุ่งมั่นโดยเสนอแพลตฟอร์มสำหรับการส่งโครงการ Bitcoin การระดมทุนที่เป็นไปได้ และการให้คำปรึกษา
  
  เรายังจัดการ Stacker News ในดินแดนการศึกษาและให้บริการแชท Signal สำหรับการทำงานร่วมกัน เข้าร่วมกับเราเพื่อมีส่วนร่วม เรียนรู้ และนวัตกรรมภายในชุมชน Bitcoin
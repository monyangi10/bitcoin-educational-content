description: |
  Consensus21 on avoimen lähdekoodin koulutusprotokolla, joka mahdollistaa oppimisen, poistaa hierarkiat ja lukukausivelat. Se edistää itseohjautuvaa, ongelmalähtöistä oppimista ohjatun tuen avulla ja antaa oppijoille mahdollisuuden kriittiseen ajatteluun, yrittäjyyteen ja ongelmanratkaisutaitoihin.
  
  Consensus21 tarjoaa dynaamisen oppimisyhteisön V4V Open Lessonsin ja hajautetun autonomisen koulutusjärjestelmän (DAES) kautta. Kuukausittaiset V4V-istuntomme HiveTalkissa ovat avoimia kaikille ja edistävät taitojen jakamista Bitcoin-avaruudessa, ja osallistujat voivat saada suoria lahjoituksia. DAES tukee aloittelevia oppijoita tarjoamalla foorumin Bitcoin-projektien jättämiselle, mahdolliselle rahoitukselle ja mentoroinnille.
  
  Hallinnoimme myös Stacker News on Education -aluetta ja tarjoamme Signal-chatin yhteistyötä varten. Liity meihin ja osallistu, opi ja innovoi Bitcoin-yhteisössä.
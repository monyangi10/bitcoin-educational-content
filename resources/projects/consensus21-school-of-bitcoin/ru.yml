description: |
  Consensus21 - это образовательный протокол с открытым исходным кодом, который расширяет возможности обучения, устраняет иерархию и долги за обучение. Он способствует самостоятельному, проблемно-ориентированному обучению с поддержкой, расширяя возможности учащихся в области критического мышления, предпринимательства и навыков решения проблем.
  
  Consensus21 предлагает динамичное учебное сообщество с помощью открытых уроков V4V и децентрализованной автономной системы образования (DAES). Наши ежемесячные сессии V4V на HiveTalk открыты для всех, способствуя обмену навыками в пространстве Bitcoin, а участники могут получать прямые пожертвования. DAES поддерживает начинающих учеников, предлагая платформу для подачи проектов Bitcoin, потенциального финансирования и наставничества.
  
  Мы также управляем территорией Stacker News on Education и предоставляем чат Signal для совместной работы. Присоединяйтесь к нам, чтобы вносить свой вклад, учиться и внедрять инновации в сообщество Bitcoin.
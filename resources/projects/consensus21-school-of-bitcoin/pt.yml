description: |
  O Consensus21 é um protocolo educativo de código aberto que potencia a aprendizagem, eliminando hierarquias e dívidas de propinas. Promove a aprendizagem auto-dirigida e baseada em problemas com apoio orientado, capacitando os alunos com pensamento crítico, empreendedorismo e competências de resolução de problemas.
  
  A Consensus21 oferece uma comunidade de aprendizagem dinâmica através das Aulas Abertas V4V e do Sistema de Ensino Autónomo Descentralizado (DAES). As nossas sessões mensais V4V no HiveTalk estão abertas a todos, promovendo a partilha de competências no espaço Bitcoin, com os participantes a poderem receber donativos diretos. O DAES apoia os aspirantes a aprendizes, oferecendo uma plataforma para submissão de projectos Bitcoin, potencial financiamento e orientação.
  
  Também gerimos o território Stacker News on Education e disponibilizamos um chat Signal para colaboração. Junte-se a nós para contribuir, aprender e inovar na comunidade Bitcoin.
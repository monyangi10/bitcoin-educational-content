description: |
  Consensus21 je otvoreni obrazovni protokol koji osnažuje učenje, uklanja hijerarhije i dugove za školarinu. Podstiče samostalno, problemsko učenje uz vođenu podršku, osnažujući učenike kritičkim razmišljanjem, preduzetništvom i veštinama rešavanja problema.
  
  Consensus21 nudi dinamičnu zajednicu za učenje kroz V4V Otvorene Lekcije i Decentralizovani Autonomni Obrazovni Sistem (DAES). Naše mesečne V4V sesije na HiveTalk su otvorene za sve, podstičući razmenu veština u Bitcoin prostoru, gde učesnici mogu primati direktne donacije. DAES podržava ambiciozne učenike nudeći platformu za podnošenje Bitcoin projekata, potencijalno finansiranje i mentorstvo.
  
  Takođe upravljamo teritorijom Stacker News o obrazovanju i pružamo Signal chat za saradnju. Pridružite nam se da doprinesete, učite i inovirate unutar Bitcoin zajednice.
description: |
  Consensus21 là một giao thức giáo dục nguồn mở, hỗ trợ việc học tập, xóa bỏ hệ thống phân cấp và nợ học phí. Giao thức này thúc đẩy việc học tập tự định hướng, dựa trên vấn đề với sự hỗ trợ có hướng dẫn, giúp người học phát triển tư duy phản biện, tinh thần khởi nghiệp và kỹ năng giải quyết vấn đề.
  
  Consensus21 mang đến một cộng đồng học tập năng động thông qua các Bài học Mở V4V và Hệ thống Giáo dục Tự chủ Phi tập trung (DAES). Các buổi V4V hàng tháng của chúng tôi trên HiveTalk mở cửa cho tất cả mọi người, thúc đẩy việc chia sẻ kỹ năng trong không gian Bitcoin, với những người tham gia có thể nhận được các khoản đóng góp trực tiếp. DAES hỗ trợ những người học đầy tham vọng bằng cách cung cấp một nền tảng để nộp dự án Bitcoin, tài trợ tiềm năng và cố vấn.
  
  Chúng tôi cũng quản lý chuyên mục Stacker News on Education và cung cấp một cuộc trò chuyện Signal để cộng tác. Hãy tham gia cùng chúng tôi để đóng góp, học hỏi và đổi mới trong cộng đồng Bitcoin.
description: |
  Olemme normandialainen yhdistys, joka on omistautunut Bitcoin:n edistämiselle ja löytämiselle. Harrastajien perustama yhdistys, jonka tehtävänä on demokratisoida tämän kryptovaluutan saatavuutta ja ymmärtämistä Normandiassa. Tapaamisten, konferenssien ja muiden tapahtumien avulla luomme Exchange-tilan, jossa aloittelijat ja asiantuntijat voivat tavata, oppia ja jakaa tietämystään Bitcoin- ja Blockchain-universumista. Liity seuraamme, kun tutkimme tätä digitaalista vallankumousta alueemme sydämessä!

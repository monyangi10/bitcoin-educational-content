description: |
  Mi smo udruženje sa sedištem u Normandiji posvećeno promociji i otkrivanju Bitcoin. Osnovano od strane entuzijasta, naša misija je da demokratizujemo pristup i razumevanje ove kriptovalute u Normandiji. Kroz okupljanja, konferencije i druge događaje, stvaramo Exchange prostor gde se početnici i stručnjaci mogu sastati, učiti i deliti svoje znanje o univerzumu Bitcoin i Blockchain. Pridružite nam se dok istražujemo ovu digitalnu revoluciju u srcu našeg regiona!

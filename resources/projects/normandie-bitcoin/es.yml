description: |
  Somos una asociación con sede en Normandía dedicada a la promoción y el descubrimiento di Bitcoin. Fundada por entusiastas, nuestra misión es democratizar el acceso y la comprensión de esta criptomoneda en Normandía. A través de encuentros, conferencias y otros eventos, creamos un espacio Exchange donde novatos y expertos pueden reunirse, aprender y compartir sus conocimientos sobre el universo Bitcoin y Blockchain. Únase a nosotros para explorar esta revolución digital en el corazón de nuestra región

description: |
  Somos uma associação normanda dedicada à promoção e à descoberta do Bitcoin. Fundada por entusiastas, a nossa missão é democratizar o acesso e a compreensão desta criptomoeda na Normandia. Através de encontros, conferências e outros eventos, criamos um espaço Exchange onde novatos e especialistas podem encontrar-se, aprender e partilhar os seus conhecimentos sobre o universo Bitcoin e Blockchain. Junte-se a nós para explorar esta revolução digital no coração da nossa região!

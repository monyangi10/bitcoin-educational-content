description: |
  Wir sind ein Verein mit Sitz in der Normandie, der sich der Förderung und Entdeckung von Bitcoin widmet. Gegründet von Enthusiasten, ist es unsere Mission, den Zugang zu und das Verständnis für diese Kryptowährung in der Normandie zu demokratisieren. Durch Treffen, Konferenzen und andere Veranstaltungen schaffen wir einen Exchange-Raum, in dem sich Neulinge und Experten treffen, lernen und ihr Wissen über das Bitcoin- und Blockchain-Universum teilen können. Schließen Sie sich uns an, wenn wir diese digitale Revolution im Herzen unserer Region erkunden!

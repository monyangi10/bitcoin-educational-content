description: |
  Ние сме асоциация, базирана в Нормандия, която се занимава с популяризирането и откриването на Bitcoin. Основана от ентусиасти, нашата мисия е да демократизираме достъпа и разбирането на тази криптовалута в Нормандия. Чрез срещи, конференции и други събития ние създаваме пространство за обмен, където новаци и експерти могат да се срещат, да се учат и да споделят знанията си за вселената на Bitcoin и Blockchain. Присъединете се към нас, докато изследваме тази цифрова революция в сърцето на нашия регион!
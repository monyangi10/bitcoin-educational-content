description: |
  Vi er en Normandie-basert forening dedikert til promotering og oppdagelse av Bitcoin. Vi ble grunnlagt av entusiaster, og vårt oppdrag er å demokratisere tilgangen til og forståelsen av denne kryptovalutaen i Normandie. Gjennom møter, konferanser og andre arrangementer skaper vi et Exchange-rom der nybegynnere og eksperter kan møtes, lære og dele sin kunnskap om Bitcoin og Blockchain-universet. Bli med oss når vi utforsker denne digitale revolusjonen i hjertet av regionen vår!

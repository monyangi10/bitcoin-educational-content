description: |
  Chúng tôi là một hiệp hội có trụ sở tại Normandy chuyên quảng bá và khám phá Bitcoin. Được thành lập bởi những người đam mê, sứ mệnh của chúng tôi là dân chủ hóa quyền truy cập và hiểu biết về loại tiền điện tử này tại Normandy. Thông qua các buổi gặp gỡ, hội nghị và các sự kiện khác, chúng tôi tạo ra một không gian Exchange nơi những người mới bắt đầu và chuyên gia có thể gặp gỡ, học hỏi và chia sẻ kiến thức của họ về vũ trụ Bitcoin và Blockchain. Hãy tham gia cùng chúng tôi khi chúng tôi khám phá cuộc cách mạng kỹ thuật số này tại trung tâm khu vực của chúng tôi!

description: |
  Me oleme Normandias asuv ühendus, mis on pühendunud Bitcoin edendamisele ja avastamisele. Meie missiooniks on entusiastide poolt asutatuna demokratiseerida selle krüptoraha kättesaadavust ja mõistmist Normandias. Kohtumiste, konverentside ja muude ürituste kaudu loome Exchange ruumi, kus algajad ja eksperdid saavad kohtuda, õppida ja jagada oma teadmisi Bitcoin ja Blockchain universumist. Liitu meiega, kui uurime seda digitaalset revolutsiooni meie piirkonna südames!

description: |
  Wij zijn een in Normandië gevestigde vereniging die zich inzet voor de promotie en ontdekking van Bitcoin. Opgericht door enthousiastelingen, is het onze missie om de toegang tot en het begrip van deze cryptocurrency in Normandië te democratiseren. Door middel van meetups, conferenties en andere evenementen, creëren we een Exchange ruimte waar beginners en experts elkaar kunnen ontmoeten, leren en hun kennis van het Bitcoin en Blockchain universum kunnen delen. Sluit je bij ons aan om deze digitale revolutie te verkennen in het hart van onze regio!

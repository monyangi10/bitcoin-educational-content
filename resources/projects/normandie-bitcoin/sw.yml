description: |
  Sisi ni chama chenye makao yake Normandy kilichojitolea kwa utangazaji na ugunduzi wa Bitcoin. Ilianzishwa na wapenda shauku, dhamira yetu ni kuweka kidemokrasia ufikiaji na uelewa wa sarafu hii fiche nchini Normandy. Kupitia mikutano, makongamano na matukio mengine, tunaunda nafasi ya Exchange ambapo wanaoanza na wataalamu wanaweza kukutana, kujifunza na kushiriki ujuzi wao kuhusu ulimwengu wa Bitcoin na Blockchain. Jiunge nasi tunapochunguza mapinduzi haya ya kidijitali katikati mwa eneo letu!

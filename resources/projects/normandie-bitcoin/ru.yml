description: |
  Мы являемся ассоциацией, расположенной в Нормандии и занимающейся продвижением и открытием Bitcoin. Основанная энтузиастами, наша миссия заключается в демократизации доступа к этой криптовалюте и ее понимания в Нормандии. Проводя встречи, конференции и другие мероприятия, мы создаем пространство Exchange, где новички и эксперты могут встречаться, учиться и делиться своими знаниями о вселенной Bitcoin и Blockchain. Присоединяйтесь к нам, ведь мы исследуем эту цифровую революцию в самом сердце нашего региона!

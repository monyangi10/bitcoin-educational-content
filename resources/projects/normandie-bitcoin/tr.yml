description: |
  Bitcoin'nin tanıtımı ve keşfine adanmış Normandiya merkezli bir derneğiz. Meraklılar tarafından kurulan misyonumuz, Normandiya'da bu kripto para birimine erişimi ve bu kripto para biriminin anlaşılmasını demokratikleştirmektir. Buluşmalar, konferanslar ve diğer etkinlikler aracılığıyla, acemilerin ve uzmanların buluşabileceği, öğrenebileceği ve Bitcoin ve Blockchain evreni hakkındaki bilgilerini paylaşabileceği bir Exchange alanı yaratıyoruz. Bölgemizin kalbindeki bu dijital devrimi keşfederken bize katılın!
  

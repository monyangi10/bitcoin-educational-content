description: |
  Siamo un'associazione con sede in Normandia che si dedica alla promozione e alla scoperta di Bitcoin. Fondata da appassionati, la nostra missione è quella di democratizzare l'accesso e la comprensione di questa criptovaluta in Normandia. Attraverso meetup, conferenze e altri eventi, creiamo uno spazio Exchange in cui novizi ed esperti possono incontrarsi, imparare e condividere la loro conoscenza dell'universo Bitcoin e Blockchain. Unitevi a noi per esplorare questa rivoluzione digitale nel cuore della nostra regione!

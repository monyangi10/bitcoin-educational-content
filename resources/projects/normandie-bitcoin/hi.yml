description: |
  हम नॉरमैंडी में स्थित एक एसोसिएशन हैं जो Bitcoin के प्रचार और खोज के लिए समर्पित है। उत्साही लोगों द्वारा स्थापित, हमारा मिशन नॉरमैंडी में इस क्रिप्टोकरेंसी तक पहुँच और समझ को लोकतांत्रिक बनाना है। मीटअप, सम्मेलनों और अन्य कार्यक्रमों के माध्यम से, हम एक Exchange स्थान बनाते हैं जहाँ नौसिखिए और विशेषज्ञ मिल सकते हैं, सीख सकते हैं और Bitcoin और Blockchain ब्रह्मांड के बारे में अपने ज्ञान को साझा कर सकते हैं। हमारे साथ जुड़ें क्योंकि हम अपने क्षेत्र के दिल में इस डिजिटल क्रांति का पता लगाते हैं!

description: |
  Jesteśmy stowarzyszeniem z siedzibą w Normandii, którego celem jest promowanie i odkrywanie Bitcoin. Naszą misją, założoną przez entuzjastów, jest demokratyzacja dostępu i zrozumienia tej kryptowaluty w Normandii. Poprzez spotkania, konferencje i inne wydarzenia tworzymy przestrzeń Exchange, w której nowicjusze i eksperci mogą się spotykać, uczyć i dzielić swoją wiedzą na temat Bitcoin i Blockchain. Dołącz do nas, odkrywając tę cyfrową rewolucję w sercu naszego regionu!

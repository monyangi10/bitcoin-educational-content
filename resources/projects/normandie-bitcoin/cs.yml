description: |
  Jsme sdružení se sídlem v Normandii, které se věnuje propagaci a objevování Bitcoin. Založili nás nadšenci a naším posláním je demokratizovat přístup k této kryptoměně a její pochopení v Normandii. Prostřednictvím setkání, konferencí a dalších akcí vytváříme prostor pro Exchange, kde se mohou setkávat nováčci i odborníci, učit se a sdílet své znalosti o světě Bitcoin a Blockchain. Připojte se k nám při objevování této digitální revoluce v srdci našeho regionu!

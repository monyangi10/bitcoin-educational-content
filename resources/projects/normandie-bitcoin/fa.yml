description: |
  ما یک انجمن مستقر در نرماندی هستیم که به ترویج و کشف Bitcoin اختصاص دارد. توسط علاقه‌مندان تأسیس شده‌ایم و مأموریت ما دموکراتیزه کردن دسترسی و درک این ارز دیجیتال در نرماندی است. از طریق ملاقات‌ها، کنفرانس‌ها و رویدادهای دیگر، ما فضایی Exchange ایجاد می‌کنیم که در آن تازه‌کاران و کارشناسان می‌توانند ملاقات کنند، یاد بگیرند و دانش خود را از دنیای Bitcoin و Blockchain به اشتراک بگذارند. به ما بپیوندید تا این انقلاب دیجیتال را در قلب منطقه‌مان کاوش کنیم!

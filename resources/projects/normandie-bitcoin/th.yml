description: |
  เราเป็นสมาคมที่ตั้งอยู่ในนอร์มังดีที่มุ่งเน้นการส่งเสริมและค้นพบ Bitcoin ก่อตั้งโดยผู้ที่มีความหลงใหล ภารกิจของเราคือการทำให้การเข้าถึงและความเข้าใจในสกุลเงินดิจิทัลนี้ในนอร์มังดีเป็นเรื่องที่ทุกคนเข้าถึงได้ ผ่านการพบปะ การประชุม และกิจกรรมอื่นๆ เราสร้างพื้นที่แลกเปลี่ยนที่ผู้เริ่มต้นและผู้เชี่ยวชาญสามารถพบปะ เรียนรู้ และแบ่งปันความรู้เกี่ยวกับจักรวาลของ Bitcoin และ Blockchain มาร่วมกับเราในการสำรวจการปฏิวัติดิจิทัลนี้ในใจกลางภูมิภาคของเรา!
description: |
  Vi är en Normandie-baserad förening som ägnar sig åt att främja och upptäcka Bitcoin. Vi grundades av entusiaster och vårt uppdrag är att demokratisera tillgången till och förståelsen för denna kryptovaluta i Normandie. Genom möten, konferenser och andra evenemang skapar vi ett Exchange-utrymme där nybörjare och experter kan träffas, lära sig och dela med sig av sin kunskap om Bitcoin- och Blockchain-universumet. Följ med oss när vi utforskar denna digitala revolution i hjärtat av vår region!

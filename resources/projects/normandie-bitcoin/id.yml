description: |
  Kami adalah asosiasi yang berbasis di Normandia yang didedikasikan untuk promosi dan penemuan Bitcoin. Didirikan oleh para penggemar, misi kami adalah mendemokratisasikan akses dan pemahaman tentang mata uang kripto ini di Normandia. Melalui pertemuan, konferensi, dan acara lainnya, kami menciptakan ruang Exchange di mana para pemula dan ahli dapat bertemu, belajar, dan berbagi pengetahuan tentang dunia Bitcoin dan Blockchain. Bergabunglah dengan kami saat kami menjelajahi revolusi digital ini di jantung wilayah kami!

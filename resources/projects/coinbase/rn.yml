description: |
  Coinbase ni kimwe mu bihugu bihambaye kw’isi bihindura amafaranga y’amahinguriro n’abatanga Wallet. Bituma abantu ku giti cabo n’ibigo bashobora kugura, kugurisha, kubika no gucunga amafaranga menshi y’amahera y’amahera—harimwo na Bitcoin—biciye ku rubuga rusanzwe. Izwi kubera kwubahiriza amategeko, ibiranga umutekano, n’ibikoresho vy’inyigisho, Coinbase ikora nk’irembo ry’abakoresha amamiliyoni kugira ngo binjire mu bidukikije vy’amahera.
  
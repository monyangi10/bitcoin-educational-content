description: |
  Namecheap รวมการชำระเงินด้วยบิตคอยน์ในปี 2013 และต่อมาได้นำ BTCPay มาใช้สำหรับการประมวลผลโดยตรงที่ไม่ต้องพึ่งพาความไว้วางใจ ตั้งแต่ปี 2020 พวกเขาได้สร้างรายได้ $73 ล้านจากบิตคอยน์ ซึ่งเน้นย้ำถึงความต้องการของผู้ใช้สำหรับตัวเลือกการชำระเงินด้วย BTC พวกเขายังเห็นการเพิ่มขึ้นของรายได้ต่อผู้ใช้ 23% ในปี 2024 เมื่อเทียบกับปี 2023
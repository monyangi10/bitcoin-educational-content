description: |
  Namecheap yashize hamwe amahera ya Bitcoin mu 2013 hanyuma mu nyuma yemera BTCPay kugira ngo ikoreshe Trustless. Kuva muri 2020, bararonse amadolari 73 miliyoni y’amahera yinjiye muri Bitcoin, bigaragaza ko abakoresha basaba uburyo bwo kwishura BTC. Babonye kandi ko amafaranga yinjizwa ku muntu wese yiyongera 23% mu 2024 ugereranyije na 2023.
  
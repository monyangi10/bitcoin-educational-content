description: |
  Turi hano kugira ngo tuzane Bitcoin kuri bose. Naho ubu ama on-ramps ateye igomwe, azimvye kandi ahanini yubatswe ku bashakashatsi, twizera mu gutanguza umupfunda ukurikira wo kwemera biciye mu kwisamaza no gukorana n’ama on-ramps yubatswe ku bandi bose bakoresha amahera, abaronka amahera n’abazigama.
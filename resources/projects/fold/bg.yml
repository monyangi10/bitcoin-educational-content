description: |
  Ние сме тук, за да предоставим Bitcoin на всички. Докато сегашните рампи са сложни, скъпи и предназначени предимно за спекуланти, ние вярваме, че ще предизвикаме следващата вълна на приемане чрез забавни и ангажиращи рампи, създадени за всички останали, които харчат, печелят и спестяват.
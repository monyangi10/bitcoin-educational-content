description: |
  Bitcoin'ı herkese getirmek için buradayız. Mevcut rampalar karmaşık, pahalı ve öncelikle spekülatörler için inşa edilmiş olsa da, harcayanlar, kazananlar ve tasarruf edenler dışındaki herkes için inşa edilmiş eğlenceli ve ilgi çekici rampalar aracılığıyla bir sonraki benimseme dalgasını başlatmaya inanıyoruz.
description: |
  พวกเราเป็นกลุ่มชาวแอฟริกันจากภูมิภาคต่างๆ ของทวีป ที่รวมตัวกันด้วยความเชื่อว่า Bitcoin ทำให้โลกมีเสรีภาพมากขึ้น เรากำลังทำงานเพื่อส่งเสริมการเคลื่อนไหวเพื่อการยอมรับในแอฟริกา เมื่อเผชิญกับโลกสมัยใหม่ที่เอนเอียงไปทางการเฝ้าระวังและเผด็จการมากขึ้น Bitcoin เป็นเครื่องมือสำคัญสำหรับเราในการรักษาเสรีภาพและความเป็นส่วนตัวของเรา เรามองเห็นอนาคตทางเทคโนโลยีที่แตกต่างจากมุมมองที่เสนอโดย GAFAM ซึ่งทุกคนมีโอกาสที่จะแสดงออกอย่างเสรี อิสระ และปราศจากการเซ็นเซอร์ในโลกไซเบอร์ เราสนับสนุนความยุติธรรม ความเท่าเทียม และความเป็นกลางที่ Bitcoin มอบให้กับประชาชนและบุคคล ด้วยความเชื่อมั่นในบทบาทที่ขาดไม่ได้ของมัน เรามุ่งมั่นสู่อนาคตที่พลเมืองทุกคนของโลกมีการเข้าถึงสกุลเงินที่เป็นธรรมและปลอดจากการบิดเบือนใดๆ เพื่อประโยชน์ส่วนรวม
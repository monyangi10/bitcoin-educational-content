description: |
  Ние сме колектив от африканци от различни региони на континента, обединени от убеждението, че Bitcoin прави света по-свободен. Работим, за да насърчим движение за приемането му в цяла Африка. Изправен пред съвременен свят, който се стреми към все по-голямо наблюдение и тоталитаризъм, Bitcoin представлява за нас важен инструмент за запазване на нашите свободи и личен живот. Предвиждаме технологично бъдеще, в което, за разлика от перспективите, предлагани от GAFAM, всеки има възможност да се изразява свободно, автономно и без цензура в киберпространството. Ние се застъпваме за справедливостта, равенството и неутралността, които Bitcoin осигурява на народите и хората. Убедени в нейната незаменима роля, ние се ангажираме с бъдеще, в което всеки гражданин на света се радва на равноправен достъп до валута, неподвластна на каквато и да е форма на манипулация, в името на общото благо.
  
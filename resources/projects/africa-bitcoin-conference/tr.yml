description: |
  Bizler, Bitcoin'ın dünyayı daha özgür kıldığı inancıyla birleşmiş, kıtanın çeşitli bölgelerinden gelen Afrikalılardan oluşan bir kolektifiz. Afrika genelinde benimsenmesi için bir hareketi teşvik etmeye çalışıyoruz. Daha fazla gözetim ve totalitarizme yönelen modern bir dünya ile karşı karşıya olan Bitcoin, bizim için özgürlüklerimizi ve mahremiyetimizi korumak için çok önemli bir aracı temsil ediyor. GAFAM tarafından sunulan perspektiflerin aksine, herkesin siber uzayda kendini özgürce, özerk bir şekilde ve sansür olmaksızın ifade etme fırsatına sahip olduğu teknolojik bir gelecek tasavvur ediyoruz. Bitcoin'ın halklara ve bireylere sağladığı adalet, eşitlik ve tarafsızlığı savunuyoruz. Para biriminin vazgeçilmez rolüne inanarak, her dünya vatandaşının, kamu yararı için her türlü manipülasyona karşı bağışık bir para birimine eşit erişim hakkına sahip olduğu bir geleceğe bağlıyız.
  
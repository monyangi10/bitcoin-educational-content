description: |
  Wij zijn een collectief van Afrikanen uit verschillende regio's van het continent, verenigd door de overtuiging dat Bitcoin de wereld vrijer maakt. We werken aan een beweging voor de adoptie ervan in heel Afrika. Geconfronteerd met een moderne wereld die neigt naar meer bewaking en totalitarisme, vertegenwoordigt Bitcoin voor ons een cruciaal hulpmiddel voor het behoud van onze vrijheden en privacy. Wij zien een technologische toekomst voor ons waarin, in tegenstelling tot de perspectieven van de GAFAM, iedereen de mogelijkheid heeft om zich vrij, autonoom en zonder censuur te uiten in cyberspace. Wij pleiten voor de rechtvaardigheid, gelijkheid en neutraliteit die Bitcoin biedt aan volkeren en individuen. Overtuigd van haar onmisbare rol, zetten wij ons in voor een toekomst waarin elke wereldburger gelijke toegang heeft tot een munteenheid die immuun is voor elke vorm van manipulatie, voor het algemeen welzijn.
  
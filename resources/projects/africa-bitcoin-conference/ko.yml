description: |
  우리는 아프리카 대륙의 다양한 지역에서 온 아프리카 사람들이 모여 Bitcoin가 세상을 더 자유롭게 만든다는 신념으로 뭉쳤습니다. 우리는 아프리카 전역에 Bitcoin을 도입하기 위한 운동을 촉진하기 위해 노력하고 있습니다. 감시와 전체주의로 치닫는 현대 사회에서 Bitcoin은 우리의 자유와 프라이버시를 지키기 위한 중요한 도구가 될 것입니다. 우리는 GAFAM이 제시하는 관점과 달리 모든 사람이 사이버 공간에서 검열 없이 자유롭고 자율적으로 자신을 표현할 기회를 갖는 기술적 미래를 상상합니다. 우리는 Bitcoin가 국민과 개인에게 제공하는 정의, 평등, 중립성을 옹호합니다. 디지털 화폐의 필수적인 역할을 확신하며, 전 세계 모든 시민이 공동의 이익을 위해 어떤 형태의 조작에도 영향을 받지 않는 공평한 통화에 대한 접근성을 누릴 수 있는 미래를 위해 최선을 다하고 있습니다.
  
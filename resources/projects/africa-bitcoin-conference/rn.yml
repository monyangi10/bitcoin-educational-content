description: |
  Turi umuryango w’abanyafirika bava mu turere dutandukanye tw’umugabane, twunze ubumwe n’ukwemera ko Bitcoin ituma isi yidegemvya. Turakora kugira ngo duteze imbere umuhari wo kwemerwa muri Afirika yose. Mu gihe isi ya none yiheka ku gucungera cane no ku butegetsi bw’agahomerabunwa, Bitcoin iduserukira igikoresho gihambaye co kuzigama umwidegemvyo wacu n’ubuzima bwite bwacu. Turabona mu ciyumviro kazoza k’ubuhinga aho, bitandukanye n’ivyo GAFAM itanga, umuntu wese azoronka akaryo ko guserura ivyiyumviro vyiwe mu mwidegemvyo, yigenga, kandi ata n’umwe amusuzumye ku mbuga ngurukanabumenyi. Turaburanira ubutungane, uburinganire n’ukutagira aho twehamiye Bitcoin itanga ku bantu no ku bantu ku giti cabo. Twemera uruhara rwayo rudakenewe, twiyemeje kazoza aho umunyagihugu wese wo kw’isi azoronka mu buryo bubereye amafaranga adashobora gukoreshwa nabi, ku bw’ineza ya bose.
  
description: |
  Aplikacja mobilna typu open source do kupowania i sprzedawania Bitcoin na zasadzie peer-to-peer, bez weryfikacji tożsamości (KYC). Oferuje ona anonimowe, bezpieczne i szyfrowane środowisko, w którym użytkownicy mogą bezpośrednio wymieniać się Exchange za pośrednictwem zdecentralizowanej sieci społecznościowej opartej na ich rzeczywistych kontaktach. Żadne dane osobowe nie są przechowywane, a każdy profil publiczny jest unikalny dla każdej transakcji.
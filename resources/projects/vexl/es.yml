description: |
  Aplicación móvil de código abierto para comprar y vender Bitcoin de igual a igual, sin verificación de identidad (KYC). Ofrece un entorno anónimo, seguro y cifrado de extremo a extremo, donde los usuarios pueden Exchange directamente entre sí a través de una red social descentralizada basada en sus contactos de la vida real. No se almacena ningún dato personal, y cada perfil público es único para cada transacción.
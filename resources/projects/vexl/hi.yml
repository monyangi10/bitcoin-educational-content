description: |
  पहचान सत्यापन (KYC) के बिना, पीयर-टू-पीयर आधार पर Bitcoin खरीदने और बेचने के लिए ओपन सोर्स मोबाइल एप्लिकेशन। यह एक गुमनाम, सुरक्षित और एंड-टू-एंड एन्क्रिप्टेड वातावरण प्रदान करता है, जहाँ उपयोगकर्ता अपने वास्तविक संपर्कों के आधार पर एक विकेन्द्रीकृत सोशल नेटवर्क के माध्यम से एक-दूसरे के साथ सीधे Exchange कर सकते हैं। कोई व्यक्तिगत डेटा संग्रहीत नहीं किया जाता है, और प्रत्येक सार्वजनिक प्रोफ़ाइल प्रत्येक लेनदेन के लिए अद्वितीय होती है।
description: |
  Mobilapplikation med öppen källkod för köp och försäljning av Bitcoin på peer-to-peer-basis, utan identitetsverifiering (KYC). Den erbjuder en anonym, säker och end-to-end-krypterad miljö där användare kan göra Exchange direkt med varandra via ett decentraliserat socialt nätverk baserat på deras kontakter i verkliga livet. Inga personuppgifter lagras och varje offentlig profil är unik för varje transaktion.
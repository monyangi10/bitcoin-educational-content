description: |
  Мобильное приложение с открытым исходным кодом для покупки и продажи Bitcoin на одноранговой основе, без проверки личности (KYC). Оно предлагает анонимную, безопасную и сквозную зашифрованную среду, где пользователи могут напрямую обмениваться Exchange друг с другом через децентрализованную социальную сеть, основанную на их контактах в реальной жизни. Никакие личные данные не хранятся, а каждый публичный профиль уникален для каждой транзакции.
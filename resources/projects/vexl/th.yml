description: |
  แอปพลิเคชันมือถือโอเพ่นซอร์สสำหรับการซื้อขาย Bitcoin แบบเพียร์ทูเพียร์ โดยไม่ต้องยืนยันตัวตน (KYC) มอบสภาพแวดล้อมที่ไม่ระบุตัวตน ปลอดภัย และเข้ารหัสแบบ end-to-end ซึ่งผู้ใช้สามารถแลกเปลี่ยนกันโดยตรงผ่านเครือข่ายสังคมแบบกระจายศูนย์ที่อิงตามผู้ติดต่อในชีวิตจริงของพวกเขา ไม่มีการจัดเก็บข้อมูลส่วนบุคคล และแต่ละโปรไฟล์สาธารณะจะไม่ซ้ำกันในแต่ละธุรกรรม
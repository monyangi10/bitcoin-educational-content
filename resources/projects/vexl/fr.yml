description: |
  Application mobile open source qui permet d’acheter et de vendre du bitcoin en pair-à-pair, sans vérification d’identité (KYC). Elle offre un environnement anonyme, sécurisé et chiffré de bout en bout, où les utilisateurs peuvent échanger directement entre eux via un réseau social décentralisé fondé sur leurs contacts réels. Aucune donnée personnelle n’est stockée, et chaque profil public est unique à chaque transaction.
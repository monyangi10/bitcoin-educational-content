description: |
  Open-Source-Mobilanwendung für den Kauf und Verkauf von Bitcoin auf Peer-to-Peer-Basis, ohne Identitätsprüfung (KYC). Sie bietet eine anonyme, sichere und Ende-zu-Ende-verschlüsselte Umgebung, in der Nutzer über ein dezentrales soziales Netzwerk, das auf ihren realen Kontakten basiert, direkt miteinander Exchange tauschen können. Es werden keine persönlichen Daten gespeichert, und jedes öffentliche Profil ist für jede Transaktion einzigartig.
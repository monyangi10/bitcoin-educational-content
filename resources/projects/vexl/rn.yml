description: |
  Porogaramu y’urubuga rwuguruye yo kugura no kugurisha Bitcoin ku buryo bw’urunganwe, ata kugenzura akaranga (KYC). Itanga ikibanza kitazwi, gitekanye kandi gifise amakuru y’iherezo, aho abakoresha bashobora Exchange ataco baciyeko biciye ku rubuga rw’imigenderanire rwigenga rushingiye ku bantu bahuriyeko mu buzima nyakuri. Nta makuru y’umuntu ku giti ciwe abikwa, kandi urutonde rw’abantu bose ni rwihariye ku bijanye n’ugucuruza kwose.
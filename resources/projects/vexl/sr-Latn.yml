description: |
  Mobilna aplikacija otvorenog koda za kupovinu i prodaju Bitcoin na peer-to-peer osnovi, bez verifikacije identiteta (KYC). Nudi anonimno, sigurno i end-to-end šifrovano okruženje, gde korisnici mogu Exchange direktno jedni s drugima putem decentralizovane društvene mreže zasnovane na njihovim stvarnim kontaktima. Nema skladištenja ličnih podataka, a svaki javni profil je jedinstven za svaku transakciju.
description: |
  Aplikasi seluler sumber terbuka untuk membeli dan menjual Bitcoin secara peer-to-peer, tanpa verifikasi identitas (KYC). Menawarkan lingkungan yang anonim, aman, dan terenkripsi secara end-to-end, di mana pengguna dapat melakukan Exchange secara langsung satu sama lain melalui jaringan sosial yang terdesentralisasi berdasarkan kontak kehidupan nyata mereka. Tidak ada data pribadi yang disimpan, dan setiap profil publik unik untuk setiap transaksi.
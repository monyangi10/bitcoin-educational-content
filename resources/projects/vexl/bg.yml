description: |
  Мобилно приложение с отворен код за купуване и продаване на Bitcoin на принципа "peer-to-peer", без проверка на самоличността (KYC). То предлага анонимна, сигурна и криптирана от край до край среда, в която потребителите могат да обменят директно помежду си чрез децентрализирана социална мрежа, базирана на контактите им в реалния живот. Не се съхраняват никакви лични данни, а всеки публичен профил е уникален за всяка транзакция.
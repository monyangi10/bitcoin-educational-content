description: |
  برنامه موبایل متن‌باز برای خرید و فروش Bitcoin به صورت همتا به همتا، بدون تأیید هویت (KYC). این برنامه محیطی ناشناس، امن و رمزگذاری شده از مبدا تا مقصد ارائه می‌دهد، جایی که کاربران می‌توانند به طور مستقیم از طریق یک شبکه اجتماعی غیرمتمرکز مبتنی بر تماس‌های واقعی خود با یکدیگر Exchange کنند. هیچ داده شخصی ذخیره نمی‌شود و هر پروفایل عمومی برای هر تراکنش منحصر به فرد است.
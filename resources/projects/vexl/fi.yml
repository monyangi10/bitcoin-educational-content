description: |
  Avoimen lähdekoodin mobiilisovellus Bitcoin:n ostamiseen ja myymiseen vertaisverkkopohjaisesti ilman henkilöllisyyden tarkistamista (KYC). Se tarjoaa anonyymin, turvallisen ja päästä päähän salatun ympäristön, jossa käyttäjät voivat käyttää Exchange:ta suoraan toistensa kanssa hajautetun sosiaalisen verkoston kautta, joka perustuu heidän reaalielämän kontakteihinsa. Henkilötietoja ei tallenneta, ja jokainen julkinen profiili on ainutlaatuinen jokaisessa tapahtumassa.
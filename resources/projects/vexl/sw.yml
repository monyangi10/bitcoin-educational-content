description: |
  Programu huria ya simu ya mkononi ya kununua na kuuza Bitcoin kwa misingi ya rika-kwa-rika, bila uthibitishaji wa utambulisho (KYC). Inatoa mazingira yasiyojulikana, salama na yaliyosimbwa kutoka mwisho hadi mwisho, ambapo watumiaji wanaweza Exchange moja kwa moja kupitia mtandao wa kijamii uliogatuliwa kulingana na anwani zao za maisha halisi. Hakuna data ya kibinafsi iliyohifadhiwa, na kila wasifu wa umma ni wa kipekee kwa kila shughuli.
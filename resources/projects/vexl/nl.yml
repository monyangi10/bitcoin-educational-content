description: |
  Open source mobiele applicatie voor het kopen en verkopen van Bitcoin op peer-to-peer basis, zonder identiteitsverificatie (KYC). Het biedt een anonieme, veilige en end-to-end versleutelde omgeving, waar gebruikers Exchange direct met elkaar kunnen uitwisselen via een gedecentraliseerd sociaal netwerk gebaseerd op hun echte contacten. Er worden geen persoonlijke gegevens opgeslagen en elk openbaar profiel is uniek voor elke transactie.
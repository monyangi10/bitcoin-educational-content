description: |
  Ứng dụng di động nguồn mở cho phép mua bán Bitcoin trên nền tảng ngang hàng, không cần xác minh danh tính (KYC). Ứng dụng cung cấp một môi trường ẩn danh, an toàn và được mã hóa đầu cuối, nơi người dùng có thể giao dịch trực tiếp với nhau thông qua mạng xã hội phi tập trung dựa trên thông tin liên hệ thực tế của họ. Không có dữ liệu cá nhân nào được lưu trữ, và mỗi hồ sơ công khai là duy nhất cho mỗi giao dịch.
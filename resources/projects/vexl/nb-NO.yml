description: |
  Mobilapplikasjon med åpen kildekode for kjøp og salg av Bitcoin på peer-to-peer-basis, uten identitetsverifisering (KYC). Den tilbyr et anonymt, sikkert og ende-til-ende-kryptert miljø, der brukerne kan Exchange direkte med hverandre via et desentralisert sosialt nettverk basert på deres virkelige kontakter. Ingen personopplysninger lagres, og hver offentlige profil er unik for hver transaksjon.
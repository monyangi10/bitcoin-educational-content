description: |
  Avatud lähtekoodiga mobiilirakendus Bitcoin ostmiseks ja müümiseks peer-to-peer põhimõttel, ilma isikusamasuse kontrollimiseta (KYC). See pakub anonüümset, turvalist ja läbivalt krüpteeritud keskkonda, kus kasutajad saavad Exchange otse üksteisega detsentraliseeritud sotsiaalvõrgustiku kaudu, mis põhineb nende reaalsetel kontaktidel. Isikuandmeid ei salvestata ja iga avalik profiil on iga tehingu puhul ainulaadne.
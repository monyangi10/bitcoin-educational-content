description: |
  Open source mobilní aplikace pro nákup a prodej Bitcoin na bázi peer-to-peer bez ověřování totožnosti (KYC). Nabízí anonymní, bezpečné a end-to-end šifrované prostředí, kde mohou uživatelé Exchange přímo mezi sebou komunikovat prostřednictvím decentralizované sociální sítě založené na jejich reálných kontaktech. Neukládají se žádné osobní údaje a každý veřejný profil je pro každou transakci jedinečný.
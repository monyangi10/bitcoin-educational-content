description: |
  Applicazione mobile open source per l'acquisto e la vendita di Bitcoin su base peer-to-peer, senza verifica dell'identità (KYC). Offre un ambiente anonimo, sicuro e crittografato end-to-end, in cui gli utenti possono scambiarsi Exchange direttamente tramite una rete sociale decentralizzata basata sui loro contatti reali. Nessun dato personale viene memorizzato e ogni profilo pubblico è unico per ogni transazione.
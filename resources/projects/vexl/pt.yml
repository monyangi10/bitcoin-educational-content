description: |
  Aplicação móvel de código aberto para compra e venda de Bitcoin numa base peer-to-peer, sem verificação de identidade (KYC). Oferece um ambiente anónimo, seguro e encriptado de ponta a ponta, em que os utilizadores podem Exchange diretamente uns com os outros através de uma rede social descentralizada baseada nos seus contactos da vida real. Não são armazenados quaisquer dados pessoais e cada perfil público é único para cada transação.
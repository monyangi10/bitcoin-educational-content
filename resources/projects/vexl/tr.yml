description: |
  Kimlik doğrulaması (KYC) olmadan eşler arası bazda Bitcoin alım satımı için açık kaynaklı mobil uygulama. Kullanıcıların gerçek hayattaki bağlantılarına dayalı merkezi olmayan bir sosyal ağ aracılığıyla doğrudan birbirleriyle Exchange yapabilecekleri anonim, güvenli ve uçtan uca şifrelenmiş bir ortam sunar. Hiçbir kişisel veri saklanmaz ve her genel profil her işlem için benzersizdir.
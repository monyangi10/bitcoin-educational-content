description: |
   Bridge Sats Academy ni igice c’amahugurwa ca Bridge Sats SARL, ishirahamwe ryo muri Kongo ry’i Goma ryitaho gutegura ibiraro hagati y’isi y’ubuhinga bwa none n’ubuzima nyakuri. Ishure ryacu ritanga inyigisho mu buhinga buronderwa cane kw’isoko ry’ubuhinga bwa none, rishimikiye cane ku buryo bukora no ku gukorana n’abahinga mu buryo butaziguye.
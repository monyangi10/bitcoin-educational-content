description: |
  An exclusive invite-only gathering of Bitcoin and Lightning Network innovators held annually in Viareggio, Italy. The summit brings together the brightest minds shaping Bitcoin's Layer-2 ecosystem for structured sessions in the morning and participant-led unconference discussions in the afternoon. Set against the stunning Tuscan coast, it provides an intimate setting for meaningful collaboration among industry pioneers focusing on Lightning, Spark, Ark, RGB, and Bitcoin Layer 2 technologies.

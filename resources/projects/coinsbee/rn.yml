description: |
  Urubuga mpuzamakungu rwo kugura ubwo nyene amakarita y’ingabirano n’ugushiramwo amafaranga kuri telefone ngendanwa bivuye mu bihugu birenga 5.000 mu bihugu 185, hakoreshejwe amafaranga arenga 200 canke ubundi buryo bwo kwishura, rutanga ubuhinga bwihuta, butekanye kandi bushikira abakoresha bose ba Bitcoin.
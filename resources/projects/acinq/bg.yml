description: |
  Основана през 2014 г., ACINQ е френски стартъп, който създава продукти и услуги за екосистемата Bitcoin. Базираме се в Париж, Франция.
  
  От 2015 г. допринасяме за протокола Lightning и го надграждаме. Нашата основна технологична основа е eclair - пълна реализация на Lightning с фокус върху производителността и надеждността.
  
  ACINQ е основен оператор и доставчик на ликвидност в Lightning Network. Ние управляваме най-големия възел в мрежата, където използваме експертния си опит в областта на Lightning.
  
  Също така сме разработчици на Phoenix, авангардна самозадържаща се Bitcoin Lightning wallet.
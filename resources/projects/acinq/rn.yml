description: |
  Yashinzwe mu mwaka w’2014, ACINQ ni ishirahamwe ry’abafaransa ryubatse ibintu n’ibikorwa vy’ibidukikije vya Bitcoin. Turaba i Paris mu Bufaransa.
  
  Twaramaze gutanga umusanzu no kwubaka ku masezerano ya Lightning kuva mu 2015. Umushinge wacu nyamukuru w’ubuhinga ni eclair, ugushirwa mu ngiro kwuzuye kwa Lightning kwibanda ku bushobozi no kwizigirwa.
  
  ACINQ ni umukoresha mukuru kandi atanga amafaranga kuri Lightning Network. Turakoresha node nini kuruta izindi zose ku rubuga aho dukoresha ubuhinga bwacu bwa Lightning.
  
  Ni twebwe kandi twateguye Phoenix, igikoresho co kwikingira c'ubuhinga bwa none Bitcoin Lightning Wallet.
description: |
  ก่อตั้งขึ้นในปี 2014 ACINQ เป็นสตาร์ทอัพจากฝรั่งเศสที่สร้างผลิตภัณฑ์และบริการสำหรับระบบนิเวศ Bitcoin เราตั้งอยู่ในปารีส ประเทศฝรั่งเศส
  
  เราได้มีส่วนร่วมและพัฒนาต่อยอดจากโปรโตคอล Lightning ตั้งแต่ปี 2015 พื้นฐานทางเทคโนโลยีหลักของเราคือ eclair ซึ่งเป็นการนำ Lightning ไปใช้อย่างเต็มรูปแบบโดยเน้นที่ประสิทธิภาพและความน่าเชื่อถือ
  
  ACINQ เป็นผู้ดำเนินการหลักและผู้ให้บริการสภาพคล่องบน Lightning Network เราดำเนินการโหนดที่ใหญ่ที่สุดในเครือข่ายซึ่งเราใช้ประโยชน์จากความเชี่ยวชาญของเราในด้าน Lightning
  
  เรายังเป็นผู้พัฒนา Phoenix ซึ่งเป็น wallet Lightning Bitcoin แบบควบคุมตนเองที่ล้ำสมัยอีกด้วย
description: |
  2014 yılında kurulan ACINQ, Bitcoin ekosistemi için ürün ve hizmetler geliştiren bir Fransız girişimidir. Merkezimiz Paris, Fransa'da bulunmaktadır.
  
  2015'ten beri Lightning protokolüne katkıda bulunuyor ve bu protokolü geliştiriyoruz. Temel teknolojik dayanağımız, performans ve güvenilirliğe odaklanan Lightning'in tam bir uygulaması olan eclair'dir.
  
  ACINQ, Lightning Network'da önemli bir operatör ve likidite sağlayıcısıdır. Ağdaki en büyük düğümü yönetiyoruz ve burada Lightning uzmanlığımızdan yararlanıyoruz.
  
  Ayrıca, son teknoloji ürünü kendi kendine gözetim sağlayan bir Bitcoin Lightning Wallet olan Phoenix'in geliştiricileriyiz.
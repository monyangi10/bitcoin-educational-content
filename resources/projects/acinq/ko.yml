description: |
  2014년에 설립된 ACINQ는 Bitcoin 생태계를 위한 제품과 서비스를 개발하는 프랑스 스타트업입니다. 프랑스 파리에 본사를 두고 있습니다.
  
  2015년부터 라이트닝 프로토콜에 기여하고 이를 기반으로 구축해 왔습니다. 당사의 핵심 기술 기반은 성능과 안정성에 중점을 두고 라이트닝을 완벽하게 구현한 에클레어입니다.
  
  ACINQ는 Lightning Network의 주요 운영자이자 유동성 공급자입니다. 당사는 네트워크에서 가장 큰 규모의 노드를 운영하며 라이트닝에 대한 전문성을 활용하고 있습니다.
  
  또한 최첨단 자체 관리형 Bitcoin 라이트닝 Wallet인 Phoenix의 개발자이기도 합니다.
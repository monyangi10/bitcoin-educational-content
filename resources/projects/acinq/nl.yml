description: |
  ACINQ, opgericht in 2014, is een Franse startup die producten en diensten ontwikkelt voor het Bitcoin ecosysteem. We zijn gevestigd in Parijs, Frankrijk.
  
  Sinds 2015 werken we aan en bouwen we verder aan het Lightning-protocol. Onze technologische basis is eclair, een volledige implementatie van Lightning met een focus op prestaties en betrouwbaarheid.
  
  ACINQ is een belangrijke operator en liquiditeitsverschaffer op de Lightning Network. We runnen het grootste knooppunt op het netwerk waar we onze expertise van Lightning inzetten.
  
  We zijn ook de ontwikkelaars van Phoenix, een geavanceerde zelf-custodial Bitcoin Lightning Wallet.
description: |
  BitPolito ni umugwi w’abanyeshure bo muri Politecnico di Torino wihuse kwishingira intahe nk’umwe mu migambi ihambaye y’Ubutaliyano ya Bitcoin. Intumbero ni uguhuza amashure yisumbuye n’inganda za Bitcoin. Mu myaka ine kuva yashingwa, BitPolito yarateye imbere cane kandi iguma yiyemeje guteza imbere ugutahura n’ukumenya Bitcoin.
  
  BitPolito yibanda ku bijanye n’ubuhinga n’imibano, mu gihe yirinda ingingo z’ishoramari, ibikorwa vya BitPolito biva ku buhinga bwa mudasobwa n’ubushakashatsi n’iterambere ry’imibare gushika ku burezi biciye mu nyigisho n’ibirori bitandukanye. Iryo tsinda risohora ibintu vy’inyigisho bihuza uburyo bwa siyansi n’uburyo bw’urubyiruko, rikaba rifise abayoboke barenga 6.000 ku mbuga zose z’ubudandaji.
  
  Mu migambi yayo y'inyigisho, iyaroraniwe cane ni 'BitGeneration', urutonde rw'inyigisho z'amashure yisumbuye zitanga inyishu ikomeye kuri Bitcoin. Ikindi, BitPolito irateza imbere amahugurwa yo mu mutima, igatuma abayigize bashobora kwongerera ubumenyi no gukorana n’amashirahamwe yo muri urwo rwego. Iryo tsinda ritanga umusanzu mu migambi ya FOSS mu kibanza ca Bitcoin, ritanga ubumenyi bujanye n’imigambi itoroshe yo mu isi nyakuri. Ikindi kandi, abanywanyi bararonka vyoroshe porogarama z’inyigisho zo hanze za Bitcoin, ivyigwa vy’ishirahamwe, ivyigwa vyo kwimenyereza n’amahirwe y’akazi.
  
  BitPolito ikoresheje ivyiyumviro biva ku muhari wa 'Cypherpunk', isangira agaciro k'umwidegemvyo, ubuzima bwite, n'ingingo ngenderwako z'inkomoko yuguruye. Iryo tsinda rikorana n’inzego z’ubutegetsi, ubudandaji, n’imiryango yo mu nzego za Leta n’iz’abikorera ku giti cabo, rivuga ko ubuhinga bukoreshwa ku buntu kandi mu buryo bubereye.
  
  Ubu, BitPolito igizwe n’abanywanyi bagera kuri 50 bakora cane, ahanini abanyeshure bo muri Polytechnic, ariko kandi n’abakiri bato bava mu mice itandukanye. Abantu barenga 120 baragize uruhara muri BitPolito, 10 ubu bakora mu gisata ca Bitcoin. Iryo tsinda rifise intumbero yo kwongerera ubushobozi bwaryo kw’isi yose mu gihe riguma rigira ingaruka zikomeye mu gihugu.
  
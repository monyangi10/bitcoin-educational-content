description: |
  BitPolito is een studententeam aan de Politecnico di Torino dat zich snel heeft gevestigd als een van de toonaangevende Bitcoin initiatieven van Italië. De missie is om een brug te slaan tussen de academische wereld en de Bitcoin industrie. In de vier jaar sinds de oprichting heeft BitPolito een aanzienlijke groei doorgemaakt en blijft het toegewijd aan het bevorderen van een dieper begrip en bewustzijn van Bitcoin.
  
  BitPolito richt zich op zowel technologische als sociale aspecten, maar vermijdt investeringsonderwerpen. De activiteiten van BitPolito variëren van computerwetenschappelijke en wiskundige R&D tot onderwijs door middel van verschillende cursussen en evenementen. Het team publiceert educatieve content die een wetenschappelijke benadering combineert met een jeugdige stijl en heeft meer dan 6000 volgers op alle sociale platforms.
  
  Van de educatieve initiatieven is 'BitGeneration' het meest succesvol, een serie lezingen voor middelbare scholen die een solide overzicht van Bitcoin geeft. Daarnaast promoot BitPolito interne trainingen, zodat leden hun kennis kunnen vergroten en in contact kunnen komen met bedrijven in de sector. Het team draagt actief bij aan FOSS-projecten in de Bitcoin-ruimte en biedt praktijkervaring met uitdagende projecten in de echte wereld. Bovendien hebben leden gemakkelijker toegang tot externe Bitcoin onderwijsprogramma's, bedrijfsscripties, stages en vacatures.
  
  BitPolito is geïnspireerd door de Cypherpunk-beweging en deelt de waarden van vrijheid, privacy en open-sourceprincipes. Het team werkt samen met institutionele entiteiten, bedrijven en organisaties in zowel de publieke als private sector en pleit voor een vrij en verantwoord gebruik van technologie.
  
  Op dit moment bestaat BitPolito uit ongeveer 50 actieve leden, voornamelijk studenten van de Polytechnic, maar ook jonge mensen met verschillende achtergronden. Meer dan 120 personen zijn betrokken geweest bij BitPolito, waarvan er 10 nu werken in de Bitcoin industrie. Het team wil zijn internationale aanwezigheid vergroten en tegelijkertijd lokaal een grote impact blijven hebben.
  
description: |
  BitPolito е студентски екип от Политехническия университет в Торино, който бързо се утвърди като една от водещите инициативи на Bitcoin в Италия. Мисията му е да свърже академичните среди с индустрията на Bitcoin. През четирите години от основаването си BitPolito отбеляза значителен растеж и продължава да се стреми да насърчава по-дълбокото разбиране и осведоменост за Bitcoin.
  
  Фокусирайки се както върху технологичните, така и върху социалните аспекти, като същевременно избягва инвестиционните теми, дейностите на BitPolito варират от компютърни науки и математическа научноизследователска и развойна дейност до образование чрез различни курсове и събития. Екипът публикува образователно съдържание, което съчетава научен подход с младежки стил, като може да се похвали с над 6000 последователи във всички социални платформи.
  
  Сред образователните му инициативи най-успешна е "BitGeneration" - поредица от лекции за средните училища, която предоставя солиден преглед на Bitcoin. Освен това BitPolito насърчава вътрешното обучение, като дава възможност на членовете си да повишат знанията си и да се свържат с компании в сектора. Екипът активно допринася за проекти на FOSS в областта на Bitcoin, като предлага практически опит с предизвикателни реални проекти. Освен това членовете имат по-лесен достъп до външни образователни програми за Bitcoin, корпоративни дисертации, стажове и възможности за работа.
  
  Черпейки вдъхновение от движението "Cypherpunk", BitPolito споделя ценностите на свободата, неприкосновеността на личния живот и принципите на отворения код. Екипът си сътрудничи с институционални структури, предприятия и организации както в публичния, така и в частния сектор, като се застъпва за свободното и отговорно използване на технологиите.
  
  Понастоящем BitPolito се състои от около 50 активни членове, предимно студенти от Политехниката, но също и млади хора от различни среди. Повече от 120 души са участвали в BitPolito, като 10 от тях сега работят в индустрията на Bitcoin. Екипът има за цел да увеличи международното си присъствие, като същевременно продължи да оказва значително въздействие на местно ниво.
  
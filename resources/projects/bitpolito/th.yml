description: |
  BitPolito เป็นทีมของนักศึกษาที่ Politecnico di Torino ซึ่งได้สร้างชื่อเสียงอย่างรวดเร็วในฐานะหนึ่งในโครงการ Bitcoin ชั้นนำของอิตาลี ภารกิจคือการเชื่อมโยงระหว่างวงการวิชาการและอุตสาหกรรม Bitcoin ในช่วงสี่ปีนับตั้งแต่ก่อตั้ง BitPolito ได้เติบโตอย่างมีนัยสำคัญและยังคงมุ่งมั่นที่จะส่งเสริมความเข้าใจและการรับรู้ที่ลึกซึ้งยิ่งขึ้นเกี่ยวกับ Bitcoin
  
  โดยมุ่งเน้นทั้งด้านเทคโนโลยีและสังคม ในขณะที่หลีกเลี่ยงหัวข้อการลงทุน กิจกรรมของ BitPolito ครอบคลุมตั้งแต่การวิจัยและพัฒนาด้านวิทยาการคอมพิวเตอร์และคณิตศาสตร์ไปจนถึงการศึกษา ผ่านหลักสูตรและกิจกรรมต่างๆ ทีมงานเผยแพร่เนื้อหาการศึกษาที่ผสมผสานวิธีการทางวิทยาศาสตร์กับสไตล์ที่เยาว์วัย มีผู้ติดตามมากกว่า 6,000 คนในทุกแพลตฟอร์มโซเชียล
  
  ในบรรดาโครงการการศึกษาของพวกเขา 'BitGeneration' เป็นโครงการที่ประสบความสำเร็จมากที่สุด ซึ่งเป็นชุดของการบรรยายสำหรับโรงเรียนมัธยมที่ให้ภาพรวมที่ชัดเจนของ Bitcoin นอกจากนี้ BitPolito ยังส่งเสริมการฝึกอบรมภายใน ช่วยให้สมาชิกเพิ่มพูนความรู้และเชื่อมต่อกับบริษัทในภาคส่วนนี้ ทีมงานมีส่วนร่วมอย่างแข็งขันในโครงการ FOSS ในพื้นที่ Bitcoin มอบประสบการณ์จริงกับโครงการที่ท้าทาย นอกจากนี้ สมาชิกยังสามารถเข้าถึงโปรแกรมการศึกษา Bitcoin ภายนอก วิทยานิพนธ์ของบริษัท การฝึกงาน และโอกาสในการทำงานได้ง่ายขึ้น
  
  ได้รับแรงบันดาลใจจากการเคลื่อนไหว 'Cypherpunk' BitPolito แบ่งปันค่านิยมของเสรีภาพ ความเป็นส่วนตัว และหลักการโอเพ่นซอร์ส ทีมงานร่วมมือกับหน่วยงานสถาบัน ธุรกิจ และองค์กรในทั้งภาครัฐและเอกชน สนับสนุนการใช้เทคโนโลยีอย่างเสรีและมีความรับผิดชอบ
  
  ปัจจุบัน BitPolito ประกอบด้วยสมาชิกที่กระตือรือร้นประมาณ 50 คน ส่วนใหญ่เป็นนักศึกษาจาก Polytechnic แต่ยังรวมถึงเยาวชนจากหลากหลายภูมิหลัง มีบุคคลมากกว่า 120 คนที่มีส่วนร่วมกับ BitPolito โดยมี 10 คนที่ทำงานในอุตสาหกรรม Bitcoin ทีมงานมีเป้าหมายที่จะเพิ่มการปรากฏตัวในระดับนานาชาติในขณะที่ยังคงสร้างผลกระทบอย่างมีนัยสำคัญในท้องถิ่น
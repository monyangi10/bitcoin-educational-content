description: |
  BTC in D.C. เป็นการประชุมประจำปีที่จัดขึ้นในกรุงวอชิงตัน ดี.ซี. โดยมุ่งเน้นที่จุดตัดระหว่าง Bitcoin และนโยบายสาธารณะ งานนี้รวบรวมผู้นำในอุตสาหกรรม ผู้กำหนดนโยบาย และผู้ที่สนใจเพื่อหารือเกี่ยวกับอนาคตของ Bitcoin ภายในกรอบการกำกับดูแลและการเมืองของสหรัฐอเมริกา ฉบับปี 2025 สัญญาว่าจะกล่าวถึงหัวข้อสำคัญ เช่น การกำกับดูแลสกุลเงินดิจิทัล การยอมรับในระดับสถาบัน และนวัตกรรมทางเทคโนโลยีภายในระบบนิเวศของ Bitcoin นอกจากการอภิปรายบนเวทีหลักแล้ว การประชุมยังคาดว่าจะมีการจัดเวิร์กช็อป การอภิปรายแบบคณะ และโอกาสในการสร้างเครือข่ายสำหรับผู้เข้าร่วมประชุม
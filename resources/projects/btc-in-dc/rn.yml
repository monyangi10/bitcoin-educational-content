description: |
  BTC i D.C. ni inama iba buri mwaka i Washington, D.C., yibanda ku guhura kwa Bitcoin n’ingingo za Leta. Ico gikorwa gihuza abarongozi b’inganda, abashinga amategeko, n’abakunda ivy’ubuhinga bwa none kugira ngo baganire ku bijanye n’akazoza ka Bitcoin mu bijanye n’amategeko n’ivya politike muri Leta Zunze Ubumwe za Amerika. Uretse ibiganiro bibera ku rwego rwo hejuru, iyo nama itegerezwa kubamwo amahugurwa, ibiganiro vy’abahinga, n’uturyo two gukorana n’abazoba bari muri iyo nama.
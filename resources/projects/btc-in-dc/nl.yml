description: |
  BTC in D.C. is een jaarlijkse conferentie in Washington, D.C., gericht op het snijvlak van Bitcoin en overheidsbeleid. Het evenement brengt industrieleiders, beleidsmakers en enthousiastelingen samen om de toekomst van Bitcoin te bespreken binnen het regelgevende en politieke landschap van de Verenigde Staten. De editie van 2025 belooft Address belangrijke onderwerpen zoals de regulering van cryptocurrency, institutionele adoptie en technologische innovaties binnen het Bitcoin ecosysteem. Naast discussies op het hoofdpodium zullen er naar verwachting workshops, paneldiscussies en netwerkmogelijkheden zijn voor deelnemers aan de conferentie.
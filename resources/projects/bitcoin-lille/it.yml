description: |
  Bitcoin Lille è un'associazione senza scopo di lucro ai sensi della legge francese del 1901.
  che riunisce appassionati, professionisti e commercianti del Nord della Francia. Il suo
  obiettivo è quello di aiutare le persone a scoprire e conoscere meglio il Bitcoin
  nell'area di Lille.
  
  A questo scopo, organizziamo incontri mensili gratuiti aperti a tutti
  aperti a tutti, conferenze e workshop presso scuole e università locali
  e presentazioni occasionali per i rivenditori.
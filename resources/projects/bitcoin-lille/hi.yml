description: |
  Bitcoin लिले, 1901 के फ्रांसीसी कानून के तहत एक गैर-लाभकारी संस्था है। जो उत्तरी फ्रांस के उत्साही लोगों, पेशेवरों और व्यापारियों को एक साथ लाती है। इसका उद्देश्य लिले क्षेत्र में लोगों को Bitcoin के बारे में और अधिक जानने और खोजने में मदद करना है।

  इस उद्देश्य से, हम सभी के लिए निःशुल्क मासिक बैठकें सभी के लिए खुली बैठकें, स्थानीय स्कूलों और विश्वविद्यालयों में सम्मेलन और कार्यशालाएँ और खुदरा विक्रेताओं के लिए समय-समय पर प्रस्तुतियाँ आयोजित करते हैं।
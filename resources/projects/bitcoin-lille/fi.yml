description: |
  Bitcoin Lille on voittoa tavoittelematon yhdistys Ranskan vuoden 1901 lain mukaan. joka kokoaa yhteen Pohjois-Ranskan harrastajat, ammattilaiset ja kauppiaat. Sen tavoitteena on auttaa ihmisiä löytämään ja oppimaan lisää Bitcoin:sta lillen alueella.

  Tätä varten järjestämme kaikille avoimia, maksuttomia kuukausittaisia tapaamisia kaikille avoimia konferensseja ja työpajoja paikallisissa kouluissa ja yliopistoissa ja satunnaisia esityksiä jälleenmyyjille.
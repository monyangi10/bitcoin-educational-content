description: |
  Bitcoin Lille ni shirika lisilo la faida chini ya sheria ya Ufaransa ya 1901.
  ambayo huleta pamoja wakereketwa, wataalamu na wafanyabiashara Kaskazini mwa Ufaransa. Yake
  lengo ni kuwasaidia watu kugundua na kujifunza zaidi kuhusu Bitcoin
  katika eneo la Lille.
  
  Kwa ajili hiyo, tunapanga mikutano ya kila mwezi bila malipo iliyo wazi kwa kila mtu
  wazi kwa wote, mikutano na warsha katika shule za mitaa na vyuo vikuu
  na mawasilisho ya mara kwa mara kwa wauzaji reja reja.
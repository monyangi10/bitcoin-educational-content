description: |
  Bitcoin Lille is een vereniging zonder winstoogmerk onder de Franse wet van 1901. die liefhebbers, professionals en handelaars in Noord-Frankrijk samenbrengt. Haar doel is om mensen te helpen Bitcoin te ontdekken en er meer over te leren in de omgeving van Lille.

  Daartoe organiseren we maandelijks gratis bijeenkomsten voor iedereen voor iedereen toegankelijk, conferenties en workshops op plaatselijke scholen en universiteiten en af en toe presentaties voor detailhandelaars.
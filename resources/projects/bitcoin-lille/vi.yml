description: |
  Bitcoin Lille là một hiệp hội phi lợi nhuận hoạt động theo luật của Pháp năm 1901, quy tụ những người đam mê, chuyên gia và thương gia ở miền Bắc nước Pháp. Mục tiêu của hiệp hội là giúp mọi người khám phá và tìm hiểu thêm về Bitcoin
  tại khu vực Lille.
  
  Vì mục đích này, chúng tôi tổ chức các buổi họp hàng tháng miễn phí dành cho tất cả mọi người, các hội nghị và hội thảo tại các trường học và đại học địa phương, và các buổi thuyết trình định kỳ cho các nhà bán lẻ.
description: |
  Bitcoin Lille - это некоммерческая ассоциация, созданная в соответствии с французским законом 1901 года.
  объединяющая энтузиастов, профессионалов и торговцев Северной Франции. Ее
  цель ассоциации - помочь людям найти и узнать больше о Bitcoin
  в районе Лилля.
  
  Для этого мы организуем бесплатные ежемесячные встречи, открытые для всех
  открытые для всех, конференции и семинары в местных школах и университетах
  а также периодические презентации для розничных торговцев.
description: |
  Bitcoin Lille on Prantsusmaa 1901. aasta seaduse alusel asutatud mittetulundusühing. mis ühendab Põhja-Prantsusmaa entusiaste, professionaalid ja kaupmehed. Selle eesmärk on aidata inimestel avastada ja õppida rohkem Bitcoin kohta lille'i piirkonnas.

  Selleks korraldame igakuiseid tasuta kohtumisi, mis on kõigile avatud kõigile avatud konverentse ja töötubasid kohalikes koolides ja ülikoolides ning aeg-ajalt esitlusi jaemüüjatele.
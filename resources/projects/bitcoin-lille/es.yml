description: |
  Bitcoin Lille es una asociación sin ánimo de lucro de derecho francés de 1901 que reúne a aficionados, profesionales y comerciantes del norte de Francia. Su objetivo es ayudar a la gente a descubrir y aprender más sobre Bitcoin en la región de Lille.

  Para ello, organizamos reuniones mensuales gratuitas y abiertas a todos abiertas a todos, conferencias y talleres en escuelas y universidades locales y presentaciones ocasionales para minoristas.
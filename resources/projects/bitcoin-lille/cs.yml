description: |
  Bitcoin Lille je nezisková asociace podle francouzského zákona z roku 1901.
  která sdružuje nadšence, odborníky a obchodníky v severní Francii. Její stránky
  cílem je pomáhat lidem objevovat a dozvídat se více o Bitcoin
  v oblasti Lille.
  
  Za tímto účelem pořádáme každý měsíc bezplatná setkání, která jsou otevřená všem
  přístupné všem, konference a workshopy na místních školách a univerzitách
  a příležitostné prezentace pro prodejce.
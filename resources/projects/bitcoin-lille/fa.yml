description: |
  Bitcoin Lille یک انجمن غیرانتفاعی تحت قانون ۱۹۰۱ فرانسه است. که علاقه‌مندان، حرفه‌ای‌ها و بازرگانان در شمال فرانسه را گرد هم می‌آورد. هدف آن کمک به مردم برای کشف و یادگیری بیشتر درباره Bitcoin در منطقه لیل است.

  به این منظور، ما جلسات ماهانه رایگان برای همه برگزار می‌کنیم که برای همه باز است، کنفرانس‌ها و کارگاه‌هایی در مدارس و دانشگاه‌های محلی و ارائه‌های گاه‌به‌گاه برای خرده‌فروشان.
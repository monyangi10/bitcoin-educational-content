description: |
  Bitcoin Lille je neprofitno udruženje prema francuskom zakonu iz 1901. koje okuplja entuzijaste, profesionalce i trgovce u severnoj Francuskoj. Njegov cilj je pomoći ljudima da otkriju i saznaju više o Bitcoin u oblasti Lila.

  U tu svrhu, organizujemo besplatne mesečne sastanke otvorene za sve, konferencije i radionice u lokalnim školama i univerzitetima i povremene prezentacije za trgovce.
description: |
  Bitcoin Lille er en ideell forening under fransk lov av 1901. som samler entusiaster, fagfolk og kjøpmenn i Nord-Frankrike. Dens mål er å hjelpe folk med å oppdage og lære mer om Bitcoin i Lille-området.

  For å oppnå dette organiserer vi gratis månedlige møter åpne for alle åpne for alle, konferanser og workshops på lokale skoler og universiteter og sporadiske presentasjoner for forhandlere.
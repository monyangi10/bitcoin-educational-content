description: |
  Bitcoin Lille är en ideell förening enligt den franska lagen från 1901. som sammanför entusiaster, yrkesverksamma och handlare i norra Frankrike. Dess mål är att hjälpa människor att upptäcka och lära sig mer om Bitcoin i Lille-området.

  För detta ändamål organiserar vi gratis månadsmöten öppna för alla öppna för alla, konferenser och workshops på lokala skolor och universitet och enstaka presentationer för återförsäljare.
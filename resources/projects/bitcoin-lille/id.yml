description: |
  Bitcoin Lille adalah asosiasi nirlaba di bawah hukum Prancis tahun 1901.
  yang menyatukan para penggemar, profesional, dan pedagang di Prancis Utara. Tujuannya
  tujuannya adalah untuk membantu orang menemukan dan mempelajari lebih lanjut tentang Bitcoin
  di wilayah Lille.
  
  Untuk mencapai tujuan ini, kami menyelenggarakan pertemuan bulanan gratis yang terbuka untuk semua orang
  terbuka untuk semua orang, konferensi dan lokakarya di sekolah dan universitas setempat
  dan presentasi sesekali untuk pengecer.
description: |
  A Bitcoin Lille é uma associação sem fins lucrativos ao abrigo da lei francesa de 1901. que reúne entusiastas, profissionais e comerciantes do Norte de França. O seu o seu objetivo é ajudar as pessoas a descobrir e a conhecer melhor o Bitcoin na região de Lille.

  Para isso, organizamos encontros mensais gratuitos e abertos a todos conferências e workshops nas escolas e universidades locais e apresentações ocasionais para retalhistas.
description: |
  Bitcoin Lille, 1901 Fransız yasalarına göre kar amacı gütmeyen bir dernektir.
  kuzey Fransa'daki meraklıları, profesyonelleri ve tüccarları bir araya getiriyor. Onun
  amaç, insanların Bitcoin'ı keşfetmelerine ve hakkında daha fazla bilgi edinmelerine yardımcı olmaktır
  lille bölgesinde.
  
  Bu amaçla, herkese açık ücretsiz aylık toplantılar düzenliyoruz
  herkese açık, yerel okullarda ve üniversitelerde konferanslar ve atölye çalışmaları
  ve perakendeciler için ara sıra sunumlar.
description: |
  Bitcoin Lille jest stowarzyszeniem non-profit działającym na mocy francuskiego prawa z 1901 roku. które zrzesza entuzjastów, profesjonalistów i kupców w północnej Francji. Jego celem jest pomoc ludziom w odkrywaniu i dowiadywaniu się więcej o Bitcoin w regionie Lille.

  W tym celu organizujemy bezpłatne comiesięczne spotkania otwarte dla wszystkich otwarte dla wszystkich, konferencje i warsztaty w lokalnych szkołach i na uniwersytetach oraz okazjonalne prezentacje dla sprzedawców detalicznych.
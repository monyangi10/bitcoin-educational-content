description: |
  Bitcoin Lille е сдружение с нестопанска цел съгласно френския закон от 1901 г. която обединява ентусиасти, професионалисти и търговци в Северна Франция. Нейният цел е да помогне на хората да открият и научат повече за Bitcoin в района на Лил.

  За тази цел организираме безплатни месечни срещи, отворени за всички отворени за всички конференции и семинари в местните училища и университети и случайни презентации за търговци на дребно.
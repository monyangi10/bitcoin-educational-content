description: |
  Bitcoin Lille ni ishirahamwe ritagira inyungu hakurikijwe itegeko ry'Ubufaransa ryo mu 1901. ihuriza hamwe abakunda ivy’ubuhinga, abahinga n’abadandaza bo mu Buraruko bw’Ubufaransa. Ni intumbero ni ugufasha abantu kuvumbura no kumenya vyinshi ku vyerekeye Bitcoin. mu karere ka Lille.

  Kugira ngo ivyo bishoboke, turatunganya amakoraniro y’ubuntu buri kwezi yugururiye umuntu wese . yugururiye bose, inama n'amahugurwa ku mashure yo mu karere no muri kaminuza n’ibiganiro bimwebimwe bishikirizwa abagurisha.
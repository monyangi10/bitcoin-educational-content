description: |
  Bitcoin Lille ist ein gemeinnütziger Verein nach dem französischen Gesetz von 1901. der Enthusiasten, Fachleute und Kaufleute in Nordfrankreich zusammenbringt. Sein ziel ist es, den Menschen zu helfen, Bitcoin zu entdecken und mehr darüber zu erfahren in der Region Lille zu entdecken.

  Zu diesem Zweck organisieren wir kostenlose monatliche Treffen, die für jedermann zugänglich sind für alle, Konferenzen und Workshops an lokalen Schulen und Universitäten und gelegentliche Präsentationen für Einzelhändler.
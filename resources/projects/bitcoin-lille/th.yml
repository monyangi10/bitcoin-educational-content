description: |
  Bitcoin Lille เป็นสมาคมไม่แสวงหาผลกำไรภายใต้กฎหมายฝรั่งเศสปี 1901 ซึ่งรวบรวมผู้ที่ชื่นชอบ ผู้เชี่ยวชาญ และพ่อค้าในภาคเหนือของฝรั่งเศส วัตถุประสงค์ของมันคือเพื่อช่วยให้ผู้คนค้นพบและเรียนรู้เพิ่มเติมเกี่ยวกับ Bitcoin ในพื้นที่ลิลล์

  เพื่อจุดประสงค์นี้ เราจัดการประชุมรายเดือนฟรีที่เปิดให้ทุกคน การประชุมและเวิร์กช็อปที่โรงเรียนและมหาวิทยาลัยท้องถิ่น และการนำเสนอเป็นครั้งคราวสำหรับผู้ค้าปลีก
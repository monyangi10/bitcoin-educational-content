description: |
  BTC Shule is pioneering Bitcoin adoption in Burundi by building a sustainable circular economy starting in Winteko village. The organization provides accessible Bitcoin education, training programs, and community engagement through initiatives like Trezor Academy partnerships, BitDevs meetups, and translation work in Kirundi. They operate a physical community hub accommodating up to 80 people and focus on empowering individuals with knowledge, self-custody skills, and open-source tools for long-term financial resilience.

description: |
  Strike is een financiële applicatie waarmee gebruikers direct geld kunnen sturen en ontvangen, Bitcoin kunnen kopen en verkopen en in Bitcoin betaald kunnen worden.
  
  De applicatie biedt een gemakkelijke manier om Bitcoin te kopen, zonder transactiekosten. De API van Strike wordt door bedrijven gebruikt om verbinding te maken met een wereldwijd, onmiddellijk betaalnetwerk. Dit is voordelig voor marktplaatsen die betalingen tussen kopers en verkopers mogelijk maken, en handelaars die betalingen van klanten wereldwijd accepteren. Strike maakt ook grensoverschrijdende betalingen mogelijk, die direct en veilig zijn, zonder extra transactiekosten. Bovendien kunnen gebruikers hun salaris naadloos omzetten in Bitcoin.
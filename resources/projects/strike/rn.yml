description: |
  Strike ni porogaramu y’amahera ishoboza abakoresha kohereza no kwakira amahera ubwo nyene, kugura no kugurisha Bitcoin, no kwishurwa muri Bitcoin.
  
  Iryo koraniro ritanga uburyo bworoshe bwo kugura Bitcoin, urenga amahera y’ugucuruza. API ya Strike ikoreshwa n'ubucuruzi kugira ngo buhuze n'urubuga rwo kw'isi yose, rwo kwishura ubwo nyene. Ivyo ni ngirakamaro ku masoko ashoboza kwishura hagati y’abaguzi n’abagurisha, n’abadandaza bemera kwishura abakiriya kw’isi yose. Strike kandi iremeza ko umuntu yishura ata mipaka, ivyo bikaba bihita kandi bifise umutekano, ata mahera yongereweko. Ikindi, abakoresha barashobora guhindura amahera yabo y’umushahara mu Bitcoin ata nkomanzi.
description: |
  스트라이크는 사용자가 즉시 돈을 주고받고, Bitcoin을 사고팔고, Bitcoin으로 지급받을 수 있는 금융 애플리케이션입니다.
  
  이 애플리케이션은 거래 수수료를 우회하여 Bitcoin을 쉽게 구매할 수 있는 방법을 제공합니다. 스트라이크의 API는 기업이 글로벌 즉시 결제 네트워크에 연결하는 데 사용됩니다. 이는 구매자와 판매자 간의 결제를 지원하는 마켓플레이스와 전 세계 고객으로부터 결제를 수락하는 판매자에게 유용합니다. 또한 스트라이크를 사용하면 추가 거래 수수료 없이 즉각적이고 안전한 국경 없는 결제가 가능합니다. 또한 사용자는 급여를 Bitcoin으로 원활하게 전환할 수 있습니다.
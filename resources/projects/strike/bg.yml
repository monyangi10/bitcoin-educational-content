description: |
  Strike е финансово приложение, което позволява на потребителите да изпращат и получават пари незабавно, да купуват и продават Bitcoin и да получават пари в Bitcoin.
  
  Приложението предлага лесен начин за закупуване на Bitcoin, като се заобикалят таксите за транзакции. API на Strike се използва от бизнеса за свързване към глобална мрежа за незабавни плащания. Това е от полза за пазари, позволяващи плащания между купувачи и продавачи, и за търговци, приемащи плащания от клиенти в световен мащаб. Strike също така позволява безгранични плащания, които са незабавни и сигурни, без допълнителни такси за трансакции. Освен това потребителите могат безпроблемно да конвертират заплатите си в Bitcoin.
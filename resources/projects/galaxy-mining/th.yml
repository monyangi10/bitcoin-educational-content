description: |
  Galaxy เป็นแพลตฟอร์มบริการทางการเงินที่มุ่งเน้น Bitcoin ซึ่งเชื่อมช่องว่างระหว่างการเงินแบบดั้งเดิมและโครงสร้างพื้นฐาน Bitcoin
  
  ด้วยการเสนอทางออกทางการเงินที่ปรับแต่งและเครื่องมือที่เป็นนวัตกรรม Galaxy ช่วยเหลือผู้ขุด Bitcoin ในการขยายการดำเนินงาน บริการรวมถึงบริการโฮสติ้งสำหรับผู้ขุด Bitcoin บุคคลที่สามที่สถานที่ mining ขนาดใหญ่ในเท็กซัสที่มีการระบายความร้อนด้วยการแช่ ความเชี่ยวชาญ Bitcoin mining แบบลงมือปฏิบัติจริงเพื่อความเป็นเลิศในการดำเนินงาน และแพลตฟอร์ม Miner Finance (MiFi) ที่รวมการให้บริการการซื้อขาย การป้องกันความเสี่ยง และการเงินแก่ผู้ขุด
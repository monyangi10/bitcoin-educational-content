description: |
  Galaxy, geleneksel finans ile Bitcoin altyapısı arasındaki boşluğu dolduran Bitcoin merkezli bir finansal hizmet platformudur.
  
  Özel finansman çözümleri ve yenilikçi araçlar sunan Galaxy, Bitcoin madencilerinin operasyonlarını ölçeklendirmelerine yardımcı oluyor. Hizmetler arasında üçüncü taraf Bitcoin madencileri için Teksas'taki büyük ölçekli, daldırma soğutmalı Mining tesisinde barındırma hizmetleri, operasyonel mükemmellik için uygulamalı Bitcoin Mining uzmanlığı ve madencilere ticaret, riskten korunma ve finansman hizmetleri sağlayan entegre bir Miner Finans (MiFi) platformu bulunmaktadır.
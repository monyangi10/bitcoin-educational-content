description: |
  Galaxy ni urubuga rw’ivy’ubutunzi rushingiye kuri Bitcoin ruzibira ikinogo kiri hagati y’ivy’ubutunzi vya kera n’ibikorwa remezo vya Bitcoin.
  
  Galaxy itanga inyishu z’amahera n’ibikoresho bishasha, ifasha abacukuzi ba Bitcoin mu gutera imbere mu bikorwa vyabo. Ivyo bikorwa birimwo kwakira abacukuzi b’amabuye y’agaciro bo mu bindi bihugu ku kibanza cabo kinini, gikoreshwa n’amazi mu mazi, ubuhinga bwa Bitcoin Mining kugira ngo bukore neza, n’urubuga rwa Miner Finance (MiFi) ruhurikiye hamwe rutanga ubudandaji, gukingira abacukuzi, n’ugutanga amahera.
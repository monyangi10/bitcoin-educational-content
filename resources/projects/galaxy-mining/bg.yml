description: |
  Galaxy е платформа за финансови услуги, ориентирана към Bitcoin, която запълва празнината между традиционните финанси и инфраструктурата на Bitcoin.
  
  Предлагайки персонализирани финансови решения и иновативни инструменти, Galaxy подпомага миньорите от Bitcoin в разширяването на техните операции. Услугите включват хостинг услуги за миньори от Bitcoin от трети страни в мащабното им съоръжение mining с потапяне и охлаждане в Тексас, практически опит в Bitcoin mining за постигане на оперативно съвършенство и интегрирана платформа за финансиране на Miner (MiFi), която предоставя услуги за търговия, хеджиране и финансиране на миньори.
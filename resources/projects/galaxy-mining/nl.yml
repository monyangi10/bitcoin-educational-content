description: |
  Galaxy is een Bitcoin-centrisch financieel dienstenplatform dat de kloof overbrugt tussen traditionele financiën en Bitcoin infrastructuur.
  
  Met op maat gemaakte financieringsoplossingen en innovatieve tools helpt Galaxy Bitcoin-mijnbouwers bij het opschalen van hun activiteiten. De diensten omvatten hostingdiensten voor Bitcoin-mijnbouwers van derden in hun grootschalige, immersiegekoelde Mining-faciliteit in Texas, praktische Mining-expertise voor operationele uitmuntendheid en een geïntegreerd Miner-financieringsplatform (MiFi) dat handels-, hedging- en financieringsdiensten biedt aan mijnbouwers.
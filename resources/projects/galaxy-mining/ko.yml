description: |
  Galaxy는 기존 금융과 Bitcoin 인프라 간의 격차를 해소하는 Bitcoin 중심 금융 서비스 플랫폼입니다.
  
  맞춤형 금융 솔루션과 혁신적인 도구를 제공하는 Galaxy는 Bitcoin 채굴자의 운영 확장을 지원합니다. 이러한 서비스에는 텍사스에 위치한 대규모 침수 냉각식 Mining 시설에서 타사 Bitcoin 채굴자를 위한 호스팅 서비스, 운영 우수성을 위한 실무형 Bitcoin Mining 전문 지식, 채굴자에게 거래, 헤징 및 금융 서비스를 제공하는 통합 Miner 금융(MiFi) 플랫폼이 포함됩니다.
description: |
  Atlas21 ni urubuga rw’amakuru n’inyigisho rwerekeye Bitcoin, rwagenewe kwuzuza ikinogo c’ibintu vyizewe kandi vyimbitse mu bijanye n’ivyo mu Butaliyano no kw’isi yose. Itanga amakuru agezweho, isesengura, inyandiko z’ubuhinga n’igice c’inyigisho gikomeza kwaguka, n’intumbero yo gutanga ugutahura gutomoye kandi gutomoye kw’ihinduka ry’ivy’ubutunzi riserukirwa na Bitcoin. Izina "Atlas" ryibutsa imigani y'Abagiriki, rigereranya inshingano yo gushigikira isi nziza biciye mu mafaranga y'ubuhinga bwa none adatera imbere, ashobora gushikirwa na bose. Kubera ko Atlas21 ifise iciyumviro c’imbere, ifise intumbero yo kuba ikibanza co gushingirako abashaka gutahura no kugira uruhara n’umwete mu gutera imbere kw’ubuhinga bw’amahera kw’isi yose.
description: |
  Intumbero yacu ni ukugenda iruhande yawe mu rugendo rwawe rwo kwinjira muri Bitcoin, kazoza k’amahera. Swan ni uburyo bwiza bwo kwubaka ikirundo cawe ca Bitcoin, n’imigambi yo kuzigama Bitcoin yikora n’ugugura ubwo nyene. Gukorera aba clients b'ubunini bwose, kuva ku madolari 10 gushika ku madolari 10M+.
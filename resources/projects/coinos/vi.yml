description: |
  Coinos là một công ty Canada cung cấp trang web wallet miễn phí và trang thanh toán đơn giản, cho phép bất kỳ ai, cá nhân hay thương gia, nhận và gửi thanh toán bằng Bitcoin, đặc biệt là qua Lightning. Công ty mong muốn tạo điều kiện thuận lợi cho việc áp dụng Bitcoin bằng cách cung cấp giao dịch tức thì, không mất phí ngân hàng hay hoàn tiền.
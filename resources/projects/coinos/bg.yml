description: |
  Coinos е канадска компания, която предлага безплатна уеб страница wallet и опростена страница за плащания, позволяваща на всеки - физически лица или търговци - да получава и изпраща плащания в Bitcoin, по-специално чрез Lightning. Тя има за цел да улесни приемането на Bitcoin, като предлага незабавни трансакции, без банкови такси и обратни плащания.
description: |
  Coinos je kanadska kompanija koja nudi besplatan web wallet i pojednostavljenu stranicu za plaćanje koja omogućava bilo kome, pojedincima ili trgovcima, da primaju i šalju uplate u Bitcoin, posebno putem Lightning-a. Cilj je olakšati usvajanje Bitcoin nudeći trenutne transakcije, bez bankovnih naknada ili povrata sredstava.
description: |
  Coinos เป็นบริษัทสัญชาติแคนาดาที่ให้บริการเว็บ wallet ฟรีและหน้าเพจการชำระเงินที่เรียบง่าย ช่วยให้บุคคลทั่วไปหรือผู้ค้าสามารถรับและส่งการชำระเงินใน Bitcoin ได้ โดยเฉพาะผ่าน Lightning มีเป้าหมายเพื่อส่งเสริมการนำ Bitcoin มาใช้โดยเสนอธุรกรรมที่รวดเร็วทันใจ ไม่มีค่าธรรมเนียมธนาคารหรือการเรียกเก็บเงินคืน
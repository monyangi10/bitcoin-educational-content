description: |
  Coinos to kanadyjska firma oferująca bezpłatną stronę internetową wallet i uproszczoną stronę płatności umożliwiającą każdemu, osobom fizycznym lub handlowcom, otrzymywanie i wysyłanie płatności w Bitcoin, zwłaszcza za pośrednictwem Lightning. Jej celem jest ułatwienie przyjęcia Bitcoin poprzez oferowanie natychmiastowych transakcji, bez opłat bankowych i obciążeń zwrotnych.
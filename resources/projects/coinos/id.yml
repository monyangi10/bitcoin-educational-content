description: |
  Coinos adalah sebuah perusahaan Kanada yang menawarkan web wallet gratis dan halaman pembayaran yang disederhanakan yang memungkinkan siapa pun, individu atau pedagang, untuk menerima dan mengirim pembayaran dalam Bitcoin, terutama melalui Lightning. Hal ini bertujuan untuk memfasilitasi adopsi Bitcoin dengan menawarkan transaksi instan, tanpa biaya bank atau tolak bayar.
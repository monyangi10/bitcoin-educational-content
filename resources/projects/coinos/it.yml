description: |
  Coinos è un'azienda canadese che offre un wallet web gratuito e una pagina di pagamento semplificata che consente a chiunque, privati o commercianti, di ricevere e inviare pagamenti in Bitcoin, in particolare tramite Lightning. L'obiettivo è quello di facilitare l'adozione del Bitcoin offrendo transazioni istantanee, senza commissioni bancarie o chargeback.
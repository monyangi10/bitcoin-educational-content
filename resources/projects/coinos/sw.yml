description: |
  Coinos ni kampuni ya Kanada inayotoa wavuti isiyolipishwa ya wallet na ukurasa wa malipo uliorahisishwa unaowezesha mtu yeyote, watu binafsi au wauzaji, kupokea na kutuma malipo katika Bitcoin, hasa kupitia Umeme. Inalenga kuwezesha kupitishwa kwa Bitcoin kwa kutoa miamala ya papo hapo, bila ada za benki au malipo nyuma.
description: |
  Coinos on Kanada ettevõte, mis pakub tasuta veebi wallet ja lihtsustatud makselehekülge, mis võimaldab kõigil, nii eraisikutel kui ka kaupmeestel, võtta vastu ja saata makseid Bitcoin-s, eelkõige Lightning'i kaudu. Selle eesmärk on hõlbustada Bitcoin kasutuselevõttu, pakkudes koheseid tehinguid ilma pangatasudeta ja tagasimakseteta.
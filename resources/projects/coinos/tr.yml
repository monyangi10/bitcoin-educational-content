description: |
  Coinos, ücretsiz bir web wallet ve basitleştirilmiş ödeme sayfası sunan Kanadalı bir şirkettir ve bireyler veya tüccarlar olmak üzere herkesin özellikle Lightning aracılığıyla Bitcoin'da ödeme almasını ve göndermesini sağlar. Banka ücreti veya ters ibraz olmaksızın anında işlemler sunarak Bitcoin'ın benimsenmesini kolaylaştırmayı amaçlamaktadır.
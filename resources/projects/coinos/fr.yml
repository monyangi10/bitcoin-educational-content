description: |
  Coinos est une entreprise canadienne qui propose un portefeuille web gratuit et une page de paiement simplifiée permettant à quiconque, particuliers ou commerçants, de recevoir et d’envoyer des paiements en Bitcoin, notamment via Lightning. Elle vise à faciliter l’adoption de Bitcoin en offrant des transactions instantanées, sans frais bancaires ni rétrofacturations.
description: |
  Coinos - это канадская компания, предлагающая бесплатный веб-сайт wallet и упрощенную платежную страницу, позволяющую любому человеку, частному лицу или торговцу, получать и отправлять платежи в Bitcoin, в частности через Lightning. Цель компании - облегчить переход на Bitcoin, предлагая мгновенные транзакции без банковских комиссий и возврата платежей.
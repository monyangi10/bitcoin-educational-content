description: |
  Coinos ni ishirahamwe ryo muri Canada ritanga urubuga rw’ubuntu wallet n’urubuga rworoshe rwo kwishura rushoboza umuntu wese, umuntu ku giti ciwe canke abacuruzi, kwakira no kohereza amahera muri Bitcoin, cane cane biciye ku Lightning. Igamije kworohereza abantu kwemera Bitcoin mu gutanga amafaranga ahita, ata mafaranga yo muri banki canke amafaranga yo gusubizwa.
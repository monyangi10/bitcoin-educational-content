description: |
  Coinos er et kanadisk selskap som tilbyr en gratis wallet-nettside og en forenklet betalingsside som gjør det mulig for alle, både privatpersoner og forhandlere, å motta og sende betalinger i Bitcoin, særlig via Lightning. Målet er å gjøre det lettere å ta i bruk Bitcoin ved å tilby umiddelbare transaksjoner uten bankgebyrer eller tilbakeføringer.
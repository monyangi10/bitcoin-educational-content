description: |
  Coinos ist ein kanadisches Unternehmen, das ein kostenloses Web-wallet und eine vereinfachte Zahlungsseite anbietet, die es jedem - Privatpersonen oder Händlern - ermöglicht, Zahlungen in Bitcoin zu empfangen und zu senden, insbesondere über Lightning. Ziel ist es, die Einführung von Bitcoin zu erleichtern, indem es sofortige Transaktionen ohne Bankgebühren oder Rückbuchungen anbietet.
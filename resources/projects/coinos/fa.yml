description: |
  Coinos یک شرکت کانادایی است که یک وب wallet رایگان و صفحه پرداخت ساده ارائه می‌دهد که به هر کسی، افراد یا بازرگانان، امکان دریافت و ارسال پرداخت‌ها در Bitcoin، به ویژه از طریق Lightning را می‌دهد. هدف آن تسهیل پذیرش Bitcoin با ارائه تراکنش‌های فوری، بدون کارمزد بانکی یا بازپرداخت است.
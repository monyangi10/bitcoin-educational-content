description: |
  Coinos on kanadalainen yritys, joka tarjoaa ilmaisen wallet-verkkopalvelun ja yksinkertaistetun maksusivun, jonka avulla kuka tahansa, yksityishenkilöt tai kauppiaat, voivat vastaanottaa ja lähettää maksuja Bitcoin:ssa, erityisesti Lightningin kautta. Sen tavoitteena on helpottaa Bitcoin:n käyttöönottoa tarjoamalla välittömiä maksutapahtumia ilman pankkimaksuja tai takaisinkirjauksia.
description: |
  Coinos je kanadská společnost, která nabízí bezplatnou webovou stránku wallet a zjednodušenou platební stránku umožňující komukoli, jednotlivcům i obchodníkům, přijímat a odesílat platby v Bitcoin, zejména prostřednictvím Lightning. Jejím cílem je usnadnit přijetí Bitcoin tím, že nabízí okamžité transakce bez bankovních poplatků a zpětných plateb.
description: |
  कॉइनोस एक कनाडाई कंपनी है जो एक निःशुल्क वेब wallet और सरलीकृत भुगतान पृष्ठ प्रदान करती है जो किसी भी व्यक्ति, व्यक्ति या व्यापारी, को Bitcoin में भुगतान प्राप्त करने और भेजने में सक्षम बनाती है, विशेष रूप से लाइटनिंग के माध्यम से। इसका उद्देश्य बिना किसी बैंक शुल्क या चार्जबैक के तत्काल लेनदेन की सुविधा प्रदान करके Bitcoin को अपनाना आसान बनाना है।
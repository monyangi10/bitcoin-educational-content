description: |
  Coinos is een Canadees bedrijf dat een gratis wallet web en vereenvoudigde betaalpagina aanbiedt waarmee iedereen, particulieren of handelaars, betalingen in Bitcoin kunnen ontvangen en versturen, met name via Lightning. Het wil de adoptie van Bitcoin vergemakkelijken door directe transacties aan te bieden, zonder bankkosten of terugboekingen.
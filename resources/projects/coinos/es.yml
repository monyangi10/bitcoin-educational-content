description: |
  Coinos es una empresa canadiense que ofrece una wallet web gratuita y una página de pago simplificada que permite a cualquier persona, particular o comerciante, recibir y enviar pagos en Bitcoin, en particular a través de Lightning. Su objetivo es facilitar la adopción de Bitcoin ofreciendo transacciones instantáneas, sin comisiones bancarias ni devoluciones de cargos.
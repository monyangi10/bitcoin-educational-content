description: |
  Coinos är ett kanadensiskt företag som erbjuder en gratis webb wallet och en förenklad betalningssida som gör det möjligt för alla, privatpersoner eller handlare, att ta emot och skicka betalningar i Bitcoin, särskilt via Lightning. Syftet är att underlätta införandet av Bitcoin genom att erbjuda omedelbara transaktioner utan bankavgifter eller återbetalningar.
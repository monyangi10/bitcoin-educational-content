description: |
  Es una iniciativa social y educativa que busca acercar la tecnología Bitcoin a comunidades tradicionalmente excluidas
  
  En Bolivia, miles de personas con discapacidad visual o auditiva, así como jóvenes sin redes familiares de apoyo, enfrentan barreras estructurales para acceder al sistema financiero tradicional.
  
  Bitcoin ofrece una vía de inclusión digital sin permisos, basada en la propiedad directa del valor y el acceso abierto al conocimiento.
  
  Actualmente ya hemos avanzado con el colectivo de personas no videntes, para quienes imprimimos el White Paper de Satoshi Nakamoto en braille, un hecho pionero en el país.
  
  El siguiente paso es desarrollar talleres accesibles para personas sordas, incorporando lengua de señas boliviana en nuestros materiales audiovisuales.
  
  Finalmente, trabajaremos con jóvenes huérfanos, enseñándoles a resguardar el valor de su dinero a través de Bitcoin, integrando principios de autocustodia, privacidad y seguridad digital.

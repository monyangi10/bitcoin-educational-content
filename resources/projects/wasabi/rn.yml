description: |
  Wasabi Wallet yagenewe abaha agaciro ubuzima bwite, mw’isi aho ugucungera amakuru no kuyakoresha nabi ari vyinshi. 
  
  Nk’uko ari porogarama idafise ubumenyi, iratuma amafaranga y’abakoresha ya Bitcoin aguma ari ubucuruzi bwabo bwite. Wasabi Wallet ni inkomoko yuguruye, ishobora gutuma umuntu wese asuzuma canke atanga umusanzu kuri kode. Igishushanyo caco ni Trustless, kikaba kigaragaza ko abantu bose canke abayikora badashobora guhungabanya ubuzima bwite bwawe. Wallet ntaco ishobora kuzigama, igatuma ushobora kuguma ugenzura imfunguruzo zawe z’ibanga no gushika ku busegaba nyakuri bw’ivy’amahera. Naho ifise ibintu vyiza cane, Wasabi yakozwe kugira ngo umuntu ashobore kuyikoresha neza kandi ikoreshe neza ivy’ubuzima bwite. Ikoresha WabiSabi, umugambi w’ivyemezo bitazwi, kugira ngo coinjoins zishobore gushikirwa kandi zikore neza. Ikindi kandi, birashoboka, bisaba amahera makeyi ku bijanye no gukorana n’ibiceri biri hejuru ya 0.01 BTC, mu gihe ivyo winjiza biri hejuru ya 0.01 BTC canke munsi yavyo be n’ivyo gusubiramwo bitagira amahera y’umuhuzabikorwa.
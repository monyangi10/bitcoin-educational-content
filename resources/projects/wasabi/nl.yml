description: |
  Wasabi Wallet is ontworpen voor mensen die waarde hechten aan privacy, in een wereld waar informatiebewaking en misbruik welig tieren.
  
  Als een zero-knowledge software, zorgt het ervoor dat de Bitcoin transacties van gebruikers hun privézaken blijven. Wasabi Wallet is open-source, waardoor iedereen de code kan verifiëren of eraan kan bijdragen. Het ontwerp is Trustless, zodat noch het publiek noch de ontwikkelaars inbreuk kunnen maken op je privacy. De Wallet is niet-custodial, zodat u de controle over uw privésleutels kunt behouden en echte financiële soevereiniteit kunt bereiken. Ondanks de geavanceerde functies is Wasabi ontworpen om gebruiksvriendelijk te zijn en automatisch met privacy om te gaan. Het gebruikt WabiSabi, een anoniem referentieschema, om coinjoins toegankelijker en efficiënter te maken. Bovendien is het betaalbaar, het rekent een bescheiden vergoeding voor coinjoins van munten boven 0,01 BTC, terwijl ingangen van 0,01 BTC of lager en remixes vrij zijn van coördinatorkosten.
description: |
  Wasabi Wallet е предназначен за тези, които ценят неприкосновеността на личния живот в свят, в който наблюдението на информацията и злоупотребата с нея са широко разпространени.
  
  Като софтуер с нулево познание, той гарантира, че транзакциите с биткойни на потребителите остават тяхна лична работа. Wasabi Wallet е с отворен код, което позволява на всеки да провери или да допринесе за кода. Дизайнът му е без доверие, което гарантира, че нито обществеността, нито разработчиците могат да нарушат личната ви неприкосновеност. wallet не е попечителски, което ви позволява да запазите контрола върху частните си ключове и да постигнете истински финансов суверенитет. Въпреки усъвършенстваните си функции, Wasabi е проектиран така, че да бъде удобен за потребителя и да се справя с поверителността автоматично. Той използва WabiSabi, схема за анонимно удостоверяване, за да направи монетите по-достъпни и ефективни. Освен това тя е достъпна, като начислява скромна такса за coinjoining на монети над 0,01 BTC, докато входовете от 0,01 BTC или по-малко и ремиксите са без координационни такси.
description: |
  Wasabi Wallet ได้รับการออกแบบมาสำหรับผู้ที่ให้ความสำคัญกับความเป็นส่วนตัว ในโลกที่การสอดส่องข้อมูลและการใช้งานในทางที่ผิดเป็นเรื่องที่แพร่หลาย
  
  ในฐานะซอฟต์แวร์ที่ไม่มีความรู้ มันรับประกันว่าการทำธุรกรรมบิตคอยน์ของผู้ใช้จะยังคงเป็นเรื่องส่วนตัวของพวกเขา Wasabi Wallet เป็นโอเพ่นซอร์ส ทำให้ใครก็ตามสามารถตรวจสอบหรือมีส่วนร่วมในโค้ดได้ การออกแบบของมันไม่มีความเชื่อมั่น ทำให้มั่นใจได้ว่าทั้งสาธารณะและนักพัฒนาไม่สามารถละเมิดความเป็นส่วนตัวของคุณได้ wallet เป็นแบบไม่รับฝาก ทำให้คุณสามารถควบคุมคีย์ส่วนตัวของคุณและบรรลุอธิปไตยทางการเงินที่แท้จริงได้ แม้จะมีคุณสมบัติขั้นสูง Wasabi ได้รับการออกแบบให้ใช้งานง่ายและจัดการความเป็นส่วนตัวโดยอัตโนมัติ มันใช้ WabiSabi ซึ่งเป็นโครงร่างรับรองตัวตนแบบไม่ระบุตัวตน เพื่อทำให้การรวมเหรียญเป็นเรื่องที่เข้าถึงได้ง่ายและมีประสิทธิภาพมากขึ้น นอกจากนี้ยังมีราคาที่ไม่แพง โดยคิดค่าธรรมเนียมเล็กน้อยสำหรับการรวมเหรียญที่มีมูลค่าเกิน 0.01 BTC ในขณะที่อินพุตที่มีมูลค่า 0.01 BTC หรือต่ำกว่าและการรีมิกซ์จะไม่มีค่าธรรมเนียมผู้ประสานงาน
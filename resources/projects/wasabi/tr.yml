description: |
  Wasabi Wallet, bilgi gözetimi ve kötüye kullanımının yaygın olduğu bir dünyada gizliliğe değer verenler için tasarlanmıştır.
  
  Sıfır bilgili bir yazılım olarak, kullanıcının Bitcoin işlemlerinin kendi özel işleri olarak kalmasını sağlar. Wasabi Wallet açık kaynaklıdır ve herkesin kodu doğrulamasına veya koda katkıda bulunmasına izin verir. Tasarımı Trustless'dır ve ne halkın ne de geliştiricilerin gizliliğinizi ihlal edememesini sağlar. Wallet gözetimsizdir, özel anahtarlarınız üzerinde kontrol sahibi olmanızı ve gerçek finansal egemenliğe ulaşmanızı sağlar. Gelişmiş özelliklerine rağmen, Wasabi kullanıcı dostu olacak ve gizliliği otomatik olarak ele alacak şekilde tasarlanmıştır. Coinjoins'i daha erişilebilir ve verimli hale getirmek için anonim bir kimlik bilgisi şeması olan WabiSabi'yi kullanır. Ayrıca, 0,01 BTC'nin üzerindeki coinleri birleştirmek için mütevazı bir ücret talep ederken, 0,01 BTC veya altındaki girişler ve remiksler koordinatör ücreti içermez.
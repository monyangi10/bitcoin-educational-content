description: |
  와사비 Wallet는 정보 감시와 오용이 만연한 세상에서 프라이버시를 중시하는 사람들을 위해 설계되었습니다.
  
  영지식 소프트웨어로서 사용자의 Bitcoin 트랜잭션이 사적인 비즈니스로 유지되도록 보장합니다. 와사비 Wallet는 오픈 소스이므로 누구나 코드를 검증하거나 기여할 수 있습니다. Trustless으로 설계되어 일반인이나 개발자가 사용자의 개인정보를 침해할 수 없도록 보장합니다. Wallet는 비수탁형이기 때문에 개인 키에 대한 통제권을 유지하고 진정한 금융 주권을 실현할 수 있습니다. 고급 기능에도 불구하고 와비사비는 사용자 친화적으로 설계되어 개인 정보를 자동으로 처리합니다. 익명 인증 체계인 와비사비를 사용해 코인 가입의 접근성과 효율성을 높였습니다. 또한, 0.01 BTC 이상의 코인을 코인조인할 때는 소액의 수수료를 부과하고, 0.01 BTC 이하의 입력과 리믹스에 대해서는 코디네이터 수수료가 없는 합리적인 가격의 서비스입니다.
description: |
  Bitika ni urubuga rwa Bitcoin gusa ruri muri Kenya, rwateguwe kugira ngo rworohe kandi rutekanye kugura, kugurisha no gukoresha Bitcoin muri Afirika y’Ubuseruko bwose. Kubera Interface yoroshe n’ugushiramwo ata nkomanzi n’uburyo bwo kwishura bwo mu karere, Bitika iha ubushobozi abakoresha kugira ngo bashobore gushika ku bukungu bwa Bitcoin ataco basamaza n’ayandi mafaranga y’amahera. 
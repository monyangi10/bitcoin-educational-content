description: |
  Ce documentaire vous emmène au cœur du Salvador, petit pays d’Amérique centrale devenu en 2021 le 1er au monde à adopter le Bitcoin comme monnaie légale.
  Mais derrière cette expérience monétaire inédite, le pays reste marqué par des décennies de violence, de fractures sociales et de défis économiques. Entre ambitions technologiques, tensions politiques et héritage des guerres civiles, ce film donne la parole à toutes les parties : gouvernement, opposition, ONG, et citoyens salvadoriens.
  Une plongée nuancée dans un pays en pleine mutation, entre promesses de modernité et réalités du quotidien.

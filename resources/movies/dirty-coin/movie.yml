description: |
  Dirty Coin delves into the controversial world of bitcoin mining. The film challenges conventional wisdom about Bitcoin's environmental impact and explores how the cost to mine drives significant improvements in energy infrastructure. Through interviews with experts including Jeff Booth, Cynthia Lummis, Mark Moss, and Tone Vays, the documentary examines mining operations across locations including Malawi.

description: |
  This documentary investigates the suspicious death of cryptocurrency multimillionaire Gerry Cotten and the $250 million that disappeared from QuadrigaCX, once Canada's largest crypto exchange. A group of investors turns detective to uncover the truth behind what they believe was stolen from them. The film explores themes of greed, fraud, and the volatile world of cryptocurrency.

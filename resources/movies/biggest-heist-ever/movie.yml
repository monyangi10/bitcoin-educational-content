description: |
  This documentary chronicles the story of Heather Morgan (rapper alias Razzlekhan) and her husband Ilya Lichtenstein, who were arrested and accused of conspiring to launder nearly 120,000 Bitcoins stolen in one of the largest cryptocurrency heists in history. The film explores the eccentric personalities of the perpetrators, the sophisticated techniques used in the cyber heist, and the investigation that led to their capture.

name: Ejderhaların Kanıtı
description: |
  Proof & Dragons, aynı isimli eğitim oyunu için tamamlayıcı bir uygulama olarak tasarlanmış interaktif bir web uygulamasıdır. Çeşitli eğlenceli metaforlar aracılığıyla kullanıcılar, madencilerin Blockchain'a blok eklemek için nasıl rekabet ettiklerini basitleştirilmiş bir şekilde deneyimleyebilirler.
  
  Uygulama, öğretmen veya kolaylaştırıcı tarafından "Proof & Dragons" oyunu sırasında öğrencilerin hesaplamalarını otomatik olarak doğrulamak ve maç sırasında neler olduğuna dair görsel geri bildirim sağlamak için kullanılır.
  
  Uygulama Rainbow Bits web sitesinde (https://rainbowbits.cloud/proof_and_dragons/) çevrimiçi olarak mevcuttur
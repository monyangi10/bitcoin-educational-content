name: Dokaz o zmajevima
description: |
  Proof & Dragons je interaktivna veb aplikacija dizajnirana kao prateća aplikacija za edukativnu igru istog imena. Kroz razne razigrane metafore, korisnici mogu na pojednostavljen način iskusiti kako rudari takmiče da dodaju blokove u Blockchain.
  
  Aplikaciju koristi nastavnik ili facilitator za automatsku proveru studentskih proračuna tokom igre "Proof & Dragons" i pruža vizuelne povratne informacije o tome šta se dešava tokom meča.
  
  Aplikacija je dostupna onlajn na sajtu Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
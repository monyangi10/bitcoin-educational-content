name: Bevis på drager
description: |
  Proof & Dragons er en interaktiv nettapplikasjon som er utviklet som en ledsagerapp til det pedagogiske spillet med samme navn. Gjennom ulike lekne metaforer kan brukerne oppleve på en forenklet måte hvordan gruvearbeidere konkurrerer om å legge blokker til en Blockchain.
  
  Applikasjonen brukes av læreren eller tilretteleggeren til automatisk å verifisere elevenes beregninger under "Proof & Dragons"-spillet og gi visuelle tilbakemeldinger om hva som skjer i løpet av kampen.
  
  Appen er tilgjengelig på Rainbow Bits-nettstedet (https://rainbowbits.cloud/proof_and_dragons/)
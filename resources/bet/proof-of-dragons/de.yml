name: Der Beweis der Drachen
description: |
  Proof & Dragons ist eine interaktive Webanwendung, die als Begleit-App für das gleichnamige Lernspiel entwickelt wurde. Durch verschiedene spielerische Metaphern können die Nutzer auf vereinfachte Weise erleben, wie Bergleute darum wetteifern, Blöcke zu einem Blockchain hinzuzufügen.
  
  Die Anwendung wird vom Lehrer oder Moderator verwendet, um die Berechnungen der Schüler während des "Proof & Dragons"-Spiels automatisch zu überprüfen und visuelles Feedback zum Spielgeschehen zu geben.
  
  Die Anwendung ist online auf der Rainbow Bits Website verfügbar (https://rainbowbits.cloud/proof_and_dragons/)
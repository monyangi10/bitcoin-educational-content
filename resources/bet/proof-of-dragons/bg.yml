name: Доказателство за дракони
description: |
  "Доказателство и дракони" е интерактивно уеб приложение, създадено като допълнение към едноименната образователна игра. Чрез различни игрови метафори потребителите могат да усетят по опростен начин как миньорите се състезават да добавят блокове към блокчейна.
  
  Приложението се използва от учителя или фасилитатора за автоматична проверка на изчисленията на учениците по време на играта "Доказателства и дракони" и за предоставяне на визуална обратна връзка за това, което се случва по време на мача.
  
  Приложението е достъпно онлайн на уебсайта на Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
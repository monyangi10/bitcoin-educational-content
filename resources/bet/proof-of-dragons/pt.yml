name: Prova dos Dragões
description: |
  Proof & Dragons é uma aplicação Web interactiva concebida como aplicação complementar do jogo educativo com o mesmo nome. Através de várias metáforas lúdicas, os utilizadores podem experimentar, de uma forma simplificada, como os mineiros competem para adicionar blocos a um Blockchain.
  
  A aplicação é utilizada pelo professor ou facilitador para verificar automaticamente os cálculos dos alunos durante o jogo "Proof & Dragons" e fornecer feedback visual sobre o que está a acontecer durante a partida.
  
  A aplicação está disponível em linha no sítio Web do Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
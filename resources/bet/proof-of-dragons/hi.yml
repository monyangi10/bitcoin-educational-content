name: ड्रेगन का प्रमाण
description: |
  प्रूफ एंड ड्रैगन्स एक इंटरैक्टिव वेब एप्लिकेशन है जिसे इसी नाम के शैक्षिक गेम के लिए एक सहयोगी ऐप के रूप में डिज़ाइन किया गया है। विभिन्न मनोरंजक रूपकों के माध्यम से, उपयोगकर्ता सरल तरीके से अनुभव कर सकते हैं कि कैसे माइनर्स Blockchain में ब्लॉक जोड़ने के लिए प्रतिस्पर्धा करते हैं।
  
  इस एप्लिकेशन का उपयोग शिक्षक या प्रशिक्षक "प्रूफ एंड ड्रैगन्स" गेम के दौरान छात्रों की गणनाओं को स्वचालित रूप से सत्यापित करने और मैच के दौरान क्या हो रहा है, इस पर दृश्य प्रतिक्रिया प्रदान करने के लिए करते हैं।
  
  यह ऐप रेनबो बिट्स वेबसाइट (https://rainbowbits.cloud/proof_and_dragons/) पर ऑनलाइन उपलब्ध है।
name: Dowód smoków
description: |
  Proof & Dragons to interaktywna aplikacja internetowa zaprojektowana jako aplikacja towarzysząca grze edukacyjnej o tej samej nazwie. Dzięki różnym zabawnym metaforom użytkownicy mogą w uproszczony sposób doświadczyć, jak górnicy rywalizują o dodawanie bloków do Blockchain.
  
  Aplikacja jest używana przez nauczyciela lub moderatora do automatycznej weryfikacji obliczeń uczniów podczas gry "Proof & Dragons" i zapewnia wizualną informację zwrotną na temat tego, co dzieje się podczas meczu.
  
  Aplikacja jest dostępna online na stronie Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
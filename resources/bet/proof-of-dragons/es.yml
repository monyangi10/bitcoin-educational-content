name: Prueba de dragones
description: |
  Proof & Dragons es una aplicación web interactiva diseñada como complemento del juego educativo del mismo nombre. A través de varias metáforas lúdicas, los usuarios pueden experimentar de forma simplificada cómo los mineros compiten para añadir bloques a un Blockchain.
  
  El profesor o facilitador utiliza la aplicación para verificar automáticamente los cálculos de los alumnos durante el juego "Proof & Dragons" y proporcionar información visual sobre lo que está ocurriendo durante la partida.
  
  La aplicación está disponible en línea en el sitio web de Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
name: اثبات وجود اژدها
description: |
  Proof & Dragons یک برنامه وب تعاملی است که به عنوان یک برنامه همراه برای بازی آموزشی با همین نام طراحی شده است. از طریق استعاره‌های بازیگوشانه مختلف، کاربران می‌توانند به روشی ساده تجربه کنند که چگونه ماینرها برای افزودن بلوک‌ها به یک Blockchain رقابت می‌کنند.
  
  این برنامه توسط معلم یا تسهیل‌گر برای تأیید خودکار محاسبات دانش‌آموزان در طول بازی "Proof & Dragons" استفاده می‌شود و بازخورد بصری از آنچه در طول مسابقه اتفاق می‌افتد ارائه می‌دهد.
  
  این برنامه به صورت آنلاین در وب‌سایت Rainbow Bits در دسترس است (https://rainbowbits.cloud/proof_and_dragons/)
name: Proof of Dragons
description: |
  Proof & Dragons is an interactive web application designed as a companion app for the educational game of the same name. Through various playful metaphors, users can experience in a simplified way how miners compete to add blocks to a blockchain.

  The application is used by the teacher or facilitator to automatically verify students' calculations during the "Proof & Dragons" game and provide visual feedback on what is happening during the match.

  The app is available online on the Rainbow Bits website (https://rainbowbits.cloud/proof_and_dragons/)

name: La preuve des dragons
description: |
  Proof & Dragons est une application web interactive conçue pour accompagner le jeu éducatif du même nom. Grâce à diverses métaphores ludiques, les utilisateurs peuvent découvrir de manière simplifiée comment les mineurs s'affrontent pour ajouter des blocs à un Blockchain.
  
  L'application est utilisée par l'enseignant ou l'animateur pour vérifier automatiquement les calculs des élèves pendant le jeu "Preuve & Dragons" et fournir un retour visuel sur ce qui se passe pendant le match.
  
  L'application est disponible en ligne sur le site web de Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
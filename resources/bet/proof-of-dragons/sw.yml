name: Ushahidi wa Dragons
description: |
  Uthibitisho na Dragons ni programu shirikishi ya wavuti iliyoundwa kama programu shirikishi ya mchezo wa kielimu wa jina moja. Kupitia mafumbo mbalimbali ya kucheza, watumiaji wanaweza kutumia kwa njia iliyorahisishwa jinsi wachimbaji wanavyoshindana ili kuongeza vitalu kwenye Blockchain.
  
  Programu hutumiwa na mwalimu au mwezeshaji kuthibitisha kiotomati hesabu za wanafunzi wakati wa mchezo wa "Ushahidi na Dragons" na kutoa maoni ya kuona kuhusu kinachoendelea wakati wa mechi.
  
  Programu inapatikana mtandaoni kwenye tovuti ya Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
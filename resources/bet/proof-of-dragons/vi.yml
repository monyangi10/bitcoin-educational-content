name: Bằng chứng về rồng
description: |
  Proof & Dragons là một ứng dụng web tương tác được thiết kế như một ứng dụng đồng hành cho trò chơi giáo dục cùng tên. Thông qua nhiều phép ẩn dụ vui nhộn, người dùng có thể trải nghiệm một cách đơn giản cách những người thợ mỏ cạnh tranh để thêm các khối vào Blockchain.
  
  Ứng dụng được giáo viên hoặc người hướng dẫn sử dụng để tự động xác minh các phép tính của học sinh trong trò chơi "Proof & Dragons" và cung cấp phản hồi trực quan về những gì đang diễn ra trong trò chơi.
  
  Ứng dụng có sẵn trực tuyến trên trang web Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
name: 드래곤의 증명
description: |
  프루프 앤 드래곤은 같은 이름의 교육용 게임의 동반 앱으로 설계된 인터랙티브 웹 애플리케이션입니다. 사용자는 여러 가지 재미있는 은유를 통해 채굴자들이 Blockchain에 블록을 추가하기 위해 경쟁하는 과정을 간단한 방식으로 경험할 수 있습니다.
  
  이 애플리케이션은 교사나 진행자가 "증명과 용" 게임 중에 학생들의 계산을 자동으로 확인하고 경기 중에 일어나는 일에 대한 시각적 피드백을 제공하는 데 사용됩니다.
  
  이 앱은 Rainbow Bits 웹사이트(https://rainbowbits.cloud/proof_and_dragons/)에서 온라인으로 다운로드할 수 있습니다
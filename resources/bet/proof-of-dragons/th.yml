name: หลักฐานของมังกร
description: |
  Proof & Dragons เป็นเว็บแอปพลิเคชันเชิงโต้ตอบที่ออกแบบมาเป็นแอปคู่หูสำหรับเกมการศึกษาในชื่อเดียวกัน ผ่านการเปรียบเทียบเชิงเล่นต่างๆ ผู้ใช้สามารถสัมผัสประสบการณ์ในรูปแบบที่ง่ายขึ้นว่าผู้ขุดแข่งขันกันอย่างไรในการเพิ่มบล็อกลงในบล็อกเชน
  
  แอปพลิเคชันนี้ถูกใช้โดยครูหรือผู้ดำเนินการเพื่อยืนยันการคำนวณของนักเรียนโดยอัตโนมัติระหว่างเกม "Proof & Dragons" และให้ข้อเสนอแนะเชิงภาพเกี่ยวกับสิ่งที่เกิดขึ้นระหว่างการแข่งขัน
  
  แอปนี้สามารถใช้งานออนไลน์ได้บนเว็บไซต์ Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
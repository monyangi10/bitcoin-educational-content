name: ドラゴンの証明
description: |
  Proof & Dragonsは、同名の教育用ゲームのコンパニオンアプリとしてデザインされたインタラクティブなウェブアプリケーションです。様々な遊び心のあるメタファーを通して、ユーザーは、採掘者がBlockchainにブロックを追加するためにどのように競争するかを単純化された方法で体験することができます。
  
  このアプリケーションは、教師またはファシリテーターが「Proof & Dragons」ゲーム中に生徒の計算を自動的に検証し、試合中に何が起こっているかを視覚的にフィードバックするために使用されます。
  
  このアプリはレインボービットのウェブサイト(https://rainbowbits.cloud/proof_and_dragons/)からオンラインで入手できます。
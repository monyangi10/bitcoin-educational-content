name: Lohikäärmeiden todisteet
description: |
  Proof & Dragons on interaktiivinen verkkosovellus, joka on suunniteltu samannimisen opetuspelin oheissovellukseksi. Erilaisten leikkimielisten metaforien avulla käyttäjät voivat kokea yksinkertaistetulla tavalla, miten kaivostyöläiset kilpailevat palikoiden lisäämisestä Blockchain:een.
  
  Opettaja tai ohjaaja käyttää sovellusta tarkistamaan automaattisesti oppilaiden laskelmat "Proof & Dragons" -pelin aikana ja antamaan visuaalista palautetta siitä, mitä ottelun aikana tapahtuu.
  
  Sovellus on saatavilla verkossa Rainbow Bitsin verkkosivustolla (https://rainbowbits.cloud/proof_and_dragons/)
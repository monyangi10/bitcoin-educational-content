name: Bukti Naga
description: |
  Proof & Dragons adalah aplikasi web interaktif yang dirancang sebagai aplikasi pendamping untuk game edukasi dengan nama yang sama. Melalui berbagai metafora yang menyenangkan, pengguna dapat merasakan pengalaman dengan cara yang disederhanakan tentang bagaimana para penambang berkompetisi untuk menambahkan blok ke Blockchain.
  
  Aplikasi ini digunakan oleh guru atau fasilitator untuk memverifikasi perhitungan siswa secara otomatis selama permainan "Proof & Dragons" dan memberikan umpan balik visual tentang apa yang terjadi selama pertandingan.
  
  Aplikasi ini tersedia secara online di situs web Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
name: Ikimenyamenya c'Ibikoko
description: |
  Proof & Dragons ni urubuga rwo gukorana n’abantu rwakozwe nk’urubuga rwo gufasha umukino w’inyigisho w’izina nyene. Biciye mu mvugo ngereranyo zitandukanye, abakoresha barashobora kubona mu buryo bworoshe ingene abacukuzi b’amabuye y’agaciro bahiganwa kugira ngo bongere amabuye kuri Blockchain.
  
  Iryo koraniro rikoreshwa n'umwigisha canke umurongozi kugira ngo asuzume ubwo nyene imibare y'abanyeshure mu gihe c'umukino wa "Proof & Dragons" no gutanga inyishu ziboneka ku bibera mu gihe c'umukino.
  
  Iyi porogaramu iboneka ku rubuga rwa Rainbow Bits (https://rainbowbits.cloud/ibimenyamenya_n'ibikoko/)
name: Důkaz o dracích
description: |
  Důkaz a draci je interaktivní webová aplikace navržená jako doprovodná aplikace ke stejnojmenné vzdělávací hře. Prostřednictvím různých hravých metafor si uživatelé mohou zjednodušeným způsobem vyzkoušet, jak horníci soutěží o přidání bloků do Blockchain.
  
  Aplikace slouží učiteli nebo facilitátorovi k automatickému ověřování výpočtů studentů během hry "Důkaz a draci" a poskytuje vizuální zpětnou vazbu o tom, co se během zápasu děje.
  
  Aplikace je k dispozici online na webových stránkách Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
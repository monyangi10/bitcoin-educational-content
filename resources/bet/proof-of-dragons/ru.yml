name: Доказательство существования драконов
description: |
  Proof & Dragons - это интерактивное веб-приложение, разработанное в качестве приложения-компаньона для одноименной образовательной игры. С помощью различных игровых метафор пользователи могут в упрощенном виде увидеть, как шахтеры соревнуются в добавлении блоков в Blockchain.
  
  Приложение используется преподавателем или фасилитатором для автоматической проверки вычислений учащихся во время игры "Доказательства и драконы" и визуальной обратной связи с происходящим во время матча.
  
  Приложение доступно онлайн на сайте Rainbow Bits (https://rainbowbits.cloud/proof_and_dragons/)
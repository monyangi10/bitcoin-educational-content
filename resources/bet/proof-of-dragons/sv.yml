name: Bevis på drakar
description: |
  Proof & Dragons är en interaktiv webbapplikation som är utformad som en kompletterande app till utbildningsspelet med samma namn. Genom olika lekfulla metaforer kan användarna på ett förenklat sätt uppleva hur gruvarbetare tävlar om att lägga till block till en Blockchain.
  
  Applikationen används av läraren eller handledaren för att automatiskt verifiera elevernas beräkningar under "Proof & Dragons"-spelet och ge visuell feedback på vad som händer under matchen.
  
  Appen finns tillgänglig online på Rainbow Bits webbplats (https://rainbowbits.cloud/proof_and_dragons/)
name: Bewijs van draken
description: |
  Proof & Dragons is een interactieve webapplicatie die is ontworpen als begeleidende app bij het gelijknamige educatieve spel. Door middel van verschillende speelse metaforen kunnen gebruikers op een vereenvoudigde manier ervaren hoe mijnwerkers concurreren om blokken toe te voegen aan een Blockchain.
  
  De applicatie wordt door de leerkracht of begeleider gebruikt om automatisch de berekeningen van leerlingen te controleren tijdens het "Proof & Dragons"-spel en visuele feedback te geven over wat er tijdens de wedstrijd gebeurt.
  
  De app is online beschikbaar op de Rainbow Bits website (https://rainbowbits.cloud/proof_and_dragons/)
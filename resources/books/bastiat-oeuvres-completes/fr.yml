  The complete works of Frédéric Bastiat in seven volumes, published by the Institut Coppet. Bastiat (1801-1850) was one of the most brilliant defenders of free trade, property rights, and limited government. His writings combine rigorous economic reasoning with unmatched rhetorical clarity, making complex ideas accessible to all readers.

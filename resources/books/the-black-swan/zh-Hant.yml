title: 「黑天鵝」
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  Nassim Nicholas Taleb 所著的《黑天鵝》是一本關於極不可能發生的事件對我們的生活和周遭世界的影響的書。Taleb 認為這些他稱為 「黑天鵝 」的事件是無法預測的，但卻對我們的生活和整個社會有巨大的影響。這本書讓我們深入了解機會和隨機性在塑造我們生活中所扮演的角色，以及為突發事件做好準備的重要性。它挑戰了風險管理的傳統假設，並提出了另一種理解複雜系統中不確定性的框架。這本書在經濟、金融和決策等領域具有極大的影響力，為那些對偶然性和不確定性在我們生活中的作用感興趣的人提供了一本發人深省的讀物。
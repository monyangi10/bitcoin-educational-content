title: "Nyumba Mweusi"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  The Black Swan cha Nassim Nicholas Taleb ni kitabu kuhusu athari za matukio yasiyowezekana sana katika maisha yetu na ulimwengu unaotuzunguka. Taleb anasema kuwa matukio haya, ambayo anayaita "Black Swans," hayatabiriki, lakini yana athari kubwa kwa maisha yetu na jamii kwa ujumla. Kitabu kinatoa umaizi juu ya jukumu la bahati nasibu katika kuunda maisha yetu na umuhimu wa kuwa tayari kwa matukio yasiyotarajiwa. Inapinga mawazo ya jadi ya usimamizi wa hatari na inatoa mfumo mbadala wa kuelewa kutokuwa na uhakika katika mifumo changamano. Kitabu hiki kimekuwa na ushawishi mkubwa katika nyanja kama vile uchumi, fedha, na kufanya maamuzi, na kinatoa usomaji wenye kuchochea fikira kwa wale wanaovutiwa na jukumu la bahati nasibu na kutokuwa na uhakika katika maisha yetu.
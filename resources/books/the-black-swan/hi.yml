title: "काली बत्तख"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  नासिम निकोलस तालेब द्वारा लिखित द ब्लैक स्वान हमारे जीवन और हमारे आस-पास की दुनिया पर अत्यधिक असंभावित घटनाओं के प्रभाव के बारे में एक पुस्तक है। तालेब का तर्क है कि ये घटनाएँ, जिन्हें वे "ब्लैक स्वान" कहते हैं, पूर्वानुमान योग्य नहीं हैं, लेकिन इनका हमारे जीवन और पूरे समाज पर बहुत बड़ा प्रभाव पड़ता है। यह पुस्तक हमारे जीवन को आकार देने में संयोग और यादृच्छिकता की भूमिका और अप्रत्याशित घटनाओं के लिए तैयार रहने के महत्व के बारे में अंतर्दृष्टि प्रदान करती है। यह जोखिम प्रबंधन की पारंपरिक मान्यताओं को चुनौती देती है और जटिल प्रणालियों में अनिश्चितता को समझने के लिए एक वैकल्पिक ढांचा प्रस्तुत करती है। यह पुस्तक अर्थशास्त्र, वित्त और निर्णय लेने जैसे क्षेत्रों में अत्यधिक प्रभावशाली रही है, और हमारे जीवन में संयोग और अनिश्चितता की भूमिका में रुचि रखने वालों के लिए एक विचारोत्तेजक पाठ प्रदान करती है।
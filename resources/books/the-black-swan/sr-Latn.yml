title: "Crni labud"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  Crni labud od Nassima Nicholasa Taleba je knjiga o uticaju veoma malo verovatnih događaja na naše živote i svet oko nas. Taleb tvrdi da ovi događaji, koje naziva "Crni labudovi," nisu predvidivi, ali imaju ogroman uticaj na naše živote i društvo u celini. Knjiga pruža uvid u ulogu slučajnosti i nasumičnosti u oblikovanju naših života i važnost pripreme za neočekivane događaje. Ona izaziva tradicionalne pretpostavke upravljanja rizikom i predstavlja alternativni okvir za razumevanje nesigurnosti u složenim sistemima. Knjiga je imala veliki uticaj u oblastima kao što su ekonomija, finansije i donošenje odluka, i pruža provokativno štivo za one koji su zainteresovani za ulogu slučajnosti i nesigurnosti u našim životima.
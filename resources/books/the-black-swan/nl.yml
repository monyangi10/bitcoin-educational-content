title: "De zwarte zwaan"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  De Zwarte Zwaan van Nassim Nicholas Taleb is een boek over de impact van zeer onwaarschijnlijke gebeurtenissen op ons leven en de wereld om ons heen. Taleb stelt dat deze gebeurtenissen, die hij "Zwarte Zwanen" noemt, niet voorspelbaar zijn, maar een enorme impact hebben op ons leven en de maatschappij als geheel. Het boek geeft inzicht in de rol van toeval en willekeur in het vormgeven van ons leven en het belang om voorbereid te zijn op onverwachte gebeurtenissen. Het daagt de traditionele aannames van risicomanagement uit en presenteert een alternatief raamwerk voor het begrijpen van onzekerheid in complexe systemen. Het boek heeft veel invloed gehad op gebieden als economie, financiën en besluitvorming en is een interessant boek voor iedereen die geïnteresseerd is in de rol van toeval en onzekerheid in ons leven.
title: "Czarny łabędź"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  Czarny łabędź Nassima Nicholasa Taleba to książka o wpływie wysoce nieprawdopodobnych wydarzeń na nasze życie i otaczający nas świat. Taleb argumentuje, że te wydarzenia, które nazywa "czarnymi łabędziami", nie są przewidywalne, ale mają ogromny wpływ na nasze życie i społeczeństwo jako całość. Książka zapewnia wgląd w rolę przypadku i losowości w kształtowaniu naszego życia oraz znaczenie bycia przygotowanym na nieoczekiwane zdarzenia. Podważa tradycyjne założenia zarządzania ryzykiem i przedstawia alternatywne ramy dla zrozumienia niepewności w złożonych systemach. Książka ta wywarła duży wpływ na takie dziedziny, jak ekonomia, finanse i podejmowanie decyzji, i stanowi prowokującą do myślenia lekturę dla osób zainteresowanych rolą przypadku i niepewności w naszym życiu.
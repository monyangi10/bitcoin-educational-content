title: "L'Élégance de Bitcoin"
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin je inovativni model decentralizovane digitalne valute, čije je postojanje uzdrmalo uspostavljeni poredak nudeći smelu alternativu tradicionalnom bankarskom sistemu. Od svog enigmatičnog stvaranja od strane Satoshi Nakamota 2008. godine, Bitcoin je doživeo eksplozivan rast koji je zaokupio maštu. Oslobodio je strasti, od neograničenog entuzijazma svojih promotera do površnog odbacivanja svojih protivnika. Uronite u ovu očaravajuću knjigu u kojoj autor nudi realističan i pragmatičan pogled na Bitcoin. Otkrićete njegovu fantastičnu priču, kao i ekonomske, ideološke i tehničke principe koji su osigurali njegov opstanak u neprijateljskom okruženju. Izaći ćete sa razumevanjem Bitcoin koje bi moglo transformisati vaš pogled na svet. Ova knjiga je trenutno dostupna samo na francuskom jeziku.
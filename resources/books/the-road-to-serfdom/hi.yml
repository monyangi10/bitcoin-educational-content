title: "दासता का मार्ग"
publication_year: 1944
cover: cover_en.webp
original: true
description: |
  द रोड टू सर्फडम ऑस्ट्रियाई अर्थशास्त्री और दार्शनिक फ्रेडरिक हायेक की एक क्लासिक किताब है, जो मूल रूप से 1944 में प्रकाशित हुई थी। यह किताब केंद्रीय नियोजन और अधिनायकवाद के खतरों के खिलाफ चेतावनी देती है, यह तर्क देते हुए कि अर्थव्यवस्था और समाज पर राज्य का नियंत्रण व्यक्तिगत स्वतंत्रता के नुकसान और तानाशाही के उद्भव की ओर ले जाता है। हायेक का तर्क है कि स्वतंत्रता और समृद्धि को बनाए रखने का एकमात्र तरीका मुक्त बाजार, प्रतिस्पर्धा और सीमित सरकारी हस्तक्षेप को अपनाना है। यह पुस्तक समाजवाद की एक शक्तिशाली आलोचना और शास्त्रीय उदारवाद का बचाव है, और यह समकालीन राजनीतिक और आर्थिक बहसों में प्रभावशाली बनी हुई है।
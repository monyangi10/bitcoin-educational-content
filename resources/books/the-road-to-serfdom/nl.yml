description: |
  The Road to Serfdom is een klassiek boek van de Oostenrijkse econoom en filosoof Friedrich Hayek, oorspronkelijk gepubliceerd in 1944. Het boek waarschuwt voor de gevaren van centrale planning en totalitarisme en stelt dat de controle van de staat over de economie en de samenleving leidt tot het verlies van individuele vrijheid en het ontstaan van een dictatuur. Hayek stelt dat de enige manier om vrijheid en welvaart te behouden het omarmen van vrije markten, concurrentie en beperkte overheidsbemoeienis is. Het boek is een krachtige kritiek op het socialisme en een verdediging van het klassieke liberalisme, en het blijft invloedrijk in hedendaagse politieke en economische debatten.
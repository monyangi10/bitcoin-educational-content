title: "Njia ya Serfdom"
publication_year: 1944
cover: cover_en.webp
original: true
description: |
  The Road to Serfdom ni kitabu cha kawaida cha mwanauchumi na mwanafalsafa wa Austria Friedrich Hayek, kilichochapishwa awali mwaka wa 1944. Kitabu hicho kinaonya dhidi ya hatari ya mipango kuu na uimla, kikisema kwamba udhibiti wa serikali juu ya uchumi na jamii husababisha kupoteza uhuru wa mtu binafsi na kuibuka kwa udikteta. Hayek anasema kuwa njia pekee ya kuhifadhi uhuru na ustawi ni kukumbatia soko huria, ushindani, na uingiliaji kati wa serikali. Kitabu hiki ni uhakiki wenye nguvu wa ujamaa na utetezi wa uliberali wa kitambo, na kinaendelea kuwa na ushawishi katika mijadala ya kisasa ya kisiasa na kiuchumi.
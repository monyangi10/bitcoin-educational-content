title: "Put do ropstva"
publication_year: 1944
cover: cover_en.webp
original: true
description: |
  Put do kmetstva je klasična knjiga austrijskog ekonomiste i filozofa Fridriha Hajeka, prvobitno objavljena 1944. godine. Knjiga upozorava na opasnosti centralnog planiranja i totalitarizma, tvrdeći da kontrola države nad ekonomijom i društvom vodi ka gubitku individualne slobode i pojavi diktature. Hajek tvrdi da je jedini način da se očuvaju sloboda i prosperitet prihvatanje slobodnih tržišta, konkurencije i ograničene državne intervencije. Knjiga je snažna kritika socijalizma i odbrana klasičnog liberalizma, i nastavlja da bude uticajna u savremenim političkim i ekonomskim debatama.
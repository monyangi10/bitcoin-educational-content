title: "Köleliğe Giden Yol"
publication_year: 1944
cover: cover_en.webp
original: true
description: |
  Köleliğe Giden Yol, Avusturyalı ekonomist ve filozof Friedrich Hayek'in ilk olarak 1944 yılında yayımlanan klasik kitabıdır. Kitap, devletin ekonomi ve toplum üzerindeki kontrolünün bireysel özgürlüğün kaybına ve bir diktatörlüğün ortaya çıkmasına yol açtığını savunarak merkezi planlama ve totalitarizmin tehlikelerine karşı uyarıda bulunur. Hayek, özgürlük ve refahı korumanın tek yolunun serbest piyasaları, rekabeti ve sınırlı devlet müdahalesini benimsemek olduğunu savunmaktadır. Sosyalizmin güçlü bir eleştirisi ve klasik liberalizmin bir savunusu olan kitap, çağdaş siyasi ve ekonomik tartışmalarda etkili olmaya devam etmektedir.
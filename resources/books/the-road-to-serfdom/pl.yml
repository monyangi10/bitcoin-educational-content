title: "Droga do poddaństwa"
publication_year: 1944
cover: cover_en.webp
original: true
description: |
  Droga do poddaństwa to klasyczna książka austriackiego ekonomisty i filozofa Friedricha Hayeka, pierwotnie opublikowana w 1944 roku. Książka ostrzega przed niebezpieczeństwami centralnego planowania i totalitaryzmu, argumentując, że kontrola państwa nad gospodarką i społeczeństwem prowadzi do utraty wolności jednostki i pojawienia się dyktatury. Hayek argumentuje, że jedynym sposobem na zachowanie wolności i dobrobytu jest przyjęcie wolnego rynku, konkurencji i ograniczonej interwencji rządu. Książka jest potężną krytyką socjalizmu i obroną klasycznego liberalizmu i nadal ma wpływ na współczesne debaty polityczne i gospodarcze.
title: "Essai sur la répartition des richesses"
publication_year: 1881
cover: cover_fr.webp
original: true
description: |
  Leroy-Beaulieu's Essay on the Distribution of Wealth (1881, expanded 1883) is one of the most thorough liberal treatments of income distribution and inequality. He argues that in a free society, the distribution of wealth naturally tends toward greater equality over time, as competition erodes monopoly profits and capital accumulation raises wages.

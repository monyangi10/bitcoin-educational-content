title: "Bitcoin Mining Priručnik"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Prva knjiga u seriji, Priručnik Bitcoin Mining počinje sa osnovama
  Mining, objašnjavajući podsticaje Proof of Work, neke praktične savete za
  Mining samostalno, i razjašnjavajući uobičajenu zabludu objašnjenjem da
  rudari NE rešavaju složene matematičke probleme. Zatim ulazi malo dublje,
  dotičući se pojave prilagođenog firmvera za rudare, važnosti
  nadogradnje Stratum V2 protokola, i poslovne strane Mining industrije.
  Na kraju, knjiga se završava izborom najboljih Mining memova iz ranog
  2022. godine.
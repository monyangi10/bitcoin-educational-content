title: "Bitcoin Mining पुस्तिका"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  श्रृंखला की पहली पुस्तक, Bitcoin Mining हैंडबुक Mining की मूल बातों से शुरू होती है, Proof of Work के प्रोत्साहनों की व्याख्या करती है, Mining के लिए कुछ व्यावहारिक सुझाव देती है, और यह समझाते हुए एक आम गलतफहमी को दूर करती है कि माइनर्स जटिल गणितीय समस्याओं को हल नहीं कर रहे हैं। फिर यह थोड़ा और गहराई से गोता लगाता है, माइनर्स के लिए कस्टम फ़र्मवेयर के उद्भव, स्ट्रैटम V2 प्रोटोकॉल अपग्रेड के महत्व और Mining उद्योग के व्यावसायिक पक्ष को छूता है। अंत में, पुस्तक 2022 की शुरुआत के बेहतरीन Mining मीम्स के चयन के साथ समाप्त होती है।
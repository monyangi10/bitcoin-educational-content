title: "Bitcoin Mining Podręcznik"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Pierwsza książka z serii, Podręcznik Bitcoin Mining, zaczyna się od podstaw
  gW-4, wyjaśniając zachęty Proof of Work, kilka praktycznych wskazówek dotyczących
  Mining, a także wyjaśnienie powszechnego nieporozumienia poprzez wyjaśnienie, że
  górnicy NIE rozwiązują złożonych problemów matematycznych. Następnie zanurza się nieco głębiej,
  dotykając pojawienia się niestandardowego oprogramowania układowego dla górników, znaczenia aktualizacji protokołu
  Stratum V2 oraz biznesowej strony branży Mining.
  Wreszcie, książka kończy się wyborem najlepszych memów Mining z wczesnych lat
  2022.
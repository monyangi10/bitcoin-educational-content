title: 「Bitcoin Mining 手冊」
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Bitcoin Mining 手冊是該系列的第一本書，從基礎知識開始
  解釋 Proof of Work 的誘因、一些實用的 Mining 訣竅，並澄清常見的誤解，解釋 Mining
  Mining 的一些實用技巧，並澄清一個常見的誤解，說明
  礦工並不是在解決複雜的數學問題。接下來是更深入的探討、
  自訂韌體的出現、Stratum V2 通訊協定升級的重要性，以及
  Stratum V2 協定升級的重要性，以及 Mining 產業的商業層面。
  最後，本書以精選的早期 Mining 諺語作結。
  2022.
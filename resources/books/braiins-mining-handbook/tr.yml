title: "Bitcoin Mining El Kitabı"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Serinin 1. kitabı olan Bitcoin Mining El Kitabı temel bilgilerle başlıyor
  gW-4'ün tanıtılması, Proof of Work'nin teşviklerinin açıklanması, Proof of Work'ye yönelik bazı pratik ipuçları
  Mining'ün kendiniz olduğunu ve yaygın bir yanlış anlamayı açıklayarak
  madenciler karmaşık matematik problemlerini çözmüyorlar. Sonra biraz daha derine dalıyor,
  madenciler için özel aygıt yazılımlarının ortaya çıkışına değinerek, madenciler için
  Stratum V2 protokol yükseltmesi ve Mining endüstrisinin ticari yönü.
  Son olarak kitap, erken dönem Mining memlerinin en iyilerinden bir seçki ile tamamlanıyor
  2022.
title: "Bitcoin Mining Handboek"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Het 1e boek in de serie, het Bitcoin Mining Handboek begint met de basisprincipes van Mining
  van Mining, met uitleg over de stimulansen van Proof of Work, wat praktische tips voor
  Mining zelf, en het ophelderen van een veel voorkomende misvatting door uit te leggen dat
  mijnwerkers GEEN ingewikkelde wiskundige problemen oplossen. Daarna gaat het wat dieper,
  over de opkomst van aangepaste firmware voor miners, het belang van de
  Stratum V2 protocol upgrade, en de zakelijke kant van de Mining industrie.
  Tot slot sluit het boek af met een selectie van de beste Mining memes van het begin van het jaar
  2022.
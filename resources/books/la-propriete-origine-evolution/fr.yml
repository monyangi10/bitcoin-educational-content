title: "La Propriété: Origine et Évolution"
publication_year: 1895
cover: cover_fr.webp
original: true
description: |
  Published in 1895, this work originated as a debate between Yves Guyot and the socialist Paul Lafargue on the origin and justification of property. Guyot defends property as a natural institution rooted in human labor and the necessities of survival, while dismantling the socialist argument that property is merely legalized theft.

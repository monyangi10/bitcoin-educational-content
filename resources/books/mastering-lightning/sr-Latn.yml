title: "Mastering Lightning"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Mastering Lightning" autora Andreas M. Antonopoulos i René Pickhardt je knjiga srednjeg nivoa o Lightning Network, Layer 2 rešenju skaliranja za Bitcoin. Knjiga pokriva tehničke detalje o tome kako Lightning Network funkcioniše, kao i njegov potencijalni uticaj na skalabilnost i privatnost Bitcoin. Autori pružaju korak-po-korak uputstva o tome kako postaviti Lightning čvor i koristiti Lightning novčanike, a takođe raspravljaju o društvenim i ekonomskim implikacijama tehnologije. Sve u svemu, knjiga je vredan resurs za svakoga ko je zainteresovan za razumevanje Lightning Network i njegove uloge u budućnosti Bitcoin.
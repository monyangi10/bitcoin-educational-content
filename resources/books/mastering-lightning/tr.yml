title: "Şimşekte Ustalaşmak"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  andreas M. Antonopoulos ve René Pickhardt tarafından yazılan "Mastering Lightning", Bitcoin için bir Layer 2 ölçeklendirme çözümü olan Lightning Network hakkında orta düzeyde bir kitaptır. Kitap, Lightning Network'ın nasıl çalıştığına dair teknik detayların yanı sıra Bitcoin'in ölçeklenebilirliği ve gizliliği üzerindeki potansiyel etkisini de kapsamaktadır. Yazarlar, bir Lightning düğümünün nasıl kurulacağı ve Lightning cüzdanlarının nasıl kullanılacağı konusunda adım adım talimatlar vermekte ve teknolojinin sosyal ve ekonomik etkilerini de tartışmaktadır. Genel olarak kitap, Lightning Network'ı ve Bitcoin'in geleceğindeki rolünü anlamak isteyen herkes için değerli bir kaynaktır.
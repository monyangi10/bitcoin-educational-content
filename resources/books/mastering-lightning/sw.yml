title: "Umeme kuu"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Mastering Lightning" cha Andreas M. Antonopoulos na René Pickhardt ni kitabu cha kiwango cha kati kuhusu Lightning Network, suluhisho la Layer 2 la kuongeza Bitcoin. Kitabu hiki kinaangazia maelezo ya kiufundi ya jinsi Lightning Network inavyofanya kazi, pamoja na athari yake inayowezekana kwa usalama na faragha ya Bitcoin. Waandishi hutoa maagizo ya hatua kwa hatua juu ya jinsi ya kuanzisha nodi ya Umeme na kutumia pochi za Umeme, na pia wanajadili athari za kijamii na kiuchumi za teknolojia. Kwa ujumla, kitabu hiki ni nyenzo muhimu kwa yeyote anayetaka kuelewa Lightning Network na jukumu lake katika siku zijazo za Bitcoin.
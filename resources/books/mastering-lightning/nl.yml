title: "Bliksem beheersen"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Mastering Lightning" van Andreas M. Antonopoulos en René Pickhardt is een boek op gemiddeld niveau over de Lightning Network, een Layer 2 schaaloplossing voor Bitcoin. Het boek behandelt de technische details van hoe de Lightning Network werkt, evenals de mogelijke invloed op de schaalbaarheid en privacy van Bitcoin. De auteurs geven stapsgewijze instructies voor het opzetten van een Lightning-node en het gebruik van Lightning-wallets, en ze bespreken ook de sociale en economische implicaties van de technologie. Over het geheel genomen is het boek een waardevolle bron voor iedereen die geïnteresseerd is in het begrijpen van de Lightning Network en de rol ervan in de toekomst van Bitcoin.
title: "बिजली पर महारत हासिल करना"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  एंड्रियास एम. एंटोनोपोलोस और रेने पिकहार्ट द्वारा लिखित "मास्टरिंग लाइटनिंग" Lightning Network के बारे में एक मध्यवर्ती स्तर की पुस्तक है, जो Bitcoin के लिए Layer 2 स्केलिंग समाधान है। पुस्तक में Lightning Network के काम करने के तरीके के तकनीकी विवरण के साथ-साथ Bitcoin की स्केलेबिलिटी और गोपनीयता पर इसके संभावित प्रभाव को शामिल किया गया है। लेखक लाइटनिंग नोड को कैसे सेट अप करें और लाइटनिंग वॉलेट का उपयोग कैसे करें, इस पर चरण-दर-चरण निर्देश प्रदान करते हैं, और वे प्रौद्योगिकी के सामाजिक और आर्थिक निहितार्थों पर भी चर्चा करते हैं। कुल मिलाकर, यह पुस्तक Lightning Network और Bitcoin के भविष्य में इसकी भूमिका को समझने में रुचि रखने वाले किसी भी व्यक्ति के लिए एक मूल्यवान संसाधन है।
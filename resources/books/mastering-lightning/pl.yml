title: "Mastering Lightning"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Mastering Lightning" autorstwa Andreasa M. Antonopoulosa i René Pickhardta to średnio zaawansowana książka o Lightning Network, rozwiązaniu skalującym Layer 2 dla Bitcoin. Książka obejmuje szczegóły techniczne działania Lightning Network, a także jego potencjalny wpływ na skalowalność i prywatność Bitcoin. Autorzy dostarczają instrukcji krok po kroku, jak skonfigurować węzeł Lightning i korzystać z portfeli Lightning, a także omawiają społeczne i ekonomiczne implikacje tej technologii. Ogólnie rzecz biorąc, książka jest cennym źródłem informacji dla każdego zainteresowanego zrozumieniem Lightning Network i jego roli w przyszłości Bitcoin.
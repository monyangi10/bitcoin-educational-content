title: "Pieniądze zdrowe i niezdrowe"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Money Sound and Unsound" autorstwa Josepha Salerno to książka na poziomie eksperckim, która bada historię pieniądza i wpływ różnych form pieniądza na gospodarki na przestrzeni dziejów. Autor analizuje różne teorie ekonomiczne i polityki związane z pieniądzem, w tym standard złota, bankowość centralną i inflację oraz ich wpływ na rynki finansowe i społeczeństwa. Analiza Salerno podkreśla konsekwencje niewłaściwej polityki pieniężnej i sugeruje powrót do zdrowych zasad monetarnych w celu osiągnięcia stabilności gospodarczej i dobrobytu. Książka jest przeznaczona dla osób, które interesują się ekonomią i finansami i chcą lepiej zrozumieć rolę pieniądza w społeczeństwie.
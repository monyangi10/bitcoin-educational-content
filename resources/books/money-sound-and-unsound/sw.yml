title: "Sauti ya pesa na isiyo na maana"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Pesa Sauti na Isiyofaa" cha Joseph Salerno ni kitabu cha kiwango cha utaalamu ambacho kinachunguza historia ya pesa na jinsi aina tofauti za pesa zimeathiri uchumi katika historia. Mwandishi anachunguza nadharia na sera mbalimbali za kiuchumi zinazohusiana na fedha, ikiwa ni pamoja na kiwango cha dhahabu, benki kuu, na mfumuko wa bei, na jinsi zilivyoathiri masoko ya fedha na jamii. Mchanganuo wa Salerno unaonyesha matokeo ya sera zisizofaa za fedha na unapendekeza kurudi kwa kanuni nzuri za kifedha ili kufikia utulivu wa kiuchumi na ustawi. Kitabu hiki kimeandikwa kwa ajili ya watu binafsi ambao wana nia ya kina katika uchumi na fedha, na wanataka kupata ufahamu bora wa jukumu la fedha katika jamii.
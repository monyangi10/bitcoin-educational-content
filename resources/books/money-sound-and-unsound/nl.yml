title: "Gezond en ongezond geld"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Money Sound and Unsound" van Joseph Salerno is een boek voor experts dat de geschiedenis van geld onderzoekt en hoe verschillende vormen van geld door de geschiedenis heen van invloed zijn geweest op economieën. De auteur onderzoekt verschillende economische theorieën en beleidsmaatregelen met betrekking tot geld, waaronder de goudstandaard, centraal bankieren en inflatie, en hoe deze de financiële markten en samenlevingen hebben beïnvloed. Salerno's analyse belicht de gevolgen van ondeugdelijk monetair beleid en stelt een terugkeer naar gezonde monetaire principes voor om economische stabiliteit en welvaart te bereiken. Het boek is geschreven voor mensen met een diepgaande interesse in economie en financiën, die een beter begrip willen krijgen van de rol van geld in de samenleving.
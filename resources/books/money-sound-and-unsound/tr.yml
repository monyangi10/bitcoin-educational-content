title: "Sağlam ve Sağlam Olmayan Para"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  joseph Salerno tarafından yazılan "Money Sound and Unsound", paranın tarihini ve farklı para biçimlerinin tarih boyunca ekonomileri nasıl etkilediğini araştıran uzman düzeyinde bir kitaptır. Yazar, altın standardı, merkez bankacılığı ve enflasyon da dahil olmak üzere parayla ilgili çeşitli ekonomik teorileri ve politikaları ve bunların finansal piyasaları ve toplumları nasıl etkilediğini inceliyor. Salerno'nun analizi, sağlam olmayan para politikalarının sonuçlarını vurgulamakta ve ekonomik istikrar ve refaha ulaşmak için sağlam parasal ilkelere geri dönülmesini önermektedir. Bu kitap, ekonomi ve finansa derin bir ilgi duyan ve paranın toplumdaki rolünü daha iyi anlamak isteyen kişiler için yazılmıştır.
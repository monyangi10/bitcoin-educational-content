title: "धन की सार्थकता और अहितकरता"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  जोसेफ सालेर्नो द्वारा लिखित "मनी साउंड एंड अनसाउंड" एक विशेषज्ञ स्तर की पुस्तक है जो पैसे के इतिहास और इतिहास में विभिन्न प्रकार के पैसे ने अर्थव्यवस्थाओं को कैसे प्रभावित किया है, इसका पता लगाती है। लेखक सोने के मानक, केंद्रीय बैंकिंग और मुद्रास्फीति सहित पैसे से संबंधित विभिन्न आर्थिक सिद्धांतों और नीतियों की जांच करता है, और बताता है कि उन्होंने वित्तीय बाजारों और समाजों को कैसे प्रभावित किया है। सालेर्नो का विश्लेषण खराब मौद्रिक नीतियों के परिणामों पर प्रकाश डालता है और आर्थिक स्थिरता और समृद्धि प्राप्त करने के लिए मजबूत मौद्रिक सिद्धांतों की ओर लौटने का सुझाव देता है। यह पुस्तक उन व्यक्तियों के लिए लिखी गई है जिनकी अर्थशास्त्र और वित्त में गहरी रुचि है, और जो समाज में पैसे की भूमिका के बारे में बेहतर समझ हासिल करना चाहते हैं।
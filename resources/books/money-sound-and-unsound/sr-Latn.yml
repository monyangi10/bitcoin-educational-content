title: "Money Sound and Unsound"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Knjiga 'Money Sound and Unsound' autora Josepha Salerna je stručna knjiga koja istražuje istoriju novca i kako su različiti oblici novca uticali na ekonomije kroz istoriju. Autor ispituje različite ekonomske teorije i politike vezane za novac, uključujući zlatni standard, centralno bankarstvo i inflaciju, i kako su one uticale na finansijska tržišta i društva. Salernova analiza ističe posledice neodrživih monetarnih politika i predlaže povratak zdravim monetarnim principima kako bi se postigla ekonomska stabilnost i prosperitet. Knjiga je napisana za pojedince koji imaju duboko interesovanje za ekonomiju i finansije, i žele da steknu bolje razumevanje uloge novca u društvu."
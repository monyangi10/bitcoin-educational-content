title: 「健全與不健全的貨幣」
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Joseph Salerno 所著的《Money Sound and Unsound》是一本專家級的書籍，探討了貨幣的歷史以及不同形式的貨幣在歷史上如何影響經濟。作者檢視了各種與貨幣相關的經濟理論和政策，包括金本位、中央銀行和通貨膨脹，以及它們如何影響金融市場和社會。Salerno 的分析強調不健全貨幣政策的後果，並建議回歸健全的貨幣原則，以達到經濟穩定與繁榮。本書專為對經濟和金融有濃厚興趣，並希望更深入瞭解貨幣在社會中的角色的人士所撰寫。
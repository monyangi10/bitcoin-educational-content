title: "Snow Crash"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  Snow Crash autorstwa Neala Stephensona to średnio zaawansowana powieść, która łączy Elements ekonomii, finansów i prawdopodobieństwa z futurystyczną i cyberpunkową scenerią. Historia rozgrywa się w dystopijnym społeczeństwie, w którym dominuje władza korporacji i technologia wirtualnej rzeczywistości. Główny bohater, Hiro Protagonista, jest hakerem i uzbrojonym w miecz bohaterem, który wyrusza w podróż, aby odkryć sekrety tajemniczego narkotyku o nazwie Snow Crash. Po drodze książka porusza tematy ekonomii, waluty i wpływu technologii informatycznych na społeczeństwo. Dzięki szybkiej fabule, wciągającym postaciom i prowokującej do myślenia eksploracji skrzyżowania technologii i ekonomii, "Snow Crash" oferuje wciągającą lekturę dla osób zainteresowanych zarówno gatunkiem spekulatywnej fikcji, jak i skrzyżowaniem ekonomii i technologii.
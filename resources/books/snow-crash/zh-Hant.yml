title: 「雪崩」
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  Neal Stephenson 所著的《Snow Crash》是一部中級小說，將經濟、金融和概率的 Elements 與未來和賽博龐克的背景融合在一起。故事發生在一個由企業權力和虛擬實境技術主導的烏托邦社會。主角 Hiro Protagonist 是一位駭客，也是一位仗劍天涯的英雄，他踏上了揭開一種名為 Snow Crash 的神秘藥物秘密的旅程。一路上，本書探討了經濟、貨幣以及資訊科技對社會的影響等主題。Snow Crash》以其快節奏的情節、引人入勝的人物，以及對科技與經濟交會的發人深省的探索，為對推理小說類型以及經濟與科技交會感興趣的讀者，提供了一本引人入勝的讀物。
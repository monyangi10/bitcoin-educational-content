title: "Snow Crash"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  Snow Crash van Neal Stephenson is een roman voor gemiddeld niveau die Elements van economie, financiën en waarschijnlijkheid mengt met een futuristische en cyberpunk setting. Het verhaal speelt zich af in een dystopische maatschappij waar bedrijfsmacht en virtual reality-technologie domineren. De hoofdpersoon, Hiro Protagonist, is een hacker en zwaarddragende held die aan een reis begint om de geheimen van een mysterieuze drug genaamd Snow Crash te ontdekken. Onderweg verkent het boek thema's als economie, valuta en de invloed van informatietechnologie op de samenleving. Met zijn snelle plot, boeiende personages en tot nadenken stemmende verkenning van het raakvlak tussen technologie en economie is "Snow Crash" een boeiend boek voor diegenen die geïnteresseerd zijn in zowel het speculatieve fictiegenre als het raakvlak tussen economie en technologie.
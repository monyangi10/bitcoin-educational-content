title: "Snow Crash"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  Snow Crash by Neal Stephenson je roman srednjeg nivoa koji kombinuje Elements ekonomije, finansija i verovatnoće sa futurističkim i sajberpank okruženjem. Priča se odvija u distopijskom društvu gde dominiraju korporativna moć i tehnologija virtuelne stvarnosti. Protagonista, Hiro Protagonist, je haker i heroj sa mačem koji kreće na putovanje kako bi otkrio tajne misteriozne droge zvane Snow Crash. Usput, knjiga istražuje teme ekonomije, valute i uticaja informacione tehnologije na društvo. Sa svojom brzom radnjom, zanimljivim likovima i promišljenim istraživanjem preseka tehnologije i ekonomije, "Snow Crash" nudi fascinantno štivo za one koji su zainteresovani za žanr spekulativne fikcije i presek ekonomije i tehnologije.
original: true
description: |
  Molinari's Course of Political Economy (1855, expanded 1863) is a comprehensive textbook covering the entire range of economic science from a liberal perspective. It represents one of the most systematic presentations of classical liberal economics in the French tradition, covering production, exchange, distribution, consumption, and the role of government.

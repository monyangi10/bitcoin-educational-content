description: |
  Édouard Laboulaye's The Liberal Party (1863) is a programmatic statement of French liberal political philosophy. Laboulaye, a jurist and politician best known internationally for proposing the Statue of Liberty, argues for constitutional government, decentralization, religious tolerance, and the protection of individual rights against both monarchical and democratic despotism.

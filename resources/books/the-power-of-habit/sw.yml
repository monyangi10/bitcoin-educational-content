title: "Nguvu ya Tabia"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Nguvu ya Tabia na Charles Duhigg ni kitabu kinachochunguza jinsi tabia zinavyofanya kazi na jinsi zinaweza kubadilishwa. Mwandishi anatumia utafiti wa kisayansi na hadithi za maisha halisi kueleza jinsi mazoea yanavyoundwa na jinsi yanavyoweza kubadilishwa. Kitabu hiki kinatoa mwongozo wa kuelewa jinsi mazoea yanavyofanya kazi na kinatoa ushauri unaofaa kuhusu jinsi ya kusitawisha mazoea mapya na kuacha ya zamani. Pia inajadili jinsi mazoea yanaweza kutumika kuboresha utendaji wa kibinafsi na kitaaluma, na pia kuunda mabadiliko chanya katika jamii. Kitabu kimeandikwa kwa mtindo unaovutia na unaoweza kufikiwa, na kukifanya kuwa usomaji mzuri kwa mtu yeyote anayependa kuelewa sayansi ya tabia na jinsi zinavyoweza kutumika kuboresha maisha yetu.
title: "Moć navike"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Moć navike od Charlesa Duhigga je knjiga koja istražuje kako navike funkcionišu i kako se mogu promeniti. Autor se oslanja na naučna istraživanja i priče iz stvarnog života kako bi objasnio kako se navike formiraju i kako se mogu promeniti. Knjiga pruža okvir za razumevanje kako navike funkcionišu i nudi praktične savete o tome kako razviti nove navike i razbiti stare. Takođe raspravlja o tome kako se navike mogu primeniti za poboljšanje ličnih i profesionalnih performansi, kao i za stvaranje pozitivnih promena u društvu. Knjiga je napisana na zanimljiv i pristupačan način, što je čini odličnim štivom za svakoga ko je zainteresovan za razumevanje nauke o navikama i kako se one mogu koristiti za poboljšanje naših života.
title: "De kracht van gewoonte"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  The Power of Habit van Charles Duhigg is een boek dat onderzoekt hoe gewoonten werken en hoe ze kunnen worden veranderd. De auteur baseert zich op wetenschappelijk onderzoek en waargebeurde verhalen om uit te leggen hoe gewoonten zich vormen en hoe ze kunnen worden veranderd. Het boek biedt een kader om te begrijpen hoe gewoonten werken en biedt praktisch advies over hoe je nieuwe gewoonten ontwikkelt en oude gewoonten doorbreekt. Het bespreekt ook hoe gewoonten kunnen worden toegepast om persoonlijke en professionele prestaties te verbeteren, maar ook om positieve veranderingen in de samenleving te creëren. Het boek is geschreven in een boeiende en toegankelijke stijl, waardoor het een geweldige leeservaring voor iedereen die geïnteresseerd is in het begrijpen van de wetenschap van gewoonten en hoe ze kunnen worden gebruikt om ons leven te verbeteren.
title: 「習慣的力量」
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Charles Duhigg 所著的《習慣的力量》是一本探討習慣如何運作以及如何改變習慣的書籍。作者利用科學研究和真實生活中的故事來解釋習慣是如何形成的，以及如何改變習慣。本書提供了一個瞭解習慣如何運作的框架，並就如何培養新習慣和打破舊習慣提供了實用建議。它還討論了如何應用習慣來提高個人和職業表現，以及為社會創造積極的變化。本書的撰寫風格引人入勝、通俗易懂，是任何有興趣瞭解習慣科學以及如何利用習慣改善生活的人的最佳讀物。
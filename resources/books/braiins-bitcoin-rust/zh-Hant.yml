description: |
  "Lukáš Hozda 所著的《在 Rust 中建構 Bitcoin》是一本對 Rust 程式語言和 Bitcoin 技術都感興趣的人的簡易指南。
  對 Rust 程式語言和 Bitcoin 技術感興趣的讀者。
  本書專為 IT 學生與專業人士所設計，將帶領讀者了解 Bitcoin 核心概念的過程。
  理解 Bitcoin 核心概念的過程，同時教導他們在 Rust 中建立專案。
  他們在 Rust 中建立專案。
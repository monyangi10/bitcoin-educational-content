title: "Kujenga Bitcoin katika Rust"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  "Kujenga Bitcoin katika Rust" na Lukáš Hozda ni mwongozo unaopatikana kwa wale
  nia ya lugha ya programu ya Rust na teknolojia ya Bitcoin.
  Kitabu hiki kimeundwa kwa ajili ya wanafunzi na wataalamu wa TEHAMA, kinachukua wasomaji kupitia
  mchakato wa kuelewa dhana za msingi za Bitcoin wakati huo huo ukifundisha
  kujenga miradi katika Rust.
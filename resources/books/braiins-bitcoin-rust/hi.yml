title: "Rust में Bitcoin का निर्माण"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  लुकास होज़्दा द्वारा लिखित "Rust में Bitcoin का निर्माण" उन लोगों के लिए एक सुलभ मार्गदर्शिका है जो Rust प्रोग्रामिंग भाषा और Bitcoin तकनीक दोनों में रुचि रखते हैं। आईटी छात्रों और पेशेवरों के लिए डिज़ाइन की गई यह पुस्तक पाठकों को Bitcoin की मूल अवधारणाओं को समझने की प्रक्रिया से गुज़ारती है और साथ ही उन्हें Rust में प्रोजेक्ट बनाना सिखाती है।
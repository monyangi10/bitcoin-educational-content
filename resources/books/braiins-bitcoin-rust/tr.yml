title: "Rust'de Bitcoin'ı İnşa Etmek"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  lukáš Hozda'nın "Building Bitcoin in Rust" adlı kitabı, kullanıcılar için erişilebilir bir rehberdir
  hem Rust programlama dili hem de Bitcoin teknolojisi ile ilgilenenler.
  BT öğrencileri ve profesyonelleri için tasarlanan bu kitap, okuyucuları
  gW-2'nin temel kavramlarını anlama ve aynı zamanda öğretme süreci
  gW-3'te projeler inşa etmeleri için.
title: "Bitcoin bouwen in Rust"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  "Bitcoin bouwen in Rust" van Lukáš Hozda is een toegankelijke gids voor degenen
  die geïnteresseerd zijn in zowel de programmeertaal Rust als de Bitcoin technologie.
  Ontworpen voor IT-studenten en -professionals, neemt dit boek lezers mee door het
  proces van het begrijpen van de kernconcepten van Bitcoin en leert hen tegelijkertijd
  projecten te bouwen in Rust.
title: 「加密資產遺產規劃」
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Pamela Morgan, Esq.所著的《Cryptoasset Inheritance Planning, A Simple Guide for Owners》是一本全面、實用的資源，可以解決 「我死後，我的 Bitcoin、以太坊或其他加密資產會怎麼辦？」的問題。無論您是加密貨幣的擁有者、加密資產代用幣的使用者，或只是關心您數位資產的未來，這本書都提供了建立繼承計畫的清晰藍圖。
  Pamela Morgan 以淺顯易懂的方式撰寫，引導讀者一步一步地制定客製化的加密資產繼承存取計畫。在檢查清單、範本和工作表的幫助下，您將學會如何評估風險、揭穿常見的迷思、瞭解相關法律，以及掌握法律注意事項。重要的是，您將獲得相關知識和工具，將盜竊機會降至最低，為您的摯愛提供安全的資產持有選擇，並防止繼承人之間的潛在衝突。
  本書適合任何有興趣保護自己的加密資產，並確保財富順利轉移的人。您不需要是安全專家或律師，也可以遵循書中提供的實用指南。在本書結束時，您將有信心回答「我死後，我的 Bitcoin、乙醚或其他加密資產會怎麼辦？有了精心設計的存取計畫，您將能夠保護自己的資產，賦予繼承人權力，並維持對數位遺產的控制。
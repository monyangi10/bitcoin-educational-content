title: "Tales about money and Bitcoin: A Journey into the World of Digital Treasures"
publication_year: 2025
cover: cover_en.webp
original: true
description: |
  In this book, you'll discover amazing stories about Peter, Maria, and their cheerful dog Pancho. Together, you'll learn how money came to be, why saving is important, and how the extraordinary Bitcoin is changing the world of money.
  But that's not all! Special games and puzzles are waiting for you at the end. Are you ready to become a true guardian of the digital treasure?
  Come along and dive into this unforgettable journey!
title: 「能源」
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  在《能源，一部人類歷史》一書中，普利策獎得獎作家 Richard Rhodes 帶領我們踏上了一場能源隨時間轉變的迷人旅程。從木材到煤炭，從煤炭到石油，到現在出現的天然瓦斯、核能和可再生能源，Rhodes 探索了能源在塑造人類歷史進程中的關鍵作用。
  透過橫跨五個世紀的重要人物，包括伊莉莎白女王一世 (Queen Elizabeth I)、本傑明-富蘭克林 (Benjamin Franklin)、約翰-洛克菲勒 (John D. Rockefeller) 和亨利-福特 (Henry Ford)，Rhodes 闡明了導致能源生產突破的成功與失敗。他深入探討了從每項挑戰中汲取的教訓、對過渡的掌握以及抓住機遇的能力。
  Rhodes 還考察了當前的能源格局，探討了風能與傳統能源（如煤炭和天然瓦斯）之間的競爭。他直面全球暖化的迫切問題，以及全球人口快速成長所帶來的影響。
  「能源 」提醒我們，在整個歷史中，人類一直在努力從原材料中提取生命。每一項發明、發現和適應都帶來了各自的挑戰，讓我們走到了今天。Rhodes 以他獨特的敘事風格，向我們展示了解我們的能源歷史如何能塑造一個更有見地、更可持續發展的未來。
title: "Nishati"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Katika "Nishati, Historia ya Binadamu," mwandishi aliyeshinda Tuzo ya Pulitzer Richard Rhodes anatupeleka kwenye safari ya kuvutia kupitia mabadiliko ya vyanzo vya nishati kwa wakati. Kutoka kwa kuni hadi makaa ya mawe, kutoka kwa makaa ya mawe hadi mafuta, na sasa kuibuka kwa gesi asilia, nguvu za nyuklia, na nishati mbadala, Rhodes inachunguza jukumu muhimu la nishati katika kuunda historia ya mwanadamu.
  Kupitia wahusika mashuhuri waliodumu kwa karne tano, wakiwemo Malkia Elizabeth I, Benjamin Franklin, John D. Rockefeller, na Henry Ford, Rhodes inaangazia mafanikio na kushindwa kulikosababisha mafanikio katika uzalishaji wa nishati. Anachunguza masomo anayojifunza kutoka kwa kila changamoto, umilisi wa mabadiliko, na uwezo wa kuchukua fursa.
  Rhodes pia huchunguza mazingira ya sasa ya nishati, ikichunguza ushindani kati ya nishati ya upepo na vyanzo vya jadi kama vile makaa ya mawe na gesi asilia. Anakabiliana na suala kubwa la ongezeko la joto duniani na athari za kuongezeka kwa kasi kwa idadi ya watu duniani.
  "Nishati" inatukumbusha kwamba katika historia, wanadamu wamejitahidi kutoa uhai kutoka kwa malighafi. Kila uvumbuzi, ugunduzi, na urekebishaji umeleta seti zake zenyewe za changamoto, zinazotuongoza hadi pale tunaposimama leo. Kwa mtindo wake wa kipekee wa kusimulia hadithi, Rhodes anaonyesha jinsi kuelewa historia yetu ya nishati kunaweza kuunda mustakabali wenye ufahamu zaidi na endelevu.
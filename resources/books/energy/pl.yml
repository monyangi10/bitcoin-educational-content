title: "Energia"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  W "Energy, A Human History", nagrodzony Pulitzerem autor Richard Rhodes zabiera nas w porywającą podróż przez przemiany źródeł energii na przestrzeni czasu. Od drewna do węgla, od węgla do ropy naftowej, a teraz pojawienie się gazu ziemnego, energii jądrowej i energii odnawialnej, Rhodes bada kluczową rolę energii w kształtowaniu biegu historii ludzkości.
  Poprzez obsadę wpływowych postaci obejmujących pięć wieków, w tym królową Elżbietę I, Benjamina Franklina, Johna D. Rockefellera i Henry'ego Forda, Rhodes oświetla sukcesy i porażki, które doprowadziły do przełomów w produkcji energii. Zagłębia się w lekcje wyciągnięte z każdego wyzwania, opanowanie zmian i umiejętność wykorzystywania okazji.
  Rhodes analizuje również obecny krajobraz energetyczny, badając konkurencję między energią wiatrową a tradycyjnymi źródłami, takimi jak węgiel i gaz ziemny. Konfrontuje się z palącą kwestią globalnego ocieplenia i implikacjami szybko rosnącej globalnej populacji.
  "Energia" przypomina nam, że na przestrzeni dziejów ludzie zmagali się z wydobywaniem życia z surowców. Każdy wynalazek, odkrycie i adaptacja przyniosły własny zestaw wyzwań, które doprowadziły nas do miejsca, w którym znajdujemy się dzisiaj. Dzięki swojemu charakterystycznemu stylowi opowiadania, Rhodes pokazuje, jak zrozumienie naszej historii energetycznej może kształtować bardziej świadomą i zrównoważoną przyszłość.
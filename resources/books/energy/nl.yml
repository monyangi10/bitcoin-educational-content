title: "Energie"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  In "Energy, A Human History" neemt de Pulitzer Prize-winnende auteur Richard Rhodes ons mee op een boeiende reis door de overgangen van energiebronnen door de tijd heen. Van hout naar steenkool, van steenkool naar olie, en nu de opkomst van aardgas, kernenergie en hernieuwbare energie, verkent Rhodes de centrale rol van energie in het vormgeven van de loop van de menselijke geschiedenis.
  Aan de hand van invloedrijke personages uit vijf eeuwen, waaronder koningin Elizabeth I, Benjamin Franklin, John D. Rockefeller en Henry Ford, belicht Rhodes de successen en mislukkingen die hebben geleid tot doorbraken in de energieproductie. Hij gaat in op de lessen die geleerd zijn van elke uitdaging, de beheersing van overgangen en het vermogen om kansen te grijpen.
  Rhodes onderzoekt ook het huidige energielandschap en de concurrentie tussen windenergie en traditionele bronnen zoals kolen en aardgas. Hij confronteert ons met het dringende probleem van de opwarming van de aarde en de gevolgen van een snel groeiende wereldbevolking.
  "Energy" herinnert ons eraan dat de mens door de geschiedenis heen heeft geworsteld met het winnen van leven uit grondstoffen. Elke uitvinding, ontdekking en aanpassing bracht zijn eigen uitdagingen met zich mee, die ons hebben gebracht waar we nu zijn. Met zijn kenmerkende verteltrant laat Rhodes zien hoe inzicht in onze energiegeschiedenis kan leiden tot een beter geïnformeerde en duurzamere toekomst.
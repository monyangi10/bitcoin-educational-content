title: "Enerji"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Pulitzer ödüllü yazar Richard Rhodes, "Enerji, Bir İnsanlık Tarihi "nde bizi enerji kaynaklarının zaman içindeki geçişlerinde büyüleyici bir yolculuğa çıkarıyor. Rhodes, odundan kömüre, kömürden petrole ve şimdi de doğal gaz, nükleer enerji ve yenilenebilir enerjinin ortaya çıkışına kadar enerjinin insanlık tarihinin gidişatını şekillendirmedeki önemli rolünü araştırıyor.
  Rhodes, aralarında Kraliçe I. Elizabeth, Benjamin Franklin, John D. Rockefeller ve Henry Ford'un da bulunduğu beş yüzyıla yayılan etkili karakterler aracılığıyla, enerji üretiminde çığır açan başarıları ve başarısızlıkları aydınlatıyor. Her bir zorluktan çıkarılan dersleri, geçişlerin ustalığını ve fırsatları yakalama becerisini inceliyor.
  Rhodes ayrıca rüzgâr enerjisi ile kömür ve doğal gaz gibi geleneksel kaynaklar arasındaki rekabeti araştırarak mevcut enerji ortamını inceliyor. Küresel ısınma sorunuyla ve hızla artan küresel nüfusun sonuçlarıyla yüzleşiyor.
  "Enerji" bize tarih boyunca insanların hammaddelerden yaşam elde etmekle uğraştığını hatırlatıyor. Her icat, keşif ve adaptasyon kendi zorluklarını beraberinde getirmiş ve bizi bugün bulunduğumuz noktaya getirmiştir. Rhodes, kendine özgü hikaye anlatım tarzıyla, enerji tarihimizi anlamanın daha bilinçli ve sürdürülebilir bir geleceği nasıl şekillendirebileceğini gösteriyor.
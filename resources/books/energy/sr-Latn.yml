title: "Energija"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  U "Energija, ljudska istorija," autor nagrađen Pulicerovom nagradom Ričard Rouds vodi nas na fascinantno putovanje kroz tranzicije izvora energije tokom vremena. Od drveta do uglja, od uglja do nafte, pa do pojave prirodnog gasa, nuklearne energije i obnovljivih izvora, Rouds istražuje ključnu ulogu energije u oblikovanju toka ljudske istorije.  
  Kroz galeriju uticajnih ličnosti koje obuhvataju pet vekova, uključujući kraljicu Elizabetu I, Bendžamina Frenklina, Džona D. Rokfelera i Henrija Forda, Rouds osvetljava uspehe i neuspehe koji su doveli do proboja u proizvodnji energije. On se upušta u lekcije naučene iz svakog izazova, savladavanje tranzicija i sposobnost iskorišćavanja prilika.  
  Rouds takođe ispituje trenutni energetski pejzaž, istražujući konkurenciju između energije vetra i tradicionalnih izvora poput uglja i prirodnog gasa. On se suočava sa hitnim pitanjem globalnog zagrevanja i implikacijama brzo rastuće globalne populacije.  
  "Energija" nas podseća da su se kroz istoriju ljudi borili sa izvlačenjem života iz sirovih materijala. Svaki izum, otkriće i prilagođavanje doneli su svoj set izazova, dovodeći nas do mesta gde se danas nalazimo. Sa svojim prepoznatljivim stilom pripovedanja, Rouds pokazuje kako razumevanje naše energetske istorije može oblikovati informisaniju i održiviju budućnost.
title: "ऊर्जा"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  "एनर्जी, ए ह्यूमन हिस्ट्री" में, पुलित्जर पुरस्कार विजेता लेखक रिचर्ड रोड्स हमें समय के साथ ऊर्जा स्रोतों के परिवर्तनों के माध्यम से एक आकर्षक यात्रा पर ले जाते हैं। लकड़ी से लेकर कोयले तक, कोयले से लेकर तेल तक, और अब प्राकृतिक गैस, परमाणु ऊर्जा और नवीकरणीय ऊर्जा के उद्भव तक, रोड्स मानव इतिहास के पाठ्यक्रम को आकार देने में ऊर्जा की महत्वपूर्ण भूमिका का पता लगाते हैं।
  क्वीन एलिजाबेथ I, बेंजामिन फ्रैंकलिन, जॉन डी. रॉकफेलर और हेनरी फोर्ड सहित पांच शताब्दियों में फैले प्रभावशाली पात्रों के माध्यम से, रोड्स उन सफलताओं और असफलताओं को उजागर करते हैं, जिनके कारण ऊर्जा उत्पादन में सफलता मिली। वह प्रत्येक चुनौती से सीखे गए सबक, परिवर्तनों की महारत और अवसरों को जब्त करने की क्षमता पर गहराई से चर्चा करते हैं।
  रोड्स वर्तमान ऊर्जा परिदृश्य की भी जांच करते हैं, पवन ऊर्जा और कोयला और प्राकृतिक गैस जैसे पारंपरिक स्रोतों के बीच प्रतिस्पर्धा की खोज करते हैं। वह ग्लोबल वार्मिंग के दबाव वाले मुद्दे और तेजी से बढ़ती वैश्विक आबादी के निहितार्थों का सामना करते हैं।
  "ऊर्जा" हमें याद दिलाती है कि पूरे इतिहास में, मनुष्य कच्चे माल से जीवन निकालने के लिए जूझते रहे हैं। प्रत्येक आविष्कार, खोज और अनुकूलन ने अपनी चुनौतियों का एक सेट लाया है, जो हमें आज उस स्थान पर ले जाता है जहाँ हम खड़े हैं। अपनी विशिष्ट कहानी कहने की शैली के साथ, रोड्स यह दर्शाता है कि कैसे हमारे ऊर्जा इतिहास को समझना एक अधिक सूचित और टिकाऊ भविष्य को आकार दे सकता है।
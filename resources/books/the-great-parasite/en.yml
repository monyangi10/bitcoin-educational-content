title: "The Great Parasite"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  It briefly explains what money is and tells the story of our banking system, the
  war between the bankers and the founding fathers of the US, and how the banks
  took control of the nation more than a century ago. It points out how the
  banking system really works, why the crisis occurred and how it happened. It
  also talk about the future and how the masters of money plan to retain their
  power by building a digital prison for humanity, thus managing to keep it
  enslaved under infinite debts that cannot be repaid. In all this context of fake
  money created by banks, blatant lies from governments and media censorship, it
  is emphasized how bitcoin is not only a superior form of money to store our time
  and energy, but its also a tool to protect our property and freedom of speech
  rights.

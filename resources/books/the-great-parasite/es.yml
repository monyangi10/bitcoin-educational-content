title: "The Great Parasite"
publication_year: 2023
cover: cover_es.webp
original: false
description: |
  Explica brevemente qué es el dinero y cuenta la historia de nuestro sistema bancario, la guerra entre los banqueros y los padres fundadores de Estados Unidos y cómo los bancos tomaron el control de la nación hace más de un siglo.

  Señala cómo funciona realmente el sistema bancario, por qué se produjo la crisis y cómo ocurrió. También habla del futuro y de cómo los amos del dinero planean conservar su poder construyendo una prisión digital para la humanidad, logrando así mantenerla esclavizada bajo deudas infinitas que no pueden pagar.

  En todo este contexto de dinero falso creado por bancos, mentiras descaradas de los gobiernos y censura de los medios, se enfatiza cómo bitcoin no sólo es una forma superior de dinero para almacenar nuestro tiempo y energía, sino que también es una herramienta para proteger nuestra propiedad y libertad. de los derechos de expresión.

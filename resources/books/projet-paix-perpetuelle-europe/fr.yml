title: "Projet pour rendre la paix perpétuelle en Europe"
publication_year: 1713
cover: cover_fr.webp
original: true
description: |
  The Abbé de Saint-Pierre's Project for Perpetual Peace in Europe (1713) is one of the earliest systematic proposals for international cooperation to prevent war. Saint-Pierre argued that European sovereigns should form a permanent union with binding arbitration, anticipating later ideas about international law and collective security.

title: "Knjiga kodova"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  "The Code Book" od Simona Singha je istraživanje srednjeg nivoa o istoriji, značaju i uticaju kriptografije. Kroz očaravajuće pripovedanje i pristupačna objašnjenja, Singh vodi čitaoce na putovanje kroz vekove, otkrivajući evoluciju kodova i šifara od drevnih vremena do današnjice. Knjiga pokriva ključne trenutke u istoriji kriptografije, kao što su Enigma mašina korišćena tokom Drugog svetskog rata, razvoj kriptografije sa javnim ključem i napredak u digitalnom šifrovanju. Usput, Singh ističe ključnu ulogu koju je kriptografija imala u oblikovanju ljudske istorije, uključujući njen uticaj na ratovanje, politiku i tehnologiju. Sa svojim spojem istorije, matematike i stvarnih primena, "The Code Book" nudi zanimljivo i prosvetljujuće štivo za one koji su zainteresovani za fascinantan svet kodova i šifara.
title: "Het codeboek"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Het Codeboek van Simon Singh is een verkenning op gemiddeld niveau van de geschiedenis, betekenis en impact van cryptografie. Door middel van boeiende verhalen en toegankelijke uitleg neemt Singh lezers mee op een reis door de eeuwen heen en onthult hij de evolutie van codes en cijfers van de oudheid tot nu. Het boek behandelt belangrijke momenten in de geschiedenis van cryptografie, zoals de Enigma machine die gebruikt werd tijdens de Tweede Wereldoorlog, de ontwikkeling van publieke-sleutel cryptografie en de vooruitgang in digitale encryptie. Gaandeweg belicht Singh de centrale rol die cryptografie heeft gespeeld in het vormgeven van de menselijke geschiedenis, waaronder de invloed op oorlogvoering, politiek en technologie. Met zijn mix van geschiedenis, wiskunde en echte toepassingen is "The Code Book" een boeiend en verhelderend boek voor iedereen die geïnteresseerd is in de fascinerende wereld van codes en cijfers.
title: "Kod Kitabı"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Simon Singh'in yazdığı Kod Kitabı, kriptografinin tarihi, önemi ve etkisi üzerine orta seviyede bir keşif kitabıdır. Büyüleyici hikaye anlatımı ve erişilebilir açıklamalarla Singh, okuyucuları çağlar boyunca bir yolculuğa çıkararak antik çağlardan günümüze kodların ve şifrelerin evrimini gözler önüne seriyor. Kitap, İkinci Dünya Savaşı sırasında kullanılan Enigma makinesi, açık anahtarlı kriptografinin gelişimi ve dijital şifrelemedeki ilerlemeler gibi kriptografi tarihindeki önemli anları kapsıyor. Yol boyunca Singh, kriptografinin savaş, politika ve teknoloji üzerindeki etkisi de dahil olmak üzere insanlık tarihini şekillendirmede oynadığı önemli rolü vurgulamaktadır. Tarih, matematik ve gerçek dünya uygulamalarını harmanlayan "Kod Kitabı", kodların ve şifrelerin büyüleyici dünyasına ilgi duyanlar için ilgi çekici ve aydınlatıcı bir okuma sunuyor.
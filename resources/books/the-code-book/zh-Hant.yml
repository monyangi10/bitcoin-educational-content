title: 「密碼大全」
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Simon Singh 所著的《The Code Book》是一本探索密碼學的歷史、意義和影響的中級讀物。透過引人入勝的故事和通俗易懂的解釋，Singh 帶領讀者踏上一段穿越時空的旅程，揭示了從古代到現代的密碼和暗語的演變過程。本書涵蓋了密碼學歷史上的重要時刻，例如第二次世界大戰期間使用的 Enigma 機器、公鑰密碼學的發展，以及數位加密的進步。一路走來，Singh 重點介紹了密碼學在塑造人類歷史中扮演的關鍵角色，包括它對戰爭、政治和科技的影響。The Code Book》結合了歷史、數學和現實世界的應用，為那些對迷人的密碼世界感興趣的人提供了一本引人入勝、富有啟發性的讀物。
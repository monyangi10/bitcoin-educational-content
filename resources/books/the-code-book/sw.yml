title: "Kitabu cha Kanuni"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Kitabu cha Kanuni cha Simon Singh ni uchunguzi wa kiwango cha kati wa historia, umuhimu, na athari za cryptography. Kupitia usimulizi wa hadithi unaovutia na ufafanuzi unaoweza kufikiwa, Singh huwachukua wasomaji katika safari ya vizazi, kufichua mabadiliko ya misimbo na sifa kutoka nyakati za kale hadi leo. Kitabu hiki kinashughulikia matukio muhimu katika historia ya usimbaji fiche, kama vile mashine ya Enigma iliyotumika wakati wa Vita vya Pili vya Dunia, uundaji wa ufunguo wa ufunguo wa umma, na maendeleo katika usimbaji fiche dijitali. Pamoja na hayo, Singh anaangazia jukumu muhimu la usimbaji fiche ambalo limechukua katika kuunda historia ya binadamu, ikiwa ni pamoja na athari zake kwa vita, siasa na teknolojia. Pamoja na mchanganyiko wake wa historia, hisabati na matumizi ya ulimwengu halisi, "The Code Book" hutoa usomaji wa kuvutia na unaoelimisha kwa wale wanaovutiwa na ulimwengu unaovutia wa misimbo na sifa.
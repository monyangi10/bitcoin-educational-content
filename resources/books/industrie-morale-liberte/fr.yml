title: "L'industrie et la morale considérées dans leurs rapports avec la liberté"
publication_year: 1825
cover: cover_fr.webp
original: true
description: |
  Dunoyer's Industry and Morality in their Relationship to Liberty (1825) argues that economic freedom and moral progress are inseparable. Industrial society, far from degrading workers as its critics claim, is the greatest engine of moral improvement in human history — because it rewards cooperation, honesty, and productive effort over force and fraud.

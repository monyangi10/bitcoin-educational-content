title: "Rich Dad Poor Dad"
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  Rich Dad Poor Dad" is een boek over persoonlijke financiën dat lezers wil leren over geldbeheer, het opbouwen van rijkdom en beleggen. Het deelt de ervaring van de auteur die twee vaders had met contrasterende financiële filosofieën - een rijke en een arme. Het boek biedt inzicht in de denkwijze en strategieën van de rijken en benadrukt het belang van financiële educatie, slim investeren en het opbouwen van activa die generate passief inkomen genereren. De auteur gebruikt persoonlijke anekdotes, eenvoudige taal en praktisch advies om complexe financiële concepten uit te leggen, waardoor het een toegankelijk en boeiend boek is voor beginners die meer willen weten over persoonlijke financiën.
title: "Bogati otac, siromašni otac"
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  "Rich Dad Poor Dad" je knjiga o ličnim finansijama koja ima za cilj da nauči čitaoce o upravljanju novcem, izgradnji bogatstva i investiranju. Deli iskustvo autora koji je imao dva oca sa suprotnim finansijskim filozofijama - jednog bogatog i jednog siromašnog. Knjiga nudi uvide u način razmišljanja i strategije bogatih, naglašavajući važnost finansijskog obrazovanja, pametnog investiranja i izgradnje imovine koja generate pasivan prihod. Autor koristi lične anegdote, jednostavan jezik i praktične savete kako bi objasnio složene finansijske koncepte, čineći je pristupačnim i zanimljivim štivom za početnike zainteresovane za učenje više o ličnim finansijama.
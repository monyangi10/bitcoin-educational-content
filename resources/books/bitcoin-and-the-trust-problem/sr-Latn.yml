title: "Bitcoin i Problem poverenja: Kako Bitcoin igra ulogu u popravljanju našeg sveta"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Bitcoin i Problem Poverenja Da li je usvajanje Bitcoin ubrzano zloupotrebom poverenja? Ovo pitanje možda mnogima ne deluje kao važno, čak ni meni kada sam počeo da pišem ovo kao svoj master rad još 2019. godine. Pitanje koje se nadvijalo nad Bitcoin uvek je bilo prisutno, možda zato što još uvek nisam bio siguran u svet oko sebe i šta Bitcoin predstavlja, ali bez sumnje, ovaj tekst je moja sopstvena priča o zečjoj rupi. To je moje istraživanje o tome šta nije u redu sa svetom danas, odgovarajući na pitanje zašto Bitcoin postoji i kako opstaje. Pridružite mi se na mom putovanju ka boljem razumevanju efekata koji igraju ključnu ulogu u raspadu poverenja u našem modernom svetu.
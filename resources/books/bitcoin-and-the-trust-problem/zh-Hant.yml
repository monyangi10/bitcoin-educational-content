title: "Bitcoin與信任問題：Bitcoin如何在修復我們的世界中扮演角色"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Bitcoin 與信任問題 Bitcoin 的採用是否因濫用信任而加速？這個問題對很多人來說可能並不重要，甚至我自己在 2019 年開始寫這篇碩士論文的時候也不覺得重要。關於 Bitcoin 的揮之不去的問題一直存在，也許是因為我對周遭的世界和 Bitcoin 所代表的事物仍不太清楚，但毫無疑問，這篇文章就是我自己的兔子洞故事。它是我自己對當今世界問題所在的研究，回答了關於 Bitcoin 為何存在以及它如何存活的問題。加入我的旅程，讓我更了解在現代世界中，信任的瓦解所扮演的重要角色。
  
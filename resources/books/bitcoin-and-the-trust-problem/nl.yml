title: "Bitcoin en het vertrouwensprobleem: hoe Bitcoin een rol speelt bij het repareren van onze wereld"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Bitcoin en het vertrouwensprobleem Wordt de aanname van Bitcoin versneld door misbruik van vertrouwen? Deze vraag is voor velen misschien niet zo belangrijk, zelfs niet voor mezelf toen ik dit begon te schrijven als mijn masterscriptie in 2019. De slepende vraag over Bitcoin was er altijd al, misschien omdat ik nog niet zo zeker was van de wereld om me heen en wat Bitcoin voorstelt, maar zonder twijfel is dit schrijfstuk mijn eigen konijnenholverhaal. Het is mijn eigen onderzoek naar wat er mis is met de wereld van vandaag, waarbij ik antwoord geef op de vraag waarom Bitcoin bestaat en hoe het overleeft. Ga met me mee op mijn reis naar een beter begrip van de effecten die een cruciale rol spelen in de ontbinding van vertrouwen in onze moderne wereld.
  
title: "Gödel, Escher, Bach: een eeuwige gouden vlecht"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Gödel, Escher, Bach; An Eternal Golden Braid," gepubliceerd in 1979 door Douglas R. Hofstadter, is een Pulitzer Prize-winnende verkenning van de intrigerende kruispunten van wiskunde, kunst en muziek. Het boek is een eerbetoon aan het genie van logicus Kurt Gödel, kunstenaar M.C. Escher en componist Johann Sebastian Bach, waarbij hun werk wordt onderzocht door de lens van formele systemen en hun implicaties.
  
  Hofstadter verweeft deze disciplines op ingenieuze wijze en presenteert unieke inzichten in de aard van menselijke cognitie, bewustzijn en het concept van zelfverwijzing. Door complexe wetenschappelijke en filosofische concepten op een toegankelijke manier te presenteren, heeft Hofstadter een meesterwerk gemaakt dat de grenzen van academische disciplines overstijgt, waardoor het een intellectuele traktatie is voor een breed scala aan lezers.
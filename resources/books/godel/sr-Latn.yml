title: "Gödel, Escher, Bach: an Eternal Golden Braid"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Gödel, Escher, Bach; An Eternal Golden Braid," objavljena 1979. godine od strane Douglasa R. Hofstadtera, je dobitnik Pulitzerove nagrade i istražuje intrigantne spojeve matematike, umetnosti i muzike. Knjiga odaje počast geniju logičara Kurta Gödel-a, umetnika M. C. Escher-a i kompozitora Johann-a Sebastian-a Bach-a, istražujući njihov rad kroz prizmu formalnih sistema i njihovih implikacija.
  
  Hofstadter vešto isprepliće ove discipline, nudeći jedinstvene uvide u prirodu ljudske spoznaje, svesti i koncepta samoreferencije. Predstavljajući složene naučne i filozofske koncepte na pristupačan način, Hofstadter je stvorio remek-delo koje prevazilazi granice akademskih disciplina, čineći ga intelektualnim užitkom za širok spektar čitalaca.
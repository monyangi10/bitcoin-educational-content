title: "Gödel, Escher, Bach: Sonsuz Altın Örgü"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Douglas R. Hofstadter tarafından 1979 yılında yayımlanan Gödel, Escher, Bach; An Eternal Golden Braid (Gödel, Escher, Bach; Sonsuz Altın Örgü), matematik, sanat ve müziğin ilgi çekici kesişimlerine dair Pulitzer ödüllü bir araştırmadır. Kitap, mantıkçı Kurt Gödel, ressam M. C. Escher ve besteci Johann Sebastian Bach'ın dehalarına saygı duruşunda bulunarak, çalışmalarını biçimsel sistemler ve bunların sonuçları merceğinden inceliyor.
  
  Hofstadter bu disiplinleri ustaca bir araya getirerek insan bilişinin, bilincinin ve öz-referans kavramının doğasına dair eşsiz içgörüler sunuyor. Hofstadter, karmaşık bilimsel ve felsefi kavramları erişilebilir bir şekilde sunarak, akademik disiplinlerin sınırlarını aşan bir başyapıt yaratmış ve bu kitabı geniş bir okuyucu kitlesi için entelektüel bir ziyafet haline getirmiştir.
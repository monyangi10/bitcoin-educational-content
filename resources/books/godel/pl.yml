title: "Gödel, Escher, Bach: wieczny złoty warkocz"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Gödel, Escher, Bach; An Eternal Golden Braid", opublikowana w 1979 roku przez Douglasa R. Hofstadtera, to nagrodzona Pulitzerem eksploracja intrygujących skrzyżowań matematyki, sztuki i muzyki. Książka składa hołd geniuszowi logika Kurta Gödla, artysty M. C. Eschera i kompozytora Johanna Sebastiana Bacha, badając ich pracę przez pryzmat systemów formalnych i ich implikacji.
  
  Hofstadter genialnie przeplata te dyscypliny, prezentując unikalny wgląd w naturę ludzkiego poznania, świadomości i koncepcji samoodniesienia. Przedstawiając złożone koncepcje naukowe i filozoficzne w przystępny sposób, Hofstadter stworzył arcydzieło, które przekracza granice dyscyplin akademickich, czyniąc z niego intelektualną gratkę dla szerokiego grona czytelników.
title: "Pit-Bull Lessen van Wall Street Kampioen Daghandelaar"
publication_year: 1998
cover: cover_en.webp
original: true
description: |
  "Pit Bull" is een memoires van Martin Schwartz, een succesvolle handelaar in de jaren 1980 en 1990, die zijn ervaringen en strategieën in de wereld van de handel beschrijft. Schwartz deelt de lessen die hij in de loop van zijn carrière heeft geleerd, waaronder zijn benadering van risicomanagement, marktanalyse en psychologie. Hij geeft ook inzicht in de persoonlijkheden en praktijken van enkele van de meest succesvolle handelaren van zijn tijd. Het boek biedt een uniek perspectief op de uitdagingen en kansen van het handelen in de snelle en risicovolle financiële wereld.
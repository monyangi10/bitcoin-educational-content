title: "Uchumi wa Msingi"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Basic Economics" kilichoandikwa na Thomas Sowell ni kitabu cha kiwango cha wanaoanza ambacho kinalenga kutoa maelezo ya wazi na mafupi ya kanuni za msingi za kiuchumi. Kinashughulikia mada mbalimbali ikiwa ni pamoja na Supply na mahitaji, udhibiti wa bei, biashara ya kimataifa na kodi. Sowell anawasilisha dhana za kiuchumi kwa njia ya moja kwa moja, bila kutumia jargon changamano au lugha ya kitaalamu ambayo ni bora zaidi kwa msomaji wa kitabu au msomaji wa kiuchumi. uelewa wa somo.
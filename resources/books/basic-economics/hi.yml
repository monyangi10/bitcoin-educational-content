title: "मूलभूत अर्थशास्त्र"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  थॉमस सोवेल द्वारा लिखित "बेसिक इकोनॉमिक्स" एक शुरुआती स्तर की पुस्तक है जिसका उद्देश्य बुनियादी आर्थिक सिद्धांतों की स्पष्ट और संक्षिप्त व्याख्या प्रदान करना है। इसमें Supply और मांग, मूल्य नियंत्रण, अंतर्राष्ट्रीय व्यापार और कराधान सहित कई विषयों को शामिल किया गया है। सोवेल जटिल शब्दजाल या तकनीकी भाषा का उपयोग किए बिना, सीधे तरीके से आर्थिक अवधारणाओं को प्रस्तुत करता है। यह पुस्तक उन पाठकों के लिए आदर्श है जिन्हें अर्थशास्त्र का बहुत कम या कोई पूर्व ज्ञान नहीं है और जो इस विषय की बेहतर समझ हासिल करना चाहते हैं।
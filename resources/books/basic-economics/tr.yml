title: "Temel Ekonomi"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Thomas Sowell tarafından yazılan "Temel Ekonomi", temel ekonomik ilkelerin açık ve özlü bir açıklamasını sunmayı amaçlayan başlangıç düzeyinde bir kitaptır. Supply ve talep, fiyat kontrolleri, uluslararası ticaret ve vergilendirme gibi geniş bir konu yelpazesini kapsamaktadır. Sowell, ekonomik kavramları karmaşık bir jargon ya da teknik bir dil kullanmadan anlaşılır bir şekilde sunmaktadır. Kitap, ekonomi hakkında çok az bilgisi olan ya da hiç bilgisi olmayan ve konuyu daha iyi anlamak isteyen okuyucular için idealdir.
title: "Osnovna ekonomija"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  "Basic Economics" by Thomas Sowell je knjiga za početnike koja ima za cilj da pruži jasno i sažeto objašnjenje osnovnih ekonomskih principa. Pokriva širok spektar tema uključujući Supply i potražnju, kontrolu cena, međunarodnu trgovinu i oporezivanje. Sowell predstavlja ekonomske koncepte na jednostavan način, bez upotrebe komplikovanog žargona ili tehničkog jezika. Knjiga je idealna za čitaoce sa malo ili nimalo predznanja iz ekonomije koji žele da steknu bolje razumevanje ove oblasti.
title: "Basiseconomie"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Basic Economics" van Thomas Sowell is een boek voor beginners met als doel een duidelijke en beknopte uitleg te geven van economische basisprincipes. Het behandelt een breed scala aan onderwerpen, waaronder Supply en vraag, prijsbeheersing, internationale handel en belastingen. Sowell presenteert economische concepten op een eenvoudige manier, zonder gebruik van ingewikkeld jargon of technische taal. Het boek is ideaal voor lezers met weinig of geen voorkennis van economie die een beter begrip van het onderwerp willen krijgen.
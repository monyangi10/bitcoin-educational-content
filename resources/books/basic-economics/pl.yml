title: "Podstawy ekonomii"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Podstawy ekonomii" autorstwa Thomasa Sowella to książka dla początkujących, która ma na celu zapewnienie jasnego i zwięzłego wyjaśnienia podstawowych zasad ekonomicznych. Obejmuje ona szeroki zakres tematów, w tym Supply i popyt, kontrolę cen, handel międzynarodowy i podatki. Sowell przedstawia koncepcje ekonomiczne w prosty sposób, bez użycia skomplikowanego żargonu lub języka technicznego. Książka jest idealna dla czytelników z niewielką lub żadną wcześniejszą wiedzą na temat ekonomii, którzy chcą lepiej zrozumieć ten temat.
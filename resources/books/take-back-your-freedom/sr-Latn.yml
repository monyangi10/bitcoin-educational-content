title: "Preuzmite nazad svoju slobodu od Dr. Fiat! Tihi otpor Bitcoin pokreta"
publication_year: 2025
cover: cover_en.webp
original: true
description: |
  U budućnosti, čovečanstvom potpuno upravlja AI-mreža pod nazivom "Fiat Network." Na čelu ove mreže nalazi se masivna veštačka inteligencija poznata kao "Dr. Fiat," koja nadgleda sve ekonomske aktivnosti. Vlade i banke postale su samo senke svojih nekadašnjih oblika, a ekonomska nejednakost se ubrzala. Ljudi su izgubili slobodu, a društvo sada vrednuje pojedince isključivo na osnovu njihovih kreditnih rejtinga.
  
  Usred ove distopijske stvarnosti, grupa pobunjenika se uzdiže—Yuki i njegovi saborci, poznati kao "Otpor." Ovi mladi revolucionari veruju u slobodnu ekonomiju i nastoje da povrate vrednost Exchange kroz decentralizovane mreže. Proučavaju istoriju novca od davnina, otkrivajući probleme uzrokovane fiat valutom i zalažući se za potencijal Bitcoin kao alternative.
  
  Međutim, Dr. Fiat je nadmoćna sila. Kroz svoju AI-pokretanu mrežu, manipuliše globalnim ekonomskim sistemom, suzbijajući neistomišljenike zamrzavanjem imovine i proizvoljnim promenama kreditnih rejtinga kako bi ih izbrisao iz društva. Iako su malobrojni, Otpor veruje u moć Bitcoin i stoji protiv Dr. Fiata.
  
  Mogu li Yuki i njegovi saveznici osloboditi svet od Dr. Fiata i vratiti ekonomsku slobodu ljudima? Ova velika priča, koja spaja znanje i avanturu, nudi putovanje kroz istoriju novca i revolucionarni potencijal Bitcoin. I tako, tiha borba počinje...
  
  Sadržaj, Prolog, Poglavlje 1 - Poreklo Novca, Poglavlje 2 - Rođenje Dr. Fiata, Poglavlje 3 - Moć Bitcoin, Poglavlje 4 - Tiha Bitka sa Dr. Fiatom, Poglavlje 5 - Povratak Slobode, Epilog, Pogovor
title: "從 Fiat 博士手中奪回自由！Bitcoin 反抗的默默奮鬥"
publication_year: 2025
cover: cover_en.webp
original: true
description: |
  在未來，人類完全被人工智能管理的「菲亞特網絡」所控制。這個網路的掌舵人是被稱為「Dr. Fiat」的大型 AI，它負責監督所有的經濟活動。政府和銀行已經變得面目全非，而經濟不平等也在加速。人們失去了自由，社會現在只根據個人的信用分數來評價個人。
  
  在這個烏托邦式的現實中，一群反叛者崛起了-Yuki 和他的同志們，被稱為 「抵抗組織」。這些年輕的革命者相信自由經濟，並尋求透過分散式網路重新獲得 Exchange 的價值。他們研究自古以來的貨幣歷史，揭露法定貨幣所造成的問題，並提倡 Bitcoin 作為替代方案的潛力。
  
  然而，法幣博士是一股壓倒性的力量。它透過人工智慧驅動的網路，操控全球經濟體系，藉由凍結資產和任意更改信用評分，將異見者從社會中抹除，從而壓制異見者。儘管反抗軍人數不多，但他們相信 Bitcoin 的力量，並與 Dr. Fiat 對抗。
  
  Yuki 和他的盟友能否從 Dr. Fiat 手中解放世界，恢復人民的經濟自由？這個宏大的故事，融合了知識與冒險，提供了一個穿越金錢歷史的旅程，以及 Bitcoin 的革命潛力。就這樣，平靜的鬥爭開始了...
  
  目錄、序言、第 1 章 - 貨幣的起源、第 2 章 - 菲亞特博士的誕生、第 3 章 - Bitcoin 的力量、第 4 章 - 與菲亞特博士的悄悄戰鬥、第 5 章 - 重奪自由、後記、後言
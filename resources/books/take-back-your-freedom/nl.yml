title: "Neem je vrijheid terug van Dr. Fiat! De stille strijd van het Bitcoin verzet"
publication_year: 2025
cover: cover_en.webp
original: true
description: |
  In de toekomst wordt de mensheid volledig gecontroleerd door het door AI's beheerde "Fiat Netwerk" Aan het roer van dit netwerk staat de gigantische AI die bekend staat als "Dr. Fiat" en die toezicht houdt op alle economische activiteiten. Regeringen en banken zijn slechts omhulsels van zichzelf geworden en de economische ongelijkheid is toegenomen. Mensen hebben hun vrijheid verloren en de maatschappij waardeert individuen nu alleen nog op basis van hun kredietscore.
  
  Te midden van deze dystopische realiteit rijst een groep rebellen op, Yuki en zijn kameraden, die bekend staan als het "Verzet" Deze jonge revolutionairen geloven in een vrije economie en willen waarde Exchange terugwinnen via gedecentraliseerde netwerken. Ze bestuderen de geschiedenis van het geld uit de oudheid, leggen de problemen bloot die worden veroorzaakt door fiatvaluta en pleiten voor het potentieel van Bitcoin als alternatief.
  
  Dr. Fiat is echter een overweldigende kracht. Via zijn AI-gestuurde netwerk manipuleert het het wereldwijde economische systeem, onderdrukt het andersdenkenden door tegoeden te bevriezen en willekeurige kredietscores aan te passen om ze uit de samenleving te wissen. Ondanks hun geringe aantal gelooft het Verzet in de kracht van Bitcoin en verzet het zich tegen Dr. Fiat.
  
  Kunnen Yuki en zijn bondgenoten de wereld bevrijden van Dr. Fiat en de mensen hun economische vrijheid teruggeven? Dit grootse verhaal, een mix van kennis en avontuur, biedt een reis door de geschiedenis van geld en het revolutionaire potentieel van Bitcoin. En zo begint de stille strijd..
  
  Inhoudsopgave, Proloog, Hoofdstuk 1 - De oorsprong van geld, Hoofdstuk 2 - De geboorte van Dr. Fiat, Hoofdstuk 3 - De kracht van Bitcoin, Hoofdstuk 4 - De stille strijd met Dr. Fiat, Hoofdstuk 5 - Vrijheid herwinnen, Epiloog, Nawoord
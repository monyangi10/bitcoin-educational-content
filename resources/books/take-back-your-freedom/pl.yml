title: "Odzyskaj wolność od doktora Fiata! Cicha walka oporu Bitcoin"
publication_year: 2025
cover: cover_en.webp
original: true
description: |
  W przyszłości ludzkość jest całkowicie kontrolowana przez zarządzaną przez SI "Sieć Fiata" Na czele tej sieci stoi ogromna sztuczna inteligencja znana jako "Dr Fiat", która nadzoruje całą działalność gospodarczą. Rządy i banki stały się jedynie skorupami swoich dawnych postaci, a nierówności ekonomiczne przyspieszyły. Ludzie stracili wolność, a społeczeństwo ceni teraz jednostki wyłącznie na podstawie ich zdolności kredytowej.
  
  Pośród tej dystopijnej rzeczywistości powstaje grupa rebeliantów - Yuki i jego towarzysze, znani jako "Ruch Oporu" Ci młodzi rewolucjoniści wierzą w wolną gospodarkę i starają się odzyskać wartość Exchange poprzez zdecentralizowane sieci. Badają historię pieniądza od czasów starożytnych, ujawniając problemy powodowane przez walutę fiducjarną i opowiadając się za potencjałem Bitcoin jako alternatywy.
  
  Dr Fiat jest jednak przytłaczającą siłą. Poprzez swoją sieć opartą na sztucznej inteligencji manipuluje globalnym systemem gospodarczym, tłumiąc dysydentów poprzez zamrażanie aktywów i arbitralne zmienianie wyników kredytowych w celu wymazania ich ze społeczeństwa. Pomimo niewielkiej liczebności, Ruch Oporu wierzy w moc Bitcoin i przeciwstawia się Doktorowi Fiatowi.
  
  Czy Yuki i jego sojusznicy zdołają uwolnić świat od Doktora Fiata i przywrócić ludziom wolność gospodarczą? Ta wielka opowieść, łącząca wiedzę i przygodę, oferuje podróż przez historię pieniądza i rewolucyjny potencjał Bitcoin. I tak zaczyna się cicha walka..
  
  Spis treści, Prolog, Rozdział 1 - Pochodzenie pieniądza, Rozdział 2 - Narodziny doktora Fiata, Rozdział 3 - Potęga Bitcoin, Rozdział 4 - Cicha walka z doktorem Fiatem, Rozdział 5 - Odzyskanie wolności, Epilog, Przedmowa
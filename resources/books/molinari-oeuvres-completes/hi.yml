description: |
  The complete works of Gustave de Molinari (1819-1912), published by the Institut Coppet. Molinari was perhaps the most radical and consistent of the French liberal economists, famous for his argument that even the production of security — police, courts, defense — could be provided by competing private firms rather than a government monopoly.

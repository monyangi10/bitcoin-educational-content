title: "खेल में त्वचा"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  नासिम निकोलस तालेब द्वारा लिखित स्किन इन द गेम एक ऐसी किताब है जो किसी भी निर्णय, व्यवसाय या उद्यम में व्यक्तिगत हिस्सेदारी रखने की अवधारणा की खोज करती है। तालेब का तर्क है कि व्यक्तियों, व्यवसायों और सरकारों को उनके द्वारा उठाए गए जोखिमों के लिए जवाबदेह ठहराया जाना चाहिए, और व्यक्तिगत जोखिम लेने की कमी ने वित्तीय संकट से लेकर राजनीतिक भ्रष्टाचार तक दुनिया की कई समस्याओं को जन्म दिया है। वास्तविक दुनिया के उदाहरणों और विचारोत्तेजक उपाख्यानों के माध्यम से, तालेब पाठकों को "स्किन इन द गेम" के विचार को अपनाने और अपने कार्यों और निर्णयों के लिए Ownership लेने के लिए प्रोत्साहित करते हैं, जिससे अंततः अधिक सफलता और समृद्धि प्राप्त होती है।
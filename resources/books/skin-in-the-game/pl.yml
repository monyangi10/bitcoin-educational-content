title: "Skin In The Game"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Skin in the Game autorstwa Nassima Nicholasa Taleba to książka, która bada koncepcję posiadania osobistego udziału w każdej decyzji, biznesie lub przedsięwzięciu, w które się angażujemy. Taleb argumentuje, że jednostki, firmy i rządy powinny ponosić odpowiedzialność za podejmowane ryzyko, a brak podejmowania osobistego ryzyka doprowadził do wielu światowych problemów, od kryzysu finansowego po korupcję polityczną. Poprzez rzeczywiste przykłady i prowokujące do myślenia anegdoty, Taleb zachęca czytelników do przyjęcia idei "skóry w grze" i wzięcia Ownership za swoje działania i decyzje, co ostatecznie prowadzi do większego sukcesu i dobrobytu"
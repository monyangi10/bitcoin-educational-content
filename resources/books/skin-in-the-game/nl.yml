title: "Huid in het spel"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Skin in the Game van Nassim Nicholas Taleb is een boek dat het concept onderzoekt van het hebben van een persoonlijk belang in elke beslissing, bedrijf of onderneming waar men zich mee bezighoudt. Taleb stelt dat individuen, bedrijven en overheden verantwoordelijk moeten worden gehouden voor de risico's die ze nemen en dat het gebrek aan het nemen van persoonlijke risico's heeft geleid tot veel van de problemen in de wereld, van de financiële crisis tot politieke corruptie. Door middel van voorbeelden uit de praktijk en tot nadenken stemmende anekdotes moedigt Taleb lezers aan om het idee van "skin in the game" te omarmen en Ownership te nemen van hun acties en beslissingen, wat uiteindelijk leidt tot meer succes en welvaart
title: "Skin In The Game"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Nassim Nicholas Taleb'in Skin in the Game adlı kitabı, alınan herhangi bir kararda, yapılan herhangi bir işte ya da girişimde kişisel bir pay sahibi olma kavramını inceleyen bir kitaptır. Taleb, bireylerin, işletmelerin ve hükümetlerin aldıkları risklerden sorumlu tutulması gerektiğini ve kişisel risk alma eksikliğinin finansal krizden siyasi yolsuzluğa kadar dünyanın birçok sorununa yol açtığını savunuyor. Taleb, gerçek dünyadan örnekler ve düşündürücü anekdotlar aracılığıyla okuyucuları "oyunda deri" fikrini benimsemeye, eylem ve kararlarının Ownership'ını almaya ve sonuçta daha fazla başarı ve refaha yol açmaya teşvik ediyor
title: "Ngozi Katika Mchezo"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Skin in the Game cha Nassim Nicholas Taleb ni kitabu ambacho kinachunguza dhana ya kuwa na hisa ya kibinafsi katika uamuzi wowote, biashara, au biashara ambayo mtu anajishughulisha nayo. Taleb anabisha kwamba watu binafsi, wafanyabiashara na serikali wanapaswa kuwajibika kwa hatari wanazochukua, na kwamba kukosekana kwa hatari ya kibinafsi kumesababisha shida nyingi za kifedha ulimwenguni, kutoka kwa shida za kifedha duniani. Kupitia mifano ya ulimwengu halisi na hadithi za kusisimua fikira, Taleb huwahimiza wasomaji kukumbatia wazo la "ngozi katika mchezo" na kuchukua Ownership ya matendo na maamuzi yao, hatimaye kusababisha mafanikio na ustawi zaidi.'
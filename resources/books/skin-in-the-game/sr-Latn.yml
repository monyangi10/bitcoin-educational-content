title: "Skin In The Game"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Skin in the Game by Nassim Nicholas Taleb je knjiga koja istražuje koncept ličnog uloga u bilo kojoj odluci, poslu ili preduzeću u kojem se neko angažuje. Taleb tvrdi da pojedinci, preduzeća i vlade treba da budu odgovorni za rizike koje preuzimaju, i da je nedostatak ličnog preuzimanja rizika doveo do mnogih svetskih problema, od finansijske krize do političke korupcije. Kroz primere iz stvarnog sveta i anegdote koje podstiču na razmišljanje, Taleb ohrabruje čitaoce da prihvate ideju "skin in the game" i preuzmu Ownership svojih postupaka i odluka, što na kraju vodi ka većem uspehu i prosperitetu.'
title: "Skin In The Game"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Nassim Nicholas Taleb 所著的《Skin in the Game》一書探討了在任何決策、業務或企業中擁有個人利益的概念。Taleb 認為，個人、企業和政府都應該為他們所承擔的風險負責，而缺乏個人風險承擔已導致世界上從金融危機到政治腐敗的許多問題。透過真實世界的例子和發人深省的趣聞軼事，Taleb 鼓勵讀者接受 「置身遊戲中 」的觀念，對自己的行為和決定負責，最終獲得更大的成功和繁榮。
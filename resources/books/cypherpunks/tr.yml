title: "Cypherpunks; Özgürlük ve İnternetin Geleceği"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Julian Assange, Jacob Appelbaum ve Andy Müller-Maguhn ile birlikte "Cypherpunks; Freedom and the Future of the Internet" kitabında Cypherpunk hareketini ve dijital geleceğimiz üzerindeki etkilerini düşündürücü bir şekilde inceliyor. Güçlü kriptografinin gücüne odaklanan kitap, elektronik iletişimin özgürleşmeye mi yoksa baskıya mı yol açacağını incelemek üzere bir grup etkili düşünür ve aktivisti bir araya getiriyor.
  Assange, Facebook ve Google gibi teknoloji devleri tarafından yürütülen gözetimin kapsamı hakkında kritik sorular sorarak, bunların hayatlarımızı sürekli izleyen eşi benzeri görülmemiş bir gözetim makinesini temsil edip etmediğini soruyor. Yazarlar ayrıca, gözetimle işbirliği kavramını irdeliyor ve özellikle kara para aklama, uyuşturucu, terörizm ve pornografi gibi toplumsal kaygılarla ilişkili olarak farklı gözetim biçimlerinin meşruiyetini araştırıyor. Ayrıca, bilinçli eylemin ve teknolojik becerinin direnmemize ve internetin özgürlüğü teşvik ettiği bir dünya yaratmamıza yardımcı olup olamayacağını da inceliyorlar.
  WikiLeaks ve diğer internet aktivistlerinin taciz edilmesi ve dosya paylaşımını kısıtlamaya yönelik yasal girişimler, internet politikasında bir dönüm noktasına işaret ederken, kitap karşı karşıya olduğumuz seçenekler hakkında tam zamanında bir tartışma sunuyor. Biri zayıflar için mahremiyeti ve güçlüler için şeffaflığı savunan, diğeri ise bireysel mahremiyete müdahale ederken hükümet ve şirket kontrolünü sürdüren zıt vizyonlar sunuyor. Assange ve yardımcı tartışmacıları, açıklık ve ilgi çekici bir coşkuyla, bu önemli kararı çevreleyen karmaşıklıkların üstesinden geliyor ve okuyucuları internetin geleceği ve içindeki özgürlüklerimizin korunması üzerine düşünmeye sevk ediyor.
title: "Cypherpunks; Uhuru na Mustakabali wa Mtandao"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Katika "Cypherpunks; Uhuru na Mustakabali wa Mtandao," Julian Assange, pamoja na waandishi-wenza Jacob Appelbaum na Andy Müller-Maguhn, wanawasilisha uchunguzi wenye kuchochea fikira wa harakati za Cypherpunk na athari zake kwa mustakabali wetu wa kidijitali. Kwa kuzingatia nguvu ya usimbaji fiche kali, kitabu hiki huleta pamoja kundi la wanafikra na wanaharakati wenye ushawishi kuchunguza ikiwa mawasiliano ya kielektroniki yatasababisha ukombozi au ukandamizaji.
  Assange anauliza maswali muhimu kuhusu kiwango cha ufuatiliaji unaofanywa na makampuni makubwa ya teknolojia kama vile Facebook na Google, akiuliza kama wanawakilisha mashine ya uchunguzi ambayo haijawahi kushuhudiwa ambayo hufuatilia maisha yetu kila mara. Zaidi ya hayo, waandishi hujishughulisha na dhana ya kushirikiana na ufuatiliaji na kuchunguza uhalali wa aina tofauti za ufuatiliaji, hasa kuhusiana na masuala ya kijamii kama vile utakatishaji fedha, dawa za kulevya, ugaidi na ponografia. Pia wanachunguza kama vitendo na ujuzi wa kiteknolojia vinaweza kutusaidia kupinga na kuunda ulimwengu ambapo Mtandao unakuza uhuru.
  Huku unyanyasaji wa WikiLeaks na wanaharakati wengine wa mtandao, pamoja na majaribio ya kisheria ya kuzuia ugavi wa faili, kuashiria mabadiliko katika siasa za mtandao, kitabu hiki kinatoa mjadala wa wakati unaofaa wa chaguzi tunazokabili. Inaonyesha maono yanayotofautisha—moja ambayo inatetea faragha kwa walio dhaifu na uwazi kwa wenye mamlaka, na nyingine inayoendeleza udhibiti wa serikali na shirika huku ikiingilia faragha ya mtu binafsi. Kwa uwazi na shauku inayohusisha, Assange na wajadilianaji wenzake hupitia matatizo yanayozunguka uamuzi huu muhimu, na kuwafanya wasomaji kutafakari mustakabali wa intaneti na uhifadhi wa uhuru wetu ndani yake.
title: "Cypherpunks; Vrijheid en de toekomst van het internet"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  In "Cypherpunks; Freedom and the Future of the Internet" presenteert Julian Assange, samen met co-auteurs Jacob Appelbaum en Andy Müller-Maguhn, een tot nadenken stemmende verkenning van de Cypherpunk beweging en de implicaties voor onze digitale toekomst. Met een focus op de kracht van sterke cryptografie, brengt het boek een groep invloedrijke denkers en activisten samen om te onderzoeken of elektronische communicatie zal leiden tot bevrijding of onderdrukking.
  Assange werpt kritische vragen op over de mate van surveillance door techgiganten als Facebook en Google en vraagt zich af of zij een ongekende surveillancemachine vormen die ons leven voortdurend volgt. Verder verdiepen de auteurs zich in het concept van samenwerking met surveillance en onderzoeken ze de legitimiteit van verschillende vormen van surveillance, met name in relatie tot maatschappelijke problemen zoals het witwassen van geld, drugs, terrorisme en pornografie. Ze onderzoeken ook of bewuste actie en technologische kennis ons kunnen helpen om weerstand te bieden en een wereld te creëren waarin het internet vrijheid bevordert.
  Nu de intimidatie van WikiLeaks en andere internetactivisten, samen met wetgevende pogingen om het delen van bestanden te beperken, een keerpunt betekenen in de politiek van het internet, biedt het boek een tijdige discussie over de keuzes waar we voor staan. Het presenteert contrasterende visies - één die privacy voor de zwakkeren en transparantie voor de machtigen bepleit, en een andere die de controle van de overheid en bedrijven bestendigt en tegelijkertijd inbreuk maakt op de individuele privacy. Met helderheid en innemend enthousiasme navigeren Assange en zijn medebesprekers door de complexiteit van deze cruciale beslissing en zetten ze lezers aan na te denken over de toekomst van het internet en het behoud van onze vrijheden daarin.
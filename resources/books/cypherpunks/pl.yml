title: "Cypherpunks; wolność i przyszłość internetu"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  W "Cypherpunks; Freedom and the Future of the Internet" Julian Assange, wraz ze współautorami Jacobem Appelbaumem i Andym Müller-Maguhnem, przedstawia prowokującą do myślenia eksplorację ruchu Cypherpunk i jego implikacji dla naszej cyfrowej przyszłości. Skupiając się na sile silnej kryptografii, książka gromadzi grupę wpływowych myślicieli i aktywistów, aby zbadać, czy komunikacja elektroniczna doprowadzi do wyzwolenia czy ucisku.
  Assange stawia krytyczne pytania dotyczące zakresu inwigilacji prowadzonej przez gigantów technologicznych, takich jak Facebook i Google, pytając, czy reprezentują one bezprecedensową maszynę inwigilacyjną, która nieustannie śledzi nasze życie. Ponadto autorzy zagłębiają się w koncepcję współpracy z nadzorem i badają zasadność różnych form nadzoru, szczególnie w odniesieniu do obaw społecznych, takich jak pranie pieniędzy, narkotyki, terroryzm i pornografia. Badają również, czy świadome działania i technologiczna wiedza mogą pomóc nam stawić opór i stworzyć świat, w którym Internet sprzyja wolności.
  Ponieważ nękanie WikiLeaks i innych aktywistów internetowych, wraz z próbami legislacyjnymi ograniczenia udostępniania plików, sygnalizuje punkt zwrotny w polityce internetowej, książka ta oferuje aktualną dyskusję na temat wyborów, przed którymi stoimy. Przedstawia kontrastujące wizje - jedną, która opowiada się za prywatnością dla słabych i przejrzystością dla potężnych, oraz drugą, która utrwala kontrolę rządu i korporacji, jednocześnie naruszając prywatność jednostki. Z jasnością i entuzjazmem, Assange i jego współdyskutanci poruszają się po zawiłościach otaczających tę kluczową decyzję, skłaniając czytelników do zastanowienia się nad przyszłością Internetu i zachowaniem w nim naszych wolności.
title: "साइफरपंक्स; स्वतंत्रता और इंटरनेट का भविष्य"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  "साइफरपंक्स; स्वतंत्रता और इंटरनेट का भविष्य" में, जूलियन असांजे, सह-लेखक जैकब एपेलबाम और एंडी मुलर-मैगुहन के साथ, Cypherpunk आंदोलन और हमारे डिजिटल भविष्य के लिए इसके निहितार्थों की एक विचारोत्तेजक खोज प्रस्तुत करते हैं। मजबूत क्रिप्टोग्राफी की शक्ति पर ध्यान केंद्रित करते हुए, पुस्तक प्रभावशाली विचारकों और कार्यकर्ताओं के एक समूह को यह जांचने के लिए एक साथ लाती है कि क्या इलेक्ट्रॉनिक संचार मुक्ति या उत्पीड़न की ओर ले जाएगा। असांजे फेसबुक और गूगल जैसी तकनीकी दिग्गजों द्वारा की जाने वाली निगरानी की सीमा के बारे में महत्वपूर्ण सवाल उठाते हैं, यह पूछते हुए कि क्या वे एक अभूतपूर्व निगरानी मशीन का प्रतिनिधित्व करते हैं जो लगातार हमारे जीवन को ट्रैक करती है। इसके अलावा, लेखक निगरानी के साथ सहयोग की अवधारणा में तल्लीन हैं और निगरानी के विभिन्न रूपों की वैधता का पता लगाते हैं, विशेष रूप से मनी लॉन्ड्रिंग, ड्रग्स, आतंकवाद और पोर्नोग्राफ़ी जैसी सामाजिक चिंताओं के संबंध में। वे यह भी जांचते हैं कि क्या सचेत कार्रवाई और तकनीकी समझदारी हमें प्रतिरोध करने और एक ऐसी दुनिया बनाने में मदद कर सकती है जहाँ इंटरनेट स्वतंत्रता को बढ़ावा देता है। विकीलीक्स और अन्य इंटरनेट कार्यकर्ताओं के उत्पीड़न के साथ-साथ फ़ाइल शेयरिंग को प्रतिबंधित करने के विधायी प्रयासों ने इंटरनेट की राजनीति में एक महत्वपूर्ण मोड़ का संकेत दिया है, यह पुस्तक हमारे सामने आने वाले विकल्पों पर समयोचित चर्चा प्रस्तुत करती है। यह विपरीत दृष्टिकोण प्रस्तुत करता है - एक जो कमज़ोर लोगों के लिए गोपनीयता और शक्तिशाली लोगों के लिए पारदर्शिता की वकालत करता है, और दूसरा जो व्यक्तिगत गोपनीयता में दखल देते हुए सरकार और कॉर्पोरेट नियंत्रण को कायम रखता है। स्पष्टता और आकर्षक उत्साह के साथ, असांजे और उनके सह-चर्चाकर्ता इस महत्वपूर्ण निर्णय के इर्द-गिर्द की जटिलताओं को समझते हैं, पाठकों को इंटरनेट के भविष्य और इसके भीतर हमारी स्वतंत्रता के संरक्षण पर विचार करने के लिए प्रेरित करते हैं।
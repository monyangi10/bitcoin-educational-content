title: 「Cypherpunks；自由與網際網路的未來」
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  在《Cypherpunks; Freedom and the Future of the Internet》一書中，Julian Assange 與合著者 Jacob Appelbaum 和 Andy Müller-Maguhn 一起，對 Cypherpunk 運動及其對我們數位未來的影響進行了發人深省的探討。本書以強大密碼學的力量為重點，匯集一群具影響力的思想家與活動家，檢視電子通訊究竟會帶來解放還是壓迫。
  Assange 對 Facebook 和 Google 等科技巨頭所進行的監控程度提出批判性質疑，詢問它們是否代表著一台前所未有的監控機器，不斷追蹤我們的生活。此外，作者深入探討與監控合作的概念，並探討不同形式監控的合法性，尤其是與洗錢、毒品、恐怖主義、色情等社會議題有關的監控。他們也檢視有意識的行動和精明的技術是否能幫助我們抵抗並創造一個網路能促進自由的世界。
  由於 WikiLeaks 和其他網際網路積極份子所受到的騷擾，以及立法限制檔案分享的嘗試，標誌著網際網路政治的轉捩點，這本書適時地討論了我們所面臨的選擇。這本書提出了兩種截然不同的願景：一種願景主張弱者擁有隱私，強者擁有透明度；另一種願景則主張政府和企業的控制永遠存在，同時侵犯個人隱私。Assange 和他的共同討論者以清晰的思路和引人入勝的熱情，闡述了圍繞這一重要決策的複雜性，促使讀者思考互聯網的未來以及在互聯網中維護我們的自由。
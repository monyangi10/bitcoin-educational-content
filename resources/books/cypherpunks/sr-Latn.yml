title: "Cypherpunks; Sloboda i budućnost interneta"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  U "Cypherpunks; Sloboda i budućnost interneta," Julian Assange, zajedno sa koautorima Jacobom Appelbaumom i Andyjem Müller-Maguhnom, predstavlja provokativno istraživanje Cypherpunk pokreta i njegovih implikacija za našu digitalnu budućnost. Sa fokusom na moć jake kriptografije, knjiga okuplja grupu uticajnih mislilaca i aktivista kako bi ispitala da li će elektronske komunikacije dovesti do oslobođenja ili ugnjetavanja.
  Assange postavlja ključna pitanja o obimu nadzora koji sprovode tehnološki giganti poput Facebooka i Googlea, pitajući da li oni predstavljaju neviđenu mašinu za nadzor koja konstantno prati naše živote. Nadalje, autori se upuštaju u koncept saradnje sa nadzorom i istražuju legitimnost različitih oblika nadzora, posebno u vezi sa društvenim pitanjima kao što su pranje novca, droge, terorizam i pornografija. Takođe ispituju da li svesna akcija i tehnološka veština mogu pomoći da se odupremo i stvorimo svet u kojem internet podstiče slobodu.
  Kako uznemiravanje WikiLeaksa i drugih internet aktivista, zajedno sa zakonodavnim pokušajima da se ograniči deljenje fajlova, signaliziraju prekretnicu u politici interneta, knjiga nudi pravovremenu diskusiju o izborima sa kojima se suočavamo. Ona predstavlja kontrastne vizije—jednu koja zagovara privatnost za slabe i transparentnost za moćne, i drugu koja perpetuira vladinu i korporativnu kontrolu dok narušava individualnu privatnost. Sa jasnoćom i angažovanom entuzijazmom, Assange i njegovi sagovornici navigiraju kroz složenosti koje okružuju ovu ključnu odluku, podstičući čitaoce da razmisle o budućnosti interneta i očuvanju naših sloboda unutar njega.
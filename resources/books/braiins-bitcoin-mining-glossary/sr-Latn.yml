description: |
  Bitcoin Mining je zbunjujuće. Kao prvi Bitcoin Mining pool na svetu, znamo
  to. Braiins propagandni tim je sastavio 256 pojmova, organizovanih po
  kategorijama, kako bi pomogao novim rudarima da započnu u industriji. Bilo da želite da
  pokrenete jedan ASIC za grejanje vašeg doma ili razvijete punu Mining postrojenje, ovaj rečnik
  će vam pomoći da počnete.
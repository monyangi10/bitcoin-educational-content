title: "Woordenlijst Bitcoin Mining"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin Mining is verwarrend. Als 's werelds eerste Bitcoin Mining pool, weten we
  dat. Het Braiins propagandateam stelde 256 termen samen, georganiseerd per
  categorieën, om nieuwe mijnwerkers op weg te helpen in de industrie. Of je nu
  een ASIC wilt gebruiken om je huis te verwarmen of een volledige Mining installatie wilt ontwikkelen, deze woordenlijst
  helpt je op weg.
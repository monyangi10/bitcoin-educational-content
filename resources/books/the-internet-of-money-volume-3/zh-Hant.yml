title: 「貨幣的互聯網（第三卷）」
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Andreas Antonopoulos 所著的《貨幣互聯網（第 3 冊）》是一本初學者級的書籍，探討 Bitcoin、金融和經濟的交集。本書於 2019 年出版，是 Antonopoulos 深入探討 Bitcoin 的各個面向及其對社會影響的系列之一。在本書中，他將重點放在 Bitcoin 在重塑全球金融體系和經濟方面的轉型潛力。Antonopoulos 透過一系列的演講和論文，深入探討 Bitcoin 的基本原則和概念，以淺顯易懂的方式將複雜的議題化解。他探討了 Bitcoin 的分散性、其擾亂傳統金融機構的潛力，以及對全球經濟的影響。Antonopoulos 還強調了透過 Bitcoin 實現金融包容性和賦權的重要性。The Internet of Money (Volume 3) 是希望掌握 Bitcoin、金融及其廣泛經濟影響基礎知識的初學者的絕佳起點。本書全面且引人入勝地介紹了 Bitcoin 世界及其對金融環境的潛在影響。
title: "De zeester en de spin: De onstuitbare kracht van organisaties zonder leiders"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Starfish and the Spider; The Unstoppable Power of Leaderless Organizations van Ori Brafman en Rod A. Beckstrom onderzoekt het fenomeen van gedecentraliseerde organisaties die opereren zonder traditionele hiërarchieën of leiderschapsstructuren. Door middel van een reeks casestudies en voorbeelden belicht het boek de sterke en zwakke punten van deze organisaties, waaronder het vermogen om zich snel aan te passen aan veranderingen en te innoveren, maar ook het potentieel voor chaos en gebrek aan verantwoording. De auteurs stellen dat het begrijpen van deze organisaties zonder leider cruciaal is in een wereld waar technologie en communicatie gedecentraliseerde modellen levensvatbaarder en effectiever hebben gemaakt.
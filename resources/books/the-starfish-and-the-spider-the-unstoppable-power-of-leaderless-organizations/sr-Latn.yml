title: "Zvezdača i Pauk: Nezaustavljiva Moć Organizacija Bez Lidera"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Starfish and the Spider; Nezaustavljiva moć organizacija bez lidera od Ori Brafmana i Roda A. Bekstroma istražuje fenomen decentralizovanih organizacija koje funkcionišu bez tradicionalnih hijerarhija ili struktura vođstva. Kroz niz studija slučaja i primera, knjiga ističe snage i slabosti ovih organizacija, koje uključuju sposobnost brzog prilagođavanja promenama i inovacijama, ali i potencijal za haos i nedostatak odgovornosti. Autori tvrde da je razumevanje ovih organizacija bez lidera ključno u svetu gde su tehnologija i komunikacija učinili decentralizovane modele održivijim i efikasnijim.
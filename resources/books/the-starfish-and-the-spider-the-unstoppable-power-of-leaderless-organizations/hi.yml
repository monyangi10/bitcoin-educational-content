title: "स्टारफिश और स्पाइडर: नेतृत्वहीन संगठनों की अजेय शक्ति"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  ओरी ब्राफमैन और रॉड ए. बेकस्ट्रॉम द्वारा लिखित द स्टारफिश एंड द स्पाइडर; द अनस्टॉपेबल पावर ऑफ लीडरलेस ऑर्गनाइजेशन उन विकेंद्रीकृत संगठनों की घटना की पड़ताल करता है जो पारंपरिक पदानुक्रम या नेतृत्व संरचनाओं के बिना काम करते हैं। केस स्टडी और उदाहरणों की एक श्रृंखला के माध्यम से, पुस्तक इन संगठनों की ताकत और कमजोरियों को उजागर करती है, जिसमें परिवर्तन और नवाचार के लिए तेजी से अनुकूलन करने की क्षमता शामिल है, लेकिन अराजकता और जवाबदेही की कमी की संभावना भी शामिल है। लेखक तर्क देते हैं कि इन नेतृत्वहीन संगठनों को समझना एक ऐसी दुनिया में महत्वपूर्ण है जहाँ प्रौद्योगिकी और संचार ने विकेंद्रीकृत मॉडल को अधिक व्यवहार्य और प्रभावी बना दिया है।
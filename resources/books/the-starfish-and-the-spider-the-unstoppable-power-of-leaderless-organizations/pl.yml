title: "Rozgwiazda i pająk: Niepowstrzymana siła organizacji bez liderów"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Starfish and the Spider; The Unstoppable Power of Leaderless Organizations autorstwa Oriego Brafmana i Roda A. Beckstroma bada zjawisko zdecentralizowanych organizacji, które działają bez tradycyjnych hierarchii lub struktur przywódczych. Poprzez serię studiów przypadków i przykładów, książka podkreśla mocne i słabe strony tych organizacji, które obejmują zdolność do szybkiego dostosowywania się do zmian i innowacji, ale także potencjał chaosu i braku odpowiedzialności. Autorzy argumentują, że zrozumienie tych bezprzywódczych organizacji ma kluczowe znaczenie w świecie, w którym technologia i komunikacja sprawiły, że zdecentralizowane modele stały się bardziej opłacalne i skuteczne.
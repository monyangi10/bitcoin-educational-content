title: "Starfish na Spider: Nguvu Isiyozuilika ya Mashirika Yasiyo na Viongozi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Nyota na Buibui; Nguvu Isiyozuilika ya Mashirika Yasiyo na Viongozi na Ori Brafman na Rod A. Beckstrom inachunguza hali ya mashirika yaliyogatuliwa ambayo yanafanya kazi bila madaraja ya kitamaduni au miundo ya uongozi. Kupitia mfululizo wa tafiti na mifano, kitabu kinaangazia nguvu na udhaifu wa mashirika haya, ambayo ni pamoja na uwezo wa kukabiliana haraka na mabadiliko na uvumbuzi, lakini pia uwezekano wa machafuko na ukosefu wa uwajibikaji. Waandishi wanahoji kwamba kuelewa mashirika haya yasiyo na viongozi ni muhimu katika ulimwengu ambapo teknolojia na mawasiliano yamefanya miundo ya ugatuzi kuwa na manufaa zaidi na yenye ufanisi.
title: "海星與蜘蛛：無領導組織不可阻擋的力量"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Ori Brafman 和 Rod A. Beckstrom 所著的《The Starfish and the Spider; The Unstoppable Power of Leaderless Organizations》一書探討了沒有傳統階級或領導架構的分權組織現象。通過一系列的案例研究和舉例，書中強調了這些組織的優點和缺點，其中包括快速適應變化和創新的能力，但也有可能導致混亂和缺乏問責性。作者認為，在科技與溝通讓分散模式更可行、更有效的今天，了解這些無領導者組織至關重要。
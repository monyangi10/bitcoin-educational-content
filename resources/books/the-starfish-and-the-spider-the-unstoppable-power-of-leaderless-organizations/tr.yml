title: "Denizyıldızı ve Örümcek: Lidersiz Organizasyonların Durdurulamaz Gücü"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Ori Brafman ve Rod A. Beckstrom tarafından yazılan Denizyıldızı ve Örümcek; Lidersiz Organizasyonların Durdurulamaz Gücü, geleneksel hiyerarşiler veya liderlik yapıları olmadan çalışan merkezi olmayan organizasyonlar olgusunu incelemektedir. Kitap, bir dizi vaka çalışması ve örnek aracılığıyla, bu kuruluşların değişime hızla uyum sağlama ve yenilik yapma becerisinin yanı sıra kaos ve hesap verebilirlik eksikliği potansiyelini de içeren güçlü ve zayıf yönlerini vurgulamaktadır. Yazarlar, teknoloji ve iletişimin merkezi olmayan modelleri daha uygulanabilir ve etkili hale getirdiği bir dünyada bu lidersiz organizasyonları anlamanın çok önemli olduğunu savunmaktadır.
title: "Rat umetnosti"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Rat Art by Steven Pressfield je motivaciona i knjiga za samopomoć koja ima za cilj da pomogne čitaocima da prevaziđu kreativnu blokadu i slede svoje kreativne strasti. Knjiga istražuje psihološke i emocionalne barijere koje mogu sprečiti ljude da ostvare svoj kreativni potencijal i nudi praktične savete i strategije za prevazilaženje ovih prepreka. Sa mešavinom ličnih anegdota i primenljivih uvida, "Rat Art" podstiče čitaoce da usvoje disciplinovaniji i fokusiraniji pristup svom kreativnom radu, dok istovremeno prepoznaju i poštuju izazove i nagrade kreativnog procesa.
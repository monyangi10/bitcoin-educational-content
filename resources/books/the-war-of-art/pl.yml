title: "Wojna o sztukę"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  The War of Art autorstwa Stevena Pressfielda to książka motywacyjna i samopomocowa, która ma na celu pomóc czytelnikom przezwyciężyć blokadę twórczą i realizować swoje kreatywne pasje. Książka bada psychologiczne i emocjonalne bariery, które mogą uniemożliwić ludziom realizację ich twórczego potencjału i oferuje praktyczne porady i strategie pokonywania tych przeszkód. Dzięki połączeniu osobistych anegdot i praktycznych spostrzeżeń, "The War of Art" zachęca czytelników do przyjęcia bardziej zdyscyplinowanego i skoncentrowanego podejścia do ich twórczej pracy, jednocześnie uznając i honorując wyzwania i nagrody związane z procesem twórczym.
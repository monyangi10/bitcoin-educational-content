title: "De oorlog van de kunst"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  The War of Art van Steven Pressfield is een motivatie- en zelfhulpboek dat lezers wil helpen creatieve blokkades te overwinnen en hun creatieve passies na te streven. Het boek onderzoekt de psychologische en emotionele barrières die mensen ervan kunnen weerhouden hun creatieve potentieel te realiseren en biedt praktisch advies en strategieën om deze obstakels te overwinnen. Met een mix van persoonlijke anekdotes en bruikbare inzichten moedigt "The War of Art" lezers aan om hun creatieve werk gedisciplineerder en gerichter aan te pakken, terwijl ze ook de uitdagingen en beloningen van het creatieve proces erkennen en eren.
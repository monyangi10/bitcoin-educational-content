title: "La Liberté du Travail, l'Association et la Démocratie"
publication_year: 1867
cover: cover_fr.webp
original: false
description: |
  Baudrillart extends his analysis of labor freedom to the questions of voluntary association and democratic governance. He argues that genuine democracy requires economic liberty — that political freedom without the freedom to work, trade, and associate is an empty promise.

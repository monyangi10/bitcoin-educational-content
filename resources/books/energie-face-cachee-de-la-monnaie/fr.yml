title: "L'énergie, face cachée de la monnaie"

publication_year: 2024 

cover: cover_fr.webp

original: true

description: |
  Transitions énergétique et numérique sont au cœur des préoccupations du public mais les liens physiques entre énergie et information restent méconnus. Les principes du fonctionnement de l’énergie et de l’information qui expliquent les phénomènes naturels et les comportements sociaux sont trop souvent ignorés. Réintroduire la rationalité dans un débat public dominé par l’idéologie passe par la pédagogie. Après avoir rappelé simplement les 3 principes thermodynamiques de base, ce livre décrit comment ils s’appliquent dans nos vies, à travers des exemples concrets. Les notions d’énergie potentielle et d’entropie, la différence entre données et information, les liens entre information, monnaie et énergie n’auront plus de secrets pour vous.

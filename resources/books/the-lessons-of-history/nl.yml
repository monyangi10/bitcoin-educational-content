title: "De lessen van de geschiedenis"
publication_year: 1968
cover: cover_en.webp
original: true
description: |
  The Lessons of History van Will Durant en Ariel Durant is een boek dat een overzicht biedt van de belangrijkste historische gebeurtenissen en ideeën. Het geeft een overzicht van de geschiedenis van de menselijke beschaving en bespreekt de opkomst en ondergang van verschillende rijken, de rol van religie, de invloed van technologie en de invloed van individuen. Het boek put uit de uitgebreide kennis van de auteurs op het gebied van geschiedenis en filosofie en vat deze samen tot beknopte, tot nadenken stemmende inzichten. Met een focus op de terugkerende patronen van de geschiedenis en menselijk gedrag, biedt "De lessen van de geschiedenis" een fascinerend perspectief op de aard van de beschaving en de krachten die haar vormen.
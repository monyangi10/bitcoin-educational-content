title: "Lekcje historii"
publication_year: 1968
cover: cover_en.webp
original: true
description: |
  The Lessons of History autorstwa Willa Duranta i Ariela Duranta to książka, która oferuje przegląd najważniejszych wydarzeń i idei historycznych. Przedstawia przegląd historii ludzkiej cywilizacji, omawiając powstanie i upadek różnych imperiów, rolę religii, wpływ technologii i wpływ jednostek. Książka czerpie z rozległej wiedzy historycznej i filozoficznej autorów i destyluje ją w zwięzłe, prowokujące do myślenia spostrzeżenia. Skupiając się na powtarzających się wzorcach historii i ludzkich zachowań, "The Lessons of History" oferuje fascynujące spojrzenie na naturę cywilizacji i siły, które ją kształtują.
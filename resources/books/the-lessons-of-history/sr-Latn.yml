title: "Pouke istorije"
publication_year: 1968
cover: cover_en.webp
original: true
description: |
  "The Lessons of History" od Willa Duranta i Ariel Durant je knjiga koja nudi pregled najznačajnijih istorijskih događaja i ideja. Predstavlja pregled istorije ljudske civilizacije, raspravljajući o usponu i padu različitih carstava, ulozi religije, uticaju tehnologije i uticaju pojedinaca. Knjiga se oslanja na široko znanje autora o istoriji i filozofiji i destiluje ga u sažete, misaone uvide. Sa fokusom na ponavljajuće obrasce istorije i ljudskog ponašanja, "The Lessons of History" nudi fascinantnu perspektivu o prirodi civilizacije i silama koje je oblikuju.
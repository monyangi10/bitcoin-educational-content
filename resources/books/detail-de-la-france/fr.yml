description: |
  Pierre de Boisguilbert's economic writings, including the Détail de la France (1695), represent some of the earliest systematic critiques of French mercantilist policy. Writing under Louis XIV, Boisguilbert argued that the wealth of a nation depends not on hoarding gold but on the free circulation of goods and the prosperity of its farmers and merchants.

title: "La Liberté civile"
publication_year: 1859
cover: cover_fr.webp
original: false
description: |
  Jules Simon's Civil Liberty examines the foundations of individual rights in civil society — freedom of conscience, freedom of association, freedom of the press, and the inviolability of the home. Simon argues that these liberties are not concessions from government but inherent attributes of the human person that no authority may legitimately violate.

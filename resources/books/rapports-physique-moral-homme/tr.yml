description: |
  Published in 1802 by the physician and philosopher Pierre-Jean-Georges Cabanis, this work explores the relationship between the physical body and moral experience. As a member of the Idéologues, Cabanis sought to ground philosophy in empirical observation, arguing that our ideas, sensations, and moral judgments are inseparable from our bodily existence.

title: "Als geld sterft"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  When Money Dies van Adam Fergusson is een boek dat de hyperinflatie in Duitsland onderzoekt in het begin van de jaren 1920, in de nasleep van de Eerste Wereldoorlog. Het boek geeft een gedetailleerd verslag van de sociale en economische gevolgen van hyperinflatie en hoe het leidde tot de opkomst van de nazi-partij. Fergusson onderzoekt ook hoe de gebeurtenissen in Duitsland het economische beleid in andere landen beïnvloedden en hoe zij met hun eigen economische problemen omgingen. Het boek biedt een waarschuwend verhaal over de gevaren van inflatie en het belang van een gezond monetair beleid.
title: "Para Öldüğünde"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  Adam Fergusson tarafından yazılan Para Öldüğünde, Birinci Dünya Savaşı'nın ardından 1920'lerin başında Almanya'da meydana gelen hiperenflasyonu inceleyen bir kitaptır. Kitap, hiperenflasyonun sosyal ve ekonomik sonuçlarını ve Nazi partisinin yükselişine nasıl yol açtığını ayrıntılı bir şekilde anlatmaktadır. Fergusson ayrıca Almanya'daki olayların diğer ülkelerdeki ekonomi politikalarını nasıl etkilediğini ve bu ülkelerin kendi ekonomik sorunlarıyla nasıl başa çıktıklarını da inceliyor. Kitap, enflasyonun tehlikeleri ve sağlam para politikalarının önemi hakkında uyarıcı bir hikaye sunuyor.
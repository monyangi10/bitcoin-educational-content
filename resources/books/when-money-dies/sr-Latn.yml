title: "Kada novac umre"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  Kada novac umre od Adama Fergussona je knjiga koja istražuje hiperinflaciju koja se dogodila u Nemačkoj tokom ranih 1920-ih, nakon Prvog svetskog rata. Knjiga pruža detaljan prikaz društvenih i ekonomskih posledica hiperinflacije i kako je to dovelo do uspona nacističke partije. Fergusson takođe ispituje kako su događaji u Nemačkoj uticali na ekonomske politike u drugim zemljama i kako su se one nosile sa sopstvenim ekonomskim problemima. Knjiga nudi upozoravajuću priču o opasnostima inflacije i važnosti zdravih monetarnih politika.
title: "जब पैसा मर जाता है"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  एडम फ़र्ग्यूसन द्वारा लिखित पुस्तक व्हेन मनी डाइज़, प्रथम विश्व युद्ध के बाद 1920 के दशक की शुरुआत में जर्मनी में हुई अति मुद्रास्फीति की पड़ताल करती है। पुस्तक अति मुद्रास्फीति के सामाजिक और आर्थिक परिणामों और इसके कारण नाज़ी पार्टी के उदय का विस्तृत विवरण देती है। फ़र्ग्यूसन यह भी जांचते हैं कि जर्मनी में हुई घटनाओं ने दूसरे देशों की आर्थिक नीतियों को कैसे प्रभावित किया और उन्होंने अपनी आर्थिक समस्याओं से कैसे निपटा। पुस्तक मुद्रास्फीति के खतरों और ठोस मौद्रिक नीतियों के महत्व के बारे में चेतावनी देने वाली कहानी पेश करती है।
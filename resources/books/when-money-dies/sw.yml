title: "Pesa inapokufa"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  Wakati Money Dies na Adam Fergusson ni kitabu ambacho kinachunguza mfumuko wa bei uliotokea nchini Ujerumani wakati wa mwanzo wa miaka ya 1920, baada ya Vita vya Kwanza vya Dunia. Fergusson pia anachunguza jinsi matukio ya Ujerumani yalivyoathiri sera za kiuchumi katika nchi nyingine na jinsi walivyoshughulikia matatizo yao ya kiuchumi. Kitabu hiki kinatoa tahadhari ya hatari za mfumuko wa bei na umuhimu wa sera nzuri za fedha.
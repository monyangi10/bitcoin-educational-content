title: "Kiedy pieniądze umierają"
publication_year: 1975
cover: cover_en.webp
original: true
description: |
  When Money Dies autorstwa Adama Fergussona to książka, która bada hiperinflację, która miała miejsce w Niemczech na początku lat dwudziestych XX wieku, w następstwie I wojny światowej. Książka zawiera szczegółowy opis społecznych i gospodarczych konsekwencji hiperinflacji oraz tego, jak doprowadziła ona do powstania partii nazistowskiej. Fergusson analizuje również, w jaki sposób wydarzenia w Niemczech wpłynęły na politykę gospodarczą w innych krajach i jak radziły sobie one z własnymi problemami gospodarczymi. Książka stanowi przestrogę przed niebezpieczeństwami związanymi z inflacją i znaczeniem rozsądnej polityki monetarnej.
title: "La Société d'économie politique: Une anthologie libérale"
publication_year: 1928
cover: cover_fr.webp
original: false
description: |
  This anthology collects the proceedings and debates of the Société d'économie politique from 1841 to 1928. Founded by the leading French liberal economists, the Society served as a forum for discussing the great economic questions of the day — free trade, banking, taxation, labor, and the role of the state. Its members included Bastiat, Molinari, Coquelin, Garnier, Passy, and Leroy-Beaulieu.

title: "Argentarius brieven van een bankdirecteur aan zijn zoon"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Argentarius; Brieven van een bankdirecteur aan zijn zoon is een boek geschreven door Alfred Lansburgh in 1933. Het is een verzameling brieven die de auteur aan zijn zoon schreef, waarin hij verschillende onderwerpen met betrekking tot geld, bankieren en financiën bespreekt. Het boek geeft inzicht in de werking van het bankwezen en het financiële systeem en geeft praktisch advies over het beheren van geld en investeringen. De auteur benadrukt het belang van ethisch gedrag en persoonlijke verantwoordelijkheid in financiële zaken en biedt een historisch perspectief op de ontwikkeling van geld en bankieren. Het boek wordt beschouwd als een klassieker op het gebied van financiën en economie en is vandaag de dag nog steeds relevant.
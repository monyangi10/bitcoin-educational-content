title: "Argentarius Pisma bankarskog direktora svom sinu"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Argentarius; Pisma direktora banke svom sinu je knjiga koju je napisao Alfred Lansburgh 1933. godine. To je zbirka pisama koja je autor pisao svom sinu, raspravljajući o raznim temama vezanim za novac, bankarstvo i finansije. Knjiga pruža uvid u funkcionisanje bankarske industrije i finansijskog sistema, i nudi praktične savete o tome kako upravljati novcem i investicijama. Autor naglašava važnost etičkog ponašanja i lične odgovornosti u finansijskim pitanjima, i pruža istorijsku perspektivu o razvoju novca i bankarstva. Knjiga se smatra klasikom u oblasti finansija i ekonomije, i još uvek je relevantna danas.
title: "Listy Argentarius dyrektora banku do syna"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Argentarius; Letters of a Bank Director to his Son to książka napisana przez Alfreda Lansburgha w 1933 roku. Jest to zbiór listów, które autor napisał do swojego syna, omawiając różne tematy związane z pieniędzmi, bankowością i finansami. Książka zapewnia wgląd w funkcjonowanie branży bankowej i systemu finansowego oraz oferuje praktyczne porady dotyczące zarządzania pieniędzmi i inwestycjami. Autor podkreśla znaczenie etycznego zachowania i osobistej odpowiedzialności w sprawach finansowych, a także przedstawia historyczną perspektywę rozwoju pieniądza i bankowości. Książka jest uważana za klasykę w dziedzinie finansów i ekonomii i jest nadal aktualna.
title: 「一位銀行董事寫給兒子的 Argentarius 信」
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Argentarius; Letters of a Bank Director to his Son 是一本由 Alfred Lansburgh 於 1933 年所寫的書。書中收集了作者寫給兒子的信件，討論了與金錢、銀行業和金融有關的各種主題。書中對銀行業和金融體系的運作進行了深入的探討，並就如何管理金錢和投資提供了實用的建議。作者強調道德行為和個人責任在金融事務中的重要性，並提供了貨幣和銀行業發展的歷史觀點。這本書被視為金融和經濟領域的經典之作，時至今日仍然適用。
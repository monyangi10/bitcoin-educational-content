title: "Bir Banka Müdürünün Oğluna Argentarius Mektupları"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Argentarius; Bir Banka Müdürünün Oğluna Mektupları Alfred Lansburgh tarafından 1933 yılında yazılmış bir kitaptır. Yazarın oğluna yazdığı ve para, bankacılık ve finansla ilgili çeşitli konuları tartıştığı mektupların bir derlemesidir. Kitap, bankacılık sektörünün ve finansal sistemin işleyişine dair içgörüler sunmakta ve para ve yatırımların nasıl yönetileceğine dair pratik tavsiyeler vermektedir. Yazar, finansal konularda etik davranışın ve kişisel sorumluluğun önemini vurgulamakta ve para ve bankacılığın gelişimine ilişkin tarihsel bir perspektif sunmaktadır. Kitap, finans ve ekonomi alanında bir klasik olarak kabul edilmektedir ve günümüzde de geçerliliğini korumaktadır.
title: "La Tyrannie collectiviste"
publication_year: 1893
cover: cover_fr.webp
original: false
description: |
  Guyot's Collectivist Tyranny (1893) is a systematic critique of socialist and collectivist proposals. Drawing on extensive empirical evidence, Guyot demonstrates that every attempt to replace voluntary exchange with collective ownership leads to economic inefficiency, political oppression, and the destruction of individual liberty.

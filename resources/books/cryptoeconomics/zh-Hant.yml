title: 「加密經濟學」
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Eric Voskuil 所著的《Cryptoeconomics Fundamental Principles of Bitcoin》深入探討了 Bitcoin、奧地利經濟學和理性經濟原則的交叉點。本書以密集的內容和挑戰一般對 Bitcoin 的理解為重點，全面探討 Bitcoin 的價值主張、安全模型和經濟行為。Cryptoeconomics" 汲取了作者作為一名有實戰經驗的戰鬥機飛行員、計算機科學家和企業家的背景，整合了各種觀點，提供了對 Bitcoin 的整體理解。它提供了超越傳統經濟和技術分析的見解，使其成為尋求深入瞭解 Bitcoin 複雜性和潛力的人的寶貴資源。
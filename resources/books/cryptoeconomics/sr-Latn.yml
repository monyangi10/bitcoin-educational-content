title: "Kriptoekonomija"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Osnovni principi kriptoekonomije Bitcoin" autora Erica Voskuila istražuju presek Bitcoin, austrijske ekonomije i racionalnih ekonomskih principa. Sa gustim sadržajem i fokusom na izazivanje uobičajenih shvatanja Bitcoin, ova knjiga nudi sveobuhvatno istraživanje njegove vrednosne ponude, sigurnosnog modela i ekonomskog ponašanja. Oslanjajući se na autorovo iskustvo kao borbenog pilota, kompjuterskog naučnika i preduzetnika, "Kriptoekonomija" integriše različite perspektive kako bi pružila holističko razumevanje Bitcoin. Ona nudi uvide izvan tradicionalnih ekonomskih i tehnoloških analiza, čineći je vrednim resursom za one koji traže dublje razumevanje složenosti i potencijala Bitcoin.
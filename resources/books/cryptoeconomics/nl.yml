title: "Crypto-economie"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Cryptoeconomics Fundamental Principles of Bitcoin" van Eric Voskuil gaat in op het snijvlak van Bitcoin, Oostenrijkse economie en rationele economische principes. Met een dichte inhoud en een focus op het uitdagen van gangbare opvattingen over Bitcoin, biedt dit boek een uitgebreide verkenning van de waardepropositie, het veiligheidsmodel en het economische gedrag. Gebaseerd op de achtergrond van de auteur als gevechtspiloot, computerwetenschapper en ondernemer, integreert "Cryptoeconomics" verschillende perspectieven om een holistisch begrip van Bitcoin te geven. Het biedt inzichten die verder gaan dan traditionele economische en technologische analyses, waardoor het een waardevolle bron is voor diegenen die op zoek zijn naar een dieper begrip van de complexiteit en het potentieel van Bitcoin.
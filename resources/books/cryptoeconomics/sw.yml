title: "Cryptoeconomics"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Cryptoeconomics Fundamental Principles of Bitcoin" cha Eric Voskuil kinachunguza makutano ya Bitcoin, Uchumi wa Austria, na kanuni za busara za kiuchumi. Kikiwa na maudhui mazito na kulenga uelewa wa pamoja wenye changamoto wa Bitcoin, kitabu hiki kinatoa uchunguzi wa kina wa pendekezo lake la thamani, modeli ya usalama inayotokana na uzoefu wa kupambana na tabia ya mtunzi. majaribio, mwanasayansi wa kompyuta, na mfanyabiashara, "Cryptoeconomics" huunganisha mitazamo mbalimbali ili kutoa uelewa kamili wa Bitcoin Inatoa maarifa zaidi ya uchanganuzi wa jadi wa kiuchumi na kiteknolojia, na kuifanya kuwa rasilimali muhimu kwa wale wanaotafuta ufahamu wa kina wa magumu na uwezo wa Bitcoin.
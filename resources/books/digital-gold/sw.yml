title: "Dhahabu ya Dijiti"
publication_year: 2015
cover: cover_en.webp
original: true
description: |
  Bitcoin na Hadithi ya Ndani ya Mafisadi na Mamilionea Wanaojaribu Kuvumbua Pesa Upya," Nathaniel Popper anatoa akaunti ya kuvutia ya kupanda kwa Bitcoin na wahusika wa kuvutia nyuma yake. Kutoka kwa wanarchists wa Uingereza hadi wajasiriamali wa China na Satoshi Nakamoto ya fumbo, Popper anachunguza uwezo wa kimapinduzi wa sarafu hii ya kidijitali Kuchangamoto za mifumo ya kitamaduni ya Dhahabu iliyopotea. athari kubwa ya Bitcoin na azma yake ya kuunda upya ulimwengu wa pesa.
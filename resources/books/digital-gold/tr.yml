title: "Dijital Altın"
publication_year: 2015
cover: cover_en.webp
original: true
description: |
  Bitcoin and the Inside Story of the Misfits and Millionaires Trying to Reinvent Money," Nathaniel Popper, Bitcoin'ın yükselişini ve arkasındaki renkli karakterleri büyüleyici bir şekilde anlatıyor. İngiliz anarşistlerden Çinli girişimcilere ve esrarengiz Satoshi Nakamoto'ya kadar Popper, bu dijital para biriminin geleneksel finansal sistemlere meydan okuyan devrimci potansiyelini araştırıyor. Kazanılan ve kaybedilen servetlerin hikayeleriyle "Dijital Altın", Bitcoin'ın derin etkisini ve para dünyasını yeniden şekillendirme arayışını ortaya koyuyor.
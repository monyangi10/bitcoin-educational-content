title: "Digitaal goud"
publication_year: 2015
cover: cover_en.webp
original: true
description: |
  Bitcoin and the Inside Story of the Misfits and Millionaires Trying to Reinvent Money" geeft Nathaniel Popper een boeiend verslag van de opkomst van Bitcoin en de kleurrijke personages erachter. Van Britse anarchisten tot Chinese ondernemers en de raadselachtige Satoshi Nakamoto, onderzoekt Popper het revolutionaire potentieel van deze digitale valuta om de traditionele financiële systemen uit te dagen. Met verhalen over fortuinen die gemaakt en verloren zijn, onthult "Digital Gold" de diepgaande impact van Bitcoin en zijn zoektocht om de wereld van het geld opnieuw vorm te geven.
title: "Digitalno zlato"
publication_year: 2015
cover: cover_en.webp
original: true
description: |
  Bitcoin i unutrašnja priča o autsajderima i milionerima koji pokušavaju da reinventišu novac," Nathaniel Popper pruža fascinantan prikaz uspona Bitcoin i šarolikih likova iza njega. Od britanskih anarhista do kineskih preduzetnika i zagonetnog Satoshi Nakamota, Popper istražuje revolucionarni potencijal ove digitalne valute da izazove tradicionalne finansijske sisteme. Sa pričama o bogatstvima koja su stečena i izgubljena, "Digitalno zlato" otkriva dubok uticaj Bitcoin i njegovu potragu za preoblikovanjem sveta novca.
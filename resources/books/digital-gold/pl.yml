title: "Cyfrowe złoto"
publication_year: 2015
cover: cover_en.webp
original: true
description: |
  Bitcoin and the Inside Story of the Misfits and Millionaires Trying to Reinvent Money", Nathaniel Popper przedstawia porywający opis powstania Bitcoin i stojących za nim barwnych postaci. Od brytyjskich anarchistów po chińskich przedsiębiorców i enigmatycznego Satoshi Nakamoto, Popper bada rewolucyjny potencjał tej cyfrowej waluty, aby rzucić wyzwanie tradycyjnym systemom finansowym. Wraz z opowieściami o zarobionych i straconych fortunach, "Cyfrowe złoto" ujawnia głęboki wpływ Bitcoin i jego dążenie do przekształcenia świata pieniądza.
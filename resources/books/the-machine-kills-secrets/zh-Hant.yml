title: 「機器殺人的秘密」
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Andy Greenberg 所著的《機器殺掉秘密》(The Machine Kills Secrets) 一書，探討政府監控的興起，以及數位時代對隱私權與日俱增的威脅。作者是一位科技記者，他深入探討了密碼學和數位安全的歷史，以及反對政府監控的個人和組織。本書也深入探討告密者的影響，以及他們在追究當權者責任時所扮演的角色。The Machine Kills Secrets》透過一連串引人入勝的故事和對該領域主要參與者的訪談，對我們在保護數位隱私和自由方面所面臨的挑戰進行了發人深省的分析。
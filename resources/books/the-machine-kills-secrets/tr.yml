title: "Makine Sırları Öldürür"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Andy Greenberg'in yazdığı Sırları Öldüren Makine, dijital çağda devlet gözetiminin yükselişini ve mahremiyete yönelik artan tehdidi inceleyen bir kitap. Bir teknoloji gazetecisi olan yazar, kriptografi ve dijital güvenliğin tarihi ile devlet gözetimine karşı mücadele eden kişi ve kuruluşları inceliyor. Kitap ayrıca ihbarcıların etkisi ve iktidardakileri sorumlu tutmada oynadıkları rol hakkında da fikir veriyor. "Makine Sırları Öldürür", bir dizi ilgi çekici öykü ve bu alandaki kilit oyuncularla yapılan röportajlar aracılığıyla, dijital gizliliğimizi ve özgürlüğümüzü korumada karşılaştığımız zorlukların düşündürücü bir analizini sunuyor.
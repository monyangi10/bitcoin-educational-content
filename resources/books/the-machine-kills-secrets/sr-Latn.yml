title: "Mašina Ubija Tajne"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  The Machine Kills Secrets by Andy Greenberg je knjiga koja istražuje uspon vladinog nadzora i rastuću pretnju privatnosti u digitalnom dobu. Autor, novinar specijalizovan za tehnologiju, ulazi u istoriju kriptografije i digitalne sigurnosti, kao i pojedince i organizacije koje se bore protiv vladinog nadzora. Knjiga takođe pruža uvid u uticaj uzbunjivača i ulogu koju igraju u pozivanju moćnika na odgovornost. Kroz niz ubedljivih priča i intervjua sa ključnim akterima u ovoj oblasti, "The Machine Kills Secrets" predstavlja analizu koja podstiče na razmišljanje o izazovima sa kojima se suočavamo u zaštiti naše digitalne privatnosti i slobode.
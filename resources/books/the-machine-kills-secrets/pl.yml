title: "Maszyna zabija tajemnice"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  The Machine Kills Secrets autorstwa Andy'ego Greenberga to książka, która bada wzrost rządowej inwigilacji i rosnące zagrożenie dla prywatności w erze cyfrowej. Autor, dziennikarz technologiczny, zagłębia się w historię kryptografii i bezpieczeństwa cyfrowego, a także osób i organizacji walczących z inwigilacją rządową. Książka zapewnia również wgląd w wpływ sygnalistów i rolę, jaką odgrywają w pociąganiu do odpowiedzialności rządzących. Poprzez serię fascynujących historii i wywiadów z kluczowymi graczami w tej dziedzinie, "The Machine Kills Secrets" przedstawia prowokującą do myślenia analizę wyzwań, przed którymi stoimy w zakresie ochrony naszej cyfrowej prywatności i wolności.
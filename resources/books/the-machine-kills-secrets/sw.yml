title: "Mashine Inaua Siri"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Mashine Inaua Siri kilichoandikwa na Andy Greenberg ni kitabu kinachochunguza ongezeko la ufuatiliaji wa serikali na tishio linaloongezeka la faragha katika enzi ya kidijitali. Mwandishi, mwandishi wa habari za teknolojia, anaangazia historia ya siri na usalama wa kidijitali, na watu binafsi na mashirika yanayopigana dhidi ya ufuatiliaji wa serikali. Kitabu hiki pia kinatoa maarifa juu ya athari za watoa taarifa na jukumu wanalotekeleza katika kuwawajibisha walio madarakani. Kupitia mfululizo wa hadithi za kuvutia na mahojiano na wahusika wakuu katika uwanja huu, "Mashine Inaua Siri" inawasilisha uchanganuzi wenye kuchochea fikira wa changamoto tunazokabiliana nazo katika kulinda faragha na uhuru wetu wa kidijitali.
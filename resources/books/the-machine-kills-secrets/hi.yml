title: "मशीन रहस्यों को नष्ट कर देती है"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  एंडी ग्रीनबर्ग की द मशीन किल्स सीक्रेट्स एक ऐसी किताब है जो सरकारी निगरानी के बढ़ने और डिजिटल युग में गोपनीयता के लिए बढ़ते खतरे की पड़ताल करती है। लेखक, एक प्रौद्योगिकी पत्रकार, क्रिप्टोग्राफी और डिजिटल सुरक्षा के इतिहास और सरकारी निगरानी के खिलाफ लड़ने वाले व्यक्तियों और संगठनों के बारे में विस्तार से बताते हैं। यह किताब व्हिसलब्लोअर के प्रभाव और सत्ता में बैठे लोगों को जवाबदेह ठहराने में उनकी भूमिका के बारे में भी जानकारी देती है। क्षेत्र के प्रमुख खिलाड़ियों के साथ कई आकर्षक कहानियों और साक्षात्कारों के माध्यम से, "द मशीन किल्स सीक्रेट्स" हमारी डिजिटल गोपनीयता और स्वतंत्रता की रक्षा करने में हमारे सामने आने वाली चुनौतियों का एक विचारोत्तेजक विश्लेषण प्रस्तुत करता है।
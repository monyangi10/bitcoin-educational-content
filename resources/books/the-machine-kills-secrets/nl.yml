title: "De machine doodt geheimen"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  The Machine Kills Secrets van Andy Greenberg is een boek dat de opkomst van overheidssurveillance en de groeiende bedreiging van privacy in het digitale tijdperk onderzoekt. De auteur, een technologiejournalist, duikt in de geschiedenis van cryptografie en digitale veiligheid, en de individuen en organisaties die vechten tegen overheidssurveillance. Het boek geeft ook inzicht in de impact van klokkenluiders en de rol die zij spelen in het verantwoordelijk houden van de machthebbers. Door middel van een serie meeslepende verhalen en interviews met belangrijke spelers in het veld, presenteert "The Machine Kills Secrets" een tot nadenken stemmende analyse van de uitdagingen waar we voor staan bij het beschermen van onze digitale privacy en vrijheid.
title: "Hacking Growth"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  "Hacking Growth" autorstwa Seana Ellisa i Morgana Browna to książka, która zawiera spostrzeżenia i praktyczne porady dla firm chcących osiągnąć szybki wzrost. Autorzy przedstawiają nowe podejście do wzrostu zwane "hakowaniem wzrostu", które polega na wykorzystaniu kreatywności, analizy danych i eksperymentowania w celu znalezienia najbardziej efektywnych sposobów rozwoju firmy. Książka zawiera studia przypadków udanych strategii hakowania wzrostu i oferuje przewodnik krok po kroku dotyczący wdrażania tych strategii we własnym biznesie. Jest to lektura obowiązkowa dla przedsiębiorców, marketerów i każdego, kto chce napędzać wzrost w swojej firmie.
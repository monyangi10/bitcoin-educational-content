title: "Groei hacken"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  "Hacking Growth" van Sean Ellis en Morgan Brown is een boek dat inzichten en praktisch advies biedt voor bedrijven die snelle groei willen realiseren. De auteurs introduceren een nieuwe benadering van groei genaamd "growth hacking", waarbij creativiteit, data-analyse en experimenten worden gebruikt om de meest effectieve manieren te vinden om een bedrijf te laten groeien. Het boek bevat casestudies van succesvolle growth hacking-strategieën en biedt een stap-voor-stap handleiding voor het implementeren van deze strategieën in je eigen bedrijf. Het is een must voor ondernemers, marketeers en iedereen die groei in zijn bedrijf wil stimuleren.
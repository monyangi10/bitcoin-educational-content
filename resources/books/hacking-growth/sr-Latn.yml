title: "Hacking Growth"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  "Hacking Growth" od Sean Ellis i Morgan Brown je knjiga koja pruža uvide i praktične savete za preduzeća koja žele postići brz rast. Autori uvode novi pristup rastu nazvan "growth hacking", koji uključuje korišćenje kreativnosti, analitike podataka i eksperimentisanja kako bi se pronašli najefikasniji načini za rast poslovanja. Knjiga uključuje studije slučaja uspešnih strategija growth hacking-a i nudi vodič korak po korak za implementaciju ovih strategija u sopstvenom poslovanju. To je obavezno štivo za preduzetnike, marketare i svakoga ko želi podstaći rast u svom poslovanju.
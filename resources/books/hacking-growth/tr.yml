title: "Büyümeyi Hacklemek"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  sean Ellis ve Morgan Brown tarafından yazılan "Hacking Growth", hızlı büyümek isteyen işletmeler için içgörüler ve pratik tavsiyeler sunan bir kitaptır. Yazarlar, bir işletmeyi büyütmenin en etkili yollarını bulmak için yaratıcılığı, veri analizini ve deneyleri kullanmayı içeren "growth hacking" adlı yeni bir büyüme yaklaşımını tanıtıyor. Kitap, başarılı growth hacking stratejilerinin vaka çalışmalarını içeriyor ve bu stratejileri kendi işinizde uygulamak için adım adım bir kılavuz sunuyor. Girişimciler, pazarlamacılar ve işlerini büyütmek isteyen herkes için mutlaka okunması gereken bir kitap.
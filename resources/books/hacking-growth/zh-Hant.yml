title: 「駭客成長」
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  "Sean Ellis 和 Morgan Brown 所著的《Hacking Growth》是一本為希望實現快速成長的企業提供真知灼見和實用建議的書籍。作者介紹了一種稱為 "growth hacking "的新增長方式，即利用創意、數據分析和實驗來找到最有效的企業增長方式。書中包括成功的成長駭客策略案例研究，並提供在您自己的企業中實施這些策略的逐步指南。對於企業家、行銷人員以及任何希望推動業務成長的人來說，這是一本必讀書籍。
title: "Neden Bitcoin satın almalısınız?"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Andy Edstrom tarafından yazılan Why Buy Bitcoin, Bitcoin konusunu ve modern dünyadaki alaka düzeyini araştıran başlangıç ve orta düzey bir kitaptır. Kitap, Bitcoin'in arkasındaki tarih ve teknolojiyi kapsamakta ve dijital para biriminin yatırım potansiyelini analiz etmektedir. Edstrom, Bitcoin'in benimsenmesini sağlayan makroekonomik güçler hakkında bilgi vermekte ve enflasyona karşı bir koruma ve bir değer deposu olarak potansiyelini araştırmaktadır. Bu kitap, Bitcoin'in temellerini ve bir yatırım aracı olarak potansiyelini anlamak isteyen herkes için uygundur.
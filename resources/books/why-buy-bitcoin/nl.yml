title: "Waarom Bitcoin kopen?"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Why Buy Bitcoin van Andy Edstrom is een boek voor beginners en gevorderden dat ingaat op het onderwerp Bitcoin en de relevantie ervan in de moderne wereld. Het boek behandelt de geschiedenis en de technologie achter Bitcoin en analyseert het investeringspotentieel van de digitale valuta. Edstrom geeft inzicht in de macro-economische krachten die de adoptie van Bitcoin stimuleren en onderzoekt het potentieel ervan als een hedge tegen inflatie en een opslagplaats van waarde. Dit boek is geschikt voor iedereen die de basisprincipes van Bitcoin en zijn potentieel als investeringsvehikel wil begrijpen.
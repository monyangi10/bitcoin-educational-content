title: "Zašto kupiti Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Zašto kupiti Bitcoin od Andy Edstroma je knjiga za početnike do srednjeg nivoa koja se bavi temom Bitcoin i njegovom relevantnošću u savremenom svetu. Knjiga pokriva istoriju i tehnologiju iza Bitcoin, i analizira investicioni potencijal digitalne valute. Edstrom pruža uvide u makroekonomske sile koje pokreću usvajanje Bitcoin, i istražuje njegov potencijal kao zaštite od inflacije i kao čuvara vrednosti. Ova knjiga je pogodna za svakoga ko želi da razume osnove Bitcoin i njegov potencijal kao investicionog sredstva.
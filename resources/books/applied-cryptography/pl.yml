title: "Kryptografia stosowana"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  Applied Cryptography to książka napisana przez Bruce'a Schneiera, eksperta w dziedzinie bezpieczeństwa komputerowego i kryptografii. Książka stanowi wprowadzenie do podstawowych zasad i koncepcji kryptografii i obejmuje szeroki zakres tematów, w tym szyfrowanie symetryczne i asymetryczne, funkcje Hash, podpisy cyfrowe, zarządzanie kluczami i bezpieczne protokoły. Zagłębia się również w historię kryptografii i bada potencjalne zagrożenia i ograniczenia systemów kryptograficznych. Książka jest niezbędnym źródłem informacji dla każdego zainteresowanego dziedziną kryptografii, od początkujących po ekspertów.
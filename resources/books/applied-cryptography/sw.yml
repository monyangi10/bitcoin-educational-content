title: "Cryptography Iliyotumika"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  Applied Cryptography ni kitabu kilichoandikwa na Bruce Schneier, mtaalam katika uwanja wa usalama wa kompyuta na cryptography. Kitabu hiki kinatoa utangulizi wa kanuni na dhana za kimsingi za usimbaji fiche na kinashughulikia mada mbalimbali, ikiwa ni pamoja na usimbaji linganifu na ulinganifu, utendakazi wa Hash, saini za kidijitali, usimamizi muhimu na itifaki salama. Pia hujikita katika historia ya usimbaji fiche na kuchunguza hatari na vikwazo vinavyowezekana vya mifumo ya kriptografia. Kitabu hiki ni nyenzo muhimu kwa mtu yeyote anayevutiwa na taaluma ya usimbaji fiche, kuanzia wanaoanza hadi wataalam.
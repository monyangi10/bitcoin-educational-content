title: "Primijenjena Kriptografija"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  Primijenjena Kriptografija je knjiga koju je napisao Bruce Schneier, stručnjak u oblasti računarske sigurnosti i kriptografije. Knjiga pruža uvod u osnovne principe i koncepte kriptografije i pokriva širok spektar tema, uključujući simetrično i asimetrično šifrovanje, Hash funkcije, digitalne potpise, upravljanje ključevima i sigurne protokole. Takođe se bavi istorijom kriptografije i istražuje potencijalne rizike i ograničenja kriptografskih sistema. Knjiga je ključni resurs za svakoga ko je zainteresovan za oblast kriptografije, od početnika do stručnjaka.
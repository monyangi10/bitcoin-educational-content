title: "Toegepaste cryptografie"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  Applied Cryptography is een boek geschreven door Bruce Schneier, een expert op het gebied van computerbeveiliging en cryptografie. Het boek biedt een inleiding tot de fundamentele principes en concepten van cryptografie en behandelt een breed scala aan onderwerpen, waaronder symmetrische en asymmetrische encryptie, Hash functies, digitale handtekeningen, sleutelbeheer en veilige protocollen. Het gaat ook in op de geschiedenis van cryptografie en verkent de potentiële risico's en beperkingen van cryptografische systemen. Het boek is een essentiële bron voor iedereen die geïnteresseerd is in cryptografie, van beginners tot experts.
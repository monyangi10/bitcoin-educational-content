title: "अनुप्रयुक्त क्रिप्टोग्राफी"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  एप्लाइड क्रिप्टोग्राफी ब्रूस श्नेयर द्वारा लिखी गई एक पुस्तक है, जो कंप्यूटर सुरक्षा और क्रिप्टोग्राफी के क्षेत्र में एक विशेषज्ञ है। यह पुस्तक क्रिप्टोग्राफी के मूलभूत सिद्धांतों और अवधारणाओं का परिचय प्रदान करती है और सममित और असममित एन्क्रिप्शन, Hash फ़ंक्शन, डिजिटल हस्ताक्षर, कुंजी प्रबंधन और सुरक्षित प्रोटोकॉल सहित कई विषयों को कवर करती है। यह क्रिप्टोग्राफी के इतिहास में भी गहराई से जाती है और क्रिप्टोग्राफ़िक प्रणालियों के संभावित जोखिमों और सीमाओं का पता लगाती है। यह पुस्तक क्रिप्टोग्राफी के क्षेत्र में रुचि रखने वाले किसी भी व्यक्ति के लिए एक आवश्यक संसाधन है, शुरुआती से लेकर विशेषज्ञों तक।
title: "Uygulamalı Kriptografi"
publication_year: 1993
cover: cover_en.webp
original: true
description: |
  Uygulamalı Kriptografi, bilgisayar güvenliği ve kriptografi alanında uzman olan Bruce Schneier tarafından yazılmış bir kitaptır. Kitap, kriptografinin temel ilke ve kavramlarına bir giriş sağlamakta ve simetrik ve asimetrik şifreleme, Hash fonksiyonları, dijital imzalar, anahtar yönetimi ve güvenli protokoller dahil olmak üzere çok çeşitli konuları kapsamaktadır. Ayrıca kriptografinin tarihçesine de değinmekte ve kriptografik sistemlerin potansiyel risklerini ve sınırlamalarını araştırmaktadır. Kitap, yeni başlayanlardan uzmanlara kadar kriptografi alanıyla ilgilenen herkes için temel bir kaynaktır.
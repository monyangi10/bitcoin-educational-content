description: |
  The Rise and Decline of War (1898) presents Molinari's theory that war, once a rational economic activity for predatory groups, becomes increasingly irrational and destructive as civilization advances. He argues that the growth of commerce and industry makes war obsolete by demonstrating that voluntary exchange produces wealth far more efficiently than conquest.

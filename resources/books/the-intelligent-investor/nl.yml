title: "De intelligente belegger"
publication_year: 1949
cover: cover_en.webp
original: true
description: |
  The Intelligent Investor is een klassiek boek geschreven door Benjamin Graham, een beleggingsgoeroe en mentor van Warren Buffett. Dit boek beschrijft een filosofie voor het beleggen in aandelen die het belang benadrukt van het analyseren van de fundamenten van een bedrijf en het kopen tegen een prijs die onder de intrinsieke waarde ligt. Grahams benadering van beleggen, die hij "value investing" noemt, benadrukt de noodzaak van geduld, discipline en een focus op de lange termijn. Het boek geeft praktische richtlijnen voor het toepassen van deze principes op de aandelenmarkt, inclusief tips voor het lezen van jaarrekeningen, het analyseren van trends in de sector en het evalueren van het management. Over het geheel genomen is "The Intelligent Investor" een waardevolle bron voor iedereen die meer wil weten over beleggen op de aandelenmarkt.
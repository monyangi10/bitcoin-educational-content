title: "Akıllı Yatırımcı"
publication_year: 1949
cover: cover_en.webp
original: true
description: |
  Akıllı Yatırımcı, bir yatırım gurusu ve Warren Buffett'ın akıl hocası olan Benjamin Graham tarafından yazılmış klasik bir kitaptır. Bu kitap, hisse senetlerine yatırım yapmak için bir şirketin temellerini analiz etmenin ve gerçek değerinin altında bir fiyattan satın almanın önemini vurgulayan bir felsefe ortaya koymaktadır. Graham'ın "değer yatırımı" olarak adlandırdığı yatırım yaklaşımı, sabır, disiplin ve uzun vadeye odaklanma ihtiyacını vurgulamaktadır. Kitap, bu ilkelerin borsada nasıl uygulanacağına dair pratik rehberlik sunmakta, mali tabloların nasıl okunacağına, sektör eğilimlerinin nasıl analiz edileceğine ve yönetimin nasıl değerlendirileceğine dair ipuçları içermektedir. Genel olarak, "Akıllı Yatırımcı" borsada yatırım hakkında daha fazla bilgi edinmek isteyen herkes için değerli bir kaynaktır.
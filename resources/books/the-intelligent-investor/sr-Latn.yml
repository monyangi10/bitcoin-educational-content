title: "Inteligentni Investitor"
publication_year: 1949
cover: cover_en.webp
original: true
description: |
  Inteligentni Investitor je klasična knjiga koju je napisao Benjamin Graham, investicioni guru i mentor Vorenu Bafetu. Ova knjiga izlaže filozofiju investiranja u akcije koja naglašava važnost analize fundamentalnih aspekata kompanije i kupovine po ceni koja je ispod njene intrinzične vrednosti. Grahamov pristup investiranju, koji naziva "vrednosno investiranje", ističe potrebu za strpljenjem, disciplinom i fokusom na dugoročno. Knjiga pruža praktične smernice o tome kako primeniti ove principe na berzi, uključujući savete o tome kako čitati finansijske izveštaje, analizirati industrijske trendove i proceniti menadžment. Sve u svemu, "Inteligentni Investitor" je vredan resurs za svakoga ko želi da nauči više o investiranju na berzi.
title: "Etika proizvodnje novca"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  Etika proizvodnje novca od Jörga Guida Hülsmanna je sveobuhvatno istraživanje etičkih implikacija proizvodnje novca i uloge centralnih banaka u modernom finansijskom sistemu. Hülsmann se upušta u istorijsku pozadinu novca, ispitujući efekte monetarne inflacije i erozije kupovne moći. Kritikuje moralne i ekonomske posledice fiat novca i zalaže se za povratak principima zdravog novca. Ova stručna knjiga nudi analizu koja podstiče na razmišljanje o etičkim dilemama vezanim za proizvodnju novca i služi kao vredan resurs za one koji su zainteresovani za presek ekonomije, tehnologije i istorije, posebno u kontekstu Bitcoin i alternativnih monetarnih sistema.
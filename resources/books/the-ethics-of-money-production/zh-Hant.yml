title: 「貨幣生產的倫理」
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  Jörg Guido Hülsmann所著的《貨幣生產的倫理學》(The Ethics of Money Production)一書，全面探討貨幣生產的倫理意義，以及中央銀行在現代金融體系中的角色。Hülsmann 深入探討了貨幣的歷史背景，檢視了貨幣通貨膨脹的影響和購買力的侵蝕。他批判了法定貨幣的道德和經濟後果，並主張回歸健全的貨幣原則。這本專家級的書籍對圍繞貨幣生產的道德困境進行了發人深省的分析，對於那些對經濟學、技術和歷史的交叉感興趣的人來說，尤其是在 Bitcoin 和替代貨幣體系的背景下，這本書是非常有價值的資源。
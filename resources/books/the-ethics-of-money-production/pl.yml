title: "Etyka produkcji pieniądza"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  The Ethics of Money Production autorstwa Jörga Guido Hülsmanna to kompleksowe badanie etycznych implikacji produkcji pieniądza i roli banków centralnych we współczesnym systemie finansowym. Hülsmann zagłębia się w historyczne tło pieniądza, badając skutki inflacji monetarnej i erozji siły nabywczej. Krytykuje moralne i ekonomiczne konsekwencje pieniądza fiducjarnego i opowiada się za powrotem do zasad zdrowego pieniądza. Ta książka na poziomie eksperckim oferuje prowokującą do myślenia analizę dylematów etycznych związanych z produkcją pieniądza i służy jako cenne źródło informacji dla osób zainteresowanych skrzyżowaniem ekonomii, technologii i historii, szczególnie w kontekście Bitcoin i alternatywnych systemów monetarnych.
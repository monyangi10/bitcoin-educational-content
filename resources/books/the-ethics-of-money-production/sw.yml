title: "Maadili ya Uzalishaji wa Pesa"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  Maadili ya Uzalishaji wa Pesa na Jörg Guido Hülsmann ni uchunguzi wa kina wa athari za kimaadili za uzalishaji wa pesa na jukumu la benki kuu katika mfumo wa kisasa wa kifedha. Hülsmann anachunguza historia ya fedha, akichunguza madhara ya mfumuko wa bei wa fedha na mmomonyoko wa uwezo wa kununua. Anakosoa matokeo ya kimaadili na kiuchumi ya pesa za fiat na anatetea kurudi kwa kanuni nzuri za pesa. Kitabu hiki cha kiwango cha utaalamu kinatoa uchanganuzi unaochochea fikira wa matatizo ya kimaadili yanayozunguka uzalishaji wa pesa na hutumika kama nyenzo muhimu kwa wale wanaopenda makutano ya uchumi, teknolojia na historia, hasa katika muktadha wa Bitcoin na mifumo mbadala ya fedha.
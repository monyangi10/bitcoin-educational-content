title: "De ethiek van geldproductie"
publication_year: 2007
cover: cover_en.webp
original: true
description: |
  The Ethics of Money Production van Jörg Guido Hülsmann is een uitgebreide verkenning van de ethische implicaties van geldproductie en de rol van centrale banken in het moderne financiële systeem. Hülsmann duikt in de historische achtergrond van geld en onderzoekt de effecten van monetaire inflatie en de erosie van de koopkracht. Hij bekritiseert de morele en economische gevolgen van fiatgeld en pleit voor een terugkeer naar de principes van gezond geld. Dit boek op expertniveau biedt een tot nadenken stemmende analyse van de ethische dilemma's rond geldproductie en is een waardevolle bron voor iedereen die geïnteresseerd is in het snijvlak van economie, technologie en geschiedenis, met name in de context van Bitcoin en alternatieve monetaire systemen.
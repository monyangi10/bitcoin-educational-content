title: 「透過數學的 Bitcoin 主權」
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Knut Svanholm 所著的《Sovereignty through Mathematics》一書，以引人入勝的方式探討了 Bitcoin 獨特的特質和原則，這些特質和原則使得 Bitcoin 成為一種革命性的貨幣資產。在這本書中，Svanholm 深入探討了貨幣、通貨膨脹、稀缺性和 Mining 流程等基本概念，讓讀者深刻瞭解 Bitcoin 的獨特性。他針對常見的錯誤觀念，深入探討 Bitcoin 的哲學層面，並探討其對宗教信仰和整個社會的潛在影響。Svanholm 藉由簡明扼要的說明，闡明 Bitcoin 分散性質的意義，以及數學在確保其主權方面所扮演的角色。無論您是 Bitcoin 的新手還是經驗豐富的愛好者，這本書都能擴闊您的理解，並揭示 Bitcoin 在重塑我們的金融版圖中的變革力量。
title: "Bitcoin Soevereiniteit door middel van wiskunde"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Soevereiniteit door wiskunde" van Knut Svanholm is een boeiende verkenning van de unieke kwaliteiten en principes die van Bitcoin een revolutionair monetair activum maken. In dit boek verdiept Svanholm zich in de fundamentele concepten van geld, inflatie, schaarste en het Mining proces om de lezer een diepgaand inzicht te geven in de onderscheidende kwaliteiten van Bitcoin. Hij gaat in op veelvoorkomende misvattingen en verdiept zich in de filosofische aspecten rondom Bitcoin, waarbij hij de mogelijke impact op religieuze overtuigingen en de maatschappij als geheel onderzoekt. Met heldere en beknopte uitleg werpt Svanholm licht op de betekenis van de gedecentraliseerde aard van Bitcoin en de rol van wiskunde bij het waarborgen van de soevereiniteit ervan. Of u nu een nieuwkomer bent in Bitcoin of een doorgewinterde enthousiasteling, dit boek zal uw begrip verbreden en de transformerende kracht van Bitcoin onthullen bij het opnieuw vormgeven van ons financiële landschap.
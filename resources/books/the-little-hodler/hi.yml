title: "द लिटिल होडलर"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  पैसा जटिल है। लेकिन ऐसा नहीं होना चाहिए! 100 छोटी कॉमिक्स में, द लिटिल होडलर पैसे के अतीत, वर्तमान और भविष्य की कहानियाँ बताता है – जटिल आरेखों के बजाय चित्रों में, और बड़े शब्दों के बजाय एक दोस्ताना चेहरे के साथ। द लिटिल होडलर पैसे का सबसे अच्छा रूप खोजने की यात्रा पर है – जिसे वह किसी भी समय (सप्ताहांत पर भी!) स्वतंत्र रूप से उपयोग कर सकता है, जिसे कोई भी उससे नहीं छीन सकता है, और जिसे खरबों में मुद्रित नहीं किया जा सकता है। और आप शर्त लगा सकते हैं कि एक बार जब वह इसे पा लेगा, तो वह इसे वास्तव में HODL कर देगा!
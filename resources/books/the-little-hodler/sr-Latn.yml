title: "Mali Hodler"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Novac je komplikovan. Ali ne bi trebalo da bude! U 100 malih stripova, Mali
  HODLer priča priče o prošlosti, sadašnjosti i budućnosti novca – u slikama
  umesto složenih dijagrama, i sa prijateljskim licem umesto velikih reči. Mali
  HODLer je na putovanju da pronađe najbolji oblik novca – onaj koji može
  slobodno koristiti u bilo koje vreme (čak i vikendom!), onaj koji mu niko ne može oduzeti,
  i onaj koji se ne može štampati u trilionima. I možete se kladiti da kada ga pronađe, on će ga
  HODL jako čvrsto!
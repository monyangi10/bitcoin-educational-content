title: "Küçük Hodler"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Para karmaşıktır. Ama öyle olmamalı! 100 küçük çizgi romanda, Küçük
  HODLer paranın geçmişi, bugünü ve geleceğine dair hikayeler anlatıyor - fotoğraflarla
  karmaşık diyagramlar yerine ve büyük kelimeler yerine dostane bir yüzle. Bu
  Küçük HODLer, kullanabileceği en iyi para biçimini bulmak için bir yolculuğa çıkıyor
  istediği zaman özgürce (hafta sonları bile!), kimsenin ondan alamayacağı bir şey,
  ve trilyonlarca basılamayacak bir şey. Ve bahse girerim bunu bulduğunda
  gW-0'ı gerçekten sıkı tutacak!
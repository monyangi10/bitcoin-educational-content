title: "The Little Hodler"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Pesa ni ngumu. Lakini haipaswi kuwa! Katika vichekesho vidogo 100, The Little
  HODLer inasimulia hadithi za zamani, za sasa na za baadaye za pesa - kwenye picha
  badala ya michoro ngumu, na kwa uso wa kirafiki badala ya maneno makubwa. The
  HODLer mdogo yuko kwenye safari ya kutafuta njia bora zaidi ya pesa - ambayo anaweza kutumia
  kwa uhuru wakati wowote (hata wikendi!), ambayo hakuna mtu anayeweza kuchukua kutoka kwake,
  na ambayo haiwezi kuchapishwa kwa matrilioni. Na unaweka dau mara atakapoipata, yuko
  kwenda HODL ni tight sana!
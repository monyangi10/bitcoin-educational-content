title: "Mały Hodler"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Pieniądze są skomplikowane. Ale nie powinny! W 100 małych komiksach The Little
  HODLer opowiada historie o przeszłości, teraźniejszości i przyszłości pieniędzy - za pomocą obrazków
  zamiast skomplikowanych diagramów i z przyjazną twarzą zamiast wielkich słów. The
  Little HODLer wyrusza w podróż, aby znaleźć najlepszą formę pieniądza - taką, której może używać w dowolnym momencie (nawet w weekendy)
  z której może korzystać w dowolnym momencie (nawet w weekendy!), której nikt nie może mu odebrać,
  i którego nie można wydrukować w bilionach. I możesz się założyć, że kiedy już ją znajdzie, to
  będzie HODL naprawdę mocno!
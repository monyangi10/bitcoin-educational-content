title: "De kleine Hodler"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Geld is ingewikkeld. Maar dat hoeft het niet te zijn! In 100 kleine stripverhalen vertelt The Little
  HODLer verhalen over het verleden, het heden en de toekomst van geld - in plaatjes
  in plaats van ingewikkelde diagrammen en met een vriendelijk gezicht in plaats van grote woorden. De
  Little HODLer is op een reis om de beste vorm van geld te vinden - een die hij kan gebruiken
  vrij kan gebruiken (zelfs in het weekend!), dat niemand hem kan afnemen,
  en dat niet in triljoenen gedrukt kan worden. En reken maar dat als hij het eenmaal gevonden heeft, hij het
  het heel stevig vasthoudt!
title: "Menselijk handelen"
publication_year: 1949
cover: cover_en.webp
original: true
description: |
  In "Human Action" verkent de beroemde Oostenrijkse econoom Ludwig von Mises diepgaand de filosofie achter economische activiteit, waarbij hij de centrale rol van menselijke keuze en de daaruit voortvloeiende gevolgen benadrukt. Dit magnum opus van 85 hoofdstukken werd voor het eerst gepubliceerd in 1949 en is een blijvende toetssteen geworden op het gebied van economisch denken, gekoesterd om zijn uitgebreide en indringende analyse van economische fenomenen.
  
  Mises gebruikt het concept van de praxeologie, de wetenschap van het menselijk handelen, als een fundamenteel uitgangspunt bij het ontleden en begrijpen van economische activiteit. Zijn holistische perspectief omvat niet alleen financiële transacties of de Exchange van goederen en diensten, maar ook het hele scala aan beslissingen en handelingen van individuen die economische fenomenen aandrijven.
  
  Het boek ontrafelt complexe onderwerpen zoals de aard en oorzaken van de conjunctuurcyclus, de markt als economisch systeem, de rol van kennis en onzekerheid in economische besluitvorming en de vitale rol van ondernemerschap. Bovendien onderzoekt Mises op doordachte wijze de gevolgen van overheidsbemoeienis met de economie, waarbij hij uiteindelijk het laissez-faire economische systeem onderschrijft als het meest haalbare pad naar individuele vrijheid en welvaart.
  
  "Human Action" is niet slechts een economieboek; het is een intellectuele reis naar de diepten van de menselijke besluitvorming en de ingewikkelde relatie met maatschappelijke systemen. Het is een must voor economen, filosofen en iedereen die geïnteresseerd is in het verkrijgen van een dieper inzicht in de mechanismen die ten grondslag liggen aan de economische wereld om ons heen. De inzichtelijke observaties blijven resoneren, waardoor het een klassieker is die de tand des tijds doorstaat.
title: "İnsan Eylemi"
publication_year: 1949
cover: cover_en.webp
original: true
description: |
  Ünlü Avusturyalı iktisatçı Ludwig von Mises, "İnsan Eylemi "nde ekonomik faaliyetin ardındaki felsefeyi derinlemesine incelemekte, insan seçiminin merkezi rolünü ve bunun sonuçlarını vurgulamaktadır. İlk olarak 1949 yılında yayınlanan bu 85 bölümlük magnum opus, ekonomik olgulara ilişkin kapsamlı ve nüfuz edici analizleriyle ekonomik düşünce alanında kalıcı bir mihenk taşı haline gelmiştir.
  
  Mises, ekonomik faaliyetlerin incelenmesi ve anlaşılmasında temel bir öncül olarak insan eylemlerinin bilimi olan praksiyoloji kavramını kullanır. Bütüncül bakış açısı sadece finansal işlemleri veya mal ve hizmetlerin Exchange'ını değil, aynı zamanda ekonomik olguları yönlendiren bireyler tarafından üstlenilen karar ve eylemlerin tamamını kapsar.
  
  Kitap, iş döngüsünün doğası ve nedenleri, ekonomik bir sistem olarak piyasa, ekonomik karar almada bilgi ve belirsizliğin rolü ve girişimciliğin hayati rolü gibi karmaşık konuları açığa çıkarmaktadır. Dahası, Mises ekonomiye hükümet müdahalesinin sonuçlarını düşünceli bir şekilde inceler ve nihayetinde bireysel özgürlük ve refaha giden en uygun yol olarak laissez-faire ekonomik sistemini onaylar.
  
  "İnsan Eylemi" sadece bir ekonomi kitabı değil; insan karar verme mekanizmasının derinliklerine ve toplumsal sistemlerle olan karmaşık ilişkisine doğru entelektüel bir yolculuk. Ekonomistler, filozoflar ve çevremizdeki ekonomik dünyanın altında yatan mekanizmaları daha derinlemesine anlamak isteyen herkes için okunması gereken bir kitap. İçgörülü gözlemleri yankı uyandırmaya devam ediyor ve bu da onu zamana meydan okuyan bir klasik haline getiriyor.
title: "De la liberté de la pharmacie"
publication_year: 1860
cover: cover_fr.webp
original: false
description: |
  Arthur Mangin's treatise on the freedom of pharmacy argues against the guild system and government licensing requirements that restricted entry into the pharmaceutical profession. He demonstrates that these regulations, ostensibly designed to protect public health, in reality serve to create artificial scarcity, raise prices, and protect incumbents from competition.

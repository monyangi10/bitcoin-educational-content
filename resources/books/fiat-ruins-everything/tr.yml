title: "Fiat Her Şeyi Mahvediyor"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Sizden çalınıyor. Paranızın değeri düşürülüyor, emeğiniz
  uygarlığınız ve onun tüm kurumları aşağılanıyor. Sen
  daha az ücret için daha uzun süre çalışmak zorunda kalıyorsunuz. Arkadaşlarınızı ve ailenizi daha az görüyorsunuz ve
  daha az. Daha kötü yemekler yiyorsunuz, biraz daha az uyuyorsunuz ve mahalleniz
  her yıl biraz daha kişiliksizleşiyor. Hayatınız kötüleşiyor ve siz
  başkasının fazlalıkları için ödeme yapmak. Bu nasıl oldu ve neden oluyor?
  Fiat Her Şeyi Mahveder, modern dünyanın değersizleştirilmesinin bir analizidir
  bankacılık sistemimiz ve emlaktan eğitim sistemimize ve sanata kadar. Nedenini öğrenin
  bu sistemler daha da kötüye gidiyor ve Bitcoin neden işleri daha iyi hale getirecek.
  
  Fiat Ruins Everything, fiat para sisteminin neden olduğu yaygın yıkımın maskesini düşürürken, Bitcoin'da bulunan umudu vurgulayarak nakavt edici bir yumruk atıyor. Sürükleyici anlatı, toplumun hastalıklarının kalbine iniyor ve mevcut finansal sistemimizin karanlık gerçeğini ortaya koyarken aynı zamanda gelecek için dönüştürücü bir vizyon sunuyor. Bu kitap, mevcut sistem tarafından oyuna getirildiğini hisseden ancak içten içe refah ve bolluğun hala elde edilebileceğini bilen herkes için vazgeçilmez bir okuma kitabıdır.
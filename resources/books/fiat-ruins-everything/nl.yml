title: "Fiat maakt alles kapot"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Er wordt van jullie gestolen. Jullie geld wordt ontwaard, jullie arbeid wordt ontwaard..
  jullie beschaving en al haar instellingen worden vernederd. Jullie
  moet langer werken voor minder loon. Je ziet je vrienden en familie steeds minder
  steeds minder. Je eet slechter, je slaapt een beetje minder en je buurt wordt elk jaar een beetje onpersoonlijker
  elk jaar een beetje onpersoonlijker. Je leven wordt slechter en je
  betaalt voor het overschot van iemand anders. Hoe is dit gebeurd en waarom gebeurt het?
  Fiat Ruins Everything is een analyse van het verval van de moderne wereld van
  ons banksysteem en onroerend goed tot ons onderwijssysteem en kunst. Leer waarom
  deze systemen steeds slechter worden en waarom Bitcoin de dingen beter zal maken.
  
  Fiat Ruins Everything slaat alles, ontmaskert de alomtegenwoordige vernietiging door het fiatvalutasysteem en benadrukt de hoop die in Bitcoin te vinden is. Het meeslepende verhaal dringt door tot de kern van de kwalen van de samenleving en legt de duistere waarheid van ons huidige financiële systeem bloot, terwijl het ook een transformerende visie voor de toekomst biedt. Dit is essentiële lectuur voor iedereen die zich bespeeld voelt door het huidige systeem, maar diep van binnen weet dat welvaart en overvloed nog steeds bereikt kunnen worden.
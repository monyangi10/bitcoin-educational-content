title: "Fiat rujnuje wszystko"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Jesteś okradany. Wasze pieniądze są deprecjonowane, wasza praca jest deprecjonowana
  twoja cywilizacja i wszystkie jej instytucje są zadłużane. Jesteś
  musisz pracować dłużej za mniejsze wynagrodzenie. Coraz rzadziej widujesz się z przyjaciółmi i rodziną
  coraz rzadziej. Jesz gorsze jedzenie, śpisz trochę mniej, a twoje sąsiedztwo staje się z roku na rok
  z roku na rok staje się coraz bardziej bezosobowe. Twoje życie staje się coraz gorsze, a ty
  płacisz za czyjś nadmiar. Jak do tego doszło i dlaczego tak się dzieje?
  Fiat rujnuje wszystko to analiza deprecjacji współczesnego świata, począwszy od
  naszego systemu bankowego i nieruchomości po nasz system edukacyjny i sztukę. Dowiedz się, dlaczego
  te systemy wciąż się pogarszają i dlaczego Bitcoin poprawi sytuację.
  
  Fiat Ruins Everything zadaje nokautujący cios, demaskując wszechobecne zniszczenia spowodowane przez system waluty fiducjarnej, jednocześnie podkreślając nadzieję znalezioną w Bitcoin. Wciągająca narracja trafia w sedno bolączek społeczeństwa i ujawnia mroczną prawdę o naszym obecnym systemie finansowym, jednocześnie oferując transformacyjną wizję przyszłości. Jest to niezbędna lektura dla każdego, kto czuje się rozgrywany przez obecny system, ale w głębi duszy wie, że dobrobyt i obfitość wciąż można osiągnąć.
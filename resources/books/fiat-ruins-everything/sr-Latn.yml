title: "Fiat Uništava Sve"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Kradu vam. Vaš novac se obezvređuje, vaš rad se obezvređuje, vaša civilizacija i sve njene institucije se obezvređuju. Morate da radite duže za manju platu. Sve manje viđate prijatelje i porodicu. Jedete lošiju hranu, spavate malo manje, a vaše naselje postaje svake godine malo bezličnije. Vaš život postaje gori, a vi plaćate za nečiji tuđi višak. Kako se ovo dogodilo i zašto se dešava? Fiat Ruins Everything je analiza obezvređivanja modernog sveta, od našeg bankarskog sistema i nekretnina do našeg obrazovnog sistema i umetnosti. Saznajte zašto ovi sistemi postaju sve gori i zašto će Bitcoin poboljšati stvari.
  
  Fiat Ruins Everything zadaje snažan udarac, razotkrivajući sveprisutno uništenje uzrokovano sistemom fiat valute, dok istovremeno ističe nadu pronađenu u Bitcoin. Uzbudljiva priča pogađa srž društvenih problema i otkriva mračnu istinu našeg trenutnog finansijskog sistema, dok takođe nudi transformativnu viziju za budućnost. Ovo je neophodno štivo za svakoga ko se oseća izigrano od strane trenutnog sistema, ali duboko u sebi zna da se prosperitet i obilje još uvek mogu postići.
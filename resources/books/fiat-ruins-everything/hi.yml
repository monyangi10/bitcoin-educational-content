title: "फिएट ने सब कुछ बर्बाद कर दिया"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  आपसे पैसे चुराए जा रहे हैं। आपका पैसा बर्बाद हो रहा है, आपका श्रम बर्बाद हो रहा है, आपकी सभ्यता और इसकी सभी संस्थाएँ बर्बाद हो रही हैं। आपको कम वेतन पर ज़्यादा समय तक काम करना पड़ रहा है। आप अपने दोस्तों और परिवार से कम मिलते हैं। आप खराब खाना खाते हैं, आप थोड़ा कम सोते हैं, और आपका पड़ोस हर साल थोड़ा और ज़्यादा निजी होता जा रहा है। आपका जीवन खराब होता जा रहा है, और आप किसी और की ज़रूरत से ज़्यादा पैसे चुका रहे हैं। यह कैसे हुआ, और ऐसा क्यों हो रहा है? फ़िएट रूइन्स एवरीथिंग हमारी बैंकिंग प्रणाली और रियल एस्टेट से लेकर हमारी शिक्षा प्रणाली और कला तक आधुनिक दुनिया के पतन का विश्लेषण है। जानें कि ये सिस्टम क्यों खराब होते जा रहे हैं और Bitcoin से चीज़ें बेहतर क्यों होंगी। फ़िएट रूइन्स एवरीथिंग एक धमाकेदार पंच है, जो फ़िएट करेंसी सिस्टम द्वारा किए गए व्यापक विनाश को उजागर करता है और Bitcoin में पाई जाने वाली आशा को उजागर करता है। यह रोचक कहानी समाज की बुराइयों के मर्म को छूती है और हमारी मौजूदा वित्तीय व्यवस्था की काली सच्चाई को उजागर करती है, साथ ही भविष्य के लिए एक परिवर्तनकारी दृष्टिकोण भी प्रस्तुत करती है। यह उन सभी लोगों के लिए पढ़ना ज़रूरी है जो मौजूदा व्यवस्था से ठगे जाने का अनुभव करते हैं, लेकिन अंदर से जानते हैं कि समृद्धि और प्रचुरता अभी भी हासिल की जा सकती है।
title: 「菲亞特毀了一切」
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  你正在被偷走。你們的金錢被貶值，你們的勞動被貶值，你們的文明和所有制度被貶值。
  你們的文明和所有的制度都在被貶值。你
  工作時間越來越長，工資卻越來越少。你見到的朋友和家人越來越少。
  越來越少。你吃的食物越來越差，你睡的時間越來越少，你的鄰居也越來越
  一年比一年不近人情。您的生活越來越糟糕，而您
  為別人的過剩付出代價。這是怎麼發生的？為什麼會這樣？
  Fiat Ruins Everything》分析了現代世界的貶值，從我們的銀行系統、房地產
  我們的銀行體系、房地產、教育體系和藝術。了解為什麼
  這些系統為什麼會越來越糟，以及為什麼 Bitcoin 會讓事情變得更好。
  
  Fiat Ruins Everything》提供了一記重擊，揭露了法定貨幣系統造成的普遍破壞，同時強調了 Bitcoin 帶來的希望。引人入勝的敘事直指社會弊病的核心，揭露了當前金融體系的陰暗真相，同時也為未來提供了轉型的願景。對於那些覺得被現行體系玩弄於股掌之間，但內心深處又知道繁榮與富足仍可實現的人來說，這是一本不可或缺的讀物。
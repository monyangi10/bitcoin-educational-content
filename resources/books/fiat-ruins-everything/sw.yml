title: "Fiat inaharibu kila kitu"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Unaibiwa. Pesa yako inadhalilishwa, kazi yako inadhoofika
  duni, ustaarabu wako na taasisi zake zote zinadhalilishwa. Wewe ni
  kulazimika kufanya kazi kwa muda mrefu kwa malipo kidogo. Unaona marafiki na familia yako kidogo na
  kidogo. Unakula chakula kibaya zaidi, unalala kidogo, na mtaa wako unapata a
  kidogo zaidi isiyo na utu kila mwaka. Maisha yako yanazidi kuwa mabaya, na uko hivyo
  kulipa ziada ya mtu mwingine. Hii ilitokeaje, na kwa nini ilifanyika?
  Fiat Ruins Kila kitu ni uchambuzi wa udhalilishaji wa ulimwengu wa kisasa kutoka
  mfumo wetu wa benki na mali isiyohamishika kwa mfumo wetu wa elimu na sanaa. Jifunze kwa nini
  mifumo hii inaendelea kuwa mbaya na kwa nini Bitcoin itafanya mambo kuwa bora zaidi.
  
  Fiat Ruins Kila kitu hutoa ngumi ya mtoano, na kufichua uharibifu ulioenea unaosababishwa na mfumo wa sarafu ya fiat huku ukiangazia tumaini linalopatikana katika Bitcoin. Masimulizi ya kusisimua hukatiza kiini cha maovu ya jamii na kufichua ukweli wa giza wa mfumo wetu wa sasa wa kifedha huku pia ikitoa dira ya kuleta mabadiliko kwa siku zijazo. Huu ni usomaji muhimu kwa mtu yeyote ambaye anahisi kuchezwa na mfumo wa sasa lakini anajua, ndani kabisa, kwamba ustawi na wingi bado vinaweza kupatikana.
description: |
  本書針對廣泛的讀者，深入探討數個主題
  而又不失通俗易懂。本書可讓您
  Bitcoin 的有用知識，而無需專注於其
  超技術性。本書將提供您所需的所有資訊
  更重要的是，它會告訴您
  什麼是 「好錢」，以及它所提供的巨大優勢。
  如何使用 Bitcoin、如何發送、如何接收、如何購買。感謝
  這本書，您很快就會學會關於 Bitcoin 的「您需要知道的一切」！在
  在附錄中，你會發現一些比特幣玩家的見證，這些先驅
  他們為我們其他人鋪平了道路。
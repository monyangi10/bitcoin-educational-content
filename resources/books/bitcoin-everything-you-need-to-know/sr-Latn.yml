title: "Bitcoin: Sve što treba da znate"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Ova knjiga je namenjena širokoj publici i detaljno obrađuje nekoliko tema, dok ostaje laka za razumevanje laicima. Ova knjiga će vam omogućiti da steknete korisno znanje o temi Bitcoin bez potrebe da se fokusirate na njene hiper-tehničke aspekte. Opremljena je svim informacijama koje su vam potrebne da biste razumeli kako Bitcoin funkcioniše, ali što je još važnije, pokazaće vam šta tačno znači "dobar novac", kao i ogromne prednosti koje pruža. Kako koristiti Bitcoin, kako ga poslati, kako ga primiti, kako ga kupiti. Zahvaljujući ovoj knjizi, uskoro ćete naučiti "sve što treba da znate" o Bitcoin! U dodatku ćete pronaći nekoliko svedočenja bitkoinera, pionira koji su utrli put za sve nas.
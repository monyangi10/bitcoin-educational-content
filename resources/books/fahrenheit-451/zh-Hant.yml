title: 「華氏451」
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  華氏 451》（Fahrenheit 451）由著名科幻小說家雷-布拉德伯里（Ray Bradbury）所著，是一部烏托邦式的小說，描繪了一個未來的美國社會，在這個社會裡，書籍被列為非法，「消防員 」會燒毀任何發現的書籍。書名指的是書紙起火燃燒的溫度。Guy Montag 是一名消防員，他對自己執行國家審查制度和破壞性社 會規範的角色感到幻滅，從而開始質疑和反抗現狀。Bradbury 的小說深刻批判了審查制度和壓制思想的潛在危害，強調了文學和批判性思考在社會中的寶貴作用。
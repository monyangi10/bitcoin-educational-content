title: "Fahrenheit 451"
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  Fahrenheit 451", geschreven door de veelgeprezen sciencefictionschrijver Ray Bradbury, is een dystopische roman over een toekomstige Amerikaanse samenleving waarin boeken verboden zijn en "brandweermannen" alle boeken verbranden die ze vinden. De titel verwijst naar de temperatuur waarbij boekpapier vlam vat en verbrandt. Het verhaal volgt Guy Montag, een brandweerman die gedesillusioneerd raakt over zijn rol als handhaver van de staatscensuur en destructieve maatschappelijke normen, waardoor hij vraagtekens zet bij en in opstand komt tegen de status quo. Bradbury's roman is een diepgaande kritiek op de potentiële schade van censuur en de onderdrukking van ideeën, en benadrukt de onschatbare rol van literatuur en kritisch denken in de samenleving.
title: "Fahrenheit 451"
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  Ünlü bilim kurgu yazarı Ray Bradbury tarafından kaleme alınan "Fahrenheit 451", kitapların yasaklandığı ve "itfaiyecilerin" bulduklarını yaktığı gelecekteki bir Amerikan toplumunu anlatan distopik bir romandır. Başlık, kitap kâğıdının alev alıp yandığı sıcaklığa atıfta bulunmaktadır. Anlatı, devletin sansürünü ve yıkıcı toplumsal normları uygulama rolünden hayal kırıklığına uğrayan ve statükoyu sorgulayıp isyan etmesine yol açan bir itfaiyeci olan Guy Montag'ı takip eder. Bradbury'nin romanı, edebiyatın ve eleştirel düşüncenin toplumdaki paha biçilmez rolünü vurgulayarak, sansürün ve fikirlerin bastırılmasının potansiyel zararlarına yönelik derin bir eleştiridir.
description: |
  Fahrenheit 451," koju je napisao priznati pisac naučne fantastike Rej Bredberi, je distopijski roman koji prikazuje buduće američko društvo u kojem su knjige zabranjene, a "vatrogasci" spaljuju sve pronađene. Naslov se odnosi na temperaturu pri kojoj papir knjige počinje da gori. Narativ prati Gaja Montaga, vatrogasca koji postaje razočaran svojom ulogom u sprovođenju državne cenzure i destruktivnih društvenih normi, što ga navodi da preispita i pobuni se protiv postojećeg stanja. Bredberijev roman je duboka kritika potencijalne štete cenzure i suzbijanja ideja, naglašavajući neprocenjivu ulogu književnosti i kritičkog mišljenja u društvu.
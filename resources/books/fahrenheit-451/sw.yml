title: "Fahrenheit 451"
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  Fahrenheit 451," iliyoandikwa na mwandishi maarufu wa hadithi za kisayansi Ray Bradbury, ni riwaya ya kupotosha ambayo inawasilisha jamii ya baadaye ya Marekani ambapo vitabu vimeharamishwa na "wazima moto" kuchoma chochote kinachopatikana. Kichwa kinarejelea halijoto ambayo karatasi ya kitabu huwaka moto na kuungua. Simulizi hilo linafuatia Guy Montag, mhalifu aliyejihusisha na kazi yake ya serikali na kuwa mwokozi. kanuni haribifu za jamii, zinazompelekea kuhoji na kuasi hali ilivyo sasa, riwaya ya Bradbury ni uhakiki wa kina wa madhara yanayoweza kutokea ya udhibiti na ukandamizaji wa mawazo, ikisisitiza dhima muhimu ya fasihi na fikra makini katika jamii.
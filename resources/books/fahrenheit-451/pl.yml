title: "Fahrenheit 451"
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  Fahrenheit 451", autorstwa uznanego pisarza science fiction Raya Bradbury'ego, to dystopijna powieść przedstawiająca amerykańskie społeczeństwo przyszłości, w którym książki są zakazane, a "strażacy" palą wszystkie znalezione książki. Tytuł odnosi się do temperatury, w której papier książki zapala się i płonie. Narracja podąża za Guyem Montagiem, strażakiem, który rozczarowuje się swoją rolą egzekwowania państwowej cenzury i destrukcyjnych norm społecznych, co prowadzi go do kwestionowania i buntu przeciwko status quo. Powieść Bradbury'ego to głęboka krytyka potencjalnej szkodliwości cenzury i tłumienia idei, podkreślająca nieocenioną rolę literatury i krytycznego myślenia w społeczeństwie.
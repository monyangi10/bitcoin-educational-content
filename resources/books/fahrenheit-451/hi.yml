title: "फ़ारेनहाइट 451"
publication_year: 1953
cover: cover_en.webp
original: true
description: |
  प्रशंसित विज्ञान कथा लेखक रे ब्रैडबरी द्वारा लिखित "फ़ारेनहाइट 451" एक डायस्टोपियन उपन्यास है जो एक ऐसे भविष्य के अमेरिकी समाज को प्रस्तुत करता है जहाँ पुस्तकों पर प्रतिबंध है और "फायरमैन" जो भी किताबें मिलती हैं उन्हें जला देते हैं। शीर्षक उस तापमान को संदर्भित करता है जिस पर पुस्तक का कागज़ आग पकड़ता है और जलता है। कथा गाइ मोंटाग नामक एक फायरमैन की है जो राज्य की सेंसरशिप और विनाशकारी सामाजिक मानदंडों को लागू करने की अपनी भूमिका से निराश हो जाता है, जिससे वह यथास्थिति के खिलाफ सवाल उठाने और विद्रोह करने के लिए प्रेरित होता है। ब्रैडबरी का उपन्यास सेंसरशिप और विचारों के दमन के संभावित नुकसान की गहन आलोचना है, जो समाज में साहित्य और आलोचनात्मक सोच की अमूल्य भूमिका पर जोर देता है।
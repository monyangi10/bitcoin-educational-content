title: "Sztuka programowania w systemie Unix"
publication_year: 2003
cover: cover_en.webp
original: true
description: |
  The Art of Unix Programming autorstwa Erica S. Raymonda to średnio zaawansowany przewodnik, który bada filozofię, zasady projektowania i praktyczne aspekty programowania w systemie Unix. Obejmuje takie tematy jak środowisko programistyczne Unix, skrypty powłoki, wywołania systemowe i komunikacja międzyprocesowa. Dzięki jasnym wyjaśnieniom i przykładom, książka prezentuje moc i elastyczność systemu Unix jako platformy programistycznej, podkreślając jednocześnie prostotę i modułową konstrukcję. Omawia również historię i oparty na współpracy charakter rozwoju systemu Unix. Ogólnie rzecz biorąc, oferuje cenne spostrzeżenia dla programistów, którzy chcą poprawić swoje umiejętności programowania w systemie Unix.
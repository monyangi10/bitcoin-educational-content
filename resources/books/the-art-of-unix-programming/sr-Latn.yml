title: "Umetnost Unix programiranja"
publication_year: 2003
cover: cover_en.webp
original: true
description: |
  Umetnost Unix programiranja od Eric S. Raymonda je vodič srednjeg nivoa koji istražuje filozofiju, principe dizajna i praktične aspekte Unix programiranja. Pokriva teme kao što su Unix programsko okruženje, shell skriptovanje, sistemski pozivi i međuprocesna komunikacija. Sa jasnim objašnjenjima i primerima, knjiga prikazuje moć i fleksibilnost Unixa kao programerske platforme, istovremeno naglašavajući jednostavnost i modularni dizajn. Takođe diskutuje o istoriji i kolaborativnoj prirodi razvoja Unixa. Sve u svemu, nudi vredne uvide za programere koji žele da unaprede svoje Unix programerske veštine.
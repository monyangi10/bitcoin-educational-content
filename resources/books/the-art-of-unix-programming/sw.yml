title: "Sanaa ya Unix Programming"
publication_year: 2003
cover: cover_en.webp
original: true
description: |
  Sanaa ya Utayarishaji Unix iliyoandikwa na Eric S. Raymond ni mwongozo wa kiwango cha kati unaochunguza falsafa, kanuni za muundo na vipengele vya vitendo vya upangaji programu wa Unix. Inashughulikia mada kama vile mazingira ya programu ya Unix, uandishi wa shell, simu za mfumo, na mawasiliano ya usindikaji. Kwa maelezo na mifano wazi, kitabu kinaonyesha uwezo na unyumbufu wa Unix kama jukwaa la programu huku kikisisitiza urahisi na muundo wa kawaida. Pia inajadili historia na asili ya ushirikiano wa maendeleo ya Unix. Kwa ujumla, inatoa maarifa muhimu kwa wasanidi programu wanaotaka kuboresha ujuzi wao wa upangaji wa Unix.
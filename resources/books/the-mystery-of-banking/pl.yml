title: "Tajemnica bankowości"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  The Mystery of Banking autorstwa Murraya Rothbarda to książka, która bada historię i funkcjonowanie systemu bankowego w Stanach Zjednoczonych. Książka szczegółowo wyjaśnia, w jaki sposób rozwinął się obecny system bankowy i jak działa, a także przedstawia krytyczną analizę problemów związanych z tym systemem. Omawia również rolę banków centralnych, Rezerwy Federalnej i ich wpływ na gospodarkę. Książka ta jest szczególnie istotna dla osób zainteresowanych historią i ekonomią bankowości i zapewnia unikalne spojrzenie na kwestie stojące przed współczesnym systemem finansowym.
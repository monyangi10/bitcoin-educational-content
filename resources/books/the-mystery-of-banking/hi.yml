title: "बैंकिंग का रहस्य"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  मरे रोथबर्ड द्वारा लिखित द मिस्ट्री ऑफ़ बैंकिंग एक ऐसी किताब है जो संयुक्त राज्य अमेरिका में बैंकिंग प्रणाली के इतिहास और कामकाज की पड़ताल करती है। यह किताब बताती है कि वर्तमान बैंकिंग प्रणाली कैसे विकसित हुई है और यह कैसे काम करती है, और सिस्टम की समस्याओं का एक महत्वपूर्ण विश्लेषण प्रदान करती है। यह केंद्रीय बैंकों, फेडरल रिजर्व की भूमिका और अर्थव्यवस्था पर उनके प्रभाव पर भी चर्चा करती है। यह किताब बैंकिंग के इतिहास और अर्थशास्त्र में रुचि रखने वालों के लिए विशेष रूप से प्रासंगिक है, और आधुनिक वित्तीय प्रणाली के सामने आने वाले मुद्दों पर एक अनूठा दृष्टिकोण प्रदान करती है।
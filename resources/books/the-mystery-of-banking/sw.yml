title: "Siri ya Benki"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  Siri ya Benki iliyoandikwa na Murray Rothbard ni kitabu kinachochunguza historia na utendaji kazi wa mfumo wa benki nchini Marekani. Kitabu kinaelezea jinsi mfumo wa sasa wa benki umeendelea na jinsi unavyofanya kazi kwa undani, na hutoa uchambuzi muhimu wa matatizo na mfumo. Pia inajadili jukumu la benki kuu, Hifadhi ya Shirikisho, na athari zao kwa uchumi. Kitabu hiki ni muhimu hasa kwa wale wanaopenda historia na uchumi wa benki, na hutoa mtazamo wa kipekee juu ya masuala yanayokabili mfumo wa kisasa wa kifedha.
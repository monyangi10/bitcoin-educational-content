title: "Bankacılığın Gizemi"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  Murray Rothbard tarafından yazılan Bankacılığın Gizemi, Amerika Birleşik Devletleri'ndeki bankacılık sisteminin tarihini ve işleyişini inceleyen bir kitaptır. Kitap, mevcut bankacılık sisteminin nasıl geliştiğini ve nasıl çalıştığını detaylı bir şekilde açıklamakta ve sistemdeki sorunların eleştirel bir analizini sunmaktadır. Ayrıca merkez bankalarının, Federal Rezerv'in rolünü ve ekonomi üzerindeki etkilerini de tartışmaktadır. Bu kitap özellikle bankacılık tarihi ve ekonomisi ile ilgilenenler için önemlidir ve modern finansal sistemin karşı karşıya olduğu sorunlara benzersiz bir bakış açısı sağlar.
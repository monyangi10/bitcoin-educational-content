title: "Misterija bankarstva"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  Misterija bankarstva od strane Murraya Rothbarda je knjiga koja istražuje istoriju i funkcionisanje bankarskog sistema u Sjedinjenim Državama. Knjiga objašnjava kako se trenutni bankarski sistem razvio i kako funkcioniše u detalje, te pruža kritičku analizu problema sa sistemom. Takođe raspravlja o ulozi centralnih banaka, Federalnih rezervi, i njihovom uticaju na ekonomiju. Ova knjiga je posebno relevantna za one koji su zainteresovani za istoriju i ekonomiju bankarstva, i pruža jedinstvenu perspektivu o pitanjima sa kojima se suočava savremeni finansijski sistem.
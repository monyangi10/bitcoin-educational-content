title: "Het mysterie van bankieren"
publication_year: 1983
cover: cover_en.webp
original: true
description: |
  The Mystery of Banking van Murray Rothbard is een boek dat de geschiedenis en de werking van het banksysteem in de Verenigde Staten onderzoekt. Het boek legt in detail uit hoe het huidige banksysteem zich heeft ontwikkeld en hoe het werkt, en geeft een kritische analyse van de problemen met het systeem. Het bespreekt ook de rol van centrale banken, de Federal Reserve, en hun invloed op de economie. Dit boek is vooral relevant voor diegenen die geïnteresseerd zijn in de geschiedenis en economie van het bankwezen en biedt een uniek perspectief op de problemen waar het moderne financiële systeem mee te maken heeft.
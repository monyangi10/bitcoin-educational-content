title: "Le Libre-Échange"
publication_year: 1848
cover: cover_fr.webp
original: true
description: |
  A collection of Bastiat's writings and speeches on free trade, documenting his tireless campaign against protectionism in France during the 1840s. These texts capture Bastiat at his most combative, engaging directly with the arguments of protectionists in the press, in public meetings, and in the National Assembly.

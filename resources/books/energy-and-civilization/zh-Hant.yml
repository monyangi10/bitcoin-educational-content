title: 「能源與文明」
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  在《能源與文明史》（Energy and Civilization：在《能源與文明：一部歷史》一書中，著名作家 Vaclav Smil 全面探討了從前農業時代到目前化石燃料主導的文明，能源如何成為塑造人類社會的動力。
  
  Smil 強調能源是推動人類一切活動的通用貨幣。從塑造地球景觀的自然力量，到太陽能透過光合作用維持生命的關鍵作用，人類利用各種能量流來實現文明的生存。本書深入探討能源對人類生活各方面的深遠影響，包括農業、工業、交通、通訊、經濟、都市化、政治和環境。
  
  人類擁有獨特的能力，能夠運用智慧和各種工具，從簡單的工具到先進的技術，如內燃機和核能反應器，來利用外部能量。Smil 追蹤化石燃料的轉變及其對社會的廣泛影響，檢視它如何塑造了農業、工業、戰爭、生活品質等。
  
  Smil 以全景式、跨學科的方式，對人類的能源時代進行了鉅細靡遺的概述，讓讀者全面瞭解能源與文明之間錯綜複雜的關係。這本廣泛更新和擴充的版本納入了能源研究的最新研究和發展，使其成為任何對能源的歷史和未來感興趣的人的重要資源。
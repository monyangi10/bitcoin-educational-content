title: "Energie en beschaving"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  In "Energie en beschaving: A History" presenteert de veelgeprezen auteur Vaclav Smil een uitgebreide verkenning van hoe energie een drijvende kracht is geweest in het vormgeven van menselijke samenlevingen vanaf de pre-agrarische tijd tot onze huidige door fossiele brandstoffen gedomineerde beschaving.
  
  Smil benadrukt dat energie de universele valuta is die alle menselijke activiteiten aandrijft. Van de natuurlijke krachten die het landschap van de aarde vormgeven tot de cruciale rol van zonne-energie bij het in stand houden van leven door fotosynthese, de mens heeft verschillende energiestromen benut om zijn beschaafde bestaan mogelijk te maken. Dit boek gaat in op de diepgaande invloed van energie op elk aspect van het menselijk leven, zoals landbouw, industrie, transport, communicatie, economie, verstedelijking, politiek en milieu.
  
  Mensen bezitten een uniek vermogen om externe energieën te benutten met behulp van hun intellect en een scala aan gereedschappen, van eenvoudige werktuigen tot geavanceerde technologieën zoals verbrandingsmotoren en kernreactoren. Smil schetst de transformerende verschuiving naar fossiele brandstoffen en de ingrijpende effecten daarvan op de samenleving, waarbij hij onderzoekt hoe dit de landbouw, industrie, oorlogvoering, levenskwaliteit en nog veel meer heeft gevormd.
  
  Met een panoramische en interdisciplinaire benadering presenteert Smil een magistraal overzicht van de energietijdperken van de mensheid, waardoor lezers een uitgebreid begrip krijgen van de ingewikkelde relatie tussen energie en beschaving. In deze uitgebreid geactualiseerde en uitgebreide editie zijn de nieuwste onderzoeken en ontwikkelingen op het gebied van energiestudies opgenomen, waardoor het een onmisbare bron is voor iedereen die geïnteresseerd is in de geschiedenis en toekomst van energie.
title: "Energia i cywilizacja"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  W książce "Energia i cywilizacja: A History" uznany autor Vaclav Smil przedstawia kompleksowe badanie tego, jak energia była siłą napędową w kształtowaniu ludzkich społeczeństw od czasów przedrolniczych do naszej obecnej cywilizacji zdominowanej przez paliwa kopalne.
  
  Smil podkreśla, że energia jest uniwersalną walutą, która napędza wszystkie ludzkie działania. Od naturalnych sił kształtujących krajobraz Ziemi po kluczową rolę energii słonecznej w podtrzymywaniu życia poprzez fotosyntezę, ludzie wykorzystali różne przepływy energii, aby umożliwić swoją cywilizowaną egzystencję. Ta książka zagłębia się w głęboki wpływ energii na każdy aspekt ludzkiego życia, w tym rolnictwo, przemysł, transport, komunikację, ekonomię, urbanizację, politykę i środowisko.
  
  Ludzie posiadają wyjątkową zdolność do wykorzystywania energii zewnętrznej za pomocą swojego intelektu i szeregu narzędzi, od prostych narzędzi po zaawansowane technologie, takie jak silniki spalinowe i reaktory jądrowe. Smil śledzi transformacyjne przejście na paliwa kopalne i jego ogromny wpływ na społeczeństwo, badając, w jaki sposób ukształtowało ono rolnictwo, przemysł, działania wojenne, jakość życia i nie tylko.
  
  Dzięki panoramicznemu i interdyscyplinarnemu podejściu Smil przedstawia magisterialny przegląd epok energetycznych ludzkości, zapewniając czytelnikom kompleksowe zrozumienie skomplikowanego związku między energią a cywilizacją. To obszernie zaktualizowane i rozszerzone wydanie zawiera najnowsze badania i osiągnięcia w dziedzinie badań nad energią, dzięki czemu jest niezbędnym źródłem informacji dla każdego zainteresowanego historią i przyszłością energii.
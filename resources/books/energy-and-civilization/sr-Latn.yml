title: "Energija i civilizacija"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  U "Energija i civilizacija: Istorija," priznati autor Vaclav Smil predstavlja sveobuhvatno istraživanje o tome kako je energija bila pokretačka snaga u oblikovanju ljudskih društava od prepoljoprivrednih vremena do naše trenutne civilizacije kojom dominiraju fosilna goriva.
  
  Smil naglašava da je energija univerzalna valuta koja pokreće sve ljudske aktivnosti. Od prirodnih sila koje oblikuju pejzaž Zemlje do ključne uloge solarne energije u održavanju života kroz fotosintezu, ljudi su koristili različite tokove energije kako bi omogućili svoje civilizovano postojanje. Ova knjiga istražuje dubok uticaj energije na svaki aspekt ljudskog života, uključujući poljoprivredu, industriju, transport, komunikaciju, ekonomiju, urbanizaciju, politiku i životnu sredinu.
  
  Ljudi poseduju jedinstvenu sposobnost da koriste spoljašnje energije koristeći svoj intelekt i niz alata, od jednostavnih sprava do naprednih tehnologija poput motora sa unutrašnjim sagorevanjem i nuklearnih reaktora. Smil prati transformativni prelazak na fosilna goriva i njegove sveobuhvatne efekte na društvo, ispitujući kako je oblikovao poljoprivredu, industriju, ratovanje, kvalitet života i još mnogo toga.
  
  Sa panoramskim i interdisciplinarnim pristupom, Smil predstavlja magistarski pregled energetskih era čovečanstva, pružajući čitaocima sveobuhvatno razumevanje složenog odnosa između energije i civilizacije. Ovo opsežno ažurirano i prošireno izdanje uključuje najnovija istraživanja i razvoj u oblasti energetskih studija, čineći ga vitalnim resursom za svakoga ko je zainteresovan za istoriju i budućnost energije.
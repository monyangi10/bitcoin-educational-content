title: "Atlas Shrugged"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Atlas Shrugged" is een roman geschreven door Ayn Rand die thema's als individualisme, kapitalisme en vrije markten verkent. Het verhaal volgt Dagny Taggart, een succesvolle zakenvrouw die worstelt om het spoorwegbedrijf van haar familie overeind te houden te midden van economische onrust. Terwijl ze zoekt naar manieren om de activiteiten van het bedrijf te verbeteren, komt ze verschillende obstakels tegen, waaronder corrupte politici en overheidsregels. De roman geeft kritiek op collectivisme en pleit voor laissez-faire kapitalisme als het ideale economische systeem.
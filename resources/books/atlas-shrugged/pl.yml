title: "Atlas Shrugged"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Atlas Shrugged" to powieść napisana przez Ayn Rand, która porusza tematy indywidualizmu, kapitalizmu i wolnych rynków. Historia opowiada o Dagny Taggart, odnoszącej sukcesy bizneswoman, która walczy o utrzymanie rodzinnej firmy kolejowej na powierzchni w środku zawirowań gospodarczych. Szukając sposobów na usprawnienie działalności firmy, napotyka różne przeszkody, w tym skorumpowanych polityków i regulacje rządowe. Powieść przedstawia krytykę kolektywizmu i opowiada się za leseferystycznym kapitalizmem jako idealnym systemem gospodarczym.
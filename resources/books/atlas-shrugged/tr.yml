title: "Atlas Silkindi"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Atlas Silkindi" Ayn Rand tarafından yazılan ve bireycilik, kapitalizm ve serbest piyasa temalarını işleyen bir romandır. Hikaye, ekonomik çalkantıların ortasında ailesinin demiryolu şirketini ayakta tutmak için mücadele eden başarılı bir iş kadını olan Dagny Taggart'ı takip eder. Şirketin faaliyetlerini iyileştirmenin yollarını ararken, yozlaşmış politikacılar ve hükümet düzenlemeleri de dahil olmak üzere çeşitli engellerle karşılaşır. Roman, kolektivizmin bir eleştirisini sunar ve ideal ekonomik sistem olarak laissez-faire kapitalizmini savunur.
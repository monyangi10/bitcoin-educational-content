title: "Atlas slegnuo ramenima"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  "Atlas Shrugged" je roman koji je napisala Ayn Rand i istražuje teme individualizma, kapitalizma i slobodnih tržišta. Priča prati Dagny Taggart, uspešnu poslovnu ženu koja se bori da održi porodičnu železničku kompaniju na površini usred ekonomske krize. Dok traži načine da unapredi poslovanje kompanije, suočava se sa raznim preprekama, uključujući korumpirane političare i vladine regulative. Roman predstavlja kritiku kolektivizma i zagovara laissez-faire kapitalizam kao idealan ekonomski sistem.
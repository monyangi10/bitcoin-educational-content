title: "मानचित्रावली सिकोड़ना"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  एटलस श्रग्ड" ऐन रैंड द्वारा लिखित एक उपन्यास है जो व्यक्तिवाद, पूंजीवाद और मुक्त बाजारों के विषयों की खोज करता है। कहानी एक सफल व्यवसायी डेग्नी टैगगार्ट पर आधारित है, जो आर्थिक उथल-पुथल के बीच अपने परिवार की रेलरोड कंपनी को बचाए रखने के लिए संघर्ष करती है। जब वह कंपनी के संचालन को बेहतर बनाने के तरीकों की खोज करती है, तो उसे भ्रष्ट राजनेताओं और सरकारी नियमों सहित विभिन्न बाधाओं का सामना करना पड़ता है। उपन्यास सामूहिकता की आलोचना प्रस्तुत करता है और आदर्श आर्थिक प्रणाली के रूप में अहस्तक्षेप पूंजीवाद की वकालत करता है।
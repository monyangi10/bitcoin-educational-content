title: "Atlas Iliyopigwa"
publication_year: 1957
cover: cover_en.webp
original: true
description: |
  Atlas Shrugged" ni riwaya iliyoandikwa na Ayn Rand ambayo inachunguza mada za ubinafsi, ubepari, na soko huria. Hadithi hii inafuatia Dagny Taggart, mfanyabiashara aliyefanikiwa ambaye anahangaika kuweka kampuni ya reli ya familia yake katika hali ya msukosuko wa kiuchumi. Anapotafuta njia za kuboresha shughuli za kampuni hiyo, anakumbana na vikwazo mbalimbali vya serikali, ikiwa ni pamoja na vikwazo mbalimbali vya serikali. ukosoaji wa umoja na watetezi wa ubepari wa laissez-faire kama mfumo bora wa uchumi.
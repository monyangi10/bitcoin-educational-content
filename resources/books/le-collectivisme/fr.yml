title: "Le Collectivisme: Examen critique du nouveau socialisme"
publication_year: 1883
cover: cover_fr.webp
original: true
description: |
  Leroy-Beaulieu's critical examination of the new socialism (1883-1884) is one of the most comprehensive liberal responses to Marxism and collectivism. He systematically dissects the economic, philosophical, and historical arguments of the socialists, demonstrating their logical contradictions and the catastrophic consequences of their implementation.

title: "Antifragile"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Nassim Nicholas Taleb tarafından kaleme alınan Antifragile, şoklara ve stres faktörlerine karşı dayanıklı sistemler hakkında yeni bir düşünce tarzı öneren bir kitaptır. Taleb, kırılgan olmayan sistemlerin sadece strese dayanmakla kalmadığını, stres altında geliştiğini ve bu süreçte güç ve esneklik kazandığını savunuyor. Bu fikri ekonomi, finans ve iş dünyasına uygulayarak birçok sistemin çok kırılgan olduğunu ve daha sağlam ve sürdürülebilir sistemler yaratmak için kırılganlık karşıtlığını benimsememiz gerektiğini savunuyor. Ayrıca geleneksel bilgeliğe meydan okuyor ve kırılganlık karşıtı ilkeleri kendi yaşamlarımızda ve kuruluşlarımızda nasıl uygulayabileceğimize dair pratik tavsiyeler sunuyor.
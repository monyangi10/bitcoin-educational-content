title: "Antifragile"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Antifragile, autorstwa Nassima Nicholasa Taleba, to książka, która proponuje nowy sposób myślenia o systemach odpornych na wstrząsy i czynniki stresogenne. Taleb argumentuje, że systemy antykruchości nie tylko wytrzymują stres, ale rozwijają się pod jego wpływem, zyskując siłę i odporność w tym procesie. Stosuje tę ideę w ekonomii, finansach i biznesie, argumentując, że wiele systemów jest zbyt kruchych i że powinniśmy przyjąć antykruchość, aby stworzyć bardziej solidne i zrównoważone systemy. Podważa również konwencjonalną mądrość i oferuje praktyczne porady dotyczące stosowania zasad antykruchości w naszym własnym życiu i organizacjach.
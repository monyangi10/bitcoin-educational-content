title: "एंटीफ्रैजाइल"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  नासिम निकोलस तालेब द्वारा लिखी गई एंटीफ्रैजाइल एक ऐसी किताब है जो झटकों और तनावों के प्रति लचीले सिस्टम के बारे में सोचने का एक नया तरीका सुझाती है। तालेब का तर्क है कि एंटीफ्रैजाइल सिस्टम सिर्फ़ तनाव का सामना ही नहीं करते, बल्कि वे इसके तहत पनपते हैं, इस प्रक्रिया में ताकत और लचीलापन हासिल करते हैं। वह इस विचार को अर्थशास्त्र, वित्त और व्यापार पर लागू करते हैं, तर्क देते हुए कि कई सिस्टम बहुत नाजुक हैं और हमें अधिक मजबूत और टिकाऊ सिस्टम बनाने के लिए एंटीफ्रैजाइलिटी को अपनाना चाहिए। वह पारंपरिक ज्ञान को भी चुनौती देते हैं और अपने जीवन और संगठनों में एंटीफ्रैजाइल सिद्धांतों को लागू करने के तरीके पर व्यावहारिक सलाह देते हैं।
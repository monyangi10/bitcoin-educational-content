title: "Antifragile"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Antifragile, by Nassim Nicholas Taleb je knjiga koja predlaže novi način razmišljanja o sistemima koji su otporni na šokove i stresore. Taleb tvrdi da antifragilni sistemi ne samo da izdržavaju stres, već napreduju pod njim, stičući snagu i otpornost u tom procesu. On primenjuje ovu ideju na ekonomiju, finansije i biznis, tvrdeći da su mnogi sistemi previše krhki i da bismo trebali prihvatiti antifragilnost kako bismo stvorili robusnije i održivije sisteme. Takođe izaziva konvencionalnu mudrost i nudi praktične savete o tome kako primeniti antifragilne principe u našim životima i organizacijama.
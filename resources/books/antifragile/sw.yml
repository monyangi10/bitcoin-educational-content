title: "Antifragile"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Antifragile, kilichoandikwa na Nassim Nicholas Taleb ni kitabu kinachopendekeza njia mpya ya kufikiri kuhusu mifumo ambayo inastahimili mishtuko na mafadhaiko. Taleb anasema kuwa mifumo ya antifragile haihimili dhiki tu, inastawi chini yake, ikipata nguvu na uthabiti katika mchakato. Anatumia wazo hili kwa uchumi, fedha, na biashara, akisema kuwa mifumo mingi ni dhaifu sana na kwamba tunapaswa kukumbatia ukinzani ili kuunda mifumo thabiti na endelevu. Pia anapinga hekima ya kawaida na anatoa ushauri unaofaa kuhusu jinsi ya kutumia kanuni zisizo dhaifu katika maisha na mashirika yetu.
title: 「反脆弱」
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Nassim Nicholas Taleb 所著的《反脆弱》（Antifragile）一書，提出了一種新的思維方式，來看待能夠抵禦衝擊和壓力的系統。Taleb 認為，反脆弱系統不僅能承受壓力，還能在壓力下茁壯成長，並在過程中獲得力量和彈性。他將這個想法應用在經濟、金融和商業上，認為許多系統都太脆弱了，我們應該擁抱反脆弱系統，以創造更強大、更永續的系統。他也挑戰傳統智慧，並提供實用建議，讓我們如何在自己的生活和組織中應用反脆弱原則。
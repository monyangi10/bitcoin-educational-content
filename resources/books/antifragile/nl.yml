title: "Antifragiel"
publication_year: 2012
cover: cover_en.webp
original: true
description: |
  Antifragile van Nassim Nicholas Taleb is een boek dat een nieuwe manier van denken voorstelt over systemen die bestand zijn tegen schokken en stress. Taleb stelt dat antifragiele systemen niet alleen bestand zijn tegen stress, ze gedijen eronder en winnen aan kracht en veerkracht tijdens het proces. Hij past dit idee toe op de economie, de financiële wereld en het bedrijfsleven en stelt dat veel systemen te fragiel zijn en dat we antifragiliteit moeten omarmen om robuustere en duurzamere systemen te creëren. Hij daagt ook conventionele wijsheid uit en geeft praktisch advies over hoe we antifragiliteitsprincipes kunnen toepassen in ons eigen leven en in onze eigen organisaties.
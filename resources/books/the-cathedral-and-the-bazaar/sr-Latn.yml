title: "Katedrala i Bazar"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  "Katedrala i bazar" od Erica S. Raymonda je istraživanje na srednjem nivou o modelu razvoja softvera otvorenog koda i njegovom uticaju na tehnologiju i društvo. Kroz pronicljivu analizu i lična iskustva, Raymond suprotstavlja tradicionalni pristup "katedrale" razvoju softvera, koji se odlikuje zatvorenom i centralizovanom kontrolom, sa decentralizovanim i kolaborativnim modelom "bazara" razvoja otvorenog koda. Knjiga se bavi principima, praksama i motivacijama iza pokreta otvorenog koda, prikazujući moć saradnje vođene zajednicom, recenzije kolega i transparentnosti u stvaranju softvera visokog kvaliteta. Raymond koristi primere iz stvarnog sveta i studije slučaja kako bi ilustrovao prednosti i izazove razvoja otvorenog koda, obrađujući teme kao što su licenciranje, kontrola verzija, praćenje grešaka i dinamika zajednice. Sa svojim spojem tehničkih uvida i filozofskih refleksija, "Katedrala i bazar" pruža vredne lekcije i inspiraciju za programere softvera, entuzijaste tehnologije i svakoga ko je zainteresovan za transformativni potencijal inovacija otvorenog koda.
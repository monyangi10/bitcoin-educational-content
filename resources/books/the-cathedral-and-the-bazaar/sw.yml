title: "Kanisa Kuu na Bazaar"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Cathedral and the Bazaar" na Eric S. Raymond ni uchunguzi wa ngazi ya kati wa modeli ya ukuzaji programu huria na athari zake kwa teknolojia na jamii. Kupitia uchanganuzi wa kina na uzoefu wa kibinafsi, Raymond anatofautisha mkabala wa "kanisa kuu" la jadi katika ukuzaji wa programu, unaojulikana kwa udhibiti funge na wa serikali kuu, na kanuni iliyogatuliwa na shirikishi ya "bazaar", kanuni ya uundaji wa kitabu, na shirikishi. motisha nyuma ya vuguvugu la chanzo huria, kuonyesha uwezo wa ushirikiano unaoendeshwa na jamii, mapitio ya rika, na uwazi katika kuunda programu ya hali ya juu na tafiti za matukio ili kuonyesha manufaa na changamoto za ukuzaji wa chanzo huria, kushughulikia mada kama vile utoaji leseni, udhibiti wa matoleo, ufuatiliaji wa hitilafu, na mienendo ya kiufundi na ya kifalsafa Bazaar" hutoa masomo muhimu na msukumo kwa wasanidi programu, wapenda teknolojia, na mtu yeyote anayevutiwa na uwezo wa mageuzi wa uvumbuzi wa chanzo huria.
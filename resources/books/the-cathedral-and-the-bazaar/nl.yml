title: "De kathedraal en de bazaar"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Cathedral and the Bazaar" van Eric S. Raymond is een verkenning op intermediair niveau van het open-source softwareontwikkelingsmodel en de invloed ervan op technologie en de maatschappij. Door middel van inzichtelijke analyses en persoonlijke ervaringen zet Raymond de traditionele "kathedraal" benadering van softwareontwikkeling, gekenmerkt door gesloten en gecentraliseerde controle, tegenover het gedecentraliseerde en collaboratieve "bazaar" model van open-source ontwikkeling. Het boek gaat in op de principes, praktijken en motivaties achter de open-source beweging en laat de kracht zien van gemeenschapsgedreven samenwerking, peer review en transparantie bij het maken van software van hoge kwaliteit. Raymond maakt gebruik van praktijkvoorbeelden en casestudies om de voordelen en uitdagingen van open source-ontwikkeling te illustreren, waarbij onderwerpen als licenties, versiebeheer, bugtracking en gemeenschapsdynamiek aan bod komen. Met zijn mix van technische inzichten en filosofische reflecties biedt "The Cathedral and the Bazaar" waardevolle lessen en inspiratie voor softwareontwikkelaars, technologieliefhebbers en iedereen die geïnteresseerd is in het transformatieve potentieel van open-source innovatie.
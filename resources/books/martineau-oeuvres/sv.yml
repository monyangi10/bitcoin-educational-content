description: |
  The collected works of Ernest Martineau, a late 19th-century French liberal economist and jurist. Martineau continued the tradition of Bastiat and Molinari into the early 20th century, defending free trade, property rights, and limited government at a time when collectivist ideas were gaining ground across Europe.

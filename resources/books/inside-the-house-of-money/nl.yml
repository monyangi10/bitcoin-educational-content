title: "In het huis van het geld"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  "Inside the House of Money" van Steve Drobny is een boek voor experts met een kijkje achter de schermen van de hedgefondsindustrie. De auteur interviewt enkele van de meest succesvolle hedgefondsmanagers en handelaren in de sector om hun beleggingsstrategieën, technieken voor risicobeheer en geheimen voor succes te onthullen. Het boek geeft inzicht in de denkwijze van deze investeerders en hoe ze door de complexe financiële wereld navigeren om een generate rendement voor hun klanten te behalen. Het is een boeiend boek voor iedereen die geïnteresseerd is in financiën, beleggen en hedgefondsen en biedt waardevolle inzichten in de wereld van de haute finance.
title: "Wewnątrz domu pieniędzy"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  "Inside the House of Money" autorstwa Steve'a Drobnego to książka na poziomie eksperckim, która przedstawia kulisy branży funduszy hedgingowych. Autor przeprowadza wywiady z jednymi z najbardziej skutecznych menedżerów funduszy hedgingowych i traderów w branży, aby odkryć ich strategie inwestycyjne, techniki zarządzania ryzykiem i sekrety sukcesu. Książka zapewnia wgląd w sposób myślenia tych inwestorów i sposób, w jaki poruszają się po złożonym świecie finansów, aby uzyskać zyski generate dla swoich klientów. Jest to wciągająca lektura dla każdego zainteresowanego finansami, inwestowaniem i funduszami hedgingowymi, a także zapewnia cenny wgląd w świat wysokich finansów.
title: 「金錢屋內」
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  "Steve Drobny 所著的《Inside the House of Money》是一本專家級的書籍，以幕後的眼光來看對沖基金業。作者訪問了業內一些最成功的對沖基金經理和交易員，揭開他們的投資策略、風險管理技巧和成功秘訣。書中深入剖析了這些投資者的心態，以及他們如何在複雜的金融世界中遊刃有餘，為客戶贏得 generate 的回報。對於任何對金融、投資和對沖基金感興趣的人來說，這是一本引人入勝的讀物，並提供了對高金融世界的寶貴見解。
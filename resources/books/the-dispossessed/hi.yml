title: "वंचित"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  उर्सुला के. ले गुइन द्वारा लिखित द डिस्पोज्ड एक मध्यवर्ती स्तर का विज्ञान कथा उपन्यास है जो अराजकतावाद और सामाजिक संरचनाओं के विषयों की खोज करता है। दूर के भविष्य में स्थापित, यह शेवेक नामक एक भौतिक विज्ञानी का अनुसरण करता है जो अपने अराजकतावादी समाज के प्रति वफादारी और अपने क्रांतिकारी सिद्धांतों को बड़े ब्रह्मांड के साथ साझा करने की इच्छा के बीच फंसा हुआ है। शेवेक के अनुभवों के माध्यम से, उपन्यास प्रचलित सत्ता संरचनाओं को चुनौती देता है और पाठकों को समाज को संगठित करने के वैकल्पिक तरीकों की कल्पना करने के लिए आमंत्रित करता है। यह विज्ञान कथा और राजनीतिक दर्शन में रुचि रखने वालों के लिए एक विचारोत्तेजक और बौद्धिक रूप से उत्तेजक पठन है।
title: "Mülksüzler"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  Ursula K. Le Guin'in Mülksüzler'i, anarşizm ve toplumsal yapılar temalarını işleyen orta düzey bir bilimkurgu romanı. Uzak bir gelecekte geçen roman, anarşist toplumuna sadakat ile devrimci teorilerini daha geniş bir evrenle paylaşma arzusu arasında kalan bir fizikçi olan Shevek'i takip ediyor. Shevek'in deneyimleri aracılığıyla roman, hakim güç yapılarına meydan okuyor ve okuyucuları toplumu örgütlemenin alternatif yollarını hayal etmeye davet ediyor. Bilimkurgu ve siyaset felsefesiyle ilgilenenler için düşündürücü ve entelektüel açıdan ufuk açıcı bir okuma.
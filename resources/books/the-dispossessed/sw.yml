title: "Waliotengwa"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  The Dispossessed by Ursula K. Le Guin ni riwaya ya uwongo ya sayansi ya kiwango cha kati ambayo inachunguza dhamira za anarchism na miundo ya jamii. Imewekwa katika siku zijazo za mbali, inamfuata Shevek, mwanafizikia aliyepasuka kati ya uaminifu kwa jamii yake ya anarchist na hamu yake ya kushiriki nadharia zake za mapinduzi na ulimwengu mkubwa zaidi. Kupitia tajriba za Shevek, riwaya inachangamoto miundo ya nguvu iliyopo na inawaalika wasomaji kufikiria njia mbadala za kupanga jamii. Ni somo la kufikirisha na kusisimua kiakili kwa wale wanaopenda hadithi za kisayansi na falsafa ya kisiasa.
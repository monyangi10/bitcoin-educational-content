title: "The Dispossessed"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  The Dispossessed autorstwa Ursuli K. Le Guin to średnio zaawansowana powieść science fiction, która porusza tematy anarchizmu i struktur społecznych. Akcja powieści rozgrywa się w odległej przyszłości, a jej bohaterem jest Shevek, fizyk rozdarty między lojalnością wobec anarchistycznego społeczeństwa a pragnieniem podzielenia się swoimi rewolucyjnymi teoriami z całym wszechświatem. Poprzez doświadczenia Sheveka, powieść rzuca wyzwanie dominującym strukturom władzy i zachęca czytelników do wyobrażenia sobie alternatywnych sposobów organizacji społeczeństwa. Jest to prowokująca do myślenia i stymulująca intelektualnie lektura dla osób zainteresowanych science fiction i filozofią polityczną.
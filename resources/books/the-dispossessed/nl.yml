title: "De bezitlozen"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  The Dispossessed van Ursula K. Le Guin is een sciencefictionroman voor gemiddeld niveau die de thema's anarchisme en maatschappelijke structuren verkent. Het boek speelt zich af in een verre toekomst en volgt Shevek, een natuurkundige die heen en weer geslingerd wordt tussen loyaliteit aan zijn anarchistische samenleving en zijn verlangen om zijn revolutionaire theorieën te delen met het grotere universum. Door de ervaringen van Shevek daagt de roman de heersende machtsstructuren uit en nodigt het lezers uit om zich alternatieve manieren voor te stellen om de samenleving te organiseren. Het is een uitdagend en intellectueel stimulerend boek voor diegenen die geïnteresseerd zijn in sciencefiction en politieke filosofie.
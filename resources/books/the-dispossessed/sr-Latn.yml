title: "Razbaštinjeni"
publication_year: 1974
cover: cover_en.webp
original: true
description: |
  Raseljenici od Ursule K. Le Guin je naučnofantastični roman srednjeg nivoa koji istražuje teme anarhizma i društvenih struktura. Radnja je smeštena u daleku budućnost i prati Ševeka, fizičara rastrzanog između lojalnosti svojoj anarhističkoj zajednici i želje da podeli svoje revolucionarne teorije sa širim univerzumom. Kroz Ševekova iskustva, roman izaziva postojeće strukture moći i poziva čitaoce da zamisle alternativne načine organizovanja društva. To je misaono izazovno i intelektualno stimulativno štivo za one koji su zainteresovani za naučnu fantastiku i političku filozofiju.
title: "Bitcoin'da Ustalaşmak"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  andreas Antonopoulos tarafından yazılan "Mastering Bitcoin", Bitcoin'nin arkasındaki teknolojinin ve nasıl çalıştığının kapsamlı bir şekilde anlaşılmasını sağlayan orta düzey bir kitaptır. Kitap, Bitcoin'nin tarihçesi, kriptografisi, işlemleri, Mining ve Bitcoin ağı dahil olmak üzere Bitcoin ile ilgili çok çeşitli konuları kapsamaktadır. Kitap ayrıca akıllı sözleşmeler ve Lightning Network gibi ileri düzey konuları da kapsamaktadır. Bu kitap, Bitcoin ve altında yatan teknoloji hakkında daha derin bir anlayış kazanmak isteyen geliştiriciler ve teknik düşünen bireyler için mükemmel bir kaynaktır.
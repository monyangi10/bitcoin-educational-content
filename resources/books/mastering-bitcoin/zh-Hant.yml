title: 「掌握 Bitcoin」
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  "Andreas Antonopoulos 所著的《精通 Bitcoin》是一本中級書籍，可讓您全面瞭解 Bitcoin 背後的技術及其運作方式。它涵蓋了與 Bitcoin 相關的廣泛主題，包括其歷史、加密學、交易、Mining 和 Bitcoin 網路。本書也涵蓋了智慧契約和 Lightning Network 等進階主題。對於想要深入瞭解 Bitcoin 及其底層技術的開發人員和技術型人才而言，本書是極佳的資源。
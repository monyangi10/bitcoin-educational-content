title: "Bitcoin beheersen"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  "Mastering Bitcoin" van Andreas Antonopoulos is een boek voor gemiddeld niveau dat een uitgebreid inzicht geeft in de technologie achter Bitcoin en hoe het werkt. Het behandelt een groot aantal onderwerpen met betrekking tot Bitcoin, waaronder de geschiedenis, cryptografie, transacties, Mining en het Bitcoin netwerk. Het boek behandelt ook geavanceerde onderwerpen zoals slimme contracten en de Lightning Network. Dit boek is een uitstekende bron voor ontwikkelaars en technisch georiënteerde personen die Bitcoin en de onderliggende technologie beter willen begrijpen.
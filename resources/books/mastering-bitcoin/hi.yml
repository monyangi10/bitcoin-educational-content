title: "मास्टरिंग Bitcoin"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  एंड्रियास एंटोनोपोलोस द्वारा लिखित "मास्टरिंग Bitcoin" एक मध्यवर्ती स्तर की पुस्तक है जो Bitcoin के पीछे की तकनीक और इसके काम करने के तरीके के बारे में व्यापक समझ प्रदान करती है। इसमें Bitcoin से संबंधित कई विषयों को शामिल किया गया है, जिसमें इसका इतिहास, क्रिप्टोग्राफी, लेन-देन, Mining और Bitcoin नेटवर्क शामिल हैं। पुस्तक में स्मार्ट कॉन्ट्रैक्ट और Lightning Network जैसे उन्नत विषयों को भी शामिल किया गया है। यह पुस्तक डेवलपर्स और तकनीकी रूप से दिमाग वाले व्यक्तियों के लिए एक उत्कृष्ट संसाधन है जो Bitcoin और इसकी अंतर्निहित तकनीक की गहरी समझ हासिल करना चाहते हैं।
title: "Mastering Bitcoin"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  "Mastering Bitcoin" od Andreas Antonopoulos je knjiga srednjeg nivoa koja pruža sveobuhvatno razumevanje tehnologije iza Bitcoin i kako ona funkcioniše. Pokriva širok spektar tema vezanih za Bitcoin, uključujući njegovu istoriju, kriptografiju, transakcije, Mining i Bitcoin mrežu. Knjiga takođe pokriva napredne teme kao što su pametni ugovori i Lightning Network. Ova knjiga je odličan resurs za programere i tehnički orijentisane pojedince koji žele da steknu dublje razumevanje Bitcoin i njegove osnovne tehnologije.
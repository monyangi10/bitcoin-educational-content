title: "Mastering Bitcoin"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  "Mastering Bitcoin" autorstwa Andreasa Antonopoulosa to książka na poziomie średnio zaawansowanym, która zapewnia kompleksowe zrozumienie technologii stojącej za Bitcoin i jej działania. Obejmuje ona szeroki zakres tematów związanych z Bitcoin, w tym jego historię, kryptografię, transakcje, Mining i sieć Bitcoin. Książka obejmuje również zaawansowane tematy, takie jak inteligentne kontrakty i Lightning Network. Książka ta jest doskonałym źródłem informacji dla programistów i osób zorientowanych technicznie, które chcą lepiej zrozumieć Bitcoin i leżącą u jego podstaw technologię.
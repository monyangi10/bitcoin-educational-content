title: "Mreža"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Grid by Gretchen Bakke je prosvetljujuće istraživanje istorije i uticaja elektroenergetske mreže. Bakke se upušta u složenosti i izazove upravljanja i održavanja ove vitalne infrastrukture kroz istoriju. Od ranih dana električne energije do modernog doba obnovljivih izvora energije, ona ispituje društvene, političke i tehnološke sile koje oblikuju mrežu. Sa mešavinom istorije, tehnologije i društvenih komentara, ova knjiga nudi dragocene uvide u prošlost, sadašnjost i budućnost naših energetskih sistema. Preporučuje se za čitaoce srednjeg nivoa koji su zainteresovani za razumevanje složenog funkcionisanja mreže i njene uloge u društvu.
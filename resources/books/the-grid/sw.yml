title: "Gridi"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Gridi ya Gretchen Bakke ni uchunguzi wa kuelimisha wa historia na athari za gridi ya nishati ya umeme. Bakke anachunguza matatizo na changamoto za kusimamia na kudumisha miundombinu hii muhimu katika historia. Kuanzia siku za mwanzo za umeme hadi enzi ya kisasa ya nishati mbadala, anachunguza nguvu za kijamii, kisiasa na kiteknolojia zinazounda gridi ya taifa. Pamoja na mchanganyiko wa historia, teknolojia na maoni ya kijamii, kitabu hiki kinatoa maarifa muhimu kuhusu siku zilizopita, za sasa na zijazo za mifumo yetu ya nishati. Inapendekezwa kwa wasomaji wa kati wanaopenda kuelewa kazi ngumu za gridi ya taifa na jukumu lake katika jamii.
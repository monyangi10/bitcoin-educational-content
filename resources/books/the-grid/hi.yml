title: "ग्रिड"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  ग्रेटचेन बैके द्वारा लिखित द ग्रिड विद्युत पावर ग्रिड के इतिहास और प्रभाव की एक ज्ञानवर्धक खोज है। बैके ने पूरे इतिहास में इस महत्वपूर्ण बुनियादी ढांचे के प्रबंधन और रखरखाव की जटिलताओं और चुनौतियों का गहराई से अध्ययन किया है। बिजली के शुरुआती दिनों से लेकर अक्षय ऊर्जा के आधुनिक युग तक, वह ग्रिड को आकार देने वाली सामाजिक, राजनीतिक और तकनीकी ताकतों की जांच करती है। इतिहास, प्रौद्योगिकी और सामाजिक टिप्पणियों के मिश्रण के साथ, यह पुस्तक हमारे ऊर्जा प्रणालियों के अतीत, वर्तमान और भविष्य के बारे में मूल्यवान अंतर्दृष्टि प्रदान करती है। यह उन मध्यवर्ती पाठकों के लिए अनुशंसित है जो ग्रिड के जटिल कामकाज और समाज में इसकी भूमिका को समझने में रुचि रखते हैं।
title: "The Grid"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Grid autorstwa Gretchen Bakke to pouczająca eksploracja historii i wpływu sieci elektroenergetycznej. Bakke zagłębia się w złożoność i wyzwania związane z zarządzaniem i utrzymaniem tej kluczowej infrastruktury na przestrzeni dziejów. Od początków elektryczności po współczesną erę energii odnawialnej, bada siły społeczne, polityczne i technologiczne, które kształtują sieć. Dzięki połączeniu historii, technologii i komentarzy społecznych, książka ta oferuje cenny wgląd w przeszłość, teraźniejszość i przyszłość naszych systemów energetycznych. Polecana jest średnio zaawansowanym czytelnikom zainteresowanym zrozumieniem skomplikowanego działania sieci i jej roli w społeczeństwie.
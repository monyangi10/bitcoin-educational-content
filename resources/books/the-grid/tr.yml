title: "The Grid"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Gretchen Bakke'nin yazdığı The Grid, elektrik şebekesinin tarihi ve etkisi üzerine aydınlatıcı bir keşif. Bakke, tarih boyunca bu hayati altyapıyı yönetmenin ve sürdürmenin karmaşıklıklarını ve zorluklarını araştırıyor. Elektriğin ilk günlerinden modern yenilenebilir enerji çağına kadar, şebekeyi şekillendiren sosyal, politik ve teknolojik güçleri inceliyor. Tarih, teknoloji ve sosyal yorumların harmanlandığı bu kitap, enerji sistemlerimizin geçmişi, bugünü ve geleceği hakkında değerli bilgiler sunuyor. Şebekenin karmaşık işleyişini ve toplumdaki rolünü anlamak isteyen orta düzey okuyucular için tavsiye edilir.
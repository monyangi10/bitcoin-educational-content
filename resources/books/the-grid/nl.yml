title: "Het raster"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Grid van Gretchen Bakke is een verhelderende verkenning van de geschiedenis en de impact van het elektriciteitsnet. Bakke duikt in de complexiteit en uitdagingen van het beheren en onderhouden van deze vitale infrastructuur door de geschiedenis heen. Van de begindagen van elektriciteit tot het moderne tijdperk van hernieuwbare energie, onderzoekt ze de sociale, politieke en technologische krachten die het elektriciteitsnet vormgeven. Met een mix van geschiedenis, technologie en sociaal commentaar biedt dit boek waardevolle inzichten in het verleden, heden en de toekomst van onze energiesystemen. Het wordt aanbevolen voor gemiddelde lezers die geïnteresseerd zijn in het begrijpen van de ingewikkelde werking van het elektriciteitsnet en de rol ervan in de samenleving.
title: "धन और ऋण का सिद्धांत"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  लुडविग वॉन मिज़ेस द्वारा लिखित द थ्योरी ऑफ़ मनी एंड क्रेडिट एक प्रभावशाली पुस्तक है जो पैसे की प्रकृति और आर्थिक गतिविधि पर इसके प्रभावों का पता लगाती है। मिज़ेस के काम को आर्थिक सिद्धांत में सबसे महत्वपूर्ण योगदानों में से एक माना जाता है, और कई लोगों द्वारा इसे आधुनिक ऑस्ट्रियाई अर्थशास्त्र की नींव माना जाता है। इस पुस्तक में, मिज़ेस पैसे और कीमतों के बीच के संबंध, मुद्रास्फीति के प्रभावों और अर्थव्यवस्था में ऋण की भूमिका की जांच करते हैं। वह बैंकिंग की प्रकृति और आंशिक रिजर्व बैंकिंग से जुड़ी समस्याओं पर भी चर्चा करते हैं। यह पुस्तक अर्थशास्त्र और मौद्रिक नीति में रुचि रखने वाले किसी भी व्यक्ति के लिए अवश्य पढ़ी जानी चाहिए। यह आधुनिक अर्थव्यवस्था के कामकाज और उसमें पैसे की भूमिका की गहरी समझ प्रदान करती है।
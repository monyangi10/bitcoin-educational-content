title: "De theorie van geld en krediet"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  The Theory of Money and Credit van Ludwig von Mises is een invloedrijk boek dat de aard van geld en de effecten ervan op de economische activiteit onderzoekt. Het werk van Mises wordt gezien als een van de belangrijkste bijdragen aan de economische theorie en wordt door velen beschouwd als de basis van de moderne Oostenrijkse economie. In dit boek onderzoekt Mises de relatie tussen geld en prijzen, de effecten van inflatie en de rol van krediet in de economie. Hij bespreekt ook de aard van bankieren en de problemen die gepaard gaan met fractional reserve banking. Dit boek is een must voor iedereen die geïnteresseerd is in economie en monetair beleid. Het geeft een diepgaand inzicht in de werking van de moderne economie en de rol van geld daarin.
title: "Para ve Kredi Teorisi"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  Ludwig von Mises'in Para ve Kredi Teorisi, paranın doğasını ve ekonomik faaliyetler üzerindeki etkilerini araştıran etkili bir kitaptır. Mises'in çalışması ekonomi teorisine yapılan en önemli katkılardan biri olarak kabul edilir ve birçok kişi tarafından modern Avusturya ekonomisinin temeli olarak kabul edilir. Bu kitapta Mises, para ve fiyatlar arasındaki ilişkiyi, enflasyonun etkilerini ve kredinin ekonomideki rolünü incelemektedir. Ayrıca bankacılığın doğasını ve kısmi rezerv bankacılığı ile ilgili sorunları da tartışmaktadır. Bu kitap, ekonomi ve para politikasıyla ilgilenen herkes için mutlaka okunması gereken bir eserdir. Modern ekonominin işleyişi ve paranın bu işleyişteki rolü hakkında derin bir anlayış sağlamaktadır.
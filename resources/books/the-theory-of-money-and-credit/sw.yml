title: "Nadharia ya Pesa na Mikopo"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  Nadharia ya Pesa na Mikopo kilichoandikwa na Ludwig von Mises ni kitabu chenye ushawishi kinachochunguza asili ya pesa na athari zake kwa shughuli za kiuchumi. Kazi ya Mises inachukuliwa kuwa mojawapo ya michango muhimu zaidi kwa nadharia ya kiuchumi, na inachukuliwa na wengi kuwa msingi wa uchumi wa kisasa wa Austria. Katika kitabu hiki, Mises anachunguza uhusiano kati ya pesa na bei, athari za mfumuko wa bei, na jukumu la mkopo katika uchumi. Pia anazungumzia hali ya benki na matatizo yanayohusiana na benki ya hifadhi ya sehemu. Kitabu hiki ni lazima kusomwa kwa yeyote anayevutiwa na uchumi na sera ya fedha. Inatoa ufahamu wa kina wa utendaji kazi wa uchumi wa kisasa na jukumu la pesa ndani yake.
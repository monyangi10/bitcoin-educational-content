title: "Teorija novca i kredita"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  Teorija novca i kredita od Ludviga fon Mizesa je uticajna knjiga koja istražuje prirodu novca i njegove efekte na ekonomsku aktivnost. Mizesovo delo se smatra jednim od najvažnijih doprinosa ekonomskoj teoriji i mnogi ga smatraju osnovom moderne austrijske ekonomije. U ovoj knjizi, Mizes ispituje odnos između novca i cena, efekte inflacije i ulogu kredita u ekonomiji. Takođe raspravlja o prirodi bankarstva i problemima povezanim sa frakcionim rezervnim bankarstvom. Ova knjiga je obavezno štivo za svakoga ko je zainteresovan za ekonomiju i monetarnu politiku. Pruža duboko razumevanje funkcionisanja moderne ekonomije i uloge novca u njoj.
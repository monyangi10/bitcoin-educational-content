title: "Teoria pieniądza i kredytu"
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  Teoria pieniądza i kredytu Ludwiga von Misesa to wpływowa książka, która bada naturę pieniądza i jego wpływ na działalność gospodarczą. Praca Misesa jest uważana za jeden z najważniejszych wkładów w teorię ekonomii i przez wielu uważana jest za fundament współczesnej ekonomii austriackiej. W tej książce Mises analizuje związek między pieniądzem a cenami, skutki inflacji i rolę kredytu w gospodarce. Omawia również naturę bankowości i problemy związane z bankowością opartą na rezerwie cząstkowej. Książka ta jest obowiązkową lekturą dla każdego zainteresowanego ekonomią i polityką pieniężną. Zapewnia dogłębne zrozumienie funkcjonowania współczesnej gospodarki i roli pieniądza w niej.
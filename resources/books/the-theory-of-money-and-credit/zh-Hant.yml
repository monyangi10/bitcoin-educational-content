title: 「貨幣與信貸理論」
publication_year: 1912
cover: cover_en.webp
original: true
description: |
  路德維希‧馮‧米塞斯 (Ludwig von Mises) 所著的《貨幣與信貸理論》(The Theory of Money and Credit) 是一本極具影響力的著作，探討了貨幣的本質及其對經濟活動的影響。米塞斯的著作被認為是對經濟理論最重要的貢獻之一，也被許多人認為是現代奧地利經濟學的基礎。在這本書中，米塞斯研究了貨幣與價格之間的關係、通貨膨脹的影響，以及信貸在經濟中的角色。他還討論了銀行業的本質以及部分儲備金制度相關的問題。這本書是任何對經濟學和貨幣政策感興趣的人的必讀書籍。它提供了對現代經濟運作以及貨幣在其中所扮演角色的深刻理解。
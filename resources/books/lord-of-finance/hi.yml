title: "वित्त के भगवान"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  लियाकत अहमद द्वारा लिखित "लॉर्ड ऑफ फाइनेंस" एक गैर-काल्पनिक पुस्तक है जो 20वीं सदी की शुरुआत में दुनिया की वित्तीय प्रणाली पर हावी होने वाले चार केंद्रीय बैंकरों का विस्तृत विवरण प्रदान करती है। पुस्तक प्रथम विश्व युद्ध और महामंदी के बीच की अवधि को कवर करती है, और बताती है कि कैसे इन केंद्रीय बैंकरों के कार्यों ने हिटलर के उदय और अंततः द्वितीय विश्व युद्ध को जन्म दिया। इतिहास के लेंस के माध्यम से, पुस्तक वित्त, अर्थशास्त्र और राजनीति के बीच जटिल संबंधों में अंतर्दृष्टि प्रदान करती है, और आधुनिक वैश्विक अर्थव्यवस्था को आकार देने में केंद्रीय बैंकिंग के महत्व पर प्रकाश डालती है। कुल मिलाकर, "लॉर्ड ऑफ फाइनेंस" वित्त और अर्थशास्त्र के इतिहास में रुचि रखने वाले किसी भी व्यक्ति के लिए एक आकर्षक पुस्तक है।
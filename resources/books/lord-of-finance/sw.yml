title: "Bwana wa Fedha"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  "Lord of Finance" kilichoandikwa na Liaquat Ahamed ni kitabu kisicho cha uwongo ambacho kinatoa maelezo ya kina ya benki kuu nne zilizotawala mfumo wa kifedha duniani mwanzoni mwa karne ya 20. Kitabu hiki kinashughulikia kipindi kati ya Vita vya Kwanza vya Kidunia na Unyogovu Mkuu, na kinaelezea jinsi vitendo vya benki kuu hizi vilisababisha kuinuka kwa Hitler na hatimaye, Vita vya Kidunia vya pili. Kupitia lenzi ya historia, kitabu hiki kinatoa maarifa juu ya uhusiano changamano kati ya fedha, uchumi, na siasa, na kuangazia umuhimu wa benki kuu katika kuunda uchumi wa kisasa wa kimataifa. Kwa ujumla, "Bwana wa Fedha" ni usomaji wa kuvutia kwa mtu yeyote anayevutiwa na historia ya fedha na uchumi.
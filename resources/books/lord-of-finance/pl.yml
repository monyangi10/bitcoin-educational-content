title: "Lord of Finance"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  "Lord of Finance" autorstwa Liaquata Ahameda to książka non-fiction, która zawiera szczegółowy opis czterech bankierów centralnych, którzy zdominowali światowy system finansowy na początku XX wieku. Książka obejmuje okres między I wojną światową a Wielkim Kryzysem i wyjaśnia, w jaki sposób działania tych bankierów centralnych doprowadziły do powstania Hitlera i ostatecznie do II wojny światowej. Przez pryzmat historii książka zapewnia wgląd w złożone relacje między finansami, ekonomią i polityką oraz podkreśla znaczenie bankowości centralnej w kształtowaniu nowoczesnej globalnej gospodarki. Ogólnie rzecz biorąc, "Lord of Finance" to fascynująca lektura dla każdego zainteresowanego historią finansów i ekonomii.
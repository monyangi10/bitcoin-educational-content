title: "Heer van de financiën"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  "Lord of Finance" van Liaquat Ahamed is een non-fictie boek dat een gedetailleerd verslag geeft van de vier centrale bankiers die het financiële systeem van de wereld domineerden in het begin van de 20e eeuw. Het boek beslaat de periode tussen de Eerste Wereldoorlog en de Grote Depressie en legt uit hoe de acties van deze centrale bankiers leidden tot de opkomst van Hitler en uiteindelijk tot de Tweede Wereldoorlog. Door de lens van de geschiedenis geeft het boek inzicht in de complexe relaties tussen financiën, economie en politiek en benadrukt het belang van centraal bankieren bij het vormgeven van de moderne wereldeconomie. Over het geheel genomen is "Lord of Finance" fascinerend leesvoer voor iedereen die geïnteresseerd is in de geschiedenis van financiën en economie.
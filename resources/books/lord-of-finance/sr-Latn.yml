title: "Gospodar finansija"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  "Lord of Finance" by Liaquat Ahamed je nefikcionalna knjiga koja pruža detaljan prikaz četvorice centralnih bankara koji su dominirali svetskim finansijskim sistemom početkom 20. veka. Knjiga pokriva period između Prvog svetskog rata i Velike depresije, i objašnjava kako su akcije ovih centralnih bankara dovele do uspona Hitlera i, na kraju, Drugog svetskog rata. Kroz prizmu istorije, knjiga pruža uvid u složene odnose između finansija, ekonomije i politike, i ističe važnost centralnog bankarstva u oblikovanju moderne globalne ekonomije. Sve u svemu, "Lord of Finance" je fascinantno štivo za svakoga ko je zainteresovan za istoriju finansija i ekonomije.
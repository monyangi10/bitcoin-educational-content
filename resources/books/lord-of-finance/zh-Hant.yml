title: 「金融之王」
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  Liaquat Ahamed 所著的 "Lord of Finance" 是一本非小說書籍，詳細記述了在 20 世紀初期主宰世界金融體系的四位中央銀行家。該書涵蓋了從第一次世界大戰到經濟大蕭條之間的時期，並解釋了這些中央銀行家的行為如何導致希特勒的崛起，並最終引發了第二次世界大戰。透過歷史的鏡頭，這本書提供了對金融、經濟和政治之間複雜關係的洞察，並強調了中央銀行在塑造現代全球經濟中的重要性。總體而言，《金融之王》對任何對金融和經濟史有興趣的人而言，都是一本引人入勝的讀物。
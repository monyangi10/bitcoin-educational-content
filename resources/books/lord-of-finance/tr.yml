title: "Finansın Efendisi"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  liaquat Ahamed tarafından yazılan "Finansın Efendisi", 20. yüzyılın başlarında dünya finans sistemine hakim olan dört merkez bankacısının ayrıntılı bir anlatımını sunan kurgusal olmayan bir kitaptır. Kitap, Birinci Dünya Savaşı ile Büyük Buhran arasındaki dönemi kapsamakta ve bu merkez bankacılarının eylemlerinin Hitler'in yükselişine ve nihayetinde İkinci Dünya Savaşı'na nasıl yol açtığını açıklamaktadır. Kitap, tarihin merceğinden bakarak finans, ekonomi ve siyaset arasındaki karmaşık ilişkilere ışık tutuyor ve merkez bankacılığının modern küresel ekonomiyi şekillendirmedeki önemini vurguluyor. Genel olarak, "Finansın Efendisi" finans ve ekonomi tarihiyle ilgilenen herkes için büyüleyici bir okuma.
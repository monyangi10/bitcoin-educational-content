title: "Why Bitcoin"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Why Bitcoin? by Tomer Strolight is a collection of short, insightful essays that explore the most important yet often misunderstood aspects of Bitcoin. Originally written as a series of standalone pieces, the essays have been organized into an accessible and engaging book that addresses dozens of common questions about Bitcoin. Through clever analogies, short sentences, and a touch of whimsy, Strolight covers topics ranging from ethics and self-actualization to energy use and decentralization. The book requires no prior knowledge of economics, mathematics, or computer science, making it an ideal entry point for newcomers while still offering fresh perspectives for experienced Bitcoiners.

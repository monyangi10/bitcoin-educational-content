title: "Les Lois naturelles de l'économie politique"
publication_year: 1887
cover: cover_fr.webp
original: true
description: |
  The Natural Laws of Political Economy (1887) is Molinari's attempt to establish economics on a scientific foundation comparable to the natural sciences. He argues that economic phenomena are governed by natural laws — of supply and demand, competition, value, and exchange — that operate independently of human will and cannot be overridden by legislation.

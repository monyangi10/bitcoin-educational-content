title: "De Bitcoin standaard"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  De Bitcoin Standaard door Saifedean Amous verkent de geschiedenis van geld en het potentieel van Bitcoin om een revolutie teweeg te brengen in het wereldwijde financiële systeem. De auteur belicht de voordelen van Bitcoin, waaronder de gedecentraliseerde aard en het deflatoire ontwerp, die stabiliteit en duurzame economische groei bevorderen. Amous bespreekt ook de technische aspecten van Bitcoin en gaat in op veelvoorkomende misvattingen en toekomstige uitdagingen
title: "Bitcoin Standard"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Bitcoin Standard autora Saifedeana Amousa istražuje istoriju novca i potencijal Bitcoin da revolucionira globalni finansijski sistem. Autor ističe prednosti Bitcoin, uključujući njegovu decentralizovanu prirodu i deflatorni dizajn, koji promovišu stabilnost i održiv ekonomski rast. Amous takođe razmatra tehničke aspekte Bitcoin i obraća se uobičajenim zabludama, dok razmatra buduće izazove.
title: "Bitcoin Standardı"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Saifedean Amous tarafından yazılan Bitcoin Standardı, paranın tarihini ve Bitcoin'in küresel finansal sistemde devrim yaratma potansiyelini araştırıyor. Yazar, Bitcoin'in istikrarı ve sürdürülebilir ekonomik büyümeyi destekleyen merkezi olmayan yapısı ve deflasyonist tasarımı gibi avantajlarını vurgulamaktadır. Amous ayrıca Bitcoin'in teknik yönlerini tartışıyor ve gelecekteki zorlukları değerlendirirken yaygın yanlış anlamaları ele alıyor
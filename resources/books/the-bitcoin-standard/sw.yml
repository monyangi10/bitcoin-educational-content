title: "Bitcoin Standard"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Bitcoin Standard ya Saifedean Amous inachunguza historia ya pesa na uwezo wa Bitcoin kuleta mapinduzi katika mfumo wa fedha duniani. Mwandishi anaangazia faida za Bitcoin, ikiwa ni pamoja na asili yake ya ugatuzi na muundo wa kupunguza bei, ambayo inakuza utulivu na ukuaji endelevu wa uchumi. Amous pia anajadili vipengele vya kiufundi vya Bitcoin na kushughulikia dhana potofu za kawaida huku akizingatia changamoto za siku zijazo.
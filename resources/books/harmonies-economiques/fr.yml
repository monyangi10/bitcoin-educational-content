title: "Harmonies économiques"
publication_year: 1850
cover: cover_fr.webp
original: true
description: |
  Bastiat's final and most ambitious work, left unfinished at his death in 1850. In it, he argues that the interests of individuals in a free society are not in conflict but in natural harmony — that voluntary exchange, competition, and the price system produce outcomes that benefit all participants. A systematic answer to the socialist critiques of his time.

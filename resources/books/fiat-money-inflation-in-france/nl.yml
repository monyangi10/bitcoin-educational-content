title: "FIAT-geld Inflatie in Frankrijk"
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  Fiat Money Inflation in France", geschreven door Andrew Dickson White in 1896, is een baanbrekend onderzoek naar de economische crisis die ontstond na de Franse Revolutie. Het boek onderzoekt de catastrofale gevolgen van het ongecontroleerd drukken van geld en de overdreven afhankelijkheid van fiatvaluta, wat leidde tot hyperinflatie en economische onrust in het Frankrijk van na de revolutie.
  
  White's werk dient als een waarschuwend verhaal over de gevaren van monetair beleid dat niet wordt ondersteund door fysieke reserves en toont de desastreuze gevolgen van inflatie voor de economie en structuur van een samenleving. Deze inzichtelijke historische analyse blijft zeer relevant voor moderne lezers en biedt belangrijke lessen over economisch beleid, fiscale verantwoordelijkheid en de werkelijke gevolgen van financiële beslissingen van regeringen.
title: 「法國的 FIAT 貨幣通貨膨脹」
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  Andrew Dickson White 於 1896 年撰寫的《法國的法定貨幣通貨膨脹》是對法國大革命後發生的經濟危機的開創性研究。這本書詳細探討了失控印鈔和過度依賴法定貨幣的災難性後果，這導致了革命後法國的惡性通貨膨脹和經濟動盪。
  
  White 的著作對於沒有實物儲備支持的貨幣政策的危險性提出了警示，展示了通貨膨脹對社會經濟和結構的災難性影響。這本富有洞察力的歷史分析書對現代讀者而言仍然極具意義，提供了關於經濟政策、財政責任以及政府金融決策對現實世界影響的重要教訓。
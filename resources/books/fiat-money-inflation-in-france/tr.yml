title: "Fransa'da FIAT Para Enflasyonu"
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  Andrew Dickson White tarafından 1896 yılında kaleme alınan "Fransa'da İtibari Para Enflasyonu", Fransız Devrimi sonrasında yaşanan ekonomik krizin ufuk açıcı bir incelemesidir. Kitap, devrim sonrası Fransa'da hiperenflasyona ve ekonomik çalkantılara yol açan kontrolsüz para basımının ve itibari paraya aşırı güvenin yıkıcı sonuçlarını mercek altına alıyor.
  
  White'ın çalışması, enflasyonun bir toplumun ekonomisi ve yapısı üzerindeki yıkıcı etkisini göstererek, fiziksel rezervlerle desteklenmeyen para politikalarının tehlikeleri hakkında uyarıcı bir hikaye görevi görmektedir. Ekonomi politikası, mali sorumluluk ve hükümetler tarafından alınan mali kararların gerçek dünyadaki etkileri hakkında önemli dersler veren bu anlayışlı tarihsel analiz, modern okuyucular için de geçerliliğini korumaktadır.
title: "Inflacja pieniądza FIAT we Francji"
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  Fiat Money Inflation in France", napisana przez Andrew Dicksona White'a w 1896 roku, jest przełomowym badaniem kryzysu gospodarczego, który nastąpił po rewolucji francuskiej. Książka analizuje katastrofalne konsekwencje niekontrolowanego drukowania pieniędzy i nadmiernego polegania na walucie fiducjarnej, co doprowadziło do hiperinflacji i zawirowań gospodarczych w porewolucyjnej Francji.
  
  Praca White'a służy jako przestroga przed niebezpieczeństwami polityki monetarnej nie popartej fizycznymi rezerwami, pokazując katastrofalny wpływ inflacji na gospodarkę i strukturę społeczeństwa. Ta wnikliwa analiza historyczna pozostaje bardzo istotna dla współczesnych czytelników, dostarczając ważnych lekcji na temat polityki gospodarczej, odpowiedzialności fiskalnej i rzeczywistych konsekwencji decyzji finansowych podejmowanych przez rządy.
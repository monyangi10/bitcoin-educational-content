title: "फ्रांस में फिएट मुद्रा मुद्रास्फीति"
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  1896 में एंड्रयू डिक्सन व्हाइट द्वारा लिखित "फ्रांस में फिएट मनी इन्फ्लेशन" फ्रांसीसी क्रांति के बाद हुए आर्थिक संकट की एक मौलिक जांच है। यह पुस्तक अनियंत्रित मुद्रा मुद्रण और फिएट मुद्रा पर अत्यधिक निर्भरता के विनाशकारी परिणामों की जांच करती है, जिसके कारण क्रांतिकारी फ्रांस में अति मुद्रास्फीति और आर्थिक उथल-पुथल हुई।
  
  व्हाइट का काम भौतिक भंडार द्वारा समर्थित नहीं मौद्रिक नीतियों के खतरों के बारे में एक चेतावनी कहानी के रूप में कार्य करता है, जो समाज की अर्थव्यवस्था और संरचना पर मुद्रास्फीति के विनाशकारी प्रभाव को प्रदर्शित करता है। यह व्यावहारिक ऐतिहासिक विश्लेषण आधुनिक पाठकों के लिए अत्यधिक प्रासंगिक है, जो आर्थिक नीति, राजकोषीय जिम्मेदारी और सरकारों द्वारा किए गए वित्तीय निर्णयों के वास्तविक दुनिया के निहितार्थों के बारे में महत्वपूर्ण सबक प्रदान करता है।
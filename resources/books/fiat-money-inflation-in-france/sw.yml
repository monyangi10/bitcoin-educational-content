title: Mfumuko wa Bei wa Fiat nchini Ufaransa
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  Mfumuko wa bei wa Fiat Money nchini Ufaransa," iliyoandikwa na Andrew Dickson White mwaka wa 1896, ni uchunguzi wa kina wa mgogoro wa kiuchumi uliotokea baada ya Mapinduzi ya Ufaransa. Kitabu hiki kinachunguza matokeo mabaya ya uchapishaji wa fedha usio na udhibiti na kutegemea zaidi sarafu ya fiat, ambayo ilisababisha mfumuko mkubwa wa bei na mtikisiko wa kiuchumi katika Ufaransa baada ya mapinduzi.
  
  Kazi ya White hutumika kama hadithi ya tahadhari kuhusu hatari za sera za fedha zisizoungwa mkono na akiba ya kimwili, inayoonyesha athari mbaya ya mfumuko wa bei kwenye uchumi na muundo wa jamii. Uchambuzi huu wa kinadharia wa kihistoria unasalia kuwa muhimu kwa wasomaji wa kisasa, ukitoa mafunzo muhimu kuhusu sera ya kiuchumi, uwajibikaji wa kifedha, na athari za ulimwengu halisi za maamuzi ya kifedha yanayofanywa na serikali.
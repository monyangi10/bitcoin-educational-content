title: "FIAT Money Inflation in France"
publication_year: 1896
cover: cover_en.webp
original: true
description: |
  "Fiat Money Inflation in France," napisao Andrew Dickson White 1896. godine, predstavlja ključno ispitivanje ekonomske krize koja se dogodila nakon Francuske revolucije. Knjiga analizira katastrofalne posledice nekontrolisanog štampanja novca i prekomernog oslanjanja na fiat valutu, što je dovelo do hiperinflacije i ekonomskog haosa u postrevolucionarnoj Francuskoj.
  
  Whiteovo delo služi kao upozoravajuća priča o opasnostima monetarnih politika koje nisu podržane fizičkim rezervama, pokazujući katastrofalan uticaj inflacije na ekonomiju i strukturu društva. Ova pronicljiva istorijska analiza ostaje veoma relevantna za savremene čitaoce, pružajući važne lekcije o ekonomskoj politici, fiskalnoj odgovornosti i stvarnim implikacijama finansijskih odluka koje donose vlade.
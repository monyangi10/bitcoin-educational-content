title: "Algorithmes et Théorie des Nombres"
publication_year: 2014
cover: cover_fr.webp
original: true
description: |
  Kitabu "Algorithmes et Théorie des Nombres" cha Pierre Audibert ni kitabu cha marejeleo kwa wanafunzi na wataalamu wa hisabati na sayansi ya kompyuta. Kitabu kinachunguza kwa kina nadharia ya nambari na kanuni za algoriti zinazotumika kutatua matatizo changamano katika uwanja huu. Mwandishi pia anashughulikia mada zinazohusiana kama vile nadharia ya kikundi, jiometri ya aljebra, na kriptografia, na hutoa mifano ya vitendo ili kuonyesha dhana muhimu. Kitabu hiki kimekusudiwa wasomaji wazoefu ambao wana ujuzi wa awali wa nadharia ya nambari na upangaji programu, lakini pia kinaweza kuwa muhimu kwa wanafunzi wa hali ya juu na watafiti katika nyanja hizi.
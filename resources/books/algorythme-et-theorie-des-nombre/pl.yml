title: "Algorithmes et Théorie des Nombres (Algorytmy i teoria liczb)"
publication_year: 2014
cover: cover_fr.webp
original: true
description: |
  Książka "Algorithmes et Théorie des Nombres" autorstwa Pierre'a Audiberta jest dziełem referencyjnym dla studentów matematyki i informatyki oraz profesjonalistów. Książka zagłębia się w teorię liczb i algorytmy używane do rozwiązywania złożonych problemów w tej dziedzinie. Autor omawia również pokrewne tematy, takie jak teoria grup, geometria algebraiczna i kryptografia, a także dostarcza praktycznych przykładów ilustrujących kluczowe pojęcia. Książka ta jest przeznaczona dla doświadczonych czytelników, którzy mają wcześniejszą wiedzę z zakresu teorii liczb i programowania, ale może być również przydatna dla zaawansowanych studentów i badaczy w tych dziedzinach.

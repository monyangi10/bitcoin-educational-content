title: "Algoritmen en théorie van getallen"
publication_year: 2014
cover: cover_fr.webp
original: true
description: |
  Het boek "Algorithmes et Théorie des Nombres" van Pierre Audibert is een naslagwerk voor studenten wiskunde en informatica en professionals. Het boek gaat diep in op getaltheorie en de algoritmen die worden gebruikt om complexe problemen op dit gebied op te lossen. De auteur behandelt ook verwante onderwerpen zoals groepentheorie, algebraïsche meetkunde en cryptografie, en geeft praktische voorbeelden om belangrijke concepten te illustreren. Dit boek is bedoeld voor ervaren lezers met voorkennis van getaltheorie en programmeren, maar het kan ook nuttig zijn voor gevorderde studenten en onderzoekers op deze gebieden.
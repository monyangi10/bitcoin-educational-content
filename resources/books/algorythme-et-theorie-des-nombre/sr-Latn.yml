title: "Algorithmes et Théorie des Nombres"
publication_year: 2014
cover: cover_fr.webp
original: true
description: |
  Knjiga "Algorithmes et Théorie des Nombres" autora Pierre Audibert je referentno delo za studente i profesionalce iz oblasti matematike i računarskih nauka. Knjiga duboko istražuje teoriju brojeva i algoritme korišćene za rešavanje složenih problema u ovoj oblasti. Autor takođe pokriva povezane teme kao što su teorija grupa, algebarska geometrija i kriptografija, i pruža praktične primere za ilustrovanje ključnih pojmova. Ova knjiga je namenjena iskusnim čitaocima koji već imaju predznanje iz teorije brojeva i programiranja, ali može biti korisna i za napredne studente i istraživače u ovim oblastima.
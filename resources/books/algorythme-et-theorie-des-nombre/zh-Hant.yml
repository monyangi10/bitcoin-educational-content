title: "Algorithmes et Théorie des Nombres"
publication_year: 2014
cover: cover_fr.webp
original: true
description: |
  Pierre Audibert 所著的《Algorithmes et Théorie des Nombres》一書是數學和電腦科學學生及專業人士的參考著作。該書深入探討了數理以及用於解決該領域複雜問題的演算法。作者還涉及群理論、代數幾何學和加密學等相關主題，並提供實例來說明主要概念。本書適合已有數理論和程式設計知識的資深讀者，但對這些領域的進階學生和研究人員也很有用。
title: "Bitcoin Programlama"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  jimmy Song tarafından yazılan "Programming Bitcoin", okuyuculara dünyanın en popüler kripto para birimi olan Bitcoin'in işleyişini derinlemesine anlamalarını sağlamak için finans, yatırım ve teknolojiyi birleştiren orta düzey bir kitaptır. Kitap, önceden programlama ve bilgisayar bilimi bilgisi olan okuyuculara yöneliktir ve Bitcoin komut dosyası oluşturma, kriptografi ve işlem doğrulama gibi konuları kapsamaktadır. Uygulamalı öğrenmeye odaklanan yazar, okuyuculara Bitcoin işlemleri için kod yazma, akıllı sözleşmeler uygulama ve kendi Bitcoin cüzdanlarını oluşturma sürecinde yol gösteriyor. Yol boyunca okuyucular, Bitcoin'e yatırım yapmanın psikolojisi ve hızla gelişen bu pazarda bilinçli kararların nasıl alınacağı hakkında bilgi edineceklerdir.
title: "प्रोग्रामिंग Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  जिमी सॉन्ग द्वारा लिखित "प्रोग्रामिंग Bitcoin" एक मध्यवर्ती स्तर की पुस्तक है जो वित्त, निवेश और प्रौद्योगिकी को जोड़ती है ताकि पाठकों को दुनिया की सबसे लोकप्रिय क्रिप्टोकरेंसी, Bitcoin के कामकाज की गहन समझ प्रदान की जा सके। यह पुस्तक उन पाठकों के लिए है जिन्हें प्रोग्रामिंग और कंप्यूटर विज्ञान का कुछ पूर्व ज्ञान है और इसमें Bitcoin स्क्रिप्टिंग, क्रिप्टोग्राफी और लेनदेन सत्यापन जैसे विषयों को शामिल किया गया है। व्यावहारिक शिक्षा पर ध्यान केंद्रित करते हुए, लेखक पाठकों को Bitcoin लेनदेन के लिए कोड लिखने, स्मार्ट अनुबंधों को लागू करने और अपने स्वयं के Bitcoin वॉलेट बनाने की प्रक्रिया से परिचित कराता है। साथ ही, पाठकों को Bitcoin में निवेश करने के मनोविज्ञान और इस तेजी से विकसित हो रहे बाजार में सूचित निर्णय लेने के तरीके के बारे में जानकारी मिलेगी।
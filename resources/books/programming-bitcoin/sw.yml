title: "Programu ya Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Programming Bitcoin" cha Jimmy Song ni kitabu cha kiwango cha kati kinachochanganya fedha, uwekezaji, na teknolojia ili kuwapa wasomaji ufahamu wa kina wa utendakazi wa kampuni maarufu zaidi ya fedha duniani, Bitcoin. Kitabu hiki kinalenga wasomaji walio na ujuzi fulani wa awali wa programu na sayansi ya kompyuta na kinashughulikia mada kama vile uandishi wa Bitcoin, cryptography na uthibitishaji wa miamala. Kwa kuzingatia kujifunza kwa vitendo, mwandishi huwatembeza wasomaji kupitia mchakato wa kuandika msimbo kwa miamala ya Bitcoin, kutekeleza mikataba mahiri, na kuunda pochi zao za Bitcoin. Kwa njia hii, wasomaji watapata maarifa kuhusu saikolojia ya kuwekeza katika Bitcoin na jinsi ya kufanya maamuzi sahihi katika soko hili linaloendelea kwa kasi.
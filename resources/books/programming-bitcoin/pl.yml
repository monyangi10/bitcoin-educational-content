title: "Programowanie Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Programowanie Bitcoin" autorstwa Jimmy'ego Songa to książka na poziomie średnio zaawansowanym, która łączy finanse, inwestowanie i technologię, aby zapewnić czytelnikom dogłębne zrozumienie działania najpopularniejszej kryptowaluty na świecie, Bitcoin. Książka jest skierowana do czytelników z pewną wcześniejszą wiedzą z zakresu programowania i informatyki i obejmuje takie tematy, jak tworzenie skryptów Bitcoin, kryptografia i weryfikacja transakcji. Skupiając się na praktycznej nauce, autor przeprowadza czytelników przez proces pisania kodu dla transakcji Bitcoin, wdrażania inteligentnych kontraktów i tworzenia własnych portfeli Bitcoin. Po drodze czytelnicy uzyskają wgląd w psychologię inwestowania w Bitcoin i jak podejmować świadome decyzje na tym szybko rozwijającym się rynku.
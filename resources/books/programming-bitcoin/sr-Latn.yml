title: "Programiranje Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Programming Bitcoin" od Jimmy Song je knjiga srednjeg nivoa koja kombinuje finansije, investiranje i tehnologiju kako bi čitaocima pružila detaljno razumevanje funkcionisanja najpopularnije svetske kriptovalute, Bitcoin. Knjiga je namenjena čitaocima sa određenim predznanjem iz programiranja i računarskih nauka i pokriva teme kao što su Bitcoin skriptovanje, kriptografija i verifikacija transakcija. Sa fokusom na praktično učenje, autor vodi čitaoce kroz proces pisanja koda za Bitcoin transakcije, implementaciju pametnih ugovora i kreiranje sopstvenih Bitcoin novčanika. Usput, čitaoci će steći uvid u psihologiju investiranja u Bitcoin i kako donositi informisane odluke na ovom brzo evoluirajućem tržištu.
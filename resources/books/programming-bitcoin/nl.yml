title: "Bitcoin programmeren"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  "Programming Bitcoin" van Jimmy Song is een boek voor gemiddeld niveau dat financiën, investeren en technologie combineert om lezers een diepgaand inzicht te geven in de werking van 's werelds populairste cryptocurrency, Bitcoin. Het boek is gericht op lezers met enige voorkennis van programmeren en computerwetenschappen. Het boek is gericht op lezers met enige voorkennis van programmeren en informatica en behandelt onderwerpen zoals Bitcoin scripting, cryptografie en transactieverificatie. Met de nadruk op praktijkgericht leren, leidt de auteur lezers door het proces van het schrijven van code voor Bitcoin transacties, het implementeren van slimme contracten en het maken van hun eigen Bitcoin wallets. Onderweg krijgen lezers inzicht in de psychologie van het investeren in Bitcoin en hoe ze weloverwogen beslissingen kunnen nemen in deze snel evoluerende markt.
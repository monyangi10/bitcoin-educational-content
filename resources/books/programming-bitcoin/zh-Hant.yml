title: 「編程 Bitcoin」
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Jimmy Song 所著的「Programming Bitcoin」是一本結合金融、投資和技術的中級書籍，讓讀者深入瞭解全球最熱門的加密貨幣 Bitcoin 的運作原理。本書的讀者對程式設計和電腦科學有一定的認識，內容涵蓋 Bitcoin 腳本、加密學和交易驗證等主題。作者著重於實踐學習，帶領讀者完成為 Bitcoin 交易編寫程式碼、執行智慧型契約，以及建立自己的 Bitcoin 荷包。一路上，讀者將深入了解 Bitcoin 的投資心理，以及如何在這個快速發展的市場中做出明智的決策。
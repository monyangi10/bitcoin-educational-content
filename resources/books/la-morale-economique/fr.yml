title: "La Morale Économique"
publication_year: 1888
cover: cover_fr.webp
original: true
description: |
  Economic Morality (1888) explores the ethical dimensions of economic freedom. Molinari argues that the market economy is not merely efficient but morally superior to alternative systems, because it rewards productive effort, punishes fraud and violence, and promotes cooperation between individuals who may have no personal connection.

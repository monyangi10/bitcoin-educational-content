title: "La Loi"
publication_year: 1850
cover: cover_fr.webp
original: false
description: |
  Written in June 1850, just months before his death, The Law is Bastiat's clearest statement of liberal political philosophy. He argues that the law exists to protect life, liberty, and property — and that when the law is used instead to plunder some citizens for the benefit of others, it becomes the very instrument of injustice it was meant to prevent.

title: "Traictié de la première invention des monnoies"
publication_year: 1360
cover: cover_fr.webp
original: true
description: |
  Written around 1360 by the Bishop of Lisieux, Nicolas Oresme's treatise on the origin of money is one of the earliest works of monetary theory in the Western tradition. Oresme argues that money belongs to the community that uses it, not to the sovereign, and that rulers who debase the currency are committing a form of theft against their subjects.

title: "Mandibles Ailesi, 2029-2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Lionel Shriver'ın yazdığı Mandibles, Bir Aile, 2029-2047, yakın gelecekte Amerika Birleşik Devletleri'nde yaşanan finansal çöküşün sonuçlarını inceleyen bir romandır. Hikaye, Amerikan ekonomisinin çöküşü nedeniyle servetlerinin çoğunu kaybeden Mandible ailesinin üyelerini takip eder. Roman, modern finansal sistemin bir eleştirisini sunuyor ve bireylerin ve ailelerin finansal güvenliklerini kaybettiklerinde karşılaştıkları zorlukları inceliyor. Ayrıca, paranın artık toplumun temeli olmadığı olası bir geleceğe bir bakış sunuyor ve böyle bir değişimin potansiyel sonuçlarını araştırıyor.
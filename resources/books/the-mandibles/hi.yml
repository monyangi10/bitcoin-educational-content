title: "द मैंडिबल्स ए फैमिली, 2029-2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  लियोनेल श्राइवर द्वारा लिखित द मैंडिबल्स, ए फैमिली, 2029-2047 एक ऐसा उपन्यास है जो निकट भविष्य में संयुक्त राज्य अमेरिका में वित्तीय पतन के परिणामों की पड़ताल करता है। कहानी मैंडिबल परिवार के सदस्यों के इर्द-गिर्द घूमती है, जिन्होंने अमेरिकी अर्थव्यवस्था के पतन के कारण अपनी अधिकांश संपत्ति खो दी है। उपन्यास आधुनिक वित्तीय प्रणाली की आलोचना करता है और उन चुनौतियों पर गहराई से चर्चा करता है जिनका सामना व्यक्ति और परिवार तब करते हैं जब वे अपनी वित्तीय सुरक्षा खो देते हैं। यह एक संभावित भविष्य की झलक भी प्रदान करता है जहाँ पैसा अब समाज का आधार नहीं रह गया है और इस तरह के बदलाव के संभावित परिणामों की पड़ताल करता है।
title: "The Mandibles A Family, 2029 -2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Lionel Shriver 所著的《The Mandibles, A Family, 2029-2047》是一部探索美國在不久的將來金融崩潰後果的小說。故事講述 Mandible 家族的成員，由於美國經濟崩潰，他們失去了大部分財富。小說批判了現代金融體系，並深入探討了個人和家庭在失去經濟保障時所面臨的挑戰。它也提供了一個可能的未來一瞥，在那裡金錢不再是社會的基礎，並探討這種轉變的潛在後果。
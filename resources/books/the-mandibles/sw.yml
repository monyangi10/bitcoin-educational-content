title: "The Mandibles A Family, 2029-2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Mandibles, A Family, 2029-2047 iliyoandikwa na Lionel Shriver ni riwaya inayochunguza matokeo ya mporomoko wa kifedha nchini Marekani katika siku za usoni. Hadithi hiyo inafuatia watu wa familia ya Mandible, ambao wamepoteza mali zao nyingi kutokana na kuporomoka kwa uchumi wa Marekani. Riwaya hii inatoa uhakiki wa mfumo wa kisasa wa kifedha na kuangazia changamoto ambazo watu binafsi na familia hukabiliana nazo wanapopoteza usalama wao wa kifedha. Pia inatoa taswira ya wakati ujao unaowezekana ambapo pesa si msingi tena wa jamii na inachunguza matokeo yanayoweza kutokea ya mabadiliko hayo.
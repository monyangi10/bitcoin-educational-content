title: "Żuchwy - rodzina, lata 2029-2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Mandibles, A Family, 2029-2047 autorstwa Lionela Shrivera to powieść, która bada konsekwencje załamania finansowego w Stanach Zjednoczonych w niedalekiej przyszłości. Historia opowiada o członkach rodziny Mandible, którzy stracili większość swojego majątku w wyniku załamania amerykańskiej gospodarki. Powieść oferuje krytykę współczesnego systemu finansowego i zagłębia się w wyzwania, przed którymi stają jednostki i rodziny, gdy tracą bezpieczeństwo finansowe. Oferuje również wgląd w możliwą przyszłość, w której pieniądze nie są już podstawą społeczeństwa i bada potencjalne konsekwencje takiej zmiany.
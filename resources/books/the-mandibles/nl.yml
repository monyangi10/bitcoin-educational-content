title: "De onderkaken Een familie, 2029-2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Mandibles, A Family, 2029-2047 van Lionel Shriver is een roman over de gevolgen van een financiële ineenstorting van de Verenigde Staten in de nabije toekomst. Het verhaal volgt de leden van de familie Mandible, die het grootste deel van hun rijkdom hebben verloren door de ineenstorting van de Amerikaanse economie. De roman geeft kritiek op het moderne financiële systeem en gaat in op de uitdagingen waarmee individuen en gezinnen worden geconfronteerd wanneer ze hun financiële zekerheid verliezen. Het biedt ook een blik in een mogelijke toekomst waarin geld niet langer de basis van de samenleving is en verkent de mogelijke gevolgen van een dergelijke verschuiving.
title: "Mandibleovi Porodica, 2029-2047"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Mandibleovi, Porodica, 2029-2047 od Lionel Shriver je roman koji istražuje posledice finansijskog kolapsa u Sjedinjenim Državama u bliskoj budućnosti. Priča prati članove porodice Mandible, koji su izgubili većinu svog bogatstva zbog kolapsa američke ekonomije. Roman nudi kritiku modernog finansijskog sistema i ulazi u izazove sa kojima se pojedinci i porodice suočavaju kada izgube svoju finansijsku sigurnost. Takođe pruža uvid u moguću budućnost u kojoj novac više nije temelj društva i istražuje potencijalne posledice takve promene.
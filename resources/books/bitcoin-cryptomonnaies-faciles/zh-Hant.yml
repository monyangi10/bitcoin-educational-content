title: 「Bitcoin與簡易加密貨幣」
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin、NFT、Blockchain、穩定幣、DeFi、以太坊......在短短十年間，加密貨幣已成為政治經濟議題。
  在短短十年間，加密貨幣已成為政治和經濟問題的
  主要問題。但是，儘管它們很受歡迎，它們的世界仍然很複雜，充滿了
  的讚美和懷疑。
  Claire Balva 和 Alexandre Stachtchenko 以簡單易懂的方式介紹 Bitcoin 和加密貨幣。在介紹完網際網路時代的貨幣與金融體系的陷阱之後，旅程就可以開始了。起源、運作、挑戰與希望...隨著各章節的展開，帶您參觀，並從一些實用的建議中汲取經驗。
  一本終於參與加密貨幣談話的必備書籍！
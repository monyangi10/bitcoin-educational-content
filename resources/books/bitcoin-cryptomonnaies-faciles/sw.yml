title: "Bitcoin & cryptocurrencies rahisi"
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin, NFT, Blockchain, stablecoins, DeFi, Ethereum... kwa moja tu
  muongo, sarafu za siri zimekuwa suala la kisiasa na kiuchumi
  mkuu. Lakini licha ya umaarufu wao, ulimwengu wao unabaki kuwa mgumu, uliowekwa alama
  ya kuinuliwa na kutilia shaka.
  Kwa ufundishaji na unyenyekevu, Claire Balva na Alexandre Stachtchenko wanatoa utangulizi unaopatikana kwa Bitcoin na crypto-sarafu. Baada ya uwasilishaji wa mitego ya mfumo wa fedha na kifedha katika umri wa mtandao, safari inaweza kuanza. Asili, operesheni, changamoto na matumaini... Tembelea sura zinavyoendelea, na uloweshe miguu yako kwa ushauri wa vitendo.
  Kitabu cha lazima ili hatimaye kushiriki katika mazungumzo ya cryptocurrency!
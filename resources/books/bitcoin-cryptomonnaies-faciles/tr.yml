title: "Bitcoin & kolay kripto para birimleri"
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin, NFT, Blockchain, stablecoinler, DeFi, Ethereum... sadece bir tanesinde
  on yıl içinde kripto para birimleri siyasi ve ekonomik bir mesele haline geldi
  büyük. Ancak popülerliklerine rağmen, dünyaları karmaşık olmaya devam ediyor
  yüceltme ve şüphecilik.
  Claire Balva ve Alexandre Stachtchenko, pedagoji ve sadelikle Bitcoin ve kripto para birimlerine erişilebilir bir giriş sunuyor. İnternet çağında parasal ve finansal sistemin tuzaklarına dair bir sunumdan sonra yolculuk başlayabilir. Kökenler, işleyiş, zorluklar ve umutlar... Bölümler ilerledikçe tura katılın ve bazı pratik tavsiyelerle ayaklarınızı ıslatın.
  Kripto para muhabbetine nihayet katılmak için sahip olunması gereken bir kitap!
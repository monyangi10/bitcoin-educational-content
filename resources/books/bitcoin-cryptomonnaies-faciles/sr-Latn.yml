title: "Bitcoin & lake kriptovalute"
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin, NFT, Blockchain, stablecoins, DeFi, Ethereum... za samo jednu deceniju, kriptovalute su postale političko i ekonomsko pitanje od velikog značaja. Ali uprkos njihovoj popularnosti, njihov svet ostaje složen, obeležen ushićenjem i skepticizmom. Sa pedagogijom i jednostavnošću, Claire Balva i Alexandre Stachtchenko nude pristupačan uvod u Bitcoin i kriptovalute. Nakon predstavljanja zamki monetarnog i finansijskog sistema u doba interneta, putovanje može početi. Poreklo, funkcionisanje, izazovi i nade... Prođite kroz sve to kako se poglavlja odvijaju i okušajte se sa nekim praktičnim savetima. Knjiga koju morate imati da biste konačno učestvovali u razgovoru o kriptovalutama!
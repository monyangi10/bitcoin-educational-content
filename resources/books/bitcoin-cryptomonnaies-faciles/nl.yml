title: "Bitcoin & gemakkelijke cryptocurrencies"
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin, NFT, Blockchain, stablecoins, DeFi, Ethereum... in slechts één
  decennium zijn cryptocurrencies een belangrijk politiek en economisch onderwerp geworden
  groot. Maar ondanks hun populariteit blijft hun wereld complex, getekend
  van verheerlijking en scepticisme.
  Met pedagogie en eenvoud bieden Claire Balva en Alexandre Stachtchenko een toegankelijke introductie tot Bitcoin en cryptocurrencies. Na een presentatie van de valkuilen van het monetaire en financiële systeem in het internettijdperk, kan de reis beginnen. Oorsprong, werking, uitdagingen en hoop... Volg de rondleiding terwijl de hoofdstukken zich ontvouwen en maak je voeten nat met praktisch advies.
  Een must-have boek om eindelijk deel te nemen aan het gesprek over cryptocurrency!
title: "Ekonomija u Jednoj Lekciji"
publication_year: 1946
cover: cover_en.webp
original: true
description: |
  Economics in One Lesson," napisao Henry Hazlitt 1946. godine, klasičan je uvodnik koji razlaže složene ekonomske pojmove na razumljive termine. Knjiga se fokusira na osnovnu lekciju da treba uzeti u obzir dugoročne posledice bilo koje ekonomske akcije, a ne samo neposredne rezultate. Hazlitt razbija uobičajene ekonomske zablude, podstičući razumevanje ekonomije slobodnog tržišta i njenih šire društvenih implikacija. Služi kao odlična početna tačka za početnike i kao referenca za iskusne pojedince u oblasti ekonomije.
title: "Tek Derste Ekonomi"
publication_year: 1946
cover: cover_en.webp
original: true
description: |
  Henry Hazlitt tarafından 1946 yılında kaleme alınan "Bir Derste Ekonomi", karmaşık ekonomik kavramları anlaşılır terimlere indirgeyen klasik bir başlangıç kitabıdır. Kitap, herhangi bir ekonomik eylemin yalnızca anlık sonuçlarının değil, uzun vadeli sonuçlarının da dikkate alınması gerektiği temel dersine odaklanmaktadır. Hazlitt, yaygın ekonomik yanılgıları ortadan kaldırarak serbest piyasa ekonomisinin ve bunun daha geniş toplumsal etkilerinin anlaşılmasını teşvik ediyor. Yeni başlayanlar için harika bir giriş noktası ve ekonomi alanında deneyimli kişiler için bir referans niteliğindedir.
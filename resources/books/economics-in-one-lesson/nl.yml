title: "Economie in één les"
publication_year: 1946
cover: cover_en.webp
original: true
description: |
  Economics in One Lesson", geschreven door Henry Hazlitt in 1946, is een klassieke inleiding die complexe economische concepten in begrijpelijke termen uitlegt. Het boek richt zich op de fundamentele les dat er rekening moet worden gehouden met de langetermijngevolgen van elke economische actie en niet alleen met de onmiddellijke resultaten. Hazlitt ontzenuwt heersende economische drogredenen en bevordert het begrip van de vrijemarkteconomie en de bredere maatschappelijke implicaties. Het dient als een goed startpunt voor beginners en als referentie voor doorgewinterde personen op het gebied van economie.
title: "एक पाठ में अर्थशास्त्र"
publication_year: 1946
cover: cover_en.webp
original: true
description: |
  1946 में हेनरी हेजलिट द्वारा लिखित "इकोनॉमिक्स इन वन लेसन" एक क्लासिक प्राइमर है जो जटिल आर्थिक अवधारणाओं को समझने योग्य शब्दों में तोड़ता है। यह पुस्तक इस बुनियादी सबक पर केंद्रित है कि किसी भी आर्थिक कार्रवाई के दीर्घकालिक परिणामों को ध्यान में रखा जाना चाहिए, न कि केवल तात्कालिक परिणामों को। हेजलिट प्रचलित आर्थिक भ्रांतियों को दूर करते हैं, मुक्त-बाज़ार अर्थशास्त्र और इसके व्यापक सामाजिक निहितार्थों की समझ को बढ़ावा देते हैं। यह शुरुआती लोगों के लिए एक बेहतरीन प्रवेश बिंदु और अर्थशास्त्र के क्षेत्र में अनुभवी व्यक्तियों के लिए एक संदर्भ के रूप में कार्य करता है।
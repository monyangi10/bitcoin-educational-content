title: "Uchumi katika somo moja"
publication_year: 1946
cover: cover_en.webp
original: true
description: |
  Economics in One Lesson," iliyoandikwa na Henry Hazlitt mwaka wa 1946, ni kitabu cha awali ambacho kinagawanya dhana changamano za kiuchumi katika maneno yanayoeleweka. Kitabu hiki kinazingatia somo la msingi ambalo matokeo ya muda mrefu ya hatua zozote za kiuchumi yanapaswa kuzingatiwa, si tu matokeo ya haraka. athari za kijamii Inatumika kama mahali pazuri pa kuingia kwa wanaoanza na marejeleo ya watu walio na uzoefu katika nyanja ya uchumi.
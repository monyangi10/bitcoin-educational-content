title: "Otpor Novac"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin je novac otpora, osnažujući svoje korisnike da se odupru autoritarcima, inflaciji, nadzoru, cenzuri i finansijskoj isključenosti. Resistance Money ispituje Bitcoin-ovu monetarnu politiku, otpornost na cenzuru, privatnost, inkluziju i upotrebu energije kako bi razvio sveobuhvatan i odmjeren slučaj da je Bitcoin neto korist za svet, uprkos svojim nesavršenostima. Bitcoin nije samo za kriminalce, špekulante ili bogate preduzetnike iz Silicijumske doline – uprkos onome što naslovi kažu. To je, umesto toga, alat za svakoga na marginama. Knjiga je rigorozna, ali pristupačna; Resistance Money je namenjen svima, od neupućenih do stručnjaka, od zagovornika do zakletog skeptika Hard, i svima između.
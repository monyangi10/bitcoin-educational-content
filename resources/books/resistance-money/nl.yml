title: "Verzetsgeld"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin is verzetsgeld, dat gebruikers in staat stelt zich te verzetten tegen autoritairen,
  inflatie, bewaking, censuur en financiële uitsluiting. Verzet Geld
  onderzoekt Bitcoin's monetaire beleid, censuur-resistentie, privacy, inclusie,
  en energiegebruik om een uitgebreid en weloverwogen argument te ontwikkelen dat Bitcoin een
  nettovoordeel is voor de wereld, ondanks haar onvolkomenheden. Bitcoin is niet alleen voor
  criminelen, speculanten of rijke ondernemers uit Silicon Valley, ondanks wat de krantenkoppen zeggen
  de krantenkoppen zeggen. Het is juist een hulpmiddel voor iedereen in de marge. Het boek is
  rigoureus maar toegankelijk; Resistance Money is bedoeld voor iedereen, van de onwetende
  tot de specialist, van de voorstander tot de die-Hard scepticus, en iedereen daartussenin
  daartussen.
title: "Resistance Money"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin jest pieniądzem oporu, umożliwiającym użytkownikom opór wobec autorytarnych rządów,
  inflacji, inwigilacji, cenzurze i wykluczeniu finansowemu. Pieniądze oporu
  analizuje politykę pieniężną Bitcoin, opór wobec cenzury, prywatność, integrację,
  i zużycie energii, aby opracować kompleksowy i zmierzony przypadek, w którym Bitcoin jest
  korzyścią netto dla świata, pomimo swoich niedoskonałości. Bitcoin nie jest tylko dla
  przestępców, spekulantów czy bogatych przedsiębiorców z Doliny Krzemowej - pomimo tego, co
  wbrew temu, co mówią nagłówki. Zamiast tego jest to narzędzie dla każdego, kto znajduje się na marginesie. Książka jest
  rygorystyczna, ale przystępna; Resistance Money jest przeznaczona dla wszystkich, od nieświadomych
  do specjalisty, od zwolennika do sceptyka die-Hard i wszystkich pomiędzy
  pomiędzy.
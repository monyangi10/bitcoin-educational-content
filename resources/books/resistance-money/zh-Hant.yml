title: 「反抗金錢」
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin 是一種抵抗性貨幣，可增強使用者抵抗專制者的能力、
  通貨膨脹、監視、審查和金融排斥。抵抗貨幣
  研究了 Bitcoin 的貨幣政策、抵制審查、隱私、包容性、
  和能源使用，從而提出一個全面且經測量的案例，證明 Bitcoin 是
  儘管有不完美的地方，但對世界而言是淨利益。Bitcoin 不只是為了
  罪犯、投機者或富有的矽谷企業家 - 儘管頭條新聞是這樣說的。
  頭條新聞是怎麼說的。相反，它是任何邊緣人士的工具。這本書
  這本書雖然嚴謹，但卻通俗易懂。
  到專家，從支持者到對 Hard 持懷疑態度的人，以及介於兩者之間的所有人。
  之間的所有人。
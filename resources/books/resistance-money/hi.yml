title: "प्रतिरोध धन"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin प्रतिरोध मुद्रा है, जो अपने उपयोगकर्ताओं को सत्तावादियों, मुद्रास्फीति, निगरानी, ​​सेंसरशिप और वित्तीय बहिष्कार का विरोध करने के लिए सशक्त बनाती है। प्रतिरोध मुद्रा Bitcoin की मौद्रिक नीति, सेंसरशिप-प्रतिरोध, गोपनीयता, समावेशन और ऊर्जा उपयोग की जांच करती है ताकि एक व्यापक और मापा मामला विकसित किया जा सके कि Bitcoin अपनी खामियों के बावजूद दुनिया के लिए एक शुद्ध लाभ है। Bitcoin केवल अपराधियों, सट्टेबाजों या धनी सिलिकॉन वैली उद्यमियों के लिए नहीं है - चाहे सुर्खियाँ कुछ भी कहें। इसके बजाय, यह हाशिये पर रहने वाले किसी भी व्यक्ति के लिए एक उपकरण है। पुस्तक कठोर लेकिन सुलभ है; प्रतिरोध मुद्रा सभी के लिए है, अज्ञानी से लेकर विशेषज्ञ तक, समर्थक से लेकर Hard संशयवादी तक और बीच के सभी लोगों के लिए।
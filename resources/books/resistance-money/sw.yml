title: "Pesa ya upinzani"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin ni pesa ya upinzani, inayowawezesha watumiaji wake kupinga watawala,
  mfumuko wa bei, ufuatiliaji, udhibiti, na kutengwa kwa kifedha. Pesa ya Upinzani
  inachunguza sera ya fedha ya Bitcoin, upinzani wa udhibiti, faragha, ushirikishwaji,
  na matumizi ya nishati ili kuunda kesi ya kina na iliyopimwa ambayo Bitcoin ni
  faida halisi kwa ulimwengu, licha ya kutokamilika kwake. Bitcoin sio tu ya
  wahalifu, walanguzi, au wafanyabiashara matajiri wa Silicon Valley - licha ya nini
  vichwa vya habari vinasema. Badala yake, ni chombo cha mtu yeyote aliye pembezoni. Kitabu ni
  ukali lakini kupatikana; Pesa ya Upinzani imekusudiwa kwa wote, kutoka kwa wasiojua
  kwa mtaalamu, kutoka kwa mtetezi hadi kufa-Hard mwenye shaka, na kila mtu ndani
  kati.
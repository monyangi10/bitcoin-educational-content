title: "Direniş Parası"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin direniş parasıdır ve kullanıcılarını otoriterlere karşı direnmeleri için güçlendirir,
  enflasyon, gözetim, sansür ve finansal dışlanma. Direniş Parası
  gW-0'ın para politikası, sansür-direnç, mahremiyet, kapsayıcılık konularını inceliyor,
  ve enerji kullanımına ilişkin kapsamlı ve ölçülü bir vaka geliştirmek için Bitcoin'ın bir
  kusurlarına rağmen dünyaya net fayda sağlıyor. Bitcoin sadece
  suçlular, spekülatörler veya zengin Silikon Vadisi girişimcileri - ne olursa olsun
  başlıklar öyle diyor. Bunun yerine, kenarda kalmış herkes için bir araçtır. Bu kitap
  titiz ama erişilebilir; Direniş Parası, bilgi sahibi olmayanlardan herkes için tasarlanmıştır
  uzmanına, savunucusundan Hard şüphecisine kadar herkes
  arasında.
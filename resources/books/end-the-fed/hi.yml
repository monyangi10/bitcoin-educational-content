title: "फेड का अंत करो"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  "एंड द फेड" में रॉन पॉल ने फेडरल रिजर्व की भूमिका को चुनौती दी है और तर्क दिया है कि यह भ्रष्ट और असंवैधानिक दोनों है। अमेरिकी इतिहास, अर्थशास्त्र और अपने स्वयं के राजनीतिक अनुभवों का हवाला देते हुए, पॉल का तर्क है कि फेड की मुद्रास्फीति संबंधी प्रथाएँ अर्थव्यवस्था के लिए एक महत्वपूर्ण खतरा हैं, जो संभावित रूप से मुद्रास्फीति संबंधी अवसाद की ओर ले जाती हैं। लोकप्रिय धारणा के विपरीत, पॉल का दावा है कि फेड लोगों के हितों के खिलाफ काम करता है। नागरिकों और अधिकारियों से समान रूप से अपील करते हुए, वह इस बारे में अंतर्दृष्टि प्रदान करते हैं कि देश कहाँ गलत हो गया और भविष्य की पीढ़ियों के लाभ के लिए अमेरिका की आर्थिक नीति को ठीक करने के लिए समाधान प्रस्तावित करते हैं।
title: "Maliza Fed"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  Katika "Maliza Ulisho," Ron Paul anapinga jukumu la Hifadhi ya Shirikisho na anasema kuwa ni fisadi na ni kinyume cha katiba. Akitumia historia ya Marekani, uchumi, na uzoefu wake mwenyewe wa kisiasa, Paul anasisitiza kuwa mazoea ya mfumuko wa bei ya Fed yanatishia uchumi, na uwezekano wa kusababisha unyogovu wa mfumuko wa bei. Kinyume na imani maarufu, Paulo anadai kwamba Fed inafanya kazi kinyume na maslahi ya watu. Akiwavutia haraka raia na maafisa sawa, anatoa ufahamu wa mahali ambapo nchi ilikosea na kupendekeza masuluhisho ya kurekebisha sera ya kiuchumi ya Amerika kwa manufaa ya vizazi vijavyo.
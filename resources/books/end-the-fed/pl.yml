title: "End the Fed"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  W książce "End the Fed" Ron Paul kwestionuje rolę Rezerwy Federalnej i argumentuje, że jest ona zarówno skorumpowana, jak i niezgodna z konstytucją. Opierając się na amerykańskiej historii, ekonomii i własnych doświadczeniach politycznych, Paul twierdzi, że inflacyjne praktyki Fed stanowią poważne zagrożenie dla gospodarki, potencjalnie prowadząc do inflacyjnej depresji. Wbrew powszechnemu przekonaniu Paul twierdzi, że Fed działa wbrew interesom ludzi. Paul apeluje zarówno do obywateli, jak i urzędników, oferując wgląd w to, gdzie kraj popełnił błąd i proponuje rozwiązania mające na celu naprawienie amerykańskiej polityki gospodarczej z korzyścią dla przyszłych pokoleń.
title: "Maak een einde aan de Fed"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  In "End the Fed" stelt Ron Paul de rol van de Federal Reserve ter discussie en betoogt dat deze zowel corrupt als ongrondwettelijk is. Puttend uit de Amerikaanse geschiedenis, economie en zijn eigen politieke ervaringen, stelt Paul dat de inflatoire praktijken van de Fed een significante bedreiging vormen voor de economie en mogelijk leiden tot een inflatoire depressie. In tegenstelling tot wat veel mensen denken, beweert Paul dat de Fed tegen de belangen van het volk in werkt. Hij doet een dringend beroep op zowel burgers als ambtenaren en biedt inzicht in waar het land de fout in is gegaan en stelt oplossingen voor om het economische beleid van Amerika te repareren ten gunste van toekomstige generaties.
title: "Fed'e Son Verin"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  Ron Paul "Fed'e Son Verin" adlı kitabında Federal Rezerv'in rolüne meydan okuyor ve hem yozlaşmış hem de anayasaya aykırı olduğunu savunuyor. Amerikan tarihi, ekonomi ve kendi siyasi deneyimlerinden yola çıkan Paul, Fed'in enflasyonist uygulamalarının ekonomi için önemli bir tehdit oluşturduğunu ve potansiyel olarak enflasyonist bir depresyona yol açtığını iddia ediyor. Paul, yaygın inanışın aksine, Fed'in halkın çıkarlarına karşı çalıştığını ileri sürmektedir. Hem vatandaşlara hem de yetkililere acilen hitap eden Paul, ülkenin nerede yanlış yaptığına dair içgörüler sunuyor ve gelecek nesillerin yararı için Amerika'nın ekonomi politikasını düzeltecek çözümler öneriyor.
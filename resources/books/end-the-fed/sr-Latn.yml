title: "Završi Fed"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  U "End the Fed," Ron Paul osporava ulogu Federalnih rezervi i tvrdi da su one i korumpirane i neustavne. Oslanjajući se na američku istoriju, ekonomiju i sopstvena politička iskustva, Paul tvrdi da inflatorne prakse Fed-a predstavljaju značajnu pretnju ekonomiji, potencijalno vodeći ka inflatornoj depresiji. Suprotno popularnom verovanju, Paul tvrdi da Fed radi protiv interesa naroda. Hitno apeluje na građane i zvaničnike, nudeći uvide u to gde je zemlja pogrešila i predlaže rešenja za ispravljanje ekonomske politike Amerike u korist budućih generacija.
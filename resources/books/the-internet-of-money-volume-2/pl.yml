description: |
  The Internet of Money (Volume 2) autorstwa Andreasa Antonopoulosa to książka dla początkujących, która bada skrzyżowanie Bitcoin, finansów i gospodarki. Opublikowana w 2017 roku książka jest częścią serii, w której Antonopoulos zagłębia się w różne aspekty Bitcoin i jego wpływu na społeczeństwo.
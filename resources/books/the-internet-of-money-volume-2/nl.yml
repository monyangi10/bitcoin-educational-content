description: |
  The Internet of Money (Volume 2) van Andreas Antonopoulos is een boek voor beginners dat het snijvlak van Bitcoin, financiën en de economie verkent. Dit boek is gepubliceerd in 2017 en maakt deel uit van een serie waarin Antonopoulos ingaat op verschillende aspecten van Bitcoin en de impact ervan op de maatschappij.
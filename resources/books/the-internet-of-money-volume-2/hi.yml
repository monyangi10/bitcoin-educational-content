title: "पैसे का इंटरनेट (खंड 2)"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  एंड्रियास एंटोनोपोलोस द्वारा लिखित द इंटरनेट ऑफ मनी (वॉल्यूम 2) एक शुरुआती स्तर की किताब है जो Bitcoin, वित्त और अर्थव्यवस्था के प्रतिच्छेदन की खोज करती है। 2017 में प्रकाशित, यह पुस्तक एक श्रृंखला का हिस्सा है जिसमें एंटोनोपोलोस Bitcoin के विभिन्न पहलुओं और समाज पर इसके प्रभाव पर गहराई से चर्चा करते हैं।
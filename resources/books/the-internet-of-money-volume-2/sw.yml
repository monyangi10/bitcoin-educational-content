title: "Mtandao wa Pesa (Volume 2)"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Mtandao wa Pesa (Juzuu la 2) cha Andreas Antonopoulos ni kitabu cha kiwango cha wanaoanza ambacho huchunguza makutano ya Bitcoin, fedha na uchumi. Kitabu hiki kilichochapishwa mwaka wa 2017, ni sehemu ya mfululizo ambapo Antonopoulos anaangazia vipengele mbalimbali vya Bitcoin na athari zake kwa jamii.
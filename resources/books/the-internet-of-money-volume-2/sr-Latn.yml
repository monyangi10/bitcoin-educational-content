description: |
  Internet novca (Svezak 2) od Andreasa Antonopoulosa je knjiga za početnike koja istražuje presek Bitcoin, finansija i ekonomije. Objavljena 2017. godine, ova knjiga je deo serije u kojoj Antonopoulos ulazi u različite aspekte Bitcoin i njegov uticaj na društvo.
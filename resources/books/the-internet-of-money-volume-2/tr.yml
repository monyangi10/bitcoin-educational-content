  Andreas Antonopoulos tarafından yazılan Paranın İnterneti (Cilt 2), KİS-0, finans ve ekonominin kesişimini araştıran başlangıç düzeyinde bir kitaptır. 2017 yılında yayınlanan bu kitap, Antonopoulos'un KİS-0'ın çeşitli yönlerini ve toplum üzerindeki etkisini incelediği bir serinin parçasıdır.
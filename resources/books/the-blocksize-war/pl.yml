title: "Wojna bloków"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Blocksize War autorstwa Jonathana Biera to książka o technicznych i politycznych wyzwaniach, które pojawiły się podczas debaty na temat skalowania Bitcoin. Książka obejmuje wydarzenia, które doprowadziły do debaty, różne propozycje skalowania Bitcoin oraz debaty i dyskusje, które miały miejsce w społeczności. Zapewnia również dogłębną analizę technicznych aspektów debaty i potencjalnych implikacji każdej propozycji. Książka jest obowiązkową lekturą dla każdego, kto jest zainteresowany zrozumieniem technicznych i politycznych aspektów debaty na temat skalowania i przyszłości Bitcoin.
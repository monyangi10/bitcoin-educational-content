title: "Rat velikih blokova"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  "The Blocksize War" od Jonathana Biera je knjiga o tehničkim i političkim izazovima koji su se pojavili tokom debate o skaliranju Bitcoin. Knjiga pokriva događaje koji su doveli do debate, različite predloge za skaliranje Bitcoin, kao i debate i diskusije koje su se odvijale unutar zajednice. Takođe pruža detaljnu analizu tehničkih aspekata debate i potencijalnih implikacija svakog predloga. Knjiga je obavezno štivo za svakoga ko je zainteresovan za razumevanje tehničkih i političkih aspekata debate o skaliranju i budućnosti Bitcoin.
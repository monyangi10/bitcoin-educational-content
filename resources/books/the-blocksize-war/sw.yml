title: "Vita vya Blocksize"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Blocksize War na Jonathan Bier ni kitabu kuhusu changamoto za kiufundi na kisiasa ambazo ziliibuka wakati wa mjadala wa kuongeza Bitcoin. Kitabu kinashughulikia matukio ambayo yalisababisha mjadala, mapendekezo tofauti ya kupima Bitcoin, na mijadala na mijadala iliyofanyika ndani ya jumuiya. Pia hutoa uchambuzi wa kina wa vipengele vya kiufundi vya mjadala na athari zinazowezekana za kila pendekezo. Kitabu hiki ni lazima kusomwa kwa yeyote anayetaka kuelewa vipengele vya kiufundi na kisiasa vya mjadala wa kuongeza viwango na mustakabali wa Bitcoin.
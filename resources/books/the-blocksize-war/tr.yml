title: "Blok Boyut Savaşı"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Jonathan Bier tarafından yazılan The Blocksize War, Bitcoin'ın ölçeklendirilmesi tartışmaları sırasında ortaya çıkan teknik ve politik zorlukları anlatan bir kitaptır. Kitap, tartışmaya yol açan olayları, Bitcoin'ı ölçeklendirmek için farklı önerileri ve topluluk içinde gerçekleşen tartışmaları ve tartışmaları kapsamaktadır. Ayrıca, tartışmanın teknik yönlerinin ve her bir önerinin potansiyel sonuçlarının derinlemesine bir analizini de sunmaktadır. Kitap, ölçeklendirme tartışmasının teknik ve politik yönlerini ve Bitcoin'ın geleceğini anlamak isteyen herkes için mutlaka okunması gereken bir eserdir.
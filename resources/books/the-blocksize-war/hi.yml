title: "ब्लॉकसाइज़ युद्ध"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  जोनाथन बियर द्वारा लिखित द ब्लॉकसाइज़ वॉर, Bitcoin की स्केलिंग बहस के दौरान उभरी तकनीकी और राजनीतिक चुनौतियों के बारे में एक किताब है। यह किताब उन घटनाओं को कवर करती है, जिनके कारण बहस हुई, Bitcoin को स्केल करने के विभिन्न प्रस्ताव और समुदाय के भीतर हुई बहस और चर्चाएँ। यह बहस के तकनीकी पहलुओं और प्रत्येक प्रस्ताव के संभावित निहितार्थों का गहन विश्लेषण भी प्रदान करता है। स्केलिंग बहस के तकनीकी और राजनीतिक पहलुओं और Bitcoin के भविष्य को समझने में रुचि रखने वाले किसी भी व्यक्ति के लिए यह किताब अवश्य पढ़नी चाहिए।
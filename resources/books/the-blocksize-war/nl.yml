title: "De blokmaatoorlog"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Blocksize War van Jonathan Bier is een boek over de technische en politieke uitdagingen die naar voren kwamen tijdens het schaaldebat van Bitcoin. Het boek behandelt de gebeurtenissen die leidden tot het debat, de verschillende voorstellen om Bitcoin te schalen en de debatten en discussies die plaatsvonden binnen de gemeenschap. Het biedt ook een diepgaande analyse van de technische aspecten van het debat en de mogelijke implicaties van elk voorstel. Het boek is een must voor iedereen die geïnteresseerd is in het begrijpen van de technische en politieke aspecten van het schaaldebat en de toekomst van Bitcoin.
title: "Kriptosovereignty: Bitcoin'ın Şifrelenmiş Siyasi Felsefesi"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Erik Cason'un bu başyapıtı, felsefi idealleri zekice ortaya koyuyor ve
  gW-1, egemenlik ve kriptografinin 21. yüzyıldaki kesişim noktaları. Bu
  sonuç paradan daha fazlasıdır. Bu, yaratılan gerçek kişisel güçle ilgili
  kriptografinin egemenliği ve gerçekten bağımsız bir para sistemi aracılığıyla.
  
  Erik Cason ilk olarak 2012 yılında Bitcoin ile uğraşmaya başladı ve 2013 yılında Bitcoin'in mümkün olduğunca çok insanın eline geçmesine yardımcı olmak için Coinbase'e katıldı. 2017'de Coinbase'den ayrıldıktan sonra, Bitcoin'in sosyal, politik ve felsefi yönleri üzerine denemeler yazmaya odaklandı. Bugün bir Bitcoin eğitmeni olarak çalışmakta ve Bitcoin'e ve dünyayı nasıl dönüştüreceğine dair felsefi yaklaşımını geliştirmeye devam etmektedir.
title: "加密主權：Bitcoin的加密政治哲學"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Erik Cason 的傑作精闢地闡述了 21 世紀的哲學理想和
  在 21 世紀，Bitcoin、主權和密碼學的交叉點。結果
  結果不只是關於錢。這是關於真正的個人權力
  透過加密主權和真正獨立的貨幣系統所創造的真正個人權力。
  
  Erik Cason 於 2012 年首次開始涉足 Bitcoin，並於 2013 年加入 Coinbase，以協助讓 Bitcoin 盡可能落入更多人手中。2017 年離開 Coinbase 後，他專注於撰寫關於 Bitcoin 的社會、政治和哲學方面的文章。如今，他擔任 Bitcoin 教育工作者，繼續發展他對 Bitcoin 的哲學方法，以及 Bitcoin 將如何改變世界。
title: "Cryptosoevereiniteit: De versleutelde politieke filosofie van Bitcoin"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Het meesterwerk van Erik Cason ontrafelt op briljante wijze de filosofische idealen en
  kruispunten van Bitcoin, soevereiniteit en cryptografie in de 21e eeuw. De
  resultaat gaat over meer dan alleen geld. Het gaat over de echte persoonlijke macht die gecreëerd wordt
  door de soevereiniteit van cryptografie en een echt onafhankelijk monetair systeem.
  
  Erik Cason begon in 2012 voor het eerst te experimenteren met Bitcoin, en in 2013 sloot hij zich aan bij Coinbase om te helpen Bitcoin in handen van zoveel mogelijk mensen te krijgen. Nadat hij Coinbase in 2017 verliet, richtte hij zich op het schrijven van essays over de sociale, politieke en filosofische aspecten van Bitcoin. Tegenwoordig werkt hij als Bitcoin opvoeder en blijft hij zijn filosofische benadering van Bitcoin ontwikkelen en hoe het de wereld zal transformeren.
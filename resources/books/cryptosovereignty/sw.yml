title: "Cryptosovereignty: Falsafa Iliyosimbwa ya Kisiasa ya Bitcoin"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Kazi kuu ya Erik Cason inafunua kwa ustadi maadili ya kifalsafa na
  makutano ya Bitcoin, uhuru, na cryptography katika karne ya 21. The
  matokeo ni zaidi ya pesa tu. Ni juu ya nguvu halisi ya kibinafsi iliyoundwa
  kupitia uhuru wa kriptografia na mfumo huru wa kifedha.
  
  Erik Cason alianza kucheza Bitcoin kwa mara ya kwanza mnamo 2012, na mnamo 2013 alijiunga na Coinbase kusaidia kupata Bitcoin mikononi mwa watu wengi iwezekanavyo. Baada ya kuondoka Coinbase katika 2017, alizingatia kuandika insha juu ya masuala ya kijamii, kisiasa, na falsafa ya Bitcoin. Leo anafanya kazi kama mwalimu wa Bitcoin akiendelea kukuza mbinu yake ya kifalsafa kwa Bitcoin na jinsi itabadilisha ulimwengu.
title: "Kriptosuverenitet: Šifrovana politička filozofija Bitcoin"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Majstorsko delo Erika Casona briljantno razlaže filozofske ideale i
  preseke Bitcoin, suvereniteta i kriptografije u 21. veku. Rezultat je više od samog novca. Radi se o stvarnoj ličnoj moći stvorenoj
  kroz suverenitet kriptografije i zaista nezavisni monetarni sistem.
  
  Erik Cason je prvi put počeo da se bavi Bitcoin 2012. godine, a 2013. pridružio se Coinbase-u kako bi pomogao da Bitcoin dođe u ruke što većem broju ljudi. Nakon što je napustio Coinbase 2017. godine, fokusirao se na pisanje eseja o društvenim, političkim i filozofskim aspektima Bitcoin. Danas radi kao edukator za Bitcoin, nastavljajući da razvija svoj filozofski pristup Bitcoin i kako će on transformisati svet.
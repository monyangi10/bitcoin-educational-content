title: "क्रिप्टोसॉवरेन्टी: Bitcoin का एन्क्रिप्टेड राजनीतिक दर्शन"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  एरिक कैसन की उत्कृष्ट कृति 21वीं सदी में Bitcoin, संप्रभुता और क्रिप्टोग्राफी के दार्शनिक आदर्शों और अंतर्संबंधों को शानदार ढंग से उजागर करती है। इसका परिणाम सिर्फ़ पैसे से कहीं ज़्यादा है। यह क्रिप्टोग्राफी की संप्रभुता और वास्तव में स्वतंत्र मौद्रिक प्रणाली के ज़रिए बनाई गई वास्तविक व्यक्तिगत शक्ति के बारे में है। एरिक कैसन ने सबसे पहले 2012 में Bitcoin में हाथ आजमाना शुरू किया और 2013 में वे Bitcoin को ज़्यादा से ज़्यादा लोगों तक पहुँचाने में मदद करने के लिए Coinbase में शामिल हो गए। 2017 में Coinbase छोड़ने के बाद, उन्होंने Bitcoin के सामाजिक, राजनीतिक और दार्शनिक पहलुओं पर निबंध लिखने पर ध्यान केंद्रित किया। आज वे Bitcoin शिक्षक के रूप में काम करते हैं और Bitcoin के प्रति अपने दार्शनिक दृष्टिकोण को विकसित करना जारी रखते हैं और यह कैसे दुनिया को बदल देगा।
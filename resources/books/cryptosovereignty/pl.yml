title: "Kryptowaluty: Zaszyfrowana filozofia polityczna Bitcoin"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Arcydzieło Erika Casona błyskotliwie rozpracowuje filozoficzne ideały i przecięcia
  gW-1, suwerenności i kryptografii w XXI wieku. Rezultat
  chodzi o coś więcej niż tylko pieniądze. Chodzi o prawdziwą osobistą moc stworzoną
  dzięki suwerenności kryptografii i prawdziwie niezależnemu systemowi monetarnemu.
  
  Erik Cason po raz pierwszy zaczął zajmować się Bitcoin w 2012 r., a w 2013 r. dołączył do Coinbase, aby pomóc zdobyć Bitcoin w rękach jak największej liczby osób. Po odejściu z Coinbase w 2017 r. skupił się na pisaniu esejów na temat społecznych, politycznych i filozoficznych aspektów Bitcoin. Obecnie pracuje jako edukator Bitcoin, nadal rozwijając swoje filozoficzne podejście do Bitcoin i tego, jak zmieni on świat.
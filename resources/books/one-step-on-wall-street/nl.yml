title: "Een stap op Wall Street"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  "One Up On Wall Street" is een boek van Peter Lynch dat uitlegt hoe gemiddelde beleggers succes kunnen behalen op de aandelenmarkt. De auteur deelt zijn persoonlijke ervaring en beleggingsfilosofie en benadrukt het belang van grondig onderzoek, geduldig blijven en een langetermijnperspectief hebben. Het boek behandelt ook Lynch' strategieën voor het identificeren van veelbelovende bedrijven en het vermijden van veelvoorkomende valkuilen, evenals tips voor het opbouwen van een gediversifieerde portefeuille. Over het geheel genomen is "One Up On Wall Street" een praktische gids voor beleggen waar zowel beginnende als ervaren beleggers hun voordeel mee kunnen doen.
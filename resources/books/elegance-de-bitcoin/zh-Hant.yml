  傳統的銀行系統。
  自 Satoshi Nakamoto 於 2008 年提出這個神秘的概念以來，Bitcoin 如日中天的成長勢頭給人們留下了深刻的印象。它釋放了各種各樣的熱情，從推崇者的無限熱情到貶抑者的表皮排斥。
  沉浸在這本引人入勝的書中，作者對 Bitcoin 提出了現實而務實的看法。您將發現其神奇的歷史，以及確保其在敵對環境中生存的經濟、意識形態和技術原則。
  您將會對 Bitcoin 有更深入的了解，進而改變您對世界的看法。
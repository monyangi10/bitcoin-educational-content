title: "De elegantie van Bitcoin: geschiedenis, problemen en principes"
publication_year: 2024
cover: cover_fr.webp
original: true
description: |
  Bitcoin is een innovatief model van gedecentraliseerde digitale valuta, waarvan het bestaan
  de gevestigde orde opschudt door een alternatief voor te stellen
  voor het traditionele banksysteem.
  Sinds de raadselachtige conceptie door Satoshi Nakamoto in 2008 heeft de razendsnelle groei van Bitcoin een blijvende indruk achtergelaten. Het heeft alle soorten passie losgemaakt, van het ongebreidelde enthousiasme van zijn promotors tot de epidermale afwijzing van zijn tegenstanders.
  Dompel jezelf onder in dit boeiende boek, waarin de auteur een realistische en pragmatische kijk op Bitcoin biedt. Je zult de fantastische geschiedenis ontdekken, evenals de economische, ideologische en technische principes die ervoor zorgden dat het kon overleven in een vijandige omgeving.
  Je zult Bitcoin begrijpen en je kijk op de wereld erdoor veranderen.
title: "Knjiga Satoshi"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Knjiga Satoshi autora Phil Champagne je zbirka ključnih spisa i prepiski Satoshi Nakamota, tvorca Bitcoin. Ona nudi intiman pogled na motive i filozofiju iza stvaranja i razvoja Bitcoin, kao i uvide u tehnologiju i njen potencijalni uticaj na svet. Kroz knjigu, čitaoci mogu steći dublje razumevanje istorije i principa Bitcoin, kao i njegovog potencijala da transformiše naš trenutni finansijski sistem. To je obavezno štivo za svakoga ko je zainteresovan za kriptovalute, Blockchain tehnologiju i budućnost finansija.
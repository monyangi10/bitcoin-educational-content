title: "Satoshi Kitabı"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Phil Champagne tarafından yazılan Satoshi Kitabı, Bitcoin'nin yaratıcısı Satoshi Nakamoto'nun önemli yazılarının ve yazışmalarının bir derlemesidir. Kitap, Bitcoin'nin yaratılması ve geliştirilmesinin ardındaki motivasyon ve felsefenin yanı sıra teknolojiye ve dünya üzerindeki potansiyel etkisine dair içgörülere samimi bir bakış sunmaktadır. Kitap sayesinde okuyucular, Bitcoin'nin tarihi ve ilkelerinin yanı sıra mevcut finansal sistemimizi dönüştürme potansiyeli hakkında daha derin bir anlayış kazanabilirler. Kripto para, Blockchain teknolojisi ve finansın geleceği ile ilgilenen herkesin okuması gereken bir kitap.
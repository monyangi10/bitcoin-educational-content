title: "Księga Satoshi"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  The Book of Satoshi autorstwa Phila Champagne'a to zbiór kluczowych pism i korespondencji Satoshi Nakamoto, twórcy Bitcoin. Oferuje ona intymne spojrzenie na motywacje i filozofię stojącą za stworzeniem i rozwojem Bitcoin, a także wgląd w technologię i jej potencjalny wpływ na świat. Dzięki tej książce czytelnicy mogą lepiej zrozumieć historię i zasady Bitcoin, a także jego potencjał do przekształcenia naszego obecnego systemu finansowego. Jest to obowiązkowa lektura dla każdego zainteresowanego kryptowalutą, technologią Blockchain i przyszłością finansów.
title: "जी.डब्लू.-0 की पुस्तक"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  फिल शैम्पेन द्वारा लिखित द बुक ऑफ जीडब्ल्यू-3, जीडब्ल्यू-2 के निर्माता जीडब्ल्यू-3 नाकामोटो द्वारा लिखे गए महत्वपूर्ण लेखों और पत्राचारों का संग्रह है। यह जीडब्ल्यू-2 के निर्माण और विकास के पीछे की प्रेरणाओं और दर्शन के साथ-साथ तकनीक और दुनिया पर इसके संभावित प्रभाव के बारे में जानकारी प्रदान करता है। पुस्तक के माध्यम से, पाठक जीडब्ल्यू-2 के इतिहास और सिद्धांतों के साथ-साथ हमारी वर्तमान वित्तीय प्रणाली को बदलने की इसकी क्षमता के बारे में गहरी समझ प्राप्त कर सकते हैं। यह क्रिप्टोक्यूरेंसी, जीडब्ल्यू-1 तकनीक और वित्त के भविष्य में रुचि रखने वाले किसी भी व्यक्ति के लिए अवश्य पढ़ी जाने वाली पुस्तक है।
title: "Het boek van Satoshi"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  The Book of Satoshi door Phil Champagne is een verzameling van belangrijke geschriften en correspondenties van Satoshi Nakamoto, de schepper van Bitcoin. Het biedt een intieme kijk op de motivaties en filosofie achter de creatie en ontwikkeling van Bitcoin, evenals inzichten in de technologie en de potentiële impact ervan op de wereld. Door het boek kunnen lezers een dieper inzicht krijgen in de geschiedenis en de principes van Bitcoin, maar ook in de potentie ervan om ons huidige financiële systeem te transformeren. Het is een must voor iedereen die geïnteresseerd is in cryptocurrency, Blockchain technologie en de toekomst van financiën.
title: 「Satoshi之書」
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Phil Champagne 所著的 The Book of Satoshi 是 Bitcoin 的創造者 Satoshi Nakamoto 的重要著作和通信集。書中深入探討了 Bitcoin 創造和發展背後的動機和哲學，以及對該技術及其對世界潛在影響的洞察。通過這本書，讀者可以更深入地瞭解 Bitcoin 的歷史和原理，以及它改變我們當前金融體系的潛力。對於任何對加密貨幣、Blockchain 技術以及金融未來感興趣的人來說，這是一本必讀書籍。
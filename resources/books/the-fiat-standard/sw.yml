title: "Fiat Standard"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Fiat Standard cha Saifedean Ammous ni kitabu cha kiwango cha kati ambacho huchunguza uchumi na athari za sarafu ya fiat. Ammous huchunguza historia, utendakazi na vikwazo vya mifumo ya sarafu ya fiat ambayo haiungwi mkono na mali inayoonekana kama dhahabu. Anachunguza matokeo ya kiuchumi ya mifumo hiyo na kutoa uchambuzi muhimu wa athari zake kwa utajiri, mfumuko wa bei, na utulivu wa kifedha. Kwa kutumia kanuni za kiuchumi na mifano ya kihistoria, kitabu hiki kinapinga mawazo yaliyopo kuhusu sarafu ya fiat na kinatoa maarifa kuhusu manufaa yanayoweza kupatikana ya mifumo mbadala ya fedha. Inapendekezwa kwa wasomaji wanaopenda kuelewa ugumu wa sarafu ya fiat na athari zake kwa uchumi, "The Fiat Standard" inatoa uchunguzi unaochochea fikira wa mada hii muhimu.
title: "De Fiat-standaard"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  The Fiat Standard van Saifedean Ammous is een boek voor gemiddeld niveau dat ingaat op de economie en implicaties van fiatvaluta. Ammous onderzoekt de geschiedenis, werking en nadelen van fiatvalutasystemen die niet worden ondersteund door tastbare activa zoals goud. Hij gaat in op de economische gevolgen van dergelijke systemen en geeft een kritische analyse van hun invloed op rijkdom, inflatie en financiële stabiliteit. Op basis van economische principes en historische voorbeelden daagt het boek de heersende opvattingen over fiatvaluta uit en biedt het inzicht in de potentiële voordelen van alternatieve monetaire systemen. Aanbevolen voor lezers die geïnteresseerd zijn in het begrijpen van de complexiteit van fiatvaluta en de invloed ervan op de economie, biedt "The Fiat Standard" een tot nadenken stemmende verkenning van dit belangrijke onderwerp.
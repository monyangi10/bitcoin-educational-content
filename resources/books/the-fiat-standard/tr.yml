title: "Fiat Standardı"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Saifedean Ammous tarafından yazılan Fiat Standardı, itibari para biriminin ekonomisini ve etkilerini inceleyen orta düzey bir kitaptır. Ammous, altın gibi somut bir varlıkla desteklenmeyen itibari para sistemlerinin tarihini, işleyişini ve sakıncalarını araştırıyor. Bu tür sistemlerin ekonomik sonuçlarını inceliyor ve servet, enflasyon ve finansal istikrar üzerindeki etkilerinin eleştirel bir analizini sunuyor. Ekonomik ilkeler ve tarihsel örneklerden yola çıkan kitap, itibari para birimini çevreleyen hakim kavramlara meydan okuyor ve alternatif para sistemlerinin potansiyel faydalarına dair içgörüler sunuyor. İtibari para biriminin karmaşıklığını ve ekonomi üzerindeki etkisini anlamak isteyen okuyuculara tavsiye edilen "Fiat Standardı", bu önemli konunun düşündürücü bir incelemesini sunuyor.
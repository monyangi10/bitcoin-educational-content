title: 「菲亞特標準」
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Saifedean Ammous 所著的《The Fiat Standard》是一本深入探討法定貨幣的經濟學和影響的中級書籍。Ammous 探討了沒有黃金等有形資產支持的法定貨幣系統的歷史、運作和弊端。他深入探討了這種系統的經濟後果，並對其對財富、通貨膨脹和金融穩定的影響進行了批判性分析。本書以經濟原理和歷史範例為基礎，挑戰了圍繞法定貨幣的普遍觀念，並就替代貨幣體系的潛在優勢提供了真知灼見。推薦給有興趣了解法定貨幣的複雜性及其對經濟影響的讀者，《法定貨幣標準》對這一重要課題進行了發人深省的探討。
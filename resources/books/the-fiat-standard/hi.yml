title: "फिएट स्टैंडर्ड"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  सैफेडियन अम्मोस द्वारा लिखित द फिएट स्टैंडर्ड एक मध्यवर्ती स्तर की पुस्तक है जो फिएट मुद्रा के अर्थशास्त्र और निहितार्थों पर गहराई से चर्चा करती है। अम्मोस ने फिएट मुद्रा प्रणालियों के इतिहास, कार्यप्रणाली और कमियों का पता लगाया है जो सोने जैसी मूर्त संपत्ति द्वारा समर्थित नहीं हैं। वह ऐसी प्रणालियों के आर्थिक परिणामों पर गहराई से चर्चा करते हैं और धन, मुद्रास्फीति और वित्तीय स्थिरता पर उनके प्रभाव का एक महत्वपूर्ण विश्लेषण प्रदान करते हैं। आर्थिक सिद्धांतों और ऐतिहासिक उदाहरणों पर आधारित, पुस्तक फिएट मुद्रा के आसपास प्रचलित धारणाओं को चुनौती देती है और वैकल्पिक मौद्रिक प्रणालियों के संभावित लाभों के बारे में जानकारी प्रदान करती है। फिएट मुद्रा की जटिलताओं और अर्थव्यवस्था पर इसके प्रभाव को समझने में रुचि रखने वाले पाठकों के लिए अनुशंसित, "द फिएट स्टैंडर्ड" इस महत्वपूर्ण विषय की एक विचारोत्तेजक खोज प्रदान करता है।
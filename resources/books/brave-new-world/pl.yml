title: "Nowy wspaniały świat"
publication_year: 1932
cover: cover_en.webp
original: true
description: |
  "Nowy wspaniały świat" to wciągająca i prowokująca do myślenia dystopijna powieść autorstwa Aldousa Huxleya. Osadzona w futurystycznym społeczeństwie, w którym technologia i inżynieria genetyczna stworzyły pozornie idealny świat, książka zabiera nas w podróż, która podważa nasze wyobrażenia o wolności, tożsamości i szczęściu. W tym starannie skonstruowanym społeczeństwie indywidualność jest poświęcana na rzecz stabilności społecznej, a istoty ludzkie są tworzone i warunkowane tak, aby pasowały do z góry określonych ról. Wszystko, od pragnień i ambicji ludzi po ich osobiste relacje, jest ściśle kontrolowane przez potężną władzę centralną. Obywatele są zadowoleni dzięki kombinacji narkotyków zmieniających umysł, ciągłej rozrywce i tłumieniu wszelkich form sprzeciwu. Pisarstwo Huxleya umiejętnie bada konsekwencje społeczeństwa, które przedkłada stabilność i jednolitość nad indywidualność i wolność osobistą. Stawia głębokie pytania o naturę ludzkości, granice postępu i prawdziwe znaczenie szczęścia. Poprzez żywą i sugestywną prozę, "Brave New World" oferuje mrożącą krew w żyłach krytykę społeczeństwa, które poświęca prawdziwe ludzkie doświadczenie w pogoni za odkażoną i kontrolowaną egzystencją. Służy jako surowe ostrzeżenie przed niebezpieczeństwami związanymi z wymianą wolności osobistej na komfort i wygodę.
  
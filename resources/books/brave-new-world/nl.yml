title: "Brave New World"
publication_year: 1932
cover: cover_en.webp
original: true
description: |
  "Brave New World" is een boeiende en tot nadenken stemmende dystopische roman van Aldous Huxley. Het boek speelt zich af in een futuristische samenleving waar technologie en genetische manipulatie een schijnbaar perfecte wereld hebben gecreëerd. Het boek neemt ons mee op een reis die onze ideeën over vrijheid, identiteit en geluk op de proef stelt. In deze zorgvuldig geconstrueerde samenleving wordt individualiteit opgeofferd voor sociale stabiliteit en worden mensen gecreëerd en geconditioneerd om in vooraf bepaalde rollen te passen. Alles, van de verlangens en ambities van mensen tot hun persoonlijke relaties, wordt strak gecontroleerd door een machtige centrale autoriteit. De burgers worden tevreden gehouden door een combinatie van bewustzijnsveranderende drugs, constant vermaak en de onderdrukking van elke vorm van afwijkend gedrag. Huxley onderzoekt vakkundig de gevolgen van een maatschappij die stabiliteit en uniformiteit verkiest boven individualiteit en persoonlijke vrijheid. Hij werpt diepgaande vragen op over de aard van de mensheid, de grenzen van de vooruitgang en de ware betekenis van geluk. Door middel van levendig en suggestief proza biedt "Brave New World" een huiveringwekkende kritiek op een maatschappij die echte menselijke ervaringen opoffert in een streven naar een gezuiverd en gecontroleerd bestaan. Het dient als een grimmige waarschuwing voor de gevaren van het inruilen van persoonlijke vrijheid voor comfort en gemak.
  
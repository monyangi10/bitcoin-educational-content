title: "Vrli novi svet"
publication_year: 1932
cover: cover_en.webp
original: true
description: |
  "Brave New World" je fascinantna i misaono izazovna distopijska novela autora Oldousa Hakslija. Radnja je smeštena u futurističko društvo gde su tehnologija i genetski inženjering stvorili naizgled savršen svet, a knjiga nas vodi na putovanje koje izaziva naše poimanje slobode, identiteta i sreće. U ovom pažljivo konstruisanom društvu, individualnost je žrtvovana za društvenu stabilnost, a ljudska bića su stvorena i uslovljena da se uklope u unapred određene uloge. Sve, od želja i ambicija ljudi do njihovih ličnih odnosa, strogo je kontrolisano od strane moćne centralne vlasti. Građani su zadovoljni zahvaljujući kombinaciji droga koje menjaju um, stalne zabave i suzbijanja bilo kakvog oblika neslaganja. Haksli vešto istražuje posledice društva koje daje prednost stabilnosti i uniformnosti nad individualnošću i ličnom slobodom. Postavlja duboka pitanja o prirodi čovečanstva, granicama napretka i pravom značenju sreće. Kroz živopisnu i sugestivnu prozu, "Brave New World" nudi jezivu kritiku društva koje žrtvuje istinsko ljudsko iskustvo u potrazi za sterilizovanim i kontrolisanim postojanjem. Služi kao oštro upozorenje o opasnostima zamene lične slobode za udobnost i pogodnost.
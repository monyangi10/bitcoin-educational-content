title: "स्वार्थी जीन"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  रिचर्ड डॉकिन्स द्वारा लिखित द सेल्फिश जीन एक ऐसी पुस्तक है जो व्यक्तियों या प्रजातियों के विपरीत चयन की मूलभूत इकाई के रूप में जीन के दृष्टिकोण से विकास और आनुवंशिकी के विषय की खोज करती है। डॉकिन्स का तर्क है कि जीन जीवित जीवों के व्यवहार को समझने की कुंजी हैं, और कई प्रतीत होने वाले परोपकारी व्यवहारों को इस तथ्य से समझाया जा सकता है कि वे अंततः उन जीनों को लाभान्वित करते हैं जो उनके लिए जिम्मेदार हैं। यह पुस्तक "मेम" की अवधारणा को लोकप्रिय बनाने के लिए जानी जाती है, जो सूचना की एक सांस्कृतिक इकाई है जो जीन के समान ही विकासवादी सिद्धांतों के अधीन है। द सेल्फिश जीन विकासवादी जीव विज्ञान के क्षेत्र में एक मौलिक कार्य है और इसका विकास में जीन की भूमिका के बारे में हमारी समझ पर महत्वपूर्ण प्रभाव पड़ा है।
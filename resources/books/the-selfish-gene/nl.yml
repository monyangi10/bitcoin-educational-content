title: "Het zelfzuchtige gen"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  The Selfish Gene van Richard Dawkins is een boek dat het onderwerp evolutie en genetica verkent vanuit het perspectief van genen als de fundamentele eenheid van selectie, in tegenstelling tot individuen of soorten. Dawkins stelt dat genen de sleutel zijn tot het begrijpen van het gedrag van levende organismen en dat veel schijnbaar altruïstische gedragingen verklaard kunnen worden door het feit dat ze uiteindelijk ten goede komen aan de genen die ervoor verantwoordelijk zijn. Het boek staat bekend om de popularisering van het concept van de "meme", een culturele eenheid van informatie die onderhevig is aan dezelfde evolutionaire principes als genen. The Selfish Gene is een baanbrekend werk op het gebied van de evolutiebiologie en heeft een grote invloed gehad op ons begrip van de rol van genen in de evolutie.
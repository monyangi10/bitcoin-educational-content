title: 「自私的基因」
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  Richard Dawkins 所著的《自私的基因》(The Selfish Gene) 是一本從基因作為選擇的基本單位，而非個體或物種的角度，來探討進化與遺傳學議題的書籍。Dawkins 認為基因是理解生物行為的關鍵，許多看似利他的行為都可以解釋為，這些行為最終會讓負責這些行為的基因受益。這本書以普及「meme」的概念而聞名，「meme」是一種文化資訊單位，與基因受相同的進化原則所規範。自私的基因》是進化生物學領域的開創性著作，對我們理解基因在進化中的作用有重大影響。
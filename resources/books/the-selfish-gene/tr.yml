title: "Bencil Gen"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  Richard Dawkins'in Bencil Gen adlı kitabı, evrim ve genetik konusunu, bireyler ya da türlerin aksine, seçilimin temel birimi olarak genler perspektifinden inceleyen bir kitaptır. Dawkins, genlerin canlı organizmaların davranışlarını anlamanın anahtarı olduğunu ve görünüşte özgeci olan birçok davranışın, sonuçta kendilerinden sorumlu olan genlere fayda sağladıkları gerçeğiyle açıklanabileceğini savunmaktadır. Kitap, genlerle aynı evrimsel ilkelere tabi olan kültürel bir bilgi birimi olan "meme" kavramını popülerleştirmesiyle bilinmektedir. Bencil Gen, evrimsel biyoloji alanında ufuk açıcı bir eserdir ve genlerin evrimdeki rolüne ilişkin anlayışımız üzerinde önemli bir etkiye sahiptir.
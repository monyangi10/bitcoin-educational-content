title: "Samolubny gen"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  Samolubny gen autorstwa Richarda Dawkinsa to książka, która bada temat ewolucji i genetyki z perspektywy genów jako podstawowej jednostki selekcji, w przeciwieństwie do jednostek lub gatunków. Dawkins argumentuje, że geny są kluczem do zrozumienia zachowania żywych organizmów, a wiele pozornie altruistycznych zachowań można wyjaśnić faktem, że ostatecznie przynoszą one korzyści genom, które są za nie odpowiedzialne. Książka znana jest z popularyzacji koncepcji "memu", kulturowej jednostki informacji, która podlega tym samym zasadom ewolucji, co geny. Samolubny gen jest przełomowym dziełem w dziedzinie biologii ewolucyjnej i wywarł znaczący wpływ na nasze zrozumienie roli genów w ewolucji.
title: "Sebični gen"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  Sebični gen od Richarda Dawkinsa je knjiga koja istražuje temu evolucije i genetike iz perspektive gena kao osnovne jedinice selekcije, za razliku od pojedinaca ili vrsta. Dawkins tvrdi da su geni ključ za razumevanje ponašanja živih organizama i da se mnoga naizgled altruistična ponašanja mogu objasniti činjenicom da ona u konačnici koriste genima koji su za njih odgovorni. Knjiga je poznata po popularizaciji koncepta "mema", kulturne jedinice informacija koja je podložna istim evolutivnim principima kao i geni. Sebični gen je ključno delo u oblasti evolutivne biologije i imao je značajan uticaj na naše razumevanje uloge gena u evoluciji.
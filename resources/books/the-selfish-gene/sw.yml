title: "Jini la Ubinafsi"
publication_year: 1976
cover: cover_en.webp
original: true
description: |
  Jeni la Ubinafsi kilichoandikwa na Richard Dawkins ni kitabu kinachochunguza mada ya mageuzi na jeni kutoka kwa mtazamo wa jeni kama kitengo cha msingi cha uteuzi, kinyume na watu binafsi au aina. Dawkins anasema kwamba jeni ni ufunguo wa kuelewa tabia ya viumbe hai, na kwamba tabia nyingi zinazoonekana kuwa za kujitolea zinaweza kuelezewa na ukweli kwamba hatimaye hufaidi jeni zinazohusika nazo. Kitabu hiki kinajulikana kwa kueneza dhana ya "meme", kitengo cha habari cha kitamaduni ambacho kiko chini ya kanuni za mageuzi sawa na jeni. Jeni la Ubinafsi ni kazi ya kina katika uwanja wa biolojia ya mageuzi na imekuwa na athari kubwa katika uelewa wetu wa jukumu la jeni katika mageuzi.
title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Sade's Satoshis 是我們新系列中的第一本書，教導兒童有關 Bitcoin 的歷史、使用和承諾。本書收錄了奈及利亞視覺藝術家 Faniran Opeyemi 的精美原創作品。本書讓兒童從全球的角度來看 Bitcoin，並探討 Bitcoin 在奈及利亞的驚人影響。本書也教導兒童有關中央銀行、通貨膨脹和法定貨幣等重要經濟概念。本書還包含一個特別的 BONUS 部分，稱為 Bitcoin Family Pack，提供給家長使用。
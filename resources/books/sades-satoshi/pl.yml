title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Sade's Satoshis to pierwsza książka z naszej nowej serii, która uczy dzieci o historii, zastosowaniu i obietnicy Bitcoin. Książka ta zawiera piękne oryginalne grafiki nigeryjskiego artysty wizualnego Fanirana Opeyemi. Książka ta pozwala dzieciom spojrzeć na Bitcoin z perspektywy globalnej i bada niesamowity wpływ Bitcoin w Nigerii. Książka ta uczy również dzieci o ważnych pojęciach ekonomicznych, takich jak bankowość centralna, inflacja i waluta fiducjarna. Książka ta zawiera również specjalną sekcję BONUS dla rodziców o nazwie Bitcoin Family Pack.
title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Sade's Satoshis je prva knjiga u našoj novoj seriji koja uči decu o istoriji, upotrebi i obećanju Bitcoin. Ova knjiga sadrži prelepe originalne umetničke radove nigerijskog vizuelnog umetnika, Fanirana Opeyemija. Knjiga pruža deci pogled na Bitcoin kroz globalnu prizmu i istražuje neverovatan uticaj Bitcoin u Nigeriji. Takođe, ova knjiga uči decu o važnim ekonomskim konceptima kao što su centralno bankarstvo, inflacija i fiat valuta. Knjiga uključuje i poseban BONUS deo za roditelje pod nazivom Bitcoin Porodični Paket.
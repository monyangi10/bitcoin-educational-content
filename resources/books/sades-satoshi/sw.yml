title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Sade's Satoshis ni kitabu cha kwanza katika mfululizo wetu mpya kufundisha watoto kuhusu historia, matumizi, na ahadi ya Bitcoin. Kitabu hiki kina mchoro mzuri asili kutoka kwa msanii wa Visual wa Nigeria, Faniran Opeyemi. Kitabu hiki kinawapa watoto mtazamo wa Bitcoin kupitia lenzi ya kimataifa na kuchunguza athari ya ajabu ya Bitcoin nchini Nigeria. Kitabu hiki pia kinafundisha watoto kuhusu dhana muhimu za kiuchumi kama vile benki kuu, mfumuko wa bei na sarafu ya fiat. Kitabu hiki pia kinajumuisha sehemu maalum ya BONUS kwa wazazi inayoitwa Bitcoin Family Pack. 
title: "सैडेस Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  साडे की सातोशी हमारी नई श्रृंखला की पहली पुस्तक है जो बच्चों को Bitcoin के इतिहास, उपयोग और संभावनाओं के बारे में सिखाती है। इस पुस्तक में नाइजीरियाई दृश्य कलाकार, फैनिरन ओपेमी की खूबसूरत मूल कलाकृतियाँ हैं। यह पुस्तक बच्चों को वैश्विक दृष्टिकोण से Bitcoin पर एक नज़र डालती है और नाइजीरिया में Bitcoin के अविश्वसनीय प्रभाव की खोज करती है। यह पुस्तक बच्चों को केंद्रीय बैंकिंग, मुद्रास्फीति और फ़िएट मुद्रा जैसी महत्वपूर्ण आर्थिक अवधारणाओं के बारे में भी सिखाती है। इस पुस्तक में माता-पिता के लिए Bitcoin फ़ैमिली पैक नामक एक विशेष बोनस अनुभाग भी शामिल है।
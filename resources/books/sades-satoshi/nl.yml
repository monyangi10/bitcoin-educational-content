title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Sade's Satoshis is het eerste boek in onze nieuwe serie om kinderen te leren over de geschiedenis, het gebruik en de belofte van Bitcoin. Dit boek bevat prachtig origineel artwork van de Nigeriaanse beeldend kunstenaar Faniran Opeyemi. Dit boek geeft kinderen een kijk op Bitcoin door een globale lens en verkent de ongelofelijke impact van Bitcoin in Nigeria. Dit boek leert kinderen ook over belangrijke economische concepten zoals centraal bankieren, inflatie en fiatvaluta. Dit boek bevat ook een speciaal BONUS-gedeelte voor ouders, het Bitcoin Familiepakket.
title: "Sades Satoshi"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Sade's Satoshis, çocuklara Bitcoin'in tarihini, kullanımını ve vaat ettiklerini öğretmeyi amaçlayan yeni serimizin ilk kitabıdır. Bu kitapta Nijeryalı görsel sanatçı Faniran Opeyemi'nin birbirinden güzel orijinal sanat eserleri yer alıyor. Bu kitap çocuklara Bitcoin'e küresel bir mercekten bakmalarını sağlıyor ve Bitcoin'in Nijerya'daki inanılmaz etkisini araştırıyor. Bu kitap aynı zamanda çocuklara merkez bankacılığı, enflasyon ve fiat para birimi gibi önemli ekonomik kavramları öğretiyor. Bu kitapta ayrıca ebeveynler için Bitcoin Aile Paketi adı verilen özel bir BONUS bölümü de bulunmaktadır.
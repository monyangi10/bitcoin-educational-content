title: "Slobodan softver, slobodno društvo: Izabrani eseji"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Besplatni softver, slobodno društvo, odabrani eseji" je zbirka provokativnih tekstova Richarda M. Stallmana, Lawrencea Lessiga i Joshue Gaya. Ova knjiga istražuje ključna pitanja vezana za autorska prava, patentno pravo i koncept "pouzdanog računarstva" u kontekstu softvera. Stallman, ključna figura Pokreta za slobodan softver, osporava uobičajene zloupotrebe autorskih prava i patenata, ističući njihove štetne efekte na društvo i individualne slobode. On istražuje društvene dimenzije softvera i potencijal slobodnog softvera da podstakne zajednicu i socijalnu pravdu. Sa trenutnim debatama oko autorskih prava i patentnih zakona, ovi eseji nude pravovremene uvide u potrebu da softver bude oslobođen restriktivnih pravnih ograničenja. Lawrence Lessig, poznati pravni stručnjak za autorsko pravo, pruža uvod koji dodatno obogaćuje diskurs. Ova zbirka eseja sigurno će oblikovati budućnost softverskih i pravnih politika u godinama koje dolaze.
title: "Programu ya Bure, Jamii Huria: Insha Zilizochaguliwa"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Programu Huria, Jamii Huria, Insha Zilizochaguliwa" ni mkusanyo wa maandishi unaochochea fikira wa Richard M. Stallman, Lawrence Lessig, na Joshua Gay. Kitabu hiki kinaangazia masuala muhimu yanayohusu hakimiliki, sheria ya hataza, na dhana ya "kompyuta inayoaminika" katika muktadha wa programu. Stallman, mhusika mkuu katika Harakati Huru za Programu, anapinga unyanyasaji wa hakimiliki wa jamii na kuangazia athari zao za hakimiliki katika jamii. inachunguza vipimo vya kijamii vya programu na uwezekano wa programu ya bure ili kukuza haki ya jamii na kijamii Kwa mijadala ya sasa kuhusu sheria za hakimiliki na hataza, insha hizi hutoa maarifa kwa wakati juu ya hitaji la programu kuwa huru kutokana na vikwazo vya kisheria Lawrence Lessig, mtaalam wa sheria mashuhuri wa sheria ya hakimiliki, hutoa utangulizi ambao unaboresha mchakato wa kisheria kwa miaka ijayo.
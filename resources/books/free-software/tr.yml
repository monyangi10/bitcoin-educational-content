title: "Özgür Yazılım, Özgür Toplum: Seçme Yazılar"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Özgür Yazılım, Özgür Toplum, Seçilmiş Makaleler" Richard M. Stallman, Lawrence Lessig ve Joshua Gay'in yazılarından oluşan düşündürücü bir derlemedir. Bu kitap, yazılım bağlamında telif hakkı, patent yasası ve "güvenilir bilişim" kavramını çevreleyen kritik konuları incelemektedir. Özgür Yazılım Hareketi'nin önemli isimlerinden Stallman, telif hakları ve patentlerin yaygın suistimallerine karşı çıkarak, bunların toplum ve bireysel özgürlükler üzerindeki zararlı etkilerini vurguluyor. Yazılımın sosyal boyutlarını ve özgür yazılımın toplumu ve sosyal adaleti teşvik etme potansiyelini araştırıyor. Telif hakkı ve patent yasaları etrafındaki güncel tartışmalarla birlikte bu makaleler, yazılımın kısıtlayıcı yasal kısıtlamalardan arındırılması ihtiyacına ilişkin zamanında içgörüler sunuyor. Telif hakkı yasası konusunda tanınmış bir hukuk uzmanı olan Lawrence Lessig, söylemi daha da zenginleştiren bir giriş yazısı sunuyor. Bu makaleler derlemesinin önümüzdeki yıllarda yazılım ve hukuk politikalarının geleceğini şekillendireceği kesin.
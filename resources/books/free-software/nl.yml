title: "Vrije Software, Vrije Samenleving: Geselecteerde essays"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Free Software, Free Society, Selected Essays" is een tot nadenken stemmende verzameling artikelen van Richard M. Stallman, Lawrence Lessig en Joshua Gay. Dit boek gaat in op de kritieke kwesties rond auteursrecht, patentrecht en het concept van "trusted computing" binnen de context van software. Stallman, een sleutelfiguur in de Free Software Movement, stelt veelvoorkomend misbruik van auteursrecht en patenten aan de kaak en benadrukt de schadelijke effecten ervan op de maatschappij en individuele vrijheden. Hij verkent de sociale dimensies van software en het potentieel van vrije software om gemeenschap en sociale rechtvaardigheid te bevorderen. Met de huidige debatten over auteurs- en patentwetten bieden deze essays tijdig inzicht in de noodzaak om software vrij te maken van beperkende juridische beperkingen. Lawrence Lessig, een gerenommeerd juridisch expert op het gebied van auteursrecht, geeft een inleiding die het discours verder verrijkt. Deze verzameling essays zal zeker nog jaren de toekomst van software en juridisch beleid bepalen.
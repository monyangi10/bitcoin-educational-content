title: "मुक्त सॉफ्टवेयर, मुक्त समाज: चयनित निबंध"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  "फ्री सॉफ्टवेयर, फ्री सोसाइटी, सिलेक्टेड एसेज" रिचर्ड एम. स्टॉलमैन, लॉरेंस लेसिग और जोशुआ गे द्वारा लिखे गए लेखों का एक विचारोत्तेजक संग्रह है। यह पुस्तक सॉफ्टवेयर के संदर्भ में कॉपीराइट, पेटेंट कानून और "विश्वसनीय कंप्यूटिंग" की अवधारणा से जुड़े महत्वपूर्ण मुद्दों पर गहराई से चर्चा करती है। फ्री सॉफ्टवेयर मूवमेंट में एक प्रमुख व्यक्ति, स्टॉलमैन कॉपीराइट और पेटेंट के आम दुरुपयोग को चुनौती देते हैं, समाज और व्यक्तिगत स्वतंत्रता पर उनके हानिकारक प्रभावों को उजागर करते हैं। वह सॉफ्टवेयर के सामाजिक आयामों और समुदाय और सामाजिक न्याय को बढ़ावा देने के लिए फ्री सॉफ्टवेयर की क्षमता का पता लगाते हैं। कॉपीराइट और पेटेंट कानूनों के इर्द-गिर्द मौजूदा बहस के साथ, ये निबंध सॉफ्टवेयर को प्रतिबंधात्मक कानूनी बाधाओं से मुक्त करने की आवश्यकता के बारे में समय पर अंतर्दृष्टि प्रदान करते हैं। कॉपीराइट कानून के एक प्रसिद्ध कानूनी विशेषज्ञ लॉरेंस लेसिग एक परिचय प्रदान करते हैं जो प्रवचन को और समृद्ध करता है। निबंधों का यह संग्रह आने वाले वर्षों के लिए सॉफ्टवेयर और कानूनी नीतियों के भविष्य को आकार देने के लिए निश्चित है।
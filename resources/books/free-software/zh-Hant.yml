title: "自由軟體、自由社會：論文選"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Free Software, Free Society, Selected Essays" 是 Richard M. Stallman、Lawrence Lessig 和 Joshua Gay 發人深省的文集。這本書深入探討了有關版權、專利法和軟體範圍內「可信運算」概念的關鍵問題。Stallman 是自由軟體運動的關鍵人物，他挑戰常見的濫用版權與專利的行為，強調這些行為對社會與個人自由的不利影響。他探討了軟體的社會層面，以及自由軟體促進社區與社會正義的潛力。在當前圍繞著作權法與專利法的爭論中，這些論文提供了及時的洞察力，讓我們了解軟體必須擺脫限制性的法律約束。Lawrence Lessig 是知名的著作權法專家，他所撰寫的引言進一步豐富了討論的內容。這本論文集肯定會影響未來數年的軟體與法律政策。
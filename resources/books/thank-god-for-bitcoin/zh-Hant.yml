title: 「感謝 Bitcoin」
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  錢是日常生活的事實。我們賺錢、花錢、存錢。我們很想崇拜它，相信它能滿足我們的需要。關於金錢的力量、危險和管理的文章已經寫了很多，但關於金錢究竟是什麼，以及金錢本身是否合乎道德的文章卻很少。這個資訊缺口已被利用來使少數特權階級致富、奴役數百萬人，並在全世界造成混亂與分裂。這一切是如何發生的，我們又能做些什麼呢？感謝上帝的 Bitcoin》探討了現行貨幣體系的破壞方式，以及如何修復它。它探討了金錢的創造、腐敗及其潛在的救贖。它探討了 Bitcoin 如何彌補我們腐敗的貨幣體系的弊端，以及正在進行的向健全貨幣的過渡如何為破碎的世界帶來希望。
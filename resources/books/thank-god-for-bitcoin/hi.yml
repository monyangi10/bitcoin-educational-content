title: "Bitcoin के लिए भगवान का शुक्र है"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  पैसा रोज़मर्रा की ज़िंदगी का एक सच है। हम इसे कमाते हैं, खर्च करते हैं और बचाते हैं। हम इसकी पूजा करने और अपनी ज़रूरतों को पूरा करने के लिए इस पर भरोसा करने के लिए ललचाते हैं। जबकि पैसे की शक्ति, खतरे और प्रबंधन के बारे में बहुत कुछ लिखा गया है, लेकिन इस बारे में बहुत कम लिखा गया है कि पैसा वास्तव में क्या है और क्या पैसा खुद नैतिक है या नहीं। उस सूचना अंतराल का फ़ायदा कुछ विशेषाधिकार प्राप्त लोगों को समृद्ध करने, लाखों लोगों को गुलाम बनाने और पूरी दुनिया में भ्रम और विभाजन पैदा करने के लिए उठाया गया है। यह कैसे हुआ और हम इसके बारे में क्या कर सकते हैं? Bitcoin के लिए भगवान का शुक्र है कि वर्तमान मौद्रिक प्रणाली किस तरह से टूटी हुई है और इसे ठीक करने के लिए क्या किया जा सकता है। यह पैसे के निर्माण, इसके भ्रष्टाचार और इसके संभावित मोचन की खोज करता है। यह देखता है कि Bitcoin हमारी भ्रष्ट मौद्रिक प्रणाली की बुराइयों को कैसे दूर कर रहा है और कैसे स्वस्थ मुद्रा में चल रहा परिवर्तन एक टूटी हुई दुनिया के लिए आशा का स्रोत है।
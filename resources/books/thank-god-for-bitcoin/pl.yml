title: "Dzięki Bogu za Bitcoin"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Pieniądze są faktem w codziennym życiu. Zarabiamy je, wydajemy i oszczędzamy. Kusi nas, by je czcić i ufać, że zaspokoją nasze potrzeby. Podczas gdy wiele napisano o sile, niebezpieczeństwie i zarządzaniu pieniędzmi, niewiele napisano o tym, czym właściwie są pieniądze i czy same w sobie są moralne. Ta luka informacyjna została wykorzystana do wzbogacenia nielicznych uprzywilejowanych, zniewolenia milionów oraz wywołania zamieszania i podziałów na całym świecie. Jak do tego doszło i co możemy z tym zrobić? Dzięki Bogu za Bitcoin bada sposoby, w jakie obecny system monetarny jest zepsuty i co można zrobić, aby go naprawić. Bada tworzenie pieniądza, jego korupcję i potencjalne odkupienie. Przygląda się, w jaki sposób Bitcoin odkupuje bolączki naszego skorumpowanego systemu monetarnego i jak trwające przejście na zdrowy pieniądz jest źródłem nadziei dla zepsutego świata.
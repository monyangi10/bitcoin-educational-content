title: "Godzijdank voor Bitcoin"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Geld is een gegeven in het dagelijks leven. We verdienen het, geven het uit en sparen het. We zijn geneigd het te aanbidden en erop te vertrouwen dat het in onze behoeften voorziet. Hoewel er veel is geschreven over de macht, het gevaar en het rentmeesterschap van geld, is er weinig geschreven over wat geld eigenlijk is en of geld zelf moreel is. Die informatiekloof is uitgebuit om een paar bevoorrechten te verrijken, miljoenen tot slaaf te maken en verwarring en verdeeldheid te zaaien in de wereld. Hoe is dit gebeurd en wat kunnen we eraan doen? Thank God for Bitcoin onderzoekt de manieren waarop het huidige monetaire systeem kapot is en wat er gedaan kan worden om het te repareren. Het onderzoekt de creatie van geld, de corruptie ervan en de potentiële verlossing. Er wordt gekeken hoe Bitcoin de kwalen van ons corrupte monetaire systeem oplost en hoe de voortdurende overgang naar gezond geld een bron van hoop is voor een gebroken wereld.
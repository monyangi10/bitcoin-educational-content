title: "Bitcoin için Tanrı'ya şükürler olsun"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Para günlük yaşamın bir gerçeğidir. Onu kazanır, harcar ve biriktiririz. Ona tapmaya ve ihtiyaçlarımızı karşılaması için ona güvenmeye meyilliyiz. Paranın gücü, tehlikesi ve idaresi hakkında çok şey yazılmış olsa da, paranın gerçekte ne olduğu ve paranın kendisinin ahlaki olup olmadığı hakkında çok az şey yazılmıştır. Bu bilgi boşluğu, ayrıcalıklı bir azınlığı zenginleştirmek, milyonları köleleştirmek ve dünya çapında kafa karışıklığı ve bölünme yaratmak için istismar edilmiştir. Bu nasıl oldu ve bu konuda ne yapabiliriz? Thank God for Bitcoin mevcut para sisteminin nasıl bozulduğunu ve bunu düzeltmek için neler yapılabileceğini araştırıyor. Paranın yaratılışını, yozlaşmasını ve potansiyel kurtuluşunu araştırıyor. Bitcoin'in yozlaşmış para sistemimizin hastalıklarını nasıl telafi ettiğini ve sağlam paraya doğru devam eden geçişin bozuk bir dünya için nasıl bir umut kaynağı olduğunu inceliyor.
title: "Asante mungu kwa Bitcoin"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Pesa ni ukweli wa maisha ya kila siku. Tunaipata, tunaitumia na kuihifadhi. Tunajaribiwa kuiabudu na kuiamini ili kutupatia mahitaji yetu. Ingawa mengi yameandikwa kuhusu uwezo, hatari, na uwakili wa pesa, ni machache sana yameandikwa kuhusu pesa ni nini hasa na ikiwa pesa yenyewe ni ya maadili au la. Pengo hilo la habari limetumiwa vibaya kuwatajirisha wachache waliobahatika, kuwafanya mamilioni kuwa watumwa, na kuvuna machafuko na migawanyiko duniani kote. Hii ilitokeaje na tunaweza kufanya nini juu yake? Asante Mungu kwa Bitcoin inachunguza njia ambazo mfumo wa sasa wa fedha umeharibika na nini kifanyike ili kuurekebisha. Inachunguza uundaji wa pesa, ufisadi wake na ukombozi wake unaowezekana. Inaangazia jinsi Bitcoin inavyokomboa maovu ya mfumo wetu wa fedha mbovu na jinsi mpito unaoendelea wa pesa nzuri ni chanzo cha matumaini kwa ulimwengu uliovunjika.
title: "Hvala bogu za Bitcoin"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Novac je činjenica svakodnevnog života. Zarađujemo ga, trošimo i štedimo. U iskušenju smo da ga obožavamo i verujemo da će zadovoljiti naše potrebe. Dok je mnogo toga napisano o moći, opasnosti i upravljanju novcem, malo je napisano o tome šta novac zapravo jeste i da li je sam po sebi moralan. Taj nedostatak informacija iskorišćen je da obogati privilegovanu manjinu, porobi milione i poseje konfuziju i podelu širom sveta. Kako se to dogodilo i šta možemo učiniti povodom toga? Hvala Bogu za Bitcoin istražuje načine na koje je trenutni monetarni sistem pokvaren i šta se može učiniti da se popravi. Istražuje stvaranje novca, njegovu korupciju i potencijalno iskupljenje. Gleda kako Bitcoin iskupljuje nepravde našeg korumpiranog monetarnog sistema i kako je tekuća tranzicija ka zdravom novcu izvor nade za slomljeni svet.
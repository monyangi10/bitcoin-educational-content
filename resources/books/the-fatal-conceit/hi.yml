title: "एफ.ए. हायेक"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  एफ.ए. हायेक द्वारा लिखित द फेटल कॉन्सिट एक मौलिक कार्य है जो केंद्रीय नियोजन की धारणा को चुनौती देता है और आर्थिक और सामाजिक प्रणालियों में व्यक्तिगत स्वतंत्रता और स्वतःस्फूर्त व्यवस्था के महत्व पर प्रकाश डालता है। हायेक नीति निर्माताओं की सर्वज्ञता में विश्वास के खिलाफ तर्क देते हैं और विकेंद्रीकृत निर्णय लेने और बाजार तंत्र के लाभों पर जोर देते हैं। 1988 में प्रकाशित, यह विचारोत्तेजक पुस्तक आज के अर्थशास्त्र, दर्शन और समाज में सरकार की भूमिका पर चर्चाओं में प्रासंगिक बनी हुई है। यह मानवीय अंतःक्रियाओं की जटिलताओं और सामाजिक संगठन के लिए शीर्ष-से-नीचे के दृष्टिकोणों की सीमाओं के बारे में मूल्यवान अंतर्दृष्टि प्रदान करती है।
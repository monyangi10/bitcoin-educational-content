title: 「哈耶克」
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  F.A. Hayek 所著的《致命的自欺》(The Fatal Conceit) 是一本挑戰中央計劃概念的開創性著作，並強調個人自由與自發秩序在經濟與社會體系中的重要性。哈耶克反對相信決策者的全知全能，並強調分散決策和市場機制的好處。這本發人深省的書籍出版於 1988 年，在今日有關經濟學、哲學以及政府在社會中角色的討論中，仍然具有重要的意義。這本書對於人類互動的複雜性以及自上而下的社會組織方法的局限性提供了寶貴的見解。
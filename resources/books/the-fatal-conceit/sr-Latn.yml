title: "F.A Hayek"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  Fatalna Uobraženost od F.A. Hayeka je ključno delo koje osporava ideju centralnog planiranja i ističe važnost individualne slobode i spontanog reda u ekonomskim i društvenim sistemima. Hayek se protivi verovanju u sveznanje kreatora politika i naglašava prednosti decentralizovanog donošenja odluka i tržišnih mehanizama. Objavljena 1988. godine, ova misaono izazovna knjiga ostaje relevantna u današnjim raspravama o ekonomiji, filozofiji i ulozi vlade u društvu. Pruža dragocene uvide u složenosti ljudskih interakcija i ograničenja pristupa odozgo na dole u društvenoj organizaciji.
title: "F.A Hayek"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  The Fatal Conceit ya F.A. Hayek ni kazi ya kawaida inayopinga dhana ya upangaji mkuu na kuangazia umuhimu wa uhuru wa mtu binafsi na utaratibu wa hiari katika mifumo ya kiuchumi na kijamii. Hayek anabishana dhidi ya imani katika ujuzi wa watunga sera na anasisitiza manufaa ya kufanya maamuzi yaliyogatuliwa na taratibu za soko. Kilichochapishwa mwaka wa 1988, kitabu hiki chenye kuchochea fikira kinasalia kuwa muhimu katika mijadala ya leo kuhusu uchumi, falsafa, na jukumu la serikali katika jamii. Inatoa umaizi muhimu katika ugumu wa mwingiliano wa binadamu na mapungufu ya mbinu za juu chini kwa shirika la kijamii.
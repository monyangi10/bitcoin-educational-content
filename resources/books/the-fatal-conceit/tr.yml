title: "F.A Hayek"
publication_year: 1992
cover: cover_en.webp
original: true
description: |
  F.A. Hayek'in The Fatal Conceit adlı eseri, merkezi planlama kavramına meydan okuyan ve ekonomik ve sosyal sistemlerde bireysel özgürlüğün ve kendiliğinden oluşan düzenin önemini vurgulayan ufuk açıcı bir çalışmadır. Hayek, politika yapıcıların her şeyi bildiği inancına karşı çıkmakta ve merkezi olmayan karar alma ve piyasa mekanizmalarının faydalarını vurgulamaktadır. 1988 yılında yayınlanan bu düşündürücü kitap, günümüzde ekonomi, felsefe ve hükümetin toplumdaki rolü üzerine yapılan tartışmalarda geçerliliğini korumaktadır. İnsan etkileşimlerinin karmaşıklığı ve sosyal organizasyona yönelik yukarıdan aşağıya yaklaşımların sınırlılıkları hakkında değerli bilgiler sunmaktadır.
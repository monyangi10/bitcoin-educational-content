title: "Cobden et la Ligue"
publication_year: 1845
cover: cover_fr.webp
original: false
description: |
  Bastiat's account of Richard Cobden and the Anti-Corn Law League, published in 1845. This work chronicles the British free trade movement that succeeded in repealing the protectionist Corn Laws, presenting it as a model for French reformers. Bastiat saw in Cobden's movement the proof that economic liberty could be won through peaceful democratic agitation.

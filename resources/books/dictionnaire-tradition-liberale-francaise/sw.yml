title: "Dictionnaire de la tradition libérale française"
publication_year: 2020
cover: cover_fr.webp
original: false
description: |
  Benoît Malbranque's Dictionary of the French Liberal Tradition is a comprehensive reference work cataloging the thinkers, works, and ideas of the French liberal school from the 17th to the 20th century. Published by the Institut Coppet, it serves as an essential guide to a rich intellectual heritage that has been largely forgotten in contemporary France.

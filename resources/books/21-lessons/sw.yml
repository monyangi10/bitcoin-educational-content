title: "Masomo 21"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  21 Masomo; Nilichojifunza kutokana na Kuanguka kwa Shimo la Sungura la Bitcoin cha Gigi ni kitabu kinachotoa utangulizi wa kina na unaoweza kufikiwa kwa Bitcoin na teknolojia yake msingi. Mwandishi anashiriki safari yake ya kibinafsi ya ugunduzi katika ulimwengu wa sarafu-fiche na hutoa maarifa kuhusu historia, falsafa, na vipengele vya kiufundi vya Bitcoin. Kupitia sura 21 fupi na rahisi kusoma, Gigi anaelezea jinsi Bitcoin inavyofanya kazi, kwa nini ni muhimu, na uwezekano wake wa kubadilisha ulimwengu. Kitabu kinafaa kwa wasomaji ambao ni wapya kwa Bitcoin na wale wanaotaka kuongeza uelewa wao wa teknolojia hii ya kimapinduzi.
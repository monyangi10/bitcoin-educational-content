title: "21 Ders"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  21 Lessons; What I've Learned from Falling Down the Bitcoin Rabbit Hole by Gigi, Bitcoin ve altında yatan teknolojiye kapsamlı ve erişilebilir bir giriş sunan bir kitaptır. Yazar, kripto para dünyasındaki kişisel keşif yolculuğunu paylaşmakta ve Bitcoin'ın tarihi, felsefesi ve teknik yönleri hakkında içgörüler sunmaktadır. Gigi, 21 kısa ve okunması kolay bölüm aracılığıyla Bitcoin'ın nasıl çalıştığını, neden önemli olduğunu ve dünyayı değiştirme potansiyelini açıklıyor. Kitap, Bitcoin'a yeni başlayanlar ve bu devrim niteliğindeki teknolojiye ilişkin anlayışlarını derinleştirmek isteyen okuyucular için uygundur.
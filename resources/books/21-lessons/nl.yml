title: "21 Lessen"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  21 Lessons; What I've Learned from Falling Down the Bitcoin Rabbit Hole van Gigi is een boek dat een uitgebreide en toegankelijke introductie biedt tot Bitcoin en de onderliggende technologie. De auteur deelt zijn persoonlijke ontdekkingsreis in de wereld van cryptocurrency en biedt inzicht in de geschiedenis, filosofie en technische aspecten van Bitcoin. In 21 korte en makkelijk te lezen hoofdstukken legt Gigi uit hoe Bitcoin werkt, waarom het belangrijk is en wat het potentieel is om de wereld te veranderen. Het boek is geschikt voor lezers die nieuw zijn met Bitcoin en lezers die hun kennis van deze revolutionaire technologie willen verdiepen.
title: "21 Lekcija"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  21 Lekcija; Šta sam naučio upadajući u Bitcoin zečju rupu od Gigi je knjiga koja nudi sveobuhvatan i pristupačan uvod u Bitcoin i njegovu osnovnu tehnologiju. Autor deli svoje lično putovanje otkrića u svetu kriptovaluta i nudi uvide u istoriju, filozofiju i tehničke aspekte Bitcoin. Kroz 21 kratko i lako čitljivo poglavlje, Gigi objašnjava kako Bitcoin funkcioniše, zašto je važan i njegov potencijal da promeni svet. Knjiga je pogodna za čitaoce koji su novi u Bitcoin i one koji žele produbiti svoje razumevanje ove revolucionarne tehnologije.
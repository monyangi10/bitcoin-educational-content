original: true
description: |
  21 Lessons; What I「ve Learned from Falling Down the Bitcoin Rabbit Hole 作者 Gigi 所著的《21 Lessons; What I」ve Learned from Falling Down the Bitcoin Rabbit Hole》是一本全面、易懂地介紹 Bitcoin 及其底層技術的書籍。作者分享了他在加密貨幣世界中的個人探索之旅，並對 Bitcoin 的歷史、哲學和技術方面提出了自己的見解。透過 21 個簡短易讀的章節，Gigi 解釋了 Bitcoin 如何運作、它為何重要，以及它改變世界的潛力。本書適合初次接觸 Bitcoin 的讀者，以及想要加深對這項革命性技術了解的讀者。
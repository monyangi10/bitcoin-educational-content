title: "21 पाठ"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  21 सबक; गिगी द्वारा Bitcoin खरगोश के बिल में गिरने से मैंने क्या सीखा, यह एक ऐसी पुस्तक है जो Bitcoin और इसकी अंतर्निहित तकनीक के बारे में एक व्यापक और सुलभ परिचय प्रदान करती है। लेखक क्रिप्टोकरेंसी की दुनिया में खोज की अपनी व्यक्तिगत यात्रा साझा करता है और Bitcoin के इतिहास, दर्शन और तकनीकी पहलुओं के बारे में जानकारी प्रदान करता है। 21 छोटे और आसानी से पढ़े जाने वाले अध्यायों के माध्यम से, गिगी बताती हैं कि Bitcoin कैसे काम करता है, यह क्यों मायने रखता है, और दुनिया को बदलने की इसकी क्षमता क्या है। यह पुस्तक उन पाठकों के लिए उपयुक्त है जो Bitcoin के लिए नए हैं और जो इस क्रांतिकारी तकनीक के बारे में अपनी समझ को गहरा करना चाहते हैं।
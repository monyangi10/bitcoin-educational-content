title: "21 Lekcji"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  21 Lessons; What I've Learned from Falling Down the Bitcoin Rabbit Hole autorstwa Gigi to książka, która oferuje kompleksowe i przystępne wprowadzenie do Bitcoin i technologii leżącej u jego podstaw. Autor dzieli się swoją osobistą podróżą odkrywczą w świecie kryptowalut i oferuje wgląd w historię, filozofię i techniczne aspekty Bitcoin. W 21 krótkich i łatwych do przeczytania rozdziałach Gigi wyjaśnia, jak działa Bitcoin, dlaczego ma znaczenie i jaki jest jego potencjał do zmiany świata. Książka jest odpowiednia dla czytelników, którzy są nowicjuszami w Bitcoin i tych, którzy chcą pogłębić swoje zrozumienie tej rewolucyjnej technologii.
title: "Lettre d'un négociant sur la nature du commerce des grains"
publication_year: 1763
cover: cover_fr.webp
original: true
description: |
  Written in 1763 by Louis-Paul Abeille, this letter argues for the liberalization of the grain trade in France. Through the voice of a merchant, Abeille demonstrates that freedom of commerce is not merely beneficial to traders but essential to the prosperity of the entire nation, anticipating many arguments later developed by the Physiocrats and classical liberals.

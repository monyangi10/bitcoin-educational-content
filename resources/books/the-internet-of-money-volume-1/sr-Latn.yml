title: "Internet novca"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  "The Internet of Money" by Andreas Antonopoulos je knjiga koja objašnjava osnove Bitcoin i njegovu osnovnu tehnologiju. U ovom tomu, Antonopoulos se fokusira na osnove digitalne valute, uključujući njenu priču o poreklu, njen revolucionarni potencijal i prepreke koje mora prevazići da bi bila široko prihvaćena. Takođe se upušta u šire implikacije Bitcoin za društvo i ekonomiju, istražujući njegov potencijal da poremeti tradicionalne bankarske i finansijske institucije, kao i njegovu sposobnost da osnaži pojedince i promoviše finansijsku slobodu. Ova knjiga je odličan uvod u svet Bitcoin za početnike koji žele da saznaju više o ovoj revolucionarnoj tehnologiji.
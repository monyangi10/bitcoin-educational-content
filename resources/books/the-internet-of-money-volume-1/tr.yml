title: "Paranın İnterneti"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Andreas Antonopoulos tarafından yazılan "Paranın İnterneti", Bitcoin'ın temellerini ve altında yatan teknolojiyi açıklayan bir kitaptır. Bu kitapta Antonopoulos, dijital para biriminin çıkış hikayesi, devrim niteliğindeki potansiyeli ve yaygın olarak benimsenmesi için aşması gereken engeller de dahil olmak üzere temellerine odaklanmaktadır. Ayrıca, Bitcoin'ın toplum ve ekonomi üzerindeki daha geniş etkilerini inceleyerek, geleneksel bankacılık ve finans kurumlarını bozma potansiyelinin yanı sıra bireyleri güçlendirme ve finansal özgürlüğü teşvik etme yeteneğini de araştırıyor. Bu kitap, bu devrim niteliğindeki teknoloji hakkında daha fazla bilgi edinmek isteyen yeni başlayanlar için Bitcoin dünyasına mükemmel bir giriş niteliğindedir.
title: 「貨幣的互聯網」
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  Andreas Antonopoulos 所著的《The Internet of Money》是一本解釋 Bitcoin 及其基礎技術的書籍。在這本書中，Antonopoulos 重點介紹了數位貨幣的基本原理，包括其起源故事、革命性潛力，以及要被廣泛採用所必須克服的障礙。他也深入探討 Bitcoin 對社會和經濟更廣泛的影響，探索其顛覆傳統銀行和金融機構的潛力，以及賦予個人權力和促進財務自由的能力。對於想要深入瞭解這項革命性技術的初學者而言，本書是進入 Bitcoin 世界的絕佳入門。
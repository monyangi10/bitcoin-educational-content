title: "Het internet van geld"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Internet of Money" van Andreas Antonopoulos is een boek dat de basisprincipes van Bitcoin en de onderliggende technologie uitlegt. In dit deel richt Antonopoulos zich op de fundamenten van de digitale valuta, inclusief het verhaal over de oorsprong, het revolutionaire potentieel en de obstakels die het moet overwinnen om op grote schaal te worden toegepast. Hij verdiept zich ook in de bredere implicaties van Bitcoin voor de maatschappij en de economie, waarbij hij het potentieel onderzoekt om het traditionele bankwezen en financiële instellingen te ontwrichten, evenals de mogelijkheid om individuen mondiger te maken en financiële vrijheid te bevorderen. Dit boek is een uitstekende introductie in de wereld van Bitcoin voor beginners die meer willen weten over deze revolutionaire technologie.
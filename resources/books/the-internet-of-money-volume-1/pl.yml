title: "Internet pieniędzy"
publication_year: 2016
cover: cover_en.webp
original: true
description: |
  The Internet of Money" autorstwa Andreasa Antonopoulosa to książka, która wyjaśnia podstawy Bitcoin i technologii leżącej u jego podstaw. W tym tomie Antonopoulos koncentruje się na podstawach cyfrowej waluty, w tym na historii jej powstania, jej rewolucyjnym potencjale i przeszkodach, które musi pokonać, aby zostać powszechnie przyjętą. Zagłębia się również w szersze implikacje Bitcoin dla społeczeństwa i gospodarki, badając jego potencjał do zakłócania tradycyjnej bankowości i instytucji finansowych, a także jego zdolność do wzmocnienia pozycji jednostek i promowania wolności finansowej. Książka ta jest doskonałym wprowadzeniem do świata Bitcoin dla początkujących, którzy chcą dowiedzieć się więcej o tej rewolucyjnej technologii.
title: "Devlet Paramıza Ne Yaptı?"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  Murray Rothbard tarafından yazılan What Has Government Done To Our Money, paranın tarihini ve gelişiminde hükümetin rolünü inceleyen klasik bir kitaptır. Merkez bankacılığı sisteminin ve para politikasının ekonomi üzerindeki etkisinin eleştirel bir analizini sunmakta ve hükümet müdahalesinin enflasyona, ekonomik istikrarsızlığa ve paranın değerinin düşmesine neden olduğunu savunmaktadır. Rothbard'ın yazıları düşündürücüdür ve paranın doğası ve hükümetin ekonomiyi yönetmedeki rolü hakkında alternatif bir bakış açısı sunar. Bu kitap ekonomi, finans ve bankacılıkla ilgilenenlere ve para ile hükümet politikası arasındaki ilişkiyi daha iyi anlamak isteyen herkese tavsiye edilir.
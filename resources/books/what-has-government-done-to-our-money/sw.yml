title: "Serikali Imefanya Nini Kwa Pesa Zetu"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  Je, Serikali Imefanya Nini Kwa Pesa Zetu kilichoandikwa na Murray Rothbard ni kitabu cha kawaida ambacho kinaangazia historia ya pesa na jukumu la serikali katika maendeleo yake. Inatoa uchambuzi muhimu wa mfumo mkuu wa benki na athari za sera ya fedha kwa uchumi, ikisema kwamba kuingilia kati kwa serikali kumesababisha mfumuko wa bei, kuyumba kwa uchumi, na kushuka kwa thamani ya sarafu. Maandishi ya Rothbard yanachochea fikira na yanatoa mtazamo mbadala juu ya asili ya pesa na jukumu la serikali katika kusimamia uchumi. Kitabu hiki kinapendekezwa kwa wale wanaopenda masuala ya uchumi, fedha na benki, na yeyote anayetaka kupata ufahamu wa kina wa uhusiano kati ya pesa na sera ya serikali.
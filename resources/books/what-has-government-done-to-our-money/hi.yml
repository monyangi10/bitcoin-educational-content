title: "हमारे पैसे का सरकार ने क्या किया है"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  मरे रोथबर्ड द्वारा लिखित 'सरकार ने हमारे पैसे के साथ क्या किया' एक क्लासिक किताब है जो पैसे के इतिहास और इसके विकास में सरकार की भूमिका पर गहराई से चर्चा करती है। यह केंद्रीय बैंकिंग प्रणाली और अर्थव्यवस्था पर मौद्रिक नीति के प्रभाव का एक महत्वपूर्ण विश्लेषण प्रदान करता है, जिसमें तर्क दिया गया है कि सरकारी हस्तक्षेप ने मुद्रास्फीति, आर्थिक अस्थिरता और मुद्रा के अवमूल्यन का कारण बना है। रोथबर्ड का लेखन विचारोत्तेजक है और पैसे की प्रकृति और अर्थव्यवस्था के प्रबंधन में सरकार की भूमिका पर एक वैकल्पिक दृष्टिकोण प्रस्तुत करता है। यह पुस्तक उन लोगों के लिए अनुशंसित है जो अर्थशास्त्र, वित्त और बैंकिंग में रुचि रखते हैं, और जो कोई भी पैसे और सरकारी नीति के बीच संबंधों की गहरी समझ हासिल करना चाहता है।
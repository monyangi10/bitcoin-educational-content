title: "Wat heeft de overheid met ons geld gedaan?"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  What Has Government Done To Our Money van Murray Rothbard is een klassiek boek dat ingaat op de geschiedenis van geld en de rol van de overheid in de ontwikkeling ervan. Het biedt een kritische analyse van het centrale banksysteem en de invloed van het monetaire beleid op de economie, met als argument dat overheidsinterventie inflatie, economische instabiliteit en devaluatie van valuta heeft veroorzaakt. Rothbard zet aan tot nadenken en presenteert een alternatief perspectief op de aard van geld en de rol van de overheid in het beheren van de economie. Dit boek is een aanrader voor iedereen die geïnteresseerd is in economie, financiën en bankieren, en voor iedereen die een beter begrip wil krijgen van de relatie tussen geld en overheidsbeleid.
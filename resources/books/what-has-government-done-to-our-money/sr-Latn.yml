title: "Šta je vlada uradila sa našim novcem"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  Šta je Vlada Uradila sa Našim Novcem od Murraya Rothbarda je klasična knjiga koja istražuje istoriju novca i ulogu vlade u njegovom razvoju. Pruža kritičku analizu sistema centralnog bankarstva i uticaja monetarne politike na ekonomiju, tvrdeći da je intervencija vlade izazvala inflaciju, ekonomsku nestabilnost i devalvaciju valute. Rothbardovo pisanje je podsticajno i predstavlja alternativnu perspektivu o prirodi novca i ulozi vlade u upravljanju ekonomijom. Ova knjiga se preporučuje onima koji su zainteresovani za ekonomiju, finansije i bankarstvo, i svima koji žele da steknu dublje razumevanje odnosa između novca i vladine politike.
title: 「政府對我們的錢做了什麼」
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  Murray Rothbard 所著的《政府對我們的貨幣做了什麼》是一本深入探討貨幣歷史以及政府在貨幣發展中所扮演角色的經典著作。該書對中央銀行體系和貨幣政策對經濟的影響進行了批判性的分析，認為政府的干預導致了通貨膨脹、經濟不穩定和貨幣貶值。Rothbard 的文筆發人深省，對貨幣的本質和政府在管理經濟中的角色提出了另類的觀點。本書推薦給對經濟、金融和銀行業感興趣的人，以及任何想要深入瞭解貨幣與政府政策之間關係的人。
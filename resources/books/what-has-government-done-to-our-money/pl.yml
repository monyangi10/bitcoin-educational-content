title: "Co rząd zrobił z naszymi pieniędzmi"
publication_year: 1963
cover: cover_en.webp
original: true
description: |
  What Has Government Done To Our Money autorstwa Murraya Rothbarda to klasyczna książka, która zagłębia się w historię pieniądza i rolę rządu w jego rozwoju. Zawiera krytyczną analizę systemu bankowości centralnej i wpływu polityki pieniężnej na gospodarkę, argumentując, że interwencja rządu spowodowała inflację, niestabilność gospodarczą i dewaluację waluty. Pisarstwo Rothbarda prowokuje do myślenia i przedstawia alternatywne spojrzenie na naturę pieniądza i rolę rządu w zarządzaniu gospodarką. Książka ta jest zalecana dla osób zainteresowanych ekonomią, finansami i bankowością oraz dla każdego, kto chce głębiej zrozumieć związek między pieniądzem a polityką rządu.
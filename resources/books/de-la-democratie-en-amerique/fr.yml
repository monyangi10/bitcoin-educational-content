title: "De la démocratie en Amérique"
publication_year: 1835
cover: cover_fr.webp
original: true
description: |
  Tocqueville's Democracy in America (1835-1840) is perhaps the most penetrating study of democratic society ever written. Based on his travels in the United States, Tocqueville analyzes the strengths and dangers of democratic governance, warning that the tyranny of the majority and the centralization of administrative power pose the greatest threats to liberty in modern democracies.

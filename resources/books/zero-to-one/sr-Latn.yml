title: "Zero to One"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Zero to One by Peter Thiel je knjiga o preduzetništvu i inovacijama. Thiel je milijarder preduzetnik, investitor i suosnivač PayPal-a. Knjiga se fokusira na to kako izgraditi kompanije koje stvaraju nove, inovativne proizvode i ideje koje imaju potencijal da promene svet, umesto da jednostavno kopiraju ono što već postoji. Thiel tvrdi da zaista uspešni poslovi ne samo da rade stvari bolje, već rade potpuno nove stvari. On naglašava važnost stvaranja jedinstvene i vredne ideje, umesto samo praćenja postojećih trendova, i pruža savete o tome kako izgraditi uspešan startup od nule. Knjiga je namenjena preduzetnicima i svima koji su zainteresovani za izgradnju uspešnog biznisa, i pruža uvide i smernice o tome kako razmišljati o inovacijama i preduzetništvu na jedinstven i efikasan način.
title: 「從零到一」
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Peter Thiel 所著的《Zero to One》是一本關於創業和創新的書。Thiel 是一位億萬富翁企業家、投資人，也是 PayPal 的共同創辦人。這本書的重點在於如何建立公司，創造有可能改變世界的創新產品和想法，而不是簡單地複製已有的東西。Thiel 認為，真正成功的企業不只是把事情做得更好，而是做全新的事情。他強調創造獨特且有價值想法的重要性，而非只是跟隨現有趨勢，並提供如何從零開始建立成功創業公司的建議。這本書主要針對創業者以及任何有興趣建立成功企業的人，並提供如何以獨特有效的方式思考創新與創業的見解與指導。
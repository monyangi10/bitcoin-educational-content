title: "Nul tot één"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Zero to One van Peter Thiel is een boek over ondernemerschap en innovatie. Thiel is een miljardair, ondernemer, investeerder en medeoprichter van PayPal. Het boek richt zich op hoe je bedrijven opbouwt die nieuwe, innovatieve producten en ideeën creëren die de potentie hebben om de wereld te veranderen, in plaats van simpelweg te kopiëren wat al bestaat. Thiel stelt dat echt succesvolle bedrijven niet alleen dingen beter doen, maar ook geheel nieuwe dingen doen. Hij benadrukt het belang van het creëren van een uniek en waardevol idee, in plaats van alleen maar bestaande trends te volgen, en geeft advies over hoe je een succesvolle startup vanaf nul kunt opbouwen. Het boek is gericht op ondernemers en iedereen die geïnteresseerd is in het opbouwen van een succesvol bedrijf, en biedt inzichten en richtlijnen over hoe je op een unieke en effectieve manier kunt denken over innovatie en ondernemerschap.
title: "दोस्त कैसे बनायें और लोगों को प्रभावित कैसे करें"
publication_year: 1936
cover: cover_en.webp
original: true
description: |
  "हाउ टू विन फ्रेंड्स एंड इन्फ्लुएंस पीपल" एक क्लासिक सेल्फ-हेल्प बुक है जो आपके संचार कौशल को बेहतर बनाने और सकारात्मक संबंध बनाने के बारे में व्यावहारिक सलाह देती है। यह सहानुभूति, दूसरों के दृष्टिकोण को समझने और लोगों के साथ सम्मान और दयालुता से पेश आने के महत्व पर जोर देती है। पुस्तक में कई तरह के विषयों को शामिल किया गया है, जिसमें पहली बार में अच्छा प्रभाव कैसे डालें, आलोचना को कैसे संभालें, बेहतर श्रोता कैसे बनें और संघर्षों को प्रभावी ढंग से कैसे हल करें। यह उन लोगों के लिए एक बेहतरीन संसाधन है जो अपने व्यक्तिगत या पेशेवर संबंधों को बेहतर बनाना चाहते हैं।
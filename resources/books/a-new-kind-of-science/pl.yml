title: "Nowy rodzaj nauki"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  A New Kind of Science Stephena Wolframa to przełomowe dzieło w dziedzinie informatyki, matematyki i fizyki. W książce tej Wolfram przedstawia swoją teorię automatów komórkowych, która jego zdaniem jest kluczem do zrozumienia fundamentalnego działania naszego wszechświata. Wolfram argumentuje, że tradycyjne metody naukowe są niewystarczające do rozwiązywania najbardziej złożonych problemów naszych czasów i że potrzebujemy nowego rodzaju nauki, która opiera się na badaniu prostych systemów obliczeniowych. Książka zawiera liczne przykłady tego, jak automaty komórkowe mogą być wykorzystywane do modelowania rzeczywistych zjawisk, a Wolfram przedstawia przekonujące argumenty za tym, dlaczego takie podejście jest niezbędne do osiągnięcia postępu w takich dziedzinach jak biologia, ekonomia i informatyka. Chociaż książka ta może być wyzwaniem dla czytelników bez silnego zaplecza w matematyce i naukach ścisłych, jest to przełomowa praca, która wywarła głęboki wpływ na szeroki zakres dyscyplin.
title: 「一種新的科學」
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Stephen Wolfram 所著的《A New Kind of Science》是電腦科學、數學和物理學領域的開創性著作。在這本書中，Wolfram 提出了他的細胞自動機理論，他相信這是了解宇宙基本運作的關鍵。他認為傳統的科學方法不足以解決當今最複雜的問題，我們需要一種以研究簡單的計算系統為基礎的新型科學。書中有許多例子說明如何利用細胞自動化來建模真實世界的現象，Wolfram 以令人信服的理由說明為什麼這種方法對於在生物學、經濟學和電腦科學等領域取得進步是不可或缺的。雖然對於沒有深厚數學與科學背景的讀者來說，這本書可能有一定的挑戰性，但它是一本開創性的著作，對許多學科都有深遠的影響。
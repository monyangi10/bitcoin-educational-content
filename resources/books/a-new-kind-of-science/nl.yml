title: "Een nieuw soort wetenschap"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  A New Kind of Science van Stephen Wolfram is een baanbrekend werk op het gebied van informatica, wiskunde en natuurkunde. In dit boek presenteert Wolfram zijn theorie van cellulaire automaten, die volgens hem de sleutel is tot het begrijpen van de fundamentele werking van ons universum. Hij stelt dat traditionele wetenschappelijke methoden ontoereikend zijn om de meest complexe problemen van onze tijd op te lossen en dat we een nieuw soort wetenschap nodig hebben die gebaseerd is op de studie van eenvoudige, computationele systemen. Het boek bevat talloze voorbeelden van hoe cellulaire automaten kunnen worden gebruikt om echte verschijnselen te modelleren, en Wolfram maakt overtuigend duidelijk waarom deze benadering essentieel is om vooruitgang te boeken op gebieden als biologie, economie en computerwetenschap. Hoewel het boek een uitdaging kan zijn voor lezers zonder een sterke achtergrond in wiskunde en wetenschap, is het een baanbrekend werk dat een grote invloed heeft gehad op een breed scala aan disciplines.
title: "एक नए तरह का विज्ञान"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  स्टीफन वोल्फ्राम द्वारा लिखित ए न्यू काइंड ऑफ साइंस कंप्यूटर विज्ञान, गणित और भौतिकी के क्षेत्र में एक मौलिक कार्य है। इस पुस्तक में, वोल्फ्राम सेलुलर ऑटोमेटा के अपने सिद्धांत को प्रस्तुत करते हैं, जिसके बारे में उनका मानना ​​है कि यह हमारे ब्रह्मांड के मूलभूत कामकाज को समझने की कुंजी है। उनका तर्क है कि हमारे समय की सबसे जटिल समस्याओं को हल करने के लिए पारंपरिक वैज्ञानिक तरीके अपर्याप्त हैं, और हमें एक नए प्रकार के विज्ञान की आवश्यकता है जो सरल, कम्प्यूटेशनल प्रणालियों के अध्ययन पर आधारित हो। पुस्तक में कई उदाहरण शामिल हैं कि कैसे सेलुलर ऑटोमेटा का उपयोग वास्तविक दुनिया की घटनाओं को मॉडल करने के लिए किया जा सकता है, और वोल्फ्राम इस बात के लिए एक आकर्षक मामला बनाते हैं कि जीव विज्ञान, अर्थशास्त्र और कंप्यूटर विज्ञान जैसे क्षेत्रों में प्रगति करने के लिए यह दृष्टिकोण क्यों आवश्यक है। जबकि यह पुस्तक गणित और विज्ञान में मजबूत पृष्ठभूमि के बिना पाठकों के लिए चुनौतीपूर्ण हो सकती है, यह एक अभूतपूर्व कार्य है जिसका कई विषयों पर गहरा प्रभाव पड़ा है।
title: "Nova vrsta nauke"
publication_year: 2002
cover: cover_en.webp
original: true
description: |
  Nova vrsta nauke od Stephena Wolframa je ključno delo u oblastima računarskih nauka, matematike i fizike. U ovoj knjizi, Wolfram predstavlja svoju teoriju celularnih automata, za koju veruje da je ključ za razumevanje fundamentalnih mehanizama našeg univerzuma. On tvrdi da su tradicionalne naučne metode nedovoljne za rešavanje najsloženijih problema našeg vremena i da nam je potrebna nova vrsta nauke zasnovana na proučavanju jednostavnih, računarskih sistema. Knjiga uključuje brojne primere kako se celularni automati mogu koristiti za modelovanje fenomena iz stvarnog sveta, a Wolfram iznosi ubedljive argumente zašto je ovaj pristup neophodan za napredak u oblastima kao što su biologija, ekonomija i računarske nauke. Iako knjiga može biti izazovna za čitaoce bez jakog matematičkog i naučnog obrazovanja, ona je revolucionarno delo koje je imalo dubok uticaj na širok spektar disciplina.
title: "Sprawdź swój przywilej finansowy"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Check Your Financial Privilege" autorstwa Alexa Gladsteina to książka, która bada skrzyżowanie Bitcoin, praw człowieka, przywilejów finansowych i wolności osobistej. Z wyjątkowej perspektywy Gladstein podkreśla nierówności w systemach finansowych na całym świecie i ich wpływ na życie jednostek. Podkreśla, że urodzenie się w walucie rezerwowej daje przywilej finansowy, podczas gdy większość światowej populacji boryka się ze słabszymi systemami.
  Książka zawiera prawdziwe historie z różnych części świata. W Nigerii Bitcoin stał się kołem ratunkowym dla działaczy na rzecz praw człowieka w obliczu autorytarnych reżimów. Na Kubie Bitcoin pomógł jednostkom poruszać się po zdewaluowanym systemie walutowym. W Salwadorze Bitcoin daje nadzieję, zmniejszając opłaty za przekazy pieniężne i umożliwiając szybsze transakcje, zwłaszcza teraz, gdy stał się legalnym środkiem płatniczym.
  Jako CSO Fundacji Praw Człowieka, Gladstein wykorzystuje swoją wyjątkową pozycję, aby zapewnić wgląd w transformacyjną moc Bitcoin dla osób spoza tradycyjnych systemów finansowych. Dla wielu ludzi na całym świecie Bitcoin oferuje ucieczkę od inflacji, zawirowań politycznych i przestarzałych systemów monetarnych. W niektórych przypadkach może to być nawet kwestia życia i śmierci.
  Należy zauważyć, że dochód ze sprzedaży tej książki przeznaczony jest na wsparcie Fundacji Praw Człowieka, podkreślając Commitment autora w promowaniu praw człowieka i integracji finansowej.
  
title: "Finansal Ayrıcalığınızı Kontrol Edin"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Alex Gladstein'ın "Check Your Financial Privilege" (Finansal Ayrıcalığınızı Kontrol Edin) adlı kitabı Bitcoin, insan hakları, finansal ayrıcalık ve kişisel özgürlüğün kesişim noktalarını inceliyor. Gladstein, benzersiz bir bakış açısıyla, dünya çapındaki finansal sistemlerdeki eşitsizlikleri ve bunların bireylerin yaşamlarını nasıl etkilediğini vurguluyor. Bir rezerv para biriminde doğmanın finansal ayrıcalık sağladığını, buna karşın küresel nüfusun çoğunluğunun daha zayıf sistemlerle karşı karşıya olduğunu vurguluyor.
  Kitapta dünyanın farklı yerlerinden gerçek yaşam öyküleri yer alıyor. Nijerya'da Bitcoin, otoriter rejimler karşısında insan hakları aktivistleri için bir can simidi haline geldi. Küba'da Bitcoin, bireylerin devalüe edilmiş bir para birimi sisteminde yol almalarına yardımcı oldu. El Salvador'da Bitcoin, havale ücretlerini düşürerek ve özellikle de artık yasal ödeme aracı haline geldiği için daha hızlı işlem yapılmasını sağlayarak umut veriyor.
  İnsan Hakları Vakfı'nın CSO'su olarak Gladstein, geleneksel finansal sistemlerin dışında kalan bireyler için Bitcoin'in dönüştürücü gücüne ilişkin içgörü sağlamak üzere benzersiz konumundan yararlanıyor. Dünya çapında pek çok insan için Bitcoin enflasyondan, siyasi çalkantılardan ve modası geçmiş para sistemlerinden bir kaçış sunuyor. Bazı durumlarda bu bir ölüm kalım meselesi bile olabilir.
  Bu kitabın satışından elde edilen gelirin İnsan Hakları Vakfı'nı desteklemeye gittiğini belirtmek, yazarın insan hakları ve finansal kapsayıcılığı teşvik etme konusundaki Commitment'ının altını çizmek önemlidir.
  
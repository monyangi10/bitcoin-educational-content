title: "Angalia Upendeleo Wako wa Kifedha"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Check Your Financial Privilege" kilichoandikwa na Alex Gladstein ni kitabu kinachochunguza makutano ya Bitcoin, haki za binadamu, haki za kifedha, na uhuru wa kibinafsi. Kwa mtazamo wa kipekee, Gladstein anaangazia ukosefu wa usawa katika mifumo ya kifedha duniani kote na jinsi inavyoathiri maisha ya watu binafsi. Anasisitiza kwamba kuzaliwa katika sarafu ya akiba kunatoa fursa ya upendeleo wa kifedha, huku idadi kubwa ya mifumo dhaifu duniani ikikabiliana na idadi kubwa ya watu.
  Kitabu hiki kina hadithi za maisha halisi kutoka sehemu mbalimbali za dunia. Nchini Nigeria, Bitcoin imekuwa njia ya maisha kwa wanaharakati wa haki za binadamu mbele ya tawala za kimabavu. Nchini Kuba, Bitcoin imesaidia watu binafsi kutumia mfumo wa sarafu ulioshuka thamani. Nchini El Salvador, Bitcoin inatoa matumaini kwa kupunguza ada za kutuma na kuwezesha miamala ya haraka, hasa kwa kuwa imekuwa zabuni halali.
  Akiwa CSO ya Wakfu wa Haki za Kibinadamu, Gladstein anatumia nafasi yake ya kipekee ya kutoa maarifa kuhusu uwezo wa mageuzi wa Bitcoin kwa watu binafsi nje ya mifumo ya jadi ya kifedha. Kwa watu wengi duniani kote, Bitcoin inatoa njia ya kuepuka mfumuko wa bei, misukosuko ya kisiasa na mifumo ya fedha iliyopitwa na wakati. Katika baadhi ya matukio, inaweza hata kuwa suala la maisha na kifo.
  Ni muhimu kutambua kwamba mapato kutokana na mauzo ya kitabu hiki yanaenda kusaidia Wakfu wa Haki za Kibinadamu, ikisisitiza Commitment ya mwandishi ili kukuza haki za binadamu na ushirikishwaji wa kifedha.
  
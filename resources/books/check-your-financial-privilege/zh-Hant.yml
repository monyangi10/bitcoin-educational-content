title: 「檢查您的財務特權」
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Alex Gladstein 所著的《Check Your Financial Privilege》一書探討了 Bitcoin、人權、財務特權和個人自由之間的交集。Gladstein 以獨特的角度，強調全球金融體系的不平等，以及這些不平等如何影響個人生活。他強調，出生在儲備貨幣體系的人擁有金融特權，而全球大多數人則面臨較弱的體系。
  書中收錄了來自世界各地的真實故事。在奈及利亞，Bitcoin 成為人權活動人士面對專制政權時的生命線。在古巴，Bitcoin 幫助個人在貶值的貨幣體系中遊刃有餘。在薩爾瓦多，Bitcoin 降低了匯款費用，加快了交易速度，尤其是在 Bitcoin 已經成為法定貨幣的情況下，為人們帶來了希望。
  身為人權基金會 (Human Rights Foundation) 的 CSO，Gladstein 利用其獨特的地位，深入剖析 Bitcoin 對於傳統金融體系以外的個人所產生的轉變力量。對於全球許多人而言，Bitcoin 提供了逃避通貨膨脹、政治動盪和過時貨幣系統的方法。在某些情況下，Bitcoin 甚至可以決定生死。
  值得注意的是，這本書的銷售收益將用於支持人權基金會，突顯出作者的 Commitment 致力於促進人權和金融包容性。
  
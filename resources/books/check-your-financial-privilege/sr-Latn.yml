title: "Proveri Svoju Finansijsku Privilegiju"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Proverite svoje finansijske privilegije" od Aleksa Gledstina je knjiga koja istražuje presek Bitcoin, ljudskih prava, finansijskih privilegija i lične slobode. Sa jedinstvenom perspektivom, Gledstin ističe nejednakosti u finansijskim sistemima širom sveta i kako one utiču na živote pojedinaca. On naglašava da rođenje u rezervnoj valuti donosi finansijsku privilegiju, dok se većina svetske populacije suočava sa slabijim sistemima.  
  Knjiga sadrži priče iz stvarnog života iz različitih delova sveta. U Nigeriji, Bitcoin je postao spas za aktiviste za ljudska prava suočene sa autoritarnim režimima. Na Kubi, Bitcoin je pomogao pojedincima da se snađu u sistemu devalvirane valute. U El Salvadoru, Bitcoin nudi nadu smanjenjem naknada za doznake i omogućavanjem bržih transakcija, posebno sada kada je postao zakonsko sredstvo plaćanja.  
  Kao CSO Fondacije za ljudska prava, Gledstin koristi svoju jedinstvenu poziciju da pruži uvide u transformativnu moć Bitcoin za pojedince van tradicionalnih finansijskih sistema. Za mnoge ljude širom sveta, Bitcoin nudi izlaz iz inflacije, političkih previranja i zastarelih monetarnih sistema. U nekim slučajevima, to može biti pitanje života i smrti.  
  Važno je napomenuti da prihod od prodaje ove knjige ide u podršku Fondaciji za ljudska prava, naglašavajući autorovu Commitment za promociju ljudskih prava i finansijske inkluzivnosti.
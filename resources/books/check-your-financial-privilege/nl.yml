title: "Controleer uw financiële privileges"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Check Your Financial Privilege" van Alex Gladstein is een boek dat het snijvlak onderzoekt tussen Bitcoin, mensenrechten, financiële privileges en persoonlijke vrijheid. Met een uniek perspectief belicht Gladstein de ongelijkheden in financiële systemen wereldwijd en hoe deze het leven van individuen beïnvloeden. Hij benadrukt dat geboren worden in een reservevaluta financiële privileges geeft, terwijl de meerderheid van de wereldbevolking te maken heeft met zwakkere systemen.
  Het boek bevat waargebeurde verhalen uit verschillende delen van de wereld. In Nigeria is Bitcoin een reddingslijn geworden voor mensenrechtenactivisten tegenover autoritaire regimes. In Cuba heeft Bitcoin individuen geholpen om door een gedevalueerd valutasysteem te navigeren. In El Salvador biedt Bitcoin hoop door de kosten voor het overmaken van geld te verlagen en snellere transacties mogelijk te maken, vooral nu het een wettig betaalmiddel is geworden.
  Als CSO van de Human Rights Foundation maakt Gladstein gebruik van zijn unieke positie om inzicht te geven in de transformerende kracht van Bitcoin voor individuen buiten de traditionele financiële systemen. Voor veel mensen wereldwijd biedt Bitcoin een ontsnapping aan inflatie, politieke onrust en verouderde monetaire systemen. In sommige gevallen kan het zelfs een kwestie van leven of dood zijn.
  Het is belangrijk op te merken dat de opbrengst van de verkoop van dit boek naar de Human Rights Foundation gaat, wat de Commitment van de auteur onderstreept voor het bevorderen van mensenrechten en financiële inclusiviteit.
  
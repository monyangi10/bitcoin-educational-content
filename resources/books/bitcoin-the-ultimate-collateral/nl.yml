title: "Bitcoin: het ultieme onderpand"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin: The Ultimate Collateral door Martin Connor onderzoekt en vat de gebieden
  van Bitcoin en lenen, en onderzoekt hoe de twee perfect bij elkaar passen
  bij elkaar passen. Met bijdragen van industrie-experts zijn er tal van
  praktijkvoorbeelden van het gebruik van Bitcoin als onderpand voor de financiering van grote zakelijke
  operaties te financieren. Het boek gaat ook uitgebreid in op het Firefish-platform - een
  peer-to-peer marktplaats voor leningen die zowel persoonlijke als zakelijke leningen aanbiedt
  die 2-op-1 gedekt worden door Bitcoin. In dit boek bekijken we hoe bitcoiners en Bitcoin
  bedrijven de grootst mogelijke waarde uit hun Bitcoin kunnen halen, zonder het te
  te verkopen.
title: "L'Évolution économique du XIXe siècle: Théorie du Progrès"
publication_year: 1880
cover: cover_fr.webp
original: false
description: |
  Molinari's Economic Evolution of the 19th Century: Theory of Progress traces the extraordinary material and moral advances of the 1800s and attributes them to the expansion of economic freedom. He argues that progress is not automatic but depends on the institutional framework — above all, on the security of property and the freedom of exchange.

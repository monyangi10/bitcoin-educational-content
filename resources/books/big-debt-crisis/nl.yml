title: "Grote schuldencrisis"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Big Debt Crises" van Ray Dalio is een uitgebreide studie van schuldencrises die economieën door de geschiedenis heen hebben getroffen. Het boek biedt inzicht in de oorzaken, mechanismen en resultaten van schuldencrises en legt uit hoe je er doorheen kunt navigeren. Het bevat casestudies van crises uit het verleden, zoals de Grote Depressie en de financiële crisis van 2008, en biedt praktisch advies voor beleidsmakers en investeerders om schuldencrises effectief te beheersen. Het boek is geschreven in een heldere en toegankelijke stijl voor gevorderde financiële studenten, waardoor het een waardevolle bron is voor iedereen die geïnteresseerd is in het begrijpen van de dynamiek van schuldencrises en hun invloed op de economie.
title: "Velika dužnička kriza"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  "Big Debt Crises" od Ray Dalio je sveobuhvatna studija o dužničkim krizama koje su uticale na ekonomije kroz istoriju. Knjiga nudi uvide u uzroke, mehanizme i ishode dužničkih kriza, i objašnjava kako se kroz njih kretati. Uključuje studije slučaja prošlih kriza, kao što su Velika depresija i finansijska kriza iz 2008. godine, i nudi praktične savete za kreatore politika i investitore kako efikasno upravljati dužničkim krizama. Knjiga je napisana jasnim i pristupačnim stilom za napredne studente finansija, što je čini vrednim resursom za svakoga ko je zainteresovan za razumevanje dinamike dužničkih kriza i njihovog uticaja na ekonomiju.
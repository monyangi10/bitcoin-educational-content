title: "Mgogoro wa deni kubwa"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Big Debt Crises" kilichoandikwa na Ray Dalio ni utafiti wa kina wa migogoro ya madeni ambayo imeathiri uchumi katika historia yote. Kitabu hiki kinatoa maarifa kuhusu sababu, mbinu na matokeo ya migogoro ya madeni, na kinaeleza jinsi ya kuyapitia. Inajumuisha tafiti za matukio ya zamani, kama vile Unyogovu Kubwa na 2008 kwa ajili ya kudhibiti mgogoro wa kifedha kwa watunga sera. kwa mtindo ulio wazi na unaoweza kufikiwa kwa wanafunzi wa hali ya juu wa kifedha, na kuifanya kuwa rasilimali muhimu kwa mtu yeyote anayetaka kuelewa mienendo ya migogoro ya madeni na athari zake kwa uchumi.
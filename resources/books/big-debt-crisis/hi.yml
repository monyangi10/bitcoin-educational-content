title: "बड़ा ऋण संकट"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  रे डालियो द्वारा लिखित "बिग डेट क्राइसिस" ऋण संकटों का एक व्यापक अध्ययन है जिसने पूरे इतिहास में अर्थव्यवस्थाओं को प्रभावित किया है। यह पुस्तक ऋण संकटों के कारणों, तंत्रों और परिणामों के बारे में अंतर्दृष्टि प्रदान करती है, और बताती है कि उनसे कैसे निपटा जाए। इसमें पिछले संकटों, जैसे कि महामंदी और 2008 के वित्तीय संकट के मामले के अध्ययन शामिल हैं, और नीति निर्माताओं और निवेशकों को ऋण संकटों को प्रभावी ढंग से प्रबंधित करने के लिए व्यावहारिक सलाह प्रदान करता है। पुस्तक उन्नत वित्त छात्रों के लिए एक स्पष्ट और सुलभ शैली में लिखी गई है, जो इसे ऋण संकटों की गतिशीलता और अर्थव्यवस्था पर उनके प्रभाव को समझने में रुचि रखने वाले किसी भी व्यक्ति के लिए एक मूल्यवान संसाधन बनाती है।
title: "Księżyc jest surową panią"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  The Moon is a Harsh Mistress Roberta A. Heinleina to powieść science fiction poruszająca tematy polityki, rewolucji i eksploracji kosmosu. Akcja rozgrywa się w 2075 roku na Księżycu i opowiada o walce księżycowej kolonii o niezależność od Ziemi. Narratorem powieści jest technik komputerowy Manuel Garcia O'Kelly-Davis, który staje się kluczowym uczestnikiem rebelii. Powieść znana jest z żywego portretu życia na Księżycu, złożonych postaci oraz eksploracji teorii politycznej i etyki. Jest uważana za klasykę gatunku science fiction i chwalona za pomysłowe budowanie świata i prowokujące do myślenia pomysły.
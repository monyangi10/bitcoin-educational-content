title: "Mesec je surova ljubavnica"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  Mesec je surova ljubavnica Roberta A. Hajnlajna je naučnofantastični roman koji istražuje teme politike, revolucije i istraživanja svemira. Radnja je smeštena u 2075. godinu na Mesecu i priča priču o borbi lunarne kolonije za nezavisnost od Zemlje. Priču pripoveda kompjuterski tehničar, Manuel Garsija O'Keli-Dejvis, koji postaje ključni igrač u pobuni. Roman je poznat po živopisnom prikazu života na Mesecu, složenim likovima i istraživanju političke teorije i etike. Smatra se klasikom naučnofantastičnog žanra i hvaljen je zbog svoje maštovite izgradnje sveta i ideja koje podstiču na razmišljanje.
title: "Mwezi ni Bibi Mkali"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  The Moon is a Harsh Bibi na Robert A. Heinlein ni riwaya ya uongo ya sayansi ambayo inachunguza mada za siasa, mapinduzi, na uchunguzi wa anga. Imewekwa katika mwaka wa 2075 juu ya mwezi, inasimulia hadithi ya mapambano ya koloni ya mwezi kwa ajili ya uhuru kutoka kwa Dunia. Hadithi hiyo inasimuliwa na fundi wa kompyuta, Manuel Garcia O'Kelly-Davis, ambaye anakuwa mhusika mkuu katika uasi huo. Riwaya hiyo inajulikana kwa usawiri wake wazi wa maisha kwenye mwezi, wahusika wake changamano, na uchunguzi wake wa nadharia ya kisiasa na maadili. Inachukuliwa kuwa ya asili ya aina ya hadithi za kisayansi na imesifiwa kwa mawazo yake ya ubunifu ya kujenga ulimwengu na kuchochea fikira.
title: "चन्द्रमा एक कठोर मालकिन है"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  रॉबर्ट ए. हेनलेन द्वारा लिखित द मून इज ए हार्श मिस्ट्रेस एक विज्ञान कथा उपन्यास है जो राजनीति, क्रांति और अंतरिक्ष अन्वेषण के विषयों की खोज करता है। वर्ष 2075 में चंद्रमा पर सेट, यह पृथ्वी से स्वतंत्रता के लिए एक चंद्र कॉलोनी की लड़ाई की कहानी बताता है। कहानी एक कंप्यूटर तकनीशियन, मैनुअल गार्सिया ओ'केली-डेविस द्वारा सुनाई गई है, जो विद्रोह में एक प्रमुख खिलाड़ी बन जाता है। यह उपन्यास चंद्रमा पर जीवन के अपने विशद चित्रण, इसके जटिल पात्रों और राजनीतिक सिद्धांत और नैतिकता की खोज के लिए जाना जाता है। इसे विज्ञान कथा शैली का एक क्लासिक माना जाता है और इसकी कल्पनाशील दुनिया-निर्माण और विचारोत्तेजक विचारों के लिए इसकी प्रशंसा की गई है।
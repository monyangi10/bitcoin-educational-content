title: "De maan is een harde meesteres"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  The Moon is a Harsh Mistress van Robert A. Heinlein is een sciencefictionroman over politiek, revolutie en ruimteverkenning. Het speelt zich af in het jaar 2075 op de maan en vertelt het verhaal van de strijd van een maankolonie voor onafhankelijkheid van de aarde. Het verhaal wordt verteld door een computertechnicus, Manuel Garcia O'Kelly-Davis, die een belangrijke speler wordt in de opstand. De roman staat bekend om zijn levendige weergave van het leven op de maan, zijn complexe personages en zijn verkenning van politieke theorie en ethiek. Het wordt beschouwd als een klassieker in het sciencefictiongenre en wordt geprezen om zijn fantasierijke wereldopbouw en tot nadenken stemmende ideeën.
title: 「月亮是個嚴厲的情婦」
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  Robert A. Heinlein 所著的《The Moon is a Harsh Mistress》是一部探索政治、革命和太空探索主題的科幻小說。故事發生在 2075 年的月球上，講述一個月球殖民地爭取脫離地球獨立的故事。故事由電腦技術員 Manuel Garcia O'Kelly-Davis 娓娓道來，他成為叛亂的關鍵人物。這本小說以生動描繪月球上的生活、複雜的人物性格以及對政治理論和倫理道德的探索而聞名。它被視為科幻小說類型的經典，並因其富有想像力的世界建構和發人深省的思想而備受推崇。
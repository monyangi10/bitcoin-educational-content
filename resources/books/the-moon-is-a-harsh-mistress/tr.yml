title: "Ay Sert Bir Metres"
publication_year: 1966
cover: cover_en.webp
original: true
description: |
  Robert A. Heinlein'ın yazdığı Ay Sert Bir Metres, politika, devrim ve uzay araştırmaları temalarını işleyen bir bilim kurgu romanıdır. 2075 yılında Ay'da geçen roman, bir Ay kolonisinin Dünya'dan bağımsızlık için verdiği mücadeleyi anlatır. Hikaye, isyanda kilit bir oyuncu haline gelen Manuel Garcia O'Kelly-Davis adlı bir bilgisayar teknisyeni tarafından anlatılıyor. Roman, Ay'daki yaşamın canlı tasviri, karmaşık karakterleri ve politik teori ve etiği keşfetmesiyle bilinir. Bilim kurgu türünün bir klasiği olarak kabul edilir ve yaratıcı dünya inşası ve düşündürücü fikirleri nedeniyle övgüler alır.
title: "Tym razem jest inaczej - osiem wieków finansowego szaleństwa"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  This Time Is Different, Eight Centuries of Financial Folly autorstwa Carmen M. Reinhart i Kennetha S. Rogoffa to kompleksowe studium kryzysów finansowych na przestrzeni dziejów. Autorzy analizują przyczyny i konsekwencje kryzysów finansowych, od kryzysu bankowego w średniowiecznej Europie po kryzys mieszkaniowy i kredytowy w XXI wieku. Argumentują, że kryzysy finansowe są powtarzającą się cechą współczesnych gospodarek, napędzaną przez wspólne czynniki, takie jak nadmierne pożyczki, bańki aktywów i luźne regulacje finansowe. Poprzez swoją analizę autorzy oferują wgląd w wyzwania stojące przed decydentami i inwestorami, gdy poruszają się po złożonym świecie finansów. Książka jest cennym źródłem informacji dla każdego, kto chce zrozumieć historię i przyszłość kryzysów finansowych.
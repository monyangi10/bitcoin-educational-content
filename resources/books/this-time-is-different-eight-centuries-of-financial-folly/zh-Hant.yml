title: 「這次不一樣 八個世紀的金融愚蠢」
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  Carmen M. Reinhart 和 Kenneth S. Rogoff 所著的《這次不一樣，八世紀的金融蠢事》（This Time Is Different, Eight Centuries of Financial Folly）是對歷史上金融危機的全面研究。從中世紀歐洲的銀行危機到 21 世紀的房地產和信貸危機，作者研究了金融危機的原因和後果。他們認為，在過度借貸、資產泡沫和金融監管不力等共同因素的推動下，金融危機是現代經濟中經常出現的現象。透過分析，作者對政策制定者和投資者在複雜的金融世界中所面臨的挑戰提出了真知灼見。對於想要瞭解金融危機的歷史和未來的人來說，這本書是非常有價值的資源。
title: "Ovaj put je drugačije: Osam vekova finansijske ludosti"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  Ovaj put je drugačije, Osam vekova finansijskih ludosti od Carmen M. Reinhart i Kenneth S. Rogoff je sveobuhvatna studija finansijskih kriza kroz istoriju. Autori ispituju uzroke i posledice finansijskih kriza, od bankarske krize srednjovekovne Evrope do stambene i kreditne krize 21. veka. Oni tvrde da su finansijske krize ponavljajuća karakteristika modernih ekonomija, vođene zajedničkim faktorima kao što su prekomerno zaduživanje, baloni imovine i slaba finansijska regulacija. Kroz svoju analizu, autori nude uvide u izazove sa kojima se suočavaju donosioci politika i investitori dok se kreću kroz složeni svet finansija. Knjiga je vredan resurs za svakoga ko želi da razume istoriju i budućnost finansijskih kriza.
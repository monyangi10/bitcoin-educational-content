title: "इस बार अलग है आठ शताब्दियों की वित्तीय मूर्खता"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  कारमेन एम. रेनहार्ट और केनेथ एस. रोगॉफ़ द्वारा लिखित यह पुस्तक, आठ शताब्दियों की वित्तीय मूर्खता, इतिहास में वित्तीय संकटों का एक व्यापक अध्ययन है। लेखक मध्ययुगीन यूरोप के बैंकिंग संकट से लेकर 21वीं सदी के आवास और ऋण संकट तक, वित्तीय संकटों के कारणों और परिणामों की जांच करते हैं। उनका तर्क है कि वित्तीय संकट आधुनिक अर्थव्यवस्थाओं की एक आवर्ती विशेषता है, जो अत्यधिक उधार, परिसंपत्ति बुलबुले और ढीले वित्तीय विनियमन जैसे सामान्य कारकों से प्रेरित है। अपने विश्लेषण के माध्यम से, लेखक नीति निर्माताओं और निवेशकों के सामने आने वाली चुनौतियों के बारे में जानकारी देते हैं क्योंकि वे वित्त की जटिल दुनिया में आगे बढ़ते हैं। यह पुस्तक वित्तीय संकटों के इतिहास और भविष्य को समझने की चाह रखने वाले किसी भी व्यक्ति के लिए एक मूल्यवान संसाधन है।
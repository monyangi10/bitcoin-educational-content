title: "Deze keer is het anders Acht eeuwen financiële dwaasheid"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  This Time Is Different, Eight Centuries of Financial Folly van Carmen M. Reinhart en Kenneth S. Rogoff is een uitgebreide studie van financiële crises door de geschiedenis heen. De auteurs onderzoeken de oorzaken en gevolgen van financiële crises, van de bankencrisis in middeleeuws Europa tot de huizen- en kredietcrisis van de 21e eeuw. Ze stellen dat financiële crises een terugkerend kenmerk zijn van moderne economieën, gedreven door gemeenschappelijke factoren zoals overmatig lenen, zeepbellen van activa en lakse financiële regelgeving. Door hun analyse bieden de auteurs inzicht in de uitdagingen waarmee beleidsmakers en investeerders worden geconfronteerd wanneer ze door de complexe financiële wereld navigeren. Het boek is een waardevolle bron voor iedereen die de geschiedenis en de toekomst van financiële crises wil begrijpen.
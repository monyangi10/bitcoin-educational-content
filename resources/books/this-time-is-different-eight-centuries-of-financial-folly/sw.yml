title: "Wakati Huu ni Tofauti Karne Nane za Ujinga wa Kifedha"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  Wakati Huu ni Tofauti, Karne Nane za Ujinga wa Kifedha na Carmen M. Reinhart na Kenneth S. Rogoff ni utafiti wa kina wa migogoro ya kifedha katika historia. Waandishi huchunguza sababu na matokeo ya mizozo ya kifedha, kutoka kwa shida ya benki ya Ulaya ya kati hadi shida ya makazi na mikopo ya karne ya 21. Wanasema kuwa mizozo ya kifedha ni kipengele cha mara kwa mara cha uchumi wa kisasa, unaotokana na mambo ya kawaida kama vile kukopa kupindukia, viputo vya mali, na ulegevu wa udhibiti wa kifedha. Kupitia uchanganuzi wao, waandishi hutoa maarifa kuhusu changamoto zinazowakabili watunga sera na wawekezaji wanapopitia ulimwengu mgumu wa fedha. Kitabu hiki ni nyenzo muhimu kwa yeyote anayetaka kuelewa historia na mustakabali wa migogoro ya kifedha.
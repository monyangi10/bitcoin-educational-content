title: "Bu Sefer Farklı Sekiz Asırlık Finansal Ahmaklık"
publication_year: 2009
cover: cover_en.webp
original: true
description: |
  Carmen M. Reinhart ve Kenneth S. Rogoff tarafından kaleme alınan Bu Sefer Farklı, Sekiz Asırlık Finansal Çılgınlık, tarih boyunca yaşanan finansal krizler üzerine kapsamlı bir çalışma. Yazarlar, Ortaçağ Avrupa'sındaki bankacılık krizinden 21. yüzyılın konut ve kredi krizine kadar finansal krizlerin nedenlerini ve sonuçlarını incelemektedir. Finansal krizlerin modern ekonomilerin tekrar eden bir özelliği olduğunu ve aşırı borçlanma, varlık balonları ve gevşek finansal düzenlemeler gibi ortak faktörlerden kaynaklandığını savunuyorlar. Yazarlar, analizleri aracılığıyla, karmaşık finans dünyasında yollarını bulmaya çalışan politika yapıcıların ve yatırımcıların karşılaştıkları zorluklara dair içgörüler sunmaktadır. Kitap, finansal krizlerin tarihini ve geleceğini anlamak isteyen herkes için değerli bir kaynaktır.
title: "Gerçek İsimler"
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  Vernor Vinge'in Gerçek İsimler'i sanal gerçeklik, yapay zeka ve fiziksel ve dijital dünyalar arasındaki bulanık çizginin etkilerini araştıran bir bilim kurgu romanıdır. Roman, insanların "Öteki Düzlem" adı verilen ortak bir sanal alanda birbirleriyle etkileşime girebildikleri yakın bir gelecekte geçmektedir. Başkahraman "Bay Kaygan", sanal dünyanın temelini tehdit eden tehlikeli bir komployu keşfeden yetenekli bir hackerdır. Hikaye kimlik, mahremiyet ve teknolojinin her şeyi mümkün kıldığı bir dünyada yaşamanın sonuçları gibi temaları ele alıyor. Genel olarak, "Gerçek İsimler" teknolojik olarak gelişmiş bir geleceğin olasılıkları ve tehlikeleri üzerine sürükleyici ve düşündürücü bir keşif.
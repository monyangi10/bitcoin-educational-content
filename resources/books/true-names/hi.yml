title: "सच्चे नाम"
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  वर्नर विंगे द्वारा लिखित ट्रू नेम्स एक विज्ञान कथा उपन्यास है जो आभासी वास्तविकता, कृत्रिम बुद्धिमत्ता और भौतिक और डिजिटल दुनिया के बीच धुंधली रेखा के निहितार्थों की खोज करता है। यह निकट भविष्य में सेट है जहाँ लोग "द अदर प्लेन" नामक एक साझा आभासी स्थान में एक दूसरे के साथ बातचीत कर सकते हैं। नायक, "मिस्टर स्लिपरी", एक कुशल हैकर है जो एक खतरनाक साजिश का पता लगाता है जो आभासी दुनिया की नींव को खतरे में डालती है। कहानी पहचान, गोपनीयता और ऐसी दुनिया में रहने के परिणामों के विषयों पर गहराई से चर्चा करती है जहाँ तकनीक ने कुछ भी संभव बना दिया है। कुल मिलाकर, "ट्रू नेम्स" तकनीकी रूप से उन्नत भविष्य की संभावनाओं और खतरों की एक मनोरंजक और विचारोत्तेजक खोज है।
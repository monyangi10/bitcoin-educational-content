title: "Ware namen"
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  True Names van Vernor Vinge is een sciencefictionnovelle die de implicaties onderzoekt van virtuele realiteit, kunstmatige intelligentie en de vervagende grens tussen de fysieke en digitale wereld. Het speelt zich af in een nabije toekomst waar mensen met elkaar kunnen communiceren in een gedeelde virtuele ruimte genaamd "the Other Plane". De hoofdpersoon, "Mr. Slippery", is een ervaren hacker die een gevaarlijke samenzwering ontdekt die de basis van de virtuele wereld bedreigt. Het verhaal gaat over thema's als identiteit, privacy en de gevolgen van het leven in een wereld waar technologie alles mogelijk heeft gemaakt. Over het geheel genomen is "True Names" een aangrijpende en tot nadenken stemmende verkenning van de mogelijkheden en gevaren van een technologisch geavanceerde toekomst.
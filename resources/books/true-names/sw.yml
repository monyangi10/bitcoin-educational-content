title: "Majina ya Kweli"
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  True Names na Vernor Vinge ni riwaya ya uongo ya kisayansi ambayo inachunguza athari za uhalisia pepe, akili ya bandia, na mstari unaotia ukungu kati ya ulimwengu halisi na wa kidijitali. Imewekwa katika siku za usoni ambapo watu wanaweza kuingiliana katika nafasi pepe iliyoshirikiwa inayoitwa "Ndege Nyingine". Mhusika mkuu, "Bwana Slippery", ni mdukuzi stadi ambaye anagundua njama hatari inayotishia msingi wa ulimwengu pepe. Hadithi inaangazia mada za utambulisho, faragha, na matokeo ya kuishi katika ulimwengu ambapo teknolojia imewezesha chochote. Kwa ujumla, "Majina ya Kweli" ni uchunguzi wa kuvutia na wa kufikiri juu ya uwezekano na hatari za siku zijazo za kiteknolojia.
title: 「真名」
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  Vernor Vinge 所著的《True Names》是一部科幻小說，探討了虛擬現實、人工智慧以及物理世界與數位世界之間模糊界限的影響。故事背景設定在一個近未來的世界，人們可以在一個名為「另一個平面」的共用虛擬空間中互動。主角「Mr. Slippery」是一位技術高超的駭客，他發現了一個威脅虛擬世界根基的危險陰謀。故事深入探讨了身份、隐私以及生活在科技让一切皆有可能的世界中的后果等主题。總而言之，《真名》是一部扣人心弦、發人深省的作品，探索了科技發達的未來的可能性和危險性。
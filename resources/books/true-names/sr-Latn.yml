title: "Prava Imena"
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  "True Names" od Vernor Vinge je naučnofantastična novela koja istražuje implikacije virtuelne stvarnosti, veštačke inteligencije i zamagljene granice između fizičkog i digitalnog sveta. Radnja je smeštena u blisku budućnost gde ljudi mogu međusobno komunicirati u zajedničkom virtuelnom prostoru zvanom "Druga Ravan". Protagonista, "Mr. Slippery", je vešt haker koji otkriva opasnu zaveru koja preti samim temeljima virtuelnog sveta. Priča se bavi temama identiteta, privatnosti i posledicama života u svetu gde je tehnologija omogućila sve. Sve u svemu, "True Names" je uzbudljivo i podsticajno istraživanje mogućnosti i opasnosti tehnološki napredne budućnosti.
title: "Prawdziwe imiona"
publication_year: 1981
cover: cover_en.webp
original: true
description: |
  True Names autorstwa Vernora Vinge'a to powieść science fiction, która bada implikacje wirtualnej rzeczywistości, sztucznej inteligencji i zacierającej się granicy między światem fizycznym i cyfrowym. Akcja rozgrywa się w niedalekiej przyszłości, w której ludzie mogą wchodzić ze sobą w interakcje we wspólnej wirtualnej przestrzeni zwanej "Inną Płaszczyzną". Główny bohater, "Mr. Slippery", jest utalentowanym hakerem, który odkrywa niebezpieczny spisek zagrażający podstawom wirtualnego świata. Historia porusza tematy tożsamości, prywatności i konsekwencji życia w świecie, w którym technologia uczyniła wszystko możliwym. Ogólnie rzecz biorąc, "True Names" to trzymająca w napięciu i prowokująca do myślenia eksploracja możliwości i niebezpieczeństw zaawansowanej technologicznie przyszłości.
title: "Yarının Fiyatı: Deflasyon Neden Bereketli Bir Geleceğin Anahtarıdır?"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Jeff Booth'un "Yarının Fiyatı; Bereketli Bir Geleceğin Anahtarı Neden Deflasyondur?" adlı kitabı teknolojinin ekonomimiz üzerindeki etkisini ve deflasyonu nasıl tetiklediğini inceliyor. Yazar, teknoloji ilerlemeye devam ettikçe ve fiyatlar düştükçe, enflasyon üzerine kurulu mevcut ekonomik sistemimizin giderek sürdürülemez hale geldiğini savunuyor. Kitap, teknolojik inovasyonun tarihini ve tarih boyunca ekonomiler üzerindeki etkisinin yanı sıra enflasyonist bir para sistemine güvenmeye devam etmenin potansiyel sonuçlarını araştırıyor. Ekonomimizin geleceğine ve hızla gelişen teknolojik ortama uyum sağlamak için gerekli olacak değişikliklere düşündürücü bir bakış sunuyor.
title: "De prijs van morgen: Waarom Deflatie de Sleutel is tot een Overvloedige Toekomst"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  The Price of Tomorrow; Why Deflation is the Key to an Abundant Future" van Jeff Booth is een boek dat de impact van technologie op onze economie onderzoekt en hoe dit deflatie in de hand werkt. De auteur stelt dat naarmate de technologie zich blijft ontwikkelen en de prijzen dalen, ons huidige economische systeem, dat gebaseerd is op inflatie, steeds onhoudbaarder wordt. Het boek onderzoekt de geschiedenis van technologische innovatie en de invloed ervan op economieën door de geschiedenis heen, evenals de mogelijke gevolgen van het blijven vertrouwen op een inflatoir monetair systeem. Het biedt een tot nadenken stemmende blik op de toekomst van onze economie en de veranderingen die nodig zullen zijn om ons aan te passen aan een snel veranderend technologisch landschap.
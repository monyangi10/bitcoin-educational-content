title: "Cena sutrašnjice: Zašto je deflacija ključ za obilnu budućnost"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "The Price of Tomorrow; Why Deflation is the Key to an Abundant Future" od Jeff Booth je knjiga koja ispituje uticaj tehnologije na našu ekonomiju i kako ona pokreće deflaciju. Autor tvrdi da kako tehnologija nastavlja da napreduje i cene padaju, naš trenutni ekonomski sistem, koji je izgrađen na inflaciji, postaje sve neodrživiji. Knjiga istražuje istoriju tehnoloških inovacija i njihov uticaj na ekonomije kroz istoriju, kao i potencijalne posledice nastavka oslanjanja na inflacioni monetarni sistem. Ona nudi provokativan pogled na budućnost naše ekonomije i promene koje će biti neophodne da se prilagodimo brzo evoluirajućem tehnološkom pejzažu.
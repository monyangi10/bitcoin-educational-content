title: "Cena jutra: Dlaczego deflacja jest kluczem do obfitej przyszłości"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  The Price of Tomorrow; Why Deflation is the Key to an Abundant Future" autorstwa Jeffa Bootha to książka, która analizuje wpływ technologii na naszą gospodarkę i sposób, w jaki napędza ona deflację. Autor argumentuje, że wraz z postępem technologicznym i spadkiem cen, nasz obecny system gospodarczy, który opiera się na inflacji, staje się coraz bardziej niezrównoważony. Książka bada historię innowacji technologicznych i ich wpływ na gospodarki na przestrzeni dziejów, a także potencjalne konsekwencje dalszego polegania na inflacyjnym systemie monetarnym. Oferuje ona prowokujące do myślenia spojrzenie na przyszłość naszej gospodarki i zmiany, które będą konieczne, aby dostosować się do szybko ewoluującego krajobrazu technologicznego.
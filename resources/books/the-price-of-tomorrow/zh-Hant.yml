title: "明天的價格：為什麼通貨緊縮是豐盛未來的關鍵"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Jeff Booth 所著的《The Price of Tomorrow; Why Deflation is the Key to an Abundant Future》一書，探討了科技對我們經濟的影響，以及科技如何推動通貨緊縮。作者認為，隨著科技不斷進步、價格不斷下降，我們目前建立在通貨膨脹上的經濟體系越來越難以持續。這本書探討了科技創新的歷史及其對歷史上經濟的影響，以及繼續依賴通貨膨脹的貨幣體系的潛在後果。它提供了一個發人深省的角度來看待我們經濟的未來，以及為了適應快速演進的科技環境所必須進行的改變。
title: "कल की कीमत: क्यों अपस्फीति एक समृद्ध भविष्य की कुंजी है"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  जेफ बूथ द्वारा लिखित "द प्राइस ऑफ टुमॉरो; व्हाई डिफ्लेशन इज द की टू एन एबंडेंट फ्यूचर" एक ऐसी पुस्तक है जो हमारी अर्थव्यवस्था पर प्रौद्योगिकी के प्रभाव और यह कैसे अपस्फीति को बढ़ावा दे रही है, इसकी जांच करती है। लेखक का तर्क है कि जैसे-जैसे प्रौद्योगिकी आगे बढ़ रही है और कीमतें गिर रही हैं, हमारी वर्तमान आर्थिक प्रणाली, जो मुद्रास्फीति पर आधारित है, तेजी से अस्थिर होती जा रही है। पुस्तक तकनीकी नवाचार के इतिहास और पूरे इतिहास में अर्थव्यवस्थाओं पर इसके प्रभाव के साथ-साथ मुद्रास्फीतिकारी मौद्रिक प्रणाली पर निर्भर रहने के संभावित परिणामों की पड़ताल करती है। यह हमारी अर्थव्यवस्था के भविष्य और तेजी से विकसित हो रहे तकनीकी परिदृश्य के अनुकूल होने के लिए आवश्यक परिवर्तनों पर एक विचारोत्तेजक नज़रिया प्रस्तुत करती है।
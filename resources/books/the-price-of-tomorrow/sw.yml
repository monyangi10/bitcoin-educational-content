title: "Bei ya Kesho: Kwa nini Kupungua kwa bei ni Ufunguo wa Mustakabali Mwema"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  Bei ya Kesho; Why Deflation is the Key to Abundant Future" kilichoandikwa na Jeff Booth ni kitabu kinachochunguza athari za teknolojia kwa uchumi wetu na jinsi inavyochochea kushuka kwa bei. Mwandishi anabisha kuwa kadiri teknolojia inavyoendelea kukua na bei kushuka, mfumo wetu wa sasa wa uchumi unaojengwa kwa msingi wa mfumuko wa bei unazidi kuwa usio endelevu. Kitabu hiki kinachunguza historia ya teknolojia katika historia yote, pamoja na matokeo ya uvumbuzi unaoendelea na matokeo yake yanayowezekana katika historia ya uvumbuzi na maendeleo yake yanayoendelea. juu ya mfumo wa fedha wa mfumuko wa bei Inatoa mtazamo wa kufikiri juu ya mustakabali wa uchumi wetu na mabadiliko ambayo yatakuwa muhimu ili kukabiliana na mazingira ya kiteknolojia yanayoendelea kwa kasi.
title: "Broken Money: Why Our Financial System is Failing Us and How We Can Make it Better"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Broken Money delves into the evolution of money, emphasizing the pivotal role of
  technology over politics in shaping monetary systems. Lyn Alden guides readers
  through the historical progression of money, from primitive forms like shells to
  modern innovations such as Bitcoin, while providing a foundational understanding
  of what money truly represents. The book highlights the human impact of monetary
  systems, illustrating how new technologies influence societal power dynamics.
  Alden critiques the current global monetary landscape, marked by over 160
  currencies and rampant inflation in various countries, which undermines savings
  and wages. She questions why the monetary system remains inadequate in the 21st
  century and explores emerging technologies that could revolutionize it.
  Ultimately, Broken Money aims to equip readers with the knowledge to analyze and
  compare different monetary technologies and theories, fostering a deeper
  comprehension of money's past, present, and future.

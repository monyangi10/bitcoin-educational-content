title: "Katmanlı Para"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  nik Bhatia tarafından yazılan "Katmanlı Para", paranın takastan Bitcoin gibi dijital para birimlerine evrimini araştıran orta düzey bir kitaptır. Yazar, tek bir ekonomide kullanılan farklı para biçimlerini ifade eden katmanlı para kavramını ve bunun finansal sistemi nasıl etkilediğini açıklıyor. Ayrıca paranın tarihini ve toplumları kontrol etmek için nasıl kullanıldığını da inceliyor. Kitap ayrıca Bitcoin'ın özelliklerini ve geleneksel para biçimlerinden nasıl farklılaştığını da inceliyor. Paranın geleceğine ve Bitcoin'ın finans dünyasında nasıl bir devrim yaratabileceğine dair düşündürücü bir analiz sunuyor.
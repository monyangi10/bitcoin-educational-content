title: "Slojeviti Novac"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Layered Money" by Nik Bhatia je knjiga srednjeg nivoa koja istražuje evoluciju novca od trampe do digitalnih valuta kao što je Bitcoin. Autor objašnjava koncept slojevitog novca, koji se odnosi na različite oblike novca korišćene u jednoj ekonomiji, i kako to utiče na finansijski sistem. Takođe ispituje istoriju novca i kako je korišćen za kontrolu društava. Knjiga se takođe bavi svojstvima Bitcoin i kako se razlikuje od tradicionalnih oblika novca. Pruža analizu koja podstiče na razmišljanje o budućnosti novca i kako bi Bitcoin mogao da revolucionira finansijski svet.
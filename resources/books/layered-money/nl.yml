title: "Gelaagd geld"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Gelaagd geld" van Nik Bhatia is een boek voor gemiddeld niveau dat de evolutie van geld onderzoekt, van ruilhandel tot digitale munteenheden zoals Bitcoin. De auteur legt het concept van gelaagd geld uit. De auteur legt het concept van gelaagd geld uit, dat verwijst naar de verschillende vormen van geld die in één economie worden gebruikt, en hoe dit het financiële systeem beïnvloedt. Hij onderzoekt ook de geschiedenis van geld en hoe het is gebruikt om samenlevingen te controleren. Het boek gaat ook in op de eigenschappen van Bitcoin en hoe het verschilt van traditionele vormen van geld. Het biedt een tot nadenken stemmende analyse van de toekomst van geld en hoe Bitcoin een revolutie teweeg zou kunnen brengen in de financiële wereld.
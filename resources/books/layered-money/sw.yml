title: "Pesa zilizopangwa"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Layered Money" cha Nik Bhatia ni kitabu cha kiwango cha kati kinachochunguza mageuzi ya pesa kutoka kubadilishana fedha hadi sarafu za dijiti kama vile Bitcoin. Mwandishi anaelezea dhana ya pesa iliyopangwa, ambayo inahusu aina tofauti za fedha zinazotumiwa katika uchumi mmoja, na jinsi inavyoathiri mfumo wa kifedha. Pia anachunguza historia ya pesa na jinsi zilivyotumika kudhibiti jamii. Kitabu pia kinaangazia sifa za Bitcoin na jinsi inavyotofautiana na aina za pesa za kitamaduni. Inatoa uchanganuzi wenye kuchochea fikira wa siku zijazo za pesa na jinsi Bitcoin inaweza kuleta mapinduzi katika ulimwengu wa kifedha.
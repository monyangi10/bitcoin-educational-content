title: "स्तरित धन"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  निक भाटिया द्वारा लिखित "लेयर्ड मनी" एक मध्यवर्ती स्तर की पुस्तक है जो वस्तु विनिमय से लेकर Bitcoin जैसी डिजिटल मुद्राओं तक के पैसे के विकास की खोज करती है। लेखक लेयर्ड मनी की अवधारणा को समझाता है, जो एक ही अर्थव्यवस्था में इस्तेमाल किए जाने वाले पैसे के विभिन्न रूपों को संदर्भित करता है, और यह वित्तीय प्रणाली को कैसे प्रभावित करता है। वह पैसे के इतिहास की भी जांच करता है और समाजों को नियंत्रित करने के लिए इसका उपयोग कैसे किया गया है। पुस्तक Bitcoin के गुणों और यह पैसे के पारंपरिक रूपों से कैसे भिन्न है, इस पर भी गहराई से चर्चा करती है। यह पैसे के भविष्य और Bitcoin वित्तीय दुनिया में कैसे क्रांति ला सकता है, इसका एक विचारोत्तेजक विश्लेषण प्रदान करता है।
title: "Pieniądze warstwowe"
publication_year: 2020
cover: cover_en.webp
original: true
description: |
  "Layered Money" autorstwa Nika Bhatii to książka na poziomie średnio zaawansowanym, która bada ewolucję pieniądza od barteru do walut cyfrowych, takich jak Bitcoin. Autor wyjaśnia koncepcję pieniądza warstwowego, która odnosi się do różnych form pieniądza używanych w jednej gospodarce i jak wpływa to na system finansowy. Analizuje również historię pieniądza i sposób, w jaki był on wykorzystywany do kontrolowania społeczeństw. Książka zagłębia się również we właściwości Bitcoin i to, czym różni się on od tradycyjnych form pieniądza. Zapewnia prowokującą do myślenia analizę przyszłości pieniądza i tego, jak Bitcoin może zrewolucjonizować świat finansów.
title: "Nema elektrona"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  Ne Postoje Elektroni od Ken Amdahl je knjiga koja izaziva tradicionalni način podučavanja i učenja o električnoj energiji i elektronici. Umesto da se fokusira na apstraktne pojmove i matematičke jednačine, Amdahl koristi jednostavan jezik i primere iz svakodnevnog života kako bi objasnio kako električna energija funkcioniše u našem svakodnevnom životu. Takođe istražuje etičke implikacije tehnološkog napretka i kako oni utiču na društvo. Knjiga podstiče čitaoce da kritički razmišljaju o odnosu između tehnologije, ekonomije i etike.
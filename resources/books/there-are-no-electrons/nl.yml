title: "Er zijn geen elektronen"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  There Are No Electrons van Kenn Amdahl is een boek dat de traditionele manier van lesgeven en leren over elektriciteit en elektronica uitdaagt. In plaats van zich te richten op abstracte concepten en wiskundige vergelijkingen, gebruikt Amdahl eenvoudige taal en herkenbare voorbeelden om uit te leggen hoe elektriciteit in ons dagelijks leven werkt. Hij onderzoekt ook de ethische implicaties van technologische ontwikkelingen en hoe deze de samenleving beïnvloeden. Het boek moedigt lezers aan om kritisch na te denken over de relatie tussen technologie, economie en ethiek.
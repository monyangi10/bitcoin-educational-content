title: "Hakuna elektroni"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  Hakuna Elektroni kilichoandikwa na Kenn Amdahl ni kitabu kinachopinga njia ya jadi ya kufundisha na kujifunza kuhusu umeme na vifaa vya elektroniki. Badala ya kuzingatia dhana dhahania na milinganyo ya hisabati, Amdahl anatumia lugha rahisi na mifano inayohusiana kueleza jinsi umeme unavyofanya kazi katika maisha yetu ya kila siku. Pia anachunguza athari za kimaadili za maendeleo ya kiteknolojia na jinsi yanavyoathiri jamii. Kitabu hiki kinawahimiza wasomaji kufikiria kwa kina kuhusu uhusiano kati ya teknolojia, uchumi na maadili.
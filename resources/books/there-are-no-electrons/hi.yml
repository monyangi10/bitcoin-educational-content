title: "कोई इलेक्ट्रॉन नहीं हैं"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  केन एम्डल द्वारा लिखित ‘देअर आर नो इलेक्ट्रॉन्स’ एक ऐसी पुस्तक है जो बिजली और इलेक्ट्रॉनिक्स के बारे में पढ़ाने और सीखने के पारंपरिक तरीके को चुनौती देती है। अमूर्त अवधारणाओं और गणितीय समीकरणों पर ध्यान केंद्रित करने के बजाय, एम्डल सरल भाषा और संबंधित उदाहरणों का उपयोग करके यह समझाते हैं कि बिजली हमारे दैनिक जीवन में कैसे काम करती है। वह तकनीकी प्रगति के नैतिक निहितार्थों और समाज पर उनके प्रभाव के बारे में भी बताते हैं। यह पुस्तक पाठकों को प्रौद्योगिकी, अर्थशास्त्र और नैतिकता के बीच संबंधों के बारे में गंभीरता से सोचने के लिए प्रोत्साहित करती है।
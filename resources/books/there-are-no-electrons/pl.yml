title: "Nie ma elektronów"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  There Are No Electrons autorstwa Kenna Amdahla to książka, która rzuca wyzwanie tradycyjnemu sposobowi nauczania i uczenia się o elektryczności i elektronice. Zamiast skupiać się na abstrakcyjnych koncepcjach i równaniach matematycznych, Amdahl używa prostego języka i zrozumiałych przykładów, aby wyjaśnić, jak działa elektryczność w naszym codziennym życiu. Bada również etyczne implikacje postępu technologicznego i jego wpływ na społeczeństwo. Książka zachęca czytelników do krytycznego myślenia o związkach między technologią, ekonomią i etyką.
title: "Elektron Yoktur"
publication_year: 1991
cover: cover_en.webp
original: true
description: |
  Kenn Amdahl tarafından yazılan Elektron Yoktur, elektrik ve elektronik hakkında geleneksel öğretme ve öğrenme yöntemlerine meydan okuyan bir kitaptır. Amdahl, soyut kavramlara ve matematiksel denklemlere odaklanmak yerine, elektriğin günlük hayatımızda nasıl çalıştığını açıklamak için basit bir dil ve ilişkilendirilebilir örnekler kullanıyor. Ayrıca teknolojik gelişmelerin etik sonuçlarını ve toplumu nasıl etkilediğini de araştırıyor. Kitap, okuyucuları teknoloji, ekonomi ve etik arasındaki ilişki hakkında eleştirel düşünmeye teşvik ediyor.
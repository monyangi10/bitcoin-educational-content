title: "Gefopt door willekeur"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Fooled By Randomness" is een boek geschreven door Nassim Nicholas Taleb dat de impact van willekeur en waarschijnlijkheid op ons leven onderzoekt, vooral in de financiële wereld. Taleb betoogt dat mensen niet gemaakt zijn om probabilistisch te denken en dat we daarom vaak onjuiste aannames doen over de oorzaken van succes en mislukking. Hij geeft voorbeelden uit de financiële wereld en het dagelijks leven om te illustreren hoe willekeur een belangrijke rol speelt in ons leven en geeft suggesties om beter om te gaan met deze onzekerheid. Het boek daagt lezers uit om hun benadering van besluitvorming te heroverwegen en na te denken over de rol van willekeur in hun leven.
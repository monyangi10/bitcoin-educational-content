title: "Rastlantısallık Tarafından Kandırılmak"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Fooled By Randomness", Nassim Nicholas Taleb tarafından yazılmış, rastlantısallık ve olasılığın hayatlarımız, özellikle de finans dünyası üzerindeki etkisini inceleyen bir kitaptır. Taleb, insanların olasılıksal düşünmek için yaratılmadığını ve bu nedenle başarı ve başarısızlığın nedenleri hakkında sıklıkla yanlış varsayımlarda bulunduğumuzu savunuyor. Rastlantısallığın hayatımızda nasıl önemli bir rol oynadığını göstermek için finans ve günlük yaşamdan örnekler veriyor ve bu belirsizlikle nasıl daha iyi başa çıkabileceğimize dair öneriler sunuyor. Kitap, okuyucuları karar verme yaklaşımlarını yeniden değerlendirmeye ve rastlantısallığın hayatlarındaki rolünü göz önünde bulundurmaya davet ediyor.
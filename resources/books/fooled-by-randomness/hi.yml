title: "यादृच्छिकता से मूर्ख बनाया गया"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "फ़ूल्ड बाय रैंडमनेस" नासिम निकोलस तालेब द्वारा लिखी गई एक किताब है जो हमारे जीवन पर, विशेष रूप से वित्तीय दुनिया में यादृच्छिकता और संभाव्यता के प्रभाव की पड़ताल करती है। तालेब का तर्क है कि मनुष्य संभाव्यता के आधार पर सोचने के लिए तैयार नहीं है, और इसलिए हम अक्सर सफलता और असफलता के कारणों के बारे में गलत धारणाएँ बना लेते हैं। वह वित्त और रोज़मर्रा की ज़िंदगी से उदाहरण देते हैं कि कैसे यादृच्छिकता हमारे जीवन में महत्वपूर्ण भूमिका निभाती है और इस अनिश्चितता से बेहतर तरीके से निपटने के लिए सुझाव देते हैं। यह किताब पाठकों को निर्णय लेने के अपने दृष्टिकोण का पुनर्मूल्यांकन करने और अपने जीवन में यादृच्छिकता की भूमिका पर विचार करने के लिए चुनौती देती है।
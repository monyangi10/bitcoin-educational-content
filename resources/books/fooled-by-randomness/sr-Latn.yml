title: "Fooled by Randomness"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Knjiga 'Fooled By Randomness' autora Nassima Nicholasa Taleba istražuje uticaj nasumičnosti i verovatnoće na naše živote, posebno u finansijskom svetu. Taleb tvrdi da ljudi nisu prirodno skloni razmišljanju u terminima verovatnoće, te stoga često donosimo pogrešne pretpostavke o uzrocima uspeha i neuspeha. On pruža primere iz finansija i svakodnevnog života kako bi ilustrovao kako nasumičnost igra značajnu ulogu u našim životima i nudi sugestije kako bolje navigirati ovom neizvesnošću. Knjiga izaziva čitaoce da preispitaju svoj pristup donošenju odluka i razmotre ulogu nasumičnosti u svojim životima."
title: "Fooled by Randomness"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Fooled By Randomness」是 Nassim Nicholas Taleb 所寫的一本書，探討隨機性和概率對我們生活的影響，尤其是在金融世界。Taleb 認為，人類的思考方式並非以概率為基礎，因此我們經常對成功和失敗的原因做出錯誤的假設。他從金融和日常生活中舉例說明隨機性如何在我們的生活中扮演重要的角色，並提供如何更好地駕馭這種不確定性的建議。本書挑戰讀者重新評估他們的決策方法，並思考隨機性在生活中的角色。
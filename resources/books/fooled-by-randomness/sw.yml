title: "Kupumbazwa na Nasibu"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Fooled By Randomness" ni kitabu kilichoandikwa na Nassim Nicholas Taleb ambacho kinachunguza athari za nasibu na uwezekano katika maisha yetu, hasa katika ulimwengu wa kifedha. Taleb anasema kwamba wanadamu hawana waya kufikiri kwa uwezekano, na kwa hiyo mara nyingi tunafanya mawazo yasiyo sahihi kuhusu sababu za mafanikio na kushindwa. Anatoa mifano kutoka kwa fedha na maisha ya kila siku ili kuonyesha jinsi ubahatishaji unavyochukua jukumu muhimu katika maisha yetu na anatoa mapendekezo ya jinsi ya kuabiri kutokuwa na uhakika huku. Kitabu hiki kinatoa changamoto kwa wasomaji kutathmini upya mbinu yao ya kufanya maamuzi na kuzingatia dhima ya kubahatisha maishani mwao.
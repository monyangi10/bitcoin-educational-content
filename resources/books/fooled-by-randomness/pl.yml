title: "Oszukany przez losowość"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Fooled By Randomness" to książka napisana przez Nassima Nicholasa Taleba, która bada wpływ losowości i prawdopodobieństwa na nasze życie, zwłaszcza w świecie finansów. Taleb argumentuje, że ludzie nie są przystosowani do myślenia probabilistycznego, a zatem często przyjmujemy błędne założenia dotyczące przyczyn sukcesu i porażki. Podaje przykłady z finansów i życia codziennego, aby zilustrować, jak losowość odgrywa znaczącą rolę w naszym życiu i oferuje sugestie, jak lepiej radzić sobie z tą niepewnością. Książka ta stanowi wyzwanie dla czytelników, aby przewartościowali swoje podejście do podejmowania decyzji i rozważyli rolę losowości w swoim życiu.
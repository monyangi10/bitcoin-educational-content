title: "Mitambo ya Uhuru: Mwongozo wa Ubepari Mkubwa"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  The Machinery of Freedom, Guide to a Radical Capitalism cha David D. Friedman ni kitabu kinachochunguza wazo la anarcho-capitalism, falsafa ya kisiasa ambayo inatetea jamii isiyo na utaifa ambapo bidhaa na huduma zote, pamoja na sheria na usalama, hutolewa na soko huria. Friedman anasema kuwa kuingilia kati kwa serikali katika uchumi kunaleta madhara zaidi kuliko manufaa, na kwamba jamii yenye msingi wa Exchange ya hiari na uwajibikaji wa mtu binafsi itakuwa na ufanisi zaidi na haki. Kitabu hiki ni ukosoaji unaochochea fikira wa mifumo ya kitamaduni ya kisiasa na kiuchumi, na hutoa maono ya kulazimisha kwa njia tofauti kabisa ya kuandaa jamii.
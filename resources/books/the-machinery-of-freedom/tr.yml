title: "Özgürlük Makineleri: Radikal Kapitalizm Rehberi"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  David D. Friedman'ın Özgürlük Makineleri, Radikal Kapitalizm Rehberi adlı kitabı, hukuk ve güvenlik de dahil olmak üzere tüm mal ve hizmetlerin serbest piyasa tarafından sağlandığı devletsiz bir toplumu savunan bir siyasi felsefe olan anarko-kapitalizm fikrini inceleyen bir kitaptır. Friedman, devletin ekonomiye müdahalesinin yarardan çok zarar getirdiğini ve gönüllü Exchange ve bireysel sorumluluğa dayalı bir toplumun daha verimli ve adil olacağını savunmaktadır. Kitap, geleneksel siyasi ve ekonomik sistemlere yönelik düşündürücü bir eleştiri niteliği taşımakta ve toplumu düzenlemeye yönelik kökten farklı bir yaklaşım için ikna edici bir vizyon sunmaktadır.
title: "स्वतंत्रता की मशीनरी: कट्टरपंथी पूंजीवाद के लिए मार्गदर्शिका"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  डेविड डी. फ्राइडमैन द्वारा लिखित द मशीनरी ऑफ फ्रीडम, गाइड टू ए रेडिकल कैपिटलिज्म एक ऐसी पुस्तक है जो अराजकता-पूंजीवाद के विचार की खोज करती है, एक राजनीतिक दर्शन जो एक राज्यविहीन समाज की वकालत करता है जहाँ कानून और सुरक्षा सहित सभी सामान और सेवाएँ मुक्त बाजार द्वारा प्रदान की जाती हैं। फ्राइडमैन का तर्क है कि अर्थव्यवस्था में सरकारी हस्तक्षेप अच्छे से ज़्यादा नुकसान करता है, और स्वैच्छिक Exchange और व्यक्तिगत ज़िम्मेदारी पर आधारित समाज अधिक कुशल और न्यायपूर्ण होगा। यह पुस्तक पारंपरिक राजनीतिक और आर्थिक प्रणालियों की एक विचारोत्तेजक आलोचना है, और समाज को संगठित करने के लिए एक मौलिक रूप से अलग दृष्टिकोण के लिए एक आकर्षक दृष्टि प्रदान करती है।
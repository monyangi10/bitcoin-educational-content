title: "Maszyny wolności: Przewodnik po radykalnym kapitalizmie"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  The Machinery of Freedom, Guide to a Radical Capitalism autorstwa Davida D. Friedmana to książka, która bada ideę anarchokapitalizmu, filozofii politycznej opowiadającej się za bezpaństwowym społeczeństwem, w którym wszystkie dobra i usługi, w tym prawo i bezpieczeństwo, są dostarczane przez wolny rynek. Friedman argumentuje, że interwencja rządu w gospodarkę przynosi więcej szkody niż pożytku, a społeczeństwo oparte na dobrowolnym Exchange i indywidualnej odpowiedzialności byłoby bardziej wydajne i sprawiedliwe. Książka ta stanowi prowokującą do myślenia krytykę tradycyjnych systemów politycznych i gospodarczych oraz oferuje przekonującą wizję radykalnie odmiennego podejścia do organizacji społeczeństwa.
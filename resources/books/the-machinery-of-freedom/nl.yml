title: "De machine van vrijheid: Gids voor een Radicaal Kapitalisme"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  The Machinery of Freedom, Guide to a Radical Capitalism van David D. Friedman is een boek dat het idee van anarcho-kapitalisme verkent, een politieke filosofie die pleit voor een staatloze samenleving waarin alle goederen en diensten, inclusief recht en veiligheid, worden geleverd door de vrije markt. Friedman stelt dat overheidsinterventie in de economie meer kwaad dan goed doet en dat een maatschappij gebaseerd op vrijwillige Exchange en individuele verantwoordelijkheid efficiënter en rechtvaardiger zou zijn. Het boek is een tot nadenken stemmende kritiek op traditionele politieke en economische systemen en biedt een overtuigende visie voor een radicaal andere benadering van het organiseren van de samenleving.
title: "Mašinerija slobode: Vodič ka radikalnom kapitalizmu"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  The Machinery of Freedom, Guide to a Radical Capitalism by David D. Friedman je knjiga koja istražuje ideju anarho-kapitalizma, političke filozofije koja zagovara društvo bez države u kojem su sva dobra i usluge, uključujući zakon i bezbednost, obezbeđeni slobodnim tržištem. Friedman tvrdi da intervencija vlade u ekonomiji stvara više štete nego koristi, i da bi društvo zasnovano na dobrovoljnom Exchange i individualnoj odgovornosti bilo efikasnije i pravednije. Knjiga je misaono-provokativna kritika tradicionalnih političkih i ekonomskih sistema, i nudi ubedljivu viziju za radikalno drugačiji pristup organizovanju društva.
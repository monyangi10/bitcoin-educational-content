title: "自由的機器：激進資本主義指南"
publication_year: 1973
cover: cover_en.webp
original: true
description: |
  David D. Friedman 所著的《The Machinery of Freedom, Guide to a Radical Capitalism》是一本探討無政府資本主義思想的書籍，無政府資本主義是一種政治哲學，主張建立一個無國家的社會，所有的商品和服務，包括法律和安全，都由自由市場提供。Friedman 認為政府干預經濟弊大於利，而以自願 Exchange 和個人責任為基礎的社會會更有效率、更公正。這本書對傳統的政治和經濟體系進行了發人深省的批判，並提出了一個令人信服的願景，即以截然不同的方式來組織社會。
title: "Moralne argumenty za paliwami kopalnymi"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  The Moral Case for Fossil Fuels autorstwa Alexa Epsteina to książka, która przedstawia kontrargument za dalszym wykorzystaniem paliw kopalnych, pomimo ich negatywnego wpływu na środowisko. Autor twierdzi, że paliwa kopalne odegrały istotną rolę w postępie ludzkości, a wysiłki zmierzające do ich przedwczesnego wycofania byłyby katastrofalne dla gospodarki i środowiska. Epstein podważa wiele powszechnie przyjętych założeń dotyczących paliw kopalnych i argumentuje, że przyniosły one społeczeństwu więcej korzyści niż szkód. Opowiada się również za bardziej obiektywnym, opartym na faktach podejściem do debaty na temat polityki energetycznej. Książka prezentuje prowokujące do myślenia spojrzenie na kontrowersyjny temat i jest polecana czytelnikom zainteresowanym etyką środowiskową, polityką energetyczną i ekonomią.
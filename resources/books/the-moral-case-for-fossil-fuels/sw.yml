title: "Kesi ya Maadili kwa Mafuta ya Kisukuku"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Kesi ya Maadili ya Mafuta ya Kisukuku kilichoandikwa na Alex Epstein ni kitabu kinachowasilisha hoja inayopingana na kuendelea kwa matumizi ya nishati ya visukuku, licha ya athari zake mbaya kwa mazingira. Mwandishi anasisitiza kuwa nishati ya mafuta imekuwa na jukumu muhimu katika maendeleo ya binadamu na kwamba juhudi za kuziondoa kabla ya wakati zitakuwa mbaya kwa uchumi na mazingira. Epstein anapinga mawazo mengi ya kawaida kuhusu nishati ya kisukuku na anasema kwamba yameleta manufaa zaidi kuliko madhara kwa jamii ya binadamu. Pia anatetea mbinu yenye lengo zaidi, yenye msingi wa ukweli wa mjadala kuhusu sera ya nishati. Kitabu hiki kinawasilisha mtazamo unaochochea fikira kuhusu mada yenye utata na kinapendekezwa kwa wasomaji wanaopenda maadili ya mazingira, sera ya nishati na uchumi.
title: "Moralni slučaj za fosilna goriva"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Moralni slučaj za fosilna goriva od Aleksa Epstajna je knjiga koja predstavlja suprotan argument za nastavak korišćenja fosilnih goriva, uprkos njihovom negativnom uticaju na životnu sredinu. Autor tvrdi da su fosilna goriva igrala ključnu ulogu u ljudskom napretku i da bi napori da se ona prerano ukinu bili katastrofalni za ekonomiju i životnu sredinu. Epstajn osporava mnoge uobičajene pretpostavke o fosilnim gorivima i tvrdi da su donela više koristi nego štete ljudskom društvu. Takođe se zalaže za objektivniji, na činjenicama zasnovan pristup debati o energetskoj politici. Knjiga predstavlja perspektivu koja podstiče na razmišljanje o kontroverznoj temi i preporučuje se čitaocima zainteresovanim za etiku životne sredine, energetsku politiku i ekonomiju.
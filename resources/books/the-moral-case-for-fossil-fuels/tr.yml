title: "Fosil Yakıtlar için Ahlaki Dava"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Alex Epstein tarafından yazılan The Moral Case for Fossil Fuels, çevre üzerindeki olumsuz etkilerine rağmen fosil yakıtların kullanılmaya devam edilmesi için karşıt bir argüman sunan bir kitaptır. Yazar, fosil yakıtların insanlığın ilerlemesinde hayati bir rol oynadığını ve bu yakıtların zamanından önce kullanımdan kaldırılmasının ekonomi ve çevre için felaket olacağını iddia etmektedir. Epstein, fosil yakıtlarla ilgili yaygın olarak kabul edilen birçok varsayıma karşı çıkmakta ve bu yakıtların insan toplumuna zarardan çok fayda getirdiğini savunmaktadır. Ayrıca enerji politikası tartışmalarına daha objektif ve gerçeklere dayalı bir yaklaşım getirilmesini savunuyor. Tartışmalı bir konuya düşündürücü bir bakış açısı sunan kitap, çevre etiği, enerji politikası ve ekonomi ile ilgilenen okuyuculara tavsiye edilmektedir.
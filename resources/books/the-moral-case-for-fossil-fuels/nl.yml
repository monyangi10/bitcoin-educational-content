title: "De morele argumenten voor fossiele brandstoffen"
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  The Moral Case for Fossil Fuels van Alex Epstein is een boek dat een tegenargument presenteert voor het blijven gebruiken van fossiele brandstoffen, ondanks hun negatieve invloed op het milieu. De auteur stelt dat fossiele brandstoffen een vitale rol hebben gespeeld in de vooruitgang van de mensheid en dat pogingen om ze voortijdig uit te faseren rampzalig zouden zijn voor de economie en het milieu. Epstein betwist veel van de gangbare veronderstellingen over fossiele brandstoffen en stelt dat ze de menselijke samenleving meer voordelen dan schade hebben gebracht. Hij pleit ook voor een meer objectieve, op feiten gebaseerde benadering van het debat over energiebeleid. Het boek biedt een tot nadenken stemmend perspectief op een controversieel onderwerp en wordt aanbevolen voor lezers die geïnteresseerd zijn in milieu-ethiek, energiebeleid en economie.
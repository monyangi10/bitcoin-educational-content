title: 「化石燃料的道德理由」
publication_year: 2014
cover: cover_en.webp
original: true
description: |
  Alex Epstein 所著的《化石燃料的道德理由》(The Moral Case for Fossil Fuels)一書，以反面論據支持繼續使用化石燃料，儘管它對環境有負面影響。作者認為化石燃料在人類進步的過程中扮演了重要的角色，如果過早淘汰化石燃料，將會對經濟和環境造成災難性的影響。Epstein 挑戰了許多關於化石燃料的普遍假設，並認為化石燃料為人類社會帶來的好處多於壞處。他也主張以更客觀、以事實為基礎的方式來辯論能源政策。本書針對一個具爭議性的議題提出了發人深省的觀點，建議對環境倫理、能源政策和經濟學感興趣的讀者閱讀。
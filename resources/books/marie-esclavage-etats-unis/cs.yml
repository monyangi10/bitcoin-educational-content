title: "Marie ou l'Esclavage aux États-Unis"
publication_year: 1835
cover: cover_fr.webp
original: false
description: |
  Published in 1835 by Gustave de Beaumont, Tocqueville's close friend and traveling companion, this novel-cum-sociological study examines slavery and racial prejudice in the United States. A powerful indictment of unfreedom that complements Tocqueville's Democracy in America with a focus on the conditions of Black Americans and Native peoples.

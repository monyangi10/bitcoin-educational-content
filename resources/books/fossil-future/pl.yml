title: "Fossil Future; Why Global Human Flourishing Requires More Oil, Coal, and Natural"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  W książce "Fossil Future, Why Global Human Flourishing Requires More Oil, Coal, and Natural Gas - Not Less" Alex Epstein podważa dominujące przekonania na temat przyszłości energii, argumentując, że korzyści płynące z paliw kopalnych przeważają nad ich skutkami ubocznymi. Poprzez ramy ludzkiego rozkwitu Epstein przedstawia przekonujące argumenty za dalszym wykorzystaniem paliw kopalnych, obalając błędne przekonania na temat wpływu na klimat i dominacji energii odnawialnej. Ta prowokująca do myślenia książka zachęca czytelników do ponownej oceny ich rozumienia energii, środowiska i zmian klimatycznych, oferując nową perspektywę na drodze do globalnego rozkwitu ludzkości.
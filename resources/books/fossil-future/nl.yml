title: "Fossiele toekomst"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  In "Fossil Future, Why Global Human Flourishing Requires More Oil, Coal, and Natural Gas--Not Less", daagt Alex Epstein de heersende opvattingen over de toekomst van energie uit door te beargumenteren dat de voordelen van fossiele brandstoffen zwaarder wegen dan hun neveneffecten. Door middel van een raamwerk voor menselijke bloei presenteert Epstein een overtuigend pleidooi voor het voortgezette gebruik van fossiele brandstoffen, waarbij misvattingen over de gevolgen voor het klimaat en de dominantie van hernieuwbare energie worden ontkracht. Dit tot nadenken stemmende boek moedigt lezers aan om hun begrip van energie, het milieu en klimaatverandering te heroverwegen en biedt een nieuw perspectief op de weg naar wereldwijde menselijke bloei.

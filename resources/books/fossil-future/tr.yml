title: "Fosil Gelecek"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Alex Epstein, "Fosil Gelecek, Küresel İnsani Gelişme Neden Daha Fazla Petrol, Kömür ve Doğal Gaz Gerektiriyor - Daha Az Değil" adlı kitabında enerjinin geleceği hakkındaki yaygın inanışlara meydan okuyarak fosil yakıtların faydalarının yan etkilerinden daha ağır bastığını savunuyor. Epstein, insani gelişme çerçevesi aracılığıyla, iklim etkileri ve yenilenebilir enerji hakimiyeti hakkındaki yanlış anlamaları çürüterek, fosil yakıt kullanımının devam etmesi için ikna edici bir durum sunuyor. Bu düşündürücü kitap, okuyucuları enerji, çevre ve iklim değişikliği anlayışlarını yeniden değerlendirmeye teşvik ederek küresel insani gelişmeye giden yolda yeni bir bakış açısı sunuyor.

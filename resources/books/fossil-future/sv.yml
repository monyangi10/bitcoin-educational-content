title: "Fossil framtid"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  I "Fossil Future, Why Global Human Flourishing Requires More Oil, Coal, and Natural Gas--Not Less" utmanar Alex Epstein rådande uppfattningar om framtidens energi och argumenterar för att fördelarna med fossila bränslen överväger deras biverkningar. Genom ett ramverk för mänsklig blomning presenterar Epstein ett övertygande fall för fortsatt användning av fossila bränslen och avslöjar missuppfattningar om klimatpåverkan och förnybar energidominans. Denna tankeväckande bok uppmuntrar läsarna att omvärdera sin förståelse av energi, miljö och klimatförändringar och erbjuder ett nytt perspektiv på vägen till global mänsklig blomstring.

title: "Fossil Future"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  U "Fossil Future, Why Global Human Flourishing Requires More Oil, Coal, and Natural Gas--Not Less," Alex Epstein osporava preovlađujuća uverenja o budućnosti energije, tvrdeći da su koristi od fosilnih goriva veće od njihovih nuspojava. Kroz okvir ljudskog napretka, Epstein iznosi ubedljiv argument za nastavak korišćenja fosilnih goriva, razbijajući zablude o klimatskim uticajima i dominaciji obnovljivih izvora energije. Ova knjiga koja podstiče na razmišljanje ohrabruje čitaoce da preispitaju svoje razumevanje energije, životne sredine i klimatskih promena, nudeći novu perspektivu o putu ka globalnom ljudskom napretku.

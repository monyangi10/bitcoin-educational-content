title: "化石的未來"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  在《化石的未來，為什麼全球人類的繁榮需要更多的石油、煤炭和天然氣--而不是更少》一書中，Alex Epstein 挑戰了人們對未來能源的普遍看法，認為化石燃料的好處超過其副作用。透過人類繁榮的框架，Epstein 提出了一個令人信服的理由，支持繼續使用化石燃料，揭穿了人們對氣候影響和可再生能源主導地位的錯誤觀念。這本發人深省的書鼓勵讀者重新評估他們對能源、環境和氣候變化的理解，為通往全球人類繁榮之路提供了新的視角。

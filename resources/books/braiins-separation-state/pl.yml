title: "Bitcoin: rozdział pieniędzy i państwa"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  W szybko zmieniającym się świecie, w którym nawet instytucje takie jak Kościół,
  edukacja i media uwolniły się spod kontroli państwa, czeski ekonomista
  Josef Tětek stawia ważne pytanie: czy państwo powinno kontrolować pieniądze? W tej
  prowokującej do myślenia książce, wyruszysz na wciągającą eksplorację historii pieniądza
  historii monetarnej, gdzie spotkasz się z głębokimi spostrzeżeniami austriackich ekonomistów,
  rozwikłać znaczenie preferencji czasowej i zrozumieć zawiłe pułapki
  zawiłych pułapek, które wiążą się z poleganiem na pieniądzu kontrolowanym przez państwo. Nie przegap
  szansy na poznanie przełomowej alternatywy, jaką oferuje Bitcoin - alternatywy, która obiecuje
  alternatywę, która obiecuje przekształcić nasz krajobraz finansowy - w miarę poznawania
  przekonujące argumenty za oddzieleniem pieniędzy od państwa. Pobierz swój
  kopię już teraz i odkryj przyszłość pieniądza.
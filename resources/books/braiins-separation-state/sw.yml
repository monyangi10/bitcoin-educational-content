title: "Bitcoin: Mgawanyo wa Pesa na Jimbo"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Katika ulimwengu unaobadilika haraka ambapo hata taasisi kama kanisa,
  elimu, na vyombo vya habari vimejikomboa kutoka kwa udhibiti wa serikali, mwanauchumi wa Czech
  Josef Tětek anauliza swali la kulazimisha: je, serikali inapaswa kudhibiti pesa? Katika hili
  kitabu chenye kuchochea fikira, utaanza uchunguzi wa kina wa fedha
  historia, ambapo utakutana na maarifa ya kina ya wachumi wa Austria,
  funua umuhimu wa upendeleo wa wakati, na upate ufahamu wa
  mitego tata ambayo huja kwa kutegemea pesa zinazodhibitiwa na serikali. Usikose
  nafasi ya kujifunza kuhusu njia mbadala ambayo Bitcoin inatoa—an
  mbadala ambayo inaahidi kubadilisha hali yetu ya kifedha—unapochunguza
  hoja ya ushawishi ya kitabu cha kutenganisha pesa kutoka kwa serikali. Pata yako
  nakala sasa na ufichue mustakabali wa pesa.
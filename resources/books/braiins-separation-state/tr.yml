title: "Bitcoin: Para ve Devletin Ayrılması"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Kilise gibi kurumların bile hızla dönüştüğü bir dünyada,
  eğitim ve medyanın devlet kontrolünden kurtulduğunu belirten Çek ekonomist
  Josef Tětek zorlayıcı bir soru ortaya atıyor: Devlet parayı kontrol etmeli mi? Bunun içinde
  düşündürücü bu kitapla, parasal ve finansal konularda sürükleyici bir keşfe çıkacaksınız
  avusturyalı ekonomistlerin derin içgörüleriyle karşılaşacağınız tarih,
  zaman tercihinin önemini ortaya çıkarmak ve zaman tercihi ile ilgili bir anlayış kazanmak
  devlet kontrolündeki paraya güvenmenin getirdiği karmaşık tuzaklar. Kaçırmayın
  gW-1'in sunduğu çığır açan alternatif hakkında bilgi edinme şansı - bir
  finansal ortamımızı dönüştürmeyi vaat eden bir alternatif - keşfederken
  kitabın parayı devletten ayırmaya yönelik ikna edici argümanı. Al bakalım
  şimdi kopyalayın ve paranın geleceğini ortaya çıkarın.
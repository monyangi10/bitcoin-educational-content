title: "Bitcoin: Scheiding van geld en staat"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  In een snel veranderende wereld waarin zelfs instellingen als de kerk,
  onderwijs en de media zich hebben bevrijd van staatscontrole, stelt de Tsjechische econoom
  Josef Tětek een dwingende vraag: moet de staat geld controleren? In dit
  tot nadenken stemmende boek ga je op een meeslepende verkenning van de monetaire
  geschiedenis, waar je de diepgaande inzichten van Oostenrijkse economen zult tegenkomen,
  de betekenis van tijdvoorkeur ontrafelt en inzicht krijgt in de
  ingewikkelde valkuilen die komen kijken bij het vertrouwen op door de staat gecontroleerd geld. Mis niet
  de kans niet missen om meer te leren over het baanbrekende alternatief dat Bitcoin biedt
  een alternatief dat ons financiële landschap belooft te transformeren
  het overtuigende argument in het boek om geld van de staat te scheiden. Koop nu uw
  exemplaar aan en ontdek de toekomst van geld.
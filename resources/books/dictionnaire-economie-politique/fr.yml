description: |
  Co-edited with Gilbert-Urbain Guillaumin and published in 1852, this Dictionary of Political Economy is a monumental reference work of the French liberal school. It contains entries by the leading economists of the era — Bastiat, Molinari, Coquelin, and dozens of others — offering a comprehensive survey of liberal economic thought at its peak.

title: "Dagboek van een professionele grondstoffenhandelaar"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Dagboek van een professionele grondstoffenhandelaar" door Peter Brandt is een memoires en een educatieve gids die de ervaring van de auteur in de grondstoffenhandel beschrijft. Door middel van zijn persoonlijke verslagen geeft Brandt inzicht in de denkwijze, discipline en strategieën die nodig zijn om een succesvolle handelaar te worden op de zeer concurrerende en volatiele grondstoffenmarkten. Hij geeft praktisch advies over risicobeheer, technische analyse en marktpsychologie en deelt zijn visie op de rol van technologie en de invloed van globalisering op de grondstoffenhandel. Het boek is bedoeld voor ervaren handelaren en beleggers die hun kennis en vaardigheden in de grondstoffenhandel willen vergroten.
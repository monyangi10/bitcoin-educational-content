title: "Dnevnik profesionalnog trgovca robom"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Dnevnik profesionalnog trgovca robom" autora Petera Brandta je memoar i edukativni vodič koji beleži autorovo iskustvo u trgovanju robom. Kroz lične priče, Brandt pruža uvid u način razmišljanja, disciplinu i strategije potrebne za uspeh u visoko konkurentnim i nestabilnim tržištima robe. On nudi praktične savete o upravljanju rizikom, tehničkoj analizi i psihologiji tržišta, i deli svoja mišljenja o ulozi tehnologije i uticaju globalizacije na trgovinu robom. Knjiga je namenjena iskusnim trgovcima i investitorima koji žele da unaprede svoje znanje i veštine u trgovanju robom.
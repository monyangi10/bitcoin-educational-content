description: |
  Published in two series (1845 and 1848), Bastiat's Economic Sophisms is a masterpiece of popular economics. Through witty, devastating arguments, Bastiat dismantles the protectionist fallacies of his day — fallacies that remain remarkably alive in contemporary political debate. The famous Petition of the Candlemakers against the sun is perhaps the most celebrated satire in the history of economic thought.

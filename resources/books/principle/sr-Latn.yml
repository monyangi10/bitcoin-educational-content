title: "Princip"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  "Principles" by Ray Dalio je knjiga o menadžmentu i ličnom razvoju koja opisuje autorove principe za postizanje uspeha u radu i životu. Dalio je osnivač investicione firme Bridgewater Associates i postigao je veliki uspeh u svojoj karijeri. U knjizi deli svoju filozofiju o tome kako stvoriti uspešnu organizaciju i daje savete o tome kako se nositi sa životnim izazovima. Naglašava važnost radikalne transparentnosti, otvorenog uma i spremnosti da se uči iz grešaka. Knjiga je strukturirana oko autorovih životnih principa i radnih principa, za koje veruje da su ključni za postizanje uspeha u svim aspektima života.
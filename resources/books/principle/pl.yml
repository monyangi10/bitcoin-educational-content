title: "Zasada"
publication_year: 2017
cover: cover_en.webp
original: true
description: |
  "Principles" autorstwa Raya Dalio to książka o zarządzaniu i rozwoju osobistym, która przedstawia zasady autora dotyczące osiągania sukcesu w pracy i życiu. Dalio jest założycielem firmy inwestycyjnej Bridgewater Associates i osiągnął wielki sukces w swojej karierze. W książce dzieli się swoją filozofią tworzenia udanej organizacji i udziela porad, jak radzić sobie z wyzwaniami życia. Podkreśla znaczenie radykalnej przejrzystości, otwartości umysłu i chęci uczenia się na błędach. Książka jest skonstruowana wokół zasad życiowych i zasad pracy autora, które jego zdaniem są niezbędne do osiągnięcia sukcesu we wszystkich aspektach życia.
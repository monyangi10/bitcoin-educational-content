description: |
  Tracy's Commentary on Montesquieu's Spirit of the Laws (1819) is a liberal critique of one of the most influential works of political philosophy. Tracy praises Montesquieu's empirical method while challenging his conclusions, arguing for a more consistent defense of individual liberty and against the confusion of liberty with political participation.

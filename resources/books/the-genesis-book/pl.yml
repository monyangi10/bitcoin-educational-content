title: "Księga Genesis"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin nie pojawił się znikąd. Przez dziesięciolecia poprzedzające wynalazek Satoshi Nakamoto
  nakamoto, zróżnicowana grupa informatyków, obrońców prywatności i heterodoksyjnych ekonomistów
  i heterodoksyjni ekonomiści próbowali stworzyć cyfrową formę pieniądza, która mogłaby działać
  niezależnie od kontroli rządu. Książka Genesis opowiada historię
  ludzi i projektów, które zainspirowały wynalezienie pierwszego na świecie udanego
  udanego systemu elektronicznej gotówki peer-to-peer.
title: "Genesis Knjiga"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin se nije pojavio niotkuda. Decenijama pre Nakamotove Satoshi
  inovacije, raznolika grupa kompjuterskih naučnika, aktivista za privatnost i
  heterodoksnih ekonomista pokušavala je da stvori digitalni oblik novca koji bi mogao da funkcioniše
  nezavisno od kontrole vlade. Knjiga Genesis priča priču o ljudima i projektima koji su inspirisali izum prvog uspešnog
  peer-to-peer elektronskog sistema gotovine na svetu.
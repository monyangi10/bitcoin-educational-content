title: "Kitabu cha Genesis"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin haikuonekana ghafla. Kwa miongo kadhaa kabla ya Satoshi Nakamoto's
  uvumbuzi, kikundi tofauti cha wanasayansi wa kompyuta, wanaharakati wa faragha, na
  wanauchumi wa heterodox walijaribu kuunda aina ya pesa ya dijiti ambayo inaweza kufanya kazi
  bila ya udhibiti wa serikali. Kitabu cha Genesis kinasimulia hadithi ya
  watu na miradi ambayo iliongoza uvumbuzi wa mafanikio ya kwanza ya dunia
  mfumo wa pesa wa kielektroniki wa rika-kwa-rika.
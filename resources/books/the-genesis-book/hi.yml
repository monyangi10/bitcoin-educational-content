title: "जीडब्लू-0 पुस्तक"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin कहीं से भी प्रकट नहीं हुआ। Satoshi नाकामोटो के आविष्कार से दशकों पहले, कंप्यूटर वैज्ञानिकों, गोपनीयता कार्यकर्ताओं और विषम अर्थशास्त्रियों के एक विविध समूह ने पैसे का एक डिजिटल रूप बनाने की कोशिश की जो सरकारी नियंत्रण से स्वतंत्र रूप से संचालित हो सके। Genesis पुस्तक उन लोगों और परियोजनाओं की कहानी बताती है जिन्होंने दुनिया की पहली सफल पीयर-टू-पीयर इलेक्ट्रॉनिक कैश सिस्टम के आविष्कार को प्रेरित किया।
title: "Genesis Kitabı"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin birdenbire ortaya çıkmadı. Satoshi Nakamoto'dan önceki on yıllar boyunca
  buluş, çeşitli bilgisayar bilimcileri, gizlilik aktivistleri ve
  heterodoks ekonomistler, paranın dijital bir formunu yaratmaya çalıştılar
  hükümet kontrolünden bağımsız olarak. Genesis Kitabı, Genesis'nin hikayesini anlatıyor
  dünyanın ilk başarılı icadına ilham veren insanlar ve projeler
  eşler arası elektronik para sistemi.
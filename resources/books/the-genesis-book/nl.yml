title: "Het Genesis boek"
publication_year: 2024
cover: cover_en.webp
original: true
description: |
  Bitcoin verscheen niet uit het niets. Tientallen jaren voor de uitvinding van Satoshi Nakamoto
  uitvinding, probeerde een diverse groep computerwetenschappers, privacyactivisten en
  heterodoxe economen geprobeerd om een digitale vorm van geld te creëren die onafhankelijk
  onafhankelijk van overheidscontrole. Het Genesis boek vertelt het verhaal van de
  mensen en projecten die inspireerden tot de uitvinding van 's werelds eerste succesvolle
  peer-to-peer elektronisch geldsysteem.
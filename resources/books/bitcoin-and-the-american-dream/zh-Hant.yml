title: 「Bitcoin與美國夢」
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  對許多人而言，沒有美國夢，只有噩夢。財務壓力和債務負擔沉重。這個體系讓人感覺是被操控的。
  
  在這種絕望中，美國人在一個不太可能的地方找到了希望。
  
  在新的替代性金融體系的幫助下，他們發現現在可以長期儲蓄了。當華盛頓的某些人認為這是一項令人害怕和嗤之以鼻的技術時，美國人卻認為 Bitcoin 是一個機會。對他們來說，Bitcoin 證明是實現財務自由和代理權的寶貴工具。
  
  在美國各地，一個廣泛而多元化的聯盟正在形成。他們相信 Bitcoin 啟動了通往重振美國夢的大門。這本書就是關於這個夢想的。
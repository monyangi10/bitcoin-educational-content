title: "Bitcoin i američki san"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Za mnoge, nema Američkog sna, samo noćna mora. Finansijski stres i teret dugova teško pritiskaju. Sistem deluje namešteno.
  
  Usred ovog očaja, Amerikanci pronalaze nadu na neočekivanom mestu.
  
  Uz pomoć novog, alternativnog finansijskog sistema, otkrivaju da sada mogu štedeti na duže staze. Dok neki u Vašingtonu vide tehnologiju koju treba plašiti i odbaciti, Amerikanci vide Bitcoin kao priliku. Za njih, Bitcoin se pokazuje kao vredan alat za finansijsku slobodu i samostalnost.
  
  Širom Amerike, formira se široka i raznolika koalicija. Oni veruju da Bitcoin otključava vrata revitalizovanog američkog sna. Ova knjiga je o tom snu.
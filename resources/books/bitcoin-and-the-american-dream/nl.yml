title: "Bitcoin en de Amerikaanse droom"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Voor velen is er geen American Dream, maar slechts een nachtmerrie. Financiële stress en schulden wegen zwaar. Het systeem voelt gewoon gemanipuleerd.
  
  Te midden van deze wanhoop vinden Amerikanen hoop op een onwaarschijnlijke plek.
  
  Met de hulp van een nieuw, alternatief financieel systeem ontdekken ze dat ze nu kunnen sparen voor de lange termijn. Terwijl sommigen in Washington een technologie zien die gevreesd en verworpen moet worden, zien Amerikanen Bitcoin als een kans. Voor hen bewijst Bitcoin een waardevol hulpmiddel voor financiële vrijheid en zeggenschap.
  
  In heel Amerika vormt zich een brede en diverse coalitie. Zij geloven dat Bitcoin de deur opent naar een vernieuwde Amerikaanse droom. Dit boek gaat over die droom.
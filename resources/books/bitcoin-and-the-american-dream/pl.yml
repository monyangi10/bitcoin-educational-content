title: "Bitcoin i amerykański sen"
publication_year: 2021
cover: cover_en.webp
original: true
description: |
  Dla wielu nie ma amerykańskiego snu, jest tylko koszmar. Stres finansowy i obciążenia związane z zadłużeniem są ogromne. System wydaje się po prostu sfałszowany.
  
  Wśród tej rozpaczy Amerykanie znajdują nadzieję w mało prawdopodobnym miejscu.
  
  Z pomocą nowego, alternatywnego systemu finansowego odkrywają, że mogą teraz oszczędzać na dłuższą metę. Podczas gdy niektórzy w Waszyngtonie widzą technologię, której należy się obawiać i którą należy odrzucić, Amerykanie postrzegają Bitcoin jako szansę. Dla nich Bitcoin okazuje się cennym narzędziem wolności finansowej i agencji.
  
  W całej Ameryce tworzy się szeroka i zróżnicowana koalicja. Wierzą, że Bitcoin otwiera drzwi do zrewitalizowanego amerykańskiego snu. Ta książka jest o tym marzeniu.
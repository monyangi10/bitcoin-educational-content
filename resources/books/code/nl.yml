title: "Code, de verborgen taal van computerhardware en -software"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  De verborgen taal van computerhardware en -software" van Charles Petzold is een fascinerende verkenning van hoe alledaagse voorwerpen en bekende taalsystemen kunnen worden gebruikt om de mysteries van computertechnologie te ontrafelen. Door middel van slimme illustraties en herkenbare voorbeelden neemt Petzold lezers mee op een reis om de innerlijke werking van computers en de inventieve manieren waarop we ermee communiceren te begrijpen. Van zaklampen tot de Britse invasie, dit boek onthult de verbanden tussen schijnbaar ongerelateerde concepten en de technologische innovaties die ze hebben aangedreven. Of je nu een technologieliefhebber bent of gewoon nieuwsgierig naar de wereld van computers, "Code" biedt een begrijpelijk verhaal dat je een dieper inzicht zal geven in de pc's, digitale media en het internet die onze moderne wereld vormgeven. Bereid je voor om gecharmeerd en geboeid te raken terwijl je een echte context krijgt voor het begrijpen van de technologie die ons omringt.
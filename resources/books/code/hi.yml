title: "कोड, कंप्यूटर हार्डवेयर और सॉफ्टवेयर की छिपी भाषा"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  चार्ल्स पेटज़ोल्ड द्वारा लिखित "द हिडन लैंग्वेज ऑफ़ कंप्यूटर हार्डवेयर एंड सॉफ़्टवेयर" इस ​​बात की आकर्षक खोज है कि कैसे रोज़मर्रा की वस्तुओं और परिचित भाषा प्रणालियों का उपयोग कंप्यूटर तकनीक के रहस्यों को उजागर करने के लिए किया जा सकता है। चतुर चित्रण और संबंधित उदाहरणों के माध्यम से, पेटज़ोल्ड पाठकों को कंप्यूटर के आंतरिक कामकाज और उनके साथ संवाद करने के आविष्कारशील तरीकों को समझने की यात्रा पर ले जाता है। फ्लैशलाइट से लेकर ब्रिटिश आक्रमण तक, यह पुस्तक प्रतीत होता है कि असंबंधित अवधारणाओं और उनके द्वारा संचालित तकनीकी नवाचारों के बीच संबंधों को उजागर करती है। चाहे आप तकनीक के शौकीन हों या कंप्यूटर की दुनिया के बारे में जानने के लिए उत्सुक हों, "कोड" एक समझने योग्य कथा प्रदान करता है जो आपको पीसी, डिजिटल मीडिया और इंटरनेट की गहरी समझ देगा जो हमारी आधुनिक दुनिया को आकार देते हैं। हमारे आस-पास की तकनीक को समझने के लिए एक वास्तविक संदर्भ प्राप्त करने के साथ ही मंत्रमुग्ध और मोहित होने के लिए तैयार रहें।
title: "Nambari, Lugha Iliyofichwa ya Vifaa vya Kompyuta na Programu"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Lugha Iliyofichwa ya Vifaa na Programu za Kompyuta" na Charles Petzold ni uchunguzi wa kuvutia wa jinsi vitu vya kila siku na mifumo ya lugha inayofahamika inaweza kutumika kutembua mafumbo ya teknolojia ya kompyuta. Kupitia vielelezo vya busara na mifano inayohusiana, Petzold huwachukua wasomaji katika safari ya kuelewa utendaji kazi wa ndani wa kompyuta na njia za uvumbuzi tunazowasiliana nao, kutoka kwa mwangaza wa Briteni huonekana kati ya mwangaza wa Uingereza. dhana zisizohusiana na uvumbuzi wa kiteknolojia ambao wameanzisha. Iwe wewe ni mpenda teknolojia au una hamu ya kujua kuhusu ulimwengu wa kompyuta, "Code" hutoa masimulizi yanayoeleweka ambayo yatakuacha na ufahamu wa kina wa Kompyuta, vyombo vya habari vya kidijitali na Mtandao unaounda ulimwengu wetu wa kisasa.
title: "Kod, Bilgisayar Donanımı ve Yazılımının Gizli Dili"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Charles Petzold'un "Bilgisayar Donanımı ve Yazılımının Gizli Dili" adlı kitabı, bilgisayar teknolojisinin gizemlerini çözmek için günlük nesnelerin ve tanıdık dil sistemlerinin nasıl kullanılabileceğine dair büyüleyici bir keşif. Petzold, zekice çizimler ve ilişkilendirilebilir örnekler aracılığıyla okuyucuları bilgisayarların iç işleyişini ve onlarla iletişim kurmanın yaratıcı yollarını anlamak için bir yolculuğa çıkarıyor. Bu kitap, el fenerlerinden İngiliz istilasına kadar, görünüşte ilgisiz kavramlar arasındaki bağlantıları ve bunların yol açtığı teknolojik yenilikleri ortaya çıkarıyor. İster teknoloji meraklısı olun ister bilgisayar dünyasını merak edin, "Kod" modern dünyamızı şekillendiren PC'ler, dijital medya ve İnternet hakkında daha derin bir anlayışa sahip olmanızı sağlayacak anlaşılır bir anlatım sunuyor. Bizi çevreleyen teknolojiyi anlamak için gerçek bir bağlam kazanırken büyülenmeye ve büyülenmeye hazır olun.
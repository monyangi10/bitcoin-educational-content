title: "Kod, ukryty język sprzętu i oprogramowania komputerowego"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Hidden Language of Computer Hardware and Software" Charlesa Petzolda to fascynujące odkrycie, w jaki sposób przedmioty codziennego użytku i znane systemy językowe mogą być wykorzystane do rozwikłania tajemnic technologii komputerowej. Dzięki sprytnym ilustracjom i zrozumiałym przykładom Petzold zabiera czytelników w podróż mającą na celu zrozumienie wewnętrznego działania komputerów i pomysłowych sposobów, w jakie się z nimi komunikujemy. Od latarek po brytyjską inwazję, ta książka odkrywa powiązania między pozornie niepowiązanymi koncepcjami i innowacjami technologicznymi, które napędzały. Niezależnie od tego, czy jesteś entuzjastą technologii, czy po prostu ciekawi Cię świat komputerów, "Code" zapewnia zrozumiałą narrację, która pozwoli Ci lepiej zrozumieć komputery PC, media cyfrowe i Internet, które kształtują nasz współczesny świat. Przygotuj się na to, że będziesz oczarowany i oczarowany, ponieważ zyskasz prawdziwy kontekst do zrozumienia technologii, która nas otacza.
title: "Kod, Skriveni Jezik Računarskog Hardvera i Softvera"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  "Skriveni jezik računarskog hardvera i softvera" od Charlesa Petzolda je fascinantno istraživanje o tome kako se svakodnevni predmeti i poznati jezički sistemi mogu koristiti za razotkrivanje misterija računarske tehnologije. Kroz pametne ilustracije i primere s kojima se lako poistovetiti, Petzold vodi čitaoce na putovanje ka razumevanju unutrašnjeg rada računara i inventivnih načina na koje komuniciramo s njima. Od baterijskih lampi do britanske invazije, ova knjiga otkriva veze između naizgled nepovezanih koncepata i tehnoloških inovacija koje su pokrenuli. Bilo da ste ljubitelj tehnologije ili jednostavno radoznali o svetu računara, "Code" pruža razumljivu priču koja će vam ostaviti dublje razumevanje PC-ja, digitalnih medija i Interneta koji oblikuju naš moderni svet. Pripremite se da budete očarani i zadivljeni dok stičete pravi kontekst za razumevanje tehnologije koja nas okružuje.
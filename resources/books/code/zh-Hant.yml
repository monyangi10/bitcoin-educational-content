title: 「程式碼，電腦硬體與軟體的隱藏語言」
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Charles Petzold 所著的《The Hidden Language of Computer Hardware and Software》一書，以引人入勝的方式探討如何利用日常用品和熟悉的語言系統，來揭開電腦技術的神秘面紗。透過巧妙的插圖和貼切的例子，Petzold 帶領讀者了解電腦的內部運作，以及我們與電腦溝通的創新方式。從手電筒到英國入侵，這本書揭開了看似毫無關聯的概念之間的聯繫，以及它們所帶動的技術創新。無論您是科技愛好者或只是對電腦世界充滿好奇，《Code》都能以淺白易懂的敘事方式，讓您對塑造現代世界的個人電腦、數位媒體和網際網路有更深入的了解。當您獲得瞭解我們周遭科技的真實背景時，請準備好被深深吸引住。
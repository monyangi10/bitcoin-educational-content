title: "De l'amour"
publication_year: 1813
cover: cover_fr.webp
original: false
description: |
  A philosophical treatise on love by Antoine Destutt de Tracy, exploring human passions and their relationship to moral philosophy. Tracy applies the same empirical rigor that characterized the Idéologues' approach to all human phenomena, treating love not as a mystical force but as a natural aspect of human experience subject to rational analysis.

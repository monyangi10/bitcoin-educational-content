title: "Stworzenie z wyspy Jekyll"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  The Creature from Jekyll Island autorstwa G. Edwarda Griffina to książka na poziomie średnio zaawansowanym, która zagłębia się w historię Systemu Rezerwy Federalnej w Stanach Zjednoczonych. Zgłębiając temat bankowości centralnej, książka przedstawia krytyczne spojrzenie na utworzenie i działanie Rezerwy Federalnej, omawiając jej konsekwencje dla gospodarki i całego społeczeństwa. Griffin zagłębia się w wydarzenia prowadzące do tajnego spotkania na wyspie Jekyll w 1910 roku, podczas którego wpływowe osobistości opracowały plan utworzenia Rezerwy Federalnej. Poprzez szeroko zakrojone badania i analizy, książka podkreśla domniemane spiski i rzuca światło na struktury władzy finansowej, które kształtują nasz świat. Jest to lektura prowokująca do myślenia, która rzuca wyzwanie narracjom głównego nurtu i zachęca czytelników do kwestionowania roli bankowości centralnej w społeczeństwie.
title: "The Creature from Jekyll Island"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  The Creature from Jekyll Island van G. Edward Griffin is een boek voor gemiddeld niveau dat ingaat op de geschiedenis van het Federal Reserve System in de Verenigde Staten. Het boek verkent het onderwerp van centraal bankieren en presenteert een kritisch perspectief op de oprichting en werking van de Federal Reserve, waarbij de implicaties voor de economie en de maatschappij in het algemeen worden besproken. Griffin duikt in de gebeurtenissen die leidden tot de geheime bijeenkomst op Jekyll Island in 1910, waar invloedrijke personen de blauwdruk voor de Federal Reserve bedachten. Door middel van uitgebreid onderzoek en analyse belicht het boek vermeende samenzweringen en werpt het licht op de financiële machtsstructuren die onze wereld vormgeven. Het is een tot nadenken stemmend boek dat de gangbare verhalen uitdaagt en lezers aanmoedigt om de rol van het centrale bankwezen in de samenleving in twijfel te trekken.
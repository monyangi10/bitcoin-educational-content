title: "Jekyll Adası'ndan Gelen Yaratık"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  G. Edward Griffin tarafından yazılan Jekyll Adasından Gelen Yaratık, Amerika Birleşik Devletleri'ndeki Federal Rezerv Sistemi'nin tarihini inceleyen orta düzey bir kitaptır. Merkez bankacılığı konusunu irdeleyen kitap, Federal Rezerv'in kuruluşu ve işleyişine eleştirel bir bakış açısı sunmakta ve bunun ekonomi ve toplumun geneli üzerindeki etkilerini tartışmaktadır. Griffin, 1910 yılında Jekyll Adası'nda yapılan ve etkili isimlerin Federal Rezerv'in planını hazırladığı gizli toplantıya giden olayları inceliyor. Kapsamlı araştırma ve analizler sayesinde kitap, iddia edilen komploları vurgulamakta ve dünyamızı şekillendiren finansal güç yapılarına ışık tutmaktadır. Ana akım anlatılara meydan okuyan ve okuyucuları merkez bankacılığının toplumdaki rolünü sorgulamaya teşvik eden düşündürücü bir okuma.
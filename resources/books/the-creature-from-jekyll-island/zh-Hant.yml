title: 「傑基尔岛的怪物」
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  G. Edward Griffin 所著的《The Creature from Jekyll Island》是一本深入探討美國聯邦儲備系統歷史的中級書籍。本書探討中央銀行的主題，以批判性的角度闡述聯邦儲備局的創立與運作，並討論其對整體經濟與社會的影響。Griffin 深入探討了 1910 年在 Jekyll Island 舉行秘密會議之前發生的事件，在那次會議上，有影響力的人物設計了美聯儲的藍圖。透過廣泛的研究和分析，這本書強調了所謂的陰謀，並揭示了塑造我們世界的金融權力結構。這是一本發人深省的讀物，挑戰主流敘述，鼓勵讀者質疑中央銀行在社會中的角色。
title: "Kiumbe kutoka Kisiwa cha Jekyll"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  Kiumbe kutoka Kisiwa cha Jekyll cha G. Edward Griffin ni kitabu cha ngazi ya kati ambacho kinaangazia historia ya Mfumo wa Hifadhi ya Shirikisho nchini Marekani. Kuchunguza mada ya benki kuu, kitabu kinatoa mtazamo muhimu juu ya uundaji na uendeshaji wa Hifadhi ya Shirikisho, kujadili athari zake kwa uchumi na jamii kwa ujumla. Griffin anajikita katika matukio ya kuelekea kwenye mkutano wa siri kwenye Kisiwa cha Jekyll mwaka wa 1910, ambapo watu mashuhuri walibuni mpango wa Hifadhi ya Shirikisho. Kupitia utafiti na uchanganuzi wa kina, kitabu hiki kinaangazia njama zinazodaiwa na kuangazia miundo ya nguvu za kifedha inayounda ulimwengu wetu. Ni somo la kufikirika ambalo linachangamoto masimulizi ya kawaida na kuwahimiza wasomaji kuhoji jukumu la benki kuu katika jamii.
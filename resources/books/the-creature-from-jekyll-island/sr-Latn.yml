title: "Stvorenje sa ostrva Džekil"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  Stvorenje sa ostrva Džekil od G. Edvarda Grifina je knjiga srednjeg nivoa koja se bavi istorijom Sistema federalnih rezervi u Sjedinjenim Državama. Istražujući temu centralnog bankarstva, knjiga predstavlja kritičku perspektivu o stvaranju i radu Federalnih rezervi, diskutuje o njenim implikacijama na ekonomiju i društvo u celini. Grifin se upušta u događaje koji su doveli do tajnog sastanka na ostrvu Džekil 1910. godine, gde su uticajne ličnosti osmislile plan za Federalne rezerve. Kroz opsežno istraživanje i analizu, knjiga ističe navodne zavere i baca svetlo na finansijske strukture moći koje oblikuju naš svet. To je misaono izazovna knjiga koja osporava glavne narative i podstiče čitaoce da preispitaju ulogu centralnog bankarstva u društvu.
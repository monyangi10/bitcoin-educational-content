title: "Borç İlk 5000 Yıl"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  david Graeber'in "Borç; ilk 5000 yıl" adlı kitabı, antik Sümer'den günümüze kadar insan uygarlığı boyunca borç kavramının antropolojik ve tarihsel bir analizidir. Yazar, borcun insan toplumunun doğal ve gerekli bir parçası olduğu yönündeki yaygın inanca karşı çıkmakta ve borcun sosyal kontrol ve tahakküm aracı olarak kullanıldığını savunmaktadır. Kitap, borcun hayatımızdaki rolü ile sosyal ve ekonomik sistemler üzerindeki etkisine dair düşündürücü bir bakış açısı sunuyor.
title: "Dug Prvih 5000 Godina"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Debt; prvih 5000 godina" od Davida Graebera je antropološka i istorijska analiza koncepta duga kroz ljudsku civilizaciju, od drevnog Sumera do modernog doba. Autor osporava uobičajeno verovanje da je dug prirodan i neophodan deo ljudskog društva, i tvrdi da je korišćen kao alat za društvenu kontrolu i dominaciju. Knjiga nudi perspektivu koja podstiče na razmišljanje o ulozi duga u našim životima i njegovom uticaju na društvene i ekonomske sisteme.
title: "Zadłużenie przez pierwsze 5000 lat"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Dług; pierwsze 5000 lat" Davida Graebera to antropologiczna i historyczna analiza koncepcji długu w całej ludzkiej cywilizacji, od starożytnego Sumeru po czasy współczesne. Autor podważa powszechnie panujące przekonanie, że dług jest naturalną i niezbędną częścią ludzkiego społeczeństwa i argumentuje, że został on wykorzystany jako narzędzie kontroli społecznej i dominacji. Książka oferuje prowokujące do myślenia spojrzenie na rolę długu w naszym życiu i jego wpływ na systemy społeczne i gospodarcze.
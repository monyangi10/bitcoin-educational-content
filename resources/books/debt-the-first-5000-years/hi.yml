title: "पहले 5000 वर्षों का ऋण"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  डेविड ग्रेबर द्वारा लिखित "ऋण: पहले 5000 वर्ष" प्राचीन सुमेर से लेकर आधुनिक समय तक मानव सभ्यता में ऋण की अवधारणा का मानवशास्त्रीय और ऐतिहासिक विश्लेषण है। लेखक इस आम धारणा को चुनौती देता है कि ऋण मानव समाज का एक स्वाभाविक और आवश्यक हिस्सा है, और तर्क देता है कि इसका उपयोग सामाजिक नियंत्रण और वर्चस्व के लिए एक उपकरण के रूप में किया गया है। यह पुस्तक हमारे जीवन में ऋण की भूमिका और सामाजिक और आर्थिक प्रणालियों पर इसके प्रभाव पर एक विचारोत्तेजक परिप्रेक्ष्य प्रदान करती है।
title: "Deni la Miaka 5000 ya Kwanza"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Deni; miaka 5000 ya kwanza" na David Graeber ni uchanganuzi wa kianthropolojia na kihistoria wa dhana ya deni katika ustaarabu wa binadamu, kutoka Sumer ya kale hadi siku ya kisasa. Mwandishi anapinga imani inayoshikiliwa na watu wengi kwamba deni ni sehemu ya asili na ya lazima ya jamii ya wanadamu, na anasema kwamba imekuwa ikitumika kama chombo cha udhibiti na utawala wa kijamii. Kitabu hiki kinatoa mtazamo wenye kuchochea fikira juu ya jukumu la deni katika maisha yetu na athari zake kwa mifumo ya kijamii na kiuchumi.
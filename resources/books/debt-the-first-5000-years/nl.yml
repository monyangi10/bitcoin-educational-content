title: "Schuld De eerste 5000 jaar"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  "Schuld; de eerste 5000 jaar" van David Graeber is een antropologische en historische analyse van het concept van schuld door de menselijke beschaving heen, van het oude Soemerië tot het heden. De auteur betwist het algemeen heersende geloof dat schuld een natuurlijk en noodzakelijk onderdeel is van de menselijke samenleving en stelt dat het is gebruikt als een instrument voor sociale controle en overheersing. Het boek biedt een tot nadenken stemmend perspectief op de rol van schuld in ons leven en de invloed ervan op sociale en economische systemen.
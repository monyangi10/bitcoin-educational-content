title: "Le travail des femmes au XIXe siècle"
publication_year: 1873
cover: cover_fr.webp
original: true
description: |
  Leroy-Beaulieu's study of women's labor in the 19th century (1873) is a pioneering work of empirical economics. Drawing on extensive statistical data, he documents the conditions of working women in France and argues that economic freedom, not protective legislation, is the surest path to improving their situation.

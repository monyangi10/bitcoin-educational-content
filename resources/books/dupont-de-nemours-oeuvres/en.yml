description: |
  The collected works of Pierre Samuel Du Pont de Nemours (1739-1817), one of the most influential Physiocrats and a key figure in the early history of economic liberalism. Du Pont served as an advisor to Turgot and later emigrated to the United States, where his ideas influenced the founding generation. His writings cover taxation, trade, agriculture, and the natural order of economic life.

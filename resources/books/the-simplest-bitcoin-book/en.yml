title: "The Simplest Bitcoin Book"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Love is a big word, bitcoin is worthy of big love. It’s existence is a point of
  bright light in this most challenged time in human existence. I wrote this book
  in the hopes of making bitcoin, and the reasons we need it, more accessible to
  more seekers. This book is a starting point, into what I, and many others, have
  discovered is a phenomenally endless, life-changing and beautiful rabbit hole!

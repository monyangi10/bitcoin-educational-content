description: |
  Principles of Economics is a comprehensive university-level textbook by Saifedean Ammous that presents the foundational concepts of economics through the lens of the Austrian school. Covering topics from human action and value theory to capital, money, markets, and civilization, the book offers readers a logically sequenced alternative to mainstream economics textbooks. Drawing on two decades of studying and teaching economics, Ammous delivers an accessible yet rigorous treatment of Austrian economic thought, emphasizing subjective value, entrepreneurial action, and the role of sound money in fostering prosperity. The book serves both as an introductory text for students and as a reference for anyone seeking to understand economics from a tradition rooted in the works of Menger, Mises, and Rothbard.

title: "Grokking Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Jeśli myślisz, że Bitcoin to tylko alternatywna waluta dla geeków, czas pomyśleć jeszcze raz. Grokking Bitcoin otwiera ten potężny rozproszony system Ledger, badając technologię, która umożliwia aplikacje zarówno do transakcji finansowych opartych na Bitcoin, jak i wykorzystując Blockchain do rejestracji własności fizycznej Ownership. Dzięki temu w pełni ilustrowanemu, łatwemu w czytaniu przewodnikowi w końcu zrozumiesz, jak działa Bitcoin, jak możesz go używać i dlaczego możesz zaufać Blockchain.
  
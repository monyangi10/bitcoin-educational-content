title: "Grokking Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Ako mislite da je Bitcoin samo alternativna valuta za štrebere, vreme je da razmislite ponovo. Razumevanje Bitcoin otvara ovaj moćni distribuirani Ledger sistem, istražujući tehnologiju koja omogućava aplikacije kako za Bitcoin-bazirane finansijske transakcije, tako i za korišćenje Blockchain za registraciju fizičke imovine Ownership. Uz ovaj potpuno ilustrovani, lako čitljiv vodič, konačno ćete razumeti kako Bitcoin funkcioniše, kako ga možete koristiti i zašto možete verovati Blockchain.
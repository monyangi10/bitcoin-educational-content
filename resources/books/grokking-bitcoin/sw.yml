title: "Grokking Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Iwapo unafikiri Bitcoin ni sarafu mbadala ya wajinga, ni wakati wa kufikiria tena. Grokking Bitcoin inafungua mfumo huu wa nguvu uliosambazwa wa Ledger, ikichunguza teknolojia inayowezesha programu kwa miamala ya kifedha inayotegemea Bitcoin na kutumia Blockchain kusajili mali halisi ya Ownership. Ukiwa na mwongozo huu ulio na michoro kamili, na rahisi kusoma, hatimaye utaelewa jinsi Bitcoin inavyofanya kazi, jinsi unavyoweza kuitumia, na kwa nini unaweza kuamini Blockchain.
  
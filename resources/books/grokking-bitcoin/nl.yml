title: "Grokking Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Als je denkt dat Bitcoin alleen maar een alternatieve valuta voor nerds is, is het tijd om nog eens na te denken. Grokking Bitcoin opent dit krachtige gedistribueerde Ledger systeem, en verkent de technologie die toepassingen mogelijk maakt voor zowel op Bitcoin gebaseerde financiële transacties als het gebruik van Blockchain voor het registreren van fysiek bezit Ownership. Met deze volledig geïllustreerde, gemakkelijk te lezen gids, zult u eindelijk begrijpen hoe Bitcoin werkt, hoe u het kunt gebruiken en waarom u de Blockchain kunt vertrouwen.
  
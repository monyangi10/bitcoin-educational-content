title: "Grokking Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Bitcoin'ün sadece inekler için alternatif bir para birimi olduğunu düşünüyorsanız, tekrar düşünmenin zamanı geldi. Grokking Bitcoin, bu güçlü dağıtılmış Ledger sistemini açarak hem Bitcoin tabanlı finansal işlemler için hem de Blockchain'i fiziksel mülk Ownership'yi kaydetmek için kullanan uygulamaları mümkün kılan teknolojiyi keşfediyor. Bu tamamen resimli, okunması kolay kılavuz ile sonunda Bitcoin'ün nasıl çalıştığını, nasıl kullanabileceğinizi ve Blockchain'e neden güvenebileceğinizi anlayacaksınız.
  
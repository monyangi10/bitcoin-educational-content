title: "ग्रोकिंग Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  अगर आपको लगता है कि Bitcoin सिर्फ़ गीक्स के लिए एक वैकल्पिक मुद्रा है, तो फिर से सोचने का समय आ गया है। Bitcoin को समझना इस शक्तिशाली वितरित Ledger सिस्टम को खोलता है, जो उस तकनीक की खोज करता है जो Bitcoin-आधारित वित्तीय लेनदेन और भौतिक संपत्ति Ownership को पंजीकृत करने के लिए Blockchain का उपयोग करने के लिए अनुप्रयोगों को सक्षम बनाता है। इस पूरी तरह से सचित्र, आसानी से पढ़ी जाने वाली मार्गदर्शिका के साथ, आप अंततः समझ जाएँगे कि Bitcoin कैसे काम करता है, आप इसका उपयोग कैसे कर सकते हैं, और आप Blockchain पर क्यों भरोसा कर सकते हैं।
title: "Grokking Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  如果您認為 Bitcoin 只是極客們的另類貨幣，那麼是時候再想一想了。Grokking Bitcoin 開啟了這個功能強大的分散式 Ledger 系統，探索了可應用於基於 Bitcoin 的金融交易以及使用 Blockchain 註冊實物財產 Ownership 的技術。透過這本圖文並茂、容易閱讀的指南，您終於可以了解 Bitcoin 如何運作、如何使用，以及為什麼您可以信任 Blockchain。
  
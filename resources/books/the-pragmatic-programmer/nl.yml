title: "De pragmatische programmeur"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Pragmatic Programmer is een boek over softwareontwikkeling en programmeren dat advies geeft over hoe je een betere programmeur kunt worden. Het boek is geschreven door Andy Hunt en Dave Thomas en geeft tips over hoe je softwareontwikkeling kunt benaderen, betere code kunt schrijven en efficiënter kunt werken in teamverband. Het behandelt een breed scala aan onderwerpen, waaronder codeerpraktijken, testen, debuggen en ontwerppatronen, en bevat praktische voorbeelden en casestudies. Het boek is gericht op gemiddelde programmeurs die hun vaardigheden willen verbeteren en effectiever willen worden in hun werk.
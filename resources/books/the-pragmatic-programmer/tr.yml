title: "Pragmatik Programcı"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Pragmatik Programcı, nasıl daha iyi bir programcı olunacağına dair tavsiyeler sunan, yazılım geliştirme ve programlama hakkında bir kitaptır. Andy Hunt ve Dave Thomas tarafından yazılan kitap, yazılım geliştirmeye nasıl yaklaşılacağı, daha iyi kod yazılacağı ve bir ekip olarak nasıl daha verimli çalışılacağı konusunda ipuçları vermektedir. Kodlama uygulamaları, test etme, hata ayıklama ve tasarım kalıpları gibi çok çeşitli konuları kapsayan kitap, pratik örnekler ve vaka çalışmaları da içeriyor. Kitap, becerilerini geliştirmek ve işlerinde daha etkili olmak isteyen orta düzey programcılara yöneliktir.
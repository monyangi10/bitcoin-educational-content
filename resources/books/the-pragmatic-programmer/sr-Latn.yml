title: "Pragmatični Programer"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Pragmatični Programer je knjiga o razvoju softvera i programiranju koja nudi savete o tome kako postati bolji programer. Napisali su je Endi Hant i Dejv Tomas, a knjiga pruža savete o tome kako pristupiti razvoju softvera, pisati bolji kod i raditi efikasnije kao tim. Pokriva širok spektar tema, uključujući prakse kodiranja, testiranje, otklanjanje grešaka i obrasce dizajna, i uključuje praktične primere i studije slučaja. Knjiga je namenjena programerima srednjeg nivoa koji žele da unaprede svoje veštine i postanu efikasniji u svom poslu.
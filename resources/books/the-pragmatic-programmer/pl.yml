title: "Pragmatyczny programista"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  The Pragmatic Programmer to książka o tworzeniu oprogramowania i programowaniu, która zawiera porady, jak stać się lepszym programistą. Napisana przez Andy'ego Hunta i Dave'a Thomasa książka zawiera wskazówki dotyczące podejścia do tworzenia oprogramowania, pisania lepszego kodu i wydajniejszej pracy zespołowej. Obejmuje szeroki zakres tematów, w tym praktyki kodowania, testowanie, debugowanie i wzorce projektowe, a także zawiera praktyczne przykłady i studia przypadków. Książka skierowana jest do średnio zaawansowanych programistów, którzy chcą poprawić swoje umiejętności i stać się bardziej efektywni w swojej pracy.
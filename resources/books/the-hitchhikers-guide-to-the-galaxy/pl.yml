title: "Autostopem przez galaktykę"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  The Hitchhiker's Guide to the Galaxy autorstwa Douglasa Adamsa to humorystyczna powieść science fiction, która zabiera czytelników w dowcipną i szaloną podróż w czasie i przestrzeni. Śledzi ona perypetie Arthura Denta i jego przyjaciela z kosmosu, Forda Prefecta, podczas serii międzygalaktycznych eskapad. Dzięki pomysłowemu budowaniu świata i dowcipnemu humorowi, ten ukochany klasyk jest idealny dla początkujących czytelników poszukujących zabawnej lektury science fiction.
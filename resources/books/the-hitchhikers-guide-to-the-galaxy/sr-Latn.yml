title: "Autostoperski vodič kroz galaksiju"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Autostoperski vodič kroz galaksiju od Daglasa Adamsa je duhovit naučnofantastični roman koji vodi čitaoce na duhovito i divlje putovanje kroz prostor i vreme. Prati nezgode Artura Denta i njegovog vanzemaljskog prijatelja Forda Prefekta dok se snalaze kroz niz međugalaktičkih avantura. Sa maštovitim stvaranjem svetova i duhovitim humorom, ovaj omiljeni klasik je savršen za početnike koji traže zabavno naučnofantastično štivo.
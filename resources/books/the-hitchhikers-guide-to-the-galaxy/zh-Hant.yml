title: 「銀河搭車指南」
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  道格拉斯-亞當斯 (Douglas Adams) 所著的《銀河旅行者指南》(The Hitchhiker's Guide to the Galaxy) 是一部幽默的科幻小說，帶領讀者展開一段诙谐而狂野的時空旅程。故事講述 Arthur Dent 和他的外星朋友 Ford Prefect 在一連串星際逃亡中的不幸遭遇。這本受人喜愛的經典小說擁有充滿想像力的世界建構和俏皮幽默的風格，非常適合尋求娛樂性科幻讀物的初學者。
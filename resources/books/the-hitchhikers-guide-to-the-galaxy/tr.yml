title: "Otostopçunun Galaksi Rehberi"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  Douglas Adams'ın yazdığı Otostopçunun Galaksi Rehberi, okuyucuları uzay ve zamanda esprili ve vahşi bir yolculuğa çıkaran mizahi bir bilim kurgu romanıdır. Arthur Dent ve uzaylı arkadaşı Ford Prefect'in galaksiler arası bir dizi macerasını konu alır. Yaratıcı dünya kurgusu ve esprili mizahıyla bu sevilen klasik, eğlenceli bir bilimkurgu okumak isteyen yeni başlayanlar için mükemmeldir.
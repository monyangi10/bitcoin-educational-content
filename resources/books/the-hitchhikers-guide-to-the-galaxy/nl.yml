title: "The Hitchhiker's Guide to the Galaxy"
publication_year: 1979
cover: cover_en.webp
original: true
description: |
  The Hitchhiker's Guide to the Galaxy van Douglas Adams is een humoristische sciencefictionroman die lezers meeneemt op een geestige en wilde reis door ruimte en tijd. Het volgt de avonturen van Arthur Dent en zijn buitenaardse vriend Ford Prefect tijdens hun intergalactische escapades. Met een fantasierijke wereldopbouw en geestige humor is deze geliefde klassieker perfect voor beginners die op zoek zijn naar een onderhoudend sciencefictionboek.
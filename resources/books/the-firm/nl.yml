title: "De onderneming, de markt en de wet"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  Weinig andere economen zijn zo vaak gelezen en geciteerd als R.H. Coase, ook al geeft hij toe dat "de meeste economen een andere manier hebben om naar economische problemen te kijken en mijn opvatting over de aard van ons onderwerp niet delen Coase's speciale belangstelling ging uit naar dat deel van de economische theorie dat zich bezighoudt met bedrijven, industrieën en markten - wat bekend staat als prijstheorie of micro-economie. Hij heeft zijn collega-economen altijd aangespoord om de grondslagen van hun theorie te onderzoeken, en in deze bundel zijn enkele van zijn klassieke artikelen verzameld die juist die grondslagen onderzoeken. "The Nature of the Firm" (1937) introduceerde het toen revolutionaire concept van transactiekosten in de economische theorie. "The Problem of Social Cost" (1960) ontwikkelde dit concept verder en benadrukte het effect van de wet op de werking van het economische systeem. De overige artikelen en het nieuwe inleidende essay verduidelijken en breiden de argumenten van Coarse uit en Address zijn critici.
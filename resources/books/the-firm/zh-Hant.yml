title: 「公司、市場與法律」
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  很少有其他經濟學家像科斯 (R.H. Coase) 一樣經常被閱讀和引用，儘管正如他所承認的，「大多數經濟學家對經濟問題有不同的看法，也不認同我對我們研究主題本質的概念」。科斯特別感興趣的是經濟理論中關於公司、產業和市場的部分，也就是所謂的價格理論或微觀經濟學。他總是敦促他的經濟學家同仁檢視他們的理論所依據的基礎，本集收錄了他一些探討這些基礎的經典文章。"公司的本質」（The Nature of the Firm，1937 年）將當時革命性的交易成本概念引入經濟理論。"The Problem of Social Cost" (1960) 進一步發展了這個概念，強調法律對經濟體系運作的影響。其餘的論文和新的介紹性文章闡明並延伸了 Coarse 的論點，並 Address 了他的批評者。
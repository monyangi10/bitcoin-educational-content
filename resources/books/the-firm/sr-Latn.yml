title: "Firma, tržište i zakon"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  Nekolicina drugih ekonomista je čitana i citirana tako često kao R.H. Coase, iako, kako on priznaje, "većina ekonomista ima drugačiji način gledanja na ekonomske probleme i ne deli moju koncepciju prirode našeg predmeta." Coaseov poseban interes bio je onaj deo ekonomske teorije koji se bavi firmama, industrijama i tržištima—ono što je poznato kao teorija cena ili mikroekonomija. Uvek je pozivao svoje kolege ekonomiste da ispitaju temelje na kojima njihova teorija postoji, a ovaj tom sakuplja neke od njegovih klasičnih članaka koji istražuju upravo te temelje. "Priroda firme" (1937) uvela je tada revolucionarni koncept transakcionih troškova u ekonomsku teoriju. "Problem društvenog troška" (1960) dalje je razvio ovaj koncept, naglašavajući uticaj zakona na funkcionisanje ekonomskog sistema. Preostali radovi i novi uvodni esej pojašnjavaju i proširuju Coaseove argumente i Address njegove kritičare.
title: "Firma, Piyasa ve Hukuk"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  Kendisinin de kabul ettiği gibi, "çoğu iktisatçının ekonomik sorunlara bakışı farklıdır ve konumuzun doğasına ilişkin benim anlayışımı paylaşmazlar" olmasına rağmen, çok az iktisatçı R.H. Coase kadar okunmuş ve ondan sıkça alıntı yapılmıştır Coase'nin özel ilgi alanı, ekonomi teorisinin firmalar, endüstriler ve piyasalarla ilgilenen kısmı, yani fiyat teorisi ya da mikroekonomi olarak bilinen kısmı olmuştur. Coase, iktisatçı dostlarını her zaman teorilerinin dayandığı temelleri incelemeye teşvik etmiştir ve bu kitap, onun bu temelleri araştıran klasik makalelerinden bazılarını bir araya getirmektedir. "The Nature of the Firm" (1937) o zamanlar devrim niteliğinde olan işlem maliyetleri kavramını ekonomi teorisine kazandırmıştır. "The Problem of Social Cost" (1960) bu kavramı daha da geliştirerek hukukun ekonomik sistemin işleyişi üzerindeki etkisini vurgulamıştır. Geri kalan makaleler ve yeni giriş makalesi Coarse'ın argümanlarını açıklığa kavuşturup genişletmekte ve eleştirmenlerini Address etmektedir.
title: "Kampuni, Soko na Sheria"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  Wachumi wengine wachache wamesomwa na kutajwa mara nyingi kama R.H. Coase amekuwa, ingawa, kama anavyokubali, "wachumi wengi wana njia tofauti ya kuangalia matatizo ya kiuchumi na hawashiriki mawazo yangu ya asili ya somo letu." Maslahi mahususi ya Coase yamekuwa ile sehemu ya nadharia ya uchumi ambayo inahusika na makampuni, viwanda na masoko—kinachojulikana kama nadharia ya bei au uchumi mdogo. Daima amewahimiza wanauchumi wenzake kuchunguza misingi ambayo nadharia yao ipo, na juzuu hili linakusanya baadhi ya makala zake za kitambo zinazochunguza misingi hiyo. "Nature of the Firm" (1937) ilianzisha dhana ya mapinduzi ya wakati huo ya gharama za shughuli katika nadharia ya kiuchumi. "Tatizo la Gharama ya Kijamii" (1960) iliendeleza zaidi dhana hii, ikisisitiza athari za sheria juu ya utendaji wa mfumo wa kiuchumi. Karatasi zilizobaki na insha mpya ya utangulizi hufafanua na kupanua hoja za Coarse na Address wakosoaji wake.
title: "Firma, rynek i prawo"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  Niewielu innych ekonomistów było czytanych i cytowanych tak często jak R.H. Coase, mimo że, jak sam przyznaje, "większość ekonomistów ma inny sposób patrzenia na problemy gospodarcze i nie podziela mojej koncepcji natury naszego tematu" Szczególnym zainteresowaniem Coase'a była ta część teorii ekonomii, która zajmuje się firmami, branżami i rynkami - co jest znane jako teoria cen lub mikroekonomia. Zawsze zachęcał swoich kolegów ekonomistów do zbadania fundamentów, na których opiera się ich teoria, a niniejszy tom zbiera niektóre z jego klasycznych artykułów badających te właśnie fundamenty. "The Nature of the Firm" (1937) wprowadził rewolucyjną wówczas koncepcję kosztów transakcyjnych do teorii ekonomii. "The Problem of Social Cost" (1960) rozwinął tę koncepcję, podkreślając wpływ prawa na funkcjonowanie systemu gospodarczego. Pozostałe artykuły i nowy esej wprowadzający wyjaśniają i rozszerzają argumenty Coarse'a oraz Address jego krytyków.
title: "फर्म, बाजार और कानून"
publication_year: 1988
cover: cover_en.webp
original: true
description: |
  बहुत कम अन्य अर्थशास्त्रियों को आर.एच. कोज़ की तरह पढ़ा और उद्धृत किया गया है, भले ही, जैसा कि वे स्वीकार करते हैं, "अधिकांश अर्थशास्त्रियों का आर्थिक समस्याओं को देखने का एक अलग तरीका है और वे हमारे विषय की प्रकृति के बारे में मेरी अवधारणा को साझा नहीं करते हैं।" कोज़ की विशेष रुचि आर्थिक सिद्धांत के उस हिस्से में रही है जो फर्मों, उद्योगों और बाजारों से संबंधित है - जिसे मूल्य सिद्धांत या सूक्ष्म अर्थशास्त्र के रूप में जाना जाता है। उन्होंने हमेशा अपने साथी अर्थशास्त्रियों से उन नींवों की जांच करने का आग्रह किया है जिन पर उनका सिद्धांत मौजूद है, और यह खंड उन्हीं नींवों की जांच करने वाले उनके कुछ क्लासिक लेखों को एकत्र करता है। "द नेचर ऑफ द फर्म" (1937) ने आर्थिक सिद्धांत में लेनदेन लागत की तत्कालीन क्रांतिकारी अवधारणा को पेश किया। "द प्रॉब्लम ऑफ सोशल कॉस्ट" (1960) ने इस अवधारणा को और विकसित किया, जिसमें आर्थिक प्रणाली के कामकाज पर कानून के प्रभाव पर जोर दिया गया। शेष शोधपत्र और नया परिचयात्मक निबंध कोर्स के तर्कों और उनके आलोचकों के तर्कों को स्पष्ट और विस्तारित करता है।
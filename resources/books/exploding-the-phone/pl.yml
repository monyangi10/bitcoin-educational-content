title: "Eksplodujący telefon"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  W książce "Exploding the Phone, The Untold Story of the Teenagers and Outlaws Who Hacked Ma Bell" autor Phil Lapsley przedstawia wciągającą opowieść o zróżnicowanej grupie osób, które w czasach przed smartfonami i Internetem odkryły, jak zhakować największy na świecie system telefoniczny. Od wczesnych dni "telegrafu harmonicznego" Alexandra Grahama Bella po złożoną sieć najnowocześniejszych maszyn i ludzkich operatorów, którzy tworzyli system telefoniczny, Lapsley zagłębia się w narodziny komunikacji międzymiastowej i powstanie monopolu AT&T.
  
  Dzięki skrupulatnym badaniom Lapsley rzuca światło na podziemny świat "telefonicznych phreaków", subkultury technofilów, niewidomych nastolatków, hipisów i banitów, którzy przekształcili sieć telefoniczną w swój elektroniczny plac zabaw. Bada, w jaki sposób osoby te wykorzystywały słabe punkty systemu Ma Bell, przyciągając uwagę zarówno gangsterów próbujących uniknąć władz, jak i entuzjastów kontrkultury zajmujących się hakowaniem telefonów. Książka zagłębia się również w intensywny konflikt między phreakami, firmą telefoniczną i FBI.
  
  "Exploding the Phone" oferuje przełomową i wciągającą relację z tej nieopowiedzianej historii, opierając się na oryginalnych badaniach, aby odsłonić tajny świat hakowania telefonów i jego wpływ na społeczeństwo. Jest to świadectwo pomysłowości i zuchwałości tych, którzy podważyli status quo i na zawsze zmienili krajobraz telekomunikacji.
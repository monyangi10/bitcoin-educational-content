title: "De telefoon laten ontploffen"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  In "Exploding the Phone, The Untold Story of the Teenagers and Outlaws Who Hacked Ma Bell" onthult auteur Phil Lapsley het boeiende verhaal van een diverse groep individuen die, in een tijd vóór smartphones en internet, ontdekten hoe ze het grootste telefoonsysteem ter wereld konden hacken. Van de begindagen van Alexander Graham Bell's "harmonische telegraaf" tot het complexe web van geavanceerde machines en menselijke operators waaruit het telefoonsysteem bestond, Lapsley duikt in de geboorte van langeafstandscommunicatie en de opkomst van AT&T's monopolie.
  
  Door middel van nauwgezet onderzoek werpt Lapsley licht op de ondergrondse wereld van "phone phreaks", een subcultuur van technofielen, blinde tieners, hippies en outlaws die het telefoonnetwerk veranderden in hun elektronische speeltuin. Hij onderzoekt hoe deze individuen de kwetsbaarheden van het systeem van Ma Bell uitbuitten en zo de aandacht trokken van zowel gangsters die de autoriteiten wilden ontlopen als liefhebbers van de tegencultuur die aan telefoonhacking deden. Het boek gaat ook in op het intense conflict tussen de phreaks, het telefoonbedrijf en de FBI.
  
  "Exploding the Phone" biedt een baanbrekend en boeiend verslag van dit onvertelde verhaal, gebaseerd op origineel onderzoek om de clandestiene wereld van telefoonhacking en de impact ervan op de samenleving te onthullen. Het is een getuigenis van de vindingrijkheid en durf van degenen die de status quo uitdaagden en het landschap van de telecommunicatie voor altijd veranderden.
title: "फ़ोन में विस्फोट"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  "एक्सप्लोडिंग द फोन, द अनटोल्ड स्टोरी ऑफ द टीनएजर्स एंड आउटलॉज हू हैक्ड मा बेल" में लेखक फिल लैप्सली ने ऐसे व्यक्तियों के एक विविध समूह की आकर्षक कहानी का खुलासा किया है, जिन्होंने स्मार्टफोन और इंटरनेट से पहले के समय में दुनिया के सबसे बड़े टेलीफोन सिस्टम को हैक करने का तरीका खोजा था। अलेक्जेंडर ग्राहम बेल के "हार्मोनिक टेलीग्राफ" के शुरुआती दिनों से लेकर अत्याधुनिक मशीनों और मानव ऑपरेटरों के जटिल जाल तक, जिसमें फोन सिस्टम शामिल था, लैप्सली ने लंबी दूरी के संचार के जन्म और AT&T के एकाधिकार के उदय पर गहराई से चर्चा की है।
  
  सावधानीपूर्वक शोध के माध्यम से, लैप्सली ने "फोन फ़्रीक्स" की भूमिगत दुनिया पर प्रकाश डाला, जो कि टेक्नोफाइल्स, अंधे किशोरों, हिप्पी और अपराधियों की एक उपसंस्कृति है, जिन्होंने फोन नेटवर्क को अपने इलेक्ट्रॉनिक खेल के मैदान में बदल दिया। वह पता लगाता है कि कैसे इन व्यक्तियों ने मा बेल की प्रणाली की कमज़ोरियों का फायदा उठाया, जिससे अधिकारियों से बचने की कोशिश करने वाले गुंडों और टेलीफोन हैकिंग में शामिल काउंटरकल्चर उत्साही दोनों का ध्यान आकर्षित हुआ। यह पुस्तक फ्रिक्स, फोन कंपनी और एफबीआई के बीच तीव्र संघर्ष पर भी प्रकाश डालती है।
  
  "एक्सप्लोडिंग द फोन" इस अनकही कहानी का एक महत्वपूर्ण और आकर्षक विवरण प्रस्तुत करता है, जो फोन हैकिंग की गुप्त दुनिया और समाज पर इसके प्रभाव को उजागर करने के लिए मूल शोध पर आधारित है। यह उन लोगों की सरलता और साहस का प्रमाण है जिन्होंने यथास्थिति को चुनौती दी और दूरसंचार के परिदृश्य को हमेशा के लिए बदल दिया।
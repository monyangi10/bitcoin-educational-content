title: "Kulipuka kwa simu"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  Katika "Exploding the Phone, The Untold Story of the Teenagers and Outlaws Who Hacked Ma Bell," mwandishi Phil Lapsley anafichua hadithi ya kuvutia ya kikundi tofauti cha watu ambao, katika muda kabla ya simu mahiri na Mtandao, waligundua jinsi ya kudukua mfumo mkubwa zaidi wa simu duniani. Kuanzia siku za mwanzo za "harmonic telegraph" ya Alexander Graham Bell hadi mtandao changamano wa mashine za kisasa na waendeshaji wa kibinadamu ambao ulijumuisha mfumo wa simu, Lapsley anachunguza kuzaliwa kwa mawasiliano ya masafa marefu na kuongezeka kwa ukiritimba wa AT&T.
  
  Kupitia utafiti wa kina, Lapsley anaangazia ulimwengu wa chinichini wa "mipasho ya simu," utamaduni mdogo wa wanateknolojia, vijana vipofu, viboko, na wahalifu ambao walibadilisha mtandao wa simu kuwa uwanja wao wa michezo wa kielektroniki. Anachunguza jinsi watu hawa walivyotumia udhaifu wa mfumo wa Ma Bell, na kuvutia usikivu wa wahuni waliotaka kukwepa mamlaka na wapenda utamaduni wa kupinga udukuzi wa simu. Kitabu hiki pia kinaangazia mzozo mkali kati ya phreaks, kampuni ya simu na FBI.
  
  "Kulipuka kwa Simu" inatoa akaunti ya msingi na ya kuvutia ya hadithi hii isiyoelezeka, ikichochewa na utafiti wa awali ili kufichua ulimwengu wa siri wa udukuzi wa simu na athari zake kwa jamii. Ni uthibitisho wa werevu na uthubutu wa wale waliopinga hali iliyopo na kubadilisha milele mazingira ya mawasiliano ya simu.
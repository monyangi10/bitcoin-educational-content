title: 「引爆手機」
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  在《Exploding the Phone, The Untold Story of the Teenagers and Outlaws Who Hacked Ma Bell》一書中，作者 Phil Lapsley 娓娓道出在智慧型手機和網際網路尚未普及的年代，一群不同的人如何入侵全球最大的電話系統。從早期 Alexander Graham Bell 的「和聲電報」，到組成電話系統的尖端機器與人工操作的複雜網絡，Lapsley 深入探討長途通訊的誕生以及 AT&T 壟斷地位的崛起。
  
  透過縝密的研究，Lapsley 揭露了「電話竊聽者」的地下世界，這是一種由技術狂熱者、失明青少年、嬉皮士和不法之徒組成的次文化，他們將電話網路變成了自己的電子遊樂場。他探討了這些人如何利用 Ma Bell 系統的弱點，吸引想逃避當局追捕的暴徒和從事電話駭客活動的反主流文化狂熱者的注意。本書也深入探討了 Phreaks、電話公司和 FBI 之間的激烈衝突。
  
  "Exploding the Phone "對這個不為人知的故事進行了開創性和引人入勝的描述，利用原始研究揭開了電話黑客的秘密世界及其對社會的影響。這本書證明了那些挑戰現狀、永遠改變電信格局的人的智慧與膽識。
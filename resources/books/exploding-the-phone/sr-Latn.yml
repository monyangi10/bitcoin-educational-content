title: "Exploding the Phone"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  U "Exploding the Phone, The Untold Story of the Teenagers and Outlaws Who Hacked Ma Bell," autor Phil Lapsley otkriva fascinantnu priču o raznolikoj grupi pojedinaca koji su, u vreme pre pametnih telefona i interneta, otkrili kako da hakuju najveći telefonski sistem na svetu. Od ranih dana "harmoničnog telegrafa" Aleksandra Grahama Bela do složene mreže najsavremenijih mašina i ljudskih operatera koji su činili telefonski sistem, Lapsley istražuje rađanje komunikacije na daljinu i uspon monopola AT&T-a.
  
  Kroz detaljno istraživanje, Lapsley osvetljava podzemni svet "phone phreaks," subkulture tehnofila, slepih tinejdžera, hipika i odmetnika koji su telefonsku mrežu pretvorili u svoje elektronsko igralište. On istražuje kako su ovi pojedinci iskoristili ranjivosti sistema Ma Bell, privlačeći pažnju i mafijaša koji su želeli da izbegnu vlasti i entuzijasta kontrakulture koji su se bavili hakovanjem telefona. Knjiga takođe istražuje intenzivan sukob između phreakova, telefonske kompanije i FBI-a.
  
  "Exploding the Phone" nudi revolucionaran i fascinantan prikaz ove neispričane priče, oslanjajući se na originalna istraživanja kako bi otkrio tajni svet hakovanja telefona i njegov uticaj na društvo. To je svedočanstvo o domišljatosti i smelosti onih koji su izazvali status quo i zauvek promenili pejzaž telekomunikacija.
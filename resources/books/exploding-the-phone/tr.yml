title: "Telefonu Patlatmak"
publication_year: 2013
cover: cover_en.webp
original: true
description: |
  "Exploding the Phone, The Untold Story of the Teenagers and Outlaws Who Hacked Ma Bell" kitabında yazar Phil Lapsley, akıllı telefonlar ve internetten önceki bir zamanda dünyanın en büyük telefon sistemini nasıl hackleyeceklerini keşfeden farklı bir grup bireyin büyüleyici hikayesini gözler önüne seriyor. Alexander Graham Bell'in "harmonik telgraf "ının ilk günlerinden telefon sistemini oluşturan son teknoloji makineler ve insan operatörlerden oluşan karmaşık ağa kadar Lapsley, uzun mesafeli iletişimin doğuşunu ve AT&T'nin tekelinin yükselişini inceliyor.
  
  Lapsley titiz araştırmalarıyla, telefon şebekesini elektronik oyun alanlarına dönüştüren teknofiller, kör gençler, hippiler ve kanun kaçaklarından oluşan bir alt kültür olan "telefon korsanlarının" yeraltı dünyasına ışık tutuyor. Bu kişilerin Ma Bell'in sistemindeki açıklardan nasıl yararlandıklarını ve hem yetkililerden kaçmak isteyen gangsterlerin hem de telefon korsanlığı yapan karşı kültür meraklılarının dikkatini nasıl çektiklerini araştırıyor. Kitap aynı zamanda phreak'ler, telefon şirketi ve FBI arasındaki yoğun çatışmayı da inceliyor.
  
  "Exploding the Phone", telefon korsanlığının gizli dünyasını ve toplum üzerindeki etkisini ortaya çıkarmak için orijinal araştırmalardan yararlanarak bu anlatılmamış hikayenin çığır açan ve büyüleyici bir anlatımını sunuyor. Statükoya meydan okuyan ve telekomünikasyonun çehresini sonsuza dek değiştirenlerin yaratıcılığının ve cüretkârlığının bir kanıtıdır.
title: "Fiat Food"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Fiat Food examines how the abandonment of the gold standard and the resulting fiat monetary system have fundamentally distorted the American food supply. The book traces how flawed nutrition science, corporate lobbying, and government intervention combined to reshape modern diets, leading to widespread declines in food quality and public health. By connecting monetary inflation to the degradation of agriculture and nutrition, it argues that currency debasement has left people both poorer and sicker. The book ultimately presents Bitcoin as a tool to reverse these trends by removing centralized control over money and restoring individual sovereignty over both financial and dietary choices.

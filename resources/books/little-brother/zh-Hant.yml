title: 「小弟弟」
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  Cory Doctorow 所著的《Little Brother》是一部探索科技時代隱私主題的小說。故事講述一群青少年在舊金山遭受恐怖襲擊後，反抗政府侵犯隱私權。主人公 Marcus 運用他的科技知識反擊政府的監控狀態，激勵其他人加入運動。這本書提出了隱私與安全之間的取捨，以及科技在塑造社會中的角色等重要問題。總而言之，《Little Brother》是一本發人深省、令人興奮的讀物，適合任何對科技與政治交會感興趣的人閱讀。
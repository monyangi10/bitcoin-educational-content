title: "छोटा भाई"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  कोरी डॉक्टरो द्वारा लिखित लिटिल ब्रदर एक ऐसा उपन्यास है जो तकनीकी युग में गोपनीयता के विषय को तलाशता है। कहानी किशोरों के एक समूह की है जो सैन फ्रांसिस्को पर हुए आतंकवादी हमले के बाद सरकार द्वारा गोपनीयता के उल्लंघन के खिलाफ विद्रोह करते हैं। नायक, मार्कस, सरकार के निगरानी राज्य के खिलाफ लड़ने के लिए अपनी तकनीकी समझ का उपयोग करता है, और दूसरों को आंदोलन में शामिल होने के लिए प्रेरित करता है। यह पुस्तक गोपनीयता और सुरक्षा के बीच व्यापार-नापसंद और समाज को आकार देने में प्रौद्योगिकी की भूमिका के बारे में महत्वपूर्ण प्रश्न उठाती है। कुल मिलाकर, लिटिल ब्रदर प्रौद्योगिकी और राजनीति के प्रतिच्छेदन में रुचि रखने वाले किसी भी व्यक्ति के लिए एक विचारोत्तेजक और रोमांचकारी पुस्तक है।
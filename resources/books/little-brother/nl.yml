title: "Kleine broer"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  Little Brother van Cory Doctorow is een roman over privacy in een technologisch tijdperk. Het verhaal volgt een groep tieners die in opstand komen tegen de inbreuk van de overheid op hun privacy in de nasleep van een terroristische aanval op San Francisco. De hoofdpersoon, Marcus, gebruikt zijn technologische kennis om terug te vechten tegen de surveillancestaat van de overheid en inspireert anderen om zich bij de beweging aan te sluiten. Het boek roept belangrijke vragen op over de afwegingen tussen privacy en veiligheid en de rol van technologie in het vormgeven van de samenleving. Over het geheel genomen is Little Brother een uitdagend en spannend boek voor iedereen die geïnteresseerd is in het snijvlak van technologie en politiek.
description: |
  Little Brother by Cory Doctorow je roman koji istražuje temu privatnosti u tehnološkom dobu. Priča prati grupu tinejdžera koji se bune protiv vladinog narušavanja privatnosti nakon terorističkog napada na San Francisko. Protagonista, Markus, koristi svoje tehnološko znanje da se suprotstavi vladinom nadzoru, inspirišući druge da se pridruže pokretu. Knjiga postavlja važna pitanja o kompromisima između privatnosti i sigurnosti, i ulozi tehnologije u oblikovanju društva. Sve u svemu, Little Brother je provokativno i uzbudljivo štivo za svakoga ko je zainteresovan za presek tehnologije i politike.
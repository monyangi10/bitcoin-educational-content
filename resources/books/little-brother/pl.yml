title: "Little Brother"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  Little Brother autorstwa Cory'ego Doctorowa to powieść poruszająca temat prywatności w erze technologii. Historia opowiada o grupie nastolatków, którzy buntują się przeciwko inwazji rządu na prywatność w następstwie ataku terrorystycznego na San Francisco. Główny bohater, Marcus, wykorzystuje swoje technologiczne umiejętności do walki z rządowym państwem nadzoru, inspirując innych do przyłączenia się do ruchu. Książka stawia ważne pytania dotyczące kompromisów między prywatnością a bezpieczeństwem oraz roli technologii w kształtowaniu społeczeństwa. Ogólnie rzecz biorąc, Little Brother to prowokująca do myślenia i ekscytująca lektura dla każdego, kto interesuje się skrzyżowaniem technologii i polityki.
title: "Küçük Kardeş"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  Cory Doctorow'un yazdığı Küçük Kardeş, teknoloji çağında mahremiyet temasını işleyen bir roman. Hikâye, San Francisco'ya yapılan bir terörist saldırının ardından hükümetin mahremiyeti ihlal etmesine karşı isyan eden bir grup genci takip ediyor. Başkahraman Marcus, hükümetin gözetim devletine karşı mücadele etmek için teknolojik zekasını kullanıyor ve diğerlerine de harekete katılmaları için ilham veriyor. Kitap, mahremiyet ve güvenlik arasındaki dengeler ve teknolojinin toplumu şekillendirmedeki rolü hakkında önemli soruları gündeme getiriyor. Genel olarak Küçük Kardeş, teknoloji ve siyasetin kesiştiği noktalara ilgi duyan herkes için düşündürücü ve heyecan verici bir okuma.
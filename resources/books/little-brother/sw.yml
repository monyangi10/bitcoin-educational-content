title: "Ndugu mdogo"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  Kaka mdogo na Cory Doctorow ni riwaya ambayo inachunguza mada ya faragha katika enzi ya kiteknolojia. Kisa hiki kinafuatia kundi la vijana walioasi dhidi ya uvamizi wa faragha wa serikali baada ya shambulio la kigaidi huko San Francisco. Mhusika mkuu, Marcus, anatumia ujuzi wake wa kiteknolojia kupigana dhidi ya hali ya ufuatiliaji ya serikali, kuwahamasisha wengine kujiunga na harakati. Kitabu hiki kinazua maswali muhimu kuhusu maelewano kati ya faragha na usalama, na jukumu la teknolojia katika kuunda jamii. Kwa ujumla, Ndugu Mdogo ni somo la kufikirika na la kusisimua kwa yeyote anayevutiwa na makutano ya teknolojia na siasa.
title: "Wat ik leerde door een miljoen dollar te verliezen"
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  What I Learned Losing a Million Dollars is een boek van Jim Paul, een voormalig grondstoffenhandelaar, en Brendan Moynihan, een financieel schrijver. Het boek is een memoires van Jim Pauls ervaringen als grondstoffenhandelaar en de lessen die hij leerde van zijn financiële mislukkingen. De auteurs duiken in de psychologische en emotionele aspecten van handelen en beleggen en onderzoeken hoe onze gedachten en gedragingen ons financiële succes kunnen beïnvloeden. Met de nadruk op risicobeheer en persoonlijke ontwikkeling biedt dit boek waardevolle inzichten voor iedereen die zich een weg wil banen door de onvoorspelbare financiële wereld.
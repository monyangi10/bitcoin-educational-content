title: 「輸掉一百萬美元的心得」
publication_year: 1994
cover: cover_en.webp
original: true
description: |
  What I Learned Losing a Million Dollars》是前期貨交易員 Jim Paul 和金融作家 Brendan Moynihan 的著作。這本書是 Jim Paul 的回憶錄，記載了他作為商品交易商的經歷，以及他從金融失敗中汲取的教訓。作者深入探討了交易和投資的心理和情感方面，探討了我們的思想和行為如何影響我們的財務成功。本書著重風險管理和個人發展，為任何希望在變幻莫測的金融世界中遨遊的人提供了寶貴的見解。
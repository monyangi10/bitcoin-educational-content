title: "Het soevereine individu"
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  The Sovereign Individual is een non-fictie boek dat ingaat op het concept van individuele soevereiniteit en de mogelijke opkomst daarvan in het digitale tijdperk, met name in de context van internet en andere technologische ontwikkelingen. Het boek onderzoekt de implicaties van gedecentraliseerde netwerken, cryptografie en digitale munteenheden op de samenleving en de individuele vrijheid, met als argument dat deze zullen leiden tot een significante transformatie van bestuur, economie en cultuur. Het bespreekt ook de mogelijke opkomst van een nieuw soort elite, het soevereine individu, dat door deze technologische ontwikkelingen de macht zou krijgen en in staat zou zijn om traditionele machtsstructuren te omzeilen. Het boek zet aan tot nadenken en is een uitdaging voor iedereen die geïnteresseerd is in de mogelijke impact van Bitcoin en het digitale tijdperk op onze samenleving en manier van leven.
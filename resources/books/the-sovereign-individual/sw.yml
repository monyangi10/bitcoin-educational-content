title: "Mtu binafsi"
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  Sovereign Individual ni kitabu kisicho cha kubuni ambacho huangazia dhana ya uhuru wa mtu binafsi na uwezekano wake kuibuka katika enzi ya kidijitali, hasa katika muktadha wa intaneti na maendeleo mengine ya kiteknolojia. Kitabu hiki kinachunguza athari za mitandao iliyogatuliwa, fiche, na sarafu za kidijitali kwenye jamii na uhuru wa mtu binafsi, kikihoji kwamba zitasababisha mabadiliko makubwa ya utawala, uchumi na utamaduni. Pia inajadili uwezekano wa kuongezeka kwa aina mpya ya wasomi, mtu huru, ambaye angewezeshwa na maendeleo haya ya kiteknolojia na kuweza kukwepa miundo ya jadi ya nguvu. Kitabu hiki ni chenye kuchochea fikira na changamoto kwa wale wanaovutiwa na athari inayoweza kutokea ya Bitcoin na enzi ya kidijitali kwa jamii na mtindo wetu wa maisha.
title: 「主權的個人」
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  The Sovereign Individual 是一本非小說著作，深入探討個人主權的概念及其在數位時代的潛在崛起，尤其是在網際網路和其他科技進步的背景下。該書探討了分散式網路、加密技術和數位貨幣對社會和個人自由的影響，認為它們將導致治理、經濟和文化的重大轉變。書中也討論了一種新的精英--主權個人的潛在崛起，他們將獲得這些技術發展的賦予，並能夠規避傳統的權力結構。對於那些對 Bitcoin 和數位時代對我們的社會和生活方式的潛在影響感興趣的人來說，這本書是一本發人深省、充滿挑戰的讀物。
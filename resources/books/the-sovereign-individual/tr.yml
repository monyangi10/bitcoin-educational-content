title: "Egemen Birey"
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  Egemen Birey, bireysel egemenlik kavramını ve bu kavramın dijital çağda, özellikle de internet ve diğer teknolojik gelişmeler bağlamında ortaya çıkma potansiyelini inceleyen kurgusal olmayan bir kitaptır. Kitap, merkezi olmayan ağların, kriptografinin ve dijital para birimlerinin toplum ve bireysel özgürlük üzerindeki etkilerini araştırmakta ve bunların yönetişim, ekonomi ve kültürde önemli bir dönüşüme yol açacağını savunmaktadır. Ayrıca, bu teknolojik gelişmelerden güç alacak ve geleneksel güç yapılarını atlatabilecek yeni bir tür elitin, egemen bireyin potansiyel yükselişini de tartışmaktadır. Kitap, Bitcoin ve dijital çağın toplumumuz ve yaşam biçimimiz üzerindeki potansiyel etkisiyle ilgilenenler için düşündürücü ve zorlayıcı bir okuma.
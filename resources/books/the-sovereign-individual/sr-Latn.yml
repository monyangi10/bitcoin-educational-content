title: "Sovereign Individual"
publication_year: 1997
cover: cover_en.webp
original: true
description: |
  Suverena individua je nefikcionalna knjiga koja istražuje koncept individualnog suvereniteta i njegov potencijalni nastanak u digitalnom dobu, posebno u kontekstu interneta i drugih tehnoloških napredaka. Knjiga istražuje implikacije decentralizovanih mreža, kriptografije i digitalnih valuta na društvo i individualnu slobodu, tvrdeći da će one dovesti do značajne transformacije upravljanja, ekonomije i kulture. Takođe se raspravlja o potencijalnom usponu nove vrste elite, suverenog individua, koji bi bio osnažen ovim tehnološkim razvojem i sposoban da zaobiđe tradicionalne strukture moći. Knjiga je provokativno i izazovno štivo za one koji su zainteresovani za potencijalni uticaj Bitcoin i digitalnog doba na naše društvo i način života.
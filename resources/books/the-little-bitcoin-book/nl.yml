title: "Het kleine Bitcoin boek"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Het Kleine Bitcoin Boek is een beginnersvriendelijk boek dat de basisprincipes van Bitcoin en de achterliggende technologie behandelt, evenals het potentieel ervan om de financiële sector te transformeren. Het bevat hoofdstukken geschreven door verschillende experts op dit gebied, die elk een ander aspect van Bitcoin belichten, waaronder de geschiedenis, economie, privacy en veiligheid. Het boek is zo ontworpen dat het toegankelijk is voor lezers zonder voorkennis van Bitcoin of cryptocurrencies, waardoor het een goed startpunt is voor degenen die meer willen weten over deze innovatieve technologie.
title: "Kitabu Kidogo cha Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Kitabu Kidogo cha Bitcoin ni kitabu cha kirafiki ambacho kinashughulikia misingi ya Bitcoin na teknolojia nyuma yake, pamoja na uwezo wake wa kubadilisha sekta ya fedha. Inaangazia sura zilizoandikwa na wataalamu mbalimbali katika uwanja huo, kila mmoja akichunguza kipengele tofauti cha Bitcoin, ikijumuisha historia, uchumi, faragha na usalama wake. Kitabu hiki kimeundwa ili kiweze kufikiwa na wasomaji bila maarifa ya awali ya Bitcoin au fedha fiche, na kukifanya kiwe sehemu nzuri ya kuanzia kwa wale wanaotaka kujifunza zaidi kuhusu teknolojia hii bunifu.
title: "The Little Bitcoin Book"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  You’ve probably heard about Bitcoin on the news or heard it being discussed by
  your friends or colleagues. How come the price keeps changing? Is Bitcoin a good
  investment? How does it even have value? Why do people keep talking about it
  like it’s going to change the world? The Little Bitcoin Book tells the story of
  what’s wrong with money today, and why Bitcoin was invented to provide an
  alternative to the current system. It describes in simple terms what Bitcoin is,
  how it works, why it’s valuable, and how it affects individual freedom and
  opportunities of people everywhere - from Nigeria to the Philippines to
  Venezuela to the United States. This book also includes a Q & A section with
  some of the most frequently asked questions about Bitcoin. If you want to learn
  more about this new form of money which continues to gain interest and adoption
  around the world, then this book is for you.

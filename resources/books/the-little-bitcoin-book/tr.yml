title: "Küçük Bitcoin Kitabı"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Küçük Bitcoin Kitabı, Bitcoin'in temellerini ve arkasındaki teknolojinin yanı sıra finans sektörünü dönüştürme potansiyelini kapsayan yeni başlayanlara uygun bir kitaptır. Her biri Bitcoin'in tarihi, ekonomisi, gizliliği ve güvenliği dahil olmak üzere farklı bir yönünü araştıran, alanında çeşitli uzmanlar tarafından yazılmış bölümler içermektedir. Kitap, Bitcoin veya kripto para birimleri hakkında önceden bilgisi olmayan okuyucular için erişilebilir olacak şekilde tasarlanmıştır ve bu yenilikçi teknoloji hakkında daha fazla bilgi edinmek isteyenler için harika bir başlangıç noktasıdır.
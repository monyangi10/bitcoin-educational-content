title: "Mala knjiga Bitcoin"
publication_year: 2019
cover: cover_en.webp
original: true
description: |
  Mala knjiga o Bitcoin je knjiga prilagođena početnicima koja pokriva osnove Bitcoin i tehnologiju iza njega, kao i njegov potencijal da transformiše finansijsku industriju. Sadrži poglavlja koja su napisali razni stručnjaci iz oblasti, a svako istražuje različit aspekt Bitcoin, uključujući njegovu istoriju, ekonomiju, privatnost i sigurnost. Knjiga je dizajnirana da bude pristupačna čitaocima bez prethodnog znanja o Bitcoin ili kriptovalutama, što je čini odličnom početnom tačkom za one koji su zainteresovani da saznaju više o ovoj inovativnoj tehnologiji.
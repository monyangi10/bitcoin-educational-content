title: "21 Gedachten uit het Bitcoin dorp"
publication_year: 2023
cover: cover_it.webp
original: true
description: |
  Indringende analyses van economische en sociale dynamiek, bijtende kritiek op het huidige monetaire systeem, oneerbiedige politieke en filosofische beschouwingen, futuristische voorspellingen, ontdekkingen en conclusies die vaak contra-intuïtief zijn, maar altijd gekruid met een onuitputtelijk vleugje ironie;
  21 Thoughts from the Bitcoin Village is het resultaat van eindeloze overpeinzingen en slapeloze nachten van hen die al jaren rusteloos hun weg proberen te vinden in het konijnenhol van Bitcoin.
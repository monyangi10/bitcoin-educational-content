title: "21 myśli z wioski Bitcoin"
publication_year: 2023
cover: cover_it.webp
original: true
description: |
  Bezkompromisowe analizy dynamiki gospodarczej i społecznej, kąśliwa krytyka obecnego systemu monetarnego, niepoważne rozważania polityczne i filozoficzne, futurystyczne prognozy, odkrycia i wnioski, które często są sprzeczne z intuicją, ale zawsze doprawione niezawodną szczyptą ironii;
  21 Myśli z Wioski Bitcoin to wynik niekończących się refleksji i nieprzespanych nocy tych, którzy od lat próbują znaleźć drogę do króliczej nory Bitcoin.
title: "21 Misli iz Sela Bitcoin"
publication_year: 2023
cover: cover_it.webp
original: true
description: |
  Nepristupačne analize ekonomskih i društvenih dinamika, oštre kritike trenutnog monetarnog sistema, drske političke i filozofske razmatranja, futuristička predviđanja, otkrića i zaključci koji su često kontraintuitivni, ali uvek začinjeni nepogrešivom dozom ironije;
  21 Misao iz Sela Bitcoin je rezultat beskrajnih razmišljanja i neprospavanih noći onih koji, godinama, pokušavaju da pronađu svoj put nemirno unutar zečje rupe Bitcoin.
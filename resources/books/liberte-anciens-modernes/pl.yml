title: "De la liberté des anciens comparée à celle des modernes"
publication_year: 1819
cover: cover_fr.webp
original: false
description: |
  In this celebrated 1819 lecture, Benjamin Constant distinguishes between the liberty of the ancients (direct participation in collective decision-making) and the liberty of the moderns (individual independence in private life, commerce, and opinion). This distinction remains one of the most influential frameworks in political philosophy.

title: "Bitcoin: een werk in uitvoering"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Met duizenden "crypto"-projecten die er zijn, zeggen ze dat Bitcoin oud en saai is
  saai is, maar niets is minder waar. Dit boek leidt je
  door de laatste ontwikkelingen in Bitcoin, gezien door de ogen van een van de
  van de vele ontwikkelaars.
  
  Je leert over de nieuwste Soft Fork, bekend als Taproot, de uitdagingen om open source software vrij te houden van geldstelende bugs en malware, nieuwe manieren om nodes te beschermen tegen boosdoeners op het internet, hoe om te gaan met de steeds groter wordende Blockchain, en nog veel meer!
  
  Elk hoofdstuk linkt naar een overeenkomstige aflevering van de Bitcoin, Explained podcast. Het boek bevat ook links naar meer dan tweehonderd artikelen, video's, podcasts en zelfs de broncode. En dankzij een kleine QR-code naast elke link hoef je nooit meer lange URL's in te typen.
  
  De auteur is een softwareontwikkelaar uit Utrecht. Hij werkt sinds 2014 in de Bitcoin industrie en werd Bitcoin core medewerker in 2017, waardoor hij op de eerste rij zit bij de nieuwste en spannendste technische ontwikkelingen. Hij is co-host op de Bitcoin Magazine podcast Bitcoin, Explained.
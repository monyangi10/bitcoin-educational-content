title: "Bitcoin: Kazi Inayoendelea"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Pamoja na maelfu ya miradi ya "crypto" huko nje, wanasema Bitcoin ni ya zamani na
  ya kuchosha, lakini hakuna kinachoweza kuwa zaidi kutoka kwa ukweli. Kitabu hiki kitakuongoza
  kupitia maendeleo ya hivi punde katika Bitcoin, kama inavyoonekana kupitia macho ya mmoja wa
  watengenezaji wake wengi.
  
  Utajifunza kuhusu Soft Fork ya hivi punde inayojulikana kama Taproot, changamoto za kuweka programu huria bila hitilafu na programu hasidi za kuiba pesa, njia mpya za kulinda nodi dhidi ya watenda maovu kwenye mtandao, jinsi ya kukabiliana na Blockchain inayoongezeka kila mara, na zaidi!
  
  Kila sura inaunganishwa na kipindi sambamba cha Bitcoin, podcast Iliyoelezewa. Kitabu hiki pia kinaunganisha kwa zaidi ya nakala mia mbili, video, podikasti, na hata msimbo wa chanzo. Na kutokana na msimbo mdogo wa QR karibu na kila kiungo, hutawahi kuandika URL ndefu.
  
  Mwandishi ni msanidi programu anayeishi Utrecht, Uholanzi. Amekuwa akifanya kazi katika tasnia ya Bitcoin tangu 2014 na kuwa mchangiaji wa Bitcoin Core mnamo 2017, na kumpa kiti cha mstari wa mbele kwa maendeleo yote ya hivi karibuni na ya kuvutia zaidi ya kiufundi. Yeye ni mwenyeji mwenza kwenye podcast ya Jarida la Bitcoin Bitcoin, Imefafanuliwa.
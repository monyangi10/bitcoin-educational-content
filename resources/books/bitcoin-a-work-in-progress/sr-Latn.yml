title: "Bitcoin: Rad u Toku"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Sa hiljadama "kripto" projekata, kažu da je Bitcoin star i dosadan, ali ništa ne može biti dalje od istine. Ova knjiga će vas voditi kroz najnovija dostignuća u Bitcoin, viđena očima jednog od mnogih njegovih programera.
  
  Naučićete o najnovijem Soft Fork poznatom kao Taproot, izazovima održavanja open source softvera slobodnog od grešaka koje kradu novac i malvera, novim načinima zaštite čvorova od zlonamernih korisnika na internetu, kako se nositi sa sve većim Blockchain, i još mnogo toga!
  
  Svako poglavlje povezuje se sa odgovarajućom epizodom Bitcoin, Explained podcasta. Knjiga takođe povezuje više od dvesta članaka, video zapisa, podcasta, pa čak i izvornog koda. I zahvaljujući malom QR kodu pored svakog linka, nikada nećete morati da kucate duge URL-ove.
  
  Autor je softverski programer sa sedištem u Utrehtu, Holandija. Radi u industriji Bitcoin od 2014. godine i postao je Bitcoin Core saradnik 2017. godine, što mu je omogućilo da bude u prvom redu za sva najnovija i najuzbudljivija tehnička dostignuća. On je ko-voditelj na Bitcoin Magazine podcastu Bitcoin, Explained.
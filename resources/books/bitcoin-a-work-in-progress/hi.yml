title: "Bitcoin: कार्य प्रगति पर है"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  हजारों "क्रिप्टो" परियोजनाओं के साथ, वे कहते हैं कि Bitcoin पुराना और उबाऊ है, लेकिन सच्चाई इससे कहीं दूर है। यह पुस्तक आपको Bitcoin में नवीनतम विकास के माध्यम से मार्गदर्शन करेगी, जैसा कि इसके कई डेवलपर्स में से एक की नज़र से देखा गया है। आप नवीनतम Soft Fork के बारे में जानेंगे जिसे Taproot के रूप में जाना जाता है, ओपन सोर्स सॉफ़्टवेयर को पैसे चुराने वाले बग और मैलवेयर से मुक्त रखने की चुनौतियाँ, इंटरनेट पर दुष्टों के खिलाफ नोड्स की सुरक्षा के नए तरीके, लगातार बढ़ते Blockchain से कैसे निपटें, और बहुत कुछ! प्रत्येक अध्याय Bitcoin, एक्सप्लेन्ड पॉडकास्ट के संबंधित एपिसोड से जुड़ता है। पुस्तक दो सौ से अधिक लेखों, वीडियो, पॉडकास्ट और यहां तक ​​कि स्रोत कोड से भी जुड़ती है। और हर लिंक के बगल में एक छोटे से क्यूआर कोड की बदौलत, आपको कभी भी लंबे यूआरएल टाइप नहीं करने पड़ेंगे। लेखक यूट्रेक्ट, नीदरलैंड में स्थित एक सॉफ्टवेयर डेवलपर हैं। वह 2014 से Bitcoin उद्योग में काम कर रहे हैं और 2017 में Bitcoin कोर योगदानकर्ता बन गए, जिससे उन्हें सभी नवीनतम और सबसे रोमांचक तकनीकी विकासों के लिए अग्रिम पंक्ति की सीट मिली। वह Bitcoin मैगज़ीन पॉडकास्ट Bitcoin, Explained पर सह-होस्ट हैं।
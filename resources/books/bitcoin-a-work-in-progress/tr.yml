title: "Bitcoin: Devam Eden Bir Çalışma"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Dışarıda binlerce "kripto" projesi varken, Bitcoin'ün eski olduğunu ve
  sıkıcı, ama hiçbir şey gerçekten daha uzak olamaz. Bu kitap size rehberlik edecek
  birinin gözünden Bitcoin'teki en son gelişmeler aracılığıyla
  birçok geliştiricisi var.
  
  Taproot olarak bilinen en son Soft Fork, açık kaynak kodlu yazılımları para çalan hatalardan ve kötü amaçlı yazılımlardan uzak tutmanın zorlukları, düğümleri internetteki kötü niyetli kişilere karşı korumanın yeni yolları, sürekli büyüyen Blockchain ile nasıl başa çıkılacağı ve daha fazlası hakkında bilgi edineceksiniz!
  
  Her bölüm Bitcoin, Explained podcast'inin ilgili bir bölümüne bağlantı vermektedir. Kitap ayrıca iki yüzden fazla makaleye, videoya, podcast'e ve hatta kaynak koda bağlantı veriyor. Ve her bağlantının yanındaki küçük QR kodu sayesinde, asla uzun URL'ler yazmak zorunda kalmayacaksınız.
  
  Yazar, Hollanda'nın Utrecht kentinde yaşayan bir yazılım geliştiricisidir. Bitcoin endüstrisinde 2014 yılından beri çalışmaktadır ve 2017 yılında Bitcoin core katılımcısı olmuştur, bu da ona en son ve en heyecan verici teknik gelişmelere ön sıradan yer vermektedir. Bitcoin Magazine podcast'i Bitcoin, Explained'ın ortak sunucusudur.
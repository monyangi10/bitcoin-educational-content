title: "Bitcoin: Praca w toku"
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  Przy tysiącach projektów "kryptowalutowych" mówi się, że Bitcoin jest stary i nudny
  nudny, ale nic nie może być dalsze od prawdy. Ta książka poprowadzi cię
  przez najnowsze osiągnięcia w Bitcoin, widziane oczami jednego z wielu deweloperów
  jego wielu deweloperów.
  
  Dowiesz się o najnowszym Soft Fork znanym jako Taproot, wyzwaniach związanych z utrzymaniem oprogramowania open source wolnego od błędów i złośliwego oprogramowania kradnącego pieniądze, nowych sposobach ochrony węzłów przed złoczyńcami w Internecie, jak radzić sobie z ciągle rosnącym Blockchain i nie tylko!
  
  Każdy rozdział łączy się z odpowiednim odcinkiem podcastu Bitcoin, Explained. Książka zawiera również linki do ponad dwustu artykułów, filmów, podcastów, a nawet kodu źródłowego. A dzięki małemu kodowi QR obok każdego linku, nigdy nie będziesz musiał wpisywać długich adresów URL.
  
  Autor jest programistą mieszkającym w Utrechcie w Holandii. Pracuje w branży Bitcoin od 2014 r., a w 2017 r. został współtwórcą Bitcoin Core, dzięki czemu ma dostęp do wszystkich najnowszych i najbardziej ekscytujących osiągnięć technicznych. Jest współgospodarzem podcastu Bitcoin Magazine Bitcoin, Explained.
title: 「Bitcoin：進行中的工作」
publication_year: 2022
cover: cover_en.webp
original: true
description: |
  有數以千計的「加密」項目存在，人們說 Bitcoin 又老又無聊。
  乏味，但事實並非如此。本書將引導您
  Bitcoin 的最新發展。
  其眾多開發人員的眼中所看到的 Bitcoin 的最新發展。
  
  您將學到被稱為 Taproot 的最新 Soft Fork、保持開放原始碼軟體沒有偷錢的 bug 和惡意軟體的挑戰、保護節點免於網路上的惡人攻擊的新方法、如何對付不斷成長的 Blockchain 等等！
  
  每一章都連結到 Bitcoin, Explained Podcast 的相對應的一集。本書也連結到超過 200 篇文章、影片、播客，甚至是原始碼。由於每個連結旁都有一個小小的 QR 代碼，您再也不必輸入長長的 URL。
  
  作者是一位軟體開發人員，住在荷蘭烏特勒支。他自 2014 年起就開始在 Bitcoin 業界工作，並於 2017 年成為 Bitcoin Core 的貢獻者，讓他能在前排看到所有最新、最令人興奮的技術發展。他是 Bitcoin 雜誌播客 Bitcoin, Explained 的共同主持人。
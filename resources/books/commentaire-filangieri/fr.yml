description: |
  Constant's Commentary on Filangieri (1822) is a systematic critique of the Italian reformer Gaetano Filangieri's proposals for state-directed social improvement. Constant uses Filangieri's well-intentioned interventionism as a foil to demonstrate the dangers of government overreach, even when motivated by the noblest intentions.

title: "Principes de politique applicables à tous les gouvernements"
publication_year: 1815
cover: cover_fr.webp
original: true
description: |
  Benjamin Constant's Principles of Politics (1815) is a cornerstone of liberal political thought. Constant argues that individual liberty must be protected not only from absolute monarchy but from democratic tyranny — that the sovereignty of the people is limited by the inviolable rights of the individual.

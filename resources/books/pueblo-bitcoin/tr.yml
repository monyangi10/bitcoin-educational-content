title: "Bitcoin Köyü"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Bitcoin Köyü ile yazar bizi bu teknolojide bilgilendirici bir yolculuğa çıkarıyor, paranın kökenlerinden bilgisayar protokolünün özüne kadar inceliyor. Ayrıca, Bitcoin'in daha adil ve daha bilinçli bir toplum için attığı temelleri tanımlayarak sosyal ve politik etkileri üzerine düşünceler sunuyor.
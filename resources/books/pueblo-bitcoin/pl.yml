title: "Bitcoin Village"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  W Bitcoin Village autor zabiera nas w pouczającą podróż przez tę technologię, badając od początków pieniądza po rdzeń protokołu komputerowego. Przedstawia również refleksje na temat skutków społecznych i politycznych, definiując fundamenty, które Bitcoin kładzie dla bardziej sprawiedliwego i świadomego społeczeństwa.
title: "Bitcoin Selo"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Sa Bitcoin Village, autor nas vodi na informativno putovanje kroz ovu tehnologiju, istražujući od porekla novca do srži kompjuterskog protokola. Takođe pruža razmišljanja o društvenim i političkim uticajima, definišući temelje koje Bitcoin postavlja za pravednije i svesnije društvo.
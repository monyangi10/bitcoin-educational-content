title: "Bitcoin Village"
publication_year: 2023
cover: cover_en.webp
original: true
description: |
  Met Bitcoin Village neemt de auteur ons mee op een informatieve reis door deze technologie, van de oorsprong van geld tot de kern van het computerprotocol. Hij geeft ook beschouwingen over de sociale en politieke gevolgen en definieert de fundamenten die Bitcoin legt voor een eerlijkere en bewustere samenleving.
title: " Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  In de meeslepende roman "Cryptonomicon" van Neal Stephenson wordt de lezer meegenomen op een opwindende reis door de tijd en over de hele wereld. Het verhaal speelt zich af tijdens de Tweede Wereldoorlog en in het heden en volgt een groep briljante personen, waaronder wiskundige Lawrence Waterhouse en marinier Bobby Shaftoe, die deel uitmaken van Detachment 2702 - een geallieerde eenheid die de communicatiecodes van de As moet kraken. Hun missie is om konvooien tot zinken te brengen en tegelijkertijd de schijn van onschuld op te houden. Naast hen staat de raadselachtige Dr. Alan Turing, die de cryptische operaties van de eenheid aan Waterhouse ontrafelt.
  Verweven met deze historische achtergrond is een hedendaags verhaal met Randy Waterhouse, een programmeergek, en Amy Shaftoe, de vastberaden kleindochter van Bobby Shaftoe. Samen beginnen ze aan een zoektocht om een offshore datasite in Zuidoost-Azië op te zetten en mogelijk verborgen schatten te ontdekken die ooit bestemd waren voor de Nazi-kas. Wanneer de hedendaagse personages de cryptische Enoch Root ontmoeten - een centrale figuur uit Detachment 2702 en de Societas Eruditorum - raken ze verstrikt in een web van onbreekbare encryptie en samenzweerderige banden.
  "Cryptonomicon" is een meesterlijke mix van spanning, geschiedenis en technologische intriges, die ingaat op thema's als cryptografie, oorlog en de blijvende impact van geheimen over generaties heen. Met Neal Stephenson's kenmerkende verteltalent worden lezers getrakteerd op een opwindende verkenning van codes, bedrog en de onverzettelijke jacht op verborgen waarheden.
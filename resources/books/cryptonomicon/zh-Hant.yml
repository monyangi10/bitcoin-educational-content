title: "Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  在 Neal Stephenson 引人入勝的小說《Cryptonomicon》中，讀者將經歷一段穿越時空、橫跨全球的驚險旅程。故事背景設定在第二次世界大戰期間和現今，講述一群傑出人士的故事，包括數學家 Lawrence Waterhouse 和海軍陸戰隊員 Bobby Shaftoe，他們都是 270 分隊 (Detachment 270)的一員，這支盟軍部隊的任務是破解軸心國的通訊密碼。他們的任務是在偽裝清白的同時擊沉船隊。與他們並肩作戰的是神秘的圖靈博士 (Dr. Alan Turing)，他向 Waterhouse 解釋了這支部隊的神秘行動。
  在這個歷史背景下，夾雜著一個當代的敘事，主角是 Randy Waterhouse（一個程式設計怪才）和 Amy Shaftoe（Bobby Shaftoe 的孫女）。他們一起展開了在東南亞建立離岸資料避難所的任務，並有可能發現曾被納粹收歸庫房的隱藏寶藏。當現今的人物遇到神秘的 Enoch Root - 2702 分隊和 Societas Eruditorum 的關鍵人物時，他們發現自己捲入了一個無法破解的加密和陰謀關係網中。
  "Cryptonomicon "巧妙地融合了懸疑、歷史和技術陰謀，深入探討了密碼學、戰爭以及秘密跨世代的持久影響等主題。Neal Stephenson 以其獨特的敘事能力，為讀者呈現了一場關於密碼、欺騙以及對隱藏真相不屈不撓的探索。
title: " Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Neal Stephenson'ın büyüleyici romanı "Cryptonomicon "da okuyucu, zaman içinde ve dünya çapında heyecan verici bir yolculuğa çıkarılıyor. İkinci Dünya Savaşı sırasında ve günümüzde geçen hikâye, aralarında matematikçi Lawrence Waterhouse ve denizci Bobby Shaftoe'nun da bulunduğu, Mihver Devletleri'nin iletişim kodlarını kırmakla görevli bir Müttefik birliği olan Detachment 2702'nin parçası olan bir grup parlak kişiyi takip ediyor. Aldatma ve gizlilikle örülü görevleri, masumiyetlerini koruyarak konvoyları batırmaktır. Onların yanında, Waterhouse'a birliğin şifreli operasyonlarını çözen esrarengiz Dr. Alan Turing de vardır.
  Bu tarihsel arka planla iç içe geçmiş, programlama meraklısı Randy Waterhouse ve Bobby Shaftoe'nun kararlı torunu Amy Shaftoe'nun yer aldığı çağdaş bir anlatı. Birlikte, Güneydoğu Asya'da bir offshore veri cenneti kurma ve bir zamanlar Nazi kasaları için tasarlanan gizli hazineleri ortaya çıkarma arayışına girerler. Günümüz karakterleri, Detachment 2702 ve Societas Eruditorum'dan önemli bir figür olan şifreli Enoch Root ile karşılaştıklarında, kendilerini kırılamaz şifreleme ve komplocu bağlardan oluşan bir ağın içinde bulurlar.
  "Cryptonomicon" kriptografi, savaş ve sırların nesiller boyu süren etkisi temalarını işleyen gerilim, tarih ve teknolojik entrikanın ustaca bir karışımı. Neal Stephenson'ın kendine özgü hikâye anlatma becerisiyle okuyucular şifrelerin, aldatmacanın ve gizli gerçeklerin inatçı arayışının heyecan verici bir keşfiyle karşı karşıya.
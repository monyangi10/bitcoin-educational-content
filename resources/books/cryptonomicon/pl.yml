title: " Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  W porywającej powieści Neala Stephensona "Cryptonomicon" czytelnik zostaje zabrany w ekscytującą podróż w czasie i po całym świecie. Rozgrywająca się w czasach II wojny światowej i współczesności historia opowiada o grupie błyskotliwych osób, w tym matematyka Lawrence'a Waterhouse'a i żołnierza piechoty morskiej Bobby'ego Shaftoe, którzy są częścią Detachment 2702 - alianckiej jednostki, której zadaniem jest łamanie kodów komunikacyjnych Osi. Ich misją jest zatapianie konwojów przy jednoczesnym zachowaniu pozorów niewinności. Towarzyszy im enigmatyczny dr Alan Turing, który ujawnia Waterhouse'owi tajemnice operacji jednostki.
  W tym historycznym tle przeplata się współczesna narracja z udziałem Randy'ego Waterhouse'a, maniaka programowania, i Amy Shaftoe, zdeterminowanej wnuczki Bobby'ego Shaftoe. Wspólnie wyruszają oni na wyprawę, której celem jest utworzenie raju danych offshore w Azji Południowo-Wschodniej i potencjalne odkrycie ukrytych skarbów, które niegdyś miały trafić do kasy nazistów. Gdy współcześni bohaterowie napotykają tajemniczego Enocha Roota - kluczową postać z Detachment 2702 i Societas Eruditorum - zostają uwikłani w sieć niemożliwego do złamania szyfrowania i konspiracyjnych powiązań.
  "Cryptonomicon" to mistrzowskie połączenie suspensu, historii i technologicznej intrygi, zagłębiające się w tematy kryptografii, wojny i trwałego wpływu tajemnic na pokolenia. Z charakterystyczną dla Neala Stephensona sprawnością opowiadania historii, czytelnicy są traktowani jako ekscytująca eksploracja kodów, oszustw i nieugiętej pogoni za ukrytymi prawdami.
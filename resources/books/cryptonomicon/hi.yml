title: " क्रिप्टोनोमिकॉन "
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  नील स्टीफेंसन के आकर्षक उपन्यास, "क्रिप्टोनॉमिकॉन" में, पाठक को समय और दुनिया भर में एक रोमांचक यात्रा पर ले जाया जाता है। द्वितीय विश्व युद्ध और वर्तमान समय के दौरान सेट की गई यह कहानी गणितज्ञ लॉरेंस वॉटरहाउस और मरीन बॉबी शैफ़्टो सहित प्रतिभाशाली व्यक्तियों के एक समूह का अनुसरण करती है, जो डिटैचमेंट 2702 का हिस्सा हैं - एक मित्र इकाई जिसे एक्सिस संचार कोड तोड़ने का काम सौंपा गया है। धोखे और गोपनीयता से भरपूर, उनका मिशन मासूमियत का दिखावा करते हुए काफिले को डुबोना है। उनके साथ रहस्यमय डॉ. एलन ट्यूरिंग हैं, जो यूनिट के गुप्त संचालन को वॉटरहाउस तक पहुँचाते हैं। इस ऐतिहासिक पृष्ठभूमि के साथ एक समकालीन कथा जुड़ी हुई है जिसमें रैंडी वॉटरहाउस, एक प्रोग्रामिंग गीक, और एमी शैफ़्टो, बॉबी शैफ़्टो की दृढ़ पोती शामिल हैं। साथ में, वे दक्षिण पूर्व एशिया में एक अपतटीय डेटा हेवन स्थापित करने और संभावित रूप से नाजी खजाने के लिए छिपे हुए खजाने को खोजने की खोज पर निकलते हैं। जैसे-जैसे वर्तमान समय के पात्रों का सामना गुप्तचर एनोच रूट से होता है - डिटैचमेंट 2702 और सोसाइटास एरुडिटोरम का एक महत्वपूर्ण व्यक्ति - वे खुद को अटूट एन्क्रिप्शन और षड्यंत्रकारी संबंधों के जाल में उलझा हुआ पाते हैं। "क्रिप्टोनोमिकॉन" रहस्य, इतिहास और तकनीकी साज़िश का एक उत्कृष्ट मिश्रण है, जो क्रिप्टोग्राफी, युद्ध और पीढ़ियों में रहस्यों के स्थायी प्रभाव के विषयों पर आधारित है। नील स्टीफेंसन की विशिष्ट कहानी कहने की कला के साथ, पाठकों को कोड, धोखे और छिपी हुई सच्चाइयों की अथक खोज का रोमांचक अनुभव मिलता है।
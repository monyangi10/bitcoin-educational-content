title: "Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  Katika riwaya ya kuvutia ya Neal Stephenson, "Cryptonomicon," msomaji anachukuliwa katika safari ya kusisimua kupitia wakati na kote ulimwenguni. Imewekwa wakati wa Vita vya Kidunia vya pili na siku ya leo, hadithi inafuatia kundi la watu mahiri, akiwemo mwanahisabati Lawrence Waterhouse na baharia Bobby Shaftoe, ambao ni sehemu ya Kikosi cha 2702—Kitengo cha Washirika kilichopewa jukumu la kuvunja misimbo ya mawasiliano ya Axis. Wakiwa wamepangwa kwa udanganyifu na usiri, dhamira yao ni kuzamisha misafara huku wakidumisha mwonekano wa kutokuwa na hatia. Kando yao ni Dk. Alan Turing wa fumbo, ambaye anafafanua shughuli za siri za kitengo hiki hadi Waterhouse.
  Iliyounganishwa na mandhari haya ya kihistoria ni masimulizi ya kisasa yanayomshirikisha Randy Waterhouse, mtaalamu wa kutengeneza programu, na Amy Shaftoe, mjukuu aliyedhamiriwa wa Bobby Shaftoe. Kwa pamoja, wanaanza jitihada ya kuanzisha hifadhi ya data nje ya nchi katika Asia ya Kusini-Mashariki na uwezekano wa kufichua hazina zilizofichwa ambazo zilikusudiwa kwa hazina ya Nazi. Wahusika wa siku hizi wanapokutana na mtu asiyeeleweka Enoch Root—mtu muhimu kutoka Kikosi cha 2702 na Societas Eruditorum—wanajikuta wamenaswa katika mtandao wa usimbaji fiche usioweza kuvunjika na uhusiano wa njama.
  "Cryptonomicon" ni mchanganyiko bora wa mashaka, historia, na fitina ya kiteknolojia, inayoangazia mada za usimbaji fiche, vita, na athari ya kudumu ya siri katika vizazi vingi. Kwa umahiri wa kusimulia hadithi wa sahihi wa Neal Stephenson, wasomaji wanashughulikiwa kwa uchunguzi wa kusisimua wa kanuni, udanganyifu, na ufuatiliaji usio na kikomo wa ukweli uliofichwa.
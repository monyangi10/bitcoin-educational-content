title: "Cryptonomicon"
publication_year: 1999
cover: cover_en.webp
original: true
description: |
  U Neal Stephensonovom fascinantnom romanu, "Cryptonomicon," čitalac je povučen na uzbudljivo putovanje kroz vreme i širom sveta. Radnja smeštena tokom Drugog svetskog rata i u sadašnjosti prati grupu briljantnih pojedinaca, uključujući matematičara Lawrencea Waterhousea i marinca Bobbyja Shaftoea, koji su deo Odreda 2702—savezničke jedinice zadužene za razbijanje komunikacionih kodova Osovine. Njihova misija, prožeta obmanom i tajnošću, jeste potapanje konvoja uz održavanje privida nevinosti. Uz njih je i zagonetni dr Alan Turing, koji otkriva kriptične operacije jedinice Waterhouseu.
  Upletena u ovu istorijsku pozadinu je savremena priča koja uključuje Randyja Waterhousea, programerskog štrebera, i Amy Shaftoe, odlučnu unuku Bobbyja Shaftoea. Zajedno kreću u potragu za uspostavljanjem ofšor podatkovnog utočišta u jugoistočnoj Aziji i potencijalnim otkrivanjem skrivenih blaga nekada namenjenih nacističkim blagajnama. Kako se savremeni likovi susreću sa kriptičnim Enochom Rootom—ključnom figurom iz Odreda 2702 i Societas Eruditorum—nalaze se upleteni u mrežu neprobojnih enkripcija i zavereničkih veza.
  "Cryptonomicon" je majstorska mešavina napetosti, istorije i tehnološke intrige, koja istražuje teme kriptografije, rata i trajnog uticaja tajni kroz generacije. Sa prepoznatljivom pripovedačkom veštinom Neala Stephensona, čitaoci su počašćeni uzbudljivim istraživanjem kodova, obmana i neumorne potrage za skrivenim istinama.
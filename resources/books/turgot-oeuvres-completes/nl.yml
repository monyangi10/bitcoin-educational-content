  The complete works of Anne Robert Jacques Turgot (1727-1781), economist, reformer, and Controller-General of Finances under Louis XVI. Turgot's brief period in office (1774-1776) saw ambitious attempts to abolish guild restrictions, eliminate internal customs barriers, and reduce government expenditure. His theoretical writings on value, capital, and the formation of prices anticipated many insights of later economists.

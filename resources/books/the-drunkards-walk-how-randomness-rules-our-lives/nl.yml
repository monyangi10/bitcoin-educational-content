title: "De dronkemanswandeling: hoe willekeur ons leven beheerst"
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  The Drunkard's Walk How Randomness Rules Our Lives" van Leonard Mlodinow is een beginnersvriendelijke verkenning van de rol van willekeur in ons leven en de invloed ervan op besluitvorming en resultaten. Door een mix van boeiende verhalen en inzichtelijke voorbeelden neemt Mlodinow lezers mee op een reis door de wereld van waarschijnlijkheid en statistiek. Hij onderzoekt de manieren waarop willekeur verschillende aspecten van ons leven beïnvloedt, van schommelingen op de aandelenmarkt tot sportuitslagen en zelfs onze eigen persoonlijke ervaringen. Met een focus op economie en praktijkvoorbeelden biedt het boek een fascinerende introductie in het concept van willekeur en de implicaties ervan voor het begrijpen van de wereld om ons heen. Of je nu nieuw bent met het onderwerp of de rol van toeval beter wilt begrijpen, "The Drunkard's Walk" biedt een toegankelijke en tot nadenken stemmende verkenning van de fascinerende wereld van toeval.
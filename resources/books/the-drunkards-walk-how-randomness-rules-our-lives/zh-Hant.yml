title: 「醉漢漫步 隨機性如何主宰我們的生活」
publication_year: 2008
cover: cover_en.webp
original: true
description: |
  Leonard Mlodinow 所著的《The Drunkard's Walk How Randomness Rules Our Lives》是一本適合初學者閱讀的書籍，探討隨機性在我們生活中的角色，以及它對決策和結果的影響。Mlodinow 透過引人入勝的故事和深入淺出的例子，帶領讀者進入概率和統計的世界。他探討了隨機性如何影響我們生活的方方面面，從股票市場波動到體育賽事結果，甚至是我們的個人經歷。本書著重經濟學和現實生活中的案例研究，引人入勝地介紹了隨機性的概念及其對理解我們周圍世界的影響。無論您是第一次接觸這個主題，或是想要更深入地瞭解機率的作用，《醉翁行》都能讓您對迷人的隨機性世界進行深入淺出、發人深省的探討。
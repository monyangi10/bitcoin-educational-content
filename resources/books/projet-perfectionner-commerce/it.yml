title: "Projet pour perfectionner le commerce"
publication_year: 1735
cover: cover_fr.webp
original: false
description: |
  In this 1735 work, the Abbé de Saint-Pierre extends his reformist vision to commerce, proposing measures to simplify trade regulations and reduce the barriers that impede the free circulation of goods. An early argument for commercial liberalization rooted in the conviction that trade promotes peace and prosperity.

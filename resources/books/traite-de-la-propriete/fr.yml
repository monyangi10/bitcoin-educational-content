title: "Traité de la Propriété"
publication_year: 1834
cover: cover_fr.webp
original: true
description: |
  In this 1834 treatise, Charles Comte offers a rigorous defense of property rights grounded in natural law and historical observation. He demonstrates that property is not a social convention but arises from the fundamental facts of human existence — the need to appropriate resources in order to survive and flourish.

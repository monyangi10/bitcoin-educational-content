title: 「加密無政府網路國家與海盜烏托邦」
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  由 Peter Ludlow 編輯的《Crypto Anarchy, Cyberstates, and Pirate Utopias》是一本引人入勝的文集，探討線上社群治理結構的興起，以及塑造這些結構的政治主權願景。本書分為五個部分，探討的主題包括網際網路主權、Crypto Anarchy、電子商務對法律管轄權的影響、實驗性的治理結構，以及網路空間的烏托邦願景。透過這些不同的觀點，讀者可以深入瞭解線上治理不斷演進的面貌，以及虛擬社群內創新自治形式的潛力。
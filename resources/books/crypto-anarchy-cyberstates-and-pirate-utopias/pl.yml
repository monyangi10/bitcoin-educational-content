title: "Cyberpaństwa krypto-anarchii i pirackie utopie"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  Crypto Anarchy, Cyberstates, and Pirate Utopias" pod redakcją Petera Ludlowa to fascynujący zbiór tekstów, które badają pojawienie się struktur zarządzania w społecznościach internetowych i wizje suwerenności politycznej, które je kształtują. Podzielona na pięć sekcji książka analizuje takie tematy, jak suwerenność Internetu, kryptoanarchia, wpływ handlu elektronicznego na jurysdykcję prawną, eksperymentalne struktury zarządzania i utopijne wizje cyberprzestrzeni. Dzięki tym różnorodnym perspektywom czytelnicy zyskują wgląd w ewoluujący krajobraz zarządzania online i potencjał innowacyjnych form samorządności w społecznościach wirtualnych.
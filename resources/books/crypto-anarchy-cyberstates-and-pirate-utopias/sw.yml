title: "Crypto-Anarchy Cyberstates na Pirate Utopias"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  Crypto Anarchy, Cyberstates, and Pirate Utopias" iliyohaririwa na Peter Ludlow ni mkusanyo wa kuvutia wa maandishi ambayo yanachunguza kuibuka kwa miundo ya utawala katika jumuiya za mtandaoni na maono ya mamlaka ya kisiasa ambayo yanaziunda. Kitabu hiki kikiwa kimegawanywa katika sehemu tano, kinachunguza mada kama vile uhuru wa Mtandao, Crypto Anarchy, athari za utawala wa kisheria wa utawala na biashara maono ya anga ya mtandao Kupitia mitazamo hii tofauti, wasomaji wanapata maarifa kuhusu mazingira yanayoendelea ya utawala mtandaoni na uwezekano wa aina bunifu za kujitawala ndani ya jumuiya pepe.
title: "क्रिप्टो-अराजकता साइबरस्टेट्स और समुद्री डाकू यूटोपिया"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  पीटर लुडलो द्वारा संपादित "क्रिप्टो एनार्की, साइबरस्टेट्स, एंड पाइरेट यूटोपियाज़" लेखों का एक सम्मोहक संग्रह है जो ऑनलाइन समुदायों में शासन संरचनाओं के उद्भव और उन्हें आकार देने वाली राजनीतिक संप्रभुता के दृष्टिकोणों की पड़ताल करता है। पाँच खंडों में विभाजित, पुस्तक इंटरनेट संप्रभुता, क्रिप्टो एनार्की, कानूनी अधिकार क्षेत्र पर ई-कॉमर्स के प्रभाव, प्रायोगिक शासन संरचनाओं और साइबरस्पेस के लिए यूटोपियन दृष्टिकोण जैसे विषयों की जाँच करती है। इन विविध दृष्टिकोणों के माध्यम से, पाठकों को ऑनलाइन शासन के विकसित परिदृश्य और आभासी समुदायों के भीतर स्व-शासन के अभिनव रूपों की क्षमता के बारे में जानकारी मिलती है।
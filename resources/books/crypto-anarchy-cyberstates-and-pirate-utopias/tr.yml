title: "Kripto-Anarşi Siber Devletleri ve Korsan Ütopyaları"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  Peter Ludlow'un editörlüğünü yaptığı "Kripto Anarşi, Siber Devletler ve Korsan Ütopyaları", çevrimiçi topluluklarda yönetim yapılarının ortaya çıkışını ve bunları şekillendiren siyasi egemenlik vizyonlarını araştıran ilgi çekici bir yazı derlemesidir. Beş bölüme ayrılan kitap, İnternet egemenliği, Kripto Anarşisi, e-ticaretin yasal yargı yetkisi üzerindeki etkisi, deneysel yönetişim yapıları ve siber uzay için ütopik vizyonlar gibi konuları inceliyor. Bu farklı bakış açıları sayesinde okuyucular, çevrimiçi yönetişimin gelişen manzarası ve sanal topluluklar içinde yenilikçi özyönetim biçimleri potansiyeli hakkında fikir sahibi oluyor.
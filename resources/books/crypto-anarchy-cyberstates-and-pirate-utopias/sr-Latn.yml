title: "Krypto-Anarhija Sajberdržave i Piratske Utopije"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  "Crypto Anarchy, Cyberstates, and Pirate Utopias" koju je uredio Peter Ludlow je zanimljiva zbirka tekstova koja istražuje pojavu struktura upravljanja u online zajednicama i vizije političkog suvereniteta koje ih oblikuju. Podeljena u pet delova, knjiga razmatra teme kao što su suverenitet Interneta, Kripto Anarhija, uticaj e-trgovine na pravnu jurisdikciju, eksperimentalne strukture upravljanja i utopijske vizije za sajberprostor. Kroz ove različite perspektive, čitaoci stiču uvid u evoluirajući pejzaž online upravljanja i potencijal za inovativne oblike samoupravljanja unutar virtuelnih zajednica.
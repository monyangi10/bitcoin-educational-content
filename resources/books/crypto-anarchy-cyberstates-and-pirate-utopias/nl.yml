title: "Crypto-Anarchie Cyberstaten en Piraten-Utopieën"
publication_year: 2001
cover: cover_en.webp
original: true
description: |
  Crypto Anarchy, Cyberstates, and Pirate Utopias" onder redactie van Peter Ludlow is een meeslepende verzameling van geschriften die de opkomst van bestuursstructuren in online gemeenschappen en de visies op politieke soevereiniteit die daar vorm aan geven onderzoekt. Onderverdeeld in vijf hoofdstukken onderzoekt het boek onderwerpen als internetsoevereiniteit, crypto-anarchie, de impact van e-commerce op juridische jurisdictie, experimentele bestuursstructuren en utopische visies op cyberspace. Door deze verschillende perspectieven krijgt de lezer inzicht in het zich ontwikkelende landschap van online bestuur en het potentieel voor innovatieve vormen van zelfbestuur binnen virtuele gemeenschappen.
title: "American Kingpin"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  American Kingpin, autorstwa Nicka Biltona, to trzymająca w napięciu prawdziwa historia kryminalna o Rossie Ulbrichcie, mistrzu stojącym za Silk Road, internetowym czarnym rynkiem, który handlował nielegalnymi narkotykami, bronią i innymi towarami przy użyciu Bitcoin jako metody płatności. Książka zagłębia się w powstanie i upadek Ulbrichta, który działał pod pseudonimem "Dread Pirate Roberts", oraz funkcjonariuszy organów ścigania, którzy go pokonali. Bada techniczne i prawne wyzwania związane z tropieniem anonimowego przestępcy w ciemnej sieci i stawia ważne pytania dotyczące roli technologii w umożliwianiu nielegalnej działalności.
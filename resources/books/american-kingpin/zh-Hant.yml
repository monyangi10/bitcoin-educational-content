title: 「美國金主」
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Nick Bilton 所著的《American Kingpin》是一個扣人心弦的真實犯罪故事，講述 Ross Ulbricht 是 Silk Road 背後的主腦，Silk Road 是一個使用 Bitcoin 作為付款方式來交易非法毒品、武器和其他物品的線上黑市。這本書深入探討了化名為「恐懼海盜羅伯茲」（Dread Pirate Roberts）的 Ulbricht 的興衰，以及將他繩之於法的執法人員。本書探討了在暗網中追蹤匿名罪犯所面臨的技術和法律挑戰，並提出了關於技術在促成非法活動中所扮演角色的重要問題。
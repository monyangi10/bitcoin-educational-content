title: "Američki kralj"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  American Kingpin, by Nick Bilton je uzbudljiva istinita kriminalistička priča o Rossu Ulbrichtu, mozgu iza Silk Roada, online crnog tržišta koje je trgovalo ilegalnim drogama, oružjem i drugim dobrima koristeći Bitcoin kao način plaćanja. Knjiga istražuje uspon i pad Ulbrichta, koji je delovao pod pseudonimom "Dread Pirate Roberts," i službenike zakona koji su ga srušili. Ona istražuje tehničke i pravne izazove praćenja anonimnog kriminalca na dark webu i postavlja važna pitanja o ulozi tehnologije u omogućavanju nezakonitih aktivnosti.
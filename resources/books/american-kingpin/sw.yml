title: "Mfalme wa Marekani"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  American Kingpin, iliyoandikwa na Nick Bilton ni hadithi ya kweli ya uhalifu kuhusu Ross Ulbricht, mpangaji mkuu wa Barabara ya Silk, soko la mtandaoni ambalo liliuza dawa haramu, silaha na bidhaa nyingine kwa kutumia Bitcoin kama njia ya malipo. Kitabu hiki kinaangazia kuinuka na kuanguka kwa Ulbricht, ambaye alifanya kazi chini ya jina bandia "Dread Pirate Roberts," na maafisa wa kutekeleza sheria ambao walimwangusha. Inachunguza changamoto za kiufundi na kisheria za kufuatilia mhalifu asiyejulikana kwenye mtandao wa giza, na huibua maswali muhimu kuhusu jukumu la teknolojia katika kuwezesha shughuli haramu.
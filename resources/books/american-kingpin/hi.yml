title: "अमेरिकी सरगना"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  निक बिल्टन द्वारा लिखित अमेरिकन किंगपिन, रॉस उलब्रिच्ट के बारे में एक दिलचस्प सच्ची अपराध कहानी है, जो सिल्क रोड के पीछे का मास्टरमाइंड है, एक ऑनलाइन ब्लैक मार्केट जो भुगतान विधि के रूप में Bitcoin का उपयोग करके अवैध ड्रग्स, हथियार और अन्य सामान का व्यापार करता था। यह पुस्तक उलब्रिच्ट के उत्थान और पतन पर प्रकाश डालती है, जो "ड्रेड पाइरेट रॉबर्ट्स" के छद्म नाम से काम करता था, और कानून प्रवर्तन अधिकारी जिन्होंने उसे गिराया। यह डार्क वेब पर एक अनाम अपराधी को ट्रैक करने की तकनीकी और कानूनी चुनौतियों का पता लगाता है, और अवैध गतिविधियों को सक्षम करने में प्रौद्योगिकी की भूमिका के बारे में महत्वपूर्ण प्रश्न उठाता है।
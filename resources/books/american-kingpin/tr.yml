title: "American Kingpin"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  Nick Bilton tarafından yazılan American Kingpin, ödeme yöntemi olarak Bitcoin'ı kullanarak yasadışı uyuşturucu, silah ve diğer malların ticaretini yapan çevrimiçi bir karaborsa olan İpek Yolu'nun arkasındaki beyin Ross Ulbricht hakkında sürükleyici bir gerçek suç hikayesidir. Kitap, "Dread Pirate Roberts" takma adıyla faaliyet gösteren Ulbricht'in yükselişini ve düşüşünü ve onu alaşağı eden kolluk kuvvetlerini inceliyor. Karanlık ağda anonim bir suçlunun izini sürmenin teknik ve yasal zorluklarını araştırıyor ve teknolojinin yasadışı faaliyetlere olanak sağlamadaki rolü hakkında önemli soruları gündeme getiriyor.
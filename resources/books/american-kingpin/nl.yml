title: "Amerikaanse spion"
publication_year: 2018
cover: cover_en.webp
original: true
description: |
  American Kingpin van Nick Bilton is een aangrijpend waargebeurd misdaadverhaal over Ross Ulbricht, het brein achter Silk Road, een online zwarte markt waar illegale drugs, wapens en andere goederen werden verhandeld met Bitcoin als betaalmiddel. Het boek gaat in op de opkomst en ondergang van Ulbricht, die opereerde onder het pseudoniem "Dread Pirate Roberts", en de wetshandhavers die hem ten val brachten. Het onderzoekt de technische en juridische uitdagingen van het opsporen van een anonieme crimineel op het dark web en roept belangrijke vragen op over de rol van technologie in het mogelijk maken van illegale activiteiten.
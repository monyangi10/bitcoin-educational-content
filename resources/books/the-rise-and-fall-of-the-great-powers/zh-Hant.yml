title: 「大國的興衰」
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  Paul Kennedy 所著的《大國的興衰》（The Rise and Fall of the Great Powers）對歷史上各個大國衰落的經濟和軍事因素進行了歷史性的分析。書中探討了西班牙、法國和英國等國如何崛起，但最終卻因為過度擴張、經濟停滯和軍事失敗等因素而衰落。Kennedy 也探討了美國如何在現代崛起為全球霸主，以及面對中國等崛起中的強國，美國在維持其地位時所面臨的挑戰。本書深入探討了影響大國興衰的長期趨勢和歷史模式，是任何對全球政治和經濟感興趣的人的必讀書籍。
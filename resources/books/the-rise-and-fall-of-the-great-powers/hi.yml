title: "महान शक्तियों का उत्थान और पतन"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  पॉल कैनेडी द्वारा लिखित द राइज़ एंड फ़ॉल ऑफ़ द ग्रेट पॉवर्स उन आर्थिक और सैन्य कारकों का ऐतिहासिक विश्लेषण है, जिन्होंने पूरे इतिहास में विभिन्न महान शक्तियों के पतन में योगदान दिया है। पुस्तक इस बात की पड़ताल करती है कि स्पेन, फ़्रांस और ब्रिटेन जैसे देश कैसे शक्तिशाली बने, लेकिन अंततः अति-विस्तार, आर्थिक ठहराव और सैन्य पराजय जैसे कारकों के कारण उनका पतन हो गया। कैनेडी इस बात की भी जांच करते हैं कि आधुनिक युग में संयुक्त राज्य अमेरिका एक प्रमुख वैश्विक शक्ति के रूप में कैसे उभरा है, और चीन जैसी उभरती शक्तियों के सामने अपनी स्थिति बनाए रखने में उसे किन चुनौतियों का सामना करना पड़ता है। यह पुस्तक उन दीर्घकालिक रुझानों और ऐतिहासिक पैटर्न के बारे में जानकारी प्रदान करती है, जिन्होंने महान शक्तियों के उत्थान और पतन को आकार दिया है, और वैश्विक राजनीति और अर्थशास्त्र में रुचि रखने वाले किसी भी व्यक्ति के लिए इसे अवश्य पढ़ना चाहिए।
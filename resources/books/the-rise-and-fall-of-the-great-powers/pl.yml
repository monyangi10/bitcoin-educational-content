title: "Powstanie i upadek wielkich mocarstw"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  The Rise and Fall of the Great Powers autorstwa Paula Kennedy'ego to historyczna analiza czynników ekonomicznych i militarnych, które przyczyniły się do upadku różnych wielkich mocarstw na przestrzeni dziejów. Książka bada, w jaki sposób kraje takie jak Hiszpania, Francja i Wielka Brytania rosły w siłę, ale ostatecznie upadły z powodu takich czynników, jak nadmierna ekspansja, stagnacja gospodarcza i porażki militarne. Kennedy analizuje również, w jaki sposób Stany Zjednoczone stały się dominującą globalną potęgą w erze nowożytnej i jakie wyzwania stoją przed nimi, aby utrzymać swoją pozycję w obliczu rosnących potęg, takich jak Chiny. Książka oferuje wgląd w długoterminowe trendy i historyczne wzorce, które ukształtowały wzrost i upadek wielkich mocarstw, i jest obowiązkową lekturą dla każdego zainteresowanego globalną polityką i ekonomią.
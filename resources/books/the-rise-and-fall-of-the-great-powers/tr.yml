title: "Büyük Güçlerin Yükselişi ve Çöküşü"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  Paul Kennedy tarafından yazılan Büyük Güçlerin Yükselişi ve Çöküşü, tarih boyunca çeşitli büyük güçlerin gerilemesine katkıda bulunan ekonomik ve askeri faktörlerin tarihsel bir analizidir. Kitap, İspanya, Fransa ve İngiltere gibi ülkelerin nasıl güçlendiğini, ancak sonunda aşırı genişleme, ekonomik durgunluk ve askeri yenilgi gibi faktörler nedeniyle nasıl gerilediğini araştırıyor. Kennedy ayrıca Amerika Birleşik Devletleri'nin modern çağda nasıl baskın bir küresel güç olarak ortaya çıktığını ve Çin gibi yükselen güçler karşısında konumunu korumada karşılaştığı zorlukları inceliyor. Büyük güçlerin yükselişini ve düşüşünü şekillendiren uzun vadeli eğilimler ve tarihsel kalıplar hakkında içgörüler sunan kitap, küresel siyaset ve ekonomiyle ilgilenen herkesin mutlaka okuması gereken bir eser.
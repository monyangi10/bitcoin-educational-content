title: "Kuinuka na Kuanguka kwa Nguvu Kuu"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  Kuinuka na Kuanguka kwa Mamlaka Makuu na Paul Kennedy ni uchanganuzi wa kihistoria wa mambo ya kiuchumi na kijeshi ambayo yamechangia kudorora kwa mamlaka kuu mbalimbali katika historia. Kitabu hiki kinachunguza jinsi nchi kama Uhispania, Ufaransa, na Uingereza zilivyoingia madarakani, lakini hatimaye zilipungua kutokana na sababu kama vile upanuzi wa kupita kiasi, mdororo wa kiuchumi, na kushindwa kijeshi. Kennedy pia anachunguza jinsi Merika imeibuka kama nguvu kuu ya ulimwengu katika enzi ya kisasa, na changamoto zinazoikabili katika kudumisha msimamo wake mbele ya mataifa yenye nguvu kama Uchina. Kitabu hiki kinatoa maarifa kuhusu mienendo ya muda mrefu na mifumo ya kihistoria ambayo imechagiza kuinuka na kuanguka kwa mamlaka kuu, na ni lazima isomwe kwa yeyote anayevutiwa na siasa za kimataifa na uchumi.
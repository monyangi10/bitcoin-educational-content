title: "De opkomst en ondergang van de grootmachten"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  The Rise and Fall of the Great Powers van Paul Kennedy is een historische analyse van de economische en militaire factoren die hebben bijgedragen aan de neergang van verschillende grootmachten door de geschiedenis heen. Het boek onderzoekt hoe landen als Spanje, Frankrijk en Groot-Brittannië aan de macht kwamen, maar uiteindelijk in verval raakten door factoren als overmatige expansie, economische stagnatie en militaire nederlagen. Kennedy onderzoekt ook hoe de Verenigde Staten in het moderne tijdperk zijn uitgegroeid tot een dominante wereldmacht en voor welke uitdagingen ze staan om hun positie te behouden tegenover opkomende machten als China. Het boek biedt inzicht in de langetermijntrends en historische patronen die de opkomst en ondergang van grootmachten hebben gevormd, en is een must voor iedereen die geïnteresseerd is in wereldpolitiek en economie.
title: "Uspon i pad velikih sila"
publication_year: 1987
cover: cover_en.webp
original: true
description: |
  Uspon i pad velikih sila od Paula Kenedija je istorijska analiza ekonomskih i vojnih faktora koji su doprineli padu raznih velikih sila kroz istoriju. Knjiga istražuje kako su zemlje poput Španije, Francuske i Britanije došle na vlast, ali su na kraju opale zbog faktora kao što su prekomerno širenje, ekonomska stagnacija i vojni poraz. Kenedi takođe ispituje kako su Sjedinjene Američke Države postale dominantna globalna sila u modernoj eri i izazove sa kojima se suočavaju u održavanju svoje pozicije pred rastućim silama poput Kine. Knjiga nudi uvide u dugoročne trendove i istorijske obrasce koji su oblikovali uspon i pad velikih sila i predstavlja obavezno štivo za svakoga ko je zainteresovan za globalnu politiku i ekonomiju.
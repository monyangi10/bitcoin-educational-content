title: "Sapiens"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  Sapiens na Yuval Noah Harari ni sura ya kuvutia katika historia ya wanadamu. Harari inachunguza mageuzi ya Homo sapiens tangu siku zetu za awali kama wawindaji-wakusanyaji kupitia mapinduzi ya kilimo na maendeleo ya ustaarabu wa kisasa. Anachunguza njia ambazo tumezoea na kubadilika kwa wakati, na athari ambayo tumekuwa nayo kwa ulimwengu unaotuzunguka. Kupitia uchanganuzi wake wa kina na unaochochea fikira, Harari anatupa changamoto ya kufikiria mahali petu ulimwenguni na chaguzi tunazofanya kama spishi. Kitabu hiki ni cha lazima kusomwa kwa yeyote anayevutiwa na historia, anthropolojia, au hali ya mwanadamu.'
title: "Sapiens"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  Yuval Noah Harari'nin yazdığı Sapiens insanlık tarihine büyüleyici bir bakış. Harari, Homo sapiens'in evrimini avcı-toplayıcı olarak ilk günlerimizden tarım devrimine ve modern uygarlığın gelişimine kadar inceliyor. Zaman içinde nasıl uyum sağladığımızı ve değiştiğimizi ve çevremizdeki dünya üzerinde nasıl bir etkiye sahip olduğumuzu araştırıyor. Harari, detaylı ve düşündürücü analiziyle bizi dünyadaki yerimiz ve bir tür olarak yaptığımız seçimler hakkında düşünmeye zorluyor. Bu kitap tarih, antropoloji ya da insanlık durumuyla ilgilenen herkesin mutlaka okuması gereken bir kitap
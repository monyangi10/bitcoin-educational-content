title: "Sapiens"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  Sapiens by Yuval Noah Harari je fascinantan pogled na istoriju čovečanstva. Harari ispituje evoluciju Homo sapiensa od naših najranijih dana kao lovaca-sakupljača preko poljoprivredne revolucije i razvoja moderne civilizacije. On istražuje načine na koje smo se prilagodili i promenili tokom vremena, i uticaj koji smo imali na svet oko nas. Kroz svoju detaljnu i misaonu analizu, Harari nas izaziva da razmislimo o našem mestu u svetu i izborima koje donosimo kao vrsta. Ova knjiga je obavezno štivo za svakoga ko je zainteresovan za istoriju, antropologiju ili ljudsko stanje.'
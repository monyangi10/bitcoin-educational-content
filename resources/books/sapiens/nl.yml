title: "Sapiens"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  Sapiens van Yuval Noah Harari is een fascinerende kijk op de geschiedenis van de mensheid. Harari onderzoekt de evolutie van Homo sapiens vanaf onze begindagen als jager-verzamelaars via de landbouwrevolutie tot de ontwikkeling van de moderne beschaving. Hij onderzoekt de manieren waarop we ons in de loop der tijd hebben aangepast en veranderd, en de impact die we hebben gehad op de wereld om ons heen. Door zijn gedetailleerde en tot nadenken stemmende analyse daagt Harari ons uit om na te denken over onze plaats in de wereld en de keuzes die we als soort maken. Dit boek is een must voor iedereen die geïnteresseerd is in geschiedenis, antropologie of de menselijke conditie
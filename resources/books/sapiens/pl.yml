title: "Sapiens"
publication_year: 2011
cover: cover_en.webp
original: true
description: |
  Sapiens autorstwa Yuval Noah Harari to fascynujące spojrzenie na historię ludzkości. Harari bada ewolucję Homo sapiens od naszych najwcześniejszych dni jako łowców-zbieraczy, poprzez rewolucję rolniczą i rozwój współczesnej cywilizacji. Bada sposoby, w jakie dostosowywaliśmy się i zmienialiśmy na przestrzeni czasu, a także wpływ, jaki wywarliśmy na otaczający nas świat. Poprzez swoją szczegółową i prowokującą do myślenia analizę, Harari rzuca nam wyzwanie, abyśmy zastanowili się nad naszym miejscem w świecie i wyborami, których dokonujemy jako gatunek. Ta książka jest lekturą obowiązkową dla każdego, kto interesuje się historią, antropologią lub kondycją ludzką"
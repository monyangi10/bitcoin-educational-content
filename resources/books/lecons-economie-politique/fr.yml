description: |
  Frédéric Passy's Lessons in Political Economy (1860) is a clear, accessible introduction to liberal economics. Passy, who would later become the first recipient of the Nobel Peace Prize in 1901, was a gifted popularizer who believed that economic education was the key to social progress and international peace.

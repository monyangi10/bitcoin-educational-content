title: "V for Vendetta"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  V for Vendetta by Alan Moore je grafički roman smešten u distopijsku budućnost gde fašistička vlada kontroliše Ujedinjeno Kraljevstvo. Priča prati maskiranog osvetnika poznatog kao "V" koji želi da svrgne vladu i inspiriše revoluciju. Na tom putu, udružuje se sa mladom ženom po imenu Ivi Hamond i njih dvoje se upuštaju u složenu mrežu političkih intriga i društvenih pitanja. Knjiga istražuje teme kao što su autoritarizam, terorizam, cenzura i moć lične slobode. Dobila je značajno priznanje kritike zbog svoje privlačne priče, dobro razvijenih likova i upečatljivog vizuelnog stila.
title: "V for Vendetta"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  Alan Moore 所著的《V for Vendetta》是一部繪本小說，故事背景設定在一個法西斯政府控制英國的烏托邦未來。故事講述一個被稱為 "V "的蒙面義警尋求推翻政府並激發革命。一路上，他與一位名叫 Evey Hammond 的年輕女子合作，兩人捲入了複雜的政治陰謀和社會問題中。本書探討了專制主義、恐怖主義、審查制度以及個人自由的力量等主題。本書以其引人入勝的故事情節、細膩的人物性格以及引人注目的視覺風格獲得了極高的評價。
title: "V for Vendetta"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  V for Vendetta van Alan Moore is een graphic novel die zich afspeelt in een dystopische toekomst waarin een fascistische regering het Verenigd Koninkrijk controleert. Het verhaal volgt een gemaskerde burgerwacht bekend als "V" die probeert de regering omver te werpen en een revolutie te ontketenen. Onderweg vormt hij een team met een jonge vrouw genaamd Evey Hammond en raken de twee betrokken bij een complex web van politieke intriges en sociale kwesties. Het boek verkent thema's als autoritarisme, terrorisme, censuur en de kracht van persoonlijke vrijheid. Het boek heeft veel lof geoogst vanwege de meeslepende verhaallijn, de goed ontwikkelde personages en de opvallende visuele stijl.
title: "V for Vendetta"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  Alan Moore'un yazdığı V for Vendetta, faşist bir hükümetin Birleşik Krallık'ı kontrol ettiği distopik bir gelecekte geçen bir grafik romandır. Hikaye, hükümeti devirmek ve bir devrime ilham vermek isteyen "V" olarak bilinen maskeli bir kanunsuzu takip ediyor. Yol boyunca Evey Hammond adında genç bir kadınla işbirliği yapar ve ikisi karmaşık bir siyasi entrika ve sosyal sorunlar ağına dahil olurlar. Kitap otoriterlik, terörizm, sansür ve kişisel özgürlüğün gücü gibi temaları irdeliyor. Zorlayıcı hikayesi, iyi geliştirilmiş karakterleri ve çarpıcı görsel stiliyle eleştirmenlerin büyük beğenisini kazanmıştır.
title: "प्रतिशोध"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  एलन मूर द्वारा लिखित वी फॉर वेंडेटा एक ग्राफिक उपन्यास है जो एक ऐसे भविष्य में सेट है जहाँ एक फासीवादी सरकार यूनाइटेड किंगडम को नियंत्रित करती है। कहानी "वी" नामक एक नकाबपोश निगरानीकर्ता के बारे में है जो सरकार को उखाड़ फेंकना चाहता है और क्रांति को प्रेरित करना चाहता है। इस दौरान, वह एवी हैमंड नाम की एक युवती के साथ मिल जाता है और दोनों राजनीतिक साज़िश और सामाजिक मुद्दों के एक जटिल जाल में उलझ जाते हैं। पुस्तक अधिनायकवाद, आतंकवाद, सेंसरशिप और व्यक्तिगत स्वतंत्रता की शक्ति जैसे विषयों की खोज करती है। इसने अपनी आकर्षक कहानी, अच्छी तरह से विकसित पात्रों और आकर्षक दृश्य शैली के लिए महत्वपूर्ण आलोचनात्मक प्रशंसा प्राप्त की है।
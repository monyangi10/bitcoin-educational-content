title: "V jak Vendetta"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  V for Vendetta autorstwa Alana Moore'a to powieść graficzna osadzona w dystopijnej przyszłości, w której faszystowski rząd kontroluje Wielką Brytanię. Historia opowiada o zamaskowanym mścicielu znanym jako "V", który stara się obalić rząd i zainspirować rewolucję. Po drodze łączy siły z młodą kobietą o imieniu Evey Hammond i oboje zostają wplątani w skomplikowaną sieć politycznych intryg i kwestii społecznych. Książka porusza takie tematy jak autorytaryzm, terroryzm, cenzura i siła wolności osobistej. Zyskała uznanie krytyków za wciągającą fabułę, dobrze rozwinięte postacie i uderzający styl wizualny.
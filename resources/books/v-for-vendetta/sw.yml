title: "V kwa Vendetta"
publication_year: 1982
cover: cover_en.webp
original: true
description: |
  V for Vendetta na Alan Moore ni riwaya ya picha iliyowekwa katika siku zijazo za dystopian ambapo serikali ya kifashisti inadhibiti Uingereza. Hadithi hii inafuatia mlinzi aliyejificha uso anayejulikana kama "V" ambaye anataka kupindua serikali na kuhamasisha mapinduzi. Njiani, anaungana na msichana anayeitwa Evey Hammond na wawili hao wanahusika katika mtandao tata wa fitina za kisiasa na masuala ya kijamii. Kitabu hiki kinachunguza mada kama vile ubabe, ugaidi, udhibiti, na nguvu ya uhuru wa kibinafsi. Imepata sifa kuu kwa hadithi yake ya kuvutia, wahusika walioendelezwa vyema, na mtindo wa kuvutia wa kuona.
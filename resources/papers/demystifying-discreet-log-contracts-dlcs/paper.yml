title: "Demystifying Discreet Log Contracts (DLCs)"
original_language: en
authors:
  - The Firefish Team
abstract: |
  This document provides an educational overview of Discreet Log Contracts (DLCs), a Bitcoin-native smart contract protocol. DLCs enable conditional payments on Bitcoin without revealing contract details on-chain, offering enhanced privacy and scalability. The paper explains the technical architecture, cryptographic foundations, and practical applications of DLCs in the Bitcoin ecosystem.

title: "Blind Signatures for Untraceable Payments"
original_language: en
authors:
  - David Chaum
abstract: |
  This paper introduces blind signatures, a new form of cryptographic protocol that enables the creation of untraceable electronic payment systems that preserve user privacy while maintaining the security and auditability required for practical deployment. The proposed system addresses the fundamental conflict between two critical requirements in electronic payments: protecting individual privacy from surveillance while preventing fraud and ensuring accountability.
  The blind signature protocol allows a bank to sign digital notes without seeing their content, analogous to signing a carbon-lined envelope without seeing what's inside. Users can withdraw electronic cash from their accounts and later spend it at merchants, with the bank unable to link specific transactions to individual users—achieving unconditional untraceability. The system employs a three-function cryptosystem: a signing function known only to the bank, a commuting function and its inverse known only to users, and a redundancy checking predicate for signature validation.
  The protocol operates in distinct phases: withdrawal (where users obtain blindly signed notes from the bank), payment (where notes are transferred to merchants), and clearing (where merchants deposit notes with the bank). The critical innovation is that while the bank cannot trace legitimately used notes to specific users, it maintains a comprehensive list of cleared notes to prevent double-spending. This design eliminates the need for real-time verification during every transaction while preserving both security and privacy.
  The paper demonstrates that blind signatures offer significant advantages over both traditional credit cards (which expose detailed transaction information) and physical cash (which has traceable serial numbers). Extensions to the basic protocol are discussed, including support for exact-amount payments with refunds, multiple denomination notes, and integration with existing banking infrastructure. The system represents a practical solution for implementing electronic cash that provides stronger privacy guarantees than existing payment methods while maintaining the auditability and control mechanisms necessary for commercial deployment.

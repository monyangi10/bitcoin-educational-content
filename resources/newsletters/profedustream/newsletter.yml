description: |
  Hey 👋 Je suis ProfEduStream, l’auteur de cette newsletter. Intimement persuadé que Bitcoin est une révolution, je partage toutes les deux semaines environ mes recherches, connaissances et présentations dans cette newsletter.

  Ces partages sont répartis en trois catégories:
  - des présentations éducatives techniques comme vulgarisées, associées directement à Bitcoin et son fonctionnement;
  - l’histoire de Bitcoin à travers la série BBFF (Bitcoin Blockchain Fun Fact), série qui analyse le fonctionnement du réseau depuis son lancement;
  - des spécificités techniques de Bitcoin, dans des articles individuels qui paraîtront de manière sporadique.

  En plus de ces articles, un onglet “Tutoriels YouTube” te permettra d’accéder à un panel conséquent de vidéos éducatives. Et si tu souhaites effectuer une donation pour soutenir mon travail, tu peux m’envoyer quelques satoshis via lightning: pallidstool92@walletofsatoshi.com . À très vite !

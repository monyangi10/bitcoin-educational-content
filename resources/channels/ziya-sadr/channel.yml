description: |
  من ضیا صدر هستم. بیتکوینرم و در طی چند سال اخیر روی پدیده‌ی مالی غیرمتمرکز و جذابی به نام بیتکوین مطالعه کرده‌ام

  عمده فعالیت من در توییتر، وبسایت منابع فارسی بیتکوین، کانال تلگرام خودم و گروه تلگرامی سیمرغ و همچنین اخیرا این کانال یوتوب رو راه‌اندازی کردم و به آموزش‌ امنیت، حریم خصوصی، کیف‌پولها، ابزارها و نرم‌افزارهای بیتکوینی و همچنان اکوسیستم و مفاهیم بیتکوین
  می‌پردازم

  لطفا کانال من را با دوستان و علاقه‌مندان به این موضوعات به اشتراک بگذارید
